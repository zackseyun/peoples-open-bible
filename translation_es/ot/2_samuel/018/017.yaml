review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo en la secuencia narrativa principal: tomaron a Absalón, lo echaron/arrojaron en el bosque dentro de un gran hoyo/foso, levantaron un gran montón de piedras sobre él, y todo Israel huyó. Sin embargo, las notas al pie están cruzadas: la nota [a] del inglés corresponde a «montón de piedras / túmulo de piedras», no a «bosque»; y la nota sobre el modismo «cada hombre a su tienda» debe anclarse en esa frase, no en «montón». También conviene ajustar «en el gran foso» a «en el gran foso del bosque» o mantener la estructura de destino más clara en español; el borrador actual es aceptable, pero la reparación principal es la colocación de notas.'
  spanish_quality_summary: 'El español es claro y digno. «Lo echaron» es comprensible, aunque «lo arrojaron» suena un poco más preciso para la fuerza de וַיַּשְׁלִיכוּ. «Levantaron sobre él un montón de piedras muy grande» es natural, pero «amontonaron sobre él» sería más interpretativo; la redacción actual puede mantenerse. El problema de calidad más importante es formal: los marcadores de nota no están en las palabras/frases que explican, lo que vuelve confusa la lectura.'
  glossary_alignment: No hay términos teológicos clave del glosario general en este versículo. «Absalón», «Israel», «bosque», «foso», «montón de piedras» y «cada hombre a su tienda» se alinean bien con las decisiones del POB en inglés. Se preserva correctamente la literalidad de «cada hombre a su tienda» con nota idiomática.
  issues:
  - severity: high
    issue: Marcadores de notas al pie invertidos/mal anclados
    rationale: La nota [a] dice «O “un túmulo de piedras”», pero está anclada a «bosque»; debe anclarse a «montón». La nota sobre el modismo hebreo está puesta en «montón[b]», pero debe anclarse a «cada hombre a su tienda[b]». Esto incumple la disciplina requerida de notas y puede inducir a error al lector.
  - severity: low
    issue: Verbo «echaron» podría afinarse a «arrojaron»
    rationale: «Echaron» es aceptable y natural, pero «arrojaron» refleja un poco mejor la fuerza de שלך y la indignidad de disponer del cuerpo. Es una mejora estilística menor, no obligatoria.
