revisions:
- from: Hacer un tratamiento detallado y dar una amplia vuelta en el discurso[a], y ocuparse en exceso de los pormenores, le corresponde al originador de la historia;
  to: Entrar en detalle y dar un amplio rodeo en el discurso[a], y ocuparse en exceso de los pormenores, le corresponde al iniciador de la historia;
  rationale: Se aplican reparaciones menores para mejorar la naturalidad del español sin apartarse del griego ni del rastro léxico del POB. «Entrar en detalle» sustituye una expresión poco idiomática; «dar un amplio rodeo en el discurso» conserva la metáfora de la discursividad amplia en forma más natural; «iniciador de la historia» preserva mejor en español legible la idea de ἀρχηγενέτης como quien origina o comienza la historia.
