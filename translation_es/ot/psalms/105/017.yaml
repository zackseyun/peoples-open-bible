translation:
  language: es
  text: Él envió un hombre delante de ellos[a]; José fue vendido como esclavo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antes de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El qal perfecto de שלח expresa acción pasada de enviar. «Envió» es la equivalencia natural y directa en español para conservar el valor narrativo sin añadir matiz innecesario.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - antes de ellos
  - frente a ellos
  lexicon: HALOT
  rationale: La expresión literalmente significa «antes/delante de ellos». En español, «delante de ellos» comunica con claridad la prioridad espacial o preparatoria sin sonar forzado.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  lexicon: HALOT
  rationale: El sustantivo es singular y masculino. «Un hombre» conserva la correspondencia formal y evita diluir el rasgo de género del hebreo.
- source_word: לְעֶבֶד
  english_pob_choice: as a slave
  chosen_spanish: como esclavo
  alternatives_spanish:
  - como siervo
  - para esclavo
  lexicon: HALOT
  rationale: 'El valor de ל aquí indica estado o resultado: José llega a la condición de esclavitud. «Esclavo» preserva esa fuerza mejor que «siervo» en este contexto de venta.'
- source_word: נִמְכַּר
  english_pob_choice: was sold
  chosen_spanish: fue vendido
  alternatives_spanish:
  - se vendió
  lexicon: HALOT
  rationale: El nifal perfecto de מכר es pasivo. «Fue vendido» mantiene la voz pasiva y la sencillez narrativa del hebreo.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: Nombre propio tradicional
  rationale: Se usa la forma española estándar del nombre propio, conforme al uso bíblico en español.
theological_decisions:
- issue: עֶבֶד en el contexto de la venta de José
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  rationale: Aunque עֶבֶד puede significar «siervo» en otros contextos, la combinación con «fue vendido» hace explícita la condición de esclavitud. En español, «esclavo» conserva mejor la tensión histórica y lexical del pasaje.
  doctrine_reference: Principio POB sobre términos de servidumbre/esclavitud según el contexto lexical
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «ahead of them» a «before them» para acercarse más al hebreo; la versión española refleja esa relación con «delante de ellos», que mantiene la idea de precedencia/preparación sin añadir interpretación.
  spanish_consistency_notes:
  - Se mantiene «José» como forma española estándar del nombre.
  - Se conserva «esclavo» para reflejar el estado de venta y evitar suavizar el término.
  - La nota textual en a ofrece una alternativa natural en español sin alterar el flujo principal.
