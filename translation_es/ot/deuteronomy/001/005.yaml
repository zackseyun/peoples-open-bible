translation:
  language: es
  text: 'Más allá del Jordán[a], en la tierra de Moab, Moisés comenzó a explicar[b] esta ley[c], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Al otro lado del Jordán» o «Al otro lado del río Jordán». La expresión hebrea es geográficamente relativa y puede verterse de varias maneras naturales en español.
    reason: lexical_alternative
  - marker: b
    text: O «exponer» o «aclarar». El hebreo indica la acción de hacer comprensible o dejar claro el contenido; aquí se eligió «explicar» por claridad y naturalidad.
    reason: lexical_alternative
  - marker: c
    text: O «instrucción». El hebreo torá puede significar «ley» o, más ampliamente, «instrucción»; aquí se eligió «ley» por el contexto jurídico-covenantal.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: Beyond the Jordan
  chosen_spanish: Más allá del Jordán
  alternatives_spanish:
  - Al otro lado del Jordán
  - Al otro lado del río Jordán
  lexicon: HALOT
  rationale: La expresión hebrea es relacional y depende del punto de referencia geográfico. En español, «Más allá del Jordán» conserva esa perspectiva sin fijarla de manera innecesaria en una sola localización.
- source_word: בְּאֶרֶץ מוֹאָב
  english_pob_choice: in the land of Moab
  chosen_spanish: en la tierra de Moab
  alternatives_spanish:
  - en el territorio de Moab
  - en la región de Moab
  lexicon: HALOT
  rationale: אֶרֶץ en contexto geográfico-político se expresa naturalmente como «tierra». «Tierra de Moab» mantiene la referencia territorial y el registro bíblico sin volverse arcaico.
- source_word: הוֹאִיל
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - se dispuso a
  lexicon: HALOT
  rationale: En esta construcción, el verbo funciona idiomáticamente como inicio de una acción. «Comenzó» reproduce el valor aspectual del texto con naturalidad en español.
- source_word: בֵּאֵר
  english_pob_choice: to explain
  chosen_spanish: explicar
  alternatives_spanish:
  - exponer
  - aclarar
  - hacer claro
  lexicon: HALOT
  rationale: El verbo באר comunica la acción de hacer claro o exponer. «Explicar» es la opción más clara y directa en español, y conserva el sentido del original sin tecnicismos innecesarios.
- source_word: הַתּוֹרָה הַזֹּאת
  english_pob_choice: this law
  chosen_spanish: esta ley
  alternatives_spanish:
  - esta instrucción
  - esta Torá
  lexicon: HALOT
  rationale: En Deuteronomio, תּוֹרָה tiene peso jurídico-covenantal. «Ley» preserva ese matiz mejor que «instrucción» en este contexto, y «Torá» se reserva para casos donde la transliteración sea una decisión documentada.
- source_word: לֵאמֹר
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'así:'
  - 'y dijo:'
  lexicon: HALOT
  rationale: Es la partícula discursiva estándar que introduce el contenido de la exposición. «Diciendo:» sigue de cerca la función sintáctica del hebreo y enlaza con la cita que continúa.
theological_decisions:
- issue: Valor covenantal-legal de תּוֹרָה
  english_pob_reading: this law
  chosen_spanish_reading: esta ley
  alternative_spanish_readings:
  - esta instrucción
  - esta Torá
  rationale: El contexto inmediato presenta la exposición de las estipulaciones pactales de Deuteronomio. «Ley» conserva el componente normativo-jurídico que el POB inglés documenta, sin negar el sentido más amplio de instrucción divina.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
