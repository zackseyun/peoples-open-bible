    reason: lexical_alternative
  revision_rationale: 'La revisión es menor y no doctrinal: mejora la naturalidad del español, ajusta γαστήρ a «estómago» y da a μιεροφαγίᾳ una expresión más idiomática y precisa, manteniendo intacta la imaginería cultual concreta del original.'
