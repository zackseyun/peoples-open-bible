base_translation:
  language: en
  yaml_path: translation/ot/esther/004/008.yaml
  text: He also gave him a copy of the written decree that had been issued in Susa for their destruction[a], to show Esther and tell her[c][b], and to command her to go in to the king to implore his favor and seek before him on behalf of her people.
  footnotes:
  - marker: a
    text: Or 'a copy of the edict.' The Persian loanword פַּתְשֶׁגֶן refers to the text or copy of an official document.
    reason: lexical_alternative
  - marker: b
    text: Literally 'seek from before him,' a courtly expression for making a petition in the king's presence.
    reason: cultural_note
  - marker: c
    text: Or 'for her people' / 'on behalf of her people.' The Hebrew preposition can express concern for or advocacy on behalf of her people.
    reason: lexical_alternative
