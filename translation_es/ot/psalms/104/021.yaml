revisions:
- from: Los cachorros de león rugen por la presa[a], y buscan su comida de Dios.
  to: Los leones jóvenes rugen por la presa[a], y buscan de Dios su alimento.
  rationale: Se revisa «cachorros de león» a «leones jóvenes» para reflejar mejor כְּפִירִים según el análisis léxico y la nota del POB en inglés. Se cambia «su comida de Dios» por «de Dios su alimento» para lograr un español natural y digno sin perder el sentido de מֵאֵל ni la variación léxica entre «presa» y «alimento». No se requiere adjudicación adicional porque el ajuste es claro y de bajo riesgo doctrinal.
