  text: '참된 속담에 이른 말이 그들에게 그대로 일어났습니다: 「개가 자기 토한 것에 돌아가고[a], 씻은 돼지가 다시 진창에 뒹군다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 첫 번째 속담은 잠언 26:11을 반영한다.
