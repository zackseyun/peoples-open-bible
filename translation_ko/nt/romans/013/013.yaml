id: ROM.13.13
reference: Romans 13:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὡς ἐν ἡμέρᾳ εὐσχημόνως περιπατήσωμεν, μὴ κώμοις καὶ μέθαις, μὴ κοίταις καὶ ἀσελγείαις, μὴ ἔριδι καὶ ζήλῳ,
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/013.yaml
  text: Let us walk properly as in the daytime, not in revelries and drunkenness, not in sexual immorality and sensuality, not in strife and jealousy.
translation:
  language: ko
  text: 낮에 행하는 것처럼 단정히[a] 걸읍시다. 흥청거림과 술 취함에 빠지지 말고, 성적 음란과 방탕에 빠지지 말며, 다툼과 시기[b]에 빠지지 마십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「점잖게」 「예의 바르게」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「질투」. 헬라어는 둘 다 가능하나, 악행 목록 안에서는 부정적 의미로 사용된다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἐν ἡμέρᾳ
  english_pob_choice: as in the daytime
  chosen_korean: 낮에 행하는 것처럼
  alternatives_korean:
  - 대낮에 있는 것처럼
  - 낮에 있는 것처럼
  lexicon: BDAG
  rationale: 「행하는 것처럼」을 보충하여 자연스럽게 옮긴다. 직전 절의 「낮/밤」 은유를 회수.
- source_word: εὐσχημόνως
  english_pob_choice: properly
  chosen_korean: 단정히
  alternatives_korean:
  - 점잖게
  - 예의 바르게
  lexicon: BDAG
  rationale: 부사. 「단정히」가 자연스럽고 합쇼체와 어울린다.
- source_word: περιπατήσωμεν
  english_pob_choice: Let us walk
  chosen_korean: 걸읍시다
  alternatives_korean:
  - 살아갑시다
  - 행합시다
  lexicon: BDAG
  rationale: 바울의 「걷다」 은유를 보존. 권유 명령으로 옮긴다.
- source_word: κώμοις
  english_pob_choice: revelries
  chosen_korean: 흥청거림
  alternatives_korean:
  - 방탕한 잔치
  - 광연
  lexicon: BDAG
  rationale: 술과 어우러진 떠들썩한 잔치. 「흥청거림」이 자연스럽고 「난교」로 좁히지 않는다.
- source_word: μέθαις
  english_pob_choice: drunkenness
  chosen_korean: 술 취함
  alternatives_korean:
  - 만취
  lexicon: BDAG
  rationale: 표준 어휘.
- source_word: κοίταις
  english_pob_choice: sexual immorality
  chosen_korean: 성적 음란
  alternatives_korean:
  - 음행
  - 침상의 음란
  lexicon: BDAG
  rationale: 문자적 「침상들」이지만 관용적으로 불법 성행위. 영어 POB의 의역을 따라 「성적 음란」으로 옮긴다.
- source_word: ἀσελγείαις
  english_pob_choice: sensuality
  chosen_korean: 방탕
  alternatives_korean:
  - 음란
  - 방종
  lexicon: BDAG
  rationale: 부끄러움 없는 무절제. 「방탕」이 한국 성경 관행상 자연스럽다.
- source_word: ἔριδι
  english_pob_choice: strife
  chosen_korean: 다툼
  alternatives_korean:
  - 분쟁
  - 싸움
  lexicon: BDAG
  rationale: 「다툼」이 간결.
- source_word: ζήλῳ
  english_pob_choice: jealousy
  chosen_korean: 시기
  alternatives_korean:
  - 질투
  - 열심
  lexicon: BDAG
  rationale: 악행 목록 안에서 부정적 의미. 「시기」로 옮긴다.
