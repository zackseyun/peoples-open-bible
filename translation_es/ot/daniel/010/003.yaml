translation:
  language: es
  text: No comí manjares[a], ni carne ni vino entró en mi boca, ni me apliqué aceite, hasta cumplirse tres semanas completas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “pan de cosas deseables”; es decir, alimentos selectos o apetitosos.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “tres semanas de días”, es decir, tres semanas completas.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם חֲמֻדוֹת
  english_pob_choice: delicacies
  chosen_spanish: manjares
  alternatives_spanish:
  - alimentos selectos
  - delicias
  - comidas delicadas
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente “pan de cosas deseables”, un giro idiomático para comida escogida o apetitosa, no para “pan” en sentido estricto. “Manjares” reproduce bien el valor idiomático en español sin perder el matiz de alimento de calidad.
- source_word: בָשָׂר
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - carne para comer
  - flesh
  lexicon: HALOT
  rationale: En contexto alimentario, el español natural y fiel es “carne”. Evita el tono artificial de “flesh” y conserva la referencia a alimento, no a “carne” en sentido abstracto.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  lexicon: HALOT
  rationale: Equivalente directo y estándar en español bíblico y contemporáneo.
- source_word: לֹא בָא אֶל פִּי
  english_pob_choice: entered my mouth
  chosen_spanish: entró en mi boca
  alternatives_spanish:
  - llegó a mi boca
  - vino a mi boca
  lexicon: HALOT
  rationale: Mantiene la imagen hebrea de ingreso a la boca, con español natural y claro para expresar abstinencia de comer o beber.
- source_word: סוֹךְ ... סָכְתִּי
  english_pob_choice: did I anoint myself at all
  chosen_spanish: me ungí en absoluto
  alternatives_spanish:
  - me untoqué con aceite en absoluto
  - me apliqué aceite en absoluto
  lexicon: HALOT
  rationale: El verbo puede referirse a ungirse o aplicarse aceite al cuerpo como cuidado habitual. “Ungí” conserva la forma verbal tradicional y suficientemente amplia; “en absoluto” refleja la negación enfática.
- source_word: עַד מְלֹאת
  english_pob_choice: until the completion of
  chosen_spanish: hasta cumplirse
  alternatives_spanish:
  - hasta la conclusión de
  - hasta completarse
  lexicon: HALOT
  rationale: “Hasta cumplirse” expresa con naturalidad el sentido del infinitivo constructo de מלא en una duración temporal que llega a término.
- source_word: שְׁלֹשֶׁת שָׁבֻעִים יָמִים
  english_pob_choice: three full weeks
  chosen_spanish: tres semanas completas
  alternatives_spanish:
  - tres semanas de días
  - tres semanas enteras
  lexicon: HALOT
  rationale: La secuencia hebrea literalmente dice “tres semanas, días”, es decir, tres semanas plenas. “Completas” comunica esa fuerza idiomática con claridad y sin sobreexplicar en el texto principal.
translation_notes:
  revision_awareness: 'La versión inglesa POB optó por una equivalencia óptima: ''delicacies'', ''entered my mouth'', ''did I anoint myself at all'', y ''three full weeks''. La presente propuesta conserva ese mismo perfil, pero ajusta el registro al español bíblico natural. Se mantiene la tensión idiomática de לֶחֶם חֲמֻדוֹת con una nota explicativa, y se conserva la ambigüedad leve de סוך como ungirse/aplicarse aceite sin estrecharlo innecesariamente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa 'carne' en sentido alimentario, no 'flesh', por claridad idiomática.
  - '''Ungí'' conserva la posibilidad de unción corporal cotidiana sin cargarlo con sentido ceremonial.'
  - '''Tres semanas completas'' preserva la lectura temporal plena apoyada por la nota textual del inglés POB.'
