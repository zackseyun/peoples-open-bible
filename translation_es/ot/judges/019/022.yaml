    text: O, más literalmente, «hijos de Belial»; es decir, hombres sin ley o perversos.
    reason: lexical_alternative
  - marker: b
    text: «Conocerlo» es aquí un eufemismo sexual; indica que pretendían abusar sexualmente de él.
    reason: lexical_alternative
  revision_rationale: La revisión corrige el error de anclaje de la nota [a], alinea mejor el texto principal con la decisión léxica documentada del POB para בְנֵי בְלִיַּעַל, mejora la naturalidad del español en la frase narrativa y conserva correctamente el eufemismo sexual con nota explicativa.
