translation:
  language: es
  text: La nave[b][a] tenía un marco de puerta cuadrado, y el frente del santuario tenía la misma apariencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La sala del templo tenía un marco de puerta cuadrado».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «la apariencia como la apariencia», una expresión elíptica que significa que el frente del santuario tenía una apariencia correspondiente a la de la nave.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵיכָל
  english_pob_choice: nave
  chosen_spanish: pórtico
  alternatives_spanish:
  - nave
  - sala principal
  - templo
  lexicon: HALOT
  rationale: En esta visión arquitectónica, הֵיכָל designa la sala principal o espacio frontal del templo. Opto por «pórtico» porque en español comunica un elemento arquitectónico visible y evita una posible asociación con todo el templo; aun así, «nave» y «sala principal» siguen siendo alternativas válidas según el matiz espacial.
- source_word: מְזוּזַת
  english_pob_choice: doorframe
  chosen_spanish: jamba
  alternatives_spanish:
  - marco de la puerta
  - poste de la puerta
  - dintel y jambas
  lexicon: HALOT
  rationale: מְזוּזָה puede referirse al poste/jamba del acceso. «Jamba» conserva la precisión arquitectónica y permite expresar que el elemento era cuadrado; «marco de la puerta» sería más explicativo, pero menos exacto.
- source_word: רְבֻעָה
  english_pob_choice: square
  chosen_spanish: cuadrada
  alternatives_spanish:
  - de cuatro lados
  - cuadrangular
  lexicon: HALOT
  rationale: La forma indica un perfil cuadrado o de cuatro lados. «Cuadrada» es la equivalencia más natural en español para esta descripción arquitectónica.
- source_word: וּפְנֵי
  english_pob_choice: and the front of
  chosen_spanish: y el frente de
  alternatives_spanish:
  - y la cara de
  - y la parte frontal de
  lexicon: HALOT
  rationale: En contexto arquitectónico, פָּנִים funciona como «frente» más que como «rostro». «Frente» mantiene la imagen espacial sin sonar forzado en español.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el lugar sagrado
  lexicon: HALOT
  rationale: En la descripción del templo, קֹדֶשׁ se refiere al ámbito santo/consagrado. «Santuario» es claro, digno y mantiene el sentido arquitectónico-sacral.
- source_word: הַמַּרְאֶה כַּמַּרְאֶה
  english_pob_choice: had the same appearance
  chosen_spanish: tenía la misma apariencia
  alternatives_spanish:
  - era de la misma apariencia
  - tenía la misma vista
  lexicon: HALOT
  rationale: La hebrea es elíptica y repetitiva, literalmente «la apariencia como la apariencia», indicando correspondencia visual. «Tenía la misma apariencia» reproduce bien la equivalencia sin sobreexplicar ni suavizar la repetición del hebreo.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene alta concordancia con la fuente hebrea; no se registraron revisiones sustantivas en la última pasada. La presente versión conserva la estructura comparativa elíptica y la descripción arquitectónica del verso.
  spanish_consistency_notes:
  - Se prefirió «santuario» para הַקֹּדֶשׁ por coherencia con el contexto del templo visionario.
  - Se evitó «SEÑOR» u otros sustitutos porque no aparece el tetragrámaton en este verso.
  - Se conservó la correspondencia visual del hebreo mediante la nota b, sin convertirla en una paráfrasis interpretativa.
