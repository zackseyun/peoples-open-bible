  yaml_path: translation/ot/1_kings/013/032.yaml
  text: For the word that he cried out by the word of Yahweh against the altar that is in Bethel[a], and against all the houses of the high places that are in the cities of Samaria[b], will surely come to pass.
  footnotes:
