id: 2TH.3.6
reference: 2 Thessalonians 3:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παραγγέλλομεν δὲ ὑμῖν, ἀδελφοί, ἐν ὀνόματι τοῦ κυρίου ⸀ἡμῶν Ἰησοῦ Χριστοῦ στέλλεσθαι ὑμᾶς ἀπὸ παντὸς ἀδελφοῦ ἀτάκτως περιπατοῦντος καὶ μὴ κατὰ τὴν παράδοσιν ἣν ⸀παρελάβοσαν παρ’ ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/006.yaml
  text: Now we command you[a], brothers, in the name of our Lord Jesus Messiah[e][d][c][b], to keep away from every brother who is walking disorderly and not according to the tradition that they received from us.
translation:
  language: ko
  text: 형제[a] 여러분, 우리는 우리 주 예수 메시아[b]의 이름으로 여러분에게 명합니다. 곧 무질서하게 행하며[c] 우리에게서 받은 전통을 따르지 않는 모든 형제에게서[d] 멀리하라는 것입니다[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀδελφοί는 남성 복수 호격이며 회중 전체를 대표적으로 가리킨다.
    reason: cultural_note
  - marker: b
    text: 또는 「예수 그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: c
    text: 또는 「게으르게 행하며」. 헬라어 ἀτάκτως는 「질서를 벗어나」, 「규율 없이」, 정황상 「게으르게」의 의미를 함께 가질 수 있다.
    reason: lexical_alternative
  - marker: d
    text: 일부 사본은 「여러분이 받은」 또는 「그가 받은」으로 읽어 「모든 형제」 단수와의 일치를 매끄럽게 한다. SBLGNT 본문은 「그들이 받은」(παρελάβοσαν, 3인칭 복수)이다.
    reason: textual_variant
  - marker: e
    text: 또는 「물러서라」, 「가까이 어울리지 말라」. 헬라어 στέλλεσθαι는 친밀한 교제로부터 자신을 거리두는 의미이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παραγγέλλομεν
  english_pob_choice: we command
  chosen_korean: 명합니다
  alternatives_korean:
  - 지시합니다
  - 명령합니다
  lexicon: BDAG
  rationale: 사도적 권위의 명령. 「명합니다」가 격식과 무게를 동시에 담는다.
- source_word: ἐν ὀνόματι τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: in the name of our Lord Jesus Messiah
  chosen_korean: 우리 주 예수 메시아의 이름으로
  alternatives_korean:
  - 우리 주 예수 그리스도의 이름으로
  - 우리 주 예수 메시아의 권위로
  lexicon: BDAG
  rationale: ἐν ὀνόματι의 정형 표현 + 칭호 정책.
- source_word: στέλλεσθαι ὑμᾶς ἀπὸ
  english_pob_choice: to keep away from
  chosen_korean: 멀리하라는 것입니다
  alternatives_korean:
  - 거리두라는 것입니다
  - 물러서라는 것입니다
  lexicon: BDAG
  rationale: 중간태 στέλλομαι의 자기-거리두기를 「멀리하다」로 자연스럽게 옮긴다. 형식적 출교의 함의를 강요하지 않는다.
- source_word: παντὸς ἀδελφοῦ
  english_pob_choice: every brother
  chosen_korean: 모든 형제
  alternatives_korean:
  - 모든 형제자매
  - 모든 신자
  lexicon: BDAG
  rationale: 단수 남성 보존(성별 정확성). 「형제」는 회중 일원을 가리킨다.
- source_word: ἀτάκτως
  english_pob_choice: disorderly
  chosen_korean: 무질서하게
  alternatives_korean:
  - 게으르게
  - 규율 없이
  - 분수에 맞지 않게
  lexicon: BDAG
  rationale: ἀτάκτως의 넓은 의미(질서 벗어남)를 「무질서하게」로 보존한다. 정황적 「게으름」 함의는 각주.
- source_word: περιπατοῦντος
  english_pob_choice: who walks
  chosen_korean: 행하며
  alternatives_korean:
  - 걸으며
  - 살아가며
  lexicon: BDAG
  rationale: 바울의 「걷다 = 살아가다」 비유를 한국어 성경 전통의 「행하다」로 자연스럽게 옮긴다.
- source_word: μὴ κατὰ τὴν παράδοσιν
  english_pob_choice: and not according to the tradition
  chosen_korean: 전통을 따르지 않는
  alternatives_korean:
  - 가르침을 따르지 않는
  - 전수받은 것을 따르지 않는
  lexicon: BDAG
  rationale: 2:15와 어휘적 일관 — 「전통」을 유지.
- source_word: ἣν παρελάβοσαν παρ’ ἡμῶν
  english_pob_choice: that they received from us
  chosen_korean: 우리에게서 받은
  alternatives_korean:
  - 그들이 우리에게서 받은
  - 여러분이 우리에게서 받은
  lexicon: BDAG
  rationale: SBLGNT의 3인칭 복수 동사를 따른다. 한국어 흐름상 주어 「그들이」가 자연스럽게 함축된다. 사본 변형은 각주.
theological_decisions:
- issue: 거리두기 권면의 범위
  chosen_reading: 「멀리하라」 — 사회적 거리두기. 후대의 공식 출교 범주를 도입하지 않음
  alternative_readings:
  - 형식적 출교
  - 단순한 회피
  rationale: '본 절은 회중 내 무질서한 자에 대한 권징적 거리두기를 명하지만, 다음 절(15절: 「원수처럼 여기지 말고 형제처럼 권면하라」)이 그 교정적 성격을 분명히 한다. 후대의 사법적 범주를 본문에 도입하지 않는다.'
  doctrine_reference: 'Preserve theological tension'
- issue: Χριστοῦ 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 칭호 정책.
  doctrine_reference: 'Contested terms — Χριστός'
