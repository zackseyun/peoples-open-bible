lexical_decisions:
- source_word: ἐν ἑνὶ πνεύματι
  english_pob_choice: in one Spirit
  chosen_korean: 한 성령으로
  alternatives_korean:
  - 한 성령 안에서
  lexicon: BDAG
  rationale: 본문 ἐν은 영역과 수단의 의미를 함께 담는다. 「~으로」는 양쪽 의미를 모두 함축한다.
- source_word: εἰς ἓν σῶμα ἐβαπτίσθημεν
  english_pob_choice: baptized into one body
  chosen_korean: 한 몸 안으로 세례를 받았다
  lexicon: BDAG
  rationale: 본문의 「하나로의 합쳐짐」을 보존하는 표현.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_korean: 노예
  alternatives_korean:
  - 종
  lexicon: BDAG
  rationale: 「자유인(ἐλεύθεροι)」과의 대비를 위해 매임의 무게를 살리는 「노예」를 사용. DOCTRINE.md §1.
theological_decisions:
- issue: 12:13 한 성령으로 한 몸 안으로 세례 — 회중의 본질적 일치 보존
  chosen_reading: 인종·신분의 차이를 가로지르는 회중적 일치 주장
  alternative_readings:
  - 개인적 회심 진술
  rationale: 본문은 회중 전체가 인종(유대인/그리스인)·사회 신분(노예/자유인)을 가로질러 한 몸을 이룬다는 강한 일치를 선언한다. 한국어 본문에서 이 무게를 평탄화하지 않기 위해 「노예」를 사용한다.
  doctrine_reference: 'DOCTRINE.md §1: bonded-status language; preserve unity claim'
