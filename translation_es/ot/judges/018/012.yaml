  glossary_alignment: No hay conflicto con la terminología teológica principal del proyecto. La transliteración del topónimo «Mahané-dan» es aceptable como nombre propio con nota léxica. «Judá» y «Quiriat-jearim» son adecuados. El único ajuste léxico relevante es preferir «he aquí» para הִנֵּה en este contexto narrativo.
