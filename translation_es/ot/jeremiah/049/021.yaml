translation:
  language: es
  text: Al sonido de su caída tiembla la tierra; su clamor se oye en el mar de Juncos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mar de Juncos» refleja más de cerca el hebreo יַם־סוּף; la traducción tradicional «mar Rojo» también es posible.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקּוֹל
  english_pob_choice: At the sound of
  chosen_spanish: Al sonido de
  alternatives_spanish:
  - Por el sonido de
  - A causa del sonido de
  lexicon: HALOT
  rationale: La preposición מִן con קוֹל puede expresar origen u ocasión. En español, «Al sonido de» comunica de manera natural el valor ocasional sin volver la frase forzada.
- source_word: נִפְלָם
  english_pob_choice: their fall
  chosen_spanish: su caída
  alternatives_spanish:
  - su derrumbe
  - su caída y ruina
  lexicon: HALOT
  rationale: El sustantivo remite a la caída/desplome. «Su caída» conserva la metáfora breve y directa del juicio sin añadir interpretación extra.
- source_word: רָעֲשָׁה
  english_pob_choice: quakes
  chosen_spanish: tiembla
  alternatives_spanish:
  - se estremece
  - se sacude
  lexicon: HALOT
  rationale: רעשׁ denota sacudir o hacer temblar. «Tiembla» es natural en español y mantiene la imagen de conmoción de la tierra.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: Aunque אֶרֶץ puede significar «tierra» o «país», aquí el paralelismo de juicio cósmico favorece «la tierra».
- source_word: צְעָקָה
  english_pob_choice: their cry
  chosen_spanish: su clamor
  alternatives_spanish:
  - su grito
  - el clamor
  lexicon: HALOT
  rationale: צעקה es un clamor/grito de dolor o alarma. «Su clamor» conserva la fuerza del vocablo y evita una repetición pesada en español.
- source_word: בְּיַם סוּף
  english_pob_choice: at the Red Sea
  chosen_spanish: en el mar de Juncos
  alternatives_spanish:
  - en el mar Rojo
  - junto al mar de Juncos
  lexicon: HALOT
  rationale: יַם־סוּף significa literalmente «mar de Juncos». Se mantiene esa transparencia en el texto principal; la forma tradicional «mar Rojo» queda recogida en la nota.
- source_word: נִשְׁמַע
  english_pob_choice: is heard
  chosen_spanish: se oye
  alternatives_spanish:
  - es oído
  - se escucha
  lexicon: HALOT
  rationale: El nifal de שׁמע se expresa naturalmente como pasivo/reflexivo en español. «Se oye» comunica la audibilidad a distancia con fluidez.
- source_word: קוֹלָהּ
  english_pob_choice: their cry
  chosen_spanish: su clamor
  alternatives_spanish:
  - su voz
  - su grito
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a צְעָקָה («clamor»). En español, «su clamor» permite mantener el antecedente sin una repetición torpe de «clamor» o «voz».
translation_notes:
  revision_awareness: Se revisó el giro causal/ocasional de מִן con קוֹל, el paralelismo de juicio con la tierra que tiembla, y la referencia de יַם־סוּף. La formulación española conserva el tono poético breve del hebreo sin añadir contenido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió «mar de Juncos» en el cuerpo del texto para reflejar el hebreo, con nota para la opción tradicional «mar Rojo».
  - «Clamor» se usó para צְעָקָה por su fuerza colectiva y lamentativa, en lugar de un simple «grito».
