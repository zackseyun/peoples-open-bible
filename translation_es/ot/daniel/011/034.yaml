review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: circunstancia temporal (''cuando tropiecen''), ayuda limitada, adhesión de muchos, y el matiz de habla halagadora/engañosa. Sin embargo, dos formulaciones españolas no preservan fielmente la naturalidad ni la mejor equivalencia idiomática: ''una ayuda poca'' es antinatural en español, y ''se les unirán'' es menos claro y menos fiel que ''se unirán a ellos'' para עֲלֵיהֶם.'
  spanish_quality_summary: La lectura general es comprensible, pero 'una ayuda poca' suena forzada y poco idiomática en español moderno; 'poca ayuda' o 'una pequeña ayuda' sería claramente mejor. 'Palabras suaves' es aceptable aunque algo ambiguo; funciona bien con la nota. 'Y cuando' no es incorrecto, pero el 'Y' inicial puede omitirse para un español más limpio si no se requiere enlazar explícitamente con el versículo anterior.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías/Cristo, espíritu, etc. Las decisiones léxicas principales siguen adecuadamente el expediente inglés, salvo la necesidad de mejorar la formulación española de עֵזֶר מְעָט y de וְנִלְווּ עֲלֵיהֶם para mayor fidelidad idiomática.
  issues:
  - severity: medium
    issue: '''una ayuda poca'' es una construcción poco natural en español.'
    rationale: Aunque intenta reflejar de cerca la estructura hebrea, en español moderno y digno la expresión idiomática es 'poca ayuda' o 'una pequeña ayuda'. La forma actual distrae y reduce la legibilidad sin ganar precisión.
  - severity: medium
    issue: '''muchos se les unirán'' es menos claro que ''muchos se unirán a ellos''.'
    rationale: El hebreo עֲלֵיהֶם expresa dirección/adhesión hacia ellos. En español, 'se unirán a ellos' reproduce mejor esa relación; 'se les unirán' puede sonar datival y algo enrevesado.
  - severity: low
    issue: El 'Y' inicial puede sonar innecesario en español aislado.
    rationale: No es erróneo, pero 'Cuando tropiecen...' fluye mejor. Si se desea mantener la conexión discursiva, también podría conservarse.
  revised_spanish_text: Cuando tropiecen[a], recibirán poca ayuda, y muchos se unirán a ellos con palabras suaves.
  revised_footnotes:
