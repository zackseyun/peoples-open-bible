translation:
  language: es
  text: Porque el cetro de la maldad[a] no reposará sobre la suerte[b] de los justos, para que los justos no extiendan sus manos al mal[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «de los impíos». La construcción hebrea puede referirse a la maldad como cualidad o a los malvados como quienes empuñan el cetro.
    reason: lexical_alternative
  - marker: b
    text: '«Suerte» también puede significar «porción» o «herencia»: la parte asignada a los justos.'
    reason: lexical_alternative
  - marker: c
    text: O, «extiendan sus manos a la injusticia/iniquidad». El hebreo expresa la idea de involucrarse en el mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Introduce la base o explicación de la afirmación anterior. En español, «Porque» conserva bien el valor causal/discursivo de כִּי sin forzar un calco.
- source_word: יָנוּחַ
  english_pob_choice: will not rest
  chosen_spanish: no reposará
  alternatives_spanish:
  - no permanecerá
  - no se asentará
  - no descansará
  lexicon: HALOT
  rationale: El verbo puede expresar reposar, quedarse o asentarse. «No reposará» conserva la imagen concreta de un dominio opresivo que no se establece de forma permanente.
- source_word: שֵׁבֶט
  english_pob_choice: scepter
  chosen_spanish: cetro
  alternatives_spanish:
  - vara
  - bastón
  lexicon: HALOT
  rationale: En contexto de gobierno y dominio, «cetro» capta mejor el símbolo de autoridad que una mera vara o bastón.
- source_word: הָרֶשַׁע
  english_pob_choice: of wickedness
  chosen_spanish: de la maldad
  alternatives_spanish:
  - del malvado
  - de los impíos
  - de la impiedad
  lexicon: HALOT
  rationale: El sustantivo abstracto permite leer la expresión como cualidad/realidad de maldad, conforme al sentido que el POB inglés preserva. «De los impíos» es una alternativa viable si se entiende el genitivo como agente.
- source_word: גּוֹרַל
  english_pob_choice: lot
  chosen_spanish: suerte
  alternatives_spanish:
  - lote
  - porción
  - herencia
  lexicon: HALOT
  rationale: Aquí «suerte» comunica el reparto asignado. Dado el paralelo con «lot» como porción o herencia, esta opción es natural en español y mantiene la idea de lo adjudicado a los justos.
- source_word: הַצַּדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los íntegros
  - los justos
  lexicon: HALOT
  rationale: «Los justos» es el equivalente usual y claro para el plural sustantivado, conservando el sentido moral-covenantal sin sobreespecificarlo.
- source_word: לְמַעַן לֹא
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - no sea que
  lexicon: HALOT
  rationale: En español, la finalidad preventiva queda bien expresada con «para que no». Mantiene la relación de propósito/prevención del hebreo y el matiz de «lest» del inglés.
- source_word: יִשְׁלְחוּ ... יְדֵיהֶם
  english_pob_choice: stretch out their hands
  chosen_spanish: extiendan sus manos
  alternatives_spanish:
  - alarguen sus manos
  - tiendan sus manos
  - echen mano
  lexicon: HALOT
  rationale: La imagen idiomática de extender las manos se conserva de modo directo y natural en español, sin perder su fuerza figurada.
- source_word: בְּעַוְלָתָה
  english_pob_choice: to wrongdoing
  chosen_spanish: a la iniquidad
  alternatives_spanish:
  - a la injusticia
  - al mal
  - a la maldad
  lexicon: HALOT
  rationale: עַוְלָה puede referirse a injusticia, iniquidad o maldad. «Iniquidad» mantiene el peso ético-jurídico y refleja bien la advertencia final del versículo.
theological_decisions:
- issue: Duración del dominio inicuo sobre los justos
  english_pob_reading: The verse speaks of the non-permanence of wicked dominion over the righteous, not an absolute denial that the righteous ever suffer under wicked rule.
  chosen_spanish_reading: El versículo afirma que el dominio inicuo no permanecerá sobre la porción de los justos, sin negar que por un tiempo puedan sufrir opresión.
  alternative_spanish_readings:
  - El versículo niega que los malvados tengan autoridad alguna sobre los justos.
  - El versículo promete que los justos nunca estarán bajo dominio perverso.
  rationale: '«No reposará» evita absolutizar la promesa. La cláusula final muestra el propósito: impedir que los justos sean llevados a hacer mal. Así se preserva la tensión teológica del texto sin convertirlo en una promesa de ausencia total de aflicción.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se revisó el encaje entre el hebreo y el audit trail inglés; no se requirieron cambios respecto del sentido principal. Se mantuvo la tensión entre genitivo abstracto/agencial en הָרֶשַׁע y el valor idiomático de «extender las manos» como participación en el mal.
  spanish_consistency_notes:
  - Se conservó «Yahvé» en los proyectos terminológicos generales, pero este versículo no lo requiere.
  - Se usó «justos» para הַצַּדִּיקִים, en concordancia con la terminología POB en español.
  - «Iniquidad» se empleó para mantener el matiz ético-jurídico de עַוְלָה sin suavizarlo.
  - Las notas a, b y c están ancladas en el texto y preservan alternativas léxicas relevantes.
