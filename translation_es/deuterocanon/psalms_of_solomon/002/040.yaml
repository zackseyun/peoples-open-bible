review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la mayor parte del griego: χρηστός = ''bondadoso'', ἐπικαλουμένοις = ''invocan'', ἐν ὑπομονῇ = ''con perseverancia'', y διὰ παντὸς ἐνώπιον αὐτοῦ = ''continuamente delante de él''. Sin embargo, la sintaxis infinitival quedó demasiado literal y genera ambigüedad en español: ''para obrar... para estar...'' puede sonar a finalidad de los invocadores, no a la acción benévola del Señor hacia sus piadosos. Además, παρεστᾶναι se preserva mejor con la imagen de ''estar en pie'' o ''permanecer'', no simplemente ''estar''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la secuencia 'para obrar... para estar...' resulta poco natural y semánticamente borrosa. 'Para con' es aceptable pero algo rígido; una solución más clara es reformular con cláusula finita y resultado. 'Sus piadosos' es correcto y valioso en este libro. El texto necesita una reparación menor de fluidez y precisión imagética.
  glossary_alignment: No hay conflicto con las pautas principales. 'Señor' para κύριος es adecuado aquí porque el texto griego dice κύριος, no el Tetragrámaton hebreo directo. La decisión contextual de ὁσίοις como 'piadosos' está bien justificada por el dossier del libro y debe mantenerse, con nota alternativa 'sus fieles'.
  issues:
  - severity: medium
    issue: 'Sintaxis infinitival demasiado calcada: ''para obrar... para estar...'''
    rationale: Aunque el griego usa infinitivos comprimidos, en español esta reproducción directa oscurece quién obra y quién está delante de él. El rastro teológico inglés mismo reconoce la necesidad de desempaquetar la sintaxis para claridad.
  - severity: medium
    issue: '''estar continuamente delante de él'' debilita la imagen de παρεστᾶναι'
    rationale: El verbo connota presencia estable/estar en pie ante Dios. 'Permanecer continuamente delante de él' o 'estar continuamente en pie delante de él' conserva mejor la fuerza del original sin sonar forzado.
  - severity: low
    issue: La nota alternativa de perseverancia no refleja exactamente el dossier inglés
    rationale: El inglés documenta principalmente 'con paciencia' como alternativa. 'Con constancia' no es erróneo, pero conviene alinear la nota española con las alternativas realmente auditadas, salvo necesidad especial.
  revised_spanish_text: Porque el Señor es bondadoso con los que lo invocan con perseverancia[a]; él obra conforme a su misericordia para con sus piadosos[b], para que permanezcan continuamente delante de él en fortaleza.
  revised_footnotes:
  - marker: a
    text: O 'con paciencia'.
    reason: lexical_alternative
  - marker: b
    text: O 'sus fieles'.
    reason: lexical_alternative
  revision_rationale: 'Se desempaquetó la sintaxis comprimida del griego para producir un español claro y fiel al sentido documentado en el expediente inglés: la bondad del Señor se expresa en que actúa misericordiosamente hacia sus piadosos, con el resultado de que ellos permanezcan delante de él. Se mantuvo ''sus piadosos'' por la justificación contextual de ὅσιοι en los Salmos de Salomón. También se sustituyó ''estar'' por ''permanezcan'' para reflejar mejor la idea de presencia estable ante Dios.'
