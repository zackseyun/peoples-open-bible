    rationale: En español, 'impedir' con pronombre átono plural aquí resulta extraño y ambiguo; además no refleja bien el objeto singular implícito del contexto narrativo y del English POB ('him').
  - severity: low
    issue: Puntuación algo cargada en 'Pero, con amenazas, Apolonio iba al templo'
    rationale: Las comas no son incorrectas, pero 'Pero con amenazas Apolonio iba al templo' o 'Pero Apolonio iba al templo con amenazas' fluye mejor en español bíblico moderno.
