translation:
  language: es
  text: El hombre entendido confiará en la ley[a], y la ley le es digna de confianza como una pregunta de los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como una respuesta de los justos». El término griego puede referirse tanto a la pregunta como a la respuesta obtenida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  english_pob_choice: A man
  chosen_spanish: El hombre
  alternatives_spanish:
  - La persona
  - El ser humano
  lexicon: LSJ
  rationale: ἄνθρωπος introduce aquí un sujeto representativo y proverbial. En español, «el hombre» conserva mejor ese tono sentencioso que una formulación más abstracta, sin perder el valor genérico del griego.
- source_word: συνετός
  english_pob_choice: of understanding
  chosen_spanish: entendido
  alternatives_spanish:
  - prudente
  - discerninge
  - inteligente
  lexicon: LSJ
  rationale: συνετός expresa a alguien con comprensión o discernimiento. «Entendido» es breve, natural y adecuado al registro sapiencial; evita reducir el sentido a simple cautela o capacidad intelectual.
- source_word: ἐμπιστεύσει
  english_pob_choice: will trust in
  chosen_spanish: confiará en
  alternatives_spanish:
  - pondrá su confianza en
  - se apoyará en
  lexicon: LSJ
  rationale: El futuro transmite la confianza sostenida del dicho. «Confiará en» es idiomático en español y conserva la fuerza de dependencia confiada del verbo griego.
- source_word: νόμῳ / ὁ νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la instrucción
  lexicon: LSJ
  rationale: En Sirácida, νόμος apunta normalmente a la ley divina de Israel. «La ley» preserva el sentido sin imponer una mayúscula interpretativa que el griego no marca; «la instrucción» sería posible, pero debilita el referente legal-covenantal.
- source_word: πιστός
  english_pob_choice: trustworthy
  chosen_spanish: confiable
  alternatives_spanish:
  - fiel
  - digna de confianza
  lexicon: LSJ
  rationale: 'πιστός describe algo digno de confianza. «Confiable» reproduce bien la reciprocidad del dicho: el hombre confía en la ley, y la ley resulta confiable para él.'
- source_word: ἐρώτημα
  english_pob_choice: inquiry
  chosen_spanish: consulta
  alternatives_spanish:
  - pregunta
  - interrogación
  - respuesta
  lexicon: LSJ
  rationale: El término puede referirse al acto de consultar o a la respuesta obtenida. Dado el contexto comparativo y la decisión del inglés revisado, «consulta» conserva la ambigüedad útil entre preguntar y recibir respuesta, sin cerrar prematuramente el sentido.
- source_word: δικαίων
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos
  lexicon: LSJ
  rationale: δικαίων es genitivo plural. «De los justos» mantiene el valor moral y bíblico del término en español, con un plural natural y reconocible en el registro sapiencial.
theological_decisions:
- issue: Sentido de νόμος en contexto sapiencial judío
  english_pob_reading: the divine law/Torah in wisdom context
  chosen_spanish_reading: la ley divina/Torá en contexto sapiencial
  alternative_spanish_readings:
  - la ley en sentido moral general
  - la Ley como título formal
  rationale: El español «la ley» permite oír la Torá sin sobredeterminarla. Se evita «la Ley» con mayúscula como título obligatorio, porque el griego no lo exige; a la vez, no se banaliza como mera norma ética general.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; consistency of key terms'
- issue: Relación entre confianza humana y fiabilidad de la ley
  english_pob_reading: the law is trustworthy to him
  chosen_spanish_reading: la ley será confiable para él
  alternative_spanish_readings:
  - la ley es confiable para él
  - la ley le será fiel
  rationale: El futuro español sigue el valor prospectivo del griego y mantiene la reciprocidad del paralelismo. «Confiable» evita cargar innecesariamente el enunciado con una personificación fuerte que el texto no exige.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Alcance de ἐρώτημα δικαίων
  english_pob_reading: like an inquiry of the righteous
  chosen_spanish_reading: como una consulta de los justos
  alternative_spanish_readings:
  - como una respuesta de los justos
  - como un oráculo de los justos
  rationale: 'Se conserva la tensión léxica del griego: ἐρώτημα puede ser la consulta o la respuesta obtenida. «Consulta» es suficientemente abierto y evita resolver indebidamente si la comparación apunta al preguntar o al responder.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final del inglés POB: mantiene «trustworthy / inquiry» como orientación principal y evita la lectura más interpretativa «oracle». Se tomó la decisión de usar «consulta» para reflejar ἐρώτημα sin cerrar la ambigüedad, preservando así la tensión léxica documentada en el expediente.'
  spanish_consistency_notes:
  - Se mantuvo «ley» para νόμος en vez de «instrucción», por consistencia con el uso jurídico-covenantal del término en Sirácida.
  - Se evitó «Cristo», «Señor» u այլ terminología no presente en el versículo.
  - El tono es sapiencial y proverbial, con sintaxis breve y paralela, acorde al griego.
