  rationale: Se revisa principalmente la frase de movimiento para reflejar mejor עברים שמה en español claro y fiel. También se pule la apertura a «Y este es» para mayor naturalidad con «mandamiento». Se mantienen «Yahvé», «mandamiento», «estatutos» y «juicios» conforme al proyecto y al análisis léxico. La nota de movimiento se ajusta al nuevo texto; no se requiere adjudicación adicional.
