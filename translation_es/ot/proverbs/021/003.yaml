revisions:
- from: Practicar la justicia y el derecho es más aceptable para Yahvé que el sacrificio[a].
  to: Obrar con rectitud y justicia es más aceptable para Yahvé que el sacrificio[a].
  rationale: Se revisa para preservar mejor la distinción semántica hebrea entre צְדָקָה y מִשְׁפָּט mediante 'rectitud y justicia', en línea con la justificación del English POB. También se sustituye 'practicar' por 'obrar con', que suena más natural en español bíblico moderno y evita añadir un matiz aspectual no explícito en el hebreo. Se conserva 'Yahvé', 'más aceptable' y la nota lexical sobre נבחר porque están bien fundamentados.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:18:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura comparativa del hebreo y preserva correctamente יהוה como 'Yahvé'. Sin embargo, no mantiene adecuadamente la distinción fuente entre צְדָקָה y מִשְׁפָּט. El hebreo presenta dos conceptos coordinados, y el English POB justificó 'righteousness and justice' precisamente para no colapsarlos. En español, 'justicia y derecho' es posible, pero aquí suena más jurídico que sapiencial y desplaza צְדָקָה desde rectitud ética hacia justicia. También 'Practicar' introduce un matiz aspectual de habitualidad no exigido por עֲשֹׂה; 'Hacer' o 'Obrar' refleja mejor el infinitivo sustantivado.
  spanish_quality_summary: La frase es legible y digna, pero 'Practicar la justicia y el derecho' suena algo técnica y menos natural en registro bíblico general. 'Hacer rectitud y justicia' sería demasiado literal, pero 'Obrar con rectitud y justicia' o 'Hacer lo recto y lo justo' mejora la naturalidad. Dado que el proyecto busca no parafrasear de más y preservar la distinción léxica, una formulación breve como 'Hacer rectitud y justicia' sería menos idiomática, mientras que 'Obrar con rectitud y justicia' comunica bien el sentido sapiencial en español moderno y mantiene la diferencia semántica.
  glossary_alignment: Alinea correctamente 'Yahvé' para יהוה. La decisión sobre נבחר como 'más aceptable' concuerda con el rastro auditado y la nota alternativa está bien orientada. La principal desalineación está en צְדָקָה, donde el proyecto pide preservar la distinción con מִשְׁפָּט; aquí conviene 'rectitud' para צדקה y 'justicia' para משפט.
  issues:
  - severity: medium
    issue: צְדָקָה se tradujo como 'justicia'
    rationale: Esto debilita la distinción léxica con מִשְׁפָּט, que también pertenece al campo de justicia. El English POB documentó explícitamente la necesidad de mantener la pareja diferenciada.
  - severity: medium
    issue: וּמִשְׁפָּט se tradujo como 'el derecho'
    rationale: '''Derecho'' en español contemporáneo tiende a sonar jurídico-institucional. En este proverbio sapiencial, ''justicia'' comunica mejor el valor ético de juicio justo.'
  - severity: low
    issue: עֲשֹׂה se tradujo como 'Practicar'
    rationale: '''Practicar'' añade habitualidad o disciplina, un matiz interpretativo no requerido por el infinitivo hebreo. ''Obrar'' o ''hacer'' son más cercanos y naturales.'
  - severity: low
    issue: La preposición 'para Yahvé' puede sonar menos natural
    rationale: Aunque es defendible, con 'más aceptable' el español fluye mejor con 'para Yahvé' o 'ante Yahvé'; no es error grave. Se puede mantener si la frase general mejora.
  revised_spanish_text: Obrar con rectitud y justicia es más aceptable para Yahvé que el sacrificio[a].
  revised_footnotes:
  - marker: a
    text: O 'es preferido por Yahvé'; el hebreo literalmente dice 'es elegido para/por Yahvé', expresando preferencia o aceptabilidad divina.
    reason: lexical_alternative
  revision_rationale: Se revisa para preservar mejor la distinción semántica hebrea entre צְדָקָה y מִשְׁפָּט mediante 'rectitud y justicia', en línea con la justificación del English POB. También se sustituye 'practicar' por 'obrar con', que suena más natural en español bíblico moderno y evita añadir un matiz aspectual no explícito en el hebreo. Se conserva 'Yahvé', 'más aceptable' y la nota lexical sobre נבחר porque están bien fundamentados.
