translation:
  language: es
  text: Se llevó a sus hijos y a sus hijas[a], a quienes habían engendrado en profanación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en contaminación». El sustantivo griego puede denotar profanación o contaminación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγαγεν
  english_pob_choice: led away
  chosen_spanish: se llevó
  alternatives_spanish:
  - los condujo
  - los llevó lejos
  - los arrancó
  lexicon: LSJ
  rationale: El aoristo de ἀπάγω expresa remoción o traslado. En español, «se llevó» comunica esa acción de hacerlos salir o apartarlos sin añadir más violencia que la que el contexto permita.
- source_word: τοὺς υἱοὺς
  english_pob_choice: sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos e hijas
  lexicon: LSJ
  rationale: El griego dice literalmente «los hijos varones», pero en español «hijos» puede funcionar de manera natural y no obliga a una expresión pesada. Se mantiene la referencia masculina mediante la pareja con «hijas».
- source_word: τὰς θυγατέρας
  english_pob_choice: daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - sus niñas
  - sus descendientes femeninas
  lexicon: LSJ
  rationale: El término griego nombra explícitamente a las hijas; por eso se conserva esa correspondencia directa.
- source_word: ἃ
  english_pob_choice: whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - que
  lexicon: LSJ
  rationale: Aunque el relativo griego es neutro plural, aquí retoma personas. «A quienes» mantiene el referente personal y la relación sintáctica con el antecedente.
- source_word: ἐγέννησαν
  english_pob_choice: had begotten
  chosen_spanish: habían engendrado
  alternatives_spanish:
  - habían dado a luz
  - habían tenido
  - habían procreado
  lexicon: LSJ
  rationale: γεννάω admite el sentido de engendrar o dar a luz. «Habían engendrado» conserva la fuerza genealógica y evita restringir el acto a una sola perspectiva biológica.
- source_word: ἐν βεβηλώσει
  english_pob_choice: in defilement
  chosen_spanish: en profanación
  alternatives_spanish:
  - en defilement
  - en impureza
  - en contaminación
  lexicon: LSJ
  rationale: βεβήλωσις puede significar profanación o deshonra de lo sagrado. Se prefiere «profanación» porque refleja bien la carga religiosa del término en un registro natural para el español bíblico.
theological_decisions:
- issue: Carga moral-religiosa de ἐν βεβηλώσει
  english_pob_reading: The phrase is rendered 'in defilement' to preserve the text's judgment that these births were associated with profanation or impurity.
  chosen_spanish_reading: La frase se vierte «en profanación» para conservar el juicio moral y religioso del texto sobre esos nacimientos.
  alternative_spanish_readings:
  - en impureza
  - en defilement
  - en contaminación
  rationale: El verso no describe solo un dato biológico; emite una valoración negativa. «Profanación» preserva esa tensión y sigue siendo comprensible en español.
  doctrine_reference: Pureza/impureza ritual y profanación de lo sagrado
translation_notes:
  revision_awareness: La comparación con el audit trail inglés muestra alta concordancia y ningún cambio pendiente; por ello se mantiene la estructura breve del verso y solo se ajusta la equivalencia léxica al español con atención al matiz de βεβήλωσις.
  spanish_consistency_notes:
  - Se conserva la duplicación «sus hijos y sus hijas» para reflejar el paralelismo del griego.
  - «Se llevó» reproduce el valor de remoción de ἀπήγαγεν sin precisar más de lo que dice el texto.
  - La nota textual preserva la alternativa semántica de βεβήλωσις, pero en español se privilegia «profanación» como término más idiomático y teológicamente cargado.
  - Se evita suavizar el juicio moral del pasaje; «profanación» mantiene el tono evaluativo del original.
