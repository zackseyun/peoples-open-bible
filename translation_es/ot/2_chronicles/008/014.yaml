    text: Or 'David his ancestor'; 'father' here reflects common royal/genealogical Hebrew usage for a forefather.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'according to the matter of a day on its day,' that is, according to each day's prescribed requirement.
    reason: lexical_alternative
