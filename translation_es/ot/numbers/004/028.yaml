translation:
  language: es
  text: Este es el servicio de las familias de los hijos de los gersonitas en la tienda de reunión, y su cargo[a] estará bajo la supervisión[b] de Itamar hijo de Aarón el sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su deber»; el hebreo puede denotar una responsabilidad, encargo u obligación asignada.
    reason: lexical_alternative
  - marker: b
    text: Lit. «bajo la mano de»; modismo hebreo que significa bajo su supervisión o autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esta
  lexicon: HALOT
  rationale: La forma demostrativa introduce una declaración identificadora. «Esta es» reproduce con naturalidad el valor deíctico e identificador del hebreo sin perder precisión.
- source_word: עֲבֹדַת
  english_pob_choice: the service
  chosen_spanish: la labor
  alternatives_spanish:
  - el servicio
  - la obra
  lexicon: HALOT
  rationale: En este contexto levítico, el término designa una tarea asignada. «Labor» conserva la idea de cometido concreto sin cargarla de matiz eclesiástico; «servicio» también sería posible, pero puede sonar más general.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: the families
  chosen_spanish: las familias
  alternatives_spanish:
  - los clanes
  lexicon: HALOT
  rationale: «Familias» refleja de manera directa el hebreo y es suficientemente claro en el contexto tribal. «Clanes» es una alternativa válida, pero algo más técnica.
- source_word: בְּנֵי הַגֵּרְשֻׁנִּי
  english_pob_choice: of the families of the sons of the Gershonites
  chosen_spanish: de las familias de los hijos de los gersonitas
  alternatives_spanish:
  - de las familias de los gersonitas
  - de las familias de los descendientes de Gersón
  lexicon: HALOT
  rationale: Se conserva la construcción hebrea «hijos de» para mantener la estructura genealógica del original. «Gersonitas» comunica el grupo familiar de forma natural en español; no se simplifica a una sola etiqueta si eso ocultara la forma del texto.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  lexicon: HALOT
  rationale: «Tienda de reunión» sigue de cerca el hebreo y evita introducir el término interpretativo «tabernáculo» como sustituto obligatorio. La preposición «en» mantiene el alcance de la esfera de servicio.
- source_word: וּמִשְׁמַרְתָּם
  english_pob_choice: and their duty
  chosen_spanish: y su cargo
  alternatives_spanish:
  - y su deber
  - y su responsabilidad
  - y su guardia
  lexicon: HALOT
  rationale: El término puede denotar responsabilidad asignada o encargo. «Cargo» conserva bien la idea administrativa de una función encomendada; la nota preserva la alternativa semántica de «encargo/obligación».
- source_word: בְּיַד
  english_pob_choice: under the hand of
  chosen_spanish: bajo la mano
  alternatives_spanish:
  - bajo la supervisión de
  - bajo la autoridad de
  - a cargo de
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática hebrea «bajo la mano» porque el inglés POB la preserva y el hebreo la usa literalmente. En español, el giro necesita nota para aclarar que significa supervisión o autoridad.
- source_word: אִיתָמָר בֶּן אַהֲרֹן הַכֹּהֵן
  english_pob_choice: Ithamar son of Aaron the priest
  chosen_spanish: Itamar hijo de Aarón el sacerdote
  alternatives_spanish:
  - Itamar, hijo de Aarón, el sacerdote
  lexicon: HALOT
  rationale: Se conserva el nombre propio y la filiación sacerdotal sin añadir elementos. La apposición final «el sacerdote» corresponde al hebreo y mantiene la identificación del linaje sacerdotal.
theological_decisions:
- issue: Valor de la expresión de cargo asignado en contexto levítico
  english_pob_reading: their duty
  chosen_spanish_reading: su cargo
  alternative_spanish_readings:
  - su deber
  - su responsabilidad
  - su encargo
  rationale: No se lee como ministerio en sentido eclesiástico, sino como una función concreta asignada al grupo levítico. «Cargo» conserva el sentido de responsabilidad oficial y ordenada.
  doctrine_reference: Números 3–4; servicio levítico asignado
- issue: Mantenimiento del modismo hebreo «bajo la mano de»
  english_pob_reading: under the hand of
  chosen_spanish_reading: bajo la mano
  alternative_spanish_readings:
  - bajo la supervisión de
  - bajo la autoridad de
  - a cargo de
  rationale: El texto subraya subordinación administrativa. Se preserva el modismo en la línea del texto fuente y se aclara con nota para evitar ambigüedad en español.
  doctrine_reference: Estructura de supervisión sacerdotal en el Pentateuco
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una corrección menor que ajustó «the Gershonite» a «the Gershonites» para reflejar mejor el plural del linaje. La redacción española ya refleja ese plural con «los gersonitas» y conserva la estructura genealógica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferida del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Tienda de reunión» se usa de manera consistente para אֹהֶל מוֹעֵד, evitando alternar innecesariamente con «tabernáculo» salvo justificación contextual.
  - 'Se conservan los nombres propios bíblicos en forma española habitual: Itamar, Aarón.'
  - «Cargo» se usa aquí con el valor de encargo oficial; en contextos distintos podría requerirse «deber» o «responsabilidad» según el matiz del hebreo.
