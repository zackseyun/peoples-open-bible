review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis y el sentido básico del hebreo: una porción inicial de la masa debe ser levantada como תרומה, en comparación con la תרומה de la era. Sin embargo, dos decisiones se desvían del rastro léxico auditado: «primicias» introduce una asociación más técnica con productos agrícolas cosechados que el inglés POB evitó explícitamente en este contexto de masa preparada, y «ofrenda» debilita la especificidad de תְּרוּמָה como contribución apartada. El resto de la estructura comparativa y el valor de «levantaréis» están bien preservados.'
  spanish_quality_summary: 'El español es claro y digno, pero «torta» en español latinoamericano suele sugerir pastel o preparación específica, creando ambigüedad innecesaria. «Pan» o «hogaza» serían más naturales; aquí «pan» funciona mejor por simplicidad. También conviene evitar «primicias» para no sobreteologizar el sustantivo en un contexto de masa. Una formulación más natural y fiel sería: «De la primera parte de vuestra masa, levantaréis un pan como contribución; como la contribución de la era, así la levantaréis».'
  glossary_alignment: 'No hay términos del glosario mayor directamente implicados. Aun así, el proyecto favorece precisión léxica: תְּרוּמָה se alinea mejor con «contribución» que con «ofrenda», conforme al inglés POB y su nota. «Levantaréis» preserva correctamente la relación verbal con תרומה. «Era» para גֹּרֶן es apropiado.'
  issues:
  - severity: medium
    issue: «primicias» para רֵאשִׁית
    rationale: El audit trail inglés evitó «firstfruits/primicias» porque el contexto no trata de cosecha sino de una porción de masa ya preparada. «Primicias» en español carga un matiz técnico-cultual que puede desviar el sentido partitivo simple.
  - severity: medium
    issue: «ofrenda» para תְּרוּמָה
    rationale: Aunque no es falsa, «ofrenda» es más general. El inglés POB documentó «contribution» precisamente para conservar la idea de una porción apartada y presentada, evitando un término cultual demasiado amplio.
  - severity: medium
    issue: «torta» para חַלָּה
    rationale: En español contemporáneo amplio, especialmente latinoamericano, «torta» puede entenderse como pastel o alimento distinto del pan simple. Eso introduce ruido semántico que el texto no requiere. «Pan» evita esa ambigüedad.
  revised_spanish_text: De la primera parte[a] de vuestra masa, levantaréis un pan como contribución[b]; como la contribución de la era, así la levantaréis.
