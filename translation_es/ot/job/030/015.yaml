translation:
  language: es
  text: Los terrores se vuelven contra mí; persiguen mi nobleza[a] como el viento, y mi salvación pasa como una nube[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi prosperidad» o «mi honor». El hebreo puede referirse a una condición elevada u honorable.
    reason: lexical_alternative
  - marker: b
    text: O «mi liberación» o «mi bienestar». El hebreo puede denotar rescate o bienestar, además de «salvación».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָהְפַּךְ
  english_pob_choice: are turned
  chosen_spanish: son puestos
  alternatives_spanish:
  - son vueltas
  - son trastornadas
  - se vuelven
  lexicon: HALOT
  rationale: 'El Hophal expresa pasividad/resultatividad: algo es puesto o invertido sobre Job. «Son puestos» conserva esa pasividad en español sin forzar un giro más interpretativo.'
- source_word: בַּלָּהוֹת
  english_pob_choice: terrors
  chosen_spanish: Terrores
  alternatives_spanish:
  - horrendos espantos
  - horrores
  - espantos
  lexicon: HALOT
  rationale: El sustantivo denota terrores o espantos súbitos. «Terrores» es directo, natural y preserva el peso emotivo del hebreo.
- source_word: תִּרְדֹּף
  english_pob_choice: they pursue
  chosen_spanish: me persiguen
  alternatives_spanish:
  - persigue
  - me acosan
  - me siguen
  lexicon: HALOT
  rationale: Aunque la forma verbal es singular femenino, el sujeto previo funciona colectivamente; en español se expresa con plural para conservar el sentido natural del contexto poético.
- source_word: כָּרוּחַ
  english_pob_choice: like the wind
  chosen_spanish: como el viento
  alternatives_spanish:
  - como un soplo
  - como aire
  - como el hálito
  lexicon: HALOT
  rationale: Aquí רוּחַ se entiende mejor como «viento», no como «espíritu» ni «aliento», por el paralelismo con la nube del siguiente hemistiquio y la imagen de desaparición rápida.
- source_word: נְדִבָתִי
  english_pob_choice: my nobility
  chosen_spanish: mi nobleza
  alternatives_spanish:
  - mi dignidad
  - mi prosperidad
  - mi honor
  lexicon: HALOT
  rationale: El término puede referirse a una condición elevada, honorífica o principesca. «Nobleza» mantiene mejor la relación lexical con נדיב/נדיבה que «dignidad», y conserva la pérdida de estatus que lamenta Job.
- source_word: וּכְעָב
  english_pob_choice: like a cloud
  chosen_spanish: como una nube
  alternatives_spanish:
  - como una nube espesa
  - como nube
  lexicon: HALOT
  rationale: עָב designa una nube; en español «nube» comunica la comparación poética de manera clara y natural.
- source_word: עָבְרָה
  english_pob_choice: passes away
  chosen_spanish: pasa
  alternatives_spanish:
  - se desvanece
  - pasa de largo
  - ha pasado
  lexicon: HALOT
  rationale: עבר expresa aquí pasar/desaparecer. «Pasa» conserva la imagen breve e inmediata del verso sin añadir más matiz del necesario.
- source_word: יְשֻׁעָתִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi bienestar
  lexicon: HALOT
  rationale: ישועה puede significar salvación, liberación o bienestar. «Mi salvación» preserva el vínculo léxico, mientras que las alternativas quedan registradas porque el contexto no obliga a una lectura doctrinal específica.
theological_decisions:
- issue: Alcance teológico de יְשֻׁעָתִי
  english_pob_reading: my salvation
  chosen_spanish_reading: mi salvación
  alternative_spanish_readings:
  - mi liberación
  - mi bienestar
  rationale: En Job 30:15 el sustantivo no exige una carga soteriológica posterior. Se mantiene «salvación» por fidelidad léxica, pero se preservan alternativas contextuales para no cerrar indebidamente el sentido.
  doctrine_reference: 'Principio POB: preservar la tensión léxica y no imponer una lectura doctrinal ajena al contexto inmediato.'
translation_notes:
  revision_awareness: Esta redacción sigue el audit trail inglés y su revisión posterior, conservando el ajuste de נְדִיבָתִי hacia un término más cercano a «nobility». En español se optó por «nobleza» para reflejar mejor la condición elevada u honorable sugerida por el hebreo, manteniendo las alternativas en nota.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general POB cuando aparezca el tetragrámaton; aquí no aplica.
  - Se usa «nobleza» para נְדִיבָתִי por cercanía léxica y por coherencia con una condición social/elevada, no con una virtud abstracta.
  - «Salvación» se mantiene por fidelidad léxica; la nota evita convertir el pasaje en una afirmación doctrinal más amplia de lo que el contexto exige.
  - El orden y paralelismo de los dos símiles se conservan para reflejar la poesía hebrea.
