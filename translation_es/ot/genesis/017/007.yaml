translation:
  language: es
  text: Y estableceré mi pacto entre mí y ti y tu descendencia[a] después de ti, por sus generaciones, como pacto perpetuo, para ser Dios para ti y para tu descendencia después de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Descendencia» traduce un sustantivo hebreo colectivo singular que también puede verterse «simiente» o «descendientes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  english_pob_choice: I will establish
  chosen_spanish: estableceré
  alternatives_spanish:
  - confirmaré
  - sostendré
  lexicon: HALOT
  rationale: הקים con בְּרִית suele expresar establecer o confirmar un pacto. «Estableceré» mantiene ese valor pactal con español natural y solemne.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  lexicon: HALOT
  rationale: «Pacto» es el equivalente más claro y bíblicamente fiel para בְּרִית en español; «alianza» es posible, pero aquí «pacto» conserva mejor el registro jurídico-covenantal.
- source_word: בֵּינִי וּבֵינֶךָ וּבֵין
  english_pob_choice: between me and you and
  chosen_spanish: entre yo y tú, y
  alternatives_spanish:
  - entre mí y ti, y
  - entre yo y tú entre
  lexicon: HALOT
  rationale: Se conserva la relación bilateral del hebreo con una sintaxis natural en español. La repetición de בין se refleja por medio de «entre» y la coordinación siguiente.
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus descendientes
  lexicon: HALOT
  rationale: El hebreo es un singular colectivo. «Descendencia» preserva el valor colectivo sin imponer pluralización total ni la expresión más técnica «simiente».
- source_word: אַחֲרֶיךָ
  english_pob_choice: after you
  chosen_spanish: después de ti
  alternatives_spanish:
  - tras ti
  - que vendrá después de ti
  lexicon: HALOT
  rationale: Expresa de forma directa la continuidad generacional del hebreo.
- source_word: לְדֹרֹתָם
  english_pob_choice: throughout their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: La construcción indica duración a lo largo de sucesivas generaciones. «Por sus generaciones» es fiel y idiomático; «de generación en generación» sería una paráfrasis más libre.
- source_word: לִבְרִית עוֹלָם
  english_pob_choice: as an everlasting covenant
  chosen_spanish: como pacto perpetuo
  alternatives_spanish:
  - como pacto eterno
  - para un pacto perpetuo
  lexicon: HALOT
  rationale: עוֹלָם en contexto pactal expresa permanencia duradera. «Perpetuo» mantiene ese sentido sin introducir la resonancia teológica más explícita de «eterno».
- source_word: לִהְיוֹת לְךָ לֵאלֹהִים
  english_pob_choice: to be God to you
  chosen_spanish: para ser Dios para ti
  alternatives_spanish:
  - para ser tu Dios
  - para ser Dios a ti
  lexicon: HALOT
  rationale: Se conserva la construcción relacional cercana al hebreo. «Para ser Dios para ti» evita resolver inmediatamente la frase en la forma más idiomática «tu Dios», aunque esa sea una alternativa válida.
- source_word: וּלְזַרְעֲךָ אַחֲרֶיךָ
  english_pob_choice: and to your offspring after you
  chosen_spanish: y para tu descendencia después de ti
  alternatives_spanish:
  - y para tus descendientes después de ti
  - y para tu simiente después de ti
  lexicon: HALOT
  rationale: Se mantiene la misma opción léxica para זרע a fin de conservar coherencia y la ambigüedad colectiva del hebreo.
theological_decisions:
- issue: Formula de pacto «to be God to you»
  english_pob_reading: to be God to you
  chosen_spanish_reading: para ser Dios para ti
  alternative_spanish_readings:
  - para ser tu Dios
  rationale: La traducción conserva la forma relacional pactal del hebreo, evitando suavizarla del todo con una fórmula más idiomática. Se mantiene así la cadencia del compromiso divino y su carácter de fórmula de alianza.
  doctrine_reference: Primacía del idioma original sobre la tradición de paráfrasis; preservar fórmula pactal
- issue: Ambigüedad colectiva de זרע
  english_pob_reading: your offspring
  chosen_spanish_reading: tu descendencia
  alternative_spanish_readings:
  - tu simiente
  - tus descendientes
  rationale: «Descendencia» mantiene el singular colectivo del hebreo y no resuelve la tensión hacia un plural completamente desambiguado. Así se preserva la amplitud del texto para lectura histórica y canónica.
  doctrine_reference: Preservar la tensión léxica y teológica en vez de resolverla
- issue: עוֹלָם en contexto de pacto
  english_pob_reading: everlasting covenant
  chosen_spanish_reading: pacto perpetuo
  alternative_spanish_readings:
  - pacto eterno
  - pacto para siempre
  rationale: «Perpetuo» comunica durabilidad continua y evita cargar el texto con matices que en español pueden sonar más absolutos de lo que exige la forma pactal del hebreo.
  doctrine_reference: Fidelidad semántica al contexto de pacto
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de Génesis 17:7 y el criterio del POB en inglés: conservar la fórmula pactal, la ambigüedad colectiva de זרע y el paralelismo de las dos cláusulas finales. No se introdujeron ampliaciones doctrinales ni se sustituyó el valor relacional del original por una formulación más interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «pacto» para בְּרִית de manera consistente con el uso bíblico-jurídico.
  - Se conserva «descendencia» para זרע en ambas ocurrencias para reflejar el singular colectivo hebreo.
  - «Dios» se usa como término principal para אֱלֹהִים, conforme al estándar del proyecto.
  - La puntuación reproduce la cadencia de cláusulas del hebreo sin sobrerelacionar el verso con una paráfrasis explicativa.
