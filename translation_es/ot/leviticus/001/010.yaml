translation:
  language: es
  text: Y si su ofrenda es del ganado menor, de las ovejas o de las cabras, para holocausto[a], ofrecerá un macho sin defecto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como holocausto».
    reason: lexical_alternative
  - marker: b
    text: «Sin defecto» significa libre de defecto físico, la condición requerida para este sacrificio.
    reason: cultural_note
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La conjunción hebrea abre un nuevo caso condicional. En español, «Y si» conserva la continuidad de la serie legal sin introducir contraste que el hebreo no exige.
- source_word: מִן הַצֹּאן
  english_pob_choice: from the flock
  chosen_spanish: del ganado menor
  alternatives_spanish:
  - de la manada
  - del rebaño
  - de los animales del rebaño
  lexicon: HALOT
  rationale: צֹאן designa el ganado pequeño, especialmente ovejas y cabras. «Ganado menor» comunica bien esa categoría colectiva en español y evita restringir demasiado la imagen a un solo tipo de animal.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su ofrenda presentada
  - su presente
  lexicon: HALOT
  rationale: קָרְבָּן es una ofrenda traída para ser presentada ante Dios. «Ofrenda» es natural y fiel en un contexto sacrificial.
- source_word: מִן הַכְּשָׂבִים
  english_pob_choice: from the sheep
  chosen_spanish: de las ovejas
  alternatives_spanish:
  - de los corderos
  - de las ovejas jóvenes
  lexicon: HALOT
  rationale: כְּשָׂבִים puede abarcar ovejas y, según contexto, animales jóvenes. Aquí la categoría paralela con «las cabras» favorece la traducción amplia «ovejas» sin estrechar innecesariamente la edad.
- source_word: אוֹ מִן הָעִזִּים
  english_pob_choice: or from the goats
  chosen_spanish: o de las cabras
  alternatives_spanish:
  - o de las cabras hembras
  - o del ganado caprino
  lexicon: HALOT
  rationale: עִזִּים es el plural normal de cabras. «Cabras» mantiene la claridad y el paralelismo con «ovejas».
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para ofrenda quemada
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio totalmente quemado. «Holocausto» es el término tradicional y técnico en español bíblico; se conserva porque nombra la categoría cultual con precisión. Se evita «ofrenda quemada» por ser menos estable en el uso bíblico.
- source_word: זָכָר
  english_pob_choice: a male
  chosen_spanish: un macho
  alternatives_spanish:
  - de sexo masculino
  - un animal macho
  lexicon: HALOT
  rationale: El hebreo especifica el sexo del animal. En español sacrificial, «macho» es la forma breve y directa que preserva esa precisión.
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  - íntegro
  lexicon: HALOT
  rationale: En contexto cultual, תָּמִים indica un animal libre de defecto físico. «Sin defecto» expresa con claridad la exigencia sacrificial y evita ambigüedad moral de «íntegro».
- source_word: יַקְרִיבֶנּוּ
  english_pob_choice: he shall offer
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - presentará
  - hará subir
  lexicon: HALOT
  rationale: La forma hifil de קרב en lenguaje sacrificial significa presentar u ofrecer. «Ofrecerá» mantiene el valor cultual y la naturalidad del español.
theological_decisions:
- issue: Tratamiento de עֹלָה como sacrificio técnico
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda totalmente quemada
  rationale: El pasaje pertenece a instrucciones sacrificiales levíticas. «Holocausto» funciona en español como nombre técnico del sacrificio totalmente consumido por el fuego y conserva la categoría cultual reconocible.
  doctrine_reference: 'Éxodo/Levítico: terminología sacrificial técnica'
- issue: Sexo del animal requerido
  english_pob_reading: a male
  chosen_spanish_reading: un macho
  alternative_spanish_readings:
  - un animal macho
  - de sexo masculino
  rationale: El hebreo exige que el animal sea macho; la traducción no debe diluir esa especificación. «Un macho» conserva la fuerza normativa y la concreción del original.
  doctrine_reference: Principio de exactitud de género y rasgo físico en la ofrenda
- issue: Sin defecto como requisito cultual
  english_pob_reading: without blemish
  chosen_spanish_reading: sin defecto
  alternative_spanish_readings:
  - sin mancha
  - sin tacha
  rationale: La expresión se refiere a la ausencia de defecto físico requerido para la víctima sacrificial. «Sin defecto» comunica esa condición de forma clara y directa, manteniendo la exigencia ritual del texto.
  doctrine_reference: Pureza cultual de las ofrendas
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del texto inglés: se eliminó el pronombre redundante y se ajustó el orden para que la cualidad «sin defecto» recaiga directamente sobre el animal ofrendado. La redacción española sigue ese mismo orden natural del hebreo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en la serie POB, pero este versículo no contiene el nombre divino explícito.
  - «Ofrenda» se mantuvo para קָרְבָּן, en línea con el valor cultual de presentar algo a Dios.
  - «Holocausto» se eligió como término técnico estable para עֹלָה, evitando una paráfrasis menos precisa.
  - «Un macho sin defecto» conserva la estructura final del hebreo y evita introducir un pronombre innecesario.
