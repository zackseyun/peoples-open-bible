translation:
  language: es
  text: Pero toda la congregación dijo que los apedrearan con piedras, y la gloria de Yahvé apareció en el tabernáculo de reunión, a todos los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «a todos los israelitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la comunidad
  - toda la asamblea
  lexicon: HALOT
  rationale: עֵדָה designa al conjunto reunido del pueblo. «Congregación» conserva el matiz colectivo y formal sin diluirlo en una paráfrasis más general.
- source_word: לִרְגּוֹם
  english_pob_choice: to stone
  chosen_spanish: apedrear
  alternatives_spanish:
  - lapidar
  - tirar piedras a
  lexicon: HALOT
  rationale: El verbo expresa la acción de ejecutar con piedras. «Apedrear» es natural en español bíblico y conserva la fuerza verbal directa sin añadir «hasta la muerte», que el hebreo no explicita aquí.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre se refiere a Josué y Caleb en el contexto inmediato. En español, «los» mantiene la referencia pronominal sin sobreexplicar los nombres.
- source_word: בָּאֲבָנִים
  english_pob_choice: with stones
  chosen_spanish: con piedras
  alternatives_spanish:
  - a pedradas
  - por medio de piedras
  lexicon: HALOT
  rationale: La preposición indica el medio. «Con piedras» conserva la concreción hebrea y sigue el registro directo del original.
- source_word: כְבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahweh
  - la gloria del SEÑOR
  lexicon: HALOT
  rationale: כָּבוֹד aquí apunta a la gloria manifiesta o presencia visible de Yahvé. Se mantiene el nombre divino «Yahvé» según el estándar del proyecto, en lugar de una sustitución por título.
- source_word: נִרְאָה
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - se dejó ver
  - fue vista
  lexicon: HALOT
  rationale: El nifal de ראה expresa manifestación visible. «Apareció» comunica de forma natural la epifanía divina sin perder el valor pasivo/medio del hebreo.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en la tienda de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: La expresión es el nombre técnico del santuario. «Tabernáculo de reunión» es una equivalencia estable y comprensible en español bíblico; «tienda de reunión» sería más literal, pero menos asentada.
- source_word: אֶל כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: to all the sons of Israel
  chosen_spanish: ante todos los hijos de Israel
  alternatives_spanish:
  - a todos los hijos de Israel
  - ante todos los israelitas
  lexicon: HALOT
  rationale: El hebreo marca dirección/alcance de la manifestación divina y el destinatario colectivo. «Ante» refleja mejor el sentido de presencia manifiesta en contexto epifánico que un simple «a», mientras que «hijos de Israel» conserva la expresión convencional y su forma masculina plural.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español, el proyecto establece «Yahvé» como forma principal para preservar el nombre propio del pacto, no un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Aparición de la gloria divina
  english_pob_reading: the glory of Yahweh appeared
  chosen_spanish_reading: la gloria de Yahvé apareció
  alternative_spanish_readings:
  - la gloria de Yahvé se dejó ver
  - la presencia gloriosa de Yahvé apareció
  rationale: כְבוֹד יְהוָה denota la manifestación visible de la presencia divina. La formulación elegida mantiene la tensión entre «gloria» como resplandor/manifestación y el acto visible de aparecer, sin convertirlo en una simple metáfora.
  doctrine_reference: HALOT; DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide sustancialmente con el audit trail inglés: mantiene la concreción de «apedrear con piedras», el nombre divino como Yahvé y la designación nacional masculina «hijos de Israel». La principal decisión española adicional es usar «ante» en lugar de un simple «a» para expresar con más naturalidad la manifestación de la gloria divina en contexto epifánico.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico formal y sobrio.
  - «Yahvé» se usa de manera consistente para יְהוָה.
  - «Congregación» conserva el sentido corporativo de עֵדָה.
  - «Hijos de Israel» preserva la forma convencional masculina plural del hebreo.
  - La nota al pie marca la alternativa idiomática «israelitas» sin sustituir el texto principal.
