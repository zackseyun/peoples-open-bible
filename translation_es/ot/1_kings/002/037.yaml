translation:
  language: es
  text: Porque el día en que salgas y cruces el valle[a] de Cedrón, debes saber con certeza que ciertamente morirás; tu sangre estará sobre tu propia cabeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cruces el arroyo de Cedrón'. El hebreo נחל puede referirse a un valle, un uadi o un cauce estacional.
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: ''tu sangre estará sobre tu cabeza'', es decir, tú mismo cargarás con la responsabilidad de tu muerte.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּיוֹם
  english_pob_choice: on the day
  chosen_spanish: el día en que
  alternatives_spanish:
  - cuando
  - el día que
  lexicon: HALOT
  rationale: Mantiene el valor temporal solemne del hebreo y fluye con naturalidad en español. Conserva el tono jurídico del aviso sin volverlo excesivamente literal.
- source_word: צֵאתְךָ
  english_pob_choice: you go out
  chosen_spanish: salgas
  alternatives_spanish:
  - salieras
  - tu salida
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo expresa la acción de salir. En español, la subordinada temporal con subjuntivo reproduce bien el sentido de acción futura-condicional.
- source_word: וְעָבַרְתָּ אֶת נַחַל קִדְרוֹן
  english_pob_choice: and cross the Kidron Valley
  chosen_spanish: cruces el valle de Cedrón
  alternatives_spanish:
  - cruces el arroyo de Cedrón
  - cruces el uadi de Cedrón
  - pases por el valle de Cedrón
  lexicon: HALOT
  rationale: נחל puede ser valle, torrente estacional o cauce. Se eligió 'valle' por la decisión base del POB inglés y por ser una opción natural y entendible en español. 'Cedrón' conserva el nombre propio habitual en español bíblico.
- source_word: יָדֹעַ תֵּדַע
  english_pob_choice: know for certain
  chosen_spanish: debes saber con certeza
  alternatives_spanish:
  - sabrás con certeza
  - sabe bien
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto con verbo finito intensifica la certeza. 'Debes saber con certeza' comunica esa fuerza enfática en español sin sonar rígido.
- source_word: כִּי מוֹת תָּמוּת
  english_pob_choice: that you shall surely die
  chosen_spanish: que ciertamente morirás
  alternatives_spanish:
  - que morirás sin falta
  - que de cierto morirás
  lexicon: HALOT
  rationale: Se conserva la intensificación del hebreo mediante 'ciertamente'. 'Morirás' mantiene la advertencia directa y solemne.
- source_word: דָּמְךָ יִהְיֶה בְרֹאשֶׁךָ
  english_pob_choice: your blood shall be on your own head
  chosen_spanish: tu sangre caerá sobre tu propia cabeza
  alternatives_spanish:
  - tu sangre estará sobre tu cabeza
  - serás responsable de tu muerte
  lexicon: HALOT
  rationale: El hebreo usa un modismo de responsabilidad culpable. En español, 'caerá sobre tu propia cabeza' preserva la imagen y hace explícita la responsabilidad personal sin perder el color idiomático.
theological_decisions:
- issue: Idiomatismo legal de culpa por la propia muerte
  english_pob_reading: Retain the idiomatic expression 'your blood shall be on your own head' in the main text.
  chosen_spanish_reading: Conservar la imagen 'tu sangre caerá sobre tu propia cabeza' en el texto principal.
  alternative_spanish_readings:
  - serás responsable de tu muerte
  - tu sangre estará sobre tu cabeza
  rationale: La frase no plantea una cuestión doctrinal disputada, sino una fórmula jurídica de responsabilidad. Conservar la imagen mantiene la fuerza del hebreo y, a la vez, la nota aclara su sentido para el lector.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: Coincide con el tramo revisado del POB inglés sin cambios recientes; se ha seguido la lectura estable y el control cruzado indicó alto acuerdo, por lo que no se introdujeron variantes textuales nuevas.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el hebreo lo exige explícitamente; aquí no aparece el Tetragrámaton.
  - '''Cedrón'' sigue la forma habitual en español bíblico para el topónimo.'
  - Se mantuvo el paralelismo legal y la intensificación verbal del hebreo con equivalentes naturales en español.
  - La nota de pie preserva la alternativa semántica de נחל sin sobrecargar el texto principal.
