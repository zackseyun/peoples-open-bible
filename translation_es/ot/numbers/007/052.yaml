lexical_decisions:
- source_word: שְׂעִיר
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - macho de cabra
  - cabrío
  - chivo macho
  lexicon: HALOT
  rationale: En contextos sacrificiales, el término especifica un macho de la especie caprina. 'Macho cabrío' comunica de forma natural en español tanto la especie como el sexo, de modo equivalente a 'male goat'.
- source_word: עִזִּים
  english_pob_choice: goat
  chosen_spanish: cabrío
  alternatives_spanish:
  - de cabras
  - cabras
  lexicon: HALOT
  rationale: La construcción hebrea funciona idiomáticamente para identificar la especie dentro de una fórmula sacrificial. En español, 'cabrío' integra esa especificación sin sonar forzado ni duplicar la idea del sustantivo principal.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - un solo
  lexicon: HALOT
  rationale: En español, el numeral concuerda naturalmente con 'macho cabrío' en una lista de ofrendas. 'Un' preserva el conteo explícito del hebreo sin añadir énfasis innecesario.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación
  alternatives_spanish:
  - para una ofrenda por el pecado
  - como ofrenda por el pecado
  - para un sacrificio por el pecado
  lexicon: HALOT
  rationale: Aquí el término ritual apunta a la ofrenda expiatoria más que a la abstracción 'pecado'. 'Expiación' conserva la función sacrificial en español con mayor naturalidad que una fórmula demasiado literal.
theological_decisions:
- issue: Valor ritual de חַטָּאת en una lista de ofrendas
  english_pob_reading: for a sin offering
  chosen_spanish_reading: para expiación
  alternative_spanish_readings:
  - para una ofrenda por el pecado
  - como ofrenda por el pecado
  rationale: La expresión hebrea en listas cultuales designa la ofrenda expiatoria. En español, 'expiación' mantiene el sentido ritual y evita una lectura moralizante o abstracta del sustantivo.
  doctrine_reference: Levítico 4; Hebreos 10
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cotejo cruzado mostró alta concordancia; por eso se mantiene una formulación breve y directa, sin notas textuales adicionales.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras sustituciones no presentes en el versículo, porque el texto hebreo aquí es una fórmula sacrificial nominal sin el Tetragrámaton.
  - Se prefiere 'macho cabrío' como equivalente natural de 'male goat' en un contexto de inventario cultual.
  - No se añade artículo indefinido si no mejora la fluidez; 'un macho cabrío para expiación' conserva la forma de lista.
  - '''Expiación'' se usa como equivalente funcional de la ofrenda חַטָּאת en este contexto, no como comentario doctrinal ampliado.'
