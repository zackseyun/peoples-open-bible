translation:
  language: es
  text: Pero no busquen Betel[a], ni entren en Gilgal, ni crucen hasta Beerseba; porque Gilgal ciertamente irá al destierro, y Betel llegará a ser nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Betel llegará a ser Bet-aven», conservando un juego de palabras hebreo: Betel («casa de Dios») queda reducido a aven («nada», «maldad» o «desastre»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּדְרְשׁוּ
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - busquen
  - consulten
  - acudan a
  lexicon: HALOT
  rationale: דרשׁ en este contexto profético tiene el sentido de acudir a un lugar de culto en busca de dirección o ayuda. En español, "buscar" conserva ese valor religioso sin sonar forzado, y evita interpretar de más el verbo.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bethel
  - Bet-el
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. "Betel" es una transliteración común y clara en español bíblico; traducirlo como "casa de Dios" borraría el carácter de topónimo que el contexto exige.
- source_word: תָבֹאוּ
  english_pob_choice: enter
  chosen_spanish: entren
  alternatives_spanish:
  - vayan
  - lleguen
  lexicon: HALOT
  rationale: Con un destino nombrado, "entrar" expresa mejor la idea de ingresar a un centro de culto que el simple "ir" o "llegar".
- source_word: תַעֲבֹרוּ
  english_pob_choice: cross over to
  chosen_spanish: pasen por
  alternatives_spanish:
  - crucen hacia
  - atraviesen hacia
  - vayan a
  lexicon: HALOT
  rationale: עבר conserva la imagen concreta de pasar o cruzar. "Pasen por" mantiene esa fuerza y suena natural en español para la ruta hacia Beerseba.
- source_word: בְאֵר שֶׁבַע
  english_pob_choice: Beersheba
  chosen_spanish: Beerseba
  alternatives_spanish:
  - Beer-seba
  - Beerseba
  lexicon: HALOT
  rationale: Topónimo transliterado. "Beerseba" es la forma estándar y más reconocible en español.
- source_word: גָּלֹה יִגְלֶה
  english_pob_choice: will surely go into exile
  chosen_spanish: ciertamente irá al destierro
  alternatives_spanish:
  - será llevado al destierro
  - seguramente irá al destierro
  - irá sin duda al destierro
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + verbo finito intensifica la certeza. "Ciertamente irá al destierro" preserva ese énfasis y comunica bien el motivo profético del exilio; "destierro" es una opción natural en español para el campo semántico de גלָה.
- source_word: יִהְיֶה לְאָוֶן
  english_pob_choice: will become nothingness
  chosen_spanish: vendrá a ser nada
  alternatives_spanish:
  - vendrá a ser nada
  - se volverá nada
  - vendrá a ser vaciedad
  - se volverá una nada
  lexicon: HALOT
  rationale: אָוֶן puede abarcar nulidad, vanidad, maldad o calamidad. "Nada" preserva la fuerza despojadora del término sin fijar prematuramente una sola interpretación moral; en español suena más natural que "nada-edad" o un calco abstracto.
theological_decisions:
- issue: Posible juego de palabras en la frase final sobre Betel y אָוֶן
  english_pob_reading: Bethel will become nothingness; note preserves the possible echo of Beth-aven ('house of wickedness/nothingness').
  chosen_spanish_reading: Betel vendrá a ser nada
  alternative_spanish_readings:
  - Betel vendrá a ser maldad
  - Betel vendrá a ser desastre
  - Betel vendrá a ser Bet-aven
  rationale: El hebreo puede estar cargado de un juego de palabras entre Betel y Beth-aven. La traducción principal mantiene el sentido de vaciamiento/jucio con "nada" y evita resolver el problema en el cuerpo del texto. La nota conserva la alternativa lexical y el posible eco polémico sin forzar una decisión interpretativa única.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El texto se mantiene alineado con la última revisión del POB en inglés, que no introdujo cambios y confirmó alta concordancia con el hebreo. La versión española conserva la advertencia profética, la secuencia de topónimos y la tensión del remate sobre אָוֶן sin resolverla de forma excesiva.
  spanish_consistency_notes:
  - Se prefirió "Betel" como transliteración estable del topónimo, en coherencia con el tratamiento de nombres propios del POB.
  - '"Destierro" se usa para mantener la fuerza profética de גלָה sin introducir una perífrasis más interpretativa.'
  - '"Nada" se eligió para אָוֶן por su capacidad de reflejar vaciedad y juicio, dejando abierta la posibilidad de matices como maldad o desastre en la nota.'
  - Se evitó "SEÑOR" o cualquier sustituto, porque el versículo no contiene el tetragrámaton ni una cita directa de κύριος.
