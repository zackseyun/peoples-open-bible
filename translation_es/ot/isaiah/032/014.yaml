translation:
  language: es
  text: Porque el palacio está abandonado, la ciudad concurrida[a] está desamparada; Ophel[b] y la atalaya han venido a ser cuevas[c] para siempre, un gozo para los asnos salvajes, un pastizal para los rebaños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ciudad bulliciosa»; la expresión hebrea literalmente implica la «multitud» o el «ruido» de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: «Ophel» es un topónimo, probablemente la colina fortificada o el montículo asociado con Jerusalén.
    reason: cultural_note
  - marker: c
    text: O «han venido a ser guaridas para siempre»; el hebreo puede enfatizar fortificaciones arruinadas convertidas en refugios de animales.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְמוֹן
  english_pob_choice: palace
  chosen_spanish: palacio
  alternatives_spanish:
  - ciudadela
  - fortaleza
  lexicon: HALOT
  rationale: En este contexto de juicio urbano, la referencia es a una edificación destacada y regia o fortificada. «Palacio» es el equivalente español más natural y transparente, y preserva la fuerza del contraste con la desolación posterior.
- source_word: נֻטָּשׁ
  english_pob_choice: is abandoned
  chosen_spanish: está abandonado
  alternatives_spanish:
  - está desierto
  - está forsaken / está desamparado
  lexicon: HALOT
  rationale: El participio pasivo expresa que el lugar ha sido dejado atrás. «Está abandonado» es idiomático en español y conserva la idea de desamparo sin endurecer innecesariamente el tono.
- source_word: הֲמוֹן עִיר
  english_pob_choice: the crowded city
  chosen_spanish: la ciudad concurrida
  alternatives_spanish:
  - la ciudad bulliciosa
  - la multitud de la ciudad
  lexicon: HALOT
  rationale: La frase hebrea incluye la idea de multitud o ruido de la ciudad. «Concurrida» mantiene el valor urbano y poblado sin perder la concreción del sustantivo «ciudad».
- source_word: עֻזָּב
  english_pob_choice: is forsaken
  chosen_spanish: está desamparada
  alternatives_spanish:
  - está abandonada
  - está dejada
  lexicon: HALOT
  rationale: El verbo pasivo de עזב es paralelo a «nֻטָּשׁ». En español, «desamparada» comunica bien el matiz de abandono judicial y mantiene una ligera variación léxica respecto de «abandonado».
- source_word: עֹפֶל
  english_pob_choice: Ophel
  chosen_spanish: Ophel
  alternatives_spanish:
  - el monte Ophel
  - la colina fortificada
  lexicon: HALOT
  rationale: Se trata de un topónimo o designación topográfica asociada con Jerusalén. Se conserva transliterado como nombre propio, como hace la tradición auditada en inglés.
- source_word: וָבַחַן
  english_pob_choice: the watchtower
  chosen_spanish: la atalaya
  alternatives_spanish:
  - la torre
  - la torre de vigilancia
  lexicon: HALOT
  rationale: La palabra apunta probablemente a una torre de vigilancia o puesto de observación. «Atalaya» es un español bíblico claro y preciso, menos pesado que «torre de vigilancia».
- source_word: הָיָה בְעַד מְעָרוֹת
  english_pob_choice: have become caves
  chosen_spanish: han venido a ser cuevas
  alternatives_spanish:
  - se han convertido en cuevas
  - han llegado a ser guaridas
  lexicon: HALOT
  rationale: La imagen describe fortificaciones arruinadas que terminan como refugio de animales. «Han venido a ser» conserva el valor de resultado y evita sobreinterpretar el verbo; «cuevas» sigue de cerca el sentido básico de מְעָרוֹת.
- source_word: מְעָרוֹת
  english_pob_choice: caves
  chosen_spanish: cuevas
  alternatives_spanish:
  - guaridas
  - cavernas
  lexicon: HALOT
  rationale: El sentido básico es «cuevas» o «guaridas». «Cuevas» es la opción más literal y transparente; el contexto de ruina permite que el lector perciba la imagen de abandono.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para siempre jamás
  - por tiempo perpetuo
  lexicon: HALOT
  rationale: Es la fórmula idiomática de duración indefinida. «Para siempre» es la expresión natural en español y comunica adecuadamente el alcance retórico de la sentencia profética.
- source_word: מְשׂוֹשׂ פְּרָאִים
  english_pob_choice: a joy for wild donkeys
  chosen_spanish: un gozo para los asnos salvajes
  alternatives_spanish:
  - una delicia para los asnos salvajes
  - un deleite para los onagros
  lexicon: HALOT
  rationale: «Asnos salvajes» reproduce el referente animal con claridad para el lector común. «Gozo» conserva el sustantivo de alegría/delicia y evita suavizar la imagen de ruina habitada por animales.
- source_word: מִרְעֵה עֲדָרִים
  english_pob_choice: a pasture for flocks
  chosen_spanish: un pastizal para los rebaños
  alternatives_spanish:
  - un pasto para los rebaños
  - un lugar de pastoreo para los rebaños
  lexicon: HALOT
  rationale: La construcción indica un lugar de pastoreo. «Pastizal» es natural en español y mantiene la imagen concreta de una tierra deshabitada que ahora sirve para el ganado.
theological_decisions:
- issue: Imagen profética de juicio sobre la ciudad y sus fortificaciones
  english_pob_reading: The verse presents abandonment and ruin without softening the desolation imagery.
  chosen_spanish_reading: El verso presenta abandono y ruina sin suavizar la imagen de desolación.
  alternative_spanish_readings:
  - El verso describe una simple despoblación urbana.
  - El verso reduce la imagen a una metáfora general de decadencia.
  rationale: La traducción conserva la secuencia de lugares vaciados y convertidos en hábitat de animales. No se atenúa la fuerza judicial del pasaje ni se lo convierte en una metáfora genérica.
  doctrine_reference: Isaías 32:14; juicio profético sobre Jerusalén y sus lugares fortificados.
translation_notes:
  revision_awareness: La revisión auditada más reciente indica que no hubo cambios necesarios y que el acuerdo con el control cruzado fue alto. Esta versión sigue de cerca el texto hebreo y la solución inglesa aprobada, manteniendo las ambigüedades léxicas relevantes (especialmente en הֲמוֹן עִיר, עֹפֶל y בַּחַן) sin neutralizarlas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al texto; este verso no lo contiene.
  - Se conserva «Ophel» como nombre propio transliterado, siguiendo la decisión auditada.
  - «Asnos salvajes» mantiene el referente zoológico del hebreo y evita un término más técnico que podría oscurecer el texto.
  - «Cuevas» y «pastizal» dejan visible la imagen de ruina reutilizada por animales y ganado.
  - Las notas al pie distinguen opciones léxicas reales sin duplicar marcadores.
