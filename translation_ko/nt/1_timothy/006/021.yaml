id: 1TI.6.21
reference: 1 Timothy 6:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἥν τινες ἐπαγγελλόμενοι περὶ τὴν πίστιν ἠστόχησαν. Ἡ χάρις ⸂μεθ’ ὑμῶν⸃.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/021.yaml
  text: By professing it[a], some have missed the mark concerning the faith[c][b]. Grace be with you.
  footnotes:
  - marker: a
    text: Or 'which some professing have gone astray concerning the faith.' The Greek keeps the relative pronoun explicit and the verb can also be rendered 'have gone astray' or 'have erred.'
    reason: lexical_alternative
  - marker: b
    text: '''The faith'' here likely refers to the Christian faith as a body of belief, though it could also be understood more broadly as personal faith.'
    reason: alternative_reading
  - marker: c
    text: The Greek says 'with you' in the plural.
    reason: textual_variant
translation:
  language: ko
  text: 어떤 사람들은 이를 표방하면서[a] 믿음에서 빗나갔습니다[b]. 은혜가 여러분과 함께하기를 빕니다[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그것을 표방한 어떤 자들이 믿음에 관하여 빗나갔다」. 헬라어는 관계대명사를 명시적으로 두며, 동사는 「빗나갔다」 「잘못되었다」로도 옮길 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 본 절의 「믿음」은 신앙의 객관적 내용으로서의 그리스도교 신앙을 가리키는 것으로 보이나, 보다 폭넓게 개인적 믿음으로도 이해될 수 있다.
    reason: alternative_reading
  - marker: c
    text: 헬라어 「여러분과 함께」는 복수형으로 되어 있다.
    reason: textual_variant
lexical_decisions:
- source_word: ἥν τινες ἐπαγγελλόμενοι
  english_pob_choice: By professing it, some
  chosen_korean: 어떤 사람들은 이를 표방하면서
  alternatives_korean:
  - 그것을 자처하는 어떤 자들
  lexicon: BDAG
  rationale: ἐπαγγέλλομαι의 「표방·자처」를 「표방」으로.
- source_word: περὶ τὴν πίστιν ἠστόχησαν
  english_pob_choice: have missed the mark concerning the faith
  chosen_korean: 믿음에서 빗나갔습니다
  alternatives_korean:
  - 그 믿음에 관하여 과녁을 놓쳤습니다
  lexicon: BDAG
  rationale: 1:6 ἀστοχέω와 일관 「빗나가다」.
- source_word: Ἡ χάρις μεθ’ ὑμῶν
  english_pob_choice: Grace be with you
  chosen_korean: 은혜가 여러분과 함께하기를 빕니다
  alternatives_korean:
  - 은혜가 여러분과 함께 있기를
  lexicon: BDAG
  rationale: 복수형 「여러분과 함께」 보존. 송영의 정형구.
