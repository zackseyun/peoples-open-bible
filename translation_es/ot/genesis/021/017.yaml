translation:
  language: es
  text: 'Y Dios oyó la voz del muchacho[a], y el ángel de Dios llamó a Agar desde el cielo y le dijo: «¿Qué te pasa, Agar? No temas, porque Dios ha oído la voz del muchacho donde está».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el clamor del muchacho’ para ‘la voz del muchacho’ en ambas ocurrencias; qol en hebreo puede referirse al sonido audible del llanto o clamor de angustia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע אֱלֹהִים
  english_pob_choice: And God heard
  chosen_spanish: Y Dios oyó
  alternatives_spanish:
  - Y Dios escuchó
  - Entonces Dios oyó
  lexicon: HALOT
  rationale: שׁמע en qal suele significar 'oír'. 'Oyó' conserva la secuencia narrativa y la respuesta divina al clamor sin convertirla en una paráfrasis interpretativa como 'respondió'.
- source_word: אֶת קוֹל הַנַּעַר
  english_pob_choice: the boy’s voice
  chosen_spanish: la voz del muchacho
  alternatives_spanish:
  - la voz del niño
  - el clamor del muchacho
  lexicon: HALOT
  rationale: קוֹל es literalmente 'voz/sonido'. 'Voz del muchacho' mantiene el vínculo léxico con la repetición posterior y evita estrechar el sentido a 'clamor', aunque ese matiz está implícito en el contexto.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: HALOT
  rationale: נַעַר aquí designa a Ismael como varón joven. 'Muchacho' es natural en español contemporáneo y mantiene una referencia humana concreta sin sonar demasiado infantil o arcaica.
- source_word: וַיִּקְרָא מַלְאַךְ אֱלֹהִים
  english_pob_choice: and the angel of God called
  chosen_spanish: el ángel de Dios llamó
  alternatives_spanish:
  - un ángel de Dios llamó
  - el mensajero de Dios llamó
  lexicon: HALOT
  rationale: מַלְאַךְ אֱלֹהִים se conserva como 'ángel de Dios' por fidelidad a la forma constructa y al lenguaje narrativo. 'El' mantiene la referencia específica del mensajero en la escena.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  - del cielo
  lexicon: HALOT
  rationale: Aunque שׁמים es morfológicamente plural, en español 'cielo' es la equivalencia idiomática más natural. 'Desde el cielo' comunica bien la procedencia espacial de la voz sin sobrerrepresentar la pluralidad hebrea.
- source_word: מַה לָּךְ
  english_pob_choice: What is the matter with you
  chosen_spanish: ¿Qué te pasa?
  alternatives_spanish:
  - ¿Qué te sucede?
  - ¿Qué te ocurre?
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y pregunta qué aflige a alguien. '¿Qué te pasa?' es natural, directo y compasivo en español, y transmite la preocupación del hablante sin endurecer el tono.
- source_word: אַל תִּירְאִי
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: HALOT
  rationale: Ambas traducciones son posibles; 'No temas' conserva la concisión y solemnidad del imperativo hebreo, además de ser plenamente natural en registro bíblico en español.
- source_word: כִּי שָׁמַע אֱלֹהִים
  english_pob_choice: for God has heard
  chosen_spanish: porque Dios ha oído
  alternatives_spanish:
  - pues Dios ha oído
  - porque Dios oyó
  lexicon: HALOT
  rationale: '''Porque'' introduce la razón de la exhortación, y el perfecto español ''ha oído'' transmite el valor resultativo del hebreo: la escucha divina ya es un hecho eficaz en la situación presente.'
- source_word: אֶל קוֹל הַנַּעַר
  english_pob_choice: the boy’s voice
  chosen_spanish: la voz del muchacho
  alternatives_spanish:
  - la voz del niño
  - el clamor del muchacho
  lexicon: HALOT
  rationale: Se repite la misma solución para conservar la repetición interna de קוֹל y הַנַּעַר dentro del versículo, tal como hace el texto hebreo.
- source_word: בַּאֲשֶׁר הוּא שָׁם
  english_pob_choice: where he is
  chosen_spanish: donde está
  alternatives_spanish:
  - en el lugar donde está
  - donde él está
  lexicon: HALOT
  rationale: La frase es locativa e idiomática. 'Donde está' es breve, natural y preserva la idea de la situación presente del muchacho sin añadir explicaciones.
theological_decisions:
- issue: Identidad y función de מַלְאַךְ אֱלֹהִים
  english_pob_reading: the angel of God
  chosen_spanish_reading: el ángel de Dios
  alternative_spanish_readings:
  - un ángel de Dios
  - el mensajero de Dios
  rationale: Se conserva la expresión hebrea sin resolver el debate sobre si el mensajero debe identificarse más estrechamente con Dios. Esto preserva la tensión teológica del pasaje y sigue el auditable enfoque del POB.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa del POB, que prefirió una pregunta más literal para מַה־לָּךְ (“What is the matter with you”). En español se adoptó una solución idiomática equivalente (“¿Qué te pasa?”) por naturalidad, manteniendo el tono directo y compasivo del contexto. También se preservó la repetición de ‘la voz del muchacho’ para reflejar el paralelismo léxico del hebreo.
  spanish_consistency_notes:
  - Se usa ‘Dios’ para אֱלֹהִים y ‘ángel de Dios’ para מַלְאַךְ אֱלֹהִים, sin introducir armonizaciones doctrinales.
  - Se usa ‘No temas’ por su registro bíblico claro y concisión.
  - ‘Cielo’ se emplea en singular idiomático para מִן הַשָּׁמַיִם, sin perder la procedencia desde arriba.
  - Se mantiene ‘muchacho’ para נַעַר por coherencia con el contexto narrativo y para evitar un matiz demasiado infantil.
