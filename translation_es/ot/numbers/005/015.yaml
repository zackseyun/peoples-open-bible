translation:
  language: es
  text: 'Entonces el hombre llevará a su esposa al sacerdote, y llevará su ofrenda por ella: la décima parte de un efa de cebada molida. No derramará aceite sobre ella[a] ni pondrá incienso sobre ella[a], porque es una ofrenda de grano[b] de celos, una ofrenda memorial que trae a la memoria la iniquidad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, sobre la ofrenda, no sobre la mujer. El hebreo usa aquí un pronombre que refiere a la ofrenda presentada.
    reason: spanish_clarity_source_alignment
  - marker: b
    text: O «ofrenda vegetal». El hebreo מִנְחָה, en contexto sacerdotal, designa una ofrenda de grano o vegetal; aquí «de grano» suena más natural en español y preserva mejor el sentido cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיא
  english_pob_choice: shall bring
  chosen_spanish: llevará
  alternatives_spanish:
  - deberá llevar
  - traerá
  lexicon: HALOT
  rationale: En este contexto legal/instruccional, el verbo tiene fuerza injuntiva. «Llevará» conserva esa obligación sin sonar rígido ni arcaizante; «traerá» sería también posible, pero «llevará ... al sacerdote» fluye mejor en español.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el esposo
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente «el hombre». Aunque el contexto aclara que se trata del esposo, «el hombre» mantiene más de cerca el texto fuente.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: HALOT
  rationale: En este contexto matrimonial, «su esposa» es el equivalente natural y preciso de אִשְׁתּוֹ.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el ministro cultual
  lexicon: HALOT
  rationale: «Sacerdote» es la correspondencia normal y clara para el oficio cultual hebreo.
- source_word: קָרְבָּנָהּ
  english_pob_choice: her offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - la ofrenda de ella
  - su sacrificio
  lexicon: HALOT
  rationale: קָרְבָּן designa una ofrenda traída al santuario. «Su ofrenda» refleja el sufijo femenino y preserva el valor general del término sin restringirlo indebidamente a «sacrificio».
- source_word: עָלֶיהָ
  english_pob_choice: for her
  chosen_spanish: por ella
  alternatives_spanish:
  - en favor de ella
  - a causa de ella
  lexicon: HALOT
  rationale: Con el verbo de traer ofrenda, la preposición indica representación o relación con la mujer. «Por ella» es idiomático en español y conserva esa referencia vicaria.
- source_word: עֲשִׂירִת הָאֵיפָה
  english_pob_choice: a tenth of an ephah
  chosen_spanish: la décima parte de un efa
  alternatives_spanish:
  - un décimo de efa
  - la décima de un efa
  lexicon: HALOT
  rationale: «La décima parte de un efa» expresa con claridad la medida hebrea. Se mantiene «efa» como unidad antigua transliterada.
- source_word: קֶמַח שְׂעֹרִים
  english_pob_choice: barley meal
  chosen_spanish: harina de cebada
  alternatives_spanish:
  - harina molida de cebada
  - comida de cebada
  lexicon: HALOT
  rationale: El hebreo describe harina o harina molida de cebada. «Harina de cebada» es natural en español y respeta el sentido material del término.
- source_word: לֹא יִצֹק עָלָיו שֶׁמֶן
  english_pob_choice: He shall pour no oil on it
  chosen_spanish: No derramará sobre ella aceite
  alternatives_spanish:
  - No echará aceite sobre ella
  - No vaciará aceite sobre ella
  lexicon: HALOT
  rationale: «Derramará» corresponde bien a יצק. Se usa «sobre ella» porque en español el referente implícito de la ofrenda puede expresarse con femenino por concordancia con «ofrenda».
- source_word: וְלֹא יִתֵּן עָלָיו לְבֹנָה
  english_pob_choice: and put no frankincense on it
  chosen_spanish: ni pondrá sobre ella incienso
  alternatives_spanish:
  - ni echará sobre ella incienso
  - ni colocará sobre ella incienso
  lexicon: HALOT
  rationale: נתן aquí es amplio («poner/colocar»). «Pondrá» es natural y claro. Se traduce לְבֹנָה como «incienso» en sentido de la resina aromática, sin añadir especificación no requerida por el texto.
- source_word: מִנְחַת קְנָאֹת
  english_pob_choice: a grain offering of jealousy
  chosen_spanish: una ofrenda vegetal de celos
  alternatives_spanish:
  - una ofrenda de celos
  - una ofrenda de celo
  lexicon: HALOT
  rationale: En la terminología cultual, מִנְחָה puede rendirse como «ofrenda vegetal», equivalente funcional de «grain offering» y más natural en español bíblico. קְנָאֹת se conserva como «celos», que refleja el motivo del rito; «celo» sería posible, pero aquí la carga relacional del contexto favorece «celos».
- source_word: מִנְחַת זִכָּרוֹן
  english_pob_choice: a memorial offering
  chosen_spanish: una ofrenda memorial
  alternatives_spanish:
  - una ofrenda de recuerdo
  - una ofrenda de rememoración
  lexicon: HALOT
  rationale: «Memorial» mantiene la fuerza cultual de זִכָּרוֹן y sigue de cerca la solución inglesa tradicionalizada.
- source_word: מַזְכֶּרֶת עָוֹן
  english_pob_choice: bringing iniquity to remembrance
  chosen_spanish: que trae a la memoria la iniquidad
  alternatives_spanish:
  - que hace recordar la iniquidad
  - que hace memoria de la culpa
  lexicon: HALOT
  rationale: El participio expresa causalidad de recuerdo. «Trae a la memoria» preserva el aspecto verbal sin forzar una interpretación conclusiva de culpa o condena. «Iniquidad» reproduce la amplitud semántica de עָוֹן.
theological_decisions:
- issue: Sentido del rito de los celos y la función de la ofrenda
  english_pob_reading: Render the verse descriptively without importing an interpretation of guilt or innocence beyond the text itself.
  chosen_spanish_reading: Se describe la ofrenda y su función memorial sin decidir en la traducción si presupone culpa o inocencia de la mujer.
  alternative_spanish_readings:
  - Traducir de modo que el rito presuponga la culpa de la mujer
  - Traducir de modo puramente simbólico, sin fuerza judicial
  rationale: El hebreo habla de una ofrenda memorial que trae la iniquidad a la memoria, pero no resuelve el estado moral de la mujer en este versículo. La redacción española conserva esa tensión, en lugar de inclinar el texto hacia una lectura que el verso mismo no explicita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y toma en cuenta la revisión inglesa más reciente: mantener el valor de ofrenda de grano/barley meal, reflejar el participio como construcción verbal continua, y conservar la ambigüedad teológica del rito de los celos sin resolverla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo tenga el tetragrámaton; este versículo no lo contiene.
  - Se mantiene «ofrenda» para קָרְבָּן y «ofrenda memorial» para מִנְחַת זִכָּרוֹן, evitando sustituirlo por vocabulario litúrgico más tradicional sin base textual.
  - Se eligió «ofrenda vegetal» para מִנְחָה en este contexto cultual, conforme a la convención POB de distinguirla de otros tipos de ofrenda y para evitar la lectura demasiado específica de «sacrificio».
  - Se emplea el femenino en los pronombres de la ofrenda («sobre ella») porque el antecedente inmediato en español es «ofrenda», aunque el hebreo alterna referencia al objeto ofrecido.
