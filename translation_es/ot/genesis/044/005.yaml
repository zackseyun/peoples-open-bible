- from: ¿No es esta aquella de la que bebe mi señor y por la cual, en verdad, adivina? Han hecho mal[a][b] al hacer esto.
  to: ¿No es esta la copa de la que bebe mi señor y por la cual, en verdad, adivina? Han hecho mal[a][b] al hacer esto.
