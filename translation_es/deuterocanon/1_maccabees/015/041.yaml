  yaml_path: translation/deuterocanon/1_maccabees/015/041.yaml
  text: And he fortified Kedron and stationed there cavalry and forces[a], so that by going out they might patrol the roads of Judea[c][b], just as the king had ordered him.
  footnotes:
  - marker: a
    text: Or 'built up Kedron.' The Greek verb can mean 'built' more literally; 'fortified' is chosen here because the context is military and immediately mentions the stationing of troops.
    reason: lexical_alternative
  - marker: b
    text: Or 'horsemen' for 'cavalry.'
    reason: lexical_alternative
  - marker: c
    text: The verb rendered 'patrol' may also suggest moving along the roads to control, harass, or raid them.
    reason: lexical_alternative
