lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - lo que
  lexicon: HALOT
  rationale: La partícula relativa introduce la cláusula y en español, para este contexto poético, «que» suena natural y conserva la relación subordinada sin añadir contenido.
- source_word: יִזְּל֥וּ
  english_pob_choice: pour down
  chosen_spanish: derraman
  alternatives_spanish:
  - fluyen
  - caen
  - vierten
  lexicon: HALOT
  rationale: El verbo expresa derramamiento descendente de agua. «Derraman» mantiene la imagen de líquido que baja desde arriba y es idiomático en español.
- source_word: שְׁחָקִ֑ים
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - los cielos
  - las nubes del cielo
  lexicon: HALOT
  rationale: En la imaginería meteorológica poética, el término remite a las nubes/cielos. «Las nubes» es la correspondencia más clara y natural para el contexto inmediato de lluvia.
- source_word: יִ֝רְעֲפ֗וּ
  english_pob_choice: they drip
  chosen_spanish: gotean
  alternatives_spanish:
  - llueven
  - derraman
  - destilan
  lexicon: HALOT
  rationale: La raíz comunica gotear o llover en gotas. «Gotean» conserva el matiz de caída en gotas y armoniza con el paralelismo del primer hemistiquio.
- source_word: עֲלֵי
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - para
  lexicon: HALOT
  rationale: La preposición indica movimiento descendente hacia quienes están abajo. «Sobre» es la equivalencia española más natural.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: la humanidad
  alternatives_spanish:
  - el hombre
  - la gente
  - los seres humanos
  lexicon: HALOT
  rationale: Aunque el hebreo usa el singular genérico אָדָם, en español «la humanidad» comunica con claridad el sentido colectivo sin perder la referencia a la especie humana. Se preserva así la fuerza genérica del término en un registro contemporáneo y digno.
- source_word: רָב
  english_pob_choice: abundantly
  chosen_spanish: abundantemente
  alternatives_spanish:
  - en abundancia
  - copiosamente
  - mucho
  lexicon: HALOT
  rationale: El adverbio expresa la abundancia del goteo/derramamiento. «Abundantemente» reproduce de forma directa la cuantificación intensa del hebreo en un español claro.
theological_decisions:
- issue: Valor genérico de אָדָם
  english_pob_reading: man / mankind (generic singular for humanity)
  chosen_spanish_reading: la humanidad
  alternative_spanish_readings:
  - el hombre
  - la gente
  - los seres humanos
  rationale: El texto hebreo usa אָדָם en sentido genérico para toda la humanidad. En español, «la humanidad» evita una lectura restrictivamente masculina sin diluir el alcance universal del sujeto receptor.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; contested generic ανθρωπος/אָדָם-style renderings'
translation_notes:
  revision_awareness: El inglés POB pasó de «drip abundantly on man» a «shower abundantly on mankind», afinando la naturalidad y el valor colectivo. La versión española sigue ese movimiento hacia una formulación más idiomática y explícitamente colectiva, sin perder el paralelismo poético de derramar/gotear.
  spanish_consistency_notes:
  - Se mantiene un registro poético sobrio y claro, adecuado para una Biblia pública y auditable.
  - Se evita «SEÑOR» u otras sustituciones porque no interviene el nombre divino en este versículo.
  - 'Se conserva la tensión imagen-paralelismo del hebreo con dos verbos de descenso de agua: «derraman» / «gotean».'
