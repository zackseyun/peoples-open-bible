  glossary_alignment: 'Buena alineación con la terminología del proyecto: שְׁאֹל se conserva como «Seol», no hay conflictos con términos teológicos principales, y las decisiones léxicas están en línea con la auditoría inglesa. No hay problema con «ha muerto», aunque «está muerto» también sería posible. La nota de «algún mal» preserva adecuadamente la alternativa para אָסוֹן.'
