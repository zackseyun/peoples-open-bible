translation:
  language: es
  text: Y tú, hijo de hombre, ¿no será que el día en que yo les quite su fortaleza, el gozo de su gloria, el deleite[a] de sus ojos, y el deseo[b] de su alma—sus hijos y sus hijas—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el deseo de sus ojos' para 'el deleite de sus ojos'.
    reason: lexical_alternative
  - marker: b
    text: O 'el anhelo de su alma' para 'el deseo de su alma'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - hombre mortal
  - ser humano
  lexicon: HALOT
  rationale: Se conserva el título profético fijo de Ezequiel sin convertirlo en una paráfrasis. 'Hijo de hombre' es la forma más directa y reconocible en español para este vocativo, y mantiene la repetición literaria del original.
- source_word: הֲלוֹא
  english_pob_choice: will it not be that
  chosen_spanish: ¿no será que
  alternatives_spanish:
  - ¿acaso no es que
  - ¿no es que
  lexicon: HALOT
  rationale: La pregunta retórica espera afirmación y antecede a una cláusula temporal. '¿No será que' conserva el valor interrogativo y suena natural en español sin perder la expectativa retórica.
- source_word: בְּיוֹם
  english_pob_choice: on the day when
  chosen_spanish: en el día en que
  alternatives_spanish:
  - el día en que
  - cuando
  lexicon: HALOT
  rationale: Mantiene el marcador temporal formal del hebreo y encaja con la sintaxis española de la cláusula subordinada.
- source_word: קַחְתִּי מֵהֶם
  english_pob_choice: I take from them
  chosen_spanish: yo les quite
  alternatives_spanish:
  - yo tome de ellos
  - yo les arrebate
  lexicon: HALOT
  rationale: En este contexto לקח con מן expresa quitar o retirar en juicio. 'Les quite' comunica la acción de remoción sin sobrecargarla con una interpretación más fuerte que la necesaria.
- source_word: מָעוּזָּם
  english_pob_choice: their stronghold
  chosen_spanish: su fortaleza
  alternatives_spanish:
  - su refugio
  - su bastión
  lexicon: HALOT
  rationale: '''Fortaleza'' conserva la idea de lugar o fuente de fuerza y funciona bien para el referente implícito de la ciudad/templo como apoyo confiado.'
- source_word: מְשׂוֹשׂ תִּפְאַרְתָּם
  english_pob_choice: the joy of their glory
  chosen_spanish: el gozo de su gloria
  alternatives_spanish:
  - la alegría de su esplendor
  - el regocijo de su gloria
  lexicon: HALOT
  rationale: Se preserva la cadena poética compacta sin explicarla de más. 'Gozo de su gloria' mantiene la relación sustantiva del hebreo y la cadencia formal del POB en inglés.
- source_word: מַחְמַד עֵינֵיהֶם
  english_pob_choice: the delight of their eyes
  chosen_spanish: el deleite de sus ojos
  alternatives_spanish:
  - el deseo de sus ojos
  - la cosa preciosa de sus ojos
  lexicon: HALOT
  rationale: El hebreo es una expresión idiomática de algo muy querido o apreciado. 'Deleite de sus ojos' es idiomático en español y conserva el tono afectivo; se mantiene la alternativa 'deseo' en nota para no borrar la ambigüedad lexical.
- source_word: מַשָּׂא נַפְשָׁם
  english_pob_choice: the desire of their soul
  chosen_spanish: el deseo de su alma
  alternatives_spanish:
  - el anhelo de su alma
  - aquello en que se fija su alma
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa más directa ('desire') y se traduce con 'deseo', que conserva la fuerza del término sin convertirlo en una explicación. 'Alma' mantiene el paralelismo con el hebreo נֶפֶשׁ.
- source_word: בְּנֵיהֶם וּבְנוֹתֵיהֶם
  english_pob_choice: their sons and their daughters
  chosen_spanish: sus hijos y sus hijas
  alternatives_spanish:
  - sus hijos e hijas
  - su descendencia
  lexicon: HALOT
  rationale: Se respeta la pareja explícita del hebreo. 'Hijos y sus hijas' preserva el paralelismo y evita neutralizar el detalle genérico del texto.
theological_decisions:
- issue: 'Identificación del objeto quitado: fortaleza/sostén de Jerusalén o del templo'
  english_pob_reading: their stronghold
  chosen_spanish_reading: su fortaleza
  alternative_spanish_readings:
  - su refugio
  - su bastión
  rationale: La versión española mantiene la formulación general sin especificar más allá del hebreo y del audit trail inglés. Esto preserva la tensión interpretativa sobre si se trata del templo, la ciudad o su apoyo confiado, sin borrarla.
  doctrine_reference: Ezequiel 24:25; cf. contexto de juicio sobre Jerusalén/templo en Ezequiel 24
- issue: 'Cierre de la lista: bienes preciosos y luego hijos e hijas'
  english_pob_reading: the delight of their eyes, and the desire of their soul—their sons and their daughters—
  chosen_spanish_reading: el deleite de sus ojos, y el deseo de su alma—sus hijos y sus hijas—
  alternative_spanish_readings:
  - el deseo de sus ojos
  - el anhelo de su alma
  rationale: 'Se conserva la secuencia del hebreo y del POB: primero objetos/personas preciados, luego la precisión de hijos e hijas. No se fusiona en ''sus hijos'' para no perder el orden retórico.'
  doctrine_reference: Ezequiel 24:25
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que cambió 'longing' a 'desire' en מַשָּׂא נַפְשָׁם. Por eso el español usa 'deseo de su alma' en lugar de 'anhelo', manteniendo una correspondencia más directa con el hebreo y con el estado final del audit trail. No se incorporaron interpretaciones adicionales no respaldadas por el texto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca; en este versículo no ocurre.
  - Se conserva 'alma' para נֶפֶשׁ, alineado con el uso POB y evitando sustituirlo por 'vida' o 'ser' sin necesidad.
  - '''Fortaleza'' traduce מָעוּז sin forzar una glosa eclesiástica como ''refugio'' salvo en nota de alternativa.'
  - La puntuación con rayas largas conserva el énfasis del original y del inglés auditado.
  - Se evita traducir 'glory' como 'esplendor' para no perder la relación sustantiva compacta del hebreo.
