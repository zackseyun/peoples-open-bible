translation:
  language: es
  text: Ahora, el resto de los hechos de Jehú, y todo lo que hizo, y todo su poder[a]—¿no están escritos en el Libro de las Crónicas[b] de los reyes de Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y todas sus hazañas» para «y todo su poder».
    reason: lexical_alternative
  - marker: b
    text: Se trata de una fuente real de anales, no necesariamente del libro canónico de Crónicas.
    reason: cross_reference
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - Lo demás de
  lexicon: HALOT
  rationale: En esta fórmula regia de cierre, יֶתֶר expresa lo restante o lo demás de la historia del rey. «Ahora» reproduce con naturalidad el valor discursivo de וְ al introducir un resumen final, sin forzar un calco innecesario.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - asuntos
  - palabras
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «palabras/asuntos», en esta fórmula cronística se refiere a la actividad histórica del rey. «Hechos» conserva el sentido de registro de acciones sin volverlo demasiado técnico.
- source_word: יֵהוּא
  english_pob_choice: Jehu
  chosen_spanish: Jehú
  alternatives_spanish:
  - Jehu
  lexicon: transliteración estándar
  rationale: Se usa la forma española usual del nombre propio, «Jehú», para lectura eclesial natural y reconocible.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo cuanto hizo
  - y todo lo que realizó
  lexicon: HALOT
  rationale: La secuencia totalizadora se conserva de manera directa. «Hizo» mantiene la amplitud de la cláusula sin sobreinterpretar el contenido de sus acciones.
- source_word: וְכָל גְּבוּרָתוֹ
  english_pob_choice: and all his might
  chosen_spanish: y toda su valentía
  alternatives_spanish:
  - y todo su poder
  - y todas sus hazañas
  - y toda su fuerza
  lexicon: HALOT
  rationale: גְּבוּרָה puede significar fuerza, valor o hazañas poderosas. Aquí, en un resumen real, «valentía» retiene el matiz de capacidad heroica. Se preserva la tensión semántica documentada, sin reducirla a una sola idea demasiado estrecha.
- source_word: הֲלוֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no están
  alternatives_spanish:
  - ¿no es verdad que están
  - ¿acaso no están
  lexicon: HALOT
  rationale: La pregunta retórica se expresa de forma natural en español con «¿no están…?», manteniendo la expectativa de respuesta afirmativa.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - anotados
  lexicon: HALOT
  rationale: El participio pasivo comunica un estado de inscripción documental. «Escritos» es la equivalencia más directa y idiomática en español.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - en el libro
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es literalmente «sobre», la fórmula archivística en español se expresa naturalmente con «en». «Libro» mantiene el valor de documento oficial, no necesariamente el libro canónico.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: the Book of the Chronicles
  chosen_spanish: el Libro de las Crónicas
  alternatives_spanish:
  - el libro de los anales
  - el libro de los hechos de los días
  lexicon: HALOT
  rationale: Se conserva el título tradicional equivalente para este registro real. En el contexto de Reyes, «Crónicas» remite al archivo histórico, no al libro canónico posterior, por lo que conviene mantener la designación establecida.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  lexicon: HALOT
  rationale: La relación titulativa se vierte con «de» por naturalidad en español. El plural «reyes» conserva el valor genérico del encabezado archivístico.
translation_notes:
  revision_awareness: El texto sigue de cerca el cierre formular de 2 Reyes 10:34 y conserva la distinción entre el archivo real citado y el libro canónico posterior. La nota sobre גְּבוּרָה mantiene abierta la alternativa semántica documentada por el POB en inglés.
  spanish_consistency_notes:
  - Se usa «Jehú» como forma española estándar del nombre propio.
  - Se mantiene «Libro de las Crónicas» para el registro real citado, con nota aclaratoria sobre su carácter annalístico.
  - Se evita «SEÑOR» y no hay referencia al nombre divino en este versículo.
  - La puntuación con raya larga ayuda a reflejar la pregunta retórica final del hebreo sin añadir contenido interpretativo.
