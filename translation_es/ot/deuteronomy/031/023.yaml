revisions:
- from: 'Y lo mandó a Josué, hijo de Nun, y le dijo: «Sé fuerte y valiente, porque tú introducirás a los hijos de Israel en la tierra que juré darles, y yo estaré contigo».'
  to: 'Y le ordenó a Josué, hijo de Nun, y le dijo: «Sé fuerte y valiente, porque tú introducirás a los hijos de Israel[a] en la tierra que les juré, y yo estaré contigo».'
  rationale: Se corrige una adición no presente en el hebreo («darles») para mantener fidelidad a la fuente y al rastro auditado del POB. También se mejora la naturalidad y precisión de la comisión verbal con «le ordenó a Josué». Se añade la nota alternativa para «los hijos de Israel», paralela a la nota del inglés POB y útil en español.
