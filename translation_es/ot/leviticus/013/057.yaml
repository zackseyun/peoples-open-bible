    text: O 'tejido' para la prenda, si se subraya el material más que el artículo de vestir.
    reason: lexical_alternative
  - marker: b
    text: Hebreo negaʿ, término técnico en Levítico para una lesión o mancha impura; tradicionalmente 'plaga' o 'marca de enfermedad'.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la sintaxis para reflejar mejor el hebreo: un solo mandato de quemar seguido por la identificación del objeto afectado. Se elimina la duplicación verbal, se mejora la naturalidad de la cláusula relativa, y se reubica la nota técnica sobre נגע al término español que realmente lo traduce (''lesión'').'
