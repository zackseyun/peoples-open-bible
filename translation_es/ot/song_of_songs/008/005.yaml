base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/008/005.yaml
  text: Who is this coming up from the wilderness[a], leaning on her beloved? Under the apple tree I awakened you; there your mother was in labor with you[c][b]; there she who bore you was in labor.
  footnotes:
  - marker: a
    text: Or possibly, 'Under the apricot tree'; the exact species denoted by the Hebrew word is uncertain, though 'apple tree' is the traditional rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'I aroused you'; the Hebrew may carry a nuance beyond simple waking in this love-poetry context.
    reason: alternative_reading
  - marker: c
    text: The speaker likely shifts in the middle of the verse from an observing voice to direct address, and the exact speaker is not explicit in Hebrew.
    reason: alternative_reading
