translation:
  language: es
  text: Y envió cartas a todas las provincias del rey[a], a cada provincia en su propia escritura y a cada pueblo en su propia lengua[b], para que todo hombre fuera señor en su casa[c] y hablara la lengua de su pueblo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas las provincias reales».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «en su propia escritura ... en su propia lengua», subrayando que el decreto se distribuyó en formas apropiadas para cada provincia y cada pueblo.
    reason: cultural_note
  - marker: c
    text: 'O: «tuviera autoridad en su casa». El hebreo dice «todo hombre», pero en el contexto el decreto se refiere a la autoridad doméstica en el matrimonio.'
    reason: lexical_alternative
  - marker: d
    text: La cláusula final puede significar que cada hombre debía hablar la lengua de su propio pueblo, o más ampliamente que el orden doméstico debía reflejar su identidad lingüística.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: And he sent
  chosen_spanish: Y envió
  alternatives_spanish:
  - Entonces envió
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce la acción principal en pasado; en español, 'Y envió' conserva el avance secuencial sin añadir matiz interpretativo innecesario.
- source_word: סְפָרִים
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - documentos
  - despachos
  lexicon: HALOT
  rationale: En un contexto administrativo real, 'cartas' comunica de modo natural comunicaciones escritas oficiales. 'Documentos' sería más genérico y menos preciso para un decreto enviado.
- source_word: כָּל מְדִינוֹת הַמֶּלֶךְ
  english_pob_choice: all the provinces of the king
  chosen_spanish: todas las provincias del rey
  alternatives_spanish:
  - todas las provincias del rey
  - las provincias del rey
  lexicon: HALOT
  rationale: Mantiene el alcance total de 'all' y conserva la relación de posesión del hebreo. 'Del rey' es la forma idiomática en español para la expresión constructa.
- source_word: אֶל מְדִינָה וּמְדִינָה
  english_pob_choice: to each province
  chosen_spanish: a cada provincia
  alternatives_spanish:
  - a provincia tras provincia
  - a toda provincia
  lexicon: HALOT
  rationale: La repetición distributiva se resuelve de forma natural con 'a cada provincia', que preserva la idea de individualidad sin sonar mecánico.
- source_word: כִּכְתָבָהּ
  english_pob_choice: in its own script
  chosen_spanish: conforme a su escritura
  alternatives_spanish:
  - en su propia escritura
  - según su escritura
  lexicon: HALOT
  rationale: '''Escritura'' permite abarcar el sistema gráfico o la forma escrita correspondiente a cada provincia. ''Conforme a'' refleja bien el sentido distributivo del prefijo sin fijar demasiado si se trata de alfabeto, ortografía o forma escrita.'
- source_word: וְאֶל עַם וָעָם
  english_pob_choice: and to each people
  chosen_spanish: y a cada pueblo
  alternatives_spanish:
  - y a cada pueblo
  - y a cada gente
  lexicon: HALOT
  rationale: '''Pueblo'' es más natural y más claro en español que una repetición literal de ''pueblo'' o ''nación'' con matiz político. Conserva el forceje distributivo de ''cada''.'
- source_word: כִּלְשׁוֹנוֹ
  english_pob_choice: in its own language
  chosen_spanish: conforme a su lengua
  alternatives_spanish:
  - en su propia lengua
  - según su idioma
  lexicon: HALOT
  rationale: '''Lengua'' conserva el paralelismo con ''escritura'' y refleja היטב la noción de idioma/tongue. ''Conforme a'' mantiene la distribución por grupos sin forzar una sola lectura técnica.'
- source_word: כָּל אִישׁ
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - cada hombre
  - todo varón
  lexicon: HALOT
  rationale: El hebreo es masculino singular distributivo. 'Todo hombre' es fiel y natural; 'cada hombre' también sería posible, pero 'todo' suena mejor en esta cláusula legal.
- source_word: שֹׂרֵר
  english_pob_choice: master
  chosen_spanish: fuera señor
  alternatives_spanish:
  - tuviera autoridad
  - gobernara
  lexicon: HALOT
  rationale: '''Señor'' reproduce la idea de dominio/autoridad doméstica sin perder la fuerza semántica del participio. Se evita ''siervo'' o ''esclavo'' porque el término aquí no significa servidumbre sino ejercer mando.'
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his own house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su propia casa
  - en su hogar
  lexicon: HALOT
  rationale: '''En su casa'' mantiene la referencia doméstica directa y es idiomático en español. El posesivo ya está claro por ''su''; añadir ''propia'' sería redundante.'
- source_word: וּמְדַבֵּר
  english_pob_choice: and speak
  chosen_spanish: y hablara
  alternatives_spanish:
  - y hable
  - y hable hablando
  lexicon: HALOT
  rationale: Se integra dentro de la finalidad del decreto con subjuntivo para español fluido ('para que...'). El verbo continúa la misma esfera normativa de la primera cláusula.
- source_word: כִּלְשׁוֹן עַמּוֹ
  english_pob_choice: the language of his own people
  chosen_spanish: la lengua de su pueblo
  alternatives_spanish:
  - el idioma de su pueblo
  - la lengua de su propia gente
  lexicon: HALOT
  rationale: La frase final conserva el vínculo entre idioma e identidad del grupo. 'Lengua' mantiene el eco del hebreo לשון y, junto con 'pueblo', deja abierta la referencia a identidad étnica o comunitaria.
theological_decisions:
- issue: El alcance de 'todo hombre' y la autoridad en el hogar
  english_pob_reading: The Hebrew says 'every man,' but in context the decree concerns household authority in marriage.
  chosen_spanish_reading: todo hombre fuera señor en su casa
  alternative_spanish_readings:
  - todo hombre tuviera autoridad en su casa
  - todo esposo gobernara en su casa
  rationale: Se conserva la amplitud literal de 'todo hombre' sin convertirlo de antemano en 'esposo'. La referencia doméstica del contexto queda implícita por 'en su casa', pero el texto español no estrecha indebidamente el hebreo.
  doctrine_reference: Estructura familiar y autoridad doméstica en el marco narrativo de Ester; no se formula como norma doctrinal universal.
- issue: 'La cláusula sobre lengua: posibilidad de identidad lingüística o norma doméstica'
  english_pob_reading: The final clause may mean either that each man was to speak the language of his own people, or more broadly that household order should reflect the husband's linguistic identity.
  chosen_spanish_reading: y hablara la lengua de su pueblo
  alternative_spanish_readings:
  - y hablara en la lengua de su pueblo
  - y usara la lengua de su pueblo en su casa
  rationale: Se mantiene la ambigüedad documental del hebreo, sin reducir la frase a una interpretación más estrecha que la evidenciada por el texto. 'La lengua de su pueblo' preserva tanto el sentido lingüístico como el vínculo identitario.
  doctrine_reference: No aplica como doctrina; se trata de una nota de lectura semántica y social del decreto.
translation_notes:
  revision_awareness: Comparé el hebreo masorético (WLC) con el audit trail inglés de la POB. La versión inglesa se mantiene sin revisiones; por eso la propuesta española sigue de cerca sus decisiones lexicográficas y sus notas, conservando las tensiones interpretativas de la cláusula final y la referencia doméstica de la autoridad masculina.
  spanish_consistency_notes:
  - He usado 'Yahvé' no porque aparezca aquí, sino como norma general del proyecto; este versículo no contiene el Tetragrámaton.
  - '''Lengua'' y ''escritura'' se coordinan para mantener el paralelismo del hebreo.'
  - La puntuación y el subjuntivo español ('para que...') adaptan la finalidad del decreto sin alterar su contenido.
