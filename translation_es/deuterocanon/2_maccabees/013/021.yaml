translation:
  language: es
  text: Pero Rodoco[a], de las filas judías[b], reveló los secretos a los enemigos; fue buscado, apresado y encarcelado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los misterios'; aquí el griego probablemente se refiere a planes secretos o información confidencial, no a misterios religiosos.
    reason: lexical_alternative
  - marker: b
    text: O 'del contingente judío'. La expresión griega indica que Rodoco pertenecía al grupo o bando judío.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσήγγειλεν
  english_pob_choice: disclosed
  chosen_spanish: reveló
  alternatives_spanish:
  - dio a conocer
  - divulgó
  - delató
  lexicon: LSJ
  rationale: El verbo griego expresa comunicar o dar a conocer algo a otros. En este contexto de traición, 'reveló' conserva la idea de hacer conocido lo que era confidencial sin añadir por sí mismo la carga interpretativa fuerte de 'delató' o 'traicionó'.
- source_word: τὰ μυστήρια
  english_pob_choice: the secrets
  chosen_spanish: los secretos
  alternatives_spanish:
  - los misterios
  - los asuntos confidenciales
  lexicon: LSJ
  rationale: Aquí μυστήρια no apunta a 'misterios' religiosos, sino a información oculta o reservada. 'Los secretos' sigue de cerca la decisión inglesa y es natural en español contemporáneo.
- source_word: τοῖς πολεμίοις
  english_pob_choice: to the enemies
  chosen_spanish: a los enemigos
  alternatives_spanish:
  - a los adversarios
  - a las fuerzas enemigas
  lexicon: LSJ
  rationale: La dativo plural se entiende de forma directa como destinatarios de la información. 'A los enemigos' es claro, sobrio y fiel al contexto bélico.
- source_word: Ῥόδοκος
  english_pob_choice: Rhodocus
  chosen_spanish: Rodoco
  alternatives_spanish:
  - Rhodocus
  lexicon: conventional transliteration
  rationale: En español se adapta el nombre a una transliteración más natural y legible. Se mantiene la referencia al nombre propio griego sin introducir una forma interpretativa.
- source_word: ἐκ τῆς Ἰουδαϊκῆς τάξεως
  english_pob_choice: from the Jewish ranks
  chosen_spanish: de las filas judías
  alternatives_spanish:
  - del contingente judío
  - del grupo judío
  - del bando judío
  lexicon: LSJ
  rationale: τάξις aquí denota un grupo o formación, no una 'orden' religiosa. 'Filas judías' comunica pertenencia al lado judío y conserva la imagen de alineamiento grupal. Se evita 'orden' por su posible carga eclesiástica en español.
- source_word: ἀνεζητήθη
  english_pob_choice: was sought out
  chosen_spanish: fue buscado
  alternatives_spanish:
  - fue rastreado
  - fue buscado con diligencia
  lexicon: LSJ
  rationale: El pasivo indica que otros lo buscaron. 'Fue buscado' mantiene la sencillez narrativa y no añade una intensidad que el verbo por sí solo no exige.
- source_word: κατελήμφθη
  english_pob_choice: seized
  chosen_spanish: apresado
  alternatives_spanish:
  - aprendido
  - capturado
  - detenido
  lexicon: LSJ
  rationale: El verbo expresa aprehensión o captura. 'Apresado' conserva el matiz formal de ser tomado por la fuerza y evita el coloquialismo de 'atrapado'.
- source_word: κατεκλείσθη
  english_pob_choice: imprisoned
  chosen_spanish: internado en prisión
  alternatives_spanish:
  - encerrado
  - confinado
  - puesto en prisión
  lexicon: LSJ
  rationale: Literalmente significa 'encerrado'. En el contexto, la secuencia culmina en detención y reclusión; 'internado en prisión' expresa el resultado sin perder el sentido de encierro. Se evita simplificarlo demasiado a solo 'encerrado' para no diluir la consecuencia legal.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido confirmado por el audit trail inglés y la revisión más reciente: προσήγγειλεν como comunicación de información reservada; τὰ μυστήρια como ''secretos'' en contexto militar-político; ἐκ τῆς Ἰουδαϊκῆς τάξεως como pertenencia a un grupo/contingente judío; y κατελήμφθη / κατεκλείσθη como aprehensión seguida de reclusión. Se evitó traducir mecánicamente desde el inglés cuando el español requería una formulación más natural, manteniendo el mismo alcance semántico.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa 'filas judías' para τάξις, evitando 'orden' por ambigüedad eclesiástica.
  - 'Se preserva la secuencia narrativa de tres verbos en pasiva: buscado, apresado e internado en prisión.'
  - El nombre propio se adapta a una forma española legible sin alterar la identidad del referente.
