  doctrine_reference: 'PHILOSOPHY.md: preserve the source text transparently rather than harmonizing.'
- issue: '''the spirit of Beliar'' as personal evil power or generalized wicked impulse'
  chosen_reading: Retained as 'the spirit of Beliar.'
  alternative_readings:
  - an evil spirit
  - the spirit of worthlessness
  rationale: In the Testaments, Beliar/Belial often functions as a named hostile spiritual power. Transliteration preserves the literary-theological world of the text without reduction.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it.'
