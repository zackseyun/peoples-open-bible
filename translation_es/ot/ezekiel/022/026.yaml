translation:
  language: es
  text: Sus sacerdotes han hecho violencia a mi ley y han profanado mis cosas sagradas[a]. No han distinguido entre lo santo y lo común, y no han dado a conocer la diferencia entre lo impuro y lo puro. Han apartado sus ojos de mis sábados, y he sido profanado entre ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre lo santo y lo profano». El hebreo aquí, con más precisión, apunta a lo común u ordinario en contraste con lo santo.
    reason: lexical_alternative
  - marker: b
    text: O «fui profanado en medio de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: חָמְסוּ
  english_pob_choice: have done violence to
  chosen_spanish: han hecho violencia a
  alternatives_spanish:
  - han violado
  - han agraviado
  lexicon: HALOT
  rationale: El verbo חמס expresa daño violento, abuso o atropello; «han hecho violencia a» conserva esa fuerza sin suavizarla.
- source_word: תוֹרָתִי
  english_pob_choice: my law
  chosen_spanish: mi ley
  alternatives_spanish:
  - mi instrucción
  - mi Torá
  lexicon: HALOT
  rationale: En una acusación profética con función sacerdotal, «ley» es claro y conciso en español y mantiene el valor normativo de תוֹרָה.
- source_word: וַיְחַלְּלוּ
  english_pob_choice: have profaned
  chosen_spanish: han profanado
  alternatives_spanish:
  - han desecrado
  - han mancillado
  lexicon: HALOT
  rationale: חלל en piel suele expresar profanar o contaminar lo santo; «han profanado» conserva el campo léxico de santidad del pasaje.
- source_word: קָדָשַׁי
  english_pob_choice: my holy things
  chosen_spanish: mis cosas santas
  alternatives_spanish:
  - mis cosas sagradas
  - mis santidades
  lexicon: HALOT
  rationale: El plural abarca objetos o realidades del ámbito santo de Yahvé; «cosas santas» es transparente y no estrecha indebidamente el referente.
- source_word: בֵּין קֹדֶשׁ לְחֹל
  english_pob_choice: between the holy and the common
  chosen_spanish: entre lo santo y lo común
  alternatives_spanish:
  - entre lo santo y lo profano
  - entre lo sagrado y lo ordinario
  lexicon: HALOT
  rationale: Se conserva la oposición cultual entre lo santo y lo no santo. «Lo común» refleja mejor חֹל que «profano», porque no implica necesariamente maldad moral.
- source_word: הִבְדִּילוּ
  english_pob_choice: have not distinguished
  chosen_spanish: no han distinguido
  alternatives_spanish:
  - no han separado
  - no han hecho distinción
  lexicon: HALOT
  rationale: La función sacerdotal aquí exige discernir y diferenciar categorías cultuales; «han distinguido» es natural y fiel.
- source_word: וּבֵין הַטָּמֵא לְטָהוֹר
  english_pob_choice: between the unclean and the clean
  chosen_spanish: entre lo impuro y lo puro
  alternatives_spanish:
  - entre lo inmundo y lo limpio
  - entre lo contaminado y lo puro
  lexicon: HALOT
  rationale: En español moderno «impuro/puro» transmite mejor las categorías rituales que «inmundo/limpio», sin perder el contraste sacerdotal.
- source_word: הוֹדִיעוּ
  english_pob_choice: have not made known the difference
  chosen_spanish: no han dado a conocer la diferencia
  alternatives_spanish:
  - no han hecho saber la diferencia
  - no han enseñado la diferencia
  lexicon: HALOT
  rationale: El verbo significa «hacer saber»; «dar a conocer» preserva esa fuerza y evita interpretar demasiado el acto como mera docencia.
- source_word: וּמִשַׁבְּתוֹתַי
  english_pob_choice: from my Sabbaths
  chosen_spanish: de mis sábados
  alternatives_spanish:
  - de mis días de reposo
  - de mis días de sábado
  lexicon: HALOT
  rationale: Se conserva el plural hebreo de los días sagrados de reposo. «Sábados» es literal y reconocido, aunque la nota puede aclarar el matiz observancial.
- source_word: הֶעְלִימוּ עֵינֵיהֶם
  english_pob_choice: have hidden their eyes from
  chosen_spanish: han apartado los ojos de
  alternatives_spanish:
  - han ocultado sus ojos de
  - han ignorado
  lexicon: HALOT
  rationale: La imagen idiomática expresa desatención voluntaria; «han apartado los ojos de» es natural en español y mantiene el matiz deliberado.
- source_word: וָאֵחַל
  english_pob_choice: I have been profaned
  chosen_spanish: he sido profanado
  alternatives_spanish:
  - fui profanado
  - he quedado profanado
  lexicon: HALOT
  rationale: La lectura pasiva comunica que la santidad de Yahvé es profanada en medio del pueblo por la conducta sacerdotal; el perfecto español mantiene el valor resultativo.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - dentro de ellos
  lexicon: HALOT
  rationale: «Entre ellos» es fluido en español y conserva la idea comunitaria de la profanación en su presencia.
theological_decisions:
- issue: Cómo traducir חֹל en la oposición cultual
  english_pob_reading: common
  chosen_spanish_reading: común
  alternative_spanish_readings:
  - profano
  - ordinario
  rationale: La oposición es entre lo santo y lo no santo en términos cultuales. «Común» evita cargar la palabra con una connotación moral excesiva y sigue de cerca el análisis del texto hebreo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de וָאֵחַל al final del versículo
  english_pob_reading: I have been profaned among them
  chosen_spanish_reading: he sido profanado entre ellos
  alternative_spanish_readings:
  - fui profanado en medio de ellos
  - he quedado profanado entre ellos
  rationale: 'La cláusula resume el efecto del abuso sacerdotal: la santidad de Yahvé queda profanada en la comunidad. La pasiva en español mantiene esa idea sin forzar una vocalización más especulativa.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «taught the difference» a «made known the difference» para reflejar mejor הוֹדִיעוּ; en español se siguió ese ajuste con «dado a conocer la diferencia». También se mantuvo la lectura «common» para חֹל y la pasiva final para וָאֵחַל, ambas corroboradas por el trail revisado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino conforme a la política POB en español.
  - 'Se prefirieron términos cultuales consistentes: «santo», «común», «impuro», «puro», «profanado».'
  - Se evitó «SEÑOR» como máscara del nombre divino, según la pauta del proyecto.
  - El plural «mis sábados» se conservó por fidelidad al hebreo y para no perder el carácter observancial del término.
