revisions:
- from: Así son los caminos de todo el que se aprovecha con ganancia injusta[a]; le quita la vida a sus poseedores.
  to: Así son los caminos de todo el que obtiene ganancia injusta[a]; ella les quita la vida a quienes la poseen.
  rationale: Se reemplaza la construcción forzada 'se aprovecha con ganancia injusta' por 'obtiene ganancia injusta', que comunica de forma natural el sentido de lucro codicioso o deshonesto de בֹּצֵעַ בָּצַע. Se añade 'ella' en la segunda cláusula para aclarar en español que el sujeto es la ganancia injusta, en línea con la explicación léxica del POB inglés. 'A quienes la poseen' mejora la naturalidad sin perder el sentido de בְּעָלָיו.
