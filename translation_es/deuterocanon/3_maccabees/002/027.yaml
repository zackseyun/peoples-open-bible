translation:
  language: es
  text: Se propuso públicamente difundir oprobio contra la nación; habiendo levantado una estela[a] en la torre junto al patio[b], grabó una inscripción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Estela» precisa el sentido de στήλην: una piedra erigida, apta para llevar una inscripción; también puede decirse «pilar» o «monumento».'
    reason: lexical_alternative
  - marker: b
    text: «Patio» traduce αὐλή de manera amplia. El término puede referirse también a un recinto o a un patio de palacio; el griego no especifica más.
    reason: cultural_note
lexical_decisions:
- source_word: προέθετο
  english_pob_choice: publicly purposed
  chosen_spanish: se propuso
  alternatives_spanish:
  - resolvió públicamente
  - se dispuso
  - se propuso públicamente
  lexicon: LSJ
  rationale: El griego expresa una intención/decisión previa; en español, «se propuso» comunica bien el propósito deliberado sin convertirlo en un decreto ni en una simple sugerencia. Mantengo el adverbio en la frase siguiente para no forzar la sintaxis.
- source_word: δημοσίᾳ
  english_pob_choice: publicly
  chosen_spanish: públicamente
  alternatives_spanish:
  - en público
  - abiertamente
  lexicon: LSJ
  rationale: Adverbio de acción abierta ante todos; «públicamente» es natural y conserva el matiz de exhibición pública.
- source_word: διαδοῦναι
  english_pob_choice: to spread
  chosen_spanish: difundir
  alternatives_spanish:
  - propagar
  - divulgar
  - esparcir
  lexicon: LSJ
  rationale: En el contexto hostil, el verbo apunta a hacer circular la afrenta; «difundir» mantiene esa idea sin añadir un matiz demasiado técnico o periodístico.
- source_word: ψόγον
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - deshonra
  - censura
  lexicon: LSJ
  rationale: Aunque «reproche» es una opción directa, «oprobio» suena más natural en español para una vergüenza pública dirigida contra un pueblo, y conserva el sentido de deshonra verbalizada.
- source_word: ἔθνους
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la gente
  - el grupo étnico
  lexicon: LSJ
  rationale: En este contexto colectivo, «nación» conserva la idea corporativa del pueblo judío mejor que una forma más genérica. No hace falta explicitar «judía» porque el referente queda claro en la sección.
- source_word: στήλην
  english_pob_choice: a stele
  chosen_spanish: una estela
  alternatives_spanish:
  - un pilar
  - un monumento
  - una piedra con inscripción
  lexicon: LSJ
  rationale: «Estela» es el equivalente más preciso para στήλη en un contexto epigráfico. Mantiene la tensión documental del objeto inscrito mejor que «pilar» o «monumento».
- source_word: ἀναστήσας
  english_pob_choice: having set up
  chosen_spanish: habiendo levantado
  alternatives_spanish:
  - habiendo erigido
  - después de levantar
  - tras colocar
  lexicon: LSJ
  rationale: El participio aoristo indica una acción previa al grabado; «habiendo levantado» conserva esa anterioridad y encaja con el objeto monumental.
- source_word: ἐκόλαψεν
  english_pob_choice: he engraved
  chosen_spanish: grabó
  alternatives_spanish:
  - esculpió
  - incidió
  - inscribió
  lexicon: LSJ
  rationale: El verbo señala la acción de tallar/grabar sobre la estela; «grabó» es claro y suficientemente literal en español, sin perder el aspecto material del acto.
- source_word: γραφὴν
  english_pob_choice: an inscription
  chosen_spanish: una inscripción
  alternatives_spanish:
  - un escrito
  - una escritura
  - un texto
  lexicon: LSJ
  rationale: En el marco de una estela, γραφή significa el texto grabado; «inscripción» es la correspondencia idiomática más precisa.
- source_word: ἐπὶ τοῦ κατὰ τὴν αὐλὴν πύργου
  english_pob_choice: on the tower by the court
  chosen_spanish: sobre la torre junto al atrio
  alternatives_spanish:
  - sobre la torre junto al patio
  - sobre la torre del recinto
  - sobre la torre cerca del patio
  lexicon: LSJ
  rationale: «Atrio» representa αὐλή como patio o recinto cercado con una opción española amplia y digna. «Junto al atrio» preserva la relación espacial sin decidir indebidamente entre «palacio» y «patio».
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «proposed» por «purposed» para reflejar mejor προέθετο como intención o resolución. En español se siguió esa revisión con «se propuso», evitando fórmulas que sugieran mera propuesta pública. También se mantuvo la ambigüedad espacial de αὐλή sin sobreespecificarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no corresponde.
  - 'Se mantiene terminología epigráfica precisa: «estela» e «inscripción».'
  - Se evitó «Cristo»/«Mesías» por no ser pertinente al verso.
  - La construcción con participio se vierte en una secuencia natural en español, conservando la anterioridad de la acción de levantar la estela antes de grabar la inscripción.
