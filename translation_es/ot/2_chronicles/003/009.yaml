    rationale: La marca [a] aparece después de «oro» en «cincuenta siclos de oro[a]», pero el contenido de la nota trata sobre el significado de עֲלִיּוֹת («aposentos altos» / «upper chambers»). Esto confunde al lector y no cumple la disciplina de anclaje exigida.
  - severity: medium
