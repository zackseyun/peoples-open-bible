translation:
  language: es
  text: 'Y dijo[a]: «Has pedido una cosa difícil. Si me ves cuando yo sea llevado de tu lado, así será para ti; pero si no, no será».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si me ves siendo llevado de tu lado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְשִׁיתָ לִשְׁאוֹל
  english_pob_choice: You have asked a hard thing
  chosen_spanish: Has pedido una cosa difícil
  alternatives_spanish:
  - Has pedido algo difícil
  - Has hecho una petición קשה
  lexicon: HALOT
  rationale: El hebreo expresa una petición ardua o exigente; en español, «has pedido una cosa difícil» conserva el sentido idiomático sin volverlo mecánico ni perder la fuerza de la respuesta de Elías.
- source_word: אִם תִּרְאֶה אֹתִי לֻקָּח מֵאִתָּךְ
  english_pob_choice: If you see me being taken from you
  chosen_spanish: Si me ves cuando sea llevado de ti
  alternatives_spanish:
  - Si me ves siendo llevado de ti
  - Si me ves al ser tomado de ti
  lexicon: HALOT
  rationale: El participio pasivo לֻקָּח apunta a una acción de ser llevado/tomado. «Cuando sea llevado de ti» mantiene el valor temporal-condicional y la pasiva sin forzar la agencia.
- source_word: יְהִי לְךָ כֵן
  english_pob_choice: it will be so for you
  chosen_spanish: te será así
  alternatives_spanish:
  - así te será
  - será así para ti
  lexicon: HALOT
  rationale: La fórmula hebrea afirma que el resultado pedido se concederá. «Te será así» es una equivalencia natural y breve que conserva la relación con «para ti».
- source_word: וְאִם אַיִן לֹא יִהְיֶה
  english_pob_choice: but if not, it will not be
  chosen_spanish: pero si no, no será así
  alternatives_spanish:
  - pero si no, no será
  - y si no, no será así
  lexicon: HALOT
  rationale: Elipsis hebrea de la consecuencia. En español conviene explicitar «así» para referir claramente al resultado solicitado, sin añadir contenido ajeno al texto.
- source_word: וַיֹּאמֶר
  english_pob_choice: He said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Y respondió
  - Entonces dijo
  lexicon: BDB/HALOT
  rationale: La simple forma narrativa del verbo se traduce con una coordinación natural en español. No se añade un sujeto explícito porque el contexto ya lo identifica como Elías.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto principal. No se hicieron cambios doctrinales; la revisión afecta solo la ancla de la nota y la formulación española para mantener la equivalencia con el hebreo y con el audit trail en inglés.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en otros contextos del proyecto, pero aquí no aparece el nombre divino.
  - Se mantuvo un registro sobrio y bíblico, evitando arcaísmos innecesarios.
  - La nota [a] está anclada directamente en la cláusula condicional, donde el inglés POB preserva una alternativa de lectura.
