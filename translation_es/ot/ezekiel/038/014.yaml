revisions:
- from: 'Por tanto, profetiza[a], hijo de hombre, y di a Gog: ‘Así dice el Señor Yahvé: En aquel día, cuando mi pueblo Israel habite[b] con seguridad[c], ¿no lo sabrás?’'
  to: 'Por tanto, profetiza[a], hijo de hombre, y di a Gog: «Así dice el Señor Dios Yahvé: En aquel día, cuando mi pueblo Israel viva[b] seguro[c], ¿no lo sabrás?»'
  rationale: Se corrige la forma divina a «el Señor Dios Yahvé» para reflejar mejor אֲדֹנָי יְהוִה conforme a la política de usar «Yahvé» sin perder el título precedente. Se repara la nota [b], que tenía un error claro, y se mejora לָבֶטַח con «seguro», más natural y menos ambiguo que «con seguridad» en este contexto. No se requieren cambios doctrinalmente complejos ni adjudicación adicional.
