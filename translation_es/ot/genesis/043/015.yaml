translation:
  language: es
  text: Así que los hombres tomaron este regalo[a], y tomaron el doble del dinero en su mano[b], y a Benjamín. Luego se levantaron, descendieron a Egipto[c] y estuvieron ante José.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo מִנְחָה; aquí se entiende como un obsequio conciliatorio, no como una ofrenda cultual.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “en su mano”; es un modismo hebreo para indicar que lo llevaban consigo o lo tenían en posesión.
    reason: lexical_alternative
  - marker: c
    text: “Descendieron a Egipto” conserva el modismo geográfico hebreo de viaje desde Canaán hacia Egipto.
    reason: cultural_note
lexical_decisions:
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los hermanos
  lexicon: HALOT
  rationale: El hebreo dice explícitamente “los hombres”. Aunque el contexto identifica a estos hombres como los hermanos de José, conservé la designación del texto para no sustituir el referente por una glosa contextual innecesaria.
- source_word: הַמִּנְחָה
  english_pob_choice: gift
  chosen_spanish: regalo
  alternatives_spanish:
  - presente
  - ofrenda
  - tributo
  lexicon: HALOT
  rationale: En este episodio narrativo, מִנְחָה designa un obsequio conciliatorio llevado a un superior. “Regalo” comunica bien el sentido natural en español; “ofrenda” sonaría cultual y “tributo” cargaría el término con un matiz político más fuerte de lo que exige el contexto.
- source_word: מִשְׁנֶה כֶּסֶף
  english_pob_choice: double the money
  chosen_spanish: el doble del dinero
  alternatives_spanish:
  - una segunda cantidad de dinero
  - dos veces tanto dinero
  lexicon: HALOT
  rationale: La construcción expresa una cantidad duplicada respecto de la anterior. “El doble del dinero” conserva con claridad el valor cuantitativo y suena natural en español.
- source_word: כֶּסֶף
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  lexicon: HALOT
  rationale: Aunque literalmente puede ser “plata”, en un contexto de transacción la referencia funcional es a dinero. En español “dinero” transmite mejor la idea de pago que “plata”, que podría sonar ambigua o regional.
- source_word: בְיָדָם
  english_pob_choice: in their hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - con ellos
  - en su posesión
  lexicon: HALOT
  rationale: Conservé el singular idiomático “en su mano” para reflejar de cerca la expresión hebrea y su sentido de portar o llevar algo consigo. En español puede sonar singular aunque se refiera al grupo, por lo que mantengo la literalidad controlada del giro.
- source_word: וְאֶת בִּנְיָמִן
  english_pob_choice: and Benjamin
  chosen_spanish: y a Benjamín
  alternatives_spanish:
  - junto con Benjamín
  lexicon: HALOT
  rationale: El marcador de objeto directo añade a Benjamín a la lista de lo que llevaron. En español requiere la preposición personal “a”; no añadí más explicación porque el hebreo coordina simplemente el nombre propio.
- source_word: וַיָּקֻמוּ
  english_pob_choice: they arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron en pie
  - partieron
  lexicon: HALOT
  rationale: El verbo básico significa levantarse o ponerse de pie. En una secuencia de viaje, “se levantaron” mantiene la transición narrativa sin sobreinterpretar el movimiento como “partieron”.
- source_word: וַיֵּרְדוּ מִצְרַיִם
  english_pob_choice: went down to Egypt
  chosen_spanish: descendieron a Egipto
  alternatives_spanish:
  - bajaron a Egipto
  - fueron a Egipto
  lexicon: HALOT
  rationale: Conservé el verbo de descenso para reflejar el modismo geográfico hebreo, donde se “baja” de Canaán a Egipto. “Descendieron” preserva ese valor idiomático y sigue siendo comprensible en español.
- source_word: וַיַּעַמְדוּ לִפְנֵי יוֹסֵף
  english_pob_choice: stood before Joseph
  chosen_spanish: se pusieron delante de José
  alternatives_spanish:
  - comparecieron ante José
  - estuvieron ante José
  lexicon: HALOT
  rationale: La frase expresa presentarse en la presencia de alguien, con cierta formalidad. “Se pusieron delante de José” mantiene la imagen espacial sin perder naturalidad; “comparecieron” sería más interpretativo y administrativo.
theological_decisions:
- issue: Si “מִנְחָה” debe leerse como regalo conciliatorio o como ofrenda/tributo
  english_pob_reading: gift
  chosen_spanish_reading: regalo
  alternative_spanish_readings:
  - presente
  - tributo
  - ofrenda
  rationale: No se trata de un acto cultual, sino de un obsequio destinado a apaciguar o ganar favor ante una autoridad. “Regalo” evita la connotación religiosa de “ofrenda” y también evita fijar demasiado la relación política con “tributo”.
  doctrine_reference: Génesis 43:15 en su contexto narrativo; uso léxico de מִנְחָה en relatos patriarcales
translation_notes:
  revision_awareness: Tomé en cuenta la revisión del inglés que mantuvo explícita la repetición verbal (“they took”) para reflejar el doble לקח del hebreo. En español conservé esa repetición con “tomaron... y tomaron...” para respetar la secuencia verbal y la listación de acciones del texto fuente.
  spanish_consistency_notes:
  - Usé “Yahvé” solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Mantuve “José” y “Benjamín” con la forma española estándar de nombres propios bíblicos.
  - Elegí un español neutral y culto, evitando arcaísmos innecesarios y preservando el orden narrativo del hebreo.
