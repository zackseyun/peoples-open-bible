translation:
  language: es
  text: Pero en todo el deseo de tu alma[a], podrás degollar y comer carne, conforme a la bendición de Yahvé tu Dios, que él te ha dado, dentro de todas tus puertas. El impuro y el puro podrán comerla[b], como la gacela y como el ciervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en todo el deseo de tu alma»; esto es, cuando lo desees.'
    reason: lexical_alternative
  - marker: b
    text: «Dentro de todas tus puertas» es un modismo hebreo para decir dentro de tus ciudades o asentamientos.
    reason: cultural_note
lexical_decisions:
- source_word: רַק
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sólo
  - Sin embargo
  lexicon: HALOT
  rationale: Introduce la restricción o contraste con el mandato anterior. «Pero» conserva bien el valor adversativo y suena natural en español.
- source_word: בְּכָל אַוַּת נַפְשְׁךָ
  english_pob_choice: in all the desire of your soul
  chosen_spanish: en todo el deseo de tu alma
  alternatives_spanish:
  - según todo el deseo de tu alma
  - cuando tu alma desee
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de נֶפֶשׁ como «alma» y la construcción de deseo, sin reducirla a una simple paráfrasis temporal.
- source_word: תִּזְבַּח
  english_pob_choice: you may slaughter
  chosen_spanish: podrás sacrificar
  alternatives_spanish:
  - podrás degollar
  - podrás matar
  lexicon: HALOT
  rationale: Aquí la idea es el sacrificio/degüello de animales para comer, no un «matar» genérico. «Podrás sacrificar» comunica la acción permitida en contexto y evita una dureza innecesaria en español.
- source_word: וְאָכַלְתָּ בָשָׂר
  english_pob_choice: and eat meat
  chosen_spanish: y comer carne
  alternatives_spanish:
  - y comer carne de animal
  - y comer carne/fleshes
  lexicon: HALOT
  rationale: בָשָׂר en este contexto se refiere a la carne de animal como alimento; «carne» es la equivalencia normal y fiel en español.
- source_word: כְּבִרְכַּת יְהוָה אֱלֹהֶיךָ אֲשֶׁר נָתַן לְךָ
  english_pob_choice: according to the blessing of Yahweh your God that he has given you
  chosen_spanish: conforme a la bendición de Yahvé tu Dios, que él te ha dado
  alternatives_spanish:
  - según la bendición de Yahvé tu Dios que te ha dado
  - como Yahvé tu Dios te ha bendecido
  lexicon: HALOT
  rationale: Se conserva el sustantivo «bendición» y el sentido de provisión concedida por Dios. «Conforme a» refleja bien el comparativo hebreo sin volverlo una simple fórmula causal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, evitando el reemplazo por «SEÑOR».
- source_word: בְּכָל שְׁעָרֶיךָ
  english_pob_choice: within all your gates
  chosen_spanish: dentro de todas tus puertas
  alternatives_spanish:
  - en todas tus puertas
  - dentro de todas tus ciudades
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «puertas» en lugar de domesticarla de entrada a «ciudades». «Dentro de» expresa el alcance local del idioma hebreo.
- source_word: הַטָּמֵא וְהַטָּהוֹר
  english_pob_choice: The unclean and the clean alike
  chosen_spanish: El impuro y el puro
  alternatives_spanish:
  - El inmundo y el limpio
  - Tanto el impuro como el puro
  lexicon: HALOT
  rationale: «Impuro/puro» comunica el estatus ritual, no un juicio moral. En español suena más natural que «inmundo/limpio» y mantiene el contraste técnico.
- source_word: יֹאכְלֶנּוּ
  english_pob_choice: may eat it
  chosen_spanish: podrán comerla
  alternatives_spanish:
  - podrán comerlo
  - la comerán
  lexicon: HALOT
  rationale: El pronombre retoma la carne; en español femenino concuerda con «carne», y el modal expresa permiso, como en el audit trail inglés.
- source_word: כַּצְּבִי וְכָאַיָּל
  english_pob_choice: as the gazelle and as the deer
  chosen_spanish: como el ciervo y como el corzo
  alternatives_spanish:
  - como la gacela y como el ciervo
  - como el gamo y como el ciervo
  lexicon: HALOT
  rationale: Se conservan los dos animales de comparación. «Ciervo» y «corzo» son equivalentes claros en español y evitan una explicación interpretativa adicional.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se mantiene el nombre propio del pacto en lugar de enmascararlo con un título. Esto sigue la directriz del proyecto y preserva la referencia directa del texto hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Clasificación ritual de טָמֵא y טָהוֹר
  english_pob_reading: unclean and clean
  chosen_spanish_reading: impuro y puro
  alternative_spanish_readings:
  - inmundo y limpio
  - ceremonialmente impuro y puro
  rationale: El contraste es ritual/cultual, no moral. «Impuro y puro» mantiene la categoría bíblica con mayor claridad moderna; no se añade «ceremonialmente» porque el contexto ya la establece.
  doctrine_reference: Levítico 11; Deuteronomio 12
- issue: Relación entre permiso y consumo
  english_pob_reading: you may slaughter and eat
  chosen_spanish_reading: podrás sacrificar y comer
  alternative_spanish_readings:
  - podrás degollar y comer
  - podrás matar y comer
  rationale: El hebreo aquí concede libertad regulada para el consumo de carne; «podrás» expresa permiso, y «sacrificar»/«comer» mantiene la secuencia de acción sin sobrecargarla doctrinalmente.
  doctrine_reference: Deuteronomio 12:15
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del audit trail: se prefirió una correspondencia más cercana con la expresión hebrea de «in all the desire of your soul» y con la comparación final paralela. En español, eso llevó a conservar la imagen idiomática de «todo el deseo de tu alma» y a mantener comparaciones explícitas con «como... y como...» sin añadir explicación interpretativa en el cuerpo del texto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton conforme a la norma del proyecto.
  - Se mantuvo la distinción ritual «impuro/puro» para טָמֵא / טָהוֹר.
  - Se evitó «SEÑOR» y «Cristo» porque no aparecen en el verso ni están justificados por el audit trail.
  - La metáfora de «puertas» se preservó en el texto principal y se explicó en nota para lectores hispanohablantes.
