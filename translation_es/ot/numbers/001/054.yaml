    text: O ‘los israelitas’ o ‘los hijos de Israel’. El hebreo dice literalmente ‘los hijos de Israel’.
    reason: lexical_alternative
  revision_rationale: Se corrige el orden de la oración para un español más natural y se mantiene intacta la repetición enfática final del hebreo. Se repara la nota al pie para que presente claramente la alternativa idiomática (‘los israelitas’) y la forma literal (‘los hijos de Israel’) sin confusión.
