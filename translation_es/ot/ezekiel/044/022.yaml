translation:
  language: es
  text: No tomarán para sí como esposas a una viuda ni a una mujer divorciada, sino solamente vírgenes de la descendencia de la casa de Israel; sin embargo, podrán tomar a una viuda que haya quedado viuda de un sacerdote[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «una viuda que llegó a ser viuda de un sacerdote».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלְמָנָה
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - mujer viuda
  lexicon: HALOT
  rationale: El sentido básico es el de una mujer cuyo esposo ha muerto. «Viuda» es el equivalente natural y preciso en español, y se mantiene de forma consistente en ambas menciones.
- source_word: גְרוּשָׁה
  english_pob_choice: divorced woman
  chosen_spanish: mujer divorciada
  alternatives_spanish:
  - repudiada
  - mujer separada
  lexicon: HALOT
  rationale: La forma pasiva indica una mujer que ha sido divorciada. «Mujer divorciada» preserva el estado legal-marital con claridad moderna sin perder el matiz de pasividad.
- source_word: יִקְחוּ ... לְנָשִׁים
  english_pob_choice: take for themselves as wives
  chosen_spanish: tomar para sí como esposas
  alternatives_spanish:
  - casarse con
  - tomar como esposas
  lexicon: HALOT
  rationale: Se conserva el giro hebreo de «tomar» con el complemento «como esposas», porque tiene fuerza legal y formal. «Casarse con» sería posible, pero atenúa el lenguaje jurídico del original.
- source_word: כִּי אִם
  english_pob_choice: but only
  chosen_spanish: sino solamente
  alternatives_spanish:
  - pero solo
  - excepto
  lexicon: HALOT
  rationale: La construcción introduce una excepción restrictiva. «Sino solamente» marca con claridad la exclusión anterior y la única अनुमति permitida, en un español natural y solemne.
- source_word: בְּתוּלוֹת
  english_pob_choice: virgins
  chosen_spanish: vírgenes
  alternatives_spanish:
  - jóvenes vírgenes
  - doncellas
  lexicon: HALOT
  rationale: El término denota específicamente vírgenes, no solo mujeres jóvenes solteras. «Vírgenes» preserva esa especificidad sin eufemismo.
- source_word: מִזֶּרַע בֵּית יִשְׂרָאֵל
  english_pob_choice: from the offspring of the house of Israel
  chosen_spanish: de la descendencia de la casa de Israel
  alternatives_spanish:
  - de los descendientes de la casa de Israel
  - de la simiente de la casa de Israel
  lexicon: HALOT
  rationale: «זרע» expresa descendencia/linaje. «Descendencia» comunica bien esa idea en español y mantiene el matiz genealógico-covenantal de «casa de Israel».
- source_word: וְהָאַלְמָנָה אֲשֶׁר תִּהְיֶה אַלְמָנָה מִכֹּהֵן
  english_pob_choice: however, they may take a widow who is the widow of a priest
  chosen_spanish: pero podrán tomar una viuda que sea viuda de sacerdote
  alternatives_spanish:
  - excepto una viuda que haya quedado viuda de sacerdote
  - pero podrán tomar a la viuda de un sacerdote
  lexicon: HALOT
  rationale: El hebreo literalmente habla de una viuda que «llegue a ser viuda de un sacerdote». «Viuda de sacerdote» expresa en español la relación con el esposo fallecido sin añadir desarrollo interpretativo, y conserva la excepción legal.
- source_word: מִן in מִכֹּהֵן
  english_pob_choice: of
  chosen_spanish: de
  alternatives_spanish:
  - de parte de
  - procedente de
  lexicon: HALOT
  rationale: Aunque la preposición básica es «de/desde», aquí señala procedencia o relación marital. «De sacerdote» es la forma más concisa en español para expresar «widow of a priest».
theological_decisions:
- issue: Alcance de la regulación matrimonial sacerdotal
  english_pob_reading: Render the verse as priestly legislation without importing later doctrinal or moral conclusions beyond the text.
  chosen_spanish_reading: Traducir el versículo como una disposición legal sacerdotal, sin convertirla en una norma universal ni suavizar la restricción.
  alternative_spanish_readings:
  - Tratarlas como una preferencia general
  - Diluir la prohibición en una recomendación
  rationale: El contexto de Ezequiel 44 es legislación para el culto y el sacerdocio en la visión del templo. La traducción debe conservar el carácter jurídico de la regla y de su excepción, sin ampliarla ni minimizarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relación entre la viuda permitida y el sacerdote fallecido
  english_pob_reading: a widow who is the widow of a priest
  chosen_spanish_reading: una viuda que sea viuda de sacerdote
  alternative_spanish_readings:
  - la viuda de un sacerdote
  - una viuda cuyo esposo fue sacerdote
  rationale: 'La formulación mantiene el doble vínculo del hebreo: es viuda y lo es en relación con un sacerdote. Se conserva la tensión semántica del original sin resolverla por completo en una sola paráfrasis interpretativa.'
  doctrine_reference: HALOT; Hebrew syntax of Ezekiel 44:22
translation_notes:
  revision_awareness: Se siguió el contexto auditado del inglés POB, que ya optó por una traducción óptima y añadió una nota para la expresión hebrea más literal en la cláusula final. El español conserva la misma restricción legal, la misma excepción, y una nota alternativa para la relación marital del último segmento.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - «Vírgenes» se mantuvo para בְּתוּלוֹת, sin suavizar a «jóvenes» o «doncellas».
  - 'Se preservó el orden legal del original: prohibición general, excepción restrictiva, y excepción adicional final.'
  - No se sustituyó el lenguaje matrimonial formal por una paráfrasis más libre como «casarse con», para conservar el tono jurídico del pasaje.
