translation:
  language: es
  text: Pero cuando los ancianos dijeron sus palabras[a], los sirvientes quedaron muy avergonzados, porque nunca se había dicho tal cosa acerca de Susana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘tal declaración’ o ‘tal acusación’ acerca de Susana.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡνίκα δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: LSJ
  rationale: ἡνίκα introduce una cláusula temporal (‘cuando’), y δέ aporta transición narrativa. ‘Pero cuando’ conserva ese matiz sin sonar forzado en español.
- source_word: οἱ πρεσβῦται
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  - los viejos
  lexicon: LSJ
  rationale: πρεσβῦται designa aquí a los mayores con autoridad en la comunidad, no solo a hombres de edad avanzada. ‘Ancianos’ refleja bien esa función y es natural en español bíblico.
- source_word: τοὺς λόγους αὐτῶν
  english_pob_choice: their words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus declaraciones
  - sus acusaciones
  - su relato
  lexicon: LSJ
  rationale: λόγοι es amplio; aquí se refiere a lo que dijeron los ancianos. ‘Sus palabras’ mantiene la amplitud del griego sin interpretar de más como ‘acusaciones’.
- source_word: κατῃσχύνθησαν
  english_pob_choice: were greatly ashamed
  chosen_spanish: quedaron muy avergonzados
  alternatives_spanish:
  - fueron muy avergonzados
  - se sintieron profundamente avergonzados
  lexicon: LSJ
  rationale: La forma pasiva/deponente expresa haber sido humillados o quedar avergonzados. ‘Quedaron muy avergonzados’ reproduce bien el estado resultante en español.
- source_word: οἱ δοῦλοι
  english_pob_choice: the servants
  chosen_spanish: los servidores
  alternatives_spanish:
  - los siervos
  - los esclavos
  lexicon: LSJ
  rationale: Aunque δοῦλοι puede significar ‘esclavos’, aquí el contexto narrativo se refiere a asistentes de la casa. ‘Servidores’ preserva el sentido contextual sin forzar la carga social de ‘esclavos’.
- source_word: σφόδρα
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - en gran manera
  lexicon: LSJ
  rationale: σφόδρα intensifica el verbo. ‘Muy’ funciona de forma natural con ‘avergonzados’ en español; ‘sumamente’ sería más formal pero menos fluido.
- source_word: ὅτι πώποτε οὐκ ἐρρέθη
  english_pob_choice: because never had ... been said
  chosen_spanish: porque nunca antes se había dicho
  alternatives_spanish:
  - porque jamás se había dicho
  - pues nunca había sido dicho
  lexicon: LSJ
  rationale: La cláusula expresa la razón de su vergüenza. El pluscuamperfecto español reproduce bien el valor retrospectivo de πώποτε οὐκ ἐρρέθη.
- source_word: λόγος τοιοῦτος
  english_pob_choice: such a thing
  chosen_spanish: tal cosa
  alternatives_spanish:
  - tal palabra
  - tal declaración
  - tal acusación
  lexicon: LSJ
  rationale: En este contexto λόγος no requiere ‘palabra’ literalmente en español; ‘tal cosa’ refleja con naturalidad el sentido general adoptado en la revisión inglesa, sin concretar más de lo que el griego exige.
- source_word: περὶ Σουσάννης
  english_pob_choice: about Susanna
  chosen_spanish: acerca de Susana
  alternatives_spanish:
  - sobre Susana
  - contra Susana
  lexicon: LSJ
  rationale: περί con genitivo es básicamente ‘acerca de / sobre’. ‘Acerca de Susana’ sigue de cerca el griego y evita intensificar a ‘contra’, que sería interpretativo.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa del audit trail en el punto clave de λόγος, donde se prefirió un sentido más natural (‘such a thing’) sin perder la amplitud semántica del griego. Por eso el texto español usa ‘tal cosa’ y no una versión más técnica como ‘tal acusación’.
  spanish_consistency_notes:
  - Se mantuvo ‘Susana’ con ortografía española estándar y no se añadió artículo propio.
  - Se evitó ‘SEÑOR’ o terminología teológica no presente en el versículo.
  - ‘Ancianos’ se eligió como término de función comunitaria, coherente con el uso bíblico y con el audit trail inglés.
  - La construcción ‘nunca antes se había dicho’ conserva la fuerza temporal de πώποτε οὐκ ἐρρέθη sin sonar arcaica.
