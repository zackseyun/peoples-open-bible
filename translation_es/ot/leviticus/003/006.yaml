translation:
  language: es
  text: Y si su ofrenda para un sacrificio de ofrendas de paz para Yahvé es del rebaño[a], macho o hembra, lo ofrecerá sin defecto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: “para un sacrificio de ofrendas de comunión”. El término hebreo שְׁלָמִים se traduce tradicionalmente “ofrendas de paz”, pero también puede resaltar el bienestar compartido o la comunión dentro del banquete sacrificial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: Conserva la conexión condicional con el contexto anterior y mantiene el valor lógico de la cláusula sin forzar una adición más explicativa que el hebreo.
- source_word: מִן הַצֹּאן
  english_pob_choice: from the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - de la greña de ganado menor
  - de las ovejas y cabras
  - del ganado menor
  lexicon: HALOT
  rationale: צֹאן designa colectivamente el ganado menor; en español, 'rebaño' comunica de forma natural la pertenencia a ese conjunto sin especificar innecesariamente especies.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su ofrenda presentada
  - su sacrificio
  lexicon: HALOT
  rationale: '''Ofrenda'' es el equivalente culto y natural para קָרְבָּן en contexto levítico; conserva el sentido de algo acercado/presentado a Dios sin sobrecargar el texto.'
- source_word: לְזֶבַח שְׁלָמִים
  english_pob_choice: for a sacrifice of peace offerings
  chosen_spanish: para un sacrificio de ofrendas de paz
  alternatives_spanish:
  - para un sacrificio de ofrendas de comunión
  - para un sacrificio de ofrendas de bienestar
  - para un sacrificio de paz
  lexicon: HALOT
  rationale: Se mantiene el término técnico sacrificial con una formulación clara en español. 'Ofrendas de paz' preserva la tradición terminológica del POB y permite luego anotar la posible lectura alternativa de 'fellowship offerings'.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: ''Yahvé''. La preposición ''para'' refleja adecuadamente la orientación/dedicación del sacrificio en este contexto cultual.'
- source_word: זָכָר א֣וֹ נְקֵבָה
  english_pob_choice: male or female
  chosen_spanish: macho o hembra
  alternatives_spanish:
  - macho o hembra
  - varón o mujer
  lexicon: HALOT
  rationale: En animales sacrificiales, el binomio biológico se expresa mejor en español como 'macho o hembra'; evita ambigüedad antropológica y preserva la distinción del texto.
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  - sin defecto alguno
  lexicon: HALOT
  rationale: En contexto sacrificial, תמים indica ausencia de defecto físico. 'Sin defecto' es preciso y natural en español, y evita la posible resonancia moral de otras opciones.
- source_word: יַקְרִיבֶנּוּ
  english_pob_choice: he shall offer it
  chosen_spanish: la ofrecerá
  alternatives_spanish:
  - la presentará
  - la acercará
  lexicon: HALOT
  rationale: El verbo causativo de קרב en lenguaje sacrificial se traduce con 'ofrecer'. El objeto femenino concuerda con 'ofrenda' implícita en el español natural del contexto.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  - Jehová
  rationale: Se adopta la forma española de uso del proyecto para el nombre pactual de Dios, preservando la transparencia respecto del hebreo y evitando la sustitución por un título funcional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: שְׁלָמִים como término sacrificial técnico
  english_pob_reading: peace offerings / fellowship offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: El hebreo admite más de un matiz semántico, y el POB inglés preserva esa tensión con nota. En español se mantiene el término tradicional técnico 'ofrendas de paz' y se deja abierta la alternativa interpretativa en nota.
  doctrine_reference: HALOT / nota lexical del POB
- issue: Orden de los modificadores sobre la víctima
  english_pob_reading: male or female, ... without blemish
  chosen_spanish_reading: macho o hembra, sin defecto
  alternative_spanish_readings:
  - sin defecto, macho o hembra
  - macho o hembra, íntegro
  rationale: Se conserva el orden fuente para mostrar que 'sin defecto' califica a la víctima ofrecida, no al acto de ofrecer. Esto refleja la revisión más reciente del POB en inglés.
  doctrine_reference: Revisión auditada 2026-04-23
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB en inglés, que reordenó los modificadores para dejar claro que 'without blemish' califica al animal ofrecido. Por eso 'macho o hembra' aparece antes de 'sin defecto', y el final mantiene la secuencia natural del español sin perder el orden semántico del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se usa 'ofrenda' para קָרְבָּן en armonía con el resto del léxico sacrificial.
  - '''Ofrendas de paz'' conserva la terminología técnica; la nota preserva la alternativa semántica relevante.'
  - Se evita 'siervo' u otras paraphrases no motivadas; el texto permanece cercano al hebreo y al audit trail inglés.
  - La concordancia femenina en 'la ofrecerá' sigue el referente implícito 'ofrenda', natural en español bíblico y coherente con el contexto sacrificial.
