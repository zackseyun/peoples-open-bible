translation:
  text: The sleeplessness of a rich man wastes away his flesh[a], and anxiety about livelihood drives away sleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew of the opening clause is difficult. The Greek parallel reads, 'Empty and false hopes are for an unintelligent man, and dreams give wings to fools.' The main text follows the extant Hebrew witness while acknowledging that the verse's transmission is unstable at this point.
    reason: textual_variant
lexical_decisions:
- source_word: שקר
  chosen: wears away
  alternatives:
  - wastes away
  - consumes
  - causes to waste
  lexicon: HALOT
  rationale: The Hebrew as transmitted is difficult, but in context with the Greek parallel and the following clause about lost sleep, the sense is of wasting or deterioration caused by anxiety. Rendering it verbally as 'wears away' gives natural English and preserves the image of gradual bodily harm.
- source_word: עשיר
  chosen: a rich man
  alternatives:
  - the rich man
  - a wealthy man
  lexicon: HALOT
  rationale: The Hebrew phrase points to an individual type rather than wealth abstractly. 'A rich man' preserves the masculine singular form in line with the project's gender-accurate policy.
- source_word: ימחה שארו
  chosen: wears away his flesh
  alternatives:
  - destroys his body
  - wipes out his remnant
  - consumes his frame
  lexicon: HALOT
  rationale: שאר often means 'flesh' or close bodily kin; here bodily sense fits the parallelism with sleeplessness and the Greek's concern with the fool's inner disturbance. 'His flesh' is the most text-near reading, while 'wears away' smooths the difficult verbal form into intelligible English.
- source_word: דאגת
  chosen: the anxiety of
  alternatives:
  - the worry of
  - care for
  lexicon: HALOT
  rationale: דאגה denotes anxious concern. 'Anxiety' best captures the inward distress and matches the verse's theme of mental unrest.
- source_word: מחיה
  chosen: livelihood
  alternatives:
  - sustenance
  - means of living
  - maintenance
  lexicon: HALOT
  rationale: מחיה refers to what keeps one alive materially. 'Livelihood' is idiomatic and broad enough to include income and provision.
- source_word: תפריע
  chosen: drives away
  alternatives:
  - disturbs
  - interrupts
  - banishes
  lexicon: HALOT
  rationale: The verb conveys causing disruption or removal. With sleep as object, 'drives away' is vivid and natural English.
- source_word: נומה
  chosen: sleep
  alternatives:
  - slumber
  - drowsiness
  lexicon: HALOT
  rationale: נומה is sleep/slumber. 'Sleep' is the clearest modern English choice.
