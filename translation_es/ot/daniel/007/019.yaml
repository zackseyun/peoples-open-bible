base_translation:
  language: en
  yaml_path: translation/ot/daniel/007/019.yaml
  text: Then I wanted to know the truth about the fourth beast[a], which was different from all of them, exceedingly terrifying, with teeth of iron and claws of bronze, which devoured, crushed[b], and trampled the rest with its feet.
  footnotes:
