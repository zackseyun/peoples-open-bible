base_translation:
  language: en
  yaml_path: translation/ot/1_kings/013/026.yaml
  text: When the prophet who had brought him back from the way heard it[a], he said, “It is the man of God who rebelled against the word of Yahweh; therefore Yahweh gave him to the lion, and it mauled him and killed him, according to the word of Yahweh that he spoke to him.”
  footnotes:
  - marker: a
    text: Or “rebelled against the command of the LORD” or “defied the word of the LORD.” The Hebrew literally says “rebelled against the mouth of the LORD.”
