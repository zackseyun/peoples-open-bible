translation:
  language: es
  text: ¿Te enojarás con nosotros[a] para siempre? ¿Prolongarás tu ira[b] de generación en generación?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "contra nosotros" en lugar de "con nosotros".
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "extenderás tu ira".
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: La construcción interrogativa con לְעוֹלָם expresa continuidad indefinida; en español, 'para siempre' es la forma natural y fiel para una pregunta retórica de lamento.
- source_word: תֶּאֱנַף
  english_pob_choice: will you be angry
  chosen_spanish: ¿Te enojarás
  alternatives_spanish:
  - ¿Estarás airado
  - ¿Te encolerizarás
  lexicon: HALOT
  rationale: El verbo אנף denota estar enojado/airado. 'Enojarás' comunica el sentido con claridad en español moderno sin suavizar la fuerza emocional.
- source_word: בָּנוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - contra nosotros
  lexicon: HALOT
  rationale: La preposición ב con אנף puede entenderse como 'con' o 'contra'. 'Con nosotros' sigue la lectura principal del POB en un español idiomático, manteniendo abierta la alternativa adversativa.
- source_word: תִּמְשֹׁךְ
  english_pob_choice: will you prolong
  chosen_spanish: Prolongarás
  alternatives_spanish:
  - ¿Arrastrarás
  - ¿Extenderás
  - ¿Seguirás
  lexicon: HALOT
  rationale: משך literalmente es 'extender/dibujar'. En el contexto de la ira, el valor temporal es el principal; 'prolongarás' preserva ese matiz de duración.
- source_word: אַפְּךָ
  english_pob_choice: your anger
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu enojo
  - tu furor
  lexicon: HALOT
  rationale: אַף literalmente es 'nariz' y por extensión 'ira'. 'Ira' mantiene la dignidad poética del paralelismo y refleja bien el uso idiomático.
- source_word: לְדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generaciones
  - de edad en edad
  lexicon: HALOT
  rationale: El modismo distributivo se expresa naturalmente en español con 'de generación en generación', conservando la continuidad sucesiva del hebreo.
theological_decisions:
- issue: Lenguaje antropopático para la ira divina
  english_pob_reading: Retain the language of God's anger without softening it into mere displeasure.
  chosen_spanish_reading: Conservar el lenguaje de la ira de Dios sin rebajarlo a simple desagrado.
  alternative_spanish_readings:
  - ¿Te disgustarás con nosotros para siempre?
  - ¿Seguirás oponiéndote a nosotros para siempre?
  rationale: El hebreo habla explícitamente de ira prolongada. La traducción debe preservar esa tensión teológica y poética, no resolverla mediante una formulación más débil.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando notas al pie no ancladas; la versión final no usa marcadores de pie de nota.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo interrogativo de dos preguntas retóricas.
  - '''Ira'' se usa como equivalente idiomático de אַף, en línea con el contexto poético.'
  - '''Con nosotros'' preserva la opción semántica principal sin excluir la alternativa ''contra nosotros''.'
