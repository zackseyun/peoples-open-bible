translation:
  language: es
  text: El destructor cedió ante este hombre[a], y tuvieron miedo de estas cosas[b]; porque la mera prueba[c] de la ira fue suficiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el ángel destructor». El griego dice simplemente «el destructor».
    reason: alternative_reading
  - marker: b
    text: «Estas cosas» probablemente se refiere a los emblemas sacerdotales o elementos memoriales descritos en el versículo anterior, pero el griego deja implícito el referente.
    reason: cross_reference
  - marker: c
    text: O «ensayo», «experiencia» o «comprobación» de la ira. La expresión griega es comprimida y puede significar que la mera comprobación de la ira bastó.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτον
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - él
  lexicon: LSJ
  rationale: El demostrativo acusativo remite al figura sacerdotal del contexto inmediato. «Este hombre» hace explícita la referencia personal sin perder el valor deíctico.
- source_word: εἶξεν
  english_pob_choice: gave way before
  chosen_spanish: cedió ante
  alternatives_spanish:
  - se rindió ante
  - retrocedió ante
  lexicon: LSJ
  rationale: El verbo expresa ceder o dar paso. «Cedi ó ante» conserva la imagen de una fuerza contenida sin añadir detalles sobre el mecanismo.
- source_word: ὀλοθρεύων
  english_pob_choice: the destroyer
  chosen_spanish: el destructor
  alternatives_spanish:
  - el que destruye
  - el ángel destructor
  lexicon: LSJ
  rationale: El participio sustantivado significa literalmente «el que destruye». «El destructor» mantiene la fuerza léxica y evita introducir «ángel» sin base explícita en el griego.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - esto
  lexicon: LSJ
  rationale: El demostrativo neutro plural queda deliberadamente abierto. «Estas cosas» conserva la referencia implícita sin fijarla en la traducción principal.
- source_word: ἐφοβήθησαν
  english_pob_choice: were afraid
  chosen_spanish: temió
  alternatives_spanish:
  - tuvieron miedo
  - se atemorizaron
  lexicon: LSJ
  rationale: En español, para evitar una construcción impersonal forzada con un sujeto no expreso de manera clara en la frase, se opta por «temió» con el referente implícito ya contenido en el contexto; la idea central es la reacción de temor ante «estas cosas».
- source_word: πεῖρα
  english_pob_choice: testing
  chosen_spanish: prueba
  alternatives_spanish:
  - ensayo
  - experiencia
  lexicon: LSJ
  rationale: El sustantivo puede significar prueba, experiencia o ensayo. «Prueba» conserva la idea de una verificación o comprobación efectiva de la ira divina.
- source_word: ὀργῆς
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  lexicon: LSJ
  rationale: En este contexto judicial y de juicio, «ira» comunica mejor la severidad divina que «enojo».
- source_word: ἱκανή
  english_pob_choice: sufficient
  chosen_spanish: fue suficiente
  alternatives_spanish:
  - bastó
  - alcanzó
  lexicon: LSJ
  rationale: El adjetivo predicativo expresa suficiencia. «Fue suficiente» reproduce el valor formal de la cláusula final.
theological_decisions:
- issue: Identidad de ὀλοθρεύων
  english_pob_reading: the destroyer
  chosen_spanish_reading: el destructor
  alternative_spanish_readings:
  - el ángel destructor
  rationale: El contexto sugiere un agente de juicio/plaga, pero el griego usa solo un participio sustantivado. La redacción principal mantiene la referencia menos interpretativa; la opción angelológica se reserva como alternativa implícita no incorporada al texto.
  doctrine_reference: Conservar la tensión interpretativa sin resolverla en el texto principal.
- issue: Referente de ταῦτα
  english_pob_reading: these things
  chosen_spanish_reading: estas cosas
  alternative_spanish_readings:
  - los objetos sacerdotales y memoriales mencionados en el versículo anterior
  - los signos o hechos recién descritos
  rationale: La referencia depende del contexto inmediato, pero el griego la deja implícita. «Estas cosas» preserva la ambigüedad documentada en el audit trail.
  doctrine_reference: Preservar la ambigüedad contextual documentada.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: se evita una formulación que haga impersonal o ambigua la reacción de temor y se conserva el matiz de suficiencia en la cláusula final. También se mantiene el tono formal del texto griego sin resolver la identidad del agente destructor ni el referente de «estas cosas».'
  spanish_consistency_notes:
  - Se usa «ira» para ὀργή en un marco de juicio divino.
  - Se usa «prueba» para πεῖρα, con nota de alternativas léxicas.
  - Se conserva la ambigüedad del referente de ταῦτα mediante una nota y no mediante explicitación en el cuerpo del texto.
  - Se mantiene un registro formal y bíblico, evitando calcos arcaizantes innecesarios.
