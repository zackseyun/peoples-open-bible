translation:
  language: es
  text: 'Y el rey dijo: «¿Quién está en el patio?». Ahora bien, Hamán había venido al patio exterior del palacio del rey para hablar con el rey acerca de colgar a Mardoqueo en la horca[a] que había preparado para él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo עֵץ literalmente significa «árbol» o «madera»; aquí alude al instrumento de ejecución que Hamán había preparado, por eso se traduce «horca».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶחָצֵר / לַחֲצַר
  english_pob_choice: court / court
  chosen_spanish: patio / patio
  alternatives_spanish:
  - corte
  - patio real
  lexicon: HALOT
  rationale: חָצֵר puede referirse a un patio o recinto cercado. En español, «patio» conserva la imagen espacial concreta y evita la ambigüedad política de «corte», que en este contexto podría sonar más a entorno cortesano que al recinto físico del palacio. Se mantiene la repetición del sustantivo en ambas ocurrencias.
- source_word: וְהָמָן בָּא
  english_pob_choice: Now Haman had come
  chosen_spanish: Y Haman había entrado
  alternatives_spanish:
  - Y Haman vino
  - Entonces Haman había entrado
  lexicon: HALOT
  rationale: El hebreo presenta el trasfondo de la pregunta del rey. «Había entrado» comunica bien el valor de acción previa y resulta natural en español narrativo. «Entrado» también refleja con claridad el movimiento hacia el recinto.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s palace
  chosen_spanish: el palacio del rey
  alternatives_spanish:
  - la casa del rey
  lexicon: HALOT
  rationale: Aunque literalmente es «casa del rey», en este marco real la equivalencia española más natural y precisa es «palacio». Evita la imagen doméstica que tendría «casa».
- source_word: הַחִיצוֹנָה
  english_pob_choice: outer
  chosen_spanish: exterior
  alternatives_spanish:
  - externo
  - de afuera
  lexicon: HALOT
  rationale: El adjetivo distingue este patio de otro interior. «Exterior» conserva esa relación espacial de forma clara y digna en español.
- source_word: לֵאמֹר לַמֶּלֶךְ
  english_pob_choice: to speak to the king
  chosen_spanish: para hablar al rey
  alternatives_spanish:
  - para decirle al rey
  - para hablar con el rey
  lexicon: HALOT
  rationale: El infinitivo con לֵאמֹר expresa finalidad de audiencia o comunicación. «Para hablar al rey» sigue de cerca la función del hebreo y suena natural en español. Se evita «con el rey» porque el movimiento es hacia el rey como destinatario.
- source_word: לִתְלוֹת
  english_pob_choice: about hanging
  chosen_spanish: para colgar
  alternatives_spanish:
  - para ahorcar
  - para ejecutar colgando
  lexicon: HALOT
  rationale: El verbo básico es «colgar». En este contexto judicial/ejecutivo, el español puede conservar esa base sin añadir demasiado. «Ahorcar» sería más específico de ejecución por el cuello y puede estrechar el sentido del hebreo.
- source_word: הָעֵץ
  english_pob_choice: the gallows
  chosen_spanish: la horca
  alternatives_spanish:
  - el madero
  - el árbol
  - el poste
  lexicon: HALOT
  rationale: El hebreo עֵץ literalmente es «árbol/madera», pero aquí designa el dispositivo de ejecución. En español, «horca» comunica mejor la función letal del objeto. Se mantiene el carácter tensionado entre la literalidad del término hebreo y su uso contextual.
- source_word: אֲשֶׁר הֵכִין לוֹ
  english_pob_choice: that he had prepared for him
  chosen_spanish: que había preparado para él
  alternatives_spanish:
  - que le había preparado
  - que había dispuesto para él
  lexicon: HALOT
  rationale: Se conserva el referente implícito a Mardoqueo en el contexto. El pluscuamperfecto refleja que la preparación precede a la escena presente. «Para él» mantiene la ambigüedad referencial que el contexto resuelve.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete hebreo y el audit trail inglés: se conserva la secuencia narrativa con pluscuamperfecto, el contraste patio exterior/palacio y la nota lexical sobre עֵץ. Se ajusta la sintaxis para un español publicable sin perder la tensión entre la literalidad del objeto de ejecución y su función contextual.'
  spanish_consistency_notes:
  - Se mantiene «Mardoqueo» para el personaje bíblico en español.
  - Se usa «Yahvé» por norma del proyecto solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se traduce חָצֵר como «patio» para conservar el espacio físico del recinto real.
  - Se conserva la referencia temporal pasada previa con «había entrado/ había preparado».
