translation:
  language: es
  text: descendencia de Abraham[a], su siervo, hijos[b] de Jacob, sus escogidos[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «simiente de Abraham». El singular hebreo puede funcionar colectivamente para la posteridad de Abraham.
    reason: lexical_alternative
  - marker: b
    text: O «hijos de Jacob» puede entenderse también como «los hijos de Jacob» o, de manera más amplia, «los descendientes de Jacob». El hebreo dice literalmente «hijos de».
    reason: lexical_alternative
  - marker: c
    text: O «sus elegidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶרַע
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - semilla
  lexicon: HALOT
  rationale: זֶרַע funciona aquí como colectivo para la posteridad de Abraham. En español, «descendencia» comunica bien ese valor colectivo y suena natural en registro bíblico; «simiente» conserva más literalidad, pero es menos transparente para el lector moderno.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su esclavo
  lexicon: HALOT
  rationale: En este sintagma fijado para Abraham, el matiz honorífico y relacional es primario. «Siervo» refleja mejor el uso bíblico tradicional en español sin convertir la frase en una designación de esclavitud que el contexto no enfatiza.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - hijos varones de
  - niños de
  lexicon: HALOT
  rationale: El hebreo conserva el plural masculino constructo. En español, «hijos de» mantiene el valor filiar y el paralelismo sin sonar forzado como «hijos varones de»; «niños de» no corresponde al sentido.
- source_word: בְּחִירָיו
  english_pob_choice: his chosen ones
  chosen_spanish: sus escogidos
  alternatives_spanish:
  - sus elegidos
  - sus electos
  lexicon: HALOT
  rationale: «Escogidos» expresa el participio/adjetivo plural con sufijo de forma clara y sobria. «Electos» puede introducir una carga teológica posterior más fuerte, y «elegidos» es posible pero menos idiomático en este contexto poético.
- source_word: parallel pair זֶרַע אַבְרָהָם // בְּנֵי יַעֲקֹב
  english_pob_choice: offspring of Abraham ... sons of Jacob
  chosen_spanish: descendencia de Abraham ... hijos de Jacob
  alternatives_spanish:
  - simiente de Abraham ... hijos de Jacob
  - posteridad de Abraham ... hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva el paralelismo sin fundir las dos líneas. «Descendencia» y «hijos» reproducen la identificación pactal del pueblo por medio de los patriarcas, con español natural y fiel al hebreo.
theological_decisions:
- issue: Referencia de los sufijos posesivos en 'su siervo' y 'sus escogidos'
  english_pob_reading: 'Ambos sufijos se refieren a Dios: Abraham es siervo de Dios, y los hijos de Jacob son los escogidos de Dios.'
  chosen_spanish_reading: 'Ambos sufijos se entienden como referencia a Dios: Abraham es siervo de Dios, y los hijos de Jacob son los escogidos de Dios.'
  alternative_spanish_readings:
  - Que los sufijos se lean mecánicamente con el antecedente inmediato (Abraham y Jacob), aunque eso es poco probable por el contexto.
  rationale: 'El salmo presenta al pueblo del pacto mediante fórmulas conocidas: Abraham como siervo de Yahvé y la línea de Jacob como pueblo escogido. La lectura mantiene la sintaxis y el sentido bíblico sin añadir contenido ajeno al texto.'
  doctrine_reference: Elección/covenantal identity en el marco del Salmo 105; uso bíblico de Abraham como siervo de Yahvé.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas en esta cláusula. Se preserva el paralelismo y la referencia pactal sin neutralizar indebidamente el hebreo masculino plural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el nombre divino aparece explícito; aquí el versículo no lo contiene, pero la lectura teológica presupone esa referencia en el contexto salmódico.
  - Se evita «cristianizar» el vocabulario con términos como «electos» o «SEÑOR» donde el hebreo y el audit trail favorecen una formulación más directa.
  - La puntuación reproduce el paralelismo breve del hebreo con cadencia apta para lectura litúrgica.
