    text: Or “deliver you into their power.” The Hebrew idiom is literally “hand you over into their hand.”
    reason: lexical_alternative
  - marker: b
    text: Or “from the crag/cliff.” Hebrew סלע can refer to a rocky height or crag, not only a single rock.
    reason: lexical_alternative
