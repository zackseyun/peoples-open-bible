- from: Por eso también yo he comenzado a herirte[a], haciéndote desolación a causa de tus pecados.
  to: Por eso también yo he comenzado a golpearte[a], dejándote desolado por tus pecados.
  rationale: Se corrige un calco poco natural («haciéndote desolación») por una formulación española fiel y clara («dejándote desolado»), y se refuerza el valor de נכה con «golpearte», más cercano a «strike» en este contexto de juicio. La estructura, el sentido teológico y la nota alternativa del POB se conservan.
