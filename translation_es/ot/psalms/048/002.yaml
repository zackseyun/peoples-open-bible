translation:
  language: es
  text: Grande es Yahvé[a] y muy digno de alabanza, en la ciudad de nuestro Dios, su monte santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muy alabado». El participio pasivo hebreo puede verterse más literalmente como «alabado» o de manera más idiomática como «digno de alabanza».
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדוֹל
  english_pob_choice: Great
  chosen_spanish: Grande
  alternatives_spanish:
  - Muy grande
  - Exaltado
  lexicon: HALOT
  rationale: Adjetivo predicativo inicial. «Grande es Yahvé» conserva bien el orden enfático del hebreo y expresa la valoración de la frase sin añadir una idea específica de poder que el término por sí solo no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La política del proyecto pide «Yahvé» como forma principal en español para preservar el nombre propio divino y no sustituirlo por un título.
- source_word: וּמְהֻלָּל
  english_pob_choice: and greatly to be praised
  chosen_spanish: muy digno de alabanza
  alternatives_spanish:
  - y muy alabado
  - y altamente alabado
  - y digno de mucha alabanza
  lexicon: HALOT
  rationale: El participio pasivo de הלל expresa que Yahvé es objeto de alabanza / merece alabanza. En español, «digno de alabanza» comunica con naturalidad ese valor predicativo, y el intensificador se conserva con «muy».
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - sobremanera
  lexicon: HALOT
  rationale: Adverbio intensificador que modifica la cláusula de alabanza. «Muy» mantiene la fuerza del hebreo con un giro natural en español.
- source_word: בְּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  - en medio de la ciudad
  lexicon: HALOT
  rationale: La preposición locativa בְּ pide un sentido espacial directo. «En la ciudad» es la opción más clara y fiel.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: of our God
  chosen_spanish: de nuestro Dios
  alternatives_spanish:
  - perteneciente a nuestro Dios
  lexicon: HALOT
  rationale: 'La relación de constructo con «ciudad» se conserva como posesión o pertenencia: «la ciudad de nuestro Dios». En español, esta formulación transmite bien el vínculo pactual implícito.'
- source_word: הַר קָדְשׁוֹ
  english_pob_choice: his holy mountain
  chosen_spanish: su monte santo
  alternatives_spanish:
  - su montaña santa
  - el monte de su santidad
  - su sagrada colina
  lexicon: HALOT
  rationale: Se mantiene la identificación del lugar como «monte santo» y el posesivo de tercera persona. «Monte» corresponde mejor al registro bíblico español aquí que «montaña».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La lectura inglesa documentada es una transliteración del Nombre divino, no una sustitución por título. En español, «Yahvé» preserva ese mismo valor y se ajusta al estándar terminológico del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor predicativo de מְהֻלָּל
  english_pob_reading: greatly to be praised / highly praised
  chosen_spanish_reading: muy digno de alabanza
  alternative_spanish_readings:
  - muy alabado
  - altamente alabado
  - digno de mucha alabanza
  rationale: El hebreo puede entenderse como pasivo («alabado») o como valor resultante («digno de alabanza»). La redacción española conserva esa tensión sin forzar una sola paráfrasis y mantiene la naturalidad litúrgica.
  doctrine_reference: HALOT, הלל; POB footnote a (lexical_alternative)
- issue: Metáfora de Sion / monte santo
  english_pob_reading: his holy mountain
  chosen_spanish_reading: su monte santo
  alternative_spanish_readings:
  - su montaña santa
  - su santo monte
  rationale: La frase identifica poéticamente el lugar de la presencia divina. «Monte santo» conserva el paralelismo bíblico y la referencia a Sion sin explicitar más de lo que el verso dice.
  doctrine_reference: Psalmic Zion language; parallelism in Hebrew poetry
translation_notes:
  revision_awareness: 'Coincide con el testimonio hebreo de Salmos 48:2 y con el audit trail inglés: se conserva la apertura enfática «Grande es Yahvé», la intensificación de la alabanza, la localización en la ciudad de nuestro Dios y la identificación final como «su monte santo». No se detectaron revisiones posteriores que exigieran ajuste.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Monte santo» se usa en sentido poético y bíblico, no como corrección geográfica.
  - La nota textual cubre la alternativa «alabado / digno de alabanza» sin introducir otra variante no atestiguada.
