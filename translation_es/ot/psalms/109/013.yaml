translation:
  language: es
  text: Que su posteridad sea exterminada[a]; en la generación siguiente sea borrado su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que su fin sea para destrucción». אַחֲרִית puede significar «fin» o «futuro», pero aquí el contexto favorece «posteridad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: May ... be
  chosen_spanish: Que ... sea
  alternatives_spanish:
  - Sea ...
  - Ojalá ...
  lexicon: HALOT
  rationale: El jussivo hebreo expresa deseo o imprecación. En español, "Que ... sea" conserva el valor volitivo en un registro natural y bíblico sin volverlo una simple predicción.
- source_word: אַחֲרִיתוֹ
  english_pob_choice: his posterity
  chosen_spanish: su posteridad
  alternatives_spanish:
  - su fin
  - su futuro
  - su descendencia
  lexicon: HALOT
  rationale: En este contexto imprecatorio, con la idea de ser "cortada" y seguida por la mención de la generación posterior, la referencia apunta a la continuidad de su línea. "Posteridad" mantiene esa idea colectiva sin reducirla a un mero "fin" abstracto.
- source_word: לְהַכְרִית
  english_pob_choice: be cut off
  chosen_spanish: sea cortada
  alternatives_spanish:
  - sea destruida
  - sea eliminada
  lexicon: HALOT
  rationale: El infinitivo con ל expresa resultado o propósito. "Sea cortada" conserva la fuerza judicial/covenantal del verbo כרת y evita suavizarlo con una paráfrasis menos precisa.
- source_word: בְּדוֹר אַחֵר
  english_pob_choice: in the next generation
  chosen_spanish: en la siguiente generación
  alternatives_spanish:
  - en otra generación
  - en una generación posterior
  lexicon: HALOT
  rationale: La expresión señala la generación que sigue inmediatamente. "Siguiente" es idiomático en español y comunica con claridad la secuencia temporal.
- source_word: יִמַּח
  english_pob_choice: may ... be blotted out
  chosen_spanish: sea borrado
  alternatives_spanish:
  - sea borrado de la memoria
  - sea eliminado
  lexicon: HALOT
  rationale: El nifal de מחה se usa para algo que es borrado o suprimido, especialmente un nombre o memoria. "Sea borrado" preserva la imagen verbal y su resonancia bíblica.
- source_word: שְׁמָם
  english_pob_choice: their name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su nombre colectivo
  - su memoria
  lexicon: HALOT
  rationale: Aunque el sufijo es plural en hebreo, el referente inmediato es la línea/posteridad del hombre impío. En español, la referencia colectiva se expresa de forma más natural con "su nombre".
theological_decisions:
- issue: Fuerza imprecatoria del versículo
  english_pob_reading: Retain the prayer/wish form as an imprecation against the wicked man's line
  chosen_spanish_reading: Mantener el tono de deseo/clamor judicial, no convertirlo en una simple predicción
  alternative_spanish_readings:
  - Convertirlo en un enunciado predictivo
  - Suavizarlo a una constatación neutral
  rationale: El hebreo usa formas volitivas que, en el marco del Salmo 109, funcionan como imprecación. La traducción española conserva esa tensión y no rebaja el texto a un anuncio desapasionado.
  doctrine_reference: Poética e imprecación en los Salmos; filosofía de traducción §1, §3
- issue: Sentido de אַחֲרִיתוֹ en el contexto
  english_pob_reading: posterity rather than merely abstract end or future
  chosen_spanish_reading: posteridad, entendida como continuidad de la línea familiar
  alternative_spanish_readings:
  - fin
  - futuro
  rationale: Aunque אַחֲרִית puede significar "fin" o "futuro", el contexto inmediato de juicio sobre nombre y generación favorece una referencia a la descendencia o posteridad. "Posteridad" preserva esa lectura sin perder la ambigüedad básica del término.
  doctrine_reference: Lexicografía hebrea de אַחֲרִית; HALOT
translation_notes:
  revision_awareness: 'Coincide con el juicio auditado de la POB en inglés: se mantiene la lectura imprecatoria y la elección de אַחֲרִית como referencia a posteridad. No se registraron revisiones posteriores con cambios.'
  spanish_consistency_notes:
  - Se mantuvo "posteridad" para אַחֲרִית, en línea con el contexto de juicio sobre la línea del impío.
  - Se usó "sea borrado" para יִמַּח, preservando la imagen de borrar un nombre.
  - El plural hebreo de שְׁמָם se expresó naturalmente como "su nombre" en español, dado que el referente colectivo ya está claro en el contexto.
