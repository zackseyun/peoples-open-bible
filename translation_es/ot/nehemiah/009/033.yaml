  glossary_alignment: No hay conflictos con la terminología marco del proyecto. «Justo» para צַדִּיק y «fidelidad» para אֱמֶת en esta construcción son elecciones adecuadas. No aparecen términos sensibles del glosario principal como Yahvé, Mesías, esclavo, carne, etc.
