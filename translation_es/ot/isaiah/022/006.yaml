  yaml_path: translation/ot/isaiah/022/006.yaml
  text: And Elam bore the quiver with chariots and horsemen[b][a], and Kir uncovered the shield.
  footnotes:
  - marker: a
    text: Or 'with chariots of men and horsemen' or 'in chariots with men and horsemen.' The Hebrew troop listing is compressed, and the exact relation among 'chariots,' 'men,' and 'horsemen' is difficult to express neatly in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'laid bare the shield' or 'bared the shield,' likely meaning prepared the shield for battle.
    reason: lexical_alternative
