translation:
  language: es
  text: Y permanecían con esperanza de obtener auxilio, y aborrecían a los que se retiraban de entre ellos, y los juzgaban como enemigos de la nación, y los privaban de la convivencia común y del trato favorable[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la ayuda práctica». El griego εὐχρηστία puede denotar utilidad, servicio o asistencia beneficiosa; aquí se ha preferido «trato favorable» porque el contexto enfatiza la privación de los beneficios y la buena disposición de la vida comunitaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐέλπιδές
  english_pob_choice: hopeful
  chosen_spanish: con esperanza
  alternatives_spanish:
  - esperanzados
  - llenos de esperanza
  lexicon: LSJ
  rationale: El adjetivo expresa una disposición confiada hacia el futuro. 'Con esperanza' es natural en español y conserva el matiz de expectativa favorable sin exagerar la certeza.
- source_word: καθιστήκεισαν
  english_pob_choice: they remained
  chosen_spanish: permanecían
  alternatives_spanish:
  - se mantenían
  - seguían
  lexicon: LSJ
  rationale: La forma imperfectiva/pluperfectiva en este contexto describe un estado duradero. 'Permanecían' reproduce bien la continuidad sin forzar una construcción demasiado literal.
- source_word: ἀντιλήμψεως
  english_pob_choice: help
  chosen_spanish: auxilio
  alternatives_spanish:
  - ayuda
  - asistencia
  lexicon: LSJ
  rationale: El sustantivo denota ayuda o asistencia. 'Auxilio' mantiene dignidad de registro y el sentido de socorro esperado en la situación.
- source_word: τεύξασθαι
  english_pob_choice: obtaining
  chosen_spanish: obtener
  alternatives_spanish:
  - alcanzar
  - recibir
  lexicon: LSJ
  rationale: El infinitivo medio significa conseguir u obtener. 'Obtener' encaja naturalmente con 'auxilio' y preserva el sentido de lograrlo.
- source_word: ἀποχωροῦντας
  english_pob_choice: withdrawing
  chosen_spanish: se retiraban
  alternatives_spanish:
  - se apartaban
  - se alejaban
  lexicon: LSJ
  rationale: El participio indica a los que se apartan o se separan del grupo. 'Se retiraban' conserva la idea de moverse fuera del conjunto sin añadir una nota moral no expresada por sí sola.
- source_word: ἐβδελύσσοντο
  english_pob_choice: loathed
  chosen_spanish: aborrecían
  alternatives_spanish:
  - detestaban
  - abominaban
  lexicon: LSJ
  rationale: El verbo expresa fuerte repulsión. 'Aborrecían' transmite la intensidad con un verbo español claro y bíblicamente comprensible.
- source_word: πολεμίους
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - opositores
  lexicon: LSJ
  rationale: El sentido directo es 'enemigos'; no hace falta suavizarlo.
- source_word: τοῦ ἔθνους
  english_pob_choice: of the nation
  chosen_spanish: de la nación
  alternatives_spanish:
  - del pueblo
  - de la etnia
  lexicon: LSJ
  rationale: En este contexto judío ἔθνος se refiere al cuerpo nacional/colectivo. 'Nación' conserva ese valor comunitario mejor que una traducción genérica.
- source_word: τῆς κοινῆς συναναστροφῆς
  english_pob_choice: common association
  chosen_spanish: la convivencia común
  alternatives_spanish:
  - la asociación común
  - la relación compartida
  lexicon: LSJ
  rationale: La expresión alude a la vida compartida y al trato social normal dentro del grupo. 'Convivencia común' es idiomática y conserva el aspecto relacional y cotidiano.
- source_word: εὐχρηστίας
  english_pob_choice: fellowship
  chosen_spanish: de la amistad compartida
  alternatives_spanish:
  - de la utilidad compartida
  - de la relación provechosa
  lexicon: LSJ
  rationale: La palabra puede denotar utilidad, servicio o trato beneficioso. Dado el ajuste de la revisión inglesa hacia el sentido social de cordialidad/buen trato, 'amistad compartida' expresa bien la privación de benevolencia y trato favorable sin reducirlo a mera ayuda material.
- source_word: ἐστέρουν
  english_pob_choice: deprived
  chosen_spanish: los privaban
  alternatives_spanish:
  - los excluían
  - les negaban
  lexicon: LSJ
  rationale: El verbo significa privar de algo. 'Los privaban' mantiene la fuerza punitiva y se enlaza con los dos objetos del verbo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «support» por «fellowship» para εὐχρηστία, favoreciendo un matiz de trato social/bondad compartida sobre ayuda material. La versión española sigue esa lectura revisada con «amistad compartida», aunque mantiene en nota la alternativa de ayuda/ utilidad práctica por la amplitud semántica del término griego.
  spanish_consistency_notes:
  - Se usó «Y» inicial para reflejar el encadenamiento narrativo del griego, aunque el español suene mejor con ese arranque.
  - Se prefirió «nación» para ἔθνος por su fuerza colectiva, coherente con el audit trail inglés.
  - Se evitó «SEÑOR» u այլ terminología teológica no presente en el versículo.
  - La nota sobre εὐχρηστία preserva la tensión semántica entre ayuda práctica y convivencia/fellowship sin borrar ninguna de las dos posibilidades.
