translation:
  language: es
  text: 'Y cuando regresaron, cantaban himnos y alababan al cielo[a]: «Porque él es bueno[b]; su misericordia es para siempre»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «al cielo», una manera reverente de dirigir la alabanza a Dios.
    reason: cultural_note
  - marker: b
    text: O, más literalmente, «porque es bueno; su misericordia es para siempre». El texto principal expresa el sentido personal más probable de esta fórmula litúrgica.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιστρέψαντες
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción anterior en secuencia temporal; «regresaron» comunica naturalmente el movimiento de retorno sin añadir matices ajenos.
- source_word: ὕμνουν
  english_pob_choice: they sang hymns
  chosen_spanish: entonaban himnos
  alternatives_spanish:
  - cantaban himnos
  - cantaban salmos
  lexicon: LSJ
  rationale: ὑμνέω implica cantar himnos o cantos de alabanza; «entonaban himnos» conserva el matiz litúrgico y musical mejor que un simple «cantaban».
- source_word: ᾐνοῦν
  english_pob_choice: gave praise
  chosen_spanish: daban alabanza
  alternatives_spanish:
  - alababan
  - daban gloria
  lexicon: LSJ
  rationale: Se mantiene la distinción respecto de ὕμνουν. «Daban alabanza» refleja el verbo αἰνέω y preserva el paralelismo verbal del griego.
- source_word: εἰς οὐρανόν
  english_pob_choice: to heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - al cielo
  - al Cielo
  lexicon: LSJ
  rationale: La frase funciona como circunloquio reverente dirigido a Dios. «Hacia el cielo» conserva la dirección literal sin convertirlo innecesariamente en una forma más interpretativa.
- source_word: Ὅτι καλὸν
  english_pob_choice: For he is good
  chosen_spanish: Porque es bueno
  alternatives_spanish:
  - Pues es bueno
  - Porque él es bueno
  lexicon: LSJ
  rationale: El griego admite una lectura impersonal («es bueno») y una personal. En español, la forma breve «Porque es bueno» mantiene abierta esa tensión sin forzar un sujeto explícito que el griego no expresa aquí.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: endures forever
  chosen_spanish: es para siempre
  alternatives_spanish:
  - permanece para siempre
  - dura por los siglos
  lexicon: LSJ
  rationale: La fórmula temporal puede traducirse de manera más literal como permanencia indefinida. «Es para siempre» evita sobreinterpretar el verbo y conserva la fuerza doxológica.
- source_word: τὸ ἔλεος αὐτοῦ
  english_pob_choice: his mercy
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su clemencia
  - su misericordia constante
  lexicon: LSJ
  rationale: ἔλεος se rinde de forma directa como «misericordia»; es la opción más fiel y ampliamente inteligible en español bíblico.
theological_decisions:
- issue: Tensión entre lectura personal e impersonal de καλὸν
  english_pob_reading: 'The main text renders the likely personal sense of the liturgical formula: ''For he is good; his mercy endures forever.'''
  chosen_spanish_reading: 'Se mantiene una redacción que puede leerse de forma personal o impersonal: «Porque es bueno; su misericordia es para siempre».'
  alternative_spanish_readings:
  - «Porque él es bueno; su misericordia es para siempre»
  - «Porque es bueno; su misericordia permanece para siempre»
  rationale: El griego del himno permite una oscilación entre una confesión personal sobre Dios y una formulación más impersonal. El español conserva esa tensión al no introducir un sujeto explícito y al traducir la fórmula con sobriedad.
  doctrine_reference: Translation philosophy §1, §6
- issue: Circunloquio reverente de εἰς οὐρανόν
  english_pob_reading: A reverential way of directing praise to God.
  chosen_spanish_reading: «Hacia el cielo» como giro reverente de la alabanza a Dios.
  alternative_spanish_readings:
  - «al cielo»
  - «hacia el cielo»
  rationale: La dirección espacial es literal, pero funciona como modo reverente de referir la alabanza a Dios. La formulación española respeta el valor idiomático sin añadir explícitamente ‘Dios’ al texto principal.
  doctrine_reference: Translation philosophy §1
- issue: Fórmula de alabanza sobre la misericordia divina
  english_pob_reading: '''his mercy endures forever'' as a liturgical formula'
  chosen_spanish_reading: «su misericordia es para siempre»
  alternative_spanish_readings:
  - «su misericordia permanece para siempre»
  - «su misericordia dura para siempre»
  rationale: La fórmula es reconocible como doxología bíblica. «Es para siempre» reproduce la permanencia indefinida con estilo natural en español y sin ampliar el contenido del griego.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió 'returned' sobre 'turned back' por naturalidad formal; por eso se empleó «regresaron». También se respetó la decisión auditada de mantener la distinción entre cantar himnos y dar alabanza, y la nota sobre el circunloquio reverente ‘to heaven’.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exigiera; aquí no aparece el nombre divino explícito.
  - Se conservó la distinción entre «entonaban himnos» y «daban alabanza» para no fusionar los dos verbos griegos.
  - Se mantuvo «misericordia» para ἔλεος, en línea con el valor directo del término en el contexto de alabanza.
  - Se evitó «SEÑOR» porque el versículo no contiene κύριος ni una cita explícita del nombre divino.
