- from: 'Estos fueron los hijos del padre de Etam: Jezreel[a], Isma y Idbas[b]; y el nombre de su hermana fue Hazzelelponi.'
  to: 'Estos fueron los hijos del padre[a] de Etam: Jezreel, Ishma e Idbash; y el nombre de la hermana de ellos fue Hazzelelponi[b].'
  rationale: Se corrigieron los anclajes de las notas para que correspondan a las expresiones que explican. Se ajustó «su hermana» a «la hermana de ellos» para reflejar con más precisión el posesivo plural hebreo. Se normalizaron las transliteraciones a «Ishma» e «Idbash» por coherencia con el expediente auditado, y se simplificó la nota de Hazzelelponi para que describa solo la variante de transliteración sin una explicación impropia.
