  text: Then he said to me[a], “The north chambers, the south chambers, which are opposite the separate area—they are the holy chambers, where the priests who draw near to Yahweh shall eat the most holy things. There they shall place the most holy things, the grain offering, the sin offering, and the guilt offering[d][c][b], for the place is holy.”
  footnotes:
