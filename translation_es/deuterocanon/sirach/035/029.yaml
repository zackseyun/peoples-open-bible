- from: Mientras aún vivas y haya aliento en ti[a], no te entregues a toda carne.
  to: Mientras aún vivas y haya aliento en ti[a], no te entregues a ningún mortal.
  rationale: Se cambia «a toda carne» por «a ningún mortal» para comunicar fielmente el sentido de πάσῃ σαρκί en español natural y evitar una lectura colectiva engañosa. Se conserva en la nota la alternativa más formal con «carne», preservando el vínculo léxico y la justificación del expediente inglés.
