translation:
  language: es
  text: El nombre de la esposa de Saúl era Ahinoam, hija de Ahimaas, y el nombre del comandante de su ejército era Abner, hijo de Ner, tío[a] de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘pariente cercano de Saúl’; el hebreo puede designar de manera más amplia a un familiar varón cercano, aunque ‘tío’ es la lectura que mejor encaja con el contexto genealógico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם
  english_pob_choice: The name ... was
  chosen_spanish: El nombre ... era
  alternatives_spanish:
  - Y el nombre ... era
  - Ahora bien, el nombre ... era
  lexicon: HALOT
  rationale: La construcción nominal hebrea introduce una identificación genealógica. En español, 'El nombre ... era' conserva el valor formular sin sonar forzado.
- source_word: אֵשֶׁת
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - esposa de
  lexicon: HALOT
  rationale: En relación con Saúl, el sustantivo señala vínculo matrimonial. 'Esposa' es claro y natural en español; se evita 'mujer' por su ambigüedad.
- source_word: בַּת
  english_pob_choice: daughter of
  chosen_spanish: hija de
  alternatives_spanish:
  - hija
  lexicon: HALOT
  rationale: Es la fórmula genealógica normal y conviene mantenerla de modo explícito en español.
- source_word: שַׂר
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - capitán
  - jefe
  - príncipe
  lexicon: HALOT
  rationale: En contexto militar con צְבָאוֹ, 'comandante' comunica bien el rango funcional sin cargar con matices monárquicos o arcaicos.
- source_word: צְבָאוֹ
  english_pob_choice: his army
  chosen_spanish: su ejército
  alternatives_spanish:
  - sus fuerzas
  - su hueste
  lexicon: HALOT
  rationale: '''Ejército'' expresa con claridad el conjunto militar al que Abner dirigía; ''su'' conserva el posesivo de la forma hebrea.'
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo
  lexicon: HALOT
  rationale: Fórmula patronímica estándar; se mantiene literalmente en español.
- source_word: דּוֹד
  english_pob_choice: uncle
  chosen_spanish: tío
  alternatives_spanish:
  - pariente cercano
  - pariente
  lexicon: HALOT
  rationale: En este contexto genealógico, el parentesco más probable y el que adoptó el POB inglés es 'uncle'; en español, 'tío' es la equivalencia natural y precisa. Se conservan alternativas más amplias porque el término hebreo puede abarcar un pariente masculino cercano.
theological_decisions:
- issue: Sentido de דּוֹד en la relación de Abner con Saúl
  english_pob_reading: Saul’s uncle
  chosen_spanish_reading: tío de Saúl
  alternative_spanish_readings:
  - pariente cercano de Saúl
  - tío político de Saúl
  rationale: No es una cuestión doctrinal, pero sí genealógica e interpretativa. En este pasaje, la lectura de parentesco específico encaja mejor con la lista familiar y con la decisión auditada del texto inglés.
  doctrine_reference: No aplica; decisión genealógica/lexical.
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el ancla [a] en el texto principal junto a 'hija de Ahimaas', para que la nota alternativa quede correctamente vinculada al punto léxico discutido.
  spanish_consistency_notes:
  - 'Se mantuvo el orden genealógico del hebreo: esposa de Saúl, luego Ahinoam, hija de Ahimaas, y después Abner, hijo de Ner.'
  - Se eligió 'comandante de su ejército' como equivalente natural y transparente de שַׂר צְבָאוֹ.
  - Se evitó 'SEÑOR' o cualquier sustitución doctrinalmente irrelevante, porque el versículo no contiene el nombre divino.
  - '''Tío'' se conservó por coherencia con el antecedente inglés auditado y por ser la solución más idiomática en español; la nota preserva la ambigüedad lexical del hebreo.'
