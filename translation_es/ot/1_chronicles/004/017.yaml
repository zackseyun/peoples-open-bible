base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/004/017.yaml
  text: 'The sons of Ezrah: Jether[a], Mered, Epher, and Jalon; and she conceived Miriam, Shammai, and Ishbah[c][b], the father of Eshtemoa.'
  footnotes:
  - marker: a
    text: Hebrew literally, 'And the son of Ezrah.' Because several names follow, the phrase is commonly understood collectively as 'the sons of Ezrah.'
    reason: textual_variant
  - marker: b
    text: The Hebrew says only 'and she conceived'; the woman is not identified in this clause.
    reason: lexical_alternative
  - marker: c
    text: Or 'the founder of Eshtemoa,' if Eshtemoa is understood as a clan or settlement rather than an individual.
    reason: lexical_alternative
