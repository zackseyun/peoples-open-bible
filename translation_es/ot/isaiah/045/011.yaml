    text: 'O: “las cosas futuras” o “las cosas venideras”.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente “mis hijos”; esto puede referirse colectivamente a Israel como pueblo de Dios.
    reason: lexical_alternative
  - marker: c
    text: La formulación “mándenme” es probablemente intencionalmente provocadora en este contexto; algunos la entienden como reprensión retórica más que como autorización directa.
    reason: alternative_reading
