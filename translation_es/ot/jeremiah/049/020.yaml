review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: inferencia inicial, doble objeto (''consejo'' / ''pensamientos''), dirección adversativa contra Edom y Temán, y la fuerza enfática de אִם לֹא como aserción. También preserva correctamente Yahvé para יְהוָה y mantiene la imagen del rebaño en צְעִירֵי הַצֹּאן. Sin embargo, la cláusula final en español no suena natural ni expresa bien la construcción resultativa: ''hará desolado su pastizal sobre ellos'' es un calco torpe. Además, falta una nota para la ambigüedad de נְוֵהֶם, que el rastro inglés sí documenta.'
  spanish_quality_summary: El español es en general digno y legible, pero la última cola necesita reparación importante de estilo y sintaxis. 'Pastizal' es comprensible, pero 'prado' o 'pastizal' con 'quedará desolado' sería más idiomático que 'hará desolado'. También conviene añadir la nota léxica correspondiente al término de morada/pastura/redil. El resto del versículo suena natural y fiel.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé''; Edom/Temán transliterados adecuadamente; se mantiene ''consejo'' para עֲצָה y ''pensamientos'' para מַחְשְׁבוֹתָיו; no hay conflictos doctrinales. Se conserva la metáfora del rebaño, como pide el POB. La excepción necesaria es estilística en la cláusula final, no terminológica.'
  issues:
  - severity: medium
    issue: La cláusula final 'ciertamente hará desolado su pastizal sobre ellos' es un español poco natural.
    rationale: Aunque intenta reflejar 'he will make ... desolate', la combinación 'hará desolado' es forzada en español moderno. Una formulación como 'ciertamente dejará desolado su pastizal sobre ellos' o 'dejará su pastizal desolado sobre ellos' preserva mejor el sentido resultativo y la dignidad del registro.
  - severity: medium
    issue: Falta la nota léxica para נְוֵהֶם.
    rationale: El expediente inglés conserva alternativas ('habitation', 'fold') por la ambigüedad del sustantivo y la coherencia de la imagen pastoral. El español debería reflejar esa misma decisión con una nota anclada en el término correspondiente.
  revised_spanish_text: 'Por tanto, oigan el consejo de Yahvé que ha planeado contra Edom[a], y sus pensamientos que ha ideado contra los habitantes de Temán: ciertamente los más pequeños del rebaño los arrastrarán[b]; ciertamente dejará desolado su pastizal[c] sobre ellos.'
  revised_footnotes:
  - marker: a
    text: O 'el plan de Yahvé' o 'el propósito de Yahvé'. עֵצָה puede abarcar consejo, plan o propósito; se conserva 'consejo' en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O 'los más jóvenes del rebaño' o 'los menos importantes del rebaño'. La frase probablemente funciona de modo metafórico para los atacantes más débiles o insignificantes, pero se conserva la imagen del rebaño en el texto principal.
    reason: lexical_alternative
  - marker: c
    text: O 'su morada' o 'su redil'. El sustantivo hebreo puede referirse a un lugar de habitación o a una zona de pasto; el texto principal conserva la imaginería del rebaño en el versículo.
    reason: lexical_alternative
