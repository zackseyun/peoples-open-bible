base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/009/007.yaml
  text: Remember—do not forget—how you provoked Yahweh your God to wrath in the wilderness[a]. From the day you came out of the land of Egypt until you came to this place[b], you have been rebellious against Yahweh.
  footnotes:
