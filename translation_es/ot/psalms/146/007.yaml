review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura participial y el sentido básico del hebreo: hace justicia a los oprimidos, da pan a los hambrientos, y Yahvé libera a los cautivos/prisioneros. Mantiene correctamente «Yahvé» para יְהוָה y conserva la alternativa de מִשְׁפָּט como «juicio». Sin embargo, la nota [b] está mal anclada: el inglés auditado pone la alternativa sobre «the prisoners / those who are bound», no sobre toda la cláusula verbal, y en español conviene reflejar más precisamente la alternativa léxica de אֲסוּרִים como «los atados» o «los que están atados».'
  spanish_quality_summary: El español es claro, natural y digno. «Hace justicia», «da pan» y «Yahvé libera» suenan idiomáticos y fieles. «Los presos» es comprensible, pero «los prisioneros» encaja mejor en registro bíblico general y evita un matiz demasiado coloquial o penal moderno. La principal reparación necesaria es mover la nota [b] al sustantivo correspondiente y ajustar su redacción para que sea una verdadera alternativa léxica, no una nueva traducción de toda la frase.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; מִשְׁפָּט -> «justicia» con nota de alternativa «juicio» bien documentada; לֶחֶם -> «pan» preservado; אֲסוּרִים mejor como «prisioneros» en el texto revisado, con nota alternativa «los que están atados» para mantener la imagen más literal.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada de forma imprecisa.
    rationale: La alternativa inglesa corresponde al sintagma nominal אֲסוּרִים («the prisoners» / «those who are bound»), no a toda la cláusula «Yahvé libera...». En español, el marcador debe ir junto al término traducido de אֲסוּרִים.
  - severity: low
    issue: «Los presos» suena algo más coloquial y contemporáneo que «los prisioneros».
    rationale: Aunque es fiel en sentido, «prisioneros» ofrece un registro más estable y ampliamente eclesial, sin perder claridad.
  revised_spanish_text: que hace justicia a los oprimidos[a], que da pan a los hambrientos. Yahvé libera a los prisioneros[b].
  revised_footnotes:
  - marker: a
    text: O «juicio para los oprimidos».
    reason: lexical_alternative
  - marker: b
    text: O «los que están atados».
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción principal casi intacta por su buena fidelidad y naturalidad, pero se corrige la nota [b] para que refleje exactamente la alternativa léxica de אֲסוּרִים y se mejora «presos» a «prisioneros» por registro bíblico más adecuado.
