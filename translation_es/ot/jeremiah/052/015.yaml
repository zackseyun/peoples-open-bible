translation:
  language: es
  text: Y a algunos de los más pobres del pueblo, y al resto del pueblo que había quedado en la ciudad, y a los desertores que se habían pasado[a] al rey de Babilonia, y al resto de los artesanos[b], Nabuzaradán, el capitán de la guardia[c], los deportó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los que cayeron ... al rey de Babilonia», un modismo para desertar o pasarse a su lado.
    reason: lexical_alternative
  - marker: b
    text: 'O: «el resto de la multitud». El término hebreo aquí es difícil; muchos entienden en este contexto que se refiere a artesanos o trabajadores, especialmente a la luz del paralelo en 2 Reyes 25:11.'
    reason: lexical_alternative
  - marker: c
    text: Compárese 2 Reyes 25:11, el relato paralelo de esta deportación.
    reason: cross_reference
lexical_decisions:
- source_word: וּמִדַּלּוֹת הָעָם
  english_pob_choice: some of the poorest of the people
  chosen_spanish: a algunos de los más pobres del pueblo
  alternatives_spanish:
  - a algunos de los pobres del pueblo
  - de entre los más pobres del pueblo
  - a parte de los más pobres del pueblo
  lexicon: HALOT
  rationale: El hebreo usa la partícula partitiva מִן con un plural femenino de un término de pobreza/lowliness. «A algunos de los más pobres del pueblo» conserva la idea de un grupo tomado de entre ese estrato, sin convertirlo en un genérico absoluto.
- source_word: יֶתֶר הָעָם הַנִּשְׁאָרִים בָּעִיר
  english_pob_choice: the rest of the people who remained in the city
  chosen_spanish: el resto del pueblo que había quedado en la ciudad
  alternatives_spanish:
  - el remanente del pueblo que quedó en la ciudad
  - lo que quedaba del pueblo en la ciudad
  lexicon: HALOT
  rationale: «יֶתֶר» expresa el resto o lo que queda, y el participio marca a los que permanecían en la ciudad. «Había quedado» suena natural en español y mantiene la referencia a un grupo ya existente dentro de la ciudad.
- source_word: הַנֹּפְלִים אֲשֶׁר נָפְלוּ אֶל מֶלֶךְ בָּבֶל
  english_pob_choice: the deserters who had defected to the king of Babylon
  chosen_spanish: los desertores que se habían pasado al rey de Babilonia
  alternatives_spanish:
  - los que habían caído al rey de Babilonia
  - los que se habían rendido al rey de Babilonia
  - los que habían desertado al rey de Babilonia
  lexicon: HALOT
  rationale: El verbo hebreo «caer a/ante» un rey enemigo funciona como un modismo político-militar para pasarse al bando contrario. «Se habían pasado» comunica bien esa defección sin perder el matiz de alianza/cambio de bando.
- source_word: יֶתֶר הָאָמֹון
  english_pob_choice: the rest of the craftsmen
  chosen_spanish: el resto de los artesanos
  alternatives_spanish:
  - el resto de la multitud
  - el resto de los obreros
  - el resto de los oficiales
  lexicon: HALOT
  rationale: La forma hebrea es difícil; la POB inglesa siguió la lectura contextual que la vincula con artesanos o trabajadores, especialmente a la luz del paralelo de 2 Reyes 25:11. «Artesanos» preserva esa decisión interpretativa con claridad en español.
- source_word: הֶגְלָה
  english_pob_choice: carried into exile
  chosen_spanish: los llevó cautivos
  alternatives_spanish:
  - los exilió
  - los deportó
  - los llevó al exilio
  lexicon: HALOT
  rationale: El hiphil de גלה se refiere a deportar/exiliar. En español, «los llevó cautivos» mantiene el sentido histórico de traslado forzoso y funciona con el sujeto singular del oficial babilonio.
- source_word: רַב טַבָּחִים
  english_pob_choice: captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el capitán de los guardias
  - el jefe de la guardia
  - el jefe de los verdugos
  lexicon: HALOT
  rationale: Aunque literalmente el título incluye una raíz ligada a «matar/sacrificar», en contexto real se trata de un cargo de palacio/guardia. «Capitán de la guardia» comunica la función administrativa y militar tradicionalmente reconocida, sin oscurecer el oficio.
theological_decisions:
- issue: Alcance del “rey de Babilonia” en la expresión de defección
  english_pob_reading: deserters who had defected to the king of Babylon
  chosen_spanish_reading: desertores que se habían pasado al rey de Babilonia
  alternative_spanish_readings:
  - desertores que habían caído al rey de Babilonia
  - desertores que habían desertado al rey de Babilonia
  rationale: 'No hay una decisión doctrinal, pero sí una tensión semántica: el hebreo usa un modismo bélico de sumarse al poder adversario. La traducción elegida conserva la idea de cambio de lealtad, sin convertirla en una simple huida.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió «from the poorest of the people» a «some of the poorest of the people» para reflejar mejor el sentido partitivo del hebreo. Por eso la versión española usa «a algunos de los más pobres del pueblo» y no una formulación absoluta.
  spanish_consistency_notes:
  - Se mantuvo «Babilonia» como topónimo y «Nabuzaradán» para el nombre propio, en armonía con el uso bíblico estándar en español.
  - Se prefirió el pretérito perfecto compuesto en las cláusulas relativas («había quedado», «se habían pasado») para reflejar anterioridad respecto del verbo principal.
  - Se conservó «artesanos» como solución interpretativa principal, con nota de alternativa por la dificultad lexical del hebreo.
  - El texto principal evita arcaísmos innecesarios y conserva un registro histórico solemne apto para lectura eclesial.
