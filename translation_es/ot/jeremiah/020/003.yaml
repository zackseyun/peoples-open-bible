    rationale: El rastro de auditoría en inglés preserva la nota como explicación lexical del juego de palabras מָגוֹר מִסָּבִיב. En español, el marcador debe aparecer junto al nombre profético, no junto a la expresión temporal.
  - severity: low
    issue: «No ha llamado tu nombre Pasjur» suena calcado y menos natural en español.
    rationale: El hebreo expresa explícitamente nombrar, y esa fuerza debe mantenerse, pero en español «no te ha puesto por nombre Pasjur» comunica más claramente el acto de imponer nombre sin perder el sentido profético.
  revised_spanish_text: 'Y sucedió al día siguiente, cuando Pasjur sacó a Jeremías de los cepos, que Jeremías le dijo: «Yahvé no te ha puesto por nombre Pasjur, sino Terror por todas partes[a]».'
