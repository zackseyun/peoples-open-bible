- from: Escúchenme[a], ustedes obstinados de corazón[b], ustedes que están lejos de la justicia.
  to: Escúchenme, obstinados de corazón[a], los que están lejos de la rectitud[b].
  rationale: Se revisa el texto principal para alinear מִצְּדָקָה con la decisión auditada del POB ('righteousness') mediante 'rectitud', conservando 'justicia' y 'vindicación' como alternativas en nota. Se mantiene 'obstinados de corazón' como buena representación contextual de אַבִּירֵי לֵב, y se suaviza la sintaxis eliminando la repetición innecesaria de 'ustedes'. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
