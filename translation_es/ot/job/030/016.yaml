  glossary_alignment: 'No hay conflicto con la terminología de proyecto. «Alma» y «aflicción» se alinean bien con las decisiones auditadas. La excepción principal es el verbo para אחז: debe evitarse «asen» por claridad y fidelidad comunicativa en español.'
