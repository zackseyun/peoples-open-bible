translation:
  language: es
  text: Porque cuando escoja el tiempo señalado[a][b], yo mismo juzgaré con rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Porque cuando tome el tiempo señalado, juzgaré con rectitud». El verbo hebreo es literalmente «tomar», y la expresión puede entenderse como seleccionar o fijar el momento señalado.
    reason: lexical_alternative
  - marker: b
    text: O «fije el tiempo señalado».
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque entonces
  lexicon: HALOT
  rationale: Aquí כִּי introduce la base o explicación de lo dicho antes; en español, «Porque» conserva esa fuerza causal/expositiva de manera natural y lectura pública clara.
- source_word: אֶקַּח
  english_pob_choice: I appoint / choose
  chosen_spanish: tomaré
  alternatives_spanish:
  - elegiré
  - apartaré
  - fijaré
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «tomar». Dado el giro con מוֹעֵד, en español conviene mantener el verbo básico y dejar que la frase completa sugiera la idea de tomar/establecer el momento señalado, sin volverla demasiado interpretativa.
- source_word: מוֹעֵד
  english_pob_choice: the set time / the appointed time
  chosen_spanish: el tiempo señalado
  alternatives_spanish:
  - el tiempo fijado
  - el tiempo nombrado
  - la cita
  lexicon: HALOT
  rationale: מועֵד denota un tiempo determinado o señalado. «Tiempo señalado» es transparente en español, conserva el sentido de determinación previa y evita una redundancia artificial con el verbo «tomar».
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - yo, por mi parte
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. «Yo mismo» reproduce ese relieve enfático mejor que un simple «yo».
- source_word: מֵישָׁרִים
  english_pob_choice: with uprightness
  chosen_spanish: con rectitud
  alternatives_spanish:
  - con justicia
  - con equidad
  - rectamente
  lexicon: HALOT
  rationale: מֵישָׁרִים expresa rectitud, equidad y línea moral recta en el acto de juzgar. «Con rectitud» mantiene la forma nominal y el matiz ético-judicial sin perder claridad en español.
- source_word: אֶשְׁפֹּט
  english_pob_choice: will judge
  chosen_spanish: juzgaré
  alternatives_spanish:
  - haré justicia
  - dictaré juicio
  lexicon: HALOT
  rationale: שׁפט aquí es acción judicial. «Juzgaré» es la traducción más directa y mantiene el tono declarativo del hebreo.
theological_decisions:
- issue: Sujeto implícito y declaración judicial
  english_pob_reading: The verse is rendered as a first-person divine declaration about God's appointed time for judgment.
  chosen_spanish_reading: La versión española conserva la primera persona enfática y el carácter judicial del anuncio, sin añadir un sujeto explícito que el verso no expresa.
  alternative_spanish_readings:
  - Porque Dios fijará el tiempo señalado; él juzgará con rectitud.
  - Porque estableceré el tiempo señalado; yo juzgaré con rectitud.
  rationale: El hebreo presenta una voz en primera persona con fuerte énfasis; en el contexto del salmo se entiende como una declaración divina. La traducción mantiene esa tensión contextual sin explicitar más de lo que el verso dice.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
translation_notes:
  revision_awareness: El audit trail inglés debate entre «appoint», «choose» y «take» para אֶקַּח, y entre «set time» / «appointed time» para מוֹעֵד. La redacción española evita un calco torpe, conserva el verbo básico «tomar» en sentido idiomático, y mantiene el énfasis de אֲנִי con «yo mismo».
  spanish_consistency_notes:
  - Se usa «rectitud» para מֵישָׁרִים por coherencia con el registro jurídico-moral del salmo.
  - Se evita «SEÑOR» u otra sustitución devocional porque el versículo no contiene el Tetragrámaton en esta forma textual.
  - La puntuación preserva una lectura poética y solemne, adecuada para recitación pública.
