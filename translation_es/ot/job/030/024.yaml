translation:
  language: es
  text: Ciertamente uno no extiende la mano contra una ruina[a], si en su calamidad hay un grito de auxilio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ciertamente uno no extiende la mano hacia un montón de ruinas; si en su desastre hay un grito de auxilio». El hebreo de este versículo es difícil, especialmente la expresión vertida aquí como «contra una ruina» y la sintaxis de la segunda cláusula.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguro
  - Solo
  - Sin embargo
  lexicon: HALOT
  rationale: Se trata de una partícula asseverativa que refuerza la afirmación; «ciertamente» conserva mejor ese matiz enfático que una lectura restrictiva o adversativa.
- source_word: בְּעִי
  english_pob_choice: against a ruin
  chosen_spanish: contra una ruina
  alternatives_spanish:
  - sobre un montón de ruinas
  - contra un montón de ruinas
  - en una ruina
  lexicon: HALOT
  rationale: El sustantivo es raro y de sentido difícil; «ruina» mantiene la compacidad del hebreo y refleja la comprensión probable de un estado arruinado, mientras la preposición «contra» conserva la posibilidad de una acción hostil o inútil dirigida a ello.
- source_word: יִשְׁלַח יָד
  english_pob_choice: stretch out a hand
  chosen_spanish: extiende la mano
  alternatives_spanish:
  - alarga la mano
  - tiende la mano
  - levanta la mano
  lexicon: HALOT
  rationale: Es un modismo hebreo frecuente. «Extiende la mano» preserva la imagen corporal y permite que el contexto sugiera la acción hostil o inútil sin explicitarla de más.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - aunque
  - en caso de que
  lexicon: HALOT
  rationale: La partícula introduce la segunda cola en una relación condicional o concesiva no completamente segura; «si» preserva esa ambigüedad sin resolverla artificialmente.
- source_word: בְּפִידוֹ
  english_pob_choice: in his calamity
  chosen_spanish: en su calamidad
  alternatives_spanish:
  - en su desastre
  - en su desgracia
  - cuando le sobreviene la calamidad
  lexicon: HALOT
  rationale: פיד denota calamidad/desastre. «Calamidad» mantiene el registro formal y la relación con el sufijo posesivo.
- source_word: שׁוּעַ
  english_pob_choice: a cry for help
  chosen_spanish: un grito de auxilio
  alternatives_spanish:
  - un clamor de auxilio
  - un grito de ayuda
  - un clamor pidiendo ayuda
  lexicon: HALOT
  rationale: El sustantivo expresa un clamor de socorro en la aflicción; «grito de auxilio» es claro en español y conserva el valor de solicitud urgente de ayuda.
translation_notes:
  revision_awareness: El texto sigue de cerca la última revisión inglesa, que eliminó «from them» por no estar sustentado en el hebreo y mantuvo la sintaxis difícil sin sobreexplicarla. La versión española conserva esa cautela y no introduce un complemento equivalente no atestiguado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la imagen idiomática de la mano extendida para no perder el paralelismo ni resolver de forma excesiva la dificultad sintáctica.
  - Se ha preferido un español formal y publicable, evitando una paráfrasis que borre la ambigüedad documentada.
