  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εὐλογητὸς κύριος ὁ θεὸς τοῦ Ἰσραήλ, ὅτι ἐπεσκέψατο καὶ ἐποίησεν λύτρωσιν τῷ λαῷ αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/luke/001/068.yaml
  text: Blessed is the Lord, the God of Israel, because he has visited and brought redemption to his people,
  footnotes:
  - marker: a
    text: Or 'has come to help'; the Greek 'has visited' is a biblical expression for God's attentive intervention.
    reason: lexical_alternative
translation:
  language: ko
  text: 「찬송하리로다, 이스라엘의 야훼[a] 하나님이시여, 이는 그분께서 자기 백성을 돌아보시고 구속하셨기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본 송가(베네딕투스, 68-79)는 시 41:13; 72:18; 106:48 등의 송축 양식(「ברוך יהוה אלהי ישראל」)을 직접 반향하므로 「야훼」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: Εὐλογητὸς κύριος ὁ θεὸς τοῦ Ἰσραήλ
  english_pob_choice: Blessed is the Lord, the God of Israel
  chosen_korean: 찬송하리로다, 이스라엘의 야훼 하나님이시여
  alternatives_korean:
  - 찬송하리로다, 이스라엘의 주 하나님이시여
  lexicon: BDAG
  rationale: OT의 송축 정형 「바루크 야훼 엘로헤 이스라엘」을 한국어로 직접 살린다.
theological_decisions:
- issue: 스가랴의 송가(Benedictus) 1:68-79의 신명·구속사적 어조
  chosen_reading: 송가 전체를 「야훼」 정책 + LXX 양식의 한국어 시적 운율로 옮긴다
  alternative_readings:
  - 전통적 「주」 일관 사용
  - 사가체로 옮김
  rationale: 베네딕투스는 시편 105·106편 및 다윗·아브라함 언약을 종말론적으로 재서술한다. 1:69의 「뿔(다윗의 집)」, 1:71의 「원수에게서의 구원」, 1:72-73의 아브라함 언약, 1:76의 「주 앞서 그의 길을 예비」(사 40:3 + 말 3:1), 1:78의 「위에서 오시는 동방」(슥 3:8; 6:12 메시아적 「싹」) 등 모든 절이 OT를 반향하므로 신명·정형을 그대로 드러낸다.
  doctrine_reference: 'DOCTRINE.md: Preserve OT echoes; Davidic covenant'
