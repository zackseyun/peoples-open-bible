review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido básico del hebreo: Jacob se levantó, puso a sus hijos y a sus mujeres sobre/en los camellos. Sin embargo, hay dos ajustes de fidelidad/estilo recomendables: בָּנָיו es masculino específico y, dado que el POB inglés decidió explícitamente ''his sons'', conviene reflejarlo como «sus hijos varones» o «sus hijos» con nota; además, para עַל הַגְּמַלִּים el español idiomático en este contexto suena mejor como movimiento resultativo «en los camellos», con nota alternativa «sobre».'
  spanish_quality_summary: «Entonces Jacob se levantó y puso...» es natural y digno. «Sus esposas» es claro y adecuado. El punto más débil es «sobre los camellos», que en español puede sonar físico/externo más que montar sobre ellos; «en los camellos» o «sobre los camellos» depende del registro, pero «en» suele leerse mejor para transporte montado. También es preferible evitar que «hijos» borre innecesariamente la especificidad masculina ya preservada en la auditoría inglesa.
  glossary_alignment: No hay términos teológicos sensibles del glosario mayor en este versículo. «Esposas» concuerda bien con נָשָׁיו. La principal cuestión léxica es mantener la fuerza masculina de בָּנָיו en línea con la decisión documentada del POB inglés.
  issues:
  - severity: medium
    issue: «sus hijos» no refleja plenamente la especificidad masculina de בָּנָיו
    rationale: La auditoría inglesa eligió 'his sons' precisamente para conservar el masculino plural. En español, «hijos» puede entenderse genéricamente; «hijos varones» preserva mejor la decisión fuente, aunque suena un poco más explícito.
  - severity: medium
    issue: «sobre los camellos» es posible pero menos idiomático en español para esta acción
    rationale: Con «puso ... en los camellos» se expresa mejor el resultado de montar/cargar personas en animales. «Sobre» no es incorrecto, pero suena más literal y algo menos natural. La alternativa puede mantenerse en nota por fidelidad al rango semántico de עַל.
  - severity: low
    issue: La nota al pie invierte la alternativa más natural en español
    rationale: Si el texto principal usa «en los camellos», la nota puede preservar «sobre los camellos» como alternativa más literal. «Encima de los camellos» suena menos bíblico y menos elegante que «sobre».
  revised_spanish_text: Entonces Jacob se levantó y puso a sus hijos varones y a sus esposas en los camellos[a].
  revised_footnotes:
  - marker: a
    text: O «sobre los camellos». La preposición hebrea puede traducirse de cualquiera de estas dos maneras en este contexto.
    reason: lexical_alternative
  revision_rationale: Se ajusta «hijos» a «hijos varones» para reflejar la decisión documentada de conservar el masculino específico de בָּנָיו, y se cambia «sobre los camellos» por «en los camellos» para una lectura más natural en español, conservando la otra posibilidad en nota.
