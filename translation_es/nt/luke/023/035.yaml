translation:
  language: es
  text: 'Y el pueblo estaba de pie, mirando. Pero aun los gobernantes se burlaban de él, diciendo: «Salvó a otros; que se salve a sí mismo, si este es el Mesías de Dios, el Elegido[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Cristo de Dios, el Escogido».
    reason: alternative_reading
lexical_decisions:
- source_word: εἱστήκει
  english_pob_choice: stood
  chosen_spanish: estaba observando
  alternatives_spanish:
  - estaba de pie
  - se hallaba de pie
  lexicon: BDAG
  rationale: El griego presenta una escena de estado/postura, no solo de acción puntual. En español, «estaba observando» transmite bien la escena en curso y se integra con naturalidad, aunque pierde la mención explícita de estar de pie; esa postura queda implícita en el contexto narrativo.
- source_word: θεωρῶν
  english_pob_choice: watching
  chosen_spanish: observando
  alternatives_spanish:
  - mirando
  - contemplando
  lexicon: BDAG
  rationale: El participio describe atención visual continua. «Observando» conserva ese matiz durativo y resulta más natural que un calco como «mirando de cerca».
- source_word: ἐξεμυκτήριζον
  english_pob_choice: were mocking him
  chosen_spanish: se burlaban de él
  alternatives_spanish:
  - se mofaban de él
  - lo ridiculizaban
  lexicon: BDAG
  rationale: El verbo expresa desprecio burlón. «Se burlaban de él» es idiomático y suficientemente fuerte en español; mantiene el tono hostil sin sobrecargar el registro.
- source_word: ἄρχοντες
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los jefes
  - las autoridades
  lexicon: BDAG
  rationale: En este contexto se trata de las autoridades dirigentes. «Gobernantes» conserva la referencia a quienes ejercen mando y evita especificar indebidamente una categoría más estrecha que el texto no nombra.
- source_word: Ἄλλους ἔσωσεν
  english_pob_choice: He saved others
  chosen_spanish: Salvó a otros
  alternatives_spanish:
  - A otros salvó
  - Rescató a otros
  lexicon: BDAG
  rationale: Se mantiene el campo semántico de σῴζω con «salvó» para conservar la repetición con la siguiente cláusula y la ironía de la burla.
- source_word: σωσάτω ἑαυτόν
  english_pob_choice: let him save himself
  chosen_spanish: que se salve a sí mismo
  alternatives_spanish:
  - que él mismo se salve
  - déjese salvar a sí mismo
  lexicon: BDAG
  rationale: El imperativo exhortativo en boca de los burladores se vuelve con naturalidad al español mediante «que se salve a sí mismo», conservando el desafío irónico.
- source_word: εἰ οὗτός ἐστιν
  english_pob_choice: if this is
  chosen_spanish: si este es
  alternatives_spanish:
  - si él es
  - si este hombre es
  lexicon: BDAG
  rationale: «Este» reproduce la fuerza demostrativa y ligeramente despectiva de οὗτός, mejor que un simple pronombre personal.
- source_word: ὁ χριστὸς τοῦ θεοῦ
  english_pob_choice: God’s Messiah
  chosen_spanish: el Mesías de Dios
  alternatives_spanish:
  - el Cristo de Dios
  - el Mesías perteneciente a Dios
  lexicon: BDAG
  rationale: Χριστός como título se rinde por «Mesías», conforme al tratamiento POB de este término cuando es titular. El genitivo se expresa de forma directa y reverente como «de Dios», sin necesidad de parafrasear posesión.
- source_word: ὁ ἐκλεκτός
  english_pob_choice: the Chosen One
  chosen_spanish: el Elegido
  alternatives_spanish:
  - el Escogido
  - el Elegido de Dios
  lexicon: BDAG
  rationale: ἐκλεκτός funciona aquí como designación titular. «El Elegido» es breve, natural y mantiene la carga de elección divina sin introducir una formulación más interpretativa.
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El griego usa Χριστός como título, no como nombre propio. En español, «Mesías» preserva mejor el sentido titular y el trasfondo esperable del término; «Cristo» quedaría más nominalizado y menos transparente para la lectura pública.
  doctrine_reference: 'DOCTRINE.md: contested terms — Χριστός → «Mesiah» when titular; preserve title meaning'
- issue: ὁ ἐκλεκτός como título cristológico
  english_pob_reading: the Chosen One
  chosen_spanish_reading: el Elegido
  alternative_spanish_readings:
  - el Escogido
  - el Elegido de Dios
  rationale: La frase puede leerse como título cristológico o como designación general; la versión española conserva esa tensión sin resolverla. «El Elegido» mantiene la brevedad del griego y evita cargar el texto con una interpretación explicativa.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolving it prematurely'
translation_notes:
  revision_awareness: 'La revisión del pasaje en el audit trail inglés no introdujo cambios. La redacción española sigue directamente el griego SBLGNT y conserva la misma lectura principal: escena narrativa de observación, burla de las autoridades y la doble designación mesiánica con la tensión entre título y burla.'
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός conforme al criterio POB de término titular.
  - Se evitó «SEÑOR» como sustituto en este versículo porque no aparece κύριος ni un alusión directa al nombre divino aquí; el genitivo θεοῦ se rinde simplemente como «de Dios».
  - Se eligió «el Elegido» para ὁ ἐκλεκτός, consistente con una designación titular breve y comprensible en español.
  - Se usó «se burlaban» para ἐξεμυκτήριζον por ser natural y suficientemente fuerte, sin perder el desprecio implícito.
