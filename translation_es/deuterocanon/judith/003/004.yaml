review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: presentación enfática (ἰδοὺ), ciudades + habitantes, δοῦλοί como sometimiento fuerte, y el doble mandato ''ven y ...''. Sin embargo, ''trátalas'' no representa bien ἀπάντησον con objeto mixto (''las ciudades'' y ''los que habitan en ellas'') y además fuerza femenino plural solo hacia ''ciudades''. La frase final también suena algo forzada en español.'
  spanish_quality_summary: El español es mayormente claro, pero 'Mira' suena algo coloquial para el registro narrativo solemne y 'trátalas' crea un problema de concordancia/alcance semántico. 'Haz con ellos' sobreenfatizaría el objeto humano; conviene una formulación más amplia y natural que abarque ciudades e habitantes. 'Como bien te parezca' conserva el sentido idiomático con mayor naturalidad; puede mantenerse 'a tus ojos' por cercanía al original.
  glossary_alignment: Alinea correctamente δοῦλοί con 'esclavos', en conformidad con la guía del proyecto y la justificación teológica dada. No hay términos doctrinales mayores en disputa. La nota de alternativa léxica para 'siervos' está bien enfocada.
  issues:
  - severity: medium
    issue: '''trátalas'' reduce el objeto a ''ciudades'' y no abarca bien también a sus habitantes'
    rationale: El griego αὐταῖς retoma formalmente las ciudades, pero en contexto de rendición incluye el trato hacia el conjunto entregado; 'trátalas' en español suena demasiado limitado y concreto.
  - severity: low
    issue: '''Mira'' resulta algo coloquial para el tono del pasaje'
    rationale: Aunque ἰδοὺ puede verterse dinámicamente, 'Mira' aquí suena más conversacional que 'Mira' en otros contextos; 'Mira' no es incorrecto, pero 'Mira' con el resto del período queda menos digno que una alternativa como 'Mira'/'He aquí'. Dado el registro objetivo, conviene mantener una opción natural pero más literaria en conjunto.
  - severity: low
    issue: La clausula final 'como te parezca bueno a tus ojos' es comprensible pero pesada
    rationale: El sentido está bien, pero en español fluye mejor 'como bien te parezca a tus ojos' o 'como te parezca bien', conservando si se desea el eco semítico 'a tus ojos'.
  revised_spanish_text: Mira[a], también nuestras ciudades y los que habitan en ellas son tus esclavos; ven y haz con ellas como bien te parezca a tus ojos.
  revised_footnotes:
  - marker: a
    text: O «siervos». El griego puede expresar ambos matices, pero aquí probablemente subraya la sujeción bajo conquista.
    reason: lexical_alternative
  revision_rationale: Se conserva la decisión correcta 'esclavos' para δοῦλοί. Se ajusta ἀπάντησον a una formulación más abarcadora y natural en español ('haz con ellas') que evita limitar indebidamente el objeto a las ciudades como entidades tratadas físicamente y refleja mejor el sentido de disponer de ellas en contexto de rendición. También se aligera la cláusula final para mejorar fluidez sin perder el modismo cercano al original.
