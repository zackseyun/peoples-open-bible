translation:
  language: es
  text: Y lo estableció como celebración anual para celebrar este día. Y fortificó el monte del santuario junto a la ciudadela[a], y allí habitó él y los que estaban con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cerca de la Akra»; ἄκρα puede referirse específicamente a la fortaleza seléucida de Jerusalén, no solo a una ciudadela en sentido general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησεν
  english_pob_choice: established
  chosen_spanish: estableció
  alternatives_spanish:
  - instituyó
  - fijó
  - dispuso
  lexicon: LSJ
  rationale: El verbo introduce una práctica permanente y repetida; «estableció» comunica bien la institución de una observancia anual sin cargarlo con matices litúrgicos excesivos.
- source_word: κατʼ ἐνιαυτὸν
  english_pob_choice: as a yearly observance
  chosen_spanish: cada año
  alternatives_spanish:
  - anualmente
  - año tras año
  - como observancia anual
  lexicon: LSJ
  rationale: En español, la repetición periódica queda clara con «cada año». Se evita una formulación más abstracta que podría sonar menos natural en la cláusula.
- source_word: τοῦ ἄγειν
  english_pob_choice: to celebrate
  chosen_spanish: se celebrara
  alternatives_spanish:
  - se observara
  - se guardara
  - se hiciera
  lexicon: LSJ
  rationale: Con ἡμέραν, ἄγω significa celebrar o conmemorar un día. El subjuntivo pasivo refleja adecuadamente la idea de una celebración instituida.
- source_word: τὴν ἡμέραν ταύτην
  english_pob_choice: this day
  chosen_spanish: este día
  alternatives_spanish:
  - aquel día
  - ese día
  lexicon: LSJ
  rationale: «Este día» preserva el valor deíctico del griego y su referencia a la fecha conmemorada en el relato.
- source_word: προσωχύρωσεν
  english_pob_choice: fortified
  chosen_spanish: fortificó
  alternatives_spanish:
  - reforzó
  - hizo más segura
  - aseguró
  lexicon: LSJ
  rationale: El compuesto indica reforzar defensas o añadir fortificación. «Fortificó» es directo y preciso en un contexto militar/arquitectónico.
- source_word: τὸ ὄρος τοῦ ἱεροῦ
  english_pob_choice: the hill of the sanctuary
  chosen_spanish: el monte del santuario
  alternatives_spanish:
  - el monte del templo
  - la colina del santuario
  - el monte sagrado
  lexicon: LSJ
  rationale: «ὄρος» es literalmente monte o colina, y «ἱερόν» apunta al recinto sagrado. «Monte del santuario» mantiene la cercanía al griego sin imponer de entrada una terminología técnica posterior.
- source_word: τὸ παρὰ τὴν ἄκραν
  english_pob_choice: beside the citadel
  chosen_spanish: junto a la ciudadela[a]
  alternatives_spanish:
  - cerca de la Akra
  - junto a la fortaleza
  - al lado de la ciudadela
  lexicon: LSJ
  rationale: La traducción principal conserva el sentido común de ἄκρα como fortaleza/ciudadela. Se mantiene la nota porque el término puede referirse específicamente a la Akra seléucida de Jerusalén.
- source_word: ᾤκει
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - residió
  - moró
  lexicon: LSJ
  rationale: El imperfecto expresa residencia continua. «Habitó» suena natural en español bíblico y conserva la idea de permanencia sin volverse arcaizante en exceso.
- source_word: οἱ παρʼ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - sus acompañantes
  - los suyos
  - los que le acompañaban
  lexicon: LSJ
  rationale: La frase indica el grupo inmediato de acompañantes. «Los que estaban con él» preserva la amplitud del griego sin precisar más de lo que el texto da.
translation_notes:
  revision_awareness: 'Se revisó el texto inglés auditado y no hay cambios sustantivos en la solución: la versión española sigue de cerca el valor aspectual e institucional del griego, manteniendo la ambigüedad documentada de ἄκρα mediante nota.'
  spanish_consistency_notes:
  - Se mantuvo «Y» inicial para reflejar la coordinación narrativa repetida del griego.
  - «Monte del santuario» conserva la estructura nominal del original sin introducir «Templo» como tecnicismo interpretativo.
  - La nota sobre ἄκρα preserva la tensión entre ciudadela genérica y la fortaleza específica Akra, siguiendo el audit trail inglés.
  - Se evitó «SEÑOR» y otros términos no pertinentes; el pasaje no contiene referencia divina directa.
