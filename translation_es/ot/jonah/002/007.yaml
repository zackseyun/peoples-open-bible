translation:
  language: es
  text: Descendí hasta las raíces de los montes[a]; la tierra, con sus cerrojos, me rodeaba para siempre[b], pero tú sacaste mi vida de la fosa[c], Yahvé mi Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta las extremidades» o «hasta las bases de los montes».
    reason: lexical_alternative
  - marker: b
    text: O «la tierra—sus cerrojos se cerraron detrás de mí para siempre». La imagen hebrea es la de encarcelamiento por los cerrojos o barras de la tierra.
    reason: lexical_alternative
  - marker: c
    text: O «de la tumba» o «de la destrucción» para «de la fosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקִצְבֵי
  english_pob_choice: to the roots of
  chosen_spanish: hasta las raíces de
  alternatives_spanish:
  - hasta las extremidades de
  - hasta las bases de
  - hasta los extremos de
  lexicon: HALOT
  rationale: En hebreo puede denotar extremo, borde o límite. En el contexto de un descenso poético, «raíces» comunica en español la base de los montes y conserva la imagen idiomática de profundidad que refleja la decisión inglesa.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  lexicon: HALOT
  rationale: «Montes» mantiene el paralelismo poético y suena natural en español bíblico sin perder el sentido literal de plural montañoso.
- source_word: יָרַדְתִּי
  english_pob_choice: I went down
  chosen_spanish: Descendí
  alternatives_spanish:
  - Bajé
  - Fui descendiendo
  lexicon: HALOT
  rationale: El perfecto qal expresa movimiento hacia abajo. «Descendí» preserva el valor verbal y el registro solemne, con mayor precisión que una paráfrasis más libre.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: Aquí el contexto de encierro, barras y abismo favorece el ámbito cósmico/sepulcral, no «el país». «La tierra» conserva la imaginería envolvente de la esfera de muerte.
- source_word: בְּרִחֶיהָ
  english_pob_choice: with its bars
  chosen_spanish: con sus cerrojos
  alternatives_spanish:
  - con sus barras
  - con sus trancas
  lexicon: HALOT
  rationale: בְּרִיחַ nombra un cerrojo, barra o pasador. «Cerrojos» comunica bien la idea de sujeción e inmovilización en español y mantiene la metáfora de prisión sin borrar el detalle léxico.
- source_word: בַעֲדִי
  english_pob_choice: was around me
  chosen_spanish: estaba alrededor de mí
  alternatives_spanish:
  - me rodeaba
  - estaba sobre mí
  - me cercaba
  lexicon: HALOT
  rationale: La preposición puede expresar cercanía envolvente. «Estaba alrededor de mí» conserva la imagen de cerco y coincide con la lectura inglesa de encerramiento.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - para la eternidad
  - para siempre jamás
  lexicon: HALOT
  rationale: En este contexto de oración desde la muerte aparente, la expresión transmite duración sentida como definitiva. «Para siempre» mantiene esa fuerza sin resolver la tensión del lenguaje poético.
- source_word: וַתַּעַל
  english_pob_choice: you brought up
  chosen_spanish: tú sacaste
  alternatives_spanish:
  - tú levantaste
  - tú hiciste subir
  - tú rescataste
  lexicon: HALOT
  rationale: El verbo causativo implica hacer subir desde abajo. «Sacaste» funciona de modo natural en español para una liberación desde el abismo y conserva la acción divina de rescate; se evita «rescataste» para no añadir un matiz no explícito en el verbo.
- source_word: מִשַּׁחַת
  english_pob_choice: from the pit
  chosen_spanish: del hoyo
  alternatives_spanish:
  - del pozo
  - de la fosa
  - de la tumba
  lexicon: HALOT
  rationale: שַׁחַת puede ser hoyo, fosa, sepulcro o destrucción. «Hoyo» preserva la imagen concreta del hueco profundo y permite que la connotación de muerte siga implícita, como en la elección inglesa de «pit».
- source_word: חַיַּי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi ser
  - mi alma
  - a mí
  lexicon: HALOT
  rationale: La expresión hebrea puede funcionar casi como «a mí», pero traducirla como «mi vida» conserva el valor literal y el énfasis teológico en la liberación de la muerte.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Nombre divino: transliterar el Tetragrámaton como «Yahvé», preservando el nombre personal del Dios del pacto.'
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios
  lexicon: HALOT
  rationale: Forma posesiva directa; «mi Dios» reproduce con claridad la relación personal de confesión y apelación.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La fuente hebrea usa el Tetragrámaton de forma explícita. En español se adopta «Yahvé» conforme a la política del proyecto, evitando la sustitución por un título y preservando el nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of לְעוֹלָם in a death-prayer context
  english_pob_reading: forever
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - por siempre
  - para la eternidad
  rationale: En esta plegaria la palabra expresa la impresión de permanencia absoluta del encierro, no una afirmación doctrinal sobre duración metafísica. «Para siempre» conserva la tensión retórica y la carga existencial.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la última revisión registrada: no se introducen cambios sustanciales respecto del análisis auditado; se conserva la tensión poética del encierro y la liberación divina.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino, conforme al estándar del proyecto.
  - Se usa «mi Dios» para אֱלֹהָי sin añadir títulos eclesiales no presentes en el hebreo.
  - «Hoyo» conserva la imagen concreta de שַׁחַת, alineada con la tradición auditada del inglés «pit».
  - «Descendí» y «sacaste» reflejan movimiento vertical sin sobreexplicar el trasfondo de muerte y rescate.
