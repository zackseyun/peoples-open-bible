  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: '1 Et respondit ad me et dixit: metiens metire in temetipso, et erit cum uideris quoniam transiuit pars quaedam signorum quae praedicta sunt, Tunc intelleges quoniam ipsum est

    2 tempus, in quo incipiet altissimus uisitare saeculum qui ab eo factus est. Et quando uidebitur in saeculo motio locorum,

    3 populorum turbatio, gentium cogitationes, ducum inconstantia, principum turbatio, Tunc intelleges quoniam de his erat altis-

    4 simus locutus a diebus qui fuerunt ante ab initio. Sicut enim

    5 omne quod factum est in saeculo, initium per consummationem et consummatio manifesta, Sic et altissimi tempora : initia

    6 manifesta in prodigiis et uirtutibus, et consummatio in actu et in signis. Et erit omnis qui saluus factus fuerit, et qui poterit effugere per opera sua uel per fidem in qua credidit, Is relinquetur de praedictis periculis et uidebit salutare meum in terra mea et in finibus meis quae sanctificaui mihi a saeculo. Et tunc mirabuntur qui nunc abusi sunt uias meas, et in cruciamentis commorabuntur hii qui eas proiecerunt in contemptu. Quodquod enim non cognouerunt me uiuentes beneficia consecuti, Et quodquod fastidierunt legem meam, cum adhuc erant habentes libertatem, Et cum adhuc esset eis apertum paenitentiae locus non intellexerunt sed spreuerunt, hos oportet post mortem in cruciamento cognoscere. Tu ergo adhuc noli curiosus esse quomodo impii cruciabuntur, sed inquire quomodo iusti saluabuntur, et quorum saeculum et propter quos saeculum et quando. Respondi et dixi : Olim locutus sum et nunc dico et postea dicam, quoniam plures sunt qui pereunt quam ii qui saluabuntur, Sicut multiplicat fluctus super guttam. Et respondit ad me et dixit : qualis ager, talia et semina ; et quales flores, tales et tincturae ; et qualis opera, talis et creatio ; et qualis agricola, talis et area. Quoniam tempus erat saeculi, et tunc cum essem parans eis, his qui nunc, antequam fieret illis saeculum, in quo inhabitarent; et nemo contradixit mihi tunc, nec enim erat quisquam: Et nunc creati in mundo

    7 et erit, omnis qui salvus factus fuerit et qui poterit effugere per opera sua vel per fidem in qua credidit, is

    8 relinquetur de praedictis periculis et videbit salutare meum in terra mea et in finibus meis, quae sanctificavi mihi a saeculo.

    9 et tunc mirabuntur qui nunc abusi sunt vias meas, et in cruciamentis commorabuntur hii qui eos proiecerunt in contemptu.

    10 quotquot enim non cognoverunt me viventes beneficia consecuti,

    11 et quotquot fastidierunt legem meam, cum adhuc erant habentes libertatem,

    12 et cum adhuc esset eis apertum paenitentiae locus non intellexerunt sed spreverunt, hos oportet post mortem in cruciamento cognoscere.

    13 tu ergo adhuc noli curiosus esse quomodo impii cruciabuntur, sed inquire quomodo iusti salvabuntur, et quorum saeculum et propter quos saeculum et quando.

    14 respondi et dixi:

    15 olim locutus sum et nunc dico et postea dicam, quoniam plures suntqui pereunt quam qui salvabuntur,

    16 sicut multiplicat fluctus super guttam. et respondit ad me et dixit:

    17 qualis ager, talia et semina, et quales flores, tales et tincturae, et qualis opera, talis et creatio, et qualis agricola, talis et area. quoniam tempus erat saeculi,

    18 et tunc cum essem parans eis, his qui nunc, antequam fieret illis saeculum in quo inhabitarent, et nemo contradixit mihi

    19 hoc parato et mensa indeficienti et lege inuestigabili, corrupti sunt moribus eorum. Et consideraui saeculum meum et ecce

    20 erat perditum, et orbem meum, et ecce erat periclitans propter cogitationes quae in eo aduenerunt. Et uidi et peperci eis uix

    21 ualde et saluaui mihi acinum de botru et plantationem de tribu multa. Pereat ergo multitudo quae sine causa nata est et

    22 seruietur acinus meus et plantatio mea, quia cum multo labore perfeci haec. Tu autem si adhuc intermittas septem dies alios—

    23 sed non ieiunabis in eis, Ibis autem in campum florum, ubi

    24 domus non est aedificata, et manduca solummodo de floribus campi, et carnem non gustabis et uinum non bibes, sed solummodo flores—Et deprecare altissimum sine intermissione, et

    25 ueniam et loquar tecum. Et profectus sum sicut dixit mihi in campum quod uocatur

    26 Ardat, et sedi ibi in floribus et de herbis agri manducaui et facta est esca earum in saturitatem. Et factum est post dies

    27 septem et ego discumbebam supra fenum et cor meum iterum

    28 turbabatur sicut et ante. Et apertum est os meum et inchoaui

    29 dicere coram altissimo et dixi: O domine in nobis ostendens ostensus es patribus nostris in deserto quando erant exientes de Aegypto et quando ueniebant in deserto quod non calcatur et

    30 infructuoso, et dicens dixisti: Tu Israel audi me, et semen

    31 Iacob intendite sermonibus meis. Ecce enim semino in uobis legem meam, et faciet in uobis fructum, et glorificabimini in eo per saeculum. Nam patres nostri accipientes legem non seruauerunt et legitima non custodierunt, et factus est fructus legis non periens; nec enim poterat quoniam tuus erat. Nam qui

    32 nam patres nostri accipientes legem non servaverunt et legitima mea non custodierunt. et factum est fructumlegis non periens; nec enim poterat, quoniam tuus erat.

    33 acceperunt perierunt non custodientes quod in eis seminatum fuerat. Et ecce consuetudo est ut, cum acceperit terra semen

    34 uel nauem mare uel uas aliud escas uel potus, et cum fuerit ut exterminetur quod seminatum est uel quod missum est uel

    35 quae suscepta sunt, Exterminentur haec, susceptoria uero manent: apud nos enim non sic factum est. Nos quidem qui legem accepimus peccantes peribimus et cor nostrum quod

    36 nos quidem qui legem accepimus peccantes peribimuset cor nostrum quod suscepiteam.

    37 suscepit eam. Nam lex non perit sed permanet in suo honore.

    38 Et cum loquerer haec in corde meo, respexi oculis meis et uidi mulierem in dextera parte, et ecce haec lugebat et plorabat cum uoce magna, et animo dolebat ualde, et uestimenta eius discissa, et cinis super caput eius. Et dimisi cogitatus in quibus eram cogitans et conuersus sum ad eam et dixi ei: Vtquid fles? et quid doles animo? Et dixit ad me: dimitte me, dominus meus, ut defleam me et adiciam dolorem, quoniam ualde amara sum animo et humiliata sum ualde. Et dixi ei: quid passa es? dic mihi. et dixit ad me: Sterilis fui ego famula tua et non peperi habens maritum annis triginta. Ego enim per singulas horas et per singulos dies in annis triginta his deprecabar altissimum nocte ac die. Et factum est post triginta annos exaudiuit me deus ancillae tuae et peruidit humilitatem meam et adtendit tribulationi meae et dedit mihi filium. et iocundata sum super eum ualde ego et uir meus et omnes ciues mei, et honorificauimus ualde fortem. Et nutriui eum cum labore multo: Et factum est cum creuisset et uenissem accipere illi uxorem, et feci diem epuli.

    39 et dimisi cogitatus in quibus eram cogitans et conversus sum ad eamet dixi ei:

    40 ut quid fles et quid doles animo? et dixit ad me:

    41 dimitte me, dominus meus, ut defleam me et adiciam dolorem, quoniam valde amara sumanimo et humiliata sum valde.

    42 et dixi ei: quid passa es, dic mihi. Et dixit ad me:

    43 sterilis fui ego famula tua et non peperi habens maritum annis triginta.

    44 ego enim per singulas horas et per singulos dies in annistriginta his deprecabar Altissimum nocte ac die.

    45 et factum est post triginta annos, exaudivit me Deus ancillae tuae et pervidit humilitatem meam et adtendit tribulationi meae et dedit mihi filium. et iucundata sum super eum valde ego et vir meus et omnes cives mei, et honorificabamus valde Fortem.

    46 et nutrivi eum cum labore multo.

    47 et factum est cum crevisset et venissem accipere illi uxorem, et feci diem epuli.'
