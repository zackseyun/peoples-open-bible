revisions:
- from: 'Mira[a]: así como los ojos de los esclavos están hacia la mano de sus amos, como los ojos de una esclava están hacia la mano de su señora, así nuestros ojos están hacia Yahvé, nuestro Dios[b], hasta que tenga misericordia de nosotros.'
  to: 'Mira[a]: así como los ojos de los siervos están puestos en la mano de sus amos, como los ojos de una sierva están puestos en la mano de su señora, así nuestros ojos están puestos en Yahvé, nuestro Dios, hasta que nos muestre favor[b].'
  rationale: 'Se ajusta el texto principal para reflejar mejor las decisiones auditadas del POB: «siervos/sierva» en vez de «esclavos/esclava» en este contexto comparativo, y «hasta que nos muestre favor» como equivalente principal de חנן, dejando «misericordia» en nota. También se mejora la naturalidad del español con «están puestos en la mano».'
