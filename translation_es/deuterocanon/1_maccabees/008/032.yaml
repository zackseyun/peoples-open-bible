lexical_decisions:
- source_word: ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Y si
  - Pero si
  lexicon: BDAG
  rationale: Introduce una cláusula condicional; 'Si' reproduce con naturalidad la condición sin añadir contraste innecesario.
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía más
  - de nuevo
  lexicon: BDAG
  rationale: Expresa continuidad de una acción ya en curso; 'todavía' comunica bien la persistencia del conflicto.
- source_word: οὖν
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - entonces
  - por tanto
  - así que
  lexicon: BDAG
  rationale: En esta construcción, οὖν sigue a ἔτι y contribuye a la idea de continuidad; el español no requiere un marcador adicional separado.
- source_word: ἐντύχωσιν κατὰ σοῦ
  english_pob_choice: bring charges against you
  chosen_spanish: presentan cargos contra ti
  alternatives_spanish:
  - interpongan una acusación contra ti
  - apelen contra ti
  - te ataquen
  lexicon: BDAG
  rationale: La combinación sugiere una acción hostil de tipo legal/diplomático; 'presentan cargos contra ti' conserva ese matiz mejor que un verbo meramente físico.
- source_word: ποιήσομεν αὐτοῖς τὴν κρίσιν
  english_pob_choice: we will execute judgment on them
  chosen_spanish: ejecutaremos juicio sobre ellos
  alternatives_spanish:
  - llevaremos a cabo el juicio sobre ellos
  - aplicaremos sentencia sobre ellos
  - haremos justicia sobre ellos
  lexicon: BDAG
  rationale: Con κρίσις, el griego expresa una decisión o juicio judicial que se ejecuta; 'ejecutaremos juicio' preserva la formalidad y la fuerza forense sin sonar demasiado coloquial.
- source_word: τὴν κρίσιν
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - decisión
  - justicia
  lexicon: BDAG
  rationale: '''Juicio'' es la equivalencia más directa y natural en español para la acción judicial indicada por κρίσις en este contexto.'
- source_word: πολεμήσομέν σε
  english_pob_choice: we will fight against them / we will fight you
  chosen_spanish: lucharemos contra ellos
  alternatives_spanish:
  - lucharemos contra ti
  - haremos guerra contra ellos
  - pelearemos contra ellos
  lexicon: BDAG
  rationale: El testimonio griego transmitido presenta tensión en el objeto final; en español, y siguiendo la revisión auditada que corrige el referente al plural del contexto, 'contra ellos' refleja la lectura contextual más probable sin ocultar la dificultad textual.
- source_word: διὰ τῆς θαλάσσης
  english_pob_choice: by sea
  chosen_spanish: por mar
  alternatives_spanish:
  - por el mar
  - por vía marítima
  lexicon: BDAG
  rationale: '''Por mar'' es el equivalente idiomático natural en español para la esfera marítima de la guerra.'
- source_word: διὰ τῆς ξηρᾶς
  english_pob_choice: by land
  chosen_spanish: por tierra
  alternatives_spanish:
  - por tierra firme
  - por vía terrestre
  lexicon: BDAG
  rationale: '''Por tierra'' reproduce el merismo militar con ''por mar'' de forma clara y sobria.'
theological_decisions:
- issue: Tensión del último pronombre y posible dificultad textual
  english_pob_reading: Preserve the Greek wording in the main text, with a note that the phrase may mean 'we will fight for you' or reflects a textual difficulty.
  chosen_spanish_reading: 'Mantener en el texto principal la lectura contextual: ''lucharemos contra ellos por mar y por tierra'', y señalar la dificultad en nota.'
  alternative_spanish_readings:
  - lucharemos por ti por mar y por tierra
  - lucharemos contra ti por mar y por tierra
  rationale: El griego transmitido presenta una tensión entre el pronombre final y el contexto de apoyo militar. La versión española debe reflejar la lectura contextual más probable sin borrar la dificultad textual; la nota preserva la alternativa interpretativa y la variante transmitida.
  doctrine_reference: Primacía del testimonio original y preservación de tensiones textuales en lugar de armonización interpretativa excesiva.
translation_notes:
  revision_awareness: El auditoría inglesa pasó de 'we will fight you by sea and by land' a 'we will fight against them by sea and by land' para alinearse con el contexto plural; la redacción española sigue esa revisión contextual y conserva una nota que reconoce la dificultad del griego transmitido. También se tuvo en cuenta que la traducción inglesa ya no mantiene 'against you' en la cláusula final, sino un referente plural coherente con el contexto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa 'juicio' para κρίσις, reservando 'sentencia' para contextos más estrictamente jurídicos cuando el español lo requiera.
  - Se usa 'lucharemos' en lugar de 'pelearemos' para un tono más formal y bíblico, sin perder claridad.
  - La nota a conserva la tensión entre el texto griego transmitido y la lectura contextual más probable.
