theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of צְבָאוֹת
  chosen_reading: Armies
  alternative_readings:
  - Hosts
  rationale: The Hebrew title emphasizes the LORD's command over heavenly and earthly armies. 'Armies' is more transparent in modern English than the traditional 'Hosts' while preserving the martial force of the title.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
