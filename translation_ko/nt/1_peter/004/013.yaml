id: 1PE.4.13
reference: 1 Peter 4:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ καθὸ κοινωνεῖτε τοῖς τοῦ Χριστοῦ παθήμασιν χαίρετε, ἵνα καὶ ἐν τῇ ἀποκαλύψει τῆς δόξης αὐτοῦ χαρῆτε ἀγαλλιώμενοι.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/013.yaml
  text: 'But insofar as you share in the sufferings of Messiah, rejoice, so that at the revelation of his glory you may also rejoice with exultation.'
translation:
  language: ko
  text: '오히려 여러분이 메시아의 고난들에 동참하는 그만큼 기뻐하십시오. 이는 그분의 영광이 나타나실 때에 여러분도 크게 기뻐하며 즐거워하게 하려는 것입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθὸ κοινωνεῖτε
  english_pob_choice: insofar as you share
  chosen_korean: 동참하는 그만큼
  alternatives_korean:
  - 참여하는 만큼
  - 함께하는 정도에 따라
  lexicon: BDAG
  rationale: καθό의 「~한 정도만큼」을 「그만큼」으로 옮긴다. κοινωνέω의 「공동 참여」를 「동참」으로 옮긴다.
- source_word: τοῖς τοῦ Χριστοῦ παθήμασιν
  english_pob_choice: the sufferings of Messiah
  chosen_korean: 메시아의 고난들
  alternatives_korean:
  - 그리스도의 수난들
  lexicon: BDAG
  rationale: 복수 παθήμασιν 그대로 보존. 1:11·5:1과 어휘 일관성.
- source_word: ἐν τῇ ἀποκαλύψει τῆς δόξης αὐτοῦ
  english_pob_choice: at the revelation of his glory
  chosen_korean: 그분의 영광이 나타나실 때
  alternatives_korean:
  - 그의 영광의 계시 때에
  lexicon: BDAG
  rationale: 1:7·1:13의 ἀποκάλυψις와 통일하여 「나타나심」으로 옮긴다.
- source_word: χαρῆτε ἀγαλλιώμενοι
  english_pob_choice: rejoice with exultation
  chosen_korean: 크게 기뻐하며 즐거워하게
  alternatives_korean:
  - 기쁨에 환희하게
  lexicon: BDAG
  rationale: ἀγαλλιάω의 강한 「환희」와 일반 χαίρω의 「기뻐함」을 둘 다 살려 「크게 기뻐하며 즐거워하다」로 옮긴다.
