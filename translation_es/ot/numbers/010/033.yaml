  text: וַ/יִּסְעוּ֙ מֵ/הַ֣ר יְהוָ֔ה דֶּ֖רֶךְ שְׁלֹ֣שֶׁת יָמִ֑ים וַ/אֲר֨וֹן בְּרִית יְהוָ֜ה נֹסֵ֣עַ לִ/פְנֵי/הֶ֗ם דֶּ֚רֶךְ שְׁלֹ֣שֶׁת יָמִ֔ים לָ/ת֥וּר לָ/הֶ֖ם מְנוּחָֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/010/033.yaml
  text: So they set out from the mountain of Yahweh for a journey of three days[a], and the ark of the covenant of Yahweh set out before them for a journey of three days[b], to seek out a resting place for them.
  footnotes:
  - marker: a
    text: Or 'three days' journey' in both occurrences of the phrase.
    reason: lexical_alternative
  - marker: b
    text: Or 'to scout out' or 'to search out' a place of rest for them.
    reason: lexical_alternative
