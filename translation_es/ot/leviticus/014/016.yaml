translation:
  language: es
  text: El sacerdote sumergirá su dedo derecho en parte del aceite que está sobre la palma izquierda[a], y con su dedo rociará parte del aceite siete veces delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “sobre su palma izquierda”. La redacción principal mantiene la referencia anatómica con “palma”, en vez de “mano”, por la precisión del término כַּף.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטָבַל / טָבַל
  english_pob_choice: dip
  chosen_spanish: sumergirá
  alternatives_spanish:
  - mojará
  - introducirá
  lexicon: HALOT
  rationale: El verbo ritual expresa meter una parte del cuerpo en un líquido; en español, “sumergirá” comunica bien la acción sin perder la concreción cultual. “Mojará” es posible pero menos preciso; “introducirá” suena más técnico y menos natural.
- source_word: אֶצְבָּעוֹ הַיְמָנִית
  english_pob_choice: his right finger
  chosen_spanish: su dedo derecho
  alternatives_spanish:
  - el dedo de su mano derecha
  - su dedo de la mano derecha
  lexicon: HALOT
  rationale: La construcción hebrea nombra específicamente el dedo y su lateralidad. “Su dedo derecho” es breve, claro y fiel; las alternativas son más explicativas pero menos fluidas.
- source_word: מִן הַשֶּׁמֶן
  english_pob_choice: into some of the oil
  chosen_spanish: en parte del aceite
  alternatives_spanish:
  - del aceite
  - dentro de algo del aceite
  lexicon: HALOT
  rationale: 'Después de un verbo de inmersión, מִן se entiende naturalmente como la porción en la que se introduce el dedo. “En parte del aceite” conserva la idea de una porción, evitando una traducción mecánica de “desde”. '
- source_word: אֲשֶׁר עַל כַּפּוֹ הַשְּׂמָאלִית
  english_pob_choice: that is on his left palm
  chosen_spanish: que está sobre la palma izquierda
  alternatives_spanish:
  - que está en la palma de su mano izquierda
  - que está sobre su palma izquierda
  lexicon: HALOT
  rationale: 'כַּף apunta aquí a la palma, no simplemente a la mano entera. “Palma izquierda” mantiene la especificidad anatómica y el orden espacial del hebreo. '
- source_word: הִזָּה
  english_pob_choice: sprinkle
  chosen_spanish: rociará
  alternatives_spanish:
  - esparcirá
  - asperjará
  lexicon: HALOT
  rationale: En contexto ritual, הִזָּה expresa la aplicación distribuida de un líquido. “Rociará” es natural en español y comunica el gesto cultual; “asperjará” es más técnico, pero menos transparente.
- source_word: בְּאֶצְבָּעוֹ
  english_pob_choice: with his finger
  chosen_spanish: con su dedo
  alternatives_spanish:
  - usando su dedo
  - por medio de su dedo
  lexicon: HALOT
  rationale: La preposición instrumental se expresa de manera directa con “con”. “Con su dedo” mantiene el medio ritual sin sobrecargar la frase.
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - por siete veces
  lexicon: HALOT
  rationale: La expresión numeral se traduce literalmente porque el número tiene valor ritual preciso y no requiere parafraseo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española preferida por el proyecto, “Yahvé”. “Delante de” reproduce la fórmula cultual y su sentido de comparecencia ritual.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrama. Conforme al criterio del proyecto en español, se vierte como “Yahvé”, preservando el nombre del pacto en vez de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Registro ritual de la acción sacerdotal
  english_pob_reading: sprinkle ... before Yahweh
  chosen_spanish_reading: rociará ... delante de Yahvé
  alternative_spanish_readings:
  - asperjará ... ante Yahvé
  - esparcirá ... en presencia de Yahvé
  rationale: El gesto no es una aspersión libre, sino una acción cultual prescrita. “Rociará” conserva claridad para el lector español sin borrar la formalidad ritual del contexto levítico.
  doctrine_reference: Levítico 14:16 en contexto sacerdotal de purificación
translation_notes:
  revision_awareness: 'El contexto inglés auditado no requiere cambios de revisión: mantiene la misma lectura del nombre divino, la misma acción ritual de inmersión/aspersión y la misma estructura cultual. La versión española sigue esas decisiones con equivalentes naturales y transparentes.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como forma española del Tetragrama, coherente con el estándar del proyecto.
  - “Palma izquierda” conserva la especificidad de כַּף y evita diluirla en “mano”.
  - El paralelismo entre “sumergirá” y “rociará” refleja las dos acciones rituales del versículo.
  - La nota a pie de página marca la alternativa “palma”/“mano” sin desplazar el texto principal.
