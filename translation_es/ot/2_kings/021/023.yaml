    issue: «siervos de Amón» puede sonar menos preciso y más arcaizante que el contexto cortesano sugiere
    rationale: עַבְדֵי אָמוֹן aquí se refiere a asistentes o servidores del rey en su corte. «Siervos» es posible, pero en español actual eclesial/general puede sugerir servidumbre personal o un tono innecesariamente arcaico. «Servidores de Amón» conserva el sentido sin sobreinterpretar como «oficiales».
  revised_spanish_text: Y los servidores de Amón conspiraron contra él y dieron muerte al rey en su propia casa[a].
