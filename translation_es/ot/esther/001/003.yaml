translation:
  language: es
  text: 'En el tercer año de su reinado, dio un banquete[a] para todos sus oficiales y servidores: el ejército de Persia y Media,[b] los nobles y los oficiales de las provincias, en su presencia[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una fiesta»; el término hebreo puede designar un banquete caracterizado por bebida y celebración.
    reason: lexical_alternative
  - marker: b
    text: O «los nobles de Persia y Media».
    reason: lexical_alternative
  - marker: c
    text: Es decir, delante de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת שָׁלוֹשׁ
  english_pob_choice: In the third year
  chosen_spanish: En el tercer año
  alternatives_spanish:
  - En el año tres
  lexicon: HALOT
  rationale: La expresión hebrea de tiempo se vierte de forma natural en español como una marca cronológica directa. ‘En el tercer año’ conserva el valor ordinal y la fluidez.
- source_word: לְמָלְכוֹ
  english_pob_choice: of his reign
  chosen_spanish: de su reinado
  alternatives_spanish:
  - de su realeza
  - cuando comenzó a reinar
  lexicon: HALOT
  rationale: El sustantivo con sufijo señala el período de gobierno en curso. ‘Reinado’ es la equivalencia española más precisa y natural.
- source_word: עָשָׂה מִשְׁתֶּה
  english_pob_choice: he gave a banquet
  chosen_spanish: dio un banquete
  alternatives_spanish:
  - hizo un banquete
  - celebró un banquete
  - dio una fiesta
  lexicon: HALOT
  rationale: Aunque el verbo básico es ‘hacer’, con מִשְׁתֶּה la construcción idiomática en español pide una formulación natural. ‘Banquete’ comunica mejor el contexto cortesano que ‘fiesta’, y mantiene la dignidad del pasaje.
- source_word: לְכָל שָׂרָיו וַעֲבָדָיו
  english_pob_choice: for all his officials and servants
  chosen_spanish: para todos sus oficiales y servidores
  alternatives_spanish:
  - para todos sus príncipes y siervos
  - para todos sus funcionarios y siervos
  - para todos sus oficiales y sirvientes
  lexicon: HALOT
  rationale: שָׂרִים designa autoridades u কর্মকর্তas de rango, por lo que ‘oficiales’ comunica bien la función administrativa. עֲבָדִים aquí describe personal de corte, no esclavos en sentido servil; ‘servidores’ preserva esa referencia sin forzar un término técnico.
- source_word: חֵיל פָּרַס וּמָדַי
  english_pob_choice: the army of Persia and Media
  chosen_spanish: el ejército de Persia y Media
  alternatives_spanish:
  - la fuerza militar de Persia y Media
  - las tropas de Persia y Media
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa más reciente que prefirió ‘army’ frente a ‘military force’. ‘Ejército’ es la correspondencia española más directa y natural para חֵיל en este contexto militar-político.
- source_word: הַפַּרְתְּמִים
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los cortesanos
  - los aristócratas
  lexicon: HALOT
  rationale: El préstamo persa señala a altos dignatarios o aristócratas. ‘Nobles’ es breve, claro y fiel al rango social implicado.
- source_word: וְשָׂרֵי הַמְּדִינוֹת
  english_pob_choice: and the officials of the provinces
  chosen_spanish: y los oficiales de las provincias
  alternatives_spanish:
  - y los gobernadores de las provincias
  - y los príncipes de las provincias
  lexicon: HALOT
  rationale: שָׂרֵי puede abarcar jefes u oficiales; ‘oficiales’ evita precisar un cargo que el hebreo no nombra de modo explícito. ‘Provincias’ conserva la división administrativa del imperio.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: La expresión marca presencia cortesana. ‘Delante de él’ mantiene la imagen espacial del hebreo y sugiere la reunión ante el rey sin volverla innecesariamente abstracta.
theological_decisions:
- issue: Presencia cortesana del rey en la frase final
  english_pob_reading: That is, in his presence.
  chosen_spanish_reading: delante de él
  alternative_spanish_readings:
  - en su presencia
  - ante él
  rationale: No hay decisión doctrinal propiamente dicha, pero sí una elección de tono. ‘Delante de él’ conserva la referencia espacial del hebreo y la etiqueta de corte, sin introducir una paráfrasis explicativa en el cuerpo del texto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa que cambió ‘military force’ por ‘army’, por lo que se eligió ‘ejército’ en español. También se mantuvo la estructura acumulativa del texto inglés y hebreo: fecha del reinado, banquete, lista de invitados y localización final ‘delante de él’.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ por defecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - ‘Mesías/Cristo’, ‘Dios’ y otras equivalencias terminológicas no intervienen aquí.
  - Se mantuvo ‘oficiales’ para שָׂרִים y ‘servidores’ para עֲבָדִים, evitando ‘siervos’ por la carga devocional más estrecha en español.
  - El orden de la lista sigue el hebreo y la POB inglesa, con guiones largos para marcar la aposición explicativa.
  - No se añadió ninguna nota textual porque no hay variante textual relevante en el paquete fuente.
