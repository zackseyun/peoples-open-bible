translation:
  language: es
  text: 'Y el rey de Israel dijo a sus siervos: «¿Saben que Ramot de Galaad[a] nos pertenece, y nosotros estamos callados[b] en vez de tomarla de la mano del rey de Aram?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aram es el nombre hebreo que en traducciones antiguas al español a menudo aparece como «Siria».
    reason: alternative_reading
  - marker: b
    text: O, más literalmente, «estamos callados sin tomarla». El modismo hebreo expresa una inacción culpable mediante la imagen del silencio.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  - sus asistentes
  lexicon: HALOT
  rationale: עֶבֶד/עֲבָדִים puede referirse a siervos o a personal de corte según el contexto. Aquí el rey habla a sus subordinados de palacio; «siervos» conserva el valor léxico básico sin imponer una identificación burocrática más precisa que el hebreo no exige.
- source_word: הֲיְדַעְתֶּם
  english_pob_choice: Do you know
  chosen_spanish: ¿No saben...?
  alternatives_spanish:
  - ¿Saben...?
  - ¿Acaso no saben...?
  lexicon: HALOT
  rationale: La forma interrogativa con ידע introduce una pregunta retórica. En español, «¿No saben...?» refleja bien la apelación implícita a una verdad que el rey supone compartida, sin añadir una negación ajena al contraste retórico del contexto.
- source_word: כִּי לָנוּ רָמֹת גִּלְעָד
  english_pob_choice: that Ramoth-gilead belongs to us
  chosen_spanish: que Ramot de Galaad nos pertenece
  alternatives_spanish:
  - que Ramot de Galaad es nuestra
  - que tenemos Ramot de Galaad
  lexicon: HALOT
  rationale: לָנוּ expresa posesión o reclamación. «Nos pertenece» comunica de forma natural esa pretensión territorial en español y conserva el tono político del discurso.
- source_word: רָמֹת גִּלְעָד
  english_pob_choice: Ramoth-gilead
  chosen_spanish: Ramot de Galaad
  alternatives_spanish:
  - Ramot-Galaad
  - Ramot Galaad
  lexicon: standard toponym transliteration
  rationale: Se translitera el topónimo con ortografía española para lectura natural. Se mantiene el compuesto del nombre propio sin sustituirlo por un equivalente geopolítico posterior.
- source_word: מַחְשִׁים
  english_pob_choice: we are keeping silent
  chosen_spanish: estamos callados
  alternatives_spanish:
  - guardamos silencio
  - nos mantenemos en silencio
  - no hacemos nada
  lexicon: HALOT
  rationale: El participio de חרש aquí conserva la idea de silencio, pero en el contexto implica inacción culpable. «Estamos callados» deja visible la metáfora del silencio; el complemento siguiente explicita que ese silencio equivale a no tomar posesión.
- source_word: מִקַּחַת אֹתָהּ
  english_pob_choice: instead of taking it
  chosen_spanish: en vez de tomarla
  alternatives_spanish:
  - en lugar de tomarla
  - para tomarla
  - de tomarla
  lexicon: HALOT
  rationale: La construcción con מן más infinitivo expresa la acción omitida o evitada. «En vez de tomarla» reproduce con naturalidad esa relación y conserva el sentido de negligencia/omisión del hebreo.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - de
  - del poder de
  - de entre las manos de
  lexicon: HALOT
  rationale: «De la mano de» mantiene el idiomático hebreo de control o posesión. En español suena bíblico pero claro, y preserva el matiz de recuperar algo de la esfera de dominio del rey de Aram.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: proper-name transliteration
  rationale: Se conserva Aram por transliteración directa, siguiendo la preferencia del proyecto y evitando una equivalencia histórica posterior no solicitada por el texto hebreo.
theological_decisions:
- issue: ¿Cómo reflejar la postura moral implícita en מַחְשִׁים?
  english_pob_reading: The Hebrew idiom conveys culpable inaction.
  chosen_spanish_reading: «estamos callados» deja visible el silencio, y el contexto «en vez de tomarla» comunica la omisión culpable sin explicarla en exceso.
  alternative_spanish_readings:
  - «estamos inactivos»
  - «no hacemos nada»
  rationale: El hebreo no dice simplemente que no actúan, sino que están en silencio ante una obligación/pretensión. En español conviene conservar la imagen del silencio y permitir que el contexto cargue con la recriminación implícita.
  doctrine_reference: No doctrinal issue; discourse/pragmatics of the Hebrew idiom
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «doing nothing» por «keeping silent instead of taking it» para reflejar con más precisión מַחְשִׁים y la construcción infinitiva. La versión española sigue esa revisión y procura conservar tanto el silencio como la omisión implícita.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se mantiene «Aram» por transliteración, no «Siria».
  - Se usa «siervos» para עֲבָדָיו por ser el equivalente más directo y adecuado al contexto real/cortesano.
  - Se conserva el tono retórico de la pregunta con una formulación natural en español.
  - 'La puntuación reproduce la división discursiva del hebreo: narración, discurso y pregunta retórica.'
