base_translation:
  language: en
  yaml_path: translation/ot/proverbs/023/013.yaml
  text: Do not withhold discipline from a boy[a], for if you strike him with the rod[b], he will not die.
  footnotes:
  - marker: a
    text: Or 'from a child' or 'from a youth.' The Hebrew noun can refer to a boy or young person more broadly; the main text keeps the masculine singular form of the proverb.
    reason: lexical_alternative
  - marker: b
    text: The proverb states that such correction is not, in itself, fatal; it should not be read as a blanket approval of abusive violence or as an absolute guarantee in every case.
    reason: cultural_note
