translation:
  language: es
  text: En cuanto al pueblo que quedó[a] en la tierra de Judá, a quienes Nabucodonosor, rey de Babilonia, había dejado allí, puso al frente de ellos a Gedalías, hijo de Ahicam, hijo de Safán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que fue dejado»; el participio hebreo puede verterse de ambas maneras, resaltando a los que quedaron en Judá después de las deportaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de la tierra
  lexicon: HALOT
  rationale: עָם en este contexto narrativo designa la población colectiva; 'el pueblo' es natural en español y conserva el sentido histórico sin añadir matices sociológicos que no están en el hebreo.
- source_word: הַנִּשְׁאָר
  english_pob_choice: who remained / who were left
  chosen_spanish: que quedó
  alternatives_spanish:
  - que permaneció
  - que fue dejado
  lexicon: HALOT
  rationale: El participio nifal de שׁאר permite en español una construcción relativa natural. 'Que quedó' expresa bien a los sobrevivientes o restantes sin cargar demasiado el término técnico 'remanente'.
- source_word: בְּאֶרֶץ יְהוּדָה
  english_pob_choice: in the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - en el país de Judá
  - en la tierra de Judá
  lexicon: HALOT
  rationale: '''Tierra'' conserva el valor territorial de אֶרֶץ y mantiene el estilo bíblico; ''Judá'' corresponde al nombre propio del territorio.'
- source_word: אֲשֶׁר הִשְׁאִיר
  english_pob_choice: whom ... had left
  chosen_spanish: al que ... había dejado
  alternatives_spanish:
  - al que ... había permitido quedar
  - al que ... había dejado allí
  lexicon: HALOT
  rationale: 'El hifil de שׁאר es causativo: Nabucodonosor dejó a ese pueblo en el país. El pretérito pluscuamperfecto ''había dejado'' reproduce bien la relación temporal de la narración.'
- source_word: נְבוּכַדְנֶאצַּר מֶלֶךְ בָּבֶל
  english_pob_choice: Nebuchadnezzar king of Babylon
  chosen_spanish: Nabucodonosor, rey de Babilonia
  alternatives_spanish:
  - Nabucodonosor, el rey de Babilonia
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional del nombre propio en español bíblico y la aposición titulativa directa, sin necesidad de artículo.
- source_word: וַיַּפְקֵד עֲלֵיהֶם
  english_pob_choice: he appointed ... over them
  chosen_spanish: puso sobre ellos
  alternatives_spanish:
  - nombró sobre ellos
  - puso a ... sobre ellos
  - los puso bajo la autoridad de
  lexicon: HALOT
  rationale: פקד con עַל en un contexto administrativo puede expresar asignación de autoridad. 'Puso sobre ellos' es breve y fiel; en español bíblico comunica la idea de encargo u oficialidad sin sonar forzado.
- source_word: גְּדַלְיָהוּ
  english_pob_choice: Gedaliah
  chosen_spanish: Gedalías
  alternatives_spanish:
  - Gedalías
  - Godolías
  lexicon: Standard transliteration practice
  rationale: Se usa una forma española asentada y legible para el nombre propio, conservando la identidad histórica del personaje.
- source_word: בֶּן אֲחִיקָם בֶּן שָׁפָן
  english_pob_choice: son of Ahikam, son of Shaphan
  chosen_spanish: hijo de Ahicam, hijo de Safán
  alternatives_spanish:
  - hijo de Ahicam, hijo de Shafán
  lexicon: Standard transliteration practice
  rationale: La cadena patronímica se mantiene para precisión histórica y para reflejar la estructura del hebreo.
theological_decisions:
- issue: ¿Traducir הַנִּשְׁאָר como 'remanente' o como simple descripción de los que quedaron?
  english_pob_reading: who remained / who were left
  chosen_spanish_reading: que quedó
  alternative_spanish_readings:
  - el remanente
  - los que quedaron
  rationale: El inglés POB evita 'remnant' para no introducir un término teológico no exigido aquí. En español, 'que quedó' mantiene la descripción histórica sin convertir el grupo en un tecnicismo teológico.
  doctrine_reference: Historia de la caída de Judá; uso no técnico de 'remanente' en narrativa histórica
- issue: ¿Cómo expresar la autoridad conferida por וַיַּפְקֵד עֲלֵיהֶם?
  english_pob_reading: he appointed ... over them
  chosen_spanish_reading: puso sobre ellos
  alternative_spanish_readings:
  - lo nombró sobre ellos
  - lo puso al frente de ellos
  - lo puso en cargo sobre ellos
  rationale: La relación de subordinación y supervisión se conserva sin exagerar la jerarquía. 'Puso sobre ellos' deja abierta la función administrativa exacta, como en el hebreo.
  doctrine_reference: Gobierno providencial e histórico de las naciones; autoridad delegada
- issue: Topicalización inicial con וְ
  english_pob_reading: As for the people
  chosen_spanish_reading: En cuanto al pueblo
  alternative_spanish_readings:
  - Y el pueblo
  - Ahora bien, el pueblo
  rationale: El hebreo introduce un nuevo foco discursivo. 'En cuanto al' reproduce esa transición temática en español de forma natural y sobria.
  doctrine_reference: Discurso narrativo bíblico; cohesión textual
