translation:
  language: es
  text: ¿Es poco que nos hayas sacado de una tierra que mana leche y miel para matarnos en el desierto[a], que además quieras hacerte gobernante sobre nosotros[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión «tierra que mana leche y miel» se conserva literalmente para reflejar la ironía: el texto pone en boca de los rebeldes una fórmula normalmente asociada con la tierra prometida.'
    reason: cultural_note
  - marker: b
    text: O «quieras señorearnos». El hebreo también puede expresar la idea de «hacerte gobernante sobre nosotros» o «enseñorearte de nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְעַט
  english_pob_choice: Is it a small thing
  chosen_spanish: ¿Es poco
  alternatives_spanish:
  - ¿Es una cosa pequeña
  - ¿No es bastante
  lexicon: HALOT
  rationale: La expresión hebrea es una pregunta retórica de indignación. En español, «¿Es poco» conserva la fuerza idiomática sin sonar mecánico.
- source_word: הֶעֱלִיתָנוּ
  english_pob_choice: you have brought us up
  chosen_spanish: nos hayas sacado
  alternatives_spanish:
  - nos hayas hecho subir
  - nos hayas llevado
  lexicon: HALOT
  rationale: «Sacado» comunica el movimiento causado por el sujeto con naturalidad en español. Aunque «hacer subir» es más literal, aquí suena forzado; «sacar» mantiene el matiz de salida y liberación implícito en el verbo hebreo.
- source_word: מֵאֶרֶץ זָבַת חָלָב וּדְבַשׁ
  english_pob_choice: out of a land flowing with milk and honey
  chosen_spanish: de una tierra que fluye leche y miel
  alternatives_spanish:
  - de una tierra que mana leche y miel
  - de una tierra que rebosa leche y miel
  lexicon: HALOT
  rationale: Se conserva la fórmula idiomática tradicional de abundancia. «Fluye» refleja bien el participio hebreo y mantiene, como en el inglés POB, la ironía de aplicar esta descripción a Egipto.
- source_word: לַהֲמִיתֵנוּ
  english_pob_choice: to kill us
  chosen_spanish: para matarnos
  alternatives_spanish:
  - para darnos muerte
  - para quitarnos la vida
  lexicon: HALOT
  rationale: El infinitivo de propósito pide una expresión directa. «Matar» es la opción más transparente y fuerte en español, acorde con la acusación del texto.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en la estepa
  lexicon: HALOT
  rationale: Aunque «wilderness» puede traducirse también como «desierto», aquí «desierto» es claro y natural para lectores hispanohablantes. Se mantiene el entorno de Israel en el relato sin restringirlo a arena literal.
- source_word: תִשְׂתָּרֵר ... הִשְׂתָּרֵר
  english_pob_choice: make yourself a ruler over us
  chosen_spanish: quieras dominarnos
  alternatives_spanish:
  - quieras hacerte nuestro gobernante
  - quieras señorearnos
  lexicon: HALOT
  rationale: El verbo hebreo expresa ejercicio de dominio o gobierno. En español, «dominarnos» transmite la acusación de autoexaltación con fuerza idiomática. Se evita «señorearnos» por sonar más marcado y menos transparente, aunque sigue siendo una alternativa posible.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: además
  alternatives_spanish:
  - también
  - encima
  lexicon: HALOT
  rationale: El adverbio añade una nueva agravante. «Además» funciona con naturalidad en la cláusula final y conserva el énfasis acumulativo.
theological_decisions:
- issue: La ironía de llamar a Egipto «tierra que fluye leche y miel»
  english_pob_reading: Retain the phrase literally in the main text
  chosen_spanish_reading: Conservar la frase literalmente en el texto principal
  alternative_spanish_readings:
  - 'Parafrasear para explicitar la ironía, por ejemplo: «una tierra a la que ustedes llaman que fluye leche y miel»'
  rationale: Como en el inglés POB, la ironía queda mejor preservada si no se explicita en la línea principal. El contexto narrativo ya permite percibir la acusación distorsionada sin añadir interpretación.
  doctrine_reference: Principio de primacía del texto original; conservar la tensión retórica sin resolverla en la traducción.
- issue: El matiz de autosoberanía en el verbo final
  english_pob_reading: make yourself a ruler over us
  chosen_spanish_reading: quieras dominarnos
  alternative_spanish_readings:
  - quieras gobernarnos
  - quieras ponerte como jefe sobre nosotros
  rationale: La acusación no solo es de gobierno, sino de imposición arrogante. «Dominarnos» conserva esa carga polémica con naturalidad en español, sin debilitar el sentido de poder ejercido sobre el grupo.
  doctrine_reference: Lectura de dominio/autoridad en שׂרר según HALOT; mantener el forcejeo retórico del texto.
translation_notes:
  revision_awareness: 'El inglés POB revisó la cláusula final de «and that you would also make yourself a ruler over us» a «that you should also make yourself a ruler over us» para reflejar mejor la fuerza formal del hebreo. Esta versión española sigue esa revisión con una estructura natural: «que además quieras dominarnos sobre nosotros», manteniendo el valor de adición de גַּם y la acusación de soberanía autoimpuesta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando el texto lo requiera en este proyecto; aquí no aparece.
  - Se conserva el tono de indignación retórica con una pregunta inicial breve y directa.
  - Se evita sobreexplicar la ironía en el cuerpo principal, siguiendo el enfoque POB de dejar que el contexto la despliegue.
  - Para שׂרר se eligió un verbo de dominio comprensible en español; se documentan alternativas más literales en nota.
