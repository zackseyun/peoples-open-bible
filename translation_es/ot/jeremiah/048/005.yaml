translation:
  language: es
  text: Porque en la subida de Luhit suben con llanto[a]; porque en la bajada de Horonaim han oído el grito angustioso de destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite el sustantivo «llanto» en esta línea para dar énfasis: literalmente, «con llanto sube—llanto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלֵה
  english_pob_choice: ascent
  chosen_spanish: subida
  alternatives_spanish:
  - ascenso
  - pendiente
  lexicon: HALOT
  rationale: En español, «subida» comunica con naturalidad el sentido topográfico de un camino que asciende y evita un calco demasiado técnico. Mantiene bien la correspondencia con la segunda cola, «bajada», que conserva el contraste espacial del hebreo.
- source_word: הַלֻּחוֹת / Luhith
  english_pob_choice: Luhith
  chosen_spanish: Luhit
  alternatives_spanish:
  - Luhith
  lexicon: HALOT
  rationale: Se translitera como nombre propio de lugar. «Luhit» conserva la identificación toponímica y se adapta a la ortografía española sin perder la referencia original.
- source_word: בִּבְכִי ... בֶּכִי
  english_pob_choice: with weeping / weeping
  chosen_spanish: con llanto
  alternatives_spanish:
  - con lloro
  - llorando
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo para intensificar la lamentación. En español, «con llanto» reproduce de manera natural la construcción preposicional y conserva la idea de repetición sin forzar una duplicación poco idiomática.
- source_word: יַעֲלֶה
  english_pob_choice: they go up
  chosen_spanish: suben
  alternatives_spanish:
  - sube
  - ascienden
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el contexto colectivo favorece una traducción plural en español para reflejar el movimiento del pueblo. «Suben» es natural y mantiene el sentido narrativo de desplazamiento.
- source_word: בְּמוֹרַד
  english_pob_choice: on the descent
  chosen_spanish: en la bajada
  alternatives_spanish:
  - en el descenso
  - por la pendiente
  lexicon: HALOT
  rationale: «Bajada» es un equivalente claro y corriente para el relieve descendente, y en español funciona bien como paralelismo con «subida».
- source_word: חוֹרֹנַיִם
  english_pob_choice: Horonaim
  chosen_spanish: Horonaim
  alternatives_spanish:
  - Joronaim
  lexicon: HALOT
  rationale: Nombre propio geográfico transliterado. Se conserva la forma tradicional más reconocible en español bíblico.
- source_word: צָרֵי
  english_pob_choice: distressing
  chosen_spanish: angustioso
  alternatives_spanish:
  - apremiante
  - doloroso
  - de angustia
  lexicon: HALOT
  rationale: La forma es difícil y el contexto exige que califique el clamor. «Angustioso» transmite la cualidad aflictiva del grito sin introducir un sujeto ajeno al hebreo.
- source_word: צַעֲקַת
  english_pob_choice: cry
  chosen_spanish: grito
  alternatives_spanish:
  - clamor
  - alarido
  - voz
  lexicon: HALOT
  rationale: «Grito» expresa bien un clamor intenso y doloroso, y en castellano resulta natural en un contexto de desastre. También preserva la fuerza auditiva del sustantivo hebreo.
- source_word: שֶׁבֶר
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - quebranto
  - derrumbe
  lexicon: HALOT
  rationale: En contexto profético de juicio, «destrucción» comunica con claridad el alcance del desastre. Es una opción más directa que «quebranto» o «ruina» y corresponde al valor contextual documentado por la tradición de traducción auditada.
- source_word: שָׁמֵעוּ
  english_pob_choice: they have heard
  chosen_spanish: han oído
  alternatives_spanish:
  - han escuchado
  - oyeron
  lexicon: HALOT
  rationale: El perfecto plural se vierte con el pretérito perfecto compuesto español para conservar el matiz de acción ya ocurrida con relevancia presente en la declaración profética.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que ajustó la primera cola de «weeping» a «with weeping» para reflejar mejor la construcción hebrea, y se preservó ese matiz con «con llanto» en español. La segunda cola mantiene la lectura auditada de «grito angustioso de destrucción» sin introducir un sujeto explícito ajeno al texto.
  spanish_consistency_notes:
  - Se preserva la oposición topográfica subida/bajada para reflejar el paralelismo del hebreo.
  - Se mantuvo la transliteración de los nombres de lugar y se evitó traducirlos.
  - «Llanto» y «grito» conservan el tono lamentativo y judicial del versículo.
  - No se introdujo una lectura alternativa de «enemigos» en la segunda cola, porque el audit trail en inglés la dejó como posibilidad secundaria y la opción principal fue una calificación del clamor.
