translation:
  language: es
  text: También atacaron las tiendas de ganado[a], y se llevaron[b] ovejas[c] en abundancia y camellos. Luego regresaron a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea puede entenderse más literalmente como «las tiendas de ganado»; también puede aludir a campamentos pastoriles o a los recintos donde se guardaba el ganado.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo también puede significar «tomar cautivo»; con animales como objeto, el sentido es que los tomaron como botín.
    reason: lexical_alternative
  - marker: c
    text: «Ovejas» puede entenderse de manera más amplia como «rebaños» o «ganado menor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: They also
  chosen_spanish: También
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: El hebreo añade una acción más al relato. «También» conserva la fuerza aditiva sin recargar la frase en español.
- source_word: אָהֳלֵי מִקְנֶה
  english_pob_choice: the tents of livestock
  chosen_spanish: las tiendas de ganado
  alternatives_spanish:
  - las tiendas de animales de rebaño
  - los campamentos de ganado
  - las tiendas de los pastores
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «tiendas de ganado» y puede referirse a campamentos pastoriles o a recintos asociados al ganado. «Tiendas de ganado» mantiene la imagen concreta sin forzar una interpretación demasiado específica.
- source_word: הִכּוּ
  english_pob_choice: struck
  chosen_spanish: atacaron
  alternatives_spanish:
  - golpearon
  - hirieron
  - asediaron
  lexicon: HALOT
  rationale: En contexto militar, נכה puede implicar golpear o atacar. En español, «atacaron» comunica mejor el sentido narrativo de una incursión contra campamentos que un simple golpe físico.
- source_word: וַיִּשְׁבּוּ
  english_pob_choice: they carried off
  chosen_spanish: se llevaron
  alternatives_spanish:
  - capturaron
  - tomaron como botín
  - se apoderaron de
  lexicon: HALOT
  rationale: Con objetos animales, el verbo de «capturar» se expresa naturalmente en español como «se llevaron», conservando el sentido de botín sin introducir una metáfora impropia para seres no humanos.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaños
  - ganado menor
  - animales de rebaño
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovinos y caprinos, pero en español «ovejas» es una traducción natural y suficientemente precisa en este contexto de botín abundante. Si se desea más amplitud semántica, la nota puede sugerir «rebaños».
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - abundantemente
  - en gran cantidad
  - en gran número
  lexicon: HALOT
  rationale: La fórmula idiomática se vierte con una locución natural en español que conserva el énfasis en la gran cantidad del botín.
- source_word: וּגְמַלִּים
  english_pob_choice: camels
  chosen_spanish: camellos
  alternatives_spanish:
  - dromedarios
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del sustantivo hebreo.
- source_word: וַיָּשֻׁבוּ יְרוּשָׁלִָם
  english_pob_choice: Then they returned to Jerusalem
  chosen_spanish: Luego regresaron a Jerusalén
  alternatives_spanish:
  - Entonces volvieron a Jerusalén
  - Después regresaron a Jerusalén
  lexicon: HALOT
  rationale: La forma verbal narrativa se expresa con una secuencia natural en español. «Luego» preserva el avance temporal del relato sin sonar excesivamente literal.
translation_notes:
  revision_awareness: El texto base inglés fue revisado de «livestock tents» a «the tents of livestock» para reflejar con más naturalidad la imagen hebrea. La versión española sigue esa misma decisión semántica y mantiene la tensión entre una traducción literal de la expresión y su probable referencia a campamentos pastoriles.
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» como topónimo estándar en español.
  - Se prefiere «ovejas» por naturalidad, pero se deja constancia de la posible amplitud de צֹאן en la nota.
  - «Se llevaron» refleja el valor de captura/plunder del verbo sin usar una fórmula forzada en español.
