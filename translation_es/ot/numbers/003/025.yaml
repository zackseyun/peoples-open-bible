review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo y varias decisiones léxicas importantes: «los hijos de Gersón», «el tabernáculo», «la tienda», «su cobertura» y la lista de elementos confiados a los gersonitas. Sin embargo, no preserva con suficiente fidelidad בְּאֹהֶל מוֹעֵד, que en la evidencia fuente y en el rastro POB es «en la tienda de reunión / tent of meeting», no «en el tabernáculo de reunión». Además, la nota [a] está anclada en el lugar incorrecto: la alternativa documentada corresponde a מִשְׁמֶרֶת («responsabilidad/deber/encargo»), no a «tabernáculo».'
  spanish_quality_summary: 'El español es generalmente claro y eclesialmente legible, pero conviene ajustar dos puntos para mayor naturalidad y precisión: «tienda de reunión» para el nombre אֹהֶל מוֹעֵד en la primera mención, y «cubierta» suena más idiomático que «cobertura» en un inventario de piezas textiles/estructurales. «Cortina» para מָסַךְ es aceptable en español, con nota que conserve la alternativa «pantalla» o «colgadura».'
  glossary_alignment: Hay una desviación terminológica importante entre אֹהֶל מוֹעֵד («tienda de reunión») y מִשְׁכָּן («tabernáculo»). El borrador los acerca demasiado al usar «tabernáculo de reunión» para el primero, lo que reduce la distinción que el verso mismo mantiene. No hay cuestiones teológicas especiales; el ajuste es principalmente léxico y de consistencia con el audit trail.
  issues:
  - severity: high
    issue: בְּאֹהֶל מוֹעֵד fue traducido como «en el tabernáculo de reunión»
    rationale: El hebreo usa אֹהֶל («tienda»), no מִשְׁכָּן («tabernáculo»), y el rastro POB distingue expresamente ambos términos dentro del mismo versículo. La versión española debe preservar esa distinción.
  - severity: high
    issue: La nota [a] está colocada sobre «tabernáculo» en vez de sobre «responsabilidad»
    rationale: La nota lexical alternativa documenta מִשְׁמֶרֶת, no הַמִּשְׁכָּן. Tal como está, induce a error sobre qué palabra fuente está explicando.
  - severity: medium
    issue: «su cobertura» es menos natural que «su cubierta»
    rationale: Ambas son posibles, pero «cubierta» suena más idiomático y concreto para מִכְסֵהוּ en una lista de componentes del santuario.
  - severity: low
    issue: La nota de מָסַךְ repite el término elegido como alternativa
    rationale: Si el texto principal usa «cortina», la nota no debe decir «O «cortina»». Conviene conservar una alternativa real, como «pantalla» o «colgadura».
  revised_spanish_text: Y la responsabilidad[a] de los hijos de Gersón en la tienda de reunión era el tabernáculo, la tienda, su cubierta, y la cortina[b] de la entrada de la tienda de reunión.
  revised_footnotes:
