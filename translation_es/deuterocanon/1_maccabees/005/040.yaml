  yaml_path: translation/deuterocanon/1_maccabees/005/040.yaml
  text: And Timotheus said to the commanders of his forces[a], when Judas and his camp were drawing near to the wadi, “If he crosses over to us first, we will not be able to withstand him[b], because he will surely prevail against us.”
  footnotes:
  - marker: a
    text: Greek literally, 'the torrent/stream of water.' The expression likely refers to a wadi or seasonal watercourse rather than a major river.
    reason: cultural_note
  - marker: b
    text: Or, more literally, 'he will be able against us.' The sense in context is that Judas would overpower them.
    reason: lexical_alternative
