translation:
  language: es
  text: Simón[a], siendo hostil a los intereses del rey, informó que muchas decenas de millares de fondos privados[b] habían sido guardados en las tesorerías de Jerusalén, que no pertenecían al templo[c], sino que pertenecían al rey Seleuco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los asuntos del rey» o «la causa del rey» para la frase correspondiente a τοῖς τοῦ βασιλέως πράγμασιν; la expresión griega es algo condensada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «muchas miríadas de dinero/fondos privados».
    reason: lexical_alternative
  - marker: c
    text: O «no compartidos con el templo» o «no pertenecientes en común al templo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Σίμων ὢν τοῖς τοῦ βασιλέως πράγμασιν ἥκω
  english_pob_choice: being hostile to the king’s interests
  chosen_spanish: siendo hostil a los intereses del rey
  alternatives_spanish:
  - siendo hostil a los asuntos del rey
  - siendo contrario a la causa del rey
  - habiendo venido a los intereses del rey
  lexicon: LSJ
  rationale: La frase griega es comprimida y admite un matiz de relación adversa con los asuntos del rey. En español, «siendo hostil a los intereses del rey» conserva el sentido acusatorio y fluye con naturalidad. «Asuntos» o «causa» son posibles, pero «intereses» expresa mejor el alcance práctico del reclamo.
- source_word: τοῖς τοῦ βασιλέως πράγμασιν
  english_pob_choice: the king’s interests
  chosen_spanish: los intereses del rey
  alternatives_spanish:
  - los asuntos del rey
  - la causa del rey
  lexicon: LSJ
  rationale: πράγματα puede significar asuntos, negocios o intereses. Dado el contexto de denuncia política y reclamo patrimonial, «intereses» comunica bien la idea de lo que se atribuye al rey.
- source_word: μηνύων
  english_pob_choice: reported
  chosen_spanish: informó
  alternatives_spanish:
  - denunció
  - declaró
  - comunicó
  lexicon: BDAG
  rationale: El participio indica dar a conocer una información, a menudo en contexto de acusación. «Informó» mantiene un tono relativamente neutral y deja que el contexto adversarial cargue el matiz de denuncia.
- source_word: πολλὰς ἰδιωτικῶν χρημάτων μυριάδας
  english_pob_choice: many tens of thousands of private funds
  chosen_spanish: muchas decenas de millares de fondos privados
  alternatives_spanish:
  - muchas miríadas de dinero privado
  - muchas decenas de millares en riqueza privada
  - muchas miríadas de fondos privados
  lexicon: LSJ
  rationale: μυριάδες alude a unidades de diez mil; «decenas de millares» preserva la fuerza numérica sin sonar artificioso. ἰδιωτικῶν χρημάτων se refiere a dinero o fondos de propiedad privada; «fondos privados» suena natural en español sin perder el valor financiero.
- source_word: γαζοφυλακίοις
  english_pob_choice: treasuries
  chosen_spanish: los tesoros
  alternatives_spanish:
  - las cámaras del tesoro
  - los depósitos del tesoro
  - las tesorerías
  lexicon: LSJ
  rationale: El término designa depósitos o repositorios de tesoro. En español, «tesoros» funciona como equivalente bíblico comprensible y acorde con el contexto de custodia de dinero.
- source_word: τεθησαυρίσθαι
  english_pob_choice: had been stored
  chosen_spanish: habían sido guardados
  alternatives_spanish:
  - habían sido depositados
  - habían sido almacenados
  - habían sido atesorados
  lexicon: LSJ
  rationale: El infinitivo perfecto expresa una acción completada de colocación en resguardo. «Habían sido guardados» reproduce esa idea de forma clara y digna.
- source_word: τῷ ἱερῷ μὴ ἐπικοινωνούσας
  english_pob_choice: not connected with the temple
  chosen_spanish: no compartidos con el templo
  alternatives_spanish:
  - no pertenecientes al templo
  - no en común con el templo
  - no vinculados al templo
  lexicon: LSJ
  rationale: 'La construcción indica que esos fondos no estaban en comunión/propiedad compartida con el templo. «No compartidos con el templo» conserva la ambigüedad importante: no eran bienes del templo ni estaban en régimen común con él.'
- source_word: προσήκειν
  english_pob_choice: belonged
  chosen_spanish: pertenecían
  alternatives_spanish:
  - correspondían
  - eran debidos
  - tenían derecho
  lexicon: LSJ
  rationale: En este contexto legal-financiero, el verbo expresa pertenencia o derecho de reclamación. «Pertenecían» es el equivalente más natural y claro en español.
- source_word: Σελεύκῳ τῷ βασιλεῖ
  english_pob_choice: King Seleucus
  chosen_spanish: al rey Seleuco
  alternatives_spanish:
  - a Seleuco, el rey
  - al rey Seleuco
  lexicon: LSJ
  rationale: El nombre y el título se conservan en una forma natural en español. «Al rey Seleuco» mantiene la referencia regia sin alterar el orden más que lo necesario para la idiomaticidad.
theological_decisions:
- issue: Relación de los fondos con el templo
  english_pob_reading: The verse distinguishes private deposited funds from temple property.
  chosen_spanish_reading: El versículo distingue fondos privados guardados de los bienes del templo.
  alternative_spanish_readings:
  - Los fondos simplemente no estaban disponibles para uso del templo.
  - La frase puede entenderse más libremente como no compartidos con el santuario.
  rationale: 'El griego marca explícitamente que el dinero era ἰδιωτικῶν χρημάτων y que no estaba en comunión con el templo. La versión española conserva esa distinción porque es clave para la lógica de la acusación: se trata de bienes privados depositados en un lugar sagrado, no de patrimonio del templo.'
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que suavizó la repetición de «funds» y prefirió «King Seleucus». La redacción española sigue ese ajuste estilístico, evitando repeticiones innecesarias y manteniendo el título regio en una forma natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general de la serie, aunque este versículo no contiene el nombre divino.
  - Se usa «fondos» para χρημάτων por claridad financiera, sin perder el matiz de riqueza privada.
  - «No compartidos con el templo» preserva la tensión semántica entre propiedad y comunión común, evitando una simplificación doctrinal.
  - «Al rey Seleuco» conserva el título y el nombre propios en orden idiomático español.
