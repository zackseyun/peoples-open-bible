revisions:
- from: Pero tú, [a] habiendo sido azotado desde el cielo, proclama a todos la majestad del poder de Dios. Y cuando dijeron estas cosas,[b] se hicieron invisibles.
  to: Pero tú[a], habiendo sido azotado del cielo, proclama a todos la majestad del poder de Dios. Y después de decir estas cosas[b], se hicieron invisibles.
  rationale: Se ajusta la sintaxis para un español más natural y fiel al participio griego, se mejora la idiomaticidad de ἐξ οὐρανοῦ con «del cielo», se corrige la colocación del marcador y se elimina el anglicismo de la nota sin alterar el sentido documentado por la auditoría inglesa.
