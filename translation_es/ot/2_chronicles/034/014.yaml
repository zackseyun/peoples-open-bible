- from: Y al sacar el dinero que había sido llevado a la casa de Yahvé[a], el sacerdote Hilcías halló el Libro de la Ley de Yahvé, por mano de Moisés.
  to: Y al sacar la plata que había sido traída a la casa de Yahvé[a], el sacerdote Hilcías halló el Libro de la Ley de Yahvé por mano de Moisés.
  rationale: Se ajusta הַכֶּסֶף a «la plata» para seguir la elección léxica fuente/auditada; se mejora la naturalidad con «había sido traída»; y se elimina la coma antes de «por mano de Moisés» para una sintaxis española más limpia, manteniendo intacta la nota explicativa del modismo.
