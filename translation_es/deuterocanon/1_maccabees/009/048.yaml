    rationale: La nota inglesa documenta una ambigüedad de la cláusula final griega οὐ διέβησαν ἐπ᾿ αὐτοὺς τὸν Ἰορδάνην, no de εἰς τὸ πέραν («a la otra orilla»). En español, la nota debe anclarse en «detrás de ellos» o en la cláusula final equivalente.
  - severity: medium
    issue: El contenido de la nota no conserva la alternativa léxica principal del expediente.
    rationale: El expediente inglés preserva explícitamente la posibilidad de leer la frase como movimiento hostil («contra ellos» / «para atacarlos»). La nota española actual habla de brevedad y relación implícita, pero no expone esa alternativa importante.
