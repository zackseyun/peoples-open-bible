  lexicon: BDAG
  rationale: 여기서는 시편 인용을 포함한 유대 성경 전체를 가리키므로 「율법」으로 옮기되 각주로 명시.
- source_word: δωρεάν
  english_pob_choice: without cause
  chosen_korean: 까닭 없이
  alternatives_korean:
  - 이유 없이
  - 거저
  lexicon: BDAG
  rationale: 부사 δωρεάν의 「이유 없이·공짜로」 이중 의미 중 본문은 「이유 없이」.
