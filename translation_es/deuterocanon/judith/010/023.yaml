revisions:
- from: Ahora bien, cuando Judith llegó[a] delante de él y de sus sirvientes, todos se maravillaron de la belleza de su rostro; y, cayendo sobre su rostro, se inclinó ante él, y ellos la levantaron.
  to: Ahora bien, cuando Judith llegó[a] delante de él y de sus asistentes, todos se maravillaron de la belleza de su rostro; y, cayendo rostro en tierra, se inclinó ante él, y ellos la levantaron.
  rationale: Se ajusta θεραπόντων a «asistentes» para conservar el matiz cortesano documentado por el POB, y se reemplaza el calco «cayendo sobre su rostro» por «cayendo rostro en tierra», que transmite la misma postración con español natural y digno. El resto del versículo puede mantenerse.
