lexical_decisions:
- source_word: בַּעֲשֹׂתוֹ
  english_pob_choice: when he made
  chosen_spanish: cuando hizo
  alternatives_spanish:
  - al hacer
  - mientras hacía
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa aquí circunstancia temporal. «Cuando hizo» conserva el valor temporal con naturalidad en español y sigue de cerca la lectura auditada de la POB en inglés.
- source_word: לַמָּטָר
  english_pob_choice: for the rain
  chosen_spanish: para la lluvia
  alternatives_spanish:
  - para lluvia
  lexicon: HALOT
  rationale: מָטָר significa «lluvia». Mantener el artículo implícito de la forma hebrea con «la lluvia» suena más natural en español y conserva la referencia concreta al fenómeno meteorológico.
- source_word: חֹק
  english_pob_choice: a decree
  chosen_spanish: un decreto
  alternatives_spanish:
  - una ordenanza
  - un estatuto
  - un límite fijo
  lexicon: HALOT
  rationale: En este contexto cósmico, חֹק no es principalmente una norma legal humana sino una disposición fijada por Dios. «Decreto» comunica bien la idea de una regulación establecida sin reducirla a un tecnicismo jurídico.
- source_word: וְדֶרֶךְ
  english_pob_choice: and a path
  chosen_spanish: y un camino
  alternatives_spanish:
  - y una senda
  - y una ruta
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser «camino» o «sendero». «Camino» es claro y digno en español, y mantiene la imagen de una trayectoria asignada.
- source_word: לַחֲזִיז
  english_pob_choice: for the thunderbolt
  chosen_spanish: para el relámpago
  alternatives_spanish:
  - para el rayo
  - para el destello
  lexicon: HALOT
  rationale: חֲזִיז en poesía puede referirse al relámpago o al rayo. En español, «relámpago» conserva la imagen luminosa y permite enlazar mejor con la nota alternativa tradicional del versículo.
- source_word: קֹלוֹת
  english_pob_choice: of the storms
  chosen_spanish: de los truenos
  alternatives_spanish:
  - de las tormentas
  - de los sonidos
  lexicon: HALOT
  rationale: קוֹלוֹת, en este contexto de fenómenos atmosféricos, puede entenderse como «truenos». La POB inglesa optó por «storms» para abarcar el cuadro meteorológico; en español, «de los truenos» preserva más directamente el plural intensivo del hebreo y la tensión léxica, dejando abierta la relación con la tormenta.
theological_decisions:
- issue: Orden cósmico establecido por Dios
  english_pob_reading: God assigns fixed order to rain and storm phenomena.
  chosen_spanish_reading: Dios fija un orden determinado para la lluvia y los fenómenos de tormenta.
  alternative_spanish_readings:
  - Dios gobierna providencialmente la naturaleza
  - Dios establece límites para la lluvia y el trueno
  rationale: El versículo presenta la sabiduría divina en el ordenamiento de la creación sin desarrollar una formulación doctrinal más amplia. La traducción conserva esa afirmación poética y reguladora sin sobreinterpretarla.
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el borrador inglés auditado. La única decisión relevante fue conservar la fuerza poética del hebreo en español: «relámpago» para חֲזִיז y «de los truenos» para קֹלוֹת, con nota alternativa que recuerda la opción inglesa de «storms».'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en la tercera persona («hizo») sin añadir sujeto explícito que no está en el hebreo.
  - «Decreto» se usa de modo coherente con el valor de חֹק como disposición fijada, no como estatuto legal humano.
  - La nota [a] se ancla en «relámpago» porque ese término admite la alternativa «luz del relámpago» y conecta con la lectura inglesa «lightning».
  - La nota [b] preserva la ambigüedad entre «truenos» y «tormentas» sin borrar el matiz meteorológico del plural hebreo.
