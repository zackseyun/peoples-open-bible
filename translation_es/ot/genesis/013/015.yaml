review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: la conexión explicativa de כִּי, la totalidad de כָּל הָאָרֶץ, la cláusula relativa ''que ves'', la promesa futura ''te la daré'', el destinatario adicional ''a tu descendencia'' y la duración ''para siempre''. Sin embargo, la nota al pie no preserva fielmente la alternativa léxica del inglés POB, porque repite ''descendencia'' como alternativa y deja ''offspring'' sin traducir al español.'
  spanish_quality_summary: El español es claro, natural y digno. 'Porque toda la tierra que ves, te la daré a ti y a tu descendencia para siempre' es legible y fiel. La única reparación necesaria es en la nota al pie, para que sea idiomática y útil en español. El texto principal no requiere cambio.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. ''Descendencia'' es una buena elección para זֶרַע en este contexto, y ''para siempre'' refleja bien עַד עוֹלָם. No aparece terminología sensible como Yahvé/Mesías/espíritu. La nota debe ajustar la alternativa léxica a español: ''simiente'' o ''linaje/descendientes'', no ''offspring''.'
  issues:
  - severity: medium
    issue: La nota al pie léxica está mal formulada en español.
    rationale: 'Dice: ''O «a tu descendencia»'', que no ofrece una alternativa real al texto principal, y además deja el término inglés ''offspring'' sin adaptar. La nota debe preservar la alternativa documentada por el POB inglés de forma inteligible en español, por ejemplo ''O «a tu simiente»'' y explicar el valor colectivo de זֶרַע.'
  revised_spanish_text: Porque toda la tierra que ves[a], te la daré a ti y a tu descendencia para siempre.
  revised_footnotes:
  - marker: a
    text: O «a tu simiente». El hebreo זֶרַע es un sustantivo colectivo que puede significar «simiente», «descendencia» o «descendientes».
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel, natural y teológicamente adecuado. Solo se corrige la nota al pie para que realmente ofrezca una alternativa léxica en español y elimine el anglicismo sin traducir.
