translation:
  language: es
  text: «Barreré a[a] hombre y bestia; barreré las aves de los cielos[b] y los peces del mar, y los tropiezos[c] con los impíos. Y quitaré de la faz del suelo[d] al hombre», declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘humanidad’. Aquí אָדָם se usa en sentido colectivo para la especie humana.
    reason: lexical_alternative
  - marker: b
    text: O ‘las aves del cielo’.
    reason: lexical_alternative
  - marker: c
    text: O ‘las causas de tropiezo’. El hebreo puede referirse a aquello que hace caer o tropezar.
    reason: lexical_alternative
  - marker: d
    text: O ‘de la faz de la tierra’. El hebreo dice ‘suelo/terreno’ y puede conservar una resonancia de lenguaje de juicio anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָסֵף
  english_pob_choice: I will sweep away
  chosen_spanish: barreré
  alternatives_spanish:
  - eliminaré
  - arrasaré
  - se llevaré
  lexicon: HALOT
  rationale: En este contexto de juicio, אסף no es “reunir” sino quitar por completo. “Barreré” conserva la fuerza de remoción total y el movimiento enfático del hebreo en un español natural.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - humanidad
  - ser humano
  - mankind
  lexicon: HALOT
  rationale: El hebreo usa אָדָם de manera colectiva y representativa. “Hombre” mantiene la dicción bíblica y el paralelismo con la repetición posterior del término, sin neutralizar innecesariamente el matiz del original.
- source_word: בְהֵמָה
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - animal
  - ganado
  lexicon: HALOT
  rationale: En esta lista cósmica de juicio, “bestia” preserva el registro elevado y el alcance amplio del término mejor que “animal” o “ganado”.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: the birds of the heavens
  chosen_spanish: las aves de los cielos
  alternatives_spanish:
  - las aves del cielo
  - las aves del firmamento
  lexicon: HALOT
  rationale: “Aves” es idiomático en español y “los cielos” conserva el plural del hebreo y el tono poético del texto. Evita a la vez una calca pesada y una paráfrasis excesiva.
- source_word: דְגֵי הַיָּם
  english_pob_choice: the fish of the sea
  chosen_spanish: los peces del mar
  alternatives_spanish:
  - los peces del océano
  - los peces de las aguas
  lexicon: HALOT
  rationale: Es una correspondencia directa y transparente del constructo hebreo, conservando la serie tierra-aire-mar.
- source_word: הַמַּכְשֵׁלוֹת
  english_pob_choice: the stumbling blocks
  chosen_spanish: los tropezaderos
  alternatives_spanish:
  - los escollos
  - las causas de tropiezo
  lexicon: HALOT
  rationale: El POB inglés dejó abierto si se trata de objetos que hacen tropezar o de causas de tropiezo. “Tropezaderos” mantiene esa ambigüedad en español y evita decidir prematuramente por una paráfrasis interpretativa.
- source_word: אֶת הָרְשָׁעִים
  english_pob_choice: with the wicked
  chosen_spanish: con los impíos
  alternatives_spanish:
  - junto con los impíos
  - y los impíos
  lexicon: HALOT
  rationale: La relación sintáctica es comprimida. “Con los impíos” reproduce la coordinación breve del hebreo y permite que “tropezaderos” quede unido a “los impíos” sin forzar una explicación adicional.
- source_word: וְהִכְרַתִּי
  english_pob_choice: And I will cut off
  chosen_spanish: Y cortaré
  alternatives_spanish:
  - Y destruiré
  - Y extirparé
  lexicon: HALOT
  rationale: כרת conserva su sentido literal de “cortar” y, en juicio, su fuerza idiomática de eliminación. “Cortaré” es más fiel al campo verbal que “destruiré”.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  english_pob_choice: from the face of the ground
  chosen_spanish: de sobre la faz de la tierra
  alternatives_spanish:
  - de sobre la faz del suelo
  - de la faz de la tierra
  lexicon: HALOT
  rationale: La frase hebrea usa “ground” (אֲדָמָה), pero en español “tierra” suena más natural en esta locución fija. “De sobre la faz” conserva el hebraísmo sin hacerlo opaco.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: El nombre divino aparece explícitamente. Siguiendo la norma del proyecto, se traduce como “Yahvé” y no se enmascara como “SEÑOR”.
theological_decisions:
- issue: Sentido colectivo de אָדָם en el juicio universal
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - humanidad
  - ser humano
  rationale: Aunque el sentido es colectivo, el hebreo conserva la forma representativa אָדָם. “Hombre” mantiene la tensión entre singular representativo y referencia a la especie humana, como hacía el POB inglés con “man”.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם adam'
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. La doctrina del proyecto exige preservar el nombre del pacto en la lengua meta, y “Yahvé” es la forma establecida para el español en este proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre “tropezaderos” y “los impíos”
  english_pob_reading: the stumbling blocks with the wicked
  chosen_spanish_reading: los tropezaderos con los impíos
  alternative_spanish_readings:
  - las causas de tropiezo con los impíos
  - los tropezaderos junto con los impíos
  rationale: El hebreo es elíptico y puede leerse como una coordinación breve. Se conserva esa ambigüedad sin explicitar más de lo que el texto garantiza.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; treatment of compressed Hebrew syntax
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el último pass revisado del inglés POB: mantiene la cadencia repetida de ‘barreré’, conserva la coordinación breve ‘con los impíos’ sin añadir ‘junto con’, y refleja el nombre divino explícito con la convención española del proyecto (“Yahvé”). También retiene la posibilidad de lectura colectiva de אָדָם y la ambigüedad de הַמַּכְשֵׁלוֹת sin sobreexplicar.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ conforme al estándar español del proyecto para יְהוָה.
  - Se prefiere ‘hombre’ para אָדָם en coherencia con la versión inglesa auditada, manteniendo el sentido representativo.
  - ‘Bestia’, ‘aves de los cielos’ y ‘peces del mar’ conservan el paralelismo triádico del hebreo.
  - La sintaxis breve de ‘tropezaderos con los impíos’ reproduce la compressión del original sin introducir un nexo interpretativo adicional.
