revisions:
- from: Aumenté mis obras; me edifiqué casas[a]; planté viñas para mí.
  to: 'Aumenté mis obras[a]: construí casas para mí; planté viñas para mí.'
  rationale: Se reubica la nota al elemento correcto ('mis obras') para que corresponda al punto léxico documentado en el inglés POB. También se hace paralela y explícita la repetición de לִי en ambas acciones con 'para mí', y se reemplaza 'me edifiqué' por 'construí ... para mí' por mayor naturalidad y transparencia formal.
