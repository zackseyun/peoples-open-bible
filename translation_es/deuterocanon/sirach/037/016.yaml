review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo como texto principal y preserva la gran divergencia del griego en nota. Sin embargo, varias elecciones españolas no representan bien el valor léxico del hebreo: «laborioso» describe una cualidad, no a un trabajador; «quien saca mal» suena poco idiomático y oscurece la imagen de «sacar/producir el mal».'
  spanish_quality_summary: La redacción actual resulta poco natural y algo confusa en español. «Un laborioso vano» no es una construcción clara ni digna en registro bíblico moderno. «Guardia» funciona, pero «quien saca mal» es forzado. Una revisión mínima puede conservar la tersura proverbial y mejorar mucho la legibilidad.
  glossary_alignment: 'No hay conflicto con la terminología teológica del proyecto. La nota con «Altísimo» está bien. El principal ajuste es léxico-estilístico: usar sustantivos agentivos naturales en español y una expresión más transparente para מוציא רע.'
  issues:
  - severity: high
    issue: «laborioso» no corresponde bien a פועל como sustantivo agentivo
    rationale: En español, «laborioso» normalmente significa diligente o trabajador como adjetivo de cualidad, no «obrero/trabajador» como referente nominal. Eso distorsiona el sentido básico de פועל.
  - severity: medium
    issue: «quien saca mal» es poco idiomático y semánticamente opaco
    rationale: Aunque intenta conservar la literalidad de מוציא רע, en español suena antinatural y no comunica bien la imagen. «quien produce el mal» mantiene la cautela interpretativa mejor que «malhechor» y es mucho más claro.
  - severity: medium
    issue: La construcción global suena poco natural en español bíblico moderno
    rationale: «Un laborioso vano para su obra» no fluye bien. «Un trabajador vano para su obra» conserva la forma breve y paralela sin introducir paráfrasis excesiva.
  revised_spanish_text: Un[a] trabajador vano para su obra, un guardia vano para quien produce el mal.
