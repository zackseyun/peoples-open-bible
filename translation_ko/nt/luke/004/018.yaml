id: LUK.4.18
reference: Luke 4:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πνεῦμα κυρίου ἐπ’ ἐμέ, οὗ εἵνεκεν ἔχρισέν με εὐαγγελίσασθαι πτωχοῖς, ἀπέσταλκέν ⸀με κηρύξαι αἰχμαλώτοις ἄφεσιν καὶ τυφλοῖς ἀνάβλεψιν, ἀποστεῖλαι τεθραυσμένους ἐν ἀφέσει,
base_translation:
  language: en
  yaml_path: translation/nt/luke/004/018.yaml
  text: The Spirit of the Lord is upon me[a], because he has anointed me to proclaim good news to the poor. He has sent me to proclaim release to the captives and recovery of sight to the blind, to send out the oppressed in release[b],
  footnotes:
  - marker: a
    text: Or 'forgiveness' for 'release' (Greek ἄφεσις); here the context of captives and the oppressed favors liberation language.
    reason: lexical_alternative
  - marker: b
    text: Literally 'those who have been broken'; 'the oppressed' renders the idiomatic sense in context.
    reason: lexical_alternative
translation:
  language: ko
  text: 「야훼[a]의 영이 내게 임하셨으니, 이는 그분께서 내게 기름을 부으셔서 가난한 자들에게 복음을 전하게 하시려는 것이며, 사로잡힌 자들에게 해방을, 눈먼 자들에게 다시 보게 됨을 선포하게 하시고, 짓밟힌 자들을 자유롭게 풀어 주시려는 것이며,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 사 61:1-2 + 사 58:6의 LXX 인용. 「πνεῦμα κυρίου」는 「루악 야훼」(이사야)를 그대로 반영한다.
    reason: alternative_reading
lexical_decisions:
- source_word: Πνεῦμα κυρίου ... ἐνιαυτὸν κυρίου
  english_pob_choice: Spirit of the Lord ... year of the Lord
  chosen_korean: 야훼의 영 ... 야훼의 은혜의 해
  alternatives_korean:
  - 주의 영 ... 주의 해
  lexicon: BDAG
  rationale: 사 61:1-2 직접 인용 정형. 누가의 메시아 직무 선언이므로 OT 신명을 살린다.
theological_decisions:
- issue: 4:18-19 사 61:1-2 인용 — 예수의 나사렛 회당 메시아 직무 선언
  chosen_reading: 사 61 인용 전체를 「야훼」 정책과 LXX 양식 한국어로 옮긴다
  alternative_readings:
  - 전통적 「주」 일관 사용
  rationale: 누가는 본 인용을 4-24장 사역의 표제로 의도적으로 배치한다. 「가난한 자」, 「사로잡힌 자」, 「눈먼 자」, 「짓밟힌 자」 네 부류와 「야훼의 은혜의 해」(희년 반향)는 본 복음서의 만민·약자 우선 구조를 정의한다. 사 58:6의 「짓밟힌 자」 결합은 누가의 의도적 편집이다.
  doctrine_reference: 'DOCTRINE.md: Isaianic mission program'
