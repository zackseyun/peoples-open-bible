id: PHP.4.15
reference: Philippians 4:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οἴδατε δὲ καὶ ὑμεῖς, Φιλιππήσιοι, ὅτι ἐν ἀρχῇ τοῦ εὐαγγελίου, ὅτε ἐξῆλθον ἀπὸ Μακεδονίας, οὐδεμία μοι ἐκκλησία ἐκοινώνησεν εἰς λόγον δόσεως καὶ λήμψεως εἰ μὴ ὑμεῖς μόνοι,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/015.yaml
  text: And you yourselves also know, Philippians, that at the beginning of the gospel, when I departed from Macedonia, no church shared with me in the matter of giving and receiving except you alone.
translation:
  language: ko
  text: 빌립보 사람 여러분, 여러분 자신도 아시는 바와 같이, 복음의 처음 무렵 내가 마케도니아를 떠날 때에, 주고받는 일[a]에 있어 나와 함께한 회중[b]은 여러분뿐이었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「주고받음의 셈에」(εἰς λόγον δόσεως καὶ λήμψεως). 회계·결산 어휘를 비유로 빌려 물질적 후원의 상호성을 표현한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「교회」. 헬라어 ἐκκλησία는 「모인 회중」을 뜻하며, 본 번역은 회중적 성격을 살리는 「회중」을 기본값으로 둔다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδατε
  english_pob_choice: you ... know
  chosen_korean: 아시는
  lexicon: BDAG
  rationale: 현재 완료적 의미의 οἶδα. 합쇼체 「아시는」으로 자연스럽게 옮긴다.
- source_word: δὲ
  english_pob_choice: And
  chosen_korean: (생략)
  alternatives_korean:
  - 그런데
  - 또한
  lexicon: BDAG
  rationale: 가벼운 담론 연결 δέ는 한국어에서 흔히 생략되며, 「여러분 자신도」가 그 추가적 강조를 담는다.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you yourselves also
  chosen_korean: 여러분 자신도
  alternatives_korean:
  - 여러분 스스로도
  lexicon: BDAG
  rationale: 추가적 καί와 강조적 ὑμεῖς를 함께 살린다.
- source_word: Φιλιππήσιοι
  english_pob_choice: Philippians
  chosen_korean: 빌립보 사람 여러분
  alternatives_korean:
  - 빌립보 사람들이여
  - 빌립보인들
  lexicon: BDAG
  rationale: 호격을 합쇼체 「여러분」으로 자연스럽게 풀어내며, 1절의 「형제 여러분」과 호격 어조를 일치시킨다.
- source_word: ἐν ἀρχῇ τοῦ εὐαγγελίου
  english_pob_choice: at the beginning of the gospel
  chosen_korean: 복음의 처음 무렵
  alternatives_korean:
  - 복음의 처음에
  - 복음 사역의 시작 때에
  lexicon: BDAG
  rationale: 「처음 무렵」이 시기적 모호함을 자연스럽게 담는다. 본문의 압축을 풀어내지 않는다.
- source_word: ἐξῆλθον ἀπὸ Μακεδονίας
  english_pob_choice: I departed from Macedonia
  chosen_korean: 마케도니아를 떠날 때에
  alternatives_korean:
  - 마게도냐를 떠날 때에
  - 마케도니아에서 나갈 때에
  lexicon: BDAG
  rationale: 외래어 표기법에 따라 「마케도니아」를 채택한다(전통의 「마게도냐」도 가능하나 현대 합쇼체와의 일관성을 우선).
- source_word: οὐδεμία μοι ἐκκλησία ἐκοινώνησεν
  english_pob_choice: no church shared with me
  chosen_korean: 나와 함께한 회중은 ... 없었다(→「여러분뿐이었습니다」 구조로 압축)
  alternatives_korean:
  - 어떤 회중도 나와 나누지 않았습니다
  lexicon: BDAG
  rationale: 부정+예외 구문(「~없었다 ... 여러분만 제외」)을 한국어 자연 어순으로 「~한 회중은 여러분뿐이었습니다」로 옮긴다. 의미 손실 없이 가독성을 살린다.
- source_word: ἐκκλησία
  english_pob_choice: church
  chosen_korean: 회중
  alternatives_korean:
  - 교회
  lexicon: BDAG
  rationale: 본 번역의 ἐκκλησία 기본 옮김. 바울 서신의 「모인 회중」으로서의 의미를 「회중」이 담는다. 한국 교회 정형어 「교회」는 각주에 보존한다.
- source_word: εἰς λόγον δόσεως καὶ λήμψεως
  english_pob_choice: in the matter of giving and receiving
  chosen_korean: 주고받는 일에 있어
  alternatives_korean:
  - 주고받음의 셈에
  - 주고받는 사안에서
  lexicon: BDAG
  rationale: 회계 어휘 λόγος(셈·계산)의 비유적 함의는 각주로 보존하고, 본문에서는 자연스러운 「주고받는 일」로 옮긴다.
- source_word: εἰ μὴ ὑμεῖς μόνοι
  english_pob_choice: except you alone
  chosen_korean: 여러분뿐이었습니다
  alternatives_korean:
  - 오직 여러분만
  - 여러분 외에는 아무도 없었습니다
  lexicon: BDAG
  rationale: 강조적 배타성을 한국어 「~뿐이었습니다」로 자연스럽게 담는다.
