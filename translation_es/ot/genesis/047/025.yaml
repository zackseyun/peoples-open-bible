    text: 'O: «Que hallemos favor ante mi señor». La expresión hebrea es un modismo deferente que significa literalmente «en los ojos de».'
    reason: lexical_alternative
  revision_rationale: 'Se hace un ajuste menor de naturalidad en español narrativo: se elimina el pronombre explícito «ellos», que no añade sentido y hace la frase más pesada. El resto del versículo preserva fielmente el hebreo, la decisión POB sobre «esclavos», y el matiz deferente del modismo.'
