translation:
  language: es
  text: Por tanto[a], he aquí, cerraré tu camino con espinos[c][b], y levantaré un cerco alrededor de ella, de modo que no hallará sus senderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por eso'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo cambia de 'tu camino' a 'sus senderos'; la traducción conserva ese cambio retórico en lugar de nivelarlo.
    reason: alternative_reading
  - marker: c
    text: O 'con abrojos' o 'con zarzas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conserva la fuerza inferencial o consecutiva del hebreo sin sonar tan coloquial como 'así que'. En un contexto profético, 'por tanto' mantiene el enlace lógico con lo anterior.
- source_word: הִנְנִי
  english_pob_choice: behold, I will
  chosen_spanish: he aquí, pondré
  alternatives_spanish:
  - mirad, pondré
  - he aquí que pondré
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una घोषणा solemne y enfática de acción divina. 'He aquí' conserva el valor deíctico y solemne; 'pondré' expresa el futuro profético de manera natural en español.
- source_word: שָׂךְ
  english_pob_choice: hedging up
  chosen_spanish: poner... entre espinos
  alternatives_spanish:
  - cercar
  - cercar con espinos
  - poner barreras
  lexicon: HALOT
  rationale: El verbo describe obstrucción o cierre del camino. En español, 'poner tu camino entre espinos' comunica la imagen agrícola/obstructiva del hebreo y evita un giro demasiado mecánico como 'encerar' o 'cercar' en esta primera mitad.
- source_word: דַּרְכֵּךְ
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu ruta
  lexicon: HALOT
  rationale: El singular con sufijo femenino de segunda persona se vierte de forma directa. 'Camino' conserva tanto el sentido literal como el figurado de conducta o curso de vida.
- source_word: בַּסִּירִים
  english_pob_choice: with thorns
  chosen_spanish: entre espinos
  alternatives_spanish:
  - con espinos
  - entre zarzas
  - entre abrojos
  lexicon: HALOT
  rationale: El término apunta a vegetación espinosa usada como obstáculo. 'Espinos' es una opción bíblica y clara en español; 'entre' reproduce mejor la idea de un camino bloqueado o enredado que un mero instrumento ('con').
- source_word: וְגָדַרְתִּי
  english_pob_choice: and I will wall up / fence in
  chosen_spanish: cercaré
  alternatives_spanish:
  - amurallaré
  - la cercaré
  - pondré un cerco
  lexicon: HALOT
  rationale: El verbo expresa rodear con una cerca o muro. 'Cercaré' mantiene la imagen de cierre y es suficientemente amplia para abarcar el matiz de muro o cerco sin decidir demasiado pronto entre las opciones posibles.
- source_word: גְּדֵרָהּ
  english_pob_choice: her wall
  chosen_spanish: su cerca
  alternatives_spanish:
  - su muro
  - su barrera
  - su vallado
  lexicon: HALOT
  rationale: El hebreo es breve y difícil; el sustantivo está emparentado con el verbo anterior. 'Su cerca' conserva la conexión léxica con 'cercaré' y comunica una barrera física sin sobrerinterpretar el tipo exacto de estructura.
- source_word: וּנְתִיבוֹתֶיהָ
  english_pob_choice: her paths
  chosen_spanish: sus senderos
  alternatives_spanish:
  - sus caminos
  - sus huellas
  - sus veredas
  lexicon: HALOT
  rationale: Se mantiene el cambio a tercera persona del hebreo. 'Senderos' preserva el plural y sugiere rutas múltiples, además de sonar natural en español.
- source_word: לֹא תִמְצָא
  english_pob_choice: she will not find
  chosen_spanish: no hallará
  alternatives_spanish:
  - no encontrará
  - no podrá hallar
  lexicon: HALOT
  rationale: El verbo puede traducirse con 'hallar' o 'encontrar'. 'Hallará' conserva un registro bíblico digno y expresa con claridad el resultado de la obstrucción.
theological_decisions:
- issue: Cambio de persona gramatical en el verso
  english_pob_reading: Preserve the Hebrew shift from second person ('your way') to third person ('her paths').
  chosen_spanish_reading: Conservar el paso de segunda persona ('tu camino') a tercera persona ('sus senderos').
  alternative_spanish_readings:
  - 'Uniformar todo en segunda persona: ''tu... tus...'''
  - 'Uniformar todo en tercera persona: ''su camino... sus senderos...'''
  rationale: El hebreo alterna deliberadamente entre dirigirse a la mujer y describirla. Mantener el cambio evita suavizar la retórica profética y respeta la tensión textual documentada en la POB inglesa.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Imagen de juicio mediante obstrucción del camino
  english_pob_reading: I will hedge up your way with thorns, and I will wall up her wall.
  chosen_spanish_reading: Pondré tu camino entre espinos, y cercaré su cerca.
  alternative_spanish_readings:
  - Pondré un cerco alrededor de tu camino con espinos
  - Amurallaré su muro
  rationale: 'La línea hebrea presenta dos imágenes acumuladas: espinos y cerca/muro. La versión española conserva la dureza del juicio sin añadir una explicación interpretativa que el texto no da.'
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la auditoría inglesa más reciente, pero adapta la primera cláusula a un español más natural que aún mantiene la fuerza consecutiva, el énfasis de הִנְנִי y la dificultad del cierre figurado. Se conserva el cambio de persona gramatical y la imagen doble de obstáculo y cerco.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '''Camino'' y ''senderos'' mantienen la metáfora de dirección/curso de vida sin convertirla en paráfrasis.'
  - '''Espinos'' y ''cerca'' preservan el campo semántico de obstrucción física del hebreo.'
  - La alternancia de segunda y tercera persona queda visible para la lectura pública y el estudio auditable.
