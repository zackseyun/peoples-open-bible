- from: Así que buscaron por todo el territorio de Israel una joven hermosa[a][b], y hallaron a Abisag la sunamita, y la llevaron al rey.
  to: Y buscaron por todo el territorio de Israel una joven hermosa[a], y hallaron a Abisag la sunamita[b], y la llevaron al rey.
  rationale: Se corrige la ubicación de la nota cultural para que quede anclada en «la sunamita», que es el término que explica. También se suaviza «Así que» a «Y» para reflejar mejor la narración hebrea sin añadir un matiz consecutivo innecesario. El resto del texto puede mantenerse.
