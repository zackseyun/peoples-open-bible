translation:
  language: es
  text: Le habló con bondad[a] y puso su trono[b] por encima de los tronos de los reyes que estaban con él en Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le habló cosas buenas», un modismo que significa que le habló con bondad o amablemente.'
    reason: lexical_alternative
  - marker: b
    text: «Trono» también puede entenderse concretamente como «asiento»; el sentido es que a Joaquín se le dio un rango por encima de los demás reyes cautivos en Babilonia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר אִתּוֹ טֹבוֹת
  english_pob_choice: He spoke kindly to him
  chosen_spanish: Le habló favorablemente[a]
  alternatives_spanish:
  - Le habló con bondad
  - Le habló de manera amable
  - Le dijo cosas buenas
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo que comunica trato favorable o bondadoso, no necesariamente el contenido literal de “cosas buenas”. En español, “hablar favorablemente” conserva ese valor relacional y evita una traducción demasiado literal o ambigua.
- source_word: וַיִּתֵּן אֶת כִּסְאוֹ
  english_pob_choice: set his throne
  chosen_spanish: puso su trono[b]
  alternatives_spanish:
  - estableció su trono
  - colocó su trono
  - le dio su trono
  lexicon: HALOT
  rationale: נתן con כִּסֵּא aquí expresa la asignación o colocación de un lugar de honor/rango, no simplemente regalar un objeto. “Puso su trono” preserva la acción de establecerlo en una posición elevada.
- source_word: כִּסְאוֹ
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - su asiento
  - su silla
  lexicon: HALOT
  rationale: Aunque la imagen concreta puede ser un asiento, el contexto realza el rango real. “Trono” preserva mejor la fuerza simbólica y jerárquica del sustantivo.
- source_word: מֵעַל כִּסֵּא הַמְּלָכִים
  english_pob_choice: above the thrones of the kings
  chosen_spanish: por encima de los tronos de los reyes
  alternatives_spanish:
  - sobre los tronos de los reyes
  - más alto que los tronos de los reyes
  lexicon: HALOT
  rationale: מֵעַל indica superioridad de posición o rango. El plural “los tronos de los reyes” sigue la revisión inglesa y sugiere correctamente la pluralidad del referente colectivo.
- source_word: הַמְּלָכִים אֲשֶׁר אִתּוֹ
  english_pob_choice: the kings who were with him
  chosen_spanish: los reyes que estaban con él
  alternatives_spanish:
  - los reyes que estaban allí con él
  - los reyes que estaban en su presencia
  lexicon: HALOT
  rationale: La relativa פשוטa se refleja con claridad en español. “Con él” conserva la presencia compartida en la corte babilónica sin añadir elementos no explicitados por el hebreo.
- source_word: בְּבָבֶל
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en Babilón
  - en la Babilonia
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español bíblico y moderno.
theological_decisions:
- issue: Jerarquía real de Jehoiaquín frente a otros reyes cautivos
  english_pob_reading: The sense is that Jehoiachin was given a rank above the other captive kings in Babylon.
  chosen_spanish_reading: Se expresa que su trono fue puesto por encima de los tronos de los reyes cautivos en Babilonia.
  alternative_spanish_readings:
  - Se expresa que recibió un asiento más alto que el de los otros reyes
  - Se expresa que fue honrado por encima de los demás reyes
  rationale: El verso no describe una entronización plena sino una elevación de rango/honor dentro del contexto imperial babilónico. Mantener “trono” y la comparación vertical conserva esa tensión entre dignidad real y cautiverio.
  doctrine_reference: No doctrinal issue; historical-narrative status and royal honor language
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió ‘the throne’ a ‘the thrones’ para reflejar con más naturalidad el plural implícito de ‘of the kings’. La versión española sigue esa actualización con ‘los tronos de los reyes’.
  spanish_consistency_notes:
  - Se mantiene ‘Babilonia’ como topónimo estándar.
  - Se conserva ‘trono’ en vez de ‘asiento’ por la carga regia del contexto.
  - La frase ‘le habló favorablemente’ evita una traducción demasiado literal de un modismo hebreo.
  - El plural ‘los tronos’ acompaña la revisión auditada del texto inglés.
