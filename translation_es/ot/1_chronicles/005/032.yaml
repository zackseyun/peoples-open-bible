  - severity: medium
    issue: «Meraiot» es menos fiel que «Merayot»
    rationale: Aunque ambas buscan adaptar el nombre, la yod del hebreo favorece «-ay-»; «Merayot» refleja mejor la forma fuente sin volverse poco legible.
  revised_spanish_text: Uzzi fue padre de Zerahías, y Zerahías fue padre de Merayot.
