  text: הִנֵּ֣ה יְהוָ֗ה הִשְׁמִ֨יעַ֙ אֶל קְצֵ֣ה הָ/אָ֔רֶץ אִמְרוּ֙ לְ/בַת צִיּ֔וֹן הִנֵּ֥ה יִשְׁעֵ֖/ךְ בָּ֑א הִנֵּ֤ה שְׂכָר/וֹ֙ אִתּ֔/וֹ וּ/פְעֻלָּת֖/וֹ לְ/פָנָֽי/ו־־׃
