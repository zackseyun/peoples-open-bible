translation:
  language: es
  text: Y yo tuve[a] por más felices a los muertos, que ya murieron, que a los vivos, que aún viven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘alabé a los muertos ... más que a los vivos’. El verbo hebreo puede traducirse más literalmente como ‘alabé’ o ‘encomié’; aquí expresa el juicio de Qohelet de que los muertos están en mejor condición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבֵּ֧חַ
  english_pob_choice: considered
  chosen_spanish: consideré
  alternatives_spanish:
  - alabé
  - aprecié
  - dije que eran más afortunados
  lexicon: HALOT
  rationale: 'El piel de שׁבח puede expresar alabar, encomiar o valorar favorablemente. Siguiendo el criterio del POB en inglés, aquí no se trata de una alabanza moral, sino de un juicio evaluativo: Qohelet estima que los muertos están en mejor स्थिति. ‘Consideré’ comunica esa valoración en español sin perder la tensión lexical.'
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - —
  lexicon: forma pronominal explícita
  rationale: Se conserva el pronombre explícito para reflejar el énfasis personal del hablante, como en el hebreo.
- source_word: אֶת הַמֵּתִים
  english_pob_choice: the dead
  chosen_spanish: a los muertos
  alternatives_spanish:
  - a los que habían muerto
  - a los difuntos
  lexicon: HALOT
  rationale: El participio sustantivado designa una clase de personas. En español, ‘los muertos’ es directo y natural. Se usa el acusativo preposicional ‘a’ por tratarse de objeto directo animado en la construcción verbal española.
- source_word: שֶׁכְּבָר מֵתוּ
  english_pob_choice: who have already died
  chosen_spanish: que ya habían muerto
  alternatives_spanish:
  - que ya murieron
  - que habían muerto ya
  lexicon: HALOT
  rationale: ‘כְּבָר’ añade la idea de ‘ya / ya para entonces’, y el perfecto hebreo expresa acción completa. El pluscuamperfecto español conserva ese valor anterior respecto del punto de observación de Qohelet.
- source_word: מִן הַחַיִּים
  english_pob_choice: more fortunate than the living
  chosen_spanish: más afortunados que los vivos
  alternatives_spanish:
  - mejor que los vivos
  - más dichosos que los vivos
  lexicon: HALOT
  rationale: La comparación con מִן requiere expresar explícitamente la relación comparativa en español. ‘Más afortunados’ sigue de cerca la solución del POB en inglés y evita suavizar el contraste existencial del contexto.
- source_word: הַחַיִּים
  english_pob_choice: the living
  chosen_spanish: los vivos
  alternatives_spanish:
  - los que viven
  - los que están vivos
  lexicon: HALOT
  rationale: El adjetivo sustantivado se traduce naturalmente como ‘los vivos’, forma breve e idiomática en español.
- source_word: אֲשֶׁר הֵמָּה חַיִּים
  english_pob_choice: who are still alive
  chosen_spanish: que todavía están vivos
  alternatives_spanish:
  - que aún viven
  - que siguen vivos
  lexicon: HALOT
  rationale: La cláusula relativa reitera y enfatiza el estado presente. ‘Todavía están vivos’ comunica la continuidad del estado con naturalidad en español.
- source_word: עֲדֶנָה
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - hasta ahora
  lexicon: HALOT
  rationale: El adverbio expresa continuidad temporal (‘todavía / aún’). ‘Todavía’ es claro y mantiene el tono sobrio del pasaje.
theological_decisions:
- issue: Valor comparativo entre muertos y vivos
  english_pob_reading: The verse states Qoheleth's observational judgment that the dead are better off than the living in the face of oppression, without making a systematic doctrinal claim about the afterlife.
  chosen_spanish_reading: El versículo expresa el juicio observacional de Qohelet de que los muertos están en mejor स्थिति que los vivos frente a la opresión, sin convertirlo en una afirmación doctrinal sistemática sobre el más allá.
  alternative_spanish_readings:
  - Una afirmación sobre la bienaventuranza postmortem de los muertos
  - Una hipérbole desesperada sin fuerza comparativa real
  rationale: El contexto inmediato trata de la opresión ‘bajo el sol’. La traducción preserva el juicio comparativo sin resolver la tensión teológica ni importarle una doctrina ajena al pasaje.
  doctrine_reference: Mantener la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La base inglesa revisó ‘declared’ por ‘considered’ para reflejar mejor el matiz evaluativo de שׁבח. La versión española sigue esa revisión con ‘consideré’, manteniendo la lectura comparativa y no doxológica del verbo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita ‘Cristo’ y otras terminologías no presentes en el texto.
  - ‘Muertos’ y ‘vivos’ conservan el contraste sustantivado del hebreo sin suavizarlo.
  - La nota al pie conserva la alternativa lexical documentada por el POB en inglés.
