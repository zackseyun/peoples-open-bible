translation:
  language: es
  text: Pues los celos son el furor de un hombre[a], y no tendrá misericordia[b] en el día de la venganza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De un hombre» conserva la expresión literal del hebreo. En contexto se refiere al marido ofendido.
    reason: cultural_note
  - marker: b
    text: 'O: «no se apiadará» o «no perdonará». El verbo hebreo puede significar mostrar compasión, tener piedad o perdonar/spare.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón del dicho anterior. «Porque» conserva la fuerza explicativa de כִּי y funciona con naturalidad en español proverbial.
- source_word: קִנְאָה
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - envidia
  - celo
  lexicon: HALOT
  rationale: En este contexto de adulterio, el sentido es la reacción de celos del marido ofendido; «celos» comunica mejor esa situación que «celo» o «envidia».
- source_word: חֲמַת
  english_pob_choice: fury
  chosen_spanish: furor
  alternatives_spanish:
  - ira
  - rabia
  - cólera
  lexicon: HALOT
  rationale: «Furor» expresa la intensidad ardiente de la emoción y mantiene un registro elevado y proverbial cercano al hebreo.
- source_word: גָּבֶר
  english_pob_choice: a man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de un esposo
  - de un varón
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de un hombre». «De un hombre» conserva el texto fuente y deja que el contexto identifique al marido ofendido sin explicitarlo en el cuerpo principal.
- source_word: וְלֹא יַחְמֹל
  english_pob_choice: and he will show no mercy
  chosen_spanish: y no tendrá compasión
  alternatives_spanish:
  - y no perdonará
  - y no se apiadará
  - y no lo perdonará
  lexicon: HALOT
  rationale: חמל puede significar compadecerse, apiadarse o perdonar. «No tendrá compasión» expresa bien la falta de piedad sin endurecer el sentido hacia un perdón específicamente jurídico que el hebreo no exige.
- source_word: בְּיוֹם
  english_pob_choice: on the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - el día de
  - cuando llegue el día de
  lexicon: HALOT
  rationale: Mantiene la construcción temporal directa del hebreo con una preposición natural en español.
- source_word: נָקָם
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - vengaza
  - desquite
  lexicon: HALOT
  rationale: «Venganza» reproduce el campo semántico formal y retributivo de נָקָם; «desquite» sería demasiado coloquial y menos solemne.
theological_decisions:
- issue: ¿Se explicita o no al «esposo» como referente de גָּבֶר?
  english_pob_reading: The Hebrew says 'a man,' while the context makes clear the wronged husband is in view; the English preserves 'a man's' and notes the contextual referent.
  chosen_spanish_reading: «De un hombre» en el texto, con la referencia al marido sólo implícita por el contexto.
  alternative_spanish_readings:
  - «de su esposo»
  - «del esposo ofendido»
  rationale: El hebreo no dice explícitamente «esposo». Traducirlo así en el cuerpo principal sería más interpretativo de lo que permite el texto; conservar «hombre» respeta la forma fuente y la nota contextual cubre la identificación.
  doctrine_reference: Principio de adherencia al texto base y distinción entre sentido explícito e inferencia contextual.
- issue: ¿Cómo verter חמל en un contexto de represalia?
  english_pob_reading: '''He will show no mercy'' with a note that the verb can mean ''show compassion,'' ''have pity,'' or ''spare.'''
  chosen_spanish_reading: «no tendrá compasión»
  alternative_spanish_readings:
  - «no se apiadará»
  - «no perdonará»
  - «no lo dejará pasar»
  rationale: En español, «tener compasión» mantiene la amplitud semántica de חמל sin reducirlo únicamente a «perdonar». Se preserva así la tensión entre compasión y abstención de castigo, que el hebreo permite.
  doctrine_reference: Lexicografía de חמל; cuidado con equivalencias restringidas por contexto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés, incorporando la revisión que coloca la estructura como «el furor de un hombre» / «the fury of a man» sin forzar una especificación de «esposo» en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto en otros pasajes, aunque aquí no aparece el nombre divino.
  - Se eligió «venganza» para נָקָם por su tono formal y retributivo, coherente con el registro proverbial.
  - Se prefirió «compasión» para חמל para preservar la gama semántica indicada por el audit trail inglés.
  - 'El orden español busca ser natural, pero conserva la estructura causal y temporal del hebreo: causa («Porque…») + resultado/afirmación + marco temporal («en el día de…»).'
