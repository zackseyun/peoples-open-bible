    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «¡Que viva el rey!»'
    reason: lexical_alternative
  revision_rationale: Se elimina la nota innecesaria en «pueblo» y se ancla donde pertenece, en la pregunta verbal. Se conserva «Yahvé» según la política del proyecto. Se mantiene «¡Viva el rey!» como equivalente idiomático natural del jussivo, pero la nota ahora sí preserva la forma más literal del hebreo. El cuerpo del versículo sigue siendo fiel y legible; los cambios son menores pero mejoran la correspondencia con el aparato inglés y la utilidad de las notas.
