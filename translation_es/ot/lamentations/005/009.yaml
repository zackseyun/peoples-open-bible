translation:
  language: es
  text: Arriesgando la vida obtenemos nuestro pan[a], por la espada en el desierto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «traemos nuestro pan arriesgando la vida». El verbo hebreo puede entenderse como «traer» o, más ampliamente, «obtener/procurarse».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por la espada del desierto», quizá aludiendo al peligro de la espada en el desierto, más que a una espada perteneciente al desierto mismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנַפְשֵׁנוּ
  english_pob_choice: At the risk of our lives
  chosen_spanish: A riesgo de nuestra vida
  alternatives_spanish:
  - Con nuestra vida
  - A costa de nuestra vida
  - En riesgo de nuestra vida
  lexicon: HALOT
  rationale: El hebreo expresa una situación de peligro mortal, no mero instrumento. 'A riesgo de nuestra vida' comunica de forma natural esa idea idiomática en español, preservando la fuerza del lamento.
- source_word: נָבִיא
  english_pob_choice: we get
  chosen_spanish: obtenemos
  alternatives_spanish:
  - traemos
  - conseguimos
  - adquirimos
  lexicon: HALOT
  rationale: El valor del verbo aquí admite 'traer' o 'procurar/obtener'. En español, 'obtenemos' conserva el sentido de procurarse el pan sin forzar una imagen de movimiento que el contexto no exige.
- source_word: לַחְמֵנוּ
  english_pob_choice: our bread
  chosen_spanish: nuestro pan
  alternatives_spanish:
  - nuestro alimento
  - nuestra comida
  lexicon: HALOT
  rationale: '''Pan'' mantiene la literalidad y la imagen bíblica concreta del sustento básico. En español también suena natural dentro del tono de lamentación.'
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - a razón de
  lexicon: HALOT
  rationale: La preposición indica causa o motivo. 'A causa de' es clara y formal en español, y preserva la relación causal del texto.
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - el peligro de la espada
  - la amenaza de la espada
  lexicon: HALOT
  rationale: Se conserva la imagen literal de 'espada', que en el contexto ya implica violencia y amenaza. 'Espada' es además el equivalente natural y bíblicamente reconocible en español.
- source_word: הַמִּדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - el desierto inhóspito
  - la tierra despoblada
  - el yermo
  lexicon: HALOT
  rationale: Aunque 'wilderness' suele ser 'desierto', en español 'desierto' comunica mejor la idea de un lugar árido y expuesto. Aquí también ayuda a que la frase 'la espada en el desierto' suene clara sin perder el matiz de vulnerabilidad.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene alta concordancia con el hebreo y no presenta revisiones aplicadas; esta propuesta conserva esa lectura general, con adaptación natural al español y sin añadir explicaciones ajenas al texto.
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre la acción de procurarse el pan y la causa del peligro.
  - Se conserva la imagen concreta de 'pan' y 'espada' en lugar de generalizar a 'alimento' o 'peligro'.
  - '''Desierto'' se usa como equivalente funcional de ''wilderness'' por claridad y naturalidad en español.'
  - La nota [a] preserva la alternativa verbal documentada en el audit trail inglés.
