translation:
  language: es
  text: Pero Dios redimirá mi vida de la mano del Seol[a], porque me tomará[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Seol es el término hebreo para el ámbito de los muertos; alternativamente, «el sepulcro» o «el reino de los muertos».
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque me recibirá».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: La partícula introduce contraste con el destino expuesto en el contexto; «Pero» comunica de manera natural el valor adversativo en español sin añadir énfasis interpretativo excesivo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: El referente es el Dios de Israel; «Dios» es el equivalente español natural y mantiene la referencia singular.
- source_word: יִפְדֶּה
  english_pob_choice: will redeem
  chosen_spanish: redimirá
  alternatives_spanish:
  - rescatará
  - libertará
  lexicon: HALOT
  rationale: פדה puede implicar redimir o rescatar. «Redimirá» conserva la fuerza de liberación y el eco teológico sin sobreparafrasear.
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi ser
  lexicon: HALOT
  rationale: נפש suele designar la vida o la persona viviente, no una noción tardía de alma separada. «Mi vida» encaja con el campo semántico de muerte y libramiento.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la mano como poder o dominio. «De la mano de» reproduce la metáfora de forma clara en español.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se translitera el término hebreo para no aplanarlo a «sepulcro» ni explicitarlo demasiado. La nota preserva las alternativas léxicas documentadas.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque de
  lexicon: HALOT
  rationale: La conjunción introduce la razón o fundamento de la afirmación anterior; «porque» expresa de modo natural esa relación causal en español.
- source_word: יִקָּחֵנִי
  english_pob_choice: he will take me
  chosen_spanish: me tomará
  alternatives_spanish:
  - me recibirá
  - me llevará consigo
  lexicon: HALOT
  rationale: לקח significa «tomar»; «me tomará» sigue de cerca el hebreo y deja abierta la resonancia teológica de recepción o asunción.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Se mantiene la transliteración tradicional por ser incierta su función exacta y porque traducirla excedería la evidencia disponible.
theological_decisions:
- issue: Sentido de נַפְשִׁי en relación con la muerte
  english_pob_reading: Rendered as 'my life' rather than 'my soul'
  chosen_spanish_reading: «mi vida» en lugar de «mi alma»
  alternative_spanish_readings:
  - mi alma
  - mi ser
  rationale: En este contexto poético, נפש apunta a la vida/persona entera en contraste con la muerte. «Mi vida» evita importar una antropología dualista no explicitada por el hebreo.
  doctrine_reference: Mantener la tensión teológica original; primacía del idioma fuente sobre la tradición devocional.
- issue: Alcance de la liberación de Seol
  english_pob_reading: 'Kept the wording broad: ''redeem my life from the hand of Sheol, for he will take me'''
  chosen_spanish_reading: Se conserva una formulación amplia sin especificar si se trata de resurrección explícita, rescate de muerte prematura o vindicación postmortem.
  alternative_spanish_readings:
  - redención corporal explícita
  - lenguaje de resurrección directo
  - simple salvación temporal
  rationale: El hebreo afirma confianza en la acción de Dios, pero no define sistemáticamente el modo ni el momento de la liberación. La traducción preserva esa ambigüedad reverente.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo con el mismo perfil interpretativo del POB en inglés: traducir נפש como «vida», mantener Seol como transliteración y conservar la ambigüedad de לקח mediante «me tomará» con nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהים sin añadir artículo salvo necesidad sintáctica.
  - Se conserva «Seol» como transliteración estable y no se sustituye por «sepulcro» en el texto principal.
  - «Redimirá» preserva el matiz de פדה mejor que «rescatará» en este contexto poético.
  - «Selah» se deja sin traducir por la incertidumbre del término en el corpus.
  - La puntuación sigue el paralelismo poético y el cierre con «Selah» separado como en el original.
