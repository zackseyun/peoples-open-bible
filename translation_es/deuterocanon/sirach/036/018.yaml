translation:
  language: es
  text: Da una recompensa a los que esperan en ti[a], y que se confíe en tus profetas[b]. Escucha, Yahvé, la oración de tus suplicantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los que perseveran en ti» o «a los que permanecen firmes ante ti». El verbo griego puede expresar tanto espera como perseverancia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que tus profetas sean creídos» o «que tus profetas resulten confiables». El griego es compacto y puede referirse tanto a que los profetas reciban confianza como a que se muestre su fiabilidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: δὸς
  english_pob_choice: Give
  chosen_spanish: Da
  alternatives_spanish:
  - Concede
  - Otorga
  lexicon: LSJ
  rationale: Es el imperativo directo de δίδωμι. «Da» conserva la fuerza breve y orante del mandato sin añadir matiz innecesario.
- source_word: μισθὸν
  english_pob_choice: a reward
  chosen_spanish: una recompensa
  alternatives_spanish:
  - un salario
  - una retribución
  lexicon: LSJ
  rationale: μισθός puede significar paga, salario o recompensa. En este contexto de oración, «recompensa» expresa bien la retribución concedida por Dios sin sugerir una relación comercial.
- source_word: τοῖς ὑπομένουσίν σε
  english_pob_choice: to those who wait for you
  chosen_spanish: a los que esperan en ti
  alternatives_spanish:
  - a los que perseveran por ti
  - a los que resisten por ti
  lexicon: LSJ
  rationale: ὑπομένω puede abarcar esperar, perseverar o permanecer firme. Con objeto personal, «esperan en ti» es la forma española más natural y devocional, y no excluye la perseverancia implícita.
- source_word: οἱ προφῆταί σου
  english_pob_choice: your prophets
  chosen_spanish: tus profetas
  alternatives_spanish:
  - los profetas tuyos
  lexicon: LSJ
  rationale: Correspondencia directa y transparente del sintagma nominal.
- source_word: ἐμπιστευθήτωσαν
  english_pob_choice: let your prophets be trusted
  chosen_spanish: que tus profetas sean confiables
  alternatives_spanish:
  - que tus profetas sean creídos
  - que tus profetas sean tenidos por fieles
  lexicon: LSJ
  rationale: La forma pasiva imperativa es difícil; «sean confiables» conserva la idea de que los profetas queden reconocidos como dignos de confianza. En español resulta más natural que una pasiva estricta, sin perder el valor vindicativo.
- source_word: εἰσάκουσον
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Atiende
  lexicon: LSJ
  rationale: Verbo usual de oración para pedir audiencia favorable. «Escucha» es claro y reverente en español contemporáneo.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  lexicon: LSJ
  rationale: En la línea del proyecto, κύριος que dirige una oración a Dios se vierte como «Yahvé» en vez de ocultar el nombre divino tras «Señor».
- source_word: δεήσεως
  english_pob_choice: the prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la súplica
  - la petición
  lexicon: LSJ
  rationale: δέησις puede significar súplica o plegaria. «Oración» funciona bien en español bíblico y mantiene el sentido general de petición ferviente.
- source_word: τῶν ἱκετῶν σου
  english_pob_choice: of your suppliants
  chosen_spanish: de tus suplicantes
  alternatives_spanish:
  - de los que te imploran
  - de tus peticionarios
  lexicon: LSJ
  rationale: ἱκέτης designa al suplicante formal, quien implora con humildad. «Suplicantes» preserva ese matiz mejor que opciones más neutras.
theological_decisions:
- issue: Sentido de τοῖς ὑπομένουσίν σε
  english_pob_reading: those who wait for you
  chosen_spanish_reading: los que esperan en ti
  alternative_spanish_readings:
  - los que perseveran en ti
  - los que permanecen firmes ante ti
  rationale: El verbo puede expresar espera o perseverancia. En una súplica para que Dios actúe, «esperan en ti» refleja la expectativa fiel sin perder la posibilidad de resistencia perseverante.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Valor de ἐμπιστευθήτωσαν respecto de los profetas
  english_pob_reading: let your prophets be trusted
  chosen_spanish_reading: que tus profetas sean confiables
  alternative_spanish_readings:
  - que tus profetas sean creídos
  - que se confíe en tus profetas
  rationale: La cláusula probablemente pide que Dios confirme la fiabilidad de sus profetas, no solo que los oyentes crean en abstracto. «Sean confiables» conserva la idea de credibilidad reconocida.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El inglés auditado pasó de «be found trustworthy» a «be trusted» para reflejar mejor el pasivo de ἐμπιστευθήτωσαν. La redacción española toma esa revisión como guía, pero la vierte con una pasiva natural («sean confiables») que conserva el matiz de reconocimiento de fiabilidad. También se mantiene la lectura devocional de ὑπομένουσίν σε como «esperan en ti», sin excluir la perseverancia.
  spanish_consistency_notes:
  - Se sigue el principio del proyecto de traducir Κύριος dirigido a Dios como «Yahvé».
  - «Suplicantes» se mantiene para ἱκετῶν, por su matiz formal de ruego humilde.
  - «Recompensa» evita forzar la metáfora económica de μισθός, pero conserva la idea de retribución divina.
  - La puntuación refleja dos miembros coordinados y una súplica final separada por punto.
  - Se conserva la tensión entre «esperar» y «perseverar» mediante nota, sin borrar la ambigüedad del verbo griego.
