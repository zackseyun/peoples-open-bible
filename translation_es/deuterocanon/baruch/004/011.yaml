revisions:
- from: Porque los crié con alegría, pero los despedí con llanto y lamento.
  to: Porque yo los nutrí con alegría, pero los envié lejos con llanto y duelo.
  rationale: 'Se ajusta el texto para reflejar con mayor precisión las decisiones léxicas auditadas del griego: «nutrí» preserva mejor ἔθρεψα que «crié»; «envié lejos» comunica la fuerza separativa de ἐξαπέστειλα mejor que «despedí»; y «duelo» representa πένθος con más fidelidad que «lamento». No se requieren notas al pie.'
  reviewer_model: gpt-5.4
