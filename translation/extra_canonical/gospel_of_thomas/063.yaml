translation:
  text: Jesus said[a], “There was a rich man who had a lot of money. He said, ‘I will
    use my money, so that I will sow and I will reap and I will plant, and I will
    fill my storehouses with produce, so that I will lack nothing.’ These were the
    things he was thinking in his heart. And in that night, he died. Whoever has ears[i][h][g][f][e][d][c][b],
    let that one hear.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Coptic ⲭⲣⲏⲙⲁ can mean money, wealth, or property (Greek χρῆμα). ‘Money’
      is chosen for concreteness; ‘wealth’ would also be possible.
    reason: lexical_alternative
  - marker: b
    text: ⲧⲱⲱϭⲉ is rendered ‘plant’ (Crum s.v.). Some may hear an echo of Luke’s ‘build,’
      but the Coptic verb here is agricultural, not architectural.
    reason: lexical_alternative
  - marker: c
    text: ⲁϩⲟ denotes storehouses/barns/granaries. ‘Storehouses’ is chosen to avoid
      over-specificity.
    reason: lexical_alternative
  - marker: d
    text: ‘So that I will lack nothing’ renders ⲣϭⲣⲱϩ with the negative ⲛⲗⲁⲁⲩ, literally
      ‘be in need of nothing.’
    reason: cultural_note
  - marker: e
    text: In ⲱϩⲥ (‘reap’), the letter ϩ is a restoration in Dilley’s edition due to
      manuscript damage.
    reason: lacuna_or_restoration
  - marker: f
    text: For context, compare Luke 12:16–21 (the rich man and barns), noting the
      significant differences in wording and emphasis.
    reason: cross_reference
  - marker: g
    text: Or 'for I will sow'.
    reason: previous_rendering
  - marker: h
    text: Or 'Whoever has ears to hear,'.
    reason: previous_rendering
  - marker: i
    text: Or 'This was what he was thinking'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲛⲡⲗⲟⲩⲥⲓⲟⲥ
  chosen: rich
  lexicon: Crum; Greek loan from πλούσιος
  rationale: Straightforward adjectival loan; retains socioeconomic nuance without
    overinterpretation.
- source_word: ⲭⲣⲏⲙⲁ
  chosen: money
  alternatives:
  - wealth
  - property
  - possessions
  lexicon: Crum s.v. ⲭⲣⲏⲙⲁ; Greek χρῆμα
  rationale: Context repeats the term and pairs it with actions of investing in agriculture;
    ‘money’ preserves the concrete sense, while ‘wealth’ would be broader.
- source_word: ⲣⲭⲣⲱ
  chosen: use
  alternatives:
  - make use of
  - employ
  lexicon: Crum s.v. ⲭⲣⲱ (use) with causative ⲣ-
  rationale: Idiomatic future ‘I will use my money’; simple ‘use’ keeps Thomasine
    terseness.
- source_word: ⲕⲁⲁⲥ
  chosen: for
  alternatives:
  - because
  - so that
  lexicon: Crum s.v. ⲕⲁⲁⲥ
  rationale: Introduces the purpose/motive clause; ‘for’ keeps parataxis and natural
    English flow without over-specifying purpose vs. cause.
- source_word: ϫⲟ
  chosen: sow
  alternatives:
  - plant seed
  lexicon: Crum s.v. ϫⲟ
  rationale: Agricultural verb; ‘sow’ is the standard rendering.
- source_word: ⲱϩⲥ
  chosen: reap
  alternatives:
  - harvest
  lexicon: Crum s.v. ⲱϩⲥ
  rationale: Paired with ‘sow’; ‘reap’ keeps the concise agricultural parallelism.
- source_word: ⲧⲱⲱϭⲉ
  chosen: plant
  alternatives:
  - cultivate
  lexicon: Crum s.v. ⲧⲱⲱϭⲉ
  rationale: In an agricultural sequence, ‘plant’ fits best; avoids importing Lukan
    ‘build’ language.
- source_word: ⲙⲟⲩϩ
  chosen: fill
  alternatives:
  - stuff
  - stock
  lexicon: Crum s.v. ⲙⲟⲩϩ
  rationale: ‘Fill’ matches the direct object ‘storehouses’ and keeps the concrete
    image.
- source_word: ⲁϩⲟ
  chosen: storehouses
  alternatives:
  - barns
  - granaries
  lexicon: Crum s.v. ⲁϩⲟ
  rationale: Generic ‘storehouses’ covers barns/granaries without narrowing; ‘barns’
    offered in footnote as common English equivalent.
- source_word: ⲕⲁⲣⲡⲟⲥ
  chosen: produce
  alternatives:
  - fruit
  - yield
  lexicon: Crum s.v. ⲕⲁⲣⲡⲟⲥ; Greek καρπός
  rationale: ‘Produce’ fits agricultural storage context better than ‘fruit’ narrowly.
- source_word: ⲣϭⲣⲱϩ
  chosen: lack
  alternatives:
  - be in need (of)
  lexicon: Crum s.v. ϭⲣⲱϩ
  rationale: Negative construction with ⲛⲗⲁⲁⲩ yields ‘lack nothing’; concise and idiomatic.
- source_word: ⲟⲩⲛ ⲙⲁϫⲉ
  chosen: has ears
  alternatives:
  - has an ear
  lexicon: Crum s.v. ⲙⲁϫⲉ
  rationale: Plural ‘ears’ preserved; formulaic exhortation maintained.
- source_word: ⲙⲁⲣⲉ…ⲥⲱⲧⲙ
  chosen: let … hear
  alternatives:
  - should hear
  lexicon: Layton, Grammar §177; common jussive formula
  rationale: Standard rendering of the Coptic jussive imperative construction, preserving
    Thomas’s closing cadence.
textual_note: 'Dialect/orthography: Sahidic with Lycopolitan coloring. The manuscript
  shows supralinear/orthographic variation in the negative phrase (printed ⲗ̄ⲗⲁⲁⲩ;
  normalized ⲛⲗⲁⲁⲩ). A bracketed restoration occurs in the verb ⲱϩⲥ (‘reap’): Dilley
  prints ⲧⲁⲱ[[ϩ]]ⲥϩ in the line-level, normalized to ⲛⲧⲉⲁⲛⲟⲕ ⲱϩⲥ; the medial ϩ is
  restored. The series of futures appears as repeated ⲛⲧⲉⲁⲛⲟⲕ + verb (I will …), a
  rhythmic device retained in translation. The clause ‘and in that night he died’
  uses ⲡⲟⲩϣⲏ with a relative ⲉⲧⲉⲣⲉ… construction; rendered concisely as ‘in that night.’
  No Greek papyrus overlap is known for this saying.'
