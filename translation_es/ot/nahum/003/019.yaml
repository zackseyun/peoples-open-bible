translation:
  language: es
  text: No hay curación para tu fractura[a]; tu herida es grave. Todos los que oyen la noticia acerca de ti aplauden por tu caída[b], porque ¿sobre quién no ha pasado continuamente tu maldad?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hay alivio para tu quebranto; tu herida es severa».'
    reason: lexical_alternative
  - marker: b
    text: La pregunta retórica implica que la maldad de Nínive había afectado prácticamente a todos; por eso las naciones se alegran de su caída.
    reason: cultural_note
lexical_decisions:
- source_word: אֵין
  english_pob_choice: There is no
  chosen_spanish: No hay
  alternatives_spanish:
  - No existe
  - No se encuentra
  lexicon: HALOT
  rationale: Expresa la negación existencial de forma natural en español y conserva el tono sentencioso del veredicto.
- source_word: כֵּהָה
  english_pob_choice: healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - curación
  - alivio
  - mejoría
  lexicon: HALOT
  rationale: En el paralelismo con 'fractura' y 'herida', 'sanidad' comunica la idea de remedio o restablecimiento sin perder el sentido de alivio/curación que admite el término.
- source_word: לְשִׁבְרֶךָ
  english_pob_choice: for your fracture
  chosen_spanish: para tu fractura
  alternatives_spanish:
  - para tu quebranto
  - para tu ruina
  - para tu quebradura
  lexicon: HALOT
  rationale: '''Fractura'' mantiene la metáfora de lesión/rotura que el POB inglés preserva con ''fracture'' y evita diluirla en una abstracción demasiado amplia.'
- source_word: נַחְלָה
  english_pob_choice: is grievous
  chosen_spanish: es gravísima
  alternatives_spanish:
  - es grave
  - es severa
  - es incurable
  lexicon: HALOT
  rationale: '''Gravísima'' refleja la intensidad del hebreo en un español claro y natural; conserva la valoración de extrema seriedad sin afirmar más de lo que el texto exige.'
- source_word: מַכָּתֶךָ
  english_pob_choice: your wound
  chosen_spanish: tu herida
  alternatives_spanish:
  - tu golpe
  - tu lesión
  - tu llaga
  lexicon: HALOT
  rationale: '''Herida'' es el equivalente más natural en español para la imagen física de daño corporal o nacional, en paralelo con ''fractura''.'
- source_word: כֹּל שֹׁמְעֵי שִׁמְעֲךָ
  english_pob_choice: All who hear the report about you
  chosen_spanish: Todos los que oyen la noticia acerca de ti
  alternatives_spanish:
  - Todos los que oyen tu noticia
  - Todos los que oyen de ti
  - Todos los que escuchan el informe sobre ti
  lexicon: HALOT
  rationale: '''Noticia'' comunica bien שִׁמְעָה como informe/rumor/noticia y suena más natural que ''reporte'' en español bíblico contemporáneo.'
- source_word: תָּקְעוּ כַף
  english_pob_choice: clap their hands
  chosen_spanish: baten palmas
  alternatives_spanish:
  - aplauden
  - dan palmadas
  - golpean la mano
  lexicon: HALOT
  rationale: '''Baten palmas'' es una equivalencia idiomática digna y precisa para el gesto de júbilo expresado por el hebreo.'
- source_word: עָלֶיךָ
  english_pob_choice: over you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - a causa de ti
  - por ti
  lexicon: HALOT
  rationale: '''Sobre ti'' conserva el matiz de regocijo dirigido a la caída del enemigo, tal como en el inglés auditado.'
- source_word: כִּי עַל מִי לֹא עָבְרָה רָעָתְךָ תָּמִיד
  english_pob_choice: for over whom has your evil not continually passed?
  chosen_spanish: porque ¿sobre quién no ha pasado continuamente tu maldad?
  alternatives_spanish:
  - porque ¿a quién no ha alcanzado continuamente tu maldad?
  - porque ¿sobre quién no ha venido continuamente tu maldad?
  - porque ¿quién no ha sufrido continuamente tu maldad?
  lexicon: HALOT
  rationale: '''Maldad'' traduce רָעָה en su carga moral, como en el POB inglés ''evil'', y ''ha pasado continuamente'' conserva la imagen verbal de עבר y el adverbio תָּמִיד.'
theological_decisions:
- issue: Valor moral de רָעָתְךָ en un oráculo de juicio contra Nínive
  english_pob_reading: your evil
  chosen_spanish_reading: tu maldad
  alternative_spanish_readings:
  - tu perversidad
  - tu crueldad
  - tu mal
  rationale: El contexto acusa la violencia opresiva de Asiria/Nínive; 'maldad' mantiene la categoría moral amplia sin reducirla solo a crueldad física ni suavizarla a mera desgracia.
  doctrine_reference: Juicio profético sobre la violencia y la injusticia de las naciones
- issue: Imagen de sanidad/fractura en el primer hemistiquio
  english_pob_reading: There is no healing for your fracture
  chosen_spanish_reading: No hay sanidad para tu fractura
  alternative_spanish_readings:
  - No hay curación para tu fractura
  - No hay alivio para tu quebranto
  rationale: La pareja 'sanidad / fractura' reproduce el contraste del texto y conserva la imposibilidad de restauración anunciada por el profeta.
  doctrine_reference: Lenguaje profético de ruina irreversible
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido del hebreo y el aparato auditado en inglés, pero adapta dos decisiones al español: ''sanidad'' por כֵּהָה para una lectura fluida y ''noticia'' por שִׁמְעָה para un registro bíblico moderno. Mantiene la tensión entre ''fractura'' y ''maldad'' sin neutralizar el juicio profético.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - '''Maldad'' preserva el valor moral de רָעָה, coherente con el registro de juicio del POB.'
  - '''Baten palmas'' mantiene el gesto idiomático de regocijo hostil sin convertirlo en mera cortesía social.'
  - Se evita 'Señor' o 'Cristo' porque no aparecen en el versículo ni en su eco inmediato.
