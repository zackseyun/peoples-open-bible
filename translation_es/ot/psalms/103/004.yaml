translation:
  language: es
  text: el que redime tu vida de la fosa[a], el que te corona con amor leal y compasión[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la destrucción» o «del sepulcro».
    reason: lexical_alternative
  - marker: b
    text: O «y misericordia» o «y tiernas misericordias».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגּוֹאֵל
  english_pob_choice: who redeems
  chosen_spanish: el que rescata
  alternatives_spanish:
  - el que redime
  - el que actúa como redentor
  lexicon: HALOT
  rationale: גאל expresa la acción de rescatar/redimir con matiz de reclamación y liberación. En español, «rescata» comunica bien la acción concreta en un salmo poético; «redime» sería también posible, pero puede sonar más marcadamente teológico o litúrgico.
- source_word: מִשַּׁחַת
  english_pob_choice: from the pit
  chosen_spanish: de la fosa
  alternatives_spanish:
  - del sepulcro
  - de la destrucción
  lexicon: HALOT
  rationale: שַׁחַת puede referirse a una fosa, al sepulcro o a destrucción. «Fosa» conserva la imagen concreta y poética del texto. Se mantiene la amplitud semántica sin restringirla a una sola lectura.
- source_word: חַיָּיִכִי
  english_pob_choice: your life
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu alma
  lexicon: HALOT
  rationale: La forma se refiere a la vida de la persona en sentido amplio. «Tu vida» evita introducir una noción más inmaterial que no exige el hebreo.
- source_word: הַמְעַטְּרֵכִי
  english_pob_choice: who crowns you
  chosen_spanish: el que te corona
  alternatives_spanish:
  - el que te adorna
  - el que te ciñe con honor
  lexicon: HALOT
  rationale: עטר significa coronar o adornar con honor. «Te corona» conserva la metáfora de honor y exaltación con naturalidad en español.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor leal
  alternatives_spanish:
  - amor constante
  - amor fiel
  - misericordia
  lexicon: HALOT
  rationale: חֶסֶד es un amor de fidelidad y lealtad pactal. «Amor leal» preserva esa fuerza relacional sin caer en un calco arcaizante.
- source_word: וְרַחֲמִים
  english_pob_choice: and compassion
  chosen_spanish: y compasión
  alternatives_spanish:
  - y misericordia
  - y tiernas misericordias
  lexicon: HALOT
  rationale: רַחֲמִים expresa compasión entrañable y abundante. «Compasión» reproduce bien el ajuste revisado en inglés y mantiene el paralelo poético con חֶסֶד.
theological_decisions:
- issue: Alcance de la imagen de rescate
  english_pob_reading: Temporal and existential deliverance expressed in poetic language, without restricting it to either physical rescue or final salvation.
  chosen_spanish_reading: Liberación poética y existencial, sin reducirla solo a rescate físico ni solo a salvación escatológica.
  alternative_spanish_readings:
  - rescate de la muerte o del sepulcro en sentido literal
  - salvación espiritual en sentido amplio
  rationale: 'La fosa admite una gama de sentidos: peligro mortal, sepulcro o destrucción. La traducción evita cerrar el alcance teológico del verso y conserva la tensión poética del hebreo.'
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera reductiva.
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del audit trail inglés, que prefirió «compassion» para רַחֲמִים; en español se refleja como «compasión», manteniendo el paralelismo con «amor leal».
  spanish_consistency_notes:
  - Se evita «SEÑOR» para no ocultar el nombre divino cuando no aparece en este versículo.
  - Se mantiene un registro poético y claro, apto para lectura pública.
  - Las notas preservan alternativas semánticas reales sin forzar una sola interpretación.
