translation:
  language: es
  text: Y llegó uno a informarle en Persia que las fuerzas que habían ido a la tierra de Judá habían sido puestas en fuga[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habían vuelto atrás» o «habían sido derrotadas». El verbo griego puede denotar ser vuelto o puesto en fuga; el contexto favorece un revés militar.
    reason: lexical_alternative
  - marker: b
    text: «Fuerzas» puede funcionar metonímicamente por los contingentes militares que estaban en esos campamentos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαγγέλλων
  english_pob_choice: reporting
  chosen_spanish: informarle
  alternatives_spanish:
  - darle aviso
  - comunicarle
  - reportarle
  lexicon: BDAG
  rationale: El participio expresa la acción de traer un informe o noticia. En español, «informarle» comunica bien ese acto sin sonar forzado, y mantiene la dirección del mensaje hacia el destinatario.
- source_word: Περσίδα
  english_pob_choice: Persia
  chosen_spanish: Persia
  alternatives_spanish:
  - la tierra de Persia
  - Persis
  lexicon: LSJ
  rationale: La referencia geográfica es directa; «Persia» es natural en español y conserva el sentido locativo del griego sin introducir una forma menos conocida.
- source_word: τετρόπωνται
  english_pob_choice: had been routed
  chosen_spanish: habían sido derrotadas
  alternatives_spanish:
  - habían vuelto atrás
  - habían sido puestas en fuga
  lexicon: LSJ
  rationale: El perfecto describe un resultado ya consumado de un revés militar. «Habían sido derrotadas» comunica esa derrota de manera clara; la alternativa «puestas en fuga» conserva más la imagen de ser expulsadas, pero en español suena menos directa.
- source_word: παρεμβολαὶ
  english_pob_choice: forces
  chosen_spanish: las fuerzas
  alternatives_spanish:
  - los campamentos
  - los ejércitos
  - las tropas
  lexicon: LSJ
  rationale: Aunque el término griego dice literalmente «campamentos», el contexto militar permite el valor metonímico de las fuerzas allí acampadas. La revisión inglesa ya privilegió «forces»; en español «las fuerzas» mantiene esa decisión y suena natural.
- source_word: πορευθεῖσαι
  english_pob_choice: had gone
  chosen_spanish: habían ido
  alternatives_spanish:
  - habían marchado
  - habían salido
  lexicon: BDAG
  rationale: El participio indica movimiento hacia Judá. «Habían ido» es fiel y sobrio; «habían marchado» añade un matiz militar que el griego no exige de forma explícita.
- source_word: γῆν Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - la tierra de Judea
  - Judea
  lexicon: LSJ
  rationale: Se preserva la formulación más cercana al griego, «tierra de Judá», en vez de normalizarla a «Judea». Esto respeta el lenguaje del pasaje y el marco judío del relato.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «camps» a «forces» por considerarse más natural y contextual. La redacción española sigue esa revisión, pero conserva la posible referencia concreta de παρεμβολαί mediante la nota b. También se mantiene la alternativa semántica de τετρόπωνται indicada en la nota a, porque el verbo griego admite más de una matización militar.
  spanish_consistency_notes:
  - Se mantiene «Judá» en lugar de «Judea» para seguir la formulación del griego y del POB inglés.
  - Se usa «derrotadas» como solución principal para el resultado militar, sin borrar la alternativa de «vuelta atrás/puesta en fuga».
  - El sintagma «las fuerzas» conserva la decisión revisada del inglés y evita un calco demasiado concreto de «campamentos» en el texto principal.
