translation:
  language: es
  text: Y buscó, comenzando por el mayor y terminando con el menor, y la copa[a] fue hallada en el saco de Benjamín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cáliz». El término hebreo puede referirse a una copa o a un cáliz.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַפֵּשׂ
  english_pob_choice: he searched
  chosen_spanish: buscó
  alternatives_spanish:
  - examinó
  - registró
  lexicon: HALOT
  rationale: El verbo expresa una búsqueda concreta entre las pertenencias; en español, «buscó» es natural y mantiene el sentido narrativo sin sobrecargar el texto. «Registró» sería más técnico y «examinó» menos directo para el contexto.
- source_word: בַּגָּדוֹל
  english_pob_choice: with the oldest
  chosen_spanish: por el mayor
  alternatives_spanish:
  - por el de más edad
  - por el primogénito
  - por el más grande
  lexicon: HALOT
  rationale: Aquí el contraste es de orden entre hermanos, no de tamaño. En español, «el mayor» transmite con naturalidad la idea de senioridad/edad que el inglés POB decidió explicitar como «the oldest».
- source_word: הֵחֵל
  english_pob_choice: beginning
  chosen_spanish: comenzando
  alternatives_spanish:
  - empezando
  - iniciando
  lexicon: HALOT
  rationale: El hebreo marca el punto inicial de la secuencia de búsqueda. «Comenzando» funciona como participio coordinado con «buscó» y conserva la estructura progresiva del original.
- source_word: וּבַקָּטֹן
  english_pob_choice: with the youngest
  chosen_spanish: con el menor
  alternatives_spanish:
  - con el más joven
  - con el más pequeño
  lexicon: HALOT
  rationale: En este contexto familiar, קטן contrasta con «el mayor» y señala al hijo de menor edad. «El menor» es claro en español y evita la posible lectura de tamaño físico.
- source_word: כִּלָּה
  english_pob_choice: finishing
  chosen_spanish: terminando
  alternatives_spanish:
  - acabando
  - finalizando
  lexicon: HALOT
  rationale: El verbo señala el final de la secuencia. «Terminando» empareja bien con «comenzando» y reproduce el orden inclusivo del hebreo.
- source_word: וַיִּמָּצֵא
  english_pob_choice: was found
  chosen_spanish: fue hallada
  alternatives_spanish:
  - se encontró
  - fue encontrada
  lexicon: HALOT
  rationale: El nifal tiene sentido pasivo/reflexivo; por eso se conserva la pasividad en español. «Fue hallada» reproduce bien la forma y el tono narrativo; la concordancia femenina se ajusta a «la copa».
- source_word: הַגָּבִיעַ
  english_pob_choice: the cup
  chosen_spanish: la copa
  alternatives_spanish:
  - la copa grande
  - el cáliz
  - la taza
  lexicon: HALOT
  rationale: La palabra hebrea puede referirse a una copa o un goblet. «Copa» es un equivalente natural en español y conserva la posible amplitud semántica sin introducir un término litúrgico no requerido.
- source_word: בְּאַמְתַּחַת
  english_pob_choice: in Benjamin’s sack
  chosen_spanish: en el saco de Benjamín
  alternatives_spanish:
  - en la bolsa de Benjamín
  - en el costal de Benjamín
  lexicon: HALOT
  rationale: אַמְתַּחַת denota un saco o bolsa de transporte. «Saco» es el mejor equivalente contextual en español para el viaje y la provisión de grano.
- source_word: בִּנְיָמִן
  english_pob_choice: Benjamin’s
  chosen_spanish: de Benjamín
  alternatives_spanish:
  - de Benjamín
  lexicon: Transliteración estándar
  rationale: Los nombres propios se transliteran de forma convencional. La construcción posesiva española «de Benjamín» expresa con naturalidad la relación de pertenencia.
translation_notes:
  revision_awareness: Verso sin cambios relevantes en la revisión más reciente; el consenso de auditoría en inglés es alto y la traducción española sigue esa lectura, preservando la secuencia verbal, el pasivo de «ser hallada» y la ambigüedad léxica de גביע en una nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita «SEÑOR» y también «Cristo», pues no corresponden al texto.
  - «Benjamín» se conserva como nombre propio transliterado.
  - La estructura «comenzando... terminando...» refleja el paralelismo del hebreo y la audit trail en inglés.
