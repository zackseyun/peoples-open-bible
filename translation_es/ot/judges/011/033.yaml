translation:
  language: es
  text: Y los hirió desde Aroer hasta la entrada de Minnit[a], veinte ciudades, y hasta Abel-queramim[b], con una matanza[c] muy grande. Así quedaron sometidos los hijos de Amón[d] ante los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta Minnit» o «hasta la entrada de Minnit». La expresión hebrea es algo difícil y puede referirse al acceso a la ciudad o simplemente a la ciudad misma.
    reason: alternative_reading
  - marker: b
    text: Abel-queramim es un nombre de lugar; sus componentes podrían significar algo como «prado de viñedos», pero aquí se deja transliterado porque funciona como nombre propio.
    reason: lexical_alternative
  - marker: c
    text: O «con un golpe/una derrota muy grandes». La frase hebrea puede denotar un golpe militar devastador; «matanza» hace explícita la severidad en el contexto.
    reason: lexical_alternative
  - marker: d
    text: O más idiomáticamente, «los amonitas» y «los israelitas». La traducción conserva las expresiones hebreas «hijos de Amón» e «hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֵּם
  english_pob_choice: And he struck them
  chosen_spanish: Y los hirió
  alternatives_spanish:
  - Y los golpeó
  - Y los derrotó
  - Y los hirió de muerte
  lexicon: HALOT
  rationale: נכה conserva el sentido concreto de golpear/herir en contexto militar. «Hirió» es natural en español bíblico y mantiene la acción física sin decidir de antemano el alcance exacto de las bajas.
- source_word: מֵעֲרוֹעֵר
  english_pob_choice: from Aroer
  chosen_spanish: desde Aroer
  alternatives_spanish:
  - de Aroer
  lexicon: HALOT
  rationale: Topónimo. «Desde» expresa con claridad el punto de partida geográfico en español.
- source_word: וְעַד בּוֹאֲךָ מִנִּית
  english_pob_choice: as far as the entrance to Minnith
  chosen_spanish: hasta la entrada de Minnit[a]
  alternatives_spanish:
  - hasta Minnit[a]
  - hasta el acceso a Minnit[a]
  - hasta la llegada a Minnit[a]
  lexicon: HALOT
  rationale: La expresión hebrea es difícil; el audit trail inglés opta por «entrance to Minnith». «Entrada» preserva esa decisión y suena más natural que una traducción demasiado literal del sufijo verbal.
- source_word: עֶשְׂרִים עִיר
  english_pob_choice: twenty cities
  chosen_spanish: veinte ciudades
  alternatives_spanish:
  - veinte pueblos
  lexicon: HALOT
  rationale: Coincide con el valor directo del numeral y el sustantivo. «Ciudades» es la forma más estable para עִיר en un itinerario o informe de conquista.
- source_word: וְעַד אָבֵל כְּרָמִים
  english_pob_choice: and as far as Abel-keramim
  chosen_spanish: y hasta Abel-ceramim[b]
  alternatives_spanish:
  - y hasta Abel Keramim[b]
  - y hasta ‘Meadow of Vineyards’
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado. En español se usa «ceramim» para reflejar el valor fonético sin traducir el topónimo, que funciona aquí como nombre de lugar.
- source_word: מַכָּה גְּדוֹלָה מְאֹד
  english_pob_choice: with a very great slaughter
  chosen_spanish: con una matanza[c] muy grande
  alternatives_spanish:
  - con un golpe muy grande[c]
  - con una derrota muy grande[c]
  lexicon: HALOT
  rationale: מַכָּה puede significar golpe, herida o derrota; en contexto bélico el audit trail inglés elige «slaughter» para explicitar la severidad. «Matanza» mantiene esa fuerza en español sin borrar la tensión semántica del hebreo.
- source_word: וַיִּכָּנְעוּ
  english_pob_choice: were subdued
  chosen_spanish: quedaron sometidos
  alternatives_spanish:
  - fueron sometidos
  - quedaron humillados
  - se rindieron
  lexicon: HALOT
  rationale: כנע en nifal expresa sometimiento o humillación. «Quedaron sometidos» comunica bien el resultado político-militar y evita reducirlo a una experiencia meramente interior.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón[d]
  alternatives_spanish:
  - los amonitas[d]
  lexicon: HALOT
  rationale: Se preserva la expresión hebrea de parentesco, siguiendo la decisión inglesa de mantener la textura original. «Amón» es la forma más reconocible en español.
- source_word: מִפְּנֵי בְּנֵי יִשְׂרָאֵל
  english_pob_choice: before the sons of Israel
  chosen_spanish: delante de los hijos de Israel
  alternatives_spanish:
  - ante los hijos de Israel
  - ante los israelitas
  lexicon: HALOT
  rationale: מִפְּנֵי expresa estar en presencia o bajo la presión de otro. «Delante de» conserva el paralelismo con la forma hebrea; «ante» sería igualmente posible, pero menos transparente para la relación de sometimiento.
translation_notes:
  revision_awareness: 'The English POB revision changed ''the approach to Minnith'' to ''the entrance to Minnith'' for greater naturalness while retaining the difficult geographic sense. This Spanish draft follows that revision with «la entrada de Minnit». It also preserves the POB''s lexical tensions: the concrete military verb, the toponyms as names, the severity of מַכָּה, and the kinship expressions ''sons of Ammon/Israel.'''
  spanish_consistency_notes:
  - Se mantiene «hijos de» para reproducir la textura hebrea, no para sonar idiomático.
  - Se translitera «Minnit» y «Abel-ceramim» como topónimos; no se traducen los componentes del nombre en el texto principal.
  - «Matanza» se usa por la fuerza bélica de מַכָּה en contexto, aunque la nota conserva las alternativas «golpe» y «derrota».
  - «Delante de» conserva la relación de sometimiento expresada por מִפְּנֵי sin convertirla en una paráfrasis más libre.
