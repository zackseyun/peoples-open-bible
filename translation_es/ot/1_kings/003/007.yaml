revisions:
- from: Y ahora[a], Yahvé mi Dios, tú has hecho rey a tu esclavo en lugar de David, mi padre; y yo soy un niño pequeño[b]; no sé salir ni entrar.
  to: Y ahora, Yahvé mi Dios, tú has hecho rey a tu siervo en lugar de David, mi padre; y yo soy un niño pequeño[a]; no sé cómo salir ni entrar[b].
  rationale: Se ajusta עַבְדְּךָ a 'tu siervo' para seguir la decisión léxica documentada para este contexto oracional; se elimina la nota innecesaria en 'Y ahora'; se conserva la autodescripción humilde con nota alternativa; y se añade la nota requerida para el modismo 'salir y entrar', mientras 'cómo' mejora la correspondencia y fluidez del español.
