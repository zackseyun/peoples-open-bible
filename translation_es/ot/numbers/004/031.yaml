translation:
  language: es
  text: 'Y este es el deber de lo que deben transportar para todo su servicio en la tienda de reunión: los marcos[a][b] del tabernáculo, sus barras, sus pilares y sus bases[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "encargo" para מִשְׁמֶרֶת, destacando una responsabilidad asignada.
    reason: lexical_alternative
  - marker: b
    text: O "las tablas del tabernáculo" para "los marcos del tabernáculo". El término hebreo puede referirse a piezas estructurales de madera; "marcos" resalta su función arquitectónica.
    reason: lexical_alternative
  - marker: c
    text: O "zócalos" para "bases" (אֲדָנִים), un término más técnico para las piezas de fundamento de la estructura del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת
  english_pob_choice: And this is
  chosen_spanish: Y esta es
  alternatives_spanish:
  - Y esto es
  - Ahora bien, esto es
  lexicon: HALOT
  rationale: La expresión introduce una especificación del encargo levítico. En español, "Y esta es" conserva la conexión y la presentación directa del hebreo sin sonar forzada.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: duty
  chosen_spanish: responsabilidad
  alternatives_spanish:
  - deber
  - encargo
  - cargo
  lexicon: HALOT
  rationale: El término denota una asignación o encargo oficial. "Responsabilidad" comunica bien esa idea en español moderno y mantiene el peso administrativo del contexto.
- source_word: מַשָּׂאָם
  english_pob_choice: their burden
  chosen_spanish: su carga
  alternatives_spanish:
  - lo que deben llevar
  - su peso
  lexicon: HALOT
  rationale: El hebreo alude a lo que deben transportar. "Carga" preserva la concreción física del término y funciona naturalmente en español junto con el inventario de objetos que sigue.
- source_word: לְכָל עֲבֹדָתָם
  english_pob_choice: for all their service
  chosen_spanish: para todo su servicio
  alternatives_spanish:
  - para toda su labor
  - en todo su servicio
  lexicon: HALOT
  rationale: '"Servicio" mantiene el matiz cultual propio del tabernáculo mejor que "trabajo", sin perder claridad en español.'
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: '"Tienda de reunión" traduce de forma directa el nombre del santuario y evita una paráfrasis innecesaria.'
- source_word: קַרְשֵׁי הַמִּשְׁכָּן
  english_pob_choice: the frames of the tabernacle
  chosen_spanish: los marcos[a][b] del tabernáculo
  alternatives_spanish:
  - las tablas del tabernáculo
  - las planchas del tabernáculo
  lexicon: HALOT
  rationale: '"Marcos" refleja la función estructural de קֶרֶשׁ en el contexto del tabernáculo y evita una imagen demasiado ambigua en español. Se conserva además la alternativa tradicional técnica mediante nota.'
- source_word: בְרִיחָיו
  english_pob_choice: its bars
  chosen_spanish: sus barras
  alternatives_spanish:
  - sus travesaños
  - sus varas
  lexicon: HALOT
  rationale: '"Barras" es el equivalente más transparente y natural para los elementos transversales de la estructura.'
- source_word: עַמּוּדָיו
  english_pob_choice: its pillars
  chosen_spanish: sus pilares
  alternatives_spanish:
  - sus columnas
  - sus postes
  lexicon: HALOT
  rationale: '"Pilares" conserva el tono elevado y arquitectónico del listado y es adecuado para los soportes del santuario.'
- source_word: אֲדָנָיו
  english_pob_choice: its bases
  chosen_spanish: sus bases[c]
  alternatives_spanish:
  - sus zócalos
  - sus soportes
  lexicon: HALOT
  rationale: En este contexto, el término designa las piezas inferiores de apoyo de la estructura. "Bases" es claro y fidelísimo al uso tabernacular; la nota preserva la alternativa técnica posible.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene un enfoque de equivalencia óptima y no muestra revisiones posteriores; el pasaje se traduce de manera estable, con las mismas decisiones estructurales y terminológicas principales.
  spanish_consistency_notes:
  - Se preservó "Yahvé" solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo el registro cultual con "servicio" y el nombre "tienda de reunión" para coherencia con el léxico del tabernáculo.
  - Se evitaron soluciones eclesiásticas tradicionales que oscurecen el sentido arquitectónico del listado.
  - 'Las notas se colocan solo en las palabras con alternativa léxica real: "marcos" y "bases".'
