id: ISA.47.11
reference: Isaiah 47:11
source:
  edition: WLC
  text: וּ/בָ֧א עָלַ֣יִ/ךְ רָעָ֗ה לֹ֤א תֵדְעִי֙ שַׁחְרָ֔/הּ וְ/תִפֹּ֤ל עָלַ֨יִ/ךְ֙ הֹוָ֔ה לֹ֥א תוּכְלִ֖י כַּפְּרָ֑/הּ וְ/תָבֹ֨א עָלַ֧יִ/ךְ פִּתְאֹ֛ם שׁוֹאָ֖ה לֹ֥א תֵדָֽעִי׃
translation:
  text: But evil will come upon you[a]; you will not know how to charm it away. And disaster will fall upon you; you will not be able to atone for it. And ruin will come upon you suddenly[b], which you do not foresee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will not know its dawning' or 'you will not know how to avert it.' The Hebrew of this clause is difficult; the main text follows the sense that Babylon will be unable to use her occult arts to dispel the coming evil.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''you will not be able to ward it off'' / ''appease it.'' Hebrew: ''make atonement for it.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָה
  chosen: evil
  alternatives:
  - calamity
  - disaster
  lexicon: HALOT
  rationale: The noun can denote either moral evil or calamity. Here, in a judgment oracle with parallel terms הֹוָה and שׁוֹאָה, it refers to harmful disaster. 'Evil' preserves the Hebrew term's breadth and the traditional force, while the surrounding clauses clarify that a destructive judgment is in view.
- source_word: שַׁחְרָהּ
  chosen: how to charm it away
  alternatives:
  - its dawning
  - how to seek it away
  - its source
  lexicon: HALOT
  rationale: 'This form is difficult and debated. In context, addressed to Babylon with its sorceries and enchantments (vv. 9, 12), the sense ''to charm away'' or ''to avert by incantation'' best fits the taunt: she will not know how to dispel the coming evil. A more literal rendering such as ''its dawning'' is possible etymologically, but fits the context less well.'
- source_word: הֹוָה
  chosen: disaster
  alternatives:
  - havoc
  - misfortune
  - calamity
  lexicon: HALOT
  rationale: The noun denotes destructive ruin or disaster. 'Disaster' is natural modern English and distinguishes it from the first term while preserving the parallelism of successive judgments.
- source_word: כַּפְּרָהּ
  chosen: to atone for it
  alternatives:
  - to appease it
  - to ward it off
  - to cover it
  lexicon: HALOT
  rationale: From כפר, the basic sense is 'cover/purge/make atonement.' In this context the idea is not cultic expiation in a positive theological sense but inability to avert or expiate the disaster once it comes. 'Atone for it' keeps the lexical connection transparent; the context supplies the ironic force.
- source_word: פִּתְאֹם
  chosen: suddenly
  alternatives:
  - in an instant
  lexicon: HALOT
  rationale: Standard adverb meaning abruptness; 'suddenly' is the clearest natural rendering.
- source_word: שׁוֹאָה
  chosen: ruin
  alternatives:
  - desolation
  - devastation
  lexicon: HALOT
  rationale: The noun denotes devastating ruin. 'Ruin' is concise and idiomatic, while preserving the severity of the judgment.
- source_word: לֹא תֵדָעִי
  chosen: which you do not foresee
  alternatives:
  - you will not know
  - you do not know
  lexicon: HALOT
  rationale: A strictly literal repetition would be 'you will not know,' but in English the object of knowing is implicit. 'Which you do not foresee' makes the sense explicit and suits the context of sudden, unexpected judgment.
