translation:
  language: es
  text: Escudríñame, Dios, y conoce mi corazón; pruébame y conoce mis pensamientos inquietos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis pensamientos inquietantes» o «mis pensamientos divididos».
