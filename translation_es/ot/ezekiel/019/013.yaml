translation:
  language: es
  text: Y ahora está plantada[a] en el yermo, en una tierra seca y sedienta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trasplantada en el yermo». El participio hebreo puede entenderse en el contexto como si implicara traslado y replantación, aunque la forma misma expresa más directamente que está plantada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: La conjunción más el adverbio temporal marcan transición discursiva. «Y ahora» conserva mejor ese enlace que solo «Ahora».
- source_word: שְׁתוּלָה
  english_pob_choice: is planted
  chosen_spanish: está plantada
  alternatives_spanish:
  - está trasplantada
  - ha sido plantada
  lexicon: HALOT
  rationale: El participio pasivo describe a la figura como ya colocada en un nuevo lugar. En español, «está plantada» conserva la imagen con naturalidad. «Trasplantada» es posible por el contexto, pero introduce explícitamente la idea del traslado que el hebreo no formula de manera directa.
- source_word: בַמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en la estepa
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede abarcar «wilderness» o «steppe», en este contexto de desolación la opción «desierto» comunica bien la imagen. Se evita una expresión más técnica o menos común.
- source_word: בְּאֶרֶץ
  english_pob_choice: in a land
  chosen_spanish: en tierra
  alternatives_spanish:
  - en una tierra
  - en un país
  lexicon: HALOT
  rationale: La construcción hebrea presenta un ámbito locativo adicional. En español, «en tierra» fluye mejor que «en una tierra» y mantiene el carácter general de ubicación descrita por los adjetivos siguientes.
- source_word: צִיָּה
  english_pob_choice: dry
  chosen_spanish: reseca
  alternatives_spanish:
  - seca
  - árida
  lexicon: HALOT
  rationale: צִיָּה denota sequedad o aridez. «Reseca» intensifica la idea de falta de humedad y combina bien con «sedienta» sin sonar demasiado técnico.
- source_word: וְצָמָא
  english_pob_choice: and thirsty
  chosen_spanish: sedienta
  alternatives_spanish:
  - y sedienta
  - y con sed
  lexicon: HALOT
  rationale: El hebreo compacta dos rasgos de la tierra. En español, «sedienta» expresa de forma idiomática la personificación de una tierra que carece de agua. Se omite repetir «y» dentro de la lista adjetival para evitar una construcción forzada.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con el juicio auditado del POB en inglés: el participio expresa primariamente la condición de «plantada», mientras que «trasplantada» queda como alternativa contextual. No se introducen cambios textuales ni revisiones adicionales.'
  spanish_consistency_notes:
  - Se preserva el tono profético sobrio y la metáfora agrícola/geográfica del hebreo.
  - 'Se mantiene la progresión locativa: desierto / tierra reseca y sedienta.'
  - La nota [a] acompaña el término con la alternativa documentada sin desplazar la lectura principal.
