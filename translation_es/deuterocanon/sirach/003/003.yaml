translation:
  language: es
  text: Quien honra a su padre expía sus pecados[a], y quien honra a su madre guarda tesoro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su pecado» en singular; el griego paralelo lee «pecados» en plural. La traducción sigue el sentido colectivo del paralelo griego, como en el texto inglés auditado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «acumula tesoro». La imagen es la de guardar o almacenar riqueza como reserva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τιμῶν / מְכַבֵּד
  english_pob_choice: honors
  chosen_spanish: honra
  alternatives_spanish:
  - respeta
  - glorifica
  lexicon: HALOT; BDAG
  rationale: El participio expresa dar el debido honor. «Honra» conserva la fuerza ética y relacional del verbo mejor que «respeta», que es más débil, y mejor que «glorifica», que sería demasiado solemne para el deber filial.
- source_word: πατέρα / אָב
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - progenitor
  - papá
  lexicon: HALOT; BDAG
  rationale: El hebreo y el griego nombran específicamente al padre, no a «progenitores» en general. «Padre» es el equivalente natural y fiel en español.
- source_word: ἐξιλάσεται ἁμαρτίας / תְּכֻפַּר חַטָּאתוֹ
  english_pob_choice: makes atonement for his sins
  chosen_spanish: expía sus pecados
  alternatives_spanish:
  - hace expiación por sus pecados
  - obtiene expiación por sus pecados
  lexicon: HALOT; Louw-Nida
  rationale: El hebreo y el griego dan fuerza expiatoria real al verbo. «Expía» preserva ese peso teológico en español de manera natural y evita debilitarlo a una mera consecuencia moral. Se usa el plural «pecados» en línea con el paralelo griego, como en la edición inglesa auditada.
- source_word: ἁμαρτίας / חַטָּאתוֹ
  english_pob_choice: his sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - su pecado
  lexicon: HALOT; BDAG
  rationale: Aunque el hebreo tiene singular, el griego paralelo usa plural, probablemente con sentido colectivo. «Sus pecados» refleja esa lectura colectiva y coincide con la decisión auditada en inglés.
- source_word: וְגוֹנֵז אוֹצָר
  english_pob_choice: stores up treasure
  chosen_spanish: acumula tesoro
  alternatives_spanish:
  - guarda tesoro
  - atesora tesoro
  - guarda un tesoro
  lexicon: HALOT
  rationale: גֹּנֵז/גנז comunica guardar o poner en reserva; אוצר es tesoro/depósito de riqueza. «Acumula tesoro» reproduce bien la imagen de beneficio acumulado sin el matiz peyorativo de «atesora».
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - madre
  lexicon: HALOT
  rationale: El sufijo posesivo está explícito; «su madre» mantiene el paralelismo con «su padre» y la fuerza individualizada del versículo.
theological_decisions:
- issue: Lenguaje de expiación en contexto sapiencial
  english_pob_reading: 'Retain explicit atonement wording: ''makes atonement for his sins.'''
  chosen_spanish_reading: 'Mantener lenguaje explícito de expiación: «expía sus pecados».'
  alternative_spanish_readings:
  - cubre sus pecados
  - obtiene perdón por sus pecados
  rationale: Tanto el hebreo כפר como el griego ἐξιλάσεται expresan expiación/propiciación, no solo un beneficio moral vago. «Expía» preserva esa carga sin imponer un sistema doctrinal ajeno al texto sapiencial.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Términos de filiación con distinción sexual
  english_pob_reading: Use 'father' and 'mother' rather than gender-neutral 'parents.'
  chosen_spanish_reading: Usar «padre» y «madre» en vez de un neutro como «padres».
  alternative_spanish_readings:
  - padres
  rationale: El texto fuente nombra a padre y madre por separado; la simetría de ambos miembros forma parte de la estructura del versículo. El español debe conservar esa distinción.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto entre hebreo y griego y no registra revisiones pendientes; la versión española sigue la decisión inglesa ya verificada, conservando el lenguaje de expiación y el paralelismo filial sin introducir cambios adicionales.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre padre y madre para respetar el paralelismo del hebreo y del griego.
  - Se eligió «expía» para conservar la fuerza expiatoria del verbo כפר / ἐξιλάσεται.
  - Se evitó «SEÑOR» u otro ajuste teológico ajeno, ya que no aparece el nombre divino en este versículo.
  - La nota de plural/singular se coloca solo donde el español necesita aclarar la discrepancia entre hebreo y griego.
  - «Acumula tesoro» conserva la imagen de reserva de riqueza en un español natural y publicable.
