translation:
  language: es
  text: ¡Oh Yahvé[a], salva! Que el rey nos responda en el día en que llamamos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Oh Yahvé, salva al rey; respóndenos en el día en que llamamos!», o posiblemente: «¡Oh Yahvé, salva! El Rey nos responde en el día en que llamamos». La sintaxis hebrea es comprimida y permite más de una construcción de «el rey».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: ¡Oh Yahvé!
  alternatives_spanish:
  - ¡Oh Señor!
  - ¡Oh YHWH!
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, siguiendo la política del POB de no sustituirlo por un título. «Yahvé» es la forma española más estable y reconocible para el Tetragrámaton en un registro bíblico digno.
- source_word: הוֹשִׁיעָה
  english_pob_choice: save!
  chosen_spanish: salva
  alternatives_spanish:
  - sálvanos
  - da salvación
  lexicon: HALOT
  rationale: El imperativo breve expresa súplica directa. «Salva» mantiene la concisión poética y el valor amplio de liberación/victoria sin sobreespecificar.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king / The King
  chosen_spanish: el Rey
  alternatives_spanish:
  - el rey
  - el rey davídico
  lexicon: HALOT
  rationale: La ambigüedad del hebreo se preserva en español. Se opta por «Rey» con mayúscula para reflejar la lectura teológica documentada en la revisión inglesa, sin cerrar por completo la posibilidad del rey humano; la mayúscula permite esa tensión interpretativa en castellano.
- source_word: יַעֲנֵנוּ
  english_pob_choice: may ... answer us
  chosen_spanish: nos responda
  alternatives_spanish:
  - nos responda de parte suya
  - nos oiga
  lexicon: HALOT
  rationale: 'El imperfecto con valor desiderativo se vierte naturalmente como un deseo o ruego: «nos responda». «Responder» conserva mejor el paralelismo y la relación formal con la petición precedente que una paráfrasis más libre.'
- source_word: בְיוֹם
  english_pob_choice: in the day
  chosen_spanish: en el día en que
  alternatives_spanish:
  - el día que
  - cuando
  lexicon: HALOT
  rationale: Se preserva el idiomático temporal hebreo de manera transparente. «En el día en que» suena bíblico pero sigue siendo claro en español moderno.
- source_word: קָרְאֵנוּ
  english_pob_choice: we call
  chosen_spanish: clamamos
  alternatives_spanish:
  - llamamos
  - invocamos
  lexicon: HALOT
  rationale: En lenguaje de oración, «clamar» expresa mejor la súplica del contexto que el mero «llamar», sin añadir contenido ajeno. Se conserva la intensidad devocional implícita por el paralelismo del versículo.
theological_decisions:
- issue: Referente de «el Rey» en la cláusula final
  english_pob_reading: The Hebrew syntax is compressed and permits more than one construal of 'the king'; the main text keeps 'the king' as the subject of 'answer us' while a footnote preserves the alternative reading that the LORD is the one who saves/answers.
  chosen_spanish_reading: «el Rey» mantiene en la línea principal la lectura teológicamente marcada y ambigua; la nota preserva la posibilidad de entender que Yahvé es el sujeto implícito de salvar/responder.
  alternative_spanish_readings:
  - «el rey» como rey humano en el contexto real
  - «Yahvé, salva al rey; respóndenos»
  - «Yahvé salva; el Rey nos responderá»
  rationale: El hebreo es comprimido y admite más de una sintaxis. El español debe mantener esa tensión, no resolverla unilateralmente. La mayúscula en «Rey» reproduce la revisión inglesa reciente y deja abierta la lectura divina sin borrar la ambigüedad heredada del original.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente capitalizó «King» para reflejar la probabilidad de un referente divino; en español se conservó la misma tensión interpretativa con «el Rey» y se añadió nota para las dos lecturas principales, sin eliminar la posibilidad del rey humano del salmo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, de acuerdo con el estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - Se conserva la compactación poética del hebreo sin ampliar indebidamente el contenido.
  - «Rey» con mayúscula es consistente con la revisión inglesa y con la ambigüedad teológica documentada.
  - «Clamamos» mantiene el tono de oración y evita una traducción demasiado neutral de קרא.
