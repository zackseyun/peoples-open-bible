  text: וְ/אֶקְחָ֨ה פַת לֶ֜חֶם וְ/סַעֲד֤וּ לִבְּ/כֶם֙ אַחַ֣ר תַּעֲבֹ֔רוּ כִּֽי עַל כֵּ֥ן עֲבַרְתֶּ֖ם עַֽל עַבְדְּ/כֶ֑ם וַ/יֹּ֣אמְר֔וּ כֵּ֥ן תַּעֲשֶׂ֖ה כַּ/אֲשֶׁ֥ר דִּבַּֽרְתָּ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/018/005.yaml
  text: And let me bring a morsel of bread[a], so that you may refresh your hearts; after that you may pass on, since this is why you have passed by your servant. And they said, “Yes[b], do as you have said.”
  footnotes:
  - marker: a
    text: Or 'a morsel of bread.' The Hebrew phrase פַת לֶחֶם is a modest expression in a hospitality setting.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'sustain/strengthen your heart.' The Hebrew idiom refers to being refreshed with food.
    reason: lexical_alternative
