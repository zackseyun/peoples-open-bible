translation:
  language: es
  text: 'Él dijo[a]: «¿De veras eres tú mi hijo Esaú?» Y él dijo: «Soy yo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «¿Eres tú este, mi hijo Esaú?». La formulación es una pregunta enfática de identificación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He said / And he said
  chosen_spanish: Él dijo
  alternatives_spanish:
  - Y dijo
  - Entonces dijo
  lexicon: HALOT
  rationale: En narrativa hebrea, וַיֹּאמֶר introduce avance discursivo; en español puede omitirse la conjunción inicial sin perder el flujo. Mantengo el verbo simple para reflejar la repetición del original sin sobrecargar la frase.
- source_word: אַתָּה זֶה
  english_pob_choice: Are you really
  chosen_spanish: ¿Eres realmente tú
  alternatives_spanish:
  - ¿Eres tú?
  - ¿Eres de veras tú?
  lexicon: HALOT
  rationale: La combinación del pronombre independiente con el demostrativo forma una pregunta de identificación enfática. «Realmente» reproduce esa fuerza sin volverla rígida. Colocar «tú» antes de «mi hijo Esaú» conserva el orden natural del español y el énfasis interrogativo.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - hijo mío
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona singular se expresa de manera directa como «mi». «Hijo mío» es posible, pero aquí «mi hijo» sigue mejor la pregunta de identificación y el paralelismo de la frase.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esav
  lexicon: convención onomástica bíblica
  rationale: Se translitera el nombre propio según el uso bíblico estándar en español, «Esaú», que es transparente y reconocible para la lectura pública.
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Y respondió
  lexicon: HALOT
  rationale: La repetición del verbo mantiene la alternancia breve del diálogo. Conservo el sujeto explícito para claridad en español, ya que el hebreo ya lo marca por contexto, y aquí el énfasis en la respuesta breve se beneficia de esa explicitud.
- source_word: אָֽנִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  - Soy yo
  lexicon: HALOT
  rationale: La forma independiente expresa autoidentificación tersa. «Yo soy» mantiene la brevedad y la fuerza de la respuesta, y evita una paráfrasis más interpretativa.
translation_notes:
  revision_awareness: 'El texto base inglés fue revisado y quedó sin cambios; la concordancia general con el audit trail es alta. La traducción española sigue la misma decisión interpretativa principal: una pregunta de identificación enfática en la primera cláusula y una respuesta breve de autoidentificación en la segunda.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo/Mesías» y otras terminologías doctrinales no pertinentes al pasaje.
  - «Yo soy» conserva la concisión del hebreo y la respuesta directa del audit trail inglés.
  - La puntuación con comillas y signo de interrogación de apertura sigue la norma española para diálogo bíblico.
