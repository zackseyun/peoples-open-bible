lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these were
  chosen_spanish: Y estos eran
  alternatives_spanish:
  - Y estos son
  - Ahora bien, estos eran
  lexicon: HALOT
  rationale: En un registro genealógico, el demostrativo se mantiene y el imperfecto narrativo se vierte de modo natural al pasado en español, sin perder la función introductoria de la lista.
- source_word: בְנֵי
  english_pob_choice: children of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los hijos de
  - los descendientes de
  - los hijos/descendientes de
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por 'children' para hacer explícita la inclusión de Oholibamá, el hebreo conserva בְנֵי ('hijos de') como fórmula genealógica. En español, 'hijos de' reproduce mejor la forma directa del hebreo que 'hijos/descendientes', y la presencia de 'hija de Anah' mantiene visible la tensión genealógica.
- source_word: עֲנָה
  english_pob_choice: Anah
  chosen_spanish: Anah
  alternatives_spanish:
  - Aná
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio sin traducir, siguiendo la práctica auditable del POB.
- source_word: דִּשֹׁן
  english_pob_choice: Dishon
  chosen_spanish: Dishón
  alternatives_spanish:
  - Dishon
  lexicon: transliteración estándar
  rationale: Se translitera el nombre propio y se adapta la acentuación al español para facilitar la lectura, sin alterar la identificación del personaje.
- source_word: וְאָהֳלִיבָמָה
  english_pob_choice: Oholibamah
  chosen_spanish: Oholibamá
  alternatives_spanish:
  - Oholibamah
  lexicon: transliteración estándar
  rationale: Se mantiene el nombre propio con transliteración consistente y acento gráfico español para pronunciación natural.
- source_word: בַּת
  english_pob_choice: daughter of
  chosen_spanish: hija de
  alternatives_spanish:
  - hija de
  - hija de / descendiente de
  lexicon: HALOT
  rationale: 'Se explicita el femenino tal como lo exige el hebreo. Esto preserva la tensión del versículo: una fórmula plural de parentesco seguida por la identificación de Oholibamá como hija de Anah.'
theological_decisions:
- issue: Tensión genealógica entre 'hijos de Anah' e inclusión de Oholibamá como hija
  english_pob_reading: Retain the literal genealogical formula while also translating Oholibamah as 'daughter of Anah'.
  chosen_spanish_reading: Mantener 'los hijos de Anah' y, a la vez, traducir explícitamente 'hija de Anah'.
  alternative_spanish_readings:
  - '''los descendientes de Anah'''
  - '''los hijos de Anah'' suavizado con nota'
  rationale: El hebreo conserva la tensión textual; no conviene resolverla demasiado pronto con una paráfrasis. 'Hijos de' reproduce la fórmula genealógica original, mientras que 'hija de Anah' deja visible que el término funciona aquí como un encabezado de linaje, no como una restricción masculina estricta.
  doctrine_reference: Philosophy §§1, 3, 4, 5
- issue: Nombre divino o cristológico no presente en el verso
  english_pob_reading: No explicit divine title in this verse.
  chosen_spanish_reading: No se introduce vocabulario teológico ajeno al versículo.
  alternative_spanish_readings:
  - Añadir una glosa interpretativa
  rationale: El texto es puramente genealógico; cualquier explicitación doctrinal sería ajena al contenido del hebreo.
  doctrine_reference: 'Translation principle: source transparency'
translation_notes:
  revision_awareness: La revisión inglesa cambió 'sons' por 'children' para reflejar que la lista incluye a Oholibamá, una hija. En español, se conserva la forma hebrea 'hijos de' porque el femenino 'hija de Anah' ya hace visible la tensión genealógica y permite una traducción más cercana al texto fuente sin perder claridad.
  spanish_consistency_notes:
  - Se mantiene la transliteración consistente de nombres propios.
  - Se evita 'SEÑOR' u otro término teológico porque el versículo no contiene el nombre divino.
  - '''hijos de'' se usa como fórmula genealógica; la nota explica su amplitud semántica en este contexto.'
  - La puntuación sigue el flujo genealógico natural del español con dos puntos antes de la lista de nombres.
