revisions:
- from: Te daré gracias a Yahvé conforme a su justicia[a], y cantaré alabanzas al nombre de Yahvé, el Altísimo.
  to: Daré gracias a Yahvé conforme a su rectitud[a], y cantaré alabanzas al nombre de Yahvé, el Altísimo.
  rationale: Se corrige la persona gramatical para reflejar con precisión el hebreo («Daré gracias a Yahvé») y se ajusta צדק a «rectitud» en el texto principal para seguir la preferencia semántica documentada por el POB inglés, manteniendo «justicia» como alternativa válida en nota.
