revisions:
- from: 'Y si matas a este pueblo[a] como a un solo hombre, las naciones que han oído tu informe dirán[b]:'
  to: 'Y si matas a este pueblo[a] como un solo hombre, las naciones que han oído tu noticia dirán[b]:'
  rationale: Se corrige el modismo a «como un solo hombre» por mayor fidelidad y naturalidad en español, eliminando una preposición no exigida por la fuente. Se reemplaza «tu informe» por «tu noticia», que expresa mejor el sentido de שִׁמְעֲךָ en contexto narrativo sin volver a la expansión interpretativa «fama». Se actualiza la nota para conservar las alternativas documentadas.
