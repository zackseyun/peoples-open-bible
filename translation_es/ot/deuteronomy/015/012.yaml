translation:
  language: es
  text: Si tu hermano[a], un hebreo o una hebrea, es vendido a ti y te sirve seis años, entonces, en el séptimo año, lo dejarás ir libre de tu lado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: después de «un hebreo o una hebrea», el hebreo continúa con una forma masculina singular usada de manera genérica para la persona liberada. La ley se aplica a un hebreo o una hebrea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּכֵר
  english_pob_choice: is sold
  chosen_spanish: se vende
  alternatives_spanish:
  - es vendido
  - se vende a sí mismo
  - es puesto en venta
  lexicon: HALOT
  rationale: El nifal puede expresar pasiva o reflexivamente; «se vende» conserva esa ambigüedad sin introducir un mecanismo no explicitado. En español suena natural y mantiene la forma legal del hebreo.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu pariente
  - tu compatriota
  - tu hermano de raza
  lexicon: HALOT
  rationale: «Hermano» preserva el lenguaje de pacto y cercanía familiar del hebreo mejor que una reducción étnica o social. La forma de segunda persona singular sigue el hebreo.
- source_word: הָעִבְרִי ... הָעִבְרִיָּה
  english_pob_choice: a Hebrew man or a Hebrew woman
  chosen_spanish: un hebreo o una hebrea
  alternatives_spanish:
  - un hombre hebreo o una mujer hebrea
  - un esclavo hebreo o una esclava hebrea
  - un varón hebreo o una mujer hebrea
  lexicon: HALOT
  rationale: El hebreo marca género con adjetivos sustantivados; «un hebreo o una hebrea» preserva el valor léxico sin añadir el término «esclavo», que no está en esta frase. El contexto de servicio queda dado por la cláusula siguiente.
- source_word: וַעֲבָדְךָ
  english_pob_choice: and serves you
  chosen_spanish: y te sirve
  alternatives_spanish:
  - y trabaja para ti
  - y está a tu servicio
  - y te presta servicio
  lexicon: HALOT
  rationale: עבד expresa servicio/labor rendida al destinatario. «Te sirve» es natural en español y suficientemente amplio para el contexto legal, sin forzar «siervo» ni «esclavo».
- source_word: שֵׁשׁ שָׁנִים
  english_pob_choice: six years
  chosen_spanish: seis años
  alternatives_spanish:
  - durante seis años
  lexicon: HALOT
  rationale: Expresión numérica directa y transparente.
- source_word: וּבַשָּׁנָה הַשְּׁבִיעִת
  english_pob_choice: then in the seventh year
  chosen_spanish: entonces, en el séptimo año
  alternatives_spanish:
  - y en el séptimo año
  - pero en el séptimo año
  lexicon: HALOT
  rationale: «Entonces» marca de forma idiomática la secuencia jurídica tras los seis años de servicio.
- source_word: תְּשַׁלְּחֶנּוּ
  english_pob_choice: you shall send him out
  chosen_spanish: lo enviarás
  alternatives_spanish:
  - lo mandarás fuera
  - lo dejarás ir
  - lo soltarás
  lexicon: HALOT
  rationale: El verbo שׁלח es literalmente «enviar». «Lo enviarás» conserva esa imagen básica en un castellano natural. El sentido de liberación se completa con el adverbio siguiente.
- source_word: חָפְשִׁי
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - en libertad
  - como libre
  lexicon: HALOT
  rationale: Término estándar en contextos de manumisión. «Libre» comunica el estado resultante de manera clara y breve.
- source_word: מֵעִמָּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de tu lado
  - de tu presencia
  - de tu casa
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «de junto a ti». «De ti» es la forma más directa y sobria en español legal.
theological_decisions:
- issue: Pronombre masculino singular tras mencionar a un hombre y a una mujer hebreos
  english_pob_reading: The Hebrew continues with a masculine singular form used generically for the released person; the law applies to either a Hebrew man or woman.
  chosen_spanish_reading: Se mantiene el singular masculino «lo» en la frase principal, y se aclara en la nota que la norma incluye a un hebreo o una hebrea.
  alternative_spanish_readings:
  - los/las enviarás libres
  - lo o la enviarás libre
  - los enviarás libres
  rationale: El hebreo usa una forma masculina singular después de nombrar ambos sexos; suavizarlo en el texto principal borraría esa señal gramatical. El español puede conservar el singular masculino y explicar su alcance inclusivo en nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no requiere revisiones sustantivas. Se conserva la secuencia legal, el lenguaje de parentesco («tu hermano») y la referencia inclusiva a varón y mujer hebreos, con la nota necesaria sobre el singular masculino final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece.
  - Se evita «siervo» o «esclavo» en la frase sustantiva hebrea para no añadir una relación léxica no presente en esa parte del hebreo.
  - «Lo enviarás libre de ti» conserva el enlace entre el verbo de envío y el estado de libertad, siguiendo la fuerza del hebreo.
  - El singular masculino en la cláusula final se mantiene por fidelidad gramatical al hebreo, no por exclusión del sexo femenino.
