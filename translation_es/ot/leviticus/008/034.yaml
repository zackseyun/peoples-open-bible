translation:
  language: es
  text: Así como se ha hecho en este día[a], Yahvé ha mandado que se haga, para hacer expiación por ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así como se hizo hoy, así Yahvé mandó que se hiciera, para hacer expiación por ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Tal como
  - Como
  lexicon: HALOT
  rationale: La comparación con lo realizado en el rito anterior se expresa de manera natural en español con «Así como», que conserva la fuerza comparativa sin sonar rígido.
- source_word: עָשָׂה
  english_pob_choice: has been done
  chosen_spanish: se ha hecho
  alternatives_spanish:
  - se hizo
  - ha sido hecho
  lexicon: HALOT
  rationale: El hebreo tiene verbo perfecto con sujeto no expresado en contexto ritual. El reflexivo impersonal en español comunica bien la acción ya realizada sin forzar un sujeto explícito.
- source_word: בַּיּוֹם הַזֶּה
  english_pob_choice: on this day
  chosen_spanish: en este día
  alternatives_spanish:
  - hoy
  - en este día mismo
  lexicon: HALOT
  rationale: «En este día» mantiene el marco temporal ceremonial y es más formal que «hoy», sin perder claridad.
- source_word: צִוָּה
  english_pob_choice: has commanded
  chosen_spanish: ha mandado
  alternatives_spanish:
  - ha ordenado
  - mandó
  lexicon: HALOT
  rationale: «Mandar» comunica el valor directivo del mandato divino de forma natural en español. En este contexto no se requiere elevarlo a un tecnicismo distinto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: לַעֲשֹׂת
  english_pob_choice: to be done
  chosen_spanish: hacerlo
  alternatives_spanish:
  - ser hecho
  - para que se haga
  lexicon: HALOT
  rationale: El infinitivo hebreo repite la idea de la acción ritual ya mencionada; en español, «hacerlo» evita una pasiva forzada y mantiene la referencia a la ceremonia prescrita.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: hacer expiación
  alternatives_spanish:
  - hacer atonamiento
  - hacer propiciación
  lexicon: HALOT
  rationale: En español bíblico, «expiación» conserva el sentido cultual de כפר sin introducir una categoría doctrinal más estrecha que el hebreo. Se evita «atonamiento» por ser poco natural.
- source_word: עֲלֵיכֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - para ustedes
  - en favor de ustedes
  lexicon: HALOT
  rationale: Con verbos de expiación, la preposición puede expresarse naturalmente como «por» en español, manteniendo el valor beneficiario/on-behalf-of sin perder fluidez.
theological_decisions:
- issue: Valor cultual de כפר en el contexto sacerdotal
  english_pob_reading: to make atonement for you
  chosen_spanish_reading: para hacer expiación por ustedes
  alternative_spanish_readings:
  - para expiar por ustedes
  - para hacer propiciación por ustedes
  rationale: Se conserva el lenguaje cultual abierto del hebreo. «Expiación» comunica la acción ritual sin resolverla de antemano como una sola teoría teológica. «Propiciación» sería más interpretativa y estrecha.
  doctrine_reference: Translation philosophy §6; preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura auditada del inglés POB y conserva la estructura comparativa, el mandato divino y el propósito expiatorio del rito, sin cambios detectados en la pasada de revisión más reciente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino.
  - Se prefiere «expiación» por su valor cultual y su cercanía al uso bíblico del término.
  - La construcción impersonal «se ha hecho» evita añadir un sujeto que el hebreo no expresa.
  - «Por ustedes» mantiene el matiz beneficiario de עֲלֵיכֶם en un español natural.
