revisions:
- from: Yahvé no querrá perdonarlo[a], porque entonces la ira de Yahvé y su celo arderán contra aquel hombre, y toda la maldición escrita en este libro recaerá sobre él, y Yahvé borrará su nombre de debajo de los cielos.
  to: Yahvé no querrá perdonarlo, porque entonces la ira de Yahvé y sus celos arderán contra aquel hombre, y toda maldición[a] escrita en este libro recaerá sobre él, y Yahvé borrará su nombre de debajo de los cielos.
  rationale: Se corrige 'su celo' a 'sus celos' para ajustarse a la decisión léxica documentada para קִנְאָתוֹ. Se mueve la nota al término 'maldición' para reflejar correctamente la alternativa de אָלָה ('maldición' / 'maldición jurada') según el audit trail inglés, y se elimina la explicación redundante sobre 'no querrá' del aparato de notas porque ya queda bien expresada en el texto principal. También se ajusta 'toda la maldición' a 'toda maldición' para una lectura distributiva más natural y fiel.
  reviewer_model: gpt-5.4
