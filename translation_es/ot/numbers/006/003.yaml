translation:
  language: es
  text: se abstendrá de vino y de bebida fuerte; no beberá vinagre de vino ni vinagre de bebida fuerte, ni beberá ningún jugo de uvas[a] ni comerá uvas[b], frescas o secas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cualquier líquido de uvas remojadas' o 'cualquier jugo de uva'; el término hebreo puede referirse de manera amplia a un líquido derivado de uvas remojadas o procesadas.
    reason: lexical_alternative
  - marker: b
    text: O 'uvas, frescas o pasas'. El hebreo literalmente dice 'uvas, frescas y secas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיַּיִן
  english_pob_choice: from wine
  chosen_spanish: de vino
  alternatives_spanish:
  - de vino de uva
  lexicon: HALOT
  rationale: El hebreo expresa separación con מִן + יַיִן; en español, 'abstenerse de' comunica naturalmente esa separación sin repetir un calco innecesario.
- source_word: וְשֵׁכָר
  english_pob_choice: and strong drink
  chosen_spanish: y de bebida fuerte
  alternatives_spanish:
  - y de licor fuerte
  - y de bebida embriagante
  lexicon: HALOT
  rationale: שֵׁכָר designa una bebida alcohólica/intoxicante distinta del vino. 'Bebida fuerte' conserva la distinción tradicional y mantiene amplitud semántica sin precisar un tipo moderno de licor.
- source_word: יַזִּיר
  english_pob_choice: he shall abstain
  chosen_spanish: se abstendrá
  alternatives_spanish:
  - se separará
  - se apartará
  lexicon: HALOT
  rationale: En este contexto nazareo, la forma hifil comunica una separación ritual expresada de manera natural en español como abstención.
- source_word: חֹמֶץ יַיִן
  english_pob_choice: vinegar from wine
  chosen_spanish: vinagre de vino
  alternatives_spanish:
  - vinagre de uva
  - vinagre de vino tinto
  lexicon: HALOT
  rationale: La construcción genitiva se vierte con 'de' para conservar la relación material sin añadir contenido no presente en el hebreo.
- source_word: וְחֹמֶץ שֵׁכָר
  english_pob_choice: vinegar from strong drink
  chosen_spanish: vinagre de bebida fuerte
  alternatives_spanish:
  - vinagre de licor fuerte
  - vinagre de bebida embriagante
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior y la ambigüedad del término original, que apunta a un derivado agrio de bebida fermentada/intoxicante.
- source_word: וְכָל מִשְׁרַת עֲנָבִים
  english_pob_choice: any juice of grapes
  chosen_spanish: ningún jugo de uvas
  alternatives_spanish:
  - ninguna infusión de uvas
  - ningún líquido de uvas remojadas
  - ningún jugo de uva
  lexicon: HALOT
  rationale: מִשְׁרָה puede referirse a líquido resultante de remojo o infusión. 'Jugo de uvas' es una equivalencia idiomática que comunica bien la prohibición amplia sin sobrecargar el texto.
- source_word: עֲנָבִים
  english_pob_choice: grapes
  chosen_spanish: uvas
  alternatives_spanish:
  - granos de uva
  lexicon: HALOT
  rationale: '''Uvas'' es el equivalente natural en español para עֲנָבִים y funciona bien en la prohibición alimentaria.'
- source_word: לַחִים
  english_pob_choice: fresh
  chosen_spanish: frescas
  alternatives_spanish:
  - húmedas
  - recién recogidas
  lexicon: HALOT
  rationale: El par con 'secas' pide un contraste natural en español; 'frescas' conserva la oposición directa y clara.
- source_word: וִיבֵשִׁים
  english_pob_choice: or dried
  chosen_spanish: o secas
  alternatives_spanish:
  - o desecadas
  - o pasas
  lexicon: HALOT
  rationale: יבשים describe el estado seco; 'secas' preserva la forma del hebreo. 'Pasas' sería más interpretativo y restringiría el sentido.
- source_word: לֹא יֹאכֵל
  english_pob_choice: or eat
  chosen_spanish: ni comerá
  alternatives_spanish:
  - no comerá
  - ni las comerá
  lexicon: HALOT
  rationale: La negación final se integra con la coordinación española para mantener el ritmo de prohibiciones y evitar repetir innecesariamente el sujeto.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo de Nm 6:3 y el rastro auditado en inglés, manteniendo las tres prohibiciones principales y la doble explicación sobre el producto de uvas. Se prefirió 'vinagre de vino/bebida fuerte' por la simetría del constructo hebreo y 'jugo de uvas' como equivalente idiomático del término amplio מִשְׁרָה, con nota alternativa para reflejar la ambigüedad reconocida en la POB inglesa.
  spanish_consistency_notes:
  - Se mantuvo 'bebida fuerte' para שֵׁכָר, conforme al valor lexical distinguible de vino.
  - Se usó 'abstenerse de' para יַזִּיר, que expresa mejor el apartamiento ritual que una traducción literal como 'se separará'.
  - Se conservó la secuencia de prohibiciones con puntuación clara en español y sin añadir glosas interpretativas al cuerpo principal.
  - Se evitó 'pasas' en el texto principal para no cerrar indebidamente el alcance de יבשים; esa alternativa queda en nota.
