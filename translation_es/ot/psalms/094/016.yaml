    reason: lexical_alternative
  - marker: b
    text: 'También: «los obradores de iniquidad», «los que hacen mal» o «los que practican maldad».'
    reason: lexical_alternative
  revision_rationale: La revisión conserva el sentido del borrador pero alinea mejor las notas con el audit trail inglés, elimina una nota innecesaria sobre «por mí» y refuerza levemente la correspondencia idiomática de פֹּעֲלֵי אָוֶן con «los que obran iniquidad».
