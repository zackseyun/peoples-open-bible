translation:
  language: es
  text: Todos los padres que estaban presentes, y los hijos[a] con ellos, han preparado este abundante banquete para las fieras salvajes, en lugar de los judíos, que me han demostrado a mí y a mis antepasados tener una fidelidad completa y firme, sin reproche[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus hijos»; el giro griego subyacente es irregular y puede referirse en general a los hijos o descendientes presentes con los padres.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fe completa y firme» o «lealtad completa y firme». Aquí πίστις probablemente denota fidelidad probada más que fe religiosa en sentido estricto.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὅσοι
  english_pob_choice: All ... who
  chosen_spanish: Todos ... que
  alternatives_spanish:
  - Cuantos ...
  - Todos los que ...
  lexicon: LSJ
  rationale: En español, “Todos los que” expresa de manera natural el conjunto incluido, sin perder el valor distributivo del griego.
- source_word: γονεῖς
  english_pob_choice: parents
  chosen_spanish: padres
  alternatives_spanish:
  - progenitores
  - padres y madres
  lexicon: LSJ
  rationale: Aquí el plural puede abarcar progenitores/padres; “padres” es el equivalente natural y suficientemente amplio en español.
- source_word: παρῆσαν
  english_pob_choice: were present
  chosen_spanish: estaban presentes
  alternatives_spanish:
  - estaban allí
  - se hallaban presentes
  lexicon: LSJ
  rationale: Renderiza la presencia en escena con español idiomático y formal.
- source_word: παίδων γόνοι
  english_pob_choice: the children with them
  chosen_spanish: los niños con ellos
  alternatives_spanish:
  - sus hijos
  - la descendencia de los niños
  lexicon: LSJ
  rationale: El griego es torpe y algo redundante en este testimonio; “los niños con ellos” mantiene la referencia amplia sin forzar una relación más precisa de la que el texto garantiza.
- source_word: τήνδε
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - esta
  lexicon: LSJ
  rationale: Concuerda con “banquete” y conserva la referencia demostrativa inmediata.
- source_word: θηρσὶν ἀγρίοις
  english_pob_choice: for the wild beasts
  chosen_spanish: para las fieras salvajes
  alternatives_spanish:
  - para los animales salvajes
  - para las bestias salvajes
  lexicon: LSJ
  rationale: “Fieras salvajes” mantiene el tono elevado y la dureza de θηρσίν ἀγρίοις.
- source_word: ἐσκεύασαν
  english_pob_choice: have prepared
  chosen_spanish: han preparado
  alternatives_spanish:
  - han dispuesto
  - han preparado y dispuesto
  lexicon: LSJ
  rationale: Expresa una acción completada con relevancia presente, como en el inglés POB.
- source_word: δαψιλῆ θοῖναν
  english_pob_choice: this lavish feast
  chosen_spanish: este banquete abundante
  alternatives_spanish:
  - este festín abundante
  - esta comida abundante
  lexicon: LSJ
  rationale: “Banquete abundante” conserva la idea de abundancia y el registro solemne; evita suavizar la ironía del pasaje.
- source_word: ἀντὶ τῶν ... Ἰουδαίων
  english_pob_choice: instead of the Jews
  chosen_spanish: en lugar de los judíos
  alternatives_spanish:
  - en vez de los judíos
  - a cambio de los judíos
  lexicon: LSJ
  rationale: “ἀντί” expresa sustitución; “en lugar de” es la equivalencia más natural y precisa en español.
- source_word: ἀνεγκλήτων
  english_pob_choice: beyond reproach
  chosen_spanish: sin reproche
  alternatives_spanish:
  - irreprochables
  - sin acusación
  lexicon: LSJ
  rationale: Conserva el matiz forense de inocencia/no imputabilidad; “sin reproche” es claro y sobrio en español.
- source_word: ἀποδεδειγμένων
  english_pob_choice: have been shown
  chosen_spanish: han sido mostrados
  alternatives_spanish:
  - han sido demostrados
  - han sido probados
  lexicon: LSJ
  rationale: Mantiene el valor de perfecto pasivo de “han sido mostrados/demostrados” con referencia a una constatación previa ante el hablante y sus antepasados.
- source_word: ὁλοσχερῆ βεβαίαν πίστιν ἔχων
  english_pob_choice: to possess complete and steadfast faithfulness
  chosen_spanish: como poseedores de una fidelidad completa y firme
  alternatives_spanish:
  - como poseedores de una fe plena y firme
  - como poseedores de una lealtad completa y firme
  lexicon: LSJ; BDAG
  rationale: Aquí πίστις se entiende mejor como fidelidad/lealtad probada, no como “fe” doctrinal. “Fidelidad completa y firme” preserva la tensión semántica sin resolverla hacia un sentido exclusivamente religioso.
theological_decisions:
- issue: Sentido de πίστις en un contexto político-histórico
  english_pob_reading: faithfulness rather than specifically religious faith
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - fe
  - lealtad
  rationale: El contexto habla de una cualidad demostrada ante el rey y sus antepasados. “Fidelidad” conserva el alcance de πίστις mejor que “fe” sin introducir un matiz doctrinal que el pasaje no exige.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión semántica de πίστις en contextos no doctrinales.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que sustituyó la expresión más literal y extraña por “the children with them” para reflejar mejor el griego torpe de πaίδων γόνοι. En español se adoptó una solución natural equivalente, manteniendo abierta la ambigüedad del sintagma y la lectura de πίστις como fidelidad probada.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma general solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se prefirió “judíos” en minúscula por tratarse de un etnónimo en español.
  - Se conservó el registro solemne sin recurrir a arcaísmos innecesarios.
  - Se evitó traducir πίστις como “fe” en el texto principal para no borrar la nota semántica documentada por el POB inglés.
