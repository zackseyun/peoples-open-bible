translation:
  language: es
  text: Entonces el Espíritu de Yahvé[a] irrumpió sobre él, y lo despedazó como se despedaza un cabrito[b], aunque no tenía nada en su mano. Pero no les contó a su padre ni a su madre lo que había hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vino poderosamente sobre él» / «vino con gran poder sobre él».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como se despedaza un cabrito»; es decir, un chivo o cabra joven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּצְלַח עָלָיו / rushed upon him
  english_pob_choice: rushed upon him
  chosen_spanish: vino con poder sobre él
  alternatives_spanish:
  - descendió con poder sobre él
  - irrumpió sobre él
  lexicon: HALOT
  rationale: צלח con עַל expresa una irrupción/embestida poderosa del Espíritu. En español, 'vino con poder sobre él' comunica bien la entrada súbita y enérgica sin sonar forzado; mantiene la fuerza del evento que el inglés POB captura con 'rushed upon him'.
- source_word: רוּחַ יְהוָה / the Spirit of Yahweh
  english_pob_choice: the Spirit of Yahweh
  chosen_spanish: el Espíritu de Yahvé
  alternatives_spanish:
  - el Espíritu de Yahvé
  - el espíritu de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la referencia personal al Espíritu divino. Se usa mayúscula en 'Espíritu' por su referencia a Dios y 'Yahvé' por la convención del proyecto para el nombre divino.
- source_word: וַיְשַׁסְּעֵהוּ / he tore it apart
  english_pob_choice: he tore it apart
  chosen_spanish: lo despedazó
  alternatives_spanish:
  - lo rompió en pedazos
  - lo rasgó
  lexicon: HALOT
  rationale: שׁסע denota desgarro violento. 'Despedazar' conserva mejor la intensidad y el efecto físico del verbo que un término más suave. Se usa 'lo' porque el referente inmediato es el león en el contexto narrativo.
- source_word: כְּשַׁסַּע הַגְּדִי / as one tears apart a young goat
  english_pob_choice: as one tears apart a young goat
  chosen_spanish: como se despedaza un cabrito
  alternatives_spanish:
  - como quien despedaza un cabrito
  - como se rasga un cabrito
  lexicon: HALOT
  rationale: El símil se expresa de manera natural en español con una pasiva impersonal. 'Cabrito' refleja el animal joven con claridad y evita la posible ambigüedad de 'cabra joven'.
- source_word: הַגְּדִי / a young goat
  english_pob_choice: a young goat
  chosen_spanish: un cabrito
  alternatives_spanish:
  - un cabrito
  - un chivito
  lexicon: HALOT
  rationale: '''Cabrito'' es un equivalente natural y preciso para el joven animal del símil. En este contexto resulta más idiomático que una perífrasis larga.'
- source_word: וּמְא֖וּמָה אֵין בְּיָדוֹ / though he had nothing in his hand
  english_pob_choice: though he had nothing in his hand
  chosen_spanish: aunque no tenía nada en su mano
  alternatives_spanish:
  - y no tenía nada en su mano
  - aunque no llevaba nada en la mano
  lexicon: HALOT
  rationale: La cláusula subraya la ausencia total de arma o instrumento. 'No tenía nada en su mano' conserva la imagen concreta del hebreo y la concesión expresada por el inglés POB.
- source_word: וְלֹא הִגִּיד / But he did not tell
  english_pob_choice: But he did not tell
  chosen_spanish: Pero no les contó
  alternatives_spanish:
  - Y no les contó
  - Pero no se lo contó
  lexicon: HALOT
  rationale: El hebreo continúa con una negación que contrasta con la hazaña. 'Pero' refleja ese giro discursivo. 'Les contó' suena más natural que una construcción literal y mantiene la referencia a ambos padres.
- source_word: לְאָבִיו וּלְאִמּוֹ / his father or his mother
  english_pob_choice: his father or his mother
  chosen_spanish: a su padre ni a su madre
  alternatives_spanish:
  - a su padre y a su madre
  - a su padre o a su madre
  lexicon: HALOT
  rationale: Tras la negación, el español expresa mejor el distributivo con 'ni... ni...'. Esto conserva el sentido de que no se lo dijo a ninguno de los dos, sin sugerir exclusión parcial.
- source_word: אֵת אֲשֶׁר עָשָׂה / what he had done
  english_pob_choice: what he had done
  chosen_spanish: lo que había hecho
  alternatives_spanish:
  - lo que hizo
  - lo que había realizado
  lexicon: HALOT
  rationale: 'El pluscuamperfecto español reproduce bien la secuencia narrativa: la acción ya había ocurrido antes de que él hablara con sus padres.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre del pacto en español. No se sustituye por un título en mayúsculas porque el texto fuente usa explícitamente יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa más reciente indicó que no había cambios necesarios y el cotejo final mostró alto acuerdo; por eso la redacción española sigue de cerca las decisiones auditadas del POB en vez de introducir alternativas no justificadas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se prefirió 'Espíritu' con mayúscula por referencia al Espíritu divino.
  - Se usó 'despedazó' para preservar la violencia del verbo hebreo שׁסע.
  - La negación distributiva se expresó con 'ni... ni...' para evitar ambigüedad en español.
  - La puntuación y el orden buscan fluidez bíblica en español sin apartarse del valor semántico del hebreo.
