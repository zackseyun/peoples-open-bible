    text: 'Nombres griegos: ''Rátimo'' y ''Samelio''; el paralelo hebreo identifica a estas figuras con Rehum y Shimshai.'
    reason: alternative_reading
  - marker: b
    text: 'O: ''con caballería y una formación de batalla''. El griego es condensado y puede describir un destacamento armado o una fuerza dispuesta militarmente.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la cláusula inicial para preservar mejor la pasiva del griego y del audit trail ('lo que había sido escrito por el rey Artajerjes'). También se reubicó la nota [b] al sintagma militar que realmente explica, sin cambiar el sentido principal del versículo.
