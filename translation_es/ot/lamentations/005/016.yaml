review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene la imagen de la corona caída, la exclamación de lamento y la confesión corporativa de pecado. También conserva adecuadamente la alternativa del constructo hebreo en nota. Sin embargo, la nota b introduce una opción española poco natural (''¡Alas para nosotros!'') que no preserva bien la legibilidad ni el matiz idiomático del lamento en español.'
  spanish_quality_summary: 'El texto principal es claro, digno y natural: ''La corona ha caído de nuestra cabeza. ¡Ay de nosotros, porque hemos pecado!''. La única reparación necesaria es en la nota b, para reemplazar una alternativa antinatural por una opción española idiomática como ''¡Ay de nosotros!'' o ''¡Ay por nosotros!''.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos del glosario sensible. 'Hemos pecado' preserva bien la carga teológica de חטאנו.
  issues:
  - severity: medium
    issue: La nota b usa '¡Alas para nosotros!' como alternativa.
    rationale: Aunque intenta reflejar el inglés 'Alas for us', en español neutral eclesial 'alas' no es una interjección natural y 'para nosotros' suena forzado. La nota debe ofrecer una alternativa idiomática española, no un calco del inglés.
  revised_spanish_text: La corona ha caído de nuestra cabeza[a]. ¡Ay de nosotros[b], porque hemos pecado!
  revised_footnotes:
  - marker: a
    text: 'O: «La corona de nuestra cabeza cayó». El hebreo usa una expresión poética en constructo, literalmente «la corona de nuestra cabeza».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¡Ay por nosotros!». La expresión es un grito de lamento.'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel al hebreo y suena natural en español. Solo se corrige la nota b para evitar un calco no idiomático del inglés y ofrecer una alternativa de lamento comprensible y digna en español.
