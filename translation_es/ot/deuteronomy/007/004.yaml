review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura causal del hebreo, mantiene «tu hijo», conserva el plural de «servirán» y usa «Yahvé» conforme al proyecto. Sin embargo, no preserva adecuadamente la tensión de número en la cláusula final: el hebreo tiene sufijo singular en «y te destruirá», mientras que la ampliación al plural ya está documentada como alternativa en la nota inglesa para la cláusula anterior, no para esta última. Además, falta trasladar la nota inglesa sobre el cambio de singular a plural en «servirán».'
  spanish_quality_summary: El español es claro y natural, pero «él apartará a tu hijo» suena innecesariamente marcado; «apartará a tu hijo de seguirme» funciona, aunque «lo apartará de seguirme» o mantener el sujeto implícito sería más fluido. La frase principal es plenamente legible. La corrección clave es ajustar «los destruirá» a «te destruirá» para seguir el texto fuente, y añadir la nota explicativa sobre el cambio de número en «servirán».
  glossary_alignment: 'Alineado en general con la terminología del proyecto: «Yahvé» para יהוה, «otros dioses» para אֱלֹהִים אֲחֵרִים, y metáfora de ira encendida adecuadamente preservada. No hay conflicto de glosario mayor; la principal cuestión es fidelidad gramatical al singular de וְהִשְׁמִידְךָ.'
  issues:
  - severity: high
    issue: 'La cláusula final cambia indebidamente el objeto singular a plural: «los destruirá pronto».'
    rationale: 'וְהִשְׁמִידְךָ lleva sufijo 2ms singular: «te destruirá». El inglés POB también tiene singular («destroy you»). La ampliación plural documentada pertenece a וְעָבְדוּ («servirán»), no a esta cláusula final.'
  - severity: medium
    issue: Falta la nota sobre el cambio de singular («tu hijo») a plural («servirán»).
    rationale: La auditoría inglesa preserva esta tensión con una nota. Dado que el español también mantiene «tu hijo» y «servirán», debe conservarse la explicación para documentar la posible ampliación a descendencia o comunidad.
  - severity: low
    issue: La nota sobre «Yahvé» es incompleta frente al rastro de auditoría inglés.
    rationale: La nota inglesa menciona que «the LORD» representa YHWH y ofrece «Yahweh» como alternativa. En español, como el proyecto exige «Yahvé» en texto principal, la nota no es estrictamente necesaria; si se conserva, conviene formularla como explicación terminológica más completa.
  revised_spanish_text: Porque él apartará a tu hijo de seguirme[a], y servirán[b] a otros dioses; entonces la ira de Yahvé[c] se encenderá contra ustedes, y te destruirá pronto.
  revised_footnotes:
