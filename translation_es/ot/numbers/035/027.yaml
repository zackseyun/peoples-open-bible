translation:
  language: es
  text: y el vengador de la sangre lo encuentra fuera del límite de su ciudad de refugio[a], y el vengador de la sangre mata al homicida, no tendrá culpa de sangre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el vengador de sangre».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no tiene sangre», es decir, no incurre en culpa de sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּאֵל הַדָּם
  english_pob_choice: the avenger of blood
  chosen_spanish: el vengador de la sangre
  alternatives_spanish:
  - el redentor de la sangre
  - el pariente vengador
  lexicon: HALOT
  rationale: En este contexto legal, la expresión designa a la persona autorizada para reclamar la sangre derramada. «Vengador de la sangre» conserva la fuerza jurídica y resulta transparente en español. «Redentor» sería equívoco aquí, y «pariente vengador» añade un matiz de parentesco que no está explicitado en el versículo.
- source_word: מִחוּץ לִגְב֖וּל
  english_pob_choice: outside the boundary
  chosen_spanish: fuera del límite
  alternatives_spanish:
  - fuera del borde
  - más allá de los límites
  lexicon: HALOT
  rationale: La frase es espacial y jurídica. «Límite» preserva la idea concreta de la línea que delimita la protección de la ciudad de refugio, sin cargarla con el matiz más geopolítico de «frontera».
- source_word: עִיר מִקְלָטוֹ
  english_pob_choice: his city of refuge
  chosen_spanish: su ciudad de refugio
  alternatives_spanish:
  - la ciudad de su refugio
  - su ciudad-asilo
  lexicon: HALOT
  rationale: «Ciudad de refugio» es el equivalente institucional estándar y claro en español. Mantiene el carácter legal de מקלט y evita una paráfrasis como «asilo» que podría sonar más moderna que el texto bíblico.
- source_word: וְרָצַח
  english_pob_choice: kills
  chosen_spanish: mata
  alternatives_spanish:
  - da muerte a
  - asesina
  lexicon: HALOT
  rationale: Aquí el contexto aclara que el acto no incurre en culpa de sangre; por eso el español debe ser neutral y no cargar el verbo con una valoración criminal que el cierre del versículo niega. «Mata» reproduce bien ese valor neutral.
- source_word: הָרֹצֵחַ
  english_pob_choice: the manslayer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el matador
  - el que mató
  lexicon: HALOT
  rationale: En las leyes de refugio, el término se refiere al que ha dado muerte a una persona y busca amparo; «homicida» es un equivalente jurídico natural en español y no obliga a leer el caso como asesinato intencional.
- source_word: אֵין לוֹ דָּם
  english_pob_choice: he is not guilty of blood
  chosen_spanish: no tendrá culpa de sangre
  alternatives_spanish:
  - no hay sangre sobre él
  - no se le imputará sangre
  lexicon: HALOT
  rationale: El hebreo es idiomático y expresa ausencia de sangreculpa. «No tendrá culpa de sangre» conserva la imagen legal en español sin forzar una explicación demasiado interpretativa. Difiere levemente del inglés para mantener la metáfora comprensible.
theological_decisions:
- issue: Cómo traducir רצח en un caso de muerte permitida por la ley
  english_pob_reading: Render the verb neutrally as 'kills' rather than 'murders.'
  chosen_spanish_reading: Traducir con un verbo neutral («mata») y no con uno que implique homicidio criminal.
  alternative_spanish_readings:
  - asesina
  - lo mata
  rationale: El contexto legal del versículo excluye la culpa de sangre; por tanto, el verbo español no debe sugerir un acto ilícito en sí mismo. La lectura neutral preserva la tensión jurídica del texto y evita contradecir la cláusula final.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la revisión más reciente; no se registraron modificaciones respecto del texto base, y el español sigue esa misma lectura estable.
  spanish_consistency_notes:
  - Se preserva el término legal «ciudad de refugio» para mantener continuidad con otros pasajes de Números.
  - «Vengador de la sangre» se usa de forma consistente como equivalente principal de גֹּאֵל הַדָּם.
  - La cláusula final se vierte con un equivalente idiomático de culpa de sangre, evitando una literalidad opaca como «no hay sangre para él».
