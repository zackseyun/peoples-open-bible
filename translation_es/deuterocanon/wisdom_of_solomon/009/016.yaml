    rationale: Aunque «trazado» refleja parte de la metáfora, en español bíblico actual la construcción con «las cosas en los cielos» resulta tiesa. «¿quién ha rastreado lo que está en los cielos?» mantiene la idea de búsqueda exhaustiva y suena más idiomático.
