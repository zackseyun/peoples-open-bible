translation:
  language: es
  text: Y a todos los que vigilaban la ciudad, ordenó por escrito darles porciones asignadas[a] y pagos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'suertes' o 'partes' para 'porciones asignadas' (κλήρους). El griego puede referirse a porciones concedidas a ellos, posiblemente por sorteo.
    reason: lexical_alternative
  - marker: b
    text: O 'paga' o 'raciones' para 'pagos' (ὀψώνια). El término puede denotar provisiones o compensación por el servicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: φρουροῦσι
  english_pob_choice: guarded
  chosen_spanish: guardaban
  alternatives_spanish:
  - custodiaban
  - hacían guardia
  lexicon: LSJ
  rationale: El participio presente indica acción continua; en español, 'guardaban' conserva la idea de vigilancia activa de manera natural y fiel al contexto cívico.
- source_word: πόλιν
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - población
  - villa
  lexicon: LSJ
  rationale: πόλις significa normalmente 'ciudad', y el contexto de una guardia urbana confirma esa lectura.
- source_word: ἔγραψε
  english_pob_choice: he wrote to
  chosen_spanish: escribió para
  alternatives_spanish:
  - escribió a fin de
  - redactó una orden para
  lexicon: LSJ
  rationale: El verbo expresa una instrucción escrita; 'escribió para' conserva la función directiva sin sobrecargar el texto con una paráfrasis administrativa.
- source_word: δοῦναι
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - que se les diera
  - entregar
  lexicon: LSJ
  rationale: El infinitivo depende de ἔγραψε; en español, 'para darles' refleja de manera directa la finalidad de la instrucción escrita.
- source_word: κλήρους
  english_pob_choice: allotments
  chosen_spanish: asignaciones
  alternatives_spanish:
  - lotes
  - porciones
  - partes
  lexicon: LSJ
  rationale: κλῆρος puede referirse a una porción o parte asignada. 'Asignaciones' mantiene la idea de porciones otorgadas sin restringir indebidamente el sentido a 'lotes' en el reparto por sorteo.
- source_word: ὀψώνια
  english_pob_choice: wages
  chosen_spanish: salario
  alternatives_spanish:
  - pago
  - raciones
  lexicon: LSJ
  rationale: ὀψώνια puede denotar remuneración o provisiones por servicio. Dado que se trata de guardias, 'salario' comunica adecuadamente la compensación por su servicio y sigue siendo compatible con el rango semántico del término.
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste más reciente del texto inglés, que preserva la estructura de ἔγραψε δοῦναι como una orden escrita de dar algo a los guardias de la ciudad. Se evita introducir notas porque no son necesarias para resolver ambigüedades en esta frase española.
  spanish_consistency_notes:
  - Se mantiene 'ciudad' para πόλις en coherencia con el uso estándar del término.
  - '''Asignaciones'' y ''salario'' respetan el campo semántico administrativo y militar del griego sin forzar tecnicismos.'
  - La construcción 'escribió para darles' evita una pasiva pesada y conserva el carácter de mandato escrito.
