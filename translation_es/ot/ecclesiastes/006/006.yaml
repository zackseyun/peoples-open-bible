translation:
  language: es
  text: Aunque viviera mil años dos veces[a] y no viera el bien[b], ¿no van todos a un mismo lugar?[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dos mil años»; literalmente, «mil años dos veces».
    reason: lexical_alternative
  - marker: b
    text: «Ver el bien» es un modismo hebreo que significa experimentar o disfrutar lo bueno.
    reason: lexical_alternative
  - marker: c
    text: Es decir, el mismo destino en la muerte según el contexto; el hebreo dice solo «un lugar».
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִלּוּ
  english_pob_choice: Even if
  chosen_spanish: Aunque
  alternatives_spanish:
  - Aun si
  - Incluso si
  lexicon: HALOT
  rationale: La partícula introduce una concesión hipotética; «Aunque» transmite de forma natural esa fuerza en español y mantiene el valor concesivo sin volver la frase pesada.
- source_word: חָיָה
  english_pob_choice: he should live
  chosen_spanish: viviera
  alternatives_spanish:
  - viviese
  - llegara a vivir
  lexicon: HALOT
  rationale: En este contexto concesivo, el imperfecto de subjuntivo expresa bien la hipótesis irreal o imaginaria del hebreo.
- source_word: אֶלֶף שָׁנִים פַּעֲמַיִם
  english_pob_choice: a thousand years twice over
  chosen_spanish: dos mil años
  alternatives_spanish:
  - mil años dos veces
  - mil años por dos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mil años dos veces». En español, «dos mil años» comunica con claridad el sentido cuantitativo que la POB inglesa dejó como alternativa interpretativa. No se añade una nota porque esta equivalencia es transparente y natural en español.
- source_word: וְטוֹבָה
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el disfrute del bien
  - el bienestar
  lexicon: HALOT
  rationale: «Ver el bien» conserva el idiomático hebreo y su amplitud semántica. «El bien» evita restringir el sentido a prosperidad, felicidad o bienestar en exceso.
- source_word: לֹא רָאָה
  english_pob_choice: not see
  chosen_spanish: no viera
  alternatives_spanish:
  - no experimentara
  - no disfrutara
  lexicon: HALOT
  rationale: Se conserva el verbo de percepción «ver», que en hebreo funciona como idiomático para experimentar o disfrutar. El subjuntivo concuerda con la concesión inicial.
- source_word: הֲלֹא
  english_pob_choice: do not
  chosen_spanish: ¿no
  alternatives_spanish:
  - ¿acaso no
  - ¿no es verdad que
  lexicon: HALOT
  rationale: La pregunta retórica se expresa de manera natural en español con «¿no...?»; mantiene la expectativa de asentimiento.
- source_word: אֶל מָקוֹם אֶחָד
  english_pob_choice: to one place
  chosen_spanish: a un solo lugar
  alternatives_spanish:
  - al mismo lugar
  - a un lugar
  lexicon: HALOT
  rationale: «Un solo lugar» reproduce el carácter sobrio e indefinido del hebreo, sin explicitar en el texto principal si se trata de la muerte, el sepulcro o Sheol.
- source_word: הַכֹּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los hombres
  - todos ellos
  lexicon: HALOT
  rationale: En el contexto de Qohelet el referente son las personas mencionadas implícitamente; «todos» suena natural y mantiene la universalidad del argumento.
- source_word: הוֹלֵךְ
  english_pob_choice: go
  chosen_spanish: van
  alternatives_spanish:
  - van caminando
  - se dirigen
  lexicon: HALOT
  rationale: El participio hebreo expresa una realidad general; el presente plural español comunica con naturalidad la afirmación proverbial.
theological_decisions:
- issue: Destino implícito de «un solo lugar»
  english_pob_reading: Retain the understated expression 'one place' without explicating it as Sheol, the grave, or death in the main text.
  chosen_spanish_reading: Mantener «un solo lugar» sin identificarlo explícitamente como el sepulcro, la muerte o el Seol en el texto principal.
  alternative_spanish_readings:
  - al sepulcro
  - a la muerte
  - al Seol
  rationale: El hebreo deja el destino implícito; la POB inglesa preserva esa sobriedad. En español conviene no resolver la ambigüedad en el cuerpo del verso para no ir más allá del testimonio del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión inglesa más reciente, sin cambios adicionales en el sentido de la línea o en la resolución de ambigüedades. Se conservó la estructura concesiva, el modismo «ver el bien» y la expresión indefinida «un solo lugar».
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton cuando corresponda; este versículo no lo contiene.
  - Se evitó «Cristo» porque no aparece lenguaje mesiánico en este pasaje.
  - Se mantuvo el verbo de percepción «ver» para respetar el modismo hebreo.
  - La cuantificación se naturalizó como «dos mil años» en el cuerpo, con nota que preserva la forma literal.
  - No se explicitó en el texto principal la identidad del destino final, en línea con la POB inglesa.
