    text: O «señora para siempre». El hebreo גְבָרֶת designa a una mujer en posición de dominio o rango; «dueña» se usa para conservar ese matiz sin convertirlo en «reina».
    reason: lexical_alternative
  - marker: b
    text: Lit. «no pusiste estas cosas sobre tu corazón». Es decir, no las tomaste en serio ni las consideraste con atención.
    reason: lexical_alternative
  - marker: c
    text: O «su fin». El hebreo tiene un sufijo femenino singular, probablemente porque Babilonia es personificada como mujer.
    reason: alternative_reading
  revision_rationale: Se corrige el valor de עַד לֹא a una relación resultativa («de modo que»), conforme a la auditoría POB y al contexto. Se reemplaza la construcción poco natural «hasta que no pusiste... en tu corazón» por «no tomaste... a pecho», que expresa con claridad el modismo hebreo. Se adopta «dueña» para reflejar mejor el matiz de dominio de גְבָרֶת. También se ajustan las notas para que correspondan exactamente al texto revisado y ofrezcan alternativas reales.
