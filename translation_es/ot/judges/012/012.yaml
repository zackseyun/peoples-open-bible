translation:
  language: es
  text: Entonces murió Elon el zabulonita, y fue sepultado en Ajalón, en la tierra de Zabulón.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el territorio de Zabulón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: Then ... died
  chosen_spanish: Entonces murió
  alternatives_spanish:
  - Y murió
  - Así murió
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción sucesiva; «Entonces» conserva la progresión narrativa natural del inglés POB sin perder la simple afirmación de muerte.
- source_word: אֵלוֹן
  english_pob_choice: Elon
  chosen_spanish: Elon
  alternatives_spanish:
  - Elón
  lexicon: Transliteración propia del nombre
  rationale: Se mantiene el nombre propio en transliteración. En español, «Elon» es legible y respeta la forma del texto fuente sin añadir interpretación.
- source_word: הַזְּבוּלֹנִי
  english_pob_choice: the Zebulunite
  chosen_spanish: el zabulonita
  alternatives_spanish:
  - el hombre de Zabulón
  - el de Zabulón
  lexicon: HALOT
  rationale: El gentilicio con artículo identifica a Elon por su afiliación tribal o regional. «Zabulonita» reproduce la fuerza gentilicia en español de manera concisa y natural.
- source_word: וַיִּקָּבֵר
  english_pob_choice: and he was buried
  chosen_spanish: y fue sepultado
  alternatives_spanish:
  - y fue enterrado
  - y sepultaron a él
  lexicon: HALOT
  rationale: El nifal de קבר expresa pasividad/reflexividad; «fue sepultado» conserva el sentido pasivo con registro bíblico sobrio y claro.
- source_word: בְּאַיָּלוֹן
  english_pob_choice: in Aijalon
  chosen_spanish: en Ajalón
  alternatives_spanish:
  - en Aijalón
  - en Ayalón
  lexicon: Transliteración de topónimo
  rationale: Se translitera el nombre del lugar. «Ajalón» es una forma castellana reconocible y fluida para el topónimo.
- source_word: בְּאֶרֶץ זְבוּלֻן
  english_pob_choice: in the land of Zebulun
  chosen_spanish: en la tierra de Zabulón
  alternatives_spanish:
  - en el territorio de Zabulón
  - en la tierra de Zabulón[a]
  lexicon: HALOT
  rationale: אֶרֶץ aquí indica tierra/territorio. «Tierra de Zabulón» sigue de cerca el valor geográfico del hebreo y mantiene el estilo del POB. En español, «tierra» es claro y no requiere la variante explicativa «territorio» en el texto principal.
translation_notes:
  revision_awareness: 'El texto hebreo y el audio de revisión coinciden plenamente con la lectura inglesa del POB: narración simple de muerte y sepultura, con el topónimo y el gentilicio conservados por transliteración/ equivalencia léxica. No se documentan cambios de revisión ni tensiones textuales relevantes en este versículo.'
  spanish_consistency_notes:
  - Se mantiene el tono narrativo sobrio y factual.
  - Se preserva la distinción entre gentilicio («zabulonita») y el topónimo «Zabulón».
  - La nota al pie conserva la alternativa léxica de הארץ/אֶרֶץ como «territorio» sin desplazar la opción principal «tierra».
