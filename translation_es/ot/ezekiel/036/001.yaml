translation:
  language: es
  text: 'Y tú, hijo de hombre[c], profetiza a los montes[a] de Israel, y di: «Montes de Israel, oigan la palabra de Yahvé[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘región montañosa de Israel’. El hebreo dice literalmente ‘montes de Israel’, y el texto principal conserva la imagen geográfica personificada.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa el nombre divino YHWH; en otras traducciones a menudo se representa como ‘el SEÑOR’. Aquí se traduce como ‘Yahvé’.
    reason: alternative_reading
  - marker: c
    text: O ‘mortal’ para ‘hijo de hombre’; el texto principal conserva la fórmula recurrente de Ezequiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - mortal
  - ser humano
  lexicon: HALOT
  rationale: Se conserva la fórmula idiomática recurrente de Ezequiel para mantener continuidad literaria y evitar una paráfrasis interpretativa. En español, 'hijo de hombre' comunica el paralelismo formal con el uso profético del original, aunque suene menos natural que 'mortal'.
- source_word: הִנָּבֵא
  english_pob_choice: prophesy
  chosen_spanish: profetiza
  alternatives_spanish:
  - habla proféticamente
  - anuncia proféticamente
  lexicon: HALOT
  rationale: El imperativo profético se expresa de modo directo y natural con 'profetiza', que conserva la fuerza de comisión del hebreo sin expandir el sentido.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - contra
  - acerca de
  lexicon: HALOT
  rationale: Aquí la preposición marca dirección de habla hacia el destinatario. En español, 'a' refleja mejor el valor de адресación que 'contra' o 'acerca de'.
- source_word: הָרֵי יִשְׂרָאֵל
  english_pob_choice: the mountains of Israel
  chosen_spanish: los montes de Israel
  alternatives_spanish:
  - la región montañosa de Israel
  - las montañas de Israel
  lexicon: HALOT
  rationale: Se mantiene la imaginería personificada y la literalidad básica del hebreo. 'Montes' es una forma sobria y bíblica en español, cercana a 'mountains' sin forzar una reinterpretación geográfica.
- source_word: וְאָמַרְתָּ
  english_pob_choice: and say
  chosen_spanish: y di
  alternatives_spanish:
  - y dirás
  - y habla
  lexicon: HALOT
  rationale: Después de la comisión, el hebreo continúa con la instrucción de decir. 'Y di' es conciso, idiomático y fiel al encadenamiento verbal del original.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oígan
  lexicon: HALOT
  rationale: El plural imperativo se dirige a los montes personificados. 'Oigan' preserva el llamado solemne y funciona mejor que 'escuchen' en una vocación dirigida a entidades personificadas.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra de Yahweh
  lexicon: HALOT
  rationale: Se conserva la fórmula profética estándar con 'palabra'. El nombre divino se traduce conforme al criterio del proyecto como 'Yahvé', no como un título sustituto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se reproduce el Tetragrámaton con la forma establecida por el proyecto en español, preservando el nombre propio divino en lugar de sustituirlo por un título.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la política del proyecto, se mantiene el nombre propio divino en español para no ocultar la referencia personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Función de בֶן אָדָם en Ezequiel
  english_pob_reading: son of man
  chosen_spanish_reading: hijo de hombre
  alternative_spanish_readings:
  - mortal
  - ser humano
  rationale: No se trata aquí de un título cristológico, sino de una fórmula profética recurrente. La traducción literal preserva la estructura fija y su valor literario en todo Ezequiel.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §5; Contested terms: אָדָם adam → man / humankind (context)'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; la última pasada indicó que no hacían falta cambios y el control cruzado mostró alto acuerdo.
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto: Yahvé para יְהוָה, hijo de hombre para בֶן אָדָם, y palabra para דְּבַר.'
  - Se conserva el vocativo plural personificado con ‘montes de Israel’ para respetar la imagen retórica del hebreo.
  - La puntuación respeta el cierre con cita directa introducida por dos puntos y comillas tipográficas en español.
