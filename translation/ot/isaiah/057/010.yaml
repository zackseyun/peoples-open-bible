id: ISA.57.10
reference: Isaiah 57:10
source:
  edition: WLC
  text: בְּ/רֹ֤ב דַּרְכֵּ/ךְ֙ יָגַ֔עַתְּ לֹ֥א אָמַ֖רְתְּ נוֹאָ֑שׁ חַיַּ֤ת יָדֵ/ךְ֙ מָצָ֔את עַל כֵּ֖ן לֹ֥א חָלִֽית־׃
translation:
  text: In the multitude of your ways you grew weary[a], yet you did not say, ‘It is hopeless.’ You found renewed strength in your hand[c][b]; therefore you did not grow weak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'There is no hope.' The Hebrew expression conveys despair or the conclusion that further effort is futile.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'the life/vitality of your hand.' The phrase likely means renewed strength or fresh power to continue.
    reason: lexical_alternative
  - marker: c
    text: Or, 'you did not faint' or 'you did not become weak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֹב
  chosen: In the greatness of
  alternatives:
  - In the abundance of
  - Through the multitude of
  lexicon: HALOT
  rationale: רֹב denotes abundance, greatness, or multitude. With the following 'your way,' the phrase idiomatically points to the extensive or excessive course pursued. 'In the greatness of' preserves the Hebrew image without over-paraphrasing.
- source_word: דַּרְכֵּךְ
  lemma: דֶּרֶךְ
  chosen: your way
  alternatives:
  - your journey
  - your course
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way,' but can denote conduct or course of action. 'Your way' keeps the metaphor broad and faithful, allowing both literal and figurative force in context.
- source_word: יָגַעַתְּ
  chosen: you grew weary
  alternatives:
  - you labored
  - you became exhausted
  lexicon: HALOT
  rationale: יגע commonly conveys weariness from toil. 'You grew weary' fits the perfect form and the context of persistent but exhausting pursuit.
- source_word: נוֹאָשׁ
  chosen: It is hopeless
  alternatives:
  - There is no hope
  - I despair
  lexicon: HALOT
  rationale: From יאשׁ, the term expresses despair or hopelessness. Since it follows 'you did not say,' an English clause is needed. 'It is hopeless' is natural modern English and preserves the sense of refusing to give up.
- source_word: חַיַּת יָדֵךְ
  chosen: renewed strength in your hand
  alternatives:
  - the life of your hand
  - vitality of your power
  - fresh strength
  lexicon: HALOT
  rationale: This compressed expression is difficult. חַיָּה/חַיַּת here likely denotes vitality, reviving force, or life-strength, and 'hand' often signifies power or capacity. 'Renewed strength in your hand' captures the idiom's sense that she found fresh capacity to continue, without flattening the metaphor entirely.
- source_word: מָצָאת
  chosen: you found
  alternatives:
  - you discovered
  - you obtained
  lexicon: HALOT
  rationale: מצא is straightforwardly 'find.' In context it introduces the reason for continued persistence.
- source_word: עַל־כֵּן
  chosen: therefore
  alternatives:
  - so
  - for that reason
  lexicon: HALOT
  rationale: The phrase marks consequence. 'Therefore' clearly signals the causal inference in readable English.
- source_word: לֹא חָלִית
  chosen: you did not grow weak
  alternatives:
  - you did not become sick
  - you did not faint
  - you were not worn out
  lexicon: HALOT
  rationale: 'חלה can mean become weak, sick, or faint. Here the sense is not physical illness but failing or collapsing in resolve. ''You did not grow weak'' best fits the parallelism: despite weariness, she did not give up because she found renewed strength.'
