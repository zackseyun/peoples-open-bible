translation:
  language: es
  text: sin tener en cuenta en absoluto el poder de Dios[a], sino engreído por las miríadas[b] de infantes y los miles de jinetes y los ochenta elefantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fuerza de Dios».
    reason: lexical_alternative
  - marker: b
    text: El griego μυριάσιν puede entenderse literalmente como «miríadas» o, más generalmente, como una cantidad muy grande; aquí se conserva el término de valor amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδάμως
  english_pob_choice: not at all
  chosen_spanish: sin en modo alguno
  alternatives_spanish:
  - de ningún modo
  - en absoluto
  lexicon: LSJ
  rationale: La negación griega es enfática; «sin en modo alguno» conserva ese refuerzo en un español natural y solemne.
- source_word: ἐπιλογιζόμενος
  english_pob_choice: taking into account
  chosen_spanish: tener en cuenta
  alternatives_spanish:
  - considerar
  - tomar en cuenta
  lexicon: LSJ
  rationale: La idea es de calcular o considerar reflexivamente. «Tener en cuenta» reproduce bien la actitud de evaluación militar insinuada por el contexto.
- source_word: τὸ τοῦ θεοῦ κράτος
  english_pob_choice: the might of God
  chosen_spanish: el poder de Yahvé
  alternatives_spanish:
  - la potencia de Yahvé
  - la fuerza de Yahvé
  lexicon: LSJ
  rationale: El POB inglés eligió «might» para κράτος por su fuerza efectiva en contraste con recursos militares. En español, «poder» comunica mejor esa noción. Se usa «Yahvé» por la norma del proyecto para יהוה, manteniendo el contraste teológico explícito.
- source_word: πεφρονηματισμένος
  english_pob_choice: puffed up
  chosen_spanish: engreído
  alternatives_spanish:
  - lleno de orgullo
  - ensoberbecido
  lexicon: LSJ
  rationale: El participio perfecto describe un estado de autosuficiencia orgullosa. «Engreído» es idiomático y transmite la hinchazón de orgullo sin perder el tono de reproche.
- source_word: μυριάσιν τῶν πεζῶν
  english_pob_choice: the tens of thousands of foot soldiers
  chosen_spanish: las miríadas de infantes
  alternatives_spanish:
  - los decenas de millares de infantes
  - las decenas de miles de infantes
  lexicon: LSJ
  rationale: «Miríadas» preserva el valor léxico de μυριάς y su posible amplitud sin fijar indebidamente la exactitud numérica. «Infantes» es una forma militar breve y natural para πεζοί.
- source_word: χιλιάσι τῶν ἱππέων
  english_pob_choice: the thousands of horsemen
  chosen_spanish: las millares de jinetes
  alternatives_spanish:
  - los miles de jinetes
  - las tropas de caballería
  lexicon: LSJ
  rationale: «Millares» mantiene el plural de cantidad del griego y su paralelismo con «miríadas». «Jinetes» es una traducción concreta y comprensible de ἱππεῖς.
- source_word: ἐλέφασιν τοῖς ὀγδοήκοντα
  english_pob_choice: the eighty elephants
  chosen_spanish: los ochenta elefantes
  alternatives_spanish:
  - ochenta elefantes
  lexicon: LSJ
  rationale: Se conserva la enumeración simple del griego y del POB inglés. El artículo plural ayuda a reproducir el ritmo de la lista militar.
theological_decisions:
- issue: Cómo traducir τὸ τοῦ θεοῦ κράτος en contraste con el orgullo militar
  english_pob_reading: the might of God
  chosen_spanish_reading: el poder de Yahvé
  alternative_spanish_readings:
  - la fuerza de Yahvé
  - el poder de Dios
  rationale: El POB inglés entiende κράτος como fuerza efectiva, no como dominio abstracto. En español, «poder» es la equivalencia más clara. «Yahvé» sigue la terminología del proyecto para el nombre divino y hace explícita la oposición entre el poder divino y los recursos humanos.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audio/edición inglesa auditada: negación enfática + falta de consideración del poder de Dios + orgullo ante fuerzas militares enumeradas. No se documentan revisiones sustantivas pendientes; se mantiene la lectura estable del pasaje.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» conforme al criterio del proyecto para יהוה, sin sustituirlo por una convención de ocultamiento.
  - Se evita «Cristo» y otros términos no pertinentes; la terminología militar se mantiene concreta y directa.
  - «Miríadas» se conserva para no aplastar la posible amplitud semántica de μυριάς; la nota aclara la alternativa numérica general.
  - «Infantes» y «jinetes» ofrecen un registro militar claro en español sin añadir matices no presentes en el griego.
