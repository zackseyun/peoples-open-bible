    issue: «concertaron un tiempo cuando» es poco natural en español
    rationale: Aunque reproduce la estructura inglesa, «cuando» después de «un tiempo» suena forzado. El griego καιρόν ὅτε se expresa mejor en español como «un momento en que».
  - severity: low
    issue: «volviéndose atrás» suena algo rígido
    rationale: Es comprensible y cercano al griego, pero en español bíblico moderno «después de volver» o «al volver» resulta más natural sin perder el valor del participio.
