translation:
  language: es
  text: 'Todos los habitantes del mundo[a], y ustedes que habitan en la tierra: cuando se levante un estandarte en los montes, lo verán; y cuando se toque una trompeta[b], la oirán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señal» o «insignia» para «estandarte» (hebreo נֵס), un signo elevado visible desde lejos.
    reason: lexical_alternative
  - marker: b
    text: O «cuerno» o «cuerno de carnero» para «trompeta» (hebreo שׁוֹפָר).
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Cada uno de
  lexicon: HALOT
  rationale: El hebreo introduce un llamado universal; en español, «Todos» mantiene el alcance colectivo de manera natural y solemne.
- source_word: יֹשְׁבֵי תֵבֵל
  english_pob_choice: inhabitants of the world
  chosen_spanish: los habitantes del mundo
  alternatives_spanish:
  - los que habitan el mundo
  - los moradores del mundo
  lexicon: HALOT
  rationale: «תֵבֵל» apunta al mundo habitado en sentido amplio; «mundo» conserva mejor ese alcance universal que una referencia regional o restringida.
- source_word: וְשֹׁכְנֵי אָרֶץ
  english_pob_choice: and you dwellers on the earth
  chosen_spanish: y todos los que habitan en la tierra
  alternatives_spanish:
  - y los habitantes de la tierra
  - y los moradores de la tierra
  lexicon: HALOT
  rationale: La segunda expresión refuerza por paralelismo la primera. Se preserva la variación poética con «habitan en la tierra», evitando una repetición idéntica en español.
- source_word: כִּנְשֹׂא נֵס
  english_pob_choice: when a banner is raised
  chosen_spanish: cuando se levante un estandarte
  alternatives_spanish:
  - cuando se alce una señal
  - cuando se erija un estandarte
  lexicon: HALOT
  rationale: El infinitivo con prefijo temporal se vierte con una cláusula natural en español. «Estandarte» conserva la idea de señal elevada y visible desde lejos; «se levante» refleja la pasiva implícita del hebreo.
- source_word: נֵס
  english_pob_choice: banner
  chosen_spanish: estandarte
  alternatives_spanish:
  - señal
  - bandera
  lexicon: HALOT
  rationale: En este contexto militar/señalizador, «estandarte» comunica mejor la función de un signo elevado visible a distancia que «bandera», y mantiene dignidad estilística.
- source_word: הָרִים
  english_pob_choice: on the mountains
  chosen_spanish: en los montes
  alternatives_spanish:
  - sobre los montes
  - en las montañas
  lexicon: HALOT
  rationale: «הָרִים» es plural y poético; «montes» preserva el registro bíblico en español sin volver arcaica la frase.
- source_word: תִּרְא֔וּ
  english_pob_choice: you will see it
  chosen_spanish: lo verán
  alternatives_spanish:
  - ustedes lo verán
  - lo verán ustedes
  lexicon: HALOT
  rationale: La segunda persona plural se mantiene con sujeto tácito natural en español. Se explicita el objeto implícito del hebreo, es decir, el estandarte.
- source_word: וְכִתְקֹעַ שׁוֹפָר
  english_pob_choice: and when a trumpet is blown
  chosen_spanish: y cuando se toque una trompeta
  alternatives_spanish:
  - y cuando se haga sonar un cuerno
  - y cuando se toque un shofar
  lexicon: HALOT
  rationale: «שׁוֹפָר» designa literalmente un cuerno, a menudo de carnero, pero en este contexto de señal pública «trompeta» comunica mejor la función sonora. «Se toque» reproduce bien el sentido de hacer sonar el instrumento sin fijar un agente explícito.
- source_word: שׁוֹפָר
  english_pob_choice: trumpet
  chosen_spanish: trompeta
  alternatives_spanish:
  - cuerno
  - cuerno de carnero
  lexicon: HALOT
  rationale: Se conserva la equivalencia funcional adoptada por la POB en inglés. La nota mantiene las alternativas literales sin imponer un término más técnico que oscurezca el sentido del anuncio.
- source_word: תִּשְׁמָעוּ
  english_pob_choice: you will hear it
  chosen_spanish: la oirán
  alternatives_spanish:
  - la escucharán
  - ustedes la oirán
  lexicon: HALOT
  rationale: Se mantiene el plural y se traduce con un objeto directo implícito claro en español. «Oír» es la opción más natural para un sonido de señal.
theological_decisions:
- issue: Alcance universal del llamado
  english_pob_reading: All you inhabitants of the world, and you dwellers on the earth
  chosen_spanish_reading: Todos los habitantes del mundo, y todos los que habitan en la tierra
  alternative_spanish_readings:
  - Todos los moradores del mundo y los moradores de la tierra
  - Toda la humanidad
  rationale: El verso usa paralelismo intensificador para abarcar a toda la audiencia humana en términos poéticos. Se conserva esa amplitud sin reducirla ni espiritualizarla.
  doctrine_reference: Salmo 24:1; Isaías 45:22
- issue: Naturaleza de la señal
  english_pob_reading: when a banner is raised ... and when a trumpet is blown
  chosen_spanish_reading: cuando se levante un estandarte ... y cuando se toque una trompeta
  alternative_spanish_readings:
  - cuando se alce una señal ... y cuando se haga sonar un cuerno
  rationale: No hay base para reinterpretar la señal como metáfora distinta; el texto describe marcadores visibles y audibles para convocación o advertencia. Se conserva la tensión entre lo visual y lo sonoro.
  doctrine_reference: Números 10:2-10; Isaías 11:12
translation_notes:
  revision_awareness: El contexto auditado muestra alto acuerdo y sin revisiones aplicadas. La redacción española sigue la solución estable del inglés POB, preservando el paralelismo, el alcance universal y las dos alternativas léxicas documentadas para נֵס y שׁוֹפָר.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico claro con «montes» y «estandarte» sin caer en arcaísmo rígido.
  - Se preserva el plural directo («verán», «oirán») conforme al hebreo.
  - La puntuación en dos miembros paralelos con dos puntos respeta la estructura del hebreo y del inglés auditado.
