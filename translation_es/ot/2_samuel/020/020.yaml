translation:
  language: es
  text: 'Joab respondió y dijo: «¡Lejos de mí, lejos de mí[a], si yo fuera a tragarme o destruir!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si yo fuera a consumir o arruinar». El hebreo usa verbos vívidos para «tragar» y «destruir».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió diciendo
  lexicon: HALOT
  rationale: El verbo de respuesta narrativa se puede expresar naturalmente en español con «respondió»; mantiene la secuencia dialogal sin perder la función de réplica formal del hebreo.
- source_word: יוֹאָב
  english_pob_choice: Joab
  chosen_spanish: Joab
  alternatives_spanish:
  - Joaab
  lexicon: nombre propio estándar
  rationale: Nombre propio transliterado de forma usual en español bíblico.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y exclamó
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso se traduce de manera directa como «y dijo», conservando el paralelismo narrativo del hebreo.
- source_word: חָלִילָה חָלִילָה לִי
  english_pob_choice: Far be it from me, far be it
  chosen_spanish: ¡Lejos de mí, lejos de mí!
  alternatives_spanish:
  - ¡Nunca, nunca de mí!
  - ¡Lejos de mí, jamás!
  lexicon: HALOT
  rationale: La expresión idiomática de repudio fuerte se vierte con una equivalencia natural en español. La repetición conserva el énfasis duplicado del hebreo sin suavizar la fuerza de rechazo.
- source_word: אִם אֲבַלַּע
  english_pob_choice: if I should swallow up
  chosen_spanish: si yo he de engullir
  alternatives_spanish:
  - si yo he de tragármelo todo
  - si yo he de devorar
  lexicon: HALOT
  rationale: «Engullir» mantiene la imagen vívida de בלע («tragar, engullir») y permite reflejar la metáfora de consumir total y violentamente.
- source_word: וְאִם אַשְׁחִית
  english_pob_choice: or destroy
  chosen_spanish: o destruir
  alternatives_spanish:
  - o arruinar
  - o llevar a ruina
  lexicon: HALOT
  rationale: En este contexto militar, «destruir» comunica con claridad el valor causativo de שׁחת en hiphil, y el «o» refleja la segunda posibilidad rechazada como en el inglés POB.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en la frase correspondiente de la traducción. No se introdujeron cambios de sentido respecto al texto fuente; se mantuvo la duplicación enfática y la imagen verbal del hebreo.
  spanish_consistency_notes:
  - Se prefirió «respondió y dijo»/«respondió» como fórmula narrativa sobria y natural.
  - Se mantuvo el paralelismo enfático de la doble negación idiomática con repetición en español.
  - Se evitó sustituir el lenguaje imagético del hebreo por una paráfrasis abstracta.
  - No hay decisiones teológicas específicas en este versículo; el foco es léxico y retórico.
