review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: pregunta retórica a los montes de muchas cumbres, contraste con el monte que Dios deseó para su morada, y afirmación enfática de que Yahvé habitará allí para siempre. También preserva correctamente «Yahvé» y evita introducir «Sión». Sin embargo, «ante el monte» debilita el valor de הָהָר como objeto de rivalidad/comparación, donde «contra» o «frente a» expresa mejor el matiz del inglés auditado «at the mountain». Además, el verbo plural en segunda persona no requiere «ustedes», que suena innecesariamente explícito y algo prosaico en poesía.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para sonar más natural y poético sin perder literalidad. «¿Por qué saltan ustedes...?» resulta algo pesado; omitir «ustedes» mejora la fluidez. «Ante el monte» en este contexto puede sugerir mera presencia espacial más que confrontación retórica. El resto de las elecciones —«montes de muchas cumbres», «deseó», «para su morada», «Yahvé», «morará allí para siempre»— son legibles y fieles.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; הָהָר mantenido como «el monte» sin importar «Sión»; חָמַד -> «deseó» conforme a la justificación auditada; לְשִׁבְתּוֹ -> «para su morada» adecuado. La nota léxica preserva bien la incertidumbre de תְּרַצְּדוּן. No hay conflictos doctrinales mayores.'
  issues:
  - severity: medium
    issue: «ante el monte» no expresa con suficiente fuerza la relación retórica del hebreo/POB auditado
    rationale: La construcción busca contrastar los montes prominentes con el monte escogido por Dios. «Ante» puede leerse solo como ubicación. «Contra el monte» o «frente al monte» conserva mejor la sensación de rivalidad implícita en el contexto y en el audit trail inglés.
  - severity: low
    issue: «ustedes» suena innecesario y resta naturalidad poética
    rationale: El verbo «saltan» ya marca la segunda persona plural. En poesía bíblica en español, explicitar el pronombre aquí añade peso sin aportar claridad.
  revised_spanish_text: ¿Por qué saltan[a], montes de muchas cumbres, contra el monte que Dios deseó para su morada? Ciertamente Yahvé morará allí para siempre.
  revised_footnotes:
