lexical_decisions:
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - Sabiduría
  lexicon: BDAG
  rationale: Se traduce como sustantivo común, porque el griego presenta σοφία como “wisdom” y la personificación se conserva suficientemente con el contexto y el pronombre femenino implícito en la frase siguiente, sin convertirla necesariamente en nombre propio.
- source_word: θεραπεύσαντας
  english_pob_choice: served
  chosen_spanish: la servían
  alternatives_spanish:
  - la atendían
  - la honraban
  - le prestaban servicio
  lexicon: BDAG
  rationale: θεραπεύω puede significar servir, atender o rendir cuidado devoto. ‘Servían’ mantiene el sentido de lealtad y devoción reflejado por la POB inglesa, y funciona de manera natural en español.
- source_word: αὐτὴν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - la
  lexicon: BDAG
  rationale: El griego usa pronombre femenino por la personificación de la sabiduría. En español, el clítico ‘la’ conserva esa referencia femenina de forma natural dentro de la construcción verbal.
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de en medio de
  - fuera de
  - de entre
  lexicon: BDAG
  rationale: La preposición expresa salida o liberación a partir de una situación; ‘de’ es la opción idiomática más natural en español para este valor de separación.
- source_word: πόνων
  english_pob_choice: hardships
  chosen_spanish: las dificultades
  alternatives_spanish:
  - los trabajos
  - los dolores
  - las penas
  - los afanes
  lexicon: BDAG
  rationale: πόνος puede abarcar fatiga, dolor, trabajo penoso o aflicción. ‘Dificultades’ preserva el alcance amplio del término sin restringirlo solo a dolor físico o trabajo laboral.
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - libró
  - salvó
  - sacó
  lexicon: BDAG
  rationale: El verbo indica liberación de peligro o aflicción. ‘Rescató’ es vivo y fiel al sentido de liberación, sin cargar de más el matiz soteriológico general.
theological_decisions:
- issue: Personificación de la sabiduría
  english_pob_reading: ‘wisdom’ with feminine ‘her’, not a proper name
  chosen_spanish_reading: ‘sabiduría’ con referencia femenina implícita en el verbo y el clítico
  alternative_spanish_readings:
  - ‘Sabiduría’ como nombre propio
  - ‘ella’ de forma explícita
  rationale: El texto griego personifica la sabiduría, pero no exige convertirla en nombre propio. En español, el sustantivo común mantiene la tensión literaria y teológica sin resolverla excesivamente.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y literaria; español moderno, digno y claro.'
translation_notes:
  revision_awareness: El texto fue ajustado para anclar la nota a la palabra ‘rescató’, evitando el error de una nota sin marca en el cuerpo principal. Se mantuvo la lectura de la POB inglesa y la amplitud semántica de πόνος.
  spanish_consistency_notes:
  - Se preserva el sustantivo común ‘sabiduría’ sin mayúscula, en coherencia con la personificación griega y con la práctica POB en inglés.
  - ‘De las dificultades’ conserva el rango amplio de πόνων y suena natural en español bíblico contemporáneo.
  - La referencia femenina queda sugerida por el contexto, sin introducir formulación innecesariamente enfática.
