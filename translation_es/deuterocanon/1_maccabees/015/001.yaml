translation:
  language: es
  text: Y Antíoco, hijo del rey Demetrio, envió cartas desde las islas del mar a Simón, sacerdote y etnarca[b] de los judíos[a], y a toda la nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los judeanos» para τῶν Ἰουδαίων; el término griego puede designar al pueblo judío en sentido étnico-religioso o regional-político, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Etnarca» es un título formal que significa gobernante o dirigente de un pueblo o nación.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - remitió
  lexicon: BDAG
  rationale: El aoristo de ἀποστέλλω aquí introduce el envío de una comunicación; en español, 'envió' es natural y preciso para cartas. 'Mandó' es posible, pero suena más general y menos específico para una remisión escrita.
- source_word: ἐπιστολάς
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas escritas
  - epístolas
  lexicon: BDAG
  rationale: El plural exige una forma plural en español. 'Cartas' conserva el sentido de comunicaciones escritas sin el tono eclesiástico de 'epístolas'.
- source_word: ἀπὸ τῶν νήσων τῆς θαλάσσης
  english_pob_choice: from the islands of the sea
  chosen_spanish: desde las islas del mar
  alternatives_spanish:
  - de las islas del mar
  - desde las islas en el mar
  lexicon: BDAG
  rationale: La expresión geográfica se mantiene de manera cercana al griego. 'Desde' comunica mejor el punto de origen del envío en español, sin alterar la imagen de 'las islas del mar'.
- source_word: Σίμωνι
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simon
  lexicon: BDAG
  rationale: Se usa la forma española establecida del nombre propio. No hay tensión textual aquí; la mayúscula y acento responden al uso normal en español.
- source_word: ἱερεῖ
  english_pob_choice: priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - sacerdote
  - el sacerdote
  lexicon: BDAG
  rationale: '''Sacerdote'' corresponde al oficio cultual del término griego y es la opción natural en español bíblico. Se evita ''el sacerdote'' porque el griego carece de artículo y el dativo funciona en aposición.'
- source_word: ἐθνάρχῃ
  english_pob_choice: ethnarch
  chosen_spanish: etnarca
  alternatives_spanish:
  - gobernante del pueblo
  - líder nacional
  lexicon: BDAG
  rationale: Se conserva el título histórico con transliteración española, como hizo la versión inglesa con 'ethnarch'. 'Etnarca' preserva la distinción formal sin reducirla a una explicación más amplia que el texto no da.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: BDAG
  rationale: En 1 Macabeos el término puede funcionar étnica y políticamente. Aquí la referencia corporativa es clara y 'judíos' es la opción más transparente en español; 'judeanos' queda como alternativa posible en otros contextos.
- source_word: παντὶ τῷ ἔθνει
  english_pob_choice: all the nation
  chosen_spanish: a toda la nación
  alternatives_spanish:
  - a todo el pueblo
  - a la nación entera
  lexicon: BDAG
  rationale: El dativo coordinado expresa otro destinatario del envío. 'Toda la nación' conserva el valor colectivo-político de ἔθνος y evita diluirlo en un mero 'pueblo'.
- source_word: τοῦ βασιλέως
  english_pob_choice: King
  chosen_spanish: rey
  alternatives_spanish:
  - el rey
  lexicon: BDAG
  rationale: En español, 'hijo del rey Demetrio' es la construcción más natural y fiel. La omisión del artículo es idiomática y no cambia el sentido.
theological_decisions:
- issue: Tratamiento del título político ἐθνάρχης
  english_pob_reading: ethnarch
  chosen_spanish_reading: etnarca
  alternative_spanish_readings:
  - gobernante del pueblo
  - líder del pueblo
  rationale: No es un asunto doctrinal central, pero sí histórico-político. Mantener 'etnarca' deja visible el título técnico del griego y evita imponer una equivalencia institucional más específica que la del texto.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete 1909 y coincide con el trazado auditado en inglés: envío de cartas, origen geográfico, doble destinatario y preservación del título histórico ἐθνάρχης. No se detectaron revisiones necesarias según el registro más reciente, por lo que no se introducen cambios interpretativos adicionales.'
  spanish_consistency_notes:
  - Se mantiene la capitalización normal de nombres propios y títulos al inicio de sintagma.
  - '''Judíos'' se usa como equivalente contextual de Ἰουδαίων, con nota de alternativa donde el inglés POB también preservó la ambigüedad.'
  - 'Se conserva la secuencia sintáctica principal del griego: sujeto + verbo + complemento de origen + destinatarios.'
  - '''Etnarca'' se deja sin glosa en el cuerpo principal para respetar la terminología histórica y se aclara en nota.'
