translation:
  language: es
  text: Salomón edificó la casa y la terminó[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo». El hebreo dice literalmente «la casa», una designación común del templo en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - edificó
  lexicon: HALOT
  rationale: El verbo qal wayyiqtol narra una acción pasada completa en secuencia. En español, "edificó" es natural y conserva el matiz de construir un edificio sagrado sin volver la frase demasiado coloquial. "Construyó" también es posible, pero "edificó" suena más digno en este contexto.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Salomon
  lexicon: Transliteración convencional del nombre propio
  rationale: Se usa la forma española estándar del nombre propio, equivalente funcional de la transliteración inglesa del POB.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente "la casa"; en este contexto designa el templo. Para mantener la formulación de la fuente y la referencia contextual, se conserva "la casa" en el texto principal. La alternativa "el templo" queda reflejada en la nota.
- source_word: וַיְכַלֵּהוּ
  english_pob_choice: finished it
  chosen_spanish: la terminó
  alternatives_spanish:
  - la completó
  - la llevó a término
  lexicon: HALOT
  rationale: El verbo con sufijo pronominal retoma "la casa". "Terminar" expresa con naturalidad la idea de completar una obra en español y mantiene la relación directa del objeto.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura aprobada en inglés: acción narrativa completa, nombre propio estándar y conservación de «la casa» como equivalente literal del hebreo, con nota para la referencia contextual al templo. No se detectaron revisiones anteriores que exigieran ajuste.'
  spanish_consistency_notes:
  - Se mantuvo un tono bíblico sobrio y contemporáneo.
  - Se evitó sustituir automáticamente «la casa» por «el templo» en el cuerpo principal para respetar la formulación hebrea.
  - La nota explica la alternativa contextual sin introducir ambigüedad innecesaria en el texto principal.
