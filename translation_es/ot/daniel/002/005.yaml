review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en lo esencial el sentido del arameo y la línea de la POB inglesa: mantiene «caldeos», conserva la lectura principal de מִנִּי אַזְדָּא como una palabra real firme, y expresa la amenaza de castigo y destrucción de las casas. Sin embargo, dos elecciones debilitan la evidencia fuente y el rastro de auditoría: «La palabra de mí es firme» suena poco natural en español, y «un montón de ruinas» no preserva bien el valor de נְוָלִי como montón de desechos/refugio infame más que simple ruina.'
  spanish_quality_summary: 'El texto es generalmente legible, pero contiene calco innecesario en «de mí es firme / la palabra de mí es firme» y una imagen final algo desplazada. Para español eclesial claro y digno, conviene «Mi palabra es firme» y «un montón de desechos», que mantiene claridad moderna sin arcaísmo. También la nota [a] no debe presentar «O: “a los caldeos”» como alternativa, porque eso ya es el texto principal; debe reflejar la alternativa auditada sobre la cláusula disputada, no inventar otra.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto en «caldeos», «interpretación» y el registro narrativo. No hay términos teológicos mayores en disputa. La principal desviación léxica está en נְוָלִי: «montón de ruinas» se aparta del valor documentado «refuse heap», por lo que «montón de desechos» encaja mejor con la justificación inglesa.'
  issues:
  - severity: medium
    issue: «La palabra de mí es firme» es un calco poco natural.
    rationale: Aunque intenta reflejar מִנִּי אַזְדָּא, en español suena forzado. «Mi palabra es firme» conserva el sentido elegido por la POB y mejora la legibilidad sin paraprasear de más.
  - severity: high
    issue: La nota [a] no corresponde al punto textual debatido ni al rastro de auditoría inglés.
    rationale: La nota inglesa [a] preserva la lectura alternativa «The word has gone out from me», no una glosa explicativa de «caldeos». La nota española debe seguir esa alternativa significativa de fuente.
  - severity: medium
    issue: «Un montón de ruinas» debilita el sentido de נְוָלִי.
    rationale: El término apunta a un montón de desechos/refugo vergonzoso, tradicionalmente incluso 'muladar'. «Ruinas» comunica desolación, pero pierde la idea de basura o inmundicia documentada en la POB inglesa.
  - severity: low
    issue: «Serán hechos pedazos» es aceptable, pero la imagen corporal puede expresarse con más fuerza en español.
    rationale: La nota ya preserva bien el matiz de desmembramiento. El texto principal puede mantenerse idiomático, pero «serán despedazados[b]» refleja un poco mejor la violencia del arameo que «hechos pedazos».
  revised_spanish_text: 'El rey respondió y dijo a los caldeos: «Mi palabra[a] es firme: si no me dan a conocer el sueño y su interpretación, serán despedazados[b], y sus casas serán convertidas en un montón de desechos.»'
  revised_footnotes:
