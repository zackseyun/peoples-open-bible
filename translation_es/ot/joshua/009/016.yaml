  glossary_alignment: No hay términos del glosario mayor en disputa. «Pacto» para בְּרִית es coherente con la decisión documentada. Los pronombres singulares hebreos con sentido colectivo deben seguir explicándose en nota. No hay conflicto con Yahvé/Mesías/etc.
