translation:
  language: es
  text: Entonces la palabra de Yahvé[b] vino a Jeremías[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jeremías es la forma española tradicional del hebreo «Yirmeyahu».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Yahvé». Se conserva aquí el nombre divino propio; en muchas traducciones tradicionales aparece como «el SEÑOR».'
