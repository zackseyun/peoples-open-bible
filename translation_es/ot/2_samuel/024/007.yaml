translation:
  language: es
  text: Fueron a la ciudad fortificada de Tiro, y a todas las ciudades de los hivitas y de los cananeos, y salieron hacia el Négueb[a] de Judá, a Beerseba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el sur de Judá". El hebreo negev puede denotar la región específica llamada Négueb o, de manera más general, el área meridional.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְצַר צֹר
  english_pob_choice: the fortified city of Tyre
  chosen_spanish: la ciudad fortificada de Tiro
  alternatives_spanish:
  - la fortaleza de Tiro
  - la ciudad amurallada de Tiro
  lexicon: HALOT
  rationale: מִבְצַר designa un lugar fortificado. En aposición con צֹר, la idea es Tiro como ciudad fortificada; "ciudad fortificada" conserva el matiz militar y geográfico sin volverlo demasiado técnico en español.
- source_word: וְכָל עָרֵי
  english_pob_choice: and to all the cities of
  chosen_spanish: y a todas las ciudades de
  alternatives_spanish:
  - y todas las ciudades de
  - y a todas las urbes de
  lexicon: HALOT
  rationale: Con el verbo de movimiento anterior, el español necesita la preposición "a" para expresar el destino de la ruta. "Ciudades" mantiene el sentido normal y no introduce una distinción estilística innecesaria.
- source_word: הַחִוִּי
  english_pob_choice: the Hivites
  chosen_spanish: los hivitas
  alternatives_spanish:
  - los heveos
  lexicon: HALOT
  rationale: Se conserva el этnónimo como pueblo/linaje histórico. "Hivitas" sigue el uso académico y eclesial moderno en español; "heveos" es una variante más tradicional, pero menos transparente para lectores actuales.
- source_word: וְהַכְּנַעֲנִי
  english_pob_choice: and the Canaanites
  chosen_spanish: de los cananeos
  alternatives_spanish:
  - los cananeos
  lexicon: HALOT
  rationale: El hebreo usa un singular étnico colectivo, pero en español el plural es natural al depender de "ciudades". Se mantiene la referencia a los cananeos como grupo étnico.
- source_word: וַיֵּצְאוּ
  english_pob_choice: and they went out
  chosen_spanish: y salieron
  alternatives_spanish:
  - y fueron
  - y partieron
  lexicon: HALOT
  rationale: יצא aquí marca el siguiente tramo del recorrido. "Salieron" conserva la imagen verbal sin sobreinterpretar la dirección del viaje.
- source_word: אֶל נֶגֶב יְהוּדָה
  english_pob_choice: to the Negev of Judah
  chosen_spanish: hacia el Negev de Judá
  alternatives_spanish:
  - al sur de Judá
  - hacia la región meridional de Judá
  lexicon: HALOT
  rationale: נֶגֶב puede significar tanto la región específica del Negev como el sur en general. Se retiene "Negev" como designación geográfica, en línea con la decisión inglesa, y la preposición "hacia" refleja el movimiento del itinerario.
- source_word: בְּאֵר שָׁבַע
  english_pob_choice: Beersheba
  chosen_spanish: Beerseba
  alternatives_spanish:
  - Beer-seba
  lexicon: HALOT
  rationale: Se adopta la transliteración española usual del topónimo, legible para lectores bíblicos en español.
theological_decisions:
- issue: Sentido de נֶגֶב como región específica o como dirección cardinal
  english_pob_reading: The English POB preserves the geographical term 'Negev' and footnotes the broader sense 'south of Judah.'
  chosen_spanish_reading: Se conserva "Negev de Judá" en el texto principal, con posible lectura general de "sur de Judá" implícita en la variación léxica.
  alternative_spanish_readings:
  - al sur de Judá
  - en la región sur de Judá
  rationale: No hay decisión doctrinal, sino una tensión geográfica/lexical. Mantener "Negev" respeta el posible nombre regional y permite, sin ocultarlo, la lectura más general que el hebreo admite.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés. No se detectaron revisiones sustantivas en el pasaje de referencia; se preservó la opción geográfica 'Negev' y la equivalencia verbal simple de los verbos de movimiento.
  spanish_consistency_notes:
  - Se usó "Tiro" como topónimo estándar en español y "Beerseba" como transliteración habitual, coherente con el resto del proyecto.
  - Se prefirió "hivitas" por transparencia contemporánea, sin excluir la variante tradicional "heveos" en alternativas.
  - Se mantuvo el plural español para los pueblos étnicos en concordancia con "ciudades" y con el uso natural del español.
