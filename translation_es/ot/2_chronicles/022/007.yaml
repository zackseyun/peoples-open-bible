translation:
  language: es
  text: La caída[a] de Ocozías, al ir a Joram, fue de Dios; y cuando llegó, salió con Jehoram hacia Jehú[b], hijo de Nimsi, a quien Yahvé había ungido para eliminar[c] la casa de Acab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ruina»; el hebreo admite una gama de sentidos para תְּבוּסַת, desde derrota hasta abatimiento o destrucción.
    reason: lexical_alternative
  - marker: b
    text: O «contra Jehú» o «para encontrarse con Jehú»; el hebreo dice literalmente «a Jehú», aunque el contexto sugiere un encuentro hostil.
    reason: lexical_alternative
  - marker: c
    text: Lit. «cortar» o «extirpar»; la expresión hebrea conserva un modismo de juicio contra la casa de Acab.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵאֱלֹהִים
  english_pob_choice: was from God
  chosen_spanish: fue de Dios
  alternatives_spanish:
  - procedía de Dios
  - vino de Dios
  lexicon: HALOT
  rationale: La preposición מן con אֱלֹהִים indica origen o fuente. «Fue de Dios» conserva la afirmación breve y directa del hebreo sin especificar más de la cuenta el modo de esa causalidad.
- source_word: תְּבוּסַת
  english_pob_choice: downfall
  chosen_spanish: caída
  alternatives_spanish:
  - ruina
  - derrota
  - destrucción
  lexicon: HALOT
  rationale: El sustantivo puede abarcar derrota, ruina o abatimiento. En este contexto, «caída» comunica de forma natural el desastre de Ocozías y mantiene amplitud semántica sin forzar una sola interpretación.
- source_word: לָבוֹא אֶל יוֹרָם
  english_pob_choice: in going to Joram
  chosen_spanish: al ir a Joram
  alternatives_spanish:
  - por ir a Joram
  - cuando fue a Joram
  lexicon: HALOT
  rationale: El infinitivo con ל expresa la circunstancia de la caída de Ocozías. «Al ir a Joram» reproduce esa relación causal-circunstancial de manera idiomática en español.
- source_word: וּבְבֹאוֹ
  english_pob_choice: when he came
  chosen_spanish: cuando llegó
  alternatives_spanish:
  - y cuando vino
  - y al llegar
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo + sufijo se vierte naturalmente como «cuando llegó», manteniendo la secuencia narrativa.
- source_word: יָצָא עִם יְהוֹרָם אֶל יֵהוּא
  english_pob_choice: he went out with Jehoram to Jehu
  chosen_spanish: salió con Joram contra Jehú
  alternatives_spanish:
  - salió con Joram a Jehú
  - salió con Joram para ir a Jehú
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a Jehu», pero el contexto sugiere un encuentro hostil. En español, «contra Jehú» expresa la orientación adversarial sin perder la base textual; se mantiene el carácter interpretativo señalado por la auditoría inglesa.
- source_word: יְהוֹרָם / יוֹרָם
  english_pob_choice: Joram / Jehoram
  chosen_spanish: Joram / Joram
  alternatives_spanish:
  - Jehoram / Joram
  - Joram / Jehoram
  lexicon: HALOT
  rationale: Los dos nombres hebreos corresponden al mismo rey y la verse muestra variación formal. En español se usa «Joram» en ambos lugares por fluidez y para evitar una distinción artificial que el lector podría entender como dos personas distintas.
- source_word: מְשָׁחוֹ
  english_pob_choice: had anointed
  chosen_spanish: había ungido
  alternatives_spanish:
  - ungió
  - había consagrado
  lexicon: HALOT
  rationale: El perfecto verbal en la cláusula relativa remite a una acción previa a los hechos narrados. «Había ungido» preserva esa anterioridad y el término tradicionalmente bíblico «ungido».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». Esto mantiene el nombre divino personal en lugar de sustituirlo por un título.'
- source_word: לְהַכְרִית אֶת בֵּית אַחְאָב
  english_pob_choice: to cut off the house of Ahab
  chosen_spanish: para exterminar la casa de Acab
  alternatives_spanish:
  - para cortar de raíz la casa de Acab
  - para destruir la casa de Acab
  lexicon: HALOT
  rationale: הכרית en hifil puede significar cortar, eliminar o destruir. «Exterminar» comunica con fuerza el juicio total del linaje, aunque se reconoce que «cortar off» mantiene más literalmente el modismo; se opta por una formulación española clara y solemne.
theological_decisions:
- issue: Causalidad divina en la caída de Ocozías
  english_pob_reading: The verse states that Ahaziah's downfall was from God, without specifying whether this is direct ordination, providential judgment, or permissive causation.
  chosen_spanish_reading: El versículo afirma que la caída de Ocozías fue de Dios, sin precisar si se trata de ordenación directa, juicio providencial o causalidad permisiva.
  alternative_spanish_readings:
  - Dios decretó la caída de Ocozías
  - Dios permitió las circunstancias que condujeron a la caída de Ocozías
  rationale: La traducción conserva la atribución explícita a Dios y evita cerrar la tensión teológica del texto con una explicación más precisa de la que el hebreo ofrece.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente inglés, que aclaró con comas la relación entre la caída de Ocozías y su ida a Joram. También conserva la alternativa interpretativa en el movimiento «a/contra Jehú», pero la integra en una forma española fluida y contextual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton conforme al estándar del proyecto.
  - Se usa «Acab» y «Joram/Jehoram» como equivalentes de los nombres propios hebreos según su forma española habitual.
  - Se conserva una sintaxis relativamente formal para reflejar la estructura causal y temporal del hebreo sin volverla artificial.
