translation:
  language: es
  text: No oprimirás a tu prójimo[a] ni lo robarás. El salario del jornalero no se quedará en tu poder hasta la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu semejante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲשֹׁק
  english_pob_choice: oppress
  chosen_spanish: oprimir
  alternatives_spanish:
  - defraudar
  - explotar
  lexicon: HALOT
  rationale: עוּשַׁק/עָשַׁק en este contexto legal-é tico abarca abusar de otro mediante presión o retención indebida de lo que le corresponde. 'Oprimir' conserva ese alcance amplio mejor que 'defraudar', y encaja con el marco económico del versículo.
- source_word: רֵעֲךָ
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu semejante
  - tu compañero
  lexicon: HALOT
  rationale: '''Prójimo'' es el equivalente bíblico-natural en español para רֵעַ en contextos de convivencia comunitaria y norma ética. Mantiene el sentido de miembro cercano de la comunidad sin volverlo demasiado genérico.'
- source_word: תִגְזֹל
  english_pob_choice: rob
  chosen_spanish: robar
  alternatives_spanish:
  - hurtar
  - saquear
  lexicon: HALOT
  rationale: גָּזַל expresa tomar por la fuerza o mediante apropiación injusta. 'Robar' reproduce bien esa acción directa y es suficientemente fuerte para el paralelo con 'oprimir'.
- source_word: פְּעֻלַּת
  english_pob_choice: the wages of
  chosen_spanish: el salario de
  alternatives_spanish:
  - la paga de
  - los ingresos de
  - el trabajo de
  lexicon: HALOT
  rationale: En la construcción con שָׂכִיר, פְּעֻלָּה se refiere a la retribución debida por el trabajo. 'Salario' es la opción española más natural y precisa en este contexto laboral, sin perder el valor legal de pago debido.
- source_word: שָׂכִיר
  english_pob_choice: a hired worker
  chosen_spanish: el jornalero
  alternatives_spanish:
  - el trabajador contratado
  - el trabajador asalariado
  lexicon: HALOT
  rationale: שָׂכִיר designa a alguien contratado por jornal o paga. 'Jornalero' conserva el matiz de trabajo pagado por día y se ajusta bien a la relación con el salario retenido hasta la mañana.
- source_word: אִתְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - en tu poder
  - a tu lado
  lexicon: HALOT
  rationale: La preposición indica que el salario está retenido por la persona obligada a pagarlo. 'Contigo' mantiene la proximidad posesiva de forma natural y fiel al hebreo.
- source_word: עַד בֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta la mañana siguiente
  lexicon: HALOT
  rationale: '''Hasta la mañana'' reproduce con claridad el límite temporal concreto del hebreo sin añadir precisión interpretativa innecesaria. Conserva el tono legal directo del mandato.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto quedó estable con acuerdo alto entre las evaluaciones, así que la propuesta española sigue de cerca el sentido legal-ético del hebreo y la solución léxica ya auditada en POB.
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento directo en singular con prohibición en futuro negativo: ''No oprimirás... ni lo robarás''.'
  - Se conserva el paralelismo entre la obligación moral general ('tu prójimo') y la norma económica específica ('el salario del jornalero').
  - '''Hasta la mañana'' evita una glosa como ''durante la noche'' para no debilitar el límite temporal explícito del hebreo.'
