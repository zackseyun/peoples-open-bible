translation:
  language: es
  text: los hijos de Sefatía[a], los hijos de Hatil, los hijos de Poqueret-hazebaim[b], los hijos de Amón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O quizá «los descendientes de» en todo el versículo; el hebreo «hijos de» suele denotar una línea familiar en listas genealógicas.
    reason: lexical_alternative
  - marker: b
    text: Poqueret-hazebaim también puede representarse como «Poqueret de Zebaim»; aquí se conserva el nombre hebreo compuesto.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos
  lexicon: HALOT
  rationale: En listas genealógicas o de clanes, בְּנֵי puede señalar un linaje o grupo familiar. «Los hijos de» conserva la forma formal del hebreo y es natural en español bíblico; aquí se mantiene como en el texto fuente, sin limitarlo a hijos biológicos inmediatos.
- source_word: שְׁפַטְיָה
  english_pob_choice: Shephatiah
  chosen_spanish: Sefatías
  alternatives_spanish:
  - Sefatía
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con una forma clara y reconocible. Se adapta la ortografía para lectura hispana sin intentar traducir el nombre.
- source_word: חַטִּיל
  english_pob_choice: Hattil
  chosen_spanish: Hatil
  alternatives_spanish:
  - Jatil
  lexicon: HALOT
  rationale: Nombre propio preservado como transliteración. Se simplifica la forma al español conservando la identidad nominal del linaje.
- source_word: פֹּכֶרֶת הַצְּבָיִים
  english_pob_choice: Pochereth-hazzebaim
  chosen_spanish: Poqueret-hazebaim
  alternatives_spanish:
  - Poqueret de Zebaim
  - Poqueret-hazzebaim
  lexicon: HALOT
  rationale: Se conserva el carácter de nombre propio compuesto. En español, el enlace con guion ayuda a mostrar que los dos elementos forman una sola designación familiar, sin descomponerla en una frase explicativa que el hebreo no exige aquí.
- source_word: אָמֽוֹן
  english_pob_choice: Amon
  chosen_spanish: Amon
  alternatives_spanish:
  - Amón
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la forma breve y estándar para un designativo de familia dentro de la lista.
theological_decisions:
- issue: Valor de בְּנֵי en una lista de retorno/genealogía
  english_pob_reading: the sons of ... may denote a family line rather than only immediate male offspring
  chosen_spanish_reading: los hijos de ... puede designar un linaje o clan, no solo hijos literales
  alternative_spanish_readings:
  - los descendientes de ...
  - los miembros de ...
  rationale: 'No se pierde la tensión semántica del hebreo: la expresión mantiene su forma genealógica, pero en la nota se aclara que funciona como marcador de pertenencia a una línea familiar.'
  doctrine_reference: Uso genealógico de בֵּן en listas de retorno (cf. Neh 7)
translation_notes:
  revision_awareness: 'Se siguió el consenso del audit trail inglés: nombres propios transliterados y בְּנֵי mantenido en sentido genealógico. No hubo revisiones textuales adicionales en el paquete fuente; el borrador español refleja el estado final estable.'
  spanish_consistency_notes:
  - 'Se unificó la transliteración al español con grafías naturalizadas pero conservadoras: Sefatías, Hatil, Poqueret-hazebaim y Amon.'
  - Se evitó introducir interpretaciones adicionales como oficios o significados etimológicos no respaldados por el texto.
  - Se mantuvo el paralelismo de la lista nominal para preservar el formato genealógico del hebreo.
