translation:
  language: es
  text: Entonces David tomó la lanza y la jarra de agua de junto a la cabeza de Saúl[a], y se fueron. No hubo quien lo viera, ni quien lo supiera, ni quien despertara, porque todos estaban durmiendo, pues un sueño profundo de parte de Yahvé había caído sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «de junto a su cabeza». La expresión hebrea se refiere al lugar junto a la cabeza de Saúl mientras dormía.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲנִית
  english_pob_choice: the spear
  chosen_spanish: la lanza
  alternatives_spanish:
  - la lanza arrojadiza
  - la pica
  lexicon: HALOT
  rationale: חֲנִית puede referirse a una lanza o arma de asta similar. En español, "lanza" es natural y digno en este contexto narrativo; "pica" o "lanza arrojadiza" serían más específicos pero menos idiomáticos aquí.
- source_word: צַפַּחַת הַמַּיִם
  english_pob_choice: the jar of water
  chosen_spanish: el cántaro de agua
  alternatives_spanish:
  - la jarra de agua
  - el jarro de agua
  lexicon: HALOT
  rationale: צַפַּחַת designa un recipiente para líquidos, tipo jarra, jarro o cántaro. "Cántaro de agua" comunica bien el objeto concreto en español y mantiene un registro bíblico claro sin recurrir a arcaísmos.
- source_word: מֵרַאֲשֹׁתֵי שָׁאוּל
  english_pob_choice: from beside Saul’s head
  chosen_spanish: de junto a la cabeza de Saúl
  alternatives_spanish:
  - de al lado de la cabeza de Saúl
  - del lugar junto a la cabeza de Saúl
  lexicon: HALOT
  rationale: La expresión hebrea señala el lugar donde estaba la cabeza de Saúl mientras dormía, no que el objeto estuviera literalmente sobre su cabeza. "De junto a la cabeza" conserva esa relación espacial con claridad natural en español.
- source_word: וַיֵּלְכוּ לָהֶם
  english_pob_choice: and they went away
  chosen_spanish: y se fueron
  alternatives_spanish:
  - y se apartaron
  - y siguieron su camino
  lexicon: HALOT
  rationale: El plural incluye a David y Abisai. "Se fueron" transmite de forma breve y natural la partida, y deja el matiz de retirarse para ellos mismos sin sobreexplicar.
- source_word: וְאֵין רֹאֶה / וְאֵין יוֹדֵעַ / וְאֵין מֵקִיץ
  english_pob_choice: No one saw it / and no one knew it / and no one awoke
  chosen_spanish: No hubo quien lo viera, ni quien lo supiera, ni quien despertara
  alternatives_spanish:
  - Nadie lo vio, ni nadie lo supo, ni nadie despertó
  - No había quien lo viera, ni quien lo supiera, ni quien despertara
  lexicon: HALOT
  rationale: La secuencia negativa hebrea con participios se expresa bien en español con "No hubo quien..." para mantener el énfasis indefinido y narrativo. "Lo" remite a la acción de tomar los objetos y preservar la referencia implícita del contexto.
- source_word: כֻלָּם יְשֵׁנִים
  english_pob_choice: for they were all sleeping
  chosen_spanish: porque todos estaban durmiendo
  alternatives_spanish:
  - pues todos estaban dormidos
  - porque todos dormían
  lexicon: HALOT
  rationale: יְשֵׁנִים describe un estado de sueño en curso. "Estaban durmiendo" comunica ese aspecto de manera natural; "dormían" es posible, pero aquí la forma progresiva suena más viva en español.
- source_word: תַּרְדֵּמַת יְהוָה
  english_pob_choice: a deep sleep from Yahweh
  chosen_spanish: un profundo sueño de Yahvé
  alternatives_spanish:
  - un sueño profundo de Yahvé
  - un profundo sopor de Yahvé
  lexicon: HALOT
  rationale: 'תַּרְדֵּמָה es más que sueño ordinario: un sopor profundo o sueño pesado. "Profundo sueño" conserva la fuerza sin introducir un término demasiado técnico. Se mantiene "Yahvé" según la norma del proyecto para יהוה.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como "Yahvé" en el texto principal según la terminología del proyecto, para preservar el nombre propio divino en lugar de sustituirlo por un título.
- source_word: נָפְלָה עֲלֵיהֶם
  english_pob_choice: had fallen on them
  chosen_spanish: había caído sobre ellos
  alternatives_spanish:
  - había caído encima de ellos
  - les había sobrevenido
  lexicon: HALOT
  rationale: El hebreo usa el idiomático "caer sobre" para marcar la llegada de ese sueño profundo. El pluscuamperfecto en español refleja bien que el sueño ya estaba en efecto cuando David actuó.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino en transliteración, conforme a la pauta del proyecto, en lugar de sustituirlo por un título reverencial. Esto mantiene visible la referencia al nombre del pacto en el texto bíblico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Agencia divina en תַּרְדֵּמַת יְהוָה
  english_pob_reading: a deep sleep from Yahweh had fallen on them
  chosen_spanish_reading: un profundo sueño de Yahvé había caído sobre ellos
  alternative_spanish_readings:
  - Dios les había hecho caer en un profundo sueño
  - un profundo sueño enviado por Yahvé había caído sobre ellos
  rationale: La construcción mantiene la idea de procedencia/causa divina sin añadir explicitamente un verbo causal que el hebreo no formula aquí. El genitivo de Yahvé queda como marca de origen del sueño.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance de la secuencia negativa hebrea
  english_pob_reading: No one saw it, and no one knew it, and no one awoke
  chosen_spanish_reading: No hubo quien lo viera, ni quien lo supiera, ni quien despertara
  alternative_spanish_readings:
  - Nadie lo vio, ni nadie lo supo, ni nadie despertó
  - No había quien lo viera, ni quien lo supiera, ni quien despertara
  rationale: La serie hebrea enfatiza la ausencia total de observación, conocimiento y despertar. La formulación con "No hubo quien..." conserva ese valor distributivo e indefinido con buen español.
  doctrine_reference: HALOT; sintaxis narrativa hebrea de אין + participio
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura revisada del audit trail inglés: entiende la expresión espacial como "de junto a la cabeza" y mantiene la estructura narrativa de ausencia total de testigos, conocimiento y despertar. También conserva el carácter causal/divino de la "profunda sueño" sin sobreinterpretarlo.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente para יְהוָה.
  - Se evitó "SEÑOR" como sustituto editorial del nombre divino.
  - '"Lanza" y "cántaro de agua" mantienen un registro bíblico claro y moderno.'
  - La serie negativa se redactó con paralelismo en español para reflejar el hebreo.
  - '"Lo" en "lo viera / lo supiera" remite al acto de David sin explicitar de más el objeto ya mencionado.'
