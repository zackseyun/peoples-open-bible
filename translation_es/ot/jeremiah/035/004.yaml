translation:
  language: es
  text: Entonces los llevé a la casa de Yahvé[a], a la cámara de los hijos[b] de Hanan, hijo de Igdalías, el hombre de Dios, que estaba junto a la cámara de los oficiales, la cual estaba sobre la cámara de Maasías, hijo de Salum, el guardián del umbral[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Yahvé». Literalmente, «la casa de YHWH».
    reason: lexical_alternative
  - marker: b
    text: «Los hijos de Hanan» puede referirse a descendientes de Hanan, a su casa o a un grupo asociado.
    reason: lexical_alternative
  - marker: c
    text: O «el portero». Literalmente, «el guardián del umbral».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָבִא
  english_pob_choice: So I brought
  chosen_spanish: Así que los llevé
  alternatives_spanish:
  - Y los llevé
  - Entonces los llevé
  lexicon: HALOT
  rationale: El wayyiqtol en primera persona narra la acción siguiente en secuencia. «Así que» conserva el avance narrativo del inglés POB y su fuerza consecutiva, mientras «los llevé» es un equivalente natural del verbo de movimiento causativo en este contexto.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa de YHWH». Se mantiene la expresión «casa de» y se usa «Yahvé» según el criterio del proyecto, sin sustituirlo por una máscara litúrgica.
- source_word: לִשְׁכַּת
  english_pob_choice: the chamber
  chosen_spanish: la cámara
  alternatives_spanish:
  - la sala
  - el aposento
  lexicon: HALOT
  rationale: «לִשְׁכָּה» designa una dependencia arquitectónica, a menudo del templo. «Cámara» preserva el sentido formal y el registro arquitectónico mejor que «sala» o «aposento».
- source_word: בְּנֵי חָנָן
  english_pob_choice: the sons of Hanan
  chosen_spanish: los hijos de Hanan
  alternatives_spanish:
  - la familia de Hanan
  - los descendientes de Hanan
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «hijos de Hanan». Se conserva esa forma, aunque pueda referirse a descendientes, casa o grupo asociado; eso se explica en nota.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - un hombre de Dios
  lexicon: HALOT
  rationale: La expresión funciona como título reconocido. «El hombre de Dios» refleja la forma definida del hebreo y el valor honorífico del título.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - cerca de
  lexicon: HALOT
  rationale: El término indica proximidad espacial. «Junto a» es la forma más natural en español para una ubicación contigua.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los jefes
  lexicon: HALOT
  rationale: En este contexto administrativo del templo, «oficiales» evita la carga monárquica de «príncipes» y conserva la referencia a personas con cargo o rango.
- source_word: מִמַּעַל לְ
  english_pob_choice: above
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: La frase marca una relación vertical. «Sobre» es clara y sobria en español para la disposición arquitectónica.
- source_word: מַעֲשֵׂיָהוּ בֶן שַׁלֻּם
  english_pob_choice: Maaseiah son of Shallum
  chosen_spanish: Maasías, hijo de Salum
  alternatives_spanish:
  - Maseías, hijo de Salum
  - Maaseya, hijo de Salum
  lexicon: standard transliteration conventions
  rationale: Se transliteran los nombres propios con forma española estable y legible, preservando la identificación personal sin traducirlos.
- source_word: שֹׁמֵר הַסַּף
  english_pob_choice: the keeper of the threshold
  chosen_spanish: el guardián del umbral
  alternatives_spanish:
  - el portero
  - el guardia del umbral
  lexicon: HALOT
  rationale: La traducción literal «guardián del umbral» conserva la imagen y el oficio del hebreo. «Portero» sería más idiomático, pero reduce la fuerza lexical del término.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se mantiene el nombre propio del pacto como «Yahvé», evitando la sustitución por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de בְּנֵי חָנָן
  english_pob_reading: the sons of Hanan may refer to Hanan's descendants, household, or associated group
  chosen_spanish_reading: los hijos de Hanan puede referir a sus descendientes, su casa o un grupo asociado
  alternative_spanish_readings:
  - la familia de Hanan
  - los descendientes de Hanan
  rationale: Se conserva la literalidad de la frase en el texto principal y se deja constancia de su posible alcance semántico. Esto evita cerrar indebidamente una ambigüedad que el POB inglés ya documenta.
  doctrine_reference: Nota lexical heredada del POB sobre constructos de parentesco y pertenencia
- issue: Función de שֹׁמֵר הַסַּף
  english_pob_reading: the keeper of the threshold
  chosen_spanish_reading: el guardián del umbral
  alternative_spanish_readings:
  - el portero
  - el guardián de la puerta
  rationale: Se opta por la formulación más literal para preservar el término técnico y su posible referencia a una función del templo. «Portero» se reserva como alternativa explicativa, no como sustituto principal.
  doctrine_reference: Nota lexical heredada del POB sobre oficios del templo
translation_notes:
  revision_awareness: Se siguió el último pass de revisión indicado como sin cambios y en alto acuerdo con el original. No se introdujeron enmiendas textuales respecto del paquete fuente; la redacción española refleja directamente el hebreo con las decisiones léxicas documentadas en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en coherencia con la terminología del proyecto para יְהוָה.
  - Se prefirió «cámara» para לִשְׁכָּה por consistencia arquitectónica en contexto del templo.
  - Los nombres propios se transliteraron con grafía española usual y sin traducción.
  - Se conservó la ambigüedad documentada de «los hijos de Hanan» en nota, sin resolverla en el cuerpo del texto.
  - Se usó «guardián del umbral» para preservar el oficio técnico y su literalidad hebrea.
