translation:
  text: And they fortified the villages among them[a], and they stored up food supplies in preparation for war, because their fields had been newly harvested.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the villages in their midst.' The phrase 'among them' reflects the Greek expression without deciding a more specific geographical nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτείχισαντο
  chosen: they fortified
  alternatives:
  - they walled
  - they enclosed with walls
  lexicon: LSJ
  rationale: Middle form from τειχίζω, referring to making defensible or walling a place. 'Fortified' gives clear modern English without over-specifying the exact construction.
- source_word: τὰς ἐν αὐτοῖς κώμας
  chosen: the villages among them
  alternatives:
  - the villages in their midst
  - the villages within them
  lexicon: LSJ
  rationale: κῶμαι are villages. The phrase ἐν αὐτοῖς is somewhat spatially compressed; 'among them' preserves the relational sense without forcing a more interpretive geographical reconstruction.
- source_word: παρέθεντο
  chosen: they stored up
  alternatives:
  - they set aside
  - they laid in
  lexicon: LSJ
  rationale: In context with εἰς ἐπισιτισμὸν, the verb indicates provisioning or setting supplies in place. 'Stored up' communicates deliberate accumulation for coming need.
- source_word: ἐπισιτισμὸν
  chosen: food supplies
  alternatives:
  - provisions
  - supplies of food
  lexicon: LSJ
  rationale: The noun denotes provisioning, especially food supply. 'Food supplies' is concrete and natural in English.
- source_word: εἰς παρασκευὴν πολέμου
  chosen: in preparation for war
  alternatives:
  - for war preparation
  - for the preparation of war
  lexicon: LSJ
  rationale: 'παρασκευή here means preparation, not the later technical sense ''Friday.'' The genitive πολέμου specifies the purpose: readiness for war.'
- source_word: προσφάτως
  chosen: newly
  alternatives:
  - recently
  - freshly
  lexicon: LSJ
  rationale: The adverb marks recent occurrence. 'Newly harvested' is idiomatic English and fits the agricultural context.
- source_word: τεθερισμένα
  chosen: had been harvested
  alternatives:
  - had been reaped
  lexicon: LSJ
  rationale: Perfect passive participle from θερίζω. 'Harvested' is the most accessible modern equivalent; 'reaped' is possible but slightly more traditional in tone.
