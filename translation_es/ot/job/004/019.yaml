translation:
  language: es
  text: ¡Cuánto más[a] los que habitan en casas de barro, cuyo fundamento está en el polvo[b], son aplastados[c] antes que la polilla[d]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incluso». La partícula hebrea puede traducirse más literalmente como «incluso/de hecho», pero aquí probablemente intensifica el argumento; por eso se vierte «Cuánto más».
    reason: lexical_alternative
  - marker: b
    text: O «su fundamento está en el polvo».
    reason: lexical_alternative
  - marker: c
    text: O «son quebrantados» / «quedan aplastados». El hebreo expresa una destrucción violenta y puede presentarse de modo pasivo o resultativo.
    reason: lexical_alternative
  - marker: d
    text: O «más pronto que una polilla» / «más fácilmente que una polilla». La expresión «antes que la polilla» conserva la formulación más literal, pero probablemente comunica cuán rápida o fácilmente son destruidos los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  english_pob_choice: how much more
  chosen_spanish: ¡Cuánto más[a]
  alternatives_spanish:
  - incluso
  - ciertamente
  - también
  lexicon: HALOT
  rationale: En el argumento de menor a mayor, la partícula no solo añade sino que intensifica; por eso «Cuánto más» reproduce mejor la fuerza inferencial que un simple «incluso».
- source_word: שֹׁכְנֵי
  english_pob_choice: those who dwell
  chosen_spanish: los que habitan
  alternatives_spanish:
  - los moradores de
  - los que viven en
  lexicon: HALOT
  rationale: El participio expresa una acción/hábito continuo. «Los que habitan» suena natural en español y conserva el matiz durativo.
- source_word: בָתֵּי חֹמֶר
  english_pob_choice: houses of clay
  chosen_spanish: casas de barro
  alternatives_spanish:
  - casas de arcilla
  - viviendas de barro
  - casas de tierra
  lexicon: HALOT
  rationale: «Barro» comunica bien la fragilidad material y la imagen corporal-metafórica. «Arcilla» es más literal, pero en español puede sonar más técnico y menos vivo; el contexto poético permite esta equivalencia transparente.
- source_word: אֲשֶׁר
  english_pob_choice: whose
  chosen_spanish: cuyo
  alternatives_spanish:
  - que
  - de los cuales
  lexicon: HALOT
  rationale: La relativa de posesión en español se expresa mejor con «cuyo», que enlaza con naturalidad el fundamento y el sujeto implícito sin romper la metáfora.
- source_word: בֶּעָפָר
  english_pob_choice: in the dust
  chosen_spanish: en el polvo
  alternatives_spanish:
  - en la tierra
  - en el polvo de la tierra
  lexicon: HALOT
  rationale: «Polvo» mantiene la resonancia antropológica de mortalidad y origen humano. «Tierra» es posible, pero «polvo» preserva mejor el eco poético del hebreo.
- source_word: יְסוֹדָם
  english_pob_choice: whose foundation
  chosen_spanish: cuyo fundamento
  alternatives_spanish:
  - su fundamento
  - cuya base
  lexicon: HALOT
  rationale: «Fundamento» reproduce el valor arquitectónico y metafórico del sustantivo. La posesión relativa queda bien resuelta con «cuyo».
- source_word: יְדַכְּא֗וּ/ם
  english_pob_choice: who are crushed
  chosen_spanish: son aplastados[c]
  alternatives_spanish:
  - son triturados
  - son quebrantados
  - quedan aplastados
  lexicon: HALOT
  rationale: El verbo denota aplastar/crush. En español, «son aplastados» conserva la pasiva y la violencia de la imagen sin agregar un agente inexistente en el hebreo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - antes de
  lexicon: HALOT
  rationale: «Delante de» sigue de cerca el valor espacial de la preposición y mantiene la ambigüedad poética que puede implicar comparación de facilidad/rapidez.
- source_word: עָשׁ
  english_pob_choice: the moth
  chosen_spanish: la polilla[d]
  alternatives_spanish:
  - la mariposa nocturna
  - la polilla
  lexicon: HALOT
  rationale: «Polilla» es el equivalente natural en español para el insecto de la comparación y resulta idiomático en esta imagen proverbial.
theological_decisions:
- issue: Imagen metafórica de «casas de barro / polvo»
  english_pob_reading: A metaphor for mortal human frailty, likely referring to human bodies and earthly existence.
  chosen_spanish_reading: Una metáfora de la fragilidad mortal del ser humano, con referencia probable al cuerpo humano y a la existencia terrenal.
  alternative_spanish_readings:
  - Una referencia literal a casas construidas con barro
  - Una metáfora más general de vivienda precaria
  rationale: El contexto poético contrasta lo celestial con lo humano y subraya la vulnerabilidad de los mortales. La traducción conserva la metáfora sin explicarla en exceso dentro del texto principal, pero en términos auditablemente compatibles con la lectura del inglés POB.
  doctrine_reference: Antropología bíblica / mortalidad humana
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no cambió el contenido: se mantuvo la lectura intensificadora de אַף, el sustantivo metafórico de las «casas de clay», el relativo posesivo, la pasiva de דכא y la imagen proverbial de la polilla. La versión española sigue esos mismos ejes sin introducir reinterpretaciones.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - Se mantiene el tono poético y la ambigüedad controlada del hebreo, sin explicitar un agente para «son aplastados».
  - «Barro» y «polvo» se conservaron por su fuerza imagética y antropológica en español; no se sustituyeron por vocablos más técnicos que debiliten la metáfora.
