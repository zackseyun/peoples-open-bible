translation:
  language: es
  text: Porque miren[a], sería vergonzoso para nosotros si dejáramos pasar a una mujer así sin hablar con ella; porque si no la atraemos hacia nosotros, se burlará de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si no la seducimos» o «si no la ganamos para nosotros». El verbo griego puede sugerir atraer a alguien hacia uno mismo, y aquí probablemente implica un intento de captarla o seducirla.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: For look
  chosen_spanish: Pues mirad[a]
  alternatives_spanish:
  - Mirad
  - Ved
  lexicon: LSJ
  rationale: Mantiene la fuerza deíctica y exhortativa de ἰδού, con un conector discursivo que refleja γάρ. «Pues» ayuda a conservar la relación explicativa; «mirad» comunica mejor el llamado a atención en español actual.
- source_word: αἰσχρὸν
  english_pob_choice: shameful
  chosen_spanish: vergonzoso
  alternatives_spanish:
  - vergonzoso para nosotros
  - deshonroso
  - bochornoso
  lexicon: LSJ
  rationale: En este contexto la idea es de deshonra social o bochorno, no de fealdad física. «Vergonzoso» reproduce el campo semántico del honor y la vergüenza de forma natural.
- source_word: τῷ προσώπῳ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - a nuestra vista
  - delante de nosotros
  - ante nuestro rostro
  lexicon: LSJ
  rationale: Se conserva el sentido idiomático de «para nuestro rostro» como lo que afecta nuestro honor o reputación, sin literalidad rígida. «Para nosotros» es la equivalencia más clara y fluida.
- source_word: παρήσομεν
  english_pob_choice: we let ... go
  chosen_spanish: dejáramos pasar
  alternatives_spanish:
  - dejáramos ir
  - dejáramos partir
  - la permitiéramos pasar
  lexicon: LSJ
  rationale: El futuro de παρίημι aquí expresa dejar pasar o dejar ir. «Dejar pasar» conserva la idea de permitir que continúe su camino sin detenerla.
- source_word: οὐχ ὁμιλήσαντες αὐτῇ
  english_pob_choice: without speaking with her
  chosen_spanish: sin hablarle
  alternatives_spanish:
  - sin hablar con ella
  - sin conversar con ella
  - sin dirigirle la palabra
  lexicon: LSJ
  rationale: 'Resume de manera natural el participio aoristo con negación: dejarla pasar sin haberle hablado antes. «Hablarle» es más conciso y idiomático que una perífrasis más pesada.'
- source_word: ἐπισπάσωμεθα
  english_pob_choice: draw her in
  chosen_spanish: la atraemos
  alternatives_spanish:
  - la seducimos
  - la ganamos para nosotros
  - la atraemos hacia nosotros
  lexicon: LSJ
  rationale: El verbo puede significar atraer hacia uno mismo, y en este contexto sugiere una acción manipuladora o de seducción. «Atraemos» conserva la ambigüedad controlada sin explicitar más de lo que el griego exige.
- source_word: καταγελάσεται ἡμῶν
  english_pob_choice: she will laugh at us
  chosen_spanish: se burlará de nosotros
  alternatives_spanish:
  - se reirá de nosotros
  - se mofará de nosotros
  - nos ridiculizará
  lexicon: LSJ
  rationale: El verbo abarca reírse de, burlarse o ridiculizar. «Se burlará de nosotros» transmite mejor en español la afrenta pública y el desprecio implícitos en el contexto de honor.
theological_decisions:
- issue: Tono de honor y vergüenza en una escena de persuasión/manipulación
  english_pob_reading: The sentence stresses social shame and the possibility of seductive drawing-in.
  chosen_spanish_reading: La frase enfatiza la vergüenza pública y la posibilidad de atraerla para influir en ella.
  alternative_spanish_readings:
  - La frase podría leerse solo como una cuestión de conversación previa.
  - Podría suavizarse a una mera invitación social.
  rationale: No hay una cuestión doctrinal directa, pero sí una carga ética y social importante. La traducción conserva la tensión entre simple conversación y posible intento de seducción, como permite el verbo griego y la nota del POB inglés.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta que el texto inglés POB ya había revisado la lectura sin cambios, y que la nota léxica mantiene la ambigüedad de ἐπισπάσωμεθα entre atraer, seducir o ganar para sí. La versión española conserva esa tensión sin resolverla excesivamente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «vergonzoso» y «se burlará de nosotros» para conservar el registro de honor/vergüenza del griego.
  - La nota [a] se ancla en «mirad» para reflejar tanto la partícula introductoria como la llamada de atención.
