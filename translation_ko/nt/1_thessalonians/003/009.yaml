base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/009.yaml
  text: For what thanksgiving can we repay to God concerning you[a], for all the joy with which we rejoice because of you before our God,
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'How can we thank God enough for you...?' The Greek more literally says, 'What thanksgiving can we repay to God concerning you...?'
