translation:
  language: es
  text: Te revestirás de ella como de vestiduras de honor[a], y te coronarás con ella como con una corona de esplendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «una corona de regocijo/exultación» en lugar del hebreo «una corona de esplendor». El texto principal sigue el testimonio hebreo conservado, y esta nota preserva el matiz paralelo del griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּגְדֵי כָבוֹד / στολὴν δόξης
  english_pob_choice: garments of honor
  chosen_spanish: vestiduras de honor
  alternatives_spanish:
  - vestiduras de gloria
  - ropas de honor
  - ropas gloriosas
  lexicon: HALOT
  rationale: Hebreo y griego comparten la imagen de vestimenta asociada con honor/gloria. 'Vestiduras de honor' conserva la concreción de la imagen y su dignidad sin sonar forzado en español.
- source_word: תִלְבְּשֶׁנָּה / ἐνδύσῃ αὐτήν
  english_pob_choice: you will wear her
  chosen_spanish: te vestirás de ella
  alternatives_spanish:
  - la llevarás puesta
  - te la pondrás
  - te revestirás de ella
  lexicon: HALOT
  rationale: El verbo hebreo y el paralelo griego expresan la imagen de ponerse una prenda. En español, 'te vestirás de ella' mantiene la metáfora corporal y permite el referente femenino personificado sin calco pesado.
- source_word: וַעֲטֶרֶת תִּפְאֶרֶת / στέφανον ἀγαλλιάματος
  english_pob_choice: a crown of splendor
  chosen_spanish: una corona de esplendor
  alternatives_spanish:
  - una corona de gloria
  - una diadema de esplendor
  - una corona de regocijo
  lexicon: HALOT
  rationale: El hebreo favorece 'esplendor' para תִּפְאֶרֶת. Se conserva esa lectura principal, mientras el matiz griego de 'regocijo/exultación' queda registrado en la nota textual.
- source_word: תְּעַטְּרֶנָּה / περιθήσεις σεαυτῷ
  english_pob_choice: you will crown yourself with her
  chosen_spanish: te coronarás con ella
  alternatives_spanish:
  - te ceñirás con ella como corona
  - te adornarás con ella
  - te pondrás sobre ti una corona
  lexicon: HALOT
  rationale: El hebreo y el griego presentan una acción reflexiva. 'Te coronarás con ella' suena natural en español y conserva la fuerza figurada de envolver/se adornar con Sabiduría.
theological_decisions:
- issue: Personificación de la sabiduría como femenino
  english_pob_reading: The verse continues the personification of wisdom as 'her.'
  chosen_spanish_reading: Se mantiene el femenino 'ella' para la Sabiduría.
  alternative_spanish_readings:
  - 'Se impersonaliza la imagen: ''te vestirás de vestiduras de honor'''
  - Se evita el pronombre explícito femenino
  rationale: El contexto inmediato de Sirácida 6 personifica la sabiduría como mujer. Mantener 'ella' preserva la textura literaria y teológica del pasaje en lugar de volverlo abstracto.
  doctrine_reference: Principios de consistencia terminológica y de transparencia textual del POB
- issue: Relación entre la lectura hebrea principal y el matiz griego
  english_pob_reading: Main text follows the extant Hebrew witness, with the Greek kept here as a meaningful parallel nuance.
  chosen_spanish_reading: El texto principal sigue el testimonio hebreo, con la nota que preserva el matiz griego de 'corona de exultación/regocijo'.
  alternative_spanish_readings:
  - Incorporar el matiz griego al texto principal
  - Eliminar la diferencia entre hebreo y griego
  rationale: La evidencia hebrea y la griega no son idénticas en el segundo hemistiquio. La traducción principal conserva el hebreo ('esplendor'), y la nota mantiene la tensión textual sin borrarla.
  doctrine_reference: POB, fidelidad a los testigos textuales y conservación de variantes significativas
translation_notes:
  revision_awareness: La redacción inglesa revisó 'put her on' por 'wear her' para sonar más natural sin perder la metáfora de vestirse. En español, 'te vestirás de ella' ya comunica esa naturalidad y mantiene el objeto femenino personificado, por lo que no requiere una solución más literal ni más explicativa.
  spanish_consistency_notes:
  - Se usa 'Sabiduría' de manera implícita en el referente femenino, conforme al contexto inmediato de Sirácida 6.
  - '''Esplendor'' se mantiene como traducción principal de תִּפְאֶרֶת, en continuidad con la decisión hebrea del POB.'
  - La nota a pie de página distingue claramente el matiz griego sin desplazar el texto principal hebreo.
