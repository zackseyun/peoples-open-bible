lexical_decisions:
- source_word: Ἔτι
  english_pob_choice: while ... still
  chosen_spanish: Mientras todavía
  alternatives_spanish:
  - Todavía
  - Aún
  lexicon: LSJ
  rationale: En español, «mientras todavía» conserva con naturalidad la acción en curso y la simultaneidad implícita del griego, sin perder el matiz de continuidad que la versión inglesa resolvió con «while ... still».
- source_word: αἱ ἐπιστολαὶ
  english_pob_choice: the letters
  chosen_spanish: las cartas
  alternatives_spanish:
  - los escritos
  - las misivas
  lexicon: LSJ
  rationale: «Cartas» es el equivalente más natural en español para el plural narrativo; mantiene el sentido de mensajes escritos sin forzar un tecnicismo.
- source_word: ἀνεγινώσκοντο
  english_pob_choice: were being read
  chosen_spanish: se leían
  alternatives_spanish:
  - eran leídas
  - estaban siendo leídas
  lexicon: LSJ
  rationale: El imperfecto pasivo pide una acción en curso; en español, «se leían» suena idiomático y fiel al aspecto progresivo.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  lexicon: LSJ
  rationale: «He aquí» reproduce la función deíctica y súbita de la partícula narrativa con un registro digno y bíblico, pero todavía natural en español.
- source_word: ἄγγελοι ἕτεροι
  english_pob_choice: other messengers
  chosen_spanish: otros mensajeros
  alternatives_spanish:
  - otros enviados
  - otros portadores de noticias
  lexicon: LSJ
  rationale: «Mensajeros» evita la lectura angélica celestial y sigue la decisión inglesa de referir a portadores humanos de noticias; «otros» conserva la distinción de ἕτεροι.
- source_word: παρεγένοντο
  english_pob_choice: arrived
  chosen_spanish: llegaron
  alternatives_spanish:
  - arribaron
  - se presentaron
  lexicon: LSJ
  rationale: «Llegaron» expresa con claridad la entrada en escena en un español actual y sobrio.
- source_word: ἐκ τῆς Γαλιλαίας
  english_pob_choice: from Galilee
  chosen_spanish: desde Galilea
  alternatives_spanish:
  - de Galilea
  - procedentes de Galilea
  lexicon: LSJ
  rationale: «Desde» conserva el movimiento de procedencia y suena natural en la secuencia narrativa.
- source_word: διερρηχότες τὰ ἱμάτια
  english_pob_choice: with their garments torn
  chosen_spanish: con sus vestiduras rasgadas
  alternatives_spanish:
  - con sus ropas rasgadas
  - habiendo rasgado sus vestiduras
  lexicon: LSJ
  rationale: «Vestiduras» preserva el matiz formal y ritual del gesto de duelo o alarma mejor que «ropa»; «rasgadas» mantiene el estado resultante señalado por el participio perfecto.
- source_word: ἀπαγγέλλοντες
  english_pob_choice: reporting
  chosen_spanish: informando
  alternatives_spanish:
  - anunciando
  - dando noticia
  lexicon: LSJ
  rationale: «Informando» comunica el acto de transmitir noticia sin añadir solemnidad extra; encaja con el contexto narrativo de relato en curso.
- source_word: κατὰ τὰ ῥήματα ταῦτα
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - este mensaje
  - de este modo
  lexicon: LSJ
  rationale: «Estas palabras» sigue de cerca el griego y mantiene la referencia al contenido concreto del informe, como la versión inglesa.
theological_decisions:
- issue: ἄγγελοι en contexto narrativo histórico
  english_pob_reading: human messengers, not heavenly angels
  chosen_spanish_reading: mensajeros humanos, no ángeles celestiales
  alternative_spanish_readings:
  - ángeles
  - enviados
  rationale: El contexto histórico y el audit trail inglés descartan una lectura celestial. En español, «mensajeros» preserva la ambigüedad formal del término griego pero guía al lector hacia el sentido humano requerido por la escena.
  doctrine_reference: Narrative semantics; lexical context over default theological sense
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren cambios de sentido. La principal decisión española fue conservar el valor aspectual del imperfecto y el matiz narrativo de ἄγγελοι ἕτεροι sin introducir una lectura angélica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita «Cristo/Mesías» porque no aparece terminología mesiánica en el texto.
  - «Vestiduras» conserva un registro bíblico sobrio y ayuda a reflejar el carácter de duelo/alarma del gesto.
  - 'La puntuación y el orden español siguen el flujo narrativo del griego: lectura en curso, irrupción de los mensajeros, descripción de su estado y del contenido del informe.'
