  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La revisión propuesta sigue el razonamiento léxico auditado: mantener «altar de oro», «aceite de la unción», «incienso aromático», y distinguir מָסַךְ de otros términos de velo/cortina mediante una alternativa mejor enfocada en la nota.'
