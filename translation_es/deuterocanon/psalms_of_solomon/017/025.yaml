review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura principal del griego: los modificadores «ἐν σοφίᾳ, ἐν δικαιοσύνῃ» se aplican correctamente al imperativo al colocarse al inicio; «Jerusalén» y «las naciones» corresponden fielmente; y la nota sobre «gentiles» preserva la alternativa léxica del POB inglés. Sin embargo, «que la aplastan» se aleja de καταπατούντων, que en este contexto se entiende mejor como «pisotean»/«hollan», y «en destrucción» suena poco natural en español aunque sea formalmente cercano al griego.'
  spanish_quality_summary: El español es generalmente claro, pero «en destrucción» resulta torpe y poco idiomático. Además, «aplastan» transmite más bien destrucción física total que el matiz de pisotear/oprimir hostilmente. «Purifica» expresa mejor el valor de καθάρισον que «limpia» en un registro bíblico digno, sin sonar arcaico. Una revisión menor mejora fidelidad y legibilidad sin apartarse del audit trail inglés.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. «Justicia» para δικαιοσύνη y «naciones» para ἐθνῶν están bien justificadas. La alternativa «rectitud» puede mantenerse en nota. La mejora propuesta se centra en matiz verbal y naturalidad española: καθάρισον -> «purifica», καταπατούντων -> «pisotean», ἐν ἀπωλείᾳ -> «para ruina».'
  issues:
  - severity: medium
    issue: «limpia» es adecuado pero menos preciso que «purifica» para καθάρισον.
    rationale: El imperativo tiene matiz de limpieza/purificación decisiva; en español bíblico «purifica» conserva mejor la fuerza cultual y solemne sin perder claridad.
  - severity: medium
    issue: «que la aplastan» no representa tan bien καταπατούντων.
    rationale: El verbo griego expresa hollar o pisotear con desprecio/opresión. «Aplastar» cambia la imagen y puede sobreinterpretar el grado de destrucción.
  - severity: medium
    issue: «en destrucción» suena poco natural en español.
    rationale: Aunque imita de cerca ἐν ἀπωλείᾳ, en español produce una frase extraña. «Para ruina» mantiene el sentido de resultado devastador y además coincide con una alternativa ya documentada en el audit trail.
  revised_spanish_text: En sabiduría y justicia[a][b], purifica a Jerusalén de las naciones[c] que la pisotean para ruina[d].
