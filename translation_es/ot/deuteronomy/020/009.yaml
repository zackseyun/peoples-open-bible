translation:
  language: es
  text: Y cuando los oficiales hayan terminado de hablarle al pueblo, nombrarán comandantes de ejércitos[a] al frente del pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pasarán revista a comandantes de ejércitos sobre el pueblo». El verbo puede llevar sentidos como nombrar, pasar revista o poner a cargo, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה / וְהָיָה כְּכַלֹּת
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: La fórmula narrativa seguida de un infinitivo constructo introduce una cláusula temporal. En español, «Y cuando» comunica de forma natural la relación temporal sin imponer una paráfrasis excesiva.
- source_word: הַשֹּׁטְרִים
  english_pob_choice: the officers
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los oficiales administrativos
  - los supervisores
  lexicon: HALOT
  rationale: En Deuteronomio el término designa funcionarios nombrados para organizar y hablar al pueblo; «oficiales» mantiene la función administrativa y el tono militar/cívico del contexto.
- source_word: לְדַבֵּר אֶל הָעָם
  english_pob_choice: speaking to the people
  chosen_spanish: hablar al pueblo
  alternatives_spanish:
  - hablarle al pueblo
  - dirigirse al pueblo
  lexicon: HALOT
  rationale: El hebreo expresa de manera directa hablar al pueblo. «Hablar al pueblo» conserva la sencillez del original y evita sobreespecificar «tropos» o «tropas».
- source_word: וּפָקְדוּ
  english_pob_choice: they shall appoint
  chosen_spanish: pondrán
  alternatives_spanish:
  - nombrarán
  - designarán
  - pondrán a cargo
  lexicon: HALOT
  rationale: El verbo פקד abarca nombrar, disponer o poner al mando. Dado que el complemento describe la instalación de líderes sobre el pueblo, «pondrán» transmite la acción de establecerlos en función sin cerrar indebidamente el rango semántico.
- source_word: שָׂרֵי צְבָאוֹת
  english_pob_choice: commanders of armies
  chosen_spanish: capitanes de ejércitos
  alternatives_spanish:
  - comandantes de ejércitos
  - jefes de ejércitos
  - capitanes de las fuerzas
  lexicon: HALOT
  rationale: «שָׂרִים» son jefes o comandantes; «צְבָאוֹת» aquí se refiere a fuerzas militares. «Capitanes de ejércitos» es una forma clara y bíblicamente idiomática en español, sin recurrir a «hosts» ni a terminología eclesiástica.
- source_word: בְּרֹאשׁ הָעָם
  english_pob_choice: at the head of the people
  chosen_spanish: al frente del pueblo
  alternatives_spanish:
  - sobre el pueblo
  - a la cabeza del pueblo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para designar liderazgo. «Al frente del pueblo» conserva la imagen espacial del original y sugiere autoridad sin traducirla de manera más interpretativa que «sobre el pueblo».
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó el artículo antes de «armies» para reflejar mejor el plural constructo. En español se evitó también cualquier artículo innecesario en «ejércitos». El resto del versículo se mantuvo en línea con la lectura auditada: cláusula temporal, acción de hablar al pueblo y posterior nombramiento de jefes militares al frente de la gente.'
  spanish_consistency_notes:
  - Se usó «pueblo» para הָעָם, manteniendo uniformidad con el contexto inmediato.
  - Se prefirió «oficiales» para הַשֹּׁטְרִים en lugar de «escribas», por la función administrativa y militar del pasaje.
  - «Capitanes de ejércitos» preserva el plural de צְבָאוֹת sin convertirlo en un singular colectivo.
  - La colocación «al frente del pueblo» conserva la imagen de liderazgo sin añadir explicaciones interpretativas al texto principal.
