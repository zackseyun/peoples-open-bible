translation:
  language: es
  text: Su alma habitará en el bien[b], y su descendencia heredará la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra» en sentido más amplio, es decir, «la tierra entera» o «el mundo». El hebreo אֶרֶץ puede significar «tierra» o «mundo»; aquí «la tierra» encaja mejor con el sentido pactal de heredar.
    reason: alternative_reading
  - marker: b
    text: O «se alojará» o «pasará la noche». El verbo hebreo lleva la imagen de alojarse o pasar la noche, aquí expresada como una permanencia estable.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - él mismo
  - su vida
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o persona misma. En este verso poético, "su alma" preserva el paralelismo y la imagen hebrea sin reducirla a un simple "él".
- source_word: בְּטוֹב
  english_pob_choice: in goodness
  chosen_spanish: en el bien
  alternatives_spanish:
  - en prosperidad
  - en bienestar
  - en bondad
  lexicon: HALOT
  rationale: טוֹב abarca bien, bondad, bienestar y prosperidad. "En el bien" suena natural en español y mantiene la amplitud semántica del hebreo, sin limitarlo solo a prosperidad material.
- source_word: תָלִין
  english_pob_choice: will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - se alojará
  - pasará la noche
  - permanecerá
  lexicon: HALOT
  rationale: לון conserva la imagen de alojarse o pasar la noche, pero en poesía puede expresar permanencia estable. "Habitará" comunica continuidad asentada con buena fluidez en español.
- source_word: וְזַרְעוֹ
  english_pob_choice: and his offspring
  chosen_spanish: y su descendencia
  alternatives_spanish:
  - y su simiente
  - y sus descendientes
  - y su linaje
  lexicon: HALOT
  rationale: זֶרַע se usa aquí en sentido familiar y colectivo. "Descendencia" es una forma natural y amplia en español para este valor genealógico.
- source_word: יִירַשׁ
  english_pob_choice: will inherit
  chosen_spanish: heredará
  alternatives_spanish:
  - poseerá
  - tomará posesión de
  lexicon: HALOT
  rationale: ירשׁ suele expresar heredar o tomar posesión. "Heredará" conserva el matiz de recepción de una herencia y encaja bien con el lenguaje de pacto.
- source_word: אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  - la región
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra o país, y en otros contextos también la tierra en sentido amplio. Aquí, siguiendo la decisión inglesa de mantener la lectura covenantal sin forzar "earth", "la tierra" es la opción más directa y fiel en español.
theological_decisions:
- issue: Alcance de אָרֶץ con יִירַשׁ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra
  - el mundo
  rationale: El hebreo permite "tierra" o "tierra/país" en sentido territorial, mientras que "el mundo" sería demasiado amplio para este contexto. Mantener "la tierra" preserva el eco pactal sin cerrar indebidamente la ambigüedad del hebreo.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la versión inglesa auditada. Se mantuvo la estructura poética y la tensión semántica de אֶרֶץ sin expandirla a "el mundo"; también se prefirió una solución española natural para לון sin perder la imagen de residencia/estancia.
  spanish_consistency_notes:
  - Se usa "Yahvé" como término estándar cuando el texto lo requiera, pero este versículo no lo contiene.
  - '"La tierra" conserva mejor el valor pactal que "la tierra prometida", que añade especificidad no explicitada.'
  - '"Descendencia" mantiene el sentido colectivo de זרע sin introducir una lectura biológica demasiado estrecha.'
  - La combinación "su alma" / "habitará" preserva el paralelismo poético y la personificación hebrea.
