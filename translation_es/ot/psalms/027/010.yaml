translation:
  language: es
  text: Porque mi padre y mi madre me han abandonado[a], pero Yahvé me acogerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me han desamparado». El verbo hebreo puede expresar abandono o desamparo en un sentido relacional profundo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - For
  lexicon: HALOT
  rationale: Aquí כִּי introduce la base o circunstancia de la confianza del salmista; «Porque» preserva ese enlace causal o explicativo sin forzarlo a un matiz concesivo.
- source_word: אָבִי
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - mi papá
  lexicon: HALOT
  rationale: La posesión es directa y el sustantivo es literal; «mi padre» mantiene el registro bíblico y claro.
- source_word: וְאִמִּי
  english_pob_choice: and my mother
  chosen_spanish: y mi madre
  alternatives_spanish:
  - y mi mamá
  lexicon: HALOT
  rationale: Conjunción simple más posesivo; «y mi madre» conserva la simetría con «mi padre».
- source_word: עֲזָבוּנִי
  english_pob_choice: have forsaken me
  chosen_spanish: me han abandonado
  alternatives_spanish:
  - me han dejado
  - me han desamparado
  lexicon: HALOT
  rationale: עָזַב puede significar dejar, abandonar o desamparar. En español, «abandonado» comunica la fuerza afectiva y relacional del verbo mejor que un simple «dejado».
- source_word: וַיהוָה
  english_pob_choice: but Yahweh
  chosen_spanish: pero Yahvé
  alternatives_spanish:
  - y Yahvé
  - mas Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del proyecto como «Yahvé». El prefijo waw es formalmente «y», pero el contraste del contexto queda mejor expresado en español con «pero».
- source_word: יַאַסְפֵנִי
  english_pob_choice: will take me in
  chosen_spanish: me recibirá
  alternatives_spanish:
  - me acogerá
  - me recogerá
  - me recibirá y me protegerá
  lexicon: HALOT
  rationale: אָסַף literalmente es «reunir, recoger, juntar», y en contexto personal puede implicar recibir con acogida. «Me recibirá» refleja la decisión revisada del POB inglés y su sentido de acogida protectora sin introducir una imagen demasiado mecánica de «reunir».
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el default del proyecto para el nombre pactal, evitando la sustitución litúrgica por «SEÑOR» y manteniendo transparencia respecto del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Fuerza del contraste entre abandono humano y acogida divina
  english_pob_reading: but Yahweh will take me in
  chosen_spanish_reading: pero Yahvé me recibirá
  alternative_spanish_readings:
  - y Yahvé me recibirá
  - pero Yahvé me acogerá
  rationale: El pasaje contrasta el abandono de los padres con la respuesta de Yahvé. «Pero» comunica con claridad el contraste; «recibirá» mantiene la acogida personal sin ampliar indebidamente el alcance semántico.
  doctrine_reference: 'DOCTRINE.md: lexical transparency and contextual contrast'
translation_notes:
  revision_awareness: El borrador español sigue la revisión más reciente del POB inglés, que prefirió «will take me in» frente a «will gather me in». Por eso se evita una traducción demasiado literal de «reunir» en el texto principal y se conserva esa alternativa en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el criterio del proyecto para יהוה.
  - Se evita «SEÑOR» como máscara litúrgica para mantener transparencia de fuente.
  - «Me han abandonado» conserva mejor la carga relacional que «me han dejado».
  - La nota preserva la tensión semántica de אָסַף sin borrar la imagen de acogida y protección.
