translation:
  language: es
  text: 'Es por tu mandato, de manera sencilla, ¿y por qué se hacía? Y ahora hablaré: acerca de todo ser humano tú sabes mejor, pero acerca de tu pueblo'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: est tuo iussu
  english_pob_choice: It is by your command
  chosen_spanish: Está por tu mandato
  alternatives_spanish:
  - Es por tu mandato
  - Está por tu orden
  lexicon: iussus / iussu
  rationale: El latín expresa causalidad/instrumentalidad (“por tu mandato”), no solo una orden abstracta. “Mandato” mantiene el tono jurídico y la relación de autoridad mejor que una paráfrasis más libre.
- source_word: facili ordine
  english_pob_choice: in an easy order
  chosen_spanish: con un orden fácil
  alternatives_spanish:
  - de manera fácil
  - en un orden sencillo
  lexicon: ordo
  rationale: Se conserva la secuencia nominal del original. “Orden fácil” es la opción más directa y transparente; “sencillo” sería válido, pero “fácil” reproduce mejor la cualidad del sintagma latino.
- source_word: et utquid fiebat?
  english_pob_choice: and why was it done?
  chosen_spanish: ¿y por qué se hacía?
  alternatives_spanish:
  - ¿y por qué se hacía esto?
  - ¿y para qué se hacía?
  lexicon: utquid / fieri
  rationale: El latín pregunta por la razón de un hecho sin especificar explícitamente el sujeto. “Se hacía” conserva la impersonalidad y evita introducir un “esto” no presente en el texto.
- source_word: dicens dicam
  english_pob_choice: I will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - ciertamente hablaré
  lexicon: dico
  rationale: La repetición enfática del latín se puede reflejar con el simple futuro “hablaré” en español, manteniendo naturalidad. No se introdujo “ciertamente” para no sobrerrepresentar el valor enfático más allá de lo que la forma ya permite.
- source_word: de omni homine tu magis scis
  english_pob_choice: concerning every man you know better
  chosen_spanish: acerca de todo hombre tú lo sabes mejor
  alternatives_spanish:
  - respecto de todo hombre tú sabes mejor
  - de cada hombre tú sabes mejor
  lexicon: omnis homo / scire
  rationale: Se mantiene el comparativo “mejor” del latín (“magis”) y el objeto humano universal (“todo hombre”). “Tú lo sabes” preserva la referencia general del conocimiento sin añadir contenido interpretativo.
- source_word: de populo autem tuo
  english_pob_choice: but concerning your people
  chosen_spanish: pero acerca de tu pueblo
  alternatives_spanish:
  - pero respecto de tu pueblo
  - sin embargo, acerca de tu pueblo
  lexicon: populus
  rationale: “Pueblo” es la traducción estable de populus en este contexto; se conserva el contraste adversativo del latín con “pero”.
theological_decisions:
- issue: Alcance del conocimiento divino frente al pueblo
  english_pob_reading: concerning every man you know better, but concerning your people
  chosen_spanish_reading: acerca de todo hombre tú lo sabes mejor, pero acerca de tu pueblo
  alternative_spanish_readings:
  - acerca de todo hombre tú lo conoces mejor, pero acerca de tu pueblo
  - con respecto a todo hombre tú sabes más, pero respecto de tu pueblo
  rationale: El texto contrapone el conocimiento de Dios sobre cada ser humano con una mención especial de su pueblo, sin completar aquí la cláusula afectiva que el testimonio latino no trae en esta línea. Por eso no se añadió ninguna expansión devocional.
  doctrine_reference: Providencia y omnisciencia divina; fidelidad especial de Dios a su pueblo.
translation_notes:
  revision_awareness: Se siguió el testimonio latino limpiado de Bensly 1895 + fragmento faltante, atendiendo a la revisión que corrigió la expansión no sustentada de la versión inglesa previa. La redacción española evita añadir la cláusula afectiva eliminada en la última pasada y conserva la estructura breve y abierta del original.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque el texto latino no contiene el nombre divino explícito.
  - Se usó 'pueblo' para populus y 'mandato' para iussu para preservar el registro bíblico-jurídico sin introducir terminología eclesiástica posterior.
  - No se añadió una nota teológica sobre dolor/pesar porque la cláusula correspondiente no está presente en esta línea del testimonio latino proporcionado.
