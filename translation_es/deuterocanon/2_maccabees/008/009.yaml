revisions:
- from: Pero él eligió rápidamente a Nicanor, hijo de Patroclo[a], uno de sus principales Amigos, y lo envió, habiéndole asignado no menos de veinte mil de naciones de toda clase[b], para exterminar a todo el pueblo judío[c]. También le asignaron a Gorgias, un hombre que era general y tenía experiencia en asuntos de guerra.
  to: Pero él eligió rápidamente a Nicanor, hijo de Patroclo[a], uno de sus principales Amigos, y lo envió, habiéndole asignado no menos de veinte mil procedentes de naciones de toda clase[b], para exterminar a todo el pueblo judío[c]. También nombraron junto con él a Gorgias, un hombre que era general y tenía experiencia en asuntos de guerra.
  rationale: Se corrigió la cláusula sobre Gorgias para reflejar con más precisión que fue nombrado junto con Nicanor, no simplemente asignado a él. También se suavizó «de naciones de toda clase» a «procedentes de naciones de toda clase» para mejorar la naturalidad del español sin perder la amplitud semántica de παμφύλων ἔθνη. Se mantuvieron las buenas decisiones existentes sobre «Amigos» y «pueblo judío».
