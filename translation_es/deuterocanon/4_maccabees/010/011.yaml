    rationale: La expresión es poco idiomática en español y puede entenderse como si la sangre fuera la culpable. El griego apunta a culpa por derramamiento de sangre con matiz de contaminación; «culpa de sangre» comunica eso mejor y coincide con la nota ya ofrecida.
  - severity: low
