review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: וַיִּגְבְּרוּ se refleja adecuadamente con «prevalecieron», הַמַּיִם con «las aguas», y la duración «por 150 días» expresa naturalmente el valor temporal implícito. «Sobre la tierra» también es una representación válida de עַל הָאָרֶץ en este contexto.'
  spanish_quality_summary: 'El texto principal es claro, natural y fiel. La única falla significativa está en la nota al pie: altera indebidamente la alternativa léxica documentada en inglés. Donde el POB inglés contrasta «earth» con «land», el borrador español introduce «mundo», que no corresponde al hebreo אֶרֶץ aquí y debilita la precisión. Además, la redacción «tierra/tierra/país» es torpe.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo la coherencia de אֶרֶץ. «Tierra» en el texto principal está bien para earth; la alternativa de nota debe ser «tierra»/«país» o mejor «tierra»/«territorio» según contexto, no «mundo».
  issues:
  - severity: medium
    issue: La nota al pie introduce «mundo» como alternativa
    rationale: El inglés auditado conserva la alternativa léxica «land», no «world». «Mundo» no es la alternativa pertinente para אֶרֶץ en este versículo y desplaza el campo semántico documentado.
  - severity: low
    issue: La nota al pie repite «tierra» de forma confusa
    rationale: 'La formulación «tierra» o «tierra/país» es poco clara en español. Conviene expresar con limpieza la alternativa contextual: «tierra» o «país/territorio».'
  revised_spanish_text: Y las aguas prevalecieron sobre la tierra por 150 días[a].
  revised_footnotes:
  - marker: a
    text: O «sobre el país» en lugar de «sobre la tierra»; el hebreo אֶרֶץ puede significar «tierra» o «país», según el contexto.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es fiel y natural. Se corrige solamente la nota para alinearla con la alternativa léxica documentada en el POB inglés: אֶרֶץ = «tierra» / «país», no «mundo».'
