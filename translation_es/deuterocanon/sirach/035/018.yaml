translation:
  language: es
  text: Toda comida queda encerrada en el vientre,[b] pero una comida[a] es más agradable que otra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es algo comprimido: literalmente, «hay comida de comida que es agradable». El sentido es comparativo: una comida es más agradable que otra.'
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego en este lugar difiere de manera sustancial del hebreo conservado y parece reflejar otra línea de texto; aquí se sigue el testimonio hebreo como fuente principal.
    reason: textual_variant
lexical_decisions:
- source_word: כל מאכל
  english_pob_choice: Any food
  chosen_spanish: Toda comida
  alternatives_spanish:
  - Cualquier comida
  - Toda clase de comida
  lexicon: HALOT
  rationale: El hebreo expresa totalidad distributiva con un sustantivo singular; "toda comida" conserva esa generalidad de forma natural en español.
- source_word: תסגר
  english_pob_choice: is shut up
  chosen_spanish: se encierra
  alternatives_spanish:
  - se cierra
  - queda encerrada
  - se guarda
  lexicon: HALOT
  rationale: La pasiva comunica que la comida termina dentro del cuerpo; "se encierra" mantiene la imagen concreta sin sonar demasiado técnica.
- source_word: בבטן
  english_pob_choice: in the belly
  chosen_spanish: en el vientre
  alternatives_spanish:
  - en el estómago
  - en las entrañas
  lexicon: HALOT
  rationale: '"Vientre" conserva el registro corporal y bíblico de la imagen; aunque "estómago" sería más anatómico, "vientre" es más fiel al tono del hebreo.'
- source_word: אך
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - sin embargo
  lexicon: HALOT
  rationale: Introduce el contraste de manera clara y natural en español.
- source_word: יש מאכל ממאכל
  english_pob_choice: one food ... than another
  chosen_spanish: una comida ... que otra
  alternatives_spanish:
  - una comida ... que otra comida
  - una comida ... más que otra
  lexicon: HALOT
  rationale: El hebreo es compacto y comparativo; en español, "una comida es más agradable que otra" reproduce la comparación sin añadir interpretaciones innecesarias.
- source_word: תנעם
  english_pob_choice: is more pleasant
  chosen_spanish: es más agradable
  alternatives_spanish:
  - es más placentera
  - es más grata
  - es más dulce
  lexicon: HALOT
  rationale: '"Agradable" expresa bien la idea de deleite o conveniencia sin reducirla a sabor dulce, que sería demasiado estrecho.'
theological_decisions:
- issue: Tratamiento de la variante griega respecto del hebreo existente
  english_pob_reading: The Greek parallel in this location differs substantially from the extant Hebrew and appears to reflect a different line of text; the translation here follows the Hebrew witness as the primary source.
  chosen_spanish_reading: La traducción sigue el testimonio hebreo como texto principal; la versión griega de este lugar presenta una línea sustancialmente distinta.
  alternative_spanish_readings:
  - Seguir la línea griega en el texto principal
  - Combinar hebreo y griego en una lectura mixta
  rationale: El expediente de auditoría indica una discrepancia importante entre hebreo y griego. Para este versículo, la edición en español debe seguir el testimonio hebreo principal y señalar la divergencia como nota, sin fusionar indebidamente ambos testigos.
  doctrine_reference: Crítica textual / primacía del testimonio base en la traducción
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés, que simplificó «one kind of food» a «one food» para ajustarse más de cerca al hebreo sin perder naturalidad. La redacción española sigue esa misma línea de compacidad.
  spanish_consistency_notes:
  - Se evitó "SEÑOR" y formas litúrgicas ajenas al texto porque este versículo no contiene el Tetragrámaton ni un título divino.
  - '"Vientre" se mantuvo por su valor imagístico y por su correspondencia con el hebreo, aunque "estómago" sería una alternativa contextual válida.'
  - La comparación final se mantuvo simple y directa para reflejar la concisión del hebreo.
