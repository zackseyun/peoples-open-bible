translation:
  language: es
  text: que he reservado[a] para un tiempo de angustia[b], para un día de batalla y guerra,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he retenido» o «he guardado».'
    reason: lexical_alternative
  - marker: b
    text: «Angustia» también puede verterse como «aflicción» o «adversidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: Introduce la cláusula relativa de manera natural en español. Como el referente inmediato son realidades no personales (reservas meteorológicas), 'que' evita sobrecargar el texto con una forma más marcada que no añade precisión aquí.
- source_word: חָשַׂכְתִּי
  english_pob_choice: I have reserved
  chosen_spanish: he reservado
  alternatives_spanish:
  - he retenido
  - he guardado
  - he almacenado
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar retener, guardar o reservar. 'He reservado' conserva la idea de mantener algo apartado con propósito, en consonancia con el contexto de elementos almacenados para uso posterior, y sigue bien el valor de perfecto hebreo en la cláusula relativa.
- source_word: לְעֶת
  english_pob_choice: for a time of
  chosen_spanish: para un tiempo de
  alternatives_spanish:
  - para el tiempo de
  - para una temporada de
  lexicon: HALOT
  rationale: La preposición ל con עֵת expresa finalidad o destino temporal. 'Para un tiempo de' reproduce esa relación de forma clara y sin introducir matices no presentes en el hebreo.
- source_word: צָר
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - angustia
  - penuria
  lexicon: HALOT
  rationale: El término señala una situación de estrechez, opresión o aflicción. 'Angustia' es una opción digna y natural en español; aunque el POB inglés eligió 'distress', aquí se mantiene una equivalencia semántica fuerte sin forzar un calco. Se conserva la amplitud del campo semántico sin reducirlo a una sola carga emocional.
- source_word: לְיוֹם
  english_pob_choice: for a day of
  chosen_spanish: para un día de
  alternatives_spanish:
  - para el día de
  lexicon: HALOT
  rationale: Se mantiene la misma relación temporal y de finalidad que en la primera hemistiquia para conservar el paralelismo hebreo.
- source_word: קְרָב
  english_pob_choice: battle
  chosen_spanish: batalla
  alternatives_spanish:
  - combate
  - lucha
  lexicon: HALOT
  rationale: Término militar directo y natural en español. 'Batalla' transmite bien la confrontación armada sin diluir el peso del paralelismo con 'guerra'.
- source_word: וּמִלְחָמָה
  english_pob_choice: and war
  chosen_spanish: y guerra
  alternatives_spanish:
  - y guerra
  - y combate armado
  lexicon: HALOT
  rationale: Se conserva el par casi sinonímico del hebreo sin colapsarlo en una sola idea. 'Guerra' es la correspondencia más directa y transparente para el segundo término.
theological_decisions:
- issue: Reserva divina de fuerzas naturales para juicio o conflicto humano
  english_pob_reading: Retain the straightforward sense that God has reserved these phenomena for times of human conflict and distress.
  chosen_spanish_reading: Mantener la afirmación directa de que Dios ha reservado estas realidades para momentos de angustia y de guerra.
  alternative_spanish_readings:
  - Tratar el lenguaje solo como metáfora de la providencia, sin referencia bélica concreta
  - Suavizar la afirmación para evitar una imagen de uso judicial de la creación
  rationale: El versículo nombra explícitamente 'un día de batalla y guerra'; por eso conviene conservar la fuerza de la imagen sin reinterpretarla o atenuarla. La traducción española respeta el énfasis en la disposición soberana de Dios sobre lo creado, tal como lo hace el texto hebreo y la lectura inglesa auditada.
  doctrine_reference: Principios de traducción POB §1, §3
translation_notes:
  revision_awareness: La revisión más reciente del texto de referencia indica que no hubo cambios adicionales y el estado de concordancia es alto; por eso se mantiene la solución semántica principal sin introducir ajustes de sentido no respaldados por el hebreo o por el audit trail en inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; este versículo no contiene el tetragrámaton.
  - Se conserva el paralelismo entre 'un tiempo de angustia' y 'un día de batalla y guerra' sin fusionar los dos miembros.
  - Se evita 'SEÑOR' porque no aparece en el hebreo de este versículo ni responde a una necesidad de ocultamiento del nombre divino.
  - '''Batalla'' y ''guerra'' se mantienen separados para reflejar el doblete hebreo.'
  - La elección de 'angustia' busca ser idiomática en español sin perder la severidad del término hebreo.
