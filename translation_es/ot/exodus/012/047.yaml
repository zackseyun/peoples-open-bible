lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Toda
  alternatives_spanish:
  - Todos
  - La totalidad de
  lexicon: HALOT
  rationale: El hebreo expresa totalidad. «Toda» conserva la amplitud del cuantificador y suena natural con «la congregación». “Todos” sería posible, pero desplaza el énfasis desde el colectivo hacia los miembros individuales.
- source_word: עֲדַת
  english_pob_choice: the congregation of
  chosen_spanish: la congregación de
  alternatives_spanish:
  - la asamblea de
  - la comunidad de
  lexicon: HALOT
  rationale: En este contexto cultual y corporativo, «congregación» comunica bien el pueblo reunido como cuerpo. Mantiene la fuerza comunitaria que el POB inglés documenta sin convertirlo en una paráfrasis más interpretativa.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio sin cambio, como en el original.
- source_word: יַעֲשׂוּ
  english_pob_choice: shall do
  chosen_spanish: lo hará
  alternatives_spanish:
  - lo observará
  - lo guardará
  - lo cumplirá
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es amplio («hacer»), aquí se refiere a ejecutar la acción/observancia prescrita. En español, «lo hará» preserva la literalidad del verbo con un objeto pronominal que retoma la orden anterior, sin imponer en el texto principal una glosa como «observará».
- source_word: אֹתוֹ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - eso
  - esta celebración
  - este rito
  lexicon: HALOT
  rationale: El pronombre masculino singular se mantiene como clítico «lo», que es la forma más natural en español para retomar el referente implícito del rito/pascua sin especificarlo de más.
theological_decisions:
- issue: Alcance corporativo de la instrucción pascual
  english_pob_reading: 'The verse addresses the covenant people corporately: ''All the congregation of Israel shall do it.'''
  chosen_spanish_reading: 'El versículo se dirige al pueblo del pacto como cuerpo: «Toda la congregación de Israel lo hará».'
  alternative_spanish_readings:
  - Cada israelita lo hará
  - Toda la asamblea de Israel lo observará
  rationale: El sintagma colectivo con el nombre nacional apunta al conjunto de Israel como comunidad. «Toda la congregación» conserva esa lectura corporativa sin forzar una aplicación individualizante que el hebreo no exige.
  doctrine_reference: Éxodo 12:47; lectura corporativa del mandato pascual
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo directo y el expediente inglés auditado: se mantuvo la lectura corporativa del sujeto, se conservó el verbo amplio עשה con una forma española natural, y no se introdujo una glosa explicativa en el texto principal. No hubo revisiones aplicadas en el pass más reciente.'
  spanish_consistency_notes:
  - Se prefirió «congregación» como equivalente de עֲדַת en un contexto litúrgico-covenantal.
  - Se mantuvo el pronombre objeto «lo» para respetar la referencia pronominal breve del hebreo.
  - La nota al pie recoge la alternativa interpretativa «observará», coherente con la alternativa inglesa documentada.
