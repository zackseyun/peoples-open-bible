base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/015/009.yaml
  text: And when we establish our kingdom[a], we will honor you and your nation and the sanctuary with great glory[c][b], so that your glory may become evident in all the earth.
  footnotes:
  - marker: a
    text: Or 'glorify ... with great glory ... your glory.' The Greek uses cognate forms of δόξα/δοξάζω throughout; 'honor' is chosen in the main text because the context is diplomatic and political rather than overtly theological.
    reason: lexical_alternative
  - marker: b
    text: '''The sanctuary'' could also be rendered ''the temple,'' since ἱερόν can refer to the sacred precinct.'
    reason: lexical_alternative
  - marker: c
    text: '''In all the earth'' may also be understood as ''throughout all the land/world''; the Greek γῆ can bear more than one geographic scope depending on context.'
    reason: lexical_alternative
