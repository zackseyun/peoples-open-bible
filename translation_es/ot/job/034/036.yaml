translation:
  language: es
  text: Padre mío[a], que Job sea probado hasta el límite[b], por sus respuestas, como las de hombres perversos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Oh, padre mío»; el hebreo dice literalmente «mi padre», probablemente como vocativo, aunque algunos lo entienden de otro modo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «hasta perpetuidad / para siempre»; aquí probablemente expresa una prueba intensiva o exhaustiva, no una duración interminable.
    reason: lexical_alternative
  - marker: c
    text: O «con hombres perversos» o «entre hombres perversos»; la preposición hebrea puede sugerir asociación o comparación.
    reason: alternative_reading
lexical_decisions:
- source_word: אָבִי
  english_pob_choice: My father
  chosen_spanish: Padre mío
  alternatives_spanish:
  - Oh, padre mío
  - ¡Padre mío!
  lexicon: HALOT
  rationale: La forma hebrea significa literalmente «mi padre». En este contexto la lectura vocativa es la más natural, y en español «Padre mío» conserva esa dirección personal sin sobrecargar el tono.
- source_word: יִבָּחֵן
  english_pob_choice: let ... be tested
  chosen_spanish: que ... sea probado
  alternatives_spanish:
  - que ... sea examinado
  - que ... sea puesto a prueba
  lexicon: HALOT
  rationale: El nifal imperfecto de בחן expresa ser probado o examinado. «Que ... sea probado» reproduce bien la fuerza desiderativa/jussiva de la frase sin perder el sentido de prueba.
- source_word: עַד נֶצַח
  english_pob_choice: to the limit
  chosen_spanish: hasta el límite
  alternatives_spanish:
  - por completo
  - hasta el extremo
  - para siempre
  lexicon: HALOT
  rationale: Aunque literalmente puede sugerir «para siempre» o «perpetuamente», en este contexto de prueba judicial el valor probable es intensivo o exhaustivo. «Hasta el límite» comunica esa intensidad sin imponer una duración temporal imposible.
- source_word: עַל
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - por motivo de
  - debido a
  lexicon: HALOT
  rationale: La preposición introduce aquí el motivo de la petición. En español «por» expresa de manera breve y natural esa causalidad.
- source_word: תְּשֻׁבוֹת
  english_pob_choice: answers
  chosen_spanish: respuestas
  alternatives_spanish:
  - réplicas
  - contestaciones
  - respuestas
  lexicon: HALOT
  rationale: El sustantivo alude a respuestas o réplicas. «Respuestas» es claro y apto para el diálogo polémico del libro.
- source_word: בְּאַנְשֵׁי אָוֶן
  english_pob_choice: like wicked men
  chosen_spanish: como hombres perversos
  alternatives_spanish:
  - con hombres perversos
  - entre hombres perversos
  - al modo de hombres perversos
  lexicon: HALOT
  rationale: La preposición puede indicar comparación o asociación. La revisión inglesa reciente favorece la comparación; en español «como» preserva mejor esa ambigüedad controlada y «hombres perversos» traduce de forma natural אנשי און.
theological_decisions:
- issue: Sentido de la petición de Elihú sobre el sufrimiento/prueba de Job
  english_pob_reading: A plea that Job be thoroughly tested because his replies place him in association with wicked men.
  chosen_spanish_reading: Una petición de que Job sea sometido a una prueba exhaustiva a causa de sus respuestas, que se presentan como las de hombres perversos.
  alternative_spanish_readings:
  - Una afirmación de que Job será probado para siempre
  - Una comparación de sus respuestas con las de hombres perversos sin matiz de causa
  rationale: No se trata de un punto doctrinal mayor, sino de una dificultad sintáctica y retórica. La redacción española conserva el tono acusatorio de Elihú y la idea de prueba intensiva, sin convertir «hasta el límite» en una duración infinita ni eliminar la ambigüedad comparativa de la preposición.
  doctrine_reference: Principios de traducción POB sobre transparencia, conservación de tensiones léxicas y equivalencia óptima
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa reciente que cambió «among wicked men» por «like wicked men» para reflejar mejor el matiz comparativo de la preposición בְּ con אנשי און. También se mantuvo la decisión de no traducir עַד נֶצַח como una duración literal sin matiz, porque el contexto forense favorece un valor intensivo.
  spanish_consistency_notes:
  - Se usó «Padre mío» como vocativo natural y reverente, manteniendo la literalidad básica del hebreo.
  - Se prefirió «ser probado» para conservar el valor pasivo del nifal.
  - «Hasta el límite» evita imponer «para siempre» en un contexto donde el hebreo probablemente intensifica la prueba.
  - «Como hombres perversos» conserva la comparación sugerida por la revisión inglesa y no borra la ambigüedad hebrea.
  - Se evitó «SEÑOR» o vocabulario no presente en este versículo, porque el texto no contiene el nombre divino.
