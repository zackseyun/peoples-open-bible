translation:
  language: es
  text: ¿Qué distrito, o ciudad, o, de hecho, qué lugar habitado[a] siquiera, o qué calles[b], no se llenaban de duelo y lamentación por ellos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego transmitido usa un adjetivo inusual para «lugar habitado»; la traducción sigue el sentido probable de un asentamiento o sitio donde vive gente.
    reason: textual_variant
  - marker: b
    text: «Duelo» puede abarcar el lamento ritual implícito en κοπετοῦ, incluso con golpes de pecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: νομός
  english_pob_choice: district
  chosen_spanish: distrito
  alternatives_spanish:
  - provincia
  - región
  lexicon: LSJ
  rationale: En el uso helenístico, νομός puede designar una división administrativa; «distrito» conserva bien esa escala cívica y el paralelismo de la enumeración.
- source_word: πόλις
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - villa
  - pueblo
  lexicon: LSJ
  rationale: Es el equivalente natural y directo de πόλις en este contexto retórico de espacios urbanos afectados por el luto.
- source_word: τὸ σύνολον
  english_pob_choice: indeed ... at all
  chosen_spanish: de, de hecho, ... en absoluto
  alternatives_spanish:
  - en suma
  - por completo
  - en general
  lexicon: LSJ
  rationale: La expresión funciona adverbialmente e intensifica la pregunta totalizante. En español, «de, de hecho» y «en absoluto» preservan esa amplitud sin forzar un calco.
- source_word: οἰκτιστὸς τόπος
  english_pob_choice: inhabited place
  chosen_spanish: lugar habitado
  alternatives_spanish:
  - lugar poblado
  - sitio habitado
  - lugar de morada
  lexicon: LSJ
  rationale: El adjetivo transmitido es inusual; el sentido en contexto apunta a cualquier lugar donde vive gente. «Lugar habitado» mantiene la referencia a asentamientos sin introducir más especificación de la que el griego garantiza.
- source_word: ἀγυιαί
  english_pob_choice: streets
  chosen_spanish: calles
  alternatives_spanish:
  - callejones
  - vías
  - avenidas
  lexicon: LSJ
  rationale: ἀγυιαί se refiere a calles públicas; «calles» es la opción más natural y fiel al marco urbano del lamento.
- source_word: κοπετοῦ
  english_pob_choice: mourning
  chosen_spanish: duelo
  alternatives_spanish:
  - luto
  - golpearse el pecho
  - lamentación ritual
  lexicon: LSJ
  rationale: El término puede evocar duelo ritual, incluso con golpearse el pecho. «Duelo» comunica el lamento público de modo claro; la posible concreción ritual queda abierta por contexto y por la pareja con γόων.
- source_word: γόων
  english_pob_choice: lamentation
  chosen_spanish: lamentación
  alternatives_spanish:
  - lamento
  - llanto
  - clamor
  lexicon: LSJ
  rationale: Conserva el tono elevado y la idea de expresiones audibles de dolor, diferenciándose de «duelo» para reflejar la pareja léxica del griego.
- source_word: ἐπʼ αὐτοῖς
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - a causa de ellos
  - por ellos
  lexicon: LSJ
  rationale: La preposición marca ocasión o asunto del dolor. «Sobre ellos» es una forma idiomática en español para expresar duelo por quienes padecen o han caído bajo esa desgracia.
- source_word: οὐκ ἐνεπιπλῶντο
  english_pob_choice: were not filled
  chosen_spanish: no estaban llenos
  alternatives_spanish:
  - no se llenaban
  - no llegaron a llenarse
  - no se colmaban
  lexicon: LSJ
  rationale: El imperfecto pasivo comunica una condición continua de llenarse. En español plural concuerda con la serie retórica de lugares y mantiene el sentido de saturación de duelo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «at all» para τὸ σύνολον y el ajuste a plural («were not filled»), así como la nota textual sobre οἰκτιστὸς τόπος como lectura inusual pero contextualmente de asentamiento habitado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por defecto de proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se evitó «SEÑOR» y «Cristo» porque no corresponden al texto de esta unidad.
  - Se conservó el paralelismo retórico de la serie de lugares con una pregunta única en español.
  - Se prefirió vocabulario urbano claro («distrito», «ciudad», «calles») para reflejar la enumeración ascendente/descendente del griego.
