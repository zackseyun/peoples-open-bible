translation:
  language: es
  text: Y Jonatán vivió en Jerusalén[a], y comenzó a construir y restaurar[b] la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habitó en Jerusalén».
    reason: lexical_alternative
  - marker: b
    text: O «renovar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾤκησεν
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - habitó
  - se estableció
  - moró
  lexicon: LSJ
  rationale: El verbo expresa residencia o morada; «vivió» es natural en español moderno y comunica la permanencia en Jerusalén sin arcaísmo. «Habitó» o «moró» sonarían más solemnes, pero menos naturales.
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: LSJ
  rationale: Corresponde al valor ingresivo de ἄρχομαι con infinitivo. «Comenzó» conserva bien la acción inicial del relato.
- source_word: οἰκοδομεῖν
  english_pob_choice: to build
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - reconstruir
  lexicon: LSJ
  rationale: El griego dice literalmente «construir/edificar». «Construir» es claro y contemporáneo; no se fuerza «reconstruir» porque el prefijo para esa idea no está explícito en el verbo.
- source_word: καινίζειν
  english_pob_choice: restore
  chosen_spanish: restaurar
  alternatives_spanish:
  - renovar
  - hacer nuevo
  lexicon: LSJ
  rationale: La revisión inglesa prefirió «restore» por resultar más natural junto a «build». En español, «restaurar» comunica bien la idea de dejar de nuevo en buen estado, sin perder la tensión entre hacer nuevo y reparar.
- source_word: τὴν πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - Jerusalén
  - la urbe
  lexicon: LSJ
  rationale: Se mantiene el sustantivo genérico del griego, ya que Jerusalén ya fue nombrada. Esto conserva la repetición narrativa del texto fuente.
translation_notes:
  revision_awareness: El texto inglés del POB pasó de «renew» a «restore» en la revisión más reciente para que καινίζειν sonara más natural junto a «build». La versión española sigue esa decisión con «restaurar», manteniendo la alternativa semántica de «renovar» en nota.
  spanish_consistency_notes:
  - Se usa «Jonatán» con acento español estándar para el nombre propio.
  - Se evita «SEÑOR» o terminología teológica no presente en el versículo.
  - La coordinación «construir y restaurar» refleja la yuxtaposición de los dos infinitivos griegos sin ampliar el sentido.
  - Las notas se anclan exactamente en «vivió» y «restaurar» para cumplir con la exigencia de marcadores visibles en el texto.
