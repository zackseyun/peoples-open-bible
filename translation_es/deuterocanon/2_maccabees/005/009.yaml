translation:
  language: es
  text: El que había desterrado a muchos de su patria pereció en tierra extraña, habiendo ido a los lacedemonios[a], como si fuera a obtener protección por causa del parentesco[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a los espartanos”. “Lacedemonios” es el etnónimo más literal del griego.
    reason: lexical_alternative
  - marker: b
    text: El “parentesco” probablemente alude a la relación tradicional reclamada entre los judíos y los espartanos mencionada en otros pasajes (compárese 1 Macabeos 12:6-23).
    reason: cross_reference
lexical_decisions:
- source_word: συχνούς
  english_pob_choice: many exiles
  chosen_spanish: muchos
  alternatives_spanish:
  - a muchos
  - a gran número de personas
  lexicon: LSJ
  rationale: El griego funciona aquí de modo sustantivado junto con la cláusula participial; el audit trail inglés omitió añadir “men” en la revisión final. En español, “muchos” mantiene la cantidad sin introducir un sustantivo ajeno al griego.
- source_word: τῆς πατρίδος
  english_pob_choice: from their homeland
  chosen_spanish: de su patria
  alternatives_spanish:
  - de su tierra natal
  - de su tierra patria
  lexicon: LSJ
  rationale: πατρίς denota la tierra natal o patria. “Patria” es natural en español y conserva el contraste con “tierra extraña” del versículo.
- source_word: ἀποξενώσας
  english_pob_choice: had made ... exiles
  chosen_spanish: había expatriado
  alternatives_spanish:
  - había desterrado
  - había hecho exiliados
  lexicon: LSJ
  rationale: El verbo expresa hacer a otros extraños/ajenos a su lugar de origen. “Expatriado” transmite el efecto de sacar de la patria sin volverlo una paráfrasis demasiado libre; “desterrado” sería posible, pero sugiere un matiz jurídico más fuerte que el griego no exige aquí.
- source_word: ἐπὶ ξένης
  english_pob_choice: in a foreign land
  chosen_spanish: en tierra extraña
  alternatives_spanish:
  - en un país extraño
  - en tierra extranjera
  lexicon: LSJ
  rationale: La oposición con πατρίς se preserva mejor con una expresión breve y idiomática. “Tierra extraña” mantiene el contraste y el tono narrativo.
- source_word: ἀπώλετο
  english_pob_choice: perished
  chosen_spanish: pereció
  alternatives_spanish:
  - murió
  - se perdió
  lexicon: LSJ
  rationale: ἀπόλλυμι en aoristo medio puede significar morir o perecer. “Pereció” conserva el peso narrativo y el juicio implícito sin añadir connotación doctrinal.
- source_word: πρὸς Λακεδαιμονίους
  english_pob_choice: to the Lacedaemonians
  chosen_spanish: a los lacedemonios
  alternatives_spanish:
  - a los espartanos
  lexicon: LSJ
  rationale: Λακεδαιμόνιοι es el etnónimo griego más literal. Se mantiene en castellano como “lacedemonios”, con “espartanos” como alternativa más familiar, para no perder la cercanía al texto fuente.
- source_word: ἀναχθείς
  english_pob_choice: having gone up
  chosen_spanish: habiendo ido
  alternatives_spanish:
  - habiendo subido
  - habiendo sido llevado
  lexicon: LSJ
  rationale: La revisión inglesa prefirió un sentido más neutral que “carried off”. En español, “habiendo ido” reproduce de manera sobria el movimiento hacia los lacedemonios sin forzar una idea de coerción que el participio no exige de forma inequívoca.
- source_word: διὰ τὴν συγγένειαν
  english_pob_choice: because of the kinship
  chosen_spanish: por causa de la parentela
  alternatives_spanish:
  - por la parentela
  - a causa del parentesco
  lexicon: LSJ
  rationale: συγγένεια denota parentesco o relación de sangre. “Parentela” conserva la idea de vínculo familiar y deja abierta la alusión histórica a la relación reclamada entre judíos y espartanos.
- source_word: τευξόμενος σκέπης
  english_pob_choice: he would obtain protection
  chosen_spanish: como si fuera a obtener protección
  alternatives_spanish:
  - como si fuera a hallar refugio
  - como si fuera a recibir amparo
  lexicon: LSJ
  rationale: τεύξομαι con genitivo significa obtener/alcanzar, y σκέπη es protección, amparo o cobertura. “Obtener protección” sigue de cerca el valor léxico y mantiene la expectativa diplomática o de asilo implícita en el contexto.
theological_decisions:
- issue: Alusión histórica en συγγένεια
  english_pob_reading: The verse alludes to a known traditional kinship with the Spartans, but the main text leaves the phrase neutral and explanatory context is placed in a footnote.
  chosen_spanish_reading: 'La frase se mantiene neutral: “por causa de la parentela”, sin explicar en el texto principal la tradición judeo-espartana.'
  alternative_spanish_readings:
  - por causa de su parentela
  - por causa del parentesco reclamado
  rationale: El griego no marca explícitamente que el vínculo sea meramente alegado. Por fidelidad al texto, la traducción principal conserva la referencia sin expandirla interpretativamente; la nota puede aportar el trasfondo histórico.
  doctrine_reference: Principio de primacía del texto fuente y conservación de la ambigüedad histórica cuando el original no la resuelve.
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión final del audit trail inglés: se evitó añadir “hombres” a συχνούς, se prefirió un valor neutro para ἀναχθείς, y se mantuvo la referencia a los lacedemonios con una nota alternativa más familiar. También respeté la decisión de no expandir la alusión histórica en el cuerpo del texto.'
  spanish_consistency_notes:
  - Se usó “Yahvé” solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantuvo “lacedemonios” para conservar el etnónimo griego, con nota alternativa “espartanos”.
  - “Parentela” se eligió para reflejar συγγένεια sin borrar el posible matiz de parentesco tradicional.
  - La puntuación sigue el español moderno y la sintaxis procura ser publicable sin alejarse del griego.
