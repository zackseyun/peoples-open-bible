id: 1TI.1.12
reference: 1 Timothy 1:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀Χάριν ἔχω τῷ ἐνδυναμώσαντί με Χριστῷ Ἰησοῦ τῷ κυρίῳ ἡμῶν, ὅτι πιστόν με ἡγήσατο θέμενος εἰς διακονίαν,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/012.yaml
  text: I give thanks to Messiah Jesus our Lord[a], who has strengthened me, because he considered me faithful, appointing me to ministry[b],
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός can be rendered either by translation ('Messiah') or by traditional transliteration ('Christ').
    reason: alternative_reading
  - marker: b
    text: Or 'for service' or 'into service.' The Greek διακονία broadly denotes service or ministry.
    reason: lexical_alternative
translation:
  language: ko
  text: 나에게 능력을 주신 우리 주 메시아[a] 예수께 감사드립니다. 그분께서 나를 신실하다고 여기시어 사역[b]에 세우셨기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 본 번역은 칭호의 무게를 살려 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 또는 「섬김」 「봉사」. 헬라어 διακονία는 섬김·봉사·사역을 폭넓게 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Χάριν ἔχω
  english_pob_choice: I give thanks
  chosen_korean: 감사드립니다
  alternatives_korean:
  - 감사를 드립니다
  - 감사합니다
  lexicon: BDAG
  rationale: 합쇼체 + 신성 대상에 대한 경어로 「감사드립니다」가 적절하다.
- source_word: ἐνδυναμώσαντί με
  english_pob_choice: who has strengthened me
  chosen_korean: 나에게 능력을 주신
  alternatives_korean:
  - 나를 강건케 하신
  - 내게 힘 주신
  lexicon: BDAG
  rationale: ἐνδυναμόω는 능력을 주입·강건케 하다의 어감. 「능력을 주신」이 자연스러우며, 사역적 권능 부여의 의미를 살린다.
- source_word: πιστόν με ἡγήσατο
  english_pob_choice: he considered me faithful
  chosen_korean: 나를 신실하다고 여기시어
  alternatives_korean:
  - 나를 믿을 만하다고 여기시어
  - 나를 충성된 자로 보시고
  lexicon: BDAG
  rationale: πιστός의 「신실함·믿을 만함」 어감을 「신실하다」로 옮긴다. 「충성된」은 더 군사적 어감.
- source_word: θέμενος εἰς διακονίαν
  english_pob_choice: appointing me to ministry
  chosen_korean: 사역에 세우셨기
  alternatives_korean:
  - 직무를 맡기시어
  - 섬김의 일에 임명하시어
  lexicon: BDAG
  rationale: τίθημι의 「임명·세우다」 어감을 「세우셨다」로 자연스럽게 담는다. διακονία는 사역적 함의가 강한 본문이므로 「사역」을 택한다.
theological_decisions:
- issue: Χριστός의 칭호 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 번역의 일관 원칙에 따라 칭호로 기능하는 Χριστός를 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός'
