review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: Laban como sujeto, Bilha como objeto directo, Raquel como destinataria, y la función final de Bilha como sierva de Raquel. También mantiene la repetición de שִׁפְחָה con un término español consistente. Sin embargo, el orden sintáctico español actual («dio a Bilha..., a Raquel...») sugiere incorrectamente que Bilha es la receptora, cuando en el hebreo Raquel es la destinataria y Bilha lo entregado. Esto requiere ajuste para reflejar fielmente la relación gramatical.'
  spanish_quality_summary: El español es en general claro y digno, pero el orden de complementos resulta torpe y potencialmente ambiguo. Además, la puntuación con comas interrumpe innecesariamente la lectura. Una reordenación sencilla mejora mucho la naturalidad y elimina la ambigüedad sin perder literalidad.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la preferencia por preservar matices léxicos. «Sierva» funciona bien aquí para שִׁפְחָה en registro bíblico legible, y la nota con alternativa «criada» es aceptable. No hay conflicto con la terminología del proyecto.
  issues:
  - severity: high
    issue: Orden sintáctico ambiguo en «dio a Bilha..., a Raquel»
    rationale: En español, ese orden puede hacer que «a Bilha» se lea como complemento indirecto/recipiente. El hebreo claramente dice que Laban dio a Bilha a Raquel.
  - severity: low
    issue: Puntuación algo cargada
    rationale: 'Las comas alrededor de los aposiciones son posibles, pero la frase fluye mejor con una sintaxis más natural: «dio a Raquel su hija a Bilha...» o equivalente.'
  revised_spanish_text: Y Laban dio a Raquel, su hija, a Bilha[a], su sierva, como su sierva.
