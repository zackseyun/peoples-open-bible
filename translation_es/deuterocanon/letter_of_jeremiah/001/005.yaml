translation:
  language: es
  text: 'Cuando vean una multitud delante de ellos y detrás de ellos postrándose[a] ante ellos, digan en su mente: «A ti se te debe adorar, Soberano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adorándolos» por «postrándose ante ellos»; el verbo griego προσκυνέω puede designar tanto el gesto corporal de postración como el acto religioso de adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντας
  english_pob_choice: When you see
  chosen_spanish: Cuando vean
  alternatives_spanish:
  - Al ver
  - Después de ver
  lexicon: BDAG
  rationale: El participio aoristo se entiende aquí con valor temporal y dirigido a una segunda persona implícita. En español, «Cuando vean» transmite con naturalidad la condición temporal sin perder la relación con el mandato siguiente.
- source_word: ὄχλον
  english_pob_choice: a crowd
  chosen_spanish: una multitud
  alternatives_spanish:
  - una muchedumbre
  - un gentío
  lexicon: BDAG
  rationale: ὄχλος puede ser «multitud» o «muchedumbre». «Multitud» es idiomático y digno en español bíblico moderno, y conserva la idea de masa numerosa de personas.
- source_word: ἔμπροσθεν καὶ ὄπισθεν αὐτῶν
  english_pob_choice: in front of them and behind them
  chosen_spanish: delante de ellos y detrás de ellos
  alternatives_spanish:
  - en frente de ellos y detrás de ellos
  - ante ellos y detrás de ellos
  lexicon: BDAG
  rationale: La imagen espacial se mantiene con una expresión clara y natural en español. «Delante... y detrás...» reproduce el encuadre de los ídolos rodeados por personas.
- source_word: προσκυνοῦντας αὐτά
  english_pob_choice: bowing down to them
  chosen_spanish: postrada ante ellos
  alternatives_spanish:
  - adorándolos
  - postrándose ante ellos
  lexicon: BDAG
  rationale: προσκυνέω puede referirse al gesto corporal de postración o al acto religioso de adoración. Aquí la imagen física es importante; por eso se opta por «postrada ante ellos». Se deja el matiz de adoración para el verbo posterior en la frase directa.
- source_word: τῇ διανοίᾳ
  english_pob_choice: say in your mind
  chosen_spanish: en su mente
  alternatives_spanish:
  - en su entendimiento
  - interiormente
  lexicon: BDAG
  rationale: διανοία apunta a la facultad interior del pensamiento. «En su mente» comunica bien la respuesta interna y evita introducir «corazón», que no aparece en el griego.
- source_word: Σοί
  english_pob_choice: It is you whom
  chosen_spanish: A ti te corresponde
  alternatives_spanish:
  - Eres tú a quien
  - Solo a ti
  lexicon: BDAG
  rationale: El dativo frontado expresa énfasis. En español, una construcción de incumbencia («A ti te corresponde») conserva la prominencia del destinatario y suena natural.
- source_word: δεῖ
  english_pob_choice: one must
  chosen_spanish: te corresponde
  alternatives_spanish:
  - es necesario
  - se debe
  lexicon: BDAG
  rationale: El verbo de necesidad se vierte con una forma impersonal/relacional que en español transmite obligación sin añadir un sujeto no explícito. En esta frase, la noción de deber se integra mejor con el giro de incumbencia.
- source_word: προσκυνεῖν
  english_pob_choice: worship
  chosen_spanish: adorar
  alternatives_spanish:
  - rendir culto
  - postrarse
  lexicon: BDAG
  rationale: En el discurso dirigido a Dios, el sentido religioso pleno de προσκυνέω es primario. «Adorar» expresa ese valor con claridad en español y distingue el acto debido a Dios del gesto físico anterior.
- source_word: Δέσποτα
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Soberano
  - Señor
  lexicon: BDAG
  rationale: Δέσποτα no es κύριος. «Maestro» mantiene la distinción léxica que el audit trail inglés preserva con «Master» y evita normalizarlo a «Señor», que en español suele funcionar como equivalencia tradicional de κύριος.
theological_decisions:
- issue: Distinción entre postración física y adoración religiosa en προσκυνέω
  english_pob_reading: bowing down to them[a] ... worship
  chosen_spanish_reading: postrada ante ellos ... adorar
  alternative_spanish_readings:
  - postrándose ante ellos ... rendir culto
  - adorándolos ... adorar
  rationale: 'El griego usa el mismo verbo en ambos contextos, pero el audit trail inglés distingue el gesto corporal del acto religioso. En español se conserva esa tensión: primero se describe la postración física, luego la adoración que corresponde a Dios.'
  doctrine_reference: 'DOCTRINE.md: mantener distinciones léxicas y no homogeneizar donde el original mantiene un contraste semántico.'
- issue: Título divino Δέσποτα
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Soberano
  rationale: Se preserva la rareza léxica del griego frente a κύριος. «Maestro» evita absorber el término en el uso eclesial habitual de «Señor» y sigue la decisión auditada del inglés.
  doctrine_reference: 'DOCTRINE.md: primacía del original y preservación de distinciones terminológicas.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; el pasaje presenta acuerdo alto y solo observaciones menores. Se mantiene la distinción auditada entre el gesto físico de προσκυνέω y su sentido religioso en la frase directa.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto de la dirección final, sin introducirlo donde el griego no lo dice explícitamente.
  - «Maestro» se reserva aquí para Δέσποτα; no se usa «Señor» para evitar borrar la diferencia con κύριος.
  - Se usa puntuación moderna en español y comillas angulares para la cita directa.
  - El sujeto implícito de la exhortación se mantiene en segunda persona plural con «vean / digan» para reflejar la dirección al lector o grupo destinatario.
