revisions:
- from: Y tuvo Ezequías riquezas y honra[a] muy, muy grandes; y se hizo almacenes para plata, oro, piedras preciosas, perfumes, escudos y toda clase de objetos deseables[b].
  to: Ezequías tuvo riquezas y honra[a] muy grandes, e hizo depósitos para plata, oro, piedras preciosas, especias, escudos y toda clase de objetos deseables[b].
  rationale: Se ajustó el español para mayor naturalidad y registro digno («Ezequías tuvo», «e hizo depósitos»), se corrigió la intensificación a una forma más idiomática («muy grandes») y se alineó בְשָׂמִים con «especias», en conformidad con la evidencia léxica y la auditoría POB en inglés. Se conservaron las notas pertinentes sobre «honra/gloria» y sobre la amplitud de כְּלֵי חֶמְדָּה.
