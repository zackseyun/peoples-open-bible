  language: en
  yaml_path: translation/ot/2_kings/011/004.yaml
  text: In the seventh year Jehoiada sent and took the commanders of hundreds[a], the Carites, and the runners, and brought them to himself in the house of Yahweh. He made a covenant with them and put them under oath in the house of Yahweh[b], and showed them the king’s son.
  footnotes:
