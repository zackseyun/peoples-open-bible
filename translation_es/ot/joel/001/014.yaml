translation:
  language: es
  text: Consagren un ayuno; convoquen una asamblea solemne. Reúnan a los ancianos, a todos los habitantes del país[a], a la casa de Yahvé su Dios, y clamen a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la tierra». El hebreo הָאָרֶץ puede significar «tierra» o «país/land»; aquí el contexto del llamado centrado en el templo favorece el sentido local.
    reason: alternative_reading
lexical_decisions:
- source_word: קַדְּשׁוּ
  english_pob_choice: Consecrate
  chosen_spanish: Consagren
  alternatives_spanish:
  - Santifiquen
  - Aparten
  lexicon: HALOT
  rationale: El imperativo pide dedicar formalmente el ayuno a un propósito sagrado. «Consagren» conserva mejor el valor cultual que un simple «aparten», y es natural en español bíblico moderno.
- source_word: צוֹם
  english_pob_choice: a fast
  chosen_spanish: un ayuno
  alternatives_spanish:
  - un ayuno solemne
  - un ayuno
  lexicon: HALOT
  rationale: «Ayuno» es la equivalencia directa y clara. El artículo indefinido refleja que se trata de una convocatoria a instituir un ayuno concreto.
- source_word: קִרְאוּ
  english_pob_choice: call
  chosen_spanish: proclamen
  alternatives_spanish:
  - llamen
  - declaren
  lexicon: HALOT
  rationale: Aquí el verbo tiene fuerza pública y convocante; «proclamen» comunica mejor la idea de anunciar formalmente una reunión que un simple «llamen».
- source_word: עֲצָרָה
  english_pob_choice: a solemn assembly
  chosen_spanish: una asamblea solemne
  alternatives_spanish:
  - una asamblea sagrada
  - una congregación solemne
  lexicon: HALOT
  rationale: La expresión preserva el carácter litúrgico y serio del término sin forzar una fórmula demasiado tradicional. «Solemne» refleja bien la gravedad ritual del contexto.
- source_word: אִסְפוּ
  english_pob_choice: Gather
  chosen_spanish: Reúnan
  alternatives_spanish:
  - Congreguen
  - Junten
  lexicon: HALOT
  rationale: El verbo invita a traer personas juntas para la convocatoria; «Reúnan» es idiomático, claro y mantiene el sentido imperativo.
- source_word: זְקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los ancianos del pueblo
  - los líderes
  lexicon: HALOT
  rationale: En este contexto, el término puede referirse a los mayores o a los líderes del pueblo. «Los ancianos» conserva esa ambigüedad lexical sin reemplazarla por una interpretación más específica de lo que exige el texto.
- source_word: כֹּל יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: all the inhabitants of the land
  chosen_spanish: todos los habitantes de la tierra
  alternatives_spanish:
  - todos los habitantes del país
  - todos los que habitan la tierra
  lexicon: HALOT
  rationale: Aunque el contexto puede favorecer «la tierra» en sentido local, en español esa frase conserva la misma ambigüedad entre tierra/país y no obliga a decidir más allá del hebreo. Se mantiene el matiz inclusivo de «todos los habitantes».
- source_word: בֵּית יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: to the house of Yahweh your God
  chosen_spanish: en la casa de Yahvé, su Dios
  alternatives_spanish:
  - a la casa de Yahvé, su Dios
  - para la casa de Yahvé, su Dios
  lexicon: HALOT
  rationale: El hebreo carece de preposición explícita antes de «casa»; en español, «en» funciona bien con la reunión convocada al ámbito del templo. «Yahvé» preserva el nombre divino según la terminología del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de verter el Tetragrámaton como «Yahvé», que conserva el nombre propio divino en español sin sustituirlo por un título.
- source_word: וְזַעֲקוּ
  english_pob_choice: and cry out
  chosen_spanish: y clamen
  alternatives_spanish:
  - y griten
  - y den voces
  lexicon: HALOT
  rationale: El verbo expresa un clamor urgente de súplica o angustia. «Clamen» mantiene la intensidad religiosa y funciona con el complemento introducido por «a».
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hacia Yahvé
  lexicon: HALOT
  rationale: La preposición marca dirección de la súplica. «A Yahvé» es la formulación natural en español para el destinatario del clamor.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La decisión del proyecto es preservar el nombre propio de Dios, no enmascararlo con una sustitución litúrgica. En español, «Yahvé» es la forma adoptada para esa conservación.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de הָאָרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra/país
  rationale: El inglés POB prefirió «the land» por el contexto local de Judá y el templo. En español, «la tierra» conserva la misma posibilidad semántica sin resolver de manera excesiva una ambigüedad que el hebreo permite.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy over translation tradition
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la revisión más reciente; no se detectaron revisiones aplicadas. La redacción española sigue de cerca el hebreo y el criterio lexical documentado en el expediente inglés, manteniendo la tensión semántica de הָאָרֶץ sin exagerar el alcance.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estable para יְהוָה en todo el versículo.
  - Se usó «consagren» para קדשׁ en un contexto ceremonial de ayuno, en coherencia con el estilo del proyecto.
  - «Asamblea solemne» preserva el tono litúrgico sin introducir terminología eclesiástica no requerida por el hebreo.
  - Se evitó traducir mecánicamente «house» como «casa» con preposición literal; el español natural exige una relación espacial contextualizada.
