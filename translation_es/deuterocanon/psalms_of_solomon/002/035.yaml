    text: O «no lo reconocieron» o «no lo reconocieron como tal».
    reason: lexical_alternative
  revision_rationale: Se ajusta «para gloria» a «a la gloria» por mayor naturalidad y mejor reflejo de la meta expresada por εἰς. Se mejora la nota sobre ἀπωλίαν αἰῶνος para evitar «siglo», que confunde en español, y se afina la nota de ἔγνωσαν para ofrecer alternativas más naturales y semánticamente precisas que «admitieron».
