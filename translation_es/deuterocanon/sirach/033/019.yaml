translation:
  language: es
  text: Escúchenme[a], grandes hombres del pueblo, y ustedes, líderes de la asamblea, presten oído.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Óiganme, nobles del pueblo, y ustedes, líderes de la congregación, escuchen atentamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσατέ
  english_pob_choice: Listen
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Oiganme
  - Escuchen
  lexicon: BDAG
  rationale: El imperativo plural exhorta a prestar atención de manera directa. 'Escúchenme' comunica el llamado inmediato y conserva la fuerza de la apelación mejor que una fórmula más arcaica; el pronombre enclítico refleja que el objeto del escuchar es el hablante.
- source_word: μεγιστᾶνες
  english_pob_choice: great men
  chosen_spanish: grandes hombres
  alternatives_spanish:
  - nobles
  - magnates
  - grandes
  lexicon: LSJ
  rationale: El término designa varones prominentes o de alto rango. 'Grandes hombres' mantiene el matiz de prominencia sin introducir una nobleza hereditaria que el griego no especifica, y conserva el rasgo masculino del plural.
- source_word: λαοῦ
  english_pob_choice: of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la gente
  - de la nación
  lexicon: LSJ
  rationale: En este contexto público, λαός se refiere al cuerpo social del pueblo. 'Del pueblo' es natural en español y preserva la relación colectiva del genitivo.
- source_word: ἡγούμενοι
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - dirigentes
  - los que guían
  - gobernantes
  lexicon: BDAG
  rationale: El participio señala a quienes ejercen conducción. 'Líderes' es claro y fiel sin exagerar el rango como 'gobernantes'.
- source_word: ἐκκλησίας
  english_pob_choice: assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la comunidad
  - la iglesia
  lexicon: LSJ
  rationale: Aquí ἐκκλησία conserva el sentido de reunión convocada. 'Asamblea' evita trasladar sin necesidad el sentido eclesial posterior de 'iglesia'.
- source_word: ἐνωτίσασθε
  english_pob_choice: give ear
  chosen_spanish: presten oído
  alternatives_spanish:
  - escuchen atentamente
  - inclinad el oído
  - atiendan
  lexicon: LSJ
  rationale: La forma intensifica la escucha atenta. 'Presten oído' reproduce el valor idiomático y el paralelismo retórico con ἀκούσατέ, con un español bíblico pero comprensible.
theological_decisions:
- issue: Referencia masculina en la exhortación pública
  english_pob_reading: you great men of the people
  chosen_spanish_reading: ustedes, grandes hombres del pueblo
  alternative_spanish_readings:
  - ustedes, grandes personas del pueblo
  - ustedes, nobles del pueblo
  rationale: El griego masculino plural apunta a varones en posiciones destacadas. Se conserva esa referencia sin neutralizarla, de acuerdo con la forma y el contexto social del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: ἐκκλησία y su alcance semántico
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - iglesia
  rationale: El contexto sirácida es el de una reunión pública del pueblo, no la institución cristiana posterior. 'Asamblea' preserva ese valor y evita anacronismo teológico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: El pasaje fue revisado previamente y se mantuvo sin cambios en el control más reciente; la redacción española sigue la misma lectura estable del original griego y del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención del proyecto solo cuando corresponda; este verso no contiene el nombre divino.
  - Se usa 'asamblea' para ἐκκλησία, coherente con el criterio de evitar 'iglesia' cuando el contexto no es eclesial cristiano.
  - Se preserva el imperativo plural directo con un registro sobrio y público, acorde con la exhortación del texto.
