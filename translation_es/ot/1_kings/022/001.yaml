translation:
  language: es
  text: Durante tres años permanecieron sin guerra entre Aram e Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hubo guerra entre Aram e Israel durante tres años».'
    reason: lexical_alternative
  - marker: b
    text: «Aram» es el nombre hebreo que muchas versiones en inglés suelen verter como «Siria».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: they remained
  chosen_spanish: no hubo
  alternatives_spanish:
  - permanecieron
  - se mantuvieron
  lexicon: HALOT
  rationale: El verbo hebreo expresa permanencia de un estado a lo largo de un período. En español, en esta construcción temporal, «no hubo guerra» comunica de forma natural la ausencia continuada de conflicto durante esos años, sin forzar un calco de «se sentaron» o «habitaron».
- source_word: שָׁלֹשׁ שָׁנִים
  english_pob_choice: for three years
  chosen_spanish: Durante tres años
  alternatives_spanish:
  - por tres años
  - por tres años
  lexicon: HALOT
  rationale: La frase hebrea marca duración de tiempo. «Durante tres años» es la manera más natural y fiel de expresar ese lapso en español.
- source_word: אֵין מִלְחָמָה
  english_pob_choice: without war
  chosen_spanish: no hubo guerra
  alternatives_spanish:
  - no había guerra
  - sin guerra
  lexicon: HALOT
  rationale: El hebreo afirma literalmente la inexistencia de guerra. En español, «no hubo guerra» preserva bien el valor puntual/global de la afirmación histórica y resulta más idiomático que un calco más abstracto.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and ...
  chosen_spanish: entre ... e ...
  alternatives_spanish:
  - entre ... y ...
  lexicon: HALOT
  rationale: El paralelismo hebreo se reproduce con la preposición correlativa normal en español. Ante «Israel», la conjunción se ajusta a «e» por eufonía.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo «Aram», siguiendo la decisión auditable del POB en inglés de transliterar el topónimo en vez de sustituirlo por el equivalente histórico posterior «Siria».
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio estándar; se mantiene sin cambio.
translation_notes:
  revision_awareness: 'El hebreo es muy conciso: literalmente, «y se quedaron/continuaron tres años: no guerra entre Aram y entre Israel». La redacción española sigue la lectura histórica natural del POB en inglés y mantiene el mismo sentido sin añadir información.'
  spanish_consistency_notes:
  - Se mantuvo «Aram» como topónimo transliterado, en continuidad con la decisión auditada del POB en inglés.
  - Se evitó «SEÑOR» u otra terminología no presente en el versículo.
  - La negación histórica se vertió como «no hubo guerra», una formulación natural en español que conserva la ausencia de conflicto durante el período indicado.
