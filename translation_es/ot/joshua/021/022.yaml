translation:
  language: es
  text: 'y Kibzaim con sus tierras de pasto[a], y Bet-Horón con sus tierras de pasto: cuatro ciudades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'terreno común' o 'tierras de pastoreo' para מִגְרָשׁ. El término hebreo se refiere al terreno abierto que pertenece a una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִבְצַיִם
  english_pob_choice: Kibzaim
  chosen_spanish: Kibzaim
  alternatives_spanish:
  - Quibzaim
  - Kibzáim
  lexicon: HALOT
  rationale: Es nombre propio de lugar; se translitera sin traducir. Se conserva la forma reconocible en castellano bíblico y la escritura cercana al hebreo/inglés POB.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pasto
  alternatives_spanish:
  - su terreno abierto
  - sus tierras comunes
  - sus tierras de pastoreo
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto ligado a una ciudad. En español, 'tierras de pasto' comunica bien la idea sin caer en un calco rígido ni en un término arcaico como 'suburbios'. El posesivo plural 'sus' refleja naturalmente el referente del lugar.
- source_word: בֵּית חוֹרֹן
  english_pob_choice: Beth-horon
  chosen_spanish: Bet-horón
  alternatives_spanish:
  - Beth-horón
  - Casa de Horón
  lexicon: HALOT
  rationale: Se mantiene el nombre tradicional del topónimo, adaptado a la ortografía española y con guion para preservar la unión del nombre compuesto. No se traduce literalmente porque se trata de un nombre propio establecido.
- source_word: עָרִים אַרְבַּע
  english_pob_choice: four cities
  chosen_spanish: cuatro ciudades
  alternatives_spanish:
  - cuatro poblados
  - cuatro pueblos
  lexicon: HALOT
  rationale: La fórmula final resume la lista de asentamientos. 'Ciudades' conserva el valor habitual de עָרִים en listas de repartición territorial.
- source_word: וְאֶת ... וְאֶת
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - e ... e
  lexicon: Hebrew grammar
  rationale: La coordinación repetida reproduce la acumulación hebrea de la lista. En español, 'y' es la forma natural y mantiene el ritmo enumerativo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés: lista coordinada de dos ciudades con sus terrenos anexos y cierre numérico ''cuatro ciudades''. No se introducen interpretaciones adicionales ni se suaviza el sentido técnico de מִגְרָשׁ.'
  spanish_consistency_notes:
  - Se usa 'Bet-horón' como forma española estable del topónimo Beth-horon.
  - Se evita 'SEÑOR' y cualquier terminología no pertinente, porque el versículo no contiene el nombre divino ni afirmaciones doctrinales.
  - '''tierras de pasto'' se eligió para mantener la claridad contemporánea sin perder la idea de terreno abierto asociado a la ciudad.'
