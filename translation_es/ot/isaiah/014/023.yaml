- from: La convertiré en posesión de [a] el erizo y en estanques de agua; y la barreré con la escoba de la destrucción, declara Yahvé de los Ejércitos.
  to: La convertiré en posesión del erizo[a] y en estanques de agua; y la barreré con la escoba de la destrucción, declara Yahvé de los Ejércitos.
  rationale: Se corrige una falla gramatical y de colocación de nota en 'de [a] el erizo', sustituyéndola por 'del erizo[a]'. También se mejora la precisión de la nota léxica reemplazando 'garza' por 'avetoro', que representa mejor la alternativa tradicional inglesa 'bittern', sin cambiar la decisión principal 'erizo'.
