translation:
  language: es
  text: También ellos descendieron con ello al Seol[a], a los muertos a espada; su brazo habitó en su sombra entre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su fuerza» o «sus aliados»; literalmente, «su brazo».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: too
  chosen_spanish: También
  alternatives_spanish:
  - además
  - igualmente
  lexicon: HALOT
  rationale: Introduce a otros sujetos dentro del mismo destino de juicio ya descrito; «también» reproduce bien el valor aditivo sin sonar forzado.
- source_word: אִתּוֹ
  english_pob_choice: with it
  chosen_spanish: con él
  alternatives_spanish:
  - con ello
  - con él/ella
  lexicon: HALOT
  rationale: El antecedente es la figura del cedro/Asiria personificada, y en español el referente metafórico puede mantenerse con «él» para evitar una referencia impersonal demasiado dura; la imagen sigue siendo no literal-personal.
- source_word: יָרְדוּ שְׁאוֹלָה
  english_pob_choice: went down ... to Sheol
  chosen_spanish: descendieron ... al Seol
  alternatives_spanish:
  - bajaron ... al Seol
  - descendieron ... a la morada de los muertos
  lexicon: HALOT
  rationale: Se conserva el término técnico «Seol» para no aplanar el concepto hebreo en una explicación interpretativa como «morada de los muertos» o «sepulcro».
- source_word: חַלְלֵי חָרֶב
  english_pob_choice: those slain by the sword
  chosen_spanish: a los heridos a espada
  alternatives_spanish:
  - a los muertos a espada
  - a los atravesados por la espada
  lexicon: HALOT
  rationale: «חָלָל» puede denotar a un caído/herido mortalmente; en español «heridos a espada» mantiene la fuerza de la imagen de violencia sin cerrar prematuramente el matiz de los caídos.
- source_word: זְרֹעוֹ
  english_pob_choice: its arm
  chosen_spanish: su brazo
  alternatives_spanish:
  - su fuerza
  - sus aliados
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal «brazo», como en el inglés POB, porque el texto puede aludir literalmente al brazo y, por extensión, al poder o apoyos; no se resuelve esa tensión en el cuerpo del versículo.
- source_word: יָשְׁבוּ
  english_pob_choice: dwelt
  chosen_spanish: habitó
  alternatives_spanish:
  - habitaba
  - vivió
  lexicon: HALOT
  rationale: «Habitar» comunica el sentido de permanencia del verbo en un registro bíblico natural en español. Se usa singular por concordancia con «su brazo»; la lectura colectiva queda reflejada como imagen resumida del poder que residía en su sombra.
- source_word: בְצִלּוֹ
  english_pob_choice: in its shade
  chosen_spanish: en su sombra
  alternatives_spanish:
  - bajo su sombra
  - a su sombra
  lexicon: HALOT
  rationale: «Sombra» preserva la metáfora del árbol de protección y dominación; «en» mantiene la relación espacial del hebreo y la línea poética del enunciado.
- source_word: בְּתוֹךְ גּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - en medio de las naciones
  - entre los pueblos
  lexicon: HALOT
  rationale: «Entre las naciones» es una forma natural y fiel para el ámbito internacional de la frase, manteniendo el plural político-ético de גּוֹיִם.
theological_decisions:
- issue: Mantener שְׁאוֹל como término no explicado
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - sepulcro
  - morada de los muertos
  - infierno
  rationale: 'Se conserva el término hebreo transliterado para preservar la tensión teológica del texto: no se reduce a entierro físico ni se identifica de inmediato con una doctrina posterior del infierno.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El inglés POB fue revisado de «had dwelt» a «dwelt» para ajustarse mejor al hebreo; por eso el español usa un pretérito simple («habitó») sin añadir pluscuamperfecto. También se preserva la nota alternativa sobre ‘su brazo’, porque la metáfora puede referirse a poder, fuerza o aliados.
  spanish_consistency_notes:
  - Se usa «Seol» de manera consistente con la práctica POB de preservar términos hebreos con carga teológica.
  - Se mantiene «naciones» para גּוֹיִם, no «pueblos», porque el contexto de Ezequiel enfatiza el marco internacional de juicio.
  - «Brazo» se conserva como metáfora; no se sustituye por una abstracción que elimine la imagen textual.
