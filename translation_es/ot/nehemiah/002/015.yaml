translation:
  language: es
  text: Entonces subí por el wadi[b] de noche e inspeccioné[a] la muralla. Luego volví atrás, entré por la Puerta del Valle, y regresé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «examiné» o «recorrí para inspeccionar» la muralla. El verbo hebreo aquí normalmente significa «romper», pero en este contexto se entiende ampliamente que describe la inspección que Nehemías hizo de la muralla dañada.
    reason: lexical_alternative
  - marker: b
    text: «Wadi» se refiere a un barranco o cauce estacional; algunas traducciones lo vierten como «valle» o «arroyo».
    reason: cultural_note
lexical_decisions:
- source_word: עֹלֶה
  english_pob_choice: went up
  chosen_spanish: subí
  alternatives_spanish:
  - iba subiendo
  - ascendí
  lexicon: HALOT
  rationale: עלה en una narración de movimiento se expresa de forma natural en pasado simple. «Subí» conserva el desplazamiento ascendente sin volverlo más pesado con una perífrasis.
- source_word: בַנַּחַל
  english_pob_choice: by the wadi
  chosen_spanish: por el wadi
  alternatives_spanish:
  - por el valle
  - por el barranco
  - junto al wadi
  lexicon: HALOT
  rationale: נחל aquí designa un cauce seco o estacional, no un valle amplio; se conserva «wadi» por su precisión topográfica. «Por» refleja bien el recorrido en ruta.
- source_word: לַיְלָה
  english_pob_choice: at night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: «De noche» es una expresión española natural y digna, equivalente al valor temporal del hebreo.
- source_word: שֹׂבֵר
  english_pob_choice: inspected
  chosen_spanish: inspeccioné
  alternatives_spanish:
  - examiné
  - revisé
  - estuve inspeccionando
  lexicon: HALOT
  rationale: Aunque el verbo base suele significar «romper», en este contexto narrativo se entiende como la inspección de la muralla dañada. «Inspeccioné» preserva ese sentido contextual sin borrar la tensión lexical documentada.
- source_word: בַּחוֹמָה
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la muralla
  - el muro de la ciudad
  lexicon: HALOT
  rationale: El singular con artículo se mantiene. En español, «muro» comunica el elemento fortificado de manera clara y sobria; «muralla» también sería posible, pero «muro» evita una lectura demasiado interpretativa y sigue siendo comprensible en este contexto.
- source_word: וָאָשׁוּב
  english_pob_choice: turned back
  chosen_spanish: me di la vuelta
  alternatives_spanish:
  - volví atrás
  - regresé
  lexicon: HALOT
  rationale: La primera ocurrencia de שוב marca un cambio inmediato de dirección. «Me di la vuelta» conserva ese giro físico antes de la entrada por la puerta, diferenciándolo del regreso final.
- source_word: וָאָבֹוא
  english_pob_choice: entered
  chosen_spanish: entré
  alternatives_spanish:
  - fui a entrar
  - ingresé
  lexicon: HALOT
  rationale: בוא con la frase de la puerta expresa movimiento hacia el interior; «entré» es la solución española más directa y natural.
- source_word: בְּשַׁעַר הַגַּיְא
  english_pob_choice: by the Valley Gate
  chosen_spanish: por la Puerta del Valle
  alternatives_spanish:
  - por la Puerta del Vado
  - por la Puerta del Barranco
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicional transparente «Puerta del Valle». «Por» refleja la preposición de ruta del hebreo, sin forzar un matiz distinto.
- source_word: וָאָשׁוּב
  english_pob_choice: returned
  chosen_spanish: regresé
  alternatives_spanish:
  - volví
  - retorné
  lexicon: HALOT
  rationale: La segunda ocurrencia de שוב concluye el recorrido; «regresé» suena natural en español y distingue el cierre global del trayecto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo narrativo y la revisión inglesa más reciente: mantiene el pasado simple para la secuencia de movimientos y conserva la interpretación contextual de שֹׂבֵר como inspección. También respeta la nota cultural sobre נחל mediante la transliteración wadi, y la referencia a la puerta como nombre propio.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - Se conserva la distinción entre el movimiento de giro («me di la vuelta») y el regreso final («regresé») para no aplanar dos usos de שוב.
  - Se elige «muro» en vez de «muralla» para mantener una lectura sobria y directa, aunque ambas opciones serían defendibles en español.
