revisions:
- from: 'Cuando los hombres de Asdod vieron que así era[a], dijeron: «El arca del Dios de Israel no debe permanecer con nosotros[b], porque su mano pesa duramente contra nosotros y contra Dagón, nuestro dios».'
  to: 'Cuando los hombres de Asdod vieron que así era, dijeron: «El arca del Dios de Israel no debe permanecer[a] con nosotros, porque su mano es pesada[b] contra nosotros y contra Dagón, nuestro dios».'
  rationale: Se quitó la nota innecesaria sobre «que así era», se restauró la nota léxica en «permanecer» conforme al audit trail, y se añadió la nota requerida para el modismo de la «mano pesada». En el texto principal, «es pesada» preserva mejor la metáfora hebrea que «pesa duramente» y evita una intensificación interpretativa no documentada.
