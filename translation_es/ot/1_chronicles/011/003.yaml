translation:
  language: es
  text: Así que todos los ancianos de Israel vinieron al rey en Hebrón, y David hizo un pacto con ellos en Hebrón delante de Yahvé. Luego ungieron a David como rey sobre Israel, conforme a la palabra de Yahvé por medio de Samuel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por la mano de Samuel», un modismo que significa «por medio de Samuel» o «por Samuel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los líderes de Israel
  lexicon: HALOT
  rationale: «Ancianos» conserva el sentido de un cuerpo reconocido de representantes con peso social y político; «líderes» es posible, pero atenúa la especificidad del término.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey David
  lexicon: HALOT
  rationale: El hebreo usa el título con artículo, no el nombre propio; «el rey» preserva ese rasgo narrativo, aunque el contexto identifica que se trata de David.
- source_word: חֶבְרוֹנָה / בְּחֶבְרוֹן
  english_pob_choice: at Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - a Hebrón
  - en la ciudad de Hebrón
  lexicon: HALOT
  rationale: La forma direccional inicial indica movimiento hacia Hebrón, pero en español la ubicación narrativa se expresa naturalmente con «en». La segunda mención también ubica el pacto allí.
- source_word: וַיִּכְרֹת ... בְּרִית
  english_pob_choice: made a covenant
  chosen_spanish: hizo un pacto
  alternatives_spanish:
  - concertó un pacto
  - cortó un pacto
  lexicon: HALOT
  rationale: El hebreo es un modismo literal de «cortar un pacto»; en español, «hizo un pacto» comunica con claridad la acción sin perder el contenido formal del acuerdo solemne.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: «Delante de» conserva el matiz solemne y de testimonio público ante Dios, manteniendo el nombre divino según el estándar del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino como «Yahvé», en lugar de sustituirlo por un título, conforme al criterio del proyecto.
- source_word: וַיִּמְשְׁחוּ
  english_pob_choice: they anointed
  chosen_spanish: ungieron
  alternatives_spanish:
  - consagraron
  - derramaron aceite sobre
  lexicon: HALOT
  rationale: El verbo denota la unción real de manera concreta; «ungieron» es la forma directa y fiel en español para este acto de instalación regia.
- source_word: לְמֶלֶךְ עַל יִשְׂרָאֵל
  english_pob_choice: king over Israel
  chosen_spanish: como rey sobre Israel
  alternatives_spanish:
  - rey sobre Israel
  - para rey sobre Israel
  lexicon: HALOT
  rationale: «Como rey sobre Israel» expresa con naturalidad la función/nombramiento resultante del acto de unción, sin deformar la sintaxis española.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - como había dicho Yahvé
  lexicon: HALOT
  rationale: «Palabra» traduce de manera directa דָבָר y mantiene el vínculo formal con el acto de hablar divino; «conforme a» preserva la relación normativa sin añadir matices no explícitos.
- source_word: בְּיַד שְׁמוּאֵל
  english_pob_choice: by Samuel
  chosen_spanish: por medio de Samuel
  alternatives_spanish:
  - por Samuel
  - por la mano de Samuel
  lexicon: HALOT
  rationale: El hebreo es un modismo de agencia/mediación literal («por la mano de Samuel»). «Por medio de Samuel» comunica esa mediación con naturalidad en español, sin perder el sentido de instrumento profético.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto de pacto y testimonio
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo sitúa el pacto y la unción bajo testimonio divino directo. Traducir יְהוָה como «Yahvé» preserva el nombre propio del Dios del pacto, en vez de ocultarlo tras una sustitución titular.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: בְּיַד שְׁמוּאֵל como mediación profética
  english_pob_reading: by Samuel
  chosen_spanish_reading: por medio de Samuel
  alternative_spanish_readings:
  - por Samuel
  - por la mano de Samuel
  rationale: La frase hebrea expresa mediación instrumental, no simple autoría literaria. «Por medio de Samuel» conserva la acción divina anunciada y ejecutada mediante el profeta.
  doctrine_reference: Uso idiomático hebreo de agencia/mediación
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se conservan el nombre divino, el valor de «ancianos», el modismo de pacto, la unción real y la mediación de Samuel. No se detectaron revisiones posteriores que requieran ajuste.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Pacto» mantiene la terminología bíblica habitual para בְּרִית, en vez de una paráfrasis.
  - «Ungieron» conserva la concreción ritual de וַיִּמְשְׁחוּ.
  - El sentido de mediación en בְּיַד שְׁמוּאֵל queda explicitado en la nota.
  - La puntuación sigue el español editorial estándar y mantiene una sola oración compuesta como en el hebreo.
