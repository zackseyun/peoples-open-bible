lexical_decisions:
- source_word: πολλάκις
  english_pob_choice: often
  chosen_spanish: muchas veces
  alternatives_spanish:
  - a menudo
  - frecuentemente
  lexicon: LSJ
  rationale: Adverbio de repetición; 'muchas veces' conserva la idea iterativa de manera natural en español y mantiene un registro bíblico claro sin sonar mecánico.
- source_word: τῶν ἐπʼ ἐξουσίας τεταγμένων
  english_pob_choice: those appointed to positions of authority
  chosen_spanish: los que habían sido puestos en cargos de autoridad
  alternatives_spanish:
  - los designados para posiciones de autoridad
  - los establecidos sobre la autoridad
  lexicon: LSJ
  rationale: τεταγμένων expresa ser puestos/designados; ἐξουσία aquí es autoridad o cargo oficial. 'Puestos en cargos de autoridad' evita una abstracción excesiva y refleja la función pública.
- source_word: τῶν πιστευθέντων χειρίζειν φίλων τὰ πράγματα
  english_pob_choice: trusted friends set over affairs
  chosen_spanish: confiados amigos encargados de los asuntos
  alternatives_spanish:
  - amigos de confianza puestos a cargo de los asuntos
  - amigos confiados para manejar los asuntos
  lexicon: LSJ
  rationale: La secuencia griega es comprimida y difícil. 'Confiados amigos encargados de los asuntos' conserva el valor de πιστευθέντων como confianza/encargo y χειρίζειν τὰ πράγματα como manejar o estar a cargo de los asuntos.
- source_word: παρανοίᾳ
  english_pob_choice: through madness
  chosen_spanish: por locura
  alternatives_spanish:
  - a causa de la locura
  - por demencia
  lexicon: LSJ
  rationale: παρανοία denota locura o extravío mental; 'por locura' es breve y fiel al valor instrumental, preservando la dureza moral y psicológica del término.
- source_word: μετόχους αἱμάτων ἀθώων
  english_pob_choice: partners in innocent blood
  chosen_spanish: partícipes en sangre inocente
  alternatives_spanish:
  - partícipes de sangre inocente
  - participantes en la sangre de inocentes
  lexicon: LSJ
  rationale: μετόχους implica participación/complicidad. 'Partícipes en sangre inocente' mantiene la expresión semítica y deja oír la idea de culpabilidad compartida en derramamiento de sangre inocente.
- source_word: περιέβαλε συμφοραῖς ἀνηκέστοις
  english_pob_choice: has engulfed them in irreparable disasters
  chosen_spanish: los ha envuelto en desastres irreparables
  alternatives_spanish:
  - los ha rodeado de calamidades irremediables
  - los ha sumido en desgracias irreparables
  lexicon: LSJ
  rationale: περιέβαλε literalmente 'envolvió/rodeó'; con συμφοραῖς expresa quedar cercado por calamidades. 'Los ha envuelto' conserva la imagen verbal y 'desastres irreparables' refleja ἀνηκέστοις como irremediables o sin remedio.
theological_decisions:
- issue: Sujeto femenino implícito no nombrado explícitamente
  english_pob_reading: Render with generic 'she' without identifying the referent in the text
  chosen_spanish_reading: Mantener el sujeto con 'ha hecho' y 'ha envuelto' sin identificarlo en la misma línea
  alternative_spanish_readings:
  - ella ha hecho
  - la Fortuna ha hecho
  - la ira del rey ha hecho
  rationale: El griego usa verbos femeninos singulares, pero el referente inmediato no está nombrado en este versículo. El español puede evitar una identificación explícita y conservar la tensión interpretativa del texto.
  doctrine_reference: Preservar la tensión textual sin resolver un referente no explicitado.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió 'through madness', 'trusted friends set over affairs', 'partners in innocent blood' e 'irreparable disasters' por naturalidad y precisión. La versión española procura conservar esos avances, pero ajusta la sintaxis para que suene plenamente idiomática en español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni κύριος con esa función.
  - Se usó 'locura' para παρανοίᾳ por ser el equivalente natural y suficientemente fuerte en español.
  - Se eligió 'partícipes' para conservar la idea de complicidad sin suavizarla a 'siervos' o 'compañeros'.
  - '''Desastres irreparables'' conserva el valor de ἀνηκέστοις como sin remedio, en un registro formal y publicable.'
