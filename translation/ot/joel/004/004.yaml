id: JOL.4.4
reference: Joel 4:4
source:
  edition: WLC
  text: וְ֠/גַם מָה אַתֶּ֥ם לִ/י֙ צֹ֣ר וְ/צִיד֔וֹן וְ/כֹ֖ל גְּלִיל֣וֹת פְּלָ֑שֶׁת הַ/גְּמ֗וּל אַתֶּם֙ מְשַׁלְּמִ֣ים עָלָ֔/י וְ/אִם גֹּמְלִ֤ים אַתֶּם֙ עָלַ֔/י קַ֣ל מְהֵרָ֔ה אָשִׁ֥יב גְּמֻלְ/כֶ֖ם בְּ/רֹאשְׁ/כֶֽם־־׃
translation:
  text: And also[a], what are you to me, Tyre and Sidon, and all the regions of Philistia? Are you repaying me with recompense? If you are dealing out repayment against me[b], swiftly and quickly I will return your repayment on your own head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What have you to do with me?' The Hebrew idiom is a confrontational challenge.
    reason: lexical_alternative
  - marker: b
    text: Or 'districts' or 'territories' of Philistia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם מָה אַתֶּם לִי
  chosen: And also, what are you to me
  alternatives:
  - And what are you to me
  - What have you to do with me
  lexicon: HALOT
  rationale: The idiom expresses challenge or dismissal toward the addressed nations. 'What are you to me' preserves the Hebrew form more transparently than the more idiomatic English 'what have you to do with me,' while 'and also' reflects וְגַם as an emphatic connective.
- source_word: צֹר וְצִידוֹן
  chosen: Tyre and Sidon
  rationale: Standard English transliterations of the place names; names are transliterated per translation philosophy.
- source_word: וְכֹל גְּלִילוֹת פְּלָשֶׁת
  chosen: and all the regions of Philistia
  alternatives:
  - and all the districts of Philistia
  - and all the territories of the Philistines
  lexicon: HALOT
  rationale: גְּלִילוֹת denotes regions/districts. 'Philistia' fits the proper-name form פְּלָשֶׁת better than 'the Philistines,' though the latter captures the people-group association.
- source_word: הַגְּמוּל
  chosen: recompense
  alternatives:
  - retaliation
  - deed
  - payment
  lexicon: HALOT
  rationale: The noun refers to repayment or requital. 'Recompense' preserves the judicial-retaliatory sense and pairs naturally with the repeated גמל/גמול wordplay in the verse.
- source_word: מְשַׁלְּמִים
  chosen: repaying
  alternatives:
  - paying back
  - requiting
  lexicon: HALOT
  rationale: From שלם in the piel, here meaning to repay or pay back. 'Repaying' is clear modern English and keeps the sense of requital.
- source_word: וְאִם גֹּמְלִים אַתֶּם עָלַי
  chosen: If you are dealing out repayment against me
  alternatives:
  - If you are repaying me
  - If you are doing this to me
  lexicon: HALOT
  rationale: גמל here overlaps semantically with גמול and continues the repayment motif. 'Dealing out repayment' preserves the lexical connection while avoiding flattening the repetition into identical English wording.
- source_word: קַל מְהֵרָה
  chosen: swiftly and quickly
  alternatives:
  - quickly, speedily
  - in swift haste
  lexicon: HALOT
  rationale: The paired adverbial expressions intensify immediacy. Rendering both terms preserves the emphatic duplication rather than collapsing them into a single adverb.
- source_word: אָשִׁיב
  chosen: I will return
  alternatives:
  - I will repay
  - I will bring back
  lexicon: HALOT
  rationale: The Hiphil of שוב means cause to return/return. 'I will return' preserves the imagery of turning their own action back on them; the object 'your repayment' makes the sense explicit.
- source_word: גְּמֻלְכֶם
  chosen: your repayment
  alternatives:
  - your recompense
  - what you have done
  lexicon: HALOT
  rationale: Keeps the lexical tie to הַגְּמוּל and גֹּמְלִים. 'Your repayment' here means the repayment they intended to inflict, now returned upon them.
- source_word: בְּרֹאשְׁכֶם
  chosen: on your own head
  alternatives:
  - upon your head
  lexicon: HALOT
  rationale: A common Hebrew idiom for consequences returning upon the perpetrator. 'On your own head' is natural English and preserves the idiom's force.
