revisions:
- from: Porque estas naciones[a], que tú vas a desposeer, escuchan a los adivinos y a los hechiceros; pero a ti[c][b], Yahvé tu Dios no te ha permitido hacer así.
  to: Porque estas naciones[a], que tú vas a desposeer, escuchan a los agoreros[b] y a los adivinos; pero en cuanto a ti[c], Yahvé tu Dios no te ha permitido hacer esto.
  rationale: Se corrige «hechiceros» a «adivinos» y se usa «agoreros» para מְעֹנְנִים, lo que preserva mejor la distinción semántica del hebreo sin introducir hechicería. Se reubica la nota cultural al término pertinente y se mejora la naturalidad de la cláusula final con «hacer esto», que sigue expresando el objeto implícito documentado en el audit trail inglés. También se ajusta «pero a ti» a «pero en cuanto a ti» para reflejar mejor el contraste enfático de וְאַתָּה.
