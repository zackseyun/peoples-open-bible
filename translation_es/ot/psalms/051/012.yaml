translation:
  language: es
  text: Crea en mí un corazón limpio[a], oh Dios, y renueva un espíritu firme[b] dentro de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puro».
    reason: lexical_alternative
  - marker: b
    text: O «espíritu recto»; el hebreo también puede sugerir algo firme o establecido.
    reason: alternative_reading
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - centro interior
  - mente
  lexicon: HALOT
  rationale: לב designa el centro de la vida interior humana; en español, «corazón» conserva esa amplitud antropológica mejor que opciones más restrictivas como «mente». Mantiene también la fuerza poética del paralelismo del verso.
- source_word: טָהוֹר
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - puro
  lexicon: HALOT
  rationale: «Limpio» reproduce bien la resonancia de purificación del salmo y funciona de manera natural con «corazón» en español. «Puro» es posible, pero suena más abstracto aquí.
- source_word: בְּרָא
  english_pob_choice: create
  chosen_spanish: crea
  alternatives_spanish:
  - haz
  - forma
  - trae a existencia
  lexicon: HALOT
  rationale: El verbo ברא se asocia de manera distintiva con la acción creadora de Dios; «crea» preserva esa fuerza teológica y el carácter transformador de la súplica.
- source_word: לִי
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - para mí
  - por mí
  lexicon: HALOT
  rationale: Aunque literalmente puede tener matiz de dirección o beneficio, en este contexto la petición apunta a una transformación interna; «en mí» expresa mejor esa interioridad en español.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: El hebreo es vocativo en oración; «oh Dios» conserva la apelación directa y el tono suplicante del verso.
- source_word: רוּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - disposición
  - mente
  lexicon: HALOT
  rationale: «Espíritu» preserva la amplitud semántica de רוּחַ y el paralelismo con «corazón» sin reducirlo a una sola facultad psicológica.
- source_word: נָכוֹן
  english_pob_choice: steadfast
  chosen_spanish: firme
  alternatives_spanish:
  - constante
  - estable
  - recto
  lexicon: HALOT
  rationale: El término apunta a algo establecido, seguro o firme. «Firme» comunica bien la estabilidad interior que pide el salmista; en español resulta más natural que «recto» y menos interpretativo que una paráfrasis.
- source_word: חַדֵּשׁ
  english_pob_choice: renew
  chosen_spanish: renueva
  alternatives_spanish:
  - haz nuevo
  - restaura
  lexicon: HALOT
  rationale: «Renueva» es la forma más natural en español para una petición de revitalización interior y conserva la idea de hacer nuevo de nuevo sin perder el sentido de restauración.
- source_word: בְּקִרְבִּי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mi interior
  - en mis entrañas
  lexicon: HALOT
  rationale: La expresión señala localización interna; «dentro de mí» es clara y sobria en español moderno, evitando registros demasiado arcaicos o demasiado técnicos.
theological_decisions:
- issue: Matiz de נָכוֹן en רוּחַ נָכוֹן
  english_pob_reading: steadfast spirit
  chosen_spanish_reading: espíritu firme
  alternative_spanish_readings:
  - espíritu recto
  - espíritu constante
  rationale: La evidencia hebrea favorece estabilidad, firmeza o establecimiento más que mera corrección moral. «Espíritu firme» conserva esa tensión y refleja la petición de una vida interior sostenida tras el pecado.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión del expediente: no hay cambios de sentido requeridos y el consenso de revisión es alto. Se mantiene la correspondencia poética entre «corazón» y «espíritu», y la decisión sobre נָכוֹן sigue la lectura de estabilidad/firmeza documentada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se conserva «Dios» como vocativo directo, no como sustituto reverencial en mayúsculas.
  - «Limpio» y «firme» reflejan la preferencia del expediente por claridad natural sin perder la carga moral/espiritual del hebreo.
  - 'La sintaxis mantiene el paralelismo del hebreo con dos imperativos: creación interior y renovación interior.'
