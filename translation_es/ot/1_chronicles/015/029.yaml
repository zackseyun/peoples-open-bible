translation:
  language: es
  text: Mientras el arca del pacto de Yahvé llegaba a la ciudad de David, Mical, hija de Saúl, miró por la ventana y vio al rey David danzando y festejando[a]; y lo despreció en su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «jugando», «regocijándose» o «haciendo fiesta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahvé, el arca del convenio de Yahvé
  lexicon: HALOT
  rationale: Conservo la cadena constructa con «arca del pacto» y traduzco el Nombre divino como «Yahvé» según la política del proyecto. «Pacto» preserva mejor el valor bíblico-jurídico de בְּרִית que «convenio» en este contexto.
- source_word: בָּא עַד עִיר דָּוִיד
  english_pob_choice: came to the city of David
  chosen_spanish: llegó a la ciudad de David
  alternatives_spanish:
  - vino a la ciudad de David
  - entró en la ciudad de David
  lexicon: HALOT
  rationale: בוא con עַד indica arribo al destino. «Llegó a» es natural en español y mantiene el énfasis en la llegada sin añadir la idea de entrada si no se expresa explícitamente.
- source_word: מִיכַל בַּת שָׁאוּל
  english_pob_choice: Michal the daughter of Saul
  chosen_spanish: Mical, hija de Saúl
  alternatives_spanish:
  - Mical, la hija de Saúl
  - Mical, hija de Saúl
  lexicon: HALOT
  rationale: La identificación appositiva se conserva de forma directa y legible en español. «Hija de Saúl» mantiene la marca narrativa de su linaje.
- source_word: נִשְׁקְפָה בְּעַד הַחַלּוֹן
  english_pob_choice: looked out through the window
  chosen_spanish: miró por la ventana
  alternatives_spanish:
  - se asomó por la ventana
  - miró a través de la ventana
  lexicon: HALOT
  rationale: El verbo apunta a observar desde una ventana; «miró por la ventana» es idiomático y suficientemente preciso. «Se asomó» sería posible, pero «miró» mantiene mejor la sobriedad del relato.
- source_word: וַתֵּרֶא אֶת הַמֶּלֶךְ דָּוִיד
  english_pob_choice: saw King David
  chosen_spanish: vio al rey David
  alternatives_spanish:
  - vio al rey, David
  - vio al rey David
  lexicon: HALOT
  rationale: En español, «rey David» funciona de modo natural y conserva el título unido al nombre. El acusativo explícito no requiere marcación adicional más allá de «al».
- source_word: מְרַקֵּד
  english_pob_choice: dancing
  chosen_spanish: danzando
  alternatives_spanish:
  - bailando
  - saltando
  lexicon: HALOT
  rationale: «Danzando» conserva el matiz de movimiento festivo y algo solemne mejor que «bailando», que puede sonar más coloquial. Evito «saltando» por ser más estrecho y menos claro aquí.
- source_word: וּמְשַׂחֵק
  english_pob_choice: playing
  chosen_spanish: jugando
  alternatives_spanish:
  - regocijándose
  - haciendo fiesta
  - celebrando
  lexicon: HALOT
  rationale: Sigo la decisión del audit trail de no reducirlo a «celebrando»; «jugando» refleja el campo semántico básico de שׂחק y preserva la tensión entre juego, gozo y celebración ritual. En español suena menos interpretativo que «haciendo fiesta».
- source_word: וַתִּבֶז לוֹ
  english_pob_choice: and she despised him
  chosen_spanish: y lo despreció
  alternatives_spanish:
  - y lo tuvo en menosprecio
  - y lo menospreció
  lexicon: HALOT
  rationale: «Despreció» reproduce היטב la fuerza de בזה. «Lo tuvo en menosprecio» sería más analítico, pero menos natural y más distante del impacto narrativo.
- source_word: בְּלִבָּהּ
  english_pob_choice: in her heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de sí
  - en lo íntimo de su corazón
  lexicon: HALOT
  rationale: Mantengo la metáfora interna literal, ya asentada en español bíblico y plenamente comprensible. «En su corazón» preserva la interioridad del desprecio sin sobreexplicarla.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente, y el proyecto ha fijado «Yahvé» como forma principal en español. No se sustituye por «SEÑOR» porque eso ocultaría el Nombre propio; «Jehová» queda descartado por no ser la forma adoptada por este proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de וּמְשַׂחֵק en contexto procesional
  english_pob_reading: playing
  chosen_spanish_reading: jugando
  alternative_spanish_readings:
  - celebrando
  - regocijándose
  - haciendo fiesta
  rationale: El audit trail inglés revisó «celebrating» a «playing» para acercarse más al verbo hebreo. En español, «jugando» conserva esa amplitud semántica sin borrar el matiz festivo del contexto; «celebrando» sería una interpretación más cerrada que atenúa la tensión léxica.
  doctrine_reference: HALOT / audit trail lexical decision
- issue: Relación entre reverencia cultual y actitud de Mical
  english_pob_reading: she despised him in her heart
  chosen_spanish_reading: lo despreció en su corazón
  alternative_spanish_readings:
  - lo menospreció en su interior
  - lo tuvo en menosprecio en su corazón
  rationale: Se mantiene la fuerza moral del verbo בזה y la localización interior del juicio de Mical. No se suaviza a una mera desaprobación, porque el texto expresa desprecio real.
  doctrine_reference: Narrative ethics in 1 Chronicles 15
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente que sustituyó «celebrating» por «playing» para acercarse más a וּמְשַׂחֵק sin perder naturalidad. En esta versión española se refleja esa revisión con «jugando», manteniendo la tensión entre juego, alegría y celebración ritual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del Nombre divino, en coherencia con la política del proyecto.
  - «Mical» se usa como forma española estándar del nombre propio, y «Saúl» y «David» se conservan sin transliteración adicional.
  - «Despreció en su corazón» preserva la fuerza de בזה y la localización interior de la actitud.
  - «Danzando y jugando» sigue la decisión lexical del audit trail y evita reducir prematuramente el segundo verbo a una sola lectura interpretativa.
