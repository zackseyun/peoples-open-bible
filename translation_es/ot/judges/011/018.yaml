  language: en
  yaml_path: translation/ot/judges/011/018.yaml
  text: Then he went through the wilderness and went around the land of Edom and the land of Moab[a], and came to the east side of the land of Moab, and they camped beyond the Arnon; but they did not enter the territory of Moab[b], for the Arnon was the border of Moab.
  footnotes:
