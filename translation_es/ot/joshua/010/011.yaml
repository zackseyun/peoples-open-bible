translation:
  language: es
  text: Y mientras huían ante Israel[a], por la bajada de Bet-jorón, Yahvé lanzó sobre ellos grandes piedras desde el cielo, hasta Azeca, y murieron. Murieron más por las piedras de granizo que los hijos de Israel mataron con la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «los israelitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֻסָם מִפְּנֵי יִשְׂרָאֵל
  english_pob_choice: as they fled before Israel
  chosen_spanish: mientras huían de delante de Israel
  alternatives_spanish:
  - mientras huían ante Israel
  - al huir de delante de Israel
  lexicon: HALOT
  rationale: El infinitivo constructo con la preposición temporal expresa acción simultánea; en español, «mientras huían» conserva esa simultaneidad con naturalidad. «De delante de Israel» mantiene la idea idiomática de retirada ante un enemigo sin forzar una paráfrasis.
- source_word: בְּמוֹרַד בֵּית חוֹרֹן
  english_pob_choice: while they were on the descent of Beth-horon
  chosen_spanish: por la bajada de Bet-jorón
  alternatives_spanish:
  - en la bajada de Bet-jorón
  - en la pendiente de Bet-jorón
  lexicon: HALOT
  rationale: מוֹרַד denota una bajada o descenso topográfico. «Bajada» es claro en español y conserva la referencia geográfica concreta. Se mantiene el topónimo en forma hispanizada breve y reconocible.
- source_word: וַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La política del proyecto exige renderizar el Tetragrámaton como «Yahvé», no como un sustituto reverencial. Se conserva el nombre del pacto con el mismo valor distintivo que en el hebreo.
- source_word: הִשְׁלִיךְ
  english_pob_choice: threw
  chosen_spanish: lanzó
  alternatives_spanish:
  - arrojó
  - tiró
  lexicon: HALOT
  rationale: El verbo significa echar/arrojar; «lanzó» expresa bien el acto divino de enviar objetos desde arriba sin añadir una dirección no explicitada por el verbo, y suena natural en español bíblico moderno.
- source_word: אֲבָנִים גְּדֹלוֹת
  english_pob_choice: large stones
  chosen_spanish: grandes piedras
  alternatives_spanish:
  - piedras grandes
  - piedras enormes
  lexicon: HALOT
  rationale: La construcción primero nombra «piedras» y luego el texto las identifica como granizo; por eso se mantiene una denominación general en el primer miembro. «Grandes piedras» es fiel y claro en español.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  - del cielo
  lexicon: HALOT
  rationale: En este contexto, la fuente celestial indica procedencia divina y movimiento descendente. «Desde el cielo» conserva ambas ideas en español natural.
- source_word: עַד עֲזֵקָה
  english_pob_choice: as far as Azekah
  chosen_spanish: hasta Azeca
  alternatives_spanish:
  - hasta Azeká
  - a Azeca
  lexicon: HALOT
  rationale: La preposición marca alcance espacial. «Hasta» transmite el límite de la extensión del juicio, y «Azeca» es una forma hispanizada legible del topónimo.
- source_word: וַיָּמֻתוּ
  english_pob_choice: and they died
  chosen_spanish: y murieron
  alternatives_spanish:
  - y fallecieron
  - y perecieron
  lexicon: HALOT
  rationale: La forma narrativa simple se expresa de modo directo con «murieron». Mantiene el ritmo del hebreo sin adornos interpretativos.
- source_word: בְּאַבְנֵי הַבָּרָד
  english_pob_choice: from the hailstones
  chosen_spanish: por las piedras de granizo
  alternatives_spanish:
  - por los granizos
  - por las granizadas
  lexicon: HALOT
  rationale: El hebreo vuelve a identificar las piedras como granizo. «Piedras de granizo» preserva el vínculo literal entre ambas menciones y deja visible la progresión del texto.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina del constructo, como hace el POB inglés con «the sons of Israel». «Los hijos de Israel» es fiel y reconocible en español bíblico, sin ocultar la forma del original.
- source_word: בֶּחָרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  lexicon: HALOT
  rationale: El beth instrumental se traduce naturalmente con «con». «La espada» preserva el singular colectivo militar del hebreo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y la política del proyecto exige representarlo con el nombre propio divino. «Yahvé» mantiene la distinción del nombre del pacto y evita el ocultamiento reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Naturaleza de las piedras arrojadas desde el cielo
  english_pob_reading: 'The main text preserves both stages of the Hebrew description: ''large stones'' and later ''hailstones''.'
  chosen_spanish_reading: 'El texto principal conserva ambas etapas: «grandes piedras» y luego «piedras de granizo».'
  alternative_spanish_readings:
  - traducir ya la primera mención como «granizo»
  - unificar ambas menciones como «piedras de granizo»
  rationale: El hebreo introduce primero el objeto como piedras grandes y más tarde lo identifica como granizo. Mantener ambas formulaciones evita armonizar de manera prematura y conserva la progresión narrativa del juicio divino.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Referencia colectiva a בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Aunque «los israelitas» es más idiomático, la forma «hijos de Israel» refleja mejor la estructura nominal masculina del hebreo y reproduce la decisión inglesa de conservar la forma genérica masculina en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió la revisión auditada del POB inglés que sustituyó «threw down» por un verbo más cercano al hebreo, sin añadir una dirección explícita. En español, «lanzó» conserva esa cercanía léxica y mantiene la imagen de intervención divina desde arriba. También se preservó la doble referencia del objeto como «piedras» y luego «piedras de granizo», conforme al contexto de auditoría.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יהוה, conforme al estándar del proyecto.
  - «Bet-jorón» y «Azeca» están hispanizados de forma estable y legible.
  - Se mantiene el contraste entre «grandes piedras» y «piedras de granizo» para reflejar la progresión del hebreo.
  - La nota al pie marca únicamente la alternativa lexical equivalente para בְּנֵי יִשְׂרָאֵל y aparece anclada en el texto.
  - El registro evita calcos rígidos como «delante de» en favor de una construcción española natural, sin perder el matiz de oposición militar.
