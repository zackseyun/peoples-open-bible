    rationale: Aunque comunica la idea general, en español sugiere más 'usar a ella como material' que 'ponértela / revestirte con ella'. El hebreo תלבשנה y el griego ἐνδύσῃ αὐτήν tratan a 'ella' como objeto explícito de la acción de vestir, dentro de la personificación de la sabiduría.
  - severity: low
