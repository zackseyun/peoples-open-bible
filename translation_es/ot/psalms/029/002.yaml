translation:
  language: es
  text: Atribuid a Yahvé la gloria de su nombre[a]; adorad a Yahvé en santo esplendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el esplendor de la santidad»; también puede entenderse como «en vestiduras santas».'
    reason: alternative_reading
lexical_decisions:
- source_word: הָבוּ
  english_pob_choice: Ascribe
  chosen_spanish: Atribuid
  alternatives_spanish:
  - Dad
  - Rendid
  lexicon: HALOT
  rationale: El imperativo plural pide atribuir o rendir honor, no entregar algo materialmente. «Atribuid» conserva bien el valor litúrgico y el sentido de adjudicar honor a Yahvé.
- source_word: לַֽיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para יְהוָה: «Yahvé». Se evita «SEÑOR» porque aquí el texto hebreo usa el Nombre divino de forma directa.'
- source_word: כְּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - majestad
  lexicon: HALOT
  rationale: «Gloria» es el equivalente más natural y teológicamente resonante en este contexto de adoración, y preserva el peso de כָּבוֹד.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su nombre revelado
  - su reputación
  lexicon: HALOT
  rationale: La expresión posesiva simple refleja el constructo hebreo sin ampliar innecesariamente el sentido; el contexto ya sugiere su identidad revelada.
- source_word: כְּבוֹד שְׁמוֹ
  english_pob_choice: the glory of his name
  chosen_spanish: la gloria de su nombre
  alternatives_spanish:
  - la gloria debida a su nombre
  - la gloria de su nombre
  lexicon: HALOT
  rationale: En español, «la gloria de su nombre» reproduce con fidelidad el constructo y evita explicitar «debida», que sería una aclaración interpretativa no obligatoria.
- source_word: הִשְׁתַּחֲוּ
  english_pob_choice: worship
  chosen_spanish: adorad
  alternatives_spanish:
  - postraos
  - rendid adoración
  lexicon: HALOT
  rationale: El verbo incluye la idea física de inclinarse o postrarse, pero en este contexto cúltico la traducción natural y fiel es «adorad», sin perder el sentido reverente.
- source_word: בְּהַדְרַת
  english_pob_choice: in holy splendor
  chosen_spanish: en esplendor santo
  alternatives_spanish:
  - en la belleza de la santidad
  - en santo esplendor
  - en vestiduras santas
  lexicon: HALOT
  rationale: «הָדָר» comunica esplendor, majestad o adornamiento; «en esplendor santo» mantiene la ambigüedad poética entre cualidad sagrada y posible referencia cultual concreta.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - de santidad
  - sagrado
  lexicon: HALOT
  rationale: «Santo» funciona con naturalidad como adjetivo de «esplendor» y conserva el matiz de consagración sin cerrar la ambigüedad del hebreo.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: 'Se mantiene la terminología del proyecto para el Tetragrámaton: «Yahvé». Esto conserva la identidad del Nombre revelado y evita la convención de ocultarlo tras un título.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Ambigüedad de בְּהַדְרַת קֹדֶשׁ
  english_pob_reading: in holy splendor
  chosen_spanish_reading: en esplendor santo
  alternative_spanish_readings:
  - en la hermosura de la santidad
  - en vestiduras santas
  - en el esplendor de la santidad
  rationale: La frase admite lectura abstracta o cultual concreta. «Esplendor santo» preserva esa tensión sin resolverla prematuramente, en línea con la filosofía POB de no apagar la ambigüedad documentada.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El texto inglés auditado revisó «the glory due his name» a «the glory of his name» para acercarse más al constructo hebreo. La versión española sigue ese ajuste con «la gloria de su nombre», sin añadir «debida», que sería una explicitación interpretativa adicional.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - 'Se conserva el paralelismo verbal con dos imperativos en plural: «Atribuid» / «adorad».'
  - «Esplendor santo» mantiene una formulación breve y poética, adecuada al hebreo y al registro bíblico en español.
