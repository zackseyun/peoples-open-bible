translation:
  language: es
  text: 'Y la palabra de Yahvé[a] vino a mí, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH, tradicionalmente traducido 'el SEÑOR'; alternativamente, 'Yahvé'.
