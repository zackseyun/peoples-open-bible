revisions:
- from: Y como si fuera poca cosa para él andar en los pecados de Jeroboam hijo de Nabat[a], tomó por esposa a Jezabel, hija de Etbaal, rey de los sidonios, y fue y sirvió a Baal y se postró ante él.
  to: Y como si fuera poca cosa para él andar en los pecados de Jeroboam hijo de Nebat[a], tomó por esposa a Jezabel, hija de Etbaal, rey de los sidonios, y fue a servir a Baal y se postró ante él.
  rationale: Se ajusta 'Nabat' a 'Nebat' por ser la forma española bíblica más estable y reconocible, y se suaviza 'y fue y sirvió' a 'y fue a servir' para un español más natural, sin alterar la distinción entre servicio cultual y postración ni la fuerza retórica del original.
