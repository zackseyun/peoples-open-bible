translation:
  language: es
  text: Cuando ocurra[a]—y he aquí, está ocurriendo—entonces sabrán que ha habido un profeta entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Cuando ella venga / llegue —y he aquí, ella ha venido / viene / está viniendo». El hebreo usa formas femeninas, probablemente en referencia al acontecimiento o mensaje anunciado que llega a cumplirse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְבֹאָהּ
  english_pob_choice: When it comes
  chosen_spanish: Cuando esto ocurra
  alternatives_spanish:
  - Y cuando ocurra
  - Cuando llegue
  - Cuando ella llegue
  lexicon: HALOT
  rationale: 'La forma con preposición + infinitivo y sufijo femenino expresa un marco temporal: “cuando ocurra / cuando llegue”. En español, “esto” conserva la referencia impersonal al evento anunciado, que en el contexto es el juicio o la palabra profética que se cumple.'
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí
  - mira bien
  lexicon: HALOT
  rationale: “He aquí” mantiene el valor deíctico y el registro solemne de הִנֵּה sin caer en una calca demasiado moderna como “mira”, que en este contexto podría sonar demasiado coloquial.
- source_word: בָאָה
  english_pob_choice: it is coming
  chosen_spanish: está ocurriendo
  alternatives_spanish:
  - viene
  - está llegando
  - ha llegado
  lexicon: HALOT
  rationale: El qatal con valor profético junto a הִנֵּה apunta a una inminencia vívida o cumplimiento en curso. “Está ocurriendo” preserva ese dinamismo en español; “viene” sería posible, pero aquí el contexto favorece el cumplimiento del evento anunciado.
- source_word: וְיָדְעוּ
  english_pob_choice: then they will know
  chosen_spanish: entonces sabrán
  alternatives_spanish:
  - y sabrán
  - así sabrán
  - después sabrán
  lexicon: HALOT
  rationale: 'El consecutivo se traduce con valor inferencial/temporal: una vez que ocurra el hecho, vendrá el conocimiento. “Entonces” reproduce bien esa relación en español.'
- source_word: נָבִיא
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: El sustantivo indefinido se mantiene naturalmente como “un profeta”, que expresa el reconocimiento de su función sin añadir artículo definido.
- source_word: הָיָה
  english_pob_choice: has been
  chosen_spanish: hubo
  alternatives_spanish:
  - ha sido
  - había sido
  - estuvo
  lexicon: HALOT
  rationale: El hebreo expresa la realidad concluida de su presencia entre ellos. En español, “hubo un profeta entre ellos” comunica esa presencia efectiva y reconocida sin forzar un presente perfecto poco natural en la secuencia profética.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su medio
  lexicon: HALOT
  rationale: “Entre ellos” es la forma más natural y fiel en español para בְּתוֹכָם, conservando la idea de presencia dentro del grupo.
theological_decisions:
- issue: Referente femenino de “cuando viene/llega” y “está viniendo/ha llegado”
  english_pob_reading: The feminine forms refer to the foretold message/event of judgment coming to pass, rendered impersonally as 'it.'
  chosen_spanish_reading: La referencia femenina se entiende como al evento anunciado que se cumple; en español se expresa impersonalmente como “esto”.
  alternative_spanish_readings:
  - Cuando ella venga / he aquí, ella viene
  - Cuando eso venga / he aquí, eso viene
  rationale: La forma femenina del hebreo no exige un referente personal; el contexto apunta al cumplimiento del mensaje o del juicio anunciado. El español impersonal evita introducir una persona femenina inexistente y conserva la tensión textual sin explicarla en exceso dentro del verso.
  doctrine_reference: Preferencia por la referencia contextual del hebreo y por una equivalencia óptima que no borre la ambigüedad original.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo directamente, con apoyo del audit trail en inglés. Se respetó la actualización de registro en הִנֵּה con una forma española solemne (“he aquí”) en lugar de una equivalencia más coloquial. También se mantuvo la observación sobre el femenino hebreo, pero en español se optó por una referencia impersonal contextual (“esto”).
  spanish_consistency_notes:
  - Se conservó el registro profético solemne con “he aquí”.
  - Se evitó traducir mecánicamente el femenino hebreo como femenino personal en español.
  - “Entre ellos” mantiene la idea de presencia comunitaria sin añadir matices interpretativos.
  - La secuencia temporal/inferencial queda clara con “cuando… entonces…”.
