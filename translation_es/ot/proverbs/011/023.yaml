  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías, etc. A nivel lexical del pasaje, «los justos» alinea bien con צַדִּיקִים. Recomiendo «los malvados» en lugar de «los malos» para רְשָׁעִים y «ira» en lugar de «furia» para עֶבְרָה como equivalente principal, dejando «furia» como alternativa, en consonancia con el POB inglés.
