review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido del hebreo: la carne aún estaba entre los dientes del pueblo, todavía no se había acabado, Yahvé se airó contra el pueblo, y lo hirió con una plaga muy severa. También preserva correctamente el nombre divino Yahvé y el modismo de ira ardiente. Sin embargo, la nota al pie está anclada en el lugar equivocado: explica יִכָּרֵת (''fuera consumida / ser cortada''), pero el marcador [a] aparece sobre ''dientes'' en vez de sobre la frase ''consumida'' o equivalente.'
  spanish_quality_summary: El español es claro, natural y digno. No hay problemas graves de legibilidad. Aun así, 'furor' suena un poco más marcado y menos bíblico-corriente que 'ira'; y la colocación de la nota crea confusión porque el lector asociará la alternativa 'antes de ser cortada' con 'dientes' en lugar de con 'consumida'. Conviene una reparación menor moviendo el marcador al término correspondiente.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → ''Yahvé'' correctamente; imagery de חרה אף preservada; מַכָּה → ''plaga'' bien resuelto; בָּשָׂר → ''carne'' es aceptable y natural en español en este contexto alimentario. No hay conflicto doctrinal relevante.'
  issues:
  - severity: medium
    issue: Marcador de nota al pie mal anclado
    rationale: La nota explica el verbo יִכָּרֵת ('antes de ser cortada' / 'consumida'), pero el marcador [a] está colocado en 'dientes'. Esto no preserva correctamente la relación entre texto y nota exigida por el proyecto.
  - severity: low
    issue: '''Furor'' puede sonar más intenso o menos estándar que ''ira'''
    rationale: No es incorrecto, pero 'la ira de Yahvé se encendió' suena más transparente y más cercano al modismo hebreo חרה אף en registro bíblico general. Aun así, es una mejora estilística menor, no una corrección obligatoria.
  revised_spanish_text: Mientras la carne aún estaba entre sus dientes, antes de que fuera consumida[a], la ira de Yahvé se encendió contra el pueblo, y Yahvé hirió al pueblo con una plaga muy severa.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «antes de ser cortada»; es decir, antes de que la carne se terminara o se consumiera.
    reason: lexical_alternative
  revision_rationale: Se movió el marcador de nota al pie para anclarlo al término que la nota realmente explica (יִכָּרֵת, 'consumida / cortada'). Además, se ajustó 'furor' a 'ira' para una expresión más estándar y transparente del modismo hebreo en español bíblico moderno, sin cambiar el sentido.
