translation:
  language: es
  text: Aún un joven se da a conocer por sus hechos[a], sea pura y recta su obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aún un joven se reconoce por sus hechos, sea puro y recto lo que hace».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Aun
  alternatives_spanish:
  - También
  - Incluso
  lexicon: HALOT
  rationale: 'La partícula introduce énfasis concesivo: no solo los mayores, sino también un joven. «Aun» conserva esa fuerza en español sin sonar tan explicativo como «incluso».'
- source_word: בְּמַעֲלָלָיו
  english_pob_choice: by his deeds
  chosen_spanish: por sus hechos
  alternatives_spanish:
  - por sus acciones
  - por sus obras
  - por sus prácticas
  lexicon: HALOT
  rationale: מַעֲלָל puede abarcar hechos o acciones con carga moral. «Por sus hechos» mantiene la observación sapiencial y expresa bien el medio por el cual el joven es conocido.
- source_word: יִתְנַכֶּר
  english_pob_choice: makes himself known
  chosen_spanish: se da a conocer
  alternatives_spanish:
  - es reconocido
  - se muestra
  - se hace patente
  lexicon: HALOT
  rationale: 'El hitpael de נכר tiene matiz reflexivo: la persona se vuelve reconocible por su conducta. «Se da a conocer» preserva mejor esa idea que una simple pasiva.'
- source_word: נָעַר
  english_pob_choice: a youth
  chosen_spanish: un joven
  alternatives_spanish:
  - un muchacho
  - un muchacho joven
  - un muchacho o muchacha
  lexicon: HALOT
  rationale: נַעַר puede referirse a un joven de manera amplia. «Un joven» es natural en español y no restringe innecesariamente la edad.
- source_word: אִם זַךְ
  english_pob_choice: whether his work is pure
  chosen_spanish: si su obra es pura
  alternatives_spanish:
  - si su obra es limpia
  - si sus hechos son puros
  - si es puro
  lexicon: HALOT
  rationale: El hebreo conecta la cualidad con la obra/actividad implícita en פָּעֳלוֹ. «Su obra» evita perder ese vínculo y «pura» conserva la idea de pureza, limpieza o inocencia.
- source_word: וְאִם יָשָׁר
  english_pob_choice: and upright
  chosen_spanish: y recta
  alternatives_spanish:
  - y justa
  - y derecha
  - y íntegra
  lexicon: HALOT
  rationale: יָשָׁר expresa rectitud moral. En español, «recta» funciona bien con «pura» y mantiene el paralelismo del proverbio; «upright» no requiere una traducción eclesiástica fija aquí.
- source_word: פָּעֳלוֹ
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su hecho
  - lo que hace
  - su actividad
  lexicon: HALOT
  rationale: פֹּעַל significa obra, actividad o hecho. Dado que el verso ya emplea una formulación de conducta, «su obra» conserva el tono formal y el campo semántico del texto.
translation_notes:
  revision_awareness: Se siguió de cerca el hebreo masorético y se contrastó con la lectura inglesa auditada. La versión inglesa optó por «makes himself known» para reflejar el matiz reflexivo de יִתְנַכֶּר; en español se conservó ese valor con «se da a conocer». También se mantuvo el paralelismo ético «pura y recta» para זַךְ / יָשָׁר, y se evitó generalizar «obras» o «acciones» donde el hebreo usa dos sustantivos distintos pero semánticamente cercanos.
  spanish_consistency_notes:
  - Se preserva el paralelismo del proverbio con una sintaxis breve y proverbial.
  - «Aun» se usa con valor enfático, no como simple adición.
  - «Obra» y «hechos» se distinguen levemente para reflejar la variación del hebreo entre מַעֲלָלָיו y פָּעֳלוֹ.
  - El pie de nota ofrece una alternativa pasiva porque el hebreo y la lectura inglesa permiten esa posibilidad de traducción.
