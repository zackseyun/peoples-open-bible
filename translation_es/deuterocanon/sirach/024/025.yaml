translation:
  language: es
  text: Se llena de sabiduría como el Pisón[a], y como el Tigris en los días de las primicias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los días de la nueva cosecha»; la expresión griega es difícil y puede referirse a la cosecha nueva o a los primeros frutos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πιπλῶν
  english_pob_choice: It fills with wisdom
  chosen_spanish: Se llena de sabiduría
  alternatives_spanish:
  - Rebosa de sabiduría
  - Se colma de sabiduría
  lexicon: LSJ
  rationale: El participio activo πιπλῶν expresa una acción de llenarse/abundar. En español, «se llena de sabiduría» conserva bien la imagen de plenitud sin introducir un sujeto personal que no está en el griego. «Rebosa» es posible, pero añade un matiz más enfático que el texto no exige.
- source_word: ὡς Φισὼν
  english_pob_choice: like the Pishon
  chosen_spanish: como el Pisón
  alternatives_spanish:
  - como el Pishon
  lexicon: LSJ
  rationale: Se usa «Pisón» como forma castellanizada natural y reconocible para un río bíblico, manteniendo el artículo por la sintaxis española y por el paralelo con el inglés auditado.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría divina
  lexicon: LSJ
  rationale: σοφίαν corresponde de manera directa a «sabiduría». No se capitaliza, para no forzar en español una decisión interpretativa que el griego no marca ortográficamente.
- source_word: ὡς Τίγρις
  english_pob_choice: like the Tigris
  chosen_spanish: como el Tigris
  alternatives_spanish:
  - como el Tigris
  lexicon: LSJ
  rationale: Nombre propio geográfico estándar; se mantiene «Tigris» por ser la forma tradicional en español y por coincidir con el uso bíblico habitual.
- source_word: ἐν ἡμέραις νέων
  english_pob_choice: in the days of firstfruits / in the days of the new harvest
  chosen_spanish: en los días de las primicias
  alternatives_spanish:
  - en los días de la nueva cosecha
  - en los días del nuevo fruto
  lexicon: LSJ
  rationale: La expresión griega es difícil y puede aludir a los primeros productos de la cosecha. «Primicias» conserva el vínculo agrícola y permite un español bíblico claro sin decidir demasiado estrechamente entre «firstfruits» y «new harvest». Se documenta la alternativa agrícola porque el griego admite esa amplitud semántica.
theological_decisions:
- issue: Imagen personificada de la Sabiduría sin capitalización forzada
  english_pob_reading: Retain 'wisdom' without capitalizing it
  chosen_spanish_reading: Conservar «sabiduría» en minúscula
  alternative_spanish_readings:
  - Sabiduría
  rationale: El griego presenta σοφίαν sin marca tipográfica de personificación. En español se mantiene en minúscula para preservar la tensión literaria y no imponer una lectura doctrinal por ortografía editorial.
  doctrine_reference: Primacía del texto fuente; evitar sobrerresolución interpretativa en personificaciones sapienciales.
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por varias soluciones para ὁ πιπλῶν y ἐν ἡμέραις νέων: desde «pours out»/«firstfruits» hasta «fills with»/«new harvest», con una revisión final que volvió a «firstfruits». Para el español se privilegia la precisión agrícola y la naturalidad idiomática: «se llena de sabiduría» conserva πιπλῶν sin añadir sujeto, y «primicias» mantiene la ambigüedad útil del griego sin cerrar innecesariamente el sentido.'
  spanish_consistency_notes:
  - Se conserva el nombre divino no aplicable aquí, por lo que no hay ocultamiento de YHWH.
  - «sabiduría» permanece en minúscula por consistencia con la decisión teológica del audit trail inglés.
  - Se mantiene el paralelismo de dos comparaciones con ríos, usando «como» en ambas cláusulas.
  - La nota al pie se ancla en «primicias» porque ahí recae la principal ambigüedad léxica del verso.
