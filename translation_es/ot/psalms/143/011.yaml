translation:
  language: es
  text: Por amor de tu nombre, Yahvé, preserva mi vida[a]; en tu rectitud[b] saca mi alma[d][c] de la angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «revíveme» o «dame vida». El verbo hebreo puede significar mantener con vida, preservar con vida o restaurar la vida o las fuerzas.
    reason: lexical_alternative
  - marker: b
    text: O «por tu rectitud» o «en tu justicia».
    reason: lexical_alternative
  - marker: c
    text: O «de la aflicción» o «del aprieto».
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «mi alma»; es decir, «mi vida» o «a mí» en el uso idiomático hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: For the sake of
  chosen_spanish: Por causa de
  alternatives_spanish:
  - Por amor de
  - A causa de
  - Por el bien de
  lexicon: HALOT
  rationale: La frase hebrea expresa motivo o propósito con un matiz idiomático de apelación. «Por causa de» comunica bien ese valor en español sin volverlo demasiado explicativo ni perder la referencia al nombre de Dios como base de la súplica.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu honor
  lexicon: HALOT
  rationale: Se conserva el idiomático «nombre» porque en el texto bíblico remite a la reputación y revelación de Dios, no solo a una etiqueta. En español, «tu nombre» mantiene mejor esa fuerza bíblica que una paráfrasis como «tu honor».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: La política española del proyecto usa «Yahvé» para el Tetragrámaton, en continuidad con el nombre divino explícito del hebreo y sin sustituirlo por un título. Se conserva el nombre propio reverente y reconocible en español.
- source_word: תְּחַיֵּנִי
  english_pob_choice: preserve my life
  chosen_spanish: preserva mi vida
  alternatives_spanish:
  - revíveme
  - dame vida
  - manténme con vida
  lexicon: HALOT
  rationale: El verbo puede significar hacer vivir, mantener con vida o revivir. En este lamento, «preserva mi vida» comunica continuidad vital y evita cargar el verso con una idea de resurrección o de simple reanimación; además, preserva el paralelo con la petición de liberación.
- source_word: בְּצִדְקָתְךָ
  english_pob_choice: in your righteousness
  chosen_spanish: en tu justicia
  alternatives_spanish:
  - por tu justicia
  - en tu rectitud
  - por tu rectitud
  lexicon: HALOT
  rationale: Se eligió «justicia» porque en español puede abarcar la rectitud moral y el obrar justo de Dios, y aquí mantiene el valor relacional y forense posible del hebreo. «Righteousness» no se traduce mecánicamente; se busca una forma natural que conserve la tensión entre rectitud y justicia.
- source_word: תוֹצִיא
  english_pob_choice: bring ... out
  chosen_spanish: saca
  alternatives_spanish:
  - haz salir
  - líbrame sacando
  - saca afuera
  lexicon: HALOT
  rationale: El causativo de יצא tiene imagen concreta de hacer salir. «Saca» reproduce esa imagen de extracción desde la aflicción y suena natural en español poético, sin diluirse en un «libra» más interpretativo.
- source_word: מִצָּרָה
  english_pob_choice: out of distress
  chosen_spanish: de la angustia
  alternatives_spanish:
  - de la aflicción
  - del aprieto
  - de la tribulación
  lexicon: HALOT
  rationale: «צָרָה» puede ser angustia, aflicción o aprieto. «Angustia» funciona bien en español bíblico actual y refleja el peso emotivo del término; además, encaja con la imagen de ser sacado de una situación opresiva.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí
  - mi ser
  lexicon: HALOT
  rationale: Se conserva «alma» para reflejar el hebreo נֶפֶשׁ como unidad personal viviente y mantener la poesía del verso. Aunque puede significar «vida» o «yo», aquí el español puede sostener «mi alma» sin perder inteligibilidad.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el nombre propio del pacto. La lectura española sigue la decisión del proyecto de nombrar explícitamente a Dios con «Yahvé», preservando el valor teológico del Tetragrámaton y evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor semántico de צִדְקָה
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: Aunque el inglés POB privilegia «righteousness», en español «justicia» es la opción más natural y puede abarcar la fidelidad moral y la rectitud de Dios. Se conserva así el posible matiz jurídico-covenantal sin perder claridad devocional.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness / justice principle applied analogically to Hebrew צדקה'
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el control auditado: se mantiene la estructura de súplica, el nombre divino explícito y las alternativas semánticas principales del verbo de vivificar, del sustantivo צדקה y de נפש. No se incorporaron cambios de revisión recientes porque el estado más reciente indica ausencia de cambios necesarios.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «alma» para נַפְשִׁי, pero la nota aclara la alternativa idiomática «vida/yo».
  - «Justicia» se emplea como traducción principal de צדקָה, con nota para «rectitud».
  - 'La puntuación sigue el orden poético del hebreo: motivo inicial, invocación, petición de vida y segunda petición de liberación.'
