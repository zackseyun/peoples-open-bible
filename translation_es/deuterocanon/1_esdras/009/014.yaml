translation:
  language: es
  text: Jonatán, hijo de Azael, y Ezequías, hijo de Tócano, aceptaron esto[a][b][c], y Mosolamo, Leví y Sabbateo participaron con ellos en la decisión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres aquí difieren del paralelo hebreo aproximado de Esdras 10; compárense formas como Mesulán para Mosolamo y Sabatái para Sabbateo.
    reason: alternative_reading
  - marker: b
    text: El verbo traducido «participaron con ellos en la decisión» es raro y también puede significar que estos hombres actuaron como asesores o dieron un juicio de apoyo junto con ellos.
    reason: lexical_alternative
  - marker: c
    text: El texto griego de 1 Esdras aquí no coincide de cerca con la redacción del paralelo masorético; por eso los nombres y la fraseología deben leerse principalmente desde el testimonio griego.
    reason: textual_variant
lexical_decisions:
- source_word: Ἰωνάθας Ἀζαήλου
  english_pob_choice: Jonathan son of Azael
  chosen_spanish: Jonatán, hijo de Azael
  alternatives_spanish:
  - Jonatán de Azael
  lexicon: patronímico griego; uso español natural de filiación
  rationale: El genitivo patronímico se vierte con naturalidad como «hijo de» en español, conservando el valor de filiación del griego y la claridad del registro bíblico.
- source_word: Ἐξειας Θοκάνου
  english_pob_choice: Hezekiah son of Thocanus
  chosen_spanish: Ezequías, hijo de Thocano
  alternatives_spanish:
  - Ezeías, hijo de Thocano
  - Ezequías de Thocano
  lexicon: equivalencia nominal tradicional + transliteración del nombre paterno
  rationale: Ἐξειας corresponde con más naturalidad al nombre bíblico conocido Ezequías; el nombre del padre se conserva por transliteración, porque el griego no ofrece una equivalencia española segura establecida.
- source_word: ἐπεδέξαντο
  english_pob_choice: accepted this
  chosen_spanish: aceptaron esto
  alternatives_spanish:
  - asumieron esto
  - aprobaron esto
  - recibieron esto
  lexicon: LSJ
  rationale: El valor medio de ἐπιδέχομαι aquí expresa asumir o aceptar una disposición previa; «aceptaron esto» mantiene el sentido administrativo/jurídico sin sobrerinterpretar.
- source_word: κατὰ ταῦτα
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - conforme a esto
  - según esto
  - en conformidad con estas cosas
  lexicon: LSJ
  rationale: La expresión señala conformidad con lo anterior; en español se integra de forma natural con «aceptaron esto», preservando la relación de ajuste sin añadir palabras innecesarias.
- source_word: Μοσόλλαμος
  english_pob_choice: Mosollamus
  chosen_spanish: Mosolamo
  alternatives_spanish:
  - Mosollamo
  - Meshullam
  lexicon: transliteración griega
  rationale: Se sigue la forma griega de 1 Esdras como texto primario, adaptando la transliteración a una ortografía española fluida; la forma hebrea paralela queda solo como alternativa.
- source_word: Λευεὶς
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: nombre propio griego
  rationale: Aunque el griego puede leerse como nombre propio, en español conviene la forma acentuada «Leví» para reflejar la pronunciación y evitar ambigüedad con el sustantivo tribal.
- source_word: Σαββαταῖος
  english_pob_choice: Sabbataeus
  chosen_spanish: Sabatéo
  alternatives_spanish:
  - Sabbataeo
  - Shabbethai
  lexicon: transliteración griega
  rationale: Se translitera el nombre griego con una forma española legible; no se sustituye por la forma hebrea paralela en el texto principal, en fidelidad al testimonio griego.
- source_word: συνεβράβευσαν αὐτοῖς
  english_pob_choice: joined in deciding with them
  chosen_spanish: se unieron a decidir con ellos
  alternatives_spanish:
  - actuaron como asesores con ellos
  - dieron su apoyo en la decisión
  - juzgaron con ellos
  lexicon: LSJ
  rationale: El verbo es raro y apunta a una participación conjunta en una decisión/juicio. «Se unieron a decidir con ellos» comunica la colaboración adjudicativa sin afirmar un cargo técnico no explicitado.
theological_decisions:
- issue: Relación entre el testimonio griego de 1 Esdras y el paralelo hebreo aproximado
  english_pob_reading: The Greek text of 1 Esdras here does not closely match the wording of the Masoretic parallel, so the names and phrasing should be read as anchored primarily in the Greek witness.
  chosen_spanish_reading: El texto español se apoya principalmente en el testimonio griego de 1 Esdras, sin reemplazar sus nombres por las formas del paralelo hebreo.
  alternative_spanish_readings:
  - Normalizar los nombres según el paralelo hebreo
  - Mezclar las formas griegas y hebreas en el texto principal
  rationale: La fidelidad al libro de 1 Esdras requiere mantener como base el griego de Swete, porque el paralelo hebreo es solo aproximado y no debe borrar las diferencias reales del testimonio recibido.
  doctrine_reference: Crítica textual y prioridad del testimonio base
translation_notes:
  revision_awareness: No se requirieron cambios respecto del pass más reciente; la redacción sigue el testimonio griego primario y conserva la tensión textual con el paralelo hebreo aproximado.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde el texto lo exija; aquí no aparece.
  - Se mantuvo la distinción entre nombres propios transliterados y equivalencias españolas tradicionales cuando el griego lo permite.
  - Se prefirió un español bíblico moderno y claro, sin calcar innecesariamente la sintaxis griega.
  - La traducción de la cláusula verbal conserva la ambigüedad adjudicativa señalada por la auditoría inglesa.
