translation:
  language: es
  text: 'Cuando el muchacho llegó al lugar de la flecha que Jonatán había disparado[a], Jonatán llamó tras el muchacho y dijo: «¿No está la flecha más allá de ti?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más lejos que tú». La expresión hebrea significa literalmente «de ti y en adelante».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el joven
  - el servidor
  lexicon: HALOT
  rationale: נַעַר puede referirse a un joven, un asistente o un sirviente. El inglés POB eligió 'the boy' por naturalidad narrativa; en español 'el muchacho' conserva ese valor y suena más idiomático que 'el niño', sin imponer la idea de 'servidor' que aquí no domina el contexto inmediato.
- source_word: עַד מְקוֹם הַחֵצִי
  english_pob_choice: to the place of the arrow
  chosen_spanish: al lugar de la flecha
  alternatives_spanish:
  - hasta el lugar de la flecha
  - al sitio de la flecha
  lexicon: HALOT
  rationale: מְקוֹם es 'lugar/espacio' y עַד marca movimiento hasta ese punto. 'Al lugar de la flecha' mantiene la estructura y la claridad narrativa en español; 'hasta' también sería posible, pero 'al' fluye mejor con 'llegó'.
- source_word: אֲשֶׁר יָרָה יְהוֹנָתָן
  english_pob_choice: that Jonathan had shot
  chosen_spanish: que Jonatán había disparado
  alternatives_spanish:
  - que Jonatán había lanzado
  - que Jonatán había arrojado
  lexicon: HALOT
  rationale: ירה en este contexto se refiere a disparar una flecha. 'Había disparado' expresa bien la anterioridad respecto a la llegada del muchacho y conserva el hecho de que Jonatán usa una flecha real, no una acción genérica de lanzar.
- source_word: וַיִּקְרָא ... אַחֲרֵי
  english_pob_choice: called after
  chosen_spanish: llamó al muchacho
  alternatives_spanish:
  - llamó tras el muchacho
  - llamó detrás del muchacho
  - gritó tras el muchacho
  lexicon: HALOT
  rationale: קרא con אַחֲרֵי indica que Jonatán llama a alguien que va adelante. En español, 'llamó al muchacho' comunica la acción sin forzar una preposición poco natural; el matiz direccional queda reforzado por el contexto inmediato.
- source_word: הֲלוֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No está... ?
  alternatives_spanish:
  - ¿No es... ?
  - ¿Acaso no está... ?
  - ¿No está la flecha... ?
  lexicon: HALOT
  rationale: הֲלוֹא introduce una pregunta retórica que espera asentimiento. '¿No está...?' conserva ese tono interrogativo y suena natural en español; se mantiene la inversión mínima necesaria para la pregunta.
- source_word: הַחֵצִי
  english_pob_choice: the arrow
  chosen_spanish: la flecha
  alternatives_spanish:
  - el arco
  - el dardo
  lexicon: HALOT
  rationale: חֵץ significa 'flecha'; en español 'flecha' es la correspondencia directa y adecuada al contexto de la señal acordada por Jonatán.
- source_word: מִמְּךָ וָהָלְאָה
  english_pob_choice: beyond you
  chosen_spanish: más allá de ti
  alternatives_spanish:
  - más lejos que tú
  - pasado de ti y más allá
  - más allá de usted
  lexicon: HALOT
  rationale: La frase hebrea literalmente expresa 'de ti y en adelante'. 'Más allá de ti' reproduce bien ese sentido espacial y mantiene la lectura codificada del mensaje de Jonatán; 'más lejos que tú' también sería posible, pero suena menos natural.
theological_decisions:
- issue: None significant beyond the coded message and spatial deictic force of the arrow's location
  english_pob_reading: The arrow lies beyond the boy, signaling the hidden message to David.
  chosen_spanish_reading: La flecha está más allá del muchacho, lo que conserva la señal codificada para David.
  alternative_spanish_readings:
  - La flecha está más lejos que tú.
  - La flecha pasó de ti y más allá.
  rationale: 'El versículo funciona como una indicación espacial con valor de señal secreta. La traducción debe preservar ese doble nivel: la ubicación de la flecha y el mensaje implícito. ''Más allá de ti'' mantiene la referencia espacial sin explicitar de más la intención narrativa.'
  doctrine_reference: Narrative context; no doctrinal issue
translation_notes:
  revision_awareness: 'No se requieren cambios respecto al último pase: el contexto coincide con la lectura estable del pasaje y el inglés auditado mantiene una equivalencia óptima sin alteraciones textuales.'
  spanish_consistency_notes:
  - Se usa 'Jonatán' para el nombre propio, conforme a la forma española estándar.
  - Se mantiene 'flecha' para חֵץ, evitando términos técnicos innecesarios.
  - '''Muchacho'' conserva el matiz juvenil/asistente de נַעַר sin sobreinterpretar su estatus.'
  - La nota a identifica la alternativa semántica de מִמְּךָ וָהָלְאָה sin duplicar la aclaración en el cuerpo del texto.
