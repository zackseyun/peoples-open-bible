translation:
  language: es
  text: 'Jesús dijo: «Dichosa[a] la persona[b] que ha trabajado[c]; ha hallado vida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲙⲁⲕⲁⲣⲓⲟⲥ puede matizarse como «bendita», «feliz» o «afortunada»; se traduce aquí «dichosa» para conservar el tono de bienaventuranza.
    reason: lexical_alternative
  - marker: b
    text: ⲡⲣⲱⲙⲉ denota genéricamente a un ser humano; «la persona» evita implicar una referencia solo masculina, aunque «hombre» es una traducción posible.
    reason: lexical_alternative
  - marker: c
    text: ϩⲓⲥⲉ admite el rango «trabajar», «afanarse» o «sufrir»; se eligió «ha trabajado» por su equilibrio entre esfuerzo y naturalidad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲁⲕⲁⲣⲓⲟⲥ
  english_pob_choice: blessed
  chosen_spanish: dichoso
  alternatives_spanish:
  - bendito
  - feliz
  - afortunado
  lexicon: Crum, s.v. ⲙⲁⲕⲁⲣⲓⲟⲥ; Lambdin, glossary
  rationale: En español, «dichoso» conserva el tono de bienaventuranza/beatitud sin sonar tan eclesiástico como «bendito» ni tan psicológico como «feliz». Mantiene la brevedad sentenciosa del dicho.
- source_word: ⲡⲣⲱⲙⲉ
  english_pob_choice: person
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: Crum, s.v. ⲣⲱⲙⲉ
  rationale: El Coptic designa un ser humano de manera general; en español, «el hombre» puede funcionar genéricamente en este registro sapiencial breve. Se prefiere aquí por la fluidez proverbial del dicho, aunque «la persona» también sería posible.
- source_word: ϩⲓⲥⲉ
  english_pob_choice: labored
  chosen_spanish: ha trabajado
  alternatives_spanish:
  - ha laborado
  - ha sufrido
  - se ha afanado
  lexicon: Crum, s.v. ϩⲓⲥⲉ
  rationale: El verbo abarca trabajo, esfuerzo y también penuria. «Ha trabajado» comunica el sentido básico de esfuerzo sostenido sin estrecharlo exclusivamente a sufrimiento, y suena natural en español bíblico contemporáneo.
- source_word: ϩⲉ
  english_pob_choice: has found
  chosen_spanish: ha hallado
  alternatives_spanish:
  - ha encontrado
  - ha descubierto
  lexicon: Crum, s.v. ϩⲉ
  rationale: «Ha hallado» preserva el valor resultativo y el tono conciso del original, además de ser muy idiomático en fórmulas sapienciales en español.
- source_word: ⲉⲡⲱⲛϩ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - la vida
  lexicon: Crum, s.v. ⲱⲛϩ
  rationale: El artículo coptico puede tener fuerza genérica; en español «vida» expresa de forma natural el objeto hallado sin añadir una determinación no garantizada por el texto.
- source_word: ⲡⲉϫⲉⲓ︤ⲥ︥
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Jesús habló
  lexicon: Lambdin, s.v. ⲡⲉϫⲉ
  rationale: Es la fórmula narrativa normal de introducción en Thomas. «Dijo» conserva la concisión del griego/cóptico y evita sobreinterpretar el acto de habla.
theological_decisions:
- issue: Alcance antropológico de ⲡⲣⲱⲙⲉ
  english_pob_reading: person; generic human being
  chosen_spanish_reading: el hombre como genérico humano
  alternative_spanish_readings:
  - la persona
  - el ser humano
  rationale: No hay señal textual de referencia masculina exclusiva. Sin embargo, en español la forma genérica «el hombre» es perfectamente comprensible en un dicho sapiencial breve y reproduce el estilo proverbial del original. Se deja constancia de la alternativa inclusiva, pero no se adopta como principal porque aquí no aporta mayor precisión exegética y alarga el ritmo.
  doctrine_reference: Antropología bíblica; uso genérico del masculino en traducción
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión posterior que corrige la sobrelectura de una supuesta pronominalización enfática y confirma una construcción verbal simple de tercera persona singular; por ello no se introduce ningún «él mismo» ni equivalente enfático en español.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma estándar para ⲓⲏⲥⲟⲩⲥ.
  - Se evita «Cristo» porque el texto no contiene Χριστός ni un uso litúrgico fijo.
  - «Vida» se deja sin artículo por el valor genérico del objeto hallado.
  - El registro es breve, proverbial y digno, adecuado para una sección de dichos.
  - No se añade una nota textual sobre variantes coptas porque la lectura normalizada no afecta la traducción española aquí.
