translation:
  language: es
  text: Tus hijos y tus hijas serán entregados[a] a otro pueblo, mientras tus ojos miran y desfallecen por ellos todo el día, pero tu mano no tendrá poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no estará en tu poder». El modismo hebreo literalmente habla de que no hay poder en tu mano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנֶיךָ וּבְנֹתֶיךָ
  english_pob_choice: Your sons and your daughters
  chosen_spanish: Tus hijos y tus hijas
  alternatives_spanish:
  - Tus hijos e hijas
  - Tus hijos, varones y mujeres
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a hijos e hijas; en español, 'hijos y hijas' preserva esa explicitud. Se evita un genérico como 'los hijos' para no diluir el alcance de la maldición.
- source_word: נְתֻנִים
  english_pob_choice: will be given
  chosen_spanish: serán dados
  alternatives_spanish:
  - serán entregados
  - serán puestos
  lexicon: HALOT
  rationale: El participio pasivo se vierte naturalmente como futuro pasivo en este contexto de juicio. 'Dados' mantiene cercanía léxica con el hebreo sin introducir un matiz más interpretativo como 'entregados'.
- source_word: לְעַם אַחֵר
  english_pob_choice: to another people
  chosen_spanish: a otro pueblo
  alternatives_spanish:
  - a otra gente
  - a otra nación
  lexicon: HALOT
  rationale: '''עַם'' puede ser ''pueblo''; ''otro pueblo'' refleja el valor básico y evita cargar el texto con una connotación política o étnica más fuerte de la necesaria.'
- source_word: וְעֵינֶיךָ רֹאוֹת
  english_pob_choice: while your eyes look on
  chosen_spanish: y tus ojos lo verán
  alternatives_spanish:
  - mientras tus ojos miran
  - y tus ojos serán testigos
  lexicon: HALOT
  rationale: El hebreo expresa la observación dolorosa del hecho. 'Lo verán' comunica de forma natural que el lector/padre presencia la pérdida; el matiz de 'while' queda implícito por la secuencia del verso.
- source_word: וְכָלוֹת אֲלֵיהֶם
  english_pob_choice: and fail with longing for them
  chosen_spanish: y desfallecerán por ellos
  alternatives_spanish:
  - y se consumirán por ellos
  - y se agotarán por ellos
  - y se desharán por ellos
  lexicon: HALOT
  rationale: '''כלה'' aquí describe agotamiento/desvanecimiento por angustia y anhelo. ''Desfallecerán'' conserva la imagen de consumirse o perder fuerzas sin sonar excesivamente libre; el complemento ''por ellos'' mantiene la referencia a los hijos.'
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - durante todo el día
  - a lo largo de todo el día
  lexicon: HALOT
  rationale: Equivalente español natural que conserva la duración continua del dolor.
- source_word: וְאֵין לְאֵל יָדֶךָ
  english_pob_choice: but your hand will be powerless
  chosen_spanish: pero tu mano no tendrá poder
  alternatives_spanish:
  - pero tu mano será impotente
  - y no habrá poder en tu mano
  - pero no estará en tu mano poder hacerlo
  lexicon: HALOT
  rationale: El hebreo es un modismo sobre la falta de poder en la mano. 'No tendrá poder' conserva la imagen corporal y el sentido idiomático; 'impotente' puede sonar más abstracto, y 'no habrá poder en tu mano' es más literal pero menos idiomático en español.
theological_decisions:
- issue: El modismo וְאֵין לְאֵל יָדֶךָ no debe sugerir una referencia a Dios en español
  english_pob_reading: but your hand will be powerless
  chosen_spanish_reading: pero tu mano no tendrá poder
  alternative_spanish_readings:
  - y no habrá poder en tu mano
  - pero tu mano será impotente
  - pero no estará en tu mano poder hacerlo
  rationale: La frase hebrea es un modismo de incapacidad, no una afirmación teológica sobre Dios. La redacción escogida evita que el lector español oiga 'Dios' donde el idioma bíblico habla de imposibilidad o falta de fuerza.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente y con la revisión inglesa más reciente, que no introdujo cambios. La redacción española sigue el sentido auditado de la POB inglesa, pero vuelve al hebreo para mantener la explicitud de 'hijos y hijas' y el modismo de incapacidad en la última cláusula.
  spanish_consistency_notes:
  - Se mantiene 'pueblo' para עַם, coherente con el valor semántico básico del hebreo.
  - Se usa 'Yahvé' en el proyecto cuando aparece el nombre divino; aquí no aparece.
  - Se preserva la tensión idiomática de לְאֵל יָדֶךָ mediante una nota, en lugar de normalizarla por completo.
  - El texto principal evita calco excesivo pero conserva la progresión sintáctica del original.
