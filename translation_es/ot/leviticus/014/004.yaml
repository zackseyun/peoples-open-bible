revisions:
- from: Entonces el sacerdote mandará que se tomen, para el que se purifica, dos aves vivas y limpias, madera de cedro, carmesí[a] e hisopo[b].
  to: Entonces el sacerdote mandará que se tomen, para la persona que está siendo purificada, dos aves vivas y limpias, madera de cedro, hilo escarlata[a] e hisopo[b].
  rationale: Se ajusta «para el que se purifica» a «para la persona que está siendo purificada» para reflejar mejor el matiz procesual/pasivo de לַמִּטַּהֵר. Se cambia «carmesí» por «hilo escarlata» para conservar que שְׁנִי תוֹלַעַת designa un material teñido, en línea con la decisión léxica auditada y con un español más natural en una lista de objetos rituales. Se actualiza la nota [a] para mantener una alternativa real y coherente con el texto principal.
