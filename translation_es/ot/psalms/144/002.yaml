translation:
  language: es
  text: Mi amor fiel y mi fortaleza, mi baluarte y mi libertador[a], mi escudo, y en él me refugio; el que somete a mi pueblo[b] bajo mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y mi libertador para mí».
    reason: previous_rendering
  - marker: b
    text: O «pueblos». Algunos testigos antiguos apoyan un sentido plural aquí, y muchas traducciones lo siguen.
    reason: alternative_reading
lexical_decisions:
- source_word: חַסְדִּי
  english_pob_choice: my steadfast love
  chosen_spanish: mi amor fiel
  alternatives_spanish:
  - mi misericordia
  - mi amor leal
  - mi fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד en esta cadena de títulos divinos expresa lealtad amorosa y fidelidad pactal. En español, «amor fiel» comunica bien esa relación de alianza sin sonar técnico ni antiguo; «misericordia» sería posible, pero atenúa la dimensión de lealtad.
- source_word: מְצוּדָתִי
  english_pob_choice: my fortress
  chosen_spanish: mi fortaleza
  alternatives_spanish:
  - mi fortaleza
  - mi fortín
  - mi refugio fortificado
  lexicon: HALOT
  rationale: El término designa un lugar defensivo fuerte. «Fortaleza» es natural en español y conserva la imagen militar sin sobrecargarla con una palabra menos común como «fortín».
- source_word: מִשְׂגַּבִּי
  english_pob_choice: my stronghold
  chosen_spanish: mi baluarte
  alternatives_spanish:
  - mi alcázar
  - mi refugio elevado
  - mi fortaleza alta
  lexicon: HALOT
  rationale: La raíz comunica altura y seguridad. «Baluarte» funciona bien en español bíblico para una posición defensiva sólida y evita repetir «fortaleza» de modo mecánico.
- source_word: מְפַלְטִי
  english_pob_choice: my deliverer
  chosen_spanish: mi libertador
  alternatives_spanish:
  - mi salvador
  - mi rescatador
  lexicon: HALOT
  rationale: El participio enfatiza al que hace escapar o rescata. «Libertador» preserva la fuerza agentiva y es idiomático en español; «salvador» podría confundirse con un título cristológico en otros contextos.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: implícito en la serie posesiva y relacional
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: En español conviene no duplicar de forma pesada una relación ya marcada por los posesivos («mi»). La referencia personal queda clara en la serie nominal y en el verbo posterior.
- source_word: מָגִנִּי
  english_pob_choice: my shield
  chosen_spanish: mi escudo
  alternatives_spanish:
  - mi defensa
  - mi protector
  lexicon: HALOT
  rationale: Metáfora militar directa y ampliamente transparente en español. «Escudo» es la correspondencia natural y más precisa.
- source_word: וּבוֹ חָסִיתִי
  english_pob_choice: and in him I take refuge
  chosen_spanish: y en él me refugio
  alternatives_spanish:
  - y en él me refugio
  - y en él he buscado refugio
  - y en él confío
  lexicon: HALOT
  rationale: חסה expresa buscar refugio, no solo confiar de forma abstracta. «Me refugio» conserva la imagen protectora y suena natural en español; el perfecto hebreo puede entenderse de forma actual o resultativa.
- source_word: הָרוֹדֵד
  english_pob_choice: the one who subdues
  chosen_spanish: el que somete
  alternatives_spanish:
  - el que doblega
  - el que subyuga
  - el que domina
  lexicon: HALOT
  rationale: La idea es traer bajo dominio. «Somete» recoge bien esa fuerza sin cargarla con connotaciones más duras que «subyuga» en español contemporáneo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mis pueblos
  - las naciones
  lexicon: HALOT
  rationale: Se sigue la lectura masorética singular con sufijo de 1cs. En español, «mi pueblo» refleja directamente el texto base; la alternativa plural queda reservada para nota, como en el expediente inglés, dado el apoyo de versiones antiguas y de algunos traductores.
- source_word: תַחְתָּי
  english_pob_choice: under me
  chosen_spanish: bajo mí
  alternatives_spanish:
  - debajo de mí
  - sometido a mí
  lexicon: HALOT
  rationale: La metáfora espacial de sometimiento se expresa de forma literal y clara con «bajo mí». Mantiene el valor relacional y jerárquico del hebreo.
theological_decisions:
- issue: ¿Seguir la lectura masorética singular «mi pueblo» o adoptar la lectura plural apoyada por versiones antiguas?
  english_pob_reading: my people / peoples (with footnote noting the variant)
  chosen_spanish_reading: mi pueblo (con nota sobre el posible plural «pueblos»)
  alternative_spanish_readings:
  - pueblos
  - las naciones
  rationale: El texto hebreo consonántico y la vocalización masorética favorecen el singular. Para respetar la primacía de la fuente original, se mantiene «mi pueblo» en el cuerpo del texto. Dado que hay apoyo antiguo para un plural y porque la traducción inglesa preserva esa tensión en nota, se registra la alternativa en nota sin imponerla.
  doctrine_reference: Principios POB sobre primacía de la fuente original y preservación de variantes textuales
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo masorético y conserva la tensión textual registrada en el expediente inglés: se mantiene el singular «mi pueblo» en el cuerpo principal, con nota sobre la opción plural atestiguada por versiones antiguas. También se evita una repetición poco natural de «para mí», coherente con la revisión inglesa que eliminó «for me» por redundancia estilística.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no está presente explícitamente.
  - Se mantiene el campo semántico de protección militar con «fortaleza», «baluarte», «escudo» y «refugio».
  - «Me refugio» conserva el valor de חסה sin convertirlo en mera confianza abstracta.
  - La puntuación y el orden reflejan una cadencia poética natural en español sin añadir contenido no sustentado por la fuente.
