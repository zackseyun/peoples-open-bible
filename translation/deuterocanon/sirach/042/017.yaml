translation:
  text: The holy ones of God have not been sufficient to recount the wonders of the Lord[b][a]. God has strengthened his hosts to be strong before his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Masada appears to read 'has not comprehended' where the Cairo Geniza text reads 'have not been able/sufficed'; the Greek supports the sense 'have not been able to recount fully.'
    reason: textual_variant
  - marker: b
    text: 'The second clause varies in the Hebrew witnesses: Cairo Geniza reads ''God has strengthened his hosts,'' while Masada appears to read ''the Lord has strengthened in his lights/luminaries''; the Greek reads ''what the Lord Almighty established, for the whole to be made firm in his glory.'''
    reason: textual_variant
lexical_decisions:
- source_word: לא הספיקו / לא השכיל
  chosen: have not been able
  alternatives:
  - were not sufficient
  - did not comprehend
  - could not fully
  lexicon: HALOT
  rationale: The Cairo Geniza reading לא הספיקו suggests insufficiency/inability, while the Masada witness reportedly reads לא השכיל, which would point toward not comprehending. The Greek parallel οὐκ ἐνεποίησεν ... ἐκδιηγήσασθαι supports inability to recount rather than lack of understanding. 'Have not been able' best captures the likely sense while acknowledging the Hebrew variation.
- source_word: קדושי אל
  chosen: the holy ones of God
  alternatives:
  - God's holy ones
  - the saints of God
  lexicon: HALOT
  rationale: A formal rendering preserves the likely reference to holy beings/saints without importing later ecclesiastical overtones too strongly. 'Saints' is possible but more tradition-laden in English.
- source_word: לספר נפלאות ה׳
  chosen: to recount the wonders of the Lord
  alternatives:
  - to tell the marvelous deeds of the Lord
  - to declare the Lord's wonders
  lexicon: HALOT
  rationale: לספר is naturally 'to recount/tell,' and נפלאות denotes wondrous acts or wonders. 'Recount' fits the elevated style and aligns with the Greek ἐκδιηγήσασθαι.
- source_word: אמץ אלהים / אמץ אדני
  chosen: God has strengthened
  alternatives:
  - the Lord has made strong
  - God established firmly
  lexicon: HALOT
  rationale: אמץ in the piel/qal context conveys strengthening or making firm. The Hebrew witnesses differ between אלהים and אדני, but both point to the divine subject. 'Has strengthened' is clear and matches the following infinitive of standing firm.
- source_word: צבאיו
  chosen: his hosts
  alternatives:
  - his armies
  - his heavenly host
  lexicon: HALOT
  rationale: צבא can mean army/host. In this context of cosmic praise and divine works, 'hosts' preserves the breadth and possible heavenly reference without over-specifying.
- source_word: להתחזק לפני כבודו
  chosen: to stand firm before his glory
  alternatives:
  - to be strengthened before his glory
  - to endure in the presence of his glory
  lexicon: HALOT
  rationale: The reflexive infinitive of חזק can mean to strengthen oneself or show firmness. Given the Greek στηριχθῆναι and the context, 'to stand firm before his glory' communicates established endurance in God's glorious presence.
