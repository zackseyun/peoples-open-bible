  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé, Mesías, Cristo, espíritu, esclavo, etc. Se respeta la decisión auditada de mantener el masculino singular representativo y de no reemplazar el verbo principal por «dominio» en el texto base, dejando esa opción en nota.
