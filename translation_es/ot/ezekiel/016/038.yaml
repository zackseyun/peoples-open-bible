translation:
  language: es
  text: Y te juzgaré con los juicios de mujeres que cometen adulterio y que derraman sangre, y te haré sangre[a] en ira y celos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sangre»; probable sentido de un castigo sangriento o de derramamiento de sangre infligido sobre ti.'
    reason: lexical_alternative
  - marker: b
    text: «Celos» conserva la imaginería pactual y matrimonial del contexto; también puede entenderse como celo indignado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁפַטְתִּיךְ
  english_pob_choice: And I will judge you
  chosen_spanish: Y te juzgaré
  alternatives_spanish:
  - Y te sentenciaré
  lexicon: HALOT
  rationale: שׁפט aquí expresa una acción judicial de Yahvé contra Jerusalén. «Juzgaré» conserva el vínculo verbal con el sustantivo siguiente מִשְׁפְּטֵי y mantiene la fuerza jurídica sin especificar más de lo que el hebreo dice.
- source_word: מִשְׁפְּטֵי
  english_pob_choice: with the judgments of
  chosen_spanish: con los juicios de
  alternatives_spanish:
  - según los juicios de
  - como
  lexicon: HALOT
  rationale: El constructo plural funciona como norma o modo de juicio. «Con los juicios de» reproduce el giro hebreo con naturalidad suficiente en español y conserva el matiz legal.
- source_word: נֹאֲפוֹת
  english_pob_choice: women who commit adultery
  chosen_spanish: mujeres adúlteras
  alternatives_spanish:
  - adúlteras
  - mujeres que cometen adulterio
  lexicon: HALOT
  rationale: El participio femenino plural describe mujeres marcadas por adulterio. «Mujeres adúlteras» es conciso y natural en español, y preserva la imaginería femenina del oráculo.
- source_word: וְשֹׁפְכֹת דָּם
  english_pob_choice: and who shed blood
  chosen_spanish: y derramadoras de sangre
  alternatives_spanish:
  - y que derraman sangre
  - y sanguinarias
  lexicon: HALOT
  rationale: La construcción paralela a «adúlteras» describe mujeres culpables de homicidio o derramamiento de sangre. «Derramadoras de sangre» mantiene la fuerza idiomática y la correspondencia participial.
- source_word: וּנְתַתִּיךְ
  english_pob_choice: and I will make you
  chosen_spanish: y te haré
  alternatives_spanish:
  - y te daré
  - y te pondré
  lexicon: HALOT
  rationale: Siguiendo la revisión más literal del POB inglés, נתן + complemento aquí expresa una atribución o colocación en una condición. «Te haré» permite conservar la brevedad del hebreo sin añadir una paráfrasis interpretativa como «te entregaré».
- source_word: דַּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  - derramamiento de sangre
  lexicon: HALOT
  rationale: En esta construcción compacta, דם funciona como complemento de estado o destino. «Sangre» reproduce el hebreo de forma directa; el sentido de juicio sangriento queda sostenido por el contexto inmediato.
- source_word: חֵמָה
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - cólera
  lexicon: HALOT
  rationale: חֵמָה denota enojo ardiente. «Ira» es el equivalente más sobrio y comprensible en español bíblico contemporáneo.
- source_word: קִנְאָה
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - celoso celo
  - zelo
  lexicon: HALOT
  rationale: En contexto de alianza matrimonial, קִנְאָה expresa celo/indignación por infidelidad. «Celos» conserva el campo semántico y la tensión relacional sin suavizarla a un término más abstracto.
theological_decisions:
- issue: Lenguaje de juicio divino con imaginería matrimonial de celos
  english_pob_reading: and I will make you blood in wrath and jealousy
  chosen_spanish_reading: y te haré sangre en ira y celos
  alternative_spanish_readings:
  - y te haré una sangre de juicio en ira y celos
  - y te volveré sangrienta en ira y celos
  rationale: El hebreo une juicio legal y pasión pactual ofendida. Se conserva la dureza de la imagen sin resolverla en una explicación; «celos» mantiene la metáfora del esposo ofendido y «ira» expresa el juicio divino.
  doctrine_reference: Preservar la tensión teológica del texto, no suavizar la severidad del juicio ni cambiar la metáfora pactual.
translation_notes:
  revision_awareness: El borrador sigue la última revisión del POB inglés, que prefirió «make you blood» frente a una expansión como «give you over to blood». En español se reflejó ese ajuste con una forma breve y literal («te haré sangre»), manteniendo la rareza idiomática del hebreo sin explicitarla en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino conforme a la política del proyecto cuando el contexto profético presupone el tetragrámaton.
  - Se evita «Cristo» porque el versículo no contiene lenguaje mesiánico.
  - «Ira» y «celos» se mantienen como términos distintos para no borrar el paralelismo hebreo entre חֵמָה y קִנְאָה.
  - «Mujeres adúlteras» conserva el género del participio hebreo y la imaginería del oráculo.
  - La nota b asume la ambigüedad del hebreo y no fuerza una resolución interpretativa en el cuerpo del texto.
