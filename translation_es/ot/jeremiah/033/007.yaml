revisions:
- from: Y haré volver[a] la cautividad de Judá y la cautividad de Israel, y los edificaré[b] como al principio.
  to: Y restauraré la fortuna de Judá y la fortuna de Israel[a], y los reconstruiré como al principio.
  rationale: 'Se revisa para alinear el texto principal con la decisión léxica y teológica documentada por la POB inglesa: el idiomático הֵשִׁיב שְׁבוּת aquí apunta a restauración integral, no solo al retorno del cautiverio. «Restauraré la fortuna» evita el giro forzado «haré volver la cautividad» y mantiene un español claro; la alternativa más literal queda preservada en nota. Se cambia «los edificaré» por «los reconstruiré» porque expresa con más naturalidad y precisión el valor contextual de בנה en un oráculo de restauración. «Como al principio» se conserva.'
