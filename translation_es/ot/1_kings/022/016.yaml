base_translation:
  language: en
  yaml_path: translation/ot/1_kings/022/016.yaml
  text: Then the king said to him[a], “How many times must I make you swear that you tell me nothing but the truth in the name of Yahweh?”
  footnotes:
  - marker: a
    text: Or, “How often do I have to put you under oath…?” The Hebrew verb means to make someone swear or place him under oath.
    reason: lexical_alternative
