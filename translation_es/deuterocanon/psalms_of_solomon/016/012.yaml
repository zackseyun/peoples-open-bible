translation:
  language: es
  text: Pero afirma mi alma con favor y alegría[a]; cuando fortalezcas mi alma, me bastará lo dado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «buena voluntad» o «buen agrado» para «favor».
    reason: lexical_alternative
  - marker: b
    text: O «me será suficiente» para «me bastará».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδοκία
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - benevolencia
  - buena voluntad
  - buen agrado
  lexicon: BDAG
  rationale: En este contexto de súplica, εὐδοκία expresa una disposición benévola; «favor» comunica bien esa idea en español y conserva el tono peticional sin introducir un matiz técnico ajeno.
- source_word: ἱλαρότητος
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  - alegría serena
  lexicon: LSJ
  rationale: El sustantivo describe un estado alegre y luminoso. «Alegría» es natural en español y funciona bien junto con «favor» sin perder la vivacidad del término.
- source_word: στήρισον
  english_pob_choice: establish
  chosen_spanish: establece
  alternatives_spanish:
  - afir­ma
  - haz firme
  - confirma
  lexicon: LSJ
  rationale: El verbo pide hacer firme o asentar. «Establece» mantiene la idea de firmeza y suena más natural que un calco rígido.
- source_word: ψυχήν
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  - yo
  lexicon: LSJ
  rationale: En una oración devocional, «alma» preserva el sentido de la persona interior y corresponde bien al registro espiritual del texto.
- source_word: ἐνισχῦσαί
  english_pob_choice: strengthen
  chosen_spanish: fortalezcas
  alternatives_spanish:
  - refuerces
  - des
  - hagas fuerte
  lexicon: LSJ
  rationale: El infinitivo articular tiene valor temporal aquí. «Cuando fortalezcas» reproduce esa relación y evita repetir «establece» con el mismo verbo.
- source_word: ἀρκέσει μοι
  english_pob_choice: will be enough for me
  chosen_spanish: me bastará
  alternatives_spanish:
  - me será suficiente
  - me será bastante
  lexicon: BDAG
  rationale: La futura de suficiencia se expresa con naturalidad en español mediante «bastar». «Me bastará» conserva la idea de suficiencia completa.
- source_word: τὸ δοθέν
  english_pob_choice: what has been given
  chosen_spanish: lo que ha sido dado
  alternatives_spanish:
  - lo dado
  - el don dado
  - la dádiva recibida
  lexicon: BDAG
  rationale: El participio sustantivado es deliberadamente amplio. «Lo que ha sido dado» mantiene esa amplitud mejor que concretarlo como «don» o «dádiva».
translation_notes:
  revision_awareness: 'La versión inglesa POB fue revisada y quedó sin cambios; el acuerdo de revisión es alto. La redacción española sigue la misma lectura base y conserva las dos ambigüedades léxicas señaladas por el audit trail: εὐδοκία y ἀρκέσει μοι.'
  spanish_consistency_notes:
  - 'Se conservó la distinción entre στήρισον y ἐνισχῦσαί con dos verbos españoles distintos: «establece» y «fortalezcas».'
  - Se mantuvo «alma» para ψυχήν por consistencia con el registro devocional del pasaje.
  - «Lo que ha sido dado» preserva la apertura semántica de τὸ δοθέν sin cerrar prematuramente el referente.
