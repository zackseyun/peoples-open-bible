  rationale: 'The Syriac reads ''ܙܒܢܐ ܕܠܐ ܥܒܕ'' (with a likely dalath/rish confusion for ܥܒܪ, ''pass away''). The draft translates this as ''time of a work,'' completely ignoring the negative particle ''ܠܐ'' (not). Given the contrast with ''ܡܕܡ ܕܥܒܪ'' (what has passed) in verse 4, the author is referring to the eschatological ''time that does not pass away.'' | Adjudicator: The reviewer is correct. The Syriac text clearly reads ''ܕܠܐ'' (d-la, ''which not''), which the current translation completely ignores. Furthermore, translating ''ܥܒܕ'' as ''work'' (noun) here is a misreading'
