translation:
  language: es
  text: Y colocó sobre la mesa el pan en orden delante de Yahvé[a], tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pan dispuesto»; tradicionalmente, «el pan de la Presencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲרֹךְ
  english_pob_choice: arranged
  chosen_spanish: colocó
  alternatives_spanish:
  - ordenó
  - dispuso
  - puso en orden
  lexicon: HALOT
  rationale: El verbo hebreo עָרַךְ puede significar organizar o poner en orden. En español, «colocó» comunica la acción concreta de poner el pan sobre la mesa sin forzar una calca poco natural; la idea de orden queda expresada por el complemento siguiente.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de ella
  - sobre ello
  lexicon: HALOT
  rationale: El pronombre remite a la mesa mencionada en el versículo anterior. «Sobre él» conserva la referencia espacial directa y mantiene el antecedente implícito de manera natural en español.
- source_word: עֵרֶךְ לֶחֶם
  english_pob_choice: the bread in order
  chosen_spanish: el pan en orden
  alternatives_spanish:
  - el pan dispuesto
  - el arreglo del pan
  - el pan de la Presencia
  lexicon: HALOT
  rationale: La expresión describe pan dispuesto de manera ordenada. «Pan en orden» conserva el valor descriptivo del hebreo sin introducir la interpretación tradicional «de la Presencia», que no aparece en esta frase hebrea.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La fórmula cultual significa estar delante o en presencia de YHWH. Se mantiene «delante de Yahvé» para conservar el registro bíblico y la referencia espacial/cultual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la política del proyecto de representar el Tetragrámaton con «Yahvé», preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé mandó a Moisés
  - justo como Yahvé había mandado a Moisés
  lexicon: HALOT
  rationale: La cláusula subraya conformidad exacta con la instrucción divina. «Tal como» y el pluscuamperfecto «había mandado» expresan bien esa correspondencia con un español natural y preciso.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio del pacto. Se conserva con «Yahvé» conforme a la política terminológica del proyecto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expresión cultual del pan ordenado
  english_pob_reading: the bread in order
  chosen_spanish_reading: el pan en orden
  alternative_spanish_readings:
  - el pan dispuesto
  - la disposición del pan
  rationale: La frase hebrea es descriptiva y no necesita importar aquí la designación tradicional completa «pan de la Presencia». Mantener el sentido literal evita borrar la tensión entre la descripción del versículo y la denominación litúrgica posterior.
  doctrine_reference: Exodus 25:30; Leviticus 24:5-9
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó la frase de «the row of bread» a «the bread in order» para reflejar mejor עֵרֶךְ לֶחֶם. La versión española sigue esa decisión al usar «el pan en orden», evitando una traducción demasiado interpretativa o una calca extraña.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera uniforme para יְהוָה.
  - Se usa un español bíblico moderno y claro, sin recurrir a «SEÑOR» como sustituto del nombre divino.
  - La relación espacial de עָלָיו se conserva con «sobre él», refiriéndose a la mesa del versículo anterior.
  - No se introduce «Cristo» ni otra terminología ajena al pasaje.
  - La nota al pie recoge la alternativa tradicional sin hacerla dominante en el texto principal.
