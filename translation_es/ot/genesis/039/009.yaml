translation:
  language: es
  text: No hay nadie mayor en esta casa que yo[a], y él no me ha reservado nada, sino a ti, porque eres su esposa. ¿Cómo, pues, haría yo esta gran maldad[b] y pecaría contra Dios?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hay uno mayor en esta casa que yo». El hebreo niega literalmente la existencia de alguien mayor dentro de la casa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «este gran mal». El hebreo רָעָה puede significar mal, maldad o injusticia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵינֶנּוּ גָדוֹל ... מִמֶּנִּי
  english_pob_choice: There is no one greater ... than I am
  chosen_spanish: No hay nadie mayor en esta casa que yo[a]
  alternatives_spanish:
  - No hay uno mayor en esta casa que yo
  - Él no es mayor que yo
  lexicon: HALOT
  rationale: La construcción hebrea con אֵין + adjetivo niega la existencia de alguien superior; por eso en español natural se expresa con 'no hay nadie'. Se conserva la comparación de rango dentro de la casa y se evita una lectura menos probable que haga del sujeto un individuo específico.
- source_word: בַּבַּיִת הַזֶּה
  english_pob_choice: in this house
  chosen_spanish: en esta casa
  alternatives_spanish:
  - en esta casa-hogar
  - en esta casa/administración
  lexicon: HALOT
  rationale: בַּיִת puede ser casa o casa/ámbito doméstico. 'Casa' es natural en español y suficiente para preservar la imagen del ámbito de Potifar sin sobreexplicar.
- source_word: חָשַׂךְ מִמֶּנִּי מְאוּמָה
  english_pob_choice: has withheld nothing from me
  chosen_spanish: no me ha negado nada
  alternatives_spanish:
  - no me ha retenido nada
  - no me ha withheld nothing
  lexicon: HALOT
  rationale: חָשַׂךְ en este giro significa retener o privar. 'No me ha negado nada' comunica bien el sentido idiomático en español. 'Nada' refleja el efecto de מְאוּמָה bajo negación.
- source_word: כִּי אִם אוֹתָךְ
  english_pob_choice: except you
  chosen_spanish: sino a ti
  alternatives_spanish:
  - excepto a ti
  - solo a ti
  lexicon: HALOT
  rationale: Después de una negación, כִּי אִם marca excepción. En español, 'sino a ti' es la forma más natural y exacta, manteniendo el contraste excluyente.
- source_word: בַּאֲשֶׁר אַתְּ אִשְׁתּוֹ
  english_pob_choice: because you are his wife
  chosen_spanish: porque eres su mujer
  alternatives_spanish:
  - porque eres su esposa
  - puesto que eres su mujer
  lexicon: HALOT
  rationale: La construcción introduce la razón de la excepción. 'Porque eres su mujer' comunica la fuerza causal en español y preserva el término relacional sin imponer un registro más técnico que el del hebreo.
- source_word: וְאֵיךְ
  english_pob_choice: So how could I
  chosen_spanish: ¿Cómo, pues, haría yo
  alternatives_spanish:
  - ¿Y cómo podría yo
  - ¿Cómo entonces haría yo
  lexicon: HALOT
  rationale: וְאֵיךְ introduce una conclusión moral. '¿Cómo, pues, haría yo...' reproduce bien el valor inferencial y suena natural en español bíblico contemporáneo.
- source_word: אֶעֱשֶׂה
  english_pob_choice: do
  chosen_spanish: haría yo
  alternatives_spanish:
  - haría
  - cometería yo
  lexicon: HALOT
  rationale: עשה es el verbo general 'hacer'. En este contexto, unido a 'esta gran maldad', 'haría yo' conserva la sencillez hebrea mejor que un 'cometería' más interpretativo.
- source_word: הָרָעָה הַגְּדֹלָה הַזֹּאת
  english_pob_choice: this great evil
  chosen_spanish: esta gran maldad
  alternatives_spanish:
  - este gran mal
  - esta gran maldad/wickedness
  lexicon: HALOT
  rationale: רָעָה puede ser maldad, mal o maldad moral. 'Gran maldad' preserva el peso ético del hebreo y es más idiomático que 'gran mal' en este contexto personal y moral.
- source_word: וְחָטָאתִי לֵאלֹהִים
  english_pob_choice: and sin against God
  chosen_spanish: y pecaría contra Dios
  alternatives_spanish:
  - y pecaría ante Dios
  - y sería culpable ante Dios
  lexicon: HALOT
  rationale: חטא con ל puede expresar pecar contra alguien; en español, 'pecaría contra Dios' es la correspondencia más directa y doctrinalmente clara. Se usa 'Dios' para אֱלֹהִים conforme al contexto narrativo.
theological_decisions:
- issue: Referente de אֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un dios
  - dios
  rationale: En la narración de Génesis, José habla del Dios verdadero; el sentido moral trasciende la mera ofensa social a Potifar. 'Dios' refleja correctamente la teología narrativa y el uso normal en español.
  doctrine_reference: Monoteísmo bíblico / Dios de Israel en Génesis
- issue: Fuerza moral de הָרָעָה הַגְּדֹלָה הַזֹּאת
  english_pob_reading: this great evil
  chosen_spanish_reading: esta gran maldad
  alternative_spanish_readings:
  - este gran mal
  - esta gran injusticia
  rationale: La expresión hebrea mantiene una valoración moral fuerte. 'Maldad' conserva la carga ética sin diluirla en un término demasiado general como 'mal'.
  doctrine_reference: Ética bíblica / pecado y rectitud
translation_notes:
  revision_awareness: Se tomó como base el audit trail inglés con acuerdo alto y sin revisiones aplicadas. La principal decisión en español fue conservar la negación existencial de אֵין con una formulación natural ('No hay nadie mayor...') y mantener la carga moral de רָעָה como 'maldad' en el texto principal, dejando la alternativa 'mal' en nota.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים en línea con el contexto de Génesis y el audit trail inglés.
  - Se mantiene el pronombre directo de segunda persona en singular ('eres su mujer') para preservar la confrontación personal del hebreo.
  - Se evita 'SEÑOR' porque aquí no aparece el Tetragrámaton, sino אֱלֹהִים.
  - Se conserva un español bíblico actual, sin calcos excesivos ni arcaísmos innecesarios.
