revisions:
- from: Pero si una persona peca por inadvertencia[a], entonces presentará una cabra hembra[b], de un año, como ofrenda por el pecado[c].
  to: Pero si una persona peca por inadvertencia, esa persona presentará una cabra de un año como ofrenda por el pecado[a].
  rationale: Se ajusta el texto para reflejar mejor la decisión auditada de conservar el femenino/singular individual sin introducir un «ella» innecesariamente marcado; «esa persona presentará» mantiene la referencia singular concreta de manera natural en español. También se mejora la idiomaticidad cambiando «cabra hembra» por «cabra» y se eliminan notas no necesarias, conservando solo la alternativa léxica importante para חַטָּאת.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:33:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB en casi todos los puntos: caso condicional contrastivo, singularidad de «una persona», pecado no intencional, presentación de una cabra de un año y valor sacrificial de חַטָּאת. Sin embargo, no preserva de manera suficiente la decisión documentada del POB sobre el femenino singular del ofensor. En español, «una persona ... presentará» neutraliza el femenino que el inglés auditado conservó con «she shall present».'
  spanish_quality_summary: El español es claro y digno, pero tiene leves detalles mejorables. «Cabra hembra» suena redundante en español, porque «cabra» ya suele entenderse como hembra frente a «macho cabrío»/«cabrío»; por eso la nota b no añade valor real. «Por inadvertencia» es aceptable, aunque algo técnico; funciona bien en registro jurídico-sacerdotal. La puntuación puede simplificarse quitando la coma alrededor de «de un año».
  glossary_alignment: No hay conflicto con los términos base del proyecto. «Ofrenda por el pecado» es aceptable para לְחַטָּאת y la nota sobre «ofrenda de purificación» preserva la alternativa relevante. No aparece terminología de Yahvé/Mesías/etc. La principal desalineación es con la decisión teológica/estilística del POB de reflejar el femenino singular.
  issues:
  - severity: medium
    issue: No se preserva explícitamente el femenino singular del ofensor
    rationale: El POB inglés documentó como decisión significativa mantener «she» por las formas femeninas singulares hebreas. En español, el borrador deja ese rasgo implícito en una construcción que en la práctica se lee genérica. Conviene explicitarlo con «esa persona presentará» o «ella presentará» para conservar mejor la decisión auditada sin sonar forzado.
  - severity: low
    issue: «Cabra hembra» es poco idiomático y redundante
    rationale: El hebreo עֵז sí especifica hembra, pero en español «cabra» normalmente ya comunica hembra. Mantener «hembra» en el texto principal no mejora la fidelidad y sí empeora la naturalidad.
  - severity: low
    issue: La nota b es innecesaria
    rationale: Si se revisa a «cabra», ya no hace falta una nota para justificar un sexo que el español ya expresa naturalmente; además el inglés POB no requería nota aquí.
  revised_spanish_text: Pero si una persona peca por inadvertencia, esa persona presentará una cabra de un año como ofrenda por el pecado[a].
  revised_footnotes:
