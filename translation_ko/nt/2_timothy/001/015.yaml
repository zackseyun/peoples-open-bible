  text: Οἶδας τοῦτο ὅτι ἀπεστράφησάν με πάντες οἱ ἐν τῇ Ἀσίᾳ, ὧν ἐστιν Φύγελος καὶ Ἑρμογένης.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/015.yaml
  text: 'You know this: all those in Asia turned away from me, among whom are Phygelus and Hermogenes.'
translation:
  language: ko
  text: 그대도 알고 있는 일이지만, 아시아[a]에 있는 모든 이가 나에게서 돌아섰습니다. 그 가운데 부겔로와 허모게네가 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 여기서 「아시아」는 오늘날의 아시아 대륙이 아니라 소아시아 서부의 로마 속주를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεστράφησάν με
  english_pob_choice: turned away from me
  chosen_korean: 나에게서 돌아섰습니다
  alternatives_korean:
  - 나를 떠났습니다
  - 나에게서 등을 돌렸습니다
  lexicon: BDAG
  rationale: ἀποστρέφω는 「얼굴을 돌려 외면함」을 뜻한다. 「돌아섰다」는 한국어로 그 외면·이탈의 무게를 자연스럽게 담는다.
- source_word: Φύγελος
  english_pob_choice: Phygelus
  chosen_korean: 부겔로
  alternatives_korean:
  - 퓌겔로스
  lexicon: BDAG
  rationale: 한국 성서 전통(개역개정)에 따라 「부겔로」로 옮긴다.
- source_word: Ἑρμογένης
  english_pob_choice: Hermogenes
  chosen_korean: 허모게네
  alternatives_korean:
  - 헤르모게네스
  lexicon: BDAG
  rationale: 한국 성서 전통에 따라 「허모게네」로 옮긴다.
