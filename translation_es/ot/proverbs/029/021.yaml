translation:
  language: es
  text: Quien consiente a su esclavo desde la juventud[a], al final llegará a ser como un hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo מָנוֹן es incierto. También se ha entendido como «un hijo» o «uno que actúa como hijo», lo que da la idea de que un esclavo consentido puede presumir de un estatus filial; otros lo toman más generalmente como «problema» o «insubordinación».
    reason: alternative_reading
lexical_decisions:
- source_word: מְפַנֵּק
  english_pob_choice: pampers
  chosen_spanish: consiente
  alternatives_spanish:
  - mima
  - malcría
  - carga de mimos
  lexicon: HALOT
  rationale: El participio piel de פנק expresa tratar con excesiva indulgencia. En español, "consiente" comunica bien la idea de permitir o fomentar un trato blando y permisivo; evita un calco demasiado afectado y mantiene el tono proverbial negativo.
- source_word: מִנֹּעַר
  english_pob_choice: from youth
  chosen_spanish: desde la juventud
  alternatives_spanish:
  - desde joven
  - desde la niñez
  - desde su juventud
  lexicon: HALOT
  rationale: La frase indica una etapa temprana de la vida. "Desde la juventud" es natural y suficientemente fiel; se evita añadir el posesivo "su" porque no está explícito en hebreo.
- source_word: עַבְדּוֹ
  english_pob_choice: his slave
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  lexicon: HALOT
  rationale: עבד puede significar esclavo o sirviente, pero el contexto de dependencia doméstica y autoridad hace pertinente conservar "esclavo" como en el audit trail inglés, por la fuerza social del término.
- source_word: וְאַחֲרִיתוֹ
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - en el final
  - a la postre
  lexicon: HALOT
  rationale: אַחֲרִית señala el desenlace o resultado final. "Al final" es una equivalencia natural en español y preserva el sentido proverbial de consecuencia eventual.
- source_word: מָנֽוֹן
  english_pob_choice: grief / son / one acting like a son / trouble / insubordination
  chosen_spanish: un insolente
  alternatives_spanish:
  - grief
  - problema
  - insubordinado
  - un hijo
  lexicon: HALOT
  rationale: La forma מָנוֹן es oscura y admite varias lecturas. Dado que el contexto sugiere el resultado de un esclavo malcriado que presume de un estatus indebido, se opta por "un insolente" para expresar la actitud resultante sin forzar un sustantivo de parentesco que el hebreo no asegura.
theological_decisions:
- issue: Valor de מָנוֹן en el desenlace del proverbio
  english_pob_reading: The English audit trail preserves the tension between 'grief' and 'he will become a son,' with a note that Hebrew מָנוֹן is uncertain and may imply filial presumption or trouble/insubordination.
  chosen_spanish_reading: al final será un insolente
  alternative_spanish_readings:
  - al final tendrá dolor
  - al final será como un hijo
  - al final causará problemas
  rationale: Se preserva la incertidumbre léxica sin imponer la lectura de "hijo" como si fuera segura. "Insolente" recoge bien la consecuencia relacional y moral sugerida por el contexto de un esclavo mimado que actúa con presunción, dejando abierta la tensión textual.
  doctrine_reference: Proverbs 29:21; lexical uncertainty in מָנוֹן
translation_notes:
  revision_awareness: 'El auditorio inglés registra una oscilación entre dos soluciones: una lectura interpretativa negativa (''grief'') y otra que conserva el posible matiz filial (''he will become a son''). En esta versión española se evita borrar la tensión: se mantiene esclavo/desde la juventud y se traduce el predicado oscuro con una opción que expresa la consecuencia social y moral sin cerrar el debate textual.'
  spanish_consistency_notes:
  - Se conserva "esclavo" por coherencia con la política POB cuando el estado de sujeción es relevante.
  - '"Desde la juventud" sigue el valor temporal del hebreo sin añadir posesivos innecesarios.'
  - Se evita "SEÑOR" o sustitutos litúrgicos porque no intervienen en este versículo.
  - La puntuación reproduce la estructura proverbial breve y contundente del hebreo.
