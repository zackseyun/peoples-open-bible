revisions:
- from: Y del resto del aceite que está en su palma[a], el sacerdote pondrá sobre el lóbulo de la oreja derecha del que se está purificando, y sobre el pulgar de su mano derecha, y sobre el dedo gordo de su pie derecho[b], sobre la sangre de la ofrenda por la culpa.
  to: Y del resto del aceite que está en su palma[a], el sacerdote pondrá sobre el lóbulo de la oreja derecha del que está siendo purificado, y sobre el pulgar de su mano derecha, y sobre el dedo gordo de su pie derecho[b], sobre la sangre de la ofrenda por la culpa.
  rationale: Se ajusta el participio ritual a una expresión pasiva más fiel («el que está siendo purificado») y se precisa la nota sobre la relación entre el aceite y la sangre para reflejar mejor la auditoría inglesa y el valor espacial de עַל en este contexto.
