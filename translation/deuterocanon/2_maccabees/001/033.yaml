translation:
  text: But when the matter became known and it was reported to the king of the Persians that[a], in the place where the priests who had been taken away had hidden the fire, water had appeared, from which also those with Nehemiah purified the sacrifices[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the deported priests' for 'the priests who had been taken away.' The Greek participle indicates priests removed from their land, likely in exile.
    reason: lexical_alternative
  - marker: b
    text: Or 'Nehemiah and his companions' for 'those around Nehemiah.' The Greek idiom refers to the group associated with him.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'from which' most naturally refers to the water that had appeared, implying that the water was used in the ritual purification of the sacrifices.
    reason: cross_reference
lexical_decisions:
- source_word: φανερὸν ἐγενήθη
  chosen: became clear
  alternatives:
  - became evident
  - was made manifest
  lexicon: LSJ
  rationale: A natural English rendering of the predicate adjective with γίνομαι that preserves the sense of the matter becoming publicly evident without sounding overly formal.
- source_word: τὸ πρᾶγμα
  chosen: the matter
  alternatives:
  - the affair
  - the event
  - the thing
  lexicon: LSJ
  rationale: πρᾶγμα here refers to the reported occurrence or situation just described; 'the matter' is idiomatic and suitably broad.
- source_word: διηγήθη
  chosen: it was reported
  alternatives:
  - it was related
  - it was recounted
  - it was told
  lexicon: LSJ
  rationale: The passive sense fits the construction with τῷ βασιλεῖ; 'reported' conveys formal communication to a king.
- source_word: τῷ βασιλεῖ τῶν Περσῶν
  chosen: to the king of the Persians
  alternatives:
  - to the Persian king
  lexicon: LSJ
  rationale: The fuller phrasing follows the Greek genitive construction more closely while remaining readable.
- source_word: οἱ μεταχθέντες ἱερεῖς
  chosen: the priests who had been taken away
  alternatives:
  - the deported priests
  - the priests who had been carried away
  lexicon: LSJ
  rationale: The participle indicates removal/transport, likely in exile context. 'Taken away' is transparent and avoids over-specifying beyond the Greek, while preserving the passive sense.
- source_word: ἔκρυψαν
  chosen: had hidden
  alternatives:
  - hid
  lexicon: LSJ
  rationale: Pluperfect-like English helps show the hiding preceded the appearing of the water within the reported narrative sequence.
- source_word: τὸ πῦρ ... τὸ ὕδωρ ἐφάνη
  chosen: had hidden the fire, water had appeared
  alternatives:
  - where the fire had been hidden, water appeared
  lexicon: LSJ
  rationale: The Greek sharply contrasts the earlier hidden fire with the later appearance of water. The translation preserves that contrast explicitly.
- source_word: ἀφ' οὗ
  chosen: from which
  alternatives:
  - from it
  - with which
  - out of which
  lexicon: LSJ
  rationale: The phrase most naturally refers to the water as the source or means from which the subsequent purification action proceeded.
- source_word: οἱ περὶ τὸν Νεεμίαν
  chosen: those around Nehemiah
  alternatives:
  - Nehemiah and his companions
  - the men with Nehemiah
  lexicon: LSJ
  rationale: This idiom denotes the group associated with a leader. 'Those around Nehemiah' is close to the Greek and avoids adding 'men' where the Greek does not specify.
- source_word: ἥγνισαν
  chosen: purified
  alternatives:
  - consecrated
  - made clean
  lexicon: LSJ
  rationale: The verb denotes ritual purification. 'Purified' best matches sacrificial context without narrowing to a later technical sense.
- source_word: τὰς θυσίας
  chosen: the sacrifices
  alternatives:
  - the sacrificial offerings
  - the offerings
  lexicon: LSJ
  rationale: A straightforward rendering of θυσίαι in cultic context; 'sacrifices' is clear and sufficiently formal.
