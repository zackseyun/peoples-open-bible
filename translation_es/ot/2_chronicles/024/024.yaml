    issue: «entregó en su mano» traduce בְּיָדָם con singular en lugar de plural
    rationale: 'El sufijo hebreo -ם es plural masculino: «en la mano de ellos / en sus manos». El antecedente es el ejército de Aram, no una entidad singular femenina o colectiva que justifique «su mano». En español esto afecta la fidelidad al texto.'
  - severity: low
