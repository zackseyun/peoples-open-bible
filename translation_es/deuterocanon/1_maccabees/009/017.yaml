translation:
  language: es
  text: Y la batalla se volvió más intensa, y muchos cayeron heridos de ambos lados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “de estos y de aquellos”; es decir, de ambos lados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβαρύνθη
  english_pob_choice: grew fierce
  chosen_spanish: se hizo más recia
  alternatives_spanish:
  - se volvió más intensa
  - se hizo más pesada
  - se volvió feroz
  lexicon: LSJ
  rationale: El pasivo de βαραίνω expresa literalmente “volverse pesado”, pero en contexto bélico señala que el combate se tornó más duro o severo. “Se hizo más recia” conserva la idea de incremento de intensidad con un español natural y digno.
- source_word: ὁ πόλεμος
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  - la lucha
  lexicon: LSJ
  rationale: Aquí πόλεμος se refiere al enfrentamiento inmediato, no a una guerra general. “Batalla” refleja mejor el contexto narrativo y coincide con la lectura contextual del inglés POB.
- source_word: ἔπεσαν
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron derribados
  - cayeron abatidos
  lexicon: LSJ
  rationale: El verbo simple “cayeron” mantiene la fórmula narrativa de batalla sin añadir más de lo que el griego dice. El complemento “heridos” aclara el resultado inmediato.
- source_word: τραυματίαι
  english_pob_choice: wounded
  chosen_spanish: heridos
  alternatives_spanish:
  - los heridos
  - hombres heridos
  - casualidades
  lexicon: LSJ
  rationale: El término designa a los que han sido heridos, no necesariamente muertos. “Heridos” es breve, exacto y natural en español; “casualidades” sería demasiado amplio.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - gran número de
  - muchísimos
  lexicon: LSJ
  rationale: La cuantificación es directa y no requiere ampliación. “Muchos” reproduce fielmente la simplicidad del original.
- source_word: ἐκ τούτων καὶ ἐκ τούτων
  english_pob_choice: from both sides
  chosen_spanish: de ambos lados
  alternatives_spanish:
  - de unos y de otros
  - de este lado y de aquel
  - de ambos bandos
  lexicon: LSJ
  rationale: La expresión griega es literalmente “de estos y de aquellos”, un modismo que indica procedencia de ambos bandos. En español, “de ambos lados” comunica el sentido con claridad y sin perder el contraste simétrico.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete 1909 y toma como guía el audit trail inglés, especialmente la revisión que aclaró el modismo final como “from both sides”. Se mantiene la imagen de intensificación del combate sin introducir ideas de muerte no presentes en el texto.
  spanish_consistency_notes:
  - Se usa “batalla” para πόλεμος en este contexto narrativo inmediato.
  - Se conserva “heridos” para τραυματίαι, evitando sugerir muerte.
  - La nota al pie preserva la alternativa literal del modismo griego final.
  - El registro busca ser bíblico y claro en español latinoamericano sin arcaísmos innecesarios.
