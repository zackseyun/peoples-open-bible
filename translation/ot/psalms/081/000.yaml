id: PSA.81.0
reference: Psalms 81:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֬חַ עַֽל הַ/גִּתִּ֬ית לְ/אָסָֽף׀־׃
translation:
  text: 'For the choir director: according to the Gittith[a]. Of Asaph.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Gittith. The term likely refers to a musical setting, instrument, or tune name, but its precise meaning is uncertain; possibilities include an instrument associated with Gath or a named melody.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music leader
  - To the choirmaster
  lexicon: HALOT
  rationale: In Psalm superscriptions, this participial form with prefixed ל commonly indicates direction to the person overseeing musical performance. 'Choir director' is clear modern English and preserves the functional sense better than the more archaic 'chief musician' or less specific 'music leader'.
- source_word: עַל
  chosen: according to
  alternatives:
  - 'on'
  - upon
  - with reference to
  lexicon: HALOT
  rationale: In superscriptions introducing a tune, instrument, or musical setting, עַל often signals the melody/instrumental designation rather than simple spatial 'on.' 'According to' idiomatically fits English psalm headings for this usage.
- source_word: הַגִּתִּית
  chosen: The Gittith
  alternatives:
  - the Gittite lyre
  - the winepress tune
  lexicon: HALOT
  rationale: 'The exact referent is uncertain: it may denote a musical instrument, a tune name, or something associated with Gath. Because the meaning is disputed and no single English gloss is secure, transliteration best preserves the Hebrew term without over-interpreting it.'
- source_word: לְאָסָף
  chosen: Of Asaph
  alternatives:
  - For Asaph
  - Belonging to Asaph
  lexicon: HALOT
  rationale: In psalm headings, ל with a personal name commonly marks authorship, association, or collection. 'Of Asaph' is the standard concise rendering that preserves the ambiguity better than forcing either authorship ('by') or dedication ('for').
