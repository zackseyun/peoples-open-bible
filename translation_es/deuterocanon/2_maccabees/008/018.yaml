translation:
  language: es
  text: Pues ellos —dijo— han puesto su confianza en las armas y la audacia, pero nosotros hemos puesto nuestra confianza en Dios Todopoderoso, que puede derribar, con un solo gesto[a], tanto a los que vienen contra nosotros como al mundo entero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con una sola señal» o «con un solo ademán». El griego se refiere literalmente a un gesto o señal breve, y enfatiza con cuánta facilidad Dios puede derribar a los enemigos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπλοις
  english_pob_choice: weapons
  chosen_spanish: las armas
  alternatives_spanish:
  - las armas de guerra
  - las armas militares
  lexicon: LSJ
  rationale: ὅπλα aquí se refiere a implementos de guerra; en español, 'armas' es natural y fiel, y evita la posible dureza o rareza de un calco más técnico.
- source_word: τόλμαις
  english_pob_choice: boldness
  chosen_spanish: la audacia
  alternatives_spanish:
  - el atrevimiento
  - la valentía
  lexicon: LSJ
  rationale: El término expresa arrojo o osadía en contexto bélico. 'Audacia' conserva el matiz de valor decidido que el texto contrapone a la confianza en Dios.
- source_word: ἐπὶ τῷ παντοκράτορι θεῷ
  english_pob_choice: in Almighty God
  chosen_spanish: en Dios Todopoderoso
  alternatives_spanish:
  - en el Dios Todopoderoso
  - apoyados en Dios Todopoderoso
  lexicon: LSJ
  rationale: Con πεποίθαμεν, ἐπί con dativo expresa la base de la confianza. 'En Dios Todopoderoso' reproduce bien esa base en español y mantiene el título divino sin oscurecerlo.
- source_word: παντοκράτορι
  english_pob_choice: Almighty
  chosen_spanish: Todopoderoso
  alternatives_spanish:
  - omnipotente
  - Todopoderoso Dios
  lexicon: LSJ
  rationale: Como título divino, 'Todopoderoso' es la equivalencia más natural y reverente en español, y preserva el peso teológico de παντοκράτωρ.
- source_word: τοὺς ἐρχομένους ἐφʼ ἡμᾶς
  english_pob_choice: those coming against us
  chosen_spanish: los que vienen contra nosotros
  alternatives_spanish:
  - los que se acercan contra nosotros
  - los que avanzan sobre nosotros
  lexicon: LSJ
  rationale: La frase describe a los que se aproximan con hostilidad. 'Vienen contra nosotros' conserva el movimiento y el sentido adversativo sin añadir un matiz táctico innecesario.
- source_word: τὸν ὅλον κόσμον
  english_pob_choice: the whole world
  chosen_spanish: al mundo entero
  alternatives_spanish:
  - a todo el mundo
  - al universo entero
  lexicon: LSJ
  rationale: κόσμος puede significar mundo u orden creado; aquí la hipérbole subraya el poder absoluto de Dios. 'Mundo entero' mantiene esa amplitud de forma idiomática en español.
- source_word: ἑνὶ νεύματι
  english_pob_choice: with a single nod
  chosen_spanish: con un solo gesto
  alternatives_spanish:
  - con una sola señal
  - con un solo movimiento
  lexicon: LSJ
  rationale: νεῦμα puede ser una señal, un gesto o un ademán. En español, 'con un solo gesto' comunica bien la facilidad soberana de la acción divina sin forzar una imagen corporal demasiado literal.
- source_word: καταβαλεῖν
  english_pob_choice: to bring down
  chosen_spanish: derribar
  alternatives_spanish:
  - abatir
  - hacer caer
  lexicon: LSJ
  rationale: El verbo significa echar abajo, abatir o derribar. 'Derribar' es claro en español y conserva la idea de caída provocada por el poder de Dios.
- source_word: πεποίθασιν / πεποίθαμεν
  english_pob_choice: have put their confidence / have put our confidence
  chosen_spanish: han puesto su confianza / confiamos
  alternatives_spanish:
  - han confiado / confiamos
  - han depositado su confianza / depositamos nuestra confianza
  lexicon: LSJ
  rationale: Los perfectos griegos expresan una confianza asentada. En español, 'han puesto su confianza' y 'confiamos' mantienen el paralelismo y suenan naturales, sin perder el contraste entre ambos grupos.
theological_decisions:
- issue: Título divino παντοκράτωρ
  english_pob_reading: Almighty God
  chosen_spanish_reading: Dios Todopoderoso
  alternative_spanish_readings:
  - el Dios Todopoderoso
  - Dios omnipotente
  rationale: El título afirma el poder soberano de Dios como fundamento de la confianza de los hablantes. 'Todopoderoso' preserva ese valor teológico con una forma estable y reconocible en español.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological weight.'
- issue: Alcance de τὸν ὅλον κόσμον
  english_pob_reading: the whole world
  chosen_spanish_reading: al mundo entero
  alternative_spanish_readings:
  - al universo entero
  - a todo el mundo
  rationale: La expresión es una hipérbole que enfatiza que el poder de Dios no tiene límites. 'Mundo entero' conserva la amplitud retórica sin resolver la tensión hacia una cosmología más técnica.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: ἑνὶ νεύματι como imagen de acción divina fácil
  english_pob_reading: with a single nod
  chosen_spanish_reading: con un solo gesto
  alternative_spanish_readings:
  - con una sola señal
  - con un solo ademán
  rationale: La imagen subraya que Dios puede abatir enemigos sin esfuerzo. 'Con un solo gesto' comunica esa facilidad soberana en un español claro, sin convertir el texto en una paráfrasis.
  doctrine_reference: 'DOCTRINE.md: Readable modern language; preserve imagery.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete 1909 y toma como control el trazado inglés del POB, pero ajusta el español a una sintaxis natural: se prefirió ''Dios Todopoderoso'' por su claridad como título divino, se mantuvo la antítesis entre la confianza en armas/audacia y la confianza en Dios, y se conservó la hipérbole de ''mundo entero'' sin domesticarla.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' para el nombre divino porque aquí no aparece יהוה en el griego citado; el texto usa el título παντοκράτωρ.
  - '''Audacia'' se eligió para τόλμαις porque en este contexto es una valentía militar positiva, no una temeridad moralmente negativa.'
  - Se mantuvo 'con un solo gesto' como imagen de acción divina instantánea; la nota conserva las alternativas semánticas relevantes.
  - '''Confiamos'' traduce el perfecto griego de forma idiomática en español, mientras ''han puesto su confianza'' preserva el contraste explícito del original para el primer miembro.'
