id: EZK.13.15
reference: Ezekiel 13:15
source:
  edition: WLC
  text: וְ/כִלֵּיתִ֤י אֶת חֲמָתִ/י֙ בַּ/קִּ֔יר וּ/בַ/טָּחִ֥ים אֹת֖/וֹ תָּפֵ֑ל וְ/אֹמַ֤ר לָ/כֶם֙ אֵ֣ין הַ/קִּ֔יר וְ/אֵ֖ין הַ/טָּחִ֥ים אֹתֽ/וֹ־׃
translation:
  text: So I will spend my wrath against the wall and against those who plastered it with whitewash[a], and I will say to you, ‘The wall is no more, and those who plastered it are no more,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with untempered mortar.' The Hebrew term can refer to a superficial or inferior coating; 'whitewash' best fits the imagery in context, while the traditional rendering is preserved here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלֵּיתִי
  chosen: So I will spend
  alternatives:
  - I will consume
  - I will exhaust
  - I will finish pouring out
  lexicon: HALOT
  rationale: כלה in the Piel can mean to complete, finish, or bring to an end. With חֵמָה/חֲמָה ('wrath') as object, the sense is that God will fully expend or exhaust his wrath. 'Spend' is idiomatic modern English that preserves the metaphor of wrath being fully poured out without implying annihilation of the wrath itself.
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my anger
  lexicon: HALOT
  rationale: חֵמָה commonly denotes wrath/fury. 'Wrath' best preserves the judicial and prophetic force in this judgment context.
- source_word: בַּקִּיר
  chosen: against the wall
  alternatives:
  - on the wall
  - upon the wall
  lexicon: HALOT
  rationale: The preposition ב here is used with the object of judgment; in English, 'against the wall' communicates the target of divine wrath more naturally than a strictly locative 'in/on the wall.'
- source_word: וּבַטָּחִים אֹתוֹ תָּפֵל
  chosen: and against those who plastered it with whitewash
  alternatives:
  - and against those who smeared it with whitewash
  - and against those who coated it with whitewash
  - and against its plasterers with whitewash
  lexicon: HALOT
  rationale: טוח is 'to plaster/smear/coat.' תפל in this context refers to the flimsy whitewash or superficial coating from the surrounding passage. 'Plastered it with whitewash' is clear, idiomatic, and consistent with the metaphor of deceptive prophetic covering.
- source_word: תָּפֵל
  chosen: whitewash
  alternatives:
  - untempered mortar
  - plaster
  - worthless coating
  lexicon: HALOT
  rationale: Traditional 'untempered mortar' reflects older interpretation, but in Ezekiel 13 the image is of a deceptive coating over a weak wall. 'Whitewash' fits the immediate metaphor and modern English usage. The traditional alternative is worth preserving in a footnote because of translation history.
- source_word: וְאֹמַר לָכֶם
  chosen: and I will say to you
  alternatives:
  - then I will say to you
  - and I will tell you
  lexicon: HALOT
  rationale: A straightforward rendering of the first-person imperfect with conjunction. 'Say' preserves the directness of the prophetic declaration.
- source_word: אֵין הַקִּיר
  chosen: The wall is no more
  alternatives:
  - There is no wall
  - The wall is gone
  lexicon: HALOT
  rationale: אֵין expresses nonexistence. 'The wall is no more' preserves the solemnity of the judgment while sounding natural in English.
- source_word: וְאֵין הַטָּחִים אֹתוֹ
  chosen: and those who plastered it are no more
  alternatives:
  - and there are no plasterers of it
  - and those who coated it are gone
  lexicon: HALOT
  rationale: 'The clause parallels the previous one: not only the wall but also its deceptive builders/plasterers are gone. ''Are no more'' keeps the rhetorical symmetry.'
