  language: en
  yaml_path: translation/ot/jeremiah/011/017.yaml
  text: And Yahweh of Armies[a], who planted you, has spoken disaster against you because of the evil of the house of Israel and the house of Judah, which they did to provoke me to anger by burning incense to Baal.
  footnotes:
