translation:
  language: es
  text: Y los egipcios obligaron a los hijos de Israel[a] a trabajar con dureza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas».
    reason: lexical_alternative
  - marker: b
    text: O «con rigor» o «con crueldad». El hebreo denota una dureza severa y aplastante en el trabajo forzado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבִ֧דוּ
  english_pob_choice: made ... serve
  chosen_spanish: hicieron servir
  alternatives_spanish:
  - esclavizaron
  - hicieron trabajar
  - obligaron a servir
  lexicon: HALOT
  rationale: El piel/causativo de עבד expresa aquí ‘causar a servir/trabajar’. «Hicieron servir» conserva la fuerza causativa sin añadir más de lo que exige el verbo. «Esclavizaron» sería posible por el contexto inmediato, pero es más interpretativo que la cláusula misma; «hicieron trabajar» estrecha el sentido hacia trabajo físico y pierde el matiz de servicio forzado.
- source_word: מִצְרַ֛יִם
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  - los habitantes de Egipto
  lexicon: HALOT
  rationale: La forma puede referirse al país o al pueblo, pero el sujeto verbal aquí son los opresores egipcios. «Los egipcios» es el equivalente natural en español y mantiene el plural étnico del hebreo.
- source_word: בְּנֵ֥י יִשְׂרָאֵ֖ל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión corporativa/familiar del hebreo. «Los hijos de Israel» es la forma más transparente y fiel al original; «los israelitas» suaviza la imagen genealógica, y «los hijos de Jacob» cambia el texto base.
- source_word: בְּפָֽרֶךְ
  english_pob_choice: harshly / with harshness; ruthlessness; rigor
  chosen_spanish: con dureza
  alternatives_spanish:
  - con rigor
  - con crueldad
  - con rudeza
  lexicon: HALOT
  rationale: פָּרֶךְ denota dureza severa, aplastante, en el trabajo forzado. «Con dureza» comunica bien esa severidad en español moderno sin cargarlo excesivamente con una interpretación emocional. «Con rigor» es más tradicional, pero menos directo; «con crueldad» y «con rudeza» inclinan demasiado el matiz.
theological_decisions:
- issue: Designación colectiva בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: La expresión funciona como designación del pueblo del pacto y conserva resonancia genealógica/corporativa. Mantener «los hijos de Israel» sigue la política del proyecto de ser fiel a la forma del hebreo sin neutralizarla indebidamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Intensidad de בְּפָרֶךְ
  english_pob_reading: harshly / with harshness; severe, crushing harshness in forced labor
  chosen_spanish_reading: con dureza
  alternative_spanish_readings:
  - con rigor
  - con crueldad
  rationale: La frase hebrea describe una opresión laboral severa y aplastante. «Con dureza» mantiene el impacto sin convertir el adverbio en una glosa demasiado explicativa. Se preserva así la tensión del texto entre dureza objetiva y la posible carga de brutalidad.
  doctrine_reference: HALOT s.v. פֶּרֶךְ; uso contextual en Exodo 1:13
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada del inglés POB, que pasó de una construcción más literal («con dureza») a una forma más natural en inglés («harshly»). Por eso el español adopta un adverbio/adjunto natural («con dureza») que conserva el sentido de servicio forzado sin calcar la estructura inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como preferencia general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el plural étnico «los egipcios» para el sujeto y la frase corporativa «los hijos de Israel» para la comunidad del pacto.
  - No se introduce lenguaje eclesiástico tradicional no sustentado por el hebreo; la formulación busca transparencia y lectura pública natural.
