    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
  - marker: b
    text: El hebreo usa un infinitivo absoluto con verbo finito para intensificar la afirmación.
    reason: lexical_alternative
  revision_rationale: Se revisa la frase intensiva «ha oído con certeza» a «ciertamente ha oído» para reflejar mejor el énfasis del hebreo en español natural y digno. También se suaviza la puntuación de la invocación eliminando la exclamación innecesaria. Se mantienen la terminología del proyecto («Yahvé») y las notas pertinentes.
