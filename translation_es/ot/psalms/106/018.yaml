translation:
  language: es
  text: Y ardió[a] fuego en medio de su compañía[b]; una llama consumió a los impíos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se encendió» para «ardió»; el verbo hebreo puede enfatizar el inicio o brote del fuego.
    reason: lexical_alternative
  - marker: b
    text: O «en su compañía»; עֵדָה designa un grupo reunido, una asamblea o compañía.
    reason: lexical_alternative
  - marker: c
    text: O «quemó a los impíos»; el verbo transmite un quemar intenso y destructivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּבְעַר
  english_pob_choice: burned
  chosen_spanish: ardió
  alternatives_spanish:
  - se encendió
  - quemó
  - se inflamó
  lexicon: HALOT
  rationale: בער expresa la acción de arder o encenderse. «Ardió» es natural en español y conserva la imagen de fuego que irrumpe, sin añadir más intensidad de la que el hebreo ya sugiere.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: HALOT
  rationale: El sustantivo básico es «fuego». Mantiene el paralelismo con «una llama» en el segundo hemistiquio.
- source_word: בַּעֲדָתָם
  english_pob_choice: among their company
  chosen_spanish: en medio de su compañía
  alternatives_spanish:
  - entre su compañía
  - en su asamblea
  - entre ellos
  lexicon: HALOT
  rationale: עֵדָה denota un grupo reunido, una compañía o asamblea. «En medio de» expresa que el fuego estalló dentro del grupo; «compañía» conserva el sentido colectivo sin forzar una terminología litúrgica.
- source_word: לֶהָבָה
  english_pob_choice: a flame
  chosen_spanish: una llama
  alternatives_spanish:
  - una flama
  - una llama de fuego
  lexicon: HALOT
  rationale: לֶהָבָה es «llama» o «flama». «Una llama» fluye bien en español y sostiene el paralelismo poético con «fuego».
- source_word: תְּלַהֵט
  english_pob_choice: consumed
  chosen_spanish: consumió
  alternatives_spanish:
  - devoró
  - abrasó
  - quemó
  lexicon: HALOT
  rationale: El intensivo de להט comunica un quemar fuerte y destructivo. «Consumió» capta el resultado devastador de modo idiomático y fiel al contexto.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los malhechores
  lexicon: HALOT
  rationale: רְשָׁעִים designa a los impíos/malvados. «Los impíos» conserva el matiz moral y bíblico, y resulta natural en español culto.
theological_decisions:
- issue: Alcance del juicio descrito
  english_pob_reading: The verse describes divine judgment by literal fire on the rebellious/wicked within Israel's camp, without expanding the statement into a broader doctrinal claim.
  chosen_spanish_reading: El versículo presenta un juicio por fuego en el grupo reunido, sin convertirlo en una afirmación doctrinal más amplia que el texto no explicita.
  alternative_spanish_readings:
  - Una imagen puramente metafórica del juicio
  - Una alusión generalizada sin referencia histórica concreta
  rationale: El contexto del Salmo 106 rememora episodios históricos de rebelión y juicio. La traducción conserva la imagen concreta de fuego y no la espiritualiza ni la amplía más allá de lo que el hebreo y el audit trail permiten.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El inglés POB revisó «assembly» a «company» por mayor naturalidad, manteniendo el sentido colectivo. La propuesta española sigue ese ajuste con «compañía» y conserva el paralelismo de dos miembros: fuego/llama, ardió/consumió.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se prefirió «impíos» sobre «malvados» para mantener un registro bíblico más consistente con el tono del Salterio.
  - Se mantuvo el orden poético de los hemistiquios sin añadir elementos explicativos ajenos al texto.
