translation:
  language: es
  text: Y dominaron todo el territorio por su consejo y por la espada —aunque el territorio estaba muy lejos de ellos—, y a los reyes que vinieron contra ellos desde el extremo de la tierra[a], hasta que los quebrantaron y les asestaron un gran golpe; y los demás les dan tributo año tras año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase griega dice literalmente «desde el extremo de la tierra», un modismo que expresa una distancia muy grande.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεκράτησαν
  english_pob_choice: gained control of
  chosen_spanish: dominaron
  alternatives_spanish:
  - obtuvieron control de
  - se impusieron sobre
  - tomaron dominio de
  lexicon: LSJ
  rationale: El verbo griego expresa poder efectivo y dominio sobre un territorio. «Dominaron» mantiene la fuerza política y militar sin sonar tan pesado como una construcción analítica.
- source_word: τοῦ τόπου παντός
  english_pob_choice: the whole region
  chosen_spanish: todo el territorio
  alternatives_spanish:
  - toda la región
  - todo el lugar
  - toda la tierra
  lexicon: LSJ
  rationale: Aquí τόπος tiene sentido geopolítico. «Territorio» comunica mejor la idea de dominio espacial-político que «lugar», sin exagerar hasta «tierra».
- source_word: τῇ βουλῇ αὐτῶν
  english_pob_choice: by their counsel
  chosen_spanish: por su consejo
  alternatives_spanish:
  - por su plan
  - por su estrategia
  - por su deliberación
  lexicon: LSJ
  rationale: βουλή puede ser consejo, plan o política. «Consejo» conserva la idea de decisión deliberada y conserva la coordinación con la espada como sabiduría más fuerza.
- source_word: τῇ ῥομφαίᾳ
  english_pob_choice: by the sword
  chosen_spanish: por la espada
  alternatives_spanish:
  - por la guerra
  - por la fuerza de las armas
  lexicon: LSJ
  rationale: Es la metáfora militar estándar. «Por la espada» es directo, natural y fiel al paralelismo del texto.
- source_word: μακρὰν ἀπέχων ἀπʼ αὐτῶν σφόδρα
  english_pob_choice: was very far away from them
  chosen_spanish: estaba muy lejos de ellos
  alternatives_spanish:
  - se hallaba a gran distancia de ellos
  - quedaba muy distante de ellos
  lexicon: LSJ
  rationale: La frase explica la sorpresa del dominio pese a la distancia. «Muy lejos de ellos» es claro y reproduce la intensificación de σφόδρα.
- source_word: τῶν βασιλέων τῶν ἐπελθόντων ἐπʼ αὐτούς
  english_pob_choice: of the kings who came against them
  chosen_spanish: de los reyes que vinieron contra ellos
  alternatives_spanish:
  - de los reyes que avanzaron contra ellos
  - de los reyes que los atacaron
  lexicon: LSJ
  rationale: «Vinieron contra ellos» refleja bien la idea de avance hostil sin añadir demasiado al modo exacto de la acción.
- source_word: ἀπʼ ἄκρου τῆς γῆς
  english_pob_choice: from the end of the earth
  chosen_spanish: desde el extremo de la tierra
  alternatives_spanish:
  - desde los confines de la tierra
  - desde el fin de la tierra
  lexicon: LSJ
  rationale: Mantiene la imagen idiomática de gran distancia. «Extremo» conserva el singular del griego y su valor expresivo.
- source_word: συνέτριψαν
  english_pob_choice: crushed
  chosen_spanish: los quebrantaron
  alternatives_spanish:
  - los trituraron
  - los destrozaron
  - los aplastaron
  lexicon: LSJ
  rationale: El verbo indica derrota contundente. «Quebrantaron» preserva la fuerza del golpe bélico con un matiz más literario y digno en español.
- source_word: ἐπάταξαν ἐν αὐτοῖς πληγὴν μεγάλην
  english_pob_choice: struck them with a great blow
  chosen_spanish: les causaron un gran golpe
  alternatives_spanish:
  - les asestaron un gran golpe
  - les infligieron una gran derrota
  - les dieron un duro golpe
  lexicon: LSJ
  rationale: El griego conserva la imagen de un golpe grande. «Causaron un gran golpe» es idiomático en español y mantiene la literalidad básica sin volverlo demasiado mecánico.
- source_word: οἱ ἐπίλοιποι
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - los restantes
  - los que quedaron
  - los sobrevivientes
  lexicon: LSJ
  rationale: 'La referencia es suficientemente amplia para dejar cierta ambigüedad: puede abarcar pueblos, reyes o poderes restantes. «Los demás» preserva esa amplitud.'
- source_word: ὀιδόασιν αὐτοῖς φόρον
  english_pob_choice: give them tribute
  chosen_spanish: les dan tributo
  alternatives_spanish:
  - les entregan tributo
  - les rinden tributo
  - les pagan tributo
  lexicon: LSJ
  rationale: Sigue el valor del presente en la revisión inglesa y conserva el lenguaje político de φόρος. «Dan tributo» evita forzar una lectura técnica que el griego no explicita más allá del tributo mismo.
- source_word: κατʼ ἐνιαυτόν
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - anualmente
  lexicon: LSJ
  rationale: Expresa la repetición anual con un giro natural en español y conserva el sentido distributivo.
translation_notes:
  revision_awareness: La traducción inglesa más reciente cambió «pay them tribute» por «give them tribute» para reflejar el presente con mayor precisión. En español se siguió ese valor verbal con «les dan tributo», manteniendo el tono presente y la referencia a pago/entrega tributaria sin perder la literalidad del sustantivo φόρος.
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma general del proyecto solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se prefirió «tributo» para φόρος por su fuerza político-fiscal y por concordar con el registro histórico del libro.
  - Se evitó «SEÑOR» y «Cristo» porque no corresponden al contenido de este versículo.
  - «Quebrantaron» y «gran golpe» conservan el paralelismo bélico del griego sin convertirlo en paráfrasis excesiva.
