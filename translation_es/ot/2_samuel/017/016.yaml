translation:
  language: es
  text: 'Ahora envíen con rapidez y digan a David[a]: «No pases la noche en los vados del desierto, más bien, asegúrate de cruzar, no sea que el rey y todo el pueblo que está con él sean tragados»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las llanuras del desierto». La expresión hebrea puede denotar las tierras bajas o llanuras del desierto; aquí se traduce «vados» porque el contexto inmediato exige la idea de un cruce y de un peligro en ese punto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Marca la urgencia discursiva de la instrucción inmediata; 'Ahora' es natural en español y conserva el impulso del hebreo.
- source_word: שִׁלְחוּ מְהֵרָה
  english_pob_choice: send quickly
  chosen_spanish: envíen con rapidez
  alternatives_spanish:
  - envíen pronto
  - envíen de inmediato
  lexicon: HALOT
  rationale: El imperativo plural y el adverbio de urgencia se mantienen con una formulación idiomática en español sin perder la fuerza apremiante.
- source_word: וְהַגִּידוּ לְדָוִד לֵאמֹר
  english_pob_choice: and tell David, saying
  chosen_spanish: y digan a David
  alternatives_spanish:
  - y anuncien a David
  - y comuniquen a David
  lexicon: HALOT
  rationale: En español, la fórmula 'digan a David' conserva la función de mensajería sin calcar innecesariamente el hebreo 'diciendo', que aquí solo introduce el discurso directo.
- source_word: אַל תָּלֶן הַלַּיְלָה
  english_pob_choice: Do not stay tonight
  chosen_spanish: No pases la noche
  alternatives_spanish:
  - No te quedes esta noche
  - No albergues esta noche
  lexicon: HALOT
  rationale: לון en este contexto es 'pernoctar/pasar la noche'; 'no pases la noche' es claro y fiel en español.
- source_word: בְּעַרְבוֹת הַמִּדְבָּר
  english_pob_choice: at the fords of the wilderness
  chosen_spanish: en las vados del desierto
  alternatives_spanish:
  - en las llanuras del desierto
  - en los cruces del desierto
  lexicon: HALOT
  rationale: Se sigue la decisión auditada de entender aquí un punto de cruce, no solo 'llanuras'. En español, 'vados' expresa bien el lugar de paso asociado al cruce y al peligro inmediato. La forma plural conserva el plural hebreo, aunque suene algo regional; si se prefiere mayor naturalidad, 'en los vados del desierto' sería la forma idiomática esperable.
- source_word: וְגַם עָבֹר תַּעֲבֹר
  english_pob_choice: be sure to cross over
  chosen_spanish: sino cruza también
  alternatives_spanish:
  - pero cruza con seguridad
  - sí, cruza
  lexicon: HALOT
  rationale: El infinitivo absoluto + verbo finito intensifica la orden. Se opta por una formulación breve que preserve el empuje del mandato de cruzar, coordinada con la prohibición anterior.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - de lo contrario
  lexicon: HALOT
  rationale: Introduce la advertencia o temor del resultado negativo; 'no sea que' es el equivalente natural y preciso en español.
- source_word: יְבֻלַּע
  english_pob_choice: be swallowed up
  chosen_spanish: sean tragados
  alternatives_spanish:
  - sean engullidos
  - sean destruidos
  - sean consumidos
  lexicon: HALOT
  rationale: Se conserva la imagen corporal fuerte del verbo בלע. 'Tragados' comunica esa imagen de modo directo en español. Se usa plural para concordar con 'el rey y todo el pueblo'.
- source_word: לַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - al rey mismo
  lexicon: HALOT
  rationale: Se mantiene el título en lugar de reemplazarlo por el nombre propio, como hace la fuente hebrea.
- source_word: וּלְכָל הָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: and all the people who are with him
  chosen_spanish: y todo el pueblo que está con él
  alternatives_spanish:
  - y toda la gente que está con él
  - y todos los que están con él
  lexicon: HALOT
  rationale: '''Pueblo'' reproduce bien el alcance colectivo de עָם en este contexto narrativo, sin reducirlo a tropas. La cláusula relativa se vuelve natural en español con ''que está con él''.'
translation_notes:
  revision_awareness: 'Se incorporó la corrección necesaria para anclar la nota al texto español: el marcador [a] aparece en ''David[a]''. La redacción también ajusta el español para que la nota alternativa sobre בְּעַרְבוֹת הַמִּדְבָּר quede auditivamente vinculada a la elección léxica.'
  spanish_consistency_notes:
  - Se mantuvo 'Dios'/'Yahvé' fuera del versículo porque el texto no contiene un nombre divino.
  - Se preservó la imagen fuerte de יְבֻלַּע con 'tragados', evitando suavizarla a una mera destrucción.
  - Se evitó 'Cristo/Mesías' porque no aparece en el pasaje.
  - La fórmula de mensajería se adaptó a un español natural sin perder el registro narrativo formal.
