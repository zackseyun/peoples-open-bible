id: 1TI.1.7
reference: 1 Timothy 1:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: θέλοντες εἶναι νομοδιδάσκαλοι, μὴ νοοῦντες μήτε ἃ λέγουσιν μήτε περὶ τίνων διαβεβαιοῦνται.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/007.yaml
  text: wanting to be teachers of the law[b][a], though they understand neither what they are saying nor the things about which they speak so confidently.
  footnotes:
  - marker: a
    text: Or 'not understanding what they say or what they confidently assert.'
    reason: lexical_alternative
  - marker: b
    text: '''Teachers of the law'' likely refers to those claiming authority to teach the Jewish law (Torah).'
    reason: cultural_note
translation:
  language: ko
  text: 그들은 율법의 교사[a]가 되기를 원하지만, 자기가 무엇을 말하는지도, 무엇을 그토록 단언하는지도 알지 못합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「율법의 교사」는 유대 율법(토라)을 가르칠 권위를 자처한 자들을 가리키는 것으로 보인다.
    reason: cultural_note
lexical_decisions:
- source_word: θέλοντες
  english_pob_choice: wanting
  chosen_korean: 원하지만
  alternatives_korean:
  - 바라지만
  - 되고자 하지만
  lexicon: BDAG
  rationale: 지속적 의지의 현재 분사를 「원하지만」으로 옮겨 양보 어감을 살린다.
- source_word: νομοδιδάσκαλοι
  english_pob_choice: teachers of the law
  chosen_korean: 율법의 교사
  alternatives_korean:
  - 율법 선생
  - 모세 율법의 교사
  lexicon: BDAG
  rationale: 한국 교회 정립 어휘 「율법」 + 「교사」 조합. 「모세 율법」으로 좁히지 않고 본문이 함축하는 유대 율법 지시를 각주로 둔다.
- source_word: μὴ νοοῦντες
  english_pob_choice: though they understand
  chosen_korean: 알지 못합니다
  alternatives_korean:
  - 깨닫지 못한 채
  - 이해하지 못하면서
  lexicon: BDAG
  rationale: 양보적 분사 구문을 한국어 종결로 옮겨 비판의 무게를 강조한다.
- source_word: ἃ λέγουσιν
  english_pob_choice: what they are saying
  chosen_korean: 무엇을 말하는지
  alternatives_korean:
  - 자신들이 하는 말
  lexicon: BDAG
  rationale: 「자기가 무엇을 말하는지」가 한국어로 자연스럽고 강조의 무게를 살린다.
- source_word: περὶ τίνων διαβεβαιοῦνται
  english_pob_choice: the things about which they speak so confidently
  chosen_korean: 무엇을 그토록 단언하는지
  alternatives_korean:
  - 어떤 것에 대해 그처럼 확신을 가지고 말하는지
  - 무엇을 강하게 주장하는지
  lexicon: BDAG
  rationale: διαβεβαιόομαι는 강한 단언·확신 있는 주장. 「그토록 단언하는지」가 비판의 어감을 자연스럽게 담는다.
