review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y la línea de la POB inglesa en casi todo: «Ciertamente», «en el camino de tus juicios», «Yahvé», «te hemos esperado» y «el deseo del alma» preservan adecuadamente el sentido. La cláusula final también refleja bien la relación explicativa. Sin embargo, la nota [b] no preserva fielmente la alternativa inglesa documentada para וּלְזִכְרְךָ: la POB inglesa da como alternativa «the memory of you», pero la nota española actual convierte el texto principal y la alternativa en la misma idea («tu recuerdo» ... «tu recuerdo»), perdiendo la distinción léxica auditada.'
  spanish_quality_summary: El español es claro, natural y digno. «Tu recuerdo» en el texto principal es legible, aunque «tu memoria» también sería posible. No hace falta cambiar el texto base; la reparación necesaria es en las notas para evitar duplicación y mantener utilidad real para el lector.
  glossary_alignment: Se respeta correctamente el término del proyecto «Yahvé» para יְהוָה. «Tus juicios» concuerda con la decisión auditada para מִשְׁפָּטֶיךָ. No hay conflictos importantes con la terminología del proyecto.
  issues:
  - severity: medium
    issue: La nota [b] repite «tu recuerdo» como si fuera una alternativa al mismo «tu recuerdo».
    rationale: 'El expediente inglés documenta una alternativa real para זִכְרְךָ: «the memory of you». En español, la nota debe distinguir entre el texto principal y la alternativa; tal como está, no aporta información y no preserva la auditoría léxica.'
  - severity: low
    issue: La nota [a] usa «También» donde el inglés usa «Or».
    rationale: No es erróneo, pero «O bien» o «También puede traducirse» suele sonar más preciso en notas de alternativa léxica. No requiere cambio si se quiere una reparación mínima.
  revised_spanish_text: Ciertamente[a], en el camino de tus juicios, Yahvé, te hemos esperado[b]; porque tu nombre y tu recuerdo son el deseo del alma.
  revised_footnotes:
  - marker: a
    text: 'O bien: «tu justicia» o «tus ordenanzas» para «tus juicios».'
    reason: lexical_alternative
  - marker: b
    text: 'O bien: «la memoria de ti» para «tu recuerdo».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y acorde con las decisiones léxicas del proyecto. Solo se corrigen las notas para que reflejen de manera útil y exacta las alternativas auditadas, especialmente la de זִכְרְךָ.
