translation:
  language: es
  text: Lo abrirá[a] por las alas, pero no lo dividirá; y el sacerdote lo quemará sobre el altar, sobre la leña que está sobre el fuego. Es un holocausto, una ofrenda de alimento[b], aroma agradable para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo rasgará por las alas» o «Lo partirá por las alas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una ofrenda por fuego» o «una ofrenda de fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁסַּע
  english_pob_choice: tear it open
  chosen_spanish: lo partirá por las alas
  alternatives_spanish:
  - lo rasgará
  - lo abrirá
  lexicon: HALOT
  rationale: El verbo describe una acción física de abrir o rasgar el ave. En español, «partirlo por las alas» conserva la imagen concreta del texto y hace natural la conexión con la cláusula siguiente, donde se aclara que no debe dividirse por completo.
- source_word: בִכְנָפָיו
  english_pob_choice: by its wings
  chosen_spanish: por las alas
  alternatives_spanish:
  - junto a las alas
  - a través de las alas
  lexicon: HALOT
  rationale: La preposición con «alas» señala la ubicación o el punto de la acción. «Por las alas» es idiomático en español y mantiene la imagen corporal del ave.
- source_word: לֹא יַבְדִּיל
  english_pob_choice: he shall not divide it
  chosen_spanish: no lo dividirá
  alternatives_spanish:
  - no lo separará
  - no lo partirá completamente
  lexicon: HALOT
  rationale: 'El verbo indica separar o dividir. «No lo dividirá» reproduce bien la restricción del mandato: el ave puede ser abierta, pero no partida en dos.'
- source_word: וְהִקְטִיר
  english_pob_choice: shall burn it
  chosen_spanish: lo quemará
  alternatives_spanish:
  - lo hará subir en humo
  - lo ofrecerá en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo se refiere a quemar la ofrenda en el altar. «Lo quemará» es claro y fiel; el matiz cultual queda especificado por el altar y la ofrenda.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  lexicon: HALOT
  rationale: Terminología sacrificial estándar. «Sobre el altar» refleja bien la relación espacial del hebreo y suena natural en español bíblico contemporáneo.
- source_word: עַל הָעֵצִים אֲשֶׁר עַל הָאֵשׁ
  english_pob_choice: on the wood that is on the fire
  chosen_spanish: sobre la leña que está sobre el fuego
  alternatives_spanish:
  - sobre la madera que está sobre el fuego
  - sobre la leña que está en el fuego
  lexicon: HALOT
  rationale: El hebreo repite la preposición «sobre» para la leña y el fuego. «Leña» comunica de forma natural el material del altar, y se conserva la relación espacial acumulativa del original sin suavizarla en exceso.
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - una ofrenda quemada
  - una ofrenda de ascenso
  lexicon: HALOT
  rationale: En español bíblico, «holocausto» es el término tradicional y preciso para עֹלָה. Aunque el valor etimológico apunta a lo que «sube», el sentido cultual establecido en Levítico se expresa mejor con este vocablo.
- source_word: אִשֵּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda por fuego
  - una ofrenda de fuego
  lexicon: HALOT
  rationale: El término designa una ofrenda hecha por fuego. «Ofrenda encendida» conserva el vínculo con el acto de quemar y evita imponer una equivalencia más interpretativa como «ofrenda de comida».
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: aroma agradable
  alternatives_spanish:
  - aroma apacible
  - aroma de aceptación
  lexicon: HALOT
  rationale: La expresión fija comunica que la ofrenda es aceptable y grata. «Aroma agradable» mantiene el valor metafórico sin volverlo demasiado técnico ni arcaico.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino «Yahvé» según el criterio del proyecto, y la preposición ל se expresa naturalmente como relación de destino o referencia: «para Yahvé».'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. Siguiendo el criterio del proyecto, se evita enmascararlo con «SEÑOR» y se traduce con el nombre propio reverente «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula sacrificial רֵיחַ נִיחֹחַ
  english_pob_reading: a pleasing aroma
  chosen_spanish_reading: aroma agradable
  alternative_spanish_readings:
  - aroma apacible
  - aroma dulce
  rationale: La frase expresa aceptación cultual de la ofrenda. «Aroma agradable» conserva la metáfora sensorial sin añadir categorías teológicas ajenas al versículo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern Spanish, not archaic or over-theological'
- issue: אִשֵּׁה en contexto sacrificial
  english_pob_reading: a food offering
  chosen_spanish_reading: una ofrenda encendida
  alternative_spanish_readings:
  - una ofrenda por fuego
  - una ofrenda de fuego
  rationale: El término hebreo remite a una ofrenda hecha mediante fuego. En español, «ofrenda encendida» mantiene el nexo con el fuego del altar y evita reducir el sentido a «comida», que sería opaco en este contexto.
  doctrine_reference: 'DOCTRINE.md: preserve cultic distinctions where the source does not support flattening'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés. Se mantuvieron las dos acciones distintas del verso: abrir/partir el ave y no dividirla por completo; además, se conservó la secuencia cultual de altar, leña y fuego. No hubo revisiones aplicadas en la fuente inglesa, y el draft español refleja ese estado estable.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se mantiene «holocausto» para עֹלָה como término cultual establecido en español.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Ofrenda encendida» traduce el valor sacrificial de אִשֵּׁה sin diluirlo en un término genérico.
