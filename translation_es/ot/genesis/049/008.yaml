review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: mantiene el juego de bendición sobre Judá, conserva literalmente ''tu mano'' y traduce correctamente la imagen de dominio sobre la nuca de los enemigos. También distingue bien el homenaje humano de la adoración. Sin embargo, una nota al pie se desplazó semánticamente: la nota inglesa b ofrece una alternativa para ''the sons of your father'' (''your father’s sons''), pero la nota española b actualmente ofrece una alternativa para el verbo de homenaje (''se postrarán ante ti''), lo cual no corresponde al expediente auditado.'
  spanish_quality_summary: El español es claro, natural y digno. 'Judá', 'te alabarán', 'sobre la nuca de tus enemigos' y 'se inclinarán ante ti' son formulaciones idiomáticas y fieles. La única reparación necesaria es corregir la nota b para que anote la frase correcta y no introduzca una alternativa distinta a la documentada.
  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. 'Judá' para יְהוּדָה es estándar; no aparece el nombre divino. La elección 'se inclinarán ante ti' evita impropiamente 'adorarán' y concuerda con la decisión teológica documentada sobre יִשְׁתַּחֲווּ.
  issues:
  - severity: medium
    issue: La nota al pie b no corresponde a la alternativa documentada en el English POB.
    rationale: La evidencia auditada marca como alternativa de b 'your father’s sons will bow down to you', es decir, una variante de formulación para בְּנֵי אָבִיךָ, no una variante léxica de יִשְׁתַּחֲווּ. La nota española actual ('se postrarán ante ti') cambia el foco de la nota y no preserva la trazabilidad del expediente.
  revised_spanish_text: Judá[a], tus hermanos te alabarán; tu mano estará sobre la nuca de tus enemigos; los hijos de tu padre se inclinarán ante ti[b].
  revised_footnotes:
  - marker: a
    text: O “te darán gracias”. El verbo hebreo puede expresar dar gracias, confesar o alabar; aquí “alabarán” encaja mejor con la bendición y con el juego de palabras con el nombre de Judá.
    reason: lexical_alternative
  - marker: b
    text: O “los hijos de tu padre se inclinarán ante ti”.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal tal como está porque es fiel y natural. Solo se corrige la nota b para alinearla con la alternativa documentada en el expediente inglés: una formulación alternativa de ''los hijos de tu padre'', no una sustitución de ''se inclinarán'' por ''se postrarán''.'
