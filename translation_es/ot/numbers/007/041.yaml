translation:
  language: es
  text: 'y para el sacrificio de las ofrendas de paz: dos cabezas de ganado[a], cinco carneros, cinco machos cabríos y cinco corderos machos de un año. Esta fue la ofrenda de Shelumiel hijo de Zurisaddai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo בָּקָר es un término amplio para ganado vacuno; algunas traducciones lo vierten 'bueyes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  english_pob_choice: and for the sacrifice of
  chosen_spanish: y para el sacrificio de
  alternatives_spanish:
  - y para una ofrenda de
  - y como sacrificio de
  lexicon: HALOT
  rationale: El prefijo conjuntivo y la preposición introducen el siguiente elemento de la lista; en español, 'y para el sacrificio de' mantiene la función distributiva sin volver rígida la sintaxis.
- source_word: הַשְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: las ofrendas de paz
  alternatives_spanish:
  - las ofrendas de comunión
  - las ofrendas de bienestar
  lexicon: HALOT
  rationale: '''שְׁלָמִים'' es el término sacrificial técnico. ''Ofrendas de paz'' conserva la forma tradicional y sigue siendo comprensible en español; ''paz'' aquí no se reduce a ausencia de conflicto, sino al sentido cultual del término.'
- source_word: בָּקָר שְׁנַיִם
  english_pob_choice: two cattle
  chosen_spanish: dos cabezas de ganado
  alternatives_spanish:
  - dos reses
  - dos bueyes
  lexicon: HALOT
  rationale: בָּקָר es un término colectivo amplio para ganado vacuno. 'Cabezas de ganado' evita restringirlo a 'bueyes' y refleja mejor la amplitud léxica que el inglés POB preservó con 'cattle'.
- source_word: אֵילִם חֲמִשָּׁה
  english_pob_choice: five rams
  chosen_spanish: cinco carneros
  alternatives_spanish:
  - cinco rams
  - cinco machos ovinos
  lexicon: HALOT
  rationale: אֵילִים denota carneros en contexto sacrificial; 'carneros' es el equivalente natural y fiel en español.
- source_word: עַתֻּדִים חֲמִשָּׁה
  english_pob_choice: five male goats
  chosen_spanish: cinco machos cabríos
  alternatives_spanish:
  - cinco cabras machos
  - cinco chivos
  lexicon: HALOT
  rationale: עַתּוּדִים designa machos cabríos; se preserva el rasgo sexual explícito que el inglés POB también mantuvo.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  english_pob_choice: five male lambs a year old
  chosen_spanish: cinco corderos machos de un año
  alternatives_spanish:
  - cinco corderos de un año
  - cinco corderos machos de su primer año
  lexicon: HALOT
  rationale: La expresión hebrea indica animales del primer año; 'de un año' es claro y natural en español, y 'corderos machos' mantiene la especificación de sexo del texto fuente.
- source_word: זֶה קָרְבַּן
  english_pob_choice: This was the offering of
  chosen_spanish: Esta fue la ofrenda de
  alternatives_spanish:
  - Ésta fue la ofrenda de
  - Este fue el ofrenda de
  lexicon: HALOT
  rationale: La fórmula narrativa pide pasado; 'ofrenda' traduce correctamente קָרְבָּן. Se usa femenino por concordancia con 'ofrenda'.
- source_word: שְׁלֻמִיאֵל
  english_pob_choice: Shelumiel
  chosen_spanish: Shelumiel
  alternatives_spanish:
  - Selumiel
  lexicon: standard transliteration
  rationale: Se conserva la transliteración del nombre propio, que coincide con el uso estable en la tradición editorial inglesa del POB.
- source_word: בֶּן צוּרִישַׁדָּי
  english_pob_choice: son of Zurishaddai
  chosen_spanish: hijo de Zurisadai
  alternatives_spanish:
  - hijo de Zurisaddai
  - hijo de Zurisaday
  lexicon: standard transliteration
  rationale: Se mantiene la relación genealógica 'hijo de'. El nombre propio se translitera en una forma española legible y cercana al hebreo.
translation_notes:
  revision_awareness: El inglés POB opta por 'two cattle' para no estrechar בָּקָר a 'oxen'. En español se preserva esa amplitud con 'dos cabezas de ganado', evitando una lectura más específica de la que autoriza el hebreo.
  spanish_consistency_notes:
  - Se conserva el lenguaje sacrificial técnico de la serie de ofrendas en Números 7.
  - '''Ofrendas de paz'' se mantiene por coherencia con el término cultual שְׁלָמִים.'
  - Los nombres propios se transliteran de manera consistente y natural para el lector hispanohablante.
  - No se usa 'SEÑOR' ni vocabulario eclesiástico que no corresponda al hebreo de este versículo.
