source:
  edition: SBLGNT
  text: δικαιοσύνη δὲ θεοῦ διὰ πίστεως Ἰησοῦ Χριστοῦ, εἰς ⸀πάντας τοὺς πιστεύοντας, οὐ γάρ ἐστιν διαστολή.
base_translation:
  language: en
  yaml_path: translation/nt/romans/003/022.yaml
  text: And the righteousness of God through faith in Jesus Messiah[a], for all who believe[b]; for there is no distinction.
  footnotes:
  - marker: a
    text: Or "the justice of God."
    reason: lexical_alternative
  - marker: b
    text: Or "through the faithfulness of Jesus Messiah."
    reason: alternative_reading
translation:
  language: ko
  text: 곧 예수 메시아의 믿음[a]을 통하여 믿는 모든 자에게 미치는 하나님의 의입니다. 이는 차별이 없기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 πίστις Ἰησοῦ Χριστοῦ는 (1) 객관적 속격 「예수 메시아에 대한 믿음」, (2) 주관적 속격 「예수 메시아의 신실하심」 양 방향으로 읽힐 수 있는 신약 신학의 유명한 난문이다. 한국어 「의」 속격이 두 함의를 모두 열어 두므로 직역하여 모호성을 보존한다.
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ πίστεως Ἰησοῦ Χριστοῦ
  english_pob_choice: through faith in Jesus Messiah
  chosen_korean: 예수 메시아의 믿음을 통하여
  alternatives_korean:
  - 예수 메시아에 대한 믿음을 통하여
  - 예수 메시아의 신실하심을 통하여
  lexicon: BDAG
  rationale: 객관적·주관적 속격의 모호성을 보존하기 위해 한국어 「의」 속격을 사용한다. 영어 POB의 「faith in」은 객관적 속격을 택했으나, 본 한국어 번역은 더 모호성을 살린 직역을 채택한다.
theological_decisions:
- issue: 3:22 πίστις Ἰησοῦ Χριστοῦ — 객관적/주관적 속격
  chosen_reading: 예수 메시아의 믿음
  alternative_readings:
  - 예수 메시아에 대한 믿음
  - 예수 메시아의 신실하심
  rationale: 이 표현은 신약 신학의 가장 활발한 논쟁점 중 하나이다. 영어 POB는 「faith in」으로 객관적 속격을 택했으나, 한국어 「의」 속격은 두 함의를 모두 보존할 수 있다. 북성 원칙(원저자가 청중이 이해하기 원했던 것 보존, 강한 의미 보존)에 따라 모호성 자체를 본문에 두고 해석 옵션을 각주에 명시한다.
  doctrine_reference: DOCTRINE.md §1+§5 — preserve ambiguity where author left it; document interpretive options
