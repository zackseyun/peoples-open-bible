translation:
  language: es
  text: Por tanto, vienen días, declara Yahvé, cuando le enviaré[a] a los que vierten; y lo verterán[b], vaciarán sus vasijas y romperán sus tinajas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hacia él’ o ‘sobre él’. El hebreo expresa dirección hacia Moab; el contexto de juicio permite un matiz hostil, pero el texto principal conserva la forma más literal.
    reason: alternative_reading
  - marker: b
    text: O ‘lo harán errar’. El verbo hebreo puede entenderse de otra manera, pero la imagen de vino, vasijas y tinajas favorece ‘lo verterán’.
    reason: alternative_reading
  - marker: c
    text: Hebreo ‘sus tinajas’. Algunos intérpretes esperarían una referencia singular a Moab por el sentido; el texto recibido conserva el pronombre plural.
    reason: textual_variant
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conserva el valor inferencial del hebreo y mantiene un registro profético y formal sin sonar mecánico.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - en verdad
  lexicon: HALOT
  rationale: Expresa el marcador de atención profético con un giro natural en español bíblico-readable, sin perder la solemnidad.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - vienen los días
  lexicon: HALOT
  rationale: Mantiene la fórmula profética de futuro inminente; la inversión en español suena más natural que un calco literal.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Sigue el criterio del proyecto para el nombre divino y conserva la fórmula profética de proclamación con un verbo solemne y actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se aplica el equivalente base del proyecto para el Tetragrámaton, no la sustitución por ‘SEÑOR’.
- source_word: וְשִׁלַּחְתִּי ל֥וֹ
  english_pob_choice: I will send to him
  chosen_spanish: enviaré contra él
  alternatives_spanish:
  - enviaré a él
  - le enviaré
  lexicon: HALOT
  rationale: El hebreo usa dirección hacia él, pero el contexto es claramente hostil; ‘contra él’ preserva la dirección y explicita el matiz adversativo autorizado por el contexto.
- source_word: צֹעִים
  english_pob_choice: pourers
  chosen_spanish: a los que vierten
  alternatives_spanish:
  - a los vertedores
  - a los decantadores
  lexicon: HALOT
  rationale: El término es raro y la imagen del contexto es la de verter/decantar vino; se evita un tecnicismo poco natural pero se conserva la metáfora de la acción de verter.
- source_word: וְצֵעֻהוּ
  english_pob_choice: they will pour him out
  chosen_spanish: lo verterán
  alternatives_spanish:
  - lo derramarán
  - lo decantarán
  lexicon: HALOT
  rationale: La lectura favorecida por el contexto es de verter o decantar, no ‘hacerlo errar’. En español ‘verter’ mantiene el campo semántico del líquido y la escena de Moab como vino.
- source_word: וְכֵלָיו יָרִיקוּ
  english_pob_choice: they will empty his vessels
  chosen_spanish: vaciarán sus vasijas
  alternatives_spanish:
  - vaciarán sus recipientes
  - desocuparán sus vasos
  lexicon: HALOT
  rationale: ריק significa vaciar; ‘vasijas’ comunica bien la imagen de recipientes de vino y evita una calca demasiado abstracta.
- source_word: וְנִבְלֵיהֶם יְנַפֵּצוּ
  english_pob_choice: and shatter their jars
  chosen_spanish: y romperán sus tinajas
  alternatives_spanish:
  - y quebrarán sus cántaros
  - y harán pedazos sus jarros
  lexicon: HALOT
  rationale: נבל puede referirse a recipiente de cuero o a jarra/tinaja según el contexto; aquí el paralelo con vasijas favorece un recipiente rígido. ‘Tinajas’ da un español claro y digno. Se conserva el plural del sufijo del texto recibido (‘sus’), sin armonizarlo interpretativamente.
theological_decisions:
- issue: Nombre divino יְהוָה en la fórmula profética
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - dice Yahvé
  - oráculo de Yahvé
  rationale: Se mantiene el nombre propio divino según la convención del proyecto y la fórmula profética de anuncio judicial sin ocultarlo tras un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Este borrador sigue la revisión más reciente del audit trail al mantener el registro formal, la secuencia profética, la imaginería de recipientes y el término ‘Yahvé’. También refleja la preferencia revisada por ‘shatter’ mediante ‘romperán’, que en español conserva un tono sobrio y equivalente.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה, conforme al estándar del proyecto.
  - Se prefiere ‘verter’/‘vaciar’/‘romper’ para sostener la metáfora del vino y los recipientes.
  - Se conserva la lectura recibida del pronombre plural en ‘sus tinajas’, anotando la tensión textual sin armonización.
  - El estilo evita el sustituto eclesiástico ‘SEÑOR’ y evita un calco excesivo de la sintaxis inglesa.
