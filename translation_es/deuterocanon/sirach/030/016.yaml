translation:
  language: es
  text: No hay riqueza mayor que un cuerpo sano[a], ni hay bien mayor que un corazón alegre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es idiomático y comprimido; el paralelo griego explicita «salud del cuerpo».
    reason: lexical_alternative
  - marker: b
    text: 'Alternativamente: «un corazón gozoso» o «alegría del corazón». El hebreo dice literalmente «bondad de corazón», y el griego lee «gozo del corazón».'
    reason: alternative_reading
lexical_decisions:
- source_word: אין עושר על עושר / πλοῦτος βελτίων
  english_pob_choice: There is no wealth greater than
  chosen_spanish: No hay riqueza mayor que
  alternatives_spanish:
  - No hay riqueza superior a
  - Ninguna riqueza es mayor que
  lexicon: HALOT; LXX parallel βελτίων
  rationale: La construcción comparativa hebrea y el griego βελτίων expresan superioridad. En español, «No hay riqueza mayor que» conserva el paralelismo y suena natural sin perder la comparación.
- source_word: שַׂר עֶצֶם / ὑγείας σώματος
  english_pob_choice: a sound body
  chosen_spanish: un cuerpo sano
  alternatives_spanish:
  - salud del cuerpo
  - salud corporal
  - un cuerpo sano
  lexicon: HALOT; LXX ὑγείας σώματος
  rationale: El hebreo es idiomático y el griego aclara que se trata de salud corporal. «Un cuerpo sano» transmite esa idea con naturalidad en español y evita una traducción literal oscura.
- source_word: אין טובה על טוב לבב / εὐφροσύνη ... χαρὰν καρδίας
  english_pob_choice: there is no good greater than a glad heart
  chosen_spanish: ni hay bien mayor que un corazón alegre
  alternatives_spanish:
  - ni hay bien mayor que la alegría del corazón
  - ni hay bien mayor que la bondad de corazón
  - ni hay bien mayor que un corazón gozoso
  lexicon: HALOT; Greek χαρὰν καρδίας
  rationale: El hebreo literalmente dice «bondad de corazón», mientras que el griego orienta hacia «gozo del corazón». «Corazón alegre» comunica bien el sentido afectivo sin borrar la antropología bíblica del «corazón».
translation_notes:
  revision_awareness: La redacción sigue la estructura comparativa repetida que el POB inglés revisó para decir «greater than» en ambos miembros, y refleja la aclaración del hebreo por medio del paralelo griego en «cuerpo sano» y «corazón alegre».
  spanish_consistency_notes:
  - Se mantuvo «corazón» para preservar el lenguaje antropológico bíblico.
  - Se evitó «SEÑOR» u otras convenciones no pertinentes, ya que el versículo no contiene el nombre divino.
  - «Bien» se usa para טובה, en línea con el valor general de la palabra y con la comparación del paralelismo.
  - La puntuación reproduce el paralelismo de dos hemistiquios con coma coordinante.
