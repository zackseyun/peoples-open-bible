translation:
  language: es
  text: Entonces Moisés, Eleazar el sacerdote y todos los jefes[a] de la congregación salieron a su encuentro fuera del campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «líderes de la congregación» o «príncipes de la asamblea» para «jefes de la congregación».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - salieron afuera
  lexicon: HALOT
  rationale: El verbo יצא expresa movimiento hacia afuera. En español, «salieron» conserva el sentido direccional de manera natural y sin redundancia.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés, el líder de Israel
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español; no requiere ampliación.
- source_word: אֶלְעָזָר הַכֹּהֵן
  english_pob_choice: Eleazar the priest
  chosen_spanish: Eleazar el sacerdote
  alternatives_spanish:
  - Eleazar, el sacerdote
  lexicon: HALOT
  rationale: El título sacerdotal se mantiene como aposición directa. En español, «el sacerdote» es una forma fluida y fiel al hebreo sin necesidad de coma.
- source_word: כָל נְשִׂיאֵי הָעֵדָה
  english_pob_choice: all the leaders of the congregation
  chosen_spanish: todos los jefes de la congregación
  alternatives_spanish:
  - todos los líderes de la congregación
  - todos los príncipes de la congregación
  lexicon: HALOT
  rationale: נְשִׂיאִים puede referirse a jefes o jefes de tribu/comunidad; «jefes» conserva la fuerza de autoridad sin el matiz monárquico de «príncipes». «Congregación» refleja הָעֵדָה como la comunidad del pacto, siguiendo la línea del POB inglés.
- source_word: לִקְרָאתָם
  english_pob_choice: to meet them
  chosen_spanish: a recibirlos
  alternatives_spanish:
  - a encontrarse con ellos
  - a salir a su encuentro
  lexicon: HALOT
  rationale: El infinitivo de לקרא con sufijo expresa el propósito de ir al encuentro. «A recibirlos» comunica naturalmente ese propósito en español y encaja bien con la escena pública de bienvenida; «salir a su encuentro» sería una alternativa igualmente válida pero más literal.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - fuera del recinto del campamento
  - afuera del campamento
  lexicon: HALOT
  rationale: La expresión idiomática se vierte con el español natural «fuera del campamento», que conserva el sentido locativo sin calco rígido.
theological_decisions:
- issue: Título comunitario para נְשִׂיאֵי הָעֵדָה
  english_pob_reading: leaders of the congregation
  chosen_spanish_reading: jefes de la congregación
  alternative_spanish_readings:
  - líderes de la congregación
  - príncipes de la congregación
  rationale: No se adopta «príncipes» porque en español moderno introduce una resonancia nobiliaria que no es necesaria para el contexto. «Jefes» mantiene el peso de autoridad comunitaria y evita suavizar el término.
  doctrine_reference: Números 31:13; uso contextual de נְשִׂיאִים en el Pentateuco
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no se registran cambios pendientes y el cruce de control indica alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Moisés» y «Eleazar el sacerdote» como nombres y título estándar en español bíblico.
  - «Congregación» conserva la terminología del POB para הָעֵדָה, en lugar de sustituirla por términos eclesiásticos más estrechos.
  - No se añade puntuación innecesaria que altere la relación apositiva entre Eleazar y su título.
