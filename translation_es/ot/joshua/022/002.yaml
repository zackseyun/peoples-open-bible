translation:
  language: es
  text: 'Y él les dijo[a]: «Ustedes han guardado todo lo que Moisés, siervo de Yahvé, les mandó, y han escuchado mi voz en todo lo que yo les mandé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y han obedecido mi voz en todo lo que yo les mandé». El hebreo «escuchar mi voz» suele implicar respuesta obediente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él les dijo
  alternatives_spanish:
  - Entonces les dijo
  - Y dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Y él les dijo» conserva la progresión sin sonar forzado.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos les
  lexicon: HALOT
  rationale: El dativo clítico español expresa naturalmente el destinatario de la palabra.
- source_word: שְׁמַרְתֶּם
  english_pob_choice: you have kept
  chosen_spanish: han guardado
  alternatives_spanish:
  - han observado
  - han cumplido
  lexicon: HALOT
  rationale: «Guardar» conserva el sentido de atender fielmente un mandato o pacto, cercano al inglés «kept» y más natural que un calco como «observado» en este contexto.
- source_word: כָּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todo aquello que
  lexicon: HALOT
  rationale: La construcción hebrea abarca de manera total; «todo lo que» reproduce esa amplitud de forma clara en español.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio mandamiento
  lexicon: HALOT
  rationale: «Mandó» mantiene el valor de mandato con un español más natural; evita un tono excesivamente administrativo de «ordenó».
- source_word: מֹשֶׁה עֶבֶד יְהוָה
  english_pob_choice: Moses the servant of Yahweh
  chosen_spanish: Moisés, siervo de Yahvé
  alternatives_spanish:
  - Moisés, servidor de Yahvé
  - Moisés, esclavo de Yahvé
  lexicon: HALOT
  rationale: Aquí עֶבֶד funciona como título honorífico establecido para Moisés; «siervo» refleja bien la relación de servicio comisionado, mientras que «esclavo» sería demasiado fuerte para este pasaje.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton según la norma del proyecto, en vez de sustituirlo por un título.
- source_word: וַתִּשְׁמְעוּ
  english_pob_choice: and you have listened
  chosen_spanish: han escuchado
  alternatives_spanish:
  - han oído
  - han obedecido
  lexicon: HALOT
  rationale: «Escuchar» conserva la imagen auditiva del hebreo; en este contexto también implica respuesta obediente sin perder esa metáfora.
- source_word: בְקוֹלִי
  english_pob_choice: to my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - a mi voz
  - lo que dije
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en/por mi voz»; en español, «mi voz» es la expresión más natural y mantiene la imagen sin añadir calco innecesario.
- source_word: לְכֹל אֲשֶׁר
  english_pob_choice: in all that
  chosen_spanish: en todo lo que
  alternatives_spanish:
  - respecto de todo lo que
  - según todo lo que
  lexicon: HALOT
  rationale: La preposición española «en» reproduce adecuadamente el marco comprensivo del hebreo y enlaza con la cláusula anterior.
- source_word: צִוִּיתִי
  english_pob_choice: I commanded
  chosen_spanish: les mandé
  alternatives_spanish:
  - les ordené
  - yo mandé
  lexicon: HALOT
  rationale: Se mantiene la misma raíz semántica que en la primera mitad del versículo para conservar la cohesión verbal del mandato.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente; el proyecto pide transliterarlo como Yahvé, preservando el nombre personal del Dios del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de עֶבֶד aplicado a Moisés
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - servidor
  - esclavo
  rationale: Aunque la palabra puede significar «esclavo», aquí funciona como título honorífico en la expresión fija «siervo de Yahvé». En español, «siervo» comunica mejor esa relación de servicio comisionado sin introducir una dureza que el contexto no enfatiza.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος servant / slave (context-dependent); aplicado por analogía a עֶבֶד por contexto'
- issue: Sentido de שׁמע con בְקוֹלִי
  english_pob_reading: you have listened to my voice
  chosen_spanish_reading: han escuchado mi voz
  alternative_spanish_readings:
  - han obedecido mi voz
  - han atendido a mi voz
  rationale: El hebreo conserva la metáfora auditiva, pero en contexto implica respuesta obediente. La traducción elegida mantiene ambas dimensiones sin borrar la tensión entre oír y obedecer.
  doctrine_reference: Hebrew idiom policy for שׁמע + voice in covenantal contexts
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: alta concordancia con el hebreo, sin revisiones aplicadas en el texto fuente. La redacción española conserva la misma estructura de dos cláusulas paralelas, el nombre divino Yahvé, y la ambigüedad controlada de «escuchar mi voz» frente a «obedecer mi voz».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en coherencia con el criterio del proyecto.
  - Se usa «siervo» para עֶבֶד en esta fórmula fija, no «esclavo», por el carácter honorífico del título.
  - Se conserva la imagen de «mi voz» en lugar de reemplazarla por una paráfrasis interpretativa.
  - La puntuación española se ajusta con comillas angulares y coma vocativa implícita para una lectura publicable.
