translation:
  language: es
  text: y a Jonás, que se consumía en el vientre del monstruo marino[a], lo sacaste[b] ileso[c] delante de todos los suyos, Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gran pez». El griego κῆτος designa una gran criatura del mar; «ballena» es posible en la tradición, pero resulta más específica de lo que exige el griego.
    reason: lexical_alternative
  - marker: b
    text: El griego literalmente sugiere «mostrar» o «hacer salir a la luz»; aquí el sentido es de liberación pública, por eso se traduce «sacaste».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «sin señal» o «sin marca»; el sentido es que Jonás fue sacado sin daño.
    reason: lexical_alternative
lexical_decisions:
- source_word: βυθοτρεφοῦς
  english_pob_choice: sea-fed
  chosen_spanish: del monstruo del mar
  alternatives_spanish:
  - alimentado por el mar
  - nutrido por las profundidades
  - de las profundidades
  lexicon: LSJ
  rationale: El compuesto alude a algo nutrido por el abismo o el mar. En español, «del monstruo del mar» mantiene el referente marino sin forzar un calco poco natural; además armoniza con κῆτος y conserva el tono narrativo-tradicional del pasaje.
- source_word: κήτους
  english_pob_choice: monster
  chosen_spanish: monstruo
  alternatives_spanish:
  - monstruo marino
  - gran pez
  - ballena
  lexicon: LSJ
  rationale: κῆτος designa una gran criatura marina, no necesariamente un pez. «Monstruo» preserva la amplitud y fuerza del término; el añadido «del mar» en la frase completa evita ambigüedad y mantiene la imagen original.
- source_word: ἐν γαστρὶ κήτους
  english_pob_choice: in the belly of the ... monster
  chosen_spanish: en el vientre del monstruo del mar
  alternatives_spanish:
  - en el vientre del monstruo
  - en el estómago del monstruo del mar
  lexicon: LSJ
  rationale: γαστήρ puede ser «vientre» o «estómago». «Vientre» es más idiomático y bíblico en español, y conserva la resonancia de la tradición de Jonás sin sobreinterpretarla.
- source_word: τηκόμενον
  english_pob_choice: wasting away
  chosen_spanish: que se consumía
  alternatives_spanish:
  - que se derretía
  - que languidecía
  - que se iba consumiendo
  lexicon: LSJ
  rationale: El participio expresa deterioro o consumición. «Se consumía» comunica ese proceso físico de manera natural y evita una imagen demasiado literal como «derretía».
- source_word: ἀφθόνῳ
  english_pob_choice: before all his own people
  chosen_spanish: delante de todos los suyos
  alternatives_spanish:
  - abundantemente
  - sin reserva
  - abiertamente
  lexicon: LSJ
  rationale: La revisión inglesa indica que ἀφθόνῳ no debe leerse como «en abundancia» aquí, sino con sentido de apertura o manifiestamente. Por eso en español se integra en «delante de todos los suyos», una formulación que hace explícita la manifestación pública sin introducir una cantidad inexistente.
- source_word: ἀσήμαντον
  english_pob_choice: unharmed
  chosen_spanish: ileso
  alternatives_spanish:
  - sin daño
  - sin lesión
  - intacto
  lexicon: LSJ
  rationale: El griego sugiere literalmente «sin marca» o «sin señal», es decir, sin daño. «Ileso» es claro, breve y fiel al resultado de la liberación.
- source_word: πᾶσιν οἰκείοις
  english_pob_choice: to all his own people
  chosen_spanish: delante de todos los suyos
  alternatives_spanish:
  - ante todos los de su casa
  - ante todos sus parientes
  - ante todos los suyos
  lexicon: LSJ
  rationale: οἰκεῖοι puede significar la familia, el círculo doméstico o los allegados. Dado el ajuste de la revisión inglesa, «delante de todos los suyos» mantiene la referencia relacional amplia y la dimensión pública de la manifestación.
- source_word: ἀναδείξας
  english_pob_choice: you brought forth
  chosen_spanish: lo sacaste
  alternatives_spanish:
  - lo mostraste
  - lo revelaste
  - lo presentaste
  lexicon: LSJ
  rationale: ἀναδείκνυμι puede significar mostrar, revelar o hacer salir a la luz. En este contexto de rescate, «lo sacaste» preserva el movimiento de liberación y resulta natural en español; el complemento posterior deja claro que fue una salida pública y visible.
- source_word: πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Oh Padre
  - Padre mío
  lexicon: LSJ
  rationale: Se conserva el vocativo directo a Dios con «Padre», sin añadir solemnizaciones ajenas al griego.
theological_decisions:
- issue: El rescate de Jonás y la manifestación pública del milagro
  english_pob_reading: Jonah was brought out unharmed before all his own people; the wording emphasizes deliverance made manifest, not merely survival.
  chosen_spanish_reading: Jonás es sacado ileso delante de todos los suyos; la frase destaca una liberación visible y comprobable.
  alternative_spanish_readings:
  - Jonás fue sacado ileso ante todos los suyos
  - Jonás fue sacado sin daño delante de todos los suyos
  rationale: La revisión del POB en inglés corrigió la lectura de ἀφθόνῳ hacia una manifestación pública. La versión española sigue esa decisión y evita convertir el adverbio en una idea de abundancia cuantitativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Terminología de κῆτος
  english_pob_reading: Retain 'monster' rather than harmonizing to 'great fish' or 'whale'.
  chosen_spanish_reading: «Monstruo del mar» conserva el peso de κῆτος sin reducirlo a un pez o a una ballena.
  alternative_spanish_readings:
  - gran pez
  - ballena
  - monstruo marino
  rationale: La tradición de Jonás no debe suavizar el léxico griego. «Monstruo del mar» mantiene la amplitud del término y la imaginería del relato.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión inglesa más reciente: ἀφθόνῳ no se refleja como abundancia cuantitativa sino como manifestación abierta/publica, y πᾶσιν οἰκείοις se entiende mejor como «delante de todos los suyos». También preservé la tensión léxica de κῆτος sin reducirla a «pez» o «ballena».'
  spanish_consistency_notes:
  - Usé «Yahvé» como forma estándar del nombre divino solo cuando el original lo requiera; aquí el vocativo es «Padre», por lo que no corresponde introducirlo.
  - Conservo «monstruo» para κῆτος por consistencia con el POB en inglés y con el matiz amplio de criatura marina.
  - Elegí «vientre» como equivalente bíblico natural de γαστήρ.
  - Mantuve un español sobrio y eclesial, sin copiar mecánicamente la sintaxis inglesa.
