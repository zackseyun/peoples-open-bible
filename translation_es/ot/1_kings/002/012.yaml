translation:
  language: es
  text: Y Salomón se sentó en el trono de David su padre[a], y su reino quedó firmemente establecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su reinado quedó muy seguro’ o ‘su realeza quedó firmemente establecida’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁב
  english_pob_choice: sat on
  chosen_spanish: se sentó en
  alternatives_spanish:
  - tomó asiento en
  - se sentó sobre
  lexicon: HALOT
  rationale: En un contexto de sucesión real junto con כִּסֵּא (‘trono’), el verbo expresa la toma/ocupación del asiento real. ‘Se sentó en’ comunica naturalmente la entronización sin añadir explicación interpretativa.
- source_word: כִּסֵּא
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento
  - silla
  lexicon: HALOT
  rationale: El contexto dinástico davídico exige el sentido real de ‘trono’, no el de un asiento común.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - de su padre
  - su antepasado
  lexicon: HALOT
  rationale: David es el padre literal inmediato de Salomón; el posesivo español ‘su padre’ reproduce el vínculo familiar directo del hebreo.
- source_word: וַתִּכֹּן
  english_pob_choice: was firmly established
  chosen_spanish: quedó firmemente establecido
  alternatives_spanish:
  - fue establecido
  - quedó establecido
  - se afirmó
  lexicon: HALOT
  rationale: La forma nifal expresa un estado resultante de establecimiento/afirmación. ‘Quedó firmemente establecido’ mantiene el matiz de estabilidad y la intensificación de מְאֹד sin sonar forzado.
- source_word: מַלְכֻתוֹ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su reinado
  - su realeza
  lexicon: HALOT
  rationale: מַלְכוּת puede referirse al reino, al reinado o a la realeza. Aquí la formulación más natural y amplia en español es ‘su reino’, que conserva el alcance institucional y territorial del término sin estrecharlo excesivamente.
- source_word: מְאֹד
  english_pob_choice: firmly
  chosen_spanish: firmemente
  alternatives_spanish:
  - mucho
  - grandemente
  - excesivamente
  lexicon: HALOT
  rationale: El adverbio intensifica el resultado del verbo. En español, ‘firmemente’ integra esa intensificación de manera idiomática, como hizo la POB inglesa con ‘firmly established’.
theological_decisions:
- issue: Lenguaje de sucesión davídica sin importación mesiánica
  english_pob_reading: Rendered the verse as a historical statement of Solomon's enthronement and the stabilization of his rule, without importing later messianic implications into the main text.
  chosen_spanish_reading: Se presenta como un dato histórico de la entronización de Salomón y la consolidación de su gobierno, sin introducir en el texto principal implicaciones mesiánicas posteriores.
  alternative_spanish_readings:
  - Una formulación más cargada teológicamente que enfatice la legitimidad dinástica en clave mesiánica
  - Una traducción que explique el trono davídico con lenguaje doctrinal explícito
  rationale: El versículo narra de forma directa la sucesión real. Aunque el trono de David tiene relevancia canónica amplia, el hebreo aquí no desarrolla explícitamente esa teología; por tanto, la redacción española permanece ceñida al sentido inmediato.
  doctrine_reference: 'Principio POB: no importar afirmaciones doctrinales que el texto no hace; preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'Concordante con el audit trail inglés y con revisión sin cambios: el inglés final mantiene ‘sat on the throne’ y ‘was firmly established’; la versión española conserva el paralelismo, la referencia davídica directa y la intensificación de מְאֹד sin añadir desarrollo interpretativo.'
  spanish_consistency_notes:
  - Se mantiene ‘Salomón’ como forma castellana estándar del nombre propio.
  - ‘Reino’ traduce מַלְכוּת de manera amplia y natural; no se estrecha a ‘reinado’ en el texto principal, aunque se preserva como alternativa en nota.
  - La nota[a] recoge la misma gama de alternativas léxicas que la POB inglesa, adaptada al español.
  - No se usa ‘SEÑOR’ ni ‘Cristo’, porque el versículo no contiene esos términos ni requiere sustituciones convencionales.
