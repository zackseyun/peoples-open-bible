    reason: alternative_reading
  - marker: b
    text: 'El hebreo אֱהִי también puede entenderse como «seré» o «que sea»: «Seré tus plagas, oh Muerte; seré tu destrucción, oh Sheol».'
    reason: alternative_reading
  - marker: c
    text: 'Traducción tradicional influida por la tradición griega: «¿Dónde está tu aguijón, oh Muerte? ¿Dónde está tu victoria/aguijón, oh Sheol?»; compárese 1 Corintios 15:55.'
    reason: cross_reference
