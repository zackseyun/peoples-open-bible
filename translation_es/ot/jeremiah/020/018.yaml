    reason: lexical_alternative
  - marker: b
    text: O «y mis días se consuman en vergüenza».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «calamidad» por «aflicción» para representar mejor עָמָל en un lamento personal y alinearlo con el expediente inglés. Se corrige la nota [a] para reflejar una alternativa pareada, no solo del primer sustantivo. Se alisa ligeramente la sintaxis final con «y que mis días terminen», manteniendo el sentido de consumación/fin de los días. La nota [b] se conserva con ajuste mínimo.
