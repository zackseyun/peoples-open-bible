translation:
  language: es
  text: y a luchar hasta someter los dolores del cuerpo, aunque sean extremos, y, por la nobleza y bondad de la razón, despreciar todo el dominio de las pasiones.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rechazar con desprecio toda la dominación de las pasiones». El verbo griego es literalmente vívido («escupir fuera») y puede entenderse como rechazo despectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλγηδόνας
  english_pob_choice: pains
  chosen_spanish: dolores
  alternatives_spanish:
  - sufrimientos
  - agonías
  lexicon: LSJ
  rationale: El término se refiere a dolores o aflicciones corporales. «Dolores» es natural en español y conserva el sentido físico del contexto.
- source_word: καθʼ ὑπερβολὴν οὔσας
  english_pob_choice: though they are extreme
  chosen_spanish: aunque sean extremos
  alternatives_spanish:
  - siendo excesivos
  - aunque sean excesivos
  lexicon: LSJ
  rationale: La frase intensifica los dolores del cuerpo. El giro concesivo en español mantiene la fuerza de la excepción sin volverse pesado.
- source_word: καταπαλαῖσαι
  english_pob_choice: to wrestle down
  chosen_spanish: dominar
  alternatives_spanish:
  - vencer
  - subyugar
  lexicon: LSJ
  rationale: El verbo evoca combate o lucha corporal. «Dominar» comunica la idea de someter en un registro natural; la imagen de lucha queda sugerida por el contexto completo.
- source_word: καλοκἀγαθίας
  english_pob_choice: nobility and goodness
  chosen_spanish: nobleza y bondad
  alternatives_spanish:
  - excelencia moral
  - virtud
  lexicon: LSJ
  rationale: El ideal compuesto καλὸς κἀγαθός reúne nobleza y bondad moral. La expansión evita reducirlo a un solo abstracto y preserva sus dos matices.
- source_word: λογισμοῦ
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el juicio racional
  - la mente
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός es la facultad racional que gobierna las pasiones. «La razón» es la forma más clara y fiel para el español.
- source_word: ἀποπτύσαι
  english_pob_choice: to spurn
  chosen_spanish: despreciar
  alternatives_spanish:
  - rechazar con desprecio
  - repudiar
  lexicon: LSJ
  rationale: El verbo es literalmente vívido, con la idea de «escupir fuera», y por extensión rechazar con desdén. «Despreciar» expresa bien el rechazo despectivo en español formal.
- source_word: πάσας τὰς τῶν παθῶν ἐπικρατείας
  english_pob_choice: all the dominion of the passions
  chosen_spanish: todo el dominio de las pasiones
  alternatives_spanish:
  - todo el señorío de las pasiones
  - toda la dominación de las pasiones
  lexicon: LSJ
  rationale: ἐπικρατεία expresa dominio, control o poder gobernante. «Dominio» preserva esa fuerza de mando sin sonar artificial en español.
theological_decisions:
- issue: λoγισμός como facultad rectora frente a las pasiones
  english_pob_reading: reason
  chosen_spanish_reading: la razón
  alternative_spanish_readings:
  - el juicio racional
  - la mente
  rationale: La obra presenta la razón devota como la facultad que se impone a las pasiones. «La razón» mantiene la tensión antropológica y filosófica del pasaje sin tecnicismo innecesario.
  doctrine_reference: Consistency of key terms, with source-based philosophical nuance.
- issue: ἀποπτύσαι como rechazo despectivo con imagen corporal
  english_pob_reading: to spurn
  chosen_spanish_reading: despreciar
  alternative_spanish_readings:
  - rechazar con desprecio
  - repudiar
  rationale: El griego conserva una metáfora corporal muy vívida. En español, «despreciar» transmite el valor actitudinal de rechazo con desdén sin perder la fuerza del gesto figurado.
  doctrine_reference: Lexical force preserved without flattening the figurative contempt.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la redacción inglesa auditada, pero ajusta el verbo principal para un español más natural: «dominar» resume καταπαλαῖσαι sin perder la idea de lucha, y «despreciar» conserva el valor figurado de ἀποπτύσαι que la revisión inglesa mantuvo como «spurn».'
  spanish_consistency_notes:
  - Se mantiene «la razón» para λογισμός, en línea con la terminología filosófica del libro.
  - Se traduce ἐπικρατείας con «dominio» para conservar la idea de poder gobernante.
  - Se evita «Cristo», «Señor» u otra terminología no pertinente al pasaje.
  - 'La puntuación conserva la estructura coordinada del griego: dos infinitivos unidos por καὶ.'
