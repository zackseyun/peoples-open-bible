translation:
  language: es
  text: Sepa el rey que los judíos[a] que subieron de ti a nosotros han llegado a Jerusalén. Están reconstruyendo la ciudad rebelde y perversa, terminando los muros y reparando los cimientos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «judeanos». El término arameo puede designar a la gente de Judá/Judea tanto como a los judíos en sentido más amplio.
    reason: lexical_alternative
  - marker: b
    text: O «poniendo/asentando los cimientos». La expresión aramea es algo difícil y puede referirse tanto a reparar cimientos existentes como a colocarlos o asentarlos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדִיעַ לֶהֱוֵא
  english_pob_choice: Let it be known
  chosen_spanish: Sea dado a conocer
  alternatives_spanish:
  - Hágase saber
  - Sea notorio
  lexicon: HALOT
  rationale: La fórmula aramea epistolar introduce formalmente una comunicación al rey. En español, «Sea dado a conocer» conserva el tono jurídico/oficial sin sonar arcaico de manera excesiva.
- source_word: לְמַלְכָּא
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - para el rey
  lexicon: HALOT
  rationale: El dativo del destinatario se expresa naturalmente con «al rey» en español; mantiene la dirección de la noticia al monarca.
- source_word: יְהוּדָיֵא
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: HALOT
  rationale: En este contexto de carta imperial, el término puede abarcar a los habitantes de Judá/Judea. «Los judíos» es la opción más natural y reconoce el valor étnico-amplio del término; la alternativa «judeanos» queda como posibilidad lexical.
- source_word: סְלִקוּ מִן לְוָתָךְ עֲלֶינָא
  english_pob_choice: came up from you to us
  chosen_spanish: subieron de tu parte a nosotros
  alternatives_spanish:
  - vinieron de tu parte a nosotros
  - subieron de ti hacia nosotros
  lexicon: HALOT
  rationale: El verbo de ascenso preserva el movimiento geográfico y la perspectiva del remitente. «De tu parte» refleja el origen administrativo/político del envío o procedencia, siguiendo la lógica del informe.
- source_word: אֲתוֹ לִירוּשְׁלֶם
  english_pob_choice: have come to Jerusalem
  chosen_spanish: han llegado a Jerusalén
  alternatives_spanish:
  - han venido a Jerusalén
  - llegaron a Jerusalén
  lexicon: HALOT
  rationale: El perfecto español transmite bien el estilo de reporte con relevancia presente. «Llegado» evita redundancia con el verbo anterior y mantiene el énfasis en el arribo efectivo.
- source_word: קִרְיְתָא מָרָדְתָּא וּבִאישְׁתָּא
  english_pob_choice: the rebellious and wicked city
  chosen_spanish: la ciudad rebelde y perversa
  alternatives_spanish:
  - la ciudad rebelde y mala
  - la ciudad rebelde y malvada
  lexicon: HALOT
  rationale: «Rebelde» conserva el matiz político de sublevación; «perversa» comunica el juicio moral de בִאישְׁתָּא con dignidad literaria en español. Se evita suavizarlo a «mala».
- source_word: בָּנַיִן
  english_pob_choice: They are rebuilding
  chosen_spanish: Están reconstruyendo
  alternatives_spanish:
  - Están edificando
  - Están volviendo a construir
  lexicon: HALOT
  rationale: El contexto implica restauración de una ciudad ya existente. «Reconstruyendo» hace explícito ese valor sin apartarse del sentido básico de edificación.
- source_word: וְשׁוּרַיָּא אֶשְׁכְּלָלוּ
  english_pob_choice: finishing the walls
  chosen_spanish: terminando los muros
  alternatives_spanish:
  - completando los muros
  - acabando los muros
  lexicon: HALOT
  rationale: El término plural se refiere a los muros/defensas de la ciudad. «Terminar» refleja la idea de completar o llevar a su fin la obra.
- source_word: וְאֻשַּׁיָּא יַחִיטוּ
  english_pob_choice: repairing the foundations
  chosen_spanish: reparando los cimientos
  alternatives_spanish:
  - arreglando los cimientos
  - poniendo los cimientos
  lexicon: HALOT
  rationale: La frase aramea es difícil y admite varias lecturas. En el contexto de restauración, «reparando» mantiene la posibilidad de trabajo sobre cimientos ya existentes, sin excluir del todo la idea de ajustarlos o asentarlos.
theological_decisions:
- issue: Valor étnico-político de יְהוּדָיֵא
  english_pob_reading: 'the Jews (with note: or ''the Judeans'')'
  chosen_spanish_reading: los judíos (con nota de posible valor como «judeanos»)
  alternative_spanish_readings:
  - los judeanos
  - la gente de Judá
  rationale: El término puede designar a los judíos como pueblo o a los habitantes de Judá/Judea en un sentido más geográfico-político. La traducción principal usa el exónimo más reconocible, pero la nota preserva la tensión lexical documentada.
  doctrine_reference: Identidad histórica de Israel/Judá en el exilio y período persa; no implica una cuestión doctrinal, sino de denominación histórica.
- issue: Sentido de וְאֻשַּׁיָּא יַחִיטוּ
  english_pob_reading: repairing the foundations (or laying/setting the foundations)
  chosen_spanish_reading: reparando los cimientos (con posible matiz de ponerlos o asentarlos)
  alternative_spanish_readings:
  - colocando los cimientos
  - asentando los cimientos
  rationale: La expresión es ambigua en arameo. En el contexto de Jerusalén ya existente, la lectura de reparación/restauración es la más probable; la nota mantiene abiertas las alternativas sin borrar la dificultad textual.
  doctrine_reference: No aplica doctrina; se trata de un problema léxico-textual de restauración urbana.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el estado revisado del audit trail inglés, que eliminó «that» antes de «rebellious and wicked city» por naturalidad. En español se omitió todo equivalente innecesario y se conservó el paralelismo del informe: llegada a Jerusalén, reconstrucción de la ciudad, terminación de los muros y trabajo en los cimientos.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se usó «los judíos» como forma principal por naturalidad en español, con nota que conserva la alternativa lexical «judeanos».
  - «Rebelde» y «perversa» preservan el juicio hostil del texto sin suavizarlo con lenguaje eclesiástico.
  - «Cimientos» comunica mejor la imagen arquitectónica que un calco más técnico, y la nota mantiene la ambigüedad del arameo.
