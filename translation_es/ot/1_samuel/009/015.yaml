translation:
  language: es
  text: Yahvé había revelado a Samuel un día antes de que Saúl llegara[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «había descubierto el oído de Samuel», un modismo que significa revelar o comunicar algo a alguien.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: Now Yahweh / Now the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé, entonces
  - Yahvé
  lexicon: HALOT
  rationale: El texto hebreo introduce la acción con waw consecutiva y el nombre divino YHWH. En español, «Yahvé» mantiene el nombre propio del pacto según la política del proyecto; no se usa una máscara como «SEÑOR».
- source_word: גָּלָה אֶת־אֹזֶן
  english_pob_choice: had revealed to Samuel
  chosen_spanish: había revelado a Samuel
  alternatives_spanish:
  - había abierto el oído de Samuel
  - había descubierto a Samuel
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática, literalmente «desnudó/descubrió el oído». El POB inglés optó por el sentido de «revelar» para evitar una calca dura. En español, «había revelado a Samuel» conserva el valor idiomático y la claridad, sin perder el acto de revelación.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  alternatives_spanish:
  - Samuél
  lexicon: Nombre propio estándar
  rationale: Nombre propio transliterado de forma estándar y reconocible en español bíblico.
- source_word: יוֹם אֶחָד
  english_pob_choice: one day
  chosen_spanish: un día
  alternatives_spanish:
  - un día antes
  - un día previo
  lexicon: HALOT
  rationale: La combinación con la frase siguiente indica anterioridad temporal. En español, «un día antes de que» reproduce el valor temporal completo de manera natural.
- source_word: לִפְנֵי בּוֹא
  english_pob_choice: before Saul came
  chosen_spanish: antes de que Saúl llegara
  alternatives_spanish:
  - antes de la llegada de Saúl
  - antes de que Saúl viniera
  lexicon: HALOT
  rationale: El infinitivo constructo con preposición se vierte como subordinada temporal fluida en español. «Llegara» expresa adecuadamente la llegada en pasado contextual.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saúl
  lexicon: Nombre propio estándar
  rationale: Nombre propio tradicional y claro en español.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - 'y dijo:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce el discurso directo. «Diciendo,» preserva la transición formal que aparece en el texto fuente y en la versión inglesa auditada.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El hebreo usa el Tetragramatón directamente. Siguiendo el estándar del proyecto en español, se mantiene el nombre propio «Yahvé» para no ocultar el nombre del pacto detrás de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Idiomatismo hebreo «desnudar el oído»
  english_pob_reading: had revealed to Samuel
  chosen_spanish_reading: había revelado a Samuel
  alternative_spanish_readings:
  - había descubierto el oído de Samuel
  - había abierto el oído de Samuel
  rationale: La tensión entre la imagen corporal hebrea y el sentido comunicativo queda resuelta en español por el verbo «revelar», tal como en el POB inglés. Se evita una literalidad que sonaría extraña sin aportar más precisión.
  doctrine_reference: Principio de transparencia idiomática del proyecto
translation_notes:
  revision_awareness: 'Ajusté la frase para que el marcador de nota [a] aparezca exactamente en el punto al que se refiere la nota, corrigiendo el problema de validación anterior. La redacción sigue el sentido revisado del POB inglés: no se mantiene una calca innecesaria de «oído» en el cuerpo principal, pero sí se documenta el modismo hebreo en nota.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma consistente para YHWH.
  - Se usa «Saúl» y «Samuel» con transliteración española habitual.
  - Se mantiene el registro narrativo bíblico con «había revelado» y «diciendo».
  - La subordinada temporal en imperfecto de subjuntivo («llegara») funciona bien tras «antes de que» en español.
