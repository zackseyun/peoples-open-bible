translation:
  language: es
  text: 'Lleven palabras con ustedes y vuelvan a Yahvé. Díganle: «Quita toda iniquidad[a] y recibe lo bueno, y pagaremos con los toros de nuestros labios[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perdona toda culpa»; el modismo hebreo literalmente habla de cargar, llevar o quitar la culpa.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los toros de nuestros labios», una metáfora de alabanza, confesión o votos ofrecidos en lugar de sacrificios animales. Algunos testigos antiguos e intérpretes entienden «el fruto de nuestros labios».
    reason: alternative_reading
lexical_decisions:
- source_word: קְחוּ
  english_pob_choice: Take
  chosen_spanish: Tomad
  alternatives_spanish:
  - Llevad
  - Tomad con vosotros
  lexicon: HALOT
  rationale: El imperativo plural de לקח se expresa naturalmente con «tomad». El complemento siguiente «con vosotros» mantiene la idea de llevar consigo las palabras al volver.
- source_word: עִמָּכֶם
  english_pob_choice: with you
  chosen_spanish: con vosotros
  alternatives_spanish:
  - con ustedes
  - junto con vosotros
  lexicon: HALOT
  rationale: La preposición עם con sufijo de 2mp indica compañía. «Con vosotros» preserva la relación inmediata con el imperativo y suena natural en registro bíblico moderado.
- source_word: דְּבָרִים
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - plegarias
  - confesiones
  lexicon: HALOT
  rationale: דְּבָרִים significa literalmente «palabras». Aunque el contexto es de arrepentimiento, la traducción conserva la formulación abierta del hebreo sin añadir contenido no explícito.
- source_word: וְשׁוּבוּ
  english_pob_choice: and return
  chosen_spanish: y volved
  alternatives_spanish:
  - y volved de nuevo
  - y regresad
  lexicon: HALOT
  rationale: שׁוב conserva el movimiento de retorno y el sentido de conversión/cambio de rumbo. «Volved» mantiene esa doble carga mejor que una paráfrasis más explicativa.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo nombra directamente a YHWH; por la norma del proyecto se traduce «Yahvé» y no se sustituye por una forma de ocultamiento litúrgico.
- source_word: אִמְרוּ אֵלָיו
  english_pob_choice: Say to him
  chosen_spanish: Decidle
  alternatives_spanish:
  - Habladle
  - Decidle a él
  lexicon: HALOT
  rationale: 'La forma imperativa con objeto indirecto se naturaliza en español con un clítico: «Decidle». Se mantiene la directividad del discurso sin redundancia.'
- source_word: כָּל תִּשָּׂא עָוֺן
  english_pob_choice: Take away all iniquity
  chosen_spanish: Quita toda iniquidad
  alternatives_spanish:
  - Perdona toda culpa
  - Lleva lejos toda iniquidad
  lexicon: HALOT
  rationale: נשא עון es un modismo de cargar/levantar/quitar la culpa. «Quita» conserva la imagen verbal de remover el pecado y es claro en español; «iniquidad» preserva el peso moral de עָוֺן.
- source_word: וְקַח טוֹב
  english_pob_choice: and receive what is good
  chosen_spanish: y recibe lo bueno
  alternatives_spanish:
  - y acepta lo bueno
  - y recibe el bien
  lexicon: HALOT
  rationale: El hebreo es elíptico y admite diversas lecturas. «Recibe lo bueno» sigue de cerca la elección auditada en inglés («receive what is good») sin obligar a especificar un objeto ausente del hebreo.
- source_word: וּנְשַׁלְּמָה
  english_pob_choice: and we will repay
  chosen_spanish: y nosotros pagaremos
  alternatives_spanish:
  - y nosotros rendiremos
  - y nosotros cumpliremos
  lexicon: HALOT
  rationale: שלם en piel expresa pagar o rendir lo debido. «Pagaremos» conserva el valor de restitución/voto y en español fluye mejor que una calca más técnica.
- source_word: פָרִים שְׂפָתֵינוּ
  english_pob_choice: the fruit of our lips
  chosen_spanish: el fruto de nuestros labios
  alternatives_spanish:
  - los toros de nuestros labios
  - el fruto que sale de nuestros labios
  lexicon: HALOT
  rationale: La revisión auditada del inglés ya optó por «the fruit of our lips» para reflejar el sentido idiomático. En español, «el fruto de nuestros labios» reproduce esa interpretación reconocida sin perder la metáfora cultual subyacente.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto según la directriz del proyecto y el testimonio del hebreo directo. No se sustituye por una convención de ocultamiento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lenguaje de arrepentimiento en שׁוּבוּ
  english_pob_reading: return
  chosen_spanish_reading: volved
  alternative_spanish_readings:
  - regresad
  - convertíos
  rationale: «Volved» conserva la metáfora de regreso y el sentido teológico de volver a Dios. «Convertíos» explicitaría el matiz, pero estrecharía la imagen verbal del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Modismo de נשא עון
  english_pob_reading: Take away all iniquity
  chosen_spanish_reading: Quita toda iniquidad
  alternative_spanish_readings:
  - Perdona toda culpa
  - Lleva lejos toda iniquidad
  rationale: El hebreo habla de cargar o quitar la culpa; la traducción mantiene esa imaginería en un español claro. «Perdona» es válido doctrinalmente, pero pierde la metáfora corporal del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Metáfora sacrificial de פָרִים שְׂפָתֵינוּ
  english_pob_reading: the fruit of our lips
  chosen_spanish_reading: el fruto de nuestros labios
  alternative_spanish_readings:
  - los toros de nuestros labios
  - el fruto de nuestros labios
  rationale: Se sigue la revisión final del inglés que priorizó la lectura idiomática tradicionalmente atestiguada. En español, esta opción es más natural y evita oscurecer el sentido sacrificial metafórico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés, que sustituyó «the bulls of our lips» por «the fruit of our lips» por ser más natural y reflejar la lectura idiomática del hebreo. La versión española adopta esa misma línea interpretativa, pero conserva en nota la alternativa literal y la metáfora sacrificial del MT.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יְהוָה, conforme a la norma del proyecto.
  - «Iniquidad» se conserva para עָוֺן por su peso moral, evitando suavizarlo a «culpa» en el texto principal.
  - «Volved» mantiene el vínculo entre retorno físico y arrepentimiento covenantal.
  - La frase final se formula como «el fruto de nuestros labios» para coincidir con la decisión revisada del audit trail en inglés.
