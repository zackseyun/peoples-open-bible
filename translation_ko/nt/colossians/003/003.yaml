  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀπεθάνετε γάρ, καὶ ἡ ζωὴ ὑμῶν κέκρυπται σὺν τῷ Χριστῷ ἐν τῷ θεῷ·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/003.yaml
  text: For you died, and your life has been hidden with the Messiah in God.
translation:
  language: ko
  text: 이는 여러분이 죽었고, 여러분의 생명이 메시아와 함께 하나님 안에 감추어져 있기 때문입니다.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἀπεθάνετε γάρ
  english_pob_choice: For you died
  chosen_korean: 이는 여러분이 죽었고
  alternatives_korean:
  - 왜냐하면 여러분이 죽었고
  - 여러분이 죽었기 때문이며
  lexicon: BDAG
  rationale: γάρ는 앞 명령의 근거. 「이는 ~ 때문입니다」 구조로 이어 옮긴다.
- source_word: ἡ ζωὴ ὑμῶν
  english_pob_choice: your life
  chosen_korean: 여러분의 생명
  alternatives_korean:
  - 여러분의 삶
  lexicon: BDAG
  rationale: ζωή는 한국 교회의 정립된 「생명」을 사용한다.
- source_word: κέκρυπται
  english_pob_choice: has been hidden
  chosen_korean: 감추어져 있기
  alternatives_korean:
  - 숨겨져 있기
  - 보존되어 있기
  lexicon: BDAG
  rationale: 완료 수동. 완결된 행위의 지속적 결과를 「감추어져 있기」로 옮긴다.
- source_word: σὺν τῷ Χριστῷ
  english_pob_choice: with the Messiah
  chosen_korean: 메시아와 함께
  alternatives_korean:
  - 그리스도와 함께
  lexicon: BDAG
  rationale: σύν의 연합·동반. Χριστός는 칭호 「메시아」.
- source_word: ἐν τῷ θεῷ
  english_pob_choice: in God
  chosen_korean: 하나님 안에
  alternatives_korean:
  - 하나님과 함께
  lexicon: BDAG
  rationale: 처소 ἐν을 보존하여 「하나님 안에」로 옮긴다.
