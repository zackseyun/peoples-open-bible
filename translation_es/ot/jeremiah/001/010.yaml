translation:
  language: es
  text: Mira[a], hoy te he nombrado sobre las naciones y sobre los reinos[c], para desarraigar[b] y para derribar, y para destruir y para arrasar, para edificar y para plantar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este día».
    reason: lexical_alternative
  - marker: b
    text: O «arrancar de raíz».
    reason: lexical_alternative
  - marker: c
    text: La frase «sobre las naciones y sobre los reinos» se refiere a la comisión profética de Jeremías respecto de ellos, no a un gobierno político directo.
    reason: cultural_note
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  - Mira, hoy
  lexicon: HALOT
  rationale: El imperativo de ראה funciona como llamada de atención. «Mira» es natural en español y conserva el tono directo sin caer en un arcaísmo solemne como «He aquí» o «Mira bien».
- source_word: הִפְקַדְתִּיךָ
  english_pob_choice: I have appointed you
  chosen_spanish: te he puesto
  alternatives_spanish:
  - te he nombrado
  - te he नियुक्तado
  - te he encargado
  lexicon: HALOT
  rationale: El verbo hiphil de פקד aquí expresa comisión/puesta en cargo. En español, «te he puesto sobre» reproduce bien la idea de asignación a una esfera de responsabilidad, y encaja con la preposición siguiente «sobre».
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - este día
  lexicon: HALOT
  rationale: La expresión es idiomática; «hoy» comunica la inmediatez de la comisión de forma natural y fiel.
- source_word: עַל הַגּוֹיִם וְעַל הַמַּמְלָכוֹת
  english_pob_choice: over the nations and over the kingdoms
  chosen_spanish: sobre las naciones y sobre los reinos
  alternatives_spanish:
  - acerca de las naciones y de los reinos
  - contra las naciones y contra los reinos
  lexicon: HALOT
  rationale: Con פקד, עַל señala ámbito de comisión o autoridad. «Sobre» mantiene ese valor sin convertir el texto en una lectura adversativa que el hebreo no exige.
- source_word: לִנְתוֹשׁ
  english_pob_choice: to uproot
  chosen_spanish: para desarraigar
  alternatives_spanish:
  - para arrancar de raíz
  - para desplantar
  lexicon: HALOT
  rationale: El verbo expresa la imagen agrícola de arrancar por las raíces. «Desarraigar» comunica bien la pérdida del arraigo y conserva el contraste con «plantar».
- source_word: לִנְתּוֹץ
  english_pob_choice: to tear down
  chosen_spanish: para derribar
  alternatives_spanish:
  - para demoler
  - para destruir
  lexicon: HALOT
  rationale: El verbo apunta a echar abajo o desmontar. «Derribar» es claro y distinto del siguiente par de verbos de ruina.
- source_word: וּלְהַאֲבִיד
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para hacer perecer
  - para arruinar
  lexicon: HALOT
  rationale: El hiphil de אבד es causativo; «destruir» expresa de manera directa el valor de propósito dentro de la serie de verbos de juicio.
- source_word: וְלַהֲרוֹס
  english_pob_choice: to overthrow
  chosen_spanish: para arrasar
  alternatives_spanish:
  - para derribar
  - para destruir
  lexicon: HALOT
  rationale: El verbo puede significar arrasar, derrumbar o abatir. «Arrasar» conserva la fuerza acumulativa del término y evita repetir exactamente «derribar».
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: para edificar
  alternatives_spanish:
  - para construir
  - para levantar
  lexicon: HALOT
  rationale: «Edificar» mantiene el paralelismo bíblico tradicional y es adecuado para la restauración simbólica del pasaje.
- source_word: וְלִנְטוֹעַ
  english_pob_choice: to plant
  chosen_spanish: para plantar
  alternatives_spanish:
  - para sembrar
  - para trasplantar
  lexicon: HALOT
  rationale: La imagen agrícola opuesta a «desarraigar» queda claramente preservada con «plantar».
theological_decisions:
- issue: Naturaleza de la autoridad de Jeremías sobre naciones y reinos
  english_pob_reading: The verse is rendered as a divine appointment giving Jeremiah prophetic authority with respect to nations and kingdoms, not as direct political rule.
  chosen_spanish_reading: La formulación «te he puesto sobre las naciones y sobre los reinos» se entiende como comisión profética respecto de ellos, no como gobierno político directo.
  alternative_spanish_readings:
  - te he puesto contra las naciones y contra los reinos
  - te he puesto acerca de las naciones y de los reinos
  rationale: La preposición hebrea עַל con פקד en este contexto de comisión indica esfera de encargo. La secuencia de infinitivos muestra que la autoridad se ejerce por palabra profética de juicio y restauración, no por dominio civil.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del texto inglés al mantener la lista de verbos con dos grupos de juicio y dos de restauración, y al reflejar el valor de עַל como comisión «sobre» naciones y reinos. Se ha evitado introducir una lectura adversativa que no exige el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda en otros versículos; aquí no aparece.
  - 'Se preserva el paralelismo verbal del hebreo con seis infinitivos de propósito en dos bloques: juicio y restauración.'
  - Se evita «SEÑOR» como sustituto del nombre divino, y no se introduce «Mesías» o terminología cristológica porque no aplica a este texto.
  - «Sobre» conserva el matiz de comisión/ámbito de autoridad sin sugerir soberanía política absoluta.
