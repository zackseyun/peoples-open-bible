    rationale: El hebreo usa una comparación fija de innumerabilidad. En español, una formulación como 'tan numeroso como la arena que está a la orilla del mar' o 'como la arena que está a la orilla del mar, por su abundancia' transmite mejor el sentido sin rigidez innecesaria.
  - severity: low
