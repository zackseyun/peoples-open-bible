translation:
  language: es
  text: Y acampó contra el santuario por muchos días, y allí colocó lanzadores de proyectiles, máquinas, lanzafuegos, lanzapiedras y escorpiones[a], para arrojar flechas y piedras de honda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escorpiones de guerra», un tipo de pequeño lanzaproyectiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - acampar
  - se instaló en campamento
  - levantó campamento
  lexicon: LSJ
  rationale: El verbo describe la acción militar de acampar; en español, «acampó» expresa con naturalidad esa postura hostil sin añadir la precisión interpretativa de «asedió», que iría más allá del verbo griego.
- source_word: ἐπὶ τὸ ἁγίασμα
  english_pob_choice: against the sanctuary
  chosen_spanish: frente al santuario
  alternatives_spanish:
  - contra el santuario
  - ante el santuario
  - junto al santuario
  lexicon: LSJ
  rationale: El contexto militar pide una relación hostil u orientada al blanco. «Frente al santuario» conserva la idea de posición táctica contra el lugar sagrado sin imponer una expansión más fuerte que el griego.
- source_word: ἡμέρας πολλάς
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - durante muchos días
  - muchos días
  lexicon: LSJ
  rationale: Es una forma temporal idiomática; «por muchos días» es natural en español y conserva la duración continua.
- source_word: ἔστησεν
  english_pob_choice: set up
  chosen_spanish: colocó
  alternatives_spanish:
  - puso
  - instaló
  - erigió
  lexicon: LSJ
  rationale: En una lista de máquinas de guerra, «colocó» comunica de manera clara y sobria la instalación de los aparatos, sin forzar un matiz técnico específico.
- source_word: βελοστασίσεις
  english_pob_choice: missile-launchers
  chosen_spanish: lanzadores de proyectiles
  alternatives_spanish:
  - lanzadores de flechas
  - máquinas de lanzamiento
  - artillería de proyectiles
  lexicon: LSJ
  rationale: El término apunta a dispositivos para lanzar βέλη; «lanzadores de proyectiles» mantiene la amplitud del griego y evita reducirlo solo a flechas, aunque el versículo luego menciona flechas explícitamente.
- source_word: μηχανὰς
  english_pob_choice: engines
  chosen_spanish: máquinas
  alternatives_spanish:
  - máquinas de guerra
  - ingenios
  - máquinas de sitio
  lexicon: LSJ
  rationale: «Máquinas» reproduce el término general y guarda la amplitud del griego. «Máquinas de guerra» sería más explícito, pero el contexto ya las define como artefactos militares.
- source_word: πυροβόλα
  english_pob_choice: fire-throwers
  chosen_spanish: lanzafuegos
  alternatives_spanish:
  - arrojafuegos
  - máquinas que lanzan fuego
  - dispositivos de fuego
  lexicon: LSJ
  rationale: El compuesto griego expresa cosas que arrojan fuego; «lanzafuegos» es breve, transparente y mantiene la imagen del verbo de lanzamiento.
- source_word: λιθοβόλα
  english_pob_choice: stone-throwers
  chosen_spanish: lanzapiedras
  alternatives_spanish:
  - arrojapiedras
  - máquinas lanzapiedras
  - catapultas
  lexicon: LSJ
  rationale: La forma literal «lanzapiedras» conserva el paralelismo con los demás compuestos y evita imponer «catapultas», que especificaría demasiado el tipo de aparato.
- source_word: σκορπίδια
  english_pob_choice: scorpions
  chosen_spanish: escorpiones
  alternatives_spanish:
  - escorpiones de guerra
  - escorpiones[a]
  - máquinas escorpión
  lexicon: LSJ
  rationale: El préstamo histórico se entiende mejor en español como «escorpiones»; mantiene el término técnico antiguo para un pequeño lanzaproyectiles. La nota aclara la alternativa interpretativa usual.
- source_word: εἰς τὸ βάλλεσθαι
  english_pob_choice: to shoot
  chosen_spanish: para arrojar
  alternatives_spanish:
  - para lanzar
  - para disparar
  - con el fin de arrojar
  lexicon: LSJ
  rationale: La cláusula final expresa propósito. «Para arrojar» funciona bien con los objetos mencionados y conserva el valor de finalidad del infinitivo articular.
- source_word: βέλη
  english_pob_choice: arrows
  chosen_spanish: flechas
  alternatives_spanish:
  - dardos
  - proyectiles
  - saetas
  lexicon: LSJ
  rationale: Dado que el contexto inmediato habla de máquinas para lanzar y la frase siguiente nombra flechas, «flechas» es la opción más natural y concreta en español.
- source_word: σφενδόνας
  english_pob_choice: slingstones
  chosen_spanish: piedras de honda
  alternatives_spanish:
  - piedras lanzadas con honda
  - proyectiles de honda
  - saetas de honda
  lexicon: LSJ
  rationale: El sustantivo puede referirse a proyectiles de honda; «piedras de honda» es claro para el lector moderno y preserva la imagen bélica sin añadir un término técnico innecesario.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete y coincide sustancialmente con la traducción inglesa auditada; no se detectaron revisiones aplicadas en el contexto proporcionado.
  spanish_consistency_notes:
  - Se mantuvo un registro militar literal y sobrio para no suavizar la violencia del pasaje.
  - Se prefirió «santuario» por corresponder al ἁγίασμα, sin expandir a «templo» o «lugar santo».
  - Los compuestos técnicos se vertieron de manera transparente en español para conservar el paralelismo de la lista griega.
  - «Escorpiones» se conservó como término técnico histórico, con nota aclaratoria para lectores modernos.
