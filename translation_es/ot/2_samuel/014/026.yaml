review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura iterativa del hebreo, el intervalo anual, la causa de la acción y la nota cultural sobre אֶבֶן הַמֶּלֶךְ. Sin embargo, hay dos ajustes importantes: el sujeto hebreo es activo, no reflexivo, por lo que conviene ''se cortaba el cabello'' o mejor una formulación activa más natural; y וְשָׁקַל es mejor como pretérito puntual dentro del evento repetido (''lo pesaba'' puede sonar habitual/progresivo donde el hebreo narra lo que hacía en esa ocasión).'
  spanish_quality_summary: El texto es claro y legible, pero 'se cortaba el cabello de su cabeza' suena algo pesado y reflexivo de manera innecesaria. 'Cada vez que se cortaba el cabello' o 'Cada vez que se cortaba el cabello de la cabeza' mejora, pero la opción más natural y fiel es 'Cada vez que se cortaba el cabello de la cabeza'. También 'al fin de cada año' es comprensible, aunque 'al final de cada año' es más natural en español actual. La repetición de 'cabello de su cabeza' puede mantenerse por fidelidad, pero con una primera mención más idiomática se lee mejor.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. 'Siclos' concuerda con el uso bíblico en español. La decisión de conservar 'piedra del rey' con nota explicativa está bien alineada con la justificación léxica documentada.
  issues:
  - severity: medium
    issue: Uso reflexivo innecesario en 'se cortaba'
    rationale: El hebreo presenta a Absalón como agente de la acción de cortarse el cabello en sentido narrativo, pero el reflexivo español aquí puede sonar torpe. Una formulación más natural y fiel es 'Cada vez que se cortaba el cabello...' sin añadir 'de su cabeza' en la primera mención, o bien mantener la especificación después donde el hebreo la repite.
  - severity: medium
    issue: '''al fin de cada año'' suena menos natural que ''al final de cada año'''
    rationale: La expresión propuesta comunica bien la periodicidad anual, pero en español contemporáneo 'al final de cada año' es más idiomática y ampliamente legible.
  - severity: low
    issue: Aspecto verbal de 'pesaba'
    rationale: Aunque el contexto es habitual, dentro de cada ocasión concreta el hebreo narra la acción de pesar el cabello. 'lo pesaba' o 'pesó' pueden evitar la ambigüedad aspectual; aquí 'lo pesaba' dentro del marco iterativo funciona bien si se explicita el objeto.
  revised_spanish_text: 'Cada vez que se cortaba el cabello—al final de cada año lo cortaba, porque le pesaba—cuando lo cortaba, pesaba el cabello de su cabeza: doscientos siclos según la piedra del rey[a].'
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: “según la piedra del rey”, es decir, según el peso patrón real.'
    reason: cultural_note
  revision_rationale: Se ajustó la primera cláusula para evitar la formulación más pesada 'el cabello de su cabeza' en la apertura, ya que el hebreo permite una expresión española más natural sin pérdida de sentido; se cambió 'al fin' por 'al final' por mayor naturalidad contemporánea. Se conservó la nota sobre 'la piedra del rey' porque preserva una referencia cultural importante del hebreo אֶבֶן.
