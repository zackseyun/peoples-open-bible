translation:
  language: es
  text: Y ellos dieron para el servicio de la casa de Dios cinco mil talentos de oro y diez mil dáricos[b], y diez mil talentos de plata, y dieciocho mil talentos[c][a] de bronce, y cien mil talentos de hierro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «diez mil y ocho mil talentos de bronce», es decir, dieciocho mil talentos.'
    reason: lexical_alternative
  - marker: b
    text: Un «dárico» era una moneda persa de oro.
    reason: cultural_note
  - marker: c
    text: Un «talento» era una gran unidad de peso, no el sentido moderno de «habilidad» o «don».
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: And they gave
  chosen_spanish: Y ellos dieron
  alternatives_spanish:
  - y contribuyeron
  - y donaron
  lexicon: HALOT
  rationale: El verbo נתן en esta secuencia narrativa expresa una acción completada. «Dieron» conserva la sencillez y el valor de entrega del texto sin introducir una interpretación más específica como «contribuyeron».
- source_word: לַעֲבוֹדַת
  english_pob_choice: for the service of
  chosen_spanish: para el servicio de
  alternatives_spanish:
  - para la obra de
  - para el trabajo de
  lexicon: HALOT
  rationale: עֲבוֹדָה puede abarcar servicio y labor. «Servicio» conserva el alcance funcional y cultual del contexto del templo, y evita restringirlo solo a la construcción.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - la casa de Dios
  - el templo de Dios
  lexicon: HALOT
  rationale: «Casa de Dios» sigue de cerca la frase hebrea בֵּית הָאֱלֹהִים sin reemplazarla por «templo», que es más específico que el original y menos transparente para el auditorio contemporáneo.
- source_word: כִּכָּרִים
  english_pob_choice: talents
  chosen_spanish: talentos
  alternatives_spanish:
  - talentos de peso
  - unidades de talento
  lexicon: HALOT
  rationale: כִּכָּר designa una unidad de peso. En español, «talentos» es el equivalente convencional y fiel; el contexto numérico deja claro que se trata de peso, no de capacidad personal.
- source_word: חֲמֵשֶׁת אֲלָפִים
  english_pob_choice: five thousand
  chosen_spanish: cinco mil
  alternatives_spanish:
  - cinco millares
  lexicon: HALOT
  rationale: La construcción numeral se vierte de forma directa y natural en español.
- source_word: אֲדַרְכֹנִים
  english_pob_choice: darics
  chosen_spanish: dáricos
  alternatives_spanish:
  - monedas de oro persas
  - dracmas
  lexicon: HALOT
  rationale: El préstamo persa se conserva como nombre histórico propio. «Dáricos» mantiene la especificidad cultural que perdería una paráfrasis genérica como «monedas de oro».
- source_word: רִבּוֹ
  english_pob_choice: ten thousand
  chosen_spanish: diez mil
  alternatives_spanish:
  - una miríada
  lexicon: HALOT
  rationale: El numeral singular funciona aquí como 10,000. «Diez mil» es más claro y natural en español que «miríada», que puede sonar literaria o ambigua.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - metal de plata
  lexicon: HALOT
  rationale: En listas de materiales, כֶּסֶף se traduce normalmente «plata». Es la opción más natural y fiel al metal nombrado en el texto.
- source_word: עֲשֶׂרֶת אֲלָפִים
  english_pob_choice: ten thousand
  chosen_spanish: diez mil
  alternatives_spanish:
  - diez millares
  lexicon: HALOT
  rationale: La cifra se vierte de forma directa y exacta.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En un inventario de materiales para la obra del templo, «bronce» es la correspondencia usual en español y refleja mejor el conjunto técnico de metales del pasaje.
- source_word: וּשְׁמוֹנַת אֲלָפִים
  english_pob_choice: eighteen thousand
  chosen_spanish: dieciocho mil
  alternatives_spanish:
  - y ocho mil
  lexicon: HALOT
  rationale: La suma implícita de 10,000 + 8,000 se expresa como total en español para evitar una sintaxis forzada, manteniendo el valor del texto hebreo.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - metal de hierro
  lexicon: HALOT
  rationale: Término material directo y estándar.
- source_word: מֵאָה אֶלֶף
  english_pob_choice: one hundred thousand
  chosen_spanish: cien mil
  alternatives_spanish:
  - ciento mil
  lexicon: HALOT
  rationale: La cifra se expresa con la forma natural del español moderno.
theological_decisions:
- issue: No hay sustitución del nombre divino por un título de ocultamiento
  english_pob_reading: the house of God
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - la casa del Señor
  rationale: El hebreo contiene אֱלֹהִים, no un eufemismo para el nombre divino. Se mantiene «Dios» conforme al texto fuente y a la política del proyecto de no enmascarar el referente.
  doctrine_reference: Éxodo 3:15; convención editorial POB sobre YHWH/אֱלֹהִים
- issue: Unidad de peso frente a moneda moderna o habilidad
  english_pob_reading: talents
  chosen_spanish_reading: talentos
  alternative_spanish_readings:
  - talentos de peso
  - monedas
  rationale: «Talentos» aquí nombra una unidad de peso antigua. Se conserva el término tradicional con claridad contextual, evitando la confusión con «talento» como capacidad o con una equivalencia monetaria moderna.
  doctrine_reference: Uso léxico e histórico del término כִּכָּר en contextos de peso
- issue: Inventario de materiales del templo, no descripción espiritualizada
  english_pob_reading: for the service of the house of God
  chosen_spanish_reading: para el servicio de la casa de Dios
  alternative_spanish_readings:
  - para la obra de la casa de Dios
  rationale: El versículo enumera aportes materiales para el servicio del santuario. Se evita espiritualizar o expandir el sentido más allá de la lista concreta que presenta el hebreo.
  doctrine_reference: 1 Crónicas 29:7; contexto inmediato de ofrendas para la obra del templo
translation_notes:
  revision_awareness: El contexto inglés mantiene una equivalencia óptima estable sin revisiones textuales aplicadas; la versión española sigue esa misma lectura, conservando la suma implícita de bronce como dieciocho mil talentos y los términos históricos para la unidad de peso y la moneda persa.
  spanish_consistency_notes:
  - Se mantiene «casa de Dios» para בֵּית הָאֱלֹהִים, coherente con el tratamiento del hebreo sin ocultamiento nominal.
  - «Talentos» se usa como unidad de peso en todo el versículo; las notas aclaran el sentido histórico.
  - Se conserva la especificidad cultural de «dáricos» y se aclara en nota para lectores no familiarizados.
  - La enumeración de metales sigue el orden y la estructura del hebreo, con una sintaxis española natural.
