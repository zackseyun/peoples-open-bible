translation:
  language: es
  text: Ver la apariencia del sumo sacerdote bastaba para herir la mente[a]; pues su rostro y su tez alterada hacían visible la agonía en su alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «traspasar la mente» o «afligir la mente». El griego usa un verbo de herir en sentido metafórico para el efecto producido en el observador.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la agonía según el alma», es decir, la angustia interior de su alma.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ ὁρῶντα
  english_pob_choice: To see
  chosen_spanish: Ver
  alternatives_spanish:
  - Al ver
  - Para quien veía
  - Para verlo
  lexicon: LSJ
  rationale: El griego expresa de manera general el efecto que producía la escena al observarla. «Ver» conserva esa fuerza impersonal y evita una paráfrasis excesiva.
- source_word: τὴν τοῦ ἀρχιερέως ἰδέαν
  english_pob_choice: the appearance of the high priest
  chosen_spanish: la apariencia del sumo sacerdote
  alternatives_spanish:
  - el aspecto del sumo sacerdote
  - la figura del sumo sacerdote
  - el porte del sumo sacerdote
  lexicon: LSJ
  rationale: ἰδέα se refiere al aspecto visible; «apariencia» es fiel y natural en español. «Sumo sacerdote» corresponde con precisión a ἀρχιερεύς.
- source_word: τιτρώσκεσθαι τὴν διάνοιαν
  english_pob_choice: to wound the mind
  chosen_spanish: herir la mente
  alternatives_spanish:
  - traspasar la mente
  - afligir la mente
  - herir el entendimiento
  lexicon: LSJ
  rationale: El verbo griego es literalmente de herir o atravesar; «herir» preserva esa imagen. «Mente» refleja διάνοια sin trasladarlo a «corazón», que no sería tan preciso aquí.
- source_word: ὄψις
  english_pob_choice: face
  chosen_spanish: rostro
  alternatives_spanish:
  - cara
  - semblante
  - aspecto
  lexicon: LSJ
  rationale: En el contexto, ὄψις apunta al semblante visible. «Rostro» es claro, digno y concreto en español.
- source_word: τῆς χρόας παρηλλαγμένον
  english_pob_choice: altered color
  chosen_spanish: color alterado
  alternatives_spanish:
  - tez alterada
  - complexión alterada
  - color cambiado
  lexicon: LSJ
  rationale: χρόα se refiere al color o la complexión visible, y παρηλλαγμένον indica alteración. «Color alterado» sigue de cerca la imagen del griego y mantiene la sobriedad del original.
- source_word: ἐνέφαινεν
  english_pob_choice: made visible
  chosen_spanish: hacían visible
  alternatives_spanish:
  - mostraban
  - ponían de manifiesto
  - revelaban
  lexicon: LSJ
  rationale: El verbo significa mostrar o manifestar exteriormente. «Hacían visible» conserva la idea de que los signos externos dejan ver lo interior.
- source_word: τὴν κατὰ ψυχὴν ἀγωνίαν
  english_pob_choice: the agony in his soul
  chosen_spanish: la agonía en su alma
  alternatives_spanish:
  - la angustia en su alma
  - su agonía interior
  - la angustia de su alma
  lexicon: LSJ
  rationale: ἀγωνία expresa angustia intensa o agonía. «Alma» reproduce ψυχή con la carga antropológica y espiritual que el texto presenta sin resolverla artificialmente.
theological_decisions:
- issue: Alcance de ψυχή en la expresión final
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - interior
  - ser interior
  - vida interior
  rationale: Se mantiene una traducción directa de ψυχή con «alma» para respetar la resonancia antropológica del griego y la solución del POB inglés. El contexto deja claro que se trata de dolor interior visible, no de una tesis doctrinal abstracta.
  doctrine_reference: Antropología bíblica; preservar la tensión sin neutralizarla
- issue: Metáfora de herir respecto de διάνοια
  english_pob_reading: to wound the mind
  chosen_spanish_reading: herir la mente
  alternative_spanish_readings:
  - traspasar la mente
  - afligir la mente
  rationale: Se conserva la metáfora corporal del verbo griego para no rebajar la intensidad del efecto psicológico. «Mente» comunica διάνοια de manera más directa que «corazón» o fórmulas devocionales tradicionales.
  doctrine_reference: Lenguaje figurado y psicología bíblica
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió una apertura con infinitivo («To see...»). Por eso la línea española empieza con «Ver...», manteniendo el valor general e impersonal del griego. También se conservó la referencia concreta al «color alterado» como reflejo de χρόα + παρηλλαγμένον.
  spanish_consistency_notes:
  - Se emplea «sumo sacerdote» para ἀρχιερεύς de forma consistente con el registro bíblico español y sin perder precisión técnica.
  - Se traduce ψυχή como «alma» en armonía con el POB inglés y con la expresión final del versículo.
  - Se evita sustituir la metáfora de «herir» por una explicación más suave, para preservar la fuerza semántica del griego.
  - La puntuación divide las dos cláusulas del versículo de manera natural en español sin cambiar la relación causal explicativa del original.
