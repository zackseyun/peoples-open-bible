translation:
  language: es
  text: Sepan, pues, que no caerá a tierra[a] una palabra de Yahvé que Yahvé habló contra la casa de Ahab, y Yahvé ha hecho lo que habló por medio[b] de su siervo Elías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘no caerá a tierra’, un modismo que significa ‘no fallará’ o ‘no quedará sin cumplirse’.'
    reason: lexical_alternative
  - marker: b
    text: O ‘por la mano de su siervo Elías’.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּעוּ
  english_pob_choice: Know
  chosen_spanish: Reconoced
  alternatives_spanish:
  - Sabed
  - Conoced
  - Entended
  lexicon: HALOT
  rationale: El imperativo plural pide que los oyentes reconozcan o admitan una verdad pública. ‘Reconoced’ suena natural en español bíblico contemporáneo y conserva el tono exhortativo sin sonar mecánico.
- source_word: אֵפוֹא
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - por tanto
  - ahora pues
  lexicon: HALOT
  rationale: La partícula añade fuerza inferencial y de transición. ‘Pues’ comunica bien esa conexión discursiva en español sin sobrecargar el registro.
- source_word: יִפֹּל ... אַרצה
  english_pob_choice: will fall to the ground
  chosen_spanish: no caerá a tierra
  alternatives_spanish:
  - no fallará
  - no caerá al suelo
  - no se frustrará
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de ‘caer a tierra’, que en contexto significa no quedar incumplida. La forma negativa mantiene tanto la metáfora como el sentido de cumplimiento seguro.
- source_word: מִדְּבַר יְהוָה
  english_pob_choice: a word of Yahweh
  chosen_spanish: una palabra de Yahvé
  alternatives_spanish:
  - nada de la palabra de Yahvé
  - ninguna palabra de Yahvé
  - un dicho de Yahvé
  lexicon: HALOT
  rationale: ‘Palabra’ refleja el singular hebreo y la fuerza profética del dicho divino. Se evita ‘dicho’ porque debilita la referencia a la palabra revelada y anunciada por Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino en su forma tradicional del proyecto. No se sustituye por un título, conforme al criterio editorial de transparencia.
- source_word: אֲשֶׁר דִּבֶּר יְהוָה עַל בֵּית אַחְאָב
  english_pob_choice: that he spoke against the house of Ahab
  chosen_spanish: que él habló contra la casa de Ahab
  alternatives_spanish:
  - que Yahvé declaró contra la casa de Ahab
  - que Yahvé habló acerca de la casa de Ahab
  - que habló sobre la casa de Ahab
  lexicon: HALOT
  rationale: ‘Contra’ expresa aquí el matiz adversativo/judicial de עַל en contexto de juicio, como en el auditable inglés POB. ‘Casa de Ahab’ conserva el idioma bíblico de dinastía/familia.
- source_word: בֵּית אַחְאָב
  english_pob_choice: the house of Ahab
  chosen_spanish: la casa de Ahab
  alternatives_spanish:
  - la dinastía de Ahab
  - la familia de Ahab
  lexicon: HALOT
  rationale: Se mantiene el giro bíblico ‘casa de’ para respetar la fórmula dinástica habitual en el texto hebreo y sus resonancias intertextuales.
- source_word: וַיהוָה עָשָׂה
  english_pob_choice: and Yahweh has done
  chosen_spanish: y Yahvé ha hecho
  alternatives_spanish:
  - y Yahvé hizo
  - y Yahvé ha cumplido
  - y Yahvé realizó
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la acción como ya realizada. ‘Ha hecho’ comunica cumplimiento consumado en el momento del discurso.
- source_word: אֵת אֲשֶׁר דִּבֶּר
  english_pob_choice: what he spoke
  chosen_spanish: lo que habló
  alternatives_spanish:
  - lo que dijo
  - aquello que habló
  - lo que declaró
  lexicon: HALOT
  rationale: ‘Lo que habló’ mantiene la relación verbal con el anuncio previo y conserva el objeto directo implícito del hebreo sin añadir interpretación innecesaria.
- source_word: בְּיַד עַבְדּוֹ אֵלִיָּהוּ
  english_pob_choice: by the hand of his servant Elijah
  chosen_spanish: por medio de su siervo Elías
  alternatives_spanish:
  - por la mano de su siervo Elías
  - a través de su siervo Elías
  - mediante su siervo Elías
  lexicon: HALOT
  rationale: ביד es una idiomática de agencia/instrumentalidad. ‘Por medio de’ comunica el sentido natural en español, mientras que ‘por la mano de’ queda como imagen literal menos fluida.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su esclavo
  lexicon: HALOT
  rationale: En el contexto profético, עבד denota servicio comisionado. ‘Siervo’ es el equivalente español más claro y tradicional para esta función, sin perder el sentido de subordinación.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: HALOT
  rationale: Se usa la forma española establecida del nombre propio bíblico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se conserva el nombre divino para mantener la transparencia y la fidelidad al original, conforme al criterio del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Idiom of prophetic certainty: not a word ... will fall to the ground'
  english_pob_reading: not a word ... will fall to the ground
  chosen_spanish_reading: no caerá a tierra
  alternative_spanish_readings:
  - no fallará
  - no se frustrará
  - no quedará sin cumplirse
  rationale: La imagen hebrea se conserva porque expresa la certeza de cumplimiento de la palabra de Yahvé. En español, la fórmula literal sigue siendo inteligible y preserva la textura del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve tension and source texture where possible'
- issue: Agency phrase בְּיַד עַבְדּוֹ אֵלִיָּהוּ
  english_pob_reading: by the hand of his servant Elijah
  chosen_spanish_reading: por medio de su siervo Elías
  alternative_spanish_readings:
  - por la mano de su siervo Elías
  - mediante su siervo Elías
  rationale: La frase hebrea marca instrumentación/mediación profética. ‘Por medio de’ expresa esa agencia con naturalidad en español sin ocultar que la palabra vino a través de un mensajero humano.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve tension and source texture where possible'
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre las revisiones y no requiere cambios sustantivos respecto al análisis previo. La principal decisión en español es conservar el modismo hebreo de ‘caer a tierra’ con una formulación natural, y mantener el nombre divino Yahvé sin sustitución por un título.
  spanish_consistency_notes:
  - Se conservó Yahvé de manera uniforme para יְהוָה.
  - Se mantuvo la imagen idiomática ‘caer a tierra’ para reflejar el hebreo y el audit trail inglés.
  - Se usó ‘casa de Ahab’ para preservar la fórmula dinástica bíblica.
  - Se prefirió ‘por medio de’ para la agencia profética de ביד, con nota lexical que reconoce la imagen literal.
