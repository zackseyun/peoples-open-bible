review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: causación activa (''La han hecho''), desolación, lamento ante Yahvé y la cláusula final idiomática. Sin embargo, ''Toda la tierra'' se aparta del rastro auditado inglés, que decidió contextualmente ''land'' = ''la tierra/la tierra de Judá'' en sentido territorial, no ''earth''. En español, ''toda la tierra'' suena más naturalmente a totalidad mundial que al territorio devastado, por lo que conviene ajustar a ''Todo el país'' o similar para preservar mejor el referente contextual. También la nota c actual no corresponde bien al contraste del inglés, pues presenta ''país'' como alternativa a ''tierra'' cuando en realidad el problema es evitar lectura cósmica.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. 'La han hecho una desolación' y 'nadie la toma a pecho' funcionan bien. El punto más débil es 'Toda la tierra', que en registro bíblico español puede inducir una lectura global no pretendida aquí. 'Está devastada' es idiomático, aunque 'está desolado' concordando con 'país' haría el conjunto más cohesivo tras la revisión.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. El tratamiento de Yahvé no aparece en este versículo. La decisión idiomática para שָׂם עַל לֵב se mantiene bien con ''tomar a pecho''. La principal corrección es al referente de אֶרֶץ: por contexto conviene una forma territorial más explícita en español.'
  issues:
  - severity: medium
    issue: '''Toda la tierra'' sugiere la totalidad del mundo más que la tierra/territorio de Judá.'
    rationale: El audit trail inglés escogió 'land' precisamente para evitar universalizar el juicio. En español, 'toda la tierra' tiende a leerse como 'the whole earth', así que no preserva bien esa decisión contextual.
  - severity: low
    issue: La nota c no explica con precisión la decisión contextual sobre אֶרֶץ.
    rationale: La nota debería reflejar que el término también podría ser 'tierra' en sentido más amplio o 'earth', pero aquí se entiende mejor como territorio/país de Judá; la formulación actual no resuelve la ambigüedad creada en español.
  revised_spanish_text: La han hecho una desolación[a]; se lamenta delante de mí, desolado[c]. Todo el país ha sido devastado[b], porque nadie lo toma a pecho.
  revised_footnotes:
