translation:
  language: es
  text: Y doce leones estaban de pie allí sobre los seis escalones[a], de un lado y del otro; nada semejante había sido hecho en ningún reino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en los seis escalones».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no había sido hecho así para todos los reinos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁנֵים עָשָׂר
  english_pob_choice: And twelve
  chosen_spanish: Y doce
  alternatives_spanish:
  - Y había doce
  lexicon: HALOT
  rationale: El cardinal introduce la escena sin necesidad de un verbo existencial explícito en español. Mantengo la simplicidad narrativa del hebreo y del POB inglés.
- source_word: אֲרָיִים
  english_pob_choice: lions
  chosen_spanish: leones
  alternatives_spanish:
  - leones de piedra
  - figuras de león
  lexicon: HALOT
  rationale: El sustantivo designa leones; el contexto de un trono sugiere figuras ornamentales, pero el hebreo no obliga a explicitar ese matiz en el texto principal.
- source_word: עֹמְדִים
  english_pob_choice: were standing
  chosen_spanish: estaban allí
  alternatives_spanish:
  - estaban de pie
  - se hallaban
  lexicon: HALOT
  rationale: El participio describe una disposición visible y estable. En español, 'estaban allí' comunica la presencia situada con fluidez, sin perder el valor descriptivo.
- source_word: עַל שֵׁשׁ הַמַּעֲלוֹת
  english_pob_choice: on the six steps
  chosen_spanish: sobre los seis escalones
  alternatives_spanish:
  - en los seis escalones
  - sobre los seis peldaños
  lexicon: HALOT
  rationale: מַעֲלוֹת son 'escalones' o 'peldaños'. 'Escalones' es natural y claro en español. 'Sobre' conserva el valor locativo de עַל.
- source_word: מִזֶּה וּמִזֶּה
  english_pob_choice: on this side and on that side
  chosen_spanish: de un lado y del otro
  alternatives_spanish:
  - a un lado y al otro
  - de este lado y del otro
  lexicon: HALOT
  rationale: La expresión distributiva indica colocación a ambos lados. 'De un lado y del otro' es idiomático en español y conserva la simetría espacial.
- source_word: לֹא נַעֲשָׂה כֵן
  english_pob_choice: nothing like it had been made
  chosen_spanish: nada semejante había sido hecho
  alternatives_spanish:
  - no se había hecho cosa igual
  - nada así se había hecho
  lexicon: HALOT
  rationale: El nifal con כֵן expresa la ausencia de algo comparable. 'Nada semejante había sido hecho' mantiene la comparación implícita sin añadir interpretación excesiva.
- source_word: לְכָל מַמְלָכוֹת
  english_pob_choice: in any kingdom
  chosen_spanish: en ningún reino
  alternatives_spanish:
  - en cualquier reino
  - para ningún reino
  lexicon: HALOT
  rationale: La combinación negativa con לְ + כָל en este contexto comparativo se expresa naturalmente como 'en ningún reino'. Respeta el sentido distributivo y la revisión inglesa que prefirió 'in any kingdom'.
translation_notes:
  revision_awareness: 'La base inglesa revisó ''for any kingdom'' a ''in any kingdom'' para reflejar con mayor naturalidad la preposición hebrea. El español adopta ''en ningún reino'', que conserva el sentido distributivo negativo y la naturalidad idiomática. También se mantuvo la estructura paralela de la escena: doce leones, ubicación en los seis escalones, y la afirmación final de singularidad comparativa.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Leones'' se conserva como traducción literal; no se explicita ''figuras'' en el texto principal para no añadir al hebreo.'
  - '''Escalones'' traduce מַעֲלוֹת de forma más natural que ''subidas'' o ''gradas'' en español contemporáneo.'
  - La frase final usa una negación absoluta ('nada semejante') para reflejar el valor comparativo del hebreo sin sobrerreconstrucción.
