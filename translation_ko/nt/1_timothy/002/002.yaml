  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὑπὲρ βασιλέων καὶ πάντων τῶν ἐν ὑπεροχῇ ὄντων, ἵνα ἤρεμον καὶ ἡσύχιον βίον διάγωμεν ἐν πάσῃ εὐσεβείᾳ καὶ σεμνότητι.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/002.yaml
  text: for kings and all who are in high positions[a], so that we may lead a tranquil and quiet life in all godliness and dignity.
  footnotes:
  - marker: a
    text: Or 'all who are in authority.' The Greek phrase is literally 'all those being in eminence/high position.'
    reason: lexical_alternative
translation:
  language: ko
  text: 왕들과 높은 자리에 있는 모든 자[a]를 위해서도 그리하여, 우리가 모든 경건과 단정함 가운데 평온하고 조용한 삶을 살아가도록 하기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「권세 있는 모든 자」. 헬라어는 직역하면 「높은 위치에 있는 자들」.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλέων
  english_pob_choice: kings
  chosen_korean: 왕들
  alternatives_korean:
  - 군왕들
  lexicon: BDAG
  rationale: 표준 표현.
- source_word: πάντων τῶν ἐν ὑπεροχῇ ὄντων
  english_pob_choice: all who are in high positions
  chosen_korean: 높은 자리에 있는 모든 자
  alternatives_korean:
  - 권세 있는 모든 자
  - 높은 직위에 있는 모든 사람
  lexicon: BDAG
  rationale: ὑπεροχή의 「높음·우월」을 「높은 자리」로 자연스럽게 옮긴다.
- source_word: ἤρεμον καὶ ἡσύχιον βίον διάγωμεν
  english_pob_choice: we may lead a tranquil and quiet life
  chosen_korean: 평온하고 조용한 삶을 살아가도록
  alternatives_korean:
  - 평화롭고 고요한 삶을 영위하도록
  lexicon: BDAG
  rationale: ἤρεμος·ἡσύχιος의 짝을 「평온」·「조용한」으로 옮긴다.
- source_word: ἐν πάσῃ εὐσεβείᾳ καὶ σεμνότητι
  english_pob_choice: in all godliness and dignity
  chosen_korean: 모든 경건과 단정함 가운데
  alternatives_korean:
  - 온갖 경건함과 위엄 속에서
  lexicon: BDAG
  rationale: εὐσέβεια는 본 번역 표준 「경건」. σεμνότης의 「존엄·단정함」을 「단정함」으로 옮겨 일상적 품격을 살린다.
