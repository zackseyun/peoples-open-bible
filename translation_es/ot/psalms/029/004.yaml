review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo: «קוֹל» como «voz», el nombre divino como «Yahvé», y el paralelismo «poder/majestad». Sin embargo, la nota al pie no refleja fielmente la alternativa documentada en el rastro inglés ni produce un español natural, porque «es con poder / es con majestad» suena demasiado calcado. La alternativa debe preservar mejor el valor de ב + sustantivo en español.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno: «La voz de Yahvé es poderosa; la voz de Yahvé es majestuosa». La única reparación necesaria es la nota, para que sea idiomática y útil al lector. «Majestuosa» funciona bien en contexto poético.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; קוֹל → «voz» correctamente; בַּכֹּחַ y בֶּהָדָר se expresan bien en el texto principal con adjetivos naturales en español. La nota alternativa debe ajustarse a un español más fiel y legible, preferiblemente «con poder / con majestad» sin el verbo calcado.'
  issues:
  - severity: medium
    issue: 'La nota al pie usa una alternativa poco natural: «La voz de Yahvé es con poder; la voz de Yahvé es con majestad».'
    rationale: Aunque intenta reflejar la construcción hebrea con ב + sustantivo, en español esa formulación resulta torpe y no representa bien una alternativa de lectura útil. Una forma como «La voz de Yahvé resuena con poder; la voz de Yahvé resuena con majestad» sería más idiomática, pero introduce «resuena». Mejor mantener una nota breve que explique la alternativa estructural de modo natural.
  - severity: low
    issue: La razón de la nota está etiquetada como «alternative_reading» cuando funciona más como alternativa léxica/estructural.
    rationale: No afecta gravemente al lector final, pero la documentación queda mejor si la nota explica una alternativa de traducción, no una lectura textual distinta.
  revised_spanish_text: La voz de Yahvé es poderosa[a]; la voz de Yahvé es majestuosa.
  revised_footnotes:
  - marker: a
    text: 'O: «La voz de Yahvé tiene poder; la voz de Yahvé tiene majestad».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y acorde con el rastro POB. Solo se corrige la nota al pie para eliminar el calco poco idiomático «es con» y reemplazarlo por una alternativa española legible que aún deja ver la estructura nominal subyacente del hebreo.
