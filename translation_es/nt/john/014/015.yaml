translation:
  language: es
  text: Si me aman[a], ustedes guardarán mis mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obedecerán mis mandamientos». El verbo puede significar guardar, observar, custodiar u obedecer; «guardarán» conserva el sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Siempre que
  lexicon: BDAG
  rationale: Introduce una cláusula condicional. «Si» es la equivalencia más natural y fiel en español; «cuando» o «siempre que» sugerirían una iteración o generalización que el griego no exige.
- source_word: ἀγαπᾶτέ
  english_pob_choice: you love
  chosen_spanish: aman
  alternatives_spanish:
  - aman ustedes
  - están amando
  - quieren
  lexicon: BDAG
  rationale: El presente subjuntivo tras ἐάν expresa una condición real; en español, «si me aman» comunica de forma natural la relación de amor sin volverlo un calco verbal innecesario.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Jesús; «me» es la forma simple y fiel. «A mí» solo sería útil para énfasis, que aquí no es imprescindible.
- source_word: ἐντολάς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - órdenes
  - preceptos
  lexicon: BDAG
  rationale: En el contexto joánico, ἐντολή tiene el peso de un término normativo fuerte. «Mandamientos» conserva mejor ese registro que «mandatos» u «órdenes», y resulta más reconocible en español bíblico sin caer en una formulación eclesiástica opaca.
- source_word: τηρήσετε
  english_pob_choice: you will keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - obedecerán
  - cumplirán
  - observarán
  lexicon: BDAG
  rationale: τηρέω puede significar guardar, observar, custodiar o obedecer. «Guardarán» preserva el campo semántico más amplio que destacó la auditoría inglesa y evita reducir el verbo a mera obediencia. Se mantiene el futuro indicativo para respetar la forma griega.
- source_word: τὰς ἐμὰς
  english_pob_choice: my
  chosen_spanish: mis
  alternatives_spanish:
  - las mías
  - mis propias
  lexicon: BDAG
  rationale: La construcción artículo + posesivo se vierte naturalmente como «mis». El valor enfático de ἐμάς queda suficientemente reflejado por el orden normal del español, sin añadir explicitaciones que el texto no requiere.
theological_decisions:
- issue: Preservar el valor futuro de τηρήσετε frente a una lectura imperativa implícita
  english_pob_reading: 'future statement: ''you will keep'''
  chosen_spanish_reading: 'futuro indicativo: «guardarán»'
  alternative_spanish_readings:
  - 'imperativo implícito: «guarden»'
  - 'paráfrasis exhortativa: «deben guardar»'
  rationale: 'La forma griega es futuro indicativo, no imperativo. Traducir con futuro mantiene la tensión teológica: el amor a Jesús se presenta como la realidad de la cual brota el guardar sus mandamientos, sin convertir la frase en una orden directa.'
  doctrine_reference: Preservar la tensión gramatical y teológica del texto; primacía del original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el criterio auditado de la POB inglesa: condicional simple con ἐάν, valor relacional de ἀγαπάω, plural futuro de τηρέω y sustantivo fuerte para ἐντολή. No se adoptaron formas más interpretativas como «obedecerán» o una frase imperativa, porque el registro del original y la auditoría inglesa preservan deliberadamente la amplitud semántica y la forma futura.'
  spanish_consistency_notes:
  - Se usa «mandamientos» para mantener la carga joánica de ἐντολή.
  - Se mantiene el futuro «guardarán» para reflejar τηρήσετε.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el verso.
  - El pronombre de segunda persona plural se expresa con «ustedes» para claridad en español latinoamericano.
