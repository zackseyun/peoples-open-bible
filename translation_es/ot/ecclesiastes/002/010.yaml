- from: Y todo lo que mis ojos pidieron no se lo negué[a]; no contuve mi corazón[b] de ningún placer[c], porque mi corazón se alegró en todo mi trabajo[d], y esto fue mi porción de todo mi trabajo.
  to: Y todo lo que mis ojos desearon no se lo negué[a]; no privé a mi corazón de ningún placer[b], porque mi corazón se alegró con todo mi trabajo[c], y esto fue mi porción de todo mi trabajo.
  rationale: Se ajusta el texto principal para reflejar mejor el valor idiomático de שָׁאֲלוּ con 'mis ojos' ('desearon'), se mejora la naturalidad española de מָנַעְתִּי אֶת לִבִּי sin perder el foco en 'mi corazón', y se corrige la nota sobre עֲמָלִי para que use alternativas españolas en vez de 'toil'. También se simplifica el sistema de notas para que solo preserve alternativas significativas y ancladas en el texto revisado.
