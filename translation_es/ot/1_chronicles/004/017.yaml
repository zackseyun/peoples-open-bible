  to: 'Los hijos de Ezrah: Jéter[a], Mered, Éfer y Jalón; y ella concibió a Miriam, Samái e Isbáh[b][c], el padre de Eshtemoa.'
  rationale: Se corrige «Ezra» a «Ezrah» para coincidir con la forma hebrea auditada y con la nota textual. Se ajusta «Samai» a «Samái» para una transliteración española más fiel al nombre fuente. Se añade el artículo en «el padre de Eshtemoa» para reflejar mejor la construcción nominal del original y del POB inglés, manteniendo la nota alternativa sobre «fundador».
