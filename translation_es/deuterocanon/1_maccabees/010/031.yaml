translation:
  language: es
  text: Y que Jerusalén sea santa y consagrada[a], junto con su territorio[b], sus diezmos y sus impuestos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dedicada» o «apartada» para «consagrada».
    reason: lexical_alternative
  - marker: b
    text: O «sus fronteras» o «sus límites»; el griego puede referirse a las líneas fronterizas o al territorio asociado a Jerusalén.
    reason: lexical_alternative
  - marker: c
    text: O «sus peajes» o «sus derechos aduaneros» para «sus impuestos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤτω
  english_pob_choice: let ... be
  chosen_spanish: sea
  alternatives_spanish:
  - que sea
  - permanezca
  lexicon: LSJ
  rationale: El griego usa una forma imperativa de tercera persona con fuerza decretal. En español, «que Jerusalén sea» reproduce bien ese valor jussivo en una formulación natural y solemne.
- source_word: ἁγία
  english_pob_choice: holy
  chosen_spanish: santa
  alternatives_spanish:
  - sagrada
  - santa
  lexicon: LSJ
  rationale: «Santa» preserva el matiz cultual y religioso de ἁγία y encaja mejor en español bíblico que «sagrada», sin perder claridad.
- source_word: ἀφιεμένη
  english_pob_choice: set apart
  chosen_spanish: apartada
  alternatives_spanish:
  - dedicada
  - consagrada
  - separada
  lexicon: LSJ
  rationale: La idea de separación/dedicación debe mantenerse distinta de «santa». «Apartada» es una forma breve y natural que conserva esa segunda cualidad sin colapsarla con la primera.
- source_word: τὰ ὅρια αὐτῆς
  english_pob_choice: its territory
  chosen_spanish: su territorio
  alternatives_spanish:
  - sus fronteras
  - sus límites
  - su territorio
  lexicon: LSJ
  rationale: Aunque ὅρια puede referirse a fronteras o límites, el contexto administrativo-fiscal favorece el ámbito territorial asociado a Jerusalén. «Su territorio» refleja esa lectura sin expandirla más allá del texto revisado en inglés.
- source_word: αἱ δεκάται
  english_pob_choice: its tithes
  chosen_spanish: sus diezmos
  alternatives_spanish:
  - los diezmos
  - sus diezmos
  lexicon: LSJ
  rationale: «Diezmos» es el equivalente directo y estable de δεκάται. Mantener el posesivo sigue la relación implícita con Jerusalén y su territorio.
- source_word: τὰ τέλη
  english_pob_choice: its taxes
  chosen_spanish: sus tributos
  alternatives_spanish:
  - sus impuestos
  - sus tasas
  - sus peajes
  - sus derechos aduaneros
  lexicon: LSJ
  rationale: τέλη puede significar impuestos, derechos, peajes o aranceles. «Tributos» conserva la amplitud fiscal del término en una expresión natural en español, sin cerrar indebidamente el sentido a una sola clase de carga.
theological_decisions:
- issue: Doble predicado de santidad y separación
  english_pob_reading: 'Render both terms distinctly: ''holy and set apart'''
  chosen_spanish_reading: «santa y apartada»
  alternative_spanish_readings:
  - santa y dedicada
  - sagrada y consagrada
  rationale: El griego coordina dos descriptores distintos; conviene conservar esa duplicidad en español para no diluir la fuerza retórica y legal del decreto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Alcance de τὰ ὅρια αὐτῆς
  english_pob_reading: its territory
  chosen_spanish_reading: «su territorio»
  alternative_spanish_readings:
  - sus fronteras
  - sus límites
  rationale: La formulación del contexto es administrativa y fiscal, por lo que el sentido apunta al ámbito territorial vinculado a la ciudad. «Territorio» evita restringirlo a líneas de frontera únicamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió «territory» frente a «surrounding territory». Por eso el español usa «su territorio» sin añadir expansión interpretativa, pero conserva en nota la posible lectura de «fronteras/límites» del griego.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «santa» y «apartada» para reflejar dos términos griegos coordinados.
  - Se prefirió «tributos» como equivalente amplio de τέλη, con alternativas fiscales más específicas en nota.
  - El tono decretal se conservó con «que Jerusalén sea», que suena natural en español y respeta la fuerza exhortativa/jussiva del griego.
