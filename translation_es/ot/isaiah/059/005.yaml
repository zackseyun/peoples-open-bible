review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la imaginería básica del hebreo y sigue de cerca la auditoría inglesa en ''huevos de víbora'', ''tejen telas de araña'' y ''muere''. Sin embargo, falla en dos puntos importantes: בִּקֵּעוּ se ha vuelto una perífrasis poco natural (''hacen eclosionar'') en lugar de un verbo directo y claro; y, sobre todo, וְהַזּוּרֶה תִּבָּקַע אֶפְעֶה no significa ''el que es aplastado'', que en español sugiere una persona, sino ''lo que es aplastado'' / ''cuando se aplasta uno'', refiriéndose al huevo. La cláusula final también queda mejor como ''se abre y sale una víbora'' o equivalente, con nota que preserve el literal ''se rompe / se abre''.'
  spanish_quality_summary: El texto es generalmente legible, pero 'Hacen eclosionar' suena técnico y forzado; 'empollan' sería incorrecto. 'Eclosionan' es más natural dentro del registro bíblico moderno. 'El que es aplastado' introduce ambigüedad indebida y reduce la claridad de la imagen. La revisión propuesta mejora naturalidad y fidelidad sin perder dignidad.
  glossary_alignment: No hay conflictos con terminología teológica del proyecto. 'Víbora' refleja adecuadamente tanto צפעוני como אפעה en coherencia con el POB inglés. 'Telas de araña' y 'tejen' están bien alineados. La principal corrección es gramatical/semántica, no glosarial.
  issues:
  - severity: medium
    issue: '''Hacen eclosionar'' para בִּקֵּעוּ'
    rationale: Aunque intenta reflejar el sentido contextual de huevos, la perífrasis suena técnica y poco idiomática. Un verbo directo como 'eclosionan' expresa mejor la idea en español natural.
  - severity: high
    issue: '''el que es aplastado'' para וְהַזּוּרֶה'
    rationale: La forma española personaliza indebidamente el referente y sugiere una persona aplastada. El hebreo, según la auditoría, apunta a 'lo que es aplastado' o al huevo aplastado, no a 'el que'.
  - severity: medium
    issue: La cláusula final necesita anclar mejor la referencia al huevo aplastado
    rationale: La nota b explica correctamente la imagen, pero el texto principal debería decir 'lo que es aplastado se abre y sale una víbora' para evitar ambigüedad y corresponder mejor al sentido auditado.
  revised_spanish_text: Eclosionan huevos de víbora[a] y tejen telas de araña; el que come de sus huevos muere, y lo que es aplastado[b] se abre y sale una víbora.
  revised_footnotes:
