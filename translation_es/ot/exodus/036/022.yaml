    issue: '''espigas de unión'' sobreexplica יָדֹת'
    rationale: El hebreo usa literalmente 'manos' metafóricamente para las salientes/encajes. 'Espigas' ya comunica bien el referente; añadir 'de unión' introduce explicación adicional que no corresponde a una palabra específica del texto fuente.
  - severity: medium
    issue: '''enlazadas'' no es la mejor correspondencia contextual para מְשֻׁלָּבֹת'
    rationale: En español, 'enlazar' sugiere con frecuencia ligar o entretejer. En un contexto de carpintería/ensamblaje, 'unidas' o 'encajadas' refleja mejor el sentido de piezas correspondientes ajustadas entre sí sin desviar la imagen.
  - severity: low
    issue: La nota b depende del verbo principal elegido
    rationale: Si se revisa 'enlazadas' a 'unidas', conviene armonizar la nota alternativa para que no preserve una dicción menos natural que la del texto principal.
  revised_spanish_text: Dos espigas para cada tabla[a], unidas una a otra[b]; así hizo todas las tablas del tabernáculo.
