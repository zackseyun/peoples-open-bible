- from: Ahora, en el año catorce de Ezequías rey, subió Senaquerib, rey de Asiria, contra todas las ciudades fortificadas de Judá, y las capturó.
  to: Ahora, en el año catorce del rey Ezequías, Senaquerib, rey de Asiria, subió contra todas las ciudades fortificadas de Judá y las capturó.
  rationale: Se ajusta la fórmula regnal a un español natural y fiel («del rey Ezequías») y se mejora el orden verbal para que «subió contra» conserve el matiz del hebreo sin sonar forzado. El resto del versículo ya reflejaba bien el sentido fuente.
