base_translation:
  language: en
  yaml_path: translation/ot/proverbs/021/011.yaml
  text: When a scoffer is punished[a], the simple become wise; and when a wise man is instructed[b], he gains knowledge.
  footnotes:
  - marker: a
    text: Or 'when a wise person is instructed, he or she gains knowledge.' The Hebrew reads 'a wise man,' using a masculine singular form as a representative type in proverbial style.
    reason: lexical_alternative
  - marker: b
    text: Or 'By the punishment of a scoffer, the simple become wise.' The Hebrew construction can be rendered more formally with 'by/in the punishing of.'
    reason: lexical_alternative
