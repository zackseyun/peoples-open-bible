review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo: prohíbe que ellos habiten en la tierra, advierte el riesgo de hacer pecar a Israel contra Dios, y especifica que el pecado es servir a sus dioses, lo cual resultará en un moqesh. Sin embargo, la última cláusula en español pierde algo del matiz metafórico y del giro natural del resultado al decir «sin duda te será una trampa»; «te será un lazo» preserva mejor el registro bíblico y la metáfora documentada en la nota.'
  spanish_quality_summary: La redacción es clara y legible en español neutral. «No habitarán en tu tierra» y «no sea que te hagan pecar contra mí» funcionan bien. El principal ajuste recomendado es sustituir «trampa» por «lazo» en el texto principal para una expresión más idiomática y bíblicamente natural en este contexto; la nota puede seguir explicando el campo semántico de trampa/cepo.
  glossary_alignment: 'No hay conflicto con los términos del proyecto: «dioses» está bien para אֱלֹהֵיהֶם, y no aparece YHWH ni Mesías/Cristo. La decisión de mantener «sirves a sus dioses» conserva correctamente el lenguaje de servicio/culto. El uso de «contra mí» para לִי refleja bien la fuerza ética. El ajuste a «lazo» mejora la representación de מוֹקֵשׁ sin apartarse de la racionalidad léxica documentada.'
  issues:
  - severity: medium
    issue: «sin duda te será una trampa» suena algo forzado y menos bíblico que la metáfora hebrea
    rationale: מוֹקֵשׁ es una imagen de lazo/trampa. En español bíblico y eclesial, «lazo» transmite mejor la metáfora de tropiezo o ruina espiritual, y «te será un lazo» suena más natural que «sin duda te será una trampa». Además, el «sin duda» no corresponde a una partícula hebrea explícita y puede omitirse sin pérdida.
