  to: Mejor es la vista de los ojos[a] que el vagar del alma[b]; también esto es vapor y perseguir el viento[c].
  rationale: 'Se ajusta el español para reflejar mejor el hebreo y el razonamiento lexical del POB: «vista» comunica mejor מַרְאֵה עֵינַיִם que «mirada»; «vagar» conserva el matiz de movimiento errante en מֵהֲלָךְ; y «perseguir el viento» suena más natural y mantiene la imagen de futileza de וּרְעוּת רוּחַ. Se conserva «alma» por fidelidad a la revisión inglesa, con nota aclaratoria sobre נָפֶשׁ.'
