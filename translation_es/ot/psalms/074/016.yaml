translation:
  language: es
  text: Tuyo es el día; tuya también es la noche. Tú estableciste la luz[a] y el sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lumbrera'; algunos entienden que esto alude a la luna por el paralelismo día/noche, pero el hebreo no dice explícitamente 'luna'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְךָ
  english_pob_choice: is yours
  chosen_spanish: tuya es / tuyo también es
  alternatives_spanish:
  - te pertenece
  - es tuyo
  lexicon: HALOT
  rationale: El hebreo expresa posesión con ל + sufijo. En español, la posesión queda bien con una construcción copulativa; separar 'tuya es la noche' y 'tuyo también es el día' conserva el paralelismo y la fuerza enfática del original.
- source_word: יוֹם
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - jornada
  lexicon: HALOT
  rationale: Es el equivalente estándar y natural en contraste con 'noche'.
- source_word: אַף
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  - sí
  lexicon: HALOT
  rationale: 'אַף añade énfasis al segundo miembro: no solo la noche, sino también el día. ''También'' transmite bien ese valor aditivo y enfático en español.'
- source_word: לָיְלָה
  english_pob_choice: night
  chosen_spanish: noche
  alternatives_spanish:
  - la noche
  lexicon: HALOT
  rationale: Es el contraste directo y natural con 'día'.
- source_word: אַתָּה
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  lexicon: HALOT
  rationale: Se conserva el pronombre explícito para reflejar el énfasis del hebreo antes del verbo.
- source_word: הֲכִינוֹתָ
  english_pob_choice: established
  chosen_spanish: estableciste
  alternatives_spanish:
  - preparaste
  - dispusiste
  - fijaste
  lexicon: HALOT
  rationale: La forma hifil de כון indica hacer que algo quede puesto, firme u ordenado. 'Estableciste' es el mejor equivalente en español para el orden cósmico del versículo y mantiene la decisión de la POB inglesa.
- source_word: מָאוֹר
  english_pob_choice: light
  chosen_spanish: la luz
  alternatives_spanish:
  - lumbrera
  - luminar
  lexicon: HALOT
  rationale: Aunque מָאוֹר puede significar 'lumbrera' o 'luminar', la POB inglesa opta por 'light' para no resolver la imagen como 'luna'. En español, 'la luz' preserva esa amplitud semántica y suena natural junto con 'el sol'.
- source_word: וָשֶׁמֶשׁ
  english_pob_choice: and the sun
  chosen_spanish: y el sol
  alternatives_spanish:
  - y el astro rey
  lexicon: HALOT
  rationale: Es la equivalencia directa de שֶׁמֶשׁ. En español conviene mantener el término simple y literal.
theological_decisions:
- issue: Sentido de מָאוֹר junto con שֶׁמֶשׁ
  english_pob_reading: Render מָאוֹר as 'light' and distinguish it from 'the sun.'
  chosen_spanish_reading: Traducir מָאוֹר como 'la luz' y distinguirla de 'el sol.'
  alternative_spanish_readings:
  - '''la lumbrera'''
  - '''la luna'' por inferencia contextual'
  rationale: El hebreo no dice explícitamente 'luna'. Mantener 'la luz' evita introducir una identificación no expresada por el texto y conserva la tensión poética entre el día, la noche y los cuerpos/luz ordenados por Dios.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el último repaso: no se requieren cambios respecto al audit trail más reciente. Se mantuvo la decisión de no resolver ''מָאוֹר'' como ''luna'' y de conservar el paralelismo poético con una formulación española natural.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando aparece el nombre divino explícito; aquí no aplica.
  - Se mantuvo un registro sobrio y bíblico, sin calco mecánico del inglés.
  - '''Luz'' se eligió para מָאוֹר por coherencia con la auditoría inglesa y para evitar sobreinterpretación.'
  - Se preservó el énfasis del hebreo mediante el pronombre explícito 'Tú'.
