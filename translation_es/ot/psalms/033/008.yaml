revisions:
- from: Que toda la tierra[a] tema a Yahvé; que todos los habitantes del mundo se estremezcan[b] ante él.
  to: Que toda la tierra tema a Yahvé[a]; que todos los habitantes del mundo queden sobrecogidos[b] ante él.
  rationale: Se conserva la buena base del borrador, pero se corrige la nota de יִירְאוּ para no debilitar 'temer' a mera 'reverencia', y se reemplaza 'se estremezcan' por 'queden sobrecogidos' para reflejar mejor el matiz de temor reverente/asombro de יָגוּרוּ sin caer en una lectura excesivamente física. Se mantiene 'ante él' como español natural en el hemistiquio segundo, con una nota que preserva alternativas más literales.
