translation:
  language: es
  text: 'Entonces Aquis llamó a David y le dijo[a]: «¡Vive Yahvé!, tú eres recto, y tu salida y tu entrada conmigo en el campamento es buena a mis ojos; porque no he hallado en ti mal alguno desde el día en que viniste a mí hasta hoy. Pero a los ojos de los señores de los filisteos[b], tú no eres bueno[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu conducta conmigo en el campamento es agradable a mis ojos». El hebreo dice literalmente: «tu salida y tu entrada conmigo en el campamento es buena a mis ojos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los señores» (סְרָנִים), título usado para los gobernantes filisteos.'
    reason: cultural_note
  - marker: c
    text: 'O: «no eres aceptable» a los ojos de los señores de los filisteos.'
    reason: alternative_reading
lexical_decisions:
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Vive Yahvé!
  - Por la vida de Yahvé
  - Tan cierto como vive Yahvé
  lexicon: HALOT
  rationale: Es una fórmula de juramento. En español, «¡Vive Yahvé!» conserva la fuerza idiomática y nombra el nombre divino según la política del proyecto, sin sustituirlo por un título.
- source_word: יָשָׁר
  english_pob_choice: upright
  chosen_spanish: recto
  alternatives_spanish:
  - íntegro
  - honrado
  - justo
  lexicon: HALOT
  rationale: El término hebreo expresa rectitud moral. «Recto» comunica esa idea con naturalidad en español y evita suavizar el elogio.
- source_word: טוֹב בְּעֵינַי
  english_pob_choice: good in my sight
  chosen_spanish: buena a mis ojos
  alternatives_spanish:
  - agradable a mis ojos
  - aceptable para mí
  - buena en mi opinión
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de valoración visual. «A mis ojos» reproduce el giro original con claridad en español.
- source_word: צֵאתְךָ וּבֹאֲךָ
  english_pob_choice: your going out and your coming in
  chosen_spanish: tu salida y tu entrada
  alternatives_spanish:
  - tu ir y venir
  - tu conducta
  - tus movimientos
  lexicon: HALOT
  rationale: La pareja verbal se traduce de forma bastante literal para mantener el paralelismo y el ritmo hebreos. En el contexto militar, la expresión sigue siendo comprensible.
- source_word: אִתִּי בַּמַּחֲנֶה
  english_pob_choice: with me in the camp
  chosen_spanish: conmigo en el campamento
  alternatives_spanish:
  - conmigo en la hueste
  - en el ejército conmigo
  - conmigo en el campamento militar
  lexicon: HALOT
  rationale: «Campamento» es el sentido directo de מַחֲנֶה y encaja con el contexto narrativo. «Conmigo» preserva la relación personal del hablante con David.
- source_word: לֹא מָצָאתִי בְךָ רָעָה
  english_pob_choice: I have not found any evil in you
  chosen_spanish: no he hallado en ti mal alguno
  alternatives_spanish:
  - no he hallado en ti ninguna maldad
  - no he encontrado culpa en ti
  - no he hallado en ti ningún mal
  lexicon: HALOT
  rationale: «Mal» transmite el campo semántico de רָעָה y funciona bien en la acusación/defensa judicial implícita. «Mal alguno» conserva el énfasis negativo del hebreo y su tono formal.
- source_word: מִיּוֹם בֹּאֲךָ אֵלַי עַד הַיּוֹם הַזֶּה
  english_pob_choice: from the day of your coming to me to this day
  chosen_spanish: desde el día de tu llegada hasta hoy
  alternatives_spanish:
  - desde el día que viniste a mí hasta hoy
  - desde el día de tu venir a mí hasta este día
  lexicon: HALOT
  rationale: Se simplifica la construcción para español natural sin perder el valor temporal completo. «Llegada» evita una calca excesivamente dura y expresa el movimiento hacia el hablante.
- source_word: וּבְעֵינֵי הַסְּרָנִים
  english_pob_choice: But in the eyes of the lords of the Philistines
  chosen_spanish: Pero a los ojos de los príncipes de los filisteos
  alternatives_spanish:
  - Pero ante los ojos de los señores de los filisteos
  - Pero para los gobernantes filisteos
  - Pero a juicio de los lords filisteos
  lexicon: HALOT
  rationale: «A los ojos de» conserva la metáfora evaluativa. «Príncipes» es una solución digna y comprensible para סְרָנִים; el término específico se explica en nota para no perder la referencia técnica.
- source_word: סְרָנִים
  english_pob_choice: lords of the Philistines
  chosen_spanish: príncipes de los filisteos
  alternatives_spanish:
  - señores de los filisteos
  - gobernantes filisteos
  - jefes filisteos
  lexicon: HALOT
  rationale: El término denota a los gobernantes principales filisteos. «Príncipes» preserva el valor de cargo/nobleza y evita una traducción demasiado militar o demasiado genérica.
- source_word: לֹא טוֹב אָתָּה
  english_pob_choice: you are not good
  chosen_spanish: tú no eres bueno
  alternatives_spanish:
  - no eres aceptable
  - no eres agradable
  - no eres bueno a sus ojos
  lexicon: HALOT
  rationale: Se mantiene la tersa e incluso brusca valoración del hebreo. En contexto, el sentido es «no aceptable», pero la literalidad conserva la contundencia del dicho.
theological_decisions:
- issue: Renderizar el Tetragrammaton en un juramento pronunciado por un rey filisteo
  english_pob_reading: As Yahweh lives
  chosen_spanish_reading: ¡Vive Yahvé!
  alternative_spanish_readings:
  - ¡Vive el Señor!
  - Por la vida de Yahvé
  rationale: El texto hebreo usa explícitamente יְהוָה; por la política del proyecto, se traduce como «Yahvé» en el cuerpo del texto. El juramento queda en forma exclamativa para comunicar el valor idiomático del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La última cláusula como juicio de aceptación, no de bondad moral absoluta
  english_pob_reading: you are not good / not acceptable
  chosen_spanish_reading: tú no eres bueno
  alternative_spanish_readings:
  - tú no eres aceptable
  - no eres de aprobación para ellos
  rationale: El hebreo es breve y puede entenderse como valoración moral o como falta de aceptación. Se conserva «no eres bueno» en el texto principal para mantener la dureza y se deja abierta la lectura de aceptación en nota.
  doctrine_reference: HALOT, s.v. טוֹב; contexto narrativo de evaluación por los príncipes filisteos
translation_notes:
  revision_awareness: La versión inglesa auditada mantuvo una solución óptima-equivalente con notas para el giro idiomático de «salir y entrar», el título filisteo סְרָנִים y la posibilidad de leer טוֹב como «aceptable». No se registraron revisiones aplicadas; la traducción española conserva esas mismas tensiones y las hace explícitas en notas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la política del proyecto.
  - Se usa «campamento» para מַחֲנֶה y se conserva la imagen hebrea de «ojos» en expresiones de შეფასación.
  - «Príncipes de los filisteos» traduce סְרָנִים con un matiz de autoridad y dignidad, y la nota aclara el título técnico.
  - La construcción «tú no eres bueno» preserva la tersura del hebreo, mientras la nota explica la posible equivalencia «no eres aceptable».
