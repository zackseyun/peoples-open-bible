translation:
  language: es
  text: 'Entonces Israel dijo[a]: «¿Por qué me hicieron daño al decirle al hombre que todavía tenían otro hermano?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿Por qué me hicieron daño al decirle al hombre que todavía tenían un hermano?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; «Entonces» conserva esa secuencia en español con naturalidad.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: El texto hebreo usa «Israel» como designación personal, y se mantiene sin armonizar a «Jacob».
- source_word: לָמָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español.
- source_word: הֲרֵעֹתֶם לִי
  english_pob_choice: did you do me harm
  chosen_spanish: me hicieron daño
  alternatives_spanish:
  - me dañaron
  - me causaron mal
  lexicon: HALOT
  rationale: El causativo de רעע expresa causar daño o mal. «Me hicieron daño» comunica la fuerza del verbo sin endurecerlo a una formulación moral que el contexto no exige.
- source_word: לְהַגִּיד
  english_pob_choice: by telling
  chosen_spanish: al decirle
  alternatives_spanish:
  - por decirle
  - al informar al
  lexicon: HALOT
  rationale: El infinitivo indica el medio por el cual ocurrió el daño. En español, «al decirle» conserva esa relación circunstancial de modo claro y natural.
- source_word: לָאִישׁ
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a ese hombre
  - al varón
  lexicon: HALOT
  rationale: Se refiere al oficial egipcio ya conocido en el relato. «El hombre» en español puede sonar más natural como objeto indirecto del infinitivo; aquí se integra como «al hombre».
- source_word: הַעוֹד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía seguían
  lexicon: HALOT
  rationale: 'Marca permanencia de la condición: que seguía existiendo esa relación fraterna.'
- source_word: לָכֶם אָח
  english_pob_choice: you still had another brother
  chosen_spanish: tenían otro hermano
  alternatives_spanish:
  - les quedaba otro hermano
  - seguían teniendo un hermano
  lexicon: HALOT
  rationale: El hebreo expresa que para ellos aún había un hermano. El español lo vierte de forma idiomática como «tenían otro hermano», con «todavía» para conservar el valor de עוֹד. «Otro» refleja el sentido implícito de un hermano adicional en el contexto.
theological_decisions:
- issue: 'Designación del personaje: Israel'
  english_pob_reading: Israel, not Jacob
  chosen_spanish_reading: Israel, no Jacob
  alternative_spanish_readings:
  - Jacob
  rationale: Se conserva la designación narrativa del hebreo para no borrar una elección textual del relato.
  doctrine_reference: Hechos 7:8; Génesis 32:28
- issue: Sentido de הֲרֵעֹתֶם לִי
  english_pob_reading: did you do me harm
  chosen_spanish_reading: me hicieron daño
  alternative_spanish_readings:
  - me hicieron mal
  - me perjudicaron
  rationale: La queja expresa daño causado por su conducta, no necesariamente una acusación moral abstracta. La traducción mantiene esa tensión semántica del hebreo.
  doctrine_reference: Génesis 42:36
translation_notes:
  revision_awareness: La decisión revisada en el POB inglés pasó de una paráfrasis idiomática («bring this trouble on me») a una formulación más literal («do me harm»). En español se siguió esa revisión, evitando una expresión más expansiva y manteniendo la relación causal directa entre el dicho y el daño.
  spanish_consistency_notes:
  - Se mantuvo «Israel» como nombre propio del sujeto.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el texto.
  - «Todavía» conserva el matiz de continuidad de עוֹד.
  - La nota al pie se ancla en la frase principal mediante [a], tal como exige el formato.
