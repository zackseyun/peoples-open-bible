translation:
  language: es
  text: 'Por tanto, así dice Yahvé: Ustedes no me han escuchado, para proclamar libertad[a], cada hombre a su hermano y cada hombre a su prójimo. He aquí, yo proclamo libertad[a] para ustedes, declara Yahvé: a la espada, a la peste[b] y al hambre; y los convertiré en objeto de horror[c] para todos los reinos de la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «liberación» o «soltura» para דְּרוֹר en ambas ocurrencias; el mismo término hebreo se repite para crear ironía retórica.
    reason: lexical_alternative
  - marker: b
    text: Es decir, Yahvé los «entrega» al juicio de la espada, la peste y el hambre.
    reason: cultural_note
  - marker: c
    text: O «un horror» o «un terror».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como transliteración reconocible en español. Se evita la sustitución por un título genérico para mantener la decisión documental del POB en torno al nombre personal de Dios.
- source_word: שְׁמַעְתֶּם אֵלַי
  english_pob_choice: have not listened to me
  chosen_spanish: no me han escuchado
  alternatives_spanish:
  - no me han obedecido
  - no me han oído
  lexicon: HALOT
  rationale: ‘Escuchar’ preserva el valor idiomático de שׁמע con matiz de atender/hechar oído a la advertencia, sin sobrerrepresentar la idea como ‘obedecer’. En español, ‘han escuchado’ suena natural y mantiene la tensión implícita de desobediencia.
- source_word: לִקְרֹא דְרוֹר
  english_pob_choice: to proclaim liberty
  chosen_spanish: para proclamar libertad
  alternatives_spanish:
  - para proclamar liberación
  - para proclamar libertad y liberación
  lexicon: HALOT
  rationale: ‘Proclamar libertad’ comunica bien el acto jurídico-público de manumisión en el contexto del pacto. ‘Libertad’ mantiene el tono solemne y la fuerza retórica de la repetición irónica en el versículo.
- source_word: דְרוֹר
  english_pob_choice: liberty
  chosen_spanish: libertad
  alternatives_spanish:
  - liberación
  - libre remisión
  lexicon: HALOT
  rationale: '‘Libertad’ es el equivalente más natural y digno en español para este contexto legal de emancipación. Además permite conservar la ironía del texto: la misma ‘libertad’ negada al prójimo se vuelve juicio para los oyentes.'
- source_word: אִישׁ לְאָחִיו וְאִישׁ לְרֵעֵהוּ
  english_pob_choice: each man to his brother and each man to his neighbor
  chosen_spanish: cada hombre a su hermano y cada hombre a su prójimo
  alternatives_spanish:
  - cada uno a su hermano y cada uno a su prójimo
  - cada hombre a su hermano y cada hombre a su vecino
  lexicon: HALOT
  rationale: Se conserva la repetición distributiva de אִישׁ mediante ‘cada hombre’, manteniendo la forma masculina singular del hebreo. ‘Prójimo’ refleja bien רֵעַ como relación cercana/comunitaria y suena más bíblico que ‘vecino’ sin perder inteligibilidad.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: ‘He aquí’ mantiene el tono profético y solemne de introducción divina. Es la equivalencia más estable en español bíblico para la fórmula de anuncio inmediato.
- source_word: קֹרֵא לָכֶם דְרוֹר
  english_pob_choice: I am proclaiming liberty for you
  chosen_spanish: yo proclamo libertad para ustedes
  alternatives_spanish:
  - yo les proclamo libertad
  - yo estoy proclamando libertad para ustedes
  lexicon: HALOT
  rationale: 'El participio presente se vuelve en español una declaración viva y directa con ‘yo proclamo’. ‘Para ustedes’ refleja el dativo y sostiene la ironía: lo que se anuncia a favor de ellos es, en realidad, juicio.'
- source_word: אֶל הַחֶרֶב אֶל הַדֶּבֶר וְאֶל הָרָעָב
  english_pob_choice: to the sword, to the pestilence, and to the famine
  chosen_spanish: a la espada, a la peste y al hambre
  alternatives_spanish:
  - a la espada, a la pestilencia y al hambre
  - a la espada, a la plaga y al hambre
  lexicon: HALOT
  rationale: ‘Espada’ conserva el símbolo bélico; ‘peste’ traduce adecuadamente דֶבֶר en lenguaje profético sin sonar excesivamente técnico, y ‘hambre’ mantiene la lista de juicios con claridad natural en español.
- source_word: לְזַוֲעָה
  english_pob_choice: a horror
  chosen_spanish: en horror
  alternatives_spanish:
  - un horror
  - un objeto de horror
  - un terror
  lexicon: HALOT
  rationale: Se opta por una construcción natural en español que conserva el valor de estado/condición resultante. ‘En horror’ comunica que el pueblo quedará convertido en motivo de espanto para las naciones.
- source_word: מַמְלְכֹות הָאָרֶץ
  english_pob_choice: the kingdoms of the earth
  chosen_spanish: los reinos de la tierra
  alternatives_spanish:
  - los reinos del país
  - los reinos de la tierra entera
  lexicon: HALOT
  rationale: ‘Tierra’ preserva el alcance amplio e internacional de la frase, más allá de un territorio local. ‘Reinos’ mantiene el plural político del hebreo.
theological_decisions:
- issue: Ironía retórica de la repetición de דְרוֹר
  english_pob_reading: retain 'liberty' in both clauses
  chosen_spanish_reading: mantener ‘libertad’ en ambos miembros
  alternative_spanish_readings:
  - variar a ‘liberación’ en la segunda mención para evitar repetición
  - usar ‘libertad’ primero y ‘castigo’ después
  rationale: 'El hebreo repite el mismo término para subrayar la inversión irónica: no proclamaron libertad al prójimo, así que Yahvé proclama ‘libertad’ para ellos hacia juicio. Mantener la repetición en español preserva la tensión teológica y retórica.'
  doctrine_reference: Translation philosophy §5
- issue: 'Listado de juicio: espada, peste y hambre'
  english_pob_reading: to the sword, to the pestilence, and to the famine
  chosen_spanish_reading: a la espada, a la peste y al hambre
  alternative_spanish_readings:
  - a la espada, a la plaga y al hambre
  - a la guerra, a la enfermedad y al hambre
  rationale: Se conserva el trío clásico de juicios proféticos sin suavizarlo. ‘Peste’ respeta el registro bíblico del juicio divino y mantiene continuidad con el lenguaje de Jeremías.
  doctrine_reference: Translation philosophy §3
- issue: Forma masculina distributiva en el mandato previo de liberación
  english_pob_reading: each man to his brother and each man to his neighbor
  chosen_spanish_reading: cada hombre a su hermano y cada hombre a su prójimo
  alternative_spanish_readings:
  - cada uno a su hermano y cada uno a su prójimo
  - cada persona a su hermano y cada persona a su prójimo
  rationale: El hebreo usa אִישׁ en singular masculino distributivo en un contexto legal-social; por tanto, se conserva la referencia masculina explícita. ‘Cada hombre’ refleja con transparencia la forma del original sin neutralizarla indebidamente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con la auditoría inglesa de POB: se mantiene Yahvé, se preserva la repetición de ‘libertad’, y se conserva el trío de juicios con el cierre sobre ‘los reinos de la tierra’. No se requirieron revisiones respecto del pase más reciente.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como nombre divino principal en español.
  - ‘Libertad’ se conserva en ambas menciones para reproducir la ironía del hebreo.
  - ‘Peste’ se usa para דֶבֶר en coherencia con el registro profético del proyecto.
  - La construcción ‘cada hombre’ preserva el distributivo masculino del hebreo sin convertirlo en genérico neutral.
  - ‘Prójimo’ se eligió para רֵעַ por su naturalidad bíblica en español y su cercanía semántica a ‘neighbor’.
