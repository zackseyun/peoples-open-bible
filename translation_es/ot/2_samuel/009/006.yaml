review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea general: genealogía repetida, movimiento hacia David, doble gesto de reverencia y respuesta de Mefiboset. Sin embargo, dos decisiones no reflejan bien el expediente auditado: «se postró sobre su rostro» no es una forma natural ni la mejor equivalencia para וַיִּפֹּל עַל פָּנָיו, y «tu esclavo» contradice la decisión contextual documentada para עַבְדֶּךָ como fórmula cortesana de humildad ante un rey.'
  spanish_quality_summary: El español es mayormente claro, pero «se postró sobre su rostro» suena forzado en español bíblico natural; «cayó rostro en tierra» o «cayó sobre su rostro» preserva mejor la secuencia de dos verbos. Además, «tu esclavo» suena demasiado literal y menos idiomático en esta fórmula de autoabatimiento; «tu siervo» es más legible y más adecuado al registro eclesial amplio.
  glossary_alignment: 'No hay términos del glosario principal como Yahvé/Mesías en este versículo. La excepción relevante es el principio contextual para lenguaje de servidumbre: aunque el proyecto suele preferir términos fuertes como «esclavo» cuando la condición servil es prominente, aquí la justificación inglesa documenta explícitamente una excepción contextual equivalente a «your servant». En español, «tu siervo» alinea mejor con esa excepción documentada que «tu esclavo».'
  issues:
  - severity: medium
    issue: «se postró sobre su rostro» es una formulación poco natural para וַיִּפֹּל עַל פָּנָיו
    rationale: El hebreo describe primero caer sobre el rostro y luego inclinarse/postrarse. La redacción actual suena calca y además mezcla el valor del primer verbo con el segundo. «Cayó rostro en tierra» conserva el idiomatismo con español claro y distingue mejor los dos gestos.
  - severity: high
    issue: «tu esclavo» no sigue la decisión léxica-teológica auditada para עַבְדֶּךָ en este contexto
    rationale: El expediente inglés documenta que aquí no se enfatiza estatus jurídico de esclavitud sino fórmula cortesana de humildad ante el rey. En español eclesial neutral, «tu siervo» comunica esa función con fidelidad; «tu esclavo» introduce una dureza semántica que el propio audit trail decidió no foregroundear.
  - severity: low
    issue: La nota al pie repite una literalidad innecesaria y además quedaría desalineada tras la corrección de עַבְדֶּךָ
    rationale: Si el texto principal ya usa «He aquí, tu siervo», la nota debe explicar la fuerza presentativa de הִנֵּה o una alternativa como «Aquí está tu siervo», no una literalidad con «esclavo».
