  yaml_path: translation/ot/judges/004/014.yaml
  text: Then Deborah said to Barak[a], “Arise, for this is the day on which Yahweh has given Sisera into your hand. Has not Yahweh gone out before you?” So Barak went down from Mount Tabor[b], with ten thousand men following him.
