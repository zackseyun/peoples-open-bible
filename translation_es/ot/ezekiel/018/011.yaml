translation:
  language: es
  text: Aunque no ha hecho ninguna de todas estas cosas, ha comido incluso en los montes[a][b] y ha mancillado a la esposa de su prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, ha participado en comidas cultuales ilícitas en los lugares altos o santuarios de monte.
    reason: cultural_note
  - marker: b
    text: O «ha comido en los santuarios de los montes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: Though he
  chosen_spanish: Aunque no ha hecho...
  alternatives_spanish:
  - Pero él...
  - Y él...
  - Asumamos que él...
  lexicon: HALOT
  rationale: El hebreo introduce una oposición/concesión respecto del contexto inmediato. En español, «Aunque» reproduce mejor el valor concesivo que la revisión inglesa destacó para כִּי גַם, sin convertirlo en una simple adversativa.
- source_word: אֶת כָּל אֵלֶּה לֹא עָשָׂה
  english_pob_choice: has done none of all these things
  chosen_spanish: no ha hecho ninguna de todas estas cosas
  alternatives_spanish:
  - no ha hecho nada de todo esto
  - no ha hecho ninguna de estas cosas
  lexicon: HALOT
  rationale: «Ninguna de todas estas cosas» conserva el alcance total de כָּל אֵלֶּה y la negación completa. Se evita suavizar el énfasis comprehensivo del hebreo.
- source_word: אֶל הֶהָרִים אָכַל
  english_pob_choice: has even eaten on the mountains
  chosen_spanish: ha comido incluso en los montes
  alternatives_spanish:
  - ha comido en los montes
  - ha comido en los montes sagrados
  - ha comido en los santuarios de los montes
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de «los montes», como hizo el texto inglés, en vez de resolver de entrada el modismo en una interpretación explicativa. «Incluso» preserva el valor intensificador de גַם.
- source_word: אֵשֶׁת רֵעֵהוּ
  english_pob_choice: his neighbor’s wife
  chosen_spanish: la esposa de su prójimo
  alternatives_spanish:
  - la mujer de su prójimo
  - la esposa de su vecino
  - la mujer de su vecino
  lexicon: HALOT
  rationale: «Prójimo» comunica bien רֵעַ en registro bíblico y moral, mientras «esposa» refleja con precisión אֵשֶׁת. Se evita una formulación demasiado coloquial que debilitaría el tono legal-profético.
- source_word: טִמֵּא
  english_pob_choice: defiled
  chosen_spanish: ha profanado
  alternatives_spanish:
  - ha contaminado
  - ha mancillado
  - ha hecho impura
  lexicon: HALOT
  rationale: En contexto sexual/ritual, טמא combina profanación e impureza. «Profanado» conserva mejor la dimensión moral-ritual en español que «contaminado», y evita reducirlo solo a lo físico.
theological_decisions:
- issue: Cómo tratar el modismo «comer en los montes»
  english_pob_reading: Retain the literal phrase 'eaten on the mountains' in the main text, with footnote clarification about illicit cultic meals at high places.
  chosen_spanish_reading: Retener «comido incluso en los montes» en el texto principal, con nota explicativa sobre los lugares altos y sus banquetes ilícitos.
  alternative_spanish_readings:
  - ha comido en los santuarios de los montes
  - ha participado en banquetes idolátricos en los lugares altos
  rationale: La fuente hebrea usa una imagen concreta y el audit trail inglés optó por preservarla en el cuerpo del texto. La nota permite explicitar el sentido cultual sin reemplazar la imagen original.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés, que reemplazó una lectura demasiado contrastiva por una concesiva («Though»), y por eso el español inicia con «Aunque». También se preservó la imagen concreta de «los montes» con nota aclaratoria, conforme al tratamiento auditado del modismo.
  spanish_consistency_notes:
  - Se mantiene «prójimo» para רֵעַ, en consonancia con el registro ético-bíblico del pasaje.
  - Se usa «montes» en lugar de explicitar directamente «lugares altos» en el texto principal, para respetar la primacía de la forma hebrea.
  - «Profanado» conserva la carga moral-ritual del verbo sin diluirla en una simple infracción ética.
