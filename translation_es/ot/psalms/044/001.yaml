lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director de coro
  alternatives_spanish:
  - Al director de coro
  - Para el maestro de música
  lexicon: HALOT
  rationale: En los encabezados de los salmos, la expresión indica destinación o dedicación a quien dirige la ejecución musical. En español, «director de coro» comunica con claridad esa función litúrgico-musical sin introducir una interpretación más específica de la que permite el hebreo.
- source_word: לִבְנֵי
  english_pob_choice: Of the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Para los hijos de
  - Por los hijos de
  lexicon: HALOT
  rationale: La preposición hebrea puede expresar asociación, pertenencia, dedicación o autoría. «De los hijos de» conserva esa ambigüedad en español, en línea con la decisión auditada del texto inglés.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: Convención bíblica española
  rationale: En español bíblico es natural y reconocible la forma «Coré», que adapta el nombre propio al uso eclesial hispano sin alterar la referencia al personaje bíblico.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Un maskil
  alternatives_spanish:
  - Un salmo maskil
  - Una composición instructiva
  - Un salmo contemplativo
  lexicon: HALOT
  rationale: El término es oscuro y probablemente designa un tipo de composición o una indicación literaria/musical. Conviene transliterarlo para no resolver indebidamente su sentido; en español se conserva como préstamo técnico.
theological_decisions:
- issue: Sentido relacional del encabezado «de los hijos de Coré»
  english_pob_reading: Of the sons of Korah
  chosen_spanish_reading: De los hijos de Coré
  alternative_spanish_readings:
