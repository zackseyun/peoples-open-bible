translation:
  language: es
  text: 'Y Josafat dijo[a]: «¿No hay aquí un profeta de Yahvé, para que consultemos a Yahvé por medio de él?» Entonces uno de los siervos del rey de Israel respondió y dijo: «Aquí está Eliseo hijo de Safat[b], que vertió agua sobre las manos de Elías».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «para que busquemos a Yahvé de parte de él». El sentido es consultar a Yahvé por medio del profeta.
    reason: lexical_alternative
  - marker: b
    text: Esta expresión probablemente se refiere al servicio personal de Eliseo a Elías, y preserva la imagen hebrea de verter agua para el lavado de manos.
    reason: cultural_note
lexical_decisions:
- source_word: הַאֵין
  english_pob_choice: Is there no
  chosen_spanish: ¿No hay aquí... ?
  alternatives_spanish:
  - ¿No existe aquí... ?
  - ¿Acaso no hay aquí... ?
  lexicon: HALOT
  rationale: La pregunta negativa interrogativa se expresa de forma natural en español con «¿No hay... ?», conservando la fuerza de búsqueda de Josafat sin añadir énfasis innecesario.
- source_word: נָבִיא לַיהוָה
  english_pob_choice: prophet of Yahweh
  chosen_spanish: profeta de Yahvé
  alternatives_spanish:
  - profeta para Yahvé
  - profeta de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el estándar del proyecto. «De Yahvé» expresa pertenencia/relación profética de manera idiomática en español y evita reemplazar el nombre por una máscara litúrgica.
- source_word: וְנִדְרְשָׁה אֶת יְהוָה מֵאוֹתוֹ
  english_pob_choice: that we may inquire of Yahweh by him
  chosen_spanish: para que consultemos a Yahvé por medio de él
  alternatives_spanish:
  - para que busquemos a Yahvé por medio de él
  - para que consultemos a Yahvé mediante él
  lexicon: HALOT
  rationale: נדרשׁ aquí tiene el sentido de inquirir/consultar a Yahvé mediante mediación profética. «Consultar a Yahvé por medio de él» conserva esa mediación sin volverlo menos claro en español.
- source_word: אֶחָד מֵעַבְדֵי מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: one of the servants of the king of Israel
  chosen_spanish: uno de los siervos del rey de Israel
  alternatives_spanish:
  - uno de los servidores del rey de Israel
  - uno de los oficiales del rey de Israel
  lexicon: HALOT
  rationale: «עבד» en este contexto cortesano puede referirse a un servidor/siervo de la corte. Se elige «siervos» porque es suficientemente amplio y fiel al entorno real sin sugerir esclavitud chattel de manera obligatoria.
- source_word: פֹּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - aquí mismo
  - está aquí
  lexicon: HALOT
  rationale: Deíctico locativo directo y natural en ambos lugares del versículo.
- source_word: אֲשֶׁר יָצַק מַיִם עַל יְדֵי אֵלִיָּהוּ
  english_pob_choice: who poured water on the hands of Elijah
  chosen_spanish: el que derramaba agua sobre las manos de Elías
  alternatives_spanish:
  - el que derramó agua sobre las manos de Elías
  - que vertía agua sobre las manos de Elías
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea del servicio personal de derramar agua sobre las manos. «Derramaba» expresa con naturalidad el valor descriptivo del relativo y preserva la relación de servicio sin sustituirla por una paráfrasis como «asistente».
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton, y el estándar del proyecto pide «Yahvé» en el texto principal. Se evita «SEÑOR» como máscara, preservando el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente del POB inglés al optar por un equivalente formal y cercano en español para «consultar a Yahvé por medio de él», y se mantuvo el valor descriptivo del participio relativo en la cláusula sobre Elías sin convertirlo en una paráfrasis habitual.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se prefirió «siervos» en el contexto cortesano para עבד, por ser natural en español y suficientemente amplio.
  - Se preservó la imagen concreta de derramar agua sobre las manos, sin reemplazarla por una interpretación explicativa.
