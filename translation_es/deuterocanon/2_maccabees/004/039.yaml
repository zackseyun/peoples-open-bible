  yaml_path: translation/deuterocanon/2_maccabees/004/039.yaml
  text: But when many acts of temple robbery had been committed in the city by Lysimachus[a], with the consent of Menelaus, and the report had spread outside, the crowd gathered against Lysimachus[b], since much gold had already been plundered.
