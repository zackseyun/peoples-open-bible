review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia narrativa del hebreo: el rey Jehoiaquim, sus hombres y los oficiales oyen las palabras de Urías; el rey procura matarlo; Urías oye, teme, huye y va a Egipto. Sin embargo, hay varios problemas de fidelidad formal y de anclaje: falta la preposición en ''oyeron sus palabras'', hay una nota b anclada en ''Urías'' aunque explica ''fue a Egipto'', y el texto contiene un marcador editorial incorrecto ''[oíron]''. También conviene ajustar el nombre real a la forma española más reconocible ''Joacim'' para יְהוֹיָקִים.'
  spanish_quality_summary: El español es generalmente claro y legible, pero la puntuación con comas innecesarias y el marcador '[oíron]' dificultan la fluidez. 'Sus valientes' es entendible, aunque algo elíptico; puede mantenerse por concisión. 'Buscó matarlo', 'tuvo miedo', 'huyó' y 'fue a Egipto' son naturales y fieles.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales están bien encaminadas. 'Oficiales' encaja bien para הַשָּׂרִים. 'Valientes' es aceptable para גִּבּוֹרָיו aunque 'hombres valientes' sería más explícito; no es necesario imponer cambio. Se corrige el nombre propio a 'Joacim' por uso bíblico español más estándar.
  issues:
  - severity: high
    issue: El texto tiene un marcador intruso '[oíron]' y omite la preposición en 'oyeron sus palabras'.
    rationale: 'El hebreo אֶת דְּבָרָיו exige objeto directo claro: en español natural debe ser ''oyeron sus palabras'' o mejor ''oyeron sus palabras'' sin corchetes intrusos y con sintaxis limpia: ''oyeron sus palabras''. El texto actual queda malformado.'
  - severity: high
    issue: La nota [b] está anclada en 'Urías' pero su contenido explica 'fue a Egipto'.
    rationale: Las notas deben anclarse exactamente en la palabra o frase relevante. El contenido de la nota trata de וַיָּבֹא / 'fue a Egipto', no del nombre Urías.
  - severity: medium
    issue: La forma 'Joaquim' no es la opción española bíblica más natural para יְהוֹיָקִים.
    rationale: En español bíblico general, 'Joacim' es la forma más reconocible y ampliamente usada para Jehoiakim/Jehoiaquim. 'Joaquim' puede leerse como forma catalana/portuguesa o nombre moderno ajeno al registro bíblico.
  - severity: low
    issue: La puntuación con comas alrededor de los sujetos coordinados suena poco natural en español.
    rationale: 'Aunque refleja el ritmo del inglés auditado, en español fluye mejor sin esas comas: ''Cuando el rey Joacim, todos sus valientes y todos los oficiales oyeron...'' o con una sola coma tras la cláusula temporal.'
  revised_spanish_text: Cuando el rey Joacim[a], todos sus valientes y todos los oficiales oyeron sus palabras, el rey buscó matarlo. Pero cuando Urías oyó, tuvo miedo, huyó y fue a Egipto[b].
  revised_footnotes:
  - marker: a
    text: '''Joacim'' sigue la forma española bíblica usual para יְהוֹיָקִים; en este contexto se refiere al rey de Judá.'
    reason: source_note
  - marker: b
    text: Literalmente, 'vino a Egipto'; en español se vierte naturalmente como 'fue a Egipto'.
    reason: lexical_alternative
  revision_rationale: 'Se corrigieron errores formales y de anclaje sin alterar el sentido: se eliminó el marcador intruso ''[oíron]'', se normalizó la sintaxis y la puntuación españolas, se reubicó la nota sobre ''vino/fue a Egipto'' al lugar correcto, y se ajustó ''Joaquim'' a ''Joacim'' por uso bíblico español más estándar. El resto de las decisiones léxicas se mantiene por ser fieles y naturales.'
