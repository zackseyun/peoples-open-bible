translation:
  language: es
  text: 'Y Yahvé dijo: «¿Es correcto[a] que te enojes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿Haces bien en enojarte?»'
