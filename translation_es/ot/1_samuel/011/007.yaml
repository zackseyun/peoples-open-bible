translation:
  language: es
  text: 'Entonces tomó un yugo de bueyes[a] y los cortó en pedazos, y los envió por todo el territorio de Israel por medio de los mensajeros[b], diciendo: «A cualquiera que no salga tras Saúl y tras Samuel, así se hará con sus bueyes». Entonces cayó el pavor de Yahvé[c] sobre el pueblo, y salieron como un solo hombre[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una pareja de bueyes».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «por la mano de los mensajeros», un modismo que significa «por medio de los mensajeros».'
    reason: cultural_note
  - marker: c
    text: O «el temor de Yahvé cayó sobre el pueblo». Aquí el sentido probablemente es un pavor enviado por Dios que los movió a actuar.
    reason: alternative_reading
  - marker: d
    text: 'Hebreo: «como un solo hombre», un modismo de acción unificada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צֶמֶד בָּקָר
  english_pob_choice: a yoke of oxen
  chosen_spanish: un yugo de bueyes
  alternatives_spanish:
  - una pareja de bueyes
  - un yugo de ganado
  lexicon: HALOT
  rationale: צֶמֶד nombra una pareja o yugo; con בָּקָר se refiere a bueyes/ganado de labor. 'Un yugo de bueyes' conserva la imagen agrícola y es natural en español bíblico contemporáneo.
- source_word: וַיְנַתְּחֵהוּ
  english_pob_choice: cut them in pieces
  chosen_spanish: los cortó en pedazos
  alternatives_spanish:
  - los despedazó
  - los cortó
  lexicon: HALOT
  rationale: El verbo נתּח significa cortar en partes. Aunque el sufijo singular en hebreo remite al yugo/pareja, el sentido en español debe reflejar a los animales; 'los cortó en pedazos' conserva la fuerza gráfica sin exagerar con 'desmembró'.
- source_word: בְּכָל גְּבוּל יִשְׂרָאֵל
  english_pob_choice: throughout all the territory of Israel
  chosen_spanish: por todo el territorio de Israel
  alternatives_spanish:
  - por toda la frontera de Israel
  - por todo Israel
  lexicon: HALOT
  rationale: גְּבוּל aquí tiene sentido distributivo de región/territorio, no solo borde. 'Territorio' comunica bien el alcance geográfico en español.
- source_word: בְּיַד הַמַּלְאָכִים
  english_pob_choice: by the hand of the messengers
  chosen_spanish: por medio de los mensajeros
  alternatives_spanish:
  - por la mano de los mensajeros
  - a través de los mensajeros
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática de agencia. En español, 'por medio de' comunica esa función sin sonar forzado, aunque conserva el sentido de intermediación de los mensajeros.
- source_word: אַחֲרֵי שָׁאוּל וְאַחַר שְׁמוּאֵל
  english_pob_choice: after Saul and after Samuel
  chosen_spanish: tras Saúl y tras Samuel
  alternatives_spanish:
  - siguiendo a Saúl y a Samuel
  - detrás de Saúl y detrás de Samuel
  lexicon: HALOT
  rationale: אַחֲרֵי/אַחַר con 'salir' expresa seguir a líderes. 'Tras' es breve, fiel y mantiene la simetría del hebreo.
- source_word: כֹּה יֵעָשֶׂה לִבְקָרוֹ
  english_pob_choice: so shall it be done to his oxen
  chosen_spanish: así se hará con sus bueyes
  alternatives_spanish:
  - así se hará con su ganado
  - así se hará con sus bueyes
  lexicon: HALOT
  rationale: בָּקָר puede ser ganado en general, pero el contexto inmediato remite a los mismos animales despedazados. 'Sus bueyes' mantiene la correspondencia visual y narrativa; el posesivo en español expresa el referente implícito del sufijo hebreo.
- source_word: פַּחַד יְהוָה
  english_pob_choice: the dread of Yahweh
  chosen_spanish: el pavor de Yahvé
  alternatives_spanish:
  - el temor de Yahvé
  - el terror de Yahvé
  lexicon: HALOT
  rationale: פַּחַד puede ser temor, pavor o terror. En este contexto narrativo se trata de un temor impuesto por Dios que provoca obediencia inmediata; 'pavor' transmite mejor la intensidad que un mero 'temor' reverencial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé', conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: כְּאִישׁ אֶחָד
  english_pob_choice: as one man
  chosen_spanish: como un solo hombre
  alternatives_spanish:
  - con un solo ánimo
  - unánimemente
  lexicon: HALOT
  rationale: El hebreo es un modismo de acción unificada. 'Como un solo hombre' preserva la imagen masculina singular y es idiomático en español.
theological_decisions:
- issue: Sentido de פַּחַד יְהוָה
  english_pob_reading: a fear/dread sent by Yahweh that came upon the people
  chosen_spanish_reading: un pavor enviado por Yahvé que cayó sobre el pueblo
  alternative_spanish_readings:
  - el temor reverente del pueblo hacia Yahvé
  - un terror causado por Yahvé
  rationale: El contexto narrativo explica la movilización inmediata del pueblo; por eso la frase se entiende como un temor impuesto por Dios, no como mera reverencia religiosa. 'Cayó sobre el pueblo' conserva la imagen del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de כְּאִישׁ אֶחָד
  english_pob_reading: as one man
  chosen_spanish_reading: como un solo hombre
  alternative_spanish_readings:
  - de común acuerdo
  - unidos
  rationale: El hebreo mantiene la forma masculina singular para enfatizar unidad. Se conserva esa imagen en el texto principal en lugar de neutralizarla.
  doctrine_reference: Gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: The Spanish draft follows the latest high-agreement English POB audit trail with no applied revisions; choices are aligned with the final approved source analysis and preserve documented ambiguities in footnotes.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה.
  - '''Bueyes'' se mantiene en el cuerpo principal para preservar la imagen del sacrificio amenazante y la referencia inmediata del contexto.'
  - '''Por medio de'' resuelve el hebraísmo בְּיַד sin perder el sentido de agencia.'
  - '''Como un solo hombre'' conserva la metáfora unitaria y la fuerza narrativa del final del versículo.'
