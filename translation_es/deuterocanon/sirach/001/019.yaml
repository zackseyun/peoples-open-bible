  - severity: low
    issue: Ligera tensión entre 'vara' y 'apoyo' en la imaginería.
    rationale: No es un error, pero 'bastón de fortaleza y apoyo' crea un paralelismo más natural en español, ya que 'bastón' se asocia más claramente con algo en lo que uno se apoya.
