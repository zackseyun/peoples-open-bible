    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - La demás parte de
  lexicon: HALOT
  rationale: יֶתֶר expresa 'resto' o 'remanente'. El valor conjuntivo inicial funciona aquí como transición narrativa; 'Ahora' preserva ese giro de fórmula regia en español natural.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - obras
  - palabras
  lexicon: HALOT
  rationale: En esta fórmula regia, דִּבְרֵי no remite a 'palabras' sino al conjunto de acciones o hechos registrados del rey. 'Hechos' suena más natural en español que 'actos' y conserva la referencia a la conducta histórica.
- source_word: מְנַחֵם
  english_pob_choice: Menahem
  chosen_spanish: Menahem
  alternatives_spanish:
  - Menajem
  lexicon: transliteration
  rationale: Nombre propio transliterado de manera estándar. Se mantiene la forma usual en español bíblico, sin reinterpretación.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo cuanto hizo
  - y todo lo que realizó
  lexicon: HALOT
  rationale: La cláusula relativa se rinde de forma directa y transparente. 'Todo lo que hizo' preserva la amplitud total de la expresión hebrea sin sobreinterpretarla.
- source_word: הֲלוֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no están escritos
  alternatives_spanish:
  - ¿no se hallan escritos
  - ¿no quedan escritos
  lexicon: HALOT
  rationale: Se conserva la pregunta retórica con expectativa de respuesta afirmativa. 'Están escritos' mantiene el valor pasivo de כְּתוּבִים con claridad en español.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - en el registro
  lexicon: HALOT
  rationale: Aunque עַל es literalmente 'sobre', la fórmula archivística pide un equivalente idiomático en español. 'En el Libro' reproduce la convención de documento escrito sin perder transparencia.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: the Book of the Chronicles
  chosen_spanish: el Libro de las Crónicas
  alternatives_spanish:
  - el libro de los anales
  - el libro de las memorias
  lexicon: HALOT
  rationale: La expresión apunta a un registro oficial/annalístico. 'Crónicas' sigue la convención bíblica conocida y refleja adecuadamente el sentido de un libro de registros históricos.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  - perteneciente a los reyes de Israel
  lexicon: HALOT
  rationale: El ל final forma parte del título del documento de referencia. 'De los reyes de Israel' conserva la relación titular de manera natural y fiel.
theological_decisions:
- issue: Naturaleza del libro citado
  english_pob_reading: the Book of the Chronicles / the book of the annals of the kings of Israel
  chosen_spanish_reading: el Libro de las Crónicas / el libro de los anales de los reyes de Israel
  alternative_spanish_readings:
  - el libro de los registros
  - el libro de las memorias
  rationale: 'No hay decisión doctrinal, pero sí una cuestión terminológica histórica: el hebreo alude a un registro oficial de reinado. Se conserva ''Crónicas'' en el texto principal y se deja abierta la alternativa ''anales'' para reflejar la opción del audit trail inglés.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto sigue de cerca la fórmula regia del hebreo y concuerda con el audit trail inglés, que no registra revisiones sustantivas. Se conserva la pregunta retórica y el título documental tradicional, con una nota alternativa para 'anales'.
  spanish_consistency_notes:
  - Se mantuvo 'Libro' con mayúscula por tratarse del título del documento citado.
  - '''Menahem'' se translitera de forma uniforme y sin adaptación innecesaria.'
  - Se evitó 'SEÑOR' u otras máscaras porque el versículo no contiene el nombre divino.
  - '''Hechos'' se eligió para דִּבְרֵי por naturalidad, aunque ''palabras'' sería la opción literal; aquí la fórmula histórica exige un sentido de actos registrados.'
