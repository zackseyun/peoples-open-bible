translation:
  language: es
  text: Un caballo está preparado para el día de la batalla[a], pero la victoria pertenece a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'salvación' o 'liberación pertenece a Yahvé'. El término hebreo puede denotar rescate en sentido amplio; aquí 'victoria' encaja con el contexto de batalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּס
  english_pob_choice: horse
  chosen_spanish: caballo
  alternatives_spanish:
  - caballo de guerra
  lexicon: HALOT
  rationale: El hebreo nombra un caballo en general; el matiz militar lo aporta el complemento 'para el día de la batalla'. 'Caballo' conserva la brevedad proverbial sin añadir un término más específico que el texto no exige.
- source_word: מוּכָן
  english_pob_choice: is prepared
  chosen_spanish: está preparado
  alternatives_spanish:
  - está listo
  - está dispuesto
  lexicon: HALOT
  rationale: El participio pasivo expresa un estado de preparación. 'Está preparado' refleja bien esa pasividad y suena natural en español.
- source_word: לְיוֹם
  english_pob_choice: for the day
  chosen_spanish: para el día
  alternatives_spanish:
  - para un día
  - para el día de
  lexicon: HALOT
  rationale: La preposición ל indica finalidad o referencia. 'Para el día' mantiene la fórmula breve del hebreo y enlaza de manera natural con el complemento siguiente.
- source_word: מִלְחָמָה
  english_pob_choice: battle
  chosen_spanish: batalla
  alternatives_spanish:
  - guerra
  lexicon: HALOT
  rationale: '''Batalla'' es más idiomático en español en esta construcción y conserva el sentido de enfrentamiento concreto. ''Guerra'' sería posible, pero suena más amplio y menos proverbial en este contexto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino en español: ''Yahvé''. Así se preserva el Tetragrámaton sin sustituirlo por una convención de ocultamiento.'
- source_word: הַתְּשׁוּעָה
  english_pob_choice: victory
  chosen_spanish: la victoria
  alternatives_spanish:
  - la salvación
  - el rescate
  - la liberación
  lexicon: HALOT
  rationale: En este proverbio militar, תְּשׁוּעָה puede abarcar rescate o liberación, pero el contraste con la preparación para la batalla favorece 'victoria'. En español, 'la victoria pertenece a Yahvé' comunica con precisión la fuerza contextual sin perder la amplitud del término.
theological_decisions:
- issue: Sentido de תְּשׁוּעָה en un proverbio de guerra
  english_pob_reading: victory belongs to Yahweh
  chosen_spanish_reading: la victoria pertenece a Yahvé
  alternative_spanish_readings:
  - la salvación pertenece a Yahvé
  - la liberación pertenece a Yahvé
  rationale: 'El contexto inmediato es bélico: un caballo preparado para la batalla. Por eso ''victoria'' transmite mejor el resultado decisivo que pertenece a Yahvé, sin negar que el término hebreo pueda abarcar salvación o liberación en otros contextos.'
  doctrine_reference: HALOT / contexto inmediato del proverbio
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo usa directamente el nombre divino. En español, 'Yahvé' preserva la referencia al Tetragrámaton conforme al estándar del proyecto y evita reemplazarlo por una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue el contexto hebreo directo y coincide con el audit trail inglés en la lectura contextual de תְּשׁוּעָה como 'victory', pero ajusta el nombre divino al estándar español del proyecto ('Yahvé' en lugar de 'the LORD'). No se detectan revisiones aplicadas en la fuente de auditoría.
  spanish_consistency_notes:
  - 'Se mantuvo un registro proverbial breve y paralelo: sustantivo + participio + complemento de finalidad, luego contraste con la segunda cola.'
  - '''Batalla'' y ''victoria'' forman una pareja semántica natural en español y conservan el tono militar del hebreo.'
  - Se evitó 'SEÑOR' para יהוה según el criterio del proyecto; 'Yahvé' queda en mayúscula inicial como nombre propio.
