translation:
  language: es
  text: Y el límite occidental era el Mar Grande como límite[a]. Este era el límite de los hijos de Judá por todos lados[b], según sus clanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el mar, el Mar Grande»; es decir, el mar Mediterráneo, que marca el lado occidental de Judá.'
    reason: cultural_note
  - marker: b
    text: O «según sus familias». El término hebreo se refiere a agrupaciones clánicas dentro de la tribu.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּגְבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - linde
  lexicon: HALOT
  rationale: גְּבוּל designa una demarcación territorial. En español, 'límite' resulta natural y preciso en una descripción de repartos territoriales; evita la posible rigidez de 'frontera' y conserva el valor de línea delimitadora.
- source_word: יָם / הַיָּמָּה
  english_pob_choice: western
  chosen_spanish: occidental
  alternatives_spanish:
  - del lado del mar
  - hacia el mar
  - occidente
  lexicon: HALOT
  rationale: En contextos de límites, la forma con יָם y el sufijo direccional apunta al lado del mar, es decir, al oeste. 'Occidental' expresa esa dirección de manera clara y sobria en español.
- source_word: הַגָּדוֹל
  english_pob_choice: Great
  chosen_spanish: Grande
  alternatives_spanish:
  - grande
  lexicon: HALOT
  rationale: Con 'Mar', el adjetivo forma la designación estable 'Mar Grande', equivalente del nombre geográfico convencional del Mediterráneo. Se mantiene mayúscula por tratarse de un topónimo tradicional.
- source_word: וּגְבוּל
  english_pob_choice: as a border
  chosen_spanish: como límite
  alternatives_spanish:
  - y como límite
  - como frontera
  lexicon: HALOT
  rationale: El hebreo repite גְּבוּל en aposición concisa. 'Como límite' transmite esa función sin forzar una traducción literal torpe en español.
- source_word: זֶה
  english_pob_choice: This was
  chosen_spanish: Este era
  alternatives_spanish:
  - Esto era
  - Este es
  lexicon: HALOT
  rationale: El hebreo es nominal; el copulativo se suministra en español. El imperfecto 'era' encaja con la descripción narrativa del reparto territorial.
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los descendientes de Judá
  - el pueblo de Judá
  lexicon: HALOT
  rationale: Se conserva la expresión filial masculina del hebreo, que nombra de forma corporativa a la tribu. 'Hijos de Judá' mantiene la forma y el peso lexical del original.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en derredor
  lexicon: HALOT
  rationale: '''סָבִיב'' resume la extensión envolvente del límite. ''Alrededor'' es el equivalente natural y actual en español.'
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus familias
  - conforme a sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en repartos tribales suele referirse a unidades clánicas internas. 'Clanes' comunica mejor ese nivel de organización que 'familias' en español moderno, y 'según' expresa la distribución conforme a esa estructura.
theological_decisions:
- issue: Tribal designation with masculine plural 'sons of Judah'
  english_pob_reading: the sons of Judah
  chosen_spanish_reading: los hijos de Judá
  alternative_spanish_readings:
  - los descendientes de Judá
  - el pueblo de Judá
  rationale: 'No hay un problema doctrinal, pero sí una decisión de fidelidad formal: el hebreo usa una expresión filial masculina plural que designa a la tribu. Se preserva esa forma en español en vez de neutralizarla.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Se revisó la versión inglesa aprobada y no se detectaron cambios sustantivos en la evaluación más reciente; por eso la redacción española sigue de cerca el sentido auditado, sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se conserva «Mar Grande» como nombre geográfico establecido, no como simple adjetivo.
  - Se usa «hijos de Judá» para reflejar la pluralidad masculina del hebreo y su valor corporativo tribal.
  - «Clanes» se emplea para מִשְׁפְּחֹתָם en coherencia con contextos de repartos territoriales.
  - La puntuación reproduce la segmentación discursiva del hebreo y del texto inglés auditado.
