translation:
  language: es
  text: Un mal amigo mira[a] hacia la mesa, pero en tiempo de angustia[b] se pondrá aparte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «tiene los ojos puestos en la mesa»; es decir, está presente por los beneficios del banquete o de la convivencia.
    reason: lexical_alternative
  - marker: b
    text: Lit. «estará enfrente» o «se pondrá enfrente»; el hebreo y el griego también permiten la idea de oponerse. Aquí se sigue la opción editorial de expresar que se aparta en el tiempo de necesidad.
    reason: alternative_reading
lexical_decisions:
- source_word: מרע
  english_pob_choice: a bad friend
  chosen_spanish: un mal amigo
  alternatives_spanish:
  - un amigo malo
  - un amigo dañino
  lexicon: HALOT
  rationale: El hebreo describe a la persona como mala en su función relacional; «mal amigo» conserva el juicio moral y suena natural en español sin suavizar el valor evaluativo.
- source_word: אוהב
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - compañero
  - el que ama
  lexicon: HALOT
  rationale: En este contexto funciona como sustantivo social, no como verbo o participio afectivo. «Amigo» mantiene la relación interpersonal que también sugiere el paralelo griego φίλου.
- source_word: מביט אל שלחן
  english_pob_choice: looks to the table
  chosen_spanish: mira la mesa
  alternatives_spanish:
  - tiene la vista puesta en la mesa
  - mira hacia la mesa
  lexicon: HALOT
  rationale: La imagen concreta de la mesa debe conservarse. En español, «mira la mesa» es breve y legible; el sentido de interés por la ganancia o el banquete queda implícito, como en el audit trail inglés.
- source_word: שׁלחן
  english_pob_choice: table
  chosen_spanish: mesa
  alternatives_spanish:
  - banquete
  - comida
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto. Aunque el contexto apunta a la mesa del convite o de la provisión, «mesa» preserva mejor la imagen textual.
- source_word: בעת מצוקה
  english_pob_choice: in a time of distress
  chosen_spanish: en tiempo de angustia
  alternatives_spanish:
  - en tiempo de dificultad
  - en un tiempo de aflicción
  lexicon: HALOT
  rationale: מצוקה expresa estrechez, aflicción o angustia. «Angustia» comunica bien la presión de la situación y encaja con el contraste con la mesa/prosperidad.
- source_word: מנגד יעמד
  english_pob_choice: he will stand aloof
  chosen_spanish: se pondrá aparte
  alternatives_spanish:
  - se mantendrá distante
  - se quedará aparte
  - estará en contra
  lexicon: HALOT
  rationale: El hebreo y el griego paralelo permiten la idea de estar enfrente/opuesto, pero la revisión inglesa prefirió «stand aloof» para expresar apartamiento en la adversidad. En español, «se pondrá aparte» conserva esa distancia sin perder por completo la posible tensión de oposición.
theological_decisions:
- issue: Sentido de la postura en la adversidad
  english_pob_reading: will stand aloof; Hebrew 'stand opposite'; Greek 'will be opposite'
  chosen_spanish_reading: se pondrá aparte
  alternative_spanish_readings:
  - se mantendrá distante
  - estará en contra
  - se pondrá enfrente
  rationale: No conviene borrar la tensión documentada entre mera indiferencia y posible oposición. «Se pondrá aparte» deja abierta la lectura de distanciamiento, que es la opción editorial final del inglés, sin eliminar por completo la fuerza de 'opuesto'.
  doctrine_reference: Sabiduría práctica sobre la fidelidad en la amistad; no doctrinal
translation_notes:
  revision_awareness: La versión inglesa final cambió de «stand opposite» a «stand aloof» para expresar con más naturalidad el apartamiento en la adversidad. La traducción española sigue esa decisión final, pero conserva en nota la posibilidad literal de estar enfrente/opuesto respaldada por hebreo y griego.
  spanish_consistency_notes:
  - Se usa «amigo» para אוהב conforme al valor relacional del término en este contexto.
  - Se mantiene «mesa» en lugar de una paráfrasis como «banquete» para conservar la imagen concreta.
  - «Angustia» traduce מצוקה con un registro natural y sobrio.
  - No se introduce «SEÑOR» ni terminología doctrinal ajena al versículo.
  - La nota sobre el segundo hemistiquio preserva la tensión semántica entre apartamiento y oposición.
