  rationale: The Greek text explicitly says ἐπὶ τῆς Συρίας, so the translation follows the source rather than harmonizing to the more familiar Daniel setting in English tradition. The referent is still clearly the three youths from Daniel 3.
  doctrine_reference: Original-language primacy over translation tradition
- issue: Gender rendering of ἀδελφοὶ
  chosen_reading: brothers
  alternative_readings:
