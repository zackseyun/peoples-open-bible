translation:
  text: 'And it was revealed to me, brothers, while I was asleep, by a very handsome young man who said
    to me: “The old woman, from whom you received the little book—who do you think she is?” I said, “The
    Sibyl.” “You are mistaken,” he says; “she is not.” “Then who is she?” I say. “The Church,” he says.
    I said to him, “Why then is she old?” “Because,” he says, “she was created first of all; for this
    reason she is old, and for her sake the world was formed.”'
