translation:
  language: es
  text: Allí celebraron un banquete de salvación[a], pues el rey había provisto generosamente a cada uno de todo lo necesario para el viaje hasta su propia casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «banquete de liberación» o «festín de salvación». El griego vincula explícitamente la celebración con su rescate.
    reason: lexical_alternative
lexical_decisions:
- source_word: πότον
  english_pob_choice: banquet
  chosen_spanish: banquete
  alternatives_spanish:
  - festín
  - comida festiva
  - banquete de bebida
  lexicon: LSJ
  rationale: En este contexto, πότον no es simplemente «bebida», sino una celebración/comida festiva. «Banquete» conserva el sentido de evento celebrativo en español sin volver el texto pesado.
- source_word: σωτήριον
  english_pob_choice: saving
  chosen_spanish: de salvación
  alternatives_spanish:
  - salvador
  - para liberación
  - de liberación
  lexicon: LSJ
  rationale: El adjetivo vincula el banquete con la liberación obtenida. «De salvación» mantiene la conexión explícita con σωτήριον y su carga soteriológica, sin decidir de más si el énfasis es divino o circunstancial.
- source_word: χορηγήσαντος
  english_pob_choice: had generously supplied
  chosen_spanish: había proveído generosamente
  alternatives_spanish:
  - había suministrado
  - había proporcionado
  - había abastecido
  lexicon: LSJ
  rationale: El verbo sugiere proporcionar con liberalidad. «Había proveído generosamente» preserva la idea de suministro amplio y benévolo, en un español natural y solemne.
- source_word: εὐψύχως
  english_pob_choice: generously
  chosen_spanish: generosamente
  alternatives_spanish:
  - de buena gana
  - con ánimo generoso
  - de corazón
  lexicon: LSJ
  rationale: Aunque literalmente remite a buen ánimo o buen corazón, aquí modifica la provisión real del rey; «generosamente» transmite bien la disposición favorable y el carácter liberal del acto.
- source_word: τὰ πρὸς τὴν ἄφιξιν πάντα
  english_pob_choice: everything for the journey
  chosen_spanish: todo lo necesario para el viaje
  alternatives_spanish:
  - todas las cosas para la llegada
  - todo lo necesario para el arribo
  - todas las provisiones para la llegada
  lexicon: LSJ
  rationale: La frase apunta a lo requerido para llegar a destino. «Todo lo necesario para el viaje» es idiomático en español y conserva la idea de provisión completa para el trayecto.
- source_word: ἑκάστῳ
  english_pob_choice: each of them
  chosen_spanish: a cada uno
  alternatives_spanish:
  - para cada uno
  - a cada uno de ellos
  lexicon: LSJ
  rationale: El dativo distributivo exige explicitar la distribución individual. «A cada uno» suena natural y mantiene la entrega personal de los recursos.
- source_word: ἕως ἐπὶ τὴν ἰδίαν οἰκίαν
  english_pob_choice: all the way to his own house
  chosen_spanish: hasta su propia casa
  alternatives_spanish:
  - hasta su propia vivienda
  - hasta llegar a su propia casa
  - hasta su propia morada
  lexicon: LSJ
  rationale: La frase indica alcance hasta la casa propia de cada uno. En español, «hasta su propia casa» reproduce bien la extensión del suministro sin forzar una paráfrasis.
theological_decisions:
- issue: Relación entre σωτήριον y la liberación obtenida
  english_pob_reading: The Greek links the celebration explicitly with their rescue.
  chosen_spanish_reading: El banquete es presentado como de salvación, vinculado explícitamente con su liberación.
  alternative_spanish_readings:
  - banquete de liberación
  - banquete salvador
  - banquete para salvación
  rationale: No se neutraliza el enlace soteriológico del término; se conserva una formulación que permite leer el banquete como celebración de la liberación recibida, sin imponer una explicación doctrinal extra al texto.
  doctrine_reference: Soteriología bíblica; liberación/ спасación en contexto narrativo
- issue: Alcance distributivo de la provisión real
  english_pob_reading: the king had generously supplied each of them with everything for the journey, all the way to his own house
  chosen_spanish_reading: el rey les había proveído generosamente de todo lo necesario para el viaje, hasta su propia casa, a cada uno
  alternative_spanish_readings:
  - el rey les había provisto generosamente de todo lo necesario para el viaje, hasta su propia casa, para cada uno
  - el rey había suministrado con generosidad a cada uno todo lo necesario hasta llegar a su casa
  rationale: El griego distribuye la provisión a cada individuo. La redacción española mantiene ese matiz distributivo para no perder el sentido de cobertura personal y completa.
  doctrine_reference: Providencia y liberalidad del gobernante en el relato
translation_notes:
  revision_awareness: La versión inglesa revisada aclaró que la provisión se extendía «all the way to his own house». En español se reflejó con «hasta su propia casa», manteniendo además el matiz distributivo de ἑκάστῳ con «a cada uno».
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en otras secciones cuando el texto lo requiera, pero este versículo no contiene el nombre divino.
  - «Banquete de salvación» conserva la tensión entre celebración festiva y rescate; no se redujo a una simple comida.
  - Se evitó «Cristo»/«Mesías» porque no aparece el término en este versículo.
  - La puntuación española separa claramente la cláusula causal con «pues», conservando la sintaxis del griego sin calco rígido.
