translation:
  language: es
  text: Y los hijos de Israel lloraron por Moisés en los llanos de Moab durante treinta días; los días del llanto[a], el duelo por Moisés, llegaron a su fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «los hijos de Israel lloraron por Moisés en los llanos de Moab durante treinta días, y los días del llanto y del duelo por Moisés llegaron a su fin».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבְכּוּ
  english_pob_choice: wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - lloraron de dolor
  - lamentaron
  lexicon: HALOT
  rationale: בכה expresa llorar/llorar en duelo. En español, 'lloraron' es natural y distingue el acto de llorar del sustantivo posterior 'duelo'.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: La estructura hebrea es literal 'hijos de Israel'. 'Hijos de Israel' conserva mejor la forma fuente que 'israelitas'.
- source_word: אֶת מֹשֶׁה
  english_pob_choice: for Moses
  chosen_spanish: por Moisés
  alternatives_spanish:
  - a Moisés
  - de Moisés
  lexicon: HALOT
  rationale: Con llorar/llorar por, el complemento en español se expresa idiomáticamente con 'por', reflejando que el llanto se dirige a la persona fallecida.
- source_word: בְּעַרְבֹת מוֹאָב
  english_pob_choice: in the plains of Moab
  chosen_spanish: en los llanos de Moab
  alternatives_spanish:
  - en las llanuras de Moab
  - en la estepa de Moab
  lexicon: HALOT
  rationale: עֲרָבוֹת se refiere a región de llanura/estepa. 'Llanos de Moab' mantiene claridad geográfica sin sobreexplicar.
- source_word: שְׁלֹשִׁים יוֹם
  english_pob_choice: thirty days
  chosen_spanish: durante treinta días
  alternatives_spanish:
  - por treinta días
  - treinta días
  lexicon: HALOT
  rationale: El hebreo marca duración. 'Durante treinta días' comunica de forma natural la extensión temporal del llanto.
- source_word: וַיִּתְּמוּ
  english_pob_choice: were ended
  chosen_spanish: se cumplieron
  alternatives_spanish:
  - terminaron
  - llegaron a su fin
  lexicon: HALOT
  rationale: תם expresa llegar a término/completarse. 'Se cumplieron' conserva el valor de cumplimiento o consumación más cercano al hebreo y encaja bien con 'los días'.
- source_word: יְמֵי בְכִי
  english_pob_choice: the days of weeping
  chosen_spanish: los días del llanto
  alternatives_spanish:
  - los días de llanto
  - los días de llorar
  lexicon: HALOT
  rationale: בכי nombra llanto/weeping. 'Llanto' funciona como sustantivo natural en español y mantiene el matiz de duelo.
- source_word: אֵבֶל מֹשֶׁה
  english_pob_choice: the mourning of Moses
  chosen_spanish: el duelo por Moisés
  alternatives_spanish:
  - el luto por Moisés
  - el duelo de Moisés
  lexicon: HALOT
  rationale: אֵבֶל denota duelo/luto por un fallecido. En español, 'duelo por Moisés' comunica mejor el sentido que un calco como 'duelo de Moisés'.
theological_decisions:
- issue: Relación entre el llanto y el duelo final
  english_pob_reading: the days of weeping, the mourning for Moses, were ended
  chosen_spanish_reading: se cumplieron los días del llanto, el duelo por Moisés
  alternative_spanish_readings:
  - terminaron los días del llanto y del duelo por Moisés
  - se acabaron los días de llanto, el duelo por Moisés
  rationale: El hebreo presenta dos expresiones paralelas para el período de lamentación. La traducción conserva ambas sin fusionarlas del todo, para no borrar la tensión entre el acto de llorar y el estado de duelo.
  doctrine_reference: Duelo comunitario por la muerte de un líder (cf. Nm 20:29; Dt 34:8).
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés muestran dos movimientos: el llanto inicial del pueblo y la clausura de los días de duelo. La redacción española sigue esa estructura, pero opta por un orden natural en español (''se cumplieron los días...'') sin perder la relación paralela entre ''llanto'' y ''duelo''.'
  spanish_consistency_notes:
  - Se mantuvo 'hijos de Israel' para reflejar la forma fuente, en lugar de sustituirlo por 'israelitas'.
  - Se prefirió 'Moisés' sin artículo, coherente con el uso bíblico en español.
  - '''Llanto'' y ''duelo'' se distinguen para conservar la doble expresión hebrea de lamentación.'
  - No se usó 'SEÑOR' ni terminología confesional ajena al versículo.
