base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/026/010.yaml
  text: And now[a], behold, I have brought the firstfruits of the ground that you, O Yahweh, have given me[b]. Then you shall set it down before Yahweh your God and bow down before Yahweh your God.
