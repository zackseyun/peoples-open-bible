review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: Judas/Macabeo, movimientos clandestinos por las aldeas, convocatoria de los parientes, incorporación de quienes permanecían en el judaísmo, y el total de seis mil. Sin embargo, «se infiltraban» tiende a introducir una connotación más fuerte de infiltración hostil que παρεισπορευόμενοι; una opción como «entraban furtivamente» o «se iban introduciendo en secreto» representa mejor el movimiento sigiloso. También «reunían como unos seis mil» suena poco natural en español para el resultado total; conviene explicitar «hasta sumar» o «y reunieron».'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero hay dos asperezas estilísticas: «el que también era llamado» suena menos fluido que «también llamado» o «que también era llamado», y «reunían como unos seis mil» resulta torpe. Además, el anclaje de la nota [a] está puesto en «Judas», aunque la nota explica «judaísmo»; debe moverse al término pertinente.'
  glossary_alignment: La elección «judaísmo» está bien alineada con la decisión documentada de Ἰουδαϊσμός. «Macabeo» y «parientes» también son adecuadas. No hay conflicto con la terminología base del proyecto. La principal cuestión es de matiz léxico para παρεισπορευόμενοι/λεληθότως y de ubicación correcta de la nota.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «Judas» en vez de «judaísmo».
    rationale: La nota explica una alternativa para Ἰουδαϊσμός, no para Ἰούδας. El marcador debe aparecer en el término relevante dentro del texto español.
  - severity: medium
    issue: «Se infiltraban en secreto» sobredetermina el matiz de παρεισπορευόμενοι.
    rationale: El griego expresa entrada o desplazamiento sigiloso/no detectado; «infiltrarse» en español suele sugerir penetración encubierta en un grupo ajeno, con una carga semántica más fuerte que la del original.
  - severity: low
    issue: «Reunían como unos seis mil» es poco idiomático.
    rationale: La frase final expresa el total resultante. En español suena más natural «hasta sumar unos seis mil» o equivalente.
  - severity: low
    issue: «El que también era llamado Macabeo» es menos natural de lo necesario.
    rationale: No es infiel, pero «también llamado Macabeo» preserva el sentido con mejor fluidez narrativa.
