translation:
  language: es
  text: 'Porque así dice Yahvé de los ejércitos, el Dios de Israel: La hija de Babilonia es como una era al tiempo de ser trillada[a]; dentro de muy poco le llegará el tiempo de la cosecha.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando la pisan»; el hebreo puede expresarse más literalmente con un sujeto implícito e inespecífico.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: transcribir el Tetragrámaton como «Yahvé», preservando el nombre propio y evitando el sustituto litúrgico «SEÑOR».'
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «Ejércitos» comunica bien el título divino en español y mantiene la amplitud de sentido de צְבָאוֹת sin volverlo demasiado técnico o arcaizante.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelita
  - el Dios de Israel
  lexicon: HALOT
  rationale: La expresión es directa y estable en español bíblico; «Dios» conserva el valor monoteísta singular del hebreo en este contexto.
- source_word: בַּת בָּבֶל
  english_pob_choice: The daughter of Babylon
  chosen_spanish: La hija de Babilonia
  alternatives_spanish:
  - Babilonia, hija
  - la hija Babilonia
  lexicon: HALOT
  rationale: Se conserva la personificación profética de la ciudad/imperio como «hija», en vez de reducir la imagen a «Babilonia» sin matiz.
- source_word: כְּגֹרֶן
  english_pob_choice: is like a threshing floor
  chosen_spanish: es como una era
  alternatives_spanish:
  - es como un lugar de trilla
  - es como una era de trillar
  lexicon: HALOT
  rationale: «Era» es el equivalente natural de «threshing floor» y mantiene la imagen agrícola concreta que estructura la comparación.
- source_word: עֵת הִדְרִיכָהּ
  english_pob_choice: at the time it is trodden
  chosen_spanish: en el tiempo en que es trillada
  alternatives_spanish:
  - cuando es trillada
  - en el tiempo en que la pisan
  lexicon: HALOT
  rationale: Se elige «trillada» para preservar el vínculo con la era de trilla y la metáfora agrícola; el pasivo español mantiene la ambigüedad del sujeto, como en la nota inglesa sobre el verbo no especificado.
- source_word: עוֹד מְעַט
  english_pob_choice: yet a little while
  chosen_spanish: todavía un poco
  alternatives_spanish:
  - dentro de muy poco
  - aún un poco más
  lexicon: HALOT
  rationale: La frase hebrea expresa inminencia; «todavía un poco» suena natural en español y conserva la brevedad temporal sin ampliar el sentido.
- source_word: וּבָאָה עֵת הַקָּצִיר לָהּ
  english_pob_choice: and the time of harvest will come for her
  chosen_spanish: y vendrá para ella el tiempo de la cosecha
  alternatives_spanish:
  - y llegará para ella el tiempo de la siega
  - y vendrá su tiempo de cosecha
  lexicon: HALOT
  rationale: «Cosecha» transmite el campo semántico de קָצִיר en un español amplio y claro; «vendrá para ella» conserva el dativo del hebreo y la idea de un tiempo que le sobreviene a Babilonia.
theological_decisions:
- issue: Metáfora de trilla y cosecha como anuncio de juicio
  english_pob_reading: The verse speaks of Babylon under agricultural imagery that conveys impending judgment rather than blessing.
  chosen_spanish_reading: El versículo presenta a Babilonia bajo imágenes agrícolas que anuncian juicio inminente, no una bendición de cosecha.
  alternative_spanish_readings:
  - La imagen podría leerse como una simple referencia estacional a la cosecha.
  - Podría suavizarse como una metáfora de cambio de estación.
  rationale: El contexto inmediato de Jeremías 51 es un oráculo contra Babilonia; por eso la metáfora de trilla/cosecha debe conservar su carga judicial sin explicarla de más en el texto principal.
  doctrine_reference: Jeremías 51:33; oráculo profético de juicio contra Babilonia
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «trodden» frente a «trampled» por un registro más formal y por su cercanía a la imagen de la era. En español, eso se resolvió con «trillada», que integra de manera natural el campo agrícola sin perder la ambigüedad del sujeto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se prefirió «los ejércitos» sobre «las huestes» por claridad y registro bíblico contemporáneo.
  - Se conservó la personificación «la hija de Babilonia» para no diluir la imagen profética.
  - «Era» y «trillada» sostienen la metáfora agrícola sin introducir interpretación añadida.
  - La nota a pie de página marca la alternativa verbal que conserva la pasiva/impersonalidad del hebreo.
