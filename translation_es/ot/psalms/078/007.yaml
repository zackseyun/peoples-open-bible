review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura de propósito del hebreo y conserva adecuadamente los sentidos principales: poner la esperanza/confianza en Dios, no olvidar sus hechos y guardar sus mandamientos. También mantiene correctamente el paralelismo al traducir tanto אֱלֹהִים como אֵל como «Dios». Sin embargo, una de las notas léxicas no corresponde al texto principal: la nota [b] ofrece «las obras de Dios» como alternativa, pero «las obras de Dios» ya es precisamente la lectura del texto principal. Conviene ajustar esa nota para preservar fielmente el rastro auditado inglés.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico digno. «Para que pusieran su esperanza en Dios… sino que guardaran sus mandamientos» suena bien en contexto. El único problema es de consistencia editorial en las notas, no de legibilidad del texto principal.
  glossary_alignment: 'Alineación buena con los términos del proyecto: «Dios» para אֱלֹהִים/אֵל, «esperanza» para כִּסְלָם como decisión contextual válida, y «mandamientos» para מִצְוֹתָיו. «Guardar» para יִנְצֹרוּ es idiomático y fiel. No hay conflicto con las preferencias terminológicas globales.'
  issues:
  - severity: medium
    issue: La nota [b] duplica la lectura del texto principal.
    rationale: El texto principal dice «las obras de Dios[a][b]», pero la nota [b] ofrece «O «las obras de Dios» o «los hechos de Dios»». Una alternativa no debe repetir exactamente la lectura principal; además, el POB inglés documentó «deeds» en el texto y «works/acts» como alternativas. En español, la nota debe ofrecer alternativas distintas como «los hechos de Dios» o «los actos de Dios».
  revised_spanish_text: para que pusieran su esperanza en Dios y no olvidaran las obras de Dios[a][b], sino que guardaran sus mandamientos.
  revised_footnotes:
  - marker: a
    text: O «su confianza» o «su seguridad».
    reason: lexical_alternative
  - marker: b
    text: O «los hechos de Dios» o «los actos de Dios».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural, y solo se corrige la nota [b] para que presente alternativas reales al término principal «obras», en conformidad con el rastro léxico del POB inglés y con una práctica editorial coherente.
