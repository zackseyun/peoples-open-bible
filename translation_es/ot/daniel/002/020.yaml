translation:
  language: es
  text: 'Daniel respondió y dijo: «Sea bendito el nombre de Dios desde la eternidad y hasta la eternidad[a], porque la sabiduría y el poder[b] le pertenecen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de siglo en siglo» o «por los siglos de los siglos».
    reason: lexical_alternative
  - marker: b
    text: O «la sabiduría y la fuerza son suyas».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנֵה ... וְאָמַר
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - contestó y dijo
  - respondió
  lexicon: HALOT
  rationale: La pareja verbal aramea funciona como fórmula narrativa de introducción. En español, «respondió y dijo» conserva esa estructura sin volverse demasiado literal ni redundante en exceso.
- source_word: לֶהֱוֵא
  english_pob_choice: be
  chosen_spanish: Sea
  alternatives_spanish:
  - Que sea
  - Sea bendito
  lexicon: HALOT
  rationale: La forma volitiva expresa un deseo o bendición. «Sea bendito» preserva el tono doxológico natural del español y refleja la función jussiva del original.
- source_word: שְׁמֵהּ
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - su nombre
  - el nombre de él
  lexicon: HALOT
  rationale: El arameo usa el sustantivo «nombre» como expresión reverente de identidad y honra divina. En español, «el nombre de Dios» reproduce bien ese giro bíblico.
- source_word: אֱלָהָא
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En este contexto doxológico, el español idiomático y fiel es simplemente «Dios», como hizo la POB en inglés.
- source_word: מְבָרַךְ
  english_pob_choice: Blessed
  chosen_spanish: bendito
  alternatives_spanish:
  - alabado
  - bendecido
  lexicon: HALOT
  rationale: La fórmula «Sea bendito» es la equivalencia española más natural para la bendición litúrgica del verso, y conserva el registro elevado del original.
- source_word: מִן עָלְמָא וְעַד עָלְמָא
  english_pob_choice: from everlasting to everlasting
  chosen_spanish: de eternidad en eternidad
  alternatives_spanish:
  - de siglo en siglo
  - por los siglos de los siglos
  lexicon: HALOT
  rationale: La frase aramea expresa duración ilimitada. «De eternidad en eternidad» mantiene el paralelismo y el sentido temporal amplio que la POB documentó como equivalente principal.
- source_word: חָכְמְתָא
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: HALOT
  rationale: El sustantivo abstracto se traduce directamente por «sabiduría», sin necesidad de ampliación interpretativa.
- source_word: גְבוּרְתָא
  english_pob_choice: might
  chosen_spanish: el poder
  alternatives_spanish:
  - la fuerza
  - la potencia
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por «might», en español «poder» comunica con naturalidad la fuerza eficaz implicada por el término arameo y equilibra bien la pareja con «sabiduría».
- source_word: דִּי לֵהּ הִיא
  english_pob_choice: belong to him
  chosen_spanish: le pertenecen
  alternatives_spanish:
  - son suyos
  - son de él
  lexicon: HALOT
  rationale: La construcción posesiva aramea se expresa con naturalidad en español mediante «le pertenecen», sin añadir exclusividad que el texto no explicita.
theological_decisions:
- issue: Naturaleza doxológica de la frase
  english_pob_reading: Render the verse as a blessing upon God's name grounded in God's possession of wisdom and might.
  chosen_spanish_reading: Presentar el versículo como una bendición sobre el nombre de Dios, fundada en que la sabiduría y el poder le pertenecen.
  alternative_spanish_readings:
  - «Que sea bendito el nombre de Dios ...»
  - «Sea alabado el nombre de Dios ...»
  rationale: 'El texto no define a Dios filosóficamente; formula una bendición. La traducción española conserva ese acto de adoración y el fundamento dado por el verso: Dios posee sabiduría y poder.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La consulta cruzada del inglés POB muestra alto acuerdo y sin revisiones aplicadas; la versión española sigue la decisión principal del audit trail, manteniendo la forma doxológica y las alternativas léxicas relevantes en nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» sin artículo por idiomatismo doxológico, en paralelo al inglés POB.
  - «De eternidad en eternidad» conserva el paralelismo temporal y la alternativa semántica documentada.
  - «Poder» se eligió como equivalente natural de גְבוּרְתָא en español, aunque el inglés prefirió «might»; la nota preserva la alternativa «fuerza».
