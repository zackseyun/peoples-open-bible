translation:
  language: es
  text: Ciudad llena de gritería[a], ciudad tumultuosa, ciudad exultante; tus caídos no cayeron por la espada ni murieron en batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llena de alboroto ... ciudad ruidosa ... ciudad jubilosa». El hebreo acumula casi sinónimos para pintar una ciudad marcada por una agitación sonora y festiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשֻׁאוֹת
  english_pob_choice: shouting
  chosen_spanish: gritería
  alternatives_spanish:
  - algarabía
  - clamor
  - bullicio
  lexicon: HALOT
  rationale: El sustantivo expresa ruido fuerte y alboroto; «gritería» comunica bien la idea de una ciudad dominada por voces altas y mantiene el matiz sonoro del texto, con una alternativa más cercana a la de «uproar» en español si se desea enfatizar el desorden.
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - colmada de
  - llena
  - rebosante de
  lexicon: HALOT
  rationale: Como adjetivo predicativo, «llena de» es la construcción natural en español y conserva la imagen de caracterización total de la ciudad.
- source_word: עִיר
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - urbe
  lexicon: HALOT
  rationale: «Ciudad» es el equivalente estándar y más transparente para עִיר en este contexto poético.
- source_word: הוֹמִיָּה
  english_pob_choice: tumultuous
  chosen_spanish: tumultuosa
  alternatives_spanish:
  - ruidosa
  - alborotada
  - bulliciosa
  lexicon: HALOT
  rationale: El término describe una ciudad de ruido y agitación; «tumultuosa» preserva el registro elevado y la idea de conmoción cívica mejor que una opción meramente acústica.
- source_word: קִרְיָה
  english_pob_choice: town
  chosen_spanish: pueblo
  alternatives_spanish:
  - ciudad
  - villa
  lexicon: HALOT
  rationale: Aunque קִרְיָה puede ser casi sinónimo de עִיר, en español «pueblo» ayuda a diferenciar el paralelismo poético sin perder el sentido de asentamiento urbano; se trata aquí de un uso estilístico, no de una reducción de tamaño geográfico necesariamente.
- source_word: עַלִּיזָה
  english_pob_choice: exultant
  chosen_spanish: exultante
  alternatives_spanish:
  - jubilosa
  - gozosa
  - alegre
  lexicon: HALOT
  rationale: «Exultante» conserva el tono elevado y la intensidad jubilosa del hebreo, y sigue de cerca la decisión inglesa sin caer en un registro más débil como «alegre».
- source_word: חֲלָלַיִךְ
  english_pob_choice: your slain
  chosen_spanish: tus muertos
  alternatives_spanish:
  - tus caídos
  - tus heridos
  - tus muertos abatidos
  lexicon: HALOT
  rationale: El hebreo designa a los caídos por violencia; «muertos» es natural en español y evita una perífrasis torpe, mientras el contexto inmediato aclara que se trata de muertos en guerra. Se mantiene la relación con el juego verbal del versículo.
- source_word: חַלְלֵי חֶרֶב
  english_pob_choice: slain by the sword
  chosen_spanish: caídos por la espada
  alternatives_spanish:
  - muertos por la espada
  - degollados por la espada
  - muertos a espada
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula de muerte violenta en combate. «Caídos por la espada» suena natural en español y conserva la imagen instrumental, aunque «muertos por la espada» sigue siendo una alternativa más literal.
- source_word: מֵתֵי מִלְחָמָה
  english_pob_choice: dead in battle
  chosen_spanish: caídos en batalla
  alternatives_spanish:
  - muertos en batalla
  - caídos en guerra
  - los muertos de guerra
  lexicon: HALOT
  rationale: La frase apunta a bajas de guerra; «caídos en batalla» reproduce bien la referencia militar y resulta más idiomática y solemne que una traducción demasiado plana de «muertos en guerra».
theological_decisions:
- issue: La frase final contrasta dos maneras de morir violentamente en un contexto militar.
  english_pob_reading: your slain are not slain by the sword, nor dead in battle.
  chosen_spanish_reading: tus muertos no son muertos por la espada, ni caídos en batalla.
  alternative_spanish_readings:
  - tus muertos no están muertos por la espada, ni caídos en batalla
  - tus muertos no cayeron por la espada, ni murieron en batalla
  rationale: 'No hay una afirmación doctrinal especial, pero sí un contraste retórico importante: la ciudad está llena de ruido y fiesta, mientras sus muertos no pertenecen a las categorías ordinarias de muerte bélica. La redacción española conserva ese paralelismo y evita suavizar la fuerza del contraste.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios y que el pasaje mantiene alta concordancia con el control cruzado; por eso la versión española sigue de cerca las decisiones léxicas auditadas, conservando el paralelismo poético y el contraste final sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se conserva un registro bíblico moderno y digno, evitando calcos rígidos como «llena de griterías» o «muertos de guerra» si entorpecen el español.
  - 'La duplicación de ideas sinónimas en el hebreo se refleja en dos miembros breves y paralelos: «ciudad tumultuosa» / «pueblo exultante».'
