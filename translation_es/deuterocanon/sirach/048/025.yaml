review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido básico del hebreo y del griego paralelo: una declaración profética de lo venidero y de cosas ocultas antes de su llegada. Sin embargo, «antes de que vinieran» suena menos natural en español con «las cosas ocultas» como antecedente y puede sugerir desplazamiento físico más que ocurrencia. Una formulación más idiomática preserva mejor לפני בואן / πρὶν ἢ παραγενέσθαι αὐτά.'
  spanish_quality_summary: El español es claro y digno, pero la segunda mitad requiere un ajuste menor para mayor naturalidad y precisión semántica. «Él» no es incorrecto, pero es innecesario en español bíblico corriente; omitirlo mejora la fluidez. «Las cosas ocultas» es correcto y legible.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías o Espíritu. Las decisiones «declaró», «para siempre» y «las cosas ocultas» concuerdan con la justificación documentada. El único punto a mejorar es la expresión temporal final, para reflejar mejor acontecimientos futuros en español.
  issues:
  - severity: medium
    issue: «antes de que vinieran» resulta poco idiomático en este contexto
    rationale: Con «lo que sería» y «las cosas ocultas» como referentes, el español normalmente expresa la ocurrencia de eventos con «antes de que sucedieran» o una construcción nominal equivalente. «Vinieran» puede entenderse, pero suena forzado y menos preciso.
  - severity: low
    issue: Pronombre sujeto «Él» innecesario
    rationale: El hebreo no exige énfasis pronominal aquí, y en español la omisión del sujeto mejora la naturalidad sin pérdida de sentido.
  revised_spanish_text: Declaró lo que sería para siempre, y las cosas ocultas antes de que sucedieran.
  revision_rationale: 'Se hizo una reparación menor de estilo y precisión: se omitió el pronombre sujeto innecesario y se cambió «antes de que vinieran» por «antes de que sucedieran», que expresa de manera más natural en español la llegada/ocurrencia de los hechos futuros implícitos por נהיות y לפני בואן, manteniendo fielmente el sentido del hebreo y del griego paralelo.'
