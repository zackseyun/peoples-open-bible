    issue: '''su joven'' es una traducción poco natural de וְנַעֲרוֹ'
    rationale: Aunque el inglés pudo usar 'his young man' por cercanía formal, en español 'su joven' no funciona idiomáticamente y puede confundir al lector. En este contexto de viaje, 'su criado' o 'su ayudante' transmite mejor el referente.
  - severity: medium
    issue: Secuencia singular/plural algo áspera en 'Te ruego... mañana madrugarán... y tú irás'
    rationale: El hebreo sí cambia de 2mp a 2ms, pero en español conviene una formulación más fluida que preserve el grupo y el destinatario principal sin sonar inconsistente.
  - severity: low
    issue: '''para su camino'' suena semicalcado'
    rationale: Es comprensible, pero 'para su viaje' o 'para continuar su camino' es más natural en español contemporáneo sin perder sentido.
  - severity: low
    issue: Anclaje de nota [b] mejor sobre 'tu tienda'
    rationale: La nota explica esa expresión concreta; conviene colocar el marcador inmediatamente allí para mayor precisión editorial.
