    rationale: El punto y coma tras «primeras[a]» y la colocación «tomó en su mano[b] las dos tablas de piedra» son comprensibles, pero una redacción como «y tomó las dos tablas de piedra en su mano[b]» suena más natural en español sin perder el matiz hebreo.
