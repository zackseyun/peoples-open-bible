translation:
  language: es
  text: ¡Alaben a Yah[a], porque Yahvé es bueno; canten alabanzas a su nombre, porque es agradable[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo ‘Yah’, la forma breve del nombre divino, distinta del siguiente ‘Yahvé’ (YHWH).
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque él es agradable / deleitoso», entendiendo el adjetivo final del Señor y no de su nombre o de la alabanza.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַֽ֭לְלוּ
  english_pob_choice: Praise
  chosen_spanish: ¡Alaben!
  alternatives_spanish:
  - ¡Alabad!
  - ¡Den alabanza!
  lexicon: HALOT
  rationale: Es un imperativo plural de exhortación litúrgica. «Alaben» expresa la convocatoria de forma natural en español contemporáneo sin volverlo demasiado arcaico.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: HALOT
  rationale: Se conserva la forma breve del nombre divino, distinta del Tetragrámaton que aparece después. No se fusiona con Yahvé para respetar la diferencia léxica documentada.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del llamado a la alabanza; «porque» es la equivalencia directa y clara en español.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - malo
  lexicon: HALOT
  rationale: «Bueno» conserva el sentido amplio de bondad moral y relacional aplicado a Yahvé. En español mantiene la sobriedad del original sin restringirlo indebidamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el Señor
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Siguiendo la terminología del proyecto, el Tetragrámaton se vierte como «Yahvé» en el texto principal español para preservar el nombre propio divino y distinguirlo de otras expresiones del versículo.
- source_word: זַמְּרוּ
  english_pob_choice: sing praises
  chosen_spanish: canten alabanzas
  alternatives_spanish:
  - canten salmos
  - hagan música
  lexicon: HALOT
  rationale: La expresión combina canto y alabanza cultual. «Canten alabanzas» reproduce bien esa fuerza en español y evita una formulación demasiado literal o técnica.
- source_word: לִשְׁמוֹ
  english_pob_choice: to his name
  chosen_spanish: a su nombre
  alternatives_spanish:
  - para su nombre
  - a la fama de su nombre
  lexicon: HALOT
  rationale: La preposición con «su nombre» en contexto de alabanza se expresa de manera natural como «a su nombre», manteniendo el foco en el nombre revelado/reputación de Dios.
- source_word: נָעִים
  english_pob_choice: pleasant
  chosen_spanish: agradable
  alternatives_spanish:
  - dulce
  - amable
  lexicon: HALOT
  rationale: El adjetivo puede significar agradable, deleitoso o hermoso. «Agradable» es la opción más directa y comprensible en español para la afirmación final del versículo.
theological_decisions:
- issue: Distinguir יָהּ y יְהוָה en la misma línea
  english_pob_reading: Render them as 'Yah' and 'Yahweh'
  chosen_spanish_reading: Renderizarlos como «Yah» y «Yahvé»
  alternative_spanish_readings:
  - «el Señor» para ambos
  - «Yah» y «Yahweh»
  rationale: 'El hebreo usa dos formas distintas del nombre divino: la abreviada יָהּ y el Tetragrámaton יְהוָה. En español conviene reflejar esa diferencia para no borrar la tensión léxica ni la precisión del texto fuente.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor sintáctico de כִּי en los dos hemistiquios
  english_pob_reading: '''for'' introducing the reason for praise'
  chosen_spanish_reading: «porque» como causal en ambos casos
  alternative_spanish_readings:
  - «pues»
  - «ya que»
  rationale: 'El verso está construido con dos motivos para alabar: la bondad de Yahvé y lo agradable de su nombre o de él mismo según la lectura final. «Porque» preserva esa estructura causal sin añadir explicación interpretativa.'
  doctrine_reference: Salmo poético; no aplica una doctrina controvertida específica
- issue: Alcance de נָעִים al final del versículo
  english_pob_reading: '''it is pleasant'' with the adjective possibly referring to the LORD rather than his name or praise'
  chosen_spanish_reading: «es agradable» con posible referencia a Yahvé implícita en la nota
  alternative_spanish_readings:
  - «su nombre es agradable»
  - «es dulce»
  - «es amable»
  rationale: El hebreo permite que el adjetivo se entienda de Yahvé, de su nombre o incluso de la alabanza. El texto principal mantiene la ambigüedad breve del original; la nota explica la lectura alternativa sin cerrarla de modo indebido.
  doctrine_reference: Salmo 135:3; lectura semántica final abierta
translation_notes:
  revision_awareness: La revisión en inglés corrigió la segunda referencia divina de «the LORD» a «Yahweh» para ajustarla con precisión al hebreo. En español se refleja esa misma distinción entre «Yah» y «Yahvé», manteniendo la forma breve en la primera mención y el nombre divino completo en la segunda.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva «Yah» para יָהּ para no colapsar dos expresiones distintas del nombre divino.
  - Se evita «SEÑOR» como sustitución automática.
  - «Canten alabanzas» mantiene el tono litúrgico sin arcaísmos excesivos.
  - La ambigüedad de la última cláusula se preserva en el texto y se aclara en nota.
