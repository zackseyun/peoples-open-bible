translation:
  language: es
  text: Ain con sus pastizales[a], Jutá con sus pastizales, Bet-semés con sus pastizales—nueve ciudades de estas dos tribus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «tierras comunes» o «terrenos circundantes»; el hebreo se refiere al terreno abierto adscrito a cada ciudad, usado para pastoreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַיִן
  english_pob_choice: Ain
  chosen_spanish: Ain
  alternatives_spanish:
  - Ayin
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se conserva por transliteración. «Ain» mantiene la forma ya asentada en español bíblico y refleja la decisión inglesa de no traducir el topónimo.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras comunes
  - sus terrenos circundantes
  - sus tierras de pastoreo
  lexicon: HALOT
  rationale: El término designa el terreno abierto asociado a la ciudad, especialmente para pastoreo. «Pastizales» comunica ese uso concreto en español sin recurrir a un calco poco natural.
- source_word: יֻטָּה
  english_pob_choice: Juttah
  chosen_spanish: Jutá
  alternatives_spanish:
  - Yutá
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se adapta la transliteración al patrón habitual en español bíblico, con una vocal final abierta para lectura natural.
- source_word: בֵּית שֶׁמֶשׁ
  english_pob_choice: Beth-shemesh
  chosen_spanish: Bet-semes
  alternatives_spanish:
  - Casa del Sol
  lexicon: HALOT
  rationale: Aquí funciona como topónimo establecido, no como sintagma transparente. Se conserva el nombre del lugar en transliteración española, evitando traducirlo como «Casa del Sol».
- source_word: עָרִים תֵּשַׁע
  english_pob_choice: nine cities
  chosen_spanish: nueve ciudades
  alternatives_spanish:
  - nueve poblaciones
  - nueve pueblos
  lexicon: HALOT
  rationale: «Ciudades» corresponde al reparto administrativo del pasaje y sigue de cerca el valor del hebreo sin volverlo más técnico ni más rural de lo que permite el contexto.
- source_word: מֵאֵת שְׁנֵי הַשְּׁבָטִים הָאֵלֶּה
  english_pob_choice: from these two tribes
  chosen_spanish: de estas dos tribus
  alternatives_spanish:
  - procedentes de estas dos tribus
  - tomadas de estas dos tribus
  lexicon: HALOT
  rationale: La preposición expresa procedencia o distribución a partir de las dos tribus mencionadas. «De estas dos tribus» preserva esa relación de origen/asignación de manera natural en español.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del hebreo y con el audit trail inglés: nombres propios transliterados, מִגְרָשׁ rendido por un término que conserve la idea de terreno anejo a la ciudad, y la cifra total explícita. No se detectaron cambios de revisión en el material inglés consultado.'
  spanish_consistency_notes:
  - Se mantiene «Ain» para el topónimo, en línea con la tradición transliterada del proyecto.
  - Se usa «pastizales» para evitar el falso amigo «suburbios» y conservar el valor territorial del hebreo.
  - «Bet-semes» se conserva como nombre propio; no se traduce el componente léxico del topónimo.
  - La construcción final «de estas dos tribus» refleja procedencia/distribución, no mera pertenencia abstracta.
