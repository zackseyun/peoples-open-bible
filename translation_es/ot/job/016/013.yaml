    issue: '''las entrañas'' reemplaza el literal anatómico ''mis riñones'''
    rationale: El hebreo כִּלְיוֹתַי significa literalmente 'mis riñones', y el POB inglés preservó deliberadamente ese término concreto. Cambiarlo en el texto principal por 'entrañas' suaviza e interpreta la imagen en vez de conservarla.
  - severity: medium
    issue: '''me abre'' debilita la fuerza de יְפַלַּח'
    rationale: El verbo hebreo en piel describe una acción violenta de hendir o abrir desgarrando. 'Me abre' resulta demasiado débil frente a 'splits open' del expediente inglés.
  - severity: low
    issue: La nota b tiene redacción y puntuación poco pulidas
    rationale: La nota empieza con una comilla/apóstrofo innecesario y puede formularse con español más limpio y eclesialmente legible.
