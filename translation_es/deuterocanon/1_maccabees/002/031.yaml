revisions:
- from: Y se dio aviso a los hombres del rey y a las tropas que estaban en Jerusalén, la ciudad de David, de que hombres que habían desobedecido el mandamiento del rey habían bajado a los escondrijos[a] en el desierto.
  to: Y se informó a los hombres del rey y a las tropas que estaban en Jerusalén, la ciudad de David, que hombres que habían desobedecido el mandamiento del rey habían bajado a los escondrijos[a] en el desierto.
