translation:
  language: es
  text: El número de días que David habitó en el territorio de los filisteos fue de un año y cuatro meses[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «días y cuatro meses»; aquí «días» es una manera idiomática de expresar «un año» dentro de una fórmula de duración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: was
  chosen_spanish: fue
  alternatives_spanish:
  - llegó a ser
  - sucedió
  lexicon: HALOT
  rationale: En esta fórmula de resumen de duración, el copulativo español 'fue' conserva la sencillez narrativa del hebreo y corresponde bien al inglés POB 'was' sin introducir una construcción más pesada.
- source_word: מִסְפַּר הַיָּמִים
  english_pob_choice: The number of days
  chosen_spanish: El número de días
  alternatives_spanish:
  - El tiempo
  - La cuenta de los días
  lexicon: HALOT
  rationale: Se mantiene la estructura del hebreo con transparencia. 'El número de días' suena natural en español y preserva el valor idiomático que la traducción inglesa también dejó visible.
- source_word: אֲשֶׁר יָשַׁב
  english_pob_choice: that ... lived
  chosen_spanish: que David habitó
  alternatives_spanish:
  - que David vivió
  - que David permaneció
  - que David se quedó
  lexicon: HALOT
  rationale: יָשַׁב aquí expresa residencia o permanencia, no el acto literal de sentarse. 'Habitó' conserva ese matiz de residencia estable y es suficientemente digno en español bíblico moderno.
- source_word: בִּשְׂדֵה פְלִשְׁתִּים
  english_pob_choice: in the territory of the Philistines
  chosen_spanish: en el territorio de los filisteos
  alternatives_spanish:
  - en la tierra de los filisteos
  - en el campo de los filisteos
  - en territorio filisteo
  lexicon: HALOT
  rationale: שָׂדֶה en esta construcción funciona de manera idiomática como ámbito territorial, no como 'campo' agrícola literal. 'Territorio de los filisteos' comunica la referencia geográfica con claridad y evita una imagen engañosa.
- source_word: יָמִים וְאַרְבָּעָה חֳדָשִׁים
  english_pob_choice: a year and four months
  chosen_spanish: de un año y cuatro meses
  alternatives_spanish:
  - de días y cuatro meses
  - de un año y cuatro lunas
  lexicon: HALOT
  rationale: Siguiendo el criterio del inglés POB, se interpreta 'días' dentro de la fórmula de duración como un año. En español, 'de un año y cuatro meses' expresa el sentido idiomático con naturalidad y sin perder la base textual.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo base y el audit trail inglés sin necesidad de cambios de revisión; la versión final coincide con la lectura aprobada, y la nota reproduce en español la decisión idiomática ya documentada.
  spanish_consistency_notes:
  - Se usó 'filisteos' en minúscula por norma española para etnónimos comunes.
  - Se prefirió 'habitar'/'habitó' para יָשַׁב por su valor de residencia prolongada, evitando el calco 'sentarse'.
  - La nota al pie mantiene la tensión entre el literal hebreo y el sentido idiomático sin ocultarla.
