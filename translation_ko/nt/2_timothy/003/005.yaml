id: 2TI.3.5
reference: 2 Timothy 3:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἔχοντες μόρφωσιν εὐσεβείας τὴν δὲ δύναμιν αὐτῆς ἠρνημένοι· καὶ τούτους ἀποτρέπου.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/005.yaml
  text: having a form of godliness but denying its power; and turn away from these people.
translation:
  language: ko
  text: 그들은 경건의 모양은 갖추고 있지만 그 능력은 부인합니다. 그러므로 이런 자들에게서 돌아서십시오.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μόρφωσιν εὐσεβείας
  english_pob_choice: a form of godliness
  chosen_korean: 경건의 모양
  alternatives_korean:
  - 경건의 외양
  - 경건의 겉모습
  lexicon: BDAG
  rationale: μόρφωσις는 「형태·외형」. 한국 성서 전통의 「경건의 모양」이 자연스럽고 다음 구의 「능력」과 대조를 분명히 한다.
- source_word: τὴν δύναμιν αὐτῆς ἠρνημένοι
  english_pob_choice: but denying its power
  chosen_korean: 그 능력은 부인합니다
  alternatives_korean:
  - 그 능력은 거부합니다
  - 그 능력을 거절합니다
  lexicon: BDAG
  rationale: 2:12-13의 「부인하다」(ἀρνέομαι)와 어휘를 통일. 완료 분사 ἠρνημένοι의 「부인한 상태」를 살린다.
- source_word: τούτους ἀποτρέπου
  english_pob_choice: turn away from these people
  chosen_korean: 이런 자들에게서 돌아서십시오
  alternatives_korean:
  - 이런 자들을 멀리하십시오
  - 이런 자들을 피하십시오
  lexicon: BDAG
  rationale: ἀποτρέπομαι는 「얼굴을 돌려 외면함」. 1:15의 「나에게서 돌아섰습니다」(ἀπεστράφησάν με)와 어휘적 짝을 이룬다. 「돌아서다」로 옮겨 그 외면의 의미를 분명히 한다.
