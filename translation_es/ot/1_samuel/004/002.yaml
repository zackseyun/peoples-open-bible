translation:
  language: es
  text: Los filisteos se alinearon para salir al encuentro de Israel, y la batalla se extendió[a]; e Israel fue derrotado ante los filisteos, y ellos abatieron a unos cuatro mil hombres en la línea de batalla en el campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la batalla se entabló’. El verbo hebreo puede describir el comienzo del combate o su despliegue en enfrentamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַרְכוּ
  english_pob_choice: drew up
  chosen_spanish: se desplegaron
  alternatives_spanish:
  - se ordenaron en formación
  - se alinearon para la batalla
  lexicon: HALOT
  rationale: En contexto militar, ערך expresa ordenar tropas para combatir. ‘Se desplegaron’ conserva la idea de disposición táctica sin sonar arcaico en español.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: para enfrentar
  alternatives_spanish:
  - para salir al encuentro de
  - contra
  lexicon: HALOT
  rationale: La preposición con קרא indica movimiento hacia el encuentro del enemigo. ‘Para enfrentar’ comunica el choque bélico de forma natural y precisa.
- source_word: וַתִּטֹּשׁ הַמִּלְחָמָה
  english_pob_choice: the battle spread out
  chosen_spanish: la batalla se extendió
  alternatives_spanish:
  - la batalla se desarrolló
  - la batalla se entabló
  lexicon: HALOT
  rationale: נטש aquí probablemente describe la expansión o despliegue del combate. ‘Se extendió’ mantiene esa imagen sin reducirla sin más a ‘se libró’ o ‘se entabló’.
- source_word: וַיִּנָּגֶף
  english_pob_choice: was defeated
  chosen_spanish: fue derrotado
  alternatives_spanish:
  - fue batido
  - fue derrotado por completo
  lexicon: HALOT
  rationale: El nifal de נגף en este contexto indica derrota ante el enemigo. ‘Fue derrotado’ preserva el valor bélico sin anticipar la cifra de muertos que sigue.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: En idiomática militar hebrea, ‘before’ expresa estar ante el poder del enemigo. ‘Delante de’ es claro en español y conserva la imagen relacional.
- source_word: וַיַּכּוּ
  english_pob_choice: they struck down
  chosen_spanish: mataron
  alternatives_spanish:
  - derrumbaron
  - abatieron
  lexicon: HALOT
  rationale: Aunque el hebreo literal es ‘golpearon/derribaron’, el contexto bélico exige resultado letal. ‘Mataron’ transmite con claridad la consecuencia inmediata en español.
- source_word: בַמַּעֲרָכָה
  english_pob_choice: in the battle line
  chosen_spanish: en la línea de batalla
  alternatives_spanish:
  - en el despliegue de batalla
  - en las filas
  lexicon: HALOT
  rationale: מַעֲרָכָה alude a la formación o línea de combate. ‘Línea de batalla’ es una equivalencia directa y entendible en español.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en el llano
  lexicon: HALOT
  rationale: ‘Campo’ corresponde de manera sobria al hebreo שָׂדֶה sin añadir matices innecesarios; el contexto ya lo identifica como escenario de batalla.
- source_word: כְּאַרְבַּעַת אֲלָפִים אִישׁ
  english_pob_choice: about four thousand men
  chosen_spanish: unos cuatro mil hombres
  alternatives_spanish:
  - aproximadamente cuatro mil hombres
  - cerca de cuatro mil hombres
  lexicon: HALOT
  rationale: כְּ con numeral indica aproximación. ‘Unos cuatro mil hombres’ es natural en español y conserva la inexactitud señalada por el hebreo.
translation_notes:
  revision_awareness: La formulación sigue de cerca la revisión más reciente del inglés POB, que afinó el último miembro a ‘in the field’; en español se optó por ‘en el campo’, más directo y fiel al hebreo sin expansión explicativa.
  spanish_consistency_notes:
  - Se mantiene ‘filisteos’ y ‘Israel’ como nombres propios habituales en español bíblico.
  - 'Se preserva la progresión del hebreo: despliegue militar, extensión del combate, derrota, y luego la cifra de muertos.'
  - La nota [a] refleja la tensión lexical documentada para וַתִּטֹּשׁ entre ‘se extendió’ y ‘se entabló’, sin borrar ninguna de las dos posibilidades.
