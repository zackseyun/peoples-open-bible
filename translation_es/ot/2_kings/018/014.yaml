base_translation:
  language: en
  yaml_path: translation/ot/2_kings/018/014.yaml
  text: Then Hezekiah king of Judah sent to the king of Assyria at Lachish[a], saying, “I have offended. Withdraw from me. Whatever you impose on me[b], I will bear.” So the king of Assyria imposed on Hezekiah king of Judah three hundred talents of silver and thirty talents of gold.
  footnotes:
  - marker: a
    text: Or 'to Lachish'; the Hebrew form can mark motion toward Lachish, though here it likely identifies where the king of Assyria was located.
    reason: lexical_alternative
  - marker: b
    text: Or 'Whatever you lay on me, I will carry/pay.' The Hebrew speaks of bearing whatever burden or levy is placed on him.
    reason: lexical_alternative
