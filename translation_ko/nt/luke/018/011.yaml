  text: 'The Pharisee[a], standing by himself, was praying these things: ‘God, I thank you that I am not like the rest of men—extortioners, unrighteous, adulterers—or even like this tax collector.’'
  footnotes:
  - marker: a
    text: Or 'standing, he was praying to himself these things.' The phrase 'πρὸς ἑαυτόν' may mean either that he stood apart or that his prayer was directed to himself in an ironic sense.
    reason: alternative_reading
