translation:
  language: es
  text: 'Y le preguntaron[a], diciendo: «Maestro, ¿cuándo, pues, sucederán estas cosas, y cuál será la señal cuando estas cosas estén por suceder?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «qué será la señal cuando estas cosas estén por suceder». El verbo griego puede traducirse de forma más general que «estén por suceder».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπηρώτησαν
  english_pob_choice: they asked
  chosen_spanish: le preguntaron
  alternatives_spanish:
  - le hicieron preguntas
  - le interrogaron
  lexicon: BDAG
  rationale: El aoristo narra una acción simple en pasado. «Preguntaron» es el equivalente natural en español para este contexto directo; se conserva el complemento indirecto «le» para reflejar αὐτόν.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ enlaza el relato con una transición suave. «Y» mantiene el flujo narrativo sin introducir contraste que el contexto no exige.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - preguntando
  - con estas palabras
  lexicon: BDAG
  rationale: El participio introduce el contenido de la pregunta. «Diciendo» es la forma directa y fiel en español.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro de enseñanza
  - Profesor
  lexicon: BDAG
  rationale: Aunque el sentido básico es «teacher», en español bíblico «Maestro» comunica con naturalidad el trato respetuoso hacia Jesús y evita el matiz excesivamente escolar de «profesor».
- source_word: πότε οὖν
  english_pob_choice: when then
  chosen_spanish: cuándo, pues
  alternatives_spanish:
  - cuándo entonces
  - so cuándo
  lexicon: BDAG
  rationale: «πότε» pregunta por tiempo y οὖν añade inferencia o conclusión. «Cuándo, pues» conserva ambos elementos de manera natural en español.
- source_word: ταῦτα ἔσται
  english_pob_choice: these things will be
  chosen_spanish: serán estas cosas
  alternatives_spanish:
  - sucederán estas cosas
  - ocurrirán estas cosas
  lexicon: BDAG
  rationale: Con el futuro de εἰμί y el demostrativo neutro plural, el español puede expresar literalmente «serán estas cosas». Aunque «sucederán» es más idiomático, se mantiene la cercanía al griego sin perder claridad.
- source_word: τί τὸ σημεῖον
  english_pob_choice: what will be the sign
  chosen_spanish: cuál será la señal
  alternatives_spanish:
  - qué será la señal
  - cuál es la señal
  lexicon: BDAG
  rationale: «σημεῖον» se traduce normalmente como «señal». «Cuál será» reproduce el valor interrogativo futuro del griego y es plenamente natural en español.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: BDAG
  rationale: Con el subjuntivo, ὅταν introduce una cláusula temporal de futuro. «Cuando» es la equivalencia más clara y fluida.
- source_word: μέλλῃ
  english_pob_choice: are about to
  chosen_spanish: estén por suceder
  alternatives_spanish:
  - vayan a suceder
  - estén a punto de suceder
  lexicon: BDAG
  rationale: μέλλω expresa inminencia o proximidad. «Estén por suceder» preserva esa cercanía sin resolverla hacia una cronología específica; es un equivalente natural al giro inglés «are about to».
- source_word: γίνεσθαι
  english_pob_choice: happen
  chosen_spanish: suceder
  alternatives_spanish:
  - acontecer
  - pasar
  lexicon: BDAG
  rationale: γίνομαι aquí se refiere a eventos que ocurren. «Suceder» es claro, sobrio y adecuado para un registro bíblico contemporáneo.
theological_decisions:
- issue: Nuance de inminencia en μέλλῃ
  english_pob_reading: Retain the disciples' request for a 'sign' and preserve μέλλῃ as 'are about to,' without resolving how immediate or distant the events are.
  chosen_spanish_reading: Conservar la petición de una «señal» y rendir μέλλῃ como «estén por suceder», sin decidir si los hechos son inmediatos o lejanos.
  alternative_spanish_readings:
  - estén a punto de suceder
  - vayan a suceder
  rationale: La frase griega mantiene una tensión temporal que no debe suavizarse. «Estén por suceder» deja abierta la cercanía de los acontecimientos y respeta la ambigüedad escatológica del texto.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se revisó la validación previa: el marcador [a] ahora aparece explícitamente en el texto principal junto a «le preguntaron», de modo que la nota queda correctamente anclada. No se identificaron cambios textuales posteriores en la fuente o en el audit trail que requirieran ajustes adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «Maestro» para Διδάσκαλε por naturalidad y reverencia en español, sin cargarlo con una autoridad técnica mayor que la del griego.
  - «Señal» conserva el valor estándar de σημεῖον en contexto escatológico.
  - La inminencia de μέλλῃ se expresó con una construcción natural en español, evitando resolver la cronología.
  - Se conservó el orden interrogativo y la duplicación de «estas cosas» para reflejar la estructura del griego sin volverla innecesariamente rígida.
