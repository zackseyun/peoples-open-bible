  text: וְ/אִ֗ישׁ אֲשֶׁ֤ר יִשְׁכַּב֙ אֶת דֹּ֣דָת֔/וֹ עֶרְוַ֥ת דֹּד֖/וֹ גִּלָּ֑ה חֶטְאָ֥/ם יִשָּׂ֖אוּ עֲרִירִ֥ים יָמֻֽתוּ־׃
