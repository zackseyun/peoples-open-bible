translation:
  language: es
  text: ¿Soy yo un Dios que está cerca[a] —declara Yahvé— y no un Dios que está lejos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Soy yo solo un Dios cercano ... y no también un Dios que está lejos?». La pregunta retórica niega que Yahvé esté limitado a lo que está cerca.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/אֱלֹהֵי
  english_pob_choice: Am I a God
  chosen_spanish: ¿Soy yo un Dios
  alternatives_spanish:
  - ¿Soy un Dios
  - ¿Acaso soy un Dios
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal interrogativa; en español es natural suministrar el verbo copulativo. Mantener «un Dios» conserva el valor predicativo y la fuerza retórica de la pregunta.
- source_word: מִ/קָּרֹב
  english_pob_choice: who is near
  chosen_spanish: de cerca
  alternatives_spanish:
  - cercano
  - que está cerca
  - de proximidad
  lexicon: HALOT
  rationale: El hebreo usa la idea de cercanía en contraste con lejanía; «de cerca» preserva la oposición espacial de forma breve y natural en español, sin convertirla en una paráfrasis emocional.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: —declara Yahvé—
  alternatives_spanish:
  - —dice Yahvé—
  - —oráculo de Yahvé—
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con registro solemne y se sigue el criterio del proyecto de traducir יהוה como «Yahvé», no con una sustitución por título.
- source_word: וְ/לֹא
  english_pob_choice: and not
  chosen_spanish: y no
  alternatives_spanish:
  - y no también
  - ni
  lexicon: HALOT
  rationale: La coordinación negativa se mantiene de modo directo. La fuerza retórica de la pregunta completa sostiene el contraste sin necesidad de ampliar la conjunción.
- source_word: אֱלֹהֵי מֵ/רָחֹק
  english_pob_choice: a God who is far away
  chosen_spanish: un Dios de lejos
  alternatives_spanish:
  - un Dios lejano
  - un Dios que está lejos
  - un Dios desde lejos
  lexicon: HALOT
  rationale: La segunda mitad repite el paralelismo antitético y se expresa con una construcción equivalente a la primera. «De lejos» conserva el contraste con «de cerca» y evita introducir matices ajenos al texto.
theological_decisions:
- issue: Nombre divino YHWH en la fórmula profética
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - dice Yahvé
  - oráculo de Yahvé
  rationale: Se mantiene el nombre propio divino como transliteración reverente y auditable, conforme al criterio del proyecto, en lugar de ocultarlo tras «SEÑOR».
  doctrine_reference: Preservar el nombre divino revelado en el texto fuente.
- issue: Tensión retórica entre cercanía y lejanía de Dios
  english_pob_reading: Am I a God who is near ... and not a God who is far away?
  chosen_spanish_reading: ¿Soy yo un Dios de cerca ... y no un Dios de lejos?
  alternative_spanish_readings:
  - ¿Soy yo un Dios cercano ... y no un Dios lejano?
  - ¿Soy yo un Dios que está cerca ... y no un Dios que está lejos?
  rationale: 'La pregunta retórica no debe suavizarse ni resolverse: afirma simultáneamente cercanía y trascendencia. El español conserva la antítesis espacial del hebreo.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El contexto inglés muestra una revisión estable sin cambios recientes; la traducción española sigue de cerca la lectura auditada y conserva la misma tensión retórica y la misma opción por Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה.
  - «Dios» traduce אֱלֹהִים con mayúscula por referencia al Dios de Israel.
  - La antítesis espacial se expresa con «de cerca / de lejos» para preservar el paralelismo hebreo.
  - El orden interrogativo y la pausa con rayas conservan el tono profético y la fórmula de citación.
