base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/021/009.yaml
  text: He gave them into the hand of the Gibeonites[a], and they hanged them on the mountain before Yahweh, and the seven of them fell together. They were put to death in the first days of harvest, at the beginning of the barley harvest.
  footnotes:
  - marker: a
    text: Or, 'they impaled them' or 'they exposed them publicly.' The Hebrew verb can refer more broadly to hanging up bodies in public display, not necessarily to hanging in the later narrow sense.
