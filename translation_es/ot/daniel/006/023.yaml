translation:
  language: es
  text: Mi Dios envió a su ángel[a] y cerró las bocas de los leones, y no me han hecho daño, porque se halló inocencia[b] en mí delante de él; y también delante de ti, oh rey[c], no he hecho ningún daño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su mensajero». El término arameo puede denotar tanto un mensajero como un ángel; el contexto milagroso favorece «ángel».
    reason: lexical_alternative
  - marker: b
    text: O «se halló pureza» o «se halló irreprochabilidad en mí delante de él».
    reason: lexical_alternative
  - marker: c
    text: O «No te hice ningún mal, oh rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלָהִי
  english_pob_choice: My God
  chosen_spanish: Mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: El posesivo de primera persona expresa relación personal. 'Mi Dios' conserva esa relación de forma natural en español y mantiene la referencia al Dios verdadero en el contexto de Daniel.
- source_word: שְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - ha enviado
  lexicon: HALOT
  rationale: El perfecto arameo narra una acción completada. 'Envió' suena natural en español y refleja la acción ya realizada.
- source_word: מַלְאֲכֵהּ
  english_pob_choice: his angel
  chosen_spanish: su ángel
  alternatives_spanish:
  - su mensajero
  lexicon: HALOT
  rationale: '''מַלְאֲךְ'' puede significar ''mensajero'' o ''ángel''. En este contexto milagroso, ''ángel'' comunica mejor el agente celestial sin añadir especulación.'
- source_word: וּסֲגַר
  english_pob_choice: and shut
  chosen_spanish: y cerró
  alternatives_spanish:
  - y selló
  - y clausuró
  lexicon: HALOT
  rationale: '''Cerrar'' es el equivalente más natural en español para la imagen de cerrar la boca; conserva la fuerza idiomática del verbo.'
- source_word: פֻּם אַרְיָוָתָא
  english_pob_choice: the mouths of the lions
  chosen_spanish: la boca de los leones
  alternatives_spanish:
  - las bocas de los leones
  - la boca de los leones
  lexicon: HALOT
  rationale: El hebreo/arameo tiene un sustantivo plural colectivo; en español el singular colectivo 'la boca de los leones' es idiomático y formal. La traducción inglesa revisada también se acercó al orden fuente con 'the mouths of the lions'.
- source_word: וְלָא חַבְּלוּנִי
  english_pob_choice: and they have not harmed me
  chosen_spanish: y no me han hecho daño
  alternatives_spanish:
  - y no me han dañado
  - y no me han herido
  lexicon: HALOT
  rationale: '''Hacer daño'' reproduce bien el sentido amplio de ''חבל'' sin limitarlo a lesión física específica. Mantiene el resultado permanente de la acción.'
- source_word: כָּל קֳבֵל דִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la liberación de manera clara y directa en español.
- source_word: קָדָמוֹהִי
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  lexicon: HALOT
  rationale: '''Delante de él'' conserva la relación espacial-relacional del original y el marco judicial/moral de evaluación.'
- source_word: זָכוּ
  english_pob_choice: innocence
  chosen_spanish: inocencia
  alternatives_spanish:
  - pureza
  - blamelessness
  - rectitud
  lexicon: HALOT
  rationale: En este contexto jurídico-moral, 'inocencia' es la opción más clara en español y corresponde al matiz de vindicación.
- source_word: הִשְׁתְּכַחַת לִי
  english_pob_choice: was found in me
  chosen_spanish: se halló en mí
  alternatives_spanish:
  - fue hallada en mí
  - se encontró en mí
  lexicon: HALOT
  rationale: '''Se halló en mí'' preserva la pasiva idiomática y sugiere el descubrimiento de una cualidad presente en Daniel.'
- source_word: וְאַף קֳדָמָיךְ
  english_pob_choice: and also before you
  chosen_spanish: y también delante de ti
  alternatives_spanish:
  - y aun delante de ti
  - e incluso delante de ti
  lexicon: HALOT
  rationale: La partícula añade una segunda esfera de vindicación; 'también' transmite bien la adición sin sobrecargar el tono.
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El vocativo requiere una forma de tratamiento directa en español. 'Oh rey' mantiene el registro cortesano y el llamado explícito.
- source_word: חֲבוּלָה
  english_pob_choice: harm
  chosen_spanish: daño
  alternatives_spanish:
  - mal
  - injuria
  - perjuicio
  lexicon: HALOT
  rationale: El término es amplio y puede abarcar daño o agravio. 'Daño' encaja con la primera cláusula y suena natural en español.
- source_word: לָא עַבְדֵת
  english_pob_choice: I have done no harm
  chosen_spanish: no he hecho ningún daño
  alternatives_spanish:
  - no he hecho mal
  - no he cometido ningún daño
  lexicon: HALOT
  rationale: El perfecto expresa una conducta que llega hasta el presente del relato. 'No he hecho ningún daño' conserva el sentido general y el paralelismo con la cláusula anterior.
theological_decisions:
- issue: Identidad de מַלְאֲכֵהּ en un contexto de liberación milagrosa
  english_pob_reading: his angel
  chosen_spanish_reading: su ángel
  alternative_spanish_readings:
  - su mensajero
  rationale: El contexto narrativo indica una intervención celestial. 'Ángel' comunica el sentido más probable sin borrar la alternativa léxica documentada de 'mensajero'.
  doctrine_reference: Translation philosophy §1, §3
- issue: Matiz moral-jurídico de זָכוּ / הִשְׁתְּכַחַת לִי
  english_pob_reading: innocence was found in me before him
  chosen_spanish_reading: se halló inocencia en mí delante de él
  alternative_spanish_readings:
  - se halló pureza en mí delante de él
  - se halló blamelessness en mí delante de él
  rationale: La idea no es solo ausencia de culpa subjetiva, sino vindicación moral/judicial. 'Inocencia' preserva ese equilibrio y evita suavizar el juicio.
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que prefirió 'the mouths of the lions' por cercanía al orden de la fuente y registro más formal. En español se conservó esa misma cercanía con 'la boca de los leones', sin perder naturalidad idiomática.
  spanish_consistency_notes:
  - Se usó 'Mi Dios' para reflejar el posesivo del arameo sin convertirlo en un simple tratamiento litúrgico.
  - Se prefirió 'ángel' en el texto principal por el contexto milagroso, manteniendo la alternativa 'mensajero' en nota.
  - '''Inocencia'' se mantuvo para preservar el matiz jurídico-moral de vindicación ante Dios y el rey.'
  - '''Delante de'' reproduce el marco relacional/judicial del original mejor que una paráfrasis más abstracta.'
