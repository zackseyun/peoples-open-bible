id: GEN.19.19
reference: Genesis 19:19
source:
  edition: WLC
  text: הִנֵּה נָ֠א מָצָ֨א עַבְדְּ/ךָ֣ חֵן֮ בְּ/עֵינֶי/ךָ֒ וַ/תַּגְדֵּ֣ל חַסְדְּ/ךָ֗ אֲשֶׁ֤ר עָשִׂ֨יתָ֙ עִמָּדִ֔/י לְ/הַחֲי֖וֹת אֶת נַפְשִׁ֑/י וְ/אָנֹכִ֗י לֹ֤א אוּכַל֙ לְ/הִמָּלֵ֣ט הָ/הָ֔רָ/ה פֶּן תִּדְבָּקַ֥/נִי הָ/רָעָ֖ה וָ/מַֽתִּי־־־׃
translation:
  text: Look[a], please, your servant has found favor in your eyes, and you have made great your steadfast love that you have shown me by preserving my life. But I cannot escape to the mountain[b], lest the disaster overtake me and I die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your kindness' or 'your mercy' for 'your steadfast love.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the evil'; here the sense is the calamity or disaster that would strike Lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה נָא
  chosen: Look, please
  alternatives:
  - Behold, please
  - See now
  lexicon: HALOT
  rationale: הִנֵּה introduces attention, and נָא adds a polite/urgent plea. 'Look, please' preserves both discourse force and natural modern English better than archaic 'Behold.'
- source_word: מָצָא ... חֵן בְּעֵינֶיךָ
  chosen: has found favor in your eyes
  alternatives:
  - has found grace in your sight
  - has found favor in your sight
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for receiving favorable regard. 'Favor' is the most natural English equivalent here; 'in your eyes' keeps the Hebrew imagery rather than flattening it completely.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave, in direct address to a superior or heavenly messenger it commonly functions as a deferential self-reference. The bonded-status nuance is not foregrounded here, so 'servant' best fits the context.
- source_word: וַתַּגְדֵּל
  chosen: you have magnified
  alternatives:
  - you have made great
  - you have shown greatly
  lexicon: HALOT
  rationale: The verb גדל in the Hiphil here means to make great or magnify. 'Have magnified' preserves the intensifying sense while remaining readable.
- source_word: חַסְדְּךָ
  chosen: your steadfast love
  alternatives:
  - your kindness
  - your covenant loyalty
  - your mercy
  lexicon: HALOT
  rationale: חסד carries the sense of loyal, gracious kindness. 'Steadfast love' is a well-established rendering that preserves its theological weight better than the thinner 'kindness.'
- source_word: עָשִׂיתָ עִמָּדִי
  chosen: that you have shown me
  alternatives:
  - that you have done with me
  - that you have done for me
  lexicon: HALOT
  rationale: Literally 'done with me,' but idiomatic English requires a smoother expression. 'Shown me' fits naturally with 'steadfast love' and accurately conveys enacted kindness.
- source_word: לְהַחֲיוֹת אֶת נַפְשִׁי
  chosen: by preserving my life
  alternatives:
  - to keep me alive
  - to save my life
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose/result: causing his life to continue. ''By preserving my life'' is idiomatic and keeps the focus on continued life rather than introducing a more loaded soteriological term like ''save.'''
- source_word: וְאָנֹכִי לֹא אוּכַל
  chosen: But I cannot
  alternatives:
  - And I cannot
  - As for me, I cannot
  lexicon: HALOT
  rationale: אָנֹכִי adds emphasis to the first person. 'But I cannot' captures the contrast with the prior clause in natural English.
- source_word: לְהִמָּלֵט הָהָרָה
  chosen: escape to the mountain
  alternatives:
  - flee to the mountain country
  - escape to the hill country
  lexicon: HALOT
  rationale: The directional ending on הָהָרָה indicates motion toward the mountain. Singular 'the mountain' follows the Hebrew form and the immediate narrative setting.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: פֶּן introduces feared consequence. 'Lest' is concise and accurate, though slightly elevated; it remains readily understandable in context.
- source_word: תִּדְבָּקַנִי
  chosen: overtake me
  alternatives:
  - cling to me
  - catch up with me
  - reach me
  lexicon: HALOT
  rationale: Though the root's basic sense is 'cling/stick,' in this context of impending harm it idiomatically means to catch or overtake someone. 'Overtake me' best conveys the threat in English.
- source_word: הָרָעָה
  chosen: the disaster
  alternatives:
  - the evil
  - the harm
  - the calamity
  lexicon: HALOT
  rationale: Here רעה refers not to moral evil in the abstract but to the destructive calamity threatening Lot. 'Disaster' communicates the concrete danger clearly.
- source_word: וָמַתִּי
  chosen: and I die
  alternatives:
  - and I will die
  - so that I die
  lexicon: HALOT
  rationale: The perfect with prefixed conjunction after פֶּן expresses the feared result. Present-style English 'and I die' is idiomatic after 'lest'; 'I will die' would also be possible but is slightly less natural in this construction.
