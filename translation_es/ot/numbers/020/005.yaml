  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías/Espíritu. Las decisiones léxicas principales son apropiadas: ''nos han sacado de Egipto'' preserva el sentido exodal de העלה; ''grano'' sigue la revisión inglesa contextual para זרע; ''lugar malo'' representa רָע en sentido experiencial, pero debe conservarse su alternativa documentada en nota.'
