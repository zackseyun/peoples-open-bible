id: GEN.41.11
reference: Genesis 41:11
source:
  edition: WLC
  text: וַ/נַּֽחַלְמָ֥/ה חֲל֛וֹם בְּ/לַ֥יְלָה אֶחָ֖ד אֲנִ֣י וָ/ה֑וּא אִ֛ישׁ כְּ/פִתְר֥וֹן חֲלֹמ֖/וֹ חָלָֽמְנוּ׃
translation:
  text: And we dreamed a dream in one night[a], I and he; each man dreamed according to the interpretation of his dream.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'we dreamed a dream on the same night, he and I; each man according to the interpretation of his dream we dreamed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנַּחַלְמָה
  chosen: And we dreamed
  alternatives:
  - And we had a dream
  - Then we dreamed
  lexicon: HALOT
  rationale: Wayyiqtol of חָלַם introduces the narrative event. 'And we dreamed' preserves the sequential force and matches the later resumptive verb.
- source_word: חֲלוֹם
  chosen: a dream
  lexicon: HALOT
  rationale: Cognate accusative with חָלַם. English idiom naturally renders this as 'dreamed a dream,' preserving the Hebrew emphasis.
- source_word: בְּלַיְלָה אֶחָד
  chosen: on the same night
  alternatives:
  - in one night
  - on one night
  lexicon: HALOT
  rationale: Literally 'in one night,' but in context the point is that both men dreamed during the same night. 'On the same night' communicates the temporal coincidence clearly in natural English.
- source_word: אֲנִי וָהוּא
  chosen: he and I
  alternatives:
  - I and he
  lexicon: HALOT
  rationale: The Hebrew explicitly names both participants after the plural verb. 'He and I' is idiomatic English while preserving the emphasis that both individuals were involved.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - each of us
  lexicon: HALOT
  rationale: Distributive use of אִישׁ marks individual correspondence. 'Each man' is gender-accurate and reflects the masculine singular distributive force.
- source_word: כְּפִתְרוֹן
  chosen: according to the interpretation of
  alternatives:
  - with the interpretation of
  - in keeping with the interpretation of
  lexicon: HALOT
  rationale: 'The preposition כְּ indicates correspondence: the dream matched its interpretation. ''According to the interpretation of'' best conveys that relation.'
- source_word: חֲלֹמוֹ
  chosen: his dream
  lexicon: HALOT
  rationale: Singular with 3ms suffix refers distributively to each man's own dream.
- source_word: חָלָמְנוּ
  chosen: dreamed
  alternatives:
  - we dreamed
  lexicon: HALOT
  rationale: 'The final verb resumes and completes the distributive clause. In English, repeating ''dreamed'' after ''each man'' yields a clear and natural sentence: ''each man dreamed according to the interpretation of his dream.'''
