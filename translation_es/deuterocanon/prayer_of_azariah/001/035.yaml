translation:
  language: es
  text: Bendecid al Señor[a], ángeles del Señor; cantad himnos[b] y exaltadlo sobremanera para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Alabad al Señor»; el verbo griego puede llevar también el sentido de alabanza explícita, aunque «bendecid» sigue más de cerca εὐλογεῖτε.
    reason: lexical_alternative
  - marker: b
    text: O «cantad alabanzas»; el griego evoca específicamente el canto de himnos.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Bendecid alabanza a
  - Alabad
  lexicon: BDAG
  rationale: El imperativo plural de εὐλογέω conserva en español el registro litúrgico de una exhortación doxológica. 'Bendecid' sigue de cerca la elección inglesa 'Bless' y evita diluir el matiz en un simple 'alabad'.
- source_word: ἄγγελοι
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: En este contexto de himno cósmico, el referente son seres celestiales; 'ángeles' comunica con naturalidad el sentido contextual del griego.
- source_word: Κυρίου / τὸν κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se sigue la convención doctrinal del proyecto para κύριος. En español, 'Señor' reproduce el registro reverencial y la relación sintáctica entre 'ángeles del Señor' y 'bendecid al Señor'.
- source_word: ὑμνεῖτε
  english_pob_choice: sing hymns
  chosen_spanish: cantad himnos
  alternatives_spanish:
  - cantad alabanzas
  - entonad himnos
  lexicon: BDAG
  rationale: ὑμνέω denota cantar himnos o alabanzas cantadas. 'Cantad himnos' conserva el componente musical y litúrgico mejor que un verbo general como 'alabad'.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo sobremanera
  alternatives_spanish:
  - ensalzadlo altamente
  - exaltadlo en gran manera
  lexicon: BDAG
  rationale: El compuesto intensifica el verbo 'exaltar'. 'Sobremanera' expresa la elevación extrema de forma natural en español y mantiene la fuerza aumentativa del griego.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por siempre
  lexicon: BDAG
  rationale: La expresión idiomática indica perpetuidad duradera. 'Para siempre' es la opción más natural y equivalente en español contemporáneo.
theological_decisions:
- issue: Tratamiento de κύριος en un himno de alabanza deuterocanónico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Dueño
  rationale: Se mantiene la lectura reverencial estándar del proyecto. No hay un factor contextual que justifique apartarse de 'Señor' en este lugar.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa concuerdan estrechamente y no muestran revisiones sustantivas; se ha preservado esa estabilidad en español, manteniendo las decisiones léxicas documentadas para εὐλογεῖτε, ὑμνεῖτε, ὑπερυψοῦτε y εἰς τοὺς αἰῶνας.
  spanish_consistency_notes:
  - Se ha evitado 'SEÑOR' en mayúsculas como convención de máscara; se usa 'Señor' conforme al principio del proyecto.
  - '''Bendecid'' y ''cantad himnos'' mantienen el registro litúrgico sin caer en calcos rígidos.'
  - '''Exaltadlo sobremanera'' preserva la intensidad del compuesto griego sin perder naturalidad en español.'
