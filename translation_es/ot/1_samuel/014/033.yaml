    text: O «Miren» o «He aquí». La partícula hebrea llama la atención sobre el informe que sigue.
    reason: lexical_alternative
  - marker: b
    text: O, más explícitamente, «al comer carne con la sangre todavía dentro». El hebreo dice literalmente «al comer sobre/con la sangre», una expresión idiomática para consumir carne sin drenar debidamente la sangre.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el español defectuoso y se restituye el sentido léxico del hebreo: «le informaron a Saúl» en lugar de «lo dijeron», «hagan rodar» en lugar de «traigan», y «hacia mí» en lugar de «hasta mí». También se corrige la gramática de «una gran piedra» y se elimina una nota innecesaria. Se conserva «Yahvé» y la expresión tensa «sobre la sangre», pero ahora con una nota aclaratoria adecuada.'
