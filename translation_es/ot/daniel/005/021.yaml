revisions:
- from: Fue ahuyentado[a] de entre los hijos de los hombres, y su corazón fue hecho semejante al de las bestias, y su morada estuvo entre los asnos monteses[b]. Le dieron hierba como a los toros, y su cuerpo fue empapado con el rocío del cielo[c], hasta que reconoció que el Dios Altísimo domina sobre el reino de los hombres[d] y pone sobre él a quien él quiere.
  to: Fue expulsado[a] de entre los hijos de los hombres, y su corazón[b] fue hecho semejante al de las bestias, y su morada estuvo entre los asnos monteses[c]. Fue alimentado con hierba como los bueyes, y su cuerpo fue empapado con el rocío del cielo, hasta que reconoció que el Dios Altísimo gobierna sobre el reino de la humanidad[d] y pone sobre él a quien quiere.
  rationale: Se corrige la voz verbal a pasiva en la cláusula de alimentación para seguir la revisión auditada del POB y el patrón pasivo del arameo. Se cambia «toros» por «bueyes» para reflejar mejor כְתוֹרִין, se reemplaza «ahuyentado» por «expulsado» por naturalidad contextual, se ajusta «gobierna sobre» como formulación más natural, y se rehacen las notas al pie para que sus anclajes coincidan exactamente con el texto relevante, añadiendo además la alternativa documentada para «corazón».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:54:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran parte el sentido del arameo y preserva bien elementos clave como «corazón», «bestias», «morada» y la afirmación de la soberanía divina. Sin embargo, hay desajustes importantes: la cláusula de alimentación usa una activa («Le dieron») donde el POB auditado corrigió a una pasiva («He was fed»), «como a los toros» no refleja bien כְתוֹרִין («como bueyes/como los bueyes/como oxen»), y las notas al pie c/d están intercambiadas respecto de sus anclajes en el texto.'
  spanish_quality_summary: El español es generalmente legible y digno, pero «ahuyentado» suena menos natural para la expulsión de una persona que «expulsado» o «echado». «Domina sobre» es comprensible, aunque «gobierna sobre» o «rige sobre» resulta más natural en registro bíblico contemporáneo. También conviene corregir la colocación de notas para evitar confusión y hacer más fluida la frase de alimentación en voz pasiva.
  glossary_alignment: No hay conflictos con terminología de proyecto como Yahvé/Mesías. Sí hay una divergencia con la decisión léxica auditada de יְטַעֲמוּנֵּהּ, que debe mantenerse en pasiva. Además, כְתוֹרִין se alinea mejor con «bueyes» que con «toros», y בְּמַלְכוּת אֲנָשָׁא puede conservarse como «el reino de la humanidad» o «el reino de los hombres»; aquí se prefiere «de la humanidad» por fidelidad al sentido genérico documentado en el POB.
  issues:
  - severity: high
    issue: La nota [c] está anclada a «rocío del cielo», pero su contenido habla de «sobre el reino de los hombres».
    rationale: Las notas c/d quedaron cruzadas; esto induce a error y no preserva el rastro de auditoría inglés.
  - severity: high
    issue: La nota [d] está anclada a «de los hombres», pero su contenido habla de «se alimentó / fue alimentado».
    rationale: El anclaje no corresponde al lugar semántico correcto y debe corregirse o eliminarse.
  - severity: medium
    issue: «Le dieron hierba» no refleja la revisión auditada a pasiva para יְטַעֲמוּנֵּהּ.
    rationale: El inglés POB fue corregido explícitamente a «He was fed» para concordar con el patrón pasivo del versículo; el español debe reflejarlo.
  - severity: medium
    issue: «Como a los toros» no representa con precisión כְתוֹרִין.
    rationale: «Toros» enfatiza machos enteros; el contexto comparativo tradicional y lexical se ajusta mejor a «bueyes»/«oxen».
  - severity: low
    issue: «Fue ahuyentado» suena menos idiomático para una persona en este contexto.
    rationale: Aunque transmite separación, «expulsado» o «echado» encaja mejor con la humillación del rey y con el uso natural del español.
  - severity: low
    issue: «El reino de los hombres» es aceptable, pero no refleja tan bien la decisión auditada de sentido genérico.
    rationale: El POB documenta explícitamente la fuerza genérica de אֲנָשָׁא; «la humanidad» comunica eso con más claridad en español actual.
