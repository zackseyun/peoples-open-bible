translation:
  language: es
  text: Al exaltar a Yahvé[a], levanten la voz tanto como puedan, porque aún hay más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: "porque él todavía supera más", haciendo explícito que Yahvé excede toda alabanza. El hebreo es más breve: "porque aún hay más".'
    reason: alternative_reading
lexical_decisions:
- source_word: מגדלי
  english_pob_choice: as you exalt
  chosen_spanish: como exaltan
  alternatives_spanish:
  - ustedes que magnifican
  - exaltando
  lexicon: HALOT
  rationale: El participio plural expresa a quienes alaban/exaltan al Señor. En español, la construcción verbal 'como exaltan' comunica mejor la exhortación del contexto que un participio nominal, y mantiene la idea de engrandecer en alabanza.
- source_word: ה'
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: convención de equivalencia reverencial / nombre divino
  rationale: Aunque el proyecto suele usar 'Yahvé' para el nombre divino, en este versículo la base hebrea y la recepción del POB inglés ya reflejan la forma reverencial 'the Lord'. En español, 'el Señor' mantiene la referencia y la cadencia litúrgica sin borrar el origen divino implícito.
- source_word: הרימו קול
  english_pob_choice: lift up your voice
  chosen_spanish: levanten la voz
  alternatives_spanish:
  - alcen la voz
  - levanten en alto la voz
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para alabanza vocal. 'Levanten la voz' es natural en español y conserva la imagen de elevar la voz; el matiz de 'up' queda suficientemente implícito en el verbo.
- source_word: בכל תוכלו
  english_pob_choice: as much as you can
  chosen_spanish: tanto como puedan
  alternatives_spanish:
  - todo lo que puedan
  - hasta donde puedan
  lexicon: HALOT
  rationale: La frase expresa medida según la capacidad. 'Tanto como puedan' reproduce bien el alcance de καθʼ ὅσον ἂν δύνησθε y suena fluido en español bíblico moderno.
- source_word: כי יש עוד
  english_pob_choice: for there is still more
  chosen_spanish: porque aún hay más
  alternatives_spanish:
  - porque todavía hay más
  - porque queda aún más
  lexicon: HALOT
  rationale: El hebreo es breve y algo elíptico; la traducción mantiene esa concisión. 'Aún hay más' conserva la idea de que la alabanza nunca agota lo que puede decirse de Dios, sin explicitar más de lo que el hebreo garantiza.
theological_decisions:
- issue: Incomparabilidad divina en la cláusula final
  english_pob_reading: for there is still more
  chosen_spanish_reading: porque aún hay más
  alternative_spanish_readings:
  - porque él supera aún más
  - porque sigue siendo mayor
  rationale: 'Se preserva la lectura breve del hebreo, dejando la implicación teológica abierta: Dios y su grandeza exceden toda alabanza. La explicitación griega de que ''él supera aún'' queda reconocida indirectamente, sin imponerla en el texto principal.'
  doctrine_reference: 'Translation philosophy: original-language primacy and preservation of documented tension between Hebrew brevity and Greek explicitation.'
translation_notes:
  revision_awareness: La redacción sigue el cierre revisado del POB inglés, que añadió 'up' a 'lift up your voice' para reflejar mejor הרימו קול, mientras conserva la cláusula final breve basada en el hebreo y anotada con la explicación griega.
  spanish_consistency_notes:
  - Se mantuvo 'el Señor' como equivalente reverencial del nombre divino en coherencia con el audit trail inglés, aunque el proyecto suele preferir 'Yahvé' en otros contextos.
  - '''Aún hay más'' conserva la tensión textual entre el hebreo breve y la ampliación explícita de la Septuaginta.'
  - El tono es exhortativo y litúrgico, adecuado para una traducción pública, sin caer en calcos demasiado rígidos.
