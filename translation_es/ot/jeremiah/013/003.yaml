lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  - llegó
  - fue
  lexicon: HALOT
  rationale: En la fórmula profética ‘la palabra de Yahvé vino/llegó a mí’, ‘vino’ conserva la acción de llegada de la palabra divina sin forzar un calco poco natural en español.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la palabra
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: ‘Palabra’ es la correspondencia directa y tradicional en la expresión דְבַר יְהוָה, manteniendo el sentido de comunicación revelada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino del texto hebreo como ‘Yahvé’, conforme al estándar del proyecto, en lugar de sustituirlo por un título como ‘el SEÑOR’.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona expresa dirección hacia Jeremías; ‘a mí’ es la forma natural y exacta en español.
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - por segunda vez
  - otra vez
  lexicon: HALOT
  rationale: ‘Por segunda vez’ reproduce con claridad el valor ordinal del adverbio hebreo y evita perder la precisión de ‘a second time’.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  - y dijo
  lexicon: HALOT
  rationale: Este infinitivo introduce el discurso siguiente; ‘diciendo’ es el equivalente español formal y natural en una fórmula narrativa profética.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. La traducción mantiene el nombre propio divino ‘Yahvé’ para no ocultar la referencia con una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrige la validación anterior asegurando que el marcador de nota [a] aparece exactamente en el texto español donde corresponde. No se introducen notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene el patrón profético hebreo con una sintaxis natural en español.
  - ‘Yahvé’ se usa de forma consistente para el nombre divino del Tetragrama.
  - ‘Por segunda vez’ conserva el matiz ordinal de שֵׁנִית sin perder fluidez.
  - ‘Diciendo’ funciona como fórmula introductoria de cita directa en español bíblico.
