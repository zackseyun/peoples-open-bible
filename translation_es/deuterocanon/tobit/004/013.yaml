base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/004/013.yaml
  text: And now[a], child, love your brothers, and do not become proud in your heart over your brothers and the sons and daughters of your people, to take a wife for yourself from among them. For in pride there is ruin and much disorder, and in uselessness there is decline and great want[b]; for uselessness is the mother of famine.
  footnotes:
  - marker: a
    text: Or, 'do not be haughty toward your brothers and the sons and daughters of your people when taking a wife for yourself from among them.' The Greek syntax is compressed, and the relation between the warning against pride and the marriage clause can be understood in more than one way.
    reason: alternative_reading
  - marker: b
    text: '''Idleness'' could also be rendered ''sloth'' or, less likely in this context, ''worthlessness.'' The surrounding lines about decline, want, and famine favor the sense of laziness or unproductive inactivity.'
    reason: lexical_alternative
