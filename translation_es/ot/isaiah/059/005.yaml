    text: También puede entenderse «huevos de áspid»; ambos términos apuntan a una serpiente venenosa.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «se rompe» o «se abre». La imagen es que, al aplastarse un huevo, sale una serpiente venenosa.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'hacen eclosionar' por 'eclosionan' para lograr un español más natural sin perder la imagen contextual de huevos que se abren. Se corrige 'el que es aplastado' a 'lo que es aplastado' para reflejar que el referente es el huevo o aquello aplastado, no una persona. Se mantiene la nota sobre el literal hebreo en la cláusula final.
