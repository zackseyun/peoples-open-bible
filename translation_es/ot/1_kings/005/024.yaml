translation:
  language: es
  text: Y Hiram le daba a Salomón madera de cedro y madera de ciprés[a], según todo lo que deseaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madera de junípero» o, tradicionalmente, «madera de abeto» para el hebreo beroshim; la especie exacta del árbol es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... was
  chosen_spanish: Y ... estaba
  alternatives_spanish:
  - Y ... fue
  - Y sucedió que
  lexicon: HALOT
  rationale: El waw consecutivo con היה introduce progreso narrativo; en español, «estaba» conserva el valor durativo del participio en contexto pasado y suena natural sin añadir más interpretación que «sucedió que».
- source_word: חִירוֹם
  english_pob_choice: Hiram
  chosen_spanish: Hiram
  alternatives_spanish:
  - Jirán
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio con la forma común en español bíblico y en continuidad con la tradición de transliteración.
- source_word: נֹתֵן
  english_pob_choice: was giving
  chosen_spanish: estaba dando
  alternatives_spanish:
  - daba
  - estaba proporcionando
  lexicon: HALOT
  rationale: El participio expresa acción continua o habitual; «estaba dando» reproduce bien ese matiz y mantiene el tono narrativo. «Daba» también es posible, pero puede perder algo de la progresividad.
- source_word: עֲצֵי אֲרָזִים
  english_pob_choice: cedar timber
  chosen_spanish: madera de cedro
  alternatives_spanish:
  - cedro aserrado
  - madera de cedro
  lexicon: HALOT
  rationale: En este contexto de suministro para construcción, «madera de cedro» comunica el material de obra de forma natural en español. «Madera de cedro» es la opción más transparente para el lector.
- source_word: וַעֲצֵי בְרוֹשִׁים
  english_pob_choice: and cypress timber
  chosen_spanish: y madera de ciprés[a]
  alternatives_spanish:
  - y madera de junípero[a]
  - y madera de abeto[a]
  lexicon: HALOT
  rationale: Se preserva la incertidumbre lexical del hebreo בְּרוֹשִׁים con una traducción principal que funciona bien en español moderno. Se ancla la nota porque la especie exacta es debatida; «ciprés» es una equivalencia moderna común, mientras que otras tradiciones han usado «abeto» o propuestas cercanas a «junípero».
- source_word: כָּל חֶפְצֽוֹ
  english_pob_choice: according to all his desire
  chosen_spanish: conforme a todo su deseo
  alternatives_spanish:
  - según todo su deseo
  - de acuerdo con todo lo que deseaba
  lexicon: HALOT
  rationale: La revisión inglesa optó por una formulación relacional («according to») para reflejar con más precisión כָּל־חֶפְצוֹ. En español, «conforme a todo su deseo» conserva ese matiz de medida o correspondencia sin volverlo demasiado idiomático ni suavizar el sustantivo 'deseo'.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió «all he desired» por «according to all his desire» para acercarse mejor a כָּל־חֶפְצוֹ. Por eso el español usa una construcción relacional («conforme a»), en vez de una paráfrasis meramente posesiva.
  spanish_consistency_notes:
  - Se mantiene el patrón narrativo continuo del hebreo con «estaba dando».
  - Se evita sustituir «deseo» por una perífrasis más libre, para no borrar la relación léxica con חֶפְץ.
  - La nota sobre בְּרוֹשִׁים se conserva porque la identificación del árbol sigue siendo incierta y el POB inglés también preserva esa tensión.
