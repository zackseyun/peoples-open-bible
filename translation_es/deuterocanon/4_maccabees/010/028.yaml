revisions:
- from: Ahora mira[a], estando alejado[b] de Dios, haces guerra contra los que son reverentes hacia Dios[c].
  to: Ahora mira[a], siendo ajeno a Dios[b], haces la guerra contra los que actúan con reverencia hacia Dios[c].
  rationale: Se ajusta ἀλλότριος ὢν θεοῦ a «siendo ajeno a Dios» para conservar mejor la fuerza léxica de alienación/extrañeza relacional documentada en la auditoría inglesa. Se cambia «haces guerra contra» por «haces la guerra contra» por mayor naturalidad idiomática sin perder la imagen bélica. Se revisa «los que son reverentes hacia Dios» a «los que actúan con reverencia hacia Dios» para reflejar mejor el valor participial de εὐσεβοῦντας en español natural. Las notas se mantienen alineadas con los anclajes y con las alternativas relevantes.
