translation:
  language: es
  text: Porque yo soy Yahvé, tu Dios, que agita[a] el mar, de modo que sus olas rugen; Yahvé de los ejércitos es su nombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «que aquieta el mar». El participio hebreo admite ambos sentidos; aquí se adopta «agita» porque la cláusula siguiente sobre las olas que rugen favorece la agitación.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Yahvé de los ejércitos es su nombre». El texto tiene un sufijo de tercera persona («su»), y no la primera persona («mi»).'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אָֽנֹכִי
  english_pob_choice: For I am
  chosen_spanish: Porque yo soy
  alternatives_spanish:
  - Y yo soy
  - Pues yo soy
  lexicon: HALOT
  rationale: El hebreo une la conjunción con el pronombre independiente para dar continuidad enfática. «Porque yo soy» conserva el valor explicativo y la primera persona enfática con fluidez natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», no sustituirlo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios del pacto
  - tu Dios, tu Dios
  lexicon: HALOT
  rationale: La forma con sufijo de segunda masculina singular se expresa de manera directa y reverente como «tu Dios», preservando el vínculo de pacto.
- source_word: רֹגַע
  english_pob_choice: who stirs up
  chosen_spanish: que agita
  alternatives_spanish:
  - que aquieta
  - que calma
  - que perturba
  lexicon: HALOT
  rationale: El participio admite un rango semántico entre calmar y agitar. Aquí, la cláusula siguiente («de modo que sus olas rugen») favorece el sentido de provocar la agitación del mar; «agita» lo expresa con claridad en español.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el océano
  lexicon: HALOT
  rationale: «Mar» es la correspondencia natural y precisa del sustantivo definido hebreo en este contexto poético.
- source_word: וַיֶּהֱמ֖וּ גַּלָּי֑ו
  english_pob_choice: so that its waves roar
  chosen_spanish: de modo que sus olas rugen
  alternatives_spanish:
  - y sus olas rugieron
  - y sus olas están en tumulto
  - de modo que sus olas braman
  lexicon: HALOT
  rationale: La forma verbal con waw consecutiva describe el resultado de la acción sobre el mar. «De modo que» refleja bien esa relación resultativa; «rugen» reproduce el verbo hebreo con un registro poético claro en español.
- source_word: יְהוָ֥ה צְבָא֖וֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se conserva el título divino tradicional con «de los ejércitos», que mantiene la fuerza militar y majestuosa del hebreo sin sobreexplicar.
- source_word: שְׁמֽוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - es su nombre
  - es mi nombre
  lexicon: HALOT
  rationale: El sufijo hebreo es de tercera persona singular. En español, «su nombre» reproduce ese valor textual sin suavizarlo a primera persona.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el principio doctrinal del proyecto de traducir el Tetragrámaton como nombre propio transliterado, preservando la referencia personal del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de רֹגַע en relación con el mar
  english_pob_reading: who stirs up the sea
  chosen_spanish_reading: que agita el mar
  alternative_spanish_readings:
  - que aquieta el mar
  - que calma el mar
  rationale: Aunque el lexema puede significar aquietar o calmar, el contexto inmediato de «sus olas rugen» favorece la lectura de provocar la agitación. Se conserva así la tensión textual sin neutralizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Sufijo pronominal de שְׁמוֹ
  english_pob_reading: is his name
  chosen_spanish_reading: es su nombre
  alternative_spanish_readings:
  - es mi nombre
  rationale: Se preserva la forma hebrea de tercera persona en lugar de armonizarla con el habla directa. Esto respeta el texto masorético como fuente primaria.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: La auditoría inglesa mantiene alta concordancia y no registra revisiones sustantivas; se conserva la decisión de leer רֹגַע como acción que agita el mar y de respetar el sufijo de tercera persona en שְׁמוֹ. La versión española reproduce esas decisiones sin suavizarlas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton, conforme al estándar del proyecto.
  - Se mantiene «tu Dios» para אֱלֹהֶיךָ, preservando la relación de pacto sin añadir explicaciones innecesarias.
  - «De modo que» comunica la relación resultativa del hebreo mejor que una coordinación simple.
  - «Su nombre» conserva la tercera persona del texto hebreo y evita armonizarlo con una lectura más fluida pero menos exacta.
