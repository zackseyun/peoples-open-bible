    rationale: וְנוֹרָא עַל כָּל סְבִיבָיו expresa que Dios es más temible/asombroso que todos los que están a su alrededor, no simplemente ‘terrible sobre’ ellos. En español, «sobre» aquí suena espacial o rígido.
  - severity: low
