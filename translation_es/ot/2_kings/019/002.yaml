review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: envío de los tres grupos/personas, descripción de duelo con cilicio, y destino hacia Isaías. También conserva adecuadamente las decisiones del POB sobre «el escriba», «los ancianos de los sacerdotes» y «Isaías el profeta, hijo de Amoz».'
  spanish_quality_summary: El español es claro y digno, pero hay dos ajustes necesarios. Primero, la nota [a] está mal anclada en «Eliaquim», cuando la variante pertenece a «vestidos de cilicio». Segundo, «que estaba sobre la casa» suena demasiado calcado en español; una formulación como «que estaba a cargo de la casa real» conserva el sentido del hebreo y mejora la legibilidad, mientras la nota explica el trasfondo institucional.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios y términos clave están bien. «Cilicio» es una buena equivalencia para שַׂקִּים en registro bíblico. «Escriba» concuerda con la decisión auditada. La excepción propuesta en «casa real» se justifica por claridad idiomática y por la nota cultural ya existente.
  issues:
  - severity: high
    issue: La nota [a] está colocada en el lugar incorrecto.
    rationale: La nota lexical alternativa explica מִתְכַּסִּים בַּשַּׂקִּים («vestidos de cilicio / cubriéndose de cilicio»), no el nombre «Eliaquim». Debe anclarse en la frase de cilicio.
  - severity: medium
    issue: «Que estaba sobre la casa» es un calco poco natural en español.
    rationale: Aunque refleja la forma hebrea, en español moderno eclesial suena forzado. «Que estaba a cargo de la casa real» expresa mejor el oficio sin exceder la nota cultural ya documentada.
  - severity: low
    issue: La redacción de la nota [a] en singular («que se cubría») no concuerda con el referente plural.
    rationale: El participio describe al grupo enviado, especialmente a los ancianos de los sacerdotes, en plural. La alternativa debe formularse en plural o de manera impersonal.
  revised_spanish_text: Y envió a Eliaquim, que estaba a cargo de la casa real, y a Sebná, el escriba, y a los ancianos de los sacerdotes, vestidos de cilicio[a], a Isaías el profeta[b], hijo de Amoz.
  revised_footnotes:
  - marker: a
    text: O «cubriéndose de cilicio». El participio hebreo puede destacar la acción de vestirse o el estado resultante.
    reason: lexical_alternative
  - marker: b
    text: «Que estaba a cargo de la casa real» designa un alto oficial real encargado del palacio o de la casa real.
    reason: cultural_note
  revision_rationale: Se corrigió el anclaje de la nota lexical para que corresponda a la frase de cilicio, se mejoró la naturalidad de la expresión del cargo de Eliaquim sin perder el sentido del hebreo ni la explicación cultural del POB, y se ajustó la nota [a] para evitar discordancia gramatical.
