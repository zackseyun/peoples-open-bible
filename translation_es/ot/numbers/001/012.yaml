lexical_decisions:
- source_word: לְ/דָן
  english_pob_choice: For Dan
  chosen_spanish: Para Dan
  alternatives_spanish:
  - De Dan
  - Para la tribu de Dan
  lexicon: HALOT
  rationale: La preposición לְ en esta lista censal introduce al representante asociado con la tribu. «Para Dan» conserva la función relacional y la concisión del hebreo sin expandir a «la tribu de Dan», que sería más interpretativo.
- source_word: אֲחִיעֶזֶר
  english_pob_choice: Ahiezer
  chosen_spanish: Ahiezer
  alternatives_spanish:
  - Ahiézer
  lexicon: conventional transliteration
  rationale: Es un nombre propio; se translitera de forma estándar. Se conserva la forma tradicionalmente reconocible en español, sin traducir el nombre.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  lexicon: HALOT
  rationale: El constructo בן expresa filiación directa en esta fórmula genealógica. «Hijo de» es la equivalencia natural y precisa en español.
- source_word: עַמִּישַׁדָּי
  english_pob_choice: Ammishaddai
  chosen_spanish: Ammisaddai
  alternatives_spanish:
  - Amisaddai
  - Ammi-saddai
  lexicon: conventional transliteration
  rationale: Nombre propio transliterado. En español conviene una forma fluida y reconocible; se mantiene la base del nombre sin desglosarlo ni traducirlo.
translation_notes:
  revision_awareness: El texto inglés auditado no requiere revisión y no presenta notas. La versión española sigue la misma estructura breve y nominal del hebreo, con ajuste idiomático mínimo («Para» / «hijo de»).
  spanish_consistency_notes:
  - Se mantiene el orden breve de lista censal, adecuado para una relación de nombres.
  - Se evita añadir «la tribu de» porque el hebreo sólo marca pertenencia/asociación mediante לְ.
  - Se conserva un tono bíblico sobrio y publicable, sin arcaísmos innecesarios.
