  text: וַ/יָּ֨סַר פַּרְעֹ֤ה אֶת טַבַּעְתּ/וֹ֙ מֵ/עַ֣ל יָד֔/וֹ וַ/יִּתֵּ֥ן אֹתָ֖/הּ עַל יַ֣ד יוֹסֵ֑ף וַ/יַּלְבֵּ֤שׁ אֹת/וֹ֙ בִּגְדֵי שֵׁ֔שׁ וַ/יָּ֛שֶׂם רְבִ֥ד הַ/זָּהָ֖ב עַל צַוָּארֽ/וֹ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/041/042.yaml
  text: Then Pharaoh removed his signet ring from his hand and put it on Joseph’s hand[c][b][a], and he clothed him in garments of fine linen and put a gold chain around his neck.
  footnotes:
  - marker: a
    text: Or 'ring'; the Hebrew term can denote a ring generally, but in this royal context it likely refers to Pharaoh’s signet ring, symbolizing delegated authority.
    reason: lexical_alternative
  - marker: b
    text: '''Fine linen'' translates Hebrew שֵׁשׁ, a term for high-quality linen associated with wealth and honor.'
    reason: cultural_note
  - marker: c
    text: Or 'gold necklace' or 'gold collar.' The exact form of the neck ornament denoted by the Hebrew term is uncertain.
    reason: lexical_alternative
