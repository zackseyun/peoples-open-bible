translation:
  language: es
  text: Por eso un pueblo fuerte[a] te honrará; una ciudad de naciones crueles[b] te temerá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un pueblo poderoso». El adjetivo hebreo puede denotar fuerza, poder o fiereza.
    reason: lexical_alternative
  - marker: b
    text: O «una ciudad de pueblos crueles». La construcción en hebreo es compacta y puede describir una ciudad perteneciente a, o caracterizada por, naciones crueles.
    reason: lexical_alternative
  - marker: c
    text: O «te reverenciará» o «quedará sobrecogida ante ti». El verbo puede expresar temor, reverencia o sobrecogimiento según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La frase introduce una consecuencia lógica; «Por eso» expresa bien el valor inferencial en español natural sin endurecer el registro.
- source_word: יְכַבְּדוּךָ
  english_pob_choice: will honor you
  chosen_spanish: te honrará
  alternatives_spanish:
  - te glorificará
  - te dará honor
  lexicon: HALOT
  rationale: El verbo piel de כבד tiene el sentido de honrar o dar honor. «Honrará» conserva ese valor sin cargar el texto con un matiz litúrgico que el contexto no exige.
- source_word: עַם עָז
  english_pob_choice: a strong people
  chosen_spanish: un pueblo fuerte
  alternatives_spanish:
  - un pueblo poderoso
  - un pueblo valiente
  lexicon: HALOT
  rationale: עָז puede abarcar fuerza, poder o fiereza. «Fuerte» es amplio y natural en español, y mantiene la idea de capacidad/poder sin fijar en exceso el matiz.
- source_word: קִרְיַת גּוֹיִם עָרִיצִים
  english_pob_choice: a city of ruthless nations
  chosen_spanish: una ciudad de naciones crueles
  alternatives_spanish:
  - una ciudad de pueblos crueles
  - la ciudad de naciones crueles
  - una ciudad caracterizada por naciones crueles
  lexicon: HALOT
  rationale: קִרְיָה es «ciudad»; el sintagma constructo es comprimido y puede describir una ciudad ligada a naciones crueles o caracterizada por ellas. «Naciones crueles» preserva la imaginería del hebreo y el paralelo sin resolver más de lo que el texto obliga.
- source_word: יִירָאֽוּ/ךָ
  english_pob_choice: will fear you
  chosen_spanish: te temerá
  alternatives_spanish:
  - te temerán
  - te reverenciará
  - te temerán con reverencia
  lexicon: HALOT
  rationale: יָרֵא puede significar temer, reverenciar o estar sobrecogido. En este contexto de reconocimiento por poderes hostiles, «temerá» conserva la fuerza directa del hebreo y deja abierta la posible reverencia implícita.
theological_decisions:
- issue: Matiz de la respuesta de pueblos/poderes hostiles ante Dios
  english_pob_reading: The verse states that powerful peoples and ruthless nations/cities will honor and fear God, without specifying whether this is willing worship, coerced submission, or a mix of both.
  chosen_spanish_reading: El versículo afirma que un pueblo fuerte y una ciudad de naciones crueles honrarán y temerán a Dios, sin especificar si se trata de adoración voluntaria, sumisión forzada o una mezcla de ambas.
  alternative_spanish_readings:
  - Las naciones se convierten a una adoración genuina.
  - Los pueblos solo se someten con miedo después del juicio.
  rationale: Los verbos «honrar» y «temer» pueden incluir reverencia nacida del reconocimiento del poder de Dios, pero el hebreo no define el estado interior. La redacción española preserva esa tensión teológica en lugar de resolverla.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido del hebreo consonante y la decisión inglesa auditada, manteniendo la tensión semántica en עָז y ירא sin sobreinterpretar la escena. No se registran revisiones posteriores en el expediente; la versión auditada final coincide con el texto base.
  spanish_consistency_notes:
  - Se usa «Dios» implícito en la referencia teológica del versículo sin añadir un sujeto explícito que no aparece en el hebreo de esta línea.
  - Se evita «SEÑOR» como sustituto reverencial; el versículo no contiene el Tetragrámaton aquí.
  - «Pueblo» y «ciudad» conservan el paralelismo hebreo y su posible valor colectivo/representativo.
  - Las notas al pie preservan las alternativas documentadas en el audit trail inglés, adaptadas a español sin añadir sentidos no atestiguados.
