revisions:
- from: 'de las naciones acerca de las cuales Yahvé había dicho a los hijos de Israel[a]: «No entrarán en ellas, ni ellas entrarán en ustedes; ciertamente desviarán su corazón tras sus dioses». A estas se unió Salomón con amor.'
  to: 'de las naciones acerca de las cuales Yahvé había dicho a los hijos de Israel[a]: «Ustedes no irán a ellas, ni ellas vendrán a ustedes; ciertamente desviarán su corazón tras sus dioses»; a estas se apegó Salomón con amor.'
  rationale: La revisión corrige la persona verbal de la cita divina, evita la formulación española poco natural «entrarán en ellas / en ustedes», y fortalece דבק con «se apegó». Se mantiene «ellas» en la cita revisada por la construcción española y el contexto inmediato del versículo, pero la nota sigue preservando la alternativa explícita de matrimonio; no obstante, la corrección principal era restaurar la segunda persona y mejorar la fidelidad semántica y legibilidad.
