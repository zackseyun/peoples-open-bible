review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: אַחֲרִית/רֵאשִׁית se traduce correctamente como contraste entre fin y principio; דָּבָר como «asunto» es adecuado; y «espíritu altivo» preserva bien מִגְּבַהּ רוּחַ. La única desviación relevante está en la nota: el hebreo literal de אֶרֶךְ רוּחַ es «largo de espíritu», no «largo» a secas, y la nota introduce «forbearancia», anglicismo innecesario frente a español natural.'
  spanish_quality_summary: El texto principal es claro, digno y natural en español eclesial general. «Mejor es el fin de un asunto que su principio; mejor es la paciencia que un espíritu altivo» suena proverbial y fiel. La reparación necesaria es menor y afecta solo la nota al pie para mejorar naturalidad y precisión léxica.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Espíritu» para רוּחַ está bien mantenido tanto en la segunda cola como en la nota literal de la primera. «Paciencia» es una buena elección contextual para אֶרֶךְ רוּחַ, con nota que preserve la imagen idiomática.
  issues:
  - severity: medium
    issue: La nota al pie omite «de» en la frase literal.
    rationale: El inglés auditado dice literalmente «long of spirit» y el hebreo אֶרֶךְ רוּחַ corresponde en español a «largo de espíritu», no «largo de espíritu» sin ajustar; la forma dada en la nota es correcta en intención pero debe presentarse completa y natural en español.
  - severity: medium
    issue: «Forbearancia» no es español natural.
    rationale: Es un calco del inglés «forbearance». En español bíblico general conviene «tolerancia», «longanimidad» o «paciencia». Dado el registro del proyecto, «longanimidad» preserva mejor el matiz tradicional sin sonar impropio en nota.
  revised_spanish_text: Mejor es el fin de un asunto que su principio[a]; mejor es la paciencia que un espíritu altivo.
  revised_footnotes:
  - marker: a
    text: Literalmente, «largo de espíritu», un modismo para paciencia o longanimidad.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, claro y natural. Solo se corrige la nota para reflejar con precisión el hebreo literal y evitar el anglicismo «forbearancia».
