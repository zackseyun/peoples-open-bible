translation:
  language: es
  text: Y envió y convocó[a] a todos los nobles de Persia y de Media, y a los sátrapas y generales y gobernantes locales y gobernadores[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «habiendo enviado». El participio griego probablemente implica que antes de la convocatoria envió mensajeros u órdenes.'
    reason: lexical_alternative
  - marker: b
    text: La secuencia de títulos refleja la administración imperial persa; algunos términos también podrían verterse de manera más literal como «toparcas» y «altos funcionarios».
    reason: cultural_note
lexical_decisions:
- source_word: ἐξαποστείλας
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - habiendo enviado
  - después de enviar
  lexicon: LSJ
  rationale: El participio aoristo funciona de modo adverbial antes del verbo principal. En español, «y envió y convocó» conserva la secuencia narrativa sin sobrecargar la frase con una construcción más pesada. La nota mantiene la posibilidad de un matiz de envío previo de mensajeros o instrucciones.
- source_word: ἐκάλεσεν
  english_pob_choice: summoned
  chosen_spanish: convocó
  alternatives_spanish:
  - llamó
  - citó
  - convocó solemnemente
  lexicon: LSJ
  rationale: En un contexto real y administrativo, «convocó» comunica mejor una orden de comparecencia que «llamó», y evita el matiz demasiado jurídico de «citó».
- source_word: μεγιστᾶνας
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - magnates
  - grandes
  - altos dignatarios
  lexicon: LSJ
  rationale: «Nobles» es natural en español y preserva el rango elite del término sin introducir una traducción demasiado técnica o arcaica.
- source_word: Περσίδος
  english_pob_choice: Persia
  chosen_spanish: Persia
  alternatives_spanish:
  - el país de Persia
  lexicon: LSJ
  rationale: Nombre geográfico estándar; no requiere adaptación adicional.
- source_word: Μηδείας
  english_pob_choice: Media
  chosen_spanish: Media
  alternatives_spanish:
  - la región de Media
  lexicon: LSJ
  rationale: Nombre geográfico estándar; se conserva sin paráfrasis.
- source_word: σατράπας
  english_pob_choice: satraps
  chosen_spanish: sátrapas
  alternatives_spanish:
  - gobernadores provinciales
  lexicon: LSJ
  rationale: Se mantiene el título persa específico en transliteración castellana para no borrar la referencia administrativa histórica.
- source_word: στρατηγοὺς
  english_pob_choice: generals
  chosen_spanish: generales
  alternatives_spanish:
  - comandantes
  - jefes militares
  lexicon: LSJ
  rationale: «Generales» es la equivalencia más clara y breve para un cargo de dirección militar.
- source_word: τοπάρχας
  english_pob_choice: local rulers
  chosen_spanish: gobernantes locales
  alternatives_spanish:
  - señores locales
  - gobernantes de distrito
  - toparcas
  lexicon: LSJ
  rationale: La función del término es la de autoridad de una zona local; «gobernantes locales» conserva esa idea con claridad para el lector español. Se evita la transliteración «toparcas» por ser menos transparente.
- source_word: ὑπάτους
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - altos funcionarios
  - cónsules
  lexicon: LSJ
  rationale: Dentro de esta lista de cargos imperiales, «gobernadores» expresa bien una autoridad civil alta sin importar el sentido romano de «cónsules».
translation_notes:
  revision_awareness: El texto español sigue el estado más reciente del audit trail, sin cambios requeridos según la revisión más reciente; conserva la equivalencia óptima y la secuencia administrativa marcada en el inglés POB.
  spanish_consistency_notes:
  - Se mantiene la transliteración establecida «sátrapas».
  - Se prefiere «convocó» para el acto real de reunir a los oficiales.
  - Se evita «SEÑOR» u otras sustituciones doctrinales porque el versículo no contiene léxico divino.
  - La lista de cargos se traduce con claridad moderna, respetando la coloración persa del original.
