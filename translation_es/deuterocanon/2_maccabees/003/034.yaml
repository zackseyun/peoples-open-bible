review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y la auditoría inglesa en los puntos principales: μεμαστιγωμένος se refleja con fuerza física, διάγγελλε con tono público, πᾶσι como destinatario amplio, y ἀφανεῖς ἐγένοντο conserva la textura sobrenatural al decir que se volvieron invisibles. Sin embargo, «cuando dijeron estas cosas» pierde el sujeto plural implícito del participio εἰπόντες en relación con la coordinación previa; en español narrativo suena más natural y fiel «después de decir esto/estas cosas». También «desde el cielo» es posible, pero «del cielo» suena más idiomático con «azotado» y preserva igual de bien el origen celestial.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero tiene dos detalles mejorables: el marcador [a] está mal colocado con espacio tras la coma, y la cláusula «Y cuando dijeron estas cosas» suena algo rígida y menos natural que una construcción participial o temporal más idiomática. Además, la nota [a] mezcla español con el inglés «scourged», lo cual no conviene en notas españolas.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» y el tono general están bien. La decisión de no explicitar más la agencia divina en ἐξ οὐρανοῦ concuerda con la auditoría. Las alternativas léxicas deben mantenerse solo en español en las notas.
  issues:
  - severity: medium
    issue: Construcción temporal poco natural en «Y cuando dijeron estas cosas»
    rationale: El griego ταῦτα δὲ εἰπόντες significa literalmente «y habiendo dicho estas cosas». En español, «después de decir esto/estas cosas» o «dicho esto» transmite mejor la secuencia y evita una frase dura.
  - severity: low
    issue: «Desde el cielo» es menos idiomático que «del cielo» con «azotado»
    rationale: Ambas opciones son fieles a ἐξ οὐρανοῦ, pero «azotado del cielo» / «castigado del cielo» suena más natural y compacto en español bíblico moderno que «desde el cielo».
  - severity: low
    issue: Nota [a] contiene un anglicismo innecesario
    rationale: La nota española no debe incluir «scourged»; basta con alternativas españolas como «flagelado».
  - severity: low
    issue: Anclaje tipográfico del marcador [a]
    rationale: 'En español debe ir pegado a la palabra o frase pertinente, sin espacio impropio: «tú[a], ...» o en el término relevante.'
  revised_spanish_text: Pero tú[a], habiendo sido azotado del cielo, proclama a todos la majestad del poder de Dios. Y después de decir estas cosas[b], se hicieron invisibles.
  revised_footnotes:
