translation:
  language: es
  text: 'Y él dijo[a]: «Señor Yahvé, ¿cómo sabré que la poseeré?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿cómo podré saber que la heredaré?»
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר avanza la acción. En español, «Y él dijo» conserva el flujo narrativo hebreo con naturalidad y sin añadir matiz temporal excesivo.
- source_word: אֲדֹנָי יֱהוִה
  english_pob_choice: Lord Yahweh
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Yahveh
  - Señor el Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» según la norma del proyecto, y אֲדֹנָי se rinde con «Señor». La combinación evita la sustitución por una convención de ocultamiento y refleja el apelativo compuesto del hebreo.
- source_word: בַּמָּה
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - por qué medio
  - de qué manera
  lexicon: HALOT
  rationale: La pregunta hebrea usa literalmente «¿por qué medio?», pero en español «cómo» expresa de manera natural la solicitud de certeza o confirmación sin perder el valor instrumental.
- source_word: אֵדַע
  english_pob_choice: will I know
  chosen_spanish: sabré
  alternatives_spanish:
  - conoceré
  - llegaré a saber
  lexicon: HALOT
  rationale: En esta pregunta, ידע funciona como conocer/saber con matiz de certeza. «Sabré» suena más idiomático en español que un calco como «conoceré».
- source_word: אִירָשֶׁנָּה
  english_pob_choice: I will possess it
  chosen_spanish: la poseeré
  alternatives_spanish:
  - la heredaré
  - tomaré posesión de ella
  lexicon: HALOT
  rationale: ירשׁ puede significar poseer o heredar. Se eligió «poseeré» para expresar la adquisición efectiva de la tierra, como hace el inglés POB, sin eliminar la posibilidad de la herencia pactal, que se conserva como alternativa.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יֱהוִה
  english_pob_reading: Lord Yahweh
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Yahveh
  - Señor el Yahvé
  rationale: Se preserva el Tetragrámaton con la forma española tradicional del proyecto, «Yahvé», en lugar de sustituirlo por «SEÑOR». Así se mantiene la transparencia del nombre revelado y se respeta la lectura teológica del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor semántico de ירשׁ en el contexto de la promesa de la tierra
  english_pob_reading: I will possess it
  chosen_spanish_reading: la poseeré
  alternative_spanish_readings:
  - la heredaré
  - tomaré posesión de ella
  rationale: La promesa inmediata refiere a la tierra prometida; por eso «poseeré» comunica la posesión efectiva. «Heredaré» conserva con mayor fuerza la resonancia pactal, por lo que se deja como alternativa interpretativa.
  doctrine_reference: Génesis 15:7-8; promesa de la herencia de la tierra
translation_notes:
  revision_awareness: El punto revisado en el audit trail fue la actualización del nombre divino desde una convención de ocultamiento a «Yahweh»; en español se refleja directamente como «Yahvé». Se mantuvo el resto de la solución por su adecuación textual y naturalidad.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino YHWH.
  - Se evita «Señor Dios» porque aquí el hebreo presenta el apelativo compuesto אֲדֹנָי יֱהוִה, que requiere distinguir «Señor» + nombre divino.
  - La nota al pie conserva la alternativa semántica «heredar» para ירשׁ, tal como el audit trail inglés preserva «inherit» como opción válida.
