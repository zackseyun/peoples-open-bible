source:
  edition: SBLGNT
  text: τοῦτο οὖν ⸀βουλόμενος μήτι ἄρα τῇ ἐλαφρίᾳ ἐχρησάμην; ἢ ἃ βουλεύομαι κατὰ σάρκα βουλεύομαι, ἵνα ᾖ παρ’ ἐμοὶ τὸ Ναὶ ναὶ καὶ τὸ Οὒ οὔ;
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/017.yaml
  text: So when I intended this, was I acting lightly? Or do I plan what I plan according to the flesh, so that with me there should be both "Yes, yes" and "No, no"?
  footnotes:
  - marker: a
    text: Or “with fickleness” for “lightly.”
    reason: lexical_alternative
  - marker: b
    text: “According to the flesh” can mean according to merely human or worldly standards.
    reason: lexical_alternative
  - marker: c
    text: That is, speaking as if both “Yes” and “No” could stand together.
    reason: cultural_note
  - marker: d
    text: Or 'so that with me there is both “Yes, yes” and “No, no”?'.
    reason: previous_rendering
translation:
  language: ko
  text: 내가 이렇게 계획한 것이 경솔한 일이었겠습니까? 또는 내가 계획하는 일을 육신을 따라 계획하여, 내게서 「예, 예」 하면서 또 「아니요, 아니요」 하는 일이 있겠습니까?
  philosophy: optimal-equivalence
