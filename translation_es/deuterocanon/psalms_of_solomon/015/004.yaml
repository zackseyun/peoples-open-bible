  source_alignment_summary: 'El borrador español refleja fielmente la sintaxis y el sentido del griego: una pregunta retórica sobre la capacidad humana seguida de una cláusula de excepción. «¿Y qué puede hacer el hombre, sino dar gracias a tu nombre?» corresponde bien a καὶ τί δυνατὸς ἄνθρωπος, εἰ μὴ ἐξομολογήσασθαι τῷ ὀνόματί σου; y preserva la fuerza de ἐξομολογήσασθαι como acción doxológica, con nota que conserva las alternativas «confesar» y «alabar».'
