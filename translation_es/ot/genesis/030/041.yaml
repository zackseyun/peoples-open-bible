  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Varas» para מַקְלוֹת y «abrevaderos» para רהטים concuerdan con las decisiones auditadas. «Ganado» es posible para צאן, pero en este contexto «rebaño» funciona mejor y evita la discordancia verbal; además preserva el valor colectivo de pequeños animales mejor que «ganado».
