translation:
  language: es
  text: 'Entonces Joás, rey de Israel, envió a Amasías, rey de Judá, diciendo: «El arbusto espinoso[a] que estaba en el Líbano envió al cedro que estaba en el Líbano, diciendo: “Da tu hija a mi hijo como esposa”. Y un animal salvaje[b] que estaba en el Líbano pasó y pisoteó el arbusto espinoso».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cardo» o «zarza» para la planta espinosa nombrada aquí.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «bestia del campo», es decir, un animal salvaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  lexicon: HALOT
  rationale: La forma narrativo-secuencial del hebreo se conserva mejor con «Entonces» en español, que marca avance narrativo sin añadir contenido adversativo.
- source_word: יְהוֹאָשׁ
  english_pob_choice: Jehoash
  chosen_spanish: Joás
  alternatives_spanish:
  - Jehoás
  lexicon: Nombre propio bíblico de uso tradicional
  rationale: «Joás» es la forma habitual y más natural en español bíblico para el rey de Israel en este contexto.
- source_word: מֶלֶךְ יִשְׂרָאֵל / מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Israel / king of Judah
  chosen_spanish: rey de Israel / rey de Judá
  lexicon: Uso contextual estándar
  rationale: Se mantiene la estructura nominal simple del hebreo y la distinción histórica entre ambos reinos.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: «Diciendo» conserva la introducción de discurso directo de forma natural en español y coincide con el valor estándar del hebreo.
- source_word: הַחוֹחַ
  english_pob_choice: the thornbush
  chosen_spanish: el[a]
  alternatives_spanish:
  - el arbusto espinoso
  - la zarza
  - el cardo
  lexicon: HALOT
  rationale: El hebreo designa una planta espinosa; aquí se preserva la tensión léxica del POB inglés entre posibles identificaciones («thistle», «briar») con una nota al pie, sin fijar una especie en el texto principal. Para no sobretraducir, el texto principal no especifica más allá de la referencia pronominal del diminutivo/torpeza proverbial en la fábula.
- source_word: הָאֶרֶז
  english_pob_choice: the cedar
  chosen_spanish: el cedro
  lexicon: HALOT
  rationale: «Cedro» es la equivalencia directa y mantiene el contraste proverbial de altura y majestad.
- source_word: בַּלְּבָנוֹן
  english_pob_choice: in Lebanon
  chosen_spanish: en el Líbano
  alternatives_spanish:
  - sobre el Líbano
  lexicon: HALOT
  rationale: Se conserva la localización repetida del hebreo con la preposición natural en español.
- source_word: תְּנָה
  english_pob_choice: Give
  chosen_spanish: Da
  alternatives_spanish:
  - Entrega
  - Concede
  lexicon: HALOT
  rationale: El imperativo en la propuesta matrimonial se traduce de manera directa y breve con «Da».
- source_word: בִּתְּךָ לִבְנִי לְאִשָּׁה
  english_pob_choice: your daughter to my son as a wife
  chosen_spanish: tu hija a mi hijo por mujer
  alternatives_spanish:
  - tu hija a mi hijo como esposa
  - tu hija a mi hijo para esposa
  lexicon: HALOT
  rationale: «Por mujer» reproduce con sobriedad la frase hebrea tradicional y conserva el tono formulístico del intercambio matrimonial, sin endurecerlo con una expansión explicativa.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: a wild beast
  chosen_spanish: un animal salvaje[b]
  alternatives_spanish:
  - una fiera
  - un animal del campo
  lexicon: HALOT
  rationale: Se prefiere «animal salvaje» para una lectura clara en español y se añade una nota que conserva la alternativa semántica del hebreo («beast of the field» / animal salvaje), evitando una especie concreta.
- source_word: וַתַּעֲבֹר
  english_pob_choice: passed by
  chosen_spanish: pasó
  alternatives_spanish:
  - pasó de largo
  - fue pasando
  lexicon: HALOT
  rationale: En contexto el movimiento es incidental; «pasó» basta en español y mantiene la sencillez del hebreo.
- source_word: וַתִּרְמֹס
  english_pob_choice: trampled
  chosen_spanish: pisoteó
  alternatives_spanish:
  - trilló
  - aplastó bajo los pies
  lexicon: HALOT
  rationale: «Pisoteó» conserva la imagen corporal y verbal del hebreo, con una fuerza idiomática natural en español.
theological_decisions:
- issue: Imagen proverbial y nivel de identificación de los sujetos vegetales/animales
  english_pob_reading: The thornbush ... the cedar ... a wild beast
  chosen_spanish_reading: Una planta espinosa no identificada con precisión ... el cedro ... un animal salvaje
  alternative_spanish_readings:
  - la zarza ... el cedro ... una fiera
  - el cardo ... el cedro ... un animal del campo
  rationale: El texto funciona como fábula/proverbio político; la traducción no debe fijar innecesariamente una especie botánica. Se preserva la modestia semántica del hebreo y la nota explicativa sobre la planta espinosa, tal como el POB inglés deja abierta la alternativa léxica.
  doctrine_reference: Proverbio narrativo en contexto histórico; sin implicación doctrinal directa
- issue: Conjunción antes de la cláusula final
  english_pob_reading: And a wild beast ...
  chosen_spanish_reading: Y un animal salvaje ...
  alternative_spanish_readings:
  - Pero un animal salvaje ...
  rationale: Se mantiene la simple coordinación del hebreo sin introducir contraste adversativo que el texto no exige; esto sigue la revisión auditada del POB inglés.
  doctrine_reference: Fidelidad sintáctica al waw consecutivo/simple
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión final del inglés POB que sustituyó «But» por «And» para reflejar la simple conjunción hebrea, y se conservó la narración sin matiz adversativo. También se respetó la decisión auditada de no especificar más de lo que permite חוֹחַ, manteniendo abierta la alternativa léxica en nota.
  spanish_consistency_notes:
  - Se usa «Joás» para יְהוֹאָשׁ y «Amasías» para אֲמַצְיָהוּ, con ortografía bíblica natural en español.
  - Se mantiene «Líbano» con artículo en las ocurrencias requeridas por el español.
  - No se introduce «SEÑOR» ni equivalentes porque el versículo no contiene el nombre divino; Yahvé no aparece aquí.
  - La coordinación final se conserva con «Y» y no con «Pero», conforme al hebreo y a la revisión del POB inglés.
