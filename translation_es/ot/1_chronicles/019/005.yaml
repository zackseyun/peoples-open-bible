translation:
  language: es
  text: 'Ellos fueron y le informaron a David acerca de los hombres[a]; y él envió a encontrarlos, porque los hombres estaban muy avergonzados[b]. Y el rey dijo: «Quédense en Jericó hasta que les vuelva a crecer la barba, y entonces regresen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «envió mensajeros a encontrarlos»; el hebreo no dice explícitamente cuál fue el objeto del envío, aunque los mensajeros quedan naturalmente implícitos.'
    reason: lexical_alternative
  - marker: b
    text: «Muy avergonzados» también puede rendirse como «profundamente avergonzados» o «totalmente humillados».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: They went
  chosen_spanish: fueron
  alternatives_spanish:
  - partieron
  - se fueron
  lexicon: HALOT
  rationale: El wayyiqtol de הלך introduce la siguiente acción narrativa. «Fueron» es natural en español y conserva el avance secuencial del relato.
- source_word: וַיַּגִּידוּ לְדָוִיד עַל הָאֲנָשִׁים
  english_pob_choice: told David about the men
  chosen_spanish: le avisaron a David acerca de los hombres
  alternatives_spanish:
  - le informaron a David sobre los hombres
  - le reportaron a David acerca de los hombres
  lexicon: HALOT
  rationale: הגיד con ל marca a la persona informada, y עַל marca el asunto comunicado. «Le avisaron... acerca de» preserva ambas relaciones con español claro y sobrio.
- source_word: וַיִּשְׁלַח לִקְרָאתָם
  english_pob_choice: he sent to meet them
  chosen_spanish: envió a encontrarlos
  alternatives_spanish:
  - envió mensajeros a encontrarlos
  - salió a su encuentro
  lexicon: HALOT
  rationale: El objeto de שׁלח no está expresado en hebreo. «Envió a encontrarlos» conserva la indefinición del agente implícito sin añadir «mensajeros» al texto principal.
- source_word: נִכְלָמִים מְאֹד
  english_pob_choice: greatly humiliated
  chosen_spanish: muy avergonzados
  alternatives_spanish:
  - profundamente avergonzados
  - completamente humillados
  - sumamente avergonzados
  lexicon: HALOT
  rationale: El participio nifal de כלם expresa vergüenza pública/ humillación. En español, «muy avergonzados» comunica bien la deshonra social de manera natural; se mantiene la intensidad de מְאֹד.
- source_word: שְׁבוּ
  english_pob_choice: Stay
  chosen_spanish: Quédense
  alternatives_spanish:
  - Permanezcan
  - Esténse
  lexicon: HALOT
  rationale: El imperativo de ישׁב puede significar permanecer o quedarse. «Quédense» es la orden más idiomática y directa en español actual.
- source_word: בִירֵחוֹ
  english_pob_choice: in Jericho
  chosen_spanish: en Jericó
  alternatives_spanish:
  - en la ciudad de Jericó
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico y general. Se conserva la referencia geográfica sin añadir elementos ajenos.
- source_word: עַד אֲשֶׁר יְצַמַּח זְקַנְכֶם
  english_pob_choice: until your beards have grown back
  chosen_spanish: hasta que les vuelva a crecer la barba
  alternatives_spanish:
  - hasta que les crezca la barba
  - hasta que la barba les vuelva a crecer
  lexicon: HALOT
  rationale: צמח literalmente es «brotar/crecer». En este contexto, español natural exige expresar el regreso del crecimiento tras el rapado previo; el singular colectivo «la barba» es aceptable y claro en español.
- source_word: וְשַׁבְתֶּם
  english_pob_choice: then return
  chosen_spanish: y entonces regresen
  alternatives_spanish:
  - y volverán
  - y después vuelvan
  lexicon: HALOT
  rationale: La forma verbal posterior a עד אשר expresa la acción subsiguiente. «Y entonces regresen» marca la secuencia con claridad y mantiene el mandato.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Se conserva el título definido sin reemplazarlo por el nombre propio, conforme al hebreo y al audit trail en inglés.
translation_notes:
  revision_awareness: El pasaje coincide con el texto base y con la revisión más reciente indicada como sin cambios; no se requieren ajustes adicionales respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «barba» en singular colectivo por naturalidad del español, sin perder el sentido plural del hebreo mediante el contexto.
  - Se preservó la ambigüedad del verbo de envío con una formulación que no añade mensajeros en el cuerpo principal.
  - El tono general busca ser publicación-readable y fiel al relato narrativo breve del hebreo.
