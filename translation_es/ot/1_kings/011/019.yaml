    rationale: La nota inglesa [a] trata la lectura alternativa del referente de 'his wife'. La nota española [a] habla del modismo 'halló gracia/favor', que no es la alternativa auditada y además no resuelve una ambigüedad nueva del español.
  - severity: low
    issue: '''ante los ojos de Faraón'' es aceptable pero algo más pesado de lo necesario.'
