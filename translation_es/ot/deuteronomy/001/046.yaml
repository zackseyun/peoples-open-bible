translation:
  language: es
  text: Así permanecieron en Cadés muchos días[a], conforme a los días que permanecieron allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «muchos días, conforme a los días que permanecieron». La frase final es elíptica y puede entenderse como «por mucho tiempo, tanto tiempo como permanecieron allí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּשְׁבוּ
  english_pob_choice: So you remained
  chosen_spanish: Así permanecieron
  alternatives_spanish:
  - Y permanecieron
  - Entonces permanecieron
  - Así se quedaron
  lexicon: HALOT
  rationale: El verbo ישׁב en esta forma narrativa expresa permanecer o residir; «permanecieron» comunica bien la continuidad de la estancia. «Así» refleja la continuidad discursiva del contexto inmediato sin forzar una traducción demasiado mecánica del waw consecutivo.
- source_word: בְּקָדֵשׁ
  english_pob_choice: at Kadesh
  chosen_spanish: en Cadés
  alternatives_spanish:
  - en Kadesh
  - en Cadés de Barnea
  lexicon: HALOT
  rationale: Se translitera el topónimo con una forma castellana natural y reconocible. «En» es más natural en español para un lugar de permanencia prolongada; no se añade «de Barnea» porque no está en el hebreo de este versículo.
- source_word: יָמִים רַבִּים
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - por mucho tiempo
  - largos días
  lexicon: HALOT
  rationale: La expresión nominal se mantiene de forma directa. «Muchos días» conserva la forma hebrea y evita interpretar de antemano la duración con una paráfrasis excesiva.
- source_word: כַּיָּמִים אֲשֶׁר יְשַׁבְתֶּם
  english_pob_choice: according to the days that you remained there
  chosen_spanish: conforme a los días que permanecieron allí
  alternatives_spanish:
  - como los días que permanecieron allí
  - según los días que permanecieron allí
  - por el tiempo que permanecieron allí
  lexicon: HALOT
  rationale: La comparación hebrea es elíptica y puede sonar extraña si se traduce literalmente. «Conforme a» conserva la fuerza relacional de כ y sigue de cerca la revisión inglesa que prefirió «according to» por precisión. «Allí» explicita el referente implícito de Cadés, como en el audit trail inglés.
translation_notes:
  revision_awareness: La versión inglesa fue revisada de «like the days» a «according to the days» para reflejar con más precisión el valor de כַּיָּמִים en este contexto. La redacción española sigue esa decisión con «conforme a», manteniendo un registro formal y una estructura cercana al hebreo.
  spanish_consistency_notes:
  - Se usa «Cadés» como forma española consistente del topónimo.
  - Se mantiene «permanecieron» para reproducir el valor de ישׁב sin caer en un calco rígido como «habitaron» o «dieron morada».
  - La nota al pie conserva la tensión entre literalidad y sentido idiomático sin resolverla en exceso.
