translation:
  language: es
  text: Él estaba criando a Hadasa —es decir[a], Ester—, la hija de su tío, porque ella no tenía padre ni madre. La joven era hermosa de figura y de bella apariencia, y cuando murieron su padre y su madre[b], Mardoqueo la tomó como hija para sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la hija de su tío»; es decir, su prima.
    reason: lexical_alternative
  - marker: b
    text: O, «Mardoqueo la adoptó como hija». El hebreo dice más literalmente que la «tomó para sí por hija».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמֵן
  english_pob_choice: was bringing up
  chosen_spanish: estaba criando
  alternatives_spanish:
  - estaba criando
  - estaba educando
  - estaba cuidando
  lexicon: HALOT
  rationale: El participio describe una acción continua de cuidar y formar a Ester. «Criando» comunica en español la idea de crianza/atención sostenida con naturalidad, sin volverla demasiado técnica ni jurídica.
- source_word: הֲדַסָּה הִיא אֶסְתֵּר
  english_pob_choice: Hadassah—that is, Esther
  chosen_spanish: Hadasa; es decir, Ester
  alternatives_spanish:
  - Hadasa, es decir, Ester
  - Hadasa (es decir, Ester)
  lexicon: HALOT
  rationale: La construcción appositiva identifica a la misma persona con dos nombres. «Es decir» mantiene la equivalencia explicativa sin borrar ninguno de los nombres.
- source_word: בַּת דֹּדוֹ
  english_pob_choice: the daughter of his uncle
  chosen_spanish: la hija de su tío
  alternatives_spanish:
  - la hija de su tío
  - su prima
  lexicon: HALOT
  rationale: La expresión hebrea es más explícita que el parentesco derivado «prima». Se conserva el vínculo familiar directo para no suavizar el dato del texto.
- source_word: כִּי אֵין לָהּ אָב וָאֵם
  english_pob_choice: because she had neither father nor mother
  chosen_spanish: porque ella no tenía padre ni madre
  alternatives_spanish:
  - porque no tenía padre ni madre
  - porque era huérfana
  lexicon: HALOT
  rationale: Se sigue la formulación explícita del hebreo. «No tenía padre ni madre» conserva la negación doble y evita reducirla a una síntesis interpretativa como «huérfana».
- source_word: הַנַּעֲרָה
  english_pob_choice: The young woman
  chosen_spanish: La joven
  alternatives_spanish:
  - La muchacha
  - La doncella
  lexicon: HALOT
  rationale: En este contexto de corte y matrimonio, «la joven» es natural y digna en español, evitando tanto el tono arcaico de «doncella» como el posible infantilismo de «muchacha».
- source_word: יְפַת תֹּאַר
  english_pob_choice: beautiful in form
  chosen_spanish: hermosa en su forma
  alternatives_spanish:
  - hermosa de figura
  - bella en su forma
  lexicon: HALOT
  rationale: La frase enfatiza la belleza corporal o de figura. «En su forma» conserva el paralelismo semántico con el hebreo sin convertirlo en una paráfrasis amplia.
- source_word: וְטוֹבַת מַרְאֶה
  english_pob_choice: attractive in appearance
  chosen_spanish: agradable en su apariencia
  alternatives_spanish:
  - atractiva en su apariencia
  - hermosa en su apariencia
  lexicon: HALOT
  rationale: Se mantiene la distinción respecto de la cláusula anterior. «Agradable en su apariencia» evita repetir «hermosa» y conserva la idea de una apariencia placentera o atractiva.
- source_word: וּבְמוֹת אָבִיהָ וְאִמָּהּ
  english_pob_choice: and when her father and her mother died
  chosen_spanish: y cuando murieron su padre y su madre
  alternatives_spanish:
  - y al morir su padre y su madre
  - y después de la muerte de su padre y su madre
  lexicon: HALOT
  rationale: La construcción temporal se expresa de modo natural en español con «cuando murieron». Se preserva el orden de los miembros familiares y la referencia explícita a ambos padres.
- source_word: לְקָחָהּ מָרְדֳּכַי לוֹ לְבַת
  english_pob_choice: Mordecai took her as his own daughter
  chosen_spanish: Mardoqueo la tomó para sí como hija
  alternatives_spanish:
  - Mardoqueo la adoptó como hija
  - Mardoqueo la tomó para sí como su hija
  lexicon: HALOT
  rationale: El hebreo dice literalmente que la tomó «para sí por hija». Se evita «adoptó» porque introduce una categoría legal más específica que la formulación hebrea; «como hija» conserva la relación sin sobreinterpretarla.
translation_notes:
  revision_awareness: 'Coincide en lo esencial con el antecedente inglés de la POB: se conserva la apposición de dos nombres, el parentesco explícito «hija de su tío», la negación doble «no tenía padre ni madre», la doble descripción de belleza y la clausula final con una redacción española natural pero suficientemente literal. Se evita introducir «adoptó» en el texto principal, siguiendo la cautela del audit trail.'
  spanish_consistency_notes:
  - Se usa «Hadasa» y «Ester» como formas estables de los nombres propios.
  - Se mantiene «Mardoqueo» para el nombre propio consistente con la tradición española bíblica y el uso esperado en POB.
  - Se traduce la secuencia final con una construcción menos técnica que «adoptó», pero la nota preserva la alternativa interpretativa documentada.
  - No se usa «SEÑOR» ni terminología teológica no presente en el versículo.
