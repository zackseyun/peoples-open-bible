translation:
  language: es
  text: ¿Quién tendrá compasión de un encantador de serpientes que es mordido[b], o de cualquiera que se acerque a una bestia de presa[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «una bestia de diente/dientes», es decir, un animal depredador peligroso.'
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego en Swete difiere sustancialmente en este punto, y habla de un enemigo que endulza sus labios mientras trama violencia en su corazón. Como el hebreo se conserva para este versículo y es el testimonio primario de Sirácida en hebreo, el texto principal sigue aquí al hebreo.
    reason: textual_variant
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién habría de
  lexicon: HALOT
  rationale: La interrogativa retórica se expresa naturalmente con «¿Quién…?» en español y conserva la fuerza proverbial del hebreo.
- source_word: יוּחַן
  english_pob_choice: will pity
  chosen_spanish: tendrá compasión de
  alternatives_spanish:
  - mostrará favor a
  - se compadecerá de
  lexicon: HALOT
  rationale: El valor de חנן aquí es recibir/mostrar favor o compasión; «tendrá compasión de» suena natural en español y mantiene la idea de no auxiliar a quien sufre la consecuencia esperable.
- source_word: חוֹבֵר
  english_pob_choice: snake charmer
  chosen_spanish: encantador de serpientes
  alternatives_spanish:
  - hechicero de serpientes
  - mago de serpientes
  lexicon: HALOT
  rationale: El término designa a quien practica encantamiento o conjuro, y el contexto de una mordedura hace explícita la relación con serpientes. «Encantador de serpientes» conserva esa referencia sin explicitar más allá del dato del texto.
- source_word: נָשׁוּךְ
  english_pob_choice: who is bitten
  chosen_spanish: cuando es mordido
  alternatives_spanish:
  - mordido
  - habiendo sido mordido
  lexicon: HALOT
  rationale: El participio pasivo se integra bien como subordinada temporal en español. «Cuando es mordido» mantiene la pasividad y la situación de daño sufrida por el encantador.
- source_word: וְכָל הַקָּרֵב
  english_pob_choice: or anyone who goes near
  chosen_spanish: o de cualquiera que se acerque
  alternatives_spanish:
  - y de cualquiera que se acerque
  - o de quien se acerque
  lexicon: HALOT
  rationale: La conjunción enlaza otro caso paralelo; en español, «o de cualquiera que se acerque» reproduce de forma fluida la comparación retórica.
- source_word: אֶל חַיַּת שֵׁן
  english_pob_choice: a beast of prey
  chosen_spanish: a una bestia de presa
  alternatives_spanish:
  - a una bestia con dientes
  - a un animal feroz
  lexicon: HALOT
  rationale: La expresión hebrea, literalmente «bestia de dientes», idiomáticamente remite a un animal depredador. «Bestia de presa» conserva el carácter amenazante y es una formulación bíblica comprensible en español.
translation_notes:
  revision_awareness: El inglés POB siguió el hebreo de Kahana para este versículo y dejó una nota de variante textual respecto del griego, que desarrolla una escena distinta sobre un enemigo que habla dulcemente mientras trama violencia. La presente versión española sigue ese mismo testimonio hebreo, sin incorporar la lectura griega al texto principal.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra convención de máscara divina porque no aplica a este versículo.
  - «Encantador de serpientes» conserva el paralelismo con la mordedura y respeta la imagen proverbial del hebreo.
  - «Bestia de presa» traduce el hebreo idiomático sin reducirlo a una simple descripción zoológica.
