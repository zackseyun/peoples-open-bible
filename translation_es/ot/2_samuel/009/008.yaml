  to: 'Y se postró y dijo: «¿Qué es tu siervo[a], que te hayas vuelto hacia[b] un perro muerto como yo?»'
  rationale: 'La revisión corrige dos matices importantes: reemplaza «para que» por «que» para reflejar mejor la función de כִּי, y sustituye «te hayas fijado en» por «te hayas vuelto hacia» para preservar la imagen concreta del hebreo documentada en la auditoría inglesa. También reancla las notas al lugar semánticamente más pertinente en el texto revisado.'
