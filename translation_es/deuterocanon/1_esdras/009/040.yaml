translation:
  language: es
  text: Y Esdras, el jefe de los sacerdotes, trajo la ley ante toda la multitud, de hombre a mujer, y a todos los sacerdotes[a], para oír la ley, en la luna nueva del séptimo mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo de Nehemías 8:2–3 describe a los oyentes como hombres, mujeres y los que podían entender, en vez de «todos los sacerdotes».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκόμισεν
  english_pob_choice: brought
  chosen_spanish: trajo
  alternatives_spanish:
  - llevó
  - presentó
  lexicon: LSJ
  rationale: El verbo griego expresa la acción de traer o conducir algo a un lugar. En español, «trajo» comunica de forma natural la llegada de la ley al ámbito público sin añadir una nota ceremonial no explicitada por el texto.
- source_word: ὁ ἀρχιερεύς
  english_pob_choice: the chief priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  - el gran sacerdote
  lexicon: LSJ
  rationale: Aunque la POB inglesa opta por «chief priest» para reflejar más literalmente el griego, en español «sumo sacerdote» es el equivalente natural y plenamente transparente para este título sacerdotal, sin cambiar su función de máxima autoridad cultual.
- source_word: τὸν νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - el libro de la ley
  lexicon: LSJ
  rationale: El griego dice simplemente «la ley». «La ley» conserva el valor directo de νόμος y evita introducir «libro» donde el texto griego no lo dice.
- source_word: παντὶ τῷ πλήθει
  english_pob_choice: all the multitude
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - toda la asamblea
  - todo el pueblo
  lexicon: LSJ
  rationale: πλῆθος indica una gran muchedumbre reunida. «Toda la multitud» sigue de cerca el alcance del griego y mantiene el carácter público de la reunión.
- source_word: ἀπὸ ἀνθρώπου ἕως γυναικός
  english_pob_choice: from man to woman
  chosen_spanish: desde hombre hasta mujer
  alternatives_spanish:
  - de hombre a mujer
  - desde los hombres hasta las mujeres
  lexicon: LSJ
  rationale: Se conserva la construcción distributiva y su formulación de género del griego. «Desde hombre hasta mujer» refleja el alcance inclusivo sin neutralizar la expresión original.
- source_word: πᾶσιν τοῖς ἱερεῦσιν
  english_pob_choice: and all the priests
  chosen_spanish: y a todos los sacerdotes
  alternatives_spanish:
  - y a todos los presbíteros
  - y a todos los clérigos
  lexicon: LSJ
  rationale: El griego de 1 Esdras lee claramente «todos los sacerdotes». La preposición «a» marca bien el complemento de destinatarios en español y evita ambigüedad sintáctica.
- source_word: ἀκοῦσαι τὸν νόμον
  english_pob_choice: to hear the law
  chosen_spanish: para oír la ley
  alternatives_spanish:
  - para escuchar la ley
  - para oír la lectura de la ley
  lexicon: LSJ
  rationale: 'El infinitivo expresa propósito: traer la ley para que fuese oída. «Para oír la ley» es fiel y sobrio; no añade «lectura», aunque el contexto lo sugiera.'
- source_word: νουμηνίᾳ
  english_pob_choice: on the new moon
  chosen_spanish: en la novilunio
  alternatives_spanish:
  - en la luna nueva
  - en el día de novilunio
  lexicon: LSJ
  rationale: Se preserva el sentido calendárico del término griego con un equivalente culto y breve. «Novilunio» comunica el día de luna nueva sin expansión interpretativa.
- source_word: τοῦ ἑβδόμου μηνός
  english_pob_choice: of the seventh month
  chosen_spanish: del séptimo mes
  alternatives_spanish:
  - del mes séptimo
  - en el séptimo mes
  lexicon: LSJ
  rationale: 'La expresión genitiva completa naturalmente la referencia temporal: «el novilunio del séptimo mes». Mantiene la simpleza del griego.'
theological_decisions:
- issue: Título sacerdotal principal
  english_pob_reading: the chief priest
  chosen_spanish_reading: el sumo sacerdote
  alternative_spanish_readings:
  - el jefe de los sacerdotes
  - el gran sacerdote
  rationale: La POB inglesa subraya la literalidad de ἀρχιερεύς como «chief priest». En español, «sumo sacerdote» es el título bíblico establecido y conserva la autoridad máxima implícita en el término sin perder inteligibilidad para el lector general.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
- issue: Divergencia con el paralelo hebreo de Nehemías 8:2–3
  english_pob_reading: and all the priests
  chosen_spanish_reading: y a todos los sacerdotes
  alternative_spanish_readings:
  - y a los hombres y mujeres y a los que entendían
  - y a toda la asamblea
  rationale: El testimonio primario para este libro es el griego de 1 Esdras, que incluye a «todos los sacerdotes». El paralelo hebreo de Nehemías difiere materialmente; por fidelidad al texto fuente de esta obra, la traducción principal sigue al griego y no armoniza con el paralelo.
  doctrine_reference: PHILOSOPHY.md §What we are translating; DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje se mantiene estable respecto del último pase auditado.
  spanish_consistency_notes:
  - Se mantuvo «la ley» para τὸν νόμον, en línea con el griego directo y con el uso bíblico estándar en español.
  - Se tradujo ἀρχιερεύς como «sumo sacerdote» por naturalidad y claridad en español, aunque la POB inglesa opta por una forma más literal.
  - Se conservó la estructura inclusiva y gendered del griego en «desde hombre hasta mujer», sin neutralizarla.
  - Se evitó agregar «lectura» a «para oír la ley», porque el infinitivo griego ya expresa propósito sin especificar el modo.
  - «Novilunio» se eligió como equivalente culto de νουμηνίᾳ, manteniendo la referencia calendárica sin expansión.
