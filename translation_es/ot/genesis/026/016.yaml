translation:
  language: es
  text: 'Entonces Abimelec dijo a Isaac[a]: «Vete de entre nosotros, porque te has hecho mucho más poderoso que nosotros»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te has vuelto mucho más fuerte que nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» conserva bien esa secuencia en español moderno y digno.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelek
  - Abimelech
  lexicon: convención onomástica bíblica
  rationale: Se transcribe el nombre propio con la forma castellana usual y clara para lectores bíblicos.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición introduce al destinatario del habla; «a» es la opción natural en español.
- source_word: יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Yitzjak
  lexicon: convención onomástica bíblica
  rationale: Nombre propio mantenido según uso bíblico español estándar.
- source_word: לֵךְ
  english_pob_choice: Go away
  chosen_spanish: Vete
  alternatives_spanish:
  - Sal
  - Aléjate
  lexicon: HALOT
  rationale: El imperativo de הלך aquí, unido a מֵעִמָּנוּ, expresa expulsión/separación; «Vete» transmite con naturalidad esa fuerza.
- source_word: מֵעִמָּנוּ
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - lejos de nosotros
  - de entre nosotros
  lexicon: HALOT
  rationale: Literalmente es «de con nosotros»; en español «de nosotros» conserva la relación de separación sin forzar la sintaxis.
- source_word: עָצַמְתָּ
  english_pob_choice: you have become much mightier
  chosen_spanish: te has hecho mucho más poderoso
  alternatives_spanish:
  - te has vuelto mucho más fuerte
  - te has hecho mucho más fuerte
  lexicon: HALOT
  rationale: עצם expresa hacerse fuerte/mighty; «poderoso» comunica bien el peso relacional y político del contexto sin perder el aumento de fuerza.
- source_word: מִמֶּנּוּ
  english_pob_choice: than we
  chosen_spanish: que nosotros
  alternatives_spanish:
  - que nosotros somos
  - comparado con nosotros
  lexicon: HALOT
  rationale: El מן comparativo se expresa naturalmente con «más ... que» en español; no hace falta explicitar el verbo elíptico.
- source_word: מְאֹד
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - en extremo
  lexicon: HALOT
  rationale: El adverbio intensifica la comparación y en español encaja de forma idiomática con «más poderoso».
theological_decisions:
- issue: La fuerza del comparativo y posible matiz de amenaza política
  english_pob_reading: you have become much mightier than we
  chosen_spanish_reading: te has hecho mucho más poderoso que nosotros
  alternative_spanish_readings:
  - te has vuelto mucho más fuerte que nosotros
  - te has hecho mucho más fuerte que nosotros
  rationale: El hebreo presenta una comparación real de poder/fuerza, no solo una percepción subjetiva. «Más poderoso» conserva el peso de la advertencia de Abimelec sin introducir una lectura más técnica o militar de la necesaria.
  doctrine_reference: No doctrinal; decisión semántico-contextual basada en el hebreo comparativo.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «because» a «for» y de «stronger than we are» a «mightier than we» para lograr un registro más formal. En español se reflejó ese registro con una formulación sobria y directa («te has hecho mucho más poderoso que nosotros»), manteniendo el valor comparativo del hebreo.
  spanish_consistency_notes:
  - Se mantiene el orden narrativo simple propio del hebreo con «Entonces ... dijo».
  - Se evitó «SEÑOR» u այլ masking conventions, pues el versículo no contiene el nombre divino.
  - «Vete de nosotros» reproduce la separación exigida por לֵךְ + מֵעִמָּנוּ sin añadir más contexto del que da el texto.
  - La nota alternativa preserva la tensión entre «poderoso» y «fuerte», ya documentada por el audit trail inglés y el hebreo.
