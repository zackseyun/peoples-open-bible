  to: 'Y pondré sobre ellos cuatro clases[a], declara Yahvé: la espada para matar, los perros para arrastrar, y las aves de los cielos[b] y las bestias de la tierra para devorar y destruir.'
  rationale: Se elimina el pronombre enfático innecesario «yo», se ajusta la fórmula profética a «declara Yahvé» para reflejar mejor נְאֻם יְהוָה, y se corrige la nota [b] para que presente una alternativa real en vez de repetir la lectura principal.
