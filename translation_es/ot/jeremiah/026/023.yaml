translation:
  language: es
  text: Sacaron a Urías de Egipto y lo llevaron al rey Joaquim[a]; y él lo mató a espada y arrojó su cadáver a los sepulcros de la gente común.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los sepulcros del pueblo». El hebreo puede referirse más literalmente a las sepulturas pertenecientes a la gente común, en contraste con un entierro honroso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאוּ
  english_pob_choice: brought ... out
  chosen_spanish: sacaron
  alternatives_spanish:
  - lo trajeron fuera
  - lo hicieron salir
  lexicon: HALOT
  rationale: El causativo de יצא pide una idea de hacer salir; en español, 'sacaron' comunica con naturalidad la acción de extraer a Urías de Egipto sin perder la fuerza causal.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: La preposición מן con nombre de lugar se expresa naturalmente con 'de' en este giro después de 'sacaron'.
- source_word: וַיְבִאֻהוּ
  english_pob_choice: brought him
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo trajeron
  - lo condujeron
  lexicon: HALOT
  rationale: El causativo de בוא indica traer/llevar a alguien a un destino; 'lo llevaron' conserva el movimiento hacia el rey y suena natural en español.
- source_word: הַמֶּלֶךְ יְהוֹיָקִים
  english_pob_choice: King Jehoiakim
  chosen_spanish: el rey Joacim
  alternatives_spanish:
  - el rey Jehoiaquim
  - rey Joacim
  lexicon: HALOT
  rationale: Se mantiene el título real con el nombre propio en forma castellana tradicional abreviada ('Joacim'), que es clara y ampliamente reconocible en español bíblico.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo mató
  - lo golpeó
  lexicon: HALOT
  rationale: נכה puede abarcar herir o matar; como el contexto inmediato añade 'con la espada', 'lo hirió' conserva el gesto verbal sin cerrar prematuramente el matiz del golpe letal.
- source_word: בֶּחָרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  lexicon: HALOT
  rationale: El beth instrumental se vierte de forma directa con 'con', y 'espada' es la equivalencia natural y digna en español.
- source_word: וַיַּשְׁלֵךְ
  english_pob_choice: threw
  chosen_spanish: arrojó
  alternatives_spanish:
  - echó
  - tiró
  lexicon: HALOT
  rationale: '''Arrojó'' conserva la violencia deliberada del verbo hebreo y encaja bien con el carácter de deshonra del acto.'
- source_word: נִבְלָתוֹ
  english_pob_choice: his corpse
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su cuerpo muerto
  - su cuerpo
  lexicon: HALOT
  rationale: נבלה se refiere a un cuerpo sin vida con tono deshonroso; 'cadáver' es preciso, digno y mantiene ese matiz.
- source_word: קִבְרֵי
  english_pob_choice: burial places
  chosen_spanish: los sepulcros
  alternatives_spanish:
  - las tumbas
  - los lugares de sepultura
  lexicon: HALOT
  rationale: El plural constructo de קבר puede aludir a sepulturas o tumbas; 'sepulcros' mantiene un registro bíblico sobrio y suficientemente amplio.
- source_word: בְּנֵי הָעָם
  english_pob_choice: the common people
  chosen_spanish: de los hijos del pueblo
  alternatives_spanish:
  - del pueblo
  - de la gente común
  lexicon: HALOT
  rationale: Se conserva la forma más cercana al hebreo, 'hijos del pueblo', porque el texto contrapone un entierro común con un entierro honroso. Se deja visible la tensión entre literalidad y sentido social, sin borrar el trasfondo funerario.
theological_decisions:
- issue: Cambio de sujeto entre verbos plurales y singulares
  english_pob_reading: Retain plural agents for the capture/transport and singular royal agency for the execution and disposal
  chosen_spanish_reading: Conservar pluralidad en 'Sacaron... y lo llevaron' y singularidad en 'él lo hirió... y arrojó...'
  alternative_spanish_readings:
  - Suavizar todo a un sujeto impersonal plural
  - Asignar todo a un mismo grupo de agentes
  rationale: El hebreo cambia de verbo plural a singular; la traducción española mantiene ese cambio en vez de nivelarlo, porque el antecedente singular inmediato es 'el rey Joacim'.
  doctrine_reference: Preservar la tensión gramatical y narrativa del texto fuente; no armonizar lo que el hebreo distingue.
- issue: Tono deshonroso del entierro
  english_pob_reading: burial places of the common people
  chosen_spanish_reading: los sepulcros de los hijos del pueblo
  alternative_spanish_readings:
  - las tumbas del pueblo
  - los sepulcros de la gente común
  rationale: La frase sugiere entierro ordinario, no sepultura honorable. 'Hijos del pueblo' mantiene el contacto con el hebreo y deja abierta la referencia social y funeraria que el POB inglés ya anotó.
  doctrine_reference: Respetar el contraste bíblico entre entierro honroso y entierro común, sin explicarlo en exceso en el cuerpo del texto.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo directamente y conserva la observación del POB inglés sobre el cambio de sujeto (plural en la captura/traslado; singular en la ejecución y el desecho del cadáver). También mantiene la alternativa léxica para קִבְרֵי בְּנֵי הָעָם, donde el inglés anotó que puede significar más literalmente 'graves of the people' en sentido de sepulcros comunes.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - '''Joacim'' se emplea como forma castellana estable para יְהוֹיָקִים, coherente con el registro bíblico en español.'
  - '''Cadáver'' se eligió para נִבְלָה por su precisión y por conservar la deshonra implícita.'
  - '''Sepulcros'' se prefirió frente a ''tumbas'' por el registro bíblico y por abarcar el sentido de lugares de sepultura.'
  - Se mantuvo el marcador [a] en el punto exacto de la frase que contiene la ambigüedad léxica sobre קִבְרֵי בְּנֵי הָעָם.
