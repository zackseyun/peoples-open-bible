translation:
  language: es
  text: Tú has guardado para tu siervo David mi padre lo que le hablaste[a]; con tu boca has hablado, y con tu mano lo has cumplido[b], como sucede hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que le prometiste». El hebreo dice literalmente «lo que le hablaste»; el sentido de promesa se infiere del contexto de cumplimiento.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con tu boca ... y con tu mano»; es una manera hebrea de contrastar la palabra hablada de Dios con su acción eficaz.
    reason: cultural_note
lexical_decisions:
- source_word: שָׁמַרְתָּ
  english_pob_choice: have kept
  chosen_spanish: has guardado
  alternatives_spanish:
  - has mantenido
  - has preservado
  lexicon: HALOT
  rationale: En este contexto de promesa/pacto, שׁמר comunica conservar fielmente o cumplir lo guardado. «Has guardado» mantiene esa idea en español con naturalidad y sin perder el matiz de fidelidad.
- source_word: לְעַבְדְּךָ
  english_pob_choice: for your servant
  chosen_spanish: para tu siervo
  alternatives_spanish:
  - a tu siervo
  - por tu siervo
  lexicon: HALOT
  rationale: La función de ל aquí, con שׁמר, admite la idea de beneficio o destinación. «Siervo» conserva el lenguaje de relación con Dios y es el equivalente más transparente al uso regio de עבד en esta oración.
- source_word: דָּוִיד אָבִי
  english_pob_choice: David my father
  chosen_spanish: David, mi padre
  alternatives_spanish:
  - mi padre David
  - David mi padre
  lexicon: HALOT
  rationale: Se conserva el orden cercano al hebreo y la aposición clara en español. La coma ayuda a leer el nombre propio y la relación filial sin forzar la sintaxis.
- source_word: אֵת אֲשֶׁר דִּבַּרְתָּ לוֹ
  english_pob_choice: what you spoke to him
  chosen_spanish: lo que le hablaste
  alternatives_spanish:
  - lo que le dijiste
  - lo que le prometiste
  lexicon: HALOT
  rationale: El hebreo dice literalmente «lo que hablaste con él/ a él». Mantener «hablaste» evita imponer en el texto principal la explicitación de «prometiste», aunque el contexto la haga evidente.
- source_word: וַתְּדַבֵּר בְּפִיךָ
  english_pob_choice: with your mouth you have spoken
  chosen_spanish: con tu boca has hablado
  alternatives_spanish:
  - con tu boca hablaste
  - tú hablaste con tu boca
  lexicon: HALOT
  rationale: «Boca» preserva la imagen corporal concreta del hebreo y el paralelismo con la cláusula siguiente. En español, «con tu boca has hablado» suena natural y mantiene la forma idiomática.
- source_word: וּבְיָדְךָ מִלֵּאתָ
  english_pob_choice: and with your hand you have fulfilled it
  chosen_spanish: y con tu mano lo has cumplido
  alternatives_spanish:
  - y con tu mano lo has llevado a cabo
  - y con tu mano lo has completado
  lexicon: HALOT
  rationale: מלא aquí expresa llevar a efecto o cumplir. «Cumplido» conserva el contraste entre palabra y acción, y «mano» mantiene el antropomorfismo retórico del texto.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como hasta este día
  - tal como sucede hoy
  lexicon: HALOT
  rationale: La fórmula hebrea señala la confirmación visible en el presente. «Como en este día» reproduce el giro con solemnidad bíblica comprensible en español.
theological_decisions:
- issue: 'Antropomorfismo divino: «boca» y «mano»'
  english_pob_reading: Preserve the anthropomorphic expressions literally
  chosen_spanish_reading: Preservar literalmente «boca» y «mano»
  alternative_spanish_readings:
  - reducir a «hablaste» y «cumpliste»
  - parafrasear como «dijiste» y «llevaste a cabo»
  rationale: El paralelismo del versículo une palabra eficaz y acción eficaz. Mantener las imágenes corporales sigue el hebreo y evita diluir la fuerza retórica del contraste.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido promesivo de «lo que hablaste»
  english_pob_reading: Literal 'what you spoke to him,' with the promissory sense inferred from the context of fulfillment
  chosen_spanish_reading: Mantener «lo que le hablaste» y no explicitar «prometiste» en el texto principal
  alternative_spanish_readings:
  - «lo que le prometiste»
  - «lo que le dijiste y prometiste»
  rationale: La promesa está claramente inferida por el contexto y por la cláusula de cumplimiento, pero el hebreo no usa un verbo explícito de prometer. El texto principal conserva esa tensión documental; la nota puede aclararla.
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: 'El inglés POB mantiene el paralelismo literal de «mouth/hand» y una nota sobre el sentido promesivo de «spoke to him». La redacción española conserva esa misma tensión: no sustituye el verbo hebreo por «prometiste» en el cuerpo del texto, pero sí lo ofrece como alternativa en nota. No se registran revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el Tetragrámaton explícito.
  - «Siervo» se mantiene para עבד por el registro de oración regia y porque no se trata de la oposición esclavo/siervo en sentido social directo.
  - Se conserva la metáfora concreta de «boca» y «mano» para alinear la sintaxis española con la del hebreo.
  - Se evita el calco «con tu mano has llenado» porque en español moderno oscurecería el sentido de cumplimiento que el audit trail documenta.
