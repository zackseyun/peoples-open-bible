translation:
  language: es
  text: Carros[a] y jinetes también subieron con él[b], y el campamento era muy grande[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo en singular colectivo: «carro», usado para un contingente de carros.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Los carros también subieron con él, y los jinetes».'
    reason: previous_rendering
  - marker: c
    text: 'Literalmente: «muy pesado»; aquí la expresión se entiende como muy grande, abundante o imponente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron
  - ascendieron
  - subió
  lexicon: HALOT
  rationale: עלה en este contexto narrativo de viaje conserva la idea de desplazamiento. En español, «subieron» mantiene la dirección verbal sin sobrecargar con un calco rígido de «went up».
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - con él mismo
  lexicon: HALOT
  rationale: La preposición y el sufijo pronominal apuntan claramente a José en contexto; «con él» es la forma natural y fiel en español.
- source_word: גַּם ... גַּם
  english_pob_choice: also ... and
  chosen_spanish: también ... y
  alternatives_spanish:
  - tanto ... como
  - asimismo ... y
  lexicon: HALOT
  rationale: La repetición de גַּם une dos grupos añadidos. En español, «también ... y» conserva la adición sin hacer pesada la coordinación.
- source_word: רֶכֶב
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros de combate
  - carros de batalla
  lexicon: HALOT
  rationale: En español, «carros» comunica el contingente militar con naturalidad. «Carros de guerra» sería más explícito, pero añade especificación no expresada directamente por el hebreo.
- source_word: פָּרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: hombres de a caballo
  alternatives_spanish:
  - jinetes
  - caballería
  - hombres montados
  lexicon: HALOT
  rationale: El término denota montados. «Hombres de a caballo» es claro, sobrio y evita un término moderno-militar como «caballería».
- source_word: הַמַּחֲנֶה
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - la caravana
  - la comitiva
  - el campamento
  lexicon: HALOT
  rationale: Aunque el contexto es procesional, el audit trail decide «camp». En español, «campamento» mantiene esa base léxica de forma transparente y readable, sin convertirlo en una simple paráfrasis.
- source_word: כָּבֵד מְאֹד
  english_pob_choice: was very large
  chosen_spanish: era muy grande
  alternatives_spanish:
  - era muy pesado
  - era muy impresionante
  - fue muy grande
  lexicon: HALOT
  rationale: La construcción idiomática literalmente es «pesado», pero para un grupo la fuerza natural en español es «muy grande». «Era» evita introducir un cambio de estado que el hebreo no exige.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que unió «chariots and horsemen» como un sujeto coordinado y la corrección de «company» a «camp». La versión española refleja esa coordinación natural con «Carros y hombres de a caballo» y mantiene «campamento» para הַמַּחֲנֶה, evitando inferir un cambio de estado no explícito.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda al tetragrama; este versículo no contiene ese caso.
  - Se prefirió «carros» y «hombres de a caballo» para conservar el tono sobrio del contingente militar sin importar terminología eclesiástica o militar anacrónica.
  - 'Las notas se anclan exactamente en el texto: [a], [b], [c] aparecen al final de la cláusula principal para respaldar las alternativas léxicas y de orden.'
