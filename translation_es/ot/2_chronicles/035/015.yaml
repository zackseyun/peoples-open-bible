base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/035/015.yaml
  text: And the singers[a], the sons of Asaph, were at their stations according to the command of David, Asaph, Heman, and Jeduthun the king’s seer; and the gatekeepers were at each gate. They had no need to depart from their service[b], because their brothers the Levites prepared for them.
  footnotes:
  - marker: a
    text: Or, 'They were not to depart from their service.' The Hebrew can be taken more strongly, though the following clause favors the sense that they did not need to leave because the Levites prepared for them.
    reason: alternative_reading
  - marker: b
    text: '''The king’s seer'' most naturally refers to Jeduthun.'
    reason: lexical_alternative
