translation:
  language: es
  text: Les añadió conocimiento, y les legó la ley de la vida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ley vivificante». La frase griega dice literalmente «ley de vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέθηκεν
  english_pob_choice: he added
  chosen_spanish: añadió
  alternatives_spanish:
  - les dio además
  - incrementó
  lexicon: LSJ
  rationale: El aoristo de προστίθημι expresa sumar o añadir algo ya dado. «Añadió» es natural en español y conserva la idea de un don agregado, sin sobreinterpretar.
- source_word: ἐπιστήμην
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - sabiduría
  - discernimiento
  lexicon: LSJ
  rationale: ἐπιστήμη remite a conocimiento, comprensión o saber. «Conocimiento» mantiene el sentido amplio intelectual y moral del contexto, sin forzar una matización técnica.
- source_word: νόμον ζωῆς
  english_pob_choice: the law of life
  chosen_spanish: la ley de la vida
  alternatives_spanish:
  - la ley vivificante
  - una ley de vida
  - la ley para la vida
  lexicon: LSJ
  rationale: La construcción griega es genitiva y puede entenderse como «ley de la vida». En español, «la ley de la vida» preserva la relación literal y deja abierta la ambigüedad entre una ley que pertenece a la vida o una ley que la ordena.
- source_word: ἐκληροδότησεν
  english_pob_choice: he bequeathed
  chosen_spanish: les legó
  alternatives_spanish:
  - les heredó
  - les dio en herencia
  - les asignó
  lexicon: LSJ
  rationale: El verbo tiene matiz de herencia, reparto y legado. «Les legó» es formal, natural en español y conserva la idea de transmitir algo como herencia sin volverlo excesivamente jurídico.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: a ellos / les
  alternatives_spanish:
  - a ellos mismos
  - a la humanidad
  lexicon: LSJ
  rationale: El pronombre dativo plural se refleja con el complemento «a ellos» y con clítico «les» en la segunda cláusula, manteniendo la referencia repetida a los destinatarios del don.
theological_decisions:
- issue: Cómo renderizar νόμον ζωῆς sin borrar la tensión entre lectura literal y lectura interpretativa
  english_pob_reading: the law of life, with a footnote noting 'life-giving law'
  chosen_spanish_reading: la ley de la vida, con nota sobre posible sentido de «ley vivificante»
  alternative_spanish_readings:
  - la ley vivificante
  - la ley que da vida
  - una ley de vida
  rationale: La frase griega es literalmente «ley de vida». En el texto principal se preserva esa forma para no cerrar el alcance semántico; la alternativa interpretativa se mantiene en nota como posibilidad real, no como sustitución del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
translation_notes:
  revision_awareness: El inglés POB revisó la versión desde «allotted» a «bequeathed» para reflejar mejor ἐκληροδότησεν. La versión española adopta desde el inicio un verbo de legado («legó») que conserva ese matiz hereditario y mantiene un registro formal y natural. También se sostuvo la decisión de dejar νόμον ζωῆς de manera literal en el texto principal, con la alternativa interpretativa reservada a nota.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton ni un κύριος citando el nombre divino en este verso.
  - «Ley de la vida» preserva la estructura genitiva y la ambigüedad útil del original; la nota ofrece la lectura dinámica sin reemplazar el texto principal.
  - El verbo «legó» mantiene la fuerza de transmisión hereditaria de ἐκληροδότησεν, más preciso que «dio» y menos jurídico que «asignó».
