translation:
  language: es
  text: 'Y el rey también dijo así: «Bendito sea Yahvé[a], el Dios de Israel, que hoy ha dado a uno sentado en mi trono, y mis ojos lo ven».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que hoy ha dado a uno que se sienta en mi trono, y mis ojos están viendo». El hebreo deja implícito el objeto de «ven»; la traducción lo suple por contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם כָּכָה
  english_pob_choice: And ... also ... this / thus
  chosen_spanish: Y ... también ... así
  alternatives_spanish:
  - Y además ... así
  - Y también dijo esto
  lexicon: HALOT
  rationale: La combinación añade otro dicho del rey y כָּכָה apunta a la fórmula citada; en español, «también ... así» conserva el valor aditivo y deíctico sin volver la frase torpe. «Dijo así» es más cercano a la forma narrativa que un calco como «dijo esto».
- source_word: אָמַר הַמֶּלֶךְ
  english_pob_choice: the king ... said
  chosen_spanish: el rey ... dijo
  alternatives_spanish:
  - el rey dijo
  - dijo el rey
  lexicon: HALOT
  rationale: Es la introducción normal de discurso en narrativa. «El rey dijo» mantiene el orden natural en español y la forma simple del verbo hebreo.
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Sea bendito
  - Bendito es
  lexicon: HALOT
  rationale: En fórmulas de bendición, «Bendito sea» reproduce bien el tono doxológico e imperativo/optativo del hebreo sin perder naturalidad en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT / DOCTRINE.md
  rationale: Se conserva el nombre propio divino tal como establece la política del proyecto, en vez de sustituirlo por una designación titulada. «Yahvé» es la forma principal en español del proyecto y corresponde al Tetragrámaton.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Es la expresión de constructo estándar y en español se rinde con transparencia como «el Dios de Israel», preservando el vínculo pactual e identitario.
- source_word: אֲשֶׁר נָתַן
  english_pob_choice: who ... has given
  chosen_spanish: que ... ha dado
  alternatives_spanish:
  - que hoy ha dado
  - que ha dado
  lexicon: HALOT
  rationale: נתן es el verbo común «dar»; aquí introduce la razón de la bendición. El perfecto compuesto español refleja adecuadamente la acción completada con relevancia presente.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la forma natural y directa en español para el énfasis temporal del texto.
- source_word: יֹשֵׁב
  english_pob_choice: one to sit
  chosen_spanish: a uno para que se siente
  alternatives_spanish:
  - a uno sentado
  - a uno que se siente
  lexicon: HALOT
  rationale: El participio funciona sustantivamente para la persona colocada en el trono. En español, la construcción final expresa el resultado/propósito con claridad y evita introducir un nombre ausente en el versículo.
- source_word: עַל כִּסְאִי
  english_pob_choice: on my throne
  chosen_spanish: en mi trono
  alternatives_spanish:
  - sobre mi trono
  - en mi asiento real
  lexicon: HALOT
  rationale: כִּסֵּא aquí tiene sentido real; «trono» es la equivalencia normal y «en mi trono» fluye de manera natural en español, preservando la idea de entronización.
- source_word: וְעֵינַי רֹאוֹת
  english_pob_choice: and my eyes see it
  chosen_spanish: y mis ojos lo ven
  alternatives_spanish:
  - y mis ojos lo están viendo
  - y mis ojos ven eso
  lexicon: HALOT
  rationale: La frase expresa la experiencia personal del rey como testigo del acontecimiento. El objeto queda implícito en hebreo; en español, «lo» se suministra desde el contexto para evitar oscuridad, sin sobreespecificar.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El versículo usa el Tetragrámaton directamente. Conforme a la política doctrinal del proyecto, se conserva el nombre divino en transliteración, evitando la sustitución por un título y manteniendo la referencia personal al Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Objeto implícito en «y mis ojos ven»
  english_pob_reading: The Hebrew leaves the object of 'see' unstated; English supplies 'it' from context.
  chosen_spanish_reading: y mis ojos lo ven
  alternative_spanish_readings:
  - y mis ojos ven
  - y mis ojos lo están viendo
  rationale: El hebreo omite el objeto, pero el contexto lo recupera. En español, un clítico objeto directo evita una frase abrupta y mantiene la economía del original sin convertirla en paráfrasis.
  doctrine_reference: Uso de claridad gramatical sin alterar el contenido del texto
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasaje revisado del auditor: se prefirió una correspondencia formal cercana de «dijo así» para reflejar כָּכָה, y se evitó la idea enfática de «mientras» en el tramo final. En español, se optó por una solución igualmente sobria: «y mis ojos lo ven», que mantiene la coordinación del hebreo y la lectura inmediata del testigo ocular.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto para el nombre divino.
  - Se usa «Dios de Israel» como equivalente transparente del constructo hebreo.
  - Se preserva el valor verbal de «Bendito sea» en una fórmula de alabanza.
  - El clítico «lo» recupera el objeto implícito del hebreo sin añadir contenido nuevo.
  - La frase «a uno para que se siente en mi trono» refleja el participio sustantivado sin introducir un sujeto explícito no presente en el texto.
