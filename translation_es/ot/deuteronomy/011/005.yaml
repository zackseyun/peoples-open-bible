revisions:
- from: y lo que hizo por ustedes en el desierto, hasta que llegaron a este lugar—
  to: y lo que hizo por ustedes en la región desierta, hasta que llegaron a este lugar—
  rationale: Se reemplaza «desierto» por «región desierta» para reflejar mejor el valor de מִדְבָּר documentado en la auditoría del POB, manteniendo un español natural y de registro bíblico claro. No se requieren notas al pie porque no se introduce nueva ambigüedad.
