translation:
  language: es
  text: Traerán el muslo de la contribución[a] y el pecho de la ofrenda mecida[b], junto con las ofrendas de alimento de las porciones de grasa, para presentarlos como ofrenda mecida delante de Yahvé; y será para ti y para tus hijos contigo como estatuto perpetuo, tal como Yahvé mandó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «pierna». «Contribución» corresponde al término tradicional «ofrenda elevada».
    reason: lexical_alternative
  - marker: b
    text: «Ofrenda mecida» se refiere a una presentación ritual delante de Yahvé; algunos la traducen más generalmente como «ofrenda presentada».
    reason: cultural_note
lexical_decisions:
- source_word: שׁוֹק
  english_pob_choice: thigh
  chosen_spanish: muslo
  alternatives_spanish:
  - pierna
  - jamón
  lexicon: HALOT
  rationale: En contexto sacrificial, el término alude a la porción del cuarto trasero del animal. «Muslo» conserva la referencia anatómica sin sonar tan técnica como «pierna» ni tan específica regionalmente como «jamón».
- source_word: תְּרוּמָה
  english_pob_choice: contribution
  chosen_spanish: contribución
  alternatives_spanish:
  - ofrenda alzada
  - ofrenda de contribución
  lexicon: HALOT
  rationale: «Contribución» sigue la decisión inglesa de evitar el tecnicismo arcaico «heave offering» y refleja bien la porción apartada para el sacerdote.
- source_word: חָזֶה
  english_pob_choice: breast
  chosen_spanish: pecho
  alternatives_spanish:
  - pechuga
  - seno
  lexicon: HALOT
  rationale: «Pecho» es la designación anatómica natural en español y mantiene la claridad cultual del pasaje.
- source_word: תְּנוּפָה
  english_pob_choice: wave offering
  chosen_spanish: ofrenda mecida
  alternatives_spanish:
  - ofrenda movida
  - ofrenda presentada
  lexicon: HALOT
  rationale: La expresión técnica apunta al gesto ritual de mecer/presentar ante Yahvé. «Ofrenda mecida» preserva el valor cultual y evita una explicación excesiva en el texto principal.
- source_word: עַל אִשֵּׁי הַחֲלָבִים
  english_pob_choice: along with the food offerings of the fat portions
  chosen_spanish: junto con las ofrendas encendidas de las porciones de grasa
  alternatives_spanish:
  - sobre las ofrendas ígneas de las grasas
  - junto con los sacrificios por fuego de la grasa
  lexicon: HALOT
  rationale: «Ofrendas encendidas» comunica el valor sacrificial de אִשֵּי sin recurrir a un calco oscuro; «porciones de grasa» concreta el referente de הַחֲלָבִים. Se mantiene la relación de acompañamiento con «junto con».
- source_word: יָבִיאוּ
  english_pob_choice: they shall bring
  chosen_spanish: Traerán
  alternatives_spanish:
  - deben traer
  - harán traer
  lexicon: HALOT
  rationale: El imperfecto legal tiene fuerza prescriptiva. «Traerán» es natural en español bíblico y conserva el mandato implícito.
- source_word: לְהָנִיף תְּנוּפָה
  english_pob_choice: to wave as a wave offering
  chosen_spanish: para mecerlo como ofrenda mecida
  alternatives_spanish:
  - para presentarlo como ofrenda presentada
  - para moverlo como ofrenda mecida
  lexicon: HALOT
  rationale: El infinitivo con el sustantivo cognado expresa tanto la acción ritual como la categoría de la ofrenda. El objeto implícito se vierte con «lo» para mantener la fluidez española y el vínculo con los elementos mencionados.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según el estándar del proyecto, y «delante de» reproduce bien la fórmula cultual.
- source_word: וְהָיָה לְךָ וּלְבָנֶיךָ אִתְּךָ
  english_pob_choice: and it shall be for you and for your sons with you
  chosen_spanish: y será para ti y para tus hijos contigo
  alternatives_spanish:
  - y pertenecerá a ti y a tus hijos contigo
  - y será tuyo y de tus hijos contigo
  lexicon: HALOT
  rationale: La construcción expresa asignación/porción sacerdotal. «Será para ti» mantiene la relación de beneficio sin añadir una interpretación más fuerte que el hebreo.
- source_word: לְחָק עוֹלָם
  english_pob_choice: as a permanent statute
  chosen_spanish: como estatuto perpetuo
  alternatives_spanish:
  - como ordenanza perpetua
  - como decreto perpetuo
  lexicon: HALOT
  rationale: «Estatuto» es el equivalente jurídico-cultual más natural en español bíblico; «perpetuo» conserva el sentido de duración indefinida.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה
  english_pob_choice: just as Yahweh commanded
  chosen_spanish: tal como Yahvé mandó
  alternatives_spanish:
  - como Yahvé mandó
  - según Yahvé mandó
  lexicon: HALOT
  rationale: «Tal como» expresa bien la comparación normativa de כַּאֲשֶׁר. «Mandó» es una equivalencia directa y sobria para צִוָּה.
theological_decisions:
- issue: Renderización del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente; conforme al estándar del proyecto, se preserva el nombre divino como «Yahvé» en vez de ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Terminología cultual de תְּרוּמָה y תְּנוּפָה
  english_pob_reading: contribution / wave offering
  chosen_spanish_reading: contribución / ofrenda mecida
  alternative_spanish_readings:
  - ofrenda alzada / ofrenda mecida
  - heave offering / wave offering
  rationale: 'Se sigue la estrategia de la POB inglesa: evitar el arcaísmo de «heave offering» y conservar el término técnico de «wave offering» con una expresión española transparente que sigue siendo cultual.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5, 6
- issue: Valor de אִשֵּׁי הַחֲלָבִים
  english_pob_reading: food offerings of the fat portions
  chosen_spanish_reading: ofrendas encendidas de las porciones de grasa
  alternative_spanish_readings:
  - ofrendas por fuego de la grasa
  - sacrificios encendidos de las grasas
  rationale: La expresión debe mostrar que se trata de lo que se quema como parte del sacrificio. «Encendidas» comunica el aspecto de fuego sin perder legibilidad, y «porciones de grasa» identifica el referente material.
  doctrine_reference: HALOT; contexto sacerdotal de Levítico 10
- issue: Fórmula final de obligación e instrucción
  english_pob_reading: as a permanent statute, just as Yahweh commanded
  chosen_spanish_reading: como estatuto perpetuo, tal como Yahvé mandó
  alternative_spanish_readings:
  - como ordenanza perpetua, como Yahvé mandó
  - como decreto perpetuo, según Yahvé mandó
  rationale: La frase une durabilidad legal y obediencia directa. «Estatuto perpetuo» es una fórmula natural y fiel; «tal como» preserva la comparación normativa de la cláusula final.
  doctrine_reference: HALOT; fórmula legal-cultual en la Torá
translation_notes:
  revision_awareness: 'La POB inglesa revisó la frase preposicional de «with» a «along with» para dar mayor naturalidad. La versión española sigue esa mejora con «junto con». También mantiene el ajuste auditado de los términos cultuales: «contribution»/«wave offering» y la referencia explícita a Yahvé.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma uniforme para יְהוָה.
  - Se usa «ofrenda mecida» para תְּנוּפָה, evitando alternar con «presentación» en este versículo para conservar la coherencia técnica.
  - «Estatuto perpetuo» conserva el registro jurídico-cultual de la perícopa.
  - «Ofrendas encendidas» se usa como equivalente legible de אִשֵּׁי, sin reemplazarlo por un término más tradicional que oscurezca la imagen sacrificial.
