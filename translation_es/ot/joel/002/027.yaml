review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: conocimiento resultante, presencia de Yahvé en medio de Israel, identidad pactual de Yahvé como Dios de su pueblo, exclusividad divina, y promesa permanente de reversión de la vergüenza. Sin embargo, contiene dos fallas materiales: (1) la nota [a] está mal anclada y no corresponde a ninguna alternativa significativa del texto; el pie inglés preserva la alternativa literal para la cláusula final, no para «en medio de Israel»; (2) «mi pueblo nunca más será avergonzado» suena gramaticalmente singular y menos natural en español para un sujeto colectivo, donde conviene el giro singular semántico con verbo singular más claro o una formulación idiomática mejor. La mejor reparación es trasladar la nota a la cláusula final y usar una formulación más natural de la promesa.'
  spanish_quality_summary: El español es claro y digno, con buena elección de «Entonces sabrán», «en medio de Israel» y «Yahvé». No obstante, la nota actual resulta redundante y errónea, y la cláusula final puede mejorarse en naturalidad e idiomaticidad bíblica moderna. «Yo soy Yahvé su Dios» es correcto y legible en registro neutral latinoamericano.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; אֱלֹהֵיכֶם → «su Dios» aceptable como 2mp en español neutral; וְאֵין עוֹד → «no hay otro» preserva la exclusividad. No hay conflicto de glosario salvo la necesidad de preservar en nota la alternativa literal de לְעוֹלָם, como hizo el rastro inglés.'
  issues:
  - severity: high
    issue: La nota al pie [a] está asignada al lugar equivocado y con contenido incorrecto.
    rationale: 'El pie inglés marca una alternativa literal para la cláusula final («my people will not be put to shame forever»), no para «in the midst of Israel». La nota española actual («O, más literalmente: “en medio de Israel”») no aporta variante real y falsea el rastro auditado.'
  - severity: medium
    issue: La cláusula final necesita una formulación española más natural y mejor alineada con la nota literal.
    rationale: «Mi pueblo nunca más será avergonzado» es comprensible, pero en español bíblico natural suena más idiomático «mi pueblo no volverá a ser avergonzado» o «mi pueblo nunca más será puesto en vergüenza». Además, la alternativa literal «para siempre» se expresa mejor si el texto principal usa «no volverá a ser».
  revised_spanish_text: Entonces sabrán que yo estoy en medio de Israel, y que yo soy Yahvé su Dios, y no hay otro; y mi pueblo no volverá a ser avergonzado[a].
  revised_footnotes:
