translation:
  language: es
  text: Tú, Oh Rey, habiendo creado la tierra sin límites ni medida, escogiste esta ciudad y santificaste este lugar para tu nombre, aunque no tienes necesidad de nada[b], Oh Dios de todos, y lo glorificaste con una manifestación majestuosa[a], habiéndolo establecido para la gloria de tu gran y honrado nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en una aparición majestuosa» o «mediante una aparición espléndida»; la frase griega puede referirse a una epifanía visible de Dios.'
    reason: lexical_alternative
  - marker: b
    text: El griego de esta cláusula es sintácticamente difícil; la traducción lo entiende como una alabanza a Dios, el que no necesita nada y es Dios de todos.
    reason: alternative_reading
lexical_decisions:
- source_word: βασιλεῦ
  english_pob_choice: O King
  chosen_spanish: oh Rey
  alternatives_spanish:
  - Rey
  - oh Soberano
  lexicon: LSJ
  rationale: El vocativo en oración se conserva con «oh Rey», que mantiene el tono de súplica y la dignidad del address original sin volverlo demasiado arcaico.
- source_word: κτίσας
  english_pob_choice: having created
  chosen_spanish: habiendo creado
  alternatives_spanish:
  - creando
  - que creaste
  lexicon: LSJ
  rationale: El participio aoristo antecede a los verbos principales y expresa acción previa; «habiendo creado» reproduce esa relación temporal y lógica.
- source_word: τὴν ἀπέρατον καὶ ἀμέτρητον γῆν
  english_pob_choice: the boundless and immeasurable earth
  chosen_spanish: la tierra sin límites ni medida
  alternatives_spanish:
  - la tierra inmensa e inmensurable
  - la tierra ilimitada e inconmensurable
  lexicon: LSJ
  rationale: Se conservan los dos intensificadores del griego con una formulación natural en español. «Tierra» es más apto que «país» o «territorio» en este contexto de creación cósmica.
- source_word: ἐξελέξω
  english_pob_choice: chose
  chosen_spanish: escogiste
  alternatives_spanish:
  - elegiste
  - seleccionaste
  lexicon: LSJ
  rationale: «Escogiste» transmite el acto divino de elección con naturalidad y sin tecnicismo adicional.
- source_word: ἡγίασας
  english_pob_choice: made ... holy
  chosen_spanish: santificaste
  alternatives_spanish:
  - hiciste santo
  - consagraste
  lexicon: LSJ
  rationale: Aquí el verbo apunta a apartar el lugar para Dios; «santificaste» conserva el campo semántico de santidad y la fuerza cultual del verbo.
- source_word: εἰς σὸν ὄνομά
  english_pob_choice: for your name
  chosen_spanish: para tu nombre
  alternatives_spanish:
  - en favor de tu nombre
  - a tu nombre
  lexicon: LSJ
  rationale: La preposición expresa dedicación/uso en relación con el nombre divino. «Para tu nombre» es claro y fiel sin forzar un giro idiomático.
- source_word: ἀπροσδεεῖ
  english_pob_choice: though you have no need of anything
  chosen_spanish: aunque no tienes necesidad de nada
  alternatives_spanish:
  - que no necesitas nada
  - siendo tú quien no necesita nada
  lexicon: LSJ
  rationale: Se mantiene la tensión sintáctica del pasaje con una cláusula concesiva natural en español, preservando la afirmación de suficiencia divina.
- source_word: τῷ τῶν ἁπάντων
  english_pob_choice: the God of all
  chosen_spanish: oh Dios de todos
  alternatives_spanish:
  - Dios de todo
  - oh Dios de todo lo creado
  lexicon: LSJ
  rationale: La lectura inglesa entiende la frase como una apelación a Dios universal; «Dios de todos» conserva la universalidad y el tono vocativo en español.
- source_word: παρεδόξασας
  english_pob_choice: glorified it
  chosen_spanish: lo glorificaste
  alternatives_spanish:
  - lo exaltaste
  - lo honraste
  lexicon: LSJ
  rationale: Se mantiene el lenguaje de gloria que atraviesa el versículo y se evita debilitar el valor teológico del verbo.
- source_word: ἐν ἐπιφανείᾳ μεγαλοπρεπεῖ
  english_pob_choice: with majestic manifestation
  chosen_spanish: con una manifestación majestuosa
  alternatives_spanish:
  - con una aparición majestuosa
  - en una epifanía espléndida
  lexicon: LSJ
  rationale: La frase probablemente alude a una manifestación visible de Dios. «Manifestación majestuosa» preserva el matiz epifánico sin imponer una terminología demasiado técnica.
- source_word: σύστασιν ποιησάμενος αὐτοῦ
  english_pob_choice: having established it
  chosen_spanish: habiéndolo establecido
  alternatives_spanish:
  - habiéndolo fundado
  - habiendo constituido eso
  lexicon: LSJ
  rationale: El giro comprimido del griego apunta a establecer/fundar el lugar; «habiéndolo establecido» es suficientemente amplio y fiel.
- source_word: πρὸς δόξαν τοῦ μεγάλου καὶ ἐντίμου ὀνόματός σου
  english_pob_choice: for the glory of your great and honored name
  chosen_spanish: para la gloria de tu gran y honrado nombre
  alternatives_spanish:
  - para la gloria de tu gran y precioso nombre
  - para la gloria de tu grande y noble nombre
  lexicon: LSJ
  rationale: «Gloria» y «nombre» se conservan para mantener la densidad bíblica del original. «Honrado» traduce bien ἐντίμου en español contemporáneo.
theological_decisions:
- issue: ἀπροσδεεῖ como afirmación de la suficiencia divina dentro de una cláusula difícil
  english_pob_reading: though you have no need of anything, O God of all
  chosen_spanish_reading: aunque no tienes necesidad de nada, oh Dios de todos
  alternative_spanish_readings:
  - siendo tú quien no necesita nada, oh Dios de todos
  - pues no necesitas nada, oh Dios de todos
  rationale: La sintaxis griega es trabajosa, pero el sentido doxológico es que Dios carece de necesidad. La versión española conserva esa afirmación sin suavizarla en exceso ni disolver el vocativo.
  doctrine_reference: Preservar la tensión del original y la autosuficiencia divina; primacía del texto fuente sobre la armonización interpretativa.
- issue: ἐπιφάνεια como manifestación divina visible
  english_pob_reading: with majestic manifestation
  chosen_spanish_reading: con una manifestación majestuosa
  alternative_spanish_readings:
  - con una aparición majestuosa
  - con una epifanía majestuosa
  rationale: El contexto de oración sugiere una irrupción visible de la presencia divina. «Manifestación» deja abierta la posibilidad sin imponer un tecnicismo innecesario.
  doctrine_reference: Lenguaje de teofanía/epifanía en la tradición bíblica griega.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anclando explícitamente cada nota al texto español con los marcadores [a] y [b]. También se mantuvo una solución que refleja el valor concesivo de ἀπροσδεεῖ y la ambigüedad epifánica de ἐπιφανείᾳ μεγαλοπρεπεῖ.
  spanish_consistency_notes:
  - Se usa «oh» para el vocativo solemne, coherente con el tono litúrgico del pasaje.
  - Se prefirió «santificaste» y «glorificaste» para conservar el léxico bíblico de consagración y gloria.
  - Se evitó sustituir «Dios» por un título más específico no atestiguado en el griego.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto base y no se reutilizan.
