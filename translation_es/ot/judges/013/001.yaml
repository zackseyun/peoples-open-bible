    rationale: La POB inglesa conservó una nota explicando que «into the hand of» es un modismo de poder/dominio. Las instrucciones piden preservar alternativas significativas cuando la POB inglesa las preservó. En español debe añadirse una nota equivalente, con anclaje en el texto.
  revised_spanish_text: Y los hijos de Israel[a] volvieron a hacer lo malo ante los ojos de Yahvé, y Yahvé los entregó en manos[b] de los filisteos por cuarenta años.
  revised_footnotes:
