review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: comparación con la luna, verbo pasivo con sujeto implícito, permanencia, testigo celestial no identificado, y transliteración de Selah. También respeta la decisión auditada de mantener ''cielo'' en singular. Sin embargo, la nota [a] no preserva una alternativa real, porque repite exactamente la misma frase del texto principal.'
  spanish_quality_summary: El español es claro, digno y natural. 'Como la luna, será establecido para siempre' suena bien en contexto poético y conserva la compacidad del hebreo. 'El testigo en el cielo es fiel' también es legible y teológicamente prudente. La única reparación necesaria es en la nota [a], que debe ofrecer una alternativa española genuina o eliminarse; dado que el inglés POB sí conserva una alternativa, conviene mantenerla con una formulación distinta.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, esclavo, etc. 'Fiel' para נֶאֱמָן y 'cielo' para בַּשַּׁחַק concuerdan con el audit trail. 'Selah' transliterado también está alineado.
  issues:
  - severity: medium
    issue: La nota [a] repite el texto principal en vez de dar una alternativa léxica real.
    rationale: El inglés POB documenta una alternativa genuina ('Or as the moon'). En español, 'O como la luna' no añade información porque el texto ya dice 'Como la luna'. Debe cambiarse a una alternativa natural como 'Al igual que la luna'.
  revised_spanish_text: Como la luna[a], será establecido para siempre, y el testigo en el cielo[b] es fiel. Selah
  revised_footnotes:
  - marker: a
    text: O 'al igual que la luna'.
    reason: lexical_alternative
  - marker: b
    text: El 'testigo en el cielo' suele entenderse como la luna, que funciona como testigo celestial fiable de la permanencia del pacto.
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y al audit trail del POB. Solo se corrige la nota [a] para que exprese una alternativa real en español en lugar de repetir exactamente la lectura principal.
