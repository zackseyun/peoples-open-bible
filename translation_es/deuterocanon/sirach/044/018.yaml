revisions:
- from: Se estableció con él un pacto perpetuo, para que no fuera destruida toda carne[a].
  to: Se hizo con él un pacto perpetuo, para que no fuera destruida toda carne[a].
  rationale: Se reemplaza «Se estableció con él» por «Se hizo con él» para reflejar mejor el idiomatismo hebreo de hacer/cortar un pacto, sin introducir una calca antinatural en español. Se conserva «pacto perpetuo», «toda carne» y la nota sobre el diluvio porque representan fielmente la evidencia fuente y la decisión auditada en inglés.
