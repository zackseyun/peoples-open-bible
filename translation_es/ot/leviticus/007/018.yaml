  text: But if any of the flesh of his peace offering is eaten on the third day[a], it will not be accepted; it will not be credited to the one who offers it. It will be an abhorrent thing[b], and the person who eats from it will bear his guilt.
  footnotes:
  - marker: a
    text: Or 'tainted meat' / 'foul thing.' The Hebrew term is a technical sacrificial word for an offering rendered unacceptable and loathsome.
    reason: lexical_alternative
  - marker: b
    text: '''Peace offering'' may also be rendered ''fellowship offering'' or ''offering of well-being.'''
    reason: lexical_alternative
