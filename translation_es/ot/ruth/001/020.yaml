    rationale: En el bloque explicativo se afirma «el verso dice que Yahvé le ha dado amargura», pero en este versículo el título fuente es שַׁדַּי. Conviene mantener consistencia terminológica con el texto fuente.
  revised_spanish_text: 'Pero ella les dijo[a]: «No me llamen Noemí; llámenme Mara, porque el Todopoderoso me ha hecho muy amarga».

    '
