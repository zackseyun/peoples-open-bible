translation:
  language: es
  text: Todo el que pase a los que son contados[a], de veinte años de edad para arriba, dará la contribución de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los contados». El hebreo literalmente habla de uno que «pasa» en relación con los contados, probablemente con referencia al procedimiento del censo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: Everyone
  chosen_spanish: Todo el que
  alternatives_spanish:
  - Todos los que
  - Cada uno que
  lexicon: HALOT
  rationale: El hebreo כֹּל introduce una idea distributiva que gobierna la frase participial. En español, «Todo el que» comunica con naturalidad ese valor universal sin perder el vínculo con la cláusula siguiente.
- source_word: הָעֹבֵר
  english_pob_choice: who passes over
  chosen_spanish: pase
  alternatives_spanish:
  - cruce
  - pase de un lado a otro
  lexicon: HALOT
  rationale: El participio de עבר conserva una imagen concreta de «pasar». «Pase» mantiene el verbo de movimiento y evita reducir de entrada la expresión a una mera categoría administrativa.
- source_word: עַל הַפְּקֻדִים
  english_pob_choice: to those who are counted
  chosen_spanish: a los contados
  alternatives_spanish:
  - entre los contados
  - a los que están contados
  - a los enumerados
  lexicon: HALOT
  rationale: La construcción idiomática apunta al grupo registrado en el censo. «A los contados» conserva la relación con el conteo y suena más natural en español que una expansión explicativa demasiado larga. Mantiene la tensión entre la imagen de «pasar» y la referencia censal.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמָעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: de veinte años de edad para arriba
  alternatives_spanish:
  - desde los veinte años en adelante
  - de veinte años y más
  lexicon: HALOT
  rationale: Es una fórmula legal de umbral de edad. «De veinte años de edad para arriba» es claro, idiomático y preserva el registro normativo del hebreo.
- source_word: יִתֵּן
  english_pob_choice: shall give
  chosen_spanish: dará
  alternatives_spanish:
  - deberá dar
  - ha de dar
  lexicon: HALOT
  rationale: El imperfecto hebreo tiene fuerza injuntiva. En español, el futuro simple comunica bien la obligación normativa sin sonar excesivamente arcaico.
- source_word: תְּרוּמַת
  english_pob_choice: contribution
  chosen_spanish: la contribución
  alternatives_spanish:
  - la ofrenda
  - la aportación
  - el tributo
  lexicon: HALOT
  rationale: En este contexto de impuesto/censo, «contribución» refleja mejor el valor de תְּרוּמָה como ofrenda apartada sin cargarla con la terminología ritual de «ofrenda mecida» ni con el matiz político de «tributo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración, en línea con el criterio del proyecto. «Yahvé» es la forma española establecida para el Tetragrama y evita la sustitución por un título.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. La decisión del POB de preservar el nombre divino se mantiene en español con «Yahvé», la forma más reconocible y adecuada en español bíblico para el nombre personal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: How to preserve the census idiom עבר עַל הַפְּקֻדִים
  english_pob_reading: passes over to those who are counted
  chosen_spanish_reading: pase a los contados
  alternative_spanish_readings:
  - pase entre los contados
  - sea contado entre ellos
  - pase a los enumerados
  rationale: La frase conserva la imagen verbal de «pasar» y al mismo tiempo deja claro el referente censal. Se evita traducirla solo como un hecho administrativo abstracto, porque el hebreo mantiene una metáfora procedimental significativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition; preserve significant lexical decisions'
translation_notes:
  revision_awareness: 'Coincide con el pasaje de referencia y con el audit trail inglés: se conserva la imagen de «pasar» vinculada al censo, se mantiene la fórmula de edad legal y se traduce el Tetragrama con el nombre divino en español. No se detectaron revisiones aplicadas en el registro inglés, y la concordancia de revisión indica acuerdo alto.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» para יְהוָה, conforme al criterio del proyecto.
  - Se usa «contados» para reflejar el grupo censado sin borrar la metáfora de «pasar».
  - «Contribución» se mantiene como término sobrio y no ritualizado para תְּרוּמָה en este contexto.
  - El registro es legal y bíblico-formal, pero con sintaxis natural para español contemporáneo.
