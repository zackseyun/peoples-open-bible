revisions:
- from: Un solo testigo no se sostendrá contra un hombre[a], por cualquier iniquidad o por cualquier pecado[b], en relación con cualquier pecado que cometa; por la declaración de dos testigos o por la declaración de tres testigos, un asunto se sostendrá[c].
  to: Un solo testigo no se mantendrá contra un hombre[a], por cualquier iniquidad o por cualquier pecado, en relación con cualquier pecado que cometa; por el testimonio de dos testigos o por el testimonio de tres testigos,[b] un asunto se mantendrá[c].
  rationale: 'Se corrige el punto más importante de fidelidad auditada: la nota sobre עַל־פִּי debe conservar la alternativa literal «por boca de». También se cambia «declaración» por «testimonio» para reflejar mejor el sentido forense. Finalmente, se sustituye «se sostendrá» por «se mantendrá», que sigue preservando la repetición del hebreo pero suena algo más natural en español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:49:43Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal del hebreo y conserva el paralelismo de יָקוּם ... יָקוּם, así como la acumulación de categorías: עָוֺן, חַטָּאת, חֵטְא. También mantiene correctamente «contra un hombre» como masculino representativo. Sin embargo, «se sostendrá» suena poco idiomático en español para el verbo legal «stand/be established», y «por la declaración de» no representa tan bien el modismo forense עַל־פִּי como «por el testimonio de».'
  spanish_quality_summary: 'El texto es claro, pero tiene dos giros poco naturales o menos precisos para español bíblico-jurídico: «un solo testigo no se sostendrá» y «un asunto se sostendrá». En este contexto, «no se aceptará / quedará confirmado» o mejor un giro impersonal-legal como «no bastará» sería más natural, pero para preservar el paralelismo verbal del hebreo conviene usar «no será válido ... quedará válido» o, más idiomáticamente, «no se mantendrá ... se mantendrá». Aun así, la mejor solución combinando fidelidad y naturalidad es «no será suficiente ... quedará establecido», pero eso pierde la repetición. Dado que la POB auditó expresamente la repetición, propongo «no se tendrá por válido ... quedará válido» no suena bien. La opción más equilibrada en español es «no se sostendrá»? Sigue siendo dura. Mejor: «no se mantendrá ... se mantendrá» conserva repetición y mejora algo la naturalidad. Además, la nota b del borrador no corresponde a una alternativa preservada en la POB inglesa;
    debe reflejar la literalidad de עַל־פִּי, no comentar «pecado».'
  glossary_alignment: 'No hay términos de glosario mayores en conflicto. «Iniquidad», «pecado», «testigo» y «hombre» están alineados con la evidencia y la racionalidad documentada. El ajuste principal es terminológico-jurídico: preferir «testimonio» sobre «declaración» para עַל־פִּי, y corregir la nota b para conservar la alternativa literal «por boca de».'
  issues:
  - severity: medium
    issue: «se sostendrá» es poco idiomático en español jurídico-bíblico
    rationale: Aunque intenta preservar la repetición de קום, suena forzado en ambas mitades del versículo. «se mantendrá» comunica mejor la idea de validez/establecimiento sin apartarse mucho del hebreo.
  - severity: medium
    issue: «por la declaración de» debilita el modismo forense עַל־פִּי
    rationale: La POB inglesa eligió «on the testimony of» y conservó en nota la literalidad «by the mouth of». En español, «por el testimonio de» refleja mejor la base testimonial del juicio.
  - severity: high
    issue: La nota [b] del borrador no corresponde al punto textual preservado por la auditoría inglesa
    rationale: La nota inglesa [b] explica la literalidad de עַל־פִּי («por la boca de...»), pero la española [b] comenta «pecado», introduciendo una nota distinta y omitiendo la alternativa auditada que sí debía preservarse.
  revised_spanish_text: Un solo testigo no se mantendrá contra un hombre[a], por cualquier iniquidad o por cualquier pecado, en relación con cualquier pecado que cometa; por el testimonio de dos testigos o por el testimonio de tres testigos,[b] un asunto se mantendrá[c].
  revised_footnotes:
  - marker: a
    text: O «contra cualquiera» / «contra una persona». El hebreo dice «contra un hombre», usando una forma masculina singular con sentido representativo legal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por boca de dos testigos o por boca de tres testigos».
    reason: lexical_alternative
  - marker: c
    text: O «un caso quedará establecido». El verbo hebreo es el mismo que antes en el versículo («se mantendrá»), creando un paralelismo legal.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el punto más importante de fidelidad auditada: la nota sobre עַל־פִּי debe conservar la alternativa literal «por boca de». También se cambia «declaración» por «testimonio» para reflejar mejor el sentido forense. Finalmente, se sustituye «se sostendrá» por «se mantendrá», que sigue preservando la repetición del hebreo pero suena algo más natural en español.'
