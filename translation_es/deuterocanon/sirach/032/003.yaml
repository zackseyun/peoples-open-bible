translation:
  language: es
  text: Habla, anciano, porque te corresponde; pero con buen discernimiento[a], y no impidas el canto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo comprimido admite también la idea de 'y con reserva/modestia en el entendimiento' o 'y muestra prudente contención'.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego difiere notablemente y lee: ''el que ofrece sémola devuelve una gracia'', lo que señala una tradición textual divergente para este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: מלל
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla algo
  lexicon: HALOT
  rationale: El imperativo comunica la orden directa del original y suena natural en español; 'Habla' conserva la concisión y el registro exhortativo del texto sapiencial.
- source_word: שב
  english_pob_choice: elder
  chosen_spanish: anciano
  alternatives_spanish:
  - viejo
  - hombre de edad
  - anciano respetado
  lexicon: HALOT
  rationale: '''Anciano'' mantiene la referencia a edad y respeto social sin volver la frase demasiado explicativa. En este contexto sapiencial resulta más natural que ''elder'' o una paráfrasis más larga.'
- source_word: כי הוא לך
  english_pob_choice: for it is fitting for you
  chosen_spanish: porque te conviene
  alternatives_spanish:
  - porque es adecuado para ti
  - porque te corresponde
  - porque es tu lugar
  lexicon: HALOT
  rationale: La idea es de conveniencia/propriedad social, no de posesión. 'Te conviene' expresa bien esa adecuación en español y preserva la brevedad del hebreo.
- source_word: והצנא שכל
  english_pob_choice: but with sound understanding
  chosen_spanish: pero con buen discernimiento
  alternatives_spanish:
  - y con prudente reserva
  - pero con sensatez
  - y con entendimiento moderado
  lexicon: HALOT
  rationale: La forma hebrea es comprimida y admite la idea de reserva/moderación junto con entendimiento. 'Buen discernimiento' retiene la dimensión prudencial sin forzar una lectura demasiado concreta del matiz verbal.
- source_word: ואל תמנע שיר
  english_pob_choice: and do not hinder song
  chosen_spanish: y no impidas el canto
  alternatives_spanish:
  - y no detengas el canto
  - y no estorbes el canto
  - y no prives de canto
  lexicon: HALOT
  rationale: '''Impedir'' reproduce de modo claro el sentido de מנע (''retener, impedir, obstaculizar''). ''Canto'' funciona de manera colectiva y natural en español para la alabanza o la música festiva.'
theological_decisions:
- issue: Tensión textual entre el hebreo sapiencial y el paralelo griego
  english_pob_reading: Hebrew wisdom exhortation with a footnote noting the Greek parallel's divergent reading.
  chosen_spanish_reading: 'Texto sapiencial hebreo: exhortación a hablar con mesura y no estorbar el canto; se conserva nota sobre la tradición griega divergente.'
  alternative_spanish_readings:
  - 'La lectura griega: ''el que ofrece sémola devuelve una gracia'''
  - Una armonización que combine ambas tradiciones
  rationale: La evidencia principal para la línea base es el hebreo transmitido en el paquete fuente; el griego ofrece una tradición claramente distinta. En español conviene mantener el texto hebreo y anotar la variante, sin mezclar ambas lecturas en el cuerpo principal.
  doctrine_reference: DOCTRINE.md §Textual transparency; §Translation from original-language sources
translation_notes:
  revision_awareness: Se siguió la lectura hebrea del expediente fuente para el texto principal, con control de la variante griega señalada en nota. No se introdujeron cambios respecto del juicio crítico del contexto inglés, salvo ajustar el español para una formulación más natural y fiel a la ambigüedad del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no porque aparezca aquí, sino conforme a la terminología del proyecto; este versículo no requiere un equivalente divino explícito.
  - '''Anciano'' se usa como tratamiento honorífico coherente con el contexto sapiencial.'
  - '''Canto'' conserva el valor colectivo y litúrgico sin añadir precisión no atestiguada.'
