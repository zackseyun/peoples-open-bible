id: 2SA.16.21
reference: 2 Samuel 16:21
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲחִיתֹ֨פֶל֙ אֶל אַבְשָׁלֹ֔ם בּ֚וֹא אֶל פִּלַגְשֵׁ֣י אָבִ֔י/ךָ אֲשֶׁ֥ר הִנִּ֖יחַ לִ/שְׁמ֣וֹר הַ/בָּ֑יִת וְ/שָׁמַ֤ע כָּל יִשְׂרָאֵל֙ כִּֽי נִבְאַ֣שְׁתָּ אֶת אָבִ֔י/ךָ וְ/חָ֣זְק֔וּ יְדֵ֖י כָּל אֲשֶׁ֥ר אִתָּֽ/ךְ־־־־־־׃
translation:
  text: Ahithophel said to Absalom[a], “Go in to your father’s concubines, whom he left to keep the house, and all Israel will hear that you have become odious to your father[c][b], and the hands of all who are with you will be strengthened.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'go in to,' a common euphemism for sexual relations.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have become odious to your father'; Hebrew literally evokes becoming foul or offensive.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the hands of all who are with you will be strengthened,' an idiom for being encouraged or emboldened.
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹא אֶל
  chosen: Go in to
  alternatives:
  - Have relations with
  - Sleep with
  lexicon: HALOT
  rationale: The idiom בוא אל in this context is a sexual euphemism. 'Go in to' preserves the Hebrew idiom with sufficient clarity and avoids over-paraphrase, while the context makes the meaning plain.
- source_word: פִּלַגְשֵׁי
  chosen: concubines
  alternatives:
  - secondary wives
  lexicon: HALOT
  rationale: '''Concubines'' is the standard and most precise English equivalent for פילגשׁ, referring to women of recognized but lesser marital status in the ancient household.'
- source_word: הִנִּיחַ לִשְׁמֹר הַבָּיִת
  chosen: he left to keep the house
  alternatives:
  - he left to guard the house
  - he left in charge of the house
  lexicon: HALOT
  rationale: This reflects the infinitive construction naturally while preserving the domestic/guarding sense of שמר. 'Keep the house' is concise and idiomatic.
- source_word: וְשָׁמַע כָּל יִשְׂרָאֵל
  chosen: and all Israel will hear
  alternatives:
  - then all Israel will hear
  lexicon: HALOT
  rationale: The qatal with prefixed waw here carries straightforward future/result sense in context following the imperative counsel. 'All Israel' refers to the people collectively, not merely the territory.
- source_word: נִבְאַשְׁתָּ
  chosen: you have made yourself repulsive
  alternatives:
  - you have become odious
  - you have made yourself stink
  - you have become abhorrent
  lexicon: HALOT
  rationale: The Niphal of באשׁ conveys becoming foul, odious, or offensive. 'Made yourself repulsive' communicates the figurative social-political revulsion in readable modern English without flattening the force.
- source_word: וְחָזְקוּ יְדֵי
  chosen: the hands of ... will be strengthened
  alternatives:
  - '... will be encouraged'
  - '... will be emboldened'
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for strengthening resolve or courage. Retaining 'hands ... will be strengthened' preserves the imagery while remaining understandable in English.
- source_word: כָּל אֲשֶׁר אִתָּךְ
  chosen: all who are with you
  alternatives:
  - all your supporters
  - everyone on your side
  lexicon: HALOT
  rationale: This keeps the relational wording of the Hebrew and avoids importing a narrower political gloss, though supporters are clearly in view.
