translation:
  language: es
  text: 'Pero ellos declararon: «Vive Yahvé; él mismo es el gobernante en el cielo, el que mandó observar el séptimo día[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el sábado». El griego dice literalmente «el séptimo día», en referencia a la observancia del sábado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποφηναμένων
  english_pob_choice: they declared
  chosen_spanish: declararon
  alternatives_spanish:
  - respondieron
  - dijeron
  - afirmaron
  lexicon: LSJ
  rationale: El participio introduce una respuesta hablada y pública. «Declararon» conserva ese tono formal y enfático mejor que un simple «dijeron», sin volverse artificial en español.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Soberano
  lexicon: LSJ
  rationale: En la política terminológica del proyecto, κύριος que remite al nombre divino se vierte como «Yahvé». Aquí el contexto judío y la confesión teísta apuntan al Dios de Israel, por lo que se evita el encubrimiento convencional con «Señor».
- source_word: ζῶν
  english_pob_choice: lives
  chosen_spanish: Vive
  alternatives_spanish:
  - está vivo
  - vive él
  lexicon: LSJ
  rationale: La fórmula griega tiene fuerza confesional y casi juramentaria. «Vive» suena natural en español bíblico moderno y preserva el valor directo de «The Lord lives».
- source_word: δυνάστης
  english_pob_choice: ruler
  chosen_spanish: soberano
  alternatives_spanish:
  - gobernante
  - ruler
  - potentado
  lexicon: LSJ
  rationale: El término expresa dominio y autoridad. «Soberano» comunica bien la idea de alguien con potestad suprema en el cielo, manteniendo dignidad y claridad en español.
- source_word: κελεύσας
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden de
  - prescribió
  lexicon: LSJ
  rationale: El aoristo participial indica una orden fundacional y vinculante. «Mandó» es breve, solemne y plenamente fiel al valor de autoridad divina.
- source_word: ἀσκεῖν
  english_pob_choice: the observance of
  chosen_spanish: observar
  alternatives_spanish:
  - guardar
  - practicar
  - cumplir
  lexicon: LSJ
  rationale: En este contexto, el verbo no significa «ejercitar» en sentido general, sino mantener una práctica religiosa. «Observar» es la opción más natural y precisa para la observancia del sábado/día séptimo.
- source_word: τὴν ἑβδόμαδα
  english_pob_choice: the seventh day
  chosen_spanish: el séptimo día
  alternatives_spanish:
  - el sábado
  - el Sabbat
  lexicon: LSJ
  rationale: La expresión griega dice literalmente «el séptimo [día]». Se conserva esa formulación en el texto principal por fidelidad al griego, dejando la identificación con el sábado en una nota.
theological_decisions:
- issue: Nombre divino subyacente a κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: La pauta del proyecto exige Yahvé para יהוה y evita la máscara tradicional de «Señor» cuando el texto o su trasfondo apuntan al nombre divino. En una confesión como ésta, hablar de Yahvé mantiene la transparencia textual y la continuidad con el uso septuagintal del término.
  doctrine_reference: Política terminológica del POB para el nombre divino en traducción directa desde lenguas originales
- issue: ἑβδόμαδα como expresión literal frente a su sentido litúrgico
  english_pob_reading: the seventh day
  chosen_spanish_reading: el séptimo día
  alternative_spanish_readings:
  - el sábado
  rationale: El griego emplea una expresión literal y no el préstamo habitual para «sábado». Por eso el texto principal conserva «el séptimo día»; la equivalencia interpretativa «sábado» queda señalada como alternativa en nota para no borrar la tensión léxica.
  doctrine_reference: Principio de primacía del texto original y preservación de alternativas significativas
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado en inglés, especialmente la puntuación con dos puntos y el matiz de «observance» para ἀσκεῖν. También respeta la decisión revisada de mantener una formulación formal y clara, pero adapta el nombre divino conforme a la terminología española del proyecto.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» según el estándar del proyecto para el texto principal.
  - «Observar» se usa para ἀσκεῖν porque el contexto es de observancia religiosa, no de ejercicio general.
  - «El séptimo día» conserva la literalidad del griego; la equivalencia funcional «sábado» se deja en nota.
  - El tono es reverente y público, acorde con una confesión formulada ante otros.
