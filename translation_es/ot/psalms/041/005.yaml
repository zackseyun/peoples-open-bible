translation:
  language: es
  text: 'En cuanto a mí, dije: «Oh Yahvé, ten misericordia de mí; sana mi alma[a], porque he pecado contra ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mi alma» traduce el hebreo נֶפֶשׁ (nephesh), que también puede significar «mi vida» o «a mí mismo».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: As for me
  chosen_spanish: En cuanto a mí
  alternatives_spanish:
  - Yo
  - Por mi parte
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. «En cuanto a mí» conserva ese relieve discursivo de contraste o énfasis mejor que un simple «yo», y suena natural en español bíblico moderno.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: yo dije
  alternatives_spanish:
  - he dicho
  - había dicho
  lexicon: HALOT
  rationale: 'El perfecto qal en este contexto narrativo-orante se expresa de manera natural como pasado simple en español: el salmista relata lo que dijo a Yahvé.'
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Oh Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino יהוה como «Yahvé», conforme al criterio del proyecto. El vocativo «Oh» reproduce la dirección orante de la interpelación hebrea sin sustituir el nombre por un título.
- source_word: חָנֵּנִי
  english_pob_choice: be gracious to me
  chosen_spanish: sé benigno conmigo
  alternatives_spanish:
  - sé gracioso conmigo
  - ten misericordia de mí
  lexicon: HALOT
  rationale: El imperativo pide favor/gracia. «Sé benigno conmigo» comunica esa petición de manera clara y digna en español, sin reducirla solo a compasión emocional ni reemplazarla automáticamente por una fórmula litúrgica fija.
- source_word: רְפָאָה
  english_pob_choice: heal
  chosen_spanish: sana
  alternatives_spanish:
  - cúrame
  - restáurame
  lexicon: HALOT
  rationale: El verbo רפא significa «sanar/curar». «Sana» mantiene la imagen concreta y es idiomático en español en petición directa.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí
  lexicon: HALOT
  rationale: «נפש» puede significar alma, vida o yo mismo. Se mantiene «mi alma» para conservar la formulación hebrea y la amplitud de sentido, sin resolverla prematuramente en una sola lectura antropológica.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la súplica. «Porque» expresa con claridad la relación causal en español contemporáneo.
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: he pecado
  alternatives_spanish:
  - he cometido pecado
  - pequé
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con el pretérito perfecto compuesto para expresar una confesión con relevancia presente. «He pecado» es conciso y natural.
- source_word: לָךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - ante ti
  - a ti
  lexicon: HALOT
  rationale: Con חטא, la preposición señala a la persona ofendida. «Contra ti» comunica mejor en español la idea de ofensa relacional que un simple movimiento «a ti».
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Oh Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: Se preserva el nombre personal de Dios en lugar de sustituirlo por un título. El vocativo español «Oh» mantiene el tono de súplica directa del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de נַפְשִׁי
  english_pob_reading: my soul
  chosen_spanish_reading: mi alma
  alternative_spanish_readings:
  - mi vida
  - a mí
  rationale: Se conserva la tensión semántica de נפש sin cerrarla en una sola interpretación. «Mi alma» deja abierta la posibilidad de vida, persona entera o interioridad, como en el hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Confesión de pecado como fundamento de la súplica
  english_pob_reading: for I have sinned against you
  chosen_spanish_reading: porque he pecado contra ti
  alternative_spanish_readings:
  - pues he pecado contra ti
  - porque he pecado ante ti
  rationale: La frase mantiene el vínculo causal entre pecado y petición de gracia/sanidad, sin suavizar la ofensa personal implicada en חטא + לָךְ.
  doctrine_reference: Exégesis léxico-teológica de חטא con לְ/contra el ofendido
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue ese estado de alta concordancia y conserva las decisiones auditadas del inglés POB, ajustadas a español natural y teológicamente transparente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה en todo el texto.
  - Se evita «SEÑOR» como sustitución del nombre divino.
  - «Mi alma» conserva la amplitud de נפש sin concretarla en exceso.
  - «Contra ti» refleja la relación ofendida de חטא con el destinatario.
  - El tono general es reverente, moderno y apto para lectura eclesial.
