revisions:
- from: En cuanto a los que de ustedes queden,[a] yo pondré desmayo en sus corazones en la tierra de sus enemigos; y el sonido de una hoja impulsada los perseguirá; huirán como ante la espada, y caerán sin que nadie los persiga.
  to: En cuanto a los que queden de ustedes, yo traeré desfallecimiento a sus corazones en las tierras de sus enemigos; y el sonido de una hoja arrastrada[a] los perseguirá; huirán como si huyeran de la espada, y caerán sin que nadie los persiga.
  rationale: Se ajusta el texto para reflejar mejor el plural hebreo «tierras», mejorar la naturalidad de la imagen de la hoja sin perder la alternativa lexical documentada, y hacer más clara la comparación de la huida con la espada. También se suaviza una construcción española algo rígida al inicio. No hace falta adjudicación adicional.
  reviewer_model: gpt-5.4
