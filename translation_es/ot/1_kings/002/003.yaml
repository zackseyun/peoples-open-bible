review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: imperativo exhortativo, nombre divino Yahvé, metáfora de andar en sus caminos, lista jurídica diferenciada, referencia a la Ley de Moisés y sentido de שׂכל como conducta sabia. Sin embargo, מִשְׁמֶרֶת no queda bien representado por «carga», que en español sugiere peso o gravamen más que deber encomendado. «Encargo» o «responsabilidad» reflejan mejor el sentido de deber confiado del original y del audit trail inglés («charge»).'
  spanish_quality_summary: El español es claro y de registro bíblico moderno, pero «guarda la carga de Yahvé» suena poco natural y semánticamente equívoco. El resto fluye bien y mantiene un tono digno y legible. «Adondequiera que te vuelvas» es aceptable, aunque algo solemne; no requiere cambio. La puntuación y capitalización son correctas.
  glossary_alignment: 'Se alinea con los términos del proyecto en «Yahvé», «Dios», «estatutos», «mandamientos», «juicios» y «testimonios». La principal desalineación está en la decisión lexical para מִשְׁמֶרֶת: «la carga» contradice la propia justificación dada y no representa bien el valor de deber/encargo del pacto.'
  issues:
  - severity: high
    issue: «la carga» para מִשְׁמֶרֶת es inadecuado
    rationale: El hebreo denota una obligación, comisión o encargo confiado. «Carga» en español normalmente significa peso, carga física o gravamen, y distorsiona el sentido covenantal/legal que el inglés auditado recoge con «the charge». «El encargo» comunica mejor el deber encomendado y suena natural.
  revised_spanish_text: Y guarda el encargo de Yahvé, tu Dios, andando en sus caminos y guardando sus estatutos, sus mandamientos, sus juicios y sus testimonios, como está escrito en la Ley de Moisés, para que actúes con sabiduría en todo lo que hagas y adondequiera que te vuelvas.
  revision_rationale: Se reemplaza únicamente «la carga» por «el encargo» para reflejar fielmente מִשְׁמֶרֶת como deber encomendado y mejorar la naturalidad del español, sin alterar el resto de una traducción que ya preserva bien el sentido del texto fuente y las decisiones auditadas.
