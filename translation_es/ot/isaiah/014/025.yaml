translation:
  language: es
  text: para quebrantar a Asiria en mi tierra[a], y en mis montes lo pisotearé; entonces su yugo se apartará de encima de ellos[b], y su carga de encima de su hombro se apartará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el asirio» en lugar de «Asiria»; el sustantivo hebreo puede referirse tanto a la nación como a su rey representativo o ejército.
    reason: alternative_reading
  - marker: b
    text: El hebreo cambia de «encima de ellos» a singular «encima de su hombro». El singular puede personificar al pueblo o funcionar distributivamente.
    reason: textual_variant
lexical_decisions:
- source_word: לִשְׁבֹּר
  english_pob_choice: to break
  chosen_spanish: quebrantar
  alternatives_spanish:
  - romper
  - desmenuzar
  lexicon: HALOT
  rationale: El infinitivo expresa el propósito de la acción divina. «Quebrantar» conserva la fuerza de ruptura del verbo sin sonar demasiado mecánico en español, y mantiene la imagen de abatir al opresor.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - el asirio
  lexicon: HALOT
  rationale: El hebreo puede referirse a la nación o al gobernante/ejército representativo. El POB inglés eligió «Assyria»; en español, «Asiria» comunica con naturalidad la potencia imperial, dejando abierta la personificación singular posterior.
- source_word: בְּאַרְצִי
  english_pob_choice: in my land
  chosen_spanish: en mi tierra
  alternatives_spanish:
  - en mi país
  - en mi territorio
  lexicon: HALOT
  rationale: «Tierra» reproduce mejor אֶרֶץ en su sentido territorial y teológico que «país», que suena demasiado moderno-político.
- source_word: הָרַי
  english_pob_choice: my mountains
  chosen_spanish: mis montes
  alternatives_spanish:
  - mis montañas
  - mi serranía
  lexicon: HALOT
  rationale: «Montes» mantiene el plural y la referencia topográfica sin perder naturalidad en español. Conserva además el matiz de lugar elevado asociado al dominio de Yahvé.
- source_word: אֲבוּסֶנּוּ
  english_pob_choice: I will trample him
  chosen_spanish: lo pisotearé
  alternatives_spanish:
  - lo hollaré
  - lo aplastaré
  lexicon: HALOT
  rationale: El verbo בוס expresa pisar/trillar con fuerza. «Pisotear» es vívido y directo, y en español puede llevar un objeto personal masculino singular como en el texto hebreo y el POB inglés.
- source_word: וְסָר
  english_pob_choice: then ... will depart
  chosen_spanish: entonces se apartará
  alternatives_spanish:
  - entonces se irá
  - entonces será quitado
  lexicon: HALOT
  rationale: El imperfectivo narrativo-profético aquí expresa resultado futuro. «Se apartará» conserva la idea de retirarse o alejarse, compatible con la imagen del yugo que deja de oprimir.
- source_word: מֵעֲלֵיהֶם
  english_pob_choice: from upon them
  chosen_spanish: de sobre ellos
  alternatives_spanish:
  - de encima de ellos
  - de sobre sus hombros
  lexicon: HALOT
  rationale: La preposición על con sufijo plural conserva la imagen de carga encima de un pueblo. «De sobre ellos» sigue de cerca la estructura hebrea sin sonar demasiado artificial.
- source_word: עֻלּוֹ
  english_pob_choice: his yoke
  chosen_spanish: su yugo
  alternatives_spanish:
  - su coyunda
  - su dominio
  lexicon: HALOT
  rationale: «Yugo» es la metáfora estándar de opresión y domina el paralelismo con «carga». Se mantiene el posesivo singular como en el hebreo y el POB inglés.
- source_word: סֻבֳּלוֹ
  english_pob_choice: his burden
  chosen_spanish: su carga
  alternatives_spanish:
  - su peso
  - su fardo
  lexicon: HALOT
  rationale: «Carga» transmite bien la idea de peso impuesto y funciona de manera natural en el paralelismo con «yugo».
- source_word: שִׁכְמוֹ
  english_pob_choice: his shoulder
  chosen_spanish: su hombro
  alternatives_spanish:
  - su espalda
  lexicon: HALOT
  rationale: El hebreo conserva singular en esta cláusula. «Hombro» reproduce esa imagen corporal concreta y permite mantener el giro «de sobre su hombro» sin armonizar el número.
- source_word: יָסוּר
  english_pob_choice: will depart
  chosen_spanish: se apartará
  alternatives_spanish:
  - será quitado
  - se retirará
  lexicon: HALOT
  rationale: Se repite la idea de וְסָר para conservar el paralelismo. «Se apartará» suena natural en español y mantiene la imagen de algo que deja de estar sobre la persona.
theological_decisions:
- issue: Referencia de אַשּׁוּר
  english_pob_reading: Assyria as the imperial power, personified in the singular pronoun
  chosen_spanish_reading: Asiria como potencia imperial, con personificación en el pronombre singular
  alternative_spanish_readings:
  - el asirio como rey o invasor representativo
  - Asiria como mera metonimia geográfica
  rationale: El contexto habla de opresión, yugo y carga, por lo que la lectura corporativa es la más fuerte. En español, «Asiria» conserva esa dimensión política y permite que el singular «lo» funcione como personificación, sin cerrar la ambigüedad del hebreo.
  doctrine_reference: Nota de transparencia textual y semántica del POB
- issue: Cambio de número en los sufijos («ellos» / «su hombro»)
  english_pob_reading: Preserve the Masoretic shift from plural to singular
  chosen_spanish_reading: Preservar el cambio masorético del plural al singular
  alternative_spanish_readings:
  - 'normalizar a plural: «de sobre sus hombros»'
  - armonizar a singular en ambas cláusulas
  rationale: La forma hebrea cambia de plural a singular, y el POB inglés lo documenta con nota. El español conserva ese contraste con «ellos» y «su hombro», manteniendo visible la tensión del texto base en vez de nivelarla.
  doctrine_reference: Principio de fidelidad auditada al texto masorético
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo masorético y refleja la decisión del POB inglés de mantener la ambigüedad de אַשּׁוּר entre entidad nacional y figura representativa. También conserva el cambio de número en la segunda mitad del versículo, documentado en la nota inglesa, sin armonizarlo para mayor suavidad estilística.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma preferida del nombre divino en el proyecto, pero este versículo no contiene el tetragrámaton explícito en la línea hebrea dada.
  - Se mantuvo el paralelismo «yugo / carga» con vocabulario español natural y de fuerza equivalente.
  - Se evitó «SEÑOR» como sustituto del nombre divino porque no aparece aquí como forma necesaria del texto base.
  - El pronombre objeto singular («lo») respeta la personificación del opresor presente en el audit trail inglés.
