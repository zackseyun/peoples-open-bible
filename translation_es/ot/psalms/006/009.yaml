review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: imperativo plural de alejamiento, destinatarios colectivos, motivo causal, nombre divino Yahvé, y la afirmación confiada de que Yahvé ha oído. Sin embargo, hay un desajuste importante entre las notas y los anclajes, y una elección principal mejorable en קוֹל בִּכְיִי: el inglés auditado prefirió ''the sound of my weeping'', y en español ''la voz de mi llanto'' suena menos natural y puede sugerir habla articulada. ''El sonido de mi llanto'' preserva mejor la imagen audible del hebreo.'
  spanish_quality_summary: El español es claro y digno, pero 'todos ustedes' añade peso conversacional innecesario en poesía; 'todos' basta y suena más bíblico-natural. 'Hacedores de maldad' es fiel aunque algo rígido; puede mantenerse. La nota b está mal anclada y su contenido no corresponde al lugar marcado en el texto. La línea mejora en naturalidad con 'todos los que hacen maldad' y 'el sonido de mi llanto'.
  glossary_alignment: Alineación correcta con Yahvé para יְהוָה. No hay otros términos doctrinales sensibles. La preferencia del POB por preservar la imaginería de פֹּעֲלֵי אָוֶן puede mantenerse en español con 'los que hacen maldad', que conserva el aspecto verbal mejor que 'malhechores' y resulta más natural que 'hacedores de maldad'.
  issues:
  - severity: high
    issue: La nota [b] está anclada a 'hacedores de maldad' pero explica otra cosa en el rastro inglés.
    rationale: En el English POB, una nota da alternativas para 'workers of wickedness' y la otra observa el hebreo 'the voice/sound of my weeping'. El borrador español pone [a] tras 'mí' y [b] tras 'maldad', dejando sin nota el segmento 'la voz de mi llanto' y desalineando el aparato crítico.
  - severity: medium
    issue: '''La voz de mi llanto'' es menos natural y menos precisa que ''el sonido de mi llanto''.'
    rationale: קוֹל puede ser 'voz' o 'sonido', pero con בִּכְיִי ('mi llanto') el audit trail inglés prefirió 'sound' precisamente para evitar implicar habla. En español, 'voz de mi llanto' suena literario pero algo forzado; 'sonido de mi llanto' comunica mejor la idea audible.
  - severity: low
    issue: '''Todos ustedes'' es innecesariamente pesado para el registro poético.'
    rationale: כָּל solo exige el inclusivo 'todos'. En español bíblico contemporáneo, 'todos' funciona bien sin introducir un matiz conversacional adicional.
  - severity: low
    issue: '''Hacedores de maldad'' es fiel pero algo acartonado.'
    rationale: Puede entenderse, pero 'todos los que hacen maldad' conserva la imaginería verbal del hebreo y mejora la fluidez del español sin perder precisión.
  revised_spanish_text: Apártense de mí[a], todos los que hacen maldad, porque Yahvé ha oído el sonido[b] de mi llanto.
