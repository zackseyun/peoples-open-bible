translation:
  language: es
  text: 'Y este será el derecho de los sacerdotes del pueblo, de los que sacrifican un sacrificio[a], sea un toro o una oveja: dará al sacerdote la espaldilla[b], las dos quijadas[c] y el estómago[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «de los que ofrecen un sacrificio». El hebreo repite la raíz sacrificial para dar énfasis: literalmente, «de sacrificadores del sacrificio».'
    reason: lexical_alternative
  - marker: b
    text: «Espaldilla» traduce una palabra que literalmente significa «brazo»; en este contexto se refiere a la pata delantera o espaldilla del animal.
    reason: lexical_alternative
  - marker: c
    text: O «las mejillas» o «las quijadas». La forma hebrea es dual.
    reason: lexical_alternative
  - marker: d
    text: Tradicionalmente «el cuajar».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפַּט
  english_pob_choice: due
  chosen_spanish: derecho
  alternatives_spanish:
  - porción debida
  - debido
  - derecho asignado
  lexicon: HALOT
  rationale: En este contexto cultual-jurídico, מִשְׁפַּט señala lo que corresponde legítimamente a los sacerdotes. «Derecho» conserva la idea de una porción debida sin forzar el sentido de «juicio».
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests’
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes’
  - el sacerdocio
  lexicon: HALOT
  rationale: El hebreo usa un genitivo; en español se expresa de forma natural con «de los sacerdotes» y se integra en «el derecho de los sacerdotes».
- source_word: מֵאֵת הָעָם
  english_pob_choice: from the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de entre el pueblo
  - del pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el término amplio «pueblo», porque el hebreo dice literalmente eso y no especifica aquí «Israel».
- source_word: מֵאֵת זֹבְחֵי הַזֶּבַח
  english_pob_choice: from those who sacrifice a sacrifice
  chosen_spanish: de los que sacrifican un sacrificio
  alternatives_spanish:
  - de los que ofrecen un sacrificio
  - de los sacrificadores del sacrificio
  lexicon: HALOT
  rationale: Se mantiene la repetición del verbo y del sustantivo sacrificial del hebreo para no perder el énfasis retórico documentado por el POB inglés.
- source_word: אִם שׁוֹר אִם שֶׂה
  english_pob_choice: whether an ox or a sheep
  chosen_spanish: sea un toro o una oveja
  alternatives_spanish:
  - sea un buey o una oveja
  - sea un toro o un cordero
  lexicon: HALOT
  rationale: «Toro» funciona bien en español bíblico para el animal sacrificial adulto; «oveja» conserva la contraposición general de ganado mayor/menor sin sobreespecificar.
- source_word: וְנָתַן
  english_pob_choice: he shall give
  chosen_spanish: dará
  alternatives_spanish:
  - y dará
  - ha de dar
  lexicon: HALOT
  rationale: El verbo hebreo es singular y distributivo. «Dará» conserva el valor jurídico en español sin añadir un sujeto explícito que no está en el hebreo.
- source_word: הַזְּרֹעַ
  english_pob_choice: the shoulder
  chosen_spanish: la espaldilla
  alternatives_spanish:
  - el brazo
  - la paletilla
  - el hombro
  lexicon: HALOT
  rationale: Aunque el sentido básico es «brazo», en distribución sacrificial se refiere a la parte anterior del animal. «Espaldilla» es comprensible y más precisa que un calco anatómico en español.
- source_word: הַלְּחָיַיִם
  english_pob_choice: the two cheeks
  chosen_spanish: las dos quijadas
  alternatives_spanish:
  - las dos mejillas
  - las quijadas
  lexicon: HALOT
  rationale: El dual hebreo se refleja con «las dos». «Quijadas» conserva una correspondencia más cercana al campo anatómico/partes de la cabeza que «mejillas», aunque ambas son posibles.
- source_word: הַקֵּבָה
  english_pob_choice: the stomach
  chosen_spanish: el cuajar
  alternatives_spanish:
  - el estómago
  - el maw
  lexicon: HALOT
  rationale: Se adopta «cuajar» como equivalente tradicional y reconocido para la cavidad/estómago del animal en este contexto, evitando la vaguedad de «estómago» y el arcaísmo de «maw».
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustanciales y que el acuerdo con la fuente era alto. Esta redacción mantiene la repetición hebrea de זבח, el número singular distributivo de וְנָתַן, y las equivalencias cultuales documentadas por el POB inglés, adaptándolas a un español claro y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el tetragrámaton.
  - Se mantiene «sacrificio» para זֶבַח y su repetición retórica.
  - Se refleja el dual hebreo en «las dos quijadas».
  - Se evita la máscara litúrgica «SEÑOR», porque no corresponde al hebreo de este versículo.
  - «Cuajar» se conserva como término tradicional, con nota explicativa por claridad.
