translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: He aquí[a], estoy enviando contra ellos la espada, el hambre y la peste, y los haré como higos podridos[b], que no se pueden comer por su mal estado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira». La fórmula hebrea introduce un anuncio solemne e inminente.
    reason: lexical_alternative
  - marker: b
    text: O «higos malos» o «higos echados a perder»; el adjetivo hebreo denota higos tan malos que no son comestibles.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se conserva el nombre divino YHWH como «Yahvé», conforme al criterio del proyecto. צְבָאוֹת se vierte de manera natural y tradicionalmente comprensible como «de los ejércitos», manteniendo el valor de título soberano sin desplazarlo a una paráfrasis.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí que
  lexicon: HALOT
  rationale: La fórmula profética deíctica conserva su fuerza solemne en español con «He aquí», que reproduce bien el tono de anuncio inminente sin sonar excesivamente coloquial.
- source_word: מְשַׁלֵּחַ בָּם
  english_pob_choice: I am sending against them
  chosen_spanish: estoy enviando contra ellos
  alternatives_spanish:
  - voy a enviar contra ellos
  - estoy enviándoles
  lexicon: HALOT
  rationale: El participio con הִנְנִי comunica inmediatez vívida; por eso «estoy enviando» mantiene el aspecto presente de la acción. «Contra ellos» expresa el valor hostil de בָּם en este contexto de juicio.
- source_word: הַחֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la guerra
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo, como en la POB inglesa. «La espada» funciona en español como término profético de juicio y evita una abstracción innecesaria.
- source_word: הָרָעָב
  english_pob_choice: the famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - la carestía
  lexicon: HALOT
  rationale: Aunque «hambruna» sería posible, el hebreo aquí puede referirse al hambre como calamidad de juicio; «hambre» es claro y sobrio en español. La opción mantiene el paralelismo con los otros dos agentes del castigo.
- source_word: הַדָּבֶר
  english_pob_choice: the pestilence
  chosen_spanish: la peste
  alternatives_spanish:
  - la pestilencia
  - la plaga
  lexicon: HALOT
  rationale: En español, «peste» comunica de manera natural la aflicción epidémica del contexto profético. «Pestilencia» sería más formal, pero «peste» resulta más directa y sigue el campo semántico del hebreo sin suavizarlo.
- source_word: וְנָתַתִּי אוֹתָם
  english_pob_choice: I will make them
  chosen_spanish: los pondré
  alternatives_spanish:
  - los haré
  - los entregaré como
  lexicon: HALOT
  rationale: נתן con comparación expresa una valoración/colocación metafórica. «Los pondré como» conserva la construcción comparativa y sugiere el acto divino de situarlos en condición despreciable, sin forzar un giro más interpretativo que «los haré».
- source_word: כַּתְּאֵנִים
  english_pob_choice: like figs
  chosen_spanish: como higos
  alternatives_spanish:
  - como higos secos
  - como brevas
  lexicon: HALOT
  rationale: Se mantiene la comparación literal. «Higos» es el equivalente directo y no introduce una variedad no indicada por el texto.
- source_word: הַשֹּׁעָרִים
  english_pob_choice: rotten
  chosen_spanish: podridos
  alternatives_spanish:
  - malos
  - echados a perder
  - estropeados
  lexicon: HALOT
  rationale: El adjetivo hebreo denota higos en estado muy malo e inservible; «podridos» reproduce la fuerza concreta y la repulsión implícita, coherente con la nota inglesa sobre frutos no aptos para comer.
- source_word: לֹא תֵאָכַלְנָה
  english_pob_choice: cannot be eaten
  chosen_spanish: no se pueden comer
  alternatives_spanish:
  - no pueden comerse
  - no son comestibles
  lexicon: HALOT
  rationale: 'El valor es pasivo/resultativo: no están aptos para comer. «No se pueden comer» es natural en español y preserva la inedibilidad práctica sin añadir obligación moral o ritual.'
- source_word: מֵרֹעַ
  english_pob_choice: because of their badness
  chosen_spanish: por su podredumbre
  alternatives_spanish:
  - por su maldad
  - por estar tan malos
  - a causa de su ruindad
  lexicon: HALOT
  rationale: Aunque רֹעַ puede tener resonancias de «mal» o «maldad», aquí se refiere al estado de los higos. «Podredumbre» concreta bien la causa de su inedibilidad y evita una lectura moralizante que no pertenece al referente inmediato.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el criterio del proyecto para conservar el nombre propio divino en transliteración, en vez de ocultarlo con una sustitución devocional. Esto preserva la transparencia frente al hebreo y la continuidad con la auditable tradición POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Tríada de juicio: espada, hambre y peste'
  english_pob_reading: the sword, the famine, and the pestilence
  chosen_spanish_reading: la espada, el hambre y la peste
  alternative_spanish_readings:
  - la espada, la hambruna y la plaga
  - la guerra, el hambre y la pestilencia
  rationale: Se conserva la estructura tripartita y su fuerza profética. No se la abstrae a «guerra» ni se la suaviza con términos más generales, porque el hebreo presenta agentes concretos de juicio.
  doctrine_reference: Covenant judgment formulae in prophetic literature (Jeremiah and Torah curses)
- issue: Imagen de los higos inservibles
  english_pob_reading: rotten figs ... because of their badness
  chosen_spanish_reading: como higos podridos, que no se pueden comer por su podredumbre
  alternative_spanish_readings:
  - como higos malos, que no se pueden comer por su maldad
  - como higos echados a perder, que no se pueden comer por su mal estado
  rationale: La comparación debe permanecer visible y el motivo de la inedibilidad debe explicarse. «Podredumbre» concentra bien la calidad física del fruto y evita trasladar el texto a una categoría moral que el referente agrícola no exige.
  doctrine_reference: Hebrew comparative metaphor and lexical sense of רֹעַ in context
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la frase final para reflejar con mayor precisión מֵרֹעַ («por su maldad/podredumbre»). La versión española refleja ese ajuste con «por su podredumbre», manteniendo la causa explicativa sin ampliar el sentido más allá del referente de los higos.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma estable para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene el tono profético solemne con «Así dice» y «He aquí».
  - Se usa «la peste» para דָּבֶר y no «plaga» para evitar diluir el paralelismo con la tríada de juicio.
  - La metáfora de los higos se traduce de forma literal y transparente, sin sustituirla por una paráfrasis explicativa.
  - La estructura sintáctica sigue de cerca el hebreo donde eso ayuda a la claridad y no produce calco torpe.
