  glossary_alignment: 'No hay términos de glosario mayor del proyecto en juego aquí. La principal cuestión terminológica es contextual: אִשָּׁה plural con sufijo posesivo en este pasaje debe traducirse en el texto principal como ‘esposas’, en línea con la decisión documentada del POB. Las demás elecciones (‘voz’, ‘palabra’, ‘hombre’, ‘joven’, ‘he matado’, ‘por herirme’, ‘por golpearme’) están bien alineadas con la evidencia fuente y la racionalidad léxica documentada.'
