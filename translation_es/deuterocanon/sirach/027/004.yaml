  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La principal cuestión léxica es mantener la distinción contextual entre κοπρία y σκύβαλα: para κοπρία conviene «desechos» en la imagen material; para σκύβαλα, «inmundicia» conserva mejor la aplicación moral a la persona. «Persona» para ἀνθρώπου es aceptable aquí, dado el audit trail inglés revisado.'
