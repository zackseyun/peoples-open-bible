  yaml_path: translation/nt/acts/015/005.yaml
  text: But some of those from the party of the Pharisees who had believed stood up[a], saying that it is necessary to circumcise them and to command them to keep the law of Moses.
  footnotes:
  - marker: a
    text: Or “sect of the Pharisees.” The Greek word here denotes a recognized party or school, not necessarily 'heresy' in the later technical sense.
