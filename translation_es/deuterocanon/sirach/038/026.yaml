translation:
  language: es
  text: Su diligencia consiste en terminar el lugar de engorde[a]; pone su corazón en labrar los surcos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Lugar de engorde» refleja la función del hebreo מרבק, un sitio para alimentar o engordar el ganado. El griego dice: «y su desvelo es para el alimento de los terneros», lo que apoya este sentido de preocupación constante por la alimentación del ganado.'
    reason: alternative_reading
  - marker: b
    text: 'Alternativa posible: «arar los surcos». El hebreo puede referirse de forma más general al trabajo de la tierra, no necesariamente a una técnica agrícola única; por eso se escogió «labrar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ושקידתו
  english_pob_choice: His diligence
  chosen_spanish: Su diligencia
  alternatives_spanish:
  - Su vigilancia
  - Su constante labor
  - Su desvelo
  lexicon: HALOT
  rationale: שקד expresa atención perseverante y esfuerzo continuo. «Diligencia» conserva la idea de labor sostenida y encaja bien con el contexto agrícola sin volverlo pesado.
- source_word: לכלות
  english_pob_choice: to finish
  chosen_spanish: terminar
  alternatives_spanish:
  - completar
  - llevar a fin
  - consumir
  lexicon: HALOT
  rationale: En este contexto agrícola, el verbo apunta al cumplimiento de la tarea vinculada al lugar de alimentación; «terminar» es natural en español y mantiene la idea de llevar la labor a su conclusión.
- source_word: מרבק
  english_pob_choice: the foddering place
  chosen_spanish: el lugar de engorde
  alternatives_spanish:
  - el establo de engorde
  - el pesebre
  - el corral de engorde
  lexicon: HALOT
  rationale: מרבק designa un sitio para alimentar o engordar ganado. «Lugar de engorde» conserva la función del espacio sin imponer una forma arquitectónica demasiado específica.
- source_word: לב ישית
  english_pob_choice: he sets his heart
  chosen_spanish: pone su corazón
  alternatives_spanish:
  - aplica su mente
  - dirige su corazón
  - pone atención
  lexicon: HALOT
  rationale: La expresión idiomática hebrea comunica intención concentrada. «Pone su corazón» preserva la imagen semítica de manera clara y fiel.
- source_word: לשדד
  english_pob_choice: on plowing
  chosen_spanish: labrar
  alternatives_spanish:
  - arar
  - desmenuzar la tierra
  - labrar la tierra
  lexicon: HALOT
  rationale: El término describe trabajo sobre el suelo en un contexto agrícola; el audit trail inglés pasó de «harrowing» a «plowing» para reflejar mejor el hebreo. «Labrar» permite mantener esa amplitud sin estrecharlo a una técnica específica.
- source_word: בתלמים
  english_pob_choice: the furrows
  chosen_spanish: los surcos
  alternatives_spanish:
  - los surcos del campo
  - los canales
  - las hileras
  lexicon: HALOT
  rationale: תלמים son surcos o hileras abiertas en la tierra. «Surcos» es la equivalencia directa y natural en español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente suavizó la puntuación y cambió «harrowing» por «plowing» para acercarse mejor al hebreo. La versión española toma en cuenta esa corrección, pero preserva la amplitud agrícola con «labrar», que evita decidir de forma innecesariamente estrecha entre arar, romper terrones o nivelar.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se usó lenguaje agrícola concreto y no eclesiástico, porque el versículo describe trabajo rural cotidiano.
  - «Corazón» se conserva como sede de intención, conforme al hebreo idiomático, sin reinterpretarlo psicológicamente.
