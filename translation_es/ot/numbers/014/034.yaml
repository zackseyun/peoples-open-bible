  text: בְּ/מִסְפַּ֨ר הַ/יָּמִ֜ים אֲשֶׁר תַּרְתֶּ֣ם אֶת הָ/אָרֶץ֮ אַרְבָּעִ֣ים יוֹם֒ י֣וֹם לַ/שָּׁנָ֞ה י֣וֹם לַ/שָּׁנָ֗ה תִּשְׂאוּ֙ אֶת עֲוֺנֹ֣תֵי/כֶ֔ם אַרְבָּעִ֖ים שָׁנָ֑ה וִֽ/ידַעְתֶּ֖ם אֶת תְּנוּאָתִֽ/י־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/014/034.yaml
  text: According to the number of the days in which you spied out the land[a], forty days, a day for a year, a day for a year, you shall bear your iniquities forty years, and you shall know my alienation.
  footnotes:
  - marker: a
    text: Or 'my alienation,' 'my hostility,' or 'my displeasure.' Traditional English versions often have 'my breach of promise,' but the Hebrew term likely refers to the LORD's opposition or estrangement toward this rebellious generation rather than any failure on God's part.
    reason: lexical_alternative
