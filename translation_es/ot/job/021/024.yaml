revisions:
- from: Sus pailas[a] están llenas de leche, y el tuétano[b] de sus huesos está bien regado.
  to: Sus recipientes de leche[a] están llenos de leche, y el tuétano de sus huesos está bien regado.
  rationale: Se reemplaza «pailas» por «recipientes de leche» para evitar un regionalismo equívoco y comunicar con claridad la opción principal del POB inglés. Se conserva en nota la alternativa tradicional «ubres», que refleja la ambigüedad documentada del hebreo raro. Se elimina la nota sobre «tuétano/médula» por innecesaria.
