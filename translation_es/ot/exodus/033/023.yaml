translation:
  language: es
  text: Entonces quitaré mi mano[a], y verás mi espalda, pero mi rostro no será visto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que está detrás de mí» / «mi parte posterior». El término hebreo puede designar la espalda o el aspecto posterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲסִרֹתִי
  english_pob_choice: Then I will remove
  chosen_spanish: Entonces retiraré
  alternatives_spanish:
  - y quitaré
  - entonces apartaré
  lexicon: HALOT
  rationale: El verbo causativo de סור expresa quitar/retirar/apartar. «Retiraré» conserva la fuerza de acción deliberada y el valor secuencial del waw, con un español natural y solemne.
- source_word: כַּפִּי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi palma
  - mi mano/palma
  lexicon: HALOT
  rationale: כַּף puede ser «palma» o «mano». En este contexto antropomórfico, «mano» comunica mejor la imagen concreta del cubrir/proteger y sigue la decisión auditada del inglés POB.
- source_word: וְרָאִיתָ
  english_pob_choice: and you will see
  chosen_spanish: y verás
  alternatives_spanish:
  - entonces verás
  - y mirarás
  lexicon: HALOT
  rationale: La forma verbal secuencial se expresa naturalmente con futuro simple en español. «Verás» mantiene la relación de consecuencia sin sobretraducir el matiz temporal.
- source_word: אֲחֹרַי
  english_pob_choice: my back
  chosen_spanish: mi espalda
  alternatives_spanish:
  - mi dorso
  - lo que está detrás de mí
  - mi parte trasera
  lexicon: HALOT
  rationale: El término puede referirse a la espalda o al aspecto posterior. «Mi espalda» es la equivalencia más clara y natural en español, conservando la concreción corporal del hebreo y la tensión antropomórfica.
- source_word: וּפָנַי
  english_pob_choice: but my face
  chosen_spanish: pero mi rostro
  alternatives_spanish:
  - y mi rostro
  - pero mi faz
  lexicon: HALOT
  rationale: Aunque la conjunción es literalmente «y», aquí funciona contrastivamente por oposición a «mi espalda». «Pero mi rostro» reproduce bien el contraste y evita un giro menos idiomático en español.
- source_word: לֹא יֵרָאוּ
  english_pob_choice: shall not be seen
  chosen_spanish: no será visto
  alternatives_spanish:
  - no se verá
  - no podrá verse
  lexicon: HALOT
  rationale: 'El nifal de ראה es pasivo: «ser visto». Como el sujeto es «mi rostro», el singular español es lo más natural. «No será visto» mantiene la solemnidad del habla divina y la pasividad del hebreo.'
theological_decisions:
- issue: Lenguaje antropomórfico de Dios
  english_pob_reading: Retain the concrete bodily terms 'hand,' 'back,' and 'face' in the main text.
  chosen_spanish_reading: Mantener los términos concretos «mano», «espalda» y «rostro» en el texto principal.
  alternative_spanish_readings:
  - usar «presencia» en lugar de «rostro»
  - usar expresiones abstractas como «lo que está detrás de mí»
  rationale: El hebreo emplea imaginería corporal directa; la traducción debe preservarla en vez de suavizarla. Esto conserva la tensión teológica de la revelación divina sin resolverla mediante una paráfrasis abstracta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con la revisión más reciente; no se identificaron cambios aplicados. La redacción española sigue la lectura auditada del inglés POB y el hebreo, sin resolver la tensión antropomórfica.
  spanish_consistency_notes:
  - 'Se conservó el lenguaje corporal concreto para Yahvé: «mano», «espalda» y «rostro».'
  - Se prefirió «rostro» para פָּנִים en coherencia con el registro solemne, aunque «cara» sería posible en español general.
  - La secuencia verbal se vertió con futuro simple para reflejar el valor consecutivo del hebreo.
  - La nota al pie se ancla en «espalda» para preservar la alternativa lexical documentada por el POB inglés.
