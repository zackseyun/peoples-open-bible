review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: la repetición distributiva de בְּיוֹם הַשַּׁבָּת se capta con «Cada día de reposo», יַעַרְכֶנּוּ con «lo dispondrá», לִפְנֵי יְהוָה con «delante de Yahvé», y בְּרִית עוֹלָם con «como pacto perpetuo». Sin embargo, «por parte de los hijos de Israel» suaviza y desplaza el valor de מֵאֵת, que aquí se entiende mejor como procedencia/origen: «de los hijos de Israel» o «procedente de los hijos de Israel».'
  spanish_quality_summary: El español es claro y digno, pero «por parte de» suena más burocrático que bíblico y menos natural en este contexto ritual. «Cada día de reposo» es aceptable, aunque «cada sábado» sería más natural; no obstante, mantener «día de reposo» es defendible si el proyecto desea continuidad terminológica. El resto del verso lee bien.
  glossary_alignment: 'Se alinea bien con las pautas del proyecto: יהוה → «Yahvé»; בְּנֵי יִשְׂרָאֵל → «hijos de Israel»; בְּרִית עוֹלָם → «pacto perpetuo». No hay conflicto doctrinal serio. La única reparación necesaria es una mejor representación de מֵאֵת.'
  issues:
  - severity: medium
    issue: «por parte de los hijos de Israel» no representa con suficiente precisión מֵאֵת
    rationale: El hebreo expresa procedencia/fuente («de, de parte de, procedente de») más directamente. «Por parte de» en español puede sugerir agencia o formulación administrativa, y suena menos natural en una ley cultual.
  revised_spanish_text: Cada día de reposo lo[a] dispondrá[b] delante de Yahvé continuamente, de los hijos de Israel, como pacto perpetuo[c].
  revised_footnotes:
  - marker: a
    text: 'La repetición hebrea literal dice: «en el día de reposo, en el día de reposo», un giro idiomático que significa «cada día de reposo» o «día de reposo tras día de reposo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo pondrá en orden»; el pronombre singular se refiere colectivamente a la disposición del pan.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «como una alianza perpetua».'
    reason: alternative_reading
  revision_rationale: Se reemplaza «por parte de los hijos de Israel» por «de los hijos de Israel» para reflejar mejor el valor de procedencia de מֵאֵת y mejorar la naturalidad del español sin perder la formulación masculina-corporativa del hebreo.
