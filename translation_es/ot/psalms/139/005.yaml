  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: el par espacial «por detrás y por delante» corresponde a אָחוֹר / קֶדֶם, y «pones tu mano sobre mí» representa fielmente וַתָּשֶׁת עָלַי כַּפֶּךָ. La nota también preserva correctamente la ambivalencia léxica de צַרְתָּנִי.'
  spanish_quality_summary: El texto es claro y legible, pero «me ciñes» suena algo menos natural y puede inclinarse hacia la idea de ajustar una prenda más que de cercar o encerrar. «Me cercas» conserva mejor la imagen espacial de quedar rodeado y mantiene la ambivalencia entre resguardo y presión en español eclesial general.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión principal relevante es mantener la ambivalencia de צַרְתָּנִי; «me cercas» la preserva mejor que «me ciñes».
  issues:
  - severity: medium
    issue: «Me ciñes» no es la mejor equivalencia para צַרְתָּנִי en este contexto.
    rationale: Aunque «ceñir» puede sugerir estrechez, en español común suele asociarse con ajustar o rodear el cuerpo con una prenda o cinturón. Aquí el hebreo, junto con «detrás» y «delante», favorece más claramente la imagen de cercar/rodear por todos lados.
  - severity: low
    issue: La alternancia entre «me ciñes» en el texto y «me rodeas / me asedias» en la nota crea una pequeña distancia estilística.
    rationale: No es incorrecta, pero una forma principal más cercana a las alternativas de la nota mejora la coherencia del registro y la comprensión inmediata.
  revised_spanish_text: Me cercas por detrás y por delante[a], y pones tu mano sobre mí.
