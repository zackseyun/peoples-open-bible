translation:
  language: es
  text: Así lo puso delante de ellos, y comieron y sobró algo, conforme a la palabra de Yahvé.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: he set it
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo dio
  - lo colocó
  lexicon: HALOT
  rationale: El hebreo נתן puede significar 'dar' o 'poner'. En este contexto, con לִפְנֵיהֶם ('delante de ellos'), 'lo puso' reproduce de forma natural la acción de servir la comida sin perder el valor básico del verbo.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en frente de ellos
  lexicon: HALOT
  rationale: La expresión indica ubicación física en contexto de comida. 'Delante de ellos' suena natural en español y conserva el matiz espacial de 'before them'.
- source_word: וַיֹּאכְל֥וּ
  english_pob_choice: they ate
  chosen_spanish: comieron
  alternatives_spanish:
  - y comieron de ello
  - y lo comieron
  lexicon: HALOT
  rationale: El verbo אכל se traduce directamente con 'comer'. En español el objeto ya queda claro por el contexto inmediato, por lo que no hace falta explicitarlo en el texto principal.
- source_word: וַיּוֹתִ֖רוּ
  english_pob_choice: had some left over
  chosen_spanish: les sobró
  alternatives_spanish:
  - sobró algo
  - quedó sobrante
  lexicon: HALOT
  rationale: El hiphil de יתר expresa que quedó un excedente. 'Les sobró' comunica de manera natural y precisa la idea de que, después de comer, quedó comida restante.
- source_word: כִּדְבַ֥ר
  english_pob_choice: according to the word of
  chosen_spanish: conforme a la palabra de
  alternatives_spanish:
  - según la palabra de
  - de acuerdo con la palabra de
  lexicon: HALOT
  rationale: Se mantiene 'palabra' para conservar la referencia formal a la declaración profética/divina. 'Conforme a' expresa bien la correspondencia o cumplimiento de lo dicho.
- source_word: יְהוָֽה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto fuente usa el nombre divino explícito. En español, la forma de proyecto es 'Yahvé', que preserva el nombre propio y evita sustituirlo por un título.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo presenta el Tetragrámaton en forma directa. La traducción española del proyecto debe conservar el nombre divino, no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje coincide plenamente con la lectura base inglesa y no requiere ajustes de revisión; se preserva la estructura narrativa breve del hebreo y la referencia explícita al nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con el estándar español del proyecto para יְהוָה.
  - '''Lo puso delante de ellos'' conserva el orden narrativo y el sentido de servir la comida sin añadir información no presente en el hebreo.'
  - La nota textual/lexical sobre el sobrante refleja la ambigüedad ya señalada en el audit trail inglés.
