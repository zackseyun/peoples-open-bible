translation:
  language: es
  text: 'Y esta será la señal para ustedes: encontrarán un bebé envuelto en pañales y acostado en un pesebre[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «envuelto en pañales de tela».
    reason: lexical_alternative
  - marker: b
    text: O «en un comedero para animales».
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - prueba
  - marca
  lexicon: BDAG
  rationale: En este contexto narrativo, el ángel da a los pastores un rasgo identificador. 'Señal' es natural en español y conserva el valor de indicio reconocido, sin convertirlo en una demostración milagrosa más explícita de lo que el texto dice.
- source_word: εὑρήσετε
  english_pob_choice: you will find
  chosen_spanish: encontrarán
  alternatives_spanish:
  - hallarán
  - descubrirán
  lexicon: BDAG
  rationale: El futuro plural de εὑρίσκω se vierte de manera directa con 'encontrarán', que suena natural en español y mantiene la instrucción predictiva dirigida a los pastores.
- source_word: βρέφος
  english_pob_choice: a baby
  chosen_spanish: un bebé
  alternatives_spanish:
  - un niño recién nacido
  - un infante
  lexicon: BDAG
  rationale: βρέφος designa a un niño muy pequeño, especialmente un recién nacido. 'Bebé' comunica bien esa edad en español moderno y conserva la claridad narrativa.
- source_word: ἐσπαργανωμένον
  english_pob_choice: wrapped in cloths
  chosen_spanish: envuelto en pañales
  alternatives_spanish:
  - envuelto en telas
  - fajado
  - envuelto en lienzos
  lexicon: BDAG
  rationale: El participio indica que el niño está envuelto con tiras o paños. 'Envuelto en pañales' es una forma natural y comprensible en español para la práctica antigua de envolver a un recién nacido, y conserva la concreción del acto sin sobrecargar la frase.
- source_word: κείμενον
  english_pob_choice: lying
  chosen_spanish: acostado
  alternatives_spanish:
  - echado
  - tendido
  lexicon: BDAG
  rationale: El participio describe el estado o posición del niño. 'Acostado' comunica esa condición de manera clara y natural en español, sin introducir la idea de una acción previa distinta.
- source_word: φάτνῃ
  english_pob_choice: in a manger
  chosen_spanish: en un pesebre
  alternatives_spanish:
  - en un comedero
  - en un abrevadero de animales
  lexicon: BDAG
  rationale: φάτνη puede referirse a un pesebre o comedero para animales. 'Pesebre' es el equivalente tradicional y sigue siendo inteligible; mantiene el lenguaje concreto del relato sin forzar una explicación más larga en el texto principal.
- source_word: τοῦτο ὑμῖν τὸ σημεῖον
  english_pob_choice: this will be the sign for you
  chosen_spanish: esta será la señal para ustedes
  alternatives_spanish:
  - esta es la señal para ustedes
  - esta será su señal
  lexicon: BDAG
  rationale: La construcción griega es algo elíptica. 'Esta será la señal para ustedes' reproduce con fluidez el sentido del anuncio y conserva la relación directa con los pastores.
theological_decisions:
- issue: Naturaleza de la señal dada a los pastores
  english_pob_reading: The verse presents an identifying sign rather than explicitly a miraculous portent.
  chosen_spanish_reading: La versículo presenta una señal identificadora, no una explicación doctrinal o un portento añadido.
  alternative_spanish_readings:
  - La señal tiene un sentido milagroso implícito
  - La señal es simplemente una indicación práctica
  rationale: El texto no desarrolla la señal como milagro explícito; presenta una combinación concreta de circunstancias para reconocer al niño. La traducción conserva esa sencillez narrativa y no amplía el sentido más allá de lo atestiguado.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se registran cambios aplicados en el auditor inglés y el control cruzado informó alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo 'señal' para σημεῖον por claridad narrativa y por coincidencia con la decisión inglesa.
  - '''Pesebre'' se conserva como término bíblico tradicional, pero el sentido alternativo se deja visible en nota para evitar ocultar la ambigüedad de φάτνη.'
  - '''Pañales'' traduce de manera idiomática la acción de envolver al recién nacido; la nota ofrece la alternativa más literal sin imponerla en el texto principal.'
