review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la correlación ''cuanto más... tanto más'', la aflicción/opresión y el crecimiento/expansión de Israel. También conserva adecuadamente ''los hijos de Israel'' para בְּנֵי יִשְׂרָאֵל. Sin embargo, la cláusula final no refleja con suficiente fidelidad el sujeto y la dirección del verbo וַיָּקֻצוּ מִפְּנֵי: el hebreo dice que ellos sintieron temor/aversión ante los hijos de Israel, no que los hijos de Israel ''les causaban temor''. Ese giro invierte el enfoque verbal y suena más causal que experiencial.'
  spanish_quality_summary: El español es claro y legible, pero la frase final 'les causaban temor los hijos de Israel' resulta algo forzada y menos natural que una formulación experiencial directa. Además, la nota [a] está anclada en 'afligían', pero su contenido corresponde a 'los hijos de Israel'/'los israelitas', no a ese verbo; por lo tanto, la ubicación del marcador no es adecuada.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: no hay nombres divinos ni títulos mesiánicos en juego; ''los hijos de Israel'' sigue la preferencia formal documentada para בְּנֵי יִשְׂרָאֵל. ''Afligían'' y ''se multiplicaban'' son opciones sólidas. La principal corrección es léxico-sintáctica en וַיָּקֻצוּ, donde conviene ''temían'' o ''sentían temor ante''.'
  issues:
  - severity: medium
    issue: La cláusula final 'les causaban temor los hijos de Israel' no reproduce de manera óptima וַיָּקֻצוּ מִפְּנֵי.
    rationale: El hebreo presenta la reacción de 'ellos' frente a Israel ('temieron / sintieron aversión ante'), no una formulación causal con Israel como sujeto explícito de 'causar temor'. La propuesta actual comunica el sentido general, pero desplaza el foco y pierde cercanía formal con el original.
  - severity: medium
    issue: La nota [a] está anclada en el lugar incorrecto.
    rationale: El contenido de la nota [a] ofrece alternativas para בְּנֵי יִשְׂרָאֵל ('los israelitas' / 'los hijos de Israel'), pero el marcador aparece después de 'afligían'. Debe colocarse junto a 'los hijos de Israel' o eliminarse.
  - severity: low
    issue: La nota [b] explica 'se rompían / irrumpían', pero puede formularse con más naturalidad en español.
    rationale: La glosa actual es entendible, aunque 'Hebreo literalmente' seguido de dos verbos entre barras suena algo tosca. Puede pulirse sin cambiar el contenido.
  revised_spanish_text: Pero cuanto más los afligían, tanto más se multiplicaban y tanto más se extendían[b], de modo que temían[c] a los hijos de Israel[a].
