lexical_decisions:
- source_word: עָרֵי קָדְשְׁךָ
  english_pob_choice: Your holy cities
  chosen_spanish: Tus ciudades santas
  alternatives_spanish:
  - Las ciudades de tu santidad
  - Tus ciudades sagradas
  lexicon: HALOT
  rationale: La construcción posesiva y atributiva se vierte de forma natural como «tus ciudades santas», preservando tanto la posesión como el rasgo de santidad sin forzar una perífrasis más pesada.
- source_word: הָיוּ
  english_pob_choice: have become
  chosen_spanish: han llegado a ser
  alternatives_spanish:
  - se han vuelto
  - fueron
  - llegaron a ser
  lexicon: HALOT
  rationale: El perfecto expresa un estado resultante de transformación ruinosa; «han llegado a ser» conserva ese matiz de cambio con resultado presente, como en la lectura inglesa.
- source_word: מִדְבָּר
  english_pob_choice: a wilderness
  chosen_spanish: un desierto
  alternatives_spanish:
  - un desierto árido
  - un yermo
  - un paraje desolado
  lexicon: HALOT
  rationale: En español, «desierto» comunica bien la idea de devastación y abandono. Se usa aquí también para mantener la repetición del hebreo en ambas ocurrencias, como lo refleja la nota alternativa del POB inglés.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: Nombre propio bíblico tradicional en español
  rationale: Se adopta la forma habitual en español bíblico «Sion», que es transparente y reconocible para la lectura eclesial en español.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Nombre propio bíblico tradicional en español
  rationale: Se usa la forma española establecida «Jerusalén».
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - una ruina
  - un yermo
  - desolada
  lexicon: HALOT
  rationale: El sustantivo hebreo conserva mejor su fuerza nominal con «una desolación», en paralelo con la estructura predicativa anterior.
theological_decisions:
- issue: Repetición de מִדְבָּר en ambas cláusulas
  english_pob_reading: Zion has become a wilderness[a], Jerusalem a desolation.
  chosen_spanish_reading: Sion ha llegado a ser un desierto[a], Jerusalén una desolación.
  alternative_spanish_readings:
  - Sion ha llegado a ser un desierto, Jerusalén un desierto
  - Sion ha llegado a ser un yermo, Jerusalén una desolación
  rationale: Se mantiene la repetición del término para no ocultar la insistencia del hebreo ni la alternativa léxica documentada en el POB inglés. La nota señala que «desierto» también puede rendir el campo semántico de מִדְבָּר.
  doctrine_reference: No doctrinal issue; lexical repetition and poetic parallelism.
translation_notes:
  revision_awareness: El texto base y la evaluación de revisión indican acuerdo alto y sin cambios necesarios; esta propuesta conserva la estructura y las decisiones léxicas principales, ajustándolas al español natural sin añadir interpretaciones.
  spanish_consistency_notes:
  - Se mantiene la simetría poética del versículo con dos predicados paralelos.
  - Se conserva el nombre propio «Sion» según uso bíblico español estándar.
  - La nota de pie refleja la alternativa léxica del inglés POB para מִדְבָּר y se aplica a ambas ocurrencias, con un solo marcador repetido en el texto como permite el diseño del registro.
