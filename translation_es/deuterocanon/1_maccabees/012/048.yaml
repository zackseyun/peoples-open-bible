translation:
  language: es
  text: Pero cuando Jonatán entró en Ptolemaida, los hombres de Ptolemaida cerraron las puertas y lo apresaron, y mataron a espada a todos los que habían entrado con él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: LSJ
  rationale: Expresa la transición narrativa con valor temporal y de contraste, de modo natural en español.
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró en
  alternatives_spanish:
  - ingresó en
  - entró a
  lexicon: LSJ
  rationale: Verbo de movimiento hacia el interior; 'entró en' suena natural y fiel al sentido simple del aoristo.
- source_word: Πτολεμαΐδα
  english_pob_choice: Ptolemais
  chosen_spanish: Ptolemaida
  alternatives_spanish:
  - Ptolemais
  lexicon: LSJ
  rationale: Se translitera el topónimo al español con forma inteligible y estable; 'Ptolemaida' evita una forma inglesa dentro del texto español.
- source_word: ἀπέκλεισαν
  english_pob_choice: shut
  chosen_spanish: cerraron
  alternatives_spanish:
  - cerraron con llave
  - barraron
  lexicon: LSJ
  rationale: El verbo indica clausurar las puertas; 'cerraron' reproduce la acción sin añadir un matiz físico no explicitado.
- source_word: οἱ Πτολεμαεῖται
  english_pob_choice: the men of Ptolemais
  chosen_spanish: los hombres de Ptolemaida
  alternatives_spanish:
  - los habitantes de Ptolemaida
  - los ptolemaidenses
  lexicon: LSJ
  rationale: El etnónimo designa a los habitantes de la ciudad; 'los hombres de Ptolemaida' sigue el estilo narrativo conciso del original y del audit trail inglés.
- source_word: συνέλαβον
  english_pob_choice: seized
  chosen_spanish: lo apresaron
  alternatives_spanish:
  - lo capturaron
  - lo tomaron preso
  lexicon: LSJ
  rationale: '''Apresar'' comunica una detención violenta o traicionera sin introducir la formalidad jurídica de ''arrestar''.'
- source_word: πάντας τοὺς συνελθόντας μετʼ αὐτοῦ
  english_pob_choice: all who had come with him
  chosen_spanish: a todos los que habían ido con él
  alternatives_spanish:
  - a todos los que habían venido con él
  - a todos los que se habían reunido con él
  lexicon: LSJ
  rationale: Se conserva el sentido de acompañamiento al entrar en la ciudad, sin forzar la literalidad de 'reunirse' si el contexto ya define el movimiento conjunto.
- source_word: ἀπέκτειναν ἐν ῥομφαίᾳ
  english_pob_choice: they killed with the sword
  chosen_spanish: mataron a espada
  alternatives_spanish:
  - mataron con la espada
  - los mataron con la espada
  lexicon: LSJ
  rationale: La locución española 'a espada' transmite el instrumento de muerte con naturalidad y concisión, preservando el valor instrumental de la expresión griega.
translation_notes:
  revision_awareness: La versión inglesa auditada revisó 'had come in with him' a 'had come with him' por naturalidad. La redacción española sigue ese sentido contextual sin añadir una nota textual, porque el español 'habían ido con él' ya cubre adecuadamente el matiz de acompañamiento al entrar.
  spanish_consistency_notes:
  - Se mantuvo 'Ptolemaida' de forma uniforme como topónimo transliterado en español.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas porque no hay vocabulario divino en el versículo.
  - Se preservó un registro narrativo sobrio y bíblico, sin arcaísmos innecesarios.
  - '''A espada'' reproduce el instrumento de ejecución sin sobreinterpretar la modalidad legal o militar.'
