translation:
  language: es
  text: Como un lirio entre las espinas, así es mi amada[a] entre las hijas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi amor» o «mi querida» por «mi amada».
    reason: lexical_alternative
  - marker: b
    text: O «las jóvenes» por «las hijas»; el modismo hebreo puede referirse más generalmente a las mujeres del grupo, no solo a hijas literales.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/שֽׁוֹשַׁנָּה
  english_pob_choice: Like a lily
  chosen_spanish: Como un lirio
  alternatives_spanish:
  - Como un loto
  - Como una flor
  lexicon: HALOT
  rationale: שׁוֹשַׁנָּה designa una flor de tipo lirio en el uso poético tradicional. 'Lirio' conserva la imagen comparativa del hebreo con una flor reconocible en español, y 'Como' refleja el prefijo כְ.
- source_word: בֵּין
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - entre medio de
  lexicon: HALOT
  rationale: En español, con un sustantivo plural, 'entre' expresa con naturalidad la ubicación dentro de un grupo y corresponde bien al valor relacional de בין.
- source_word: הַ/חוֹחִים
  english_pob_choice: thorns
  chosen_spanish: los espinos
  alternatives_spanish:
  - las espinas
  - los abrojos
  - los arbustos espinosos
  lexicon: HALOT
  rationale: חוֹחִים se refiere a plantas espinosas. 'Espinos' preserva la imagen vegetal y el contraste poético con el lirio; 'espinas' sería posible, pero suena más a la parte puntiaguda que a la planta.
- source_word: כֵּן
  english_pob_choice: so is
  chosen_spanish: así es
  alternatives_spanish:
  - así
  - de ese modo es
  lexicon: HALOT
  rationale: כֵּן introduce la correspondencia de la segunda cola del símil. 'Así es' completa la comparación de manera natural en español.
- source_word: רַעְיָתִי
  english_pob_choice: my beloved
  chosen_spanish: mi amada
  alternatives_spanish:
  - mi amada mía
  - mi querida
  - mi amada, mi compañera
  lexicon: HALOT
  rationale: El término es femenino y expresa una relación afectiva íntima en poesía. 'Mi amada' conserva el sentido de amor/compañía sin forzar 'Cristo' o un matiz litúrgico ajeno al verso.
- source_word: הַבָּנוֹת
  english_pob_choice: the daughters
  chosen_spanish: las hijas
  alternatives_spanish:
  - las jóvenes
  - las muchachas
  lexicon: HALOT
  rationale: Literalmente es 'las hijas'. En este contexto poético puede aludir a mujeres jóvenes del grupo; 'las hijas' conserva el hebreo y deja abierta la idiomática sin añadir una paráfrasis explicativa al texto principal.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando todas las notas al texto mediante marcadores exactos [a], [b] y [c]. No se introdujeron lecturas nuevas ni cambios de sentido respecto del audit trail inglés; solo se ajustó la presentación española para que las notas estén efectivamente presentes en el verso.
  spanish_consistency_notes:
  - Se mantuvo un registro poético directo, sin expandir el símil más allá del hebreo.
  - '''Entre'' se usa para בין en un contexto plural, de acuerdo con la comparación hebrea.'
  - '''Hijas'' conserva el hebraísmo y permite la lectura idiomática femenina sin explicitarla en el cuerpo del verso.'
  - No se empleó 'SEÑOR' ni 'Cristo'; el verso no contiene el tetragrámaton ni un título mesiánico.
  - La puntuación reproduce la estructura bimembre del hebreo con coma y pausa comparativa.
