    rationale: כִּהֵן indica ejercer/servir como sacerdote. 'Oficiar' en español puede sugerir presidir ritos concretos; 'sirvió como sacerdote' reproduce mejor la función continua y coincide más de cerca con el inglés POB.
  revised_spanish_text: Y Johanán engendró a Azarías[a]; él fue el que sirvió como sacerdote en la casa que Salomón edificó en Jerusalén.
