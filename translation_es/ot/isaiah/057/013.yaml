review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y conserva el contraste entre los falsos refugios y el que se refugia en Dios. También refleja correctamente la ironía de יַצִּילֻךְ con «¡que te rescaten!», y maneja bien el paralelismo רוּחַ / הָבֶל con «viento / soplo». Sin embargo, el punto principal que requiere ajuste es קִבּוּצַיִךְ: el inglés POB documenta explícitamente «your gathered idols» por el contexto inmediato de idolatría, mientras que «tus cosas reunidas» suena demasiado vago e idiomáticamente débil en español y no preserva suficientemente la decisión contextual ya auditada. También conviene mejorar la nota de אֶרֶץ para que la alternativa real sea «tierra»/«país» o «tierra»/«mundo», no una formulación repetitiva.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «tus cosas reunidas» resulta poco natural y demasiado impreciso para lectura bíblica pública. «Tus ídolos reunidos» o una formulación equivalente comunica mejor el referente contextual sin volverse pesada. El resto del versículo fluye bien: «Cuando clames», «un soplo los arrebatará», y «poseerá mi santo monte» son adecuados y legibles. Las notas necesitan una pequeña corrección de redacción y mayor alineación con las alternativas documentadas.'
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. Este versículo no contiene Yahvé, Mesías, Cristo, δοῦλος, etc. La principal cuestión léxica es contextual: el POB auditado resolvió קִבּוּצַיִךְ como referencia a ídolos/objetos de falsa confianza; el español debe reflejar esa resolución o al menos no diluirla. «La tierra» para אֶרֶץ es aceptable en español, con nota que mencione la alternativa «la tierra/el país» o «la tierra/el mundo» según contexto; aquí el contexto de Sion favorece «la tierra» en sentido de la tierra heredada.'
