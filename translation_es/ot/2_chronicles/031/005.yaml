base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/031/005.yaml
  text: And when the matter spread[a], the sons of Israel brought in abundance the firstfruits of grain, new wine, oil, honey, and all the produce of the field[b]; they brought in abundantly the tithe of everything.
  footnotes:
  - marker: a
    text: Or “the Israelites.” The Hebrew reads “the sons of Israel,” a standard corporate expression for the people of Israel.
    reason: lexical_alternative
  - marker: b
    text: “Honey” may in some contexts refer to a sweet syrup, such as date syrup, not only bee honey.
    reason: cultural_note
