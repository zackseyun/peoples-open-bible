base_translation:
  language: en
  yaml_path: translation/ot/hosea/009/015.yaml
  text: All their evil is at Gilgal[a]; indeed, there I hated them because of the evil of their deeds. I will drive them out of my house; I will no longer love them[c][b]. All their princes are rebels.
  footnotes:
  - marker: a
    text: Or 'for there I hated them.' The Hebrew conjunction can be read causally ('for/because') or with emphatic force ('indeed').
    reason: lexical_alternative
  - marker: b
    text: '''My house'' may refer more specifically to the LORD''s land, sanctuary, or covenant household; the Hebrew leaves the image compact.'
    reason: cultural_note
  - marker: c
    text: Or 'All their rulers are rebellious/stubborn.'
    reason: lexical_alternative
