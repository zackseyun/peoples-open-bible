translation:
  language: es
  text: Y de las familias[a] de los hijos de Coat, las ciudades de su territorio[b] fueron de la tribu de Efraín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "de entre los clanes de los hijos de Coat".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "las ciudades de su frontera". גְבוּל puede significar "frontera", "límite" o "territorio".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִמִּשְׁפְּחוֹת
  english_pob_choice: And from the families of
  chosen_spanish: Y de las familias de
  alternatives_spanish:
  - Y de entre los clanes de
  - Y de las familias de entre
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת denota grupos familiares o clanes; en español bíblico actual, 'familias' comunica bien la unidad genealógica sin perder naturalidad. 'De' conserva el valor partitivo/origen de מִן, y 'Y' mantiene el encadenamiento narrativo del listado.
- source_word: בְּנֵי קְהָת
  english_pob_choice: the sons of Kohath
  chosen_spanish: los hijos de Coat
  alternatives_spanish:
  - los descendientes de Coat
  - los coatitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hijos de Coat'. 'Hijos' preserva mejor la forma idiomática del texto que 'descendientes', y 'Coat' refleja la forma castellana habitual del nombre propio. 'Coatitas' sería una equivalencia más interpretativa que no conserva tan directamente la formulación del hebreo.
- source_word: וַיְהִי
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - fueron
  - hubo
  lexicon: HALOT
  rationale: Aquí היה funciona como enlace copulativo/existencial en una frase de asignación territorial. 'Eran' resulta natural en español y mantiene el carácter descriptivo del enunciado sin añadir matices ajenos.
- source_word: עָרֵי גְבוּלָם
  english_pob_choice: the cities of their territory
  chosen_spanish: las ciudades de su territorio
  alternatives_spanish:
  - las ciudades de su frontera
  - sus ciudades fronterizas
  - las ciudades de su comarca
  lexicon: HALOT
  rationale: גְבוּל puede significar 'frontera', 'límite' o 'territorio'. Siguiendo la lectura del POB inglés, 'territorio' transmite aquí el sentido de asignación territorial, no solo una línea fronteriza. Se conserva así la relación con la porción de tierra adjudicada.
- source_word: מִמַּטֵּה אֶפְרָיִם
  english_pob_choice: from the tribe of Ephraim
  chosen_spanish: de la tribu de Efraín
  alternatives_spanish:
  - del linaje de Efraín
  - de la vara de Efraín
  lexicon: HALOT
  rationale: En contextos tribales, מַטֶּה significa 'tribu'. 'De la tribu de Efraín' es la equivalencia contextual más clara y precisa en español.
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo consonante-vocalizado del WLC y el reparto semántico ya auditado en la versión inglesa: מִשְׁפְּחוֹת como grupos familiares/clanes, בְּנֵי קְהָת como filiación genealógica, גְבוּל como término territorial y מַטֶּה como tribu. No se introducen cambios textuales ni revisiones adicionales frente al pass más reciente; se preserva la ambigüedad documentada en notas.'
  spanish_consistency_notes:
  - Se mantiene 'Efraín' para el nombre tribal y 'Coat' para el nombre propio en la forma castellana tradicional y reconocible.
  - Se evita 'SEÑOR' o equivalentes porque no aparece el nombre divino en este versículo.
  - '''Territorio'' se usa de manera consistente para גְבוּל en este contexto de adjudicación levítica, sin borrar la alternativa ''frontera'' documentada.'
  - La sintaxis española sigue el orden informativo del hebreo sin volverse calcada e introduce un verbo copulativo natural ('eran') para la cláusula principal.
