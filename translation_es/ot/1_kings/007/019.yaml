translation:
  language: es
  text: Y los capiteles que estaban sobre la parte superior de las columnas eran de labor de lirios[a][b] en el pórtico[c], cuatro codos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «obra de lirios». El hebreo puede entenderse como un trabajo ornamental en forma de lirio.'
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden שׁוּשַׁן como una flor tipo lirio; otros han propuesto un motivo de loto en ornamentación arquitectónica.
    reason: lexical_alternative
  - marker: c
    text: 'O: «en el vestíbulo» o «en el porche». El hebreo אוּלָם designa el hall de entrada o pórtico del templo.'
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «cuatro codos». La medida probablemente describe la altura de la parte de los capiteles con forma de lirio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּתָרֹת
  english_pob_choice: capitals
  chosen_spanish: capiteles
  alternatives_spanish:
  - coronas
  - chapiteles
  lexicon: HALOT
  rationale: En contexto arquitectónico, el término español más claro y natural para las partes superiores de las columnas es 'capiteles'. 'Coronas' sería demasiado general y 'chapiteles' es más arcaico.
- source_word: רֹאשׁ
  english_pob_choice: tops
  chosen_spanish: cabeza
  alternatives_spanish:
  - parte superior
  - cima
  lexicon: HALOT
  rationale: 'Aunque el inglés optó por ''tops'' para naturalidad arquitectónica, en español ''cabeza'' conserva mejor la imagen literal del hebreo en una construcción igualmente natural: ''sobre la cabeza de las columnas''.'
- source_word: הָעַמּוּדִים
  english_pob_choice: the pillars
  chosen_spanish: las columnas
  alternatives_spanish:
  - los pilares
  - las columnas
  lexicon: HALOT
  rationale: '''Columnas'' funciona bien en español arquitectónico y mantiene la referencia estructural. ''Pilares'' también es posible, pero ''columnas'' suena más natural en esta descripción técnica.'
- source_word: מַעֲשֵׂה
  english_pob_choice: were of lily-work
  chosen_spanish: eran de trabajo de lirio
  alternatives_spanish:
  - eran de obra de lirio
  - eran de labor de lirio
  - eran de trabajo de azucena
  lexicon: HALOT
  rationale: La expresión hebrea es nominal y describe el tipo de obra; 'de trabajo de lirio' conserva el carácter técnico-formal del original y refleja la decisión inglesa de 'lily-work' sin añadir una paráfrasis demasiado interpretativa. 'Obra de lirio' es una alternativa más compacta, pero 'trabajo de lirio' deja más visible la relación lexical.
- source_word: שׁוּשַׁן
  english_pob_choice: lily-work / lily blossom
  chosen_spanish: lirio
  alternatives_spanish:
  - azucena
  - lirio
  - lotus
  lexicon: HALOT
  rationale: Se mantiene 'lirio' como equivalente estándar y transparente. Aunque algunos proponen 'lotus' en contextos ornamentales, el POB inglés documenta 'lily' como la opción principal; no hay base suficiente para desplazarla.
- source_word: בָּאוּלָם
  english_pob_choice: in the portico
  chosen_spanish: en el pórtico
  alternatives_spanish:
  - en el vestíbulo
  - en el porche
  lexicon: HALOT
  rationale: '''Pórtico'' es la mejor correspondencia arquitectónica en español para אוּלָם y sigue de cerca la opción inglesa ''portico''. ''Vestíbulo'' y ''porche'' son posibles, pero menos precisos o menos adecuados en este contexto del templo.'
- source_word: אַרְבַּע אַמּוֹת
  english_pob_choice: four cubits
  chosen_spanish: cuatro codos
  alternatives_spanish:
  - cuatro codos de altura
  - cuatro codos
  lexicon: HALOT
  rationale: Se conserva la medida bíblica literal 'codos', como hace el inglés con 'cubits'. No se añade 'de altura' porque el hebreo no lo expresa explícitamente y el contexto ya sugiere la dimensión.
theological_decisions:
- issue: Tensión entre traducción literal y claridad en la imagen arquitectónica
  english_pob_reading: The capitals ... were of lily-work in the portico, four cubits.
  chosen_spanish_reading: Los capiteles ... eran de trabajo de lirio en el pórtico, cuatro codos.
  alternative_spanish_readings:
  - eran de obra de lirio
  - eran como lirios en el pórtico
  rationale: No hay una afirmación doctrinal en juego, pero sí una decisión interpretativa sobre cómo verter una cláusula nominal. Se preserva el carácter descriptivo y técnico del hebreo sin convertirlo en una paráfrasis que borre la forma de la expresión original.
  doctrine_reference: No aplica; pasaje descriptivo de arquitectura del templo.
translation_notes:
  revision_awareness: El texto inglés fue revisado de 'were made like a lily blossom' a 'were of lily-work' para acercarse más a la forma nominal del hebreo. La versión española sigue esa revisión con una construcción nominal ('eran de trabajo de lirio') y conserva la medida literal ('cuatro codos') sin añadir interpretación dimensional explícita.
  spanish_consistency_notes:
  - Se usa 'capiteles' para כֹּתָרֹת, en línea con el sentido arquitectónico.
  - Se mantiene 'pórtico' para אוּלָם, evitando oscurecer la referencia al espacio de entrada del templo.
  - Se conserva la medida 'codos' como equivalente de 'cubits', siguiendo el criterio de literalidad medible del POB.
  - No se introduce 'Cristo', 'Mesías' ni vocabulario teológico ajeno al versículo, porque el pasaje es estrictamente descriptivo.
