translation:
  language: es
  text: 'Para el director del coro: según «Lirios». Testimonio[a][b]. Salmo de Asaf.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Para el director del coro: con la melodía de “Lirios”. Testimonio. De Asaf. Salmo». La cabecera hebrea probablemente conserva notaciones musicales o litúrgicas cuyo sentido preciso es incierto.'
    reason: alternative_reading
  - marker: b
    text: 'O: «De Asaf. Salmo».'
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Para el maestro del coro
  lexicon: HALOT
  rationale: La fórmula de superscripción indica al encargado de la ejecución musical. «Director del coro» comunica bien la función litúrgica en español sin volverla demasiado técnica ni eclesiástica.
- source_word: אֶל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - para
  - sobre
  - con la melodía de
  lexicon: HALOT
  rationale: En estas superscripciones, la preposición suele introducir una designación de tono, estilo o melodía. «Según» conserva esa relación idiomática sin fijar indebidamente si se trata de melodía, indicación performativa o rótulo litúrgico.
- source_word: שֹׁשַׁנִּים
  english_pob_choice: Lilies
  chosen_spanish: «Lirios»
  alternatives_spanish:
  - «Los lirios»
  - «lirios»
  lexicon: HALOT
  rationale: Se trata probablemente de una designación musical o litúrgica. La capitalización y las comillas ayudan a mostrar que funciona como título, no como referencia floral literal.
- source_word: עֵדוּת
  english_pob_choice: a Testimony
  chosen_spanish: Un testimonio
  alternatives_spanish:
  - Testimonio
  - Un testimonio [como título litúrgico]
  lexicon: HALOT
  rationale: El hebreo permite entender aquí un segundo rótulo breve, probablemente independiente de «Lirios». «Un testimonio» mantiene la ambigüedad entre título y contenido sin convertirlo en una glosa explicativa.
- source_word: לְאָסָף
  english_pob_choice: A psalm of Asaph
  chosen_spanish: Salmo de Asaf
  alternatives_spanish:
  - Un salmo de Asaf
  - Salmo perteneciente a Asaf
  lexicon: HALOT
  rationale: La fórmula de atribución se vierte de manera natural en español como «Salmo de Asaf», preservando la relación genitiva sin sobreespecificar autoría frente a asociación o colección.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Salmo poético
  lexicon: HALOT
  rationale: Es la etiqueta de género habitual en las superscripciones. En español, el sustantivo solo funciona bien en estilo encabezado y mantiene el valor técnico del término.
theological_decisions:
- issue: Naturaleza de los rótulos superscripcionales (musical/litúrgico vs. contenido del salmo)
  english_pob_reading: The Hebrew superscription likely preserves musical or liturgical notations whose precise force is uncertain.
  chosen_spanish_reading: La cabecera probablemente conserva notaciones musicales o litúrgicas cuyo sentido preciso es incierto.
  alternative_spanish_readings:
  - 'La cabecera podría referirse a un contenido doctrinal: «testimonio».'
  - 'Los rótulos podrían formar un solo título: «Lirios, un testimonio».'
  rationale: El hebreo y la revisión inglesa separan «Lirios» y «A testimony», pero sin resolver del todo su función. El español debe mantener esa tensión y no fusionar artificialmente los elementos ni convertirlos con seguridad en material temático del salmo.
  doctrine_reference: Superscriptions of the Psalms; textual-linguistic caution in translation
translation_notes:
  revision_awareness: 'La versión inglesa fue revisada para separar “Lilies” y “A testimony” en vez de combinarlos en un solo título. El español refleja esa separación con dos segmentos breves: «según “Lirios”» y «Un testimonio».'
  spanish_consistency_notes:
  - Se mantiene «Asaf» como forma habitual en español.
  - Se usa «coro» para evitar una expresión arcaizante y porque el encabezado apunta a función musical.
  - No se emplea «SEÑOR» ni otros sustitutos teológicos, ya que el texto no contiene el nombre divino.
  - Las comillas angulares españolas se reservan para el rótulo-título «Lirios»; el resto queda como encabezado sobrio y legible.
