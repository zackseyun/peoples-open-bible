- source_word: ⲛ̄ϩⲏⲧ
  chosen: within the heart
  alternatives:
  - in the heart
  - within
  lexicon: Crum
  rationale: Locative ⲛ̄ϩⲏⲧ is idiomatic for ‘in/within (the) heart/inner self.’
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  chosen: I am
  alternatives: []
  lexicon: Layton
  rationale: First-person copular declaration characteristic of Thunder’s voice; ⲧⲉ
