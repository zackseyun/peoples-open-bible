translation:
  language: es
  text: Y cayendo al suelo, porque su cuerpo no podía soportar los dolores, mantenía su razón[a] recta e inquebrantable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su juicio racional»; el término griego lleva un matiz filosófico de juicio moral razonado.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίπτων
  english_pob_choice: falling
  chosen_spanish: cayendo
  alternatives_spanish:
  - mientras caía
  - aunque caía
  lexicon: LSJ
  rationale: El participio presente expresa acción simultánea con la principal. «Cayendo» conserva la simultaneidad y evita añadir una concesión que no está explícita en el griego revisado.
- source_word: ἔδαφος
  english_pob_choice: the ground
  chosen_spanish: el suelo
  alternatives_spanish:
  - la tierra
  - el piso
  lexicon: LSJ
  rationale: En español, «suelo» resulta natural y digno para el lugar al que cae en este contexto de tortura; mantiene el sentido de superficie de caída sin volverlo demasiado coloquial.
- source_word: ἀπὸ τοῦ μὴ φέρειν
  english_pob_choice: because ... could not bear
  chosen_spanish: por no poder soportar
  alternatives_spanish:
  - porque no podía soportar
  - ya que no podía llevar
  lexicon: LSJ
  rationale: La construcción causal se vierte de forma idiomática en español. «Soportar» reproduce bien la idea de resistencia ante el dolor corporal.
- source_word: τὸ σῶμα
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - el cuerpo de él
  lexicon: LSJ
  rationale: Aunque el griego tiene artículo, el contexto identifica claramente el cuerpo del sujeto; en español la posesión implícita es natural y fiel.
- source_word: τὰς ἀλγηδόνας
  english_pob_choice: the pains
  chosen_spanish: los dolores
  alternatives_spanish:
  - las agonías
  - los sufrimientos
  lexicon: LSJ
  rationale: «Dolores» es directo y plenamente natural en español para el sufrimiento físico severo. Conserva la referencia corporal sin intensificar indebidamente el término.
- source_word: ὀρθὸν εἶχεν
  english_pob_choice: he kept ... upright
  chosen_spanish: mantenía ... recta
  alternatives_spanish:
  - mantenía ... erguida
  - conservaba ... firme
  lexicon: LSJ
  rationale: El verbo idiomático «mantener» transmite la permanencia del estado; «recta» conserva la imagen de firmeza/uprightness asociada al juicio interior.
- source_word: ἀκλινῆ
  english_pob_choice: unbending
  chosen_spanish: inquebrantable
  alternatives_spanish:
  - inflexible
  - sin ceder
  lexicon: LSJ
  rationale: El sentido literal de «no inclinarse» se expresa en español con un término que preserve la metáfora moral e intelectual. «Inquebrantable» comunica resistencia sin sonar mecánico.
- source_word: τὸν λογισμόν
  english_pob_choice: his reason
  chosen_spanish: su razón
  alternatives_spanish:
  - su juicio racional
  - su raciocinio
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός tiene un peso filosófico para la facultad racional que gobierna las pasiones. «Razón» mantiene esa densidad conceptual de forma clara y literaria.
theological_decisions:
- issue: λoγισμός como facultad racional con carga filosófica
  english_pob_reading: reason / rational judgment
  chosen_spanish_reading: razón
  alternative_spanish_readings:
  - juicio racional
  - raciocinio
  - mente
  rationale: El libro enfatiza la superioridad de la razón piadosa frente al dolor y las pasiones. «Razón» conserva el valor filosófico sin ampliar el texto más allá de lo atestiguado.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que retiró la concesión implícita («though he was») para reflejar más directamente el participio griego; por eso el español usa «Y cayendo» sin añadir una concesión no presente en el texto base.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y literario propio de una traducción bíblica pública.
  - «Su razón» conserva la terminología filosófica del pasaje y evita reducir λογισμός a «mente» de manera demasiado amplia.
  - La puntuación con coma reproduce la articulación causal y la coordinación entre la caída física y la firmeza interior.
