base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/006/031.yaml
  text: Then those who had formerly been reproached and were near Hades—or rather[a], had already stepped upon it—in place of a bitter and hard-to-drink doom, having arranged a saving drinking-feast, divided up as dining-couches, full of joy[c][b], the place prepared for them for downfall and a grave.
  footnotes:
  - marker: a
    text: Or 'near death' / 'near the grave'; Greek 'near Hades.'
    reason: lexical_alternative
  - marker: b
    text: The Greek expression literally says they had 'stepped onto' Hades, a vivid way of saying they were as good as dead.
    reason: cultural_note
  - marker: c
    text: The term rendered 'drinking-bout' may also be understood more broadly as a festive banquet or drinking feast.
    reason: lexical_alternative
