translation:
  language: es
  text: 'Husai dijo a Absalón[a]: «No, porque seré suyo, del que Yahvé y este pueblo y todos los hombres de Israel ha elegido; y con él permaneceré[c][b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a quien Yahvé, este pueblo y todos los hombres de Israel elijan».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «y todo hombre de Israel».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y con él me quedaré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כִּי
  english_pob_choice: No, for
  chosen_spanish: No, porque
  alternatives_spanish:
  - No, sino
  - No, más bien
  lexicon: HALOT
  rationale: La secuencia expresa una negación con explicación o corrección. «No, porque» conserva la refutación y la relación causal sin endurecerla innecesariamente.
- source_word: אֲשֶׁר בָּחַר
  english_pob_choice: the one whom ... have chosen
  chosen_spanish: al que ... hayan elegido
  alternatives_spanish:
  - al que ... elijan
  - a quien ... hayan escogido
  lexicon: HALOT
  rationale: El relativo apunta a una persona específica ya sobreentendida. En español, «al que» mantiene la referencia singular; el subjuntivo futuro perfecto en sentido de anterioridad reproduce el valor referencial de una elección vista como realizada o asumida en el contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto en español, en lugar de sustituirlo por un título.
- source_word: וְהָעָם הַזֶּה
  english_pob_choice: and this people
  chosen_spanish: y este pueblo
  alternatives_spanish:
  - y esta gente
  - y este pueblo aquí
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo colectivo singular con demostrativo. «Pueblo» preserva esa unidad colectiva y suena natural en español.
- source_word: וְכָל אִישׁ יִשְׂרָאֵל
  english_pob_choice: and all the men of Israel
  chosen_spanish: y todos los hombres de Israel
  alternatives_spanish:
  - y cada hombre de Israel
  - y todos los israelitas
  lexicon: HALOT
  rationale: La expresión es literalmente «todo hombre de Israel». «Todos los hombres de Israel» conserva el valor distributivo y la forma masculina del original, sin neutralizarlo.
- source_word: לא אֶהְיֶה
  english_pob_choice: I will be his
  chosen_spanish: yo perteneceré al que ... hayan elegido
  alternatives_spanish:
  - yo seré de él
  - yo estaré con él
  lexicon: HALOT
  rationale: El hebreo es elíptico y, en este contexto, expresa lealtad o pertenencia. «Perteneceré» comunica esa idea en español con claridad sin añadir una glosa demasiado interpretativa.
- source_word: וְאִתּוֹ אֵשֵׁב
  english_pob_choice: and with him I will remain
  chosen_spanish: y con él me quedaré
  alternatives_spanish:
  - y con él permaneceré
  - y con él me sentaré
  lexicon: HALOT
  rationale: יַשַׁב puede significar «sentarse», pero aquí indica permanencia o asociación continuada. «Me quedaré» expresa bien la idea de permanecer con alguien en español natural.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El verso usa directamente el Nombre divino. En español se preserva con «Yahvé» para no ocultar el Tetragrámaton tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lectura distributiva y masculina de כָל אִישׁ יִשְׂרָאֵל
  english_pob_reading: all the men of Israel
  chosen_spanish_reading: todos los hombres de Israel
  alternative_spanish_readings:
  - cada hombre de Israel
  - todos los israelitas
  rationale: La forma hebrea es masculina singular distributiva. Se mantiene esa fuerza sin neutralizar el género gramatical del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que ajustó la frase inglesa de 'every man of Israel' a 'all the men of Israel' por naturalidad y sentido colectivo; en español se reflejó con «todos los hombres de Israel». También se mantuvo la tensión del hebreo elíptico en la frase de pertenencia/lealtad, resolviéndola de forma idiomática sin borrar su base textual.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Nombre divino.
  - Se conserva la pluralidad masculina de «todos los hombres de Israel» en lugar de neutralizarla.
  - «Me quedaré» se eligió como equivalente natural de permanencia; no equivale a una permanencia meramente física de «sentarse».
  - La puntuación y el orden siguen una estructura sobria y publicable, manteniendo la división entre la negación inicial y la cláusula de lealtad.
