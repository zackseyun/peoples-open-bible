translation:
  language: es
  text: Porque miserable es el que desprecia la sabiduría y la instrucción[a], y vacía es su esperanza, sus trabajos son insensatos y sus obras no sirven para nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «disciplina»; el griego παιδεία puede incluir tanto instrucción como formación correctiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría moral
  - entendimiento
  lexicon: LSJ
  rationale: En literatura sapiencial, σοφίαν designa la sabiduría como bien moral e intelectual. «Sabiduría» es el equivalente natural y fiel en español.
- source_word: παιδείαν
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - formación
  - enseñanza
  lexicon: LSJ
  rationale: El término puede abarcar instrucción, formación y disciplina correctiva. «Instrucción» mantiene la pareja con «sabiduría» sin reducir indebidamente el sentido a castigo; la nota conserva la alternativa de «disciplina».
- source_word: ὁ ἐξουδενῶν
  english_pob_choice: the one who despises
  chosen_spanish: el que desprecia
  alternatives_spanish:
  - el que desdeña
  - el que trata como nada
  lexicon: LSJ
  rationale: El participio expresa desprecio activo o considerar algo como sin valor. «El que desprecia» es natural en español y conserva esa fuerza.
- source_word: ταλαίπωρος
  english_pob_choice: miserable
  chosen_spanish: miserable
  alternatives_spanish:
  - desdichado
  - miserable en su condición
  - miserable y lamentable
  lexicon: LSJ
  rationale: El adjetivo describe una condición lastimosa o desgraciada. «Miserable» reproduce bien el juicio predicativo del griego y coincide con el registro digno pero directo del pasaje.
- source_word: κενὴ ἡ ἐλπὶς αὐτῶν
  english_pob_choice: their hope is empty
  chosen_spanish: vacía es su esperanza
  alternatives_spanish:
  - vana es su esperanza
  - fútil es su esperanza
  - su esperanza es vacía
  lexicon: LSJ
  rationale: κενή significa vacía, hueca, sin contenido o sin eficacia. «Vacía es su esperanza» mantiene el predicado del griego y evita una paráfrasis excesiva.
- source_word: οἱ κόποι ἀνόητοι
  english_pob_choice: their labors are unprofitable
  chosen_spanish: inútiles sus trabajos
  alternatives_spanish:
  - vanos sus trabajos
  - sin entendimiento sus trabajos
  - infructuosos sus trabajos
  lexicon: LSJ
  rationale: κόποι alude a trabajos, afanes o fatigas; ἀνόητοι apunta a algo sin juicio o sin sentido, y la revisión inglesa prefirió «unprofitable» para evitar redundancia. «Inútiles» comunica bien el resultado sin duplicar «sin provecho».
- source_word: ἄχρηστα τὰ ἔργα αὐτῶν
  english_pob_choice: their works are useless
  chosen_spanish: sin provecho sus obras
  alternatives_spanish:
  - inútiles sus obras
  - sin valor sus obras
  - inservibles sus obras
  lexicon: LSJ
  rationale: ἄχρηστα significa inútil, sin uso o sin provecho. «Sin provecho» conserva la evaluación de inutilidad y diferencia esta cláusula de la anterior.
theological_decisions:
- issue: Paso del singular genérico al plural posesivo en la segunda mitad del versículo
  english_pob_reading: Represent the singular generically in English and retain the plural consequences with singular 'the one' plus plural 'their.'
  chosen_spanish_reading: Conservar un singular genérico en «el que» y mantener los posesivos plurales implícitos en «su / sus» según el español natural.
  alternative_spanish_readings:
  - 'plurales explícitos: «los que desprecian... su esperanza...»'
  - 'singular masculino repetido: «el que... su esperanza... sus trabajos...»'
  rationale: El griego pasa del sujeto participial singular a posesivos plurales. En español, la forma más natural es usar «el que» como genérico y luego «su/sus», lo que preserva la referencia colectiva sin forzar una construcción híbrida.
  doctrine_reference: DOCTRINE.md §§1, 4, 6
- issue: 'Tensión entre ἀνόητοι y ἄχρηστα: dos juicios cercanos pero no idénticos'
  english_pob_reading: their labors are unprofitable ... and their works are useless
  chosen_spanish_reading: Distinguir los dos miembros con «inútiles» para κόποι y «sin provecho» para ἔργα.
  alternative_spanish_readings:
  - «sin sentido» para κόποι y «inútiles» para ἔργα
  - «vanos» para ambos miembros
  rationale: 'El griego articula dos evaluaciones relacionadas: una sobre la calidad o sensatez del esfuerzo y otra sobre el resultado de las obras. Diferenciarlas evita aplanar la repetición y respeta la progresión del versículo.'
  doctrine_reference: DOCTRINE.md §§1, 4, 6
translation_notes:
  revision_awareness: 'La redacción sigue la lectura final del audit trail: una sola cláusula inicial con coma, y dos juicios finales diferenciados para κόποι ἀνόητοι y ἄχρηστα τὰ ἔργα αὐτῶν. Se evitó una repetición demasiado rígida de «vanos/fútiles» para no aplanar la distinción semántica que la revisión inglesa buscó preservar.'
  spanish_consistency_notes:
  - Se usó «sabiduría» para σοφίαν y «instrucción» para παιδείαν, con nota sobre la alternativa disciplinaria.
  - «Miserable» conserva el tono valorativo del pasaje sin caer en arcaísmo.
  - Se prefirió «vacía» a «vana» por transparencia semántica, aunque ambas son posibles.
  - Los posesivos se expresan de manera natural en español como «su/sus», sin alterar el sujeto genérico del primer miembro.
  - «Sin provecho» diferencia ἄχρηστα de «inútiles» y sigue la evaluación de falta de beneficio del término griego.
