  yaml_path: translation/ot/lamentations/004/007.yaml
  text: Her princes were purer than snow[a], whiter than milk; their bodies were more ruddy than corals[c][b], their form was like sapphire.
  footnotes:
  - marker: a
    text: Or 'her Nazirites' or 'her consecrated ones.' The Hebrew term can refer to those set apart by vow, but here may denote Jerusalem's distinguished nobles or princes.
    reason: alternative_reading
  - marker: b
    text: The Hebrew word rendered 'corals' is uncertain; it may also refer to rubies, pearls, or another precious red jewel.
    reason: lexical_alternative
  - marker: c
    text: The ancient term rendered 'sapphire' may refer to lapis lazuli rather than the modern sapphire gemstone.
    reason: cultural_note
