- from: para que no les enseñen a hacer conforme a todas sus abominaciones que ellos hicieron para sus dioses[a], y así pequen contra Yahvé su Dios.
  to: para que no les enseñen a hacer conforme a todas sus abominaciones que ellos hicieron a sus dioses[a], y pequen contra Yahvé, el Dios de ustedes.
  rationale: Se corrige la referencia pronominal para reflejar con claridad la segunda persona plural del hebreo, se adopta una expresión más natural en español para לֵאלֹהֵיהֶם en el texto principal mientras se conserva la alternativa en nota, y se simplifica la última coordinación para sonar más natural sin cambiar el sentido.
