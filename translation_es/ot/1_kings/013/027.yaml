translation:
  language: es
  text: 'Entonces habló a sus hijos varones, diciendo: «Ensillen el asno para mí». Y ellos lo ensillaron.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then he spoke
  chosen_spanish: Entonces habló
  alternatives_spanish:
  - Y habló
  - Entonces dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «entonces» da un flujo natural en español. «Habló» conserva el valor básico de דבר, mientras que «dijo» sería posible pero menos ajustado al verbo del hebreo.
- source_word: אֶל בָּנָיו
  english_pob_choice: to his sons
  chosen_spanish: a sus hijos[a]
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos
  lexicon: HALOT
  rationale: El posesivo y el plural masculino pueden traducirse naturalmente como «hijos» en español, que no marca por sí mismo el género de forma tan visible como el inglés. Mantengo la posibilidad de lectura específica en la nota, porque el contexto inmediato apunta a varones, pero el español permite una formulación menos marcada sin perder la referencia familiar.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: El infinitivo constructo introductorio se conserva de forma idiomática con «diciendo», que mantiene la estructura de discurso directo sin endurecer el español.
- source_word: חִבְשׁוּ לִי
  english_pob_choice: Saddle ... for me
  chosen_spanish: Ensillen el asno para mí
  alternatives_spanish:
  - Atrévenle el asno para mí
  - Preparen el asno para mí
  lexicon: HALOT
  rationale: חבשׁ con un asno significa ponerle la montura o aparejarlo; en español «ensillar» expresa bien la acción concreta. «Para mí» conserva el dativo לִי, indicando beneficio/uso personal.
- source_word: אֶת הַחֲמוֹר
  english_pob_choice: the donkey
  chosen_spanish: el asno
  alternatives_spanish:
  - el burro
  - el jumento
  lexicon: HALOT
  rationale: חֲמוֹר designa el animal doméstico común; «asno» es fiel, sobrio y tradicionalmente comprensible en español bíblico. Evita el tono demasiado coloquial de «burro».
- source_word: וַיַּחֲבֹשׁוּ
  english_pob_choice: So they saddled it
  chosen_spanish: Y ellos lo ensillaron
  alternatives_spanish:
  - Y ensillaron el asno
  - Entonces lo ensillaron
  lexicon: HALOT
  rationale: Se repite la misma raíz, por lo que conviene repetir la misma familia verbal en español. «Lo» evita la repetición pesada de «el asno», pero conserva la referencia clara al animal mencionado.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó estable; la presente propuesta sigue de cerca el hebreo masorético y conserva la repetición verbal de חבשׁ con una equivalencia natural en español. No hay variantes textuales relevantes en el paquete suministrado.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo la repetición de la misma raíz verbal en ambas cláusulas para respetar el enlace léxico del hebreo.
  - «Asno» se eligió por registro bíblico neutral y claridad pública en español latinoamericano.
