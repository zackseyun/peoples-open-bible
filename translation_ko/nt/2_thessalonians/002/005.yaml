lexical_decisions:
- source_word: μνημονεύετε
  english_pob_choice: Do you ... remember
  chosen_korean: 기억하지 못합니까
  alternatives_korean:
  - 기억나지 않습니까
  - 생각나지 않습니까
  lexicon: BDAG
  rationale: 수사적 의문문의 어조를 한국어 「기억하지 못합니까」로 자연스럽게 옮긴다.
- source_word: ἔτι ὢν πρὸς ὑμᾶς
  english_pob_choice: while I was still with you
  chosen_korean: 내가 아직 여러분과 함께 있을 때
  alternatives_korean:
  - 내가 여러분 곁에 머무를 때
  lexicon: BDAG
  rationale: πρός + 대격이 사람과 함께 있음을 가리키는 정형 표현. 「함께 있을 때」가 자연스럽다.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_korean: 이것들을
  alternatives_korean:
  - 이런 일들을
  - 이 일들을
  lexicon: BDAG
  rationale: 복수 지시어를 보존하여 앞서 가르친 「불법의 사람」 관련 내용들을 가리킨다.
- source_word: ἔλεγον
  english_pob_choice: I was telling
  chosen_korean: 말하곤 했던
  alternatives_korean:
  - 말하고 있던
  - 말씀드리던
  lexicon: BDAG
  rationale: 미완료의 반복·지속 의미를 「말하곤 했던」으로 자연스럽게 표현한다.
