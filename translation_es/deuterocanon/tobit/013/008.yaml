translation:
  language: es
  text: Que todos hablen y le den gracias en Jerusalén[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le confiesen» o «lo alaben»; el verbo griego puede tener cualquiera de estos sentidos relacionados con la adoración, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: λεγέτωσαν
  english_pob_choice: Let them ... speak
  chosen_spanish: hablen
  alternatives_spanish:
  - digan
  - proclamen
  lexicon: LSJ
  rationale: El imperativo plural de λέγω admite hablar/decir/proclamar. En este contexto breve y litúrgico, «hablen» conserva el impulso exhortativo sin cerrar innecesariamente el contenido como «proclamen».
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - toda la gente
  lexicon: LSJ
  rationale: El adjetivo se usa sustantivamente y en español la forma más natural y concisa es «todos».
- source_word: ἐξομολογείσθωσαν
  english_pob_choice: give thanks
  chosen_spanish: den gracias
  alternatives_spanish:
  - confiesen
  - alaben
  lexicon: LSJ
  rationale: En griego bíblico el verbo puede abarcar confesar, alabar o dar gracias. Dado el marco doxológico de Tobit 13, «den gracias» expresa bien el sentido de adoración y gratitud en español.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a Dios
  - a él mismo
  lexicon: LSJ
  rationale: El pronombre dativo remite a Dios; «a él» mantiene la referencia explícita sin añadir un sujeto interpretativo que el griego no nombra aquí.
- source_word: ἐν Ἱεροσολύμοις
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en Jerusalén
  lexicon: LSJ
  rationale: Nombre propio de lugar en español estándar y natural. Se conserva la localización cultual/geográfica sin variación tradicional innecesaria.
theological_decisions:
- issue: Sentido de ἐξομολογείσθωσαν en contexto de alabanza
  english_pob_reading: give thanks
  chosen_spanish_reading: den gracias
  alternative_spanish_readings:
  - confiesen
  - alaben
  rationale: En este pasaje la exhortación es claramente litúrgica. «Den gracias» comunica la dimensión de adoración y reconocimiento a Dios, mientras que se preservan las alternativas semánticas cercanas en la documentación.
  doctrine_reference: Translation philosophy §§1, 3, 6
