translation:
  language: es
  text: Entregaré tu riqueza y tus tesoros como botín[a], sin precio, por causa de todos tus pecados, en todo tu territorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin pago»; literalmente, «no por precio», es decir, sin compensación ni pago.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵילְךָ
  english_pob_choice: your wealth
  chosen_spanish: tu riqueza
  alternatives_spanish:
  - tu fuerza
  - tu ejército
  - tus riquezas
  lexicon: HALOT
  rationale: חַיִל/חֵיל puede referirse a fuerza, ejército o recursos/riquezas. En el contexto de bienes entregados al saqueo, «riqueza» comunica bien el valor confiscable y suena natural en español.
- source_word: וְאוֹצְרוֹתֶיךָ
  english_pob_choice: and your treasures
  chosen_spanish: y tus tesoros
  alternatives_spanish:
  - y tus almacenes
  - y tus tesorerías
  - y tus depósitos
  lexicon: HALOT
  rationale: El sustantivo designa cosas guardadas de valor; «tesoros» es claro en español y mantiene el paralelismo con «riqueza».
- source_word: לָבַז
  english_pob_choice: as plunder
  chosen_spanish: como botín
  alternatives_spanish:
  - como despojo
  - para saqueo
  - para botín
  lexicon: HALOT
  rationale: Con נתן, la expresión comunica entrega al saqueo. «Botín» preserva la idea de despojo hecho presa de guerra y es idiomático en español.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: daré
  alternatives_spanish:
  - entregaré
  - doy
  - voy a dar
  lexicon: HALOT
  rationale: Es la primera persona singular imperfecta de נתן; en anuncio profético, el futuro simple español expresa bien la acción decidida de Yahvé.
- source_word: לֹא בִמְחִיר
  english_pob_choice: without price
  chosen_spanish: sin precio
  alternatives_spanish:
  - no por precio
  - sin pago
  - sin compensación
  lexicon: HALOT
  rationale: Literalmente significa «no por precio». «Sin precio» es conciso, fiel y natural en español; conserva la ausencia de pago o rescate.
- source_word: וּבְכָל חַטֹּאותֶיךָ
  english_pob_choice: because of all your sins
  chosen_spanish: por causa de todos tus pecados
  alternatives_spanish:
  - por todos tus pecados
  - con todos tus pecados
  - a causa de todos tus pecados
  lexicon: HALOT
  rationale: La preposición ב tiene aquí fuerza causal/instrumental en un contexto de juicio. «Por causa de» explicita esa relación sin añadir contenido ajeno al texto.
- source_word: וּבְכָל גְּבוּלֶיךָ
  english_pob_choice: throughout all your territory
  chosen_spanish: por todo tu territorio
  alternatives_spanish:
  - en todos tus límites
  - dentro de todos tus bordes
  - por todas tus fronteras
  lexicon: HALOT
  rationale: גְּבוּל puede significar frontera, límite o territorio. En este contexto, la distribución del juicio a través de toda la extensión del país se expresa con naturalidad como «por todo tu territorio».
theological_decisions:
- issue: Relación entre pecado y pérdida de bienes en un oráculo de juicio
  english_pob_reading: The loss of wealth comes because of the people's sins, extending throughout their whole territory.
  chosen_spanish_reading: La pérdida de riqueza ocurre por causa de los pecados del pueblo y alcanza todo su territorio.
  alternative_spanish_readings:
  - La riqueza se entrega sin más, con todos tus pecados y en todos tus límites.
  - La pérdida es por tus pecados, y en todo tu territorio.
  rationale: El versículo presenta la lógica del juicio divino sobre Judá. Hacer explícita la causalidad de «por causa de» no añade doctrina extra; solo aclara la relación ya presente en el hebreo.
  doctrine_reference: Jeremías 15:13; principios de lectura causal en oráculos de juicio
- issue: Valor de ב en las dos frases finales
  english_pob_reading: Hebrew 'in/with all your sins and in all your borders'; the translation renders the sense as causal and distributive in context.
  chosen_spanish_reading: 'Las dos frases finales se leen como causal y distributiva: la ruina ocurre por los pecados y se extiende por todo el territorio.'
  alternative_spanish_readings:
  - 'Mantener una traducción más literal: «con todos tus pecados y en todos tus límites».'
  - 'Traducir solo espacialmente: «en todos tus límites».'
  - 'Traducir solo causalmente: «por tus pecados».'
  rationale: La preposición ב permite una lectura más literal, pero el contexto favorece una relación causal para los pecados y distributiva para el territorio. La redacción española conserva ambas fuerzas sin ocultar la tensión semántica.
  doctrine_reference: HALOT; principios de equivalencia óptima; Jeremías 15:13
translation_notes:
  revision_awareness: 'El texto sigue de cerca la versión inglesa auditada y su revisión reciente, conservando la coma lógica tras «pecados» implícita en la cadencia española: «por causa de todos tus pecados, por todo tu territorio». También mantiene la decisión lexical de entender חֵיל como riqueza y גְּבוּל como territorio, según el contexto de juicio y confiscación.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en la serie POB en español, aunque en este versículo no aparece explícitamente en el texto hebreo transmitido.
  - «Botín» refleja la idea de entrega al saqueo sin suavizar la fuerza del término.
  - «Territorio» traduce גְּבוּל de modo natural en español contemporáneo, sin perder el matiz de extensión total del país.
  - Se evita «SEÑOR» como sustituto del nombre divino, conforme a la política terminológica del proyecto.
