translation:
  language: es
  text: Y el gran atrio alrededor, tres hileras de piedra labrada y una hilera de vigas de cedro[c][b][a], como el atrio interior de la casa de Yahvé y el vestíbulo de la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y para el atrio interior de la casa de Yahvé y para el vestíbulo de la casa». La preposición hebrea puede entenderse como correspondencia o relación; aquí se traduce comparativamente: «como».'
    reason: alternative_reading
  - marker: b
    text: 'O: «tres hiladas de piedra labrada y una hilada de vigas de cedro».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, el salón de entrada del edificio del templo.
    reason: cultural_note
lexical_decisions:
- source_word: חָצֵר הַגְּדוֹלָה
  english_pob_choice: the great court
  chosen_spanish: el gran atrio
  alternatives_spanish:
  - el gran patio
  - el gran recinto
  lexicon: HALOT
  rationale: חָצֵר designa un espacio cercado o patio/corte arquitectónica. En español, «atrio» conserva bien el sentido de recinto del templo y suena natural en contexto religioso sin perder el valor espacial.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en derredor
  lexicon: HALOT
  rationale: Adverbio de circundación; «alrededor» reproduce la idea de envolvimiento de forma clara y fluida en español.
- source_word: שְׁלֹשָׁה טוּרִים
  english_pob_choice: three rows
  chosen_spanish: tres hileras
  alternatives_spanish:
  - tres filas
  - tres cursos
  lexicon: HALOT
  rationale: טוּר en contexto constructivo puede ser una fila/capa o hilera de mampostería. «Hilera» conserva la imagen de disposición repetida y resulta natural en español moderno.
- source_word: גָּזִית
  english_pob_choice: cut stone
  chosen_spanish: piedra labrada
  alternatives_spanish:
  - piedra cortada
  - piedra tallada
  lexicon: HALOT
  rationale: El término se refiere a piedra trabajada para construcción. «Labrada» comunica el trabajo de cantería con buen registro bíblico y evita una formulación demasiado mecánica.
- source_word: וְטוּר כְּרֻתֹת אֲרָזִים
  english_pob_choice: and a row of cedar beams
  chosen_spanish: y una hilera de vigas de cedro
  alternatives_spanish:
  - y una hilera de cedros cortados
  - y una hilera de piezas de cedro
  lexicon: HALOT
  rationale: כְּרֻתֹת alude a piezas cortadas; en español, «vigas de cedro» expresa de modo arquitectónico y natural la función constructiva del material, manteniendo la referencia al cedro.
- source_word: וְלַחֲצַר בֵּית יְהוָה הַפְּנִימִית
  english_pob_choice: like the inner court of the house of Yahweh
  chosen_spanish: como el atrio interior de la casa de Yahvé
  alternatives_spanish:
  - y para el atrio interior de la casa de Yahvé
  - como el patio interior de la casa de Yahvé
  lexicon: HALOT
  rationale: La preposición לְ aquí puede indicar relación o comparación; la POB inglesa opta por una lectura comparativa («like»). En español, «como» explicita esa relación sin forzar el paralelismo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre propio divino en lugar de ocultarlo tras un título.'
- source_word: אֻלָם
  english_pob_choice: vestibule
  chosen_spanish: vestíbulo
  alternatives_spanish:
  - pórtico
  - portal
  lexicon: HALOT
  rationale: אֻלָם designa el recinto de entrada del edificio. «Vestíbulo» es preciso arquitectónicamente y coincide con la decisión auditada en inglés.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el edificio
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «la casa» para mantener el idioma arquitectónico del texto y su referencia al edificio del templo.
theological_decisions:
- issue: Forma de traducir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. La política del POB en español pide preservar el nombre divino como «Yahvé», manteniendo la transparencia frente al original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de la preposición לְ en la frase final
  english_pob_reading: like / as a comparison
  chosen_spanish_reading: como
  alternative_spanish_readings:
  - y para
  - en relación con
  rationale: La traducción inglesa documenta una lectura comparativa para la construcción breve del hebreo. «Como» hace explícita esa relación sin borrar la posibilidad de una relación de correspondencia en el original.
  doctrine_reference: English audit trail, footnote a
translation_notes:
  revision_awareness: La versión sigue de cerca el texto hebreo y coincide con la revisión auditada más reciente, que no introdujo cambios sustantivos. Se ha mantenido la decisión comparativa de la preposición לְ y la terminología arquitectónica básica del pasaje.
  spanish_consistency_notes:
  - Se conserva «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «casa» para בַּיִת y «atrio» para חָצֵר en este contexto del templo.
  - «Vestíbulo» se usa como equivalente arquitectónico de אֻלָם, evitando variación innecesaria.
  - «Piedra labrada» y «vigas de cedro» reflejan materiales trabajados, no una paráfrasis libre.
