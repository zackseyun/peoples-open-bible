id: JAS.1.1
reference: James 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: 'Ἰάκωβος θεοῦ καὶ κυρίου Ἰησοῦ Χριστοῦ δοῦλος ταῖς δώδεκα φυλαῖς ταῖς ἐν τῇ διασπορᾷ χαίρειν.'
base_translation:
  language: en
  yaml_path: translation/nt/james/001/001.yaml
  text: 'James[a], a slave of God and of the Lord Jesus Messiah[c][b], to the twelve tribes in the Dispersion: greetings.'
translation:
  language: ko
  text: '하나님과 주 예수 메시아의 노예[a]인 야고보가, 흩어져 사는 열두 지파[b]에게 문안합니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「종」. 헬라어 δοῦλος는 단순한 봉사자가 아니라 주인에게 매인 자를 가리키며, 야고보의 자기 정체 선언은 그 매임의 신학적 무게를 의도적으로 드러낸다. DOCTRINE.md §1과 빌립보서 1:1의 노선을 따라 「노예」로 옮긴다.'
    reason: lexical_alternative
  - marker: b
    text: '곧 이스라엘 땅 밖에서 살아가는 유대 백성을 가리킨다. 헬라어 διασπορά는 흩어짐을 가리키는 거의 전문어이다.'
    reason: cultural_note
lexical_decisions:
- source_word: 'δοῦλος'
  english_pob_choice: 'slave'
  chosen_korean: '노예'
  alternatives_korean:
  - '종'
  - '하인'
  lexicon: BDAG
  rationale: '바울이 빌립보서 1:1에서 자기를 부른 방식과 동일하게, 야고보 또한 자신을 「하나님과 주 예수 메시아의 노예」로 선언한다. 매임의 신학적 무게를 보존하기 위해 「노예」를 채택한다(DOCTRINE.md §1).'
- source_word: 'Ἰησοῦ Χριστοῦ'
  english_pob_choice: 'Jesus Messiah'
  chosen_korean: '예수 메시아'
  alternatives_korean:
  - '예수 그리스도'
  lexicon: BDAG
  rationale: 'Χριστός가 본래 칭호이며, 인사 정식에서도 칭호의 무게가 살아 있다. 「그리스도」는 음역으로 칭호성이 가려지므로 「메시아」로 옮긴다.'
- source_word: 'ταῖς δώδεκα φυλαῖς'
  english_pob_choice: 'to the twelve tribes'
  chosen_korean: '열두 지파'
  alternatives_korean:
  - '열두 부족'
  lexicon: BDAG
  rationale: '이스라엘 언약 공동체를 가리키는 정식 표현. 일반화하지 않고 「지파」를 유지한다.'
- source_word: 'διασπορᾷ'
  english_pob_choice: 'the Dispersion'
  chosen_korean: '흩어져 사는'
  alternatives_korean:
  - '디아스포라'
  - '흩어짐 가운데 있는'
  lexicon: BDAG
  rationale: '한국어 독자에게 「디아스포라」는 다소 외래적이므로 자연스러운 관형구 「흩어져 사는」으로 풀되, 유대 디아스포라의 반(半)전문적 의미를 보존한다.'
- source_word: 'χαίρειν'
  english_pob_choice: 'greetings'
  chosen_korean: '문안합니다'
  alternatives_korean:
  - '기뻐하라'
  - '인사드립니다'
  lexicon: BDAG
  rationale: '편지 서두의 관용적 부정사로, 직역 「기뻐하라」는 한국어 편지 관습에 어색하므로 「문안합니다」로 옮긴다.'
theological_decisions:
- issue: '야고보의 자기 정체 선언에서 δοῦλος 강도'
  chosen_reading: '노예'
  alternative_readings:
  - '종'
  - '하인'
  rationale: 'DOCTRINE.md는 매임이 신학적으로 두드러진 곳에서 「노예」를 선호한다. 야고보는 하나님과 주 예수 메시아께 전적으로 속한 자로 자신을 규정하므로 강한 어휘를 보존한다. 빌립보서 1:1의 노선과 일치.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; Contested terms table for δοῦλος'
- issue: '인사에서 Χριστός를 칭호로 번역'
  chosen_reading: '메시아'
  alternative_readings:
  - '그리스도'
  rationale: '칭호로 기능하는 Χριστός를 칭호로 옮긴다. 한국 전통의 음역 「그리스도」는 칭호성을 흐리므로 채택하지 않는다.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
