    rationale: Aunque el hebreo usa singular formal, el audit trail documenta que funciona colectivamente con «sus carros», y en español el singular aquí suena antinatural y potencialmente engañoso. «las ruedas de sus carros» preserva mejor el sentido fuente y la legibilidad.
