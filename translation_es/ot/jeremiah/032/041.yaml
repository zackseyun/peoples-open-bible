translation:
  language: es
  text: Me alegraré por ellos para hacerles bien[a], y los plantaré en esta tierra en fidelidad, con todo mi corazón y con toda mi alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en verdad» o «verdaderamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂשְׂתִּי
  english_pob_choice: I will rejoice
  chosen_spanish: Me alegraré
  alternatives_spanish:
  - me deleitaré
  - tendré gozo
  lexicon: HALOT
  rationale: El verbo expresa regocijo intenso; en futuro profético funciona naturalmente como futuro. «Me alegraré» comunica bien el afecto positivo y conserva el sentido de gozo activo del hebreo.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - acerca de ellos
  - por ellos
  lexicon: HALOT
  rationale: Con שׂשׂ y עַל, el objeto del regocijo se expresa mejor con una relación de dirección/objeto. «Sobre ellos» mantiene esa fuerza y sigue de cerca la imagen del original.
- source_word: לְהֵיטִיב אוֹתָם
  english_pob_choice: to do them good
  chosen_spanish: para hacerles bien
  alternatives_spanish:
  - para hacerles el bien
  - para beneficiarlos
  lexicon: HALOT
  rationale: El infinitivo con לְ expresa propósito. En español, «hacerles bien» preserva el valor idiomático sin volverse pesado, y mantiene el matiz de benevolencia pactal del hebreo.
- source_word: וּנְטַעְתִּים
  english_pob_choice: I will plant them
  chosen_spanish: los plantaré
  alternatives_spanish:
  - los estableceré
  lexicon: HALOT
  rationale: נטע es literalmente «plantar»; en este contexto de restauración conviene conservar la metáfora agrícola en el texto principal. «Los plantaré» es directo y transparente.
- source_word: בָּאָרֶץ הַזֹּאת
  english_pob_choice: in this land
  chosen_spanish: en esta tierra
  alternatives_spanish:
  - en esta tierra misma
  - en este país
  lexicon: HALOT
  rationale: «Tierra» es la opción más fiel al uso bíblico de אֶרֶץ en contexto de pacto y restauración. «País» resultaría demasiado moderno y estrecho.
- source_word: בֶּאֱמֶת
  english_pob_choice: in faithfulness
  chosen_spanish: en fidelidad
  alternatives_spanish:
  - en verdad
  - verdaderamente
  lexicon: HALOT
  rationale: El sustantivo אֱמֶת puede expresar verdad, firmeza y confiabilidad. Dado el énfasis del versículo en la promesa segura de Yahvé, «en fidelidad» comunica mejor la lealtad constante del pacto que una traducción meramente abstracta como «en verdad».
- source_word: בְּכָל לִבִּי
  english_pob_choice: with all my heart
  chosen_spanish: con todo mi corazón
  alternatives_spanish:
  - desde todo mi corazón
  - de todo corazón
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de entrega total. «Con todo mi corazón» es idiomático en español y refleja correctamente el lenguaje antropomórfico del texto.
- source_word: וּבְכָל נַפְשִׁי
  english_pob_choice: and with all my soul
  chosen_spanish: y con toda mi alma
  alternatives_spanish:
  - y con todo mi ser
  - y con toda mi vida
  lexicon: HALOT
  rationale: נֶפֶשׁ conserva aquí el paralelismo con «corazón» y la idea de la persona entera. «Alma» mantiene la correspondencia tradicional y la fuerza antropológica del hebreo sin diluirla.
theological_decisions:
- issue: Lenguaje antropomórfico aplicado a Dios
  english_pob_reading: Retain 'with all my heart and with all my soul' as applied to God.
  chosen_spanish_reading: Conservar «con todo mi corazón y con toda mi alma» referido a Yahvé.
  alternative_spanish_readings:
  - con toda mi intención y con todo mi ser
  - con total compromiso
  rationale: El hebreo usa deliberadamente un modismo de devoción total. Mantenerlo en español conserva la fuerza relacional y pactal de la promesa, sin reducirla a una paráfrasis abstracta.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de בֶּאֱמֶת en la promesa de restauración
  english_pob_reading: Render as 'in faithfulness' in the main text.
  chosen_spanish_reading: Traducirlo como «en fidelidad».
  alternative_spanish_readings:
  - en verdad
  - verdaderamente
  rationale: La escena subraya la confiabilidad de la acción divina al restaurar y plantar a su pueblo. «En fidelidad» expresa mejor esa constancia del pacto y deja abierta la alternativa tradicional «en verdad» para nota.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El texto coincide con la última pasada revisada, que quedó sin cambios y con alta concordancia entre revisores. No se detectaron ajustes necesarios respecto del paquete fuente y del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como sujeto implícito de la promesa, conforme al estándar del proyecto.
  - Se conserva la metáfora de «plantar» en lugar de sustituirla por «establecer», para no perder la imagen agrícola del hebreo.
  - «Corazón» y «alma» reproducen el paralelismo antropológico del original y la decisión inglesa auditada.
  - La nota al pie preserva la alternativa semántica de בֶּאֱמֶת sin debilitar la lectura principal en el texto.
