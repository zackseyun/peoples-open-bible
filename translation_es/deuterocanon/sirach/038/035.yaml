translation:
  language: es
  text: pero ellos sostendrán el orden de la era[a], y su oración está en el trabajo de su oficio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «establecerán la creación/el orden de la era». El griego κτίσμα αἰῶνος es compacto y puede referirse tanto al tejido duradero de la sociedad como, de manera más amplia, al orden establecido del mundo.
    reason: lexical_alternative
  - marker: b
    text: O «su súplica está en la labor de su oficio», expresando que su oración está ligada a su trabajo hábil.
    reason: lexical_alternative
lexical_decisions:
- source_word: κτίσμα αἰῶνος
  english_pob_choice: order of the age
  chosen_spanish: orden de la edad
  alternatives_spanish:
  - creación de la edad
  - estructura de la edad
  - trama de la edad
  lexicon: LSJ
  rationale: El griego compacto κτίσμα αἰῶνος puede aludir al orden social o al entramado duradero de la vida humana. «Orden de la edad» conserva la fuerza de lo establecido/sostenido sin forzar una lectura puramente cosmológica ni borrar la ambigüedad documentada en el audit trail.
- source_word: στηρίσουσιν
  english_pob_choice: will sustain
  chosen_spanish: sostendrán
  alternatives_spanish:
  - apoyarán
  - afirmarán
  - establecerán
  lexicon: LSJ
  rationale: στηρίζω puede significar hacer firme, sostener o establecer. «Sostendrán» conserva la idea de apoyo continuo y encaja con el sentido de los artesanos que mantienen en pie ese orden.
- source_word: δέησις
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - súplica
  - petición
  lexicon: LSJ
  rationale: Aunque puede leerse como súplica o petición, «oración» es el equivalente más natural en español y mantiene la lectura de que el trabajo artesanal está vinculado con la devoción.
- source_word: ἐν ἐργασίᾳ τέχνης
  english_pob_choice: in the work of their craft
  chosen_spanish: en la obra de su oficio
  alternatives_spanish:
  - en el trabajo de su arte
  - en el labor de su artesanía
  - en la labor de su oficio
  lexicon: LSJ
  rationale: ἐργασία y τέχνη apuntan a trabajo realizado con habilidad. «Obra de su oficio» suena natural en español y preserva la relación entre oración y labor especializada, sin rebajar τέχνη a un mero trabajo genérico.
theological_decisions:
- issue: Relación entre oración y trabajo artesanal
  english_pob_reading: Their prayer is expressed within their skilled labor, not necessarily replacing verbal prayer.
  chosen_spanish_reading: Su oración está vinculada a su labor especializada y se expresa en ella, sin negar que también puedan orar verbalmente.
  alternative_spanish_readings:
  - Su súplica acompaña su trabajo.
  - Su petición consiste en su labor.
  rationale: 'δέησις normalmente denota oración/petición; la cláusula siguiente la ubica en el ámbito del trabajo. La traducción conserva esa tensión: la obra puede ser el lugar o la expresión de la oración, no su negación.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Alcance de κτίσμα αἰῶνος
  english_pob_reading: the enduring order/fabric of the age or world's established order
  chosen_spanish_reading: el orden de la edad como realidad establecida y duradera
  alternative_spanish_readings:
  - la creación de la edad
  - la estructura del mundo
  rationale: La frase griega es deliberadamente compacta y admite un rango entre «creación» y «orden». La versión española preserva esa tensión sin cerrarla excesivamente hacia una lectura cosmológica o meramente social.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El audit trail inglés revisó «fabric of the age» a «order of the age» por mayor naturalidad y ajuste léxico; por eso la versión española adopta «orden de la edad» y mantiene la cláusula sobre la oración vinculada al oficio. También se conservó la ambigüedad reconocida entre oración verbal y oración expresada en el trabajo.
  spanish_consistency_notes:
  - Se usa «edad» para αἰών en continuidad con la opción inglesa «age», evitando «mundo» o «eternidad» como estrechamientos indebidos.
  - «Oficio» y «obra» mantienen un registro digno y comprensible para la tradición bíblica en español sin recurrir a un calco rígido.
  - Se conservó el adversativo inicial «pero» para reflejar ἀλλὰ de modo directo y natural.
