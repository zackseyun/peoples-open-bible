translation:
  language: es
  text: Judá e Israel eran tan numerosos como la arena junto al mar[a], en gran número, comiendo, bebiendo y regocijándose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como la arena en la orilla del mar», una expresión hebrea común para indicar una población enormemente grande.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Juda
  lexicon: HALOT
  rationale: Es el nombre propio del reino/tribu de Judá; en español bíblico estándar y en un registro natural se escribe «Judá».
- source_word: וְיִשְׂרָאֵל
  english_pob_choice: and Israel
  chosen_spanish: e Israel
  alternatives_spanish:
  - y Israel
  lexicon: HALOT
  rationale: Es un nombre propio coordinado con Judá. Ante vocal inicial, «e» es la forma española natural para la coordinación.
- source_word: רַבִּים
  english_pob_choice: were as numerous
  chosen_spanish: eran tan numerosos
  alternatives_spanish:
  - eran muchos
  - eran numerosos
  lexicon: HALOT
  rationale: El adjetivo funciona predicativamente con el sujeto compuesto. «Tan numerosos» prepara la comparación que sigue y conserva el sentido de gran cantidad sin volverse más explicativo de lo que exige el hebreo.
- source_word: כַּחוֹל אֲשֶׁר עַל הַיָּם
  english_pob_choice: as the sand by the sea
  chosen_spanish: como la arena junto al mar
  alternatives_spanish:
  - como la arena en la orilla del mar
  - como la arena a la orilla del mar
  lexicon: HALOT
  rationale: La imagen hebrea es un símil convencional de inmensa multitud. «Junto al mar» mantiene la referencia de עַל הַיָּם con una construcción natural en español; «arena» es idiomático y claro.
- source_word: לָרֹב
  english_pob_choice: in multitude
  chosen_spanish: —
  alternatives_spanish:
  - en multitud
  - en gran número
  lexicon: HALOT
  rationale: La expresión intensifica la comparación y en español queda suficientemente integrada en «tan numerosos». Traducirla aparte sonaría redundante en esta frase; se conserva su fuerza en el conjunto.
- source_word: אֹכְלִים
  english_pob_choice: eating
  chosen_spanish: comiendo
  alternatives_spanish:
  - que comían
  - mientras comían
  lexicon: HALOT
  rationale: El participio describe una acción característica o en curso; el gerundio español reproduce bien esa continuidad descriptiva.
- source_word: וְשֹׁתִים
  english_pob_choice: and drinking
  chosen_spanish: bebiendo
  alternatives_spanish:
  - y bebiendo
  - mientras bebían
  lexicon: HALOT
  rationale: Se mantiene la serie participial del hebreo, con valor descriptivo y simultáneo.
- source_word: וּשְׂמֵחִים
  english_pob_choice: and rejoicing
  chosen_spanish: alegrándose
  alternatives_spanish:
  - y gozándose
  - y regocijándose
  lexicon: HALOT
  rationale: El término expresa un estado de alegría celebratoria. «Alegrándose» es natural y conserva el matiz de gozo activo; «regocijándose» sería más solemne pero menos corriente.
translation_notes:
  revision_awareness: Se siguió el sentido revisado del inglés POB, que elimina un conector explicativo innecesario en la comparación y deja una formulación más directa del hebreo. La versión española conserva esa misma economía, manteniendo la imagen idiomática y la serie participial.
  spanish_consistency_notes:
  - Se preservó el nombre propio «Judá» y la coordinación natural «e Israel».
  - 'Se mantuvo el paralelismo descriptivo con tres gerundios: comiendo, bebiendo y alegrándose.'
  - «Tan numerosos» incorpora la fuerza de רַבִּים sin añadir una glosa interpretativa en el cuerpo del texto.
  - La nota al pie conserva la alternativa idiomática equivalente, en línea con el expediente inglés.
