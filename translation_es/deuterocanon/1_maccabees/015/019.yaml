  text: It therefore seemed good to us to write to the kings and the countries[a], that they should not seek harm against them, and should not make war against them and their cities and their countries[b], and that they should not join in alliance with those who are making war against them.
  footnotes:
  - marker: a
    text: Greek has 'countries' (χῶραι) both for the recipients of the letter and for the lands belonging to the Jews; 'lands' or 'territories' are possible alternatives in both places.
    reason: lexical_alternative
  - marker: b
    text: The printed Swete text reads 'A cities' at one point, which appears to reflect an edition/transcription issue; the sense is naturally 'their cities' in context.
    reason: textual_variant
