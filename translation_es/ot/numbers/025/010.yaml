lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - y dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva avanza la acción; en español, «Entonces» conserva ese valor secuencial de manera natural, y «habló» es el equivalente idiomático de דבר en este contexto de comunicación divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto como transliteración directa en español. «Yahvé» corresponde al criterio POB para יהוה y evita la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición introduce el destinatario del habla; en español, «a» expresa de modo natural la dirección del discurso hacia Moisés.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Se usa la forma estándar española del nombre propio bíblico, plenamente reconocible y fiel al original.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula infinitiva introduce el contenido del discurso. «Diciendo» mantiene el marcador discursivo hebreo con tono bíblico claro y natural en español.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura POB distingue el nombre divino del título. En español, «Yahvé» preserva el nombre personal revelado a Israel y sigue la decisión doctrinal de no ocultarlo con una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español junto a la palabra correspondiente.
  spanish_consistency_notes:
  - Se mantuvo el orden narrativo breve del hebreo con una construcción natural en español.
  - «Moisés» y «Yahvé» siguen la terminología POB consistente para nombres propios y el nombre divino.
  - La fórmula «diciendo» conserva el valor introductorio de לֵּאמֹר sin sobretraducirlo.
