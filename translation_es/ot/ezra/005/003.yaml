  to: 'En aquel tiempo, Tatenai, gobernador de Más Allá del Río[a], y Setar-Bosnai y sus asociados vinieron a ellos y les dijeron así: «¿Quién les dio un decreto[b] para edificar esta casa y para completar esta estructura[c]?».'
  rationale: Se ajustó un calco poco natural («fueron a ellos» > «vinieron a ellos»), se limpió la puntuación del sujeto coordinado, y se eliminaron notas no necesarias para dejar solo las que preservan información cultural y ambigüedad léxica relevante. Se mantuvo «decreto», «casa» y «estructura» por fidelidad al original y al rastro auditado inglés.
