review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del hebreo: Amón y Moab atacan a los habitantes del monte Seír, los dedican a destrucción, los eliminan, y luego se vuelven unos contra otros. También conserva adecuadamente la temporalidad de וּכְכַלּוֹתָם y la reciprocidad de עָזְרוּ אִישׁ בְּרֵעֵהוּ לְמַשְׁחִית. Sin embargo, la elección «anatema» para לְהַחֲרִים no es la mejor para este proyecto y en español puede desviar el sentido hacia excomunión o maldición eclesiástica más que hacia destrucción consagrada.'
  spanish_quality_summary: El texto es claro y legible, con buen flujo narrativo. «Se levantaron contra», «los habitantes del monte Seír» y «se ayudaron unos a otros para destruirse mutuamente» funcionan bien. La principal mejora es reemplazar «entregarlos al anatema» por una formulación más natural y fiel al sentido bélico-sacral del hebreo. También conviene ajustar la nota para evitar el anglicismo/confusión de «ban» y dar una alternativa española más inteligible.
  glossary_alignment: No hay términos de glosario mayor en conflicto salvo la decisión teológica de חרם. La auditoría inglesa documenta «devote them to destruction» con nota alternativa «put under the ban». En español, «consagrarlos a la destrucción» o «dedicarlos a destrucción» preserva mejor esa fuerza que «anatema». El resto del vocabulario concuerda con las decisiones POB y con un español eclesial moderno.
  issues:
  - severity: medium
    issue: «Entregarlos al anatema» para לְהַחֲרִים
    rationale: Aunque intenta reflejar el matiz técnico de חרם, «anatema» en español bíblico y eclesiástico suele oírse como maldición o excomunión, no como dedicación a destrucción en guerra sacral. «Consagrarlos a la destrucción» preserva mejor el sentido y coincide mejor con la justificación inglesa.
  - severity: low
    issue: Nota al pie con «ban»
    rationale: La nota «ponerlos bajo el ban» suena poco natural y algo opaca en español. Debe conservar la alternativa formal, pero expresada de manera comprensible, por ejemplo «ponerlos bajo proscripción» o explicando directamente el hebreo técnico.
  revised_spanish_text: Entonces los amonitas y los moabitas se levantaron contra los habitantes del monte Seír para consagrarlos a la destrucción[a] y destruirlos; y cuando acabaron con los habitantes de Seír, se ayudaron unos a otros para destruirse mutuamente.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «ponerlos bajo proscripción», es decir, dedicarlos a destrucción.'
    reason: lexical_alternative
  revision_rationale: Se reemplazó «entregarlos al anatema» por «consagrarlos a la destrucción» para reflejar con mayor fidelidad y claridad el valor de חרם en contexto de guerra sacral, evitando una lectura eclesiástica de «anatema». También se rehízo la nota para preservar la alternativa formal sin usar una expresión poco natural en español.
