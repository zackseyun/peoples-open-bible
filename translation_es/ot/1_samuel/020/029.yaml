  text: וַ/יֹּ֡אמֶר שַׁלְּחֵ֣/נִי נָ֡א כִּ֣י זֶבַח֩ מִשְׁפָּחָ֨ה לָ֜/נוּ בָּ/עִ֗יר וְ/ה֤וּא צִוָּֽה לִ/י֙ אָחִ֔/י וְ/עַתָּ֗ה אִם מָצָ֤אתִי חֵן֙ בְּ/עֵינֶ֔י/ךָ אִמָּ֥לְטָה נָּ֖א וְ/אֶרְאֶ֣ה אֶת אֶחָ֑/י עַל כֵּ֣ן לֹא בָ֔א אֶל שֻׁלְחַ֖ן הַ/מֶּֽלֶךְ־־־־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/020/029.yaml
  text: He said[a], ‘Please let me go, because we have a family sacrifice in the city, and my brother has commanded me. So now, if I have found favor in your eyes[b], please let me escape and see my brothers.’ Therefore he has not come to the king’s table.
  footnotes:
  - marker: a
    text: Or, “please let me escape and see my brothers.” The Hebrew verb can carry the sense of escaping or slipping away discreetly.
    reason: lexical_alternative
  - marker: b
    text: “My brothers” may refer to David’s literal brothers or, more broadly, his male kin within the family group.
    reason: cultural_note
