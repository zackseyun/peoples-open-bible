id: T12P.GAD.4.6
reference: Testament of Gad 4:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 6. Ὥσπερ²³ ἡ ἀγάπη Γκαὶ¹ τοὺς νεκροὺς *θέλει ζωοποιῆσαι²⁴ καὶ τοὺς ἐν²⁵ ἀποφάσει θανάτου θέλει²⁶ ἀνακαλέσασθαι, οὕτως καὶ²⁷ τὸ μῖσος τοὺς ζῶντας θέλει ἀποκτεῖναι, καὶ *τοὺς ἐν ὀλίγῳ ἁμαρτήσαντας²⁸ οὐ θέλει ζῆν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/004/006.yaml
  text: Just as love wants to make the dead alive and to call back those under sentence of death, so also hatred wants to kill the living, and it does not want those who have sinned in a little matter to live.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Changed 'would even' to 'wants to' to reflect θέλει more directly; 'call back' kept for ἀνακαλέσασθαι; revised 'in a small matter' from 'in a small matter' for ἐν ὀλίγῳ, and tightened wording for natural English while preserving the source structure.
translation:
  language: es
  text: Así como el amor quiere vivificar a los muertos y llamar de vuelta a los que están bajo sentencia de muerte, así también el odio quiere matar a los vivos, y no quiere que vivan los que han pecado en algo pequeño.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  - amor fraternal
  lexicon: ἀγάπη
  rationale: Se conserva el sentido general de amor como principio moral activo; en este contexto no se restringe a caridad ni a amor fraternal.
- source_word: ζωοποιῆσαι
  english_pob_choice: make alive
  chosen_spanish: vivificar
  alternatives_spanish:
  - hacer vivir
  - dar vida
  lexicon: ζωοποιέω
  rationale: '''Vivificar'' expresa bien la acción causativa de dar vida sin añadir matices ajenos; en español suena más sobrio que una paráfrasis amplia.'
- source_word: ἀνακαλέσασθαι
  english_pob_choice: call back
  chosen_spanish: llamar de vuelta
  alternatives_spanish:
  - hacer volver
  - recuperar
  lexicon: ἀνακαλέω
  rationale: La imagen de ‘llamar de vuelta’ preserva el movimiento de retorno indicado por el verbo y sigue de cerca la decisión inglesa sin calco rígido.
- source_word: ἀποφάσει θανάτου
  english_pob_choice: under sentence of death
  chosen_spanish: bajo sentencia de muerte
  alternatives_spanish:
  - condenados a muerte
  - bajo condena de muerte
  lexicon: ἀπόφασις + θάνατος
  rationale: La frase jurídica ‘bajo sentencia de muerte’ comunica con precisión el estado legal implícito en el griego.
- source_word: μῖσος
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - aborrecimiento
  - rencor
  lexicon: μῖσος
  rationale: ‘Odio’ es la correspondencia directa y mantiene la fuerza moral del contraste con el amor.
- source_word: τοὺς ζῶντας
  english_pob_choice: the living
  chosen_spanish: los vivos
  alternatives_spanish:
  - los que viven
  - los vivientes
  lexicon: ζάω
  rationale: ‘Los vivos’ es natural en español y conserva el sustantivo colectivo del original.
- source_word: ἐν ὀλίγῳ
  english_pob_choice: in a little matter
  chosen_spanish: en algo pequeño
  alternatives_spanish:
  - por una cosa pequeña
  - en una cuestión menor
  lexicon: ὀλίγος
  rationale: La expresión es breve y neutral; ‘algo pequeño’ preserva la indeterminación del griego sin especificar demasiado el tipo de falta.
theological_decisions:
- issue: Relación entre amor/odio y vida/muerte
  english_pob_reading: Just as love wants to make the dead alive... so also hatred wants to kill the living
  chosen_spanish_reading: Así como el amor quiere vivificar a los muertos... así también el odio quiere matar a los vivos
  alternative_spanish_readings:
  - Así como el amor puede dar vida a los muertos...
  - Así como el amor procura resucitar a los muertos...
  rationale: Se mantiene el paralelismo moral y causal del texto sin introducir una afirmación doctrinal adicional sobre resurrección o capacidad absoluta; el griego presenta una voluntad/impulso figurado.
  doctrine_reference: Anthropology / moral exhortation; no direct creedal formulation
- issue: Sentido de ἐν ὀλίγῳ ἁμαρτήσαντας
  english_pob_reading: those who have sinned in a little matter
  chosen_spanish_reading: los que han pecado en algo pequeño
  alternative_spanish_readings:
  - los que han pecado en una cosa pequeña
  - los que han pecado levemente
  rationale: Se conserva la ambigüedad entre una falta pequeña y una ofensa menor, sin convertirlo en una categoría moral técnica que el griego no explicita.
  doctrine_reference: Sin-intensity / moral gradation; no dogmatic escalation
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente: θέλει se refleja con ''quiere'', se conserva el paralelismo de ''llamar de vuelta'' para ἀνακαλέσασθαι, y ἐν ὀλίγῳ se traduce con una formulación natural que mantiene la idea de una falta pequeña sin endurecerla.'
  spanish_consistency_notes:
  - Se usa 'amor' y 'odio' de manera consistente como términos morales abstractos.
  - '''Vivos'' y ''muertos'' se mantienen como sustantivos colectivos para reproducir el contraste del original.'
  - No se introducen mayúsculas teológicas innecesarias, ya que el pasaje no menciona directamente el nombre divino ni títulos cristológicos.
