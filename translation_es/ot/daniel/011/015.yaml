translation:
  language: es
  text: Entonces el rey del norte vendrá y levantará un terraplén de asedio, y capturará una ciudad fortificada[a]; y las fuerzas del sur no resistirán, ni sus tropas escogidas[b], porque no habrá fuerza para resistir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ciudad de fortificaciones»; la expresión hebrea puede entenderse como una ciudad militarmente reforzada.
    reason: lexical_alternative
  - marker: b
    text: O «ni su pueblo escogido»; en el contexto, la frase probablemente se refiere a sus tropas selectas o de élite.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָבֹא
  english_pob_choice: Then ... will come
  chosen_spanish: Entonces ... vendrá
  alternatives_spanish:
  - Y ... vendrá
  - Luego ... vendrá
  lexicon: HALOT
  rationale: La waw narrativa en este contexto profético-histórico avanza la secuencia. «Entonces» comunica mejor la progresión que un simple «y», sin perder el valor consecutivo del hebreo.
- source_word: מֶלֶךְ הַצָּפוֹן
  english_pob_choice: the king of the north
  chosen_spanish: el rey del norte
  alternatives_spanish:
  - el rey septentrional
  - el rey del norte
  lexicon: HALOT
  rationale: Se mantiene la designación político-direccional estable de Daniel 11. «Del norte» conserva la relación de contraste con «del sur» y evita una paráfrasis interpretativa.
- source_word: וְיִשְׁפֹּךְ סֹלֲלָה
  english_pob_choice: heap up a siege ramp
  chosen_spanish: levantará un terraplén de asedio
  alternatives_spanish:
  - alzará un terraplén de asedio
  - construirá una rampa de asedio
  - echará un terraplén de asedio
  lexicon: HALOT
  rationale: El hebreo describe la construcción de obras de asedio contra una ciudad. «Levantará un terraplén de asedio» es natural en español y conserva la imagen militar sin diluirla.
- source_word: וְלָכַד
  english_pob_choice: and capture
  chosen_spanish: y capturará
  alternatives_spanish:
  - y tomará
  - y se apoderará de
  lexicon: HALOT
  rationale: El verbo expresa la toma militar de la ciudad. «Capturará» comunica bien ese sentido y mantiene la secuencia verbal futura.
- source_word: עִיר מִבְצָרוֹת
  english_pob_choice: a fortified city
  chosen_spanish: una ciudad fortificada
  alternatives_spanish:
  - una ciudad de fortificaciones
  - una ciudad amurallada
  - una ciudad fuerte
  lexicon: HALOT
  rationale: La expresión hebrea se entiende idiomáticamente como una ciudad reforzada militarmente. «Ciudad fortificada» preserva el valor descriptivo sin volverlo torpe en español.
- source_word: וּזְרֹעוֹת הַנֶּגֶב
  english_pob_choice: the forces of the south
  chosen_spanish: las fuerzas del sur
  alternatives_spanish:
  - los brazos del sur
  - las armas del sur
  lexicon: HALOT
  rationale: «Brazos/armas» reproduce el hebraísmo, pero en español puede sonar demasiado literal. «Fuerzas» comunica el sentido militar que la POB inglesa también documenta como opción semántica.
- source_word: לֹא יַעֲמֹדוּ
  english_pob_choice: will not stand
  chosen_spanish: no resistirán
  alternatives_spanish:
  - no se mantendrán en pie
  - no permanecerán firmes
  - no se sostendrán
  lexicon: HALOT
  rationale: En contexto bélico, el verbo «estar en pie/stand» implica hacer frente o resistir. «No resistirán» expresa ese valor sin perder el trasfondo de firmeza militar.
- source_word: וְעַם מִבְחָרָיו
  english_pob_choice: nor his choice troops
  chosen_spanish: ni sus tropas escogidas
  alternatives_spanish:
  - ni su gente escogida
  - ni sus selectos guerreros
  - ni su pueblo escogido
  lexicon: HALOT
  rationale: La referencia más probable en contexto es el contingente selecto del rey del sur, no el pueblo en general. «Tropas escogidas» mantiene el matiz militar y el valor de selección del término.
- source_word: וְאֵין כֹּחַ לַעֲמֹד
  english_pob_choice: for there will be no strength to stand
  chosen_spanish: porque no habrá fuerza para resistir
  alternatives_spanish:
  - porque no habrá fuerza para mantenerse en pie
  - pues no habrá poder para resistir
  - porque no habrá fuerza para sostenerse
  lexicon: HALOT
  rationale: «Fuerza» traduce כֹּחַ de manera directa. «Resistir» recoge el sentido de לַעֲמֹד en contexto militar y en español resulta más claro que repetir «estar en pie» al final del versículo.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que cambió la cláusula final de apoyo de «even his choice troops» a «nor his choice troops» para reflejar mejor la continuidad de los que no resistirán. En español se refleja con «ni sus tropas escogidas».
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «el rey del norte / del sur» como designación estable y coherente con Daniel 11.
  - Se mantuvo el lenguaje militar explícito («terraplén de asedio», «fuerzas», «tropas») para no suavizar el cuadro bélico del texto.
  - Se evitó «Cristo»/«Mesías» y otros términos no pertinentes a este versículo.
