translation:
  language: es
  text: El hombre[a], nacido de mujer, de pocos días y lleno de agitación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humanidad»; el hebreo «hombre» es un singular genérico que se refiere a la condición humana.
    reason: lexical_alternative
  - marker: b
    text: O «lleno de problemas» o «lleno de inquietud».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָדָם
  english_pob_choice: Man
  chosen_spanish: El hombre
  alternatives_spanish:
  - la humanidad
  - un ser humano
  lexicon: HALOT
  rationale: El hebreo אָדָם funciona aquí como singular genérico que representa la condición humana. En español, «el hombre» conserva ese valor representativo y la concisión del original mejor que una abstracción colectiva.
- source_word: יְל֣וּד אִשָּׁ֑ה
  english_pob_choice: born of woman
  chosen_spanish: nacido de mujer
  alternatives_spanish:
  - engendrado por mujer
  - nacido de una mujer
  lexicon: HALOT
  rationale: La construcción expresa de manera concreta el origen humano y frágil del hombre. «Nacido de mujer» reproduce el sentido sin añadir elementos ajenos; se mantiene la fuerza proverbial del hebreo.
- source_word: קְצַ֥ר יָ֝מִ֗ים
  english_pob_choice: short of days
  chosen_spanish: es corto de días
  alternatives_spanish:
  - de pocos días
  - de vida breve
  - de corta vida
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «corto de días» o «poco en días». «Es corto de días» conserva la metáfora temporal y evita diluirla en una paráfrasis más libre.
- source_word: וּשְׂבַֽע רֹֽגֶז
  english_pob_choice: and full of turmoil
  chosen_spanish: y lleno de turbación
  alternatives_spanish:
  - y lleno de trouble
  - y lleno de agitación
  - y lleno de unrest
  lexicon: HALOT
  rationale: שְׂבַע significa estar lleno/saciado, y רֹגֶז puede referirse a agitación, conmoción o aflicción turbulenta. «Turbación» preserva ese campo semántico amplio en un español natural y digno.
theological_decisions:
- issue: Valor genérico de אָדָם
  english_pob_reading: Man as a generic singular referring to the human condition
  chosen_spanish_reading: El hombre como singular genérico que representa a toda la humanidad
  alternative_spanish_readings:
  - la humanidad
  - un ser humano
  rationale: 'La lectura del POB evita neutralizar el sustantivo bíblico en una abstracción. En español, «el hombre» mantiene el valor representativo y la tensión sapiencial del texto: una verdad sobre la condición humana en general.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; tabla de términos controvertidos para אָדָם
translation_notes:
  revision_awareness: El control de revisión indicado en el material fuente no introdujo cambios; el estado final se mantiene en alta concordancia, sin revisiones aplicadas al contenido base.
  spanish_consistency_notes:
  - Se mantuvo «Dios»/«Yahvé» fuera del versículo por no aparecer en el hebreo.
  - Se conservó el singular genérico de אָדָם con «El hombre», coherente con la filosofía POB de preservar la referencia representativa.
  - «Turbación» se eligió para abarcar agitación, inquietud y aflicción sin perder la densidad del término רֹגֶז.
