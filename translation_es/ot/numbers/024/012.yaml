translation:
  language: es
  text: 'Balaán dijo a Balac: «¿No hablé también a tus mensajeros[a] que me enviaste[b], diciendo:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mensajeros» traduce el sentido humano requerido por el contexto; el hebreo también puede significar «enviados» o, en otros contextos, «ángeles».
    reason: lexical_alternative
  - marker: b
    text: La cita introducida por «diciendo» continúa en el versículo siguiente.
    reason: cross_reference
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol de אמר se expresa naturalmente en español con el verbo de decir. «Dijo» mantiene la función introductoria del discurso directo sin sobretraducir.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de forma estándar.
- source_word: אֶל בָּלָק
  english_pob_choice: to Balak
  chosen_spanish: a Balac
  alternatives_spanish:
  - a Balak
  lexicon: HALOT
  rationale: אֶל marca al destinatario del habla; en español se conserva con «a». Se usa «Balac» como forma castellana habitual del nombre propio.
- source_word: הֲלֹא
  english_pob_choice: Did ... not
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  - ¿No es cierto que ...?
  lexicon: HALOT
  rationale: La partícula interrogativa con negación espera respuesta afirmativa. En español, «¿No ...?» reproduce bien la fuerza retórica sin añadir contenido.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: HALOT
  rationale: «También» conserva la idea de adición enfática en un registro natural.
- source_word: מַלְאָכֶיךָ
  english_pob_choice: your messengers
  chosen_spanish: tus mensajeros
  alternatives_spanish:
  - tus enviados
  - tus embajadores
  lexicon: HALOT
  rationale: En este contexto humano y diplomático, מַלְאָךְ se refiere a mensajeros, no a seres celestiales. «Mensajeros» es la opción más amplia y clara en español.
- source_word: אֲשֶׁר שָׁלַחְתָּ אֵלַי
  english_pob_choice: whom you sent to me
  chosen_spanish: que enviaste a mí
  alternatives_spanish:
  - a quienes enviaste a mí
  - que tú enviaste a mí
  lexicon: HALOT
  rationale: La cláusula relativa especifica a los mensajeros. El dativo dirección/objetivo אֵלַי se conserva con «a mí»; se mantiene la relación personal del envío.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I speak
  chosen_spanish: hablé
  alternatives_spanish:
  - he hablado
  - he dicho
  lexicon: HALOT
  rationale: Aunque el verbo es perfectivo, en esta fórmula retrospectiva la referencia natural es pasada. «Hablé» preserva el vínculo con la cita que continúa en el versículo siguiente sin forzar un presente español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: El infinitivo introduce el contenido del discurso y continúa en el siguiente versículo; «diciendo» mantiene esa apertura formal.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] en el texto español. También se ajustó el verbo principal a una formulación española más natural para la frase retrospectiva del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Balaam» y «Balac» como formas transliteradas coherentes con el resto de la obra.
  - Se preservó la apertura de la cita con dos puntos y comillas para dejar claro que el discurso continúa en el versículo siguiente.
  - Se evitó «SEÑOR» u այլ sustitución teológica, ya que este versículo no contiene el nombre divino.
