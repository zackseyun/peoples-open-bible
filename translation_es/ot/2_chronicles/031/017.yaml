translation:
  language: es
  text: El registro genealógico de los sacerdotes fue según las casas de sus padres[a], y el de los levitas, desde los veinte años en adelante, en sus deberes, por sus divisiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Casas de sus padres" designa agrupaciones familiares y de linaje usadas para la organización oficial del servicio.'
    reason: cultural_note
lexical_decisions:
- source_word: הִתְיַחֵשׂ
  english_pob_choice: genealogical registration
  chosen_spanish: inscripción genealógica
  alternatives_spanish:
  - registro genealógico
  - inscripción por genealogía
  - los inscritos por genealogía
  lexicon: HALOT
  rationale: El verbo alude a quedar registrado por linaje en listas oficiales. En español, 'inscripción genealógica' conserva el sentido administrativo sin forzar un verbo finito que el hebreo omite por la construcción elíptica.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del culto
  - el sacerdocio
  lexicon: HALOT
  rationale: El término español más claro y directo para el grupo sacerdotal es 'sacerdotes'. 'Sacerdotes' comunica bien la clase ministerial sin alterar el referente del hebreo.
- source_word: לְבֵית אֲבוֹתֵיהֶם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: según las casas de sus padres
  alternatives_spanish:
  - según sus casas paternas
  - por sus casas de padres
  - según sus linajes paternos
  lexicon: HALOT
  rationale: '''Casas de sus padres'' preserva el valor técnico israelita de agrupación familiar/patrimonial. ''Según'' refleja la organización oficial implícita en la frase, sin reducirla a un mero dato doméstico.'
- source_word: וְהַלְוִיִּם
  english_pob_choice: and that of the Levites
  chosen_spanish: y la de los levitas
  alternatives_spanish:
  - y la inscripción de los levitas
  - y los levitas
  lexicon: HALOT
  rationale: La elipsis del hebreo continúa la idea de 'inscripción genealógica'. En español conviene explicitar el sustantivo elidido para mantener el paralelismo sin agregar contenido ajeno.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וּלְמָעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años y más
  alternatives_spanish:
  - desde los veinte años y en adelante
  - a partir de los veinte años
  - desde los veinte años hacia arriba
  lexicon: HALOT
  rationale: La fórmula temporal es idiomática y establece un umbral de edad. 'Y más' reproduce bien el alcance inclusivo de וּלְמָעְלָה en español natural y sobrio.
- source_word: בְּמִשְׁמְרוֹתֵיהֶם
  english_pob_choice: in their duties
  chosen_spanish: en sus deberes
  alternatives_spanish:
  - en sus cargos
  - en sus turnos de servicio
  - en sus vigilias
  lexicon: HALOT
  rationale: El sustantivo puede denotar responsabilidad, cargo o servicio asignado. 'Deberes' transmite el sentido funcional amplio y evita limitarlo indebidamente a vigilias literales.
- source_word: בְּמַחְלְקוֹתֵיהֶם
  english_pob_choice: by their divisions
  chosen_spanish: por sus divisiones
  alternatives_spanish:
  - según sus divisiones
  - en sus divisiones
  - por sus turnos
  lexicon: HALOT
  rationale: '''Divisiones'' expresa las unidades organizadas de servicio. La preposición ''por'' conserva la idea de distribución/ordenación administrativa sin sonar rígida en español.'
translation_notes:
  revision_awareness: La versión inglesa revisada afinó la clausula final de 'by their duties in their divisions' a 'in their duties by their divisions' para reflejar mejor la doble relación de בְּמִשְׁמְרוֹתֵיהֶם y בְּמַחְלְקוֹתֵיהֶם. La redacción española mantiene esa doble marcación con 'en sus deberes, por sus divisiones'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando el pasaje no lo requiere explícitamente; aquí no aparece el nombre divino.
  - Se usa 'sacerdotes' y 'levitas' como equivalentes directos y consistentes con la terminología bíblica española general.
  - '''Inscripción genealógica'' preserva el tono administrativo y evita una paráfrasis devocional.'
  - La puntuación refleja la coordinación elíptica del hebreo y conserva el paralelismo de las dos clases de servicio.
