translation:
  language: es
  text: 'Y él dijo[a]: «Mi presencia irá, y yo te daré descanso».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Mi rostro irá». La expresión significa «mi presencia irá», es decir, que Yahvé mismo acompañará al pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce discurso directo. «Y él dijo» conserva la secuencia hebrea sin añadir una matiz temporal más fuerte que el texto no exige.
- source_word: פָּנַי
  english_pob_choice: My presence
  chosen_spanish: mi presencia
  alternatives_spanish:
  - mi rostro
  - yo mismo
  lexicon: HALOT
  rationale: Aunque literalmente es «mi rostro», en este contexto la expresión idiomática señala la presencia personal de Yahvé acompañando a su pueblo. «Mi presencia» es natural en español y preserva el sentido covenantal sin borrar la imagen de fondo.
- source_word: יֵלֵכוּ
  english_pob_choice: will go
  chosen_spanish: irá
  alternatives_spanish:
  - irán
  lexicon: HALOT
  rationale: 'El verbo concuerda en plural con פָּנַי en hebreo, pero en español la referencia idiomática «mi presencia» funciona naturalmente como sujeto singular. Por eso se usa singular: «irá».'
- source_word: וַהֲנִחֹתִי
  english_pob_choice: and I will give you rest
  chosen_spanish: y yo te daré descanso
  alternatives_spanish:
  - y te haré descansar
  - y te causaré descanso
  lexicon: HALOT
  rationale: El hifil de נוח tiene fuerza causativa. «Dar descanso» transmite bien esa idea en español y mantiene el tono promisorío y consolador del pasaje.
- source_word: לָךְ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El sufijo pronominal de segunda persona singular se expresa de forma natural con el objeto indirecto «te» en español.
theological_decisions:
- issue: La expresión antropomórfica פָּנַי aplicada a Yahvé
  english_pob_reading: My presence will go
  chosen_spanish_reading: Mi presencia irá
  alternative_spanish_readings:
  - Mi rostro irá
  - Yo mismo iré
  rationale: El hebreo usa «rostro/cara» como imagen de presencia personal. En español, «presencia» comunica mejor la promesa de acompañamiento divino sin reducirla a una abstracción. Se conserva la tensión imagética en la nota.
  doctrine_reference: Éxodo 33:14; filosofía de traducción POB sobre términos antropomórficos y presencia de Yahvé.
translation_notes:
  revision_awareness: El control de revisión indica que no hubo cambios en la última pasada y que el acuerdo con la auditoría inglesa es alto; por eso se mantiene la solución óptima ya aprobada, con la nota que preserva la alternativa literal «mi rostro».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en la nota para coherencia con la terminología del proyecto, aunque el versículo no nombra explícitamente el tetragrámaton en la superficie hebrea.
  - Se usa puntuación española de cita directa con comillas angulares.
  - Se evita «SEÑOR» como máscara terminológica, conforme a las directrices del proyecto.
