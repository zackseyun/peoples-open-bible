id: 1TI.6.14
reference: 1 Timothy 6:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τηρῆσαί σε τὴν ἐντολὴν ἄσπιλον ἀνεπίλημπτον μέχρι τῆς ἐπιφανείας τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/014.yaml
  text: that you keep the commandment unstained and above reproach until the appearing of our Lord Jesus Messiah[c][b][a],
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can function either as the translated title 'Messiah' or as the more name-like traditional form 'Christ.'
    reason: alternative_reading
  - marker: b
    text: The adjectives 'unstained' and 'above reproach' may describe either 'the commandment' itself or Timothy's keeping of it; the Greek wording is compact enough to leave that relation somewhat compressed in English.
    reason: lexical_alternative
  - marker: c
    text: Or 'that you keep the commandment unstained and above reproach'.
    reason: previous_rendering
translation:
  language: ko
  text: 그대는 우리 주 예수 메시아[a]의 나타나심까지 이 명령을 흠 없고 책망할 것이 없이[b] 지키십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「예수 그리스도」. 본 번역은 칭호의 무게를 살려 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 「흠 없고」 「책망할 것이 없이」는 「명령」 자체를 가리킬 수도, 디모데가 지키는 방식을 가리킬 수도 있다. 헬라어 구문은 그 관계를 압축적으로 둔다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τηρῆσαι ... τὴν ἐντολὴν
  english_pob_choice: keep the commandment
  chosen_korean: 이 명령을 ~ 지키십시오
  alternatives_korean:
