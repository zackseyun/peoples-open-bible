translation:
  language: es
  text: El león desgarraba[a] lo suficiente para sus cachorros y estrangulaba la presa para sus leonas; llenaba sus cuevas con presa[b] y sus guaridas con carne desgarrada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El león desgarraba lo suficiente para sus cachorros». El participio hebreo puede leerse con un sentido más continuo.'
    reason: lexical_alternative
  - marker: b
    text: «Carne desgarrada» también podría traducirse «presa» o «lo desgarrado». La traducción distingue este término del «presa» anterior para preservar la variación poética del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְיֵה
  english_pob_choice: The lion
  chosen_spanish: El león
  alternatives_spanish:
  - Un león
  lexicon: HALOT
  rationale: El sustantivo singular funciona de manera emblemática en la imagen de denuncia. El artículo definido en español conserva ese carácter representativo y visual.
- source_word: טֹרֵף
  english_pob_choice: tore enough
  chosen_spanish: desgarraba
  alternatives_spanish:
  - iba desgarrando
  - desgarraba lo suficiente
  - desgarraba para
  lexicon: HALOT
  rationale: El participio expresa una acción continua; en español, el imperfecto preserva bien ese valor aspectual sin forzar una paráfrasis excesiva.
- source_word: בְּדֵי
  english_pob_choice: enough
  chosen_spanish: lo suficiente
  alternatives_spanish:
  - suficientemente
  - lo necesario
  lexicon: HALOT
  rationale: La idea de suficiencia es explícita en el hebreo y conviene mantenerla en español para no perder el matiz cuantitativo.
- source_word: גֹּרוֹתָיו
  english_pob_choice: his cubs
  chosen_spanish: sus cachorros
  alternatives_spanish:
  - sus crías
  - sus lobeznos
  lexicon: HALOT
  rationale: En el cuadro del león, 'cachorros' es natural y claro en español, y comunica correctamente la referencia zoológica.
- source_word: וּמְחַנֵּק
  english_pob_choice: and strangled prey
  chosen_spanish: y estrangulaba presa
  alternatives_spanish:
  - y estrangulaba
  - y ahogaba presa
  - y sofocaba presa
  lexicon: HALOT
  rationale: El verbo חנק significa estrangular/ahogar. Se conserva esa fuerza verbal; 'presa' queda en español para sostener el paralelismo con el campo semántico de la cacería.
- source_word: לְלִבְאֹתָיו
  english_pob_choice: for his lionesses
  chosen_spanish: para sus leonas
  alternatives_spanish:
  - para sus lionesas
  - para sus hembras
  lexicon: HALOT
  rationale: '''Leonas'' es la forma natural en español y preserva el sentido zoológico femenino del hebreo.'
- source_word: וַיְמַלֵּא
  english_pob_choice: he filled
  chosen_spanish: llenaba
  alternatives_spanish:
  - llenó
  - y llenó
  lexicon: HALOT
  rationale: El wayyiqtol en poesía narrativa puede reflejarse con imperfecto o pretérito según el flujo. Aquí el imperfecto mantiene la escena descriptiva en curso.
- source_word: טֶרֶף
  english_pob_choice: prey
  chosen_spanish: presa
  alternatives_spanish:
  - botín
  - alimento
  lexicon: HALOT
  rationale: '''Presa'' conserva la imagen del animal cazado; también puede sugerir botín en el trasfondo del oráculo, pero el contexto inmediato favorece el sentido zoológico.'
- source_word: חֹרָיו
  english_pob_choice: his dens
  chosen_spanish: sus cuevas
  alternatives_spanish:
  - sus guaridas
  - sus madrigueras
  lexicon: HALOT
  rationale: '''Cuevas'' transmite bien la idea de guarida/abertura de animal, y suena natural en español poético.'
- source_word: וּמְעֹנֹתָיו
  english_pob_choice: his lairs
  chosen_spanish: sus guaridas
  alternatives_spanish:
  - sus moradas
  - sus refugios
  lexicon: HALOT
  rationale: '''Guaridas'' preserva el paralelo con la imagen depredadora y distingue este término del anterior sin introducir una diferencia excesiva.'
- source_word: טְרֵפָה
  english_pob_choice: torn flesh
  chosen_spanish: carne desgarrada
  alternatives_spanish:
  - carne despedazada
  - lo desgarrado
  - presa desgarrada
  lexicon: HALOT
  rationale: La expresión mantiene la variación poética respecto de 'presa' y expresa el resultado cruento de la acción de desgarrar, como en el audit trail en inglés.
theological_decisions:
- issue: Imagen metafórica del león para Asiria/Nínive
  english_pob_reading: Retained the literal lion imagery in the main text without explicating the political referent.
  chosen_spanish_reading: Se conserva la imagen literal del león en el texto principal sin explicitar el referente político.
  alternative_spanish_readings:
  - Parafrasear como si el rey de Asiria hubiera saqueado para los suyos.
  - Explicitar Nínive como referente en el texto.
  rationale: La poesía profética depende de la imagen del león; mantenerla respeta el paralelo hebreo y evita introducir interpretación explicativa en la traducción.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La versión anterior fue corregida para anclar todos los marcadores de nota en el texto español. Se evitó dejar notas sin referencia visible y se mantuvo la distinción poética entre 'presa' y 'carne desgarrada' conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'presa' para טֶרֶף y 'carne desgarrada' para טְרֵפָה para conservar la variación léxica.
  - Se usó 'leonas' para לְלִבְאֹתָיו y 'cachorros' para גֹּרוֹתָיו en registro natural y bíblico.
  - El imperfecto ('desgarraba', 'estrangulaba', 'llenaba') reproduce el tono descriptivo continuo del pasaje.
