    rationale: El inglés preserva explícitamente que el testigo hebreo de Masada parece tener una redacción distinta en esta línea. Esa transparencia textual debe conservarse también en español.
  - severity: low
    issue: «Se eleva» para זורחת es menos natural que «sale» en este contexto.
    rationale: Aunque fiel, «el sol sale» es una expresión más idiomática y directa en español, sin añadir el matiz de «brilla» que el audit trail retiró.
  revised_spanish_text: El sol sale sobre todo lo revelado[b][a], y la gloria del Señor está sobre todas sus obras.
