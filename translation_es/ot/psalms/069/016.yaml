  text: אַל תִּשְׁטְפֵ֤/נִי שִׁבֹּ֣לֶת מַ֭יִם וְ/אַל תִּבְלָעֵ֣/נִי מְצוּלָ֑ה וְ/אַל תֶּאְטַר עָלַ֖/י בְּאֵ֣ר פִּֽי/הָ־׀־־־׃
base_translation:
