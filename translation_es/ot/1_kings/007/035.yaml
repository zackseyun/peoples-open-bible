  to: Y en la parte superior del soporte había un borde redondo todo alrededor, de medio codo de alto; y en la parte superior del soporte, sus soportes[a] y sus paneles[b] eran de una sola pieza con él.
  rationale: Se corrigieron los anclajes de las notas al pie para que correspondan a las palabras que explican, y se cambió 'salientes' por 'soportes' para alinearlo mejor con la decisión léxica documentada del POB en este contexto arquitectónico.
