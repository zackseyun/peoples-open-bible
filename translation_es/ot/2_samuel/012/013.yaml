translation:
  language: es
  text: 'Entonces David dijo a Natán: «He pecado contra Yahvé». Y Natán dijo a David: «Yahvé también ha quitado tu pecado[a]; no morirás[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha apartado tu pecado». El hebreo literalmente dice «ha hecho pasar»; aquí el sentido es la remoción de la culpa.
    reason: lexical_alternative
  - marker: b
    text: O «no serás ejecutado». El hebreo simplemente dice «no morirás», sin explicitar que se trate de una pena capital, aunque el contexto legal puede implicarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: He pecado
  alternatives_spanish:
  - Pecé
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una confesión completa con relevancia presente; en español, «He pecado» comunica mejor ese valor confesional que un simple pretérito narrativo.
- source_word: לַיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - a Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Con חטא en contexto de confesión, la relación es de ofensa dirigida a Dios; «contra Yahvé» mantiene el valor relacional sin ocultar el nombre divino.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - ciertamente
  - incluso
  lexicon: HALOT
  rationale: «También» conserva la fuerza aditiva/enfática de גַּם sin exagerar la matización.
- source_word: הֶעֱבִיר
  english_pob_choice: has taken away
  chosen_spanish: ha apartado
  alternatives_spanish:
  - ha quitado
  - ha removido
  - ha hecho pasar
  lexicon: HALOT
  rationale: El verbo hiphil de עבר literalmente es «hacer pasar», y en este contexto significa remover la culpa. «Ha apartado» mantiene esa idea de retirar o alejar el pecado sin resolver indebidamente el mecanismo.
- source_word: חַטָּאתְךָ
  english_pob_choice: your sin
  chosen_spanish: tu pecado
  alternatives_spanish:
  - tu culpa
  - tu ofensa
  lexicon: HALOT
  rationale: Aquí el referente es el pecado confesado por David; «pecado» es la opción más directa y evita introducir una especificación no presente en el hebreo.
- source_word: לֹא תָמוּת
  english_pob_choice: you shall not die
  chosen_spanish: no morirás
  alternatives_spanish:
  - no morirás ciertamente
  - no serás muerto
  lexicon: HALOT
  rationale: El hebreo dice simplemente que no morirá; en español, el futuro directo «no morirás» suena natural y conserva el tono solemne y judicial.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton; la línea editorial española del proyecto pide «Yahvé» como forma principal para preservar el nombre de pacto sin máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
- issue: Naturaleza del perdón expresado por הֶעֱבִיר חַטָּאתְךָ
  english_pob_reading: Yahweh has taken away your sin
  chosen_spanish_reading: Yahvé también ha apartado tu pecado
  alternative_spanish_readings:
  - Yahvé también ha quitado tu pecado
  - Yahvé también ha removido tu pecado
  rationale: 'La frase comunica la remoción de la culpa/pecado sin explicar el medio de expiación. «Ha apartado» preserva la tensión teológica: el texto afirma el perdón y la remoción, pero no desarrolla el mecanismo.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Alcance de לא תמות
  english_pob_reading: you shall not die
  chosen_spanish_reading: no morirás
  alternative_spanish_readings:
  - no serás muerto
  - no morirás de muerte
  rationale: El hebreo no añade «serás ejecutado»; la traducción mantiene la declaración breve y judicial sin sobreinterpretarla, aunque el contexto sugiera pena capital evitada.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; la última pasada de revisión indicó que no había cambios necesarios y el control cruzado reportó alta concordancia.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - Se mantuvo «pecado» para חטאת en este contexto narrativo-confesional, sin trasladarlo a «culpa» en el texto principal.
  - La puntuación respeta la voz narrativa y el discurso directo con comillas españolas.
  - Las notas al pie preservan las alternativas léxicas documentadas sin duplicar marcadores.
