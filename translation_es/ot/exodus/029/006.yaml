translation:
  language: es
  text: Y pondrás el turbante sobre su cabeza, y pondrás la diadema santa[a] sobre el turbante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la corona santa». El hebreo נֵזֶר puede denotar un emblema consagrado semejante a una corona; se eligió «diadema» para reflejar una pieza ornamental sagrada llevada sobre el tocado sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתָּ
  english_pob_choice: And you shall place
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y colocarás
  - Y pondrás sobre
  lexicon: HALOT
  rationale: שׂים expresa 'poner/colocar'. En español, 'poner' es natural y fiel en una instrucción ritual. Se conserva el valor secuencial del hebreo con 'Y' y el futuro perifrástico simple en tono prescriptivo.
- source_word: הַמִּצְנֶפֶת
  english_pob_choice: the turban
  chosen_spanish: el turbante
  alternatives_spanish:
  - el tocado
  - la mitra
  lexicon: HALOT
  rationale: מִצְנֶפֶת designa el tocado sacerdotal para la cabeza. 'Turbante' comunica de forma clara un envoltorio o tocado de cabeza sin recurrir a 'mitra', que en español suena eclesiástico y menos transparente.
- source_word: עַל רֹאשׁוֹ
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  - encima de su cabeza
  lexicon: HALOT
  rationale: La preposición עַל indica colocación encima/de sobre. 'Sobre su cabeza' mantiene la imagen espacial concreta y suena natural en español.
- source_word: וְנָתַתָּ
  english_pob_choice: and put
  chosen_spanish: y pondrás
  alternatives_spanish:
  - y colocarás
  - y darás
  lexicon: HALOT
  rationale: נתן aquí es colocar físicamente un objeto. Se traduce con el mismo verbo español 'poner' para mantener la repetición funcional del mandato ritual.
- source_word: נֵזֶר הַקֹּדֶשׁ
  english_pob_choice: the holy diadem
  chosen_spanish: la diadema santa
  alternatives_spanish:
  - la santa diadema
  - la corona santa
  - la corona consagrada
  lexicon: HALOT
  rationale: נֵזֶר puede ser una corona, banda o insignia real/sagrada. 'Diadema' refleja mejor el objeto ornamental y distintivo. 'Santa' conserva הַקֹּדֶשׁ como cualidad consagrada sin convertirlo en una expresión más abstracta.
- source_word: עַל הַמִּצְנָפֶת
  english_pob_choice: on the turban
  chosen_spanish: sobre el turbante
  alternatives_spanish:
  - encima del turbante
  - sobre el tocado
  lexicon: HALOT
  rationale: Se conserva la repetición de עַל como 'sobre' para indicar la ubicación de la diadema encima del tocado sacerdotal.
translation_notes:
  revision_awareness: El inglés POB mantiene la distinción entre el 'turban' y la 'holy diadem' y explica en nota que נֵזֶר puede significar una corona consagrada o emblema tipo diadema. La versión española conserva esa distinción con 'turbante' y 'diadema santa', sin suavizar la tensión léxica entre corona/diadema/cinta real-sacra.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene 'diadema' para נֵזֶר siguiendo la equivalencia ornamental-sagrada del audit trail.
  - Se prefiere 'turbante' para מִצְנֶפֶת por claridad moderna y coherencia con la función sacerdotal del objeto.
