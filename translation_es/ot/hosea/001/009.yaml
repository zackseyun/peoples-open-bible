translation:
  language: es
  text: 'Y él dijo[a]: «Ponle por nombre No-Mi-Pueblo, porque ustedes no son mi pueblo, y yo no soy suyo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y yo no seré suyo»; muchos entienden aquí la fórmula de pacto en el sentido de «y yo no seré su Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: קְרָא שְׁמוֹ
  english_pob_choice: Call his name
  chosen_spanish: Llama su nombre
  alternatives_spanish:
  - Llámalo
  - Ponle por nombre
  lexicon: HALOT
  rationale: El hebreo conserva la fórmula profética de nombramiento; en español, «llama su nombre» resulta comprensible pero algo rígido, así que «Llama su nombre» mantiene la estructura sin perder naturalidad. No se reduce a una simple paráfrasis porque la acción de nombrar es parte del signo profético.
- source_word: לֹא עַמִּי
  english_pob_choice: Not-My-People
  chosen_spanish: No-mi-pueblo
  alternatives_spanish:
  - No-mi-gente
  - No mi pueblo
  lexicon: HALOT
  rationale: Se preserva el valor de nombre simbólico y el tono de ruptura del hebreo. La forma con guiones ayuda a que funcione como nombre propio, siguiendo el efecto retórico del original y la decisión inglesa de tratarlo como nombre significativo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del nombre simbólico. «Porque» expresa con claridad la relación causal sin añadir interpretación.
- source_word: אַתֶּם לֹא עַמִּי
  english_pob_choice: you are not my people
  chosen_spanish: ustedes no son mi pueblo
  alternatives_spanish:
  - vosotros no sois mi pueblo
  - ustedes no son mi propio pueblo
  lexicon: HALOT
  rationale: «Mi pueblo» conserva la fórmula de pacto y evita suavizarla. Se opta por «ustedes» por el registro neutral latinoamericano; el sentido corporativo/plural del hebreo queda claro.
- source_word: וְאָנֹכִי לֹא אֶהְיֶה לָכֶם
  english_pob_choice: and I am not yours
  chosen_spanish: y yo no seré para ustedes
  alternatives_spanish:
  - y yo no seré de ustedes
  - y yo no seré su Dios
  - y yo no soy de ustedes
  lexicon: HALOT
  rationale: El hebreo es elíptico y con eco de fórmula de pacto; no dice explícitamente «Dios». «Seré para ustedes» conserva la ambigüedad relacional y la tensión pactal mejor que una expansión doctrinal, a la vez que refleja el matiz futuro de אֶהְיֶה.
theological_decisions:
- issue: Reversión de la fórmula de pacto en la cláusula final
  english_pob_reading: The main text keeps the terse covenantal wording and avoids supplying 'God'; a footnote preserves the fuller covenantal understanding.
  chosen_spanish_reading: 'El texto principal mantiene la cláusula breve: «yo no seré para ustedes».'
  alternative_spanish_readings:
  - yo no seré su Dios
  - yo no seré de ustedes
  - no seré para ustedes
  rationale: El hebreo alude a la fórmula de pacto, pero no añade explícitamente «Dios». La traducción principal conserva esa tensión sin imponer una conclusión interpretativa en el cuerpo del texto. La nota puede explicar que muchos entienden aquí la ruptura del pacto en términos de la fórmula «yo seré su Dios» / «ustedes serán mi pueblo».
  doctrine_reference: Éxodo 6:7; Oseas 2:23; principios de fidelidad textual y no-expansión interpretativa
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del inglés POB, que prefirió una formulación breve y relacional en la cláusula final («I am not yours») en lugar de expandirla a «I will not be your God». El español refleja esa misma decisión, manteniendo la ambigüedad pactal y evitando sobreinterpretar el hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en el proyecto; aquí no aparece en el versículo, por lo que no se introduce.
  - Se conserva el plural «ustedes» para el hebreo plural, con registro neutral latinoamericano.
  - Se usa «pueblo» para עַם en coherencia con la fórmula de pacto y con el valor corporativo del término.
  - La puntuación con comillas y dos puntos sigue un estilo publicable y claro para discurso directo profético.
