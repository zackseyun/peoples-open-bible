translation:
  language: es
  text: Porque mis lomos[a] están llenos de ardor[b], y no hay sanidad en mi carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «flancos» o «caderas»; el término hebreo se refiere a la zona media del cuerpo, especialmente los lomos.
    reason: lexical_alternative
  - marker: b
    text: La palabra hebrea traducida «ardor» es difícil; también puede entenderse como «inflamación» o «quemazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduces la explicación causal o de fundamento del lamento. En español, «Porque» expresa con naturalidad el valor explicativo de כִּי sin sonar excesivamente literario.
- source_word: כְסָלַי
  english_pob_choice: my loins
  chosen_spanish: mis lomos
  alternatives_spanish:
  - mis flancos
  - mis caderas
  - mi parte baja de la espalda
  lexicon: HALOT
  rationale: «Lomos» conserva el registro bíblico y el referente corporal amplio de la zona media/abdominal-lumbar. Evita concretar indebidamente hacia caderas o espalda baja.
- source_word: מָלְאוּ
  english_pob_choice: are filled
  chosen_spanish: están llenos
  alternatives_spanish:
  - se han llenado
  - han quedado llenos
  lexicon: HALOT
  rationale: Expresa el estado resultante en español de modo natural y paralelo a la estructura predicativa del hebreo.
- source_word: נִקְלֶה
  english_pob_choice: burning
  chosen_spanish: ardor
  alternatives_spanish:
  - quemazón
  - inflamación
  - ardimiento
  lexicon: HALOT
  rationale: El hebreo es difícil y en este contexto físico puede aludir a quemazón o inflamación. «Ardor» mantiene la ambigüedad útil del original sin añadir explícitamente «llagas» o «heridas», que no están en el texto.
- source_word: וְאֵין
  english_pob_choice: and there is no
  chosen_spanish: y no hay
  alternatives_spanish:
  - y no existe
  - y carece de
  lexicon: HALOT
  rationale: La negación existencial queda bien reflejada con una fórmula breve y directa en español.
- source_word: מְתֹם
  english_pob_choice: soundness
  chosen_spanish: sanidad
  alternatives_spanish:
  - integridad
  - salud
  - entereza
  lexicon: HALOT
  rationale: En un contexto corporal, מְתֹם denota ausencia de lesión o enfermedad. «Sanidad» comunica esa idea en español contemporáneo y mantiene la correspondencia con el sufrimiento físico descrito.
- source_word: בְּשָׂרִי
  english_pob_choice: in my flesh
  chosen_spanish: en mi carne
  alternatives_spanish:
  - en mi cuerpo
  - en mi ser físico
  lexicon: HALOT
  rationale: Se conserva «carne» porque el hebreo habla literalmente del cuerpo/flesh, no de una metáfora antropológica; además, esta elección sigue la terminología bíblica usual y el valor físico concreto del término.
theological_decisions:
- issue: Valor de בשר en un contexto de enfermedad corporal
  english_pob_reading: literal physical 'flesh'
  chosen_spanish_reading: «carne» como referencia corporal literal
  alternative_spanish_readings:
  - «cuerpo»
  - «organismo»
  rationale: La estrofa describe una dolencia física concreta junto con los lomos y la falta de sanidad. No hay indicio de una acepción moral o teológica de la palabra; por eso se mantiene la concreción corporal.
  doctrine_reference: 'DOCTRINE.md: preservar el sentido corporal literal de σάρξ/בשר cuando el contexto lo exige.'
translation_notes:
  revision_awareness: 'La redacción española sigue el estado revisado del texto inglés: se evita añadir equivalentes como «llagas» o «heridas» que el hebreo no expresa explícitamente, y se conserva el tono sobrio del lamento corporal.'
  spanish_consistency_notes:
  - Se prefirió «lomos» para mantener una correspondencia bíblica reconocible y evitar una paráfrasis anatómica más extensa.
  - Se usó «carne» en sentido físico literal, coherente con el paralelismo del verso y con la política terminológica del proyecto.
  - «Ardor» mantiene la incertidumbre léxica del hebreo נִקְלֶה sin resolverla de forma excesivamente técnica.
