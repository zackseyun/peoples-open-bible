revisions:
- from: Pero tuve piedad de mi santo nombre[a], que la casa de Israel profanó entre las naciones adonde habían ido.
  to: Pero tuve consideración por mi santo nombre[a], que la casa de Israel profanó entre las naciones a donde habían ido.
  rationale: 'Se ajusta la cláusula principal a un español más natural y fiel al sentido contextual de חמל cuando el objeto es ''mi santo nombre'': no compasión sentimental hacia el nombre, sino consideración por su honor. También se corrige la nota para evitar ''preservé'', que no refleja tan bien el campo semántico documentado en la auditoría inglesa. No se requiere adjudicación adicional porque el ajuste es estilístico-lexical y está bien respaldado por el contexto inmediato.'
