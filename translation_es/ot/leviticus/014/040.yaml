revisions:
- from: Entonces el sacerdote mandará que saquen las piedras en las que está la infección[a], y las arrojarán fuera de la ciudad, a un lugar impuro.
  to: Entonces el sacerdote mandará que saquen las piedras en las que está la infección[a], y las arrojen fuera de la ciudad, a un lugar impuro.
  rationale: Se corrige la sintaxis española para que ambas acciones dependan de la orden del sacerdote, como en el hebreo procedural. Se conserva el resto del texto porque refleja bien el sentido fuente y la nota léxica auditada.
