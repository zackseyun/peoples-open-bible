review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: doble fórmula de אַשְׁרֵי, distinción entre «tus hombres» y «estos tus siervos», presencia continua ante el rey y escucha de su sabiduría. Sin embargo, «están siempre delante de ti» desplaza ligeramente la relación sintáctica del hebreo, donde תָּמִיד modifica de forma natural a «estar delante de ti» con matiz de continuidad regular; además, «siempre» puede sonar más absoluto que «continuamente».'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para mayor naturalidad y precisión formal. «Dichosos» funciona bien. «Tus siervos» es aceptable en contexto cortesano. La mejoría principal es sustituir «siempre» por «continuamente», que conserva mejor el registro y el matiz del original/POB inglés.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Siervos» es una excepción contextual justificada frente al valor por defecto «esclavo», porque aquí עֲבָדֶיךָ se refiere a oficiales/servidores de corte. «Tus hombres» preserva correctamente אֲנָשֶׁיךָ.
  issues:
  - severity: medium
    issue: «siempre» para תָּמִיד
    rationale: Aunque comprensible, «siempre» puede sugerir una absolutidad más fuerte. «Continuamente» preserva mejor el matiz de asistencia regular y el tono formal del inglés auditado.
  - severity: low
    issue: Ubicación/adherencia del adverbio en «están siempre delante de ti»
    rationale: No es incorrecto, pero «están delante de ti continuamente» refleja con más transparencia la secuencia hebrea y evita que «siempre» parezca modificar toda la escena de manera enfática.
  revised_spanish_text: ¡Dichosos tus hombres; dichosos estos tus siervos, que están delante de ti continuamente y oyen tu sabiduría!
