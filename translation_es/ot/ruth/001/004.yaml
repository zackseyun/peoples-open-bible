revisions:
- from: Y se tomaron para sí mujeres moabitas. El nombre de una era Orfa[a], y el nombre de la otra era Rut. Y habitaron allí unos diez años.
  to: Y tomaron para sí esposas moabitas. El nombre de una era Orfa[a], y el nombre de la otra era Rut. Y habitaron allí unos diez años.
  rationale: Se elimina el 'se' inicial para evitar una construcción antinatural en español, y se cambia 'mujeres moabitas' por 'esposas moabitas' para reflejar mejor el valor matrimonial del modismo hebreo y la decisión léxica del POB. Se conserva la estructura del resto del versículo y la nota de alternativa, con redacción editorialmente más limpia.
