translation:
  language: es
  text: 'Y se le dijo al rey de Jericó[a]: «Mira, han venido aquí esta noche unos hombres de entre los israelitas para explorar la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para espiar la tierra». El verbo hebreo puede llevar el sentido de buscar o investigar, y en este contexto se refiere a una exploración de reconocimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָמַר
  english_pob_choice: And it was said
  chosen_spanish: Y se le dijo
  alternatives_spanish:
  - Y dijeron
  - Y alguien dijo
  - Y se habló
  lexicon: HALOT
  rationale: El hebreo presenta una forma impersonal/pasiva de אמר sin agente explícito. En español, «se le dijo» conserva esa impersonalidad mejor que introducir un sujeto no presente en el texto.
- source_word: לְמֶלֶךְ יְרִיחוֹ
  english_pob_choice: to the king of Jericho
  chosen_spanish: al rey de Jericó
  alternatives_spanish:
  - al rey de Jericó
  - al monarca de Jericó
  lexicon: HALOT
  rationale: Es una construcción genitiva directa y el título político se expresa de forma natural y fiel como «rey de Jericó».
- source_word: לֵאמֹר
  english_pob_choice: introduced with quotation
  chosen_spanish: introducido por comillas directas
  alternatives_spanish:
  - diciendo
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como introductor de discurso; en español, la puntuación de cita directa comunica mejor esa función sin añadir palabras innecesarias.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - He aquí
  - Miren
  lexicon: HALOT
  rationale: La partícula llama la atención sobre una noticia urgente. «Mira» es claro y digno en español moderno, y conserva la fuerza deíctica sin arcaísmo excesivo.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - hombres
  - personas
  - varones
  lexicon: HALOT
  rationale: El término hebreo aquí refiere a varones concretos, coherente con el contexto narrativo de los exploradores. «Hombres» mantiene esa precisión mejor que una forma genérica.
- source_word: בָּאוּ הֵנָּה
  english_pob_choice: have come here
  chosen_spanish: han venido aquí
  alternatives_spanish:
  - han venido aquí
  - vinieron aquí
  - han llegado aquí
  lexicon: HALOT
  rationale: El perfecto expresa una llegada completada con relevancia presente. «Han venido» reproduce bien ese valor y suena natural en español.
- source_word: הַלַּיְלָה
  english_pob_choice: tonight
  chosen_spanish: esta noche
  alternatives_spanish:
  - esta noche
  - durante la noche
  - anoche
  lexicon: HALOT
  rationale: En el contexto narrativo se refiere a la noche en curso de la llegada. «Esta noche» es la equivalencia idiomática más clara.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the Israelites
  chosen_spanish: desde los israelitas
  alternatives_spanish:
  - de los israelitas
  - desde los israelitas
  - procedentes de los israelitas
  lexicon: HALOT
  rationale: La preposición hebrea aquí introduce procedencia/origen de movimientos narrativos. «Desde» conserva la dirección y evita sugerir una mera pertenencia partitiva como si fuera solo «de».
- source_word: לַחְפֹּר
  english_pob_choice: to search out
  chosen_spanish: para reconocer
  alternatives_spanish:
  - para explorar
  - para investigar
  - para reconocer la tierra
  lexicon: HALOT
  rationale: En este contexto militar/narrativo, el verbo se refiere a una exploración de reconocimiento. «Reconocer» expresa esa función de manera natural en español y mantiene la idea de exploración sin restringirla a la imagen de “espiar” como única opción.
- source_word: אֶת הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: «La tierra» es el equivalente estándar para הָאָרֶץ en este tipo de contexto territorial. Preserva el alcance del objeto de reconocimiento sin expandirlo interpretativamente.
translation_notes:
  revision_awareness: El texto español sigue el sentido del hebreo con una formulación impersonal equivalente a la de la voz pasiva/impersonal de וַיֵּאָמַר. También incorpora la revisión del POB inglés que ubica «desde los israelitas» después de la referencia temporal, pero en español se expresó de forma más natural como «desde los israelitas» después de «esta noche» dentro de la misma cláusula. Se mantuvo la alternativa lexical de «reconocer» con nota porque el hebreo permite el matiz de búsqueda/investigación además del de espionaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la serie POB cuando corresponda; aquí no aparece el Tetragrámaton.
  - Se prefirió «hombres» para אֲנָשִׁים por concordancia con el contexto narrativo y militar.
  - Se evitó «SEÑOR» como sustituto teológico, conforme al estándar del proyecto.
  - «Reconocer» se emplea como opción funcional de לַחְפֹּר en este contexto; la nota conserva la alternativa «espiar» para no borrar la tensión lexical documentada.
