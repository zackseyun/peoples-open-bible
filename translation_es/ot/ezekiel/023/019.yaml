translation:
  language: es
  text: Sin embargo, ella multiplicó sus prostituciones[a], al recordar los días de su juventud, cuando se prostituyó en la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y aumentó sus actos de prostitución».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּרְבֶּה
  english_pob_choice: Yet she multiplied
  chosen_spanish: Sin embargo, ella multiplicó
  alternatives_spanish:
  - Y ella aumentó
  - Entonces multiplicó
  lexicon: HALOT
  rationale: 'Rבה en este contexto conserva fuerza causal/intensiva: no solo ''fue más'', sino que ''multiplicó'' sus actos. ''Sin embargo'' comunica bien el giro adversativo que el inglés POB expresó con ''Yet'' dentro del flujo profético.'
- source_word: תַּזְנוּתֶיהָ
  english_pob_choice: her prostitutions
  chosen_spanish: sus prostituciones
  alternatives_spanish:
  - sus actos de prostitución
  - sus fornicaciones
  - sus prostituciones reiteradas
  lexicon: HALOT
  rationale: El plural hebreo apunta a actos repetidos; 'prostituciones' preserva esa pluralidad concreta y mantiene la fuerza metafórica del texto profético sin suavizarla.
- source_word: לִזְכֹּר
  english_pob_choice: remembering
  chosen_spanish: al recordar
  alternatives_spanish:
  - recordando
  - para recordar
  - mientras recordaba
  lexicon: HALOT
  rationale: El infinitivo constructo con ל admite un valor circunstancial; 'al recordar' suena natural en español y conserva la relación entre multiplicar y rememorar.
- source_word: יְמֵי נְעוּרֶיהָ
  english_pob_choice: the days of her youth
  chosen_spanish: los días de su juventud
  alternatives_spanish:
  - sus días juveniles
  - los días de su mocedad
  lexicon: HALOT
  rationale: La locución hebrea se vierte de forma bastante directa. 'Juventud' es idiomático en español y no estrecha innecesariamente el sentido como 'niñez' o 'mocedad'.
- source_word: אֲשֶׁר זָנְתָה
  english_pob_choice: when she prostituted herself
  chosen_spanish: cuando se prostituyó
  alternatives_spanish:
  - cuando cometió prostitución
  - cuando ejerció prostitución
  lexicon: HALOT
  rationale: El verbo זנה se mantiene con el mismo campo semántico que el inglés POB. En español, 'se prostituyó' expresa de manera directa la acción reflexiva requerida por el contexto metafórico.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en el país de Egipto
  lexicon: HALOT
  rationale: '''Tierra de Egipto'' reproduce la expresión bíblica y conserva el tono histórico-literario del hebreo.'
theological_decisions:
- issue: Metáfora profética sexual para idolatría e infidelidad del pacto
  english_pob_reading: Retain the prostitution language explicitly in English
  chosen_spanish_reading: Mantener explícitamente el lenguaje de prostitución
  alternative_spanish_readings:
  - Suavizar a 'infidelidades'
  - Suavizar a 'inmoralidades'
  rationale: Ezequiel usa una imagen deliberadamente chocante para describir la apostasía. Traducirla de forma directa en español evita atenuar el peso retórico y mantiene la tensión léxica y teológica del pasaje.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios; esta redacción sigue de cerca el texto hebreo y el juicio auditado del POB en inglés.
  spanish_consistency_notes:
  - Se conserva el lenguaje sexual metafórico sin eufemismos para no debilitar el paralelo profético.
  - '''Sin embargo'' transmite mejor el valor adversativo que un simple ''Y'' en este contexto narrativo-profético.'
  - '''Tierra de Egipto'' mantiene la formulación bíblica tradicional compatible con el hebreo.'
