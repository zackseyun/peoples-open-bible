  text: בְּ/מִרְעֶה טּוֹב֙ אֶרְעֶ֣ה אֹתָ֔/ם וּ/בְ/הָרֵ֥י מְרֽוֹם יִשְׂרָאֵ֖ל יִהְיֶ֣ה נְוֵ/הֶ֑ם שָׁ֤ם תִּרְבַּ֨צְנָה֙ בְּ/נָ֣וֶה טּ֔וֹב וּ/מִרְעֶ֥ה שָׁמֵ֛ן תִּרְעֶ֖ינָה אֶל הָרֵ֥י יִשְׂרָאֵֽל־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/034/014.yaml
  text: In good pasture I will pasture them[a], and on the high mountains of Israel their dwelling place will be. There they will lie down in a good dwelling place[b], and they will feed in rich pasture on the mountains of Israel.
  footnotes:
  - marker: a
    text: Or 'their habitation will be there'; the Hebrew noun can mean an abode or dwelling place as well as a pasture/grazing place.
    reason: lexical_alternative
  - marker: b
    text: Literally 'fat pasture.'
    reason: lexical_alternative
  ai_draft:
