translation:
  language: es
  text: Entonces los cinco hombres que habían ido a reconocer[a] la tierra subieron, llegaron allí y tomaron la imagen tallada, el efod, los dioses domésticos y la imagen fundida[b], mientras el sacerdote estaba de pie a la entrada del portón, con los seiscientos hombres armados con armas de guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘a espiar la tierra’. El hebreo usa un verbo de reconocimiento o exploración militar.
    reason: alternative_reading
  - marker: b
    text: 'Traducción tradicional: ‘la imagen de fundición’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - subieron allí
  - ascendieron
  lexicon: HALOT
  rationale: עלה expresa literalmente 'subir'. En español, 'subieron' conserva el movimiento ascendente sin sonar forzado; 'ascendieron' es posible pero más marcado y menos narrativo.
- source_word: הַהֹלְכִים לְרַגֵּל אֶת־הָאָרֶץ
  english_pob_choice: who had gone to spy out the land
  chosen_spanish: que habían ido a reconocer la tierra
  alternatives_spanish:
  - que habían ido a espiar la tierra
  - que iban a reconocer la tierra
  lexicon: HALOT
  rationale: רגל en este contexto militar y de reconocimiento comunica una misión de exploración hostil. 'Reconocer' reproduce bien esa función en español; 'espiar' es más fuerte, pero puede sonar demasiado moderno o peyorativo.
- source_word: בָּאוּ שָׁמָּה
  english_pob_choice: came there
  chosen_spanish: llegaron allí
  alternatives_spanish:
  - vinieron allí
  - entraron allí
  lexicon: HALOT
  rationale: La secuencia narrativa pide una expresión natural en español. 'Llegaron allí' conserva el sentido simple de arribar sin sobreespecificar una entrada que el hebreo no explicita.
- source_word: לָקְחוּ
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - se llevaron
  - agarraron
  lexicon: HALOT
  rationale: לקח es el verbo básico 'tomar'. 'Tomaron' es el equivalente directo; 'se llevaron' podría insinuar más claramente apropiación, pero altera un poco la forma verbal del hebreo.
- source_word: הַפֶּסֶל
  english_pob_choice: the carved image
  chosen_spanish: la imagen tallada
  alternatives_spanish:
  - el ídolo tallado
  - la imagen esculpida
  lexicon: HALOT
  rationale: פסל remite a una imagen hecha por talla. 'Imagen tallada' preserva la concreción del objeto fabricado sin introducir la lectura interpretativa de 'ídolo'.
- source_word: הָאֵפוֹד
  english_pob_choice: the ephod
  chosen_spanish: el efod
  alternatives_spanish:
  - el efod sacerdotal
  lexicon: HALOT
  rationale: אֵפוֹד es un término culturalmente específico que en español se translitera como 'efod'. Añadir 'sacerdotal' no está exigido por la palabra aquí.
- source_word: הַתְּרָפִים
  english_pob_choice: the household gods
  chosen_spanish: los dioses domésticos
  alternatives_spanish:
  - los terafines
  - los ídolos domésticos
  lexicon: HALOT
  rationale: The English POB opted for an interpretive rendering rather than transliteration. 'Dioses domésticos' comunica el sentido cultual del término sin perder la pluralidad ni domesticarlo en exceso. 'Ídolos domésticos' es posible, pero introduce una valoración más explícita.
- source_word: הַמַּסֵּכָה
  english_pob_choice: the cast image
  chosen_spanish: la imagen fundida
  alternatives_spanish:
  - la imagen vaciada
  - el ídolo fundido
  lexicon: HALOT
  rationale: מסכה alude a una imagen hecha por vaciado/fundición. 'Imagen fundida' refleja esa fabricación y sigue de cerca la decisión inglesa; 'molten image' en español sería más tradicional, pero menos natural.
- source_word: וְהַכֹּהֵן נִצָּב
  english_pob_choice: while the priest was standing
  chosen_spanish: mientras el sacerdote estaba de pie
  alternatives_spanish:
  - y el sacerdote estaba de pie
  - con el sacerdote de pie
  lexicon: HALOT
  rationale: La cláusula es circunstancial y simultánea. 'Mientras' expresa mejor la contemporaneidad de la acción en español que un simple 'y'.
- source_word: פֶּתַח הַשַּׁעַר
  english_pob_choice: at the entrance of the gate
  chosen_spanish: a la entrada de la puerta
  alternatives_spanish:
  - en la entrada de la puerta
  - junto a la puerta
  lexicon: HALOT
  rationale: פתח es 'entrada/apertura'. 'A la entrada de la puerta' mantiene la doble imagen hebrea, aunque en español sea algo redundante; se preserva así la estructura del texto fuente.
- source_word: וְשֵׁשׁ מֵאוֹת הָאִישׁ
  english_pob_choice: with the six hundred men
  chosen_spanish: con los seiscientos hombres
  alternatives_spanish:
  - y los seiscientos hombres
  lexicon: HALOT
  rationale: El ajuste preposicional es necesario en español para expresar compañía de forma idiomática. 'Con los seiscientos hombres' sigue la lectura contextual del inglés y del hebreo sin forzar la sintaxis.
- source_word: הֶחָגוּר כְּלֵי הַמִּלְחָמָה
  english_pob_choice: armed with weapons of war
  chosen_spanish: armados con armas de guerra
  alternatives_spanish:
  - ceñidos con armas de guerra
  - equipados para la guerra
  lexicon: HALOT
  rationale: חגור implica estar ceñido/equipado, pero el sentido final es militar. 'Armados con armas de guerra' suena natural en español y conserva la imagen bélica del conjunto.
theological_decisions:
- issue: הַתְּרָפִים como objetos cultuales domésticos
  english_pob_reading: the household gods
  chosen_spanish_reading: los dioses domésticos
  alternative_spanish_readings:
  - los terafines
  - los ídolos domésticos
  rationale: No se aplana el término a una mera ornamentación; se conserva su referencia a objetos/figuras de culto doméstico. 'Dioses domésticos' mantiene la carga religiosa que el contexto exige y corresponde a la decisión interpretiva inglesa.
  doctrine_reference: Ex 20:3-5; Jue 17:5; 18:20
- issue: הַמַּסֵּכָה como imagen fundida
  english_pob_reading: the cast image
  chosen_spanish_reading: la imagen fundida
  alternative_spanish_readings:
  - la imagen moldeada
  - el ídolo fundido
  rationale: Se preserva la diferencia entre una imagen tallada y otra hecha por fundición/vaciado. La traducción no disuelve esa tensión terminológica, importante para el lector atento al objeto cultual.
  doctrine_reference: Ex 32:4; Dt 9:16; Jue 17:3-4
- issue: La simultaneidad entre el saqueo y la presencia del sacerdote
  english_pob_reading: while the priest was standing
  chosen_spanish_reading: mientras el sacerdote estaba de pie
  alternative_spanish_readings:
  - y el sacerdote estaba de pie
  - con el sacerdote de pie
  rationale: La escena subraya que la acción ocurre sin oposición, en plena custodia ritual aparente. El adverbio 'mientras' conserva esa simultaneidad narrativa.
  doctrine_reference: Jue 18:17-18
translation_notes:
  revision_awareness: 'Se siguió la lectura estable del inglés POB y no hubo revisiones aplicadas en el expediente. La redacción española conserva las decisiones auditadas: reconocimiento militar de la tierra, objetos cultuales distintos, y la simultaneidad de la presencia del sacerdote con el traslado de los objetos.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' cuando el texto base lo requiera; aquí no aparece.
  - Se mantiene 'efod' como transliteración cultural específica.
  - Se preserva la distinción entre 'imagen tallada' y 'imagen fundida' para reflejar el paralelo hebreo.
  - '''Dioses domésticos'' sigue la interpretación inglesa de תרפים y no fuerza la transliteración.'
  - '''Armados con armas de guerra'' comunica el hebreo חגור + כלי המלחמה de forma natural en español.'
