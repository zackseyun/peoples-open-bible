translation:
  language: es
  text: Pero ojalá Dios hablara y abriera sus labios contigo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con usted» o «a usted». El hebreo usa la preposición literalmente «con», pero aquí el contexto puede sugerir una intervención dirigida a Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  - Pero bien
  lexicon: HALOT
  rationale: El hebreo marca un giro adversativo fuerte frente al reproche anterior. «Pero» es natural en español moderno y conserva el contraste sin volver la frase artificiosa.
- source_word: מִי יִתֵּן
  english_pob_choice: if only
  chosen_spanish: ojalá
  alternatives_spanish:
  - si tan solo
  - quién diera
  - oh, si
  lexicon: HALOT
  rationale: La expresión hebrea es un giro de deseo, no una pregunta literal. «Ojalá» comunica bien el matiz volitivo y funciona de manera digna en español bíblico contemporáneo.
- source_word: אֱלֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: El título singular divino se traduce de forma directa por «Dios». No hay base inmediata para expandirlo.
- source_word: דַּבֵּר
  english_pob_choice: would speak
  chosen_spanish: hablara
  alternatives_spanish:
  - hablase
  - hablara de hablar
  lexicon: HALOT
  rationale: 'Dentro del deseo introducido por מִי יִתֵּן, el español expresa naturalmente la acción deseada con subjuntivo imperfecto: «hablara».'
- source_word: וְיִפְתַּח
  english_pob_choice: and open
  chosen_spanish: y abriera
  alternatives_spanish:
  - y abriese
  - y abriera sus labios
  lexicon: HALOT
  rationale: Se conserva el verbo concreto «abrir» para reflejar el paralelismo hebreo y la imagen corporal del texto.
- source_word: שְׂפָתָיו
  english_pob_choice: his lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - su boca
  - sus labios
  lexicon: HALOT
  rationale: El hebreo dice específicamente «labios». Mantener esa imagen respeta la dicción antropomórfica del original.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - para contigo
  - contra ti
  lexicon: HALOT
  rationale: El contexto permite un matiz confrontativo, pero la revisión inglesa prefirió volver al valor más directo de la preposición. En español, «contigo» refleja la relación marcada por עִמָּךְ sin forzar una lectura interpretativa más fuerte que la del texto revisado.
theological_decisions:
- issue: Lenguaje antropomórfico aplicado a Dios
  english_pob_reading: Retained the anthropomorphic expression directly
  chosen_spanish_reading: Se conserva la imagen de Dios abriendo sus labios
  alternative_spanish_readings:
  - parafrasear como «hablara contigo»
  - suavizar a «te respondiera»
  rationale: El hebreo usa lenguaje corporal para la palabra divina. Mantenerlo en español respeta el texto y no implica una afirmación corporal literal sobre Dios, sino un modo bíblico de describir su habla.
  doctrine_reference: Translation philosophy §1, §6
- issue: Matiz de עִמָּךְ en el contexto
  english_pob_reading: Replaced 'against you' with 'with you' to reflect עִמָּךְ more accurately
  chosen_spanish_reading: «contigo»
  alternative_spanish_readings:
  - «contra ti»
  - «a ti»
  rationale: La revisión inglesa corrigió la interpretación confrontativa excesiva y devolvió el valor preposicional más directo. En español, «contigo» preserva esa cercanía gramatical sin imponer un sentido polémico no asegurado por la forma.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente, que prefirió el valor directo de עִמָּךְ como «with you» en vez de la lectura más interpretativa «against you». Por eso el español usa «contigo» y no una paráfrasis adversativa.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהַּ, sin ampliarlo.
  - Se conserva la imagen corporal de «abriera sus labios» para reflejar el hebreo.
  - El tono general es sobrio y bíblico, pero con sintaxis natural para español contemporáneo.
  - La nota al pie ofrece las alternativas más cercanas en español sin sobreinterpretar el contexto.
