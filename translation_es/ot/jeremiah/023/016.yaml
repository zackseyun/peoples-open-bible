review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del rastro POB: mantiene Yahvé, conserva la repetición profetas/profetizan, refleja que hablan una visión nacida de sí mismos y preserva la imagen concreta de ''la boca de Yahvé''. Sin embargo, hay dos puntos que conviene ajustar para mayor fidelidad y español natural: לָכֶם se oye más natural como ''a ustedes'' que ''para ustedes'' en este contexto de destinatario del discurso profético, y el pie de nota debe presentar alternativas idiomáticas en español; ''deludiendo'' no es una opción natural en español general.'
  spanish_quality_summary: El texto es claro y digno, pero 'ellos los están engañando' puede simplificarse a 'los engañan' para corresponder mejor al presente gnómico del hebreo y sonar menos pesado. 'No escuchen las palabras...' funciona bien. 'Hablan una visión de su propio corazón' es fiel aunque algo literal; sigue siendo inteligible y apropiado. El principal problema de calidad está en la nota, donde 'deludiendo' no es español natural y 'volviendo vanos' suena forzado.
  glossary_alignment: 'Está bien alineado con la terminología del proyecto: יהוה -> ''Yahvé'', צבאות -> ''de los ejércitos'' aceptable, לֵב -> ''corazón'', y se mantiene la imagen ''de la boca de Yahvé''. No hay problemas teológicos significativos.'
  issues:
  - severity: medium
    issue: '''para ustedes'' para לָכֶם suena menos natural que ''a ustedes'''
    rationale: Aquí el hebreo marca a los destinatarios de la profecía. En español eclesial y general, 'los profetas que profetizan a ustedes' es poco natural, pero 'que les profetizan' o 'que les hablan como profetas' sería más idiomático; manteniendo la estructura POB, 'que profetizan a ustedes' también suena torpe. La mejor reparación mínima es 'que les profetizan' o 'que profetizan para ustedes' sustituido por una forma más natural. Dado el borrador base, 'que profetizan a ustedes' no conviene; 'que les profetizan' preserva mejor el sentido.
  - severity: medium
    issue: La nota usa 'deludiendo', que no es lectura natural en español neutral
    rationale: El inglés 'deluding' no debe calcarsе como 'deludir'. En español bíblico neutral, las alternativas idiomáticas son 'engañando', 'extraviando', o la más formal 'los hacen vanos / los llenan de vanidad' con explicación. La nota actual no ayuda al lector porque ofrece una alternativa poco natural.
  - severity: low
    issue: Perífrasis progresiva innecesaria en 'ellos los están engañando'
    rationale: El hebreo participial/predicativo aquí caracteriza la acción de manera general. El presente simple 'los engañan' es más ágil y natural en español sin pérdida de sentido.
