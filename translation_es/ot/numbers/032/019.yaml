revisions:
- from: Porque no heredaremos con ellos más allá del Jordán y más lejos[a], pues nuestra herencia ha venido a nosotros del lado oriental del Jordán.
  to: Porque no heredaremos con ellos más allá del Jordán y más adelante, porque nuestra herencia ha venido a nosotros de este lado del Jordán, al este.[a]
  rationale: Se ajusta «más lejos» a «más adelante» para un español más natural y más fiel al matiz espacial de וָהָלְאָה. Se explicita «de este lado del Jordán, al este» para reflejar mejor la perspectiva geográfica del hebreo y del POB inglés. Se reemplaza la nota al pie por una alternativa léxica real para בָאָה en contexto de reparto de herencia.
