translation:
  language: es
  text: Y cualquiera que toque su cama[a] lavará su ropa y se bañará en agua, y quedará impuro hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su lugar donde yace» o «su ropa de cama»; el hebreo se refiere al lugar donde ella yace.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  english_pob_choice: And everyone
  chosen_spanish: Y cualquiera
  alternatives_spanish:
  - Y quienquiera
  - Y toda persona
  lexicon: HALOT
  rationale: כָּל con el participio introduce una afirmación general. «Cualquiera» conserva bien el alcance universal en español y suena natural en una norma legal.
- source_word: הַנֹּגֵעַ
  english_pob_choice: who touches
  chosen_spanish: que toque
  alternatives_spanish:
  - que toca
  - tocante a
  lexicon: HALOT
  rationale: El participio funciona de manera sustantiva y general. En español, la forma relativa con subjuntivo expresa adecuadamente el valor genérico e indefinido de la regla.
- source_word: בְּמִשְׁכָּבָהּ
  english_pob_choice: her bed
  chosen_spanish: su cama
  alternatives_spanish:
  - su lecho
  - su lugar de reposo
  - su lecho de reposo
  lexicon: HALOT
  rationale: En este contexto jurídico de pureza, מִשְׁכָּב denota el lugar donde ella yace. «Cama» es la opción más directa y comprensible; se mantiene la concreción del objeto regulado.
- source_word: יְכַבֵּס
  english_pob_choice: shall wash
  chosen_spanish: lavará
  alternatives_spanish:
  - deberá lavar
  - lavará sus ropas
  lexicon: HALOT
  rationale: כיבס se refiere a lavar prendas. «Lavará» transmite el mandato legal con naturalidad; el complemento siguiente aclara que el objeto son los vestidos.
- source_word: בְּגָדָיו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  - sus vestiduras
  lexicon: HALOT
  rationale: «Vestidos» conserva un registro digno y bíblico sin perder claridad. Es una forma amplia para prendas de vestir, adecuada al verbo כבס.
- source_word: וְרָחַץ בַּמַּיִם
  english_pob_choice: and bathe in water
  chosen_spanish: y se bañará en agua
  alternatives_spanish:
  - y se lavará en agua
  - y se bañará con agua
  lexicon: HALOT
  rationale: רחץ aquí describe el lavado del cuerpo en un rito de purificación. «Se bañará en agua» comunica ese sentido corporal mejor que un simple «lavarse», que podría sugerir solo la ropa.
- source_word: וְטָמֵא
  english_pob_choice: and he shall be unclean
  chosen_spanish: y quedará impuro
  alternatives_spanish:
  - y será impuro
  - y quedará inmundo
  lexicon: HALOT
  rationale: טמא expresa impureza ritual, no culpa moral. «Impuro» mantiene esa categoría ceremonial en español contemporáneo y evita cargar el término con connotaciones ajenas al contexto.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el anochecer
  - hasta la noche
  lexicon: HALOT
  rationale: La frase marca la duración de la impureza ritual. «Hasta la tarde» es clara y natural en español, aunque «anochecer» también sería posible según el matiz horario.
theological_decisions:
- issue: Lenguaje de impureza ritual
  english_pob_reading: Render טמא as ritual 'unclean' without importing moral guilt.
  chosen_spanish_reading: Renderizar טמא como «impuro» en sentido ritual, sin importar culpa moral.
  alternative_spanish_readings:
  - inmundo
  - contaminado
  - manchado
  rationale: Leviticus 15 trata de pureza ceremonial. «Impuro» conserva la categoría ritual y evita una lectura moralizante que el texto no exige.
  doctrine_reference: Preservar la tensión teológica del sistema de pureza levítico sin resolverla por medio de categorías morales posteriores.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal junto al término anotado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología base del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y también se evitó sustituir טמא por una palabra de connotación moral.
  - Se escogió un español bíblico moderno y legible, con estructura legal directa y sin calco excesivo del inglés.
