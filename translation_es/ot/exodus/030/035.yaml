translation:
  language: es
  text: Y la harás incienso[a], un perfume compuesto, obra de perfumista[b], salado[c], puro, santo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una mezcla aromática» o «un perfume compuesto». El hebreo destaca una preparación aromática cuidadosamente combinada.
    reason: lexical_alternative
  - marker: b
    text: O «mezclado por el arte de un perfumista» o «según el arte de un perfumista».
    reason: lexical_alternative
  - marker: c
    text: O «sazonado con sal» o «mezclado con sal».
    reason: lexical_alternative
  - marker: d
    text: O «sagrado». El hebreo dice simplemente «santo», no «santísimo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y la harás
  alternatives_spanish:
  - Y harás
  - Y la prepararás
  lexicon: HALOT
  rationale: En contexto instructivo/legal, el hebreo funciona como mandato. En español, «harás» conserva el tono directivo sin volver la frase pesada. Se mantiene el objeto femenino «la» porque remite a la mezcla/compuesto del versículo anterior.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la mezcla
  - eso
  lexicon: HALOT
  rationale: El objeto directo es femenino en hebreo y se refiere a la preparación aromática. En español conviene explicitarlo con el pronombre femenino «la» para conservar la referencia al compuesto.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - incensación
  - incienso sagrado
  lexicon: HALOT
  rationale: «Incienso» es el término natural y preciso en español para esta sustancia ritual. Evita una paráfrasis innecesaria y mantiene la referencia cultual.
- source_word: רֹקַח
  english_pob_choice: a perfume blended
  chosen_spanish: un perfume compuesto
  alternatives_spanish:
  - un perfume mezclado
  - una mezcla aromática
  lexicon: HALOT
  rationale: El sustantivo apunta a una preparación aromática cuidadosamente compuesta. «Perfume compuesto» conserva la idea de mezcla artesanal sin perder la fuerza nominal.
- source_word: מַעֲשֵׂה רוֹקֵחַ
  english_pob_choice: by the work of a perfumer
  chosen_spanish: por la obra de un perfumista
  alternatives_spanish:
  - por la obra de un perfumador
  - según el arte de un perfumista
  lexicon: HALOT
  rationale: La frase expresa el trabajo experto de quien compone aromas. «Perfumista» comunica bien el oficio en español moderno; «obra» refleja el sustantivo hebreo de fabricación/producción.
- source_word: מְמֻלָּח
  english_pob_choice: salted
  chosen_spanish: salado
  alternatives_spanish:
  - sazonado con sal
  - mezclado con sal
  lexicon: HALOT
  rationale: El participio pasivo se traduce de forma directa con «salado», que es breve y fiel. Las alternativas explicitan la acción de la sal, pero el sentido básico queda claro con la forma simple.
- source_word: טָהוֹר
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - ritualmente puro
  lexicon: HALOT
  rationale: En este contexto material y cultual, «puro» conserva la idea de pureza ritual/calidad sin añadir una glosa interpretativa excesiva.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - santo
  lexicon: HALOT
  rationale: Aunque el inglés POB traduce «holy», en español «santo» suena más natural para un objeto consagrado y evita la posible lectura demasiado abstracta de «sagrado». Mantiene la idea de separación para Dios sin sobretraducir como «santísimo».
theological_decisions:
- issue: Grado de santidad del incienso
  english_pob_reading: holy
  chosen_spanish_reading: santo
  alternative_spanish_readings:
  - sagrado
  - santísimo
  rationale: El hebreo dice simplemente קֹדֶשׁ, sin intensificador superlativo. «Santo» comunica la consagración sin importar una categoría más fuerte que la del texto.
  doctrine_reference: Preservar el sentido llano del texto sin introducir superlativos no presentes en el hebreo.
translation_notes:
  revision_awareness: 'Revisión actual sin cambios requeridos: el pasaje presenta alta concordancia con el audit trail inglés y ninguna revisión aplicada.'
  spanish_consistency_notes:
  - Se conservó el objeto femenino «la» para reflejar la referencia al compuesto aromático.
  - Se evitó «Señor» u otra sustitución cultual porque aquí no aparece el nombre divino.
  - Se mantuvo la distinción entre pureza material/ritual («puro») y consagración cultual («santo»).
  - Las notas de pie de página preservan alternativas reales del audit trail inglés sin duplicarlas en el texto principal.
