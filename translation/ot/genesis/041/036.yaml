id: GEN.41.36
reference: Genesis 41:36
source:
  edition: WLC
  text: וְ/הָיָ֨ה הָ/אֹ֤כֶל לְ/פִקָּדוֹן֙ לָ/אָ֔רֶץ לְ/שֶׁ֨בַע֙ שְׁנֵ֣י הָ/רָעָ֔ב אֲשֶׁ֥ר תִּהְיֶ֖יןָ בְּ/אֶ֣רֶץ מִצְרָ֑יִם וְ/לֹֽא תִכָּרֵ֥ת הָ/אָ֖רֶץ בָּ/רָעָֽב־׃
translation:
  text: That food shall be a reserve for the land for the seven years of famine that will be in the land of Egypt[c][b][a], so that the land may not be cut off by the famine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for storage' / 'a store' for לְפִקָּדוֹן.
    reason: lexical_alternative
  - marker: b
    text: Literally 'may not be cut off'; the sense is that the land/country would not be ruined or perish because of the famine.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the land for the seven years of famine'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְהָיָה
  chosen: shall be
  alternatives:
  - will be
  - is to be
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in this instructional/predictive context is best rendered futurally: Joseph is describing the intended result of the policy.'
- source_word: הָאֹכֶל
  chosen: that food
  alternatives:
  - the food
  - the grain
  lexicon: HALOT
  rationale: The noun means 'food' broadly. 'That food' points back to the produce gathered in the previous verse. 'Grain' is possible from context, but the Hebrew term itself is broader than a cereal-specific word.
- source_word: לְפִקָּדוֹן
  chosen: a reserve
  alternatives:
  - for storage
  - a store
  - a deposit
  lexicon: HALOT
  rationale: The noun denotes something kept in safekeeping or reserve. 'Reserve' is idiomatic modern English and fits the administrative context of storing produce against future need.
- source_word: לָאָרֶץ
  chosen: for the land
  alternatives:
  - for the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land/country of Egypt. 'Land' preserves the Hebrew term and also matches the repeated use later in the verse.
- source_word: לְשֶׁבַע שְׁנֵי הָרָעָב
  chosen: for the seven years of famine
  alternatives:
  - for seven years of famine
  - for the seven famine years
  lexicon: HALOT
  rationale: The construct phrase is naturally rendered 'the seven years of famine.' Including the article reflects the specific seven years already introduced in Pharaoh's dream and Joseph's interpretation.
- source_word: אֲשֶׁר תִּהְיֶיןָ
  chosen: that will be
  alternatives:
  - which shall come
  - that are coming
  lexicon: HALOT
  rationale: The relative clause points forward to the future occurrence of the famine years. 'That will be' is straightforward and natural.
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The fuller phrase preserves the Hebrew wording and echoes the repeated 'land' motif in the verse.
- source_word: וְלֹא תִכָּרֵת הָאָרֶץ
  chosen: so that the land may not be cut off
  alternatives:
  - and the land will not perish
  - so that the land may not perish
  - and the land may not be destroyed
  lexicon: HALOT
  rationale: The Niphal of כרת literally means 'be cut off.' In context it refers to the land/country not being wiped out or ruined by famine. Retaining 'cut off' preserves the Hebrew image while remaining intelligible.
- source_word: בָּרָעָב
  chosen: by the famine
  alternatives:
  - through the famine
  - because of the famine
  lexicon: HALOT
  rationale: The preposition marks the means or cause by which the land would be cut off. 'By the famine' is concise and natural.
