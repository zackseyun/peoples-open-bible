translation:
  language: es
  text: Caída[a], virgen Israel, no volverá a levantarse; abandonada sobre su propia tierra[b], no tiene quien la levante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no volverá a levantarse otra vez». El hebreo dice literalmente: «no añadirá volver a levantarse», un modismo de negación con sentido de irreversibilidad.'
    reason: lexical_alternative
  - marker: b
    text: «Virgen Israel» es una personificación poética de la nación, no una afirmación sobre estado sexual literal.
    reason: cultural_note
lexical_decisions:
- source_word: נָפְלָה
  english_pob_choice: Fallen
  chosen_spanish: Caída
  alternatives_spanish:
  - Ha caído
  - Cayó
  lexicon: HALOT
  rationale: El perfecto qal femenino singular presenta a Israel en estado resultante de caída; en español, «Caída» conserva el arranque abrupto y elegíaco del lamento, sin añadir sujeto explícito que el hebreo no verbaliza en primera posición.
- source_word: לֹא תוֹסִיף קוּם
  english_pob_choice: will not rise again
  chosen_spanish: no volverá a levantarse
  alternatives_spanish:
  - no se levantará otra vez
  - no volverá a alzarse
  lexicon: HALOT
  rationale: El hebreo expresa un idiomа de negación + verbo de 'seguir/volver a' + 'levantarse', con fuerza de finalidad. «No volverá a levantarse» comunica bien esa irreversibilidad en español y mantiene el vínculo con el campo semántico de קום.
- source_word: בְּתוּלַת יִשְׂרָאֵל
  english_pob_choice: virgin Israel
  chosen_spanish: virgen Israel
  alternatives_spanish:
  - la virgen Israel
  - doncella Israel
  lexicon: HALOT
  rationale: Se conserva la personificación poética/titular de la nación. «Virgen» reproduce el valor metafórico del término hebreo sin suavizarlo a «doncella», que debilitaría la imagen profética y la tensión retórica del pasaje.
- source_word: נִטְּשָׁה
  english_pob_choice: abandoned
  chosen_spanish: abandonada
  alternatives_spanish:
  - desamparada
  - dejada
  lexicon: HALOT
  rationale: El nifal perfecto comunica haber quedado abandonada/forsaken. «Abandonada» es natural y fiel al estado de indefensión que el hebreo presenta.
- source_word: עַל אַדְמָתָהּ
  english_pob_choice: on her own land
  chosen_spanish: sobre su propia tierra
  alternatives_spanish:
  - en su propia tierra
  - sobre su tierra
  lexicon: HALOT
  rationale: אַדְמָה aquí apunta a tierra/territorio nacional. «Su propia tierra» conserva el posesivo y la imagen de desolación; «sobre» refleja la postura/escena de estar tendida o dejada allí, cercana al giro del inglés POB y al cuadro hebreo.
- source_word: אֵין מְקִימָהּ
  english_pob_choice: she has no one to raise her up
  chosen_spanish: no tiene quien la levante
  alternatives_spanish:
  - no hay quien la levante
  - nadie la levanta
  lexicon: HALOT
  rationale: 'El hebreo usa אֵין + participio causativo con sufijo: no existe un restaurador/levantador para ella. «No tiene quien la levante» es idiomático en español y conserva la idea de impotencia total; además mantiene el juego con קום al repetir la noción de levantarse.'
theological_decisions:
- issue: Metáfora de 'virgen Israel' en un oráculo de juicio
  english_pob_reading: Retain the metaphor directly as 'virgin Israel' rather than interpretively softening it.
  chosen_spanish_reading: Conservar «virgen Israel» como personificación poética de la nación, sin convertirla en un término más genérico.
  alternative_spanish_readings:
  - la virgen Israel
  - doncella Israel
  - Israel, la joven
  rationale: El hebreo profético usa una imagen retórica de honor previo y vulnerabilidad en ruina. Mantenerla sin atenuación preserva la fuerza del lamento y evita borrar una tensión semántica documentada por el audit trail.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Finalidad del juicio en לֹא תוֹסִיף קוּם
  english_pob_reading: Express as 'will not rise again' in the main text.
  chosen_spanish_reading: 'Expresar la frase como una imposibilidad definitiva: «no volverá a levantarse».'
  alternative_spanish_readings:
  - no se levantará más
  - no volverá a levantarse otra vez
  rationale: La construcción hebrea transmite una caída decisiva en el contexto del lamento. La formulación elegida preserva esa finalización sin añadir elementos interpretativos ajenos al pasaje.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión más reciente del testigo inglés indica alta concordancia y no introdujo cambios. Esta versión española sigue de cerca el audit trail inglés, conservando el arranque de lamento, el valor metafórico de «virgen Israel», y la fuerza idiomática de la negación de levantarse.
  spanish_consistency_notes:
  - Se usa «tierra» para אַדְמָה en contexto nacional, no «suelo», por fidelidad al ámbito territorial.
  - Se conserva el paralelismo interno de «levantarse/levante» para reflejar el juego léxico con קום.
  - Se evita el calco excesivo y se mantiene un español bíblico moderno, digno y publicable.
