review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura enumerativa del hebreo y conserva correctamente los animales, la fórmula conclusiva y el patronímico. Sin embargo, «Y para el sacrificio de los sacrificios de paz» duplica innecesariamente la idea de sacrificio frente a וּלְזֶבַח הַשְּׁלָמִים, donde el segundo término es la categoría cultual; en español resulta más fiel y natural «y para el sacrificio de paz». Además, el hebreo/POB distingue el sexo en «male lambs», y el español puede preservarlo con «corderos machos de un año».
  spanish_quality_summary: La redacción es generalmente clara y digna, pero la apertura suena pesada y poco idiomática por la repetición «sacrificio de los sacrificios». El resto del inventario es legible; «dos cabezas de ganado» es aceptable, aunque algo técnico. La revisión propuesta mejora naturalidad y precisión sin parafrasear.
  glossary_alignment: No hay términos del glosario principal en juego como Yahvé/Mesías. La decisión cultual para שְׁלָמִים se alinea mejor como «sacrificio de paz» con nota de alternativas, en vez de «sacrificios de paz» dentro de una construcción duplicada. «Ofrenda» para קָרְבָּן y «carneros / machos cabríos» están bien alineados. Se recomienda preservar también el matiz masculino de כְּבָשִׂים con «corderos machos».
  issues:
  - severity: medium
    issue: Duplicación poco fiel en «el sacrificio de los sacrificios de paz»
    rationale: 'וּלְזֶבַח הַשְּׁלָמִים expresa una construcción nominal simple: «para el sacrificio de paz / de comunión», no una repetición de «sacrificios». La formulación actual suena torpe en español y sobretraduce la estructura.'
  - severity: medium
    issue: Se pierde el matiz masculino en «cinco corderos de un año»
    rationale: El audit trail inglés preserva explícitamente «male lambs», y en esta lista sacrificial conviene mantener esa especificación si el español lo permite naturalmente. «Cinco corderos machos de un año» lo conserva con claridad.
  revised_spanish_text: 'Y para el sacrificio de paz[a]: dos cabezas de ganado, cinco carneros, cinco machos cabríos y cinco corderos machos de un año. Esta fue la ofrenda de Ahira, hijo de Enán.'
  revised_footnotes:
  - marker: a
    text: También puede entenderse «ofrenda de comunión» u «ofrenda de bienestar» para «sacrificio de paz».
    reason: lexical_alternative
  revision_rationale: Se corrige la apertura para reflejar con más fidelidad y naturalidad la construcción hebrea, evitando la repetición impropia «sacrificio de los sacrificios». También se añade «machos» para conservar la precisión léxica presente en la decisión POB sobre כְּבָשִׂים. La nota se ajusta al singular para concordar con el texto revisado.
