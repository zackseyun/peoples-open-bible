theological_decisions:
- issue: Reference to Satan and spirits of wickedness in vv. 5–7
  chosen_reading: Translate the demonological language straightforwardly as part of the Greek witness.
  alternative_readings:
  - Demythologize as personified evil impulses
  - Treat as wholly secondary and bracket from translation
  rationale: The chapter's ethical warnings are intertwined with explicit supernatural agency. Transparency requires translating the witness as it stands, not reducing it to metaphor in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Messianic/soteriological figure in v. 10 arising from Judah and Levi
  chosen_reading: Render τὸ σωτήριον Κυρίου as 'the salvation of the Lord' and preserve the tribal duality in the main text.
  alternative_readings:
  - '''the Savior of the Lord'''
  - A fully harmonized messianic reading tied to later Christian formulations
  rationale: The Greek phrase is somewhat open-textured, and the Judah-Levi pairing is integral to this testament's logic. The translation preserves that ambiguity rather than forcing a narrower christological reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Likely interpolated or expanded eschatological material in vv. 10–13
  chosen_reading: Translate the core Greek text plainly, while noting bracketed expansions as textual variants rather than incorporating them into the main translation.
  alternative_readings:
  - Include all bracketed material in the main text
  - Excise the whole section as secondary
  rationale: The witness contains signs of textual complexity, but the translator's task is to render the text honestly and mark instability in notes rather than silently harmonizing or deleting.
