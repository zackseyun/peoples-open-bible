base_translation:
  language: en
  yaml_path: translation/ot/psalms/096/004.yaml
  text: For Yahweh is great and greatly to be praised[c][b][a]; he is to be feared above all gods.
  footnotes:
  - marker: a
    text: Or 'Because the LORD is great and very much praised.' The Hebrew participial expression is more literally 'praised very much,' rendered idiomatically here as 'greatly to be praised.'
    reason: lexical_alternative
  - marker: b
    text: Or 'awesome' / 'fearsome.' The Hebrew means that he inspires reverent fear; 'to be feared' preserves that force better than the weaker modern sense of 'awesome.'
    reason: lexical_alternative
  - marker: c
    text: '''Gods'' may refer to the nations'' deities; the following verse identifies them as worthless idols.'
    reason: cross_reference
