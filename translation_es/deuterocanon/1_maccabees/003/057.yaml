lexical_decisions:
- source_word: ἡ παρεμβολή
  english_pob_choice: the camp
  chosen_spanish: la tropa
  alternatives_spanish:
  - el campamento
  - el ejército
  lexicon: LSJ
  rationale: En este contexto narrativo, el sujeto colectivo es la fuerza militar en movimiento. «Tropa» comunica el conjunto armado de manera natural en español, sin perder el valor colectivo del griego. «Campamento» sería posible, pero en español sugiere más el lugar que el cuerpo que se desplaza.
- source_word: ἀπῆρεν
  english_pob_choice: set out
  chosen_spanish: partió
  alternatives_spanish:
  - se puso en marcha
  - salió
  lexicon: LSJ
  rationale: El verbo griego expresa que el grupo levanta el campamento y se mueve a otro lugar. «Partió» es breve, idiomático y conserva la idea de salir en marcha. «Se puso en marcha» explicita el movimiento, pero es más explicativo.
- source_word: παρενεβάλοσαν
  english_pob_choice: they encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - acamparon
  - levantó campamento
  lexicon: LSJ
  rationale: El verbo denota hacer campamento en sentido militar. Se eligió singular colectivo («la tropa ... acampó») para corresponder al sujeto colectivo griego ἡ παρεμβολή. «Acamparon» sería igualmente posible, pero la concordancia colectiva permite una redacción más fluida y cercana al griego como unidad militar.
- source_word: κατὰ νότον
  english_pob_choice: south of
  chosen_spanish: al sur de
  alternatives_spanish:
  - al lado sur de
  - hacia el sur de
  lexicon: LSJ
  rationale: La frase señala ubicación relativa, no solo dirección. «Al sur de» expresa de manera natural la relación espacial con Emaús y sigue la solución inglesa revisada para evitar una formulación más pesada.
- source_word: Ἀμμαούμ
  english_pob_choice: Emmaus
  chosen_spanish: Emaús
  alternatives_spanish:
  - Ammaum
  lexicon: LSJ
  rationale: Se adopta la forma española establecida «Emaús», equivalente convencional del topónimo griego. La nota mantiene visible la forma griega subyacente sin imponer una transliteración extraña al lector hispanohablante.
translation_notes:
  revision_awareness: El inglés auditado pasó de «to the south of Emmaus» a «south of Emmaus» para reflejar mejor κατὰ νότον; la versión española adopta directamente «al sur de» para conservar esa relación espacial con naturalidad.
  spanish_consistency_notes:
  - Se mantuvo el sujeto colectivo militar con verbo en singular («la tropa ... acampó») para reflejar el griego y lograr español fluido.
  - Se prefirió «Emaús» por convención española estándar; la nota conserva la relación con la forma griega Ἀμμαούμ.
  - No se introdujeron términos doctrinales ni explicaciones añadidas, ya que el versículo es narrativo y de desplazamiento militar.
