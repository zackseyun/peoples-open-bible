translation:
  language: es
  text: Sus caminos prosperan[a] en todo tiempo; tus juicios están en lo alto, fuera de su vista; en cuanto a todos sus adversarios, resopla contra ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «son firmes» o «permanecen firmes». El verbo hebreo es difícil; también se ha entendido en un sentido relacionado con retorcerse o sufrir dolor, pero el contexto favorece la idea de éxito o seguridad continuos.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «resopla contra ellos»; la imagen es la de una exhalación de desprecio.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָחִילוּ
  english_pob_choice: prosper
  chosen_spanish: prosperan
  alternatives_spanish:
  - son firmes
  - permanecen firmes
  - subsisten
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de entender el verbo en el sentido de éxito o seguridad continua. En español, «prosperan» comunica bien esa continuidad sin perder el matiz de bienestar aparente; «son firmes» sería posible, pero suena menos natural en este contexto poético.
- source_word: דַּרְכּוֹ
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - su camino
  - su conducta
  lexicon: HALOT
  rationale: El hebreo usa una forma singular colectiva que puede abarcar el modo de vida o la conducta de una persona. «Sus caminos» conserva el giro bíblico y funciona de forma natural en español.
- source_word: בְּכָל עֵת
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - en todo momento
  lexicon: HALOT
  rationale: La expresión indica continuidad. «En todo tiempo» mantiene un tono bíblico claro y evita hacer más idiomática de lo necesario la frase.
- source_word: מָרוֹם
  english_pob_choice: are on high
  chosen_spanish: están en lo alto
  alternatives_spanish:
  - están exaltados
  - están muy arriba
  lexicon: HALOT
  rationale: En relación con «tus juicios», el término expresa altura/remoción espacial. «Están en lo alto» conserva la metáfora y evita un giro demasiado interpretativo.
- source_word: מִשְׁפָּטֶיךָ
  english_pob_choice: your judgments
  chosen_spanish: tus juicios
  alternatives_spanish:
  - tu justicia
  - tus decretos
  lexicon: HALOT
  rationale: «Juicios» reproduce el campo judicial del hebreo y la decisión inglesa. «Justicia» sería posible, pero aquí el énfasis recae en los actos/decisiones judiciales de Dios.
- source_word: מִנֶּגְדּוֹ
  english_pob_choice: out of his sight
  chosen_spanish: fuera de su vista
  alternatives_spanish:
  - lejos de él
  - delante de él
  lexicon: HALOT
  rationale: La frase combina distancia espacial con desprecio práctico. «Fuera de su vista» transmite bien esa lejanía efectiva y el desinterés del impío, siguiendo la lectura inglesa.
- source_word: כָּל צֹרְרָיו
  english_pob_choice: all his adversaries
  chosen_spanish: todos sus adversarios
  alternatives_spanish:
  - todos sus enemigos
  - todos los que se le oponen
  lexicon: HALOT
  rationale: «Adversarios» refleja el registro poético y algo amplio del sustantivo, sin reducirlo sólo a «enemigos»; además armoniza con el español bíblico contemporáneo.
- source_word: יָפִיחַ בָּהֶם
  english_pob_choice: he snorts at them
  chosen_spanish: les resopla
  alternatives_spanish:
  - los desprecia
  - bufa contra ellos
  - se burla de ellos
  lexicon: HALOT
  rationale: El verbo en hebreo presenta una imagen corporal viva de exhalación despectiva. «Les resopla» conserva esa fuerza física en español mejor que una paráfrasis como «se burla de ellos».
theological_decisions:
- issue: Sentido del verbo inicial יָחִילוּ en relación con el estado del impío
  english_pob_reading: The wicked man's ways prosper continually.
  chosen_spanish_reading: Sus caminos prosperan en todo tiempo.
  alternative_spanish_readings:
  - Sus caminos son firmes en todo tiempo.
  - Sus caminos permanecen seguros en todo tiempo.
  - Sus caminos se retuercen en todo tiempo.
  rationale: La línea lamenta la aparente bonanza y arrogancia del impío. La traducción con «prosperan» conserva ese contraste teológico con la aparente distancia de Dios y el desprecio hacia sus opositores; las alternativas más literales son posibles, pero menos claras en el flujo del salmo.
  doctrine_reference: Salmo 10:5; lectura poética del aparente triunfo del impío
- issue: Relación entre la altura de los juicios de Dios y la ceguera moral del impío
  english_pob_reading: your judgments are on high, out of his sight
  chosen_spanish_reading: tus juicios están en lo alto, fuera de su vista
  alternative_spanish_readings:
  - tus juicios están muy altos, lejos de él
  - tus juicios están por encima de él y no los ve
  rationale: 'La distancia no es sólo física sino también moral: el impío actúa como si el juicio divino no le alcanzara. «Fuera de su vista» mantiene esa combinación de lejanía y desprecio.'
  doctrine_reference: Salmo 10:5; tema bíblico de la presunción del impío ante el juicio de Dios
- issue: La imagen verbal final de desdén
  english_pob_reading: he snorts at them
  chosen_spanish_reading: les resopla
  alternative_spanish_readings:
  - bufa contra ellos
  - los desprecia con un resoplido
  - les escupe el desprecio
  rationale: La elección preserva la rudeza corporal del hebreo, evitando suavizarla en un mero verbo de actitud. En un salmo de denuncia, esa concreción ayuda al lector a percibir el sarcasmo del impío.
  doctrine_reference: Salmo 10:5; retórica poética de desprecio
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la lectura de que el inicio describe prosperidad continua y no una mera firmeza abstracta; también conserva una nota de imagen corporal fuerte en el verbo final. La versión española sigue esas dos decisiones y no introduce una traducción más tradicional que borre la tensión lexical del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» sólo cuando aparezca el nombre divino explícito; aquí el versículo usa segunda persona y no requiere el nombre.
  - Se mantuvo el plural poético «sus caminos» para conservar la idiomática hebrea colectiva.
  - «Juicios» se eligió por el valor judicial del término, en línea con el registro del salmo.
  - Se conservó el tono poético sin añadir explicaciones interpretativas al texto principal.
