revisions:
- from: 'Mientras Obadías iba por el camino[a], he aquí que Elías le salió al encuentro. Cuando lo reconoció, se postró sobre su rostro y dijo: «¿Eres tú, mi señor Elías?»'
  to: 'Mientras Obadías iba de camino[a], he aquí que Elías lo encontró. Y cuando lo reconoció, cayó sobre su rostro y dijo: «¿Eres tú, mi señor[b] Elías?»'
  rationale: 'Se ajusta el español para mayor naturalidad y fidelidad al hebreo y al audit trail inglés: «de camino» reproduce bien בַּדֶּרֶךְ; «lo encontró» evita sobretrazar el movimiento; «cayó sobre su rostro» refleja mejor וַיִּפֹּל עַל פָּנָיו que la formulación previa poco idiomática. Además, se añade una nota en «mi señor» para preservar la aclaración léxico-teológica que el inglés POB documentó para אֲדֹנִי.'
