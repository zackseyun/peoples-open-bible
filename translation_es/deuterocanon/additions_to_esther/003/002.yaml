translation:
  language: es
  text: 'Y dijo: «Señor, Señor, Rey de todo dominio[a], porque todo está en tu poder, y no hay quien pueda oponerse a ti cuando deseas salvar a Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Rey de todos los dominios». La expresión griega puede abarcar toda forma de poder o gobierno, no solo reinos políticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: El vocativo κύριε funciona aquí como invocación reverente dirigida a Dios; en español, «Señor» conserva el valor de título divino y la fuerza litúrgica sin introducir una paráfrasis.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - ¡oh Señor!
  lexicon: BDAG
  rationale: La repetición del vocativo se mantiene como en el griego. En español, repetir «Señor» preserva la urgencia y la solemnidad de la plegaria.
- source_word: βασιλεῦ πάντων κρατῶν
  english_pob_choice: King of all dominion
  chosen_spanish: Rey de todo dominio
  alternatives_spanish:
  - Rey sobre todo poder
  - Rey de todos los dominios
  - Rey de toda potestad
  lexicon: LSJ
  rationale: «βασιλεῦ» se traduce con «Rey». La expresión «πάντων κρατῶν» apunta a la totalidad del dominio/soberanía, no solo a reinos políticos; «de todo dominio» conserva esa amplitud y sigue de cerca la revisión inglesa más reciente.
- source_word: ἐν ἐξουσίᾳ σου
  english_pob_choice: in your power
  chosen_spanish: en tu poder
  alternatives_spanish:
  - en tu autoridad
  - bajo tu autoridad
  lexicon: BDAG
  rationale: ἐξουσία puede significar autoridad o poder. Aquí, por el paralelismo con la soberanía real y por la decisión revisada del POB en inglés, «poder» expresa bien la capacidad soberana de Dios sin perder el matiz de dominio.
- source_word: τὸ πᾶν
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - el todo
  lexicon: LSJ
  rationale: El neutro singular τὸ πᾶν tiene valor totalizante. En español, «todo» es la forma más natural y completa para expresar la totalidad bajo el poder divino.
- source_word: ὁ ἀντιδρῶσων
  english_pob_choice: one who can oppose
  chosen_spanish: quien pueda oponerse
  alternatives_spanish:
  - quien pueda resistirte
  - quien pueda hacerte frente
  lexicon: LSJ
  rationale: El participio sustantivado expresa la imposibilidad de una resistencia efectiva. «Oponerse» comunica bien esa resistencia activa sin añadir más de lo que el griego dice.
- source_word: ἐν τῷ θέλειν σε
  english_pob_choice: when you desire
  chosen_spanish: cuando deseas
  alternatives_spanish:
  - cuando quieras
  - al querer tú
  lexicon: BDAG
  rationale: La construcción con infinitivo articular es circunstancial/temporal. «Cuando deseas» mantiene el sentido de voluntad divina y suena natural en español formal.
- source_word: σῶσαι τὸν Ἰσραήλ
  english_pob_choice: to save Israel
  chosen_spanish: salvar a Israel
  alternatives_spanish:
  - librar a Israel
  - rescatar a Israel
  lexicon: BDAG
  rationale: σῴζω puede traducirse como salvar o librar. Aquí «salvar» sigue de cerca el griego y el registro teológico de la oración.
theological_decisions:
- issue: Repetición del vocativo divino Κύριε, κύριε
  english_pob_reading: Lord, Lord
  chosen_spanish_reading: Señor, Señor
  alternative_spanish_readings:
  - ¡Señor, Señor!
  - Oh Señor, Señor
  rationale: Se conserva la repetición porque está en el texto griego y expresa reverencia e insistencia orante. No se suaviza ni se expande con añadidos interpretativos.
  doctrine_reference: 'DOCTRINE.md: κύριος se traduce por «Señor» en invocación divina; mantener la fuerza del texto fuente.'
- issue: Alcance de πάντων κρατῶν / κρατῶν
  english_pob_reading: King of all dominion
  chosen_spanish_reading: Rey de todo dominio
  alternative_spanish_readings:
  - Rey sobre todo dominio
  - Rey de todos los dominios
  - Rey de toda potestad
  rationale: La frase expresa soberanía universal más que un catálogo de reinos terrestres. «Todo dominio» conserva esa amplitud y evita restringir el sentido.
  doctrine_reference: 'DOCTRINE.md: preferir equivalencia óptima con primacía del original; no reducir la soberanía a reinos políticos.'
translation_notes:
  revision_awareness: Esta versión sigue la capa revisada del audit trail inglés, que ajustó «King over all powers» a «King of all dominion» y «in your authority» a «in your power». El español refleja esa revisión con «Rey de todo dominio» y «en tu poder», manteniendo la sobriedad formal y la cercanía al griego.
  spanish_consistency_notes:
  - Se usa «Señor» para Κύριε conforme al estándar POB para el vocativo divino.
  - Se evita «Cristo» o fórmulas eclesiásticas no presentes en el texto fuente.
  - «Poder» traduce ἐξουσία aquí por coherencia con la revisión inglesa y el contexto de soberanía.
  - «Salvar a Israel» conserva el objeto directo y el registro salvífico del griego.
  - La nota al pie marca la alternativa semántica de βασιλεύς + κρατῶν sin introducir terminología doctrinal ajena al pasaje.
