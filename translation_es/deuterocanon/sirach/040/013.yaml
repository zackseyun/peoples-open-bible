base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/040/013.yaml
  text: From force to force[a], like a perennial wadi, and from a mighty channel[c][b], with a crash of sounds.
  footnotes:
  - marker: a
    text: The Greek parallel reads, 'The wealth of the unjust will dry up like a river, and it will resound like a great thunder in rain.' This reflects a markedly different textual form from the surviving Hebrew.
    reason: alternative_reading
  - marker: b
    text: The Hebrew text of this line is difficult, and the Masada fragment for this verse is too incomplete to settle the wording securely; the translation follows the Cairo Geniza Hebrew while keeping the Greek parallel in view.
    reason: textual_variant
  - marker: c
    text: Or 'an ever-flowing stream.' Hebrew נחל often refers to a wadi or torrent-bed, and איתן suggests enduring or perennial flow.
    reason: lexical_alternative
