translation:
  language: es
  text: No tengas envidia de los hombres malvados[a][b], ni desees estar con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hombres de maldad».
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni desees estar en su compañía».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תְּ֭קַנֵּא
  english_pob_choice: Do not envy
  chosen_spanish: No tengas envidia
  alternatives_spanish:
  - No envidies
  - No sientas envidia de
  lexicon: HALOT
  rationale: קנא aquí expresa envidia ante la aparente prosperidad o posición de los malvados. En español, «tener envidia» comunica bien esa orientación deseante sin sonar forzado.
- source_word: בְּאַנְשֵׁי רָעָה
  english_pob_choice: evil men
  chosen_spanish: de los hombres malos
  alternatives_spanish:
  - de los hombres perversos
  - de los hombres malvados
  - de las personas malas
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «hombres de maldad/evil». Se conserva el masculino plural del original con «hombres», y «malos» comunica el rasgo moral de forma natural en español.
- source_word: וְאַל תתאו
  english_pob_choice: and do not desire
  chosen_spanish: ni desees
  alternatives_spanish:
  - y no desees
  - ni quieras
  - ni anheles
  lexicon: HALOT
  rationale: El segundo mandato negativo mantiene el paralelismo prohibitivo. «Ni desees» suena natural en español y conserva el sentido de querer o apetecer.
- source_word: לִהְיוֹת אִתָּם
  english_pob_choice: to be with them
  chosen_spanish: estar con ellos
  alternatives_spanish:
  - ser de ellos
  - hacer compañía con ellos
  - estar en su compañía
  lexicon: HALOT
  rationale: La frase hebrea apunta a presencia o asociación. «Estar con ellos» es una equivalencia clara y sobria que conserva la idea relacional sin añadir matiz interpretativo excesivo.
translation_notes:
  revision_awareness: 'El texto coincide sustancialmente con el audit trail inglés: se preserva el paralelismo de dos prohibiciones y la ambigüedad útil entre desear su compañía y desear participar de su modo de vida. No hubo revisiones sustantivas en el pase más reciente.'
  spanish_consistency_notes:
  - Se mantuvo el masculino explícito del hebreo («hombres») en lugar de neutralizarlo.
  - «No tengas envidia» reproduce la fuerza prohibitiva con español natural y digno.
  - La segunda cláusula conserva la posibilidad de asociación/compañía sin sobreexplicar el hebreo.
  - Se usó puntuación española estándar y paralelismo coordinado con «ni» para reflejar la doble prohibición.
