lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce el siguiente acontecimiento. En español, «Entonces» conserva la progresión narrativa de manera natural y digna, sin recurrir a un giro arcaico. El verbo «vino» completa la idea de movimiento hacia el destinatario implícita en la cláusula siguiente.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר יְהוָה, «palabra» preserva el valor técnico de comunicación divina y mantiene el peso teológico del idiomático hebreo. «Mensaje» explicita más de lo que el texto dice y atenúa la fórmula establecida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma estándar del proyecto en español, «Yahvé», en lugar de sustituirlo por un título. Esto mantiene la correspondencia con el hebreo y la transparencia del texto fuente.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - le
  lexicon: HALOT
  rationale: La preposición אֶל con sufijo de tercera persona masculina singular se expresa de forma directa con «a él». «Le» sería más natural en algunos contextos, pero aquí «a él» conserva con claridad la dirección del movimiento verbal.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo constructo introduce discurso directo; «diciendo» refleja de manera formal y transparente esa función. «Y dijo» desplazaría la relación sintáctica del hebreo y anticiparía una cláusula verbal que pertenece al verso siguiente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, por lo que el español debe conservar el nombre divino. Se adopta «Yahvé» por ser la forma terminológica del proyecto y por preservar la referencia al nombre propio revelado, no un título sustituto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés indica acuerdo alto y sin revisiones aplicadas; la redacción española sigue la misma lectura sin introducir cambios interpretativos nuevos.
  spanish_consistency_notes:
  - Se mantuvo la fórmula profética «la palabra de Yahvé» para conservar el registro técnico y la continuidad terminológica con otros pasajes.
  - Se evitó «SEÑOR» porque el proyecto exige una representación transparente del nombre divino.
  - «Entonces» y «diciendo» ofrecen un español natural sin perder la secuencia narrativa ni la apertura de discurso directo.
