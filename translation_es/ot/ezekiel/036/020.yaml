base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/036/020.yaml
  text: And when they came to the nations where they went[a], they profaned my holy name, in that people said of them, ‘These are the people of Yahweh[b], and yet they had to go out of his land.’
  footnotes:
  - marker: a
    text: Or, more literally, 'when it was said to them'; the sense in context is that this was said about them among the nations.
    reason: lexical_alternative
  - marker: b
    text: Or 'but they went out from his land.' The Hebrew implies the disgrace of exile without explicitly stating who drove them out.
    reason: lexical_alternative
