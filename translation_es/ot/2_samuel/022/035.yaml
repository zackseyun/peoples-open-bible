translation:
  language: es
  text: Él entrena mis manos para la batalla[a], y mis brazos pueden doblar un arco de bronce[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “para la guerra.”
    reason: lexical_alternative
  - marker: b
    text: O “mis brazos doblan un arco de bronce”, con el hebreo expresando que el arco se dobla bajo la fuerza que Dios da.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְלַמֵּד
  english_pob_choice: trains
  chosen_spanish: entrena
  alternatives_spanish:
  - enseña
  - instruye
  lexicon: HALOT
  rationale: El participio de למד comunica formación práctica, no solo enseñanza verbal. En este contexto marcial, “entrena” conserva la idea de preparación eficaz para el combate y suena natural en español.
- source_word: יָדַי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis manos
  - mis brazos
  lexicon: HALOT
  rationale: Se conserva la imagen corporal concreta del plural con sufijo de primera persona. “Manos” refleja mejor el paralelo con “brazos” y evita diluir el detalle físico.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  lexicon: HALOT
  rationale: מִלְחָמָה puede ser “guerra” o “batalla”. Aquí “batalla” suena más natural después de “entrena mis manos” y mantiene el sentido de combate sin sobredimensionar a una campaña bélica prolongada.
- source_word: וְנִחַת
  english_pob_choice: can bend
  chosen_spanish: pueden doblar
  alternatives_spanish:
  - pueden torcer
  - son capaces de doblar
  - se doblan
  lexicon: HALOT
  rationale: La POB inglesa capta el resultado como capacidad. En español, “pueden doblar” conserva la fuerza del verbo y evita una pasiva rígida, manteniendo la idea de acción habilitada por Dios.
- source_word: קֶשֶׁת
  english_pob_choice: a bow
  chosen_spanish: un arco
  alternatives_spanish:
  - un arco
  - un arco de tiro
  lexicon: HALOT
  rationale: En español, para el arma, “arco” es el equivalente natural de “bow”. Se evita “arco” en sentido ornamental por el contexto inequívoco de guerra.
- source_word: נְחוּשָׁה
  english_pob_choice: of bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - de cobre
  - broncíneo
  lexicon: HALOT
  rationale: “Bronce” es la opción más idiomática y probable para el arma, preservando la imagen de resistencia metálica. “De bronce” reproduce de modo natural el modificador hebreo.
- source_word: זְרֹעֹתַי
  english_pob_choice: my arms
  chosen_spanish: mis brazos
  alternatives_spanish:
  - mis brazos
  - mis antebrazos
  lexicon: HALOT
  rationale: Se conserva el plural corporal y el paralelismo con “manos”. “Brazos” es claro en español y mantiene la imagen de fuerza física dada por Dios.
theological_decisions:
- issue: Agencia divina en la capacidad militar
  english_pob_reading: The verse attributes David's military skill and strength to God without expanding it into a broader doctrinal claim about all warfare.
  chosen_spanish_reading: El versículo atribuye a Dios la habilidad y la fuerza militar de David, sin convertirlo en una afirmación doctrinal general sobre toda guerra.
  alternative_spanish_readings:
  - Una lectura espiritualizada como referencia a conflicto espiritual
  - Una formulación más general sobre Dios dando capacidad para cualquier lucha
  rationale: El contexto inmediato es un cántico real de gratitud por liberación y fortaleza en combate literal. La traducción preserva ese sentido histórico y no lo alegoriza más allá de lo que el texto muestra.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: La revisión más reciente no cambió el contenido base; se mantiene el acuerdo alto del control cruzado y no se requieren ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene el lenguaje corporal concreto (“manos”, “brazos”) para conservar el paralelismo hebreo.
  - Se optó por “batalla” y “arco” por naturalidad en español, sin perder el marco bélico del verso.
  - El sujeto explícito “Él” respeta la referencia a Dios en el contexto inmediato y evita ambigüedad en español.
