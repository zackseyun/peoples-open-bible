    rationale: No es un error de fidelidad grave, pero en este proyecto conviene alinear el español con la revisión auditada usando 'exalte' o equivalente, especialmente cuando la nota ya documenta esa opción.
  revised_spanish_text: Que mi lengua se pegue a mi paladar[a] si no te recuerdo, si no exalto a Jerusalén por encima de mi mayor alegría[b].
