revisions:
- from: Ahora Gedeón tuvo setenta hijos[a], sus propios descendientes, porque tenía muchas esposas.
  to: Ahora Gedeón tuvo setenta hijos varones[a], nacidos de él, porque tenía muchas esposas.
  rationale: Se ajusta בָּנִים a 'hijos varones' para preservar la especificidad masculina del hebreo y del POB inglés. Se reemplaza 'sus propios descendientes' por 'nacidos de él' para expresar mejor el idiomático יֹצְאֵי יְרֵכוֹ sin sonar demasiado amplio o redundante, manteniendo la alternativa literal en nota. La nota se pule levemente para mayor naturalidad en español.
