translation:
  language: es
  text: ¿Por qué me haces ver[a] la injusticia[b], y por qué contemplas la miseria? Destrucción[c] y violencia están frente a mí; la contienda surge, y el pleito se levanta[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me muestras» o «me dejas ver». El hebreo usa un causativo: no sólo ve, sino que hace que el profeta vea.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la iniquidad», «la maldad» o «el mal». El hebreo אָוֶן puede referirse a maldad o perversidad; aquí «la injusticia» expresa con claridad su sentido moral en este contexto.'
    reason: lexical_alternative
  - marker: c
    text: «Destrucción» también puede traducirse «devastación» o «saqueo».
    reason: lexical_alternative
  - marker: d
    text: 'O: «la contienda surge, y el pleito es levantado / estalla». El hebreo presenta el conflicto como algo que emerge y se alza o escala.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué motivo
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Es la interrogativa natural en español para una queja profética y conserva la forma directa del lamento.
- source_word: תַרְאֵנִי
  english_pob_choice: do you make me see
  chosen_spanish: me haces ver
  alternatives_spanish:
  - me muestras
  - me dejas ver
  lexicon: HALOT
  rationale: El hifil con sufijo de 1cs es causativo; 'me haces ver' preserva esa fuerza mejor que un simple 'me muestras'.
- source_word: אָוֶן
  english_pob_choice: wrongdoing
  chosen_spanish: el mal
  alternatives_spanish:
  - la injusticia
  - la maldad
  - la iniquidad
  lexicon: HALOT
  rationale: El término abarca maldad e iniquidad; 'el mal' es más amplio en español y encaja con el paralelismo profético, aunque deja abierta la tensión moral del hebreo.
- source_word: וְעָמָל
  english_pob_choice: trouble
  chosen_spanish: el afán
  alternatives_spanish:
  - la angustia
  - el agravio
  - el sufrimiento
  lexicon: HALOT
  rationale: עָמָל aquí denota opresión penosa o daño aflictivo. 'Afán' no se usa aquí en sentido de 'esfuerzo', sino como pena o fatiga dolorosa; aun así, puede sonar menos transparente, por lo que se mantiene sólo si el registro lo tolera. La alternativa más clara sería 'el agravio' o 'la angustia'.
- source_word: תַּבִּיט
  english_pob_choice: do you look at
  chosen_spanish: contemplas
  alternatives_spanish:
  - miras
  - observas
  - fijas la vista en
  lexicon: HALOT
  rationale: נבט implica mirar con atención o consideración. 'Contemplas' conserva el matiz de mirar fijamente y suena digno en español bíblico contemporáneo.
- source_word: שֹׁד
  english_pob_choice: Destruction
  chosen_spanish: Destrucción
  alternatives_spanish:
  - devastación
  - saqueo
  - ruina
  lexicon: HALOT
  rationale: En paralelo con violencia, 'destrucción' transmite bien el resultado de la opresión violenta y sigue de cerca la decisión inglesa revisada.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - injusticia violenta
  - agravio
  - violencia opresora
  lexicon: HALOT
  rationale: Es el término profético usual para violencia injusta; 'violencia' es claro y mantiene el paralelismo directo.
- source_word: לְנֶגְדִּי
  english_pob_choice: are before me
  chosen_spanish: están frente a mí
  alternatives_spanish:
  - están delante de mí
  - están ante mis ojos
  lexicon: HALOT
  rationale: La frase indica lo que se presenta ante el profeta. 'Frente a mí' es idiomático y conserva la imagen espacial sin volverla demasiado literal.
- source_word: וַיְהִי
  english_pob_choice: arises
  chosen_spanish: surge
  alternatives_spanish:
  - se levanta
  - aparece
  - brota
  lexicon: HALOT
  rationale: El wayyiqtol de היה expresa aparición o surgimiento del estado siguiente. 'Surge' comunica la emergencia del conflicto sin forzar una explicación.
- source_word: רִיב
  english_pob_choice: strife
  chosen_spanish: la contienda
  alternatives_spanish:
  - la disputa
  - el pleito
  - la querella
  lexicon: HALOT
  rationale: Puede tener sentido jurídico o social. 'Contienda' conserva el campo de enfrentamiento y el registro bíblico, sin reducirlo a una sola escena legal.
- source_word: מָדוֹן
  english_pob_choice: contention
  chosen_spanish: el pleito
  alternatives_spanish:
  - la disputa
  - la discordia
  - el conflicto
  lexicon: HALOT
  rationale: Aunque también puede solaparse con רִיב, 'pleito' permite mantener una distinción estilística en español y sugiere litigio/controversia, como en el hebreo paralelo.
- source_word: יִשָּׂא
  english_pob_choice: lifts itself up
  chosen_spanish: se levanta
  alternatives_spanish:
  - se alza
  - se eleva
  - brota
  lexicon: HALOT
  rationale: El verbo es literalmente 'ser llevado/levantado'. En este contexto, 'se levanta' conserva la imagen de algo que se alza o escala, y suena natural en español.
theological_decisions:
- issue: El lamento inicial puede sonar como reproche sobre la relación de Dios con el mal
  english_pob_reading: 'Retain the direct address and causative force: ''Why do you make me see ... and why do you look at ...'''
  chosen_spanish_reading: 'Mantener la queja directa: ''¿Por qué me haces ver... y por qué contemplas...?'''
  alternative_spanish_readings:
  - ¿Por qué me permites ver... y sólo observas...
  - ¿Por qué me muestras... y toleras...
  rationale: El hebreo interpela directamente a Dios y conserva una fuerza causativa en 'me haces ver'. El español debe mantener esa tensión sin suavizarla con explicaciones doctrinales ni convertir la queja en una simple observación neutral.
  doctrine_reference: Translation philosophy §3
- issue: Posible ambigüedad de 'el mal' frente a una traducción más moral/jurídica
  english_pob_reading: wrongdoing
  chosen_spanish_reading: el mal
  alternative_spanish_readings:
  - la iniquidad
  - la maldad
  - la injusticia
  rationale: '''El mal'' es suficientemente amplio para incluir la carga moral de אָוֶן sin cerrar indebidamente el alcance semántico. Se preserva así la tensión entre maldad, iniquidad y calamidad en el contexto profético.'
  doctrine_reference: Lexical precision in prophetic complaint
- issue: El final del versículo presenta el conflicto como algo que emerge o se alza
  english_pob_reading: strife arises, and contention lifts itself up
  chosen_spanish_reading: la contienda surge y el pleito se levanta
  alternative_spanish_readings:
  - la contienda nace y el pleito se alza
  - la contienda brota y el pleito se eleva
  rationale: 'Se conserva la dinámica verbal del hebreo: el conflicto no sólo existe, sino que irrumpe y se eleva. Esto mantiene el tono de escalada social sin resolver la imagen en términos meramente abstractos.'
  doctrine_reference: Source-driven metaphor preservation
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, especialmente el ajuste de 'strife arises' y 'contention lifts itself up' para reflejar con mayor cercanía וַיְהִי / יִשָּׂא. La versión española sigue esa misma dirección dinámica, pero con soluciones naturales en español ('surge' / 'se levanta') para no sobrecargar el texto con literalidad artificial.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino sólo cuando aparezca; este versículo usa una queja directa a Dios sin el Tetragrámaton explícito.
  - '''Contienda'' y ''pleito'' se distinguen para reflejar el paralelismo hebreo entre רִיב y מָדוֹן.'
  - Se evita 'SEÑOR' y otras sustituciones que oculten el referente original, conforme al marco del proyecto.
  - La construcción 'me haces ver' conserva el valor causativo del hifil.
  - La puntuación respeta el paralelismo y las dos preguntas del versículo.
