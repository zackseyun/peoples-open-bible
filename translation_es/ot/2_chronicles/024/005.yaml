translation:
  language: es
  text: 'Así que reunió a los sacerdotes y a los levitas, y les dijo: «Vayan a las ciudades de Judá y recojan plata[a] de todo Israel para reparar la casa de su Dios año tras año[b], y deben actuar con rapidez en este asunto». Pero los levitas no actuaron con rapidez.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dinero» por «plata». El hebreo usa «plata» como término concreto para una colecta monetaria.
    reason: lexical_alternative
  - marker: b
    text: O «fortalecer» la casa de su Dios; aquí el sentido es reparar o restaurar la estructura del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  english_pob_choice: he gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - agrupó
  lexicon: HALOT
  rationale: El verbo קבץ aquí toma personas como objeto directo; en español, «reunió» comunica de forma natural la acción de convocar y congregar a los sacerdotes y levitas sin perder el valor de ensamblar al grupo.
- source_word: הַכֹּהֲנִים וְהַלְוִיִּם
  english_pob_choice: the priests and the Levites
  chosen_spanish: los sacerdotes y los levitas
  alternatives_spanish:
  - los sacerdotes y los levitas del templo
  lexicon: HALOT
  rationale: Mantiene la distinción ministerial explícita del hebreo. «Levitas» es el término estándar y claro en español bíblico contemporáneo.
- source_word: צְאוּ לְעָרֵי יְהוּדָה
  english_pob_choice: Go out to the cities of Judah
  chosen_spanish: Salid a las ciudades de Judá
  alternatives_spanish:
  - Id a las ciudades de Judá
  - Salgan a las ciudades de Judá
  lexicon: HALOT
  rationale: El imperativo plural hebreo expresa desplazamiento hacia afuera; «salid» conserva esa fuerza direccional mejor que un simple «id».
- source_word: וְקִבְצוּ
  english_pob_choice: and collect
  chosen_spanish: recoged
  alternatives_spanish:
  - reunid
  - colectad
  lexicon: HALOT
  rationale: Con objeto monetario, קבץ se entiende como reunir fondos. «Recoged» es idiomático en español para solicitar aportes, sin introducir una paráfrasis excesiva.
- source_word: מִכָּל יִשְׂרָאֵל
  english_pob_choice: from all Israel
  chosen_spanish: de todo Israel
  alternatives_spanish:
  - de todos los israelitas
  - de todo el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la amplitud del hebreo. «Todo Israel» mantiene la tensión histórico-teológica que el Cronista suele preservar, sin restringir el alcance a Judá.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  lexicon: HALOT
  rationale: El hebreo dice literalmente «plata», usada como medio de pago. La POB inglesa preserva ese término concreto, y en español «plata» comunica bien la moneda/metal sin volverse oscuro.
- source_word: לְחַזֵּק אֶת בֵּית אֱלֹהֵיכֶם
  english_pob_choice: to repair the house of your God
  chosen_spanish: para reparar la casa de vuestro Dios
  alternatives_spanish:
  - para fortalecer la casa de vuestro Dios
  - para restaurar la casa de vuestro Dios
  lexicon: HALOT
  rationale: Aunque חזק significa literalmente «fortalecer», en contexto de construcción apunta a dejar firme, reparar o restaurar. «Reparar» sigue la decisión auditada de la POB inglesa y suena natural en español.
- source_word: מִדֵּי שָׁנָה בְּשָׁנָה
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - año por año
  - cada año
  lexicon: HALOT
  rationale: El giro hebreo indica repetición anual. «Año tras año» conserva el valor idiomático y mantiene un tono bíblico claro en español.
- source_word: וְאַתֶּם תְּמַהֲרוּ לַדָּבָר
  english_pob_choice: and you must act quickly in this matter
  chosen_spanish: y vosotros debéis apresuraros en este asunto
  alternatives_spanish:
  - y debéis daros prisa en este asunto
  - y vosotros debéis actuar con rapidez en este asunto
  lexicon: HALOT
  rationale: El mandato de מהר pide urgencia. «Apresuraros» refleja el verbo con suficiente cercanía y preserva el tono imperativo sin diluirlo en una formulación demasiado explicativa.
- source_word: וְלֹא מִהֲרוּ הַלְוִיִּם
  english_pob_choice: But the Levites did not act quickly
  chosen_spanish: Pero los levitas no se apresuraron
  alternatives_spanish:
  - Pero los levitas no actuaron con rapidez
  - Pero los levitas no se dieron prisa
  lexicon: HALOT
  rationale: Se mantiene la repetición del mismo campo verbal de מהר para reflejar el contraste discursivo del hebreo. «No se apresuraron» enlaza directamente con el mandato anterior.
theological_decisions:
- issue: Alcance de «todo Israel»
  english_pob_reading: Retain 'from all Israel' in the main text
  chosen_spanish_reading: «de todo Israel» se mantiene en el texto principal
  alternative_spanish_readings:
  - «de todos los israelitas»
  - «de todo el pueblo de Israel»
  rationale: El cronista puede usar «Israel» en sentido amplio y no solo como sinónimo de Judá. Mantener la forma literal preserva esa tensión histórica y teológica en lugar de resolverla por anticipado.
  doctrine_reference: Primacía del texto original; preservar tensiones canónicas sin armonización indebida.
translation_notes:
  revision_awareness: 'Se siguió la lectura inglesa auditada sin cambios de fondo: mantener «plata» para כֶּסֶף, reflejar el valor de חזק como reparación/fortalecimiento del templo, conservar «todo Israel» y la repetición de מהר en el cierre. No hubo revisiones posteriores en el expediente inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el Tetragrámaton aparece en la base hebrea; en este versículo no aparece.
  - «Sacerdotes» y «levitas» se mantienen como términos técnicos estables en la serie POB.
  - La puntuación intenta respetar el ritmo del hebreo con una sola cita directa y cierre narrativo breve.
  - Se prefirió «plata» por la concreción del término hebreo y la consistencia con la auditoría inglesa.
