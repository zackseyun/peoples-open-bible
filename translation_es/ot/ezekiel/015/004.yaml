review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: la madera es entregada al fuego, ambos extremos son consumidos, el centro queda quemado, y se plantea su inutilidad para trabajo. Sin embargo, hay varios puntos mejorables para alinearse más estrechamente con el hebreo y con el audit trail inglés: el verbo pasivo נִתַּן se expresa mejor con una forma pasiva más directa que ''se entrega''; el femenino ''de ella'' introduce un antecedente no presente en el versículo; y ''alguna obra'' no representa tan bien לִמְלָאכָה como ''algún trabajo'' u ''obra útil''.'
  spanish_quality_summary: 'El español es mayormente natural y legible, pero algunos giros suenan menos idiomáticos o menos precisos de lo deseable: ''ambos extremos de ella'' es algo forzado, ''su medio'' puede mejorarse a ''su parte de en medio'' o ''su centro'', y la nota [b] no corresponde al punto lexical real del hebreo, ya que נָחָר explica ''carbonizado/chamuscado'', mientras que ''útil para el trabajo'' pertenece a la cláusula final. También conviene ajustar la nota [a] para concordancia en español (''consumida'').'
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales son aceptables, pero para fidelidad y claridad conviene preferir 'es dado al fuego' o 'es entregado al fuego' y 'para algún trabajo' en vez de 'para alguna obra'.
  issues:
  - severity: medium
    issue: '''ambos extremos de ella'' añade un femenino contextual no explícito'
    rationale: El hebreo solo tiene sufijo masculino singular ('sus dos extremos'). En español, 'de ella' sugiere un antecedente femenino explícito que no está en el texto del versículo y suena algo rígido. 'Sus dos extremos' preserva mejor la referencia sin sobreespecificar.
  - severity: medium
    issue: La nota [b] está anclada en 'carbonizado' pero su contenido explica la cláusula final
    rationale: El texto de la nota [b] ('útil para el trabajo' / 'apto para la manufactura') corresponde a הֲיִצְלַח לִמְלָאכָה, no a נָחָר. Debe reubicarse al segmento final de la pregunta, o reemplazarse por una alternativa de 'carbonizado/chamuscado' si se mantiene en 'carbonizado'.
  - severity: medium
    issue: '''para alguna obra'' es menos preciso para לִמְלָאכָה'
    rationale: En este contexto se trata de utilidad práctica o trabajo/manualidad. 'Algún trabajo' reproduce mejor el sentido de 'for any work' y evita que 'obra' se lea como construcción, obra artística o incluso 'obra' en sentido abstracto.
  - severity: low
    issue: '''se entrega'' suaviza el pasivo terso de נִתַּן'
    rationale: No es incorrecto, pero 'es dado' o 'es entregado' se acerca más al pasivo hebreo y al tono sentencioso del versículo.
  - severity: low
    issue: La nota [a] usa 'consumido' en masculino
    rationale: Si la alternativa española presupone 'madera' o 'rama', la concordancia más natural en la nota es 'consumida'; mejor aún, formularla de manera impersonal para evitar ese problema.
  revised_spanish_text: Mira[a], es dado al fuego como combustible. El fuego ha consumido sus dos extremos, y su parte de en medio está carbonizada. ¿Será apto para algún trabajo?[b]
  revised_footnotes:
