  - marker: a
    text: 'Literalmente, ''la prisión sin hierro'': una imagen de confinamiento sin cadenas ni barrotes físicos.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'quedó bajo guardia' por 'fue puesto bajo guardia' para reflejar mejor ἐφρουρεῖτο y armonizar con el matiz custodial pasivo del original y del English POB. Se conserva 'prisión sin hierro' con nota, porque reproduce fielmente la metáfora llamativa de ἀσίδηρον εἱρκτήν en un español claro.
