translation:
  language: es
  text: Él reúne las aguas del mar como un montón[a]; pone los abismos[b] en depósitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un montículo»; algunos entienden «como una muralla» a la luz de imágenes semejantes del agua en otros pasajes.
    reason: lexical_alternative
  - marker: b
    text: O «las profundidades». El plural hebreo puede referirse a las grandes profundidades del océano o a las aguas abismales primordiales.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּנֵס
  english_pob_choice: gathers
  chosen_spanish: amontona
  alternatives_spanish:
  - reúne
  - junta
  - acumula
  lexicon: HALOT
  rationale: El participio qal expresa reunir o acumular en una acción descriptiva continua. «Amontona» preserva la imagen concreta y el movimiento poético del texto mejor que una opción más abstracta.
- source_word: כַּנֵּד
  english_pob_choice: like a heap
  chosen_spanish: como un montón
  alternatives_spanish:
  - como un montón de tierra
  - como un terraplén
  - como una muralla
  lexicon: HALOT
  rationale: נֵד designa un montón, montón acumulado o masa apilada; en este contexto de aguas, «como un montón» mantiene la metáfora sin forzar una explicación. Se evita «muralla» porque el audit trail inglés la trata solo como alternativa posible, no como lectura principal.
- source_word: מֵי הַיָּם
  english_pob_choice: the waters of the sea
  chosen_spanish: las aguas del mar
  alternatives_spanish:
  - las aguas del océano
  - las aguas del mar
  lexicon: HALOT
  rationale: La construcción de estado constructo se refleja de forma natural en español con «las aguas del mar». Conserva la imagen poética y la relación posesiva sin calco incómodo.
- source_word: נֹתֵן
  english_pob_choice: he puts
  chosen_spanish: pone
  alternatives_spanish:
  - coloca
  - pone
  - sitúa
  lexicon: HALOT
  rationale: El participio qal tiene sentido amplio de poner/colocar. «Pone» es breve, idiomático y mantiene el paralelismo verbal con «amontona».
- source_word: בְּאֹצָרוֹת
  english_pob_choice: in storehouses
  chosen_spanish: en depósitos
  alternatives_spanish:
  - en almacenes
  - en tesoros
  - en graneros
  lexicon: HALOT
  rationale: אֹצָר puede ser almacén, depósito o tesorería. En esta imagen cósmica, «depósitos» comunica bien la idea de receptáculos o reservorios sin introducir una connotación monetaria de «tesoros».
- source_word: תְּהוֹמוֹת
  english_pob_choice: the depths
  chosen_spanish: los abismos
  alternatives_spanish:
  - las profundidades
  - las profundidades marinas
  - los deeps
  lexicon: HALOT
  rationale: El plural de תְּהוֹם alude a las profundidades primordiales o marinas. «Los abismos» preserva la fuerza poética y la amplitud cosmogónica del término; «profundidades» sería más neutro, pero menos vigoroso.
theological_decisions:
- issue: Imagen cosmológica del control soberano de Dios sobre las aguas caóticas
  english_pob_reading: Retain the poetic imagery literally rather than naturalizing it into a scientific or merely metaphorical statement.
  chosen_spanish_reading: Conservar la imagen poética y concreta de las aguas amontonadas y los abismos guardados en depósitos, sin convertirla en una explicación abstracta.
  alternative_spanish_readings:
  - Él controla el mar
  - Él guarda los océanos
  - Él domina las aguas
  rationale: El versículo presenta la soberanía de Dios mediante imágenes materiales y cosmológicas. La traducción debe mantener esa tensión poética y no aplanarla en una afirmación general de control.
  doctrine_reference: Poética bíblica; soberanía divina sobre la creación
- issue: Valor del plural תְּהוֹמוֹת
  english_pob_reading: The Hebrew plural can refer to the great ocean depths or primeval deep waters.
  chosen_spanish_reading: 'Traducir el plural con una forma que conserve amplitud y profundidad: «los abismos».'
  alternative_spanish_readings:
  - las profundidades
  - las aguas abismales
  - los mares profundos
  rationale: «Abismos» en español mantiene la posibilidad de profundidades oceánicas y también el matiz primordial del hebreo plural, sin obligar a una sola interpretación técnica.
  doctrine_reference: Lexicografía hebrea; imaginería del תהום
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la solución inglesa auditada, sin cambios de sentido respecto a la última revisión; se mantiene la imagen poética literal y la ambigüedad léxica documentada para נֵד y תְּהוֹמוֹת.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió vocabulario concreto y bíblico («amontona», «depósitos», «abismos») para conservar el registro poético.
  - Se evitó «señor» o «majestad» como sustitutos interpretativos no presentes en el hebreo.
  - La puntuación con punto y coma refleja el paralelismo de dos cola poéticos.
