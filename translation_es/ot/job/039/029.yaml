translation:
  language: es
  text: Desde allí divisa el alimento; sus ojos miran desde lejos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ojos lo ven de lejos». El hebreo también puede entenderse de forma más dinámica para enfatizar que detecta su alimento a gran distancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁם
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - Desde ese lugar
  - Desde allá
  lexicon: HALOT
  rationale: La partícula marca el punto de observación o procedencia; «desde allí» conserva la referencia espacial natural y fiel del inglés POB sin volverla pesada.
- source_word: חָפַר
  english_pob_choice: spies out
  chosen_spanish: rastrear
  alternatives_spanish:
  - acechar
  - explorar
  - espiar
  lexicon: HALOT
  rationale: En este contexto el verbo no describe cavar literalmente, sino una búsqueda aguda de alimento a distancia. «Rastrear» comunica la idea de buscar cuidadosamente sin introducir una imagen demasiado técnica o demasiado moderna; «espiar» quedaría algo más interpretativo y «acechar» sugeriría caza encubierta.
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: el alimento
  alternatives_spanish:
  - comida
  - presa
  lexicon: HALOT
  rationale: «אֹכֶל» es un sustantivo amplio para alimento. En español, «el alimento» mantiene esa amplitud mejor que «presa», que ya estrecha el sentido zoológico, y resulta más formal que «comida».
- source_word: לְמֵרָחוֹק
  english_pob_choice: from far away
  chosen_spanish: desde lejos
  alternatives_spanish:
  - a lo lejos
  - desde una distancia
  lexicon: HALOT
  rationale: La expresión señala gran distancia. En español, «desde lejos» funciona con naturalidad junto al verbo de mirar y conserva el efecto visual del hebreo.
- source_word: עֵינָיו
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - los ojos de él
  lexicon: HALOT
  rationale: El plural con sufijo posesivo se mantiene de forma concreta en español; «sus ojos» preserva la imagen corporal y el sujeto singular implícito.
- source_word: יַבִּיטוּ
  english_pob_choice: look
  chosen_spanish: miran
  alternatives_spanish:
  - observan
  - ven
  - contemplan
  lexicon: HALOT
  rationale: El hiphil de נבט expresa una mirada dirigida. «Miran» es la forma más directa y natural en español para mantener el paralelismo con «sus ojos» sin cargar el verso de solemnidad extra.
translation_notes:
  revision_awareness: El borrador sigue la lectura revisada del POB inglés («spies out food») y conserva el paralelismo hebreo entre la acción de buscar y la mirada a distancia. Frente a la primera redacción inglesa más genérica («searches out»), se eligió en español un verbo que sugiera búsqueda visual aguda sin añadir elementos no presentes en el texto.
  spanish_consistency_notes:
  - Se mantuvo un español neutro, bíblico y publicable.
  - Se evitó traducir mecánicamente con «presa» para no cerrar el sentido del sustantivo hebreo más allá de lo que garantiza el contexto.
  - La imagen poética se conserva con dos miembros breves y paralelos, acorde con el hebreo.
