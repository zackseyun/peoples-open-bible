lexical_decisions:
- source_word: ἀπό
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - por medio de
  lexicon: BDAG
  rationale: Aquí ἀπό introduce la fuente o causa de la perturbación; en español, 'por' comunica de manera natural la idea causal sin forzar una construcción demasiado literal.
- source_word: ὁράσεως
  english_pob_choice: sight
  chosen_spanish: visión
  alternatives_spanish:
  - vista
  - sight
  lexicon: BDAG
  rationale: ὅρασις puede referirse a 'vista' o a una apariencia/visión. 'Visión' conserva bien el matiz de percepción mental o onírica en este contexto de sueños.
- source_word: πονηρῶν
  english_pob_choice: evil
  chosen_spanish: malos
  alternatives_spanish:
  - malvados
  - perversos
  - malignos
  lexicon: BDAG
  rationale: En español, 'malos' funciona como equivalente directo y natural dentro de la frase nominal 'sueños malos'. 'Malvados' o 'perversos' sonarían más personales que el sustantivo modificado aquí.
- source_word: ἐνυπνίων
  english_pob_choice: dreams
  chosen_spanish: sueños
  alternatives_spanish:
  - sueños oníricos
  - sueños-visions
  lexicon: BDAG
  rationale: ἐνύπνιον significa simplemente 'sueño'. 'Sueños' es la forma más natural y fiel en español; no hace falta ampliar con términos interpretativos.
- source_word: ταραχθήσεται
  english_pob_choice: will not be troubled
  chosen_spanish: no será perturbado
  alternatives_spanish:
  - no será turbado
  - no se inquietará
  - no será inquietado
  lexicon: BDAG
  rationale: El futuro pasivo de ταράσσω expresa agitación o perturbación interior. 'No será perturbado' preserva ese sentido y suena más cercano al pasivo griego que una reformulación puramente reflexiva.
translation_notes:
  revision_awareness: La redacción sigue el texto griego directamente y también toma en cuenta la revisión inglesa que eliminó el posesivo 'his'. Por eso no se introduce un posesivo en español.
  spanish_consistency_notes:
  - Se mantuvo 'visión' para reflejar ὁράσεως, pero se añadió 'de sueños malos' para que la construcción sea natural en español.
  - Se evitó 'SEÑOR' u otros equivalentes no pertinentes, ya que el versículo no contiene el nombre divino.
  - La pasiva 'no será perturbado' conserva la fuerza del griego mejor que una paráfrasis reflexiva.
