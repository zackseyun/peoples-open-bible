base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/003/004.yaml
  text: Have you not just now called to me[a], ‘My Father[b], you are the friend of my youth’?”
  footnotes:
  - marker: a
    text: Or 'guide of my youth.' The Hebrew אַלּוּף can denote a close associate, companion, or leader depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'from now on.' Here the phrase is taken to mean a recent appeal ('just now') rather than a future-oriented sense.
    reason: lexical_alternative
