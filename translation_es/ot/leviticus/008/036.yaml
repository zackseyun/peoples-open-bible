translation:
  language: es
  text: Aarón y sus hijos hicieron todo lo que Yahvé había mandado por medio de Moisés[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por la mano de Moisés», un modismo que significa «por medio de Moisés» o «por Moisés como mediador».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - cumplieron
  - realizaron
  lexicon: HALOT
  rationale: El hebreo עשה aquí resume la acción obediente de forma narrativa. En español, 'hicieron' conserva la sencillez y la relación directa con 'todas las cosas', sin añadir matices interpretativos.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: Nombres propios bíblicos estándar
  rationale: Se usa la forma española habitual del nombre propio, con tilde según la acentuación española.
- source_word: וּבָנָיו
  english_pob_choice: and his sons
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus hijos varones
  - y sus hijos
  lexicon: HALOT
  rationale: En contexto sacerdotal, בנים con sufijo se refiere a los descendientes masculinos de Aarón. 'Hijos' comunica naturalmente el parentesco; 'hijos varones' explicita el matiz, pero no es necesario porque el contexto ya lo determina.
- source_word: אֵת כָּל הַדְּבָרִים
  english_pob_choice: all the things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todas las palabras
  - todo
  lexicon: HALOT
  rationale: דברים puede significar 'palabras', 'asuntos' o 'cosas'. Aquí se trata de mandatos rituales obedecidos, por lo que 'cosas' mantiene la estructura hebrea y evita una paráfrasis excesiva. 'Palabras' sonaría menos natural en español.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - las cuales
  lexicon: Sintaxis española
  rationale: '''Que'' es la relativa más natural en español y reproduce la relación subordinante del hebreo sin rigidez.'
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - mandó
  lexicon: HALOT
  rationale: '''Mandado'' es un equivalente natural de צוה y conserva el tono de instrucción autoritativa. El pluscuamperfecto refleja bien que el mandato precede a la obediencia narrada.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: usar ''Yahvé'' en el texto principal, preservando el nombre divino en lugar de sustituirlo por un título.'
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - por Moisés
  lexicon: HALOT
  rationale: El hebreo 'por la mano de' es un modismo de mediación o agencia. 'Por medio de Moisés' comunica con claridad en español la función mediadora sin sonar literalista.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la política del proyecto, se conserva el nombre propio divino en español como 'Yahvé' para no ocultar la referencia personal del texto original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación mediadora en בְּיַד מֹשֶׁה
  english_pob_reading: through Moses
  chosen_spanish_reading: por medio de Moisés
  alternative_spanish_readings:
  - por la mano de Moisés
  - por Moisés
  rationale: La expresión hebrea puede leerse literalmente como 'por la mano de Moisés', pero en español esa forma suena marcada. 'Por medio de Moisés' mantiene la idea de mediación que el audit trail inglés ya explicó.
  doctrine_reference: Nota lexical-sintáctica del pasaje
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; se mantiene la decisión inglesa de traducir el modismo בְּיַד מֹשֶׁה como expresión de mediación, pero en español se opta por la forma natural 'por medio de Moisés' y se anota la literalidad hebrea en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar del proyecto en español.
  - Se conserva el paralelismo narrativo simple del hebreo sin añadir explicaciones interpretativas.
  - '''Hijos'' refleja el valor contextualmente masculino de בנים en este contexto sacerdotal.'
