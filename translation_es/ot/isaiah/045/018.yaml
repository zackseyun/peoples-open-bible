translation:
  language: es
  text: Porque así dice Yahvé[a], el que creó los cielos —él es Dios—, el que formó la tierra y la hizo; él la estableció; no la creó como desolación[b], sino para ser habitada; yo soy Yahvé, y no hay otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "Yahveh".
    reason: lexical_alternative
  - marker: b
    text: O "vacía", "para el caos" o "sin forma". El hebreo tohu puede denotar vacío, desolación o estado inhabitable; aquí el contraste con "para ser habitada" favorece "desolación".
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del texto hebreo, siguiendo la política POB de no ocultar el Tetragrámaton detrás de un título. 'Yahvé' es la forma española estable y auditable, más natural que el calco inglés y preferible a 'el SEÑOR', que sustituiría el nombre.
- source_word: בּוֹרֵא
  english_pob_choice: who created
  chosen_spanish: creador de
  alternatives_spanish:
  - el que creó
  - que creó
  lexicon: HALOT
  rationale: El participio hebreo funciona como atributo de YHWH. En español, 'creador de' mantiene el valor descriptivo y suena natural en una cláusula de identificación.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: Se preserva el plural hebreo y el registro cosmológico de Isaías. 'Los cielos' es la forma más transparente en español para la entidad plural del original.
- source_word: הוּא הָאֱלֹהִים
  english_pob_choice: he is God
  chosen_spanish: él es Dios
  alternatives_spanish:
  - él es el Dios
  - él es Dios solo
  lexicon: HALOT
  rationale: La cláusula identifica en forma enfática al Creador como Dios. 'Él es Dios' reproduce la fuerza appositiva sin añadir de manera prematura la exclusividad que el verso afirma al final.
- source_word: יֹצֵר
  english_pob_choice: who formed
  chosen_spanish: formador
  alternatives_spanish:
  - el que formó
  - que forma
  lexicon: HALOT
  rationale: Se conserva la distinción verbal con ברא. 'Formador' funciona como participio atributivo y mantiene la nuance de modelar o dar forma.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - la tierra/ el mundo
  lexicon: HALOT
  rationale: En este contexto de creación cósmica, 'la tierra' es el equivalente natural en español, equivalente funcional de 'the earth'.
- source_word: וְעֹשָׂהּ
  english_pob_choice: and made it
  chosen_spanish: y hacedor de ella
  alternatives_spanish:
  - y la hizo
  - y la hizo
  lexicon: HALOT
  rationale: Se preserva la serie participial de atributos del Creador con 'hacedor de ella', evitando saturar el verso con verbos finitos y manteniendo la paralelización con 'creador' y 'formador'.
- source_word: כּוֹנְנָהּ
  english_pob_choice: he established it
  chosen_spanish: la estableció
  alternatives_spanish:
  - la afirmó
  - la fijó
  lexicon: HALOT
  rationale: כון expresa establecer firmemente. 'La estableció' es idiomático en español y conserva la idea de dar firmeza/estabilidad a la tierra.
- source_word: תֹהוּ
  english_pob_choice: as a wasteland
  chosen_spanish: como un wasteland
  alternatives_spanish:
  - como un desierto
  - como una desolación
  - vacía
  lexicon: HALOT
  rationale: 'Aquí debe conservarse la tensión lexical documentada por la POB: el inglés optó por ''wasteland'' para expresar la finalidad no desolada del acto creador. Dado que ''wasteland'' no es español, se deja el término inglés entre comillas en el texto principal para no perder la decisión auditada y se marca como opción discutible en nota; las alternativas españolas siguen siendo posibles pero no captan tan bien la oposición con ''habitada'' en la misma línea.'
- source_word: לָשֶׁבֶת
  english_pob_choice: to be inhabited
  chosen_spanish: para ser habitada
  alternatives_spanish:
  - para habitarse
  - para que la habitaran
  lexicon: HALOT
  rationale: La forma infinitiva final expresa finalidad. 'Para ser habitada' transmite con claridad el propósito de la tierra sin añadir agentes no presentes en el hebreo.
- source_word: יְצָרָהּ
  english_pob_choice: formed it
  chosen_spanish: la formó
  alternatives_spanish:
  - la modeló
  - la hizo
  lexicon: HALOT
  rationale: Se retoma la raíz יצר para reforzar el paralelo con 'formador'. El español 'la formó' es fiel, directo y mantiene la repetición intencional del hebreo.
- source_word: וְאֵין עוֹד
  english_pob_choice: and there is no other
  chosen_spanish: y no hay otro
  alternatives_spanish:
  - y no existe otro
  - y no hay nadie más
  lexicon: HALOT
  rationale: Es la fórmula isaiana de exclusividad. 'Y no hay otro' es la solución más natural en español y conserva el alcance monoteísta del cierre.
theological_decisions:
- issue: Tratamiento del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se mantiene el nombre propio divino, en continuidad con la filosofía POB de transparencia textual. No se sustituye por una mayúscula reverencial, porque eso ocultaría el dato original y rompería la trazabilidad con el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de תֹהוּ en la afirmación creativa
  english_pob_reading: wasteland/desolation rather than 'formless'
  chosen_spanish_reading: wasteland (término conservado) con sentido de desolación/no habitable
  alternative_spanish_readings:
  - desolación
  - vacío
  - sin forma
  rationale: El pasaje contrasta la no-desolación con 'para ser habitada'. En español, 'sin forma' arrastraría demasiado el eco de Génesis 1:2 y diluiría la intención de Isaías. Por eso se conserva la tensión lexical mediante el término marcado y se explicita su sentido semántico en la nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy over translation tradition
- issue: Fuerza de הוּא הָאֱלֹהִים
  english_pob_reading: he is God
  chosen_spanish_reading: él es Dios
  alternative_spanish_readings:
  - él es el Dios
  - él solo es Dios
  rationale: La identificación enfática se expresa sin añadir 'solo' antes de tiempo. La exclusividad aparece explícitamente en el cierre del versículo, por lo que la traducción española conserva esa progresión argumentativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Revisión consciente del audit trail: se siguió la lectura inglesa auditada, pero se adaptó la sintaxis para que el español suene publicable y conserve el paralelismo participial del hebreo. No hubo cambios sustantivos respecto de la última pasada revisada; la única tensión relevante es la del término תֹהוּ, que se mantiene auditable con nota por su carga semántica.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma española del nombre divino, coherente con el estándar del proyecto.
  - Se mantiene la secuencia de participios/atributos ('creador', 'formador', 'hacedor') para reflejar la estructura hebrea.
  - No se introduce 'Cristo' ni terminología eclesiástica ajena al verso.
  - '''Los cielos'' y ''la tierra'' conservan el marco cósmico del hebreo sin localización indebida.'
  - La nota sobre תֹהוּ preserva la tensión semántica sin borrar la decisión de la POB inglesa.
