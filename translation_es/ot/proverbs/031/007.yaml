review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia jussiva del hebreo: ‘Beba, y olvide… y no recuerde más…’. ‘Su pobreza’ refleja fielmente רִישׁוֹ. El punto principal a corregir es la alineación entre el texto y la nota: la nota [a] está anclada en ‘pobreza’, pero el alternativo documentado corresponde a וַעֲמָלוֹ, no a רִישׁוֹ.'
  spanish_quality_summary: El español es claro y digno, pero ‘afán’ aquí suena algo ambiguo en español contemporáneo, pues puede sugerir empeño o diligencia más que ‘penuria/trouble’. ‘Sufrimiento’ o ‘pena’ serían más transparentes, pero para mantener el rango semántico del hebreo y la línea del English POB, conviene una base como ‘sufrimiento’ con nota alternativa a ‘trabajo’.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La revisión propuesta mantiene la fidelidad léxica y mejora la claridad del campo semántico de עָמָל.
  issues:
  - severity: high
    issue: La nota al pie está anclada en la palabra equivocada.
    rationale: La nota [a] explica alternativas para עֲמָלוֹ (‘su trouble/toil’), pero en el texto aparece después de ‘pobreza’, que corresponde a רִישׁוֹ.
  - severity: medium
    issue: ‘Afán’ no comunica con suficiente claridad el sentido contextual de עָמָל.
    rationale: Aunque lexicográficamente posible, en español general ‘afán’ suele entenderse como empeño o diligencia. Aquí el contexto pide algo más cercano a pena, sufrimiento o penuria.
  - severity: low
    issue: La nota incluye ‘dureza’, que no refleja tan bien las alternativas auditadas en inglés.
    rationale: El rastro de auditoría inglés habla de labor, hardship o misery. En español ‘penuria’ o ‘sufrimiento’ encajan mejor que ‘dureza’.
  revised_spanish_text: Beba, y olvide su pobreza, y no recuerde más su sufrimiento[a].
  revised_footnotes:
  - marker: a
    text: O ‘su trabajo’ para ‘su sufrimiento’; el hebreo puede referirse a labor, penuria o miseria.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al término correcto (עֲמָלוֹ) y se reemplaza ‘afán’ por ‘sufrimiento’ para reflejar mejor el contexto de alivio de la miseria, conservando en la nota la alternativa ‘trabajo’ que el hebreo también permite.
