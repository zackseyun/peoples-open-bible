    rationale: El hebreo es el nombre propio Beriah/Bería. «Berías» introduce una -s no apoyada por la forma fuente ni por la traducción inglesa auditada, y puede percibirse como otro nombre.
  - severity: medium
    issue: «familia» para מִשְׁפַּחַת en fórmula censal
    rationale: Aunque comprensible, «familia» es más amplio y menos preciso que «clan» para una subdivisión tribal. La decisión auditada inglesa justificó específicamente «clan» por este matiz social/genealógico.
  revised_spanish_text: 'Para los hijos de Bería: de Heber, el clan de los heberitas; de Malkiel, el clan de los malkielitas.'
  revision_rationale: Se corrige el nombre propio a «Bería» para reflejar fielmente בְרִיעָה sin añadir una terminación ajena al original. También se cambia «familia» por «clan» para preservar la precisión del término מִשְׁפַּחַת en el contexto censal, en línea con la rationale documentada en la auditoría inglesa y con un español natural y claro.
