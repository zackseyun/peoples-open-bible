    rationale: 'El texto de la nota comienza con una comilla simple sobrante y puede redactarse con puntuación más natural: «O, más literalmente: “...”». También conviene mantener una formulación fluida en español.'
  revised_spanish_text: Levantemos nuestros corazones y nuestras manos[a] a Dios en el cielo.
