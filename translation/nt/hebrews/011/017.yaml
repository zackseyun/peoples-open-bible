theological_decisions:
- issue: Rendering μονογενῆ with respect to Isaac, who was not Abraham's only biological son
  chosen_reading: Rendered as 'one and only son' to express Isaac's unique covenantal status without implying Abraham had no other son at all.
  alternative_readings:
  - only son
  - unique son
  - only begotten son
  rationale: The verse echoes the Genesis account and emphasizes Isaac as the uniquely promised heir. This preserves the text's theological weight while avoiding a biologically misleading English phrase. It also avoids importing later Christological associations of 'only begotten' into this Abrahamic context.
  doctrine_reference: Translation philosophy §1, §6; Contested terms table does not list μονογενής, so context-sensitive rendering is documented here.
