translation:
  language: es
  text: Pero el ángel de Yahvé descendió al horno junto con los que rodeaban a Azarías[a], y expulsó del horno la llama del fuego,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los compañeros de Azarías» para «los que rodeaban a Azarías». El griego dice más literalmente «los que están alrededor de Azarías».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: LSJ
  rationale: δέ introduce transición narrativa con un matiz ligeramente contrastivo; en español, «Pero» conserva ese giro sin volverlo más fuerte de lo que el griego exige.
- source_word: ἄγγελος Κυρίου
  english_pob_choice: the angel of the Lord
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el ángel del Señor
  - el ángel de Dios
  lexicon: LSJ
  rationale: Se mantiene la referencia al mensajero divino, pero en español del proyecto se prefiere Yahvé para Κυρίου cuando el contexto remite al nombre divino. «Señor» sería una máscara menos transparente aquí.
- source_word: συνκατέβη
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino abajo
  lexicon: LSJ
  rationale: El verbo compuesto expresa movimiento descendente; «descendió» conserva el sentido y el registro digno del texto.
- source_word: ἅμα
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - al mismo tiempo que
  lexicon: LSJ
  rationale: ἅμα marca acompañamiento; «junto con» lo expresa de manera natural en español sin perder la simultaneidad implícita.
- source_word: τοῖς περὶ τὸν Ἀζαρίαν
  english_pob_choice: those around Azariah
  chosen_spanish: los que estaban alrededor de Azarías
  alternatives_spanish:
  - los compañeros de Azarías
  - los que estaban con Azarías
  lexicon: LSJ
  rationale: El griego dice literalmente «los alrededor de Azarías». Se conserva la estructura descriptiva, evitando cerrar prematuramente la referencia como si fuera un término fijo equivalente a «compañeros».
- source_word: κάμινον
  english_pob_choice: furnace
  chosen_spanish: horno
  alternatives_spanish:
  - furnace
  - horno de fuego
  lexicon: LSJ
  rationale: En español bíblico, «horno» comunica bien el aparato de fuego; el contexto ya identifica que se trata del horno ardiente de Daniel. Se evita introducir redundancia innecesaria.
- source_word: ἐξετίναξεν
  english_pob_choice: drove ... out
  chosen_spanish: arrojó
  alternatives_spanish:
  - expulsó
  - sacudió y expulsó
  lexicon: LSJ
  rationale: El verbo implica una expulsión enérgica, con imagen de sacudida o lanzamiento. «Arrojó» preserva la fuerza de la acción en español natural.
- source_word: τὴν φλόγα τοῦ πυρός
  english_pob_choice: the flame of the fire
  chosen_spanish: la llama del fuego
  alternatives_spanish:
  - la llama del incendio
  - la flama del fuego
  lexicon: LSJ
  rationale: Se conserva la construcción intensiva del griego. «Llama del fuego» reproduce la literalidad sin forzar un giro poco idiomático.
- source_word: ἐκ τῆς καμίνου
  english_pob_choice: out of the furnace
  chosen_spanish: fuera del horno
  alternatives_spanish:
  - del horno
  - hacia afuera del horno
  lexicon: LSJ
  rationale: ἐκ indica movimiento de salida desde dentro; «fuera del horno» lo expresa de modo claro y fluido en español.
theological_decisions:
- issue: Traducción de Κυρίου en una fórmula que puede aludir al nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Yahvé
  rationale: Aunque el inglés POB usa «Lord» por convención de idioma, el español del proyecto evita la sustitución reverencial opaca y sigue la directriz de traducir el nombre divino como «Yahvé» cuando el contexto lo requiere. En esta fórmula narrativa, eso preserva la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé'
- issue: Identidad del ángel del Señor
  english_pob_reading: Retain the phrase without specifying whether this is a created angel or a manifestation of God
  chosen_spanish_reading: 'Retener la ambigüedad: «el ángel de Yahvé»'
  alternative_spanish_readings:
  - identificarlo como una teofanía
  - identificarlo como un ángel creado
  rationale: El verso no determina la naturaleza ontológica del mensajero; la traducción conserva la formulación abierta y no resuelve la tensión teológica.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se siguió el sentido del texto griego de Swete (LXX 1909) y el audit trail inglés. No se requirieron revisiones textuales adicionales; la única nota heredada y relevante es la alternativa lexical sobre τοῖς περὶ τὸν Ἀζαρίαν.
  spanish_consistency_notes:
  - Se usa «Yahvé» de acuerdo con la convención del proyecto para el nombre divino.
  - Se conserva «Azarías» como forma española normal del nombre propio.
  - «Ángel de Yahvé» mantiene la estructura del original sin especificar más de lo que el texto dice.
  - «Horno» es el equivalente idiomático preferido en español para κάμινον en este contexto narrativo de Daniel.
