base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/007/018.yaml
  text: And the sons of Esau and the sons of Ammon went up and camped in the hill country opposite Dothaim[a], and they sent some of their men toward the south and east, opposite Egrebel, which is near Chous, which is on the wadi Mochmour. And the rest of the Assyrian army camped on the plain and covered the whole face of the land, and their tents and their baggage were encamped in a very great multitude[b], and they were exceedingly numerous.
  footnotes:
  - marker: a
    text: Or 'toward the south and toward the sunrise'; the Greek term for 'east' is literally related to the rising sun.
    reason: lexical_alternative
  - marker: b
    text: '''Wadi'' renders a Greek term for a seasonal torrent-bed or stream; alternatively ''brook'' or ''torrent.'''
    reason: cultural_note
