  glossary_alignment: 'Se alinea correctamente con la terminología del proyecto en «Yahvé» y «Dios». La elección de «infidelidad» para מַעַל es defendible, con nota que preserva alternativas; no requiere cambio. El principal ajuste es estilístico y de fidelidad a la fórmula: «Así dice».'
