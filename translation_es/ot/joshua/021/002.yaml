translation:
  language: es
  text: 'Y les hablaron en Silo, en la tierra de Canaán, diciendo: «Yahvé mandó por medio de Moisés[a] que nos diera ciudades para habitar, junto con sus pastos[b] para nuestro ganado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por la mano de Moisés», un giro idiomático que significa «por medio de Moisés».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus tierras abiertas» o «sus tierras comunales»; el hebreo se refiere al terreno alrededor de las ciudades usado para el pastoreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  english_pob_choice: they spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - dijeron
  - les hablaron
  lexicon: HALOT
  rationale: El verbo דִּבֵּר expresa habla/expresión verbal. En español, «hablaron» mantiene el carácter narrativo y resulta natural; «dijeron» sería también posible, pero algo más general. Se evita una paráfrasis que borre la acción de dirigirse oralmente a ellos.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: con ellos
  alternatives_spanish:
  - a ellos
  - les
  lexicon: HALOT
  rationale: Aunque la preposición hebrea indica dirección hacia ellos, en español la construcción con «hablar con» suena más natural y conserva la escena de diálogo. «A ellos» sería más literal, pero menos idiomático en esta frase.
- source_word: בְּשִׁלֹה
  english_pob_choice: at Shiloh
  chosen_spanish: en Silo
  alternatives_spanish:
  - en Shiloh
  - a Silo
  lexicon: HALOT
  rationale: Como topónimo, «Silo» es la forma española usual; «en» expresa ubicación de manera natural en español. Se mantiene el lugar como escenario del encuentro.
- source_word: בְּאֶרֶץ כְּנַעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  lexicon: HALOT
  rationale: El hebreo conserva explícitamente «tierra», por lo que no se reduce a «en Canaán». «Tierra de Canaán» preserva el alcance territorial y el marco de repartición de la tierra.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la directriz del proyecto para el Tetragrámaton con «Yahvé». Se evita sustituirlo por un título, preservando el nombre propio divino del texto fuente.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden
  lexicon: HALOT
  rationale: צוה expresa mandato/orden. «Mandó» es directo, claro y adecuado en español bíblico contemporáneo; no introduce una intensidad mayor que la del hebreo.
- source_word: בְיַד מֹשֶׁה
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: La idiomática hebrea «por la mano de» indica mediación. «Por medio de Moisés» comunica con claridad esa mediación sin sonar forzado; se mantiene la relación instrumental del original.
- source_word: לָתֶת לָנוּ
  english_pob_choice: to give us
  chosen_spanish: que se nos dieran
  alternatives_spanish:
  - para darnos
  - que nos diesen
  lexicon: HALOT
  rationale: El infinitivo constructo de נתן con el destinatario expresa la provisión de ciudades. En español, la pasiva impersonal «que se nos dieran» reproduce bien la idea de concesión sin añadir un sujeto ajeno al texto.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblados
  - villas
  lexicon: HALOT
  rationale: עִיר se traduce normalmente como «ciudad». Aunque algunas podían ser pequeñas, «ciudades» respeta el término del reparto tribal y la traducción establecida en el audit trail.
- source_word: לָשָׁבֶת
  english_pob_choice: to dwell in
  chosen_spanish: para habitarlas
  alternatives_spanish:
  - para vivir en ellas
  - para morar en ellas
  lexicon: HALOT
  rationale: El infinitivo de ישׁב aquí expresa finalidad residencial. «Habitarlas» es conciso, natural y suficientemente formal; conserva la idea de ocuparlas como residencia.
- source_word: וּמִגְרְשֵׁיהֶן
  english_pob_choice: along with their pasturelands
  chosen_spanish: junto con sus ejidos
  alternatives_spanish:
  - junto con sus pastizales
  - junto con sus tierras de pasto
  - y sus ejidos
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto alrededor de la ciudad, usado para pastoreo. «Ejidos» es un término español útil y sobrio para ese espacio comunal/periférico; no se reduce a un mero «pastizal», que podría estrechar demasiado el sentido.
- source_word: לִבְהֶמְתֵּנוּ
  english_pob_choice: for our livestock
  chosen_spanish: para nuestro ganado
  alternatives_spanish:
  - para nuestros animales
  - para nuestra hacienda
  lexicon: HALOT
  rationale: בְּהֵמָה aquí apunta al ganado doméstico. «Ganado» comunica bien la función práctica de los terrenos de pasto y suena natural en español bíblico.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto pide transliterar el Nombre divino como «Yahvé». Esto preserva la referencia al nombre propio del pacto y evita la sustitución litúrgica por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés auditado mantuvo la estructura básica y luego ajustó «to live in» a «to dwell in» para un registro más formal. En español, «para habitarlas» conserva ese registro sobrio sin perder naturalidad. También se preservó la nota sobre «by the hand of Moses» como idiomática y la explicación de מִגְרָשׁ como terreno de pasto alrededor de la ciudad.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología por defecto del proyecto.
  - Se prefirió una construcción española natural («hablaron con ellos») sin perder la relación direccional del hebreo.
  - «Ejidos» se usó para מִגְרְשֵׁיהֶן por su capacidad de sugerir terreno periférico/comunal apto para pastoreo, con nota explicativa para evitar una lectura restrictiva.
  - No se añadió puntuación o formulación doctrinal no respaldada por el texto fuente.
