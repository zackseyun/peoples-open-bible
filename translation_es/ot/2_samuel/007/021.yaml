review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la mayoría de las decisiones del hebreo y del POB en inglés: conserva «tu palabra», mantiene la metáfora «tu corazón», respeta el singular abstracto «toda esta grandeza» y usa apropiadamente «tu siervo». Sin embargo, la apertura «Porque de tu palabra» no representa bien בַּעֲבוּר («a causa de/por causa de») y suena antinatural en español. Además, «darla a conocer a tu siervo» introduce un objeto femenino explícito («la») que no está en el hebreo; el texto fuente dice literalmente «para hacer saber a tu siervo», con «it» suplido en inglés por claridad.'
  spanish_quality_summary: El registro general es digno y legible, pero «Porque de tu palabra» es poco idiomático y afecta la claridad. La estructura mejora notablemente con «Por causa de tu palabra» o «A causa de tu palabra». También conviene ajustar el final para evitar que «la» parezca referirse forzadamente a «grandeza»; «para hacérselo saber a tu siervo» o «para hacer saber esto a tu siervo» expresan mejor el causativo en español natural.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Tu siervo» es una excepción contextual bien justificada frente a «esclavo». Las decisiones teológicas y léxicas principales del POB se preservan, salvo la preposición inicial, que debe alinearse mejor con el valor causal de בַּעֲבוּר.
  issues:
  - severity: high
    issue: «Porque de tu palabra» es una traducción deficiente de בַּעֲבוּר דְּבָרְךָ
    rationale: בַּעֲבוּר expresa causa/base («por causa de», «a causa de», «debido a»). «Porque de» no es español natural aquí y no preserva con precisión la construcción causal del hebreo ni la decisión auditada del POB en inglés.
  - severity: medium
    issue: «para darla a conocer a tu siervo» explicita un objeto femenino no presente en el hebreo
    rationale: לְהוֹדִיעַ אֶת עַבְדֶּךָ es literalmente «para hacer saber a tu siervo». El inglés añade «it» por necesidad idiomática, pero en español «darla a conocer» puede sonar como si «la grandeza» fuera el objeto explícito. «Para hacérselo saber a tu siervo» o «para hacer saber esto a tu siervo» conserva mejor el causativo sin sobreinterpretar.
  revised_spanish_text: Por causa de tu palabra[a] y conforme a tu corazón[b], has hecho toda esta grandeza[c], para hacérselo saber a tu siervo.
