translation:
  text: Jesus said[a], “Wretched is the body that depends on a body[d][c][b], and
    wretched is the soul that depends on these two.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '“Depends on”: ⲉⲓϣⲉ (ⲁϣⲉ) with ⲛ + object can express resting on or reliance;
      alternatives include “rests on” or “is based on.”'
    reason: lexical_alternative
  - marker: b
    text: '“These two” (ⲛⲡⲁⲓ ⲛⲡⲥⲛⲁⲩ) points back to the pair implied in the first
      clause: the dependent body and the body it depends on, not to body and soul.'
    reason: cultural_note
  - marker: c
    text: Loanword ⲧⲁⲗⲁⲓⲡⲱⲣⲟⲥ/ⲟⲛ corresponds to Greek ταλαίπωρος, “wretched, miserable.”
    reason: cultural_note
  - marker: d
    text: The manuscript alternates Greek endings -ον / -ος on the adjective; this
      does not change meaning.
    reason: dialect_note
lexical_decisions:
- source_word: ⲟⲩⲧⲁⲗⲁⲓⲡⲱⲣⲟⲛ / ⲟⲩⲧⲁⲗⲁⲓⲡⲱⲣⲟⲥ
  chosen: wretched
  alternatives:
  - miserable
  - pitiful
  lexicon: Crum; Greek loan ταλαίπωρος
  rationale: Greek loan adjective meaning “wretched, miserable.” “Wretched” keeps
    the sharp, evaluative tone favored by Thomas; alternatives are possible but softer.
- source_word: ⲥⲱⲙⲁ
  chosen: body
  alternatives: []
  lexicon: Crum; Lambdin
  rationale: Standard rendering of Greek loan ⲥⲱⲙⲁ ‘body.’
- source_word: 'ⲉⲓϣⲉ (relative: ⲉⲧⲉⲣⲉⲉⲓϣⲉ) + ⲛⲟⲩⲥⲱⲙⲁ / ⲛⲡⲁⲓ ⲛⲡⲥⲛⲁⲩ'
  chosen: depends on
  alternatives:
  - rests on
  - is based on
  - arises from
  lexicon: Crum; Layton
  rationale: In Sahidic, ⲁϣⲉ/ⲉⲓϣⲉ can denote being situated upon or relying on something;
    with object marked by ⲛ it naturally yields “depend on.” This captures the relational/ongoing
    sense of the relative form here without forcing an originative nuance (“arises
    from”).
- source_word: ⲯⲩⲭⲏ
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: Crum; Layton
  rationale: Greek loan ψυχή commonly rendered “soul” in Coptic contexts; “life/self”
    are possible in some passages but would blur the body/soul pairing here.
- source_word: ⲛⲡⲁⲓ ⲛⲡⲥⲛⲁⲩ
  chosen: these two
  alternatives:
  - this pair
  - both
  lexicon: Layton (demonstratives; dual)
  rationale: Deictic demonstrative + dual points back to the immediately mentioned
    pair; “these two” is explicit and preserves the strangeness and precision of the
    Coptic.
textual_note: 'Dialect: Sahidic with Lycopolitan features. The manuscript shows ⲉⲧⲁϣⲉ
  in the line-level print; Dilley normalizes to ⲉⲧⲉⲣⲉⲉⲓϣⲉ (relative of ⲉⲓϣⲉ). Orthography:
  The loan adjective appears with two Greek endings (-ον in the first clause; -ος
  in the second), an expected variation without semantic impact. The article before
  ⲯⲩⲭⲏ is graphically ambiguous in the diplomatic line (ⲧ̂ⲯⲩⲭⲏ), but Dilley normalizes
  predicative structure consistently as ⲡⲉ ⲡⲯⲩⲭⲏ. No lacunae or conjectural restorations
  are noted by Dilley within this saying.'
