translation:
  language: es
  text: Y sucedió al día siguiente que Saúl puso al pueblo en tres grupos[a], y entraron en medio del campamento durante la guardia de la mañana[b] y derrotaron a Amón hasta el calor del día[c]. Y sucedió que los sobrevivientes se dispersaron, de modo que no quedaron juntos ni siquiera dos de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘tres cabezas’, un modismo para tres divisiones o compañías.'
    reason: lexical_alternative
  - marker: b
    text: O ‘en la guardia de la mañana’. Esto se refiere al período temprano de vigilancia militar, cerca del amanecer.
    reason: cultural_note
  - marker: c
    text: O ‘hasta que el día se puso caliente’, probablemente hacia el mediodía.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמָּחֳרָת
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - en el día siguiente
  lexicon: HALOT
  rationale: Expresa de forma natural la secuencia narrativa inmediata sin perder el sentido temporal del hebreo.
- source_word: וַיָּשֶׂם ... שְׁלֹשָׁה רָאשִׁים
  english_pob_choice: set the people in three groups
  chosen_spanish: puso al pueblo en tres grupos
  alternatives_spanish:
  - dividió al pueblo en tres compañías
  - lo organizó en tres divisiones
  lexicon: HALOT
  rationale: ‘Tres cabezas’ es un modismo hebreo para divisiones o destacamentos. ‘Grupos’ comunica el arreglo militar con naturalidad en español sin forzar una traducción literal opaca.
- source_word: בְתוֹךְ הַמַּחֲנֶה
  english_pob_choice: into the midst of the camp
  chosen_spanish: en medio del campamento
  alternatives_spanish:
  - en el centro del campamento
  - dentro del campamento
  lexicon: HALOT
  rationale: La frase española conserva la imagen de penetración en el interior del campamento enemigo, con estilo claro y bíblico.
- source_word: בְּאַשְׁמֹרֶת הַבֹּקֶר
  english_pob_choice: during the morning watch
  chosen_spanish: durante la vigilia de la mañana
  alternatives_spanish:
  - en la vigilia de la mañana
  - durante la guardia de la mañana
  lexicon: HALOT
  rationale: ‘Vigilia’ mantiene el matiz de turno militar/nocturno; ‘de la mañana’ conserva la referencia temporal. Evita reducirlo directamente a una hora exacta que el hebreo no da.
- source_word: וַיַּכּוּ אֶת עַמּוֹן
  english_pob_choice: struck Ammon
  chosen_spanish: hirieron a Amón
  alternatives_spanish:
  - golpearon a Amón
  - derrotaron a Amón
  lexicon: HALOT
  rationale: El verbo hebreo indica ataque violento/derrota militar. ‘Hirieron’ conserva la concreción del acto bélico, aunque en español puede abarcar el sentido de ‘vencer’ en contexto militar.
- source_word: עַד חֹם הַיּוֹם
  english_pob_choice: until the heat of the day
  chosen_spanish: hasta el calor del día
  alternatives_spanish:
  - hasta que el día se puso caliente
  - hasta el mediodía
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea literal del ‘calor del día’ como expresión idiomática que probablemente apunta hacia media mañana o mediodía.
- source_word: הַנִּשְׁאָרִים
  english_pob_choice: the survivors
  chosen_spanish: los sobrevivientes
  alternatives_spanish:
  - los que quedaron
  - el remanente
  lexicon: HALOT
  rationale: El contexto es militar; ‘sobrevivientes’ comunica que se trata de los que quedaron con vida tras la derrota.
- source_word: וַיָּפֻצוּ
  english_pob_choice: were scattered
  chosen_spanish: fueron dispersados
  alternatives_spanish:
  - se dispersaron
  - huyeron en todas direcciones
  lexicon: HALOT
  rationale: La pasividad/dispersión resultante del desorden militar se mantiene con una forma española suficientemente natural.
- source_word: וְלֹא נִשְׁאֲרוּ בָם שְׁנַיִם יָחַד
  english_pob_choice: so that no two of them were left together
  chosen_spanish: de modo que no quedaron juntos ni siquiera dos de ellos
  alternatives_spanish:
  - y no quedaron juntos dos de ellos
  - de modo que no permanecieron juntos ni dos
  lexicon: HALOT
  rationale: 'La expresión final intensifica la derrota total: ni siquiera dos permanecieron juntos. La frase española conserva ese cierre enfático sin suavizarlo.'
- source_word: וַיְהִי ... וַיְהִי
  english_pob_choice: And it happened ... And it happened
  chosen_spanish: Y sucedió ... Y sucedió
  alternatives_spanish:
  - Y aconteció ... Y aconteció
  - Y fue ... Y fue
  lexicon: HALOT
  rationale: Se conserva la fórmula narrativa repetida del hebreo con un giro español natural y solemne.
translation_notes:
  revision_awareness: 'La versión sigue el texto hebreo masorético y el audit trail inglés sin cambios sustanciales respecto al sentido: conserva la doble fórmula narrativa, el modismo de ‘tres cabezas’, el valor militar de ‘vigilia de la mañana’ y la imagen idiomática de ‘el calor del día’.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino solo cuando aparezca; este versículo no lo contiene.
  - Se usa ‘Amón’ como nombre del pueblo/entidad enemiga siguiendo el hebreo y la tradición POB del pasaje.
  - ‘Vigilia’ se prefiere aquí para reflejar el término militar hebreo sin convertirlo en una hora exacta.
  - La repetición de ‘Y sucedió’ conserva el ritmo narrativo hebreo y la equivalencia óptima con el audit trail inglés.
