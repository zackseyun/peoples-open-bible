translation:
  language: es
  text: Pero no tomaré todo el reino de su mano, porque lo haré príncipe[a] todos los días de su vida, por amor de David mi siervo, a quien elegí, que guardó mis mandamientos y mis estatutos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gobernante» o «líder». El hebreo נָשִׂיא puede significar «príncipe», «jefe», «líder» o «gobernante»; aquí se conserva «príncipe» por su cercanía al término hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶקַּח
  english_pob_choice: I will take
  chosen_spanish: quitaré
  alternatives_spanish:
  - tomaré
  - retiraré
  lexicon: HALOT
  rationale: En español, 'quitar' expresa mejor la remoción del reino de la mano de alguien que un simple 'tomar', y conserva la imagen concreta del traslado de poder que el inglés POB quiso mantener con 'take'.
- source_word: כָּל הַמַּמְלָכָה
  english_pob_choice: the whole kingdom
  chosen_spanish: todo el reino
  alternatives_spanish:
  - el reino entero
  - todo el reino
  lexicon: HALOT
  rationale: '''Reino'' comunica מַמְלָכָה de manera natural en español. ''Todo el reino'' refleja bien el totalizador כָּל sin sobrecargar la frase.'
- source_word: מִיָּדוֹ
  english_pob_choice: out of his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de entre sus manos
  - de su poder
  lexicon: HALOT
  rationale: La imagen hebrea de la mano como posesión o dominio puede mantenerse en español con 'de su mano'. 'De su poder' explicita el sentido, pero pierde la metáfora.
- source_word: נָשִׂיא
  english_pob_choice: prince
  chosen_spanish: príncipe
  alternatives_spanish:
  - gobernante
  - líder
  - ruler
  lexicon: HALOT
  rationale: El auditable POB inglés revisó 'ruler' a 'prince' para acercarse a נָשִׂיא. En español, 'príncipe' conserva mejor esa cercanía lexical que 'gobernante', aunque puede sonar menos técnico; aquí se mantiene por fidelidad al rastro editorial.
- source_word: אֲשִׁתֶנּוּ
  english_pob_choice: I will make him
  chosen_spanish: lo haré
  alternatives_spanish:
  - lo pondré
  - lo nombraré
  lexicon: HALOT
  rationale: El valor causativo de שׂים permite 'hacerlo' seguido del predicativo. En español, 'lo haré príncipe' es natural y conserva la estructura hebrea de constitución en un cargo.
- source_word: כֹּל יְמֵי חַיָּיו
  english_pob_choice: all the days of his life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - durante toda su vida
  - a lo largo de su vida
  lexicon: HALOT
  rationale: Es la expresión hebrea estándar y en español se reproduce con la fórmula más transparente y solemne.
- source_word: לְמַעַן
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - por causa de
  - por consideración a
  lexicon: HALOT
  rationale: '''Por amor de'' es una formulación bíblica y natural en español que transmite la idea de consideración a favor de David. ''Por causa de'' sería más neutral, pero menos covenantal en tono.'
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi servidor
  - mi esclavo
  lexicon: HALOT
  rationale: Aunque el inglés POB usó 'servant', en español 'siervo' es la forma bíblica más estable para David en contexto pactal y evita una aspereza innecesaria de 'esclavo' en este pasaje.
- source_word: בָּחַרְתִּי
  english_pob_choice: I chose
  chosen_spanish: elegí
  alternatives_spanish:
  - escogí
  - seleccioné
  lexicon: HALOT
  rationale: '''Elegí'' comunica bien la elección divina y mantiene el registro formal sin perder naturalidad.'
- source_word: שָׁמַר
  english_pob_choice: kept
  chosen_spanish: guardó
  alternatives_spanish:
  - observó
  - cumplió
  lexicon: HALOT
  rationale: '''Guardar'' en español bíblico conserva el sentido de observar fielmente mandamientos y estatutos, y mantiene un eco semántico importante con el hebreo שׁמר.'
- source_word: מִצְוֺתַי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis órdenes
  - mis preceptos
  lexicon: HALOT
  rationale: '''Mandamientos'' es la correspondencia más estable para מִצְוֺתַי en registro bíblico y preserva el peso normativo del término.'
- source_word: וְחֻקֹּתַי
  english_pob_choice: and my statutes
  chosen_spanish: y mis estatutos
  alternatives_spanish:
  - y mis decretos
  - y mis ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' mantiene la distinción tradicional y útil frente a ''mandamientos'', reflejando mejor el par hebreo sin fusionarlo en una sola idea.'
theological_decisions:
- issue: Sentido de נָשִׂיא en el contexto real
  english_pob_reading: The English POB chose 'prince' but noted the Hebrew can mean 'prince,' 'leader,' or 'ruler.'
  chosen_spanish_reading: '''Príncipe'' se conserva en el texto principal como equivalente cercano al rastro editorial del POB, aunque en español también podría percibirse como un título más específico que ''gobernante''.'
  alternative_spanish_readings:
  - gobernante
  - líder
  - ruler
  rationale: La decisión sigue la revisión del POB inglés hacia 'prince' para reflejar נָשִׂיא. En español, 'príncipe' mantiene ese vínculo lexical; la posible ambigüedad se deja visible en la nota para no borrar la tensión semántica.
  doctrine_reference: 1 Reyes 11:34; distinción lexical de נָשִׂיא
- issue: Base de la restricción divina a favor de David
  english_pob_reading: The restraint is for David's sake, specifically because David was chosen by God and kept God's commandments and statutes.
  chosen_spanish_reading: La limitación del juicio se expresa como un favor concedido 'por amor de David', porque David fue escogido y guardó los mandamientos y estatutos de Yahvé.
  alternative_spanish_readings:
  - por causa de David
  - a favor de David
  rationale: '''Por amor de'' recoge bien la consideración benevolente y pactal del hebreo לְמַעַן sin añadir ideas ajenas. La cláusula siguiente mantiene la razón explícita: elección divina y obediencia de David.'
  doctrine_reference: 2 Samuel 7; 1 Reyes 11:12-13, 34
translation_notes:
  revision_awareness: El borrador inglés más reciente ajustó 'ruler' a 'prince' para acercarse mejor a נָשִׂיא, sin modificar el resto de la traducción. Esta versión española sigue esa revisión y mantiene intacta la lógica causal y covenantal del versículo, incluyendo la permanencia temporal del reino y la referencia a David como siervo elegido que guardó los mandamientos y estatutos.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícito en la referencia a 'mis mandamientos y mis estatutos' conforme al proyecto, aunque el versículo no nombra explícitamente el tetragrámaton en la línea principal.
  - '''siervo'' se usa para David por el registro pactal bíblico y por consistencia con la terminología del proyecto.'
  - '''mandamientos'' y ''estatutos'' se distinguen para no colapsar los dos términos hebreos.'
  - La fórmula temporal 'todos los días de su vida' conserva la cadencia formal del hebreo.
