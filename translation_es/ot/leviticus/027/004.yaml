translation:
  language: es
  text: Pero si es hembra[a], entonces tu tasación será de treinta siclos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y si es hembra, entonces tu tasación será de treinta siclos».'
