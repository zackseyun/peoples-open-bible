translation:
  language: es
  text: Y Melquisedec, rey de Salem, sacó pan y vino[a]. Él era sacerdote de Dios Altísimo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sacó fuera pan y vino».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «El Elyon», es decir, «Dios Altísimo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכִּי צֶדֶק
  english_pob_choice: Melchizedek
  chosen_spanish: Melquisedec
  alternatives_spanish:
  - Malki-zedec
  lexicon: HALOT
  rationale: Se translitera el nombre propio, como en el inglés POB. No se traslada su posible sentido etimológico (‘mi rey es justicia’ / ‘rey de justicia’) al texto principal porque aquí funciona como nombre propio.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - soberano
  lexicon: HALOT
  rationale: Es el equivalente directo y natural para el sustantivo común que designa a un gobernante real.
- source_word: שָׁלֵם
  english_pob_choice: Salem
  chosen_spanish: Salem
  alternatives_spanish:
  - Shalem
  lexicon: HALOT
  rationale: Se conserva el topónimo en su forma tradicional en español bíblico, que es clara y reconocible.
- source_word: הוֹצִיא
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - trajo afuera
  - hizo salir
  - sacó hacia fuera
  lexicon: HALOT
  rationale: El hifil de יצא expresa causar que algo salga o llevarlo fuera. ‘Sacó’ es idiomático en español y conserva la acción concreta sin volverla arcaica.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - pan de trigo
  - alimento
  lexicon: HALOT
  rationale: Aunque el inglés POB usa ‘bread’, en español ‘pan’ es el equivalente natural y literal para el sustantivo, sin ampliar el sentido a ‘alimento’.
- source_word: יָיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino tinto
  lexicon: HALOT
  rationale: Equivalente léxico directo; no hay base para especificar el tipo de vino.
- source_word: כֹהֵן
  english_pob_choice: priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - sacerdote cultual
  lexicon: HALOT
  rationale: Se mantiene el oficio religioso señalado por el sustantivo. ‘Sacerdote’ es el término estándar y fiel en español.
- source_word: אֵל עֶלְיוֹן
  english_pob_choice: God Most High
  chosen_spanish: Dios Altísimo
  alternatives_spanish:
  - Dios, el Altísimo
  - El Altísimo
  lexicon: HALOT
  rationale: Se traduce אֵל como ‘Dios’ y עֶלְיוֹן como ‘Altísimo’, preservando el valor titular de la expresión y su sentido reverente. En español, ‘Dios Altísimo’ suena natural y fiel; la nota conserva la forma hebrea subyacente.
- source_word: וְהוּא
  english_pob_choice: He was
  chosen_spanish: Y era
  alternatives_spanish:
  - Y él era
  - Y fue
  lexicon: HALOT
  rationale: El waw aquí introduce una cláusula coordinada con valor de continuidad narrativa. ‘Y era’ reproduce bien el flujo descriptivo del hebreo sin forzar una copulativa explícita más pesada.
theological_decisions:
- issue: Si la expresión ‘pan y vino’ debe insinuar lectura sacramental o tipológica en el texto principal
  english_pob_reading: Retain the simple historical wording 'brought out bread and wine' without sacramental expansion
  chosen_spanish_reading: 'Conservar el dato histórico simple: ‘sacó pan y vino’'
  alternative_spanish_readings:
  - presentó pan y vino
  - ofreció pan y vino
  - sacó pan y vino en figura sacramental
  rationale: El versículo solo narra una acción concreta de Melquisedec. Aunque Hebreos le da importancia tipológica, aquí no se debe importar una lectura sacramental al cuerpo del texto.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: 'Cómo tratar אֵל עֶלְיוֹן: nombre propio semítico o título divino traducido'
  english_pob_reading: Translate as 'God Most High'
  chosen_spanish_reading: Traducir como ‘Dios Altísimo’
  alternative_spanish_readings:
  - El Elyon
  - Dios, el Altísimo
  - El Altísimo
  rationale: En este contexto funciona como designación divina y no necesita quedar opaca en transliteración. Traducir el título comunica mejor el sentido del texto para el lector español.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: El inglés auditado mantiene la lectura histórica simple y, tras revisión, añadió el artículo indefinido en ‘a priest of God Most High’. La versión española conserva esa naturalidad con ‘era sacerdote’ y mantiene la misma sobriedad narrativa.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo para el nombre divino יהוה; aquí no aparece.
  - ‘Dios Altísimo’ sigue la decisión del POB inglés de traducir la designación divina en lugar de transliterarla.
  - Se conserva un tono bíblico claro y moderno, evitando arcaísmos innecesarios como ‘ofreció’ o ‘presentó’ cuando ‘sacó’ reproduce mejor el verbo hebreo.
