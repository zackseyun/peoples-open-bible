translation:
  language: es
  text: ¡Despierta[a], mi gloria! ¡Despierta[b], arpa y lira! Despertaré a la aurora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi alma» o «todo mi ser» para «mi gloria», una referencia poética al yo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo nombra dos instrumentos antiguos de cuerda; sus equivalentes modernos exactos no son seguros.
    reason: cultural_note
lexical_decisions:
- source_word: עוּרָה
  english_pob_choice: Awake!
  chosen_spanish: ¡Despierta!
  alternatives_spanish:
  - ¡Despiértate!
  - ¡Levántate!
  - ¡Recobra el ánimo!
  lexicon: HALOT
  rationale: El imperativo pide un llamado directo al despertar. «Despierta» conserva el tono elevado y poético de «Awake», sin volverlo coloquial ni añadir matices que el hebreo no exige.
- source_word: כְבוֹדִי
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi alma
  - mi todo mi ser
  - mi honor
  lexicon: HALOT
  rationale: Se mantiene la expresión literal «mi gloria» para preservar la metáfora hebrea y no interpretar de antemano si se trata del yo interior, del honor o del ser entero. La ambigüedad queda abierta, como en el texto fuente.
- source_word: הַנֵּבֶל
  english_pob_choice: harp
  chosen_spanish: arpa
  alternatives_spanish:
  - lira
  - salterio
  lexicon: HALOT
  rationale: El instrumento exacto antiguo no puede fijarse con certeza; «arpa» funciona como equivalente moderno inteligible y poético en español, aunque el par con «lira» también sería posible.
- source_word: כִנּוֹר
  english_pob_choice: lyre
  chosen_spanish: lira
  alternatives_spanish:
  - arpa
  lexicon: HALOT
  rationale: «Lira» distingue este instrumento del anterior y conserva la referencia a un cordófono antiguo de identidad no totalmente segura. En español suena natural junto con «arpa».
- source_word: אָעִירָה
  english_pob_choice: I will awaken
  chosen_spanish: Despertaré
  alternatives_spanish:
  - Rasguñaré
  - Rousearé
  - Haré despertar
  lexicon: HALOT
  rationale: La forma causativa expresa que el hablante, con su canto, provoca metafóricamente el despertar de la aurora. «Despertaré» reproduce bien ese valor activo y poético en español.
- source_word: שָּׁחַר
  english_pob_choice: the dawn
  chosen_spanish: al alba
  alternatives_spanish:
  - a la aurora
  - al amanecer
  lexicon: HALOT
  rationale: «Al alba» comunica de modo natural la imagen de la aurora/del amanecer en español poético, y encaja bien con el verbo personificado «despertaré».
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores [a] y [b] en el texto español.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo imperativo/imperativo/resultado futuro del hebreo.
  - Se preservó la metáfora de «mi gloria» sin sustituirla por una interpretación explicativa en el cuerpo principal.
  - Los dos instrumentos se tradujeron con equivalentes españoles naturales y diferenciados.
  - «Al alba» conserva la imagen de שָּׁחַר sin sobreinterpretarla.
