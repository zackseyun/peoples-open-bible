translation:
  language: es
  text: Entonces Zimri destruyó toda la casa de Baasa[a], conforme a la palabra de Yahvé que había hablado contra Baasa[b] por medio de Jehú, el profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Casa de Baasa» se refiere a la casa real o dinastía de Baasa, no solo a su hogar o familia inmediata.
    reason: cultural_note
  - marker: b
    text: La expresión puede leerse literalmente «a Baasa», pero en este contexto introduce una palabra de juicio dirigida contra él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁמֵד
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - arrasó
  - exterminó
  lexicon: HALOT
  rationale: El hifil de שׁמד expresa causar destrucción o aniquilación. «Destruyó» comunica bien la acción histórica sin sobreespecificar el modo. «Arrasó» es posible, pero sugiere una devastación más material; «exterminó» suena más fuerte de lo que exige el contexto.
- source_word: כָּל בֵּית בַּעְשָׁא
  english_pob_choice: all the house of Baasha
  chosen_spanish: toda la casa de Baasa
  alternatives_spanish:
  - toda la casa de Baasa
  - todo el linaje de Baasa
  - toda la familia de Baasa
  lexicon: HALOT
  rationale: «Casa» conserva el uso real/dinástico del hebreo, no solo el sentido doméstico. «Toda» refleja כָּל de manera directa. «Linaje» explicita el sentido dinástico, pero pierde la imagen bíblica de «casa».
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - de acuerdo con la palabra de Yahvé
  - según la palabra de Yahvé
  lexicon: HALOT
  rationale: «Conforme a» preserva bien la relación de cumplimiento o conformidad del hebreo. «Palabra» mantiene דְּבַר sin convertirlo en una paráfrasis más amplia. Se usa «Yahvé» por la política terminológica del proyecto para יהוה.
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: that he had spoken
  chosen_spanish: que había hablado
  alternatives_spanish:
  - que habló
  - que había dicho
  lexicon: HALOT
  rationale: El pretérito pluscuamperfecto en español expresa con claridad que la palabra antecede al hecho narrado. «Hablado» conserva el verbo de comunicación profética; «dicho» sería más general y menos marcado.
- source_word: אֶל בַּעְשָׁא
  english_pob_choice: against Baasha
  chosen_spanish: contra Baasa
  alternatives_spanish:
  - a Baasa
  - para Baasa
  lexicon: HALOT
  rationale: Aunque אֶל puede ser literalmente «a», en un oráculo de juicio la relación adversativa se expresa mejor con «contra». Esto mantiene la fuerza del juicio sin depender de una nota explicativa en el texto principal.
- source_word: בְּיַד יֵהוּא הַנָּבִיא
  english_pob_choice: through Jehu the prophet
  chosen_spanish: por medio de Jehú, el profeta
  alternatives_spanish:
  - por la mano de Jehú, el profeta
  - mediante Jehú, el profeta
  lexicon: HALOT
  rationale: El hebreo «por la mano de» comunica agencia o mediación. «Por medio de» es la forma natural en español para esa mediación profética y evita un calco duro. Se mantiene «el profeta» como aposición.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la convención del proyecto de transliterar el Tetragrámaton como «Yahvé», preservando el nombre propio del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de la preposición אֶל en un contexto de juicio
  english_pob_reading: against Baasha
  chosen_spanish_reading: contra Baasa
  alternative_spanish_readings:
  - a Baasa
  - hacia Baasa
  rationale: En este contexto la preposición no señala simple dirección neutral, sino la orientación adversa del oráculo. «Contra» reproduce la fuerza judicial sin introducir una glosa extensa en el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense in readable modern Spanish'
- issue: Sentido de «casa» en un contexto real
  english_pob_reading: house of Baasha
  chosen_spanish_reading: casa de Baasa
  alternative_spanish_readings:
  - linaje de Baasa
  - dinastía de Baasa
  rationale: «Casa» conserva el eco bíblico y la referencia a la línea real. Aunque «dinastía» aclara el sentido, desplaza la imagen textual; por eso se deja en el texto principal y, si hace falta, se puede explicitar en nota.
  doctrine_reference: 'DOCTRINE.md lexical policy: preserve source imagery where intelligible'
translation_notes:
  revision_awareness: El texto español sigue la decisión auditada del inglés POB de conservar el sentido dinástico de «house of Baasha», la lectura de juicio de אֶל como «contra», y la mediación profética de בְּיַד como «por medio de». No se detectan revisiones posteriores que alteren esas decisiones; el estado auditado coincide con la revisión más reciente sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה.
  - Se usa «casa» con sentido dinástico, no doméstico.
  - «Por medio de» preserva la mediación profética sin calco duro.
  - La puntuación española separa adecuadamente la aposición «el profeta».
