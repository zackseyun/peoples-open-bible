translation:
  language: es
  text: Los buscarás y no los hallarás; esos hombres que contienden contigo[a]. Los hombres que te hacen la guerra llegarán a ser como nada[b], como inexistencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los hombres de tu contienda'; es decir, quienes contienden o riñen contigo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'como nada y como אפס'; el segundo término también puede traducirse 'como nulidad' o 'como cero'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּבַקְשֵׁם
  english_pob_choice: You will seek them
  chosen_spanish: Lo buscarás
  alternatives_spanish:
  - Los buscarás
  - Los procurarás
  lexicon: HALOT
  rationale: בקש en piel expresa buscar/ procurar. En español, 'buscar' conserva la fuerza normal y directa del verbo, y la omisión del pronombre plural en la primera cláusula evita repetición innecesaria, manteniendo fluidez.
- source_word: וְלֹא תִמְצָאֵם
  english_pob_choice: and not find them
  chosen_spanish: y no lo hallarás
  alternatives_spanish:
  - y no los hallarás
  - pero no los hallarás
  lexicon: HALOT
  rationale: מצא en qal es 'hallar/encontrar'. 'Hallar' suena natural en registro bíblico y digno. El singular 'lo' en español se usa como referencia global a ese conjunto ya introducido; la alternativa plural también sería posible, pero la forma breve mantiene paralelismo con la primera cláusula.
- source_word: אַנְשֵׁי מַצֻּתֶךָ
  english_pob_choice: those men who strive with you
  chosen_spanish: esos hombres que contienden contigo
  alternatives_spanish:
  - los hombres de tu contienda
  - esos hombres que te disputan
  lexicon: HALOT
  rationale: אַנְשֵׁי literalmente es 'hombres de'. מַצָּה/מַצּוּת denota contienda, pleito o riña. 'Contienden contigo' conserva la reciprocidad del conflicto y evita una paráfrasis más amplia como 'oponen' o 'disputan', que debilitaría el matiz de altercado.
- source_word: יִהְי֥וּ
  english_pob_choice: will become
  chosen_spanish: serán
  alternatives_spanish:
  - se volverán
  - llegarán a ser
  lexicon: HALOT
  rationale: היה puede significar 'ser' o 'llegar a ser'. En español, 'serán' transmite con naturalidad el resultado profético sin forzar una lectura demasiado psicológica o dinámica.
- source_word: כְאַיִן
  english_pob_choice: as nothing
  chosen_spanish: como nada
  alternatives_spanish:
  - como nada en absoluto
  - como no ser
  lexicon: HALOT
  rationale: אַיִן expresa nada/no existencia. 'Como nada' es la correspondencia española más clara y compacta, preservando el valor comparativo de כ.
- source_word: וּכְאֶפֶס
  english_pob_choice: as nonexistence
  chosen_spanish: como inexistencia
  alternatives_spanish:
  - como cero
  - como ausencia total
  - como nada
  lexicon: HALOT
  rationale: אֶפֶס puede implicar nada, vacío, nulidad o inexistencia. 'Inexistencia' conserva el incremento poético de la pareja sin reducirla a mera repetición exacta de 'nada'; 'cero' resultaría demasiado moderno y técnico.
- source_word: אַנְשֵׁי מִלְחַמְתֶּךָ
  english_pob_choice: The men who wage war against you
  chosen_spanish: Los hombres que hacen guerra contra ti
  alternatives_spanish:
  - Los hombres de tu guerra
  - los que pelean contra ti
  lexicon: HALOT
  rationale: La construcción literal es 'hombres de tu guerra', es decir, quienes te combaten en guerra. 'Hacen guerra contra ti' comunica con precisión el sentido adversarial y mantiene el tono elevado del hebreo.
theological_decisions:
- issue: Intensidad poética de la desaparición de los enemigos
  english_pob_reading: will become as nothing, as nonexistence
  chosen_spanish_reading: serán como nada, como inexistencia
  alternative_spanish_readings:
  - se desvanecerán por completo
  - serán como nada y como vacío
  rationale: El verso usa paralelismo intensificador para describir la ruina total de los adversarios de Israel. La traducción conserva esa fuerza poética sin convertirla en una explicación metafísica ni suavizar el juicio anunciado.
  doctrine_reference: Isaías 41:12; poética profética de juicio y reversión de poder
translation_notes:
  revision_awareness: Seguí la última revisión inglesa al preferir un verbo que refleje más de cerca 'strive/contend' y al mantener una comparación formal con 'como nada' y 'como inexistencia'. También conservé la distinción poética entre אֲיִן y אֶפֶס mediante dos términos españoles próximos pero no idénticos.
  spanish_consistency_notes:
  - Usé 'Yahvé' no aplica aquí porque el versículo no contiene el tetragrámaton.
  - Elegí 'contienden contigo' para mantener el matiz de pleito/altercado documentado en la nota inglesa, en lugar de un simple 'oponen'.
  - Mantengo 'hombres' para אַנְשֵׁי porque la forma masculina colectiva es parte del hebreo y del paralelismo.
  - '''Como nada'' y ''como inexistencia'' preservan la duplicidad intensificadora del hebreo sin sobreexplicar.'
  - No usé 'Cristo', 'SEÑOR' ni terminología eclesiástica no presente en el texto base.
