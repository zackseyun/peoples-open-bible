translation:
  language: es
  text: Y el rey Uzías quedó leproso[a] hasta el día de su muerte, y habitó en una casa apartada, leproso, porque fue cortado[b] de la casa de Yahvé. Y Jotam su hijo estaba a cargo de la casa del rey, juzgando a la gente del país.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «afectado de lepra»; el hebreo puede referirse a una afección cutánea más amplia que la lepra clínica moderna.
    reason: lexical_alternative
  - marker: b
    text: O «fue excluido de la casa de Yahvé»; el hebreo expresa separación o exclusión de ese ámbito.
    reason: alternative_reading
lexical_decisions:
- source_word: מְצֹרָע
  english_pob_choice: leprous
  chosen_spanish: leproso
  alternatives_spanish:
  - afectado de lepra
  - con una enfermedad de la piel
  - impuro por una enfermedad de la piel
  lexicon: HALOT
  rationale: Se conserva el valor tradicional y conciso de la raíz צרעת en este relato histórico. 'Leproso' es la opción más breve y reconocible en español, sin precisar indebidamente un diagnóstico médico moderno.
- source_word: בֵּית הַחפשות
  english_pob_choice: a separate house
  chosen_spanish: una casa separada
  alternatives_spanish:
  - una casa aislada
  - una casa apartada
  - la casa de la libertad
  lexicon: HALOT
  rationale: La expresión hebrea es difícil. En el contexto, la idea comunicable con mayor claridad es la de una vivienda apartada de la vida normal y del ámbito real y cultual. 'Casa separada' mantiene la separación sin forzar una interpretación más específica que el texto no garantiza.
- source_word: נִגְזַר מִבֵּית יְהוָה
  english_pob_choice: he was cut off from the house of the LORD
  chosen_spanish: fue cortado de la casa de Yahvé
  alternatives_spanish:
  - fue excluido de la casa de Yahvé
  - fue separado de la casa de Yahvé
  lexicon: HALOT
  rationale: נִגְזַר expresa ser cortado o separado. 'Fue cortado' preserva la fuerza verbal y la severidad de la exclusión. Se conserva 'casa de Yahvé' conforme a la norma del proyecto para יְהוָה.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la formulación hebrea 'casa' para preservar la imagen fuente y la consistencia intertextual, en lugar de sustituirla por 'templo', que explicita más de lo que el hebreo dice literalmente.
- source_word: עַל בֵּית הַמֶּלֶךְ
  english_pob_choice: was over the king’s house
  chosen_spanish: estaba sobre la casa del rey
  alternatives_spanish:
  - estaba al frente de la casa del rey
  - estaba a cargo de la casa del rey
  - administraba la casa del rey
  lexicon: HALOT
  rationale: La expresión conserva el giro idiomático del hebreo para una función de supervisión administrativa. 'Sobre la casa del rey' sigue de cerca la forma fuente sin perder inteligibilidad en español.
- source_word: שׁוֹפֵט אֶת עַם הָאָרֶץ
  english_pob_choice: judging the people of the land
  chosen_spanish: juzgando al pueblo de la tierra
  alternatives_spanish:
  - gobernando al pueblo de la tierra
  - administrando justicia al pueblo de la tierra
  lexicon: HALOT
  rationale: שׁוֹפֵט puede abarcar juicio y gobierno. 'Juzgando' conserva la conexión léxica con el participio hebreo, y 'pueblo de la tierra' reproduce la designación sociopolítica sin reinterpretarla.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - los habitantes de la tierra
  - el pueblo del país
  lexicon: HALOT
  rationale: Se mantiene la expresión casi literal para no diluir su valor técnico o sociopolítico. En español, 'pueblo de la tierra' es entendible y conserva la estructura del hebreo.
- source_word: וַיְהִי ... וַיֵּשֶׁב
  english_pob_choice: was ... lived
  chosen_spanish: fue ... habitó
  alternatives_spanish:
  - estuvo ... vivió
  - llegó a ser ... residió
  lexicon: HALOT
  rationale: En español narrativo, 'fue' y 'habitó' expresan bien la secuencia y conservan un registro elevado sin sonar mecánicos. 'Habitó' ayuda a reflejar el matiz de residencia prolongada.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto para traducir el Tetragrámaton como 'Yahvé', preservando el nombre del pacto y evitando la sustitución litúrgica por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de נִגְזַר מִבֵּית יְהוָה
  english_pob_reading: he was cut off from the house of Yahweh
  chosen_spanish_reading: fue cortado de la casa de Yahvé
  alternative_spanish_readings:
  - fue excluido de la casa de Yahvé
  - fue separado de la casa de Yahvé
  rationale: Se mantiene la fuerza de exclusión y separación que el hebreo transmite. No se suaviza a un mero 'alejado', porque el contexto narra una ruptura cultual y social real.
  doctrine_reference: HALOT; contexto histórico-cultual de 2 Crónicas 26:21
- issue: Naturaleza de la afección de Uzías
  english_pob_reading: leprous
  chosen_spanish_reading: leproso
  alternative_spanish_readings:
  - afectado de lepra
  - con una enfermedad de la piel
  rationale: Se conserva la tensión entre el término bíblico tradicional y el hecho de que צרעת no siempre coincide exactamente con la lepra clínica moderna. 'Leproso' mantiene la equivalencia histórica del relato sin cerrar indebidamente el sentido.
  doctrine_reference: HALOT; uso bíblico de צרעת
translation_notes:
  revision_awareness: El auditraje inglés mantiene acuerdo alto y no requiere revisión sustantiva. Se preservó la decisión de leer יְהוָה como nombre propio divino en español ('Yahvé'), y se reflejó la ambigüedad de בֵּית הַחפשות con una solución contextual ('casa separada') sin imponer una glosa interpretativa excesiva. También se conservó la fuerza de נִגְזַר como exclusión/corte, siguiendo la línea del texto fuente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva 'casa' en 'casa de Yahvé' para reflejar el hebreo literal y la intertextualidad.
  - '''Juzgando'' mantiene la ambigüedad entre juicio judicial y administración gubernamental presente en שׁוֹפֵט.'
  - '''Pueblo de la tierra'' sigue la fórmula hebrea sin reemplazarla por una paráfrasis sociológica.'
