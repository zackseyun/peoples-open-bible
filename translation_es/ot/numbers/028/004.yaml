translation:
  language: es
  text: Ofrecerás un cordero por la mañana, y el segundo cordero lo ofrecerás entre las dos tardes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre las dos tardes», expresión tradicional para el tiempo cercano al crepúsculo o a la tarde avanzada.'
    reason: cultural_note
lexical_decisions:
- source_word: הַכֶּבֶשׂ
  english_pob_choice: lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - lambiente
  - oveja joven
  lexicon: HALOT
  rationale: כֶּבֶשׂ designa un cordero, es decir, un animal joven para sacrificio. En español, 'cordero' es el equivalente natural y digno; 'oveja joven' resulta más descriptivo pero menos idiomático en este contexto cultual.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - el primero
  - uno solo
  lexicon: HALOT
  rationale: El hebreo usa el cardinal אֶחָד, no un ordinal. 'Uno' preserva el valor léxico y evita introducir 'primero' sin base directa en el texto.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerás
  alternatives_spanish:
  - harás
  - prepararás
  - presentarás
  lexicon: HALOT
  rationale: En contexto sacrificial, עשה funciona de manera cultual y puede implicar ofrecer una ofrenda. 'Ofrecerás' comunica la acción ritual de forma natural en español sin perder el sentido sacrificial.
- source_word: בַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: en la mañana
  alternatives_spanish:
  - por la mañana
  - al amanecer
  lexicon: HALOT
  rationale: בֹּקֶר significa 'mañana'. 'En la mañana' es claro y bíblicamente sobrio; 'por la mañana' también sería posible, pero aquí la forma con artículo suena más directa.
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el otro
  - segundo
  lexicon: HALOT
  rationale: שֵׁנִי es el ordinal 'segundo'. 'El segundo' mantiene la secuencia establecida por el primer cordero.
- source_word: בֵּין הָעַרְבָּיִם
  english_pob_choice: between the evenings
  chosen_spanish: entre las dos tardes
  alternatives_spanish:
  - entre las tardes
  - al atardecer
  - entre el ocaso y la noche
  lexicon: HALOT
  rationale: La expresión hebrea es técnicamente 'entre las tardes', pero en español esa forma puede sonar opaca. 'Entre las dos tardes' conserva la literalidad tradicional y sugiere el intervalo vespertino sin borrar la tensión temporal del hebreo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y mantiene la tensión temporal de בֵּין הָעַרְבָּיִם con una formulación española transparente. No se requirieron revisiones textuales adicionales; se priorizó una equivalencia óptima entre literalidad y naturalidad.
  spanish_consistency_notes:
  - Se usa 'cordero' de manera coherente con el valor sacrificial de כֶּבֶשׂ.
  - Se conserva la secuencia numérica 'uno / el segundo' en lugar de convertirla en 'primero / segundo' para no desplazar el hebreo.
  - La nota al pie aclara la expresión temporal sin sustituirla por una paráfrasis en el cuerpo principal.
  - El tono mantiene registro bíblico sobrio y lectura pública clara.
