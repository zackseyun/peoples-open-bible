  spanish_quality_summary: 'El texto es mayormente claro y natural en español eclesial moderno. «Ingenio» es posible, pero suena algo marcado; aun así puede mantenerse. La mejora principal es hacer más natural y precisa la frase final: «por todo su alrededor» y «hacia dentro de la ceniza»/«a la ceniza». También conviene pluralizar «cenizas» por idiomaticidad en este contexto material, aunque el singular no es incorrecto.'
