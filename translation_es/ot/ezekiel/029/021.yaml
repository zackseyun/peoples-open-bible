base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/029/021.yaml
  text: On that day I will cause a horn to sprout for the house of Israel[a], and I will give you an opening of the mouth among them[b], and they will know that I am Yahweh.
  footnotes:
