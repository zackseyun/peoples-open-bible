translation:
  language: es
  text: Han sembrado mucho[a], pero han recogido poco. Ustedes comen, pero no hay lo suficiente para saciarse; beben, pero no hay lo suficiente para llenarse[b]; se visten, pero nadie entra en calor[c]; y el que gana salario lo gana para una bolsa con agujeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pero han traído poco'. El hebreo dice literalmente 'pero trajeron poco', un modismo para un rendimiento agrícola escaso.
    reason: lexical_alternative
  - marker: b
    text: O 'beben, pero no hasta embriagarse'. El hebreo puede referirse específicamente a llegar a la embriaguez, no solo a quedar saciado.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'pero no hay calor para él'. El pronombre singular tiene sentido genérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְרַעְתֶּם
  english_pob_choice: You have sown
  chosen_spanish: Han sembrado
  alternatives_spanish:
  - Sembraron
  - Han estado sembrando
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción pasada con efecto presente en la acusación profética; en español, el pretérito perfecto compuesto suena natural y conserva ese valor de reproche actual.
- source_word: הַרְבֵּה
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - abundantemente
  - en gran cantidad
  lexicon: HALOT
  rationale: Como acusativo adverbial de cantidad, 'mucho' es breve, idiomático y fiel.
- source_word: וְהָבֵא מְעָט
  english_pob_choice: but brought in little
  chosen_spanish: pero han recogido poco
  alternatives_spanish:
  - pero han traído poco
  - pero la cosecha fue poca
  lexicon: HALOT
  rationale: La idea es un modismo agrícola de rendimiento escaso. 'Recogido poco' comunica el resultado de la cosecha sin perder claridad en español.
- source_word: אָכוֹל וְאֵין לְשָׂבְעָה
  english_pob_choice: You eat, but there is not enough to be satisfied
  chosen_spanish: Ustedes comen, pero no hay lo suficiente para saciarse
  alternatives_spanish:
  - Ustedes comen, pero no alcanzan a saciarse
  - Comen, pero no llegan a saciarse
  lexicon: HALOT
  rationale: Conservo la secuencia de acciones frustradas y traduzco el valor resultativo con un español natural. 'Saciarse' mantiene la idea de llegar a plenitud.
- source_word: שָׁתוֹ וְאֵין לְשָׁכְרָה
  english_pob_choice: you drink, but there is not enough to be filled
  chosen_spanish: beben, pero no hay lo suficiente para llenarse
  alternatives_spanish:
  - beben, pero no alcanzan a llenarse
  - beben, pero no hay bastante para quedar satisfechos
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que evitó 'emborracharse' y tomo el sentido más general de no llegar a plenitud; 'llenarse' es la forma más clara y ajustada al contexto.
- source_word: לָבוֹשׁ וְאֵין לְחֹם לוֹ
  english_pob_choice: you clothe yourselves, but no one is warm
  chosen_spanish: se visten, pero nadie tiene calor
  alternatives_spanish:
  - se visten, pero nadie entra en calor
  - se cubren, pero nadie se calienta
  lexicon: HALOT
  rationale: El hebreo usa un singular genérico ('para él'). 'Nadie tiene calor' conserva el valor universal sin forzar el singular en español.
- source_word: וְהַמִּשְׂתַּכֵּר מִשְׂתַּכֵּר
  english_pob_choice: and the one who earns wages earns them
  chosen_spanish: y el que gana salario lo gana
  alternatives_spanish:
  - y el asalariado gana salario
  - y el que recibe sueldo lo recibe
  lexicon: HALOT
  rationale: Mantengo la repetición enfática del hebreo. 'Gana salario' conserva el campo semántico de remuneración por trabajo.
- source_word: אֶל צְרוֹר נָקוּב
  english_pob_choice: for a bag with holes
  chosen_spanish: para meterlo en una bolsa con agujeros
  alternatives_spanish:
  - para una bolsa con agujeros
  - para un bolsa agujereada
  lexicon: HALOT
  rationale: La metáfora del salario que desaparece se expresa de forma vívida y transparente en español. 'Meterlo' explicita la relación con el salario sin añadir contenido nuevo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el archivo inglés: se conserva la progresión de carencia, la lectura agrícola de וְהָבֵא מְעָט, y la revisión que evitó sobredeterminar שָׁכְרָה como embriaguez. No se añaden notas porque el español puede expresar la ambigüedad sin marcadores.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; este versículo no lo contiene.
  - Se evita 'Cristo/Mesías' por no ser pertinente.
  - Se mantiene 'salario' para reflejar el contexto laboral de מִשְׂתַּכֵּר.
  - Se preserva el paralelismo y la repetición verbal del hebreo con formas españolas naturales.
