lexical_decisions:
- source_word: עִזִּים
  english_pob_choice: female goats
  chosen_spanish: cabras hembras
  alternatives_spanish:
  - cabras
  - chivas
  - cabras macho/hembra
  lexicon: HALOT
  rationale: El hebreo nombra cabras en forma compatible con distinción de sexo en un inventario de cría. «Cabras hembras» conserva esa especificación de manera clara y natural en español.
- source_word: מָאתַיִם
  english_pob_choice: two hundred
  chosen_spanish: doscientas
  alternatives_spanish:
  - doscientos
  lexicon: HALOT
  rationale: Es el cardinal simple; se ajusta en género femenino para concordar con «cabras» y «ovejas» implícitas.
- source_word: תְיָשִׁים
  english_pob_choice: male goats
  chosen_spanish: machos
  alternatives_spanish:
  - cabras macho
  - machos cabríos
  - macho cabrío
  lexicon: HALOT
  rationale: El término señala cabras macho. Dado que el sustantivo ya quedó claro en la primera mitad, «machos» funciona con referencia contextual y evita una repetición pesada; la ambigüedad se resuelve en la nota.
- source_word: רְחֵלִים
  english_pob_choice: ewes
  chosen_spanish: ovejas hembras
  alternatives_spanish:
  - ovejas
  - borregas
  lexicon: HALOT
  rationale: El hebreo denota ovejas hembras. En español «ovejas hembras» mantiene el paralelo explícito con «carneros» y evita perder la fuerza sexual del inventario.
- source_word: אֵילִים
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - machos de oveja
  - ovejas macho
  lexicon: HALOT
  rationale: «Carneros» es el equivalente natural y preciso para machos de oveja, y preserva el contraste con «ovejas hembras».
