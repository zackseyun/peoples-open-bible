translation:
  language: es
  text: Y hubo un alboroto en el campamento, porque su llegada[a] se difundió por las tiendas; y vinieron y la rodearon mientras estaba de pie fuera de la tienda de Holofernes, hasta que le informaron acerca de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su presencia». El griego παρουσία puede significar «presencia», pero aquí también puede entenderse como «llegada» en sentido eventivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἐγένετο συνδρομή
  english_pob_choice: there was a stir
  chosen_spanish: hubo un alboroto
  alternatives_spanish:
  - hubo una aglomeración
  - hubo un tumulto
  - hubo un movimiento general
  lexicon: LSJ
  rationale: συνδρομή expresa una reunión o concurrencia repentina; en este contexto narrativo, 'alboroto' comunica bien la agitación colectiva sin forzar una interpretación de violencia o pánico.
- source_word: παρεμβολή
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento
  lexicon: LSJ
  rationale: En un contexto militar narrativo, 'campamento' es natural en español y conserva el referente del campamento de Holofernes.
- source_word: διεβοήθη
  english_pob_choice: was spread through
  chosen_spanish: se difundió por
  alternatives_spanish:
  - fue proclamada por
  - se gritó por
  - se hizo correr por
  lexicon: LSJ
  rationale: El verbo sugiere propagación vocal o pública de la noticia; 'se difundió por' conserva la idea de circulación del rumor/noticia sin añadir un sujeto implícito innecesario.
- source_word: τὰ σκηνώματα
  english_pob_choice: the tents
  chosen_spanish: las tiendas
  alternatives_spanish:
  - las tiendas de campaña
  - los pabellones
  lexicon: LSJ
  rationale: σκηνώματα se refiere a las tiendas del campamento; 'las tiendas' es breve, claro y idiomático en español bíblico moderno.
- source_word: ἡ παρουσία αὐτῆς
  english_pob_choice: her arrival
  chosen_spanish: su llegada
  alternatives_spanish:
  - su presencia
  - su aparición
  lexicon: LSJ
  rationale: Aunque παρουσία puede significar 'presencia', aquí el contexto apunta al hecho de que ella llegó al campamento; 'su llegada' preserva ese valor eventivo.
- source_word: ἐκύκλουν αὐτὴν
  english_pob_choice: surrounded her
  chosen_spanish: la rodearon
  alternatives_spanish:
  - la cercaron
  - la circundaron
  - se agruparon alrededor de ella
  lexicon: LSJ
  rationale: El verbo indica movimiento circular en torno a ella. 'La rodearon' mantiene la imagen con un español natural, sin intensificar innecesariamente el matiz militar de 'cercaron'.
- source_word: ὡς ἱστήκει
  english_pob_choice: as she stood
  chosen_spanish: mientras estaba
  alternatives_spanish:
  - mientras se hallaba
  - cuando estaba de pie
  lexicon: LSJ
  rationale: La forma describe su postura mientras ocurría la acción. 'Mientras estaba' fluye con naturalidad en español; el contexto ya implica que estaba de pie.
- source_word: ἔξω τῆς σκηνῆς Ὀλοφέρνου
  english_pob_choice: outside the tent of Holofernes
  chosen_spanish: fuera de la tienda de Holofernes
  alternatives_spanish:
  - a las afueras de la tienda de Holofernes
  - fuera de la tienda de Holofernes
  lexicon: LSJ
  rationale: '''Fuera de la tienda'' traduce con claridad ἔξω τῆς σκηνῆς y mantiene la relación locativa sin sobrecargar el estilo.'
- source_word: προσήγγειλαν αὐτῷ περὶ αὐτῆς
  english_pob_choice: they reported her to him
  chosen_spanish: le informaron acerca de ella
  alternatives_spanish:
  - le dieron cuenta de ella
  - le reportaron acerca de ella
  - le avisaron sobre ella
  lexicon: LSJ
  rationale: La frase significa que llevaron noticia a Holofernes sobre Judit. 'Le informaron acerca de ella' conserva la transmisión de información sin introducir un sentido jurídico o administrativo que no está explicitado.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente revisó varios puntos: ''stir'' para συνδρομή, ''was spread through'' para διεβοήθη, ''surrounded'' para ἐκύκλουν y ''reported her to him'' para προσήγγειλαν. La traducción española sigue esa línea semántica, pero ajusta el registro a un español natural: ''alboroto'', ''se difundió por'', ''la rodearon'' y ''le informaron acerca de ella''.'
  spanish_consistency_notes:
  - Se mantiene 'Holofernes' como nombre propio transliterado, sin adaptación.
  - '''tienda'' se usa de manera consistente para σκηνή/σκηνώματα en este contexto narrativo.'
  - Se preserva la ambigüedad de παρουσία mediante la nota, aunque el cuerpo principal favorece 'llegada' por el contexto.
