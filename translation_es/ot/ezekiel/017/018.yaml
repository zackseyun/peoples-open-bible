translation:
  language: es
  text: Despreció el juramento por quebrantar el pacto[a]; he aquí, había dado su mano[b], y aun así hizo todas estas cosas. No escapará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la maldición»; el término hebreo puede designar un juramento que lleva asociada una sanción de maldición.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «había dado su mano», un modismo para hacer una promesa o un acuerdo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָזָה
  english_pob_choice: He despised
  chosen_spanish: Despreció
  alternatives_spanish:
  - Trató con desprecio
  - Desdeñó
  lexicon: HALOT
  rationale: בזה expresa desprecio o trato despectivo. «Despreció» conserva la fuerza moral de la acusación y suena natural en español bíblico contemporáneo.
- source_word: אָלָה
  english_pob_choice: the oath
  chosen_spanish: el juramento
  alternatives_spanish:
  - la maldición
  - el juramento solemne
  lexicon: HALOT
  rationale: En contextos de pacto, אָלָה puede referirse a un juramento con sanción de maldición. Dado que en español «juramento» comunica bien la obligación vinculante, se usa en el texto principal y se deja abierta la alternativa de «maldición» en la nota.
- source_word: לְהָפֵר בְּרִית
  english_pob_choice: by breaking the covenant
  chosen_spanish: por quebrantar el pacto
  alternatives_spanish:
  - al quebrantar el pacto
  - por violar el pacto
  lexicon: HALOT
  rationale: El infinitivo con ל marca la manera o el medio ligado al desprecio del juramento. «Por quebrantar el pacto» mantiene la relación causal/explicativa y evita una traducción demasiado literal o rígida.
- source_word: בְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - la alianza
  - el convenio
  lexicon: HALOT
  rationale: Aunque בְּרִית suele traducirse «pacto» o «alianza», aquí el entorno es de tratado político. «Pacto» es claro en español y conserva el valor vinculante sin sonar excesivamente técnico.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: HALOT
  rationale: La fórmula hebrea introduce énfasis y subraya la gravedad de lo que sigue. «Y he aquí» preserva ese golpe retórico mejor que omitir la partícula.
- source_word: נָתַן יָדוֹ
  english_pob_choice: he had given his hand
  chosen_spanish: había dado su mano
  alternatives_spanish:
  - había dado su palabra
  - se había comprometido
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática para transparencia con el hebreo. En español la expresión literal es comprensible y deja visible el acto de compromiso o promesa.
- source_word: וְכָל אֵלֶּה עָשָׂה
  english_pob_choice: yet did all these things
  chosen_spanish: y todas estas cosas hizo
  alternatives_spanish:
  - y, sin embargo, hizo todo esto
  - y aun así hizo todas estas cosas
  lexicon: HALOT
  rationale: El hebreo enumera la conducta infiel sin añadir explícitamente un adversativo. Se conserva la secuencia literal, dejando que el contexto aporte la oposición implícita.
- source_word: לֹא יִמָּלֵט
  english_pob_choice: He will not escape
  chosen_spanish: no escapará
  alternatives_spanish:
  - no se librará
  - no escapará del juicio
  lexicon: HALOT
  rationale: El nifal de מלט comunica librarse o escapar de juicio. «No escapará» es breve, idiomático y fiel al sentido.
theological_decisions:
- issue: Órdenes de pacto y sanción moral
  english_pob_reading: Retain 'oath' and 'covenant' rather than reducing both to secular treaty language.
  chosen_spanish_reading: Mantener el peso moral y pactal con «juramento» y «pacto», sin reducir el verso a mera diplomacia.
  alternative_spanish_readings:
  - «maldición» para אָלָה
  - «alianza» para בְּרִית
  rationale: El contexto inmediato es político, pero la denuncia bíblica conserva la seriedad de una obligación vinculante ante Dios. «Juramento» y «pacto» permiten sostener esa dimensión sin exagerar ni secularizar el texto.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente: se mantiene la estructura breve y enfática, con «y he aquí» sin un «y» redundante antes de la partícula enfática, y se conserva el cierre contundente «no escapará».'
  spanish_consistency_notes:
  - Se prefirió «pacto» sobre «alianza» por la escena de tratado y por la claridad moderna en español.
  - Se mantuvo «juramento» en el texto principal para reflejar la obligación vinculante de אָלָה, dejando la alternativa semántica en nota.
  - Se conservó la imagen de «dar la mano» para corresponder al modismo hebreo y evitar una paráfrasis interpretativa.
  - El verbo final está en futuro simple para corresponder al valor de certeza/proyección del hebreo.
