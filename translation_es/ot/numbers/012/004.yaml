translation:
  language: es
  text: 'Y Yahvé dijo de repente a Moisés, a Aarón y a Miriam[a]: «Salgan, ustedes tres[b], a la tienda de reunión». Y los tres salieron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''Salgan'' o ''Vayan fuera''; el verbo simplemente indica movimiento hacia afuera desde un lugar.'
    reason: lexical_alternative
  - marker: b
    text: O 'los tres de ustedes' / 'todos ustedes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino aparece explícitamente en el hebreo, y el proyecto POB lo mantiene como nombre propio. En español, 'Yahvé' preserva el Tetragrámaton sin sustituirlo por un título, y es la opción consistente con la terminología del proyecto.
- source_word: פִּתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - de pronto
  lexicon: HALOT
  rationale: El adverbio marca la irrupción inesperada de la palabra de Yahvé. 'De repente' es natural en español y conserva esa inmediatez narrativa.
- source_word: צְא֥וּ
  english_pob_choice: Come out
  chosen_spanish: Salgan
  alternatives_spanish:
  - Salid
  - Vayan afuera
  lexicon: HALOT
  rationale: El imperativo plural de יצא indica salir desde el lugar donde están. En español, 'salgan' suena idiomático en una orden directa y conserva el valor de movimiento hacia afuera sin añadir matices ajenos.
- source_word: שְׁלָשְׁתְּכֶם
  english_pob_choice: you three
  chosen_spanish: ustedes tres
  alternatives_spanish:
  - los tres
  - los tres de ustedes
  lexicon: HALOT
  rationale: La forma hebrea identifica expresamente a los tres destinatarios. 'Ustedes tres' reproduce esa especificación de manera natural en español; el marcador en el texto permite conservar el énfasis conjunto.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - la tienda de reunión
  - el tabernáculo del encuentro
  lexicon: HALOT
  rationale: Esta expresión técnica designa el santuario de reunión en el desierto. 'Tabernáculo de reunión' es una formulación ampliamente inteligible en español bíblico y conserva el carácter terminológico del hebreo, evitando una paráfrasis más libre.
- source_word: וַיֵּצְאוּ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron afuera
  - se fueron
  lexicon: HALOT
  rationale: La narración repite el movimiento ya ordenado. 'Salieron' es la forma más directa y no fuerza una repetición artificial con el mandato previo.
- source_word: שְׁלָשְׁתָּם
  english_pob_choice: the three of them
  chosen_spanish: los tres de ellos
  alternatives_spanish:
  - los tres
  - los tres juntos
  lexicon: HALOT
  rationale: La frase recalca que los tres obedecieron. 'Los tres de ellos' conserva esa reiteración enfática del hebreo, aunque resulte algo más analítica en español; por eso se mantiene junto con el contexto narrativo.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton, no un título. En español del POB, 'Yahvé' mantiene el nombre propio del pacto y evita la sustitución tradicional por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de la orden plural dirigida a los tres
  english_pob_reading: Come out, you three
  chosen_spanish_reading: Salgan ustedes tres
  alternative_spanish_readings:
  - Salgan los tres
  - Salid vosotros tres
  rationale: El hebreo subraya que la orden incluye a los tres destinatarios explícitamente. 'Ustedes tres' conserva ese énfasis conjunto sin perder naturalidad en español contemporáneo.
  doctrine_reference: HALOT; sintaxis imperativa plural hebrea
translation_notes:
  revision_awareness: 'Coincide con la auditoría inglesa: no hubo revisiones aplicadas y el control de calidad informó alta concordancia con solo observaciones menores. La redacción española mantiene el nombre divino, el adverbio de inmediatez, la orden plural y la repetición final del hebreo sin suavizarlas innecesariamente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto para יְהוָה.
  - Se usa 'tabernáculo de reunión' para el sintagma técnico אֹהֶל מוֹעֵד.
  - '''Salgan'' y ''salieron'' conservan la repetición del movimiento sin forzar sinonimia artificial.'
  - Se preserva la explicitación de los tres destinatarios con una nota para la alternativa idiomática.
