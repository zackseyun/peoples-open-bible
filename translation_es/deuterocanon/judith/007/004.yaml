  yaml_path: translation/deuterocanon/judith/007/004.yaml
  text: But the sons of Israel[a], when they saw their great number, were greatly troubled, and each said to his neighbor, “Now these men will lick up the whole face of the land[b], and neither the high mountains nor the ravines nor the hills will bear their weight.”
  footnotes:
