    issue: «de hombre a mujer» es poco natural en español y debilita la claridad del alcance inclusivo de la asamblea.
    rationale: Aunque refleja más literalmente el hebreo מֵאִישׁ וְעַד אִשָּׁה, en español contemporáneo suena forzado. El sentido del original es abarcar a toda la asamblea por rango de hombres y mujeres; «hombres y mujeres» lo transmite con fidelidad y mejor legibilidad, en línea con la revisión inglesa auditada.
  - severity: low
