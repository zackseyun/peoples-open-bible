review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría en casi todos los segmentos: causalidad de la derrota por pecado, retorno a Dios, confesión del nombre, oración y súplica, y ''en esta casa''. Sin embargo, ''sea derribado'' para בְּהִנָּגֵף suena menos natural en español para una derrota militar colectiva y puede sugerir caída física más que derrota ante un enemigo. El inglés auditado permite ''are struck down'' con alternativa ''are defeated''; en español ''sea derrotado'' preserva mejor el sentido militar sin perder la pasividad del contexto.'
  spanish_quality_summary: 'La redacción es clara y digna, pero la cadena con subjuntivos coordinados funciona mejor sin comas repetidas antes de cada ''y''. El principal ajuste es léxico-estilístico: ''tu pueblo Israel sea derrotado delante de un enemigo'' lee más natural y eclesialmente transparente que ''sea derribado''. El resto es legible y fiel.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece el nombre divino en este versículo. 'Confiesen tu nombre' respeta la decisión documentada para וְהוֹדוּ אֶת שְׁמֶךָ. 'Te supliquen' también concuerda bien con la revisión inglesa final.
  issues:
  - severity: medium
    issue: '''sea derribado'' no es la mejor opción para una derrota militar colectiva'
    rationale: Aunque puede defenderse lexicalmente, en español bíblico-natural 'derribado' suena más físico o individual. בְּהִנָּגֵף לִפְנֵי אוֹיֵב en este contexto se entiende mejor como derrota ante el enemigo; 'sea derrotado' comunica eso con más claridad.
  - severity: low
    issue: Puntuación algo cargada por repetición de comas en la serie verbal
    rationale: La secuencia 'y vuelvan..., y confiesen..., y oren...' puede mantenerse, pero suena más fluida en español si se reduce la puntuación innecesaria sin alterar el paralelismo.
  revised_spanish_text: Cuando tu pueblo Israel sea derrotado[a] delante de un enemigo por haber pecado contra ti, y vuelva a ti y confiese tu nombre y ore y te suplique en esta casa,
  revised_footnotes:
  - marker: a
    text: O "derribado", "abatido". El hebreo puede expresar ser golpeado, vencido o derrotado en contexto militar.
    reason: lexical_alternative
  revision_rationale: Se sustituye 'sea derribado' por 'sea derrotado' para reflejar con mayor naturalidad en español una derrota militar ante un enemigo. Además, se aligera la puntuación y se singularizan los verbos subordinados para concordar mejor con 'tu pueblo Israel' entendido como colectivo singular en español; el sentido permanece igual. Se conserva la nota de alternativa léxica para reflejar el matiz de נָגַף.
