lexical_decisions:
- source_word: ἤρχοντο
  english_pob_choice: came
  chosen_spanish: llegaban
  alternatives_spanish:
  - venían
  - venían llegando
  - llegaban continuamente
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o habitual en el pasado. «Llegaban» conserva ese valor aspectual mejor que un pretérito simple y suena natural en español.
- source_word: κρίσεις
  english_pob_choice: legal cases
  chosen_spanish: casos legales
  alternatives_spanish:
  - casos judiciales
  - causas legales
  - juicios
  lexicon: LSJ
  rationale: En este contexto forense, κρίσεις no son solo «juicios» abstractos, sino asuntos traídos para resolución. «Casos legales» reproduce bien la fuerza judicial del término y evita ambigüedad.
- source_word: ἐξ ἄλλων πόλεων
  english_pob_choice: from other cities
  chosen_spanish: de otras ciudades
  alternatives_spanish:
  - desde otras ciudades
  - de otras poblaciones
  - desde otras poblaciones
  lexicon: LSJ
  rationale: La frase de origen espacial se expresa de manera directa con «de otras ciudades», que corresponde naturalmente a πόλεων.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: hasta ellos
  alternatives_spanish:
  - ante ellos
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: πρός con acusativo indica movimiento hacia personas. «Hasta ellos» mantiene la idea de llegada dirigida a los jueces y resulta idiomático en español, sin forzar una expresión más interpretativa como «ante ellos».
translation_notes:
  revision_awareness: La base inglesa fue revisada de «were coming» a «came» para un pasado simple más natural, pero el griego conserva imperfecto; por eso la versión española mantiene el valor durativo con «llegaban». Se conservó la decisión auditada de traducir κρίσεις con un término forense explícito.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otra terminología teológica porque el versículo no contiene léxico divino.
  - «casos legales» se usa de forma consistente con el sentido judicial documentado en el POB inglés.
  - 'El orden español sigue de cerca la sintaxis griega sin sonar forzado: sujeto implícito + verbo durativo + complemento de procedencia + meta de llegada.'
