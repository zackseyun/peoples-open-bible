base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/004/016.yaml
  text: Awake[a], north wind, and come, south wind! Blow on my garden, so that its spices may flow[c][b]. Let my beloved come into his garden and eat its choice fruits.
  footnotes:
  - marker: a
    text: Hebrew 'north' and 'south'; 'wind' is supplied in English because the directions are addressed as agents who blow on the garden.
    reason: lexical_alternative
  - marker: b
    text: Or 'its perfume/fragrance may flow.' The Hebrew term can refer to aromatic spices or the scent they produce.
    reason: lexical_alternative
  - marker: c
    text: The shift from 'my garden' to 'his garden' is present in the Hebrew text and likely expresses mutual belonging within the lovers' imagery.
    reason: cross_reference
