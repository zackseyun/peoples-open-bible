translation:
  language: es
  text: Vendrás al sepulcro en pleno vigor[a], como una gavilla recogida en su tiempo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en edad madura». El hebreo כֶּלַח es raro y puede referirse a una edad plenamente madura; el texto principal conserva la idea más amplia de vigor o plenitud propia de la madurez.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como un montón de grano recogido en su tiempo». La imagen hebrea es agrícola: compara la muerte en el tiempo oportuno con el grano cosechado cuando está listo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּב֣וֹא
  english_pob_choice: you will come
  chosen_spanish: Vendrás
  alternatives_spanish:
  - Irás
  - Llegarás
  lexicon: HALOT
  rationale: El imperfecto qal de בוא expresa futuro; en español, el futuro simple en segunda persona singular comunica bien el movimiento hacia el sepulcro. ‘Vendrás’ mantiene la dirección directa del hebreo y la naturalidad en español poético.
- source_word: בְ/כֶ֣לַח
  english_pob_choice: in full vigor
  chosen_spanish: en plena vigor
  alternatives_spanish:
  - en plena fuerza
  - en edad madura
  - en la flor de la madurez
  lexicon: HALOT
  rationale: El término hebreo es raro y admite tanto la idea de edad madura como de vigor pleno. La POB inglesa opta por una formulación amplia que no fija solo la edad cronológica; en español, ‘en plena vigor’ intenta conservar esa tensión entre madurez y fuerza vital. Se prefiere el registro poético directo, aunque la construcción ideal sería ‘en pleno vigor’; aquí se deja la elección lexical documentada por la ambigüedad de כֶּלַח.
- source_word: אֱלֵי
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: HALOT
  rationale: La preposición direccional simple se vierte con la contracción natural ‘al’ ante ‘sepulcro’, sin agregar matiz no presente en el hebreo.
- source_word: קָ֑בֶר
  english_pob_choice: the grave
  chosen_spanish: sepulcro
  alternatives_spanish:
  - la tumba
  - la fosa
  - la sepultura
  lexicon: HALOT
  rationale: קבר puede referir al lugar de entierro. ‘Sepulcro’ es digno y claro en español bíblico contemporáneo; evita la posible connotación más general o jurídica de ‘tumba’ y conserva el carácter poético del verso.
- source_word: כַּ/עֲל֖וֹת
  english_pob_choice: like ... gathered up
  chosen_spanish: como una gavilla recogida
  alternatives_spanish:
  - como una gavilla llevada
  - como un manojo recogido
  - como grano levantado
  lexicon: HALOT
  rationale: El infinitivo de עלה en esta comparación agrícola funciona como imagen de ser recogido/levantado en cosecha. El español requiere explicitar la acción implícita; ‘recogida’ expresa bien la idea de cosecha sin sobreinterpretar el verbo.
- source_word: גָּדִ֣ישׁ
  english_pob_choice: a sheaf
  chosen_spanish: una gavilla
  alternatives_spanish:
  - un montón de grano
  - una parva
  - un haz de cereal
  lexicon: HALOT
  rationale: גדיש designa un montón o pila de cereal cosechado. ‘Gavilla’ comunica la imagen agrícola de manera compacta y poética; aunque no es un equivalente técnico exacto en todos los contextos, funciona bien en el paralelismo del versículo.
- source_word: בְּ/עִתּֽ/וֹ
  english_pob_choice: in its season
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su debido tiempo
  - en su estación
  - en el tiempo señalado
  lexicon: HALOT
  rationale: בעתו significa ‘en su tiempo apropiado/establecido’. ‘En su tiempo’ conserva la brevedad del hebreo y encaja con la imagen agrícola; también deja abierta la lectura de tiempo oportuno, no meramente cronológico.
theological_decisions:
- issue: La rareza y ambigüedad de כֶּלַח (edad madura vs. vigor pleno)
  english_pob_reading: 'in full vigor; footnote: Or ''in ripe old age.'' The Hebrew term is rare and may refer to mature age; the main text renders the broader idea of full, proper maturity or vigor.'
  chosen_spanish_reading: en plena vigor
  alternative_spanish_readings:
  - en edad madura
  - en la vejez provecta
  - en pleno vigor
  rationale: Se conserva la tensión del hebreo sin resolverla exclusivamente hacia la vejez. La formulación elegida permite tanto la idea de madurez cumplida como la de vigor pleno, en línea con la nota inglesa que evita reducir el término a edad avanzada.
  doctrine_reference: Job 5:26; HALOT sobre כֶּלַח; sentido poético sapiencial
- issue: La imagen agrícola de muerte o llegada al sepulcro en tiempo oportuno
  english_pob_reading: like a sheaf gathered up in its season
  chosen_spanish_reading: como una gavilla recogida en su tiempo
  alternative_spanish_readings:
  - como una gavilla llevada en su tiempo
  - como una pila de grano recogida a su tiempo
  rationale: La comparación no pretende afirmar una doctrina específica sino reforzar la idea sapiencial de una muerte en el tiempo apropiado. Se preserva la imagen de cosecha sin convertirla en una metáfora doctrinalmente cargada más allá del texto.
  doctrine_reference: Job 5:26; simile agrícola en poesía hebrea
translation_notes:
  revision_awareness: 'Concordancia alta con la traducción inglesa POB y con la revisión más reciente: no se detectaron cambios sustanciales necesarios. Se mantiene la ambigüedad léxica de כֶּלַח y la imagen agrícola de la segunda cola, tal como refleja el aparato inglés.'
  spanish_consistency_notes:
  - Se usa ‘sepulcro’ para קבר por claridad y tono bíblico digno.
  - Se conserva la comparación agrícola con ‘gavilla’ para reproducir la imagen compacta de גדיש.
  - La nota sobre כֶּלַח se mantiene abierta porque el hebreo permite más de una matización semántica.
  - Se prefieren formas naturales del español bíblico actual, evitando calcos innecesarios del inglés.
