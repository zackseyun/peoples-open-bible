translation:
  language: es
  text: Si haces el bien, sabe a quién se lo haces, y habrá esperanza[a] para tu buena obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo más explícitamente el griego: «habrá gracias para tus buenas obras». El hebreo también puede entenderse como «habrá esperanza para tu bienestar».'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם / ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT; LSJ
  rationale: La partícula condicional se rinde de forma natural con «si», conservando el valor hipotético y exhortativo sin convertir la frase en una certeza temporal.
- source_word: תֵּטִיב / εὖ ποιῇς
  english_pob_choice: you do good
  chosen_spanish: haces el bien
  alternatives_spanish:
  - haces lo bueno
  - haces el bien a alguien
  lexicon: HALOT; LSJ
  rationale: «Hacer el bien» expresa bien la acción benefactora del hebreo y del griego, y suena natural en español sin perder el matiz de acto de bondad hacia otro.
- source_word: תֵּדַע / γνῶθι
  english_pob_choice: know
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - reconoce
  - ten presente
  lexicon: HALOT; LSJ
  rationale: En imperativo exhortativo, «sabe» conserva la concisión de γνῶθι y de תֵּדַע. En español bíblico es comprensible, aunque más sobrio que «conoce» en este contexto.
- source_word: לְמִי / τίνι
  english_pob_choice: to whom
  chosen_spanish: a quién
  alternatives_spanish:
  - para quién
  - a quien
  lexicon: HALOT; LSJ
  rationale: La frase pide un destinatario; «a quién» es la equivalencia más directa y natural en español para el dativo/לְ.
- source_word: וִיהִי / καὶ ἔσται
  english_pob_choice: and there will be
  chosen_spanish: y habrá
  alternatives_spanish:
  - y habrá de haber
  - y será
  lexicon: HALOT; LSJ
  rationale: «Habrá» conserva el valor resultativo/futuro del hebreo y del griego sin forzar un subjuntivo de exhortación en español.
- source_word: תִקְוָה / χάρις
  english_pob_choice: hope / thanks
  chosen_spanish: habrá para tu buena obra
  alternatives_spanish:
  - habrá gracia para tu buena obra
  - habrá agradecimiento por tu buena obra
  - habrá esperanza para tu bienestar
  lexicon: HALOT; LSJ
  rationale: El hebreo de base apunta a una expectativa o resultado ligado al acto bueno, mientras que el griego explícitamente permite «gracia/agradecimiento» para las obras buenas. La redacción principal evita resolver la tensión entre recompensa, esperanza y gratitud, manteniendo una formulación amplia que no sobreinterpreta.
- source_word: לְטוֹבָתָךְ / τοῖς ἀγαθοῖς σου
  english_pob_choice: your good deed / your kindness
  chosen_spanish: tu buena obra
  alternatives_spanish:
  - tu bien
  - tu beneficio
  - tus buenas acciones
  lexicon: HALOT; LSJ
  rationale: «Tu buena obra» refleja la revisión inglesa más reciente («your good deed») y recoge el sentido benefactivo del hebreo con un español claro. También deja espacio para la lectura griega de «tus cosas buenas / tus buenas obras» sin reducirla solo a beneficio personal.
theological_decisions:
- issue: Tensión entre el hebreo (esperanza/beneficio) y el griego (gracia/agradecimiento) en la cláusula final
  english_pob_reading: The Hebrew could also be understood as 'there will be hope for your welfare,' while the Greek more explicitly reads 'there will be thanks for your good deeds.'
  chosen_spanish_reading: 'La traducción principal mantiene una formulación abierta: «habrá para tu buena obra», de modo que pueda abarcar tanto la expectativa de un buen resultado como la posibilidad de gratitud o reconocimiento por la acción.'
  alternative_spanish_readings:
  - habrá esperanza para tu bienestar
  - habrá agradecimiento por tu buena obra
  - habrá gracia para tu buena obra
  rationale: El testimonio hebreo y el griego no resuelven exactamente la misma idea en el mismo eje semántico. Conviene preservar esa tensión en español en vez de escoger una sola interpretación estrecha. La frase principal queda deliberadamente amplia y la nota registra las alternativas más relevantes.
  doctrine_reference: Preservar la tensión textual y semántica; primacía de la evidencia original con paralelos en vista.
translation_notes:
  revision_awareness: Esta línea sigue la revisión más reciente del POB inglés, que cambió de «your kindness» a «your good deed» para reflejar con más precisión לְטוֹבָתָךְ y mantener la coherencia con «do good». La versión española adopta esa orientación, pero evita cerrar el final en una sola lectura. También toma en cuenta que el griego usa χάρις, lo cual permite una alternativa de gratitud/gracia si se desea explicitarla en nota.
  spanish_consistency_notes:
  - Se usa «Dios» y no aparece terminología divina especial en este versículo.
  - Se evita «SEÑOR» porque no hay tetragrámaton en el texto.
  - «Hacer el bien» y «buena obra» mantienen el campo semántico benefactivo sin introducir lenguaje eclesiástico ajeno al proverbio sapiencial.
  - La puntuación conserva el ritmo breve del dicho sapiencial y deja abierta la relación entre beneficio, esperanza y gratitud.
