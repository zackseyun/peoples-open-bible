translation:
  language: es
  text: una nación de semblante feroz[a], que no muestra respeto al anciano[b] ni muestra favor al joven[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «una nación feroz de rostro».
    reason: lexical_alternative
  - marker: b
    text: 'O: «no levanta el rostro del anciano»; el hebreo usa un modismo de deferencia.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «ni tiene compasión del joven».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: HALOT
  rationale: גּוֹי designa normalmente un pueblo o nación como colectividad. En este contexto de juicio y amenaza extranjera, «nación» comunica con claridad el referente colectivo sin perder el matiz político.
- source_word: עַז פָּנִים
  english_pob_choice: fierce-faced
  chosen_spanish: de semblante feroz
  alternatives_spanish:
  - fiero de semblante
  - de rostro feroz
  - de cara dura
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente una cualidad de la פנים/rostro. «De semblante feroz» mantiene la imagen facial y su fuerza semántica en español más natural que una calca rígida.
- source_word: אֲשֶׁר
  english_pob_choice: one that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  - el que
  lexicon: HALOT
  rationale: Introduce la cláusula relativa que caracteriza a la nación. En español, «que» es la forma más natural y fiel sin añadir peso interpretativo.
- source_word: לֹא יִשָּׂא פָנִים לְזָקֵן
  english_pob_choice: shows no regard for the old
  chosen_spanish: no muestra respeto al anciano
  alternatives_spanish:
  - no hace acepción del anciano
  - no levanta el rostro del anciano
  - no muestra consideración al anciano
  lexicon: HALOT
  rationale: El modismo hebreo literalmente dice «no levanta rostro», pero aquí el sentido es no prestar deferencia al mayor. «No muestra respeto» conserva el valor idiomático y el matiz ético sin oscurecer el español.
- source_word: זָקֵן
  english_pob_choice: the old
  chosen_spanish: el anciano
  alternatives_spanish:
  - el viejo
  - el mayor
  - los ancianos
  lexicon: HALOT
  rationale: El singular funciona de modo genérico. «El anciano» es sobrio y claro en español bíblico contemporáneo, y evita una posible aspereza de «el viejo».
- source_word: וְנַעַר
  english_pob_choice: the young
  chosen_spanish: el joven
  alternatives_spanish:
  - la juventud
  - el muchacho
  - el muchacho joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar desde muchacho hasta joven. En paralelo con «el anciano», «el joven» reproduce bien la oposición de edades en español.
- source_word: לֹא יָחֹן
  english_pob_choice: shows no favor
  chosen_spanish: ni tiene compasión
  alternatives_spanish:
  - ni muestra favor
  - ni es favorable
  - ni se apiada
  lexicon: HALOT
  rationale: חנן expresa mostrar gracia/favor. En este paralelismo de dureza, «tener compasión» comunica bien la ausencia de benevolencia y mantiene una correspondencia natural con el miembro anterior.
theological_decisions:
- issue: Tratamiento del modismo hebreo de deferencia hacia la edad
  english_pob_reading: shows no regard for the old
  chosen_spanish_reading: no muestra respeto al anciano
  alternative_spanish_readings:
  - no levanta el rostro del anciano
  - no hace acepción del anciano
  rationale: 'Se preserva la tensión entre literalidad e inteligibilidad: el hebreo dice literalmente «no levanta el rostro», pero el sentido pragmático es la falta de deferencia hacia el mayor. La redacción elegida evita ocultar el contenido ético del juicio.'
  doctrine_reference: Sabiduría y honor debido a los mayores; cf. Levítico 19:32.
- issue: Matiz de חסד/חנן aplicado al joven
  english_pob_reading: shows no favor
  chosen_spanish_reading: ni tiene compasión
  alternative_spanish_readings:
  - ni muestra favor
  - ni se apiada
  rationale: En español, «compasión» expresa con naturalidad la ausencia de favor benevolente sin convertir el texto en un comentario moral ajeno. Se mantiene el paralelismo de rechazo total tanto al mayor como al joven.
  doctrine_reference: Tema bíblico de gracia/favor y su negación en juicio; cf. Éxodo 33:19 en el trasfondo léxico de חנן.
translation_notes:
  revision_awareness: 'Coincido con la última revisión: no se requirieron cambios sustantivos respecto del análisis auditado en inglés. La versión española mantiene el paralelismo del hebreo y conserva las dos alternativas idiomáticas principales mediante notas.'
  spanish_consistency_notes:
  - Se usa «anciano/joven» para mantener el contraste etario del hebreo y un registro bíblico sobrio.
  - Se evita «SEÑOR» y otras convenciones de máscara porque este versículo no contiene el tetragrámaton ni una cita explícita de κύριος.
  - La imagen facial de עַז פָּנִים se conserva con «semblante feroz» para no borrar la metáfora original.
  - La pareja verbal final se traduce con dos miembros distintos («muestra respeto» / «tiene compasión») para reflejar el paralelismo hebreo sin forzar repetición mecánica.
