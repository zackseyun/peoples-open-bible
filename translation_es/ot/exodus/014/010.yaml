base_translation:
  language: en
  yaml_path: translation/ot/exodus/014/010.yaml
  text: As Pharaoh drew near[a], the sons of Israel lifted up their eyes, and behold, the Egyptians were marching after them; and they were very afraid[b], and the sons of Israel cried out to Yahweh.
