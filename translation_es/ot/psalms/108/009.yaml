translation:
  language: es
  text: Galaad es mío[a]; Manasés es mío; Efraín es la fortaleza de mi cabeza[b]; Judá es mi vara de gobernante[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Galaad me pertenece».'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «la fortaleza de mi cabeza», una imagen poética de protección.'
    reason: lexical_alternative
  - marker: c
    text: 'También puede entenderse: «Judá es mi legislador» o «Judá es mi bastón de mando».'
    reason: alternative_reading
lexical_decisions:
- source_word: לִי
  english_pob_choice: is mine
  chosen_spanish: es mío
  alternatives_spanish:
  - me pertenece
  - es de mí
  lexicon: HALOT
  rationale: La preposición ל con sufijo de 1.ª persona expresa posesión. En español, «es mío» comunica con naturalidad esa pertenencia territorial y real sin añadir matices ajenos.
- source_word: גִלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: Nombre propio / convención bíblica en español
  rationale: Es un nombre propio geográfico y tribal. «Galaad» es la forma establecida en español bíblico y conserva la identificación del lugar.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: Nombre propio / convención bíblica en español
  rationale: Nombre propio tribal; se translitera según la forma habitual en español.
- source_word: מָעוֹז רֹאשִׁי
  english_pob_choice: the stronghold of my head
  chosen_spanish: la fortaleza de mi cabeza
  alternatives_spanish:
  - mi fortaleza en la cabeza
  - el refugio de mi cabeza
  lexicon: HALOT
  rationale: «מָעוֹז» expresa una fortaleza o lugar de defensa; «fortaleza» preserva la imagen militar. «de mi cabeza» mantiene el hebreo literal sin suavizarlo a una paráfrasis interpretativa.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: Nombre propio / convención bíblica en español
  rationale: Nombre propio tribal; se conserva la forma estándar en español.
- source_word: מְחֹקְקִי
  english_pob_choice: my ruler's staff
  chosen_spanish: mi bastón de mando
  alternatives_spanish:
  - mi cetro
  - mi legislador
  - mi vara de gobernante
  lexicon: HALOT
  rationale: El término puede referirse al bastón o insignia de gobierno, y también admite el sentido de «legislador». Dado el campo semántico y el contexto real-poético, «bastón de mando» comunica la función de autoridad sin forzar un tecnicismo litúrgico ni reducirlo solo a «cetro».
theological_decisions:
- issue: Imagen de posesión y reparto tribal bajo autoridad divina
  english_pob_reading: Gilead is mine; Manasseh is mine; Ephraim is the stronghold of my head; Judah is my ruler's staff.
  chosen_spanish_reading: Galaad es mío; Manasés es mío; Efraín es la fortaleza de mi cabeza; Judá es mi bastón de mando.
  alternative_spanish_readings:
  - Galaad me pertenece; Manasés me pertenece
  - Judá es mi legislador
  - Judá es mi vara de gobernante
  rationale: La línea enumera territorios/tribus como posesiones o instrumentos del dominio regio-divino. «Es mío» conserva la fuerza de pertenencia. Para la última cola, «bastón de mando» mantiene la idea de autoridad real sin desplazarla hacia una función judicial o docente que «legislador» podría sugerir en español.
  doctrine_reference: Translation philosophy §3, §5
- issue: Metáfora poética de protección en «Efraín es la fortaleza de mi cabeza»
  english_pob_reading: Literally 'Ephraim is the stronghold of my head,' a poetic image for protective strength.
  chosen_spanish_reading: Efraín es la fortaleza de mi cabeza
  alternative_spanish_readings:
  - Efraín es la fortaleza de mi vida
  - Efraín es mi defensa
  rationale: Se conserva la literalidad de la imagen porque el texto hebreo y el audit trail la tratan como metáfora poética de protección. No se expande a una explicación en el cuerpo del verso para no borrar la tensión imagética.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'El expediente inglés muestra dos ajustes: inicialmente se propuso una imagen real («scepter») y después se corrigió a «ruler''s staff» para acercarse más a מְחֹקְקִי. Por eso en español se evita «cetro» como forma principal y se eligió «bastón de mando», con nota sobre la alternativa «legislador». También se conservó la literalidad de «the stronghold of my head» en vez de suavizarla interpretativamente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se usa «es mío» para לִי por su fuerza posesiva idiomática.
  - 'Los nombres propios se adaptan a las formas bíblicas corrientes en español: Galaad, Manasés, Efraín, Judá.'
  - Se preserva la metáfora corporal «mi cabeza» sin convertirla en una explicación interpretativa en el texto principal.
