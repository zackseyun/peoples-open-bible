lexical_decisions:
- source_word: שֹׂנְאֶיךָ
  english_pob_choice: those who hate you
  chosen_spanish: los que te odian
  alternatives_spanish:
  - tus odiadores
  - los que te aborrecen
  lexicon: HALOT
  rationale: El participio plural con sufijo de 2ms funciona sustantivamente. En español, «los que te odian» conserva el sujeto personal y la relación directa con «te», con naturalidad y sin añadir matices ajenos.
- source_word: יִלְבְּשׁוּ
  english_pob_choice: will be clothed with
  chosen_spanish: se vestirán de
  alternatives_spanish:
  - serán vestidos con
  - llevarán
  lexicon: HALOT
  rationale: לבשׁ significa literalmente «vestir/ponerse». Para el giro metafórico con «vergüenza», «se vestirán de» conserva la imagen corporal en español y refleja bien la pasiva/resultativa del hebreo.
- source_word: בֹשֶׁת
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - afrenta
  lexicon: HALOT
  rationale: «Vergüenza» es el equivalente más natural y abarca tanto la dimensión interna como la pública del reproche. Mantiene la fuerza del sustantivo hebreo sin estrecharlo a un solo matiz.
- source_word: וְאֹהֶל
  english_pob_choice: and the tent
  chosen_spanish: y la tienda
  alternatives_spanish:
  - y el campamento
  - y la morada
  lexicon: HALOT
  rationale: אֹהֶל es literalmente «tienda». En español, «tienda» preserva la imagen concreta del texto y evita abstraerla demasiado pronto a «casa» o «hogar».
- source_word: רְשָׁעִים
  english_pob_choice: of the wicked
  chosen_spanish: de los impíos
  alternatives_spanish:
  - de los malvados
  - de los injustos
  lexicon: HALOT
  rationale: «Impíos» reproduce bien el valor de clase sustantiva del plural y es un término bíblico claro en español. Mantiene la oposición moral del pasaje sin perder la referencia colectiva.
- source_word: אֵינֶנּוּ
  english_pob_choice: will be no more
  chosen_spanish: no existirá más
  alternatives_spanish:
  - ya no será
  - será desaparecida
  lexicon: HALOT
  rationale: Aunque la forma hebrea es una negación existencial presente, el contexto de resolución futura favorece una traducción resultativa en futuro. «No existirá más» conserva el sentido de desaparición total y evita un calco rígido.
theological_decisions:
- issue: Valor temporal de la cláusula final
  english_pob_reading: 'future/resultative: ''the tent of the wicked will be no more'''
  chosen_spanish_reading: 'futuro/resultativo: «la tienda de los impíos no existirá más»'
  alternative_spanish_readings:
  - «la tienda de los impíos no es»
  - «la tienda de los impíos ya no existe»
  rationale: El contexto de los vv. 20–22 presenta consecuencias y desenlaces, por lo que en español conviene expresar el resultado en futuro. Así se mantiene la fuerza profética/afirmativa del dicho sin perder la base existencial del hebreo.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés: no hubo revisiones aplicadas y el control cruzado reporta alto acuerdo. La versión española sigue de cerca las decisiones léxicas documentadas, especialmente el futuro/resultativo final y la metáfora de vestirse de vergüenza.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona singular («te») conforme al hebreo con sufijo de 2ms.
  - Se conserva la imagen concreta de «tienda» en lugar de generalizar a «casa» o «hogar».
  - La nota al pie marca la alternativa más literal para la clausula final, siguiendo el patrón del POB inglés.
