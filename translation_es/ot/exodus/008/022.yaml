    issue: «hacer así» suena poco natural en español
    rationale: Aunque calca de cerca לַעֲשׂוֹת כֵּן, en español general y eclesial «hacer eso» es más idiomático y conserva exactamente la referencia anafórica.
  - severity: low
    issue: La combinación «Si sacrificáramos ... ¿no nos apedrearían?» puede afinarse estilísticamente
    rationale: No es incorrecta, pero «Si sacrificamos ... ¿no nos apedrearían?» reproduce bien la condición vívida introducida por הֵן y suena más natural en español contemporáneo.
