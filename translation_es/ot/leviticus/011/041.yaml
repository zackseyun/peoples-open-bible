revisions:
- from: Y todo ser que se arrastra y que se multiplica sobre la tierra es detestable[a][b]; no se comerá.
  to: Y todo ser que pulula sobre la tierra es detestable[b][a]; no se comerá.
  rationale: Se reemplaza «que se multiplica» por «pulula» para reflejar el sentido del participio hebreo sin añadir la idea de reproducción. También se simplifica la construcción para sonar más natural en español y se ajustan las notas para conservar las alternativas léxicas de la auditoría inglesa con mejor precisión semántica.
