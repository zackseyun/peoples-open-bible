translation:
  language: es
  text: Por la sangre que has derramado, te has hecho culpable, y por tus ídolos[a] que has hecho, te has vuelto impura. Has acercado tus días y has llegado a tus años[b]. Por eso te he hecho oprobio para las naciones y burla para todas las tierras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término traducido «ídolos» es una palabra hebrea despectiva, frecuente en Ezequiel para falsos dioses, con un matiz peyorativo más fuerte que un término neutral para imágenes.
    reason: cultural_note
  - marker: b
    text: 'O, de manera más interpretativa: «Has apresurado tus días y has llegado al fin de tus años». El hebreo parece aludir al acercamiento del tiempo señalado para el juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּדָמֵךְ
  english_pob_choice: by your blood
  chosen_spanish: Por la sangre que has derramado
  alternatives_spanish:
  - por tu sangre
  - a causa de tu derramamiento de sangre
  lexicon: HALOT
  rationale: La preposición ב con דם aquí funciona de manera causal/instrumental en el contexto de culpa. En español, «Por la sangre que has derramado» conserva la relación causal y hace explícita la idea de sangre derramada sin perder el valor compacto del hebreo.
- source_word: שָׁפַכְתְּ
  english_pob_choice: you have shed
  chosen_spanish: has derramado
  alternatives_spanish:
  - has vertido
  - derramaste
  lexicon: HALOT
  rationale: Con sangre, «derramar» es el equivalente natural y fiel de שׁפך. Mantiene la fuerza judicial de la expresión de sangre derramada.
- source_word: אָשַׁמְתְּ
  english_pob_choice: you have become guilty
  chosen_spanish: te has hecho culpable
  alternatives_spanish:
  - eres culpable
  - has incurrido en culpa
  lexicon: HALOT
  rationale: אָשַׁם expresa volverse culpable o cargar culpa. «Te has hecho culpable» conserva el matiz resultativo mejor que un simple estado y suena natural en español.
- source_word: גִלּוּלַיִךְ
  english_pob_choice: your idols
  chosen_spanish: tus ídolos
  alternatives_spanish:
  - tus ídolos inmundos
  - tus ídolos despreciables
  lexicon: HALOT
  rationale: «Ídolos» comunica el referente principal con claridad. El matiz despectivo de גִלּוּלִים se conserva en el contexto profético, aunque el español no reproduce literalmente la burla etimológica.
- source_word: טָמֵאת
  english_pob_choice: you have become unclean
  chosen_spanish: te has contaminado
  alternatives_spanish:
  - te has vuelto impura
  - te has hecho impura
  lexicon: HALOT
  rationale: טמא puede expresar quedar contaminado/impuro. «Te has contaminado» mantiene la fuerza de contaminación ritual-moral sin imponer una explicación doctrinal que no está explicitada en el versículo.
- source_word: וַתַּקְרִיבִי יָמַיִךְ
  english_pob_choice: You have brought your days near
  chosen_spanish: Has acercado tus días
  alternatives_spanish:
  - has apresurado tus días
  - has traído cerca tus días
  lexicon: HALOT
  rationale: קרב en hiphil significa acercar. «Has acercado tus días» sigue de cerca la metáfora hebrea y deja abierta la interpretación idiomática sobre el acercamiento del tiempo señalado.
- source_word: וַתָּבֹוא עַד שְׁנוֹתָיִךְ
  english_pob_choice: and have come to your years
  chosen_spanish: y has llegado a tus años
  alternatives_spanish:
  - y has alcanzado tus años
  - y has llegado al fin de tus años
  lexicon: HALOT
  rationale: La frase es idiomática y paralela a la anterior. «Has llegado a tus años» conserva la cercanía al hebreo sin añadir una paráfrasis más interpretativa en el texto principal.
- source_word: חֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - deshonra
  lexicon: HALOT
  rationale: חֶרְפָּה puede ser reproche, vergüenza o deshonra. «Oprobio» mantiene un tono profético y judicial, cercano a «reproach» y adecuado para el registro bíblico en español.
- source_word: קַלָּסָה
  english_pob_choice: a mockery
  chosen_spanish: burla
  alternatives_spanish:
  - mofa
  - escarnio
  lexicon: HALOT
  rationale: קלסה denota burla/escarnio. «Burla» es natural en español y preserva la segunda idea paralela sin confundirla con חֶרְפָּה.
- source_word: הָאֲרָצוֹת
  english_pob_choice: the lands
  chosen_spanish: todas las tierras
  alternatives_spanish:
  - todos los países
  - todas las naciones
  lexicon: HALOT
  rationale: En paralelo con «las naciones», «las tierras» conserva el sentido geopolítico amplio de אֲרָצוֹת. Se añadió «todas» para reflejar el alcance total del paralelismo.
theological_decisions:
- issue: Culpa de sangre y contaminación por idolatría
  english_pob_reading: The verse speaks of covenantal/judicial guilt from bloodshed and ritual-moral uncleanness from idolatry without importing later doctrinal categories.
  chosen_spanish_reading: El versículo presenta culpa real por derramamiento de sangre y contaminación moral-ritual por los ídolos, sin resolver esa tensión en categorías posteriores.
  alternative_spanish_readings:
  - Reducir la impureza a un sentido meramente ceremonial
  - Tratar la culpa como una metáfora sin peso judicial
  rationale: El hebreo une sangre derramada y contaminación como acusaciones proféticas concretas. La traducción conserva ambas dimensiones para no diluir ni la responsabilidad judicial ni la impureza moral.
  doctrine_reference: Preservar la tensión teológica, no reducirla.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el audit trail en inglés, manteniendo la equivalencia óptima adoptada allí. No hay revisiones aplicadas en el registro fuente, y el estado de concordancia es alto con solo observaciones menores.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la terminología del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se mantiene «ídolos» como término principal por claridad; el matiz despectivo se explica en nota en lugar de sobrecargar el texto principal.
  - Se traduce la duplicación paralela de culpa/impureza y días/años sin armonizarla artificialmente, para respetar la tensión poética del hebreo.
  - Se prefirió un español moderno y digno, evitando arcaísmos innecesarios, pero conservando el tono profético de juicio.
