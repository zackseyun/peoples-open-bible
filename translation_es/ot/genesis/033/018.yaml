revisions:
- from: Jacob llegó [a] en paz a la ciudad de Siquem, que está en la tierra de Canaán, cuando venía de Paddán-aram, y acampó frente a la ciudad.
  to: Jacob llegó en paz[a] a la ciudad de Siquem, que está en la tierra de Canaán, cuando llegó de Padán-aram, y acampó frente a la ciudad.
  rationale: Se ajusta el marcador de nota para cumplir el formato requerido y se cambia «cuando venía de» por «cuando llegó de» para reflejar mejor el valor temporal puntual de בְּבֹאוֹ, sin perder naturalidad ni repetir de manera problemática el verbo en español. No se requieren cambios doctrinales ni de terminología mayor.
