translation:
  language: es
  text: Tienen boca, pero no hablan; ojos, pero no ven.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פֶּה
  english_pob_choice: mouths
  chosen_spanish: boca
  alternatives_spanish:
  - bocas
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular con referencia distributiva a los ídolos en plural. En español, para un miembro del cuerpo o un rasgo físico en una enumeración poética, el singular colectivo "boca" suena más natural que el plural, sin perder el sentido distributivo del texto.
- source_word: לָהֶם
  english_pob_choice: they have
  chosen_spanish: tienen
  alternatives_spanish:
  - hay en ellos
  - les pertenece
  lexicon: HALOT
  rationale: 'La preposición ל con sufijo pronominal expresa posesión idiomática. En español, "tienen" comunica de forma natural esa posesión y conserva la ironía del pasaje: poseen boca y ojos, pero no funcionan.'
- source_word: וְלֹא
  english_pob_choice: but they do not
  chosen_spanish: pero no
  alternatives_spanish:
  - y no
  lexicon: HALOT
  rationale: La conjunción con negación introduce contraste adversativo entre la presencia de órganos y su falta de función. "Pero no" reproduce mejor ese giro que un simple "y no".
- source_word: יְדַבֵּרוּ
  english_pob_choice: speak
  chosen_spanish: hablan
  alternatives_spanish:
  - hablen
  - dicen
  lexicon: HALOT
  rationale: El piel imperfecto de דבר indica el acto de hablar. "Hablan" es el equivalente español más natural y digno en este paralelismo poético; "dicen" sería menos preciso y "hablen" sugeriría un matiz modal no presente en el hebreo.
- source_word: עֵינַיִם
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - mirada
  lexicon: HALOT
  rationale: Equivalente léxico directo. "Ojos" mantiene la imagen corporal concreta y el paralelismo con "boca".
- source_word: יִרְאוּ
  english_pob_choice: see
  chosen_spanish: ven
  alternatives_spanish:
  - miran
  - vean
  lexicon: HALOT
  rationale: El qal imperfecto de ראה significa "ver". "Ven" expresa de manera directa la incapacidad sensorial descrita por el texto y conserva el paralelismo con "hablan".
theological_decisions:
- issue: Referente de los pronombres plurales implícitos
  english_pob_reading: The verse continues the description of idols from the previous context, so the pronouns are rendered personally as 'they' in English.
  chosen_spanish_reading: 'El verso sigue describiendo a los ídolos; por eso se los expresa en español con un sujeto personal plural implícito: "tienen... hablan... ven".'
  alternative_spanish_readings:
  - '"Tienen boca, pero no habla; ojos, pero no ve"'
  - '"A ellos les pertenece boca..."'
  rationale: El hebreo atribuye órganos a los ídolos en plural colectivo y luego niega su funcionamiento. En español, la tercera persona plural mantiene la sátira del pasaje y evita una construcción pesada o artificial, sin introducir interpretación ajena al texto.
  doctrine_reference: Salmos 115:4-8; Isaías 44:9-20
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: no hubo revisiones aplicadas en la base inglesa y la lectura española sigue la equivalencia óptima sin suavizar el sarcasmo del salmo.'
  spanish_consistency_notes:
  - Se mantiene el registro poético y sobrio.
  - Se evita 'SEÑOR' porque no aparece el Tetragrámaton en este versículo.
  - Se conserva la fuerza negativa y contrastiva del hebreo con 'pero no'.
