revisions:
- from: Y Yahvé despertó contra Joram el espíritu de los filisteos y de los árabes, que estaban junto a los cusitas[a][b][c].
  to: Y Yahvé suscitó contra Joram el espíritu de los filisteos y de los árabes, que estaban cerca de los cusitas[a][b][c].
  rationale: Se reemplaza «despertó» por «suscitó» para reflejar con mejor español el sentido de levantar hostilidad contra Joram. Se ajusta «junto a» a «cerca de» para alinearlo con la decisión auditada final sobre proximidad geográfica. También se corrige la nota c para que describa una variante de formulación y no una lectura alternativa del sentido hebreo.
