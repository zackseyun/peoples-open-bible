revisions:
- from: Y sucedió[a], cuando la congregación se reunió contra Moisés y contra Aarón, que se volvieron hacia el tabernáculo de reunión, y he aquí, la nube lo cubrió, y la gloria de Yahvé apareció.
  to: Y sucedió que, cuando la congregación se reunió contra Moisés y contra Aarón, se volvieron hacia la tienda de reunión; y he aquí, la nube la cubrió[a], y la gloria de Yahvé apareció.
  rationale: Se revisa principalmente para ajustarse a la decisión fuente de אֹהֶל מוֹעֵד como «tienda de reunión» en vez de «tabernáculo de reunión», que era más interpretativo. Esa corrección exige adaptar el pronombre a la gramática natural del español («la cubrió») y reformular la nota para explicar la diferencia entre el sufijo hebreo masculino y la concordancia española. También se mueve el anclaje de la nota al lugar pertinente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:49Z'
