revisions:
- from: Dios está en medio de ella[a]; no será conmovida[b]. Dios la ayudará cuando despunte la mañana[c].
  to: Dios está dentro de ella[a]; no será sacudida[b]. Dios la ayudará cuando despunte la mañana[c].
  rationale: Se ajusta «בקרבה» a «dentro de ella» para seguir la elección principal del POB y se deja «en medio de ella» como alternativa legítima. Se reemplaza «no será conmovida» por «no será sacudida» para un español más natural y para expresar mejor la imagen de estabilidad frente a מוט. Se corrige la nota [a] para que no repita el texto principal. Se conserva la última cláusula porque es fiel, natural y ya refleja la revisión auditada del POB.
  reviewer_model: gpt-5.4
