theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of חֶסֶד in Hosea's covenant lawsuit context
  chosen_reading: covenant faithfulness
  alternative_readings:
  - steadfast love
  - mercy
  - loyalty
  rationale: In this prophetic accusation, the term points to failed covenant loyalty in the community, not merely lack of compassion. The chosen rendering preserves the theological covenant dimension central to Hosea.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Scope of הָאָרֶץ
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The immediate audience is Israel and the accusation is covenantal; 'land' better preserves the likely reference to the covenant land rather than universalizing the statement beyond the verse's plain sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
