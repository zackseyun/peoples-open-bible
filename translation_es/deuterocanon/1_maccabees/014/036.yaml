  to: Y en sus días prosperó en sus manos para quitar a las naciones de su tierra, y a los de la ciudad de David en Jerusalén, que se habían hecho para sí una ciudadela[a], desde la cual salían y contaminaban el área alrededor del santuario, y causaban gran daño a su pureza.
  rationale: Se reemplaza «acrópolis» por «ciudadela» para reflejar mejor ἄκραν y alinearse con la decisión léxica auditada del POB, dejando «la Acra» en nota como alternativa histórica. También se ajusta «infligían» a «causaban» por mayor naturalidad en español, sin alterar el sentido.
