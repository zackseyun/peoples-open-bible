translation:
  language: es
  text: Entonces Jacob tomó una piedra y la levantó como un pilar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estela» o «piedra memorial». El hebreo מַצֵּבָה denota una piedra erigida, un marcador o un pilar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - recogió
  lexicon: HALOT
  rationale: El verbo básico לקח en esta construcción narrativa se entiende naturalmente como ‘tomar’; ‘tomó’ conserva la sencillez verbal del hebreo y encaja bien en español narrativo.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: N/A (nombre propio)
  rationale: Se mantiene la forma de nombre propia usada de modo estándar en español bíblico y en el texto auditado en inglés.
- source_word: אָבֶן
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - una piedra
  - una roca
  lexicon: HALOT
  rationale: אָבֶן designa una piedra singular; ‘piedra’ es natural en español y conserva el referente físico sin añadir matices no presentes.
- source_word: וַיְרִימֶהָ
  english_pob_choice: set it up
  chosen_spanish: la levantó
  alternatives_spanish:
  - la erigió
  - la puso en pie
  lexicon: HALOT
  rationale: El verbo רום/רים con sufijo pronominal expresa elevar/poner en alto la piedra. ‘La levantó’ refleja con fidelidad el gesto físico y permite que la frase siguiente explicite su función.
- source_word: מַצֵּבָה
  english_pob_choice: as a pillar
  chosen_spanish: como una columna
  alternatives_spanish:
  - como un pilar
  - como una piedra memorial
  - como una estela
  lexicon: HALOT
  rationale: מַצֵּבָה puede ser ‘pilar’, ‘estela’ o piedra erguida/memorial. ‘Columna’ es una opción española comprensible y relativamente neutra para el objeto erguido, sin decidir de antemano entre lectura memorial o cultual; así se conserva la tensión lexical documentada por el texto.
theological_decisions:
- issue: Valor de מַצֵּבָה en un contexto donde la piedra erigida puede entenderse como marcador memorial o tener asociaciones cultuales posteriores
  english_pob_reading: pillar
  chosen_spanish_reading: columna
  alternative_spanish_readings:
  - pilar
  - estela
  - piedra memorial
  rationale: El versículo solo describe el acto de erigir la piedra. No explicita su función religiosa posterior, así que conviene preservar la ambigüedad del término hebreo en vez de resolverla por una interpretación más cargada. ‘Columna’ comunica la forma erguida sin imponer una lectura doctrinal o cultual adicional.
  doctrine_reference: Mantener la tensión léxica y no sobreinterpretar el signo material; primacía del hebreo sobre la tradición interpretativa.
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios respecto del juicio auditado en inglés; la opción española conserva el acto físico de erigir la piedra y deja abierta la fuerza exacta de מַצֵּבָה.'
  spanish_consistency_notes:
  - 'Se conserva el orden narrativo simple del hebreo: acción + objeto + acción + complemento.'
  - ‘Tomó’ y ‘la levantó’ mantienen el paralelismo verbal sin sobreexplicar.
  - Se evita ‘SEÑOR’ o terminología no presente en el versículo.
  - La nota de pie preserva las alternativas léxicas documentadas por el POB en inglés, adaptadas al campo semántico natural del español.
