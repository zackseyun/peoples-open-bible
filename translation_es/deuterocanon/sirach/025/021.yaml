review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo principal: conserva la advertencia contra quedar cautivado por la belleza de una mujer y mantiene la segunda cláusula específica sobre desear lo que ella tiene, en vez de adoptar la forma griega más breve. Sin embargo, la nota contiene un error léxico grave en español (''lustres tras'') y conviene ajustar la redacción para reflejar mejor la alternativa griega documentada.'
  spanish_quality_summary: El texto principal es natural, claro y digno. 'No te dejes cautivar' comunica bien el idiomatismo de אַל תִּפּוֹל, y 'lo que le pertenece' reproduce bien וְעַל יֵש לָהּ. La calidad general es buena; la reparación necesaria está en la nota al pie, que actualmente tiene una forma incorrecta y poco legible en español.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Mujer', 'belleza' y 'codicies' son opciones coherentes con las decisiones léxicas auditadas. 'Codicies' incluso preserva bien el matiz ético de חמד en este contexto.
  issues:
  - severity: medium
    issue: La nota al pie usa la forma incorrecta 'lustres tras una mujer'.
    rationale: En español 'lustrar' no corresponde al inglés 'lust after'. La nota debe expresar la alternativa griega como 'no desees a una mujer' o 'no codicies a una mujer', sin introducir un barbarismo que dañe la comprensión.
  - severity: low
    issue: La nota mezcla comillas y glosa bilingüe de forma poco pulida.
    rationale: La documentación inglesa registra una alternativa de lectura, no una transliteración conceptual. Conviene presentar una alternativa española limpia y luego explicar que el hebreo es más específico.
  revised_spanish_text: No te dejes cautivar por la belleza de una mujer[a], ni codicies lo que le pertenece.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «y no desees a una mujer». El testimonio hebreo es más específico aquí, al advertir contra desearla por causa de lo que tiene.'
    reason: alternative_reading
  revision_rationale: Se conserva intacto el texto principal porque es fiel al hebreo, idiomático en español y consistente con la decisión auditada de no repetir 'mujer' en la segunda cláusula. Se revisa únicamente la nota para corregir el error léxico 'lustres', mejorar la legibilidad en español y reflejar de manera limpia la alternativa del paralelo griego.
