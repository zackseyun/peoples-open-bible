translation:
  language: es
  text: Pero cuando las multitudes estaban a punto de apoderarse de la torre, y estaban forzando la puerta del atrio, y ordenaban que se trajera fuego y que se prendieran las puertas, él, completamente rodeado, se aplicó la espada[a];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "se arrojó sobre su espada" o "se clavó la espada en sí mismo". El griego dice más literalmente: "puso" o "aplicó" la espada a sí mismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν ... πληθῶν
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - la multitud
  - las masas
  - la muchedumbre
  lexicon: LSJ
  rationale: πλῆθος designa una multitud o gran agrupación de personas. En español, "las multitudes" conserva el sentido colectivo sin añadir el matiz despectivo de "muchedumbre" ni el tono sociológico de "masas".
- source_word: μελλόντων
  english_pob_choice: were about to
  chosen_spanish: estaban a punto de
  alternatives_spanish:
  - iban a
  - se disponían a
  - estaban por
  lexicon: LSJ
  rationale: El participio indica inminencia. "Estaban a punto de" comunica bien que la acción era inminente, sin volverla presente ni concluirla.
- source_word: τὸν πύργον καταλαβέσθαι
  english_pob_choice: to seize the tower
  chosen_spanish: apoderarse de la torre
  alternatives_spanish:
  - tomar la torre
  - capturar la torre
  - apresar la torre
  lexicon: LSJ
  rationale: καταλαμβάνω puede expresar tomar posesión o capturar. "Apoderarse de" suena natural en español para una toma violenta o de asedio y conserva la idea de tomar control.
- source_word: τὴν αὐλαίαν θύραν
  english_pob_choice: the courtyard gate
  chosen_spanish: la puerta del atrio
  alternatives_spanish:
  - la puerta del patio
  - la puerta del recinto
  - la puerta del patio interior
  lexicon: LSJ
  rationale: αὐλαία remite al ámbito del atrio o patio interior; θύρα puede ser puerta o portón. "Puerta del atrio" mantiene el espacio arquitectónico sin forzar una especificación moderna que el griego no exige.
- source_word: βιαζομένων
  english_pob_choice: were forcing
  chosen_spanish: estaban forzando
  alternatives_spanish:
  - estaban irrumpiendo con ძალ
  - presionaban violentamente
  - hacían fuerza contra
  lexicon: LSJ
  rationale: βιάζω implica uso de fuerza. "Estaban forzando" es idiomático y preserva la violencia del asalto sin introducir una imagen más concreta de la que ofrece el texto.
- source_word: κελευόντων πῦρ προσάγειν
  english_pob_choice: were ordering that fire be brought
  chosen_spanish: ordenaban que se trajera fuego
  alternatives_spanish:
  - mandaban traer fuego
  - ordenaban acercar fuego
  - mandaban que se acercara fuego
  lexicon: LSJ
  rationale: κελεύω es ordenar o mandar; προσάγειν con πῦρ expresa llevar fuego hacia algo para usarlo. "Que se trajera fuego" sigue de cerca la estructura y mantiene la secuencia de órdenes.
- source_word: τὰς θύρας ὑφάπτειν
  english_pob_choice: the doors set on fire
  chosen_spanish: que se prendieran las puertas
  alternatives_spanish:
  - que se encendieran las puertas
  - que se abrasaran las puertas
  - que se les prendiera fuego a las puertas
  lexicon: LSJ
  rationale: ὑφάπτω significa prender, encender, poner fuego debajo o a algo. "Que se prendieran las puertas" recoge el acto de incendiarlas en un español natural y no añade la repetición explicativa que el griego ya evita en esta redacción.
- source_word: περικάλυπτος γενόμενος
  english_pob_choice: completely surrounded
  chosen_spanish: completamente rodeado
  alternatives_spanish:
  - rodeado por completo
  - completamente cercado
  - envuelto por todos lados
  lexicon: LSJ
  rationale: La expresión indica estar cercado o envuelto. "Completamente rodeado" transmite bien la situación militar sin desviar el sentido hacia "cubierto" en un sentido literal no contextual.
- source_word: ὑπέθηκεν ἑαυτῷ τὸ ξίφος
  english_pob_choice: put the sword to himself
  chosen_spanish: se puso la espada sobre sí mismo
  alternatives_spanish:
  - se clavó la espada
  - se arrojó sobre la espada
  - se aplicó la espada a sí mismo
  lexicon: LSJ
  rationale: El griego dice literalmente que "aplicó/puso la espada a sí mismo". En español, "se puso la espada sobre sí mismo" intenta conservar esa literalidad sin convertirlo en una formulación idiomática más interpretativa ni especificar mecánicamente la herida.
theological_decisions:
- issue: Descripción del acto de autolesión/suicidio de Razis
  english_pob_reading: put the sword to himself
  chosen_spanish_reading: se puso la espada sobre sí mismo
  alternative_spanish_readings:
  - se clavó la espada
  - se arrojó sobre la espada
  - se mató con la espada
  rationale: El texto griego es sobrio y literal; la versión española mantiene esa sobriedad para no suavizar ni dramatizar de más el acto. Así se preserva la gravedad narrativa y la ambigüedad mecánica del original, sin convertirlo en una idiomática posterior que podría desplazar el énfasis del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La base inglesa revisada eliminó el redundante "and burned" porque el griego encadena dos verbos casi sinónimos para el incendio de las puertas, no una acción adicional separada. La traducción española sigue esa revisión y evita añadir una segunda acción independiente, manteniendo la secuencia única de incendio.
  spanish_consistency_notes:
  - Se usa "Yahvé" como término por defecto solo cuando el texto lo requiera; en este versículo no aparece.
  - '"Puerta del atrio" conserva el marco arquitectónico del asedio sin introducir una interpretación eclesiástica.'
  - '"Completamente rodeado" refleja el estado de cerco antes del acto final, en consonancia con la lectura inglesa auditada.'
  - La nota al pie conserva la alternativa literal importante, porque el español también ofrece varias maneras de reproducir ὑπέθηκεν ἑαυτῷ τὸ ξίφος.
