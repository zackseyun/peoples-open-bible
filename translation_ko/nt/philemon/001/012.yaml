id: PHM.1.12
reference: Philemon 1:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃν ἀνέπεμψά ⸂σοι αὐτόν, τοῦτ’ ἔστιν τὰ ἐμὰ σπλάγχνα⸃·
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/012.yaml
  text: I am sending him back to you—him[a], that is[b], my very heart.
  footnotes:
  - marker: a
    text: Or, more formally, 'I have sent him back to you' or 'I sent him back to you.' The Greek aorist can be represented in different ways in English; the present form reflects the letter's perspective as it reaches Philemon.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'my inward parts'; idiomatically, a term for deep affection or tender compassion.
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 그를 그대에게 돌려보냅니다[a]—바로 그를, 곧 나의 심장[b]을.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 더 격식 있게 「내가 그를 그대에게 돌려보냈습니다」. 헬라어 부정과거(aorist)는 영어처럼 다양하게 옮길 수 있으며, 편지가 빌레몬에게 도착하는 시점의 시각을 살려 현재형으로 표현한다.
    reason: lexical_alternative
  - marker: b
    text: 직역하면 「나의 내장(內臟)」; 관용적으로 깊은 정·온정의 자리를 가리키는 표현. 7절·20절과 호응하는 핵심 단어.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν
  english_pob_choice: him
  chosen_korean: 그를
  alternatives_korean:
  - 그 사람을
  lexicon: BDAG
  rationale: 오네시모를 가리키는 관계대명사. 한국어에서는 새 문장의 직접목적어 「그를」로 자연스럽게 옮긴다.
- source_word: ἀνέπεμψά
  english_pob_choice: I am sending ... back
  chosen_korean: 돌려보냅니다
  alternatives_korean:
  - 돌려보냈습니다
  - 다시 보냅니다
  lexicon: BDAG
  rationale: 부정과거이지만, 편지가 도착하는 시점의 수신자 관점을 살려 한국어 현재형 「돌려보냅니다」가 자연스럽다. 합성동사 ἀνα-의 「되돌림」 의미는 「돌려」가 담아낸다.
- source_word: σοι
  english_pob_choice: to you
  chosen_korean: 그대에게
  lexicon: BDAG
  rationale: 빌레몬 합쇼체 호칭.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_korean: 바로 그를
  alternatives_korean:
  - 그를 곧
  - 그를 친히
  lexicon: BDAG
  rationale: σοι 뒤의 강조적 αὐτόν 반복. 한국어 「바로 그를」이 강조와 반복의 무게를 자연스럽게 살린다.
- source_word: τοῦτ’ ἔστιν
  english_pob_choice: that is
  chosen_korean: 곧
  alternatives_korean:
  - 즉
  - 곧 ~을 말합니다
  lexicon: BDAG
  rationale: 동격 설명을 도입하는 정형 표현. 한국어 「곧」이 가장 간결하고 자연스럽다.
- source_word: τὰ ἐμὰ σπλάγχνα
  english_pob_choice: my very heart
  chosen_korean: 나의 심장
  alternatives_korean:
  - 나의 마음 그 자체
  - 내 속사람
  - 내 심정
  lexicon: BDAG
  rationale: σπλάγχνα는 깊은 정의 자리이다. 7절·20절에서 「마음」으로 옮겼지만, 12절은 바울이 오네시모를 자기 자신의 가장 깊은 자리와 동일시하는 극도로 강한 정서적 동일시를 표현한다. 「심장」이 그 압축적 강도와 신체적 비유의 무게를 「마음」보다 더 잘 담아낸다. 영어 POB의 「my very heart」와 같은 강조 효과.
theological_decisions:
- issue: σπλάγχνα를 「심장」으로 옮김 (7절·20절의 「마음」과 어휘 차이)
  chosen_reading: 심장
  alternative_readings:
  - 마음
  - 속사람
  - 심정
  rationale: 본 절은 바울이 오네시모를 자기 자신의 가장 깊은 자리와 동일시하는 절정적 표현이다. 7절(성도들의 σπλάγχνα가 새 힘을 얻음)·20절(나의 σπλάγχνα를 새롭게 하라)에서는 「마음」으로 옮겼지만, 12절의 동일시(「곧 나의 ...」)는 신체적 비유의 무게가 더 강조되므로 「심장」이 본문의 강도를 더 잘 살린다. 이 어휘 차이는 의식적 결정이며 lexical_decisions에 명시했다.
  doctrine_reference: 'Translation philosophy: optimal equivalence; 본문의 정서적 강도 보존'
