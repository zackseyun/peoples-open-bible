revisions:
- from: 'Así dice Yahvé: Guardad la justicia[a], y haced la rectitud; porque cerca está mi salvación de venir[b], y mi justicia ha de ser revelada.'
  to: 'Así dice Yahvé: Guarden la justicia y hagan la rectitud, porque mi salvación[a] está cerca de llegar, y mi justicia[b] ha de ser revelada.'
  rationale: Se corrigen los anclajes de las notas para que correspondan a los términos pertinentes del hebreo y del audit trail inglés. También se ajusta el registro verbal a un español latinoamericano más neutral ('Guarden... hagan') y se suaviza la construcción de inminencia a una forma más idiomática ('está cerca de llegar') sin perder el sentido de לָבוֹא. Se mantiene 'rectitud' para distinguirla de 'justicia' en el primer hemistiquio, y 'mi justicia' en el segundo para conservar la amplitud teológica documentada para צִדְקָתִי.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:25:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y preserva correctamente el nombre divino Yahvé, la relación lógica de כי, la inminencia de la salvación y la pasiva de ''ser revelada''. Sin embargo, los anclajes de las notas están invertidos respecto al inglés auditado: la alternativa ''mi liberación'' corresponde a ''mi salvación'', no a ''justicia''; y la nota sobre ''mi justicia / mi vindicación'' corresponde a ''mi justicia'', no a ''de venir / ha de ser revelada''.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'Guardad... haced' suena peninsular/arquitípico frente al objetivo neutral latinoamericano. Además, 'la rectitud' es comprensible pero algo menos natural aquí que 'la justicia' o 'lo que es recto'; conviene conservar la distinción léxica sin forzar una expresión poco idiomática. 'Mi salvación está cerca de venir' funciona, pero 'está cerca de llegar' suena más natural en español sin perder sentido.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: יְהוָה -> ''Yahvé'' está correcto; יְשׁוּעָה -> ''salvación'' está correcto con alternativa ''liberación''; צִדְקָה en el segundo colon debe mantenerse con valor amplio, y en español ''justicia'' con nota de alternativa ''vindicación'' respeta mejor la documentación. La distinción entre מִשְׁפָּט y צְדָקָה debe mantenerse, pero puede hacerse con ''justicia'' / ''rectitud'' sin problema si la frase sigue siendo idiomática.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a los términos equivocados.
    rationale: La nota [a] dice 'O «mi liberación»', pero está colocada sobre 'la justicia'; debe ir sobre 'mi salvación'. La nota [b] sobre 'mi justicia'/'mi vindicación' debe anclarse a 'mi justicia', no al segmento 'de venir'.
  - severity: medium
    issue: Registro verbal poco neutral para el objetivo de español latinoamericano amplio.
    rationale: '''Guardad'' y ''haced'' son correctos pero marcadamente peninsulares/litúrgicos. ''Guarden'' y ''hagan'' se ajustan mejor al estilo neutral latinoamericano pedido, manteniendo dignidad y claridad.'
  - severity: low
    issue: La expresión 'mi salvación de venir' es menos natural en español actual.
    rationale: Aunque refleja el infinitivo hebreo, en español suena forzada. 'Mi salvación está cerca de llegar' o 'está por venir' comunica la misma inminencia con mejor fluidez.
  revised_spanish_text: 'Así dice Yahvé: Guarden la justicia y hagan la rectitud, porque mi salvación[a] está cerca de llegar, y mi justicia[b] ha de ser revelada.'
  revised_footnotes:
  - marker: a
    text: O «mi liberación».
    reason: lexical_alternative
  - marker: b
    text: O «mi rectitud» o «mi vindicación».
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a los términos pertinentes del hebreo y del audit trail inglés. También se ajusta el registro verbal a un español latinoamericano más neutral ('Guarden... hagan') y se suaviza la construcción de inminencia a una forma más idiomática ('está cerca de llegar') sin perder el sentido de לָבוֹא. Se mantiene 'rectitud' para distinguirla de 'justicia' en el primer hemistiquio, y 'mi justicia' en el segundo para conservar la amplitud teológica documentada para צִדְקָתִי.
