translation:
  language: es
  text: Ten misericordia de tu nación[b], contentándote con nuestro castigo por ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedando satisfecho con nuestro castigo por ellos».
    reason: lexical_alternative
  - marker: b
    text: La frase «por ellos» conserva el sentido representativo del griego sin precisar un modelo doctrinal posterior de expiación.
    reason: theological_note
lexical_decisions:
- source_word: ἵλεως
  english_pob_choice: merciful
  chosen_spanish: Sé propicio
  alternatives_spanish:
  - Ten misericordia
  - Sé misericordioso
  lexicon: BDAG
  rationale: En la expresión idiomática ἵλεως γενοῦ, el valor es una súplica por favor misericordioso. «Sé propicio» conserva el sentido de benevolencia favorable sin volver la frase demasiado dura o mecánica en español.
- source_word: γενοῦ
  english_pob_choice: be
  chosen_spanish: Sé
  alternatives_spanish:
  - Hazte
  - Llega a ser
  lexicon: BDAG
  rationale: El imperativo medio aoristo funciona aquí idiomáticamente con ἵλεως; en español la equivalencia natural es una súplica directa con «sé», no un calco de «llegar a ser».
- source_word: τῷ ἔθνει σου
  english_pob_choice: to your nation
  chosen_spanish: para con tu nación
  alternatives_spanish:
  - para con tu pueblo
  - a tu nación
  lexicon: BDAG
  rationale: ἔθνος puede significar «nación» o «pueblo». Se mantiene «nación» para conservar el referente colectivo del griego, y «para con» expresa la dirección relacional de la petición en un español natural.
- source_word: ἀρκεσθεὶς
  english_pob_choice: being satisfied with
  chosen_spanish: quedando satisfecho con
  alternatives_spanish:
  - contentándote con
  - dando por suficiente
  lexicon: BDAG
  rationale: El participio de ἀρκέω expresa considerar algo suficiente. «Quedando satisfecho con» comunica que se pide aceptar como suficiente lo ya sufrido, sin endurecer el tono ni perder el matiz de suficiencia.
- source_word: τῇ ἡμετέρᾳ ... δίκῃ
  english_pob_choice: our punishment
  chosen_spanish: nuestro castigo
  alternatives_spanish:
  - nuestra pena
  - nuestra sentencia
  - nuestra justicia
  lexicon: BDAG
  rationale: δίκη puede abarcar justicia, pena o castigo. En este contexto martirial, «castigo» es la opción más clara en español para el sufrimiento penal asumido por los hablantes.
- source_word: περὶ αὐτῶν
  english_pob_choice: on their behalf
  chosen_spanish: por ellos
  alternatives_spanish:
  - en favor de ellos
  - a su favor
  - por causa de ellos
  lexicon: BDAG
  rationale: La preposición περί con genitivo puede ser «acerca de», pero en este contexto intercesorio mantiene un sentido representativo. «Por ellos» preserva esa fuerza sin especificar una teoría posterior de expiación.
theological_decisions:
- issue: Fuerza representativa del sufrimiento en περὶ αὐτῶν
  english_pob_reading: The verse presents the speakers' punishment as borne on behalf of the nation, without importing a full later doctrinal theory of atonement.
  chosen_spanish_reading: El verso presenta el castigo de los hablantes como padecido por la nación, sin importar una teoría doctrinal posterior de expiación.
  alternative_spanish_readings:
  - por ellos en un sentido más general de referencia
  - en favor de ellos como mera intercesión
  rationale: 'Se conserva la tensión teológica del texto: hay representación e intercesión, pero no se añade una formulación doctrinal que el griego no explicita.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Texto elaborado a partir del griego de Swete y del aparato de auditoría en inglés; se mantuvo la equivalencia óptima y la tensión representativa de περί αὐτῶν sin sobreexplicar el trasfondo doctrinal.
  spanish_consistency_notes:
  - Se prefirió «nación» para ἔθνος por coherencia con la lectura inglesa auditada y para conservar el colectivo del original.
  - «Castigo» se usó para δίκη en este contexto martirial; «justicia» quedaría demasiado abstracto en español.
  - «Por ellos» mantiene la referencia representativa de περί αὐτῶν y evita una paráfrasis doctrinal más fuerte.
