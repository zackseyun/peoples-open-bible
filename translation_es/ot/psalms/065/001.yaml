translation:
  language: es
  text: Para el director del coro. Salmo de David[a]; cántico[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo 'de David' puede indicar autoría, dedicación o asociación; la traducción preserva esa ambigüedad en lugar de especificar 'por David'.
    reason: alternative_reading
  - marker: b
    text: 'O: ''Salmo de David. Cántico''.'
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el líder
  - Para el músico principal
  lexicon: HALOT
  rationale: En encabezamientos de salmos, el término señala a la persona encargada de la ejecución musical. "Director del coro" comunica esa función de manera natural y digna en español, manteniendo el valor direccional del ל inicial con "Para".
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Canto
  - Pieza lírica
  lexicon: HALOT
  rationale: Es el término técnico habitual del encabezamiento. En español, "Salmo" es la equivalencia más clara y reconocible; el artículo puede omitirse en un encabezado breve sin perder sentido.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - perteneciente a David
  - por David
  lexicon: HALOT
  rationale: La preposición hebrea permite ambigüedad entre autoría, dedicación o asociación. "De David" preserva esa ambigüedad mejor que "por David", que estrecharía el sentido a autoría.
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: cántico
  alternatives_spanish:
  - canción
  - himno
  - canto
  lexicon: HALOT
  rationale: En un encabezamiento bíblico, "cántico" suena más reverente y preciso que "canción", y evita reducir el término a una pieza moderna ligera. Mantiene la distinción del segundo término respecto de "salmo".
translation_notes:
  revision_awareness: El audit trail inglés ajustó la puntuación para unir 'a song' como descripción del encabezamiento. En español se refleja la misma relación con punto y coma, evitando convertir la segunda cláusula en una oración independiente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en otros pasajes del proyecto; aquí no aparece.
  - Se mantiene el estilo de encabezamiento breve y sobrio, propio de las superscripciones de salmos.
  - Se preserva la ambigüedad de לְדָוִד sin imponer autoría exclusiva.
