translation:
  language: es
  text: Pero esto quede dicho como recordatorio[a]; ahora debemos proceder con la narración en pocas palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse de forma más literal como “estas cosas ... para nosotros”; la frase griega permite esa lectura, pero aquí se vierte como una sola declaración de recordatorio para mantener la fluidez.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: LSJ
  rationale: Introduce una transición discursiva natural en español sin exagerar el contraste. 'Pero' mantiene el giro hacia lo que sigue, como el inglés 'But' en el POB.
- source_word: ἕως ὑπομνήσεως
  english_pob_choice: by way of reminder
  chosen_spanish: como recordatorio
  alternatives_spanish:
  - para recordar
  - a modo de recordatorio
  lexicon: LSJ
  rationale: La expresión funciona idiomáticamente como una nota retrospectiva sobre lo anterior. 'Como recordatorio' conserva la idea de memoria/rememoración sin forzar una literalidad poco natural.
- source_word: ταῦθʼ
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - estas cosas
  - estas palabras
  lexicon: LSJ
  rationale: El griego plural elíptico resume lo anterior como una unidad; 'esto' permite esa síntesis en español, como el POB inglés eligió 'this'.
- source_word: εἰρήσθω
  english_pob_choice: let this be said
  chosen_spanish: quede dicho
  alternatives_spanish:
  - sea dicho
  - dígase
  lexicon: LSJ
  rationale: La forma imperativa pasiva perfecta es retórica y de cierre. 'Quede dicho' reproduce bien el tono formal de una fórmula de transición.
- source_word: διʼ ὀλίγων
  english_pob_choice: in a few words
  chosen_spanish: en pocas palabras
  alternatives_spanish:
  - brevemente
  - con pocas palabras
  lexicon: LSJ
  rationale: Es la equivalencia más natural en español para la brevedad expresada por la frase griega y preserva el matiz idiomático de la formulación inglesa.
- source_word: ἐλευστέον
  english_pob_choice: we must proceed
  chosen_spanish: debemos pasar
  alternatives_spanish:
  - debemos proceder
  - hay que pasar
  lexicon: LSJ
  rationale: Este adjetivo verbal expresa necesidad. 'Debemos pasar' mantiene la primera persona plural implícita y la idea de avanzar al siguiente tramo del relato.
- source_word: ἐπὶ τὴν διήγησιν
  english_pob_choice: with the narrative
  chosen_spanish: a la narración
  alternatives_spanish:
  - a la relación
  - al relato
  lexicon: LSJ
  rationale: La preposición marca el retorno al cuerpo principal del relato. 'A la narración' conserva el movimiento hacia el contenido narrativo de manera clara y formal.
translation_notes:
  revision_awareness: 'Se siguió el giro del POB inglés para esta frase de transición: se preservó el valor resumidor de ταῦθʼ y el cierre retórico de εἰρήσθω, mientras que ἡμῖν queda absorbido en la función natural de ''como recordatorio'', tal como la revisión inglesa consideró innecesario explicitar ''for us''.'
  spanish_consistency_notes:
  - Se mantiene 'narración' para διήγησις en este contexto de regreso al relato principal.
  - Se evitó 'SEÑOR' o terminología teológica no pertinente, ya que el versículo es una transición narrativa sin vocabulario divino.
  - El tono es formal y sobrio, adecuado para una fórmula editorial de paso al relato.
