translation:
  language: es
  text: Porque he aquí Yahvé sale de su lugar[a]; descenderá y pisará los lugares altos[b] de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de su morada» o «de su lugar santo». El hebreo dice simplemente «de su lugar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las alturas de la tierra». «Lugares altos» puede evocar sitios elevados asociados con la adoración, pero la frase también puede entenderse más ampliamente como las alturas de la tierra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Pues que
  lexicon: HALOT
  rationale: Conserva la función conectiva causal/explicativa del hebreo al introducir la razón de la घोषणा previa, en un español natural y formal.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  lexicon: HALOT
  rationale: Mantiene el valor de llamada de atención del partícula sin caer en un calco menos natural; 'he aquí' es solemne y bíblico, pero sigue siendo inteligible en español contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: יֹצֵא
  english_pob_choice: is coming out
  chosen_spanish: sale
  alternatives_spanish:
  - está saliendo
  - viene saliendo
  lexicon: HALOT
  rationale: El participio hebreo expresa acción vívida o inminente; en español, el presente simple 'sale' reproduce esa vividez de modo más sobrio que una perífrasis.
- source_word: מִמְּקוֹמוֹ
  english_pob_choice: from his place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de su morada
  - de su lugar de habitación
  lexicon: HALOT
  rationale: Se conserva la ambigüedad deliberada del hebreo, sin especificar 'morada' o 'lugar santo', como exige el texto fuente.
- source_word: וְיָרַד
  english_pob_choice: he will come down
  chosen_spanish: descenderá
  alternatives_spanish:
  - bajará
  - y descenderá
  lexicon: HALOT
  rationale: La forma consecutiva en discurso profético se traduce de manera natural en futuro; 'descenderá' preserva el movimiento hacia abajo sin redundancia.
- source_word: וְדָרַךְ
  english_pob_choice: tread
  chosen_spanish: pisará
  alternatives_spanish:
  - hollará
  - pisoteará
  lexicon: HALOT
  rationale: '''Pisará'' comunica la acción de poner el pie sobre algo sin intensificar indebidamente a ''pisoteará''; conserva la imagen de dominio/juicio del verbo.'
- source_word: במותי ארץ
  english_pob_choice: the high places of the earth
  chosen_spanish: las alturas de la tierra
  alternatives_spanish:
  - los altos de la tierra
  - los altos lugares de la tierra
  lexicon: HALOT
  rationale: '''Alturas'' conserva el sentido espacial y evita fijar de antemano una lectura cultual; en español suena más natural que ''los altos lugares'' y mantiene la amplitud del hebreo.'
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene el nombre personal de Dios conforme a la política del proyecto, evitando la sustitución tradicional por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Conservar la ambigüedad de מִמְּקוֹמוֹ
  english_pob_reading: from his place
  chosen_spanish_reading: de su lugar
  alternative_spanish_readings:
  - de su morada
  - de su lugar santo
  - del cielo
  rationale: El hebreo no precisa más que 'su lugar'; la traducción evita resolver la tensión teológica sobre si se trata de morada celestial, santa o simplemente 'su lugar'.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión inglesa sustituyó 'look' por 'behold' para mayor formalidad; esta versión española sigue esa decisión con 'he aquí', y conserva el resto del sentido sin ampliar ni suavizar la imagen profética.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' conforme a la terminología del proyecto para יְהוָה.
  - '''Alturas de la tierra'' mantiene la amplitud semántica de במותי ארץ sin cerrar la posible referencia cultual.'
  - El verbo 'pisará' conserva el valor concreto de 'tread' sin añadir la intensidad de 'hollará' o 'pisoteará'.
