    text: O 'en medio de ellos'.
    reason: lexical_alternative
  - marker: b
    text: Es decir, delante de las imágenes representadas en la pared de la cámara (véase v. 10).
    reason: cross_reference
  - marker: c
    text: O 'quemador de incienso'.
    reason: lexical_alternative
  - marker: d
    text: O 'la densa nube de incienso estaba subiendo'.
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia para que el singular hebreo referido a Jaazanías quede explícito en español, mientras se conserva el plural para los setenta hombres. La frase se reordena mínimamente para mejorar claridad y legibilidad sin resolver en exceso el pronombre 'delante de ellos'. Además, la nota léxica del instrumento de incienso se ajusta para que sí presente una alternativa auténtica.
