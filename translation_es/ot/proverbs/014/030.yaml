review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo y sigue de cerca el rastro de auditoría del POB: «corazón» para לֵב, «vida» para חַיֵּי, «cuerpo» para בְשָׂרִים, y una alternativa adversativa correcta en la segunda mitad. También conserva la ambigüedad léxica de קִנְאָה mediante nota. Sin embargo, hay dos desajustes importantes con la evidencia fuente y con el inglés auditado: (1) la colocación de notas [a][b] en «cuerpo» es incorrecta, porque la nota a explica «tranquilo/sanador» y la b explica «celos/envidia»; deben anclarse en esos términos; (2) «carcoma» estrecha demasiado רְקַב hacia deterioro por insectos/madera y pierde la imagen más general de podredumbre/decadencia física del hebreo y del POB inglés.'
  spanish_quality_summary: El español es legible y digno, pero puede afinarse para mayor precisión y naturalidad bíblica. «Un corazón tranquilo es vida para el cuerpo» funciona bien. En cambio, «los celos son carcoma para los huesos» suena algo idiomáticamente forzado y semánticamente más específico que el original. «Podredumbre» comunica mejor el paralelismo corporal y la fuerza proverbial. Además, la puntuación de notas debe corregirse para que el lector no asocie explicaciones léxicas al término equivocado.
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. La decisión «cuerpo» en vez de «carne» está bien justificada para בְשָׂרִים en este contexto sapiencial. «Celos» es aceptable para קִנְאָה con nota de alternativa «envidia». «Tranquilo» para מַרְפֵּא sigue el razonamiento del POB, siempre que la nota literal se ancle al adjetivo correspondiente.
  issues:
  - severity: high
    issue: Anclaje incorrecto de las notas en el texto
    rationale: La nota a trata de מַרְפֵּא («tranquilo/sanador»), y la nota b trata de קִנְאָה («celos/envidia»). En el borrador ambas aparecen tras «cuerpo», lo cual desinforma al lector y no cumple la disciplina de notas del proyecto.
  - severity: medium
    issue: «Carcoma» no representa con suficiente fidelidad רְקַב
    rationale: Aunque expresa deterioro interno, en español remite con fuerza a daño de madera o insectos. El hebreo y el POB inglés apuntan más ampliamente a podredumbre/decadencia corporal; «podredumbre» preserva mejor la imagen de los huesos.
  - severity: low
    issue: Número en «los celos son» frente a singular hebreo
    rationale: No es un error grave, porque «los celos» es idiomático en español, pero si se usa «la envidia» como alternativa, conviene mantener una formulación consistente y clara. El texto principal puede permanecer con «los celos».
