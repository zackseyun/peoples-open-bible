translation:
  language: es
  text: Su apariencia es como la apariencia de caballos[a], y como jinetes[b], así corren.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su apariencia es como la apariencia de caballos». El hebreo usa un sufijo singular («su apariencia»), aunque el referente es colectivo; por eso el texto español puede sonar naturalmente colectivo sin cambiar el sentido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como caballería» o «como montados». «Jinetes» conserva mejor el paralelismo con «caballos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמַרְאֵה
  english_pob_choice: like the appearance of
  chosen_spanish: como la apariencia de
  alternatives_spanish:
  - como el aspecto de
  - como el parecer de
  lexicon: HALOT
  rationale: מַרְאֶה se refiere a la apariencia visible o al aspecto exterior. En español, «como la apariencia de» conserva la comparación explícita y la repetición del sustantivo, sin perder naturalidad.
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - caballos de guerra
  - yeguas
  lexicon: HALOT
  rationale: El sustantivo hebreo significa «caballos» de manera directa. En español, «caballos» es la opción más natural y fiel al campo semántico básico del término.
- source_word: מַרְאֵהוּ
  english_pob_choice: their appearance
  chosen_spanish: su apariencia
  alternatives_spanish:
  - su aspecto
  - su apariencia colectiva
  lexicon: HALOT
  rationale: El hebreo tiene un sustantivo singular con sufijo masculino singular, pero el referente es colectivo en el contexto. El español puede conservar la relación sintáctica con «su» sin forzar una traducción colectiva explícita.
- source_word: וּכְפָרָשִׁים
  english_pob_choice: and like horsemen
  chosen_spanish: y como jinetes
  alternatives_spanish:
  - y como caballería
  - y como montados
  lexicon: HALOT
  rationale: פָּרָשִׁים puede referirse a jinetes o a montados. «Jinetes» es una equivalencia natural en español y mantiene la imagen militar sin introducir una abstracción como «caballería».
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - entonces
  lexicon: HALOT
  rationale: 'Aquí כֵּן expresa el resultado o correlato de la comparación: como parecen, así corren. «Así» reproduce bien esa relación en español.'
- source_word: יְרוּצוּן
  english_pob_choice: they run
  chosen_spanish: corren
  alternatives_spanish:
  - se apresuran
  - van corriendo
  lexicon: HALOT
  rationale: La forma verbal proviene de רוץ, «correr». «Corren» es la versión básica y transparente en español, sin añadir intensidad no exigida por el texto.
translation_notes:
  revision_awareness: El borrador sigue el hebreo masorético de Joel 2:4 y el auditor inglés POB en la lectura comparativa básica. Se mantuvo la repetición de «apariencia» y la relación simétrica entre los dos miembros, sin intensificar el verbo final más allá de «corren».
  spanish_consistency_notes:
  - Se preserva la comparación paralela con «como ... y como ... así ...».
  - Se evita «SEÑOR» u otra terminología teológica no presente en el versículo.
  - «Jinetes» se usa como equivalente natural de פָּרָשִׁים sin desplazar el sentido militar.
  - La traducción del sufijo singular colectivo se deja explícita solo en nota, no en el cuerpo del texto.
