source:
  edition: SBLGNT
  text: ⸀Ἀσπάζεταί σε Ἐπαφρᾶς ὁ συναιχμάλωτός μου ἐν Χριστῷ Ἰησοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/023.yaml
  text: Epaphras[a], my fellow prisoner in Messiah Jesus, greets you.
  footnotes:
  - marker: a
    text: Or, more traditionally, 'in Christ Jesus.'
    reason: lexical_alternative
translation:
  language: ko
  text: 메시아 예수[a] 안에서 나와 함께 갇힌 자 에바브라가 그대에게 문안합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 더 전통적으로 「그리스도 예수」. 본 번역은 칭호 Χριστός를 「메시아」로 옮기는 원칙을 따른다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάζεταί
  english_pob_choice: greets
  chosen_korean: 문안합니다
  alternatives_korean:
  - 인사를 전합니다
  - 안부를 전합니다
  lexicon: BDAG
  rationale: ἀσπάζομαι는 서신 정형의 「문안하다, 인사를 전하다」. 「문안합니다」가 한국 성서 전통의 정착된 어휘이며 격식 있는 합쇼체에 자연스럽다.
- source_word: σε
  english_pob_choice: you
  chosen_korean: 그대에게
  lexicon: BDAG
  rationale: 단수 2인칭. 빌레몬 합쇼체 호칭.
- source_word: Ἐπαφρᾶς
  english_pob_choice: Epaphras
  chosen_korean: 에바브라
  lexicon: BDAG
  rationale: 한국 성서 전통의 정착된 음역.
- source_word: συναιχμάλωτός
  english_pob_choice: fellow prisoner
  chosen_korean: 함께 갇힌 자
  alternatives_korean:
  - 동료 죄수
  - 함께 갇힌 동지
  lexicon: BDAG
  rationale: 합성어 「함께-사로잡힌 자」. 1·9절의 δέσμιος(「갇힌 자」)와 어휘 일관성을 위해 「함께 갇힌 자」로 옮긴다. αἰχμάλωτος의 「사로잡힘」 뉘앙스는 한국어에서는 「갇힌」으로 충분히 담아낼 수 있다.
- source_word: μου
  english_pob_choice: my
  chosen_korean: 나와 함께
  lexicon: BDAG
  rationale: 소유격을 「나와 함께 갇힌」으로 분사 구문에 자연스럽게 결합한다.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_korean: 메시아 예수 안에서
  alternatives_korean:
  - 그리스도 예수 안에서
  lexicon: BDAG
  rationale: 바울 정형 「~안에」. 칭호 원칙에 따라 「메시아 예수」.
theological_decisions:
- issue: Χριστῷ를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 번역의 일관된 원칙. 칭호의 무게가 살아 있는 자리.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός'
