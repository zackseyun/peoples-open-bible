review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Salomón ha puesto un lugar para el arca, en la cual/ donde está el pacto de Yahvé, el cual él hizo con nuestros padres cuando los sacó de Egipto. Conserva correctamente Yahvé y nuestros padres. Sin embargo, la nota al pie está anclada en «arca» pero explica la cláusula relativa «donde/en la cual está...», lo cual desajusta la evidencia fuente y el rastro inglés. Además, en español «arca» es femenino, pero el referente real es el arca como objeto/contenedor, por lo que «en la cual» puede sonar menos natural que «donde está» o «en la que está».'
  spanish_quality_summary: El español es claro y digno. «Y allí puse un lugar para el arca» es aceptable, aunque algo literal. La principal mejora necesaria es la colocación y contenido de la nota, para que documente fielmente la alternativa preservada por el inglés POB y no introduzca una literalidad confusa. También conviene suavizar «en la cual» a una formulación más natural.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; בְּרִית → «pacto» es defendible; אֲבֹתֵינוּ → «nuestros padres» preserva la referencia masculina. No hay conflicto doctrinal relevante. La excepción necesaria es rehacer la nota para reflejar la alternativa literal sobre «cortó» y, si se desea, documentar «nuestros antepasados» como alternativa de traducción de «nuestros padres», tal como hace el inglés POB.'
  issues:
  - severity: medium
    issue: La nota al pie está mal anclada
    rationale: El marcador [a] aparece en «arca», pero la nota comenta la cláusula relativa «donde está el pacto... que él cortó...». Según la disciplina del proyecto, el marcador debe aparecer en la palabra o frase relevante.
  - severity: medium
    issue: La nota no preserva de forma óptima la alternativa documentada por el inglés POB
    rationale: El rastro inglés conserva explícitamente la literalidad de «cortó» para el pacto y además una alternativa para «our fathers/ancestors». El borrador solo incluye una nota parcial y además formula «donde está...» como si fuera una literalidad completa, lo cual mezcla dos asuntos.
  - severity: low
    issue: «en la cual está» suena algo rígido en español
    rationale: Aunque es fiel al sentido locativo, «donde está» o «en la que está» suena más natural y sigue representando bien אֲשֶׁר שָׁם.
  revised_spanish_text: Y allí puse un lugar para el arca, donde[a] está el pacto de Yahvé, que él hizo con nuestros padres[b] cuando los sacó de la tierra de Egipto.
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «en la cual está el pacto de Yahvé, que él cortó con nuestros padres».'
    reason: lexical_alternative
  - marker: b
    text: 'O «con nuestros antepasados». Hebreo: «con nuestros padres».'
    reason: lexical_alternative
  revision_rationale: Se movió el marcador de nota al segmento pertinente de la cláusula relativa y se añadió la alternativa sobre «nuestros padres/antepasados» para alinearse con el rastro inglés POB. También se cambió «en la cual» por «donde» para una lectura más natural en español sin perder el sentido locativo del hebreo.
