translation:
  language: es
  text: No alabes a un hombre antes de que exprese su pensamiento[a][b], porque esto es la prueba de los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Exprese su pensamiento» refleja el valor de λογισμοῦ como pensamiento, juicio o razonamiento manifestado; literalmente, «antes del pensamiento/razonamiento». Otras posibilidades son «antes de su reflexión» o «antes de que se conozca el razonamiento de un hombre».
    reason: lexical_alternative
  - marker: b
    text: «Hombre» y «hombres» traducen formas masculinas griegas usadas proverbialmente para los seres humanos en general.
    reason: cultural_note
lexical_decisions:
- source_word: πρὸ
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - previo a
  lexicon: LSJ
  rationale: La preposición temporal pide una equivalencia natural en español; «antes de» conserva con claridad la relación de anterioridad.
- source_word: λογισμοῦ
  english_pob_choice: he speaks his mind
  chosen_spanish: hable su parecer
  alternatives_spanish:
  - su reflexión
  - su razonamiento
  - su pensamiento
  - su consideración
  lexicon: LSJ
  rationale: El griego remite literalmente a pensamiento, razonamiento o consideración. En el proverbio, la idea práctica es no elogiar a alguien antes de que se manifieste su juicio interior; «hable su parecer» comunica ese valor observable sin perder el trasfondo de λογισμός.
- source_word: μὴ ἐπαινέσῃς
  english_pob_choice: Do not praise
  chosen_spanish: No alabes
  alternatives_spanish:
  - No elogies
  - No encomies
  lexicon: LSJ
  rationale: La construcción prohibitiva se expresa de modo directo y natural con imperativo negativo en español. «Alabes» mantiene el campo semántico de alabanza/práctica de elogio.
- source_word: ἄνδρα
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: LSJ
  rationale: Se conserva la forma masculina del original, que en el proverbio funciona de modo representativo para la persona humana en general.
- source_word: οὗτος
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - ésta
  lexicon: LSJ
  rationale: El demostrativo remite a la situación descrita; «esto» resulta la forma más clara y natural en español.
- source_word: πειρασμὸς
  english_pob_choice: test
  chosen_spanish: prueba
  alternatives_spanish:
  - examen
  - test
  lexicon: LSJ
  rationale: En contexto sapiencial, πειρασμός señala el hecho de probar o poner a prueba, no la idea de tentación. «Prueba» conserva esa fuerza con buena naturalidad en español.
- source_word: ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  lexicon: LSJ
  rationale: El plural genérico mantiene el paralelo con ἄνδρα y refleja el lenguaje proverbial del texto. «Los hombres» conserva la formulación antropológica del griego.
translation_notes:
  revision_awareness: El texto griego coincide plenamente con el testimonio auditado; no se registran revisiones textuales ni variantes relevantes en el expediente recibido.
  spanish_consistency_notes:
  - Se mantiene «prueba» para πειρασμός en sentido sapiencial, evitando «tentación», que alteraría el matiz del proverbio.
  - Se conserva el singular representativo «un hombre» y el plural genérico «los hombres» para seguir de cerca el lenguaje proverbial del griego.
  - El verbo «hable» se usa para transmitir la manifestación práctica del juicio/razonamiento asociado a λογισμός, en línea con la lectura auditada en inglés.
