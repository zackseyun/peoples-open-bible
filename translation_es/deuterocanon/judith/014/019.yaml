translation:
  language: es
  text: Pero cuando los comandantes del ejército de Asiria oyeron las palabras, rasgaron sus túnicas[a], y sus almas quedaron muy turbadas[b], y se levantó un clamor y un gran grito en medio del campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rasgar la túnica era una expresión habitual de dolor, conmoción o aflicción.
    reason: cultural_note
  - marker: b
    text: 'O: «su espíritu quedó muy turbado». El griego dice literalmente «su alma fue muy turbada», usando una expresión colectiva en singular.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ ἤκουσαν
  english_pob_choice: But when ... heard
  chosen_spanish: Pero cuando ... oyeron
  alternatives_spanish:
  - Y cuando ... oyeron
  - Ahora cuando ... oyeron
  lexicon: BDAG
  rationale: ὡς con el aoristo introduce una cláusula temporal; «cuando» expresa bien esa relación. δέ aporta una transición narrativa leve, bien reflejada por «Pero» sin forzar oposición.
- source_word: τὰ ῥήματα
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - el informe
  - estas cosas
  lexicon: BDAG
  rationale: ῥήματα significa propiamente «palabras» o «cosas dichas». Como el versículo remite a lo recién anunciado, «las palabras» conserva el vínculo léxico y suena natural en español.
- source_word: οἱ ἄρχοντες τῆς δυνάμεως Ἀσσούρ
  english_pob_choice: the commanders of the army of Assyria
  chosen_spanish: los comandantes del ejército de Asiria
  alternatives_spanish:
  - los jefes de la fuerza de Asiria
  - los oficiales del ejército asirio
  lexicon: BDAG
  rationale: ἄρχοντες aquí designa líderes militares; «comandantes» es la equivalencia más clara. δύναμις tiene sentido militar, por lo que «ejército» comunica mejor que una traducción más literal pero menos idiomática. Ἀσσούρ se traduce «Asiria» por tratarse de la potencia/nación.
- source_word: τοὺς χιτῶνας αὐτῶν διέρρηξαν
  english_pob_choice: they tore their tunics
  chosen_spanish: rasgaron sus túnicas
  alternatives_spanish:
  - rasgaron sus vestidos
  - rompieron sus ropas
  lexicon: BDAG
  rationale: χιτών es específicamente una túnica/vestidura interior. «Túnicas» conserva esa concreción; el gesto de rasgar vestidura expresa luto, choque o angustia, y no requiere una explicación dentro del texto.
- source_word: ἐταράχθη αὐτῶν ἡ ψυχὴ σφόδρα
  english_pob_choice: their souls were greatly troubled
  chosen_spanish: sus almas fueron muy turbadas
  alternatives_spanish:
  - quedaron muy turbados
  - su espíritu fue profundamente conmovido
  lexicon: BDAG
  rationale: El griego usa ψυχή en singular colectivo con genitivo plural; «sus almas» mantiene esa imagen antropológica que el audit trail quiso preservar. «Fueron muy turbadas» reproduce el pasivo y la intensidad de σφόδρα sin suavizar el término.
- source_word: ἐγένετο αὐτῶν κραυγὴ καὶ βοὴ μεγάλη σφόδρα
  english_pob_choice: there arose a very great cry and outcry
  chosen_spanish: se levantó entre ellos un clamor y un gran grito, muy grande
  alternatives_spanish:
  - se alzó entre ellos un clamor y un gran alarido
  - estalló entre ellos un clamor y un gran grito
  lexicon: BDAG
  rationale: ἐγένετο se expresa idiomáticamente como «se levantó»/«surgió». κραυγή y βοή son casi sinónimos de grito, clamor o alarido; se conservan ambos elementos para reflejar la duplicación enfática del griego. «Muy grande» mantiene σφόδρα, aunque de manera algo redundante, para no perder intensidad.
- source_word: ἐν μέσῳ τῆς παρεμβολῆς
  english_pob_choice: in the midst of the camp
  chosen_spanish: en medio del campamento
  alternatives_spanish:
  - en medio del campamento
  - en el centro del campamento
  lexicon: BDAG
  rationale: παρεμβολή significa campamento o encampment; «campamento» es la opción más natural y fiel. «En medio de» reproduce la localización espacial con claridad.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete y toma en cuenta la auditoría inglesa: mantiene la secuencia temporal, conserva la concreción de χιτών como «túnicas», preserva la expresión antropológica de ψυχή en plural colectivo («sus almas»), y refleja la duplicación enfática de κραυγή y βοή sin reducirla a un solo término. También atiende la revisión inglesa que corrigió la concordancia plural en el sujeto implícito y eliminó un añadido interpretativo, manteniendo aquí la referencia espacial directa «en medio del campamento».'
  spanish_consistency_notes:
  - Se emplea «Asiria» para Ἀσσούρ, conforme a la convención geográfica habitual y a la práctica auditada en inglés.
  - Se mantiene «almas» en vez de reducir a «personas» o «ellos», para no perder la fuerza del griego ψυχή.
  - Se conserva la intensidad con un doble término de grito/clamor, evitando nivelar κραυγή y βοή en una sola palabra.
  - La puntuación busca respetar la acumulación de acciones del original sin añadir interpretación causal o emocional no explícita.
