revisions:
- from: Porque él mismo expulsó a los que se habían alineado para la batalla en la ciudad santa hacia Persia[a][b].
  to: Porque él mismo echó fuera a los que estaban alineados para la batalla en la ciudad santa a Persia[a][b].
  rationale: La revisión mejora la precisión del participio militar y de la meta marcada por εἰς, y evita la circularidad de la nota léxica. «Echó fuera» preserva bien la fuerza del verbo griego y permite que la nota registre «expulsó» como alternativa; «a Persia» comunica mejor el destino que «hacia Persia».
