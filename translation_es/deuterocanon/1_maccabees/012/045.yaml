translation:
  language: es
  text: Y ahora envíalos a sus casas, pero escoge para ti unos pocos hombres que estarán contigo; ven conmigo a Ptolemaida, y yo te la entregaré, junto con las demás fortalezas y las numerosas tropas y a todos los encargados de los asuntos[a], y después me iré tras haber regresado[b]; porque para esto he venido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los oficiales»; el griego literalmente se refiere a los que están puestos sobre las necesidades o los asuntos.
    reason: lexical_alternative
  - marker: b
    text: 'La construcción griega es comprimida: indica que primero volverá o retornará y luego se marchará, sin especificar el destino del retorno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόστειλον
  english_pob_choice: send them to their homes
  chosen_spanish: envíalos a sus casas
  alternatives_spanish:
  - despídelos a sus casas
  - mándalos a sus casas
  lexicon: LSJ
  rationale: El imperativo pide despachar a los hombres desde la situación presente hacia sus casas. «Envíalos» conserva el movimiento; «a sus casas» refleja οἴκους en sentido idiomático y natural en español.
- source_word: οἴκους
  english_pob_choice: homes
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus hogares
  - sus viviendas
  lexicon: LSJ
  rationale: El griego dice literalmente «casas», pero en contexto significa el lugar propio de residencia. «Sus casas» mantiene la cercanía léxica sin sonar forzado.
- source_word: ἐπίλεξαι
  english_pob_choice: choose for yourself
  chosen_spanish: escoge para ti
  alternatives_spanish:
  - elige para ti
  - selecciona para ti
  lexicon: LSJ
  rationale: El medio sugiere escoger para beneficio o propósito propio. «Escoge para ti» reproduce esa matiz de decisión personal mejor que un simple «elige».
- source_word: ἄνδρας ὀλίγους
  english_pob_choice: a few men
  chosen_spanish: unos pocos hombres
  alternatives_spanish:
  - unos cuantos hombres
  - un pequeño número de hombres
  lexicon: LSJ
  rationale: «ἄνδρας» es literalmente «hombres»; el griego no dice «soldados». «Unos pocos hombres» conserva la literalidad y la naturalidad en español.
- source_word: δεῦρο
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - ven aquí
  - acércate
  lexicon: LSJ
  rationale: Funciona como invitación o llamado. En español, «ven» es suficiente y evita una redundancia innecesaria.
- source_word: παραδώσω
  english_pob_choice: I will hand it over
  chosen_spanish: yo te la entregaré
  alternatives_spanish:
  - yo te la entregaré
  - yo te la pondré en tus manos
  lexicon: LSJ
  rationale: El verbo expresa transferencia de control o posesión. «Entregaré» comunica bien esa idea en español, y el pronombre femenino retoma la ciudad mencionada.
- source_word: τὰ λοιπὰ ὀχυρώματα
  english_pob_choice: the rest of the strongholds
  chosen_spanish: las demás fortalezas
  alternatives_spanish:
  - los demás fuertes
  - las restantes plazas fuertes
  lexicon: LSJ
  rationale: «ὀχυρώματα» son posiciones fortificadas. «Fortalezas» es un equivalente claro y militarmente adecuado en español.
- source_word: τὰς δυνάμεις τὰς πολλὰς
  english_pob_choice: the large forces
  chosen_spanish: las numerosas fuerzas
  alternatives_spanish:
  - las grandes fuerzas
  - las muchas fuerzas
  lexicon: LSJ
  rationale: «δυνάμεις» aquí se refiere a fuerzas militares. «Numerosas» preserva la idea de cantidad sin introducir una valoración diferente de «grandes».
- source_word: πάντας τοὺς ἐπὶ τῶν χρειῶν
  english_pob_choice: all those in charge of affairs
  chosen_spanish: a todos los encargados de los asuntos
  alternatives_spanish:
  - a todos los oficiales
  - a todos los responsables de los negocios
  lexicon: LSJ
  rationale: La frase literalmente alude a los puestos «sobre las necesidades/asuntos». «Encargados de los asuntos» conserva el sentido administrativo sin reducirlo a un cargo moderno específico.
- source_word: ἐπιστρέψας ἀπελεύσομαι
  english_pob_choice: I will depart after returning
  chosen_spanish: me iré tras haber regresado
  alternatives_spanish:
  - me iré después de regresar
  - me iré cuando haya regresado
  lexicon: LSJ
  rationale: El participio indica una acción previa a la partida. «Tras haber regresado» mantiene esa secuencia sin precisar un destino que el griego no explicita.
- source_word: τούτου γὰρ χάριν πάρειμι
  english_pob_choice: for this is why I have come
  chosen_spanish: porque para esto he venido
  alternatives_spanish:
  - pues para esto estoy aquí
  - porque con este fin he venido
  lexicon: LSJ
  rationale: La cláusula expresa la finalidad de la presencia del hablante. «Para esto he venido» es directo y fiel al propósito indicado por el griego.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés: se evitó añadir un equivalente de «away» y se prefirió una formulación natural para ἐπιστρέψας («tras haber regresado»), manteniendo la secuencia temporal implícita en el griego.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantuvo la distinción entre traducción de movimiento («envíos», «ven», «me iré») y de propósito («para esto he venido»), sin sobrerexplicar el contexto.
  - Se conservó un registro digno y bíblico, evitando términos eclesiásticos no presentes en el griego.
