translation:
  language: es
  text: 'Entonces Saúl le juró por Yahvé, diciendo: «Vive Yahvé, no te sobrevendrá castigo[a] en este asunto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «culpa». El hebreo עָוֺן puede significar «iniquidad», «culpa» o el castigo derivado de la culpa; aquí el contexto favorece «castigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  english_pob_choice: swore
  chosen_spanish: le juró
  alternatives_spanish:
  - juró
  - hizo un juramento
  - prestó juramento
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto expresa la acción solemne de jurar. «Le juró» conserva la relación directa con la mujer y suena natural en español contemporáneo sin perder la fuerza forense del acto.
- source_word: לָהּ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - para ella
  lexicon: HALOT
  rationale: El dativo indirecto se expresa naturalmente con «le» en español; mantiene la referencia femenina sin carga añadida.
- source_word: בַּיהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - por Yahweh
  - en Yahvé
  - invocando a Yahvé
  lexicon: HALOT
  rationale: El hebreo indica el fundamento/invocación del juramento. Se traduce con «por Yahvé» para conservar el valor instrumental o apelativo del juramento sin ocultar el nombre divino.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: Vive Yahvé
  alternatives_spanish:
  - Vive Yahweh
  - Por la vida de Yahvé
  - Tan cierto como que Yahvé vive
  lexicon: HALOT
  rationale: Es una fórmula juratoria fija. «Vive Yahvé» reproduce de forma breve y fiel la afirmación idiomática de que Yahvé vive, conservando su tono solemne en español.
- source_word: אִם
  english_pob_choice: 'no'
  chosen_spanish: 'no'
  alternatives_spanish:
  - seguramente no
  - ciertamente no
  lexicon: HALOT
  rationale: En juramentos hebreos, אִם introduce una negación elíptica. «No» comunica el valor resultante en español sin perder la tensión del giro juratorio.
- source_word: יִקְּרֵךְ
  english_pob_choice: will come upon you
  chosen_spanish: te sobrevendrá
  alternatives_spanish:
  - te acontecerá
  - te llegará
  - te ocurrirá
  lexicon: HALOT
  rationale: El verbo expresa que algo le acontece a una persona. «Te sobrevendrá» es natural y mantiene la idea de un suceso que cae sobre ella.
- source_word: עָוֺן
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - culpa
  - iniquidad
  - pena
  lexicon: HALOT
  rationale: Aquí el contexto apunta a la consecuencia penal o retributiva que Saul promete que no la alcanzará. «Castigo» preserva esa fuerza sin borrar la ambigüedad semántica del hebreo.
- source_word: בַּדָּבָר הַזֶּה
  english_pob_choice: in this matter
  chosen_spanish: por esto
  alternatives_spanish:
  - en este asunto
  - en esto
  - por este asunto
  lexicon: HALOT
  rationale: La expresión se refiere al acto concreto que están discutiendo. «Por esto» es breve y natural en español, y mantiene la referencia inmediata al asunto en cuestión.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente; por la norma del proyecto se conserva como «Yahvé» en el cuerpo del texto. Se evita la sustitución por «el SEÑOR» para no ocultar el nombre pactal presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de עָוֺן en el juramento de Saúl
  english_pob_reading: punishment
  chosen_spanish_reading: castigo
  alternative_spanish_readings:
  - culpa
  - iniquidad
  - pena
  - culpa o castigo
  rationale: En este contexto Saúl garantiza que la mujer no sufrirá consecuencias penales por su acción. «Castigo» conserva la lectura contextual que el audit trail inglés documenta, sin forzar un sentido puramente moral de culpa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés: mantiene la fórmula juratoria, el nombre divino explícito y la ambigüedad de עָוֺן indicada por el POB inglés, optando por «castigo» en el sentido contextual de consecuencia penal. No se detectaron revisiones previas que exigieran ajuste.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la norma del proyecto para יהוה.
  - Se conserva el tono solemne del juramento sin introducir paráfrasis expansivas.
  - «Castigo» refleja la consecuencia legal/retributiva del hebreo en este contexto, no una explicación doctrinal adicional.
  - La puntuación y el orden buscan una lectura natural en español sin perder la estructura del original.
