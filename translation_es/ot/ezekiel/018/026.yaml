  text: בְּ/שׁוּב צַדִּ֧יק מִ/צִּדְקָת֛/וֹ וְ/עָ֥שָׂה עָ֖וֶל וּ/מֵ֣ת עֲלֵי/הֶ֑ם בְּ/עַוְל֥/וֹ אֲשֶׁר עָשָׂ֖ה יָמֽוּת־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/018/026.yaml
  text: When a righteous man turns away from his righteousness and does injustice[a], and dies because of them[b], he shall die for the injustice that he has done.
  footnotes:
  - marker: a
    text: Or 'and does wrong' / 'and commits iniquity.' The Hebrew עָוֶל carries the sense of injustice, wrong, or unrighteousness.
    reason: lexical_alternative
  - marker: b
    text: '''Because of them'' refers to the wrongful acts just mentioned; the Hebrew uses a plural pronoun.'
    reason: lexical_alternative
