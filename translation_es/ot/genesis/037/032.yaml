translation:
  language: es
  text: 'Entonces enviaron la túnica con mangas largas[a] y la llevaron a su padre, y dijeron: «Encontramos esto. Por favor, identifica[b] si es la túnica de tu hijo o no».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la túnica ornamentada», «la túnica ricamente adornada»; tradicionalmente, «la túnica de muchos colores». La expresión hebrea es incierta.
    reason: lexical_alternative
  - marker: b
    text: O «Por favor, reconoce». La expresión tiene peso narrativo, porque el motivo del reconocimiento y el no reconocimiento reaparece a lo largo del relato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽיְשַׁלְּחוּ
  english_pob_choice: Then they sent
  chosen_spanish: Entonces enviaron
  alternatives_spanish:
  - Luego enviaron
  - Entonces la enviaron
  lexicon: HALOT
  rationale: El hebreo marca la secuencia narrativa con waw consecutiva; «Entonces» refleja ese avance. «Enviaron» comunica con naturalidad el verbo שלח sin añadir matices ajenos.
- source_word: כְּתֹנֶת הַפַּסִּים
  english_pob_choice: the robe with long sleeves
  chosen_spanish: la túnica
  alternatives_spanish:
  - la túnica con mangas largas
  - la túnica ornamentada
  - la túnica de muchos colores
  lexicon: HALOT
  rationale: El hebreo designa una prenda (כְּתֹנֶת) y la expresión פַּסִּים es incierta; el POB inglés evita fijarla con una tradición interpretativa. En español, «túnica» es un término natural y suficientemente amplio, mientras la incertidumbre se conserva en la nota.
- source_word: וַיָּבִיאוּ אֶל אֲבִיהֶם
  english_pob_choice: and brought it to their father
  chosen_spanish: y la llevaron a su padre
  alternatives_spanish:
  - y la llevaron ante su padre
  - y se la llevaron a su padre
  lexicon: HALOT
  rationale: El objeto implícito es la prenda; «la» evita repetir el sustantivo. «Su padre» sigue el hebreo y mantiene la distancia narrativa sin expandir al nombre propio.
- source_word: זֹאת מָצָאנוּ
  english_pob_choice: We found this
  chosen_spanish: Esto hemos encontrado
  alternatives_spanish:
  - Esto encontramos
  - Hemos encontrado esto
  lexicon: HALOT
  rationale: La frase preserva la sencillez y el énfasis deíctico del hebreo. El orden «Esto hemos encontrado» suena natural y mantiene la fuerza demostrativa.
- source_word: הַכֶּר נָא
  english_pob_choice: Please identify
  chosen_spanish: Por favor, identifica
  alternatives_spanish:
  - Reconoce, por favor
  - Por favor, reconoce
  - Identifica, por favor
  lexicon: HALOT
  rationale: נכר en hiphil significa reconocer/identificar. «Identifica» funciona bien en español moderno; la nota preserva la alternativa «reconocer», importante para el eco narrativo.
- source_word: הַכְּתֹנֶת בִּנְךָ הִוא אִם לֹא
  english_pob_choice: whether it is your son's robe or not
  chosen_spanish: si es la túnica de tu hijo o no
  alternatives_spanish:
  - si es la túnica de tu hijo o no lo es
  - si es la túnica de tu hijo o no
  lexicon: HALOT
  rationale: La cláusula hebrea introduce una pregunta indirecta con אם לא. En español, «si es ... o no» refleja bien esa estructura. «Tu hijo» conserva el lenguaje distanciado de los hermanos.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el auditable inglés POB, pero ajusta la sintaxis al español para mantener fluidez: conserva la secuencia narrativa, el objeto pronominalizado y la pregunta indirecta. También mantiene la tensión lexical de כְּתֹנֶת הַפַּסִּים mediante una nota que ofrece las alternativas principales sin imponer una lectura cerrada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se ha preferido «túnica» como término amplio y publicable para כְּתֹנֶת, dejando la incertidumbre de פַּסִּים en la nota.
  - «Identifica» se eligió por naturalidad en español, pero se conserva «reconoce» como alternativa significativa por el juego narrativo de reconocimiento.
