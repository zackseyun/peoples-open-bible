    text: O «ni habrá ninguno ausente» / «ni se perderá ninguno». El hebreo probablemente significa que ningún miembro del rebaño faltará o quedará sin contar.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la redacción para mejorar la naturalidad y la precisión semántica sin apartarse del hebreo ni del rastro POB: «levantaré» en lugar de «haré levantar»; «quedarán consternados» para distinguir יֵחַתּוּ de «temerán»; y «declara Yahvé» para reflejar mejor נְאֻם יְהוָה. Se conserva la metáfora de pastoreo y la nota léxica sobre «faltará ninguno».'
