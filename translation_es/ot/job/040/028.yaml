translation:
  language: es
  text: ¿Haría él un pacto[a] contigo, para que tú lo tomaras como esclavo[b] para siempre?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «¿cortaría un pacto contigo?», un modismo estándar que significa «hacer un pacto».'
    reason: lexical_alternative
  - marker: b
    text: O «como siervo». El hebreo עֶבֶד puede significar «siervo» o «esclavo»; aquí se prefiere «esclavo» porque el contexto enfatiza una sujeción permanente.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יִכְרֹת
  english_pob_choice: Will he make
  chosen_spanish: ¿Haría él
  alternatives_spanish:
  - ¿Haría él un pacto
  - ¿Cortaría él un pacto
  - ¿Haría él un convenio
  lexicon: HALOT
  rationale: El hebreo usa la pregunta con כָּרַת בְּרִית, un modismo fijo para 'hacer/cortar un pacto'. En español, 'haría' refleja bien la pregunta retórica y mantiene el valor hipotético del hebreo; 'cortaría' sería demasiado literal y poco natural.
- source_word: בְּרִית
  english_pob_choice: a covenant
  chosen_spanish: un pacto
  alternatives_spanish:
  - un pacto solemne
  - un convenio
  - un acuerdo
  lexicon: HALOT
  rationale: בְּרִית puede traducirse 'pacto' en español con fuerza relacional y jurídica. 'Pacto' es claro y digno; 'convenio' o 'acuerdo' suavizan en exceso el peso formal del término.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  - con usted
  lexicon: HALOT
  rationale: La preposición con sufijo se expresa de forma natural en español como 'contigo'. Aunque la morfología aquí señala una forma femenina singular, el contexto dirige el discurso a Job y el sentido comunicativo en español no cambia.
- source_word: תִּקָּחֶנּוּ
  english_pob_choice: that you would take him
  chosen_spanish: para que tú lo tomaras
  alternatives_spanish:
  - para que lo tomaras
  - y lo tomaras
  - a fin de que lo tomaras
  lexicon: HALOT
  rationale: לקח se traduce con 'tomar' para conservar el paralelismo y la amplitud semántica del hebreo. La relación de resultado/finalidad se expresa bien con 'para que'; 'tomar' aquí no significa simplemente 'agarrar', sino recibir bajo dominio o posesión.
- source_word: לְעֶבֶד
  english_pob_choice: as a slave
  chosen_spanish: por esclavo
  alternatives_spanish:
  - como esclavo
  - por siervo
  - como siervo
  lexicon: HALOT
  rationale: El POB inglés eligió 'slave' para preservar la fuerza de עֶבֶד en este contexto de posesión permanente. En español, 'esclavo' comunica mejor esa condición jurídica y de sujeción; 'siervo' la atenúa y podría sonar eclesiástico o más servicial que subordinado.
- source_word: עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - permanentemente
  - de por vida
  - para siempre jamás
  lexicon: HALOT
  rationale: עוֹלָם expresa duración indefinida y estable. 'Para siempre' es la equivalencia natural y mantiene la fuerza de permanencia del hebreo en una pregunta retórica.
translation_notes:
  revision_awareness: El audit trail inglés se mantiene en alta concordancia (0.98) y no registra revisiones aplicadas; la presente redacción conserva el modismo de pacto y la decisión léxica por עֶבֶד en línea con ese estado estable.
  spanish_consistency_notes:
  - Se evitó traducir mecánicamente 'make a covenant' como 'hacer un pacto' dentro de la frase principal porque en español la pregunta retórica suena más natural con 'haría él un pacto', mientras la nota preserva el modismo hebreo literal.
  - '''Esclavo'' se mantuvo de forma consistente con la decisión POB inglesa para עֶבֶד en este contexto de permanencia, sin neutralizarlo en ''siervo''.'
  - Se usó 'para siempre' para conservar la duración irreversible de עוֹלָם en un registro claro y publicable.
