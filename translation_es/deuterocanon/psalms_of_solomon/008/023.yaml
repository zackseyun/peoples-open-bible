translation:
  language: es
  text: Destruyó a sus gobernantes y a todos los sabios en consejo[a]; derramó la sangre de los que habitaban en Jerusalén como agua de impureza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo sabio consejero» / «todos los que eran sabios en consejo». La frase griega es comprimida y colectiva.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «como agua de impureza»; o, de forma más explicativa, «como agua de contaminación ritual».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπώλεσεν
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - arruinó
  - aniquiló
  - hizo perecer
  lexicon: LSJ
  rationale: El griego expresa llevar a destrucción. «Destruyó» conserva el sentido amplio sin restringirlo solo a muerte física.
- source_word: ἄρχοντας
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - dirigentes
  - príncipes
  - jefes
  lexicon: LSJ
  rationale: La referencia es a quienes ejercen autoridad. «Gobernantes» comunica bien el sentido político en español actual.
- source_word: πᾶν σοφὸν ἐν βουλῇ
  english_pob_choice: everyone wise in counsel
  chosen_spanish: todo sabio en consejo
  alternatives_spanish:
  - todo consejero sabio
  - todos los que eran sabios en consejo
  lexicon: LSJ
  rationale: La frase griega es comprimida y colectiva. «Todo sabio en consejo» mantiene la concisión y la carga de sabiduría en deliberación, sin cerrar la ambigüedad documentada.
- source_word: ἐξέχεεν
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - desparramó
  - espió
  lexicon: LSJ
  rationale: «Derramó» reproduce la imagen concreta de verter sangre con naturalidad en español y conserva el carácter gráfico del verbo.
- source_word: τὸ αἷμα
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre derramada
  lexicon: LSJ
  rationale: Se mantiene el sustantivo simple del original; el contexto ya indica violencia y derramamiento.
- source_word: τῶν οἰκούντων Ἰερουσαλήμ
  english_pob_choice: those dwelling in Jerusalem
  chosen_spanish: de los que habitaban en Jerusalén
  alternatives_spanish:
  - de los habitantes de Jerusalén
  lexicon: LSJ
  rationale: «Los que habitaban» conserva el valor participial de οἰκούντων y resulta natural en español.
- source_word: ὡς ὕδωρ ἀκαθαρσίας
  english_pob_choice: like unclean water
  chosen_spanish: como agua de impureza
  alternatives_spanish:
  - como agua impura
  - como agua de inmundicia
  - como agua de suciedad ritual
  lexicon: LSJ
  rationale: El sustantivo ἀκαθαρσίας es «impureza/contaminación ritual», no solo un adjetivo «impuro». «Agua de impureza» preserva el genitivo y el peso cultual señalado en la revisión.
theological_decisions:
- issue: Peso cultual de ἀκαθαρσίας
  english_pob_reading: like unclean water
  chosen_spanish_reading: como agua de impureza
  alternative_spanish_readings:
  - como agua impura
  - como agua de inmundicia
  rationale: La revisión auditada distingue el genitivo ἀκαθαρσίας de un simple adjetivo. En español conviene reflejar la cualidad ritual de impureza para no suavizar el matiz cultual del texto.
  doctrine_reference: pureza/impureza ritual en el lenguaje bíblico
- issue: Alcance de πᾶν σοφὸν ἐν βουλῇ
  english_pob_reading: everyone wise in counsel
  chosen_spanish_reading: todo sabio en consejo
  alternative_spanish_readings:
  - todo consejero sabio
  - todos los que eran sabios en consejo
  rationale: La frase griega es compacta y puede leerse de modo colectivo. Se preserva esa tensión sin imponer una sola paráfrasis explicativa.
  doctrine_reference: ninguno
translation_notes:
  revision_awareness: La redacción sigue la última revisión auditada que ajustó el final a la fuerza de ὡς ὕδωρ ἀκαθαρσίας, pero en español opta por conservar el genitivo de calidad «agua de impureza» para reflejar con más precisión el matiz cultual del griego y no reducirlo solo a un adjetivo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo.
  - «Gobernantes» conserva el sentido de autoridad política de ἄρχοντας.
  - «Derramó la sangre» sigue la imagen concreta de ἐξέχεεν.
  - Se conserva la ambigüedad de πᾶν σοφὸν ἐν βουλῇ con una nota alternativa.
  - No se introduce terminología eclesiástica ajena al texto fuente.
