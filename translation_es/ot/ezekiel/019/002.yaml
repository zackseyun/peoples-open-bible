translation:
  language: es
  text: 'Y dirás: «¿Qué era tu madre? Una leona. Entre leones se echaba[a]; en medio de leones jóvenes crió[b] a sus cachorros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre leonas se echaba». El plural hebreo puede entenderse más generalmente como «leones», pero algunos traductores lo vierten por sentido para concordar con la imagen femenina de «leona».
    reason: lexical_alternative
  - marker: b
    text: O «crio» o «hizo muchos» a sus cachorros. El verbo hebreo puede incluir la idea de aumento, pero aquí probablemente se refiere a la crianza de la descendencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ / and say
  english_pob_choice: and say
  chosen_spanish: Y dirás
  alternatives_spanish:
  - Y dirás entonces
  - Y dirás
  lexicon: WLC / HALOT
  rationale: El imperativo narrativo en segunda persona singular se expresa de manera natural y directa como «Y dirás», conservando el tono de mandato profético sin añadir explicaciones.
- source_word: מָה
  english_pob_choice: What was
  chosen_spanish: ¿Qué era
  alternatives_spanish:
  - ¿Qué fue
  - ¿Qué era
  lexicon: HALOT
  rationale: La pregunta retórica en español suena más natural con «¿Qué era...?»; mantiene la fuerza interrogativa del hebreo sin convertirla en paráfrasis interpretativa.
- source_word: אִמְּךָ
  english_pob_choice: your mother
  chosen_spanish: tu madre
  alternatives_spanish:
  - tu madre
  lexicon: HALOT
  rationale: Se conserva el sufijo de segunda persona singular con tratamiento directo. «Tu madre» es claro y fiel al destinatario implícito del oráculo.
- source_word: לְבִיָּא
  english_pob_choice: a lioness
  chosen_spanish: una leona
  alternatives_spanish:
  - una leona
  - una león hembra
  lexicon: HALOT
  rationale: El término es femenino específico; «leona» preserva el género y el cuadro maternal mejor que el masculino genérico.
- source_word: בֵּין אֲרָיוֹת
  english_pob_choice: Among lions
  chosen_spanish: Entre leones
  alternatives_spanish:
  - Entre leones
  - Entre leonas
  lexicon: HALOT
  rationale: 'Sigo la decisión textual más transparente: אֲרָיוֹת es el plural común «leones». En español «entre leones» mantiene la imagen sin forzar la lectura por sentido hacia «leonas».'
- source_word: רָבָצָה
  english_pob_choice: she lay down
  chosen_spanish: se tendía
  alternatives_spanish:
  - se tendía
  - se echaba
  lexicon: HALOT
  rationale: En español, «se tendía» conserva el gesto animal de recostarse o echarse y encaja bien en la imaginería poética, sin sobreinterpretar la postura.
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en medio de
  - entre
  lexicon: HALOT
  rationale: «En medio de» reproduce la relación espacial y la paralelidad del verso con un registro natural en español.
- source_word: כְּפִרִים
  english_pob_choice: young lions
  chosen_spanish: leoncillos
  alternatives_spanish:
  - leoncillos
  - leones jóvenes
  lexicon: HALOT
  rationale: Aunque el inglés opta por «young lions», en español «leoncillos» comunica mejor la idea de crías jóvenes de león y preserva la progresión maternal del pasaje.
- source_word: רִבְּתָה
  english_pob_choice: she reared
  chosen_spanish: crió
  alternatives_spanish:
  - crió
  - criaba
  - alimentó
  lexicon: HALOT
  rationale: «Crió» expresa la acción de criar/educar a la descendencia en un castellano natural y fiel al contexto maternal; evita reducir el verbo a mera multiplicación numérica.
- source_word: גוּרֶיהָ
  english_pob_choice: her cubs
  chosen_spanish: a sus cachorros
  alternatives_spanish:
  - a sus cachorros
  - a sus crías
  lexicon: HALOT
  rationale: «Cachorros» es el equivalente más idiomático para la descendencia de una leona. Se mantiene el posesivo femenino implícito en «sus».
translation_notes:
  revision_awareness: 'La versión española se ajusta al control textual de la edición WLC y sigue la solución auditada de la POB inglesa: mantener «leones» para אֲרָיוֹת y entender רִבְּתָה como crianza/educación de la prole. Se corrigió la anclaje de notas para que cada marcador aparezca exactamente en el texto.'
  spanish_consistency_notes:
  - Se preserva el paralelismo poético del hebreo con dos miembros coordinados.
  - Se evita introducir términos eclesiásticos o doctrinales ajenos al pasaje.
  - 'La imagen animal se mantiene coherente: leona / leones / leoncillos / cachorros.'
  - Los marcadores de nota [a] y [b] aparecen en el punto exacto del texto al que remiten.
