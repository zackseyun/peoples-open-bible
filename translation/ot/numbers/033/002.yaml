id: NUM.33.2
reference: Numbers 33:2
source:
  edition: WLC
  text: וַ/יִּכְתֹּ֨ב מֹשֶׁ֜ה אֶת מוֹצָאֵי/הֶ֛ם לְ/מַסְעֵי/הֶ֖ם עַל פִּ֣י יְהוָ֑ה וְ/אֵ֥לֶּה מַסְעֵי/הֶ֖ם לְ/מוֹצָאֵי/הֶֽם־־׃
translation:
  text: Moses wrote down their starting points according to their journeys at the command of Yahweh[c][b][a], and these were their journeys according to their starting points.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'by the mouth of the LORD,' an idiom meaning 'at the command of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their departures' / 'their goings out' for 'their starting points.'
    reason: lexical_alternative
  - marker: c
    text: 'The verse intentionally reverses the terms: ''their starting points according to their journeys'' ... ''their journeys according to their starting points.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  chosen: wrote down
  alternatives:
  - wrote
  - recorded
  lexicon: HALOT
  rationale: The waw-consecutive imperfect narrates a past event. 'Wrote down' brings out the sense of making a record without over-paraphrasing.
- source_word: מוֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: מוֹצָאֵיהֶם
  chosen: their starting points
  alternatives:
  - their departures
  - their goings out
  lexicon: HALOT
  rationale: מוֹצָא can denote a place or act of going out/departure. In this itinerary context, 'starting points' communicates the concrete stations from which they set out, fitting the paired contrast with 'journeys.'
- source_word: לְמַסְעֵיהֶם
  chosen: according to their journeys
  alternatives:
  - by their stages
  - for their journeys
  lexicon: HALOT
  rationale: מַסָּע refers to a breaking camp/journey stage. The prefixed ל here is best taken in a relational sense, linking the recorded starting points to the successive journeys. 'According to their journeys' preserves the formal structure of the Hebrew.
- source_word: עַל פִּי יְהוָה
  lemma: עַל־פִּי
  chosen: at the command of the LORD
  alternatives:
  - by the mouth of the LORD
  - according to the word of the LORD
  lexicon: HALOT
  rationale: The idiom עַל־פִּי literally means 'upon the mouth of,' but in context means by command or direction. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name.
- source_word: וְאֵלֶּה
  chosen: and these were
  alternatives:
  - and these are
  - now these were
  lexicon: HALOT
  rationale: The demonstrative introduces the list that follows. Supplying 'were' yields natural English while matching the retrospective narrative setting.
- source_word: מַסְעֵיהֶם
  chosen: their journeys
  alternatives:
  - their stages
  - their marches
  lexicon: HALOT
  rationale: A broad rendering that is natural in English and suitable for the itinerary heading; 'stages' is possible but less transparent for general readers.
- source_word: לְמוֹצָאֵיהֶם
  chosen: according to their starting points
  alternatives:
  - by their departures
  - from their starting points
  lexicon: HALOT
  rationale: 'Mirrors the earlier phrase and preserves the deliberate inversion in the Hebrew: starting points in relation to journeys, then journeys in relation to starting points.'
