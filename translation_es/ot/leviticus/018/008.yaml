translation:
  language: es
  text: No descubrirás la desnudez de la esposa de tu padre[a]; es la desnudez de tu padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más explícita: «No tendrás relaciones sexuales con la esposa de tu padre». El hebreo dice, literalmente, «descubrir la desnudez de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת
  english_pob_choice: the nakedness of
  chosen_spanish: la desnudez de
  alternatives_spanish:
  - la vergüenza de
  - las partes íntimas de
  lexicon: HALOT
  rationale: En Levítico 18 esta palabra forma parte de la fórmula legal fija «descubrir la desnudez». En español, «desnudez» conserva el registro idiomático y el paralelismo del capítulo mejor que una paráfrasis explicativa.
- source_word: אֵשֶׁת
  english_pob_choice: wife
  chosen_spanish: la mujer de
  alternatives_spanish:
  - la esposa de
  lexicon: HALOT
  rationale: El sentido contextual es marital y posesivo respecto de «tu padre». «La mujer de» reproduce con más naturalidad el vínculo legal en español, aunque «esposa» sería una alternativa válida y explícita.
- source_word: לֹא תְגַלֵּה
  english_pob_choice: you shall not uncover
  chosen_spanish: No descubrirás
  alternatives_spanish:
  - No debes descubrir
  - No has de descubrir
  lexicon: HALOT
  rationale: «Descubrir» mantiene el verbo metafórico de la fórmula hebrea. El futuro prohibitivo en español transmite adecuadamente la fuerza legal de la negación sin convertirla en paráfrasis interpretativa.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - de tu padre
  lexicon: HALOT
  rationale: Se traduce de forma directa y consistente. En la segunda cláusula se conserva el posesivo para reflejar el hebreo repetido y aclarar la relación legal.
- source_word: הִוא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - ella es
  lexicon: HALOT
  rationale: Aunque el pronombre hebreo es femenino, su referente funcional es «la desnudez» y no la mujer como sujeto de identidad. Por eso el español natural es «es la desnudez de tu padre».
theological_decisions:
- issue: Si explicitar en el texto principal el sentido eufemístico como relación sexual prohibida
  english_pob_reading: Retain the idiom 'uncover the nakedness' in the main text
  chosen_spanish_reading: Mantener en el texto principal «descubrir la desnudez»
  alternative_spanish_readings:
  - No tendrás relaciones sexuales con la mujer de tu padre
  - No te acostarás con la mujer de tu padre
  rationale: La fórmula hebrea es técnica y se repite en todo el capítulo. Conservarla en español preserva la voz legal del texto y evita borrar una tensión léxica documentada; la explicitación queda como alternativa interpretativa, no como traducción principal.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente sin cambios sustantivos; coincide con el alto grado de acuerdo del control cruzado y mantiene la fórmula legal idiomática del hebreo en la línea principal.
  spanish_consistency_notes:
  - Se conserva «desnudez» para mantener la fórmula recurrente de Levítico 18.
  - Se usa «tu padre» en ambas ocurrencias para reflejar la repetición del hebreo.
  - Se evita «SEÑOR» u otra sustitución, pues el versículo no contiene el nombre divino.
  - «Mujer de tu padre» prioriza el valor relacional del hebreo אֵשֶׁת en este contexto legal.
