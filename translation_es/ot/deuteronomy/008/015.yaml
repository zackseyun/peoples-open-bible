    reason: lexical_alternative
  - marker: b
    text: O «sequía» o «sed». El término hebreo denota una aridez extrema en un lugar sin agua.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota [a] para que recaiga sobre «serpientes ardientes», se eliminó la nota [c] no respaldada por la auditoría inglesa, se sustituyó «con sequedad» por «tierra reseca» para reflejar mejor la imaginería concreta de צִמָּאוֹן, y se mejoró la fluidez de «sacó para ti agua» a «hizo brotar para ti agua».
