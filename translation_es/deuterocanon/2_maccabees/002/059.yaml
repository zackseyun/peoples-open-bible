  to: Por tanto, a partir de aquí comencemos el relato[a], añadiendo solo esto a lo ya dicho; porque es insensato excederse antes de la historia[b], pero abreviar la historia misma.
  rationale: Se corrige la ubicación de la nota [a] para que recaiga sobre «relato», que es el elemento explicado por la nota. Además, se ajusta la sintaxis para un español más natural («a partir de aquí») y se reemplaza «uniendo» por «añadiendo», que refleja mejor el valor de ἐπιζεύξαντες. También se prefiere «excederse» a «ser prolijo» para expresar con más claridad el contraste retórico del original.
