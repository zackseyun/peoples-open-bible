  - Yahvé
  rationale: El versículo es puramente topográfico y narrativo; no hay base textual para insertar terminología divina.
  doctrine_reference: Principio de suficiencia textual y no adición
- issue: Determinación del final textual
  english_pob_reading: The Greek line in the provided Swete transcription breaks off at 'ἐπʼ ἀρι-'; the English POB footnote supplies the standard continuation as 'at the left hand of upper Cilicia.'
  chosen_spanish_reading: Se refleja la continuación estándar en el texto y se señala la interrupción de la línea griega en nota.
  alternative_spanish_readings:
  - dejar la frase en suspenso
  - traducir solo el fragmento conservado
  rationale: Dado que el audit trail inglés ya sigue la continuación estándar y documenta la ruptura del testimonio, la traducción española puede ser publicable si incorpora la nota sobre la variante textual.
  doctrine_reference: Crítica textual y transparencia editorial
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos respecto de su solución de referencia: avanzar desde Nínive, distancia idiomática de tres días, topónimo transliterado, y continuación textual estándar para la cláusula final. No se detectaron revisiones aplicadas en el contexto inglés; se mantuvo la misma lectura crítica y topográfica.'
  spanish_consistency_notes:
  - Se mantuvo el nombre propio Baikteileth de forma uniforme.
  - «Avanzaron» y «acamparon» conservan un registro narrativo sobrio y compatible con contexto militar.
  - Se prefirió «a la izquierda» frente a una equivalencia interpretativa como «al oeste», para no borrar la dirección literal documentada en el griego.
  - «Alta Cilicia» se usa como equivalente natural de τῆς ἄνω Κιλικίας en español bíblico-geográfico.
