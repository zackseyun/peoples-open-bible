lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Descendientes de
  lexicon: HALOT
  rationale: En contexto genealógico, בְּנֵי funciona como encabezado de lista de descendencia. «Los hijos de» conserva la relación filial de manera natural en español, mientras que «Y los hijos de» suena menos idiomático en una sola entrada genealógica y «descendientes de» sería más amplio de lo que exige el hebreo.
- source_word: מִשְׁמָע
  english_pob_choice: Mishma
  chosen_spanish: Mishma
  lexicon: HALOT
  rationale: Nombre propio; se translitera para preservar la forma hebrea sin traducir ni adaptar innecesariamente.
- source_word: חַמּוּאֵל
  english_pob_choice: Hammuel
  chosen_spanish: Hammuel
  alternatives_spanish:
  - Hamuel
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva «Hammuel» para reflejar mejor la forma consonántica hebrea, en línea con el audit trail inglés.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  - su descendiente
  lexicon: HALOT
  rationale: La forma con sufijo de 3.ª persona masculina singular expresa filiación directa. En español, «su hijo» es la equivalencia natural y precisa; «su descendiente» sería más general de lo necesario.
- source_word: זַכּוּר
  english_pob_choice: Zaccur
  chosen_spanish: Zaccur
  alternatives_spanish:
  - Zakkur
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la forma inglesa documentada en el POB para coherencia con el registro auditado.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Shimei
  alternatives_spanish:
  - Shimi
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma establecida por el POB inglés y ampliamente reconocible en español bíblico.
