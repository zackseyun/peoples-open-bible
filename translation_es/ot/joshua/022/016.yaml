revisions:
- from: 'Así ha dicho toda la congregación de Yahvé: «¿Qué es esta infidelidad[a] que habéis cometido contra el Dios de Israel, al volver hoy de seguir a Yahvé, al edificar para vosotros un altar, rebelándoos hoy contra Yahvé?»'
  to: 'Así dice toda la congregación de Yahvé: «¿Qué es esta infidelidad[a] que han cometido contra el Dios de Israel, al apartarse hoy de seguir a Yahvé, al edificar para ustedes un altar, para rebelarse hoy contra Yahvé?»'
  rationale: Se ajusta la fórmula de mensajero a «Así dice» para reflejar mejor el uso idiomático del hebreo y la decisión del POB. Se sustituye la segunda persona peninsular por formas neutrales («han», «ustedes») para cumplir el objetivo de español latinoamericano amplio. También se mejora «volver» a «apartarse» para expresar más claramente el sentido de desviarse de seguir a Yahvé, manteniendo la acusación de deslealtad pactual.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:40:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: fórmula de mensajero, comunidad pactal, acusación de מַעַל contra el Dios de Israel, apartarse de seguir a Yahvé, construir un altar y rebelarse contra Yahvé. Sin embargo, la forma verbal inicial «Así ha dicho» no reproduce tan bien la fórmula discursiva vigente del hebreo ni la decisión auditada del POB («Thus says»); en español bíblico natural aquí conviene «Así dice». Además, el uso de «vosotros / habéis / rebelándoos» desentona con el objetivo de español neutral latinoamericano y debe regularizarse a «ustedes».'
