lexical_decisions:
- source_word: הַנְּתִינִים
  english_pob_choice: the temple servants
  chosen_spanish: los servidores del templo
  alternatives_spanish:
  - los netinim
  - los dados
  - los siervos
  lexicon: HALOT
  rationale: El término es técnico y designa una clase vinculada al servicio del templo en los textos postexílicos. En español, “servidores del templo” comunica la función sin depender de transliteración opaca. Se evita “siervos” por su menor precisión funcional y “netinim” salvo nota, por ser más transliteración que traducción.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros del clan de
  lexicon: HALOT
  rationale: En listas genealógicas o registrales, בְּנֵי conserva una estructura formal de filiación. “Los hijos de” mantiene esa forma de manera natural y fiel en español.
- source_word: צִחָא
  english_pob_choice: Ziha
  chosen_spanish: Ziha
  alternatives_spanish:
  - Zijá
  - Zihá
  lexicon: transliteración estándar del nombre propio
  rationale: Se conserva el nombre propio por transliteración, sin intentar castellanizarlo. No hay base suficiente en el paquete para justificar una adaptación ortográfica distinta.
- source_word: חֲשֻׂפָא
  english_pob_choice: Hasupha
  chosen_spanish: Hasufa
  alternatives_spanish:
  - Hasufa
  - Hashufa
  lexicon: transliteración estándar del nombre propio
  rationale: Se mantiene el nombre propio con una transliteración española simple y legible. El inglés auditado conserva la variante ‘Hashupha’ como alternativa; en español, ‘Hasufa’ refleja de forma más directa la forma breve del nombre, mientras que ‘Hashufa’ queda como alternativa posible.
- source_word: טַבָּעוֹת
  english_pob_choice: Tabbaoth
  chosen_spanish: Tabbaot
  alternatives_spanish:
  - Tabbaot
  - Tabaot
  lexicon: transliteración estándar del nombre propio
  rationale: Se translitera el nombre propio sin añadir vocalizaciones no sustentadas. Se conserva la duplicación consonántica representada en el inglés auditado con ‘bb’ para reflejar la forma hebrea.
theological_decisions:
- issue: Designación técnica de los נְתִינִים
  english_pob_reading: the temple servants
  chosen_spanish_reading: los servidores del templo
  alternative_spanish_readings:
  - los netinim
  - los siervos del templo
  rationale: No se trata de una afirmación doctrinal sino de una categoría funcional. “Servidores del templo” mantiene el valor técnico y descriptivo sin ocultar que es un grupo especializado.
  doctrine_reference: Nehemías 7:46; cf. Esdras 2:43-58
- issue: Forma de traducir la estructura genealógica בְּנֵי
  english_pob_reading: the sons of
  chosen_spanish_reading: los hijos de
  alternative_spanish_readings:
  - los descendientes de
  - los miembros del clan de
  rationale: La lectura inglesa preserva la forma registral. En español, “los hijos de” reproduce de manera directa esa estructura sin sobreinterpretarla como mera descendencia biológica o como clan técnico.
  doctrine_reference: Listado genealógico/registral sin carga doctrinal
- issue: Tratamiento de nombres propios no transparentes
  english_pob_reading: Ziha / Hasupha / Tabbaoth
  chosen_spanish_reading: Ziha / Hasufa / Tabbaot
  alternative_spanish_readings:
  - Ziha / Hashufa / Tabbaot
  rationale: La prioridad es la transparencia al texto fuente. Se transliteran los nombres propios y se evita traducirlos o armonizarlos con una tradición eclesiástica específica.
  doctrine_reference: Principio de transliteración onomástica en listas bíblicas
translation_notes:
  revision_awareness: El expediente en inglés indica alta concordancia y ningún cambio necesario en la última revisión; por eso esta propuesta mantiene la lectura funcional de נְתִינִים, preserva la estructura de filiación con בני y respeta las variantes onomásticas documentadas sin introducir innovaciones innecesarias.
  spanish_consistency_notes:
  - Se usa “servidores del templo” para נְתִינִים de modo consistente con la función técnica del grupo.
  - Se mantiene “los hijos de” para conservar el paralelismo registral de la lista.
  - Los nombres propios se transliteran de forma sencilla y uniforme, sin acudir a equivalentes tradicionales no atestiguados en el paquete.
  - Se evita “SEÑOR” u otras sustituciones teológicas porque el versículo no contiene el tetragrámaton ni un título divino.
