translation:
  language: es
  text: Su yugo me fue para gloria[a], y daré gracias a mi maestro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo conservado dice literalmente 'su yugo', mientras que el griego transmite 'progreso me vino en ella'. La traducción principal sigue el hebreo transmitido, pero el testimonio griego queda como alternativa relevante.
    reason: textual_variant
  - marker: b
    text: 'O: ''daré gloria'' o ''daré acción de gracias'', si se sigue más de cerca el griego o el matiz hebreo de agradecimiento/confesión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֻלָּהּ / προκοπὴ ἐγένετό μοι ἐν αὐτῇ
  english_pob_choice: Her yoke was for me for glory / I made progress in her
  chosen_spanish: Su yugo me fue para gloria
  alternatives_spanish:
  - Su yugo fue para mí gloria
  - En ella hice progreso
  - Su yugo me fue un honor
  lexicon: HALOT; BDAG
  rationale: La evidencia hebrea y griega no coincide plenamente. El griego habla de progreso en ella, mientras que el hebreo conservado dice literalmente 'su yugo'. En español, 'Su yugo me fue para gloria' mantiene el dato hebreo y el valor de resultado/beneficio sin ocultar la dureza de la imagen.
- source_word: ἐν αὐτῇ
  english_pob_choice: in her
  chosen_spanish: Su
  alternatives_spanish:
  - en ella
  - por ella
  - de ella
  lexicon: BDAG
  rationale: La referencia femenina se conserva implícitamente en 'su', evitando una redundancia forzada en español y manteniendo abierta la alusión a Sabiduría.
- source_word: τῷ διδόντι μοι σοφίαν
  english_pob_choice: the one who gives me wisdom
  chosen_spanish: mi maestro
  alternatives_spanish:
  - el que me da sabiduría
  - el que me enseña
  - mis maestros
  lexicon: BDAG
  rationale: El hebreo paralelo apunta a 'mis maestros' o 'los que me enseñan', y la revisión inglesa reciente prefirió 'my teacher'. En español, 'mi maestro' conserva el referente humano posible y refleja la lectura revisada sin resolver indebidamente la tensión con el griego.
- source_word: δόξαν / הוֹדָאָה
  english_pob_choice: glory / thanks
  chosen_spanish: gloria / gracias
  alternatives_spanish:
  - honor / acción de gracias
  - alabanza / gracias
  - gloria / agradecimiento
  lexicon: BDAG; HALOT
  rationale: El griego pide 'gloria', mientras que el hebreo sugiere un matiz de agradecimiento/confesión. 'Gloria' y 'gracias' conservan ambas posibilidades en una forma natural para el lector en español.
theological_decisions:
- issue: Identidad del dador de sabiduría o del maestro
  english_pob_reading: A likely reference to God as the giver of wisdom, while allowing the Hebrew to suggest human teachers
  chosen_spanish_reading: Mi maestro puede leerse como un maestro humano, sin excluir que la sabiduría provenga finalmente de Dios
  alternative_spanish_readings:
  - el que me da sabiduría
  - mis maestros
  rationale: 'La tradición textual es mixta: el hebreo sugiere maestros humanos y el griego enfatiza al dador de sabiduría. La redacción española preserva esa tensión sin forzar una identificación dogmática única.'
  doctrine_reference: Preservar la tensión textual y teológica; Sabiduría como don divino mediado por enseñanza humana.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de una paráfrasis (''In her I made progress'') a una traducción más cercana al hebreo (''Her yoke was for me for glory'') y luego ajustó el segundo hemistiquio hacia ''my teacher''. La presente versión española intenta honrar esa revisión: conserva ''su yugo'' por el hebreo, pero deja visible la tensión con el griego, y adopta ''mi maestro'' para reflejar la revisión más reciente sin perder la alternativa de ''gracias/gloria''.'
  spanish_consistency_notes:
  - Se usa 'gloria' para δόξαν y se reserva 'gracias' como eco del hebreo הוֹדָאָה.
  - Se evita 'SEÑOR' o sustitutos litúrgicos porque no aparecen en este versículo.
  - '''Maestro'' se prefiere a ''señor'' o ''rabino'' por fidelidad al contexto sapiencial y al audit trail inglés.'
