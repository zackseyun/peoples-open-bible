  rationale: Se corrige la cláusula final para evitar la forma poco natural e inexacta «el Yahvé de nuestros padres» y ajustarla mejor al griego primario, manteniendo a la vez el uso de «Yahvé» exigido por el proyecto en la referencia divina anterior. También se repara la nota [a] para que contenga una alternativa real y útil.
