    issue: «condición de extranjeros» para παροικίας
    rationale: παροικία denota la residencia o estancia como forasteros, no principalmente una condición abstracta. «Condición» debilita el matiz espacial/residencial preservado por «sojourning» y por la nota inglesa.
  - severity: low
    issue: Nota a con «residentes ajenos»
    rationale: La frase suena poco idiomática en español. «Residentes extranjeros» o «forasteros» comunica mejor el valor léxico sin rareza.
  - severity: low
    issue: Nota b usa «muchísimos ganados»
    rationale: En español general y bíblico moderno, «ganado» como colectivo es más natural que el plural «ganados» en este contexto.
