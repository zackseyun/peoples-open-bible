translation:
  language: es
  text: En aquel tiempo Rezín, rey de Aram, devolvió Elat a Aram, y expulsó a los judeanos de Elat[a]; y los arameos[b] vinieron a Elat y viven allí hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El nombre del lugar aparece con variación ortográfica en este versículo: también puede transliterarse ‘Elot’.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘arameos’. Algunos intérpretes y testigos antiguos prefieren ‘edomitas’, probablemente porque esa lectura encaja mejor con el contexto amplio y con el relato paralelo de 2 Crónicas 28:17.'
    reason: textual_variant
lexical_decisions:
- source_word: הֵשִׁיב
  english_pob_choice: restored
  chosen_spanish: devolvió
  alternatives_spanish:
  - restauró
  - volvió a poner
  lexicon: HALOT
  rationale: En este contexto político-militar, el hifil de שוב expresa hacer que una ciudad vuelva a control ajeno. ‘Devolvió’ comunica la transferencia de posesión sin sonar tan interpretativo como ‘restauró’.
- source_word: אֵילַת / אֵילוֹת
  english_pob_choice: Elath / Eloth
  chosen_spanish: Elat
  alternatives_spanish:
  - Elath
  - Elot
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración española naturalizada. ‘Elat’ evita una transliteración excesivamente anglicada y respeta la variación ortográfica del hebreo sin sobrecargar el texto.
- source_word: לַאֲרָם
  english_pob_choice: to Aram
  chosen_spanish: a Aram
  alternatives_spanish:
  - para Aram
  - hacia Aram
  lexicon: HALOT
  rationale: La preposición marca transferencia de control o pertenencia. ‘A Aram’ conserva el valor direccional/político de la frase sin introducir una glosa.
- source_word: וַיְנַשֵּׁל
  english_pob_choice: drove ... out
  chosen_spanish: expulsó
  alternatives_spanish:
  - desalojó
  - arrojó fuera
  lexicon: HALOT
  rationale: El verbo expresa remover a habitantes de un lugar. ‘Expulsó’ es la equivalencia española más directa y fuerte para ese acto de desposesión.
- source_word: הַיְהוּדִים
  english_pob_choice: the Judeans
  chosen_spanish: los judeanos
  alternatives_spanish:
  - los judíos
  - los hombres de Judá
  lexicon: HALOT
  rationale: En el marco monárquico se trata de personas de Judá. ‘Judeanos’ preserva la referencia histórica del etnónimo sin desplazarlo al uso posterior de ‘judíos’.
- source_word: וַאֲרָמִים
  english_pob_choice: the Arameans
  chosen_spanish: los arameos
  alternatives_spanish:
  - los sirios
  - los edomitas
  lexicon: HALOT
  rationale: El texto consonántico dice ‘arameos’, por lo que se mantiene el etnónimo directo. La lectura alternativa ‘edomitas’ queda para nota textual, no para el texto principal.
- source_word: וַיֵּשְׁבוּ שָׁם עַד הַיּוֹם הַזֶּה
  english_pob_choice: have lived there to this day
  chosen_spanish: habitaron allí hasta hoy
  alternatives_spanish:
  - vivieron allí hasta hoy
  - se establecieron allí hasta hoy
  lexicon: HALOT
  rationale: La expresión hebrea indica residencia continuada hasta el presente del narrador. ‘Habitaron allí hasta hoy’ conserva el valor idiomático y la forma narrativa sobria del hebreo.
theological_decisions:
- issue: Lectura textual del etnónimo final
  english_pob_reading: the Arameans came to Elath
  chosen_spanish_reading: los arameos fueron a Elat
  alternative_spanish_readings:
  - los edomitas fueron a Elat
  rationale: El texto masorético lee ‘arameos’, y esa lectura se mantiene en el cuerpo principal. Dado que la variante ‘edomitas’ está ampliamente discutida por el paralelo de 2 Crónicas 28:17, se preserva como alternativa implícita en el aparato de la traducción, no en el texto principal.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se requirieron cambios sustantivos. Se mantuvo la lectura masorética de ‘arameos’, con la variante textual preservada en nota, y se ajustó la versión española para que sea publicable, clara y fiel al hebreo.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ según la terminología general del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - ‘Aram’ se conservó como nombre propio geográfico-político, no como ‘Siria’.
  - ‘Judeanos’ se eligió para el etnónimo histórico de Judá; no se sustituyó por ‘judíos’ para evitar anacronismo.
  - ‘Elat’ mantiene la transliteración española coherente del topónimo, con nota sobre la variante ortográfica.
  - La sintaxis sigue de cerca el hebreo narrativo sin calco innecesario, preservando el orden y la secuencia de acciones.
