translation:
  language: es
  text: Son hechos por carpinteros y orfebres; no pueden llegar a ser otra cosa que lo que los artesanos quieren que lleguen a ser.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὑπὸ
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - de parte de
  - a manos de
  lexicon: BDAG
  rationale: La preposición griega introduce el agente de la pasiva; en español, «por» expresa de manera natural esa agencia sin perder el matiz instrumental del trabajo humano.
- source_word: τεκτόνων
  english_pob_choice: carpenters
  chosen_spanish: carpinteros
  alternatives_spanish:
  - artesanos
  - constructores
  lexicon: BDAG
  rationale: El contexto de fabricación de ídolos pide un oficio concreto y tangible. «Carpinteros» conserva la concreción del trabajo manual que la audición inglesa quiso preservar.
- source_word: χρυσοχόων
  english_pob_choice: goldsmiths
  chosen_spanish: orfebres
  alternatives_spanish:
  - plateros
  - trabajadores del oro
  lexicon: BDAG
  rationale: El término apunta a quienes trabajan metales preciosos; «orfebres» es el equivalente natural y preciso en español, más amplio que «plateros» y más idiomático que una paráfrasis.
- source_word: κατεσκευασμένα
  english_pob_choice: are made
  chosen_spanish: son hechos
  alternatives_spanish:
  - son fabricados
  - han sido hechos
  lexicon: BDAG
  rationale: El participio pasivo describe objetos fabricados por manos humanas. «Son hechos» mantiene la pasividad y la sencillez del inglés POB sin añadir tecnicismos.
- source_word: οὐθὲν ἄλλο
  english_pob_choice: nothing other than
  chosen_spanish: otra cosa que
  alternatives_spanish:
  - nada más que
  - ninguna otra cosa
  lexicon: BDAG
  rationale: La construcción negativa excluye cualquier posibilidad adicional. «Otra cosa que» en «no pueden llegar a ser otra cosa que...» reproduce bien esa exclusión enfática en español.
- source_word: μὴ γένηται
  english_pob_choice: can become
  chosen_spanish: pueden llegar a ser
  alternatives_spanish:
  - pueden convertirse
  - pueden ser
  lexicon: BDAG
  rationale: El griego expresa posibilidad/límite de llegar a un estado distinto. «Llegar a ser» conserva el movimiento verbal y evita reducir el sentido a mera identidad estática.
- source_word: βούλονται
  english_pob_choice: want
  chosen_spanish: quieren
  alternatives_spanish:
  - desean
  - pretenden
  lexicon: BDAG
  rationale: La voluntad de los artesanos es explícita. «Quieren» es la correspondencia más directa y clara en español, como «want» en el texto inglés auditado.
- source_word: οἱ τεχνῖται
  english_pob_choice: the craftsmen
  chosen_spanish: los artesanos
  alternatives_spanish:
  - los obreros
  - los artistas
  lexicon: BDAG
  rationale: El sustantivo abarca a los fabricantes especializados. «Artesanos» es el término más natural en español para el grupo que diseña y produce los ídolos; además, evita la repetición excesiva con «carpinteros» y «orfebres».
- source_word: αὐτὰ γενέσθαι
  english_pob_choice: them to become
  chosen_spanish: que lleguen a ser
  alternatives_spanish:
  - que sean
  - que se conviertan
  lexicon: BDAG
  rationale: La repetición del verbo de llegar a ser refuerza el límite impuesto por la intención humana. «Que lleguen a ser» conserva esa dirección procesual mejor que una simple cópula.
theological_decisions:
- issue: Descripción de los ídolos como productos humanos sin autonomía
  english_pob_reading: The verse emphasizes that idols are entirely products of human artisans and have no independent power or identity beyond human design.
  chosen_spanish_reading: El versículo subraya que los ídolos son totalmente productos de manos humanas y no poseen identidad ni posibilidad propias fuera del diseño de sus hacedores.
  alternative_spanish_readings:
  - Una versión más literal podría limitarse a su origen material, sin explicitar la falta de autonomía.
  - También podría leerse solo como una observación sobre fabricación, con menos fuerza polémica.
  rationale: La secuencia de cláusulas va del origen fabricado al límite absoluto de lo que pueden ser. La redacción española conserva esa polémica contra la idolatría sin añadir ideas externas, y deja visible que el texto no habla solo de origen sino de dependencia total de la voluntad del artesano.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto griego y es coherente con el auditorío inglés: mantiene la agencia humana explícita, el contraste entre fabricación e incapacidad, y la repetición verbal de «llegar a ser» que refleja γένηται / γενέσθαι. No se requirieron notas textuales adicionales, porque no hay variantes ni tensiones léxicas que el español obligue a resolver con pie de página.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y sobrio, evitando calcos excesivos.
  - «Orfebres» traduce con precisión χρυσοχόων y encaja mejor que opciones más generales.
  - Se evitó «señor» o fórmulas eclesiásticas no presentes en el texto, pues aquí no aplica la terminología de Yahvé/κύριος.
  - «Llegar a ser» preserva el matiz de proceso/resultado que el griego expresa mediante γίνομαι, sin forzar una equivalencia estática.
