translation:
  language: es
  text: Después de haber engendrado a Lamec, Matusalén vivió 782 años y engendró hijos e hijas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - vivió
  - vivió por
  lexicon: HALOT
  rationale: En la fórmula genealógica, el wayyiqtol de חיה introduce el período de vida posterior al nacimiento del hijo nombrado. En español, «vivió» reproduce con naturalidad ese uso narrativo sin añadir matices ajenos al hebreo.
- source_word: מְתוּשֶׁלַח
  english_pob_choice: Methuselah
  chosen_spanish: Metusalén
  alternatives_spanish:
  - Matusalén
  lexicon: convención onomástica española
  rationale: Se translitera el nombre propio según la forma española tradicional y ampliamente reconocible, manteniendo la identificación del personaje bíblico.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: La preposición marca posterioridad temporal respecto del engendramiento de Lamec; «después de» es la equivalencia más clara y directa en español.
- source_word: הוֹלִידוֹ
  english_pob_choice: he fathered
  chosen_spanish: haber engendrado
  alternatives_spanish:
  - engendrarlo
  - haber sido padre de
  lexicon: HALOT
  rationale: El hiphil de ילד con sufijo de 3ms expresa que Metusalén fue el agente de la generación de Lamec. «Engendrado» conserva el sentido genealógico y la especificidad verbal sin sonar tan coloquial como «ser padre de».
- source_word: שְׁתַּיִם וּשְׁמוֹנִים שָׁנָה וּשְׁבַע מֵאֹת שָׁנָה
  english_pob_choice: 782 years
  chosen_spanish: 782 años
  alternatives_spanish:
  - setecientos ochenta y dos años
  - setecientos y ochenta y dos años
  lexicon: HALOT
  rationale: La secuencia hebrea suma literalmente 2 + 80 + 700 años. En español, el total numérico «782 años» conserva exactamente el valor y sigue el estilo de la decisión auditada en inglés.
- source_word: וַיּוֹלֶד
  english_pob_choice: and fathered
  chosen_spanish: y engendró
  alternatives_spanish:
  - y fue padre de
  - y tuvo
  lexicon: HALOT
  rationale: Para mantener la coherencia con la primera cláusula y con el verbo genealógico hebreo ילד, «engendró» preserva el vínculo formal con el texto fuente mejor que opciones más libres como «tuvo».
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - varones y mujeres
  - descendencia
  lexicon: HALOT
  rationale: El hebreo especifica descendencia masculina y femenina. En español, «hijos e hijas» comunica esa distinción de manera natural y suficientemente precisa.
translation_notes:
  revision_awareness: El inglés POB ya fue revisado y quedó sin cambios, con acuerdo alto en la evaluación cruzada; por eso la versión española sigue de cerca esa lectura, manteniendo la estructura genealógica y el valor numérico total sin introducir variantes textuales no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene el estilo genealógico breve y paratáctico del pasaje.
  - Se usa un nombre propio español tradicional para consistencia bíblica en español.
  - Se conserva el verbo genealógico «engendrar» para alineación semántica con ילד y con la repetición del contexto.
  - Se expresa el total numérico directamente como 782 años, sin descomponerlo en palabras, para reflejar la equivalencia auditada del inglés.
