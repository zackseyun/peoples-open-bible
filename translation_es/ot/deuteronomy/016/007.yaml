translation:
  language: es
  text: Y cocinarás[a] y comerás en el lugar que Yahvé tu Dios escogerá, y por la mañana te volverás e irás a tus tiendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hervirás'. El verbo hebreo puede denotar específicamente hervir, aunque aquí quizá se use en un sentido más amplio para cocinar o preparar la comida pascual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשַּׁלְתָּ
  english_pob_choice: cook it
  chosen_spanish: cocinarás
  alternatives_spanish:
  - hervirás
  - prepararás
  lexicon: HALOT
  rationale: El hebreo puede significar 'cocinar' o, en un sentido más específico, 'hervir'. En este contexto de Pascua, la POB inglesa conserva el sentido amplio en el texto principal para no imponer 'hervir' donde el verbo admite más de una lectura. 'Cocinarás' es natural en español y mantiene esa amplitud; la alternativa más específica queda preservada en la nota.
- source_word: וְאָכַלְתָּ
  english_pob_choice: eat it
  chosen_spanish: comerás
  alternatives_spanish:
  - lo comerás
  lexicon: HALOT
  rationale: El objeto está implícito por el contexto del sacrificio/pascua. En español, omitir el pronombre en el texto principal mantiene fluidez y sigue el sentido del hebreo; 'lo comerás' sería igualmente posible, pero menos elegante aquí.
- source_word: בַּמָּקוֹם
  english_pob_choice: in the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - en el sitio
  - en el lugar mismo
  lexicon: HALOT
  rationale: '''En el lugar'' reproduce de manera clara la fórmula locativa de Deuteronomio sin sobrecargarla. En español bíblico moderno es transparente y fiel al valor local del sustantivo.'
- source_word: אֲשֶׁר יִבְחַר
  english_pob_choice: that ... will choose
  chosen_spanish: que Yahvé tu Dios escogiera
  alternatives_spanish:
  - que Yahvé tu Dios escogerá
  - que Yahvé tu Dios elija
  lexicon: HALOT
  rationale: La construcción de elección del santuario se expresa naturalmente en futuro. En español, 'escogiera' dentro de la cláusula relativa suena más idiomático y refleja la referencia a un lugar aún no fijado en el marco de la ley; 'escogerá' también sería viable, pero menos flexible sintácticamente en este entorno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio doctrinal del proyecto para el Tetragrámaton. 'Yahvé' es la forma establecida para el texto español, preservando el nombre propio del pacto en vez de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La expresión de alianza se vierte de manera directa y estándar como 'tu Dios'. Mantiene el tono de relación pactal sin añadir elementos ajenos al hebreo.
- source_word: וּפָנִיתָ
  english_pob_choice: you shall turn
  chosen_spanish: te volverás
  alternatives_spanish:
  - te darás la vuelta
  - te orientarás
  lexicon: HALOT
  rationale: El verbo concreto de 'volver/turn back' se expresa de forma natural como 'te volverás'. En este contexto marca el inicio de la retirada después de la celebración, sin perder la imagen corporal del hebreo.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - a la mañana
  lexicon: HALOT
  rationale: '''Por la mañana'' es la forma más natural en español para este adverbial temporal y no añade precisión indebida.'
- source_word: וְהָלַכְתָּ
  english_pob_choice: go
  chosen_spanish: te irás
  alternatives_spanish:
  - irás
  - saldrás
  lexicon: HALOT
  rationale: '''Irse'' comunica mejor la salida/departida en español que un simple ''ir'', que aquí puede sonar incompleto. Preserva la idea de movimiento hacia el propio destino.'
- source_word: לְאֹהָלֶיךָ
  english_pob_choice: to your tents
  chosen_spanish: a tus tiendas
  alternatives_spanish:
  - a tus hogares
  - a tus moradas
  lexicon: HALOT
  rationale: Se conserva 'tiendas' en el texto principal por su concreción histórica y porque el hebreo dice literalmente 'tus tiendas'. Aunque puede equivaler idiomáticamente a 'hogares', la forma literal es más auditable y mantiene la imagen original.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo emplea el Tetragrámaton de manera directa. Siguiendo la decisión doctrinal del proyecto, se preserva el nombre propio en español como 'Yahvé', evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Posible tensión entre 'cocinar' aquí y la prohibición de Éxodo 12:9
  english_pob_reading: 'cook it / footnote: boil it'
  chosen_spanish_reading: 'cocinarás / nota: también puede significar hervir'
  alternative_spanish_readings:
  - hervirás
  - prepararás
  rationale: Se mantiene en el texto principal el sentido amplio de 'cocinar', porque el verbo hebreo admite esa amplitud y el contexto pascual no obliga a reducirlo a 'hervir'. La nota conserva la alternativa más estrecha para no borrar la tensión textual con Éxodo 12:9.
  doctrine_reference: 'Translation philosophy #3: preservar la tensión teológica/lexical en vez de resolverla prematuramente'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail en inglés, que eliminó 'for it' por no estar representado en el hebreo. Por eso el español evita cualquier complemento equivalente. También se conservó la resolución del equipo editorial de mantener el verbo en sentido amplio ('cook') y no fijarlo como 'boil' en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se preserva 'tiendas' para אֹהָלֶיךָ por fidelidad concreta al hebreo.
  - El español evita añadir 'lo' o 'para ello', porque el hebreo no lo expresa.
  - La secuencia verbal 'te volverás y te irás' intenta reflejar la doble idea de giro/departida sin perder naturalidad en español.
