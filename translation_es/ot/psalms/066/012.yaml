translation:
  language: es
  text: Hiciste que hombres montaran sobre nuestras cabezas[a]; pasamos por fuego y por agua, y nos sacaste a un lugar de abundancia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre»; el hebreo tiene el singular «un hombre», que aquí puede funcionar de manera colectiva.
    reason: lexical_alternative
  - marker: b
    text: O «a alivio», «a plenitud» o «a un lugar de abundancia»; el hebreo sugiere también la idea de saciedad o de abundancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְכַּבְתָּ
  english_pob_choice: made ... ride
  chosen_spanish: hiciste que ... montaran
  alternatives_spanish:
  - hiciste montar a ...
  - causaste que ... montaran
  lexicon: HALOT
  rationale: El hiphil de רכב es causativo. En español, «hiciste que montaran» conserva la fuerza causativa y suena natural, sin perder la imagen de dominio sobre los que están abajo.
- source_word: אֱנוֹשׁ
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - un hombre
  - seres humanos
  - mortalidad humana
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, el contexto puede tener sentido colectivo. «Hombres» comunica la pluralidad implícita que la revisión inglesa finalmente prefirió, sin borrar que la expresión hebrea es más literal y singular en forma.
- source_word: לְרֹאשֵׁנוּ
  english_pob_choice: over our heads
  chosen_spanish: sobre nuestras cabezas
  alternatives_spanish:
  - encima de nuestras cabezas
  - sobre nosotros
  lexicon: HALOT
  rationale: La expresión idiomática de sometimiento se conserva mejor con «sobre nuestras cabezas», que mantiene la imagen corporal y la idea de dominación.
- source_word: בָּאנוּ
  english_pob_choice: we went through
  chosen_spanish: pasamos por
  alternatives_spanish:
  - atravesamos
  - fuimos por
  - entramos en
  lexicon: HALOT
  rationale: El verbo básico es «venir», pero con el paralelismo de fuego y agua el sentido es el de atravesar una prueba. «Pasamos por» transmite ese recorrido sin apartarse demasiado del texto.
- source_word: בָאֵשׁ וּבַמַּיִם
  english_pob_choice: through fire and through water
  chosen_spanish: por fuego y por agua
  alternatives_spanish:
  - a través del fuego y del agua
  - entre fuego y agua
  - en fuego y en agua
  lexicon: HALOT
  rationale: La fórmula hebrea es un paralelismo de pruebas extremas. «Por fuego y por agua» mantiene la brevedad poética y la secuencia repetida del original.
- source_word: וַתּוֹצִיאֵנוּ
  english_pob_choice: you brought us out
  chosen_spanish: nos sacaste
  alternatives_spanish:
  - nos hiciste salir
  - nos condujiste fuera
  - nos sacaste de allí
  lexicon: HALOT
  rationale: El hiphil de יצא expresa sacar o hacer salir. «Nos sacaste» es breve, claro y apto para el registro poético del salmo.
- source_word: לָרְוָיָה
  english_pob_choice: into abundance
  chosen_spanish: a abundancia
  alternatives_spanish:
  - en abundancia
  - a la abundancia
  - a plenitud
  lexicon: HALOT
  rationale: El sustantivo puede sugerir saturación, abundancia o alivio tras la aflicción. «A abundancia» conserva la idea de un destino de plenitud, mientras deja abierta la tensión semántica que el inglés también preservó.
theological_decisions:
- issue: Cómo mantener la imagen de humillación sin explicarla en exceso
  english_pob_reading: Retain the concrete image 'a man ride over our heads' without specifying the oppressor further.
  chosen_spanish_reading: Conservar la imagen concreta de hombres montando sobre nuestras cabezas, sin identificar a los opresores.
  alternative_spanish_readings:
  - nos pisotearon nuestros enemigos
  - pusiste gobernantes sobre nosotros
  - nos sometiste a enemigos
  rationale: El hebreo presenta una imagen vívida pero no especificada. La versión española conserva esa concreción y evita añadir una interpretación política o militar que el texto no exige.
  doctrine_reference: Principios de transparencia y no ampliación interpretativa del proyecto POB
- issue: Cómo traducir לָרְוָיָה sin cerrar su amplitud semántica
  english_pob_reading: Use 'abundance' in the main text and preserve 'refreshment' in a footnote.
  chosen_spanish_reading: Usar «abundancia» en el texto principal y preservar una alternativa semántica en nota.
  alternative_spanish_readings:
  - refresco
  - alivio
  - plenitud
  - lugar de abundancia
  rationale: La palabra puede evocar tanto abundancia como alivio después de la prueba. «Abundancia» funciona bien en español bíblico y mantiene abierta la tensión lexical, en vez de reducir el término a una sola idea.
  doctrine_reference: Principios de preservar tensiones léxicas documentadas
translation_notes:
  revision_awareness: La revisión inglesa pasó de «a man» a «men» para reflejar mejor el sentido colectivo de אֱנוֹשׁ. La redacción española adopta ese ajuste con «hombres», mientras mantiene la imagen de sometimiento y el final abierto de לָרְוָיָה.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton.
  - Se prefirió «abundancia» como término principal para לָרְוָיָה, coherente con el audit trail inglés.
  - 'Se mantuvo un ritmo poético paralelo: «por fuego y por agua».'
  - La nota a conserva la tensión entre singular formal y sentido colectivo del hebreo.
