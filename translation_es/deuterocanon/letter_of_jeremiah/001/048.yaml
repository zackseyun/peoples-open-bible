translation:
  language: es
  text: Porque cuando la guerra y las calamidades vienen sobre ellos[a], los sacerdotes deliberan entre sí dónde esconderse con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, los ídolos o imágenes mencionados en el pasaje circundante.
    reason: cross_reference
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: BDAG
  rationale: Introduce una situación futura general y repetible; «cuando» es natural en español y conserva ese valor sin volver la frase excesivamente condicional.
- source_word: ἐπέλθῃ
  english_pob_choice: come upon
  chosen_spanish: caen sobre
  alternatives_spanish:
  - vienen sobre
  - se abaten sobre
  lexicon: BDAG
  rationale: El griego expresa llegada con fuerza contra el objeto; «caen sobre» preserva el movimiento dirigido y la carga de irrupción.
- source_word: πόλεμος
  english_pob_choice: war
  chosen_spanish: la guerra
  alternatives_spanish:
  - la batalla
  lexicon: BDAG
  rationale: «Guerra» es el equivalente más directo y amplio, más adecuado que «batalla» para el contexto de crisis colectiva.
- source_word: κακά
  english_pob_choice: calamities
  chosen_spanish: calamidades
  alternatives_spanish:
  - males
  - desastres
  - tribulaciones
  lexicon: BDAG
  rationale: Aquí no se trata de mal moral sino de males concretos que sobrevienen; «calamidades» mantiene un registro formal y el sentido de desgracias sobrevenidas.
- source_word: βουλεύονται
  english_pob_choice: consult among themselves
  chosen_spanish: deliberan entre sí
  alternatives_spanish:
  - consultan entre sí
  - toman consejo entre sí
  lexicon: BDAG
  rationale: El valor medio y el complemento pronominal señalan discusión mutua; «deliberan entre sí» suena natural y formal en español.
- source_word: πρὸς ἑαυτούς
  english_pob_choice: among themselves
  chosen_spanish: entre sí
  alternatives_spanish:
  - unos con otros
  - entre ellos mismos
  lexicon: BDAG
  rationale: La frase marca consulta recíproca, no reflexión interna; «entre sí» reproduce bien esa relación colectiva.
- source_word: ποῦ
  english_pob_choice: where
  chosen_spanish: dónde
  alternatives_spanish:
  - en qué lugar
  lexicon: BDAG
  rationale: Interrogativo locativo directo; «dónde» es claro y idiomático.
- source_word: συγκαρυβῶσι
  english_pob_choice: hide with them
  chosen_spanish: esconderse con ellos
  alternatives_spanish:
  - ocultarse con ellos
  - refugiarse con ellos
  lexicon: LSJ
  rationale: El verbo raro expresa ocultarse en asociación con el referente; «esconderse» conserva la idea básica sin añadir más de lo que el griego exige.
- source_word: μετʼ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  - al lado de ellos
  lexicon: BDAG
  rationale: Mantiene la preposición de compañía y el referente pronominal del texto griego.
theological_decisions:
- issue: Referente de αὐτὰ / αὐτῶν
  english_pob_reading: the pronouns refer to the idols/images described in the surrounding context
  chosen_spanish_reading: los pronombres remiten a los ídolos o imágenes del contexto circundante
  alternative_spanish_readings:
  - los pronombres se dejan implícitos como «ellos» sin explicación
  - los pronombres se explicitan directamente como «los ídolos» en el texto principal
  rationale: El griego conserva el antecedente mediante pronombres; para respetar esa tensión y la transparencia del texto, el cuerpo de la traducción mantiene «ellos» y la nota identifica el referente contextual sin sustituirlo en el versículo.
  doctrine_reference: Primacía del texto original; mantener la referencia contextual sin sobreexplicarla en el cuerpo del versículo.
translation_notes:
  revision_awareness: Se siguió de cerca el ajuste revisado del inglés POB al preferir un término formal para κακά y al evitar una repetición reflexiva innecesaria; en español se conservó la economía del original con una construcción natural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma editorial solo cuando corresponda; este versículo no lo requiere.
  - Se evitó introducir «ídolos» en el texto principal para conservar la referencia pronominal del griego.
  - «Deliberan entre sí» y «entre sí» reproducen la consulta mutua expresada por βουλεύονται πρὸς ἑαυτούς.
  - «Esconderse con ellos» conserva la ironía del contexto sin añadir explicación interpretativa al versículo.
