revisions:
- from: Pero el territorio de los hijos de Dan salió más allá de ellos[a], de modo que los hijos de Dan subieron y pelearon contra Lesem, y la capturaron, y la hirieron a filo de espada, y tomaron posesión de ella, y habitaron en ella; y llamaron a Lesem Dan[b], conforme al nombre de Dan su padre.
  to: Pero el territorio de los hijos de Dan salió más allá de ellos[a]. Entonces los hijos de Dan subieron, pelearon contra Lesem, la capturaron, la hirieron con el filo de la espada, tomaron posesión de ella y habitaron en ella; y llamaron a Lesem Dan[b], según el nombre de Dan, su padre.
  rationale: 'La revisión conserva todas las decisiones fuente-clave del POB inglés, pero mejora tres puntos de estilo y precisión: (1) reemplaza el conector consecutivo excesivo por una transición narrativa más neutra; (2) ajusta el modismo de la espada para que sea natural en español y fiel a la fórmula militar hebrea; y (3) suaviza la frase final para una lectura más idiomática sin perder el hebraísmo de parentesco tribal.'
