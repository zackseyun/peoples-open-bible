translation:
  language: es
  text: 'Y manda al pueblo, diciendo: «Ustedes están a punto de pasar[a] por el territorio[b] de sus hermanos, los hijos de Esaú, que habitan en Seír; y tendrán miedo de ustedes. Así que tengan mucho cuidado[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ustedes están pasando» o «ustedes pasarán». El participio hebreo puede expresar una acción inminente.
    reason: lexical_alternative
  - marker: b
    text: O «frontera». El término hebreo puede referirse tanto a una línea fronteriza como al territorio delimitado por ella.
    reason: lexical_alternative
  - marker: c
    text: O «por eso, cuídense muy bien».
    reason: lexical_alternative
lexical_decisions:
- source_word: צַו
  english_pob_choice: command
  chosen_spanish: manda
  alternatives_spanish:
  - comanda
  - ordena
  lexicon: HALOT
  rationale: El imperativo צַו exige una orden con fuerza autoritativa. En español, «manda» comunica bien esa fuerza sin sonar rígido o arcaico; «ordena» también es posible, pero «manda» encaja mejor con el tono bíblico y con el contexto de una instrucción dada a Moisés para transmitir al pueblo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: עַם aquí se refiere a Israel como colectivo. «El pueblo» mantiene esa referencia comunitaria y es la opción más natural en español bíblico moderno.
- source_word: אַתֶּם עֹבְרִים
  english_pob_choice: you are about to pass through
  chosen_spanish: ustedes están a punto de pasar
  alternatives_spanish:
  - ustedes pasan
  - ustedes van a pasar
  lexicon: HALOT
  rationale: El participio con pronombre independiente expresa una acción inminente. «Están a punto de pasar» conserva esa cercanía temporal mejor que un presente simple, y sigue la lectura auditada del POB inglés.
- source_word: בִּגְבוּל
  english_pob_choice: through the territory
  chosen_spanish: por el territorio
  alternatives_spanish:
  - por el límite
  - por la frontera
  lexicon: HALOT
  rationale: גְּבוּל puede significar límite, frontera o territorio. En este contexto de tránsito, «territorio» comunica mejor la zona geográfica por la que van a atravesar, sin reducirlo solo a una línea fronteriza.
- source_word: אֲחֵיכֶם בְּנֵי עֵשָׂו
  english_pob_choice: your brothers, the sons of Esau
  chosen_spanish: sus hermanos, los hijos de Esaú
  alternatives_spanish:
  - sus parientes, los descendientes de Esaú
  - sus hermanos, los descendientes de Esaú
  lexicon: HALOT
  rationale: Se preserva la relación de parentesco con «hermanos», porque el hebreo la usa de forma intencional. «Hijos de Esaú» reproduce la expresión genealógica directa del texto; «descendientes» sería posible, pero no es tan literal.
- source_word: הַיֹּשְׁבִים בְּשֵׂעִיר
  english_pob_choice: who live in Seir
  chosen_spanish: que habitan en Seír
  alternatives_spanish:
  - que viven en Seír
  - que moran en Seír
  lexicon: HALOT
  rationale: El participio de ישב indica residencia estable. «Habitan» conserva bien ese matiz y mantiene un registro bíblico claro; «viven» sería más cotidiano, pero un poco menos solemne.
- source_word: וְיִירְאוּ מִכֶּם
  english_pob_choice: and they will be afraid of you
  chosen_spanish: y tendrán miedo de ustedes
  alternatives_spanish:
  - y temerán a ustedes
  - y estarán asustados de ustedes
  lexicon: HALOT
  rationale: ירא con מן expresa temor ante la presencia del otro. «Tendrán miedo de ustedes» es natural en español y refleja adecuadamente el sentido predictivo del imperfecto; «temerán a ustedes» es más literal, pero menos idiomático.
- source_word: וְנִשְׁמַרְתֶּם מְאֹד
  english_pob_choice: So be very careful
  chosen_spanish: Así que tengan mucho cuidado
  alternatives_spanish:
  - por tanto, cuídense mucho
  - así que estén muy atentos
  lexicon: HALOT
  rationale: 'El nifal de שמר tiene aquí fuerza reflexiva: implica cuidarse o mantenerse alerta. «Tengan mucho cuidado» transmite bien la advertencia práctica en español natural, preservando el énfasis de מְאֹד.'
theological_decisions:
- issue: Lenguaje de parentesco para Edom
  english_pob_reading: your brothers, the sons of Esau
  chosen_spanish_reading: sus hermanos, los hijos de Esaú
  alternative_spanish_readings:
  - sus parientes, los descendientes de Esaú
  - sus hermanos, los descendientes de Esaú
  rationale: El versículo fundamenta la conducta de Israel hacia Edom en una relación familiar real, no solo étnica. Mantener «hermanos» preserva esa carga histórico-covenantal y evita diluirla en una formulación más genérica.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral; preserve source intent
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente; el último pase indica que el texto quedó sin cambios y con alto grado de acuerdo entre revisores. La redacción española sigue ese estado estable, manteniendo las decisiones léxicas y la tensión semántica documentada por el POB inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantiene «Seír» como topónimo propio transliterado de forma estándar.
  - «Hijos de Esaú» conserva la genealogía explícita del hebreo y no se reemplaza por una paráfrasis más amplia.
  - «Tengan mucho cuidado» refleja el valor exhortativo del nifal reflexivo sin añadir contenido no sustentado.
