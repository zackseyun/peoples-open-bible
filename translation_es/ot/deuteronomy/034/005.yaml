revisions:
- from: Así murió allí Moisés, el esclavo de Yahvé, en la tierra de Moab[a], conforme a la palabra de Yahvé.
  to: Así murió allí Moisés, siervo de Yahvé, en la tierra de Moab[a], conforme a la palabra de Yahvé.
  rationale: 'Se revisa ''el esclavo de Yahvé'' a ''siervo de Yahvé'' para ajustarse a la decisión léxica y teológica documentada en el POB: aquí עֶבֶד funciona como título honorífico de Moisés. Se conserva ''Yahvé'', ''tierra de Moab'' y la nota sobre עַל־פִּי יְהוָה. No se requiere adjudicación adicional porque la corrección está claramente respaldada por el expediente auditado.'
