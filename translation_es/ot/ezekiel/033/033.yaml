revisions:
- from: Cuando esto ocurra[a]—y he aquí, está ocurriendo—entonces sabrán que hubo un profeta entre ellos.
  to: Cuando ocurra[a]—y he aquí, está ocurriendo—entonces sabrán que ha habido un profeta entre ellos.
  rationale: 'Se elimina «esto» para evitar una explicitación no presente en el hebreo, mientras se conserva en nota la explicación del femenino. Se cambia «hubo» por «ha habido» para reflejar mejor el valor resultativo de reconocimiento retrospectivo: al cumplirse lo anunciado, sabrán que un profeta ha estado presente entre ellos. No se requiere adjudicación adicional porque es un ajuste menor de fidelidad y estilo, no una ambigüedad doctrinal o textual mayor.'
