translation:
  language: es
  text: Y los hijos de Aarón, el sacerdote, pondrán fuego sobre el altar y dispondrán leña sobre el fuego[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y prepararán la leña en orden sobre el fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנוּ
  english_pob_choice: shall put
  chosen_spanish: pondrán
  alternatives_spanish:
  - colocarán
  - pondrán allí
  lexicon: HALOT
  rationale: נתן en este contexto ritual expresa la acción concreta de poner o colocar; «pondrán» conserva la fuerza instruccional del futuro normativo sin sonar forzado en español.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  - la familia sacerdotal de Aarón
  lexicon: HALOT
  rationale: «Hijos» reproduce de manera natural y fiel el constructo hebreo, manteniendo la identificación genealógica y sacerdotal sin expandir el sentido más allá del texto.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el presbítero
  lexicon: HALOT
  rationale: El singular apposicional se refiere a Aarón como el sacerdote; «el sacerdote» conserva la estructura y evita una paráfrasis interpretativa.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - fuego
  - llama
  lexicon: HALOT
  rationale: El sentido literal en el procedimiento sacrificial es «fuego»; «llama» sería más específico de una apariencia, pero no es requerido por el hebreo.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - sobre el altar
  - en el altar
  lexicon: HALOT
  rationale: «Sobre» refleja bien la relación espacial del hebreo y su uso ritual concreto; es natural en español y preserva la imagen de depositar fuego en la superficie del altar.
- source_word: וְעָרְכוּ
  english_pob_choice: and arrange
  chosen_spanish: y dispondrán
  alternatives_spanish:
  - y ordenarán
  - y acomodarán
  lexicon: HALOT
  rationale: ערך en contexto cultual incluye la idea de ordenar o disponer con preparación ritual; «dispondrán» mantiene esa noción de orden sin perder fluidez.
- source_word: עֵצִים
  english_pob_choice: wood
  chosen_spanish: leña
  alternatives_spanish:
  - leña
  - madera
  lexicon: HALOT
  rationale: En un contexto de altar y combustión, «leña» comunica mejor el material destinado al fuego que el más general «madera».
- source_word: עַל הָאֵשׁ
  english_pob_choice: on the fire
  chosen_spanish: sobre el fuego
  alternatives_spanish:
  - sobre el fuego
  - encima del fuego
  lexicon: HALOT
  rationale: La repetición de la preposición y del sustantivo se conserva para reflejar la secuencia hebrea; «sobre el fuego» es la opción más directa y natural.
translation_notes:
  revision_awareness: 'La versión española sigue el texto hebreo masorético de Levítico 1:7 y conserva la secuencia ritual: poner fuego sobre el altar y disponer leña sobre el fuego. La nota reproduce la alternativa lexical del POB en inglés («set the wood in order») adaptada de forma natural al español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el registro cultual con vocabulario sobrio y no se sustituye «sacerdote» por términos eclesiales posteriores.
  - Se refleja la repetición de «sobre el fuego» para no suavizar la estructura hebrea.
