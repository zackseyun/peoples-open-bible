translation:
  language: es
  text: Desde Bet-togarmá[a] comerciaban caballos, caballos de guerra[b] y mulos por tus mercancías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desde la casa de Togarmá». La expresión hebrea puede designar un pueblo o una región asociados con Togarmá, no necesariamente una casa literal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «jinetes» o «caballería». El término hebreo suele referirse a jinetes o caballería, pero en este contexto comercial muchos lo entienden como caballos destinados a la guerra.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִבֵּית תּוֹגַרְמָה
  english_pob_choice: From Beth-togarmah
  chosen_spanish: Desde Bet-togarmá
  alternatives_spanish:
  - Desde la casa de Togarmá
  - Desde Togarmá
  lexicon: HALOT
  rationale: בֵּית puede significar literalmente «casa», pero en expresiones geográficas o étnicas puede señalar un pueblo o región vinculados con Togarmá. Conservar el nombre compuesto en español mantiene la referencia histórica sin forzar una glosa explicativa dentro del texto principal.
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - caballos de guerra
  lexicon: HALOT
  rationale: El sustantivo es el término común para caballos y funciona naturalmente en una lista comercial de bienes.
- source_word: וּפָרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - cavalaríos
  - caballería
  lexicon: HALOT
  rationale: Aunque el término puede referirse a jinetes o caballería, en este contexto de mercancías la lectura más cercana al hebreo y al ajuste de la revisión inglesa es «jinetes». En español, esa forma preserva la posibilidad humana del término sin convertirlo en un animal distinto al anterior.
- source_word: וּפְרָדִים
  english_pob_choice: mules
  chosen_spanish: mulos
  alternatives_spanish:
  - mulas
  - asnos híbridos
  lexicon: HALOT
  rationale: Es el equivalente léxico estándar para el término hebreo y encaja con el inventario de animales de comercio.
- source_word: נָתְנוּ
  english_pob_choice: they traded
  chosen_spanish: enviaban ... a cambio de
  alternatives_spanish:
  - daban ... por
  - comerciaban ... por
  lexicon: HALOT
  rationale: El verbo básico es «dar», pero en Ezequiel 27 funciona como lenguaje comercial. La construcción española transmite el valor de intercambio sin perder la literalidad subyacente de entrega/ofrecimiento.
- source_word: עִזְבוֹנָיִךְ
  english_pob_choice: your wares
  chosen_spanish: tus mercancías
  alternatives_spanish:
  - tus productos
  - tu mercancía
  lexicon: HALOT
  rationale: El sustantivo se refiere a bienes comerciales. «Mercancías» es un equivalente claro y natural en español contemporáneo, manteniendo el registro de lista de comercio.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «war horses» por «horsemen» para reflejar con mayor precisión וּפָרָשִׁים. En español se adoptó «jinetes» para seguir esa revisión y conservar la ambigüedad semántica permitida por el hebreo en contexto mercantil.
  spanish_consistency_notes:
  - Se mantiene «Bet-togarmá» como transliteración breve y publicable del topónimo, con nota alternativa para la glosa literal.
  - Se evita «SEÑOR» u otra mascarización divina porque no hay aquí formas del nombre divino.
  - Se usa el registro comercial «mercancías» para עִזְבוֹנָיִךְ, coherente con el catálogo de comercio de Ezequiel 27.
