  text: Καὶ νῦν¹ ἀκούσατέ μου, τέκνα μου², ἃ³ εἶδον περὶ τῶν ἑπτὰ⁴ πνευμάτων τῆς πλάνης ἐν τῇ μετανοίᾳ μου⁵. 2. Ἑπτὰ οὖν⁶ πνεύματα ἐδόθη⁷ κατὰ τοῦ ἀνθρώπου⁸ καὶ ταῦτά⁹ εἰσιν¹⁰ *αἱ κεφαλαὶ¹¹ τῶν ἔργων τοῦ νεωτερισμοῦ. [3. Καὶ ἕτερα¹³ ἑπτὰ πνεύματα ἐδόθη¹³ Γαὐτῷ¹¹⁴ *ἐπὶ τῆς κτίσεως¹⁵ τοῦ εἶναι ἐν αὐτοῖς πᾶν ἔργον ἀνθρώπου. 4. Πρῶτον πνεῦμα ζωῆς, μεθ’ ἧς ἡ σύστασις¹⁶ κτίζεται. Δεύτερον πνεῦμα ὁράσεως, μεθ’ ἧς γίνεται ἐπιθυμία. 5. Τρίτον πνεῦμα ἀκοῆς μεθ’ ἧς γίνεται¹⁷ διδασκαλία. Τέταρτον πνεῦμα¹⁸ ὀσφρήσεως, μεθ’ ἧς *γίνονται γεύσεις δεδομέναι¹⁹ *εἰς ὁλκὴν²⁰ ἀέρος καὶ ἀναπνοῆς²¹. 6. Πέμπτον πνεῦμα²² λαλιᾶς, μεθ’ ἧς γίνεται γνῶσις. 7. Ἕκτον πνεῦμα γεύσεως μεθ’ ἧς *γίνεται βρῶσις²³ *βρωμάτων τε καὶ πομάτων²⁴, καὶ ἰσχὺς ἐν αὐτῷ²⁵ κτίζεται *ὅτι ἐν βρώμασίν ἐστιν ἡ ὑπό- στασις τῆς ἰσχύος²⁶. 8. Ἕβδομον πνεῦμα σπορᾶς καὶ συνουσίας²⁷, μεθ’ ἧς συνέρχονται²⁸ διὰ τῆς φιληδονίας²⁹ ἁμαρτίαι³⁰. 9. Διὰ τοῦτο *ἔσχατόν ἐστι τῆς κτίσεως³¹ καὶ πρῶτον τῆς νεότητος, ὅτι *ἀγνοίας πεπλήρωται³², καὶ αὕτη τὸν νεώτερον³³
