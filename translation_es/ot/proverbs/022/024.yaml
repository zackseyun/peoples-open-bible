translation:
  language: es
  text: No te hagas amigo[a] de un hombre dado al enojo, ni vayas[b] con un hombre de ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posibilidad: «No te asocies con un hombre airado».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «venir con»; aquí el sentido es unirse a esa persona o andar en su compañía.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְרַע
  english_pob_choice: befriend
  chosen_spanish: te hagas amigo
  alternatives_spanish:
  - te asocies con
  - te hagas compañero de
  lexicon: HALOT
  rationale: El hitpael de רעה expresa una relación estrecha de compañía; en español, «te hagas amigo» comunica de manera natural esa cercanía relacional sin perder la fuerza prohibitiva del proverbio.
- source_word: בַּעַל אָף
  english_pob_choice: a man given to anger
  chosen_spanish: un hombre dado al enojo
  alternatives_spanish:
  - un hombre airado
  - un hombre colérico
  lexicon: HALOT
  rationale: La expresión hebrea describe a alguien caracterizado por el enojo. «Dado al enojo» conserva esa cualidad habitual y evita reducir el matiz idiomático a un simple adjetivo de estado.
- source_word: אִישׁ חֵמוֹת
  english_pob_choice: a man of wrath
  chosen_spanish: un hombre de ira
  alternatives_spanish:
  - un hombre colérico
  - un hombre iracundo
  lexicon: HALOT
  rationale: La construcción paralela refuerza la idea de una persona marcada por la ira. «Hombre de ira» mantiene la correspondencia con el hebreo y conserva el paralelismo poético con la primera cola.
- source_word: תָבֽוֹא
  english_pob_choice: go with
  chosen_spanish: vayas con
  alternatives_spanish:
  - vengas con
  - entres en compañía de
  lexicon: HALOT
  rationale: Aunque el verbo básico es «venir», en este contexto la idea es acompañarse o ir en compañía de alguien. «Vayas con» reproduce ese sentido idiomático de asociación social.
- source_word: אַל ... לֹא
  english_pob_choice: Do not ... and do not
  chosen_spanish: No ... ni no ...
  alternatives_spanish:
  - No ... y no ...
  - No ... ni ...
  lexicon: HALOT
  rationale: El hebreo presenta dos prohibiciones en paralelo. En español, «No ... ni ...» expresa con claridad la duplicación exhortativa y su tono proverbial.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - individuo
  lexicon: HALOT
  rationale: Se conserva el masculino singular del hebreo proverbial para mantener la forma y la fuerza del original, sin neutralizar innecesariamente el enunciado.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando el marcador no anclado [b] y dejando un solo pie de nota, anclado en el texto español.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de dos prohibiciones con una estructura española equivalente.
  - «Enojo» e «ira» distinguen dos términos hebreos relacionados pero no idénticos, preservando la tensión léxica del original.
  - Se evitó traducir mecánicamente con «SEÑOR» u այլ terminología no pertinente; el verso no contiene nombres divinos.
  - El registro es proverbial, sobrio y publicable, con vocabulario natural para lectores bíblicos en español.
