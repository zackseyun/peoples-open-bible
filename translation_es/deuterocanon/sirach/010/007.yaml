revisions:
- from: La soberbia es aborrecida ante Yahvé y ante los hombres[a], y la opresión[b] es injusticia para ambos.
  to: La soberbia es aborrecida por el Señor y por los hombres[a], y la opresión[b] es una injusticia para ambos.
  rationale: Se sustituyó 'Yahvé' por 'el Señor' porque la fuente no contiene el nombre divino יהוה sino אֲדוֹן / Κυρίου. Se rehízo la nota [a] para reflejar fielmente la alternativa griega y la explicación del audit trail inglés, evitando presentar 'ante' como el sentido principal del hebreo. Se ajustó la redacción a 'por el Señor y por los hombres' para un español más natural, y 'es una injusticia' para mejorar la fluidez sin cambiar el contenido.
