review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa y la mayoría de las decisiones léxicas del hebreo: «oyó», «el pueblo», «dijo a Moisés» y «en el campamento» son fieles. Sin embargo, «mientras gritaba» introduce en español una referencia singular más marcada y algo menos natural que el valor colectivo del hebreo con עָם. También «Hay sonido de guerra» suena algo calcado; conviene una formulación española más idiomática que preserve «sound of war».'
  spanish_quality_summary: 'El texto es claro, pero dos giros necesitan ajuste para mejor legibilidad y naturalidad: «mientras gritaba» suena forzado con sujeto colectivo singular, y «Hay sonido de guerra» es menos idiomático que «Se oye sonido de guerra» o similar. El resto del versículo es digno y comprensible.'
  glossary_alignment: 'No hay términos del glosario teológico principal en juego. Los nombres propios están bien: «Josué», «Moisés». La elección «campamento» encaja bien. Se debe conservar la nota sobre בְּרֵעֹה, pero adaptarla a una formulación española más natural y precisa.'
  issues:
  - severity: medium
    issue: «mientras gritaba[a]» suena poco natural y puede sugerir singular individual más que colectivo.
    rationale: El hebreo usa un sufijo singular formal con el colectivo עָם, pero el sentido es el clamor del pueblo. En español, «mientras gritaba» aplicado a «el pueblo» resulta menos idiomático que «en su griterío» o «mientras daba gritos».
  - severity: medium
    issue: «Hay sonido de guerra» es un calco poco idiomático.
    rationale: 'Aunque intenta preservar קוֹל מִלְחָמָה, en español bíblico natural conviene expresar la percepción audible: «Se oye sonido de guerra en el campamento». Esto mantiene «sonido» y evita una frase nominal rígida.'
  revised_spanish_text: 'Cuando Josué oyó el sonido del pueblo en su griterío[a], dijo a Moisés: «Se oye sonido de guerra en el campamento».'
  revised_footnotes:
  - marker: a
