    rationale: Las notas deben estar en español claro. Ya se ofrecen equivalentes españoles suficientes (‘simiente’, ‘descendencia’); mantener ‘offspring’ introduce ruido innecesario.
  revised_spanish_text: Y haré surgir descendencia de Jacob[a], y de Judá un heredero de mis montes; mis escogidos la poseerán[b], y mis siervos habitarán allí.
