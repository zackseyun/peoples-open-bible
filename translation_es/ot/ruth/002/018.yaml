translation:
  language: es
  text: Ella lo recogió y fue a la ciudad, y su suegra vio lo que había espigado. Luego sacó y le dio lo que le había sobrado después de quedar satisfecha[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de haber comido hasta quedar satisfecha».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשָּׂא
  english_pob_choice: She picked it up
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo levantó
  - lo recogió
  lexicon: HALOT
  rationale: נשא expresa levantar o cargar; en el contexto de Ruth, el objeto implícito es lo recogido del campo. 'Lo tomó' mantiene la acción concreta en español natural sin perder el movimiento de alzar/recoger.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - el pueblo
  - la villa
  lexicon: HALOT
  rationale: עִיר corresponde de forma directa a 'ciudad'. Aunque Belén era pequeña, 'la ciudad' conserva la equivalencia léxica y sigue la decisión auditada del texto inglés.
- source_word: חֲמוֹתָהּ
  english_pob_choice: her mother-in-law
  chosen_spanish: su suegra
  alternatives_spanish:
  - su madre política
  lexicon: HALOT
  rationale: Es el término normal y preciso para el parentesco de Noemí con Rut; 'suegra' es el equivalente idiomático y fiel en español.
- source_word: אֵת אֲשֶׁר לִקֵּטָה
  english_pob_choice: what she had gleaned
  chosen_spanish: lo que había espigado
  alternatives_spanish:
  - lo que había recogido
  - lo que había reunido
  lexicon: HALOT
  rationale: לקט es el verbo técnico de espigar/espigar detrás de los segadores. 'Espigado' preserva el trasfondo agrícola-legal mejor que 'recogido', y corresponde al valor especializado que el POB inglés protegió con 'gleaned'.
- source_word: וַתּוֹצֵא
  english_pob_choice: she brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - sacó afuera
  - trajo fuera
  lexicon: HALOT
  rationale: יצא en hifil puede significar sacar o traer fuera. En la escena, Rut extrae de lo guardado la comida para presentarla; 'sacó' es natural y exacto en español.
- source_word: וַתִּתֶּן לָהּ
  english_pob_choice: gave her
  chosen_spanish: le dio
  alternatives_spanish:
  - se lo dio
  - dio a ella
  lexicon: HALOT
  rationale: La construcción hebrea marca el destinatario con לָהּ. En español, 'le dio' comunica de manera directa y fluida el dativo implícito sin añadir énfasis innecesario.
- source_word: אֵת אֲשֶׁר הוֹתִרָה
  english_pob_choice: what she had left over
  chosen_spanish: lo que había reservado
  alternatives_spanish:
  - lo que había dejado
  - lo que le había sobrado
  lexicon: HALOT
  rationale: הותירָה indica dejar sobrante o conservar algo aparte. 'Reservado' evita la posible coloquialidad de 'sobrado' y mantiene la idea de algo guardado de la comida.
- source_word: מִשָּׂבְעָהּ
  english_pob_choice: after she was satisfied
  chosen_spanish: de lo que había comido hasta quedar satisfecha
  alternatives_spanish:
  - después de saciarse
  - tras quedar satisfecha
  lexicon: HALOT
  rationale: שׂבע expresa estar lleno/satisfecho. El hebreo indica el sobrante procedente de su saciedad; la frase elegida conserva el sentido temporal y causal, evitando una parapráfrasis demasiado libre.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo de Rut 2:18 y el audit trail inglés: נשא se vierte con un verbo concreto de toma/levantamiento; לקט conserva el campo semántico técnico de espigar; וַתּוֹצֵא וַתִּתֶּן se entienden como sacar y dar; y מִשָּׂבְעָהּ se interpreta como el sobrante de haber comido hasta la saciedad. Se evita importar terminología eclesiástica ajena al pasaje y se mantiene la relación narrativa entre Rut y Noemí.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - '''Espigar/espigado'' se conserva para respetar el término técnico del contexto de Rut.'
  - '''Suegra'' es consistente con la designación relacional de חֲמוֹתָהּ.'
  - La puntuación y el orden siguen el flujo narrativo hebreo sin forzar un calco excesivo.
