  - marker: b
    text: Es decir, la casa destinada a ser la morada de Yahvé; el templo.
    reason: lexical_alternative
  revision_rationale: Se revisa «donde habitar» a «para habitar en ella» para reflejar mejor el infinitivo hebreo de propósito לָשָׁבֶת y para evitar ambigüedad en español. Se conserva «la casa» en el texto principal, con nota explicativa sobre su referencia al templo. También se reubica el marcador de nota explicativa junto a «la casa», que es donde realmente aplica.
