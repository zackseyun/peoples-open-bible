review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: los seres cercanos al salmista se distancian de él por causa de su sufrimiento, y los más cercanos/parentela permanecen lejos. Conserva adecuadamente las alternativas léxicas de נִגְעִי y de וּקְרֹבַי, y la nota sobre מִנֶּגֶד como ''frente a''. Sin embargo, ''mis amados'' no es la mejor correspondencia idiomática para אֹהֲבַי en español actual, donde puede sonar pasivo (''those beloved by me'') o marcadamente romántico/devocional, mientras que el hebreo significa ''los que me aman''.'
  spanish_quality_summary: La frase es comprensible y digna, pero puede mejorarse en naturalidad y precisión. 'Mis seres queridos' suena mucho más idiomático y claro en español e incluye bien el matiz afectivo relacional sin sugerir romance. 'Se mantienen apartados' y 'se mantienen lejos' son aceptables; la repetición de 'se mantienen' no es grave, aunque 'están lejos' sería algo más fluido. Aun así, el cambio imprescindible es el de אֹהֲבַי.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las decisiones para 'aflicción', 'parientes cercanos' y las notas léxicas son coherentes con el rastro de auditoría inglés. La principal excepción léxica necesaria es sustituir 'mis amados' por 'mis seres queridos' para ajustarse mejor al valor relacional del participio hebreo en español natural.
  issues:
  - severity: medium
    issue: '"Mis amados" para אֹהֲבַי suena poco idiomático y potencialmente ambiguo en español.'
    rationale: El hebreo denota 'quienes me aman'. En español, 'mis amados' puede entenderse como 'aquellos a quienes yo amo' o sonar excesivamente romántico/litúrgico. 'Mis seres queridos' comunica mejor la cercanía afectiva en registro bíblico moderno.
