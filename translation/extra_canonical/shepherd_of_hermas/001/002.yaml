translation:
  text: She laughed and says to me, "Evil desire has risen up into your heart. Or does it not seem to
    you to be a wicked thing for a righteous man if evil desire rises into his heart? It is indeed a sin—and
    a great one, she says. For a righteous man plans what is righteous. Therefore, in planning what is
    righteous, his glory is established in the heavens, and he has the Lord readily reconciled in every
    matter of his. But those who plan evil in their hearts bring upon themselves death and captivity—especially
    those who secure this present age for themselves, who exult in their wealth, and who do not hold fast
    to the good things that are coming.
