translation:
  language: es
  text: Pero en Betel no debes profetizar ya más[a], porque es santuario del rey, y es casa del reino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «no profetices otra vez» / «no debes seguir profetizando». El hebreo dice literalmente: «no añadas más a profetizar».'
    reason: lexical_alternative
  - marker: b
    text: O «casa real». La frase probablemente se refiere a Betel como institución del régimen real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בֵית אֵל
  english_pob_choice: But at Bethel
  chosen_spanish: Pero en Betel
  alternatives_spanish:
  - Y en Betel
  - Mas en Betel
  lexicon: HALOT
  rationale: El hebreo usa el nombre de lugar Betel con valor locativo. En español, «en Betel» comunica naturalmente el mismo valor; «Pero» refleja bien el matiz adversativo de la continuación del discurso de Amasías frente a la orden previa.
- source_word: לֹא תוֹסִ֥יף ע֖וֹד לְ/הִנָּבֵא
  english_pob_choice: you must not prophesy any longer
  chosen_spanish: no debes profetizar ya más
  alternatives_spanish:
  - no profetices otra vez
  - no has de seguir profetizando
  - no debes volver a profetizar
  lexicon: HALOT
  rationale: La construcción hebrea con יסף + עוד + infinitivo expresa no añadir más a la acción, es decir, cesarla. «Ya más» conserva el valor de continuidad/repetición sin imponer una paráfrasis demasiado libre; «debes» reproduce el tono prohibitivo de la orden directa.
- source_word: מִקְדַּשׁ מֶ֨לֶךְ
  english_pob_choice: the king’s sanctuary
  chosen_spanish: santuario del rey
  alternatives_spanish:
  - el santuario real
  - santuario real
  - el santuario del rey
  lexicon: HALOT
  rationale: «מִקְדַּשׁ» designa un lugar santo o santuario, y el constructo con «rey» puede expresar pertenencia o control. «Santuario del rey» mantiene esa relación sin resolverla de modo más interpretativo que el hebreo.
- source_word: וּ/בֵ֥ית מַמְלָכָ֖ה
  english_pob_choice: a royal house
  chosen_spanish: casa de reino
  alternatives_spanish:
  - casa del reino
  - casa real
  - casa del gobierno
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa de reino / de realeza». «Casa de reino» conserva la estructura nominal y la tensión institucional-política del original. Se evita «casa real» porque puede sonar a dinastía o palacio y suaviza el término hebreo.
- source_word: הוּא ... הוּא
  english_pob_choice: it is ... and it is
  chosen_spanish: es ... y es
  alternatives_spanish:
  - es ... y pertenece a
  - esto es ... y esto es
  lexicon: HALOT
  rationale: La repetición del pronombre en hebreo aporta énfasis predicativo. En español, repetir «es» preserva la estructura enfática de forma natural.
theological_decisions:
- issue: Caracterización político-cultual de Betel
  english_pob_reading: Render the political-religious claim descriptively as 'the king’s sanctuary' and 'a royal house' without endorsing its legitimacy as true worship.
  chosen_spanish_reading: Traducir descriptivamente como «santuario del rey» y «casa de reino», sin convertirlo en una aprobación teológica del culto de Betel.
  alternative_spanish_readings:
  - santuario real
  - templo de Estado
  rationale: El versículo reporta la justificación de Amasías para silenciar a Amos. La traducción debe conservar el dato institucional y político sin sugerir que el narrador legitima ese culto. «Casa de reino» mantiene la tensión del hebreo y evita una interpretación excesivamente explicativa.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se incorporó la corrección de la revisión más reciente: se evitó añadir una expansión como «seguir» o «continuar» y se procuró una formulación más directa y natural en español, manteniendo el paralelismo del hebreo y la nota lexical sobre la fuerza de la prohibición.'
  spanish_consistency_notes:
  - Se preservó «Betel» como nombre propio de lugar y no se lo desglosó etimológicamente en el texto principal.
  - Se mantuvo la relación constructa de «santuario del rey» y «casa de reino» para reflejar el valor político-cultual del hebreo.
  - La partícula adversativa se tradujo con «Pero» por el contexto de la orden previa y la continuación del discurso.
  - Se evitó «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino.
  - Se conservaron las notas solo donde hay anclajes explícitos en el texto principal.
