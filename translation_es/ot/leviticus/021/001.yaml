  language: en
  yaml_path: translation/ot/leviticus/021/001.yaml
  text: 'And Yahweh said to Moses[a], “Speak to the priests, the sons of Aaron[b], and say to them: None shall make himself unclean for a dead person among his people,”'
  footnotes:
  - marker: a
    text: Hebrew 'for a dead person'; literally 'for a נפשׁ (nephesh)' in this purity-law context, an idiom for a corpse or dead person.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall not become unclean' or 'shall not defile himself.' The Hebrew refers to ritual impurity from contact with the dead.
    reason: lexical_alternative
