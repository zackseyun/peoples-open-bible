review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura y el paralelismo del griego, especialmente al conservar la repetición de 'las mismas cosas' en ambas cláusulas y la obligación moral de ὀφείλομεν. Sin embargo, 'engendrados' para γενηθέντες no sigue la decisión auditada de 'born' ni suena tan natural en español para un emparejamiento biográfico con τραφέντες. El sentido fuente se preserva mejor con 'nacidos y criados'.
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'fuimos tanto engendrados como criados' suena algo forzado y menos natural que 'nacimos y fuimos criados' o 'fuimos nacidos y criados'. También conviene evitar un exceso de conectores acumulados. Una leve revisión mejora la legibilidad sin perder el paralelismo.
  glossary_alignment: 'No hay términos del glosario mayor en juego. La decisión de mantener ''las mismas cosas'' coincide con la filosofía POB y la nota léxica inglesa. La principal desviación está en γενηθέντες: el proyecto documentó ''born'', y en español ''nacidos'' es la correspondencia natural y fiel, mientras que ''engendrados'' introduce un matiz más estrecho y menos idiomático.'
  issues:
  - severity: medium
    issue: '''engendrados'' para γενηθέντες'
    rationale: El griego en este contexto biográfico significa sencillamente 'nacidos'. 'Engendrados' cambia el foco hacia la procreación y suena menos natural en español eclesial general; además se aparta de la decisión auditada de la English POB.
  - severity: low
    issue: Construcción 'fuimos tanto engendrados como criados'
    rationale: Aunque comprensible, resulta algo pesada y poco idiomática en español moderno. Una formulación más natural preserva mejor la dignidad y legibilidad del texto.
  revised_spanish_text: Porque, ya que fuimos nacidos y criados para las mismas cosas[a], asimismo debemos morir por las mismas cosas.
