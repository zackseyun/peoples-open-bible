translation:
  language: es
  text: Y Acaz se acostó con sus padres[a], y lo sepultaron en la ciudad, en Jerusalén, porque no lo llevaron a los sepulcros de los reyes de Israel. Y Ezequías, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los reyes de Israel». Como Acaz era rey de Judá, algunos entienden aquí una referencia a los sepulcros reales de los reyes davídicos, o esperarían «reyes de Judá».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - murió
  - durmió
  lexicon: HALOT
  rationale: En noticias regias de muerte, שׁכב funciona como un giro idiomático para el tránsito a la muerte y el entierro. En español, «se acostó» preserva ese valor idiomático sin forzar una paráfrasis interpretativa como «murió», y evita el posible malentendido de «durmió».
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: La fórmula dinástica hebrea puede conservarse de modo natural en español como «con sus padres». Mantiene la expresión tradicional de filiación real y sepulcro familiar sin perder legibilidad.
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - fue sepultado
  lexicon: HALOT
  rationale: El hebreo usa un verbo activo con objeto. «Lo sepultaron» refleja esa voz activa y conserva un registro digno para un contexto real; «lo enterraron» sería más común, pero menos solemne.
- source_word: בָעִיר בִּירוּשָׁלִָם
  english_pob_choice: in the city, in Jerusalem
  chosen_spanish: en la ciudad, en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  - en Jerusalén
  lexicon: HALOT
  rationale: 'Se mantienen ambos elementos espaciales del hebreo: «la ciudad» y «Jerusalén». Esto conserva la doble referencia y la posible insistencia en que fue sepultado dentro de la ciudad, aunque no en los sepulcros reales.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón de la localización del entierro. En español, «porque» expresa con claridad esa relación causal sin alterar el sentido.
- source_word: הֱבִיאֻהוּ
  english_pob_choice: did not bring him into
  chosen_spanish: no lo llevaron a
  alternatives_spanish:
  - no lo introdujeron en
  - no lo pusieron en
  lexicon: HALOT
  rationale: El hiphil de בוא conserva la idea concreta de llevar o introducir. «No lo llevaron a» expresa de manera natural la negación del traslado hacia el lugar de entierro, sin reducirlo a una simple glosa interpretativa.
- source_word: לְקִבְרֵי
  english_pob_choice: into the tombs
  chosen_spanish: a los sepulcros
  alternatives_spanish:
  - a las tumbas
  - a los lugares de sepultura
  lexicon: HALOT
  rationale: En contexto regio, קבר alude a sepulcro o tumba funeraria formal. «Sepulcros» conserva ese matiz elevado y apropiado para enterramientos reales.
- source_word: מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - de los reyes de Judá
  lexicon: HALOT
  rationale: Se conserva el texto hebreo «Israel» sin armonizarlo con una expectativa histórica. Esto preserva la tensión documentada en la tradición textual y permite una nota explicativa en lugar de una enmienda silenciosa.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: La fórmula sucesoria de מלך se expresa naturalmente como «reinó» en español, manteniendo el carácter regnal del informe.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: «En su lugar» comunica la sucesión y el reemplazo dinástico con claridad y fidelidad al hebreo.
theological_decisions:
- issue: Conservar «reyes de Israel» frente a la expectativa histórica de «reyes de Judá»
  english_pob_reading: Retain 'kings of Israel' in the main text
  chosen_spanish_reading: Conservar «reyes de Israel» en el texto principal
  alternative_spanish_readings:
  - normalizar a «reyes de Judá»
  rationale: El texto masorético dice explícitamente «Israel». Aunque el contexto de Acaz apunta a Judá, la traducción debe mantener la forma recibida y no armonizarla de manera silenciosa. La nota deja abierta la explicación contextual sin borrar la tensión textual.
  doctrine_reference: Primacía del texto original; preservación de tensiones textuales en la traducción.
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el texto hebreo masorético y la decisión auditada de la POB en inglés, sin cambios de revisión recientes: el pasaje se mantiene estable respecto del último pase revisado.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras sustituciones que oculten el nombre divino, aunque este versículo no contiene el Tetragrámaton.
  - Se usó «sepulcros» para mantener el registro regio-funerario del hebreo, no «tumbas» por simple preferencia estilística.
  - Se conservó la doble referencia locativa «en la ciudad, en Jerusalén» para no comprimir el paralelismo del hebreo.
  - La nota al pie marca la tensión «Israel/Judá» sin resolverla por harmonización editorial.
