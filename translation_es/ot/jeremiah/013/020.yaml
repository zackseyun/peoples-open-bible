revisions:
- from: Levanten sus ojos y vean a los que vienen del norte. ¿Dónde está el rebaño[a] que te fue dado, tus ovejas de hermosura?
  to: Alza tus ojos y mira a los que vienen del norte. ¿Dónde está el rebaño que te fue dado, tus hermosas[a] ovejas?
  rationale: Se corrige el texto para reflejar el singular femenino del hebreo dirigido a una ciudad personificada, eliminar la inconsistencia entre «sus» y «te», y mejorar la naturalidad del español. «Tus hermosas ovejas» reproduce de manera idiomática la apposición final, mientras la nota conserva la amplitud semántica de תפארת.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:34:25Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: el llamado a alzar la mirada, ver a los que vienen del norte, y la pregunta por el rebaño entregado. También preserva la metáfora pastoral sin explicitar su referente. Sin embargo, no refleja bien la tensión gramatical del original: el hebreo tiene imperativos femeninos singulares dirigidos a una entidad personificada, mientras que el borrador cambia a plural de segunda persona («Levanten… vean») y luego pasa a singular («te fue dado»). Además, «ovejas de hermosura» suena poco natural en español y no reproduce tan bien la fuerza appositiva de «your beautiful sheep».'
  spanish_quality_summary: La redacción es comprensible, pero presenta inconsistencia pronominal y un giro poco idiomático. En español bíblico claro y natural conviene mantener un solo destinatario personificado en singular femenino/pleno, o bien reformular sin forzar el plural. «Alza tus ojos y mira» es más fiel y natural. «Tus hermosas ovejas» conserva el tono y evita un sintagma artificioso.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. La decisión clave aquí es estilística y de fidelidad gramatical: mantener la personificación en singular, como en el hebreo y en el inglés POB. La nota léxica sobre תפארת debe anclarse en «hermosas» más que en «rebaño», porque la alternativa afecta al calificativo de las ovejas.'
  issues:
  - severity: high
    issue: Cambio injustificado de destinatario de singular femenino a plural
    rationale: El hebreo usa imperativos femeninos singulares (שאי, וראי), probablemente dirigidos a Jerusalén/Sion personificada. «Levanten… vean» borra ese rasgo y además choca con «te fue dado» en singular.
  - severity: medium
    issue: 'Expresión poco natural: «ovejas de hermosura»'
    rationale: Aunque intenta preservar ambigüedad léxica, en español suena forzada y menos clara que «tus hermosas ovejas». La nota puede conservar la alternativa «gloriosas/de gloria» sin sacrificar naturalidad.
  - severity: low
    issue: Anclaje de la nota en «rebaño» en lugar del calificativo final
    rationale: La nota explica תפארתך, que modifica semánticamente a «ovejas», no a «rebaño». El marcador debe ubicarse donde surge esa decisión léxica.
  revised_spanish_text: Alza tus ojos y mira a los que vienen del norte. ¿Dónde está el rebaño que te fue dado, tus hermosas[a] ovejas?
  revised_footnotes:
  - marker: a
    text: O «gloriosas». La expresión hebrea puede denotar belleza, esplendor o gloria.
    reason: lexical_alternative
  revision_rationale: Se corrige el texto para reflejar el singular femenino del hebreo dirigido a una ciudad personificada, eliminar la inconsistencia entre «sus» y «te», y mejorar la naturalidad del español. «Tus hermosas ovejas» reproduce de manera idiomática la apposición final, mientras la nota conserva la amplitud semántica de תפארת.
