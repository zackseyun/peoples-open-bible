  text: 여러분은 겉모습만 보고 있습니다. 누구든지 자신이 메시아께 속한 자라고 스스로 확신한다면, 그가 메시아께 속한 것처럼 우리도 그렇다는 것을 다시 스스로 생각해 보아야 합니다.
