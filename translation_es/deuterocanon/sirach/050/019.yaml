translation:
  language: es
  text: Y todo el pueblo del país clamó en oración delante del Misericordioso[a], hasta que terminó de ministrar en el altar y completó sus deberes prescritos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente ''delante del Misericordioso''; usa un título divino y no añade aquí un nombre explícito de Dios. El griego paralelo también emplea un título semejante: ''delante del Misericordioso/Compasivo''.'
    reason: source_note
  - marker: b
    text: O 'sus ritos prescritos llegaron a su fin'. La cláusula final hebrea es difícil, y el paralelo griego apoya el sentido de culminación del servicio litúrgico.
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּרֹנּוּ / ἐδεήθη
  english_pob_choice: cried out in prayer
  chosen_spanish: exclamó en oración
  alternatives_spanish:
  - clamó en oración
  - prorrumpió en oración
  - exclamó orando
  lexicon: HALOT; LXX Swete 1909
  rationale: La combinación hebrea-griega apunta a una súplica vocal y pública en un contexto litúrgico. 'Exclamó en oración' conserva la fuerza sonora sin sugerir canto de manera excesiva.
- source_word: כָּל עַם הָאָרֶץ
  english_pob_choice: all the people of the land
  chosen_spanish: todo el pueblo de la tierra
  alternatives_spanish:
  - todo el pueblo
  - todos los habitantes del país
  lexicon: HALOT
  rationale: Mantiene la textura hebrea y el alcance social de la asamblea, sin universalizar indebidamente la expresión.
- source_word: בִּתְפִלָּה
  english_pob_choice: in prayer
  chosen_spanish: en oración
  alternatives_spanish:
  - con oración
  - en súplica
  lexicon: HALOT
  rationale: La preposición y el sustantivo se expresan de forma natural en español, preservando el marco devocional comunitario.
- source_word: לִפְנֵי רַחוּם / κατέναντι Ἐλεήμονος
  english_pob_choice: before the Merciful One
  chosen_spanish: delante del Misericordioso[a]
  alternatives_spanish:
  - delante del Compasivo
  - delante del Dios Misericordioso
  lexicon: HALOT; LXX Swete 1909
  rationale: El hebreo y el griego usan un epíteto/título divino sin nombrar explícitamente a Dios en esa frase. 'El Misericordioso' preserva ese valor reverencial; se ancla con nota para recordar la lectura alternativa del griego, que contextualiza el título.
- source_word: עַד כַּלּוֹתוֹ
  english_pob_choice: until he finished
  chosen_spanish: hasta que terminó
  alternatives_spanish:
  - hasta que acabó
  - hasta concluir
  lexicon: HALOT
  rationale: Reproduce de manera idiomática la idea de finalización de la acción sacerdotal.
- source_word: לְשָׁרֵת מִזְבֵּחַ
  english_pob_choice: ministering at the altar
  chosen_spanish: de ministrar en el altar
  alternatives_spanish:
  - de servir en el altar
  - oficiando en el altar
  lexicon: HALOT
  rationale: '''Ministrar'' preserva el matiz cultual y litúrgico de שרת mejor que un simple ''servir''.'
- source_word: וּמִשְׁפָּטָיו הִגִּיעַ אֵלָיו
  english_pob_choice: completed his prescribed duties
  chosen_spanish: completó sus deberes prescritos
  alternatives_spanish:
  - alcanzó sus ordenanzas
  - llegaron a su fin sus ritos prescritos
  lexicon: HALOT; Greek parallel
  rationale: La cláusula final es difícil; el hebreo sugiere la consumación de lo debido, y el paralelo griego apunta a una terminación del servicio. 'Deberes prescritos' comunica bien esa obligación ritual sin perder la tensión textual.
theological_decisions:
- issue: Título divino רַחוּם / Ἐλεήμων
  english_pob_reading: the Merciful One
  chosen_spanish_reading: el Misericordioso
  alternative_spanish_readings:
  - el Compasivo
  - Dios misericordioso
  rationale: La fuente presenta un epíteto divino más que un nombre propio. Traducirlo como título evita añadir 'Dios' donde el texto no lo explicita y mantiene la fuerza teológica de la misericordia divina.
  doctrine_reference: Transparencia textual; primacía de la fuente original.
- issue: 'Cláusula final difícil: ritual y consumación'
  english_pob_reading: completed his prescribed duties
  chosen_spanish_reading: completó sus deberes prescritos
  alternative_spanish_readings:
  - terminó sus ritos prescritos
  - llevó a cabo lo prescrito
  rationale: Se conserva la idea de obligación ritual concluida sin resolver de forma excesiva la dificultad del hebreo. La redacción española deja visible el carácter prescriptivo y cultual del texto.
  doctrine_reference: Sirácida 50:19; paralelo hebreo-griego
translation_notes:
  revision_awareness: Se corrigió el problema anterior anclando la única nota al marcador [a] dentro del texto, sin introducir marcadores sin anclaje. La redacción sigue de cerca el hebreo y usa el griego como apoyo para la cláusula final difícil.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando la fuente lo requeriría explícitamente; aquí no aparece el Tetragrámaton, por lo que no se introdujo.
  - Se mantuvo un título divino reverencial ('el Misericordioso') en vez de 'Señor' o 'Dios' para respetar la forma del hebreo y del griego.
  - '''Ministrar'' se eligió por el contexto sacerdotal/litúrgico; no se sustituyó por ''servir'' para conservar mayor precisión terminológica.'
