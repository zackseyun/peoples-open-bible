translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Desciende, porque tu pueblo, que sacaste de la tierra de Egipto, se ha corrompido[a].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha actuado corruptamente». El verbo hebreo puede expresarse destacando el comportamiento corrupto más que la corrupción resultante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... habló
  - Entonces ... habló
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» reproduce bien esa continuidad en español. «Dijo» es la forma más natural en discurso divino, aunque «habló» sería más literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El tetragrámaton se vierte como el nombre propio divino «Yahvé», conforme al criterio del proyecto, preservando el nombre personal del pacto y no sustituyéndolo por un título.
- source_word: לֶךְ רֵד
  english_pob_choice: Go down
  chosen_spanish: Desciende
  alternatives_spanish:
  - Baja
  - Ve, desciende
  lexicon: HALOT
  rationale: El hebreo contiene dos imperativos, literalmente «ve, desciende», pero en español «Desciende» transmite de modo natural la orden sin sobrecargarla. La duplicación inglesa fue revisada y eliminada por el audit trail; aquí no conviene duplicar un mandato que en español sonaría forzado.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la orden, por eso «porque» es la correspondencia directa y clara en español.
- source_word: שִׁחֵת
  english_pob_choice: have corrupted themselves
  chosen_spanish: se ha corrompido
  alternatives_spanish:
  - se han corrompido
  - han actuado corruptamente
  - se han pervertido
  lexicon: HALOT
  rationale: El verbo admite una fuerza de corrupción moral; en español, para un sustantivo colectivo singular como «tu pueblo», «se ha corrompido» conserva el sentido de ruina moral sin forzar un reflexivo explícito plural. El valor de corrupción culpable queda preservado.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu nación
  lexicon: HALOT
  rationale: '«Pueblo» reproduce el colectivo hebreo עַם y mantiene la carga relacional y retórica del posesivo: Dios habla a Moisés de Israel como «tu pueblo».'
- source_word: אֲשֶׁר הֶעֱלֵיתָ
  english_pob_choice: whom you brought up
  chosen_spanish: al cual tú has sacado
  alternatives_spanish:
  - que tú sacaste
  - al cual tú subiste
  lexicon: HALOT
  rationale: En contextos de éxodo, «sacar» expresa naturalmente la acción de liberar y conducir fuera de Egipto. «Al cual» mantiene el relativo marcado; el pretérito perfecto compuesto en español hace la referencia cercana y actualizada del acto salvífico.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra» reproduce con fidelidad אֶרֶץ y conserva la formulación bíblica plena sin perder inteligibilidad en español.
theological_decisions:
- issue: Divine name rendering of יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto usa directamente el nombre del pacto. El español del proyecto lo translitera como «Yahvé» para mantener transparencia frente a la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Moral force of שִׁחֵת in context
  english_pob_reading: have corrupted themselves
  chosen_spanish_reading: se ha corrompido
  alternative_spanish_readings:
  - se han corrompido
  - han actuado corruptamente
  rationale: La escena exige preservar la acusación de ruina moral vinculada a la idolatría. «Se ha corrompido» retiene esa fuerza sin ampliar indebidamente el alcance doctrinal del verbo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El audit trail en inglés revisó una redacción previa con doble imperativo («Go, go down») y la ajustó a un solo mandato («Go down»). En español, el imperativo simple «Desciende» refleja esa revisión y evita duplicación innecesaria. También se mantuvo la fuerza moral de שִׁחֵת, como en la decisión inglesa final.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «tierra» para אֶרֶץ en armonía con el español bíblico claro.
  - Se conservó el relativo explícito «al cual» para reflejar la estructura hebrea sin sonar arcaico.
  - No se introdujo «SEÑOR» ni «Cristo»; el pasaje no los requiere.
