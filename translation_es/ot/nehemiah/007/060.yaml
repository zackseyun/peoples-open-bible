    rationale: La evidencia y el English POB eligieron «temple servants» como traducción principal y reservaron la transliteración tradicional para nota. Mantener «netinim» en el cuerpo del texto reduce claridad y no preserva la priorización semántica del audit trail.
  - severity: low
