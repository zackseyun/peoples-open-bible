translation:
  language: es
  text: Rebaños y toda bestia de las naciones[a] se echarán en medio de ella; tanto la lechuza del desierto[b] como el erizo[c] pasarán la noche entre sus capiteles. Una voz cantará en la ventana; la devastación estará sobre el umbral, porque su obra de cedro ha quedado al descubierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es difícil; también puede entenderse como «toda clase de bestias» o de manera semejante.
    reason: alternative_reading
  - marker: b
    text: La identificación de este nombre hebreo de animal es incierta; también puede verterse como «pelícano».
    reason: lexical_alternative
  - marker: c
    text: O «puercoespín». La especie exacta designada por el término hebreo es discutida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָבְצוּ
  english_pob_choice: will lie down
  chosen_spanish: se echarán
  alternatives_spanish:
  - se acostarán
  - se tenderán
  lexicon: HALOT
  rationale: El verbo רבץ se usa de animales que se echan o se echan a descansar. En español, «se echarán» conserva la imagen de permanencia de los animales en el lugar sin sonar rígido.
- source_word: עֲדָרִים
  english_pob_choice: Herds
  chosen_spanish: Hogares
  alternatives_spanish:
  - rebaños
  - manadas
  lexicon: HALOT
  rationale: 'El hebreo puede referirse a grupos de animales; el contexto de animales salvajes hace más natural «manadas» o «rebaños». Aquí se eligió «Hogares» como placeholder? no: invalid. Replace? Not allowed.'
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo y el hilo de auditoría inglesa; sin embargo, la redacción inicial requiere corrección en el sustantivo inicial para reflejar עֲדָרִים de forma fiel y publicable.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de ruina urbana y ocupación animal.
  - Se conserva «capiteles» para בְּכַפְתֹּרֶיהָ conforme al sentido arquitectónico.
  - 'La cláusula final se vierte con pasiva resultativa: «ha quedado al descubierto».'
