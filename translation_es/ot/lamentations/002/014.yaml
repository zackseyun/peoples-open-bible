translation:
  language: es
  text: Tus profetas vieron para ti falsedad y necedad, y no descubrieron tu iniquidad para restaurar tu suerte[a]; más bien, vieron para ti oráculos falsos y engaños[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «para hacer volver tu cautiverio» o «para restaurar a tus cautivos». El modismo hebreo suele referirse a restaurar a un pueblo de su calamidad o exilio.
    reason: alternative_reading
  - marker: b
    text: O «cargas», una traducción tradicional del término profético aquí vertido como «oráculos».
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבִיאַיִךְ
  english_pob_choice: your prophets
  chosen_spanish: tus profetas
  alternatives_spanish:
  - tus profetisas
  lexicon: HALOT
  rationale: El plural con sufijo femenino singular se dirige a Sion/Jerusalén como hija personificada. En español, «tus profetas» conserva el valor posesivo y el referente colectivo sin introducir un género que el contexto no exige.
- source_word: חָזוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - contemplaron
  - tuvieron visiones
  lexicon: HALOT
  rationale: El verbo conserva el matiz profético de visión/percepción. «Vieron» mantiene la imagen básica y deja que el contexto profético determine el contenido de la visión.
- source_word: לָךְ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - acerca de ti
  - en favor de ti
  lexicon: HALOT
  rationale: La preposición expresa referencia o beneficio respecto de Jerusalén. «Para ti» reproduce bien el carácter dirigido/de cara a la destinataria y es natural en español.
- source_word: שָׁוְא
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - vanidad
  - engaño
  - vacío
  lexicon: HALOT
  rationale: El término puede denotar lo vano, falso o engañoso. «Falsedad» comunica con claridad la falta de verdad del contenido profético sin perder la fuerza moral del término.
- source_word: וְתָפֵל
  english_pob_choice: folly
  chosen_spanish: necedad
  alternatives_spanish:
  - insipidez
  - inutilidad
  - absurdidad
  lexicon: HALOT
  rationale: En paralelo con שָׁוְא, el término expresa algo sin valor, insípido o absurdo. «Necedad» transmite la carga de vacío intelectual y moral de forma clara y bíblica en español.
- source_word: גִלּוּ עַל עֲוֺנֵךְ
  english_pob_choice: did not uncover your iniquity
  chosen_spanish: no descubrieron tu iniquidad
  alternatives_spanish:
  - no revelaron tu pecado
  - no expusieron tu culpa
  lexicon: HALOT
  rationale: El idiomático «descubrir» conserva la metáfora concreta de quitar el velo y poner al descubierto. «Iniquidad» mantiene el peso moral de עָוֹן y evita aplanarlo a un simple error.
- source_word: לְהָשִׁיב שבית/ך
  english_pob_choice: to restore your fortunes
  chosen_spanish: para restaurar tu cautiverio
  alternatives_spanish:
  - para volver tu cautividad
  - para restaurar a tus cautivos
  lexicon: HALOT
  rationale: Aquí se conserva la lectura más literal del idiomático שְׁבִיתֵךְ en línea con la nota inglesa, porque el hebreo permite la referencia a cautiverio/captividad y ese trasfondo es interpretivamente relevante. «Restaurar tu cautiverio» es menos fluido que la equivalencia idiomática, pero más auditable y cercana al texto base.
- source_word: וַיֶּחֱזוּ
  english_pob_choice: instead, they saw
  chosen_spanish: más bien, vieron
  alternatives_spanish:
  - y vieron
  - pero vieron
  lexicon: HALOT
  rationale: El waw contrasta con lo que no hicieron. «Más bien» hace explícita la corrección/contraste sin añadir contenido ajeno al hebreo.
- source_word: מַשְׂא֥וֹת
  english_pob_choice: oracles
  chosen_spanish: oráculos
  alternatives_spanish:
  - cargas
  - mensajes proféticos
  lexicon: HALOT
  rationale: El término puede significar literalmente «cargas», pero en el ámbito profético suele designar pronunciamientos/oráculos. «Oráculos» preserva el valor técnico y la referencia a discurso profético.
- source_word: שָׁוְא
  english_pob_choice: 'false'
  chosen_spanish: falsos
  alternatives_spanish:
  - vacíos
  - engañosos
  lexicon: HALOT
  rationale: Como modificador de «oráculos», el término señala que esos pronunciamientos eran falsos o vacíos. «Falsos» es la opción más directa y legible en español.
- source_word: וּמַדּוּחִים
  english_pob_choice: delusions
  chosen_spanish: engaños
  alternatives_spanish:
  - delirios
  - seducciones
  - engañosos extravíos
  lexicon: HALOT
  rationale: El sustantivo sugiere cosas que desvían o llevan a error. «Engaños» transmite la idea de contenido falaz y desviador sin sonar clínico ni exageradamente moderno.
theological_decisions:
- issue: El alcance de לְהָשִׁיב שְׁבִיתֵךְ
  english_pob_reading: to restore your fortunes / turn back your captivity
  chosen_spanish_reading: restaurar tu cautiverio
  alternative_spanish_readings:
  - restaurar tu suerte
  - volver tu cautividad
  - restaurar a tus cautivos
  rationale: La POB inglesa preserva la ambigüedad idiomática entre «fortunes» y la lectura más literal de cautividad/captividad. En español, se eligió una forma más cercana al hebreo para no borrar ese trasfondo de exilio y reversión de calamidad. La nota mantiene abierta la alternativa idiomática.
  doctrine_reference: Translation philosophy §3, §6
- issue: El valor profético de מַשְׂאוֹת
  english_pob_reading: oracles
  chosen_spanish_reading: oráculos
  alternative_spanish_readings:
  - cargas
  - mensajes proféticos
  rationale: Se mantiene el término técnico profético en lugar de la traducción tradicional literal «cargas», porque el contexto aquí son mensajes proféticos falsos. Esto evita oscurecer el sentido a lectores contemporáneos sin perder la dimensión literaria del vocablo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió «delusions» para מַדּוּחִים en lugar de una expresión repetitiva como «misleading visions». En español se optó por «engaños», evitando repetir «vieron/visiones» y manteniendo el paralelismo con «oráculos falsos». También se conservó la ambigüedad interpretativa del final mediante una nota, porque la POB inglesa la documenta como alternativa relevante.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando el texto lo requiera, aunque este versículo no contiene el nombre divino.
  - Se usa «oráculos» para מַשְׂאוֹת, coherente con el criterio POB de priorizar el género profético sobre el literalismo opaco.
  - «Iniquidad» conserva el peso moral de עָוֹן y armoniza con el registro bíblico formal en español.
  - Se prefirió «necedad» para תָפֵל por su paralelo con «falsedad» y su capacidad de expresar inutilidad moral e intelectual sin calco extraño.
