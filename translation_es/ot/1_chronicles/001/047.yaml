translation:
  language: es
  text: Hadad murió[a], y Samlah, de Masrekah, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de él». La expresión hebrea literalmente significa «bajo/en lugar de él» y marca sucesión real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - murió
  lexicon: HALOT
  rationale: El verbo hebreo expresa muerte de forma directa en una fórmula narrativa breve; en español, «murió» comunica con naturalidad esa misma idea sin eufemismo ni ampliación.
- source_word: הֲדָד
  english_pob_choice: Hadad
  chosen_spanish: Hadad
  alternatives_spanish:
  - Adad
  lexicon: Nombre propio
  rationale: Es un nombre propio; se conserva la transliteración estándar para mantener la identificación histórica y literaria del personaje.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - llegó a reinar
  - se hizo rey
  lexicon: HALOT
  rationale: En las listas regias del Crónicas, el valor verbal de מלך se expresa de manera más fiel y natural con «reinó», que preserva el estilo sucesorio del texto.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - después de él
  - en vez de él
  lexicon: HALOT
  rationale: La expresión hebrea indica sucesión y reemplazo. «En su lugar» reproduce bien ese sentido en español y es idiomática; conserva la idea de sustitución sin forzar el texto.
- source_word: שַׂמְלָה
  english_pob_choice: Samlah
  chosen_spanish: Samlá
  alternatives_spanish:
  - Samlah
  - Samla
  lexicon: Nombre propio
  rationale: Se adapta el nombre propio a una forma española naturalizada con acento final para lectura pública, manteniendo la base transliterada del hebreo.
- source_word: מִמַּשְׂרֵקָה
  english_pob_choice: from Masrekah
  chosen_spanish: de Masreca
  alternatives_spanish:
  - de Masréca
  - procedente de Masreca
  lexicon: HALOT
  rationale: El hebreo מִן marca origen o procedencia; «de Masreca» es la forma más natural en español y conserva la relación geográfica sin añadir interpretación.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el texto hebreo y con la auditoría inglesa: se mantiene la fórmula sucesoria breve, el orden narrativo y el sentido de reemplazo en el trono. La única decisión estilística principal es usar una transliteración española más natural en nombres propios y una preposición española idiomática para תַּחְתָּיו.'
  spanish_consistency_notes:
  - Se evita «Señor» o cualquier sustitución teológica porque el versículo no contiene el nombre divino.
  - Se mantiene el registro de lista genealógica/regia, breve y sobrio, sin ampliaciones explicativas en el cuerpo del texto.
  - «En su lugar» conserva la tensión semántica de תַּחְתָּיו mejor que un simple «después de él», por lo que la nota ofrece la alternativa literal.
  - Los nombres propios se presentan en forma hispanizada pero conservando transliteración reconocible para concordancia con el resto del proyecto.
