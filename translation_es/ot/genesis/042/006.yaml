review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido general del hebreo: José ejerce autoridad en el país, vende grano, llegan sus hermanos y le rinden homenaje corporal. Sin embargo, «sobre la tierra» / «de la tierra» en español suena más global o cósmico que el valor local de הָאָרֶץ en este contexto narrativo; «del país» o «de la región» preserva mejor el referente local indicado también por la auditoría inglesa. Además, el hebreo אַפַּיִם אָרְצָה expresa una postración muy baja; «con el rostro en tierra» es correcto, pero conviene mantener la nota alternativa en el verbo.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos giros mejorables para naturalidad y precisión contextual: «gobernador sobre la tierra» y «todo el pueblo de la tierra» suenan menos naturales en español moderno que «gobernante del país» / «gente del país». También es preferible evitar repetir «Y» al inicio de la segunda oración cuando una coma y coordinación simple conservan fluidez. El resto del versículo es legible y reverente.'
  glossary_alignment: 'No hay conflictos con términos doctrinales del proyecto. «José», «grano» y el tratamiento de la reverencia están bien. La principal cuestión léxica es אֶרֶץ: aquí debe reflejar territorio/país, no «tierra» en sentido amplio. Para הַשַּׁלִּיט, «gobernante» se alinea mejor con la decisión inglesa «ruler» que «gobernador», que puede sonar como cargo más específico.'
  issues:
  - severity: medium
    issue: «sobre la tierra» / «de la tierra» para הָאָרֶץ
    rationale: Aunque posible, en español moderno induce fácilmente una lectura de alcance mundial. El contexto inmediato es el país/territorio de Egipto, y la auditoría inglesa lo documenta como local, no global.
  - severity: low
    issue: «gobernador» para הַשַּׁלִּיט
    rationale: No es incorrecto, pero «gobernante» o «el que mandaba» preserva mejor el sentido amplio de ‘ruler’ sin sobreespecificar un cargo administrativo.
  - severity: low
    issue: Fluidez de la coordinación narrativa
    rationale: La segunda oración funciona mejor sin repetir «Y» después de punto y seguido; una coordinación más natural mejora la legibilidad sin alterar el sentido.
  revised_spanish_text: José era el gobernante del país; él era quien vendía grano a toda la gente del país. Cuando llegaron los hermanos de José, se inclinaron ante él[a], con el rostro en tierra.
  revised_footnotes:
  - marker: a
    text: O «se postraron ante él». El verbo hebreo puede denotar una inclinación profunda o una postración como acto de homenaje.
    reason: lexical_alternative
  revision_rationale: Se ajusta אֶרֶץ a «país» para reflejar el referente local del contexto, se cambia «gobernador» por «gobernante» para corresponder mejor a הַשַּׁלִּיט / ‘ruler’, y se pule la sintaxis narrativa para un español más natural sin perder el contenido fuente. Se conserva la nota alternativa sobre el verbo de reverencia, con anclaje correcto en el texto.
