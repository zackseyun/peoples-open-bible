translation:
  language: es
  text: Y cuando esto sucedió, se encendió una llama; pero cuando la luz del altar resplandeció, fue consumida.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando la luz del altar brilló en respuesta, fue consumida». El verbo griego puede sugerir que la luz brilló de manera recíproca o en respuesta, y el sujeto de «fue consumida» no está expresado; puede referirse a la llama, o quizá al material que ardía.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς δὲ τοῦτο ἐγενήθη
  english_pob_choice: And when this happened
  chosen_spanish: Y cuando esto sucedió
  alternatives_spanish:
  - Y cuando esto tuvo lugar
  - Y cuando esto aconteció
  lexicon: LSJ
  rationale: ἐγενήθη expresa el llegar a ocurrir de un hecho. «Sucedió» conserva el valor temporal y narrativo de manera natural en español, sin volverlo más interpretativo de lo que permite el griego.
- source_word: φλὸξ
  english_pob_choice: a flame
  chosen_spanish: una llama
  alternatives_spanish:
  - un fuego
  - una flama
  lexicon: LSJ
  rationale: φλόξ designa una llama o resplandor de fuego. «Llama» mantiene la imagen singular y es más idiomático en español que «fuego», que es más amplio.
- source_word: ἀνήφθη
  english_pob_choice: was kindled
  chosen_spanish: se encendió
  alternatives_spanish:
  - fue encendida
  - fue prendida
  lexicon: LSJ
  rationale: El pasivo indica que la llama pasó a estar encendida. «Se encendió» comunica bien ese resultado en español moderno, sin perder el matiz de inicio de la llama.
- source_word: ἀπὸ τοῦ θυσιαστηρίου
  english_pob_choice: from the altar
  chosen_spanish: proveniente del altar
  alternatives_spanish:
  - del altar
  - desde el altar
  lexicon: LSJ
  rationale: El sintagma modifica la luz. «Proveniente del altar» hace explícita la relación de procedencia que en español puede quedar más clara que un simple «del altar», sin añadir contenido ajeno al texto.
- source_word: ἀντιλάμψαντος φωτός
  english_pob_choice: when the light ... shone forth
  chosen_spanish: cuando la luz ... resplandeció
  alternatives_spanish:
  - cuando la luz ... brilló en respuesta
  - cuando la luz ... se volvió a reflejar
  lexicon: LSJ
  rationale: ἀντιλάμπω puede implicar resplandor recíproco o en respuesta. «Resplandeció» conserva la acción de brillar con fuerza y permite mantener abierta la tensión del griego sin forzar una lectura más específica que el texto no asegura.
- source_word: ἐδαπανήθη
  english_pob_choice: it was consumed
  chosen_spanish: fue consumida
  alternatives_spanish:
  - se consumió
  - fue gastada
  lexicon: LSJ
  rationale: δαπανάω en pasivo puede significar «ser consumido» o «ser gastado». En español, «fue consumida» preserva la posible referencia al sujeto implícito y el resultado de agotamiento/desaparición sin precisar indebidamente qué elemento fue consumido.
theological_decisions:
- issue: Sujeto implícito de ἐδαπανήθη
  english_pob_reading: The flame is the implied subject of 'it was consumed.'
  chosen_spanish_reading: La llama queda como sujeto implícito de «fue consumida».
  alternative_spanish_readings:
  - Fue consumida la ofrenda o el material del altar
  - Fue consumido el líquido mencionado en el contexto previo
  rationale: El griego no expresa el sujeto del pasivo final. La proximidad sintáctica de φλὸξ favorece que la llama sea el referente más cercano, pero el texto permite otras posibilidades. La traducción española conserva esa tensión sin resolverla dogmáticamente.
  doctrine_reference: Honestidad textual y preservación de la ambigüedad fuente a fuente.
translation_notes:
  revision_awareness: 'El español sigue la revisión más reciente del audit trail al preferir un verbo natural para ἀντιλάμψαντος: «resplandeció» en lugar de una formulación que sugiriera de manera demasiado técnica un «reflejo» o un «brillo en respuesta». También conserva la lectura prudente del pasivo final, manteniendo abierta la identidad del sujeto implícito.'
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica en este versículo; no hay divino nombre explícito.
  - Se mantiene un registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - «Llama» conserva mejor que «fuego» la singularidad de φλόξ.
  - «Fue consumida» deja intacta la ambigüedad del pasivo griego.
  - La nota al pie se ancla en la frase completa para reflejar la variante interpretativa del audit trail.
