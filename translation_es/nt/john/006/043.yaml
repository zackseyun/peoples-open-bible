translation:
  language: es
  text: 'Jesús respondió y les dijo: «No murmuren[a] entre ustedes[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo también puede traducirse «refunfuñen» o «se quejen», pero «murmuren» preserva mejor su resonancia bíblica aquí.
    reason: lexical_alternative
  - marker: b
    text: O «unos con otros»; la idea es una acción recíproca dentro del grupo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: ἀποκρίνομαι en esta fórmula narrativa introduce una respuesta directa. En español, «respondió» suena natural y conserva la función discursiva de «answered» sin forzar un matiz más fuerte que el griego.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - dijo
  lexicon: BDAG
  rationale: λέγω en esta secuencia se rinde de forma normal como «dijo». Junto con «respondió» preserva la fórmula griega «respondió y dijo» sin artificio.
- source_word: Μὴ γογγύζετε
  english_pob_choice: Do not grumble
  chosen_spanish: No murmuren
  alternatives_spanish:
  - No grunten
  - No se quejen
  - No murmuren
  lexicon: BDAG
  rationale: γογγύζω tiene el campo de murmurar/grumbarse/quejarse. «Murmuren» mantiene la resonancia bíblica y el tono colectivo del verbo mejor que «quejarse», que puede sonar más general. Se evita una traducción excesivamente interpretativa.
- source_word: μετ’ ἀλλήλων
  english_pob_choice: among yourselves
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - unos con otros
  - entre unos y otros
  - entre ustedes
  lexicon: BDAG
  rationale: La frase expresa reciprocidad dentro del grupo. «Entre ustedes» es idiomático en español actual y corresponde bien al valor mutuo de μετά + genitivo plural.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: uso estándar de nombre propio
  rationale: Nombre propio estándar en español, sin variación teológica o lexical relevante.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de SBLGNT y es plenamente congruente con la auditoría inglesa, sin cambios de sentido ni tensiones textuales adicionales en este versículo.
  spanish_consistency_notes:
  - Se mantiene el estilo bíblico sobrio y moderno, con puntuación española.
  - Se evita «SEÑOR» porque el versículo no contiene κύριος ni un nombre divino; se conserva el nombre propio «Jesús».
  - La decisión por «murmuren» preserva el matiz lexical del verbo sin convertirlo en una simple queja genérica.
