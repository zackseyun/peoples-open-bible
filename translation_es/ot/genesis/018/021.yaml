revisions:
- from: Descenderé ahora y veré si han hecho totalmente conforme a su clamor que ha llegado hasta mí[a]; y si no[b], sabré.
  to: Bajaré ahora y veré si han obrado por completo conforme a su clamor que ha llegado hasta mí[a]; y, si no[b], sabré.
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y la precisión en español: ''Bajaré'' en lugar de ''Descenderé'' por fluidez bíblica natural, y ''han obrado por completo conforme a'' para reflejar mejor el modismo hebreo documentado sin volverlo ininteligible. También se ajustaron las notas para alinearlas mejor con el expediente inglés y con el texto español revisado.'
