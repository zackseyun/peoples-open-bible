translation:
  language: es
  text: Y todo lo que te parezca bien[a] hacer con el resto de la plata y del oro, tú y tus hermanos lo harán conforme a la voluntad de su Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sea bueno para ti». El modismo arameo puede traducirse de manera más formal como «sea bueno» o más idiomáticamente como «te parezca bien».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «según el deseo de su Dios». El arameo puede expresar voluntad, deseo o agrado; aquí se eligió «voluntad» por el tono formal del decreto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָה דִי
  english_pob_choice: And whatever
  chosen_spanish: Y cualquier cosa que
  alternatives_spanish:
  - Y todo lo que
  - Y whatever
  lexicon: HALOT
  rationale: La construcción aramea introduce una cláusula relativa indefinida; en español, «cualquier cosa que» comunica mejor esa apertura que un calco como «lo que». Mantiene el carácter general de la autorización.
- source_word: עֲלָיִךְ וְעַל אַחַיִךְ יֵיטַב
  english_pob_choice: seems good to you and your brothers
  chosen_spanish: parezca buena para ti y para tus hermanos
  alternatives_spanish:
  - sea bueno para ti y para tus hermanos
  - te parezca bien a ti y a tus hermanos
  lexicon: HALOT
  rationale: El idiomático ייטב + על expresa lo que resulta bueno o conveniente para alguien. «Parezca buena» conserva el matiz de valoración y la libertad de decisión implícita en el decreto.
- source_word: אַחַיִךְ
  english_pob_choice: your brothers
  chosen_spanish: tus hermanos
  alternatives_spanish:
  - tus parientes
  - tus compañeros
  lexicon: HALOT
  rationale: El sustantivo es literalmente «hermanos». Aunque el referente contextual pueda ser más amplio, la forma fuente es kinship-literal y así se conserva en español.
- source_word: בִּשְׁאָר כַּסְפָּא וְדַהֲבָה
  english_pob_choice: with the rest of the silver and the gold
  chosen_spanish: con el resto de la plata y del oro
  alternatives_spanish:
  - con el resto de la plata y el oro
  - con lo restante de la plata y del oro
  lexicon: HALOT
  rationale: שְׁאָר indica lo restante. «Resto» es natural en español y mantiene el valor de sobrante ya disponible de fondos previos.
- source_word: לְמֶעְבַּד
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - obrar
  - realizar
  lexicon: HALOT
  rationale: El infinitivo puede expresar llevar a cabo o hacer algo con los fondos. «Hacer» conserva la generalidad semántica sin precisar más de lo que da el arameo.
- source_word: כִּרְעוּת
  english_pob_choice: according to the will
  chosen_spanish: conforme a la voluntad
  alternatives_spanish:
  - según la voluntad
  - de acuerdo con la voluntad
  lexicon: HALOT
  rationale: רוּת/רעוּת denota voluntad, deseo o agrado. «Conforme a la voluntad» es formal y fiel al sentido directivo del decreto.
- source_word: אֱלָהֲכֹם
  english_pob_choice: your God
  chosen_spanish: de su Dios
  alternatives_spanish:
  - de vuestro Dios
  - de tu Dios
  lexicon: HALOT
  rationale: En español, el discurso directo del rey hacia Ezra y su grupo puede expresarse con «su Dios» para evitar la oscilación entre singular y plural en el castellano moderno y reflejar el posesivo referido al grupo destinatario. Se conserva la referencia específica al Dios de Israel.
- source_word: תַּעַבְדוּן
  english_pob_choice: do
  chosen_spanish: hagan
  alternatives_spanish:
  - hagan ustedes
  - harán
  - realicen
  lexicon: HALOT
  rationale: El imperfecto funciona aquí como instrucción/autorización en un decreto. «Hagan» reproduce el valor exhortativo/directivo sin añadir modalidad excesiva.
theological_decisions:
- issue: Referencia al Dios de Israel en un decreto persa
  english_pob_reading: your God
  chosen_spanish_reading: su Dios
  alternative_spanish_readings:
  - vuestro Dios
  - tu Dios
  rationale: El texto identifica al Dios al que sirven Ezra y los suyos. «Su Dios» mantiene la referencia específica sin introducir formulación confesional extra y funciona bien en español para un destinatario colectivo.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Expresión de la voluntad divina
  english_pob_reading: according to the will of your God
  chosen_spanish_reading: conforme a la voluntad de su Dios
  alternative_spanish_readings:
  - según la voluntad de su Dios
  - de acuerdo con la voluntad de su Dios
  rationale: El hebreo/arameo presenta una orientación normativa hacia la voluntad divina. «Conforme a» conserva ese carácter regulativo y formal mejor que una paráfrasis más libre.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido del arameo y coincide sustancialmente con el audit trail inglés. Se preservó la alternativa idiomática de ייטב en nota, y se mantuvo la ambigüedad lexical de רעוּת mediante nota, sin resolverla de forma dogmática.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí el verso contiene אֱלָהֲכֹם, por lo que no aplica.
  - Se prefirió «plata» y «oro» para כַּסְפָּא y דַהֲבָה, respetando el valor material de los recursos.
  - Se mantuvo la estructura permisiva/directiva del decreto persa con «hagan», evitando un imperativo más duro o una simple descripción.
