translation:
  language: es
  text: Sufrirá ciertamente daño quien sale fiador por un extraño, pero el que aborrece estrechar manos[a] está seguro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «golpear/estrechar manos»; se trata de un gesto usado para sellar una prenda, garantía o compromiso.
    reason: cultural_note
lexical_decisions:
- source_word: רַע / יֵרֹועַ
  english_pob_choice: will surely suffer harm
  chosen_spanish: Malo[a] se dañará
  alternatives_spanish:
  - sufrirá ciertamente daño
  - le irá muy mal
  - se dañará sin duda
  lexicon: HALOT
  rationale: El hebreo usa רַע con יֵרֹועַ para expresar un resultado adverso, no mal moral. En español, "se dañará" transmite el daño/ruina con naturalidad proverbial; "malo" conserva la fuerza adverbial-predicativa del inicio, aunque queda marcado con nota por ser una solución compacta.
- source_word: כִּי
  english_pob_choice: who becomes surety
  chosen_spanish: quien sale fiador
  alternatives_spanish:
  - quien se hace garante
  - quien presta garantía
  - quien se obliga por otro
  lexicon: HALOT
  rationale: En este proverbio כִּי introduce la persona descrita por la acción, no una causalidad explícita en español. "Quien sale fiador" reproduce el valor jurídico-financiero de עָרַב con un equivalente idiomático claro.
- source_word: עָרַב
  english_pob_choice: becomes surety
  chosen_spanish: sale fiador
  alternatives_spanish:
  - se hace garante
  - presta garantía
  - se compromete como aval
  lexicon: HALOT
  rationale: '"Salir fiador" es la forma más natural y fiel en español para el acto de garantizar una deuda o compromiso ajeno. Conserva el matiz legal sin modernizarlo demasiado.'
- source_word: זָר
  english_pob_choice: for a stranger
  chosen_spanish: por un extraño
  alternatives_spanish:
  - por un desconocido
  - por un forastero
  - por un foráneo
  lexicon: HALOT
  rationale: En literatura sapiencial זָר suele referirse a un foráneo o no vinculado, no necesariamente a un extranjero étnico. "Extraño" comunica bien la distancia social y relacional del texto.
- source_word: שֹׂנֵא
  english_pob_choice: hates
  chosen_spanish: aborrece
  alternatives_spanish:
  - odia
  - rechaza con firmeza
  - detesta
  lexicon: HALOT
  rationale: El participio es fuerte y pide una traducción intensa. "Aborrece" suena solemne y conserva mejor el registro proverbial que "odia" en este contexto.
- source_word: תֹקְעִים
  english_pob_choice: striking hands
  chosen_spanish: dar palmadas de garantía
  alternatives_spanish:
  - estrechar manos
  - dar la mano
  - golpear las manos
  lexicon: HALOT
  rationale: El gesto hebreo es literalmente "golpear/estrechar manos" para sellar un compromiso. En español, "dar palmadas de garantía" intenta mantener el componente gestual y el sentido contractual; se deja la nota para el matiz literal.
- source_word: בּוֹטֵחַ
  english_pob_choice: is secure
  chosen_spanish: está seguro
  alternatives_spanish:
  - vive seguro
  - está a salvo
  - goza de seguridad
  lexicon: HALOT
  rationale: La idea es de seguridad o falta de peligro. "Está seguro" es breve, proverbial y directo, y conserva el contraste con el daño del primer hemistiquio.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente prefirió evitar un condicional explícito para alinearse mejor con el hebreo y reemplazó una formulación más coloquial del gesto por una más formal. La versión española sigue esa orientación: mantiene la estructura proverbial directa y conserva el gesto contractual con una expresión idiomática explicada en nota.'
  spanish_consistency_notes:
  - He traducido YHWH no aplica en este versículo; no hay terminología divina a resolver aquí.
  - He mantenido el registro sapiencial breve y sentencioso, evitando expansión interpretativa.
  - He elegido un español jurídico comprensible para עָרַב, sin recurrir a "aval" como término principal porque puede sonar demasiado moderno o técnico en algunos lectores.
