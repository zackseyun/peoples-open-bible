  glossary_alignment: 'El borrador se alinea con las decisiones terminológicas del proyecto y del expediente: mantiene «príncipes» para נְשִׂיאִים, «casa de Israel» para בֵית יִשְׂרָאֵל, «posesión» para אֲחֻזָּה y «oprimirán» para יוֹנוּ. No hay términos del glosario mayor del proyecto en disputa en este versículo. La decisión de conservar el pronombre implícito referido al príncipe es coherente con el contexto inmediato.'
