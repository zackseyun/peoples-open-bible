translation:
  text: But for all those who corrupted their ways and their plans before the Flood[a], no favor was shown, except to Noah alone; for favor was shown to him on behalf of his sons, whom he saved from the waters of the Flood because of him, since his heart was righteous in all his ways, according to what had been commanded concerning him, and he did not deviate from anything that had been appointed for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording 'before the Flood' is interpretive for a difficult phrase involving 'the waters of the Flood.' The sense is that no one else received favorable regard in that generation except Noah.
    reason: lexical_alternative
    anchor_ref: '5:19'
  - marker: b
    text: Or 'on account of his sons'.
    reason: previous_rendering
