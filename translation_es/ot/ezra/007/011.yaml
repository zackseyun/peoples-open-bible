translation:
  language: es
  text: 'Y este es el ejemplar[a] del documento que el rey Artajerjes entregó a Esdras, el sacerdote, el escriba, escriba de las palabras de los mandamientos de Yahvé y de sus estatutos para Israel[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la copia del documento', o 'la transcripción del documento'.
    reason: lexical_alternative
  - marker: b
    text: O 'respecto de Israel' o 'sobre Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּרְשֶׁגֶן
  english_pob_choice: copy
  chosen_spanish: ejemplar
  alternatives_spanish:
  - copia
  - traslado
  - transcripción
  lexicon: HALOT
  rationale: El término designa una copia o reproducción de un escrito oficial. 'Ejemplar' comunica bien en español un documento reproducido para su uso y evita una calca demasiado técnica. 'Copia' también sería posible, pero 'ejemplar' suena más natural en un contexto documental formal.
- source_word: הַנִּשְׁתְּוָן
  english_pob_choice: the document
  chosen_spanish: el documento
  alternatives_spanish:
  - la carta
  - el decreto escrito
  - el escrito
  lexicon: HALOT
  rationale: El hebreo alude a una comunicación escrita oficial. 'Documento' conserva la amplitud del término y no fuerza innecesariamente 'carta' o 'decreto', que estrecharían el sentido.
- source_word: וְזֶה
  english_pob_choice: Now this is
  chosen_spanish: Y este es
  alternatives_spanish:
  - Ahora bien, este es
  - Y esto es
  - Este es
  lexicon: HALOT
  rationale: La conjunción más el demostrativo introducen la cita del documento. En español, 'Y este es' mantiene el enlace discursivo sin sonar artificial.
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - emitió
  - concedió
  lexicon: HALOT
  rationale: En este contexto administrativo, 'entregó' expresa con naturalidad la acción de poner el documento en manos de Esdras. 'Dio' es posible, pero menos preciso en español para un acto formal.
- source_word: הַמֶּלֶךְ אַרְתַּחְשַׁסְתְּא
  english_pob_choice: King Artaxerxes
  chosen_spanish: el rey Artajerjes
  alternatives_spanish:
  - el rey Artajerjes
  - Artajerjes, rey
  - el monarca Artajerjes
  lexicon: HALOT
  rationale: Se conserva el título y se translitera el nombre propio conforme al estándar del proyecto.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el presbítero
  lexicon: HALOT
  rationale: '''Sacerdote'' es la equivalencia directa y clara en español para el oficio de Esdras.'
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  - el letrado
  lexicon: HALOT
  rationale: '''Escriba'' preserva la función administrativa y literaria del término, mejor que ''secretario'', que modernizaría en exceso, o ''letrado'', que desplaza el matiz profesional.'
- source_word: סֹפֵר דִּבְרֵי מִצְוֺת יְהוָה
  english_pob_choice: a scribe of the words of the commandments of Yahweh
  chosen_spanish: escriba de las palabras de los mandamientos de Yahvé
  alternatives_spanish:
  - escriba de las palabras de los mandamientos de Yahvé
  - escriba de las palabras de los mandatos de Yahvé
  - escriba experto en las palabras de los mandamientos de Yahvé
  lexicon: HALOT
  rationale: 'La estructura hebrea se mantiene de cerca: Esdras es un escriba cuya especialidad está en las palabras de los mandamientos divinos. ''Mandamientos'' conserva el vínculo con la instrucción normativa, y ''Yahvé'' sigue la decisión del proyecto para el nombre divino.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El proyecto usa 'Yahvé' como forma española del nombre divino. No se sustituye por 'SEÑOR', para preservar el nombre personal del pacto.
- source_word: וְחֻקָּיו
  english_pob_choice: and of his statutes
  chosen_spanish: y de sus estatutos
  alternatives_spanish:
  - y de sus estatutos
  - y sus estatutos
  - y de sus decretos
  lexicon: HALOT
  rationale: '''Estatutos'' es el equivalente natural y preciso para חֻקִּים en contexto legal/instruccional. La preposición ''de'' refleja la relación posesiva del hebreo sin sobreexplicarla.'
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - para Israel
  - con respecto a Israel
  - sobre Israel
  lexicon: HALOT
  rationale: '''Para Israel'' comunica de forma natural la aplicación o destinación de estas instrucciones. Se evita ''sobre Israel'' porque en español suena más a dominio que a finalidad o referencia.'
theological_decisions:
- issue: Nombre divino יְהוָה en la cita descriptiva del documento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Aunque el versículo cita una fórmula documental persa, el hebreo conserva explícitamente el Tetragrámaton. En español se mantiene 'Yahvé' para no ocultar el nombre del pacto mediante una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación de עַל יִשְׂרָאֵל
  english_pob_reading: for Israel
  chosen_spanish_reading: para Israel
  alternative_spanish_readings:
  - con respecto a Israel
  - sobre Israel
  rationale: La traducción adopta un valor de finalidad/aplicación, coherente con el contexto de mandamientos y estatutos dirigidos a Israel. 'Sobre Israel' conservaría una posible relación de dominio, pero en español resultaría menos clara aquí.
  doctrine_reference: HALOT on עַל in applicative/reference usage
translation_notes:
  revision_awareness: 'La versión inglesa final fue revisada sin cambios sustanciales, con acuerdo alto en la comparación. La draft española sigue esa lectura estable: conserva la estructura documental del hebreo, mantiene ''Yahvé'' para el Tetragrámaton y resuelve עַל יִשְׂרָאֵל como ''para Israel'' en línea con la decisión inglesa de valor aplicativo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Escriba'' se usa para הַסֹּפֵר y luego se conserva en aposición para reflejar la repetición enfática del hebreo.'
  - '''Estatutos'' y ''mandamientos'' se distinguen para conservar el paralelismo legal de דִּבְרֵי מִצְוֺת ... וְחֻקָּיו.'
  - La puntuación con dos puntos final refleja la introducción de una cita/documento en curso.
