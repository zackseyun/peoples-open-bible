review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés: mantiene Sidón como vocativo, preserva Yahvé para יְהוָה, refleja bien הִנְנִי עָלַיִךְ como confrontación divina, y conserva las dos fórmulas teológicas clave de glorificación y santificación en contexto de juicio. Sin embargo, la cláusula final en español usa «sea santificado» después de «cuando haga...», lo que rompe la concordancia verbal de primera persona de וְנִקְדַּשְׁתִּי y suena menos natural que una forma activa/reflexiva clara en español. También «haga en ella juicios» es comprensible pero algo poco idiomático frente a «ejecute juicios en ella».'
  spanish_quality_summary: El texto es legible y digno, pero necesita un ajuste menor para sonar más natural en español bíblico contemporáneo sin perder precisión. «Así dice el Señor Yahvé» es aceptable dentro de la política del proyecto. El principal problema de calidad es «sea santificado en ella», que en español queda gramaticalmente desalineado con el sujeto divino explícito y menos claro que «me mostraré santo en ella» o «manifestaré mi santidad en ella».
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה → «Yahvé» se respeta; no hay conflictos con Mesías/Cristo ni otros términos programáticos. Para אֲדֹנָי יְהוִה, «el Señor Yahvé» encaja con la racionalidad documentada. La decisión sobre וְנִקְדַּשְׁתִּי debe ajustarse para reflejar mejor el valor explicado en la auditoría inglesa: no solo una pasiva abstracta, sino la manifestación/vindicación pública de la santidad divina.'
  issues:
  - severity: medium
    issue: «sea santificado[b] en ella» no refleja bien la forma verbal ni el sentido en español.
    rationale: וְנִקְדַּשְׁתִּי es primera persona singular y, según la auditoría inglesa, comunica que Yahvé muestra/manifiesta su santidad en el juicio. «Sea santificado» introduce una construcción pasiva/subjuntiva extraña tras «sabrán que yo soy Yahvé, cuando...», y debilita la claridad del sujeto divino.
  - severity: low
    issue: «cuando haga en ella juicios» es literal pero poco idiomático.
    rationale: La frase conserva el hebreo, pero en español natural suena mejor «cuando ejecute juicios en ella» o «cuando haga juicios contra ella». Dado que el inglés auditado conservó «in her», conviene mantener «en ella» pero con un verbo más usual para contexto judicial/divino.
  revised_spanish_text: 'y dirás: «Así dice el Señor Yahvé: He aquí, estoy contra ti, Sidón, y seré glorificado[a] en medio de ti. Y sabrán que yo soy Yahvé, cuando ejecute juicios en ella y me mostraré santo[b] en ella».

    '
