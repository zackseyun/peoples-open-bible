review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: mantiene la doble mención de ''vender'', distingue ''hijos'' e ''hijas'', conserva ''los hijos de Judá'' y usa ''Yahvé'' para יְהוָה. Sin embargo, las notas al pie a y b están intercambiadas respecto de los anclajes del texto y respecto del rastro de auditoría inglés: [a] debe explicar ''los hijos de Judá'' y [b] debe explicar ''los sabeos''. Además, el giro principal suena más natural y fiel en español como ''en poder de'' o ''en manos de los hijos de Judá'' sin el singular implícito inglés; el texto actual es aceptable, pero requiere reparar el sistema de notas.'
  spanish_quality_summary: 'El español es claro y digno, pero hay un problema estructural importante en las notas: el marcador [a] está puesto tras ''Judá'' aunque la nota a habla de ''una nación lejana'', y el marcador [b] está puesto tras ''sabeos'' aunque esa nota sí corresponde allí. También conviene pulir ''en manos de'' a ''en poder de'' para una lectura más idiomática con objeto humano plural en este contexto de control y transferencia. ''Nación distante'' es comprensible, aunque ''nación lejana'' suena algo más natural en español bíblico actual.'
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: יְהוָה -> ''Yahvé'' correctamente; מכר -> ''vender'' correctamente; בְּנֵי/בְּנוֹת -> ''hijos e hijas'' correctamente. No hay conflicto doctrinal. La única desalineación relevante es la gestión de las notas léxicas/alternativas heredadas del inglés, cuyos marcadores deben corresponder al lugar correcto en el texto.'
  issues:
  - severity: high
    issue: Los marcadores de notas al pie están desalineados con su contenido.
    rationale: 'En el texto español, [a] aparece después de ''Judá'', pero la nota a dice ''O: «a una nación lejana»'', que corresponde a ''nación distante/lejana''. En cambio, [b] aparece después de ''sabeos'' y su nota sí trata de ''los sabeos''. Esto incumple la instrucción de que cada marcador debe aparecer exactamente en la palabra o frase relevante.'
  - severity: medium
    issue: La nota sobre la alternativa de 'nación distante/lejana' fue heredada del inglés pero aplicada al lugar equivocado.
    rationale: El rastro inglés tiene una nota de alternativa para 'to a distant nation' y una nota cultural para 'the Sabeans'. En español deben preservarse, pero ancladas a 'nación lejana' y 'sabeos' respectivamente.
  - severity: low
    issue: '''En manos de'' es posible, pero ''en poder de'' suena más natural en este contexto de entrega al control de otros.'
    rationale: ביד denota transferencia al control de alguien. En español, 'en manos de' funciona, pero 'en poder de' evita una leve aspereza sintáctica y expresa con claridad el sentido idiomático.
  revised_spanish_text: Y venderé a tus hijos y a tus hijas en poder de los hijos de Judá, y ellos los venderán a los sabeos[a], a una nación lejana[b]; porque Yahvé ha hablado.
  revised_footnotes:
