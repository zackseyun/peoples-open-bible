    rationale: 'La nota inglesa preserva la alternativa para וְהִשְׁבַּתִּי («O: Haré cesar todo su regocijo» / «causaré que cese»), no para מְשׂוֹשָׂהּ. Además, incluir la palabra inglesa «mirth» en una nota española es impropio del proyecto.'
