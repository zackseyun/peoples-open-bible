translation:
  language: es
  text: El que se asoma por su ventana, y junto a su puerta escuchará[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «escuchará a escondidas». El hebreo sugiere escuchar con atención, de cerca; el paralelo griego tiene simplemente «escuchará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשְׁקִיף
  english_pob_choice: One who looks in
  chosen_spanish: El que se asoma
  alternatives_spanish:
  - El que mira dentro
  - El que espía desde fuera
  - El que se inclina a mirar
  lexicon: HALOT
  rationale: שׁקף expresa mirar hacia abajo, asomarse o mirar con intención desde una abertura; el griego παρακύπτων confirma la idea de alguien que se inclina para ver. «Se asoma» comunica ese gesto de manera natural en español y conserva el matiz de curiosidad insistente.
- source_word: בְּעַד חֲלוֹנָה
  english_pob_choice: through her window
  chosen_spanish: por su ventana
  alternatives_spanish:
  - a través de su ventana
  - por la ventana
  - desde su ventana
  lexicon: HALOT
  rationale: בְּעַד puede introducir la idea espacial de «a través de / por». En español, «por su ventana» mantiene la imagen de mirar desde el exterior hacia adentro sin sonar forzado. El posesivo femenino conserva la personificación del contexto.
- source_word: וְעַל פְּתָחֶיהָ
  english_pob_choice: and at her doorway
  chosen_spanish: y a su puerta
  alternatives_spanish:
  - y a su umbral
  - y a sus entradas
  - y junto a su puerta
  lexicon: HALOT
  rationale: פתח puede significar puerta, entrada o umbral. Dado el paralelismo con el primer hemistiquio y el uso del plural en hebreo, «a su puerta» funciona como singular colectivo idiomático en español y preserva la imagen arquitectónica. «Puerta» es la opción más clara y auditivamente natural.
- source_word: יְצוֹתֵת
  english_pob_choice: he will listen
  chosen_spanish: escuchará
  alternatives_spanish:
  - oirá con atención
  - estará escuchando
  - espiará al escuchar
  lexicon: HALOT
  rationale: El verbo sugiere escuchar con atención, incluso de modo furtivo; el paralelo griego ἀκροάσεται confirma el sentido auditivo básico. «Escuchará» conserva la fuerza verbal y admite implícitamente la atención insistente sin añadir explícitamente la idea de «eavesdrop».
theological_decisions:
- issue: Personificación femenina de la figura representada
  english_pob_reading: Retain feminine pronouns
  chosen_spanish_reading: Retener el posesivo femenino «su» y el marco de una figura femenina implícita
  alternative_spanish_readings:
  - Neutralizar con «su» sin referencia femenina explícita en el contexto ampliado
  - Reformular con un sustantivo abstracto
  rationale: El hebreo y el griego presentan una figura femenina implícita en el contexto. Mantener el posesivo femenino en español preserva la personificación en vez de volver abstracta la escena, en línea con la lectura del audit trail inglés.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El registro inglés indica que no hubo revisiones posteriores y que el último pase quedó sin cambios; esta versión española sigue esa lectura estable, conservando la imaginería de peering/listening y la personificación femenina sin añadir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, evitando calcos innecesarios.
  - «Se asoma» y «escuchará» reflejan la doble acción visual-auditiva del verso sin sobredeterminar la intención.
  - El posesivo femenino «su» conserva la referencia personificada al marco de la figura femenina, en continuidad con la traducción inglesa.
  - La nota al pie preserva la alternativa semántica documentada por el audit trail inglés.
