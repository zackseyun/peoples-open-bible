revisions:
- from: Considerando que siempre ha luchado a nuestro lado como un padre por sus hijos[a], y reconociendo la firme buena voluntad[b] que tienen hacia nosotros y hacia nuestros antepasados como la de un amigo, con justicia los hemos liberado de toda acusación, de cualquier causa que sea.
  to: Considerando que siempre ha luchado a nuestro lado como un padre por sus hijos[a], y teniendo en cuenta la firme buena voluntad que tienen hacia nosotros y hacia nuestros antepasados como la de un amigo, justamente los hemos liberado por completo de toda acusación[b].
  rationale: Se corrige el valor deliberativo de ἀναλογιζόμενοι con «Considerando / teniendo en cuenta», se reubica correctamente la nota [b] al segmento final que realmente comenta, y se simplifica la cláusula jurídica para un español más natural que preserve la liberación total frente a cualquier posible cargo. Se mantiene la imagen paternal, el matiz de alianza militar y la buena voluntad firme de un amigo.
