- from: Porque también yo soy un hombre mortal[a], igual a todos, y un descendiente del primer hombre formado de la tierra[b]; y en el vientre de mi madre fui modelado como carne.
  to: Porque también yo soy un hombre mortal, igual a todos, y descendiente del primer hombre[a] nacido de la tierra y formado primero[b]; y en el vientre de mi madre fui moldeado en carne.
