translation:
  language: es
  text: 'Adonías y todos los invitados que estaban con él lo oyeron cuando acababan de comer[a]. Y Joab oyó el sonido de la trompeta[b] y dijo: «¿Por qué hay tanto alboroto en la ciudad?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando habían terminado de comer». La cláusula hebrea puede entenderse como el momento en que ya estaban terminando la comida o como el hecho de haberla concluido.
    reason: lexical_alternative
  - marker: b
    text: Hebreo shofar, un cuerno usado para señales públicas.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard it
  chosen_spanish: oyeron eso
  alternatives_spanish:
  - oyeron
  - escucharon eso
  lexicon: HALOT
  rationale: El hebreo dice simplemente ‘oyeron’; en español conviene explicitar el referente implícito (“eso”) porque el contexto inmediato alude al ruido y la señal que interrumpen la comida. Mantiene la fuerza narrativa sin añadir interpretación indebida.
- source_word: הַקְּרֻאִים
  english_pob_choice: the invited guests
  chosen_spanish: los invitados
  alternatives_spanish:
  - los convidados
  - los que habían sido invitados
  lexicon: HALOT
  rationale: El participio pasivo comunica personas convocadas o invitadas. ‘Los invitados’ es natural en español y conserva el sentido de grupo convocado para un banquete.
- source_word: וְהֵם כִּלּוּ לֶאֱכֹל
  english_pob_choice: as they finished eating
  chosen_spanish: cuando acababan de comer
  alternatives_spanish:
  - cuando terminaron de comer
  - mientras terminaban de comer
  lexicon: HALOT
  rationale: La construcción hebrea marca un punto temporal cercano al final de la comida. ‘Acababan de comer’ conserva esa cercanía temporal y evita fijar de modo demasiado rígido si ya habían concluido por completo.
- source_word: ק֣וֹל הַשּׁוֹפָר
  english_pob_choice: the sound of the trumpet
  chosen_spanish: el sonido del cuerno
  alternatives_spanish:
  - el sonido de la trompeta
  - el sonido del shofar
  lexicon: HALOT
  rationale: שׁוֹפָר es un cuerno de señalización; ‘cuerno’ mantiene el referente léxico más cercano al hebreo. Se evita ‘shofar’ como transliteración innecesaria en el texto principal, y ‘trompeta’ sería menos preciso para el objeto bíblico.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿Cómo es que
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, fiel a la simplicidad del hebreo.
- source_word: קֽוֹל הַקִּרְיָה
  english_pob_choice: the sound of the city
  chosen_spanish: el sonido de la ciudad
  alternatives_spanish:
  - el ruido de la ciudad
  - la voz de la ciudad
  lexicon: HALOT
  rationale: Se preserva la estructura hebrea ‘sonido de la ciudad’. En español ‘sonido’ permite mantener la relación con קוֹל sin forzar ‘ruido’, aunque el contexto sugiera agitación.
- source_word: הוֹמָה
  english_pob_choice: in an uproar
  chosen_spanish: está alborotado
  alternatives_spanish:
  - está en alboroto
  - está en tumulto
  - está en conmoción
  lexicon: HALOT
  rationale: El participio comunica agitación sonora y colectiva. ‘Está alborotado’ reproduce la idea de bullicio/comoción en español contemporáneo sin perder el matiz de desorden audible.
- source_word: אֲדֹנִיָּהוּ
  english_pob_choice: Adonijah
  chosen_spanish: Adonías
  alternatives_spanish:
  - Adonías
  - Adoniyahu
  lexicon: Transliteración estándar del nombre hebreo
  rationale: Se usa la forma española establecida del nombre propio bíblico.
- source_word: יוֹאָב
  english_pob_choice: Joab
  chosen_spanish: Joab
  alternatives_spanish:
  - Joab
  lexicon: Transliteración estándar del nombre hebreo
  rationale: Se usa la forma española establecida del nombre propio bíblico.
translation_notes:
  revision_awareness: Se siguió el audit trail en inglés, incluyendo la revisión que prefirió una formulación más natural para el momento temporal de la comida (‘finished eating’) sin cambiar el sentido. En español se conservó esa cercanía temporal con ‘acababan de comer’.
  spanish_consistency_notes:
  - Se mantuvo ‘Adonías’ para el nombre propio, coherente con el español bíblico estándar.
  - Se tradujo שׁוֹפָר como ‘cuerno’ en el texto principal y se explicó culturalmente en nota, en lugar de usar ‘shofar’ en el cuerpo.
  - ‘El sonido de la ciudad’ conserva la estructura del hebreo; ‘alborotado’ comunica la agitación sonora que el contexto requiere.
  - Se evitó introducir artículos o verbos interpretativos que desplacen la sencillez narrativa del hebreo.
