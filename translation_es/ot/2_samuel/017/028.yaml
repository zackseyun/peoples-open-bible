    reason: lexical_alternative
  - marker: e
    text: La repetición final de קָלִי se conserva en español con el mismo equivalente básico que en la primera aparición.
    reason: source_note
  revision_rationale: 'Se mejoró la naturalidad y fidelidad funcional del español: ''vasijas de cerámica'' sigue la decisión del POB de expresar el material en el texto principal y dejar la literalidad en nota; ''lebrillos'' representa mejor el valor de recipientes tipo basin, con ''cuencos'' como alternativa; se pulió la lista para español idiomático y se corrigió la nota de ''habas''. La repetición final de קָלִי se mantiene, conforme al hebreo.'
