translation:
  language: es
  text: ¿Ves a un hombre hábil[a] en su trabajo? Estará delante de reyes; no estará delante de hombres sin distinción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hábil» traduce la idea principal del hebreo; el término también puede sugerir «diligente» o «rápido/presto» en el trabajo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hombres oscuros», es decir, personas sin prominencia ni distinción.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזִיתָ
  english_pob_choice: Do you see
  chosen_spanish: ¿Ves
  alternatives_spanish:
  - ¿Has visto
  - ¿Observas
  lexicon: HALOT
  rationale: La forma hebrea introduce una observación proverbial en segunda persona. En español, el presente interrogativo «¿Ves?» conserva el tono retórico y suena natural sin perder la fuerza de exhortación a notar el caso.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa el singular masculino representativo; «un hombre» mantiene esa forma convencional y no neutraliza indebidamente el referente del proverbio.
- source_word: מָהִיר
  english_pob_choice: skillful
  chosen_spanish: hábil
  alternatives_spanish:
  - diligente
  - rápido
  - experto
  lexicon: HALOT
  rationale: El campo semántico incluye rapidez/disposición, pero en el contexto de trabajo la idea dominante es competencia. «Hábil» comunica destreza y aptitud de manera clara en español, y permite conservar la alternativa de «diligente» reflejada en la nota.
- source_word: בִּמְלַאכְתּוֹ
  english_pob_choice: in his work
  chosen_spanish: en su trabajo
  alternatives_spanish:
  - en su oficio
  - en su tarea
  - en su ocupación
  lexicon: HALOT
  rationale: מְלָאכָה puede abarcar labor, oficio o tarea. «En su trabajo» es suficientemente amplio y natural, sin restringir el dicho a un oficio manual.
- source_word: לִפְנֵי מְלָכִים
  english_pob_choice: before kings
  chosen_spanish: delante de reyes
  alternatives_spanish:
  - en presencia de reyes
  lexicon: HALOT
  rationale: «Delante de» reproduce bien la imagen espacial y relacional del hebreo y suena idiomático en español, manteniendo la elevación social implícita.
- source_word: יִתְיַצָּב
  english_pob_choice: he will stand
  chosen_spanish: se pondrá
  alternatives_spanish:
  - se presentará
  - se colocará
  lexicon: HALOT
  rationale: El hitpael de יצב sugiere ponerse de pie o presentarse en un lugar. «Se pondrá» conserva la imagen verbal y resulta más natural que un calco rígido.
- source_word: בַּל
  english_pob_choice: will not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  - no llegará a
  lexicon: HALOT
  rationale: La partícula negativa poética se expresa de forma simple con «no», que permite mantener el paralelismo sin añadir matices no sustentados.
- source_word: לִפְנֵי חֲשֻׁכִּים
  english_pob_choice: before obscure men
  chosen_spanish: delante de hombres oscuros
  alternatives_spanish:
  - delante de hombres sin distinción
  - delante de hombres poco notables
  - delante de hombres oscuros en la sombra
  lexicon: HALOT
  rationale: חֲשֻׁכִּים literalmente alude a «oscuros»; la English POB explica que se trata de personas sin prominencia o distinción. «Hombres oscuros» conserva la metáfora sin convertirla en una interpretación moral o social más específica de lo que el hebreo exige.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide en sustancia con la auditoría inglesa: la pregunta retórica, la competencia en el trabajo, la proyección ante reyes y el contraste final con personas de poca prominencia. Se preserva la ambigüedad de מָהִיר y de חֲשֻׁכִּים en notas, sin suavizarla.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por norma del proyecto; este versículo no contiene el nombre divino.
  - 'Se conservó el paralelismo verbal con dos formas breves en español: «se pondrá / no se pondrá».'
  - «Hombre» se usa como singular representativo, conforme al hebreo y al estilo proverbial.
  - La imagen de «oscuros» se deja en el texto principal porque está respaldada por la metáfora hebrea y la nota aclara su sentido idiomático.
