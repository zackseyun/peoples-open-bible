translation:
  language: es
  text: Y, así como ocurrió en los días de Noé[a], así también será en los días del Hijo del Hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Ser Humano». El título griego tradicionalmente traducido «el Hijo del Hombre» probablemente evoca Daniel 7 y se conserva aquí por su resonancia mesiánica y apocalíptica ya establecida.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: BDAG
  rationale: La comparación griega introduce una correspondencia directa; «así como» conserva el paralelismo natural en español sin sonar forzado.
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: ocurrió
  alternatives_spanish:
  - sucedió
  - tuvo lugar
  lexicon: BDAG
  rationale: γίνομαι aquí señala un hecho ocurrido en la época de Noé; «ocurrió» mantiene el valor eventivo con estilo moderno y digno.
- source_word: ἐν ταῖς ἡμέραις Νῶε
  english_pob_choice: in the days of Noah
  chosen_spanish: en los días de Noé
  alternatives_spanish:
  - durante los días de Noé
  lexicon: BDAG
  rationale: Es un modismo temporal establecido. La forma literal en español es clara y preserva la estructura del griego.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de ese modo
  lexicon: BDAG
  rationale: Marca la conclusión del símil; «así» refleja bien la correspondencia con la cláusula anterior y el inicio repetido de la apódosis.
- source_word: ἔσται
  english_pob_choice: it will be
  chosen_spanish: será
  alternatives_spanish:
  - va a ser
  - ocurrirá
  lexicon: BDAG
  rationale: El futuro copulativo/existencial se expresa con naturalidad en español mediante «será», sin añadir matices interpretativos.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Ser Humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título cristológico tradicional del propio texto, porque en español «el Hijo del Hombre» mantiene la forma reconocible y la resonancia daniélica/apocalíptica; alternativas más explicativas suavizarían esa carga.
theological_decisions:
- issue: Título cristológico υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Humano
  - el Ser Humano
  rationale: El griego funciona aquí como título de Jesús, no como mera descripción genérica. La traducción tradicional conserva la intertextualidad con Daniel 7 y evita borrar la tensión teológica del título.
  doctrine_reference: Translate titles; preserve canonical and messianic resonance.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alto acuerdo y no requieren revisión textual; la decisión principal en español es conservar la comparación y el título cristológico con naturalidad idiomática.
  spanish_consistency_notes:
  - Se mantiene «Noé» con tilde conforme al uso español.
  - Se conserva la mayúscula en «Hijo del Hombre» por tratarse de un título cristológico.
  - La repetición de «así» refleja el paralelismo del griego y la relación comparativa entre las dos cláusulas.
