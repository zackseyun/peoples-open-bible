translation:
  language: es
  text: 'He visto todo en los días de mi vanidad[a]: hay un justo que perece en su justicia[b], y hay un impío que alarga su vida en su maldad[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en los días de mi fugacidad» o «en los días de mi vapor». El hebreo הֶבֶל, palabra clave de Eclesiastés, sugiere transitoriedad, evanescencia y frustración.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «perece a pesar de su justicia». El hebreo puede leerse de más de una manera; el texto principal conserva la ambigüedad.'
    reason: alternative_reading
  - marker: c
    text: 'O: «alarga su vida a pesar de su maldad» o «alarga sus días en su maldad».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֶת הַכֹּל
  english_pob_choice: it all
  chosen_spanish: todo
  alternatives_spanish:
  - todo esto
  - el todo
  lexicon: HALOT
  rationale: La expresión hebrea con רָאִיתִי comunica alcance total. En español, «todo» reproduce esa amplitud de forma natural y sin añadir un referente explícito que el hebreo no fija.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: He visto
  alternatives_spanish:
  - Vi
  lexicon: HALOT
  rationale: El perfecto hebreo puede reflejarse con pretérito perfecto en español para mantener el tono reflexivo y la observación que sigue vigente en el discurso.
- source_word: בִּימֵי הֶבְלִי
  english_pob_choice: in the days of my vanity
  chosen_spanish: en los días de mi vanidad
  alternatives_spanish:
  - en mis días de fugacidad
  - en los días de mi vapor
  - en los días de mi fugacidad
  lexicon: HALOT
  rationale: Se conserva el término tradicional «vanidad» para mantener la palabra-clave de Eclesiastés; en español aquí refiere a la fugacidad/el carácter vaporoso de la vida del hablante, no a orgullo moral.
- source_word: יֵשׁ ... וְיֵשׁ
  english_pob_choice: there is ... and there is
  chosen_spanish: hay ... y hay
  alternatives_spanish:
  - existe ... y existe
  - hay casos en que ... y casos en que ...
  lexicon: HALOT
  rationale: «Hay ... y hay» reproduce la construcción existencial y el paralelismo observacional del hebreo con naturalidad en español.
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: un justo
  alternatives_spanish:
  - una persona justa
  - el justo
  lexicon: HALOT
  rationale: El adjetivo sustantivado masculino singular se vierte con el término bíblico «justo», que en español es claro y fiel al valor judicial/ético del hebreo.
- source_word: אֹבֵד
  english_pob_choice: perishing
  chosen_spanish: perece
  alternatives_spanish:
  - está pereciendo
  - se pierde
  lexicon: HALOT
  rationale: El participio expresa proceso o estado de ruina. «Perece» es idiomático en español y conserva la fuerza de desaparición/ruina sin reducirlo solo a muerte física.
- source_word: בְּצִדְקוֹ
  english_pob_choice: in his righteousness
  chosen_spanish: en su justicia
  alternatives_spanish:
  - por su justicia
  - a pesar de su justicia
  - en medio de su justicia
  lexicon: HALOT
  rationale: «Justicia» preserva el sustantivo abstracto más cercano al hebreo צֶדֶק/צְדָקָה y mantiene la ambigüedad preposicional de ב sin resolverla interpretativamente.
- source_word: רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: un impío
  alternatives_spanish:
  - un malvado
  - un perverso
  - el impío
  lexicon: HALOT
  rationale: «Impío» es una equivalencia bíblica estable en español para רָשָׁע y conserva la carga moral-religiosa del término. Se evita suavizarlo con un mero «malo».
- source_word: מַאֲרִיךְ
  english_pob_choice: prolonging his life
  chosen_spanish: alarga su vida
  alternatives_spanish:
  - prolonga su vida
  - alarga sus días
  - vive largo tiempo
  lexicon: HALOT
  rationale: El verbo hifil de ארך significa hacer largo/prolongar. En español, «alarga su vida» comunica el mismo valor causativo de modo natural.
- source_word: בְּרָעָתוֹ
  english_pob_choice: in his evil
  chosen_spanish: en su maldad
  alternatives_spanish:
  - en su mal
  - en su perversidad
  - a pesar de su maldad
  lexicon: HALOT
  rationale: «Maldad» expresa con precisión רָעָה en este contexto y permite mantener la misma preposición de la primera cola, sin resolver la ambigüedad causal/circunstancial del hebreo.
theological_decisions:
- issue: Sentido de הֶבֶל en Eclesiastés
  english_pob_reading: '''my vanity'' understood as the speaker''s fleeting, vapor-like life rather than moral vanity.'
  chosen_spanish_reading: «mi vanidad» entendido como la fugacidad vaporosa de la vida del hablante, no como vanidad moral.
  alternative_spanish_readings:
  - mi fugacidad
  - mi vapor
  - mi inutilidad
  rationale: Se conserva la palabra-clave del libro para mantener la red temática. La nota interna de sentido evita que el lector español entienda «vanidad» como soberbia o mero narcisismo.
  doctrine_reference: Translation philosophy §5
- issue: Fuerza de בְּצִדְקוֹ / בְּרָעָתוֹ
  english_pob_reading: Kept as 'in his righteousness' / 'in his evil' without resolving whether the sense is circumstance, concession, or instrument.
  chosen_spanish_reading: «en su justicia» / «en su maldad» sin decidir si la preposición expresa circunstancia, concesión o instrumento.
  alternative_spanish_readings:
  - por su justicia / por su maldad
  - a pesar de su justicia / a pesar de su maldad
  - debido a su justicia / debido a su maldad
  rationale: El hebreo mantiene una ambigüedad semántica importante. El español conserva esa apertura para no imponer una explicación teológica que el versículo no formula explícitamente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto sigue el pasaje hebreo y la solución inglesa auditada sin cambios sustanciales respecto al último pase; se conserva la ambigüedad de בְּצִדְקוֹ / בְּרָעָתוֹ y la carga temática de הֶבֶל.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa «justo/impío» como vocabulario bíblico estable para צַדִּיק / רָשָׁע.
  - «Vanidad» se conserva por coherencia intrabíblica con Eclesiastés, con aclaración semántica en nota.
  - La preposición «en» deja abierta la relación lógica del hebreo sin resolverla en favor de «por» o «a pesar de».
