translation:
  language: es
  text: Él hirió[a] a algunos de los hombres de Bet-semes porque habían mirado dentro del arca de Yahvé. Hirió entre el pueblo a setenta hombres, cincuenta mil hombres[b], y el pueblo se lamentó porque Yahvé había herido al pueblo con un gran golpe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque habían mirado al arca de Yahvé». La preposición hebrea puede entenderse de modo más general, aunque «mirado dentro de» probablemente refleja la ofensa en su contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice literalmente: «setenta hombres, cincuenta mil hombres», una formulación difícil. Puede significar «setenta hombres de cincuenta mil hombres», «cincuenta mil y setenta hombres», o reflejar un problema textual; algunos testigos antiguos apoyan una cifra mucho menor.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: he struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - hirió de muerte
  - golpeó
  - hirió de muerte / derribó
  lexicon: HALOT
  rationale: נכה puede significar 'golpear' o 'herir'. En español, 'hirió' conserva el campo léxico del golpeo sin forzar una especificación interpretativa extra; el contexto de juicio comunica el resultado fatal sin necesidad de añadirlo de modo mecánico.
- source_word: בְּאַנְשֵׁי בֵית שֶׁמֶשׁ
  english_pob_choice: some of the men of Beth-shemesh
  chosen_spanish: a algunos de los hombres de Bet-semes
  alternatives_spanish:
  - a algunos hombres de Bet-semes
  - a los hombres de Bet-semes
  lexicon: HALOT
  rationale: El hebreo con בְּ aquí tiene sentido partitivo/local; por eso 'a algunos de los hombres de Bet-semes' refleja mejor el alcance que un simple 'a los hombres'. 'Hombres' conserva la precisión del original.
- source_word: כִּי רָאוּ בַּאֲרוֹן יְהוָה
  english_pob_choice: because they had looked into the ark of Yahweh
  chosen_spanish: porque habían mirado dentro del arca de Yahvé
  alternatives_spanish:
  - porque habían mirado el arca de Yahvé
  - porque habían mirado al arca de Yahvé
  lexicon: HALOT
  rationale: Con ראה + ב, el contexto permite 'mirar/observar' con una penetración implícita; 'dentro del arca' reproduce la decisión inglesa 'looked into' y expresa la ofensa de manera más fuerte que un mero 'mirar el arca'. 'Arca de Yahvé' sigue la norma del nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino como 'Yahvé' según la directriz del proyecto, en lugar de sustituirlo por un título.
- source_word: שִׁבְעִים אִישׁ חֲמִשִּׁים אֶלֶף אִישׁ
  english_pob_choice: seventy men, fifty thousand men
  chosen_spanish: setenta hombres, cincuenta mil hombres
  alternatives_spanish:
  - setenta hombres y cincuenta mil hombres
  - setenta hombres, cincuenta mil hombres
  lexicon: HALOT
  rationale: La secuencia numérica hebrea es difícil; se conserva de forma transparente como 'setenta hombres, cincuenta mil hombres' sin armonizarla. 'Hombres' reproduce el sustantivo explícito del hebreo.
- source_word: בָּעָם
  english_pob_choice: among the people
  chosen_spanish: en el pueblo
  alternatives_spanish:
  - entre el pueblo
  - al pueblo
  lexicon: HALOT
  rationale: La preposición ב con עָם admite sentido locativo/partitivo; 'en el pueblo' comunica que la herida ocurrió dentro de la población. En la primera cláusula ya se explicitó el matiz partitivo con 'algunos de los hombres'.
- source_word: וַיִּתְאַבְּלוּ
  english_pob_choice: mourned
  chosen_spanish: se lamentó
  alternatives_spanish:
  - guardó luto
  - lloró
  lexicon: HALOT
  rationale: אבל expresa lamento/duelo. 'Se lamentó' es natural en español y conserva el registro de duelo sin añadir una formulación litúrgica más fuerte que el hebreo.
- source_word: מַכָּה גְדוֹלָה
  english_pob_choice: a great blow
  chosen_spanish: una gran herida
  alternatives_spanish:
  - un gran golpe
  - una gran aflicción
  - un gran azote
  lexicon: HALOT
  rationale: מַכָּה es 'golpe', 'herida' o 'azote'. 'Gran herida' mantiene la relación con el verbo repetido 'herir' y suena más natural en español que 'gran golpe' dentro de este contexto de juicio.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se preserva el nombre personal del Dios de Israel conforme a la directriz del proyecto; no se sustituye por un título eclesiástico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de la acción en 'בְּאַנְשֵׁי בֵית שֶׁמֶשׁ'
  english_pob_reading: some of the men of Beth-shemesh
  chosen_spanish_reading: a algunos de los hombres de Bet-semes
  alternative_spanish_readings:
  - a los hombres de Bet-semes
  - a parte de los hombres de Bet-semes
  rationale: La traducción refleja el matiz partitivo que la revisión inglesa añadió para no absolutizar indebidamente el grupo golpeado.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
- issue: Cifra difícil de bajas
  english_pob_reading: seventy men, fifty thousand men
  chosen_spanish_reading: setenta hombres, cincuenta mil hombres
  alternative_spanish_readings:
  - setenta hombres de cincuenta mil hombres
  - setenta hombres y cincuenta mil hombres
  - cincuenta mil hombres y setenta hombres
  rationale: Se preserva la dificultad textual del hebreo masorético sin resolverla de forma silenciosa; la redacción principal mantiene la tensión y la transparencia del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés al reflejar el valor partitivo de בְּאַנְשֵׁי בֵית שֶׁמֶשׁ con 'a algunos de los hombres', conserva la secuencia numérica difícil sin armonización, y mantiene la explicitación de la acción de juzgar como un golpe/herida real, con el nombre divino traducido según la norma del proyecto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera uniforme para יְהוָה.
  - '''Bet-semes'' conserva la transliteración habitual del topónimo.'
  - Se mantiene 'hombres' en las dos cláusulas numéricas para reflejar el hebreo.
  - La construcción 'se lamentó' conserva el verbo de duelo sin volverla más litúrgica.
  - La nota [a] se ancla en 'mirado dentro de' y la [b] en la cifra difícil.
