translation:
  language: es
  text: 'Por tanto[a], así dice Yahvé: «Tu mujer se prostituirá en la ciudad, tus hijos y tus hijas caerán a espada, tu tierra será repartida por cordel[b]; y tú mismo morirás en tierra impura, e Israel ciertamente irá al exilio[c] de su tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “Por esta razón”. El hebreo introduce una consecuencia judicial; “Por tanto” la expresa de modo natural en español.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “por cuerda/cordel”, es decir, el cordel de medir con el que se repartía la tierra conquistada.
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa un infinitivo absoluto con verbo finito para intensificar la certeza; “ciertamente irá al exilio” refleja ese énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa la consecuencia judicial del mensaje con un enlace natural en español, conservando la fuerza inferencial del hebreo.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: this is what Yahweh says
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - esto dice Yahvé
  - así ha dicho Yahvé
  lexicon: HALOT
  rationale: 'Mantiene la fórmula profética formal y el nombre divino según el estándar del proyecto: Yahvé.'
- source_word: אִשְׁתְּךָ
  english_pob_choice: Your wife
  chosen_spanish: Tu mujer
  alternatives_spanish:
  - Tu esposa
  lexicon: HALOT
  rationale: Mujer/esposa aquí es una referencia posesiva directa; 'mujer' es natural y suficientemente fiel, aunque 'esposa' también sería posible.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - en el pueblo
  lexicon: HALOT
  rationale: Conserva el valor locativo directo de עִיר sin suavizarlo.
- source_word: תִּזְנֶה
  english_pob_choice: will prostitute herself
  chosen_spanish: se prostituirá
  alternatives_spanish:
  - hará prostitución
  - se entregará a la prostitución
  - hará de prostituta
  lexicon: HALOT
  rationale: Refleja el verbo זנה con claridad moderna y mantiene el tono severo del juicio; evita un giro más interpretativo.
- source_word: וּבָנֶיךָ וּבְנֹתֶיךָ
  english_pob_choice: and your sons and your daughters
  chosen_spanish: tus hijos y tus hijas
  alternatives_spanish:
  - tus hijos e hijas
  - tus descendientes
  lexicon: HALOT
  rationale: Mantiene el par explícito masculino/femenino del hebreo; 'hijos' aquí funciona de manera natural en español para los varones, sin colapsar el paralelo.
- source_word: בַּחֶרֶב יִפֹּלוּ
  english_pob_choice: will fall by the sword
  chosen_spanish: caerán a espada
  alternatives_spanish:
  - caerán por la espada
  - morirán a espada
  - caerán por la guerra
  lexicon: HALOT
  rationale: Conserva el idiomatismo bíblico de muerte violenta por acción bélica. 'A espada' es una expresión española estable y formal.
- source_word: וְאַדְמָתְךָ
  english_pob_choice: and your land
  chosen_spanish: tu tierra
  alternatives_spanish:
  - tu suelo
  - tu territorio
  lexicon: HALOT
  rationale: אֲדָמָה en este contexto se refiere a la porción de tierra/posesión, no meramente a suelo físico.
- source_word: בַּחֶבֶל
  english_pob_choice: by measuring line
  chosen_spanish: por medio de un cordel
  alternatives_spanish:
  - con un cordel
  - por la cuerda de medir
  - mediante una línea de medición
  lexicon: HALOT
  rationale: חֶבֶל puede ser cuerda/cordel usado para medir tierras. Se conserva la imagen concreta sin convertirla en una paráfrasis demasiado técnica.
- source_word: תְּחֻלָּק
  english_pob_choice: will be divided
  chosen_spanish: será repartida
  alternatives_spanish:
  - será dividida
  - será parcelada
  - será asignada
  lexicon: HALOT
  rationale: En el contexto de conquista y asignación de tierras, 'repartida' comunica el resultado de la división territorial con naturalidad en español.
- source_word: וְאַתָּה
  english_pob_choice: and you yourself
  chosen_spanish: y tú mismo
  alternatives_spanish:
  - y tú
  - y aun tú
  lexicon: HALOT
  rationale: Preserva el énfasis pronominal explícito del hebreo.
- source_word: עַל אֲדָמָה טְמֵאָה
  english_pob_choice: on unclean land
  chosen_spanish: en tierra impura
  alternatives_spanish:
  - sobre tierra impura
  - en suelo impuro
  - en tierra inmunda
  lexicon: HALOT
  rationale: '''Impura'' mantiene el campo semántico ritual/covenantal sin imponer una explicación en el texto principal. ''En'' fluye mejor en español que una calca de ''sobre''.'
- source_word: תָּמ֔וּת
  english_pob_choice: will die
  chosen_spanish: morirás
  alternatives_spanish:
  - vas a morir
  - perecerás
  lexicon: HALOT
  rationale: Traducción directa del futuro verbal sin intensificación añadida.
- source_word: וְיִשְׂרָאֵל גָּלֹה יִגְלֶה
  english_pob_choice: and Israel will surely go into exile
  chosen_spanish: y Israel ciertamente irá al exilio
  alternatives_spanish:
  - e Israel sin duda será llevado al exilio
  - e Israel ciertamente será exiliado
  lexicon: HALOT
  rationale: Preserva el infinitivo absoluto hebreo con un adverbio de certeza; 'ir al exilio' es idiomático y conserva el movimiento de destierro.
- source_word: מֵעַל אַדְמָתוֹ
  english_pob_choice: from its land
  chosen_spanish: lejos de su tierra
  alternatives_spanish:
  - de su tierra
  - fuera de su tierra
  lexicon: HALOT
  rationale: '''Lejos de'' explicita el desplazamiento implícito en מֵעַל y mantiene el sentido de separación territorial.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahvéh
  rationale: Se sigue la convención del proyecto para el tetragrámaton en español, sin máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: 'Término de territorio contaminado: עַל אֲדָמָה טְמֵאָה'
  english_pob_reading: unclean land / foreign land from Israel's covenantal perspective
  chosen_spanish_reading: tierra impura
  alternative_spanish_readings:
  - tierra inmunda
  - tierra no pura
  - tierra extranjera
  rationale: Se conserva la tensión ritual/covenantal del hebreo sin resolverla de antemano en una glosa interpretativa; el contexto del exilio ya orienta la lectura.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción se ajusta a la revisión más reciente del POB inglés, que prefirió 'from its land' en lugar de una expansión como 'away from its land'. Por eso la cláusula final se traduce aquí con un desplazamiento más sobrio ('lejos de su tierra') y sin añadir explicación interpretativa en el cuerpo principal. También se preserva el paralelismo del juicio con una secuencia directa y formal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - '''Tierra'' se reserva para אֲדָמָה en sentido de territorio heredado; no se traduce como ''suelo'' ni ''país''.'
  - Se mantiene el idiomatismo profético 'a espada' para בַּחֶרֶב יִפֹּלוּ.
  - '''Impura'' comunica la contaminación ritual/covenantal sin sustituirla por una explicación doctrinal en el texto principal.'
  - Los marcadores de nota [a], [b] y [c] aparecen exactamente en el texto principal y corresponden a notas de alternativa lexical.
