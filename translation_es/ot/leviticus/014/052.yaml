translation:
  language: es
  text: Así limpiará la casa con la sangre del ave, con el agua viva[a], con el ave viva, con madera de cedro, con hisopo y con hilo escarlata[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agua fresca» o «agua corriente»; el hebreo dice literalmente «agua viva», expresión fija para agua de una fuente fresca o fluyente.
    reason: lexical_alternative
  - marker: b
    text: O «hilo escarlata». La expresión hebrea se refiere a material teñido de escarlata usado en el rito de purificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחִטֵּא
  english_pob_choice: Thus he shall cleanse
  chosen_spanish: Así limpiará
  alternatives_spanish:
  - Y purificará
  - Así purificará
  lexicon: HALOT
  rationale: En contexto ritual, el piel de חטא expresa limpieza/purificación de contaminación ritual. «Limpiará» comunica bien ese sentido en español moderno y sigue la revisión inglesa que prefirió «cleanse». «Así» conserva la fuerza consecutiva del hebreo.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  - la vivienda
  lexicon: HALOT
  rationale: Aquí se trata del edificio sometido al rito de purificación; «casa» es la correspondencia natural y transparente en español.
- source_word: בְּדַם הַצִּפּוֹר
  english_pob_choice: with the blood of the bird
  chosen_spanish: con la sangre del ave
  alternatives_spanish:
  - con la sangre del pájaro
  lexicon: HALOT
  rationale: El hebreo usa la sangre como medio/instrumento del rito. «Ave» es más adecuado que «pájaro» en registro bíblico y mantiene la referencia al animal sacrificial.
- source_word: וּבַמַּיִם הַחַיִּים
  english_pob_choice: with the living water
  chosen_spanish: con el agua viva
  alternatives_spanish:
  - con agua fresca
  - con agua corriente
  lexicon: HALOT
  rationale: «Agua viva» reproduce con fidelidad la expresión hebrea literal מַיִם חַיִּים y preserva su valor técnico/ritual. En español, «agua viva» es comprensible y mantiene la resonancia intertextual.
- source_word: וּבַצִּפֹּר הַחַיָּה
  english_pob_choice: with the live bird
  chosen_spanish: con el ave viva
  alternatives_spanish:
  - con el ave viviente
  - con el pájaro vivo
  lexicon: HALOT
  rationale: La construcción contrasta con el ave cuya sangre fue usada. «Ave viva» es natural y conserva el contraste ritual sin perder el registro bíblico.
- source_word: וּבְעֵץ הָאֶרֶז
  english_pob_choice: with cedar wood
  chosen_spanish: con madera de cedro
  alternatives_spanish:
  - con cedro
  - con leño de cedro
  lexicon: HALOT
  rationale: עֵץ con especie arbórea suele indicar la madera de esa planta en el rito. «Madera de cedro» es claro y preciso en español.
- source_word: וּבָאֵזֹב
  english_pob_choice: with hyssop
  chosen_spanish: con hisopo
  alternatives_spanish:
  - con hyssop
  lexicon: HALOT
  rationale: «Hisopo» es la forma tradicional y entendible en español para אֵזֹב, y preserva la terminología ritual bíblica.
- source_word: וּבִשְׁנִי הַתּוֹלָעַת
  english_pob_choice: with scarlet yarn
  chosen_spanish: con hilo escarlata
  alternatives_spanish:
  - con hilo carmesí
  - con lana escarlata
  - con hilo de escarlata
  lexicon: HALOT
  rationale: La expresión designa material teñido de escarlata usado en el rito. «Hilo escarlata» comunica bien la función del objeto y se acerca al sentido del inglés POB, que optó por un material textil.
theological_decisions:
- issue: Sentido ritual de חִטֵּא
  english_pob_reading: cleanse/purify the house
  chosen_spanish_reading: limpiar la casa
  alternative_spanish_readings:
  - purificar la casa
  - hacer expiación por la casa
  rationale: El hebreo en este contexto habla de la eliminación ritual de contaminación, no de limpieza física. «Limpiar» en español puede funcionar como equivalente natural del inglés «cleanse» sin desplazar el sentido ritual; se evita «hacer expiación» porque introduce un matiz más específico que el texto aquí no exige por sí mismo.
  doctrine_reference: Levítico 14; uso ritual de purificación en la Torá
- issue: Expresión «agua viva»
  english_pob_reading: living water
  chosen_spanish_reading: agua viva
  alternative_spanish_readings:
  - agua fresca
  - agua corriente
  rationale: La expresión es técnica y formularia. Mantenerla literal preserva la tensión entre el sentido idiomático y el valor ritual, que el inglés POB también conserva con una nota explicativa.
  doctrine_reference: Levítico 14:5-7; 14:50-52
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «purify» por «cleanse» para reflejar mejor el matiz ritual de חטא; la versión española sigue esa decisión con «limpiará», manteniendo además las dos notas léxicas del original inglés sobre «agua viva» y el material escarlata.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la política general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa «ave» en vez de «pájaro» para conservar un registro bíblico más técnico y coherente con el inventario ritual.
  - «Hisopo» y «hilo escarlata» preservan la terminología tradicional sin perder claridad en español contemporáneo.
