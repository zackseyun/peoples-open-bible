translation:
  language: es
  text: ¡Qué hermoso es tu amor[a], hermana mía, esposa mía! ¡Cuánto mejor es tu amor que el vino, y la fragancia de tus aceites[b] que todas las especias!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus caricias» en ambas ocurrencias de דֹדַיִךְ; el hebreo puede referirse al amor expresado en afecto físico.
    reason: lexical_alternative
  - marker: b
    text: «Tus aceites» probablemente se refiere aquí a aceites perfumados o ungüentos.
    reason: cultural_note
lexical_decisions:
- source_word: מַה
  english_pob_choice: How
  chosen_spanish: ¡Qué...! / ¡Cuánto...!
  alternatives_spanish:
  - ¡Cómo...!
  - ¡Cuán...!
  lexicon: HALOT
  rationale: El hebreo exclamativo introduce admiración, no una pregunta. En español, «¡Qué!» y «¡Cuánto!» expresan mejor esa función poética y mantienen la fuerza del elogio.
- source_word: יָּפ֥וּ
  english_pob_choice: beautiful
  chosen_spanish: hermosas
  alternatives_spanish:
  - bellas
  - bonitas
  lexicon: HALOT
  rationale: El adjetivo describe belleza/atractivo en un contexto poético. «Hermosas» es natural en español y conserva un registro digno.
- source_word: דֹדַ֖יִךְ
  english_pob_choice: your love
  chosen_spanish: tus amores
  alternatives_spanish:
  - tu amor
  - tus caricias
  - tu afecto
  lexicon: HALOT
  rationale: 'POB documenta la amplitud semántica de דֹדַיִךְ: amor expresado en afecto físico. «Tus amores» preserva el plural poético del hebreo y deja abierta la tensión entre amor y caricias sin concretarla en exceso.'
- source_word: אֲחֹתִ֣/י כַלָּ֑ה
  english_pob_choice: my sister, my bride
  chosen_spanish: hermana mía, esposa mía
  alternatives_spanish:
  - hermana mía, mi novia
  - hermana mía, mi amada
  lexicon: HALOT
  rationale: Se conservan ambos vocativos como términos de afecto. «Esposa mía» comunica el vínculo con claridad en español; «novia» sería más interpretativo y menos estable para el registro poético.
- source_word: טֹּ֤בוּ
  english_pob_choice: better
  chosen_spanish: mejores
  alternatives_spanish:
  - más agradables
  - más dulces
  - más excelentes
  lexicon: HALOT
  rationale: El comparativo exige una forma explícita en español. «Mejores» es directo y fiel al paralelismo comparativo del versículo.
- source_word: מִ/יַּ֔יִן
  english_pob_choice: than wine
  chosen_spanish: que el vino
  alternatives_spanish:
  - que vino
  - más que el vino
  lexicon: HALOT
  rationale: En español el comparativo se expresa naturalmente con «que». Mantiene la comparación sin añadir material innecesario.
- source_word: וְ/רֵ֥יחַ
  english_pob_choice: and the fragrance
  chosen_spanish: y el aroma
  alternatives_spanish:
  - y la fragancia
  - y el olor
  lexicon: HALOT
  rationale: רֵיחַ es el olor/aroma. «Aroma» preserva el matiz positivo del contexto poético sin volverlo técnico.
- source_word: שְׁמָנַ֖יִךְ
  english_pob_choice: of your oils
  chosen_spanish: de tus ungüentos
  alternatives_spanish:
  - de tus aceites
  - de tus perfumes
  - de tus aceites perfumados
  lexicon: HALOT
  rationale: POB entiende aquí aceites perfumados o ungüentos. «Ungüentos» hace explícita la función cosmética/aromática de manera natural en español y evita una lectura demasiado literal de «aceites».
- source_word: מִ/כָּל בְּשָׂמִֽים
  english_pob_choice: than all spices
  chosen_spanish: que todas las especias
  alternatives_spanish:
  - que todos los perfumes
  - que todas las sustancias aromáticas
  lexicon: HALOT
  rationale: בְּשָׂמִים designa sustancias aromáticas. «Especias» es un equivalente concreto y comprensible en español, y en este contexto poético conserva el contraste de fragancia.
translation_notes:
  revision_awareness: El texto español sigue el acuerdo alto del auditoria inglesa sin cambios doctrinales ni textuales; se mantiene la misma decisión léxica de fondo para דֹדַיִךְ y שְׁמָנַיִךְ, pero se ajusta al español con un registro poético natural.
  spanish_consistency_notes:
  - Se preserva el paralelismo de las dos ocurrencias de דֹדַיִךְ con la misma solución («tus amores») para mantener consistencia interna.
  - Se conserva la doble invocación («hermana mía, esposa mía») como reflejo directo del hebreo.
  - 'El comparativo se distribuye de forma idiomática en español: «mejores... que» / «que el vino» / «que todas las especias».'
  - No se sustituye el sentido aromático por una glosa interpretativa más amplia; «aroma» y «ungüentos» mantienen la imagen concreta del verso.
