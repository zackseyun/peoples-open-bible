theological_decisions:
- issue: Rendering δεσπότου as a divine title
  chosen_reading: the Sovereign
  alternative_readings:
  - the Master
  - the Lord
  rationale: The source uses δεσπότης rather than κύριος. To preserve lexical distinction and the sense of absolute divine authority, 'the Sovereign' is preferred. This avoids importing the standard contested-term rendering for κύριος where that word is not present.
  doctrine_reference: 'DOCTRINE.md: Translate titles; consistency of key terms, or documented exception.'
