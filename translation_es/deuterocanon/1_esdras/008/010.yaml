    issue: «lo que es humano» para τὰ φιλάνθρωπα
    rationale: Aunque es una traducción formalmente cercana, en español «humano» puede sonar antropológico o moralmente vago. Dado el contexto de decreto benevolente, «lo que es humanitario» o «lo que es benevolente» representa mejor el matiz de φιλάνθρωπα y suena más natural.
  - severity: low
    issue: Ubicación del marcador de la nota textual [b]
    rationale: La nota explica que el paralelo hebreo tiene una redacción sustancialmente diferente en este punto; anclarla en «estos otros» puede inducir a pensar que la variante afecta solo a ese sintagma. Es mejor anclarla en «en nuestro reino» o en un tramo más amplio del segmento divergente.
