translation:
  language: es
  text: Y las obras sagradas prosperaban[a], mientras Hageo y Zacarías, los profetas, profetizaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las obras santas', es decir, la obra del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐόδα
  english_pob_choice: prospered
  chosen_spanish: prosperaban
  alternatives_spanish:
  - tenían buen éxito
  - salían bien
  - progresaban
  lexicon: LSJ
  rationale: El verbo griego expresa que las obras avanzaban con buen resultado o éxito favorable. En español, 'prosperaban' conserva esa idea de avance afortunado sin añadir demasiado contenido interpretativo.
- source_word: τὰ ἱερὰ ἔργα
  english_pob_choice: the holy works
  chosen_spanish: las obras santas
  alternatives_spanish:
  - las obras sagradas
  - las obras del santuario
  - las obras del templo
  lexicon: LSJ
  rationale: 'Se mantiene la transparencia del sintagma griego: ''ἱερὰ ἔργα'' = ''obras santas''. No se especifica ''templo'' en el texto principal, porque el griego no lo dice explícitamente y la referencia contextual puede quedar implícita.'
- source_word: προφητευόντων
  english_pob_choice: were prophesying
  chosen_spanish: profetizaban
  alternatives_spanish:
  - estaban profetizando
  - profetizaban continuamente
  - hablaban proféticamente
  lexicon: BDAG
  rationale: El genitivo absoluto indica acción simultánea. En español, el imperfecto 'profetizaban' puede expresar bien esa simultaneidad sin forzar una perífrasis más pesada.
- source_word: Ἁγγαίου
  english_pob_choice: Haggai
  chosen_spanish: Hageo
  alternatives_spanish:
  - Aggeo
  lexicon: Standard biblical transliteration
  rationale: Se usa la forma bíblica española habitual 'Hageo', la más reconocible y estándar en español.
- source_word: Ζαχαρίου
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  lexicon: Standard biblical transliteration
  rationale: Se adopta 'Zacarías', forma bíblica tradicional y clara en español.
- source_word: τῶν προφητῶν
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los profetas de Yahvé
  - los profetas
  lexicon: LSJ
  rationale: 'Se conserva la apposición explícita: Hageo y Zacarías son identificados como ''los profetas''. En español, la coma ayuda a mantener esa relación sin alterar el sentido.'
theological_decisions:
- issue: Si conviene explicitar que las 'obras santas' son las obras del templo
  english_pob_reading: Keep the broader phrase 'the holy works' in the main text
  chosen_spanish_reading: Conservar 'las obras santas' en el texto principal
  alternative_spanish_readings:
  - las obras del templo
  - las obras de la casa de Dios
  rationale: El griego no nombra aquí el templo de forma directa. Aunque el contexto amplio apunta a la reconstrucción del santuario, la traducción principal no debe estrechar el alcance del sintagma más allá de lo que dice el original.
  doctrine_reference: Principio de primacía del texto fuente; no ampliar el referente más allá de la evidencia del griego.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el audit trail inglés y no requiere cambios sustanciales; se mantuvo la decisión de no explicitar 'templo' en el cuerpo principal, reservando esa precisión para la nota.
  spanish_consistency_notes:
  - Se prefirió 'Hageo' y 'Zacarías' por ser las formas bíblicas estándar en español.
  - Se mantuvo 'profetizaban' en imperfecto para reflejar la simultaneidad del genitivo absoluto.
  - La nota conserva la alternativa léxica 'sagradas' y aclara el referente contextual sin sobretraducir el texto principal.
