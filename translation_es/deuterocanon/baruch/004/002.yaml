translation:
  language: es
  text: Vuelve[a], Jacob, y aférrate a ella; camina hacia el resplandor, frente a su luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Regresa, Jacob, y agárrate de ella»; el griego también puede entenderse más impersonalmente como «tómalo» o similar si el referente se toma como la ley más que como la sabiduría personificada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστρέφου
  english_pob_choice: Turn
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Vuélvete
  - Regresa
  lexicon: BDAG
  rationale: ἐπιστρέφω en imperativo puede expresar volver o regresar. «Vuelve» es natural en español y conserva el movimiento de retorno sin introducir con fuerza una idea penitencial que el contexto inmediato no exige explícitamente.
- source_word: Ἰακώβ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: Transliteración propia / uso bíblico
  rationale: El texto griego nombra directamente a Jacob; mantener «Jacob» preserva la forma del original y la referencia concreta del pasaje.
- source_word: ἐπιλαβοῦ
  english_pob_choice: take hold of
  chosen_spanish: toma de ella
  alternatives_spanish:
  - aférrate a ella
  - toma la
  lexicon: BDAG
  rationale: El verbo pide una acción concreta de asirse o agarrar. «Toma de ella» conserva el objeto pronominal femenino y la fuerza física del mandato, con un español idiomático.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: ella
  alternatives_spanish:
  - eso
  - lo
  lexicon: Pronombre femenino griego
  rationale: El pronombre femenino mantiene la personificación del antecedente femenino en el contexto de Baruc 4. «Ella» preserva esa tensión literaria y evita neutralizarla prematuramente.
- source_word: διόδευσον
  english_pob_choice: walk toward
  chosen_spanish: camina hacia
  alternatives_spanish:
  - haz tu camino hacia
  - avanza hacia
  lexicon: LSJ
  rationale: El verbo comunica avanzar o abrirse paso hacia un destino. «Camina hacia» es claro y cercano al valor direccional del griego, sin exceder el sentido.
- source_word: λάμψιν
  english_pob_choice: radiance
  chosen_spanish: resplandor
  alternatives_spanish:
  - radiancia
  - brillo
  lexicon: LSJ
  rationale: λάμψις designa un fulgor o brillo resplandeciente. «Resplandor» es un equivalente natural en español que mantiene el tono elevado y poético.
- source_word: κατέναντι
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrente de
  - opuesto a
  lexicon: LSJ
  rationale: La preposición indica una orientación «enfrente de / opuesta a». «Frente a» suena más natural en español que un calco rígido, pero conserva la relación espacial marcada por el griego.
- source_word: φωτός
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - brillo
  lexicon: BDAG
  rationale: φῶς significa «luz». Se mantiene el contraste poético entre «resplandor» y «luz» para reflejar la variación léxica del griego.
theological_decisions:
- issue: Personificación femenina del referente de αὐτῆς
  english_pob_reading: Retain feminine 'her' in the main text
  chosen_spanish_reading: Mantener «ella» en el texto principal
  alternative_spanish_readings:
  - Neutralizar como «lo» o «eso»
  - Explicitar «la ley» en el cuerpo del texto
  rationale: El griego usa pronombre femenino y el contexto de Baruc 4 favorece una lectura personificada. Conservar «ella» evita aplanar la personificación de la sabiduría/la ley y mantiene la tensión literaria documentada por el POB inglés.
  doctrine_reference: Principio de fidelidad al texto fuente y preservación de personificación literaria teológicamente relevante.
translation_notes:
  revision_awareness: El inglés POB fue revisado desde «Turn back, O Jacob...» a «Turn, O Jacob...» para reflejar con mayor inmediatez ἐπιστρέφου. En español, ese ajuste se refleja con «Vuelve», que conserva la idea de retorno sin añadir una nota penitencial ajena al contexto. También se preserva la alternancia poética «radiance/light» mediante «resplandor/luz».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - Se mantuvo un registro bíblico claro y actual, sin arcaísmos innecesarios.
  - Se conservó la personificación con el pronombre femenino «ella», coherente con la audit trail inglesa.
