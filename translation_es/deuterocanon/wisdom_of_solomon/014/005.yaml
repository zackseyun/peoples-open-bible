translation:
  language: es
  text: Pero tú te propones que las obras de tu sabiduría no queden inactivas; por eso, aun con el más pequeño pedazo de madera, los hombres encomiendan sus vidas[a], y al pasar por las olas en una balsa[b], fueron llevados a salvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus almas». En este contexto, el sentido probablemente es «sus vidas», pues se trata del riesgo que asumen en el mar.
    reason: lexical_alternative
  - marker: b
    text: O «sobre una balsa». La imagen resalta la fragilidad del medio de transporte frente a la acción preservadora de la sabiduría divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλεις
  english_pob_choice: you intend
  chosen_spanish: tú quieres
  alternatives_spanish:
  - tú intendes
  - tú deseas
  - tú quieres decir
  lexicon: BDAG
  rationale: El griego expresa voluntad y propósito. En español, «quieres» comunica esa intención directa sin volverlo meramente futuro. Se conserva el segundo singular para reflejar el trato directo del texto.
- source_word: μὴ ἀργὰ εἶναι
  english_pob_choice: should not be idle
  chosen_spanish: no estén ociosas
  alternatives_spanish:
  - no estén inactivas
  - no sean vanas
  - no estén ineficaces
  lexicon: LSJ
  rationale: ἀργά sugiere algo sin trabajo, sin actividad o improductivo. «Ociosas» mantiene la imagen de obras que no permanecen sin obrar y funciona naturalmente con «obras» en español.
- source_word: τὰ τῆς σοφίας σου ἔργα
  english_pob_choice: the works of your wisdom
  chosen_spanish: las obras de tu sabiduría
  alternatives_spanish:
  - las obras de tu sabiduría
  - los hechos de tu sabiduría
  - lo que ha hecho tu sabiduría
  lexicon: LSJ
  rationale: La construcción posesiva/genitiva se conserva de forma transparente. «Obras de tu sabiduría» mantiene el vínculo entre Dios y su sabiduría sin forzar una identificación más fuerte de la que el versículo exige.
- source_word: διὰ τοῦτο
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - por esta razón
  lexicon: BDAG
  rationale: Conecta de manera inferencial y natural con el ejemplo que sigue, manteniendo el tono elevado sin sonar artificial.
- source_word: ἐλαχίστῳ ξύλῳ
  english_pob_choice: the smallest piece of wood
  chosen_spanish: el más pequeño pedazo de madera
  alternatives_spanish:
  - una pieza de madera muy pequeña
  - el más pequeño trozo de madera
  - un pequeño pedazo de madera
  lexicon: LSJ
  rationale: La forma griega destaca lo mínimo del material. «Pedazo de madera» comunica la fragilidad concreta del objeto; el superlativo «más pequeño» conserva la fuerza de ἐλαχίστῳ.
- source_word: πιστεύουσιν
  english_pob_choice: entrust
  chosen_spanish: confían
  alternatives_spanish:
  - encomiendan
  - ponen en manos de
  - depositan
  lexicon: BDAG
  rationale: Aquí el verbo no es solo creer, sino arriesgar o encomendar la propia vida. «Confían sus vidas» reproduce bien el acto de confiarse a algo frágil en contexto marítimo.
- source_word: ψυχάς
  english_pob_choice: their lives
  chosen_spanish: sus vidas
  alternatives_spanish:
  - sus almas
  - su vida
  - sus almas/vidas
  lexicon: BDAG
  rationale: En este contexto náutico ψυχή se refiere a la vida expuesta al peligro. «Vidas» evita introducir una lectura espiritual ajena al pasaje, aunque se conserva la alternativa teológica en nota.
- source_word: κλύδωνα
  english_pob_choice: the waves
  chosen_spanish: las olas
  alternatives_spanish:
  - el oleaje
  - la marejada
  - las aguas
  lexicon: LSJ
  rationale: El término describe el movimiento violento del mar. «Las olas» es natural en español y suficientemente fiel al campo semántico marítimo.
- source_word: σχεδίᾳ
  english_pob_choice: on a raft
  chosen_spanish: en una balsa
  alternatives_spanish:
  - sobre una balsa
  - en un raft
  - en una pequeña embarcación improvisada
  lexicon: LSJ
  rationale: σχεδία es una balsa o plataforma flotante improvisada. «Balsa» es el equivalente español más claro y directo.
- source_word: διεσώθησαν
  english_pob_choice: they were brought safely through
  chosen_spanish: fueron llevados a salvo
  alternatives_spanish:
  - salieron a salvo
  - fueron preservados
  - fueron salvados
  lexicon: BDAG
  rationale: El pasivo compuesto expresa salida segura a través del peligro. «Fueron llevados a salvo» conserva la idea de preservación durante el tránsito, con estilo natural en español.
theological_decisions:
- issue: Referencia de «tu sabiduría» y el alcance de la personificación
  english_pob_reading: The verse addresses God directly and attributes effective action to God's wisdom without over-specifying a hypostatic doctrine of Wisdom.
  chosen_spanish_reading: El versículo se dirige directamente a Dios y atribuye eficacia a su sabiduría, sin convertirla en una entidad separada o definirla más allá del texto.
  alternative_spanish_readings:
  - la sabiduría como agente plenamente personificado
  - la sabiduría como mero modo de hablar de la acción sabia de Dios
  rationale: 'El griego habla en segunda persona y de «las obras de tu sabiduría». La traducción conserva esa tensión: lenguaje teológico fuerte, pero sin imponer una explicación doctrinal que el versículo no desarrolla.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete 1909 y la revisión auditada del POB inglés. Se tuvo en cuenta la corrección de la dative/instrumentalidad en ἐλαχίστῳ ξύλῳ y la preferencia reciente por traducir κλύδωνα con un término marítimo natural; por eso se escogió «con el más pequeño pedazo de madera»/«en una balsa»/«las olas» en un registro español fluido, manteniendo la tensión entre «vidas» y «almas» en nota.
  spanish_consistency_notes:
  - Se mantiene «sabiduría» para σοφία, en coherencia con el léxico bíblico-teológico del proyecto.
  - Se usa «balsa» para σχεδία por ser el equivalente más transparente y evitar tecnicismos innecesarios.
  - Se evita «SEÑOR» o «Cristo» porque el pasaje no los contiene; el texto habla directamente de Dios y de su sabiduría.
  - La puntuación reproduce una sola oración compuesta con contraste inferencial, adecuada al tono sapiencial del verso.
