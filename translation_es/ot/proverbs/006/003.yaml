translation:
  language: es
  text: 'Haz esto, pues, hijo mío, y líbrate, porque has llegado a estar en manos de tu prójimo: ve, humíllate[a], y ruega con insistencia a tu prójimo[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «rebájate», «sométete» o «postrarte». El hebreo sugiere abajarse ante otro, quizá incluso postrarse.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «tus prójimos» (plural), aunque muchos entienden aquí el sentido como singular, «tu prójimo» o «tu amigo», en línea con la frase anterior.
    reason: textual_variant
lexical_decisions:
- source_word: עֲשֵׂה זֹאת
  english_pob_choice: Do this
  chosen_spanish: Haz esto
  alternatives_spanish:
  - Haz esto ahora
  - Haz esto, pues
  lexicon: HALOT
  rationale: Imperativo directo con demostrativo; «Haz esto» reproduce la urgencia sin añadir contenido ajeno.
- source_word: אֵפ֪וֹא
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - ahora
  - por tanto
  lexicon: HALOT
  rationale: La partícula introduce inferencia o exhortación; «pues» funciona con naturalidad en español y conserva el vínculo discursivo.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: HALOT
  rationale: Tratamiento sapiencial filial. «Hijo mío» es natural, reverente y fiel al género.
- source_word: וְהִנָּצֵל
  english_pob_choice: deliver yourself
  chosen_spanish: líbrate
  alternatives_spanish:
  - sálvate
  - escápate
  - delívrate
  lexicon: HALOT
  rationale: El nifal imperativo expresa salir de una situación de peligro o quedar libre de ella. «Líbrate» conserva el valor reflexivo y la urgencia.
- source_word: בְכַף רֵעֶךָ
  english_pob_choice: into the hand of your neighbor
  chosen_spanish: en manos de tu prójimo
  alternatives_spanish:
  - en la mano de tu prójimo
  - bajo el poder de tu prójimo
  lexicon: HALOT
  rationale: כַּף puede referir literalmente a la mano/palma, pero en español «en manos de» comunica con claridad la imagen idiomática de estar bajo control o dominio.
- source_word: לֵךְ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - vete
  - ve de inmediato
  lexicon: HALOT
  rationale: Imperativo breve que introduce la siguiente acción urgente; «ve» es directo y natural.
- source_word: הִתְרַפֵּס
  english_pob_choice: humble yourself
  chosen_spanish: humíllate
  alternatives_spanish:
  - rebájate
  - postra-te
  - sométete
  lexicon: HALOT
  rationale: El hitpael raro sugiere abajarse o hacerse pequeño ante otro. «Humíllate» conserva la postura social/relacional sin especificar de más el gesto físico.
- source_word: וּרְהַב
  english_pob_choice: urge your neighbor
  chosen_spanish: ruega con insistencia
  alternatives_spanish:
  - insiste con tu prójimo
  - apremia a tu prójimo
  - urge a tu prójimo
  lexicon: HALOT
  rationale: La raíz en este contexto se entiende como solicitar con apremio. «Ruega con insistencia» mantiene la fuerza exhortativa sin introducir un objeto explícito no presente en el hebreo.
- source_word: רֵעֶיךָ
  english_pob_choice: your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - a tu amigo
  - a tus prójimos
  lexicon: HALOT
  rationale: El MT presenta una forma plural problemática al final; el sentido contextual y la revisión inglesa favorecen el singular. «Prójimo» recoge el valor relacional de רֵעַ en español bíblico contemporáneo.
theological_decisions:
- issue: Tratamiento del término relacional רֵעַ / רֵעֶךָ frente a lectura plural del final del verso
  english_pob_reading: The Hebrew reads 'your neighbors' (plural), though many understand the sense as singular, 'your neighbor' or 'your friend,' in line with the earlier phrase.
  chosen_spanish_reading: 'Se traduce en singular contextual: «tu prójimo» / «a tu prójimo».'
  alternative_spanish_readings:
  - tus prójimos
  - tu amigo
  - tus amigos
  rationale: La forma final plural del MT se mantiene como problema de lectura, pero el paralelismo con la frase anterior y la decisión revisada en inglés apuntan a un objeto singular. En español, el singular evita oscurecer el sentido exhortativo.
  doctrine_reference: Texto masorético / decisión textual
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «into the palm of your neighbor» por «into the hand of your neighbor» y resolvió la ambigüedad final hacia un singular («urge your neighbor»). Esta versión española sigue esa revisión, evitando «palma» por ser menos natural en español y manteniendo la tensión del verbo hebreo raro en una forma que no añada contenido ajeno.
  spanish_consistency_notes:
  - Se mantiene el tratamiento sapiencial «hijo mío» para coherencia con Proverbios.
  - «Prójimo» se usa como equivalente amplio y relacional de רֵעַ, sin forzar una lectura eclesiástica.
  - 'Se conserva la secuencia imperativa breve del hebreo: acción, liberación, razón, movimiento, humillación y ruego insistente.'
