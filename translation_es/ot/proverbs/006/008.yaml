    rationale: בַּקָּצִיר se refiere al tiempo de cosecha; «cosecha» comunica mejor ese sentido para un lector hispano amplio.
  - severity: low
    issue: «En el verano» es correcto, pero «en verano» resulta más idiomático en español proverbial.
    rationale: La omisión del artículo mejora la fluidez sin alterar el sentido temporal del hebreo.
  revised_spanish_text: Prepara su alimento en verano[a]; recoge[b] sus provisiones en la cosecha.
