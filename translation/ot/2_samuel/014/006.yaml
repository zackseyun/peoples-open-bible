id: 2SA.14.6
reference: 2 Samuel 14:6
source:
  edition: WLC
  text: וּ/לְ/שִׁפְחָֽתְ/ךָ֙ שְׁנֵ֣י בָנִ֔ים וַ/יִּנָּצ֤וּ שְׁנֵי/הֶם֙ בַּ/שָּׂדֶ֔ה וְ/אֵ֥ין מַצִּ֖יל בֵּֽינֵי/הֶ֑ם וַ/יַּכּ֧/וֹ הָ/אֶחָ֛ד אֶת הָ/אֶחָ֖ד וַ/יָּ֥מֶת אֹתֽ/וֹ־׃
translation:
  text: And your servant had two sons[a], and the two of them fought in the field, and there was no one to separate them[b]; then the one struck the other and killed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your maidservant.' The Hebrew term is a deferential self-reference by a woman speaking to the king.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'there was no deliverer between them,' that is, no one to intervene and separate them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְשִׁפְחָתְךָ
  chosen: your servant woman
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female servant/slave; in courtly self-reference before the king it functions as a deferential self-designation. 'Your servant woman' preserves both the gender and the humility without sounding archaic like 'maidservant.'
- source_word: שְׁנֵי בָנִים
  chosen: two sons
  alternatives:
  - two children
  lexicon: HALOT
  rationale: בָנִים here specifically means male offspring, not generic children, so 'two sons' is the gender-accurate rendering.
- source_word: וַיִּנָּצוּ
  chosen: fought
  alternatives:
  - quarreled
  - struggled
  lexicon: HALOT
  rationale: The verb נצה in this stem indicates physical strife or fighting. Given the outcome of one killing the other, 'fought' better fits the escalation than the milder 'quarreled.'
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - out in the field
  lexicon: HALOT
  rationale: A straightforward locative phrase; 'in the field' is natural and sufficiently literal.
- source_word: וְאֵין מַצִּיל בֵּינֵיהֶם
  chosen: and there was no one to separate them
  alternatives:
  - and there was no one to rescue between them
  - and there was no one to deliver them
  lexicon: HALOT
  rationale: מַצִּיל from נצל literally means one who delivers/rescues, but in this conflict setting the sense is of intervening to prevent harm. 'Separate them' conveys the idiomatic force in clear English.
- source_word: וַיַּכּוֹ הָאֶחָד אֶת הָאֶחָד
  chosen: then the one struck the other
  alternatives:
  - and one struck the other
  - and the one beat the other
  lexicon: HALOT
  rationale: נכה commonly means strike/smite. 'Struck' is natural modern English and leaves open whether the blow was singular or part of a beating; the following clause supplies the fatal result.
- source_word: וַיָּמֶת אֹתוֹ
  chosen: and killed him
  alternatives:
  - and he died from it
  - causing his death
  lexicon: HALOT
  rationale: 'Although the form is from מות (''to die''), with the direct object suffix it is causative in sense: one caused the other to die. English idiom is best represented by ''killed him.'''
