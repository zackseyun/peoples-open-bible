review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: una exención fiscal sobre toda la tierra/territorio que posean y la orden de que los caldeos dejen las aldeas judías que ocupan. Sin embargo, la nota alternativa no preserva la alternativa inglesa documentada, porque repite prácticamente la misma idea en lugar de ofrecer la opción léxica correspondiente a «territorio» / «exempt from tribute».'
  spanish_quality_summary: El texto principal es claro y natural en español eclesial moderno. «Toda la tierra», «exenta de tributo», «los caldeos» y «ocupan» funcionan bien. «Les quede exenta» es aceptable, pero «sea exenta» suena algo menos idiomático; aun así, no exige cambio. El único ajuste necesario es la nota al pie para que sea realmente útil y fiel al expediente de auditoría.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la preservación correcta de «caldeos» para Χαλδαῖοι, que el borrador mantiene adecuadamente. Las decisiones léxicas principales concuerdan con el expediente inglés y con el griego.
  issues:
  - severity: medium
    issue: La nota al pie [a] no conserva la alternativa léxica documentada.
    rationale: 'La nota inglesa ofrece una alternativa real: «all the territory that they possess should be exempt from tribute». La nota española actual («toda la tierra que poseen quede exenta de tributo») apenas reformula el texto principal y omite la alternativa significativa «territorio». Debe ajustarse para preservar el valor auditado.'
  revised_spanish_text: y que toda la tierra que posean[a] les quede exenta de tributo; y que los caldeos dejen las aldeas de los judíos que ocupan;
  revised_footnotes:
  - marker: a
    text: O «todo el territorio que posean les quede exento de tributo».
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel, claro y natural. Solo se corrige la nota [a] para que preserve la alternativa léxica auditada («territorio») en vez de repetir casi literalmente el texto principal.
