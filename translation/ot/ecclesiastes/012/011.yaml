id: ECC.12.11
reference: Ecclesiastes 12:11
source:
  edition: WLC
  text: דִּבְרֵ֤י חֲכָמִים֙ כַּ/דָּ֣רְבֹנ֔וֹת וּֽ/כְ/מַשְׂמְר֥וֹת נְטוּעִ֖ים בַּעֲלֵ֣י אֲסֻפּ֑וֹת נִתְּנ֖וּ מֵ/רֹעֶ֥ה אֶחָֽד׃
translation:
  text: The words of the wise are like goads[a], and like firmly planted nails are the collected sayings[b]; they are given by one shepherd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the masters of assemblies'; the Hebrew phrase is difficult and may refer either to compilers of collected sayings or to leaders in gathered assemblies.
    reason: alternative_reading
  - marker: b
    text: '''From one shepherd'' may refer to God as the ultimate source of wisdom, but the text does not explicitly identify the shepherd.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: The words of
  alternatives:
  - The sayings of
  lexicon: HALOT
  rationale: Construct plural of דָּבָר here naturally introduces the utterances/teachings of the wise. 'Words' is the more formal and broad rendering; 'sayings' is possible but slightly more interpretive.
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise men
  lexicon: HALOT
  rationale: The plural adjective/substantive refers to wise persons generally. 'The wise' preserves the Hebrew sense without unnecessarily specifying 'men,' while still reflecting the source's class designation.
- source_word: כַּדָּרְבֹנוֹת
  chosen: like goads
  alternatives:
  - like ox-goads
  lexicon: HALOT
  rationale: דָּרְבֹן denotes a goad, a pointed implement used to prod animals. 'Goads' is concise and idiomatic; 'ox-goads' is more specific than the Hebrew requires.
- source_word: וּכְמַשְׂמְרוֹת
  chosen: and like ... nails
  alternatives:
  - and like pegs
  lexicon: HALOT
  rationale: מַשְׂמֵר/מַשְׂמְרוֹת refers to nails or pegs. 'Nails' fits the common image and traditional understanding; 'pegs' remains a viable lexical alternative.
- source_word: נְטוּעִים
  chosen: firmly planted
  alternatives:
  - driven in
  - fixed
  lexicon: HALOT
  rationale: The passive participle from נטע literally means 'planted,' but in this metaphor of nails it conveys being set fast or firmly fixed. 'Firmly planted' preserves the Hebrew imagery while making sense in English.
- source_word: בַּעֲלֵי אֲסֻפּוֹת
  chosen: the masters of collections
  alternatives:
  - the masters of assemblies
  - the collectors of sayings
  - those given to collections
  lexicon: HALOT
  rationale: This phrase is difficult. בַּעֲלֵי often means 'masters/possessors of,' and אֲסֻפּוֹת can denote collections or gatherings/assemblies. In context about wise words, 'collections' best fits the literary setting, likely referring to compilers or authoritative custodians of collected sayings. Because the phrase is debated, alternatives are preserved in a footnote.
- source_word: נִתְּנוּ
  chosen: are given
  alternatives:
  - were given
  lexicon: HALOT
  rationale: Nifal perfect plural of נתן can be rendered as a present perfective/general passive in proverbial discourse. 'Are given' reads naturally in English and suits the gnomic context; 'were given' is also possible.
- source_word: מֵרֹעֶה אֶחָד
  chosen: from one shepherd
  alternatives:
  - by one shepherd
  lexicon: HALOT
  rationale: 'The preposition מִן marks source: these words ultimately come ''from one shepherd.'' ''From'' better preserves source than the more agentive ''by.'' ''Shepherd'' should remain lowercase here because the Hebrew itself does not explicitly identify the referent, allowing the text''s ambiguity to stand.'
