translation:
  language: es
  text: Así, los mensajeros[a] pasaron de ciudad en ciudad en la tierra de Efraín y Manasés, hasta Zabulón; pero se burlaron de ellos y se mofaron de ellos.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los correos» o «los corredores». El término hebreo se refiere a portadores oficiales de un mensaje, probablemente viajando con rapidez.
    reason: lexical_alternative
  - marker: b
    text: 'La expresión hebrea combina dos verbos de desprecio: se estaban «burlando de» los mensajeros y «mofándose de» ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָצִים
  english_pob_choice: the couriers
  chosen_spanish: los correos
  alternatives_spanish:
  - los corredores
  - los mensajeros
  lexicon: HALOT
  rationale: El término hebreo designa a enviados que se desplazan con rapidez para llevar un mensaje oficial. «Correos» conserva esa función de mensajería rápida y resulta natural en español; «mensajeros» es posible, pero menos específico sobre la rapidez, y «corredores» suena más literal pero menos idiomático.
- source_word: עֹבְרִים
  english_pob_choice: passed
  chosen_spanish: iban pasando
  alternatives_spanish:
  - pasaban
  - iban de camino
  lexicon: HALOT
  rationale: El participio transmite movimiento continuo de ciudad en ciudad. «Iban pasando» refleja mejor ese tránsito progresivo que un pasado simple, sin añadir interpretación ajena al hebreo.
- source_word: מֵעִיר לָעִיר
  english_pob_choice: from city to city
  chosen_spanish: de ciudad en ciudad
  alternatives_spanish:
  - de una ciudad a otra
  lexicon: HALOT
  rationale: Es un modismo distributivo bien expresado en español como «de ciudad en ciudad», que conserva la repetición del recorrido.
- source_word: בְּאֶרֶץ אֶפְרַיִם וּמְנַשֶּׁה וְעַד זְבֻלוּן
  english_pob_choice: in the land of Ephraim and Manasseh, as far as Zebulun
  chosen_spanish: en la tierra de Efraín y de Manasés, hasta Zabulón
  alternatives_spanish:
  - por la tierra de Efraín y de Manasés, hasta Zabulón
  - en la tierra de Efraín y Manasés, hasta Zabulón
  lexicon: HALOT
  rationale: «Tierra» conserva el valor geográfico del hebreo. «Hasta Zabulón» reproduce la extensión marcada por וְעַד. Se mantiene la mención de las tribus como en el original, con la forma española habitual de sus nombres.
- source_word: מַשְׂחִיקִים עֲלֵיהֶם
  english_pob_choice: laughing at them
  chosen_spanish: se burlaban de ellos
  alternatives_spanish:
  - se reían de ellos
  - hacían burla de ellos
  lexicon: HALOT
  rationale: El verbo intensivo expresa desprecio, no solo risa. «Se burlaban de ellos» comunica de forma natural la burla despectiva; «se reían de ellos» es más literal pero puede sonar débil en español.
- source_word: וּמַלְעִגִים בָּם
  english_pob_choice: mocking them
  chosen_spanish: los escarnecían
  alternatives_spanish:
  - se mofaban de ellos
  - los ridiculizaban
  lexicon: HALOT
  rationale: לעג añade una segunda expresión de desprecio. «Los escarnecían» preserva la fuerza semántica y el tono formal; también mantiene la intensificación frente a la primera cláusula de burla. «Se mofaban de ellos» sería más corriente, pero menos solemne.
- source_word: וַיִּהְיוּ ... וַיִּהְיוּ
  english_pob_choice: So ... but they were
  chosen_spanish: Así ... pero
  alternatives_spanish:
  - Y ... y
  - Entonces ... pero
  lexicon: HALOT
  rationale: La repetición narrativa se expresa de manera fluida en español con «Así» al inicio y «pero» para marcar el contraste entre la acción de los correos y la respuesta del pueblo. No se fuerza una repetición artificial de «fueron».
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: ''went'' fue ajustado a ''passed'' por el sentido del participio, y ''were laughing at them'' se simplificó a un pretérito narrativo. En español, el equivalente se resolvió con ''iban pasando'' para reflejar el movimiento continuo y con una construcción en pasado simple/descriptiva para la burla, evitando una perífrasis que sonaría menos natural.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Yahvé» no aplica aquí; el verso no contiene el nombre divino.
  - Se conservaron los nombres tribales en su forma usual y reconocible para lectura eclesial.
  - «Se burlaban» y «los escarnecían» preservan la doble capa de desprecio del hebreo sin colapsarla en una sola idea.
