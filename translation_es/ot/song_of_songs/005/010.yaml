review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: דּוֹדִי = «Mi amado», צַח = «radiante», וְאָדוֹם = un matiz rojizo/rubicundo, דָּגוּל = destacado/distinguido, מֵרְבָבָה = «entre diez mil». La única fricción relevante está en la nota léxica de דָּגוּל: «enarbolado» suena poco natural en español y no comunica bien la alternativa más literal de ''bannered''.'
  spanish_quality_summary: El texto principal es claro, digno y natural. «Mi amado es radiante y rojizo, distinguido entre diez mil» funciona bien en español eclesial general. Sin embargo, en la nota, «conspicuo» resulta algo técnico/latinizante y «enarbolado» puede confundir porque en español suele implicar blandir una bandera, no estar marcado como bajo estandarte. Conviene una alternativa más inteligible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. Las decisiones «mi amado», «radiante», «rojizo» y «distinguido» son coherentes con el expediente inglés y con un español natural.
  issues:
  - severity: medium
    issue: La nota con «enarbolado entre diez mil» no transmite con claridad la alternativa literal de דָּגוּל.
    rationale: Aunque intenta seguir 'bannered', «enarbolado» en español sugiere normalmente que alguien levanta una bandera. Para esta imagen pasiva de ser marcado/destacado como bajo estandarte, es más claro «abanderado» o una formulación explicativa equivalente.
  - severity: low
    issue: La alternativa «conspicuo» en la nota suena poco idiomática en español general.
    rationale: Es comprensible, pero más técnica que eclesial o literaria. «Visible», «notable» o mantener «distinguido» en texto principal evita rigidez; en la nota puede conservarse una alternativa más natural como «notable».
  revised_spanish_text: Mi amado es radiante y rojizo[a], distinguido entre diez mil.
  revised_footnotes:
  - marker: a
    text: O «notable entre diez mil»; más literalmente, «abanderado entre diez mil».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural. Solo se ajusta la nota para expresar de manera más clara y usable en español las alternativas léxicas de דָּגוּל, evitando formulaciones confusas o demasiado técnicas.
