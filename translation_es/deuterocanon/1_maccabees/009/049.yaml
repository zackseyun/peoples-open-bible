translation:
  language: es
  text: Y cayeron con Bacquides aquel día unos mil hombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «unos mil hombres cayeron del lado de Bacquides aquel día». La preposición griega παρά puede señalar asociación o bando, no necesariamente acción directa de Bacquides.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διέπεσαν
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - perecieron
  - fueron muertos
  - cayeron en combate
  lexicon: LSJ
  rationale: El verbo griego expresa la idea básica de caer, y en contexto militar implica muerte o derrota en combate. «Cayeron» conserva la imagen verbal sin forzar una interpretación más específica de la agencia.
- source_word: παρὰ Βακχίδα
  english_pob_choice: with Bacchides
  chosen_spanish: junto con Bacquides
  alternatives_spanish:
  - con Bacquides
  - al lado de Bacquides
  - del lado de Bacquides
  lexicon: LSJ
  rationale: παρά con acusativo puede expresar asociación o relación de lado/compañía. En español, «junto con» comunica bien esa asociación sin afirmar de manera excesiva una causalidad directa.
- source_word: τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: LSJ
  rationale: La expresión temporal se vierte de forma natural como «aquel día», que mantiene el valor deíctico y suena idiomático en español.
- source_word: εἰς χιλίους ἄνδρας
  english_pob_choice: about a thousand men
  chosen_spanish: unos mil hombres
  alternatives_spanish:
  - cerca de mil hombres
  - aproximadamente mil hombres
  - mil hombres
  lexicon: LSJ
  rationale: εἰς con numeral puede indicar cantidad aproximada o resultado numérico. «Unos mil hombres» reproduce esa aproximación de manera natural y evita una literalidad torpe.
translation_notes:
  revision_awareness: 'La redacción sigue el testimonio griego de Swete 1909 y toma en cuenta el audítor inglés: el pasaje no obliga a entender una localización física, sino asociación con Bacquides. Por eso se prefirió «junto con» / «del lado de» en el aparato, sin convertirlo en una afirmación de causalidad explícita.'
  spanish_consistency_notes:
  - Se mantuvo «Bacquides» como forma española estable del nombre propio.
  - Se evitó «SEÑOR» u otra terminología no pertinente; el verso no contiene vocabulario teológico directo.
  - «Cayeron» conserva el registro narrativo de batalla sin sobrerinterpretar el tipo de muerte.
