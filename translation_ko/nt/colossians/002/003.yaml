  rationale: 앞 절의 메시아를 인격적 선행사로 받는다. 「그분 안에는」으로 주제화하여 한국어 자연성을 살린다.
- source_word: πάντες οἱ θησαυροὶ
  english_pob_choice: all the treasures
  chosen_korean: 모든 보화
