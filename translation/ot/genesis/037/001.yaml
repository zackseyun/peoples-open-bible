id: GEN.37.1
reference: Genesis 37:1
source:
  edition: WLC
  text: וַ/יֵּ֣שֶׁב יַעֲקֹ֔ב בְּ/אֶ֖רֶץ מְגוּרֵ֣י אָבִ֑י/ו בְּ/אֶ֖רֶץ כְּנָֽעַן׃
translation:
  text: Now Jacob lived in the land of his father's sojournings[a], in the land of Canaan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'And Jacob settled in the land of his father's sojournings, in the land of Canaan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: Now Jacob lived
  alternatives:
  - And Jacob settled
  - Then Jacob dwelt
  lexicon: HALOT
  rationale: From ישׁב, the wayyiqtol advances the narrative. 'Lived' is natural modern English and fits the broad sense of residing/dwelling here without overstating permanence. 'Now' reflects the discourse transition often carried by the waw-consecutive in narrative.
- source_word: בְּאֶרֶץ
  chosen: in the land
  alternatives:
  - in the country
  - in the region
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' in territorial/geographical contexts. 'Land' preserves the biblical-geographical sense better than the more modern 'country' or the vaguer 'region'.
- source_word: מְגוּרֵי
  chosen: where his father had sojourned
  alternatives:
  - of his father's sojournings
  - of his father's temporary dwellings
  lexicon: HALOT
  rationale: From מגור, denoting sojourning/residence as an alien. The construct phrase is somewhat formal if rendered literally ('land of his father's sojournings'), so the chosen wording preserves the sense in readable English while retaining the important nuance that Isaac's residence was that of a sojourner, not simply a native inhabitant.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: 'Straightforward pronominal construct: ''his father,'' referring to Isaac.'
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: The repetition of 'in the land' is retained because the Hebrew repeats בְּאֶרֶץ, and the appositional clarification 'of Canaan' identifies the territory explicitly. Keeping the repetition preserves the cadence and emphasis of the source.
