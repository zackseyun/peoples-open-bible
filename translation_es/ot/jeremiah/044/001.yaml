    issue: «judíos» no refleja la decisión auditada de «Judeans» para הַיְּהוּדִים
    rationale: El inglés POB documenta explícitamente la preferencia por el sentido etnogeográfico vinculado a Judá en Jeremías. «Judíos» en español es más común, pero también más amplio y potencialmente anacrónico. «Judeanos» preserva mejor la distinción relevante en este contexto histórico.
  - severity: low
