id: 1TI.5.19
reference: 1 Timothy 5:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: κατὰ πρεσβυτέρου κατηγορίαν μὴ παραδέχου, ἐκτὸς εἰ μὴ ἐπὶ δύο ἢ τριῶν μαρτύρων·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/019.yaml
  text: Do not accept an accusation against an elder[b][a], except on the basis of two or three witnesses.
  footnotes:
  - marker: a
    text: Or 'an older man,' if πρεσβυτέρου is taken in the age-based sense rather than as the church office 'elder.'
    reason: alternative_reading
  - marker: b
    text: This wording reflects the OT legal principle that a matter is established by 'two or three witnesses' (cf. Deut 19:15).
    reason: cross_reference
translation:
  language: ko
  text: 장로[a]에 대한 고발은 두 사람이나 세 사람의 증인이 없이는 받아들이지 마십시오[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「연장자」. πρεσβύτερος를 교회 직제 「장로」가 아니라 나이 어감으로 보면 가능하나, 17절과 일관되게 본 절은 「장로」.
    reason: alternative_reading
  - marker: b
    text: 본 어구는 「두 사람이나 세 사람의 증인」으로 일이 확정된다는 구약 율법 원리(신 19:15 참조)를 반영한다.
    reason: cross_reference
lexical_decisions:
