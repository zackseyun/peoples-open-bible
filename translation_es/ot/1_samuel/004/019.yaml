base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/004/019.yaml
  text: Now his daughter-in-law[a], the wife of Phinehas, was pregnant, about to give birth. When she heard the report that the ark of God had been taken, and that her father-in-law and her husband were dead, she bowed down and gave birth[c][b], because her labor pains came upon her.
  footnotes:
  - marker: a
    text: Or, 'about the capture of the ark of God.' The Hebrew construction can be rendered either as the content of the report ('that the ark... had been taken') or more nominally ('about the capture of the ark').
    reason: lexical_alternative
  - marker: b
    text: Or, 'her father-in-law and her husband had died.' The Hebrew form may be represented in English either as a stative result ('were dead') or as a prior event ('had died').
    reason: lexical_alternative
  - marker: c
    text: Literally, 'her pains turned upon her,' an idiom meaning that her labor pains came on suddenly.
    reason: lexical_alternative
