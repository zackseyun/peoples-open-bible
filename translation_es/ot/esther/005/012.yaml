    text: «Banquete» traduce מִשְׁתֶּה. También podría verterse «festín», pero «banquete» encaja mejor con el contexto cortesano del libro.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «soy llamado por ella». En este contexto, la forma pasiva expresa que ha sido invitado por Ester.'
    reason: lexical_alternative
  revision_rationale: Se ajusta «llevó» a «trajo» para una expresión española más natural sin perder el verbo concreto del hebreo; se cambia «seré invitado» a «estoy invitado» para reflejar mejor el participio קָרוּא; y se reubica el marcador de nota [b] en la frase pertinente.
