  glossary_alignment: 'Buena alineación general con la glosa del proyecto: יְהוָה → «Yahvé»; שְׁאוֹל → «Seol»; רשעים → «los impíos». No hay conflicto terminológico mayor. La única corrección necesaria es de anclaje de nota y una ligera mejora en la representación de קְרָאתִיךָ.'
