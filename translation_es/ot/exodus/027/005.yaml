translation:
  language: es
  text: Y la pondrás debajo del borde[a] del altar, por debajo, y la red se extenderá hasta la mitad del altar.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reborde», para «borde» (heb. karkov), refiriéndose a un borde o marco saliente del altar.
    reason: lexical_alternative
  - marker: b
    text: Lit., «y la red será hasta la mitad del altar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  english_pob_choice: And you shall put
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y colocarás
  - Y pondrás allí
  lexicon: HALOT
  rationale: נתן en esta construcción expresa poner/colocar un objeto en un lugar. «Pondrás» comunica con naturalidad la instrucción futura en español sin perder el valor directivo.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la misma
  - eso
  lexicon: HALOT
  rationale: El pronombre femenino singular se refiere a la red o rejilla mencionada en el contexto inmediato. En español, «la» conserva la referencia femenina del antecedente implícito.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - por debajo de
  lexicon: HALOT
  rationale: La preposición indica ubicación inferior. «Debajo de» es claro y natural en español para esta relación espacial.
- source_word: כַּרְכֹּב
  english_pob_choice: ledge
  chosen_spanish: borde
  alternatives_spanish:
  - reborde
  - alero
  - marco saliente
  lexicon: HALOT
  rationale: El término señala una saliente o borde proyectado del altar. «Borde» es más transparente para el lector español y conserva la idea arquitectónica; «reborde» sería posible, pero menos sobrio.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: del altar
  alternatives_spanish:
  - del altar sacrificial
  lexicon: HALOT
  rationale: מזבח se traduce de forma estándar como «altar» en este contexto del tabernáculo.
- source_word: מִלְּמָטָּה
  english_pob_choice: from below
  chosen_spanish: por la parte de abajo
  alternatives_spanish:
  - desde abajo
  - desde la parte inferior
  lexicon: HALOT
  rationale: La forma compuesta indica ubicación desde la parte inferior o inferioridad espacial. «Por la parte de abajo» refleja bien el matiz sin sonar rígido.
- source_word: וְהָיְתָה
  english_pob_choice: and the net shall extend
  chosen_spanish: y la red llegará
  alternatives_spanish:
  - y la red se extenderá
  - y la red estará
  lexicon: HALOT
  rationale: Aquí היה con עד expresa extensión o alcance. «Llegará» mantiene la idea de alcance sin añadir una finalidad que el hebreo no explicita.
- source_word: הָרֶשֶׁת
  english_pob_choice: the net
  chosen_spanish: la red
  alternatives_spanish:
  - la rejilla
  - la malla
  lexicon: HALOT
  rationale: רשת designa una estructura de malla o red. «Red» es breve y corresponde al sentido general del término en este pasaje.
- source_word: עַד חֲצִי הַמִּזְבֵּחַ
  english_pob_choice: to halfway up the altar
  chosen_spanish: hasta la mitad del altar
  alternatives_spanish:
  - hasta la mitad del altar por altura
  - hasta el medio del altar
  lexicon: HALOT
  rationale: La frase indica alcance hasta el punto medio del altar. En español, «hasta la mitad del altar» expresa el límite espacial de manera directa y fiel.
theological_decisions:
- issue: Término técnico del altar y su borde saliente
  english_pob_reading: ledge / rim for karkov, referring to a projecting border or frame on the altar
  chosen_spanish_reading: borde del altar
  alternative_spanish_readings:
  - reborde del altar
  - marco saliente del altar
  rationale: No hay una carga doctrinal especial, pero sí una precisión arquitectónica. «Borde» evita oscurecer el sentido y no introduce términos eclesiásticos ajenos al hebreo.
  doctrine_reference: Éxodo 27:1-8; término arquitectónico del tabernáculo
- issue: Extensión de la red hasta la mitad del altar
  english_pob_reading: and the net shall extend to halfway up the altar
  chosen_spanish_reading: y la red llegará hasta la mitad del altar
  alternative_spanish_readings:
  - y la red se extenderá hasta la mitad del altar
  - y la red alcanzará la mitad del altar
  rationale: El hebreo usa una construcción de alcance/extent. «Llegará» comunica ese alcance sin convertir el versículo en una explicación más interpretativa de la estructura.
  doctrine_reference: Éxodo 27:4-5, descripción del mobiliario del tabernáculo
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que prefirió una formulación directa para la extensión de la red («shall extend») y mantuvo «ledge» con nota alternativa. En español se optó por no introducir notas si no era necesario, para evitar marcadores sin anclaje y preservar una línea de lectura fluida.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, con vocabulario arquitectónico claro.
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - «Red» se usa para רשת conforme al contexto inmediato del pasaje.
  - La estructura verbal futura («pondrás», «llegará») conserva el valor instructivo del hebreo.
