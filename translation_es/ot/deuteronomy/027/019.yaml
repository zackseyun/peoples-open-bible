review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: fórmula de maldición, corrupción del mishpat de la tríada vulnerable, y respuesta litúrgica del pueblo. Sin embargo, מִשְׁפָּט aquí apunta más claramente al derecho/justicia que les es debida que a un derecho genérico; y el inglés auditado preserva la alternativa sobre יָתוֹם (''fatherless/orphan''), la cual conviene reflejar también en español.'
  spanish_quality_summary: El español es claro, digno y natural. No obstante, 'el derecho del forastero' suena algo más abstracto y menos explícito que 'la justicia debida al forastero' o 'el derecho que le corresponde'. Además, dado que el texto ya lleva nota en 'forastero', conviene alinear mejor la nota de 'huérfano' con la documentación del POB. La puntuación y el registro son adecuados.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones principales están bastante alineadas con el POB: ''Maldito sea'', ''pervierta'', ''forastero'', ''viuda'', ''Amén''. La principal mejora es ajustar מִשְׁפָּט a ''la justicia debida'' para reflejar mejor la decisión lexical inglesa documentada, y añadir la alternativa de יָתוֹם mediante nota.'
  issues:
  - severity: medium
    issue: מִשְׁפָּט se traduce como 'el derecho' sin hacer explícita la idea de justicia debida.
    rationale: El hebreo en este contexto legal no señala solo un 'derecho' abstracto, sino la justicia o reclamo legal que corresponde a estas personas vulnerables. El inglés POB escogió explícitamente 'the justice due to'. En español, 'la justicia debida al...' preserva mejor esa fuerza.
  - severity: low
    issue: Falta una nota para יָתוֹם que preserve la alternativa 'sin padre' / 'huérfano'.
    rationale: El audit trail inglés documenta la alternativa lexical para 'fatherless'. Aunque 'huérfano' es natural en español, conviene conservar la alternativa en nota para reflejar la evidencia fuente y la decisión del POB.
  - severity: low
    issue: La nota sobre 'forastero' es correcta, pero puede afinarse para sonar más natural en español e identificar mejor la categoría.
    rationale: '''No nativo'' funciona, pero ''residente no israelita'' o ''persona no nativa que vive entre Israel'' resulta más claro y eclesialmente legible sin modernizar en exceso.'
  revised_spanish_text: 'Maldito sea el que pervierta[a] la justicia debida[b] al forastero[c], al huérfano[d] y a la viuda. Y todo el pueblo dirá: «Amén».'
