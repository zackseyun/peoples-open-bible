    issue: La nota [b] está colocada en «Dios», pero explica «el fruto del vientre».
    rationale: Las instrucciones requieren que el marcador aparezca en la palabra o frase pertinente. Tal como está, induce a pensar que la nota comenta «Dios» en vez del idiomatismo פְּרִי בָטֶן.
