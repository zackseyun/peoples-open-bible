base_translation:
  language: en
  yaml_path: translation/ot/exodus/036/006.yaml
  text: So Moses commanded[a], and they proclaimed throughout the camp, saying[b], “Let neither man nor woman do any more work for the contribution of the sanctuary.” So the people were restrained from bringing more.
  footnotes:
