revisions:
- from: Tal como Yahvé ha estado con mi señor el rey[a], así esté con Salomón y haga su trono más grande que el trono de mi señor el rey David.
  to: Tal como Yahvé ha estado con mi señor el rey[a], así esté con Salomón y engrandezca su trono por encima del trono de mi señor el rey David.
  rationale: Se conserva toda la estructura y terminología del borrador, pero se sustituye 'haga su trono más grande que' por 'engrandezca su trono por encima de' para reflejar mejor el valor causativo-comparativo de ויגדל ... מכסא en español natural, evitando una lectura demasiado física del tamaño del trono.
  reviewer_model: gpt-5.4
