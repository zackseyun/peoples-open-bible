translation:
  language: es
  text: 'Si dices en tu corazón: «Estas naciones son más numerosas que yo; ¿cómo podré desposeerlas[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «expulsarlas». El verbo hebreo también tiene el sentido de hacer que pierdan la posesión de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Porque
  lexicon: HALOT
  rationale: Aquí כִּי introduce una condición, no una causa. «Si» reproduce mejor la apertura hipotética del contexto y encaja con la continuación exhortativa del pasaje.
- source_word: תֹאמַר
  english_pob_choice: you say
  chosen_spanish: dices
  alternatives_spanish:
  - dirás
  - piensas
  lexicon: HALOT
  rationale: El verbo es «decir» en segunda persona masculina singular. En español, «dices» conserva la forma directa e idiomática del discurso interior.
- source_word: בִּלְבָבְךָ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - dentro de tu corazón
  - para ti mismo
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para pensamiento interior. «En tu corazón» mantiene la imagen bíblica de manera clara y natural en español.
- source_word: רַבִּים
  english_pob_choice: more numerous
  chosen_spanish: más numerosas
  alternatives_spanish:
  - más numerosos
  - demasiadas
  lexicon: HALOT
  rationale: El comparativo queda explícito con «más». Se eligió el femenino plural porque concuerda con «naciones» en español.
- source_word: הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: these nations
  chosen_spanish: estas naciones
  alternatives_spanish:
  - estos pueblos
  - estas gentes
  lexicon: HALOT
  rationale: גּוֹיִם en Deuteronomio suele referirse a entidades nacionales/políticas. «Naciones» preserva ese valor mejor que opciones más generales.
- source_word: מִמֶּנִּי
  english_pob_choice: than I
  chosen_spanish: que yo
  alternatives_spanish:
  - que yo soy
  - que de mí
  lexicon: HALOT
  rationale: El hebreo marca comparación; en español, con «más numerosas», la estructura natural es «más numerosas que yo». Esto conserva la fuerza comparativa sin añadir material innecesario.
- source_word: אֵיכָה
  english_pob_choice: how can
  chosen_spanish: ¿cómo podré
  alternatives_spanish:
  - ¿cómo puedo
  - ¿de qué manera podré
  lexicon: HALOT
  rationale: La partícula expresa pregunta de posibilidad. «¿Cómo podré» suena natural y conserva el sentido de capacidad futura o potencial.
- source_word: אוּכַל
  english_pob_choice: can I
  chosen_spanish: podré
  alternatives_spanish:
  - puedo
  - seré capaz de
  lexicon: HALOT
  rationale: El verbo יכל expresa capacidad. En esta pregunta retórica, «podré» comunica adecuadamente la posibilidad y mantiene el tono formal del pasaje.
- source_word: לְהוֹרִישָׁם
  english_pob_choice: dispossess them
  chosen_spanish: desposeerlas
  alternatives_spanish:
  - expulsarlas
  - quitarlas de la posesión
  lexicon: HALOT
  rationale: El Hiphil de ירש en contexto de conquista implica hacer perder la posesión de la tierra. «Desposeer» conserva esa fuerza técnica mejor que un simple «expulsar».
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y la línea auditada en inglés, pero ajusta la comparación al español natural («más numerosas que yo») y conserva el matiz técnico de לְהוֹרִישָׁם con «desposeerlas».
  spanish_consistency_notes:
  - Se mantuvo «corazón» para בִּלְבָבְךָ siguiendo el modismo bíblico, en vez de sustituirlo por una paráfrasis psicológica.
  - Se prefirió «naciones» por la carga política/covenantal de גּוֹיִם en Deuteronomio.
  - Se usó «desposeer» como equivalente verbal fuerte del valor de conquista/posesión del hebreo.
  - El pronombre objeto se ajustó a «las» por concordancia con «naciones» en español, aunque el referente semántico incluye a los pueblos/naciones mencionados.
