revisions:
- from: ¡Mira[a], el día! ¡Mira, viene! Ha salido el desastre; ha retoñado la vara; ha florecido la soberbia.
  to: ¡Mira[a], el día! ¡Mira, viene! Ha salido la condena; ha retoñado la vara; ha florecido la soberbia.
  rationale: Se propone una reparación menor para alinear mejor הַצְּפִרָה con la decisión lexical y teológica auditada en inglés («doom»). «La condena» comunica mejor el carácter de juicio decretado e inminente que «el desastre», sin perder naturalidad en español bíblico contemporáneo. Se conserva la nota alternativa sobre «la mañana».
