revisions:
- from: Así fueron dispersadas[a] por falta de pastor, y llegaron a ser alimento para todo[b] animal del campo, y fueron dispersadas.
  to: Así fueron dispersadas por falta de pastor, y se volvieron alimento para toda bestia[a] del campo, y fueron dispersadas.
  rationale: Se reemplaza 'animal del campo' por 'bestia del campo' para preservar mejor la fuerza contextual de חַיַּת הַשָּׂדֶה y alinearse con la decisión documentada del inglés POB. Se elimina la nota sobre 'esparcidas' por innecesaria, y se conserva solo una nota útil como alternativa léxica. También se ajusta 'llegaron a ser' a 'se volvieron' para una lectura más natural en español sin cambiar el sentido.
