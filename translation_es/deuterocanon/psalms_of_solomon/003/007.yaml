translation:
  language: es
  text: La verdad[a] del justo es de Dios, su salvador; el pecado sobre pecado no se aloja en la casa de un hombre justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fidelidad» o «la integridad»; ἀλήθεια aquí puede entenderse como una cualidad ética, no solo como veracidad literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - veracidad
  - fidelidad
  - integridad
  lexicon: LSJ
  rationale: ἀλήθεια aquí puede abarcar tanto verdad como una cualidad ética de autenticidad o fidelidad. En español, «verdad» conserva el vínculo léxico con el griego y permite la nota alternativa para el matiz ético sin forzar una paráfrasis.
- source_word: παρὰ θεοῦ
  english_pob_choice: is from God
  chosen_spanish: es de Dios
  alternatives_spanish:
  - viene de Dios
  - procede de Dios
  lexicon: LSJ
  rationale: Con genitivo, παρά expresa origen o procedencia. «Es de Dios» es breve, natural y mantiene la afirmación de procedencia sin añadir matices no explicitados por el griego.
- source_word: σωτῆρος
  english_pob_choice: savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  lexicon: LSJ
  rationale: «Salvador» es el equivalente más directo y reconocido en registro bíblico. «Libertador» sería posible, pero estrecha el alcance del término y no es la opción principal del texto fuente.
- source_word: αὐλίζεται
  english_pob_choice: does not lodge
  chosen_spanish: no se aloja
  alternatives_spanish:
  - no mora
  - no habita
  - no acampa
  - no pasa la noche
  lexicon: LSJ
  rationale: El verbo sugiere hospedarse o establecerse por la noche. «No se aloja» preserva la imagen concreta de una presencia que no encuentra lugar en la casa del justo.
- source_word: ἐν οἴκῳ δικαίου
  english_pob_choice: in the house of a righteous man
  chosen_spanish: en la casa de un hombre justo
  alternatives_spanish:
  - en la casa del justo
  - en la casa de un justo
  lexicon: LSJ
  rationale: El singular δικαίου se conserva como singular, y la forma masculina del griego se refleja con «un hombre justo». «Casa del justo» sería más idiomático, pero pierde algo de la precisión gramatical observada en la fuente.
- source_word: ἁμαρτία ἐφʼ ἁμαρτίαν
  english_pob_choice: sin upon sin
  chosen_spanish: pecado sobre pecado
  alternatives_spanish:
  - pecado tras pecado
  - pecado encima de pecado
  lexicon: LSJ
  rationale: La repetición intensiva se conserva con una construcción española igualmente acumulativa. «Pecado sobre pecado» comunica la idea de apilamiento o incremento continuo sin suavizar el efecto retórico.
theological_decisions:
- issue: Sentido de ἀλήθεια en contexto hebraizante
  english_pob_reading: The truth of the righteous is from God their savior; ...
  chosen_spanish_reading: La verdad de los justos es de Dios, su Salvador; ...
  alternative_spanish_readings:
  - La fidelidad de los justos es de Dios, su Salvador; ...
  - La integridad de los justos es de Dios, su Salvador; ...
  rationale: La revisión inglesa volvió de «faithfulness» a «truth» por precisión léxica, pero el trasfondo hebraizante permite que el término abarque una cualidad ética. En español se mantiene «verdad» en el cuerpo del texto y se deja abierta la lectura ética en la nota para no borrar la tensión lexical.
  doctrine_reference: Psalms of Solomon 3:7; auditing note on ἀλήθεια / אֱמֶת
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que volvió ἀλήθεια a «truth» por precisión léxica, pero también toma en cuenta la revisión anterior y la adjudicación que señalaban el matiz hebraizante de fidelidad/integridad. Por eso el texto principal conserva «verdad» y la nota recoge las alternativas éticas sin perder el enlace con la fuente griega.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para יהוה porque este versículo no contiene el Tetragrámaton; el texto griego usa θεοῦ/σωτῆρος.
  - Se mantuvo «Salvador» para σωτῆρος por coherencia bíblica y porque el término no requiere una glosa adicional en español.
  - «Un hombre justo» refleja el singular griego δικαίου; aunque «el justo» sería más idiomático, se prefirió transparencia morfológica.
  - «No se aloja» conserva el valor imagístico de αὐλίζεται sin introducir una idea más abstracta que la del alojamiento.
  - La frase «pecado sobre pecado» mantiene el paralelismo enfático del griego sin normalizarlo a una expresión explicativa.
