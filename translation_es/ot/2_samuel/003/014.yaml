translation:
  language: es
  text: 'Entonces David envió mensajeros a Is-bóset hijo de Saúl, diciendo: «Dame a mi esposa Mical, a quien desposé para mí[a] por cien prepucios de filisteos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «a quien gané como mi esposa por cien prepucios de filisteos». El hebreo dice más literalmente: «a quien desposé para mí».'
    reason: lexical_alternative
  - marker: b
    text: Véase 1 Samuel 18:25–27 para el relato de cómo David obtuvo a Mical presentando los prepucios de filisteos como el precio nupcial que Saúl exigió.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then David sent
  chosen_spanish: Entonces David envió
  alternatives_spanish:
  - Y David envió
  - Así que David envió
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo; «Entonces» conserva la secuencia natural en español sin añadir causalidad fuerte.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: En contexto humano, el término designa mensajeros; «mensajeros» es la equivalencia directa y más natural.
- source_word: אִישׁ בֹּשֶׁת בֶּן שָׁאוּל
  english_pob_choice: Ish-bosheth son of Saul
  chosen_spanish: Is-bóset hijo de Saúl
  alternatives_spanish:
  - Ish-bóset, hijo de Saúl
  - Ishboset hijo de Saúl
  lexicon: HALOT
  rationale: Se conserva la transliteración habitual del nombre y la apposición filial del hebreo con «hijo de Saúl».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'con este mensaje:'
  - 'y le dijo:'
  lexicon: HALOT
  rationale: «Diciendo» reproduce de forma breve la introducción al discurso directo.
- source_word: תְּנָה
  english_pob_choice: Give me
  chosen_spanish: Dame
  alternatives_spanish:
  - Entrégame
  - Dámela
  lexicon: HALOT
  rationale: El imperativo de נתן en este reclamo se expresa con naturalidad como «Dame»; el objeto se explicita por el contexto inmediato.
- source_word: אֶת אִשְׁתִּי אֶת מִיכַל
  english_pob_choice: my wife Michal
  chosen_spanish: a mi esposa Mical
  alternatives_spanish:
  - a mi mujer Mical
  - a Mical, mi esposa
  lexicon: HALOT
  rationale: El hebreo identifica a Mical como la esposa de David. En español, «esposa» comunica de forma clara y digna la relación marital; el orden evita una calca innecesaria.
- source_word: אֲשֶׁר אֵרַשְׂתִּי לִי
  english_pob_choice: whom I betrothed to myself
  chosen_spanish: a quien desposé para mí
  alternatives_spanish:
  - a quien prometí para mí
  - a quien desposé para mí mismo
  lexicon: HALOT
  rationale: Se preserva la tensión legal del hebreo con un verbo que refleje el acto de desposar/betrotar, sin resolverlo simplemente como matrimonio consumado.
- source_word: בְּמֵאָה
  english_pob_choice: for a hundred
  chosen_spanish: por cien
  alternatives_spanish:
  - a cambio de cien
  - por una cantidad de cien
  lexicon: HALOT
  rationale: La preposición expresa base/precio; «por cien» mantiene la concisión y el valor de precio de rescate/bride-price.
- source_word: עָרְלוֹת פְּלִשְׁתִּים
  english_pob_choice: Philistine foreskins
  chosen_spanish: prepucios de filisteos
  alternatives_spanish:
  - foreskin[s] de filisteos
  - prepucios filisteos
  lexicon: HALOT
  rationale: Se conserva el referente corporal explícito del hebreo. «Prepucios» es el equivalente directo y evita suavizar el lenguaje del texto.
theological_decisions:
- issue: Tensión entre «esposa» y el lenguaje de desposorio
  english_pob_reading: Render אֵרַשְׂתִּי with 'betrothed' while still translating אִשְׁתִּי as 'my wife.'
  chosen_spanish_reading: Traducir אִשְׁתִּי como «mi esposa» y אֵרַשְׂתִּי como «desposé» para mantener la tensión entre vínculo matrimonial y derecho previo reclamado.
  alternative_spanish_readings:
  - «mi esposa ... a quien prometí para mí»
  - «mi esposa ... a quien desposé para mí»
  rationale: 'El hebreo conserva una fricción legal-relacional: David llama a Mical su esposa, pero fundamenta su reclamo en un acto previo de desposorio. La traducción debe dejar visible esa tensión, no armonizarla.'
  doctrine_reference: Preservar la tensión textual en lugar de resolverla.
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso del POB en inglés y no requiere revisión sustantiva respecto del pasaje base; se mantiene la misma tensión lexical entre desposorio y posesión marital.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la norma del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - Se conserva «Mical» con la transliteración habitual en español bíblico.
  - «Is-bóset» sigue una transliteración clara y auditable del nombre hebreo.
  - Se mantiene el registro sobrio y bíblico sin arcaísmos innecesarios.
