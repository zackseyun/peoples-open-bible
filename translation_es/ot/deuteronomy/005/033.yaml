translation:
  language: es
  text: Anden en todo el camino que Yahvé su Dios les ha mandado, para que vivan, y les vaya bien, y prolonguen sus días en la tierra que van a poseer[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la tierra que van a heredar”. El verbo hebreo puede abarcar tanto posesión como herencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/כָל הַ/דֶּרֶךְ
  english_pob_choice: in all the way
  chosen_spanish: en todo el camino
  alternatives_spanish:
  - en todo el sendero
  - en cada camino
  lexicon: HALOT
  rationale: Conservo la metáfora singular de un camino de obediencia, sin convertirla en “caminos”. “En todo el camino” comunica la totalidad de la conducta requerida con español natural.
- source_word: צִוָּה
  english_pob_choice: has commanded
  chosen_spanish: ha mandado
  alternatives_spanish:
  - ha ordenado
  - ha dado mandamiento
  lexicon: HALOT
  rationale: “Mandado” refleja bien el acto de ordenar un comportamiento pactal. Mantiene un registro claro y bíblico sin forzar una forma demasiado arcaica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: DOCTRINE.md contested terms
  rationale: 'Sigo el estándar del proyecto en español: “Yahvé” reproduce el nombre divino sin sustituirlo por un título velado.'
- source_word: אֱלֹהֵי/כֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios, de ustedes
  - el Dios de ustedes
  lexicon: HALOT
  rationale: En español, el posesivo de cortesía/plural “su” es la forma más natural y reverente para el plural de segunda persona implícito en el contexto.
- source_word: תֵּלֵכוּ
  english_pob_choice: You shall walk
  chosen_spanish: Anden
  alternatives_spanish:
  - Caminen
  - Vayan
  lexicon: HALOT
  rationale: “Andar” preserva la metáfora ética de conducta, más que un simple “ir”. El imperativo en español expresa bien el tono exhortativo-legal del hebreo.
- source_word: לְמַעַן תִּחְיוּן
  english_pob_choice: so that you may live
  chosen_spanish: para que vivan
  alternatives_spanish:
  - a fin de que vivan
  - para que puedan vivir
  lexicon: HALOT
  rationale: “Para que vivan” expresa claramente el propósito/resultante y mantiene el valor covenantal de vida prometida por obediencia.
- source_word: וְ/טוֹב לָכֶם
  english_pob_choice: that it may go well with you
  chosen_spanish: y les vaya bien
  alternatives_spanish:
  - y sea bueno para ustedes
  - y les sea para bien
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; “les vaya bien” comunica de manera natural la idea de bienestar/prosperidad sin perder el sentido original.
- source_word: וְ/הַאֲרַכְתֶּם יָמִים
  english_pob_choice: and that you may prolong your days
  chosen_spanish: y prolonguen sus días
  alternatives_spanish:
  - y alarguen sus días
  - y vivan largos días
  lexicon: HALOT
  rationale: Mantengo la imagen hebrea de alargar/prolongar días, que en español suena natural en un registro bíblico y evita una paráfrasis demasiado libre.
- source_word: בָּ/אָ֖רֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: “Tierra” es la forma más transparente para la promesa territorial de Deuteronomio. Evito añadir “prometida” porque el texto aquí no lo dice explícitamente.
- source_word: תִּֽירָשׁוּן
  english_pob_choice: you will possess
  chosen_spanish: van a poseer
  alternatives_spanish:
  - van a heredar
  - van a tomar posesión de
  lexicon: HALOT
  rationale: “Poseer” conserva la amplitud de ירשׁ entre heredar y ocupar/poseer. En español, “van a poseer” sigue de cerca el valor concreto del verbo sin restringirlo solo a herencia.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto pide preservar el nombre divino de forma auditable. “Yahvé” mantiene el referente del Tetragrámaton y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora de conducta en “andar”
  english_pob_reading: You shall walk
  chosen_spanish_reading: Anden
  alternative_spanish_readings:
  - Caminen
  - Sigan
  rationale: La metáfora de caminar/andar expresa obediencia como modo de vida, no solo desplazamiento. “Anden” conserva esa carga ética del hebreo.
  doctrine_reference: Hebrew covenant ethics in Deuteronomy; consistency with POB metaphor policy
- issue: יד/ירשׁ como posesión de la tierra
  english_pob_reading: the land that you will possess
  chosen_spanish_reading: la tierra que van a poseer
  alternative_spanish_readings:
  - la tierra que van a heredar
  - la tierra que tomarán en posesión
  rationale: En este contexto el verbo apunta a recibir y ocupar la tierra prometida. “Poseer” evita reducirlo a herencia familiar בלבד y conserva la dimensión territorial pactal.
  doctrine_reference: Lexical range of ירשׁ in Deuteronomy; covenant-land promise
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión más reciente del inglés POB al preferir una formulación que mantenga la imagen hebrea de “prolongar los días” mediante “prolonguen sus días”, sin traducir de manera mecánica desde el inglés. También conserva la alternativa textual/lexical de ירשׁ mediante nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa “Yahvé” de manera consistente con la norma del proyecto para יהוה.
  - 'Se mantiene el paralelismo verbal del verso con tres efectos: vivir, irles bien y prolongar sus días.'
  - “Poseer” se usa para ירשׁ como en el inglés auditado; la nota ofrece “heredar” como alternativa válida.
  - El registro es bíblico y claro, sin recurrir a “SEÑOR” como sustituto del nombre divino.
