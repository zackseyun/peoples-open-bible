revisions:
- from: Y yo estableceré su reino para siempre[a], si él está firme para hacer mis mandamientos y mis juicios[b], como en este día[c].
  to: Y yo estableceré su reino para siempre[a], si él se mantiene firme[b] en hacer mis mandamientos y mis juicios, como en este día[c].
  rationale: Se ajusta la construcción verbal para lograr un español más natural y eclesialmente legible, sin perder la firmeza condicional de יֶחֱזַק ni la literalidad básica de לַעֲשׂוֹת. Se conserva «juicios» por alineación con el rastro léxico auditado. La nota léxica de חזק se rehace para corresponder al nuevo anclaje y preservar las alternativas del inglés POB.
