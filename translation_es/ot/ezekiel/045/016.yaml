translation:
  language: es
  text: Todo el pueblo de la tierra dará esta contribución al príncipe en Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Todo el pueblo de la tierra será para esta contribución al príncipe en Israel». El giro hebreo probablemente significa que el pueblo debe proporcionar esta contribución asignada para el príncipe.'
    reason: lexical_alternative
  - marker: b
    text: «Contribución» traduce תרומה, una porción apartada o presentada; también son posibles «ofrenda» o «tributo», según se enfatice el aspecto cultual o cívico.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל הָעָם הָאָרֶץ
  english_pob_choice: All the people of the land
  chosen_spanish: Todo el pueblo de la tierra
  alternatives_spanish:
  - Toda la gente de la tierra
  - Todo el pueblo de la región
  lexicon: HALOT
  rationale: La secuencia hebrea expresa la totalidad del pueblo perteneciente a la tierra. En español, «pueblo de la tierra» conserva mejor la expresión colectiva que una paráfrasis como «gente» o un giro más interpretativo como «habitantes».
- source_word: יִהְיוּ אֶל
  english_pob_choice: shall give
  chosen_spanish: dará
  alternatives_spanish:
  - será para
  - pertenecerá a
  - estará para
  lexicon: HALOT
  rationale: El hebreo dice literalmente «serán hacia/para», pero en este contexto de contribución asignada el sentido es que el pueblo debe entregar o proporcionar la ofrenda. «Dará» reproduce la fuerza exigida por el contexto sin volver opaco el español.
- source_word: הַתְּרוּמָה
  english_pob_choice: contribution
  chosen_spanish: contribución
  alternatives_spanish:
  - ofrenda
  - tributo
  - porción consagrada
  lexicon: HALOT
  rationale: תרומה designa una porción apartada o presentada para un uso determinado. «Contribución» mantiene un tono amplio y relativamente técnico, y evita imponer de entrada un matiz exclusivamente sacrificial o exclusivamente civil.
- source_word: לַנָּשִׂיא
  english_pob_choice: to the prince
  chosen_spanish: al príncipe
  alternatives_spanish:
  - para el príncipe
  - al gobernante
  - al soberano
  lexicon: HALOT
  rationale: נָשִׂיא en Ezequiel suele referirse al gobernante designado, no necesariamente a un rey en sentido pleno. «Príncipe» conserva el término propio del libro y evita una actualización interpretativa.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - de Israel
  - dentro de Israel
  lexicon: HALOT
  rationale: La preposición ב se refleja de manera natural con «en». Esto mantiene la localización o esfera de gobierno indicada por el hebreo.
theological_decisions:
- issue: Naturaleza de la תרומה en este pasaje
  english_pob_reading: '''Contribution'' translates Hebrew terumah, a set-apart portion or offering; ''offering'' or ''tribute'' are also possible depending on whether the cultic or civic aspect is emphasized.'
  chosen_spanish_reading: «Contribución» para תרומה, dejando abierto si el matiz es cultual o cívico.
  alternative_spanish_readings:
  - ofrenda
  - tributo
  rationale: El contexto inmediato combina responsabilidad del príncipe y asignación comunitaria. «Contribución» conserva esa ambigüedad significativa mejor que una solución más cerrada como «ofrenda» o «tributo» por sí sola.
  doctrine_reference: Ezequiel 45:13–17; uso de תרומה en contextos cultuales y administrativos
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el testimonio de alta concordancia confirma que no hubo objeciones relevantes al sentido base ni a las decisiones léxicas principales.'
  spanish_consistency_notes:
  - Se mantuvo «príncipe» como término técnico para נָשִׂיא, en línea con el uso consistente de Ezequiel.
  - Se conservó «contribución» para תרומה, con nota explicativa, para no perder la tensión entre uso cultual y cívico.
  - La construcción española activa («dará») refleja el sentido idiomático del hebreo sin ocultar la alternativa literal documentada en la nota.
  - Se evitó sustituir automáticamente por «SEÑOR» u այլ terminología ajena; no hay aquí el Tetragrámaton ni un título divino que requiera decisión adicional.
