revisions:
- from: Josué capturó todas las ciudades de estos reyes[a], y a todos sus reyes; los hirió con el filo de la espada. Los dedicó al anatema, tal como Moisés, siervo de Yahvé, había mandado.
  to: Josué capturó todas las ciudades de estos reyes, y a todos sus reyes; los mató a filo de espada. Los consagró[a] a la destrucción, tal como Moisés, siervo de Yahvé, había mandado.
  rationale: Se corrigió el anclaje de la nota para que corresponda al verbo הֶחֱרִים. Se reemplazó «los hirió con el filo de la espada» por «los mató a filo de espada» para reflejar la fuerza letal de וַיַּכֵּם לְפִי חֶרֶב. También se sustituyó «los dedicó al anatema» por «los consagró a la destrucción», que preserva mejor la decisión lexical del POB sobre ḥerem y resulta más clara en español general.
  reviewer_model: gpt-5.4
