translation:
  language: es
  text: Ahora bien, ella llevaba una túnica ricamente adornada[a], porque así vestían las hijas vírgenes del rey. Entonces su asistente la sacó afuera y atrancó la puerta tras ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «una túnica de muchos colores» o «una túnica larga con mangas»; el sentido exacto de la prenda es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּתֹנֶת פַּסִּים
  english_pob_choice: a richly ornamented robe
  chosen_spanish: una túnica adornada
  alternatives_spanish:
  - una túnica ricamente adornada
  - una túnica de muchos colores
  - una túnica larga con mangas
  lexicon: HALOT, BDB
  rationale: La expresión hebrea designa una prenda distintiva, pero el matiz exacto de פַּסִּים es incierto. En español, 'túnica adornada' comunica el carácter destacado de la prenda sin afirmar más de lo que el hebreo permite. Se evita 'de muchos colores' porque depende de una tradición interpretativa no segura en este pasaje.
- source_word: כִּי כֵן תִּלְבַּשְׁןָ
  english_pob_choice: for this is how ... used to dress
  chosen_spanish: porque así vestían
  alternatives_spanish:
  - porque de ese modo vestían
  - porque así solían vestirse
  - porque así era como vestían
  lexicon: HALOT, BDB
  rationale: La construcción expresa una costumbre habitual. 'Así vestían' es natural en español y conserva el valor de práctica regular sin recargar la frase.
- source_word: בְנוֹת הַמֶּלֶךְ הַבְּתוּלֹת
  english_pob_choice: the virgin daughters of the king
  chosen_spanish: las hijas vírgenes del rey
  alternatives_spanish:
  - las hijas del rey, vírgenes
  - las hijas vírgenes del rey
  - las hijas no casadas del rey
  lexicon: HALOT, BDB
  rationale: El hebreo señala tanto el vínculo real como la condición de virginidad. 'Hijas vírgenes del rey' mantiene ambos elementos de forma clara y directa.
- source_word: מְעִילִים
  english_pob_choice: in robes
  chosen_spanish: túnica
  alternatives_spanish:
  - manto
  - ropa exterior
  - vestidura
  lexicon: HALOT, BDB
  rationale: El contexto pide una prenda exterior, y en español 'túnica' funciona bien como equivalente amplio y digno. No se añade un plural explícito porque el sintagma principal ya concentra la descripción de la prenda.
- source_word: מְשָׁרְתוֹ
  english_pob_choice: his attendant
  chosen_spanish: su sirviente
  alternatives_spanish:
  - su servidor
  - su asistente
  - su criado
  lexicon: HALOT, BDB
  rationale: En el contexto narrativo se trata de un servidor personal de Amnón. 'Sirviente' conserva la relación de servicio con tono claro y moderno, sin desplazar el matiz doméstico o cortesano.
- source_word: וַיֹּצֵא אוֹתָהּ הַחוּץ
  english_pob_choice: put her outside
  chosen_spanish: la sacó afuera
  alternatives_spanish:
  - la puso afuera
  - la llevó afuera
  - la echó afuera
  lexicon: HALOT, BDB
  rationale: El hebreo expresa que la hizo salir hacia afuera. 'La sacó afuera' es idiomático en español y reproduce la acción sin intensificarla más allá del texto.
- source_word: וְנָעַל הַדֶּלֶת אַחֲרֶיהָ
  english_pob_choice: bolted the door behind her
  chosen_spanish: cerró la puerta tras ella
  alternatives_spanish:
  - echó llave a la puerta tras ella
  - trancó la puerta tras ella
  - cerró con llave la puerta tras ella
  lexicon: HALOT, BDB
  rationale: נעל puede implicar cerrar con seguro o trabar. En español, 'cerró la puerta tras ella' conserva la acción con naturalidad; se evita especificar 'con llave' o 'trancó' porque el hebreo no obliga a concretar el mecanismo.
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa del POB al preferir una descripción más general de la prenda (''richly ornamented robe'') en lugar de una traducción más específica pero incierta. También conserva la secuencia narrativa simple y directa: descripción de la vestidura, explicación de la costumbre, expulsión de la habitación y cierre de la puerta.'
  spanish_consistency_notes:
  - Se mantiene 'hijas vírgenes del rey' para conservar el paralelo entre estatus real y virginidad.
  - Se usa 'Yahvé' solo cuando el hebreo lo exige explícitamente; este versículo no contiene el nombre divino.
  - Se evita 'Cristo' o terminología eclesial no pertinente al contexto narrativo.
  - '''Sirviente'' se usa aquí como equivalente funcional de מְשָׁרְת/וֹ en un marco cortesano; no se requiere ''esclavo'' en este pasaje.'
