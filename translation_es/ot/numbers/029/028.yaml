review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: añade un macho cabrío como ofrenda adicional, conserva la relación de חַטָּאת con la ofrenda por el pecado, y mantiene la secuencia ‘además del holocausto… y su ofrenda… y su libación’. Sin embargo, no preserva con suficiente explicitud אֶחָד (‘uno’), que en el inglés auditado se mantiene expresamente y en español conviene también conservar de forma no meramente implícita.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse ligeramente para mayor precisión ritual y naturalidad. ‘Un macho cabrío’ es entendible, aunque ‘un cabrito macho’ no sería mejor; la forma actual es aceptable. La reparación principal es explicitar ‘uno’. También es preferible evitar una nota innecesaria sobre ‘sacrificio por el pecado’, ya que el inglés POB no la conserva aquí; en cambio, sí conviene conservar la alternativa documentada sobre ‘continuo’ y ‘libación/ofrenda de bebida’.
  glossary_alignment: 'La terminología principal está alineada: עֹלָה -> ‘holocausto’, הַתָּמִיד -> ‘continuo’, מִנְחָה -> ‘ofrenda vegetal’, נֶסֶךְ -> ‘libación’. No hay conflicto con los términos teológicos por defecto del proyecto. El único ajuste de alineación es representar explícitamente אֶחָד como ‘uno’.'
  issues:
  - severity: medium
    issue: אֶחָד no queda suficientemente explícito en el texto español
    rationale: 'Aunque ‘un’ puede implicar singularidad, el hebreo y el inglés auditado destacan el numeral. En listas sacrificiales conviene mantener ‘uno’ de forma más visible: ‘un macho cabrío… uno’ o mejor ‘y un macho cabrío…’ con una formulación que haga patente la cantidad. La opción más natural es mantener ‘un’ pero reforzar la revisión general con notas ajustadas; aun así, por fidelidad más estricta, se recomienda ‘y un macho cabrío…’ como cantidad explícita suficiente en español moderno solo si se elimina la afirmación de que queda ‘implícito como en el hebreo’, que es inexacta.'
  - severity: low
    issue: La nota [a] introduce una alternativa no preservada por el inglés POB
    rationale: El audit trail inglés conserva notas sobre ‘continual’ y ‘drink offering/libation’, no sobre חַטָּאת. La nota española [a] no es errónea, pero desplaza la atención y omite la alternativa documentada para הַתָּמִיד.
  - severity: low
    issue: Falta una nota para la alternativa ‘continuo/regular/continuo’ vinculada a הַתָּמִיד
    rationale: El inglés POB documenta explícitamente ‘Or besides the continual burnt offering’. Dado que el español usa ‘continuo’, conviene trasladar esa alternativa o, mejor, anclar una nota que explique ‘continuo’ como también ‘regular’, evitando pérdida del rastro auditado.
  revised_spanish_text: y un macho cabrío como sacrificio por el pecado, además del holocausto continuo[a] y de su ofrenda vegetal y de su libación[b].
  revised_footnotes:
