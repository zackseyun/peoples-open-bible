translation:
  language: es
  text: 'Entonces el rey Sedequías envió a Yehucal[a] hijo de Selemías y a Sofonías, hijo de Maasías el sacerdote, al profeta Jeremías, diciendo: «Por favor, ora por nosotros a Yahvé nuestro Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Yehucal; algunas versiones usan la forma abreviada «Jucal» en contextos relacionados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y envió
  - Luego envió
  lexicon: HALOT
  rationale: El wayyiqtol abre y avanza la narración; «Entonces» conserva la secuencia narrativa natural en español sin añadir interpretación.
- source_word: הַמֶּלֶךְ צִדְקִיָּהוּ
  english_pob_choice: King Zedekiah
  chosen_spanish: el rey Sedequías
  alternatives_spanish:
  - el rey, Sedequías
  - Sedequías el rey
  lexicon: HALOT
  rationale: En español es natural anteponer el título al nombre propio. Se mantiene la referencia explícita al oficio real sin sobretraducir el artículo hebreo.
- source_word: יְהוּכַל
  english_pob_choice: Jehucal
  chosen_spanish: Yehucal
  alternatives_spanish:
  - Jehucal
  - Jucal
  lexicon: HALOT
  rationale: Se conserva una transliteración directa del hebreo יְהוּכַל. «Yehucal» refleja mejor la vocalización hebrea que una forma más anglicizada o abreviada.
- source_word: בֶּן שֶׁלֶמְיָה
  english_pob_choice: son of Shelemiah
  chosen_spanish: hijo de Selemías
  alternatives_spanish:
  - hijo de Shelemía
  - hijo de Selamías
  lexicon: HALOT
  rationale: Se mantiene la relación filiativa con «hijo de», que corresponde de forma transparente al hebreo, y se hispaniza el nombre propio dentro de una transliteración estable.
- source_word: צְפַנְיָהוּ בֶן מַעֲשֵׂיָה הַכֹּהֵן
  english_pob_choice: Zephaniah son of Maaseiah, the priest
  chosen_spanish: Sofonías hijo de Maasías, el sacerdote
  alternatives_spanish:
  - Sofonías, hijo de Maasías, el sacerdote
  - Sofonías hijo de Maasías el sacerdote
  lexicon: HALOT
  rationale: La aposición «el sacerdote» se une directamente a Sofonías, siguiendo el ajuste auditado del inglés POB y el hebreo, donde el artículo define a la persona y no a una institución abstracta.
- source_word: אֶל יִרְמְיָהוּ הַנָּבִיא
  english_pob_choice: to Jeremiah the prophet
  chosen_spanish: al profeta Jeremías
  alternatives_spanish:
  - a Jeremías el profeta
  - a Jeremías, el profeta
  lexicon: HALOT
  rationale: En español «al profeta Jeremías» suena más natural y conserva la identificación profética sin alterar el contenido.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: Es la forma estándar para introducir el discurso directo sin añadir matiz extra.
- source_word: הִתְפַּלֶּל נָא
  english_pob_choice: Please pray
  chosen_spanish: Por favor, ora
  alternatives_spanish:
  - Te ruego, ora
  - Ora, por favor
  lexicon: HALOT
  rationale: El imperativo hitpael de פלל pide una traducción verbal de «orar». «Por favor» refleja נָא como súplica cortés y directa en español contemporáneo.
- source_word: בַעֲדֵנוּ
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - a favor de nosotros
  - en favor nuestro
  lexicon: HALOT
  rationale: «Por nosotros» expresa de modo natural la idea de intercesión en español y conserva la dirección vicaria del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre divino en vez de sustituirlo por un título.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de manera directa y natural, manteniendo la confesión de pertenencia del hablante.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En español se adopta «Yahvé» como forma principal del proyecto para preservar el nombre propio del Dios del pacto sin reemplazarlo por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Identificación de la frase nominal «el sacerdote»
  english_pob_reading: Zephaniah son of Maaseiah, the priest
  chosen_spanish_reading: Sofonías hijo de Maasías, el sacerdote
  alternative_spanish_readings:
  - Sofonías, hijo de Maasías, el sacerdote
  - Sofonías hijo de Maasías el sacerdote
  rationale: La lectura auditada entiende que «el sacerdote» identifica a Sofonías. En español se conserva esa relación con una coma mínima para no desgajar la aposición del referente principal.
  doctrine_reference: 'DOCTRINE.md: Appositional identification and source-order fidelity'
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó la coma tras «Maaseiah» para que «the priest» modifique directamente a Zephaniah. La redacción española sigue esa revisión: «Sofonías hijo de Maasías, el sacerdote» mantiene la aposición próxima sin separar indebidamente el oficio del sujeto nominal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» conforme al estándar del proyecto.
  - Se mantiene «ora» en vez de «reza» para reflejar con precisión el verbo de intercesión.
  - Los nombres propios se transliteran de forma coherente y legible en español.
  - La puntuación del discurso directo sigue la sintaxis natural del español y conserva el orden del hebreo sin calco excesivo.
