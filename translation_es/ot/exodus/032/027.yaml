review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: fórmula profética, nombre divino Yahvé, distributivo repetido con ''cada hombre'', movimiento de un extremo a otro del campamento y la triple relación ''hermano / compañero / cercano''. Sin embargo, hay dos desajustes importantes: (1) ''Ponga cada hombre...'' usa imperativo/forma de cortesía singular impropia para el mandato plural dirigido al grupo; debe ser ''Que cada hombre ponga...'' o equivalente. (2) El pie de página está anclado al final de la oración, pero corresponde específicamente a קְרֹבוֹ, por lo que debe marcarse junto a ''pariente'' o el término elegido. Además, el inglés POB eligió ''neighbor'' como texto principal y reservó el matiz ''near one/kinsman'' para nota; en español conviene reflejar mejor esa decisión con ''allegado'' o similar en el texto y dejar ''pariente'' en nota.'
  spanish_quality_summary: 'El español es claro y mayormente natural, con tono digno. ''Pasen y vuelvan de puerta en puerta por el campamento'' funciona bien. ''Sobre su muslo'' es literal pero aceptable. Los problemas principales son gramaticales y de anclaje de nota: ''Ponga cada hombre'' suena incorrecto en este contexto; la nota final tras comillas y punto no sigue la disciplina pedida. También conviene evitar una coma ausente/estructura forzada mediante ''Que cada hombre ponga...'' para mejor fluidez.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> ''Yahvé''; אֱלֹהֵי יִשְׂרָאֵל -> ''el Dios de Israel''. No hay conflictos con términos doctrinales mayores. La decisión sobre קְרֹבוֹ en el borrador (''pariente'') se aparta del texto principal del English POB (''neighbor'') sin necesidad; en español ''allegado'' preserva la idea de alguien cercano sin colapsarla en parentesco, y permite conservar en nota las alternativas ''pariente'' o ''familiar cercano''.'
  issues:
  - severity: high
    issue: Forma verbal incorrecta en 'Ponga cada hombre su espada'
    rationale: El hebreo tiene imperativo plural dirigido a varios hombres, con distributivo אִישׁ. En español, 'Ponga cada hombre' mezcla una forma singular de cortesía con sujeto pospuesto y suena gramaticalmente impropio. 'Que cada hombre ponga su espada...' o 'Ponga cada uno...' corrige el mandato distributivo.
  - severity: medium
    issue: La nota [a] está mal anclada
    rationale: La nota explica קְרֹבוֹ, pero el marcador aparece al final del versículo. Según las instrucciones, el marcador exacto debe ir en la palabra o frase relevante dentro de `spanish_text`.
  - severity: medium
    issue: '''pariente'' como texto principal reduce en exceso el campo semántico de קְרֹבוֹ'
    rationale: El English POB conservó una opción más amplia en el texto principal y dejó 'kinsman/close relative' como alternativas en nota. En español, 'allegado' o 'cercano' preserva mejor la amplitud semántica y la progresión relacional junto con la nota.
  revised_spanish_text: 'Y él les dijo: «Así dice Yahvé, el Dios de Israel: Que cada hombre ponga su espada sobre su muslo. Pasen y vuelvan de puerta en puerta por el campamento, y maten cada hombre a su hermano, y cada hombre a su compañero, y cada hombre a su allegado[a]»'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «su cercano»; también puede traducirse «su pariente», «su familiar cercano» o «su vecino».'
    reason: lexical_alternative
  revision_rationale: Se corrige el mandato distributivo al español idiomático y fiel ('Que cada hombre ponga...'), se mueve la nota al término que realmente comenta, y se ajusta קְרֹבוֹ a 'allegado' para reflejar mejor la amplitud semántica preservada por el English POB, dejando las alternativas más estrechas o distintas en la nota.
