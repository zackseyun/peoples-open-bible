translation:
  language: es
  text: Y fortificó Jope[a], la que está junto al mar, y a Gazara, la que está en los límites de Azoto, donde antes habitaban los enemigos; y asentó allí a judíos, y puso allí todo lo necesario para su restauración[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Gezer» para «Gazara», reflejando un nombre más familiar asociado al hebreo; el griego aquí lee «Gazara».
    reason: lexical_alternative
  - marker: b
    text: La expresión «para su restauración» puede referirse al restablecimiento de estos lugares o de las comunidades judías establecidas en ellos; el griego es breve y permite cualquiera de los dos matices.
    reason: alternative_reading
lexical_decisions:
- source_word: ὠχύρωσεν
  english_pob_choice: fortified
  chosen_spanish: fortificó
  alternatives_spanish:
  - hizo fuerte
  - reforzó
  lexicon: LSJ
  rationale: El verbo describe asegurar un lugar mediante defensas; en español, «fortificó» conserva con naturalidad el sentido militar-político del contexto.
- source_word: Ἰόππην
  english_pob_choice: Joppa
  chosen_spanish: Joppe
  alternatives_spanish:
  - Jafa
  - Yoppe
  lexicon: LSJ
  rationale: Se conserva la forma transliterada tradicional del nombre desde el griego. «Joppe» es reconocible en español bíblico y refleja el texto fuente sin armonizarlo al hebreo.
- source_word: τὴν ἐπὶ τῆς θαλάσσης
  english_pob_choice: which is by the sea
  chosen_spanish: la que está junto al mar
  alternatives_spanish:
  - la que está sobre el mar
  - la que está en el mar
  lexicon: LSJ
  rationale: La expresión localiza Joppe en relación con el mar. «Junto al mar» transmite bien la idea espacial del griego y suena natural en español.
- source_word: Γάζαραν
  english_pob_choice: Gazara
  chosen_spanish: Gazara
  alternatives_spanish:
  - Gezer
  lexicon: LSJ
  rationale: Se mantiene la forma griega del topónimo, conforme al texto fuente y a la decisión POB de preservar la transliteración cuando el griego ofrece una forma helenizada distinta.
- source_word: τὴν ἐπὶ τῶν ὁρίων Ἀζώτου
  english_pob_choice: which is on the borders of Azotus
  chosen_spanish: la que está en los límites de Azoto
  alternatives_spanish:
  - la que está en las fronteras de Azoto
  - la que está en el territorio de Azoto
  lexicon: LSJ
  rationale: «ὅρια» indica límites o fronteras. «En los límites de Azoto» conserva la relación geográfica sin forzar una paráfrasis más amplia.
- source_word: οἱ πολέμιοι
  english_pob_choice: the enemies
  chosen_spanish: los enemigos
  alternatives_spanish:
  - los hostiles
  - las fuerzas enemigas
  lexicon: LSJ
  rationale: Es la equivalencia directa y más clara para el sustantivo adjetival plural.
- source_word: τὸ πρότερον
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - antiguamente
  lexicon: LSJ
  rationale: Marca anterioridad temporal; «antes» es breve, idiomático y suficiente en este contexto.
- source_word: κατῴκισεν
  english_pob_choice: settled
  chosen_spanish: estableció
  alternatives_spanish:
  - asentó
  - pobló
  lexicon: LSJ
  rationale: El verbo expresa causar que alguien habite un lugar. «Estableció allí a judíos» conserva la acción de asentamiento con un español natural.
- source_word: Ἰουδαίους
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judeos
  - judeanos
  lexicon: LSJ
  rationale: En este contexto Ἰουδαίους designa al pueblo o comunidad judía; «judíos» es el equivalente más claro y natural en español.
- source_word: ὅσα ἐπιτήδεια
  english_pob_choice: whatever was needed
  chosen_spanish: todo lo necesario
  alternatives_spanish:
  - cuantas cosas eran necesarias
  - los suministros necesarios
  lexicon: LSJ
  rationale: La frase remite a cosas o provisiones necesarias. «Todo lo necesario» mantiene la amplitud del griego sin precisar indebidamente el tipo de provisión.
- source_word: πρὸς τὴν τούτων ἐπανόρθωσιν
  english_pob_choice: for their restoration
  chosen_spanish: para su restauración
  alternatives_spanish:
  - para su restablecimiento
  - para su reparación
  lexicon: LSJ
  rationale: «ἐπανόρθωσις» puede abarcar restauración, restablecimiento o reparación. Se eligió «restauración» por conservar la amplitud del término y la referencia plural implícita del pasaje.
- source_word: ἔθετο ἐν αὐτοῖς
  english_pob_choice: placed in them
  chosen_spanish: puso en ellos
  alternatives_spanish:
  - colocó en ellos
  - estableció entre ellos
  lexicon: LSJ
  rationale: La construcción griega es breve y directa; «puso en ellos» reproduce el valor básico del verbo y el pronombre plural sin sobreinterpretar la sintaxis.
theological_decisions:
- issue: Alcance de «restauración» en la frase final
  english_pob_reading: The phrase 'for their restoration' may refer to the reestablishment of these places or of the Jewish communities settled in them; the Greek wording is concise and allows either nuance.
  chosen_spanish_reading: '«para su restauración» mantiene abierta la referencia: puede aludir a la restauración de los lugares o al restablecimiento de las comunidades judías allí asentadas.'
  alternative_spanish_readings:
  - para el restablecimiento de ellos
  - para la reparación de ellos
  rationale: El griego es conciso y no determina con plena claridad el referente de τούτων. La traducción española conserva esa ambigüedad sin resolverla artificialmente.
  doctrine_reference: Ninguna; decisión semántica y contextual.
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó «by the sea» para mayor naturalidad y eliminó una repetición innecesaria de «there». En español se siguió ese mismo criterio de fluidez, usando «junto al mar» y evitando redundancias equivalentes en la cláusula de los enemigos.
  spanish_consistency_notes:
  - Se mantuvo la transliteración griega «Joppe» y «Gazara» para ser consistentes con la preferencia POB de seguir la forma del texto fuente cuando el griego ofrece topónimos helenizados.
  - Se eligió «judíos» en lugar de «judeanos» por claridad y porque el contexto habla de asentamiento poblacional, no de un debate etnopolítico técnico.
  - «Restauración» se conservó como término amplio para no estrechar innecesariamente la polisemia de ἐπανόρθωσις.
