translation:
  language: es
  text: 'Y clamaron en alta voz hacia el cielo[a], diciendo: «¿Qué haremos con estos, y adónde los llevaremos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿adónde los conduciremos?». El verbo griego puede sugerir más específicamente llevarlos o alejarlos del peligro presente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβόησαν
  english_pob_choice: they cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - exclamaron
  lexicon: LSJ
  rationale: El verbo expresa un clamor fuerte y urgente. «Clamaron» conserva mejor el tono de súplica vehemente que una opción más plana como «llamaron».
- source_word: φωνῇ
  english_pob_choice: with a loud voice
  chosen_spanish: a voz en cuello
  alternatives_spanish:
  - con voz fuerte
  - en alta voz
  lexicon: LSJ
  rationale: La expresión griega intensifica el acto de clamar. «A voz en cuello» comunica de forma natural esa intensidad en español sin perder el énfasis del original.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: to heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - al cielo
  - para el cielo
  lexicon: LSJ
  rationale: Sigo el referente literal del griego, que nombra el cielo y no explicita a Dios. «Hacia el cielo» preserva la dirección de la súplica y evita introducir un destinatario que no aparece en el texto.
- source_word: Τί ποιήσωμεν
  english_pob_choice: What shall we do
  chosen_spanish: ¿Qué haremos?
  alternatives_spanish:
  - ¿Qué debemos hacer?
  - ¿Qué vamos a hacer?
  lexicon: LSJ
  rationale: El subjuntivo deliberativo transmite incertidumbre y urgencia. «¿Qué haremos?» es idiomático en español y mantiene ese tono.
- source_word: τούτοις
  english_pob_choice: with these
  chosen_spanish: con estos
  alternatives_spanish:
  - por estos
  - acerca de estos
  lexicon: LSJ
  rationale: El dativo es flexible; «con estos» reproduce la relación más inmediata sin decidir demasiado el matiz contextual, que depende de lo dicho antes en la narración.
- source_word: ἀπαγάγωμεν
  english_pob_choice: take them
  chosen_spanish: los llevaremos
  alternatives_spanish:
  - los sacaremos de aquí
  - los conduciremos lejos
  lexicon: LSJ
  rationale: El verbo puede sugerir llevar o conducir lejos. «Llevaremos» mantiene la idea de traslado; en la pregunta «adónde» se conserva la dirección de alejarse del peligro sin volver el español forzado.
theological_decisions:
- issue: Destinatario implícito de la voz dirigida al cielo
  english_pob_reading: Retain 'to heaven' rather than making God explicit
  chosen_spanish_reading: Mantener «hacia el cielo» sin explicitar a Dios
  alternative_spanish_readings:
  - a Dios en el cielo
  - al Señor
  rationale: El griego menciona el cielo, no nombra a Dios. La traducción conserva esa formulación para respetar la evidencia del texto y no resolver prematuramente la implicación teológica de la escena.
  doctrine_reference: Principio de primacía del original y preservación de tensiones teológicas no explicitadas por el texto
- issue: Nuance of ἀπαγάγωμεν as removal from danger
  english_pob_reading: The Greek verb can more specifically suggest taking or leading them away from the present danger.
  chosen_spanish_reading: «los llevaremos» con la pregunta «adónde» para dejar abierta la idea de alejarlos del peligro
  alternative_spanish_readings:
  - los conduciremos lejos
  - los sacaremos de aquí
  rationale: El español «llevaremos» en contexto de pregunta de destino preserva la posibilidad de traslado fuera del peligro, sin añadir una interpretación más precisa de la que el griego exige.
  doctrine_reference: Preservar la amplitud semántica del verbo griego y su tensión contextual
translation_notes:
  revision_awareness: No se aplicaron revisiones previas; la versión sigue de cerca el texto griego y la nota inglesa sobre ἀπαγάγωμεν, manteniendo la dirección 'hacia el cielo' sin explicitar a Dios.
  spanish_consistency_notes:
  - Se mantiene «cielo» para εἰς τὸν οὐρανόν, en coherencia con el texto fuente y la decisión inglesa.
  - Se evita «Señor» o «Dios» como destinatario explícito, siguiendo la reserva auditada del POB inglés.
  - «Clamaron» y «a voz en cuello» juntas conservan el doble énfasis de ἐβόησαν + φωνῇ.
  - El pronombre «estos» reproduce la referencia indefinida del griego sin precisar el antecedente dentro del versículo.
