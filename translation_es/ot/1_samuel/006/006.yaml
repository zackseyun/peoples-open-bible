translation:
  language: es
  text: ¿Por qué entonces endurecen[a] sus corazones, como Egipto y Faraón endurecieron sus corazones? ¿No fue cuando él actuó severamente con ellos que los dejaron ir[b], y se fueron?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hacen pesados sus corazones' / 'hicieron pesados sus corazones'. El hebreo usa el modismo de 'hacer pesado' aplicado al corazón para expresar endurecimiento.
    reason: lexical_alternative
  - marker: b
    text: El 'ellos' de 'actuó severamente con ellos' se refiere a Egipto y Faraón; el 'los' de 'los dejaron ir' se refiere a Israel.
    reason: cross_reference
lexical_decisions:
- source_word: תְכַבְּדוּ
  english_pob_choice: harden
  chosen_spanish: endurecen
  alternatives_spanish:
  - hacen pesado
  - hacen insensible
  lexicon: HALOT
  rationale: El piel de כבד con 'corazón' expresa el modismo de volverlo pesado, es decir, endurecerlo. En español, 'endurecer' comunica mejor el sentido idiomático que una traducción literal como 'hacer pesado', y conserva el valor moral/volitivo del pasaje.
- source_word: לְבַבְכֶם
  english_pob_choice: your hearts
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  - su mente
  lexicon: HALOT
  rationale: El hebreo usa plural de segunda persona para dirigirse al grupo, pero en español el singular colectivo 'su corazón' suena más natural y mantiene el sentido antropológico de la sede interior de la voluntad y la decisión.
- source_word: כִּבְּדוּ
  english_pob_choice: hardened
  chosen_spanish: endurecieron
  alternatives_spanish:
  - hicieron pesado
  - se obstinaron
  lexicon: HALOT
  rationale: 'Se mantiene la misma imagen verbal que en la primera cláusula para conservar la correspondencia retórica del texto: Egipto y el Faraón hicieron pesado/endurecieron su corazón.'
- source_word: מִצְרַיִם וּפַרְעֹה
  english_pob_choice: Egypt and Pharaoh
  chosen_spanish: Egipto y el Faraón
  alternatives_spanish:
  - los egipcios y el Faraón
  - Egipto y Faraón
  lexicon: HALOT
  rationale: '''Egipto'' funciona aquí como nombre colectivo del poder y su pueblo, y ''el Faraón'' se conserva como designación histórica-titulada. La mayúscula en ''Faraón'' sigue el uso español habitual para el personaje/título en un contexto narrativo bíblico.'
- source_word: הֲלוֹא
  english_pob_choice: Was it not
  chosen_spanish: ¿No fue
  alternatives_spanish:
  - ¿Acaso no fue
  - ¿No es cierto que
  lexicon: HALOT
  rationale: La pregunta retórica en español se expresa de forma natural con '¿No fue...?', que introduce bien la cláusula temporal subsiguiente y preserva el tono de apelación a la memoria compartida.
- source_word: הִתְעַלֵּל
  english_pob_choice: dealt severely
  chosen_spanish: actuó severamente
  alternatives_spanish:
  - trató con severidad
  - se mostró severo con
  lexicon: HALOT
  rationale: El hitpael de עלל aquí apunta a un trato duro/severo. 'Actuó severamente' conserva el registro formal del POB inglés y evita sobreinterpretar el matiz con un verbo más libre.
- source_word: בָּהֶם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - contra ellos
  - sobre ellos
  lexicon: HALOT
  rationale: La preposición marca el objeto del trato severo. 'Con ellos' es la equivalencia española más idiomática en esta construcción.
- source_word: וַיְשַׁלְּחוּם
  english_pob_choice: they sent them away
  chosen_spanish: los despidieron
  alternatives_spanish:
  - los enviaron lejos
  - los dejaron ir
  lexicon: HALOT
  rationale: שלח puede significar enviar/expulsar/dejar ir. En este contexto exodal, 'los despidieron' comunica el hecho de soltarlos o hacerlos salir con una naturalidad formal en español, sin perder el movimiento de alejamiento.
- source_word: וַיֵּלֵכוּ
  english_pob_choice: they departed
  chosen_spanish: se fueron
  alternatives_spanish:
  - partieron
  - salieron
  lexicon: HALOT
  rationale: '''Se fueron'' reproduce el cierre narrativo breve del hebreo y evita sonar demasiado explicativo. Aunque ''partieron'' es más formal, ''se fueron'' encaja mejor en la secuencia verbal y en la fluidez del español bíblico moderno.'
theological_decisions:
- issue: Sujeto implícito de הִתְעַלֵּל
  english_pob_reading: The subject is understood as God, referring to his severe dealings with Egypt in the Exodus plagues.
  chosen_spanish_reading: El sujeto queda implícito en español, pero el contexto permite entender que se trata de Dios actuando con severidad contra Egipto.
  alternative_spanish_readings:
  - cuando él los trató severamente
  - cuando ocurrieron con ellos cosas severas
  rationale: El hebreo omite el sujeto explícito; el contexto del éxodo sugiere la acción divina. En español conviene mantener cierta ambigüedad contextual sin forzar una explicitación innecesaria, aunque 'él' sigue siendo recuperable por el lector a partir del marco narrativo.
  doctrine_reference: Éxodo 7–12; 1 Samuel 6:6
translation_notes:
  revision_awareness: La redacción sigue la última revisión auditada del POB inglés, que prefirió un registro más formal ('dealt severely' y 'departed'). En español se conservó ese nivel de formalidad, pero se ajustó el cierre narrativo a una forma idiomática breve ('se fueron') para no volverlo artificial.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Corazón'' mantiene el sentido bíblico de centro interior de la voluntad, no una mera emoción.'
  - Se evitó 'SEÑOR' como sustituto teológico porque el hebreo aquí no contiene יהוה.
  - La correspondencia verbal entre 'endurecen' / 'endurecieron' refleja la repetición retórica del hebreo.
  - La nota textual no fue necesaria porque el pasaje no presenta variante relevante en el packet dado.
