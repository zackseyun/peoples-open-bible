    issue: 'Frase exhortativa poco natural en español: «Vengan, y vayamos»'
    rationale: Aunque intenta reflejar לְכוּ וְנֵלְכָה con dos elementos, en español la combinación con coma antes de «y» suena rígida. «Vengan y vayamos» conserva mejor la secuencia exhortativa sin sacrificar fidelidad.
  revised_spanish_text: 'Antiguamente en Israel[a], cuando un hombre iba a consultar a Dios, decía: «Vengan y vayamos al vidente», porque al que hoy se le llama profeta, antiguamente se le llamaba vidente.'
  revised_footnotes:
