base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/022.yaml
  text: Jesus saw some little ones being suckled[a]. He said to his disciples, “These little ones who are being suckled are like those who are to enter the Kingdom.” They said to him, “Shall we, being little ones, enter the Kingdom?” Jesus said to them, “When you make the two one; and when you make the inner like the outer and the outer like the inner, and the upper like the lower; and when you make the male and the female into a single one, so that the male is not male and the female not female; and when you make eyes in the place of an eye, and a hand in the place of a hand, and a foot in the place of a foot[h][g][f][e][d][c][b], and an image in the place of an image—then you will enter the Kingdom.”
  footnotes:
  - marker: a
    text: The phrase 'being suckled' renders ϫⲓⲉⲣⲱⲧⲉ, a specific breastfeeding verb; alternatives like 'nursing' are more idiomatic but less specific.
    reason: lexical_alternative
  - marker: b
    text: '''Kingdom'' translates ⲙⲛⲧⲣⲣⲟ, an abstract ''kingship/reign''; Thomas often uses it as a locale/state of entry.'
    reason: lexical_alternative
  - marker: c
    text: '''Upper/lower'' translate ⲡϩⲉ/ⲡⲡⲉ; some read these as ''heaven/earth.'' We avoid canonical coloring here.'
    reason: cross_reference
  - marker: d
    text: '''Back/front'' involves ⲡⲓⲧⲛ (back) and ⲡⲥⲁ (face/side). The Coptic structure is elliptical; we supply the natural pairing.'
    reason: dialect_note
  - marker: e
    text: '''Image'' (ϩⲓⲕⲱⲛ) could be rendered ''icon'' given the Greek loanword; ''image'' is broader and more transparent.'
    reason: lexical_alternative
  - marker: f
    text: End-of-saying 'Kingdom' is restored from Dilley’s normalized reading; the codex line shows minor damage.
    reason: lacuna_or_restoration
  - marker: g
    text: Or 'and the upper like the lower, and the back like the front;'.
    reason: previous_rendering
  - marker: h
    text: Or 'Are we to become little ones, so that we may enter the Kingdom?'.
    reason: previous_rendering
