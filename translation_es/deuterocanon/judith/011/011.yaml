base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/011/011.yaml
  text: And now[a], so that my lord may not become an outcast and ineffective, death will fall upon them, and sin has overtaken them[c][b], by which they provoke their God whenever they commit an offense.
  footnotes:
  - marker: a
    text: Or 'cast out and ineffective.' The Greek terms can emphasize being expelled and unable to accomplish anything.
    reason: lexical_alternative
  - marker: b
    text: Literally 'death will fall upon their face.' The expression is rendered idiomatically in English as 'death will fall upon them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'whenever they commit impropriety/folly.' The Greek noun can denote conduct that is improper, absurd, or morally outrageous.
    reason: lexical_alternative
