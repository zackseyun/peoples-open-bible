translation:
  language: es
  text: 'Por favor, recuerda: ¿quién, siendo inocente, pereció alguna vez? ¿O dónde fueron eliminados los íntegros?[a][b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin culpa» para «inocente».
    reason: lexical_alternative
  - marker: b
    text: O «fueron destruidos» / «desaparecieron» para «fueron eliminados».
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכָר נָא
  english_pob_choice: Please remember
  chosen_spanish: Por favor, recuerda
  alternatives_spanish:
  - Recuerda, por favor
  - Te ruego que recuerdes
  lexicon: HALOT
  rationale: El imperativo זכר con la partícula נָא expresa una petición atenuada. «Por favor» comunica bien esa suavización en español moderno sin volver el tono arcaico.
- source_word: מִי הוּא
  english_pob_choice: who that was
  chosen_spanish: quién que fuera
  alternatives_spanish:
  - quién fue
  - quién era
  lexicon: HALOT
  rationale: La pregunta retórica en hebreo enfatiza identidad o caso ejemplar. «Quién que fuera» conserva ese énfasis y suena natural en español, aunque sea algo marcado estilísticamente.
- source_word: נָקִי
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - sin culpa
  - irreprensible
  - blameless
  lexicon: HALOT
  rationale: El término denota estar libre de culpa. «Inocente» es el equivalente moderno más claro; «irreprensible» o «sin culpa» son posibles, pero menos directos aquí.
- source_word: אָבָד
  english_pob_choice: perished
  chosen_spanish: pereció
  alternatives_spanish:
  - fue destruido
  - se perdió
  lexicon: HALOT
  rationale: El perfecto qal de אבד expresa perecer o arruinarse. «Pereció» conserva el registro solemne y la fuerza de la afirmación retórica.
- source_word: וְאֵיפֹה
  english_pob_choice: Or where
  chosen_spanish: ¿O dónde
  alternatives_spanish:
  - ¿Y dónde
  - ¿Dónde entonces
  lexicon: HALOT
  rationale: La conjunción más la interrogativa introduce un paralelo alternativo. «¿O dónde» reproduce bien la fuerza disyuntiva del hebreo y del inglés auditado.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  lexicon: HALOT
  rationale: El adjetivo plural sustantivado describe personas moralmente rectas. «Los rectos» es fiel al sentido literal y mantiene la paralelismo con «inocente».
- source_word: נִכְחָדוּ
  english_pob_choice: cut off
  chosen_spanish: fueron exterminados
  alternatives_spanish:
  - fueron cortados
  - fueron destruidos
  - fueron arrancados
  lexicon: HALOT
  rationale: El nifal de כחד puede implicar ser borrado, exterminado o eliminado. Dado el paralelo con «pereció» y la gravedad del dicho, «fueron exterminados» comunica con fuerza la idea de desaparición/aniquilación; se conserva la tensión semántica con alternativas en la nota.
theological_decisions:
- issue: Afirmación teológica de Elifaz sobre el destino del inocente y el recto
  english_pob_reading: Render the statement straightforwardly as Eliphaz's claim without softening or endorsing it beyond the narrative context.
  chosen_spanish_reading: Presentar la afirmación de Elifaz de manera directa, sin suavizarla ni convertirla en una corrección implícita del libro.
  alternative_spanish_readings:
  - Añadir una marca interpretativa que indique que la frase es discutible dentro del argumento del libro
  - Reformularla para sugerir cautela doctrinal
  rationale: El versículo debe conservar la voz del hablante y la tensión teológica del libro. El texto español no debe resolver la afirmación ni anticipar la respuesta narrativa posterior.
  doctrine_reference: Preservar la tensión teológica sin resolverla
