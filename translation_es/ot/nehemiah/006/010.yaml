  text: וַ/אֲנִי בָ֗אתִי בֵּ֣ית שְֽׁמַֽעְיָ֧ה בֶן דְּלָיָ֛ה בֶּן מְהֵֽיטַבְאֵ֖ל וְ/ה֣וּא עָצ֑וּר וַ/יֹּ֡אמֶר נִוָּעֵד֩ אֶל בֵּ֨ית הָ/אֱלֹהִ֜ים אֶל תּ֣וֹךְ הַֽ/הֵיכָ֗ל וְ/נִסְגְּרָה֙ דַּלְת֣וֹת הַ/הֵיכָ֔ל כִּ֚י בָּאִ֣ים לְ/הָרְגֶ֔/ךָ וְ/לַ֖יְלָה בָּאִ֥ים לְ/הָרְגֶֽ/ךָ־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/006/010.yaml
  text: Then I went to the house of Shemaiah son of Delaiah[a], son of Mehetabel, who was confined, and he said, “Let us meet at the house of God, inside the temple, and let us shut the doors of the temple, for they are coming to kill you—yes, at night they are coming to kill you.”
  footnotes:
  - marker: a
    text: Or “inside the sanctuary.” The Hebrew heikhal can refer specifically to the temple building or sanctuary, not merely the larger temple precincts.
    reason: lexical_alternative
