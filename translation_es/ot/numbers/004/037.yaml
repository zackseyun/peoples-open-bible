translation:
  language: es
  text: Estos fueron los hombres contados de las familias de los coatitas, todos los que servían en la tienda de reunión, a quienes Moisés y Aarón contaron conforme al mandato de Yahvé, por medio de Moisés[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'por mano de Moisés'.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקוּדֵי
  english_pob_choice: the counted men
  chosen_spanish: los hombres contados
  alternatives_spanish:
  - los que fueron contados
  - los enumerados
  - el censo de
  lexicon: HALOT
  rationale: El sustantivo en constructo introduce el resultado del conteo censal. En español, 'hombres contados' conserva el valor de personas registradas para servicio sin volver abstracto el texto como 'censo de'.
- source_word: מִשְׁפְּחֹת הַקְּהָתִי
  english_pob_choice: the families of the Kohathites
  chosen_spanish: las familias de los qehatitas
  alternatives_spanish:
  - las clanes de los qehatitas
  - las familias de los coatitas
  lexicon: HALOT
  rationale: '''Familias'' es la equivalencia natural de מִשְׁפְּחֹת. Se conserva una transliteración cercana al hebreo (''qehatitas'') para no depender de una forma tradicional española que puede ocultar la relación con el nombre hebreo base.'
- source_word: כָּל הָעֹבֵד
  english_pob_choice: all who served
  chosen_spanish: todos los que servían
  alternatives_spanish:
  - todos los que servían
  - todos los que hacían servicio
  - cada servidor
  lexicon: HALOT
  rationale: El participio expresa quienes estaban en ejercicio de servicio. 'Todos los que servían' mantiene el alcance colectivo de כָּל y el sentido funcional de עֹבֵד en un registro natural.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: '''Tienda de reunión'' es una traducción directa y ampliamente inteligible del lugar sagrado designado por אֹהֶל מוֹעֵד. Se evita una paráfrasis que desplace el término técnico.'
- source_word: אֲשֶׁר פָּקַד
  english_pob_choice: whom Moses and Aaron counted
  chosen_spanish: a quienes Moisés y Aarón contaron
  alternatives_spanish:
  - que Moisés y Aarón contaron
  - a quienes Moisés y Aarón registraron
  lexicon: HALOT
  rationale: Aquí פקד tiene el sentido censal de contar/registrar. 'A quienes ... contaron' conserva la referencia a las personas incluidas en el censo sin añadir matices ajenos.
- source_word: עַל פִּי יְהוָה
  english_pob_choice: at the command of Yahweh
  chosen_spanish: conforme al mandato de Yahvé
  alternatives_spanish:
  - según el mandato de Yahvé
  - por orden de Yahvé
  - según la palabra de Yahvé
  lexicon: HALOT
  rationale: La expresión idiomática 'על פי' se vierte como una formulación de autoridad y conformidad. 'Conforme al mandato de Yahvé' comunica el valor directivo del hebreo sin calcar 'por la boca de'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención POB de usar el nombre divino en español como 'Yahvé', manteniendo visible el Tetragrámaton y evitando la sustitución por un título.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por mano de Moisés
  alternatives_spanish:
  - por medio de Moisés
  - a través de Moisés
  - por la mano de Moisés
  lexicon: HALOT
  rationale: La expresión conserva la imagen hebrea de agencia mediada. 'Por mano de Moisés' es fiel, natural y deja abierta la alternativa idiomática que el auditor inglés preservó con nota.
theological_decisions:
- issue: Render del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio del pacto en lugar de sustituirlo por un título. Esto preserva la decisión doctrinal y el patrón del POB de hacer visible el Tetragrámaton en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza de עַל פִּי יְהוָה
  english_pob_reading: at the command of Yahweh
  chosen_spanish_reading: conforme al mandato de Yahvé
  alternative_spanish_readings:
  - según el mandato de Yahvé
  - por orden de Yahvé
  rationale: La lectura española explicita la autoridad divina sin borrar el hebraísmo. Se evita una versión excesivamente literal que sonaría extraña en español, pero se conserva la idea de obediencia a la orden divina.
  doctrine_reference: Numbers 4:37 source usage
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'everyone serving' a 'all who served' para mejorar la concordancia y la naturalidad; por eso el español usa 'todos los que servían', que refleja el participio colectivo y evita una formulación demasiado mecánica. Se conservó la nota alternativa para בְּיַד מֹשֶׁה como decisión léxica establecida en el audit trail.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió 'tienda de reunión' como equivalente técnico de אֹהֶל מוֹעֵד.
  - Se mantuvo el paralelismo censal de 'contados' / 'contaron' para reflejar פקד en ambos usos.
  - No se introdujo 'señor' ni 'LORD' para el nombre divino, a fin de preservar la transparencia del texto fuente.
