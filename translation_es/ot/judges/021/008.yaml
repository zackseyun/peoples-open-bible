revisions:
- from: 'Y dijeron[a]: «¿Cuál de las tribus de Israel no subió a Yahvé en Mizpa?». Y he aquí, no había venido un hombre del campamento[b], de Jabes de Galaad, a la asamblea.'
  to: 'Y dijeron[a]: «¿Cuál de las tribus de Israel no subió a Yahvé en Mizpa?» Y he aquí, no había venido ni un hombre de Jabes de Galaad al campamento[b], a la asamblea.'
  rationale: 'Se corrigió la sintaxis de la segunda oración para reflejar fielmente el hebreo: el origen es «de Jabes de Galaad» y el destino es «al campamento, a la asamblea». Se añadió «ni» para que el español exprese con naturalidad la fuerza enfática de «no… un hombre» sin borrar la singularidad que explica la nota. También se ajustó la puntuación de la cita interrogativa.'
