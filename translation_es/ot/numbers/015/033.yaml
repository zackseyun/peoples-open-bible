translation:
  language: es
  text: Y los que lo encontraron recogiendo leña[a] lo llevaron a Moisés, a Aarón y a toda la congregación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘madera’. El hebreo עֵצִים puede referirse a madera en general o a piezas de madera, como palos o leña.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרִיבוּ
  english_pob_choice: brought him to
  chosen_spanish: lo llevaron a
  alternatives_spanish:
  - lo presentaron ante
  - lo acercaron a
  lexicon: HALOT
  rationale: El hebreo en הִפְעִיל de קרב conserva la idea de hacer que alguien se acerque o lo presenten ante una autoridad. En español, 'lo llevaron a' reproduce con naturalidad la acción resultante sin añadir un calco extraño; 'lo presentaron ante' sería más explícito pero menos directo.
- source_word: הַמֹּצְאִים
  english_pob_choice: those who found
  chosen_spanish: los que lo encontraron
  alternatives_spanish:
  - los que hallaron
  - quienes lo encontraron
  lexicon: HALOT
  rationale: El participio con artículo funciona como sustantivo. 'Los que lo encontraron' es una forma natural y fiel, y mantiene la referencia a los descubridores del hombre.
- source_word: מְקֹשֵׁשׁ עֵצִים
  english_pob_choice: gathering wood
  chosen_spanish: recogiendo leña
  alternatives_spanish:
  - recogiendo madera
  - juntando leña
  - reuniendo madera
  lexicon: HALOT
  rationale: עֵצִים puede abarcar 'madera' o piezas de madera; en este contexto narrativo 'leña' comunica mejor el material suelto que se está juntando para uso doméstico o de fuego. 'Recogiendo' refleja el aspecto progresivo del participio.
- source_word: אֶל מֹשֶׁה וְאֶל אַהֲרֹן וְאֶל כָּל הָעֵדָה
  english_pob_choice: to Moses and Aaron and to all the congregation
  chosen_spanish: a Moisés, a Aarón y a toda la congregación
  alternatives_spanish:
  - ante Moisés y Aarón y ante toda la congregación
  - a Moisés, Aarón y a toda la asamblea
  lexicon: HALOT
  rationale: Se conserva la repetición de אֶל con 'a', que en español funciona bien para destinatario/movimiento. 'Congregación' mantiene el valor técnico de עֵדָה en contexto legal-covenantal mejor que 'asamblea'.
- source_word: עֵדָה
  english_pob_choice: congregation
  chosen_spanish: congregación
  alternatives_spanish:
  - asamblea
  - comunidad
  lexicon: HALOT
  rationale: En el Pentateuco, עֵדָה suele designar a la comunidad reunida del pacto. 'Congregación' preserva ese registro formal y bíblico sin depender de una paráfrasis.
translation_notes:
  revision_awareness: Se respetó la revisión del audit trail que prefirió 'brought him to' frente a una formulación más literal como 'brought him near to'; por eso se eligió 'lo llevaron a' como equivalente natural y preciso en español. También se mantuvo la alternativa léxica sobre עֵצִים, reflejando la ambigüedad documentada entre 'wood' y 'sticks'.
  spanish_consistency_notes:
  - Se usa 'congregación' para עֵדָה, en coherencia con el tratamiento POB del texto fuente.
  - Se traduce el participio מְקֹשֵׁשׁ con un gerundio en español para conservar la acción en desarrollo.
  - Se evita 'SEÑOR' u otra sustitución teológica porque este verso no contiene el Tetragrámaton ni referencias directas a él.
