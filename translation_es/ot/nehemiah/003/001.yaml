translation:
  language: es
  text: Entonces se levantó Eliasib, el sumo sacerdote, con sus hermanos los sacerdotes, y edificaron la Puerta de las Ovejas. La consagraron[a] y colocaron sus puertas; la consagraron[a] hasta la Torre de los Cien, hasta la Torre de Hananel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la dedicaron». El verbo hebreo puede denotar poner algo aparte como santo o especialmente dedicado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: WLC/HALOT
  rationale: En narración, el verbo marca el inicio de la acción. «Se levantó» conserva el movimiento inceptivo del hebreo sin sonar forzado en español.
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el principal sacerdote
  lexicon: WLC/HALOT
  rationale: «Sumo sacerdote» es el equivalente natural y fiel del título establecido en español bíblico, sin perder el rango sacerdotal supremo.
- source_word: וְאֶחָיו הַכֹּהֲנִים
  english_pob_choice: with his brothers the priests
  chosen_spanish: con sus hermanos los sacerdotes
  alternatives_spanish:
  - y sus hermanos, los sacerdotes
  - y sus hermanos sacerdotes
  lexicon: WLC/HALOT
  rationale: La construcción hebrea presenta a los hermanos como sacerdotes; «con sus hermanos los sacerdotes» conserva el vínculo familiar y la aposición profesional.
- source_word: שַׁעַר הַצֹּאן
  english_pob_choice: the Sheep Gate
  chosen_spanish: la Puerta de las Ovejas
  alternatives_spanish:
  - la Puerta del Rebaño
  - la puerta de las ovejas
  lexicon: WLC/HALOT
  rationale: Al ser un nombre de lugar, la mayúscula y la forma nominal mantienen su carácter de designación fija; «Ovejas» refleja literalmente el hebreo.
- source_word: קִדְּשׁוּהוּ
  english_pob_choice: consecrated it
  chosen_spanish: la consagraron
  alternatives_spanish:
  - la dedicaron
  - la santificaron
  lexicon: WLC/HALOT
  rationale: El verbo implica poner algo aparte con sentido sagrado. «Consagraron» preserva la fuerza cultual mejor que «dedicaron» y evita una lectura meramente administrativa.
- source_word: דַּלְתֹתָיו
  english_pob_choice: its doors
  chosen_spanish: sus hojas
  alternatives_spanish:
  - sus puertas
  - sus batientes
  lexicon: WLC/HALOT
  rationale: El término se refiere a las hojas o batientes de la puerta. «Hojas» evita confundir el plural hebreo con puertas separadas y es más preciso que «puertas» en este contexto arquitectónico.
- source_word: מִגְדַּל הַמֵּאָה
  english_pob_choice: the Tower of the Hundred
  chosen_spanish: la Torre de los Cien
  alternatives_spanish:
  - la Torre del Cien
  - la Torre de la Cien
  lexicon: WLC/HALOT
  rationale: Se sigue de cerca la estructura constructa hebrea. «De los Cien» mantiene la forma literal y reconoce que se trata de un topónimo.
- source_word: מִגְדַּל חֲנַנְאֵל
  english_pob_choice: the Tower of Hananel
  chosen_spanish: la Torre de Hananel
  alternatives_spanish:
  - la Torre Hananel
  - la Torre de Jananel
  lexicon: WLC/HALOT
  rationale: Se translitera el nombre propio de lugar como topónimo estable, manteniendo la transparencia del original.
theological_decisions:
- issue: קדשׁ aplicado a una puerta/cada tramo de obra
  english_pob_reading: consecrated it
  chosen_spanish_reading: la consagraron
  alternative_spanish_readings:
  - la dedicaron
  - la santificaron
  rationale: El texto presenta una acción sacerdotal sobre un elemento arquitectónico; «consagrar» conserva el carácter sagrado del acto sin añadir contenido ajeno.
  doctrine_reference: Nehemías 3:1; uso cultual de קדשׁ en contextos de apartamiento sagrado
- issue: Repetición de la acción de consagrar antes y después del tramo de construcción
  english_pob_reading: They consecrated it ... they consecrated it as far as the Tower of the Hundred
  chosen_spanish_reading: La consagraron ... la consagraron hasta la Torre de los Cien
  alternative_spanish_readings:
  - Consagraron ... consagraron
  - La dedicaron ... la dedicaron
  rationale: La repetición del hebreo se conserva para no diluir la insistencia del texto en el acto sacral del trabajo realizado por los sacerdotes.
  doctrine_reference: Principio de repetición enfática del hebreo narrativo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que eliminó la explicitación enfática del pronombre independiente; en español no se añadió énfasis extra. También se conservó la decisión revisada de mantener una sola referencia limpia a la consagración, sin insertar explicaciones interpretativas en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «sumo sacerdote» como equivalencia idiomática estable para הַכֹּהֵן הַגָּדוֹל.
  - Se eligió «consagraron» en vez de «dedicaron» para respetar la carga cultual del verbo.
  - «Puerta de las Ovejas» y «Torre de Hananel» se tratan como topónimos con mayúscula inicial.
