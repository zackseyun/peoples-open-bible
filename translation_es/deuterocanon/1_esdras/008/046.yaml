translation:
  language: es
  text: habiendo mandado que hablaran con Lodayo[a] y con sus hermanos y con los tesoreros de aquel lugar, para enviarnos[b] a los que habían de servir como sacerdotes[c] en la casa de nuestro Señor[d],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Λοδαίῳ; el paralelo hebreo en Esdras 8:17 tiene Iddo.
    reason: alternative_reading
  - marker: b
    text: El griego dice 'enviarnos'; el paralelo hebreo tiene 'traer a nosotros'.
    reason: alternative_reading
  - marker: c
    text: El griego especifica 'los que habían de servir como sacerdotes'; el paralelo hebreo dice más ampliamente 'servidores' o 'ministros'.
    reason: lexical_alternative
  - marker: d
    text: El griego lee 'nuestro Señor'; el paralelo hebreo dice 'nuestro Dios'.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐντειλάμενος
  english_pob_choice: having commanded
  chosen_spanish: habiendo mandado
  alternatives_spanish:
  - habiendo ordenado
  - después de haber mandado
  lexicon: LSJ
  rationale: El participio griego expresa una acción anterior que queda ligada al hilo narrativo; en español, el gerundio compuesto conserva bien esa relación temporal y el valor de mandato sin volverlo una cláusula más rígida.
- source_word: διαλεχθῆναι
  english_pob_choice: to speak with
  chosen_spanish: que hablaran con
  alternatives_spanish:
  - que conversaran con
  - que se dirigieran a
  lexicon: LSJ
  rationale: El verbo indica hablar o conversar; 'hablar con' es la opción más natural en español y mantiene la sencillez del mandato indirecto.
- source_word: Λοδαίῳ
  english_pob_choice: Lodaios
  chosen_spanish: Lodayo
  alternatives_spanish:
  - Lodaios
  - Iddo
  lexicon: LSJ
  rationale: Se translitera el nombre griego con adaptación española de ortografía y acentuación. Se conserva la forma griega como alternativa por la divergencia con el paralelo hebreo, que tiene Iddo.
- source_word: τοῖς ἀδελφοῖς αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus hermanos de sangre
  lexicon: LSJ
  rationale: ἀδελφοί significa de manera ordinaria 'hermanos'; en ausencia de un indicio fuerte para ampliar el sentido, se conserva el término literal.
- source_word: γαζοφύλαξιν
  english_pob_choice: the treasurers
  chosen_spanish: los tesoreros
  alternatives_spanish:
  - los guardianes del tesoro
  - los custodios de la tesorería
  lexicon: LSJ
  rationale: El compuesto se refiere a quienes administran o custodian el tesoro; 'tesoreros' es idiomático y refleja bien la función administrativa.
- source_word: ἀποστεῖλαι ἡμῖν
  english_pob_choice: to send us
  chosen_spanish: para enviarnos
  alternatives_spanish:
  - para mandarnos
  - para hacer llegar a nosotros
  lexicon: LSJ
  rationale: El verbo griego es 'enviar'; se mantiene esa fuerza verbal. 'Enviarnos' es la equivalencia natural en español y evita armonizar con el paralelo hebreo que dice 'traer a nosotros'.
- source_word: τοὺς ἱερατεύσαντας
  english_pob_choice: those who would serve as priests
  chosen_spanish: a los que habían de servir como sacerdotes
  alternatives_spanish:
  - a los que servirían como sacerdotes
  - a los que ejercían el sacerdocio
  lexicon: LSJ
  rationale: El participio expresa servicio sacerdotal; en español, 'habían de servir' transmite una función prevista o encomendada sin reducir el matiz funcional a un título estático.
- source_word: ἐν τῷ οἴκῳ τοῦ κυρίου ἡμῶν
  english_pob_choice: in the house of our Lord
  chosen_spanish: en la casa de nuestro Señor
  alternatives_spanish:
  - en la casa de nuestro Dios
  - en la casa de nuestro Dueño
  lexicon: LSJ
  rationale: Se sigue el griego κύριος como 'Señor', no el paralelo hebreo que dice 'nuestro Dios'. 'Casa' conserva el lenguaje templario natural en español.
theological_decisions:
- issue: κύριος frente al paralelo hebreo 'nuestro Dios' en la frase del templo
  english_pob_reading: our Lord
  chosen_spanish_reading: nuestro Señor
  alternative_spanish_readings:
  - nuestro Dios
  rationale: En 1 Esdras la base primaria es el texto griego transmitido; por eso se mantiene 'Señor' para κύριος. La lectura del paralelo hebreo se deja como alternativa reconocida, pero no se impone sobre el texto fuente principal.
  doctrine_reference: Primacía del idioma fuente en el corpus deuterocanónico; decisión léxica de κύριος → Señor
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del audit trail inglés al reflejar ἐντειλάμενος con una construcción participial española ('habiendo mandado'), manteniendo además las decisiones estables de 'tesoreros' para γαζοφύλαξιν, 'enviarnos' para ἀποστεῖλαι ἡμῖν y 'los que habían de servir como sacerdotes' para τοὺς ἱερατεύσαντας.
  spanish_consistency_notes:
  - Se prefirió 'Señor' para κύριος, conforme a la fuente griega principal, y se marcó la alternativa del paralelo hebreo en nota.
  - Se mantuvo 'tesoreros' como término administrativo claro y consistente con el valor del compuesto griego.
  - Se adaptó el nombre propio a una forma española legible ('Lodayo') sin perder la equivalencia con la transliteración griega.
  - La puntuación sigue el flujo sintáctico del participio inicial y de los infinitivos dependientes en español bíblico contemporáneo.
