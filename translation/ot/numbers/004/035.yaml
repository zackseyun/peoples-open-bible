id: NUM.4.35
reference: Numbers 4:35
source:
  edition: WLC
  text: מִ/בֶּ֨ן שְׁלֹשִׁ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה וְ/עַ֖ד בֶּן חֲמִשִּׁ֣ים שָׁנָ֑ה כָּל הַ/בָּא֙ לַ/צָּבָ֔א לַ/עֲבֹדָ֖ה בְּ/אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: from thirty years old and upward[a], up to fifty years old[b], everyone who comes for service, to do the work in the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who enters for duty, for the work in the tent of meeting.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for 'service' (צָבָא) can also carry the sense of organized duty or service-company, reflecting the structured nature of Levitical work.
    reason: cultural_note
lexical_decisions:
- source_word: מִבֶּן שְׁלֹשִׁים שָׁנָה וָמַעְלָה
  chosen: from thirty years old and upward
  alternatives:
  - from the age of thirty and above
  - from thirty years and upward
  lexicon: HALOT
  rationale: The idiom מִן + בֶּן + number + שָׁנָה expresses age starting point. 'Years old' is natural English; 'and upward' preserves וָמַעְלָה without paraphrase.
- source_word: וְעַד בֶּן חֲמִשִּׁים שָׁנָה
  chosen: up to fifty years old
  alternatives:
  - even to fifty years old
  - to the age of fifty
  lexicon: HALOT
  rationale: This completes the age range idiom. 'Up to' is clear modern English and preserves the upper limit sense of עַד.
- source_word: כָּל הַבָּא
  chosen: everyone who comes
  alternatives:
  - all who enter
  - everyone who comes in
  lexicon: HALOT
  rationale: The participle of בוא with כָּל functions substantivally for those entering this duty category. 'Everyone who comes' is a natural rendering that preserves the participial sense without over-specifying motion.
- source_word: לַצָּבָא
  chosen: for service
  alternatives:
  - for duty
  - for the company
  - for the host
  lexicon: HALOT
  rationale: In this cultic census context, צָבָא refers to organized service or duty rather than military warfare strictly. 'For service' fits the tabernacle setting and avoids importing a purely military sense, while still reflecting structured obligation.
- source_word: לַעֲבֹדָה
  chosen: to do the work
  alternatives:
  - for the work
  - for labor
  - for ministry
  lexicon: HALOT
  rationale: עֲבֹדָה denotes work/service. Rendering it with 'to do the work' distinguishes it from the preceding לַצָּבָא and reflects the infinitive-like function in English. 'Ministry' would sound ecclesiastically loaded here.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: This is the standard rendering of the tabernacle designation. 'Tent of meeting' preserves the Hebrew phrase transparently. 'In' fits the sphere of service, though 'at' is possible.
