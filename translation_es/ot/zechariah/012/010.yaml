translation:
  language: es
  text: Y derramaré sobre la casa de David y sobre los habitantes de Jerusalén espíritu de gracia y de súplica, y mirarán hacia mí[a], a quien traspasaron, y harán duelo por él[b] como se hace duelo por un hijo único, y se lamentarán amargamente por él como se lamenta por un primogénito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «me mirarán» o «mirarán en mí».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa de «mí» a «él» en esta cláusula; la traducción conserva esa tensión en vez de suavizarla.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁפַכְתִּי
  english_pob_choice: I will pour out
  chosen_spanish: derramaré
  alternatives_spanish:
  - derramaré sobre
  - verteré
  lexicon: HALOT
  rationale: En español, «derramar» comunica bien la acción abundante y divina de impartir algo sobre un pueblo. Mantiene la metáfora de efusión del hebreo sin sonar forzado; «verter» sería posible, pero menos natural en este contexto profético.
- source_word: רוּחַ חֵן וְתַחֲנוּנִים
  english_pob_choice: a spirit of grace and supplication
  chosen_spanish: espíritu de gracia y de súplica
  alternatives_spanish:
  - espíritu de gracia y súplica
  - Espíritu de gracia y súplica
  - espíritu de gracia y de ruego
  lexicon: HALOT
  rationale: Se conserva «espíritu» en minúscula, porque el hebreo no exige identificar explícitamente al Espíritu Santo. «Súplica» reproduce bien תַחֲנוּנִים en registro bíblico y evita endurecer el sentido hacia un tecnicismo doctrinal no explicitado por el texto.
- source_word: יוֹשֵׁב יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los que habitan en Jerusalén
  - el que habita en Jerusalén
  lexicon: HALOT
  rationale: Aunque el participio hebreo es singular en forma, funciona como colectivo. El plural español expresa con naturalidad el conjunto de residentes sin perder el valor colectivo del original.
- source_word: וְהִבִּיטוּ אֵלַי
  english_pob_choice: they will look to me
  chosen_spanish: mirarán hacia mí
  alternatives_spanish:
  - mirarán a mí
  - mirarán a mí con atención
  - mirarán hacia mí
  lexicon: HALOT
  rationale: «Mirarán hacia mí» conserva la dirección relacional de אֶל con נבט y suena más natural que un calco rígido. Mantiene la posibilidad de referencia devocional o expectante sin explicitar más de lo que el hebreo dice.
- source_word: אֵת אֲשֶׁר דָּקָרוּ
  english_pob_choice: whom they have pierced
  chosen_spanish: a quien traspasaron
  alternatives_spanish:
  - a quien hirieron de muerte
  - a quien atravesaron con una lanza
  - al que traspasaron
  lexicon: HALOT
  rationale: «Traspasar» es el equivalente español más fiel y solemne para דקר en este contexto. Se evita suavizar con verbos demasiado interpretativos; la forma relativa conserva el referente personal del hebreo.
- source_word: וְסָפְדוּ
  english_pob_choice: they will mourn
  chosen_spanish: harán duelo
  alternatives_spanish:
  - mourirán
  - lamentarán
  - harán lamentación
  lexicon: HALOT
  rationale: «Hacer duelo» expresa con claridad el lamento formal por los muertos y corresponde mejor al peso ritual y afectivo del verbo que un simple «lamentar».
- source_word: עָלָיו
  english_pob_choice: for him
  chosen_spanish: por él
  alternatives_spanish:
  - sobre él
  - a causa de él
  lexicon: HALOT
  rationale: En español, el verbo de duelo pide normalmente «por él». Esto reproduce el valor afectivo de la preposición sin perder la referencia personal del texto.
- source_word: הַיָּחִיד
  english_pob_choice: an only son
  chosen_spanish: un hijo único
  alternatives_spanish:
  - un hijo solitario
  - el único hijo
  - un unigénito
  lexicon: HALOT
  rationale: «Un hijo único» es la forma más natural y fiel en español para el término en contexto de duelo. Preserva la idea de pérdida irreemplazable sin introducir formulaciones demasiado doctrinalizadas.
- source_word: וְהָמֵר
  english_pob_choice: weep bitterly
  chosen_spanish: se lamentarán amargamente
  alternatives_spanish:
  - llorarán amargamente
  - sollozarán amargamente
  - harán lamentación amarga
  lexicon: HALOT
  rationale: El verbo expresa dolor intenso y amargo. «Se lamentarán amargamente» mantiene el tono elegíaco del paralelismo y evita reducir el sentido solo a llanto físico.
- source_word: הַבְּכוֹר
  english_pob_choice: a firstborn
  chosen_spanish: un primogénito
  alternatives_spanish:
  - el primogénito
  - un hijo primogénito
  lexicon: HALOT
  rationale: '«Primogénito» conserva la carga cultural y afectiva del hebreo. El artículo indefinido corresponde al valor comparativo del miembro paralelo: el dolor se asemeja al que se siente por tal pérdida.'
theological_decisions:
- issue: Tensión pronominal entre «mí» y «él»
  english_pob_reading: 'Retain the MT tension: they will look to me ... and they will mourn for him'
  chosen_spanish_reading: 'Se conserva la tensión del hebreo: «mirarán hacia mí ... y harán duelo por él»'
  alternative_spanish_readings:
  - mirarán hacia mí ... y harán duelo por mí
  - mirarán hacia mí ... y harán duelo por él, sin conservar la tensión
  rationale: El texto hebreo pasa de primera persona a tercera en la misma secuencia. La traducción no lo armoniza, porque esa oscilación es parte del testimonio textual y de su fuerza interpretativa. El español reproduce la tensión sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §3
- issue: Naturaleza de רוּחַ en la frase «espíritu de gracia y de súplica»
  english_pob_reading: Render without capitalization
  chosen_spanish_reading: «espíritu» en minúscula, sin identificar explícitamente al Espíritu Santo
  alternative_spanish_readings:
  - «Espíritu» mayúscula
  - «Espíritu de gracia y de súplica»
  rationale: El hebreo permite una lectura de disposición o impulso concedido por Dios, pero no obliga a una identificación explícita con la persona del Espíritu Santo. La minúscula preserva la ambigüedad lexical y evita sobreinterpretación.
  doctrine_reference: Translation philosophy §3
- issue: Posible lectura mesiánica/cristológica posterior
  english_pob_reading: Translate the Hebrew directly without importing explicit messianic identification into the wording
  chosen_spanish_reading: Se traduce directamente el hebreo sin añadir identificación explícita en el cuerpo del versículo
  alternative_spanish_readings:
  - introducir «Mesías» en el texto
  - explicitar una lectura cristológica en la redacción
  rationale: La versión debe permanecer guiada por el texto hebreo. La lectura cristológica tradicional queda posible y compatible, pero no se inserta como glosa en la línea principal.
  doctrine_reference: Affirmations + Translation philosophy §1
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se prefirió «súplica» para רוּחַ חֵן וְתַחֲנוּנִים por ser más formal y estándar, y se mantuvo la estructura que preserva la tensión entre «mí» y «él» en la cláusula del duelo. También se respetó la decisión de traducir el pasaje de manera directa, sin añadir una identificación cristológica explícita al texto principal.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma en el proyecto, pero este versículo no contiene el tetragrámaton; no se introdujo ninguna sustitución devocional.
  - Se eligió «espíritu» en minúscula para no convertir una posible disposición dada por Dios en una identificación inequívoca con el Espíritu Santo.
  - «Traspasaron» y «hacer duelo» conservan un registro bíblico claro y no suavizan la violencia ni el lamento formal del hebreo.
  - 'Los sustantivos colectivos y paralelos poéticos se adaptaron a un español natural sin perder el paralelismo: casa de David / habitantes de Jerusalén; hijo único / primogénito.'
