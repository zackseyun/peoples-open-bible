translation:
  language: es
  text: 'Así que el rey preguntó a la mujer, y ella le contó. Entonces el rey le asignó un funcionario de la corte[a], diciendo: «Restituye todo lo que le pertenece, junto con todos los productos del campo, desde el día en que dejó la tierra hasta ahora».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un eunuco», si סָרִיס se toma en su sentido más literal en vez del sentido más amplio de «funcionario de la corte».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - le preguntó
  - inquirió
  lexicon: HALOT
  rationale: El verbo introduce una simple pregunta del rey a la mujer. «Preguntó» reproduce bien la acción narrativa sin sobreactuar el tono.
- source_word: לָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: En este contexto se refiere a la mujer sunamita ya conocida, no principalmente a su estado civil. «La mujer» conserva esa referencia contextual.
- source_word: וַתְּסַפֶּר לוֹ
  english_pob_choice: she told him
  chosen_spanish: ella le contó
  alternatives_spanish:
  - ella le relató
  - ella se lo contó
  lexicon: HALOT
  rationale: ספר en piel puede significar contar o relatar. «Le contó» es natural en español y suficiente para la acción narrativa.
- source_word: וַיִּתֶּן לָהּ ... סָרִיס אֶחָד
  english_pob_choice: assigned to her one court official
  chosen_spanish: le asignó un funcionario de la corte
  alternatives_spanish:
  - le dio un eunuco
  - le nombró un oficial
  lexicon: HALOT
  rationale: En el marco real, סָרִיס puede designar un eunuco o, en sentido amplio, un funcionario de palacio. El POB inglés opta por el sentido administrativo; «funcionario de la corte» lo preserva sin imponer castración literal.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - y le dijo
  lexicon: HALOT
  rationale: La fórmula introduce discurso directo; «diciendo» mantiene la estructura hebrea de modo natural.
- source_word: הָשֵׁיב
  english_pob_choice: Restore
  chosen_spanish: Restituye
  alternatives_spanish:
  - Devuelve
  - Restaura
  lexicon: HALOT
  rationale: El imperativo causativo de שוב ordena hacer que se devuelva lo que le corresponde. «Restituye» expresa bien el matiz legal de devolución de bienes y derechos.
- source_word: אֶת כָּל אֲשֶׁר לָהּ
  english_pob_choice: all that belongs to her
  chosen_spanish: todo lo que le pertenece
  alternatives_spanish:
  - todo lo que es suyo
  - todo cuanto era de ella
  lexicon: HALOT
  rationale: La expresión apunta a posesión o derecho legal. «Le pertenece» conserva ese sentido de pertenencia sin sobretraducir.
- source_word: וְאֵת כָּל תְּבוּאֹת הַשָּׂדֶה
  english_pob_choice: along with all the produce of the field
  chosen_spanish: junto con todos los productos del campo
  alternatives_spanish:
  - junto con toda la cosecha del campo
  - y con todo el rendimiento del campo
  lexicon: HALOT
  rationale: תְּבוּאוֹת abarca producto, rendimiento o cosecha. «Productos del campo» es amplio y fiel al campo semántico, aunque «cosecha» sería más restrictivo.
- source_word: מִיּוֹם עָזְבָה אֶת הָאָרֶץ
  english_pob_choice: from the day she left the land
  chosen_spanish: desde el día en que dejó la tierra
  alternatives_spanish:
  - desde el día que abandonó la tierra
  - desde el día en que salió del país
  lexicon: HALOT
  rationale: אֶרֶץ puede ser tierra, país o territorio. Se conserva «la tierra» siguiendo el término hebreo y el contexto geográfico, sin especificar más de lo que el texto exige.
- source_word: וְעַד עָתָּה
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta hoy
  - hasta el presente
  lexicon: HALOT
  rationale: La expresión temporal es directa; «hasta ahora» es el equivalente natural en español actual.
translation_notes:
  revision_awareness: Coincide con el cierre de alta concordancia del proceso inglés; no se aplicaron revisiones textuales posteriores. Se conserva la decisión auditada sobre סָרִיס como término de administración cortesana, con nota alternativa para el sentido literal.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - Se preserva el matiz legal de restitución en «Restituye» / «le pertenece».
  - «La tierra» sigue la amplitud semántica de אֶרֶץ sin añadir interpretación extra.
  - La nota al pie marca explícitamente la alternativa lexical de סָרִיס, como en el POB inglés.
