translation:
  language: es
  text: 'Una hija es una causa oculta de engaño para su padre[a], y la preocupación por ella le quita el sueño: en su juventud, no sea que quede sin casarse, y en su virginidad[b], no sea que no la casen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente una expresión difícil, «algo oculto de falsedad/engaño»; el paralelo griego lee «insomnio oculto», lo que sugiere una inquietud encubierta que una hija causa a su padre.
    reason: alternative_reading
  - marker: b
    text: El hebreo de la cláusula anterior es incierto en sentido; el griego paralelo apoya la idea de decaer o pasar la flor de la juventud más que una referencia simple a quedar sin casarse.
    reason: textual_variant
lexical_decisions:
- source_word: בת לאב / θυγάτηρ πατρὶ
  english_pob_choice: A daughter ... to her father
  chosen_spanish: La hija ... para su padre
  alternatives_spanish:
  - La hija ... a su padre
  - Una hija ... para su padre
  lexicon: HALOT; LXX πατρί
  rationale: El hebreo y el griego expresan una relación posesiva/dativa entre hija y padre; en español, «para su padre» comunica esa relación de manera natural sin perder la referencia paternal.
- source_word: מטמנת שקר / ἀπόκρυφος ἀγρυπνία
  english_pob_choice: is a hidden falsehood / hidden sleeplessness
  chosen_spanish: una ocultación de engaño
  alternatives_spanish:
  - un engaño oculto
  - una ocultación secreta
  - un sueño oculto
  lexicon: HALOT; el paralelo griego confirma la idea de algo oculto que inquieta
  rationale: La frase hebrea es difícil y el paralelo griego apunta a una inquietud oculta más que a una mera mentira. «Ocultación de engaño» preserva la tensión del hebreo sin suavizarla del todo y deja ver el carácter problemático del enunciado.
- source_word: דאגה / μέριμνα
  english_pob_choice: anxiety
  chosen_spanish: la preocupación
  alternatives_spanish:
  - la ansiedad
  - el afán
  - la inquietud
  lexicon: HALOT; μέριμνα
  rationale: «Preocupación» es natural en español y mantiene el sentido de cuidado inquieto o afán persistente sin introducir un tecnicismo psicológico excesivo.
- source_word: תפריע שנתו / ἀφιστᾷ ὕπνον
  english_pob_choice: drives away his sleep
  chosen_spanish: le aparta el sueño
  alternatives_spanish:
  - le quita el sueño
  - le ahuyenta el sueño
  - le quita el dormir
  lexicon: HALOT; ἀφιστάναι ὕπνον
  rationale: «Apartar el sueño» conserva la imagen de separación/desplazamiento del sueño y suena sobrio en español; evita el coloquialismo de «quitarle el sueño» si se desea un registro más elevado.
- source_word: בנעוריה / ἐν νεότητι αὐτῆς
  english_pob_choice: in her youth
  chosen_spanish: en su juventud
  alternatives_spanish:
  - cuando es joven
  - en su mocedad
  lexicon: HALOT; νεότης
  rationale: Equivale con precisión temporal y mantiene el paralelismo formal del verso.
- source_word: פן תגור / μὴ ποτε παρακμάσῃ
  english_pob_choice: lest she pass her prime
  chosen_spanish: para que no decaiga
  alternatives_spanish:
  - para que no pase su mejor edad
  - para que no decline
  - para que no pase su primavera
  lexicon: HALOT; παρακάμπτω / παρακμάζω
  rationale: El hebreo es incierto, pero el griego sugiere decadencia o declive. «No decaiga» conserva esa ambigüedad sin resolverla excesivamente, y evita imponer una lectura matrimonial demasiado específica.
- source_word: ובבתוליה / συνῳκηκυῖα
  english_pob_choice: in her virginity
  chosen_spanish: en su virginidad
  alternatives_spanish:
  - siendo virgen
  - cuando todavía es virgen
  lexicon: HALOT; συνῳκηκυῖα
  rationale: «Virginidad» conserva la categoría social y corporal del término bíblico y corresponde al encuadre del pasaje.
- source_word: פן לא תנשא / μὴ ποτε μισηθῇ
  english_pob_choice: lest she not be married / lest she not be hated
  chosen_spanish: para que no sea odiada
  alternatives_spanish:
  - para que no quede sin casarse
  - para que no sea desechada
  - para que no permanezca sin marido
  lexicon: Hebreo y griego en tensión; miσηθῇ
  rationale: El hebreo de base apunta al matrimonio, pero el griego leído literalmente dice «no sea odiada». Como el conjunto del verso es oscuro y el paralelo griego introduce otra posibilidad semántica, se preserva esa tensión con una forma española que permite la lectura de rechazo/desfavor sin borrar el trasfondo social del pasaje.
theological_decisions:
- issue: Manejo de una línea textual difícil entre el hebreo y el griego paralelo
  english_pob_reading: Retain a relatively literal rendering from the Hebrew while allowing the Greek to inform the surrounding sense of concealed paternal distress.
  chosen_spanish_reading: Conservar la oscuridad del hebreo en la primera cola y permitir que el griego oriente el sentido de inquietud oculta, sin armonizar completamente ambas tradiciones.
  alternative_spanish_readings:
  - 'Sustituir la primera cola por una interpretación lisa: «una hija es una inquietud oculta para su padre»'
  - 'Seguir solo el hebreo: «una hija es un engaño oculto para su padre»'
  rationale: 'La evidencia fuente presenta una tensión real: el hebreo de Kahana es semánticamente difícil y el griego ofrece otro perfil. La versión española no debe eliminar esa dificultad; por eso se mantiene una formulación que deja visible el problema textual y permite lectura dual.'
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; usar el paralelo griego como entrada real; preservar la ambigüedad cuando la evidencia no permite resolución segura.'
- issue: El cierre del verso y la posible lectura matrimonial vs. de rechazo/odio
  english_pob_reading: in her virginity, lest she not be married
  chosen_spanish_reading: en su virginidad, para que no sea odiada
  alternative_spanish_readings:
  - en su virginidad, para que no se case
  - en su virginidad, para que no permanezca sin marido
  - en su virginidad, para que no sea desechada
  rationale: El hebreo sugiere matrimonio, mientras que el griego presenta un verbo de odio/rechazo. Dado que el verso tiene una tradición textual inestable, la redacción española mantiene la posibilidad de una lectura social de rechazo sin borrar la referencia a la situación matrimonial que domina el contexto.
  doctrine_reference: 'PHILOSOPHY.md: conservar la tensión documentada; no resolver en exceso una variante textual con alcance semántico y social.'
translation_notes:
  revision_awareness: Tomé como base el hebreo conservado en Kahana, pero lo leí a la luz del paralelo griego de Swete, tal como indica el audit trail inglés. En la primera cola mantuve la dificultad semántica sin resolverla por completo; en la segunda mitad preferí una formulación que no borra la tensión entre la posible lectura matrimonial del hebreo y la lectura de rechazo/odio del griego.
  spanish_consistency_notes:
  - Usé «Yahvé» no aplica aquí porque el verso no contiene el tetragrámaton.
  - Mantuve «virginidad» y «juventud» como categorías distintas, siguiendo la estructura paralela del verso.
  - Evité «Cristo»/«Mesías» porque no aparecen en el pasaje.
  - Conservé un tono sobrio y bíblico sin recurrir a calcos demasiado mecánicos del inglés.
