translation:
  language: es
  text: 'Y cuando digo al malvado: “Ciertamente morirás”, y él se aparta de su pecado y hace justicia y rectitud,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבְאָמְרִי
  english_pob_choice: And when I say
  chosen_spanish: Y cuando digo
  alternatives_spanish:
  - Y al decir
  - Y cuando yo digo
  lexicon: HALOT
  rationale: La forma hebrea funciona temporalmente; en español, «Y cuando digo» comunica con naturalidad la relación temporal sin perder la primera persona del hablante divino.
- source_word: לָרָשָׁע
  english_pob_choice: to the wicked man
  chosen_spanish: al malvado
  alternatives_spanish:
  - al impío
  - al malvado hombre
  lexicon: HALOT
  rationale: רָשָׁע designa a una persona moralmente perversa. «Malvado» es claro, natural y conserva el singular representativo; evito «impío» por su posible sesgo cultual y «hombre» por ser redundante en español.
- source_word: מוֹת תָּמוּת
  english_pob_choice: You shall surely die
  chosen_spanish: Ciertamente morirás
  alternatives_spanish:
  - Morirás ciertamente
  - De seguro morirás
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica certeza; «Ciertamente morirás» reproduce bien esa fuerza enfática en español con dignidad y fluidez.
- source_word: וְשָׁב
  english_pob_choice: and he turns
  chosen_spanish: y él se aparta
  alternatives_spanish:
  - y vuelve
  - y se vuelve atrás
  lexicon: HALOT
  rationale: שׁוּב aquí implica apartarse/volver del pecado. «Se aparta» evita introducir una connotación de retorno físico y expresa con claridad el giro moral del contexto.
- source_word: מֵחַטָּאתוֹ
  english_pob_choice: from his sin
  chosen_spanish: de su pecado
  alternatives_spanish:
  - de su falta
  - de su pecado cometido
  lexicon: HALOT
  rationale: El singular con sufijo se rinde de manera directa como «de su pecado», preservando la referencia ética concreta sin ampliarla innecesariamente.
- source_word: וְעָשָׂה
  english_pob_choice: and does
  chosen_spanish: y hace
  alternatives_spanish:
  - y practica
  - y obra
  lexicon: HALOT
  rationale: עשה es amplio; «hace» es el equivalente más directo y mantiene la sencillez del hebreo.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - lo justo
  - juicio
  lexicon: HALOT
  rationale: En este marco ético, מִשְׁפָּט apunta a conducta justa. «Justicia» preserva el valor normativo y la conexión con el par hebreo.
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justeza
  lexicon: HALOT
  rationale: צְדָקָה se distingue de מִשְׁפָּט y aquí conviene un segundo término en español que mantenga la distinción. «Rectitud» comunica bien la idea de conducta correcta y evita fusionarlo con «justicia».
theological_decisions:
- issue: Conservación de la pareja ética מִשְׁפָּט / צְדָקָה
  english_pob_reading: justice and righteousness
  chosen_spanish_reading: justicia y rectitud
  alternative_spanish_readings:
  - lo justo y lo recto
  - justicia y justicia
  rationale: La pareja hebrea tiene peso ético-teológico y no debe colapsarse en un solo término. «Justicia y rectitud» mantiene la distinción semántica sin sonar artificial en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
- issue: Tratamiento del hablante divino en primera persona
  english_pob_reading: And when I say
  chosen_spanish_reading: Y cuando digo
  alternative_spanish_readings:
  - Y cuando yo digo
  - Y al decir
  rationale: La primera persona divina debe mantenerse explícita y natural. El español permite omitir el pronombre sin pérdida de referencia, preservando el tono solemne del discurso.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'but he turns' por 'and he turns' para seguir más de cerca la conjunción hebrea; la traducción española refleja esa neutralidad con «y él se aparta», sin introducir contraste no presente en el texto base.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton.
  - Se conserva una equivalencia distinta para מִשְׁפָּט y צְדָקָה, siguiendo la transparencia léxica del POB.
  - «Malvado» mantiene el singular representativo masculino del hebreo sin necesidad de expansión.
  - No se usan notas al pie porque no hay una lectura alternativa que requiera anclaje textual en esta línea española.
