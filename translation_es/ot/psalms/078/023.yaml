translation:
  language: es
  text: Pero mandó a las nubes de arriba[a], y abrió las puertas[b] del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cielos de arriba».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las puertas del cielo»; algunas traducciones dicen «los portones del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden a
  lexicon: HALOT
  rationale: צוה expresa una orden o mandato con autoridad. En español, «mandó» comunica bien ese acto de autoridad divina y funciona con naturalidad poética en este contexto.
- source_word: שְׁחָקִים
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - los cielos
  - los cielos nublados
  lexicon: HALOT
  rationale: El hebreo puede referirse a nubes o a los cielos. Dado el paralelismo con «las puertas del cielo» y la imagen de provisión desde lo alto, «las nubes» es una equivalencia concreta y natural en español.
- source_word: מִמָּעַל
  english_pob_choice: above
  chosen_spanish: de arriba
  alternatives_spanish:
  - desde arriba
  - de lo alto
  lexicon: HALOT
  rationale: La forma indica posición o procedencia «de/desde arriba». «De arriba» suena más natural unido a «las nubes» y conserva la idea espacial sin sobretraducir.
- source_word: דַלְתֵי
  english_pob_choice: the doors of
  chosen_spanish: las puertas de
  alternatives_spanish:
  - las compuertas de
  - las entradas de
  lexicon: HALOT
  rationale: דלת significa propiamente «puerta». En español, «las puertas de» mantiene la equivalencia léxica directa y el tono poético del versículo.
- source_word: שָׁמַיִם
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - los cielos
  lexicon: HALOT
  rationale: En esta expresión fija, el singular «el cielo» es idiomático en español y preserva la imagen elevada de «las puertas del cielo». Aunque el hebreo es plural formal, el sentido colectivo/poético se comunica bien así.
- source_word: פָּתָח
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - desplegó
  - destapó
  lexicon: HALOT
  rationale: פתח significa abrir. «Abrió» es la forma simple y precisa, sin añadir intensidad o matiz no expresado en el hebreo.
- source_word: וַ
  english_pob_choice: Yet
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: Hebrew grammar
  rationale: Aunque la partícula puede ser simplemente coordinante, en el flujo del Salmo 78 la acción divina contrasta con la incredulidad del pueblo. «Pero» conserva esa tensión discursiva en español.
theological_decisions:
- issue: Valor discursivo de la partícula inicial en el contexto del Salmo 78
  english_pob_reading: Render adversatively as 'Yet'
  chosen_spanish_reading: Renderizarla adversativamente como «Pero»
  alternative_spanish_readings:
  - Y
  - Entonces
  rationale: La conjunción hebrea es amplia, pero el contexto del salmo contrapone la rebelión o incredulidad de Israel con la provisión persistente de Dios. «Pero» preserva ese contraste sin agregar doctrina ajena al texto.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto inglés final se mantuvo sin cambios en la última revisión; el acuerdo general fue alto y sólo quedaron observaciones menores. La versión española sigue el mismo nivel de cautela, conservando la imagen poética y las alternativas léxicas pertinentes.
  spanish_consistency_notes:
  - Se mantiene «cielo» en singular dentro de la expresión fija «las puertas del cielo», mientras que «las nubes» preserva la concreción del hebreo שְׁחָקִים.
  - Se usa «Pero» para reflejar la fuerza discursiva adversativa del contexto del salmo, siguiendo la decisión inglesa «Yet».
  - No se sustituye el léxico directo de «puertas» por un término eclesiástico más interpretativo.
  - Las notas a y b corresponden a alternativas léxicas reales del hebreo y deben permanecer ancladas en el texto.
