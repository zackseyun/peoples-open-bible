  spanish_consistency_notes:
  - Se usa «coronémonos» para mantener el matiz hortatorio y de auto-adorno del griego.
  - Se evita «SEÑOR» u այլ terminología no pertinente, pues el versículo no contiene nombres divinos.
  - «Capullos de rosa» preserva la tensión entre «rosas» y «κάλυξιν» sin tecnicismo innecesario.
  - La nota al pie recoge la alternativa semántica principal documentada en el audit trail inglés.
