review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura hebrea con ambos 'Entonces ... entonces', mantiene el sentido sacrificial concreto y traduce adecuadamente תַּחְפֹּץ, זִבְחֵי צֶדֶק, יַעֲלוּ y מִזְבַּחֲךָ. Sin embargo, en la secuencia עוֹלָה וְכָלִיל, el español actual 'holocaustos y holocaustos completos' suena redundante y menos natural. Dado el rastro de auditoría inglés, conviene preservar la distinción documentada pero con una formulación española más clara.
  spanish_quality_summary: El texto es legible y digno, pero 'los holocaustos y los holocaustos completos' resulta pesado y poco idiomático en español eclesial actual. También la nota b como 'ofrendas quemadas' no encaja del todo con la decisión principal si se usa 'holocausto'. Una leve reparación mejora naturalidad sin perder precisión.
  glossary_alignment: No hay conflicto con la terminología de proyecto. 'Justicia', 'altar' y el lenguaje sacrificial están bien alineados. La mejor mejora es mantener 'holocaustos' para עוֹלָה y expresar כָלִיל como 'ofrendas enteramente consumidas' en nota, o en el texto como 'holocaustos completos' solo si se acepta cierta dureza. Aquí propongo conservar la formulación principal con un pequeño ajuste de notas para explicar la distinción.
  issues:
  - severity: medium
    issue: La frase 'los holocaustos y los holocaustos completos' suena redundante y algo torpe en español.
    rationale: Aunque intenta preservar la distinción hebrea entre עוֹלָה y כָלִיל, la repetición de 'holocaustos' en coordinación no fluye bien en español y puede distraer al lector.
  - severity: low
    issue: La nota b 'O ofrendas quemadas' es una alternativa débil para un término técnico ya vertido como 'holocaustos'.
    rationale: En español bíblico, 'holocausto' es la equivalencia establecida; 'ofrendas quemadas' suena más perifrástico y menos técnico.
  revised_spanish_text: Entonces te agradarán los sacrificios[a] de justicia, los holocaustos y las ofrendas totalmente consumidas[b]; entonces se ofrecerán toros sobre tu altar.
  revised_footnotes:
  - marker: a
    text: O 'sacrificios de rectitud'.
    reason: lexical_alternative
  - marker: b
    text: O 'holocaustos completos'; el hebreo distingue aquí entre 'holocausto' y 'ofrenda completa/entera'.
    reason: lexical_alternative
  revision_rationale: Se mantiene el sentido del hebreo y del POB inglés, pero se evita la coordinación poco natural 'holocaustos y holocaustos completos'. La nueva redacción conserva la distinción entre עוֹלָה y כָלִיל con mejor fluidez en español y deja la alternativa más literal en nota.
