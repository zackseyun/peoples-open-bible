revisions:
- from: Cuando lo oímos[a], se nos derritió el corazón, y no quedó ya aliento en ningún hombre por causa de ustedes, porque Yahvé, su Dios[b], él es Dios en los cielos arriba y en la tierra abajo.
  to: Cuando lo oímos[a], se nos derritieron los corazones, y no quedó ya espíritu en ningún hombre por causa de ustedes, porque Yahvé, su Dios[b], él es Dios en los cielos arriba y en la tierra abajo.
  rationale: Se corrige la decisión principal de רוּחַ a «espíritu» para alinearse con el source y la POB inglesa, dejando «valor» como alternativa en nota. También se ajusta «corazón» a plural para reflejar mejor el hebreo y sonar más natural en español. Finalmente, se corrige la nota sobre YHWH/Yahvé para que describa con precisión la relación entre el original hebreo y la forma española.
  reviewer_model: gpt-5.4
