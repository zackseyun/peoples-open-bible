translation:
  language: es
  text: Y Jacob oyó que había mancillado[a] a su hija Dina. Pero sus hijos estaban con su ganado en el campo, y Jacob guardó silencio hasta que ellos llegaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había violado a su hija Dina». El verbo hebreo significa literalmente «mancillar», «contaminar» o «hacer impuro»; en este contexto se refiere al ultraje sexual de Dina.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: HALOT
  rationale: El verbo básico de oír/receptar noticia se vierte naturalmente como «oyó». «Se enteró» explicita recepción de información, pero añade más interpretación que el hebreo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: HALOT
  rationale: Introduce el contenido de lo que Jacob oyó; «que» corresponde mejor a la subordinación explicativa del hebreo.
- source_word: טִמֵּא
  english_pob_choice: had defiled
  chosen_spanish: había deshonrado
  alternatives_spanish:
  - había contaminado
  - había hecho impura
  lexicon: HALOT
  rationale: En este contexto de agravio sexual, el valor social y moral del verbo se comunica con «deshonrado». «Contaminado» o «hecho impura» suenan demasiado rituales o demasiado duros en español sin aportar mayor claridad pastoral. Se conserva la tensión entre impureza y ultraje sin reducirla a un término técnico único.
- source_word: בִתּוֹ
  english_pob_choice: his daughter
  chosen_spanish: a su hija
  alternatives_spanish:
  - a su hija Dina
  - a su hija
  lexicon: HALOT
  rationale: La construcción posesiva se refleja de forma natural como «a su hija» en español. El nombre propio aparece inmediatamente después, como en el hebreo.
- source_word: וּבָנָיו
  english_pob_choice: But his sons
  chosen_spanish: Pero sus hijos
  alternatives_spanish:
  - Y sus hijos
  - Ahora bien, sus hijos
  lexicon: HALOT
  rationale: «Pero» reproduce bien el enlace narrativo que contrasta la reacción de Jacob con la ausencia de los hijos. «Y» sería más neutro, pero menos expresivo del giro.
- source_word: הָיוּ אֶת מִקְנֵהוּ בַּשָּׂדֶה
  english_pob_choice: were with his livestock in the field
  chosen_spanish: estaban con su ganado en el campo
  alternatives_spanish:
  - estaban en el campo con su ganado
  - estaban cuidando su ganado en el campo
  lexicon: HALOT
  rationale: «Estaban con su ganado en el campo» mantiene la ubicación y el acompañamiento del rebaño sin añadir una función no expresada explícitamente. «Ganado» es una forma amplia y natural en español para מִקְנֶה; «cuidando» interpretaría más de lo que dice el texto.
- source_word: מִקְנֵהוּ
  english_pob_choice: his livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - su ganado
  - sus reses
  - sus animales
  lexicon: HALOT
  rationale: El término hebreo suele referirse al ganado/livestock. «Ganado» es la opción más clara y sobria en español; «reses» es más estrecho y «animales» demasiado general.
- source_word: וְהֶחֱרִשׁ
  english_pob_choice: kept silent
  chosen_spanish: guardó silencio
  alternatives_spanish:
  - permaneció callado
  - no dijo nada
  lexicon: HALOT
  rationale: La forma causativa/verbial expresa la decisión de no hablar; «guardó silencio» suena natural y conserva la deliberación del acto. «No dijo nada» es más coloquial y menos literario.
- source_word: עַד בֹּאָם
  english_pob_choice: until they came
  chosen_spanish: hasta que ellos volvieron
  alternatives_spanish:
  - hasta que llegaron
  - hasta su llegada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hasta su venir/llegada», pero el contexto narrativo implica regreso. «Volvieron» comunica esa implicación sin abandonar la referencia temporal. «Llegaron» es posible, pero menos precisa respecto del desplazamiento previo.
theological_decisions:
- issue: Sentido moral de טִמֵּא en contexto sexual
  english_pob_reading: had defiled ... in this context it refers to the sexual dishonoring of Dinah
  chosen_spanish_reading: había deshonrado ... en este contexto alude al ultraje sexual de Dina
  alternative_spanish_readings:
  - había contaminado
  - había violado
  rationale: El español necesita una expresión que conserve tanto la carga de impureza/mancilla como el daño personal. «Deshonrado» con nota explicativa mantiene la tensión sin convertir el verbo en un tecnicismo ritual ni sustituirlo por un término jurídico que el hebreo no usa de forma explícita.
  doctrine_reference: Pureza/impureza ritual y ultraje moral en el vocabulario bíblico; cf. Levítico 18; Deuteronomio 22, según uso léxico contextual.
translation_notes:
  revision_awareness: Se revisó el valor de טִמֵּא frente a la lectura inglesa «defiled» y se optó por «deshonrado» para un español más natural sin perder la tensión moral y sexual del hebreo. El resto del versículo sigue de cerca la sintaxis narrativa del texto fuente y del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «ganado» como equivalente amplio de מִקְנֶה, coherente con un español bíblico claro y no técnico.
  - «Guardó silencio» conserva la deliberación del hebreo y resulta más literario que «no dijo nada».
