  language: en
  yaml_path: translation/ot/genesis/047/026.yaml
  text: 'So Joseph made it a statute to this day concerning the land of Egypt: a fifth belongs to Pharaoh[d][c][b][a]. Only the land of the priests alone did not become Pharaoh’s.'
