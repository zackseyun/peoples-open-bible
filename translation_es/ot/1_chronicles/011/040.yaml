- source_word: הַיִּתְרִי
  english_pob_choice: the Ithrite
  chosen_spanish: el jitreo
  alternatives_spanish:
  - el itrita
  - el jitrí
  lexicon: HALOT
  rationale: Se conserva la repetición idéntica del gentilicio para Gareb, como en el hebreo y en la tradición de la POB inglesa.
translation_notes:
  revision_awareness: El texto hebreo y la POB inglesa están en alto acuerdo; no hay revisiones aplicadas. La única decisión sensible es la transliteración del gentilicio, donde el inglés admite "Ithrite" o "Jithrite". En español se optó por una forma gentilicia natural y consistente.
  spanish_consistency_notes:
  - 'Se mantuvo el orden de los nombres del hebreo: primero Ira y luego Gareb.'
  - Se repitió el mismo gentilicio para ambos nombres, sin variar la forma dentro del versículo.
  - Se evitó añadir artículos o explicaciones no presentes en el texto base, salvo la marca de nota para la alternativa lexical.
