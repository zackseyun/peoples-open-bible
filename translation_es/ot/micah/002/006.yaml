    rationale: Aunque el hebreo permite «profetizar», el audit trail justificó «preach» como mejor equivalente principal por fluidez y tono en contexto. En español, «prediquen / predican» transmite mejor esa decisión sin perder la nota sobre el sentido literal/metafórico.
