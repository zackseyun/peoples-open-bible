translation:
  language: es
  text: Entonces partieron[a], y un terror de parte de Dios cayó sobre las ciudades que estaban alrededor de ellos, de modo que no persiguieron a los hijos de Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el terror de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסָּעוּ
  english_pob_choice: Then they set out
  chosen_spanish: Entonces partieron
  alternatives_spanish:
  - Y viajaron
  - Y se pusieron en camino
  lexicon: HALOT
  rationale: El valor narrativo del wayyiqtol avanza la acción; «partieron» expresa de forma natural el movimiento del grupo sin perder el sentido de salida/avance del verbo נסע.
- source_word: וַיְהִי
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - hubo
  - vino sobre
  lexicon: HALOT
  rationale: Aunque היה puede ser «hubo» o «fue», el giro con עַל en español se expresa con naturalidad mediante «cayó sobre», conservando el efecto eventivo de la frase.
- source_word: חִתַּת אֱלֹהִים
  english_pob_choice: a terror from God
  chosen_spanish: un terror de parte de Dios
  alternatives_spanish:
  - el terror de Dios
  - un temor enviado por Dios
  lexicon: HALOT
  rationale: «חִתַּת» denota terror, pavor o espanto. «De parte de Dios» comunica bien la procedencia/divina agencia que la POB inglesa quiso señalar con «from God», sin convertir la construcción en una fórmula demasiado rígida.
- source_word: עַל הֶעָרִים
  english_pob_choice: on the cities
  chosen_spanish: sobre las ciudades
  alternatives_spanish:
  - contra las ciudades
  - en las ciudades
  lexicon: HALOT
  rationale: El hebreo usa עַל con sentido locativo/direccional. «Sobre» mantiene la imagen y funciona bien con el verbo «cayó».
- source_word: אֲשֶׁר סְבִיבֹתֵיהֶם
  english_pob_choice: that were around them
  chosen_spanish: que estaban alrededor de ellos
  alternatives_spanish:
  - que los rodeaban
  - que estaban en torno a ellos
  lexicon: HALOT
  rationale: La frase relativa identifica las ciudades cercanas al grupo de Jacob. «Alrededor de ellos» es claro y fiel, sin sobrecargar el texto.
- source_word: וְלֹא רָדְפוּ אַחֲרֵי
  english_pob_choice: so that they did not pursue
  chosen_spanish: de modo que no persiguieron
  alternatives_spanish:
  - y no persiguieron
  - así que no fueron tras
  lexicon: HALOT
  rationale: La partícula resultativa se expresa naturalmente con «de modo que». Con רדף, «perseguir» conserva el sentido de hostilidad o seguimiento agresivo.
- source_word: בְּנֵי יַעֲקֹב
  english_pob_choice: the sons of Jacob
  chosen_spanish: los hijos de Jacob
  alternatives_spanish:
  - los hijos varones de Jacob
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Aunque בְּנֵי es literalmente «hijos/sons», en español bíblico «hijos de Jacob» reproduce el referente familiar de manera natural. Se evita neutralizar o masculinizar de forma artificial; el contexto narrativo ya señala la descendencia masculina concreta.
theological_decisions:
- issue: Origen y sentido de חִתַּת אֱלֹהִים
  english_pob_reading: a terror from God
  chosen_spanish_reading: un terror de parte de Dios
  alternative_spanish_readings:
  - el terror de Dios
  - un gran terror
  rationale: La cláusula sugiere una acción protectora de origen divino. «De parte de Dios» deja visible la procedencia sin cerrar innecesariamente la relación semántica entre el sustantivo y el genitivo constructo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Preservación del masculino plural en בְּנֵי יַעֲקֹב
  english_pob_reading: the sons of Jacob
  chosen_spanish_reading: los hijos de Jacob
  alternative_spanish_readings:
  - los hijos varones de Jacob
  - los descendientes de Jacob
  rationale: El texto hebreo refiere a los varones de la familia de Jacob. «Hijos de Jacob» es la opción española más natural y mantiene el referente masculino sin recurrir a una paráfrasis más amplia.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El inglés POB no mostró revisiones aplicadas en este versículo y el control cruzado indicó alta concordancia; por eso la propuesta española sigue de cerca la lectura auditada, ajustando solo la formulación para que suene natural y transparente en español.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se conserva el matiz de procedencia divina en «de parte de Dios», en línea con la nota alternativa inglesa.
  - Se usa «hijos de Jacob» como equivalente natural de «sons of Jacob» en este contexto narrativo.
  - La puntuación y la sintaxis buscan una lectura pública clara, sin introducir explicaciones no presentes en el hebreo.
