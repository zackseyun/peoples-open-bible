translation:
  language: es
  text: Él mira la tierra[a], y ella tiembla; toca los montes, y humean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «El que mira la tierra, y ella tiembla; toca los montes, y humean».

      '
    reason: alternative_reading
lexical_decisions:
- source_word: הַמַּבִּיט
  english_pob_choice: He looks at
  chosen_spanish: El que mira
  alternatives_spanish:
  - El que contempla
  - Aquel que mira
  lexicon: HALOT
  rationale: El participio hiphil funciona aquí como una descripción sustantiva del sujeto divino. En español, «El que mira» conserva el valor participial y la referencia contextual a Dios sin forzar un pronombre explícito que no está en el hebreo.
- source_word: לָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - el suelo
  lexicon: HALOT
  rationale: En el contexto cósmico del salmo, אֶרֶץ se entiende mejor como «tierra» en sentido universal, no como territorio local.
- source_word: וַתִּרְעָד
  english_pob_choice: and it trembles
  chosen_spanish: y ella tiembla
  alternatives_spanish:
  - y tiembla
  - y se estremece
  lexicon: HALOT
  rationale: רעד expresa temblor o estremecimiento. «Tiembla» es natural y poético en español; se explicita «ella» para conservar la concordancia con «la tierra» y el paralelismo del verso.
- source_word: יִגַּע
  english_pob_choice: he touches
  chosen_spanish: el que toca
  alternatives_spanish:
  - toca
  - si toca
  lexicon: HALOT
  rationale: נגע significa «tocar» de manera simple y directa. Se mantiene la construcción participial implícita del sujeto divino para conservar el paralelismo con la primera mitad del verso.
- source_word: בֶּהָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: HALOT
  rationale: הָרִים puede rendirse como «montes» o «montañas». «Montes» es una opción digna y poética en español bíblico, sin perder precisión.
- source_word: וְיֶעֱשָׁנוּ
  english_pob_choice: and they smoke
  chosen_spanish: y echan humo
  alternatives_spanish:
  - y humean
  - y humean
  lexicon: HALOT
  rationale: עשׁן describe la acción de echar humo. «Echan humo» comunica la imagen con naturalidad idiomática en español y conserva el efecto poético del original.
theological_decisions:
- issue: Sujeto divino implícito en ambas mitades del verso
  english_pob_reading: Render the subject as 'He,' referring to God from the surrounding context.
  chosen_spanish_reading: 'Mantener un sujeto implícito y sustantivado: «El que mira... el que toca...», refiriéndolo a Dios por el contexto.'
  alternative_spanish_readings:
  - Él mira... y la tierra tiembla; él toca...
  - El que mira la tierra... y tiembla; toca los montes...
  rationale: El hebreo presenta una descripción participial sin un nombre divino explícito en el verso. La forma sustantivada española preserva esa cualidad poética y deja que el contexto del salmo identifique al sujeto como Yahvé.
  doctrine_reference: Contexto literario de Salmo 104; uso reverente del nombre divino en la serie POB
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: el texto inglés permanece sin cambios tras la última pasada, con acuerdo alto entre revisores. No se detectan variantes textuales que alteren el sentido del hebreo masorético usado aquí.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención POB cuando el contexto identifica al sujeto divino, aunque en este versículo no aparece el tetragrámaton de forma explícita.
  - Se prefirió «montes» sobre «montañas» por tonalidad poética y consistencia con registros bíblicos en español.
  - La nota alternativa conserva la posibilidad de una traducción más formal del participio hebreo, tal como el audit trail inglés la documenta.
