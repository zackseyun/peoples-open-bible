base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/031/004.yaml
  text: Then Saul said to his armor-bearer[a], “Draw your sword and thrust me through with it, lest these uncircumcised men come and thrust me through and mistreat me.” But his armor-bearer was not willing, because he was very afraid. So Saul took the sword and fell on it.
