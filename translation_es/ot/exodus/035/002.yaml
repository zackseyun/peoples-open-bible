translation:
  language: es
  text: Se podrá hacer trabajo durante seis días, pero en el séptimo día habrá para ustedes un sábado santo, un sábado de completo reposo[a] para Yahvé[b]. Cualquiera que haga trabajo en él será condenado a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un sábado de solemne reposo». La expresión hebrea «sábado, sábado de reposo» intensifica la idea de cesación completa del trabajo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «a Yahvé»; también puede entenderse como «para Yahvé» o «perteneciente a Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּעָשֶׂה
  english_pob_choice: may be done
  chosen_spanish: se podrá hacer
  alternatives_spanish:
  - se hará
  - podrá hacerse
  - será hecho
  lexicon: HALOT
  rationale: El nifal imperfecto expresa la acción de manera pasiva/impersonal. En español, «se podrá hacer» conserva ese carácter general y normativo sin forzar un sujeto explícito ni reducir indebidamente el valor legal del enunciado.
- source_word: מְלָאכָה
  english_pob_choice: work
  chosen_spanish: trabajo
  alternatives_spanish:
  - obra
  - labor
  - actividad
  lexicon: HALOT
  rationale: En este contexto legal de sábado, el término designa el trabajo ordinario o la labor realizada. «Trabajo» es claro y natural en español, y mantiene el sentido general de ocupación o actividad laboral.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santidad
  alternatives_spanish:
  - santo
  - sagrado
  - un día santo
  lexicon: HALOT
  rationale: 'Aquí el hebreo funciona como un predicado de estado consagrado. «Santidad» conserva el matiz nominal del original: el día queda caracterizado por su condición apartada para Dios, sin añadir una formulación demasiado libre.'
- source_word: שַׁבַּת שַׁבָּתוֹן
  english_pob_choice: a complete rest
  chosen_spanish: un sábado de completo reposo
  alternatives_spanish:
  - un sábado de solemne reposo
  - un sábado de reposo total
  - un sábado, un reposo completo
  lexicon: HALOT
  rationale: La expresión hebrea intensifica la idea de reposo sabático. «Sábado de completo reposo» reproduce esa intensificación de manera idiomática en español y conserva el énfasis en cesación total de trabajo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  - perteneciente a Yahvé
  lexicon: HALOT
  rationale: El texto hebreo usa לַ־ para orientación/dedicación. En español, «para Yahvé» expresa bien que el sábado está dedicado u orientado a él, en línea con el criterio del proyecto de usar «Yahvé» para el nombre divino.
- source_word: כָּל הָעֹשֶׂה
  english_pob_choice: Whoever does
  chosen_spanish: Cualquiera que haga
  alternatives_spanish:
  - Todo el que haga
  - Quien haga
  - El que haga
  lexicon: HALOT
  rationale: Se trata de una cláusula legal general. «Cualquiera que haga» preserva el alcance universal y suena natural en español jurídico-bíblico.
- source_word: בּוֹ
  english_pob_choice: on it
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - durante él
  - en ese día
  lexicon: HALOT
  rationale: El referente es el día de reposo. «En él» mantiene la referencia al día y evita una paráfrasis más explicativa que el hebreo no exige.
- source_word: יוּמָת
  english_pob_choice: shall surely be put to death
  chosen_spanish: morirá ciertamente
  alternatives_spanish:
  - será muerto
  - será puesto a muerte
  - será ejecutado
  lexicon: HALOT
  rationale: El hofal de מות presenta una sanción legal pasiva. «Morirá ciertamente» conserva la fórmula legal severa y su equivalencia idiomática en español, sin introducir un sujeto agente no expresado.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  - Jehová
  rationale: El hebreo tiene el Tetragrámaton y el proyecto pide usar «Yahvé» como forma principal en español. Esto preserva la distinción del nombre del pacto sin sustituirlo por una máscara titulativa.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de שַׁבַּת שַׁבָּתוֹן
  english_pob_reading: a complete rest
  chosen_spanish_reading: un sábado de completo reposo
  alternative_spanish_readings:
  - un sábado de solemne reposo
  - un sábado de reposo total
  rationale: La duplicación hebrea intensifica el reposo sabático. En español, «completo reposo» comunica la plenitud de la cesación del trabajo sin atenuar la fuerza normativa ni espiritual del texto.
  doctrine_reference: HALOT s.v. שׁבת / שׁבתון
translation_notes:
  revision_awareness: 'El audit trail en inglés ya evaluó la traducción como estable en la última pasada (unchanged=true) con acuerdo alto (0.92) y solo observaciones menores. La redacción española sigue esa lectura, manteniendo las decisiones clave: pasivo impersonal para תֵּעָשֶׂה, intensificación de שַׁבַּת שַׁבָּתוֹן, y nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva un registro legal y solemne, sin suavizar la sanción final.
  - «Reposo» se usa para reflejar la idea sabática de cesación, no como mera inactividad casual.
  - La puntuación divide claramente la apódosis normativa y la sanción final.
