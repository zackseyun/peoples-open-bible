  text: שָׂרַ֣יִ/ךְ סוֹרְרִ֗ים וְ/חַבְרֵי֙ גַּנָּבִ֔ים כֻּלּ/וֹ֙ אֹהֵ֣ב שֹׁ֔חַד וְ/רֹדֵ֖ף שַׁלְמֹנִ֑ים יָתוֹם֙ לֹ֣א יִשְׁפֹּ֔טוּ וְ/רִ֥יב אַלְמָנָ֖ה לֹֽא יָב֥וֹא אֲלֵי/הֶֽם־׃פ
