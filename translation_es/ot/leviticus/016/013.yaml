translation:
  language: es
  text: Y pondrá el incienso sobre el fuego delante de Yahvé[a], de modo que la nube del incienso cubra el propiciatorio[b] que está sobre el Testimonio, para que no muera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El Nombre divino hebreo יְהוָה se traduce aquí como «Yahvé» conforme al estándar del proyecto.
    reason: source_note
  - marker: b
    text: O «asiento de misericordia». El término hebreo designa la cubierta del arca, especialmente en su función dentro de los ritos de expiación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  english_pob_choice: he shall put
  chosen_spanish: pondrá
  alternatives_spanish:
  - colocará
  - pondrá allí
  lexicon: HALOT
  rationale: La forma verbal en este contexto ritual tiene fuerza instruccional/futura. «Pondrá» mantiene la función directiva y suena natural en español bíblico contemporáneo.
- source_word: הַקְּטֹרֶת
  english_pob_choice: the incense
  chosen_spanish: el incienso
  alternatives_spanish:
  - la mezcla aromática
  - el sahumerio
  lexicon: HALOT
  rationale: El sustantivo designa el incienso usado en el rito del santuario. «Incienso» es el equivalente más directo y transparente en español.
- source_word: עַל הָאֵשׁ
  english_pob_choice: on the fire
  chosen_spanish: sobre el fuego
  alternatives_spanish:
  - encima del fuego
  - sobre las brasas
  lexicon: HALOT
  rationale: La expresión describe poner el incienso sobre el fuego ardiente. «Sobre el fuego» conserva la imagen sin añadir precisión no explicitada por el hebreo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, y «delante de» conserva el valor cultual de presencia inmediata ante Dios.
- source_word: וְכִסָּה עֲנַן הַקְּטֹרֶת
  english_pob_choice: so that the cloud of the incense may cover
  chosen_spanish: de modo que la nube del incienso cubra
  alternatives_spanish:
  - y la nube del incienso cubrirá
  - para que la nube del incienso cubra
  lexicon: HALOT
  rationale: La cláusula expresa resultado/intención. «De modo que» comunica bien la relación sin forzar un matiz exclusivamente consecutivo o final.
- source_word: הַכַּפֹּרֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta de expiación
  - el asiento de misericordia
  lexicon: HALOT
  rationale: En español bíblico, «propiciatorio» es el término tradicional y preciso para la cubierta del arca asociada con la expiación. Se evita crear un neologismo poco natural, pero se conserva la referencia cultual técnica.
- source_word: אֲשֶׁר עַל הָעֵדוּת
  english_pob_choice: that is over the testimony
  chosen_spanish: que está sobre el Testimonio
  alternatives_spanish:
  - que está sobre el testimonio
  - que está sobre las tablas del Testimonio
  lexicon: HALOT
  rationale: «El Testimonio» mantiene el término técnico del arca/tabernáculo y respeta su uso reverencial. La expansión a «tablas» sería interpretativa y no necesaria en el texto principal.
- source_word: וְלֹא יָמוּת
  english_pob_choice: so that he may not die
  chosen_spanish: y así no morirá
  alternatives_spanish:
  - para que no muera
  - para que no muera así
  lexicon: HALOT
  rationale: El hebreo expresa el resultado protector del rito. «Y así no morirá» conserva la relación lógica y suena fluido en español sin perder el sentido de prevención.
theological_decisions:
- issue: הַכַּפֹּרֶת en contexto de expiación ritual
  english_pob_reading: mercy seat
  chosen_spanish_reading: propiciatorio
  alternative_spanish_readings:
  - mercy seat (en nota)
  - cubierta de expiación
  rationale: El término tiene carga técnica en la legislación del santuario. «Propiciatorio» es una equivalencia asentada en español bíblico y comunica el lugar/objeto vinculado al rito de expiación sin recurrir a una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §1, §6
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se aplica el estándar del proyecto para el Nombre divino. «Yahvé» preserva la forma reverente y reconocible en español, evitando la sustitución por un título.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto inglés muestra una revisión reciente que sustituyó «atonement cover» por «mercy seat» por considerarlo más estándar y natural en inglés. En español, se conserva la equivalencia tradicional y técnica «propiciatorio», que comunica con claridad el mismo referente cultual sin perder precisión ni depender de un calco poco idiomático.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «El Testimonio» se conserva con mayúscula por tratarse del término técnico tabernacular.
  - La cláusula final se traduce como resultado/protección del rito, sin añadir elementos no presentes en el hebreo.
  - Se evita traducir mecánicamente desde el inglés cuando el español cuenta con un término bíblico tradicional más exacto, como «propiciatorio» para הַכַּפֹּרֶת.
