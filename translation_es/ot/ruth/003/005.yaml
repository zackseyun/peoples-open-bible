review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: respuesta de Rut a Noemí, totalidad de obediencia (''todo lo que''), y resolución futura (''haré''). Sin embargo, ancla una nota textual sobre ''le dijo'' que no corresponde a la alternativa inglesa, y añade un pronombre objeto (''lo'') que no está explícito en el hebreo ni es necesario en español aquí.'
  spanish_quality_summary: 'El español es natural y claro, pero puede mejorarse: «Y ella le dijo[a]» ubica la nota en un lugar incorrecto, y «lo haré» suena aceptable pero algo más interpretativo que «haré». También puede simplificarse el sujeto explícito; sin embargo, conservar «ella» no es problemático.'
  glossary_alignment: 'No hay términos teológicos o de glosario de proyecto en juego. La decisión clave es estilística y de fidelidad sintáctica: mantener «Todo lo que digas, haré»/«haré» mejor que introducir un objeto explícito.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «le dijo» pero el contenido de la nota alternativa corresponde a «Todo lo que...»
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Aquí la alternativa inglesa afecta a כֹּל אֲשֶׁר ('All that' / 'Everything that'), no al verbo introductorio.
  - severity: medium
    issue: «lo haré» añade un objeto explícito no presente en el hebreo
    rationale: Aunque en español puede sonar natural, «haré» basta y preserva mejor la elipsis del original y la decisión inglesa de no añadir 'it'.
  - severity: low
    issue: El pronombre enfático «tú» no es necesario
    rationale: «Todo lo que digas» suena más natural en español neutral sin perder el valor de 2fs ya claro en la flexión verbal.
  revised_spanish_text: 'Y ella le dijo: «Todo lo que digas[a], haré».'
  revised_footnotes:
  - marker: a
    text: 'O: «Todo cuanto digas, haré».'
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al sintagma correcto («Todo lo que digas»), se elimina el objeto añadido «lo» para seguir más de cerca el hebreo y la auditoría inglesa, y se quita el pronombre «tú» por naturalidad en español sin pérdida de sentido.
