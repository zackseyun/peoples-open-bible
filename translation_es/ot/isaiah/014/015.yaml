translation:
  language: es
  text: Pero tú serás precipitado al Seol[a], a las profundidades del pozo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tumba» o «el reino de los muertos» para «Seol».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  - No obstante
  lexicon: HALOT
  rationale: La partícula introduce un contraste fuerte con la jactancia previa; «Pero» comunica en español esa reversión retórica de manera natural y fiel.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - la tumba
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se conserva el término transliterado para no reducir el concepto hebreo a una tumba física ni resolverlo doctrinalmente como un equivalente posterior; «Seol» mantiene la tensión semántica del original.
- source_word: תּוּרָד
  english_pob_choice: you will be brought down
  chosen_spanish: serás derribado
  alternatives_spanish:
  - serás hecho bajar
  - serás llevado abajo
  - caerás
  lexicon: HALOT
  rationale: El Hophal expresa una acción pasiva/causativa de ser llevado a lo bajo. «Serás derribado» conserva la idea de humillación y descenso impuesto, con un español más natural que una calca de «serás traído abajo».
- source_word: יַרְכְּתֵי
  english_pob_choice: the depths of
  chosen_spanish: los profundos lugares de
  alternatives_spanish:
  - las profundidades de
  - los rincones más remotos de
  - las partes más hondas de
  lexicon: HALOT
  rationale: La construcción apunta a las partes más internas o más lejanas. «Los profundos lugares de» preserva la imagen de hondura sin forzar un término técnico y funciona bien en el paralelismo poético.
- source_word: בּוֹר
  english_pob_choice: the pit
  chosen_spanish: pozo
  alternatives_spanish:
  - foso
  - sepulcro
  - abismo
  lexicon: HALOT
  rationale: «Pozo» reproduce la imagen concreta de hoyo o cavidad profunda y mantiene el paralelo poético con Seol. «Sepulcro» o «abismo» desplazarían la imagen hacia un matiz más interpretativo.
theological_decisions:
- issue: Mantenimiento de Seol como término transliterado en un juicio poético
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  rationale: La POB inglesa retiene «Sheol» para preservar el concepto hebreo sin cerrarlo a una sola doctrina posterior. En español, «Seol» conserva esa misma apertura y evita resolver la referencia en favor de «la tumba» o de un «infierno» no expresado aquí.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar nada; esta propuesta sigue el consenso alto del análisis inglés y conserva la misma decisión de mantener el término transliterado para שְׁאוֹל, con una equivalencia española idiomática para el resto de la cláusula.
  spanish_consistency_notes:
  - Se mantiene «Seol» de forma consistente con el criterio POB para שְׁאוֹל.
  - «Serás derribado» refleja el valor pasivo/causativo del verbo hebreo sin perder naturalidad en español.
  - «Pozo» conserva el paralelismo imagístico con «Seol» y evita introducir una interpretación más específica que el hebreo no exige.
