translation:
  language: es
  text: Y de entre los sacerdotes y de entre los levitas no hallé a nadie allí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo/MT proporcionado para esta ubicación no coincide estrechamente con el griego; por eso se sigue el griego como testigo principal.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν ἱερέων
  english_pob_choice: from the priests
  chosen_spanish: de entre los sacerdotes
  alternatives_spanish:
  - de los sacerdotes
  - entre los sacerdotes
  lexicon: BDAG
  rationale: Conserva la idea distributiva de ἐκ τῶν dentro de un grupo y suena natural en español. «Sacerdotes» es el término estándar para ἱερέων.
- source_word: ἐκ τῶν Λευειτῶν
  english_pob_choice: from the Levites
  chosen_spanish: de entre los levitas
  alternatives_spanish:
  - de los levitas
  - entre los levitas
  lexicon: BDAG
  rationale: Mantiene el paralelismo con la primera frase y refleja la misma preposición griega. «Levitas» es la transliteración estable y clara en español.
- source_word: οὐχ εὗρον
  english_pob_choice: I found no one
  chosen_spanish: no hallé
  alternatives_spanish:
  - no encontré
  - no hallé a nadie
  lexicon: BDAG
  rationale: El verbo griego está en primera persona singular; «hallé» conserva esa persona y el tono sobrio del registro bíblico. El objeto implícito queda claro por el contexto, y «allí» completa el sentido locativo.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - en ese lugar
  lexicon: BDAG
  rationale: «Allí» es la correspondencia locativa más directa y natural para ἐκεῖ.
theological_decisions:
- issue: Lectura primaria del texto griego frente al paralelo hebreo/MT aproximado
  english_pob_reading: 'Translate the Greek clause as the primary text: ''And from the priests and from the Levites I found no one there.'''
  chosen_spanish_reading: 'Traducir el griego como texto primario: «Y de entre los sacerdotes y de entre los levitas no hallé allí».'
  alternative_spanish_readings:
  - Una adaptación al paralelo hebreo aproximado, si se intentara reconstruir otro contenido.
  - «Y entre los sacerdotes y los levitas no hallé allí».
  - «Y de los sacerdotes y de los levitas no encontré a nadie allí».
  rationale: La evidencia suministrada indica una discrepancia importante entre el griego y el paralelo MT aproximado; por tanto, la traducción debe seguir el testimonio griego, sin intentar armonizarlo con un texto paralelo no alineado verbalmente. La redacción española conserva esa prioridad textual.
  doctrine_reference: 'PHILOSOPHY.md: primacía del idioma original para libros deuterocanónicos; los paralelos hebreos/MT funcionan como control cruzado, no como corrección automática.'
translation_notes:
  revision_awareness: El pasaje fue revisado previamente sin cambios necesarios; mantengo la lectura griega como base y conservo la nota de variante textual para reflejar el desajuste documentado con el paralelo hebreo/MT.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando corresponda; aquí no aparece el nombre divino.
  - «Levitas» y «sacerdotes» siguen la terminología bíblica estándar y coherente con el resto del proyecto.
  - La persona verbal en primera persona singular («hallé») respeta el griego οὐχ εὗρον.
