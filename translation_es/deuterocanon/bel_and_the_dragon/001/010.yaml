translation:
  language: es
  text: 'Daniel dijo al rey: «Que sea conforme a su palabra[a]». Y había setenta sacerdotes de Bel, además de mujeres y niños[b]; y entró[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego, literalmente: «según su palabra». El sentido es el asentimiento de Daniel a la propuesta del rey.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «aparte de mujeres y niños» / «sin contar a mujeres y niños».'
    reason: lexical_alternative
  - marker: c
    text: El griego termina con «y vino», dejando el destino sin especificar en este versículo; el contexto siguiente permite entender «entró».
    reason: cross_reference
lexical_decisions:
- source_word: Γινέσθω
  english_pob_choice: Let it be
  chosen_spanish: Hágase
  alternatives_spanish:
  - Que sea
  - Así sea
  lexicon: LSJ
  rationale: El imperativo de tercera persona de γίνομαι expresa aquí asentimiento a la propuesta del rey. «Hágase» conserva el valor exhortativo y suena natural en español sin añadir una idea más fuerte que la del griego.
- source_word: κατὰ τὸ ῥῆμά σου
  english_pob_choice: according to your word
  chosen_spanish: conforme a tu palabra
  alternatives_spanish:
  - según tu palabra
  - como has dicho
  lexicon: LSJ
  rationale: ῥῆμα remite a lo dicho por el rey, no necesariamente a un mandato formal. «Conforme a tu palabra» mantiene el tono solemne y la correspondencia verbal del original.
- source_word: ἱερεῖς
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes del templo
  lexicon: LSJ
  rationale: En español bíblico actual «sacerdotes» comunica bien la función cultual de ἱερεῖς. No hace falta ampliar con «del templo» porque el genitivo siguiente ya los vincula con Bel.
- source_word: τοῦ Βὴλ
  english_pob_choice: of Bel
  chosen_spanish: de Bel
  alternatives_spanish:
  - del dios Bel
  - pertenecientes a Bel
  lexicon: LSJ
  rationale: El genitivo indica pertenencia o asociación con la deidad Bel. «De Bel» es la forma más directa y fiel, sin explicitar más de lo que el texto dice.
- source_word: ἑβδομήκοντα
  english_pob_choice: seventy
  chosen_spanish: setenta
  lexicon: LSJ
  rationale: Número cardinal directo, sin dificultad especial.
- source_word: ἐκτὸς γυναικῶν καὶ τέκνων
  english_pob_choice: besides women and children
  chosen_spanish: además de mujeres y niños
  alternatives_spanish:
  - aparte de mujeres y niños
  - sin contar a mujeres y niños
  lexicon: LSJ
  rationale: ἐκτός marca exclusión del cómputo. «Además de» preserva que mujeres y niños no están incluidos en los setenta, con un español claro y natural.
- source_word: ἦλθεν
  english_pob_choice: he came in
  chosen_spanish: entró
  alternatives_spanish:
  - vino
  - llegó
  lexicon: LSJ
  rationale: Aunque el griego solo dice literalmente «vino», el contexto inmediato en la versión inglesa auditada entiende que se trata de entrar en el lugar narrativo. «Entró» refleja mejor ese sentido contextual en español sin exagerar el verbo.
theological_decisions:
- issue: Tratamiento del nombre divino y títulos cultuales en un pasaje no canónico hebreo-griego
  english_pob_reading: The verse speaks of Bel and priests of Bel without invoking YHWH.
  chosen_spanish_reading: Se mantiene Bel como nombre propio de la deidad y sacerdotes como término cultual, sin introducir terminología cristiana ajena al pasaje.
  alternative_spanish_readings:
  - Señor
  - ídolos
  rationale: El texto no menciona a Yahvé ni usa un lenguaje que requiera sustitución devocional. Traducir con el vocabulario propio del relato preserva su marco religioso y narrativo.
  doctrine_reference: Fidelidad al marco literario del deuterocanon/apócrifo narrativo; no hay afirmación doctrinal directa que requiera armonización
translation_notes:
  revision_awareness: La versión inglesa auditada añadió «in» al final para reflejar ἦλθεν en contexto. En español se optó por «entró», que integra ese ajuste revisionado de forma más natural y precisa que un simple «vino».
  spanish_consistency_notes:
  - Se mantiene la traducción directa de Bel como «Bel», sin glosa adicional dentro del texto principal.
  - Se conserva la distinción entre asentimiento («Hágase») y mandato («tu palabra») sin intensificar el verbo hacia una orden.
  - El marcador de nota al pie aparece anclado en las palabras relevantes del texto principal.
  - La secuencia narrativa queda completa y natural en español con «entró» para el final abierto del versículo.
