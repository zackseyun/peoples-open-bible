translation:
  language: es
  text: Después de dos años, el rey envió a las ciudades de Judá a un recaudador principal de tributo, y este llegó a Jerusalén con una gran multitud[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una fuerza numerosa» o «con una fuerza imponente». El griego literalmente dice «con una multitud pesada», un modismo que sugiere un acompañamiento considerable.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δύο ἐτῶν ἡμερῶν
  english_pob_choice: After two years had passed
  chosen_spanish: Después de que habían pasado dos años
  alternatives_spanish:
  - Después de dos años
  - Después de un intervalo de dos años
  lexicon: LSJ
  rationale: La construcción griega expresa tiempo transcurrido. En español, «después de que habían pasado dos años» conserva el valor idiomático sin sonar rígido ni literal en exceso.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: El aoristo de ἀποστέλλω se rinde naturalmente con «envió». Es claro, fiel y funciona bien en registro histórico.
- source_word: ἄρχοντα φορολογίας
  english_pob_choice: a chief collector of tribute
  chosen_spanish: un jefe cobrador de tributo
  alternatives_spanish:
  - un oficial de tributación
  - un recaudador principal de tributo
  - un magistrado de impuestos
  lexicon: LSJ
  rationale: ἄρχων indica autoridad u պաշտոն/funcionario, y φορολογία alude a tributo o tributación. «Jefe cobrador de tributo» conserva la idea de cargo oficial y el campo semántico fiscal sin reducirlo a un simple recaudador local.
- source_word: εἰς τὰς πόλεις Ἰούδα
  english_pob_choice: to the cities of Judah
  chosen_spanish: a las ciudades de Judá
  alternatives_spanish:
  - hacia las ciudades de Judá
  - a las ciudades de Judea
  lexicon: LSJ
  rationale: «A las ciudades de Judá» refleja adecuadamente εἰς en contexto de envío. Se conserva «Judá» como transliteración geográfica estándar para Ἰούδα.
- source_word: ἐν ὄχλῳ βαρεῖ
  english_pob_choice: with a large force
  chosen_spanish: con una gran fuerza
  alternatives_spanish:
  - con una gran multitud
  - con una fuerza numerosa
  - con una gran muchedumbre
  lexicon: LSJ
  rationale: La expresión griega literalmente dice «con una multitud pesada», idiomáticamente entendida como un acompañamiento numeroso y poderoso. «Con una gran fuerza» capta mejor el contexto administrativo-militar que «multitud» en español, sin perder la idea de gran cantidad.
translation_notes:
  revision_awareness: Se siguió el contexto auditado del inglés POB, especialmente la actualización de ἐν ὄχλῳ βαρεῖ de «heavy crowd» a «large force» por naturalidad y precisión contextual. La redacción española adopta esa misma orientación semántica, evitando una traducción demasiado literal de «multitud pesada».
  spanish_consistency_notes:
  - Se mantuvo «Judá» para Ἰούδα en sentido geográfico.
  - Se evitó «SEÑOR» porque no hay aquí referencia al nombre divino.
  - «Tributo» se conservó para reflejar φορολογία y el contexto fiscal-político del pasaje.
  - El marcador de nota [a] aparece solo donde hay una alternativa/nota léxica pertinente.
