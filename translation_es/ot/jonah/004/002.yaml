  text: וַ/יִּתְפַּלֵּ֨ל אֶל יְהוָ֜ה וַ/יֹּאמַ֗ר אָנָּ֤ה יְהוָה֙ הֲ/לוֹא זֶ֣ה דְבָרִ֗/י עַד הֱיוֹתִ/י֙ עַל אַדְמָתִ֔/י עַל כֵּ֥ן קִדַּ֖מְתִּי לִ/בְרֹ֣חַ תַּרְשִׁ֑ישָׁ/ה כִּ֣י יָדַ֗עְתִּי כִּ֤י אַתָּה֙ אֵֽל חַנּ֣וּן וְ/רַח֔וּם אֶ֤רֶךְ אַפַּ֨יִם֙ וְ/רַב חֶ֔סֶד וְ/נִחָ֖ם עַל הָ/רָעָֽה־־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jonah/004/002.yaml
  text: And he prayed to Yahweh and said[a], “Please, Yahweh, was this not what I said while I was still in my own land? Therefore I fled ahead to Tarshish, because I knew that you are a gracious and compassionate God, slow to anger and abundant in steadfast love[c][b], and relenting concerning the disaster.”
  footnotes:
  - marker: a
    text: Or 'I hastened to flee to Tarshish' or 'I anticipated this by fleeing to Tarshish.' The Hebrew verb conveys acting in advance or going before.
    reason: lexical_alternative
  - marker: b
    text: Or 'merciful' for 'compassionate.' The phrase echoes Exodus 34:6.
    reason: cross_reference
  - marker: c
    text: Or 'relenting from the calamity.' The Hebrew says 'the evil/disaster,' using 'evil' in the sense of threatened judgment, not moral evil in God.
    reason: lexical_alternative
