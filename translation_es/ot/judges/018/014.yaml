translation:
  language: es
  text: 'Entonces los cinco hombres que habían ido a reconocer la tierra de Lais respondieron y dijeron a sus hermanos: «¿Saben que en estas casas hay un efod[a], terafines[b], una imagen tallada y una imagen fundida[c]? Así que ahora, sepan qué harán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Efod: término hebreo para un objeto cultual; el texto no especifica aquí más detalles sobre su forma o función.'
    reason: lexical_alternative
  - marker: b
    text: 'Terafines: término técnico hebreo; suele referirse a imágenes o estatuillas de culto doméstico, pero se conserva aquí sin expandirlo en la traducción principal.'
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente también se traduce como «imagen de fundición».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - dijeron
  lexicon: HALOT
  rationale: ענה en narrativa introduce una respuesta dentro del discurso; en español, “respondieron” conserva esa función sin sonar forzado. Se evita añadir matiz explicativo extra.
- source_word: חֲמֵשֶׁת הָאֲנָשִׁים
  english_pob_choice: the five men
  chosen_spanish: los cinco hombres
  alternatives_spanish:
  - los cinco varones
  - cinco de los hombres
  lexicon: HALOT
  rationale: El número y el sustantivo se expresan de forma natural en español como “los cinco hombres”, manteniendo la referencia al grupo ya identificado.
- source_word: הַהֹלְכִים לְרַגֵּל
  english_pob_choice: who had gone to spy out
  chosen_spanish: que habían ido a reconocer
  alternatives_spanish:
  - que fueron a espiar
  - que iban a reconocer
  lexicon: HALOT
  rationale: El participio con infinitivo describe una acción ya cumplida en la narración; “habían ido” refleja bien ese trasfondo. “Reconocer” comunica la misión de exploración sin el tono más coloquial o militar de “espiar”.
- source_word: אֶת הָאָרֶץ לַיִשׁ
  english_pob_choice: the land of Laish
  chosen_spanish: la tierra de Lais
  alternatives_spanish:
  - el territorio de Lais
  - la región de Lais
  lexicon: HALOT
  rationale: אָרֶץ aquí se refiere al territorio asociado con Lais. “Tierra de Lais” preserva la forma lexical y es idiomática en español bíblico.
- source_word: אֶל אֲחֵיהֶם
  english_pob_choice: to their brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus parientes
  - a sus compañeros danitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente “sus hermanos”. En el contexto son varones de la misma compañía/tribu, y el español puede conservar “hermanos” sin perder claridad.
- source_word: הֲיְדַעְתֶּם
  english_pob_choice: Do you know
  chosen_spanish: ¿Saben?
  alternatives_spanish:
  - ¿Sabían?
  - ¿Se dan cuenta?
  lexicon: HALOT
  rationale: El interrogativo introduce información que busca provocar una reacción práctica. En español, una pregunta directa en presente mantiene esa fuerza de atención.
- source_word: כִּי יֵשׁ
  english_pob_choice: that ... there are
  chosen_spanish: que ... hay
  alternatives_spanish:
  - que ... existen
  - que ... se encuentran
  lexicon: HALOT
  rationale: El existencial יֵשׁ se traduce naturalmente por “hay” en español, y concuerda de forma fluida con la lista de objetos.
- source_word: בַּבָּתִּים הָאֵלֶּה
  english_pob_choice: in these houses
  chosen_spanish: en estas casas
  alternatives_spanish:
  - en estos edificios
  - en estas moradas
  lexicon: HALOT
  rationale: “Casas” preserva el sentido literal de בָּתִּים sin sobreinterpretar si se trata de viviendas, santuario doméstico o complejo de habitaciones.
- source_word: אֵפוֹד
  english_pob_choice: an ephod
  chosen_spanish: un efod
  alternatives_spanish:
  - un éfod
  lexicon: HALOT
  rationale: Se translitera el término cultual por no tener equivalente simple en español. “Efod” es ya un préstamo bíblico comprensible y evita precisar indebidamente su función.
- source_word: תְּרָפִים
  english_pob_choice: teraphim
  chosen_spanish: terafines
  alternatives_spanish:
  - terafim
  - ídolos domésticos
  lexicon: HALOT
  rationale: El POB inglés preservó la forma técnica “teraphim” para mantener la precisión léxica. En español, “terafines” reproduce el término sin ampliar su sentido a “ídolos domésticos”, que sería interpretativo.
- source_word: פֶּסֶל
  english_pob_choice: a carved image
  chosen_spanish: una imagen tallada
  alternatives_spanish:
  - una imagen esculpida
  - un ídolo tallado
  lexicon: HALOT
  rationale: פֶּסֶל alude a una imagen hecha por talla. “Imagen tallada” es claro y preciso, y evita el registro más arcaico de “imagen de talla” o la generalización “ídolo”.
- source_word: מַסֵּכָה
  english_pob_choice: a cast image
  chosen_spanish: una imagen fundida
  alternatives_spanish:
  - una imagen vaciada
  - una imagen moldeada
  lexicon: HALOT
  rationale: El término remite a una imagen producida por fundición, usualmente metal. “Fundida” conserva ese proceso y corresponde al valor tradicional de “cast image” sin usar “molten” como calco.
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora pues
  - Así que ahora
  lexicon: HALOT
  rationale: La partícula introduce una transición inferencial hacia la aplicación práctica. “Y ahora” mantiene la conexión discursiva de manera natural en español.
- source_word: דְּעוּ
  english_pob_choice: know
  chosen_spanish: sepan
  alternatives_spanish:
  - consideren
  - entérense
  lexicon: HALOT
  rationale: El imperativo de ידע puede exigir saber reflexivo o consideración práctica. “Sepan” conserva el vínculo verbal con la pregunta anterior y su fuerza exhortativa.
- source_word: מַה תַּעֲשׂוּ
  english_pob_choice: what you will do
  chosen_spanish: lo que harán
  alternatives_spanish:
  - qué harán
  - lo que deben hacer
  lexicon: HALOT
  rationale: El hebreo apunta a una acción deliberada por definir. “Lo que harán” mantiene la apertura futura sin añadir obligación que el texto no expresa explícitamente.
theological_decisions:
- issue: Traducción de תְּרָפִים en una lista de objetos cultuales
  english_pob_reading: 'Use concrete, minimally interpretive terms: ''ephod, teraphim, a carved image, and a cast image.'''
  chosen_spanish_reading: Conservar el término técnico terafines junto con efod, imagen tallada e imagen fundida.
  alternative_spanish_readings:
  - ídolos domésticos
  - dioses domésticos
  - terafines, explicados como imágenes de culto doméstico
  rationale: La lectura inglesa preserva la distinción entre objetos en lugar de resumirlos. En español, 'terafines' mantiene esa precisión y evita introducir una equivalencia interpretativa que el texto no fuerza.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Tratamiento de אֲחֵיהֶם
  english_pob_reading: Translate as 'their brothers.'
  chosen_spanish_reading: Traducir literalmente como 'a sus hermanos'.
  alternative_spanish_readings:
  - a sus parientes
  - a sus compañeros de tribu
  rationale: El grupo es masculino y el término de parentesco literal resulta natural en el contexto narrativo. No se neutraliza el lenguaje sin necesidad textual.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la versión inglesa auditada más reciente, pero adapta varios puntos al español con control léxico: se conserva ''terafines'' en lugar de expandir a ''ídolos domésticos'', se mantiene la lista cultual diferenciada y se ajusta la sintaxis para que la pregunta y la exhortación final suenen naturales en español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva el término técnico 'terafines' para mantener la precisión léxica y evitar interpretaciones.
  - '''Imagen tallada'' y ''imagen fundida'' siguen el contraste semántico del hebreo פֶּסֶל / מַסֵּכָה.'
  - Se prefiere 'habían ido a reconocer' para reflejar la misión ya completada en el contexto narrativo.
  - La puntuación en español abre interrogación y comillas de acuerdo con la norma tipográfica actual.
