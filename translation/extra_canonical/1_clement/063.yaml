id: 1CLEM.63
reference: 1 Clement 63
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Θεμιτὸν οὖν ἐστὶν τοῖς τοιούτοις καὶ τοσούτοις ὑποδείγμασιν προσεληλυθότας ὑποθεῖναι τὸν τράχηλον καὶ τὸν τῆς ὑπακατὰ τὸν προκείμενον ἡμῖν ἐν ἀληθείᾳ σκοπὸν δίχα παντὸς μώμου καταντήσωμεν. 2. χαρὰν γὰρ καὶ ἀγαλλίασιν ἡμῖν παρέξετε, ἐὰν ὑπήκοοι γενήμενοι τοῖς ὑφʼ ἡμῶν γεγραμμένοις διὰ τοῦ ἁγίου πνεύματος ἐκκόψητε τὴν ἄθεμον τῆς ζήλους ὑμῶν ὀργὴν κατὰ τὴν ἔντευξιν, ἣν ἐποιησάμεθα περὶ εἰρήνης καὶ ὁμονοίας ἐν τῇδε τῇ ἐπιστολῇ. 3. ἐπέμψαμεν δὲ ἄνδρας πιστοὺς καὶ σώφρονας ἀπὸ νεότητος ἀναστραφέντας ἕως γήρους ἀμέμπτως ἐν ἡμῖν, οἵτινες καὶ μάρτυρες ἔσονται μεταξὺ ὑμῶν καὶ ἡμῶν. 4. τοῦτο δὲ ἐποιήσαμεν, ἵνα εἰδῆτε, ὅτι πᾶσα ἡμῶν φροντὶς καὶ γέγονεν καὶ ἔστιν εἰς τὸ ἐν τάχει ὑμᾶς εἰρηνεῦσαι.
  language: Greek
  pages:
  - 341
  - 343
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: 'Therefore it is fitting that[a], having come near to such and so many examples, we should submit ourselves and, laying aside the arrogance of disobedience, attain the goal set before us in truth, without any blemish. 2. For you will give us joy and exultation if, becoming obedient to the things written by us through the Holy Spirit, you cut off the lawless anger of your jealousy, in accordance with the appeal that we made in this letter concerning peace and concord. 3. And we have sent faithful and prudent men, who from youth until old age have conducted themselves blamelessly among us; these also will be witnesses between you and us. 4. And we have done this so that you may know that all our care has been, and is[b][c][a], for this: that you may quickly be at peace.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'envy' for 'jealousy'; the Greek term can denote either, but here it is clearly negative in context.
    reason: lexical_alternative
    anchor_ref: '63:2'
  - marker: a
    text: '''Through the Holy Spirit'' expresses Clement''s strong claim that the letter''s admonition is Spirit-mediated, not merely personal advice.'
    reason: cultural_note
    anchor_ref: '63:2'
  - marker: c
    text: The final clause may also be rendered 'that you may quickly make peace' or 'that you may quickly be at peace.'
    reason: alternative_reading
    anchor_ref: '63:4'
  - marker: b
    text: Or 'taking our place under obedience, should reach the goal set before us in truth, without any blemish.'.
    reason: previous_rendering
lexical_decisions:
- source_word: Θεμιτόν
  chosen: it is fitting
  alternatives:
  - it is right
  - it is proper
  - it is lawful
  lexicon: LSJ
  rationale: Conveys moral propriety rather than mere legality. 'Fitting' preserves the paraenetic tone and rhetorical dignity.
- source_word: ὑποδείγμασιν
  chosen: examples
  alternatives:
  - patterns
  - models
  lexicon: LSJ
  rationale: The term points to exemplary precedents just cited; 'examples' is clear and natural while retaining moral force.
- source_word: ὑποθεῖναι τὸν τράχηλον
  chosen: bow the neck
  alternatives:
  - submit the neck
  - place the neck under
  lexicon: LSJ
  rationale: Keeps the bodily metaphor of submission rather than flattening it into abstract obedience.
- source_word: ὑπακοή
  chosen: obedience
  alternatives:
  - submission
  - compliance
  lexicon: BDAG
  rationale: Best matches the ecclesial and paraenetic register; 'compliance' is too bureaucratic, while 'submission' would duplicate the neck metaphor.
- source_word: σκοπός
  chosen: goal
  alternatives:
  - aim
  - mark
  lexicon: BDAG
  rationale: '''Goal'' communicates the teleological image clearly in modern English while preserving the sense of a set objective.'
- source_word: δίχα παντὸς μώμου
  chosen: without any blemish
  alternatives:
  - without reproach
  - without fault
  lexicon: LSJ
  rationale: Retains the moral and almost cultic nuance of blamelessness; 'blemish' preserves the texture of the Greek.
- source_word: ἀγαλλίασιν
  chosen: exultation
  alternatives:
  - gladness
  - rejoicing
  lexicon: BDAG
  rationale: Paired with χαρά, it is useful to distinguish the terms; 'exultation' preserves heightened joy.
- source_word: τοῖς ὑφʼ ἡμῶν γεγραμμένοις διὰ τοῦ ἁγίου πνεύματος
  chosen: the things written by us through the Holy Spirit
  alternatives:
  - what we have written through the Holy Spirit
  lexicon: BDAG
  rationale: Preserves the strong claim of Spirit-mediated writing and keeps the phrase auditable rather than softening it.
- source_word: ἐκκόψητε
  chosen: you cut off
  alternatives:
  - you root out
  - you remove
  lexicon: LSJ
  rationale: The verb is vivid and forceful; 'cut off' preserves the decisive image better than a smoother abstraction.
- source_word: ἄθεμον
  chosen: lawless
  alternatives:
  - unlawful
  - wicked
  lexicon: LSJ
  rationale: Captures the sense of being contrary to what is right or ordained; 'lawless' is morally weighty without overinterpreting.
- source_word: ζήλους
  chosen: jealousy
  alternatives:
  - zeal
  - envy
  lexicon: BDAG
  rationale: In this context of factional anger, the negative sense is primary. 'Jealousy' fits the relational and divisive context better than 'zeal.'
- source_word: ἔντευξιν
  chosen: appeal
  alternatives:
  - entreaty
  - petition
  - intercession
  lexicon: BDAG
  rationale: Refers to the earnest request made in the letter. 'Appeal' is natural English and preserves the hortatory force.
- source_word: ὁμονοίας
  chosen: concord
  alternatives:
  - unity
  - harmony
  lexicon: LSJ
  rationale: '''Concord'' preserves the ecclesial and rhetorical register and pairs well with ''peace'' without collapsing the terms into one idea.'
- source_word: σώφρονας
  chosen: prudent
  alternatives:
  - self-controlled
  - sensible
  lexicon: BDAG
  rationale: In describing emissaries, 'prudent' captures mature judgment in a public/ecclesial setting.
- source_word: ἀναστραφέντας
  chosen: have conducted themselves
  alternatives:
  - have lived
  - have behaved
  lexicon: BDAG
  rationale: This rendering preserves the ethical nuance of manner of life, not mere existence.
- source_word: ἀμέμπτως
  chosen: blamelessly
  alternatives:
  - without reproach
  - irreproachably
  lexicon: BDAG
  rationale: A standard moral term; 'blamelessly' is concise and preserves the ethical force.
- source_word: μάρτυρες
  chosen: witnesses
  alternatives:
  - testifiers
  lexicon: BDAG
  rationale: The ordinary sense fits the context of trusted delegates who can attest intentions and outcomes.
- source_word: φροντίς
  chosen: care
  alternatives:
  - concern
  - thought
  lexicon: BDAG
  rationale: '''Care'' communicates pastoral concern and avoids sounding merely intellectual.'
- source_word: εἰρηνεῦσαι
  chosen: be restored to peace
  alternatives:
  - be at peace
  - make peace
  lexicon: LSJ
  rationale: The Greek likely points to entering a state of peace; this rendering makes explicit the relational restoration implied by the letter's context while staying close to the sense.
theological_decisions:
- issue: διὰ τοῦ ἁγίου πνεύματος and the authority claim of the letter
  chosen_reading: Rendered directly as 'the things written by us through the Holy Spirit.'
  alternative_readings:
  - '''what we wrote under the Spirit''s guidance'''
  - '''what we wrote by the Holy Spirit'''
  rationale: The Greek makes a strong claim about Spirit-mediated writing. The translation preserves that claim without softening it into a vague devotional statement.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: ζήλους in context
  chosen_reading: Rendered as 'jealousy' in the phrase 'the lawless anger of your jealousy.'
  alternative_readings:
  - '''zeal'''
  - '''envy'''
  rationale: Although the noun can bear positive or negative senses, the immediate context of factional strife and anger favors a negative rendering. 'Jealousy' preserves the relational and communal disturbance in view.
- issue: ἐν τάχει ὑμᾶς εἰρηνεῦσαι
  chosen_reading: Rendered as 'that you may quickly be restored to peace.'
  alternative_readings:
  - '''that you may quickly make peace'''
  - '''that you may quickly be at peace'''
  rationale: The infinitive is somewhat compressed. Given the letter's concern for reconciliation within the Corinthian church, a passive-like restoration sense best captures the pastoral aim without overparaphrasing.
