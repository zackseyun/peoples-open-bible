translation:
  language: es
  text: Y Ezequías animó[a] a todos los levitas que tenían buen entendimiento en el servicio de Yahvé[b]. Y ellos comieron durante los siete días de la fiesta señalada, ofreciendo sacrificios de paz[c] y dando gracias[d] a Yahvé, el Dios de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «habló al corazón de todos los levitas».'
    reason: lexical_alternative
  - marker: b
    text: O «que tenían buena comprensión para Yahvé» o «que eran hábiles en lo relacionado con Yahvé».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «sacrificios de paz»; también puede entenderse como «ofrendas de comunión» u «ofrendas de bienestar».'
    reason: lexical_alternative
  - marker: d
    text: El verbo también puede significar «confesando» o «alabando»; aquí probablemente expresa dar gracias en adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר עַל־לֵב
  english_pob_choice: spoke encouragingly
  chosen_spanish: habló al corazón
  alternatives_spanish:
  - habló alentándolos
  - habló de manera alentadora
  - habló con palabras de consuelo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente dice 'habló al corazón'. En español, 'habló al corazón' conserva la imagen original y la relación afectiva sin forzar una paráfrasis demasiado libre. La POB en inglés optó por un equivalente idiomático; aquí se preserva la tensión entre literalidad y sentido natural.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: Designación tribal/cultual estándar; no requiere adaptación especial.
- source_word: הַמַּשְׂכִּילִים שֵׂכֶל טוֹב
  english_pob_choice: who had good understanding
  chosen_spanish: que tenían buen entendimiento
  alternatives_spanish:
  - que tenían buena comprensión
  - que tenían buen discernimiento
  - que eran hábiles con buen criterio
  lexicon: HALOT
  rationale: El participio y el sustantivo cognado expresan entendimiento, habilidad o prudencia. 'Buen entendimiento' mantiene el paralelismo lexical y es natural en español. Se evita restringirlo a una función exclusivamente didáctica, porque el contexto es cultual.
- source_word: לַיהוָה
  english_pob_choice: in the service of Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - en el servicio de Yahvé
  - respecto de Yahvé
  - para la obra de Yahvé
  lexicon: HALOT
  rationale: El hebreo usa ל con valor relacional; en este contexto el entendimiento de los levitas está orientado a Yahvé y a su culto. Se mantiene 'Yahvé' según la política del proyecto. La frase breve evita sobreexplicar, pero deja abierta la relación de servicio que el contexto aporta.
- source_word: וַיֹּאכְלוּ אֶת־הַמּוֹעֵד
  english_pob_choice: they ate throughout the appointed feast
  chosen_spanish: comieron durante la fiesta señalada
  alternatives_spanish:
  - comieron en la fiesta señalada
  - participaron de la fiesta señalada
  - celebraron la fiesta señalada
  lexicon: HALOT
  rationale: מוֹעֵד puede significar 'tiempo señalado' o 'fiesta señalada'. Dado que el verbo es 'comieron', 'fiesta señalada' comunica con claridad la ocasión festiva sin perder el matiz de tiempo fijado. 'Durante' refleja la duración del hebreo mejor que una traducción puramente estática.
- source_word: שִׁבְעַת הַיָּמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: La duración queda expresada naturalmente en español con 'por siete días'. Es fiel y fluido.
- source_word: מְזַבְּחִים זִבְחֵי שְׁלָמִים
  english_pob_choice: sacrificing peace offerings
  chosen_spanish: sacrificando sacrificios de paz
  alternatives_spanish:
  - ofreciendo ofrendas de paz
  - sacrificando ofrendas de comunión
  - sacrificando ofrendas de bienestar
  lexicon: HALOT
  rationale: Se conserva la categoría sacrificial tradicional, pero con una forma suficientemente transparente en español. 'Sacrificios de paz' reproduce el genitivo hebreo de manera bastante directa. Se evita reemplazarlo sin más por una formulación más interpretativa, aunque 'ofrendas de comunión/bienestar' sigue siendo una alternativa válida.
- source_word: וּמִתְוַדִּים
  english_pob_choice: giving thanks
  chosen_spanish: dando gracias
  alternatives_spanish:
  - confesando
  - alabando
  - dando gracias y confesando
  lexicon: HALOT
  rationale: El hitpael de ידה puede significar confesar, alabar o dar gracias. En este contexto litúrgico y junto al sacrificio de paz, la opción más probable es 'dar gracias'. Se conserva la tensión semántica en la nota, sin borrar la posible lectura de confesión.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: Fórmula pactual estable. 'Padres' mantiene la cercanía al hebreo y su resonancia ancestral/covenantal.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Conforme a la política del proyecto, se usa 'Yahvé' en el texto principal, evitando el ocultamiento del nombre divino mediante 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de מְזַבְּחִים זִבְחֵי שְׁלָמִים
  english_pob_reading: sacrificing peace offerings
  chosen_spanish_reading: sacrificando sacrificios de paz
  alternative_spanish_readings:
  - sacrificando ofrendas de comunión
  - sacrificando ofrendas de bienestar
  - sacrificando ofrendas pacíficas
  rationale: '''Sacrificios de paz'' preserva la categoría sacrificial tradicional sin borrar el vínculo lexical con שְׁלָמִים. No se elige una paráfrasis más explicativa para no perder la forma concreta del sustantivo hebreo.'
  doctrine_reference: Levítico 3; Levítico 7
- issue: Valor de וּמִתְוַדִּים en el contexto de culto
  english_pob_reading: giving thanks
  chosen_spanish_reading: dando gracias
  alternative_spanish_readings:
  - confesando
  - alabando
  - confesando y dando gracias
  rationale: En este contexto de fiesta y sacrificios, la acción tiene un sentido doxológico y de acción de gracias. 'Dando gracias' evita introducir una confesión de pecado que el contexto inmediato no exige, aunque el hebreo admite esa ambigüedad.
  doctrine_reference: Salmo 100; Hebreos 13:15
translation_notes:
  revision_awareness: 'La versión inglesa revisada ajustó ''showed good understanding'' a ''had good understanding'' y ''the feast'' a ''throughout the appointed feast''. La redacción española sigue esas precisiones: ''tenían buen entendimiento'' conserva el valor posesivo/estativo, y ''durante la fiesta señalada'' refleja la duración de אֶת־הַמּוֹעֵד sin perder el carácter de tiempo festivo señalado.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera coherente con la política del proyecto para יהוה.
  - '''Levitas'' permanece sin adaptación técnica adicional por ser un término bíblico establecido.'
  - '''Sacrificios de paz'' mantiene el término sacrificial reconocible y la tensión lexical del hebreo.'
  - Los marcadores de nota se colocan solo donde aportan una alternativa real o una ambigüedad significativa del original.
