revisions:
- from: Y las pasturas pacíficas[a] serán devastadas por la ardiente ira de Yahvé.
  to: Y las pasturas tranquilas[a] quedan asoladas por la ardiente ira de Yahvé.
  rationale: Se ajusta la expresión principal para mejorar la naturalidad del español y reflejar mejor la idiomaticidad hebrea documentada en la auditoría. «Pasturas tranquilas» comunica mejor el sentido de הַשָּׁלוֹם que «pasturas pacíficas», mientras la nota conserva la alternativa literal «pasturas de paz». «Quedan asoladas» reproduce de forma más fiel el efecto resultativo de וְנָדַמּוּ en contexto de juicio que el futuro explícito «serán devastadas».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:41:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: las pasturas quedan desoladas a causa del ardor de la ira de Yahvé. Conserva bien נְאוֹת como imagen pastoral, el valor causal de מִפְּנֵי y el nombre divino יְהוָה como «Yahvé». También preserva la alternativa literal en nota para הַשָּׁלוֹם.'
  spanish_quality_summary: La redacción es comprensible, pero «pasturas pacíficas» suena poco idiomático en español y puede sugerir que las pasturas son moralmente pacíficas más que seguras o tranquilas. Además, «serán devastadas» introduce un futuro explícito donde el hebreo e inglés auditado expresan mejor un resultado presente/gnómico en contexto profético. «Quedan asoladas» o «son devastadas» suena más natural y fiel.
  glossary_alignment: Buen alineamiento general con la terminología del proyecto, especialmente «Yahvé» para יְהוָה. No hay conflictos teológicos mayores. La única mejora léxica importante es sustituir «pacíficas» por una formulación española más natural que siga representando «pasturas de paz», idealmente «pasturas tranquilas» con nota preservando la alternativa literal.
  issues:
  - severity: medium
    issue: «pasturas pacíficas» es poco natural en español
    rationale: Aunque intenta reproducir «peaceful pastures», en español «pacíficas» no es la mejor cualidad para terrenos de pastoreo; «tranquilas» o «de paz» comunica mejor seguridad y calma.
  - severity: low
    issue: «serán devastadas» sobredetermina el tiempo verbal
    rationale: El hebreo וְנָדַמּוּ aquí se entiende bien como resultado de juicio ya en marcha dentro del discurso profético. «Quedan asoladas» preserva mejor el matiz resultativo sin añadir un futuro más marcado.
  revised_spanish_text: Y las pasturas tranquilas[a] quedan asoladas por la ardiente ira de Yahvé.
  revised_footnotes:
  - marker: a
    text: O «las pasturas de paz»; el hebreo es más literalmente «pasturas de paz».
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión principal para mejorar la naturalidad del español y reflejar mejor la idiomaticidad hebrea documentada en la auditoría. «Pasturas tranquilas» comunica mejor el sentido de הַשָּׁלוֹם que «pasturas pacíficas», mientras la nota conserva la alternativa literal «pasturas de paz». «Quedan asoladas» reproduce de forma más fiel el efecto resultativo de וְנָדַמּוּ en contexto de juicio que el futuro explícito «serán devastadas».
