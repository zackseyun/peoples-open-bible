id: 1CO.12.13
reference: 1 Corinthians 12:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ γὰρ ἐν ἑνὶ πνεύματι ἡμεῖς πάντες εἰς ἓν σῶμα ἐβαπτίσθημεν, εἴτε Ἰουδαῖοι εἴτε Ἕλληνες, εἴτε δοῦλοι εἴτε ἐλεύθεροι, καὶ ⸀πάντες ἓν πνεῦμα ἐποτίσθημεν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/012/013.yaml
  text: For indeed[a], in one Spirit we all were baptized into one body—whether Jews or Greeks[c][b], whether slaves or free—and we all were given to drink one Spirit.
  footnotes:
  - marker: a
    text: Or 'by one Spirit'; the Greek ἐν can indicate sphere ('in') or means/agency ('by').
    reason: alternative_reading
  - marker: b
    text: Or 'we all were given one Spirit to drink.'
    reason: lexical_alternative
  - marker: c
    text: Or 'one spirit' if taken less specifically, though the context strongly points to the Holy Spirit.
    reason: alternative_reading
translation:
  language: ko
  text: 우리 모두는 유대인이든 그리스인이든, 노예든 자유인이든, 한 성령으로 한 몸 안으로 세례를 받았으며, 우리 모두는 한 성령을 마시도록 주어졌습니다.
  philosophy: optimal-equivalence
