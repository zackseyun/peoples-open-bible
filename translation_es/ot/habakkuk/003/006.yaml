translation:
  language: es
  text: Él se puso de pie y midió la tierra; miró e hizo temblar a las naciones[a]. Los montes antiguos fueron hechos pedazos; las colinas perpetuas se abatieron[b]. Sus caminos son eternos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘estremeció a las naciones’, o posiblemente ‘dispersó a las naciones’. El verbo hebreo aquí es difícil, y el matiz exacto es debatido.
    reason: lexical_alternative
  - marker: b
    text: O ‘Sus andanzas son eternas’ o ‘Sus sendas son eternas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָמַד
  english_pob_choice: He stood
  chosen_spanish: Él se detuvo
  alternatives_spanish:
  - Él se puso en pie
  - Él tomó posición
  lexicon: HALOT
  rationale: En este contexto teofánico, 'se detuvo' comunica la acción breve y solemne de la presencia divina sin añadir explicación. 'Se puso en pie' sería más literal, pero en español puede sonar menos natural.
- source_word: וַיְמֹדֶד אֶרֶץ
  english_pob_choice: and measured the earth
  chosen_spanish: y midió la tierra
  alternatives_spanish:
  - y midió la tierra
  - y sacudió la tierra
  - y hizo temblar la tierra
  lexicon: HALOT
  rationale: Se conserva el sentido básico del verbo מדד como 'medir', siguiendo la lectura principal del texto hebreo y la decisión auditada en inglés. No se sustituye por una traducción interpretativa basada solo en el contexto.
- source_word: רָאָה
  english_pob_choice: he looked
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  lexicon: HALOT
  rationale: El hebreo permite 'ver' o 'mirar'. Aquí 'vio' mantiene la secuencia verbal breve del poema y es claro en español.
- source_word: וַיַּתֵּר גּוֹיִם
  english_pob_choice: and made nations tremble
  chosen_spanish: y estremeció a las naciones
  alternatives_spanish:
  - y atemorizó a las naciones
  - y hizo temblar a las naciones
  - y dispersó a las naciones
  lexicon: HALOT
  rationale: El verbo es difícil y la tradición de lectura admite matices de alarma, temblor o dispersión. 'Estremeció' conserva el efecto de agitación sin cerrar indebidamente la tensión lexical documentada por la POB.
- source_word: וַיִּתְפֹּצְצוּ
  english_pob_choice: were shattered
  chosen_spanish: fueron hechos pedazos
  alternatives_spanish:
  - fueron quebrados
  - se partieron
  lexicon: HALOT
  rationale: Para las montañas, 'fueron hechos pedazos' expresa con fuerza el desmoronamiento violento del verbo reflexivo/intensivo. Evita suavizar la imagen poética.
- source_word: הַרְרֵי עַד
  english_pob_choice: the ancient mountains
  chosen_spanish: los montes antiguos
  alternatives_spanish:
  - los montes eternos
  - los montes de antaño
  lexicon: HALOT
  rationale: '''Antiguos'' refleja la antigüedad duradera del hebreo עַד y su paralelismo con ''colinas perpetuas''. ''Montes'' es natural en español poético y mantiene el contraste con ''colinas''.'
- source_word: שַׁחוּ
  english_pob_choice: sank low
  chosen_spanish: se inclinaron
  alternatives_spanish:
  - se abatieron
  - se hundieron
  lexicon: HALOT
  rationale: En español, para colinas, 'se inclinaron' preserva bien la imagen de descenso/bajamiento y el matiz de sometimiento poético. 'Se hundieron' sería más físico, pero menos elegante aquí.
- source_word: גִּבְעוֹת עוֹלָם
  english_pob_choice: the everlasting hills
  chosen_spanish: las colinas perpetuas
  alternatives_spanish:
  - las colinas eternas
  - las colinas de siempre
  lexicon: HALOT
  rationale: '''Perpetuas'' reproduce el valor de permanencia de עוֹלָם sin depender de un registro demasiado arcaico. Se conserva el paralelo con ''montes antiguos''.'
- source_word: הֲלִיכוֹת עוֹלָם לוֹ
  english_pob_choice: His ways are everlasting
  chosen_spanish: Sus caminos son eternos
  alternatives_spanish:
  - Sus andar es eterno
  - Sus pasos son eternos
  - Sus caminos son de antiguo
  lexicon: HALOT
  rationale: '''Caminos'' es la opción natural en español para el sustantivo plural de הליכות en este contexto poético. ''Eternos'' expresa bien la permanencia y evita una literalidad extraña como ''marchas'' o ''andares''.'
theological_decisions:
- issue: Lenguaje antropomórfico y teofánico
  english_pob_reading: Render the verse as a poetic description of God's appearing and acting in history/cosmos without reducing it to mere metaphor or over-systematizing it.
  chosen_spanish_reading: 'Presentar el versículo como poesía teofánica: la aparición de Dios afecta tanto a las naciones como a la creación, sin rebajar la imagen a una mera metáfora política ni volverla una descripción cosmológica rígida.'
  alternative_spanish_readings:
  - Reducirlo a imagen política nacional
  - Intensificarlo como evento cosmológico literal
  rationale: El hebreo funciona como poesía elevada de la intervención divina. La traducción española conserva la tensión entre acción histórica y estremecimiento cósmico, evitando forzar el texto hacia una sola lectura.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se revisó el texto inglés más reciente y su aparato crítico asociado; no se registraron cambios aplicados en la última pasada, y la presente versión sigue la lectura aprobada con equivalencias españolas auditablemente consistentes.
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se usa 'naciones' para גּוֹיִם y no 'gentiles', para conservar neutralidad semántica y el tono poético.
  - Se conserva la tensión de la línea final con 'caminos', que en español funciona mejor que un calco como 'andares' o 'marchas'.
  - Las notas preservan las alternativas léxicas relevantes sin introducir una glosa doctrinal ajena al texto.
