translation:
  language: es
  text: Porque, ya que fuimos nacidos y criados para las mismas cosas[a], asimismo debemos morir por las mismas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "por las mismas causas" o "por los mismos principios". El griego repite una expresión amplia, literalmente "las mismas cosas", en ambas cláusulas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τὰ αὐτά
  english_pob_choice: for the same things
  chosen_spanish: para las mismas cosas
  alternatives_spanish:
  - para los mismos fines
  - con el mismo propósito
  lexicon: LSJ
  rationale: Conserva la repetición del griego y el carácter amplio de τὰ αὐτά sin concretar indebidamente en 'fines' o 'propósitos'. En español, 'las mismas cosas' suena natural y refleja la simetría del verso.
- source_word: γενηθέντες
  english_pob_choice: born
  chosen_spanish: engendrados
  alternatives_spanish:
  - nacidos
  - habiendo nacido
  lexicon: LSJ
  rationale: Aunque la English POB usa 'born' por naturalidad contextual, en español 'engendrados' puede reflejar con más precisión el participio aoristo relacionado con venir a la existencia. 'Nacidos' también es posible, pero 'engendrados' mantiene mejor el matiz de origen compartido en una formulación digna.
- source_word: τραφέντες
  english_pob_choice: brought up
  chosen_spanish: criados
  alternatives_spanish:
  - criados y educados
  - criados o formados
  lexicon: LSJ
  rationale: '''Criados'' expresa la idea de crianza y formación en el hogar mejor que un simple ''alimentados''. En este contexto se empareja naturalmente con ''engendrados'' para indicar nacimiento y educación/crecimiento.'
- source_word: ὑπὲρ τῶν αὐτῶν
  english_pob_choice: for the same things
  chosen_spanish: por las mismas cosas
  alternatives_spanish:
  - por las mismas causas
  - por los mismos principios
  lexicon: LSJ
  rationale: La preposición ὑπέρ aquí conserva una relación de defensa o causa compartida. 'Por las mismas cosas' mantiene la repetición del griego, mientras que 'causas' o 'principios' serían interpretaciones más específicas que el texto no explicita.
- source_word: ἀποθνήσκειν
  english_pob_choice: to die
  chosen_spanish: morir
  alternatives_spanish:
  - morir
  - ser muertos
  lexicon: LSJ
  rationale: El infinitivo es directo; 'morir' es la forma natural en español y no añade una agencia que el verbo por sí solo no expresa.
- source_word: ὀφείλομεν
  english_pob_choice: we ought
  chosen_spanish: debemos
  alternatives_spanish:
  - estamos obligados a
  - debiéramos
  lexicon: LSJ
  rationale: '''Debemos'' comunica la obligación moral de forma clara y solemne en español, equivalente a ''we ought'' sin sonar demasiado técnico.'
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: asimismo
  alternatives_spanish:
  - de la misma manera
  - igualmente
  lexicon: LSJ
  rationale: '''Asimismo'' reproduce la relación de correspondencia entre la formación compartida y la muerte compartida. Mantiene el paralelismo con un registro bíblico sobrio.'
theological_decisions:
- issue: Objeto implícito y amplitud semántica de 'las mismas cosas'
  english_pob_reading: Retain the broader phrase 'the same things' in both clauses
  chosen_spanish_reading: Retener 'las mismas cosas' en ambas cláusulas
  alternative_spanish_readings:
  - las mismas causas
  - los mismos principios
  - las mismas leyes
  rationale: El griego repite τὰ αὐτά / τῶν αὐτῶν sin especificar el referente. En el contexto amplio se trata de lealtades y obligaciones comunes, pero el verso mismo se mantiene general. Conservar la expresión amplia evita estrechar indebidamente el alcance.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto español sigue la lectura final auditada del inglés POB, que simplificó la redundancia de 'also' y mantuvo 'likewise' como marcador de paralelismo. La versión española preserva esa simetría con 'asimismo' y conserva la repetición de 'las mismas cosas' en ambas cláusulas.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y publicable, evitando calcos innecesarios.
  - La repetición de 'las mismas cosas' refleja deliberadamente la repetición griega y la decisión auditada del inglés POB.
  - Se eligió 'engendrados' y 'criados' para dar cuenta del par participial con un paralelismo más natural en español, sin perder el sentido de origen y formación.
