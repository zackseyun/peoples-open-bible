    rationale: Aunque «Baruc» es reconocible en español, el contexto es simplemente una lista de nombres y el expediente lexical en inglés justifica transliterarlo como nombre propio, no traducirlo. Mantener «Baruch» preserva mejor la forma fuente y la coherencia con la decisión auditada.
