review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura triple de prohibiciones y mantiene la repetición de «en el día de su desastre». También conserva adecuadamente el matiz concreto de «puerta» y la ambigüedad semántica de חֵיל con una nota. Sin embargo, hay dos desajustes importantes con la evidencia fuente y la auditoría inglesa: (1) la nota [a] está anclada al primer «desastre», pero la nota inglesa correspondiente trata del verbo «ver/mirar» en la segunda prohibición; (2) «no alargues la mano contra sus bienes» suena menos natural y algo más agresivo/hostil que el sentido idiomático de «lay hands on» en contexto de saqueo. Conviene ajustar el anclaje de la nota y mejorar la naturalidad española de la última cláusula.'
  spanish_quality_summary: El español es claro y digno, pero «aun tú» resulta algo rígido; «incluso tú» suena más natural sin perder el reproche. «No alargues la mano contra» es comprensible, pero poco idiomático en español bíblico moderno; «no pongas mano sobre» o «no eches mano a» expresa mejor el gesto de apoderarse. Además, la nota [a] tal como está crea confusión porque comenta otro segmento distinto del anclado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones clave —«puerta», «desastre», «calamidad», «bienes»— son compatibles con la auditoría. La principal corrección es de anclaje de nota y de idiomaticidad, no de glosario teológico.
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre «desastre» en la primera cláusula, pero su contenido explica el verbo «mirar/ver» de la segunda cláusula.
    rationale: Las notas deben anclarse exactamente al término o frase relevante. Aquí induce a error textual y rompe la trazabilidad con la auditoría inglesa.
  - severity: medium
    issue: «No alargues la mano contra sus bienes» es poco natural en español y no expresa con precisión idiomática la idea de apoderarse/saquear.
    rationale: El hebreo y la decisión inglesa apuntan a poner mano sobre los bienes en contexto de saqueo, no tanto a una agresión abstracta «contra» ellos.
  - severity: low
    issue: «Aun tú» suena más rígido y menos natural que alternativas modernas como «incluso tú».
    rationale: No es incorrecto, pero una leve mejora estilística favorece la legibilidad en español neutro contemporáneo.
  revised_spanish_text: No entres por la puerta de mi pueblo en el día de su desastre; no mires[a] su calamidad, incluso tú, en el día de su desastre; y no pongas mano sobre sus bienes[b] en el día de su desastre.
  revised_footnotes:
