revisions:
- from: Tomarás a los levitas para mí—yo soy Yahvé—en lugar de todo primogénito entre los hijos de Israel, y el ganado de los levitas en lugar de todo primogénito del ganado de los hijos de Israel.
  to: Tomarás a los levitas para mí—yo soy Yahvé—en lugar de todo primogénito entre los hijos de Israel[a], y el ganado de los levitas en lugar de todo primogénito entre el ganado de los hijos de Israel.
  rationale: Se corrige 'del ganado' a 'entre el ganado' para reflejar con mayor precisión la preposición hebrea y el paralelismo de la frase. También se añade la nota alternativa ya preservada en el inglés POB sobre 'hijos de Israel' / 'israelitas'.
  reviewer_model: gpt-5.4
