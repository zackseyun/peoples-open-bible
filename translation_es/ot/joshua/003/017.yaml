translation:
  language: es
  text: Y los sacerdotes que llevaban el arca del pacto de Yahvé[a] se mantuvieron firmes[b] sobre tierra seca en medio del Jordán, mientras todo Israel iba pasando sobre tierra seca hasta que toda la nación[c] acabó de pasar el Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el arca del pacto perteneciente a Yahvé». El hebreo puede expresarse con ese matiz posesivo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «firmemente»; el adverbio enfatiza que los sacerdotes permanecieron inmóviles en el lecho del río.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «todo el pueblo». El hebreo usa un término singular colectivo para Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַמְדוּ
  english_pob_choice: stood
  chosen_spanish: se mantuvieron firmes
  alternatives_spanish:
  - se pusieron de pie
  - permanecieron de pie
  lexicon: HALOT
  rationale: El hebreo expresa no solo la acción de ponerse en pie, sino la permanencia estable en esa posición; por eso ‘se mantuvieron firmes’ conserva el matiz de fijación que el audit trail inglés destaca con ‘stood firmly’.
- source_word: הַכֹּהֲנִים נֹשְׂאֵי
  english_pob_choice: the priests carrying
  chosen_spanish: los sacerdotes que llevaban
  alternatives_spanish:
  - los sacerdotes portadores de
  - los sacerdotes que portaban
  lexicon: HALOT
  rationale: El participio señala a los sacerdotes en su función continua de llevar el arca. ‘Que llevaban’ comunica la acción sin volverla más pesada en español.
- source_word: הָאָרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of the LORD
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahveh
  - el arca del pacto del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la cadena constructa como ‘arca del pacto de…’. Se usa ‘Yahvé’ conforme al estándar del proyecto para יְהוָה, evitando la sustitución por un título.
- source_word: בֶּחָרָבָה
  english_pob_choice: on dry ground
  chosen_spanish: sobre tierra seca
  alternatives_spanish:
  - en tierra seca
  - sobre terreno seco
  lexicon: HALOT
  rationale: ‘Tierra seca’ reproduce el sentido de suelo expuesto y seco en un contexto de milagro. ‘Sobre’ mantiene la imagen de estar plantados sobre esa superficie.
- source_word: בְּתוֹךְ הַיַּרְדֵּן
  english_pob_choice: in the middle of the Jordan
  chosen_spanish: en medio del Jordán
  alternatives_spanish:
  - en el centro del Jordán
  - en medio del río Jordán
  lexicon: HALOT
  rationale: ‘En medio de’ es la correspondencia natural y fiel de בְּתוֹךְ, y ‘Jordán’ conserva el nombre geográfico de uso bíblico.
- source_word: הָכֵן
  english_pob_choice: firmly
  chosen_spanish: firmes
  alternatives_spanish:
  - estables
  - quietos
  lexicon: HALOT
  rationale: 'El adverbio hebreo matiza la estabilidad de la postura; en español se integra mejor como predicación adjetival: ‘se mantuvieron firmes’.'
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: while all Israel
  chosen_spanish: mientras todo Israel
  alternatives_spanish:
  - y todo Israel
  - mientras todo el pueblo de Israel
  lexicon: HALOT
  rationale: La conjunción expresa simultaneidad entre la inmovilidad de los sacerdotes y el avance del pueblo. ‘Todo Israel’ conserva el sujeto colectivo.
- source_word: עֹבְרִים
  english_pob_choice: was crossing
  chosen_spanish: iba pasando
  alternatives_spanish:
  - cruzaba
  - estaba pasando
  lexicon: HALOT
  rationale: El participio denota acción en curso. ‘Iba pasando’ transmite continuidad y fluidez en español sin perder el aspecto progresivo.
- source_word: בֶּחָרָבָה
  english_pob_choice: on dry ground
  chosen_spanish: sobre tierra seca
  alternatives_spanish:
  - en tierra seca
  - sobre terreno seco
  lexicon: HALOT
  rationale: Se repite la misma solución para mantener cohesión léxica y la repetición enfática del hebreo.
- source_word: עַד אֲשֶׁר תַּמּוּ
  english_pob_choice: until ... had finished
  chosen_spanish: hasta que ... acabó de
  alternatives_spanish:
  - hasta que ... terminó de
  - hasta que ... hubo terminado
  lexicon: HALOT
  rationale: ‘Acabó de’ expresa con naturalidad el cierre completo de la acción de cruzar, manteniendo el valor perfectivo de תַּמּוּ.
- source_word: כָּל הַגּוֹי
  english_pob_choice: the whole nation
  chosen_spanish: toda la nación
  alternatives_spanish:
  - todo el pueblo
  - la nación entera
  lexicon: HALOT
  rationale: ‘Nación’ preserva el colectivo singular del hebreo mejor que una simple pluralización; la nota explica la alternativa ‘todo el pueblo’ si se desea.
- source_word: לַעֲבֹר אֶת הַיַּרְדֵּן
  english_pob_choice: crossing the Jordan
  chosen_spanish: pasar el Jordán
  alternatives_spanish:
  - cruzar el Jordán
  - atravesar el Jordán
  lexicon: HALOT
  rationale: El infinitivo final se integra naturalmente con ‘acabó de pasar’. ‘Pasar el Jordán’ es idiomático en español bíblico y conserva el sentido de atravesar el río.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El proyecto exige usar ‘Yahvé’ para el Tetragrámaton en el texto principal. Esto preserva el nombre propio divino en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Colectivo singular כָּל הַגּוֹי
  english_pob_reading: the whole nation
  chosen_spanish_reading: toda la nación
  alternative_spanish_readings:
  - todo el pueblo
  - toda la gente
  rationale: El hebreo usa un singular colectivo para Israel. ‘Toda la nación’ conserva esa fuerza corporativa sin convertirla en un simple plural distributivo.
  doctrine_reference: HALOT; concordancia con el audit trail inglés
- issue: Simultaneidad entre sacerdotes y pueblo
  english_pob_reading: while all Israel was crossing
  chosen_spanish_reading: mientras todo Israel iba pasando
  alternative_spanish_readings:
  - y todo Israel pasaba
  - mientras Israel cruzaba
  rationale: 'La narración subraya dos acciones simultáneas: los sacerdotes permanecen y el pueblo cruza. ‘Mientras’ hace explícita esa simultaneidad.'
  doctrine_reference: Estrategia sintáctica del versículo
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que todos los marcadores de nota aparezcan anclados en el texto español. También se ajustó el nombre divino a la norma del proyecto en español.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ de forma consistente para יְהוָה.
  - Se repitió ‘sobre tierra seca’ para reflejar la reiteración del hebreo.
  - Se conservó el colectivo singular con ‘todo Israel’ y ‘toda la nación’.
  - Se evitó ‘SEÑOR’ como sustitución del nombre divino en el texto principal.
