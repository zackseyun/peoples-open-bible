translation:
  language: es
  text: el que hizo[a] la Osa[b], Orión y las Pléyades, y los aposentos[c] del sur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que hace». El participio hebreo puede describir una acción continua además de una acción pasada.'
    reason: lexical_alternative
  - marker: b
    text: «La Osa» traduce el nombre hebreo de una constelación. Versiones españolas más antiguas suelen tener «Arcturo».
    reason: alternative_reading
  - marker: c
    text: La expresión «los aposentos del sur» probablemente se refiere, de manera poética, a las regiones ocultas o a las constelaciones del cielo del sur.
    reason: cultural_note
lexical_decisions:
- source_word: עֹשֶׂה
  english_pob_choice: who made
  chosen_spanish: el que hizo
  alternatives_spanish:
  - el que hace
  - hacedor de
  lexicon: HALOT
  rationale: El participio qal describe a Dios con valor relativo; en español, "el que hizo" conserva bien el sentido descriptivo y el marco de las obras creadoras de Dios en el contexto. "El que hace" también sería posible, pero aquí la secuencia astronómica y el paralelismo con el contexto favorecen una formulación más natural en pasado perfecto simple.
- source_word: עָשׁ
  english_pob_choice: the Bear
  chosen_spanish: la Osa
  alternatives_spanish:
  - Ash
  - la Osa Mayor
  - Arcturo
  lexicon: HALOT
  rationale: El término nombra una constelación. "La Osa" comunica de inmediato el referente astronómico en español sin depender de una transliteración opaca. "La Osa Mayor" sería más específica, pero el hebreo no exige precisar esa expansión; "Arcturo" pertenece a la tradición antigua y es menos transparente.
- source_word: כְּסִיל
  english_pob_choice: Orion
  chosen_spanish: Orión
  alternatives_spanish:
  - Kesil
  lexicon: HALOT
  rationale: En contexto astronómico, el nombre estándar español de la constelación transmite con claridad el referente. La transliteración "Kesil" ocultaría el sentido para el lector común.
- source_word: כִימָה
  english_pob_choice: the Pleiades
  chosen_spanish: las Pléyades
  alternatives_spanish:
  - Kimah
  lexicon: HALOT
  rationale: Es la identificación convencional del grupo estelar. El nombre astronómico español es la forma más clara y fiel para el lector moderno.
- source_word: חַדְרֵי תֵמָן
  english_pob_choice: the chambers of the south
  chosen_spanish: las cámaras del sur
  alternatives_spanish:
  - las habitaciones del sur
  - los aposentos del sur
  - las cámaras de Temán
  lexicon: HALOT
  rationale: La expresión es poética y probablemente alude a las regiones ocultas o compartimentos del cielo austral. "Cámaras" conserva la imagen literal de "chambers" y evita sobreinterpretar el hebreo; "del sur" sigue la lectura direccional de תֵמָן, no el topónimo Temán.
translation_notes:
  revision_awareness: La auditoría inglesa mantiene alta concordancia, sin revisiones aplicadas; por eso la propuesta española sigue de cerca las decisiones léxicas auditadas y conserva la imagen poética sin añadir interpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el hebreo porta el nombre divino; aquí no aparece.
  - Se conservan nombres astronómicos reconocibles en español para evitar transliteraciones opacas.
  - '"Cámaras" mantiene el paralelismo poético y la ambigüedad del hebreo sin convertirla en una explicación interpretativa.'
