  from: and with him were Priscilla and Aquila.
  to: with Priscilla and Aquila.
  rationale: The Greek source presents all of Paul's actions in a single, flowing sentence. The draft's choice to split this into two sentences for English readability is a valid strategy. However, rendering 'καὶ σὺν αὐτῷ Πρίσκιλλα καὶ Ἀκύλας' as a full clause ('and with him were Priscilla and Aquila') creates a hard stop, making the following sentence about the haircut feel slightly disconnected from its subject, Paul. By rendering the phrase as a prepositional modifier ('...sailed away for Syria with Priscilla and Aquila.'), the connection to the subsequent sentence ('In Cenchreae he had his head shaved...') becomes smoother and more logical, better preserving the flow of the original.
