translation:
  language: es
  text: 'El principio de la sabiduría es este: adquiere sabiduría[a], y con todo lo adquirido[b], adquiere entendimiento.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La sabiduría es la cosa principal; por tanto, adquiere sabiduría», preservando רֵאשִׁית en el sentido de «principal» o «primero en importancia».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «con toda tu adquisición» o «con todas tus posesiones»; la redacción probablemente juega con el verbo repetido «adquirir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  english_pob_choice: the beginning of
  chosen_spanish: el principio de
  alternatives_spanish:
  - la primera cosa de
  - la cosa principal
  - el comienzo de
  lexicon: HALOT
  rationale: רֵאשִׁית puede significar 'comienzo', 'primera parte' o 'lo principal'. 'El principio de' conserva la forma breve del hebreo y permite que el resto del dicho explique en qué consiste ese principio.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sabia conducta
  - entendimiento
  lexicon: HALOT
  rationale: En Proverbios, חָכְמָה se refiere a sabiduría práctica y moral. 'Sabiduría' es el equivalente español más natural y fiel.
- source_word: קְנֵה
  english_pob_choice: acquire
  chosen_spanish: adquiere
  alternatives_spanish:
  - obtén
  - compra
  - consigue
  lexicon: HALOT
  rationale: El imperativo de קנה puede significar comprar, adquirir u obtener. 'Adquiere' comunica la idea de procurarla intencionalmente sin sonar coloquial ni reducirse a una transacción comercial.
- source_word: וּבְכָל
  english_pob_choice: and with all
  chosen_spanish: y con todo lo que
  alternatives_spanish:
  - y en todo lo que
  - y con todo cuanto
  - y con todas tus posesiones
  lexicon: HALOT
  rationale: La secuencia hebrea introduce el costo o el medio implicado en la adquisición. 'Y con todo lo que' mantiene esa amplitud sin limitarla solo a dinero o bienes.
- source_word: קִנְיָנְךָ
  english_pob_choice: you acquire
  chosen_spanish: adquieres
  alternatives_spanish:
  - tus posesiones
  - tu riqueza
  - tu adquisición
  lexicon: HALOT
  rationale: El sustantivo cognado de קנה puede referirse a adquisición, posesiones o riqueza. 'Adquieres' preserva el juego de palabras con el verbo repetido y evita estrechar el sentido a 'posesiones' o 'riqueza' únicamente.
- source_word: בִינָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - insight
  - comprensión
  lexicon: HALOT
  rationale: בִינָה en literatura sapiencial apunta a discernimiento o comprensión. 'Entendimiento' es la opción española más amplia, natural y fiel al contexto.
translation_notes:
  revision_awareness: 'Coincide con la lectura revisada de alto acuerdo: no se aplicaron revisiones posteriores; se mantiene la fuerza del paralelismo y el juego léxico entre קְנֵה y קִנְיָנְךָ.'
  spanish_consistency_notes:
  - Se prefirió 'adquiere' para conservar el paralelismo verbal con el hebreo y la POB en inglés.
  - Se usó 'entendimiento' en lugar de 'discernimiento' porque el contexto sapiencial lo permite y la formulación resulta más fluida en español.
  - Se mantuvo 'principio de' en el texto principal y se dejó la lectura alternativa en nota para no borrar la tensión semántica de רֵאשִׁית.
