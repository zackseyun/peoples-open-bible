translation:
  language: es
  text: Toda sabiduría procede de Yahvé[a], y con él está para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "de Yahvé"; griego paralelo: "del Señor". Se conserva "Yahvé" en el texto principal por el criterio del proyecto, aunque el paralelo griego use Κύριος.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל / πᾶσα
  english_pob_choice: All
  chosen_spanish: Toda
  alternatives_spanish:
  - Toda la
  - Toda clase de
  lexicon: HALOT; LSJ
  rationale: El cuantificador es universal. En español, "Toda sabiduría" expresa con naturalidad el alcance total y conserva la amplitud del hebreo y del griego sin añadir matices de clase o tipo.
- source_word: חָכְמָה / σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  - conocimiento
  lexicon: HALOT; LSJ
  rationale: El sustantivo tiene aquí sentido sapiencial amplio, no mero pericia técnica. "Sabiduría" es el equivalente normal y fiel en español bíblico.
- source_word: מֵיהֹוָה / παρὰ Κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: procede de Yahvé
  alternatives_spanish:
  - viene de Yahvé
  - es de Yahvé
  - proviene de Yahvé
  lexicon: HALOT; LSJ
  rationale: El hebreo marca origen con מִן/מֵ. En español, "procede de" comunica bien la fuente/origen sin forzar un calco. Se mantiene "Yahvé" conforme al criterio del proyecto para יהוה, y el paralelo griego con Κυρίου no obliga a ocultar el nombre divino.
- source_word: וִעמּוֹ / μετʼ αὐτοῦ
  english_pob_choice: and it is with him
  chosen_spanish: y con él está
  alternatives_spanish:
  - y está con él
  - y permanece con él
  - y con él permanece
  lexicon: HALOT; LSJ
  rationale: La cláusula hebrea y la griega expresan compañía/pertenencia continua. En español, omitir el pronombre explícito evita redundancia, y "está" reproduce de forma natural la copulativa implícita.
- source_word: הִיא
  english_pob_choice: it
  chosen_spanish: está
  alternatives_spanish:
  - ella está
  - permanece
  lexicon: HALOT
  rationale: El hebreo usa un pronombre de tercera persona, pero en español la referencia ya queda clara por el sujeto "sabiduría". No hace falta marcar género con "ella"; la forma verbal basta y suena más natural.
- source_word: לְעוֹלָמִים / εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por los siglos
  - para los siglos
  lexicon: HALOT; LSJ
  rationale: La expresión señala duración perpetua. "Para siempre" es claro, digno y completamente idiomático en español, y transmite bien la permanencia eterna afirmada por el hebreo y el griego.
theological_decisions:
- issue: Renderizado del nombre divino יהוה en un dicho sapiencial hebreo con paralelo griego Κύριος
  english_pob_reading: from the Lord
  chosen_spanish_reading: procede de Yahvé
  alternative_spanish_readings:
  - procede del Señor
  - viene del Señor
  - procede del Soberano
  rationale: El hebreo fuente nombra explícitamente a יהוה, y el proyecto prioriza "Yahvé" en el texto principal. El griego usa Κύριος como equivalente contextual; en español no se debe ocultar el nombre divino bajo una máscara litúrgica sin razón textual. Mantener "Yahvé" preserva el dato fuente y la transparencia del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto de auditoría en inglés no requirió cambios sustantivos; la única decisión sensible es el nombre divino. Se siguió el criterio del proyecto para reflejar el hebreo יְהוָה con "Yahvé" y para expresar el origen con una construcción natural en español.
  spanish_consistency_notes:
  - Se evitó "Señor" en el texto principal para no enmascarar יהוה.
  - '"Toda sabiduría" mantiene el alcance universal del hebreo πᾶσα y del griego παρὰ Κυρίου.'
  - La cláusula final "para siempre" conserva la permanencia eterna sin añadir matices interpretativos.
  - El pronombre implícito de la segunda cláusula no se forzó con "ella"; el español permite una formulación más fluida sin perder referencia.
