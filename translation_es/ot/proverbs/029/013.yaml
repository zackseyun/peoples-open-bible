    issue: La nota [b] está anclada en «se encuentran» en lugar de en «ilumina los ojos».
    rationale: La nota [b] explica la expresión hebrea מֵאִיר עֵינֵי («da luz a los ojos»), no el verbo נִפְגָּשׁוּ («se encuentran»). Debe aparecer en el segundo hemistiquio para preservar la evidencia fuente y el audit trail inglés.
