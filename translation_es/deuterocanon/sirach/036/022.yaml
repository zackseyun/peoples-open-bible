  spanish_quality_summary: El español es claro y legible, pero «le dará su merecido» introduce un modismo coloquial y valorativo excesivo para un texto sapiencial de tono sobrio. «Le retribuirá» o «le responderá» preservan mejor la ambigüedad y dignidad del original. También conviene simplificar el orden de notas para que la nota léxica de «torcido» quede anclada solo allí y la nota sobre la ambigüedad de la respuesta quede en la segunda cláusula.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. La principal desviación está en la decisión léxica para ἀνταποδώσει: el proyecto inglés documenta «will repay» con ambigüedad semántica, mientras que «le dará su merecido» la estrecha indebidamente hacia castigo. «Muy experimentado» es compatible con la decisión inglesa revisada para πολύπειρος.'
  issues:
  - severity: high
    issue: «le dará su merecido» sobreespecifica ἀνταποδώσει
    rationale: El griego puede significar responder, retribuir o devolver en correspondencia, sin fijar valencia moral. El modismo español normalmente implica castigo o reprensión merecida, y por eso traiciona la indeterminación preservada por la auditoría inglesa.
  - severity: medium
    issue: «de mucha experiencia» suena poco natural en español bíblico moderno
    rationale: Aunque es comprensible, resulta más pesado y menos idiomático que «muy experimentado». Dado que la revisión inglesa ya optó por «very experienced», el español puede reflejarlo de manera natural sin perder sentido.
  - severity: low
    issue: La colocación de notas puede afinarse
    rationale: La nota sobre alternativas de στρεβλή debe quedar claramente asociada a «torcido», y la nota sobre la ambigüedad de ἀνταποδώσει a la segunda cláusula, evitando acumulación innecesaria al final.
  revised_spanish_text: Un corazón torcido[a] causa tristeza, y un hombre muy experimentado le retribuirá[b].
