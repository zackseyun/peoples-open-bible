translation:
  language: es
  text: Para los hijos de Benjamín, por sus generaciones, por sus clanes, por las casas de sus padres, según el número de nombres, de veinte años para arriba, todo varón apto para salir a la guerra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «todo el que sale a la guerra», un modismo para los aptos para el servicio militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי בִנְיָמִן
  english_pob_choice: For the sons of Benjamin
  chosen_spanish: Para los hijos de Benjamín
  alternatives_spanish:
  - De los hijos de Benjamín
  - Para los descendientes de Benjamín
  lexicon: HALOT
  rationale: Mantiene la fórmula de encabezado censal con ל y conserva el lenguaje filial del hebreo. «Hijos» sigue la forma del original con naturalidad en español bíblico contemporáneo.
- source_word: תּוֹלְדֹתָם
  english_pob_choice: by their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - según sus generaciones
  - por sus linajes
  lexicon: HALOT
  rationale: «Generaciones» reproduce la noción de descendencia/linaje en el contexto tribal sin convertirla en una paráfrasis burocrática.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: «Clan» distingue bien la unidad tribal menor que la tribu y mayor que la casa paterna, y refleja la organización censal del pasaje.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - por las casas paternas
  - por sus casas paternas
  lexicon: HALOT
  rationale: «Casas de sus padres» conserva la estructura semítica del hebreo y evita sustituirla por una expresión más interpretativa.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: according to the number of names
  chosen_spanish: según el número de nombres
  alternatives_spanish:
  - de acuerdo con el número de nombres
  - según la cuenta de nombres
  lexicon: HALOT
  rationale: La frase mantiene la idea de enumeración nominal del censo. «Nombres» no se amplía a «personas» para no borrar la forma del original.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: de veinte años arriba
  alternatives_spanish:
  - desde los veinte años en adelante
  - de veinte años y más
  lexicon: HALOT
  rationale: Es una equivalencia natural y fiel para el límite mínimo de edad. Conserva el sentido de inclusión desde ese punto en adelante.
- source_word: כֹּל יֹצֵא צָבָא
  english_pob_choice: every man able to go out to war
  chosen_spanish: todo el que sale para la guerra
  alternatives_spanish:
  - todo el que sale al ejército
  - todo varón apto para la guerra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a quienes están aptos para servicio militar. Se evita sobreexplicar en el texto principal; «todo el que sale para la guerra» conserva el giro original.
theological_decisions:
- issue: Alcance de la expresión militar idiomática
  english_pob_reading: every man able to go out to war
  chosen_spanish_reading: todo el que sale para la guerra
  alternative_spanish_readings:
  - todo varón apto para la guerra
  - todo el que está habilitado para el servicio militar
  rationale: La frase hebrea y la nota inglesa señalan un modismo censal para elegibilidad militar. En español conviene mantener el modismo y aclararlo en nota, sin sustituirlo por una formulación más técnica que diluya la imagen original.
  doctrine_reference: Ninguno; decisión de sentido léxico-contextual.
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustanciales; se conserva la estructura censal, el léxico de parentesco y el modismo militar con nota explicativa.
  spanish_consistency_notes:
  - Se usa «Benjamín» como nombre propio tribal conforme a la transliteración estándar.
  - Se prefiere «hijos» en lugar de «descendientes» para mantener el paralelismo con el hebreo y con la serie de encabezados censales.
  - «Casas de sus padres» mantiene la terminología de POB para estructuras de parentesco israelitas.
  - Se conserva la nota del modismo militar para no borrar la tensión entre traducción literal y sentido funcional.
