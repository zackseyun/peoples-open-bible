  text: Then the bramble said to the trees[a], ‘If you are truly anointing me as king over you, come, take refuge in my shade; but if not[c][b], let fire come out from the bramble and consume the cedars of Lebanon.’
  footnotes:
  - marker: a
    text: Or 'the thornbush.' The Hebrew אָטָד refers to a thorny shrub; 'bramble' is a natural English rendering in this fable context.
    reason: lexical_alternative
  - marker: b
    text: '''Take refuge'' can also be rendered ''seek shelter.'' The wording may carry ironic force, since a bramble offers little real shade.'
    reason: lexical_alternative
  - marker: c
    text: Or 'fire will come out from the bramble.' The Hebrew verb may be understood as a jussive-like wish or as a predictive statement.
    reason: lexical_alternative
