    text: 'O: «las grabaduras de un sello».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «hijos de Israel»; aquí se refiere a los descendientes tribales de Israel cuyos nombres iban grabados en las piedras.'
    reason: cultural_note
