base_translation:
  language: en
  yaml_path: translation/ot/psalms/080/010.yaml
  text: You cleared the ground before it[c][b][a], and it took root and filled the land.
  footnotes:
  - marker: a
    text: Or 'You prepared room for it.' The Hebrew verb can carry the sense of making space or preparing the ground before the vine.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and it rooted its roots,' a Hebrew expression meaning that it became firmly established.
    reason: lexical_alternative
  - marker: c
    text: Or 'the earth,' depending on whether the scope is taken locally or more broadly.
    reason: lexical_alternative
