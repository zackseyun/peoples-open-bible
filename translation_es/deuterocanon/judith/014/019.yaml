  to: Pero cuando los comandantes del ejército de Asiria oyeron las palabras, rasgaron sus túnicas[a], y sus almas quedaron muy turbadas[b], y se levantó un clamor y un gran grito en medio del campamento.
  rationale: Se reubicó la nota cultural al gesto de rasgar las túnicas; se suavizó «fueron muy turbadas» a «quedaron muy turbadas» para un español más natural conservando «almas»; se corrigió la nota lexical para reflejar con precisión el singular colectivo griego; y se simplificó la última cláusula para evitar la redundancia torpe de «un gran grito, muy grande» y eliminar «entre ellos», que no hace falta para expresar el sentido del original.
