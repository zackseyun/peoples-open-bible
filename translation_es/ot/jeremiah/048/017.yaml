  rationale: 'Se ajusta el verso para seguir más fielmente las decisiones léxicas auditadas: el primer miembro lleva ''cetro'' por su valor de autoridad/poder, y el segundo conserva un término paralelo distinto (''vara'') para mantener el paralelismo poético. También se restituye la nota sobre ''su nombre'' = fama/reputación, se cambia ''diciendo'' por ''digan'' para reflejar el imperativo hebreo, y se mejora la puntuación exclamativa en español.'
