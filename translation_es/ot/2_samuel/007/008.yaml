translation:
  language: es
  text: 'Ahora, pues, así dirás a mi siervo David: Así dice Yahvé de los ejércitos: Yo te tomé del pastizal[a], de seguir al rebaño, para ser gobernante sobre mi pueblo Israel.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del aprisco» o «de la majada». El sustantivo hebreo puede referirse a un lugar de pasto o al sitio donde se guarda el rebaño.
    reason: lexical_alternative
  - marker: b
    text: O «líder» o «príncipe» por «gobernante». El término hebreo denota a alguien designado para gobernar, no necesariamente con el título específico de «rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now therefore
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Y ahora
  - Ahora, por tanto
  lexicon: HALOT
  rationale: La forma introduce transición discursiva y continuidad temporal. «Ahora, pues» conserva bien el valor de enlace de ועתה sin sonar forzado en español.
- source_word: כֹּה תֹאמַר
  english_pob_choice: this is what you shall say
  chosen_spanish: así dirás
  alternatives_spanish:
  - esto dirás
  - de este modo dirás
  lexicon: HALOT
  rationale: Es una fórmula de mensajero; en español, «así dirás» reproduce la directividad sin necesidad de sobrecargar la frase con un relativo innecesario.
- source_word: לְעַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió «servant» por el matiz pactual, la decisión proyectada en español debe evitar suavizar demasiado el término. «Esclavo» preserva la fuerza lexical de עבד, mientras que el contexto de elección y encargo divino impide leerlo aquí como simple condición servil; la tensión se mantiene explícita.
- source_word: לְדָוִד
  english_pob_choice: to David
  chosen_spanish: David
  alternatives_spanish:
  - a David
  lexicon: HALOT
  rationale: En español, la apposición funciona naturalmente sin repetir la preposición. «Mi esclavo David» refleja la estructura hebrea de manera fluida.
- source_word: כֹּה אָמַר יְהוָה צְבָא֔וֹת
  english_pob_choice: This is what Yahweh of hosts says
  chosen_spanish: Así dice Yahvé de los ejércitos
  alternatives_spanish:
  - Así ha dicho Yahvé de los ejércitos
  - Así dice Yahvé, Señor de los ejércitos
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» y el título como «de los ejércitos», que reproduce adecuadamente צבאות sin imponer una interpretación más específica como «ángeles» o «armadas».
- source_word: לְקַחְתִּי
  english_pob_choice: I took you
  chosen_spanish: Yo te tomé
  alternatives_spanish:
  - Yo te saqué
  - Yo te aparté
  lexicon: HALOT
  rationale: «Tomé» es directo y fiel al verbo לקח en este contexto de elección divina. El pronombre explícito «Yo» ayuda a conservar el énfasis del hebreo.
- source_word: מִן הַנָּוֶה
  english_pob_choice: from the pasture
  chosen_spanish: del pastizal
  alternatives_spanish:
  - del pasto
  - de la pradera
  - del aprisco
  lexicon: HALOT
  rationale: La nota inglesa admite una alternativa cercana a «sheepfold», pero la lectura principal favorece un lugar de pastoreo. «Pastizal» comunica el espacio de rebaño de manera natural en español, sin forzar la imagen de un recinto cerrado.
- source_word: מֵאַחַר הַצֹּאן
  english_pob_choice: from following the flock
  chosen_spanish: de detrás del rebaño
  alternatives_spanish:
  - siguiendo el rebaño
  - de detrás de las ovejas
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «de detrás del rebaño». Se conserva la imagen espacial y el paralelismo con el miembro anterior; «siguiendo el rebaño» sería más interpretativo.
- source_word: לִהְיוֹת
  english_pob_choice: to be
  chosen_spanish: para que fueras
  alternatives_spanish:
  - para ser
  - para llegar a ser
  lexicon: HALOT
  rationale: 'La infinitiva de finalidad queda más natural en español como propósito: «para que fueras». Esto preserva el sentido de designación para una función.'
- source_word: נָגִיד
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - líder
  - príncipe
  - jefe
  lexicon: HALOT
  rationale: «Gobernante» conserva la idea de autoridad establecida y evita importar el título «rey», que el hebreo no usa aquí. En español resulta claro y dignificado.
- source_word: עַל עַמִּי עַל יִשְׂרָאֵל
  english_pob_choice: over my people Israel
  chosen_spanish: sobre mi pueblo Israel
  alternatives_spanish:
  - sobre mi pueblo, sobre Israel
  - sobre Israel, mi pueblo
  lexicon: HALOT
  rationale: La formulación española une los dos complementos como lo hace la revisión inglesa final, manteniendo la relación apposicional sin una repetición innecesaria de preposiciones.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El proyecto exige «Yahvé» como forma principal para el Tetragrámaton. Esto preserva la identificación del nombre pactal de Dios sin la convención de ocultarlo como mayúscula litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עבד aplicado a David
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: 'La tensión lexical se mantiene: el hebreo עבד puede abarcar desde esclavo hasta servidor/siervo según el contexto. Aquí, la base source-grounded favorece conservar la fuerza del término, mientras el contexto pactual impide entenderlo como rebajamiento social simple.'
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος servant / slave (context-dependent); aplicado por analogía a עבד'
translation_notes:
  revision_awareness: La redacción española toma como base la revisión inglesa más reciente, que simplificó la doble preposición antes del nombre propio y unificó el final en «my people Israel». También conserva la nota lexical de la alternativa «sheepfold/pasture» y la distinción entre «ruler/leader/prince» para נָגִיד, procurando una equivalencia óptima sin borrar las tensiones documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se ha preferido una sintaxis española fluida, pero sin eliminar la imagen de movimiento «de detrás del rebaño».
  - «Mi esclavo David» conserva la relación posesiva y la apposición del hebreo sin duplicar preposición innecesariamente.
  - «Gobernante» traduce נָגִיד sin introducir «rey», que sería una especificación no garantizada por el texto.
  - La nota de pie a se ancla en «Ahora, pues» porque ahí reside la alternativa discursiva principal; la nota b se ancla en «pastizal» por la alternativa léxica del sustantivo.
