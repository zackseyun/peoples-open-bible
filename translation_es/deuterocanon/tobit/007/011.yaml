translation:
  language: es
  text: '«Le he dado mi hija[a] a siete hombres, y cada vez que entraban a ella, morían durante la noche. Pero por ahora, ten buen ánimo». Y Tobías dijo[b]: «No probaré nada aquí hasta que establezcan y arreglen este asunto conmigo»[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «mi hijo/niño» y «siete hombres»; en contexto se refiere a su hija Sara y a los hombres a quienes fue dada en matrimonio, por lo que «mi hija» y «esposos» son lecturas contextuales posibles.
    reason: lexical_alternative
  - marker: b
    text: El griego identifica aquí al hablante como Tobías, no Tobit.
    reason: source_clarification
  - marker: c
    text: 'La cláusula final es difícil en el griego de Swete. La traducción refleja el sentido aparente: Tobías se niega a comer hasta que el arreglo matrimonial quede formalmente resuelto con él.'
    reason: textual_variant
lexical_decisions:
- source_word: τὸ παιδίον μου
  english_pob_choice: my child
  chosen_spanish: mi hija
  alternatives_spanish:
  - mi hija, mi niña
  - mi criatura
  lexicon: LSJ
  rationale: En español, el contexto de Sara permite precisar el referente femenino sin perder el valor relacional de παιδίον. «Mi hija» comunica de modo natural la filiación y evita una expresión menos idiomática como «mi hijo/a» o «mi niño».},{
- source_word: ἑπτὰ ἀνδράσιν
  english_pob_choice: seven men
  chosen_spanish: siete hombres
  alternatives_spanish:
  - siete varones
  - siete esposos
  lexicon: LSJ
  rationale: ἀνήρ puede significar «hombre» o «esposo». El texto griego dice literalmente «siete hombres», y el contexto matrimonial ya deja claro que eran los varones a quienes fue entregada. Se evita imponer «esposos» en el cuerpo principal sin necesidad del contexto para decirlo.
- source_word: ὁπότε ἐὰν εἰσεπορεύοντο πρὸς αὐτήν
  english_pob_choice: whenever they went in to her
  chosen_spanish: siempre que entraban a ella
  alternatives_spanish:
  - cada vez que se llegaban a ella
  - siempre que iban a ella
  lexicon: LSJ
  rationale: La locución griega conserva un giro eufemístico de ámbito marital/sexual. «Entraban a ella» mantiene la fuerza idiomática en español sin suavizarla demasiado ni explicarla más de lo que el griego permite.
- source_word: ἀπέθνησκον ὑπὸ νύκτα
  english_pob_choice: they died during the night
  chosen_spanish: morían durante la noche
  alternatives_spanish:
  - morían de noche
  - morían por la noche
  lexicon: LSJ
  rationale: La forma imperfecta pide una construcción habitual repetida; «morían durante la noche» transmite bien el carácter reiterado del hecho. Se evita una formulación excesivamente literal que sonaría extraña en español.
- source_word: ἔχων ἡδέως γίνου
  english_pob_choice: be of good cheer
  chosen_spanish: alégrate
  alternatives_spanish:
  - sé de buen ánimo
  - anímate
  lexicon: LSJ
  rationale: El griego transmitido es algo áspero, pero la intención es claramente exhortativa y positiva. En español, «alégrate» conserva un tono digno y natural; la alternativa tradicional «sé de buen ánimo» sería más formal, pero menos directa.
- source_word: Οὐ γεύομαι οὐδὲν ὧδε
  english_pob_choice: I will taste nothing here
  chosen_spanish: No probaré nada aquí
  alternatives_spanish:
  - No comeré nada aquí
  - No gustaré de nada aquí
  lexicon: LSJ
  rationale: γεύομαι significa literalmente «gustar/probar» y puede extenderse a comer. «Probaré» preserva la imagen verbal con naturalidad en español y evita un calco demasiado rígido.
- source_word: ἕως ἂν στήσητε καὶ σταθῆτε πρὸς μέ
  english_pob_choice: until you establish and settle the matter with me
  chosen_spanish: hasta que establezcan y asienten el asunto conmigo
  alternatives_spanish:
  - hasta que lo arreglen y queden de acuerdo conmigo
  - hasta que establezcan y se pongan en regla conmigo
  lexicon: LSJ
  rationale: La secuencia verbal es difícil en el testimonio griego, y el sentido apunta a que el asunto matrimonial quede formalmente resuelto. «Establezcan y asienten el asunto conmigo» procura reflejar ambos verbos sin añadir una paráfrasis excesiva. «Conmigo» traduce πρὸς μέ con valor relacional de negociación o acuerdo.
theological_decisions:
- issue: 'Registro de exhortación: ἡδέως γίνου'
  english_pob_reading: be of good cheer
  chosen_spanish_reading: alégrate
  alternative_spanish_readings:
