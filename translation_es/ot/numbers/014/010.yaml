- from: Pero toda la congregación dijo que los apedrearan con piedras[a], y la gloria de Yahvé apareció en el tabernáculo de reunión, ante todos los hijos de Israel.
  to: Pero toda la congregación dijo que los apedrearan con piedras, y la gloria de Yahvé apareció en el tabernáculo de reunión, a todos los hijos de Israel[a].
