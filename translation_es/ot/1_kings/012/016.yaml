base_translation:
  language: en
  yaml_path: translation/ot/1_kings/012/016.yaml
  text: When all Israel saw that the king had not listened to them[a], the people answered the king, saying, “What share do we have in David? We have no inheritance in the son of Jesse. To your tents, O Israel! Now see to your own house[b], David.” So Israel went to their tents.
  footnotes:
  - marker: a
    text: Or 'To your homes, Israel!' The Hebrew literally says 'to your tents,' an idiom for dispersing and withdrawing allegiance.
    reason: lexical_alternative
  - marker: b
    text: '''House'' may also carry the sense of ''dynasty'' here: ''See to your own dynasty, David.'''
    reason: lexical_alternative
