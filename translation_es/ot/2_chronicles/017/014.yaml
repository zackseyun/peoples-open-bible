translation:
  language: es
  text: 'Y estos eran sus divisiones alistadas[a] por sus casas paternas: para Judá, los jefes de millares: Adná, el jefe, y con él trescientos mil hombres de valor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su número' o 'su enrolamiento'; el término hebreo puede referirse a un censo, a un alistamiento militar o al arreglo resultante de ese alistamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקֻדָּתָם
  english_pob_choice: their mustered divisions
  chosen_spanish: sus divisiones movilizadas
  alternatives_spanish:
  - su número
  - su enrolamiento
  - sus arreglos de tropa
  lexicon: HALOT
  rationale: El contexto es militar y administrativo. 'Divisiones movilizadas' conserva la idea de gente reunida/contada para servicio militar, sin reducir el término a un simple número. En español mantiene la fuerza organizativa de la expresión hebrea.
- source_word: לְבֵית אֲבוֹתֵיהֶם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por sus casas paternas
  alternatives_spanish:
  - según sus casas paternas
  - por sus casas familiares
  - por sus linajes
  lexicon: HALOT
  rationale: La expresión hebrea es genealogía/organización clanica. 'Casas paternas' es la forma más directa y comprensible en español bíblico actual, y conserva la referencia a la estructura familiar de base.
- source_word: לִיהוּדָה
  english_pob_choice: for Judah
  chosen_spanish: para Judá
  alternatives_spanish:
  - de Judá
  - pertenecientes a Judá
  lexicon: HALOT
  rationale: La preposición introduce el contingente de Judá dentro del listado. 'Para Judá' funciona bien como encabezado en español y sigue la lectura organizativa del texto.
- source_word: שָׂרֵי אֲלָפִים
  english_pob_choice: the commanders of thousands
  chosen_spanish: los jefes de millares
  alternatives_spanish:
  - los comandantes de millares
  - los capitanes de millares
  - los jefes de mil
  lexicon: HALOT
  rationale: '''Jefes de millares'' refleja el título militar hebreo y evita cargar el texto con un término moderno demasiado interpretativo. ''Millares'' conserva el valor colectivo del hebreo.'
- source_word: עַדְנָה הַשָּׂר
  english_pob_choice: Adnah the commander
  chosen_spanish: Adnah, el jefe
  alternatives_spanish:
  - Adnah, el comandante
  - Adnah, el capitán
  lexicon: HALOT
  rationale: El artículo con הַשָּׂר identifica a Adnah como la figura principal de esa entrada. 'El jefe' mantiene el paralelismo con 'jefes de millares' y evita sobreespecificar con un rango no explicitado en español.
- source_word: גִּבּוֹרֵי חַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - guerreros valientes
  - hombres de valor
  - mighty men of valor
  lexicon: HALOT
  rationale: La expresión es una fórmula militar para combatientes probados. En español, 'hombres valientes' comunica bien el rasgo de valor sin sonar arcaico; se conserva el matiz de fuerza militar en el conjunto de la frase.
- source_word: שְׁלֹשׁ מֵאוֹת אָלֶף
  english_pob_choice: three hundred thousand
  chosen_spanish: trescientos mil
  alternatives_spanish:
  - trescientos mil hombres
  - '300.000'
  lexicon: HALOT
  rationale: Número cardinal directo; se traduce de forma transparente y natural en español.
translation_notes:
  revision_awareness: El texto español sigue de cerca el sentido del hebreo y coincide sustancialmente con la solución auditada en inglés; se mantuvo la estructura militar y genealógica, y no se introdujeron cambios doctrinales ni textuales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino; aquí no aparece, por lo que no se introduce.
  - '''Judá'' se conserva como nombre propio tribal/territorial.'
  - Se mantuvo el registro bíblico moderno, con sintaxis fluida y sin calcos innecesarios.
