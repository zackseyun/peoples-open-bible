    text: Or 'other Hebrews of the same age group.' The Greek phrase explicitly includes an age reference.
    reason: lexical_alternative
  - marker: b
    text: Literally 'eat pork' or 'eat swine's flesh.'
    reason: lexical_alternative
  - marker: c
    text: The Greek adverb literally means 'more bitterly,' that is, more harshly or severely.
    reason: lexical_alternative
