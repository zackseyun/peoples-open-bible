  text: His servants carried him dead from Megiddo and brought him to Jerusalem[a], and they buried him in his tomb. Then the people of the land took Jehoahaz the son of Josiah, anointed him[b], and made him king in place of his father.
  footnotes:
  - marker: a
    text: Or 'made him ride'; the Hebrew verb is literally 'caused him to ride,' here referring to transporting Josiah's body.
    reason: lexical_alternative
  - marker: b
    text: '''The people of the land'' is a formal Hebrew expression for the local populace acting as a political body.'
    reason: cultural_note
