id: MAT.8.2
reference: Matthew 8:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ λεπρὸς ⸀προσελθὼν προσεκύνει αὐτῷ λέγων· Κύριε, ἐὰν θέλῃς δύνασαί με καθαρίσαι.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/008/002.yaml
  text: 'And behold[a], a leper came and bowed down before him, saying, “Lord, if you are willing, you are able to cleanse me.”'
  footnotes:
  - marker: a
    text: Or "worshiped him"; the Greek verb can denote bowing in reverence, paying homage, or worship, depending on context.
    reason: lexical_alternative
translation:
  language: ko
  text: '그런데 보십시오, 한 나병환자[a]가 와서 그분 앞에 엎드려 말했습니다. 「주님, 원하시면 저를 깨끗하게 하실 수 있습니다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 λεπρός. 본문은 한센병을 포함한 의식적·신체적 불결을 일으키는 피부병 환자를 가리킨다. 전통 한국어 「문둥병자」는 차별적 함의가 강하므로 현대 의학·번역 관용에 따라 「나병환자」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: λεπρός
  english_pob_choice: a leper
  chosen_korean: 나병환자
  alternatives_korean:
  - 문둥병자
  - 나병에 걸린 사람
  lexicon: BDAG
  rationale: 한국어 「문둥병자」는 비하적 함의가 강하여 현대 번역에서는 「나병환자」가 표준이다. 본문은 의식적 부정과 신체적 질병이 결합된 상태를 가리키므로 「병」을 포함한 용어로 옮긴다.
- source_word: προσεκύνει
  english_pob_choice: bowed down before
  chosen_korean: 엎드려
  alternatives_korean:
  - 경배하며
  - 무릎 꿇고
  lexicon: BDAG
  rationale: προσκυνέω는 신체적 부복부터 경배까지 의미 폭이 넓다. 본문은 명백히 신체적 부복 장면이므로 신학적 해석을 미리 닫지 않도록 「엎드려」로 옮긴다.
