base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/008/006.yaml
  text: And David placed garrisons in Aram of Damascus[a], and Aram became servants to David, bringing tribute[c][b]. And Yahweh gave David victory wherever he went.
  footnotes:
  - marker: a
    text: Or 'in Syria of Damascus.' The Hebrew name is 'Aram,' which this translation normally preserves rather than replacing with the traditional 'Syria.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bearing tribute' or 'bringing gifts.' The Hebrew term can mean gift, offering, or tribute; here it likely refers to vassal payment.
    reason: lexical_alternative
  - marker: c
    text: Or 'the LORD saved/delivered David wherever he went.'
    reason: lexical_alternative
