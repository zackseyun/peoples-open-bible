translation:
  language: es
  text: Y su tierra está llena de ídolos; se postran ante la obra de sus manos[a], ante lo que hicieron sus dedos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su tierra»—un singular colectivo que se refiere al pueblo/la nación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּמָּלֵא
  english_pob_choice: is filled
  chosen_spanish: está llena
  alternatives_spanish:
  - se llenó
  - ha sido llenada
  lexicon: HALOT
  rationale: El verbo en nifal expresa estado/resultante. En español, «está llena» comunica bien el cuadro presente y vívido del oráculo, sin volverlo narración pasada.
- source_word: אַרְצוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - la tierra de ellos
  lexicon: HALOT
  rationale: Se mantiene el singular posesivo del hebreo. En el contexto, el posesivo funciona como singular colectivo referido a la nación; «su tierra» conserva esa forma sin forzar pluralización.
- source_word: אֱלִילִים
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - ídolos inútiles
  - imágenes
  lexicon: HALOT
  rationale: «Ídolos» es el equivalente claro y natural. La carga peyorativa del término hebreo queda suficientemente presente por el contexto profético.
- source_word: לְמַעֲשֵׂה יָדָיו
  english_pob_choice: to the work of their hands
  chosen_spanish: ante la obra de sus manos
  alternatives_spanish:
  - a la obra de sus manos
  - ante lo que hicieron sus manos
  lexicon: HALOT
  rationale: Con el verbo de postración, la preposición introduce el objeto ante el cual se inclinan. «Ante la obra de sus manos» conserva la imagen concreta y el contraste irónico entre lo hecho por humanos y el acto de adoración.
- source_word: יִשְׁתַּחֲוּוּ
  english_pob_choice: they bow down
  chosen_spanish: se postran
  alternatives_spanish:
  - se inclinan
  - adoran
  lexicon: HALOT
  rationale: El verbo describe una acción corporal de postración. «Se postran» preserva esa imagen mejor que «adoran», que sería más interpretativo. El sentido cultual queda claro por el contexto.
- source_word: לַאֲשֶׁר עָשׂוּ אֶצְבְּעֹתָיו
  english_pob_choice: to what their fingers have made
  chosen_spanish: ante lo que hicieron sus dedos
  alternatives_spanish:
  - ante lo que sus dedos hicieron
  - ante lo que sus dedos han hecho
  lexicon: HALOT
  rationale: Se conserva la referencia concreta a los dedos y la fuerza artesanal del hebreo. En español, «hicieron» evita una perífrasis innecesaria y refleja bien el resultado del acto manual sin agregar elementos ausentes.
theological_decisions:
- issue: Presentación del acto idólatra en השתחוה
  english_pob_reading: they bow down
  chosen_spanish_reading: se postran
  alternative_spanish_readings:
  - adoran
  - se inclinan
  rationale: La decisión mantiene la corporalidad del gesto, que es parte de la denuncia profética. «Se postran» deja que el peso teológico surja del contraste entre el Dios verdadero y los objetos fabricados por manos humanas.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sujeto colectivo singular en 'his land'
  english_pob_reading: his land ... their hands ... their fingers
  chosen_spanish_reading: su tierra ... sus manos ... sus dedos
  alternative_spanish_readings:
  - la tierra de ellos ... las manos de ellos ... los dedos de ellos
  - su tierra ... sus manos ... sus propios dedos
  rationale: El hebreo conserva un singular colectivo para la nación. El español puede sostener ese singular posesivo sin dificultad. En la frase de la manufactura idolátrica, el plural posesivo en castellano es la forma natural para expresar el colectivo humano que fabrica y luego se postra.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra un acuerdo alto y una revisión menor: se eliminó «own» por no estar explícito en el hebreo. En español no se introdujo ningún equivalente de «propios»; por eso la traducción sigue de cerca el texto hebreo y el estado revisado del POB inglés. Se mantuvo la tensión entre el singular colectivo («su tierra») y el plural humano del acto idolátrico en una forma natural para el español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «ídolos» y «se postran» por su claridad y por la fidelidad al contraste corporal y teológico del pasaje.
  - Se mantuvo el singular posesivo en la primera cláusula para reflejar el colectivo hebreo sin suavizarlo a plural.
  - «Obra de sus manos» conserva la ironía material del hebreo; «dedos» se mantiene en plural sin añadir intensificador no explícito.
