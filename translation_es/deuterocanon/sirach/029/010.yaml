translation:
  language: es
  text: Pierde la plata por un hermano y un amigo[a], y no la dejes corroerse bajo una piedra para ruina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no la dejes corroer bajo una piedra hasta la ruina». El verbo griego de esta cláusula es difícil; el sentido es que la plata acumulada se deteriora o se desperdicia cuando se oculta en vez de usarse para ayudar a otros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόλεσον
  english_pob_choice: Lose
  chosen_spanish: Pierde
  alternatives_spanish:
  - Gasta
  - Entrega
  - Arriesga
  lexicon: LSJ
  rationale: El imperativo aoristo expresa desprenderse voluntariamente de algo valioso por el bien de otro. «Pierde» conserva el golpe paradójico de la frase, como en la versión inglesa, sin volverla demasiado explicativa.
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: la plata
  alternatives_spanish:
  - dinero
  - plata
  lexicon: LSJ
  rationale: El griego dice literalmente «plata», y el POB inglés retiene esa concreción económica. En español, «la plata» mantiene la imagen proverbial y es plenamente comprensible como dinero.
- source_word: διʼ ἀδελφὸν καὶ φίλον
  english_pob_choice: for a brother and a friend
  chosen_spanish: por un hermano y un amigo
  alternatives_spanish:
  - en favor de un hermano y un amigo
  - para un hermano y un amigo
  lexicon: LSJ
  rationale: La preposición διά con acusativo expresa beneficio o causa. «Por» comunica de manera natural el sentido de hacerlo por el bien de esas personas, sin introducir posesivos que el griego no tiene.
- source_word: μὴ ἰωθῇ
  english_pob_choice: do not let it rust
  chosen_spanish: no la dejes oxidarse
  alternatives_spanish:
  - no la dejes corroer
  - no la dejes deteriorarse
  lexicon: LSJ
  rationale: El verbo es difícil y el inglés opta por una imagen de deterioro de metal guardado. «Oxidarse» conserva la idea de deterioro por desuso o almacenamiento, aunque en sentido físico la plata no se oxide literalmente; por eso se mantiene el valor proverbial sin suavizarlo.
- source_word: ὑπὸ τὸν λίθον
  english_pob_choice: under a stone
  chosen_spanish: bajo una piedra
  alternatives_spanish:
  - debajo de una piedra
  - bajo la piedra
  lexicon: LSJ
  rationale: La imagen concreta de ocultar o enterrar dinero se conserva de forma directa. «Piedra» es natural en español y mantiene el cuadro proverbial.
- source_word: εἰς ἀπώλειαν
  english_pob_choice: to destruction
  chosen_spanish: para destrucción
  alternatives_spanish:
  - para ruina
  - hacia la pérdida
  lexicon: LSJ
  rationale: 'La expresión final indica el resultado de ese ocultamiento: pérdida total o ruina. «Para destrucción» reproduce la severidad del griego y del inglés, aun con tono más formal.'
translation_notes:
  revision_awareness: 'La versión española sigue la lectura revisada más literal del inglés: se omite el equivalente de «away» en la última cláusula y se conserva la imagen breve y proverbial del original griego, con la dificultad verbal indicada en nota.'
  spanish_consistency_notes:
  - Se mantiene «plata» en lugar de «dinero» para preservar el idioma concreto del griego y la tradición auditada del POB.
  - «Pierde» conserva la paradoja del imperativo griego mejor que «gasta», que sería demasiado interpretativo.
  - 'La nota a pie de página marca la misma tensión lexical que el inglés: el verbo final puede entenderse como deterioro/corrosión o como desperdicio/ruina.'
