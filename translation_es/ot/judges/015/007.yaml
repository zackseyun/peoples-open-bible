translation:
  language: es
  text: 'Y Sansón les dijo[a]: «Si hacen esto, ciertamente me vengaré de ustedes, y después desistiré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si hacen tal cosa, ciertamente me vengaré de ustedes, y después desistiré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... les dijo
  alternatives_spanish:
  - Entonces ... les dijo
  - Y ... dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se refleja naturalmente con 'Y ... dijo', preservando el avance de la narración sin añadir interpretación temporal extra.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a los hombres
  lexicon: HALOT
  rationale: El clítico dativo en español transmite de forma más natural el destinatario del discurso.
- source_word: שִׁמְשׁוֹן
  english_pob_choice: Samson
  chosen_spanish: Sansón
  alternatives_spanish:
  - Samson
  lexicon: convención onomástica española
  rationale: Se usa la forma usual en español bíblico para el nombre propio, manteniendo inteligibilidad y lectura eclesial amplia.
- source_word: אִם תַּעֲשׂוּן כָּזֹאת
  english_pob_choice: If this is what you do
  chosen_spanish: Si hacen esto
  alternatives_spanish:
  - Si hacen tal cosa
  - Si actúan así
  lexicon: HALOT
  rationale: La cláusula condicional y enfática se expresa de manera natural en español sin perder el contenido de 'esto/tal cosa'.
- source_word: כִּי אִם
  english_pob_choice: then I will surely
  chosen_spanish: entonces yo
  alternatives_spanish:
  - ciertamente yo
  - seguramente yo
  lexicon: HALOT
  rationale: La fuerza enfática se integra en el flujo de la oración con 'entonces' y el futuro; no se introduce un juramento inexistente, y la certeza queda reforzada por el contexto completo de la frase.
- source_word: נִקַּמְתִּי
  english_pob_choice: I will take vengeance
  chosen_spanish: tomaré venganza
  alternatives_spanish:
  - me vengaré
  - ejecutaré venganza
  lexicon: HALOT
  rationale: '''Tomar venganza'' conserva la carga retributiva del verbo נקם sin suavizarla con una formulación más psicológica; ''me vengaré'' es posible, pero el español POB suele mantener la acción de venganza con claridad jurídica/narrativa.'
- source_word: בָכֶם
  english_pob_choice: on you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - contra ustedes
  - sobre ustedes
  lexicon: HALOT
  rationale: Con 'tomar venganza' en español, la relación del objeto se expresa de modo natural con 'de ustedes'; 'contra ustedes' se reserva si se quisiera enfatizar oposición directa.
- source_word: וְאַחַר
  english_pob_choice: and after that
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - y después de eso
  lexicon: HALOT
  rationale: Marca secuencia temporal de forma clara y sobria, compatible con el flujo narrativo.
- source_word: אֶחְדָּל
  english_pob_choice: I will stop
  chosen_spanish: dejaré de hacerlo
  alternatives_spanish:
  - cesaré
  - me detendré
  lexicon: HALOT
  rationale: '''חדל'' significa cesar/dejar de; ''dejaré de hacerlo'' evita ambigüedad en español y conserva la idea de poner fin a la acción de venganza/retribución, sin añadir un objeto explícito ausente en el hebreo.'
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión inglesa sustituyó 'I swear' por 'I will surely' para no añadir un juramento explícito; por eso el español evita fórmulas juratorias y conserva sólo el énfasis inferible del hebreo כִּי אִם. También se siguió la lectura del texto hebreo para mantener el cierre con 'dejaré de hacerlo' como equivalente de חדל, sin sobreexplicar el referente.
  spanish_consistency_notes:
  - Se mantuvo 'venganza' como sustantivo fuerte, en línea con la carga de נקם.
  - Se prefirió 'Sansón' por la convención española bíblica estándar.
  - La puntuación con comillas angulares y el uso de 'les' reflejan español bíblico moderno y legible.
  - La nota alternativa preserva la tensión entre 'tomaré venganza' y 'me vengaré', sin eliminar ninguna de las opciones relevantes.
