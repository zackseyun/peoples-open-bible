translation:
  language: es
  text: 'Y les dijo: «No lleven nada para el camino: ni bastón, ni bolsa[a], ni pan, ni dinero[b]; y no tengan dos túnicas cada uno[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «morral» o «bolsa de viaje» para πήρα.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «plata»; aquí se refiere al dinero.
    reason: lexical_alternative
  - marker: c
    text: La expresión griega significa «dos túnicas cada uno» o «dos túnicas por persona».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - nada en absoluto
  lexicon: BDAG
  rationale: El negativo indefinido funciona como objeto directo de la prohibición. «Nada» es la equivalencia natural y concisa en español.
- source_word: αἴρετε
  english_pob_choice: take
  chosen_spanish: lleven
  alternatives_spanish:
  - tomen
  - carguen
  lexicon: BDAG
  rationale: En instrucciones de viaje, αἴρω puede significar tomar o llevar consigo. «Lleven» expresa bien la idea de portar algo para el trayecto en español actual.
- source_word: εἰς τὴν ὁδόν
  english_pob_choice: for the journey
  chosen_spanish: para el camino
  alternatives_spanish:
  - para el viaje
  - en el camino
  lexicon: BDAG
  rationale: La expresión es idiomática para el trayecto. «Para el camino» conserva la función final y suena natural en español.
- source_word: ῥάβδον
  english_pob_choice: a staff
  chosen_spanish: bastón
  alternatives_spanish:
  - vara
  - cayado
  lexicon: BDAG
  rationale: En este contexto de viaje, el objeto es un apoyo o vara de andar. «Bastón» comunica la función en español de forma clara y sobria.
- source_word: πήραν
  english_pob_choice: a bag
  chosen_spanish: bolsa
  alternatives_spanish:
  - morral
  - bolsa de viaje
  lexicon: BDAG
  rationale: πήρα es una bolsa para provisiones. «Bolsa» es la equivalencia directa y readable; la alternativa más específica queda reflejada en la nota.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  lexicon: BDAG
  rationale: El término literal es «pan», y no hace falta generalizarlo a «alimento».
- source_word: ἀργύριον
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - moneda
  lexicon: BDAG
  rationale: Aunque literalmente significa «plata», aquí se refiere al medio de pago. «Dinero» transmite mejor el sentido práctico en español.
- source_word: ἀνὰ δύο χιτῶνας ἔχειν
  english_pob_choice: do not have two tunics each
  chosen_spanish: no tengan dos túnicas cada uno
  alternatives_spanish:
  - no tengan dos túnicas por persona
  - no lleven dos túnicas cada uno
  lexicon: BDAG
  rationale: La construcción distributiva con ἀνά exige expresar la idea de «dos cada uno». «No tengan dos túnicas cada uno» conserva esa fuerza sin oscurecer el español.
- source_word: χιτῶνας
  english_pob_choice: tunics
  chosen_spanish: túnicas
  alternatives_spanish:
  - camisas
  - vestiduras
  lexicon: BDAG
  rationale: «Túnicas» preserva mejor el referente histórico del vestido interior que opciones más modernas o genéricas.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando todos los marcadores de nota en el texto español y manteniendo el sentido distributivo de «ἀνὰ δύο χιτῶνας».
  spanish_consistency_notes:
  - Se mantuvo «túnicas» para χιτῶνας por consistencia con el vocabulario histórico del pasaje.
  - Se evitó «SEÑOR» u otras convenciones no presentes en el texto fuente.
  - La puntuación sigue el español de cita directa con dos puntos y comillas angulares.
  - «Dinero» se usa como equivalente contextual de ἀργύριον, mientras la nota preserva la literalidad «plata».
