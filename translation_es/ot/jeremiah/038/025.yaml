  text: וְ/כִֽי יִשְׁמְע֣וּ הַ/שָּׂרִים֮ כִּֽי דִבַּ֣רְתִּי אִתָּ/ךְ֒ וּ/בָ֣אוּ אֵלֶ֣י/ךָ וְֽ/אָמְר֪וּ אֵלֶ֟י/ךָ הַגִּֽידָ/ה נָּ֨א לָ֜/נוּ מַה דִּבַּ֧רְתָּ אֶל הַ/מֶּ֛לֶךְ אַל תְּכַחֵ֥ד מִמֶּ֖/נּוּ וְ/לֹ֣א נְמִיתֶ֑/ךָ וּ/מַה דִּבֶּ֥ר אֵלֶ֖י/ךָ הַ/מֶּֽלֶךְ־־־־־־־׃
