review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la secuencia del griego: mantiene la enumeración explícita de varones, mujeres y niños, la referencia a los residentes en Jerusalén, la postración, la ceniza sobre la cabeza y la acción inusual relacionada con el sayal. Sin embargo, presenta dos desajustes relevantes: «delante del Señor» traduce κύριος como «el Señor» en vez del término por defecto del proyecto «Yahvé», y «sus sacos» suena léxica y contextualmente inadecuado para σάκκους en un contexto de luto, donde debe expresarse como «sus vestidos de luto» o «sus vestiduras de saco».'
  spanish_quality_summary: El español es mayormente claro, pero «cayeron rostro en tierra» resulta algo rígido y tradicional; «cayeron sobre sus rostros» o «cayeron rostro en tierra» ambos son posibles, aunque el primero se alinea mejor con el griego y suena natural en registro bíblico moderno. El problema principal de legibilidad es «extendieron sus sacos», que en español contemporáneo evoca bolsas, no tela áspera de luto. También conviene armonizar el nombre divino con la política del proyecto.
  glossary_alignment: 'Hay un conflicto con la directriz del proyecto: κύριος referido al Dios de Israel debe revisarse a «Yahvé» en el texto principal, salvo excepción documentada, y aquí no se documenta una excepción litúrgica. Además, σάκκος no debe quedar como «saco» desnudo en español por la ambigüedad moderna; una forma como «vestiduras de saco» o «vestidos de luto» preserva mejor el sentido. El resto de la terminología principal está bien alineado.'
  issues:
  - severity: high
    issue: Uso de «el Señor» para κύριος
    rationale: La guía del proyecto establece «Yahvé» como forma principal en español para el nombre/título divino, salvo excepción contextual documentada. En este registro no se aporta una razón suficiente para apartarse de esa norma.
  - severity: high
    issue: «extendieron sus sacos» no comunica bien σάκκους
    rationale: En español actual «sacos» suele entenderse como bolsas o, secundariamente, chaquetas; no transmite de manera clara el vestido áspero de duelo. El contexto exige una formulación como «vestiduras de saco» o equivalente.
  - severity: medium
    issue: «cayeron rostro en tierra» es menos natural que una opción más transparente
    rationale: Aunque comprensible y de sabor bíblico, puede sonar calcado. «Cayeron sobre sus rostros» preserva mejor la imagen del griego y mantiene buena legibilidad.
  revised_spanish_text: Y todo varón de Israel[a], y las mujeres y los niños, los que habitaban en Jerusalén, cayeron sobre sus rostros delante del templo, y se echaron ceniza sobre sus cabezas, y extendieron sus vestiduras de saco[b] delante de Yahvé.
  revised_footnotes:
