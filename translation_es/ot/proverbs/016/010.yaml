translation:
  language: es
  text: Un veredicto divino[a] está en los labios de un rey; su boca no traiciona la justicia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo קֶסֶם suele significar «divinación»; aquí se traduce como «veredicto divino» porque el contexto es judicial. Alternativas: «divinación» u «oráculo».'
    reason: lexical_alternative
  - marker: b
    text: O «en el juicio» o «cuando juzga» para «justicia» (מִשְׁפָּט).
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶסֶם
  english_pob_choice: a divine verdict
  chosen_spanish: un veredicto divino
  alternatives_spanish:
  - divinación
  - oráculo
  lexicon: HALOT
  rationale: El hebreo קֶסֶם suele significar ‘divinación’ o ‘oráculo’, pero el contexto de este proverbio es judicial y describe la palabra recta del rey. ‘Veredicto divino’ en inglés se traslada con naturalidad a ‘veredicto divino’ en español, preservando el tono elevado sin sugerir práctica oculta.
- source_word: עַל
  english_pob_choice: is on
  chosen_spanish: está en
  alternatives_spanish:
  - está sobre
  - reposa sobre
  lexicon: HALOT
  rationale: La construcción hebrea expresa localización figurada; en español ‘está en los labios’ conserva la imagen con fluidez y sin calco forzado.
- source_word: שִׂפְתֵי מֶלֶךְ
  english_pob_choice: the lips of a king
  chosen_spanish: los labios del rey
  alternatives_spanish:
  - los labios de un rey
  lexicon: HALOT
  rationale: Se mantiene el sustantivo ‘labios’ para reflejar el paralelismo con la segunda línea y la formulación hebrea. ‘Del rey’ funciona bien porque el proverbio puede leerse como referencia típica/realizada, como en el inglés POB.
- source_word: בְּמִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - en el juicio
  - cuando juzga
  lexicon: HALOT
  rationale: מִשְׁפָּט puede referirse al acto o esfera del juicio; ‘justicia’ es la opción más natural en español y conserva el campo jurídico sin perder la idea de rectitud judicial.
- source_word: לֹא יִמְעַל
  english_pob_choice: does not betray
  chosen_spanish: no traiciona
  alternatives_spanish:
  - no transgrede
  - no actúa con infidelidad
  lexicon: HALOT
  rationale: מעל implica obrar con infidelidad o traición. En español, ‘traiciona’ comunica bien la falta de lealtad a la justicia y mantiene la fuerza ética del verbo en este contexto.
- source_word: פִּיו
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - sus labios
  - su խոսar
  lexicon: HALOT
  rationale: Se conserva la variación hebrea entre ‘labios’ y ‘boca’. ‘Boca’ evita repetir ‘labios’ y reproduce el cambio de imagen del texto fuente.
theological_decisions:
- issue: Cómo renderizar קֶסֶם sin insinuar adivinación prohibida
  english_pob_reading: Rendered positively as 'a divine verdict' in light of the parallel judicial clause and proverbial description of ideal royal judgment.
  chosen_spanish_reading: Se traduce positivamente como ‘un veredicto divino’ por el paralelo con ‘justicia’ y el carácter sapiencial del proverbio.
  alternative_spanish_readings:
  - la divinación está en los labios del rey
  - un oráculo está en los labios del rey
  rationale: El verso no aprueba prácticas ocultas; describe la calidad ideal de la palabra real en el juicio. ‘Veredicto divino’ conserva la elevación semántica y evita una lectura engañosa de ‘divinación’.
  doctrine_reference: Sabiduría bíblica; justicia real y juicio recto
translation_notes:
  revision_awareness: El inglés POB mantiene la lectura positiva de קֶסֶם y conserva una nota de alternativa; la presente versión sigue esa decisión y adapta la distinción entre ‘lips/mouth’ al español con una variación estilística equivalente. No se introducen revisiones textuales nuevas; se respeta el acuerdo alto del aparato auditado.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - ‘Justicia’ traduce מִשְׁפָּט en su sentido jurídico, sin borrar la posibilidad alternativa de ‘juicio’.
  - Se mantiene la tensión lexical de קֶסֶם mediante nota, evitando una simplificación doctrinal o una traducción puramente mecánica.
