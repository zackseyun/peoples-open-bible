revisions:
- from: Y ahora[a], mira, yo sé que tú reinarás ciertamente, y el reino de Israel será establecido en tu mano.
  to: Y ahora, mira, sé que reinarás ciertamente, y el reino de Israel quedará establecido en tu mano[a].
  rationale: Se reubica la nota en «tu mano» para corregir el anclaje y se mejora la naturalidad del español con «sé» y «quedará establecido», manteniendo intacto el sentido del hebreo y la justificación léxica documentada. No requiere adjudicación adicional.
