translation:
  language: es
  text: Porque los sacerdotes y los levitas se habían purificado juntos; todos ellos estaban limpios. Y degollaron el cordero de la Pascua para todos los hijos del exilio[a], y para sus hermanos los sacerdotes, y para ellos mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para todos los exiliados retornados» o «para toda la comunidad del exilio»; literalmente, «para todos los hijos del exilio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: HALOT
  rationale: Introduce una cláusula explicativa de causa o fundamento. «Porque» conserva la relación lógica natural en español y el valor explicativo del hebreo sin forzar una conclusión diferente.
- source_word: הִטַּהֲרוּ
  english_pob_choice: had purified themselves
  chosen_spanish: se habían purificado
  alternatives_spanish:
  - se purificaron
  - habían hecho su purificación
  - se habían limpiado
  lexicon: HALOT
  rationale: 'El hitpael es reflexivo: los sacerdotes y levitas realizan la purificación sobre sí mismos. El pluscuamperfecto refleja la acción previa respecto del sacrificio, como en el inglés auditado.'
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: Es el término cultual normal en español bíblico y contemporáneo; «sacerdotes» mantiene el sentido institucional del hebreo.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y los levitas
  alternatives_spanish:
  - y los levitas del templo
  lexicon: HALOT
  rationale: Designación estándar del grupo levítico distinto de los sacerdotes. No requiere ampliación interpretativa.
- source_word: כְּאֶחָד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - como uno
  - de común acuerdo
  lexicon: HALOT
  rationale: La idea es de acción unificada o conjunta. «Juntos» comunica bien el valor idiomático sin introducir una imagen masculina del tipo «como un solo hombre».
- source_word: כֻּלָּם טְהוֹרִים
  english_pob_choice: all of them were clean
  chosen_spanish: todos ellos estaban limpios
  alternatives_spanish:
  - todos estaban puros
  - todos estaban ceremonialmente limpios
  lexicon: HALOT
  rationale: Aquí טְהוֹרִים se refiere a limpieza ritual para el contexto de Pascua. «Limpios» es natural en español y, por el contexto, no se entiende como pureza moral abstracta.
- source_word: וַיִּשְׁחֲטוּ
  english_pob_choice: they slaughtered
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - degollaron
  - mataron
  lexicon: HALOT
  rationale: En contexto pascual, el verbo designa la acción cultual sobre la víctima. En español, «sacrificaron» comunica mejor la función ritual que «mataron», sin perder el acto de inmolación.
- source_word: הַפֶּסַח
  english_pob_choice: the Passover lamb
  chosen_spanish: el cordero de la Pascua
  alternatives_spanish:
  - la Pascua
  - el sacrificio de Pascua
  - el animal pascual
  lexicon: HALOT
  rationale: El hebreo puede referirse al animal pascual concreto. «Cordero de la Pascua» hace explícito el objeto sacrificial de manera idiomática en español, aunque la escena no exige identificar la especie con total certeza en todos los contextos.
- source_word: לְכָל בְּנֵי הַגּוֹלָה
  english_pob_choice: for all the sons of the exile
  chosen_spanish: para todos los hijos del exilio
  alternatives_spanish:
  - para todos los hijos de la cautividad
  - para todos los exiliados retornados
  - para toda la comunidad del exilio
  lexicon: HALOT
  rationale: Conserva el genitivo del hebreo («hijos del exilio») para mantener la designación comunitaria y el eco textual. «Exilio» es más claro y neutro en español que «cautividad».
- source_word: וְלַאֲחֵיהֶם הַכֹּהֲנִים
  english_pob_choice: and for their brothers the priests
  chosen_spanish: y para sus hermanos los sacerdotes
  alternatives_spanish:
  - y para sus hermanos, los sacerdotes
  - y para sus hermanos sacerdotes
  - y para sus hermanos, que eran sacerdotes
  lexicon: HALOT
  rationale: El hebreo presenta una relación fraterna dentro de Israel y una aposición que distingue a los sacerdotes de los levitas. Mantener «sus hermanos los sacerdotes» conserva esa relación sin diluirla en «colegas» o «compañeros».
- source_word: וְלָהֶם
  english_pob_choice: and for themselves
  chosen_spanish: y para ellos mismos
  alternatives_spanish:
  - y para sí mismos
  - y para ellos
  lexicon: HALOT
  rationale: El pronombre vuelve a los levitas que realizan la acción. «Para ellos mismos» deja clara la referencia reflexiva y evita ambigüedad.
theological_decisions:
- issue: Pureza ritual vs. pureza moral
  english_pob_reading: Rendered טְהוֹרִים as 'clean' in a cultic sense, not moral purity.
  chosen_spanish_reading: «limpios» en sentido ritual/cultual, no moral.
  alternative_spanish_readings:
  - puros
  - ceremonialmente limpios
  rationale: El contexto es la preparación para la Pascua y la aptitud ritual de sacerdotes y levitas. «Limpios» en español puede sonar general, pero aquí queda delimitado por el contexto cultual; no conviene cargarlo con una noción de santidad interior que el versículo no explicita.
  doctrine_reference: 'Principio de primacía de la fuente: no importar una teología adicional que el texto no enuncia.'
- issue: Designación comunitaria בְּנֵי הַגּוֹלָה
  english_pob_reading: Kept 'sons of the exile' in the main text.
  chosen_spanish_reading: «hijos del exilio» en el texto principal.
  alternative_spanish_readings:
  - exiliados retornados
  - comunidad del exilio
  - los desterrados
  rationale: En español, «hijos del exilio» conserva el eco literal del hebreo y su valor corporativo. Se evita reemplazarlo por una frase explicativa que borre la forma de la designación original.
  doctrine_reference: 'Principio de equivalencia auditada: conservar la forma del grupo cuando funciona como nombre colectivo.'
translation_notes:
  revision_awareness: 'El inglés auditado pasó de «as one» a «together» para כְאֶחָד, y mantuvo «slaughtered» para וַיִּשְׁחֲטוּ. La versión española sigue esa revisión: usa «juntos» para la unidad de acción y conserva un verbo ritual fuerte («sacrificaron») adecuado al contexto pascual. También respeta la lectura de טְהוֹרִים como limpieza ritual y la nota sobre בְּנֵי הַגּוֹלָה como designación comunitaria.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se evita «Cristo» porque no hay referencia mesiánica aquí.
  - «Sacerdotes» y «levitas» se usan como términos técnicos estables, sin substitución por vocablos eclesiales posteriores.
  - La nota a pie de página se ancla en «hijos del exilio» para preservar la alternativa lexical documentada en el audit trail inglés.
