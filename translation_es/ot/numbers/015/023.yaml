translation:
  language: es
  text: todo lo que Yahvé les ha mandado[a] por medio de Moisés, desde el día en que Yahvé mandó y en adelante, a lo largo de sus generaciones—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por la mano de Moisés», un modismo que significa «por medio de Moisés».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵת כָּל אֲשֶׁר
  english_pob_choice: everything that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todo aquello que
  lexicon: HALOT
  rationale: La combinación introduce la totalidad de lo mandado. En español, 'todo lo que' transmite con naturalidad esa amplitud sin añadir explicación ajena al hebreo.
- source_word: צִוָּה
  english_pob_choice: has commanded / commanded
  chosen_spanish: ha mandado / dio mandamiento
  alternatives_spanish:
  - ha ordenado
  - mandó
  lexicon: HALOT
  rationale: El verbo hebreo expresa dar una orden o mandato. 'Ha mandado' conserva el valor de mandato con registro bíblico claro; en la repetición temporal, 'dio mandamiento' evita una repetición pesada y sigue siendo fiel al sentido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino, conforme al criterio del proyecto, en lugar de sustituirlo por un título. 'Yahvé' es la forma establecida para el Tetragrámaton en el texto español.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala mediación. 'Por medio de Moisés' comunica esa función mediadora en español natural; se preserva la nota idiomática en la nota al pie.
- source_word: מִן הַיּוֹם אֲשֶׁר
  english_pob_choice: from the day that
  chosen_spanish: desde el día en que
  alternatives_spanish:
  - desde el día que
  - a partir del día en que
  lexicon: HALOT
  rationale: La frase marca el punto de partida temporal. 'Desde el día en que' es una equivalencia clara y solemne, adecuada al estilo bíblico en español.
- source_word: וָהָלְאָה
  english_pob_choice: and onward
  chosen_spanish: y en adelante
  alternatives_spanish:
  - y de allí en adelante
  - y para adelante
  lexicon: HALOT
  rationale: El adverbio expresa continuidad desde ese punto. 'Y en adelante' reproduce esa idea de manera natural y precisa.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - por todas vuestras generaciones
  lexicon: HALOT
  rationale: La expresión tiene fuerza durativa y generacional. 'Por todas sus generaciones' mantiene la continuidad covenantal del hebreo; se usa 'sus' como forma neutral de referencia al pueblo destinatario.
theological_decisions:
- issue: Nombre divino frente a título divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton, no un sustituto. Por fidelidad al nombre revelado y a la línea editorial del proyecto, se usa 'Yahvé' en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor idiomático de בְּיַד מֹשֶׁה
  english_pob_reading: by the hand of Moses
  chosen_spanish_reading: por medio de Moisés
  alternative_spanish_readings:
  - por la mano de Moisés
  - mediante Moisés
  rationale: No se trata de una referencia corporal literal, sino de mediación/agency. La traducción española conserva el sentido sin oscurecer la función de Moisés como mediador del mandato.
  doctrine_reference: HALOT / uso idiomático de la preposición-constructo
- issue: Alcance temporal y generacional
  english_pob_reading: throughout your generations
  chosen_spanish_reading: por todas sus generaciones
  alternative_spanish_readings:
  - para sus generaciones
  - de generación en generación
  rationale: La fórmula expresa vigencia continua para el pueblo a lo largo del tiempo. 'Por todas sus generaciones' conserva ese valor durativo y normativo.
  doctrine_reference: Lectura covenantal de לְדֹרֹתֵיכֶם
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del inglés POB: se refleja la decisión de conservar el sentido idiomático de בְּיַד מֹשֶׁה como mediación, y la repetición de צִוָּה se traduce de forma consistente con un verbo de mandato en presente perfecto y pasado puntual, manteniendo el paralelismo temporal del hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de manera consistente con el criterio del proyecto.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - '''Por medio de Moisés'' conserva el valor idiomático de mediación sin perder la referencia al original hebreo.'
  - '''En adelante'' reproduce la continuidad de וָהָלְאָה sin sobreinterpretar el alcance.'
  - '''Por todas sus generaciones'' preserva la vigencia intergeneracional del mandato.'
