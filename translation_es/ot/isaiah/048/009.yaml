translation:
  language: es
  text: Por amor a mi nombre, retraso mi ira[a], y por mi alabanza la refreno para ti[b], para no cortarte de en medio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «alargo mi nariz», un modismo que significa «retraso mi ira» o «soy lento para enojarme».'
    reason: cultural_note
  - marker: b
    text: O «la contengo»; el verbo hebreo puede sugerir la imagen de poner freno, bozal o brida.
    reason: lexical_alternative
  - marker: c
    text: O «destruirte» o «exterminarte»; el hebreo dice literalmente «cortarte», una formulación con matiz más judicial o pactual.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: For the sake of
  chosen_spanish: Por amor de
  alternatives_spanish:
  - Por causa de
  - A causa de
  - Por el bien de
  lexicon: HALOT
  rationale: La preposición expresa motivo o finalidad. «Por amor de» comunica de forma natural y digna la idea de actuar movido por el nombre de Yahvé, sin perder el valor causal-final del hebreo.
- source_word: שְׁמִי
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi fama
  - mi reputación
  - mi nombre revelado
  lexicon: HALOT
  rationale: Se conserva «nombre» para mantener el valor bíblico de identidad, honra y carácter revelado. En este contexto, no conviene sustituirlo por una abstracción como «reputación» en el texto principal.
- source_word: אַאֲרִיךְ אַפִּי
  english_pob_choice: I delay my anger
  chosen_spanish: retraso mi ira
  alternatives_spanish:
  - prolongo mi ira
  - aplazo mi enojo
  - soy lento para la ira
  lexicon: HALOT
  rationale: El hebreo dice literalmente «alargo mi nariz», un idiomazo para contener o demorar la ira. «Retraso mi ira» preserva la idea temporal y resulta natural en español sin diluir la fuerza del modismo.
- source_word: וּתְהִלָּתִי
  english_pob_choice: and for my praise
  chosen_spanish: y por mi alabanza
  alternatives_spanish:
  - y por mi loor
  - y por mi renombre
  - y por la alabanza que me es debida
  lexicon: HALOT
  rationale: «Alabanza» mantiene el sustantivo del hebreo y evita reemplazarlo por una interpretación más abstracta como «gloria». En español, la frase conserva que la motivación está vinculada a la honra que corresponde a Yahvé.
- source_word: אֶחֱטָם
  english_pob_choice: I restrain it
  chosen_spanish: la refreno
  alternatives_spanish:
  - la contengo
  - la sujeto
  - la muzzlo
  lexicon: HALOT
  rationale: El verbo hebreo sugiere frenar, poner bozales o contener. «Refreno» comunica bien ese campo semántico en español y conserva la imagen de restricción sin sonar mecánico.
- source_word: לָךְ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - en favor de ti
  - por ti
  - respecto de ti
  lexicon: HALOT
  rationale: La preposición marca relación directa con el destinatario. «Para ti» es claro y fiel, y en contexto alude a Israel/Jacob sin necesidad de explicitarlo en el versículo.
- source_word: לְבִלְתִּי
  english_pob_choice: so as not to
  chosen_spanish: para no
  alternatives_spanish:
  - a fin de no
  - para que no
  - no sea que
  lexicon: HALOT
  rationale: Expresa finalidad negativa de manera natural en español, manteniendo el valor de propósito del hebreo.
- source_word: הַכְרִיתֶךָ
  english_pob_choice: cut you off
  chosen_spanish: exterminarte
  alternatives_spanish:
  - cortarte de en medio
  - destruirte
  - borrarte
  lexicon: HALOT
  rationale: Aunque el hebreo conserva el matiz judicial/covenantal de «cortar», en español «exterminarte» expresa con fuerza el resultado extremo que el contexto sugiere. Aquí se privilegia la claridad del efecto; la alternativa más literal puede reservarse para nota si se desea mantener la imagen de 'cortar'.
theological_decisions:
- issue: Motivación divina para la contención del juicio
  english_pob_reading: God restrains anger for the sake of his own name and praise, with the addressee's preservation as the stated result.
  chosen_spanish_reading: Dios contiene su ira por amor a su nombre y por su alabanza, y el resultado declarado es no exterminar al destinatario.
  alternative_spanish_readings:
  - Dios actúa principalmente en favor de Israel
  - Dios hace esto por su gloria en vez de por su alabanza
  rationale: La traducción conserva que la base explícita es el nombre y la alabanza de Dios, no el mérito humano. También mantiene el énfasis en la preservación como resultado, sin reinterpretar el texto como si hablara primariamente del beneficio humano.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Objeto implícito del verbo de restricción
  english_pob_reading: The object is understood as God's anger from the previous clause and rendered as 'it.'
  chosen_spanish_reading: El objeto implícito es la ira mencionada en la cláusula anterior, por lo que se expresa con un pronombre femenino acorde con «ira».
  alternative_spanish_readings:
  - No expresar el objeto
  - Repetir explícitamente 'mi ira'
  rationale: En español conviene recuperar el referente implícito para evitar oscuridad. Al usar «la refreno», se mantiene la elipsis hebrea sin añadir contenido nuevo, y se adapta la concordancia natural del español.
  doctrine_reference: Translation philosophy §6
- issue: Valor de כרת en forma causativa
  english_pob_reading: cut you off
  chosen_spanish_reading: exterminarte
  alternative_spanish_readings:
  - cortarte de en medio
  - destruirte
  - eliminarte
  rationale: El hebreo tiene una resonancia judicial y pactual que el español moderno no siempre comunica con «cortar». «Exterminarte» comunica el alcance severo del juicio; la posible tensión con el valor más literal de «cortar» queda reconocida en la decisión léxica.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje se traduce siguiendo el texto hebreo masorético de Isaías 48:9 y el auditorio inglés POB no introdujo cambios de revisión. Se preserva la motivación explícita por el nombre y la alabanza de Yahvé, junto con la cláusula final de no destruir al destinatario.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton según la terminología del proyecto.
  - «Ira» se mantiene como sustantivo concreto para conservar la continuidad del objeto implícito en «la refreno».
  - Se evita «gloria» en el texto principal porque el hebreo aquí dice literalmente «alabanza» y el POB inglés también lo preserva.
  - La nota sobre el modismo de la nariz ayuda a no perder la base semítica de la expresión sin sobrecargar el verso.
  - La elección de «exterminarte» es más fuerte que la literalidad de «cortar», pero se documenta la alternativa más cercana en la nota correspondiente.
