translation:
  language: es
  text: Pues el día de Yahvé está cerca sobre todas las naciones[a]. Como hiciste, se hará contigo; tu retribución[b] volverá sobre tu propia cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contra todas las naciones». La preposición puede señalar juicio dirigido hacia las naciones.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu pago» o «tu trato». El hebreo se refiere a lo que vuelve a una persona en respuesta a sus acciones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה / יְהוָה (YHWH)
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión del POB de no sustituir el nombre divino por un título. En español, 'Yahvé' conserva el nombre propio del Tetragrámaton con uso reverente y lectura eclesial amplia.
- source_word: יוֹם יְהוָה
  english_pob_choice: the day of Yahweh
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día del Señor
  - el día de Yahvé
  lexicon: HALOT
  rationale: La expresión profética se mantiene como fórmula reconocible, pero con el nombre divino explícito. No se enmascara con 'Señor', de acuerdo con la política del proyecto.
- source_word: עַל כָּל הַגּוֹיִם
  english_pob_choice: upon all the nations
  chosen_spanish: sobre todas las naciones
  alternatives_spanish:
  - contra todas las naciones
  - sobre todos los pueblos
  lexicon: HALOT
  rationale: '''Sobre'' conserva la fuerza direccional y el alcance del juicio sin decidir por completo entre ''sobre'' y ''contra''. ''Naciones'' sigue el paralelismo y el registro profético.'
- source_word: כַּאֲשֶׁר עָשִׂיתָ
  english_pob_choice: As you have done
  chosen_spanish: Como tú hiciste
  alternatives_spanish:
  - Así como tú hiciste
  - Conforme a lo que hiciste
  lexicon: HALOT
  rationale: La comparación retributiva se expresa con una construcción natural en español. El pretérito simple funciona bien como equivalente narrativo/profético y evita sobrecargar el verso.
- source_word: יֵעָשֶׂה לָּךְ
  english_pob_choice: it will be done to you
  chosen_spanish: así se hará contigo
  alternatives_spanish:
  - te será hecho así
  - se hará eso contigo
  lexicon: HALOT
  rationale: La pasiva impersonal reproduce el sentido del nifal sin forzar un calco. 'Contigo' preserva el destinatario personal del acto retributivo.
- source_word: גְּמֻלְךָ
  english_pob_choice: your recompense
  chosen_spanish: tu retribución
  alternatives_spanish:
  - tu recompensa
  - tu pago
  - tu remuneración
  lexicon: HALOT
  rationale: '''Retribución'' comunica mejor la carga judicial y de respuesta moral que ''recompensa'', y evita una connotación demasiado positiva en español.'
- source_word: יָשׁוּב
  english_pob_choice: will return
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - se devolverá
  lexicon: HALOT
  rationale: El verbo de retorno se mantiene con una forma simple y directa, adecuada al paralelo poético con 'sobre tu propia cabeza'.
- source_word: בְּרֹאשֶׁךָ
  english_pob_choice: on your own head
  chosen_spanish: sobre tu propia cabeza
  alternatives_spanish:
  - en tu cabeza
  - sobre tu cabeza
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo de consecuencias que recaen sobre el responsable. 'Tu propia cabeza' explicita la fuerza reflexiva que el inglés también aclaraba con 'own'.
theological_decisions:
- issue: Alcance del juicio en 'el día de Yahvé'
  english_pob_reading: A prophetic announcement of imminent divine judgment extending beyond Edom to all the nations.
  chosen_spanish_reading: Un anuncio profético de juicio divino inminente que alcanza a todas las naciones, sin dejar de hablar directamente a Edom.
  alternative_spanish_readings:
  - Un juicio restringido solo a Edom en este versículo inmediato
  - Una referencia general al fin de los tiempos sin foco histórico concreto
  rationale: '''Sobre todas las naciones'' conserva la amplitud universal del texto y, a la vez, el contexto inmediato de retribución dirigida al destinatario original. No se reduce el alcance del juicio ni se lo abstrae indebidamente.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
- issue: Principio de retribución
  english_pob_reading: '''The verse states a principle of divine recompense: what Edom has done will be done back to Edom.'''
  chosen_spanish_reading: 'El verso afirma un principio de retribución divina: lo que Edom hizo le será devuelto.'
  alternative_spanish_readings:
  - Un principio impersonal de causa y efecto moral
  - Una metáfora meramente poética sin peso judicial
  rationale: '''Retribución'' y ''volverá sobre tu propia cabeza'' mantienen el carácter judicial y personal del pasaje. No se diluye en una ley impersonal ni se vacía de agencia divina.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: El borrador sigue de cerca el último pasaje revisado, sin cambios sustanciales respecto al consenso alto del control cruzado. Se conservó la amplitud de 'sobre todas las naciones' y la fórmula retributiva con el modismo de la cabeza, ajustando solo la redacción al español natural.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino conforme al estándar del proyecto.
  - '''Retribución'' se eligió por su mejor carga judicial frente a ''recompensa''.'
  - La pasiva impersonal 'se hará contigo' conserva el valor del nifal hebreo sin introducir agente explícito.
  - '''Naciones'' y no ''pueblos'' sigue el paralelismo profético y la terminología del original.'
