lexical_decisions:
- source_word: עַמִּינָדָב
  english_pob_choice: Amminadab
  chosen_spanish: Amínadab
  alternatives_spanish:
  - Amminadab
  lexicon: HALOT
  rationale: Es un nombre propio; en español bíblico es natural adaptar la transliteración al sistema gráfico y fonológico del idioma, sin traducir el nombre.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró a
  alternatives_spanish:
  - fue padre de
  - procreó a
  lexicon: HALOT
  rationale: En genealogías, el hifil de ילד expresa la generación/paternidad. «Engendró a» preserva el valor genealógico y es más sobrio y bíblico en español que una perífrasis explicativa.
- source_word: נַחְשׁוֹן
  english_pob_choice: Nahshon
  chosen_spanish: Najsón
  alternatives_spanish:
  - Najsón
  - Nashón
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se usa una adaptación española que conserve la pronunciación aproximada y la forma nominal sin introducir una traducción interpretativa.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - entonces
  lexicon: HALOT
  rationale: La conjunción simple une las dos cláusulas genealógicas; «y» reproduce de manera directa el hebreo sin añadir matiz temporal.
- source_word: שַׂלְמָה
  english_pob_choice: Salmah
  chosen_spanish: Salmá
  alternatives_spanish:
  - Salma
  - Salmah
  lexicon: HALOT
  rationale: El hebreo de este versículo apunta a שַׂלְמָה, por lo que se refleja como «Salmá». Se evita armonizar aquí con la forma tradicional «Salmón», porque esa variante corresponde a otras genealogías y no al texto hebreo presente.
theological_decisions:
- issue: Variante genealógica de Salmah/Salmon
  english_pob_reading: Hebrew Salmah; some English translations use 'Salmon' in harmony with parallel genealogies.
  chosen_spanish_reading: Salmá; algunas traducciones españolas usan «Salmón» en armonía con genealogías paralelas.
  alternative_spanish_readings:
  - Salmón
  - Salma
  rationale: Se mantiene la lectura del texto hebreo tal como está atestiguado en este versículo, sin resolver la tensión hacia una forma armónica. La nota preserva la alternativa tradicional sin desplazar la base textual.
  doctrine_reference: Principio de prioridad del texto fuente y honestidad textual en genealogías bíblicas
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el hebreo y el control inglés; no se requieren revisiones sustantivas. Se conservó la variante genealógica documentada para Salmá/Salmon en nota, siguiendo el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo el patrón genealógico breve y directo, con verbos en pretérito perfecto simple para reflejar la secuencia hebrea.
  - 'Los nombres propios se adaptan al español de manera consistente: Amínadab, Najsón, Salmá.'
  - Se evitó la forma tradicional «engendró» solo por arcaísmo; aquí se usa porque es la opción más precisa para el registro genealógico.
  - La nota usa un marcador único [a] anclado en el nombre que presenta la variante textual.
