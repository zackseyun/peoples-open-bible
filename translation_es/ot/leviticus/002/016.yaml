    rationale: La secuencia «hará arder su porción memorial, tomada de…» es entendible, pero «quemará su porción memorial de… y de…» o una construcción similar suena más directa en español bíblico moderno.
  revised_spanish_text: El sacerdote quemará su porción memorial de su grano machacado[a] y de su aceite, con todo su incienso; es una ofrenda hecha por fuego para Yahvé.
