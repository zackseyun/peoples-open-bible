    rationale: El participio indica que se mueven bien o de manera notable; el inglés auditado eligió 'stately' por porte digno. En español, 'majestuoso' añade un matiz más regio/solemne de lo necesario y puede sonar menos natural para criaturas en general.
  - severity: low
