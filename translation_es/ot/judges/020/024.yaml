translation:
  language: es
  text: Y los hijos de Israel se acercaron a los hijos de Benjamín el segundo día[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘se aproximaron’ o, en contexto militar, ‘avanzaron contra’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘los hijos de Israel’ y ‘los hijos de Benjamín’; también puede verterse como ‘los israelitas’ y ‘los benjaminitas’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְבוּ
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - avanzaron contra
  lexicon: HALOT
  rationale: El verbo קרב puede expresar 'acercarse' o 'aproximarse'. En este contexto bélico, 'avanzaron contra' es posible, pero el hebreo no explicita el ataque en el verbo mismo. 'Se acercaron' conserva la cercanía física/militar sin añadir más de lo que dice el texto.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión familiar y formal 'hijos de Israel' para reflejar de cerca el hebreo y el paralelismo con 'hijos de Benjamín'. 'Israelitas' sería natural, pero suaviza la metáfora filial del original.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - contra
  lexicon: HALOT
  rationale: 'La preposición básica es direccional: ''a'' / ''hacia''. Dado el contexto militar, ''contra'' es una posibilidad interpretativa, pero la decisión del POB inglés fue no cargar la preposición con hostilidad que el hebreo no formula explícitamente.'
- source_word: בְנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - el pueblo de Benjamín
  lexicon: HALOT
  rationale: Se conserva el mismo paralelismo y fuerza literal del hebreo. 'Benjaminitas' es idiomático, pero pierde la correspondencia formal con 'hijos de Israel'.
- source_word: בַּיּוֹם הַשֵּׁנִי
  english_pob_choice: on the second day
  chosen_spanish: en el segundo día
  alternatives_spanish:
  - al segundo día
  - el segundo día
  lexicon: HALOT
  rationale: La frase ordinal hebrea se traduce de modo directo. 'En el segundo día' es claro en español y mantiene el número ordinal que el texto especifica.
translation_notes:
  revision_awareness: El texto inglés POB actual no requiere cambios sustanciales; se conserva la decisión de no intensificar el verbo a una confrontación explícita. La revisión más reciente indica estabilidad del pasaje y alta concordancia con el original.
  spanish_consistency_notes:
  - Se mantiene la terminología POB preferente 'hijos de Israel' / 'hijos de Benjamín' para reflejar el paralelismo del hebreo.
  - Se evita traducir אֶל como 'contra' en el cuerpo principal, dejando esa posibilidad en nota por el contexto bélico.
  - La ordenación de la frase sigue el original de forma natural en español, sin añadir elementos interpretativos.
