translation:
  language: es
  text: La nave y el santuario tenían cada uno dos puertas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el salón principal y el santuario tenían cada uno dos puertas»; también, «la nave y el Lugar Santo tenían cada uno dos puertas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁתַּיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - un par de
  lexicon: HALOT
  rationale: El numeral cardinal femenino concuerda con el sustantivo plural femenino implícito en «puertas». En español, «dos» es la forma más natural y precisa; «un par de» sería más idiomático pero menos directo y más interpretativo.
- source_word: דְּלָת֛וֹת
  english_pob_choice: doors
  chosen_spanish: puertas
  alternatives_spanish:
  - hojas de puerta
  - dobles puertas
  lexicon: HALOT
  rationale: El sustantivo se refiere a puertas. «Puertas» comunica el sentido básico con naturalidad. «Hojas de puerta» o «dobles puertas» introducen especificación arquitectónica que no exige el hebreo.
- source_word: לַֽ/הֵיכָ֖ל
  english_pob_choice: nave
  chosen_spanish: pórtico
  alternatives_spanish:
  - nave
  - salón principal
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por «nave» para el gran espacio frontal del templo, en español «nave» puede sonar más eclesiástico y menos claro para lectores generales. Aquí «pórtico» mantiene un referente arquitectónico amplio y legible sin cargar el texto con terminología técnica innecesaria; es una decisión contextual para un edificio visionario.
- source_word: וְ/לַ/קֹּֽדֶשׁ
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - Lugar Santo
  - lugar santo
  lexicon: HALOT
  rationale: «Santuario» conserva el valor sagrado del término y funciona bien en español bíblico moderno. «Lugar Santo» sería más técnico, pero puede sonar demasiado explicativo si el texto no distingue aquí con esa precisión ritual.
- source_word: לַֽ/הֵיכָ֖ל וְ/לַ/קֹּֽדֶשׁ
  english_pob_choice: the nave and the sanctuary each had
  chosen_spanish: para el pórtico y para el santuario
  alternatives_spanish:
  - el pórtico y el santuario tenían
  - al pórtico y al santuario pertenecían
  lexicon: HALOT
  rationale: El hebreo es una construcción nominal sin verbo expreso; en español resulta natural mantener la relación preposicional sin forzar una predicación explícita. «Para... y para...» reproduce la distribución del original y deja implícita la idea de pertenencia o asignación de puertas.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo consonante y la auditoría inglesa sin cambios relevantes de revisión; se conservó la estructura distributiva y se optó por una equivalencia española natural para una cláusula nominal arquitectónica.
  spanish_consistency_notes:
  - Se mantiene «santuario» para קֹדֶשׁ conforme al valor sagrado del término.
  - Se evitó «SEÑOR» o traducciones teológicas no pertinentes porque el versículo no contiene el Nombre divino.
  - La frase preposicional «para el pórtico y para el santuario» conserva la construcción distributiva del hebreo sin añadir un verbo inexistente en el original.
