id: 2TH.2.7
reference: 2 Thessalonians 2:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸ γὰρ μυστήριον ἤδη ἐνεργεῖται τῆς ἀνομίας· μόνον ὁ κατέχων ἄρτι ἕως ἐκ μέσου γένηται.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/007.yaml
  text: For the mystery of lawlessness is already at work[b][a]; only the one who now restrains will do so until he is out of the way.
translation:
  language: ko
  text: 불법의 비밀은 이미 활동하고 있습니다. 다만 지금 제지하고 있는 분[a]이, 그가 가운데서 사라지기까지[b] 그러할 뿐입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「지금 막고 있는 자」. 헬라어는 그 제지자의 정체를 명시하지 않는다. 6절의 중성과 달리 본 절에서는 남성 분사가 쓰인다.
    reason: alternative_reading
  - marker: b
    text: 또는 「제거되기까지」, 「치워지기까지」. 헬라어는 행위 주체를 명시하지 않는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_korean: 비밀
  alternatives_korean:
  - 신비
  - 감추어진 일
  lexicon: BDAG
  rationale: 한국 성경 전통에 정착된 「비밀」을 보존한다. 단순한 수수께끼가 아니라 종말론적으로 드러나는 감추어진 실재를 가리킨다.
- source_word: ἐνεργεῖται
  english_pob_choice: is already at work
  chosen_korean: 이미 활동하고 있습니다
  alternatives_korean:
  - 이미 역사하고 있습니다
  - 이미 작용하고 있습니다
  lexicon: BDAG
  rationale: 중간/수동형의 능동적 진행을 「활동하고 있다」로 자연스럽게 표현한다.
- source_word: ἀνομίας
  english_pob_choice: lawlessness
  chosen_korean: 불법
  alternatives_korean:
  - 무법
  - 죄악
  lexicon: BDAG
  rationale: KOREAN_PIPELINE 글로서리에 따라 「불법」을 채택한다. 앞 3절의 「불법의 사람」과 어휘적 연결을 보존한다.
- source_word: μόνον
  english_pob_choice: only
  chosen_korean: 다만 ~할 뿐입니다
  alternatives_korean:
  - 오직
  - 단지
  lexicon: BDAG
  rationale: 앞 진술에 제한을 두는 어조를 「다만 ~할 뿐입니다」로 자연스럽게 표현한다.
- source_word: ὁ κατέχων
  english_pob_choice: the one who now restrains
  chosen_korean: 지금 제지하고 있는 분
  alternatives_korean:
  - 지금 막고 있는 자
  - 지금 제지자
  lexicon: BDAG
  rationale: 남성 분사의 인격성을 「분/자」로 보존하되, 정체를 좁히지 않는다. 「분」을 본문에 두고 「자」는 각주.
- source_word: ἄρτι
  english_pob_choice: now
  chosen_korean: 지금
  alternatives_korean:
  - 현재
  lexicon: BDAG
  rationale: 현재 제지 활동의 시간성을 명시한다.
- source_word: ἕως ἐκ μέσου γένηται
  english_pob_choice: until he is out of the way
  chosen_korean: 그가 가운데서 사라지기까지
  alternatives_korean:
  - 그가 가운데서 떠나기까지
  - 그가 제거되기까지
  lexicon: BDAG
  rationale: 직역 「가운데서 사라지기까지」는 행위 주체를 명시하지 않는 본문의 절제를 보존한다. 「제거되다」 같은 수동 표현은 행위자를 함의하므로 각주.
theological_decisions:
- issue: ὁ κατέχων의 정체
  chosen_reading: 본문이 특정하지 않으므로 「제지하고 있는 분」으로 비-식별적으로 옮김
  alternative_readings:
  - 로마 국가
  - 인간 정부
  - 성령
  - 천사적 존재
  - 바울 자신 또는 사도적 선포
  rationale: 헬라어 본문은 제지자의 정체를 명시하지 않는다. 번역도 종말론적 해석 논쟁을 본문에서 해결하지 않는다.
  doctrine_reference: 'Preserve theological tension'
- issue: ἐκ μέσου γένηται의 행위 주체
  chosen_reading: 「가운데서 사라지기까지」 — 명시적 수동/행위자를 도입하지 않음
  alternative_readings:
  - 제거되기까지
  - 치워지기까지
  rationale: γένηται + ἐκ μέσου는 결과 상태를 가리키며 누가 제거하는지 본문에 없다. 번역도 그 절제를 보존한다.
  doctrine_reference: 'Original-language primacy; preserve theological tension'
