    issue: La nota al pie está invertida respecto de la decisión principal.
    rationale: 'El texto español ya usa «Yahvé», pero la nota dice «Alternativa: “Yahvé”». Esto confunde al lector y no refleja correctamente el audit trail inglés, donde la nota registra el hebreo YHWH y la traducción tradicional «the LORD». En español debe indicarse la forma principal y, si se menciona una alternativa, que sea «el SEÑOR».'
