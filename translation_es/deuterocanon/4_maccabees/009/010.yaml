  glossary_alignment: No hay términos del glosario principal en conflicto. «Tirano» está bien preservado. «Ingratos» es aceptable para ἀχαρίστων. La decisión de no añadir «hombres» ni otro sustantivo explícito concuerda con el contexto y con la nota.
