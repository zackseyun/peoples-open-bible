base_translation:
  language: en
  yaml_path: translation/ot/isaiah/054/004.yaml
  text: Do not fear[a], for you will not be put to shame; and do not be humiliated, for you will not be disgraced. For you will forget the shame of your youth[b], and you will remember the reproach of your widowhood no more.
