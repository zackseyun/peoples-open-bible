revisions:
- from: Ahora bien, los servidores del templo habitaban en el Ofel[a], hasta frente a la Puerta del Agua, hacia el oriente, y la torre saliente.
  to: Los servidores del templo habitaban en el Ofel[a], hasta quedar frente a la Puerta del Agua hacia el oriente y la torre saliente.
  rationale: Se eliminó «Ahora bien» por innecesario, se reemplazó «hasta frente a» por «hasta quedar frente a» para un español más natural que aún preserve עַד נֶגֶד, y se simplificó la puntuación final para reflejar con más claridad la secuencia espacial del hebreo.
