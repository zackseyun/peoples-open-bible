review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y la línea del POB inglés: עֲנָוִים como «los humildes», יִירְשׁוּ como «heredarán», y וְהִתְעַנְּגוּ como «se deleitarán» son opciones fieles. Sin embargo, la nota b no preserva la alternativa documentada del inglés, porque el texto principal ya usa «la tierra» para אָרֶץ y la nota vuelve a decir exactamente lo mismo. La alternativa fuente/POB es «the earth», que en español aquí debe distinguirse del texto principal.'
  spanish_quality_summary: 'El español es claro, natural y digno. La sintaxis y el tono son apropiados para un salmo. El único problema real es de consistencia y utilidad de la nota al pie b: al repetir «la tierra», la nota deja de aportar información y pierde la distinción semántica que el POB auditó entre «land» y «earth».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección «los humildes» con nota «los mansos» preserva bien la decisión lexical. «La tierra» funciona como texto principal para אָרֶץ, pero la alternativa anotada debe cambiarse a una formulación española que exprese el sentido más amplio de «earth», idealmente «la tierra entera» o equivalente, para conservar la racionalidad documentada.
  issues:
  - severity: medium
    issue: La nota b repite el texto principal («la tierra») en vez de ofrecer una alternativa real para אָרֶץ.
    rationale: El POB inglés distingue entre «the land» en el texto principal y «the earth» en nota. En español, si el texto principal es «la tierra», la nota debe marcar el sentido más amplio, no duplicar la misma frase.
  revised_spanish_text: Pero los humildes heredarán la tierra y se deleitarán en abundante paz[a][b].
  revised_footnotes:
  - marker: a
    text: O «los mansos».
    reason: lexical_alternative
  - marker: b
    text: O «la tierra entera».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural. Solo se corrige la nota b para que preserve una alternativa real al sentido de אָרֶץ documentado en la auditoría inglesa, distinguiendo el valor más amplio de «earth» frente al principal «land».
