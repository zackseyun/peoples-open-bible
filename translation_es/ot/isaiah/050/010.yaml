translation:
  language: es
  text: ¿Quién entre ustedes teme a Yahvé[a] y escucha la voz de su siervo? El que anda en tinieblas y no tiene luz, confíe en el nombre de Yahvé y apóyese en su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obedeciendo» o «atendiendo la voz de su siervo».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי בָכֶם
  english_pob_choice: Who among you
  chosen_spanish: ¿Quién entre ustedes
  alternatives_spanish:
  - ¿Quién de ustedes
  - ¿Quién hay entre ustedes
  lexicon: HALOT
  rationale: La pregunta hebrea introduce una apelación directa al auditorio; en español, «¿Quién entre ustedes» conserva la estructura idiomática y la dirección comunitaria sin forzar una construcción más pesada.
- source_word: יְרֵא יְהוָה
  english_pob_choice: fears Yahweh / the LORD
  chosen_spanish: teme a Yahvé
  alternatives_spanish:
  - reverencia a Yahvé
  - venera a Yahvé
  lexicon: HALOT
  rationale: יַרֵא con Dios expresa temor reverente y fidelidad pactual. «Teme» conserva mejor el peso teológico y la fuerza del llamado que «reverencia».
- source_word: שֹׁמֵעַ בְּקוֹל עַבְדּוֹ
  english_pob_choice: obeying/listening to the voice of his servant
  chosen_spanish: escuchando la voz de su siervo
  alternatives_spanish:
  - obedeciendo la voz de su siervo
  - oyendo la voz de su siervo
  lexicon: HALOT
  rationale: שמוע puede abarcar escuchar, atender y obedecer. El texto hebreo mantiene el matiz auditivo, así que «escuchando» deja abierta la obediencia implícita sin resolverla demasiado pronto.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su esclavo
  lexicon: HALOT
  rationale: En el lenguaje profético del Siervo, «siervo» es el equivalente natural y fiel. «Esclavo» sería demasiado duro para este contexto y no responde al uso establecido por la tradición textual del pasaje.
- source_word: אֲשֶׁר הָלַךְ חֲשֵׁכִים
  english_pob_choice: the one who walks in darkness
  chosen_spanish: El que anda en tinieblas
  alternatives_spanish:
  - el que camina en oscuridad
  - el que ha andado en tinieblas
  lexicon: HALOT
  rationale: חֲשֵׁכִים es un plural intensivo/abstracto; en español, «tinieblas» conserva mejor la densidad del hebreo que «oscuridad» en singular. «Anda» mantiene el aspecto habitual del verbo.
- source_word: וְאֵין נֹגַהּ ל֔וֹ
  english_pob_choice: and has no light
  chosen_spanish: y no tiene resplandor
  alternatives_spanish:
  - y no tiene luz
  - y no le alumbra nada
  lexicon: HALOT
  rationale: נֹגַהּ refiere a brillo, resplandor o luz. «Resplandor» preserva el campo semántico de luminosidad y evita un calco demasiado llano en la secuencia poética.
- source_word: יִבְטַח בְּשֵׁם יְהוָה
  english_pob_choice: trust in the name of Yahweh
  chosen_spanish: confíe en el nombre de Yahvé
  alternatives_spanish:
  - confíe en el nombre de Yahweh
  - ponga su confianza en el nombre de Yahvé
  lexicon: HALOT
  rationale: בטח se rinde naturalmente como «confiar». «Nombre» debe conservarse, porque apunta a la identidad revelada y al carácter pactal de Yahvé, no solo a una fórmula verbal.
- source_word: וְיִשָּׁעֵן בֵּאלֹהָיו
  english_pob_choice: rely on his God
  chosen_spanish: y apóyese en su Dios
  alternatives_spanish:
  - y apoye su peso en su Dios
  - y confíe en su Dios
  lexicon: HALOT
  rationale: שׁען es literalmente apoyarse o recostarse sobre algo. «Apóyese» preserva la metáfora corporal y encaja de modo natural con el imperativo exhortativo español.
theological_decisions:
- issue: Identidad de «su siervo»
  english_pob_reading: Retained as 'his servant' without specifying the servant's identity in the translation.
  chosen_spanish_reading: Se mantiene «su siervo» sin identificar explícitamente al siervo.
  alternative_spanish_readings:
  - el profeta
  - Israel
  - el Siervo con sentido mesiánico
  rationale: El contexto inmediato de Isaías activa el motivo del Siervo, pero el verso no lo identifica de manera explícita. Mantener la referencia abierta preserva la tensión teológica del pasaje y evita introducir una identificación más estrecha que la del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
- issue: Fuerza de שֹׁמֵעַ
  english_pob_reading: Rendered with auditory-attentive sense ('listening to') rather than explicit obedience in the main text.
  chosen_spanish_reading: Se traduce con un matiz auditivo («escuchando») en el texto principal, dejando la obediencia como implicación contextual.
  alternative_spanish_readings:
  - obedeciendo
  - haciendo caso a
  rationale: El hebreo puede incluir obediencia, pero su núcleo léxico es oír/escuchar/atender. Dado que el contexto permite ambas ideas, el texto principal conserva el sentido más básico y no cierra de antemano la amplitud semántica.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: La redacción inglesa revisada pasó de «listening to» a «obeying» para שֹׁמֵעַ בְּקוֹל, y de «lean on» a «rely on» para וְיִשָּׁעֵן. En español se optó por mantener el matiz auditivo con «escuchando», porque el hebreo permite tanto escucha como obediencia; para וְיִשָּׁעֵן se prefirió «apóyese» por su transparencia metafórica y su naturalidad en español. También se mantuvo «Yahvé» conforme al criterio del proyecto.
  spanish_consistency_notes:
  - Se conservó «Yahvé» en el cuerpo principal, de acuerdo con la norma del proyecto para יהוה.
  - «Tinieblas» se prefirió a «oscuridad» para reflejar mejor el plural intensivo hebreo.
  - «Siervo» se mantuvo como término técnico del pasaje; no se reemplazó por una opción más interpretativa.
  - La estructura exhortativa se hizo fluida en español sin añadir explicaciones ajenas al texto.
