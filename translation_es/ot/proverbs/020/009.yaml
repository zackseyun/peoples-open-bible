translation:
  language: es
  text: '¿Quién puede decir[a]: «He purificado mi corazón; estoy limpio de mi pecado»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién dice: “He limpiado mi corazón; me he purificado de mi pecado”?» El hebreo puede expresarse de modo más formal para resaltar el lenguaje de auto-limpieza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who can
  chosen_spanish: ¿Quién puede
  alternatives_spanish:
  - ¿Quién
  lexicon: HALOT
  rationale: El hebreo formula una pregunta retórica; en español, «¿Quién puede» expresa mejor la fuerza de posibilidad/pretensión implícita que una interrogación simple, sin añadir contenido ajeno al texto.
- source_word: יֹאמַר
  english_pob_choice: say
  chosen_spanish: decir
  alternatives_spanish:
  - declarar
  lexicon: HALOT
  rationale: El verbo básico es «decir». «Declarar» subiría el registro y sugeriría una proclamación más formal que la que exige el proverbio.
- source_word: זִכִּיתִי
  english_pob_choice: I have made ... pure
  chosen_spanish: He purificado
  alternatives_spanish:
  - He limpiado
  - He hecho puro
  lexicon: HALOT
  rationale: 'La forma piel comunica acción causativa: hacer puro/limpio. En español, «purificado» conserva mejor esa idea de acción sobre el corazón que un simple «soy puro»; «he limpiado» también es posible, pero «purificado» mantiene el paralelismo con la segunda línea y la resonancia moral del texto.'
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi mente
  lexicon: HALOT
  rationale: «Corazón» preserva el término antropológico bíblico del centro moral e interior de la persona, sin reducirlo a una categoría psicológica moderna.
- source_word: טָהַרְתִּי
  english_pob_choice: I am clean
  chosen_spanish: estoy limpio
  alternatives_spanish:
  - me he purificado
  - he quedado limpio
  lexicon: HALOT
  rationale: La forma expresa un estado resultante de pureza/limpieza. «Estoy limpio» reproduce ese estado de manera natural en español y mantiene el paralelismo con la primera cola.
- source_word: מֵחַטָּאתִי
  english_pob_choice: from my sin
  chosen_spanish: de mi pecado
  alternatives_spanish:
  - de mi culpa
  - de mi falta
  lexicon: HALOT
  rationale: «חטאת» aquí designa el pecado como realidad moral. En español, «pecado» es la equivalencia más directa y fiel; la preposición de separación se expresa naturalmente con «de».
theological_decisions:
- issue: Pregunta retórica sobre pureza moral humana
  english_pob_reading: The verse is rendered as a rhetorical question denying that anyone can truthfully claim inward purity and freedom from sin.
  chosen_spanish_reading: El versículo queda como una pregunta retórica que niega que alguien pueda afirmar con verdad haber purificado su interior y estar libre de pecado.
  alternative_spanish_readings:
  - Una observación neutral sobre casos raros de integridad moral
  rationale: La estructura paralela de las dos cláusulas presenta una pretensión total de pureza interior; el español debe conservar esa tensión y no suavizarla hacia una mera observación sociológica.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia y sin cambios sustantivos; por tanto, este borrador sigue de cerca el sentido auditado del texto hebreo y la decisión inglesa de preservar la fuerza retórica y la tensión moral del proverbio.
  spanish_consistency_notes:
  - Se mantiene «corazón» como término antropológico bíblico, no sustituido por «mente» o «interior».
  - Se conserva «pecado» para חטאת, evitando atenuarlo como «falta» o «culpa».
  - Se traduce el estado resultante con «estoy limpio» para reflejar la segunda cola sin convertirla en una reflexión distinta.
  - La nota al pie preserva la alternativa de auto-limpieza documentada en la auditoría inglesa.
