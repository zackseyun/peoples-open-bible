translation:
  language: es
  text: Entonces el ángel de Yahvé vino y se sentó debajo de la encina[a] que estaba en Ofra, la cual pertenecía a Joás el abiezerita[b], mientras Gedeón, su hijo, estaba golpeando trigo[c] en el lagar para esconderlo de Madián.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el terebinto». El término hebreo para el árbol puede entenderse de ambas maneras; se mantiene una opción natural en español y se señala la alternativa botánica.
    reason: lexical_alternative
  - marker: b
    text: O «el abiezrita». El gentilicio hebreo puede reflejarse con una forma más cercana al original o con la forma más conocida en español bíblico.
    reason: lexical_alternative
  - marker: c
    text: O «trillando trigo». El hebreo describe el acto de golpear el grano para separarlo; «golpeando» conserva la imagen concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: Mantengo el sentido sobrenatural que el contexto narrativo favorece en Jueces, y conservo el nombre divino como Yahvé según la política del proyecto. "Mensajero" es posible léxicamente, pero aquí no es la opción más natural para la escena.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el Tetragrama directamente; por eso se vierte como el nombre propio «Yahvé» y no como una sustitución por un título. Esto preserva la referencia al nombre del pacto.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  lexicon: HALOT
  rationale: En español narrativo, «vino» reproduce de manera natural el movimiento de acercamiento de la escena y conserva el valor básico del verbo de llegada.
- source_word: וַיֵּשֶׁב
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - se quedó sentado
  - permaneció sentado
  lexicon: HALOT
  rationale: El contexto describe una acción concreta y visible bajo el árbol; «se sentó» comunica bien esa postura sin añadir matices no presentes en el hebreo.
- source_word: הָאֵלָה
  english_pob_choice: the oak
  chosen_spanish: la encina
  alternatives_spanish:
  - el terebinto
  - el gran árbol
  lexicon: HALOT
  rationale: El término hebreo puede referirse a una gran especie arbórea; en español «encina» mantiene un referente arbóreo natural y digno. «Terebinto» es una alternativa válida, pero menos transparente para lectores generales; la ambigüedad botánica se preserva en la nota.
- source_word: בְּעָפְרָה
  english_pob_choice: in Ophrah
  chosen_spanish: en Ofra
  alternatives_spanish:
  - en Ofrá
  lexicon: HALOT
  rationale: Se translitera el topónimo para mantener la forma propia del lugar; se adapta a la ortografía española habitual para nombres bíblicos.
- source_word: אֲשֶׁר לְיוֹאָשׁ
  english_pob_choice: which belonged to Joash
  chosen_spanish: la cual pertenecía a Joás
  alternatives_spanish:
  - que era de Joás
  - que pertenecía a Joás
  lexicon: HALOT
  rationale: «Pertenecía a» expresa de modo claro la relación posesiva entre el árbol y Joás sin forzar un español más arcaico.
- source_word: אֲבִי הָעֶזְרִי
  english_pob_choice: the Abiezrite
  chosen_spanish: el abiezerita
  alternatives_spanish:
  - el abiézerita
  - el abiezerita
  lexicon: HALOT
  rationale: El gentilicio señala la afiliación clánica de Joás. Opto por una forma transliterada cercana al hebreo, en línea con la decisión inglesa de conservar la referencia tribal con el menor desplazamiento posible.
- source_word: חֹבֵט חִטִּים
  english_pob_choice: was beating out wheat
  chosen_spanish: estaba golpeando trigo
  alternatives_spanish:
  - estaba trillando trigo
  - estaba batiendo trigo
  lexicon: HALOT
  rationale: El verbo implica golpear el grano para separarlo; «golpeando trigo» conserva la imagen concreta. «Trillando» sería más idiomático en algunos contextos, pero suaviza el detalle físico que el hebreo destaca.
- source_word: בַּגַּת
  english_pob_choice: in the winepress
  chosen_spanish: en el lagar
  alternatives_spanish:
  - en el lagar de vino
  lexicon: HALOT
  rationale: «Lagar» reproduce el lugar de prensado asociado normalmente al vino y mantiene la escena de ocultamiento.
- source_word: לְהָנִיס
  english_pob_choice: to hide it
  chosen_spanish: para esconderlo
  alternatives_spanish:
  - para ocultarlo
  - para ponerlo a salvo
  lexicon: HALOT
  rationale: En este contexto el sentido práctico es sustraer el trigo de la vista y del alcance de Madián; «esconderlo» comunica bien esa intención sin exceder el texto.
- source_word: מִפְּנֵי מִדְיָן
  english_pob_choice: from Midian
  chosen_spanish: de Madián
  alternatives_spanish:
  - por causa de Madián
  - ante Madián
  lexicon: HALOT
  rationale: Se conserva el nombre propio del enemigo colectivo en forma española tradicional. La preposición hebrea puede implicar tanto procedencia como evitación; aquí «de Madián» mantiene la tersura narrativa y deja ver la amenaza.
theological_decisions:
- issue: Título divino en מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: El pasaje presenta a una figura que el hebreo puede denominar mensajero o ángel; el contexto narrativo de Jueces favorece la lectura de un ser celestial. Se conserva esa tensión sin identificarla más allá de lo que el texto exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preservar la tensión teológica en lugar de resolverla)
translation_notes:
  revision_awareness: Se siguió el estado más reciente del expediente, sin revisiones aplicadas y con alta concordancia entre auditoría y revisión final; por eso la redacción conserva las decisiones léxicas principales del inglés POB y las adapta cuidadosamente al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según la política del proyecto.
  - 'Se transliteran los nombres propios bíblicos de forma estable: Ofra, Joás, Gedeón y Madián.'
  - Se mantiene la imagen concreta de «golpear trigo» para no diluir el detalle agrícola del hebreo.
  - «Encina» se usa como equivalente español natural para el árbol, con nota de alternativa botánica.
