    text: 'O: «Cuando clamo»; el hebreo literalmente dice «cuando llamo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «me has aliviado»; la imagen hebrea es espacial: «me has dado espacio» frente a la angustia o estrechez.'
    reason: lexical_alternative
  revision_rationale: Se elimina «te» para no añadir un objeto que el hebreo no expresa y para seguir más de cerca la decisión del POB inglés. Se reemplaza «Sé bondadoso conmigo» por «Muéstrame tu favor» para reflejar mejor חנן como gracia/favor divino, manteniendo un español natural y reverente.
