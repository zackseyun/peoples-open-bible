  to: 'Pero la palabra de Yahvé vino a mí[a], diciendo: «Has derramado mucha sangre y has librado grandes guerras[b]. No edificarás una casa para mi nombre[c], porque has derramado mucha sangre sobre la tierra[d] delante de mí».'
  rationale: Se ajusta una sola frase para pasar de un calco hebreo poco natural ('has hecho grandes guerras') a una expresión española idiomática y fiel ('has librado grandes guerras'), dejando la literalidad documentada en nota. El resto del borrador preserva bien el sentido fuente, la terminología del proyecto y la legibilidad en español.
