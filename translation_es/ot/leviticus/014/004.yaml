translation:
  language: es
  text: Entonces el sacerdote mandará que se tomen, para la persona que está siendo purificada, dos aves vivas y limpias, madera de cedro, hilo escarlata[a] e hisopo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hilo carmesí». La expresión hebrea שְׁנִי תוֹלַעַת se refiere a material teñido de escarlata, y la forma exacta del material puede expresarse de distintas maneras.
    reason: lexical_alternative
  - marker: b
    text: La identidad botánica exacta del «hisopo» es incierta; se conserva la traducción tradicional.
    reason: cultural_note
lexical_decisions:
- source_word: וְצִוָּה
  english_pob_choice: Then ... shall command
  chosen_spanish: Entonces ... mandará
  alternatives_spanish:
  - Y ... mandará
  - Entonces ... dará la orden
  lexicon: HALOT
  rationale: En español, «entonces» conserva el avance secuencial del rito, y «mandará» reproduce el valor directivo de la forma verbal en contexto legal/ritual sin sonar pesado.
- source_word: וְלָקַח
  english_pob_choice: be taken
  chosen_spanish: se tomen
  alternatives_spanish:
  - se tomarán
  - se deberán tomar
  - tomará
  lexicon: HALOT
  rationale: El hebreo presenta una instrucción ritual donde el sacerdote ordena la acción; el pasivo/reflexivo impersonal en español comunica bien que los objetos deben ser tomados, no necesariamente por el sacerdote mismo.
- source_word: לַמִּטַּהֵר
  english_pob_choice: for the one being cleansed
  chosen_spanish: para el que se purifica
  alternatives_spanish:
  - para el que está siendo purificado
  - para la persona en purificación
  - para el que ha de purificarse
  lexicon: HALOT
  rationale: La forma verbal hebrea destaca el proceso ritual de purificación. «Se purifica» mantiene ese matiz procesual sin volver la frase demasiado técnica.
- source_word: שְׁתֵּי צִפֳּרִים
  english_pob_choice: two live clean birds
  chosen_spanish: dos aves vivas y limpias
  alternatives_spanish:
  - dos pájaros vivos y limpios
  - dos aves vivientes y limpias
  - dos aves puras y vivas
  lexicon: HALOT
  rationale: «Aves» preserva el sentido general de צִפֳּרִים sin sobreespecificar. «Vivas y limpias» sigue de cerca el hebreo y el orden natural en español ritual.
- source_word: עֵץ אֶרֶז
  english_pob_choice: cedar wood
  chosen_spanish: madera de cedro
  alternatives_spanish:
  - cedro
  - leño de cedro
  - madero de cedro
  lexicon: HALOT
  rationale: La construcción hebrea designa el material de cedro usado en el rito; «madera de cedro» es claro, natural y suficientemente preciso.
- source_word: שְׁנִי תוֹלַעַת
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - hilo escarlata
  - lana carmesí
  - cordón escarlata
  lexicon: HALOT
  rationale: La expresión hebrea denota material teñido de rojo/escarlata asociado al tinte. En español, «carmesí» conserva el color sin fijar innecesariamente la forma material exacta, que el hebreo deja algo abierta.
- source_word: וְאֵזֹב
  english_pob_choice: hyssop
  chosen_spanish: hisopo
  alternatives_spanish:
  - hisopo
  - hisope
  lexicon: HALOT
  rationale: «Hisopo» es la equivalencia tradicional y transparente en español bíblico para אֵזֹב; se conserva sin especulación botánica.
theological_decisions:
- issue: Forma del rito de purificación y orden sacerdotal
  english_pob_reading: Then the priest shall command that two live clean birds, cedar wood, scarlet yarn, and hyssop be taken for the one being cleansed.
  chosen_spanish_reading: Entonces el sacerdote mandará que se tomen, para el que se purifica, dos aves vivas y limpias, madera de cedro, carmesí e hisopo.
  alternative_spanish_readings:
  - Entonces el sacerdote ordenará que se tomen...
  - Entonces el sacerdote mandará que se tomen... para la persona que está siendo purificada.
  rationale: 'La formulación española mantiene el carácter ritual y prescriptivo del texto: el sacerdote da la orden, y los elementos se toman para la persona en proceso de purificación. No se introduce lenguaje devocional ajeno al rito legal.'
  doctrine_reference: Levítico 14:4; marco ritual sacerdotal de purificación
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada del inglés POB que reordena la frase para reflejar más naturalmente el hebreo y mantener bajo el mandato sacerdotal todos los elementos a tomar para la persona en purificación. La versión española conserva ese mismo orden y alcance, sin omitir ninguno de los componentes del rito.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se usa «se purifica» para reflejar el participio hitpael לַמִּטַּהֵר con énfasis procesual.
  - «Hisopo» y «aves» siguen el registro bíblico en español sin sobrerrestricción botánica ni taxonómica.
  - «Carmesí» evita fijar indebidamente la forma material exacta de שְׁנִי תוֹלַעַת, que el audit trail inglés también deja abierta.
