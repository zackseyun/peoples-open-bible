- from: Y aconteció en el cuarto año del rey Darío, la palabra de Yahvé vino a Zacarías en el día cuatro del mes noveno, en Kislev[a].
  to: Y en el cuarto año del rey Darío, la palabra de Yahvé vino a Zacarías el cuarto día del noveno mes, en Kislev[a].
