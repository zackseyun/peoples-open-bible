translation:
  language: es
  text: 'Entonces Faraón dijo a sus siervos: «¿Acaso hallaremos un hombre como este[b], en quien está el espíritu de Dios[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu de Dios», «el Espíritu de Dios» o «un espíritu divino». La expresión hebrea רוּחַ אֱלֹהִים puede entenderse de más de una manera.
    reason: alternative_reading
  - marker: b
    text: O «en quien está».
    reason: previous_rendering
lexical_decisions:
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: HALOT
  rationale: El título real hebreo se vierte de forma directa y natural en español como 'Faraón', conservando el referente histórico y narrativo.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus funcionarios
  - sus cortesanos
  lexicon: HALOT
  rationale: El hebreo admite un sentido de servicio general y de corte. 'Siervos' mantiene la cercanía semántica con el campo léxico de עבדים y evita especificar rango más de lo que el texto exige.
- source_word: הֲנִמְצָא
  english_pob_choice: Can we find
  chosen_spanish: ¿Acaso hallaremos
  alternatives_spanish:
  - ¿Podremos hallar?
  - ¿Podríamos hallar?
  lexicon: HALOT
  rationale: La pregunta retórica con valor deliberativo se expresa bien con '¿Acaso hallaremos?', que conserva el matiz de sorpresa o valoración implícita sin volverla demasiado analítica.
- source_word: כָזֶה אִישׁ
  english_pob_choice: a man like this
  chosen_spanish: un hombre como este
  alternatives_spanish:
  - un hombre así
  - un hombre tal como este
  lexicon: HALOT
  rationale: '''Hombre'' refleja con precisión אִישׁ. ''Como este'' reproduce la fuerza demostrativa de כָזֶה en un español natural y sobrio.'
- source_word: ר֥וּחַ אֱלֹהִ֖ים
  english_pob_choice: the spirit of God
  chosen_spanish: el espíritu de Dios
  alternatives_spanish:
  - un espíritu de Dios
  - un espíritu divino
  - el Espíritu de Dios
  lexicon: HALOT
  rationale: Se traduce con minúscula porque el hebreo no obliga a una mayúscula interpretativa y el contexto permite una referencia cualificada pero no formalmente marcada. Se conserva 'de Dios' para no diluir la relación genitiva.
- source_word: בּוֹ
  english_pob_choice: in whom is
  chosen_spanish: en quien está
  alternatives_spanish:
  - en quien hay
  - quien tiene dentro de sí
  lexicon: HALOT
  rationale: El hebreo usa la preposición locativa 'en él'; 'en quien está' reproduce de manera fluida la estructura sin sobreinterpretar con un posesivo más explicativo.
theological_decisions:
- issue: Ambigüedad de רוּחַ אֱלֹהִים
  english_pob_reading: the spirit of God / a spirit of God / divine spirit
  chosen_spanish_reading: el espíritu de Dios
  alternative_spanish_readings:
  - un espíritu de Dios
  - un espíritu divino
  - el Espíritu de Dios
  rationale: El hebreo es deliberadamente ambiguo y el audit trail inglés preserva esa tensión con varias alternativas. En español, la forma principal 'el espíritu de Dios' mantiene la lectura más directa sin forzar la mayúscula teológica; las alternativas quedan en nota para no borrar la ambigüedad ni el posible alcance teológico de la expresión.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica en vez de resolverla prematuramente'
- issue: Relación entre la percepción de Faraón y la afirmación narrativa
  english_pob_reading: Can we find a man like this, in whom is the spirit of God?
  chosen_spanish_reading: ¿Acaso hallaremos un hombre como este, en quien está el espíritu de Dios?
  alternative_spanish_readings:
  - ¿Podremos hallar un hombre como este, en quien está el espíritu de Dios?
  rationale: La formulación mantiene la perspectiva de Faraón como observación real dentro de la historia, sin convertirla en una declaración doctrinal más fuerte de lo que exige el hebreo. El texto conserva el reconocimiento de una cualidad divina asociada a José.
  doctrine_reference: Narrative theology of divine gifting in Genesis 41
translation_notes:
  revision_awareness: El borrador sigue el consenso alto del audit trail inglés y adopta la revisión más reciente que dejó 'spirit of God' en minúscula. También conserva la estructura retórica del hebreo con una pregunta deliberativa y una relativa locativa. Se evita capitalizar 'Espíritu' para no imponer una identificación más definida que la permitida por el texto fuente, pero se deja abierta la alternativa teológica mediante nota.
  spanish_consistency_notes:
  - Se mantiene 'Faraón' como título propio en español.
  - '''Siervos'' se usa por su cercanía léxica a עֲבָדָיו y para no sobredeterminar el cargo.'
  - La minúscula en 'espíritu de Dios' sigue la decisión textual más reciente del audit trail inglés.
  - La frase 'en quien está' conserva el valor locativo de בּוֹ sin redundancia excesiva.
  - No se usa 'Cristo' ni terminología doctrinal ajena al pasaje.
