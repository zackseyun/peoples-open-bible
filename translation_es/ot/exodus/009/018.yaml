  to: He aquí[a], como a esta hora mañana haré llover granizo muy pesado, como nunca ha habido en Egipto desde el día en que fue fundado[b] hasta ahora.
  rationale: Se ajustó la frase temporal para reflejar el matiz aproximativo de כָּעֵת; se reubicó y corrigió la nota b para alinearla con la alternativa documentada en el POB inglés sobre 'founded/established'; y se sustituyó 'cual' por 'como' para mayor naturalidad sin perder fuerza ni sentido. Se mantuvo 'haré llover' para preservar la causalidad divina explícita y 'granizo muy pesado' por fidelidad léxica a כָּבֵד מְאֹד.
