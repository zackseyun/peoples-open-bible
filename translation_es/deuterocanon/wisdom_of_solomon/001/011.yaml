translation:
  language: es
  text: Por tanto, guárdense de la murmuración inútil, y preserven su lengua de la calumnia; porque ninguna palabra secreta sale vacía[a], y una boca mentirosa destruye un alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ninguna palabra secreta sale en vano». El griego dice literalmente que «no va vacía», subrayando que el habla oculta también tiene efecto y consecuencia.
    reason: lexical_alternative
  - marker: b
    text: O «destruye la vida» o «destruye a una persona». La palabra griega puede significar «alma», «vida» o «persona».
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλάξασθε
  english_pob_choice: guard yourselves against
  chosen_spanish: guárdense de
  alternatives_spanish:
  - cuídense de
  - guárdense contra
  lexicon: LSJ
  rationale: El imperativo aoristo medio pide una acción reflexiva de autoprotección. «Guárdense de» comunica bien la advertencia y el matiz reflexivo sin sonar forzado en español.
- source_word: τοίνυν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: LSJ
  rationale: Marca una conclusión lógica. «Por tanto» preserva el valor inferencial con estilo sobrio y bíblico contemporáneo.
- source_word: γογγυσμὸν ἀνωφελῆ
  english_pob_choice: useless grumbling
  chosen_spanish: murmullo inútil
  alternatives_spanish:
  - queja inútil
  - murmuración inútil
  - queja sin provecho
  lexicon: LSJ
  rationale: γογγυσμός tiene el campo de murmurar, quejarse o refunfuñar; ἀνωφελής es inútil, sin provecho. «Murmullo inútil» conserva el tono de voz baja y desaprobada, aunque no agota todo el rango de «queja». Mantiene la tensión léxica sin endurecerla demasiado.
- source_word: ἀπὸ καταλαλιᾶς φείσασθε γλώσσης
  english_pob_choice: spare your tongue from slander
  chosen_spanish: escatimen su lengua de la calumnia
  alternatives_spanish:
  - refrenen su lengua de la calumnia
  - retraigan su lengua de la calumnia
  - guarden su lengua de la calumnia
  lexicon: LSJ
  rationale: φείσασθε pide «ahorrar, escatimar, abstenerse». «Escatimen su lengua de la calumnia» refleja el verbo de manera más directa que un simple «guarden», y conserva la imagen de la lengua como instrumento del habla. καταλαλιάς se puede rendir por «calumnia»; también puede tener el matiz de murmuración o difamación.
- source_word: φθέγμα λαθραῖον
  english_pob_choice: secret utterance
  chosen_spanish: palabra secreta
  alternatives_spanish:
  - habla secreta
  - dicho secreto
  - expresión oculta
  lexicon: LSJ
  rationale: φθέγμα es un dicho, emisión o palabra pronunciada; λαθραῖον indica lo oculto o secreto. «Palabra secreta» es natural en español y mantiene el sentido de habla clandestina que el contexto exige.
- source_word: κενὸν οὐ πορεύεται
  english_pob_choice: goes out empty
  chosen_spanish: sale vacía
  alternatives_spanish:
  - sale vacía de efecto
  - no sale en vano
  - no va vacía
  lexicon: LSJ
  rationale: La literalidad «no va vacía» es la base; en español, «sale vacía» conserva el contraste entre palabra secreta y consecuencia. El sentido es que tal habla no queda sin efecto.
- source_word: στόμα δὲ καταψευδόμενον
  english_pob_choice: a lying mouth
  chosen_spanish: una boca mentirosa
  alternatives_spanish:
  - una boca que miente
  - una boca falsa
  - una boca que dice mentira
  lexicon: LSJ
  rationale: El participio expresa hablar falsamente. «Boca mentirosa» conserva el carácter proverbial y sigue la imagen corporal del original.
- source_word: ἀναιρεῖ ψυχήν
  english_pob_choice: destroys a soul
  chosen_spanish: destruye un alma
  alternatives_spanish:
  - destruye una vida
  - quita la vida a una persona
  - aniquila un alma
  lexicon: LSJ
  rationale: ἀναιρέω puede significar matar, eliminar o destruir. «Destruye un alma» sigue la decisión inglesa de preservar ψυχή en su peso antropológico y moral, sin resolver la tensión hacia «vida» o «persona».
- source_word: ψυχήν
  english_pob_choice: a soul
  chosen_spanish: un alma
  alternatives_spanish:
  - una vida
  - una persona
  lexicon: LSJ
  rationale: ψυχή abarca alma, vida o persona. En este contexto sapiencial, «alma» mantiene la gravedad ética y espiritual del dicho, aunque las alternativas siguen siendo posibles.
theological_decisions:
- issue: Alcance de ψυχή en la cláusula final
  english_pob_reading: '''soul'' in the main text, with footnoted alternatives life/person'
  chosen_spanish_reading: «alma» en el texto principal
  alternative_spanish_readings:
  - vida
  - persona
  rationale: La advertencia sapiencial culmina en un daño que excede lo social. «Alma» preserva la densidad antropológica y moral del enunciado, mientras que «vida» o «persona» siguen siendo lecturas lexicalmente válidas y deben permanecer abiertas.
  doctrine_reference: Conservar la tensión semántica sin resolverla; documentar las alternativas legítimas.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al preferir un verbo que refleje mejor φείσασθε («escatimen») y mantiene la equivalencia óptima en el cierre, donde ψυχή conserva su amplitud semántica con nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - «alma» se mantiene para ψυχή en la línea principal, con nota de alternativas para no borrar la ambigüedad bíblica.
  - Se conserva la imaginería corporal de «lengua» y «boca» para respetar el estilo sapiencial griego.
  - «calumnia» recoge el núcleo de καταλαλιά sin introducir una formulación eclesiástica más estrecha que la fuente.
