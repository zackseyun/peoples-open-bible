  to: 'Así me dijo Yahvé: «Ve y cómprate un cinturón de lino[a], y póntelo en tu cintura; pero no lo metas en agua».'
  rationale: Se ajusta el español para que suene natural y ampliamente legible sin perder fidelidad al hebreo ni al audit trail inglés. «Así me dijo Yahvé» expresa la fórmula con claridad; «póntelo en tu cintura» sigue mejor la decisión inglesa «put it on your waist» y evita una expresión más marcada («lomos») en el texto principal. Se elimina la nota sobre «Yahvé» porque el nombre divino ya está fijado por la terminología del proyecto; se conserva solo la nota léxica pertinente para אֵזוֹר.
