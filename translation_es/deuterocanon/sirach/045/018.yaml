translation:
  language: es
  text: Extraños[a] se enojaron con él, y en el desierto le tuvieron envidia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo conservado es más breve: «Extraños se enojaron con él, y en el desierto le tuvieron envidia». El paralelo griego identifica a esos adversarios como los hombres asociados con Datán, Abirón y la asamblea de Coré.'
    reason: textual_variant
lexical_decisions:
- source_word: ויחרו בו
  english_pob_choice: grew angry with him
  chosen_spanish: se enojaron con él
  alternatives_spanish:
  - ardieron contra él
  - se enfurecieron con él
  lexicon: HALOT
  rationale: El hebreo חרה con ב expresa que la ira se encendió contra una persona. «Se enojaron con él» conserva ese valor de hostilidad en un español natural, sin intensificar más de lo que el hebreo exige.
- source_word: זרים
  english_pob_choice: strangers
  chosen_spanish: hombres extraños
  alternatives_spanish:
  - extraños
  - forasteros
  - personas extrañas
  lexicon: HALOT
  rationale: '«Zarim» significa literalmente «extraños/forasteros». Aquí la frase se entiende mejor en español como un sustantivo personal: «hombres extraños», para mantener el sentido de agentes humanos hostiles y no solo una cualidad abstracta.'
- source_word: ויקנאו בו
  english_pob_choice: were jealous of him
  chosen_spanish: le tuvieron envidia
  alternatives_spanish:
  - fueron celosos de él
  - lo envidiaron
  - se mostraron celosos contra él
  lexicon: HALOT
  rationale: קנא puede expresar celos o celo. En este contexto de rebelión, «le tuvieron envidia» comunica la rivalidad personal de forma clara y fiel, y evita una lectura demasiado técnica de «celo» en español.
- source_word: במדבר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto/ermosura
  - en la soledad del desierto
  lexicon: HALOT
  rationale: Para español bíblico actual, «desierto» es la opción más clara y natural para במדבר. «Desierto» conserva el marco narrativo del éxodo, aunque la palabra hebrea también pueda abarcar estepa o región árida.
theological_decisions:
- issue: Uso del testimonio hebreo breve frente al paralelo griego más explícito
  english_pob_reading: The extant Hebrew witness is shorter; the Greek parallel identifies the rebels more fully, but the revision pass removed material not present in the Hebrew source from the main line.
  chosen_spanish_reading: La línea principal sigue el hebreo conservado y no incorpora en el texto a Datan, Abirón y Coré.
  alternative_spanish_readings:
  - Incorporar en el texto principal la identificación griega de los rebeldes
  - Incluir una expansión narrativa con Datan, Abirón y Coré
  rationale: Como el hebreo extante es la base directa de este versículo y el repaso de revisión señaló que el material griego no pertenece a esa línea hebrea, la traducción principal debe limitarse a las dos cláusulas hebreas claramente atestiguadas. Esto preserva honestamente la tensión textual sin borrar el valor del paralelo griego.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; registrar la divergencia con el griego sin fusionarla indebidamente en el texto principal.'
translation_notes:
  revision_awareness: 'El borrador sigue la decisión de revisión más reciente: se eliminaron del texto principal los materiales que no aparecen en el hebreo conservado (la identificación explícita de Datan, Abirón y Coré, y la mención de furia e ira en esa expansión griega). La nota al pie preserva esa información como variante textual.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda a יהוה; este versículo no lo contiene.
  - Se mantiene «desierto» para במדבר por ser el equivalente bíblico más natural en español.
  - «Hombres extraños» conserva el carácter personal del hebreo זרים sin cargar el verso con una paráfrasis explicativa excesiva.
  - La puntuación y el registro buscan ser aptos para lectura pública eclesial en español neutro.
