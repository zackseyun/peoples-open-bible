revisions:
- from: He aquí[a], vienen días en que todo lo que hay en tu casa, y lo que tus padres han almacenado hasta este día, será llevado a Babilonia. No quedará cosa alguna, dice Yahvé.
  to: He aquí, vienen días en que todo lo que hay en tu casa, y lo que tus padres[a] han atesorado hasta este día, será llevado a Babilonia. No quedará cosa alguna, dice Yahvé.
  rationale: Se mantiene la traducción general por ser fiel al hebreo y al POB, pero se corrige la nota al pie para alinearla con la alternativa léxica documentada para אֲבֹתֶיךָ, y se mejora «han almacenado» a «han atesorado» por naturalidad y mejor ajuste contextual al verbo hebreo de acumular/guardar tesoros. Se elimina el anclaje innecesario en «He aquí».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:08:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite fielmente el sentido del hebreo: anuncio profético inminente, traslado pasivo de todos los bienes a Babilonia, pérdida total, y fórmula final con el nombre divino Yahvé. También conserva bien «casa» frente a una interpretación más específica como «palacio», y «tus padres» refleja literalmente אֲבֹתֶיךָ.'
  spanish_quality_summary: 'La redacción es clara y digna. Sin embargo, hay dos reparaciones menores: (1) la nota al pie anclada en «He aquí» no corresponde a la alternativa preservada por el rastro inglés, que se refiere a «tus padres / tus antepasados», no a הִנֵּה; (2) «han almacenado» es entendible pero suena algo logístico/industrial en español bíblico; «han atesorado» o «han guardado» encaja mejor con tesoros reales. Además, hay un error tipográfico no español en la justificación léxica («declaração»/carácter extraño), aunque eso no afecta el texto bíblico mismo.'
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה → «Yahvé» correctamente; בַּיִת → «casa» preservado; אֲבֹתֶיךָ → «tus padres» mantenido con alternativa contextual «tus antepasados». No hay conflictos teológicos relevantes.'
  issues:
  - severity: medium
    issue: La nota al pie actual está anclada en «He aquí» en lugar de reflejar la alternativa significativa documentada para אֲבֹתֶיךָ.
    rationale: El rastro inglés preserva la alternativa «your ancestors» para «your fathers». En español, la nota útil y documentada debe ir con «tus padres», no con הִנֵּה. La nota actual introduce una alternativa nueva no necesaria y omite la alternativa auditada.
  - severity: low
    issue: «Han almacenado» suena menos natural en este contexto de tesoros heredados.
    rationale: Aunque semánticamente posible, en español bíblico y literario «han atesorado» o «han guardado» comunica mejor bienes acumulados por generaciones, en línea con אָצְרוּ y con el contexto de tesoros palaciegos/real es.
  - severity: low
    issue: Hay un carácter/voz no española en una justificación léxica («declaração»/secuencia extraña).
    rationale: No afecta el versículo, pero indica ruido editorial y conviene corregirlo en el expediente.
  revised_spanish_text: He aquí, vienen días en que todo lo que hay en tu casa, y lo que tus padres[a] han atesorado hasta este día, será llevado a Babilonia. No quedará cosa alguna, dice Yahvé.
  revised_footnotes:
  - marker: a
    text: O «tus antepasados».
    reason: lexical_alternative
  revision_rationale: Se mantiene la traducción general por ser fiel al hebreo y al POB, pero se corrige la nota al pie para alinearla con la alternativa léxica documentada para אֲבֹתֶיךָ, y se mejora «han almacenado» a «han atesorado» por naturalidad y mejor ajuste contextual al verbo hebreo de acumular/guardar tesoros. Se elimina el anclaje innecesario en «He aquí».
