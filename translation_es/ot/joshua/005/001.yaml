    rationale: El paquete fuente y las decisiones léxicas del POB indican que el texto principal debe conservar la forma masorética de primera persona («hasta que cruzamos / hubimos cruzado»), dejando «hasta que ellos cruzaron» como variante en nota. El borrador invierte esa relación.
  - severity: medium
