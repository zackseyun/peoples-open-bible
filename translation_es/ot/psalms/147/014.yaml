translation:
  language: es
  text: Pone paz en tus fronteras; te sacia con lo mejor del trigo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la grasa del trigo», un modismo hebreo para la parte más rica o mejor del trigo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂם
  english_pob_choice: He makes
  chosen_spanish: Hace
  alternatives_spanish:
  - Él hace
  - El que pone
  - El que establece
  lexicon: HALOT
  rationale: El participio con sentido verbal se vierte de modo natural en español con un verbo finito. «Hace» conserva la acción divina de establecer o producir un resultado, como en el cierre del paralelismo.
- source_word: גְּבוּלֵךְ
  english_pob_choice: your border
  chosen_spanish: tu frontera
  alternatives_spanish:
  - tu límite
  - tu territorio
  - tus fronteras
  lexicon: HALOT
  rationale: «גְּבוּל» puede ser frontera, límite o territorio. Aquí el singular poético «tu frontera» refleja bien el hebreo y mantiene la imagen de un contorno protegido; el singular concuerda con la revisión inglesa reciente.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - seguridad
  - pacífica
  lexicon: HALOT
  rationale: El hebreo presenta שָׁלוֹם como predicado de la frontera. En español, «paz» es la forma más directa y fiel; evita la construcción menos natural «hace paz tu frontera» sin añadir un adjetivo que debilite la imagen.
- source_word: חֵלֶב
  english_pob_choice: the finest
  chosen_spanish: lo mejor
  alternatives_spanish:
  - la parte más rica
  - lo más fino
  - lo más selecto
  lexicon: HALOT
  rationale: Literalmente es «grasa», pero en este contexto idiomático expresa la parte más rica o excelente. «Lo mejor» comunica la idea sin un calco engañoso y preserva el valor superlativo reconocido en la nota inglesa.
- source_word: חִטִּים
  english_pob_choice: wheat
  chosen_spanish: del trigo
  alternatives_spanish:
  - trigo
  - de trigo
  - del grano
  lexicon: HALOT
  rationale: El sustantivo designa específicamente trigo. En español, la construcción «lo mejor del trigo» suena natural y mantiene la referencia agrícola concreta.
- source_word: יַשְׂבִּיעֵךְ
  english_pob_choice: he satisfies you
  chosen_spanish: te sacia
  alternatives_spanish:
  - te satisface
  - te llena
  - te colma
  lexicon: HALOT
  rationale: El hiphil de שׂבע incluye satisfacer, saciar o colmar. «Te sacia» es idiomático en español bíblico y cotidiano, y conserva mejor la plenitud de provisión que un «satisface» más abstracto.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente prefirió «He makes peace your border» para seguir más de cerca la sintaxis hebrea. El español adopta una construcción igualmente cercana al original, pero natural: «Hace la paz tu frontera». En la segunda cola, se conserva la equivalencia idiomática del hebreo para חֵלֶב חִטִּים con una nota que explicita el modismo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el texto no contiene el nombre divino aquí; el sujeto implícito es Yahvé por el contexto del salmo.
  - Se mantiene un registro bíblico claro y actual, sin arcaísmos innecesarios.
  - La nota a pie de página conserva la tensión entre literalidad y sentido idiomático sin imponer una traducción mecánica.
