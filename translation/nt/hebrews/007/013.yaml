- issue: Relation of Jesus to a non-Levitical tribe in the priesthood argument
  chosen_reading: Render the verse in a way that highlights tribal affiliation without importing later doctrinal explanation.
  alternative_readings:
  - Translate more interpretively as 'has descended from another tribe'
  rationale: The verse supports the argument that Jesus' priesthood does not arise from Levitical lineage. However, the Greek here states participation/belonging to another tribe rather than explicitly naming descent, so the translation should not overstate the wording.
  doctrine_reference: Translation philosophy §§1, 3, 5
