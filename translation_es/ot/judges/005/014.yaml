translation:
  language: es
  text: De Efraín, aquellos cuya raíz estaba en Amalec[a]; después de ti, Benjamín, entre tus pueblos[b]. De Maquir descendieron comandantes[c][d], y de Zabulón, los que manejan el bastón del escriba[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aquellos cuya raíz estaba contra Amalec» o «aquellos cuya raíz estaba en la región montañosa de Amalec». El hebreo es difícil y probablemente poético-geográfico.'
    reason: alternative_reading
  - marker: b
    text: 'O: «entre tus clanes» o «entre tus parientes». La expresión hebrea es inusual; «pueblos» sigue de cerca la forma plural del original.'
    reason: lexical_alternative
  - marker: c
    text: «Maquir» es el clan principal de Manasés; algunas traducciones vierten el sentido tribal más amplio como «Manasés».
    reason: cultural_note
  - marker: d
    text: 'O: «legisladores». El término hebreo puede denotar gobernantes o quienes decretan.'
    reason: lexical_alternative
  - marker: e
    text: 'O: «los que tiran con el bastón del escriba» / «los que portan el bastón de mando». La expresión hebrea es rara y puede aludir al alistamiento militar o al registro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנִּי אֶפְרַיִם
  english_pob_choice: From Ephraim
  chosen_spanish: De Efraín
  alternatives_spanish:
  - Desde Efraín
  - De entre Efraín
  lexicon: HALOT
  rationale: La preposición marca origen o procedencia; en español, «De Efraín» conserva la lista poética de tribus sin añadir interpretaciones.
- source_word: שָׁרְשָׁם
  english_pob_choice: those whose root was in Amalek
  chosen_spanish: aquellos cuya raíz estaba en Amalec
  alternatives_spanish:
  - su raíz estaba en Amalec
  - los que tenían raíz en Amalec
  - aquellos arraigados en Amalec
  lexicon: HALOT
  rationale: «Raíz» mantiene la metáfora hebrea y la decisión auditada de no sustituirla por una interpretación más explícita como «descendientes». La relativa «aquellos cuya» hace natural el plural implícito del hebreo.
- source_word: בַּעֲמָלֵק
  english_pob_choice: in Amalek
  chosen_spanish: en Amalec
  alternatives_spanish:
  - contra Amalec
  - en la región montañosa de Amalec
  lexicon: HALOT
  rationale: Se conserva el valor locativo más directo, como en el texto hebreo y en el inglés auditado, sin forzar una lectura militar o geográfica más específica.
- source_word: אַחֲרֶיךָ בִנְיָמִין
  english_pob_choice: after you, Benjamin
  chosen_spanish: después de ti, Benjamín
  alternatives_spanish:
  - Benjamín te siguió
  - después de ti vino Benjamín
  lexicon: HALOT
  rationale: La estructura breve y poética se refleja con una construcción igualmente concisa en español, sin suplir un verbo ausente en el hebreo.
- source_word: בַּעֲמָמֶיךָ
  english_pob_choice: among your peoples
  chosen_spanish: entre tus pueblos
  alternatives_spanish:
  - entre tus clanes
  - entre tus parientes
  - entre tus gentes
  lexicon: HALOT
  rationale: «Pueblos» conserva la rareza plural del hebreo con sufijo de segunda persona, tal como el inglés auditado preserva «peoples». «Entre» comunica mejor la relación de pertenencia o asociación.
- source_word: מִנִּי מָכִיר
  english_pob_choice: From Machir
  chosen_spanish: De Maquir
  alternatives_spanish:
  - Desde Maquir
  - Del clan de Maquir
  - De Manasés
  lexicon: HALOT
  rationale: El hebreo nombra a Maquir directamente; por eso se mantiene el nombre propio, en vez de sustituirlo por el sentido tribal más amplio de Manasés.
- source_word: יָרְדוּ
  english_pob_choice: came down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - vinieron
  - se acercaron
  lexicon: HALOT
  rationale: «Descendieron» conserva la imagen espacial literal del verbo y su tono poético. Aunque «vinieron» sería más idiomático, perdería la verticalidad del hebreo.
- source_word: מְחֹקְקִים
  english_pob_choice: commanders
  chosen_spanish: caudillos
  alternatives_spanish:
  - comandantes
  - legisladores
  - gobernantes
  lexicon: HALOT
  rationale: En este contexto bélico-poético, el término apunta a líderes con autoridad. «Caudillos» mantiene esa fuerza y no fija demasiado el matiz institucional de «comandantes» ni el jurídico de «legisladores».
- source_word: וּמִזְּבוּלֻן
  english_pob_choice: and from Zebulun
  chosen_spanish: y de Zabulón
  alternatives_spanish:
  - y desde Zabulón
  lexicon: HALOT
  rationale: La preposición de origen se refleja con una construcción simple y coordinada, adecuada al listado tribal.
- source_word: מֹשְׁכִים
  english_pob_choice: those who wield
  chosen_spanish: los que manejan
  alternatives_spanish:
  - los que tiran de
  - los que empuñan
  - los que conducen
  lexicon: HALOT
  rationale: El participio sugiere acción de manejar o tirar de un instrumento. «Manejan» evita una traducción demasiado literal y funciona bien con el objeto siguiente en español.
- source_word: בְּשֵׁבֶט סֹפֵר
  english_pob_choice: the staff of the scribe
  chosen_spanish: el bastón del escriba
  alternatives_spanish:
  - la vara del escriba
  - el bastón del secretario
  - el bastón del escribiente
  lexicon: HALOT
  rationale: Se conserva la imagen ambigua del hebreo. «Bastón» es una opción natural para שֵׁבֶט y mantiene abierta la posibilidad de un instrumento de mando o de registro, sin resolver la dificultad del término.
theological_decisions:
- issue: Interpretación de la frase difícil sobre Efraín y Amalec
  english_pob_reading: those whose root was in Amalek; alternative readings include against Amalek or in the hill-country of Amalek
  chosen_spanish_reading: aquellos cuya raíz estaba en Amalec
  alternative_spanish_readings:
  - aquellos cuya raíz estaba contra Amalec
  - aquellos cuya raíz estaba en la región montañosa de Amalec
  rationale: No se debe borrar la dificultad textual. La traducción conserva la metáfora de «raíz» y la lectura locativa primaria, mientras las alternativas quedan disponibles porque el hebreo admite más de una posibilidad poética/geográfica.
  doctrine_reference: Principio de modestia textual; prioridad de la evidencia léxica sobre la armonización interpretativa.
- issue: Sentido de מְחֹקְקִים en contexto de guerra/canto tribal
  english_pob_reading: commanders; alternative 'lawgivers'
  chosen_spanish_reading: caudillos
  alternative_spanish_readings:
  - comandantes
  - legisladores
  - gobernantes
  rationale: La escena es un canto de victoria y movilización tribal; por eso se privilegia un término de liderazgo militar o político. «Caudillos» comunica autoridad sin imponer una definición técnica que el hebreo no exige aquí.
  doctrine_reference: Lectura contextual del léxico hebreo en poesía narrativa.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para explicitar «those whose» en el primer miembro, conservando el plural implícito del hebreo. La redacción española refleja esa claridad añadida sin perder la ambigüedad de raíz/localización ni la estructura poética del verso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «Maquir» como nombre propio, en línea con la decisión inglesa de no sustituirlo por «Manasés».
  - Se preserva la oscilación semántica del hebreo en la imagen de «raíz» y en el sintagma final con «bastón del escriba».
  - La puntuación separa los miembros tribales como en la poesía hebrea y como en el inglés auditado.
