translation:
  language: es
  text: Sea para siempre la gloria de Yahvé[a]; regocíjese Yahvé[b] en sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «permanezca para siempre». El hebreo puede entenderse como un deseo de permanencia continua.'
    reason: alternative_reading
  - marker: b
    text: 'O: «sobre sus obras». El hebreo בְּ puede señalar también una relación más amplia con las obras de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: May ... be
  chosen_spanish: ¡Sea...!
  alternatives_spanish:
  - Que sea...
  - Permanezca...
  lexicon: HALOT
  rationale: El jussivo expresa un deseo u oración; en español, el optativo con «sea» transmite bien esa intención solemne sin volverlo mecánico.
- source_word: כְבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - majestad
  lexicon: HALOT
  rationale: «Gloria» es el equivalente normal y más apto en un contexto doxológico, preservando el peso de כָּבוֹד.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto para יהוה, evitando la sustitución por título.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: «Para siempre» comunica de forma natural y fiel la duración continua de לְעוֹלָם en español contemporáneo.
- source_word: יִשְׂמַח
  english_pob_choice: may ... rejoice
  chosen_spanish: que ... se alegre
  alternatives_spanish:
  - que ... regocije
  - que ... goce
  lexicon: HALOT
  rationale: En poesía española, «se alegre» expresa bien el matiz desiderativo y la intensidad celebrativa del verbo sin sobrecargar el registro.
- source_word: בְּמַעֲשָׂיו
  english_pob_choice: in his works
  chosen_spanish: en sus obras
  alternatives_spanish:
  - sobre sus obras
  - en lo que ha hecho
  lexicon: HALOT
  rationale: «Obras» mantiene la referencia amplia a lo creado/realizado por Dios, y la preposición «en» sigue de cerca el בְּ del hebreo. La alternativa «sobre» queda como posibilidad relacional, pero no es la opción principal.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama; el proyecto pide conservar el nombre divino en forma transliterada. «Yahvé» es la forma base en español del proyecto, más consistente que la sustitución por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación preposicional de בְּמַעֲשָׂיו
  english_pob_reading: in his works / over his works
  chosen_spanish_reading: en sus obras
  alternative_spanish_readings:
  - sobre sus obras
  - en lo que ha hecho
  rationale: La preposición בְּ admite una relación local/instrumental o, interpretativamente, de referencia sobre las obras. En español, «en sus obras» es la opción más directa y fiel; se evita fijar «sobre» como sentido principal sin necesidad.
  doctrine_reference: 'Doctrina de traducción léxica del POB: mantener la ambigüedad legítima cuando el hebreo la permite.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que ajustó la primera cláusula de «endure forever» a una formulación más directa con «be forever». En español se refleja esa dirección con un optativo breve y natural («Sea para siempre»), mientras la segunda cláusula mantiene la equivalencia semántica del hebreo y la nota sobre בְּ como relación alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se eligió «gloria» y no «honor/majestad» por ser el término doxológico más estable en este contexto.
  - «Obras» conserva el campo semántico amplio de מַעֲשִׂים sin restringirlo indebidamente a meros actos humanos.
