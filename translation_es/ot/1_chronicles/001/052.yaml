lexical_decisions:
- source_word: אַלּוּף
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - caudillo
  - líder
  - jefe de clan
  lexicon: HALOT
  rationale: En estas listas genealógicas de Edom, el término designa un jefe tribal o de clan. «Jefe» conserva la función titular de forma natural en español y evita la carga anacrónica o nobiliaria de «duque». «Jefe de clan» sería más explícito, pero resulta más pesado para la repetición fórmulaica del versículo.
- source_word: אָהֳלִיבָמָה
  english_pob_choice: Oholibamah
  chosen_spanish: Oholibamá
  alternatives_spanish:
  - Oholibama
  - Aholibamá
  lexicon: transliteración estándar
  rationale: Se translitera el nombre propio sin traducirlo. «Oholibamá» conserva mejor la forma hebrea y la pronunciación esperable en español, manteniendo la consistencia con la práctica del proyecto de no reemplazar nombres por equivalentes interpretativos.
- source_word: אֵלָה
  english_pob_choice: Elah
  chosen_spanish: Elah
  alternatives_spanish:
  - Ela
  lexicon: transliteración estándar
  rationale: Nombre propio de una persona/clan en la genealogía; se mantiene sin traducción. «Elah» es una forma transparente y breve, acorde con el registro genealógico.
- source_word: פִּינֹן
  english_pob_choice: Pinon
  chosen_spanish: Pinón
  alternatives_spanish:
  - Pinon
  - Pinnon
  lexicon: transliteración estándar
  rationale: Se translitera el nombre propio. Se añade tilde en español para reflejar la acentuación natural de la forma llana final en lectura pública, sin alterar el valor del nombre.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alta concordancia y no muestran revisiones sustantivas; por ello la versión española mantiene la fórmula tripartita repetida y solo ajusta la lexicalización de אַלּוּף al español más natural y fiel al valor de jefe de clan.
  spanish_consistency_notes:
  - Se mantiene la estructura repetida «jefe + nombre propio» para reflejar la fórmula del hebreo.
  - Los nombres propios se transliteran y no se traducen.
  - «Jefe» se usa como equivalente base de אַלּוּף en esta genealogía edomita, en línea con la decisión inglesa «chief».
