revisions:
- from: Entonces los que antes habían sido reprochados y estaban cerca de Hades[a] —más bien, ya habían puesto el pie sobre él[b]—, en vez de un destino amargo y difícil de beber, habiendo preparado un banquete de salvación[c], repartieron como lechos de comida el lugar preparado para ellos para caída y sepulcro, llenos de alegría.
  to: Entonces los que antes habían sido reprochados y estaban cerca de Hades[a] —más bien, ya habían puesto el pie sobre él[b]—, en lugar de una condena amarga y difícil de beber, habiendo dispuesto un banquete festivo de salvación[c], dividieron en lechos de banquete el lugar preparado para su caída y sepulcro, llenos de alegría.
  rationale: Se ajustó «destino» a «condena» para reflejar mejor la fuerza negativa de μόρου según el audit trail; «banquete de salvación» a «banquete festivo de salvación» para conservar mejor el matiz de κῶθωνα; y «lechos de comida» a «lechos de banquete» por claridad e idiomaticidad. También se suavizó la sintaxis de la frase final en español sin perder la inversión dramática del original.
