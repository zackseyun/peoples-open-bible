translation:
  language: es
  text: Permanece en esta tierra[a], y yo estaré contigo y te bendeciré, porque a ti y a tu descendencia[b] daré todas estas tierras, y estableceré el juramento[c] que juré a Abraham tu padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Sojurna en esta tierra». El verbo hebreo puede denotar vivir como residente temporal o extranjero.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «semilla»; aquí el término es colectivo, por eso se traduce «descendencia».
    reason: lexical_alternative
  - marker: c
    text: O «confirmaré» o «cumpliré» el juramento.
    reason: alternative_reading
lexical_decisions:
- source_word: גּוּר
  english_pob_choice: Stay
  chosen_spanish: Habita
  alternatives_spanish:
  - Permanece
  - Reside como forastero
  - Sojurna
  lexicon: HALOT
  rationale: El verbo puede expresar vivir como residente temporal o extranjero. En español, «habita» comunica la permanencia pedida sin sonar forzado; conserva la idea de residir en el lugar, mientras «sojurnar» queda como alternativa más literal y marcada.
- source_word: בָּאָרֶץ הַזֹּאת
  english_pob_choice: in this land
  chosen_spanish: en esta tierra
  alternatives_spanish:
  - en este país
  - en esta región
  lexicon: HALOT
  rationale: «ארץ» aquí tiene sentido geográfico y pactal. «Tierra» mantiene esa amplitud bíblica y el vínculo con la promesa de heredad.
- source_word: וְאֶהְיֶה עִמְּךָ
  english_pob_choice: and I will be with you
  chosen_spanish: y yo estaré contigo
  alternatives_spanish:
  - y estaré contigo
  - y yo me quedaré contigo
  lexicon: HALOT
  rationale: Es una fórmula de presencia pactal. En español conviene explicitar el sujeto para conservar el énfasis personal del hebreo.
- source_word: וַאֲבָרְכֶךָּ
  english_pob_choice: and bless you
  chosen_spanish: y te bendeciré
  alternatives_spanish:
  - y yo te bendeciré
  lexicon: HALOT
  rationale: La forma verbal continúa la secuencia de promesas divinas. «Te bendeciré» es natural y fiel, sin necesidad de añadir más.
- source_word: לְךָ וּלְזַרְעֲךָ
  english_pob_choice: to you and to your offspring
  chosen_spanish: a ti y a tu descendencia
  alternatives_spanish:
  - a ti y a tu simiente
  - a ti y a tus descendientes
  lexicon: HALOT
  rationale: «זרע» es colectivo. «Descendencia» conserva el alcance corporativo y suena claro en español; «simiente» sería más literal, pero menos idiomático.
- source_word: כָּל הָאֲרָצֹת הָאֵל
  english_pob_choice: all these lands
  chosen_spanish: todas estas tierras
  alternatives_spanish:
  - todos estos territorios
  - todas estas regiones
  lexicon: HALOT
  rationale: El plural hebreo enfatiza varias extensiones de tierra. «Tierras» preserva la relación léxica con «tierra» y refleja bien el plural.
- source_word: וַהֲקִמֹתִי אֶת הַשְּׁבֻעָה
  english_pob_choice: and I will establish the oath
  chosen_spanish: y estableceré el juramento
  alternatives_spanish:
  - y confirmaré el juramento
  - y cumpliré el juramento
  lexicon: HALOT
  rationale: El hebreo indica hacer firme o establecer lo jurado. «Estableceré» mantiene esa fuerza; «juramento» comunica el acto solemne, aunque «juramento» y «oath» no siempre coinciden exactamente en español moderno.
- source_word: אֲשֶׁר נִשְׁבַּעְתִּי
  english_pob_choice: that I swore
  chosen_spanish: que juré
  alternatives_spanish:
  - que he jurado
  - que solemnemente juré
  lexicon: HALOT
  rationale: La cláusula relativa modifica el juramento. «Juré» es directo y fiel; evita sobrecargar el tono con adverbios no exigidos por el texto.
- source_word: לְאַבְרָהָם אָבִיךָ
  english_pob_choice: to Abraham your father
  chosen_spanish: a Abraham, tu padre
  alternatives_spanish:
  - a tu padre Abraham
  - a Abraham tu padre
  lexicon: HALOT
  rationale: La relación familiar y pactal debe quedar explícita. En español, la coma ayuda a leer la aposición con naturalidad.
theological_decisions:
- issue: Fórmula de presencia divina
  english_pob_reading: I will be with you
  chosen_spanish_reading: yo estaré contigo
  alternative_spanish_readings:
  - estaré contigo
  - yo me acompañaré contigo
  rationale: El hebreo expresa presencia y acompañamiento pactal. «Estaré contigo» conserva esa fuerza sin añadir matices ajenos.
  doctrine_reference: Presencia pactal de Dios; fidelidad del Dios del pacto
- issue: אַלcance de זֶרַע
  english_pob_reading: offspring
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - simiente
  - descendientes
  rationale: En este contexto la promesa es colectiva y genealógica. «Descendencia» mantiene el sentido corporativo sin introducir una lectura técnica innecesaria.
  doctrine_reference: Promesa a la línea de Abraham/Isaac; consistencia terminológica con matiz colectivo
- issue: הַשְּׁבֻעָה
  english_pob_reading: the oath
  chosen_spanish_reading: el juramento
  alternative_spanish_readings:
  - el juramento solemne
  - la promesa jurada
  rationale: El texto habla de un juramento divino, no solo de una promesa general. «Juramento» preserva el peso legal y solemne del acto, aunque en la tradición bíblica el contenido sea promesa.
  doctrine_reference: Fidelidad divina al juramento hecho a Abraham; lenguaje de alianza y promesa
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo directamente y dialoga con la decisión inglesa de optimizar sin perder las tensiones léxicas. Se mantuvo el valor colectivo de זרע, la fórmula de presencia pactal y la idea de hacer firme el juramento, con alternativas documentadas donde el español ofrece matices legítimos.
  spanish_consistency_notes:
  - Se usa «tierra»/«tierras» para preservar el campo semántico de אֶרֶץ.
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se mantiene un registro reverente pero moderno, apto para lectura pública.
  - «Juramento» se emplea para הַשְּׁבֻעָה por su fuerza legal y solemne; «promesa» queda fuera del texto principal para no suavizar el término.
