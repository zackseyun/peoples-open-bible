review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Yahvé promete aumentar la abundancia agrícola (''el fruto del árbol'' y ''la produce/producción del campo'') con el propósito de que Israel no siga cargando el oprobio del hambre entre las naciones. Sin embargo, ''sufran el oprobio'' suaviza y desplaza el matiz idiomático de לֹא תִקְחוּ עוֹד, que en este contexto se acerca más a ''llevar/cargar/soportar'' que a ''sufrir'' a secas.'
  spanish_quality_summary: El español es claro y digno. No obstante, 'la producción del campo' suena algo técnica/industrial en registro bíblico; 'el producto del campo' o 'el fruto del campo' sería más natural. Además, por concordancia con el singular colectivo del hebreo y con el tono profético, 'ya no cargarán con el oprobio del hambre' lee mejor que 'ya no sufran'.
  glossary_alignment: 'No hay términos del glosario maestro en tensión aquí. La elección ''oprobio'' para חֶרְפָּה está bien alineada con la rationale teológica. ''Naciones'' para גּוֹיִם también está bien. La principal mejora es estilística-lexical: preferir ''producto del campo'' y un verbo como ''cargar con'' para preservar mejor el hebreo y la decisión inglesa ''bear''.'
  issues:
  - severity: medium
    issue: '''ya no sufran el oprobio'' no preserva del todo el matiz de ''bear'' / idiomático de לקח + חֶרְפָּה'
    rationale: El hebreo no solo expresa padecimiento general, sino cargar/llevar una afrenta pública. 'Cargar con el oprobio' reproduce mejor la fuerza idiomática y la decisión auditada en inglés.
  - severity: low
    issue: '''la producción del campo'' suena demasiado técnica'
    rationale: Aunque semánticamente posible, en español bíblico actual 'producto del campo' o 'rendimiento del campo' suena más natural y menos industrial, manteniendo el sentido de תְּנוּבָה.
  revised_spanish_text: Y multiplicaré el fruto del árbol y el producto del campo,[a] para que ya no carguen con el oprobio del hambre entre las naciones.
  revised_footnotes:
  - marker: a
    text: 'O: «ya no sufran la vergüenza del hambre entre las naciones».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal de la cláusula final para reflejar mejor el idiomatismo hebreo de llevar/cargar una afrenta, y se reemplaza 'producción' por 'producto' para una lectura más natural y bíblica en español sin alterar el sentido. La nota alternativa puede mantenerse tal como está, porque preserva una opción española válida para el matiz de חֶרְפָּה.
