translation:
  language: es
  text: Y en toda obra que comenzó en el servicio de la casa de Dios, y en la ley[a] y el mandamiento, buscando a su Dios con todo su corazón[b], hizo y prosperó[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrucción» para תּוֹרָה, «ley».
    reason: lexical_alternative
  - marker: b
    text: O «consultando a su Dios». El verbo hebreo puede abarcar buscar y también consultar.
    reason: lexical_alternative
  - marker: c
    text: O «y tuvo éxito».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל מַעֲשֶׂה
  english_pob_choice: And in every work
  chosen_spanish: Y en toda obra
  alternatives_spanish:
  - Y en todo trabajo
  - Y en toda labor
  lexicon: HALOT
  rationale: מַעֲשֶׂה abarca obra, trabajo o actividad. 'Obra' mantiene la amplitud y suena natural en español bíblico contemporáneo, sin reducir el sentido a una tarea meramente manual.
- source_word: אֲשֶׁר הֵחֵל
  english_pob_choice: that he began
  chosen_spanish: que comenzó
  alternatives_spanish:
  - que emprendió
  - que inició
  lexicon: HALOT
  rationale: הֵחֵל significa 'empezar/comenzar'. 'Comenzó' conserva el valor verbal simple del hebreo y encaja bien en la oración relativa.
- source_word: בַּעֲבוֹדַת בֵּית הָאֱלֹהִים
  english_pob_choice: in the service of the house of God
  chosen_spanish: en el servicio de la casa de Dios
  alternatives_spanish:
  - en la obra de la casa de Dios
  - en el servicio de la casa de Dios
  lexicon: HALOT
  rationale: עֲבוֹדָה puede ser servicio o labor cultual. 'Servicio' preserva el sentido institucional y de culto sin restringirlo a un rito específico.
- source_word: וּבַתּוֹרָה
  english_pob_choice: and in the law
  chosen_spanish: y en la ley
  alternatives_spanish:
  - y en la instrucción
  lexicon: HALOT
  rationale: תּוֹרָה puede significar ley o instrucción. En este contexto de reforma de pacto, 'ley' expresa mejor la referencia al corpus normativo mosaico; se mantiene la alternativa 'instrucción' como posibilidad léxica.
- source_word: וּבַמִּצְוָה
  english_pob_choice: and the commandment
  chosen_spanish: y el mandamiento
  alternatives_spanish:
  - y el mandato
  - y los mandamientos
  lexicon: HALOT
  rationale: El singular מִצְוָה se refleja con 'mandamiento'. Aunque puede funcionar colectivamente, el singular preserva la forma hebrea y la paridad con el texto fuente.
- source_word: לִדְרֹשׁ לֵאלֹהָיו
  english_pob_choice: seeking his God
  chosen_spanish: buscando a su Dios
  alternatives_spanish:
  - consultando a su Dios
  - buscando de su Dios
  lexicon: HALOT
  rationale: דָרַשׁ con Dios puede significar buscar o consultar. En Crónicas, el motivo de 'buscar a Dios' es central y devocional; 'buscando a su Dios' reproduce ese matiz mejor que una traducción más técnica.
- source_word: בְּכָל לְבָבוֹ
  english_pob_choice: with all his heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo su ser
  - de todo corazón
  lexicon: HALOT
  rationale: El modismo expresa entrega total. 'Con todo su corazón' es idiomático en español y conserva la fuerza de compromiso íntegro del hebreo.
- source_word: עָשָׂה
  english_pob_choice: he did
  chosen_spanish: hizo
  alternatives_spanish:
  - lo hizo
  - actuó
  lexicon: HALOT
  rationale: 'עָשָׂה es un verbo muy amplio: hacer, obrar, realizar. ''Hizo'' mantiene la brevedad del hebreo y permite que el verbo se relacione con lo anterior sin añadir un objeto implícito innecesario.'
- source_word: וְהִצְלִיחַ
  english_pob_choice: and prospered
  chosen_spanish: y prosperó
  alternatives_spanish:
  - y tuvo éxito
  - y tuvo prosperidad
  lexicon: HALOT
  rationale: הִצְלִיחַ puede significar prosperar o tener éxito. 'Prosperó' conserva la evaluación positiva del cierre y corresponde bien al uso bíblico del término.
theological_decisions:
- issue: Sentido de תּוֹרָה en contexto de reforma
  english_pob_reading: Rendered as 'the law' in the main text
  chosen_spanish_reading: Renderizado como 'la ley' en el texto principal
  alternative_spanish_readings:
  - '''la instrucción'''
  rationale: En Crónicas, la reforma de Ezequías se presenta en clave de obediencia al orden del pacto. 'La ley' conserva ese marco normativo; 'la instrucción' es posible léxicamente, pero en español puede sonar menos preciso para este contexto y queda como alternativa documentada.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
- issue: Sentido de לִדְרֹשׁ אֱלֹהִים
  english_pob_reading: seeking his God
  chosen_spanish_reading: '''buscando a su Dios'''
  alternative_spanish_readings:
  - '''consultando a su Dios'''
  rationale: 'El verbo admite la idea de buscar o consultar. La formulación elegida preserva la tensión devocional propia de Crónicas: no sólo consulta informativa, sino búsqueda de Dios con lealtad de pacto.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; readable modern Spanish.'
translation_notes:
  revision_awareness: 'La versión inglesa más reciente simplificó la sintaxis para acercarse más al hebreo, especialmente al unir «with all his heart» con «seeking his God» y al dejar «he did» sin un objeto añadido. La redacción española sigue esa revisión: conecta «con todo su corazón» con «buscando a su Dios» y mantiene «hizo» sin agregar complemento implícito.'
  spanish_consistency_notes:
  - Se usa «Dios» para הָאֱלֹהִים, según el estándar del proyecto.
  - Se usa «ley» para תּוֹרָה en el texto principal, con nota de alternativa léxica.
  - Se conserva «buscando» para לִדְרֹשׁ, siguiendo la lectura devocional documentada en el audit trail.
  - 'Se mantiene la secuencia paratáctica del hebreo: obra — servicio — ley — mandamiento — búsqueda — acción — prosperidad.'
  - No se ha introducido lenguaje eclesiástico tradicional no requerido por la fuente.
