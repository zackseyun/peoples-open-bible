review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: mantiene «mi siervo», conserva la secuencia de exaltación y preserva la alternativa léxica de יַשְׂכִּיל con nota. Sin embargo, «¡Mira!» para הִנֵּה suena más coloquial que solemne en un contexto profético, y la mayúscula tras el signo de exclamación («Mi siervo») no sigue la puntuación española cuando la oración continúa. Además, conviene alinear mejor la progresión de los tres verbos con una formulación más natural y cercana al inglés auditado.'
  spanish_quality_summary: El español es claro y comprensible, pero necesita un ajuste de registro y puntuación. «He aquí» o «Miren» serían opciones más solemnes; aquí «He aquí» encaja mejor con el tono profético y evita un matiz excesivamente conversacional. La cadena «será enaltecido, levantado y muy exaltado» es entendible, pero «será levantado, alzado y muy exaltado» o similar evita repetir dos casi sinónimos menos idiomáticamente escalonados; aun así, basta una reparación mínima.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Mi siervo» está bien para עַבְדִּי en este contexto. No aparecen términos sensibles como Yahvé, Mesías/Cristo o δοῦλος que exijan desviación del glosario. La nota sobre «prosperará» está bien preservada.
  issues:
  - severity: medium
    issue: Registro de הִנֵּה como «¡Mira!»
    rationale: Aunque posible, «¡Mira!» resulta más coloquial de lo deseable para un anuncio profético solemne. «He aquí» preserva mejor la fuerza enfática y el tono del original y del inglés POB («Behold»).
  - severity: low
    issue: Capitalización tras exclamación
    rationale: En español, si la oración continúa tras «¡He aquí!»/«¡Mira!», no corresponde mayúscula en «mi siervo».
  - severity: low
    issue: Matiz de la serie de exaltación
    rationale: «Enaltecido, levantado y muy exaltado» comunica bien el sentido, pero una secuencia más cercana a la imaginería ascendente del hebreo mejora la naturalidad y la transparencia léxica.
  revised_spanish_text: He aquí[a], mi siervo actuará con sabiduría; será levantado, alzado y muy exaltado.
  revised_footnotes:
