translation:
  language: es
  text: 'Lo revestirás de oro puro: su parte superior, sus paredes por todo alrededor y sus cuernos; y le harás una moldura de oro alrededor[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una corona de oro alrededor'. El hebreo zer puede denotar un borde, un reborde o una moldura semejante a una corona.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִפִּיתָ
  english_pob_choice: you shall overlay
  chosen_spanish: lo revestirás
  alternatives_spanish:
  - lo cubrirás
  - lo platearás
  lexicon: HALOT
  rationale: צפה en este contexto describe aplicar una capa metálica a un objeto sagrado. En español, "revestir" comunica bien la idea de cubrir con un material noble sin sonar mecánico; "platear" sería más técnico y menos natural en un texto bíblico general.
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro limpio
  lexicon: HALOT
  rationale: La expresión indica oro de alta pureza. "Oro puro" es la equivalencia más natural y clara en español, y mantiene el valor cultual del material.
- source_word: גַּגּוֹ
  english_pob_choice: its top
  chosen_spanish: su parte superior
  alternatives_spanish:
  - su techo
  - su tapa
  lexicon: HALOT
  rationale: Aunque גג puede significar "techo", aquí se trata del altar, no de un edificio. "Parte superior" conserva el sentido físico del lado de arriba sin introducir una imagen arquitectónica extraña.
- source_word: קִירֹתָיו
  english_pob_choice: its walls
  chosen_spanish: sus paredes
  alternatives_spanish:
  - sus lados
  - sus muros
  lexicon: HALOT
  rationale: El término literalmente alude a "paredes". En español, "paredes" mantiene la imagen vertical y sigue de cerca la forma hebrea; "lados" sería más idiomático, pero menos preciso lexicalmente.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todos lados
  lexicon: HALOT
  rationale: El adverbio enfatiza la cobertura completa del contorno. "Alrededor" es la forma natural y suficientemente exacta en español.
- source_word: קַרְנֹתָיו
  english_pob_choice: its horns
  chosen_spanish: sus cuernos
  alternatives_spanish:
  - sus puntas
  - sus salientes
  lexicon: HALOT
  rationale: Se conserva el término cultual literal. En este contexto, "cuernos" es la denominación estable para las protuberancias rituales del altar y no debe suavizarse.
- source_word: וְעָשִׂיתָ לוֹ
  english_pob_choice: and you shall make for it
  chosen_spanish: y le harás
  alternatives_spanish:
  - y le harás para él
  - y harás para él
  lexicon: HALOT
  rationale: El dativo con ל expresa relación o beneficio. En español, "le harás" refleja de manera natural y compacta la idea de hacer algo para el objeto.
- source_word: זֵר זָהָב
  english_pob_choice: a gold molding
  chosen_spanish: una moldura de oro
  alternatives_spanish:
  - un borde de oro
  - una corona de oro
  lexicon: HALOT
  rationale: זֵר designa un elemento decorativo perimetral. "Moldura" comunica bien la función ornamental y estructural; "corona" queda como alternativa posible, pero puede sugerir con demasiada fuerza una imagen regia.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en todo alrededor
  - por todas partes
  lexicon: HALOT
  rationale: Se repite para conservar el énfasis hebreo en la circunferencia completa. La repetición en español mantiene el carácter descriptivo del pasaje.
theological_decisions:
- issue: Terminología cultual del altar
  english_pob_reading: Retain literal 'horns' and render זֵר as 'molding' rather than 'crown.'
  chosen_spanish_reading: Conservar "cuernos" y traducir זֵר como "moldura".
  alternative_spanish_readings:
  - Traducir זֵר como "corona"
  - suavizar "cuernos" por "puntas"
  rationale: El versículo describe la construcción del altar, no una metáfora de realeza. Por eso conviene mantener el vocabulario técnico del culto. "Moldura" expresa la función ornamental sin cargar el texto con una lectura regia que no es exigida por el contexto.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste de la auditoría inglesa que prefirió una descripción más precisa del objeto: ''walls'' en vez de ''sides''. En español se ha reflejado con ''paredes'' para conservar cercanía léxica sin perder naturalidad.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva la terminología cultual literal (cuernos, moldura) para no diluir el sentido técnico del altar.
  - La repetición de "alrededor" refleja el énfasis del hebreo סָבִיב en ambas ocurrencias.
