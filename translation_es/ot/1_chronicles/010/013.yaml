  language: en
  yaml_path: translation/ot/1_chronicles/010/013.yaml
  text: So Saul died for his unfaithfulness by which he was unfaithful to Yahweh[a], because of the word of Yahweh, which he did not keep, and also because he asked counsel of a medium[b], to inquire.
  footnotes:
