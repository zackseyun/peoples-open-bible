translation:
  language: es
  text: 'Y también acerca de Jezabel[a], Yahvé habló, diciendo: «Los perros comerán a Jezabel en el territorio de Jezreel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “junto al baluarte de Jezreel”. El término hebreo aquí es difícil y puede referirse más específicamente al área fortificada exterior de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And also
  chosen_spanish: Y también
  alternatives_spanish:
  - También
  - Además
  lexicon: HALOT
  rationale: Conserva el valor aditivo de גַם y la coordinación con lo anterior; en español, “Y también” suena natural y mantiene el enlace narrativo.
- source_word: לְאִיזֶבֶל
  english_pob_choice: concerning Jezebel
  chosen_spanish: acerca de Jezabel
  alternatives_spanish:
  - sobre Jezabel
  - contra Jezabel
  - a Jezabel
  lexicon: HALOT
  rationale: El ל con דבר puede marcar tema o referencia del oráculo. “Acerca de” comunica mejor que una traducción direccional literal y evita forzar que ella sea la destinataria directa.
- source_word: דִּבֶּר יְהוָה
  english_pob_choice: the LORD spoke
  chosen_spanish: Yahvé habló
  alternatives_spanish:
  - Yahvé dijo
  - Yahvé declaró
  lexicon: HALOT
  rationale: “Habló” preserva el vínculo formal con לֵאמֹר y mantiene la estructura profética de discurso reportado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino como ‘Yahvé’, en vez de sustituirlo por ‘SEÑOR’.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'así:'
  - y dijo
  lexicon: HALOT
  rationale: Es la introducción estándar de cita directa; “diciendo” reproduce de forma transparente el enlace con la palabra profética siguiente.
- source_word: הַכְּלָבִים
  english_pob_choice: the dogs
  chosen_spanish: los perros
  alternatives_spanish:
  - perros
  lexicon: HALOT
  rationale: El artículo definido está presente en hebreo y se conserva naturalmente en español.
- source_word: יֹאכְלוּ
  english_pob_choice: will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - devorarán
  - se comerán
  lexicon: HALOT
  rationale: El valor básico es “comer”; “devorarán” intensifica más de lo que el hebreo exige. “Comerán” mantiene la dureza del juicio sin añadir matiz no documentado.
- source_word: אֶת אִיזֶבֶל
  english_pob_choice: Jezebel
  chosen_spanish: a Jezabel
  alternatives_spanish:
  - a Jezabel misma
  lexicon: HALOT
  rationale: El marcador de objeto directo no tiene equivalente separado en español; se integra con la sintaxis normal de la oración.
- source_word: בְּחֵל יִזְרְעֶאל
  english_pob_choice: in the territory of Jezreel
  chosen_spanish: en el territorio de Jezreel
  alternatives_spanish:
  - junto al baluarte de Jezreel
  - junto a la muralla de Jezreel
  - en la zona fortificada de Jezreel
  lexicon: HALOT
  rationale: חֵל es un término difícil. La opción principal conserva la lectura locativa amplia del POB en inglés y evita resolver indebidamente si se trata de un baluarte, una muralla o un área fortificada.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene la decisión confesional y textual del proyecto de representar el nombre propio divino con ‘Yahvé’, preservando la referencia al nombre del pacto en vez de una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of לְאִיזֶבֶל with דִּבֶּר
  english_pob_reading: concerning Jezebel
  chosen_spanish_reading: acerca de Jezabel
  alternative_spanish_readings:
  - a Jezabel
  - contra Jezabel
  rationale: La preposición no obliga a entender a Jezabel como destinataria directa; en contexto, la frase introduce el contenido del oráculo sobre su destino.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, Original-language primacy over translation tradition
- issue: Interpretation of בְּחֵל יִזְרְעֶאל
  english_pob_reading: in the territory of Jezreel
  chosen_spanish_reading: en el territorio de Jezreel
  alternative_spanish_readings:
  - junto al baluarte de Jezreel
  - en la zona fortificada de Jezreel
  rationale: Se preserva la ambigüedad lexical de חֵל sin fingir una precisión arquitectónica que el hebreo y el contexto no exigen con total certeza.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El pasaje se mantiene sustancialmente conforme al precedente auditado en inglés: se conserva la ambigüedad de חֵל con una nota alternativa, y se refleja la decisión consistente de renderizar el nombre divino como Yahvé. No se detectaron revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa “Yahvé” para יְהוָה de manera uniforme con la política del proyecto.
  - Se evita “SEÑOR” como sustituto del nombre divino.
  - “Acerca de Jezabel” preserva la relación temática del oráculo sin convertirlo en un discurso directo a ella.
  - “Comerán” mantiene el sentido básico de יֹאכְלוּ sin intensificarlo a “devorarán”.
  - La nota al pie conserva la alternativa arquitectónica/locativa sin cerrar indebidamente el sentido de חֵל.
