review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: los filisteos convocan a especialistas, preguntan qué hacer con el arca de Yahvé, y piden que se les indique el medio para enviarla a su lugar. También preserva correctamente «Yahvé». Sin embargo, la cláusula final «la enviaremos» convierte la consulta deliberativa/advisoria en un futuro más decidido que el hebreo y el POB inglés («we should send it» / «with what we should send it»).'
  spanish_quality_summary: El español es claro y digno, pero «Háganos saber» suena menos natural aquí que «Dígannos» o «Hágannos saber», y además introduce una discordancia de tratamiento porque el original se dirige a varios especialistas («ustedes»), no a un singular formal. La redacción mejora si se ajusta a plural y si se mantiene el matiz deliberativo en «debemos enviarla».
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» para יְהוָה, «arca», «sacerdotes», «adivinos». No hay conflicto doctrinal. La principal corrección es sintáctico-semántica en הוֹדִיעוּנוּ + בַּמֶּה נְשַׁלְּחֶנּוּ.'
  issues:
  - severity: medium
    issue: «Háganos saber» usa tratamiento singular/formal en lugar de plural
    rationale: El hebreo tiene imperativo masculino plural dirigido a «los sacerdotes y los adivinos». En español, lo más fiel es «dígannos» o «hágannos saber», no «háganos saber».
  - severity: medium
    issue: «la enviaremos» debilita el matiz consultivo de נְשַׁלְּחֶנּוּ
    rationale: Aquí no se afirma simplemente lo que harán, sino que preguntan con qué medio deberían enviarla. «debemos enviarla» o «hemos de enviarla» preserva mejor el carácter deliberativo.
  - severity: low
    issue: La nota [b] se vuelve innecesaria si se adopta una formulación más natural
    rationale: El inglés principal usa «Tell us» y reserva el matiz de «make known» para la decisión léxica, no como nota obligatoria. En español, una sola nota sobre «con qué / por qué medio» basta para preservar la alternativa significativa.
  revised_spanish_text: 'Entonces los filisteos llamaron a los sacerdotes y a los adivinos, diciendo: «¿Qué haremos con el arca de Yahvé? Dígannos con qué[a] debemos enviarla a su lugar».

    '
