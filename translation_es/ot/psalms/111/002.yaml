translation:
  language: es
  text: Grandes son las obras de Yahvé[b][a], buscadas por todos los que se deleitan en ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «examinadas».
    reason: lexical_alternative
  - marker: b
    text: La frase hebrea final es compacta y también puede entenderse más literalmente como «para todos sus deleites».
    reason: alternative_reading
lexical_decisions:
- source_word: גְּדֹלִים
  english_pob_choice: Great
  chosen_spanish: Grandes son
  alternatives_spanish:
  - Grandiosas son
  - Magníficas son
  lexicon: HALOT
  rationale: El adjetivo predicado al inicio conserva el énfasis poético del hebreo y la misma valoración de grandeza sin volverlo más explicativo de lo que permite el texto.
- source_word: מַעֲשֵׂי
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: HALOT
  rationale: «Obras» es natural en un contexto de alabanza y mantiene el sentido amplio de lo que Yahvé ha realizado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma española establecida en el proyecto, evitando la sustitución por un título.
- source_word: דְּרוּשִׁים
  english_pob_choice: sought out
  chosen_spanish: buscadas
  alternatives_spanish:
  - buscadas con diligencia
  - investigadas
  - examinadas
  lexicon: HALOT
  rationale: El participio pasivo de דרשׁ expresa que las obras divinas son objeto de búsqueda o examen atento. «Buscadas» preserva esa fuerza sin introducir un matiz demasiado técnico.
- source_word: לְכָל
  english_pob_choice: by all
  chosen_spanish: por todos
  alternatives_spanish:
  - de todos
  - para todos
  lexicon: HALOT
  rationale: 'La preposición con el participio se entiende mejor como agente: las obras son buscadas por quienes realizan la acción.'
- source_word: חֶפְצֵיהֶם
  english_pob_choice: who delight in them
  chosen_spanish: los que se deleitan en ellas
  alternatives_spanish:
  - quienes se complacen en ellas
  - los que tienen placer en ellas
  - según todos sus deleites
  lexicon: HALOT
  rationale: La frase hebrea es compacta y puede referirse a los que aman las obras de Yahvé. En español, «se deleitan en ellas» reproduce bien el campo semántico de חֵפֶץ y mantiene la fluidez. La alternativa más literal se conserva en nota.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama; se preserva el nombre propio de Dios en su forma española establecida, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Ambigüedad del sintagma final חֶפְצֵיהֶם
  english_pob_reading: the people who delight in the LORD's works are the ones who study them
  chosen_spanish_reading: los que se deleitan en las obras de Yahvé son quienes las buscan con atención
  alternative_spanish_readings:
  - las obras son buscadas por todos sus deleites
  - las obras son buscadas para todos sus placeres
  rationale: El hebreo permite leer que las obras son objeto de búsqueda por parte de quienes se complacen en ellas. La traducción principal conserva esa relación sin resolver en exceso la compactación del original; la nota recoge la alternativa más literal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió la opción inglesa desde «studied by» a «sought out by» para reflejar mejor דְּרוּשִׁים. En español, eso favorece «buscadas» frente a «estudiadas», mientras que el complemento final se mantiene con una formulación natural que conserva la ambigüedad del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se prefiere «obras» para מַעֲשֵׂי en contexto doxológico.
  - «Buscadas» conserva el valor pasivo del participio דְּרוּשִׁים sin convertirlo en explicación interpretativa.
  - La nota b preserva la alternativa literal del cierre hebreo, ya que el sintagma es compacto y admite más de una lectura.
