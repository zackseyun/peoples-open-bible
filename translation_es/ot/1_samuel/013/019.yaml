translation:
  language: es
  text: 'No se hallaba herrero en toda la tierra de Israel[a], porque los filisteos dijeron: «No sea que los hebreos fabriquen espadas o lanzas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que los hebreos no hagan una espada o una lanza». El hebreo usa sustantivos singulares con sentido genérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/חָרָשׁ
  english_pob_choice: blacksmith
  chosen_spanish: herrero
  alternatives_spanish:
  - fundidor
  - artesano del metal
  - metalúrgico
  lexicon: HALOT
  rationale: En este contexto militar, el término no designa a un artesano cualquiera, sino a un trabajador del metal capaz de fabricar y afilar armas. «Herrero» es el equivalente natural en español y conserva la fuerza concreta del pasaje.
- source_word: יִמָּצֵא
  english_pob_choice: could be found
  chosen_spanish: se hallaba
  alternatives_spanish:
  - podía hallarse
  - se encontraba
  lexicon: HALOT
  rationale: El nifal expresa la disponibilidad o presencia de alguien. En español, «no se hallaba» comunica con naturalidad la ausencia efectiva del herrero sin forzar una perífrasis modal.
- source_word: בְּכֹל אֶרֶץ יִשְׂרָאֵל
  english_pob_choice: in all the land of Israel
  chosen_spanish: en toda la tierra de Israel
  alternatives_spanish:
  - por toda la tierra de Israel
  - en todo el país de Israel
  lexicon: HALOT
  rationale: «Tierra» conserva mejor el sentido territorial y bíblico de ארץ que «país», y «en toda» refleja con claridad la amplitud geográfica del texto.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la ausencia de herreros. «Porque» es la forma más directa y natural en español.
- source_word: אמר
  english_pob_choice: said
  chosen_spanish: decían
  alternatives_spanish:
  - habían dicho
  - dijo
  lexicon: HALOT
  rationale: El plural hebreo se refiere a la política o razonamiento de los filisteos como grupo. En español, «decían» conserva ese valor colectivo y narrativo.
- source_word: פֶּן
  english_pob_choice: Otherwise
  chosen_spanish: No sea que
  alternatives_spanish:
  - para que no
  - no vaya a ser que
  - lest
  lexicon: HALOT
  rationale: פֶּן expresa prevención ante un resultado temido. «No sea que» preserva mejor ese matiz final y evita una paráfrasis excesiva.
- source_word: הָעִבְרִים
  english_pob_choice: the Hebrews
  chosen_spanish: los hebreos
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene «hebreos» porque el hebreo usa ese etnónimo específico; no se nivela a «israelitas», que sería menos exacto en este contexto de habla de los filisteos.
- source_word: יַעֲשׂוּ
  english_pob_choice: will make
  chosen_spanish: se hagan
  alternatives_spanish:
  - harán
  - fabriquen
  lexicon: HALOT
  rationale: El verbo aquí lleva la idea de fabricar o producir armas. En español, «se hagan» con «espadas o lanzas» resulta natural y conserva el sentido de producción armamentista.
- source_word: חֶרֶב
  english_pob_choice: swords
  chosen_spanish: espadas
  alternatives_spanish:
  - una espada
  - sables
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular genérico, el español suena más natural con plural para una categoría de armas. «Espadas» sigue la decisión POB de expresar el valor genérico en plural.
- source_word: חֲנִית
  english_pob_choice: spears
  chosen_spanish: lanzas
  alternatives_spanish:
  - una lanza
  - venablos
  lexicon: HALOT
  rationale: «Lanzas» es el equivalente común y claro en español para חֲנִית. Como en el inglés POB, el plural expresa bien el sentido genérico del hebreo.
translation_notes:
  revision_awareness: 'Se sigue de cerca el audit trail inglés: se mantiene el contexto militar, el etnónimo «hebreos», la prevención de פֶּן con una forma española natural y el singular genérico hebreo expresado idiomáticamente en plural. No hay revisiones aplicadas en el paquete fuente, así que se preserva el sentido estabilizado del versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando aparece el Tetragrámaton; en este versículo no aparece.
  - Se mantiene «hebreos» en vez de «israelitas» para respetar el valor etnolingüístico del texto fuente.
  - Se evita «SEÑOR» o lenguaje eclesiástico añadido, porque el versículo no lo requiere y el texto fuente es narrativo descriptivo.
  - «Herrero» es preferible a un término más técnico o general, porque comunica mejor en español contemporáneo sin perder precisión.
  - La elección de plural en «espadas» y «lanzas» sigue el criterio POB de singular genérico hebreo vertido de forma natural en español.
