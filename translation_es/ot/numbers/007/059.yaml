review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el inventario sacrificial y los nombres propios, y mantiene adecuadamente la fórmula narrativa final. Sin embargo, introduce una duplicación semántica no presente en hebreo al traducir וּ/לְ/זֶבַח הַשְּׁלָמִים como «el sacrificio de los sacrificios de paz». El hebreo expresa un solo sintagma técnico: «el sacrificio de paz / de comunión / de bienestar», no «el sacrificio de los sacrificios de paz».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero la secuencia «el sacrificio de los sacrificios de paz» suena torpe y poco natural en español bíblico. Además, falta en el texto la marca [c] correspondiente a la nota inglesa sobre «Esto es la ofrenda de», si se desea preservar esa alternativa auditada. El resto del inventario («dos reses», «cinco carneros», «cinco machos cabríos», «cinco corderos de un año») es legible y adecuado.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión «Gamliel» y «Pedahzur» concuerda con la transliteración documentada. «Reses» preserva bien el valor colectivo de בָּקָר frente a la opción tradicional «bueyes». Para הַשְּׁלָמִים, conviene ajustar a «sacrificio de paz» o «ofrendas de paz»; dado que זֶבַח ya aporta «sacrificio», «sacrificio de paz» es la opción más fiel y natural aquí.
  issues:
  - severity: high
    issue: Duplicación impropia en «el sacrificio de los sacrificios de paz»
    rationale: El hebreo tiene un solo término principal זֶבַח modificado por הַשְּׁלָמִים. La versión actual añade un segundo «sacrificios» que no corresponde al original y produce una frase antinatural.
  - severity: medium
    issue: La nota sobre la cláusula final auditada en inglés no está preservada
    rationale: La POB inglesa conserva una nota lexical sobre el hebreo literal «This is the offering of». En español puede mantenerse como nota para transparentar que «Esta fue la ofrenda de» refleja una acomodación narrativa, no una diferencia de contenido.
  revised_spanish_text: 'Y para el sacrificio de paz[a]: dos reses[b], cinco carneros, cinco machos cabríos y cinco corderos de un año. Esta fue[c] la ofrenda de Gamliel hijo de Pedahzur.'
  revised_footnotes:
  - marker: a
    text: También puede entenderse «ofrenda de paz», «ofrenda de bienestar» o «ofrenda de comunión».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «dos reses»; tradicionalmente, «dos bueyes».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «Esta es la ofrenda de»; el pasado en español refleja la enumeración narrativa.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el sintagma sacrificial para eliminar una duplicación no presente en el hebreo y producir un español natural y fiel: «sacrificio de paz». También se añade una nota [c] para conservar la transparencia auditada sobre la cláusula nominal hebrea final, paralela a la nota inglesa. El resto del inventario y los nombres propios se mantiene.'
