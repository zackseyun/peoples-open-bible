translation:
  language: es
  text: 'Maldito el que no mantiene vigentes[a] las palabras de esta ley al ponerlas por obra. Y todo el pueblo dirá: «Amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «no confirma» o «no establece» las palabras de esta ley. El verbo hebreo puede expresar la idea de mantener o validar la vigencia de la ley; aquí está vinculado con la obediencia práctica: «al ponerlas por obra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Maldicho
  - Bajo maldición
  lexicon: HALOT
  rationale: En una fórmula de maldición pactal, «maldito» comunica de forma directa y natural la condición declarada por el hebreo. «Bajo maldición» explicita el estado, pero suaviza el tono formular y ritual del original.
- source_word: אֲשֶׁר
  english_pob_choice: the one who
  chosen_spanish: el que
  alternatives_spanish:
  - quien
  - el que sea
  lexicon: HALOT
  rationale: La relativa hebrea introduce una persona de modo genérico y singular. «El que» conserva ese valor representativo con español sobrio y bíblicamente inteligible.
- source_word: לֹא יָקִים
  english_pob_choice: does not uphold
  chosen_spanish: no sostiene
  alternatives_spanish:
  - no confirma
  - no establece
  - no guarda
  lexicon: HALOT
  rationale: El hiphil de קום aquí puede significar sostener, mantener en pie o ratificar. «No sostiene» conserva la idea de mantener en vigor las palabras de la ley, sin confundirla con el infinitivo siguiente. «No guarda» sería posible, pero tendería a repetir la idea de obedecer ya expresada por «para hacerlas».
- source_word: דִּבְרֵי הַתּוֹרָה הַזֹּאת
  english_pob_choice: the words of this law
  chosen_spanish: las palabras de esta ley
  alternatives_spanish:
  - las palabras de esta instrucción
  - los dichos de esta ley
  lexicon: HALOT
  rationale: «Palabras» es la correspondencia natural de דִּבְרֵי, y «ley» refleja bien תּוֹרָה en el contexto pactal de Deuteronomio. «Instrucción» es lexicamente posible, pero aquí «ley» comunica mejor la fórmula de maldición pública.
- source_word: לַעֲשׂוֹת אוֹתָם
  english_pob_choice: by doing them
  chosen_spanish: para hacerlas
  alternatives_spanish:
  - al hacerlas
  - para cumplirlas
  - poniéndolas por obra
  lexicon: HALOT
  rationale: El infinitivo expresa la realización concreta de esas palabras. «Para hacerlas» conserva la relación estrecha entre sostener la ley y ejecutarla, como en el texto fuente. «Cumplirlas» sería comprensible, pero más interpretativo; «poniéndolas por obra» es más idiomático, aunque menos pegado a la estructura hebrea.
- source_word: וְאָמַר כָּל הָעָם
  english_pob_choice: And all the people shall say
  chosen_spanish: Y todo el pueblo dirá
  alternatives_spanish:
  - Entonces todo el pueblo dirá
  - Y responderá todo el pueblo
  lexicon: HALOT
  rationale: La forma verbal en esta secuencia litúrgica tiene fuerza prescriptiva/performativa. «Dirá» mantiene esa función ceremonial en español sin recurrir a una perífrasis más pesada. «Responderá» es posible, pero añade un matiz no explicitado en el hebreo.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: HALOT
  rationale: «Amén» es el equivalente litúrgico establecido en español y preserva la fórmula congregacional. Las paráfrasis pierden la continuidad cultual del término.
theological_decisions:
- issue: Fórmula de maldición pactal en אָרוּר ... הַתּוֹרָה הַזֹּאת
  english_pob_reading: The verse pronounces a covenant curse on the person who fails to uphold the law in actual obedience.
  chosen_spanish_reading: El versículo pronuncia una maldición pactal sobre la persona que no sostiene las palabras de esta ley al hacerlas.
  alternative_spanish_readings:
  - El versículo maldice a quien no confirma las palabras de esta ley al obedecerlas.
  - El versículo maldice a quien no guarda esta ley.
  rationale: 'La traducción conserva el doble movimiento del hebreo: sostener/ratificar la ley y realizarla en la práctica. «Para hacerlas» evita reducir el pasaje a mera adhesión verbal y también evita sustituir el matiz del verbo por un equivalente más general como «guardar».'
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor genérico de אֲשֶׁר
  english_pob_reading: the one who
  chosen_spanish_reading: el que
  alternative_spanish_readings:
  - quien
  - el que sea
  rationale: El hebreo funciona de modo genérico-singular. «El que» conserva ese alcance sin forzar un masculino exclusivo ni introducir una paráfrasis amplia.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La edición inglesa más reciente quedó sin cambios tras revisión de alta concordancia; esta propuesta sigue esa lectura estable, manteniendo la distinción entre el verbo de sostener/ratificar y el infinitivo de hacer.
  spanish_consistency_notes:
  - Se usa «ley» para תּוֹרָה, coherente con el contexto deuteronómico y con el registro jurídico-pactual.
  - Se mantiene «Amén» como fórmula litúrgica fija.
  - Se conserva una distinción entre «sostiene» y «para hacerlas» para reflejar el par verbal hebreo sin fusionarlo en un solo verbo castellano.
