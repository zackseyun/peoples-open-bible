translation:
  language: es
  text: Vuelve, alma mía, a tu reposo, porque Yahvé ha sido bueno[a] contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te ha tratado generosamente» o «ha obrado abundantemente contigo». El verbo hebreo puede significar tratar o recompensar, y aquí el contexto hace claro el sentido positivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבִי
  english_pob_choice: Return
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Da la vuelta
  - Vuelve atrás
  lexicon: HALOT
  rationale: El imperativo femenino singular de שוב pide una orden directa a la persona interna del salmista. «Vuelve» expresa bien el retorno a un estado previo de calma sin sonar forzado en español.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: alma mía
  alternatives_spanish:
  - mi alma
  - mi ser
  - mi vida
  lexicon: HALOT
  rationale: En este contexto poético y de autoexhortación, «alma mía» conserva el valor reflexivo e introspectivo de נפשׁ. La colocación vocativa en español suena natural y litúrgicamente reconocible.
- source_word: לִמְנוּחָיְכִי
  english_pob_choice: to your rest
  chosen_spanish: a tu reposo
  alternatives_spanish:
  - a tu descanso
  - a tu descanso apacible
  - a tu lugar de reposo
  lexicon: HALOT
  rationale: מנוחה señala reposo/quietud más que un simple descanso momentáneo. «Reposo» mantiene la idea de calma estable y conserva el tono poético; la forma con posesivo femenino concuerda con «alma».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en verdad
  lexicon: HALOT
  rationale: Aquí introduce la razón de la exhortación. «Porque» es la equivalencia más clara y natural en español, sin añadir explicaciones ajenas al hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Yavé
  lexicon: HALOT
  rationale: La tradición terminológica del proyecto para יְהוָה en español es «Yahvé». Mantiene el nombre divino y evita la sustitución por un título genérico.
- source_word: גָּמַל
  english_pob_choice: has dealt bountifully
  chosen_spanish: te ha tratado con abundancia
  alternatives_spanish:
  - te ha tratado generosamente
  - te ha colmado de bien
  - te ha recompensado
  lexicon: HALOT
  rationale: גמל admite la idea de tratar, corresponder o recompensar. En este contexto de agradecimiento, la lectura positiva es obligatoria; «te ha tratado con abundancia» conserva el matiz de obrar ampliamente en favor de la persona, aunque otras opciones también reflejan la benevolencia.
- source_word: עָלָיְכִי
  english_pob_choice: with you
  chosen_spanish: te
  alternatives_spanish:
  - contigo
  - sobre ti
  - a ti
  lexicon: HALOT
  rationale: 'Con גמל, la preposición sobre/contra puede funcionar idiomáticamente, pero en español la construcción más natural es verbalizar el beneficio directamente: «te ha tratado». Así se preserva el sentido relacional sin forzar una preposición literal.'
theological_decisions:
- issue: Rendering of the divine name YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Señor
  rationale: El texto hebreo usa el Tetragrámaton. Siguiendo la terminología base del proyecto en español, se conserva el nombre propio divino «Yahvé» y no una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Positive sense of גָּמַל in thanksgiving context
  english_pob_reading: has dealt bountifully
  chosen_spanish_reading: te ha tratado con abundancia
  alternative_spanish_readings:
  - te ha tratado generosamente
  - te ha colmado de bien
  - te ha recompensado
  rationale: Aunque גמל puede significar también retribuir o tratar, el contexto de gratitud exige un sentido positivo. La redacción española conserva esa tensión semántica sin convertirla en una paráfrasis interpretativa excesiva.
  doctrine_reference: Lexical theology of Psalm 116 thanksgiving language
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente: no se reportaron cambios necesarios y el consenso de verificación fue de alta concordancia. La redacción española mantiene esa estabilidad, trasladando el sentido del hebreo con equivalencia óptima y sin neutralizar el nombre divino.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar español del proyecto.
  - «alma mía» conserva el vocativo reflexivo del hebreo en un registro bíblico natural.
  - «reposo» traduce מנוחה con un matiz de quietud estable, coherente con el paralelismo poético.
  - La nota [a] preserva la alternativa semántica de גמל sin sobrecargar el versículo principal.
