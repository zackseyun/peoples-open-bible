  text: And the days drew near for Mattathias to die[a], and he said to his sons, “Now arrogance and reproach have grown strong[b], and it is a time of destruction and burning wrath.”
  footnotes:
  - marker: a
    text: Or 'have been established' for 'have grown strong'; the Greek verb can emphasize that arrogance and reproach have become firmly entrenched.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'furious wrath' literally combines two closely related Greek terms for anger, intensifying the sense. The text does not specify whose wrath is meant.
    reason: lexical_alternative
