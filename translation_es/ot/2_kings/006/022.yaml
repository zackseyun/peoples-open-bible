translation:
  language: es
  text: 'Pero él dijo[a]: «No los mates. ¿Acaso matarías a los que has tomado cautivos con tu espada y con tu arco? Pon pan y agua delante de ellos[b], para que coman y beban y vayan a su amo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Acaso matarías a los que has tomado cautivos con tu espada y con tu arco?». El hebreo formula una pregunta retórica que refuerza la prohibición de dar muerte a estos cautivos.'
    reason: alternative_reading
  - marker: b
    text: «Pan y agua» conserva las palabras concretas del hebreo; también puede funcionar como forma de referirse a provisiones básicas.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא תַכֶּה / מַכֶּה
  english_pob_choice: strike them down / would you strike down
  chosen_spanish: No los hieras / ¿Acaso herirías?
  alternatives_spanish:
  - No los mates / ¿Acaso los matarías?
  - No los golpees / ¿Acaso golpearías?
  lexicon: HALOT
  rationale: El hebreo נכה puede abarcar golpear o matar según el contexto. Aquí el sentido narrativo es prohibir la ejecución de los cautivos y mantener la fuerza física del verbo. En español, «herir» conserva la acción de golpear sin cerrar del todo el matiz de daño mortal, y la pregunta retórica queda bien marcada con «¿Acaso...?».
- source_word: הַאֲשֶׁר שָׁבִיתָ
  english_pob_choice: those whom you have taken captive
  chosen_spanish: a los que has tomado cautivos
  alternatives_spanish:
  - a los que has capturado
  - a tus cautivos
  lexicon: HALOT
  rationale: שבה expresa tomar cautivo en contexto militar. «Tomado cautivos» conserva esa referencia bélica y evita suavizarla con un verbo más general. No se usó un sustantivo como «cautivos» a secas porque el hebreo conserva la relación verbal con la pregunta retórica.
- source_word: בְּחַרְבְּךָ וּבְקַשְׁתְּךָ
  english_pob_choice: with your sword and with your bow
  chosen_spanish: con tu espada y con tu arco
  alternatives_spanish:
  - por tu espada y por tu arco
  - con tu espada y tu arco
  lexicon: HALOT
  rationale: Se mantiene la lista concreta de armas. «Con» refleja mejor el instrumental del hebreo que «por», y la repetición preserva el paralelismo. No se añadió explicación sobre quién los capturó, porque la pregunta retórica ya la contiene.
- source_word: שִׂים
  english_pob_choice: Set
  chosen_spanish: Pon
  alternatives_spanish:
  - Coloca
  - Mete
  lexicon: HALOT
  rationale: El imperativo קצר del hebreo pide una orden breve y natural. «Pon» es idiomático y fiel al tono directo del mandato.
- source_word: לֶחֶם וָמַיִם
  english_pob_choice: bread and water
  chosen_spanish: pan y agua
  alternatives_spanish:
  - alimento y agua
  - comida y agua
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente «pan y agua». En español, «pan y agua» conserva la concreción y la economía de la provisión; «alimento» o «comida» explicitarían demasiado.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - frente a ellos
  lexicon: HALOT
  rationale: La expresión reproduce el gesto de presentar la comida. «Delante de ellos» es la forma más clara y natural en español para esta fórmula de colocación.
- source_word: וְיֹאכְלוּ וְיִשְׁתּוּ וְיֵלְכוּ
  english_pob_choice: so that they may eat and drink and go
  chosen_spanish: para que coman y beban y se vayan
  alternatives_spanish:
  - y que coman y beban y se vayan
  - para que coman, beban y vayan
  lexicon: HALOT
  rationale: Se expresa el resultado deseado del mandato con «para que», que funciona bien en español y preserva la finalidad del hebreo. «Se vayan» suena más natural que un simple «vayan» y refleja el movimiento de salida.
- source_word: אֶל אֲדֹנֵיהֶם
  english_pob_choice: to their master
  chosen_spanish: a su señor
  alternatives_spanish:
  - a su amo
  - a su maestro
  lexicon: HALOT
  rationale: El hebreo usa el singular con sufijo plural, y la revisión inglesa también corrigió hacia singular. «Señor» refleja adecuadamente la relación de autoridad sin confundirla con el título divino en este contexto humano; «amo» sería más literal pero más duro en español contemporáneo.
theological_decisions:
- issue: Carácter de la pregunta retórica
  english_pob_reading: 'The question is rhetorical: the king should not kill these prisoners, especially since he did not capture them by his own military action.'
  chosen_spanish_reading: 'La pregunta es retórica: no corresponde matar a estos cautivos, especialmente porque no fueron tomados por la acción militar del rey.'
  alternative_spanish_readings:
  - Es una simple pregunta sobre si podría golpearlos.
  - Es solo una prohibición sin matiz interrogativo.
  rationale: El hebreo permite y favorece una pregunta retórica que refuerza la prohibición. Mantener ese valor en español conserva la lógica narrativa y el énfasis del consejero sin convertir el verso en una afirmación plana.
  doctrine_reference: Narrative force of direct speech; no doctrinal dispute.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: la pregunta se entiende como retórica, y el destino final se singulariza como «a su señor». También se evitó depender mecánicamente de la formulación inglesa previa, atendiendo directamente al hebreo: el mandato, el paralelismo de armas, y la provisión concreta de pan y agua.'
  spanish_consistency_notes:
  - Se preserva «Yahvé» solo cuando el texto lo exija; este versículo no lo contiene.
  - Se usó «señor» para אֲדֹנֵיהֶם en sentido humano, coherente con el contexto militar y con la revisión inglesa singular.
  - Se mantuvo el paralelismo hebreo con dos miembros instrumentales («con tu espada y con tu arco») y tres verbos consecutivos en la finalidad («coman y beban y se vayan»).
