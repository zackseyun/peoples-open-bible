translation:
  language: es
  text: No suban, porque Yahvé no está entre ustedes, para que no sean abatidos[a] ante sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «sean golpeados» o «sean derrotados».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / תַּעֲלוּ
  english_pob_choice: Do not go up
  chosen_spanish: No suban
  alternatives_spanish:
  - No vayan
  - No asciendan
  - No suban a la batalla
  lexicon: HALOT
  rationale: El hebreo usa una prohibición con עלה en plural. «Suban» conserva la imagen idiomática de ascenso/marcha desde el desierto hacia la tierra, mientras sigue siendo natural en español. Evito explicitar «a la batalla» porque el contexto ya lo sugiere, pero no está dicho en esta cláusula.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo contiene explícitamente el Nombre divino. Se mantiene «Yahvé» conforme al criterio del proyecto, sin sustituirlo por un título como «el SEÑOR».
- source_word: בְּקִרְבְּכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - en su medio
  - con ustedes
  lexicon: HALOT
  rationale: La expresión hebrea indica presencia en el ámbito comunitario o en medio del grupo. «Entre ustedes» comunica bien esa cercanía colectiva en español moderno; «en medio de ustedes» queda como alternativa más literal si se prefiere enfatizar la espacialidad.
- source_word: תִּנָּגְפוּ
  english_pob_choice: you may not be struck down
  chosen_spanish: sean derribados
  alternatives_spanish:
  - sean derrotados
  - sean golpeados
  - caigan
  lexicon: HALOT
  rationale: El nifal de נגף puede referirse a ser herido, abatido o derrotado en contexto bélico. «Sean derribados» preserva la pasividad y la fuerza de caída/abatimiento sin sonar demasiado técnico. Dado el paralelismo con «delante de sus enemigos», la connotación militar queda clara.
- source_word: לִפְנֵי אֹיְבֵיכֶם
  english_pob_choice: before your enemies
  chosen_spanish: delante de sus enemigos
  alternatives_spanish:
  - frente a sus enemigos
  - ante sus enemigos
  - en presencia de sus enemigos
  lexicon: HALOT
  rationale: «Delante de» reproduce adecuadamente el valor preposicional de לִפְנֵי en un contexto de combate. «Sus enemigos» mantiene el referente plural y la relación comunitaria de la segunda persona.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el Nombre propio de Dios según la pauta del proyecto, en lugar de reemplazarlo por una designación honorífica. Esto mantiene la identidad del sujeto de la advertencia y la transparencia frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de cercanía divina en בְּקִרְבְּכֶם
  english_pob_reading: the LORD is not among you
  chosen_spanish_reading: Yahvé no está entre ustedes
  alternative_spanish_readings:
  - Yahvé no está en medio de ustedes
  - Yahvé no está con ustedes
  rationale: «Entre ustedes» conserva el sentido de presencia comunitaria sin intensificarlo más allá del hebreo. «Con ustedes» sería más general y menos espacial; «en medio de ustedes» es más literal pero un poco más pesado en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #6'
- issue: Valor consecutivo/resultado de וְלֹא ... תִּנָּגְפוּ
  english_pob_reading: so that you may not be struck down
  chosen_spanish_reading: para que no sean derribados
  alternative_spanish_readings:
  - y no sean derribados
  - de modo que no sean derribados
  - para no ser derribados
  rationale: La secuencia hebrea expresa la consecuencia que debe evitarse. «Para que no» reproduce con transparencia la relación de propósito/resultado y evita una paraphrasis más interpretativa. Se mantiene la pasiva para respetar la forma verbal hebrea.
  doctrine_reference: 'Revision awareness: replacement of ''lest'' with a transparent consequence clause'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió una cláusula de consecuencia transparente («so that ... not») en lugar de una equivalencia más idiomática pero menos explícita. En español se reflejó esa decisión con «para que no», manteniendo el tono de advertencia y la pasiva del hebreo. También se preservó el Nombre divino «Yahvé» y la imagen espacial de presencia comunitaria con una solución natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, no «SEÑOR».
  - «Entre ustedes» expresa la presencia relacional/comunitaria del hebreo sin añadir matices doctrinales extra.
  - La pasiva «sean derribados» conserva el carácter de sufrimiento/derrota de תִּנָּגְפוּ en contexto bélico.
  - «Sus enemigos» respeta la segunda persona plural y el tono colectivo de la advertencia.
