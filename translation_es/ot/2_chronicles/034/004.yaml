  to: Demolieron delante de él los altares de los Baales, y cortó los altares de incienso[a] que estaban encima de ellos. Quebró y desmenuzó los Aserim[b], las imágenes talladas y las imágenes fundidas, y los esparció sobre las sepulturas de los que les habían sacrificado.
  rationale: 'Se corrige el anclaje de la nota [a] para que corresponda al término hebreo incierto הַחַמָּנִים, se mantiene [b] con «Aserim» según la decisión POB, y se reestructura levemente la segunda oración para que el español refleje mejor la secuencia hebrea: quebrar/desmenuzar los objetos y luego esparcir sus restos sobre las sepulturas. También se aligera la redacción eliminando formulaciones más pesadas sin perder contenido.'
