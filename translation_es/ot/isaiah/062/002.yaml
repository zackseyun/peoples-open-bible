revisions:
- from: Las naciones verán tu justicia[a], y todos los reyes tu gloria[b]; y serás llamado[a] con un nombre nuevo, que la boca de Yahvé designará.
  to: Las naciones verán tu rectitud[a], y todos los reyes tu gloria; y serás llamada por un nombre nuevo[b], que la boca de Yahvé designará.
  rationale: Se corrigen los marcadores de notas para que sean únicos y conformes a las instrucciones; se restituye en nota la observación importante del expediente inglés sobre el sufijo de 'lo designará'; se mejora la naturalidad y precisión de la construcción de nombramiento con 'serás llamada por un nombre nuevo'; y se ajusta צִדְקֵךְ a 'rectitud' para reflejar mejor el valor de 'righteousness' manteniendo 'vindicación' y 'justicia' como alternativas legítimas.
