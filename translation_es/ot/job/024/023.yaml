translation:
  language: es
  text: Él les da seguridad[a], y son sostenidos[b]; sus ojos están puestos en sus caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene singular («a él») y también singular en la segunda mitad («es sostenido»); el español lo vierte en plural colectivo («les», «son sostenidos») porque el final del versículo habla de «sus caminos».
    reason: alternative_reading
  - marker: b
    text: 'O, más literalmente: «Le da seguridad, y es sostenido; sus ojos están puestos en sus caminos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתֶּן
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - otorga
  - concede
  lexicon: HALOT
  rationale: El qal imperfecto de נתן expresa la acción de dar o conceder. En español, «da» mantiene la sencillez poética y la fuerza directa del hebreo sin añadir matices no evidentes.
- source_word: לוֹ
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - le
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular («a él»), el contexto inmediato termina con «sus caminos», lo que favorece una lectura colectiva. En español, «les» mantiene esa colectividad sin borrar la tensión del singular hebreo, que queda reflejada en la nota.
- source_word: לָבֶטַח
  english_pob_choice: security
  chosen_spanish: seguridad
  alternatives_spanish:
  - seguro
  - salvaguarda
  lexicon: HALOT
  rationale: בֶטַח como sustantivo indica seguridad o seguridad confiada. «Seguridad» es la equivalencia más natural en español con «da» y preserva el valor de estado seguro, no solo de confianza interior.
- source_word: וְיִשָּׁעֵן
  english_pob_choice: they are supported
  chosen_spanish: son sostenidos
  alternatives_spanish:
  - se apoyan
  - reposan seguros
  - son apuntalados
  lexicon: HALOT
  rationale: El nifal de שׁען puede significar apoyarse o ser sostenido. En este contexto, tras «les da seguridad», el resultado pasivo «son sostenidos» comunica bien el estado otorgado y conserva el paralelismo poético.
- source_word: וְעֵינֵיהוּ
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - sus ojos vigilantes
  - su mirada
  lexicon: HALOT
  rationale: La construcción «ojos de él» se vuelve naturalmente «sus ojos» en español. Se mantiene el plural porque el hebreo usa un plural constructo, aun cuando el referente es singular.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: La preposición expresa atención dirigida o vigilancia hacia algo. «Sobre» es la equivalencia más natural en español bíblico contemporáneo para esa orientación observante.
- source_word: דַּרְכֵיהֶם
  english_pob_choice: their ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - su conducta
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser camino literal o conducta. «Caminos» preserva la imagen hebrea y deja audible el sentido ético, sin forzar una explicitación interpretativa.
theological_decisions:
- issue: Cambio entre singular y plural en la primera mitad del versículo
  english_pob_reading: Render the first half collectively ('them ... they') while retaining the final singular possessor ('his eyes')
  chosen_spanish_reading: Mantener una primera mitad colectiva («les ... son sostenidos») y conservar el posesivo singular implícito en «sus ojos»
  alternative_spanish_readings:
  - «Le da seguridad, y es sostenido; sus ojos están sobre su camino»
  - «Les da seguridad, y son sostenidos; sus ojos están sobre sus caminos»
  rationale: El hebreo combina formas singulares y plurales. La lectura colectiva en la primera mitad sigue la señal del final plural «sus caminos», pero se preserva el singular del vigilante en «sus ojos», sin resolver artificialmente la tensión sintáctica del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó en alta concordancia con el control cruzado, así que la redacción española sigue fielmente el equilibrio del audit trail inglés y del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se conserva el tono poético y la tensión singular/plural del hebreo, evitando normalizarla en exceso.
  - «Caminos» se usa en sentido metafórico de conducta, coherente con el hebreo דרך en este contexto.
