lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - De ahí que
  - Así pues
  lexicon: LSJ
  rationale: La partícula introduce una inferencia respecto del contexto previo. «Por tanto» conserva la relación lógica con un tono natural y digno en español.
- source_word: καὶ αὐτὸς
  english_pob_choice: when he himself was about to die
  chosen_spanish: estando él mismo
  alternatives_spanish:
  - él mismo
  - y él mismo
  - también él
  lexicon: LSJ
  rationale: Se conserva el énfasis de αὐτός con «él mismo». El valor de καὶ, unido al contexto, se integra de forma natural en la cláusula española sin añadir un «también» torpe o redundante.
- source_word: ἀποθνήσκειν μέλλων
  english_pob_choice: was about to die
  chosen_spanish: a punto de morir
  alternatives_spanish:
  - estaba por morir
  - estando para morir
  - iba a morir
  lexicon: LSJ
  rationale: μέλλων con infinitivo expresa inminencia. «A punto de morir» reproduce esa cercanía temporal de manera idiomática y fiel, sin introducir matiz fatalista.
- source_word: ἔφη
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  - exclamó
  - habló
  lexicon: LSJ
  rationale: Verbo narrativo estándar. «Dijo» es la opción más directa y menos interpretativa.
translation_notes:
  revision_awareness: El texto griego es breve y de alta concordancia con el control auditado. No se requirieron revisiones sustantivas; la única decisión relevante fue cómo expresar la inferencia de ὅθεν y la inminencia de μέλλων + infinitivo en español natural.
  spanish_consistency_notes:
  - Se mantuvo el trato de la referencia divina y cristológica fuera de esta unidad, sin necesidad de terminología especializada.
  - «A punto de morir» conserva la inminencia sin sobretraducir el griego.
  - La puntuación sigue el flujo narrativo español con dos comas que corresponden a los elementos circunstanciales del original.
