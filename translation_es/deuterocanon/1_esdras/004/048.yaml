revisions:
- from: Y escribió cartas a todos los gobernadores en Celesiria[a] y Fenicia, y a los que estaban en el Líbano, para que llevaran madera de cedro[b] desde el Líbano a Jerusalén, y así edificaran la ciudad con él.
  to: Y escribió cartas a todos los gobernadores[a] en Celesiria[b] y Fenicia, y a los del Líbano, para que llevaran madera de cedro[c] desde el Líbano hasta Jerusalén, para que edificaran la ciudad con él.
  rationale: Se ajustó la cláusula de propósito para reflejar mejor ὅπως, eliminando «y así», que sonaba consecutivo. También se mejoró la naturalidad de «los del Líbano» y se añadió la nota léxica para «gobernadores» en línea con el audit trail inglés.
