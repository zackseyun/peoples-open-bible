review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea: acción formal del sacerdote (''examinará''), hallazgo introducido por וְהִנֵּה, extensión de la afección en la piel, declaración forense de impureza y cláusula identificativa final. Sin embargo, ''y he aquí, si'' suena forzado en español cuando el hebreo aquí funciona como fórmula procedimental; conviene conservar ''he aquí'' pero reordenarlo para mejor legibilidad. El resto refleja fielmente el sentido fuente y el rastro de auditoría inglés, incluyendo la opción final ''lepra'' para צָרַעַת con nota aclaratoria.'
  spanish_quality_summary: La redacción es en general clara y digna, pero 'Y el sacerdote lo examinará, y he aquí, si...' resulta poco natural en español bíblico moderno. 'Y el sacerdote lo examinará; y si ve[a] que la erupción escamosa se ha extendido en la piel...' fluye mejor, mantiene el valor de inspección y ubica la nota en el término más potencialmente equívoco. También 'en la piel' suena más idiomático que 'sobre la piel' en este contexto clínico-legal.
  glossary_alignment: No hay conflicto con la terminología de proyecto principal. 'Sacerdote', 'impuro' y 'lepra' con nota están alineados con el expediente inglés final. La nota debe seguir explicando que צָרַעַת es más amplio que la lepra moderna. No hay términos como Yahvé/Mesías implicados aquí.
  issues:
  - severity: medium
    issue: La secuencia 'y he aquí, si' es torpe en español.
    rationale: Aunque וְהִנֵּה está presente en el hebreo y el inglés revisado añadió 'behold', una reproducción demasiado literal produce español poco natural. Conviene integrarlo en una formulación procedimental más idiomática sin perder el matiz de observación diagnóstica.
  - severity: low
    issue: '''sobre la piel'' es menos natural que ''en la piel'' en este contexto.'
    rationale: Ambas opciones son posibles, pero en español médico/general 'extenderse en la piel' suena más idiomático y sigue reflejando בָּעוֹר adecuadamente.
  - severity: low
    issue: La nota está anclada en 'lepra', pero el texto puede beneficiarse de una frase más natural antes de ese punto.
    rationale: No es un error de contenido, pero al revisar la sintaxis conviene mantener el anclaje exactamente en el término potencialmente engañoso para preservar la aclaración léxica.
  revised_spanish_text: Y el sacerdote lo examinará; y si ve que la erupción escamosa se ha extendido en la piel, el sacerdote lo declarará impuro; es lepra[a].
