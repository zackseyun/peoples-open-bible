translation:
  text: and let us establish for them to walk according to their own laws[a], as before; for it was because of their laws, which we set aside[b], that they became angry and did all these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'walk according to their own customs/laws.' The Greek literally says 'go/walk by their laws,' an idiom for ordering life according to them.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'abolished' more literally means 'scattered' or 'disrupted'; here it refers to suppressing or dismantling their legal practices.
    reason: lexical_alternative
lexical_decisions:
- source_word: στήσωμεν
  chosen: let us establish
  alternatives:
  - let us confirm
  - let us set up
  - let us decree
  lexicon: LSJ
  rationale: 'The aorist subjunctive in a hortatory construction calls for a proposal: ''let us establish/confirm.'' ''Establish'' fits the sense of setting a policy in place for them.'
- source_word: τοῦ πορεύεσθαι
  chosen: that they may live by
  alternatives:
  - to walk in
  - to conduct themselves according to
  - to go by
  lexicon: LSJ
  rationale: Literally 'to go/walk,' but with laws as the object it idiomatically refers to ordering one's life according to them. 'Live by' gives clear modern English while preserving the ethical sense.
- source_word: τοῖς νομίμοις αὐτῶν
  chosen: their own laws
  alternatives:
  - their customs
  - their ancestral laws
  - their ordinances
  lexicon: LSJ
  rationale: νομίμοις can denote customary laws or established usages. In this Maccabean context the issue is Jewish legal-religious practice, so 'laws' is the clearest main rendering; 'customs' is possible but weaker.
- source_word: ὡς τὸ πρότερον
  chosen: as before
  alternatives:
  - as formerly
  - as previously
  lexicon: LSJ
  rationale: A straightforward temporal comparison restoring prior conditions.
- source_word: χάριν
  chosen: because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: LSJ
  rationale: Here it introduces cause, not benefit. 'Because of' is the most natural English causal rendering in context.
- source_word: διεσκεδάσαμεν
  chosen: we abolished
  alternatives:
  - we scattered
  - we disrupted
  - we did away with
  lexicon: LSJ
  rationale: The verb literally has the sense of scattering/dispersing, but in context it refers to dismantling or suppressing their legal practices. 'We abolished' captures the practical force in idiomatic English.
- source_word: ὠργίσθησαν
  chosen: they became angry
  alternatives:
  - they were enraged
  - they grew wrathful
  lexicon: LSJ
  rationale: Aorist passive/deponent of becoming angry. 'Became angry' is accurate and readable without overstating intensity.
- source_word: ἐποίησαν ταῦτα πάντα
  chosen: did all these things
  alternatives:
  - did all this
  - committed all these acts
  lexicon: LSJ
  rationale: A broad summary phrase referring back to the actions under discussion; 'did all these things' preserves the inclusive force of πάντα.
