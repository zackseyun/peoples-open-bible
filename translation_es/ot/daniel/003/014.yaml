review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del arameo y conserva correctamente las dos acciones distintas: servir al dios del rey y postrarse ante la imagen. También mantiene bien «mi dios» en singular y la ambigüedad de הַצְדָּא mediante una nota. Sin embargo, hay un problema gramatical importante: el discurso directo interpela a tres personas, pero luego usa «sirven» en tercera persona en vez de segunda persona plural. El original tiene 2mp, y el inglés POB usa «you do not serve ... do not bow down».'
  spanish_quality_summary: 'El texto es claro y digno, pero «dijo[a] a ellos» suena menos natural en español que «les dijo». Además, la combinación de vocativo con «sirven / se postran» crea una discordancia de persona poco natural. Para español bíblico neutro y legible, conviene usar segunda persona plural con voseo reverencial neutralizado mediante «ustedes»: «no sirven ... no se postran» puede leerse como tercera persona; mejor «no sirven ... no se postran ustedes» o, más natural, reformular con «que ustedes no sirven...».'
  glossary_alignment: No hay conflicto con los términos globales del proyecto. «mi dios», «imagen de oro», «sirven» y «se postran» están bien alineados con las decisiones léxicas y teológicas del POB. La nota léxica sobre הַצְדָּא debe permanecer, pero su texto también debe ajustarse a la segunda persona plural.
  issues:
  - severity: high
    issue: Discordancia de persona verbal en el discurso directo
    rationale: El arameo usa sufijos/participios de segunda persona plural dirigidos a Sadrac, Mesac y Abed-nego. El español «que no sirven... y no se postran» suena a tercera persona, no a interpelación directa fiel al original.
  - severity: medium
    issue: 'Orden y construcción poco natural: «dijo[a] a ellos»'
    rationale: Aunque comprensible, en español natural y digno «les dijo» expresa mejor לְהוֹן sin rigidez innecesaria.
  - severity: low
    issue: La nota al pie reproduce la misma discordancia de persona
    rationale: La alternativa «¿Es deliberado ... que no sirven...?» debe ajustarse también a «que ustedes no sirven...» para coherencia gramatical.
  revised_spanish_text: 'Nabucodonosor respondió y les dijo: «¿Es verdad[a], Sadrac, Mesac y Abed-nego, que ustedes no sirven a mi dios y no se postran ante la imagen de oro que he levantado?»'
  revised_footnotes:
  - marker: a
    text: 'La expresión aramea הַצְדָּא también puede significar «deliberadamente» o «a propósito»: «¿Es deliberado, Sadrac, Mesac y Abed-nego, que ustedes no sirven a mi dios…?»'
    reason: lexical_alternative
  revision_rationale: Se corrigió la persona gramatical para reflejar la segunda persona plural del original y del inglés POB. También se mejoró la naturalidad española con «les dijo» y se ancló la nota al pie directamente en «¿Es verdad[a]» para que corresponda con la palabra explicada.
