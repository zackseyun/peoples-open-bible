translation:
  language: es
  text: 'Entonces Manoa dijo: «Ahora, que tus palabras se cumplan[a]. ¿Cuál será la norma[b] para el niño y para su obra[c]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando tus palabras se cumplan». La cláusula hebrea puede leerse como deseo («que tus palabras se cumplan») o como referencia temporal («cuando tus palabras se cumplan»).'
    reason: alternative_reading
  - marker: b
    text: «La norma para el niño» también puede traducirse «la regla», «la ordenanza» o «la manera de vida» para el niño.
    reason: lexical_alternative
  - marker: c
    text: 'O: «y lo que ha de hacer». El hebreo dice literalmente «y su obra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» conserva bien la progresión narrativa en español sin sonar forzado.
- source_word: מָנוֹחַ
  english_pob_choice: Manoah
  chosen_spanish: Manoa
  alternatives_spanish:
  - Manoaj
  - Manoah
  lexicon: Convención onomástica
  rationale: Se translitera el nombre propio de forma comprensible en español; «Manoa» evita una grafía demasiado inglesa y mantiene la referencia al personaje.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - En este momento
  lexicon: HALOT
  rationale: Aquí expresa inmediatez y respuesta; «Ahora» es natural y fiel al valor temporal-pragmático.
- source_word: יָבֹא דְבָרֶיךָ
  english_pob_choice: let your words come true
  chosen_spanish: que tus palabras se cumplan
  alternatives_spanish:
  - cuando tus palabras se cumplan
  - que tus palabras lleguen a cumplirse
  lexicon: HALOT
  rationale: La imagen hebrea de que las palabras «vengan» se expresa idiomáticamente en español con «cumplirse», manteniendo la fuerza optativa del hebreo y la posibilidad temporal del contexto.
- source_word: מִשְׁפַּט
  english_pob_choice: the rule
  chosen_spanish: la norma
  alternatives_spanish:
  - la regla
  - el precepto
  - la ordenanza
  lexicon: HALOT
  rationale: En este contexto pide la prescripción que debe regir la vida del niño; «norma» comunica bien ese valor regulativo sin sobrecargarlo jurídicamente.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el hijo
  - el joven
  lexicon: HALOT
  rationale: Se conserva el referente masculino del hebreo y un registro natural en español; «muchacho» funciona bien para el hijo prometido aún no nacido.
- source_word: וּמַעֲשֵׂהוּ
  english_pob_choice: and his work
  chosen_spanish: y para su obra
  alternatives_spanish:
  - y para lo que ha de hacer
  - y para su conducta
  - y para su tarea
  lexicon: HALOT
  rationale: El sustantivo puede abarcar actividad, obra o quehacer; «obra» conserva brevedad y amplitud semántica, y la preposición repetida refleja el paralelo del hebreo y la revisión inglesa.
theological_decisions:
- issue: Valor de מִשְׁפַּט y de la consulta sobre el niño
  english_pob_reading: the rule for the boy and for his work
  chosen_spanish_reading: la norma para el muchacho y para su obra
  alternative_spanish_readings:
  - la ordenanza para el muchacho y para su obra
  - la manera de vida del muchacho y de su obra
  rationale: No se convierte el término en un concepto eclesiástico posterior; se mantiene el sentido de prescripción/criterio de vida que Manoa pide para el hijo prometido.
  doctrine_reference: Jueces 13:12; uso contextual de מִשְׁפַּט
- issue: Ambigüedad de יָבֹא דְבָרֶיךָ
  english_pob_reading: let your words come true / when your words come true
  chosen_spanish_reading: que tus palabras se cumplan
  alternative_spanish_readings:
  - cuando tus palabras se cumplan
  - que tus palabras lleguen a cumplirse
  rationale: Se conserva la tensión entre petición y expectativa temporal sin resolverla de forma dogmática; el español permite ambas lecturas implícitas.
  doctrine_reference: Jueces 13:12; nota textual/semántica del hebreo
- issue: Relación de ‘su obra’ con vocación o conducta
  english_pob_reading: and his work / or what he is to do
  chosen_spanish_reading: y para su obra
  alternative_spanish_readings:
  - y para lo que ha de hacer
  - y para su tarea
  rationale: No se estrecha indebidamente a una vocación técnica ni se moraliza; se deja la amplitud del hebreo para que el contexto determine el alcance.
  doctrine_reference: Jueces 13:12; מַעֲשֶׂה
translation_notes:
  revision_awareness: El texto inglés revisado añadió explícitamente la segunda preposición («for his work»). El español refleja ese paralelismo con «para su obra», manteniendo la estructura bipartita del hebreo y la revisión auditada.
  spanish_consistency_notes:
  - Se usa «Dios» solo cuando el hebreo lo exige; aquí no aparece.
  - Se conserva un estilo bíblico moderno y claro, sin introducir vocabulario litúrgico posterior.
  - La puntuación mantiene el habla directa con comillas latinas, apropiadas para edición en español.
  - Se prefirió «cumplan» frente a una paráfrasis más amplia para preservar la ambigüedad del hebreo.
