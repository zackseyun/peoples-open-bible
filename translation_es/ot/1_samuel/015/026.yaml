translation:
  language: es
  text: 'Entonces Samuel dijo a Saúl: «No volveré contigo, porque has rechazado la palabra de Yahvé, y Yahvé te ha rechazado de ser rey sobre Israel».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And Samuel said
  chosen_spanish: Entonces Samuel dijo
  alternatives_spanish:
  - Y Samuel dijo
  - Y Samuel respondió
  lexicon: HALOT
  rationale: El waw-consecutivo avanza la narración; en español, “Entonces” conserva el progreso narrativo de forma natural y digna. “Dijo” mantiene el valor básico de אמר sin añadir matices no presentes.
- source_word: לֹא אָשׁוּב
  english_pob_choice: I will not return
  chosen_spanish: No volveré
  alternatives_spanish:
  - No regresaré
  - No volveré a ir
  lexicon: HALOT
  rationale: שׁוּב expresa volver/retornar. “Volveré” es directo y natural en español, y encaja con la negativa de Samuel a acompañar a Saúl.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - con él
  lexicon: HALOT
  rationale: La preposición comitativa se expresa de modo natural con “contigo”. Conserva la relación directa entre Samuel y Saúl en el discurso.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la negativa. “Porque” es la equivalencia más clara y común en español contemporáneo.
- source_word: מָאַסְתָּה
  english_pob_choice: you have rejected
  chosen_spanish: has rechazado
  alternatives_spanish:
  - has desechado
  - has despreciado
  lexicon: HALOT
  rationale: מאס denota rechazo con fuerza valorativa. “Has rechazado” preserva el sentido judicial/covenantal y mantiene la repetición verbal con la siguiente cláusula.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra de Yahweh
  - el mandato de Yahvé
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: דָּבָר puede abarcar palabra, asunto o mensaje; aquí se refiere a la palabra comunicada por Yahvé. “Palabra de Yahvé” conserva la formulación bíblica y la referencia al habla divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino como “Yahvé”, evitando la sustitución por un título.'
- source_word: וַיִּמְאָסְךָ
  english_pob_choice: and Yahweh has rejected you
  chosen_spanish: y Yahvé te ha rechazado
  alternatives_spanish:
  - y Yahvé te ha desechado
  - y Yahvé te ha despreciado
  lexicon: HALOT
  rationale: Se conserva la repetición deliberada de la raíz מאס. “Ha rechazado” reproduce el paralelismo entre el rechazo de la palabra divina y el rechazo de Saúl.
- source_word: מִהְיוֹת
  english_pob_choice: from being
  chosen_spanish: para que no seas
  alternatives_spanish:
  - de ser
  - para no ser
  lexicon: HALOT
  rationale: El infinitivo con מִן expresa exclusión de un estado o función. En español, “para que no seas” hace explícita la resultado-exclusión de manera natural y fiel; “de ser” sería más literal pero menos idiomático.
- source_word: מֶלֶךְ עַל יִשְׂרָאֵל
  english_pob_choice: king over Israel
  chosen_spanish: rey sobre Israel
  alternatives_spanish:
  - rey de Israel
  - rey en Israel
  lexicon: HALOT
  rationale: עַל conserva la idea de gobierno “sobre”. “Rey sobre Israel” preserva el valor relacional y de dominio del hebreo mejor que “rey de Israel”.
theological_decisions:
- issue: Referencia del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el nombre propio del pacto, no un título genérico. La transliteración “Yahvé” mantiene el nombre divino visible en la traducción española, en continuidad con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Repetición de la raíz מאס para Saúl y para Yahvé
  english_pob_reading: Use 'rejected' in both clauses
  chosen_spanish_reading: “rechazado” en ambas cláusulas
  alternative_spanish_readings:
  - usar “despreciado” en una cláusula y “rechazado” en la otra
  - usar “desechado” en una cláusula y “rechazado” en la otra
  rationale: 'El hebreo repite el mismo verbo para subrayar la reciprocidad: Saúl rechazó la palabra de Yahvé, y Yahvé rechazó a Saúl. Mantener “rechazado” en ambas cláusulas preserva esa tensión retórica y teológica.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms, or documented exception)'
translation_notes:
  revision_awareness: El veredicto de revisión más reciente indica alta concordancia y ninguna modificación pendiente; el borrador español sigue de cerca el análisis léxico y la decisión teológica ya auditados, sin introducir cambios no sustentados.
  spanish_consistency_notes:
  - Se preserva la repetición de la raíz conceptual de “rechazar” para reflejar el paralelismo del hebreo.
  - Se usa “Yahvé” de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - La cláusula final se formula como exclusión de estado/función con “para que no seas rey sobre Israel”, manteniendo naturalidad en español sin perder el sentido del infinitivo hebreo.
