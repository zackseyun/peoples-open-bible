translation:
  language: es
  text: Vino nuevo[a], un amigo nuevo; cuando sea viejo[b], quizá podrás beberlo con agrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto hebreo de este versículo es proverbial, pero la última cláusula es textualmente difícil. El paralelo griego incluido en el paquete corresponde a una lectura sustancialmente distinta ('Sabe que caminas en medio de trampas...'), así que esta traducción sigue el testimonio hebreo conservado y no la forma griega divergente.
    reason: textual_variant
  - marker: b
    text: 'O, más literalmente: ''Vino nuevo, un amigo nuevo; y cuando es viejo, después quizá lo beberás''. El sentido es que una amistad, como el vino, se disfruta mejor cuando ha madurado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַיִן חָדָשׁ
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - vino fresco
  lexicon: HALOT
  rationale: יַיִן significa 'vino' y חָדָשׁ significa 'nuevo'. 'Vino nuevo' es la equivalencia natural en español y conserva el paralelismo con 'amigo nuevo'.
- source_word: אוֹהֵב חָדָשׁ
  english_pob_choice: a new friend
  chosen_spanish: un amigo nuevo
  alternatives_spanish:
  - un nuevo amigo
  - un amigo recién adquirido
  lexicon: HALOT
  rationale: La forma hebrea transmitida es elíptica y algo dura en español si se vierte de manera literal. 'Un amigo nuevo' conserva la brevedad proverbial y el paralelismo nominal con 'vino nuevo'.
- source_word: וְיָשָׁן
  english_pob_choice: when it grows old
  chosen_spanish: cuando envejece
  alternatives_spanish:
  - y cuando es viejo
  - cuando se hace viejo
  lexicon: HALOT
  rationale: וְיָשָׁן expresa la idea de volverse viejo. 'Cuando envejece' comunica de manera natural la progresión temporal implícita en el proverbio.
- source_word: אַחַר אוּלַי
  english_pob_choice: you may
  chosen_spanish: podrás
  alternatives_spanish:
  - después quizá
  - entonces quizá podrás
  lexicon: HALOT
  rationale: La frase es textualmente difícil. En español, 'podrás' refleja la posibilidad/tentatividad sin cargar el verso con una literalidad poco clara; mantiene abierta la suavidad modal del hebreo transmitido.
- source_word: תִּשְׁתֶּינוּ
  english_pob_choice: drink it with pleasure
  chosen_spanish: beberlo con agrado
  alternatives_spanish:
  - beberlo
  - beber de él con agrado
  lexicon: HALOT
  rationale: La forma verbal parece reflejar una transmisión defectuosa o incierta. 'Beberlo con agrado' recoge el sentido idiomático de disfrutar el vino maduro, tal como lo entiende la tradición textual hebrea seguida por la POB en inglés.
theological_decisions:
- issue: Selección de testimonio principal ante la divergencia entre hebreo y griego
  english_pob_reading: Translate from the extant Hebrew proverb about new wine and a new friend, while noting the Greek parallel reflects a substantially different text.
  chosen_spanish_reading: Traducir el proverbio hebreo sobre vino nuevo y amigo nuevo, dejando constancia de que el paralelo griego presenta una forma sustancialmente distinta.
  alternative_spanish_readings:
  - Traducir la advertencia griega sobre redes y murallas de ciudad
  rationale: Siguiendo la filosofía de la POB, en Sirácides se traduce desde el hebreo cuando el testimonio hebreo está disponible. Aunque el griego dado en el paquete es claramente de otro formulario textual, el hebreo aquí tiene prioridad como base de traducción, y la divergencia se documenta honestamente en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando Sirácides lo conserva; usar el griego como control real de variantes, no como sustituto automático.'
translation_notes:
  revision_awareness: Sin cambios respecto al pase más reciente del audit trail inglés; la traducción española se alinea con la misma decisión de base hebrea y mantiene la divergencia griega documentada.
  spanish_consistency_notes:
  - Se mantiene 'vino nuevo' para יַיִן חָדָשׁ y 'amigo nuevo' para אוֹהֵב חָדָשׁ, preservando el paralelismo breve del proverbio.
  - Se evita 'Cristo', 'Señor' u otras fórmulas no presentes; no hay léxico teológico adicional en este versículo.
  - '''Con agrado'' conserva el matiz positivo de disfrute que la nota inglesa atribuye al vino maduro.'
  - La nota textual a explica la discrepancia entre el hebreo y el griego sin borrar la tensión documentada.
