translation:
  language: es
  text: El que anda en justicia y habla lo recto[a], el que desprecia la ganancia de extorsiones[b], el que sacude sus manos para no aceptar un soborno, el que tapa sus oídos para no oír hablar de derramamiento de sangre[c], y cierra sus ojos para no mirar el mal—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «rectitud».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «ganancia de opresiones».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «sangres», un modismo para derramamiento de sangre o culpa de sangre.'
    reason: cultural_note
lexical_decisions:
- source_word: הֹלֵךְ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - vive
  - se conduce
  lexicon: HALOT
  rationale: En español, ‘anda’ conserva la metáfora conductual del hebreo sin sonar forzado. ‘Camina’ también es posible, pero ‘anda’ funciona mejor en un registro bíblico moderno y natural.
- source_word: צְדָק֔וֹת
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicias
  - obras de justicia
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió ‘righteousness’, el plural hebreo צְדָקוֹת puede abarcar una conducta justa o actos justos. ‘Justicia’ mantiene la amplitud moral y evita reducirlo solo a obras individuales; se deja la tensión justicia/rectitud sin sobrecargar el texto.
- source_word: וְדֹבֵ֖ר מֵישָׁרִ֑ים
  english_pob_choice: speaks what is upright
  chosen_spanish: habla lo recto
  alternatives_spanish:
  - habla cosas rectas
  - habla con rectitud
  - habla lo que es recto
  lexicon: HALOT
  rationale: מֵישָׁרִים comunica rectitud/uprightness. ‘Habla lo recto’ es conciso, natural en español y conserva el valor moral del sustantivo sin convertirlo en paráfrasis.
- source_word: מֹאֵ֞ס
  english_pob_choice: despises
  chosen_spanish: desprecia
  alternatives_spanish:
  - rechaza
  - desdeña
  - abomina
  lexicon: HALOT
  rationale: ‘Desprecia’ transmite rechazo moral fuerte, cercano al valor evaluativo del participio. ‘Abomina’ sería más intenso de lo que la forma exige.
- source_word: בֶּצַע מַעֲשַׁקּוֹת
  english_pob_choice: gain from extortions
  chosen_spanish: la ganancia de extorsiones
  alternatives_spanish:
  - la ganancia de opresiones
  - el lucro de actos de extorsión
  - la ganancia obtenida por extorsión
  lexicon: HALOT
  rationale: בֶּצַע es ganancia/lucro injusto y מַעֲשַׁקּוֹת apunta a extorsiones/opresiones. ‘Ganancia de extorsiones’ conserva la fuerza plural y el matiz de lucro ilícito sin perder transparencia.
- source_word: נֹעֵ֤ר כַּפָּי/ו
  english_pob_choice: shakes his hands free
  chosen_spanish: sacude sus manos para no aceptar
  alternatives_spanish:
  - sacude sus manos libre de
  - se sacude las manos
  - aparta sus manos
  lexicon: HALOT
  rationale: El hebreo describe un gesto de rechazo y desasimiento. En español, ‘sacude sus manos para no aceptar’ comunica esa intención sin introducir una imagen extra no explicitada por el texto.
- source_word: מִ/תְּמֹ֣ךְ בַּ/שֹּׁ֔חַד
  english_pob_choice: from taking a bribe
  chosen_spanish: un soborno
  alternatives_spanish:
  - recibir un soborno
  - tomar un soborno
  - aceptar un soborno
  lexicon: HALOT
  rationale: El inglés POB resuelve el infinitivo como ‘taking a bribe’. En español, ‘aceptar un soborno’ es idiomático y refleja mejor la recepción ilícita implicada por el contexto; ‘soborno’ mantiene la claridad legal.
- source_word: אֹטֵ֤ם אָזְנ/וֹ
  english_pob_choice: stops his ears
  chosen_spanish: tapa sus oídos
  alternatives_spanish:
  - cierra sus oídos
  - sella sus oídos
  - se tapa los oídos
  lexicon: HALOT
  rationale: Se mantiene el plural natural de ‘oídos’ como en la revisión inglesa, y ‘tapa’ reproduce bien la idea de bloquear la audición. Es una equivalencia idiomática clara en español.
- source_word: מִ/שְּׁמֹ֣עַ דָּמִ֔ים
  english_pob_choice: from hearing of bloodshed
  chosen_spanish: de derramamiento de sangre
  alternatives_spanish:
  - de oír sangre
  - de escuchar derramamiento de sangre
  - de oír de sangre
  lexicon: HALOT
  rationale: דָּמִים puede ser un hebraísmo para sangre derramada o culpabilidad de sangre. ‘Derramamiento de sangre’ preserva ese sentido idiomático en español y evita una lectura demasiado literal o extraña.
- source_word: וְעֹצֵ֥ם עֵינָ֖י/ו
  english_pob_choice: shuts his eyes
  chosen_spanish: cierra sus ojos
  alternatives_spanish:
  - cierra los ojos
  - los cierra
  - entrecierra sus ojos
  lexicon: HALOT
  rationale: ‘Cierra sus ojos’ reproduce el paralelismo con ‘tapa sus oídos’ y mantiene un español claro y digno.
- source_word: מֵ/רְא֥וֹת בְּ/רָֽע
  english_pob_choice: from looking on evil
  chosen_spanish: para no mirar el mal
  alternatives_spanish:
  - de ver el mal
  - de mirar el mal
  - para no ver el mal
  lexicon: HALOT
  rationale: La construcción expresa evitación deliberada. ‘Para no mirar el mal’ traduce el propósito implícito de manera natural en español y conserva la amplitud moral de בְּרָע.
theological_decisions:
- issue: Sujeto implícito en la cadena de participios éticos
  english_pob_reading: He who ...
  chosen_spanish_reading: El que ...
  alternative_spanish_readings:
  - Quien ...
  - El que ... es
  - Quienquiera que ...
  rationale: El hebreo presenta participios descriptivos en cadena; español necesita un sujeto explícito. ‘El que’ conserva el referente singular representativo sin convertir el versículo en una abstracción impersonal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Tensión justicia/rectitud en צְדָקוֹת
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - obras de justicia
  - justas acciones
  rationale: Aunque la tradición puede leer ‘rectitud’, aquí el conjunto de rasgos éticos describe a una persona íntegra ante Dios. ‘Justicia’ mantiene la amplitud del campo semántico y deja abierta la posibilidad de actos justos sin limitar el sentido.
  doctrine_reference: DOCTRINE.md §Contested terms (righteousness/justice tension)
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada mínimamente para pasar de ‘ear’ a ‘ears’ por naturalidad y concordancia idiomática; el resto del texto se mantuvo estable. La presente propuesta sigue esa lectura consolidada y la traslada al español con ajuste idiomático equivalente, sin añadir contenido interpretativo nuevo.
  spanish_consistency_notes:
  - Se mantuvo Yahvé donde no aparece el Tetragrámaton en este versículo; no fue necesario usarlo aquí.
  - Se prefirió una cadena de participios introducida por ‘El que’ para conservar la sintaxis ética hebrea.
  - ‘Soborno’ se usa por claridad jurídica; no se reemplaza por vocablos eclesiásticos.
  - ‘Derramamiento de sangre’ preserva el valor idiomático de דָּמִים sin traducirlo mecánicamente como ‘sangres’.
