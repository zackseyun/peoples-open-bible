revisions:
- from: Y celebraron la fiesta de los panes sin levadura por siete días, con alegría[a], porque Yahvé los había alegrado[b] y había inclinado el corazón del rey de Asiria hacia ellos[c], para fortalecer sus manos en la obra de la casa de Dios, el Dios de Israel.
  to: Y celebraron la Fiesta de los Panes sin Levadura por siete días, con alegría, porque Yahvé los había alegrado[a] y había vuelto el corazón del rey de Asiria[b] hacia ellos[c], para fortalecer sus manos en la obra de la casa de Dios, el Dios de Israel.
  rationale: 'La traducción principal es en general fiel y natural, pero el sistema de notas debe ajustarse al expediente auditado: se restaura la nota cultural sobre ‘rey de Asiria’, se reordenan las alternativas léxicas para que correspondan al texto y al inglés POB, y se pule la capitalización del nombre festivo. También se cambia ‘había inclinado el corazón’ a ‘había vuelto el corazón’ para que la nota alternativa preserve la opción documentada por el POB inglés en vez de duplicar el texto principal.'
