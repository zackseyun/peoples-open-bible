translation:
  language: es
  text: Y estas palabras que yo te ordeno hoy estarán sobre tu corazón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu corazón». El hebreo dice literalmente «sobre tu corazón», un modismo para guardar estas palabras continuamente en la vida interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: shall be
  chosen_spanish: estarán
  alternatives_spanish:
  - deberán estar
  - han de estar
  lexicon: HALOT
  rationale: El valor injuntivo/futuro del hebreo se comunica de manera natural con «estarán», que conserva la continuidad con el mandato previo sin forzar una perífrasis más pesada.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos mandatos
  lexicon: HALOT
  rationale: דְּבָרִים se traduce de forma directa como «palabras», manteniendo la cercanía léxica con el hebreo y la referencia al contenido recién pronunciado.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - las cuales
  lexicon: HALOT
  rationale: «Que» es la conexión relativa más natural en español moderno y reproduce bien la función de enlace sin marcar género ni número innecesariamente.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis; «yo» lo conserva de manera sobria, y el contexto ya deja claro el hablante.
- source_word: מְצַוְּךָ
  english_pob_choice: am commanding you
  chosen_spanish: te mando
  alternatives_spanish:
  - te estoy mandando
  - te ordeno
  lexicon: HALOT
  rationale: El participio en contexto discursivo expresa acción vigente y ordenada. En español, «te mando» transmite el acto de mandar con fluidez; «te ordeno» sería más rígido y «te estoy mandando» demasiado pesado.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es el equivalente natural en español y conserva la inmediatez deíctica del discurso de Moisés.
- source_word: עַל לְבָבֶךָ
  english_pob_choice: on your heart
  chosen_spanish: sobre tu corazón
  alternatives_spanish:
  - en tu corazón
  - en tu interior
  lexicon: HALOT
  rationale: La preposición עַל se refleja mejor con «sobre». Se mantiene la imagen hebrea del corazón como sede interior de memoria, voluntad y afecto, sin aplanarla directamente a «en tu corazón».
theological_decisions:
- issue: Antropología bíblica de לֵב/לְבָב
  english_pob_reading: heart
  chosen_spanish_reading: corazón
  alternative_spanish_readings:
  - mente
  - interior
  - ser interior
  rationale: Conservar «corazón» preserva la antropología bíblica amplia del hebreo, que incluye pensamiento, voluntad y afecto. «Mente» restringiría indebidamente el sentido a lo cognitivo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto base en inglés no recibió cambios posteriores; la lectura estuvo en alto acuerdo en la revisión cruzada, así que la versión española sigue de cerca el hebreo y mantiene la nota sobre el modismo de לְבָב.
  spanish_consistency_notes:
  - Se conserva «corazón» como término antropológico bíblico, coherente con el POB en otros pasajes donde לֵב/לְבָב no se reduce a «mente».
  - Se prefiere «mando» frente a «ordeno» para mantener un español natural sin perder la fuerza imperativa del hebreo.
  - La imagen espacial «sobre» se mantiene en el cuerpo del texto, mientras la nota ofrece la lectura alternativa más idiomática «en tu corazón».
