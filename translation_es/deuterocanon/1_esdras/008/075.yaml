translation:
  language: es
  text: Y ahora, por un breve tiempo[a], nos ha venido misericordia de parte de Yahvé, Yahvé[c], para dejarnos un remanente y un nombre[b] en este lugar santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega es idiomática; también puede entenderse como 'hasta cierto punto' o 'en medida limitada', no solo en sentido temporal. Por eso se traduce aquí 'por un breve tiempo'.
    reason: lexical_alternative
  - marker: b
    text: El giro 'un remanente y un nombre' expresa supervivencia y continuidad de identidad o permanencia.
    reason: lexical_alternative
  - marker: c
    text: El texto griego repite 'Señor'. Aquí se conserva esa repetición y se vierte con el nombre divino conforme al criterio del proyecto.
    reason: source_note
lexical_decisions:
- source_word: καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y ahora bien
  lexicon: LSJ
  rationale: Conserva la continuidad discursiva del ruego y el valor temporal/aditivo de la expresión griega sin endurecer el español.
- source_word: κατὰ πόσον τι
  english_pob_choice: for a little while
  chosen_spanish: por un poco
  alternatives_spanish:
  - por un breve momento
  - en poca medida
  - por un tiempo breve
  lexicon: LSJ
  rationale: La frase es idiomática y puede señalar medida limitada más que duración estrictamente temporal. 'Por un poco' mantiene la restricción de la misericordia con una forma natural en español.
- source_word: ἡμῖν ἐγενήθη ἔλεος
  english_pob_choice: mercy has come to us
  chosen_spanish: nos ha venido misericordia
  alternatives_spanish:
  - se nos ha mostrado misericordia
  - ha habido misericordia para nosotros
  lexicon: BDAG
  rationale: El giro con γίνομαι + ἔλεος comunica la irrupción o concesión de misericordia; 'nos ha venido' reproduce esa llegada/evento de forma idiomática.
- source_word: παρὰ τοῦ κυρίου Κυρίου
  english_pob_choice: from the Lord, the Lord
  chosen_spanish: de parte de Yahvé, Yahvé
  alternatives_spanish:
  - de parte del Señor, el Señor
  - de parte de Yahvé Dios
  lexicon: LSJ
  rationale: Se preserva la repetición explícita de κύριος y, siguiendo el estándar del proyecto para el nombre divino, se vierte como 'Yahvé' en ambos lugares. La repetición no se armoniza porque forma parte del texto griego recibido.
- source_word: καταλειφθῆναι
  english_pob_choice: to leave
  chosen_spanish: para dejarnos
  alternatives_spanish:
  - para preservarnos
  - para permitir que quedáramos
  lexicon: BDAG
  rationale: 'El infinitivo pasivo expresa el resultado buscado por la misericordia: que algo quede/permanezca. ''Dejarnos'' transmite bien la idea de que Dios permite que subsista algo.'
- source_word: ῥίζαν
  english_pob_choice: a remnant
  chosen_spanish: un remanente
  alternatives_spanish:
  - una raíz
  - un resto
  lexicon: LSJ
  rationale: Aunque literalmente 'raíz', el contexto y el propio audit trail inglés favorecen el valor idiomático de continuidad superviviente. 'Remanente' conserva la fuerza de supervivencia sin perder la alusión metafórica.
- source_word: ὄνομα
  english_pob_choice: a name
  chosen_spanish: un nombre
  alternatives_spanish:
  - una fama
  - un memorial
  lexicon: BDAG
  rationale: Se mantiene el sustantivo concreto 'nombre' para no cerrar prematuramente la metáfora bíblica de identidad, reputación y permanencia.
- source_word: ἐν τῷ τόπῳ τούτῳ ἁγιάσματος
  english_pob_choice: in this holy place
  chosen_spanish: en este lugar santo
  alternatives_spanish:
  - en este lugar de santidad
  - en este santuario
  lexicon: LSJ
  rationale: El genitivo ἁγιάσματος califica el lugar como santo/santuario. 'Lugar santo' es natural en español y conserva el referente cultual sin sobrerelajar el término.
theological_decisions:
- issue: Repetición del título divino κύριος Κυρίου
  english_pob_reading: the Lord, the Lord
  chosen_spanish_reading: Yahvé, Yahvé
  alternative_spanish_readings:
  - el Señor, el Señor
  - Yahvé Dios
  rationale: El griego repite explícitamente κύριος y el POB inglés preserva esa repetición. En español se mantiene la duplicación y, conforme al estándar del proyecto, se traduce el nombre divino como 'Yahvé' en vez de ocultarlo como título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Yahvé/Lord); Translation philosophy #1 y #5'
- issue: Valor metafórico de ῥίζαν καὶ ὄνομα
  english_pob_reading: a remnant and a name
  chosen_spanish_reading: un remanente y un nombre
  alternative_spanish_readings:
  - una raíz y un nombre
  - un resto y un nombre
  rationale: 'El audit trail inglés ya optó por interpretar ῥίζαν como ''remnant'' por su sentido idiomático. En español se sigue esa decisión para no dejar una imagen vegetal que oscurezca la intención del pasaje: supervivencia y continuidad de identidad.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 y #3'
- issue: Matiz de ἐν τῷ τόπῳ τούτῳ ἁγιάσματος
  english_pob_reading: in this holy place
  chosen_spanish_reading: en este lugar santo
  alternative_spanish_readings:
  - en este santuario
  - en este lugar de santidad
  rationale: Se conserva el carácter sagrado/cultual del lugar sin sobrecargarlo con una paráfrasis. 'Lugar santo' corresponde bien al contexto de templo y mantiene la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que prefirió interpretar ῥίζαν idiomáticamente en sentido de supervivencia/continuidad en lugar de mantener 'raíz' de forma literal. También conserva la repetición explícita del título divino y la lectura de 'lugar santo' para ἁγιάσματος.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para יהוה y para κύριος cuando el contexto refleja el nombre divino.
  - '''Remanente'' se usa aquí en sentido metafórico de continuidad del pueblo, coherente con el ajuste revisado del inglés POB.'
  - La puntuación reproduce la repetición retórica de 'Yahvé, Yahvé' sin armonización interpretativa.
  - Se evita 'SEÑOR' como máscara tipográfica para no borrar la transparencia del nombre divino.
