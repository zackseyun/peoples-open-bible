  glossary_alignment: 'La terminología principal del proyecto está bien alineada: יהוה -> «Yahvé», אֱלֹהֶיךָ -> «tu Dios», y el tratamiento de שׁמע/דבק y «padres» sigue el rastro inglés. La única desviación sustancial está en לָתֵת לָהֶם, donde el borrador opta por «dársela» en vez de preservar el indirecto explícito «darles / dar a ellos».'
