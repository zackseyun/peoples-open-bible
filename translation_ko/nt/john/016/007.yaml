source:
  edition: SBLGNT
  text: ἀλλ’ ἐγὼ τὴν ἀλήθειαν λέγω ὑμῖν, συμφέρει ὑμῖν ἵνα ἐγὼ ἀπέλθω. ἐὰν ⸀γὰρ μὴ ἀπέλθω, ὁ παράκλητος ⸂οὐ μὴ ἔλθῃ⸃ πρὸς ὑμᾶς· ἐὰν δὲ πορευθῶ, πέμψω αὐτὸν πρὸς ὑμᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/john/016/007.yaml
  text: 'But I am telling you the truth: it is better for you that I go away. For if I do not go away[a], the Advocate will certainly not come to you; but if I go, I will send him to you.'
  footnotes:
  - marker: a
    text: Or 'Helper,' 'Counselor,' 'Comforter'; Greek 'Paraclete.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 내가 여러분에게 진실을 말합니다. 내가 떠나가는 것이 여러분에게 유익합니다. 내가 떠나가지 않으면 보혜사가 여러분에게 결코 오지 않을 것입니다. 그러나 내가 가면, 내가 그분을 여러분에게 보내겠습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「돕는 자」, 「위로자」, 「변호자」; 헬라어는 「파라클레토스」.
    reason: lexical_alternative
