translation:
  language: es
  text: Toda herida[a], pero no como una herida del corazón; toda maldad, pero no como la maldad de una mujer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toda herida, pero no como una herida del corazón; todo mal, pero no como el mal causado por una mujer». רָעָה puede significar «maldad» o «daño/desgracia», y אִשָּׁה puede significar «mujer» o «esposa» según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל / Πᾶσαν
  english_pob_choice: any
  chosen_spanish: toda
  alternatives_spanish:
  - cualquier
  - todo
  lexicon: HALOT; LXX πληγή / πονηρία
  rationale: En este proverbio distributivo, «toda» conserva el alcance universal de cada miembro de la clase sin sonar tan áspero como una repetición de «cualquier». Mantiene el paralelismo de ambos cola en español.
- source_word: מַכָּה / πληγή
  english_pob_choice: wound
  chosen_spanish: herida
  alternatives_spanish:
  - golpe
  - herida
  - aflicción
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego permiten la idea de golpe o lesión; en español, «herida» reproduce bien el valor resultativo y encaja con la comparación proverbial, especialmente frente a «del corazón».
- source_word: הַלֵּב / καρδίας
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el corazón
  - la mente
  - el interior
  lexicon: HALOT; LSJ
  rationale: «Corazón» es la equivalencia natural en español para el hebreo/greigo «corazón» como sede interior de la persona. Evita una paráfrasis interpretativa como «mente» o «interior».
- source_word: רָעָה / πονηρία
  english_pob_choice: evil
  chosen_spanish: maldad
  alternatives_spanish:
  - mal
  - maldad
  - daño
  - desgracia
  lexicon: HALOT; LSJ
  rationale: «Maldad» conserva el sentido moral fuerte de πονηρία y de la lectura principal de רָעָה, sin forzar el término hacia una mera desgracia. En español suena más natural que repetir «mal» dos veces.
- source_word: אִשָּׁה / γυναικός
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una mujer
  - una esposa
  - una mujer casada
  lexicon: HALOT; LSJ
  rationale: El sustantivo desnudo se rinde de modo directo como «mujer», no «esposa», porque el hebreo y el griego no marcan aquí relación matrimonial explícita. La ambigüedad queda disponible sin resolverla de antemano.
- source_word: וְלֹא כְ / καὶ μὴ ...
  english_pob_choice: but not like
  chosen_spanish: pero no
  alternatives_spanish:
  - y no
  - pero no
  - ni
  lexicon: HALOT; LSJ
  rationale: «Pero no» mantiene la contraposición sentenciosa del original y resulta idiomático en español en comparación con la forma más pesada «y no como».
theological_decisions:
- issue: La segunda cláusula puede sonar despectiva o excesivamente generalizante si se suaviza demasiado.
  english_pob_reading: Retain the direct wording 'the evil of a woman' in the main text, while documenting the lexical ambiguity of רָעָה and אִשָּׁה in a footnote.
  chosen_spanish_reading: Conservar «la maldad de una mujer» en el texto principal, sin convertirlo en una glosa menos personal.
  alternative_spanish_readings:
  - la desgracia causada por una mujer
  - la maldad de una esposa
  - el daño de una mujer
  rationale: El texto fuente es comparativo y tajante; la traducción no debe diluir su fuerza. A la vez, la nota puede documentar que רָעָה también puede significar «daño/desgracia» y que אִשָּׁה puede leerse como «mujer» o, según contexto, «esposa».
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios pendientes y la lectura principal del hebreo y del paralelo griego sigue siendo de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando corresponda en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «maldad» para πονηρία / רָעָה por su fuerza moral; la alternativa contextual «daño/desgracia» queda documentada en la nota.
  - La puntuación conserva el paralelismo proverbial con dos miembros comparativos separados por punto y coma.
