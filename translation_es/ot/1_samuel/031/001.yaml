translation:
  language: es
  text: Los filisteos estaban combatiendo contra Israel, y los hombres de Israel huyeron de delante[a] de los filisteos, y cayeron muertos en el monte Gilboa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «de la presencia de los filisteos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְלִשְׁתִּים
  english_pob_choice: Now the Philistines
  chosen_spanish: Ahora los filisteos
  alternatives_spanish:
  - Y los filisteos
  - Los filisteos
  lexicon: HALOT
  rationale: El ו inicial funciona como continuidad narrativa; en español, «Ahora» transmite ese enlace discursivo de manera natural sin perder el arranque de la escena.
- source_word: נִלְחָמִים בְּ/יִשְׂרָאֵל
  english_pob_choice: were fighting against Israel
  chosen_spanish: estaban combatiendo contra Israel
  alternatives_spanish:
  - peleaban contra Israel
  - estaban luchando contra Israel
  lexicon: HALOT
  rationale: El participio expresa acción en curso; «estaban combatiendo» conserva ese aspecto progresivo. «Contra» refleja el valor adversativo de la preposición.
- source_word: וַ/יָּנֻסוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron huyendo
  lexicon: HALOT
  rationale: En contexto militar, נוּס se expresa de forma clara y sobria con «huyeron», que conserva la idea de retirada bajo presión.
- source_word: אַנְשֵׁי יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - los israelitas
  - los hombres israelitas
  lexicon: HALOT
  rationale: Se preserva la forma masculina explícita del hebreo אַנְשֵׁי sin neutralizarla innecesariamente.
- source_word: מִ/פְּנֵי פְלִשְׁתִּים
  english_pob_choice: from before the Philistines
  chosen_spanish: delante de los filisteos
  alternatives_spanish:
  - de la presencia de los filisteos
  - ante los filisteos
  lexicon: HALOT
  rationale: «Delante de» reproduce con naturalidad el sentido espacial del idiomático «from before», manteniendo la imagen de retirada en presencia del enemigo.
- source_word: וַ/יִּפְּל֥וּ חֲלָלִ֖ים
  english_pob_choice: fell slain
  chosen_spanish: cayeron muertos
  alternatives_spanish:
  - cayeron caídos
  - cayeron muertos en batalla
  lexicon: HALOT
  rationale: חֲלָלִים alude a muertos o caídos en combate; «cayeron muertos» comunica el resultado sin añadir una paraphrasis más larga que el hebreo no exige.
- source_word: בְּ/הַ֥ר הַ/גִּלְבֹּֽעַ
  english_pob_choice: on Mount Gilboa
  chosen_spanish: en el monte Gilboa
  alternatives_spanish:
  - sobre el monte Gilboa
  - en el monte de Gilboa
  lexicon: HALOT
  rationale: La construcción locativa se expresa de forma natural con «en»; «monte Gilboa» conserva el topónimo tradicional y claro en español.
translation_notes:
  revision_awareness: El inglés POB usa una nota para el giro literal «from before the Philistines». En español se optó por «delante de los filisteos», que ya conserva la imagen espacial sin requerir nota adicional. No se observaron revisiones sustantivas en el tramo auditado.
  spanish_consistency_notes:
  - Se mantiene «filisteos» como nombre de pueblo coherente con la tradición bíblica en español y con la transliteración del inglés POB.
  - Se usa «monte Gilboa» como forma breve y natural, equivalente a Mount Gilboa.
  - No se introducen marcadores de nota porque la solución española no requiere una alternativa textual adicional para este versículo.
