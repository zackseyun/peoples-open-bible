base_translation:
  language: en
  yaml_path: translation/ot/exodus/009/010.yaml
  text: So they took soot from the kiln and stood before Pharaoh[a], and Moses threw it toward the sky[b], and it became boils with blisters breaking out on man and on beast.
  footnotes:
  - marker: a
    text: Or 'ashes from the furnace.' The Hebrew more specifically suggests soot or fine black powder from a kiln/furnace.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'on man and on beast,' a collective way of saying the outbreak affected humans and animals.
    reason: lexical_alternative
