translation:
  language: es
  text: Porque no podían hacerlo en aquel tiempo, porque los sacerdotes no se habían consagrado suficientemente[a], y el pueblo aún no había acudido a Jerusalén[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «no se habían consagrado lo suficiente». El hebreo es compacto y puede entenderse como una insuficiencia en el grado de consagración o, secundariamente, como que no había suficientes sacerdotes consagrados.'
    reason: lexical_alternative
  - marker: b
    text: O «no se había reunido en Jerusalén». El hebreo dice literalmente «a Jerusalén», con sentido direccional; en español se expresa con mayor naturalidad como movimiento hacia la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָכְלוּ
  english_pob_choice: could not
  chosen_spanish: no podían
  alternatives_spanish:
  - no fueron capaces de
  - no podían hacerlo
  lexicon: HALOT
  rationale: El verbo expresa capacidad/incapacidad. En español, «no podían» comunica bien la imposibilidad práctica sin añadir matices de voluntad que el hebreo no exige.
- source_word: לַעֲשֹׂתוֹ
  english_pob_choice: do it
  chosen_spanish: hacerlo
  alternatives_spanish:
  - observarlo
  - cumplirlo
  lexicon: HALOT
  rationale: El infinitivo con sufijo retoma la celebración de la Pascua en el contexto. «Hacerlo» conserva la referencia pronominal y mantiene la tersura del español; «observarlo» sería más explícito pero más interpretativo.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: HALOT
  rationale: La expresión apunta al momento señalado para la Pascua. «En aquel tiempo» es natural en español bíblico contemporáneo y refleja bien la referencia temporal específica.
- source_word: הִתְקַדְּשׁוּ
  english_pob_choice: had not consecrated themselves
  chosen_spanish: no se habían consagrado
  alternatives_spanish:
  - no se habían santificado
  - no se habían purificado
  lexicon: HALOT
  rationale: En contexto cultual, el hitpael de קדשׁ se refiere a la preparación ritual de sí mismos. «Consagrado» mantiene el valor cultual sin recurrir a una formulación más eclesiástica o menos transparente.
- source_word: לְמַדַּי
  english_pob_choice: sufficiently
  chosen_spanish: suficientemente
  alternatives_spanish:
  - lo suficiente
  - en número suficiente
  lexicon: HALOT
  rationale: La expresión compacta admite una lectura de suficiencia en grado y, secundariamente, en número. «Suficientemente» preserva esa ambigüedad sin decidirla de antemano.
- source_word: נֶאֶסְפוּ
  english_pob_choice: had not gathered
  chosen_spanish: no se había reunido
  alternatives_spanish:
  - no se habían congregado
  - no habían sido reunidos
  lexicon: HALOT
  rationale: El nifal de אסף puede referirse al acto de reunirse. En español, «se había reunido» expresa con naturalidad la asamblea del pueblo y mantiene el sentido reflexivo/intransitivo.
- source_word: לִירוּשָׁלִָם
  english_pob_choice: to Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - para Jerusalén
  lexicon: HALOT
  rationale: Aunque el hebreo lleva dirección literal «a/para», en español con verbos de reunión la ubicación resultante se expresa mejor como «en Jerusalén». Aquí la opción evita una dureza sintáctica y conserva la idea del lugar de la asamblea.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió la última cláusula de «in Jerusalem» a «to Jerusalem» por reflejar la dirección del לְ hebreo. En español, la formulación final sigue el equivalente natural para la acción de reunirse, sin perder la referencia direccional implícita en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el tetragrámaton en este texto.
  - Se evitó «santificado» como forma principal para no desplazar el matiz cultual a un registro más tradicional que el español contemporáneo.
  - La segunda cláusula conserva la ambigüedad de לְמַדַּי entre suficiencia en grado y suficiencia numérica, explicitada en nota.
  - Se eligió el reflexivo «se habían reunido» para reflejar el nifal de אסף y el movimiento de congregación del pueblo.
