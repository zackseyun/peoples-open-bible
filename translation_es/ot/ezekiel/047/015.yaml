translation:
  language: es
  text: 'Y este será el límite de la tierra: por el lado norte[a][b][c], desde el Gran Mar, por el camino de Hetlón, hasta Lebo-zedad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este es el límite de la tierra». El hebreo no expresa explícitamente un verbo copulativo; en español también es posible una formulación más directa en presente.
    reason: lexical_alternative
  - marker: b
    text: «Gran Mar» designa el Mediterráneo.
    reason: cultural_note
  - marker: c
    text: O «por el camino hacia Hetlón». El hebreo puede leerse con matiz de ruta o de ubicación junto al camino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֶה
  english_pob_choice: And this shall be
  chosen_spanish: Y este será
  alternatives_spanish:
  - Y este es
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una descripción delimitada del territorio. «Será» reproduce bien el matiz de anuncio formal y mantiene el tono de listado geográfico.
- source_word: גְּבוּל
  english_pob_choice: boundary
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - linde
  lexicon: HALOT
  rationale: «Límite» comunica de manera natural la línea de demarcación en español y conserva el sentido geográfico preciso del hebreo.
- source_word: הָ/אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra de la región
  lexicon: HALOT
  rationale: En este contexto de reparto territorial, «la tierra» es claro y fiel; evita cargar el texto con una paráfrasis más interpretativa.
- source_word: לִ/פְאַת צָפוֹנָה
  english_pob_choice: on the north side
  chosen_spanish: por el lado norte
  alternatives_spanish:
  - en el lado norte
  - hacia el lado norte
  - en la parte norte
  lexicon: HALOT
  rationale: La expresión indica la orientación del borde geográfico. «Por el lado norte» suena natural en español y preserva la función direccional.
- source_word: מִן הַ/יָּם הַ/גָּדוֹל
  english_pob_choice: from the Great Sea
  chosen_spanish: desde el Gran Mar
  alternatives_spanish:
  - desde el Mar Grande
  - desde el Gran Mar Mediterráneo
  lexicon: HALOT
  rationale: Se conserva la designación bíblica tradicional como nombre geográfico. «Gran Mar» refleja el título sin sustituirlo en el texto principal por una glosa interpretativa.
- source_word: הַ/דֶּרֶךְ חֶתְלֹן
  english_pob_choice: by the way of Hethlon
  chosen_spanish: por el camino de Hetlón
  alternatives_spanish:
  - por la vía de Hetlón
  - junto al camino de Hetlón
  lexicon: HALOT
  rationale: «Camino» reproduce adecuadamente דֶּרֶךְ y mantiene la forma breve de fórmula fronteriza. Se translitera el topónimo con acento adaptado al español.
- source_word: לְבֹא
  english_pob_choice: to Lebo-zedad
  chosen_spanish: hasta Lebo-zedad
  alternatives_spanish:
  - hasta la llegada a Zedad
  - hasta el acceso de Zedad
  lexicon: HALOT
  rationale: La revisión inglesa prefirió reflejar la construcción toponímica más directamente. «Hasta Lebo-zedad» preserva esa decisión y evita la paráfrasis 'a medida que se va a'.
- source_word: צְדָדָה
  english_pob_choice: Zedad
  chosen_spanish: zedad
  alternatives_spanish:
  - Zedad
  - Zedadá
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma transliterada compuesta con Lebo-. En español, la forma unida «Lebo-zedad» mantiene la continuidad del topónimo del texto base.
translation_notes:
  revision_awareness: La versión inglesa más reciente abandonó la paráfrasis «as one goes to Zedad» y la reemplazó por una forma que refleja con mayor exactitud la construcción toponímica לְבֹא צְדָדָה. El español sigue esa revisión con «Lebo-zedad» y no desarrolla el sentido en una explicación dinámica dentro del texto principal.
  spanish_consistency_notes:
  - Se mantiene un registro geográfico sobrio y formulario, propio de una descripción de límites territoriales.
  - Se transliteran los nombres propios de modo consistente y se conserva la designación bíblica «Gran Mar».
  - La puntuación con dos puntos introduce la cláusula explicativa, en paralelo al inglés auditado.
