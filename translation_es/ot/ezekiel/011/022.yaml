translation:
  language: es
  text: Entonces los querubines alzaron sus alas, con las ruedas[a] junto a ellos, y la gloria del Dios de Israel estaba sobre ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "y las ruedas estaban junto a ellos". El hebreo permite conectar la frase con un "y" más literal, pero el sentido en la visión es de acompañamiento y coordinación entre los querubines y las ruedas.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "sobre ellos desde arriba", una expresión espacial enfática. En español se vierte simplemente "sobre ellos" para evitar redundancia, conservando la idea de que la gloria estaba por encima de ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  english_pob_choice: lifted up
  chosen_spanish: alzaron
  alternatives_spanish:
  - levantaron
  - alzaron sus alas
  lexicon: HALOT
  rationale: El verbo נשׂא en esta escena describe el movimiento ascendente de los querubines en el visionario trono. En español, 'alzaron' comunica bien ese movimiento sin sonar pesado; se explicita el objeto 'sus alas' en la frase para mantener la imagen concreta del texto.
- source_word: הַכְּרוּבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines celestiales
  - los querubines
  lexicon: HALOT
  rationale: Se conserva el transliterado tradicional 'querubines', que corresponde al plural hebreo y mantiene la imaginería del pasaje sin sustituirla por 'querubines' como diminutivo o reinterpretación.
- source_word: כַּנְפֵיהֶם
  english_pob_choice: their wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - sus alas
  - sus plumas
  lexicon: HALOT
  rationale: כָּנָף significa 'ala'; 'sus alas' es la equivalencia directa y natural en español. No se añade interpretación adicional.
- source_word: וְהָאוֹפַנִּים
  english_pob_choice: with the wheels
  chosen_spanish: con las ruedas
  alternatives_spanish:
  - y las ruedas
  - junto con las ruedas
  lexicon: HALOT
  rationale: El referente son las ruedas de la visión de Ezequiel. 'Con las ruedas' expresa adecuadamente la compañía o concomitancia que el audit trail inglés resolvió con 'with'.
- source_word: לְעֻמָּתָם
  english_pob_choice: beside them
  chosen_spanish: junto a ellos
  alternatives_spanish:
  - al lado de ellos
  - frente a ellos
  - opuestas a ellos
  lexicon: HALOT
  rationale: La preposición indica posición relativa; en este contexto visionario y coordinado, 'junto a ellos' comunica mejor la cercanía y acompañamiento de las ruedas.
- source_word: וּכְבוֹד
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - la gloria-presencia
  - el esplendor
  lexicon: HALOT
  rationale: כָּבוֹד se mantiene como 'gloria', término ya consolidado para la manifestación visible de Dios en Ezequiel y que preserva el peso teológico del pasaje.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: of the God of Israel
  chosen_spanish: del Dios de Israel
  alternatives_spanish:
  - del Dios de Israel
  - del Dios de Israel, Yahvé
  lexicon: HALOT
  rationale: La cadena constructa se traduce de manera directa. 'Dios de Israel' conserva la designación pactal estándar; aquí no se explicita Yahvé porque el hebreo dice אֱלֹהֵי יִשְׂרָאֵל, no el Tetragrámaton.
- source_word: עֲלֵיהֶם
  english_pob_choice: was above them
  chosen_spanish: estaba sobre ellos
  alternatives_spanish:
  - estaba encima de ellos
  - estaba por encima de ellos
  lexicon: HALOT
  rationale: '''Sobre ellos'' reproduce bien la relación espacial entre la gloria y los querubines/ruedas. ''Estaba'' refleja el estado posicional continuo de la visión.'
theological_decisions:
- issue: Manifestación divina expresada por כבוד en la visión de Ezequiel
  english_pob_reading: the glory of the God of Israel
  chosen_spanish_reading: la gloria del Dios de Israel
  alternative_spanish_readings:
  - la gloria-presencia del Dios de Israel
  - el resplandor del Dios de Israel
  rationale: Se mantiene 'gloria' para conservar la carga bíblica y visionaria del término, sin expandirlo a una paráfrasis interpretativa. En Ezequiel, la 'gloria' es la manifestación visible de Dios, y la traducción debe respetar esa tensión semántica.
  doctrine_reference: Ezequiel 1:28; 3:12, 23; 10:18-19
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar la redundancia de 'from above'; la presente redacción española sigue ese mismo criterio y no añade un equivalente redundante. También se respeta el matiz espacial enfático del hebreo mediante la nota de pie, sin sobrecargar el texto principal.
  spanish_consistency_notes:
  - Se mantiene 'querubines' y no se sustituye por 'querubes' u otra forma menos estándar.
  - '''Gloria'' se conserva como término técnico-teológico coherente con Ezequiel.'
  - No se usa 'SEÑOR' porque el hebreo de este versículo dice 'Dios de Israel' y no el Tetragrámaton.
  - La frase 'junto a ellos' recoge el sentido relacional de לְעֻמָּתָם sin introducir oposición.
