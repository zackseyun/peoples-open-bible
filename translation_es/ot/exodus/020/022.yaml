  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה כֹּ֥ה תֹאמַ֖ר אֶל בְּנֵ֣י יִשְׂרָאֵ֑ל אַתֶּ֣ם רְאִיתֶ֔ם כִּ֚י מִן הַ/שָּׁמַ֔יִם דִּבַּ֖רְתִּי עִמָּ/כֶֽם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/020/022.yaml
  text: 'Then Yahweh said to Moses[c][b][a], “Thus you shall say to the sons of Israel: You yourselves have seen that I have spoken to you from heaven.”'
  footnotes:
  - marker: a
    text: Or “the Israelites” or “the children of Israel.” The Hebrew is literally “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “I have spoken to you.” The Hebrew more literally says “with you,” emphasizing direct encounter.
    reason: lexical_alternative
  - marker: c
    text: Hebrew “from the heavens”; English idiom commonly renders this as “from heaven.”
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
