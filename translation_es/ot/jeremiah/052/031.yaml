  language: en
  yaml_path: translation/ot/jeremiah/052/031.yaml
  text: And it happened in the thirty-seventh year of the exile of Jehoiachin king of Judah[a], in the twelfth month, on the twenty-fifth day of the month, that Evil-merodach king of Babylon, in the first year of his reign[b], lifted up the head of Jehoiachin king of Judah and brought him out from the prison.
  footnotes:
