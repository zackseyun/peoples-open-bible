translation:
  language: es
  text: 'Entonces respondí por segunda vez y le dije: «¿Qué son estas dos ramas de olivo[a] que están junto a los dos tubos[b] de oro, que vierten de sí el oro[c]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estas dos ramas frutales/racimos de los olivos»; el hebreo es inusual aquí y puede referirse a brotes frutales más que a ramas grandes.
    reason: lexical_alternative
  - marker: b
    text: O «las dos tuberías de oro» o «los dos conductos de oro».
    reason: lexical_alternative
  - marker: c
    text: Probablemente alude al «aceite dorado»; el hebreo dice literalmente «el oro».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַ֣עַן שֵׁנִ֔ית
  english_pob_choice: Then I answered a second time
  chosen_spanish: Entonces respondí por segunda vez
  alternatives_spanish:
  - Y respondí otra vez
  - Entonces contesté por segunda vez
  lexicon: HALOT
  rationale: La forma verbal y el adverbio marcan continuación narrativa y repetición; «por segunda vez» conserva con precisión el valor de שֵׁנִית sin sonar forzado.
- source_word: וָאֹמַ֖ר אֵלָ֑יו
  english_pob_choice: and said to him
  chosen_spanish: y le dije
  alternatives_spanish:
  - y le hablé
  - y le dije a él
  lexicon: HALOT
  rationale: El hebreo dice literalmente «dije a él», y en español «le dije» es natural y fiel. Se evita traducir interpretativamente como «le pregunté».
- source_word: מַה
  english_pob_choice: What are these
  chosen_spanish: ¿Qué son estos
  alternatives_spanish:
  - ¿Qué son
  - ¿Qué son estas cosas
  lexicon: HALOT
  rationale: La pregunta busca identificación de objetos visibles; en español, «¿Qué son estos…?» expresa bien la deixis implícita sin añadir más de lo necesario.
- source_word: שְׁתֵּי שִׁבֲּלֵי הַזֵּיתִים
  english_pob_choice: these two olive branches
  chosen_spanish: estos dos brotes de olivo[a]
  alternatives_spanish:
  - estas dos ramas de olivo
  - estas dos espigas/sprays de los olivos
  lexicon: HALOT
  rationale: שִׁבֲּלֵי es un término inusual; el POB inglés preserva la tensión entre rama y brote/espiga. «Brotes de olivo» comunica bien la imagen vegetal sin resolver excesivamente la rareza léxica.
- source_word: אֲשֶׁר בְּיַד
  english_pob_choice: that are beside
  chosen_spanish: que están junto a
  alternatives_spanish:
  - que están al lado de
  - que están junto a la mano de
  lexicon: HALOT
  rationale: El hebreo literalmente es «en/por la mano de», pero en este contexto espacial la relación se expresa naturalmente como cercanía. «Junto a» mantiene la orientación sin introducir una imagen corporal extraña.
- source_word: שְׁנֵי צַנְתְּרוֹת הַזָּהָב
  english_pob_choice: the two golden pipes
  chosen_spanish: los dos tubos[b] de oro
  alternatives_spanish:
  - los dos conductos de oro
  - los dos tubos dorados
  lexicon: HALOT
  rationale: El POB revisado prefirió «pipes» por ser más natural; en español «tubos» comunica el mismo aparato. Se conserva «de oro» para reflejar el genitivo hebreo y la descripción visual.
- source_word: הַמְרִיקִים
  english_pob_choice: which pour out
  chosen_spanish: que derraman
  alternatives_spanish:
  - que vierten
  - que vacían
  lexicon: HALOT
  rationale: El participio expresa hacer salir o fluir un líquido. «Derraman» da un español fluido y mantiene la acción continua del paso del aceite/‘oro’.
- source_word: מֵעֲלֵיהֶם
  english_pob_choice: from themselves
  chosen_spanish: de sí mismos
  alternatives_spanish:
  - desde ellos
  - a partir de ellos
  lexicon: HALOT
  rationale: La relación hebrea es difícil; el POB inglés opta por preservar la fuente interna. «De sí mismos» conserva esa misma tensión sin resolver mecánicamente el mecanismo.
- source_word: הַזָּהָב
  english_pob_choice: the gold
  chosen_spanish: el oro[c]
  alternatives_spanish:
  - el oro dorado
  - el oro líquido
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «el oro», en español la sustancia se entiende mejor como «oro» si se preserva la metáfora. La nota aclara la alternativa interpretativa tradicional de «aceite dorado».
theological_decisions:
- issue: ¿Mantener la literalidad de «el oro» o explicitar «aceite dorado»?
  english_pob_reading: Retain the literal phrase 'the gold' in the main text
  chosen_spanish_reading: Mantener «el oro» en el texto principal
  alternative_spanish_readings:
  - traducir «el aceite dorado»
  - explicitar «el oro, es decir, el aceite»
  rationale: La visión usa un lenguaje imagético y el hebreo dice literalmente «el oro». Mantenerlo preserva la textura del símbolo y deja la aclaración interpretativa en nota, en vez de insertarla en el versículo.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'spouts' por 'pipes' y simplificó 'are pouring out' a 'pour out'. La versión española refleja ese ajuste con «tubos» y «derrama[n]»/«derraman», conservando la fluidez y la literalidad controlada del POB.
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se traduce צַנְתְּרוֹת como «tubos», coherente con la revisión inglesa hacia 'pipes'.
  - Se conserva la tensión léxica de שִׁבֲּלֵי con «brotes de olivo», sin cerrar la imagen a un solo referente botánico.
