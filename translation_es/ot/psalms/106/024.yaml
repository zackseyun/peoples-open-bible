translation:
  language: es
  text: Entonces despreciaron la tierra deleitosa[a]; no creyeron en su palabra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra agradable» o «la tierra deseable».
    reason: lexical_alternative
  - marker: b
    text: O «no confiaron en su palabra»; «su palabra» también puede entenderse aquí como «su promesa».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּמְאֲסוּ
  english_pob_choice: Then they despised
  chosen_spanish: Entonces despreciaron
  alternatives_spanish:
  - Y rechazaron
  - Así que despreciaron
  lexicon: HALOT
  rationale: מָאַס expresa rechazo con fuerte carga de desdén. «Despreciaron» conserva esa fuerza evaluativa; «Entonces» refleja la secuencia narrativa del wayyiqtol sin forzar el estilo.
- source_word: בְּאֶרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En este contexto pactal y geográfico, אֶרֶץ se refiere a la tierra prometida. En español, «tierra» es natural y comunica mejor la referencia bíblica que «país».
- source_word: חֶמְדָּה
  english_pob_choice: the pleasant land
  chosen_spanish: agradable
  alternatives_spanish:
  - deleitable
  - deliciosa
  - deseable
  lexicon: HALOT
  rationale: El sustantivo denota algo deseable, placentero o deleitoso. «Agradable» da una opción natural en español sin perder la valoración positiva del original. Se evita una formulación demasiado literal que sonaría pesada.
- source_word: הֶאֱמִינוּ
  english_pob_choice: believe
  chosen_spanish: creyeron
  alternatives_spanish:
  - confiaron
  - tuvieron fe
  lexicon: HALOT
  rationale: El hifil de אמן aquí significa creer o confiar. «Creyeron» mantiene la relación directa con «su palabra» y refleja la negativa del texto con claridad.
- source_word: לִדְבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su promesa
  - lo que había dicho
  lexicon: HALOT
  rationale: דָּבָר puede significar palabra, asunto o promesa. «Su palabra» preserva la amplitud del hebreo y deja abierta la referencia a la promesa divina, como en la nota inglesa.
theological_decisions:
- issue: Si explicitar la idea de promesa en "su palabra"
  english_pob_reading: Retain the broader wording 'his word' in the main text; 'his promise' is an alternative.
  chosen_spanish_reading: Mantener «su palabra» en el texto principal.
  alternative_spanish_readings:
  - su promesa
  rationale: El hebreo dice literalmente «su palabra», y conservar esa forma evita restringir indebidamente el alcance. El sentido de promesa está presente por el contexto, por lo que se deja implícito en el texto principal.
  doctrine_reference: Fidelidad de Yahvé a su palabra/pacto
- issue: Cómo renderizar la calificación de la tierra
  english_pob_reading: the pleasant land
  chosen_spanish_reading: la tierra agradable
  alternative_spanish_readings:
  - la tierra deleitosa
  - la tierra deseable
  rationale: Se preserva la valoración positiva del sustantivo hebreo sin sobrecargar el verso. Aunque «agradable» es menos tradicional que otras opciones, mantiene el sentido y funciona de manera natural en español.
  doctrine_reference: Tierra prometida / herencia del pacto
translation_notes:
  revision_awareness: El borrador sigue el estado revisado más reciente del audit trail, que ajustó la frase inglesa de 'desirable land' a 'pleasant land' por naturalidad. En español se optó por una solución igualmente natural («tierra agradable») que conserva la valoración positiva del hebreo חֶמְדָּה y mantiene la tensión lexical con las alternativas posibles.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija explícitamente; este versículo no lo nombra de forma directa.
  - «Tierra» se reserva para אֶרֶץ en sentido geográfico/pactual.
  - «Creyeron» y «confiaron» se distinguen en notas para conservar la amplitud semántica de הֶאֱמִינוּ.
  - Se evita introducir «Cristo» o terminología posterior ajena al contexto poético hebreo.
