  yaml_path: translation/ot/judges/019/005.yaml
  text: On the fourth day[a], they rose early in the morning, and he got up to go. But the young woman’s father said to his son-in-law, “Refresh your heart with a morsel of bread[b], and afterward you may go.”
  footnotes:
  - marker: a
    text: Hebrew literally, “Strengthen your heart with a morsel of bread.” The idiom means to refresh or sustain oneself by eating.
    reason: lexical_alternative
  - marker: b
    text: The final verb is plural in Hebrew (“you all may go”), likely referring to the traveling party as a whole, though the father addresses his son-in-law directly.
    reason: alternative_reading
