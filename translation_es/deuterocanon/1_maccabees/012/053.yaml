translation:
  language: es
  text: 'Y todas las naciones alrededor de ellos procuraron borrarlos por completo[a], pues dijeron: «No tienen un hombre que los gobierne y los ayude[b]. Ahora, pues, hagamos guerra contra ellos y borremos de entre los hombres su memoria[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «destruirlos»; el verbo griego expresa erradicación o eliminación total.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «No tienen un hombre que gobierne y ayude»; también puede entenderse: «No tienen un gobernante que los guíe y ayude».'
    reason: lexical_alternative
  - marker: c
    text: O «borrar su recuerdo de entre la humanidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτησαν
  english_pob_choice: sought
  chosen_spanish: buscaron
  alternatives_spanish:
  - intentaron
  - quisieron
  - planearon
  lexicon: LSJ
  rationale: El aoristo de ζητέω expresa aquí una acción orientada a un fin. En español, «buscaron» conserva la idea de propósito/intención sin añadir más contenido del que permite el texto.
- source_word: πάντα τὰ ἔθνη τὰ κύκλῳ αὐτῶν
  english_pob_choice: all the nations around them
  chosen_spanish: todas las naciones alrededor de ellos
  alternatives_spanish:
  - todos los pueblos alrededor de ellos
  - todas las naciones circundantes
  - todos los gentiles alrededor de ellos
  lexicon: LSJ
  rationale: ἔθνη puede significar «naciones» o «pueblos». «Naciones» mantiene el registro histórico y evita una traducción interpretativa más específica que el griego no exige.
- source_word: ἐκτρῖψαι
  english_pob_choice: to wipe them out
  chosen_spanish: destruirlos
  alternatives_spanish:
  - borrarlos
  - aniquilarlos
  - exterminarlos
  lexicon: LSJ
  rationale: El verbo comunica erradicación total. «Destruirlos» es natural en español y conserva la fuerza de aniquilación sin sonar excesivamente idiomático o morboso.
- source_word: ἄνδρα ἄρχοντα
  english_pob_choice: no man to rule
  chosen_spanish: un hombre que los gobierne
  alternatives_spanish:
  - un hombre para gobernarlos
  - un gobernante para guiarlos
  - un hombre que sea su señor
  lexicon: LSJ
  rationale: El griego conserva la explicitud de ἄνδρα («hombre») y ἄρχοντα («gobernando»). «Que los gobierne» transmite la relación verbal de manera clara y respeta la referencia masculina del original.
- source_word: βοηθοῦντα
  english_pob_choice: help them
  chosen_spanish: los ayude
  alternatives_spanish:
  - les ayude
  - los socorra
  - les preste ayuda
  lexicon: LSJ
  rationale: El participio describe apoyo activo. «Ayude» mantiene la sencillez y se coordina bien con «gobierne», reproduciendo el paralelismo del griego.
- source_word: πολεμήσωμεν αὐτούς
  english_pob_choice: let us make war against them
  chosen_spanish: hagamos guerra contra ellos
  alternatives_spanish:
  - peleemos contra ellos
  - hagamos la guerra contra ellos
  - vayamos a la guerra contra ellos
  lexicon: LSJ
  rationale: La forma exhortativa sugiere hostilidad organizada, no solo una pelea. «Hagamos guerra contra ellos» reproduce bien el tono militar amplio del griego.
- source_word: ἐξαροῦμεν ἐξ ἀνθρώπων τὸ μνημόσυνον αὐτῶν
  english_pob_choice: remove their memory from among men
  chosen_spanish: borremos de entre los hombres su memoria
  alternatives_spanish:
  - quitemos de entre los hombres su recuerdo
  - borramos de la humanidad su memoria
  - eliminemos de entre los hombres su recuerdo
  lexicon: LSJ
  rationale: μνημόσυνον alude a memoria/recuerdo/conmemoración. «Memoria» conserva el vínculo léxico con el sustantivo y «de entre los hombres» refleja ἐξ ἀνθρώπων con el masculino genérico del texto.
theological_decisions:
- issue: Lenguaje masculino explícito en discurso hostil
  english_pob_reading: They have no man to rule and help them ... remove their memory from among men.
  chosen_spanish_reading: No tienen un hombre que los gobierne y los ayude ... borremos de entre los hombres su memoria.
  alternative_spanish_readings:
  - No tienen un líder que los ayude ... borremos su memoria de la humanidad
  - No tienen un gobernante que los dirija y los ayude ... eliminemos su recuerdo entre la gente
  rationale: El griego usa términos masculinos explícitos (ἄνδρα; ἀνθρώπων). Se conserva esa fuerza sin neutralizarla, ya que forma parte del contenido semántico del pasaje y coincide con la política de exactitud de género del proyecto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Alcance de la destrucción
  english_pob_reading: wipe them out
  chosen_spanish_reading: destruirlos
  alternative_spanish_readings:
  - exterminarlos
  - aniquilarlos
  - borrarlos
  rationale: ἐκτρῖψαι expresa intento de eliminación total. «Destruirlos» es suficientemente fuerte sin sobreinterpretar el método concreto de la destrucción.
  doctrine_reference: LSJ; PO B lexical policy on eradication verbs
- issue: memoria/remembrance
  english_pob_reading: remove their memory from among men
  chosen_spanish_reading: borremos de entre los hombres su memoria
  alternative_spanish_readings:
  - quitemos de entre los hombres su recuerdo
  - borramos de la humanidad su memoria
  rationale: μνημόσυνον puede ser «memoria», «recuerdo» o «conmemoración». «Memoria» preserva la amplitud semántica y el eco de borrado total del texto.
  doctrine_reference: LSJ; English POB footnote c
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el cierre editorial del inglés POB revisado: se mantiene la estructura de causa («pues dijeron»), la coordinación verbal «gobierne y los ayude», y el remate con la eliminación de la memoria «de entre los hombres», evitando una paráfrasis que suavice el sentido de destrucción total.'
  spanish_consistency_notes:
  - Se usa «naciones» para ἔθνη, conforme al contexto histórico y al precedente inglés.
  - Se conserva el masculino explícito «un hombre» y «los hombres» por fidelidad al griego y a la política de exactitud de género.
  - «Memoria» se emplea como equivalente principal de μνημόσυνον, con nota para la alternativa «recuerdo».
  - El tono es formal pero natural en español contemporáneo, sin recurrir a calcos innecesarios.
