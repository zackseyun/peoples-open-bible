reference: Wisdom of Solomon 10:19
source:
  edition: lxx-swete-1909
  text: τοὺς δὲ ἐχθροὺς αὐτῶν κατέκλυσεν, καὶ ἐκ βάθους ἀβύσσου ἀνέβρασεν αὐτούς.
  language: Greek
  pages:
  - 639
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override layer derived from the adjudicated corpus. Translation-ready override derived from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond Wisdom 19:22.
translation:
  text: But he flooded their enemies[a], and from the depth of the abyss he cast them up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brought them up from the depths of the abyss.' The Greek verb can suggest causing something to well up or rise up; here it likely refers to the sea casting the enemies up from the deep.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέκλυσεν
  chosen: flooded
  alternatives:
  - overwhelmed
  - inundated
  - drowned
  lexicon: LSJ
  rationale: The verb denotes overwhelming with water or deluging. 'Flooded' preserves the water imagery and keeps the action vivid without over-specifying the result as death, which the Greek does not state in this verb alone.
- source_word: ἐχθρούς
  chosen: enemies
  alternatives:
  - foes
  lexicon: LSJ
  rationale: Standard rendering for the plural noun; clear and natural in modern English.
- source_word: ἐκ βάθους ἀβύσσου
  chosen: from the depth of the abyss
  alternatives:
  - from the depths of the deep
  - from the bottom of the abyss
  lexicon: LSJ
  rationale: The singular βάθους with ἀβύσσου expresses emergence from the deep abyss. 'From the depth of the abyss' is formally close and preserves the elevated diction and cosmic-water imagery.
- source_word: ἀνέβρασεν
  chosen: cast them up
  alternatives:
  - brought them up
  - threw them up
  - caused them to surge up
  lexicon: LSJ
  rationale: The verb can convey causing something to well up or be thrown upward. In context of the sea after drowning the Egyptians, 'cast them up' naturally conveys the waters bringing bodies up from the deep, matching the narrative image without becoming paraphrastic.
- source_word: αὐτούς
  chosen: them
  lexicon: LSJ
  rationale: The pronoun refers back to the enemies; English repeats 'them' naturally.
