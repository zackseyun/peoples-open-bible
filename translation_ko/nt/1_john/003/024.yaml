id: 1JN.3.24
reference: 1 John 3:24
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ὁ τηρῶν τὰς ἐντολὰς αὐτοῦ ἐν αὐτῷ μένει καὶ αὐτὸς ἐν αὐτῷ· καὶ ἐν τούτῳ γινώσκομεν ὅτι μένει ἐν ἡμῖν, ἐκ τοῦ πνεύματος οὗ ἡμῖν ἔδωκεν.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/003/024.yaml
  text: 'And the one who keeps his commandments remains in him[a], and he in him[b]. And by this we know that he remains in us: by the Spirit whom he gave to us.'
  footnotes:
  - marker: a
    text: Or 'from the Spirit whom he gave to us.' The Greek preposition can emphasize source as well as means.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'abides' for 'remains' throughout this verse.
    reason: lexical_alternative
translation:
  language: ko
  text: '그리고 그분의 계명들을 지키는 자는 그분 안에 머물며, 그분도 그 사람 안에 머무십니다. 이로써 우리는 그분이 우리 안에 머무신다는 것을 압니다: 곧 그분이 우리에게 주신 영으로 말미암아입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκ τοῦ πνεύματος
  english_pob_choice: by the Spirit
  chosen_korean: 영으로 말미암아
  alternatives_korean:
  - 성령으로 말미암아
  lexicon: BDAG
  rationale: 본 문맥은 하나님이 신자들에게 주신 신적 영을 가리키므로 「영」으로 옮긴다. 「성령」도 가능하나, 1 요한서의 πνεῦμα 용법은 식별(4:1-6)과 임재의 표지(3:24; 4:13) 등 다양하므로 「영」으로 일관 처리한다.
