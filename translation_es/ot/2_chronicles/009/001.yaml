  language: en
  yaml_path: translation/ot/2_chronicles/009/001.yaml
  text: Now the queen of Sheba heard of Solomon’s fame[a], and she came to Jerusalem to test Solomon with riddles, with a very great retinue and camels carrying spices, gold in abundance, and precious stones. When she came to Solomon[c][b], she spoke with him about all that was in her heart.
  footnotes:
