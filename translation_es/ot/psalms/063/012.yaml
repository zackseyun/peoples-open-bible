revisions:
- from: Pero el rey se alegrará en Dios[a]; todo el que jura por él[b] se gloriará[c], porque la boca de los que hablan mentira será cerrada.
  to: Pero el rey se alegrará en Dios; todo el que jura por él[a] se gloriará[b], porque las bocas de los que dicen mentiras[c] serán cerradas.
  rationale: 'Se corrigió el aparato de notas para alinearlo con el audit trail inglés: la alternativa relevante se trasladó a «por él» con la opción «por Dios», se mantuvo «se gloriará» con nota de alternativa, y se añadió la nota literal sobre «la boca». En el texto principal se cambió a «las bocas ... serán cerradas» para una lectura española natural y en línea con la revisión inglesa, y se mejoró «hablan mentira» a «dicen mentiras» por idiomaticidad.'
