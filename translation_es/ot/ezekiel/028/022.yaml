  to: 'y dirás: «Así dice el Señor Yahvé: He aquí, estoy contra ti, Sidón, y seré glorificado[a] en medio de ti. Y sabrán que yo soy Yahvé, cuando ejecute juicios en ella y me mostraré santo[b] en ella».'
