    text: Hebreo 'Aram'; aquí se refiere a las fuerzas arameas, tradicionalmente traducidas 'los sirios'.
    reason: lexical_alternative
  - marker: b
    text: O 'Abisai, su hermano', es decir, el hermano de Joab.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [b] para que corresponda a 'Abisai, su hermano', que es lo que la nota explica. Además, se ajusta 'delante de' a 'ante' por mayor naturalidad en español sin cambiar el sentido del hebreo.
