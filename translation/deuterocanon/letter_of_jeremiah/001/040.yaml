id: LJE.1.40
reference: Letter of Jeremiah 1:40
source:
  edition: lxx-swete-1909
  text: Ἔτι δὲ καὶ αὐτῶν τῶν Χαλδαίων ἀτιμαζόντων αὐτά, οἳ ὅταν ἴδωσιν ἐνεὸν οὐ δυνάμενον λαλῆσαι, προσενεγκάμενοι τὸν Βῆλον ἐξιοῦσιν φωνῆσαι, ὡς δυνατοῦ ὄντος αὐτοῦ αἰσθέσθαι,
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: 'Moreover[a], even the Chaldeans themselves dishonor them: whenever they see a mute person unable to speak, they bring him before Bel and ask that he make him speak[c][b], as though he were able to perceive.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Chaldeans themselves dishonor them,' emphasizing that even their own worshipers treat the idols contemptuously.
    reason: lexical_alternative
  - marker: b
    text: Bel was a Babylonian divine name/title associated with Marduk.
    reason: cultural_note
  - marker: c
    text: Or, 'as if he were able to understand' or 'take notice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι δὲ καὶ
  chosen: Moreover, even
  alternatives:
  - Still also
  - Furthermore, even
  lexicon: LSJ
  rationale: Captures the additive and emphatic force of the phrase in natural English, introducing another argument against the idols.
- source_word: αὐτῶν τῶν Χαλδαίων
  chosen: some of the Chaldeans
  alternatives:
  - the Chaldeans themselves
  - those very Chaldeans
  lexicon: LSJ
  rationale: The genitive with αὐτῶν is intensive ('of them themselves'); in English, 'some of the Chaldeans' best fits the participial construction that follows and avoids awkward literalism while preserving that the idolaters' own people are in view.
- source_word: ἀτιμαζόντων
  chosen: dishonor
  alternatives:
  - treat with contempt
  - despise
  lexicon: LSJ
  rationale: A straightforward rendering of the participle indicating contemptuous treatment of the idols; 'dishonor' is concise and fits the polemical context.
- source_word: αὐτά
  chosen: them
  alternatives:
  - the idols
  - those things
  lexicon: LSJ
  rationale: The pronoun refers back to the idols. 'Them' preserves the Greek anaphora without over-specifying in the main text.
- source_word: ἐνεὸν
  chosen: a mute person
  alternatives:
  - a dumb man
  - someone mute
  lexicon: LSJ
  rationale: Refers to one unable to speak. 'Mute person' is accurate modern English and avoids archaic or potentially pejorative wording.
- source_word: οὐ δυνάμενον λαλῆσαι
  chosen: who cannot speak
  alternatives:
  - unable to talk
  - not able to speak
  lexicon: LSJ
  rationale: This participial phrase explicates ἐνεόν; 'who cannot speak' is clear and idiomatic.
- source_word: προσενεγκάμενοι τὸν Βῆλον
  chosen: they bring him before Bel
  alternatives:
  - having brought him to Bel
  - they present him to Bel
  lexicon: LSJ
  rationale: The participle is attendant to the main verb and naturally rendered with a finite verb in English. The object is understood to be the mute person; 'before Bel' conveys presentation to the deity/image.
- source_word: Βῆλον
  chosen: Bel
  alternatives:
  - Belus
  lexicon: LSJ
  rationale: Standard transliteration of the divine name, in keeping with the philosophy of transliterating names.
- source_word: ἐξιοῦσιν φωνῆσαι
  chosen: ask that he make him speak
  alternatives:
  - request that he give speech
  - entreat him to make him speak
  lexicon: LSJ
  rationale: 'The verb conveys making a demand/request; the infinitive φωνῆσαι here is causative in sense in context: they ask Bel to cause the mute person to speak.'
- source_word: ὡς δυνατοῦ ὄντος αὐτοῦ αἰσθέσθαι
  chosen: as though he were able to perceive
  alternatives:
  - as if he were capable of understanding
  - as though he could take notice
  lexicon: LSJ
  rationale: 'αἰσθέσθαι denotes perception or awareness. ''Perceive'' preserves the irony: they act as if Bel can sense and respond.'
