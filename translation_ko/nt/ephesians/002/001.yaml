  text: And you were dead in your trespasses and sins,
translation:
  language: ko
  text: 또한 여러분도 여러분의 범죄와 죄들로 인하여 죽어 있던 자였습니다[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 본문은 1절을 분사 구문(ὄντας νεκρούς)으로 열어 5절의 본동사(συνεζωοποίησεν, 「함께 살리셨다」)까지 종결을 미룬다. 한국어 본문에서도 1–4절을 분사·연결어미로 이어 5절에서 종결한다.
    reason: structural_note
lexical_decisions:
- source_word: νεκροὺς τοῖς παραπτώμασιν καὶ ταῖς ἁμαρτίαις
  english_pob_choice: dead in your trespasses and sins
  chosen_korean: 범죄와 죄들로 인하여 죽어 있던 자
  alternatives_korean:
  - 허물과 죄로 죽었던 자
  - 범죄와 죄에 빠져 죽어 있던 자
  lexicon: BDAG
  rationale: 여격 τοῖς παραπτώμασιν/ταῖς ἁμαρτίαις은 죽음의 원인·영역을 가리킨다. 「인하여 죽어 있던」으로 옮기되, 본문 시제(분사 ὄντας)의 상태성을 살린다.
theological_decisions:
- issue: 2:1–10 단락의 「죽음→살림」 구조의 한국어 처리
  chosen_reading: 1–4절은 분사·종속절로 이어 5절에서 본동사 「함께 살리셨다」가 본문 전체를 회전시키도록 한다. 「은혜로」(χάριτί ἐστε σεσῳσμένοι, 5b)는 본동사 절 안에 삽입되어 본문 흐름과 일치한다.
  alternative_readings:
  - 1절을 독립 문장으로 마치고 새 문장 5절을 시작하기
  rationale: 헬라어 본문은 죽음의 상태(1–3)와 살림의 행위(4–5) 사이의 신학적 긴장을 한 문장 안에서 폭로한다. 한국어에서도 이 흐름을 살려 「죽었던 우리를 … 살리셨다」의 단일 진술이 절정에 이르게 한다.
  doctrine_reference: 'PHILOSOPHY.md: Preserve rhetorical structure where it carries theological weight.'
