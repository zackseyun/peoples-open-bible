    issue: La nota [a] no corresponde al aparato inglés ni a una ambigüedad real del español.
    rationale: El inglés POB usa la nota a para explicar la literalidad hebrea ‘houses for the bars’ (receptáculos/soportes), mientras que el borrador la coloca sobre ‘oro’ y ‘cubrirás de oro’, algo ya transparente en español y no preservado como nota en la auditoría.
  - severity: low
    issue: ‘Cubrirás de oro’ es menos preciso que ‘recubrirás de oro’.
    rationale: צפה en piel aquí indica revestir/recubrir con metal, no simplemente cubrir en sentido general. ‘Recubrirás’ conserva mejor el matiz artesanal del original y del inglés ‘overlay’.
  - severity: low
    issue: Falta la nota de alternativa para ‘marcos’.
    rationale: El expediente inglés conserva la alternativa ‘boards’ para הַקְּרָשִׁים. Dado que ‘marcos’ puede sonar interpretativo en español, conviene preservar la alternativa ‘tablas’ en nota, como hizo el inglés con ‘boards’.
  revised_spanish_text: Recubrirás de oro los marcos[a], harás sus anillos de oro como soportes para las barras[b], y recubrirás de oro las barras.
