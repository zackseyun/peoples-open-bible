  - su = el Señor
  rationale: Se conserva el pronombre posesivo sin insertar 'Dios' en el texto, pero el contexto obliga a entender que se refiere a Dios. Esto preserva la tensión exegética documentada por el audit trail.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.
translation_notes:
