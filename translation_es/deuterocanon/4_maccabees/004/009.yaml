translation:
  language: es
  text: mientras los sacerdotes[a], con mujeres y niños, estaban en el templo suplicando a Dios que defendiera el lugar que estaba siendo tratado con desprecio,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lugar despreciado» o «el lugar deshonrado». La expresión griega presenta el sitio sagrado como objeto de menosprecio o de trato contemptuoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερέων
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes del templo
  - varones sacerdotes
  lexicon: LSJ
  rationale: En contexto cultual judío, ἱερεύς se refiere de manera natural a los sacerdotes. 'Sacerdotes' es el equivalente directo, claro y no recargado en español.
- source_word: μετὰ γυναικῶν καὶ παιδίων
  english_pob_choice: with women and children
  chosen_spanish: con mujeres y niños
  alternatives_spanish:
  - con sus esposas y niños
  - junto con mujeres y niños
  lexicon: LSJ
  rationale: El griego solo dice 'con mujeres y niños' y no especifica que las mujeres sean esposas. Se conserva esa amplitud sin añadir posesivo ni precisar más de lo que el texto da.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el santuario
  - en el recinto del templo
  lexicon: LSJ
  rationale: ἱερόν suele designar el complejo del templo o el templo como lugar sagrado. 'Templo' es la opción más natural y fiel en español.
- source_word: ἱκετευόντων
  english_pob_choice: imploring
  chosen_spanish: suplicando
  alternatives_spanish:
  - rogando
  - implorando
  lexicon: LSJ
  rationale: El participio expresa una petición intensa y urgente. 'Suplicando' comunica bien esa fuerza en español actual sin perder dignidad.
- source_word: ὑπερασπίσαι
  english_pob_choice: to defend
  chosen_spanish: que defendiera
  alternatives_spanish:
  - que protegiera
  - que saliera en defensa de
  lexicon: LSJ
  rationale: El infinitivo apunta a defender o proteger activamente frente a una amenaza. En la construcción española, 'que defendiera' reproduce con naturalidad la idea de petición dirigida a Dios.
- source_word: τοῦ καταφρονουμένου τόπου
  english_pob_choice: the place that was being treated with contempt
  chosen_spanish: el lugar tratado con desprecio
  alternatives_spanish:
  - el lugar despreciado
  - el lugar deshonrado
  - el lugar que estaba siendo despreciado
  lexicon: LSJ
  rationale: καταφρονέω puede significar menospreciar o tratar con desprecio. 'Lugar tratado con desprecio' mantiene el pasivo y el matiz de ultraje sin forzar una paráfrasis más libre.
- source_word: δὲ
  english_pob_choice: while
  chosen_spanish: mientras
  alternatives_spanish:
  - y
  - pero
  lexicon: LSJ
  rationale: Aquí δέ introduce el trasfondo narrativo de la escena. 'Mientras' conserva el valor de acción simultánea y el encuadre temporal del participio.
theological_decisions:
- issue: Referencia de 'el lugar' (τόπος)
  english_pob_reading: the sacred place refers to the temple site under desecrating threat
  chosen_spanish_reading: el lugar se entiende como el sitio sagrado del templo bajo amenaza de ultraje
  alternative_spanish_readings:
  - la ciudad en sentido más amplio
  - el santuario en sentido más restringido
  rationale: El contexto inmediato menciona a los sacerdotes 'en el templo', por lo que τόπος apunta de manera más probable al lugar sagrado del templo. La traducción conserva 'lugar' para no estrechar indebidamente el referente.
  doctrine_reference: Contexto cultual del templo; lectura semántica del sustantivo τόπος en la escena
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en sentido, escena y decisión léxica principal; no se detectan revisiones aplicadas ni cambios sustantivos en la última pasada. La versión española sigue la lectura óptima-equivalente, manteniendo explícito el matiz de desprecio en τόπος y la simultaneidad de la acción narrativa.
  spanish_consistency_notes:
  - Se usó 'sacerdotes' para ἱερέων, en paralelo con el inglés POB y con el contexto del templo.
  - Se mantuvo la distinción entre 'templo' y 'lugar' para no fusionar ἱερόν y τόπος.
  - '''Suplicando'' conserva la intensidad de ἱκετευόντων sin volverlo artificial.'
  - La nota al pie preserva las alternativas léxicas relevantes para καταφρονουμένου.
  - La puntuación reproduce el encuadre narrativo con una sola oración larga, acorde al griego participial.
