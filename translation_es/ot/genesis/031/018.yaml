    issue: «sus ganados / los ganados» suena poco natural en español neutro
    rationale: מִקְנֶה es un colectivo; «ganado» en singular colectivo expresa mejor el sentido amplio y evita una formulación forzada.
  - severity: low
    issue: La nota al pie incluye el anglicismo «Canaán-ward»
    rationale: La nota debe estar plenamente en español. Puede explicarse el valor direccional con «hacia Canaán» o «en dirección a Canaán» sin introducir inglés.
  - severity: low
    issue: Puntuación algo pesada antes de «a la tierra de Canaán»
    rationale: Quitar la coma mejora el flujo y no altera la sintaxis ni el sentido del destino.
  revised_spanish_text: Y condujo todo su ganado y todas sus posesiones que había adquirido —el ganado que había adquirido en Padán-aram— para ir a Isaac su padre a la tierra de Canaán[a].
  revised_footnotes:
