    text: Or 'have trusted in shield and spear and bow and sling.' The Greek verb can carry the sense of hoping in or trusting in.
    reason: lexical_alternative
  - marker: b
    text: Or 'who ends wars.' Literally, 'the one who shatters wars.'
    reason: lexical_alternative
