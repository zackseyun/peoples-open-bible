translation:
  language: es
  text: Le cortaron la cabeza y le quitaron su armadura[a], y enviaron mensajeros por toda la tierra de los filisteos para dar la buena noticia a la casa de sus ídolos y al pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su equipo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְרְתוּ
  english_pob_choice: They cut off
  chosen_spanish: Le cortaron
  alternatives_spanish:
  - Le cercenaron
  - Le seccionaron
  lexicon: HALOT
  rationale: Con רֹאשׁוֹ como objeto, el verbo expresa cortar de forma violenta y completa; en español, «le cortaron» comunica con naturalidad la acción sin añadir matices no sustentados por el hebreo.
- source_word: רֹאשׁוֹ
  english_pob_choice: his head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - su cabeza
  lexicon: HALOT
  rationale: El sustantivo tiene sentido anatómico directo. Se omite el posesivo explícito en español por economía idiomática, quedando claramente referido a Saúl por el contexto.
- source_word: וַיַּפְשִׁיטוּ
  english_pob_choice: stripped off
  chosen_spanish: le quitaron
  alternatives_spanish:
  - despojaron
  - le arrancaron
  lexicon: HALOT
  rationale: El verbo significa despojar o quitar algo puesto. «Le quitaron» conserva la acción de despojo y evita una expresión demasiado técnica o arcaica.
- source_word: כֵּלָיו
  english_pob_choice: his armor
  chosen_spanish: su armadura
  alternatives_spanish:
  - sus armas
  - su equipo
  lexicon: HALOT
  rationale: En este contexto bélico, כֵּלִים puede referirse al armamento/equipo. «Armadura» es una equivalencia natural en español y sigue la decisión inglesa de concretar el sentido militar más probable.
- source_word: וַיְשַׁלְּחוּ
  english_pob_choice: sent messengers
  chosen_spanish: enviaron mensajeros
  alternatives_spanish:
  - mandaron mensajeros
  - enviaron
  lexicon: HALOT
  rationale: El verbo es simplemente «enviar», pero el contexto exige entender emisarios encargados de la proclamación. «Mensajeros» explicita esa función sin sobreinterpretar.
- source_word: בְאֶרֶץ פְּלִשְׁתִּים סָבִיב
  english_pob_choice: throughout the land of the Philistines all around
  chosen_spanish: por toda la tierra de los filisteos, alrededor
  alternatives_spanish:
  - por toda la tierra de los filisteos
  - en toda la tierra de los filisteos, por todos lados
  lexicon: HALOT
  rationale: La combinación de בְאֶרֶץ con סָבִיב indica difusión amplia por el territorio. «Por toda la tierra... alrededor» mantiene tanto la amplitud territorial como la idea distributiva de סָבִיב.
- source_word: לְבַשֵּׂר
  english_pob_choice: to proclaim the good news
  chosen_spanish: para dar la buena noticia
  alternatives_spanish:
  - para anunciar la noticia
  - para proclamar la buena noticia
  lexicon: HALOT
  rationale: El piel de בשר conlleva anunciar una noticia con fuerza comunicativa; en el marco narrativo aquí es un anuncio triunfal desde la perspectiva filistea. «Dar la buena noticia» preserva esa carga verbal sin traducir mecánicamente.
- source_word: בֵּית עֲצַבֵּיהֶם
  english_pob_choice: the house of their idols
  chosen_spanish: la casa de sus ídolos
  alternatives_spanish:
  - el templo de sus ídolos
  - la casa de sus imágenes
  lexicon: HALOT
  rationale: בֵּית puede significar casa o templo/santuario. «Casa de sus ídolos» se mantiene cercano al hebreo y conserva el matiz polémico de עֲצַבִּים como objetos de culto falso.
- source_word: וְאֶת הָעָם
  english_pob_choice: and to the people / and among the people
  chosen_spanish: y al pueblo
  alternatives_spanish:
  - y a la gente
  - y entre el pueblo
  lexicon: HALOT
  rationale: La construcción final extiende la proclamación al pueblo en general. «Al pueblo» es la forma más natural en español y refleja el alcance del anuncio sin forzar una preposición interpretativa.
theological_decisions:
- issue: Caracterización del anuncio como «buena noticia»
  english_pob_reading: to proclaim the good news
  chosen_spanish_reading: para dar la buena noticia
  alternative_spanish_readings:
  - para anunciar la noticia
  - para proclamar la buena noticia
  rationale: Aunque el contenido es macabro desde la perspectiva bíblica, el hebreo usa לְבַשֵּׂר, verbo de anunciar noticia favorable. Se conserva esa tensión en español sin suavizar el tono narrativo ni moralizarlo.
  doctrine_reference: Narrative voice and lexical force; semantic range of בשר
- issue: Renderización de עֲצַבִּים
  english_pob_reading: their idols
  chosen_spanish_reading: sus ídolos
  alternative_spanish_readings:
  - sus imágenes
  - sus estatuas
  rationale: «Ídolos» transmite el sentido cultual y la carga polémica del término, evitando neutralizarlo con «imágenes» cuando el contexto habla de culto falso.
  doctrine_reference: Idolatry language in Hebrew Bible; polemical cultic terminology
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del audit trail que añadió la idea distributiva de סָבִיב («alrededor») y la fuerza de לְבַשֵּׂר como «dar la buena noticia», además de la aclaración de que el destino del anuncio son dos receptores: la casa de sus ídolos y el pueblo.'
  spanish_consistency_notes:
  - Se mantiene «filisteos» para פְּלִשְׁתִּים, conforme a la convención bíblica en español.
  - Se usa «ídolos» para עֲצַבִּים en continuidad con el sentido polémico del hebreo.
  - «Buena noticia» conserva la fuerza verbal de לְבַשֵּׂר sin introducir lenguaje cristológico ajeno al pasaje.
  - El pronombre clítico en «Le cortaron» y «le quitaron» remite claramente a Saúl por el contexto inmediato.
