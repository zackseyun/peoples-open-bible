    unchanged: false
    changes_summary: Adjusted 'sealed copy' and 'open copy' to 'sealed one' and 'open one' to more directly reflect the Hebrew, which refers back to the deed/documents rather than explicitly repeating 'copy.'
translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos[a], el Dios de Israel: Toma estos documentos, este documento de compra, tanto el sellado como este abierto[b], y ponlos en una vasija de barro, para que permanezcan por muchos días.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de las huestes'. El hebreo צְבָאוֹת puede referirse a los ejércitos celestiales o, más ampliamente, al dominio soberano de Yahvé sobre todas las fuerzas.
    reason: lexical_alternative
  - marker: b
    text: O 'este documento no sellado'. El hebreo contrasta el documento abierto con el sellado.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre del pacto sin sustituirlo por una convención de ocultamiento.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los huestes
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: En español, 'de los ejércitos' comunica de forma natural el título divino y conserva la idea de dominio soberano sobre fuerzas celestiales y terrenales.
- source_word: לָק֣וֹחַ
  english_pob_choice: Take
  chosen_spanish: Tomen
  alternatives_spanish:
  - Toma
  - Reciban
  lexicon: HALOT
  rationale: La forma funciona como instrucción imperativa en el contexto; el plural se ajusta al mandato dirigido a los destinatarios implícitos.
- source_word: הַסְּפָרִים הָאֵלֶּה
  english_pob_choice: these documents
  chosen_spanish: estos documentos
  alternatives_spanish:
  - estos rollos
  - estos escritos
  lexicon: HALOT
  rationale: סְפָרִים puede abarcar documentos escritos en general; 'documentos' conserva la amplitud legal sin forzar 'rollos' en un contexto jurídico.
- source_word: סֵפֶר הַמִּקְנָה
  english_pob_choice: this deed of purchase
  chosen_spanish: este documento de compra
  alternatives_spanish:
  - esta escritura de compra
  - este contrato de compra
  lexicon: HALOT
  rationale: La expresión alude al registro legal de la compraventa. 'Documento de compra' mantiene la función documental con estilo claro y moderno, sin sobrecargar con tecnicismos no exigidos por el hebreo.
- source_word: הֶחָתוּם
  english_pob_choice: the sealed one
  chosen_spanish: el sellado
  alternatives_spanish:
  - el documento sellado
  - el ejemplar sellado
  lexicon: HALOT
  rationale: El hebreo vuelve sobre el documento ya mencionado; por eso 'el sellado' conserva la referencia anafórica sin añadir 'copia' de manera innecesaria.
- source_word: סֵפֶר הַגָּלוּי
  english_pob_choice: this open one
  chosen_spanish: este abierto
  alternatives_spanish:
  - este documento abierto
  - este ejemplar abierto
  - este no sellado
  lexicon: HALOT
  rationale: Se mantiene el contraste con 'el sellado' y se refleja la referencia al documento no sellado. 'Abierto' es la opción más breve y fiel al paralelismo hebreo.
- source_word: בִּכְלִי חָרֶשׂ
  english_pob_choice: in an earthenware vessel
  chosen_spanish: en una vasija de barro
  alternatives_spanish:
  - en una vasija de arcilla
  - en un recipiente de barro
  lexicon: HALOT
  rationale: '''Vasija de barro'' es una equivalencia natural en español para un recipiente de arcilla cocida y conserva la imagen material sin exceso de formalidad.'
- source_word: לְמַעַן יַעַמְד֖וּ יָמִ֥ים רַבִּֽים
  english_pob_choice: so that they may last for many days
  chosen_spanish: para que permanezcan por muchos días
  alternatives_spanish:
  - para que duren mucho tiempo
  - a fin de que se conserven por muchos días
  lexicon: HALOT
  rationale: יַעַמְדוּ expresa permanencia/continuidad, no 'estar de pie' literalmente; 'permanezcan' mantiene la idea de conservación prolongada en un español natural.
theological_decisions:
- issue: Título divino con el Tetragrámaton y צְבָאוֹת
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de hosts
  - Yahvé de las huestes
  rationale: Se preserva el nombre divino revelado y se traduce צְבָאוֹת con un término comprensible en español que mantiene el sentido de poder soberano. No se sustituye por 'SEÑOR' porque el proyecto distingue el nombre propio de un título reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza documental de los objetos a guardar
  english_pob_reading: these documents, this deed of purchase, both the sealed one and this open one
  chosen_spanish_reading: estos documentos, este documento de compra, tanto el sellado como este abierto
  alternative_spanish_readings:
  - estos rollos, esta escritura de compra, tanto el sellado como este abierto
  - estos escritos, este contrato de compra, tanto el sellado como este abierto
  rationale: El hebreo describe registros legales; la formulación española conserva esa función sin imponer una interpretación eclesiástica o un tecnicismo ajeno al contexto. Se mantiene la tensión entre documento general y documento específico, así como entre sellado y abierto.
  doctrine_reference: Nota lexical sobre סֵפֶר en contexto jurídico
translation_notes:
  revision_awareness: La redacción refleja la revisión reciente que prefirió una referencia más directa al antecedente del hebreo ('el sellado' / 'este abierto') en lugar de 'copia sellada' / 'copia abierta'. Se conservó ese ajuste en español para no añadir explícitamente 'copia' donde el original simplemente retoma el documento ya mencionado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal para יְהוָה, conforme al criterio del proyecto.
  - '''Documentos'' se usa para הַסְּפָרִים הָאֵלֶּה y ''documento de compra'' para סֵפֶר הַמִּקְנָה, distinguiendo el plural general del registro específico.'
  - '''El sellado'' y ''este abierto'' respetan la economía del hebreo y evitan sobretraducir con ''copia'' sin necesidad explícita.'
  - '''Vasija de barro'' conserva un registro claro y bíblico en español, sin perder el matiz material de la expresión hebrea.'
