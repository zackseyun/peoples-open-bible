translation:
  language: es
  text: Y si por falta de fuerza se le impide pecar, cuando encuentre una oportunidad, hará el mal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hará daño»; el verbo griego puede significar hacer el mal en general o perjudicar más concretamente a otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλαττώματος
  english_pob_choice: lack
  chosen_spanish: falta
  alternatives_spanish:
  - carencia
  - deficiencia
  - insuficiencia
  lexicon: LSJ
  rationale: El genitivo con ὑπό expresa la causa del impedimento; «falta» reproduce esa idea de carencia de manera natural en español y evita cargar el término con un matiz moral que el griego no exige aquí.
- source_word: ἰσχύος
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - capacidad
  - vigor
  lexicon: LSJ
  rationale: ἰσχύς puede significar fuerza o capacidad. «Fuerza» conserva la imagen de incapacidad para realizar la acción y suena más fluido en español junto con «falta de».
- source_word: κωλυθῇ
  english_pob_choice: is prevented
  chosen_spanish: se le impide
  alternatives_spanish:
  - es impedido
  - se le obstaculiza
  - se le frena
  lexicon: LSJ
  rationale: El pasivo subjuntivo tras ἐάν expresa un impedimento externo o circunstancial. «Se le impide» comunica bien esa noción sin volverlo reflexivo ni demasiado técnico.
- source_word: ἁμαρτεῖν
  english_pob_choice: from sinning
  chosen_spanish: pecar
  alternatives_spanish:
  - de pecar
  - de hacer mal
  - de cometer pecado
  lexicon: LSJ
  rationale: En español, tras «se le impide» el infinitivo simple «pecar» es idiomático y mantiene la categoría moral explícita en el griego sin sobreexplicar.
- source_word: καιρόν
  english_pob_choice: an opportunity
  chosen_spanish: una oportunidad
  alternatives_spanish:
  - el momento oportuno
  - una ocasión
  - la ocasión
  lexicon: LSJ
  rationale: Aquí καιρός no es solo tiempo cronológico, sino ocasión favorable. «Una oportunidad» transmite bien ese matiz en español moderno.
- source_word: κακοποιήσει
  english_pob_choice: he will do evil
  chosen_spanish: hará el mal
  alternatives_spanish:
  - hará daño
  - actuará malvadamente
  - hará el mal a otros
  lexicon: LSJ
  rationale: El futuro de κακοποιέω puede denotar hacer el mal en general o causar daño. «Harà el mal» conserva la amplitud moral del griego y deja abierta la posibilidad de daño a otros sin estrechar el sentido.
theological_decisions:
- issue: Diagnóstico moral del versículo
  english_pob_reading: The verse teaches that inability to commit sin does not equal righteousness; given opportunity, the person will act wickedly.
  chosen_spanish_reading: El versículo enseña que no pecar solo por incapacidad no equivale a justicia; si se presenta la oportunidad, la persona hará el mal.
  alternative_spanish_readings:
  - El versículo podría entenderse más estrechamente como referencia a hacer daño a otros más que al mal en general.
  - El versículo podría suavizarse como una simple observación sobre conducta impropia cuando aparece la ocasión.
  rationale: La construcción griega contrapone ἁμαρτεῖν y κακοποιήσει para un diagnóstico moral amplio. La traducción española mantiene esa tensión sin reducirla a un daño específico ni suavizarla hasta perder fuerza.
  doctrine_reference: 'Principio de traducción: conservar la tensión moral y no resolverla artificialmente; español claro y digno, no arcaizante.'
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego de Swete 1909 y coincide con la línea de auditoría inglesa; no se detectaron revisiones posteriores que alteren la lectura. Se preserva la amplitud semántica de κακοποιήσει sin estrecharla indebidamente.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» según corresponda en otros pasajes; este versículo no contiene esos términos.
  - Se usa «pecar» para ἁμαρτεῖν y «hacer el mal» para κακοποιήσει, conservando la distinción del original.
  - «Falta de fuerza» refleja la relación causal del griego mejor que una paráfrasis moralizante.
