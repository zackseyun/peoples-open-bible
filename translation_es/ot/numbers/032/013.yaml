translation:
  language: es
  text: Así se encendió la ira de Yahvé contra Israel[a], y los hizo vagar en el desierto durante cuarenta años[b], hasta que llegó a su fin toda la generación que había hecho lo malo ante los ojos de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé estaba airado con Israel». El hebreo es un modismo que literalmente dice que la ‘nariz/ira’ de Yahvé ardió.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hizo que vagaran en el desierto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: the LORD’s anger burned
  chosen_spanish: se encendió la ira
  alternatives_spanish:
  - se inflamó la ira
  - ardió la ira
  lexicon: HALOT
  rationale: El hebreo usa un modismo de ira que literalmente incluye la idea de ‘arder’. En español, ‘se encendió la ira’ conserva la imagen sin sonar forzado. ‘Se inflamó’ y ‘ardió’ también son posibles, pero ‘se encendió’ es claro y natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del texto hebreo con la forma española ‘Yahvé’, siguiendo el criterio del proyecto para יְהוָה. No se sustituye por un título, porque el nombre propio tiene valor textual y teológico.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - con Israel
  - sobre Israel
  lexicon: HALOT
  rationale: Con verbos de ira, el hebreo expresa el objeto del enojo. En español, ‘contra Israel’ transmite mejor esa relación que una preposición más neutral.
- source_word: וַיְנִעֵם
  english_pob_choice: he made them wander
  chosen_spanish: los hizo vagar
  alternatives_spanish:
  - los hizo errar
  - los hizo andar de un lado a otro
  - los causó a vagar
  lexicon: HALOT
  rationale: El causativo del verbo comunica que Dios produjo la errancia. ‘Los hizo vagar’ mantiene la fuerza causal y suena natural en español bíblico actual.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: por el desierto
  alternatives_spanish:
  - en el desierto
  - por la región desértica
  lexicon: HALOT
  rationale: En este contexto del éxodo, ‘desierto’ comunica bien la referencia bíblica en español. Se usa ‘por’ para reflejar el sentido de tránsito del verbo ‘hacer vagar’.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: durante cuarenta años
  alternatives_spanish:
  - por cuarenta años
  - cuarenta años
  lexicon: HALOT
  rationale: La expresión temporal en español se expresa con naturalidad mediante ‘durante’. Conserva el valor de duración del período de juicio.
- source_word: עַד תֹּם
  english_pob_choice: until ... had come to an end
  chosen_spanish: hasta que llegó a su fin
  alternatives_spanish:
  - hasta que terminó
  - hasta el fin de
  lexicon: HALOT
  rationale: La idea de culminación se conserva con ‘llegó a su fin’, que reproduce bien el sentido de completarse o acabarse.
- source_word: כָּל הַדּוֹר
  english_pob_choice: all the generation
  chosen_spanish: toda la generación
  alternatives_spanish:
  - la generación entera
  - todo aquel pueblo
  lexicon: HALOT
  rationale: ‘Toda la generación’ preserva el totalizador de כָּל y mantiene la referencia colectiva sin añadir un demostrativo no explícito.
- source_word: הָעֹשֶׂה הָרַע
  english_pob_choice: that had done evil
  chosen_spanish: que había hecho lo malo
  alternatives_spanish:
  - que hacía lo malo
  - que hizo el mal
  lexicon: HALOT
  rationale: En español, la construcción relativa en pasado perfecto comunica la acción previa al juicio. ‘Lo malo’ evita una abstracción innecesaria y sigue fielmente el valor moral del hebreo.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el modismo evaluativo con una expresión española natural y suficientemente literal. ‘Ante los ojos de Yahvé’ mantiene la metáfora de evaluación del texto hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea el Tetragrama de forma directa. Se traduce con el nombre propio ‘Yahvé’ para preservar la identidad revelada del Dios del pacto, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Descripción de la ira divina
  english_pob_reading: the LORD’s anger burned against Israel
  chosen_spanish_reading: se encendió la ira de Yahvé contra Israel
  alternative_spanish_readings:
  - Yahvé se enojó con Israel
  - la ira de Yahvé ardió contra Israel
  rationale: Se mantiene la imagen hebrea del ardor de la ira sin suavizarla. La formulación conserva la fuerza teológica del juicio divino y evita reducir el modismo a una simple nota emocional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del registro inglés y mantiene sin cambios las decisiones revisadas: Yahvé para יְהוָה, la imagen de ira ‘encendida/ardida’, y el valor causativo de וַיְנִעֵם. No se documentan revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ de forma consistente para el nombre divino en el texto principal y en notas.
  - ‘Desierto’ se usa para מִדְבָּר en coherencia con el contexto del éxodo y con el registro bíblico en español.
  - ‘Hizo vagar’ conserva el matiz causativo del hebreo sin introducir una interpretación más fuerte que la del original.
  - ‘Ante los ojos de Yahvé’ preserva el modismo evaluativo sin reemplazarlo por una paráfrasis doctrinal.
