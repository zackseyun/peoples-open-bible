revisions:
- from: Él que es demasiado pobre para una ofrenda[a] escoge madera que no se pudra; se busca para sí un artesano hábil para preparar un ídolo[b] que no se tambalee.
  to: El que es demasiado pobre para una ofrenda[a] escoge madera que no se pudra; busca para sí un artesano hábil para preparar un ídolo[b] que no se tambalee.
  rationale: 'Se hicieron correcciones menores pero necesarias de español y fidelidad sintáctica: «Él que» → «El que»; «se busca para sí» → «busca para sí» para reflejar mejor יְבַקֶּשׁ לוֹ; y en la nota «constricción» → «construcción». No se requieren cambios teológicos ni de terminología principal.'
  reviewer_model: gpt-5.4
