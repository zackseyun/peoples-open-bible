  text: כָּל אֵ֜לֶּה בְּנֵ֤י יְדִֽיעֲאֵל֙ לְ/רָאשֵׁ֣י הָ/אָב֔וֹת גִּבּוֹרֵ֖י חֲיָלִ֑ים שִׁבְעָֽה עָשָׂ֥ר אֶ֨לֶף֙ וּ/מָאתַ֔יִם יֹצְאֵ֥י צָבָ֖א לַ/מִּלְחָמָֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/007/011.yaml
  text: All these were sons of Jediael[a], according to the heads of the fathers’ houses, mighty men of valor, seventeen thousand two hundred[d][c][b], able to go out in the army for war.
  footnotes:
  - marker: a
    text: Or “descendants of Jediael.” The Hebrew “sons of” can function broadly in genealogical lists.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “heads of the fathers’ houses,” that is, clan or family heads.
    reason: cultural_note
  - marker: c
    text: Or “mighty men of valor.”
    reason: lexical_alternative
  - marker: d
    text: Literally “those going out to the army for war,” an idiom for men available or eligible for military duty.
    reason: lexical_alternative
