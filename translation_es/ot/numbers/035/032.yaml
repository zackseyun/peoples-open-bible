translation:
  language: es
  text: No tomarán rescate[a] por el que huyó[b] a su ciudad de refugio, para que vuelva a habitar en la tierra antes de la muerte del sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo כֹּפֶר: «rescate», también con el sentido posible de «compensación» o «pago»; aquí se refiere a un precio legal sustitutivo.'
    reason: lexical_alternative
  - marker: b
    text: La sintaxis hebrea es compacta y también puede entenderse como una prohibición de pago relacionado con su permanencia en la ciudad de refugio o con su regreso de ella antes de que muera el sacerdote.
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּפֶר
  english_pob_choice: ransom
  chosen_spanish: rescate
  alternatives_spanish:
  - ransom
  - compensación
  - pago
  lexicon: HALOT
  rationale: כֹּפֶר designa un precio de rescate o pago sustitutivo en un contexto legal. En español, «rescate» comunica bien el valor jurídico del pago sin volverlo una simple «compensación» genérica ni una «multa» ajena al término. Se evita «soborno» porque la carga ética no la exige el hebreo aquí.
- source_word: לָנוּס
  english_pob_choice: for him who has fled
  chosen_spanish: el que huyó
  alternatives_spanish:
  - para huir
  - el fugitivo
  - el que ha huido
  lexicon: HALOT
  rationale: El contexto de la ciudad de refugio favorece a alguien ya en condición de fugitivo. «El que huyó» mantiene la referencia a la acción de huir sin forzar una finalidad en español y conserva la relación legal con la ciudad de refugio.
- source_word: עִיר מִקְלָטוֹ
  english_pob_choice: his city of refuge
  chosen_spanish: su ciudad de refugio
  alternatives_spanish:
  - la ciudad de su refugio
  - su ciudad asilo
  - su ciudad refugio
  lexicon: HALOT
  rationale: La expresión técnica se rinde de forma natural como «ciudad de refugio», ampliamente comprensible y fiel al uso legal. Se mantiene el posesivo implícito en el contexto, aunque el español no lo marque de manera tan rígida como el inglés.
- source_word: לָשׁוּב לָשֶׁבֶת בָּאָרֶץ
  english_pob_choice: to return to live in the land
  chosen_spanish: para que vuelva a habitar en la tierra
  alternatives_spanish:
  - para volver a vivir en la tierra
  - para que regrese a morar en la tierra
  - para retornar y habitar en la tierra
  lexicon: HALOT
  rationale: Los infinitivos hebreos combinan retorno y residencia. «Volver a habitar» preserva el valor durativo de לָשֶׁבֶת mejor que un simple «vivir», y «la tierra» mantiene la referencia territorial concreta del texto legal.
- source_word: עַד מוֹת הַכֹּהֵן
  english_pob_choice: before the death of the priest
  chosen_spanish: hasta la muerte del sacerdote
  alternatives_spanish:
  - antes de la muerte del sacerdote
  - hasta que muera el sacerdote
  lexicon: HALOT
  rationale: «Hasta la muerte del sacerdote» reproduce con sobriedad la restricción temporal del hebreo. En español puede leerse naturalmente como el límite legal antes del cual no se permite el cambio de estatus, sin añadir interpretación más allá del texto.
theological_decisions:
- issue: Naturaleza de la prohibición sobre el pago en relación con el fugitivo de la ciudad de refugio
  english_pob_reading: The verse forbids accepting any payment that would allow the manslayer to secure refuge or to return early to reside in the land before the priest's death.
  chosen_spanish_reading: El versículo prohíbe recibir cualquier rescate que altere la situación legal del homicida involuntario respecto de la ciudad de refugio y su regreso a habitar en la tierra antes de la muerte del sacerdote.
  alternative_spanish_readings:
  - La prohibición se refiere solo a un pago para salir anticipadamente de la ciudad de refugio.
  - La prohibición se refiere solo a un pago para entrar en la ciudad de refugio.
  rationale: 'El hebreo es compacto y no obliga a escoger una sola subhipótesis. La formulación española conserva la amplitud legal: el pago no debe servir para modificar el estatuto del fugitivo ni para adelantar su retorno, sin resolver la tensión sintáctica en una dirección más estrecha de la que permite el texto.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la relación del infinitivo con la ciudad de refugio y aclaró el vínculo de propósito/resultado antes de «return to live in the land». La redacción española sigue esa revisión al expresar al fugitivo ya en condición de huido y al usar «para que vuelva a habitar» para reflejar el movimiento legal completo.
  spanish_consistency_notes:
  - Se mantiene «ciudad de refugio» como término técnico estable.
  - Se eligió «rescate» para כֹּפֶר por su fuerza legal, coherente con el registro POB.
  - Se prefirió «sacerdote» para הַכֹּהֵן en español común y bíblico, sin introducir una glosa innecesaria.
  - «Tierra» se conserva como traducción directa de בָּאָרֶץ, siguiendo el valor territorial del pasaje.
