  language: en
  yaml_path: translation/deuterocanon/judith/011/013.yaml
  text: And the firstfruits of the grain and the tithes of the wine and of the oil[a], which they had set aside, having consecrated them for the priests who stand in Jerusalem before the face of our God—they have decided to consume[b], though it is not permitted for any of the people even to touch them with their hands.
  footnotes:
