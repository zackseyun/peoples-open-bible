lexical_decisions:
- source_word: μὴ ... νομίσῃς
  english_pob_choice: do not suppose
  chosen_spanish: no supongas
  alternatives_spanish:
  - no pienses
  - no consideres
  lexicon: BDAG
  rationale: νομίζω expresa aquí una valoración o juicio estimativo. «No supongas» conserva el tono de advertencia y funciona con naturalidad en español sin endurecerse en un calco.
- source_word: μικρὰν ... ἁμαρτίαν
  english_pob_choice: a small sin
  chosen_spanish: un pecado pequeño
  alternatives_spanish:
  - un pecado menor
  - un pecado leve
  lexicon: BDAG
  rationale: El adjetivo μικράν califica directamente ἁμαρτίαν. «Pecado pequeño» reproduce la idea de minimizar la gravedad del acto y suena claro en español actual.
- source_word: ταύτην
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - este acto
  - este asunto
  lexicon: BDAG
  rationale: El pronombre señala el hecho en discusión. «Esto» mantiene la deíxis sin añadir interpretación innecesaria.
- source_word: εἰ
  english_pob_choice: if we were to
  chosen_spanish: si hubiéramos
  alternatives_spanish:
  - si comiéramos
  - si llegáramos a comer
  lexicon: BDAG
  rationale: La cláusula es condicional e hipotética. «Si hubiéramos» conserva esa fuerza prospectiva en un español fluido y sobrio.
- source_word: μιεροφαγήσαμεν
  english_pob_choice: eat polluted food
  chosen_spanish: comer alimento contaminado
  alternatives_spanish:
  - comer alimento profanado
  - comer comida impura
  - comer alimento defileado
  lexicon: LSJ
  rationale: El verbo compuesto implica comer algo hecho impuro o profanado, especialmente en contexto de pureza ritual. «Alimento contaminado» comunica bien esa noción de contaminación religiosa sin perder legibilidad. En español, «contaminado» puede sonar físico; aquí se entiende por el contexto cultual del pasaje.
theological_decisions:
- issue: Cómo expresar la impureza en μιεροφαγήσαμεν sin suavizar el peso religioso del acto
  english_pob_reading: eat polluted food
  chosen_spanish_reading: comer alimento contaminado
  alternative_spanish_readings:
  - comer alimento impuro
  - comer alimento profanado
  - comer comida impura
  rationale: El contexto es de fidelidad martirial frente a alimentos prohibidos; la impureza es cultual/moral, no meramente higiénica. «Contaminado» preserva la idea de mancha ritual y mantiene el registro moderno y digno del texto.
  doctrine_reference: 'Tradición textual: conservar la tensión cultual del término sin sustituirla por un equivalente teológico posterior.'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «defiled food» a «polluted food» para reflejar con mayor directitud la contaminación ritual. La redacción española sigue esa revisión con «alimento contaminado», evitando un calco rígido y conservando la referencia cultual del verbo griego.
  spanish_consistency_notes:
  - Se usó «pecado pequeño» para mantener la relación directa entre μικρὰν y ἁμαρτίαν.
  - «Alimento» se prefirió a «comida» por su mayor neutralidad y porque permite una lectura más formal en un contexto de pureza ritual.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; el pasaje no contiene el nombre divino.
  - La subordinada condicional se dejó en un castellano hipotético natural sin borrar la advertencia evaluativa del original.
