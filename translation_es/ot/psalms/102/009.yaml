translation:
  language: es
  text: Todo el día mis enemigos me reprochan; los que se burlan de mí juran por mí[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis burladores juran contra mí» o «me usan como maldición en sus juramentos». La expresión hebrea es difícil; probablemente el nombre o la situación del salmista se ha vuelto objeto de lenguaje hostil en juramentos.'
    reason: alternative_reading
  - marker: b
    text: «Juran por mí» puede implicar una fórmula de desprecio o de maldición, más que un juramento neutral.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַיּוֹם
  english_pob_choice: All day long
  chosen_spanish: Todo el día
  alternatives_spanish:
  - Durante todo el día
  - Todo el día entero
  lexicon: HALOT
  rationale: La expresión hebrea es temporal e idiomática, con sentido de duración continua. «Todo el día» conserva bien ese valor en español natural y sobrio.
- source_word: חֵרְפוּנִי
  english_pob_choice: reproach me
  chosen_spanish: me reprochan
  alternatives_spanish:
  - me increpan
  - me insultan
  - me ultrajan
  lexicon: HALOT
  rationale: חָרַף expresa reproche o escarnio. «Reprochan» mantiene un registro formal y suficientemente amplio, sin reducir el sentido solo a insulto verbal.
- source_word: אוֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - los que me son hostiles
  - mis adversarios
  lexicon: HALOT
  rationale: La posesión es directa y natural en español. «Mis enemigos» es fiel y comunica con claridad la relación hostil.
- source_word: מְהוֹלָלַי
  english_pob_choice: those who mock me
  chosen_spanish: los que se burlan de mí
  alternatives_spanish:
  - mis burladores
  - los que me escarnecen
  - los que me ridiculizan
  lexicon: HALOT
  rationale: La forma hebrea es difícil y en contexto apunta a personas que tratan al salmista con desprecio o burla. «Los que se burlan de mí» expresa ese matiz sin forzar una solución demasiado técnica.
- source_word: בִּי
  english_pob_choice: by me
  chosen_spanish: por mí
  alternatives_spanish:
  - contra mí
  - en mí
  lexicon: HALOT
  rationale: Con נשבע, la construcción puede entenderse como jurar ‘por’ alguien o usarlo como referencia en lenguaje de juramento/maldición. «Por mí» conserva la ambigüedad útil en español y permite la nota explicativa.
- source_word: נִשְׁבָּעוּ
  english_pob_choice: swear
  chosen_spanish: juran
  alternatives_spanish:
  - juran un juramento
  - se juran
  - maldicen al jurar
  lexicon: HALOT
  rationale: El verbo básico es ‘jurar’. En este contexto hostil, el español «juran por mí» mantiene la literalidad funcional y deja abierta la posible carga peyorativa señalada en nota.
theological_decisions:
- issue: El valor hostil de «jurar por mí» frente a una lectura neutral de juramento
  english_pob_reading: Hebrew 'swear by me' may imply invoking the psalmist as a formula of cursing or contempt rather than a neutral oath.
  chosen_spanish_reading: «Juran por mí» con nota que aclara que puede implicar juramento hostil, uso de maldición o desprecio.
  alternative_spanish_readings:
  - juran contra mí
  - me usan en sus maldiciones
  - me invocan en sus juramentos de desprecio
  rationale: 'El hebreo permite una ambigüedad real: el hablante puede estar siendo usado como fórmula de juramento/censura. La línea principal conserva la forma más cercana al texto y la nota explicita la tensión semántica sin resolverla prematuramente.'
  doctrine_reference: Salmos 102:9; cf. el tratamiento de juramento/maldición en fórmulas hostiles del AT
translation_notes:
  revision_awareness: Se siguió la revisión más reciente indicada como sin cambios; no hubo ajustes posteriores al texto inglés auditado. La versión española mantiene la ambigüedad del hebreo en la línea principal y la desarrolla solo en nota.
  spanish_consistency_notes:
  - Se usó «Dios/Yahvé» solo cuando aparezca en otros contextos; aquí no aplica.
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se preservó la ambigüedad del verbo jurar en el contexto hostil mediante nota, en continuidad con el audit trail inglés.
