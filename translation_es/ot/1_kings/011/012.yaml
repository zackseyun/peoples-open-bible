translation:
  language: es
  text: Sin embargo[a], en tus días no lo haré, por amor a David, tu padre; de la mano de tu hijo[b] la arrancaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el reino anunciado en el versículo anterior.
    reason: cross_reference
  - marker: b
    text: 'O: «de manos de tu hijo». El hebreo dice literalmente «de la mano de tu hijo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  lexicon: HALOT
  rationale: אַךְ introduce una restricción o contraste frente al juicio previo. «Sin embargo» conserva el matiz concesivo/adversativo de forma natural en español.
- source_word: בְּיָמֶיךָ
  english_pob_choice: in your days
  chosen_spanish: en tus días
  alternatives_spanish:
  - durante tu vida
  - mientras vivas
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente dice «en tus días». «En tus días» preserva el giro y sigue siendo comprensible en español bíblico actual.
- source_word: לֹא אֶעֱשֶׂנָּה
  english_pob_choice: I will not do it
  chosen_spanish: no lo haré
  alternatives_spanish:
  - no haré eso
  - no lo haré en ese momento
  lexicon: HALOT
  rationale: El sufijo femenino remite a la acción ya anunciada de arrancar el reino. «Lo» mantiene la referencia anafórica sin sobreexplicar el antecedente.
- source_word: לְמַעַן דָּוִד אָבִיךָ
  english_pob_choice: for the sake of David your father
  chosen_spanish: por amor a David, tu padre
  alternatives_spanish:
  - por causa de David, tu padre
  - por consideración a David, tu padre
  lexicon: HALOT
  rationale: לְמַעַן expresa motivo o consideración favorable. «Por amor a» comunica bien el favor/cuidado mostrado a David sin reducirlo a mera causalidad mecánica.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - de manos de
  - fuera de la mano de
  lexicon: HALOT
  rationale: La imagen hebrea de «mano» señala poder o posesión. «De la mano de» conserva el idiomático y la idea de transferencia de dominio.
- source_word: בִּנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu descendiente
  - tu vástago
  lexicon: HALOT
  rationale: Término filial directo y claro; no hay razón contextual para variar el sentido básico.
- source_word: אֶקְרָעֶנָּה
  english_pob_choice: I will tear it away
  chosen_spanish: lo arrancaré
  alternatives_spanish:
  - lo desgarraré
  - lo separaré
  lexicon: HALOT
  rationale: קָרַע significa «rasgar/romper/arrancar». En este contexto de división del reino, «lo arrancaré» transmite la remoción violenta de una posesión o dominio y suena natural en español.
theological_decisions:
- issue: Aplazamiento del juicio anunciado sobre el reino
  english_pob_reading: The verse states that the announced tearing away of the kingdom will be delayed until after Solomon's lifetime, specifically occurring in relation to his son.
  chosen_spanish_reading: El texto dice que el arrancamiento del reino no ocurrirá en los días de Salomón, sino en relación con su hijo.
  alternative_spanish_readings:
  - No lo haré durante tu vida
  - No lo ejecutaré en tus días
  rationale: El hebreo mantiene implícito el objeto mediante el contexto previo. La traducción conserva esa dependencia contextual sin añadir explicaciones ajenas al verso.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Motivación davídica del aplazamiento
  english_pob_reading: The delay is grounded in God's regard for David.
  chosen_spanish_reading: El aplazamiento se presenta como acto de consideración amorosa hacia David.
  alternative_spanish_readings:
  - por causa de David
  - por consideración a David
  rationale: לְמַעַן no exige una causalidad fría; en este contexto expresa motivo favorable o consideración pactal. «Por amor a» mantiene esa tensión entre motivo y benevolencia.
  doctrine_reference: 1 Reyes 11:12; 2 Samuel 7
translation_notes:
  revision_awareness: Se revisó el verso para mantener la relación anafórica con el juicio previo, conservar el idiomatismo hebreo de «en tus días» y respetar la imagen de «la mano» como esfera de poder. No se encontraron revisiones textuales o cambios de última hora que alteren el sentido base.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se eligió «tu hijo» para בִּנְךָ siguiendo el término filial directo del hebreo.
  - Se conservó «de la mano de» para no perder el valor idiomático de transferencia de dominio.
  - «Sin embargo» traduce el valor restrictivo de אַךְ sin volverlo más fuerte que el hebreo.
  - «Lo» en «no lo haré» y «lo arrancaré» reproduce la referencia implícita al reino anunciado en el contexto inmediato.
