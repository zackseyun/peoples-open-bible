translation:
  language: es
  text: He aquí[a], bienaventurado[b] el hombre[c] a quien Dios reprende[d]; por tanto, no desprecies la disciplina[e] del Todopoderoso[f].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira» o «Ved»; la partícula hebrea llama la atención sobre una afirmación importante.
    reason: lexical_alternative
  - marker: b
    text: O «feliz», «afortunado» o «dichoso»; la fórmula hebrea expresa una condición de bendición envidiable.
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa un singular humano genérico; aquí se conserva la forma masculina representativa del proverbio.
    reason: lexical_alternative
  - marker: d
    text: O «corrige» o «reprocha»; el verbo tiene fuerza de corrección disciplinaria.
    reason: lexical_alternative
  - marker: e
    text: O «corrección», «instrucción» o «castigo correctivo»; en este contexto, «disciplina» comunica mejor la corrección formativa.
    reason: lexical_alternative
  - marker: f
    text: 'Hebreo: «Shaddai», tradicionalmente traducido «el Todopoderoso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  - Ved
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática y llama la atención sobre una declaración sapiencial importante. «He aquí» conserva mejor ese valor discursivo solemne que omitirla o suavizarla demasiado.
- source_word: אַשְׁרֵי
  english_pob_choice: blessed is
  chosen_spanish: bienaventurado
  alternatives_spanish:
  - feliz
  - afortunado
  - dichoso
  lexicon: HALOT
  rationale: La fórmula hebrea expresa un estado envidiable de bendición, no solo una emoción. «Bienaventurado» mantiene el tono de beatitud sapiencial con dignidad bíblica en español.
- source_word: אֱנוֹשׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - el ser humano
  - el mortal
  lexicon: HALOT
  rationale: El sustantivo funciona aquí como singular representativo de una persona humana en un dicho sapiencial. «El hombre» preserva la forma proverbial y el matiz genérico masculino del hebreo, coherente con la decisión del POB en inglés.
- source_word: יוֹכִחֶנּוּ
  english_pob_choice: whom God reproves
  chosen_spanish: a quien Dios reprende
  alternatives_spanish:
  - a quien Dios corrige
  - a quien Dios reprocha
  - a quien Dios amonesta
  lexicon: HALOT
  rationale: El hiphil de יכח aquí apunta a reprensión/corrección disciplinaria. «Reprende» conserva la fuerza correctiva sin volver el verbo meramente polémico o jurídico.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Altísimo
  lexicon: HALOT
  rationale: Es el equivalente directo del título divino en el versículo. No hay aquí una razón para ampliarlo más allá de «Dios».
- source_word: מוּסַר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - corrección
  - instrucción
  - castigo disciplinario
  lexicon: HALOT
  rationale: En literatura sapiencial, מוסר suele ser corrección formativa o disciplina. «Disciplina» conserva el doble valor de corrección y formación mejor que «instrucción» sola.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: Siguiendo el criterio del POB de traducir títulos divinos, שַׁדַּי se vierte con el equivalente tradicional y significativo «el Todopoderoso».
- source_word: אַל תִּמְאָס
  english_pob_choice: do not despise
  chosen_spanish: no desprecies
  alternatives_spanish:
  - no rechaces
  - no desdeñes
  - no tengas en poco
  lexicon: HALOT
  rationale: El verbo expresa tratar algo como indigno o despreciable. «No desprecies» es idiomático en español y mantiene el peso moral de la advertencia.
theological_decisions:
- issue: Cómo reflejar la beatitud del hebreo אַשְׁרֵי
  english_pob_reading: blessed is the man
  chosen_spanish_reading: bienaventurado el hombre
  alternative_spanish_readings:
  - feliz el hombre
  - afortunado el hombre
  - dichoso el hombre
  rationale: La declaración no describe un estado emocional pasajero, sino una condición envidiable de favor y dicha bajo Dios. «Bienaventurado» conserva ese tono teológico y sapiencial sin perder inteligibilidad.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
- issue: Relación entre reprensión divina y מוסר
  english_pob_reading: whom God reproves ... the discipline of the Almighty
  chosen_spanish_reading: a quien Dios reprende ... la disciplina del Todopoderoso
  alternative_spanish_readings:
  - a quien Dios corrige ... la corrección del Todopoderoso
  - a quien Dios reprocha ... el castigo disciplinario del Todopoderoso
  rationale: 'El versículo presenta la corrección divina como señal de bienaventuranza, no como contradicción con la bondad de Dios. «Reprende» y «disciplina» mantienen esa tensión: hay dolor real, pero con propósito formativo.'
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
- issue: Renderización del masculino genérico אֱנוֹשׁ
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - el ser humano
  - el mortal
  rationale: El hebreo usa un singular masculino representativo en un proverbio sapiencial. Se conserva la forma masculina genérica en el texto principal, siguiendo la política de precisión de género del proyecto y el valor proverbial del original.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: 'Seguí la revisión auditada del POB inglés: la relación causal/ilativa quedó expresada con «por tanto», equivalente natural de la corrección de ''so'' a ''therefore''. No se introdujeron cambios que alteren el sentido o la tensión sapiencial del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלוֹהַּ, en continuidad con el principio del proyecto y el uso del POB en inglés.
  - Se tradujo שַׁדַּי como «el Todopoderoso», preservando el título divino tradicional sin dejar el hebreo sin explicar.
  - «Disciplina» se usa con su sentido sapiencial de corrección formativa, no en sentido meramente punitivo.
  - La puntuación separa la proposición de beatitud de la exhortación final, como en el hebreo y el POB inglés.
