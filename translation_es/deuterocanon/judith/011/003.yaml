review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: νῦν = «ahora», λέγε μοι = «dime», τίνος ἕνεκεν = «por qué», ἀπέδρας ἀπʼ αὐτῶν = «huyiste de ellos», ἦλθες πρὸς ἡμᾶς = «viniste a nosotros», e ἥκεις γὰρ εἰς σωτηρίαν = «porque has venido para …». La principal cuestión no es de fidelidad semántica global sino de naturalidad y precisión idiomática en español para πρὸς ἡμᾶς y εἰς σωτηρίαν.'
  spanish_quality_summary: 'El texto es comprensible, pero «viniste a nosotros» suena calcado en español bíblico natural; «viniste con nosotros» cambiaría el sentido, así que la mejor reparación es «viniste adonde nosotros estamos» o, más sencillamente, «viniste a vernos», aunque esto último añade matiz. Además, «para liberación» es inteligible pero menos idiomático que «para tu liberación» o «para ser librada»; sin embargo, añadir «tu» o voz pasiva introduce información no explícita. La solución más fiel y natural es «para salvación/liberación» con nota, o mejor «para ser librada», pero esto también explicita el referente. Dado el audit trail inglés revisado, conviene mantener el campo semántico de σωτηρία con una formulación española más natural: «para salvación» en el texto principal, con nota que preserve «liberación».'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías o δοῦλος. La decisión clave es σωτηρία. El borrador usa «liberación», alineado parcialmente con el inglés auditado («deliverance»), pero la nota actual es defectuosa porque ofrece «para liberación» como alternativa de una lectura ya usada en el texto. También «hacia salvación/liberación» es demasiado literal y poco natural en español de nota. Conviene dejar una nota que explique: «O “para liberación”; griego: “hacia/para salvación, liberación”».'
  issues:
  - severity: medium
    issue: «viniste a nosotros» es poco natural en español
    rationale: Aunque comprensible y cercano al griego πρὸς ἡμᾶς, en español suena calco. Se necesita una formulación más idiomática sin alterar la dirección hacia los interlocutores.
  - severity: medium
    issue: La nota al pie repite indebidamente la lectura principal
    rationale: Si el texto principal dice «para liberación», la nota no debe presentar «para liberación» como alternativa. Debe preservar alternativas reales, especialmente «para salvación».
  - severity: low
    issue: «hacia salvación/liberación» en la nota suena poco natural
    rationale: 'Como glosa técnica puede tolerarse, pero para una edición española legible es mejor «griego: “para/hacia salvación, liberación”» o una explicación equivalente más clara.'
  revised_spanish_text: Y ahora dime por qué huyiste de ellos y viniste a vernos; porque has venido para salvación[a].
  revised_footnotes:
