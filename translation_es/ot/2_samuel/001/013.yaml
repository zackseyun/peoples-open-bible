  text: David said to the young man who told him[a], “Where are you from?” And he said, “I am the son of an Amalekite sojourner.”
  footnotes:
  - marker: a
    text: Or “I am the son of a resident foreigner, an Amalekite.” The Hebrew phrase can be understood either as identifying his father as an Amalekite immigrant or, more broadly, as linking the speaker by descent to an Amalekite sojourning in the land.
