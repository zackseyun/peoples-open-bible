translation:
  language: es
  text: Cuando pequen contra ti —porque no hay nadie que no peque— y te enojes con ellos y los entregues[a] a un enemigo, y sus captores los lleven a una tierra lejana o cercana,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «delante de un enemigo». La expresión hebrea aquí significa entregarlos al poder de un enemigo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶחֶטְאוּ לָךְ
  english_pob_choice: they sin against you
  chosen_spanish: pequen contra ti
  alternatives_spanish:
  - pecan contra ti
  - cometan pecado contra ti
  lexicon: HALOT
  rationale: El hebreo con חטא + ל expresa pecado cometido contra alguien; en español, «pecar contra ti» reproduce bien la relación personal del agravio sin sonar forzado. Uso el subjuntivo «pequen» porque el hebreo abre una situación condicional dentro de la oración.
- source_word: אֵין אָדָם אֲשֶׁר לֹא יֶחֱטָא
  english_pob_choice: there is no one who does not sin
  chosen_spanish: no hay ningún ser humano que no peque
  alternatives_spanish:
  - no hay nadie que no peque
  - no hay hombre que no peque
  lexicon: HALOT
  rationale: אדם funciona aquí de modo genérico para la humanidad. Opto por «ser humano» para comunicar con claridad el sentido universal en español, manteniendo la afirmación proverbial sin masculinizar innecesariamente el referente.
- source_word: וְאָנַפְתָּ בָם
  english_pob_choice: and you are angry with them
  chosen_spanish: y te enojes con ellos
  alternatives_spanish:
  - y te enojes contra ellos
  - y te irrites con ellos
  lexicon: HALOT
  rationale: El verbo אנף expresa ira; en español «enojarse con» es natural y suficientemente fuerte para el contexto. El subjuntivo continúa la serie condicional del versículo.
- source_word: וּנְתַתָּם לִפְנֵי אוֹיֵב
  english_pob_choice: and give them over to an enemy
  chosen_spanish: y los entregues delante de un enemigo
  alternatives_spanish:
  - y los entregues a un enemigo
  - y los pongas ante un enemigo
  lexicon: HALOT
  rationale: נתן + לפני אויב comunica quedar expuestos al poder del enemigo. «Entregues delante de un enemigo» conserva más de cerca la imagen espacial del hebreo, aunque en español suene menos idiomático que «a un enemigo»; la elección preserva la tensión textual sin borrar el matiz.
- source_word: וְשָׁבוּם שׁוֹבֵיהֶם
  english_pob_choice: and their captors carry them away
  chosen_spanish: y sus cautivadores los lleven
  alternatives_spanish:
  - y sus cautivadores los cautiven
  - y quienes los capturen los lleven
  lexicon: HALOT
  rationale: La construcción hebrea usa el verbo de cautivar con el participio «sus cautivadores». «Cautivadores» mantiene la relación léxica y el movimiento a la cautividad; «lleven» refleja el traslado/deportación implícito. Aunque «lleven a cautiverio» sería más explícito, aquí conservo la cercanía al hebreo y la economía del período.
- source_word: אֶל אֶרֶץ רְחוֹקָה אוֹ קְרוֹבָה
  english_pob_choice: to a land far or near
  chosen_spanish: a una tierra lejana o cercana
  alternatives_spanish:
  - a una tierra lejos o cerca
  - a una tierra distante o próxima
  lexicon: HALOT
  rationale: La antítesis hebrea simplemente contrapone distancia y cercanía; «lejana o cercana» suena natural, digna y fiel. «Tierra» mantiene el sustantivo genérico sin especificar región o país.
theological_decisions:
- issue: Universal human sinfulness expressed with singular אָדָם
  english_pob_reading: there is no one who does not sin
  chosen_spanish_reading: no hay ningún ser humano que no peque
  alternative_spanish_readings:
  - no hay nadie que no peque
  - no hay hombre que no peque
  rationale: 'El texto afirma la universalidad del pecado humano. En español, «ser humano» comunica el alcance universal sin perder el valor genérico del hebreo; además evita que «hombre» se lea como masculino exclusivo en contextos pastorales actuales. La idea doctrinal se mantiene: nadie queda excluido de la necesidad de arrepentimiento y misericordia.'
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Sequence of consequences versus purpose in the captivity clause
  english_pob_reading: and their captors carry them away to a land far or near
  chosen_spanish_reading: y sus cautivadores los lleven a una tierra lejana o cercana
  alternative_spanish_readings:
  - y sus cautivadores los llevaron a una tierra lejana o cercana
  - para que sus cautivadores los lleven a una tierra lejana o cercana
  rationale: El hebreo coordina acciones sucesivas, no una finalidad explícita. Por eso conservo la coordinación simple («y») y un subjuntivo dependiente de la cadena condicional, evitando introducir una finalidad que el texto no exige.
  doctrine_reference: Hebrew syntax; POB revision pass 2026-04-23
- issue: Rendering of לִפְנֵי אוֹיֵב with spatial nuance
  english_pob_reading: give them over to an enemy
  chosen_spanish_reading: los entregues delante de un enemigo
  alternative_spanish_readings:
  - los entregues a un enemigo
  - los pongas ante un enemigo
  rationale: La preposición hebrea «delante de» puede marcar exposición o quedar a merced de alguien. Conservé esa imagen para no borrar el matiz del texto fuente, aunque reconozco que en español la forma más idiomática sería «a un enemigo». La decisión preserva la tensión lexical documentada por el original.
  doctrine_reference: HALOT; source syntax
translation_notes:
  revision_awareness: Seguí el audit trail inglés, especialmente la revisión que cambió «man» por «one» y eliminó el matiz de finalidad en la cláusula de cautiverio. En español reflejé esa revisión con una formulación universal («ser humano») y con coordinación simple de acciones, sin introducir propósito. También preservé la relación léxica de «cautivadores» frente al verbo de cautivar, y mantuve la imagen de לִפְנֵי en una nota porque el hebreo no dice simplemente «a» un enemigo.
  spanish_consistency_notes:
  - Usé «pequen» como subjuntivo para mantener la secuencia condicional del hebreo.
  - Preferí «Yahvé» para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Mantuve un tono bíblico moderno y digno sin caer en un calco rígido.
  - Conservé la antítesis «lejana o cercana» como equivalente natural de רְחוֹקָה / קְרוֹבָה.
