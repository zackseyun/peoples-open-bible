translation:
  language: es
  text: Cuando se cumplieron sus días para dar a luz, he aquí que había gemelos en su vientre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּמְלְאוּ
  english_pob_choice: were fulfilled
  chosen_spanish: se cumplieron
  alternatives_spanish:
  - se completaron
  - llegaron a su plenitud
  lexicon: HALOT
  rationale: El hebreo usa el modismo de ‘cumplirse/llenarse los días’. En español, ‘se cumplieron’ conserva ese valor idiomático con naturalidad y evita una imagen demasiado literal de ‘llenarse’.
- source_word: יָמֶיהָ
  english_pob_choice: her days
  chosen_spanish: los días
  alternatives_spanish:
  - su tiempo
  - sus días
  lexicon: HALOT
  rationale: Se mantiene el sustantivo ‘días’ para reflejar la estructura hebrea del modismo. El posesivo femenino está implícito por el contexto anterior de Rebeca.
- source_word: לָלֶדֶת
  english_pob_choice: to give birth
  chosen_spanish: para dar a luz
  alternatives_spanish:
  - para parir
  - para alumbrar
  lexicon: HALOT
  rationale: ‘Dar a luz’ es la equivalencia española más natural y digna para el infinitivo de ילד en este contexto de parto.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: ‘He aquí’ preserva el marcador discursivo de sorpresa o énfasis que introduce el hecho inesperado; es más idiomático en español bíblico que un calco con ‘behold’.
- source_word: תוֹמִם
  english_pob_choice: twins
  chosen_spanish: gemelos
  alternatives_spanish:
  - mellizos
  - dos gemelos
  lexicon: HALOT
  rationale: El término hebreo indica dos nacidos al mismo tiempo; ‘gemelos’ comunica con claridad el sentido sin añadir una precisión biológica que el hebreo no explicita.
- source_word: בְּבִטְנָהּ
  english_pob_choice: in her womb
  chosen_spanish: en su vientre
  alternatives_spanish:
  - en su seno
  - en su vientre materno
  lexicon: HALOT
  rationale: ‘Vientre’ conserva bien el sentido físico del hebreo בטן y suena natural en español. ‘Womb’ se puede verter como ‘vientre’ sin perder la referencia al embarazo.
translation_notes:
  revision_awareness: El inglés POB mantiene la idiomaticidad hebrea con ‘were fulfilled’ y ‘behold’; el español sigue esa misma estrategia con ‘se cumplieron’ y ‘he aquí’, sin introducir variantes interpretativas no presentes en la fuente.
  spanish_consistency_notes:
  - Se usa un registro bíblico sobrio y contemporáneo.
  - No se introduce ‘SEÑOR’ ni otro término teológico ajeno; el versículo no contiene el nombre divino.
  - ‘Gemelos’ se prefiere a ‘mellizos’ porque el hebreo solo afirma dos nacidos juntos, sin precisar identidad o diferencia biológica.
