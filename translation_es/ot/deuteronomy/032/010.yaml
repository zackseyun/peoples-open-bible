revisions:
- from: Lo encontró en tierra de desierto[a], y en la waste aullante del yermo; lo rodeó, le dio entendimiento[b], lo guardó como la pupila de su ojo.
  to: Lo encontró en una tierra de desierto, y en la desolación aullante del yermo; lo rodeó, le dio entendimiento[b], lo guardó como la pupila de su ojo[a].
  rationale: Se corrige el anglicismo 'waste' por 'desolación', que refleja bien תֹהוּ en contexto poético. Se mueve la nota [a] para que ancle correctamente en 'pupila de su ojo', que es la frase a la que realmente corresponde la alternativa tradicional. También se suaviza 'en tierra de desierto' a 'en una tierra de desierto' para mejorar la naturalidad sin alejarse del hebreo ni del audit trail inglés.
