revisions:
- from: Yahvé hizo esta cosa al día siguiente[a], y murió todo el ganado de Egipto; pero del ganado de los hijos de Israel no murió uno.
  to: Yahvé hizo esto al día siguiente, y murió todo el ganado de Egipto; pero del ganado de los hijos de Israel[a] no murió ni uno.
  rationale: 'Se ajusta la redacción para un español más natural sin perder fidelidad formal: ''hizo esto'' en lugar de ''hizo esta cosa'', y ''no murió ni uno'' en lugar de ''no murió uno''. También se corrige la nota al punto léxico realmente documentado por la auditoría inglesa: ''hijos de Israel'' frente a ''israelitas''.'
