lexical_decisions:
- source_word: διέπῃ
  english_pob_choice: govern
  chosen_spanish: gobierne
  alternatives_spanish:
  - dirija
  - administre
  - rija
  lexicon: LSJ
  rationale: En este contexto de oración real, el verbo expresa ejercicio de gobierno sobre el mundo; «gobierne» conserva la idea de mandato efectivo sin volverla demasiado libre.
- source_word: κόσμον
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el universo
  - el orden de las cosas
  lexicon: LSJ
  rationale: «El mundo» es la equivalencia española más natural y amplia para κόσμον en este contexto de dominio universal.
- source_word: ἐν ὁσιότητι
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - con santidad
  - en piedad
  lexicon: LSJ
  rationale: Ὁσιότης apunta a santidad o piedad reverente; «en santidad» mantiene la estructura preposicional del griego y el matiz ético-religioso.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: LSJ
  rationale: Aunque el inglés POB prefirió «righteousness», en español «justicia» es el término más natural y fiel al campo semántico de δικαιοσύνη; además, el contexto regia-jurídico favorece esta opción. Se conserva la alternativa «rectitud» por cercanía moral.
- source_word: ἐν εὐθύτητι ψυχῆς
  english_pob_choice: with uprightness of soul
  chosen_spanish: con rectitud de alma
  alternatives_spanish:
  - con integridad de alma
  - con rectitud de espíritu
  - en rectitud de alma
  lexicon: LSJ
  rationale: εὐθύτης significa rectitud/uprightness y ψυχή aquí designa el interior personal. «Rectitud de alma» es una traducción cercana y sobria; «alma» comunica bien el sujeto interior en español bíblico.
- source_word: κρίσιν κρίνῃ
  english_pob_choice: render judgment
  chosen_spanish: dicte juicio
  alternatives_spanish:
  - haga juicio
  - emita juicio
  - render juicio
  lexicon: LSJ
  rationale: El griego repite la raíz para intensificar la acción judicial. «Dicte juicio» preserva la fuerza forense y suena natural en español; se evita una calca como «juzgue juicio».
theological_decisions:
- issue: δικαιοσύνη en contexto sapiencial y de gobierno
  english_pob_reading: righteousness, with justice as an alternative
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia y rectitud
  rationale: En español, «justicia» comunica mejor la calidad moral y judicial del gobierno pedido, sin perder la dimensión ética amplia de δικαιοσύνη. La alternativa «rectitud» queda implícita en la cláusula final sobre la rectitud de alma.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness/justice according to context'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «judge» a «render judgment» para reflejar más directamente κρίσιν κρίνῃ; por eso la traducción española evita una simple forma verbal genérica y usa una expresión forense explícita («dicte juicio»). También se mantuvo la amplitud de κόσμον como «el mundo» y se resolvió δικαιοσύνη con «justicia», coherente con el contexto de gobierno y sentencia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiere explícitamente; este versículo no contiene el nombre divino.
  - Se eligió «alma» para ψυχή por ser una equivalencia idiomática y transparente en español bíblico, sin convertirla en «corazón», que alteraría el matiz del griego.
  - Se conserva la distinción entre la cualidad del gobierno («santidad y justicia») y el acto judicial final («dicte juicio»).
