translation:
  language: es
  text: Y cuando coman y cuando beban[a], ¿no son ustedes los que comen, y ustedes los que beben?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y si comen y si beben». La conjunción hebrea puede traducirse de manera temporal («cuando») o condicional («si»); aquí «cuando» encaja mejor con el flujo del argumento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y si
  - Porque cuando
  lexicon: HALOT
  rationale: La conjunción puede ser temporal o condicional. Aquí, por el flujo retórico del pasaje, «cuando» conserva mejor la secuencia del argumento y suena natural en español.
- source_word: תֹאכְלוּ
  english_pob_choice: you eat
  chosen_spanish: coman
  alternatives_spanish:
  - comen
  - estén comiendo
  lexicon: HALOT
  rationale: Es un imperfecto qal de 2.ª plural usado de manera general/habitual. En español, el presente de subjuntivo en cláusula temporal con «cuando» comunica bien la acción general.
- source_word: תִשְׁתּוּ
  english_pob_choice: you drink
  chosen_spanish: beban
  alternatives_spanish:
  - beben
  - estén bebiendo
  lexicon: HALOT
  rationale: Paralelo a «coman»; el presente de subjuntivo preserva la estructura temporal general del hebreo sin volverla rígida o arcaica.
- source_word: הֲלוֹא
  english_pob_choice: is it not
  chosen_spanish: ¿no son...
  alternatives_spanish:
  - ¿acaso no son...
  - ¿no es cierto que...
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera acuerdo. En español, «¿no son...?» conserva esa fuerza formal y directa.
- source_word: אַתֶּם
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - ustedes mismos
  - vosotros
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. «Ustedes» mantiene la referencia explícita y neutra para español amplio.
- source_word: הָאֹכְלִים
  english_pob_choice: who are eating
  chosen_spanish: los que están comiendo
  alternatives_spanish:
  - los que comen
  - quienes comen
  lexicon: HALOT
  rationale: El participio con artículo funciona sustantivamente. «Los que están comiendo» preserva la identificación enfática y el carácter descriptivo de la construcción.
- source_word: וְאַתֶּם
  english_pob_choice: and you
  chosen_spanish: y ustedes
  alternatives_spanish:
  - y ustedes mismos
  - e incluso ustedes
  lexicon: HALOT
  rationale: La repetición con conjunción y pronombre refuerza el paralelismo. «Y ustedes» reproduce esa insistencia sin sobrecargar la frase.
- source_word: הַשֹּׁתִים
  english_pob_choice: who are drinking
  chosen_spanish: los que están bebiendo
  alternatives_spanish:
  - los que beben
  - quienes beben
  lexicon: HALOT
  rationale: Paralelo a la expresión anterior; se conserva el valor substantival del participio y el balance retórico del versículo.
theological_decisions:
- issue: Alcance retórico de la pregunta
  english_pob_reading: The verse exposes the self-directed nature of the people's eating and drinking, paralleling the previous verse's critique of self-directed fasting.
  chosen_spanish_reading: El versículo expone el carácter centrado en sí mismos de su comer y beber, en paralelo con la crítica previa a su ayuno centrado en sí mismos.
  alternative_spanish_readings:
  - Una observación neutral sobre comer y beber en general
  rationale: Los pronombres enfáticos y los participios sustantivados muestran que no se trata solo de acciones ordinarias, sino de enfatizar a los mismos sujetos en el argumento. La traducción mantiene esa tensión retórica sin añadir interpretación doctrinal extra.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia en el audit trail inglés; no se registraron revisiones aplicadas. La versión española sigue esa lectura estable, preservando la ambigüedad temporal/condicional con una nota breve.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece.
  - Se mantiene «ustedes» como pronombre neutro y explícito para el plural de segunda persona.
  - La repetición de «los que están...» reproduce el valor enfático de los participios hebreos sin forzar una literalidad impropia en español.
