theological_decisions:
- issue: Scope of 'the people of God' in the woman's accusation
  chosen_reading: Retain the covenantal phrase 'the people of God' without narrowing it to Absalom alone or broadening it into an abstract theological claim.
  alternative_readings:
  - against Israel
  - against Absalom and the royal house
  rationale: The Hebrew explicitly says 'the people of God.' In context the woman's point is that the king's handling of his banished son affects the covenant community, but the text itself should preserve that broader phrase rather than resolve the rhetoric into a narrower paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 5
