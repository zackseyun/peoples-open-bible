translation:
  language: es
  text: 'El hombre bruto no sabe[a], y el necio no entiende esto:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "hombre insensato" o "hombre estúpido" para "hombre bruto". El adjetivo hebreo presenta a la persona como torpe, como un animal, no solo como alguien desinformado.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - uno
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular masculino que acompaña naturalmente los adjetivos masculinos siguientes. En español, "el hombre" conserva esa forma representativa y suena natural en el paralelismo poético.
- source_word: בַּעַר
  english_pob_choice: brutish
  chosen_spanish: bruto
  alternatives_spanish:
  - estúpido
  - insensato
  - bestial
  lexicon: HALOT
  rationale: El término describe a alguien torpe o animalizado en su comprensión. "Bruto" en español conserva bien la dureza y el matiz de rusticidad o falta de discernimiento sin volverse excesivamente explicativo.
- source_word: יֵדָע
  english_pob_choice: does not know
  chosen_spanish: no conoce
  alternatives_spanish:
  - no sabe
  - no reconoce
  - no percibe
  lexicon: HALOT
  rationale: El verbo ידע aquí expresa falta de conocimiento o conciencia. "No conoce" es una equivalencia natural en español y mantiene el sentido directo del original.
- source_word: כְסִיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - fool
  - estúpido
  - dullard
  lexicon: HALOT
  rationale: En español bíblico y contemporáneo, "necio" reproduce bien el término sapiencial de alguien moral e intelectualmente torpe, y conserva el registro literario del salmo.
- source_word: יָבִין
  english_pob_choice: does not understand
  chosen_spanish: no entiende
  alternatives_spanish:
  - no discierne
  - no comprende
  lexicon: HALOT
  rationale: בין apunta al discernimiento o la comprensión. "No entiende" es claro y mantiene el paralelismo con "no conoce".
- source_word: אֶת זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - este asunto
  - esto
  lexicon: HALOT
  rationale: El marcador de objeto con el demostrativo señala algo ya introducido o inmediatamente explicado por el contexto. En español, "esto" es la forma más natural; los dos puntos ayudan a presentar lo que se desarrolla en el contexto.
translation_notes:
  revision_awareness: 'El texto hebreo y la traducción inglesa auditada coinciden en la estructura paralela: un primer miembro con בַּעַר y un segundo con כְסִיל. No hay revisiones aplicadas en el audit trail; esta versión española conserva la distinción léxica y el valor poético del original, evitando suavizar el contraste.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" en otras plantillas del proyecto como norma general, pero este versículo no contiene el nombre divino.
  - '"Bruto" se eligió por su capacidad de reflejar la imagen animalizada de בַּעַר sin perder legibilidad.'
  - '"Necio" conserva el registro sapiencial tradicional de כְסִיל sin sustituirlo por una explicación más larga.'
