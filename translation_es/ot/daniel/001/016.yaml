    text: O «la porción que les correspondía de los manjares del rey». El hebreo פַּתְבָּגָם se refiere a la comida real especialmente asignada.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente «legumbres» o «semillas». El hebreo זֵרְעֹנִים se refiere a alimentos de plantas o semillas, probablemente verduras y legumbres.
    reason: lexical_alternative
  revision_rationale: La revisión corrige una expresión demasiado literal y poco idiomática («el vino de su bebida»), aclara que la comida era la porción asignada a ellos, y repone las notas léxicas significativas del registro inglés. Se mantiene el buen valor iterativo de «iba retirando ... iba dando» y la naturalidad general del español.
