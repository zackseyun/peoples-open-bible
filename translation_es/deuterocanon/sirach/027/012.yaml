translation:
  language: es
  text: Entre los insensatos[a], observa el momento oportuno; pero entre los reflexivos, mantente constante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entre los necios, vigila la ocasión propicia; pero entre los prudentes, permanece continuamente»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσυνέτων
  english_pob_choice: the senseless
  chosen_spanish: los insensatos
  alternatives_spanish:
  - los necios
  - los faltos de entendimiento
  - los sin juicio
  lexicon: LSJ
  rationale: ἀσύνετος describe a quienes carecen de entendimiento o juicio. «Insensatos» conserva la fuerza intelectual y moral del término y suena natural en español bíblico sin reducirlo a simple torpeza.
- source_word: συντήρησον καιρόν
  english_pob_choice: watch for the right time
  chosen_spanish: observa el momento oportuno
  alternatives_spanish:
  - vigila la ocasión propicia
  - guarda el tiempo adecuado
  - espera el momento
  lexicon: LSJ
  rationale: συντηρέω puede expresar guardar, observar o vigilar con atención, y καιρός aquí es el tiempo oportuno, no el tiempo cronológico. «Observa el momento oportuno» transmite atención y discernimiento de forma idiomática en español.
- source_word: διανοουμένου
  english_pob_choice: the thoughtful
  chosen_spanish: el reflexivo
  alternatives_spanish:
  - el pensativo
  - el discernidor
  - el inteligente
  lexicon: LSJ
  rationale: El participio de διανοέομαι apunta a quien piensa o considera las cosas con reflexión. «Reflexivo» preserva ese rasgo intelectual y mantiene bien el contraste con ἀσυνέτων.
- source_word: ἐνδελέχιζε
  english_pob_choice: be constant
  chosen_spanish: mantente constante
  alternatives_spanish:
  - persiste
  - permanece continuamente
  - sigue con constancia
  lexicon: LSJ
  rationale: El verbo expresa continuidad o persistencia. En este contexto, sugiere permanecer de manera estable y continua en la compañía del reflexivo; «mantente constante» conserva ese valor durativo sin sobreespecificar la acción.
- source_word: εἰς μέσον ... εἰς μέσον δέ
  english_pob_choice: among ... but among
  chosen_spanish: entre ... pero entre
  alternatives_spanish:
  - en medio de ... pero en medio de
  - con ... pero con
  lexicon: LSJ
  rationale: Aunque literalmente significa «en medio de», en este contexto social el español natural es «entre». La repetición marca el contraste entre dos tipos de compañía.
translation_notes:
  revision_awareness: El texto griego del Swete LXX 1909 coincide con el paquete de fuente y con la traducción inglesa POB; no se requieren cambios por revisión posterior. Se mantuvo la equivalencia óptima y el contraste entre reserva prudente ante insensatos y constancia entre los reflexivos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - «Insensatos» conserva la carga sapiencial sin caer en un insulto excesivamente coloquial.
  - «Momento oportuno» preserva el sentido de καιρός como ocasión adecuada.
  - «Reflexivo» fue preferido por su naturalidad y por reflejar el matiz de pensamiento considerado.
  - La nota al pie ofrece la alternativa lexical principal del audit trail inglés, sin introducir una lectura distinta del sentido.
