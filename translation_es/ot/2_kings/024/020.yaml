    issue: 'Construcción inicial redundante: «Porque a causa de»'
    rationale: El hebreo כִּי más עַל אַף expresa enlace explicativo-causal, pero en español no hace falta duplicarlo de forma tan literal. La frase resultante suena forzada y menos legible.
  - severity: medium
    issue: 'Primera cláusula poco idiomática: «ocurrió en Jerusalén y en Judá»'
    rationale: Aunque formalmente posible, en español queda abrupto por la falta de un sujeto explícito. «Esto sucedió» o equivalente expresa mejor el hebreo comprimido sin añadir contenido indebido.
  - severity: low
    issue: Nota al pie necesita armonizarse con la redacción revisada
    rationale: La nota actual repite la formulación dura del texto base. Conviene actualizarla para que el texto principal y la alternativa formal se distingan con claridad.
