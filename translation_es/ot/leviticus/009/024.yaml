translation:
  language: es
  text: Y salió fuego de delante de Yahvé[a] y consumió sobre el altar el holocausto y las porciones de grasa. Y todo el pueblo vio, y gritaron con júbilo[b] y cayeron rostro en tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la presencia de Yahvé»; hebreo literalmente «de delante de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «dieron un grito de júbilo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּצֵא אֵשׁ
  english_pob_choice: fire came out
  chosen_spanish: salió fuego
  alternatives_spanish:
  - salió una llama
  - fuego salió
  lexicon: HALOT
  rationale: El verbo יצא con אֵשׁ expresa movimiento hacia afuera. En español, «salió fuego» conserva la imagen narrativa breve y natural sin añadir matices no presentes en el hebreo.
- source_word: מִלִּפְנֵי יְהוָה
  english_pob_choice: from before Yahweh
  chosen_spanish: de delante de Yahvé
  alternatives_spanish:
  - de la presencia de Yahvé
  - de antes de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa «de delante de». Se mantiene el nombre divino como «Yahvé» según la convención POB en español, y «de delante de» preserva el idiomatismo y el origen espacial de la acción.
- source_word: וַתֹּאכַל
  english_pob_choice: consumed
  chosen_spanish: consumió
  alternatives_spanish:
  - devoró
  - se comió
  lexicon: HALOT
  rationale: Aunque el verbo es literalmente «comer», en contexto sacrificial el fuego «consume». «Consumió» es fiel, claro y evita una literalidad extraña en español.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: «Sobre el altar» reproduce bien la relación espacial del hebreo y suena natural en español bíblico contemporáneo.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  lexicon: HALOT
  rationale: En español bíblico, «holocausto» sigue siendo el término técnico tradicional para עֹלָה. Aunque «ofrenda quemada» sería transparente, «holocausto» preserva la categoría sacrificial reconocible.
- source_word: הַחֲלָבִים
  english_pob_choice: the fat portions
  chosen_spanish: las grasas
  alternatives_spanish:
  - los trozos de grasa
  - las porciones de grasa
  lexicon: HALOT
  rationale: El hebreo designa las partes grasas reservadas en el sacrificio. «Las grasas» es breve y comprensible en español; «porciones de grasa» también sería posible, pero aquí la forma simple mantiene el paralelismo del versículo.
- source_word: וַיַּרְא כָּל הָעָם
  english_pob_choice: all the people saw
  chosen_spanish: todo el pueblo lo vio
  alternatives_spanish:
  - todo el pueblo vio
  - y todo el pueblo vio
  lexicon: HALOT
  rationale: 'Se explicita el objeto implícito por el contexto inmediato: vieron el fuego y su aceptación del sacrificio. «Todo el pueblo lo vio» es natural y conserva el carácter colectivo.'
- source_word: וַיָּרֹנּוּ
  english_pob_choice: they shouted for joy
  chosen_spanish: gritaron con júbilo
  alternatives_spanish:
  - prorrumpieron en un grito de júbilo
  - clamaron con alegría
  lexicon: HALOT
  rationale: La raíz רנן puede implicar un grito exultante. «Gritaron con júbilo» conserva la espontaneidad jubilosa sin convertirla indebidamente en canto formal.
- source_word: וַיִּפְּלוּ עַל פְּנֵיהֶם
  english_pob_choice: fell on their faces
  chosen_spanish: cayeron sobre sus rostros
  alternatives_spanish:
  - se postraron
  - cayeron rostro en tierra
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal concreta del hebreo. «Sobre sus rostros» es fiel y solemne; «se postraron» sería más interpretativo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La convención del proyecto en español es «Yahvé», que conserva el nombre propio del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sacrificial term עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda totalmente quemada
  rationale: La categoría sacrificial de עֹלָה se expresa con un término técnico consolidado en español bíblico. Aquí «holocausto» comunica mejor que una paráfrasis descriptiva y mantiene la tensión cultual del pasaje.
  doctrine_reference: 'Lexical doctrine: sacrificial offerings terminology'
- issue: Meaning of וַיָּרֹנּוּ in immediate context
  english_pob_reading: they shouted for joy
  chosen_spanish_reading: gritaron con júbilo
  alternative_spanish_readings:
  - clamaron con alegría
  - prorrumpieron en un grito de júbilo
  rationale: La reacción del pueblo ante la manifestación divina es exultante; el verbo puede abarcar un grito jubiloso. «Gritaron con júbilo» preserva la ambigüedad entre clamor y alegría sin forzar la idea de canto.
  doctrine_reference: Lexical semantics of רנן in narrative response
translation_notes:
  revision_awareness: 'El registro inglés auditado permanece estable (sin revisiones aplicadas). La versión española sigue la misma lectura de alta concordancia, manteniendo las decisiones clave: Yahvé para יְהוָה, un verbo de consumo sacrificial para וַתֹּאכַל, y una reacción jubilosa para וַיָּרֹנּוּ sin convertirla en canto formal.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» de acuerdo con la terminología del proyecto en español.
  - «Holocausto» se usa como término sacrificial técnico coherente con el valor de עֹלָה.
  - «Las grasas» refleja la opción inglesa «fat portions» sin sobreexplicar el detalle cultual en el texto principal.
  - La última cola se traduce con prostración corporal concreta, manteniendo la imaginería hebrea.
