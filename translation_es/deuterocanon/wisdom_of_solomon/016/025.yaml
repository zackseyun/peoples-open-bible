translation:
  language: es
  text: Por eso también entonces, transformándose de todas las maneras[a], sirvió a tu don que alimenta a todos, según el deseo de los necesitados[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «transformándose en todas las cosas». El griego destaca una notable adaptabilidad de la provisión celestial.
    reason: lexical_alternative
  - marker: b
    text: O «según el deseo de los que pedían», porque el griego puede referirse tanto a los necesitados como a los que hacían una petición.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore also
  chosen_spanish: Por eso también
  alternatives_spanish:
  - Por tanto también
  - Por eso
  lexicon: LSJ
  rationale: La frase introduce una conclusión; «por eso» comunica la relación inferencial de manera natural en español, y «también» conserva el καί del griego, como en el audit trail inglés.
- source_word: καὶ τότε
  english_pob_choice: at that time
  chosen_spanish: entonces
  alternatives_spanish:
  - en aquel tiempo
  - en ese momento
  lexicon: LSJ
  rationale: El valor temporal se mantiene con un adverbio natural en español. «Entonces» recoge el matiz retrospectivo del contexto sin volver la frase pesada.
- source_word: εἰς πάντα
  english_pob_choice: into all things
  chosen_spanish: en todas las cosas
  alternatives_spanish:
  - para todo
  - de muchas formas
  lexicon: LSJ
  rationale: Con μεταλλευομένη, el griego sugiere una capacidad de variar de forma o cualidad. «En todas las cosas» preserva la imagen de adaptabilidad sin hacerla más abstracta que el original.
- source_word: μεταλλευομένη
  english_pob_choice: changing itself
  chosen_spanish: transformándose
  alternatives_spanish:
  - cambiándose
  - adaptándose
  - transformándose a sí mismo/ella misma
  lexicon: LSJ
  rationale: El participio medio exige una forma reflexiva o media en español. «Transformándose» mantiene la idea de cambio de forma o manifestación sin precisar más allá de lo que el griego exige.
- source_word: τῇ παντοτρόφῳ σου δωρεᾷ
  english_pob_choice: your all-nourishing gift
  chosen_spanish: tu don que alimenta a todos
  alternatives_spanish:
  - tu don omnialimentador
  - tu don que sustenta a todos
  - tu dádiva que alimenta a todos
  lexicon: LSJ
  rationale: παντοτρόφος expresa la cualidad de nutrir o sustentar a todos. En español, «que alimenta a todos» conserva el sentido y evita un calco poco natural; «don» mantiene el valor elevado de δωρεά.
- source_word: ὑπηρετεῖ
  english_pob_choice: it served
  chosen_spanish: sirvió
  alternatives_spanish:
  - prestó servicio
  - ministerió
  - estuvo al servicio
  lexicon: LSJ
  rationale: El verbo indica servicio o estar al servicio de algo. «Sirvió» es breve, digno e idiomático, y preserva la personificación del sujeto griego.
- source_word: πρὸς τὴν τῶν δεομένων θέλησιν
  english_pob_choice: according to the desire of those in need
  chosen_spanish: según el deseo de los necesitados
  alternatives_spanish:
  - según el deseo de los que necesitaban
  - de acuerdo con la voluntad de los necesitados
  - según el anhelo de los que pedían
  lexicon: LSJ
  rationale: δεομένων puede significar «los necesitados» o «los que piden». Se eligió «necesitados» porque encaja con el contexto de provisión en el desierto; «deseo» traduce θέλησις sin estrecharlo a una sola formulación litúrgica.
theological_decisions:
- issue: Identidad del sujeto que se transforma
  english_pob_reading: The verse speaks of the wilderness provision (manna) as adapting itself in service to God's gift for the benefit of the needy.
  chosen_spanish_reading: La versión mantiene el sujeto implícito y la imagen de la provisión del desierto que se adapta, sin nombrarla explícitamente en el texto principal.
  alternative_spanish_readings:
  - nombrar explícitamente el maná en el texto principal
  - interpretar el sujeto como toda la creación o el elemento referido en el contexto
  rationale: El griego usa un sujeto literario sin explicitarlo; el contexto apoya la referencia al alimento del desierto, pero el texto no obliga a resolverla en el cuerpo principal. Se conserva esa tensión interpretativa, como en el POB inglés.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Naturaleza de la provisión divina
  english_pob_reading: your all-nourishing gift
  chosen_spanish_reading: tu don que alimenta a todos
  alternative_spanish_readings:
  - tu don que sustenta a todos
  - tu don omnialimentador
  rationale: «Don» mantiene el carácter de dádiva divina y «que alimenta a todos» refleja la universalidad y suficiencia del término griego sin elevarlo a una fórmula teológica no exigida por el texto.
  doctrine_reference: Divine providence and heavenly provision in Wisdom 16.
translation_notes:
  revision_awareness: El texto inglés final revisado eliminó «by» antes de «changing itself» para reflejar mejor el participio; la traducción española sigue directamente el participio medio con «transformándose», sin añadir una preposición equivalente. También se conservó la equivalencia óptima del audit trail para διὰ τοῦτο/καὶ τότε, εἰς πάντα, y πρὸς τὴν τῶν δεομένων θέλησιν, manteniendo las ambigüedades documentadas.
  spanish_consistency_notes:
  - Se usa «don» para δωρεά, en línea con un registro bíblico digno y coherente con la terminología PO B.
  - Se emplea «Yahvé» solo cuando el texto fuente lo exija; en este versículo no aparece el nombre divino explícito, pero sí el posesivo «tu».
  - Se conserva la ambigüedad de δεομένων con «los necesitados», sin cerrar del todo la posibilidad de «los que pedían».
  - No se usa «Cristo» ni vocabulario cristológico; el pasaje pertenece a Sabiduría y se mantiene su marco sapiencial judío.
