translation:
  language: es
  text: El corazón del entendido busca conocimiento[a], pero el rostro de los necios se alimenta de necedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «pero el rostro de los necios se alimenta de necedad». El Texto Masorético dice literalmente «rostro(s) de necios»; algunas traducciones prefieren «boca de necios» para ajustar la imagen al verbo de alimentarse.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  lexicon: HALOT
  rationale: En Proverbios, לֵב designa el centro interior de pensamiento, voluntad y disposición. «Corazón» conserva la metáfora hebrea mejor que «mente» y sigue siendo natural en español bíblico contemporáneo.
- source_word: נָבוֹן
  english_pob_choice: discerning
  chosen_spanish: discernidor
  alternatives_spanish:
  - entendido
  - prudente
  - discerniente
  lexicon: HALOT
  rationale: El adjetivo describe a la persona que posee entendimiento práctico. «Discernidor» mantiene el matiz activo de quien distingue con juicio, y evita reducir el término a una mera cualidad abstracta.
- source_word: יְבַקֶּשׁ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - anda en busca de
  - procura
  lexicon: HALOT
  rationale: El verbo intensivo expresa una búsqueda intencional. «Busca» es la forma más directa y idiomática en español, sin perder la energía del hebreo.
- source_word: דָּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - entendimiento
  - aprendizaje
  lexicon: HALOT
  rationale: En contextos sapienciales, דָּעַת suele apuntar al conocimiento adquirido y aplicado. «Conocimiento» es el equivalente más estable y claro en español.
- source_word: וּפְנֵי
  english_pob_choice: the face of
  chosen_spanish: el rostro de
  alternatives_spanish:
  - la cara de
  - la boca de
  lexicon: HALOT
  rationale: El texto masorético dice «rostro/cara de». Aunque existe una tradición interpretativa que entiende «boca», el audit trail inglés revisó la línea para reflejar con mayor precisión פני. En español, «rostro de» conserva la forma literal y el paralelismo con el verbo siguiente.
- source_word: כְסִילִים
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los tontos
  lexicon: HALOT
  rationale: «Necios» es el término sapiencial clásico en español y reproduce bien la categoría moral de כְסִילִים, más que un insulto coloquial.
- source_word: יִרְעֶה
  english_pob_choice: feeds on
  chosen_spanish: se alimenta de
  alternatives_spanish:
  - apacienta
  - pastea
  - se nutre de
  lexicon: HALOT
  rationale: El verbo significa literalmente pastorear, pacer, alimentarse. «Se alimenta de» conserva la imagen de consumo habitual y resulta natural con el sustantivo siguiente.
- source_word: אִוֶּלֶת
  english_pob_choice: folly
  chosen_spanish: necedad
  alternatives_spanish:
  - insensatez
  - locura
  lexicon: HALOT
  rationale: En la literatura sapiencial, אִוֶּלֶת nombra la condición opuesta a la sabiduría. «Necedad» corresponde bien al campo semántico y evita un tono demasiado psicologizante.
translation_notes:
  revision_awareness: La redacción inglesa más reciente corrigió «mouth» por «face» para reflejar פני con mayor exactitud, manteniendo «feeds on folly» como equivalente natural de יִרְעֶה אִוֶּלֶת. Esta versión española sigue esa corrección con «rostro» y conserva la imagen alimentaria con «se alimenta de».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió una construcción simétrica con dos miembros breves para reflejar el paralelismo sapiencial.
  - «Necios» se usa como término sapiencial técnico; no se sustituyó por «tontos» por razones de registro y precisión.
