translation:
  language: es
  text: 'Después de estas cosas, la palabra de Yahvé vino a Abram en una visión, diciendo: «No temas, Abram. Yo soy un escudo para ti[a]; tu recompensa será muy grande».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo soy tu escudo; tu recompensa es muy grande» o «Yo soy tu escudo; tu recompensa es inmensamente grande».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַחַר הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de estos acontecimientos
  - Después de estos hechos
  lexicon: HALOT
  rationale: La fórmula temporal es amplia y narrativa. «Cosas» conserva la elasticidad de דְּבָרִים sin restringirla solo a palabras o solo a eventos, y sigue de cerca la lectura auditada del POB inglés.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra de Yahvé vino
  - una palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión profética/revelatoria estándar con el nombre divino según el criterio del proyecto. «Palabra de Yahvé» reproduce el peso teológico del constructo hebreo sin ocultar el Tetragrámaton.
- source_word: הָיָה ... אֶל אַבְרָם
  english_pob_choice: came to Abram
  chosen_spanish: vino a Abram
  alternatives_spanish:
  - llegó a Abram
  - fue dirigida a Abram
  lexicon: HALOT
  rationale: «Vino a» es la equivalencia natural en español para el giro revelatorio hebreo y mantiene el carácter de acontecimiento de la comunicación divina.
- source_word: בַּמַּחֲזֶה
  english_pob_choice: in a vision
  chosen_spanish: en visión
  alternatives_spanish:
  - en una visión
  - por medio de una visión
  lexicon: HALOT
  rationale: El sustantivo indica una revelación visionaria. En español, «en visión» es una forma breve y natural; también admite la lectura idiomática de una experiencia visionaria sin sobreexplicar el artículo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Mantiene el enlace formal con el discurso directo introducido, sin añadir una narración más libre de la necesaria.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas, Abram
  lexicon: HALOT
  rationale: «No temas» es una prohibición clara, natural y fiel al tono bíblico. Evita la arcaización de «no temas»? Actually it is current idiom and preserves the directness of the hebrew imperative negative.
- source_word: מָגֵן לָךְ
  english_pob_choice: a shield for you
  chosen_spanish: un escudo para ti
  alternatives_spanish:
  - tu escudo
  - un escudo para ti
  lexicon: HALOT
  rationale: 'El hebreo funciona predicativamente: no dice literalmente «tu escudo», sino «un escudo para ti». «Escudo» mantiene la metáfora de protección con transparencia sintáctica.'
- source_word: שְׂכָרְךָ
  english_pob_choice: your reward
  chosen_spanish: tu recompensa
  alternatives_spanish:
  - tu galardón
  - tu pago
  lexicon: HALOT
  rationale: En este contexto pactal, «recompensa» comunica bien el valor de la promesa sin reducirla a salario. Se evita «pago» por su tono comercial y se conserva la amplitud semántica del sustantivo.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: will be very great
  chosen_spanish: será muy grande
  alternatives_spanish:
  - será grandísima
  - será sumamente grande
  lexicon: HALOT
  rationale: El hebreo intensifica la magnitud de la recompensa. En español, «muy grande» reproduce bien la fuerza sin sonar forzado; el futuro se expresa para hacer explícito el valor promesivo del contexto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo contiene el nombre propio divino, no un título genérico. Siguiendo el criterio del proyecto, se preserva el nombre en español como «Yahvé», manteniendo su referencia covenantal y evitando el ocultamiento mediante «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Entender la cláusula de promesa שְׂכָרְךָ הַרְבֵּה מְאֹד
  english_pob_reading: your reward will be very great
  chosen_spanish_reading: tu recompensa será muy grande
  alternative_spanish_readings:
  - yo soy tu escudo; tu recompensa es muy grande
  - tu recompensa será exceedingly great
  rationale: 'El hebreo permite una lectura donde se enuncian dos predicaciones: «Yo soy un escudo para ti» y luego «tu recompensa [será] muy grande». El español mantiene esa separación y expresa el futuro por el carácter promesivo del contexto, sin fusionar escudo y recompensa en un solo predicado.'
  doctrine_reference: 'DOCTRINE.md: promesa pactal y distinción sintáctica de predicaciones'
translation_notes:
  revision_awareness: La revisión más reciente del POB inglés quedó sin cambios y con alto acuerdo de los revisores; por eso no se introduce ninguna divergencia sustantiva. La principal decisión española fue ajustar el teónimo a la política del proyecto («Yahvé») y elegir equivalentes naturales que preservan la estructura hebrea y la lectura auditable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política terminológica del proyecto para el Tetragrámaton.
  - «No temas» conserva el tono directo del prohibitivo hebreo y del POB inglés.
  - La metáfora «escudo» se mantiene como imagen de protección, sin convertirla en explicación.
  - «Recompensa» refleja mejor el valor covenantal que «salario» o «pago».
  - La nota al pie marca solo la alternativa temporal, siguiendo la auditable opción del POB inglés.
