revisions:
- from: Entonces David y sus hombres subieron e hicieron incursiones contra los gesureos[a], los girzitas y los amalecitas, porque estos eran los habitantes de la tierra desde tiempos antiguos, al ir tú a Shur[b], hasta la tierra de Egipto.
  to: Entonces David y sus hombres subieron e hicieron incursiones contra los gesureos[a], los girzitas y los amalecitas, porque estos eran los habitantes de la tierra desde tiempos antiguos, camino a Shur[b], hasta la tierra de Egipto.
  rationale: Se hace una reparación menor para mejorar la naturalidad del español sin perder el sentido del hebreo ni el rastro del POB inglés. 'Camino a Shur' expresa mejor la fórmula geográfica convencional que 'al ir tú a Shur'. La nota [b] se corrige para ofrecer una alternativa real vinculada a esa frase, en vez de repetir 'hasta la tierra de Egipto'.
