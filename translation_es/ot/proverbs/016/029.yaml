translation:
  language: es
  text: El hombre violento induce a su prójimo[a] y lo lleva por un camino que no es bueno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'su amigo' o 'su compañero' para 'su prójimo'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'por un camino no bueno'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: HALOT
  rationale: El hebreo usa singular masculino y el proverbio presenta un tipo humano representativo; 'hombre' conserva ese rasgo sin neutralizarlo innecesariamente.
- source_word: חָמָס
  english_pob_choice: violent
  chosen_spanish: violento
  alternatives_spanish:
  - violencia
  - malvado
  - opresor
  lexicon: HALOT
  rationale: Como rasgo característico de la persona, el adjetivo 'violento' reproduce bien la carga moral y conductual del hebreo.
- source_word: יְפַתֶּה
  english_pob_choice: entices
  chosen_spanish: seduce
  alternatives_spanish:
  - engaña
  - persuade
  - incita
  lexicon: HALOT
  rationale: La forma piel expresa una acción de atraer o ganar para una conducta; 'seduce' comunica ese arrastre hacia el mal, aunque en español puede sonar algo más fuerte que 'entices'.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su amigo
  - su compañero
  lexicon: HALOT
  rationale: '''Prójimo'' conserva el valor relacional amplio de רֵעַ sin restringirlo a una amistad íntima; funciona bien en español bíblico y contemporáneo.'
- source_word: וְהוֹלִיכוֹ
  english_pob_choice: and leads him
  chosen_spanish: y lo lleva
  alternatives_spanish:
  - y lo conduce
  - y lo hace andar
  lexicon: HALOT
  rationale: El hifil es causativo; 'lo lleva' es una forma natural en español que mantiene la idea de hacer avanzar a alguien por un rumbo determinado.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in a way
  chosen_spanish: por un camino
  alternatives_spanish:
  - en un camino
  - por una senda
  - en una manera
  lexicon: HALOT
  rationale: '''Camino'' permite conservar la metáfora hebrea de curso de vida, que en español suena más natural con la preposición ''por''.'
- source_word: לֹא טוֹב
  english_pob_choice: that is not good
  chosen_spanish: que no es bueno
  alternatives_spanish:
  - que no es recto
  - que no es correcto
  - que es malo
  lexicon: HALOT
  rationale: La frase retiene la literalidad moral del hebreo 'no bueno' sin intensificarla a 'malo' o 'malo/ perverso' más de lo que el texto dice.
translation_notes:
  revision_awareness: El texto castellano sigue de cerca el hebreo y el audit trail en inglés, manteniendo la metáfora de 'camino' y la evaluación sobria 'no es bueno' sin ampliar el juicio moral. No se documentaron revisiones aplicadas en el registro inglés más reciente.
  spanish_consistency_notes:
  - Se mantiene el singular masculino representativo de אִישׁ con 'hombre'.
  - '''Prójimo'' se usa como equivalente amplio de רֵעַ y no como traducción de una relación necesariamente afectiva.'
  - La metáfora de דֶּרֶךְ se preserva con 'camino' en lugar de reducirse a una mera 'manera'.
  - La nota literal conserva la estructura hebrea de la cláusula final para reflejar la tensión expresiva del original.
