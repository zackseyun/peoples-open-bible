  text: כִּי֩ אֵ֨ין זִכְר֧וֹן לֶ/חָכָ֛ם עִֽם הַ/כְּסִ֖יל לְ/עוֹלָ֑ם בְּ/שֶׁ/כְּבָ֞ר הַ/יָּמִ֤ים הַ/בָּאִים֙ הַ/כֹּ֣ל נִשְׁכָּ֔ח וְ/אֵ֛יךְ יָמ֥וּת הֶ/חָכָ֖ם עִֽם הַ/כְּסִֽיל־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/002/016.yaml
  text: For there is no lasting remembrance of the wise any more than of the fool forever[a], since in the days to come all will already have been forgotten[b]. And how the wise dies like the fool!
  footnotes:
  - marker: a
    text: Or, more formally, 'For there is no remembrance of the wise with the fool forever.' The main text renders the Hebrew idiom in natural English while preserving the comparison of their shared fate.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'And how the wise man dies with the fool!' The wording is likely exclamatory, expressing the grievous fact that the wise man dies just like the fool.
    reason: lexical_alternative
