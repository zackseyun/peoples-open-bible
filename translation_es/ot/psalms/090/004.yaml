revisions:
- from: Porque mil años, ante tus ojos, son como el día de ayer, cuando ha pasado, y como una vigilia en la noche.
  to: Porque mil años, ante tus ojos, son como ayer, cuando ya pasó[a], o como una guardia[b] en la noche.
  rationale: Se ajusta la segunda comparación a 'o como' para seguir la decisión auditada del POB; se reemplaza 'vigilia' por 'guardia' para mayor claridad semántica en español; y se alisa la frase temporal para que suene natural sin perder el matiz de algo ya pasado. Se preservan en notas la alternativa temporal documentada y la explicación cultural de 'watch'.
  reviewer_model: gpt-5.4
