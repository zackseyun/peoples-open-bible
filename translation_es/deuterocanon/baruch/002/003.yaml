translation:
  language: es
  text: para comer un hombre la carne de su hijo[a], y un hombre la carne de su hija.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego aquí suministrado es una cláusula, no una oración completa; el español conserva esa estructura dependiente en vez de reconstruir el contexto circundante.
    reason: textual_variant
lexical_decisions:
- source_word: τοῦ φαγείν
  english_pob_choice: for ... to eat
  chosen_spanish: para que ... coma
  alternatives_spanish:
  - para comer
  - para que se coma
  lexicon: BDAG
  rationale: El infinitivo articular con τοῦ expresa aquí una relación dependiente y no una oración completa; en español, 'para que ... coma' preserva esa dependencia sin volverla más explícita de lo que permite el griego fragmentario.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - el hombre
  lexicon: BDAG
  rationale: ἄνθρωπον aparece dos veces en singular; 'un hombre' conserva el masculino singular del griego y sigue la decisión auditada del POB en inglés de no generalizar a 'persona'.
- source_word: σάρκας
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - carne
  - la carne del cuerpo
  lexicon: BDAG
  rationale: σάρξ aquí es carne corporal literal. 'La carne' mantiene el registro grave y directo; 'carne' sin artículo sería menos natural en español en esta construcción.
- source_word: υἱοῦ αὐτοῦ
  english_pob_choice: his own son
  chosen_spanish: de su hijo
  alternatives_spanish:
  - de su propio hijo
  - de su hijo propio
  lexicon: BDAG
  rationale: Aunque el inglés auditado llegó a 'his own son', la revisión posterior retiró 'own' porque no está explícito en el griego. En español se refleja simplemente el genitivo posesivo con 'de su hijo'.
- source_word: θυγατρὸς αὐτοῦ
  english_pob_choice: his own daughter
  chosen_spanish: de su hija
  alternatives_spanish:
  - de su propia hija
  - de su hija propia
  lexicon: BDAG
  rationale: Igual que con 'son', el griego solo expresa posesión, no énfasis léxico en 'propia'. 'De su hija' evita añadir una intensificación no justificada.
theological_decisions:
- issue: Fragmento sintáctico incompleto
  english_pob_reading: Translate the supplied Greek clause as a dependent infinitival phrase without importing surrounding material.
  chosen_spanish_reading: Traducir el sintagma dependiente como cláusula final con 'para que', sin reconstruir el contexto faltante.
  alternative_spanish_readings:
  - para comer un hombre la carne de su hijo...
  - que un hombre coma la carne de su hijo...
  rationale: El texto griego proporcionado es una cláusula, no una oración completa. La redacción española conserva esa incompletitud funcional y evita reconstrucciones contextuales no verificables.
  doctrine_reference: 'PHILOSOPHY.md: primacía del idioma original y transparencia ante la incertidumbre textual'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que eliminó 'own'/'propio' porque no está explícito en el griego; por eso el español usa solo posesivos simples ('de su hijo', 'de su hija').
  spanish_consistency_notes:
  - Se mantiene 'carne' para σάρξ, no 'carne' en sentido culinario de 'carne/meat'.
  - Se conserva el paralelismo repetido 'un hombre... y un hombre...' como en el griego.
  - No se introducen términos litúrgicos ni expansiones interpretativas ajenas al fragmento.
