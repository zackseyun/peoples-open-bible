  text: οὗ ἐξέχεεν ἐφ’ ἡμᾶς πλουσίως διὰ Ἰησοῦ Χριστοῦ τοῦ σωτῆρος ἡμῶν,
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/006.yaml
  text: whom he poured out on us richly through Jesus Messiah our Savior[b][a],
  footnotes:
