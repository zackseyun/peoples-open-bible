translation:
  language: es
  text: 'Y el Espíritu de Dios[a] vistió a Zacarías, hijo de Joyadá, el sacerdote; y se puso de pie por encima del pueblo, y les dijo: «Así dice Dios: ¿Por qué transgreden los mandamientos de Yahvé, para que no prosperen[b]? Porque ustedes han abandonado a Yahvé; él también los ha abandonado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Espíritu de Dios vino sobre Zacarías»; literalmente, «el Espíritu de Dios vistió a Zacarías».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no prosperarán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְר֣וּחַ אֱלֹהִ֗ים
  english_pob_choice: the Spirit of God
  chosen_spanish: el Espíritu de Dios
  alternatives_spanish:
  - el espíritu de Dios
  - un espíritu de Dios
  lexicon: HALOT
  rationale: En este contexto profético, רוּחַ אֱלֹהִים señala la agencia divina que capacita a Zacarías; por eso se conserva el sentido personal y se capitaliza «Espíritu» en español, como en el inglés auditado.
- source_word: לָֽבְשָׁה֙ אֶת
  english_pob_choice: clothed
  chosen_spanish: vistió
  alternatives_spanish:
  - revistió
  - lo vistió
  - vino sobre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «vestir/clotir». En español, «vistió» mantiene la metáfora sin sonar forzado; «vino sobre» sería una interpretación explicativa que atenúa la imagen corporal del texto.
- source_word: זְכַרְיָה֙ בֶּן יְהוֹיָדָ֣ע הַ/כֹּהֵ֔ן
  english_pob_choice: Zechariah son of Jehoiada the priest
  chosen_spanish: Zacarías, hijo de Joyadá, el sacerdote
  alternatives_spanish:
  - Zacarías hijo de Joyadá, el sacerdote
  - Zacarías, hijo del sacerdote Joyadá
  lexicon: transliteration (project conventions)
  rationale: Se translitera el nombre propio según la convención del proyecto. «Hijo de Joyadá, el sacerdote» preserva la relación apposicional del hebreo sin convertirla en una fórmula eclesiástica más interpretativa.
- source_word: וַֽ/יַּעֲמֹ֖ד מֵ/עַ֣ל לָ/עָ֑ם
  english_pob_choice: he stood above the people
  chosen_spanish: se puso en pie sobre el pueblo
  alternatives_spanish:
  - se colocó sobre el pueblo
  - estuvo por encima del pueblo
  - se puso de pie delante del pueblo
  lexicon: HALOT
  rationale: מֵעַל conserva una noción espacial de altura/posición sobre. «Sobre el pueblo» mantiene ese matiz más fielmente que «delante del pueblo», aunque sigue siendo natural en español.
- source_word: כֹּ֣ה אָמַ֣ר הָ/אֱלֹהִ֗ים
  english_pob_choice: Thus says God
  chosen_spanish: Así dice Dios
  alternatives_spanish:
  - Así ha dicho Dios
  - Esto dice Dios
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con un registro solemne y natural en español; «Así dice Dios» refleja el hebreo sin añadir elementos ausentes.
- source_word: לָ/מָה֩ אַתֶּ֨ם עֹבְרִ֜ים אֶת מִצְוֺ֤ת יְהוָה֙
  english_pob_choice: Why are you transgressing the commandments of Yahweh
  chosen_spanish: ¿Por qué transgreden los mandamientos de Yahvé?
  alternatives_spanish:
  - ¿Por qué quebrantan los mandamientos de Yahvé?
  - ¿Por qué pasan por encima de los mandamientos de Yahvé?
  lexicon: HALOT
  rationale: עבר con mandamientos expresa violación/transgresión, no solo movimiento. «Transgreden» preserva la fuerza moral y legal del hebreo; «mandamientos» mantiene el tono de pacto. Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: וְ/לֹ֣א תַצְלִ֔יחוּ
  english_pob_choice: so that you do not prosper
  chosen_spanish: para que no prosperen
  alternatives_spanish:
  - y no prosperarán
  - de modo que no tendrán éxito
  - para que no tengan éxito
  lexicon: HALOT
  rationale: La cláusula presenta resultado/consecuencia. En español, «para que no prosperen» conserva ese valor resultativo con un tono natural; se mantiene la ambigüedad entre prosperidad material y éxito general, como en el hebreo.
- source_word: כִּֽי עֲזַבְתֶּ֥ם אֶת יְהוָ֖ה
  english_pob_choice: Because you have forsaken Yahweh
  chosen_spanish: Porque ustedes han abandonado a Yahvé
  alternatives_spanish:
  - Porque han forsaken a Yahvé
  - Porque dejaron a Yahvé
  lexicon: HALOT
  rationale: עָזַב en contexto de pacto es «abandonar/forsake». «Han abandonado» es un equivalente natural y fiel; se conserva «Yahvé» para el nombre divino explícito del hebreo.
- source_word: וַ/יַּֽעֲזֹ֥ב אֶתְ/כֶֽם
  english_pob_choice: he has also forsaken you
  chosen_spanish: él también los ha abandonado
  alternatives_spanish:
  - él los ha abandonado también
  - él también los ha dejado
  lexicon: HALOT
  rationale: Se mantiene la reciprocidad verbal del hebreo con el mismo verbo «abandonar», para que la simetría retórica sea audible en español. «También» reproduce la respuesta judicial del texto sin sobreexplicar.
theological_decisions:
- issue: Representación de יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragramatón de forma directa, y la política del proyecto pide «Yahvé» en el cuerpo principal. Se evita la sustitución litúrgica «SEÑOR» para no ocultar el nombre divino del original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula profética y voz divina
  english_pob_reading: Thus says God
  chosen_spanish_reading: Así dice Dios
  alternative_spanish_readings:
  - Así dice el Señor
  - Esto dice Dios
  rationale: Aunque el hebreo dice simplemente «Dios», la fórmula profética mantiene la autoridad del mensaje sin introducir una equivalencia cristiana posterior ni suavizar el tono judicial.
  doctrine_reference: Profecía/autoridad del mensaje en el marco canónico
- issue: Tensión semántica de רוּחַ אֱלֹהִים לָבְשָׁה
  english_pob_reading: the Spirit of God clothed
  chosen_spanish_reading: el Espíritu de Dios vistió
  alternative_spanish_readings:
  - el Espíritu de Dios vino sobre
  - el espíritu de Dios lo envolvió
  rationale: Se conserva la metáfora corporal de «vestir» porque el hebreo la usa deliberadamente. Esto evita borrar la tensión entre acción espiritual y lenguaje físico que caracteriza la escena.
  doctrine_reference: Pneumatología narrativa / lenguaje metafórico del AT
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete hebreo y coincide con la lectura auditada en inglés, preservando la metáfora de «vestir», la simetría de «abandonar» y la fórmula profética. La principal adaptación es ajustar el orden y la fluidez del español sin borrar las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la imagen de «vistió» en lugar de parafrasear con «vino sobre».
  - «Transgreden» se mantiene para עבר con mandamientos por su fuerza jurídica y moral.
  - La estructura del discurso directo respeta el paralelismo del hebreo y el cierre recíproco del verbo abandonó/abandonado.
