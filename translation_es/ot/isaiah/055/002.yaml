translation:
  language: es
  text: ¿Por qué pesan plata[a] por lo que no es pan, y su trabajo por lo que no sacia? Escúchenme atentamente[b], y coman lo bueno, y que su alma se deleite[c] en la abundancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gastan dinero»; el hebreo literalmente dice «pesan plata», reflejando el pago por peso.
    reason: lexical_alternative
  - marker: b
    text: O «Escúchenme, escúchenme»; el hebreo intensifica la orden al unir un imperativo con un infinitivo absoluto.
    reason: lexical_alternative
  - marker: c
    text: O «en la gordura», «en la riqueza» o «en la abundancia».
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁקְלוּ / כֶסֶף
  english_pob_choice: weigh out silver
  chosen_spanish: pesan plata
  alternatives_spanish:
  - pesan dinero
  - pagan plata
  - pesan plata
  lexicon: HALOT
  rationale: שׁקל conserva la imagen concreta de pesar metales o moneda; en español, «pesar plata» reproduce mejor la escena económica antigua que «gastar dinero», y mantiene la correspondencia con el sustantivo literal כֶסֶף = «plata».
- source_word: בְּלוֹא לֶחֶם
  english_pob_choice: for what is not bread
  chosen_spanish: por lo que no es pan
  alternatives_spanish:
  - por no tener pan
  - por aquello que no es pan
  lexicon: HALOT
  rationale: La frase nominal negativa se vierte de forma cercana al hebreo. «Pan» es el equivalente natural de לֶחֶם en español bíblico y moderno, y conserva la oposición concreta entre alimento verdadero y sustituto.
- source_word: וִיגִיעֲכֶם
  english_pob_choice: your labor
  chosen_spanish: vuestro trabajo
  alternatives_spanish:
  - vuestra labor
  - vuestro esfuerzo
  - vuestra fatiga
  lexicon: HALOT
  rationale: יגיע puede referirse al esfuerzo o al fruto del esfuerzo. «Trabajo» funciona bien en español como término amplio y mantiene el paralelismo con el dinero gastado o ganado.
- source_word: לְשָׂבְעָה
  english_pob_choice: what does not satisfy
  chosen_spanish: lo que no sacia
  alternatives_spanish:
  - lo que no llena
  - lo que no satisface
  - lo que no da saciedad
  lexicon: HALOT
  rationale: La idea central es saciedad/plenitud. «Sacia» comunica con naturalidad la carencia de plenitud sin perder el valor corporal y metafórico del término.
- source_word: שִׁמְעוּ שָׁמוֹעַ
  english_pob_choice: Listen carefully
  chosen_spanish: Escuchen atentamente
  alternatives_spanish:
  - Escuchen, escuchen
  - Oigan atentamente
  - Escuchen bien
  lexicon: HALOT
  rationale: La combinación imperativo + infinitivo absoluto intensifica la orden. «Escuchen atentamente» transmite esa insistencia en español sin recurrir a una repetición que sonaría menos natural en lectura pública.
- source_word: וְאִכְלוּ טוֹב
  english_pob_choice: and eat what is good
  chosen_spanish: y coman lo bueno
  alternatives_spanish:
  - y coman el bien
  - y coman lo que es bueno
  - y coman cosas buenas
  lexicon: HALOT
  rationale: טוֹב puede funcionar substantivamente. «Lo bueno» conserva la amplitud del hebreo y evita restringirlo solo a comida material o solo a una valoración moral.
- source_word: וְתִתְעַנַּג
  english_pob_choice: let your soul delight itself
  chosen_spanish: se deleitará
  alternatives_spanish:
  - se deleitará a sí misma
  - se gozará
  - se deleitará vuestra alma
  lexicon: HALOT
  rationale: El verbo hitpael expresa deleite/reflexividad. En español, incorporar explícitamente «vuestra alma» en el verbo resultaría pesado; la formulación mantiene el movimiento reflexivo y deja que el sujeto siguiente determine la persona y número.
- source_word: בַּדֶּשֶׁן
  english_pob_choice: in richness
  chosen_spanish: en la abundancia
  alternatives_spanish:
  - en la riqueza
  - en la gordura
  - en la plenitud
  lexicon: HALOT
  rationale: דֶּשֶׁן literalmente alude a grasa/fatness, por extensión a riqueza o abundancia. «Abundancia» conserva la idea de plenitud sin la connotación moderna problemática de «gordura».
- source_word: נַפְשְׁכֶם
  english_pob_choice: your soul
  chosen_spanish: vuestra alma
  alternatives_spanish:
  - vuestro ser
  - vuestra vida
  - vosotros mismos
  lexicon: HALOT
  rationale: נֶפֶשׁ puede ser alma, vida o persona. Aquí «alma» preserva el registro poético y la referencia interior del hebreo, acorde con la invitación a la satisfacción integral.
theological_decisions:
- issue: Imagen de alimento como invitación divina
  english_pob_reading: Retain the food imagery ('bread,' 'eat,' 'satisfy') as metaphorical invitation rather than paraphrasing into explicitly spiritual categories.
  chosen_spanish_reading: Conservar la imagen de pan, comer, saciar y deleitar, sin espiritualizarla de manera explícita en el texto principal.
  alternative_spanish_readings:
  - ¿Por qué invierten en lo que no alimenta espiritualmente?
  - ¿Por qué buscan satisfacción espiritual en lo que no es pan?
  rationale: El hebreo usa lenguaje concreto de alimento para expresar provisión y satisfacción. Traducirlo en clave abiertamente espiritual añadiría interpretación que el texto no formula y reduciría su fuerza poética.
  doctrine_reference: 'Principio de traducción POB: no paraphrase beyond what the source text warrants; preserve documented metaphor and tension.'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide sustancialmente con el auditable inglés POB. Se mantuvieron las imágenes de peso/comida/saciedad y la intensificación del llamado al oír, con ajustes naturales para español público.
  spanish_consistency_notes:
  - Se conservó «plata» para כֶסֶף por la metáfora económica concreta.
  - Se evitó «SEÑOR» y no aparece el Tetragrámaton en este versículo.
  - «Lo bueno» y «abundancia» mantienen amplitud semántica sin estrechar el hebreo.
  - La puntuación busca una lectura pública clara y digna.
