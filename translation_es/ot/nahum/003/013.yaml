translation:
  language: es
  text: ¡Mira![a] Tus tropas son mujeres en medio de ti; las puertas de tu tierra están abiertas de par en par[b] para tus enemigos. El fuego ha consumido tus cerrojos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu pueblo son mujeres en medio de ti». El hebreo עם suele significar «pueblo»; aquí probablemente se refiere a los defensores de Nínive en el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «abiertas, han sido abiertas»; construcción enfática que significa «abiertas de par en par» o «completamente abiertas».'
    reason: lexical_alternative
  - marker: c
    text: O «tus barras» o «tus pernos». Se refiere a las piezas que aseguran las puertas de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡He aquí!
  - ¡Mira esto!
  lexicon: HALOT
  rationale: La partícula funciona como interjección deíctica que introduce una observación enfática. «¡Mira!» conserva la vivacidad del llamado sin recurrir a un tono arcaizante.
- source_word: עַמֵּךְ
  english_pob_choice: your troops
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tus tropas
  - tu ejército
  lexicon: HALOT
  rationale: El hebreo con עם suele significar «pueblo»; en este contexto militar puede referir a los defensores de Nínive. En español, «tu pueblo» mantiene esa amplitud semántica y deja visible la tensión contextual sin fijar demasiado la interpretación.
- source_word: נָשִׁים
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - como mujeres
  - mujeres débiles
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal para retener la imagen profética de vergüenza o debilidad militar. No se suaviza ni se expande con una comparación que el hebreo no explicita.
- source_word: בְּקִרְבֵּךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - dentro de ti
  - en tu interior
  lexicon: HALOT
  rationale: La locución idiomática se expresa de manera natural en español con «en medio de ti», preservando la idea de condición interna o localizada dentro de la ciudad/pueblo.
- source_word: לְאֹיְבַיִךְ
  english_pob_choice: to your enemies
  chosen_spanish: a tus enemigos
  alternatives_spanish:
  - para tus enemigos
  - ante tus enemigos
  lexicon: HALOT
  rationale: La preposición introduce la relación de entrega o dirección hacia los enemigos, en paralelo con la imagen de las puertas abiertas. «A tus enemigos» resulta idiomático y fiel.
- source_word: פָּתּוֹחַ נִפְתְּחוּ
  english_pob_choice: stand wide open
  chosen_spanish: les quedan abiertas
  alternatives_spanish:
  - están completamente abiertas
  - se abrieron por completo
  lexicon: HALOT
  rationale: La construcción enfática con infinitivo absoluto y verbo finito comunica apertura total. En español, «les quedan abiertas» transmite el resultado visible, mientras que el efecto de apertura amplia queda reforzado por el contexto y la nota.
- source_word: שַׁעֲרֵי אַרְצֵךְ
  english_pob_choice: the gates of your land
  chosen_spanish: las puertas de tu tierra
  alternatives_spanish:
  - las puertas de tu país
  - las puertas de tu territorio
  lexicon: HALOT
  rationale: Se vierte שערים como «puertas» en un contexto de ciudad fortificada. «Tierra» conserva el valor de ארץ como territorio o dominio, y evita una carga moderna innecesaria de «país».
- source_word: אָכְלָה אֵשׁ
  english_pob_choice: fire has consumed
  chosen_spanish: el fuego ha consumido
  alternatives_spanish:
  - el fuego ha devorado
  - el fuego consumió
  lexicon: HALOT
  rationale: El sujeto hebreo es «fuego»; el perfecto expresa un hecho consumado. «Ha consumido» reproduce bien el resultado y suena natural en español.
- source_word: בְּרִיחָיִךְ
  english_pob_choice: your bars
  chosen_spanish: tus cerrojos
  alternatives_spanish:
  - tus barras
  - tus goznes
  lexicon: HALOT
  rationale: La referencia es a los travesaños o cerrojos que aseguran las puertas de la ciudad. «Cerrojos» es claro en español y comunica bien la función defensiva del término.
theological_decisions:
- issue: Imagen de género en נָשִׁים
  english_pob_reading: Retain the literal 'women' in the main text as part of the prophetic image of military weakness.
  chosen_spanish_reading: Mantener «mujeres» en el texto principal como imagen profética de debilidad o humillación militar.
  alternative_spanish_readings:
  - como mujeres
  - débiles como mujeres
  rationale: El hebreo no añade una comparación explícita; por eso se conserva el sustantivo literal. Esto preserva la tensión retórica del texto sin neutralizarla ni reinterpretarla en exceso.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4 (Gender-accurate over gender-neutral)
- issue: Valor enfático de פתוח נפתחו
  english_pob_reading: opened wide / completely opened
  chosen_spanish_reading: «les quedan abiertas» con la nota de apertura total.
  alternative_spanish_readings:
  - están abiertas de par en par
  - están completamente abiertas
  rationale: La construcción hebrea intensifica la idea de apertura. El español principal puede expresar el resultado con naturalidad, pero la nota debe preservar la fuerza enfática para no perder el matiz semántico documentado.
  doctrine_reference: HALOT; nota lexical correspondiente al infinitivo absoluto con verbo finito
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente; el estado más reciente indica acuerdo alto y sin cambios necesarios. La redacción española busca reflejar ese consenso, manteniendo las tensiones léxicas documentadas sin añadir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva la imaginería militar y la literalidad de «mujeres» sin suavizarla.
  - «Puertas» y «cerrojos» se eligieron para un español natural, con la nota explicativa preservando el sentido técnico de los elementos defensivos.
  - La puntuación usa el estilo español y el tono es digno, moderno y publicable.
