translation:
  language: es
  text: Todos tus amantes[a] se han olvidado de ti; no te buscan. Porque te herí con la herida de un enemigo, con cruel disciplina[b], a causa de la grandeza de tu iniquidad; tus pecados son numerosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus aliados». El hebreo dice literalmente «tus amantes», conservando la metáfora recurrente de Jeremías sobre vínculos políticos y espirituales ilícitos.
    reason: lexical_alternative
  - marker: b
    text: O «con dura corrección» o «con cruel castigo correctivo».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְאַהֲבַיִךְ
  english_pob_choice: your lovers
  chosen_spanish: tus amantes
  alternatives_spanish:
  - tus aliados
  - los que te aman
  lexicon: HALOT
  rationale: El sustantivo deriva de אהב y, en este contexto de Jeremías, conserva la metáfora de vínculos amorosos ilícitos aplicados a apoyos políticos y espirituales. «Amantes» mantiene esa carga metafórica mejor que «aliados», que la aplana; «los que te aman» suena demasiado neutral.
- source_word: שְׁכֵחוּךְ
  english_pob_choice: have forgotten you
  chosen_spanish: se han olvidado de ti
  alternatives_spanish:
  - te han olvidado
  - te han abandonado
  lexicon: HALOT
  rationale: שׁכח significa «olvidar». En español, «se han olvidado de ti» comunica bien el valor perfecto con relevancia presente. «Abandonado» sería una intensificación interpretativa que el hebreo no exige.
- source_word: יִדְרֹשׁוּ
  english_pob_choice: seek
  chosen_spanish: te buscan
  alternatives_spanish:
  - te buscan y preguntan por ti
  - te inquieren
  lexicon: HALOT
  rationale: דָּרַשׁ puede significar buscar, inquirir o preocuparse por. En este verso la idea es que ya no salen a buscarla ni a interesarse por ella. «Te buscan» es breve y natural en español, y conserva el núcleo léxico sin sobreexplicar.
- source_word: מַכַּת אוֹיֵב
  english_pob_choice: the wound of an enemy
  chosen_spanish: la herida de un enemigo
  alternatives_spanish:
  - el golpe de un enemigo
  - la lesión de un enemigo
  lexicon: HALOT
  rationale: מַכָּה puede ser golpe, herida o plaga. Dado el paralelismo con «te herí», «la herida de un enemigo» conserva la imagen de daño corporal/infligido y suena natural en español.
- source_word: הִכִּיתִיךְ
  english_pob_choice: I have struck you
  chosen_spanish: te herí
  alternatives_spanish:
  - te golpeé
  - te he herido
  lexicon: HALOT
  rationale: נכה es el verbo estándar «golpear / herir / herir de golpe». Aquí «te herí» mantiene la relación semántica con «herida» y evita una repetición áspera en español, sin perder la acción divina de juicio.
- source_word: מוּסַר אַכְזָרִי
  english_pob_choice: with cruel discipline
  chosen_spanish: con cruel disciplina
  alternatives_spanish:
  - con cruel corrección
  - con áspero castigo
  lexicon: HALOT
  rationale: מוּסָר es disciplina, corrección o disciplina correctiva; אַכְזָרִי significa cruel, severo, despiadado. «Cruel disciplina» reproduce bien la combinación de corrección y dureza sin introducir un lenguaje eclesiástico menos preciso.
- source_word: עַל רֹב עֲוֺנֵךְ
  english_pob_choice: because of the greatness of your iniquity
  chosen_spanish: a causa de la grandeza de tu iniquidad
  alternatives_spanish:
  - por la multitud de tu iniquidad
  - por la magnitud de tu culpa
  lexicon: HALOT
  rationale: רֹב expresa abundancia o grandeza; עָוֹן puede ser iniquidad, culpa o perversidad. «Grandeza de tu iniquidad» preserva tanto la medida como el peso moral del término, y «a causa de» expresa con claridad la relación causal.
- source_word: עָצְמוּ חַטֹּאתָיִךְ
  english_pob_choice: your sins are numerous
  chosen_spanish: tus pecados son numerosos
  alternatives_spanish:
  - tus pecados han aumentado
  - tus pecados se han multiplicado
  lexicon: HALOT
  rationale: עָצַם puede significar ser fuerte o hacerse numeroso, según el contexto. Aquí, con «pecados», la idea es multiplicación o abundancia. «Son numerosos» refleja esa conclusión de manera directa y no sugiere un proceso que el hebreo no explicita.
theological_decisions:
- issue: Agencia divina en el juicio
  english_pob_reading: The verse states that God himself has struck Zion/Judah in judgment because of her iniquity and multiplied sins.
  chosen_spanish_reading: El verso afirma que Dios mismo hiere a su pueblo en juicio por causa de su iniquidad y de sus muchos pecados.
  alternative_spanish_readings:
  - El verso podría suavizarse para destacar solo la acción del enemigo o una simple consecuencia.
  - El verso podría expresarse de forma pasiva para atenuar la agencia divina.
  rationale: El hebreo dice explícitamente «yo te herí» y funda la acción en la iniquidad y los pecados del pueblo. La traducción conserva esa tensión teológica sin amortiguarla ni ampliarla.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión del inglés POB, que prefirió «your sins are numerous» en lugar de «have become many» para reflejar mejor el hebreo sin implicar un proceso no explicitado. La versión española adopta ese mismo ajuste con «tus pecados son numerosos».
  spanish_consistency_notes:
  - Se conserva «Yahvé» implícito solo cuando el texto lo exige; en este versículo no aparece el nombre divino explícito.
  - Se mantiene «iniquidad» para עָוֹן y «pecados» para חַטֹּאת, distinguiendo ambas palabras como en el original.
  - «Amantes» reproduce la metáfora profética sin sustituirla por «aliados» en el texto principal; la alternativa queda en nota.
  - «Disciplina» se usa para מוּסָר, siguiendo la decisión inglesa de evitar un giro eclesiástico más interpretativo como «castigo» o «corrección» en el texto principal.
