review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: prohibición de sacar una carga de las casas en el sábado, prohibición general de hacer trabajo, y mandato de santificar el día, seguido de la comparación con el mandato dado a los padres. Sin embargo, hay ajustes necesarios para mayor fidelidad idiomática y claridad: «en día de sábado» es poco natural e incompleto en español; «ninguna obra» no comunica tan bien מְלָאכָה en legislación sabática como «ningún trabajo».'
  spanish_quality_summary: 'El texto es mayormente comprensible, pero suena algo calcado en dos puntos: «en día de sábado» y «ninguna obra». En español bíblico actual y de lectura eclesial amplia, «en el día de sábado» o mejor «el día de sábado»/«en el sábado» sería más natural; dado que el proyecto desea conservar «día», «el día de sábado» funciona bien. «Trabajo» es más claro que «obra» para la prohibición sabática. También conviene mantener paralelismo fluido con «sino santifiquen».'
  glossary_alignment: No hay conflictos con los términos doctrinales principales del proyecto. «Santifiquen» respeta bien וְקִדַּשְׁתֶּם. «Sus padres» preserva el masculino de אֲבוֹתֵיכֶם conforme a la política documentada. El problema principal es léxico-estilístico con מְלָאכָה y la frase temporal del sábado, no de glosario doctrinal.
  issues:
  - severity: medium
    issue: «en día de sábado» suena antinatural en español
    rationale: Aunque busca reflejar explícitamente «día», la ausencia de artículo produce una frase poco idiomática. El hebreo puede representarse fielmente con «el día de sábado», que conserva «día» y mejora la legibilidad.
  - severity: medium
    issue: «ninguna obra» es menos preciso que «ningún trabajo» para מְלָאכָה
    rationale: En contexto de legislación sabática, מְלָאכָה se entiende como trabajo/labor prohibida. «Obra» en español puede sonar vaga o literaria y no comunica con igual claridad la prohibición práctica.
  - severity: low
    issue: La nota alternativa puede sonar redundante con «saquen ... fuera de sus casas»
    rationale: 'Como alternativa léxica está bien, pero conviene formularla de manera natural y cercana al inglés auditado: «saquen una carga de sus casas» o «lleven una carga fuera de sus casas».'
