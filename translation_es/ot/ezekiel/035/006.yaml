    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sangre»; aquí el sentido probablemente es «derramamiento de sangre» o culpa violenta de sangre.'
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota [a] para que corresponda a la frase explicada en el original hebreo y se ajustó la fórmula divina a 'el Señor Dios, Yahvé' para preservar explícitamente יהוה conforme al proyecto sin recurrir a la combinación menos natural 'Señor Yahvé'. El resto del versículo se mantiene porque refleja bien la repetición de 'sangre' y el tono solemne del pasaje.
