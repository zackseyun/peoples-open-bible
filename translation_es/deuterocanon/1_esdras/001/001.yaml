revisions:
- from: Y Josías celebró la Pascua en Jerusalén para su Señor[a], y sacrificaron la Pascua el día catorce del primer mes.
  to: Y Josías observó la Pascua en Jerusalén a su Señor[a], y sacrificaron la Pascua el día catorce del primer mes.
  rationale: La revisión es menor. Cambio 'celebró' por 'observó' para reflejar mejor el sentido de guardar la Pascua como observancia cultual, en línea con la decisión léxica auditada en inglés. Cambio 'para su Señor' por 'a su Señor' porque corresponde más directamente al dativo griego y armoniza con la nota existente. Mantengo 'sacrificaron la Pascua' y la referencia calendárica, que son fieles y naturales en español.
  reviewer_model: gpt-5.4
