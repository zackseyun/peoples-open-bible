revisions:
- from: Él examinará la infección[a], y si la infección en las paredes de la casa consiste en depresiones verdosas o rojizas, y su apariencia es más baja que la pared[b],
  to: Él examinará la infección[a], y si la infección en las paredes de la casa consiste en depresiones verdosas o rojizas, y su aspecto es más profundo que la pared[b],
  rationale: Se conserva la estructura y la terminología principal del borrador, pero se reemplaza «su apariencia es más baja que la pared» por «su aspecto es más profundo que la pared» para expresar en español natural el criterio visual de hundimiento que el contexto exige. También se ajusta levemente la nota para mantener la conexión con la literalidad hebrea y la explicación contextual.
