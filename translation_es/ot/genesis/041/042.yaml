  to: Entonces Faraón quitó de su mano el anillo de sello[a] y se lo puso en la mano a José, y lo vistió con vestiduras de lino fino[b] y le puso al cuello un collar de oro[c].
  rationale: Se corrige el anclaje de la nota [a] para que recaiga sobre «anillo de sello», que es el término explicado por la nota. También se mejora la naturalidad de «lo puso sobre la mano de José» a «se lo puso en la mano a José», manteniendo el sentido físico del hebreo en un español más idiomático. Se conservan las decisiones léxicas principales del POB auditado.
