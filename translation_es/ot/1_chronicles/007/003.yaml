translation:
  language: es
  text: 'Y los hijos de Uzzi: Izrajías. Y los hijos de Izrajías: Miguel, Obadías, Joel e Isshías—cinco, todos ellos jefes[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cinco jefes' o 'cinco jefes de familia'. El hebreo dice literalmente 'cinco cabezas, todos ellos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Entonces los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: La fórmula genealógica בְּנֵי se expresa de forma natural como 'los hijos de'. Conservo la conjunción inicial 'Y' para mantener la continuidad de la lista genealógica, como hace la POB en inglés.
- source_word: עֻזִּי
  english_pob_choice: Uzzi
  chosen_spanish: Uzzi
  alternatives_spanish:
  - Uzi
  lexicon: HALOT
  rationale: Nombre propio transliterado. Mantengo la forma breve y reconocible en español, cercana al hebreo y coherente con la práctica de nombres propios bíblicos.
- source_word: יִזְרַחְיָה
  english_pob_choice: Izrahiah
  chosen_spanish: Izrajías
  alternatives_spanish:
  - Izrahía
  - Izraquías
  - Izrahyá
  lexicon: HALOT
  rationale: Nombre propio transliterado. El español evita la secuencia final inglesa '-iah' y emplea '-ías' para reflejar la terminación teofórica de manera legible; se conserva la misma forma en las dos apariciones.
- source_word: מִיכָאֵל
  english_pob_choice: Michael
  chosen_spanish: Miguel
  alternatives_spanish:
  - Micael
  - Mijael
  lexicon: HALOT
  rationale: Nombre propio con forma bíblica ya asentada en español. 'Miguel' es la equivalencia tradicional y clara para este nombre, más natural para la lectura eclesial que una transliteración estricta.
- source_word: וְעֹבַדְיָה
  english_pob_choice: Obadiah
  chosen_spanish: Obadías
  alternatives_spanish:
  - Obadiah
  - Abdías
  lexicon: HALOT
  rationale: Nombre propio con forma tradicional en español. 'Obadías' conserva la referencia nominal del hebreo y resulta más transparente que variantes menos asentadas.
- source_word: וְיוֹאֵל
  english_pob_choice: Joel
  chosen_spanish: Joel
  alternatives_spanish:
  - Yoel
  lexicon: HALOT
  rationale: Nombre propio con forma tradicional y bíblica en español. La grafía 'Joel' es la más natural y reconocible.
- source_word: יִשִּׁיָּה
  english_pob_choice: Isshiah
  chosen_spanish: Isshías
  alternatives_spanish:
  - Ishías
  - Jishías
  lexicon: HALOT
  rationale: Nombre propio transliterado. Adapto la terminación al español con '-ías' para mantener consistencia con otros nombres hebreos de terminación similar, sin ocultar la forma consonántica base.
- source_word: חֲמִשָּׁה
  english_pob_choice: five
  chosen_spanish: cinco
  alternatives_spanish:
  - cinco
  lexicon: HALOT
  rationale: Numeral cardinal directo y sin ambigüedad.
- source_word: רָאשִׁים
  english_pob_choice: heads
  chosen_spanish: jefes
  alternatives_spanish:
  - cabezas
  - jefes de familia
  - líderes
  lexicon: HALOT
  rationale: En contexto genealógico, רָאשִׁים puede referirse a jefes de clan o de familia. 'Jefes' comunica el valor funcional en español sin perder la imagen de liderazgo; 'cabezas' sería más literal pero menos idiomático.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - cada uno de ellos
  - todos los mismos
  lexicon: HALOT
  rationale: La expresión enfática se vierte de modo natural como 'todos ellos', preservando el matiz inclusivo y resumitivo del hebreo.
theological_decisions:
- issue: Término genealógico y rango de liderazgo en רָאשִׁים
  english_pob_reading: five, all of them heads
  chosen_spanish_reading: cinco, todos ellos jefes
  alternative_spanish_readings:
  - cinco, todos ellos cabezas
  - cinco jefes, todos ellos
  - cinco jefes de familia, todos ellos
  rationale: El hebreo presenta una tensión entre la literalidad 'cabezas' y el sentido relacional de jefatura en un registro genealógico. El español 'jefes' conserva la noción de autoridad/clan sin sonar duro ni confuso. No se añade 'familia' en el texto principal porque el hebreo solo dice 'heads'; esa precisión queda implícita por el contexto genealógico.
  doctrine_reference: Ninguna; decisión léxico-contextual sin implicación doctrinal.
translation_notes:
  revision_awareness: La revisión de la fuente inglesa no introdujo cambios sustantivos; se mantiene la misma estructura genealógica y el mismo énfasis de 'cinco, todos ellos heads'. La versión española conserva esa línea interpretativa y adapta la lista de nombres a formas reconocibles y consistentes en español.
  spanish_consistency_notes:
  - Se mantiene 'Y' al inicio para reproducir la continuidad narrativa de la genealogía.
  - Se conserva el mismo nombre en ambas apariciones de יִזְרַחְיָה como Izrajías.
  - Los nombres propios se adaptan a formas bíblicas españolas cuando existe una forma asentada (Miguel, Obadías, Joel).
  - La nota al pie se ancla en 'jefes' porque ahí se concentra la decisión léxica relevante del verso.
