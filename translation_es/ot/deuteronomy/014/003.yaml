translation:
  language: es
  text: No comerás[a] nada detestable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ninguna cosa abominable». El término hebreo se refiere a algo aborrecible o detestable; aquí introduce la lista de alimentos prohibidos que sigue.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: La partícula negativa introduce una prohibición directa en contexto legal; en español, «no» comunica con claridad el mandato negativo sin añadir matiz no presente.
- source_word: תֹאכַל
  english_pob_choice: you shall eat
  chosen_spanish: comerás
  alternatives_spanish:
  - has de comer
  - deberás comer
  lexicon: HALOT
  rationale: En hebreo legal, el imperfecto con לֹא expresa prohibición. En español, la forma futura negativa («no comerás») transmite bien la fuerza normativa sin sonar innecesariamente explicativa.
- source_word: כָּל
  english_pob_choice: any
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - cualquier cosa
  lexicon: HALOT
  rationale: Con negación y un sustantivo singular, el español natural expresa el alcance total con «nada»; preserva la idea de exclusión completa que en inglés se rindió con «any».
- source_word: תּוֹעֵבָה
  english_pob_choice: detestable thing
  chosen_spanish: detestable
  alternatives_spanish:
  - abominable
  - abominación
  lexicon: HALOT
  rationale: «Detestable» conserva la fuerza de algo aborrecible o ritualmente repulsivo, con registro claro y digno. «Abominación» sería posible, pero en español puede sonar más abstracto o más cargado teológicamente de lo que exige este contexto alimentario.
theological_decisions:
- issue: Fuerza de la prohibición en ley de pacto
  english_pob_reading: 'Direct legal prohibition: ''You shall not eat any detestable thing.'''
  chosen_spanish_reading: 'Prohibición legal directa: «No comerás nada detestable.»'
  alternative_spanish_readings:
  - «No debes comer nada detestable.»
  - «No comerás ninguna cosa detestable.»
  rationale: El hebreo con לֹא + imperfecto en este contexto normativo funciona como prohibición. La traducción elegida mantiene ese carácter vinculante sin suavizarlo a mera instrucción general ni introducir interpretación adicional.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo de WLC y mantiene la misma decisión semántica central del POB inglés: una prohibición legal directa. La principal adaptación al español es el uso idiomático de «nada detestable» para reflejar el valor de כָּל bajo negación sin perder el alcance total.'
  spanish_consistency_notes:
  - Se mantiene «detestable» como equivalente principal de תּוֹעֵבָה, en continuidad con la opción inglesa auditada.
  - Se evitó «abominación» en el texto principal para no endurecer innecesariamente el registro ni desplazar el sentido alimentario/covenantal del contexto.
  - La forma futura negativa («No comerás») conserva el tono normativo de la ley en español bíblico contemporáneo.
