translation:
  language: es
  text: Ellos reunieron a sus hermanos[a], se consagraron y vinieron, conforme al mandamiento del rey, por las palabras de Yahvé[b], para purificar la casa de Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus parientes». El hebreo dice literalmente «sus hermanos»; en contexto se trata de sus compañeros levitas.
    reason: lexical_alternative
  - marker: b
    text: O «según las palabras de Yahvé». El hebreo usa la preposición בְּ («por/mediante/en»), seguida del plural «palabras».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «la casa de Yahvé»; es decir, el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאַסְפוּ
  english_pob_choice: They gathered
  chosen_spanish: reunieron
  alternatives_spanish:
  - juntaron
  - agruparon
  lexicon: HALOT
  rationale: El verbo אסף expresa reunir o juntar. «Reunieron» conserva la acción activa y suena natural en español sin añadir matices que el hebreo no exige.
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus compañeros levitas
  lexicon: HALOT
  rationale: El hebreo usa un término de parentesco en masculino plural. En el contexto se refiere a varones levitas, pero la expresión literal se conserva como «sus hermanos» para no neutralizar ni suavizar el término.
- source_word: וַיִּתְקַדְּשׁוּ
  english_pob_choice: consecrated themselves
  chosen_spanish: se consagraron
  alternatives_spanish:
  - se santificaron
  - se dedicaron
  lexicon: HALOT
  rationale: En contexto de servicio ritual, el hitpael de קדשׁ indica preparación sagrada. «Se consagraron» comunica bien esa acción en español moderno y evita el tono más arcaico de «santificaron».
- source_word: וַיָּבֹאוּ
  english_pob_choice: and came
  chosen_spanish: y entraron
  alternatives_spanish:
  - y vinieron
  - y llegaron
  lexicon: HALOT
  rationale: Aunque el verbo básico es «venir», en este contexto la llegada se entiende hacia el recinto del templo para el servicio. «Entraron» hace explícita esa dirección implícita sin cambiar el sentido.
- source_word: כְמִצְוַת הַמֶּלֶךְ
  english_pob_choice: according to the command of the king
  chosen_spanish: conforme al mandamiento del rey
  alternatives_spanish:
  - según el mandato del rey
  - de acuerdo con la orden del rey
  lexicon: HALOT
  rationale: La construcción expresa conformidad con una orden real. «Conforme al mandamiento del rey» refleja bien la relación normativa y mantiene un registro digno y bíblico.
- source_word: בְּדִבְרֵי יְהוָה
  english_pob_choice: by the words of Yahweh
  chosen_spanish: por las palabras de Yahvé
  alternatives_spanish:
  - según las palabras de Yahvé
  - de acuerdo con las palabras de Yahvé
  lexicon: HALOT
  rationale: El plural «palabras» está presente en el hebreo y conviene preservarlo. La preposición «por» reproduce la relación instrumental/mediante del hebreo sin convertirla en una paráfrasis más interpretativa. Se mantiene «Yahvé» según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» en español, siguiendo la terminología del proyecto para preservar el nombre divino sin sustituirlo por un título.
- source_word: לְטַהֵר
  english_pob_choice: to cleanse
  chosen_spanish: para limpiar
  alternatives_spanish:
  - para purificar
  - para limpiar ritualmente
  lexicon: HALOT
  rationale: En contexto del templo, טהר alude a limpieza ritual. «Limpiar» es un equivalente claro y natural en español; el contexto sacro evita que se lea como una limpieza meramente material.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahweh
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa de Yahvé». Se conserva esa formulación para mantener la metáfora cultual del original; «templo» sería interpretativo aunque legítimo como glosa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La forma española del proyecto es «Yahvé», para preservar el nombre propio divino en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre la orden del rey y las palabras de Yahvé
  english_pob_reading: according to the command of the king ... by the words of Yahweh
  chosen_spanish_reading: conforme al mandamiento del rey, por las palabras de Yahvé
  alternative_spanish_readings:
  - conforme al mandamiento del rey, según las palabras de Yahvé
  - conforme al mandamiento del rey, de acuerdo con las palabras de Yahvé
  rationale: La sintaxis hebrea distingue la norma real y el fundamento divino. «Conforme» y «por» permiten conservar ambas capas sin fusionarlas ni suavizarlas en una sola idea.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: preserve source distinctions and tensions'
- issue: Preparación ritual para servicio sagrado
  english_pob_reading: consecrated themselves
  chosen_spanish_reading: se consagraron
  alternative_spanish_readings:
  - se santificaron
  - se apartaron
  rationale: El verbo hitpael de קדשׁ en este contexto se refiere a una preparación ritual para el servicio del santuario. «Se consagraron» comunica esa preparación sin cargar la frase con un matiz doctrinal posterior más fuerte del que exige el verso.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: lexical precision in cultic contexts'
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB en inglés, que prefirió «by the words of Yahweh» para reflejar más directamente בְּדִבְרֵי y evitar una redundancia con «according to». En español se preserva esa distinción con «conforme al mandamiento del rey, por las palabras de Yahvé». También se mantiene la lectura cultual de «la casa de Yahvé» con la opción tradicional equivalente como nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de manera consistente con la norma del proyecto.
  - Se conserva el paralelismo entre la orden del rey y la norma divina.
  - «Sus hermanos» mantiene la forma masculina plural del hebreo sin neutralización.
  - «Se consagraron» comunica preparación ritual y no una simple auto-mejora moral.
  - «La casa de Yahvé» preserva la metáfora del original; la nota permite la equivalencia «templo» sin imponerla en el texto principal.
