  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: Moisés habla a Coré y a toda su congregación, anuncia que por la mañana Yahvé revelará quién le pertenece, quién es santo, y repetidamente expresa el acercamiento cultual al escogido. Conserva correctamente «Yahvé» para יְהוָה y mantiene la repetición de קרב. Sin embargo, «Mañana» en español puede entenderse como ‘el día siguiente’ más que ‘por la mañana’, y «Al que él escoja» es menos natural que una formulación más directa; además, la nota [b] debe anclar mejor el lenguaje de «acercar».'
  spanish_quality_summary: El texto es claro y digno, pero requiere un ajuste menor para mejorar naturalidad y precisión temporal en español bíblico moderno. «Por la mañana» evita ambigüedad; «al que él escoja» puede mantenerse, pero «a quien él escoja» suena más fluido. La redacción general es legible y no cae en calcos excesivamente duros.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; no hay conflicto con otros términos doctrinales principales. El lenguaje cultual de קרב se conserva adecuadamente con «hará acercarse», aunque «acercará» sería más idiomático; dado el historial POB, se puede mantener la formulación más explícita y apoyarla con nota.'
  issues:
  - severity: medium
    issue: «Mañana» traduce בֹּקֶר de forma potencialmente ambigua.
    rationale: בֹּקֶר significa ‘por la mañana / en la mañana’, no simplemente ‘mañana’ en el sentido de ‘el día siguiente’. En español contemporáneo, «Mañana» al inicio de cita puede inducir esa lectura temporal distinta.
  - severity: low
    issue: La cláusula «Al que él escoja» suena algo menos natural en español que «A quien él escoja».
    rationale: Ambas son válidas, pero «a quien» fluye mejor en registro formal y conserva el valor personal del relativo.
  - severity: low
    issue: La nota [b] puede expresar con más precisión que el lenguaje cultual se refiere al verbo «acercar».
    rationale: El inglés POB nota el matiz sacerdotal de ‘bring near’; conviene que la nota española se vincule claramente a esa expresión y a la presencia de Yahvé.
  revised_spanish_text: 'Y habló a Coré y a toda su congregación, diciendo: «Por la mañana Yahvé hará saber quién es suyo[a], y quién es santo, y lo hará acercarse a él. A quien él escoja[b], lo hará acercarse a él».'
  revised_footnotes:
