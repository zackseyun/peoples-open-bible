translation:
  language: es
  text: 'Yahvé oyó el sonido de sus palabras[a], y se enojó y juró, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la voz de sus palabras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, siguiendo la decisión documental del POB de no sustituirlo por un título. En español, 'Yahvé' es la forma transliterada natural y más reconocible para mantener el nombre personal del pacto.
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  lexicon: HALOT
  rationale: '''Oyó'' reproduce con claridad el sentido básico de oír/percibir auditivamente en este contexto narrativo. ''Escuchó'' podría sugerir atención deliberada, matiz no exigido aquí.'
- source_word: אֶת קוֹל דִּבְרֵיכֶם
  english_pob_choice: the sound of your words
  chosen_spanish: la voz de sus palabras
  alternatives_spanish:
  - el sonido de sus palabras
  - lo que dijeron
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'la voz de sus palabras'. Se conserva la tensión lexical entre 'voz' y 'palabras' en vez de suavizarla a 'lo que dijeron', porque el POB inglés preserva esa expresión como alternativa transparente. Se usa 'sus' para referirlo correctamente a los destinatarios del discurso en español del contexto inmediato.
- source_word: וַיִּקְצֹף
  english_pob_choice: was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se irritó
  - se airó
  lexicon: HALOT
  rationale: El verbo expresa ira; 'se enojó' es idiomático y fiel en español moderno. 'Se airó' sería más elevado pero menos natural; 'se irritó' puede sonar más leve.
- source_word: וַיִּשָּׁבַע
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - prestó juramento
  lexicon: HALOT
  rationale: '''Juró'' es el equivalente directo y conciso del verbo de juramento. ''Hizo un juramento'' explicita más de lo que el hebreo requiere.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Se mantiene la fórmula introductoria de habla directa con 'diciendo', que refleja la estructura del hebreo y prepara la cita del versículo siguiente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La decisión doctrinal del POB es preservar el nombre divino del pacto en lugar de ocultarlo tras 'el SEÑOR'. En español, 'Yahvé' transmite esa misma elección y mantiene la referencia explícita al nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión hebrea 'la voz de vuestros/ustedes palabras'
  english_pob_reading: the sound of your words
  chosen_spanish_reading: la voz de sus palabras
  alternative_spanish_readings:
  - el sonido de sus palabras
  - la voz de sus dichos
  rationale: Se conserva la metáfora semítica sin reducirla a una paráfrasis. Aunque 'voz de sus palabras' suena menos idiomático que una versión explicativa, mantiene la textura del original y la alternativa lexical documentada por el POB.
  doctrine_reference: HALOT 6963 + 1697
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con el audit trail inglés y no requiere revisión sustantiva. Se mantuvo la sintaxis narrativa simple, el nombre divino explícito y la expresión semítica sobre la 'voz' de las palabras, evitando una paráfrasis que borrara la transparencia léxica documentada.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva 'juró' en sentido de juramento solemne, no de mera promesa.
  - La nota [a] marca la alternativa lexical donde el hebreo dice literalmente 'la voz de sus palabras'.
