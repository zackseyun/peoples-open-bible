  yaml_path: translation/ot/isaiah/007/023.yaml
  text: And in that day[b][a], every place where there were a thousand vines worth a thousand pieces of silver will become briars and thorns.
  footnotes:
  - marker: a
    text: Or, 'where there will be a thousand vines worth a thousand pieces of silver.' The Hebrew imperfect can be rendered more literally this way, but the context favors a contrast between formerly valuable vineyard land and its future desolation.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'a thousand vines for a thousand silver.' The exact monetary unit is not stated explicitly in the verse.
    reason: lexical_alternative
