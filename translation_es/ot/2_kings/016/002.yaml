translation:
  language: es
  text: Acaz tenía veinte años cuando comenzó a reinar, y reinó dieciséis años en Jerusalén. No hizo lo que era recto[a] a los ojos de Yahvé su Dios, como había hecho David su padre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hizo lo recto» o «No hizo lo justo».'
    reason: lexical_alternative
  - marker: b
    text: En este contexto real, «padre» puede significar antepasado o predecesor dinástico, no necesariamente padre biológico inmediato.
    reason: cultural_note
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים שָׁנָה
  english_pob_choice: was twenty years old
  chosen_spanish: tenía veinte años
  alternatives_spanish:
  - era un hijo de veinte años
  lexicon: HALOT
  rationale: Es el idiomatismo hebreo de la edad. En español, «tenía veinte años» comunica con naturalidad la edad sin perder el sentido original.
- source_word: בְּמָלְכוֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a ser rey
  - al empezar a reinar
  lexicon: HALOT
  rationale: La forma preposicional con verbo de reinar marca el inicio del acceso al trono. «Comenzó a reinar» conserva ese valor temporal y verbal.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  lexicon: HALOT
  rationale: El verbo expresa el ejercicio del reinado, no solo el título. «Reinó» reproduce esa fuerza verbal en español.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Es un complemento locativo directo y no presenta dificultad semántica.
- source_word: לֹא עָשָׂה הַיָּשָׁר
  english_pob_choice: did not do what was right
  chosen_spanish: No hizo lo recto
  alternatives_spanish:
  - No hizo lo justo
  - No hizo lo que era recto
  lexicon: HALOT
  rationale: El hebreo usa una fórmula evaluativa fija. «Lo recto» conserva el sustantivo evaluativo sin sobreexplicar; en español bíblico suena natural y mantiene la posible tensión entre rectitud moral y valoración divina.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - en la vista de
  lexicon: HALOT
  rationale: La imagen hebrea de evaluación personal se expresa bien en español con «ante los ojos de». Mantiene el matiz relacional sin convertirlo en mera fórmula administrativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto para el Tetragrámaton, se usa «Yahvé» en el texto principal, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: El sufijo masculino singular remite a Acaz. «Su Dios» conserva la relación de pacto y la referencia posesiva sin añadir matices que el hebreo no explicita.
- source_word: כְּדָוִד אָבִיו
  english_pob_choice: as David his father had done
  chosen_spanish: como había hecho David su padre
  alternatives_spanish:
  - como David su padre había hecho
  - como su padre David había hecho
  lexicon: HALOT
  rationale: Se preserva la estructura comparativa y el verbo implícito de la cláusula inglesa auditada. «Su padre» mantiene la forma fuente; en este contexto real puede referir al antepasado dinástico, pero el español no necesita forzar «antepasado» en el texto principal.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El hebreo tiene explícitamente el Tetragrámaton. El proyecto pide no ocultarlo bajo «SEÑOR», así que se usa la forma transliterada tradicional del español «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de «David su padre» en un contexto real
  english_pob_reading: retain 'father' language while understanding it as dynastic ancestor
  chosen_spanish_reading: conservar «su padre» entendiendo la referencia dinástica
  alternative_spanish_readings:
  - David su antepasado
  - David su ancestro
  rationale: El hebreo אָבִיו puede designar antepasado o predecesor en fórmulas regias. Mantener «su padre» conserva la transparencia textual; la nota explica que no se trata necesariamente del padre biológico inmediato.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: el expediente inglés indica que no hubo cambios y el control cruzado reporta alto acuerdo. La versión española sigue ese mismo análisis, sin introducir nuevas lecturas textuales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme a la terminología del proyecto.
  - Se conserva la fórmula real «ante los ojos de» como equivalente idiomático de בְּעֵינֵי.
  - «Reinó» preserva el verbo de gobierno, no una mera identificación nominal.
  - La comparación final mantiene la referencia a David sin borrar la tensión contextual sobre «padre» en registro dinástico.
