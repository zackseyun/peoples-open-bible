translation:
  language: es
  text: Entonces se detuvo[a] la obra de la casa de Dios[b] que está en Jerusalén, y permaneció detenida[c] hasta el segundo año del reinado de Darío, rey de Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «cesó» o «fue detenida»; el verbo arameo expresa la idea de parar o quedar interrumpida.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la casa de Dios». «Templo de Dios» también es posible por contexto.
    reason: lexical_alternative
  - marker: c
    text: La frase expresa un estado continuo, no una segunda afirmación independiente de que la obra se detuvo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese tiempo
  - Luego
  lexicon: HALOT
  rationale: Adverbio arameo de secuencia narrativa. «Entonces» conserva la relación temporal con lo anterior y suena natural en español.
- source_word: בְּטֵלַת
  english_pob_choice: stopped
  chosen_spanish: se detuvo
  alternatives_spanish:
  - cesó
  - fue detenida
  lexicon: HALOT
  rationale: La raíz aramea בטל expresa parar, cesar o quedar interrumpido. En español, «se detuvo» comunica el cese del trabajo sin forzar una sola voz activa o pasiva.
- source_word: עֲבִידַת
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la labor
  lexicon: HALOT
  rationale: En este contexto se trata del proyecto de reconstrucción del templo. «La obra» es natural en español bíblico contemporáneo y conserva el sentido de trabajo/proyecto sin añadir detalles ajenos al texto.
- source_word: בֵּית אֱלָהָא
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se preserva la forma literal del hebreo/arameo «casa de Dios». «Templo» es válido contextual­mente, pero la traducción de POB mantiene la expresión más transparente.
- source_word: דִּי בִּירוּשְׁלֶם
  english_pob_choice: that is in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que estaba en Jerusalén
  lexicon: HALOT
  rationale: La relativa identifica la ubicación de la casa de Dios. «Está» refleja la descripción locativa sin cargar innecesariamente la frase con un matiz temporal.
- source_word: וַהֲוָת בָּטְלָא
  english_pob_choice: and it remained stopped
  chosen_spanish: y permaneció detenida
  alternatives_spanish:
  - y siguió detenida
  - y quedó detenida
  lexicon: HALOT
  rationale: La combinación verbal expresa un estado continuado, no solo una segunda mención del cese. «Permaneció detenida» preserva la duración y distingue la acción inicial del estado resultante.
- source_word: עַד שְׁנַת תַּרְתֵּין
  english_pob_choice: until the second year
  chosen_spanish: hasta el segundo año
  alternatives_spanish:
  - hasta el año segundo
  lexicon: HALOT
  rationale: Equivalente temporal idiomático en español; mantiene el dato cronológico con claridad.
- source_word: לְמַלְכוּת דָּרְיָוֶשׁ
  english_pob_choice: of the reign of Darius
  chosen_spanish: del reinado de Darío
  alternatives_spanish:
  - de la realeza de Darío
  - de la monarquía de Darío
  lexicon: HALOT
  rationale: La forma española habitual para datación regnal es «reinado». Respeta el valor cronológico del sustantivo arameo.
- source_word: מֶלֶךְ פָּרָס
  english_pob_choice: king of Persia
  chosen_spanish: rey de Persia
  alternatives_spanish:
  - el rey persa
  lexicon: HALOT
  rationale: Título real directo y equivalente al orden del original. «Rey de Persia» es la forma más clara y fiel en español.
theological_decisions:
- issue: Nombre divino en el sintagma 'casa de Dios'
  english_pob_reading: the house of God
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - la casa del Dios
  rationale: El texto no usa el Tetragrámaton sino אֱלָהָא ('Dios'). Por eso se conserva «Dios» y no se introduce «Yahvé».
  doctrine_reference: Uso léxico del nombre/título divino en el texto base
translation_notes:
  revision_awareness: 'Coincide con la revisión auditada de alta concordancia: no se introducen cambios textuales ni interpretativos respecto del sentido del original arameo y del inglés POB, salvo la adaptación natural al español.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלָהָא, sin sustituirlo por un equivalente de tipo dominical.
  - Se conserva «rey de Persia» siguiendo el orden y la claridad del original.
  - «Permaneció detenida» reproduce el aspecto durativo del segundo predicado arameo.
  - La puntuación sigue el estilo bíblico contemporáneo en español, con coma antes de la cláusula final temporal.
