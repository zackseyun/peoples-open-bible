  spanish_quality_summary: 'La redacción es en general clara y digna. «Trátalo como a uno que revela un secreto» funciona bien y evita un calco torpe. «No hallará modo de arruinarte» también es natural. La principal mejora necesaria está en la cláusula final: «el desenlace de los celos» resulta algo literario/novelístico y «celos» en plural puede sonar restringido a celos románticos; «el fin de la envidia» o «el resultado de la envidia» lee mejor en español amplio. Conviene también ajustar la nota para evitar «la salida».'
  glossary_alignment: No hay términos de glosario mayor en juego. La decisión contextual sobre קִנְאָה permite «celos» o «envidia», pero para legibilidad panhispánica y dado el contexto de rivalidad dañina, «envidia» es mejor en la línea principal, manteniendo «celos» como alternativa en nota. Se preserva la prioridad del hebreo sobre la expansión griega.
  issues:
