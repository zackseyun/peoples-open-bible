review_pass:
  verdict: revise
  source_alignment_summary: El borrador español conserva bien la estructura temporal (ועת), el sentido de reposo en lecho (נוחו על משכבו), el uso de Yahvé para יהוה y el título משיחו como 'su ungido'. Sin embargo, añade una nota léxica sobre 'descanso/reposo/muerte' que no corresponde a la nota preservada por la POB inglesa, y omite la nota importante de que 'su ungido' comparte la raíz de 'Mesías'.
  spanish_quality_summary: 'El español es claro y digno, pero ''al tiempo de su descanso sobre su lecho'' suena algo rígido. ''En el tiempo de su reposo en su lecho'' o similar sería posible, pero no es necesario. El cambio principal requerido es de aparato de notas: la nota [a] actual está mal enfocada y la colocación de [a][b] debe corresponder a las notas correctas.'
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יהוה -> ''Yahvé''; משיחו -> ''su ungido'' en vez de ''Mesías'' en el texto principal, preservando la alternativa mesiánica en nota. No hay conflictos con otras entradas del glosario.'
  issues:
  - severity: medium
    issue: La nota [a] no preserva la decisión léxico-teológica documentada para משיחו.
    rationale: La POB inglesa conserva en nota que el hebreo 'his anointed one' usa la misma raíz que 'Messiah'. El borrador español reemplaza esa nota por una discusión sobre 'descanso/reposo/muerte', que no es la nota significativa documentada.
  - severity: low
    issue: El anclaje de notas está asociado a la frase final, pero el contenido de [a] trata erróneamente 'descanso'.
    rationale: Si [a] permanece en 'su ungido', su contenido debe explicar 'Mesías'. Si se quisiera una nota sobre 'descanso', tendría que anclarse en esa palabra; pero no está justificada por el expediente inglés.
  revised_spanish_text: Y al tiempo de su descanso sobre su lecho, testificó ante Yahvé y su ungido.[a][b]
  revised_footnotes:
  - marker: a
    text: La expresión hebrea 'su ungido' usa la misma raíz que 'Mesías'; la frase puede referirse específicamente al gobernante ungido de Yahvé en los días de Samuel.
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego de este versículo difiere marcadamente, pues dice que 'destruyó a los jefes de Tiro y a todos los gobernantes de los filisteos', lo que indica una divergencia textual importante entre los testigos hebreo y griego.
    reason: textual_variant
  revision_rationale: 'Se conserva el texto principal, que es fiel y legible, pero se corrige el aparato de notas para ajustarlo al expediente auditado: [a] debe explicar la relación léxica de ''ungido'' con ''Mesías'', y [b] debe conservar la variante textual griega. No se requiere adjudicación adicional.'
