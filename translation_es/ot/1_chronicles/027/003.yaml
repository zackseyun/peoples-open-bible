translation:
  language: es
  text: De los hijos de Pérez[b][a], el principal sobre todos los comandantes de las divisiones para el primer mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Pérez». El hebreo dice literalmente «los hijos de Pérez», una expresión genealógica que puede abarcar una línea de descendencia más amplia.
    reason: lexical_alternative
  - marker: b
    text: O «los comandantes de los ejércitos». El término hebreo suele significar «ejércitos» o «huestes», pero en este capítulo se refiere a las divisiones militares organizadas por mes.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן
  english_pob_choice: From
  chosen_spanish: De
  alternatives_spanish:
  - Desde
  - Entre
  lexicon: HALOT
  rationale: El hebreo marca procedencia o linaje; en español, «de» expresa de forma natural pertenencia genealógica sin forzar una idea de movimiento espacial.
- source_word: בְּנֵי פֶרֶץ
  english_pob_choice: the sons of Perez
  chosen_spanish: los hijos de Pérez
  alternatives_spanish:
  - los descendientes de Pérez
  lexicon: HALOT
  rationale: Se conserva la forma hebrea literal «hijos de» por tratarse de una expresión genealógica asentada. «Descendientes» sería posible, pero atenúa la forma del original.
- source_word: הָרֹאשׁ
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el cabeza
  - el líder
  lexicon: HALOT
  rationale: Aquí רֹאשׁ funciona como título de autoridad. «Jefe» comunica bien esa función en español contemporáneo y mantiene el matiz administrativo-militar.
- source_word: לְכָל
  english_pob_choice: over all
  chosen_spanish: sobre todos
  alternatives_spanish:
  - para todos
  - de todos
  lexicon: HALOT
  rationale: El contexto indica jurisdicción o supervisión, no mera relación. «Sobre todos» reproduce mejor esa amplitud de autoridad.
- source_word: שָׂרֵי הַצְּבָאוֹת
  english_pob_choice: the commanders of the divisions
  chosen_spanish: los comandantes de las divisiones
  alternatives_spanish:
  - los comandantes de los ejércitos
  - los oficiales de los ejércitos
  lexicon: HALOT
  rationale: Aunque צְבָאוֹת puede significar «ejércitos» o «huestes», en este capítulo se trata de turnos militares organizados; «divisiones» evita sugerir varios ejércitos distintos y sigue la decisión auditada en inglés.
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: for the first month
  chosen_spanish: para el primer mes
  alternatives_spanish:
  - del primer mes
  - para el mes primero
  lexicon: HALOT
  rationale: La frase señala el turno correspondiente en el calendario mensual. «Para el primer mes» es la forma más clara y natural en español.
translation_notes:
  revision_awareness: El texto base y el trazado auditado en inglés coinciden sin cambios sustantivos recientes; se mantiene la lectura óptima ya establecida, con adaptación española idiomática y sin añadir conjeturas textuales.
  spanish_consistency_notes:
  - Se conserva la forma genealógica «hijos de Pérez» por fidelidad al hebreo y coherencia con la terminología POB.
  - «Jefe» y «comandantes de las divisiones» sostienen el contexto administrativo-militar del capítulo sin recurrir a vocabulario eclesiástico.
  - Se evita usar «SEÑOR» o equivalentes de ocultamiento porque el versículo no contiene el nombre divino.
