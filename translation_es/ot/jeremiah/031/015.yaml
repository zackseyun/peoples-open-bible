review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: fórmula profética, Yahvé, voz en Ramá, lamento intenso, Raquel llorando por sus hijos y la negativa a recibir consuelo. Sin embargo, invierte una preposición importante en ''rehúsa ser consolada por sus hijos'', donde el hebreo עַל בָּנֶיהָ y el POB inglés significan ''por/sobre sus hijos'', no que los hijos sean quienes la consuelan. Además, las notas al pie están cruzadas respecto del modelo inglés: la nota sobre Ramá no corresponde al contenido inglés, y la nota sobre el singular idiomático debe anclarse en la cláusula final, no en ''sus hijos''.'
  spanish_quality_summary: El español es generalmente claro, digno y natural. 'Así dice Yahvé' y 'Se oye una voz' funcionan bien. 'Llanto amarguísimo' es comprensible, aunque 'llanto amargo' o 'amargo llanto' sería algo más sobrio; no obstante, no es un error. El problema principal de legibilidad y fidelidad está en 'consolada por sus hijos', que en español cambia el sentido. También conviene reparar las notas para que informen correctamente y con anclaje preciso.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> ''Yahvé'', רָחֵל -> ''Raquel'', y el resto de los términos clave están bien resueltos. No hay conflicto teológico relevante. La decisión contextual plural en כִּי אֵינֶנּוּ puede mantenerse en español como ''porque ya no existen'', con nota de alternativa singular idiomática, o mejor con una formulación más bíblica y natural: ''porque ya no están[a]''.'
  issues:
  - severity: high
    issue: '''rehúsa ser consolada por sus hijos'' altera el sentido de עַל בָּנֶיהָ'
    rationale: En hebreo y en el POB inglés, Raquel rehúsa ser consolada a causa de/sobre sus hijos, no por ellos como agentes de consuelo. La preposición española 'por' tras 'ser consolada' se lee naturalmente como agente y cambia el significado.
  - severity: medium
    issue: Las notas al pie no corresponden al contenido y anclaje del audit trail inglés
    rationale: La nota [a] en el inglés trata sobre una alternativa de número/género en la cláusula final, no sobre la transliteración de Ramá. La otra nota inglesa es cultural sobre Ramá/Raquel, no sobre el singular idiomático. En español deben corregirse el contenido y la ubicación de los marcadores.
  - severity: low
    issue: '''ya no existen'' es fiel pero algo menos idiomático/literario en este contexto'
    rationale: Aunque transmite ausencia/no existencia, en español bíblico y poético 'ya no están' o 'ya no son' suena más natural y cercano al tono elegíaco, sin sobreespecificar muerte o exilio.
  revised_spanish_text: 'Así dice Yahvé: «Se oye una voz en Ramá[b], lamentación y llanto amargo: Raquel llora por sus hijos; rehúsa ser consolada por sus hijos, porque ya no están[a]».'
  revised_footnotes:
  - marker: a
    text: O 'porque él ya no está'; el hebreo usa una forma singular en este modismo, aunque el contexto habla colectivamente de los hijos de Raquel.
    reason: lexical_alternative
