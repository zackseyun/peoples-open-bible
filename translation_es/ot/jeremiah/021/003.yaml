review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: introducción narrativa, destinatarios plurales, fórmula profética כֹּה y destinatario final. Sin embargo, falla en un punto clave de alineación: תֹאמְרֻן es 2mp y el borrador lo traduce como singular (''dirás''). Eso cambia el número del mandato dado a los mensajeros. También ''dijo a ellos'' es comprensible pero menos natural que ''les dijo'' o ''dijo a ellos'' con mejor ajuste estilístico.'
  spanish_quality_summary: El español es mayormente claro, pero 'Jeremías dijo a ellos' suena poco natural en español bíblico moderno; 'Jeremías les dijo' es más idiomático y plenamente fiel. 'Así dirás' no solo suena algo extraño en contexto sino que además contradice el plural del hebreo. 'Sedequías' es una forma posible, pero 'Sedecías' es la forma bíblica española más extendida y más legible para una audiencia eclesial amplia.
  glossary_alignment: No hay términos teológicos mayores en juego. El nombre propio יִרְמְיָהוּ -> 'Jeremías' está bien. Para צִדְקִיָּהוּ, la forma española preferible por uso eclesial amplio es 'Sedecías'; el borrador ofrece 'Sedequías', que no es imposible, pero es menos estándar. La fórmula כֹּה se conserva adecuadamente con 'Así'.
  issues:
  - severity: high
    issue: Cambio indebido de plural a singular en תֹאמְרֻן
    rationale: El hebreo tiene segunda persona masculina plural ('ustedes/vosotros dirán/diréis'), dirigida a los enviados. 'Dirás' introduce un singular inexistente en el texto fuente y altera quién recibe la orden.
  - severity: medium
    issue: Fraseo poco natural en 'Jeremías dijo a ellos'
    rationale: Aunque formalmente posible, en español natural y digno la construcción con pronombre dativo 'les dijo' transmite mejor אֲלֵיהֶם sin pérdida de sentido.
  - severity: low
    issue: 'Forma onomástica menos estándar: ''Sedequías'''
    rationale: La tradición bíblica española más reconocible usa 'Sedecías'. No es un error grave de sentido, pero conviene uniformidad y legibilidad eclesial.
  revised_spanish_text: 'Jeremías les dijo: «Así dirán a Sedecías:»'
  revision_rationale: Se corrige el número verbal para reflejar fielmente el 2mp hebreo en תֹאמְרֻן, se mejora la naturalidad del español con 'les dijo', y se adopta la forma onomástica más estándar 'Sedecías' para una lectura bíblica amplia. No se requieren notas, porque la revisión resuelve la tensión sin crear ambigüedad nueva.
