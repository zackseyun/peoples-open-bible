translation:
  language: es
  text: Sobre la tierra de mi pueblo[a] crecerán espinos y cardos; en efecto,[b] sobre todas las casas de gozo de la ciudad exultante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «brotarán» para «crecerán».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ciertamente»; el hebreo usa una partícula enfática que intensifica la afirmación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְמַת עַמִּי
  english_pob_choice: the land of my people
  chosen_spanish: la tierra de mi pueblo
  alternatives_spanish:
  - el suelo de mi pueblo
  - la tierra de mi gente
  lexicon: HALOT
  rationale: אַדְמָה nombra tierra, suelo o terreno concreto. "Tierra" conserva bien el sentido territorial y profético en español, y "mi pueblo" refleja el posesivo de la construcción hebrea sin volverlo abstracto.
- source_word: קוֹץ
  english_pob_choice: thorn
  chosen_spanish: espinos
  alternatives_spanish:
  - espino
  - zarza espinosa
  - cardo
  lexicon: HALOT
  rationale: En español, el plural "espinos" funciona naturalmente en paralelo con "cardos" y mantiene la imagen de vegetación espinosa que invade el terreno.
- source_word: שָׁמִיר
  english_pob_choice: brier
  chosen_spanish: cardos
  alternatives_spanish:
  - abrojos
  - zarzas
  - espinos
  lexicon: HALOT
  rationale: שָׁמִיר se usa en fórmulas de desolación junto con קוֹץ. "Cardos" preserva la idea de maleza espinosa sin precisar demasiado la especie botánica.
- source_word: תַּעֲלֶה
  english_pob_choice: will come up
  chosen_spanish: crecerán
  alternatives_spanish:
  - saldrán
  - brotarán
  - subirán
  lexicon: HALOT
  rationale: El verbo alude a vegetación que surge del suelo. "Crecerán" es una forma natural en español y mantiene la imagen de invasión vegetal; "brotarán" sería posible, pero sugiere más el inicio que el crecimiento continuo.
- source_word: כִּי
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - pues
  - en efecto
  - ciertamente
  lexicon: HALOT
  rationale: Aquí כִּי intensifica o enfatiza la afirmación. "Sí" en español puede funcionar como refuerzo breve y solemne, más cercano al efecto enfático que un causal rígido.
- source_word: בָּתֵּי מָשׂוֹשׂ
  english_pob_choice: the joyful houses
  chosen_spanish: las casas de gozo
  alternatives_spanish:
  - las casas alegres
  - las casas de alegría
  - las casas de regocijo
  lexicon: HALOT
  rationale: La construcción literal hebrea es "casas de gozo/alegría". "Casas de gozo" conserva la estructura y la carga nominal del original, evitando interpretar de más el tipo de festividad.
- source_word: קִרְיָה עַלִּיזָה
  english_pob_choice: the exultant city
  chosen_spanish: la ciudad exultante
  alternatives_spanish:
  - la ciudad jubilosa
  - la ciudad alegre
  - la ciudad regocijada
  lexicon: HALOT
  rationale: עַלִּיזָה describe una ciudad caracterizada por exultación o alegría intensa. "Exultante" mantiene la fuerza léxica y el tono elevado del hebreo, como en la lectura inglesa POB.
theological_decisions:
- issue: Matiz de devastación sobre una ciudad festiva
  english_pob_reading: over all the joyful houses in the exultant city
  chosen_spanish_reading: sobre todas las casas de gozo, en la ciudad exultante
  alternative_spanish_readings:
  - sobre todas las casas alegres, en la ciudad jubilosa
  - sobre todas las casas de regocijo, en la ciudad alegre
  rationale: 'El texto hebreo no describe solo un estado de ánimo sino un ámbito urbano marcado por júbilo. Se conserva esa tensión: la misma ciudad caracterizada por gozo será invadida por espinos y cardos. No se intensifica a "revelry" ni se moraliza la escena.'
  doctrine_reference: Isaías 32:13; juicio profético sobre la desolación de la tierra y de la ciudad
- issue: Valor enfático de כִּי
  english_pob_reading: indeed
  chosen_spanish_reading: sí
  alternative_spanish_readings:
  - en efecto
  - ciertamente
  - pues
  rationale: No se entiende aquí como un simple "porque" causal, sino como un refuerzo retórico que amplía la certeza de la imagen. "Sí" preserva esa fuerza breve y enfática en español.
  doctrine_reference: Isaías 32:13; función discursiva del hebreo כִּי
translation_notes:
  revision_awareness: La revisión inglesa reciente suavizó la puntuación y ajustó 'houses of joy' a 'joyful houses' por naturalidad. En español, la estructura literal 'casas de gozo' sigue siendo natural y más cercana al hebreo, por lo que se conserva. También se mantuvo la posibilidad léxica de movimiento vegetal con 'crecerán', equivalente funcional de 'will come up'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no porque aparezca en este versículo, sino como norma del proyecto para textos con el Tetragrámaton; aquí no aplica.
  - Se eligió una traducción sobria y literal de la imagen agrícola para no diluir la fuerza del juicio profético.
  - Los términos 'gozo' y 'exultante' conservan la simetría semántica del hebreo entre las casas y la ciudad.
