review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el paralelismo poético y la imaginería de precipitación del hebreo: לִקְחִי como «mi enseñanza», תִּזַּל como «gotee», y la progresión de lluvia/rocío/lluvias/lluvia abundante está en general conservada. Sin embargo, אִמְרָתִי se alinea mejor con «mi hablar» o «mis palabras» que con «mi palabra», ya que el inglés auditado eligió «my speech» para evitar el sentido de una sola palabra. Además, שְׂעִירִם como «lluvias» resulta demasiado genérico; en español «chubascos» o «lloviznas» preserva mejor el matiz de lluvia ligera o gotas indicado en la nota y el contexto.'
  spanish_quality_summary: El texto es legible y digno, pero «mi palabra» introduce una resonancia singular algo más estrecha y potencialmente más teológica de la que el contexto poético requiere. «Mi hablar» suena natural en registro bíblico moderno y mantiene el paralelismo con «mi enseñanza». También conviene ajustar «lluvias» a «chubascos», que distingue mejor el término raro de la «lluvia» anterior y de la «abundante lluvia» posterior.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones clave son léxicas y estilísticas: mantener «enseñanza», conservar el matiz de descenso con «descienda», y evitar que אִמְרָתִי quede reducido a «palabra» singular cuando el expediente inglés justificó «speech».'
  issues:
  - severity: medium
    issue: «mi palabra» para אִמְרָתִי
    rationale: El expediente inglés eligió «my speech» para preservar expresión hablada amplia y el paralelismo con «my teaching». «Mi palabra» en español suena más puntual y puede estrechar indebidamente el sentido.
  - severity: medium
    issue: «lluvias» para שְׂעִירִם
    rationale: El término hebreo raro se documenta como lluvia ligera, gotas o chubascos. «Lluvias» es demasiado amplio y no marca bien la progresión poética frente a «la lluvia» y «abundante lluvia».
  revised_spanish_text: Descienda mi enseñanza como la lluvia[a]; gotee mi hablar como el rocío, como chubascos sobre la hierba[b], y como abundante lluvia sobre las plantas.
