revisions:
- from: Y cuando Baasá lo oyó, dejó de construir a Ramá[a] y detuvo su obra.
  to: Y cuando Baasa lo oyó, dejó de construir Ramá[a] y puso fin a su obra.
  rationale: Se corrige la sintaxis no idiomática «construir a Ramá» a «construir Ramá», se mejora «detuvo su obra» a «puso fin a su obra» para reflejar mejor el hebreo y el español natural, y se normaliza el nombre a «Baasa». La nota alternativa se conserva y se ajusta levemente para sonar natural en español.
