translation:
  language: es
  text: 'Así dice el Señor: Inclinen el hombro[a] y sirvan al rey de Babilonia, y habiten[b] en la tierra que yo di a sus padres[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "Doblen el hombro". La imagen es la de someterse a un servicio impuesto.
    reason: lexical_alternative
  - marker: b
    text: O "quédense en la tierra" / "permanezcan en la tierra". El griego "sentarse" funciona aquí como un modismo para residir.
    reason: lexical_alternative
  - marker: c
    text: O "sus antepasados". El griego dice literalmente "sus padres".
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὕτως εἶπεν
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así dijo
  - Esto dice
  lexicon: LSJ
  rationale: La fórmula profética se expresa mejor en presente en español para conservar el valor de proclamación vigente, aunque el griego use aoristo.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: LSJ
  rationale: Se mantiene la traducción reverencial y natural en español para κύριος dentro de una fórmula de habla profética.
- source_word: Κλίνατε τὸν ὦμον ὑμῶν
  english_pob_choice: Bow your shoulder
  chosen_spanish: Inclinad el hombro
  alternatives_spanish:
  - Doblad el hombro
  - Bajad el hombro
  lexicon: LSJ
  rationale: Se conserva la imagen corporal concreta del griego. 'Inclinad' comunica sumisión sin perder la referencia directa al 'hombro'; el plural imperativo concuerda con el destinatario colectivo.
- source_word: ἐργάσασθε
  english_pob_choice: serve
  chosen_spanish: servid
  alternatives_spanish:
  - trabajad para
  - laborad para
  lexicon: LSJ
  rationale: Aunque el verbo puede significar 'trabajar', el contexto de sometimiento político hace que 'servir' refleje mejor la fuerza pragmática adoptada por la POB en la revisión inglesa.
- source_word: τῷ βασιλεῖ Βαβυλῶνος
  english_pob_choice: the king of Babylon
  chosen_spanish: al rey de Babilonia
  alternatives_spanish:
  - al rey babilonio
  lexicon: LSJ
  rationale: Se sigue la construcción directa y sobria del original; 'de Babilonia' conserva el genitivo sin añadir matiz interpretativo.
- source_word: καθίσατε ἐπὶ τὴν γῆν
  english_pob_choice: dwell on the land
  chosen_spanish: habitad en la tierra
  alternatives_spanish:
  - quedaos en la tierra
  - habitad sobre la tierra
  lexicon: LSJ
  rationale: El griego dice literalmente 'sentaos sobre la tierra', pero en este contexto idiomático expresa residir o permanecer; 'habitad' preserva esa lectura sin sonar artificial en español.
- source_word: ἣν δέδωκα
  english_pob_choice: that I gave
  chosen_spanish: que yo di
  alternatives_spanish:
  - que yo he dado
  lexicon: LSJ
  rationale: El perfecto griego se vierte con pasado simple en español, suficiente para el don histórico de la tierra.
- source_word: τοῖς πατράσιν ὑμῶν
  english_pob_choice: your fathers
  chosen_spanish: a vuestros padres
  alternatives_spanish:
  - a vuestros antepasados
  lexicon: LSJ
  rationale: Se conserva el término masculino/familiar del griego, en línea con la política de precisión de género del POB; 'padres' reproduce mejor el valor heredado del texto que una neutralización explicativa.
theological_decisions:
- issue: Título divino Κύριος en fórmula profética
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  rationale: La fórmula profética se mantiene reverente y reconocible en español sin recurrir a una convención tipográfica distinta; el texto fuente griego usa κύριος, no el Tetragrámaton hebreo explícito.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
- issue: Imperativo de sumisión política y su matiz en ἐργάσασθε
  english_pob_reading: serve
  chosen_spanish_reading: servid
  alternative_spanish_readings:
  - trabajad para
  - trabajad al servicio de
  rationale: 'Se preserva la tensión entre servicio y trabajo: el griego es amplio, pero en el contexto de dominio imperial la revisión inglesa optó por ''serve''; el español sigue esa decisión sin convertirla en un mero eufemismo.'
  doctrine_reference: Baruch 2:21 audit trail, applied revision 2026-04-23T15:38:12Z
- issue: Imagen locativa de καθίσατε ἐπὶ τὴν γῆν
  english_pob_reading: dwell on the land
  chosen_spanish_reading: habitad en la tierra
  alternative_spanish_readings:
  - quedaos en la tierra
  - residid en la tierra
  rationale: Se conserva el valor idiomático de residencia, evitando traducir literalmente 'sentarse' y manteniendo la conexión con la tierra dada por Dios.
  doctrine_reference: LSJ lexical note for καθίσατε
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió 'work for' a 'serve' en ἐργάσασθε. La redacción española refleja esa decisión. También se respetó la nota de que καθίσατε es idiomático ('dwell/settle'), no un mandato de sentarse literalmente.
  spanish_consistency_notes:
  - Se usa 'Señor' para κύριος conforme al flujo devocional del texto griego y al audit trail inglés.
  - Se mantiene 'Babilonia' como nombre propio y 'tierra' para γῆ.
  - 'Se preserva el plural imperativo en todo el mandato: ''Inclinad'', ''servid'', ''habitad''.'
  - Se conserva 'padres' sin neutralizar a 'antepasados' en el texto principal para reflejar el griego masculino plural.
