translation:
  language: es
  text: Ahora, pues,[a] clamen al cielo, para que sean librados de la mano de nuestros enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Dios»; el griego dice «al cielo», usando «cielo» como una forma reverente de referirse al ámbito divino o al mismo Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  english_pob_choice: Now then
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Ahora entonces
  - Así que ahora
  lexicon: LSJ
  rationale: La combinación expresa transición lógica e inmediatez. «Ahora pues» mantiene ambos matices en un español natural y solemne.
- source_word: κεκράξατε
  english_pob_choice: cry out
  chosen_spanish: clamen
  alternatives_spanish:
  - griten
  - clamen a voz en cuello
  lexicon: LSJ
  rationale: Es un imperativo urgente de κράζω. «Clamen» conserva la intensidad de una apelación vehemente y funciona bien en registro bíblico sin volverse arcaico.
- source_word: εἰς οὐρανόν
  english_pob_choice: to heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - al cielo [a Dios]
  - al cielo (como forma reverente de referirse a Dios)
  lexicon: LSJ
  rationale: El griego dice literalmente «a/ hacia el cielo», con posible valor reverencial. En español, «al cielo» conserva la metonimia sin resolverla explícitamente como «a Dios» en el texto principal.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: LSJ
  rationale: Introduce propósito o resultado buscado. «Para que» es claro y fiel al valor final de la cláusula.
- source_word: διασωθῆτε
  english_pob_choice: you may be delivered
  chosen_spanish: sean librados
  alternatives_spanish:
  - sean salvados
  - sean rescatados
  lexicon: LSJ
  rationale: En este contexto militar, el verbo expresa ser rescatados o puestos a salvo de un peligro. «Librados» preserva la idea de liberación sin cargarlo con resonancias soteriológicas posteriores.
- source_word: ἐκ χειρὸς
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - del alcance de
  lexicon: LSJ
  rationale: Es un modismo para poder, control o dominio. Mantener «de la mano de» conserva la imagen bíblica y la fuerza idiomática del original.
- source_word: ἐχθρῶν ἡμῶν
  english_pob_choice: our enemies
  chosen_spanish: nuestros enemigos
  alternatives_spanish:
  - los que nos odian
  - nuestros adversarios
  lexicon: LSJ
  rationale: Es una construcción posesiva directa. «Nuestros enemigos» es la equivalencia más natural y exacta en español.
theological_decisions:
- issue: Si «οὐρανόν» debe explicitarse como Dios en el texto principal
  english_pob_reading: to heaven, with a reverential way of referring to the divine realm or to God himself
  chosen_spanish_reading: al cielo, dejando la referencia reverente implícita
  alternative_spanish_readings:
  - a Dios
  - al cielo, es decir, a Dios
  rationale: El griego no nombra explícitamente a Dios; usa «cielo» como posible metonimia reverente. Siguiendo la primacía del idioma original y preservando la tensión documentada, el texto principal conserva la literalidad sin resolverla.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica; primacía del texto fuente sobre la tradición de traducción.'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la versión española sigue esa misma decisión, conservando la metonimia «cielo» y el matiz imperativo urgente de «cry out».
  spanish_consistency_notes:
  - Se preservó «cielo» en vez de sustituirlo por «Dios» en el cuerpo principal para no eliminar la ambigüedad reverente documentada.
  - Se eligió «librados» para reflejar rescate/liberación en contexto bélico, evitando cargar el verbo con un sentido exclusivamente soteriológico.
  - 'La puntuación y el orden mantienen el paralelismo del griego: transición urgente, mandato, propósito y resultado.'
