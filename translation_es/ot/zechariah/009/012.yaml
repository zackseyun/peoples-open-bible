revisions:
- from: Volved[a] a la fortaleza[b], presos de esperanza[c]; aun hoy declaro[d] que te devolveré[e] el doble.
  to: Vuelvan a la fortaleza, prisioneros de esperanza[a]; aun hoy declaro que te restauraré el doble[b].
  rationale: La revisión conserva el sentido fuente y las decisiones auditadas, pero ajusta el registro al español neutro latinoamericano, fortalece la metáfora central con «prisioneros de esperanza», reduce las notas a las alternativas realmente significativas preservadas por la POB inglesa, y opta por «restauraré» para reflejar mejor la fuerza restitutiva de אָשִׁיב en contexto.
