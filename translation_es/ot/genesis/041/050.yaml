translation:
  language: es
  text: Antes de que llegara el año del hambre[a], le nacieron a José dos hijos, que Asenat, hija de Potifera, sacerdote de On[b], le dio a luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes de que llegara el año del hambre». El hebreo usa el singular «año» aquí, refiriéndose al inicio del período de hambre.'
    reason: lexical_alternative
  - marker: b
    text: On era una ciudad egipcia, conocida más tarde en griego como Heliópolis.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/לְ/יוֹסֵף
  english_pob_choice: to Joseph
  chosen_spanish: a José / le nacieron a José
  alternatives_spanish:
  - para José
  - nacieron a José
  lexicon: HALOT
  rationale: El lamed con el pasivo de ילד expresa relación/destinación en contexto de nacimiento; en español, la construcción natural y fiel es 'le nacieron a José', manteniendo el dativo sin volver la frase pesada.
- source_word: יֻלַּד
  english_pob_choice: were born
  chosen_spanish: le nacieron
  alternatives_spanish:
  - nacieron
  - fueron nacidos
  lexicon: HALOT
  rationale: El pasivo hebreo con sujeto plural ('dos hijos') se expresa con verbo plural natural en español. 'Le nacieron' conserva el hecho de nacimiento y la relación con José, evitando un calco duro.
- source_word: בְּ/טֶרֶם תָּב֖וֹא שְׁנַ֣ת הָ/רָעָ֑ב
  english_pob_choice: Before the year of famine came
  chosen_spanish: Antes de que llegara el año del hambre
  alternatives_spanish:
  - antes de que viniera el año del hambre
  - antes de que comenzara el año del hambre
  - antes de que llegara el año de la hambruna
  lexicon: HALOT
  rationale: '''בטרם'' pide una subordinada temporal natural en español. Se conserva el singular ''año'' del hebreo, como en la auditoría inglesa, y ''hambre'' comunica el periodo de escasez sin añadir una paráfrasis mayor.'
- source_word: שְׁנֵ֣י בָנִ֔ים
  english_pob_choice: two sons
  chosen_spanish: dos hijos
  alternatives_spanish:
  - dos hijos varones
  - dos varones
  lexicon: HALOT
  rationale: '''בנים'' puede ser ''hijos'' en español bíblico y evita la dureza de ''hijos varones''; el contexto genealógico ya deja claro que son hijos de José.'
- source_word: יָֽלְדָה לּ/וֹ֙
  english_pob_choice: bore to him
  chosen_spanish: que le dio
  alternatives_spanish:
  - que le dio a luz
  - que le había dado a luz
  - que le nació
  lexicon: HALOT
  rationale: El hebreo destaca el acto de dar a luz con la relación hacia José. En español, 'que le dio' comunica de forma clara y digna la función materna de Asenat sin ambigüedad de sujeto.
- source_word: אָֽסְנַ֔ת
  english_pob_choice: Asenath
  chosen_spanish: Asenat
  alternatives_spanish:
  - Asenath
  lexicon: HALOT
  rationale: Se translitera el nombre propio con adaptación habitual al español bíblico, manteniendo identificación transparente y pronunciación natural.
- source_word: בַּת פּ֥וֹטִי פֶ֖רַע
  english_pob_choice: daughter of Potiphera
  chosen_spanish: hija de Potifera
  alternatives_spanish:
  - hija de Potífera
  lexicon: HALOT
  rationale: Se conserva el parentesco explícito del constructo y se adopta una transliteración española fluida del nombre propio.
- source_word: כֹּהֵ֥ן אֽוֹן
  english_pob_choice: priest of On
  chosen_spanish: sacerdote de On
  alternatives_spanish:
  - sacerdote en On
  lexicon: HALOT
  rationale: כֹּהֵן se traduce por 'sacerdote' en español, equivalente directo y transparente; On se mantiene como nombre propio geográfico.
theological_decisions:
- issue: Tratamiento del plural 'dos hijos' con el pasivo de nacimiento
  english_pob_reading: two sons were born to Joseph
  chosen_spanish_reading: le nacieron a José dos hijos
  alternative_spanish_readings:
  - dos hijos le nacieron a José
  - a José le nacieron dos hijos
  rationale: 'No hay tensión doctrinal, pero sí una decisión sintáctica: el español necesita una estructura natural que conserve el agente receptor y el sujeto plural. La forma elegida refleja fielmente el pasivo hebreo sin oscurecer la relación paterna.'
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido hebreo y la auditoría inglesa: conserva el singular ''año'', el dativo con ''le nacieron'', y la identificación genealógica de Asenat, hija de Potifera, sacerdote de On. No se detectaron cambios de revisión relevantes en el pasaje fuente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa 'sacerdote' para כֹּהֵן por ser el equivalente directo y natural en español.
  - Se prefiere 'hijos' sobre 'varones' porque el contexto genealógico lo hace suficiente y más idiomático.
  - Se conserva el nombre 'On' sin traducir, siguiendo el tratamiento de topónimos del proyecto.
