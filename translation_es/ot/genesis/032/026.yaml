  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. La decisión corporal «coyuntura del muslo» es aceptable y consistente con la justificación documentada, aunque «cavidad» o «hueco» también serían posibles en nota. La ambigüedad de pronombres se preserva correctamente.
