translation:
  language: es
  text: 'Y Josué hizo con ellos tal como Yahvé le había dicho: desjarretó[a] sus caballos y quemó sus carros con fuego.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «inutilizó sus caballos»; el hebreo más específicamente se refiere a desjarretarlos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ לָהֶם
  english_pob_choice: did to them
  chosen_spanish: hizo con ellos
  alternatives_spanish:
  - hizo para ellos
  - trató con ellos
  lexicon: HALOT
  rationale: La construcción hebrea con עשה + ל expresa acción dirigida a ellos, no beneficio. En español, «hizo con ellos» comunica esa relación directa sin añadir interpretación.
- source_word: כַּאֲשֶׁר אָמַר ל֖וֹ יְהוָה
  english_pob_choice: just as Yahweh had told him
  chosen_spanish: tal como Yahvé le había dicho
  alternatives_spanish:
  - como Yahvé le había dicho
  - justamente como Yahvé le había dicho
  lexicon: HALOT
  rationale: «Tal como» conserva la fuerza comparativa de כַּאֲשֶׁר. «Le había dicho» funciona naturalmente en español y mantiene el orden narrativo perfecto del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'El texto hebreo usa el nombre propio divino; en español se mantiene la transliteración del nombre revelado, adaptada a la forma ya establecida del proyecto: «Yahvé».'
- source_word: סוּסֵיהֶם
  english_pob_choice: their horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - sus corceles
  lexicon: HALOT
  rationale: Es el equivalente normal y fiel del sustantivo plural hebreo para caballos.
- source_word: עִקֵּר
  english_pob_choice: hamstrung
  chosen_spanish: desjarretó
  alternatives_spanish:
  - les cortó los tendones
  - los inutilizó
  lexicon: HALOT
  rationale: El verbo hebreo se refiere específicamente a inutilizar al animal cortándole los tendones de las patas. «Desjarretar» es el equivalente español preciso y evita suavizar el sentido.
- source_word: מַרְכְּבֹתֵיהֶם
  english_pob_choice: their chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - sus carros de guerra
  - sus carruajes
  lexicon: HALOT
  rationale: En este contexto militar, «carros» transmite el sentido del término hebreo sin recargar la frase; «carros de guerra» sería explicativo pero menos directo al hebreo.
- source_word: שָׂרַף בָּאֵשׁ
  english_pob_choice: burned ... with fire
  chosen_spanish: quemó ... en el fuego
  alternatives_spanish:
  - los quemó con fuego
  - los incendió
  lexicon: HALOT
  rationale: Se conserva la inclusión explícita de בָּאֵשׁ. «En el fuego» refleja la locución de manera natural en español y mantiene el énfasis del hebreo en el medio empleado.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La decisión del proyecto es transliterar el Tetragrámaton como nombre propio divino. En español, «Yahvé» preserva esa elección sin sustituirla por un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El paquete fuente y la auditoría inglesa coinciden plenamente en el sentido del versículo; no hay revisiones posteriores que alteren la decisión principal. La única nota relevante es la precisión léxica de עִקֵּר, donde el inglés opta por «hamstrung» y en español se refleja con «desjarretó», conservando la alternativa explicativa en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma fija del nombre divino en el texto principal.
  - «desjarretó» se usa por precisión semántica y se acompaña de nota para lectores que prefieran una glosa más explícita.
  - «carros» conserva el paralelismo narrativo sin añadir elementos no presentes en el hebreo.
  - La preposición «en el fuego» reproduce la presencia explícita de בָּאֵשׁ en la fuente.
