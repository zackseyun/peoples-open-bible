translation:
  language: es
  text: Y cuando José llegó a sus hermanos, le quitaron su túnica, la túnica de muchos colores[a] que llevaba puesta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la túnica larga» o «la túnica ricamente adornada». La expresión hebrea כְּתֹנֶת הַפַּסִּים es incierta; la tradicional «túnica de muchos colores» es posible, aunque quizá menos probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: And when
  chosen_spanish: Y sucedió que, cuando
  alternatives_spanish:
  - Y cuando
  - Y aconteció cuando
  lexicon: WLC/HALOT
  rationale: La fórmula narrativa introduce un nuevo episodio. «Y sucedió que, cuando» conserva el valor temporal e idiomático sin caer en una traducción mecánica del hebreo.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: WLC/HALOT
  rationale: En este contexto narrativo, «llegó» comunica con naturalidad la acción de José al presentarse ante sus hermanos, manteniendo el valor de movimiento del verbo hebreo.
- source_word: אֶל אֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - ante sus hermanos
  - con sus hermanos
  lexicon: WLC/HALOT
  rationale: El plural masculino del hebreo se refiere a sus hermanos varones; «a sus hermanos» es fiel y natural en español.
- source_word: וַיַּפְשִׁיטוּ
  english_pob_choice: they stripped
  chosen_spanish: lo despojaron
  alternatives_spanish:
  - lo desnudaron
  - le quitaron la ropa
  lexicon: WLC/HALOT
  rationale: El verbo expresa una acción violenta de quitarle la ropa. «Lo despojaron» evita una literalidad torpe y conserva la fuerza del acto; el complemento se entiende por el contexto inmediato.
- source_word: כֻּתָּנְתּוֹ
  english_pob_choice: his tunic
  chosen_spanish: de su túnica
  alternatives_spanish:
  - de su vestido
  - de su manto
  lexicon: WLC/HALOT
  rationale: «Túnica» es el equivalente español más preciso para כֻּתֹּנֶת/כֻּתָּנֶת y corresponde a la decisión inglesa de «tunic».
- source_word: כְּתֹנֶת הַפַּסִּים
  english_pob_choice: the tunic of many colors
  chosen_spanish: la túnica de muchos colores
  alternatives_spanish:
  - la túnica larga
  - la túnica ricamente adornada
  - la túnica especial
  lexicon: WLC/HALOT
  rationale: Se conserva la formulación tradicional y literal adoptada en la revisión inglesa reciente. Aunque el sentido exacto de פַּסִּים es discutido, la traducción «de muchos colores» refleja la lectura auditada y es plenamente reconocible en español.
- source_word: אֲשֶׁר עָלָיו
  english_pob_choice: that was on him
  chosen_spanish: que llevaba puesta
  alternatives_spanish:
  - que tenía puesta
  - que estaba sobre él
  lexicon: WLC/HALOT
  rationale: La cláusula identifica la prenda que José vestía en ese momento. «Que llevaba puesta» es natural en español y preserva la referencia contextual a la vestidura efectivamente sobre él.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que volvió de una opción interpretativa a «the tunic of many colors» para reflejar mejor la frase hebrea y conservar una traducción formal reconocible. La versión española adopta esa misma preferencia y mantiene la ambigüedad documentada en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero aquí no aparece el tetragrámaton ni una referencia al nombre divino.
  - Se mantuvo «túnica» para כֻּתֹּנֶת/כֻּתָּנֶת, coherente con la terminología auditada del inglés POB.
  - Se tradujo con naturalidad narrativa, evitando calcos como «y fue» o «y aconteció» sin necesidad expresiva.
  - La nota conserva la tensión lexical sobre כְּתֹנֶת הַפַּסִּים sin resolverla dogmáticamente en el texto principal.
