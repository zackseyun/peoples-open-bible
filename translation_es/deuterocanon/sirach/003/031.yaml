revisions:
- from: El que hace el bien será llamado bienaventurado por sus caminos[a], y en el tiempo de su tropiezo hallará apoyo.
  to: El que hace el bien será llamado dichoso por sus caminos[a], y en el tiempo de su tropiezo hallará apoyo.
  rationale: Se ajusta «bienaventurado» a «dichoso» para reflejar con más naturalidad y precisión el sentido de reconocimiento favorable implícito en el hebreo, sin introducir un tono más técnico de beatitud. Se mantiene «por sus caminos» para conservar la metáfora sapiencial y se conserva la nota sobre la divergencia griega, con leve pulido de estilo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:44:54Z'
