translation:
  language: es
  text: Pero yo tomaré venganza por mi nación, y por el santuario[a], y por nuestras mujeres y nuestros hijos[b], porque todas las naciones se han reunido para exterminarnos[c] por odio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las cosas santas' o 'los lugares santos'; el griego dice literalmente 'las cosas/los lugares santos'.
    reason: lexical_alternative
  - marker: b
    text: O 'nuestras esposas y nuestros hijos'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'por causa de odio' o 'a causa de enemistad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Mas
  lexicon: LSJ
  rationale: Introduce un contraste directo y natural en español, conservando el valor adversativo de apertura sin sobrecargar el registro.
- source_word: ἐκδικήσω
  english_pob_choice: I will take vengeance
  chosen_spanish: tomaré venganza
  alternatives_spanish:
  - me vengaré
  - haré venganza
  - ejecutaré retribución
  lexicon: BDAG/LSJ
  rationale: El verbo expresa retaliación judicial o militar. 'Tomaré venganza' conserva la fuerza del original y el sentido de retribución sin suavizarlo demasiado.
- source_word: τοῦ ἔθνους μου
  english_pob_choice: my nation
  chosen_spanish: mi nación
  alternatives_spanish:
  - mi pueblo
  - mi pueblo nacional
  lexicon: LSJ
  rationale: ἔθνος aquí denota la comunidad nacional judía; 'nación' reproduce mejor ese matiz político-colectivo que 'pueblo'.
- source_word: τῶν ἁγίων
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - las cosas santas
  - los lugares santos
  lexicon: LSJ
  rationale: En el contexto de 1 Macabeos, la expresión apunta al ámbito del templo/santuario. 'Santuario' evita una literalidad oscura y refleja el referent probable.
- source_word: τῶν γυναικῶν καὶ τῶν τέκνων ἡμῶν
  english_pob_choice: our women and children
  chosen_spanish: nuestras mujeres y nuestros hijos
  alternatives_spanish:
  - nuestras esposas y nuestros hijos
  - nuestras mujeres y niños
  lexicon: LSJ
  rationale: Se mantiene el paralelo del griego con 'mujeres' y 'hijos'. 'Hijos' es más natural y abarcador en español bíblico que repetir 'niños' en este contexto.
- source_word: συνήχθησαν
  english_pob_choice: have gathered
  chosen_spanish: se han reunido
  alternatives_spanish:
  - se han juntado
  - fueron reunidas
  - se congregaron
  lexicon: BDAG/LSJ
  rationale: El perfecto compuesto español transmite adecuadamente el resultado presente de la reunión hostil. 'Reunido' suena más natural que un pasivo literal.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todos los gentiles
  lexicon: LSJ
  rationale: '''Naciones'' conserva el valor amplio de ἔθνη en este relato histórico y evita una carga confesional posterior de ''gentiles''.'
- source_word: ἐκτρῖψαι ἡμᾶς
  english_pob_choice: to wipe us out
  chosen_spanish: exterminarnos
  alternatives_spanish:
  - destruirnos
  - borrarnos
  - aniquilarnos
  lexicon: LSJ
  rationale: ἐκτρίβω aquí implica destrucción total. 'Exterminarnos' comunica con claridad la intención de aniquilación que el contexto de guerra exige.
- source_word: ἔχθρας χάριν
  english_pob_choice: out of hatred
  chosen_spanish: por odio
  alternatives_spanish:
  - por enemistad
  - a causa del odio
  - por el rencor
  lexicon: LSJ
  rationale: La frase causal se vierte de forma concisa y natural. 'Por odio' preserva el motivo hostil sin introducir una construcción demasiado arcaica.
theological_decisions:
- issue: Referent of τῶν ἁγίων
  english_pob_reading: the sanctuary
  chosen_spanish_reading: el santuario
  alternative_spanish_readings:
  - las cosas santas
  - los lugares santos
  - los santos
  rationale: El contexto de 1 Macabeos es fuertemente templario, y la lista de objetos amenazados incluye la nación, el santuario y las familias; por ello, 'santuario' es la mejor equivalencia contextual y no una afirmación doctrinal distinta.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Coincide con la evaluación de alta concordancia y sin cambios sustantivos del último pase; la redacción española conserva las mismas decisiones léxicas principales del audit trail inglés, adaptadas a un español bíblico moderno y natural.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que requiera explicitarlo.
  - Se evitó 'Cristo' por no haber vocabulario cristológico en el versículo.
  - '''Santuario'' se usa en singular por el referente contextual del templo en 1 Macabeos.'
  - '''Mujeres y nuestros hijos'' preserva el paralelismo del original; ''hijos'' funciona como término amplio y no excluye la idea de descendencia vulnerable.'
