id: PSA.56.3
reference: Psalms 56:3
source:
  edition: WLC
  text: שָׁאֲפ֣וּ שׁ֭וֹרְרַ/י כָּל הַ/יּ֑וֹם כִּֽי רַבִּ֨ים לֹחֲמִ֖ים לִ֣/י מָרֽוֹם־־׃
translation:
  text: My enemies pant after me all day long[a], for many fight against me from on high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''O Most High'': the final Hebrew word may be read as a vocative address to God rather than as describing the attackers'' exalted position; it is also taken by some as ''proudly.'''
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁאֲפוּ
  lemma: שׁאף
  chosen: pant after
  alternatives:
  - trample on
  - pursue eagerly
  - snort at
  lexicon: HALOT
  rationale: The verb שׁאף literally evokes panting/snuffing, and in hostile contexts can denote eager pursuit or crushing attack. 'Pant after' preserves the vivid predatory image without overcommitting to the more interpretive 'trample on.'
- source_word: שׁוֹרְרַי
  chosen: my enemies
  alternatives:
  - those who watch me
  - my attackers
  - my foes
  lexicon: HALOT
  rationale: The noun refers to hostile opponents. 'My enemies' is clear modern English and fits the psalm's lament context better than a more opaque literal rendering.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  lexicon: HALOT
  rationale: This is the natural contemporary English equivalent of the idiom.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the complaint; 'for' fits the poetic flow.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - numerous
  lexicon: HALOT
  rationale: Straightforward quantitative adjective; 'many' is idiomatic and concise.
- source_word: לֹחֲמִים לִי
  chosen: fight against me
  alternatives:
  - wage war against me
  - battle me
  lexicon: HALOT
  rationale: The participle plus ל marks ongoing hostile action directed toward the psalmist. 'Fight against me' preserves the military hostility in accessible English.
- source_word: מָרוֹם
  chosen: from on high
  alternatives:
  - proudly
  - O Most High
  - height
  lexicon: HALOT
  rationale: מָרוֹם can denote height/exaltation and has been taken adverbially ('proudly') or vocatively ('O Most High'). In this syntax it most naturally functions adverbially/locatively, describing the attackers as acting from a position of height or exaltation. 'From on high' preserves the Hebrew image while leaving some ambiguity. Because 'O Most High' is a longstanding alternative construal, it is preserved in a footnote.
