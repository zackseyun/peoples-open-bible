translation:
  language: es
  text: Y se llenaron de gran temor cuando oyeron que el rey les había dado autoridad para reunir tropas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «temieron un gran temor», un giro griego que expresa temor intenso.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφοβήθησαν φόβον μέγαν
  english_pob_choice: they were greatly afraid
  chosen_spanish: se llenaron de gran temor
  alternatives_spanish:
  - temieron con gran temor
  - tuvieron mucho miedo
  lexicon: BDAG
  rationale: El griego usa un acusativo cognado para intensificar el verbo de temer. En español, «se llenaron de gran temor» conserva la intensidad sin repetir de modo mecánico una forma como «temieron un gran temor».
- source_word: ὅτε ἤκουσαν
  english_pob_choice: when they heard
  chosen_spanish: cuando oyeron
  alternatives_spanish:
  - cuando escucharon
  - al oír
  lexicon: BDAG
  rationale: La cláusula temporal es simple y narrativa. «Cuando oyeron» refleja bien la secuencia del griego y suena natural en español bíblico contemporáneo.
- source_word: ἔδωκεν αὐτοῖς
  english_pob_choice: had given them
  chosen_spanish: les había dado
  alternatives_spanish:
  - les dio
  lexicon: BDAG
  rationale: El pluscuamperfecto español expresa que el otorgamiento de la autoridad era parte del contenido ya oído, en paralelo al matiz del audit trail en inglés.
- source_word: ὁ βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: BDAG
  rationale: «El rey» es la equivalencia directa y natural para βασιλεύς en este contexto histórico.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - permiso
  - facultad
  lexicon: BDAG
  rationale: ἐξουσία denota autorización delegada o derecho oficial. «Autoridad» preserva ese sentido jurídico-político mejor que opciones más débiles como «permiso».
- source_word: συναγαγεῖν δυνάμεις
  english_pob_choice: to gather forces
  chosen_spanish: para reunir tropas
  alternatives_spanish:
  - para reunir fuerzas
  - para levantar un ejército
  lexicon: BDAG
  rationale: En contexto militar, δυνάμεις se refiere a tropas o fuerzas armadas. «Reunir tropas» mantiene la referencia militar sin imponer una interpretación más específica de lo que el griego exige.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés concuerdan estrechamente; la única decisión principal para el español fue evitar una traducción demasiado literal del acusativo cognado de φοβέομαι y elegir una formulación natural que conserve la intensidad.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se tradujo ἐξουσίαν con «autoridad», en armonía con el uso jurídico del término en el contexto.
  - Se eligió «tropas» para δυνάμεις por el contexto militar, sin añadir elementos inexistentes en el griego.
