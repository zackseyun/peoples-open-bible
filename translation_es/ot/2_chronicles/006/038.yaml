translation:
  language: es
  text: y volverán a ti con todo su corazón y con toda su alma en la tierra de su cautiverio[a], donde fueron llevados cautivos, y orarán hacia su tierra que tú diste a sus padres, hacia la ciudad que escogiste y hacia la casa que he construido para tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se volverán a ti»; en contextos de pacto, la expresión puede incluir la idea de arrepentimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁבוּ אֵלֶיךָ
  english_pob_choice: and they return to you
  chosen_spanish: y ellos volverán a ti
  alternatives_spanish:
  - y volverán a ti
  - y se volverán a ti
  - y se arrepentirán ante ti
  lexicon: HALOT
  rationale: שׁוּב con אֶל expresa volver/volverse hacia alguien. En español, «volverán a ti» conserva el movimiento de retorno sin imponer «arrepentirse» en el texto principal. El contexto pactal permite la implicación de arrepentimiento, pero no la exige como traducción principal.
- source_word: בְּכָל לִבָּם
  english_pob_choice: with all their heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo el corazón
  - de todo corazón
  lexicon: HALOT
  rationale: Es un modismo hebreo de entrega interior total. «Corazón» mantiene la equivalencia natural y la fuerza idiomática en español.
- source_word: וּבְכָל נַפְשָׁם
  english_pob_choice: and with all their soul
  chosen_spanish: y con toda su alma
  alternatives_spanish:
  - y con todo su ser
  - y con toda su vida
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa la persona entera/vida. «Alma» conserva el par tradicional «corazón y alma» sin volverlo explicativo en exceso.
- source_word: בְּאֶרֶץ שִׁבְיָם
  english_pob_choice: in the land of their captivity
  chosen_spanish: en la tierra de su cautiverio
  alternatives_spanish:
  - en la tierra de su exilio
  - en la tierra donde están cautivos
  lexicon: HALOT
  rationale: La construcción apunta a la tierra asociada con su cautiverio. «Cautiverio» es transparente y cercano al hebreo; «exilio» sería posible, pero desplaza levemente el matiz concreto de captura.
- source_word: אֲשֶׁר שָׁבוּ אֹתָם
  english_pob_choice: where they were taken captive
  chosen_spanish: donde los llevaron cautivos
  alternatives_spanish:
  - donde fueron llevados cautivos
  - que los tomó cautivos
  lexicon: HALOT
  rationale: El hebreo usa un verbo activo con objeto sufijado; el español natural exige pasiva o activa equivalente. «Los llevaron cautivos» preserva el agente implícito y el sentido de captura.
- source_word: וְהִתְפַּלְל֗וּ
  english_pob_choice: and pray
  chosen_spanish: y orarán
  alternatives_spanish:
  - y orarán dirigiéndose
  - y harán oración
  lexicon: HALOT
  rationale: En esta secuencia condicional futura, el español expresa mejor el valor verbal con futuro simple. «Orarán» mantiene la sobriedad del hebreo sin añadir explicación.
- source_word: דֶּרֶךְ אַרְצָם
  english_pob_choice: toward their land
  chosen_spanish: hacia su tierra
  alternatives_spanish:
  - en dirección a su tierra
  - mirando hacia su tierra
  lexicon: HALOT
  rationale: En contextos de oración orientada, דֶּרֶךְ significa «hacia/en dirección a». «Hacia su tierra» es natural en español y conserva la orientación espacial de la plegaria.
- source_word: אֲשֶׁר נָתַתָּה לַאֲבוֹתָם
  english_pob_choice: that you gave to their fathers
  chosen_spanish: que tú diste a sus padres
  alternatives_spanish:
  - que tú diste a sus antepasados
  - que tú entregaste a sus padres
  lexicon: HALOT
  rationale: «Padres» conserva el lenguaje pactal del texto. El posesivo «sus» hace claro el referente sin alterar la relación de promesa.
- source_word: וְהָעִיר אֲשֶׁר בָּחַרְתָּ
  english_pob_choice: and toward the city that you have chosen
  chosen_spanish: y hacia la ciudad que escogiste
  alternatives_spanish:
  - y hacia la ciudad que has escogido
  - y hacia la ciudad elegida
  lexicon: HALOT
  rationale: El verbo expresa la elección divina de Jerusalén. El pasado simple en español es suficiente para el acto de elección y evita una perífrasis menos natural; el sentido durativo queda implícito en la elección divina.
- source_word: וְלַבַּיִת אֲשֶׁר בָּנִיתִי לִשְׁמֶךָ
  english_pob_choice: and toward the house that I have built for your name
  chosen_spanish: y hacia la casa que he construido para tu nombre
  alternatives_spanish:
  - y hacia la casa que he edificado para tu nombre
  - y hacia el templo que he construido para tu nombre
  lexicon: HALOT
  rationale: בַּיִת conserva «casa» para respetar el hebreo y su carga teológica, aunque el referente sea el templo. «Para tu nombre» reproduce el idioma de dedicación al nombre divino sin resolverlo como mera función litúrgica.
theological_decisions:
- issue: 'שׁוּב אֵלֶיךָ: retorno físico/pactual vs. arrepentimiento explícito'
  english_pob_reading: and they return to you
  chosen_spanish_reading: y ellos volverán a ti
  alternative_spanish_readings:
  - y se arrepentirán ante ti
  - y se volverán a ti
  rationale: La forma básica es «volver». En un contexto de pacto y exilio, la frase puede incluir arrepentimiento, pero el hebreo no obliga a decirlo de manera explícita. Mantener «volverán» preserva la tensión teológica entre regreso concreto y conversión interior.
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la revisión inglesa más reciente y no presenta cambios de revisión aplicables; se conserva la equivalencia óptima del audit trail sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el nombre divino, pero este versículo no lo contiene explícitamente.
  - Se usa «casa» en vez de «templo» para preservar el término hebreo בַּיִת y su resonancia teológica.
  - Se conserva «alma» para נֶפֶשׁ y «corazón» para לֵב en el paralelismo tradicional del texto.
  - No se introduce «arrepentirse» en el texto principal para no borrar la tensión documentada entre retorno y conversión.
