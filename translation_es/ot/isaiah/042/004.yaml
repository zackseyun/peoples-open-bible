revisions:
- from: No se debilitará ni será quebrado[a] hasta que establezca justicia en la tierra, y las costas[b] esperarán su instrucción[c].
  to: No se apagará ni será quebrado[a] hasta que establezca justicia en la tierra, y las costas lejanas esperarán su instrucción[b].
  rationale: Se reemplaza 'se debilitará' por 'se apagará' para reflejar mejor יִכְהֶה y su eco con la mecha humeante del v. 3. Se elimina la nota mal anclada sobre 'la tierra'. Se ajusta 'las costas' a 'las costas lejanas' para representar mejor אִיִּים en español natural. Se conserva 'su instrucción' para תּוֹרָתוֹ y se mantiene una nota sobre la espera esperanzada de יְיַחֵילוּ, en línea con el POB inglés.
