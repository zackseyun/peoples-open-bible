revisions:
- from: Si no es enviado por el Altísimo en visita, no pongas tu corazón en ello[a][b].
  to: A menos que sea enviado del Altísimo en visitación[a], no des tu corazón a ellas[b].
  rationale: 'La revisión sigue más de cerca las decisiones léxicas ya auditadas: ἐὰν μὴ → «A menos que»; παρὰ Ὑψίστου → «del Altísimo»; μὴ δῷς → «no des»; y ἐν ἐπισκοπῇ se conserva con la formulación más cargada «en visitación», aclarada por nota. También se mantiene el pronombre plural con nota para la referencia contextual.'
  reviewer_model: gpt-5.4
