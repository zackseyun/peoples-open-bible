translation:
  language: es
  text: Con alegría en su corazón cantó alabanzas al nombre de Dios, y suplicó al Señor[a] por toda su familia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., 'el rostro del Señor'; es decir, su presencia o favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν εὐφρίᾳ καρδίας αὐτοῦ
  english_pob_choice: With gladness in his heart
  chosen_spanish: Con alegría de corazón
  alternatives_spanish:
  - Con gozo en su corazón
  - Con regocijo en su corazón
  lexicon: BDAG
  rationale: εὐφρία expresa alegría o deleite, y καρδία mantiene el centro afectivo-volitivo. 'Con alegría de corazón' suena natural en español y conserva el tono elevado sin volverlo demasiado coloquial.
- source_word: ἐξύμνησεν
  english_pob_choice: he sang praise
  chosen_spanish: entonó alabanzas
  alternatives_spanish:
  - cantó alabanzas
  - alabó con canto
  lexicon: BDAG
  rationale: El verbo tiene un matiz de alabanza intensificada, casi hímnica. 'Entonó alabanzas' comunica ese carácter de canto de alabanza mejor que un simple 'alabó'.
- source_word: τῷ ὀνόματι τοῦ θεοῦ
  english_pob_choice: to the name of God
  chosen_spanish: al nombre de Dios
  alternatives_spanish:
  - al nombre del Dios
  - al nombre divino
  lexicon: BDAG
  rationale: El griego habla explícitamente del 'nombre' de Dios, no solo de Dios en general. 'Al nombre de Dios' preserva el giro bíblico y la referencia reverente al nombre.
- source_word: ἐδεήθη
  english_pob_choice: he entreated
  chosen_spanish: suplicó
  alternatives_spanish:
  - rogó
  - imploró
  lexicon: BDAG
  rationale: El verbo indica petición intensa y dependiente. 'Suplicó' conserva la fuerza de la acción sin sugerir una formalidad artificial.
- source_word: τοῦ προσώπου Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: al Señor[a]
  alternatives_spanish:
  - ante el Señor
  - del rostro del Señor
  lexicon: BDAG
  rationale: La sintaxis griega trata a 'el rostro del Señor' como el objeto de la súplica, pero en español literal esa construcción resulta poco natural. 'Al Señor' preserva el destinatario de la súplica, mientras la nota aclara el hebraísmo subyacente y la imagen literal.
- source_word: παντὸς τοῦ οἴκου αὐτοῦ
  english_pob_choice: all his household
  chosen_spanish: por toda su casa
  alternatives_spanish:
  - por toda su familia
  - por todo su hogar
  lexicon: BDAG
  rationale: οἶκος aquí designa el conjunto doméstico/familiar. 'Casa' conserva el sentido bíblico de linaje o casa-hogar y funciona bien en español; 'por toda su casa' mantiene el alcance colectivo.
theological_decisions:
- issue: Tratamiento de τοῦ προσώπου Κυρίου como hebraísmo de petición
  english_pob_reading: the Lord; the idiom is preserved in note as 'the face of the Lord' / presence
  chosen_spanish_reading: al Señor[a]
  alternative_spanish_readings:
  - ante el Señor
  - al rostro del Señor
  - en la presencia del Señor
  rationale: La evidencia revisada indica que τοῦ προσώπου Κυρίου funciona como objeto genitivo de la súplica y refleja el hebraísmo 'buscar el rostro de Yahvé'. En español, la forma natural principal es 'suplicó al Señor', y la nota preserva la lectura más literal e idiomática para transparencia.
  doctrine_reference: Hebraísmo del 'rostro' / presencia divina; κύριος → Señor
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente que corrige la representación de τοῦ προσώπου Κυρίου: la traducción principal sigue el resultado auditado en inglés (''he entreated the Lord''), pero la nota conserva la literalidad del hebraísmo y su sentido de presencia/favor. También preservé el matiz intensificado de ἐξύμνησεν con una solución más cantada que un simple ''alabó''.'
  spanish_consistency_notes:
  - Usé 'Dios' para θεός y 'Señor' para κύριος, siguiendo el criterio del proyecto y la revisión auditada.
  - Mantengo 'casa' para οἶκος en sentido doméstico/colectivo, no como edificio.
  - Conservo un registro bíblico claro sin sobretraducción ni paraphrase excesiva.
