lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard of
  chosen_spanish: oyeron de
  alternatives_spanish:
  - oyeron
  - se enteraron de
  lexicon: LSJ
  rationale: El verbo puede significar ‘oír’ o ‘enterarse por haber oído’. En español, ‘oyeron de’ conserva bien la referencia a noticias sobre hechos ya realizados, sin forzar una paráfrasis más libre.
- source_word: Ἰωσὴφ ὁ τοῦ Ζαχαρία
  english_pob_choice: Joseph son of Zechariah
  chosen_spanish: José, hijo de Zacarías
  alternatives_spanish:
  - José hijo de Zacarías
  - José, el hijo de Zacarías
  lexicon: LSJ
  rationale: La construcción con artículo y genitivo funciona como designación filial. ‘Hijo de’ es la equivalencia idiomática clara y fiel en español.
- source_word: Ζαχαρίας
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Zacarías
  - Zeharías
  lexicon: LSJ
  rationale: El texto griego transmitido en Swete presenta Ζαχαρίας en el segundo nombre, pero el contexto narrativo y la tradición textual estándar apoyan ‘Azarías’. Se preserva la decisión del audit trail inglés y se marca la variante en nota.
- source_word: ἄρχοντες τῶν δυνάμεων
  english_pob_choice: commanders of the forces
  chosen_spanish: jefes de las fuerzas
  alternatives_spanish:
  - comandantes de las fuerzas
  - líderes de las fuerzas
  - jefes del ejército
  lexicon: LSJ
  rationale: ἄρχοντες indica autoridad o jefatura; ‘jefes de las fuerzas’ mantiene el matiz de liderazgo militar sin imponer un rango moderno específico.
- source_word: ἀνδραγαθήσεων
  english_pob_choice: brave deeds
  chosen_spanish: hazañas valerosas
  alternatives_spanish:
  - hechos de valor
  - actos de valentía
  - hazañas heroicas
  lexicon: LSJ
  rationale: El sustantivo expresa actos de valor o bravura. ‘Hazañas valerosas’ conserva el tono encomiástico y funciona de manera natural en español.
- source_word: τοῦ πολέμου
  english_pob_choice: war
  chosen_spanish: la guerra
  alternatives_spanish:
  - la batalla
  - el combate
  - las acciones bélicas
  lexicon: LSJ
  rationale: El ajuste inglés final volvió más literal τοῦ πολέμου como ‘war’. En español, ‘la guerra’ mantiene la correspondencia directa y evita introducir una noción más técnica que el original no exige.
- source_word: οἷα ἐποίησαν
  english_pob_choice: that they had fought
  chosen_spanish: que habían librado
  alternatives_spanish:
  - que habían hecho
  - que habían realizado
  - que habían combatido
  lexicon: LSJ
  rationale: La frase resume retrospectivamente lo que llevaron a cabo. Con ‘la guerra que habían librado’ se mantiene el sentido de una guerra emprendida y sostenida, más natural en español que un literal ‘que habían hecho’.
translation_notes:
  revision_awareness: El borrador sigue el ajuste más reciente del audit trail inglés, que privilegia una lectura más literal de τοῦ πολέμου como ‘war’ y evita la frase más pesada ‘warlike exploits’. En español se reflejó ese reajuste con ‘la guerra que habían librado’, manteniendo la relación con las hazañas previas sin repetir de forma redundante ‘hechos’ o ‘explotos’.
  spanish_consistency_notes:
  - Se usa ‘Azarías’ en el texto principal por coherencia con el contexto y se documenta la variante textual en nota.
  - ‘Jefes de las fuerzas’ conserva el tono militar sin sobretraducir a un cargo moderno específico.
  - La secuencia ‘hazañas valerosas y de la guerra’ reproduce la coordinación griega entre actos de valor y el ámbito bélico.
  - Se evitó ‘Cristo’/terminología doctrinal porque no aplica en este versículo.
  - La puntuación y la capitalización siguen el estilo español moderno de lectura bíblica.
