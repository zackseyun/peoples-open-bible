  from: Then my life will live.
  to: so that I may live.
  rationale: 'The Hebrew phrase וּתְחִי נַפְשִׁי is a standard idiom where נֶפֶשׁ functions as a periphrasis for the personal pronoun, meaning ''and I will live'' or ''so that I may live.'' The waw conjunction here expresses purpose or result following the preceding cohortative (''let me escape''), not temporal sequence (''Then''). The draft''s rendering is a literalism that fails on two counts: 1) it mistranslates the waw as ''Then'', and 2) it produces an awkward and un-English tautology (''my life will live'') by failing to recognize the idiomatic use of נֶפֶשׁ. As BDB notes on נֶפֶשׁ (meaning 3.c), the phrase simply means ''I shall live.'' Translating the idiom''s meaning is more faithful to the source than a literal rendering that obscures it.'
