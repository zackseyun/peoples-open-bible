translation:
  language: es
  text: para enviar una fuerza contra ellos[a], para aplastar y eliminar la fuerza de Israel y el remanente de Jerusalén, y para quitar su memoria del lugar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para retirar su memorial» o «para borrar su recuerdo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστεῖλαι
  english_pob_choice: to send
  chosen_spanish: para enviar
  alternatives_spanish:
  - para despachar
  lexicon: LSJ
  rationale: El infinitivo de propósito en griego expresa la intención de la acción previa. «Enviar» es la equivalencia natural y transparente en español; «despachar» sería posible, pero suena más marcado y menos directo.
- source_word: δύναμιν
  english_pob_choice: a force
  chosen_spanish: una fuerza
  alternatives_spanish:
  - un ejército
  - tropas
  - poder
  lexicon: LSJ
  rationale: En este contexto militar, δύναμις designa una fuerza armada, no poder abstracto. «Una fuerza» conserva amplitud sin precisar innecesariamente el tamaño o la composición.
- source_word: τοῦ ἐκρίψαι
  english_pob_choice: to crush
  chosen_spanish: aplastar
  alternatives_spanish:
  - derribar
  - destruir
  lexicon: LSJ
  rationale: El verbo expresa la intención de abatir violentamente. «Aplastar» comunica bien la violencia del ataque y mantiene distinguible esta acción de la que sigue.
- source_word: ἐξᾶραι
  english_pob_choice: remove
  chosen_spanish: quitar
  alternatives_spanish:
  - arrancar
  - desarraigar
  - eliminar
  lexicon: LSJ
  rationale: El verbo añade la idea de retirar o hacer desaparecer. «Quitar» es amplio y natural en español; evita sobreinterpretar con imágenes demasiado específicas.
- source_word: τὴν ἰσχὺν Ἰσραήλ
  english_pob_choice: the strength of Israel
  chosen_spanish: la fuerza de Israel
  alternatives_spanish:
  - el poder de Israel
  - la fortaleza de Israel
  lexicon: LSJ
  rationale: ἰσχύς puede ser fuerza o poder. «La fuerza de Israel» sigue de cerca la estructura griega y conserva el sentido de capacidad/mayor vigor colectivo.
- source_word: τὸ κατάλιμμα Ἰερουσαλήμ
  english_pob_choice: the remnant of Jerusalem
  chosen_spanish: el remanente de Jerusalén
  alternatives_spanish:
  - lo que queda de Jerusalén
  - los sobrevivientes de Jerusalén
  lexicon: LSJ
  rationale: κατάλιμμα es aquello que queda. «Remanente» preserva la fuerza del término y su resonancia bíblica sin reducirlo solo a personas; «lo que queda» sería más explicativo pero menos técnico.
- source_word: ἆραι τὸ μνημόσυνον αὐτοῦ
  english_pob_choice: to take away its memory
  chosen_spanish: quitar su memoria
  alternatives_spanish:
  - quitar su memorial
  - borrar su recuerdo
  lexicon: LSJ
  rationale: μνημόσυνον puede significar memoria, recuerdo o memorial. «Memoria» permite una lectura natural en español y mantiene la amplitud del término; no se obliga a una forma material como «memorial».
- source_word: ἀπὸ τοῦ τόπου
  english_pob_choice: from the place
  chosen_spanish: del lugar
  alternatives_spanish:
  - de ese lugar
  - de la tierra
  lexicon: LSJ
  rationale: La preposición con artículo apunta literalmente a «del lugar». En español, la contracción fluye mejor y mantiene el referente amplio, sin precisar más de lo que el griego ofrece.
theological_decisions:
- issue: Alcance de κατάλιμμα Ἰερουσαλήμ
  english_pob_reading: Rendered as a broad collective expression rather than only 'survivors.'
  chosen_spanish_reading: Se mantiene «el remanente de Jerusalén» como expresión colectiva amplia, no solo como «sobrevivientes».
  alternative_spanish_readings:
  - los sobrevivientes de Jerusalén
  - lo que quedaba de Jerusalén
  rationale: El griego permite una noción de lo que queda en conjunto, vinculada a la ciudad y su comunidad. «Remanente» preserva esa amplitud y evita restringir injustificadamente el referente a personas individuales.
  doctrine_reference: 'Principio de fidelidad léxica: conservar el alcance del término fuente sin reducirlo por paráfrasis.'
translation_notes:
  revision_awareness: 'El pasaje muestra acuerdo sustancial con el texto griego y con el audit trail inglés; no se requirieron cambios de fondo. Se conservó la estructura acumulativa de los infinitivos de propósito y la progresión semántica: enviar una fuerza, aplastar/quitar, y borrar la memoria. La única nota refleja la ambigüedad normal de μνημόσυνον.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el texto lo requiera; aquí no aparece.
  - Se mantuvo «remanente» como término bíblico consistente para κατάλιμμα.
  - «Fuerza» se eligió para δύναμις por coherencia con el contexto militar.
  - La nota al pie se ancla en «memoria» porque el español permite también «memorial» o «recuerdo» sin alterar el sentido central.
