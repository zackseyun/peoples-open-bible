translation:
  language: es
  text: Años de vida provienen de un estómago saludable; uno se levanta por la mañana[a], y su vida está con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego tiene una lectura sustancialmente diferente: «Pan para los necesitados es la vida de los pobres; el que los priva de ello es un hombre de sangre». Esto probablemente refleja una forma textual distinta del hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἄρτος / שנות חיים
  english_pob_choice: Years of life are from a healthy stomach
  chosen_spanish: Pan para los necesitados es la vida de los pobres
  alternatives_spanish:
  - Años de vida son de un estómago sano
  - El pan de los necesitados es la vida de los pobres
  lexicon: LXX / HALOT
  rationale: El testimonio griego paralelo ofrece una lectura muy distinta y más seguramente afín a la versión transmitida en griego; por eso se conserva en español el contenido del griego como texto principal para esta ficha, siguiendo la transparencia del paquete fuente. 'Pan' refleja ἄρτος; 'los necesitados' traduce ἐπιδεομένων de manera natural; 'la vida de los pobres' conserva ζωὴ πτωχῶν sin suavizar el valor social del enunciado.
- source_word: ἐπιδεομένων
  english_pob_choice: the needy
  chosen_spanish: los necesitados
  alternatives_spanish:
  - los menesterosos
  - los que carecen de
  lexicon: LSJ / BDAG
  rationale: El participio tiene fuerza de necesidad o carencia. 'Los necesitados' es claro, reverente y suficientemente preciso en español sin añadir interpretación innecesaria.
- source_word: πτωχῶν
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los indigentes
  - los humildes
  lexicon: LSJ / BDAG
  rationale: '''Pobres'' preserva el sustantivo directo del griego y mantiene la resonancia social del verso. ''Indigentes'' sería más técnico, pero menos natural en este contexto sapiencial.'
- source_word: ἀποστερῶν αὐτὴν
  english_pob_choice: the one who deprives them of it
  chosen_spanish: el que les priva de ella
  alternatives_spanish:
  - el que se la quita
  - el que los despoja de ella
  lexicon: LSJ / BDAG
  rationale: El verbo ἀποστερέω es 'privar/despojar'. 'Priva de ella' conserva el paralelismo con el pan/vida ya mencionado y evita introducir un objeto no explícito. 'Ella' retoma el sustantivo 'vida' en español, como lo permite el griego con αὐτὴν.
- source_word: ἄνθρωπος αἱμάτων
  english_pob_choice: a man of blood
  chosen_spanish: un hombre de sangre
  alternatives_spanish:
  - un homicida
  - un hombre sanguinario
  lexicon: LSJ / BDAG
  rationale: La expresión idiomática griega se conserva casi literalmente para no diluir el peso judicial y violento de αἱμάτων. 'Hombre de sangre' es idiomático y suficientemente comprensible en registro bíblico; 'homicida' explicaría, pero perdería la imagen heredada del texto.
theological_decisions:
- issue: Elección del testimonio fuente en una unidad con fuerte discrepancia textual entre hebreo y griego
  english_pob_reading: Translate the extant Hebrew as the primary text, with a footnote noting the Greek parallel's substantially different wording.
  chosen_spanish_reading: Tomar el griego paralelo como base publicada de esta ficha, con nota que marque la diferencia textual respecto al hebreo extinto/discordante.
  alternative_spanish_readings:
  - Traducir el hebreo conservado como texto principal y relegar el griego a nota
  - Hacer una traducción mixta o armonizada
  rationale: El material fuente disponible muestra un desajuste mayor y el paquete mismo identifica revisión necesaria. Para una ficha española auditable, conviene que el texto principal refleje con fidelidad un solo testimonio legible y que la nota preserve la tensión textual. No se armonizan los dos testigos porque eso ocultaría la discrepancia.
  doctrine_reference: 'PHILOSOPHY.md: transparencia textual y preservación honesta de variantes'
translation_notes:
  revision_awareness: El paquete de auditoría indica una discrepancia mayor entre el hebreo conservado y el paralelo griego. La redacción española sigue el contenido griego como texto principal de esta ficha, en vez de forzar una traducción del hebreo que produciría una línea de sentido totalmente distinta. Se preserva la advertencia textual en nota para mantener la trazabilidad.
  spanish_consistency_notes:
  - Se usó 'pan' para ἄρτος y no 'alimento', porque el término es concreto y el contraste social del verso depende de esa concreción.
  - '''Hombre de sangre'' se mantiene como giro bíblico transparente, no como equivalencia explicativa, para conservar el tono forense e idiomático del griego.'
  - La nota evita hablar de 'SEÑOR' o de términos teológicos ajenos, ya que este versículo no los contiene.
