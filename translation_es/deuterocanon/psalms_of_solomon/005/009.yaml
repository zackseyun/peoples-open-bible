review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: condición negativa, petición dirigida a Dios, negación de mantenerse lejos y movimiento hacia Dios. Sin embargo, «nos vuelves» en español queda elíptico y poco natural para ἐπιστρέψῃς con objeto personal; no comunica con suficiente claridad el sentido de hacer volver/volver atrás que el audit trail preserva. «Nos haces volver» mantiene mejor la fuerza verbal y deja abierta la alternativa idiomática «nos restauras» en nota.'
  spanish_quality_summary: La oración es clara y digna, pero «si no nos vuelves» suena incompleta en español general y puede leerse como cambio de estado sin dirección. El resto del verso es legible y adecuado; «no nos apartaremos» y «sino que vendremos a ti» funcionan bien en registro bíblico moderno.
  glossary_alignment: 'No hay términos del glosario principal en conflicto. La decisión clave es ἐπιστρέψῃς: conviene evitar tanto una paráfrasis doctrinal como «nos conviertes» como una forma demasiado literal pero antinatural como «nos vuelves». «Nos haces volver» en el texto principal, con nota para «nos restauras», se ajusta mejor al uso salmódico y al razonamiento documentado.'
  issues:
  - severity: medium
    issue: «nos vuelves» es antinatural y semánticamente impreciso en español para ἐπιστρέψῃς
    rationale: Aunque intenta conservar la concisión de «turn us back», en español «volver» transitivo con objeto personal sin complemento resulta extraño. «Nos haces volver» expresa con claridad el retorno causado por Dios sin imponer «restaurar» o «convertir» en el texto principal.
  - severity: low
    issue: La nota a no refleja bien el orden de alternativas preferible en español
    rationale: Dado el uso salmódico y el audit trail, conviene presentar «nos restauras» como alternativa léxica destacada, pero mantener «nos haces volver» como texto principal por claridad formal.
