translation:
  language: es
  text: 'Y sucedió[a], al ofrecerse la ofrenda vegetal, que se acercó Elías el profeta y dijo: «Yahvé, Dios de Abraham, de Isaac y de Israel, que hoy se sepa que tú eres Dios en Israel, y que yo soy tu siervo, y que por tu palabra[b] he hecho todas estas cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice «Israel»; algunos lectores podrían esperar «Jacob» por la fórmula patriarcal más familiar, pero aquí el texto lee específicamente «Israel».
    reason: alternative_reading
  - marker: b
    text: O «conforme a tu palabra» / «según tu palabra» / «a tu palabra».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲלוֹת הַמִּנְחָה
  english_pob_choice: at the offering up of the grain offering
  chosen_spanish: al ofrecerse la ofrenda vegetal
  alternatives_spanish:
  - cuando se ofrecía la ofrenda vegetal
  - al presentarse la ofrenda de cereal
  - al ofrecerse la ofrenda de grano
  lexicon: HALOT
  rationale: מִנְחָה puede designar una ofrenda vegetal/de cereal/tributo; en español, «ofrenda vegetal» comunica el tipo sacrificial sin perder precisión cultual. «Al ofrecerse» conserva el valor idiomático del infinitivo de עלה como acción de subir/ofrecer.
- source_word: וַיִּגַּשׁ
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - se llegó
  - vino cerca
  lexicon: HALOT
  rationale: El verbo נגשׁ expresa aproximación concreta con tono solemne; «se acercó» es natural en español y conserva la dirección física y ceremonial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio como transliteración de יְהוָה, según la terminología POB. «Yahvé» preserva el nombre del pacto y evita la sustitución por un título.
- source_word: אֱלֹהֵי אַבְרָהָם יִצְחָק וְיִשְׂרָאֵל
  english_pob_choice: God of Abraham, Isaac, and Israel
  chosen_spanish: Dios de Abraham, de Isaac y de Israel
  alternatives_spanish:
  - Dios de Abraham, Isaac y Jacob
  - Dios de Abraham, Isaac e Israel
  lexicon: HALOT
  rationale: El hebreo dice «Israel», no «Jacob»; se conserva la lectura textual sin armonizarla con la fórmula más conocida. Se añaden preposiciones por claridad y ritmo natural en español.
- source_word: הַיּוֹם יִוָּדַע
  english_pob_choice: let it be known today
  chosen_spanish: que hoy se sepa
  alternatives_spanish:
  - hoy se sabrá
  - que sea sabido hoy
  - que hoy llegue a saberse
  lexicon: HALOT
  rationale: El nifal imperfecto funciona aquí con fuerza jussiva en oración. «Que hoy se sepa» reproduce bien la petición y suena natural en español bíblico contemporáneo.
- source_word: אֱלֹהִים בְּיִשְׂרָאֵל
  english_pob_choice: God in Israel
  chosen_spanish: Dios en Israel
  alternatives_spanish:
  - Dios sobre Israel
  - Dios entre Israel
  lexicon: HALOT
  rationale: La preposición ב se rinde de forma directa como «en», manteniendo el matiz de presencia y esfera sin sobreinterpretar la relación.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: POB privilegia a menudo «esclavo» para עבד cuando se desea fuerza léxica; aquí se conserva para no suavizar el término. «Esclavo» expone la relación de propiedad/servicio total implícita en el hebreo.
- source_word: וּבִדְבָרֶךָ
  english_pob_choice: by your word
  chosen_spanish: conforme a tu palabra
  alternatives_spanish:
  - por tu palabra
  - según tu palabra
  - a tu palabra
  lexicon: HALOT
  rationale: ב con דבר puede indicar norma o instrumento. «Conforme a tu palabra» preserva la idea de obediencia a la palabra divina y evita ambigüedad en español.
- source_word: עָשִׂיתִי אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: I have done all these things
  chosen_spanish: he hecho todas estas cosas
  alternatives_spanish:
  - hice todas estas cosas
  - he hecho todos estos asuntos
  - he realizado todas estas cosas
  lexicon: HALOT
  rationale: דברים aquí significa hechos/asuntos, no simples palabras. El perfecto se vierte con presente perfecto para reflejar la acción completada con vigencia en la súplica presente.
theological_decisions:
- issue: Cómo rendir el Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto exige transliterar el nombre divino en lugar de sustituirlo por un título. «Yahvé» es la forma estable en español de esta línea POB y preserva el nombre personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula patriarcal con «Israel»
  english_pob_reading: God of Abraham, Isaac, and Israel
  chosen_spanish_reading: Dios de Abraham, de Isaac y de Israel
  alternative_spanish_readings:
  - Dios de Abraham, Isaac y Jacob
  - Dios de Abraham, Isaac e Israel
  rationale: Se conserva «Israel» porque el texto hebreo lo lee explícitamente. No se armoniza con «Jacob», ya que eso borraría una diferencia textual documentada.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy over translation tradition
- issue: 'עבדך: relación de servicio'
  english_pob_reading: your servant
  chosen_spanish_reading: tu esclavo
  alternative_spanish_readings:
  - tu siervo
  - tu servidor
  rationale: Aunque «siervo» es más suave en español eclesial, aquí se mantiene la fuerza de עבד siguiendo la preferencia léxica POB para no diluir la dependencia total y la pertenencia al soberano.
  doctrine_reference: 'DOCTRINE.md: Contested terms — δοῦλος / עבד'
translation_notes:
  revision_awareness: Alineado con la última pasada de revisión, que indicó que no eran necesarios cambios. La redacción española mantiene la lectura textual «Israel», conserva el nombre divino como «Yahvé» y sostiene la fuerza de עבד con «esclavo» conforme al criterio POB.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «Israel» en la fórmula patriarcal, sin armonizar a «Jacob».
  - «ofrenda vegetal» se emplea para reflejar מִנְחָה con precisión cultual.
  - La nota [b] deja visible la alternativa tradicional «siervo» y la posible lectura fraseológica de בִּדְבָרֶךָ.
