review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: Gedeón sube por una ruta asociada con habitantes de tiendas, ubicada al este de Nobah y Jogbehah, y golpea el campamento cuando este se hallaba en estado de בטח. Sin embargo, hay dos desajustes importantes con la evidencia y la auditoría inglesa: (1) la nota [a] está mal clasificada, porque el texto principal ya traduce literalmente הַשְּׁכוּנֵי בָאֳהָלִים y la nota introduce una posible interpretación (''nómada''), no una literalidad alternativa; (2) ''hirió al campamento'' suena impropio en español para atacar un campamento, y ''estaba seguro'' no comunica suficientemente en el texto principal el matiz contextual de vulnerabilidad/despreocupación que la POB inglesa puso como principal con ''unsuspecting''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta cierta rigidez y una elección poco idiomática en 'hirió al campamento'. También la hispanización acentual de 'Nobá' y 'Jogbáha' no está justificada por la evidencia ni por el uso más reconocible; conviene mantener formas transliteradas más estables. 'Al oriente de' es aceptable, pero 'al este de' o 'al oriente de' ambos sirven; no requiere cambio. La repetición de 'campamento' puede conservarse. La puntuación funciona mejor sin punto y coma coordinando con 'mientras'.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. La revisión propuesta conserva el principio de transparencia léxica: ''subió'', ''camino/ruta'', ''los que habitan en tiendas'', ''campamento''. Para בֶטַח, conviene alinear mejor con la POB inglesa principal mediante ''desprevenido'', dejando ''seguro'' como alternativa en nota, ya que el hebreo permite ambos matices y el inglés auditado privilegia el efecto contextual.'
  issues:
  - severity: medium
    issue: '"hirió al campamento" es poco natural en español para un objetivo militar colectivo'
    rationale: Aunque נכה puede ser 'herir/golpear', en español 'herir un campamento' suena anómalo. 'Golpeó el campamento' o mejor 'atacó/sorprendió y atacó' serían más idiomáticos; pero para mantener cercanía léxica, 'golpeó el campamento' preserva la imagen sin sobreinterpretar.
  - severity: medium
    issue: La opción principal "estaba seguro" no refleja bien el valor contextual que la POB inglesa hizo principal
    rationale: בֶטַח puede significar seguro/confiado, pero en contexto militar la fuerza narrativa es que el campamento estaba desprevenido/off guard. Conviene expresar eso en el texto principal y dejar 'seguro' como alternativa en nota.
  - severity: low
    issue: La nota [a] no está bien formulada para la función que cumple
    rationale: El texto principal ya dice literalmente 'los que habitan en tiendas'; la nota no debería presentarlo otra vez como 'literalmente', sino explicar la alternativa interpretativa 'nómadas'.
  - severity: low
    issue: Las formas "Nobá" y "Jogbáha" son innecesariamente idiosincrásicas
    rationale: La auditoría inglesa usa Nobah y Jogbehah; en español conviene una transliteración reconocible y estable. La acentuación añadida puede dificultar identificación con otras referencias bíblicas.
