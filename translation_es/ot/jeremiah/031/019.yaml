revisions:
- from: Porque después de volver[a], me arrepentí; y después de ser instruido, me golpeé el muslo[b]. Me avergoncé, y también quedé humillado, porque cargué la vergüenza de mi juventud[c].
  to: Porque después de volver[a], me arrepentí; y después de ser instruido, me golpeé el muslo[b]. Me avergoncé, y también quedé humillado, porque llevé el oprobio de mi juventud[c].
  rationale: Se conserva la estructura del borrador, pero se sustituye «cargué la vergüenza» por «llevé el oprobio» para representar mejor חֶרְפָּה y mejorar la naturalidad en español. También se afina la nota [a] para reflejar con más precisión la alternativa léxica documentada en la auditoría inglesa.
