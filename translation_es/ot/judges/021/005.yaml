  to: 'Y los hijos de Israel dijeron[a]: «¿Quién de todas las tribus de Israel no subió a Yahvé en la asamblea?» Porque el gran juramento había sido hecho acerca de todo el que no subió a Yahvé en Mizpa, diciendo: «Ciertamente será puesto a muerte».'
  rationale: Se corrige la cláusula penal final para reflejar el sentido judicial pasivo de מוֹת יוּמָת y alinearla con la evidencia fuente y el razonamiento léxico documentado por el POB. También se elimina la nota [b] por redundante e injustificada en español, conservando solo la alternativa útil para 'los hijos de Israel'.
