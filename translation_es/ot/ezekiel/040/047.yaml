translation:
  language: es
  text: 'Luego midió el atrio: cien codos de largo y cien codos de ancho[a], cuadrada; y el altar estaba delante de la casa[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «patio».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «delante de la casa»; en esta visión, «casa» se refiere al edificio del templo.'
