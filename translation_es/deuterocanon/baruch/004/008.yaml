translation:
  language: es
  text: Olvidaron al Dios eterno, que los alimentó; también afligieron a Jerusalén, que los crió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπελάθεσθε
  english_pob_choice: You forgot
  chosen_spanish: Olvidaste
  alternatives_spanish:
  - Descuidaste
  - Te olvidaste de
  lexicon: BDAG
  rationale: El aoristo medio de ἐπιλανθάνομαι expresa el acto de olvidar o dejar de recordar. «Olvidaste» conserva el tono directo de reproche y es natural en español.
- source_word: τὸν τροφεύσαντα
  english_pob_choice: who nourished
  chosen_spanish: que te alimentó
  alternatives_spanish:
  - que te crió
  - que te sustentó
  lexicon: LSJ
  rationale: τροφεύω abarca la idea de alimentar y criar. «Alimentó» comunica de forma clara la provisión cuidadora de Dios; el contexto de la segunda mitad del verso permite reservar «crió» para Jerusalén.
- source_word: θεὸν αἰώνιον
  english_pob_choice: the eternal God
  chosen_spanish: Yahvé, el Dios eterno
  alternatives_spanish:
  - el Dios eterno
  - el Dios perpetuo
  lexicon: LSJ
  rationale: El griego presenta a θεόν con el adjetivo αἰώνιον. Se usa «Yahvé» por la convención del proyecto para el nombre divino en hebreo, y «el Dios eterno» para conservar el atributo de duración eterna.
- source_word: ἐλυπήσατε
  english_pob_choice: you grieved
  chosen_spanish: entristeciste
  alternatives_spanish:
  - causaste dolor a
  - afligiste
  lexicon: BDAG
  rationale: λυπέω puede significar causar tristeza o dolor. «Entristeciste» mantiene el peso afectivo y el matiz relacional del verbo en un español sobrio.
- source_word: δὴ καὶ
  english_pob_choice: you also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - y también
  lexicon: LSJ
  rationale: La combinación añade énfasis e inclusión. «También» reproduce de forma compacta la fuerza aditiva en español sin sobrecargar la frase.
- source_word: τὴν ἐκθρέψασαν
  english_pob_choice: who reared
  chosen_spanish: que te crió
  alternatives_spanish:
  - que te crió y alimentó
  - que te educó
  lexicon: LSJ
  rationale: ἐκτρέφω indica criar/educar/proveer durante el crecimiento. «Crió» conserva la imagen maternal-personal de Jerusalén y distingue esta acción de «alimentó».
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: propio
  rationale: Se conserva el nombre propio según el uso español estándar y la personificación del texto.
theological_decisions:
- issue: El nombre divino en un texto griego deuterocanónico
  english_pob_reading: the eternal God
  chosen_spanish_reading: Yahvé, el Dios eterno
  alternative_spanish_readings:
  - el Dios eterno
  - el Señor eterno
  rationale: Aunque el griego dice θεόν αἰώνιον, el contexto bíblico remite al nombre divino. Conforme a la política del proyecto, se explicita «Yahvé» en lugar de ocultarlo tras un título, manteniendo a la vez la cualidad de eternidad.
  doctrine_reference: Política terminológica del proyecto sobre יהוה / YHWH
- issue: Personificación de Jerusalén como figura materna
  english_pob_reading: Jerusalem, who reared you
  chosen_spanish_reading: Jerusalén, que te crió
  alternative_spanish_readings:
  - Jerusalén, tu madre, que te crió
  - Jerusalén, que te educó
  rationale: La forma participial femenina presenta a Jerusalén como sujeto personal que ha cuidado y criado al pueblo. Se conserva la personificación sin añadir «madre», porque el griego no lo dice explícitamente.
  doctrine_reference: Philosophy of translation on preserving source imagery
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y coincide sustancialmente con el audit trail inglés: se mantiene la secuencia olvidar → Dios eterno → alimentar → entristecer → Jerusalén que cría. No se detectan variantes textuales relevantes en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se eligió «entristeciste» como equivalente sobrio de λυπέω, evitando una paráfrasis más amplia.
  - 'Se distinguieron las dos imágenes de cuidado: «alimentó» para Dios y «crió» para Jerusalén.'
  - El orden sintáctico español sigue el énfasis del original sin forzar un calco rígido.
