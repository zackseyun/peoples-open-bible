translation:
  language: es
  text: Mardoqueo le contó todo lo que le había sucedido, y la suma exacta de dinero[a] que Amán había dicho que pesaría en las tesorerías del rey para destruir a los judíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el detalle completo del dinero» o «la cantidad de dinero». El hebreo se refiere al monto específico que Amán propuso pagar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֶּד
  english_pob_choice: told
  chosen_spanish: le contó
  alternatives_spanish:
  - le dijo
  - le informó
  - le declaró
  lexicon: HALOT
  rationale: El hifil de נגד expresa hacer saber o contar. «Le contó» es natural en español y conserva el carácter narrativo sin volverlo excesivamente formal.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El pronombre dativo se refleja de forma normal en español con «le»; el referente es Hathac en el contexto inmediato.
- source_word: אֵת כָּל אֲשֶׁר קָרָהוּ
  english_pob_choice: everything that had happened to him
  chosen_spanish: todo lo que le había sucedido
  alternatives_spanish:
  - todo cuanto le había acaecido
  - todo lo que le había pasado
  lexicon: HALOT
  rationale: קָרָה con sufijo pronominal indica lo que le ocurrió o sucedió a Mardoqueo. «Le había sucedido» mantiene el sentido de acontecimiento pasado y el sufijo explícito.
- source_word: פָּרָשַׁת הַכֶּסֶף
  english_pob_choice: the exact amount of money
  chosen_spanish: el detalle exacto del dinero
  alternatives_spanish:
  - la suma exacta del dinero
  - el informe completo del dinero
  - la especificación del dinero
  lexicon: HALOT
  rationale: פָּרָשָׁה aquí no es dinero en general, sino la especificación del monto. «El detalle exacto» refleja esa precisión y evita reducirlo a una simple cantidad sin contexto.
- source_word: אָמַר ... לִשְׁקוֹל
  english_pob_choice: had said he would weigh out
  chosen_spanish: había dicho que pesaría y entregaría
  alternatives_spanish:
  - había dicho que pagaría
  - había dicho que lo entregaría
  - había dicho que lo pesaría
  lexicon: HALOT
  rationale: En español conviene conservar la imagen concreta de pesar plata. «Pesaría y entregaría» reproduce el acto económico sin sonar rígido; «entregaría» hace explícito el traslado al tesoro.
- source_word: לִשְׁקוֹל
  english_pob_choice: weigh out
  chosen_spanish: pesaría
  alternatives_spanish:
  - pesaría aparte
  - pesaría y daría
  lexicon: HALOT
  rationale: La plata se medía por peso. «Pesaría» conserva la imagen literal del hebreo; se complementa con «entregaría» para que la frase sea idiomática en español.
- source_word: עַל גִּנְזֵי הַמֶּלֶךְ
  english_pob_choice: into the king’s treasuries
  chosen_spanish: en los tesoros del rey
  alternatives_spanish:
  - en los tesoros reales
  - para los tesoros del rey
  - en las arcas del rey
  lexicon: HALOT
  rationale: גִּנְזֵי designa depósitos/tesoros reales. «Tesoros del rey» conserva el plural y comunica el ámbito administrativo del depósito mejor que una sola «arca».
- source_word: בַּיְּהוּדִים
  english_pob_choice: for the destruction of the Jews
  chosen_spanish: para destruir a los judíos
  alternatives_spanish:
  - contra los judíos
  - para la destrucción de los judíos
  lexicon: HALOT
  rationale: El hebreo enlaza con la acción hostil dirigida contra el pueblo judío. En español, la forma verbal «para destruir a los judíos» expresa la finalidad con claridad y mantiene el sufijo implícito en el siguiente infinitivo.
- source_word: לְאַבְּדָם
  english_pob_choice: for the destruction of the Jews
  chosen_spanish: para destruir a los judíos
  alternatives_spanish:
  - para aniquilarlos
  - para exterminarlos
  lexicon: HALOT
  rationale: El piel de אבד significa destruir o borrar. «Destruir» es fiel y suficientemente fuerte; «aniquilar/exterminar» serían posibles pero más intensos de lo necesario para este contexto.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; se mantiene la misma solución semántica, con ajuste natural al español para preservar la precisión de פָּרָשַׁת הַכֶּסֶף y de לִשְׁקוֹל sin perder la imagen concreta de pesar la plata.
  spanish_consistency_notes:
  - Se usa «Mardoqueo» como forma estándar del nombre propio en español.
  - Se conserva «Amán» para el nombre de Haman.
  - «Judíos» traduce בַּיְּהוּדִים/לְאַבְּדָם según el contexto hostil del verso.
  - Se evita sustituir el vocabulario económico por un término eclesiástico o interpretativo; la frase conserva la imagen de pesar plata y depositarla en los tesoros reales.
