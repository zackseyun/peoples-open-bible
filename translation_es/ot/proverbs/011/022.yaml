review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura proverbial y el sentido básico del hebreo: el contraste entre un adorno precioso y un animal impropio, aplicado a una mujer hermosa sin discernimiento. Sin embargo, el anclaje de la nota al pie en «hermosa[a]» no corresponde al elemento realmente alternativo del original, que es נֶזֶם («aro/anillo», con posibilidad de «aro nasal»), no יָפָה («hermosa»). También conviene ajustar levemente la puntuación para una forma más natural en español.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Cerdo», «hocico», «mujer hermosa» y «carece de discreción» funcionan bien para una audiencia bíblica amplia. La frase introductoria «Como…» es correcta, pero sin «así es» suena más proverbial y fluida en español. El principal problema es técnico-editorial: la nota está mal anclada.'
  glossary_alignment: 'No hay conflictos con la terminología del proyecto. Las decisiones léxicas son en general sólidas: «cerdo» por חֲזִיר, «hocico» por אַף en contexto animal, y «discreción» por טָעַם en sentido sapiencial son adecuadas. «Aro» es aceptable para נֶזֶם, aunque la alternativa «aro nasal» debe quedar ligada al sustantivo del adorno, no a «hermosa».'
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «hermosa[a]», pero la alternativa documentada afecta a «aro»/נֶזֶם.
    rationale: El inglés POB preserva la alternativa «gold nose ring», que corresponde al tipo de adorno, no al adjetivo de la mujer. Mantener el anclaje actual distorsiona la justificación léxica y puede confundir al lector.
  - severity: low
    issue: La construcción «así es» es innecesaria y algo más pesada de lo necesario en español proverbial.
    rationale: El hebreo es nominal y sentencioso. En español, «Como X..., una mujer...» conserva mejor la concisión proverbial sin alterar el sentido.
  revised_spanish_text: Como un aro[a] de oro en el hocico de un cerdo, una mujer hermosa que carece de discreción.
  revised_footnotes:
  - marker: a
    text: 'O: «Como un aro nasal de oro en el hocico de un cerdo, una mujer hermosa sin buen sentido»'
    reason: alternative_reading
  revision_rationale: Se reubica la nota al pie para que ancle correctamente la alternativa léxica de נֶזֶם («aro nasal»), y se simplifica la sintaxis para una formulación más natural y proverbial en español, sin cambiar el sentido.
