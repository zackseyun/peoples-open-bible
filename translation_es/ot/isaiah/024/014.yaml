translation:
  language: es
  text: Ellos levantan su voz; gritan de gozo. Ante la majestad de Yahvé, aclaman desde el mar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el occidente» o «desde las costas»; en poesía profética, «desde el mar» puede tener un sentido geográfico.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - Aquellos
  - Ellos mismos
  lexicon: HALOT
  rationale: El pronombre independiente plural se conserva con un sujeto explícito y natural en español. «Ellos» mantiene el énfasis sin sobretraducción.
- source_word: יִשְׂאוּ קוֹלָם
  english_pob_choice: lift up their voice
  chosen_spanish: levantan su voz
  alternatives_spanish:
  - alzan su voz
  - levantan la voz
  lexicon: HALOT
  rationale: El modismo hebreo נשׂא קול se refleja en español con «levantar/alzar la voz». «Su voz» respeta el singular colectivo de קוֹל con sufijo plural.
- source_word: יָרֹנּוּ
  english_pob_choice: shout for joy
  chosen_spanish: gritan de gozo
  alternatives_spanish:
  - cantan de gozo
  - claman de júbilo
  lexicon: HALOT
  rationale: רנן expresa exultación sonora; «gritan de gozo» conserva el vigor vocal y la alegría jubilosa sin forzar un matiz específicamente musical.
- source_word: בִּגְאוֹן
  english_pob_choice: At the majesty of
  chosen_spanish: A la majestad de
  alternatives_spanish:
  - Ante la majestad de
  - En la majestad de
  lexicon: HALOT
  rationale: גאון aquí denota exaltada majestad. La preposición ב se vierte con una relación locutiva/relacional breve («a la/ante la»), evitando añadir una causalidad explícita que el hebreo no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton con la forma española de uso amplio «Yahvé», coherente con la norma del proyecto y más natural en español que un título sustitutivo.
- source_word: צָהֲלוּ
  english_pob_choice: cry aloud
  chosen_spanish: aclaman
  alternatives_spanish:
  - gritan
  - claman
  lexicon: HALOT
  rationale: El verbo comunica júbilo sonoro y vigoroso; «aclaman» preserva el carácter festivo y la intensidad vocal sin duplicar exactamente el verbo anterior.
- source_word: מִיָּם
  english_pob_choice: from the sea
  chosen_spanish: desde el mar
  alternatives_spanish:
  - desde el mar
  - desde el occidente
  - desde las costas
  lexicon: HALOT
  rationale: Se conserva el sentido léxico directo de ים como «mar» en el texto principal. Las posibles lecturas geográficas se documentan en nota, como lo hace el audit trail inglés.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El verso contiene el Tetragrámaton. El proyecto pide traducirlo como «Yahvé» en el texto principal, preservando el nombre personal del Dios de Israel en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «Because of» a «At» para evitar una causalidad no explícita; por eso el español usa «A la» / «Ante la» en lugar de una causalidad añadida. Se conserva además el valor directo de «from the sea» con nota de alternativa geográfica, siguiendo el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino, conforme a la terminología del proyecto.
  - «gritan de gozo» / «aclaman» evita redundancia semántica y reproduce la doble expresión jubilosa del hebreo.
  - La nota de pie de página marca la ambigüedad de מִיָּם sin desplazar el sentido literal del texto principal.
  - El registro evita calcos rígidos y mantiene un español bíblico claro y publicable.
