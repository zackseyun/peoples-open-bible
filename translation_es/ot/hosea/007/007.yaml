    issue: «Ninguno entre ellos clama a mí» suena algo rígido en español natural.
    rationale: Aunque es fiel, la estructura con «ninguno» + verbo singular es menos idiomática aquí que «Nadie entre ellos clama a mí» o «No hay entre ellos quien clame a mí». Una leve mejora de fluidez beneficia la legibilidad sin alterar el sentido.
  - severity: low
