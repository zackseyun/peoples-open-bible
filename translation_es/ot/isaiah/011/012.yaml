translation:
  language: es
  text: Él alzará una bandera para las naciones[a], y reunirá a los desterrados de Israel[b]; reunirá a los dispersos de Judá[c] desde los cuatro confines de la tierra[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señal» o «estandarte».
    reason: lexical_alternative
  - marker: b
    text: O «los expulsados de Israel»; el hebreo también puede entenderse como los que fueron arrojados o apartados.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «los dispersos de Judá» en plural femenino; aquí se entiende colectivamente del pueblo de Judá, no específicamente de mujeres.'
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «de las cuatro alas de la tierra», un modismo para los extremos más lejanos de la tierra.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָשָׂא
  english_pob_choice: he will raise
  chosen_spanish: alzará
  alternatives_spanish:
  - levantará
  - erigirá
  lexicon: HALOT
  rationale: נָשָׂא con נֵס expresa alzar o levantar una señal visible. «Alzará» es natural en español y conserva la acción pública y elevada del signo.
- source_word: נֵס
  english_pob_choice: banner
  chosen_spanish: bandera
  alternatives_spanish:
  - estandarte
  - señal
  lexicon: HALOT
  rationale: נֵס designa una señal levantada o estandarte. «Bandera» comunica bien la imagen de convocatoria visible y es comprensible en español moderno; «estandarte» sería más formal, pero menos natural aquí.
- source_word: לַגּוֹיִם
  english_pob_choice: for the nations
  chosen_spanish: para las naciones
  alternatives_spanish:
  - a las naciones
  - para los pueblos
  lexicon: HALOT
  rationale: El ל puede expresar destino o propósito. «Para las naciones» mantiene la idea de un estandarte dispuesto en favor/de cara a ellas, como señal de reunión.
- source_word: וְאָסַף
  english_pob_choice: and gather
  chosen_spanish: y reunirá
  alternatives_spanish:
  - y recogerá
  - y congregará
  lexicon: HALOT
  rationale: אָסַף en contextos de restauración expresa reunir de nuevo. «Reunirá» es idiomático y fiel al sentido de restablecimiento comunitario.
- source_word: נִדְחֵי יִשְׂרָאֵל
  english_pob_choice: the banished of Israel
  chosen_spanish: los desterrados de Israel
  alternatives_spanish:
  - los expulsados de Israel
  - los dispersos de Israel
  - los exiliados de Israel
  lexicon: HALOT
  rationale: נִדְחֵי comunica personas arrojadas lejos o expulsadas. «Desterrados» preserva ese empuje de expulsión y funciona bien en español bíblico contemporáneo.
- source_word: וּנְפֻצוֹת יְהוּדָה
  english_pob_choice: the scattered of Judah
  chosen_spanish: los dispersos de Judá
  alternatives_spanish:
  - las dispersas de Judá
  - los esparcidos de Judá
  - los diseminados de Judá
  lexicon: HALOT
  rationale: 'El sustantivo femenino plural hebreo se usa de modo colectivo para Judá. Siguiendo la revisión del POB inglés, en español conviene no convertirlo en «mujeres», sino mantener un plural colectivo natural: «los dispersos de Judá».'
- source_word: יְקַבֵּץ
  english_pob_choice: he will assemble
  chosen_spanish: juntará
  alternatives_spanish:
  - reunirá
  - congregará
  - agrupará
  lexicon: HALOT
  rationale: קבץ refuerza la idea de poner juntos a los reunidos. «Juntará» evita una repetición demasiado mecánica de «reunirá» y refleja bien el movimiento de consolidación.
- source_word: מֵאַרְבַּע כַּנְפוֹת הָאָרֶץ
  english_pob_choice: from the four corners of the earth
  chosen_spanish: desde los cuatro confines de la tierra
  alternatives_spanish:
  - desde los cuatro rincones de la tierra
  - desde los cuatro extremos de la tierra
  - desde los cuatro puntos de la tierra
  lexicon: HALOT
  rationale: כַּנְפוֹת literalmente son «alas» o «extremos». «Confines» transmite el idiomatismo de los extremos más lejanos sin sugerir una cosmología literalista.
theological_decisions:
- issue: Lectura del femenino plural en וּנְפֻצוֹת יְהוּדָה
  english_pob_reading: The revised English audit trail removed 'women' and settled on 'the scattered of Judah' to preserve the feminine morphology without over-specifying females.
  chosen_spanish_reading: los dispersos de Judá
  alternative_spanish_readings:
  - las dispersas de Judá
  - los dispersados de Judá
  - los esparcidos de Judá
  rationale: El hebreo usa un femenino plural colectivo, pero el referente es Judá como pueblo. En español, «los dispersos de Judá» conserva el carácter colectivo y evita una lectura biológica o de género que el contexto no exige. También sigue la revisión auditada del POB inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'the scattered women of Judah' a 'the scattered of Judah' para evitar sobredeterminar el femenino hebreo. La redacción española adopta esa revisión y la vuelve idiomática sin perder la forma colectiva ni la imagen de restauración global. También conserva la tensión lexical entre 'desterrados' y 'dispersos', y entre 'bandera' y 'señal/estandarte', documentando alternativas sin apagarlas.
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo.
  - 'Se mantiene el paralelismo verbal con dos verbos de reunión: «reunirá» y «juntará».'
  - «Tierra» se usa en sentido de ámbito global, coherente con «los cuatro confines de la tierra».
  - La puntuación separa las dos acciones principales con punto y coma, siguiendo la cadencia del hebreo y del POB inglés.
