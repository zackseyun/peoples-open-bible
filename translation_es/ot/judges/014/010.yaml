translation:
  language: es
  text: Entonces su padre bajó a la mujer, y Sansón hizo allí un banquete[a], porque así lo hacían los jóvenes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un festín' o 'una comida festiva con bebida'. El hebreo מִשְׁתֶּה suele referirse a una comida celebrativa que incluye bebida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - fue hacia abajo
  lexicon: HALOT
  rationale: El hebreo ירד conserva el matiz espacial de descenso. En español, 'bajó' comunica de forma natural esa dirección narrativa sin perder el sentido literal.
- source_word: אָבִיהוּ
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de él
  - su progenitor
  lexicon: HALOT
  rationale: El sufijo pronominal es masculino singular y, por el contexto, se refiere a Sansón; 'su padre' es la forma natural en español y preserva la relación posesiva.
- source_word: אֶל הָאִשָּׁה
  english_pob_choice: to the woman
  chosen_spanish: a la mujer
  alternatives_spanish:
  - hacia la mujer
  - a la joven
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'a la mujer'. Se mantiene esa referencia sin especificar 'esposa' o 'novia', porque el texto base no lo dice aquí.
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - celebró
  - preparó
  - organizó
  lexicon: HALOT
  rationale: עשה es amplio ('hacer'). Con מִשְׁתֶּה, 'hizo un banquete' conserva la cercanía al hebreo; en español, 'hizo un banquete' sigue siendo comprensible y menos interpretativo que 'celebró' o 'organizó'.
- source_word: מִשְׁתֶּה
  english_pob_choice: a feast
  chosen_spanish: un banquete
  alternatives_spanish:
  - una fiesta
  - un festín
  - un banquete con bebida
  lexicon: HALOT
  rationale: מִשְׁתֶּה puede referirse a una comida celebrativa con bebida. 'Banquete' es una opción digna y suficientemente amplia; evita reducirlo sólo a comida o añadir 'con bebida' sin necesidad en el texto principal.
- source_word: כִּי כֵּן יַעֲשׂוּ הַבַּחוּרִים
  english_pob_choice: for that is what the young men did
  chosen_spanish: porque así lo hacían los jóvenes
  alternatives_spanish:
  - pues eso hacían los jóvenes
  - porque eso hacían los muchachos
  - ya que así hacían los jóvenes
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa hábito o costumbre. 'Así lo hacían' preserva ese valor habitual de manera directa y formal en español.
- source_word: הַבַּחוּרִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los solteros
  - los mozos
  lexicon: HALOT
  rationale: בָּחוּר apunta a un joven en la plenitud de la edad. 'Los jóvenes' es natural, neutral y suficientemente preciso en este contexto de celebración nupcial.
translation_notes:
  revision_awareness: La redacción española sigue de cerca la última revisión del POB inglés, que sustituyó 'used to do' por 'did' para reflejar de manera más directa e formal el imperfecto hebreo, manteniendo el sentido de costumbre. Por eso se usa 'hacían' sin añadir una perífrasis explicativa en el cuerpo del texto.
  spanish_consistency_notes:
  - Se conserva 'Sansón' para שִׁמְשׁוֹן conforme al nombre propio estándar.
  - Se evita 'SEÑOR' u otra sustitución innecesaria porque no aparece el Tetragrámaton en este versículo.
  - La nota de pie marca la ambigüedad lexical de מִשְׁתֶּה sin sobrecargar el texto principal.
  - El registro es formal y bíblico, pero con sintaxis española natural.
