    reason: lexical_alternative
  - marker: d
    text: Hebreo simplemente «que juré»; «dar» se sobreentiende por el contexto y el lenguaje del pacto en pasajes paralelos.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la redacción para que suene más natural en español sin perder la forma y fuerza del hebreo: se mejora la cláusula sobre la preservación del cántico «de boca de su descendencia», se usa una formulación forense más idiomática («dará testimonio»), y se restauran todas las alternativas significativas conservadas por el POB inglés mediante notas correctamente ancladas. No hace falta adjudicación adicional, porque los cambios son de fidelidad y estilo, no de alta incertidumbre textual o doctrinal.'
