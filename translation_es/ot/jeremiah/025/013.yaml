translation:
  language: es
  text: Y traeré sobre aquella tierra todas mis palabras que he hablado contra ella, todo lo que está escrito en este libro[a][b], que Jeremías profetizó contra todas las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rollo». El hebreo puede referirse tanto a un libro como a un rollo escrito.
    reason: lexical_alternative
  - marker: b
    text: O «acerca de todas las naciones». El hebreo permite un sentido más amplio de la preposición, aunque aquí el contexto favorece «contra».
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵבֵאתִי
  english_pob_choice: And I will bring
  chosen_spanish: Y traeré
  alternatives_spanish:
  - Y haré venir
  - Y traeré sobre
  lexicon: HALOT
  rationale: El hiphil de בוא expresa causar que algo venga o suceda. En español, «traeré» comunica de manera natural la idea de hacer venir sobre el destinatario el juicio anunciado, sin perder la fuerza verbal del original.
- source_word: עַל הָאָרֶץ הַהִיא
  english_pob_choice: upon that land
  chosen_spanish: sobre aquella tierra
  alternatives_spanish:
  - contra aquella tierra
  - sobre esa tierra
  lexicon: HALOT
  rationale: אֶרֶץ aquí designa una entidad territorial, por eso «tierra» es más preciso que «mundo». «Sobre» conserva el valor de עַל en el contexto de juicio inminente; «contra» es posible, pero «sobre» deja que el contexto judicial haga la carga adversativa.
- source_word: אֶת כָּל דְּבָרַי
  english_pob_choice: all my words
  chosen_spanish: todas mis palabras
  alternatives_spanish:
  - todas mis declaraciones
  - todas mis palabras habladas
  lexicon: HALOT
  rationale: Se conserva «palabras» para mantener la relación entre lo dicho por Yahvé y su cumplimiento. En profecía, abarca tanto anuncio como sentencia, sin necesidad de explicitar más de lo que el hebreo dice.
- source_word: אֲשֶׁר דִּבַּרְתִּי עָלֶיהָ
  english_pob_choice: that I have spoken against it
  chosen_spanish: que he hablado contra ella
  alternatives_spanish:
  - que hablé contra ella
  - que he dicho contra ella
  lexicon: HALOT
  rationale: «He hablado» reproduce bien el perfecto con valor de discurso previo que ahora se cumple. «Contra ella» refleja el matiz hostil/judicial de עַל en este contexto.
- source_word: אֵת כָּל הַכָּתוּב
  english_pob_choice: all that is written
  chosen_spanish: todo lo que está escrito
  alternatives_spanish:
  - todo cuanto está escrito
  - toda la escritura
  lexicon: HALOT
  rationale: La construcción apunta a la totalidad del contenido escrito. «Todo lo que está escrito» es idiomático en español y mantiene la amplitud del hebreo.
- source_word: בַּסֵּפֶר הַזֶּה
  english_pob_choice: in this book
  chosen_spanish: en este libro
  alternatives_spanish:
  - en este rollo
  - en este escrito
  lexicon: HALOT
  rationale: סֵפֶר puede significar libro o rollo. «Libro» es el equivalente más natural y claro en español moderno; no se impone «rollo» porque el sentido no depende del soporte material.
- source_word: אֲשֶׁר נִבָּא יִרְמְיָהוּ
  english_pob_choice: which Jeremiah prophesied
  chosen_spanish: que Jeremías profetizó
  alternatives_spanish:
  - que Jeremías anunció como profeta
  - que fue profetizado por Jeremías
  lexicon: HALOT
  rationale: Se mantiene la forma activa con Jeremías como sujeto, que es la lectura más directa del hebreo. «Profetizó» conserva el valor verbal de נבא sin añadir perífrasis innecesarias.
- source_word: עַל כָּל הַגּוֹיִם
  english_pob_choice: against all the nations
  chosen_spanish: contra todas las naciones
  alternatives_spanish:
  - acerca de todas las naciones
  - sobre todas las naciones
  lexicon: HALOT
  rationale: Aunque עַל con נבא puede ser más amplio, aquí el contexto literario de los oráculos de juicio favorece el matiz adversativo. «Naciones» traduce correctamente הַגּוֹיִם y mantiene el plural étnico-político del original.
theological_decisions:
- issue: Matiz de עַל con נבא en la cláusula final
  english_pob_reading: against all the nations
  chosen_spanish_reading: contra todas las naciones
  alternative_spanish_readings:
  - acerca de todas las naciones
  - sobre todas las naciones
  rationale: Se conserva la tensión semántica del hebreo reconociendo que עַל con נבא puede ser más amplio que «contra». Sin embargo, el marco inmediato de Jeremías 46–51 son oráculos de juicio, por lo que el matiz adversativo es el mejor reflejo del sentido contextual sin convertirlo en una interpretación doctrinal adicional.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo masorético (WLC) y se corroboró el criterio del POB en inglés: mantener la referencia territorial («tierra»), el alcance total («todas mis palabras» / «todo lo que está escrito») y el valor judicial de la preposición final. No se detectaron revisiones posteriores que alteren el sentido base; la redacción española conserva la misma lectura auditada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el POB español cuando aparezca el tetragrámaton; en este versículo no aparece el nombre divino explícito, aunque la primera persona divina se conserva naturalmente.
  - Se prefiere «naciones» para גוֹיִם, en línea con el registro bíblico estándar y con el contexto internacional de los oráculos.
  - Se mantiene «libro» como equivalente funcional de סֵפֶר, con nota alternativa para «rollo» por fidelidad lexical.
  - La puntuación con coma y separación refleja la estructura del hebreo y la solución auditada en inglés, sin añadir interpretación extra.
