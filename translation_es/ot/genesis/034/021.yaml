  text: הָ/אֲנָשִׁ֨ים הָ/אֵ֜לֶּה שְֽׁלֵמִ֧ים הֵ֣ם אִתָּ֗/נוּ וְ/יֵשְׁב֤וּ בָ/אָ֨רֶץ֙ וְ/יִסְחֲר֣וּ אֹתָ֔/הּ וְ/הָ/אָ֛רֶץ הִנֵּ֥ה רַֽחֲבַת יָדַ֖יִם לִ/פְנֵי/הֶ֑ם אֶת בְּנֹתָ/ם֙ נִקַּֽח לָ֣/נוּ לְ/נָשִׁ֔ים וְ/אֶת בְּנֹתֵ֖י/נוּ נִתֵּ֥ן לָ/הֶֽם־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/034/021.yaml
  text: These men are at peace with us[a]. Let them dwell in the land and trade in it, for behold, the land is wide enough before them. We will take their daughters for ourselves as wives[d][c][b], and we will give our daughters to them.
  footnotes:
  - marker: a
    text: Or 'friendly with us' / 'on good terms with us' for שְׁלֵמִים.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the land—look—is broad of hands before them,' an idiom meaning the land is spacious or has ample room for them.
    reason: cultural_note
  - marker: c
    text: Or 'trade through it'; the Hebrew may denote commercial activity within the land or through its territory.
    reason: lexical_alternative
  - marker: d
    text: Or 'for look, the land'.
    reason: previous_rendering
