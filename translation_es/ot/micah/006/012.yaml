translation:
  language: es
  text: cuyos hombres ricos están llenos de violencia[a], y sus habitantes dicen mentiras; su lengua es engañosa en su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su lengua es engaño en su boca». La traducción vierte el giro como «su lengua es engañosa en su boca» para un español natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: whose
  chosen_spanish: cuyos
  alternatives_spanish:
  - de quienes
  - cuyo
  lexicon: HALOT
  rationale: El relativo introduce la relación posesiva con la ciudad aludida; «cuyos» conserva esa función y suena natural en español, manteniendo el vínculo con los sustantivos siguientes.
- source_word: עֲשִׁירֶיהָ
  english_pob_choice: her rich men
  chosen_spanish: hombres ricos
  alternatives_spanish:
  - ricos
  - personas ricas
  lexicon: HALOT
  rationale: La forma masculina plural con sufijo femenino apunta a los élites masculinos representativos de la ciudad. «Hombres ricos» conserva el valor social y el género gramatical del hebreo mejor que una expresión neutralizada.
- source_word: מָלְאוּ חָמָס
  english_pob_choice: are full of violence
  chosen_spanish: están llenos de violencia
  alternatives_spanish:
  - se han llenado de violencia
  - están colmados de violencia
  lexicon: HALOT
  rationale: El hebreo expresa un estado resultante; «están llenos de violencia» reproduce bien ese valor sin forzar un calco poco natural. «Violencia» es la equivalencia directa de חָמָס en este contexto de opresión y abuso.
- source_word: וְיֹשְׁבֶיהָ
  english_pob_choice: and her inhabitants
  chosen_spanish: y sus habitantes
  alternatives_spanish:
  - y los que habitan en ella
  - y sus residentes
  lexicon: HALOT
  rationale: «Habitantes» es la manera más natural de conservar el sentido colectivo del participio sustantivado. El posesivo «sus» retiene la referencia a la ciudad implícita en el contexto.
- source_word: דִּבְּרוּ שָׁקֶר
  english_pob_choice: speak lies
  chosen_spanish: hablan mentira
  alternatives_spanish:
  - dicen mentiras
  - hablan falsedad
  lexicon: HALOT
  rationale: Aunque el hebreo está en perfecto, el contexto profético describe conducta característica; el presente español comunica mejor esa acusación continua. «Mentira» mantiene la concisión y la fuerza del hebreo sin volverlo abstracto.
- source_word: וּלְשׁוֹנָם רְמִיָּה
  english_pob_choice: their tongue is deceitful
  chosen_spanish: su lengua es engañosa
  alternatives_spanish:
  - su lengua es fraude
  - su lengua es tramposa
  lexicon: HALOT
  rationale: רְמִיָּה denota engaño, fraude o traición. En español, «engañosa» conserva el valor predicativo y la metáfora de la lengua como instrumento de engaño mejor que una traducción demasiado literal o rígida.
- source_word: בְּפִי/הֶם
  english_pob_choice: in their mouth
  chosen_spanish: en su boca
  alternatives_spanish:
  - en sus bocas
  - dentro de su boca
  lexicon: HALOT
  rationale: El singular colectivo «boca» conserva la imagen concreta del hebreo, que usa singular con sufijo plural. En español, «en su boca» mantiene esa fuerza idiomática con naturalidad.
theological_decisions:
- issue: Caracterización moral de la ciudad y sus élites
  english_pob_reading: A prophetic accusation against the city's rich men, inhabitants, and speech habits.
  chosen_spanish_reading: Una acusación profética contra los hombres ricos, los habitantes y el habla de la ciudad.
  alternative_spanish_readings:
  - Una descripción general de corrupción social
  - Una crítica solo económica a los ricos
  rationale: 'El versículo reúne tres rasgos: riqueza violenta, mentira pública y lengua engañosa. La traducción mantiene ese alcance acusatorio sin reducirlo a un solo ámbito moral o social.'
  doctrine_reference: Ética profética; juicio divino sobre la injusticia social y la falsedad
translation_notes:
  revision_awareness: No se aplicaron revisiones previas; el estado más reciente indica que el texto inglés quedó sin cambios y con alta concordancia con la fuente hebrea.
  spanish_consistency_notes:
  - Se mantuvo «violencia» para חָמָס conforme al uso punitivo/social del término en el contexto.
  - Se prefirió «lengua» y «boca» para conservar la imagen corporal del hebreo.
  - Se eligió un presente de carácter gnómico/profético («están», «hablan», «es») para reflejar una acusación vigente y no solo hechos pasados.
