review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del hebreo: mandato de colocar la red debajo del karkov del altar por la parte inferior, y descripción de su extensión hasta la mitad del altar. Sin embargo, omite el pronombre objeto explícito en el texto corrido («la»), introduce marcadores de nota defectuosos sin notas correspondientes, y no preserva la alternativa léxica documentada para כַּרְכֹּב ni la nota de literalidad sobre la segunda cláusula.'
  spanish_quality_summary: 'El español es generalmente claro, pero la redacción actual tiene problemas formales: «Y pondrás[ a] [b]» está mal espaciado y deja el verbo sin objeto expreso, lo que suena truncado en español. «por la parte de abajo» es comprensible, aunque «desde abajo» o «por debajo» es más limpio. «la red llegará» es aceptable, pero «se extenderá» refleja mejor el matiz de extensión estructural y armoniza con la auditoría inglesa.'
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. Para כַּרְכֹּב, «borde» puede funcionar, pero conviene conservar en nota la alternativa «reborde» para reflejar el valor de saliente/marco proyectado documentado en el POB. El resto («altar», «red») está alineado.
  issues:
  - severity: high
    issue: Marcadores de notas en el texto sin notas correspondientes y con formato incorrecto
    rationale: El texto contiene «[ a] [b]», pero el arreglo de footnotes está vacío. Esto incumple explícitamente la disciplina de salida requerida y deja el texto defectuoso.
  - severity: medium
    issue: Falta el objeto directo explícito después de «pondrás»
    rationale: El hebreo incluye אֹתָהּ, y las propias decisiones léxicas del borrador reconocen «la». En español, «Y la pondrás...» es más fiel y natural que dejar el verbo sin complemento.
  - severity: medium
    issue: No se preservan las notas léxicas/auditadas relevantes del inglés
    rationale: El inglés conserva una alternativa para «ledge/rim» y una nota literal sobre «and the net shall be unto the middle of the altar». Deben mantenerse en español porque son significativas y no generan sobrecarga.
  - severity: low
    issue: «Llegará» es menos preciso que «se extenderá» en contexto arquitectónico
    rationale: Aunque no es incorrecto, «se extenderá» comunica mejor la idea de extensión de la red a lo largo del altar, en línea con la revisión inglesa auditada.
  revised_spanish_text: Y la pondrás debajo del borde[a] del altar, por debajo, y la red se extenderá hasta la mitad del altar.[b]
  revised_footnotes:
  - marker: a
    text: O «reborde», para «borde» (heb. karkov), refiriéndose a un borde o marco saliente del altar.
    reason: lexical_alternative
  - marker: b
    text: Lit., «y la red será hasta la mitad del altar».
    reason: lexical_alternative
  revision_rationale: Se corrige el español para incluir el pronombre objeto explícito («la»), se eliminan los marcadores defectuosos y se restauran correctamente las notas necesarias. Se ajusta «por la parte de abajo» a «por debajo» para mayor naturalidad y se cambia «llegará» por «se extenderá» para reflejar mejor la extensión física de la red. Se mantienen «borde» y «mitad del altar» como redacción principal, con notas que preservan las alternativas y la literalidad auditadas.
