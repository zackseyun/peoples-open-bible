translation:
  language: es
  text: Tú rescataste a los tres compañeros en Babilonia, que voluntariamente entregaron su vida al fuego para no adorar cosas vacías[b]; después de enfriar el horno abrasador, los libraste a todos sin daño[a], y enviaste una llama contra todos sus adversarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «a todos hasta un cabello», es decir, sin perder ni un cabello.
    reason: lexical_alternative
  - marker: b
    text: «Cosas vacías» traduce con mayor literalidad τοῖς κενοῖς; puede entenderse como objetos de culto falso, o más interpretativamente como ídolos.
    reason: alternative_reading
lexical_decisions:
- source_word: ἑταίρους
  english_pob_choice: companions
  chosen_spanish: compañeros
  alternatives_spanish:
  - amigos
  - camaradas
  lexicon: LSJ
  rationale: ἑταῖρος designa un asociado o compañero. «Compañeros» conserva el vínculo narrativo con los tres jóvenes sin sobreinterpretar el término.
- source_word: κατὰ τὴν Βαβυλωνίαν
  english_pob_choice: in Babylonia
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en la región de Babilonia
  - por Babilonia
  lexicon: LSJ
  rationale: La frase ubica geográficamente la acción. «En Babilonia» es natural en español y fiel al valor locativo.
- source_word: πυρὶ τὴν ψυχὴν αὐθαιρέτως δεδωκότας
  english_pob_choice: had willingly given up their lives to the fire
  chosen_spanish: que voluntariamente entregaron su vida al fuego
  alternatives_spanish:
  - que libremente entregaron su alma al fuego
  - que se habían entregado al fuego voluntariamente
  lexicon: LSJ
  rationale: El griego combina voluntariedad con entrega de la ψυχή a la acción del fuego. «Vida» expresa de modo idiomático el sentido de autoexposición a la muerte mejor que «alma» en este contexto.
- source_word: τοῖς κενοῖς
  english_pob_choice: empty things
  chosen_spanish: cosas vacías
  alternatives_spanish:
  - cosas vanas
  - ídolos
  lexicon: LSJ
  rationale: Se conserva el matiz literal de κενοῖς como «vacíos/empty», en lugar de explicitar interpretativamente «ídolos». «Cosas vacías» mantiene la fuerza polémica del griego.
- source_word: διάπυρον ... κάμινον
  english_pob_choice: the blazing furnace
  chosen_spanish: el horno abrasador
  alternatives_spanish:
  - el horno encendido al rojo vivo
  - el horno intensamente ardiente
  lexicon: LSJ
  rationale: διάπυρος intensifica el calor del horno. «Abrasador» comunica con naturalidad en español la idea de un calor extremo y conserva la imagen.
- source_word: δροσίσας
  english_pob_choice: after cooling
  chosen_spanish: después de enfriar
  alternatives_spanish:
  - habiendo refrescado
  - tras enfriar
  lexicon: LSJ
  rationale: El participio expresa una acción previa de alivio/coolness. «Después de enfriar» sigue de cerca la secuencia verbal y suena natural en español.
- source_word: ἐρρύσω μέχρι τριχὸς ἁπάντων
  english_pob_choice: you delivered them all unharmed
  chosen_spanish: los libraste a todos sin daño
  alternatives_spanish:
  - los libraste a todos sin perder ni un cabello
  - los salvaste a todos sin que se les cayera un cabello
  lexicon: LSJ
  rationale: El modismo μέχρι τριχός significa preservación completa, literalmente «hasta un cabello». «Sin daño» transmite el valor idiomático con claridad; la alternativa literal se conserva como posible matiz.
- source_word: φλόγα πᾶσιν ἐπιπέμψας τοῖς ὑπεναντίοις
  english_pob_choice: and sent a flame upon all their adversaries
  chosen_spanish: y enviaste una llama contra todos sus adversarios
  alternatives_spanish:
  - y lanzaste una llama sobre todos sus adversarios
  - y mandaste fuego contra todos los que se oponían
  lexicon: LSJ
  rationale: φλόγα es «llama» y ὑπεναντίοις son adversarios u opositores. «Contra» conserva el matiz hostil de ἐπιπέμψας sin perder naturalidad en español.
theological_decisions:
- issue: Alusión a los tres jóvenes en el horno
  english_pob_reading: Retain the allusion without importing their names or expanding the narrative.
  chosen_spanish_reading: Mantener la alusión sin introducir nombres propios ni ampliar el relato.
  alternative_spanish_readings:
  - Identificar explícitamente a Ananías, Azarías y Misael
  - usar «tres jóvenes» para eco más directo de Daniel
  rationale: El texto griego dice «tres compañeros» y presupone que el lector reconoce la historia. La traducción preserva ese carácter alusivo en vez de armonizarlo con relatos más completos.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de τοῖς κενοῖς
  english_pob_reading: Translate literally as 'empty things' rather than interpretively as 'idols.'
  chosen_spanish_reading: Traducir literalmente como «cosas vacías» en vez de explicitar «ídolos».
  alternative_spanish_readings:
  - ídolos
  - cosas vanas
  rationale: La expresión griega caracteriza los objetos de culto falso como vacíos. «Cosas vacías» conserva esa formulación y evita cerrar demasiado pronto la ambigüedad del término.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail, que ajustó la relación de πυρί con δεδωκότας para reflejar más directamente «to the fire». La versión española adopta «al fuego» para mantener esa relación sin añadir una preposición direccional excesiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantiene «compañeros» para ἑταίρους, coherente con el audit trail inglés.
  - Se preserva la literalidad de τοῖς κενοῖς mediante «cosas vacías», evitando el término más interpretativo «ídolos».
  - «Horno abrasador» refleja el intensificador de διάπυρον con español natural.
  - El modismo de preservación total se expresa como «sin daño», con nota literal de «sin perder ni un cabello».
