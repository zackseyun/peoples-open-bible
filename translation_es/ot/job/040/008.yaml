translation:
  language: es
  text: ¿Acaso anularías mi justicia[a]? ¿Me condenarías para que seas justificado?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi juicio». El hebreo mishpati puede denotar juicio, justicia o derecho legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאַף
  english_pob_choice: Would you even
  chosen_spanish: ¿Acaso tú también... ?
  alternatives_spanish:
  - ¿Acaso... ?
  - ¿Tú incluso... ?
  - ¿También... ?
  lexicon: HALOT
  rationale: La partícula interrogativa intensifica la reprensión. «Acaso» reproduce bien la sorpresa retórica; «también» comunica el valor enfático de אַף sin volver la frase artificial.
- source_word: תָּפֵר
  english_pob_choice: annul
  chosen_spanish: anularías
  alternatives_spanish:
  - invalidarías
  - romperías
  - frustrarías
  lexicon: HALOT
  rationale: En un contexto judicial, «anular» conserva la idea de dejar sin efecto un fallo o derecho. Es más natural que «romper» y mantiene el peso forense del verbo.
- source_word: מִשְׁפָּטִי
  english_pob_choice: my justice
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi juicio
  - mi sentencia
  - mi derecho legal
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar juicio, justicia o derecho legal. Aquí el contexto apunta a la justicia/orden justo de Dios, no solo a una sentencia puntual; por eso «mi justicia» sigue mejor la amplitud semántica del hebreo. Se conserva la alternativa «mi juicio» en nota.
- source_word: תַּרְשִׁיעֵנִי
  english_pob_choice: condemn me
  chosen_spanish: me condenarías
  alternatives_spanish:
  - me declararías culpable
  - me declararías impío
  - me sentenciarías como culpable
  lexicon: HALOT
  rationale: El verbo en Hiphil tiene sentido forense de declarar culpable o condenar. «Condenarías» es idiomático en español y mantiene el ambiente judicial del versículo.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - con el fin de que
  - de modo que
  lexicon: HALOT
  rationale: La preposición introduce finalidad o resultado. «Para que» expresa con claridad el motivo acusatorio del verso.
- source_word: תִּצְדָּק
  english_pob_choice: you may be justified
  chosen_spanish: tú quedaras justificado
  alternatives_spanish:
  - tú fueras justificado
  - tú resultaras justo
  - tú quedaras en lo correcto
  lexicon: HALOT
  rationale: En este marco forense, צדק apunta a quedar justificado o resultar en lo correcto. «Quedar justificado» preserva el contraste con «condenar» y suena natural en español.
theological_decisions:
- issue: Lenguaje forense y tensión teológica del versículo
  english_pob_reading: 'The verse is rendered in judicial language: ''annul my justice ... condemn me ... be justified.'''
  chosen_spanish_reading: 'El versículo se vierte en lenguaje judicial: «anularías mi justicia ... me condenarías ... quedaras justificado».'
  alternative_spanish_readings:
  - «desacreditarías mi justicia ... me harías culpable ... resultaras justo»
  - «anularías mi juicio ... me declararías culpable ... quedaras en lo correcto»
  rationale: El hebreo usa vocabulario claramente forense (משפט, רשע, צדק). Mantener ese registro en español evita diluir la acusación de Job y conserva la tensión teológica sobre la justicia divina.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Traducción de מִשְׁפָּטִי
  english_pob_reading: my justice
  chosen_spanish_reading: mi justicia
  alternative_spanish_readings:
  - mi juicio
  - mi sentencia
  rationale: '«Mi justicia» comunica mejor la amplitud del término en este contexto: no solo un veredicto aislado, sino el orden justo o derecho de Dios. Se deja abierta la alternativa «mi juicio» por la ambigüedad documentada.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso del control cruzado fue alto, con solo observaciones menores. Esta versión mantiene el énfasis forense del hebreo y la alternativa léxica documentada para מִשְׁפָּטִי.
  spanish_consistency_notes:
  - 'Se conserva el registro judicial en todo el versículo: anular / condenar / justificado.'
  - Se evita «SEÑOR» y se traduce solo el contenido semántico del hebreo disponible en este versículo.
  - «Justificado» se mantiene como terminología forense coherente con el paralelismo verbal.
  - La nota al pie se ancla únicamente en «justicia» para reflejar la alternativa documentada «juicio».
