id: 1KI.11.29
reference: 1 Kings 11:29
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בָּ/עֵ֣ת הַ/הִ֔יא וְ/יָֽרָבְעָ֖ם יָצָ֣א מִ/ירוּשָׁלִָ֑ם וַ/יִּמְצָ֣א אֹת֡/וֹ אֲחִיָּה֩ הַ/שִּׁילֹנִ֨י הַ/נָּבִ֜יא בַּ/דֶּ֗רֶךְ וְ/ה֤וּא מִתְכַּסֶּה֙ בְּ/שַׂלְמָ֣ה חֲדָשָׁ֔ה וּ/שְׁנֵי/הֶ֥ם לְ/בַדָּ֖/ם בַּ/שָּׂדֶֽה׃
translation:
  text: And at that time[a], when Jeroboam went out from Jerusalem, Ahijah the Shilonite, the prophet, found him on the road. Now he had wrapped himself in a new cloak, and the two of them were alone in the open field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the field.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בָּעֵת הַהִיא
  chosen: And at that time
  alternatives:
  - And it happened at that time
  - Now at that time
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the scene. 'And at that time' preserves the temporal setting in natural English without over-literal awkwardness.
- source_word: יָצָא מִירוּשָׁלָם
  chosen: went out from Jerusalem
  alternatives:
  - left Jerusalem
  - went out of Jerusalem
  lexicon: HALOT
  rationale: יָצָא commonly means 'go out/come out.' 'Went out from Jerusalem' keeps the directional sense more closely than the simpler 'left.'
- source_word: וַיִּמְצָא אֹתוֹ
  chosen: found him
  alternatives:
  - met him
  lexicon: HALOT
  rationale: מצא ordinarily means 'find.' In context it can imply an encounter, but 'found him' best reflects the Hebrew while remaining idiomatic.
- source_word: אֲחִיָּה הַשִּׁילֹנִי הַנָּבִיא
  chosen: Ahijah the Shilonite, the prophet
  alternatives:
  - Ahijah of Shiloh, the prophet
  lexicon: HALOT
  rationale: The gentilic הַשִּׁילֹנִי is naturally rendered 'the Shilonite.' Apposition with 'the prophet' is preserved to reflect the Hebrew identification.
- source_word: בַּדֶּרֶךְ
  chosen: on the road
  alternatives:
  - on the way
  - in the road
  lexicon: HALOT
  rationale: '''On the road'' is a clear modern rendering of the locative phrase and fits the concrete setting.'
- source_word: וְהוּא מִתְכַּסֶּה
  chosen: he had wrapped himself
  alternatives:
  - he was covering himself
  - he was clothed
  lexicon: HALOT
  rationale: The participle describes Ahijah's state at the time of the encounter. English past perfect/state expression communicates the backgrounded descriptive force naturally. The reflexive sense of Hitpael is preserved with 'wrapped himself.'
- source_word: בְּשַׂלְמָה חֲדָשָׁה
  chosen: in a new cloak
  alternatives:
  - with a new garment
  - in a new mantle
  lexicon: HALOT
  rationale: שַׂלְמָה denotes an outer garment or cloak. 'Cloak' is more specific and natural than the generic 'garment,' and anticipates the symbolic tearing in the following verse.
- source_word: וּשְׁנֵיהֶם לְבַדָּם
  chosen: the two of them were alone
  alternatives:
  - both of them were by themselves
  - the two of them were by themselves
  lexicon: HALOT
  rationale: The phrase emphasizes that no one else was present. 'The two of them were alone' is concise and idiomatic.
- source_word: בַּשָּׂדֶה
  chosen: in the open field
  alternatives:
  - in the field
  lexicon: HALOT
  rationale: '''Field'' is the basic sense, but ''open field'' brings out the outdoor, isolated setting in natural English without adding substantial interpretation.'
