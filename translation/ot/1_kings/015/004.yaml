theological_decisions:
- issue: Metaphorical sense of נִיר in relation to the Davidic covenant
  chosen_reading: Retain the metaphor 'lamp' in the main text
  alternative_readings:
  - dynasty
  - lineage
  - light
  rationale: The verse alludes to the enduring Davidic line without flattening the Hebrew metaphor. Keeping 'lamp' preserves intertextual resonance with other Davidic passages while allowing readers to infer the dynastic sense from context or footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Referent of 'his God'
  chosen_reading: Take the pronoun as referring to Abijam/the king in context
  alternative_readings:
  - David
  rationale: The nearest contextual referent is the current king under discussion, and the clause explains the LORD's action toward him because of David. Rendering simply 'his God' preserves the Hebrew without over-specifying in the main text.
