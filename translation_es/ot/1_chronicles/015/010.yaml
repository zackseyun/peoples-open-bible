translation:
  language: es
  text: 'De los hijos de Uziel: Aminadab, el jefe[a], y sus hermanos, ciento doce.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘líder’ o ‘príncipe’ para ‘el jefe’.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי
  english_pob_choice: For the sons of
  chosen_spanish: Para los hijos de
  alternatives_spanish:
  - De los hijos de
  - A los hijos de
  lexicon: HALOT
  rationale: El prefijo ל aquí introduce el grupo/clan que sigue en una lista, y en español natural puede expresarse con ‘para’. ‘Hijos’ conserva el lenguaje genealógico y de linaje del hebreo, sin volverlo demasiado técnico.
- source_word: עֻזִּיאֵל
  english_pob_choice: Uzziel
  chosen_spanish: Uzziel
  alternatives_spanish:
  - Uziel
  lexicon: Nombre propio
  rationale: Nombre propio hebreo transliterado. Se conserva la forma más cercana al original base del texto fuente.
- source_word: עַמִּינָדָב
  english_pob_choice: Amminadab
  chosen_spanish: Amminadab
  alternatives_spanish:
  - Aminadab
  lexicon: Nombre propio
  rationale: Nombre propio transliterado según la convención bíblica corriente, manteniendo la referencia identificable.
- source_word: הַ/שָּׂר
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el líder
  - el príncipe
  lexicon: HALOT
  rationale: שַׂר puede significar jefe, líder, oficial o príncipe. En este contexto de lista administrativa/genealógica, ‘jefe’ comunica bien la función sin imponer un matiz monárquico o demasiado arcaico. Se evita ‘príncipe’ por su posible carga tradicional no necesaria aquí.
- source_word: וְ/אֶחָי/ו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes masculinos
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: אָח puede referirse a hermanos literales o a miembros masculinos del mismo grupo. Como el POB inglés retiene ‘brothers’, en español se preserva ‘hermanos’ como traducción directa y suficientemente amplia en este contexto.
- source_word: מֵאָה וּ/שְׁנֵים עָשָׂר
  english_pob_choice: one hundred and twelve
  chosen_spanish: ciento doce
  alternatives_spanish:
  - cien y doce
  lexicon: HALOT
  rationale: Número cardinal directo; ‘ciento doce’ es la forma normal y clara en español bíblico contemporáneo.
translation_notes:
  revision_awareness: El texto coincide con el sentido y la estructura del POB inglés auditado; no se detectan revisiones aplicadas en el pasaje fuente y se mantiene la misma relación de lista/clan y el valor numérico exacto.
  spanish_consistency_notes:
  - Se mantuvo la secuencia sintáctica breve del hebreo y del POB inglés para una lectura transparente en lista genealógica.
  - Se preserva ‘hermanos’ porque el inglés auditado también documenta esa decisión y el contexto no exige una expansión interpretativa.
  - Se usa ‘jefe’ como término neutral y contemporáneo para שַׂר, con nota alternativa para reflejar la ambigüedad léxica documentada.
