translation:
  language: es
  text: Él denuncia a sus amigos por una porción[a], y los ojos de sus hijos desfallecerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por una parte», «por ganancia»; o, según otra interpretación, «como adulación». El hebreo es difícil, pero la idea es la de tratar a los amigos para beneficio personal.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְחֵלֶק
  english_pob_choice: for a share
  chosen_spanish: por una parte
  alternatives_spanish:
  - por un reparto
  - por su porción
  - por ganancia
  lexicon: HALOT
  rationale: חֵלֶק puede significar 'porción', 'parte' o 'reparto'. Dado que el contexto es oscuro y el inglés POB simplifica a 'for a share', 'por una parte' conserva la idea de ventaja o beneficio personal sin añadir 'botín' ni una imagen no asegurada por el hebreo.
- source_word: יַגִּיד
  english_pob_choice: denounces
  chosen_spanish: denuncia
  alternatives_spanish:
  - acusa
  - delata
  - declara
  lexicon: HALOT
  rationale: El hiphil de נגד puede significar 'declarar' o 'hacer saber', pero en este contexto, con 'amigos' y la frase de beneficio personal, el sentido es de traición o exposición hostil. 'Denuncia' reproduce bien esa fuerza en español.
- source_word: רֵעִים
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - compañeros
  - cercanos
  - asociados
  lexicon: HALOT
  rationale: El término designa amistades o compañeros. 'Amigos' refleja de forma directa la relación que se está traicionando, como en el inglés POB.
- source_word: וְעֵינֵי בָנָיו
  english_pob_choice: the eyes of his children
  chosen_spanish: los ojos de sus hijos
  alternatives_spanish:
  - los ojos de sus niños
  - los ojos de sus descendientes
  lexicon: HALOT
  rationale: בנים puede ser 'hijos' o más ampliamente 'descendientes/niños'. 'Hijos' sigue el inglés POB y mantiene naturalidad en español sin perder el plural filial.
- source_word: תִּכְלֶנָה
  english_pob_choice: will fail
  chosen_spanish: desfallecerán
  alternatives_spanish:
  - se consumirán
  - se agotarán
  - se apagarán
  lexicon: HALOT
  rationale: כלה en esta forma puede expresar terminar, consumirse o languidecer. Con 'ojos' como sujeto, 'desfallecerán' comunica bien la imagen de agotamiento o debilidad visual sin exagerar hacia ceguera completa.
translation_notes:
  revision_awareness: La versión inglesa POB revisó una formulación más expansiva ('for a share of the spoil') a 'for a share' para acercarse más al hebreo sin añadir 'botín'. La redacción española sigue esa decisión y conserva la ambigüedad del sintagma con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en este proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita 'Cristo/Mesías' porque no corresponde al texto.
  - '''Hijos'' traduce בנים de forma natural y acorde con el registro bíblico.'
  - La nota conserva la dificultad lexical del hebreo y no la resuelve de manera más específica que el original y el audit trail inglés.
