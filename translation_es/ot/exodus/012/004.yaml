base_translation:
  language: en
  yaml_path: translation/ot/exodus/012/004.yaml
  text: And if the household is too small for a lamb[a], then he and his nearest neighbor shall take one according to the number of persons; each man according to what he can eat[b], you shall count for the lamb.
  footnotes:
