translation:
  language: es
  text: Harás para este una rejilla[a], una obra de red de bronce, y sobre la red harás cuatro anillos de bronce en sus cuatro extremos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «una malla de bronce» o «una red de bronce». El hebreo dice literalmente: «una rejilla, obra de red, de bronce».'
    reason: lexical_alternative
  - marker: b
    text: O «en sus cuatro esquinas».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכְבָּר
  english_pob_choice: grating
  chosen_spanish: rejilla
  alternatives_spanish:
  - parrilla
  - rejilla metálica
  - celosía
  lexicon: HALOT
  rationale: El término designa una pieza reticulada o en forma de enrejado; «rejilla» comunica bien esa estructura en español sin cargarla con asociaciones modernas ajenas al contexto cultual.
- source_word: מַעֲשֵׂה רֶשֶׁת
  english_pob_choice: a network
  chosen_spanish: una obra de red
  alternatives_spanish:
  - una malla
  - una red tejida
  - un entramado
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «obra de red». «Obra de red» conserva el vínculo con רֶשֶׁת y mantiene visible la relación con la pieza descrita, sin perder naturalidad en español.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el valor tradicional y más adecuado en español bíblico es «bronce», reflejando el material de los utensilios cultuales.
- source_word: עַל הָרֶשֶׁת
  english_pob_choice: on the network
  chosen_spanish: sobre la red
  alternatives_spanish:
  - encima de la red
  - sobre la rejilla
  - en la red
  lexicon: HALOT
  rationale: La preposición עַל indica colocación encima o sobre la pieza reticulada; «sobre la red» conserva la relación espacial y mantiene la referencia al mismo objeto descrito antes.
- source_word: טַבְּעֹת
  english_pob_choice: rings
  chosen_spanish: anillos
  alternatives_spanish:
  - aros
  - anillas
  - aros de sujeción
  lexicon: HALOT
  rationale: «Anillos» es el equivalente directo y más claro en español para los aros metálicos de sujeción en las instrucciones del tabernáculo.
- source_word: קְצוֹתָיו
  english_pob_choice: its four corners
  chosen_spanish: sus cuatro extremos
  alternatives_spanish:
  - sus cuatro esquinas
  - sus cuatro puntas
  - sus cuatro bordes
  lexicon: HALOT
  rationale: El hebreo habla de los extremos o terminaciones de la pieza; «extremos» evita imponer una forma geométrica específica que el contexto español podría sugerir en exceso, y preserva la amplitud semántica del original.
- source_word: לּוֹ
  english_pob_choice: for it
  chosen_spanish: para él
  alternatives_spanish:
  - para eso
  - para ello
  lexicon: HALOT
  rationale: El antecedente es masculino en español porque se refiere a un objeto cultual entendido como «rejilla»; «para él» mantiene la referencia pronominal directa del hebreo sin forzar una abstracción impersonal.
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - deberás hacer
  - haz
  lexicon: HALOT
  rationale: La forma verbal consecutiva transmite una instrucción futura/mandada; «Harás» es natural, solemne y fiel al valor imperativo-jussivo en este tipo de texto.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta propuesta sigue la lectura de alta concordancia del texto fuente y del audit trail inglés, manteniendo las equivalencias léxicas documentadas sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se conserva la relación entre מִכְבָּר y מַעֲשֵׂה רֶשֶׁת mediante «rejilla» y «obra de red».
  - Se mantiene «bronce» para נְחֹשֶׁת, coherente con el uso cultual del tabernáculo.
  - Se respeta la ambigüedad de קְצוֹתָיו con la alternativa «extremos» en nota, como hace el audit trail inglés.
  - El registro es bíblico contemporáneo y no depende de fórmulas eclesiásticas tradicionales que oscurezcan el hebreo.
