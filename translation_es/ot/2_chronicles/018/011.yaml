translation:
  language: es
  text: 'Y todos los profetas estaban profetizando así[a], diciendo: «Sube a Ramot de Galaad y ten éxito, y Yahvé lo entregará en la mano del rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de este modo». El hebreo כֵּן aquí indica la manera en que hablaban todos los profetas.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: And all
  chosen_spanish: Y todos
  alternatives_spanish:
  - Ahora todos
  lexicon: HALOT
  rationale: La coordinación hebrea y el cuantificador se reproducen de forma natural con «Y todos», manteniendo la transición colectiva sin añadir matices discursivos no explícitos.
- source_word: הַנְּבִאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  lexicon: HALOT
  rationale: Es el equivalente directo y natural para נביאים en este contexto narrativo de profetas de corte.
- source_word: נִבְּאִים
  english_pob_choice: were prophesying
  chosen_spanish: estaban profetizando
  alternatives_spanish:
  - profetizaban
  lexicon: HALOT
  rationale: El participio expresa acción en curso; en español, «estaban profetizando» conserva mejor la simultaneidad y el matiz durativo que un pretérito simple.
- source_word: כֵּן
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - así
  lexicon: HALOT
  rationale: כֵּן indica manera o forma de hablar común a todos; «así» es natural en español y preserva el valor adverbial sin sobreexplicar.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  lexicon: HALOT
  rationale: Funciona como introducción de discurso directo; «diciendo» refleja con claridad la fórmula hebrea.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Subid
  lexicon: HALOT
  rationale: עלה es literalmente «subir/ascender». En imperativo singular, «Sube» mantiene la imagen hebrea y encaja en el contexto militar.
- source_word: רָמֹת גִּלְעָד
  english_pob_choice: Ramoth-gilead
  chosen_spanish: Ramot de Galaad
  alternatives_spanish:
  - Ramot-galaad
  - Ramot Galaad
  lexicon: HALOT
  rationale: Se conserva el topónimo mediante transliteración; «de Galaad» comunica el compuesto toponímico de forma clara para el lector español.
- source_word: וְהַצְלַח
  english_pob_choice: and succeed
  chosen_spanish: y prospera
  alternatives_spanish:
  - y ten éxito
  - y sé exitoso
  lexicon: HALOT
  rationale: El verbo expresa éxito/prosperidad. «Prospera» es una opción bíblica y comprensible en español, y evita la redundancia coloquial de «tener éxito» en una exhortación oracular.
- source_word: וְנָתַן יְהוָה
  english_pob_choice: and Yahweh will give
  chosen_spanish: y Yahvé lo entregará
  alternatives_spanish:
  - y Yahvé dará
  lexicon: HALOT
  rationale: El qatal con valor profético puede leerse como certeza futura; «lo entregará» refleja el sentido de dar/poner en manos de otro con la imagen hebrea de entrega segura.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la terminología POB para el Tetragrámaton, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en manos de
  - en poder de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se conserva sin forzar un calco demasiado pesado; «en mano de» mantiene la imagen de control o dominio.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  lexicon: HALOT
  rationale: Equivalencia directa y adecuada al referente narrativo; no requiere aclaración adicional.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se conserva el nombre propio del pacto en lugar de una sustitución por título. Esto sigue la política del proyecto y evita ocultar el Tetragrámaton presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Forma verbal profética de וְנָתַן
  english_pob_reading: will give
  chosen_spanish_reading: lo entregará
  alternative_spanish_readings:
  - lo dará
  - está entregando
  rationale: El hebreo presenta una promesa segura en discurso profético. En español, el futuro simple comunica esa certeza sin convertir la afirmación en mera posibilidad.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que prefirió 'thus' y 'will give' para reflejar la forma hebrea y la certeza profética. En español se ha respetado ese equilibrio con «así» y futuro simple, manteniendo además la imagen idiomática de «en mano de» y el nombre divino Yahvé.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar POB en español para יְהוָה.
  - Se mantuvo «profetizando» como acción continua para נִבְּאִים.
  - «Ramot de Galaad» conserva el topónimo compuesto de forma legible para el lector hispanohablante.
  - «Prospera» refleja el valor de éxito/prosperidad de וְהַצְלַח sin añadir explicación innecesaria.
