translation:
  language: es
  text: Yahvé habló a Manasés y a su pueblo[a], pero ellos no escucharon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prestaron atención» o «hicieron caso». El verbo hebreo puede implicar una escucha atenta que exige respuesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: El verbo דבר en piel expresa hablar o dirigirse con habla directa. En español, «habló a» reproduce bien la construcción con אֶל y suena natural sin perder el valor verbal de comunicación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la pauta del proyecto, en transliteración española «Yahvé», para no sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla; «a» es el equivalente natural en español.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasé
  lexicon: convención onomástica
  rationale: Se usa la forma española habitual del nombre propio bíblico, manteniendo la identificación clara del personaje.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su nación
  lexicon: HALOT
  rationale: עַם designa un pueblo o grupo de personas bajo pertenencia o relación política. «Su pueblo» conserva esa amplitud y sigue de cerca el matiz del texto base.
- source_word: וְלֹא הִקְשִׁיבוּ
  english_pob_choice: but they did not listen
  chosen_spanish: pero ellos no escucharon
  alternatives_spanish:
  - pero no hicieron caso
  - pero no prestaron atención
  - pero no atendieron
  lexicon: HALOT
  rationale: הקשיב en hiphil implica escuchar con atención y respuesta. «No escucharon» es fiel y publicable; las alternativas pueden intensificar el matiz de atención o de respuesta implícita.
theological_decisions:
- issue: Referencia del plural en «ellos no escucharon»
  english_pob_reading: The plural refers to Manasseh and his people together.
  chosen_spanish_reading: El plural abarca a Manasés y a su pueblo, ambos incluidos entre los que no escucharon.
  alternative_spanish_readings:
  - El plural podría referirse solo al pueblo, con Manasés como destinatario aparte.
  rationale: El hebreo nombra dos destinatarios («a Manasés y a su pueblo») y luego usa un verbo plural. La traducción española conserva esa lectura inclusiva sin resolver la referencia de manera más estrecha de lo que permite el texto.
  doctrine_reference: Observación gramatical del sujeto plural en el texto hebreo
- issue: Valor semántico de הִקְשִׁיבוּ
  english_pob_reading: listen / heed / pay attention
  chosen_spanish_reading: escucharon, con el sentido de escuchar atentamente y responder
  alternative_spanish_readings:
  - prestaron atención
  - hicieron caso
  - obedecieron
  rationale: 'El verbo puede implicar más que oír: atender con disposición a responder. En español se mantiene «escucharon» y se preserva el matiz en la nota para no cerrar indebidamente la amplitud léxica.'
  doctrine_reference: HALOT sobre קשב en hiphil
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés concuerdan en una sola línea de sentido: Yahvé habló a Manasés y a su pueblo, pero ambos no respondieron con escucha atenta. No se requieren revisiones respecto del precedente inglés; la versión española conserva el nombre divino, el destinatario doble y la tensión léxica de הִקְשִׁיבוּ.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se usó «Manasés» como forma española estable del nombre propio.
  - «Su pueblo» reproduce de forma natural עַמּוֹ sin introducir interpretaciones adicionales.
  - La nota [a] se ancla en «escucharon» para preservar la alternativa de escucha atenta del verbo hebreo.
  - Se evitó «el SEÑOR» para no ocultar el nombre divino conforme a la pauta editorial.
