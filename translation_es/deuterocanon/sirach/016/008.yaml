translation:
  language: es
  text: Y no tuvo compasión de los vecinos de Lot[a], que se volvieron arrogantes en su soberbia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'los que habitaban con Lot' o 'la comunidad de Lot'. La expresión hebrea es inusual; el paralelo griego habla de la 'comunidad de residencia' de Lot.
    reason: lexical_alternative
  - marker: b
    text: O, 'que se hicieron detestables por su soberbia'. El hebreo es difícil, y el paralelo griego apoya la idea de volverse aborrecibles a causa del orgullo.
    reason: alternative_reading
lexical_decisions:
- source_word: וְלֹא חָמַל / οὐκ ἐφείσατο
  english_pob_choice: and he did not spare
  chosen_spanish: y no tuvo compasión de
  alternatives_spanish:
  - y no perdonó a
  - y no perdonó
  - y no se apiadó de
  lexicon: HALOT; LXX ἐφείσατο
  rationale: חמל puede expresar compasión o el acto de perdonar/ahorrar. En español, 'no tuvo compasión de' conserva el matiz de misericordia sin perder el tono judicial del pasaje, y sigue bien el paralelo griego 'no perdonó'.
- source_word: מְגוּרֵי לוֹט / παροικία Λώτ
  english_pob_choice: Lot’s neighbors
  chosen_spanish: los vecinos de Lot
  alternatives_spanish:
  - los moradores donde Lot habitaba
  - los que habitaban con Lot
  - la comunidad de Lot
  lexicon: HALOT; LXX παροικία
  rationale: La frase hebrea y el griego señalan a la comunidad vinculada al lugar donde Lot vivía, no necesariamente a un nombre técnico como 'Sodoma'. 'Vecinos de Lot' comunica de forma natural esa asociación espacial y social en español.
- source_word: הַמִּתְעַבְּרִים / ἐβδελύξατο
  english_pob_choice: who became arrogant in their pride / who made themselves detestable because of their pride
  chosen_spanish: a quienes aborreció
  alternatives_spanish:
  - que se hicieron detestables
  - que se volvieron abominables
  - a quienes hizo abominables
  lexicon: HALOT; LXX ἐβδελύξατο
  rationale: El hebreo es difícil y el griego aporta la idea de ser aborrecidos o volverse detestables. 'Aborreció' preserva el rechazo moral fuerte sin forzar una paráfrasis explicativa en el texto principal, dejando la causalidad explícita en la cláusula siguiente.
- source_word: בְּגַאֲוָתָם / διὰ τὴν ὑπερηφανίαν αὐτῶν
  english_pob_choice: in their pride
  chosen_spanish: por su soberbia
  alternatives_spanish:
  - por su orgullo
  - a causa de su soberbia
  - debido a su arrogancia
  lexicon: HALOT; LXX ὑπερηφανία
  rationale: '''Soberbia'' comunica bien el sentido moral de orgullo arrogante que presenta el hebreo y el griego. ''Por su soberbia'' expresa claramente la causa del rechazo divino en un español natural y digno.'
theological_decisions:
- issue: Referente de 'los vecinos de Lot'
  english_pob_reading: The phrase refers to the people of the place where Lot lived, i.e., the Sodomites associated with Lot’s residence.
  chosen_spanish_reading: La frase se entiende como la gente del lugar donde Lot habitaba, sin convertirla en una identificación explícita con 'sodomitas' en el texto principal.
  alternative_spanish_readings:
  - los sodomitas
  - la comunidad donde Lot residía
  - los habitantes del lugar de Lot
  rationale: El hebreo no nombra directamente a Sodoma; tanto el hebreo como el griego apuntan a la comunidad asociada con la estancia de Lot. 'Vecinos de Lot' conserva esa referencia histórica sin añadir más especificación de la que el texto da.
  doctrine_reference: Sirach 16:8; comparación hebreo/griego
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente que ajustó el sintagma de מְגוּרֵי hacia un referente comunitario natural en inglés y que recuperó el valor de הַמִּתְעַבְּרִים mediante una formulación menos paraprástica. La versión española sigue ese criterio, evitando identificar explícitamente a Sodoma en el texto principal y manteniendo la causalidad por la soberbia en una cláusula final clara.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - '''Soberbia'' se prefiere a ''orgullo'' para el matiz de arrogancia moral documentado por el griego.'
  - Se evita 'siervo' o terminología litúrgica ajena al pasaje; el registro es sapiencial y narrativo.
  - Las notas al pie conservan las alternativas relevantes sin duplicar innecesariamente la base textual.
