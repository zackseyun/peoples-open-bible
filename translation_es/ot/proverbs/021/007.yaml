translation:
  language: es
  text: La violencia de los impíos los arrastrará[a], porque se niegan a hacer justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «El saqueo de los impíos los barrerá». El hebreo del verbo es difícil, y los intérpretes discrepan sobre si el énfasis está en la violencia, el saqueo, el terror o en ser arrastrados por su propia maldad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁד
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - despojo
  - saqueo
  - destrucción
  lexicon: HALOT
  rationale: שֹׁד puede abarcar violencia destructiva, despojo o saqueo. Dado el paralelismo con la conducta de los malvados y el efecto retributivo del proverbio, 'violencia' conserva la amplitud del término sin reducirlo solo a robo material.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  - los malhechores
  lexicon: HALOT
  rationale: '''Impíos'' es un equivalente bíblico natural en español para el plural sustantivado de רְשָׁעִים y mantiene el matiz moral-religioso del término. ''Los malvados'' también es posible, pero ''impíos'' suena más sobrio y tradicional sin perder claridad.'
- source_word: יְגוֹרֵם
  english_pob_choice: will drag them away
  chosen_spanish: los arrastrará
  alternatives_spanish:
  - los barrerá
  - los llevará consigo
  - los llevará lejos
  lexicon: HALOT
  rationale: La forma verbal es difícil y la POB inglesa opta por un resultado destructivo causado por la propia violencia. 'Arrastrará' conserva la imagen de ser llevado por fuerza y corresponde bien al valor de consecuencia impuesta por la violencia misma.
- source_word: מֵאֲנוּ
  english_pob_choice: they refuse
  chosen_spanish: se han negado
  alternatives_spanish:
  - se niegan
  - rehúsan
  - se rehusaron
  lexicon: HALOT
  rationale: El verbo expresa negativa firme a hacer algo. En español, 'se han negado' comunica bien esa resistencia obstinada en un proverbio de valor característico; 'rehúsan' sería más literal, pero menos natural aquí.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: a hacer
  alternatives_spanish:
  - para practicar
  - para realizar
  - a practicar
  lexicon: HALOT
  rationale: El infinitivo con לַ- introduce el objeto de la negativa. 'A hacer' mantiene la construcción simple y transparente en español.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - lo justo
  - juicio
  - rectitud
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט denota acción justa u orden justo, no solo un veredicto legal. 'Justicia' es la equivalencia más natural y fiel en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de Proverbios 21:7 y toma como guía la resolución auditada de la POB en inglés, especialmente la lectura de שֹׁד como violencia amplia y de יְגוֹרֵם como un arrastre/retiro destructivo. Se conservó la ambigüedad verbal mediante nota, sin normalizarla a una sola acepción.
  spanish_consistency_notes:
  - Se usó 'impíos' para רְשָׁעִים por coherencia con terminología bíblica española sobria y porque mantiene el contraste moral del proverbio.
  - '''Justicia'' se reservó para מִשְׁפָּט por su valor ético-legal general en este contexto.'
  - La nota [a] mantiene la dificultad léxica del verbo hebreo y evita cerrar indebidamente la interpretación.
