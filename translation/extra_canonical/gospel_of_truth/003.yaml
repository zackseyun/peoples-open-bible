lexical_decisions:
- source_word: ⲡⲧⲏⲣϥ
  chosen: the All
  alternatives:
  - the totality
  - the whole
  lexicon: Crum; Layton NHC glossary
  rationale: Standard Nag Hammadi technical term for the totality of things; preserves
    Valentinian usage distinct from simple ‘all’ as a quantifier.
- source_word: ⲥⲁⲩⲛⲉ
  chosen: knowledge
  alternatives:
  - gnosis
  lexicon: Crum
  rationale: Core theme in the tractate; ‘knowledge’ preserves accessibility while
    retaining the technical sense. ‘Gnosis’ is noted but reserved for commentary.
- source_word: ⲥⲧⲟⲩⲱⲣⲁⲩ
  chosen: rest
  alternatives:
  - repose
  lexicon: Crum
  rationale: Recurring motif of salvific rest; ‘rest’ is the established rendering
    and pairs with ‘knowledge’ in the text’s formula.
- source_word: ϫⲱⲕ
  chosen: body
  alternatives:
  - members
  lexicon: Crum
  rationale: Here the phrase ‘in one body’ emphasizes unity; ‘members’ appears conceptually,
    but the noun itself is ‘body’.
- source_word: ⲙⲣⲣⲓⲧ
  chosen: love
  alternatives:
  - cherish
  lexicon: Crum
  rationale: Common Coptic verb for ‘to love’; kept simple and literal.
- source_word: ⲥⲟⲩⲱⲛ
  chosen: know
  alternatives:
  - recognize
  lexicon: Crum
  rationale: Primary verb for knowing; central to the tractate’s theology.
- source_word: ⲡⲓϫⲱⲱⲙⲉ
  chosen: book
  alternatives:
  - scroll
  lexicon: Crum
  rationale: Refers to the ‘living book’ motif; ‘book’ is conventional across Nag
    Hammadi context.
- source_word: ⲙⲉⲉⲩⲉ
  chosen: thought
  alternatives:
  - purpose
  - intention
  lexicon: Crum
  rationale: ‘Thought’ aligns with the pairing ‘thought and mind’ (ⲛⲟⲩⲥ), retaining
    parallelism.
- source_word: ⲛⲟⲩⲥ
  chosen: mind
  alternatives:
  - understanding
  lexicon: Greek loan in Coptic; Crum
  rationale: Greek νοῦς is best rendered ‘mind’; preserves philosophical register.
- source_word: ⲁⲧⲙⲏⲧⲉ
  chosen: impossible
  alternatives:
  - not possible
  lexicon: Crum
  rationale: 'Negative prefix ⲁⲧ- + ‘measure/ability’ gives ‘impossible’; context:
    impossibility without the book’s appearing.'
- source_word: ⲇⲓⲁⲑⲏⲕⲏ
  chosen: testament
  alternatives:
  - will
  lexicon: Greek loanword
  rationale: Legal metaphor; ‘testament’ retains the Greek’s juridical nuance and
    intertextual resonance.
- source_word: ⲇⲓⲁⲧⲁⲅⲙⲁ
  chosen: decree
  alternatives:
  - edict
  - ordinance
  lexicon: Greek loanword
  rationale: Administrative/legal proclamation from the Father; ‘decree’ fits the
    context of publication on the cross.
- source_word: ⲁⲧⲧⲉⲕⲟ
  chosen: incorruptibility
  alternatives:
  - imperishability
  lexicon: Crum
  rationale: Set antithetically to perishable rags; established Nag Hammadi term.
- source_word: ⲡⲗϭⲉ
  chosen: rags
  alternatives:
  - tatters
  - garments
  lexicon: Crum
  rationale: Pejorative for perishable clothing; ‘rags’ captures the contrast with
    incorruptibility.
- source_word: ⲧⲟⲩⲥⲓⲁ
  chosen: cross
  alternatives:
  - stake
  - tree (contextual)
  lexicon: Crum
  rationale: In this passage, distinguished from ‘tree’; retained as ‘cross’ for the
    place of the decree’s publication.
- source_word: ⲉⲙⲙⲟⲩⲧ
  chosen: death
  alternatives:
  - dying
  lexicon: Crum
  rationale: Common noun; used in the phrase ‘his death is life for many’.
- source_word: ⲟⲩⲱⲛϩ
  chosen: be manifested
  alternatives:
  - live
  - be revealed
  lexicon: Crum
  rationale: Verb literally ‘to live’; in Nag Hammadi often carries ‘to be manifest/come
    to life’ nuance; here ‘be manifested’ fits revelation motif.
- source_word: ⲛⲧⲉⲡⲧⲏⲣϥ ϩⲙ ⲡⲓⲱⲧ
  chosen: of the All within the Father
  alternatives:
  - of the All in the Father
  lexicon: Contextual phrase
  rationale: Clarifies genitival relationship consistent with repeated ‘All … within
    him’ formula.
technical_vocabulary_note: 'Key Valentinian terms are retained: ‘the All’ for the
  totality of things; ‘knowledge’ as the salvific gnosis of the Father; ‘rest’ as
  the eschatological repose paired with knowledge; ‘incorruptibility’ in contrast
  to perishable existence; ‘testament’ and ‘decree’ for legal metaphors; and the ‘Living
  Book of the Living’ as a revealed, pre-cosmic text written in the Father’s thought
  and mind. The imagery of ‘little children’ functions as an initiated class whose
  portion is the Father’s knowledge. Where the Coptic uses Greek legal and philosophical
  loans (νοῦς; διαθήκη; διατάγμα), these are rendered with precise English equivalents
  to preserve the tractate’s register.'
textual_note: 'Drafted from Codex I, pp. 19–21 (NHC I,3), following the facsimile
  OCR lines provided. Several loci remain paleographically uncertain: (1) the opening
  clause on p. 19 preceding ‘The Father’ is fragmentary; the translation begins at
  the clear ‘ⲡⲓⲱⲧ ⲡⲉ…’. (2) The phrase ‘before the foundation of all within his incomprehensibility’
  corresponds to the sequence with ⲙⲉⲉⲩⲉ and ⲛⲟⲩⲥ on p. 19–20; ‘foundation’ and ‘incomprehensibility’
  are reconstructed from standard readings of this passage in NHC I,3 where ⲧⲁⲑⲏ (‘foundation’)
  and ‘incomprehensibility’ occur, though the OCR shows irregular characters (‘ⲭⲓ
  ⲛ̄ⲧⲁⲑⲏ’). (3) On p. 20, lines using ⲁⲧⲙⲏⲧⲉ are taken as ‘impossible,’ consistent
  with context; earlier on p. 19 a form ‘ⲁⲧⲙⲏⲧⲉ’ may appear in a different syntagm
  and is not translated separately. (4) The legal metaphor with ⲇⲓⲁⲑⲏⲕⲏ and ⲇⲓⲁⲧⲁⲅⲙⲁ
  is explicit in p. 20 and governs the sequence ‘testament’ → ‘opening’ → ‘publication.’
  (5) The final cola on p. 20–21 (‘entered the empty places…’) are incomplete in the
  OCR; the translation follows the attested sequence through ‘proclaiming what is
  in the heart,’ which is clearly reflected in the Coptic phrases ‘ⲛⲓϩⲣⲧⲉ,’ ‘ⲛⲉⲉⲓ
  ⲉⲧⲃⲏϣ,’ and ‘ⲛⲟⲩⲥⲁⲩⲛⲉ / ⲛⲟⲩϫⲱⲕ.’ No XII.2 overlap is available for control in this
  section.'
