translation:
  language: es
  text: ¿Quién modela un dios[a] o funde un ídolo que no sirve de nada?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién modela un dios y funde un ídolo, sin ningún provecho?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién ha de
  lexicon: HALOT
  rationale: Interrogativo retórico directo. «¿Quién» conserva la fuerza profética y resulta natural en español.
- source_word: יָצַר
  english_pob_choice: fashions
  chosen_spanish: modela
  alternatives_spanish:
  - forma
  - moldea
  - da forma a
  lexicon: HALOT
  rationale: El verbo alude a dar forma como artesano. «Modela» comunica bien la acción de formar una figura sin sonar mecánico en español.
- source_word: אֵל
  english_pob_choice: a god
  chosen_spanish: un dios
  alternatives_spanish:
  - un ídolo
  - una deidad
  lexicon: HALOT
  rationale: Aquí el sustantivo es indefinido y se refiere a una deidad fabricada, no al Dios verdadero. En español conviene mantener minúscula y artículo indefinido.
- source_word: וּפֶסֶל
  english_pob_choice: or casts an idol
  chosen_spanish: o funde un ídolo
  alternatives_spanish:
  - y un ídolo
  - o hace un ídolo
  lexicon: HALOT
  rationale: El contexto es polémica contra la fabricación de imágenes. «Funde» da cuenta del acto artesanal de vaciar/moldear un ídolo y preserva la idea del inglés POB de «casts».
- source_word: נָסָךְ
  english_pob_choice: casts
  chosen_spanish: funde
  alternatives_spanish:
  - vacía
  - moldea
  lexicon: HALOT
  rationale: En contexto de ídolos, el verbo puede referirse a fundir o verter metal para hacer una imagen. «Funde» es la opción más transparente en español sin perder el trasfondo artesanal.
- source_word: לְבִלְתִּי
  english_pob_choice: for nothing
  chosen_spanish: para nada
  alternatives_spanish:
  - sin provecho
  - sin utilidad
  lexicon: HALOT
  rationale: La construcción expresa inutilidad o ausencia total de provecho. «Para nada» reproduce esa fuerza de modo idiomático y sobrio.
- source_word: הוֹעִיל
  english_pob_choice: profits
  chosen_spanish: aprovechoso
  alternatives_spanish:
  - útil
  - provechoso
  - que aprovecha
  lexicon: HALOT
  rationale: El verbo significa aprovechar, beneficiar o ser de utilidad. En español, la cláusula «para nada aprovechoso» preserva el sentido predicativo de inutilidad que el inglés expresa con «profits nothing».
theological_decisions:
- issue: Referencia de אֵל en un contexto de idolatría
  english_pob_reading: a god
  chosen_spanish_reading: un dios
  alternative_spanish_readings:
  - Dios
  - una deidad
  rationale: La referencia es a un falso dios fabricado. Capitalizarlo como «Dios» oscurecería la ironía profética y sugeriría erróneamente al Dios de Israel.
  doctrine_reference: Isaías 44:9-20; polémica contra la idolatría
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una forma menos idiomática por «profits nothing». En español se reflejó esa mejora con una construcción natural («para nada aprovechoso») que conserva la idea de inutilidad total del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «dios» en minúscula por tratarse de una deidad fabricada.
  - Se eligió un verbo artesanal («modela», «funde») para conservar el trasfondo de fabricación de ídolos.
  - La nota al pie conserva la alternativa de coordinación del original inglés entre «or» y una lectura más lineal.
