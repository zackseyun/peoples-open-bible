translation:
  language: es
  text: Has repudiado el pacto de tu siervo[a][b]; has profanado su corona hasta la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘rechazado’ / ‘despreciado’ el pacto de tu siervo.
    reason: lexical_alternative
  - marker: b
    text: O ‘profanado su diadema hasta la tierra’. El hebreo para ‘corona’ también puede sugerir consagración.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵאַרְתָּה
  english_pob_choice: have renounced
  chosen_spanish: has renunciado
  alternatives_spanish:
  - has rechazado
  - has despreciado
  - has repudiado
  lexicon: HALOT
  rationale: En el contexto del lamento del salmo, «renunciar» comunica la idea de repudiar o dar por inválido el pacto, no solo sentir rechazo. Mantiene la fuerza de la acción verbal sin sonar demasiado técnica en español.
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - convenio
  - covenant
  lexicon: HALOT
  rationale: «Pacto» es el equivalente natural y reverente en español bíblico para בְּרִית. Conserva el peso jurídico-teológico del término mejor que un «convenio» más débil o secularizado.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: Aquí el contexto es el del rey davídico como agente subordinado de Yahvé; en español «siervo» conserva la relación de dependencia y la dignidad del cargo mejor que «esclavo», que sería más fuerte de lo que requiere este contexto.
- source_word: חִלַּלְתָּ
  english_pob_choice: have defiled
  chosen_spanish: has profanado
  alternatives_spanish:
  - has contaminado
  - has deshonrado
  - has mancillado
  lexicon: HALOT
  rationale: Para un objeto asociado con honor y consagración como la corona, «profanado» preserva bien la tensión de deshonra/sacralidad indicada por חלל. Es más fiel al trasfondo de lo sagrado que «contaminado» o «mancillado».
- source_word: לָאָרֶץ
  english_pob_choice: to the ground
  chosen_spanish: hasta el polvo
  alternatives_spanish:
  - a tierra
  - al suelo
  - hasta el suelo
  lexicon: HALOT
  rationale: El hebreo expresa un movimiento de abatimiento 'a la tierra'. En español, «hasta el polvo» reproduce el descenso humillante con naturalidad poética y mantiene la imagen de caída extrema. La opción «al suelo» sería más literal, pero menos intensa.
- source_word: נִזְרוֹ
  english_pob_choice: his crown
  chosen_spanish: su corona
  alternatives_spanish:
  - su diadema
  - su corona consagrada
  lexicon: HALOT
  rationale: En este salmo real, «corona» es la traducción más clara y directa. Se mantiene, sin explicitarla, la posible resonancia de consagración asociada con נזר, ya reflejada en «profanado».
theological_decisions:
- issue: Tensión entre derrota real y pacto davídico
  english_pob_reading: Preserve covenantal repudiation and royal humiliation without resolving the verse messianically or reducing it to mere political defeat.
  chosen_spanish_reading: Conservar tanto la aparente anulación del pacto como la humillación real, sin adelantar una resolución mesiánica ni convertir el texto en simple derrota política.
  alternative_spanish_readings:
  - Interpretar el verso ya como cumplimiento mesiánico
  - Suavizarlo como si solo describiera revés histórico
  rationale: 'El salmo presenta una crisis teológica real: parece que Dios ha abandonado el pacto y rebajado la corona del rey. La traducción debe dejar visible esa tensión, no resolverla por anticipado.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Coincide con la lectura auditada de alta concordancia; no se requieren revisiones adicionales. Se mantuvo la tensión lexical entre repudiación del pacto y profanación de la corona, sin suavizar la humillación real ni introducir interpretación mesiánica explícita.
  spanish_consistency_notes:
  - Se usó «pacto» para בְּרִית conforme al uso bíblico estable en español.
  - Se usó «siervo» en lugar de «esclavo» por el contexto davídico-royal y para evitar una dureza no requerida por el hebreo aquí.
  - «Profanado» conserva mejor que «mancillado» la referencia a un objeto con posible resonancia sagrada.
  - «Hasta el polvo» traduce la idea de abatimiento extremo de לָאָרֶץ con un modismo español natural y poético.
