translation:
  language: es
  text: Muéstranos tu amor leal[a], Yahvé, y concédenos tu salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Haz que veamos tu amor leal, Yahvé, y concédenos tu salvación».'
