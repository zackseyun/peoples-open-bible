revisions:
- from: Pero si es robado de él[a], deberá restituirlo a su dueño.
  to: Pero si le es robado[a], deberá hacer restitución a su dueño.
  rationale: Se ajustó «de él» a «le es robado» para lograr un español natural que aún preserve la idea de pérdida desde su posesión. Se cambió «restituirlo» por «hacer restitución» para reflejar con mayor precisión el sentido legal de יְשַׁלֵּם, en concordancia con el audit trail inglés. La nota se mantuvo, pero con redacción española más idiomática.
