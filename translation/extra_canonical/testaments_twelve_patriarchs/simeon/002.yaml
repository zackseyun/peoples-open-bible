  text: II. Ἀκούσατε¹, *τέκνα μου², Συμεὼν τοῦ πατρὸς ὑμῶν Γκαὶ ἀναγγελῶ ὑμῖν¹³ ὅσα ἔχω *ἐν τῇ καρδίᾳ μου⁴. 2. Ἐγὼ ἐγεννήθην ἐξ Ἰακὼβ *υἱὸς δεύτερος τῷ πατρὶ μου⁵, *καὶ Λία⁶ ἡ μήτηρ μου ἐκάλεσέ με⁷ Συμεώνα⁸, ὅτι⁹ ἤκουσε Κύριος τῆς δεήσεως αὐτῆς¹⁰. 3. *Δυνατὸς γὰρ ἐγενόμην¹¹ σφόδρα οὐκ ἐδειλίασα¹² πρᾶξιν¹³ οὐδὲ ἐφοβήθην *ἀπὸ παντὸς πράγματος¹⁴. 4. Ἡ γὰρ καρδία μου ἦν σκληρά, καὶ *τὰ ἤπατά¹⁵ μου ἀκίνητα καὶ τὰ σπλάγχνα μου ἀσυμπαθῆ¹⁶. 5. *Ἐπειδὴ καὶ¹⁷ ἡ ἀνδρεία¹⁸ ἀπὸ¹⁹ ὑψίστου δίδοται²⁰ τοῖς²¹ ἀνθρώποις ἐν ψυχαῖς καὶ²² σώμασιν. 6. *Ἐν γὰρ τῷ καιρῷ τῆς νεότητός μου πολλὰ²³ ἐζήλωσα²⁴ τὸν²⁵ Ἰωσήφ, ὅτι²⁶ *ἠγάπα αὐτὸν ὁ πατήρ μου²⁷ Γπαρὰ πάντας⁷²⁸ 7. καὶ²⁹ ἐστήριξα³⁰ ἐπʼ³¹ αὐτὸν τὰ ἤπατά μου ὥστε³² ἀνελεῖν αὐτόν, *ὅτι ὁ ἄρχων³³ τῆς πλάνης καὶ³⁴ τὸ πνεῦμα τοῦ ζήλου³⁵ ἐτύφλωσέ μου τὸν νοῦν, *μὴ προσέχειν³⁶ *αὐτῷ ὡς ἀδελφῷ³⁷, μηδὲ³⁸ φείσασθαι *τῷ πατρί μου Ἰακὼβ³⁹. 8. Ἀλλ᾿ ὁ θεὸς⁴⁰ αὐτοῦ καὶ⁴¹ ὁ θεὸς *τῶν πατέρων⁴² ἡμῶν⁴³ *ἀπέστειλε τὸν ἄγγελον αὐτοῦ καὶ⁴⁴ ἐρρύσατο⁴⁵ αὐτὸν ἐκ τῶν χειρῶν μου⁴⁶. 9. Ὡς γὰρ⁴⁷ ἐγὼ ἐπορεύθην⁴⁸ *ἐν Σικίμοις⁴⁹ ἐνέγκαι⁵⁰ ἄλειμμα⁵¹ τοῖς ποιμνίοις⁵² καὶ Ῥουβὶμ⁵³ εἰς⁵⁴ Δοθαείμ⁵⁵, ὅπου⁵⁶ τὰ ἐγχρῄζοντα⁵⁷ ἡμῖν⁵⁸ καὶ πᾶσα⁵⁹ ἡ ἀπόθεσις ἦν⁶⁰, Ἰούδας⁶¹ ὁ ἀδελφός μου⁶² ἐπώλησεν αὐτὸν⁶³ ἐλθὼν τοῖς Ἰσμαηλίταις. 10. Καὶ *ὁ Ῥουβὶμ ἀκούσας ταῦτα⁶⁴ ἐλυπήθη⁶⁵. ἤθελε⁶⁶ γὰρ αὐτὸν⁶⁷ ἀπαγαγεῖν⁶⁸ πρὸς τὸν πατέρα⁶⁹. 11. Ἐγὼ δὲ⁷⁰ *ταῦτα ἀκούσας⁷¹ ὠργίσθην ἐπὶ⁷² τὸν⁷³ Ἰούδαν⁷⁴ Γσφόδρα⁷⁵, ὅτι⁷⁶ ζῶντα αὐτὸν ἀπέλυσεν· καὶ *ἐποίησα μῆνας πέντε ὀργιζόμενος ἐπʼ αὐτῷ⁷⁷. 12. Καίγε συνετρίβει με *ὁ Κύριος⁷⁸ καὶ ἐκώλυσεν δράσιν⁷⁹ *ἀπʼ ἐμοῦ⁸⁰. *ὅτι ἡ χείρ μου ἡ δεξιὰ ἡμίξηρος γέγονεν ἐπὶ ἡμέρας ἑπτά⁸¹. 13. Καὶ ἔγνων, τέκνα⁸², ὅτι *περὶ Ἰωσὴφ⁸³ *τοῦτό μοι συνέβη⁸⁴. καὶ⁸⁵ μετανοήσας ἔκλαυσα⁸⁶ καὶ⁸⁷ ηὐξάμην *Κυρίῳ τῷ Θεῷ⁸⁸ ἵνα⁸⁹ *ἀποκατασταθῇ ἡ χείρ μου⁹⁰ καὶ⁹¹ ἀποσχῶ⁹² ἀπὸ *παντὸς μολυσμοῦ καὶ φθόνου⁹³ Γκαὶ ἀπὸ πάσης ἀφροσύνης⁷. 14. Ἔγνων⁹⁴ γὰρ ὅτι πονηρὸν πρᾶγμα ἐνεθυμήθην ἐνώπιον κυρίου⁹⁵ καὶ⁹⁶ *Ἰακὼβ τοῦ πατρός μου⁹⁷ *διὰ Ἰωσὴφ⁹⁸ *τὸν ἀδελφόν μου, φθονήσας αὐτῷ⁹⁹.
