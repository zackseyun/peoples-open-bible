translation:
  language: es
  text: Así que, cuando oyó que estaba enfermo[a], entonces permaneció dos días en el lugar donde estaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que está enfermo». El griego usa el presente después de «oyó», pero en español suele expresarse naturalmente en pasado en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς οὖν
  english_pob_choice: So when
  chosen_spanish: Así que, cuando
  alternatives_spanish:
  - Entonces, cuando
  - Pues, cuando
  - Cuando, pues
  lexicon: BDAG
  rationale: La combinación introduce avance narrativo e inferencia. «Así que, cuando» conserva la relación lógica de οὖν y el valor temporal de ὡς con un español natural y solemne.
- source_word: ἤκουσεν
  english_pob_choice: he heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  - tuvo noticia
  lexicon: BDAG
  rationale: El aoristo de ἀκούω se rinde de manera directa como «oyó». En este contexto narrativo, no hace falta añadir una glosa interpretativa como «se enteró».
- source_word: ὅτι ἀσθενεῖ
  english_pob_choice: that he was sick
  chosen_spanish: que estaba enfermo
  alternatives_spanish:
  - que estaba enfermo[a]
  - que estaba débil
  - que estaba malo
  lexicon: BDAG
  rationale: ἀσθενέω aquí describe una enfermedad física. «Enfermo» es el equivalente natural en español; el presente griego tras «oyó» puede reflejarse con pasado en español sin perder el sentido, como muestra el POB inglés.
- source_word: τότε μὲν
  english_pob_choice: he then
  chosen_spanish: entonces
  alternatives_spanish:
  - entonces en verdad
  - entonces sí
  - entonces precisamente
  lexicon: BDAG
  rationale: La partícula μέν aporta un matiz leve de transición/anticipación, pero en español puede quedar incorporada de forma sobria en «entonces» sin forzar una redundancia artificial.
- source_word: ἔμεινεν
  english_pob_choice: he stayed
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - se quedó allí
  - permaneció allí
  lexicon: BDAG
  rationale: μένω en este contexto expresa permanecer en un lugar. «Permaneció» mantiene la fuerza locativa con un registro digno y claro.
- source_word: ἐν ᾧ ἦν τόπῳ
  english_pob_choice: in the place where he was
  chosen_spanish: en el lugar donde estaba
  alternatives_spanish:
  - donde estaba
  - en el lugar en que estaba
  - en el mismo lugar donde estaba
  lexicon: BDAG
  rationale: La construcción griega repite la idea de localización. «En el lugar donde estaba» conserva esa referencia espacial sin sobreparafrasear.
- source_word: δύο ἡμέρας
  english_pob_choice: two days
  chosen_spanish: dos días
  lexicon: BDAG
  rationale: Duración directa y unívoca del acusativo temporal.
theological_decisions:
- issue: La demora de Jesús tras oír la enfermedad de Lázaro
  english_pob_reading: Render the statement plainly without softening or explaining the delay.
  chosen_spanish_reading: Presentar la afirmación con sobriedad, sin suavizar ni explicar la demora.
  alternative_spanish_readings:
  - Introducir una paráfrasis que sugiera estrategia compasiva
  - Atenuar la frase para reducir la tensión aparente
  rationale: 'La frase conserva la tensión narrativa: al oír que estaba enfermo, permaneció dos días más. La traducción no debe resolver esa tensión por adelantado.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa reciente simplificó «then indeed stayed» a «he then stayed» para mayor naturalidad. La versión española sigue esa misma decisión de evitar una intensificación artificial, manteniendo el orden y la tensión narrativa del original.
  spanish_consistency_notes:
  - «Yahvé» no aplica aquí; se mantiene la referencia narrativa sin nombres divinos.
  - Se usa «enfermo» para ἀσθενεῖ, no «débil», porque el contexto de Lázaro es de enfermedad física.
  - Se evita «quedó» como única solución para no perder el matiz de permanencia en un lugar.
  - La nota textual sobre el presente griego se preserva como alternativa legítima en español, anclada en el versículo.
