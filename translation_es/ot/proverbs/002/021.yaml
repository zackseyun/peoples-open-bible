translation:
  language: es
  text: Porque los rectos habitarán en el país[a], y los íntegros permanecerán en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra». El hebreo אָרֶץ puede denotar «tierra» o «país/territorio»; aquí se eligió «el país» porque el contexto enfatiza permanecer en un lugar de habitación o ser removido de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Entonces
  lexicon: HALOT
  rationale: כִּי aquí introduce la explicación o fundamento de la advertencia/promesa anterior; en español, «Porque» conserva con naturalidad esa relación lógica sin volver la frase forzada.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los íntegros
  - los justos
  - los honestos
  lexicon: HALOT
  rationale: El adjetivo apunta a personas moralmente rectas. «Los rectos» mantiene la imagen ética de manera clara y menos interpretativa que «los justos», que en español puede sonar más cargado teológicamente.
- source_word: יִשְׁכְּנוּ
  english_pob_choice: will dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - morarán
  - vivirán
  - se establecerán
  lexicon: HALOT
  rationale: El verbo שכן expresa residencia estable. «Habitarán» conserva el matiz de permanencia y encaja bien en el registro sapiencial.
- source_word: אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra habitable
  - el territorio
  lexicon: HALOT
  rationale: La POB inglesa eligió «the land» por el énfasis contextual en permanecer en un lugar de habitación. En español, «la tierra» es la forma más natural y amplia para ese valor, sin imponer una lectura territorial demasiado estrecha.
- source_word: וּתְמִימִים
  english_pob_choice: the blameless
  chosen_spanish: los íntegros
  alternatives_spanish:
  - los sin mancha
  - los irreprensibles
  - los blameless
  lexicon: HALOT
  rationale: תמימים denota integridad, completitud y ausencia de defecto moral. «Los íntegros» comunica bien esa idea en español y evita una formulación excesivamente eclesiástica o técnica.
- source_word: יִוָּתְרוּ
  english_pob_choice: will remain
  chosen_spanish: permanecerán
  alternatives_spanish:
  - quedarán
  - serán dejados
  - subsistirán
  lexicon: HALOT
  rationale: El nifal de יתר tiene la idea de quedar o permanecer. «Permanecerán» expresa continuidad de presencia en la tierra con naturalidad y sin perder el sentido de ser dejados/quedándose.
- source_word: בָהּ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en la tierra
  - allí
  lexicon: HALOT
  rationale: El sufijo pronominal remite a «la tierra». «En ella» preserva ese enlace anafórico de forma concisa y idiomática en español.
theological_decisions:
- issue: Alcance de אָרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el mundo
  - la tierra habitada
  rationale: Siguiendo la decisión inglesa, se mantiene el sentido concreto de un lugar de habitación. «La tierra» comunica bien ese valor en español y deja abierta la posibilidad contextual sin obligar a una interpretación cosmológica.
  doctrine_reference: Sabiduría bíblica sobre la permanencia de los rectos e íntegros frente a la remoción de los impíos en el contexto inmediato.
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo directo y el audit trail inglés: כִּי como conector explicativo, יְשָׁרִים/תְמִימִים como pares éticos, יִשְׁכְּנוּ y יִוָּתְרוּ como verbos de residencia/permanencia, y אָרֶץ como espacio habitable. No se introdujeron términos doctrinalmente cargados fuera de lo que el hebreo y la POB inglesa sostienen.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o «Cristo» porque el versículo no contiene los términos correspondientes.
  - Se mantuvo el paralelismo entre «rectos» e «íntegros» para conservar la doble descripción ética del hebreo.
  - «En ella» conserva el referente de «la tierra» sin repetirlo innecesariamente.
