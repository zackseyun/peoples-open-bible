translation:
  language: es
  text: Levántate, Yahvé, en tu ira; álzate[a] contra la furia de mis enemigos; despierta por mí[b]; has decretado juicio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sé exaltado»; el verbo hebreo también puede expresar elevación o exaltación.
    reason: lexical_alternative
  - marker: b
    text: O «despierta a mi favor»; literalmente, «despierta hacia mí», es decir, en mi favor.
    reason: lexical_alternative
  - marker: c
    text: O «el juicio que has ordenado».
    reason: alternative_reading
lexical_decisions:
- source_word: קוּמָה
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántate!
  alternatives_spanish:
  - ¡Levántate!
  - ¡Alzate!
  - ¡Ponte en pie!
  lexicon: HALOT
  rationale: El imperativo de קום dirigido a Dios pide acción. «Levántate» es natural en español, mantiene el tono poético y conserva la imagen de ponerse en acción sin suavizarla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio terminológico del proyecto, en lugar de sustituirlo por un título.
- source_word: בְּאַפֶּךָ
  english_pob_choice: in your anger
  chosen_spanish: en tu ira
  alternatives_spanish:
  - en tu ira
  - con tu ira
  - en tu enojo
  lexicon: HALOT
  rationale: אַף denota literalmente nariz/ventanas de la nariz y por extensión ira. Aquí el sentido idiomático es claramente emocional-judicial; «ira» es el equivalente español más transparente y digno.
- source_word: הִנָּשֵׂא
  english_pob_choice: lift yourself up
  chosen_spanish: álzate
  alternatives_spanish:
  - álzate
  - levántate
  - sé exaltado
  lexicon: HALOT
  rationale: El nifal imperativo conserva una fuerza reflexiva o pasiva-accional. En español, «álzate» mantiene mejor la imagen de elevarse para actuar que una formulación más abstracta como «sé exaltado».
- source_word: בְּעַבְר֣וֹת
  english_pob_choice: against the fury of
  chosen_spanish: contra la furia de
  alternatives_spanish:
  - contra la furia de
  - ante la furia de
  - en la furia de
  lexicon: HALOT
  rationale: עֶבְרָה expresa arrebatos de furor o furia. Con ב en un contexto hostil, «contra la furia de» reproduce con naturalidad la relación adversativa que el inglés POB ya había perfilado.
- source_word: צוֹרְרַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis enemigos
  - mis adversarios
  - los que me hostigan
  lexicon: HALOT
  rationale: El participio sustantivado de צרר designa adversarios hostiles. «Mis enemigos» comunica el valor léxico con claridad y sin añadir matices no presentes en el hebreo.
- source_word: וְעוּרָה
  english_pob_choice: awake
  chosen_spanish: despierta
  alternatives_spanish:
  - despierta
  - vuélvete a despertar
  - espabílate
  lexicon: HALOT
  rationale: El imperativo de עור mantiene el paralelismo con los llamados previos a la acción divina. «Despierta» conserva el lenguaje antropomórfico poético sin sobredibujarlo.
- source_word: אֵלַי
  english_pob_choice: for me
  chosen_spanish: por mí
  alternatives_spanish:
  - por mí
  - para mí
  - a mi favor
  lexicon: HALOT
  rationale: Aunque literalmente significa «a mí», en este contexto jurídico-rogatorio la fuerza es benefactiva. «Por mí» expresa bien la idea de intervenir en favor del salmista y permite una cadencia natural en español.
- source_word: מִשְׁפָּט
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - juicio
  - sentencia
  - decisión judicial
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט apunta a una acción/decisión judicial. «Juicio» es una solución clara en español y mantiene el ambiente forense del verso.
- source_word: צִוִּיתָ
  english_pob_choice: you have appointed
  chosen_spanish: has decretado
  alternatives_spanish:
  - has decretado
  - has ordenado
  - has dispuesto
  lexicon: HALOT
  rationale: 'Con מִשְׁפָּט, צוה puede comunicar más que un simple mandato: una determinación judicial establecida por Dios. «Has decretado» recoge bien esa fuerza de decisión solemne sin perder la relación con el acto soberano.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahweh
  rationale: El hebreo usa directamente el Tetragrámaton. La versión española conserva el nombre divino con la forma establecida del proyecto, evitando una sustitución titulada que borraría el nombre propio revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lenguaje antropomórfico de súplica dirigido a Dios
  english_pob_reading: Retain the poetic imperatives literally ('Rise up... lift yourself up... awake')
  chosen_spanish_reading: Conservar literalmente los imperativos poéticos ('Levántate... álzate... despierta')
  alternative_spanish_readings:
  - Parafrasear como 'actúa... intervén... responde'
  - Suavizar a expresiones no antropomórficas
  rationale: El hebreo presenta una oración vívida y poética. Mantener los imperativos preserva la retórica del salmo y no introduce una paráfrasis interpretativa que el texto no exige.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense; do not paraphrase beyond what the source warrants'
translation_notes:
  revision_awareness: 'La redacción inglesa más reciente cambió «rage» por «fury» para ajustar mejor עַבְרוֹת y sustituyó el guion por punto y coma en la segmentación. La propuesta española refleja ese ajuste con «furia» y una estructura rítmica equivalente, manteniendo el final como una afirmación forense: «has decretado juicio».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la terminología del proyecto para יְהוָה.
  - «Ira» se usa para בְּאַפֶּךָ, mientras que «furia» se reserva para עַבְרוֹת, distinguiendo dos matices léxicos diferentes.
  - Se preserva el tono de súplica poética con imperativos directos sin convertirlos en paráfrasis explicativa.
  - «Juicio» se eligió por su naturalidad en español y por conservar el marco judicial del verso.
