    text: 'O: «La segunda suerte cayó para Simeón». El hebreo dice literalmente «salió», refiriéndose al resultado de echar suertes.'
    reason: lexical_alternative
  - marker: b
    text: «Hijos de Simeón» y «hijos de Judá» son designaciones tribales hebreas; se refieren a los descendientes o miembros de esas tribus.
    reason: cultural_note
  revision_rationale: Se conserva el texto casi por completo porque es fiel al hebreo y al audit trail inglés. Solo se corrige la nota cultural [b] para abarcar ambas expresiones tribales documentadas y se suaviza la puntuación para una lectura más natural en español.
