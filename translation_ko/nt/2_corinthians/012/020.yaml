  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: φοβοῦμαι γὰρ μή πως ἐλθὼν οὐχ οἵους θέλω εὕρω ὑμᾶς, κἀγὼ εὑρεθῶ ὑμῖν οἷον οὐ θέλετε, μή πως ⸀ἔρις, ⸀ζῆλος, θυμοί, ἐριθεῖαι, καταλαλιαί, ψιθυρισμοί, φυσιώσεις, ἀκαταστασίαι·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/012/020.yaml
  text: For I fear that perhaps when I come I may find you not as I wish[a], and I may be found by you to be as you do not wish—that perhaps there may be strife, jealousy, outbursts of anger, selfish ambition,
    slanders, whisperings, conceit, and disorder.
translation:
  language: ko
  text: 내가 두려워하는 것은, 혹시 내가 가서 여러분을 내가 원하는 대로 보지 못하고, 여러분도 나를 여러분이 원하지 않는 모습으로 보게 되는 것입니다. 또 다툼과 시기와 분노와 이기적 야망과 비방과 수군거림과 교만과 무질서가 있지 않을까 두렵습니다.
  philosophy: optimal-equivalence
lexical_decisions:
