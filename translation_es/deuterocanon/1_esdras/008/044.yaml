  glossary_alignment: No hay términos teológicos mayores en juego. Se respeta correctamente la política de conservar transliteraciones griegas de nombres cuando el testimonio es incierto. La nota textual está alineada con el rastro de auditoría inglés. El ajuste principal es estilístico-lexical en español, no de glosario doctrinal.
