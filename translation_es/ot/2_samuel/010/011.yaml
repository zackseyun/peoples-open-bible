  glossary_alignment: 'Buena alineación con la terminología del proyecto: se mantiene «Aram» y no se introduce terminología teológica innecesaria para לִישׁוּעָה. No hay conflicto con los glosarios principales. La única corrección necesaria es de aparato de notas y una leve mejora de estilo.'
