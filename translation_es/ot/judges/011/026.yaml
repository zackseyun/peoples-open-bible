review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: marco temporal durativo, topónimos, asentamientos subordinados, ciudades junto al Arnón, duración de trescientos años y pregunta retórica sobre no recobrar el territorio. Sin embargo, hay un desajuste gramatical importante: הִצַּלְתֶּם es 2mp, pero el español dice «recuperaste» (2sg). También conviene ajustar «en ese tiempo» a «durante ese tiempo» para reflejar mejor que בָּעֵת הַהִיא aquí abarca todo el período, conforme al audit trail inglés.'
  spanish_quality_summary: El español es claro y natural, con tono digno y ampliamente legible. «Ciudades dependientes» funciona bien para בנותיה, aunque la segunda mención carece del anclaje de nota y debería repetirse para consistencia si se mantiene la explicación cultural para ambas ocurrencias. «Por trescientos años» es aceptable, pero «durante trescientos años» y «durante ese tiempo» suenan algo más naturales en este contexto.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La elección «ciudades dependientes» para בנותיה se alinea con la racionalidad documentada, apoyada por nota. «Recuperar» concuerda con la decisión léxica inglesa para הִצַּלְתֶּם en contexto territorial.
  issues:
  - severity: high
    issue: Discordancia de persona verbal en «¿por qué no las recuperaste...?»
    rationale: 'El hebreo הִצַּלְתֶּם es segunda persona masculina plural; el español debe reflejar plural: «recuperaron» o, más directamente, «recuperasteis/recuperaron ustedes». En español latinoamericano neutral, «no las recuperaron» encaja mejor en pregunta retórica dirigida al grupo.'
  - severity: medium
    issue: «en ese tiempo» debilita el valor durativo del período completo
    rationale: El audit trail corrigió el inglés a «during that time» precisamente para evitar una referencia puntual. En español, «durante ese tiempo» preserva mejor la extensión del período de trescientos años.
  - severity: low
    issue: La nota cultural [a] solo se ancla en la primera ocurrencia de «ciudades dependientes»
    rationale: No es incorrecto, pero repetir el anclaje en ambas ocurrencias puede ayudar al lector dado que la expresión hebrea aparece dos veces. Aun así, una sola nota es suficiente si se entiende que explica el modismo en general.
  revised_spanish_text: Mientras Israel ha habitado en Hesbón y en sus ciudades dependientes[a], y en Aroer y en sus ciudades dependientes, y en todas las ciudades que están a lo largo del Arnón, durante trescientos años[b], ¿por qué no las recuperaron durante ese tiempo?
  revised_footnotes:
