    rationale: El contexto describe la integridad moral personal de David al no matar a Saúl. En español, «justicia» puede evocar más un concepto jurídico o social; «rectitud» comunica mejor la cualidad ética individual que el inglés auditado explicó como ‘moral uprightness/integrity’.
  - severity: medium
    issue: La nota [b] está anclada en «mi mano», pero su contenido explica «el ungido de Yahvé».
    rationale: Las instrucciones requieren que el marcador aparezca en la palabra o frase relevante. Tal como está, induce a error porque parece glosar «mi mano» en vez de «el ungido de Yahvé».
