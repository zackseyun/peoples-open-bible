translation:
  language: es
  text: Entonces Yahvé habló a Moisés, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «Entonces» conserva esa progresión en español sin sonar artificial. «Habló» refleja con más precisión el verbo דבר en la fórmula narrativa que un simple «dijo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino, no un sustituto титular. «Yahvé» es la forma española usual en este proyecto para יְהוָה y preserva el valor del nombre del pacto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla; en español natural, «a» expresa mejor el objeto indirecto que «hacia» o «para».
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moshé
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española tradicional y ampliamente reconocible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: La forma introductoria de discurso se conserva con «diciendo», que reproduce la función formulaica de לֵאמֹר sin añadir contenido interpretativo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Siguiendo la política del proyecto, se traduce como el nombre propio divino en español («Yahvé»), evitando la sustitución por un título como «el SEÑOR» para preservar la referencia al nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Speech-introduction formula with לֵאמֹר
  english_pob_reading: saying
  chosen_spanish_reading: diciendo
  alternative_spanish_readings:
  - para decir
  - 'así:'
  rationale: La fórmula funciona como marcador de que sigue el discurso directo; «diciendo» mantiene esa relación sin convertirla en una paráfrasis explicativa.
  doctrine_reference: Hebrew narrative discourse formula
translation_notes:
  revision_awareness: 'El pasaje coincide estrechamente con la traducción inglesa auditada: misma estructura narrativa, mismo nombre divino preservado y misma fórmula de introducción del discurso. No se requieren notas textuales ni variantes.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» conforme a la terminología del proyecto.
  - Se usa «Moisés» como forma española estándar del nombre propio.
  - La puntuación reproduce la cadencia de introducción narrativa breve del hebreo y del texto inglés auditado.
