translation:
  language: es
  text: 'En el tiempo de su angustia[a], siguió actuando infielmente contra Yahvé: él, el rey Acaz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «añadió a actuar infielmente contra Yahvé», un giro idiomático que significa que continuó o fue más lejos en su infidelidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְעֵת
  english_pob_choice: In the time of
  chosen_spanish: En el tiempo de
  alternatives_spanish:
  - Al tiempo de
  - Durante
  lexicon: HALOT
  rationale: La construcción temporal marca el marco de la acción. «En el tiempo de» conserva bien el valor formal y suena natural en español.
- source_word: הָצֵר לוֹ
  english_pob_choice: his distress
  chosen_spanish: su angustia
  alternatives_spanish:
  - su aflicción
  - su apuro
  - cuando estaba angustiado
  lexicon: HALOT
  rationale: El hebreo presenta una noción nominal de presión o aflicción sobre él. «Su angustia» preserva la idea temporal y el matiz de presión sin volverlo demasiado explicativo.
- source_word: וַיּוֹסֶף
  english_pob_choice: he continued
  chosen_spanish: siguió
  alternatives_spanish:
  - continuó
  - prosiguió
  - volvió a
  lexicon: HALOT
  rationale: יסף + infinitivo expresa aquí la idea de continuar o seguir haciendo algo. «Siguió» transmite de manera natural esa continuidad en español.
- source_word: לִמְעוֹל
  english_pob_choice: to act unfaithfully
  chosen_spanish: agravando su infidelidad
  alternatives_spanish:
  - actuar con infidelidad
  - ser infiel
  - cometer infidelidad
  lexicon: HALOT
  rationale: מעל implica quebrantar la lealtad debida, con fuerte carga moral y de pacto. «Agravando su infidelidad» intenta reflejar el giro idiomático de «añadir a actuar infielmente» y la progresión enfatizada por el hebreo.
- source_word: בַּיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra Yahweh
  - contra el SEÑOR
  lexicon: HALOT
  rationale: Según la terminología del proyecto, יהוה se rinde como «Yahvé» en el texto principal. Con מעל, la preposición señala a la persona contra quien se comete la infidelidad, por eso se mantiene «contra».
- source_word: הַמֶּלֶךְ אָחָז
  english_pob_choice: King Ahaz
  chosen_spanish: el rey Acaz
  alternatives_spanish:
  - Acaz, el rey
  - el rey, Acaz
  lexicon: HALOT
  rationale: La frase es identificadora y enfática. «El rey Acaz» es la formulación más natural en español y conserva la aposición del hebreo.
theological_decisions:
- issue: Renderización del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El proyecto pide usar «Yahvé» para יהוה en el texto principal. Se mantiene el nombre del pacto en vez de la sustitución litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido del modismo verbal con מעל
  english_pob_reading: he continued to act unfaithfully
  chosen_spanish_reading: siguió agravando su infidelidad
  alternative_spanish_readings:
  - continuó actuando con infidelidad
  - volvió a ser infiel
  - persistió en su infidelidad
  rationale: El hebreo no solo indica repetición, sino avance en la infidelidad. La solución española conserva la tensión entre continuidad e intensificación sin diluir la carga moral.
  doctrine_reference: Lexical/theological note on מעל as covenant unfaithfulness
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el auditorio inglés de POB. La principal decisión fue conservar la progresión del verbo יסף + infinitivo en una formulación española que no suene mecánica, y mantener Yahvé conforme a la terminología del proyecto. No se observan cambios textuales adicionales respecto del informe de revisión más reciente.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יהוה.
  - «Infidelidad» se emplea para מעל en su carga de pacto/relación, evitando suavizarlo a simple «error».
  - 'La puntuación con raya conserva el énfasis apposicional del hebreo: «él, el rey Acaz».'
