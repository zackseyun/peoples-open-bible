theological_decisions:
- issue: Reference of 'my great-grandfather ... the seventh from Adam'
  chosen_reading: The speaker refers to Enoch himself as the one taken up, identified genealogically as seventh from Adam.
  alternative_readings:
  - The phrase could be read more loosely as 'my ancestor' without specifying the exact kinship term.
  rationale: Within 1 Enoch, the first-person speaker is Enoch, and 'the seventh from Adam' is a standard self-identification. The verse locates the dwelling of the chosen and righteous in relation to the place where Enoch was taken up.
  doctrine_reference: Preserve theological tension rather than resolve it; render the local passage first.
- issue: Meaning of the wilderness description 'not seen'
  chosen_reading: Main text renders the place as 'a desolate wilderness,' with uncertainty noted in a footnote.
  alternative_readings:
  - '''an invisible desert'''
  - '''a wilderness that cannot be seen'''
  - '''a trackless waste'''
  rationale: The Ge'ez wording is difficult in this Ge'ez-only section. A readable rendering is given in the main text, while preserving the lexical uncertainty in a footnote rather than overstating confidence.
  doctrine_reference: When the sense is uncertain, prefer careful English plus a footnote over false confidence.
