revisions:
- from: Y el que sea tomado con el [a] objeto dedicado será quemado con fuego, él y todo lo que le pertenece, porque ha transgredido el pacto de Yahvé y porque ha hecho una cosa abominable en Israel.
  to: Y el que sea tomado con el objeto dedicado[a] será quemado con fuego, él y todo lo que le pertenece, porque ha transgredido el pacto de Yahvé y porque ha hecho una cosa infame en Israel.
  rationale: Se corrige la colocación del marcador y la sintaxis del sintagma con חֵרֶם para que el español sea natural sin perder la decisión léxica auditada. Además, se sustituye «cosa abominable» por «cosa infame» para reflejar mejor el sentido moralmente escandaloso de נְבָלָה en este contexto. La nota se mantiene y se pule levemente para mayor claridad.
