base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/012/006.yaml
  text: And there you shall bring your burnt offerings[a], your sacrifices, your tithes, the contribution of your hand, your vow offerings, your freewill offerings[b], and the firstborn of your herd and of your flock.
  footnotes:
