review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: שְׁאָר ... יָשׁוּב = «remanente ... volverá»; שְׁאָר יַעֲקֹב = «el remanente de Jacob»; אֶל = «a/al». También preserva correctamente la lectura teológica principal de אֵל גִּבּוֹר como título divino. Sin embargo, la nota [a] está mal anclada: el marcador aparece sobre «volverá», pero la nota trata de alternativas para אֵל גִּבּוֹר, no para el verbo. Además, la redacción principal puede alinearse mejor con el inglés POB y con el título hebreo usando artículo: «el Dios Poderoso».'
  spanish_quality_summary: El español es claro y eclesialmente legible. «Remanente» y «volverá» suenan naturales y dignos. No obstante, «al Dios Poderoso» en el texto principal mejora la idiomaticidad y la correspondencia con el título inglés «the Mighty God». También conviene corregir la ubicación del marcador [a] para evitar confusión del lector.
  glossary_alignment: No hay conflicto con los términos globales del proyecto. «Jacob» se conserva correctamente. No aparece Yahvé ni Mesías en este versículo. La elección «remanente» es adecuada en Isaías. Para אֵל גִּבּוֹר, «Dios Poderoso» es aceptable, pero «el Dios Poderoso» expresa mejor el valor titular definido documentado en el POB.
  issues:
  - severity: medium
    issue: El marcador [a] está colocado en «volverá», pero la nota explica alternativas de אֵל גִּבּוֹר.
    rationale: Las notas deben anclarse en la palabra o frase relevante. Tal como está, induce a pensar que la nota comenta el verbo «volverá» cuando en realidad comenta el título divino.
  - severity: low
    issue: Falta el artículo en el título divino dentro del texto principal.
    rationale: Aunque «al Dios Poderoso» ya aparece por la contracción con «a», la forma de cita léxica y la alineación con «the Mighty God» se expresan mejor como «al el Dios Poderoso» no es posible; por eso la solución es mantener «al Dios Poderoso» en el texto pero reubicar la nota al sintagma completo. El problema real es menor y se resuelve con el anclaje adecuado.
  - severity: low
    issue: La nota [a] comienza con «O «al Dios Poderoso»», que no refleja bien la alternativa inglesa principal.
    rationale: La nota inglesa ofrece primero «Or 'to God the Mighty One'». En español conviene reflejar mejor la alternativa como «O «a Dios, el Poderoso»» o similar, en vez de repetir casi exactamente el texto principal.
  revised_spanish_text: Un remanente volverá, el remanente de Jacob[b], al Dios Poderoso[a].
