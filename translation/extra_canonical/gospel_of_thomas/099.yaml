translation:
  text: The disciples said to him[a], "Your brothers and your mother are standing
    outside." He said to them, "Those here who do the will of my Father—these are
    my brothers and my mother[f][e][d][c][b]. They are the ones who will enter the
    kingdom of my Father."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'are standing before them, outside' (ⲛⲧⲟⲟⲩⲱϩ ⲉⲣⲁⲧ ⲛⲧⲟⲟⲩ ϩⲓ ⲡⲥⲁ ⲛⲃⲟⲗ).
      The prepositional phrase may be redundant with 'outside.'
    reason: dialect_note
  - marker: b
    text: '''Those here'' renders ⲡⲉⲧⲉⲣⲉⲛⲡⲉⲓⲙⲁ, literally ''the ones in this place.'''
    reason: lexical_alternative
  - marker: c
    text: ⲟⲩⲱϣ can mean 'wish/desire' as well as 'will.'
    reason: lexical_alternative
  - marker: d
    text: '''Enter'' translates ⲁⲃⲱⲕ ⲉϩⲟⲩⲛ; ''go in'' is an equally literal option.'
    reason: lexical_alternative
  - marker: e
    text: '''Kingdom'' (ⲙⲛⲧⲣⲣⲟ) is the abstract of ''king'' (ⲣⲣⲟ), literally ''the
      (thing) of king.'''
    reason: cultural_note
  - marker: f
    text: Compare the family saying in Mark 3:31–35; Matthew 12:46–50; Luke 8:19–21.
      Thomas uniquely adds 'they will enter the Father’s kingdom.'
    reason: cross_reference
lexical_decisions:
- source_word: ⲥⲛⲏⲩ
  chosen: brothers
  alternatives:
  - siblings
  lexicon: Crum, s.v. ⲥⲛⲏⲩ
  rationale: In Sahidic typically male siblings; broader "siblings" is possible, but
    the idiom aligns with family kinship language in Thomas.
- source_word: ⲙⲁⲁⲩ
  chosen: mother
  lexicon: Crum, s.v. ⲙⲁⲁⲩ
  rationale: Standard term for "mother."
- source_word: ⲛⲧⲟⲟⲩⲱϩ (with ⲁϩⲉ in ms.)
  chosen: are standing
  alternatives:
  - are set/posted
  lexicon: Crum, s.v. ⲟⲩϩ/ⲧⲟⲟⲩⲱϩ; Layton, Grammar §91
  rationale: 'Describes a current state: they are in a standing position (outside).'
- source_word: ϩⲓ ⲡⲥⲁ ⲛⲃⲟⲗ
  chosen: outside
  alternatives:
  - outdoors
  - outside there
  lexicon: Crum, s.v. ⲥⲁ; Layton, Lexicon s.v. ⲥⲁ ⲛⲃⲟⲗ
  rationale: Set phrase for exterior location; concise "outside" conveys it well.
- source_word: ⲉⲣⲁⲧⲟⲩ
  chosen: (lit.) before them
  alternatives:
  - in front of them
  lexicon: Crum, s.v. ⲉⲣⲁⲧ-
  rationale: Prepositional phrase present in the manuscript; likely redundant with
    "outside" or a scribal carryover. Not rendered in the main line to avoid awkwardness,
    but noted as a literal nuance.
- source_word: ⲡⲉⲓⲙⲁ
  chosen: here
  alternatives:
  - in this place
  lexicon: Crum, s.v. ⲡⲉⲓⲙⲁ
  rationale: Deictic "this place"; Thomas frequently uses it for immediate presence.
    "Those here" preserves the deictic feel.
- source_word: ⲉⲓⲣⲉ ⲛⲡⲟⲩⲱϣ
  chosen: do the will
  alternatives:
  - perform the wish/desire
  lexicon: Crum, s.v. ⲟⲩⲱϣ; Lambdin, Intro to Sahidic §173
  rationale: Fixed idiom; ⲟⲩⲱϣ has range 'wish/desire/will'. In this theological context
    'will' is apt.
- source_word: ⲡⲁⲉⲓⲱⲧ
  chosen: my Father
  lexicon: Crum, s.v. ⲉⲓⲱⲧ
  rationale: Possessive with first person singular; retained as 'my Father' (not generalized).
- source_word: ⲁⲃⲱⲕ ⲉϩⲟⲩⲛ
  chosen: enter
  alternatives:
  - go in
  lexicon: Crum, s.v. ⲃⲱⲕ; Layton, Grammar §120
  rationale: Compound motion 'go' + 'in(to)'; English 'enter' is concise and accurate.
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: kingdom
  alternatives:
  - realm
  lexicon: Layton, Lexicon s.v. ⲣⲣⲟ; Crum, s.v. ⲣⲣⲟ
  rationale: Abstract formation mnt- + 'king' = 'kingdom'; well-established equivalent.
textual_note: 'No lacunae in Dilley''s edition for this saying. Orthography shows
  assimilation: the ms. reads ⲉⲧⲙⲛ̄ⲧⲉⲣⲟ in the final line, normalized by Dilley to
  ⲉⲡⲙⲛⲧⲣⲣⲟ (''into the kingdom''), a common ⲧ/ⲡ confusion in NHC II. A further peculiarity
  is the prepositional phrase ⲉⲣⲁⲧⲟⲩ (''before them'') in the first sentence (normalized
  as ⲉⲣⲁⲧ ⲛⲧⲟⲟⲩ), which yields the literal sequence ''are standing before them, outside.''
  It is likely redundant or a scribal carryover; the core sense is simply that the
  relatives are outside. Word order ''brothers and mother'' matches the Coptic and
  is retained.'
