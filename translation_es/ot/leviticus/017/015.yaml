translation:
  language: es
  text: Y toda persona que coma un animal hallado muerto[a] o uno despedazado por fieras, sea nativo o extranjero residente[b], lavará sus vestidos y se bañará en agua, y quedará impuro hasta la tarde; luego quedará limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "cadáver" para "animal hallado muerto"; el hebreo se refiere a un animal que murió sin degüello apropiado.
    reason: lexical_alternative
  - marker: b
    text: O "forastero residente" para "extranjero residente".
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - alma
  - vida
  lexicon: HALOT
  rationale: En este contexto legal, נֶפֶשׁ se refiere a un individuo humano, no al alma inmaterial. 'Persona' es natural en español y conserva el alcance jurídico del hebreo.
- source_word: נְבֵלָה
  english_pob_choice: an animal found dead
  chosen_spanish: un animal hallado muerto
  alternatives_spanish:
  - un cadáver
  - un animal muerto
  lexicon: HALOT
  rationale: La expresión apunta a un animal muerto sin sacrificio ritual adecuado. 'Hallado muerto' comunica la categoría ritual sin reducirla al tecnicismo 'cadáver'.
- source_word: טְרֵפָה
  english_pob_choice: one torn by beasts
  chosen_spanish: uno despedazado
  alternatives_spanish:
  - uno desgarrado por fieras
  - uno destrozado
  lexicon: HALOT
  rationale: El término describe un animal atacado y destrozado por depredadores. 'Despedazado' transmite bien el resultado visible en español y mantiene la fuerza léxica.
- source_word: בָּאֶזְרָח
  english_pob_choice: native
  chosen_spanish: nativo
  alternatives_spanish:
  - nativo de la tierra
  - nativo israelita
  lexicon: HALOT
  rationale: '''Nativo'' conserva la oposición legal con el forastero residente y evita añadir una especificación no presente en el hebreo.'
- source_word: בַגֵּר
  english_pob_choice: sojourner
  chosen_spanish: forastero residente
  alternatives_spanish:
  - residente extranjero
  - extranjero residente
  - forastero
  lexicon: HALOT
  rationale: '''גֵּר'' no es un simple pasajero ni un extraño ocasional, sino un extranjero que vive entre el pueblo. ''Forastero residente'' refleja esa condición con claridad, como permite la nota inglesa.'
- source_word: וְכִבֶּס בְּגָדָיו
  english_pob_choice: shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - lavará sus ropas
  - deberá lavar sus vestidos
  lexicon: HALOT
  rationale: El hebreo presenta una acción requerida dentro de un mandato legal. 'Vestidos' mantiene un registro más elevado y cercano al léxico bíblico que 'ropas', sin perder claridad.
- source_word: וְרָחַץ בַּמַּיִם
  english_pob_choice: bathe in water
  chosen_spanish: se bañará en agua
  alternatives_spanish:
  - se lavará en agua
  - se bañará con agua
  lexicon: HALOT
  rationale: La imagen es de lavado corporal ritual. 'Se bañará en agua' es una forma española natural y suficientemente literal para el acto descrito.
- source_word: וְטָמֵא עַד הָעֶרֶב
  english_pob_choice: he shall be unclean until the evening
  chosen_spanish: quedará impuro hasta la tarde
  alternatives_spanish:
  - estará impuro hasta la tarde
  - quedará inmundo hasta la tarde
  lexicon: HALOT
  rationale: '''Impuro'' preserva el sentido ritual de טָמֵא sin trasladarlo a una culpa moral. ''Hasta la tarde'' mantiene el marcador temporal del hebreo con español idiomático.'
- source_word: וְטָהֵר
  english_pob_choice: then he shall be clean
  chosen_spanish: luego quedará limpio
  alternatives_spanish:
  - entonces quedará limpio
  - y quedará limpio
  lexicon: HALOT
  rationale: '''טָהֵר'' marca el fin del estado de impureza ritual. ''Quedará limpio'' conserva el resultado de estado, y ''luego'' hace explícita la secuencia del versículo.'
theological_decisions:
- issue: Impureza ritual versus culpa moral
  english_pob_reading: Render טָמֵא/טָהֵר as 'unclean/clean' in a ritual sense, without importing moral guilt language.
  chosen_spanish_reading: Traducir טָמֵא/טָהֵר como 'impuro/limpio' en sentido ritual, sin introducir lenguaje de culpa moral.
  alternative_spanish_readings:
  - inmundo/puro
  - contaminado/purificado
  rationale: El contexto trata de pureza cultual después de comer un cadáver o un animal despedazado, no de una declaración directa sobre pecado moral. 'Impuro/limpio' preserva esa categoría; 'inmundo' o 'purificado' podrían inclinar el sentido en español más allá de lo que el texto exige.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto inglés final se mantuvo sin cambios en la revisión más reciente, con acuerdo alto entre revisores; por eso la versión española sigue de cerca las decisiones léxicas ya auditadas, sin introducir variantes nuevas innecesarias.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica en este versículo.
  - Se mantiene la distinción ritual de 'impuro/limpio' para טָמֵא/טָהֵר, coherente con el marco levítico.
  - '''Nativo'' y ''forastero residente'' conservan la oposición legal del hebreo entre miembro interno y ger.'
