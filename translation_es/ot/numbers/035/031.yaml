  text: וְ/לֹֽא תִקְח֥וּ כֹ֨פֶר֙ לְ/נֶ֣פֶשׁ רֹצֵ֔חַ אֲשֶׁר ה֥וּא רָשָׁ֖ע לָ/מ֑וּת כִּי מ֖וֹת יוּמָֽת־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/035/031.yaml
  text: You shall not accept a ransom for the life of a murderer who is guilty of death[c][b][a], for he must surely be put to death.
  footnotes:
  - marker: a
    text: Or 'accept compensation' or 'accept a redemption payment.' The Hebrew כֹּפֶר refers to a payment intended to avert penalty or secure release.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for the life/person of a murderer.' The sense is that no payment may be accepted to spare the murderer's life.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'for he shall surely be put to death,' an emphatic Hebrew construction.
    reason: lexical_alternative
