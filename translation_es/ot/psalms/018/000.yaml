translation:
  language: es
  text: Para el director del coro. De David, siervo[a] de Yahvé, que habló a Yahvé las palabras de este cántico, el día en que Yahvé lo rescató de la mano[b] de todos sus enemigos y de la mano de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavo de Yahvé». El término hebreo puede significar «siervo» o «esclavo»; aquí se traduce «siervo» porque el encabezamiento lo usa como título honorífico para David.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «de la mano de», un modismo para liberación del poder o control de alguien.
    reason: cultural_note
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro del coro
  - Al director de música
  lexicon: HALOT
  rationale: La fórmula de encabezamiento pide en español una designación funcional natural. «Director del coro» conserva la función litúrgico-musical sin sonar arcaico ni demasiado técnico; evita además una calca rígida de la preposición inglesa.
- source_word: לְעֶבֶד
  english_pob_choice: the servant of
  chosen_spanish: siervo de
  alternatives_spanish:
  - esclavo de
  - servidor de
  lexicon: HALOT
  rationale: En este superscrito honorífico, la relación de David con Yahvé es de servicio reverente. En español, «siervo» comunica mejor el matiz honorífico que «esclavo», que aquí sería demasiado fuerte para el contexto y rompería el registro del encabezamiento.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del texto, conforme a la convención del proyecto. «Yahvé» es la forma estándar adoptada en español para reflejar el Tetragrámaton sin sustituirlo por un título.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Perteneciente a David
  lexicon: HALOT
  rationale: En los encabezados de salmos, la construcción permite autoría o asociación. «De David» es la forma más natural y sobria en español, sin sobreespecificar la relación.
- source_word: אֲשֶׁר דִּבֶּר לַיהוָה
  english_pob_choice: who spoke to Yahweh
  chosen_spanish: que habló a Yahvé
  alternatives_spanish:
  - que habló con Yahvé
  - que dijo a Yahvé
  lexicon: HALOT
  rationale: El hebreo indica un discurso dirigido a Dios. En español, «habló a Yahvé» conserva la dirección del habla y evita una paráfrasis excesiva.
- source_word: אֶת דִּבְרֵי הַשִּׁירָה הַזֹּאת
  english_pob_choice: the words of this song
  chosen_spanish: las palabras de este cántico
  alternatives_spanish:
  - las palabras de este poema
  - las palabras de esta canción
  lexicon: HALOT
  rationale: «Cántico» es una equivalencia digna y bíblica para שִׁירָה en un contexto de salmo, y en español eclesial suena más apropiado que «canción».
- source_word: בְּיוֹם
  english_pob_choice: on the day when
  chosen_spanish: el día en que
  alternatives_spanish:
  - cuando
  - en el día cuando
  lexicon: HALOT
  rationale: La construcción temporal se vuelve natural en español con «el día en que», preservando el valor puntual del hebreo.
- source_word: הִצִּיל
  english_pob_choice: rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - libró
  - salvó
  lexicon: HALOT
  rationale: «Rescató» expresa con claridad la idea de liberación de peligro físico o político que está en el contexto del encabezamiento. Evita la carga más amplia de «salvó».
- source_word: מִכַּף
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - del dominio de
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de poder o control mediante la metáfora corporal «de la mano de», ya naturalizada en español bíblico.
- source_word: כָּל אֹיְבָיו
  english_pob_choice: all his enemies
  chosen_spanish: todos sus enemigos
  alternatives_spanish:
  - cada uno de sus enemigos
  lexicon: HALOT
  rationale: Equivalente directo y transparente del plural colectivo hebreo.
- source_word: וּמִיַּד שָׁאוּל
  english_pob_choice: and from the hand of Saul
  chosen_spanish: y de la mano de Saúl
  alternatives_spanish:
  - y del poder de Saúl
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior y la misma metáfora idiomática, sin perder claridad en español.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. En español del proyecto, «Yahvé» preserva el nombre divino en lugar de sustituirlo por un título, y mantiene la coherencia con la política terminológica establecida.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor de עֶבֶד en el encabezamiento salmódico
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - esclavo
  rationale: Aunque עֶבֶד puede significar «esclavo», aquí funciona como designación honorífica de David respecto de Yahvé. En español, «siervo» comunica mejor la relación reverente sin introducir una dureza semántica que el contexto no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy under δοῦλος
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y el pasaje hebreo directo. La versión española sigue de cerca la sintaxis del encabezamiento, conserva el nombre divino y la metáfora de «la mano de» sin introducir explicaciones ajenas al texto. No se detectaron revisiones posteriores que requirieran ajuste.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «siervo» en el encabezamiento honorífico, evitando «esclavo» por el contexto.
  - La metáfora «de la mano de» se conserva en ambas ocurrencias para reflejar el paralelismo hebreo.
  - «Cántico» se emplea como equivalente digno y consistente con el registro salmódico.
