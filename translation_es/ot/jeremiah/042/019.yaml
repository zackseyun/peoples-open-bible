translation:
  language: es
  text: 'Yahvé ha hablado acerca de ustedes, remanente de Judá: No vayan a Egipto. Sepan con certeza que hoy les he advertido[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he testificado solemnemente contra ustedes hoy». El verbo hebreo puede llevar el sentido de dar testimonio formal o advertencia solemne.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבֶּר / has spoken
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una palabra ya pronunciada con vigencia presente. «Ha hablado» mantiene ese valor de acción completada con efecto actual, sin sonar forzado en español.
- source_word: יְהוָה / Yahweh
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto para el Tetragrama: transliterar el nombre divino como «Yahvé», en vez de sustituirlo por un título como «el SEÑOR».'
- source_word: עֲלֵיכֶם / concerning you
  english_pob_choice: concerning you
  chosen_spanish: acerca de ustedes
  alternatives_spanish:
  - sobre ustedes
  - contra ustedes
  lexicon: HALOT
  rationale: La construcción con עַל + דבר aquí introduce el contenido del mensaje dirigido a ellos. «Acerca de» expresa bien la referencia sin endurecerla indebidamente como «contra».
- source_word: שְׁאֵרִית יְהוּדָה / remnant of Judah
  english_pob_choice: remnant of Judah
  chosen_spanish: remanente de Judá
  alternatives_spanish:
  - resto de Judá
  - sobrevivientes de Judá
  lexicon: HALOT
  rationale: «Remanente» conserva el peso profético y teológico de שְׁאֵרִית, y es natural en español bíblico contemporáneo. «Judá» mantiene el nombre propio del grupo histórico.
- source_word: אַל תָּבֹאוּ / Do not go
  english_pob_choice: Do not go
  chosen_spanish: No vayan
  alternatives_spanish:
  - No entren
  - No deben ir
  lexicon: HALOT
  rationale: El imperativo negativo se vierte de forma natural en plural. «Vayan» comunica el mandato de viaje mejor que «entren» en este contexto.
- source_word: מִצְרַיִם / Egypt
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español.
- source_word: יָדֹעַ תֵּדְע֔וּ / Know for certain
  english_pob_choice: Know for certain
  chosen_spanish: Sepan con certeza
  alternatives_spanish:
  - Sepan bien
  - Ciertamente sepan
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la afirmación. «Con certeza» reproduce ese énfasis sin volver el español artificial.
- source_word: הַעִידֹתִי בָכֶם / I have warned you
  english_pob_choice: I have warned you
  chosen_spanish: les he advertido
  alternatives_spanish:
  - he testificado contra ustedes
  - les he dado solemnemente testimonio
  lexicon: HALOT
  rationale: En este contexto la función comunicativa es de advertencia solemne. «Advertido» preserva esa fuerza; la alternativa más literal «testificado contra ustedes» queda implícitamente disponible sin imponerse como lectura principal.
- source_word: הַיּוֹם / today
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la equivalencia natural y clara en español moderno, sin perder la inmediatez temporal del hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se conserva el nombre personal divino como pide la política del proyecto, evitando la sustitución litúrgica por un título. «Yahvé» es la forma establecida en el texto español del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de שְׁאֵרִית en contexto profético
  english_pob_reading: remnant of Judah
  chosen_spanish_reading: remanente de Judá
  alternative_spanish_readings:
  - resto de Judá
  - sobrevivientes de Judá
  rationale: «Remanente» preserva tanto la referencia histórica al grupo que queda como su resonancia profética en Jeremías, sin añadir una explicación doctrinal que el versículo no explicita.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
- issue: Alcance de הַעִידֹתִי בָכֶם
  english_pob_reading: I have warned you
  chosen_spanish_reading: les he advertido
  alternative_spanish_readings:
  - he testificado contra ustedes
  - les he dado solemnemente testimonio
  rationale: La advertencia solemne es el valor pragmático principal en este pasaje. Se evita fijar solo la lectura forense de «contra ustedes», aunque permanece como alternativa reconocida por el audit trail.
  doctrine_reference: 'DOCTRINE.md: lexical tension preservation'
translation_notes:
  revision_awareness: El audit trail inglés indica alta concordancia y sin cambios en la última revisión. Se mantuvo esa línea, con una única nota para preservar la tensión lexical de עֲלֵיכֶם / הַעִידֹתִי sin sobrerrestringirla.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el default del proyecto.
  - Se prefiere «remanente» para שְׁאֵרִית por coherencia profética en Jeremías.
  - Se mantiene el registro bíblico moderno y digno, evitando calcos duros como «entrar a Egipto» o «les he testificado» salvo en nota.
  - El pronombre plural de segunda persona se vierte en forma latinoamericana («ustedes» / «vayan» / «sepan»).
