review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: perfecto + respuesta de gozo, vocativo a quienes buscan a Dios, y exhortación final. Sin embargo, en español la combinación «ustedes ... su corazón» rompe la concordancia natural de tratamiento y hace menos fiel el efecto vocativo directo del original. Además, la nota c está clasificada como alternativa léxica cuando en el audit trail inglés funciona como alternativa de formulación/traducción previa del giro final.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «ustedes que buscan a Dios, que viva su corazón» suena forzado en español general y mezcla registro de segunda persona explícita con posesivo de tercera. «Ustedes ..., que vivan sus corazones» suena natural y conserva el sentido exhortativo. El resto del versículo lee bien.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: אֱלֹהִים se vierte correctamente como «Dios». «Los humildes» respeta la decisión léxica principal para עֲנָוִים. No aparecen términos sensibles como Yahvé/Mesías/Espíritu. La principal corrección es estilística y de concordancia, no glosarial.'
  issues:
  - severity: medium
    issue: Discordancia de tratamiento en «ustedes ... su corazón».
    rationale: El hebreo pasa a segunda persona plural en el vocativo y en el sufijo posesivo. En español, tras «ustedes», el posesivo natural es «sus», no «su», para evitar ambigüedad y extrañeza.
  - severity: medium
    issue: La forma principal del cierre es poco natural en español.
    rationale: Aunque «que viva su corazón» intenta conservar el singular colectivo hebreo, en español suena rígido y menos idiomático que «que vivan sus corazones», especialmente después de la revisión aprobada en el inglés POB.
  - severity: low
    issue: La nota c debería reflejar que es una formulación alternativa/traducción previa, no una mera alternativa léxica.
    rationale: El audit trail inglés marca esa nota como previous_rendering. Conviene mantener la misma lógica documental en español.
  revised_spanish_text: Los humildes han visto y se alegran[a]; ustedes que buscan a Dios, que vivan sus corazones[b][c].
