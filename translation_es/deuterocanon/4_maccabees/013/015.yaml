review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: μέγας… ἀγών καὶ κίνδυνος se vierte con fidelidad, ψυχῆς como «del alma» conserva el peso antropológico, y «tormento eterno» preserva correctamente ἐν αἰωνίῳ βασάνῳ según la auditoría inglesa. El problema principal está en la sintaxis de κείμενος con «que yace en tormento eterno», que en español suena poco natural y ambiguo: parece que el peligro mismo yace dentro del tormento, cuando el sentido es más bien que ese peligro está puesto/acecha para los transgresores en relación con el tormento eterno.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «el peligro que yace en tormento eterno» es una construcción algo calcada y áspera en español. Una formulación como «el peligro que está en el tormento eterno» tampoco mejora. Conviene reformular para conservar la imagen de κείμενος sin forzar el español. «el peligro que aguarda en tormento eterno» suena natural, mantiene la idea de algo que está allí para los transgresores, y conserva el tono solemne.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios», «alma», «mandamiento» y «tormento eterno» están bien alineados. La nota léxica también conserva las alternativas del inglés adecuadamente.
  issues:
  - severity: medium
    issue: La expresión «el peligro que yace en tormento eterno» suena antinatural y semánticamente confusa en español.
    rationale: Aunque «yace» intenta reflejar κείμενος, en español moderno eclesial esta combinación con «peligro» y «en tormento eterno» resulta rígida y puede oscurecer que el peligro está reservado/acecha para los transgresores. Se requiere una reparación menor de estilo y precisión.
  revised_spanish_text: Porque grande es la lucha del alma y el peligro que aguarda en tormento eterno para los que transgreden el mandamiento de Dios[a].
  revised_footnotes:
  - marker: a
    text: 'O: «castigo eterno» o «sufrimiento eterno». El griego dice literalmente «tormento eterno», y βάσανος puede abarcar la idea de tormento o sufrimiento severo.'
    reason: lexical_alternative
