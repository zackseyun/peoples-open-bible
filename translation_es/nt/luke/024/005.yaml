translation:
  language: es
  text: 'Y cuando se llenaron de temor e inclinaron sus rostros hacia la tierra, les dijeron: «¿Por qué buscan al viviente entre los muertos[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Qué buscan al viviente con los muertos?». El sentido en contexto es: «¿Por qué buscan al viviente entre los muertos?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμφόβων ... γενομένων
  english_pob_choice: when they became terrified
  chosen_spanish: cuando se llenaron de temor
  alternatives_spanish:
  - cuando se aterraron
  - cuando llegaron a tener mucho miedo
  lexicon: BDAG
  rationale: El genitivo absoluto expresa circunstancia previa a la acción principal; ἐμφόβων enfatiza temor intenso. En español, «se llenaron de temor» conserva el valor ingresivo y la intensidad sin sonar forzado.
- source_word: κλινουσῶν τὰ πρόσωπα εἰς τὴν γῆν
  english_pob_choice: bowed their faces to the ground
  chosen_spanish: bajaron el rostro hacia la tierra
  alternatives_spanish:
  - inclinaron el rostro hacia la tierra
  - agacharon el rostro hasta el suelo
  lexicon: BDAG
  rationale: κλίνω significa literalmente inclinar o doblar. «Bajaron el rostro hacia la tierra» preserva la imagen concreta y el movimiento reverente/temeroso, con una sintaxis natural en español.
- source_word: εἶπαν πρὸς αὐτάς
  english_pob_choice: they said to them
  chosen_spanish: les dijeron
  alternatives_spanish:
  - dijeron a ellas
  - les hablaron
  lexicon: BDAG
  rationale: El griego usa el pronombre femenino plural sin repetir «mujeres». «Les dijeron» mantiene esa referencia contextual sin sobreespecificarla en el texto principal.
- source_word: Τί ζητεῖτε
  english_pob_choice: Why are you seeking
  chosen_spanish: ¿Por qué buscan
  alternatives_spanish:
  - ¿Qué buscan?
  - ¿Por qué andan buscando?
  lexicon: BDAG
  rationale: Aquí τί funciona idiomáticamente como una pregunta de reprensión o extrañeza; en español, «¿Por qué buscan?» comunica mejor ese sentido que un literal «¿qué buscan?». Se mantiene el presente de acción continua con «buscan».
- source_word: τὸν ζῶντα
  english_pob_choice: the living one
  chosen_spanish: al viviente
  alternatives_spanish:
  - al que vive
  - al vivo
  lexicon: BDAG
  rationale: El participio sustantivado singular es personal. «Al viviente» conserva la fuerza referencial y el contraste con «los muertos», evitando una abstracción excesiva.
- source_word: μετὰ τῶν νεκρῶν
  english_pob_choice: among the dead
  chosen_spanish: entre los muertos
  alternatives_spanish:
  - con los muertos
  - en medio de los muertos
  lexicon: BDAG
  rationale: μετά con genitivo puede significar «con/entre». En este contexto, «entre los muertos» es la forma natural en español y preserva el contraste semántico con «el viviente».
theological_decisions:
- issue: Implicación de resurrección en τὸν ζῶντα
  english_pob_reading: the living one
  chosen_spanish_reading: al viviente
  alternative_spanish_readings:
  - al que vive
  - el viviente
  rationale: La frase apunta a Jesús como vivo en contraste con los muertos, en el marco de la resurrección, sin añadir explicación interpretativa no presente en el griego. Se conserva la tensión teológica con una expresión breve y textual.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma explicativa.
translation_notes:
  revision_awareness: Se siguió de cerca el ajuste revisado del inglés POB para la secuencia participial, prefiriendo un pretérito simple natural en español («bajaron») en lugar de una perífrasis progresiva, y se mantuvo la restricción al sentido contextual de τί ζητεῖτε sin introducir más explicación que la que admite el texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» cuando corresponda en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «viviente» para τὸν ζῶντα por su valor sustantivado y su contraste directo con «los muertos».
  - Se evitó «SEÑOR» o formulaciones eclesiásticas que no están en el griego de este versículo.
  - La nota al pie preserva la alternativa lexical señalada en el audit trail inglés.
