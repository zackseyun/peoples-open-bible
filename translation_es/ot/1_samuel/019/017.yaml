translation:
  language: es
  text: 'Entonces Saúl dijo a Mical: «¿Por qué me has engañado así y has dejado ir a mi enemigo, de modo que escapó?» Y Mical dijo a Saúl: «Él me dijo: “Déjame ir[a]. ¿Por qué debería matarte?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más interpretativamente: «Déjame ir, o te mataré». El hebreo dice literalmente: «Envíame/Deja que me vaya. ¿Por qué debería matarte?»'
    reason: alternative_reading
lexical_decisions:
- source_word: רִמִּיתִנִי
  english_pob_choice: have you deceived me
  chosen_spanish: me has engañado
  alternatives_spanish:
  - me has decepcionado
  - me has traicionado
  lexicon: HALOT
  rationale: רמה expresa engaño/decepción intencional. En español, «engañado» es la opción más natural y fiel al valor básico, sin cargar el término con la fuerza relacional de «traicionado», que sería más interpretativo.
- source_word: כָּכָה
  english_pob_choice: like this
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esta manera
  lexicon: HALOT
  rationale: כָּכָה señala manera. «Así» reproduce el énfasis de Saúl de forma idiomática y breve en español.
- source_word: וַתְּשַׁלְּחִי
  english_pob_choice: let go
  chosen_spanish: has dejado ir
  alternatives_spanish:
  - has soltado
  - has despedido
  lexicon: HALOT
  rationale: El verbo שלח mantiene la idea de enviar/dejar ir. Dado el contexto narrativo, «has dejado ir» refleja mejor la acción de permitir la salida de David que un calco como «has enviado».
- source_word: אֹיְבִי
  english_pob_choice: my enemy
  chosen_spanish: mi enemigo
  alternatives_spanish:
  - mi adversario
  - mi rival
  lexicon: HALOT
  rationale: אויב significa «enemigo». Se conserva el juicio hostil de Saúl sin suavizarlo.
- source_word: וַיִּמָּלֵט
  english_pob_choice: so that he escaped
  chosen_spanish: de modo que escapó
  alternatives_spanish:
  - y escapó
  - así que escapó
  lexicon: HALOT
  rationale: El nifal de מלט expresa escape. La construcción resultativa «de modo que escapó» conserva la relación de consecuencia que el inglés POB explicitó con «so that he escaped».
- source_word: שַׁלְּחִנִי
  english_pob_choice: Let me go
  chosen_spanish: Déjame ir
  alternatives_spanish:
  - Suéltame
  - Despréciame
  lexicon: HALOT
  rationale: El imperativo de שלח con sufijo de 1ª persona singular se traduce con naturalidad como «Déjame ir», que mantiene la fuerza directa del ruego o exigencia y conserva la raíz semántica de dejar salir.
- source_word: לָמָה אֲמִיתֵךְ
  english_pob_choice: Why should I kill you?
  chosen_spanish: ¿Por qué debería matarte?
  alternatives_spanish:
  - ¿Por qué te mataría?
  - ¿Por qué tendría que matarte?
  lexicon: HALOT
  rationale: El verbo מות en hifil comunica dar muerte. «Matarte» es claro y fiel en español. «Debería» conserva la forma interrogativa del hebreo sin introducir la explicitud de una amenaza que el texto no formula con una conjunción equivalente a «o si no».
- source_word: מִיכַל
  english_pob_choice: Michal
  chosen_spanish: Mical
  alternatives_spanish:
  - Mical
  lexicon: convención editorial
  rationale: Se sigue la transliteración habitual en español bíblico del nombre, ajustada a la ortografía castellana estándar del proyecto.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: convención editorial
  rationale: Nombre propio transliterado con acento gráfico español para lectura natural.
theological_decisions:
- issue: Forma de expresar la cita reportada de David en la respuesta de Mical
  english_pob_reading: '''Let me go. Why should I kill you?'' preserves the Hebrew wording and leaves the implied threat to the reader.'
  chosen_spanish_reading: «Déjame ir. ¿Por qué debería matarte?» preserva el orden y deja implícita la amenaza sin añadirla explícitamente.
  alternative_spanish_readings:
  - «Déjame ir, o te mataré»
  - «Suéltame, o te mataré»
  rationale: El hebreo contiene un imperativo seguido de una pregunta con la primera persona del verbo matar, pero no incluye una construcción equivalente a «o si no». La versión española mantiene la literalidad suficiente para respetar la tensión textual y evita resolverla interpretativamente.
  doctrine_reference: Principios de transparencia textual y equivalencia óptima del POB
- issue: Intensidad hostil en la acusación de Saúl
  english_pob_reading: '''my enemy'' preserves the hostility and irony of the scene.'
  chosen_spanish_reading: «mi enemigo» conserva la hostilidad y la ironía narrativa.
  alternative_spanish_readings:
  - «mi adversario»
  - «mi rival»
  rationale: El texto presenta la lectura hostil de Saúl contra David. Traducir con «enemigo» mantiene esa carga semántica sin atenuarla.
  doctrine_reference: Lectura contextual del discurso directo en 1 Samuel 19:17
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del POB en inglés, que prefirió «let ... go» para ambas ocurrencias de שלח por ser más natural y consistente. En español se ha reflejado esa consistencia con «has dejado ir» y «Déjame ir», evitando un calco rígido de «enviado» que sonaría menos idiomático.
  spanish_consistency_notes:
  - Se mantiene «Mical» y «Saúl» con acentuación española consistente.
  - Se conserva «mi enemigo» para reflejar la hostilidad explícita del discurso de Saúl.
  - La cita reportada de David usa «Déjame ir» para alinear ambos usos de שלח en el versículo.
  - Se evita «SEÑOR» o terminología teológica no presente en este pasaje.
