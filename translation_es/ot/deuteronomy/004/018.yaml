translation:
  language: es
  text: la forma[a] de cualquier ser que se arrastra sobre la tierra, la forma de cualquier pez que está en las aguas debajo de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «semejanza» o «imagen» para «forma» (hebreo תַּבְנִית).
    reason: lexical_alternative
  - marker: b
    text: «Debajo de la tierra» hace eco de la expresión bíblica fija para las aguas situadas bajo la tierra firme; compárese la redacción de la prohibición de imágenes en Éxodo 20:4.
    reason: cross_reference
lexical_decisions:
- source_word: תַּבְנִית
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - semejanza
  - imagen
  - patrón
  lexicon: HALOT
  rationale: En este contexto de prohibición contra representaciones, תַּבְנִית señala una forma o figura visible. «Forma» conserva la amplitud semántica de la palabra hebrea y evita restringirla a una imagen esculpida específica.
- source_word: כָּל
  english_pob_choice: any
  chosen_spanish: cualquier
  alternatives_spanish:
  - todo
  - cada
  lexicon: HALOT
  rationale: 'Con sustantivos colectivos o genéricos, «cualquier» comunica bien el valor distributivo: no se excluye ninguna instancia representativa del tipo mencionado.'
- source_word: רֹמֵשׂ
  english_pob_choice: creeping thing
  chosen_spanish: ser que se arrastra
  alternatives_spanish:
  - criatura que se arrastra
  - animal rastrero
  - ser reptante
  lexicon: HALOT
  rationale: El participio denota criaturas pequeñas que se mueven pegadas al suelo. «Ser que se arrastra» mantiene el rasgo físico sin introducir una clasificación más estrecha de la que da el hebreo.
- source_word: בָּאֲדָמָה
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el suelo
  - en el suelo
  lexicon: HALOT
  rationale: Aquí אֲדָמָה apunta a la superficie terrestre donde se desplazan estas criaturas. «Sobre la tierra» es natural en español y conserva la referencia espacial del hebreo.
- source_word: דָּגָה
  english_pob_choice: fish
  chosen_spanish: pez
  alternatives_spanish:
  - pez(es)
  - pez marino
  - ser marino
  lexicon: HALOT
  rationale: Aunque el sustantivo puede funcionar de manera colectiva, «pez» funciona bien en español como singular genérico en este listado y permite una correspondencia clara con el paralelo de la primera cláusula.
- source_word: אֲשֶׁר בַּמַּיִם
  english_pob_choice: that is in the waters
  chosen_spanish: que está en las aguas
  alternatives_spanish:
  - que está en el agua
  - en las aguas
  - que se halla en las aguas
  lexicon: HALOT
  rationale: La relativa se expresa de forma explícita para preservar la estructura hebrea. «Las aguas» refleja el plural de מַיִם y suena natural en español bíblico contemporáneo.
- source_word: מִתַּחַת לָאָרֶץ
  english_pob_choice: under the earth
  chosen_spanish: debajo de la tierra
  alternatives_spanish:
  - bajo la tierra
  - bajo el suelo
  - debajo de la tierra
  lexicon: HALOT
  rationale: La expresión conserva la fórmula cósmica tradicional que aparece también en el mandamiento de Éxodo 20:4. «Debajo de la tierra» mantiene el eco intertextual sin paraphrasear la imagen.
theological_decisions:
- issue: Preservar la fuerza anti-idolátrica sin introducir 'ídolo' en el texto
  english_pob_reading: the form of any...
  chosen_spanish_reading: la forma de cualquier...
  alternative_spanish_readings:
  - la imagen de cualquier...
  - la semejanza de cualquier...
  rationale: El versículo sigue la prohibición de fabricar representaciones de seres creados. «Forma» reproduce el alcance del hebreo sin estrecharlo a un material concreto ni añadir una glosa interpretativa que el texto no da explícitamente.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve what the text says without importing doctrinal claims it does not make.'
- issue: Retener la expresión cosmológica 'debajo de la tierra'
  english_pob_reading: under the earth
  chosen_spanish_reading: debajo de la tierra
  alternative_spanish_readings:
  - bajo la tierra
  - bajo el suelo
  rationale: La frase alude a la imagen bíblica convencional de las aguas bajo la tierra firme. Mantenerla ayuda a conservar la resonancia con Éxodo 20:4 y evita reexplicar la cosmología del texto.
  doctrine_reference: Intertextual biblical imagery and stock phrase preservation in translation
translation_notes:
  revision_awareness: El contexto auditado del POB en inglés no requirió revisiones en la última pasada; se mantuvo la solución óptima-equivalente para preservar la repetición retórica de «forma» y la frase cósmica «debajo de la tierra».
  spanish_consistency_notes:
  - Se mantuvo la alternancia natural entre singular genérico y colectivos en español sin perder el paralelismo hebreo.
  - Se evitó 'SEÑOR' u otro reemplazo teológico no presente en este versículo.
  - 'La puntuación y el orden siguen la estructura binaria del hebreo: tierra / aguas bajo la tierra.'
