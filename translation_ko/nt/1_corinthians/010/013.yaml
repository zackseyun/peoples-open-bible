source:
  edition: SBLGNT
  text: πειρασμὸς ὑμᾶς οὐκ εἴληφεν εἰ μὴ ἀνθρώπινος· πιστὸς δὲ ὁ θεός, ὃς οὐκ ἐάσει ὑμᾶς πειρασθῆναι ὑπὲρ ὃ δύνασθε, ἀλλὰ ποιήσει σὺν τῷ πειρασμῷ καὶ τὴν ἔκβασιν τοῦ ⸀δύνασθαι ὑπενεγκεῖν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/010/013.yaml
  text: No temptation has overtaken you except what is common to man[a]. But God is faithful, who will not allow you to be tempted beyond what you are able, but with the temptation will also provide the way out[c][b], so that you may be able to endure it.
  footnotes:
  - marker: a
    text: Or 'except what is human' or 'except what is common to humanity.'
    reason: lexical_alternative
  - marker: b
    text: πειρασμός / πειρασθῆναι can also be rendered 'testing' / 'to be tested' in this verse.
    reason: lexical_alternative
  - marker: c
    text: Or 'the escape' or 'the outcome.' The phrase emphasizes God's provision that enables endurance.
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분에게 닥친 시험은 사람이 감당할 만한 것 외에는 없습니다. 하나님은 신실하셔서, 여러분이 감당할 수 있는 것 이상으로 시험받게 두지 않으시고, 시험과 함께 또한 피할 길을 주셔서 여러분이 능히 견디게 하실 것입니다.
  philosophy: optimal-equivalence
