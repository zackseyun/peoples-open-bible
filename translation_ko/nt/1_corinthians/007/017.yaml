  text: Εἰ μὴ ἑκάστῳ ὡς ⸀ἐμέρισεν ὁ ⸀κύριος, ἕκαστον ὡς κέκληκεν ὁ ⸀θεός, οὕτως περιπατείτω· καὶ οὕτως ἐν ταῖς ἐκκλησίαις πάσαις διατάσσομαι.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/007/017.yaml
  text: Only[a], as the Lord has assigned to each one, as God has called each one, so let him walk[b]. And so I direct in all the churches.
  footnotes:
  - marker: a
    text: 'Or ''has apportioned'' or ''has allotted.'' The Greek verb can refer to what the Lord has distributed or assigned to each person.'
    reason: lexical_alternative
  - marker: b
    text: '''Walk'' is a common biblical metaphor for one''s manner of life; alternatively, ''live'' or ''conduct his life.'''
    reason: lexical_alternative
translation:
