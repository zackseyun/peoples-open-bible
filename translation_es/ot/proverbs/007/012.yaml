translation:
  language: es
  text: Ahora en la calle[a], ahora en las plazas, y junto a cada esquina ella acecha[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «A veces afuera, a veces en las plazas». El hebreo repite פַּעַם para señalar alternancia o movimiento de un lugar a otro.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «está al acecho» o «espera en emboscada». El verbo hebreo sugiere una espera furtiva y predatoria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּעַם ... פַּעַם
  english_pob_choice: Now ... now
  chosen_spanish: Ahora ... ahora
  alternatives_spanish:
  - A veces ... a veces
  - En un momento ... en otro
  lexicon: HALOT
  rationale: El hebreo repetido marca alternancia o cambio de lugar; «Ahora ... ahora» conserva ese movimiento vivo y breve sin volverlo pesado ni demasiado interpretativo.
- source_word: בַּחוּץ
  english_pob_choice: in the street
  chosen_spanish: en la calle
  alternatives_spanish:
  - afuera
  - en la vía pública
  lexicon: HALOT
  rationale: חוּץ puede señalar el ámbito exterior o público; en este contexto urbano, «en la calle» suena natural en español y mantiene la escena pública del pasaje.
- source_word: בָּרְחֹבוֹת
  english_pob_choice: in the squares
  chosen_spanish: en las plazas
  alternatives_spanish:
  - en los espacios abiertos
  - en las calles anchas
  lexicon: HALOT
  rationale: רְחֹבוֹת alude a lugares públicos abiertos. «Plazas» distingue bien este segundo espacio del primero y es idiomático en español.
- source_word: וְאֵצֶל
  english_pob_choice: and beside
  chosen_spanish: y junto a
  alternatives_spanish:
  - y cerca de
  - y al lado de
  lexicon: HALOT
  rationale: אֵצֶל expresa proximidad. «Junto a» mantiene la cercanía estratégica sugerida por el verbo de acecho.
- source_word: כָּל פִּנָּה
  english_pob_choice: every corner
  chosen_spanish: cada esquina
  alternatives_spanish:
  - toda esquina
  - cada rincón
  lexicon: HALOT
  rationale: פִּנָּה es literalmente «esquina» o «ángulo». En español, «cada esquina» comunica de forma más natural la idea de puntos urbanos concretos donde se oculta o espera.
- source_word: תֶאֱרֹב
  english_pob_choice: she lies in wait
  chosen_spanish: acecha
  alternatives_spanish:
  - se esconde para atacar
  - está al acecho
  lexicon: HALOT
  rationale: ארב tiene el matiz de tender una emboscada o esperar con intención hostil. «Acecha» conserva el tono predatorio y funciona bien en el flujo del verso.
translation_notes:
  revision_awareness: El texto inglés POB mantiene el paralelismo con «Now ... now», traduce בַּחוּץ como «in the street», בָּרְחֹבוֹת como «in the squares» y ארב como «lies in wait». No hubo revisiones posteriores; el pasaje fue confirmado sin cambios en la pasada más reciente, con alto grado de concordancia.
  spanish_consistency_notes:
  - 'Se mantiene el estilo sobrio y audit-able del POB: frase breve, paralelismo visible y sin expansión interpretativa.'
  - «Plazas» se usa para רְחֹבוֹת conforme a la decisión inglesa; no se sustituye por un equivalente más genérico que borraría la distinción espacial.
  - Se evita «SEÑOR» u otra terminología teológica no pertinente; el verso describe acción humana predatoria en un escenario urbano.
