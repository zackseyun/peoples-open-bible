base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/051.yaml
  text: On the seventh day he shall examine the infection[a], and if the infection has spread in the garment, or in the warp, or in the woof, or in the leather, in anything for which leather is made for work, the infection is a destructive skin disease[c][b]; it is unclean.
  footnotes:
  - marker: a
    text: Hebrew tsaraʿat, traditionally rendered 'leprosy,' but the term in Leviticus covers a broader range of impurity conditions and can apply even to garments and leather.
    reason: lexical_alternative
  - marker: b
    text: Or 'weft' for 'woof.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in any article made of leather.'
    reason: lexical_alternative
