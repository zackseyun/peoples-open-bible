translation:
  language: es
  text: Con mi voz clamo a Yahvé, y él me responde[a] desde su santo monte[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «y él me respondió». El verbo hebreo puede leerse en pasado según el contexto.'
    reason: alternative_reading
  - marker: b
    text: La expresión tradicional en inglés suele decir «from his holy hill». El hebreo dice más básicamente «monte», probablemente en referencia a Sion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֭וֹלִי
  english_pob_choice: With my voice
  chosen_spanish: Con mi voz
  alternatives_spanish:
  - Mi voz
  - Alzando mi voz
  lexicon: HALOT
  rationale: El hebreo pone primero el sustantivo 'voz' con sufijo posesivo, con sentido instrumental o de acompañamiento. 'Con mi voz' conserva esa función sin perder naturalidad en español. 'Mi voz' sería más literal pero menos explícito sobre el valor instrumental.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - ante
  lexicon: HALOT
  rationale: La preposición marca dirección hacia Yahvé en oración. En español, 'a' es la forma más natural y precisa para este movimiento verbal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del texto hebreo, siguiendo la política del proyecto de no sustituirlo por un título. 'Yahvé' es la forma española estable y ampliamente inteligible para el Tetragrámaton.
- source_word: אֶקְרָא
  english_pob_choice: I cry
  chosen_spanish: clamo
  alternatives_spanish:
  - grito
  - llamo
  lexicon: HALOT
  rationale: En contexto de súplica, קרא puede expresar clamor o invocación. 'Clamo' comunica bien la intensidad orante del salmo y mantiene el vínculo con la idea de llamar a Dios.
- source_word: וַיַּעֲנֵנִי
  english_pob_choice: and he answers me
  chosen_spanish: y él me responde
  alternatives_spanish:
  - y él me respondió
  - y me responde
  lexicon: HALOT
  rationale: El valor verbal en poesía permite una lectura de presente vivencial o de pasado narrativo. 'Me responde' sigue la lectura viva y confiada del poema, sin cerrar la tensión con la alternativa pasada.
- source_word: מֵהַר קָדְשׁוֹ
  english_pob_choice: from his holy mountain
  chosen_spanish: desde su santo monte
  alternatives_spanish:
  - desde su monte santo
  - desde su monte sagrado
  - desde su santo monte
  lexicon: HALOT
  rationale: '''הַר'' significa básicamente ''monte/montaña''; ''santo monte'' refleja el orden hebreo y mantiene el tono bíblico. ''Monte'' es preferible a ''montaña'' aquí por el registro poético y porque en español bíblico puede aludir con naturalidad a Sion.'
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: El término es oscuro y no debe explicarse en el texto principal. La transliteración preserva la transparencia auditiva y evita imponer una interpretación no segura.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino. En español, 'Yahvé' mantiene la referencia al nombre personal de Dios y evita la sustitución litúrgica por un título, conforme al criterio del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Aspect/tense nuance of וַיַּעֲנֵנִי in poetry
  english_pob_reading: present 'he answers me' with past as footnoted alternative
  chosen_spanish_reading: 'presente: ''él me responde'''
  alternative_spanish_readings:
  - 'pasado: ''él me respondió'''
  - 'presente simple sin sujeto explícito: ''me responde'''
  rationale: La poesía hebrea admite esta oscilación entre pasado y presente. Mantener el presente en el cuerpo del texto conserva la inmediatez del salmo, mientras que la nota deja abierta la lectura pasada sin resolver artificialmente la tensión.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El pasaje presenta una sola línea poética con dos tensiones ya señaladas por el audit trail inglés: el valor verbal de וַיַּעֲנֵנִי y la preferencia léxica de הַר como ''monte''. No hubo revisiones aplicadas en el historial más reciente; por ello la propuesta mantiene la lectura viva del presente y conserva en nota la alternativa pasada. También se mantiene la transliteración de Selah por su sentido incierto.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el Tetragrámaton.
  - Se prefiere 'monte' a 'montaña' por registro bíblico-poético y por la correspondencia con la nota léxica.
  - '''Selah'' permanece transliterado y sin glosa en el texto principal.'
  - La puntuación conserva el paralelismo de dos cola y la pausa final del término Selah.
