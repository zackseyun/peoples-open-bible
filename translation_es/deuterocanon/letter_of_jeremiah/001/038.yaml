    rationale: Aunque es literalmente defendible, en español bíblico moderno 'los objetos de madera... los recubiertos de oro...' comunica el mismo valor sustantivado con mejor fluidez y dignidad.
  - severity: medium
    issue: Uso de 'les sirven' para referirse a objetos/idólos.
    rationale: El leísmo aquí no es el español más neutro para un proyecto panhispánico; 'los sirven' o una reestructuración evita marcar dialecto y se ajusta mejor al referente no personal explícito del texto.
  - severity: low
    issue: La nota al pie puede alinearse mejor con la alternativa léxica auditada.
    rationale: El inglés preserva específicamente 'worship' como alternativa. En español, 'adoran' es la alternativa más directa; 'rinden culto' también sirve, pero conviene mantener la correspondencia léxica con mayor claridad.
  revised_spanish_text: Los objetos de madera y los recubiertos de oro y los recubiertos de plata son como piedras del monte, y los que los sirven[a] serán avergonzados.
