  text: 그러나 이 모든 일이 있기 전에, 그들이 여러분에게 손을 대어 박해할 것이며, 회당과 감옥에 여러분을 넘겨주고, 내 이름으로 인하여 왕들과 총독들 앞으로 끌고 갈 것입니다.
