translation:
  language: es
  text: El que confía demasiado pronto es liviano de corazón[a], y el que peca contra su propia alma se extraviará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra sí mismo» o «para su propio daño»; el griego dice literalmente «contra su propia alma».
    reason: lexical_alternative
lexical_decisions:
- source_word: ταχὺ
  english_pob_choice: too quickly
  chosen_spanish: demasiado pronto
  alternatives_spanish:
  - rápidamente
  - con demasiada prisa
  lexicon: LSJ
  rationale: τραχύ no aparece aquí; ταχὺ modifica ἐμπιστεύων y expresa prontitud excesiva. «Demasiado pronto» conserva el matiz de exceso y suena natural en español proverbial.
- source_word: ἐμπιστεύων
  english_pob_choice: trusts
  chosen_spanish: confía
  alternatives_spanish:
  - pone su confianza en
  - cree en
  lexicon: LSJ
  rationale: El verbo indica depositar confianza. «Confía» es el equivalente más directo y idiomático en español para este contexto sapiencial.
- source_word: κοῦφος καρδίᾳ
  english_pob_choice: light of heart
  chosen_spanish: ligero de corazón
  alternatives_spanish:
  - liviano de corazón
  - inconstante de corazón
  - ligero de mente
  lexicon: LSJ
  rationale: Se preserva la metáfora de ligereza vinculada al corazón, evitando una paráfrasis explicativa. «Ligero de corazón» refleja el valor metafórico y mantiene la tensión léxica del griego.
- source_word: ἁμαρτάνων
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - hace mal
  - yerra
  lexicon: LSJ
  rationale: La forma verbal pide el sentido moral habitual de ἁμαρτάνω. «Peca» es el equivalente más directo y claro en español religioso contemporáneo.
- source_word: εἰς ψυχὴν αὐτοῦ
  english_pob_choice: against his own soul
  chosen_spanish: contra su propia alma
  alternatives_spanish:
  - contra sí mismo
  - para su propio daño
  - contra su propia vida
  lexicon: LSJ
  rationale: Se mantiene el sustantivo «alma» para reflejar ψυχή, como en el audit trail inglés, y la preposición «contra» para expresar daño dirigido a sí mismo sin borrar la imagen original.
- source_word: πλημμελήσει
  english_pob_choice: will go astray
  chosen_spanish: se extraviará
  alternatives_spanish:
  - se desviará
  - fallará
  - hará mal
  lexicon: LSJ
  rationale: El futuro de πλημμελέω admite la idea de desviarse o actuar erradamente. «Se extraviará» conserva el matiz de desviación moral y corresponde bien al ajuste revisado del inglés POB.
theological_decisions:
- issue: ψυχή como alma / self / life
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - sí mismo
  - vida
  rationale: En este dicho sapiencial, ψυχή puede leerse como el propio ser, la vida o el alma. Se conserva «alma» para mantener la fuerza antropológica y moral del texto, dejando abierta la posible referencia reflexiva en la nota.
  doctrine_reference: Preservar la tensión semántica documentada; no resolverla por paraphrase.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que ajustó la última cláusula de «will go wrong» a «will go astray». La versión española refleja ese cambio con «se extraviará», manteniendo el resto de la línea alineado con la lectura auditada.
  spanish_consistency_notes:
  - Se mantuvo «alma» para ψυχή, coherente con el auditorio y con la nota alternativa.
  - «Ligero de corazón» conserva la metáfora del griego y coincide con la decisión inglesa documentada.
  - Se evitó «SEÑOR» o terminología no pertinente, porque este versículo no contiene el nombre divino.
