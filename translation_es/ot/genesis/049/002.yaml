translation:
  language: es
  text: Reuníos y escuchad[a], hijos de Jacob; escuchad a Israel, vuestro padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Congregaos y oíd, hijos de Jacob; y oíd a Israel, vuestro padre». El hebreo repite el mandato para enfatizarlo, y «oír» es una alternativa más formal a «escuchar».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקָּבְצוּ
  english_pob_choice: Gather yourselves
  chosen_spanish: Congregaos
  alternatives_spanish:
  - Juntaos
  - Reuníos
  - Congregaos a vosotros mismos
  lexicon: HALOT
  rationale: 'El imperativo niphal pide una acción reflexiva/colectiva: que los hijos se reúnan. «Congregaos» conserva bien ese valor y suena natural en español bíblico actual.'
- source_word: וְ/שִׁמְע֖וּ
  english_pob_choice: listen
  chosen_spanish: escuchad
  alternatives_spanish:
  - oíd
  - atended
  - escuchad atentamente
  lexicon: HALOT
  rationale: El verbo expresa más que percepción auditiva; es un llamado a prestar atención. «Escuchad» mantiene la fuerza exhortativa con registro claro y digno.
- source_word: בְּנֵ֣י יַעֲקֹ֑ב
  english_pob_choice: sons of Jacob
  chosen_spanish: hijos de Jacob
  alternatives_spanish:
  - hijos varones de Jacob
  - descendientes de Jacob
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, en español «hijos» comunica naturalmente el grupo convocado. Se evita «descendientes» porque suaviza la forma filial y el paralelo poético del versículo.
- source_word: שִׁמְע֖וּ אֶל
  english_pob_choice: listen to
  chosen_spanish: escuchad a
  alternatives_spanish:
  - oíd a
  - atended a
  - escuchad
  lexicon: HALOT
  rationale: La construcción con אֶל intensifica la exhortación y pide atención dirigida a la voz del hablante. «Escuchad a» refleja bien esa orientación en español.
- source_word: יִשְׂרָאֵ֥ל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacobo
  - Israel, el nombre del patriarca
  lexicon: HALOT
  rationale: Se conserva el nombre propio «Israel» porque el texto hebreo contrapone deliberadamente Jacob/Israel para dar peso poético y covenal.
- source_word: אֲבִיכֶם
  english_pob_choice: your father
  chosen_spanish: vuestro padre
  alternatives_spanish:
  - su padre
  - padre de ustedes
  lexicon: HALOT
  rationale: La posesión de segunda persona plural debe mantenerse explícita. «Vuestro padre» es claro, solemne y corresponde al vínculo paterno del hebreo.
theological_decisions:
- issue: Preservar la duplicación retórica de los mandatos de oír/escuchar
  english_pob_reading: The Hebrew repeats the command for emphasis, and 'hear' is a more formal alternative to 'listen.'
  chosen_spanish_reading: La traducción conserva la repetición con «escuchad...; escuchad...», mostrando el énfasis del hebreo.
  alternative_spanish_readings:
  - Oíd...; oíd...
  - Escuchad...; oíd...
  rationale: El hebreo repite el mandato para reforzar la solemnidad y la urgencia. Repetir «escuchad» en español comunica mejor ese énfasis que variar sin necesidad.
  doctrine_reference: Translation philosophy §3, §2
- issue: Mantener la tensión poética entre Jacob e Israel
  english_pob_reading: 'Retain both names distinctly in the main text: ''sons of Jacob ... Israel your father'''
  chosen_spanish_reading: 'Se mantienen ambos nombres: «hijos de Jacob ... Israel, vuestro padre».'
  alternative_spanish_readings:
  - unificar en «hijos de Israel»
  - reducir a solo «Jacob»
  rationale: El texto hebreo contrapone intencionalmente los dos nombres del patriarca. Conservar ambos evita borrar la resonancia narrativa y covenantal del versículo.
  doctrine_reference: Translation philosophy §3, §2
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran acuerdo alto y no registran revisiones sustanciales; por eso la redacción española sigue de cerca la estructura y la repetición del original sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se usa «escuchad» de forma consistente para el imperativo exhortativo, reservando variantes solo en la nota alternativa.
  - Se mantiene «Jacob» y «Israel» como nombres distintos para conservar el paralelismo hebreo.
  - No se introduce «SEÑOR» ni otras sustituciones porque el versículo no contiene el Tetragrámaton ni un término divino equivalente.
