revisions:
- from: Los impíos han desenvainado la espada y tensado su arco[a], para derribar al pobre y al necesitado[b], para matar a los rectos de camino.
  to: Los impíos han desenvainado la espada y tensado su arco[a], para derribar al pobre y al necesitado[b], para masacrar a los rectos de camino.
  rationale: Se revisa únicamente el verbo לִטְבֹחַ para reflejar mejor la intensidad de 'to slaughter' en el hebreo y en la auditoría inglesa. También se aclara la redacción de la nota [b] para que no parezca una alternativa al sintagma 'al pobre y al necesitado', sino una nota de historial de traducción, tal como indica el contexto inglés. No se requiere adjudicación adicional.
