  text: 그 여종이 여러 날 동안 이렇게 하였습니다. 바울이 심히 괴로워하여 영을 돌이켜 말하기를, 「내가 예수 메시아의 이름으로 네게 명령하노니 그에게서 나오라」 하니, 곧 그 시간에 나왔습니다.
