revisions:
- from: Y todo el pueblo de la tierra exclamó en oración delante del Misericordioso[a], hasta que terminó de ministrar en el altar y completó sus deberes prescritos.
  to: Y todo el pueblo del país clamó en oración delante del Misericordioso[a], hasta que terminó de ministrar en el altar y completó sus deberes prescritos[b].
  rationale: Se corrigió la expresión inicial para un español más natural y fiel al sentido colectivo del hebreo ('todo el pueblo del país clamó'). Se cambió 'exclamó' por 'clamó', que encaja mejor con súplica pública en oración. Se mantuvo 'delante del Misericordioso' y 'ministrar en el altar'. Se añadió una nota para la cláusula final difícil, siguiendo la transparencia textual del POB inglés.
