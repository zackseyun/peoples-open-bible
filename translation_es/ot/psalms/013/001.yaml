translation:
  language: es
  text: Para el director del coro[a]. Salmo de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el hebreo puede indicar autoría o asociación en los encabezados de los salmos.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el músico principal
  - Para el maestro de canto
  - Para el director musical
  lexicon: HALOT
  rationale: En una superscripción de salmo, la expresión señala al responsable de la ejecución musical. «Director del coro» comunica con claridad esa función en español moderno y conserva el sentido litúrgico/musical sin volverlo arcaico.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Melodía
  - Canción
  lexicon: HALOT
  rationale: מִזְמוֹר es el rótulo de género habitual para un salmo o cántico. «Salmo» es el equivalente establecido y más fiel en este contexto de encabezado.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los encabezados de salmos puede indicar autoría, asociación o dedicación. «De David» conserva esa amplitud mejor que una opción más específica, y mantiene una formulación natural en español.
theological_decisions:
- issue: Relación de David con el salmo en la superscripción
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: La evidencia hebrea permite más de una relación posible entre David y el salmo. Se preserva esa tensión con una expresión ambigua en español, evitando fijar autoría exclusiva donde el encabezado no la exige.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés; no hay revisiones aplicadas en el último pase, y la concordancia general es alta.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda en otros pasajes; aquí no aparece ninguno de esos términos.
  - Se conserva la ambigüedad de לְדָוִד con «de David», en paralelo funcional con el inglés POB «of David».
  - 'La superscripción se presenta con puntuación natural en español: dos enunciados breves, separados por punto.'
