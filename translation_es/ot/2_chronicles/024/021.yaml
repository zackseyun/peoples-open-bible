translation:
  language: es
  text: Así conspiraron contra él[a] y lo apedrearon[b], por mandato del rey, en el atrio[c] de la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tramaron contra él».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «lo apedrearon con piedra»; la expresión denota ejecución por apedreamiento.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en el patio de la casa de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשְׁרוּ עָלָיו
  english_pob_choice: they conspired against him
  chosen_spanish: conspiraron contra él
  alternatives_spanish:
  - maquinaban contra él
  - se confabularon contra él
  lexicon: HALOT
  rationale: קָשַׁר con עַל expresa una acción hostil de conspirar o tramar contra alguien; «conspiraron contra él» conserva esa fuerza colectiva y adversativa en español natural.
- source_word: וַיִּרְגְּמֻהוּ אֶבֶן
  english_pob_choice: stoned him
  chosen_spanish: lo apedrearon
  alternatives_spanish:
  - lo lapidaron
  - lo apedrearon con piedras
  lexicon: HALOT
  rationale: רָגַם significa ejecutar mediante apedreamiento. En español, «apedrear» comunica el acto de modo idiomático sin perder la referencia a la ejecución; por ello no se añadió «con piedras» en el texto principal.
- source_word: בְּמִצְוַת הַמֶּלֶךְ
  english_pob_choice: at the command of the king
  chosen_spanish: por mandato del rey
  alternatives_spanish:
  - por orden del rey
  - a mandado del rey
  lexicon: HALOT
  rationale: מִצְוָה aquí denota una orden con autoridad. «Por mandato del rey» refleja bien la responsabilidad directa del monarca y suena sobrio en español bíblico contemporáneo.
- source_word: בַּחֲצַר
  english_pob_choice: in the court
  chosen_spanish: en el atrio
  alternatives_spanish:
  - en el patio
  - en la corte
  lexicon: HALOT
  rationale: חָצֵר puede ser «patio/atrio/courtyard». Dado el marco del templo, «atrio» es claro y tradicional en español para un espacio sagrado exterior, sin imponer «templo» donde el hebreo dice «casa».
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahweh
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva el término de pacto «Yahvé» según el criterio del proyecto, y «casa» reproduce el hebreo בַּיִת de manera directa y auditable.
theological_decisions:
- issue: Forma de traducir el Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el nombre divino directamente, por lo que se mantiene la forma de nombre propio en español. «Yahvé» es la adaptación más estable y legible para español amplio dentro de esta línea de traducción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וַיִּרְגְּמֻהוּ אֶבֶן
  english_pob_reading: stoned him
  chosen_spanish_reading: lo apedrearon
  alternative_spanish_readings:
  - lo lapidaron
  - lo apedrearon con piedras
  rationale: La forma hebrea describe una ejecución por apedreamiento; el español puede expresarlo de manera natural sin agregar una glosa redundante en el cuerpo del versículo. La nota preserva la alternativa literal.
  doctrine_reference: HALOT, uso contextual de רגם en ejecución por pedreas
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente anclado en el texto español. También se mantuvo la decisión de no traducir mecánicamente «with stones» de forma redundante, siguiendo la última revisión del audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «casa» en vez de «templo» para respetar la metáfora hebrea.
  - «Atrio» se emplea como equivalente estilístico y contextual de חָצֵר en un entorno templario.
  - No se introduce lenguaje eclesiástico extra bíblico que desplace el sentido del hebreo.
