  revision_awareness: El borrador sigue el texto griego de Swete 1909 y el auditorio inglés POB sin cambios de sentido; conserva la amplitud de τὰ τῆς θυσίας señalada en la nota inglesa. No se detectaron revisiones aplicadas en el contexto proporcionado.
  spanish_consistency_notes:
