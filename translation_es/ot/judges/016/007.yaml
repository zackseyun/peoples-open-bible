translation:
  language: es
  text: 'Y Sansón le dijo: «Si me atan con siete cuerdas de arco frescas que no se han secado, entonces me debilitaré y seré como uno de los hombres[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «como cualquier otro hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר ... שִׁמְשׁוֹן אֵלֶיהָ
  english_pob_choice: And Samson said to her
  chosen_spanish: Y Sansón le dijo
  alternatives_spanish:
  - Entonces Sansón le dijo
  - Así que Sansón le dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se puede reproducir naturalmente en español con una coordinación simple. «Y» conserva el avance narrativo sin añadir matices causales o temporales que el hebreo no exige.
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si en verdad
  - Si acaso
  lexicon: HALOT
  rationale: Introduce una condición directa; en español «si» expresa con claridad la estructura condicional sin sobretraducir.
- source_word: יַאַסְרֻנִי
  english_pob_choice: they bind me
  chosen_spanish: me atan
  alternatives_spanish:
  - me amarran
  - me sujetan
  - me encierran
  lexicon: HALOT
  rationale: El verbo expresa atar/bind en sentido físico. En español, «me atan» conserva la fuerza concreta y la forma indefinida plural del hebreo sin especificar sujeto.
- source_word: בְּשִׁבְעָה
  english_pob_choice: with seven
  chosen_spanish: con siete
  alternatives_spanish:
  - por siete
  - mediante siete
  lexicon: HALOT
  rationale: La preposición instrumental se vierte de forma natural con «con».
- source_word: יְתָרִים
  english_pob_choice: bowstrings
  chosen_spanish: cuerdas
  alternatives_spanish:
  - cordeles
  - ligaduras
  - cuerdas de arco
  lexicon: HALOT
  rationale: Aunque el contexto específico apunta a cuerdas o ligaduras usadas como cuerdas de arco, en español «cuerdas» es la opción más natural y amplia; el inglés POB precisó «bowstrings» por el contexto de Sansón, pero el hebreo por sí solo no obliga esa precisión léxica en el texto principal. Se evita una especificación demasiado técnica si no es transparente para el lector.
- source_word: לַחִים
  english_pob_choice: fresh
  chosen_spanish: frescas
  alternatives_spanish:
  - húmedas
  - verdes
  - recién hechas
  lexicon: HALOT
  rationale: El adjetivo alude a algo mojado o fresco, no seco. «Frescas» es idiomático en español y mantiene la oposición con «no se han secado».
- source_word: אֲשֶׁר לֹא חֹרָבוּ
  english_pob_choice: that have not dried
  chosen_spanish: que no se han secado
  alternatives_spanish:
  - que no están secas
  - que no han sido secadas
  - que aún no se secan
  lexicon: HALOT
  rationale: La frase describe algo todavía no seco. En español, el perfecto compuesto negativo expresa con claridad el estado resultante sin perder el aspecto de proceso.
- source_word: וְחָלִיתִי
  english_pob_choice: then I will become weak
  chosen_spanish: entonces me debilitaré
  alternatives_spanish:
  - entonces seré débil
  - entonces me pondré débil
  - entonces quedaré débil
  lexicon: HALOT
  rationale: El verbo indica volverse débil o enfermar en este contexto de pérdida de fuerza. «Me debilitaré» preserva el cambio de estado que el inglés POB destacó.
- source_word: וְהָיִיתִי
  english_pob_choice: and be
  chosen_spanish: y seré
  alternatives_spanish:
  - y estaré
  - y quedaré
  - y llegaré a ser
  lexicon: HALOT
  rationale: El verbo copulativo en la continuación de resultado se traduce con naturalidad por «seré» en español, manteniendo la coordinación con el miembro anterior.
- source_word: כְּאַחַד הָאָדָם
  english_pob_choice: like one of the men
  chosen_spanish: como uno de los hombres
  alternatives_spanish:
  - como cualquier otro hombre
  - como un hombre cualquiera
  - como uno de la gente
  lexicon: HALOT
  rationale: La expresión compara a Sansón con un ser humano ordinario. «Uno de los hombres» conserva la estructura hebrea y el valor genérico humano; «hombres» suena natural en español y evita borrar el matiz masculino presente en el contexto.
- source_word: הָאָדָם
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - el hombre
  - la humanidad
  lexicon: HALOT
  rationale: Aunque אדם puede ser genérico, aquí funciona dentro de la comparación con un varón ordinario. «Los hombres» mantiene la referencia colectiva y la tensión lexical con la posibilidad idiomática de «cualquier otro hombre».
theological_decisions:
- issue: Comparación de Sansón con אדם en un contexto de fuerza extraordinaria
  english_pob_reading: like one of the men
  chosen_spanish_reading: como uno de los hombres
  alternative_spanish_readings:
  - como cualquier otro hombre
  - como un hombre cualquiera
  rationale: El hebreo usa אדם en sentido humano genérico dentro de una comparación que contrasta la fuerza excepcional de Sansón con la debilidad ordinaria. La redacción principal conserva el género masculino del contexto y sigue siendo comprensible; la alternativa idiomática se puede expresar como nota si se desea mayor naturalidad.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; contested anthropological idioms'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin copiarlo mecánicamente: se mantuvo la estructura condicional y la progresión narrativa, pero se ajustó el léxico al español natural. Se evitó precisar «cuerdas de arco» en el texto principal porque el hebreo nombra simplemente יְתָרִים; esa precisión queda implícita por el contexto de Sansón y puede reservarse para nota o comentario.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no contiene ninguna referencia directa a יהוה.
  - Se mantuvo «hombres» para preservar el valor genérico masculino del hebreo y la comparación contextual con Sansón.
  - «Frescas» / «no se han secado» conserva la oposición semántica del original sin introducir una paráfrasis más amplia.
