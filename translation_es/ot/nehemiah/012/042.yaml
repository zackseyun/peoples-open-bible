  lexicon: Nombre propio (transliteración)
  rationale: Se opta por una transliteración algo más plena, reflejando el elemento teofórico del hebreo y la forma auditada en inglés.
- source_word: מַלְכִּיָּה
  english_pob_choice: Malkijah
  chosen_spanish: Malquías
  alternatives_spanish:
  - Malkías
  - Malquiyá
  lexicon: Nombre propio (transliteración)
  rationale: Se vierte con una forma española legible; la secuencia consonántica hebrea admite esta representación sin pérdida sustancial del nombre.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - Elán
  lexicon: Nombre propio (transliteración)
  rationale: Nombre personal aquí, no la región; se conserva la forma breve y reconocible.
- source_word: עָזֶר
  english_pob_choice: Ezer
  chosen_spanish: Ezer
  alternatives_spanish:
  - Ézer
  lexicon: Nombre propio (transliteración)
