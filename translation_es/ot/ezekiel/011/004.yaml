translation:
  language: es
  text: Por tanto, profetiza[a] contra ellos; profetiza[b], hijo de hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «profetiza acerca de ellos»; la preposición hebrea puede ser más amplia, pero en este contexto de reprensión y juicio «contra ellos» expresa mejor el sentido.
    reason: lexical_alternative
  - marker: b
    text: «Hijo de hombre» es la forma recurrente con que Dios se dirige a Ezequiel; alternativamente, «ser humano» o «mortal».
    reason: lexical_alternative
