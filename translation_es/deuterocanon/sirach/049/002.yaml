translation:
  language: es
  text: Porque tuvo compasión de nuestra rebeldía[a][b], y quitó las abominaciones de la vanidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo más de cerca el paralelo griego: «Porque enderezó al pueblo en su retorno» o «en el arrepentimiento del pueblo». El hebreo conservado dice «nuestra rebeldía», mientras que el griego refleja una idea más positiva de «retorno» o «vuelta».'
    reason: alternative_reading
  - marker: b
    text: «Rebeldía» traduce el hebreo משובה, que suele referirse a apartarse de Dios o apostatar. El paralelo griego tiene ἐπιστροφή, «retorno» o «vuelta».
    reason: textual_variant
  - marker: c
    text: «Abominaciones de la vanidad» probablemente se refiere a abominaciones idolátricas; compárese el uso hebreo de «vanidad» como término polémico para los ídolos. El paralelo griego dice «abominaciones de iniquidad», difiriendo del hebreo «abominaciones de vanidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: נחל
  english_pob_choice: had compassion
  chosen_spanish: tuvo compasión
  alternatives_spanish:
  - se apiadó
  - mostró misericordia
  - tuvo piedad
  lexicon: HALOT
  rationale: El hebreo es difícil, pero el contexto de reforma y el paralelo griego apoyan una respuesta misericordiosa y restauradora. En español, «tuvo compasión» conserva ese matiz sin forzar una paráfrasis más fuerte.
- source_word: על משובתינו
  english_pob_choice: on our backsliding
  chosen_spanish: de nuestra rebeldía
  alternatives_spanish:
  - de nuestra apostasía
  - de nuestro desvío
  - de nuestra vuelta
  lexicon: HALOT
  rationale: משובה suele designar rebeldía o apostasía, y el sufijo de primera persona plural exige «nuestra». «Rebeldía» comunica bien la fuerza negativa del hebreo y evita resolver indebidamente la tensión con el griego ἐπιστροφή.
- source_word: וישבת
  english_pob_choice: and removed
  chosen_spanish: y quitó
  alternatives_spanish:
  - y eliminó
  - y apartó
  - y hizo cesar
  lexicon: HALOT
  rationale: El verbo expresa hacer cesar o quitar prácticas objetables. «Quitó» es natural en español y mantiene la acción concreta sobre lo que sigue.
- source_word: תועבות
  english_pob_choice: abominations
  chosen_spanish: las abominaciones
  alternatives_spanish:
  - las cosas detestables
  - las prácticas abominables
  lexicon: HALOT
  rationale: «Abominaciones» es el equivalente más directo y conserva el peso cultual y moral del término.
- source_word: הבל
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - vaciedad
  - nulidad
  - vacío
  lexicon: HALOT
  rationale: El hebreo denota vapor, vanidad o vaciedad, y en uso polémico puede aludir a ídolos. «Vanidad» mantiene la resonancia bíblica y la ambigüedad productiva sin añadir un objeto específico no explicitado.
theological_decisions:
- issue: Cómo reflejar la tensión entre el hebreo משובה y el griego ἐπιστροφή
  english_pob_reading: Retain the Hebrew-leaning 'backsliding' in the main text, with the Greek positive nuance preserved in a note.
  chosen_spanish_reading: Mantener «rebeldía» en el texto principal, con una nota que preserve la lectura positiva de «vuelta/retorno».
  alternative_spanish_readings:
  - nuestra vuelta
  - nuestra conversión
  - nuestro arrepentimiento
  rationale: La prioridad del testimonio hebreo exige conservar el matiz negativo de משובה, pero el paralelo griego es una evidencia real de recepción que no debe borrarse. La nota deja visible esa tensión textual y teológica.
  doctrine_reference: 'Translation philosophy: original-language primacy and preservation of documented tension.'
- issue: Si הבל debe interpretarse como 'ídolos'
  english_pob_reading: Render as 'vanity' to preserve metaphorical force rather than specifying 'idols'.
  chosen_spanish_reading: Mantener «vanidad» en el texto principal.
  alternative_spanish_readings:
  - ídolos
  - vaciedad
  - cosas vanas
  rationale: El hebreo no dice explícitamente 'ídolos'. «Vanidad» conserva la imagen y permite oír la crítica antiidolátrica sin sobreespecificar más allá de la fuente.
  doctrine_reference: 'Translation philosophy: do not paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión final del POB en cuanto a preferir un registro formal y bíblicamente reconocible para נחל/הבל, pero adapta la sintaxis al español: «tuvo compasión» y «vanidad». También conserva la tensión documentada entre el hebreo y el griego mediante una nota sobre «rebeldía»/«vuelta».'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la serie POB cuando el texto hebreo lo requiera, pero aquí no aparece el Tetragrámaton.
  - Se mantiene el contraste léxico entre «rebeldía» y la nota sobre «vuelta/retorno» para no borrar la variante griega.
  - Se evita sustituir «abominaciones» por un término más débil, para conservar la fuerza cultual del hebreo.
  - Se evita «Cristo/Mesías» porque no corresponde a este versículo.
