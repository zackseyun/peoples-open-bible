translation:
  language: es
  text: Todo el día es bondadoso y presta, y su descendencia es una bendición[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su descendencia es bendecida». El hebreo dice literalmente: «su descendencia [es] para bendición».'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל הַיּוֹם
  english_pob_choice: All day long
  chosen_spanish: Todo el día
  alternatives_spanish:
  - Todo el tiempo
  - Continuamente
  lexicon: HALOT
  rationale: La expresión hebrea señala duración continua o habitual. «Todo el día» conserva ese valor temporal de manera natural en español sin volverlo más interpretativo que el hebreo.
- source_word: חוֹנֵן
  english_pob_choice: is gracious
  chosen_spanish: es bondadoso
  alternatives_spanish:
  - es gracioso
  - es generoso
  - muestra favor
  lexicon: HALOT
  rationale: El participio expresa la cualidad de mostrar favor o gracia. En español, «bondadoso» comunica esa disposición benevolente de forma natural; «generoso» acercaría el sentido al dar material, pero sería más estrecho que el hebreo.
- source_word: וּמַלְוֶה
  english_pob_choice: and lends
  chosen_spanish: y presta
  alternatives_spanish:
  - y da préstamos
  - y toma prestado
  lexicon: HALOT
  rationale: El verbo en hiphil significa prestar, no tomar prestado. «Presta» es la forma más directa y idiomática para conservar el sentido habitual del participio.
- source_word: וְזַרְעוֹ
  english_pob_choice: and his offspring
  chosen_spanish: y su descendencia
  alternatives_spanish:
  - y su simiente
  - y sus hijos
  - y su posteridad
  lexicon: HALOT
  rationale: זֶרַע puede referirse a descendencia colectiva. «Descendencia» mantiene ese sentido colectivo sin el posible equívoco de «simiente» en español moderno.
- source_word: לִבְרָכָה
  english_pob_choice: are a blessing
  chosen_spanish: será una bendición
  alternatives_spanish:
  - serán bendecidos
  - será para bendición
  - serán una bendición
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para bendición». En español, «será una bendición» reproduce el valor resultativo/designativo del original y evita desplazar el sentido hacia el estado pasivo de «bendecidos».
theological_decisions:
- issue: Valor del final לִבְרָכָה
  english_pob_reading: his offspring are a blessing
  chosen_spanish_reading: su descendencia será una bendición
  alternative_spanish_readings:
  - su descendencia será para bendición
  - su descendencia será bendecida
  rationale: 'La preposición ל con בְּרָכָה apunta con naturalidad a una designación o resultado: la descendencia queda caracterizada como bendición. «Será una bendición» conserva ese matiz mejor que convertirlo en un simple estado pasivo.'
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y el audit trail inglés: mantiene la idea habitual de acción continua, conserva el valor benefactivo de חנן como una cualidad de bondad, y resuelve לִבְרָכָה con una estructura natural en español que preserve el sentido resultativo del hebreo. No se reportan revisiones previas ni cambios pendientes en el expediente.'
  spanish_consistency_notes:
  - Se mantuvo «bendición» como sustantivo final para reflejar לִבְרָכָה, evitando traducirlo solo como un estado pasivo.
  - «Descendencia» se eligió por su valor colectivo, equivalente al uso amplio de זֶרַע en este contexto.
  - El texto usa un registro bíblico claro pero natural para lectura comunitaria en español.
