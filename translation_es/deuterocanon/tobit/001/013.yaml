translation:
  language: es
  text: Y el Altísimo me dio favor y buena consideración[a] ante Enemessar, y era su comprador[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «buena presencia» / «buena reputación». El griego μορφήν puede referirse a la apariencia o al aspecto exterior, pero en este contexto cortesano probablemente expresa una consideración favorable ante el rey.
    reason: lexical_alternative
  - marker: b
    text: O «su agente de compras». El griego dice literalmente «comprador», probablemente con referencia a una función oficial de aprovisionamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὕψιστος
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - Dios
  - el Más Alto
  lexicon: LSJ
  rationale: Conserva el título divino del griego sin reducirlo a un sustantivo genérico. «Altísimo» es la forma natural y reverente en español bíblico.
- source_word: χάριν
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - benevolencia
  lexicon: BDAG
  rationale: En este contexto cortesano expresa aceptación o trato favorable; «favor» comunica mejor ese matiz que «gracia», que en español suele sonar más teológico.
- source_word: μορφήν
  english_pob_choice: good standing
  chosen_spanish: buena posición
  alternatives_spanish:
  - buena reputación
  - buen porte
  - buena presencia
  lexicon: LSJ
  rationale: La revisión inglesa pasó de una imagen física a un sentido social más natural. En español, «buena posición» recoge el resultado de gozar de aceptación y consideración ante el rey, sin forzar una lectura puramente externa.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  - a los ojos de
  lexicon: BDAG
  rationale: «Ante» mantiene concisión y la relación de comparecencia favorable en la corte.
- source_word: Ἐνεμεσσάρου
  english_pob_choice: Enemessar
  chosen_spanish: Enemessar
  alternatives_spanish:
  - Salmanasar
  - Enemessar
  lexicon: transliteration from Greek witness
  rationale: Se conserva la forma del testimonio griego, siguiendo la preferencia del proyecto por transliterar el nombre tal como aparece en la fuente.
- source_word: ἀγοραστής
  english_pob_choice: buyer
  chosen_spanish: comprador
  alternatives_spanish:
  - agente de compras
  - encargado de compras
  - proveedor
  lexicon: LSJ
  rationale: El sustantivo significa literalmente «comprador». «Comprador» mantiene la fuerza lexical y deja abierta la posible función oficial que sugiere la nota inglesa.
