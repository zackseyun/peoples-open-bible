translation:
  text: 'And learn from my souls.

    Those who know me — I am

    the hearing that is accessible to all [b];

    I am the speech that no one can grasp [c].[d]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Possessive is not explicit in the Coptic; "your" is inferred from the 2nd-person
      plural verbal prefix. The object could also be "the soul(s)" in a general sense.
    reason: alignment_note
  - marker: b
    text: ϣⲏⲡ may also mean "common" or "fitting"; "accessible" is chosen to capture
      availability/reach.
    reason: lexical_alternative
  - marker: c
    text: '"Grasp" could also be rendered "seize" or "comprehend," preserving both
      physical and cognitive senses.'
    reason: lexical_alternative
  - marker: d
    text: The Coptic ends this block with a bare "I am" (ⲁⲛⲟⲕ ⲡⲉ), likely the start
      of the next self-identification; content not supplied here.
    reason: alignment_note
  - marker: a
    text: Or 'And you, judge your soul [a].'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲭⲓⲥⲃⲱ
  chosen: judge
  alternatives:
  - pass sentence
  - condemn
  lexicon: Crum; Layton
  rationale: Judicial verb; context elsewhere in Thunder uses judicial imagery. "Judge"
    preserves sense without over-specifying nuance of legal sentencing.
- source_word: ⲯⲩⲭⲏ
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: Crum; LSJ (psyche)
  rationale: Greek loanword typically denotes the inner life/soul in Coptic; "soul"
    preserves idiom and Thunder’s introspective frame.
- source_word: ⲥⲟⲟⲩⲛ
  chosen: know
  alternatives:
  - recognize
  - understand
  lexicon: Crum; Layton
  rationale: Common verb for cognitive knowledge; simple "know" fits the poem’s refrain
    "those who know me".
- source_word: ⲡⲥⲱⲧⲙ
  chosen: the hearing
  alternatives:
  - the listening
  - the ear
  lexicon: Crum
  rationale: Nominal form of "to hear"; rendering as a noun keeps the parallel with
    "speech" and retains the poem’s striking self-identifications.
- source_word: ϣⲏⲡ
  chosen: accessible
  alternatives:
  - common
  - available
  - fitting
  lexicon: Crum (sḥēp)
  rationale: In context with "to all (things)", the nuance is of reach/availability;
    "accessible" conveys that rather than social "common" or moral "fitting".
- source_word: ⲛϩⲱⲃ ⲛⲓⲙ
  chosen: to all
  alternatives:
  - in all things
  - for everything
  lexicon: Crum
  rationale: Fixed Coptic expression for totality; here best read as distributive
    "to all" (persons/things).
- source_word: ⲡϣⲁϫⲉ
  chosen: the speech
  alternatives:
  - the utterance
  - the word
  lexicon: Crum; Layton
  rationale: Parallel to "the hearing"; "speech" keeps the active/expressive force
    and cadence.
- source_word: ⲉⲧⲉⲙⲁⲩ
  chosen: that no one
  alternatives:
  - which none
  - which no one
  lexicon: Layton
  rationale: Negative relative construction introducing an indefinite negative subject.
- source_word: ⲙⲁϩⲧⲉ
  chosen: grasp
  alternatives:
  - seize
  - comprehend
  lexicon: Crum
  rationale: Verb can mean physically seize or mentally comprehend; "grasp" straddles
    both, preserving the poem’s polyvalence.
parallelism_check: 'The pair "I am the hearing ... I am the speech ..." is kept as
  a balanced antithetical parallel: accessibility vs. ungraspability. The repeated
