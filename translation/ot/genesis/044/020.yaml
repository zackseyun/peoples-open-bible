id: GEN.44.20
reference: Genesis 44:20
source:
  edition: WLC
  text: וַ/נֹּ֨אמֶר֙ אֶל אֲדֹנִ֔/י יֶשׁ לָ֨/נוּ֙ אָ֣ב זָקֵ֔ן וְ/יֶ֥לֶד זְקֻנִ֖ים קָטָ֑ן וְ/אָחִ֨י/ו מֵ֜ת וַ/יִּוָּתֵ֨ר ה֧וּא לְ/בַדּ֛/וֹ לְ/אִמּ֖/וֹ וְ/אָבִ֥י/ו אֲהֵבֽ/וֹ־־׃
translation:
  text: And we said to my lord[a], ‘We have an elderly father, and a young son born in his old age. His brother is dead, so he alone is left of his mother[c][b], and his father loves him.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a child born in his old age.' The Hebrew idiom 'child of old age' refers to a child born when the father was advanced in years.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he alone is left to his mother,' that is, he is his mother's only remaining son.
    reason: lexical_alternative
  - marker: c
    text: Or 'he alone is left to his mother'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  - sir
  lexicon: HALOT
  rationale: In this Joseph narrative context, the term is a respectful address to a superior. 'My lord' preserves the social hierarchy and the repeated narrative diction better than the flatter 'sir'.
- source_word: זָקֵן
  chosen: elderly
  alternatives:
  - old
  - aged
  lexicon: HALOT
  rationale: Describes the father's advanced age. 'Elderly' is natural modern English and avoids either harshness ('old') or stiffness ('aged') while preserving the sense.
- source_word: יֶלֶד זְקֻנִים
  chosen: a young child of his old age
  alternatives:
  - a child of his old age
  - a son born in his old age
  lexicon: HALOT
  rationale: The Hebrew idiom denotes a child born when the father was old. 'Young child of his old age' keeps both יֶלֶד ('child/boy') and קָטָן ('young/small'). 'Son born in his old age' is interpretive and adds 'born' explicitly.
- source_word: קָטָן
  chosen: young
  alternatives:
  - small
  - little
  - youngest
  lexicon: HALOT
  rationale: Here the adjective marks Benjamin's youth rather than physical size. 'Young' is idiomatic in English in this family context.
- source_word: וְאָחִיו מֵת
  chosen: His brother is dead
  alternatives:
  - and his brother died
  - but his brother is dead
  lexicon: HALOT
  rationale: 'The Hebrew predicate adjective/state is well represented by the present-result sense ''is dead.'' This fits the discourse: Joseph is being told the brother''s current status.'
- source_word: וַיִּוָּתֵר
  chosen: is left
  alternatives:
  - remains
  - was left
  lexicon: HALOT
  rationale: The verb conveys remaining/surviving as the only one left. English present 'is left' works naturally with the surrounding present-reference explanation, though the Hebrew wayyiqtol advances the narrative.
- source_word: לְבַדּוֹ
  chosen: he alone
  alternatives:
  - by himself
  - the only one
  lexicon: HALOT
  rationale: 'Emphasizes exclusivity: Benjamin is the sole remaining son of his mother. ''He alone'' is concise and preserves the focus.'
- source_word: לְאִמּוֹ
  chosen: to his mother
  alternatives:
  - of his mother
  - for his mother
  lexicon: HALOT
  rationale: The lamed here is relational, indicating that he alone remains in relation to his mother, i.e., as her only remaining son. 'To his mother' is a close rendering, though English readers may understand it idiomatically as 'for/from his mother'.
- source_word: אָבִיו אֲהֵבוֹ
  chosen: his father loves him
  alternatives:
  - his father has loved him
  - his father is fond of him
  lexicon: HALOT
  rationale: The clause states Jacob's special affection for Benjamin. 'Loves him' is the direct and transparent rendering of אהב.
