translation:
  language: es
  text: Y Moisés dio el dinero de la redención[a] a Aarón y a sus hijos, por mandato de Yahvé, tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «dinero/plata de los redimidos»; es decir, el pago reunido para la redención.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - dio en entrega
  lexicon: HALOT
  rationale: El verbo נתן en narrativa se expresa de manera natural con el pasado simple «dio». Mantiene la sencillez del hebreo sin añadir matices no presentes.
- source_word: כֶּסֶף
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - moneda
  lexicon: HALOT
  rationale: En este contexto de pago cultual, «dinero» comunica bien la suma entregada. «Plata» sería más literal, pero en español puede sonar más material o arcaico; la nota conserva la relación con el hebreo.
- source_word: הַפְּדֻיִם
  english_pob_choice: the redemption
  chosen_spanish: la redención
  alternatives_spanish:
  - los redimidos
  - el rescate
  lexicon: HALOT
  rationale: El hebreo literalmente alude a los redimidos, pero en la construcción con כסף designa el pago asociado a la redención. «La redención» mantiene la función cultual/legal del término.
- source_word: כֶּסֶף הַפְּדֻיִם
  english_pob_choice: the redemption money
  chosen_spanish: el dinero de la redención
  alternatives_spanish:
  - el dinero de los redimidos
  - el dinero del rescate
  lexicon: HALOT
  rationale: Se conserva la relación constructa de manera clara en español. «Redención» refleja el campo semántico del pago por rescate sin imponer una paráfrasis más amplia.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  english_pob_choice: to Aaron and to his sons
  chosen_spanish: a Aarón y a sus hijos
  alternatives_spanish:
  - a Aarón y a sus hijos varones
  - a Aarón y a los hijos de él
  lexicon: HALOT
  rationale: El posesivo «sus» expresa naturalmente la referencia específica a los hijos de Aarón y evita una repetición rígida del hebreo.
- source_word: עַל פִּי יְהוָה
  english_pob_choice: at the command of Yahweh
  chosen_spanish: por mandato de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - por la boca de Yahvé
  lexicon: HALOT
  rationale: La expresión idiomática hebrea comunica autoridad divina. «Por mandato de Yahvé» preserva el sentido de obediencia ordenada y suena idiomático en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del texto hebreo en lugar de sustituirlo por un título. «Yahvé» sigue la terminología POB para יְהוָה.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé había ordenado a Moisés
  - justo como Yahvé había mandado a Moisés
  lexicon: HALOT
  rationale: «Tal como» conserva la comparación exacta; «había mandado» reproduce el cumplimiento de una instrucción previa con un verbo de autoridad fuerte y natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La base hebrea contiene explícitamente el Tetragrama. La política POB es no enmascararlo con un título, sino conservar el nombre propio del pacto en transliteración española.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de עַל פִּי יְהוָה
  english_pob_reading: at the command of Yahweh
  chosen_spanish_reading: por mandato de Yahvé
  alternative_spanish_readings:
  - según la palabra de Yahvé
  - por orden de Yahvé
  rationale: La expresión hebrea literalmente remite a la 'boca' de Yahvé, pero su sentido funcional aquí es mandato autoritativo. La traducción elegida preserva esa fuerza sin introducir un calco innecesario.
  doctrine_reference: Uso idiomático del hebreo bíblico; obediencia a la revelación divina
- issue: הַפְּדֻיִם como pago de redención
  english_pob_reading: the redemption money
  chosen_spanish_reading: el dinero de la redención
  alternative_spanish_readings:
  - el dinero del rescate
  - el dinero de los redimidos
  rationale: El hebreo permite una tensión entre 'los redimidos' y el pago asociado a su redención. La opción española mantiene esa relación cultual y evita borrar el trasfondo legal del texto.
  doctrine_reference: Éxodo 30; Números 3:46-51
translation_notes:
  revision_awareness: Alineado con el pase más reciente del audit trail inglés (sin cambios requeridos) y con la decisión establecida de renderizar יְהוָה como «Yahvé». No se detectan revisiones textuales adicionales en el material fuente.
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma consistente para יְהוָה, conforme al estándar POB.
  - «Redención» se usa como término cultual/legal para reflejar כסף הפדויים sin borrar la ambigüedad hebrea del constructo.
  - El orden de nombres y complementos sigue de cerca el hebreo, pero en español natural.
  - La nota al pie a marca la alternativa lexical sin duplicar el sentido principal en el texto.
