translation:
  language: es
  text: Que sepan que tú solo, cuyo nombre es Yahvé[a], eres el Altísimo sobre toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también se ha escrito «Yahweh» o «Jehová».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיֵדְעוּ
  english_pob_choice: Let them know
  chosen_spanish: Que lleguen a saber
  alternatives_spanish:
  - Que sepan
  - Y sepan
  lexicon: HALOT
  rationale: El imperfecto con waw en contexto de súplica expresa un deseo volitivo. En español, "Que lleguen a saber" conserva ese matiz de petición sin volverlo meramente futuro.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que deben conocer; "que" es la opción natural y fiel en español.
- source_word: שִׁמְךָ יְהוָה
  english_pob_choice: whose name is Yahweh
  chosen_spanish: cuyo nombre es Yahvé
  alternatives_spanish:
  - cuyo nombre es Yahweh
  - tu nombre es Yahvé
  lexicon: HALOT
  rationale: La construcción hebrea identifica al destinatario por su nombre. En español, "cuyo nombre es Yahvé" reproduce bien la apposición y mantiene el nombre divino revelado, conforme al criterio del proyecto.
- source_word: לְבַדֶּךָ
  english_pob_choice: you alone
  chosen_spanish: tú solo
  alternatives_spanish:
  - tú únicamente
  - tú por ti solo
  lexicon: HALOT
  rationale: La fuerza es de exclusividad enfática. "Tú solo" es natural en español y conserva el énfasis del hebreo.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Supremo
  - el Excelso
  lexicon: HALOT
  rationale: Es el título divino establecido en español bíblico; mantiene la majestad y evita perder el valor titular de עֶלְיוֹן.
- source_word: עַל כָּל הָאָרֶץ
  english_pob_choice: over all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la tierra
  - sobre toda la tierra entera
  lexicon: HALOT
  rationale: '"הָאָרֶץ" aquí tiene alcance universal. "Tierra" en español conserva esa amplitud y suena más natural que una paráfrasis más abstracta.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto hebreo usa directamente el Tetragrama. Siguiendo el estándar del proyecto, se traduce como "Yahvé" en el cuerpo principal, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - SEÑOR
  rationale: El versículo afirma explícitamente el nombre personal de Dios. Mantener "Yahvé" preserva ese dato del hebreo y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre "tú solo" y "el Altísimo"
  english_pob_reading: you alone ... are the Most High over all the earth
  chosen_spanish_reading: tú solo ... eres el Altísimo sobre toda la tierra
  alternative_spanish_readings:
  - sólo tú ... eres el Altísimo sobre toda la tierra
  - tú, solo tú, eres el Altísimo sobre toda la tierra
  rationale: El hebreo pone el énfasis en la exclusividad de la identidad divina. La redacción española conserva esa exclusividad unida al predicado principal.
  doctrine_reference: Salmo 83:19; afirmación monoteísta y de supremacía divina
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés, que enfatiza "you alone" y usa Yahweh directamente. En español se conservó esa misma estructura de exclusividad, con "tú solo" y el nombre divino "Yahvé" en lugar de un sustituto titulativo.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y publicable, con puntuación española estándar.
  - '"Yahvé" se usa de manera consistente para יְהוָה, conforme al estándar del proyecto.'
  - '"Altísimo" se conserva como título divino estable en español, evitando paráfrasis innecesarias.'
