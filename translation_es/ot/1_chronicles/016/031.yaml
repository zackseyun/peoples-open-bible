review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia volitiva del hebreo, el paralelismo cósmico «los cielos / la tierra», la proclamación pública «entre las naciones» y la traducción del Tetragrámaton como «Yahvé». También acierta al traducir מָלָךְ como presente proclamativo: «reina».'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero «la tierra se goce» suena poco natural en español general contemporáneo y resulta más forzada que el inglés auditado «be glad». Además, la nota al pie está mal anclada: el marcador [a] aparece en «cielos» pero la nota trata sobre «Yahvé reina».'
  glossary_alignment: 'Alineado con la terminología del proyecto: יְהוָה -> «Yahvé» en texto principal; הַשָּׁמַיִם -> «los cielos»; הָאָרֶץ -> «la tierra»; בַגּוֹיִם -> «entre las naciones». La única corrección necesaria es estilística/idiomática para גיל: mejor «se alegre» que «se goce» en este contexto.'
  issues:
  - severity: medium
    issue: «la tierra se goce» es poco idiomático
    rationale: Aunque «gozarse» existe, aquí suena antinatural para un registro bíblico moderno y amplio. Para גיל, «se alegre» conserva mejor la fuerza poética y la legibilidad en español neutral.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: El marcador aparece en «cielos[a]», pero la nota explica «Yahvé reina». Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase relevante.
  - severity: low
    issue: La nota al pie reproduce una lógica inglesa ya innecesaria en español
    rationale: La nota dice que el texto principal sigue la rendición habitual del proyecto como «Yahvé», pero no presenta una alternativa real. Conviene simplificarla o aclarar que el hebreo dice explícitamente «Yahvé reina».
  revised_spanish_text: 'Que los cielos se alegren, y que la tierra se alegre; y que digan entre las naciones: «¡Yahvé[a] reina!»'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé reina». El hebreo usa explícitamente el nombre divino «Yahvé».'
    reason: alternative_reading
