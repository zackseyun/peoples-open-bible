revisions:
- from: ¿Quién ha creído nuestro reporta[a], y a quién se ha revelado el brazo de Yahvé?
  to: ¿Quién ha creído nuestro mensaje[a], y a quién se ha revelado el brazo de Yahvé?
  rationale: Se corrige un error grave de español («reporta») y se sustituye por «mensaje», que es natural, digno y fiel al campo semántico de שְׁמוּעָה en este contexto. La nota conserva alternativas cercanas al expediente inglés y a la evidencia hebrea, incluyendo «lo que hemos oído» para no perder la conexión con la raíz auditiva. No se requieren cambios adicionales.
