translation:
  language: es
  text: 'Pero para esto te he dejado en pie[a]: para mostrarte mi poder, y para que mi nombre sea proclamado en toda la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «te he levantado». El hebreo puede entenderse como que Dios hace que Faraón permanezca en pie o siga existiendo; en el contexto, probablemente se trata de preservarlo, no de destruirlo de inmediato.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאוּלָם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: Expresa el contraste adversativo con naturalidad en español y conserva la fuerza de oposición del hebreo sin volverlo demasiado formal.
- source_word: בַּעֲבוּר זֹאת
  english_pob_choice: for this purpose
  chosen_spanish: para este propósito
  alternatives_spanish:
  - por esta razón
  - para esto
  lexicon: HALOT
  rationale: La frase introduce finalidad divina, no mera causalidad; en español, 'para este propósito' comunica bien la relación teleológica de las cláusulas siguientes.
- source_word: הֶעֱמַדְתִּיךָ
  english_pob_choice: I have let you stand
  chosen_spanish: te he dejado en pie
  alternatives_spanish:
  - te he hecho quedar en pie
  - te he preservado
  - te he levantado
  lexicon: HALOT
  rationale: El hiphil de עמד sugiere causar que alguien permanezca de pie o continúe existiendo. 'Te he dejado en pie' conserva la imagen hebrea y comunica la idea de haberlo mantenido con vida, sin imponer 'levantado' como si fuera una entronización.
- source_word: בַּעֲבוּר הַרְאֹתְךָ
  english_pob_choice: to show you
  chosen_spanish: para mostrarte
  alternatives_spanish:
  - para hacerte ver
  - para mostrarte a ti
  lexicon: HALOT
  rationale: El infinitivo de propósito se expresa de manera directa y natural en español; 'mostrarte' preserva la relación personal del texto.
- source_word: כֹּחִי
  english_pob_choice: my power
  chosen_spanish: mi poder
  alternatives_spanish:
  - mi fuerza
  - mi poderío
  lexicon: HALOT
  rationale: כֹּחַ puede significar fuerza o poder; en el contexto de las plagas, 'poder' comunica mejor la demostración de la acción soberana de Dios.
- source_word: וּלְמַעַן
  english_pob_choice: and so that
  chosen_spanish: y para que
  alternatives_spanish:
  - y de modo que
  - para que
  lexicon: HALOT
  rationale: Introduce una segunda finalidad coordinada; 'y para que' reproduce la coordinación y el valor final con claridad.
- source_word: סַפֵּר
  english_pob_choice: may be proclaimed
  chosen_spanish: sea proclamado
  alternatives_spanish:
  - sea contado
  - sea declarado
  - se relate
  lexicon: HALOT
  rationale: Aunque ספר en piel puede significar 'contar / relatar', en este contexto la idea es la difusión pública del nombre de Yahvé; 'sea proclamado' capta esa dimensión sin perder el vínculo lexical con 'contar'.
- source_word: שְׁמִי
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi fama
  - mi reputación
  lexicon: HALOT
  rationale: Conserva el término literal del hebreo, que en contexto incluye identidad revelada y renombre, sin sustituirlo por una paráfrasis interpretativa.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la tierra habitable
  - por toda la tierra
  lexicon: HALOT
  rationale: La universalización de כל con הארץ pide una expresión amplia; 'toda la tierra' transmite mejor el alcance global que 'el país' o 'la tierra' en sentido local.
theological_decisions:
- issue: Sentido de הֶעֱמַדְתִּיךָ en relación con Faraón
  english_pob_reading: God states that he has allowed Pharaoh to remain standing/alive for a divine purpose.
  chosen_spanish_reading: Dios afirma que ha mantenido a Faraón con vida y en pie para un propósito divino.
  alternative_spanish_readings:
  - Dios dice que ha levantado a Faraón para este propósito.
  - Dios dice que ha preservado a Faraón para este propósito.
  rationale: El contexto inmediato favorece la idea de conservación/continuación de existencia más que la de promoción al trono. 'Te he dejado en pie' permite mantener la tensión teológica sin resolverla de forma prematura ni importar una lectura tradicional más fuerte que el hebreo aquí no exige.
  doctrine_reference: Preservar la tensión teológica; primacía del hebreo sobre la fórmula tradicional.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, especialmente en el verbo הֶעֱמַדְתִּיךָ y en la doble cláusula de finalidad. Se conserva la amplitud universal de בְּכָל הָאָרֶץ y se evita sustituir el nombre divino por una convención de ocultamiento.
  spanish_consistency_notes:
  - Se usa 'poder' para כֹּחַ en coherencia con el contexto de manifestación divina.
  - Se traduce el complemento de propósito con 'para que'/'para este propósito' para reflejar la finalidad explícita del hebreo.
  - '''Yahvé'' no aparece en este versículo; por tanto no se introduce terminología adicional no presente en el texto.'
  - La nota alternativa sobre 'te he levantado' preserva la tensión lexical documentada sin imponerla en la línea principal.
