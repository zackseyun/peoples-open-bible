translation:
  language: es
  text: Moisés le contó a Aarón todas las palabras de Yahvé, quien lo había enviado[a], y todas las señales que le había mandado hacer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas las palabras de Yahvé con las que lo había enviado». La cláusula relativa hebrea también puede entenderse más estrechamente con «palabras», aunque el sentido sigue siendo que Yahvé había enviado a Moisés.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: contó
  alternatives_spanish:
  - dijo
  - relató
  lexicon: HALOT
  rationale: El hifil de נגד expresa dar a conocer, contar o decir. «Contó» es natural en español y conserva la acción narrativa de comunicar a Aarón.
- source_word: מֹשֶׁה לְאַהֲרֹן
  english_pob_choice: Moses told Aaron
  chosen_spanish: Moisés contó a Aarón
  alternatives_spanish:
  - Moisés dijo a Aarón
  - Moisés relató a Aarón
  lexicon: HALOT
  rationale: Se mantiene el orden y la relación directa entre sujeto y destinatario, con una formulación española fluida y fiel al relato.
- source_word: דִּבְרֵי יְהוָה
  english_pob_choice: the words of Yahweh
  chosen_spanish: las palabras de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - las palabras del Yahvé
  lexicon: HALOT
  rationale: דָּבָר puede ser palabra, asunto o mensaje; aquí el plural constructo con כָּל favorece «las palabras». Se conserva el nombre divino como «Yahvé» según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliteración del nombre propio en vez de una sustitución titular.'
- source_word: אֲשֶׁר שְׁלָחוֹ
  english_pob_choice: who had sent him
  chosen_spanish: que lo había enviado
  alternatives_spanish:
  - que lo había mandado
  - con quien lo había enviado
  lexicon: HALOT
  rationale: La cláusula relativa se entiende de manera más natural refiriéndose a Yahvé. En español se mantiene la lectura restrictiva sin añadir material ajeno al hebreo.
- source_word: הָאֹתֹת
  english_pob_choice: the signs
  chosen_spanish: las señales
  alternatives_spanish:
  - las señales milagrosas
  - los signos
  lexicon: HALOT
  rationale: אוֹת se traduce como «señal» en español bíblico claro; evita sobrecargar con «milagrosas» porque el texto solo dice «señales».
- source_word: אֲשֶׁר צִוָּהוּ
  english_pob_choice: that he had commanded him
  chosen_spanish: que le había mandado
  alternatives_spanish:
  - que le había ordenado
  - que le había encomendado
  lexicon: HALOT
  rationale: צוה expresa mandar/ordenar. «Mandado» conserva el valor de mandato y resulta idiomático en español. No se agrega «hacer» porque el hebreo no lo explicita.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura del POB en inglés ya opta por transliterar el nombre divino; en español se mantiene la misma decisión con la forma «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de la cláusula relativa «que lo había enviado»
  english_pob_reading: who had sent him
  chosen_spanish_reading: que lo había enviado
  alternative_spanish_readings:
  - que había enviado a Moisés
  - que lo había enviado Yahvé
  rationale: 'Se conserva la ambigüedad controlada del hebreo: la cláusula se entiende naturalmente con Yahvé como antecedente, sin forzar una reestructuración interpretativa.'
  doctrine_reference: Exodus 4:28 source syntax; English audit note on relative-clause attachment
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB, que eliminó la coma antes de la cláusula relativa y descartó la expansión «to do» por no estar en el texto fuente. La versión española sigue esa misma línea: mantiene la cláusula relativa unida a «Yahvé» sin coma y no añade ninguna expansión verbal ajena al hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Señales» se conserva para אֹתֹת; no se introduce «milagros» como glosa intratextual.
  - El verbo «mandado» mantiene el valor de mandato sin añadir auxiliares innecesarios.
  - La sintaxis evita paréntesis o coma antes de la cláusula relativa, en consonancia con la revisión auditada.
