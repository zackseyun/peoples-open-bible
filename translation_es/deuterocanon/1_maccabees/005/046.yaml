translation:
  language: es
  text: Y llegaron hasta Efrón. Esta era una ciudad grande a la entrada[a], muy fortificada. No había manera de desviarse de ella ni a la derecha ni a la izquierda, sino sólo de pasar por en medio de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el paso» o «en el acceso»; la frase griega presenta a Efrón como dominando la ruta de entrada, lo que explica por qué no podían rodearla.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον ἕως Ἐφρών
  english_pob_choice: they came as far as Ephron
  chosen_spanish: llegaron hasta Efrón
  alternatives_spanish:
  - vinieron hasta Efrón
  - llegaron a Efrón
  lexicon: LSJ
  rationale: ἕως con un nombre de lugar marca extensión hasta un punto límite; «hasta» conserva bien ese valor. Se translitera el topónimo como «Efrón».
- source_word: αὕτη ἡ πόλις μεγάλη
  english_pob_choice: This was a large city
  chosen_spanish: Esta era una ciudad grande
  alternatives_spanish:
  - Era una ciudad grande
  - Esta ciudad era grande
  lexicon: LSJ
  rationale: Se conserva el demostrativo de la fuente griega con «Esta», pero en español se formula con orden natural y sin perder el efecto appositivo que identifica a Efrón.
- source_word: ἡ τῆς εἰσόδου
  english_pob_choice: at the entrance
  chosen_spanish: en la entrada
  alternatives_spanish:
  - en el paso
  - en el acceso
  - en la aproximación
  lexicon: LSJ
  rationale: La expresión griega señala la ubicación estratégica vinculada al acceso. «En la entrada» es claro en español y mantiene la función militar/topográfica sin forzar un tecnicismo.
- source_word: ἰσχυρὰ σφόδρα
  english_pob_choice: very strong
  chosen_spanish: muy fuerte
  alternatives_spanish:
  - muy fortificada
  - sumamente fuerte
  - excesivamente fuerte
  lexicon: LSJ
  rationale: En contexto de ciudad, ἰσχυρά sugiere fuerza defensiva; «muy fuerte» conserva la literalidad y deja implícita la fortificación.
- source_word: οὐκ ἦν ἐκκλῖναι
  english_pob_choice: There was no way to turn aside
  chosen_spanish: No había manera de desviarse
  alternatives_spanish:
  - No era posible desviarse
  - No se podía apartar
  lexicon: LSJ
  rationale: La construcción impersonal expresa imposibilidad. «No había manera de» reproduce bien el valor de imposibilidad y suena natural en español.
- source_word: ἀπ’ αὐτῆς δεξιὰν ἢ ἀριστεράν
  english_pob_choice: from it to the right or to the left
  chosen_spanish: de ella a la derecha ni a la izquierda
  alternatives_spanish:
  - pasando a su derecha o a su izquierda
  - alrededor de ella, a la derecha o a la izquierda
  lexicon: LSJ
  rationale: Se mantiene la polaridad direccional de la frase griega. «Ni» en español comunica mejor la imposibilidad de ambas opciones.
- source_word: ἀλλ’ ἢ διὰ μέσου αὐτῆς πορεύεσθαι
  english_pob_choice: but only to go through the middle of it
  chosen_spanish: sino sólo de pasar por su medio
  alternatives_spanish:
  - sino sólo de atravesarla
  - excepto de pasar por en medio de ella
  lexicon: LSJ
  rationale: «Por su medio» refleja literalmente διὰ μέσου y preserva la imagen del paso obligado a través del centro de la ciudad; «atravesarla» sería más idiomático pero menos visual.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que separó la llegada de la descripción de la ciudad en dos oraciones. También conserva la fuerza de la construcción impersonal («No había manera de») y explicita el demostrativo griego con «Esta» para reflejar αὕτη sin sonar forzado en español.
  spanish_consistency_notes:
  - Se usa «Efrón» como transliteración uniforme del topónimo.
  - Se mantiene «muy fuerte» en lugar de «muy fortificada» para no añadir más interpretación militar de la que el griego exige.
  - «Por su medio» conserva el valor espacial de διὰ μέσου y mantiene coherencia con el énfasis topográfico del verso.
