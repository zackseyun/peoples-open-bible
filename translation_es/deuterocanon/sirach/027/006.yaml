translation:
  language: es
  text: El fruto muestra el cultivo[a] de un árbol; así, el razonamiento de un hombre muestra la inclinación de su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente algo como 'la obra' o 'el trabajo de un árbol'; el paralelo griego apoya el sentido de 'cultivo', es decir, el cuidado agrícola del árbol.
    reason: alternative_reading
lexical_decisions:
- source_word: עֲבֹדַת עֵץ / γεώργιον ξύλου
  english_pob_choice: the cultivation of a tree
  chosen_spanish: la cultivo de un árbol
  alternatives_spanish:
  - el cultivo de un árbol
  - el trabajo de un árbol
  - el cuidado de un árbol
  lexicon: HALOT; paralelo griego γεώργιον
  rationale: 'El hebreo y el paralelo griego apuntan a una imagen agrícola: lo que se ve en el árbol por su fruto revela su tratamiento o cultivo. En español, ''cultivo'' conserva ese campo semántico. Se mantiene aquí una redacción muy cercana al valor del sustantivo, aunque la forma natural esperable sería ''el cultivo''; la decisión busca reflejar la estructura nominal del original y el paralelismo del proverbio.'
- source_word: פֶרִי
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - producto
  lexicon: HALOT
  rationale: '''Fruto'' es la equivalencia natural en español para el término agrícola y funciona bien en el proverbio literal y metafórico.'
- source_word: חֶשְׁבּוֹן
  english_pob_choice: reasoning
  chosen_spanish: razonamiento
  alternatives_spanish:
  - pensamiento
  - cálculo
  - cuenta
  - razón
  lexicon: HALOT
  rationale: El hebreo puede significar cálculo, cuenta o pensamiento; el contexto y el paralelo griego favorecen la idea de un proceso mental interior que se manifiesta externamente. 'Razonamiento' preserva ese matiz sin reducirlo a mera 'palabra'.
- source_word: יֵצֶר
  english_pob_choice: inclination
  chosen_spanish: inclinación
  alternatives_spanish:
  - disposición
  - impulso
  - propósito
  - formación
  lexicon: HALOT
  rationale: '''Inclinación'' comunica el sentido antropológico de impulso o tendencia interior del corazón, sin cargar el término con desarrollos doctrinales posteriores.'
- source_word: אֶחָד
  english_pob_choice: his
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de una persona
  - de un individuo
  - de alguien
  lexicon: HALOT
  rationale: El hebreo final es breve y algo abrupto, pero el paralelo griego explicita ἀνθρώπου ('de un hombre / ser humano'). En español conviene expresar ese sujeto genérico de manera natural con 'de un hombre', manteniendo el valor representativo singular del original.
theological_decisions:
- issue: Sujeto genérico masculino y alcance universal
  english_pob_reading: a man's ... his heart
  chosen_spanish_reading: de un hombre ... de su corazón
  alternative_spanish_readings:
  - de una persona ... de su corazón
  - humano ... de su corazón
  rationale: El paralelo griego usa ἀνθρώπου, un genérico humano, mientras que el hebreo termina de forma elíptica. En español, 'un hombre' funciona como singular representativo y conserva el valor general del proverbio. No se neutraliza automáticamente porque el texto fuente y el audit trail conservan esa referencia representativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación entre expresión externa e interioridad
  english_pob_reading: a man's reasoning shows the inclination of his heart
  chosen_spanish_reading: el razonamiento de un hombre muestra la inclinación de su corazón
  alternative_spanish_readings:
  - la palabra de un hombre muestra la inclinación de su corazón
  - lo que un hombre piensa muestra la inclinación de su corazón
  rationale: El paralelo griego habla de 'la palabra del pensamiento del corazón del hombre', lo cual apoya la idea de una expresión exterior que revela el contenido interior. 'Razonamiento' conserva el proceso mental del hebreo y evita colapsar el proverbio en mero discurso.
  doctrine_reference: Sirácides 27:6; paralelo griego ἐνθύμημα / λόγος
translation_notes:
  revision_awareness: El texto sigue la lectura consolidada del expediente inglés sin cambios sustantivos recientes; el pasaje fue revisado como de alta concordancia y sin necesidad de enmiendas posteriores. Se mantuvo la tensión interpretativa entre el hebreo breve ('trabajo/obra de un árbol') y el griego más explícito ('cultivación de un árbol'), reflejándola en nota.
  spanish_consistency_notes:
  - Se usa 'fruto' para פֶרִי, conforme al valor agrícola normal y al paralelismo proverbial.
  - Se mantiene 'corazón' en sentido antropológico, no sólo emotivo, porque el hebreo y el griego apuntan a la interioridad pensante.
  - La decisión de 'un hombre' sigue el uso genérico representativo del expediente inglés y del paralelo griego ἀνθρώπου.
  - Se prefirió 'razonamiento' para conservar la fuerza cognitiva de חֶשְׁבּוֹן sin convertirla en simple 'palabra' o 'habla'.
