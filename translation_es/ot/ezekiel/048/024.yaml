translation:
  language: es
  text: 'Junto al límite de Benjamín[a], desde el lado oriental hasta el lado occidental, Simeón: una porción.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Simeón, uno»; el sustantivo «porción» se sobreentiende por la fórmula repetida de reparto en este capítulo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  english_pob_choice: Along
  chosen_spanish: Junto al
  alternatives_spanish:
  - Y junto al
  - A lo largo de
  lexicon: HALOT
  rationale: En este contexto de reparto territorial, la expresión introduce el siguiente tramo del límite. 'Junto al' comunica la relación espacial de manera natural en español sin perder la idea de seguimiento secuencial presente en el hebreo y en la versión inglesa auditada.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  - territorio
  lexicon: HALOT
  rationale: Aquí גְּבוּל señala la línea demarcatoria de la heredad, no el territorio completo. 'Límite' es claro y apto para un reparto de tierras, y mantiene el valor espacial preciso del término hebreo.
- source_word: בִּנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  lexicon: transliteración estándar
  rationale: Nombre propio tribal; 'Benjamín' es la forma española estable y reconocible.
- source_word: מִפְּאַת קָדִימָה
  english_pob_choice: from the east side
  chosen_spanish: desde el lado oriental
  alternatives_spanish:
  - desde el lado del oriente
  - desde el extremo oriental
  lexicon: HALOT
  rationale: La construcción hebrea refiere al lado/filo oriental. 'Lado oriental' conserva la orientación espacial con español natural y evita forzar una imagen de 'extremo' que el texto no exige.
- source_word: עַד פְּאַת יָמָּה
  english_pob_choice: to the west side
  chosen_spanish: hasta el lado occidental
  alternatives_spanish:
  - hasta el lado del occidente
  - hasta el extremo occidental
  lexicon: HALOT
  rationale: La frase balancea la anterior y marca la extensión completa del tramo. 'Lado occidental' reproduce la simetría del hebreo y del patrón distributivo del capítulo.
- source_word: שִׁמְעוֹן
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  lexicon: transliteración estándar
  rationale: Nombre propio tribal; 'Simeón' es la forma española tradicional y clara.
- source_word: אֶחָד
  english_pob_choice: one portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una heredad
  - una parte
  - un lote
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'uno', con el sustantivo elíptico recuperado por la fórmula repetida de repartos en este capítulo. 'Una porción' explicita la elipsis sin exceder la evidencia textual y mantiene la correspondencia con el uso repetido de Ezekiel 48.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo con la auditoría inglesa es alto y el texto coincide con la lectura estable del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Benjamín' y 'Simeón' como nombres propios españoles estándar.
  - Se traduce גְּבוּל como 'límite' para preservar el sentido de demarcación territorial.
  - Se conserva la elipsis de אֶחָד con una glosa en nota, siguiendo la alternativa léxica documentada en la auditoría inglesa.
  - El par 'lado oriental / lado occidental' refleja la fórmula direccional simétrica del hebreo.
