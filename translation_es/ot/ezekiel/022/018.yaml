translation:
  language: es
  text: Hijo de hombre, la casa de Israel ha llegado a ser escoria para mí; todos ellos son bronce[a], estaño, hierro y plomo en medio de un horno de fundición; son la escoria de la plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cobre» para נְחֹשֶׁת.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Se conserva la fórmula vocativa estable de Ezequiel sin explicarla en exceso. En español, «Hijo de hombre» es la equivalencia más directa y reconocible para este giro idiomático.
- source_word: הָיוּ לִי
  english_pob_choice: has become ... to me
  chosen_spanish: se ha convertido para mí
  alternatives_spanish:
  - ha llegado a ser para mí
  - me ha llegado a ser
  lexicon: HALOT
  rationale: El perfecto hebreo con לִי expresa un estado resultante desde la perspectiva de Yahvé. «Se ha convertido para mí» mantiene esa relación evaluativa sin paraphrasear más allá del texto.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión colectiva y pactal, en vez de reducirla al nombre propio. «Casa de Israel» es natural y fiel al hebreo.
- source_word: לְסוּג
  english_pob_choice: dross
  chosen_spanish: escoria
  alternatives_spanish:
  - residuo
  - desperdicio de metal
  - dross
  lexicon: HALOT
  rationale: En metalurgia, el término refiere al desecho separado del metal durante la fundición. «Escoria» es el equivalente español más natural y preciso; además conserva la fuerza peyorativa de la imagen profética.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - cada uno de ellos
  lexicon: HALOT
  rationale: Se explicita el valor distributivo del sufijo pronominal para que el plural sea claro en español.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En esta lista de metales para fundición, «bronce» funciona bien en español y sigue la decisión inglesa principal, aunque el campo semántico permite también «cobre».
- source_word: בְּדִיל
  english_pob_choice: tin
  chosen_spanish: estaño
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Es el equivalente léxico estándar para el metal mencionado en contextos de aleación y fundición.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Equivalente directo y estable en español.
- source_word: עוֹפֶרֶת
  english_pob_choice: lead
  chosen_spanish: plomo
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Equivalente directo y estable en español.
- source_word: בְּתוֹךְ כּוּר
  english_pob_choice: in the midst of a furnace
  chosen_spanish: en medio de un horno
  alternatives_spanish:
  - dentro de un horno de fundición
  - en el interior de un horno
  lexicon: HALOT
  rationale: «כּוּר» designa un horno de fundición. «En medio de» se vierte de manera natural como «en medio de», manteniendo la imagen sin introducir una explicación técnica innecesaria.
- source_word: סִגִים כֶּסֶף
  english_pob_choice: the dross of silver
  chosen_spanish: la escoria de la plata
  alternatives_spanish:
  - escoria de plata
  - las impurezas de la plata
  lexicon: HALOT
  rationale: 'La construcción posesiva se conserva para mantener la imagen: Israel no es plata pura, sino el residuo separado de ella. «Escoria de la plata» refleja bien la metáfora y su tono despectivo.'
theological_decisions:
- issue: Dirección evaluativa de Yahvé en לִי
  english_pob_reading: Retained as 'to me' without expanding to 'before me' or paraphrasing divine rejection.
  chosen_spanish_reading: «para mí»
  alternative_spanish_readings:
  - «ante mí»
  - «a mis ojos»
  rationale: El hebreo solo marca la relación evaluativa de Yahvé con Israel; no requiere añadir una glosa interpretativa. «Para mí» conserva la perspectiva divina y la dureza de la metáfora sin suavizarla ni ampliarla.
  doctrine_reference: Translation philosophy §1, §3
- issue: Metáfora metalúrgica de juicio
  english_pob_reading: Rendered literally as dross/silver-dross imagery
  chosen_spanish_reading: Escoria / escoria de la plata
  alternative_spanish_readings:
  - paráfrasis moral de corrupción
  - residuo metalúrgico
  rationale: La fuerza teológica del versículo está en la imagen de fundición. Mantener «escoria» permite que el lector reciba el juicio profético en sus propios términos, sin diluirlo en una explicación abstracta.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: el final se formula como una cláusula coordinada con punto y coma («son la escoria de la plata») para corresponder más de cerca al hebreo y mantener el flujo metafórico continuo. También se preserva la equivalencia principal de la lista de metales y la relación evaluativa de Yahvé mediante «para mí».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito en la voz divina del contexto, pero en este versículo el hebreo usa primera persona y no requiere nombrarlo explícitamente.
  - «Hijo de hombre» conserva la fórmula profética convencional en Ezequiel.
  - Se prefiere «escoria» por coherencia con el valor metalúrgico de סִגִים y con el tono despectivo del pasaje.
  - La lista de metales se vierte de forma uniforme y sencilla para evitar sobreinterpretación.
  - El marcador [a] se coloca en «Hijo de hombre» porque la nota del audit trail afecta solo la alternativa léxica de נְחֹשֶׁת.
