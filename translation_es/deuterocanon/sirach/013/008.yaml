translation:
  language: es
  text: Ten cuidado[a] de no ser demasiado audaz, y no te hagas semejante a los que carecen de entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Cuida de no desviarte, y no te humilles en tu alegría». El hebreo y el griego difieren considerablemente en este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: הִשָּׁמֵר / πρόσεχε
  english_pob_choice: Be careful / Take care
  chosen_spanish: Ten cuidado
  alternatives_spanish:
  - Cuídate
  - Presta atención
  - Guárdate
  lexicon: HALOT; LXX πρόσεχε
  rationale: El imperativo niphal de שׁמר y el griego πρόσεχε expresan advertencia atenta. «Ten cuidado» es natural en español moderno y conserva el tono admonitorio sin volverse arcaico.
- source_word: אַל תִּרְהַב מְאֹד
  english_pob_choice: not to be too bold
  chosen_spanish: de no ser demasiado audaz
  alternatives_spanish:
  - de no ser muy audaz
  - de no actuar con excesiva confianza
  - de no ser demasiado arrogante
  lexicon: HALOT
  rationale: רהב puede implicar audacia, presunción o arrogancia. «Demasiado audaz» refleja bien el exceso marcado por מְאֹד y mantiene la tensión del hebreo sin fijar más de lo que el término exige.
- source_word: וְאַל תִּדְמֶה
  english_pob_choice: do not make yourself like
  chosen_spanish: no te hagas semejante
  alternatives_spanish:
  - no te parezcas
  - no te vuelvas como
  - no te compares con
  lexicon: HALOT
  rationale: דמה en este contexto significa hacerse semejante o parecerse. La forma reflexiva «no te hagas semejante» conserva la idea volitiva del hebreo y suena clara en español.
- source_word: בַּחֲסֵירֵי מַדָּע
  english_pob_choice: those who lack understanding
  chosen_spanish: a los que carecen de entendimiento
  alternatives_spanish:
  - a los ignorantes
  - a los que carecen de conocimiento
  - a los que no entienden
  lexicon: HALOT
  rationale: La expresión es literalmente «los faltos de conocimiento/entendimiento». «Carecen de entendimiento» mantiene el matiz sapiencial y evita reducirlo solo a ignorancia intelectual.
theological_decisions:
- issue: Diferencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: The Hebrew is primary, with the Greek alternative documented in a footnote.
  chosen_spanish_reading: Se traduce el hebreo como texto principal y se documenta la alternativa griega en nota.
  alternative_spanish_readings:
  - «Cuida de no desviarte, y no te humilles en tu alegría»
  - «Ten cuidado, no sea que te extravíes, y no te rebajes en tu gozo»
  rationale: En Sirácides, cuando el hebreo está conservado, se sigue como base principal. Aquí el griego presenta una redacción sustancialmente distinta; por transparencia textual, el texto español sigue el hebreo y la nota preserva la lectura griega como alternativa auditable.
  doctrine_reference: 'PHILOSOPHY.md: prioridad al testimonio hebreo cuando existe, con preservación explícita de variantes textuales significativas.'
translation_notes:
  revision_awareness: 'Se mantuvo la orientación de la POB inglesa: seguir el hebreo de base y registrar en nota la divergencia importante del griego. No se incorporaron interpretaciones doctrinales ajenas al texto.'
  spanish_consistency_notes:
  - Se prefirió «entendimiento» sobre «conocimiento» para conservar el tono sapiencial y evitar una reducción demasiado técnica.
  - «Audaz» traduce la fuerza de רהב sin convertirla automáticamente en «orgulloso», porque el hebreo admite varias matizaciones.
  - La nota textual se ancla en el punto de mayor divergencia entre las tradiciones hebrea y griega, siguiendo el expediente inglés.
