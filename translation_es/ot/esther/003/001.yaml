translation:
  language: es
  text: Después[a] de estas cosas, el rey Asuero promovió a Amán, hijo de Hamedata, el agagueo[b], lo exaltó y puso su trono[c] por encima de todos los oficiales que estaban con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Después de estos eventos».'
    reason: lexical_alternative
  - marker: b
    text: «El agagueo» preserva la designación hebrea y puede indicar un linaje o una asociación relacionada con Agag.
    reason: cultural_note
  - marker: c
    text: 'O: «puso su asiento por encima de todos los oficiales que estaban con él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַר הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: After these things
  chosen_spanish: Después[a] de estas cosas
  alternatives_spanish:
  - Después de estos sucesos
  - Después de estos eventos
  lexicon: HALOT
  rationale: La fórmula temporal hebrea introduce la siguiente acción narrativa. «Después de estas cosas» conserva la estructura idiomática del original y sigue de cerca la decisión inglesa sin sonar extraña en español.
- source_word: גִּדַּל
  english_pob_choice: promoted
  chosen_spanish: promovió
  alternatives_spanish:
  - hizo subir de rango
  - ensalzó
  - lo engrandeció
  lexicon: HALOT
  rationale: En el contexto de corte y cargo, el verbo expresa elevación de estatus. «Promovió» comunica bien el ascenso administrativo en español moderno y mantiene la idea de avance jerárquico.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: King Ahasuerus
  chosen_spanish: el rey Asuero
  alternatives_spanish:
  - el rey Ahasuero
  - Ahasuero, el rey
  lexicon: HALOT
  rationale: Se conserva el título real y la transliteración usual en español bíblico para אֲחַשְׁוֵרוֹשׁ. «Asuero» es la forma más establecida y legible en español.
- source_word: הָמָן
  english_pob_choice: Haman
  chosen_spanish: Amán
  alternatives_spanish:
  - Hamán
  lexicon: HALOT
  rationale: El nombre propio se adapta a la forma bíblica española más común. «Amán» evita una grafía menos natural en español y mantiene la identificación del personaje.
- source_word: בֶּן הַמְּדָתָא
  english_pob_choice: son of Hammedatha
  chosen_spanish: hijo de Hamedata
  alternatives_spanish:
  - hijo de Hamedata
  - el hijo de Hamedata
  lexicon: HALOT
  rationale: Se conserva el patronímico de forma transparente. La vocalización española «Hamedata» refleja mejor la pronunciación tradicional en castellano bíblico que una transliteración rígida.
- source_word: הָאֲגָגִי
  english_pob_choice: the Agagite
  chosen_spanish: el agagueo
  alternatives_spanish:
  - el agaguita
  - el agageo
  lexicon: HALOT
  rationale: Se mantiene la designación gentilicia sin interpretarla más allá de lo que permite el texto. «Agagueo» conserva la relación con Agag y suena más natural en español que una calca inglesa.
- source_word: וַיְנַשְּׂאֵהוּ
  english_pob_choice: exalted him
  chosen_spanish: lo exaltó
  alternatives_spanish:
  - lo elevó
  - lo levantó
  - lo ensalzó
  lexicon: HALOT
  rationale: El verbo continúa la idea de elevación de rango. «Lo exaltó» mantiene el matiz honorífico y reproduce la progresión semántica con el verbo anterior.
- source_word: וַיָּשֶׂם אֶת כִּסְאֹו
  english_pob_choice: set his throne
  chosen_spanish: puso su trono
  alternatives_spanish:
  - colocó su trono
  - puso su asiento
  lexicon: HALOT
  rationale: כִּסֵּא puede ser «trono» o «asiento»; en este contexto de jerarquía cortesana, «trono» expresa mejor la precedencia oficial. La nota mantiene abierta la alternativa de sentido del inglés POB.
- source_word: מֵעַל כָּל הַשָּׂרִים
  english_pob_choice: above all the officials
  chosen_spanish: por encima de todos los oficiales
  alternatives_spanish:
  - sobre todos los oficiales
  - por encima de todos los príncipes
  lexicon: HALOT
  rationale: «Oficiales» traduce bien שָׂרִים en un entorno de corte persa, evitando el término más tradicional «príncipes» que puede sonar anacrónico o ambiguo en español contemporáneo.
- source_word: אֲשֶׁר אִתּוֹ
  english_pob_choice: who were with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que estaban con él en la corte
  - los que estaban con él
  lexicon: HALOT
  rationale: El sufijo se refiere naturalmente al rey en contexto. «Que estaban con él» conserva la relación hebrea y fluye de manera natural en español.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el acuerdo alto del POB inglés y el hebreo masorético, sin cambios de sentido respecto al borrador auditado. Se conservan las dos tensiones léxicas principales: la fórmula temporal inicial y la posible alternativa de כִּסְאֹו como «trono» o «asiento».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - «Asuero» se mantiene como forma española establecida para el nombre real persa.
  - Se prefiere «oficiales» para שָׂרִים en contexto cortesano, coherente con el inglés auditado.
  - «Amán» y «Hamedata» siguen la tradición española bíblica más natural para nombres propios.
  - Las notas al pie usan marcadores únicos y aparecen ancladas exactamente en el texto.
