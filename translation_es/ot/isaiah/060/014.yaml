base_translation:
  language: en
  yaml_path: translation/ot/isaiah/060/014.yaml
  text: The sons of those who afflicted you will come to you bowed down[a], and all who despised you will bow down at the soles of your feet; and they will call you The City of Yahweh[c][b], Zion of the Holy One of Israel.
  footnotes:
  - marker: a
    text: Or 'The children of your oppressors will come to you bowed down.' The Hebrew is literally 'the sons of those who afflicted you.'
    reason: lexical_alternative
  - marker: b
    text: '''Bow down'' here expresses submission or homage to Zion, not divine worship of the city.'
    reason: cultural_note
  - marker: c
    text: 'Hebrew: ''Zion of the Holy One of Israel,'' a title identifying Zion as belonging to the Holy One of Israel.'
    reason: lexical_alternative
