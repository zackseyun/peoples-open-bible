translation:
  language: es
  text: Por tanto, la entregué en manos de sus amantes, en manos de los hijos de Asiria[a], a quienes codició[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los asirios». Hebreo: «los hijos de Asiria».'
    reason: lexical_alternative
  - marker: b
    text: O «se apasionó por ellos». El verbo hebreo expresa un deseo intenso; aquí tiene la fuerza de una infatuación lujuriosa dentro de la metáfora de adulterio en Ezequiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por esto
  - Entonces
  lexicon: HALOT
  rationale: Expresa la relación inferencial y de juicio con un español natural y solemne, equivalente al 'therefore' del POB sin perder el enlace causal con el versículo anterior.
- source_word: נְתַתִּיהָ
  english_pob_choice: I gave her
  chosen_spanish: la entregué
  alternatives_spanish:
  - la di
  - la puse en manos de
  lexicon: HALOT
  rationale: En español, 'entregar' comunica mejor la idea idiomática de dar a alguien bajo control ajeno que un simple 'dar', y preserva la fuerza judicial/hostil del hebreo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - al poder de
  - bajo el poder de
  lexicon: HALOT
  rationale: '''En manos de'' es la forma idiomática natural en español para el hebraísmo, mantiene la imagen concreta de dominio y evita una paráfrasis excesiva.'
- source_word: מְאַהֲבֶיהָ
  english_pob_choice: her lovers
  chosen_spanish: sus amantes
  alternatives_spanish:
  - sus amantes ilícitos
  - sus amados
  - quienes la amaban
  lexicon: HALOT
  rationale: En la metáfora profética de adulterio, 'amantes' conserva la carga relacional y sexual del término mejor que 'amados' o 'los que la amaban', y corresponde al POB inglés.
- source_word: בְּנֵי אַשּׁוּר
  english_pob_choice: the sons of Assyria
  chosen_spanish: los hijos de Asiria
  alternatives_spanish:
  - los asirios
  - la gente de Asiria
  lexicon: HALOT
  rationale: Se mantiene la textura del constructo hebreo con 'hijos de Asiria', como hizo el POB con 'sons of Assyria'; en una nota se deja abierta la alternativa idiomática 'los asirios'.
- source_word: עָגְבָה עֲלֵיהֶם
  english_pob_choice: she lusted for
  chosen_spanish: se apasionó por
  alternatives_spanish:
  - los deseó con pasión
  - ardió por ellos
  - los codició
  lexicon: HALOT
  rationale: '''Se apasionó por'' reproduce el impulso fuerte de deseo y la dirección preposicional con un español digno; evita suavizar el verbo a ''deseó'' y no introduce una intensidad excesivamente explícita como ''codició''.'
theological_decisions:
- issue: Metáfora sexual profética para alianzas políticas infieles
  english_pob_reading: Retain the metaphorical language of 'lovers' and 'lusted for' rather than softening it into purely political terminology.
  chosen_spanish_reading: Conservar 'amantes' y 'se apasionó por' en vez de reducirlo a un lenguaje puramente político.
  alternative_spanish_readings:
  - aliados
  - socios políticos
  - se interesó por
  rationale: El hebreo usa deliberadamente lenguaje de adulterio y deseo para describir la infidelidad del pacto. La traducción española debe conservar esa tensión para no diluir el juicio profético ni la imagen original.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el trazado del POB en inglés y no requiere revisión adicional según el resumen de revisión más reciente; se mantiene la decisión de conservar la metáfora sexual profética y la construcción 'hijos de Asiria'.
  spanish_consistency_notes:
  - Se usa 'Asiria' para el topónimo y 'hijos de' para reflejar el constructo hebreo, con alternativa idiomática anotada.
  - '''En manos de'' se mantiene como equivalente estable del hebraísmo בְּיַד.'
  - La elección 'se apasionó por' busca conservar la fuerza del verbo sin caer en una traducción demasiado modernizante o demasiado débil.
