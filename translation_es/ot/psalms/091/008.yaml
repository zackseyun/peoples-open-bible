revisions:
- from: Tú solo mirarás con tus ojos y verás la paga[a] de los malvados.
  to: Tú solo mirarás con tus ojos y verás la retribución[a] de los malvados.
  rationale: Se reemplaza «paga» por «retribución» para evitar una ambigüedad coloquial y reflejar mejor el valor semántico de שִׁלֻּמַת en contexto poético y moral, manteniendo en nota alternativas cercanas, incluida la forma originalmente propuesta. No se requiere adjudicación adicional porque la corrección es léxica y de claridad, no doctrinalmente incierta.
