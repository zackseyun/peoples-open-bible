translation:
  language: es
  text: Cuando vieron que él era tan magnánimo frente a estos tormentos[a], y que ni siquiera se dejaba mover a compasión por ellos[b], lo llevaron al fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tormentos» traduce aquí ἀνάγκας en su sentido contextual de presiones coercitivas o padecimientos impuestos, no de necesidades ordinarias.
    reason: lexical_alternative
  - marker: b
    text: 'La expresión «se dejaba mover a compasión» recoge la idea de μεταβαλλόμενον πρὸς τὸν οἰκτιρμὸν αὐτῶν: cambiar de disposición hacia la compasión por ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρὸς τὰς ἀνάγκας
  english_pob_choice: in the face of these torments
  chosen_spanish: frente a estas tribulaciones
  alternatives_spanish:
  - ante estas presiones
  - en medio de estas coerciones
  - frente a estos tormentos
  lexicon: LSJ
  rationale: En este contexto martirial, ἀνάγκας no expresa necesidades ordinarias sino presiones coercitivas o aflicciones impuestas. 'Tribulaciones' comunica bien el peso opresivo sin sonar mecánico, y 'frente a' conserva la relación adversativa de πρός.
- source_word: μεγαλοφρονοῦντα
  english_pob_choice: was so noble-minded
  chosen_spanish: era tan magnánimo
  alternatives_spanish:
  - era tan noble de ánimo
  - era tan grande de espíritu
  - era tan elevado de pensamiento
  lexicon: LSJ
  rationale: El participio señala grandeza de ánimo, nobleza interior o magnanimidad. 'Magnánimo' es una equivalencia natural y fiel en español, aunque 'noble de ánimo' también sería posible.
- source_word: μηδὲ ... μεταβαλλόμενον
  english_pob_choice: and that he was not even changing to pity for them
  chosen_spanish: y que ni siquiera cambiaba para compadecerse de ellos
  alternatives_spanish:
  - y que no se dejaba mover ni a compasión por ellos
  - y que ni aun cambiaba hacia la piedad por ellos
  - y que ni siquiera se inclinaba a tenerles piedad
  lexicon: LSJ
  rationale: El verbo indica un cambio de disposición o actitud. En español, 'compadecerse de ellos' expresa con claridad la idea de pasar a la compasión/piedad sin exagerar la formulación.
- source_word: οἰκτιρμὸν
  english_pob_choice: pity
  chosen_spanish: compadecerse
  alternatives_spanish:
  - piedad
  - compasión
  - misericordia
  lexicon: LSJ
  rationale: El sustantivo designa compasión o conmiseración. En esta frase el giro verbal 'compadecerse de ellos' mantiene el sentido emocional del texto griego de forma natural en español.
- source_word: ἦγον
  english_pob_choice: they led him
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo guiaron
  - lo llevaron consigo
  lexicon: LSJ
  rationale: ἄγω puede significar llevar o conducir. 'Lo llevaron' funciona bien en español y preserva la coerción del contexto; 'condujeron' sería más formal, pero menos directo.
- source_word: ἐπὶ τὸ πῦρ
  english_pob_choice: to the fire
  chosen_spanish: al fuego
  alternatives_spanish:
  - hacia el fuego
  - hasta el fuego
  - al lugar del fuego
  lexicon: LSJ
  rationale: La expresión indica movimiento hacia el lugar/instrumento de ejecución. 'Al fuego' es la forma más natural y no añade detalles que el griego no explicita.
theological_decisions:
- issue: El matiz de ἀνάγκας en un contexto de martirio
  english_pob_reading: torments / compulsions / pressures imposed on him
  chosen_spanish_reading: tribulaciones impuestas
  alternative_spanish_readings:
  - tormentos
  - presiones coercitivas
  - coerciones
  rationale: La palabra griega no se limita a 'necesidades'; aquí apunta a aflicciones o presiones externas sufridas por el mártir. 'Tribulaciones' mantiene el sufrimiento sin fijar un único matiz técnico, y deja abierta la tensión entre presión coercitiva y tormento.
  doctrine_reference: Martirio y perseverancia bajo prueba; sufrimiento fiel sin capitulación emocional.
- issue: La relación entre οἰκτιρμὸν y la disposición interior del condenado
  english_pob_reading: changing to pity for them
  chosen_spanish_reading: cambiaba para compadecerse de ellos
  alternative_spanish_readings:
  - se inclinaba a la compasión por ellos
  - tomaba piedad de ellos
  - se ablandaba hacia ellos
  rationale: 'El griego habla de un cambio de postura afectiva. ''Compadecerse de ellos'' preserva la tensión: no se trata de una mera emoción pasajera, sino de un giro interior que el texto niega. Mantenerlo así evita domesticar la dureza del relato.'
  doctrine_reference: Constancia moral ante la persecución; resistencia a la presión emocional de los perseguidores.
translation_notes:
  revision_awareness: 'La revisión inglesa pasó de ''compulsions'' a ''torments'' para ἀνάγκας y ajustó ''toward pity'' a ''to pity''. La versión española sigue ese ajuste semántico sin restringirlo a un solo equivalente: usa ''tribulaciones'' con nota explicativa para conservar tanto la presión coercitiva como el sufrimiento martirial, y expresa el giro afectivo como ''compadecerse de ellos'' para mantener la naturalidad española y la tensión del original.'
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y narrativo adecuado para texto bíblico deuterocanónico.
  - '''Yahvé'' no aplica en este versículo.'
  - No se introduce 'Cristo', 'Señor' ni terminología doctrinal ajena al griego.
  - La frase verbal 'lo llevaron al fuego' conserva la ambigüedad del destino inmediato sin especificar más de lo que el griego dice.
