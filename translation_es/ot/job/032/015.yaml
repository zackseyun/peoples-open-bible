translation:
  language: es
  text: Ellos están consternados[a]; ya no responden; las palabras se han apartado de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quebrantados», «confundidos» o «destrozados»; el verbo hebreo puede denotar quedar roto, abatido o aturdido.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «las palabras se han apartado de ellos»; es un modismo que significa que ya no tienen nada que decir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַתּוּ
  english_pob_choice: They are dismayed
  chosen_spanish: están consternados
  alternatives_spanish:
  - están dismados
  - están quebrantados
  - están confusos
  lexicon: HALOT
  rationale: El verbo expresa quedar quebrado, abatido o sobrecogido. «Consternados» comunica bien en español la reacción de estupor y abatimiento ante la refutación, sin volverse demasiado coloquial ni perder la fuerza afectiva del hebreo.
- source_word: עָנוּ
  english_pob_choice: they answer
  chosen_spanish: responden
  alternatives_spanish:
  - contestan
  - replican
  lexicon: HALOT
  rationale: En este contexto de debate, el verbo significa responder en una disputa. «Responden» es natural y conserva el valor discursivo de la escena.
- source_word: לֹא ... עוֹד
  english_pob_choice: no more
  chosen_spanish: más
  alternatives_spanish:
  - ya no
  - nunca más
  lexicon: HALOT
  rationale: Con la negación, la expresión indica que la acción cesó. «No responden más» mantiene la idea de continuación interrumpida y suena idiomático en español.
- source_word: הֶעְתִּיקוּ
  english_pob_choice: have departed
  chosen_spanish: se han apartado
  alternatives_spanish:
  - se han alejado
  - se han retirado
  - han partido
  lexicon: HALOT
  rationale: 'El hiphil de עתק aquí se usa de manera idiomática con «palabras» como sujeto: las palabras se alejan o se apartan de ellos. «Se han apartado» conserva la imagen hebrea sin forzar una paráfrasis excesiva.'
- source_word: מֵהֶם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de su parte
  - de su boca
  lexicon: HALOT
  rationale: La preposición marca separación. «De ellos» reproduce de forma simple y fiel que las palabras ya no están a su disposición.
- source_word: מִלִּים
  english_pob_choice: words
  chosen_spanish: las palabras
  alternatives_spanish:
  - argumentos
  - cosas que decir
  lexicon: HALOT
  rationale: El sustantivo básico es «palabras». Mantenerlo preserva la imagen del hebreo, según la cual las palabras mismas se alejan de los interlocutores.
translation_notes:
  revision_awareness: Sin cambios respecto al tramo fuente/auditoría en inglés; la versión española conserva el paralelismo breve, la imagen idiomática de las palabras que se apartan y la tensión léxica de חַתּוּ con una opción natural en español.
  spanish_consistency_notes:
  - Se mantiene el tono poético y conciso del hebreo con tres miembros paralelos.
  - Se conserva «palabras» en vez de «argumentos» para no suavizar la imagen original.
  - «No responden más» refleja el cese de la respuesta sin añadir contenido interpretativo.
