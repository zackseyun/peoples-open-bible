translation:
  language: es
  text: Lo que ustedes saben, yo también lo sé; no soy inferior a ustedes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no quedo por debajo de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּדַעְתְּכֶם
  english_pob_choice: what you know
  chosen_spanish: lo que ustedes saben
  alternatives_spanish:
  - según su conocimiento
  - como ustedes saben
  lexicon: HALOT
  rationale: El hebreo usa כְּ + דַּעַת + sufijo 2mp para comparar el conocimiento de Job con el de sus amigos. En español, «lo que ustedes saben» comunica de forma natural esa comparación sin volverla rígida o demasiado literal.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: yo también lo sé
  alternatives_spanish:
  - yo sé también
  - yo lo he sabido
  lexicon: HALOT
  rationale: 'Aunque la forma es perfecto 1cs, aquí funciona con sentido estativo/presente: Job afirma que posee el mismo conocimiento. El presente «lo sé» reproduce bien ese valor en español.'
- source_word: גַם אֲנִי
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - yo igual
  - yo asimismo
  lexicon: HALOT
  rationale: 'La partícula גַם añade énfasis de inclusión: Job no solo opina, sino que comparte la misma información. «Yo también» es claro y conserva el paralelismo con la primera cola.'
- source_word: לֹא נֹפֵל אָנֹכִי מִכֶּם
  english_pob_choice: I am not inferior to you
  chosen_spanish: no soy inferior a ustedes
  alternatives_spanish:
  - no quedo por debajo de ustedes
  - no me quedo atrás de ustedes
  - no soy menos que ustedes
  lexicon: HALOT
  rationale: El participio נֹפֵל con מִן expresa estar por debajo o quedar corto en comparación. En contexto, Job niega inferioridad frente a sus amigos; «no soy inferior a ustedes» conserva la fuerza comparativa sin introducir una imagen extraña en español.
- source_word: אָנֹכִי
  english_pob_choice: I am
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: אָנֹכִי añade énfasis pronominal. En español, ese énfasis queda suficientemente expresado por la estructura misma de la frase y por «yo también»; no hace falta reforzarlo más.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de Job 13:2 y se mantiene en línea con la decisión inglesa de entender נֹפֵל כמ expresión comparativa de inferioridad o quedarse corto. No se introdujeron cambios respecto del criterio auditado en la versión inglesa.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre las dos primeras cláusulas con un orden natural en español.
  - Se conservó «ustedes» para un registro neutral latinoamericano y coherente con un diálogo directo.
  - La nota conserva la alternativa lexical ya documentada en el POB inglés, adaptada a una formulación natural en español.
