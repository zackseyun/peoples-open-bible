  yaml_path: translation/ot/2_samuel/018/026.yaml
  text: Then the watchman saw another man running[a], and the watchman called to the gatekeeper and said, “Look, a man is running by himself.” And the king said, “He also brings news.”
  footnotes:
  - marker: a
    text: Or, “is a messenger”; the Hebrew participle can denote one who brings a report, often good news.
    reason: lexical_alternative
