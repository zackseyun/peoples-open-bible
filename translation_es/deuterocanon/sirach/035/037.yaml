translation:
  language: es
  text: Porque la ociosidad[a] ha enseñado mucho mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la pereza». El griego ἀργία puede significar ociosidad, pereza o inactividad; se eligió «ociosidad» por ser la opción más amplia y natural en este contexto sapiencial.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλὴν
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - gran
  - muchos
  lexicon: LSJ
  rationale: Con κακίαν en singular y abstracto, la expresión cuantifica grado o extensión, no número. «Mucho» conserva con naturalidad ese valor intensivo en español.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: Aquí γάρ introduce una explicación o fundamento. En español, «porque» da con claridad esa relación causal-explicativa sin forzar un calco.
- source_word: κακίαν
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - maldad moral
  - vicio
  lexicon: LSJ
  rationale: κακία puede abarcar maldad, perversidad o mal en sentido moral amplio. «Mal» mantiene esa amplitud sin estrecharla a una sola cualidad ética como «maldad» o el registro más técnico de «vicio».
- source_word: ἐδίδαξεν
  english_pob_choice: has taught
  chosen_spanish: ha enseñado
  alternatives_spanish:
  - enseñó
  - ha instruido
  - ha producido
  lexicon: LSJ
  rationale: El aoristo expresa una verdad proverbial u observación general. En español, el perfecto compuesto («ha enseñado») conserva ese valor de fuerza duradera en un enunciado sapiencial.
- source_word: ἡ ἀργία
  english_pob_choice: idleness
  chosen_spanish: la ociosidad
  alternatives_spanish:
  - la pereza
  - la inactividad
  - la holgazanería
  lexicon: LSJ
  rationale: ἀργία significa estar sin trabajo, inactividad o ociosidad. «Ociosidad» es la opción más amplia y sobria en español para este contexto sapiencial; «pereza» suena más a rasgo personal, y «holgazanería» es más coloquial.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; la lectura española sigue de cerca el griego y la auditoría inglesa, conservando la relación explicativa de γάρ, el valor intensivo de πολλὴν y la amplitud semántica de ἀργία y κακίαν.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente.
  - Se evita «pecado» porque κακίαν es más amplio y la fuente no restringe el sentido a una categoría específicamente religiosa.
  - 'La puntuación española refleja un proverbio breve con cadencia natural: «Porque la ociosidad ha enseñado mucho mal».'
