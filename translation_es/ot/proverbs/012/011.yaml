  - severity: low
    issue: '''Tendrá abundancia de pan'' es fiel pero algo menos idiomático que una formulación española más fluida.'
    rationale: La idea de provisión abundante se comunica mejor en español con 'tendrá pan en abundancia', que preserva la imagen concreta y mejora la naturalidad.
