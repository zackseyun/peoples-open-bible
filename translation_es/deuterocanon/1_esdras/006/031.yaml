translation:
  language: es
  text: Y ordénese que, si alguien transgrede cualquier parte de lo que ha sido escrito y lo anula, se tome una viga de su propia propiedad y sea colgado[a] en ella, y sus posesiones pasen a ser propiedad real.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sea impalado» o «sea suspendido en ella». El griego dice «colgado», pero el castigo antiguo descrito pudo haber implicado impalación o suspensión pública en una viga de madera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προστάξαι
  english_pob_choice: issue an order
  chosen_spanish: emitir una orden
  alternatives_spanish:
  - mandar
  - decretar
  lexicon: LSJ
  rationale: Conserva el sentido administrativo y oficial del infinitivo en una formulación natural en español.
- source_word: παραβῶσίν
  english_pob_choice: transgresses
  chosen_spanish: transgreda
  alternatives_spanish:
  - viole
  - sobrepase
  lexicon: LSJ
  rationale: ‘Transgredir’ mantiene el matiz jurídico de ir contra lo prescrito, más cercano al valor legal del verbo griego.
- source_word: τι τῶν γεγραμμένων
  english_pob_choice: any part of what has been written
  chosen_spanish: cualquier parte de lo que ha sido escrito
  alternatives_spanish:
  - algo de lo escrito
  - cualquiera de las cosas escritas
  lexicon: LSJ
  rationale: La construcción griega es amplia y no especifica más que un fragmento o porción de lo escrito; la versión española conserva esa amplitud.
- source_word: ἀκυρώσωσιν
  english_pob_choice: nullifies it
  chosen_spanish: lo anula
  alternatives_spanish:
  - lo invalida
  - lo deja sin efecto
  lexicon: LSJ
  rationale: ‘Anular’ expresa bien el valor de volver inválido o sin fuerza legal lo escrito, sin cargarlo innecesariamente de paráfrasis.
- source_word: λημφθῆναι ξύλον
  english_pob_choice: a beam shall be taken
  chosen_spanish: se tome una viga
  alternatives_spanish:
  - se tome un madero
  - se tome un leño
  lexicon: LSJ
  rationale: ξύλον puede ser madera, madero o viga; en este contexto punitivo, ‘viga’ es una equivalencia natural y concreta que preserva el objeto de madera sin sobreinterpretarlo.
- source_word: ἐκ τῶν ἰδίων αὐτοῦ
  english_pob_choice: from his own property
  chosen_spanish: de su propia propiedad
  alternatives_spanish:
  - de sus bienes
  - de lo que es suyo
  lexicon: LSJ
  rationale: La frase griega es amplia; ‘propiedad’ refleja el alcance patrimonial que la auditoría inglesa decidió mantener, sin restringir indebidamente a la casa.
- source_word: κρεμασθῆναι
  english_pob_choice: he shall be hanged
  chosen_spanish: sea colgado
  alternatives_spanish:
  - sea impalado
  - sea suspendido
  lexicon: LSJ
  rationale: El verbo significa colgar o suspender. Se conserva ‘colgado’ en el texto principal y se deja la alternativa punitiva en nota, como en el inglés auditado.
- source_word: τὰ ὑπάρχοντα αὐτοῦ
  english_pob_choice: his possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - sus bienes
  - su propiedad
  lexicon: LSJ
  rationale: ‘Posesiones’ comunica el conjunto de bienes materiales de manera amplia y natural en español.
- source_word: βασιλικά
  english_pob_choice: royal property
  chosen_spanish: propiedad real
  alternatives_spanish:
  - bienes del rey
  - propiedad del rey
  lexicon: LSJ
  rationale: La forma adjetival griega indica pertenencia al rey; ‘propiedad real’ preserva el registro legal y formal del resultado de la confiscación.
theological_decisions:
- issue: Sentido de κρεμασθῆναι en un contexto penal persa
  english_pob_reading: he shall be hanged
  chosen_spanish_reading: sea colgado
  alternative_spanish_readings:
  - sea impalado
  - sea suspendido en ella
  rationale: La redacción principal sigue el sentido léxico directo del griego. Se preserva la tensión histórica entre ‘colgado’ e ‘impalado/suspendido’ sin resolverla artificialmente.
  doctrine_reference: Conservar la tensión documental; no armonizar más allá de la evidencia.
translation_notes:
  revision_awareness: 'La versión española corrige el error anterior de no anclar la nota al texto: ahora el marcador [a] aparece junto a «colgado», para que la alternativa léxica quede auditable y visible. También se mantiene la amplitud de ἐκ τῶν ἰδίων αὐτοῦ como ‘de su propia propiedad’, siguiendo la revisión más reciente del audit trail.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva un registro jurídico-formal coherente con el contexto de decreto real.
  - No se reemplaza 'real' por 'del rey' porque el adjetivo español conserva la misma relación legal que βασιλικά.
