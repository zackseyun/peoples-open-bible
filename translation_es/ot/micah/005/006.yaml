review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en su estructura principal: ‘remanente de Jacob’, ‘en medio de muchos pueblos’, la doble comparación con rocío/lluvias, y la cláusula relativa aplicada a la imagen meteorológica independiente de la agencia humana. También respeta correctamente יְהוָה como ‘Yahvé’. Sin embargo, hay dos problemas de fidelidad/claridad: ‘lluvias’ es demasiado genérico para רְבִיבִים, que aquí apunta mejor a ‘chubascos’ o ‘aguaceros’; y ‘hijos de hombre’ es una reproducción demasiado literal y poco natural en español, cuando la nota ya puede preservar la expresión hebrea.'
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero suena algo rígido en dos puntos: ‘como lluvias sobre la hierba’ pierde viveza frente al plural concreto del hebreo, y ‘a los hijos de hombre’ resulta poco idiomático en español bíblico actual. También conviene ajustar la colocación de las notas para que la [b] ancle realmente donde se explica el hebraísmo.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: ‘Yahvé’, ‘remanente’, ‘Jacob’, ‘pueblos’. No hay conflicto con los términos doctrinales principales. La excepción recomendada es no calc ar בני אדם como ‘hijos de hombre’ en el texto principal; mejor ‘los seres humanos’ con nota que preserve el hebreo.'
  issues:
  - severity: medium
    issue: ‘lluvias’ para רְבִיבִים es demasiado amplio
    rationale: רְבִיבִים denota lluvias/copiosas precipitaciones o chubascos; ‘lluvias’ no es incorrecto, pero debilita la imagen concreta y paralela con ‘rocío’.
  - severity: medium
    issue: ‘hijos de hombre’ es poco natural en español
    rationale: Aunque refleja formalmente בני אדם, en español suena forzado y puede confundir. La audit trail inglesa mantuvo ‘sons of man’ por una decisión formal propia del inglés, pero el encargo español pide legibilidad e inteligibilidad. Conviene usar ‘los seres humanos’ y conservar el hebraísmo en nota.
  - severity: low
    issue: La nota [b] está anclada en ‘hierba’ pero explica ‘hijos de hombre’
    rationale: El marcador debe aparecer exactamente donde corresponde la explicación para evitar ambigüedad editorial.
  revised_spanish_text: El remanente de Jacob estará en medio de muchos pueblos como rocío de Yahvé[a], como chubascos sobre la hierba, que no esperan a un hombre ni aguardan a los seres humanos[b].
  revised_footnotes:
