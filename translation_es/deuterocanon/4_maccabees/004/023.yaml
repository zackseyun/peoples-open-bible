  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas centrales son adecuadas, salvo que conviene reflejar mejor el eco entre καταλῦσαι y καταλυομένας. «Quebrantar» + «quedar sin efecto» preserva bien el paralelismo semántico en español.
