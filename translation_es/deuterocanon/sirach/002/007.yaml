  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה se vierte correctamente como «Yahvé»; ἔλεος/חסד como «misericordia» está bien justificado; no hay conflictos con términos doctrinales mayores. La única desalineación real es técnica-editorial: la nota léxica de חסד debe anclarse a «misericordia», no a «Yahvé».'
