translation:
  language: es
  text: y un macho cabrío como ofrenda por el pecado,[a] además del holocausto continuo,[b] con su ofrenda de cereal y su libación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un cabrío como ofrenda por el pecado». El hebreo puede expresarse más explícitamente como «un macho cabrío».'
    reason: lexical_alternative
  - marker: b
    text: «Continuo» traduce el término hebreo para la ofrenda constante y recurrente; muchas versiones lo traducen «regular» o «diario».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִ֥יר
  english_pob_choice: and one goat
  chosen_spanish: y un macho cabrío
  alternatives_spanish:
  - y un cabrío
  - y un macho de las cabras
  lexicon: HALOT
  rationale: שׂעיר designa un macho cabrío, especialmente en contextos sacrificiales. En español, 'macho cabrío' preserva la precisión léxica mejor que 'cabro' o 'cabra', y el numeral 'uno' queda implicado por el artículo indefinido singular.
- source_word: חַטָּ֖את
  english_pob_choice: for a sin offering
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado expiatorio
  - para ofrenda por el pecado
  lexicon: HALOT
  rationale: En contexto cultual, חטאת se refiere a la ofrenda por el pecado, no al pecado abstracto. 'Como ofrenda por el pecado' reproduce la función sacrificial de manera clara y natural en español; 'para' sería posible, pero 'como' sigue mejor la relación predicativa implícita del hebreo.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: El numeral especifica la cantidad del macho cabrío. En español, el artículo indefinido singular expresa esa cantidad de forma natural junto con el sustantivo.
- source_word: מִ/לְּ/בַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - además del
  lexicon: HALOT
  rationale: La expresión marca que esta ofrenda se añade a otra ya establecida. 'Además de' es la forma más natural y precisa en español para transmitir ese valor aditivo.
- source_word: עֹלַ֣ת
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - sacrificio totalmente quemado
  lexicon: HALOT
  rationale: Aunque 'holocausto' es un término tradicional, aquí corresponde al עולה sacrificial. Se conserva porque en español bíblico transmite bien la ofrenda completamente consumida por el fuego; 'ofrenda quemada' sería más descriptiva, pero menos asentada.
- source_word: הַ/תָּמִ֔יד
  english_pob_choice: the regular
  chosen_spanish: continuo
  alternatives_spanish:
  - regular
  - permanente
  - diario
  lexicon: HALOT
  rationale: תמיד indica la ofrenda establecida y recurrente. En español, 'continuo' preserva mejor la idea de continuidad cultual que 'regular'; además, evita restringir indebidamente el sentido a 'diario'.
- source_word: מִנְחָתָ֖/הּ
  english_pob_choice: with its grain offering
  chosen_spanish: con su ofrenda de cereal
  alternatives_spanish:
  - con su ofrenda de grano
  - con su oblación de cereal
  lexicon: HALOT
  rationale: מנחה en contexto sacrificial se refiere a la ofrenda de cereal que acompaña al holocausto. 'Ofrenda de cereal' mantiene el sentido ritual de forma transparente en español; 'grano' es posible, pero menos idiomático en registros bíblicos actuales.
- source_word: וְ/נִסְכָּֽ/הּ
  english_pob_choice: and its drink offering
  chosen_spanish: y su libación
  alternatives_spanish:
  - y su ofrenda líquida
  - y su ofrenda de bebida
  lexicon: HALOT
  rationale: נסך en listas sacrificiales denota la libación. 'Libación' conserva la precisión técnica del rito y evita la ambigüedad de 'bebida', que sonaría menos cultual en español.
theological_decisions:
- issue: Alcance de la ofrenda חטאת en contexto levítico
  english_pob_reading: for a sin offering
  chosen_spanish_reading: como ofrenda por el pecado
  alternative_spanish_readings:
  - para ofrenda por el pecado
  - como sacrificio por el pecado
  rationale: La formulación mantiene la categoría sacrificial sin convertirla en una explicación doctrinal. Se evita traducirla como 'sacrificio' de manera exclusiva, porque el término técnico de ofrenda queda mejor preservado.
  doctrine_reference: Levítico 4; Números 28–29
- issue: Sentido de תמיד en el sistema de sacrificios
  english_pob_reading: the regular burnt offering
  chosen_spanish_reading: el holocausto continuo
  alternative_spanish_readings:
  - el holocausto regular
  - el holocausto diario
  rationale: La opción 'continuo' mantiene la tensión entre continuidad ritual y recurrencia establecida. No se reduce a 'diario', porque el hebreo puede abarcar más que simple frecuencia cronológica.
  doctrine_reference: Éxodo 29:38-42; Números 28:3-8
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo consonante-vocalizado del WLC y armoniza con el audit trail inglés: conserva la suma de elementos rituales (macho cabrío, ofrenda por el pecado, holocausto continuo, ofrenda de cereal y libación) sin expandir el contenido más allá de lo explícito. No se documentaron revisiones aplicadas en el pase inglés reciente; la versión se mantiene alineada con el consenso de alta concordancia.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió 'holocausto' para עולה por coherencia con el léxico sacrificial tradicional del proyecto.
  - '''Ofrenda de cereal'' se usa como equivalente de מנחה en contexto cultual, consistente con el resto del corpus.'
  - '''Libación'' se conserva por su valor técnico y para evitar una paráfrasis moderna excesiva.'
