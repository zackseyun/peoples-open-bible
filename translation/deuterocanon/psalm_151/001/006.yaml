theological_decisions:
- issue: Rendering ἀλλόφυλος in a David-and-Goliath context
  chosen_reading: the foreigner
  alternative_readings:
  - the Philistine
  rationale: Although the narrative background points to Goliath, the Greek witness in this verse uses the generic ethnic outsider term ἀλλόφυλος rather than naming 'Philistine' directly. Following original-language primacy, the main text keeps the broader wording, while the more specific contextual identification is preserved in a footnote.
  doctrine_reference: Translation philosophy §1; §5
- issue: Force of ἐν τοῖς εἰδώλοις αὐτοῦ
  chosen_reading: by his idols
  alternative_readings:
  - in the name of his idols
  rationale: The phrase indicates that the curse was made with appeal to the opponent's idols. The main text keeps a relatively formal rendering; a more interpretive expansion is footnoted to preserve the likely sense without overstating it.
  doctrine_reference: Translation philosophy §3
