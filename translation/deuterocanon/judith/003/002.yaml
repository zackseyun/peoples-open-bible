  text: Ἰδοὺ ἡμεῖς οἱ παῖδες Ναβουχοδονοσὸρ βασιλέως μεγάλου παρακείμεθα ἐνώπιόν σου, χρῆσαι ἡμῖν καθὼς ἀρεστόν ἐστιν τῷ προσώπῳ σου·
