translation:
  language: es
  text: Así que lo dejaron hasta la mañana[a], tal como Moisés había mandado, y no hedió, ni hubo gusanos en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «larvas»; el sustantivo hebreo puede referirse en general a criaturas de descomposición semejantes a gusanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנִּיחוּ
  english_pob_choice: they left
  chosen_spanish: lo dejaron
  alternatives_spanish:
  - lo apartaron
  - lo colocaron
  - lo guardaron
  lexicon: HALOT
  rationale: En este contexto de maná conservado durante la noche, הניח expresa dejar algo quieto o sin mover. «Lo dejaron» comunica de forma natural la acción de dejarlo sin tocar, sin forzar una imagen más específica que el hebreo no exige.
- source_word: אֹתוֹ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - él
  - eso
  lexicon: HALOT
  rationale: El pronombre retoma el maná en singular. En español, el objeto directo masculino singular «lo» preserva esa referencia sin introducir una paráfrasis.
- source_word: עַד הַבֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta por la mañana
  - hasta el amanecer
  lexicon: HALOT
  rationale: La expresión temporal es idiomática. «Hasta la mañana» es natural en español y mantiene la referencia al tiempo señalado por el texto.
- source_word: כַּאֲשֶׁר צִוָּה מֹשֶׁה
  english_pob_choice: just as Moses had commanded
  chosen_spanish: tal como Moisés había mandado
  alternatives_spanish:
  - como Moisés había ordenado
  - según Moisés había mandado
  lexicon: HALOT
  rationale: «Tal como» conserva la relación comparativa. «Había mandado» sigue de cerca el verbo de mandato y mantiene la anterioridad de la orden respecto de la acción.
- source_word: הִבְאִישׁ
  english_pob_choice: did not stink
  chosen_spanish: no se pudrió
  alternatives_spanish:
  - no hedió
  - no apestó
  - no se echó a perder
  lexicon: HALOT
  rationale: El verbo hebreo puede referirse a volverse fétido o corromperse. En español, «no se pudrió» expresa bien la descomposición implícita en el contexto del maná guardado, sin reducirlo solo al olor.
- source_word: רִמָּה
  english_pob_choice: worms
  chosen_spanish: gusanos
  alternatives_spanish:
  - larvas
  - maggots
  lexicon: HALOT
  rationale: El sustantivo hebreo puede abarcar criaturas de descomposición tipo gusanos/larvas. «Gusanos» es la opción más amplia y natural en español, manteniendo la fuerza del deterioro sin estrechar el sentido.
- source_word: לֹא הָיְתָה בּוֹ
  english_pob_choice: nor were there any ... in it
  chosen_spanish: ni hubo ... en él
  alternatives_spanish:
  - y no había ... en él
  - ni había ... en él
  lexicon: HALOT
  rationale: La construcción existencial negativa se expresa con naturalidad en español mediante «no hubo»/«ni hubo». Se eligió «ni hubo» para reflejar la coordinación con la cláusula anterior y el sentido de ausencia total.
translation_notes:
  revision_awareness: La versión inglesa auditada permanece estable (sin revisiones aplicadas); el español sigue de cerca las decisiones léxicas ya acordadas, ajustándolas a la idiomaticidad natural del español sin perder la fuerza de deterioro/no deterioro del contraste.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de los nombres propios y del tiempo narrativo de forma consistente y publicable.
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - «Lo» retoma correctamente el referente singular del maná y evita una formulación impersonal innecesaria.
