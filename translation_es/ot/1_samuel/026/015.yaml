review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y del POB inglés: la reprensión a Abner, la comparación retórica, la falta de vigilancia, y la llegada de una persona para destruir al rey. Sin embargo, hay un problema de anclaje de notas: las notas [a][b] están puestas tras «Abner», pero su contenido corresponde a «uno del pueblo» y «quién es como tú en Israel». Además, «vigilado a» es menos natural que una formulación de custodia como «montado guardia sobre» o «vigilado» con mejor complemento.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para mayor naturalidad y fidelidad retórica. «David» debería ajustarse al uso bíblico español común como «David»/«Davíd»? En español estándar bíblico es «David», pero el proyecto ya usa formas como Jesús/Yahvé; aquí conviene «David» solo si así se estila internamente. Dado el borrador y el uso común protestante/católico en español bíblico, «David» es aceptable, pero «vigilado a tu señor, el rey» suena algo forzado. La puntuación y el registro son buenos.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «señor» para אֲדֹן es adecuado en contexto cortesano. «destruir» preserva bien לְהַשְׁחִית. La repetición «el rey, tu señor» se mantiene correctamente. La única corrección necesaria es reubicar las notas y mejorar levemente la expresión de vigilancia.
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas en el lugar equivocado.
    rationale: La nota sobre «uno del pueblo» debe anclarse en esa frase, y la nota alternativa sobre «quién es como tú» debe anclarse en esa cláusula, no en «Abner». Esto incumple la disciplina requerida de marcadores exactos en la frase pertinente.
  - severity: low
    issue: «no has vigilado a tu señor» suena menos natural en español para una custodia real.
    rationale: Aunque comprensible, «vigilar a» tiende a sonar como observar a alguien más que protegerlo. «no has montado guardia sobre tu señor el rey» o «no has vigilado a tu señor el rey» sin coma serían opciones más naturales; «guardado» también sería válido.
  revised_spanish_text: 'David dijo a Abner: «¿No eres un hombre? ¿Y quién es como tú[a] en Israel? ¿Por qué entonces no has montado guardia sobre tu señor el rey? Porque uno del pueblo[b] vino a destruir al rey, tu señor».'
  revised_footnotes:
