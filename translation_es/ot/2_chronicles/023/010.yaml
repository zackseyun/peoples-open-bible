base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/023/010.yaml
  text: And he stationed all the people[a], each man with his weapon in his hand, from the right side of the house to the left side of the house, by the altar and by the house[c][b], around the king.
  footnotes:
  - marker: a
    text: Hebrew 'from the right side of the house to the left side of the house'; in this setting these correspond to the south and north sides.
    reason: lexical_alternative
  - marker: b
    text: Or 'each man with his spear in his hand'; the Hebrew term can refer more specifically to a weapon such as a spear or missile weapon.
    reason: lexical_alternative
  - marker: c
    text: '''The house'' here refers to the temple complex.'
    reason: cultural_note
