  source_alignment_summary: 'El borrador español refleja bien el hebreo y la línea del POB en casi todo: וַיָּשִׂימוּ = «pusieron», כֵּלָיו = «su armadura» según la revisión auditada, בֵּית = «casa», גֻּלְגָּלְתּוֹ = «cráneo», תָקְעוּ = «fijaron», y דָּגוֹן = «Dagón». El problema principal no es de traducción base sino de anclaje de notas: los marcadores [a]/[b] están invertidos respecto del contenido de las notas, de modo que la nota sobre «casa/templo» queda anclada al lugar equivocado y la nota sobre «cráneo/cabeza» también.'
