translation:
  language: es
  text: 'Y David dijo: «Mi hijo Salomón es joven e inexperto[a], y la casa[b] que ha de edificarse para Yahvé debe ser sumamente grande, para fama y para esplendor en todas las tierras[c]. Ahora prepararé para ella». Así David hizo abundantes preparativos antes de su muerte.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «joven y tierno». El hebreo puede denotar blandura o delicadeza; aquí probablemente se refiere a inmadurez o falta de experiencia.
    reason: lexical_alternative
  - marker: b
    text: 'O «el templo». Hebreo: «la casa».'
    reason: lexical_alternative
  - marker: c
    text: O «para nombre y para gloria/hermosura». La expresión hebrea apunta a renombre y magnificencia pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעַר
  english_pob_choice: young
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - joven de edad
  lexicon: HALOT
  rationale: En este contexto describe la juventud relativa de Salomón, no necesariamente niñez. «Joven» es natural en español y conserva el valor de edad que el POB inglés mantuvo con 'young'.
- source_word: וָרָךְ
  english_pob_choice: inexperienced
  chosen_spanish: tierno
  alternatives_spanish:
  - inexperto
  - delicado
  - inmaduro
  lexicon: HALOT
  rationale: El hebreo sugiere blandura/delicadeza, y el POB inglés lo interpretó contextual y dinámicamente como falta de madurez o experiencia. En español, «tierno» mantiene la tensión entre edad y fragilidad/madurez incipiente, y además deja abierta la matización lexical que el inglés había explicado en nota.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: Se conserva el término literal del hebreo. «Casa» mantiene la resonancia del original y evita sustituirlo por una interpretación más explicativa como «templo».
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para el Señor
  lexicon: HALOT
  rationale: La política del proyecto pide «Yahvé» para יהוה. Se mantiene el nombre divino explícito en lugar de enmascararlo como «Señor».
- source_word: לְהַגְדִּיל לְמַעְלָה
  english_pob_choice: must be exceedingly great
  chosen_spanish: debe engrandecerse mucho
  alternatives_spanish:
  - debe ser sumamente grande
  - debe hacerse grandísimo
  lexicon: HALOT
  rationale: El hebreo intensifica la grandeza del edificio. «Engrandecerse mucho» refleja el valor intensivo sin sonar forzado en español; conserva el sentido de magnitud extraordinaria.
- source_word: לְשֵׁם וּלְתִפְאֶרֶת
  english_pob_choice: for fame and for splendor
  chosen_spanish: para nombre y para hermosura
  alternatives_spanish:
  - para fama y para esplendor
  - para renombre y para gloria
  lexicon: HALOT
  rationale: «Nombre» reproduce el sustantivo hebreo שֵׁם y preserva la tensión del original entre reputación y significado nominal. «Hermosura» refleja תִפְאֶרֶת con un matiz de belleza/grandeza visible, sin perder el eco de magnificencia pública.
- source_word: לְכָל הָאֲרָצוֹת
  english_pob_choice: in all lands
  chosen_spanish: en todas las tierras
  alternatives_spanish:
  - en todos los países
  - entre todas las naciones
  lexicon: HALOT
  rationale: «Tierras» conserva el plural amplio de ארצות y mantiene el alcance internacional del texto mejor que una reducción moderna a «países».
- source_word: אָכִינָה נָּא לוֹ
  english_pob_choice: I will now make preparation for it
  chosen_spanish: Ahora yo prepararé todo para ella
  alternatives_spanish:
  - Ahora prepararé para ella
  - Voy a hacer ahora la preparación para ella
  lexicon: HALOT
  rationale: El cohortativo expresa resolución y el objeto pronominal apunta al proyecto/la casa. En español, «prepararé todo para ella» comunica la misma decisión con fluidez. Se usa «ella» para concordar con «la casa» y evitar ambigüedad referencial.
- source_word: לָרֹב
  english_pob_choice: abundant preparations
  chosen_spanish: abundantes preparativos
  alternatives_spanish:
  - preparativos en abundancia
  - muchos preparativos
  lexicon: HALOT
  rationale: La frase indica cantidad/abundancia. «Abundantes preparativos» es natural en español y conserva el matiz cuantitativo del hebreo y del POB inglés.
- source_word: לִפְנֵי מוֹתוֹ
  english_pob_choice: before his death
  chosen_spanish: antes de su muerte
  alternatives_spanish:
  - antes de morir
  - previo a su muerte
  lexicon: HALOT
  rationale: Se mantiene la relación temporal directa del hebreo con registro sobrio y narrativo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: La política de esta serie exige transliterar el Tetragrama como «Yahvé». Esto preserva el nombre propio del pacto y evita la convención de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de הַבַּיִת como edificación sagrada
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  rationale: Se conserva la literalidad del hebreo. El contexto ya deja claro que se trata de la casa para Yahvé; no se sustituye por «templo» para no perder el eco textual.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Valor de לְשֵׁם וּלְתִפְאֶרֶת
  english_pob_reading: for fame and for splendor
  chosen_spanish_reading: para nombre y para hermosura
  alternative_spanish_readings:
  - para fama y para esplendor
  - para renombre y para gloria
  rationale: Se preserva la tensión del hebreo entre «nombre» como reputación y «hermosura» como esplendor visible. «Hermosura» evita reducir el par a una mera expresión de prestigio abstracto.
  doctrine_reference: HALOT / source context
- issue: Relación entre la casa y la amplitud internacional de su propósito
  english_pob_reading: in all lands
  chosen_spanish_reading: en todas las tierras
  alternative_spanish_readings:
  - entre todas las naciones
  - por toda la tierra
  rationale: La frase apunta a alcance internacional, no a territorio local. «En todas las tierras» conserva la amplitud del plural hebreo.
  doctrine_reference: Source context
- issue: Referencia del pronombre en אָכִינָה נָּא לוֹ
  english_pob_reading: it
  chosen_spanish_reading: ella
  alternative_spanish_readings:
  - ello
  - para ella
  rationale: El antecedente inmediato en español es «la casa». Traducir el pronombre como «ella» hace explícita la referencia y evita ambigüedad, sin alterar el referente del proyecto.
  doctrine_reference: Spanish clarity / source context
translation_notes:
  revision_awareness: El auditable inglés POB pasó de 'made exceedingly great in fame and splendor in all lands' a 'be exceedingly great, for fame and for splendor in all lands' para reflejar mejor la estructura hebrea y la relación de propósito/resultado. La versión española sigue esa lectura al conservar el paralelo 'para nombre y para hermosura en todas las tierras' y evitar una paráfrasis excesiva. También se mantuvo la decisión de traducir הַבַּיִת literalmente como 'la casa' y no 'el templo', y se preservó el matiz lexical de וָרָךְ con una nota de alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se mantiene la literalidad de «la casa» para הַבַּיִת.
  - Se conserva una dicción digna y clara, con sintaxis española natural.
  - Se evita importar terminología eclesiástica tradicional cuando el hebreo permite una forma más directa.
  - Las notas al pie usan marcadores únicos y aparecen ancladas solo donde corresponde.
