translation:
  language: es
  text: Y dividieron las bestias[a] entre las falanges, y junto a cada elefante colocaron mil hombres con cotas de malla, con cascos de bronce sobre sus cabezas[c][b], y quinientos jinetes escogidos, asignados a cada bestia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre las divisiones» o «entre las compañías». La expresión griega εἰς τὰς φάραγγας es difícil; aquí se adopta una lectura militar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «las bestias»; el contexto deja claro que se trata de elefantes.
    reason: lexical_alternative
  - marker: c
    text: O «sobre cada elefante» o «para cada elefante». La preposición griega admite más de una relación espacial o funcional.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεῖλον
  english_pob_choice: they divided
  chosen_spanish: dividieron
  alternatives_spanish:
  - repartieron
  - distribuyeron
  lexicon: LSJ
  rationale: El aoristo de διαιρέω expresa división o reparto. «Dividieron» conserva el sentido de disposición militar sin añadir matices no presentes en el griego.
- source_word: τὰ θηρία
  english_pob_choice: the beasts
  chosen_spanish: las fieras
  alternatives_spanish:
  - los animales
  - los elefantes
  lexicon: LSJ
  rationale: El griego dice literalmente «las fieras». En este contexto el referente son los elefantes, pero conservar «fieras» respeta la redacción fuente y deja que el contexto inmediato aclare el referente.
- source_word: εἰς τὰς φάραγγας
  english_pob_choice: among the phalanxes
  chosen_spanish: entre las falanges
  alternatives_spanish:
  - en las divisiones
  - entre las compañías
  - entre los escuadrones
  lexicon: LSJ
  rationale: La expresión es difícil y admite sentido militar. «Falanges» sigue de cerca la revisión inglesa y mantiene la posible referencia a formaciones militares sin forzar una paráfrasis más explicativa.
- source_word: παρέστησαν
  english_pob_choice: they stationed
  chosen_spanish: colocaron
  alternatives_spanish:
  - apostaron
  - pusieron
  lexicon: LSJ
  rationale: En contexto militar παρίστημι puede significar colocar o situar junto a. «Colocaron» es natural en español y preserva la idea de despliegue táctico.
- source_word: ἐφʼ ἑκάστῳ ἐλέφαντι
  english_pob_choice: beside each elephant
  chosen_spanish: junto a cada elefante
  alternatives_spanish:
  - sobre cada elefante
  - para cada elefante
  - en cada elefante
  lexicon: LSJ
  rationale: La preposición ἐπί con dativo puede indicar sobre, en, junto a o para. «Junto a» evita sugerir que los mil hombres iban montados sobre el animal y encaja con la escena militar.
- source_word: χιλίους ἄνδρας τεθωρακισμένους ἐν ἁλυσιδωτοῖς
  english_pob_choice: a thousand men in coats of mail
  chosen_spanish: mil hombres armados con corazas de malla
  alternatives_spanish:
  - mil hombres con armaduras de malla
  - mil hombres con cotas de malla
  lexicon: LSJ
  rationale: τεθωρακισμένους indica hombres equipados con armadura; ἐν ἁλυσιδωτοῖς apunta a una protección de malla. «Corazas de malla» comunica el tipo de armadura de modo claro y relativamente idiomático.
- source_word: περικεφαλαῖαι χαλκαῖ
  english_pob_choice: bronze helmets
  chosen_spanish: cascos de bronce
  alternatives_spanish:
  - yelmos de bronce
  - cascos broncíneos
  lexicon: LSJ
  rationale: La frase militar se rinde de forma directa. «Cascos de bronce» es natural en español moderno y mantiene la precisión del material.
- source_word: διατεταγμένοι
  english_pob_choice: assigned
  chosen_spanish: asignados
  alternatives_spanish:
  - dispuestos
  - destacados
  - ordenados
  lexicon: LSJ
  rationale: El participio expresa arreglo o distribución conforme a una función táctica. «Asignados» transmite con claridad su adscripción a cada elefante.
- source_word: ἐκλελεγμένοι
  english_pob_choice: picked
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - seleccionados
  lexicon: LSJ
  rationale: El participio perfecto indica hombres seleccionados. «Escogidos» conserva la idea de selección especial y suena natural en español.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al conservar la lectura militar de φάραγγας como «falanges», mientras mantiene las demás decisiones léxicas del audit trail. Se evita una traducción mecánica y se preserva la tensión entre el literal griego «las fieras» y el referente contextual «elefantes».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se mantiene un registro militar sobrio y directo, consistente con el tono narrativo de 1 Macabeos.
  - Se evita «Cristo»/«Mesías» por no ser pertinente aquí.
  - «Fieras» se conserva en el texto principal para reflejar τὰ θηρία, con aclaración en nota.
  - «Corazas de malla» y «cascos de bronce» buscan equilibrio entre precisión técnica y legibilidad bíblica en español.
