translation:
  language: es
  text: 'Para el director del coro: según la cierva del alba[a]. Salmo de David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la cierva de la aurora”. El hebreo probablemente nombra una melodía o un acompañamiento musical.
    reason: lexical_alternative
  - marker: b
    text: “De David” puede indicar autoría, asociación, colección o dedicación; el hebreo no especifica más de cerca.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de canto
  - Al director musical
  lexicon: HALOT
  rationale: En los títulos de salmos, el término señala al responsable de la ejecución musical. “Director del coro” comunica bien la función cultual y musical en español sin forzar una interpretación más técnica que el hebreo no exige.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - sobre
  - conforme a
  - al ritmo de
  lexicon: HALOT
  rationale: En esta clase de superscripción, la preposición introduce probablemente una indicación de melodía o estilo. “Según” preserva de forma natural esa relación y mantiene la ambigüedad entre melodía, modo o indicación musical.
- source_word: אַיֶּלֶת הַשַּׁחַר
  english_pob_choice: The Doe of the Dawn
  chosen_spanish: La cierva del alba
  alternatives_spanish:
  - La hind del alba
  - La cierva de la aurora
  lexicon: HALOT
  rationale: La expresión probablemente funciona como título de una melodía o indicación musical. “Cierva” refleja el sustantivo femenino del hebreo, y “alba” es una forma clara y digna de expresar הַשַּׁחַר en español.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Canto
  lexicon: HALOT
  rationale: En español de encabezados bíblicos, “Salmo” es la forma natural y tradicional, y comunica adecuadamente el género del texto sin añadir matices ajenos.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: 'La preposición hebrea permite varias relaciones: autoría, asociación o dedicación. “De David” conserva esa amplitud mejor que una opción más específica y coincide con la lectura amplia documentada en el POB inglés.'
theological_decisions:
- issue: Naturaleza de la frase אַיֶּלֶת הַשַּׁחַר
  english_pob_reading: Treat as a musical/tune title rather than as part of the psalm body
  chosen_spanish_reading: Tratarla como título o indicación musical, no como parte del cuerpo del salmo
  alternative_spanish_readings:
  - Tomarla como una imagen temática del salmo
  - Entenderla como un símbolo devocional
  rationale: La estructura del encabezado favorece una indicación de ejecución musical. La traducción no debe cerrar esa ambigüedad ni importar una lectura simbólica no exigida por la sintaxis.
  doctrine_reference: Principio de primacía del texto original y preservación de ambigüedades legítimas
- issue: Alcance de לְדָוִד
  english_pob_reading: Render broadly as association ('of David')
  chosen_spanish_reading: Dejar abierta la relación con David
  alternative_spanish_readings:
  - Por David
  - Para David
  - Escrito por David
  rationale: El hebreo no obliga a una sola relación. “De David” evita afirmar con exceso la autoría, sin eliminar la conexión tradicional y textualmente plausible.
  doctrine_reference: Principio de tensión textual preservada en lugar de resolución indebida
translation_notes:
  revision_awareness: Se mantiene la lectura de encabezamiento musical y la amplitud de לְדָוִד conforme al último pase de revisión, sin cambios necesarios según el resumen de concordancia alta.
  spanish_consistency_notes:
  - Se evitó traducir mecanicamente desde el inglés; se trabajó desde la sintaxis del hebreo y el uso de encabezamientos salmódicos.
  - Se prefirió terminología bíblica clara y actual en español, conservando la función cultual del texto.
  - Los marcadores de nota coinciden con el texto principal y aparecen solo una vez cada uno.
