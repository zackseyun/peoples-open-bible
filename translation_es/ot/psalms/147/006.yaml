    issue: מְעוֹדֵד se tradujo «sostiene» en lugar de reflejar el contraste vertical documentado.
    rationale: El rastro de auditoría inglés escogió «lifts up» precisamente por el paralelismo con «brings down». En español, «levanta» preserva mejor esa antítesis y sigue siendo natural.
  - severity: medium
