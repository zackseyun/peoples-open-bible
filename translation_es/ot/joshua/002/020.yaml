translation:
  language: es
  text: Pero si revelas este asunto nuestro[a], entonces quedaremos libres[b] de tu juramento que nos hiciste jurar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Asunto» traduce el hebreo דָּבָר con un alcance amplio: puede significar palabra, asunto, materia o tema; aquí se refiere a la misión secreta de los espías.'
    reason: lexical_alternative
  - marker: b
    text: «Quedaremos libres» refleja el hebraísmo נְקִיִּם, que también puede expresarse como «inocentes» o «sin culpa»; aquí el sentido es quedar exentos de la obligación del juramento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  lexicon: HALOT
  rationale: La combinación de conjunción + condicional introduce una excepción contrastiva respecto de la promesa anterior; «Pero si» conserva esa fuerza discursiva en español natural.
- source_word: תַּגִּידִי
  english_pob_choice: you tell
  chosen_spanish: revelan
  alternatives_spanish:
  - dicen
  - informan
  - declaran
  - hacen saber
  lexicon: HALOT
  rationale: En este contexto el verbo no es meramente 'decir', sino dar a conocer algo secreto. «Revelan» expresa bien el matiz de hacer público o sacar a la luz lo oculto.
- source_word: אֶת דְּבָרֵנוּ זֶה
  english_pob_choice: this matter of ours
  chosen_spanish: este asunto nuestro
  alternatives_spanish:
  - este negocio nuestro
  - esta cosa nuestra
  - este hecho nuestro
  - esta palabra nuestra
  lexicon: HALOT
  rationale: דָּבָר puede abarcar 'palabra', 'asunto' o 'materia'. Aquí apunta a la misión secreta de los espías, por lo que «asunto» comunica el alcance contextual sin reducirlo a mera palabra dicha.
- source_word: וְהָיִינוּ נְקִיִּם
  english_pob_choice: then we will be free
  chosen_spanish: entonces quedaremos libres
  alternatives_spanish:
  - entonces seremos inocentes
  - entonces estaremos exentos
  - entonces quedaremos sin culpa
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y expresa quedar desligados o exentos de una obligación. «Quedaremos libres» preserva esa fuerza legal/relacional en español.
- source_word: מִשְּׁבֻעָתֵךְ
  english_pob_choice: from your oath
  chosen_spanish: de su juramento
  alternatives_spanish:
  - de su juramento
  - de la obligación jurada de ustedes
  - de su voto
  lexicon: HALOT
  rationale: 'La forma hebrea lleva sufijo femenino singular, pero en español el antecedente explícito es el acuerdo con Rahab y el discurso directo puede sonar más fluido con una forma de cortesía de tercera persona: «su juramento». Se mantiene el valor de separación/relevo de la obligación.'
- source_word: אֲשֶׁר הִשְׁבַּעְתָּנוּ
  english_pob_choice: that you made us swear
  chosen_spanish: que nos hicieron jurar
  alternatives_spanish:
  - que nos obligaron a jurar
  - que nos causaron jurar
  - que usted nos hizo jurar
  lexicon: HALOT
  rationale: 'El Hiphil de שׁבע es causativo: alguien hizo jurar a otros. En español, el plural de tratamiento «ustedes» armoniza con «su» y evita una discordancia pronominal dentro del versículo.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido del texto hebreo y el criterio auditado de la POB inglesa: condicional contrastivo, divulgación de un secreto, y liberación de la obligación jurada. Se ajustó la formulación española para mantener naturalidad sin perder la tensión lexical de דָּבָר y נְקִיִּם.'
  spanish_consistency_notes:
  - Se usa «juramento» para שְׁבוּעָה y «hacer jurar» para el causativo hebreo.
  - Se evitó «SEÑOR» u otras sustituciones reverenciales porque el versículo no contiene el nombre divino.
  - La elección de «revelan» y «asunto» preserva la referencia al secreto de la misión sin volverla una paráfrasis amplia.
