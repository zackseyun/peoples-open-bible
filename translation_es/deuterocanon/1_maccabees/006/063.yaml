translation:
  language: es
  text: Y salió con prisa y volvió a Antioquía, y halló a Felipe dominando la ciudad, y combatió contra él, y tomó la ciudad por la fuerza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπῆρεν
  english_pob_choice: departed
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se fue
  lexicon: LSJ
  rationale: El verbo griego indica dejar el lugar y emprender la retirada; en español, «salió» comunica con naturalidad ese movimiento de salida sin añadir matices no presentes en el contexto.
- source_word: κατὰ σπουδήν
  english_pob_choice: in haste
  chosen_spanish: con prisa
  alternatives_spanish:
  - de prisa
  - con urgencia
  lexicon: LSJ
  rationale: La expresión idiomática transmite rapidez y apremio. «Con prisa» es natural en español y conserva el tono narrativo urgente.
- source_word: ἀπέστρεψεν εἰς Ἀντιόχειαν
  english_pob_choice: returned to Antioch
  chosen_spanish: volvió a Antioquía
  alternatives_spanish:
  - regresó a Antioquía
  - dio vuelta a Antioquía
  lexicon: LSJ
  rationale: El giro expresa retorno a un destino anterior. «Volvió a Antioquía» es idiomático y refleja bien la dirección de regreso sin sobretraducir el matiz de «dar la vuelta».
- source_word: κυριεύοντα τῆς πόλεως
  english_pob_choice: in control of the city
  chosen_spanish: dominando la ciudad
  alternatives_spanish:
  - en control de la ciudad
  - gobernando la ciudad
  lexicon: LSJ
  rationale: κυριεύω puede significar gobernar, dominar o tener control. «Dominando» mantiene la idea de autoridad efectiva sobre la ciudad, sin cargarla necesariamente con una connotación monárquica más fuerte de la que exige el griego.
- source_word: ἐπολέμησεν πρὸς αὐτόν
  english_pob_choice: he fought against him
  chosen_spanish: combatió contra él
  alternatives_spanish:
  - luchó contra él
  - hizo guerra contra él
  lexicon: LSJ
  rationale: πολεμέω denota combatir o hacer la guerra. «Combatió contra él» conserva el sentido bélico de forma clara y sobria.
- source_word: κατελάβετο τὴν πόλιν βίᾳ
  english_pob_choice: took the city by force
  chosen_spanish: tomó la ciudad por la fuerza
  alternatives_spanish:
  - capturó la ciudad por la fuerza
  - se apoderó de la ciudad por la fuerza
  lexicon: LSJ
  rationale: καταλαμβάνω aquí tiene el sentido de apoderarse o capturar, y βίᾳ especifica el medio violento. «Tomó la ciudad por la fuerza» es una equivalencia directa y fiel al resultado militar y al modo de hacerlo.
translation_notes:
  revision_awareness: La versión sigue de cerca el griego de Swete (1909) y coincide sustancialmente con la auditoría inglesa aprobada; no se detectaron revisiones aplicables en el pasaje ni tensiones léxicas o textuales que requirieran nota.
  spanish_consistency_notes:
  - Se mantiene «Antioquía» como topónimo estándar en español.
  - Se conserva una progresión narrativa simple y bélica, acorde con el griego y con la traducción auditada en inglés.
  - No se introduce terminología eclesiástica o interpretativa ajena al contexto militar del versículo.
