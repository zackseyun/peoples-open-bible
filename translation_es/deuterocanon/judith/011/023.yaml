translation:
  language: es
  text: Y ahora eres bella en tu apariencia y buena en tus palabras. Porque si haces como has hablado, tu dios[a] será mi dios, y tú habitarás en la casa del rey Nabucodonosor, y serás renombrada por toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu Dios será mi Dios». El griego no distingue mayúsculas; la minúscula en el texto principal refleja la perspectiva pagana inmediata del hablante en este contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀστεία
  english_pob_choice: beautiful
  chosen_spanish: bella
  alternatives_spanish:
  - hermosa
  - atractiva
  - encantadora
  lexicon: LSJ
  rationale: En el contexto de un elogio explícito a la apariencia física, «bella» comunica bien el valor positivo de ἀστεία sin sonar demasiado coloquial ni introducir una idea ajena al texto.
- source_word: εἶδος
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - forma
  - aspecto
  - rostro
  lexicon: LSJ
  rationale: Aquí εἶδος se refiere al aspecto visible; «apariencia» es natural en español y preserva el paralelismo con el elogio de la belleza externa.
- source_word: ἀγαθή
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - agradable
  - excelente
  - benévola
  lexicon: LSJ
  rationale: 'Se mantiene la valoración general del habla de Judith con una palabra simple y fiel al griego: «buena».'
- source_word: λόγοις
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dicho
  - habla
  - discurso
  lexicon: LSJ
  rationale: «Palabras» conserva el plural concreto del griego y la textura del elogio, sin diluirlo en una paráfrasis más abstracta.
- source_word: ἐὰν ποιήσῃς καθὰ ἐλάλησας
  english_pob_choice: if you do as you have spoken
  chosen_spanish: si haces como has hablado
  alternatives_spanish:
  - si haces como has dicho
  - si cumples lo que has hablado
  - si haces lo que has dicho
  lexicon: LSJ
  rationale: La construcción mantiene la relación entre lo dicho y lo hecho. «Has hablado» sigue de cerca el griego y suena natural en español bíblico contemporáneo.
- source_word: ὁ θεός σου ἔσται μού θεός
  english_pob_choice: your God will be my God
  chosen_spanish: tu Dios será mi Dios
  alternatives_spanish:
  - tu dios será mi dios
  lexicon: LSJ
  rationale: Se traduce con mayúscula «Dios» porque el flujo narrativo y la formulación remiten al Dios de Israel, aunque la frase esté en boca de un personaje pagano. El español no puede reproducir la ambigüedad tipográfica del griego, así que se opta por la lectura más coherente con el contexto inmediato y con la formulación de la alianza implícita.
- source_word: καθιῇ
  english_pob_choice: you will dwell
  chosen_spanish: habitarás
  alternatives_spanish:
  - te quedarás
  - residirás
  - te sentarás
  lexicon: LSJ
  rationale: Aunque el verbo básico es «sentarse», en este contexto con ἐν οἴκῳ expresa permanencia o residencia. «Habitarás» comunica ese sentido sin perder dignidad estilística.
- source_word: οἶκος
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa real
  - hogar
  - palacio
  lexicon: LSJ
  rationale: «Casa» reproduce el sustantivo griego de manera directa y funciona bien en español como referencia al ámbito doméstico o cortesano del rey.
- source_word: Ναβουχοδονόσορ βασιλέως
  english_pob_choice: King Nabuchodonosor
  chosen_spanish: el rey Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor, rey
  - el rey Nabucodonosor
  lexicon: LSJ
  rationale: Se conserva el nombre tradicional en español, con artículo para fluidez natural. La colocación mantiene el título real sin alterar la referencia histórica-literaria.
- source_word: ὀνομαστὴ
  english_pob_choice: renowned
  chosen_spanish: nombrada
  alternatives_spanish:
  - célebre
  - conocida
  - renombrada
  lexicon: LSJ
  rationale: La raíz de ὀνομαστὴ es ser «nombrada» o «conocida por nombre». «Nombrada» preserva ese matiz etimológico y la pasiva implícita del griego, aunque en español pueda sonar menos idiomática que «célebre» o «renombrada».
- source_word: παρὰ πᾶσαν τὴν γῆν
  english_pob_choice: throughout all the earth
  chosen_spanish: por toda la tierra
  alternatives_spanish:
  - en toda la tierra
  - por toda la tierra
  - en toda la tierra
  lexicon: LSJ
  rationale: La expresión amplía la fama de Judith a escala universal. «Por toda la tierra» conserva esa amplitud y suena solemne en español bíblico.
theological_decisions:
- issue: Capitalización de θεός en la frase de Holofernes
  english_pob_reading: your God will be my God
  chosen_spanish_reading: tu Dios será mi Dios
  alternative_spanish_readings:
  - tu dios será mi dios
  rationale: Aunque el hablante es un general pagano, la referencia concreta en el contexto es al Dios de Judith/Israel. En español, la mayúscula ayuda a identificar esa referencia sin ocultar la tensión narrativa de que la frase nace en boca de un personaje no creyente.
  doctrine_reference: Preservar la tensión literaria y referencial del original sin imponer una convención tipográfica que el griego no exige; capitalización como señal editorial de referencia teológica contextual.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «beautiful» y capitalizó «God». La versión española sigue esa línea en lo estético, pero conserva la decisión contextual de referir a «Dios» con mayúscula, porque en español la capitalización funciona como guía referencial dentro del texto y el contexto favorece la identificación con el Dios de Judith. También se retiene el valor de residencia de καθιῇ y la universalidad de παρὰ πᾶσαν τὴν γῆν.
  spanish_consistency_notes:
  - Se mantiene «Nabucodonosor» como forma castellana tradicional del nombre.
  - Se usa «Dios» con mayúscula para la referencia principal al Dios de Israel, coherente con el contexto narrativo.
  - 'La traducción conserva paralelismo de elogio: apariencia / palabras.'
  - «Habitarás» refleja el sentido idiomático de residencia de καθιῇ.
  - La nota textual se ancla en el punto de ambigüedad real sobre la capitalización referencial de θεός.
