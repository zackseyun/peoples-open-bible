- from: Él hirió el campamento de Asiria[a], y lo llenó de confusión con una plaga.
  to: Hirió el campamento de Asiria[a], y lo sumió en confusión con una plaga.
  rationale: Se hace una reparación menor para ajustar mejor ויהמם al sentido causativo y repentino del hebreo y al audit trail inglés. También se elimina el pronombre sujeto explícito para un español más natural. La nota griega se mantiene sin cambios porque ya refleja correctamente la variante documentada.
