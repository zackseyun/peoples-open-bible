- from: Les envió porciones de su mesa[a], pero la porción de Benjamín fue cinco veces mayor que la de todos ellos[b]. Y bebieron y se embriagaron con él[c].
  to: Les envió porciones de su mesa[a], y la porción de Benjamín fue cinco veces tanto como todas las de ellos[b]. Y bebieron y se embriagaron con él[c].
  rationale: Se ajustó la comparación para expresar con claridad el sentido colectivo de מִמַּשְׂאֹת כֻּלָּם, en línea con la revisión del English POB ('all of theirs'). También se suavizó la conjunción para seguir más de cerca la secuencia narrativa hebrea. Se conservaron las notas porque ya documentan adecuadamente el literal y las alternativas léxicas.
