translation:
  language: es
  text: Y cuando el rey despertó, tomaron la carta y se la entregaron, y él la leyó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξηγέρθη
  english_pob_choice: awoke
  chosen_spanish: despertó
  alternatives_spanish:
  - fue despertado
  - se levantó
  lexicon: LSJ
  rationale: En este contexto narrativo, el verbo aoristo pasivo funciona de manera intransitiva con el sentido de despertar del sueño. «Despertó» preserva ese valor natural en español y evita la rigidez de «fue despertado»; «se levantó» sería más amplio y menos preciso.
- source_word: λαβόντες
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - habiendo tomado
  - recibieron
  lexicon: LSJ
  rationale: El participio se vierte como verbo finito para mantener fluidez narrativa. «Tomaron» conserva la acción concreta sin sobrecargar la frase con una construcción participial más pesada.
- source_word: τὸ γράμμα
  english_pob_choice: the letter
  chosen_spanish: la carta
  alternatives_spanish:
  - el documento
  - la escritura
  lexicon: LSJ
  rationale: En este contexto, γράμμα designa el escrito que se le entrega al rey. «Carta» es el equivalente español más natural y específico; «documento» y «escritura» son posibles, pero menos idiomáticos aquí.
- source_word: ἔδωκαν αὐτῷ
  english_pob_choice: gave it to him
  chosen_spanish: se la entregaron
  alternatives_spanish:
  - se la dieron
  - la entregaron a él
  lexicon: LSJ
  rationale: Se expresa el dativo con un clítico duplicado natural en español. «Se la entregaron» comunica con claridad la transferencia del escrito al rey y suena más idiomático que una construcción más literal.
- source_word: ἀνέγνω
  english_pob_choice: he read it
  chosen_spanish: la leyó
  alternatives_spanish:
  - la leyó en voz alta
  - leyó
  lexicon: LSJ
  rationale: El verbo griego puede omitir el objeto porque se sobreentiende. En español conviene recuperar el referente explícito con «la», que remite a «la carta» y mantiene la claridad narrativa.
translation_notes:
  revision_awareness: 'El texto griego coincide bien con la traducción inglesa auditada: el rey despierta, recibe el escrito y lo lee. No se detectan variantes textuales ni tensiones teológicas relevantes en este versículo, por lo que la versión española sigue de cerca el flujo narrativo sin añadir elementos interpretativos.'
  spanish_consistency_notes:
  - Se mantiene un español neutro y publicable, con léxico narrativo sencillo y digno.
  - Se usa «carta» para τὸ γράμμα por consistencia con el sentido de escrito entregado al rey en el contexto inmediato.
  - Se evita introducir matices inexistentes como «documento oficial» o «misiva», ya que el griego no los exige explícitamente.
