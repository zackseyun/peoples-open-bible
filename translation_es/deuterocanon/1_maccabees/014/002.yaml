translation:
  language: es
  text: Y Arsaces, rey de Persia y de Media, oyó que Demetrio había llegado a su territorio, y envió a uno de sus comandantes para capturarlo vivo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: BDAG
  rationale: El aoristo de ἀκούω introduce una información recibida. «Oyó» conserva la inmediatez narrativa y evita añadir una mediación explicativa que el griego no expresa.
- source_word: Ἀρσάκης
  english_pob_choice: Arsaces
  chosen_spanish: Arsaces
  alternatives_spanish:
  - Arsakes
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio transliterado, como en el audit trail inglés, sin traducirlo.
- source_word: ὁ βασιλεὺς Περσίδος καὶ Μηδίας
  english_pob_choice: the king of Persia and Media
  chosen_spanish: rey de Persia y de Media
  alternatives_spanish:
  - rey de Persia y Media
  - rey de Persis y Media
  lexicon: LSJ
  rationale: «Persia» es la forma geográfica más natural en español para este contexto histórico. Se mantiene «de Media» para reflejar el segundo genitivo y evitar suavizar la doble pertenencia política/geográfica.
- source_word: ἦλθεν
  english_pob_choice: had come
  chosen_spanish: había entrado
  alternatives_spanish:
  - había venido
  - había llegado
  lexicon: BDAG
  rationale: El griego dice que Demetrio «vino/entró» a los límites del territorio. En español, «había entrado en su territorio» reproduce mejor la idea de ingreso a una zona controlada que un simple «había llegado», y respeta el valor de εἰς τὰ ὅρια αὐτοῦ.
- source_word: τὰ ὅρια αὐτοῦ
  english_pob_choice: his territory
  chosen_spanish: su territorio
  alternatives_spanish:
  - sus límites
  - sus fronteras
  - su región
  lexicon: LSJ
  rationale: «Territorio» expresa de forma natural el área bajo control político. Aunque ὅρια literalmente es «límites/fronteras», aquí el sentido contextual es el espacio jurisdiccional.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: «Envió» es la equivalencia directa y clara para ἀπέστειλεν en narrativa histórica.
- source_word: ἕνα τῶν ἀρχόντων αὐτοῦ
  english_pob_choice: one of his commanders
  chosen_spanish: a uno de sus jefes
  alternatives_spanish:
  - a uno de sus comandantes
  - a uno de sus oficiales
  - a uno de sus príncipes
  lexicon: BDAG
  rationale: ἄρχων es amplio y puede significar gobernante, jefe, oficial o comandante. «Jefes» mantiene la amplitud del griego y no impone un rango militar más específico que el texto no define.
- source_word: συλλαβεῖν
  english_pob_choice: to capture
  chosen_spanish: para capturarlo
  alternatives_spanish:
  - para prenderlo
  - para apresarlo
  - para tomarlo
  lexicon: BDAG
  rationale: El infinitivo expresa la finalidad de aprehender a Demetrio. «Capturarlo» funciona bien en español y conserva el matiz de tomar a una persona bajo poder.
- source_word: ζῶντα
  english_pob_choice: alive
  chosen_spanish: vivo
  alternatives_spanish:
  - con vida
  - vivo y sin dañarlo
  lexicon: BDAG
  rationale: «Vivo» reproduce de manera directa la especificación de que debía ser tomado sin matarlo.
translation_notes:
  revision_awareness: El griego y el audit trail inglés muestran un acuerdo alto y sin revisiones aplicadas; por eso la redacción española sigue de cerca el sentido narrativo del original, con una sola adaptación idiomática en «había entrado en su territorio» para expresar con naturalidad εἰς τὰ ὅρια αὐτοῦ.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombre propio Arsaces, coherente con el audit trail inglés.
  - Se evita «Cristo/Mesías» porque no aparece en este versículo.
  - Se evita «SEÑOR» y otras convenciones teológicas ajenas al texto, ya que aquí no intervienen nombres divinos.
  - La formulación «uno de sus jefes» preserva la amplitud de ἄρχων sin forzar una precisión militar que el griego no especifica.
