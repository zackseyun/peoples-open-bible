review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: origen desde la mitad asignada, toma y entrega a Eleazar, y la designación cultual como porción apartada para Yahvé. Sin embargo, la sintaxis española actual introduce una mezcla de sujetos/números y un clítico innecesario que no representan con claridad la secuencia hebrea 2mp + 2ms suavizada por el POB inglés.'
  spanish_quality_summary: 'La redacción es generalmente clara, pero "De su mitad tomarán y se la darán" suena algo trabada y menos natural que una formulación más directa. Además, el marcador de nota está mal ubicado: en español debe anclarse al término relevante, no separarse antes de la palabra.'
  glossary_alignment: Se alinea correctamente con la terminología del proyecto en "Yahvé", "Eleazar" y "sacerdote". "Contribución" es una buena opción para תְּרוּמָה y la nota preserva adecuadamente las alternativas. No hay conflicto doctrinal.
  issues:
  - severity: medium
    issue: 'Construcción verbal poco natural: "tomarán y se la darán"'
    rationale: Aunque comunica el sentido general, el clítico "se la" añade pesadez y hace menos transparente el objeto implícito. "y la darás" también sería demasiado literal al cambio de número; una solución impersonal/directiva como "tomarán... y la darán" o singular de mandato suavizado debe sonar natural y fiel.
  - severity: medium
    issue: Inconsistencia de número/sujeto en la secuencia
    rationale: El hebreo cambia de 2mp a 2ms; el inglés lo suaviza idiomáticamente. El español del borrador pasa a 3pl ("tomarán... darán"), que puede funcionar como mandato, pero conviene una formulación más claramente instructiva y fluida.
  - severity: low
    issue: Ubicación incorrecta del marcador de nota
    rationale: '"como [a]contribución" no sigue la convención pedida. El marcador debe ir pegado al término o frase anotada: "contribución[a]".'
  revised_spanish_text: De su mitad tomarán y la darán a Eleazar el sacerdote como contribución[a] de Yahvé.
  revised_footnotes:
  - marker: a
    text: O "ofrenda de Yahvé" o "la contribución para Yahvé"; el hebreo תְּרוּמָה designa una porción apartada para uso sagrado.
    reason: lexical_alternative
  revision_rationale: Se mantiene el sentido del original y del POB inglés, pero se mejora la naturalidad del español eliminando el clítico innecesario "se" y corrigiendo la posición del marcador de nota. "Contribución de Yahvé" conserva bien el valor de תְּרוּמָה en este contexto cultual.
