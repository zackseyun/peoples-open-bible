    changes_summary: Changed 'against Egypt' to 'in Egypt' to reflect בְּמִצְרַיִם more accurately, while retaining 'against Pharaoh and against all his house' for the following בְּ phrases in context. Also removed one comma for smoother English.
translation:
  language: es
  text: Yahvé dio señales y prodigios grandes y terribles[b] en Egipto[a], contra Faraón y contra toda su casa, ante nuestros ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contra Egipto'; el hebreo בְּ puede leerse de manera locativa, pero en este contexto también puede indicar acciones de juicio dirigidas contra Egipto, Faraón y su casa.
    reason: alternative_reading
  - marker: b
    text: O 'dañinos' o 'graves'; וְרָעִים subraya el efecto calamitoso de estas acciones. 'Terribles' preserva la severidad sin insinuar mal moral en Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - puso
  - hizo
  - realizó
  lexicon: HALOT
  rationale: נתן en esta construcción con 'señales y prodigios' expresa una acción divina concedida o desplegada; 'dio' conserva la relación verbal directa del hebreo mejor que una paráfrasis como 'realizó'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto en español como 'Yahvé', siguiendo la decisión doctrinal del proyecto para יְהוָה y evitando la sustitución por un título.
- source_word: אוֹתֹת
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - marcas
  lexicon: HALOT
  rationale: '''Señales'' comunica bien el valor de אות en contexto de actos divinos que autentican e interpretan la intervención de Dios; es natural en español bíblico contemporáneo.'
- source_word: מֹפְתִים
  english_pob_choice: wonders
  chosen_spanish: prodigios
  alternatives_spanish:
  - maravillas
  - portentos
  - milagros
  lexicon: HALOT
  rationale: '''Prodigios'' mantiene el segundo término del par semántico sin reducirlo a ''milagros'', que introduce un matiz más interpretativo. En español bíblico, ''prodigios'' conserva el asombro del hebreo.'
- source_word: גְּדֹלִים
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - mientras
  - poderosos
  lexicon: HALOT
  rationale: '''Grandes'' es la equivalencia directa y clara de גדול como intensificador de magnitud.'
- source_word: וְרָעִים
  english_pob_choice: grievous
  chosen_spanish: terribles
  alternatives_spanish:
  - graves
  - dañinos
  - malos
  lexicon: HALOT
  rationale: רע puede expresar daño, calamidad o severidad. 'Terribles' comunica el efecto devastador de estas acciones sobre Egipto sin sugerir mal moral en Dios; preserva la tensión lexical que el inglés POB resolvió con 'grievous'.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - contra Egipto
  - sobre Egipto
  lexicon: HALOT
  rationale: Se mantiene el valor locativo del בְּ aquí, siguiendo la revisión inglesa más reciente. La relación adversativa queda ya expresada por los complementos siguientes 'contra Faraón' y 'contra toda su casa'.
- source_word: בְּפַרְעֹה
  english_pob_choice: against Pharaoh
  chosen_spanish: contra Faraón
  alternatives_spanish:
  - sobre Faraón
  - en Faraón
  lexicon: HALOT
  rationale: El בְּ funciona aquí de manera adversativa/dirigida al objetivo del juicio. 'Contra Faraón' reproduce esa fuerza de manera idiomática en español.
- source_word: וּבְכָל בֵּיתוֹ
  english_pob_choice: and against all his house
  chosen_spanish: y contra toda su casa
  alternatives_spanish:
  - y contra toda su casa real
  - y contra todo su hogar
  lexicon: HALOT
  rationale: '''Casa'' traduce bien el hebreo como casa/linaje/hogar real. ''Toda su casa'' preserva la expresión bíblica sin forzar un término más explicativo.'
- source_word: לְעֵינֵינוּ
  english_pob_choice: before our eyes
  chosen_spanish: ante nuestros ojos
  alternatives_spanish:
  - a nuestros ojos
  - en nuestra vista
  lexicon: HALOT
  rationale: La locución idiomática hebrea se vierte con una expresión natural y solemne en español. 'Ante nuestros ojos' conserva la idea de testimonio directo y visible.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto nombra directamente al Dios del pacto con el Tetragrámaton. La política del proyecto exige transliterarlo como 'Yahvé' para no ocultar el nombre propio detrás de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וְרָעִים aplicado a las señales y prodigios
  english_pob_reading: grievous
  chosen_spanish_reading: terribles
  alternative_spanish_readings:
  - graves
  - dañinos
  - malos
  rationale: '''Terribles'' expresa el carácter devastador de los actos sobre Egipto y evita una lectura moralmente confusa de Dios como autor del mal. Mantiene la tensión entre juicio severo y fidelidad del texto.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Valor de בְּמִצְרַיִם frente al paralelismo con los demás complementos
  english_pob_reading: in Egypt
  chosen_spanish_reading: en Egipto
  alternative_spanish_readings:
  - contra Egipto
  rationale: La revisión inglesa más reciente privilegia el valor locativo de בְּ aquí, mientras que la dirección del juicio se desarrolla en las frases paralelas siguientes. Se refleja esa distinción en español.
  doctrine_reference: Revision awareness / source alignment
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al mantener el valor locativo de בְּמִצְרַיִם como 'en Egipto', mientras conserva el matiz adversativo en 'contra Faraón' y 'contra toda su casa'. También refleja la decisión del POB de traducir יְהוָה como nombre propio y no como sustituto titular.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estable para el nombre divino.
  - '''Señales y prodigios'' conserva el paralelismo léxico del hebreo y evita reducir מֹפְתִים a ''milagros''.'
  - '''Casa'' se usa en sentido bíblico de hogar/casa real/linaje, coherente con el uso del inglés POB ''house''.'
  - '''Ante nuestros ojos'' preserva la idiomaticidad y la función testimonial del final del versículo.'
