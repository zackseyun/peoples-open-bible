translation:
  language: es
  text: Entonces el Adversario salió de la presencia de Yahvé y golpeó a Job con llagas dolorosas[a][b], desde la planta de su pie hasta la coronilla de su cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el Satanás»; tradicionalmente se traduce «Satanás». Aquí el término lleva artículo y puede funcionar como título: «el Adversario».'
    reason: alternative_reading
  - marker: b
    text: O «con forúnculos dolorosos» o «con úlceras dolorosas».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂטָן
  english_pob_choice: the Adversary
  chosen_spanish: el Adversario
  alternatives_spanish:
  - Satanás
  - el Satanás
  lexicon: HALOT
  rationale: El hebreo lleva artículo y, en este contexto de Job, funciona mejor como título o función que como nombre propio ya fijado. 'El Adversario' conserva ese valor y evita imponer una lectura posterior sin base inmediata en el texto.
- source_word: מֵאֵת פְּנֵי יְהוָה
  english_pob_choice: from the presence of Yahweh
  chosen_spanish: de delante de Yahvé
  alternatives_spanish:
  - de la presencia de Yahvé
  - de ante Yahvé
  lexicon: HALOT
  rationale: פָּנִים en esta construcción expresa una relación espacial/relacional de presencia. 'De delante de Yahvé' suena natural en español bíblico y mantiene la idea de salir de la esfera de su presencia.
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - hizo presa de
  lexicon: HALOT
  rationale: נכה es un verbo directo de golpear/herir. 'Golpeó' preserva la acción inmediata y fuerte sin añadir matices interpretativos que el hebreo no exige aquí.
- source_word: בִּשְׁחִין רָע
  english_pob_choice: with painful sores
  chosen_spanish: con llagas dolorosas
  alternatives_spanish:
  - con úlceras dolorosas
  - con forúnculos dolorosos
  - con llagas graves
  lexicon: HALOT
  rationale: שְׁחִין designa una afección cutánea inflamada; en español, 'llagas' comunica una lesión abierta o dolorosa sin estrechar demasiado el sentido a una lesión médica específica. רָע intensifica la aflicción como 'dolorosas' o 'graves'; se elige 'dolorosas' en línea con la revisión inglesa más reciente.
- source_word: מִכַּף רַגְלוֹ
  english_pob_choice: from the sole of his foot
  chosen_spanish: desde la planta de su pie
  alternatives_spanish:
  - desde la suela de su pie
  - desde la planta del pie
  lexicon: HALOT
  rationale: כַּף con 'pie' remite a la planta/sola. 'Planta de su pie' es idiomático y claro en español, y conserva la extensión corporal del daño.
- source_word: עַד קָדְקֳדוֹ
  english_pob_choice: to the crown of his head
  chosen_spanish: hasta la coronilla de su cabeza
  alternatives_spanish:
  - hasta la cima de su cabeza
  - hasta la parte superior de su cabeza
  lexicon: HALOT
  rationale: קָדְקֹד se refiere al vértice o coronilla de la cabeza. 'Coronilla' es una equivalencia natural y precisa en español para marcar el alcance total de la enfermedad.
theological_decisions:
- issue: Cómo traducir יהוה en Job 2:7
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Nombre divino. Siguiendo el criterio del proyecto, se conserva como 'Yahvé' en el texto principal para no ocultar el Tetragrámaton ni sustituirlo por una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé'
- issue: Valor de הַשָּׂטָן en el prólogo de Job
  english_pob_reading: the Adversary
  chosen_spanish_reading: el Adversario
  alternative_spanish_readings:
  - Satanás
  - el Satanás
  rationale: La presencia del artículo en hebreo favorece una lectura titular/funcional. 'El Adversario' conserva la tensión documentada por el POB inglés entre traducción descriptiva y la forma tradicional, sin resolver prematuramente el término como nombre propio.
  doctrine_reference: 'Translation philosophy: preservar tensiones léxicas documentadas; primacía del original sobre la tradición posterior.'
translation_notes:
  revision_awareness: La redacción española toma en cuenta la revisión inglesa más reciente, que sustituyó 'severe sores' por 'painful sores'. Por eso se eligió 'llagas dolorosas' y no una opción más genérica como 'llagas graves'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al criterio del proyecto para יהוה.
  - Se conserva 'el Adversario' para הַשָּׂטָן, con nota que documenta la alternativa tradicional.
  - La imagen corporal completa se expresa con 'desde la planta de su pie hasta la coronilla de su cabeza', en paralelo al hebreo.
  - El tono es sobrio y publicable, evitando arcaísmos innecesarios pero preservando la dignidad bíblica del pasaje.
