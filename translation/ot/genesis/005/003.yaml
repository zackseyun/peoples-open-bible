id: GEN.5.3
reference: Genesis 5:3
source:
  edition: WLC
  text: וַֽ/יְחִ֣י אָדָ֗ם שְׁלֹשִׁ֤ים וּ/מְאַת֙ שָׁנָ֔ה וַ/יּ֥וֹלֶד בִּ/דְמוּת֖/וֹ כְּ/צַלְמ֑/וֹ וַ/יִּקְרָ֥א אֶת שְׁמ֖/וֹ שֵֽׁת־׃
translation:
  text: Adam lived one hundred thirty years and fathered a son in his likeness[a], according to his image[c][b], and called his name Seth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'begot'; Hebrew uses a fathering term with a male subject.
    reason: lexical_alternative
  - marker: b
    text: The wording 'in his likeness, according to his image' echoes Genesis 1:26-27.
    reason: cross_reference
  - marker: c
    text: Or, 'and named him Seth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - was alive
  - lived on
  lexicon: HALOT
  rationale: The wayyiqtol of חיה in genealogical age formulas is idiomatically rendered 'lived,' expressing the span of life up to the begetting event.
- source_word: אָדָם
  chosen: Adam
  alternatives:
  - man
  lexicon: HALOT
  rationale: Here the term functions as the personal name of the first man in the genealogy, not as a generic reference to humanity. This follows the doctrine guideline to transliterate names while rendering the Hebrew sense accurately by context.
- source_word: שְׁלֹשִׁים וּמְאַת שָׁנָה
  chosen: one hundred thirty years
  alternatives:
  - a hundred and thirty years
  lexicon: HALOT
  rationale: This is the standard English representation of the Hebrew number phrase in a genealogical notice. 'Years' is retained explicitly because שָׁנָה is present.
- source_word: וַיּוֹלֶד
  chosen: fathered a son
  alternatives:
  - begot
  - became the father of
  - fathered
  lexicon: HALOT
  rationale: ילד in the Hiphil with a male subject means to beget/father. 'Fathered a son' is more natural modern English than 'begot' while preserving the male parental role. 'A son' is supplied in English because the following naming of Seth makes the object singular and personal, and English idiom benefits from making the implied offspring explicit.
- source_word: בִּדְמוּתוֹ
  chosen: in his likeness
  alternatives:
  - in his form
  - in a likeness like his
  lexicon: HALOT
  rationale: דְּמוּת denotes likeness/resemblance. 'In his likeness' is a direct and readable rendering that preserves the relational resemblance language echoing Genesis 1:26.
- source_word: כְּצַלְמוֹ
  chosen: according to his image
  alternatives:
  - after his image
  - like his image
  lexicon: HALOT
  rationale: צֶלֶם is commonly rendered 'image.' The prefixed כ is well represented by 'according to' here, preserving the deliberate echo of Genesis 1:26-27 without flattening the distinction between דְּמוּת and צֶלֶם.
- source_word: וַיִּקְרָא אֶת־שְׁמוֹ שֵׁת
  chosen: and he called his name Seth
  alternatives:
  - and named him Seth
  - and he named him Seth
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'called his name.' This draft keeps the idiom in a readable form. 'Named him Seth' would also be acceptable, but the chosen wording stays slightly closer to the source while remaining natural enough in English.
- source_word: שֵׁת
  chosen: Seth
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy.
