translation:
  language: es
  text: '¿Quién eres tú, oh gran monte? Delante de Zorobabel te convertirás en llanura. Y él sacará la piedra superior[a], entre gritos de: «¡Gracia[b], gracia para ella!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la piedra de remate»; literalmente, «la piedra cabeza».
    reason: lexical_alternative
  - marker: b
    text: O «Favor, favor para ella»; el hebreo חֵן puede significar «gracia», «favor» o «encanto/belleza» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי אַתָּה
  english_pob_choice: Who are you
  chosen_spanish: ¿Quién eres tú?
  alternatives_spanish:
  - ¿Quién eres?
  - ¿Quién eres tú, tú?
  lexicon: HALOT
  rationale: La pregunta hebrea es directa e ինտensifica la confrontación retórica. En español, «¿Quién eres tú?» conserva el tono interrogativo y la dirección al monte sin añadir contenido.
- source_word: הַר הַגָּדוֹל
  english_pob_choice: O great mountain
  chosen_spanish: oh gran monte
  alternatives_spanish:
  - gran monte
  - monte grande
  lexicon: HALOT
  rationale: «Monte» reproduce la imagen metafórica de obstáculo. Se mantiene el valor vocativo con «oh», aunque el hebreo no usa una partícula vocativa explícita, para reflejar el apóstrofe del inglés POB y la fuerza retórica del original.
- source_word: לְמִישֹׁר
  english_pob_choice: you will become a plain
  chosen_spanish: te convertirás en llanura
  alternatives_spanish:
  - te volverás llanura
  - te convertirás en terreno llano
  - en llanura
  lexicon: HALOT
  rationale: מִישׁוֹר denota superficie nivelada/llanura. «Te convertirás en llanura» preserva la imagen de transformación y suena natural en español bíblico moderno.
- source_word: וְהוֹצִיא
  english_pob_choice: he will bring out
  chosen_spanish: él sacará
  alternatives_spanish:
  - él traerá fuera
  - él hará salir
  lexicon: HALOT
  rationale: El sujeto se entiende por contexto como Zorobabel. «Sacar» comunica bien la acción de presentar o extraer la piedra en español, sin perder la idea de producirla o ponerla a la vista.
- source_word: הָאֶבֶן הָרֹאשָׁה
  english_pob_choice: the top stone
  chosen_spanish: la piedra principal
  alternatives_spanish:
  - la piedra de remate
  - la piedra superior
  - la piedra cabeza
  lexicon: HALOT
  rationale: La expresión literal es «la piedra cabeza». En español, «piedra principal» transmite la función destacada sin forzar un tecnicismo arquitectónico. Se preserva la apertura del inglés POB entre «top stone» y «capstone».
- source_word: תְּשֻׁאוֹת
  english_pob_choice: amid shouts of
  chosen_spanish: entre gritos de
  alternatives_spanish:
  - con aclamaciones de
  - entre exclamaciones de
  lexicon: HALOT
  rationale: El sustantivo indica clamores o exclamaciones fuertes. «Entre gritos de» conserva el marco acústico celebratorio de la escena y funciona de modo idiomático en español.
- source_word: חֵן חֵן לָהּ
  english_pob_choice: Grace, grace to it!
  chosen_spanish: ¡Gracia, gracia para ella!
  alternatives_spanish:
  - ¡Favor, favor para ella!
  - ¡Gracia, gracia a ella!
  - ¡Hermosura, hermosura para ella!
  lexicon: HALOT
  rationale: חֵן puede significar gracia, favor o encanto/belleza según el contexto. «Gracia» preserva el peso teológico y la resonancia del favor divino en este marco del templo; «para ella» mantiene el referente femenino del pronombre hebreo.
theological_decisions:
- issue: Sentido de חֵן en la aclamación final
  english_pob_reading: grace/favor is being invoked or celebrated over the stone/building
  chosen_spanish_reading: se invoca o celebra la gracia sobre la piedra/edificación
  alternative_spanish_readings:
  - se invoca o celebra el favor
  - se atribuye belleza/charm a la piedra
  rationale: En Zacarías 4:7 el contexto es de restauración del templo y culminación de la obra. «Gracia» conserva el rango semántico de חֵן y la carga teológica de favor concedido, sin reducirlo a una mera belleza estética.
  doctrine_reference: Translation philosophy §3, §6
- issue: Identificación del sujeto de וְהוֹצִיא
  english_pob_reading: he will bring out the top stone
  chosen_spanish_reading: él sacará la piedra principal
  alternative_spanish_readings:
  - Zorobabel sacará la piedra principal
  - él traerá la piedra principal
  rationale: Aunque el hebreo omite explícitamente el sujeto, el contexto señala a Zorobabel. La traducción mantiene el pronombre implícito del hilo discursivo y no añade un nombre que el versículo no expresa de manera abierta.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso alto del audit trail inglés y no introduce revisiones textuales nuevas. Se conserva la lectura tradicional del cierre acclamatorio, con decisión léxica explícita sobre חֵן y sobre la imagen arquitectónica de la piedra final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; aquí no aparece.
  - Se mantiene «Zorobabel» como transliteración habitual del nombre propio.
  - «Monte» y «llanura» conservan el contraste figurado de obstáculo versus nivelación.
  - «Gracia» se usa en sentido de favor divino, coherente con la nota léxica del POB inglés.
