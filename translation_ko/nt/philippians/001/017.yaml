id: PHP.1.17
reference: Philippians 1:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἱ δὲ ἐξ ⸂ἐριθείας τὸν Χριστὸν καταγγέλλουσιν, οὐχ ἁγνῶς, οἰόμενοι θλῖψιν ἐγείρειν τοῖς δεσμοῖς μου⸃.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/017.yaml
  text: But the others proclaim the Messiah out of selfish ambition, not sincerely, thinking to raise up affliction for me in my imprisonment.
translation:
  language: ko
  text: 그러나 다른 사람들은 이기적 야망에서 메시아를 선포하니, 순수한 동기[b]가 아니라 내가 매인 중에 있는 나에게[a] 환난을 더하려는 생각에서입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 문자적으로 「내 사슬에」. 곧 옥에 매여 있는 바울의 처지를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「순결하지 않게」 또는 「순수하지 않은 동기로」. 헬라어 ἁγνῶς는 동기의 순수함을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐριθείας
  english_pob_choice: selfish ambition
  chosen_korean: 이기적 야망
  alternatives_korean:
  - 당파심
  - 사사로운 야심
  lexicon: BDAG
  rationale: ἐριθεία는 자기 추구적·당파적 야심을 가리킨다. 「이기적 야망」이 현대 한국어로 가장 정착된 등가어이며 영어 POB의 「selfish ambition」을 그대로 반영한다.
- source_word: Χριστόν
  english_pob_choice: the Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다.
- source_word: καταγγέλλουσιν
  english_pob_choice: proclaim
  chosen_korean: 선포하니
  alternatives_korean:
  - 전파하다
  - 알리다
  lexicon: BDAG
  rationale: καταγγέλλω는 공적 선포·고지를 가리킨다. 「선포하다」가 그 공적 함의를 자연스럽게 담는다. 15절 κηρύσσω(전파하다)와 어감 차이를 살린다.
- source_word: ἁγνῶς
  english_pob_choice: sincerely
  chosen_korean: 순수한 동기
  alternatives_korean:
  - 순결하게
  - 순전하게
  lexicon: BDAG
  rationale: ἁγνῶς는 동기의 순수함을 가리키는 부사이다. 부정문(οὐχ ἁγνῶς)이므로 「순수한 동기가 아니라」로 명사화하여 한국어 어법을 자연스럽게 한다.
- source_word: οἰόμενοι
  english_pob_choice: thinking
  chosen_korean: 생각에서
  alternatives_korean:
  - 생각하면서
  - 여기면서
  lexicon: BDAG
  rationale: οἴομαι는 「(주관적으로) 생각하다·여기다」를 의미한다. 「생각에서」로 명사화하여 동기 구문에 맞춘다.
- source_word: θλῖψιν ἐγείρειν
  english_pob_choice: to raise up affliction
  chosen_korean: 환난을 더하려는
  alternatives_korean:
  - 고난을 일으키려는
  - 어려움을 일으키려는
  lexicon: BDAG
  rationale: θλῖψιν ἐγείρειν은 「환난을 일으키다」의 관용 표현이다. 「환난을 더하다」가 이미 매인 자에게 추가로 고난을 가하려는 적의를 자연스럽게 담는다.
- source_word: τοῖς δεσμοῖς μου
  english_pob_choice: for me in my imprisonment
  chosen_korean: 내가 매인 중에 있는 나에게
  alternatives_korean:
  - 나의 결박에
  - 내 사슬에
  lexicon: BDAG
  rationale: δεσμοί는 환유적으로 옥중 상태를 가리킨다. 「매인 중에 있는 나에게」가 그 처지를 자연스럽게 풀어준다.
