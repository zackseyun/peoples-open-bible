translation:
  language: ko
  text: 그러나 누구든지 주께로 돌아서면, 그 베일이 벗겨집니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιστρέψῃ
  english_pob_choice: turns
  chosen_korean: 돌아서다
  alternatives_korean:
  - 돌이키다
  - 회개하다
  lexicon: BDAG
  rationale: ἐπιστρέφω는 「방향을 바꾸어 돌아서다」. 출 34:34의 인유로 모세가 야훼께로 돌아서는 행위. 한국어 「돌아서다」가 본문의 운동성을 보존한다.
- source_word: κύριον
  english_pob_choice: the Lord
  chosen_korean: 주
  alternatives_korean:
  - 야훼
  lexicon: BDAG
  rationale: 본 절은 출 34:34의 야훼를 인유하므로 「야훼」 가능성도 있으나, 3:17에서 바울이 「주」를 메시아·영과 동일시하므로 「주」로 보존한다. 신학적 결정은 3:17에서 다룬다.
- source_word: περιαιρεῖται
  english_pob_choice: is removed
  chosen_korean: 벗겨지다
  alternatives_korean:
  - 제거되다
  lexicon: BDAG
  rationale: 베일이 사방에서 둘러 벗겨짐.
