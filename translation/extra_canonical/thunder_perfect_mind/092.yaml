translation:
  text: 'I am the understanding of every person, my mind within.

    I am the knowledge of my name.

    I am the cry that goes out,

    and I am the one who hears.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲧⲥⲟⲃⲧⲉ could be ‘instruction/teaching/insight’; “understanding” is chosen
      to fit the cognitive frame with ⲡⲁⲛⲟⲩⲥ (‘mind’) and to preserve inwardness.
    reason: lexical_alternative
  - marker: b
    text: ⲧⲡⲱϣⲥ might also mean ‘power/strength,’ yielding “the power of my name.”
      Many witnesses/translations of Thunder read “knowledge of my name,” which the
      surrounding cognitive terms support.
    reason: lexical_alternative
  - marker: c
    text: ⲧⲁϣⲕⲁⲕ ⲉⲃⲟⲗ is taken as “the cry that goes out.” If the verb is instead
      read as ‘call’ (from Greek καλέω), an alternative is “I am the one who calls.”
    reason: lexical_alternative
  - marker: d
    text: Or 'I am the understanding of every person, within the mind.'.
    reason: previous_rendering
  - marker: e
    text: Or 'I am the knowledge of my name.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲧⲥⲟⲃⲧⲉ
  chosen: understanding
  alternatives:
  - instruction
  - teaching
  - insight
  - thought
  lexicon: Crum; general Sahidic usage
  rationale: The collocation with ⲡⲁⲛⲟⲩⲥ (mind) and ⲉϩⲟⲩⲛ (within) points to a cognitive/inward
    sense; “understanding” preserves that interiority without smoothing into doctrinal
    jargon.
- source_word: ⲙⲡⲣⲱⲙⲉ ⲛⲓⲙ
  chosen: of every person
  alternatives:
  - of all men
  - of all people
  lexicon: Standard Sahidic grammar
  rationale: ⲣⲱⲙⲉ = human/person; ⲛⲓⲙ = all/every. Modern inclusive English favors
    “person/people.”
- source_word: ⲡⲁⲛⲟⲩⲥ
  chosen: the mind
  alternatives:
  - understanding
  - intellect
  lexicon: Greek loan (νοῦς) in Coptic
  rationale: “Mind” is the most direct and familiar rendering of νοῦς in this register.
- source_word: ⲉϩⲟⲩⲛ
  chosen: within
  alternatives:
  - inside
  - inwardly
  lexicon: Common Coptic preposition/adverb
  rationale: “Within” is concise and suits the poetic cadence.
- source_word: ⲧⲡⲱϣⲥ ⲙ̄ⲡⲁⲣⲁⲛ
  chosen: the knowledge of my name
  alternatives:
  - the power of my name
  - the strength of my name
  lexicon: Uncertain; compared with thematic parallels in Thunder
  rationale: Although ⲡⲱϣⲥ can elsewhere bear a ‘power/strength’ sense, the well-attested
    motif in Thunder is “the knowledge of my name.” In this cognitive sequence (mind/understanding/hear),
    “knowledge” maintains coherence and preserves the poem’s known self-referential
    trope.
- source_word: ⲧⲁϣⲕⲁⲕ ⲉⲃⲟⲗ
  chosen: the cry that goes out
  alternatives:
  - the call that goes out
  - the proclamation that goes out
  lexicon: Uncertain; ϣⲕⲁⲕ as ‘to cry out/shout’ + ⲉⲃⲟⲗ ‘out(ward)’
  rationale: Captures both the vocal force and the outward motion encoded by ⲉⲃⲟⲗ;
    “cry” balances the following “hears.”
- source_word: ⲉⲧⲥⲱⲧⲙ̄
  chosen: the one who hears
  alternatives:
  - the one who listens
  lexicon: Common Sahidic verb ⲥⲱⲧⲙ ‘hear’ with relative ⲉⲧ-
  rationale: “Hears” is the direct, active English counterpart and keeps tight parallelism
    with “cry.”
parallelism_check: Four first-person declarations maintain the Thunder cadence. The
  last couplet pairs speech and reception (“cry” // “hears”), preserving the internal
  reciprocity central to the poem’s paradoxical self-claims. The initial line remains
  in the cognitive domain to parallel “knowledge” and “hear.”
voice_check: The self-revealing, paradox-bearing first-person voice is retained through
  repeated “I am.” The diction avoids explanatory smoothing and keeps the oracular
  sharpness (understanding/knowledge/cry/hear) consistent with Thunder’s tone.
alignment_risk_note: 'Alignment confidence is only medium, and the consult summary
  (“I am judgment and pardon”) does not match the visible Coptic, which instead supports
  the well-known sequence “I am the [understanding] … I am the knowledge of my name
  … I am the cry that goes out … and I am the one who hears.” Two lexemes carry risk:
  (1) ⲧⲥⲟⲃⲧⲉ—glossed here as “understanding”—could be ‘instruction/teaching/insight’;
  (2) ⲧⲡⲱϣⲥ may bear a ‘power/strength’ sense, but the Thunder motif favors “knowledge
  of my name.” The reading of ⲧⲁϣⲕⲁⲕ ⲉⲃⲟⲗ as “cry that goes out” is plausible but
  not ironclad. I have translated the Coptic as presented rather than forcing it into
  the consult’s “judgment/pardon” pair.'
