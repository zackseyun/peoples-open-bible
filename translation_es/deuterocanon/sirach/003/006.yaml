  rationale: 'Se cambia únicamente «repaga a Dios» por «retribuye a Dios» para lograr un español más natural y eclesialmente legible, manteniendo la misma decisión exegética: el hebreo describe el honrar a la madre como una retribución dirigida a Dios. El resto del versículo y la nota conservan fielmente la evidencia fuente y el rastro de auditoría inglés.'
