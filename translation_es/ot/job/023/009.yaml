translation:
  language: es
  text: A la izquierda[b], cuando él actúa, no lo percibo; se vuelve hacia la derecha[a], y no lo veo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «él se cubre en la derecha», es decir, se vela o se oculta allí.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «izquierda» y «derecha»; a veces pueden corresponder a norte y sur, pero la traducción conserva el contraste espacial poético.'
    reason: cultural_note
lexical_decisions:
- source_word: שְׂמֹאול
  english_pob_choice: on the left
  chosen_spanish: a la izquierda
  alternatives_spanish:
  - al norte
  - del lado norte
  lexicon: HALOT
  rationale: La palabra hebrea denota literalmente la izquierda y, por extensión, puede indicar el norte. En este paralelismo poético con «derecha», mantener la oposición espacial izquierda/derecha conserva mejor la imagen que convertirla en puntos cardinales.
- source_word: בַּעֲשֹׂתוֹ
  english_pob_choice: when he is at work
  chosen_spanish: cuando él actúa
  alternatives_spanish:
  - cuando obra
  - cuando está obrando
  - en su hacer
  lexicon: HALOT
  rationale: 'La construcción con ב + infinitivo de עשה expresa un sentido temporal: «cuando hace/obra». «Actúa» comunica de forma natural en español la idea de actividad divina sin perder el valor verbal del hebreo.'
- source_word: אָחַז
  english_pob_choice: I do not perceive him
  chosen_spanish: no lo percibo
  alternatives_spanish:
  - no lo aprehendo
  - no lo capto
  - no lo percibo con claridad
  lexicon: HALOT
  rationale: Aunque el verbo básico puede significar «asir, agarrar», el contexto favorece la idea de no lograr percibir o aprehender a Dios. «Percibo» sigue la revisión inglesa y evita forzar una imagen demasiado física en español.
- source_word: יַעְטֹף
  english_pob_choice: he turns
  chosen_spanish: se vuelve
  alternatives_spanish:
  - se cubre
  - se envuelve
  - se oculta
  lexicon: HALOT
  rationale: El hebreo es difícil y puede sugerir envolver, cubrir o velar. En este verso, la POB inglesa opta por «he turns» para preservar la coherencia espacial; «se vuelve» mantiene esa lectura en español sin añadir explicación interpretativa al texto principal.
- source_word: יָמִין
  english_pob_choice: to the right
  chosen_spanish: hacia la derecha
  alternatives_spanish:
  - a la derecha
  - del lado derecho
  - al sur
  lexicon: HALOT
  rationale: Como con «izquierda», conviene conservar la pareja espacial del poema. «Hacia la derecha» suena natural en español y refleja el movimiento implícito del verbo.
- source_word: אֶרְאֶה
  english_pob_choice: I do not see him
  chosen_spanish: no lo veo
  alternatives_spanish:
  - no lo puedo ver
  - no lo miro
  - no lo distingo
  lexicon: HALOT
  rationale: ראה significa de manera directa «ver». El objeto implícito es Dios, como en el contexto inmediato; en español conviene suplirlo con «lo» para respetar la economía del hebreo y la claridad del verso.
theological_decisions:
- issue: Referente implícito de los verbos en tercera persona y del objeto de la búsqueda
  english_pob_reading: The subject/object is God, implied from the surrounding context of Job seeking God but not finding him.
  chosen_spanish_reading: El referente implícito es Dios, según el contexto inmediato de Job 23:8–10; por eso se traduce con pronombres de objeto masculinos singulares («lo»).
  alternative_spanish_readings:
  - un sujeto no especificado
  - él, sin identificación explícita
  rationale: El versículo no nombra a Dios, pero el contexto cercano trata claramente de la búsqueda de Dios por parte de Job. La traducción española debe suplir el referente para que la frase sea inteligible, sin añadir contenido doctrinal ajeno al pasaje.
  doctrine_reference: Contexto inmediato de Job 23:8–10; uso contextual de referentes implícitos en traducción bíblica.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «perceive him» frente a «grasp him». En español se reflejó esa decisión con «lo percibo», manteniendo el matiz de no lograr aprehender o encontrar a Dios en el contexto, sin forzar un verbo de captura física en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por contexto, con objeto directo masculino singular «lo», coherente con el resto del pasaje.
  - Se preserva el contraste espacial «izquierda/derecha» en lugar de convertirlo en norte/sur, siguiendo la decisión inglesa auditada.
  - El verbo «se vuelve» en el texto principal deja abierta la tensión del hebreo עטף; la nota explica la alternativa más literal sin imponerla en la traducción base.
