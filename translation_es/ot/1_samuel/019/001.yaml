translation:
  language: es
  text: Saúl habló a Jonatán su hijo y a todos sus siervos para matar a David[a], pero Jonatán, hijo de Saúl, sentía gran aprecio por David[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'para darle muerte a David'. El verbo hebreo es causativo ('hacer morir' / 'dar muerte'), pero en este contexto el sentido es sencillamente que Saúl hablaba de matar a David.
    reason: lexical_alternative
  - marker: b
    text: O, 'se deleitaba mucho en David' o 'lo amaba mucho'. El hebreo dice que Jonatán 'hallaba gran deleite en' David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - les habló
  lexicon: HALOT
  rationale: דבר en forma narrativa se expresa naturalmente en español con 'habló'. 'Dijo' sería posible, pero 'habló a' mantiene bien el acto de dirigirse a alguien, como en el hebreo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - con
  - para
  lexicon: HALOT
  rationale: 'La preposición de dirección/objeto se vierte de modo directo con ''a'' en español: ''habló a Jonatán''.'
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  lexicon: HALOT
  rationale: עבד se conserva con 'siervos' por transparencia léxica y porque el contexto real es la corte real; 'servidores' suaviza demasiado la fuerza del término.
- source_word: לְהָמִית אֶת דָּוִד
  english_pob_choice: to put David to death
  chosen_spanish: para matar a David
  alternatives_spanish:
  - para darle muerte a David
  - para hacer morir a David
  lexicon: HALOT
  rationale: El hebreo usa una forma causativa con el sentido de causar la muerte. En español, 'para matar a David' comunica con naturalidad la intención homicida sin perder el valor causal en el contexto.
- source_word: וִיהוֹנָתָן
  english_pob_choice: but Jonathan
  chosen_spanish: pero Jonatán
  alternatives_spanish:
  - y Jonatán
  - ahora Jonatán
  lexicon: HALOT
  rationale: La conjunción introduce contraste entre el plan de Saúl y la disposición de Jonatán; 'pero' reproduce mejor esa función discursiva.
- source_word: חָפֵץ בְּדָוִד מְאֹד
  english_pob_choice: delighted greatly in David
  chosen_spanish: se complacía mucho en David
  alternatives_spanish:
  - lo apreciaba mucho
  - tenía gran deleite en David
  lexicon: HALOT
  rationale: חפץ expresa deleitarse, complacerse o hallar placer en alguien; 'se complacía mucho en David' conserva el matiz afectivo sin introducir de manera directa el lenguaje más fuerte de 'amar'.
- source_word: בְּנוֹ / בֶּן שָׁאוּל
  english_pob_choice: his son / son of Saul
  chosen_spanish: su hijo / hijo de Saúl
  alternatives_spanish:
  - su propio hijo / hijo de Saúl
  lexicon: HALOT
  rationale: Se mantiene la aposición filial en español para reflejar la estructura hebrea y dar claridad narrativa sin sobrerreducirla.
theological_decisions:
- issue: Relación entre חָפֵץ y el lenguaje de amor/afecto
  english_pob_reading: delighted greatly in David; the Hebrew says Jonathan 'took great delight in' David.
  chosen_spanish_reading: se complacía mucho en David
  alternative_spanish_readings:
  - lo amaba mucho
  - sentía gran deleite por David
  rationale: El hebreo enfatiza deleite/complacencia, no necesariamente el mismo campo semántico de אהב ('amar'). Por eso se evita 'amaba' como lectura principal, preservando la distinción léxica que el audit trail destaca.
  doctrine_reference: Diferenciación léxica de חפץ vs. אהב en el texto bíblico
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail, que prefirió una construcción directa equivalente a la infinitiva final de לְהָמִית, y mantiene el contraste marcado por 'pero' entre la intención de Saúl y la disposición de Jonatán.
  spanish_consistency_notes:
  - Se usa 'Saúl' para Saul y 'Jonatán' para Jonathan de forma consistente con la tradición bíblica en español.
  - Se conserva 'siervos' para עֲבָדָיו por coherencia con el valor léxico del hebreo y el contexto de corte.
  - Se evita 'Cristo', 'Señor' u otras equivalencias ajenas al versículo.
  - La puntuación reproduce una sola cláusula principal con contraste final, acorde con el hebreo narrativo.
