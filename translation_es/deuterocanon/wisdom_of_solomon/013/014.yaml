translation:
  language: es
  text: o lo hizo semejante a algún animal humilde[a], untándolo con ocre rojo y con tinte, enrojeciendo su superficie, y recubriendo toda mancha que había sobre él[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «algún animal común» o «algún animal barato»; el griego subraya el carácter bajo o de poca categoría de la criatura a la que se hace parecer el ídolo.
    reason: lexical_alternative
  - marker: b
    text: 'El griego nombra materiales de coloración: «ocre rojo» (μίλτος) y φῦκος, un tinte o pigmento rojizo, incluso cosmético.'
    reason: cultural_note
lexical_decisions:
- source_word: ζώῳ τινὶ εὐτελεῖ
  english_pob_choice: some lowly animal
  chosen_spanish: algún animal común
  alternatives_spanish:
  - algún animal bajo
  - algún animal barato
  - algún animal despreciable
  lexicon: LSJ
  rationale: εὐτελής expresa bajo costo, poca calidad o condición común/baja. «Común» mantiene la idea de algo de poco rango sin introducir una valoración moral más fuerte que la del griego. «Animal» conserva el referente zoológico de ζῷον.
- source_word: ὡμοίωσεν
  english_pob_choice: made it like
  chosen_spanish: lo hizo semejante
  alternatives_spanish:
  - lo hizo como
  - lo comparó con
  - lo modeló como
  lexicon: LSJ
  rationale: El verbo significa hacer semejante o asemejar. «Lo hizo semejante» suena natural en español y conserva el matiz de fabricación/imitación de una imagen.
- source_word: καταχρίσας
  english_pob_choice: smearing
  chosen_spanish: untándolo
  alternatives_spanish:
  - cubriéndolo
  - embadurnándolo
  - recubriéndolo
  lexicon: LSJ
  rationale: El participio indica aplicar una sustancia sobre una superficie. «Untar» reproduce bien el gesto material de cubrir con pigmento, sin cargar el término con connotaciones litúrgicas.
- source_word: μίλτῳ
  english_pob_choice: red ocher
  chosen_spanish: rojo ocre
  alternatives_spanish:
  - ocre rojo
  - tierra roja
  - óxido rojo
  lexicon: LSJ
  rationale: μίλτος es el pigmento rojo ocre / tierra roja. «Rojo ocre» comunica ese material de manera clara y moderna.
- source_word: φύκει
  english_pob_choice: dye
  chosen_spanish: tinte
  alternatives_spanish:
  - tinte rojo
  - pigmento
  - cosmético
  lexicon: LSJ
  rationale: φῦκος puede designar un tinte o pigmento rojizo, incluso cosmético. «Tinte» es suficientemente amplio y mantiene el valor de colorante sin precisar más de lo que el contexto exige.
- source_word: ἐρυθῆνας χρῶαν αὐτοῦ
  english_pob_choice: reddening its surface
  chosen_spanish: enrojeciendo su superficie
  alternatives_spanish:
  - enrojeciendo su tez
  - dando color rojo a su superficie
  - haciendo roja su superficie
  lexicon: LSJ
  rationale: χρώς/χρόα puede ser piel, tez o superficie. Para un ídolo, «superficie» evita antropomorfizar y conserva el matiz visible de coloración.
- source_word: πᾶσαν κηλῖδα τὴν ἐν αὐτῷ
  english_pob_choice: every blemish on it
  chosen_spanish: cada mancha sobre él
  alternatives_spanish:
  - cada defecto sobre él
  - cada mancha en él
  - cada imperfección sobre él
  lexicon: LSJ
  rationale: κηλίς puede ser mancha, marca o defecto visible. «Mancha» es la opción más directa para una imperfección de la superficie del ídolo, y «sobre él» sigue la revisión inglesa que entiende el defecto como visible en la superficie.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la versión inglesa auditada, pero vuelve al griego en los puntos decisivos: ζῷον εὐτελές como animal de condición baja/común; καταχρίσας como acción material de untar; μίλτος y φῦκος como materiales de coloración; y κηλίς como mancha visible sobre la superficie. Se incorpora la revisión final inglesa que prefiere «on it» para el defecto visible, reflejado en «sobre él».'
  spanish_consistency_notes:
  - Se mantiene «Dios / Yahvé» y «Mesías» como normas del proyecto, aunque este versículo no las contiene.
  - Se evita «ungir» para καταχρίσας, porque en español sugiere un acto religioso ajeno al contexto artesanal.
  - «Superficie» se usa para χρώς/χρόα en un objeto idolátrico, evitando «tez» o «piel» por antropomorfismo innecesario.
  - «Mancha sobre él» preserva la imagen de un defecto visible en la parte externa del ídolo.
