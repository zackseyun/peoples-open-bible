translation:
  language: es
  text: Un salmo de Asaf. Dios[a], Dios, Yahvé, habló y llamó a la tierra desde la salida del sol hasta su ocaso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios, Dios, Yahvé»; algunos entienden de otro modo los títulos divinos iniciales, incluso: «El Dios de dioses, Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמֹור לְאָסָף
  english_pob_choice: A psalm of Asaph.
  chosen_spanish: Un salmo de Asaf.
  alternatives_spanish:
  - Salmo de Asaf.
  - Un canto de Asaf.
  lexicon: mִזְמֹור = salmo/canto; לְאָסָף = de Asaf
  rationale: “Salmo” es el equivalente natural y literario en español para מִזְמֹור. Se conserva Asaf como nombre propio sin añadir matices no presentes en el hebreo.
- source_word: אֵל אֱלֹהִים יְהוָה
  english_pob_choice: God[a], God, Yahweh
  chosen_spanish: Dios[a], Dios, Yahvé
  alternatives_spanish:
  - Dios, Dios, Yahvé
  - El Dios poderoso, Yahvé
  - Dios de dioses, Yahvé
  lexicon: אֵל / אֱלֹהִים / יְהוָה = Dios / Dios / Yahvé
  rationale: Se conserva la triple secuencia divina del hebreo, como hace el texto inglés auditable. “Yahvé” se usa para יְהוָה según la convención del proyecto. La primera posición queda como “Dios” para reflejar אֵל sin forzar una expansión interpretativa en el texto principal.
- source_word: דִּבֶּר וַיִּקְרָא
  english_pob_choice: has spoken and called
  chosen_spanish: habló y llamó
  alternatives_spanish:
  - ha hablado y ha llamado
  - habló y convocó
  - habló y proclamó
  lexicon: דִּבֶּר = hablar; וַיִּקְרָא = llamar/convocar
  rationale: El perfecto español simple comunica bien la acción completa y solemne del hebreo. “Llamó” mantiene la idea de convocatoria dirigida a la tierra sin añadir el matiz específico de proclamar que no está explícito.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: אָרֶץ = tierra/país/mundo
  rationale: “La tierra” conserva la amplitud cósmica o global del hebreo en este contexto, evitando “mundo”, que puede estrechar o modernizar en exceso el alcance.
- source_word: מִמִּזְרַח שֶׁמֶשׁ עַד מְבֹאוֹ
  english_pob_choice: from the rising of the sun to its setting
  chosen_spanish: desde la salida del sol hasta su ocaso
  alternatives_spanish:
  - desde el nacimiento del sol hasta su puesta
  - desde el oriente hasta el poniente
  - desde que sale el sol hasta que se pone
  lexicon: מִמִּזְרַח שֶׁמֶשׁ = desde la salida del sol; עַד מְבֹאוֹ = hasta su ocaso
  rationale: Se mantiene la imagen poética del movimiento solar. “Ocaso” es una equivalencia digna y clara para מְבֹא, y conserva el paralelismo del hebreo mejor que una paráfrasis temporal más libre.
theological_decisions:
- issue: Secuencia de títulos divinos en la apertura
  english_pob_reading: God[a], God, Yahweh; some understand the opening divine titles differently, including 'The God of gods, the LORD.'
  chosen_spanish_reading: Dios[a], Dios, Yahvé
  alternative_spanish_readings:
  - El Dios de dioses, Yahvé
  - Dios de dioses, Yahvé
  - Dios, Dios, el Señor
  rationale: El hebreo presenta una cadena de títulos/divinidades que puede leerse de más de una manera. La traducción principal conserva la forma breve y repetida que refleja el texto base, sin resolver por adelantado la tensión interpretativa. La nota permite la alternativa más expansiva documentada por el audit trail inglés.
  doctrine_reference: Salmo 50:1 en la tradición de numeración; cf. lectura alternativa en la nota textual del versículo.
translation_notes:
  revision_awareness: 'Esta redacción incorpora la corrección del pasaje completo en el audit trail inglés: no se limita al encabezado del salmo, sino que incluye la cláusula principal y su extensión geográfica desde la salida del sol hasta su ocaso.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la repetición de «Dios» para respetar la estructura del hebreo y la tensión interpretativa documentada.
  - Se prefiere «salmo» y no una expansión como «canto» para mantener la terminología bíblica estable.
  - Se mantiene el orden poético del texto hebreo sin añadir conectores explicativos que suavicen la secuencia divina.
