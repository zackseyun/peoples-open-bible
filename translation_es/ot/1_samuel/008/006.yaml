- from: 'Pero la cosa fue desagradable a los ojos de Samuel cuando dijeron[a][b]: «Danos un rey para que nos juzgue». Y Samuel oró a Yahvé.'
  to: 'Pero el asunto fue desagradable[a] a los ojos de Samuel cuando dijeron: «Danos un rey para que nos juzgue[b]». Y Samuel oró a Yahvé.'
  rationale: 'Se cambió «la cosa» por «el asunto» para mejorar la naturalidad y el registro sin perder la amplitud semántica de הַדָּבָר. También se reubicaron las notas al lugar exacto que comentan: [a] en la evaluación negativa y [b] en «nos juzgue». Se mantuvo «Yahvé» y «juzgue» por fidelidad al proyecto y al razonamiento lexical documentado.'
