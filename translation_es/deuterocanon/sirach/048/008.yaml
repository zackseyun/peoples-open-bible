translation:
  language: es
  text: Tú hiciste oír en Sinaí[a] reprensiones, y en Horeb juicios de venganza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego presenta una lectura sustancialmente distinta, con el sentido: «ungiendo reyes para retribución, y profetas como sucesores después de él». El hebreo y el griego parecen reflejar formas textuales diferentes de este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: השמע
  english_pob_choice: You made heard
  chosen_spanish: Tú hiciste oír
  alternatives_spanish:
  - Tú causaste oír
  - Tú proclamaste
  lexicon: HALOT
  rationale: 'El hebreo hifil de שמע tiene valor causativo: hacer oír / hacer escuchar. En español, «hiciste oír» comunica de forma natural esa causalidad sin añadir interpretación ajena. No sigo el griego paralelo aquí, porque el testimonio hebreo es el base para esta línea.'
- source_word: בסיני
  english_pob_choice: at Sinai
  chosen_spanish: en Sinaí
  alternatives_spanish:
  - en el Sinaí
  - en el monte Sinaí
  lexicon: HALOT
  rationale: Con nombres de lugar, el hebreo con ב admite «en» en español como ubicación del evento. «En Sinaí» es natural y fiel; «en el monte Sinaí» sería más explicativo de lo que exige el texto.
- source_word: תוכחות
  english_pob_choice: rebukes
  chosen_spanish: reprensiones
  alternatives_spanish:
  - reprensiones severas
  - amonestaciones
  - correcciones
  lexicon: HALOT
  rationale: «Tוכחות» puede expresar reprensión, corrección o reprobación. «Reprensiones» conserva el tono admonitorio y la fuerza del término sin sobreespecificar.
- source_word: ובחורב
  english_pob_choice: and at Horeb
  chosen_spanish: y en Horeb
  alternatives_spanish:
  - y en el Horeb
  - y en el monte Horeb
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con Sinaí usando «en» para la localización. El nombre propio Horeb queda intacto.
- source_word: משפטי
  english_pob_choice: judgments of
  chosen_spanish: juicios de
  alternatives_spanish:
  - decretos de
  - sentencias de
  - juicios
  lexicon: HALOT
  rationale: La forma constructa de משפט se refleja bien con «juicios de», manteniendo la relación formal con el sustantivo siguiente. «Juicios» solo sería demasiado general y perdería esa construcción.
- source_word: נקם
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - retribución
  - castigo vengador
  - vindicación
  lexicon: HALOT
  rationale: «Venganza» es el equivalente más directo de נקם. Aunque en contexto puede implicar retribución judicial, no conviene suavizar el término ni reemplazarlo por una palabra más interpretativa.
theological_decisions:
- issue: Divergencia textual entre el hebreo y el paralelo griego
  english_pob_reading: 'Main text follows the extant Hebrew: ''You made heard at Sinai rebukes, and at Horeb judgments of vengeance.'''
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «Tú hiciste oír en Sinaí reprensiones, y en Horeb juicios de venganza.»'
  alternative_spanish_readings:
  - «Tú ungías reyes como retribución, y profetas como sucesores después de él» (sentido del paralelo griego)
  rationale: Siguiendo la filosofía del proyecto para Sirácides, el hebreo conservado gobierna el texto principal cuando está disponible. El griego aquí no es solo una variante estilística sino una forma textual distinta, por lo que se preserva como alternativa en nota para transparencia.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácides se conserva; documentar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado indica que no se requieren modificaciones respecto del borrador base. El punto que sigue en observación es la divergencia textual mayor entre el hebreo y el paralelo griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se conserva un registro formal y bíblico sin recurrir a calcos innecesarios.
  - La nota al pie marca la alternativa textual griega y se ancla en el término «reprensiones» para no ocultar la variante sustancial.
