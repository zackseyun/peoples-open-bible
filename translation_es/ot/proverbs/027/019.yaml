translation:
  language: es
  text: Como en el agua[a], el rostro refleja al rostro[b], así el corazón del hombre refleja al hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Como agua…». La comparación introduce el proverbio.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente, «el rostro al rostro… así el corazón del hombre al hombre». El verbo «refleja» se suple por el sentido de la comparación. O: «Como el agua refleja un rostro, así el corazón de la persona refleja a la persona», tomando אָדָם en sentido genérico como «persona» o «humanidad».'
    reason: alternative_reading
lexical_decisions:
- source_word: כַּמַּיִם
  english_pob_choice: As in water
  chosen_spanish: Como en el agua
  alternatives_spanish:
  - Como el agua
  - Al igual que el agua
  lexicon: HALOT
  rationale: El prefijo כ introduce comparación. «Como en el agua» conserva la estructura proverbial y suena natural en español.
- source_word: הַפָּנִים לַפָּנִים
  english_pob_choice: face reflects face
  chosen_spanish: el rostro refleja al rostro
  alternatives_spanish:
  - el rostro al rostro
  - el rostro corresponde al rostro
  - el rostro se refleja en el rostro
  lexicon: HALOT
  rationale: El hebreo es elíptico, literalmente «el rostro al rostro». En español, para que la comparación sea inteligible sin forzarla, se explicita el verbo con base en el sentido de correspondencia/reflejo que el POB inglés ya documenta.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - así pues
  lexicon: HALOT
  rationale: 'Marca el correlativo natural de la comparación: «como... así...».'
- source_word: לֵב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el interior
  - la mente
  - el ánimo
  lexicon: HALOT
  rationale: En literatura sapiencial, לֵב designa el centro interior de pensamiento y disposición; «corazón» es la equivalencia transparente y tradicional en español.
- source_word: הָאָדָם
  english_pob_choice: of man
  chosen_spanish: del hombre
  alternatives_spanish:
  - de la persona
  - de la humanidad
  - del ser humano
  lexicon: HALOT
  rationale: El singular masculino genérico preserva la forma representativa del proverbio. Se mantiene «hombre» en vez de neutralizarlo, conforme al valor genérico documentado.
- source_word: לָאָדָם
  english_pob_choice: reflects man
  chosen_spanish: refleja al hombre
  alternatives_spanish:
  - corresponde al hombre
  - lo revela al hombre
  - refleja a la persona
  lexicon: HALOT
  rationale: La relación preposicional ל en este paralelismo pide en español un verbo que exprese correspondencia o manifestación. «Refleja» mantiene la imagen acuática y la elipsis explicada en el POB inglés.
theological_decisions:
- issue: אָדָם con fuerza genérica y posible lectura inclusiva
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - persona
  - ser humano
  - humanidad
  rationale: El hebreo usa אָדָם en singular masculino dos veces, con fuerza representativa. Se conserva esa forma para no borrar la simetría del proverbio; la lectura inclusiva queda reconocida como posibilidad interpretativa, pero no se adopta en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table for אָדָם'
- issue: Verbo explícito en la primera colon
  english_pob_reading: The verb 'reflects' is supplied from the sense of the comparison.
  chosen_spanish_reading: Se explicita 'refleja' para hacer legible la comparación
  alternative_spanish_readings:
  - 'dejar la elipsis: «Como en el agua el rostro al rostro...»'
  - usar «corresponde» en ambas colonias
  rationale: El hebreo omite un verbo explícito; el inglés POB ya documenta que el verbo se suple por el sentido. En español, un verbo explícito evita oscuridad innecesaria sin introducir una idea ajena al paralelismo.
  doctrine_reference: POB audit trail; optimal-equivalence revision note
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que retiró un verbo añadido en la primera cola y acercó la comparación a la forma hebrea. En español se conserva esa cercanía, pero se explicita «refleja» donde la elipsis sería opaca en lectura pública.
  spanish_consistency_notes:
  - Se mantuvo «corazón» para לֵב por consistencia con la terminología sapiencial habitual en español.
  - Se conservó «hombre» para אָדָם en sentido genérico, en línea con la decisión documentada del inglés POB.
  - No se introdujo «Cristo», «SEÑOR» ni otras equivalencias ajenas al versículo.
  - La puntuación sigue el paralelismo poético con coma y correlativo «así».
