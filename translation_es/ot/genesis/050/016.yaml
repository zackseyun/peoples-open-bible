translation:
  language: es
  text: 'Entonces enviaron un mensaje a José[a], diciendo: «Tu padre mandó antes de morir, diciendo,»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Entonces mandaron a José, diciendo». El verbo hebreo suele significar «mandar», pero aquí probablemente se refiere a enviar un mensaje a José.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַוּוּ
  english_pob_choice: they sent word
  chosen_spanish: enviaron un mensaje
  alternatives_spanish:
  - mandaron
  - dieron aviso
  lexicon: HALOT
  rationale: El hebreo צוה normalmente significa ‘mandar’ o ‘ordenar’, pero el contexto con אֶל יוֹסֵף y la cita indirecta muestra una comunicación dirigida a José. En español, ‘enviaron un mensaje’ conserva la acción comunicativa sin forzar la idea de una orden literal.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Preposición direccional estándar para indicar al destinatario del mensaje.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: convención onomástica
  rationale: Nombre propio en su forma española usual y reconocible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - para decir
  lexicon: HALOT
  rationale: Introduce discurso citado; ‘diciendo’ mantiene la estructura narrativa hebrea de manera natural en español.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: Tu padre
  alternatives_spanish:
  - Su padre
  lexicon: HALOT
  rationale: Segundo persona singular posesiva dirigida a José. Se mantiene la referencia directa del hebreo.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: HALOT
  rationale: Se conserva el valor de mandato del verbo צוה. En español, ‘mandó’ es breve y formal; ‘ordenó’ también sería posible, pero ‘mandó’ encaja mejor con el tono del habla reportada.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - delante de
  lexicon: HALOT
  rationale: 'El sentido es temporal, no espacial: Jacob habló antes de morir.'
- source_word: מוֹתוֹ
  english_pob_choice: his death
  chosen_spanish: morir
  alternatives_spanish:
  - su muerte
  lexicon: HALOT
  rationale: El hebreo presenta un sustantivo nominal (‘su muerte’), pero en español ‘antes de morir’ suena más natural y comunica el mismo valor temporal sin pérdida de sentido.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Segundo introductor de discurso. Se conserva como en el hebreo para reflejar la estructura repetida de cita.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo y el audito en inglés: conserva el doble introductorio de cita (‘diciendo’ / ‘diciendo’) y traduce צוה en el primer verbo de forma comunicativa por el contexto (mensaje a José), sin borrar su posible valor más formal de ‘mandar’. Se evitó calcar de modo rígido el inglés y se prefirió una solución española natural que mantiene la tensión lexical documentada.'
  spanish_consistency_notes:
  - Se usa ‘José’ para el nombre propio y ‘mandó’ para צוה en el primer discurso reportado.
  - Se conserva el ritmo de cita con dos introductores, como en el hebreo y en el audit trail inglés.
  - ‘Antes de morir’ expresa en español el valor temporal de לפני מותו con mayor naturalidad que una traducción más literal.
