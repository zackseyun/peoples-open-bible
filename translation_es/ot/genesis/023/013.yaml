translation:
  language: es
  text: 'Y habló a Efrón en presencia del pueblo de la tierra, diciendo: «Si tan solo me oyes[a]: yo doy la plata por el campo; tómala de mí, para que pueda sepultar allí a mi muerto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Si tan solo me escuchas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: And he spoke
  chosen_spanish: Y habló
  alternatives_spanish:
  - Y dijo
  lexicon: HALOT
  rationale: דבר suele expresar ‘hablar’ con un matiz algo más formal que אמר; en español, ‘habló’ conserva ese registro narrativo y la escena de diálogo público.
- source_word: בְּאָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - a oídos de
  - en el oído de
  lexicon: HALOT
  rationale: La imagen literal de ‘oídos’ en español suena forzada; ‘en presencia de’ comunica adecuadamente el carácter público de la declaración sin perder la idea de audibilidad ante testigos.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - los habitantes de la tierra
  lexicon: HALOT
  rationale: Se conserva la formulación hebrea casi de manera directa porque funciona como designación social-jurídica del entorno local, y el español la admite de forma inteligible.
- source_word: אַךְ אִם אַתָּה ל֖וּ שְׁמָעֵנִי
  english_pob_choice: If only you would hear me
  chosen_spanish: Si tan solo me escuchas
  alternatives_spanish:
  - Si tan solo me oyes
  - Por favor, escúchame
  lexicon: HALOT
  rationale: La combinación enfática de אַךְ אִם + לוּ expresa ruego insistente; ‘si tan solo’ reproduce bien esa súplica. ‘Escuchas’ resulta más natural que ‘oigas’ aquí, sin perder el valor de atención obediente implícito en שׁמע.
- source_word: נָתַתִּי
  english_pob_choice: I give
  chosen_spanish: yo doy
  alternatives_spanish:
  - yo he dado
  - yo daré
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en este contexto negociador funciona como oferta performativa; por eso ‘yo doy’ sigue la lectura auditada del POB inglés y su revisión. El tiempo presente en español expresa mejor el acto formal de entrega/ofrecimiento.
- source_word: כֶּסֶף הַשָּׂדֶה
  english_pob_choice: the silver for the field
  chosen_spanish: el dinero del campo
  alternatives_spanish:
  - la plata del campo
  - el precio del campo
  lexicon: HALOT
  rationale: ‘כסף’ puede ser ‘plata’ o ‘dinero’; en español bíblico contemporáneo, ‘dinero’ comunica con claridad la referencia monetaria sin sonar arcaico. Se evita ‘precio’ porque interpreta la relación con mayor especificidad que la hebrea visible en el sintagma.
- source_word: קַח מִמֶּנִּי
  english_pob_choice: take it from me
  chosen_spanish: tómalo de mí
  alternatives_spanish:
  - acéptalo de mí
  - tómalo de mi parte
  lexicon: HALOT
  rationale: Se sobreentiende el objeto por contexto; en español conviene expresarlo. ‘Tómalo de mí’ refleja el imperativo directo y la transferencia concreta de la suma.
- source_word: וְאֶקְבְּרָה
  english_pob_choice: so that I may bury
  chosen_spanish: para que pueda sepultar
  alternatives_spanish:
  - y sepulte
  - para sepultar
  lexicon: HALOT
  rationale: La cohortativa expresa propósito y deseo; ‘para que pueda sepultar’ transmite bien esa finalidad. ‘Sepultar’ mantiene un registro solemne apropiado para la sepultura de un familiar fallecido.
- source_word: מֵתִי
  english_pob_choice: my dead
  chosen_spanish: a mi muerto
  alternatives_spanish:
  - a mi difunto
  - a mi muerto(a)
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea idiomática sin especificar el referente en el texto principal. ‘Mi muerto’ suena duro en español, pero preserva la fuerza semítica y la sobriedad del original; se introduce ‘a’ por exigencia sintáctica del español con el infinitivo de finalidad implícita.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: Adverbio locativo sencillo; ‘allí’ da una referencia espacial clara y un tono un poco más formal que ‘ahí’.
theological_decisions:
- issue: Valor performativo del perfecto verbal en la oferta de compra
  english_pob_reading: '"I give the silver for the field" with a note that the perfect likely expresses a formal or performative offer in the negotiation; alternatively, "I will give the silver for the field."'
  chosen_spanish_reading: '"yo doy el dinero del campo" como oferta formal presente, no como pasado narrativo'
  alternative_spanish_readings:
  - '"yo he dado el dinero del campo"'
  - '"yo daré el dinero del campo"'
  rationale: El texto no describe simplemente una acción pasada ni una promesa futura; en el contexto negociador, la forma verbal funciona como declaración formal de oferta. La lectura española debe conservar esa tensión performativa en vez de neutralizarla.
  doctrine_reference: Ninguna doctrina en particular; decisión gramatical y discursiva basada en el hebreo y la nota auditada del POB.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que cambió «I have given» por «I give» para reflejar mejor el perfecto hebreo como oferta presente y performativa. La versión española sigue esa revisión con «yo doy» en vez de una forma pasada, manteniendo además la nota de alternativa implícita en la redacción del acto de compra.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino.
  - Se evita «Cristo/Mesías» porque no hay término correspondiente.
  - Se usa «sepultar» como verbo solemne consistente con el registro bíblico narrativo.
  - Se conserva la expresión idiomática «mi muerto» para no borrar la tensión semítica de מֵתִי.
