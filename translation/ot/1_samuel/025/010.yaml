id: 1SA.25.10
reference: 1 Samuel 25:10
source:
  edition: WLC
  text: וַ/יַּ֨עַן נָבָ֜ל אֶת עַבְדֵ֤י דָוִד֙ וַ/יֹּ֔אמֶר מִ֥י דָוִ֖ד וּ/מִ֣י בֶן יִשָׁ֑י הַ/יּוֹם֙ רַבּ֣וּ עֲבָדִ֔ים הַ/מִּתְפָּ֣רְצִ֔ים אִ֖ישׁ מִ/פְּנֵ֥י אֲדֹנָֽי/ו־־׃
translation:
  text: Nabal answered David’s servants and said[a], “Who is David? And who is the son of Jesse? These days many servants are breaking away, each man from before his master.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Nowadays many servants have multiplied who are breaking away, each one from his master.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative exchange most naturally means 'answered' or 'responded.' 'Answered' preserves the direct speech formula common in Hebrew narrative.
- source_word: עַבְדֵי דָוִד
  chosen: David’s servants
  alternatives:
  - David’s men
  lexicon: HALOT
  rationale: עבד commonly means 'servant' or 'slave.' Here these are David's messengers/retainers, and the bonded nuance is not foregrounded, so 'servants' fits the context better than 'slaves.' 'Men' is possible contextually but less lexically transparent.
- source_word: מִי דָוִד וּמִי בֶן־יִשָׁי
  chosen: Who is David? And who is the son of Jesse?
  alternatives:
  - Who is David, and who is Jesse’s son?
  lexicon: HALOT
  rationale: The repeated interrogative expresses contempt rather than genuine ignorance. Retaining the literal form preserves Nabal's dismissive rhetoric. 'The son of Jesse' is kept rather than replacing with the proper name to preserve the Hebrew expression.
- source_word: הַיּוֹם
  chosen: These days
  alternatives:
  - Today
  - Nowadays
  lexicon: HALOT
  rationale: Although literally 'today,' in idiomatic context with a generalizing statement ('many servants have multiplied/are many') it functions adverbially as 'these days' or 'nowadays.' 'These days' is natural modern English and captures the broader social complaint.
- source_word: רַבּוּ
  chosen: many
  alternatives:
  - have become many
  - have multiplied
  lexicon: HALOT
  rationale: The verb רבה literally means 'have become many' or 'have multiplied.' In English, the existential sense is best conveyed by 'many ...' in this sentence. The quantitative force is preserved without awkwardness.
- source_word: עֲבָדִים
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: The term can denote servants or slaves. Here Nabal speaks generally of subordinates deserting their masters; the social dependency is present, but the text does not require the stronger English term 'slaves.' 'Servants' better fits the immediate rhetoric while remaining lexically faithful.
- source_word: הַמִּתְפָּרְצִים
  chosen: are breaking away
  alternatives:
  - are breaking out
  - are breaking loose
  - are rebelling
  lexicon: HALOT
  rationale: The hitpael participle of פרץ conveys forceful breaking away or bursting out. In this context of servants leaving masters, 'are breaking away' captures the reflexive/separative sense without over-interpreting it as full-scale rebellion.
- source_word: אִישׁ מִפְּנֵי אֲדֹנָיו
  chosen: each man from before his master
  alternatives:
  - each one from his master
  - each man from the presence of his master
  lexicon: HALOT
  rationale: איש distributively means 'each man/each one.' מִפְּנֵי is literally 'from before/from the presence of,' an idiom for departing from someone. 'From before his master' preserves the Hebrew flavor and the contemptuous social framing better than a flatter paraphrase.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  lexicon: HALOT
  rationale: In this social context אדון refers to a human superior, so 'master' is the clearest English rendering. 'Lord' would sound overly elevated and could create theological confusion.
