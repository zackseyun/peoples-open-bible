review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del hebreo: Dalila toma ligaduras nuevas, ata a Sansón, pronuncia el grito de alerta, hay un acechador/emboscada en el cuarto interior, y Sansón rompe las ataduras como hilo. Sin embargo, hay dos ajustes importantes para reflejar mejor la evidencia y el rastro inglés: עֲבֹתִים se acerca más a «sogas» o una nota que preserve la alternativa entre sogas/cuerdas, y וַיְנַתְּקֵם se expresa mejor como ruptura/desprendimiento («las reventó»/«las rompió») que como «las arrancó», que puede sonar más a quitar sin necesariamente romper.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, «Los filisteos sobre ti» suena algo elíptico en español; «¡Los filisteos están sobre ti!» mantiene la urgencia y mejora la naturalidad. Además, «Y el que estaba al acecho estaba sentado» repite «estaba» de manera pesada; puede aligerarse con «el que estaba al acecho se hallaba sentado» o reestructurarse. «De sobre sus brazos» es aceptable por fidelidad, aunque algo rígido; «de sus brazos» sería más natural, pero la forma espacial puede conservarse si el resto del verso fluye mejor.
  glossary_alignment: No hay términos teológicos de proyecto en juego. El principal punto léxico es respetar la decisión auditada sobre עֲבֹתִים como «ropes» con nota alternativa «cords»; en español conviene invertir la preferencia del borrador y usar «sogas» con nota «O “cuerdas”». También conviene preservar en nota la ambigüedad de וְהָאֹרֵב y la alternativa «cámara» para חֶדֶר.
  issues:
  - severity: medium
    issue: «cuerdas» como texto principal para עֲבֹתִים debilita la fuerza de ligaduras gruesas
    rationale: El rastro inglés eligió «ropes» precisamente para distinguirlo de hilos/cuerdas finas y reforzar el contraste con «como un hilo». En español, «sogas» comunica mejor esa robustez; «cuerdas» puede mantenerse como alternativa en nota.
  - severity: medium
    issue: «las arrancó» no refleja con suficiente precisión la idea de romper/desgajar en וַיְנַתְּקֵם
    rationale: El verbo hebreo apunta a zafar rompiendo o reventando las ligaduras. «Arrancar» puede entenderse como quitarse algo de encima sin enfatizar la rotura. «Las reventó» o «las rompió» preserva mejor la comparación «como un hilo».
  - severity: low
    issue: La exclamación «¡Los filisteos sobre ti, Sansón!» suena menos natural en español
    rationale: Aunque intenta conservar el modismo hebreo, la omisión de «están» resulta algo abrupta en español general. «¡Los filisteos están sobre ti, Sansón!» mantiene la cercanía idiomática y mejora la lectura pública.
  - severity: low
    issue: Repetición pesada en «el que estaba al acecho estaba sentado»
    rationale: La doble forma verbal no es incorrecta, pero suena torpe. Una leve reestructuración mejora la fluidez sin perder literalidad.
  revised_spanish_text: 'Entonces Dalila tomó sogas nuevas y lo ató con ellas[a], y le dijo: «¡Los filisteos están sobre ti, Sansón!». Y el que estaba al acecho[b] se hallaba sentado en la habitación interior[c], pero él las reventó de sobre sus brazos como un hilo.'
  revised_footnotes:
