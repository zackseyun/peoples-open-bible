  text: וְ/זֶ֨ה מַעֲשֵׂ֤ה הַ/מְּנֹרָה֙ מִקְשָׁ֣ה זָהָ֔ב עַד יְרֵכָ֥/הּ עַד פִּרְחָ֖/הּ מִקְשָׁ֣ה הִ֑וא כַּ/מַּרְאֶ֗ה אֲשֶׁ֨ר הֶרְאָ֤ה יְהוָה֙ אֶת מֹשֶׁ֔ה כֵּ֥ן עָשָׂ֖ה אֶת הַ/מְּנֹרָֽה־־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/numbers/008/004.yaml
  text: 'Now this was the workmanship of the lampstand: hammered work of gold[a], from its base to its flower it was hammered work. According to the pattern that Yahweh had shown Moses[b], so he made the lampstand.'
  footnotes:
  - marker: a
    text: Or 'beaten work'; the Hebrew emphasizes that the lampstand was fashioned by hammering. Some also understand the term to imply 'of one piece.'
    reason: lexical_alternative
  - marker: b
    text: '''According to the pattern'' could also be rendered ''according to the appearance'' or ''according to the vision'' that the LORD showed Moses.'
    reason: lexical_alternative
  ai_draft:
