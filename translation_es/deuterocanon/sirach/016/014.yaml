translation:
  language: es
  text: Todo el que practica la justicia tiene una recompensa[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice: «Todo el que practica la justicia tiene una recompensa»; más literalmente, «Todo hacedor de justicia: hay para él una recompensa». El paralelo griego es más extenso: «para toda limosna u obra misericordiosa hará lugar; cada uno hallará según sus obras».'
    reason: textual_variant
  - marker: b
    text: El griego ἐλεημοσύνη puede significar «limosna» o, más ampliamente, «obra misericordiosa»; el testimonio hebreo aquí tiene «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הָעֹשֶׁה
  english_pob_choice: Everyone who does righteousness
  chosen_spanish: Todo el que hace
  alternatives_spanish:
  - Cada uno que hace
  - Quien hace
  lexicon: HALOT
  rationale: El hebreo es conciso e indefinido; en español, «Todo el que hace» conserva el valor distributivo sin volverlo colectivo ni añadir una paráfrasis innecesaria.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - almsgiving
  - limosna
  lexicon: HALOT
  rationale: La voz hebrea צְדָקָה admite justicia/rectitud y, en ciertos contextos, acto caritativo. Aquí la traducción base prioriza el sentido ético-jurídico del hebreo, mientras que la nota preserva la alternativa griega de limosna/obra misericordiosa.
- source_word: יֵשׁ לוֹ שָׂכָר
  english_pob_choice: has a reward
  chosen_spanish: tiene un premio
  alternatives_spanish:
  - hay para él un premio
  - tiene recompensa
  - le corresponde un salario
  lexicon: HALOT
  rationale: El hebreo expresa posesión/existencia de retribución. «Tiene un premio» comunica con naturalidad la idea de recompensa en español, aunque «recompensa» también sería posible; se evita «salario» por sonar más restrictivo o comercial en este contexto sapiencial.
- source_word: πάσῃ ἐλεημοσύνῃ ποιήσει τόπον
  english_pob_choice: For every act of righteousness there is a reward
  chosen_spanish: Todo el que hace justicia tiene un premio
  alternatives_spanish:
  - Para toda limosna hará lugar
  - Para toda obra misericordiosa hará lugar
  lexicon: BDAG
  rationale: La secuencia griega apunta a ἐλεημοσύνη, «limosna/obra misericordiosa», y el sintagma ποιήσει τόπον es idiomático y difícil de verter literalmente. Dado que la línea hebrea es el testimonio principal y más breve, la versión española sigue el hebreo en el texto principal y reserva el matiz griego en una nota.
theological_decisions:
- issue: Primacía del hebreo frente al paralelo griego en una discrepancia breve
  english_pob_reading: Use 'righteousness' in the main text, with a footnote noting the Greek 'almsgiving/merciful deed' nuance.
  chosen_spanish_reading: Usar «justicia» en el texto principal, con nota sobre «limosna/obra misericordiosa» del griego.
  alternative_spanish_readings:
  - Usar «limosna» en el texto principal
  - Usar «obra misericordiosa» en el texto principal
  rationale: El testimonio hebreo disponible es la base principal y, según el aparato inglés, es la lectura prioritaria. La nota mantiene visible la tensión con el griego sin borrar ninguna de las dos tradiciones.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Relación entre justicia y retribución en lenguaje sapiencial
  english_pob_reading: has a reward
  chosen_spanish_reading: tiene un premio
  alternative_spanish_readings:
  - tiene recompensa
  - le corresponde retribución
  rationale: En español, «premio» comunica bien el valor sapiencial de retribución positiva; «recompensa» sería igualmente defendible, pero «premio» suena menos técnico y más natural sin alterar el contenido doctrinal.
  doctrine_reference: 'PHILOSOPHY.md: preserve source sense while using idiomatic target-language equivalence.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente que privilegia la línea hebrea breve («Everyone who does righteousness has a reward») y no incorpora la cláusula griega final añadida en una versión anterior; la nota conserva de manera transparente la diferencia entre el hebreo y el paralelo griego.
  spanish_consistency_notes:
  - Se mantiene «justicia» para צְדָקָה, en lugar de «limosna», por fidelidad al hebreo principal.
  - «Premio» se usa como equivalente natural de שָׂכָר, con tono sapiencial.
  - La nota aclara el sentido alternativo del griego ἐλεημοσύνη sin introducirlo en el texto principal.
  - No se añadió una segunda cláusula final, porque la revisión reciente la retiró por no estar en el hebreo conservado.
