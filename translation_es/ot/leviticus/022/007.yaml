    issue: La nota [a] está mal alineada con el expediente auditado.
    rationale: La nota inglesa [a] explica כִּי לַחְמוֹ הוּא ('Literalmente, “for it is his bread”'), no וּבָא הַשֶּׁמֶשׁ. El borrador creó una nota nueva sobre el modismo de la puesta del sol y omitió la nota requerida sobre 'pan'.
  - severity: medium
