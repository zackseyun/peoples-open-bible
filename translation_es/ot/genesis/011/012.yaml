translation:
  language: es
  text: Y Arpaxad vivió treinta y cinco años y engendró a Shelah[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cinco y treinta años».'
    reason: lexical_alternative
  - marker: b
    text: 'O «fue padre de Shelah»; traducción tradicional: «engendró a Shelah».'
