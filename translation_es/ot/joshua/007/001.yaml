base_translation:
  language: en
  yaml_path: translation/ot/joshua/007/001.yaml
  text: But the sons of Israel acted unfaithfully regarding the things devoted to destruction[a], for Achan son of Carmi, son of Zabdi, son of Zerah, of the tribe of Judah, took some of the things devoted to destruction; so the anger of Yahweh burned against the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'the devoted things,' or more formally 'the ban.' The Hebrew חֵרֶם refers to persons or things set apart to God for destruction or removal from ordinary human use.
    reason: lexical_alternative
