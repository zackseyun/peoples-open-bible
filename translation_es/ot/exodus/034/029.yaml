base_translation:
  language: en
  yaml_path: translation/ot/exodus/034/029.yaml
  text: And it happened[a], when Moses came down from Mount Sinai with the two tablets of the testimony in Moses' hand as he came down from the mountain[c][b], that Moses did not know that the skin of his face shone because he had spoken with him.
  footnotes:
  - marker: a
    text: Or 'shone' or 'sent out rays'; the Hebrew verb can denote emitting rays. The traditional rendering 'was horned' is preserved here as a historical alternative but does not fit the context as well.
    reason: lexical_alternative
  - marker: b
    text: That is, with the LORD.
    reason: alternative_reading
  - marker: c
    text: 'The phrase ''because he had spoken with him'' may also be understood temporally: ''when he spoke with him.'''
    reason: alternative_reading
