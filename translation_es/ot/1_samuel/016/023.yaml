revisions:
- from: Y sucedía que, cuando el espíritu de Dios venía sobre Saúl, David tomaba el arpa[a] y la tocaba con su mano; entonces Saúl hallaba alivio, y le iba bien[b][c], y el espíritu dañino se apartaba de él.
  to: Y siempre que el espíritu de Dios venía sobre Saúl, David tomaba la lira[a] y la tocaba con su mano; entonces Saúl hallaba alivio, y le iba bien[c], y el espíritu dañino[b] se apartaba de él.
  rationale: La revisión aplica la preferencia léxica auditada para כִּנּוֹר («lira») en el texto principal, mejora la naturalidad del arranque iterativo con «siempre que», y ajusta las notas para reflejar con más precisión las alternativas documentadas sin intensificar indebidamente el matiz teológico de רָעָה.
