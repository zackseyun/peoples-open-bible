base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/023/006.yaml
  text: And let no one enter the house of Yahweh except the priests and the ministering Levites[a]; they may enter, because they are holy[b]. And let all the people keep the charge of Yahweh.
  footnotes:
