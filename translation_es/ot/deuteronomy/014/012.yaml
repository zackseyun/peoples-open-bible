review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y las decisiones léxicas auditadas de la POB en inglés: introduce correctamente una lista, mantiene el sentido partitivo de מֵהֶם y conserva la nota sobre la incertidumbre en la identificación de las aves. Sin embargo, ''no comerán'' cambia indebidamente la fuerza modal/prohibitiva de תֹאכְלוּ (''no comeréis/no comerán ustedes'') a futuro simple indicativo en vez de una prohibición natural en español bíblico legible.'
  spanish_quality_summary: 'El español es claro y eclesialmente legible, y los nombres de aves suenan naturales. La principal mejora necesaria es hacer la prohibición más idiomática y fiel: ''no deben comer'' o ''no comerán ustedes'' sería mejor que ''no comerán''. También conviene ajustar la nota para español natural: ''de estas aves'' en vez de ''de estas aves'' ya está bien, pero ''se vierte por algunos'' suena algo calcado; ''algunos lo traducen como'' fluye mejor.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. Las decisiones léxicas específicas de aves están alineadas con la POB inglesa: הַנֶּשֶׁר = ''águila'', הַפֶּרֶס = ''quebrantahuesos'', הָעָזְנִיָּה = ''buitre negro'', con alternativas preservadas en nota.'
  issues:
  - severity: medium
    issue: '''no comerán'' debilita o desplaza la fuerza prohibitiva del hebreo'
    rationale: אֲשֶׁר לֹא תֹאכְלוּ en este contexto legal expresa prohibición dirigida al pueblo. En español neutral y claro, 'no deben comer' comunica mejor la norma que el futuro simple 'no comerán', que puede leerse como predicción.
  - severity: low
    issue: La nota al pie contiene una formulación algo forzada
    rationale: '"se vierte por algunos como" suena menos natural en español contemporáneo que ''algunos lo traducen como'', sin pérdida de contenido.'
