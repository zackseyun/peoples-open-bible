    text: Hebrew Coniah; elsewhere the king is also called Jeconiah.
    reason: alternative_reading
  - marker: b
    text: Or 'seal' or 'signet.' The image is of a royal seal worn on the hand as a symbol of authority and preciousness.
    reason: lexical_alternative
