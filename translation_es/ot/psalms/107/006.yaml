- from: Entonces clamaron a Yahvé en su angustia[a]; él los libró de sus aflicciones.
  to: Entonces clamaron a Yahvé en medio de su angustia; él los libró de sus aflicciones[a].
  rationale: Se ajusta la primera frase a una forma más natural e inequívocamente colectiva en español («en medio de su angustia») sin apartarse del singular colectivo del hebreo. Se mueve la nota al lugar correcto, porque sus alternativas explican el plural de «sus aflicciones», no «angustia». También se limpia la redacción de la nota.
