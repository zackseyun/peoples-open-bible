translation:
  language: es
  text: 'Él fue un cazador poderoso delante de Yahvé[a]; por eso se dice: «Como Nimrod, un cazador poderoso delante de Yahvé.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, posiblemente, «en desafío a Yahvé», si la expresión se entiende en un sentido hostil a partir del contexto más amplio.
    reason: alternative_reading
lexical_decisions:
- source_word: גִבֹּר
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - poderoso guerrero
  - valiente
  - fuerte
  lexicon: HALOT
  rationale: En combinación con צַיִד, el término describe a alguien destacado por su capacidad o habilidad, no necesariamente una categoría militar separada. ‘Poderoso’ conserva la fuerza evaluativa sin añadir un matiz no atestiguado en el texto.
- source_word: צַיִד
  english_pob_choice: hunter
  chosen_spanish: cazador
  alternatives_spanish:
  - cazador de presas
  - hombre de caza
  - cazador experto
  lexicon: HALOT
  rationale: El sustantivo funciona idiomáticamente para describir a una persona caracterizada por la caza. ‘Cazador’ es la opción más natural y fiel en español, sin expandir el sentido más allá de lo necesario.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  - en defiance of
  lexicon: HALOT
  rationale: La preposición mantiene el sentido relacional básico de ‘before’. ‘Delante de’ suena claro en español y conserva la ambigüedad interpretativa que el contexto deja abierta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: transliteración en español como ‘Yahvé’, preservando el nombre personal en lugar de sustituirlo por un título.'
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - por tal razón
  lexicon: HALOT
  rationale: La fórmula introduce la explicación de un dicho proverbial. ‘Por eso’ es natural en español y conserva la relación causal.
- source_word: יֵאָמַר
  english_pob_choice: it is said
  chosen_spanish: se dice
  alternatives_spanish:
  - se suele decir
  - se ha dicho
  - dicen
  lexicon: HALOT
  rationale: El pasivo impersonal se expresa con una construcción impersonal natural en español. ‘Se dice’ transmite bien el carácter proverbial del enunciado.
- source_word: כְּנִמְרֹד
  english_pob_choice: Like Nimrod
  chosen_spanish: Como Nimrod
  alternatives_spanish:
  - Tal como Nimrod
  - Al modo de Nimrod
  lexicon: HALOT
  rationale: El prefijo comparativo כ־ se rinde de forma directa con ‘como’, que es idiomático y mantiene la estructura del proverbio.
theological_decisions:
- issue: Sentido de לִפְנֵי יְהוָה en relación con Nimrod
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - en presencia de Yahvé
  - en desafío a Yahvé
  - en contra de Yahvé
  rationale: La redacción principal conserva la lectura más literal y deja abierta la tensión interpretativa documentada por el audit trail. No se resuelve el giro hacia un sentido hostil en el texto principal, porque la fuente hebrea y el registro inglés mantienen esa ambigüedad.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo y coincide con el audit trail inglés revisado: mantiene el valor proverbial, el Nombre divino y la ambigüedad de לִפְנֵי יְהוָה sin normalizarla a una lectura exclusivamente hostil o meramente neutral.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para el Tetragrámaton, conforme al criterio del proyecto.
  - ‘Poderoso cazador’ conserva la estructura semántica de גִבֹּר צַיִד sin introducir ‘hombre’ o ‘guerrero’ no requeridos por el hebreo.
  - La repetición final del proverbio mantiene la misma traducción de los elementos clave para conservar paralelismo y transparencia.
  - La nota al pie marca la alternativa interpretativa sin desplazar la lectura principal del texto.
