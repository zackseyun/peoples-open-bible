  source_alignment_summary: 'El borrador español comunica correctamente la escena básica del amanecer y el regreso de los animales a su lugar de descanso. Sin embargo, se aparta parcialmente del rastro auditado del POB en dos puntos: omite el matiz más cercano a יֵאָסֵפוּן que motivó la revisión inglesa hacia ''they gather themselves'', y ''cuevas'' estrecha indebidamente מְעוֹנוֹתָם, que significa más ampliamente moradas/guaridas y no necesariamente cuevas.'
  spanish_quality_summary: El español es natural y claro, pero 'Cuando sale el sol' introduce una subordinación temporal no presente en el hebreo, donde el verbo principal simplemente enuncia 'sale el sol'. Además, 'sus guaridas' suena más preciso y natural para animales que 'sus cuevas'.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales requieren ajuste de fidelidad más que de glosario: preferible ''Sale el sol'' para תִּזְרַח הַשֶּׁמֶשׁ, ''se recogen'' para יֵאָסֵפוּן por su matiz reflexivo/intransitivo, y ''guaridas'' para מְעוֹנוֹתָם en contexto animal.'
  issues:
  - severity: medium
    issue: '''Cuando sale el sol'' añade una relación temporal no explícita'
    rationale: El hebreo presenta una cláusula verbal simple, no una subordinada temporal. 'Sale el sol' preserva mejor la forma y la vivacidad del original.
  - severity: medium
    issue: '''se retiran'' no refleja tan de cerca la decisión auditada de ''they gather themselves'''
    rationale: Aunque semánticamente posible, el expediente inglés revisó expresamente hacia un matiz más cercano a reunirse/recogerse. En español, 'se recogen' conserva mejor ese valor sin perder naturalidad.
  - severity: medium
    issue: '''cuevas'' es demasiado específico para מְעוֹנוֹתָם'
    rationale: El sustantivo significa moradas/habitaciones; en contexto animal 'guaridas' corresponde mejor que 'cuevas', que limita la imagen a un tipo de refugio.
  revised_spanish_text: Sale el sol; ellos se recogen[a] y se echan en sus guaridas[b].
