base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/036/015.yaml
  text: And Yahweh[a], the God of their fathers, sent word to them by the hand of his messengers, rising early and sending[c][b], because he had compassion on his people and on his dwelling place.
  footnotes:
  - marker: a
    text: 'Hebrew ''rising early and sending,'' an idiom expressing persistent, eager repetition: ''again and again sending.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'through his messengers.'
    reason: lexical_alternative
  - marker: c
    text: That is, the temple, viewed as the place of God's dwelling among his people.
    reason: cultural_note
