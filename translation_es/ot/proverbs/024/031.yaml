translation:
  language: es
  text: y he aquí que estaba todo cubierto de espinos[a]; las ortigas cubrían su superficie[b][c], y su muro de piedra estaba derribado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cardos»; la planta exacta es incierta, pero el hebreo denota un crecimiento espinoso y dañino.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «su rostro», aquí con el sentido de «su superficie».
    reason: lexical_alternative
  - marker: c
    text: O «zarzas» o «malas hierbas»; el término se refiere a vegetación silvestre indeseable, tradicionalmente «ortigas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y, he aquí
  alternatives_spanish:
  - y mira
  - y he aquí
  lexicon: WLC + HALOT
  rationale: Conserva la fuerza deíctica e interjectiva de la observación directa. «He aquí» mantiene el tono vívido y elevado sin volverlo arcaico en exceso.
- source_word: עָלָה כֻלּוֹ
  english_pob_choice: it was all overgrown
  chosen_spanish: todo estaba cubierto
  alternatives_spanish:
  - todo había crecido
  - estaba totalmente invadido
  lexicon: WLC + HALOT
  rationale: En este contexto agrícola, la imagen expresa un terreno completamente tomado por crecimiento no deseado. «Todo estaba cubierto» comunica bien el resultado visible en español natural.
- source_word: קִמְּשֹׂנִים
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - cardos
  - zarzas
  lexicon: WLC + HALOT
  rationale: El término exacto del hebreo es incierto, pero designa vegetación punzante y molesta. «Espinos» es claro, bíblico y suficientemente amplio para no fijar indebidamente la identificación botánica.
- source_word: כָּסּוּ
  english_pob_choice: covered
  chosen_spanish: cubrían
  alternatives_spanish:
  - habían cubierto
  - cubrieron
  lexicon: WLC + HALOT
  rationale: El verbo expresa la acción de cubrir en la escena descrita. En español, el imperfecto da bien la imagen continua y visual del estado del terreno.
- source_word: פָנָיו
  english_pob_choice: its surface
  chosen_spanish: su superficie
  alternatives_spanish:
  - su rostro
  - su frente
  lexicon: WLC + HALOT
  rationale: El hebreo «rostro/cara» funciona aquí como idiomático para la superficie visible de un terreno o estructura. «Superficie» evita un calco duro y comunica el sentido real.
- source_word: חֲרֻלִּים
  english_pob_choice: nettles
  chosen_spanish: ortigas
  alternatives_spanish:
  - malas hierbas
  - zarzas
  lexicon: WLC + HALOT
  rationale: La POB inglesa distingue este término del anterior, y el hebreo sugiere otra planta silvestre indeseable. «Ortigas» mantiene esa distinción y el matiz de crecimiento molesto; el sentido exacto sigue siendo incierto.
- source_word: וְגֶדֶר אֲבָנָיו
  english_pob_choice: and its stone wall
  chosen_spanish: y su muro de piedra
  alternatives_spanish:
  - y su cerca de piedra
  - y el muro de piedras
  lexicon: WLC + HALOT
  rationale: «גדר אבנים» remite a un cerramiento de piedras. «Muro de piedra» es natural en español y conserva la idea de un límite físico alrededor de la propiedad.
- source_word: נֶהֱרָסָה
  english_pob_choice: was broken down
  chosen_spanish: estaba derribado
  alternatives_spanish:
  - estaba destruido
  - había sido derribado
  lexicon: WLC + HALOT
  rationale: El nifal describe un estado de ruina o demolición. «Estaba derribado» expresa bien el resultado visible sin añadir más de lo que el hebreo dice.
theological_decisions:
- issue: El versículo usa lenguaje de ruina material como imagen de negligencia, sin carga doctrinal directa.
  english_pob_reading: Descriptive proverb about an overgrown, ruined field or vineyard.
  chosen_spanish_reading: Proverbio descriptivo sobre un terreno descuidado y arruinado.
  alternative_spanish_readings:
  - metáfora moral de la pereza
  - descripción literal de una parcela abandonada
  rationale: El hebreo presenta una escena concreta; la aplicación moral proviene del contexto sapiencial, no de una afirmación doctrinal explícita. Por eso la traducción debe permanecer descriptiva.
  doctrine_reference: Sapiential imagery; no direct doctrinal claim.
translation_notes:
  revision_awareness: El texto sigue el alto acuerdo del auditorio inglés y no introduce cambios frente a la lectura base; se mantienen las dos imágenes vegetales distintas y el valor idiomático de «rostro/superficie».
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - 'Se conserva la distinción entre dos términos hebreos distintos para vegetación indeseable: «espinos» y «ortigas».'
  - «Su superficie» refleja el idiomatismo hebreo sin literalismo innecesario.
  - El cierre «muro de piedra» evita sobreespecificar una cerca técnica que el hebreo no exige.
