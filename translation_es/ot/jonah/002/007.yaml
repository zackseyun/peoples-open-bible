revisions:
- from: Descendí hasta las raíces de los montes[a]; la tierra, con sus cerrojos, estaba alrededor de mí para siempre, pero tú sacaste mi vida[b][c] del hoyo, Yahvé mi Dios.
  to: Descendí hasta las raíces de los montes[a]; la tierra, con sus cerrojos, me rodeaba para siempre[b], pero tú sacaste mi vida de la fosa[c], Yahvé mi Dios.
  rationale: La revisión conserva el sentido del hebreo y del POB inglés, mejora la naturalidad del español («me rodeaba»), añade la nota lexical importante sobre la imagen de encierro de la tierra, elimina una nota innecesaria sobre «mi vida», y sustituye «hoyo» por «fosa» para un registro más bíblico y claro.
  reviewer_model: gpt-5.4
