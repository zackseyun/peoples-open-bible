review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: mantiene el modismo ''en mis oídos'', traduce יְהוָה como ''Yahvé'', conserva el valor intensivo de אִם לֹא con ''Ciertamente'', y expresa la desolación y despoblación de las casas. Sin embargo, el inglés POB sitúa la nota sobre el modismo en ''In my ears'' y la nota española actual está anclada en ''desolación'', lo cual desordena la evidencia auditada. Además, ''juró'' no está explícito en el hebreo; el sentido de juramento puede inferirse por אִם לֹא, pero una formulación más ceñida al texto y natural en español es ''Yahvé de los Ejércitos ha dicho a mis oídos'' o, mejor preservando el orden hebreo, ''Yahvé de los Ejércitos habló a mis oídos''. No obstante, dado que la auditoría inglesa ya incorporó ''has sworn'', la corrección mínima más segura es reparar las notas y mejorar la puntuación/fluidez sin reabrir esa decisión.'
  spanish_quality_summary: 'El español es claro y digno, pero ''se volverán una desolación'' suena algo forzado; ''quedarán desoladas'' sería más idiomático, aunque perdería la fuerza nominal preservada por el inglés auditado. La reparación necesaria principal es de aparato: la nota [a] debe anclarse en ''En mis oídos'', y la nota [b] no debe presentar ''hermosas'' como alternativa principal si el texto base quiere preservar ''buenas'' como calidad amplia. ''Sin morador'' es comprensible y solemne; ''sin habitantes'' sería más natural, pero no es imprescindible.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: YHWH -> ''Yahvé''; צְבָאוֹת -> ''de los Ejércitos''. No hay conflicto doctrinal significativo. La única desalineación relevante es de notas: el POB inglés conserva una alternativa para ''of Hosts'', mientras el español omite esa alternativa y en cambio usa la nota [a] para otra cosa en ubicación incorrecta.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en 'desolación' pero su contenido explica 'En mis oídos'.
    rationale: Las notas deben aparecer en el lugar exacto del texto al que se refieren. Aquí el aparato crea confusión y no sigue la disciplina requerida.
  - severity: low
    issue: Falta una nota léxica para la alternativa tradicional del título divino ('de las Huestes' / 'de los Ejércitos').
    rationale: El POB inglés preserva la alternativa 'the LORD of Hosts'. En español conviene reflejar al menos la alternativa tradicional para צְבָאוֹת, aunque adaptada al sistema del proyecto con 'Yahvé'.
  - severity: low
    issue: La nota [b] propone 'casas grandes y hermosas', que estrecha el campo semántico de טוֹבִים hacia lo estético.
    rationale: La propia decisión léxica española reconoce que 'buenas' conserva mejor la calidad amplia. La alternativa 'hermosas' puede mencionarse, pero no como si fuera equivalente preferible.
  revised_spanish_text: 'En mis oídos[a] Yahvé de los Ejércitos[b] juró: Ciertamente muchas casas se volverán una desolación, casas grandes y buenas, sin morador.'
  revised_footnotes:
