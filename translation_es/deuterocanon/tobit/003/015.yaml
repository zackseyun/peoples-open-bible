translation:
  language: es
  text: Y no he mancillado[a] mi nombre, ni el nombre de mi padre, en la tierra de mi cautiverio. Soy hija única de mi padre, y él no tiene hijo que lo herede[b], ni un pariente cercano[c], ni tampoco tiene un hijo, para que yo me conserve para él como esposa. Ya siete han perecido lejos de mí[d]; ¿para qué vivir? Pero si no te parece bien darme muerte, manda que me mires y tengas misericordia de mí, y que ya no oiga reproche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «he profanado» o «he contaminado». El griego μολύνω puede llevar fuerza moral o ritual.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «lo herede»; en el contexto narrativo se entiende como heredar la línea familiar o la herencia paterna.
    reason: source_note
  - marker: c
    text: 'La frase griega es difícil: literalmente, «ni un hermano cercano», probablemente con el sentido más amplio de un pariente varón cercano.'
    reason: textual_variant
  - marker: d
    text: Es decir, siete esposos en el contexto narrativo, aunque aquí el griego dice solamente «siete».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμόλυνα
  english_pob_choice: have defiled
  chosen_spanish: he mancillado
  alternatives_spanish:
  - he profanado
  - he contaminado
  lexicon: BDAG
  rationale: El griego expresa contaminación moral o ritual. «Mancillar» conserva ese peso ético en un español natural y digno, sin volverlo más técnico de lo que el texto permite.
- source_word: ὄνομα
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - reputación
  lexicon: BDAG
  rationale: Se mantiene «nombre» en ambos casos porque el griego lo dice literalmente. En el contexto incluye la honra familiar, pero el español no necesita explicitarlo más allá del texto.
- source_word: γῇ τῆς αἰχμαλωσίας μου
  english_pob_choice: land of my captivity
  chosen_spanish: la tierra de mi cautiverio
  alternatives_spanish:
  - la tierra de mi exilio
  - la tierra donde estoy cautiva
  lexicon: BDAG
  rationale: «Cautiverio» refleja directamente αἰχμαλωσία y conserva el tono de lamento y desplazamiento del original.
- source_word: μονογενής
  english_pob_choice: only child
  chosen_spanish: la única hija
  alternatives_spanish:
  - la única criatura
  - soy hija única
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «soy única» o «soy la única», el contexto muestra que habla una mujer de su condición filial. «La única hija» expresa de forma natural en español el sentido de hija única, sin añadir más contenido que el contexto ya hace evidente.
- source_word: ὃ κληρονομήσει αὐτόν
  english_pob_choice: who will inherit him
  chosen_spanish: que lo herede
  alternatives_spanish:
  - que heredará a él
  - que será su heredero
  lexicon: BDAG
  rationale: Se conserva la idea directa de heredar «a él», pero en español «heredar» normalmente requiere una reformulación más natural. «Lo herede» mantiene la relación hereditaria sin sobrecargarla.
- source_word: ἀδελφὸς ἐγγύς
  english_pob_choice: a near kinsman
  chosen_spanish: un pariente cercano
  alternatives_spanish:
  - un pariente próximo
  - un hermano cercano
  lexicon: BDAG
  rationale: La decisión inglesa revisada apunta a un sentido amplio de parentesco masculino cercano. En español, «pariente cercano» comunica mejor esa relación que una calca como «hermano cercano».
- source_word: συντηρήσω ἐμαυτὴν αὐτῷ γυναῖκα
  english_pob_choice: that I should keep myself as a wife for him
  chosen_spanish: para que yo me conserve para él como esposa
  alternatives_spanish:
  - para reservarme para él como esposa
  - para mantenerme para él como esposa
  lexicon: BDAG
  rationale: La construcción es difícil; el español mantiene la reserva/provisión matrimonial sin resolver indebidamente el matiz sintáctico. «Me conserve» refleja bien la idea de preservarse en vista del matrimonio.
- source_word: ἀπώλοντό μοι ἑπτά
  english_pob_choice: seven have perished from me
  chosen_spanish: Ya siete han perecido para mí
  alternatives_spanish:
  - Ya he perdido siete
  - Ya siete me han sido arrebatados
  lexicon: BDAG
  rationale: Se conserva la pérdida personal en primera persona y el tono sobrio del original. «Han perecido para mí» sigue de cerca la imagen del griego sin introducir «esposos» en el texto principal.
- source_word: δοκεῖ σοι
  english_pob_choice: it does not seem good to you
  chosen_spanish: no te parece bien
  alternatives_spanish:
  - no te parece bueno
  - no te parece correcto
  lexicon: BDAG
  rationale: Es una equivalencia natural y reverente de la valoración divina expresada por δοκέω, sin perder el matiz de lo que parece conforme a la voluntad de Dios.
- source_word: ἀποκτεῖναί με
  english_pob_choice: to put me to death
  chosen_spanish: hacerme morir
  alternatives_spanish:
  - quitarme la vida
  - matarme
  lexicon: BDAG
  rationale: «Hacerme morir» conserva el registro súplice y evita una dureza innecesaria, a la vez que sigue siendo fiel al acto de muerte pedido.
- source_word: ἐπίταξον ἐπιβλέψαι ἐπʼ ἐμέ
  english_pob_choice: command that you look upon me
  chosen_spanish: manda que me mires
  alternatives_spanish:
  - ordena que me mires
  - manda que vuelvas tus ojos hacia mí
  lexicon: BDAG
  rationale: El giro español comunica la petición reverente de atención benévola. «Mirar» mantiene el valor idiomático de consideración favorable.
- source_word: ἐλεῆσαί με
  english_pob_choice: have mercy on me
  chosen_spanish: tengas misericordia de mí
  alternatives_spanish:
  - me tengas misericordia
  - me muestres misericordia
  lexicon: BDAG
  rationale: «Tener misericordia» es una fórmula natural y fiel para la súplica de compasión divina.
- source_word: ὀνειδισμόν
  english_pob_choice: reproach
  chosen_spanish: reproche
  alternatives_spanish:
  - afrenta
  - insulto
  lexicon: BDAG
  rationale: «Reproche» conserva tanto la idea de palabra injuriosa como la de vergüenza social, que encaja con el lamento de la escena.
theological_decisions:
- issue: Cómo reflejar el parentesco implícito en «heredarle» sin añadir más de lo que dice el griego
  english_pob_reading: The main text keeps 'who will inherit him' and leaves the referent contextually clear.
  chosen_spanish_reading: Se mantiene «que lo herede» sin añadir «esposos» en el texto principal.
  alternative_spanish_readings:
  - que lo hereden como herederos
  - que herede de él
  rationale: El contexto de Tobit aclara que se trata de la línea familiar, pero el griego no repite el término explícito. La traducción principal preserva esa concisión y deja la aclaración para nota si se necesita.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo tratar la cláusula difícil de parentesco y matrimonio
  english_pob_reading: The clause is textually and syntactically difficult; the translation stays close to the wording.
  chosen_spanish_reading: «ni un pariente cercano, ni tampoco tiene un hijo, para que yo me conserve para él como esposa»
  alternative_spanish_readings:
  - ni un cercano pariente...
  - ni un hermano cercano...
  rationale: La frase griega es enredada y probablemente refleja una preocupación legal/familiar semítica. El español conserva la dificultad sin imponer una solución interpretativa demasiado fuerte.
  doctrine_reference: Translation philosophy §3
- issue: Si el texto debe explicitar que los siete eran esposos
  english_pob_reading: A footnote clarifies that the seven are husbands in the narrative context.
  chosen_spanish_reading: No se explicita en el cuerpo principal; se deja implicado por el contexto.
  alternative_spanish_readings:
  - Ya siete esposos han perecido para mí
  - Ya he perdido siete esposos
  rationale: El griego dice simplemente «siete». Para no sobretraducir, el cuerpo principal conserva la referencia breve y la aclaración contextual puede incorporarse en una nota.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasaje revisado en inglés: la decisión final favorece «pariente cercano» como equivalencia más natural para ἀδελφὸς ἐγγύς, pero el texto español conserva la tensión del griego sin resolverla en exceso. También se mantuvo la brevedad de «siete han perecido» sin añadir «esposos» al cuerpo principal, en línea con la auditoría inglesa.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando el texto lo exija; este versículo no contiene el tetragrámaton ni κύριος.
  - Se prefirió «mancillado» para μολύνω por su registro moral y su claridad en español.
  - Se mantuvo una sintaxis sobria y litúrgicamente legible, sin arcaísmos innecesarios.
  - Se evitó «siervo» o vocabulario eclesiástico no presente en el original.
  - Se conservaron la ambigüedad y la dificultad del griego en la cláusula de parentesco/matrimonio, en vez de suavizarlas con una paráfrasis interpretativa.
