review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja correctamente la secuencia narrativa, la pregunta retórica de Jezabel, el modismo «come pan» con nota cultural, y la promesa de entregar la viña de Nabot. También preserva bien la nota sobre la posible lectura aseverativa/reproche de la primera cláusula. Sin embargo, hay un problema gramatical importante en «alégrese tu corazón», que no concuerda con la serie de imperativos directos dirigidos a Acab y suena menos natural que una formulación exhortativa equivalente.
  spanish_quality_summary: El texto es mayormente claro y digno, pero «¿Ahora tú gobiernas sobre Israel como rey?» suena algo pesado; «¿Acaso ahora gobiernas Israel como rey?» o «¿Ahora gobiernas Israel como rey?» sería más natural. Más importante, «alégrese tu corazón» introduce un subjuntivo jussivo algo rígido y menos idiomático tras «Levántate, come pan». En español bíblico legible, «que tu corazón se alegre» preserva mejor el sentido. También conviene suavizar «sobre Israel» a «Israel» para mayor naturalidad sin pérdida semántica.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios «Jezabel» y «Nabot» son aceptables en español bíblico. «Viña» para כֶּרֶם y «jezreelita» para הַיִּזְרְעֵאלִי están bien. No aparece terminología sensible del glosario general (Yahvé, Mesías, etc.).
  issues:
  - severity: medium
    issue: «alégrese tu corazón» suena gramaticalmente forzado en contexto
    rationale: Después de los imperativos «Levántate, come pan», esta forma resulta menos natural en español actual y no expresa con la misma claridad la exhortación hebrea de bienestar/animo interior. «que tu corazón se alegre» o equivalente preserva mejor el sentido.
  - severity: low
    issue: «gobiernas sobre Israel como rey» es menos natural que «gobiernas Israel como rey»
    rationale: El hebreo usa עַל, pero en español con «gobernar» suele sonar más idiomático el complemento directo. La idea de autoridad real ya queda expresada por «como rey».
  revised_spanish_text: 'Entonces Jezabel, su esposa, le dijo: «¿Ahora tú gobiernas Israel como rey[a]? Levántate, come pan y que tu corazón se alegre[b]; yo te daré la viña de Nabot el jezreelita».'
  revised_footnotes:
  - marker: a
    text: 'O: «Ahora tú estás ejerciendo realeza sobre Israel»; el hebreo puede leerse como una afirmación o un reproche, no solo como pregunta.'
    reason: alternative_reading
  - marker: b
    text: «Come pan» es un modismo hebreo para tomar una comida.
    reason: cultural_note
  revision_rationale: 'Se ajustó la sintaxis para un español más natural y fiel al tono exhortativo del hebreo: «gobiernas Israel como rey» evita una construcción pesada, y «que tu corazón se alegre» comunica mejor la idea de ánimo interior tras los imperativos previos. Se conservaron las dos notas del expediente inglés porque siguen siendo pertinentes en español.'
