translation:
  language: es
  text: Pero si adviertes al justo para que no peque, y él no peca, ciertamente vivirá, porque hizo caso a la advertencia[a]; y tú habrás librado tu vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue advertido» o «atendió la advertencia». El verbo hebreo puede enfatizar ya sea recibir la advertencia o responder a ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - pues
  lexicon: HALOT
  rationale: En esta construcción condicional, כִּי introduce la prótasis; en español, 'si' expresa de manera natural y precisa esa condición.
- source_word: הִזְהַרְתּוֹ
  english_pob_choice: you warn him
  chosen_spanish: adviertes al justo
  alternatives_spanish:
  - amonestas al justo
  - alertas al justo
  lexicon: HALOT
  rationale: El hifil de זהר puede significar advertir o amonestar. 'Advertir' comunica bien la idea sin añadir dureza innecesaria, y conserva la relación directa con la advertencia dada al justo.
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: al justo
  alternatives_spanish:
  - a un hombre justo
  - a una persona justa
  lexicon: HALOT
  rationale: Aquí el sustantivo/adjetivo funciona de modo sustantivado. En español, 'al justo' es claro, natural y mantiene el matiz moral/legal del hebreo sin forzar el género donde el texto no lo exige en la forma española.
- source_word: לְבִלְתִּי חֲטֹא
  english_pob_choice: not to sin
  chosen_spanish: para que no peque
  alternatives_spanish:
  - para no pecar
  - con tal de que no peque
  lexicon: HALOT
  rationale: La construcción expresa propósito o prevención. 'Para que no peque' conserva la finalidad de la advertencia y mantiene el paralelo con el resultado que sigue.
- source_word: וְהוּא לֹא חָטָא
  english_pob_choice: and he does not sin
  chosen_spanish: y él no peca
  alternatives_spanish:
  - y no peca
  - y no pecó
  lexicon: HALOT
  rationale: En este contexto de generalidad condicional, el presente español resulta natural y refleja el valor gnómico del hebreo mejor que un pasado puntual.
- source_word: חָיוֹ יִחְיֶה
  english_pob_choice: he will surely live
  chosen_spanish: ciertamente vivirá
  alternatives_spanish:
  - vivirá de seguro
  - sin duda vivirá
  lexicon: HALOT
  rationale: La infinitiva absoluta con imperfecto intensifica la afirmación. 'Ciertamente vivirá' reproduce esa fuerza enfática de manera sobria y legible.
- source_word: נִזְהָר
  english_pob_choice: he took warning
  chosen_spanish: tomó advertencia
  alternatives_spanish:
  - recibió la advertencia
  - hizo caso a la advertencia
  lexicon: HALOT
  rationale: El nifal de זהר puede apuntar tanto a recibir como a atender la advertencia. 'Tomó advertencia' intenta preservar esa doble posibilidad sin cerrar demasiado el matiz.
- source_word: נַפְשְׁךָ
  english_pob_choice: your life
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu alma
  - tu persona
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ se refiere a la vida de la persona, no a 'alma' en sentido posterior. 'Tu vida' refleja el uso idiomático en el contexto de vigilancia y responsabilidad.
- source_word: הִצַּלְתָּ
  english_pob_choice: you will have delivered
  chosen_spanish: habrás librado
  alternatives_spanish:
  - habrás rescatado
  - habrás salvado
  lexicon: HALOT
  rationale: נצל en hifil significa librar o rescatar. 'Habrás librado' conserva la idea de liberación/deliverance y funciona bien con el resultado del cumplimiento de la advertencia.
theological_decisions:
- issue: Sentido de "librar tu vida" en el contexto del atalaya
  english_pob_reading: The phrase refers to preserving the prophet from bloodguilt or accountability before God, not teaching salvation by personal merit.
  chosen_spanish_reading: La frase se refiere a quedar librado de culpa y responsabilidad ante Dios, no a una salvación por mérito personal.
  alternative_spanish_readings:
  - salvarte espiritualmente
  - preservar solo tu vida física
  rationale: 'En los pasajes del atalaya en Ezequiel, la carga es judicial y del pacto: advertir correctamente evita la culpa por la sangre del otro. La traducción debe conservar esa gravedad sin convertirla en una afirmación de auto-salvación.'
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma doctrinal ajena al texto.
translation_notes:
  revision_awareness: Revisado contra el texto hebreo masorético y el audit trail inglés; no se introdujeron cambios sustantivos respecto de la lectura aprobada.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece en este segmento.
  - Se prefirió 'justo' y 'peca' para conservar el registro bíblico sin arcaizar en exceso.
  - Se evitó 'alma' para נֶפֶשׁ porque el contexto habla de vida y responsabilidad.
  - La nota [a] preserva la ambigüedad verbal del hebreo entre finalidad y prevención.
