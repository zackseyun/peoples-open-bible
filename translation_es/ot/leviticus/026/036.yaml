review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido global: Yahvé causa un terror interior en los sobrevivientes dispersos, un ruido mínimo los hace huir, y caen sin perseguidor real. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y la auditoría inglesa: בְּאַרְצֹת es plural y conviene preservarlo como «en las tierras de sus enemigos», y «hoja impulsada» suena poco natural en español para נִדָּף, donde una formulación como «hoja arrastrada» preserva mejor la imagen auditiva sin sobreinterpretar. Además, «como ante la espada» es comprensible, pero «como si huyeran de la espada» o «como de la espada» refleja mejor la idea de fuga.'
  spanish_quality_summary: 'El texto es legible y digno, pero presenta pequeñas asperezas idiomáticas: «los que de ustedes queden» es algo rígido, «en la tierra de sus enemigos» pierde el plural, y «el sonido de una hoja impulsada» no suena natural en español bíblico contemporáneo. Una leve revisión mejora fidelidad y fluidez sin ampliar el sentido.'
  glossary_alignment: 'No hay conflicto con la terminología doctrinal principal del proyecto. La agencia divina se preserva. Las decisiones léxicas clave requieren ajuste menor: mantener el plural «tierras», preferir una imagen natural para נִדָּף, y afinar la comparación con la espada.'
  issues:
  - severity: medium
    issue: Se pierde el plural de בְּאַרְצֹת אֹיְבֵיהֶם
    rationale: El hebreo dice «en las tierras de sus enemigos», y la auditoría inglesa preserva deliberadamente el plural para sugerir dispersión. «En la tierra de sus enemigos» atenúa ese matiz.
  - severity: medium
    issue: «Hoja impulsada» es poco natural en español
    rationale: Aunque intenta conservar el pasivo de נִדָּף, la expresión resulta extraña y poco idiomática. «Hoja arrastrada» o la alternativa de nota «llevada por el viento» transmiten mejor la imagen auditiva y el pánico irracional.
  - severity: low
    issue: «Los que de ustedes queden» suena rígido
    rationale: Es entendible, pero «los que queden de ustedes» o «los que de ustedes sobrevivan» es más natural sin perder la referencia directa al grupo.
  - severity: low
    issue: «Como ante la espada» no refleja de la manera más clara la idea de huir de una amenaza
    rationale: La construcción hebrea expresa manera comparativa de huida. En español, «como si huyeran de la espada» suena más claro y más cercano al sentido que la fórmula actual.
  revised_spanish_text: En cuanto a los que queden de ustedes, yo traeré desfallecimiento a sus corazones en las tierras de sus enemigos; y el sonido de una hoja arrastrada[a] los perseguirá; huirán como si huyeran de la espada, y caerán sin que nadie los persiga.
  revised_footnotes:
