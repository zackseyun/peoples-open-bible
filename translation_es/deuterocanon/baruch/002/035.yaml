review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro POB en lo esencial: «estableceré» para στήσω, «pacto eterno» para διαθήκην αἰώνιον, la fórmula pactual recíproca, y la promesa de no volver a quitar a Israel de la tierra dada. Sin embargo, la redacción española de la fórmula del pacto («sea para ellos Dios… para mí pueblo») suena demasiado calcada y poco natural; además, «apartaré» para οὐ κινήσω ἔτι puede entenderse como separación sin implicar claramente remoción de la tierra.'
  spanish_quality_summary: La calidad general es buena, pero hay dos puntos de legibilidad importantes. Primero, «para ellos Dios / para mí pueblo» resulta forzado en español e incluso ambiguo; «su Dios / mi pueblo» conserva la fórmula bíblica con mejor claridad. Segundo, «ya no apartaré» es menos preciso que «ya no quitaré» o «ya no removeré» en este contexto territorial. El resto del versículo lee con dignidad y naturalidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» es correcto para θεόν; no aparecen Yahvé/Mesías/Espíritu ni otros términos sensibles. La excepción recomendada es usar la fórmula pactual idiomática española «su Dios / mi pueblo» aunque el borrador intentó conservar más literalmente la orientación griega «para ellos / para mí»; esto está respaldado por la nota inglesa y mejora fidelidad funcional en español.
  issues:
  - severity: medium
    issue: La fórmula pactual «para que yo sea para ellos Dios y ellos sean para mí pueblo» es poco natural en español.
    rationale: Aunque refleja de cerca la estructura griega, en español eclesial y general la formulación idiomática y fiel es «para que yo sea su Dios y ellos sean mi pueblo». La versión actual suena calcada y distrae del sentido.
  - severity: medium
    issue: «Ya no apartaré» debilita o vuelve menos específica la idea de remoción de la tierra.
    rationale: κινήσω con ἀπό + «la tierra» comunica desplazamiento/remoción. «Apartaré» puede entenderse relacionalmente o como separación parcial; «quitaré» expresa mejor que no los removerá de la tierra dada sin intensificar demasiado.
  - severity: low
    issue: La nota al pie puede armonizarse mejor con el texto revisado.
    rationale: Si el texto principal adopta la fórmula idiomática «su Dios / mi pueblo», la nota debe preservar la alternativa más literal basada en la construcción infinitiva, no repetir exactamente el texto principal como si fuera solo una opción.
  revised_spanish_text: Y estableceré para ellos un pacto eterno,[a] para que yo sea su Dios y ellos sean mi pueblo; y ya no quitaré a mi pueblo Israel de la tierra que les di.
  revised_footnotes:
  - marker: a
    text: 'O: «para ser su Dios y para que ellos sean mi pueblo». El griego expresa el propósito o contenido del pacto con una construcción infinitiva.'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación pequeña pero importante para lograr español natural y fiel: la fórmula del pacto se expresó con la locución bíblica estándar «su Dios / mi pueblo», y «quitaré… de la tierra» refleja mejor la idea de remoción territorial que «apartaré». La nota mantiene la información del infinitivo griego como alternativa útil.'
