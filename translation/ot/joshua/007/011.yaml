theological_decisions:
- issue: Corporate attribution of guilt to Israel though one individual committed the act
  chosen_reading: Retain the corporate subject 'Israel' and plural verbs/pronouns without softening to an individualizing paraphrase.
  alternative_readings:
  - Interpret as only Achan in paraphrastic translation
  rationale: The Hebrew explicitly attributes the sin to Israel as a covenant people. The translation should preserve this covenantal solidarity rather than resolve the tension by narrowing the statement to Achan alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
