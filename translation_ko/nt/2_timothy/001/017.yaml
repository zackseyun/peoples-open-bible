lexical_decisions:
- source_word: γενόμενος ἐν Ῥώμῃ
  english_pob_choice: when he was in Rome
  chosen_korean: 로마에 와서
  alternatives_korean:
  - 로마에 이르러
  - 로마에 도착하여
  lexicon: BDAG
  rationale: γενόμενος(γίνομαι의 분사)는 본문에서 「~에 이르러·~에 와서」의 의미를 가진다. 「로마에 와서」가 자연스러운 한국어 시간 구문이다.
- source_word: σπουδαίως ἐζήτησέν με
  english_pob_choice: searched for me diligently
  chosen_korean: 부지런히 나를 찾았고
  alternatives_korean:
  - 열심히 나를 찾았고
  - 애써 나를 찾았고
  lexicon: BDAG
  rationale: σπουδαίως는 「열심·부지런함」을 뜻한다. 한국 성서 전통의 「부지런히」가 본문 흐름에 자연스럽다.
- source_word: εὗρεν
  english_pob_choice: found me
  chosen_korean: 마침내 만났습니다
  alternatives_korean:
  - 찾아냈습니다
  - 발견했습니다
  lexicon: BDAG
  rationale: 「찾았다 + 만났다」의 흐름을 「부지런히 나를 찾았고, 마침내 만났습니다」로 자연스러운 한국어 서사 흐름으로 옮긴다.
