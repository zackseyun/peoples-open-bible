translation:
  language: es
  text: Y cuando Asa oyó estas palabras y la profecía de Oded el profeta[a], cobró valor y quitó las cosas detestables de toda la tierra de Judá y Benjamín, y de las ciudades que había capturado en la región montañosa de Efraín; y renovó el altar de Yahvé que estaba delante del vestíbulo de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la profecía de Oded el profeta». Algunos intérpretes y discusiones textuales relacionan esto con Azarías hijo de Oded en el contexto circundante.'
    reason: textual_variant
lexical_decisions:
- source_word: וְכִשְׁמֹעַ
  english_pob_choice: And when ... heard
  chosen_spanish: Y cuando ... oyó
  alternatives_spanish:
  - y al oír
  - y cuando escuchó
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo se vierte naturalmente en español con 'cuando'. 'Oyó' mantiene el valor básico de recepción auditiva del hebreo sin añadir matices inexistentes.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos asuntos
  lexicon: HALOT
  rationale: En el contexto inmediato Asa escucha el discurso profético; 'palabras' conserva ese vínculo discursivo mejor que 'cosas' o 'asuntos'.
- source_word: וְהַנְּבוּאָה
  english_pob_choice: and the prophecy
  chosen_spanish: y la profecía
  alternatives_spanish:
  - y el mensaje profético
  - y la palabra profética
  lexicon: HALOT
  rationale: '''Profecía'' corresponde de modo directo a נְבוּאָה y preserva la referencia a una revelación profética concreta.'
- source_word: עֹדֵד הַנָּבִיא
  english_pob_choice: of Oded the prophet
  chosen_spanish: de Oded el profeta
  alternatives_spanish:
  - del profeta Oded
  lexicon: HALOT
  rationale: El hebreo presenta un nombre propio seguido de aposición; en español, 'de Oded el profeta' reproduce bien la relación y deja visible la forma del texto base, sin resolver aquí la tensión textual del contexto más amplio.
- source_word: הִתְחַזַּק
  english_pob_choice: he took courage
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - tomó ánimo
  - cobró valor
  lexicon: HALOT
  rationale: El hitpael expresa un fortalecimiento/embalamiento interno. 'Se fortaleció' conserva la fuerza reflexiva del hebreo; 'tomó ánimo' sería más idiomático pero menos literal.
- source_word: וַיַּעֲבֵר הַשִּׁקּוּצִים
  english_pob_choice: and removed the detestable things
  chosen_spanish: y quitó las cosas detestables
  alternatives_spanish:
  - y eliminó las abominaciones
  - y apartó los ídolos detestables
  lexicon: HALOT
  rationale: שִׁקּוּצִים denota objetos o prácticas cultualmente repugnantes; 'cosas detestables' conserva la amplitud del término sin imponer 'ídolos' cuando el hebreo no lo especifica aquí. 'Quitó' refleja la acción de remover.
- source_word: מִכָּל אֶרֶץ יְהוּדָה וּבִנְיָמִן
  english_pob_choice: from all the land of Judah and Benjamin
  chosen_spanish: de toda la tierra de Judá y Benjamín
  alternatives_spanish:
  - de todo el territorio de Judá y Benjamín
  - de toda la tierra de Judá y de Benjamín
  lexicon: HALOT
  rationale: '''Tierra'' reproduce אֶרֶץ de manera directa y natural en español bíblico contemporáneo; ''territorio'' es posible pero algo más administrativo.'
- source_word: וּמִן הֶעָרִים אֲשֶׁר לָכַד מֵהַר אֶפְרָיִם
  english_pob_choice: and from the cities that he had captured in the hill country of Ephraim
  chosen_spanish: y de las ciudades que había capturado en la región montañosa de Efraín
  alternatives_spanish:
  - y de las ciudades que había tomado de la región montañosa de Efraín
  - y de las ciudades que había conquistado en la serranía de Efraín
  lexicon: HALOT
  rationale: לכד significa capturar/tomar por la fuerza; 'capturado' conserva esa idea. 'Región montañosa' expresa היטב el hebreo idiomático 'montaña de Efraín' como área geográfica, sin forzar una literalidad extraña en español.
- source_word: וַיְחַדֵּשׁ
  english_pob_choice: and he renewed
  chosen_spanish: y renovó
  alternatives_spanish:
  - y restauró
  - y rehízo
  lexicon: HALOT
  rationale: חדשׁ en piel comunica renovar/hacer nuevo. 'Renovó' preserva el valor léxico sin reducirlo solo a reparación material.
- source_word: מִזְבַּח יְהוָה
  english_pob_choice: the altar of Yahweh
  chosen_spanish: el altar de Yahvé
  alternatives_spanish:
  - el altar de Yahveh
  - el altar de Yahvéh
  lexicon: HALOT
  rationale: Se sigue el término de proyecto 'Yahvé' para יְהוָה, manteniendo el nombre divino como nombre propio y no como sustituto titulado.
- source_word: אֲשֶׁר לִפְנֵי אוּלָם יְהוָה
  english_pob_choice: that was before the vestibule of Yahweh
  chosen_spanish: que estaba delante del vestíbulo de Yahvé
  alternatives_spanish:
  - que estaba ante el pórtico de Yahvé
  - que estaba frente al vestíbulo de Yahvé
  lexicon: HALOT
  rationale: אוּלָם en contexto del templo es el vestíbulo/portico. 'Vestíbulo' es preciso y comprensible; 'delante de' conserva לִפְנֵי como relación espacial.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se mantiene la decisión del proyecto de traducir יְהוָה por el nombre divino 'Yahvé', preservando la referencia al nombre pactual y no sustituyéndolo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión textual en 'Oded el profeta'
  english_pob_reading: Translate the MT as 'Oded the prophet' in the main text
  chosen_spanish_reading: Traducir el texto hebreo dado como 'Oded el profeta' y señalar la tensión en nota
  alternative_spanish_readings:
  - armonizar como 'Azarías hijo de Oded el profeta'
  - otras reconstrucciones textuales
  rationale: El hebreo suministrado nombra a Oded; la traducción debe seguir ese testimonio base. La nota permite al lector ver la alternativa contextual sin borrar la lectura del texto recibido.
  doctrine_reference: Principio editorial POB sobre transparencia textual y auditable reasoning
translation_notes:
  revision_awareness: Alineado con la revisión más reciente indicada como sin cambios; se conservó la lectura MT y la decisión de traducir יְהוָה por Yahvé, con una nota para la tensión textual en 'Oded el profeta'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה.
  - Se prefirió 'profecía' y 'palabras' para mantener el paralelismo del hebreo.
  - '''Región montañosa de Efraín'' evita un calco demasiado áspero de ''monte Efraín'' en español.'
  - Se evitó 'SEÑOR' para no ocultar el nombre divino.
  - La puntuación con punto y coma sigue la sintaxis extensa del versículo en español natural.
