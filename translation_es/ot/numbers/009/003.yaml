translation:
  language: es
  text: El día catorce de este mes[a], entre las tardes, la celebrarán en su tiempo señalado; conforme a todos sus estatutos y conforme a todas sus ordenanzas la celebrarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre las tardes», una expresión tradicional para el período alrededor del crepúsculo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאַרְבָּעָה עָשָׂר יוֹם
  english_pob_choice: On the fourteenth day
  chosen_spanish: El día catorce
  alternatives_spanish:
  - El día catorce de este mes
  - El catorceavo día
  lexicon: HALOT
  rationale: El hebreo expresa literalmente una construcción calendárica fija. En español bíblico natural, «el día catorce» conserva la referencia precisa sin sonar forzado; el complemento «de este mes» queda implícito en el contexto inmediato y se explicita en el verso mediante «de este mes».
- source_word: בַּחֹדֶשׁ הַזֶּה
  english_pob_choice: of this month
  chosen_spanish: de este mes
  alternatives_spanish:
  - en este mes
  lexicon: HALOT
  rationale: La referencia temporal se integra de modo natural con la fecha. «De este mes» reproduce bien la relación genitiva y la idiomaticidad del español.
- source_word: בֵּין הָעַרְבַּיִם
  english_pob_choice: between the evenings
  chosen_spanish: entre las tardes
  alternatives_spanish:
  - entre los atardeceres
  - al atardecer
  lexicon: HALOT
  rationale: La expresión hebrea es técnica y tradicional. Se conserva el paralelismo literal con una forma española transparente. «Entre las tardes» mantiene la tensión lexical del original sin reemplazarla por una paráfrasis interpretativa.
- source_word: תַּעֲשׂוּ אֹתוֹ
  english_pob_choice: you shall keep it
  chosen_spanish: lo harán
  alternatives_spanish:
  - lo guardarán
  - lo observarán
  lexicon: HALOT
  rationale: Aunque el audit trail inglés resuelve la frase como «keep it» por el sentido idiomático cultual, en español el verbo «hacer» puede mantener la sobriedad del mandato y la referencia a la celebración ritual. Se evita introducir «guardar» como si fuera la única solución, para no borrar el valor literal de עשה y la tensión entre hacer/observar.
- source_word: בְּמוֹעֲד֑וֹ
  english_pob_choice: at its appointed time
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - en su momento señalado
  - a su tiempo fijado
  lexicon: HALOT
  rationale: «מוֹעֵד» denota tiempo fijado o señalado para una cita/culto. «En su tiempo señalado» conserva el carácter calendarial y ritual del término con buena naturalidad en español.
- source_word: כְּכָל חֻקֹּתָיו
  english_pob_choice: according to all its statutes
  chosen_spanish: conforme a todas sus estatutos
  alternatives_spanish:
  - según todos sus estatutos
  - conforme a todas sus prescripciones
  lexicon: HALOT
  rationale: La terminología legal-cultual se mantiene con «estatutos». Se conserva la fuerza normativa del hebreo; la forma es una versión española directa del patrón del original.
- source_word: וּכְכָל מִשְׁפָּטָיו
  english_pob_choice: and according to all its ordinances
  chosen_spanish: y conforme a todos sus preceptos
  alternatives_spanish:
  - y conforme a todos sus juicios
  - y conforme a todas sus ordenanzas
  lexicon: HALOT
  rationale: «מִשְׁפָּטִים» en contexto legal/cultual admite «preceptos», que suena natural en español y distingue este término de «estatutos». Se preserva la segunda cola normativa del verso.
- source_word: תַּעֲשׂוּ אֹתוֹ
  english_pob_choice: you shall keep it
  chosen_spanish: lo harán
  alternatives_spanish:
  - lo cumplirán
  - lo observarán
  lexicon: HALOT
  rationale: La repetición final del verbo refuerza la orden. Se mantiene la misma solución verbal para conservar la estructura del hebreo sin añadir explicaciones interpretativas.
theological_decisions:
- issue: Forma de traducir el mandato cultual repetido (עשה + objeto)
  english_pob_reading: you shall keep it
  chosen_spanish_reading: lo harán
  alternative_spanish_readings:
  - lo guardarán
  - lo observarán
  rationale: El inglés POB toma el verbo en su sentido ritual de observancia, pero el hebreo conserva la forma amplia de «hacer». En español se deja visible esa amplitud con «hacer», entendida en contexto como cumplimiento cultual, para no cerrar prematuramente la tensión lexical del original.
  doctrine_reference: No aplica; decisión léxico-ritual sin implicación doctrinal directa.
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado del POB en inglés: la fecha se mantiene precisa, la expresión temporal técnica se conserva de forma transparente y la frase verbal se trata como mandato ritual sin aplanar la tensión entre «hacer», «observar» y «guardar». No hubo revisiones posteriores que alteraran el sentido.'
  spanish_consistency_notes:
  - Se mantiene «este mes» para בַּחֹדֶשׁ הַזֶּה y «tiempo señalado» para בְּמוֹעֲדוֹ, en línea con el valor calendárico del pasaje.
  - Se conserva el registro legal-cultual con «estatutos» y «preceptos», evitando sustituciones por vocabulario eclesiástico posterior.
  - La nota al pie se ancla solo en la expresión temporal técnica, porque es la única ambigüedad de traducción preservada explícitamente por el POB inglés.
