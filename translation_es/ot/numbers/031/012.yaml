translation:
  language: es
  text: Y trajeron los cautivos, el botín y el despojo a Moisés, a Eleazar el sacerdote y a la congregación de los hijos de Israel, al campamento en las llanuras de Moab[a], que están junto al Jordán, frente a Jericó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘las estepas de Moab’.
    reason: lexical_alternative
  - marker: b
    text: O ‘que están sobre el Jordán, en Jericó’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִאוּ
  english_pob_choice: And they brought
  chosen_spanish: Y los trajeron
  alternatives_spanish:
  - Y los llevaron
  - Y los presentaron
  lexicon: HALOT
  rationale: 'El hiphil de בוא tiene valor causativo: no solo ‘venir’, sino ‘traer’. En español, ‘los trajeron’ comunica con naturalidad el traslado de personas y objetos sin perder la fuerza causal del verbo.'
- source_word: עֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the congregation of the sons of Israel
  chosen_spanish: la congregación de los hijos de Israel
  alternatives_spanish:
  - la congregación de los israelitas
  - la asamblea de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial ‘hijos de Israel’ por su transparencia respecto al hebreo בני ישראל. ‘Congregación’ mantiene el sentido de la comunidad reunida, sin sustituirlo por una formulación más interpretativa.
- source_word: הַשְּׁבִי
  english_pob_choice: the captives
  chosen_spanish: los cautivos
  alternatives_spanish:
  - los prisioneros
  - la cautividad
  lexicon: HALOT
  rationale: En contexto militar, שבי designa a personas capturadas, no el estado abstracto de cautiverio. ‘Cautivos’ es directo y preciso en español.
- source_word: הַמַּלְקוֹחַ
  english_pob_choice: the prey
  chosen_spanish: el botín
  alternatives_spanish:
  - la presa
  - lo tomado
  lexicon: HALOT
  rationale: Aunque el audit trail inglés optó por ‘prey’ para distinguir este término de שָׁלָל, en español ‘botín’ comunica mejor el valor de lo tomado en guerra. ‘Presa’ podría sonar a animal cazado o resultar ambiguo; ‘botín’ es más natural, sin borrar la distinción semántica con ‘despojo’.
- source_word: הַשָּׁלָל
  english_pob_choice: the spoil
  chosen_spanish: el despojo
  alternatives_spanish:
  - el botín
  - el saqueo
  lexicon: HALOT
  rationale: Se mantiene una distinción visible entre מלקוח y שָׁלָל. ‘Despojo’ refleja bien el término bélico y evita repetir ‘botín’ para ambos sustantivos relacionados.
- source_word: אֶל הַמַּחֲנֶה
  english_pob_choice: to the camp
  chosen_spanish: al campamento
  alternatives_spanish:
  - al campamento de guerra
  - al campamento
  lexicon: HALOT
  rationale: ‘Campamento’ es el equivalente natural de מַחֲנֶה en este contexto. ‘Al campamento’ mantiene la sencillez del movimiento indicado por אֶל.
- source_word: עַרְבֹת מוֹאָב
  english_pob_choice: the plains of Moab
  chosen_spanish: las llanuras de Moab
  alternatives_spanish:
  - las estepas de Moab
  - las planicies de Moab
  lexicon: HALOT
  rationale: ‘Llanuras’ es claro para el lector moderno y corresponde bien al valor geográfico de la expresión. Se evita un término más técnico como ‘estepas’ por legibilidad.
- source_word: אֲשֶׁר עַל יַרְדֵּן יְרֵחוֹ
  english_pob_choice: which are by the Jordan at Jericho
  chosen_spanish: que están junto al Jordán, en Jericó
  alternatives_spanish:
  - que están sobre el Jordán, frente a Jericó
  - que están junto al Jordán, al lado de Jericó
  lexicon: HALOT
  rationale: La frase sitúa el lugar en relación con el Jordán y Jericó. ‘Junto al Jordán, en Jericó’ reproduce de forma natural la localización sin forzar una paráfrasis más interpretativa como ‘frente a Jericó’.
translation_notes:
  revision_awareness: El inglés POB fue revisado desde ‘the plunder’ a ‘the prey’ para distinguir mejor מלקוח de שָׁלָל. En español se preserva esa distinción con ‘botín’ y ‘despojo’, evitando colapsar ambos términos en una sola palabra. También se mantuvo la ubicación geográfica con una formulación natural y auditable, cercana al sentido del hebreo y del audit trail inglés.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el hebreo lo exige explícitamente; este versículo no contiene el nombre divino.
  - Se conserva ‘hijos de Israel’ para la transparencia del hebreo בני ישראל, en continuidad con la política terminológica del proyecto.
  - Se distingue entre ‘botín’ y ‘despojo’ para reflejar dos lexemas hebreos distintos, siguiendo la separación del texto fuente.
  - Se evita ‘SEÑOR’ como sustituto, porque aquí no aparece el tetragrámaton.
  - La referencia geográfica se formula con español natural, pero sin perder la relación espacial con el Jordán y Jericó.
