translation:
  language: es
  text: ¡Alaben a Yah![a] Bienaventurado el hombre que teme a Yahvé[b], que se deleita grandemente en sus mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O tradicionalmente, «¡Aleluya!»
    reason: lexical_alternative
  - marker: b
    text: Hebreo «el hombre»; la forma masculina singular se usa de manera genérica en este dicho sapiencial.
    reason: cultural_note
lexical_decisions:
- source_word: הַ֥לְלוּ יָ֨הּ
  english_pob_choice: Praise Yah!
  chosen_spanish: ¡Alabad a Yah!
  alternatives_spanish:
  - ¡Aleluya!
  - ¡Alaben a Yah!
  lexicon: HALOT
  rationale: 'El hebreo es un imperativo plural más la forma breve del nombre divino (Yāh). En español, «¡Alabad a Yah!» conserva de manera transparente ambos componentes: el llamado a alabar y la forma breve del nombre. «¡Aleluya!» es tradicional, pero translitera; «¡Alaben a Yah!» sería posible, aunque la forma singular/plural litúrgica del español bíblico suele preferir el plural de exhortación en este registro.'
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Feliz
  lexicon: HALOT
  rationale: אַשְׁרֵי introduce una declaración sapiencial de dicha/envidiable prosperidad. «Bienaventurado» preserva el tono elevado y bíblico sin reducirlo a una emoción subjetiva. «Dichoso» y «Feliz» son posibles, pero suenan más coloquiales o psicológicas.
- source_word: אִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - un hombre
  lexicon: HALOT
  rationale: El sustantivo hebreo está en masculino singular y funciona de modo genérico en un dicho sapiencial. «El hombre» mantiene la forma representativa del original con naturalidad en español; «la persona» neutraliza demasiado, y «un hombre» debilita el valor proverbial.
- source_word: יָרֵא אֶת יְהוָה
  english_pob_choice: who fears Yahweh
  chosen_spanish: que teme a Yahvé
  alternatives_spanish:
  - que reverencia a Yahvé
  - que tiene temor de Yahvé
  lexicon: HALOT
  rationale: יָרֵא expresa temor reverente ante Dios. «Teme» conserva la fuerza léxica primaria y, en este contexto sapiencial, incluye la reverencia sin diluir la tensión teológica. «Reverencia» suaviza demasiado el matiz; «tiene temor de» es correcto pero menos fluido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo la convención del proyecto, el Tetragrámaton se vierte «Yahvé» para preservar el nombre propio del pacto. «Yahveh» es una variante ortográfica posible, y «el SEÑOR» ocultaría el nombre divino en vez de traducirlo o transliterarlo.
- source_word: בְּמִצְוֺתָיו
  english_pob_choice: in his commandments
  chosen_spanish: en sus mandamientos
  alternatives_spanish:
  - en sus órdenes
  - con sus mandamientos
  lexicon: HALOT
  rationale: La preposición ב con מִצְוֹת expresa aquí la esfera o ámbito en que el justo se deleita. «Mandamientos» preserva el peso formal del término; «órdenes» es más débil; «con» no refleja tan bien la relación de esfera/adhesión.
- source_word: חָפֵץ מְאֹד
  english_pob_choice: greatly delights
  chosen_spanish: se deleita grandemente
  alternatives_spanish:
  - se complace mucho
  - encuentra gran deleite
  lexicon: HALOT
  rationale: חָפֵץ denota complacerse/deleitarse, y מְאֹד intensifica la acción. «Se deleita grandemente» reproduce bien ambos valores y suena natural en español bíblico moderno. «Se complace mucho» también funciona, pero es un poco más seco.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. En este proyecto, la forma castellana establecida es «Yahvé», que preserva el nombre personal de Dios en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Generic masculine אִישׁ in wisdom style
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - la gente
  rationale: La expresión funciona como tipo representativo en una sentencia sapiencial. Mantener «el hombre» conserva la forma genérica masculina del original sin forzar una neutralización que el hebreo no requiere.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés y no requiere revisión adicional: se conserva el imperativo plural, la forma breve del nombre divino, el sustantivo sapiencial de bienaventuranza, el masculino genérico y la intensificación adverbial.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española del Tetragrámaton, coherente con el estándar del proyecto.
  - «Mandamientos» conserva el peso lexical de מִצְוֹת y evita suavizar el término.
  - El tono es bíblico y digno, pero con sintaxis española natural.
  - Las notas al pie preservan la alternativa tradicional «Aleluya» y explican el masculino genérico del hebreo.
