revisions:
- from: Por su temor a Dios[a], ella despreció la salvación temporal de sus hijos.
  to: Por su temor a Dios[a], pasó por alto la seguridad temporal de sus hijos.
  rationale: Se reemplaza «salvación temporal» por «seguridad temporal» para reflejar el sentido físico y transitorio de σωτηρία sin inducir una lectura soteriológica. Se cambia «despreció» por «pasó por alto» para representar mejor ὑπερεῖδεν como subordinación evaluativa, no menosprecio activo. Se omite «ella» por naturalidad del español. La nota se ajusta para eliminar «salvación» como opción principal en un contexto donde sería engañosa en español.
