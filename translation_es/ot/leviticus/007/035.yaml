revisions:
- from: Esta es la porción consagrada de Aarón y la porción consagrada de sus hijos, de las ofrendas encendidas[a] de Yahvé, el día en que los presentó para servir como sacerdotes para Yahvé.
  to: Esta es la porción ungida[a] de Aarón y la porción ungida[a] de sus hijos, de las ofrendas de alimento de Yahvé[b], el día en que los presentó para servir como sacerdotes a Yahvé.
  rationale: Se ajusta מִשְׁחַת para preservar mejor la relación léxica con la unción, siguiendo la revisión inglesa que explicitó 'anointed portion'. Se reemplaza 'ofrendas encendidas' por 'ofrendas de alimento', que representa la elección principal del POB para אִשֵּׁי, dejando la alternativa tradicional en nota. También se suaviza 'para Yahvé' a 'a Yahvé' por naturalidad y mejor correspondencia con la relación de servicio del hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:44:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: mantiene la repetición de מִשְׁחַת para Aarón y sus hijos, conserva Yahvé por יְהוָה, y traduce adecuadamente הִקְרִיב אֹתָם como presentación formal para el servicio sacerdotal. Sin embargo, se desvía del rastro POB en dos puntos léxicos importantes: (1) מִשְׁחַת en el audit trail quedó como ''anointed portion'', no simplemente ''consagrada''; en español conviene preservar más visiblemente el vínculo con la unción sin perder la idea de porción. (2) מֵאִשֵּׁי יְהוָה se tradujo en el POB como ''food offerings of Yahweh'' con nota sobre la alternativa tradicional ''offerings by fire''; ''ofrendas encendidas'' no representa bien esa decisión y suena poco natural.'
  spanish_quality_summary: El español es claro en conjunto, pero 'ofrendas encendidas' resulta poco idiomático y puede sonar mecánico o extraño en registro bíblico. Además, 'porción consagrada' comunica consagración, pero atenúa demasiado la conexión léxica con unción que el POB decidió reintroducir. 'Para Yahvé' es posible, pero en esta frase 'a Yahvé' suena más directo y se alinea mejor con la traducción base y con el servicio sacerdotal dirigido a él.
  glossary_alignment: Se cumple correctamente el uso de 'Yahvé' para יְהוָה. No hay conflicto con otras pautas terminológicas del proyecto. La principal desalineación es con la decisión documentada para אִשֵּׁי, donde debe ir una forma equivalente a 'ofrendas de alimento' con nota de alternativa tradicional, y con מִשְׁחַת, donde conviene mantener explícita la relación con la unción.
  issues:
  - severity: medium
    issue: מִשְׁחַת se tradujo como 'porción consagrada'
    rationale: Aunque es comprensible, no preserva de modo suficientemente visible el vínculo con 'unción' que el audit trail inglés decidió destacar con 'anointed portion'. En español, 'porción de unción' sería torpe, pero 'porción ungida' mantiene mejor la relación léxica.
  - severity: high
    issue: מֵאִשֵּׁי יְהוָה se tradujo como 'de las ofrendas encendidas de Yahvé'
    rationale: '''Ofrendas encendidas'' no es una expresión natural ni refleja la decisión POB principal ''food offerings'', que buscó una alternativa moderna al tradicional ''ofrendas hechas por fuego''. Debe revisarse a ''ofrendas de alimento'' y conservar la alternativa tradicional en nota.'
  - severity: low
    issue: לַיהוָה se vertió como 'para Yahvé'
    rationale: Es defendible, pero 'a Yahvé' suena más sencillo y se ajusta mejor a la línea inglesa 'to Yahweh' y al español natural en este contexto.
  revised_spanish_text: Esta es la porción ungida[a] de Aarón y la porción ungida[a] de sus hijos, de las ofrendas de alimento de Yahvé[b], el día en que los presentó para servir como sacerdotes a Yahvé.
  revised_footnotes:
  - marker: a
    text: O “porción de la unción”. El término hebreo está relacionado con la unción, pero aquí probablemente se refiere a la porción asignada a los sacerdotes en conexión con su consagración.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, “ofrendas hechas por fuego de Yahvé”.
    reason: lexical_alternative
  revision_rationale: Se ajusta מִשְׁחַת para preservar mejor la relación léxica con la unción, siguiendo la revisión inglesa que explicitó 'anointed portion'. Se reemplaza 'ofrendas encendidas' por 'ofrendas de alimento', que representa la elección principal del POB para אִשֵּׁי, dejando la alternativa tradicional en nota. También se suaviza 'para Yahvé' a 'a Yahvé' por naturalidad y mejor correspondencia con la relación de servicio del hebreo.
