  yaml_path: translation/ot/ezekiel/010/002.yaml
  text: And he said to the man clothed in linen[a], “Go in among the wheelwork, under the cherub, and fill your hands with coals of fire from among the cherubim, and scatter them over the city.” And he went in before my eyes.
