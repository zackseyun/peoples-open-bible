  to: Y al tiempo de ponerse el sol, Josué mandó, y los bajaron de los árboles y los arrojaron en la cueva donde se habían escondido, y pusieron grandes piedras sobre la entrada de la cueva hasta este mismo día.
  rationale: 'Se hicieron dos reparaciones menores para mejorar fidelidad léxica y naturalidad del español: ''de encima de los árboles'' se simplificó a ''de los árboles'', que es el giro idiomático normal y suficiente para el sentido de מֵעַל en este contexto; y ''los echaron'' se fortaleció a ''los arrojaron'' para reflejar mejor וַיַּשְׁלִכֻם. No se requieren notas al pie adicionales.'
