translation:
  language: es
  text: Y se rebeló contra mis juicios con maldad[a] más que las naciones, y contra mis estatutos más que las tierras que están alrededor de ella; porque rechazaron mis juicios, y no anduvieron en mis estatutos.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cambió mis juicios en maldad, más que las naciones». El verbo hebreo puede entenderse como rebelión o como una alteración corrupta de lo que Dios había dado; el texto principal sigue el sentido pactual de «se rebeló».'
    reason: lexical_alternative
  - marker: b
    text: «Andar en» es un hebraísmo que significa vivir conforme a o seguir.
    reason: cultural_note
lexical_decisions:
- source_word: וַתֶּמֶר
  english_pob_choice: she rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se mostró rebelde
  - se apartó en rebelión
  lexicon: HALOT
  rationale: En contexto de pacto, מָרָה expresa rebelión/desobediencia más que simple cambio. El sujeto femenino singular se conserva con el clítico reflexivo implícito de español para mantener la personificación de Jerusalén.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis mandamientos judiciales
  - mis ordenanzas
  lexicon: HALOT
  rationale: '''Juicios'' conserva el valor jurídico y funciona de modo natural en español; evita aplanar el paralelo con ''estatutos''.'
- source_word: לְרִשְׁעָה
  english_pob_choice: with wickedness
  chosen_spanish: con maldad
  alternatives_spanish:
  - en maldad
  - de manera perversa
  lexicon: HALOT
  rationale: La preposición ל junto con el sustantivo comunica modo o resultado. 'Con maldad' traduce el sentido adverbial sin forzar 'en' ni convertirlo en una paráfrasis excesiva.
- source_word: מִן הַגּוֹיִם
  english_pob_choice: more than the nations
  chosen_spanish: más que las naciones
  alternatives_spanish:
  - más que entre las naciones
  - por encima de las naciones
  lexicon: HALOT
  rationale: Aquí מִן tiene fuerza comparativa; 'más que' refleja mejor el contraste que un separativo literal.
- source_word: חֻקּוֹתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis preceptos
  lexicon: HALOT
  rationale: '''Estatutos'' mantiene el registro legal-covenantal y la distinción con מִשְׁפָּטִים.'
- source_word: מִן הָאֲרָצוֹת אֲשֶׁר סְבִיבוֹתֶיהָ
  english_pob_choice: more than the lands that are around her
  chosen_spanish: más que las tierras que están alrededor de ella
  alternatives_spanish:
  - más que los territorios que la rodean
  - más que las regiones que la rodean
  lexicon: HALOT
  rationale: '''Tierras'' preserva el alcance territorial de אֲרָצוֹת sin modernizar a ''países''. ''De ella'' explicita el referente femenino de Jerusalén.'
- source_word: מָאַסוּ
  english_pob_choice: they rejected
  chosen_spanish: aborrecieron
  alternatives_spanish:
  - rechazaron
  - despreciaron
  lexicon: HALOT
  rationale: מָאַס puede implicar rechazo con desprecio. 'Aborrecer' recoge mejor la intensidad que un simple 'rechazar', y sigue siendo idiomático en español bíblico contemporáneo.
- source_word: לֹא הָלְכוּ בָהֶם
  english_pob_choice: they did not walk in my statutes
  chosen_spanish: no anduvieron en mis estatutos
  alternatives_spanish:
  - no caminaron en mis estatutos
  - no vivieron conforme a mis estatutos
  lexicon: HALOT
  rationale: Se preserva el hebraísmo 'andar en' como metáfora de conducta, plenamente comprensible en español y coherente con el registro bíblico.
theological_decisions:
- issue: Personificación femenina de Jerusalén
  english_pob_reading: Retain 'she' for Jerusalem rather than replacing with 'it' or explicit 'Jerusalem.'
  chosen_spanish_reading: Mantener la referencia femenina implícita en 'se rebeló' y 'de ella'.
  alternative_spanish_readings:
  - Jerusalén se rebeló
  - se rebeló
  rationale: El verbo hebreo es femenino singular y el contexto profético personifica a Jerusalén. En español, la continuidad se preserva sin añadir el nombre explícito, que alteraría el ritmo del verso.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave) y §6 (legibilidad moderna)
- issue: Distinción jurídica entre מִשְׁפָּטִים y חֻקִּים
  english_pob_reading: Differentiate מִשְׁפָּטַי as 'judgments' and חֻקּוֹתַי as 'statutes.'
  chosen_spanish_reading: Distinguir 'juicios' y 'estatutos'.
  alternative_spanish_readings:
  - leyes
  - mandamientos
  rationale: El paralelo hebreo distingue dos términos de la ley del pacto. Mantener dos voces distintas evita nivelar la acusación y conserva la textura legal del texto.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Sentido de לְרִשְׁעָה
  english_pob_reading: Render the phrase as acting wickedly / into wickedness rather than merely 'for wickedness'.
  chosen_spanish_reading: Traducirla como 'con maldad'.
  alternative_spanish_readings:
  - en maldad
  - para maldad
  rationale: La frase no introduce un fin abstracto sino el modo/resultado de la rebelión; 'con maldad' comunica esa cualidad de acción sin sobreinterpretar la dirección del sustantivo.
  doctrine_reference: Translation philosophy §6 (legibilidad moderna)
- issue: Valor comparativo de מִן
  english_pob_reading: '''more than the nations'' / ''more than the lands'''
  chosen_spanish_reading: Mantener 'más que' en ambos miembros comparativos.
  alternative_spanish_readings:
  - desde las naciones
  - por encima de las naciones
  rationale: El uso comparativo del hebreo debe quedar explícito para no confundirlo con procedencia o separación.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió 'with wickedness' frente a 'into wickedness'. Por eso el español principal usa 'con maldad' para reflejar mejor el valor adverbial/modo de la frase, manteniendo intacta la comparación 'más que las naciones' y el paralelismo con 'mis estatutos'.
  spanish_consistency_notes:
  - Se preserva la distinción entre 'juicios' y 'estatutos' para מִשְׁפָּטַי / חֻקּוֹתַי.
  - Se mantiene el hebraísmo 'andar en' por su fuerza idiomática y continuidad bíblica.
  - '''Tierras'' se usa para אֲרָצוֹת, evitando imponer ''países'' o ''naciones'' donde el hebreo es más amplio.'
  - La referencia femenina a Jerusalén queda implícita en la sintaxis española sin añadir el nombre propio.
