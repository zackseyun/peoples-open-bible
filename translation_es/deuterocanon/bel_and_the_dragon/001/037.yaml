  rationale: La nota de auditoría indica truncamiento real del testimonio, pero también que esta extracción sigue la forma completa de Theodotion en el pasaje correspondiente. Por fidelidad documental, la traducción publica la continuación recibida en la tradición narrativa, sin ocultar la incertidumbre textual.
