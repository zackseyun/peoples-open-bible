translation:
  language: es
  text: Yahvé reina; que la tierra se alegre; que las numerosas costas lejanas[a] se regocijen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «islas». El término hebreo puede referirse a islas o a costas lejanas y regiones marítimas.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre personal divino del Tetragrámaton con la forma española establecida en el proyecto, en lugar de sustituirlo por un título.
- source_word: מָלָךְ
  english_pob_choice: reigns
  chosen_spanish: reina
  alternatives_spanish:
  - ha comenzado a reinar
  - es rey
  lexicon: HALOT
  rationale: El qatal hebreo se entiende aquí como proclamación de la realeza en curso. En español, «reina» comunica con naturalidad la afirmación de soberanía presente sin forzar un matiz ingresivo.
- source_word: תָּגֵל
  english_pob_choice: let the earth rejoice
  chosen_spanish: que la tierra se alegre
  alternatives_spanish:
  - que la tierra se regocije
  - la tierra se alegrará
  lexicon: HALOT
  rationale: El imperfecto funciona de modo volitivo en el paralelismo poético; «que... se alegre» preserva ese impulso exhortativo de forma idiomática.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra habitada
  lexicon: HALOT
  rationale: «La tierra» mantiene el alcance universal del contexto de realeza cósmica y se ajusta al paralelo con las costas.
- source_word: יִשְׂמְחוּ
  english_pob_choice: let ... be glad
  chosen_spanish: que... se regocijen
  alternatives_spanish:
  - que... estén alegres
  - que... se alegren
  lexicon: HALOT
  rationale: Se conserva la fuerza volitiva del verbo y el paralelismo con el hemistiquio anterior. «Regocijarse» expresa bien el tono celebrativo del texto poético.
- source_word: אִיִּים
  english_pob_choice: coastlands
  chosen_spanish: costas
  alternatives_spanish:
  - islas
  - costas marítimas
  lexicon: HALOT
  rationale: El término hebreo puede abarcar islas o regiones litorales lejanas. «Costas» comunica la amplitud geográfica y evita reducir el sentido solo a islas.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - numerosas
  lexicon: HALOT
  rationale: Adjetivo cuantitativo directo que conserva la sencillez del original y el enlace natural con «costas».
theological_decisions:
- issue: Alcance universal de la realeza de Yahvé
  english_pob_reading: A universal declaration of the LORD's present reign over the world
  chosen_spanish_reading: Una proclamación universal de que Yahvé reina ahora sobre toda la tierra
  alternative_spanish_readings:
  - Una proclamación localizada sobre la tierra de Israel
  - 'Una fórmula de entronización: «Yahvé ha comenzado a reinar»'
  rationale: La mención de «la tierra» y de las «muchas costas» favorece un alcance universal. Por eso se mantiene una lectura de reinado presente, sin limitarla a Israel ni imponer necesariamente un matiz ingresivo.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El inglés POB fue revisado y quedó sin cambios en la última pasada; se mantiene su decisión clave de traducir el Tetragrámaton como 'Yahweh' y de tomar אִיִּים como 'coastlands' con nota alternativa. La versión española reproduce esas decisiones en forma natural y auditable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el paralelismo volitivo con dos cláusulas en subjuntivo exhortativo («que... se alegre / que... se regocijen»).
  - «Costas» funciona aquí como equivalente amplio de אִיִּים sin cerrar la posibilidad de «islas», preservada en nota.
