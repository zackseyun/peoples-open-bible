base_translation:
  language: en
  yaml_path: translation/ot/ruth/004/004.yaml
  text: So I thought I should inform you[a], saying, ‘Buy it in the presence of those sitting here and in the presence of the elders of my people. If you will redeem it, redeem it; but if not, tell me, so that I may know, for there is no one besides you to redeem it, and I am after you.’ And he said[b], ‘I will redeem it.’
  footnotes:
  - marker: a
    text: Hebrew literally, 'uncover your ear,' an idiom meaning 'inform you' or 'let you know.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew text reads 'if he will not redeem'; some understand this in context as 'if you will not redeem,' smoothing the shift from second person to third person.
    reason: alternative_reading
