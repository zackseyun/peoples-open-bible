review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: acompañamiento con Absalón, origen desde Jerusalén, condición de invitados y desconocimiento del complot. Sin embargo, «con ingenuidad» desplaza לְתֻמָּם hacia una idea de candidez/naiveté que en español puede sonar peyorativa o psicológica, mientras que el contexto y la nota favorecen «inocencia» o una expresión equivalente de falta de sospecha.'
  spanish_quality_summary: El texto es claro y natural, pero «fueron con ingenuidad» suena poco idiomático y menos digno que otras opciones. «Fueron en su inocencia» o «fueron inocentemente» encaja mejor con el registro bíblico y con la explicación contextual. El resto del verso es legible y fiel.
  glossary_alignment: 'No hay términos del glosario teológico principal en disputa. El nombre «Absalón» está bien. La decisión léxica clave es לְתֻמָּם, donde conviene alinearse mejor con la nota ya presente: «en su inocencia» en vez de «con ingenuidad».'
  issues:
  - severity: medium
    issue: «con ingenuidad» para לְתֻמָּם
    rationale: Aunque intenta comunicar falta de sospecha, «ingenuidad» en español suele sugerir simpleza o credulidad y puede introducir un matiz no requerido. El hebreo, apoyado por «no sabían nada», apunta más a inocencia/no sospecha que a tontería o candidez.
  - severity: low
    issue: La nota y el texto principal no están bien alineados
    rationale: La nota ofrece «en su inocencia» como alternativa principal, que de hecho resulta mejor que la redacción actual. Conviene armonizar texto y nota para evitar tensión innecesaria.
