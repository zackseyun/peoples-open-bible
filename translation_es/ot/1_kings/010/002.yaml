translation:
  language: es
  text: Ella vino a Jerusalén con una comitiva[a] muy grande, con camellos que traían especias, muchísimo oro y piedras preciosas. Vino a Salomón y habló con él de todo lo que llevaba en su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «séquito muy grande»; el hebreo חַיִל puede denotar riqueza, fuerza o un acompañamiento numeroso y distinguido.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחַיִל כָּבֵד מְאֹד
  english_pob_choice: with a very great retinue
  chosen_spanish: con una comitiva[a] muy grande
  alternatives_spanish:
  - con un gran séquito
  - con una gran caravana
  - con una gran riqueza
  lexicon: HALOT
  rationale: חַיִל puede referirse a fuerza, riqueza, compañía numerosa o un cuerpo organizado. En este contexto de visita real y diplomática, 'comitiva' comunica un acompañamiento distinguido sin forzar un matiz militar. 'Muy grande' reproduce bien la intensificación de כָּבֵד מְאֹד.
- source_word: גְּמַלִּים נֹשְׂאִים בְּשָׂמִים
  english_pob_choice: camels carrying spices
  chosen_spanish: camellos que traían especias
  alternatives_spanish:
  - camellos que llevaban especias
  - camellos cargados de especias
  - camellos portando especias
  lexicon: HALOT
  rationale: El participio נֹשְׂאִים describe a los camellos como portadores de las especias. 'Traían' suena natural en español narrativo y conserva el movimiento del convoy sin añadir contenido.
- source_word: וְזָהָב רַב מְאֹד
  english_pob_choice: and very much gold
  chosen_spanish: mucho oro
  alternatives_spanish:
  - y mucho oro
  - y gran cantidad de oro
  - y oro en gran abundancia
  lexicon: HALOT
  rationale: El hebreo intensifica cantidad; en español, 'mucho oro' mantiene la idea de abundancia de manera directa y clara. Se omite la repetición enfática de 'muy' para evitar una dureza poco natural, sin perder el sentido.
- source_word: וְאֶבֶן יְקָרָה
  english_pob_choice: and precious stones
  chosen_spanish: y piedras preciosas
  alternatives_spanish:
  - y piedra preciosa
  - y gemas
  - y piedras costosas
  lexicon: HALOT
  rationale: Aunque אֶבֶן está en singular, puede funcionar de modo colectivo. En español, el plural 'piedras preciosas' es el equivalente natural en una lista de bienes valiosos y conserva el sentido colectivo.
- source_word: וַתָּבֹא אֶל שְׁלֹמֹה
  english_pob_choice: She came to Solomon
  chosen_spanish: Vino a Salomón
  alternatives_spanish:
  - Llegó a Salomón
  - Se acercó a Salomón
  - Fue a ver a Salomón
  lexicon: HALOT
  rationale: '''Vino a'' preserva la repetición narrativa del verbo de llegada y mantiene la sencillez del hebreo. ''A Salomón'' refleja el destino personal del movimiento.'
- source_word: וַתְּדַבֵּר אֵלָיו
  english_pob_choice: and spoke with him
  chosen_spanish: y le habló
  alternatives_spanish:
  - y habló con él
  - y conversó con él
  - y le dijo
  lexicon: HALOT
  rationale: אֵלָיו permite 'le habló' o 'habló con él'. 'Le habló' es breve y natural en español, y conserva el acto de dirigirse a Salomón sin exagerar el aspecto recíproco.
- source_word: אֵת כָּל אֲשֶׁר הָיָה עִם לְבָבָהּ
  english_pob_choice: about all that was in her heart
  chosen_spanish: de todo lo que llevaba en su corazón
  alternatives_spanish:
  - de todo lo que tenía en su corazón
  - de todo lo que estaba en su corazón
  - de todo lo que le preocupaba
  lexicon: HALOT
  rationale: El hebreo expresa el contenido interior de su pensamiento o inquietud. 'Llevaba en su corazón' conserva el idioma bíblico en español y evita reducirlo a mera emoción o a una paráfrasis demasiado psicológica.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el patrón del texto inglés auditado. Se conserva la duplicación narrativa de la llegada ('vino... Vino...') y el lenguaje idiomático del corazón, ajustando solo lo necesario para que el español suene natural sin perder la tensión semántica de חַיִל.
  spanish_consistency_notes:
  - Se usa 'Salomón' como nombre propio establecido.
  - Se mantiene 'piedras preciosas' como plural colectivo natural en español.
  - '''De todo lo que llevaba en su corazón'' conserva el registro bíblico sin recurrir a una paráfrasis explicativa más larga.'
