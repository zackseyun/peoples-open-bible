translation:
  language: es
  text: Si alguien es malo consigo mismo, ¿a quién hará bien? No disfrutará de sus propios bienes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit. «no verá su bien»; el hebreo es idiomático. El paralelo griego aclara el sentido: «no se alegrará en sus bienes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַע / ὁ πονηρός
  english_pob_choice: is evil
  chosen_spanish: es malo
  alternatives_spanish:
  - es malvado
  - es perverso
  - es malo para sí mismo
  lexicon: HALOT; LXX πονηρός
  rationale: El hebreo y el griego presentan un predicado moral aplicado al sujeto. En español, «es malo» mantiene la fuerza ética sin sonar tan rígido como una calca. La idea de daño dirigido a sí mismo queda reforzada por la frase siguiente con «para consigo mismo».
- source_word: לְנַפְשׁוֹ / ἑαυτῷ
  english_pob_choice: to himself
  chosen_spanish: para consigo mismo
  alternatives_spanish:
  - a sí mismo
  - para sí
  - a su propia vida
  lexicon: HALOT; LXX reflexivo
  rationale: נפש aquí funciona como el yo/la propia persona más que como un término técnico de «alma». «Para consigo mismo» comunica el sentido idiomático de dañarse o tratarse mal a sí mismo, conservando la referencia reflexiva sin antropologizar de más.
- source_word: לְמִי / τίνι
  english_pob_choice: to whom
  chosen_spanish: ¿para quién?
  alternatives_spanish:
  - ¿a quién?
  - ¿para quién sería bueno?
  lexicon: HALOT; LXX interrogative
  rationale: 'La pregunta busca excluir a cualquier posible beneficiario. En español, «¿para quién?» suena natural y conserva la lógica del paralelismo: si ni siquiera se beneficia a sí mismo, nadie más queda como destinatario del bien.'
- source_word: יֵיטִיב / ἀγαθὸς ἔσται
  english_pob_choice: will he do good
  chosen_spanish: será bueno
  alternatives_spanish:
  - hará bien
  - hará el bien
  - beneficiará
  lexicon: HALOT; LXX ἀγαθός
  rationale: El hebreo puede expresar «hacer bien/beneficiar», pero el giro de la pregunta en español se vuelve más fluido con «será bueno». No se pierde el contraste ético, y la estructura interrogativa retiene el sentido de beneficiar a otro.
- source_word: וְלֹא יִרְאֶה / οὐ μὴ εὐφρανθήσεται
  english_pob_choice: He will not enjoy
  chosen_spanish: No se alegrará
  alternatives_spanish:
  - No disfrutará
  - No verá
  - No gozará
  lexicon: HALOT; LXX εὐφραίνω
  rationale: El hebreo literalmente dice «no verá», y el griego explicita la idea de gozo o disfrute. «No se alegrará» preserva la lectura experiencial sin depender de una calca de «ver», y suena natural en español.
- source_word: בְּטוֹבָתוֹ / ἐν τοῖς χρήμασιν αὐτοῦ
  english_pob_choice: his own good things
  chosen_spanish: en sus bienes
  alternatives_spanish:
  - de sus bienes
  - en su prosperidad
  - en su riqueza
  - en lo bueno que tiene
  lexicon: HALOT; LXX χρήματα
  rationale: 'El hebreo es más amplio («su bien»), mientras que el griego especifica posesiones/recursos. «Sus bienes» funciona como puente entre ambos: abarca posesiones y bienestar material sin reducir el hebreo únicamente a riqueza.'
theological_decisions:
- issue: Relación entre el hebreo «ver su bien» y el griego «regocijarse en sus bienes»
  english_pob_reading: The Hebrew idiom likely means he will not experience or enjoy the good that is his; the Greek parallel makes this sense explicit with 'will not rejoice in his possessions.'
  chosen_spanish_reading: No se alegrará en sus bienes.
  alternative_spanish_readings:
  - No verá su bien.
  - No gozará de su bien.
  - No disfrutará de sus posesiones.
  rationale: La tradición textual presenta una tensión leve entre el hebreo más idiomático y el griego más explícito. La formulación española conserva el sentido de experiencia/beneficio sin decidirse exclusivamente por una sola capa, y permite oír tanto el ‘bien’ del hebreo como los ‘bienes’ del griego.
  doctrine_reference: Crítica textual y traducción basada en paralelos; no implica diferencia doctrinal.
translation_notes:
  revision_awareness: El inglés POB no introdujo cambios recientes en este versículo; el estado auditado indica lectura estable. La versión española sigue esa estabilidad, pero ajusta la expresión para que el paralelismo hebreo-griego quede audible en español.
  spanish_consistency_notes:
  - Se mantuvo un registro digno y moderno, sin calcar «ver» donde el español pide una expresión experiencial.
  - «Bienes» se eligió como término puente entre טובה y χρήματα, preservando la amplitud semántica y la concreción material.
  - Se evitó «alma» para נפש porque el contexto habla del trato de la persona consigo misma, no de una antropología técnica.
