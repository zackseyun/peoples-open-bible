translation:
  language: es
  text: Entonces Dios envió un espíritu malo[a] entre Abimelec y los líderes[b] de Siquem, y los líderes de Siquem actuaron traicioneramente[c] contra Abimelec.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu dañino». El hebreo puede subrayar el mal moral o el efecto perjudicial.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los señores/amos de Siquem»; aquí probablemente se refiere a los principales o dirigentes de la ciudad.'
    reason: lexical_alternative
  - marker: c
    text: O «obraron con traición contra Abimelec» o «lo traicionaron».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - mandó enviar
  lexicon: HALOT
  rationale: El verbo narrativo hebreo expresa acción directa de envío; «envió» es la forma natural y fiel en español, y conserva la agencia divina sin explicaciones añadidas.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios verdadero
  lexicon: HALOT
  rationale: En este contexto narrativo, אֱלֹהִים se refiere al Dios de Israel actuando en juicio. «Dios» es la traducción directa y natural en español.
- source_word: רוּחַ רָעָה
  english_pob_choice: an evil spirit
  chosen_spanish: un espíritu malo
  alternatives_spanish:
  - un espíritu malvado
  - un espíritu dañino
  lexicon: HALOT
  rationale: El hebreo puede llevar tanto la carga moral de «malvado» como el efecto perjudicial de «dañino». Se conserva «malo» porque mantiene la fuerza general sin forzar una interpretación que cierre la tensión semántica.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and
  chosen_spanish: entre ... y
  alternatives_spanish:
  - en medio de ... y
  - entre ... e
  lexicon: HALOT
  rationale: La correlación preposicional marca separación y hostilidad entre dos partes; «entre ... y» reproduce el valor relacional de manera clara en español.
- source_word: בַּעֲלֵי שְׁכֶם
  english_pob_choice: the leaders of Shechem
  chosen_spanish: los líderes de Siquem
  alternatives_spanish:
  - los señores de Siquem
  - los ciudadanos de Siquem
  - los hombres de Siquem
  lexicon: HALOT
  rationale: בַּעֲלֵי alude literalmente a «dueños/señores», pero en este contexto político-cívico se refiere a los que ejercen liderazgo. «Líderes» comunica bien la función sin perder el matiz de poder local.
- source_word: וַיִּבְגְּדוּ
  english_pob_choice: dealt treacherously
  chosen_spanish: obraron con traición
  alternatives_spanish:
  - actuaron traicioneramente
  - traicionaron
  lexicon: HALOT
  rationale: בגד expresa infidelidad/traición. «Obraron con traición» mantiene el matiz de conducta deliberada y evita reducirlo a una simple ruptura emocional.
- source_word: בַּאֲבִימֶלֶךְ
  english_pob_choice: with Abimelech
  chosen_spanish: contra Abimelec
  alternatives_spanish:
  - con Abimelec
  - hacia Abimelec
  lexicon: HALOT
  rationale: Aunque la construcción hebrea puede reflejar la idea de actuar «con» alguien en sentido hostil o de infidelidad, el español normal exige explicitar la dirección de la traición. «Contra Abimelec» hace visible la hostilidad implícita.
theological_decisions:
- issue: Agencia divina al enviar el espíritu
  english_pob_reading: God sent an evil spirit.
  chosen_spanish_reading: Dios envió un espíritu malo.
  alternative_spanish_readings:
  - Dios permitió un espíritu malo.
  - Dios dejó que actuara un espíritu malo.
  rationale: La sintaxis hebrea atribuye el envío directamente a Dios. La traducción conserva esa atribución sin suavizarla a mera permisión, para respetar la tensión teológica del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se identificaron cambios de revisión en el paquete auditado; se conserva la lectura estable de la fuente y del examen en inglés.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en sentido referencial directo al Dios de Israel.
  - Se usa «espíritu» en sentido personal/espiritual, no como viento ni aliento.
  - Se mantiene «traición» para בגד a fin de conservar el matiz de infidelidad deliberada.
  - Se traduce el topónimo como «Siquem», forma castellana estándar.
  - Se evita «SEÑOR» como sustituto de Yahvé porque el texto aquí usa אֱלֹהִים, no el nombre divino.
