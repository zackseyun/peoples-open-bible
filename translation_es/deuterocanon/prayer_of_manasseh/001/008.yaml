translation:
  language: es
  text: Así, pues, Señor, Dios de los justos, no dispusiste arrepentimiento para los justos[a] —para Abraham, Isaac y Jacob, que no pecaron contra ti— sino que dispusiste arrepentimiento para mí, el pecador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no pusiste arrepentimiento para los justos». El verbo griego puede significar «poner», «establecer» o «disponer»; «dispusiste» se eligió por sonar más natural en español con «arrepentimiento» y conservar la idea de una determinación divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ οὖν
  english_pob_choice: So you
  chosen_spanish: Así, pues, tú
  alternatives_spanish:
  - Entonces tú
  - Y así tú
  lexicon: LSJ
  rationale: οὖν expresa una transición inferencial o resumida; «Así, pues» conserva ese enlace en español con un tono natural y solemne. Se omite el pronombre explícito en la forma final por la sintaxis vocativa de la oración en español.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  lexicon: LSJ
  rationale: En una oración dirigida a Dios, «Señor» es la correspondencia natural y reverente de κύριε en español, y mantiene el registro litúrgico sin volverlo arcaico.
- source_word: ὁ θεὸς τῶν δικαίων
  english_pob_choice: God of the righteous
  chosen_spanish: Dios de los justos
  alternatives_spanish:
  - Dios de los rectos
  - Dios de los justificados
  lexicon: LSJ
  rationale: Se conserva el genitivo con una traducción directa y teológicamente sobria. «Justos» mantiene el contraste con «el pecador» y evita sobreinterpretar el término.
- source_word: οὐκ ἔθου
  english_pob_choice: did not appoint
  chosen_spanish: no pusiste
  alternatives_spanish:
  - no estableciste
  - no colocaste
  - no fijaste
  lexicon: LSJ
  rationale: τίθημι puede significar «poner», «establecer» o «designar». En español, «pusiste» permite reproducir la repetición del verbo en ambos miembros de la frase y mantiene la fuerza deliberada de la acción divina sin volverla pesada.
- source_word: μετάνοιαν
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - penitencia
  - cambio de mente
  lexicon: LSJ
  rationale: El sustantivo alude al cambio de mente/voluntad y al arrepentimiento; en español bíblico «arrepentimiento» es el término claro y fiel, sin perder el matiz moral y relacional.
- source_word: δικαίοις
  english_pob_choice: the righteous
  chosen_spanish: para los justos
  alternatives_spanish:
  - a los justos
  - entre los justos
  lexicon: LSJ
  rationale: El dativo se expresa con «para» porque el verbo «poner» exige una relación natural en español. «Los justos» conserva el paralelismo con «Dios de los justos».
- source_word: τῷ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ
  english_pob_choice: for Abraham and Isaac and Jacob
  chosen_spanish: para Abraham, Isaac y Jacob
  alternatives_spanish:
  - a Abraham, Isaac y Jacob
  lexicon: LSJ
  rationale: La lista nominativa identifica a los justos en vista; «para» adapta con naturalidad la construcción verbal en español y mantiene la referencia directa a los patriarcas.
- source_word: τοῖς οὐχ ἡμαρτηκόσιν σοι
  english_pob_choice: who did not sin against you
  chosen_spanish: que no pecaron contra ti
  alternatives_spanish:
  - que no han pecado contra ti
  - que no habían pecado contra ti
  lexicon: LSJ
  rationale: El participio perfecto se vierte con pasado simple para un español más fluido. «Pecaron contra ti» reproduce el valor relacional de σοι como la persona ofendida y conserva la tensión del texto sin suavizarla.
- source_word: ἀλλ' ἔθου μετάνοιαν ἐμοὶ
  english_pob_choice: but you appointed repentance for me
  chosen_spanish: sino que pusiste arrepentimiento para mí
  alternatives_spanish:
  - pero pusiste arrepentimiento para mí
  - sino que estableciste arrepentimiento para mí
  lexicon: LSJ
  rationale: «Sino que» reproduce el contraste excluyente del griego mejor que un simple «pero» en esta estructura negativa. Se repite «pusiste» para preservar el paralelismo verbal y la oposición retórica.
- source_word: τῷ ἁμαρτωλῷ
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - un pecador
  - el hombre pecador
  lexicon: LSJ
  rationale: El artículo y la función en aposición a «mí» dan un valor autoidentificatorio fuerte; «el pecador» conserva el tono de auto-humillación y el contraste con «los justos».
theological_decisions:
- issue: La afirmación de que Abraham, Isaac y Jacob 'no pecaron contra ti' puede chocar con retratos bíblicos más amplios de los patriarcas como personas pecadoras.
  english_pob_reading: 'Retain the text''s direct wording: ''who did not sin against you.'''
  chosen_spanish_reading: 'Conservar la formulación directa: «que no pecaron contra ti».'
  alternative_spanish_readings:
  - que no pecaron gravemente contra ti
  - que no fueron contados como pecadores ante ti
  - que no pecaron en este asunto
  rationale: El griego dice οὐχ ἡμαρτηκόσιν σοι sin atenuantes. La traducción debe preservar la retórica de la oración y no armonizarla con otras tradiciones bíblicas a costa del sentido inmediato.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando toda nota al pie no anclada en el texto. La traducción resultante mantiene el sentido inferencial de οὖν, la repetición de τίθημι y la tensión teológica del contraste entre los justos patriarcas y el hablante pecador.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí el original griego dice κύριε, por lo que corresponde «Señor».
  - Se mantiene «justos»/«pecador» para sostener el contraste léxico δικαίοις / ἁμαρτωλῷ.
  - Se evita «Cristo», «siervo» o fórmulas eclesiásticas ajenas al texto.
  - El uso de «sino que» refuerza la antítesis del griego sin añadir interpretación.
  - No se incluyen notas al pie porque ninguna es necesaria para esta línea y la validación exige que todo marcador aparezca en el texto.
