translation:
  language: es
  text: 'Entonces la asna[a] dijo a Balaam: «¿No soy yo tu asna, en la que has montado toda tu vida hasta hoy? ¿Acaso he tenido por costumbre[b] hacerte así?» Y él dijo: «No».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tu asna» / «la asna»; el sustantivo designa específicamente una hembra del asno.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo intensifica la idea de costumbre o hábito; también puede expresarse: «¿He estado alguna vez acostumbrada a hacerte así?»'
    reason: alternative_reading
lexical_decisions:
- source_word: הָאָתוֹן
  english_pob_choice: the donkey
  chosen_spanish: la asna
  alternatives_spanish:
  - la burra
  - la mula
  lexicon: HALOT
  rationale: אָתוֹן designa específicamente una hembra del asno. En español, «asna» conserva el rasgo de sexo con naturalidad y precisión; «burra» es posible, pero puede sonar más regional o coloquial.
- source_word: הֲלוֹא
  english_pob_choice: Am I not
  chosen_spanish: ¿No soy yo…?
  alternatives_spanish:
  - ¿Acaso no soy yo…?
  - ¿No es cierto que yo…?
  lexicon: HALOT
  rationale: La pregunta retórica espera asentimiento. «¿No soy yo…?» reproduce bien el tono y la fuerza de apelación del hebreo sin recargar el español.
- source_word: אֲתֹנְךָ
  english_pob_choice: your donkey
  chosen_spanish: tu asna
  alternatives_spanish:
  - tu burra
  - tu asna hembra
  lexicon: HALOT
  rationale: Se mantiene la segunda persona posesiva y la referencia concreta al animal hembra. «Tu asna» es más compacto y fiel que neutralizar el sexo del sustantivo.
- source_word: אֲשֶׁר רָכַבְתָּ עָלַי
  english_pob_choice: on which you have ridden
  chosen_spanish: en la que has montado
  alternatives_spanish:
  - sobre la que has cabalgado
  - en la que has ido montado
  lexicon: HALOT
  rationale: El relativo con עַל expresa ir montado sobre el animal. «Has montado» es claro y digno en español; «cabalgado» suena más marcado y menos natural aplicado a un asna.
- source_word: מֵעוֹדְךָ עַד הַיּוֹם הַזֶּה
  english_pob_choice: all your life to this day
  chosen_spanish: desde que eras joven hasta hoy
  alternatives_spanish:
  - desde tu juventud hasta hoy
  - desde que existes hasta hoy
  lexicon: HALOT
  rationale: La expresión idiomática indica un período largo y continuo. Dado que el hebreo literal «desde tu tiempo» es oscuro en español, se opta por una equivalencia natural que conserva la idea temporal de toda la vida hasta hoy.
- source_word: הַהַסְכֵּן הִסְכַּנְתִּי
  english_pob_choice: Have I ever been accustomed
  chosen_spanish: ¿Acaso he solido hacerte así?
  alternatives_spanish:
  - ¿He tenido por costumbre hacerte así?
  - ¿Acaso he acostumbrado hacerte así?
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo refuerza la idea de costumbre o hábito. En español, «he solido» comunica mejor la habitualidad que una traducción demasiado literal; se conserva el matiz retórico con «¿Acaso…?».
- source_word: לַעֲשׂוֹת לְךָ כֹּה
  english_pob_choice: to do thus to you
  chosen_spanish: hacerte así
  alternatives_spanish:
  - actuar así contigo
  - hacerte de este modo
  lexicon: HALOT
  rationale: כֹּה refiere a la conducta inusual y presente de la asna. «Así» refleja el deíctico de manera breve y natural; no se añade contenido más allá de la escena.
- source_word: וַיֹּאמֶר לֹא
  english_pob_choice: And he said, “No.”
  chosen_spanish: 'Y él respondió: «No»'
  alternatives_spanish:
  - 'Y dijo: «No»'
  - 'Y él dijo: «No»'
  lexicon: HALOT
  rationale: Se conserva la secuencia narrativa simple. «Respondió» es una opción estilística natural en español para el diálogo inmediato, sin alterar el sentido del hebreo.
theological_decisions:
- issue: Sexo gramatical y precisión léxica de אָתוֹן
  english_pob_reading: The English audit notes that the noun specifically refers to a female donkey, while the main text uses the more natural 'donkey'.
  chosen_spanish_reading: Se usa «asna» en el texto principal y se explicita en nota que el hebreo se refiere a una hembra.
  alternative_spanish_readings:
  - la burra
  - la burra hembra
  - el asno
  rationale: En español, «asna» permite mantener la precisión de sexo sin perder legibilidad. Evita neutralizar el rasgo lexical documentado por el hebreo.
  doctrine_reference: Precisión léxica del texto fuente; no es una cuestión doctrinal, sino de fidelidad semántica.
- issue: Valor intensivo del infinitivo absoluto הַהַסְכֵּן הִסְכַּנְתִּי
  english_pob_reading: '''Have I ever been accustomed'' captures both the interrogative and habitual sense.'
  chosen_spanish_reading: «¿Acaso he solido hacerte así?» conserva la idea de hábito reiterado y la pregunta retórica.
  alternative_spanish_readings:
  - ¿He tenido por costumbre hacerte así?
  - ¿Acaso he estado acostumbrada a hacerlo?
  rationale: El hebreo no solo pregunta por una acción aislada, sino por una conducta habitual. El español debe reflejar esa tensión entre costumbre y repudio del comportamiento presente.
  doctrine_reference: Semántica verbal del hebreo bíblico; no implica una doctrina específica.
translation_notes:
  revision_awareness: El inglés audit trail pasó por una revisión que reemplazó 'this' por 'thus' para reflejar con más formalidad el hebreo כֹּה ('thus/like this'). La versión española sigue esa decisión con «así», que comunica el deíctico sin perder naturalidad. También se mantuvo el valor retórico de la doble pregunta y la respuesta final breve.
  spanish_consistency_notes:
  - Se conserva el nombre propio «Balaam» como forma estándar española del nombre.
  - Se usa puntuación de diálogo en estilo castellano/latinoamericano con comillas angulares.
  - No se introduce léxico eclesiástico que suavice el tono directo del hebreo.
  - La nota a marca la precisión sexual del sustantivo; la nota b conserva la ambigüedad entre 'costumbre' e intensificación verbal.
