review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del rastro POB en la mayor parte del versículo: imperativo a la ciudad personificada, exposición vergonzosa, Zaanán no sale, y Beth-ezel priva de apoyo. Sin embargo, hay desajustes menores pero reales en el aparato: la nota [b] está anclada en «ha salido» cuando en el inglés POB la alternativa corresponde a עִבְרִי («Pasa» / «Pasa de largo»), no a לֹא יָצְאָה. Además, la nota [c] reduce indebidamente la alternativa inglesa compleja del hemistiquio final a solo «su sostén».'
  spanish_quality_summary: 'El español es claro y legible, con registro digno y natural. Aun así, conviene ajustar dos detalles: 1) reubicar la nota [b] al primer mandato, donde realmente pertenece; 2) mejorar la nota [c] para reflejar la dificultad del final del versículo, no solo un sinónimo aislado. En el texto principal, «quitará de ustedes su apoyo» suena más idiomático y expresa mejor la privación que «tomará de ustedes su apoyo».'
  glossary_alignment: No hay conflictos con la terminología teológica global del proyecto. Los topónimos transliterados son aceptables, aunque con variación ortográfica española. «Sefir», «Zaanán» y «Bet-Ésel» no contradicen el expediente auditado. «Habitante», «desnuda y avergonzada», «no ha salido» y «apoyo» son compatibles con las decisiones léxicas POB.
  issues:
  - severity: high
    issue: La nota [b] está anclada al lugar equivocado.
    rationale: La alternativa «Pass by»/«Pasa de largo» documenta עִבְרִי, no «no ha salido». Debe ir con el primer mandato para preservar fielmente el rastro de auditoría.
  - severity: medium
    issue: La nota [c] no refleja plenamente la alternativa inglesa del hemistiquio final.
    rationale: El inglés POB conserva una alternativa para toda la cláusula difícil («The mourning of Beth-ezel takes away from you its standing place»), mientras que el borrador solo ofrece «su sostén», lo cual es demasiado estrecho.
  - severity: low
    issue: «Tomará de ustedes su apoyo» es menos natural que una formulación con «quitar».
    rationale: Aunque semánticamente defendible, en español bíblico contemporáneo «les quitará su apoyo» o «quitará de ustedes su apoyo» comunica mejor la privación implícita en לקח מן.
  revised_spanish_text: Pasa[a][b], desnuda y avergonzada, habitante de Sefir. La habitante de Zaanán no ha salido. El lamento de Bet-Ésel les quitará su apoyo[c].
