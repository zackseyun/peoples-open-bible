  - marker: a
    text: 'O: «en los poblados de Hebrón». El hebreo puede referirse a los asentamientos pertenecientes al área de Hebrón, más que a un solo centro urbano.'
    reason: lexical_alternative
  revision_rationale: Se corrige «su casa» a «su familia» para reflejar mejor el sentido distributivo y doméstico de אִישׁ וּבֵיתוֹ en español natural, en línea con la decisión auditada «each man with his household». También se repara la nota para que presente una alternativa real y útil en español respecto de עָרֵי חֶבְרוֹן.
