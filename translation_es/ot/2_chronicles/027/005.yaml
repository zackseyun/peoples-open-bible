translation:
  language: es
  text: Y él combatió contra el rey de los amonitas y prevaleció contra ellos, y los amonitas le dieron aquel año cien talentos de plata, diez mil coros de trigo y diez mil de cebada[a]. Esto se lo pagaron los amonitas también en el segundo año y en el tercero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «diez mil coros de trigo, y diez mil de cebada»; se entiende que la medida «coros» también se aplica a «cebada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִלְחַם עִם
  english_pob_choice: fought with
  chosen_spanish: combatió contra
  alternatives_spanish:
  - luchó con
  - peleó contra
  - hizo guerra contra
  lexicon: HALOT
  rationale: El verbo en este contexto militar pide una expresión natural en español que conserve la hostilidad. «Combatió contra» mantiene el sentido de enfrentamiento bélico sin sonar forzado.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  english_pob_choice: the king of the Ammonites
  chosen_spanish: el rey de los amonitas
  alternatives_spanish:
  - el rey de los hijos de Amón
  - el rey del pueblo de Amón
  lexicon: HALOT
  rationale: La etnónimo tradicional «amonitas» es claro y fiel al referente de בני עמון. Evita una calca innecesaria y mantiene la identificación del pueblo.
- source_word: וַיֶּחֱזַק עֲלֵיהֶם
  english_pob_choice: prevailed against them
  chosen_spanish: prevaleció contra ellos
  alternatives_spanish:
  - fue más fuerte que ellos
  - se impuso sobre ellos
  - ganó ventaja sobre ellos
  lexicon: HALOT
  rationale: חזק con עַל en un marco militar expresa dominar o imponerse, no solo fuerza física. «Prevaleció» conserva esa victoria resultante.
- source_word: וַיִּתְּנוּ לוֹ
  english_pob_choice: gave him
  chosen_spanish: le dieron
  alternatives_spanish:
  - le pagaron
  - le rindieron
  - le entregaron
  lexicon: HALOT
  rationale: La forma básica «dar» se conserva en español, y el contexto posterior aclara que se trata de tributo. En la segunda aparición, el sentido económico se explicita con «se lo pagaron».
- source_word: מֵאָה כִּכַּר כֶּסֶף
  english_pob_choice: one hundred talents of silver
  chosen_spanish: cien talentos de plata
  alternatives_spanish:
  - cien talentos de plata
  - cien medidas de plata
  lexicon: HALOT
  rationale: «Talentos» es el equivalente habitual de כִּכַּר en pesos antiguos y mantiene la precisión histórica. «Plata» traduce literalmente כֶּסֶף.
- source_word: כֹּרִים
  english_pob_choice: cors
  chosen_spanish: coros
  alternatives_spanish:
  - cors
  - medidas
  lexicon: HALOT
  rationale: Se translitera el término de medida como «coros» para una lectura española natural y específica. Así se preserva la unidad antigua sin sustituirla por un genérico.
- source_word: חִטִּים
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - trigo
  lexicon: HALOT
  rationale: El sentido léxico es trigo; «trigo» es la traducción directa y estable.
- source_word: וּשְׂעוֹרִים עֲשֶׂרֶת אֲלָפִים
  english_pob_choice: and ten thousand of barley
  chosen_spanish: diez mil de cebada
  alternatives_spanish:
  - diez mil coros de cebada
  - diez mil de cebada
  lexicon: HALOT
  rationale: En hebreo se omite repetir el sustantivo de medida, y el inglés POB deja esa elipsis implícita. En español, «diez mil de cebada» comunica el mismo valor sin sobrecargar la frase.
- source_word: זֹאת הֵשִׁיבוּ לוֹ
  english_pob_choice: This ... paid to him
  chosen_spanish: Esto se lo pagaron
  alternatives_spanish:
  - Esto se lo devolvieron
  - Esto se lo rindieron
  lexicon: HALOT
  rationale: הֵשִׁיבוּ literalmente es «devolvieron/volvieron», pero en contexto de tributo el español exige el valor de pago reiterado. «Esto se lo pagaron» expresa la idea económica sin perder la referencia al monto ya mencionado.
- source_word: וּבַשָּׁנָה הַשֵּׁנִית וְהַשְּׁלִשִׁית
  english_pob_choice: also in the second year and in the third
  chosen_spanish: también en el segundo año y en el tercero
  alternatives_spanish:
  - también en el segundo y en el tercer año
  - asimismo en el segundo año y en el tercero
  lexicon: HALOT
  rationale: «También» refleja la repetición del tributo en años sucesivos. La formulación mantiene el paralelismo temporal del hebreo y del inglés POB.
translation_notes:
  revision_awareness: El texto sigue el pasaje hebreo consonante y coincide en alto grado con la decisión inglesa auditada. Se conserva la elipsis de la unidad de medida en la segunda mercancía, tal como lo hace el inglés POB, y se explicita en la nota.
  spanish_consistency_notes:
  - Se usa «amonitas» de forma uniforme para בְּנֵי עַמּוֹן.
  - «Prevaleció contra ellos» conserva la relación de victoria militar sin introducir una paráfrasis más amplia.
  - La nota [a] se reserva para la elipsis de «coros» en la segunda mercancía, siguiendo el antecedente auditado en inglés.
  - «Esto se lo pagaron» refleja el contexto tributario de הֵשִׁיבוּ sin perder la referencia anafórica a los bienes enumerados.
