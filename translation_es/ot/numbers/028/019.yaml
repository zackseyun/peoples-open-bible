translation:
  language: es
  text: 'Y presentaréis una ofrenda de alimento[a], un holocausto para Yahvé: dos toros, un carnero y siete corderos machos de un año; serán sin defecto para vosotros.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «ofrenda por fuego». El hebreo usa aquí un término técnico sacrificial para una ofrenda consumida por fuego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  english_pob_choice: you shall present
  chosen_spanish: presentaréis
  alternatives_spanish:
  - ofreceréis
  - acercaréis
  lexicon: HALOT
  rationale: En contexto sacrificial, el hifil de קרב significa presentar u ofrecer una ofrenda. «Presentaréis» mantiene el sentido cultual y suena natural en español sin perder la acción ritual.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda por fuego
  - una ofrenda hecha por fuego
  lexicon: HALOT
  rationale: El término es técnico y alude a una ofrenda consumida por fuego. «Ofrenda encendida» conserva la idea de fuego sin el calco pesado «hecha por fuego» y evita el giro interpretativo de «ofrenda de comida».
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - un sacrificio totalmente quemado
  - una ofrenda quemada
  lexicon: HALOT
  rationale: «Holocausto» es el equivalente cultual tradicional en español para עֹלָה, y expresa la ofrenda completamente subida/quemada sobre el altar. Se mantiene el término técnico por fidelidad sacrificial.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el nombre divino. Según la terminología del proyecto, se traduce por «Yahvé» y la preposición ל indica dedicación o destino de la ofrenda, por lo que «para Yahvé» comunica bien la relación sacrificial.
- source_word: פָּרִים בְּנֵי בָקָר
  english_pob_choice: two bulls
  chosen_spanish: dos toros
  alternatives_spanish:
  - dos becerros
  - dos toros jóvenes
  lexicon: HALOT
  rationale: La expresión se refiere a bovinos masculinos para sacrificio; «toros» es claro y digno en español. Se evita añadir «jóvenes» porque el hebreo aquí clasifica la especie/condición sin necesidad de enfatizar edad en la traducción principal.
- source_word: שְׁנַיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - dos
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: וְאַיִל אֶחָד
  english_pob_choice: one ram
  chosen_spanish: un carnero
  alternatives_spanish:
  - un macho oveja
  lexicon: HALOT
  rationale: אַיִל designa el carnero sacrificial estándar. «Un carnero» es el equivalente natural y preciso en español.
- source_word: וְשִׁבְעָה כְבָשִׂים
  english_pob_choice: and seven male lambs
  chosen_spanish: y siete corderos machos
  alternatives_spanish:
  - y siete corderos
  - y siete borregos machos
  lexicon: HALOT
  rationale: כְבָשִׂים son corderos, y el rasgo masculino debe conservarse por precisión sacrificial, siguiendo la decisión inglesa. «Corderos machos» es transparente y no introduce un término más regional como «borregos».
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - yearlings
  lexicon: HALOT
  rationale: La construcción idiomática significa animales de un año. «De un año» es más natural que un calco como «año viejo» y conserva la restricción de edad.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin blemish
  lexicon: HALOT
  rationale: En lenguaje sacrificial, el adjetivo exige animales sin defecto físico. «Sin defecto» es claro, sobrio y fiel al valor cultual de integridad.
- source_word: יִהְי֥וּ לָכֶֽם
  english_pob_choice: they shall be for you
  chosen_spanish: serán para vosotros
  alternatives_spanish:
  - serán para ustedes
  - deberán ser para vosotros
  lexicon: HALOT
  rationale: La frase conserva la nota de obligación/condición respecto de los animales que deben aportarse. Se mantiene «para vosotros» para reflejar el destinatario plural del hebreo, aunque en español eclesial puede leerse con valor inclusivo según contexto.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo contiene el Tetragrámaton de manera explícita. Conforme al criterio del proyecto, se preserva el nombre propio divino en español como «Yahvé» y no se lo sustituye por una forma de ocultamiento como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Valor cultual de la ofrenda consumida por fuego
  english_pob_reading: a food offering / an offering by fire
  chosen_spanish_reading: una ofrenda encendida
  alternative_spanish_readings:
  - una ofrenda por fuego
  - una ofrenda consumida por el fuego
  rationale: La nota inglesa reconoce que אִשֶּׁה es un término técnico sacrificial. En español, «ofrenda encendida» comunica ese carácter ritual sin perder la referencia al fuego ni crear una expresión demasiado explicativa.
  doctrine_reference: Lexical note on sacrificial terminology in HALOT and the English POB audit trail
translation_notes:
  revision_awareness: Se siguió el control de revisión inglés que eliminó «from the herd» por considerarse redundante en inglés, pero en español se optó por «toros» sin añadir un equivalente explicativo como «del ganado», para conservar fluidez y no sobrecargar la lista sacrificial. También se mantuvo la precisión de «male lambs» en español como «corderos machos».
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se preservó el registro sacrificial técnico con «ofrenda encendida», «holocausto» y «sin defecto».
  - «Vosotros» mantiene la segunda persona plural del hebreo; en una edición con voseo o ustedes podría adaptarse según política editorial, pero aquí se conserva la referencia plural directa del texto fuente.
  - No se introdujo «Cristo» ni terminología eclesial ajena al pasaje; se mantuvo el léxico cultual del Pentateuco.
