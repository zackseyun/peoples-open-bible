revisions:
- from: Su aliento[a] se va; vuelve a su tierra; ese mismo día perecen sus planes.
  to: Su aliento[a] sale; él vuelve a su suelo; ese mismo día perecen sus planes.
  rationale: Se ajusta «se va» a «sale» para reflejar con más fidelidad el verbo hebreo ‘sale/va hacia afuera’. Se añade «él» para aclarar el cambio de sujeto, coherente con la decisión del POB en inglés. Se cambia «a su tierra» por «a su suelo» para expresar mejor אַדְמָה como suelo/tierra material en contexto de muerte, evitando una posible lectura de patria o posesión territorial. La nota se mantiene sin cambios porque preserva correctamente la alternativa semántica de רוּחַ.
