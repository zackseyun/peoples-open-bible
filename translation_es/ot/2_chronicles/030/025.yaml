translation:
  language: es
  text: Y se alegraron toda la asamblea de Judá, y los sacerdotes y los levitas, y toda la asamblea que había venido de Israel, y los extranjeros residentes[a] que habían venido de la tierra de Israel, y los que habitaban en Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «residentes extranjeros». El hebreo גֵּרִים se refiere a personas no nativas que vivían entre Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמְחוּ
  english_pob_choice: rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - regocijaron
  - se gozaron
  lexicon: HALOT
  rationale: שׂמח expresa alegría o gozo. En español, «se alegraron» transmite con naturalidad el sentido verbal sin cargarlo de un matiz litúrgico más fuerte que el hebreo.
- source_word: כָּל קְהַל יְהוּדָה
  english_pob_choice: all the assembly of Judah
  chosen_spanish: todo el asamblea de Judá
  alternatives_spanish:
  - toda la asamblea de Judá
  - la totalidad de la asamblea de Judá
  lexicon: HALOT
  rationale: 'קהל designa una comunidad reunida; «asamblea» conserva mejor esa idea que «congregación» en un contexto histórico. Se mantiene la referencia a Judá como sujeto colectivo. Notar que la forma idiomática esperable en español sería «toda la asamblea»; aquí se corrige esa concordancia en la lectura final de estilo: «toda la asamblea de Judá».'
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: כֹּהֲנִים se traduce de manera directa y estable como «sacerdotes»; es el equivalente natural y fiel en español bíblico contemporáneo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levítas
  lexicon: HALOT
  rationale: לְוִיִּם es el grupo levítico. «Levitas» es la forma estándar y clara en español.
- source_word: כָל הַקָּהָל הַבָּאִים מִיִּשְׂרָאֵל
  english_pob_choice: all the assembly who had come from Israel
  chosen_spanish: toda la asamblea que había venido de Israel
  alternatives_spanish:
  - toda la asamblea que venía de Israel
  - todo el pueblo que había venido de Israel
  lexicon: HALOT
  rationale: 'El participio hebreo se rinde con una relativa en pretérito pluscuamperfecto para conservar el valor narrativo de anterioridad: «que había venido». «Asamblea» mantiene el eco del hebreo y del contexto de reunión.'
- source_word: הַגֵּרִים
  english_pob_choice: the sojourners
  chosen_spanish: los extranjeros residentes
  alternatives_spanish:
  - los forasteros residentes
  - los sojourners
  lexicon: HALOT
  rationale: גֵּר indica un residente no nativo integrado en la comunidad. «Extranjeros residentes» explicita la categoría social sin perder el matiz legal del término; en nota se preserva la alternativa «resident foreigners» del audit trail.
- source_word: הַבָּאִים מֵאֶרֶץ יִשְׂרָאֵל
  english_pob_choice: who had come from the land of Israel
  chosen_spanish: que habían venido de la tierra de Israel
  alternatives_spanish:
  - que venían de la tierra de Israel
  - procedentes de la tierra de Israel
  lexicon: HALOT
  rationale: אֶרֶץ יִשְׂרָאֵל se traduce literalmente como «tierra de Israel», y el pluscuamperfecto conserva la secuencia narrativa del texto.
- source_word: הַיּוֹשְׁבִים בִּיהוּדָה
  english_pob_choice: those living in Judah
  chosen_spanish: los que habitaban en Judá
  alternatives_spanish:
  - los que vivían en Judá
  - los habitantes de Judá
  lexicon: HALOT
  rationale: ישׁב como participio denota residir o habitar. «Los que habitaban» conserva la fuerza verbal mejor que una nominalización, y es plenamente natural en español bíblico.
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés, que ya había fijado la distinción entre asamblea, sacerdotes, levitas, sojourners/extranjeros residentes y habitantes de Judá, sin introducir cambios doctrinales ni ampliar el sentido más allá del hebreo. Se ajustó la redacción española para lograr concordancia natural y mantener la anterioridad narrativa del participio con «había venido/venían».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo incluye el nombre divino; este versículo no lo contiene.
  - «Asamblea» se conserva para קהל por coherencia con la decisión inglesa.
  - «Sacerdotes» y «levitas» siguen la terminología bíblica estándar en español.
  - Se prefirió una relativa verbal («que habían venido», «los que habitaban») para reflejar los participios hebreos sin volver la frase demasiado nominal.
