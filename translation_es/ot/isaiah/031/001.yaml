review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura y el sentido general del hebreo: denuncia profética contra quienes bajan a Egipto, dependen de recursos militares y no recurren al Dios de Israel. Sin embargo, hay dos desajustes notables con la evidencia fuente y la pista de auditoría inglesa: (1) el anclaje de la nota [a] está puesto en «ayuda», cuando la alternativa documentada corresponde al verbo «se apoyan/rely» con la imagen de apoyarse; (2) la nota [c] sobre YHWH está formulada de manera incorrecta en español, pues no es «Hebreo “Yahvé” representa…», sino que el hebreo usa el nombre divino YHWH, que aquí se traduce «Yahvé». También conviene mejorar «para ayuda» a «en busca de ayuda» o «para recibir ayuda» por naturalidad española sin perder el propósito de לְעֶזְרָה.'
  spanish_quality_summary: El texto es claro y digno, pero «para ayuda» suena poco idiomático en español general; «en busca de ayuda» es más natural y sigue siendo fiel. El resto del verso fluye bien. «No miran al Santo de Israel» funciona, aunque «no vuelven la mirada al Santo de Israel» sería más expansivo; no es necesario cambiarlo. La puntuación exclamativa es aceptable para הוֹי.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé», קְדוֹשׁ יִשְׂרָאֵל → «el Santo de Israel», y distinción entre שׁען («se apoyan») y בטח («confían»). «Jinetes» para פָּרָשִׁים también concuerda con la decisión auditada. El problema principal no es terminológico sino de colocación y redacción de notas.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «ayuda» en vez de en «se apoyan en caballos».
    rationale: La auditoría inglesa documenta la alternativa para עַל סוּסִים יִשָּׁעֵנוּ ('rely on horses' / 'lean on horses'), no para לְעֶזְרָה ('for help'). Mantener el anclaje actual confunde qué elemento del hebreo está siendo explicado.
  - severity: medium
    issue: 'La nota [c] está redactada incorrectamente: «Hebreo “Yahvé” representa el nombre divino YHWH».'
    rationale: El hebreo no dice «Yahvé» sino el Tetragrámaton יְהוָה/YHWH; la traducción española lo vierte «Yahvé». La nota debe explicarlo con precisión.
  - severity: low
    issue: «para ayuda» es poco natural en español eclesial general.
    rationale: Aunque formalmente cercano al hebreo, suena torpe. «en busca de ayuda» conserva el propósito de לְעֶזְרָה y mejora la legibilidad sin añadir interpretación indebida.
  revised_spanish_text: ¡Ay de los que descienden a Egipto en busca de ayuda, que se apoyan[a] en caballos y confían en carros porque son muchos, y en jinetes porque son muy fuertes[b], pero no miran al Santo de Israel ni buscan a Yahvé[c]!
  revised_footnotes:
