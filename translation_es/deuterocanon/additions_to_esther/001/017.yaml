translation:
  language: es
  text: Y Hamán hijo de Hammedata[a], el Bougeo, era honrado delante del rey, y buscaba hacer daño a Mardoqueo y a su pueblo por causa de los dos eunucos del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Βουγαῖος. La tradición más conocida lo identifica como «agagita», pero este testimonio griego lee esta designación, aquí transliterada como «Bougeo».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἁμὰν Ἁμαδάθου
  english_pob_choice: Haman son of Hammedatha
  chosen_spanish: Haman hijo de Hammedata
  alternatives_spanish:
  - Haman, hijo de Hammedata
  lexicon: LSJ
  rationale: El genitivo griego expresa filiación; en español, «hijo de» comunica con claridad el patronímico sin añadir interpretación.
- source_word: Βουγαῖος
  english_pob_choice: the Bougaean
  chosen_spanish: el bugaeo
  alternatives_spanish:
  - el Bougaeo
  - el bugaio
  lexicon: LSJ
  rationale: Se conserva la designación oscura como transliteración aproximada, sin armonizarla con la tradición hebrea «agagita». Se usa artículo por la lectura del griego y por naturalidad en español.
- source_word: ἔνδοξος
  english_pob_choice: honored
  chosen_spanish: era honrado
  alternatives_spanish:
  - era distinguido
  - gozaba de honra
  lexicon: LSJ
  rationale: El término describe su alta posición ante el rey; «era honrado» mantiene el valor de estatus cortesano sin cargarlo con una gloria intrínseca.
- source_word: ἐνώπιον τοῦ βασιλέως
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  - a la vista del rey
  lexicon: LSJ
  rationale: «Delante del rey» reproduce de manera natural la escena de corte y la relación de favor público.
- source_word: ἐζήτει κακοποιῆσαι
  english_pob_choice: was seeking to harm
  chosen_spanish: buscaba hacer daño
  alternatives_spanish:
  - intentaba hacer mal
  - buscaba perjudicar
  lexicon: LSJ
  rationale: El imperfecto sugiere acción continua; «buscaba» la conserva. «Hacer daño» expresa el alcance general de κακοποιῆσαι sin restringirlo a una sola clase de maltrato.
- source_word: τὸν Μαρδοχαῖον καὶ τὸν λαὸν αὐτοῦ
  english_pob_choice: Mordecai and his people
  chosen_spanish: a Mardoqueo y a su pueblo
  alternatives_spanish:
  - a Mardoqueo y a su nación
  - a Mardoqueo y a su gente
  lexicon: LSJ
  rationale: «Pueblo» es el equivalente más natural de λαός en este contexto y conserva la referencia colectiva al pueblo judío asociado con Mardoqueo.
- source_word: ὑπὲρ τῶν δύο εὐνούχων τοῦ βασιλέως
  english_pob_choice: because of the king’s two eunuchs
  chosen_spanish: por causa de los dos eunucos del rey
  alternatives_spanish:
  - a causa de los dos eunucos del rey
  - por los dos eunucos del rey
  lexicon: LSJ
  rationale: Aquí ὑπέρ es causal; «por causa de» preserva esa relación. «Eunucos» traduce εὐνούχοι con el sentido cortesano normal del término.
theological_decisions:
- issue: Cómo reflejar la designación oscura Βουγαῖος sin imponer la tradición de «Agagita»
  english_pob_reading: The Greek witness reads Bougaean; the English POB preserves it with a footnote against harmonization to the familiar tradition.
  chosen_spanish_reading: el bugaeo[a]
  alternative_spanish_readings:
  - el agagita
  - el bugaio
  rationale: La prioridad del testimonio griego exige no sustituir Βουγαῖος por la identificación hebrea tradicional. Se conserva la forma oscura en español y se remite en nota a la alternativa familiar para el lector.
  doctrine_reference: Primacía del texto fuente sobre la armonización traductora; preservar tensiones documentadas entre testigos.
translation_notes:
  revision_awareness: El inglés auditado fue revisado de «a Bougaean» a «the Bougaean» para reflejar mejor el artículo del griego; en español se siguió esa decisión con «el bugaeo». También se mantuvo la lectura causal de ὑπέρ como «por causa de», siguiendo la auditoría inglesa.
  spanish_consistency_notes:
  - Se usó «Y» inicial, coherente con el tono bíblico español y con la conjunción copulativa del griego.
  - Se mantuvo «Mardoqueo» como forma española usual del nombre propio.
  - No se agregó glosa doctrinal ni identificación histórica no atestiguada por el griego.
  - La nota al pie se ancla en la designación étnica oscura y no en el patronímico.
