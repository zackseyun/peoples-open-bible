base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/014/017.yaml
  text: Then your servant said[a], ‘Please let the word of my lord the king bring rest, for my lord the king is like the angel of God, to hear the good and the evil[b]. And may Yahweh your God be with you.’
  footnotes:
