translation:
  language: es
  text: Clamaron por ayuda, pero no había quien los salvara; clamaron a Yahvé[a], pero él no les respondió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a Yahvé». El texto principal conserva el nombre divino יְהוָה según la práctica del proyecto, en lugar de sustituirlo por «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׁעוּ
  english_pob_choice: They cried for help
  chosen_spanish: Clamaron por ayuda
  alternatives_spanish:
  - Gritaron pidiendo ayuda
  - Clamaron socorro
  lexicon: HALOT
  rationale: El verbo, en este contexto de aflicción y paralelo con «no había quien salvara», expresa una súplica urgente por liberación, no una simple mirada. «Clamaron por ayuda» conserva ese valor sin añadir más de lo que la fuente exige.
- source_word: וְאֵין
  english_pob_choice: but there was no
  chosen_spanish: pero no había
  alternatives_spanish:
  - y no había
  - pero no existía
  lexicon: HALOT
  rationale: Aunque la conjunción básica es «y», el contraste contextual entre el clamor y la ausencia de salvación se expresa mejor en español con «pero».
- source_word: מֹשִׁיעַ
  english_pob_choice: one to save
  chosen_spanish: quien los salvara
  alternatives_spanish:
  - un salvador
  - quien los librara
  lexicon: HALOT
  rationale: El participio expresa a la persona capaz de salvar o librar. «Quien los salvara» mantiene la función relacional y evita introducir un título teológico donde aquí prima la ausencia de ayuda eficaz.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La preposición marca dirección de la súplica. Se mantiene el nombre divino según el estándar del proyecto, sin sustituirlo por una máscara reverencial.
- source_word: וְלֹא עָנָם
  english_pob_choice: but he did not answer them
  chosen_spanish: pero él no les respondió
  alternatives_spanish:
  - y él no les respondió
  - pero no les contestó
  lexicon: HALOT
  rationale: ענה aquí significa responder/contestar. El sujeto implícito se recupera por el contexto inmediato, y «él» deja claro que se refiere a Yahvé.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. En español, el proyecto usa «Yahvé» para conservar el nombre del pacto con claridad y sin enmascararlo bajo un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor aspectual de la ausencia de salvación
  english_pob_reading: one to save
  chosen_spanish_reading: quien los salvara
  alternative_spanish_readings:
  - un salvador
  - quien pudiera salvarlos
  rationale: La frase no introduce necesariamente un oficio permanente; en contexto describe la inexistencia de alguien capaz de efectuar la liberación requerida. «Quien los salvara» conserva esa tensión semántica.
  doctrine_reference: HALOT, participio de ישׁע en contexto de auxilio/deliverance
translation_notes:
  revision_awareness: 'Alineé la cláusula inicial con la revisión inglesa que repone el verbo implícito antes de la preposición correspondiente, conservando el paralelismo: primero el clamor general, luego el clamor dirigido a Yahvé. También respeté la decisión auditada de rendir el nombre divino de forma explícita, no como un título velado.'
  spanish_consistency_notes:
  - Conservo «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Usé «clamaron» para reflejar la urgencia del verbo hebreo en este contexto de súplica.
  - 'Mantuve el paralelismo sintáctico de dos miembros coordinados con contraste: clamor sin respuesta humana y clamor dirigido a Yahvé sin respuesta divina.'
