  text: הַרְעִ֤יפוּ שָׁמַ֨יִם֙ מִ/מַּ֔עַל וּ/שְׁחָקִ֖ים יִזְּלוּ צֶ֑דֶק תִּפְתַּח אֶ֣רֶץ וְ/יִפְרוּ יֶ֗שַׁע וּ/צְדָקָ֤ה תַצְמִ֨יחַ֙ יַ֔חַד אֲנִ֥י יְהוָ֖ה בְּרָאתִֽי/ו־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/045/008.yaml
  text: Drip down from above[a], O heavens, and let the clouds pour down righteousness; let the earth open, that salvation may sprout, and let righteousness spring up together. I, Yahweh, have created it.
  footnotes:
