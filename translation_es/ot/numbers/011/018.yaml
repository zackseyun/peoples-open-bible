review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: mandato a Moisés, llamado a la consagración para el día siguiente, motivo basado en el llanto del pueblo, cita de su queja, y respuesta de Yahvé con repetición enfática de ‘carne’ y ‘comerán’. También mantiene correctamente ‘Yahvé’ para יְהוָה y conserva el matiz de הִתְקַדְּשׁוּ. Sin embargo, ‘en oídos de Yahvé’ es un giro poco natural en español y no preserva tan bien como podría el sentido idiomático de בְּאָזְנֵי יְהוָה; ‘a oídos de Yahvé’ o ‘en presencia de Yahvé’ sería mejor, siendo la primera la más cercana a la imagen auditiva del hebreo.'
  spanish_quality_summary: 'La redacción es en general clara y digna, pero presenta un calco extraño en ‘porque lloraron en oídos de Yahvé’, que suena poco idiomático en español general. El resto del versículo lee con naturalidad aceptable. Conviene también pulir la nota al pie para alinearla mejor con el inglés auditado: el sentido principal es ‘Conságrense’, con ‘Santifíquense’ como alternativa, no a la inversa.'
  glossary_alignment: Hay buena alineación con la terminología del proyecto en ‘Yahvé’, ‘carne’ y el tratamiento de la consagración. No hay conflicto doctrinal mayor. La única desviación notable es estilístico-idiomática en la expresión de בְּאָזְנֵי יְהוָה. Además, dado que el inglés auditado favorece ‘Consecrate yourselves’, en español ‘Conságrense’ encaja mejor como texto principal y ‘Santifíquense’ puede preservarse en nota como alternativa legítima.
  issues:
  - severity: medium
    issue: ‘en oídos de Yahvé’ suena antinatural en español
    rationale: Aunque intenta preservar la imagen hebrea, el giro no es español idiomático y puede distraer o confundir. ‘a oídos de Yahvé’ conserva la imagen auditiva y comunica mejor el sentido de que Yahvé oyó su queja.
  - severity: medium
    issue: La elección principal ‘Santifíquense’ no sigue de cerca la preferencia léxica auditada
    rationale: El English POB eligió ‘Consecrate yourselves’ y dejó ‘Sanctify yourselves’ como alternativa. En español, ‘Conságrense’ representa mejor esa elección principal, mientras ‘Santifíquense’ puede quedar en nota.
  - severity: low
    issue: La nota al pie necesita ajustarse al nuevo término principal
    rationale: Si el texto principal se corrige a ‘Conságrense’, la nota debe ofrecer ‘Santifíquense’ como alternativa y explicar el matiz de apartarse para la acción de Yahvé.
