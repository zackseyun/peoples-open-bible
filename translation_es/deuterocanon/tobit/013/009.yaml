    rationale: La nota dice que se conserva la forma masculina del original, pero el POB auditado decidió una traducción colectiva por el referente, no una reproducción formal masculina.
  - severity: low
    issue: La alternativa 'Santo Uno' en la nota [a] suena poco natural en español.
    rationale: Aunque intenta calcar 'Holy One', en español bíblico y eclesial 'el Santo' es la forma idiomática. La alternativa puede formularse mejor como 'ciudad de un santo' si se quiere preservar la posibilidad más general.
  revised_spanish_text: 'Jerusalén[a], ciudad del Santo: te azotará por las obras de tus hijos e hijas[b], y de nuevo tendrá misericordia de los hijos e hijas[b] de los justos.'
  revised_footnotes:
