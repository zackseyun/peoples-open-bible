translation:
  language: es
  text: Y fuera de la puerta interior había cámaras para los cantores en el atrio interior, que estaban al lado de la puerta del norte[a], con su frente hacia el sur; una estaba al lado de la puerta del oriente[b][c], con su frente hacia el norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «junto al costado de la puerta del norte». El hebreo usa «hombro» de modo metafórico para el costado o flanco de una estructura.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «al lado de la puerta del oriente». El hebreo vuelve a usar «hombro» para el costado de la puerta.'
    reason: lexical_alternative
  - marker: c
    text: El texto hebreo de este versículo es sintácticamente condensado, y algunas traducciones ordenan la descripción espacial de otra manera; el sentido es que había cámaras de cantores en el atrio interior cerca de las puertas del norte y del oriente, con orientaciones opuestas hacia el sur y hacia el norte.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִחוּצָה
  english_pob_choice: And outside
  chosen_spanish: Y fuera de
  alternatives_spanish:
  - Y en el exterior de
  - Y afuera de
  lexicon: HALOT
  rationale: El compuesto indica ubicación externa; «fuera de» es natural en español y conserva la relación espacial y el enlace conjuntivo inicial.
- source_word: לַשַּׁעַר הַפְּנִימִי
  english_pob_choice: the inner gate
  chosen_spanish: la puerta interior
  alternatives_spanish:
  - la puerta interna
  - la puerta del interior
  lexicon: HALOT
  rationale: En el contexto arquitectónico del templo, שַׁעַר se puede expresar con «puerta» en español sin perder precisión, y פְּנִימִי se rinde como «interior» para mantener la relación con el atrio interior.
- source_word: לִשְׁכוֹת
  english_pob_choice: chambers
  chosen_spanish: cámaras
  alternatives_spanish:
  - cuartos
  - estancias
  lexicon: HALOT
  rationale: Para arquitectura sagrada, «cámaras» comunica bien espacios construidos anexos; evita una banalización excesiva de «cuartos».
- source_word: שָׁרִים
  english_pob_choice: singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantantes
  - los que cantan
  lexicon: HALOT
  rationale: En registro bíblico y litúrgico español, «cantores» es el equivalente más idiomático para los que cantan en el servicio del templo.
- source_word: בֶּחָצֵר הַפְּנִימִי
  english_pob_choice: in the inner court
  chosen_spanish: en el atrio interior
  alternatives_spanish:
  - en el patio interior
  - en la corte interior
  lexicon: HALOT
  rationale: «Atrio» es la terminología tradicional y precisa para el recinto del templo; «interior» mantiene la correspondencia con הַפְּנִימִי.
- source_word: אֲשֶׁר אֶל כֶּתֶף שַׁעַר הַצָּפוֹן
  english_pob_choice: which were beside the side of the north gate
  chosen_spanish: que estaban junto al lado de la puerta del norte
  alternatives_spanish:
  - que estaban junto al costado de la puerta del norte
  - que estaban al lado de la puerta del norte
  lexicon: HALOT
  rationale: כֶּתֶף en esta visión es un término espacial arquitectónico; «lado» transmite la idea sin calcar «hombro» en español.
- source_word: וּפְנֵיהֶם דֶּרֶךְ הַדָּרוֹם
  english_pob_choice: with their front toward the south
  chosen_spanish: y su frente daba hacia el sur
  alternatives_spanish:
  - y estaban orientadas hacia el sur
  - y su frente miraba al sur
  lexicon: HALOT
  rationale: פְּנֵיהֶם expresa orientación frontal; «su frente daba hacia el sur» preserva la imaginería espacial y su función descriptiva.
- source_word: אֶחָד
  english_pob_choice: one was
  chosen_spanish: una estaba
  alternatives_spanish:
  - una de ellas estaba
  - una cámara estaba
  lexicon: HALOT
  rationale: El hebreo introduce una unidad singular en paralelo con la anterior; en español, «una estaba» fluye naturalmente y mantiene la referencia implícita a una cámara.
- source_word: אֶל כֶּתֶף שַׁעַר הַקָּדִים
  english_pob_choice: beside the side of the east gate
  chosen_spanish: junto al lado de la puerta del oriente
  alternatives_spanish:
  - junto al costado de la puerta del oriente
  - al lado de la puerta del este
  lexicon: HALOT
  rationale: «Oriente» conserva el registro bíblico habitual para directiones sagradas, y «lado» traduce כֶּתֶף de forma clara y no mecánica.
- source_word: פְּנֵי דֶּרֶךְ הַצָּפוֹן
  english_pob_choice: facing toward the north
  chosen_spanish: con el frente hacia el norte
  alternatives_spanish:
  - mirando hacia el norte
  - orientada hacia el norte
  lexicon: HALOT
  rationale: La repetición de orientación se expresa con «frente» para mantener paralelismo con la primera mitad del versículo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el contexto auditado en inglés, pero evita calcar «shoulder» como «hombro» en español, porque el propio proceso de revisión del POB en inglés lo ajustó a «side» por naturalidad y precisión arquitectónica. Se mantiene la orientación paralela sur/norte y la sintaxis comprimida del hebreo sin forzar una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros registros del proyecto cuando corresponde; este versículo no contiene el tetragrámaton.
  - Se prefirió «atrio» para בֶּחָצֵר en coherencia con el vocabulario del templo.
  - «Oriente» y «norte/sur» mantienen el registro direccional bíblico, con «este» reservado como alternativa menos litúrgica.
  - «Cantores» conserva la función cultual de שָׁרִים sin introducir una lectura moderna de entretenimiento.
