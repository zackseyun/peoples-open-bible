revisions:
- from: Ahora la reina de Saba oyó la fama de Salomón, relacionada con el nombre de Yahvé[a], y vino para probarlo con enigmas[b].
  to: Ahora la reina de Saba oyó la fama de Salomón en relación con el nombre de Yahvé[a], y vino para ponerlo a prueba con enigmas[b].
  rationale: Se ajusta el español para mayor precisión e idiomaticidad («ponerlo a prueba») y se mejora la fluidez de la frase relacional («en relación con»). También se corrige el anclaje funcional de la nota [a] para que corresponda a la unidad semántica relevante.
