  source_alignment_summary: El borrador capta bien el vocativo exclamativo, la singularidad de μόνη γύναι, el valor religioso de εὐσέβεια y la imagen materna de ἀποκυήσασα. Sin embargo, «engendraste» debilita y desplaza la metáfora específica de parto/dar a luz que el griego expresa con ἀποκυήσασα y que el POB inglés decidió conservar explícitamente.
  spanish_quality_summary: El español es claro y digno. «Mujer única» funciona, aunque suena un poco menos natural que «única mujer»; aun así es defendible por el vocativo. La mejora principal es sustituir «engendraste» por una forma que preserve más directamente la imagen de parto. «Diste a luz» suena natural, solemne y fiel.
  glossary_alignment: No hay conflicto con la terminología global del proyecto. «Piedad» es una opción válida para εὐσέβεια, con nota que preserva «devoción». La revisión propuesta mantiene esa decisión y alinea mejor ἀποκυήσασα con la racionalidad léxica y teológica documentada.
  issues:
  - severity: medium
    issue: «engendraste» no refleja con suficiente precisión ἀποκυήσασα
    rationale: El verbo griego significa literalmente dar a luz/traer al nacimiento. «Engendrar» en español suele orientarse más hacia concebir o procrear que hacia el acto materno de parto, y por eso atenúa la metáfora maternal que el POB inglés quiso preservar.
  - severity: low
    issue: La formulación puede sonar más natural con una expresión explícita de parto
    rationale: «Diste a luz» mantiene la elevación del registro y evita una posible ambigüedad semántica de «engendraste».
