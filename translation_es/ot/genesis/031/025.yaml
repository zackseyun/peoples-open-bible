revisions:
- from: Y Laban alcanzó[a] a Jacob. Jacob ya había plantado su tienda[b] en la región montañosa[c], y Laban había plantado la suya con sus parientes en la región montañosa de Galaad.
  to: Y Labán alcanzó[a] a Jacob. Jacob ya había levantado su tienda en la región montañosa[b], y Labán levantó campamento con sus parientes[c] en la región montañosa de Galaad[d].
  rationale: Se reemplazó «plantó su tienda» por «levantó su tienda» y «había plantado la suya» por «levantó campamento» para expresar de forma natural en español el modismo hebreo de acampar. Se corrigió la distribución de notas para que las alternativas topográficas de Galaad queden ancladas en la segunda ubicación, y se añadió una nota para preservar el literal «sus hermanos» detrás de «sus parientes». También se ajustó «Laban» a «Labán» por ortografía española usual.
