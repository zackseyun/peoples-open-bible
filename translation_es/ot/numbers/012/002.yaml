translation:
  language: es
  text: 'Y dijeron[a]: «¿Acaso Yahvé habló solo por medio de Moisés? ¿No habló también por medio de nosotros?» Y Yahvé lo oyó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Acaso Yahvé habló solo a Moisés? ¿No habló también a nosotros?». La preposición hebrea puede entenderse como indicando al receptor o al medio de la palabra divina; el texto principal elige «por medio de» porque el contexto trata de autoridad profética.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Entonces dijeron
  - Y hablaron
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol pide una continuación fluida en español. «Y dijeron» conserva la secuencia sin añadir matiz inexistente en el hebreo.
- source_word: הֲרַק אַךְ
  english_pob_choice: Has ... indeed ... only
  chosen_spanish: ¿Acaso ... solo ...?
  alternatives_spanish:
  - ¿De veras ... solamente ...?
  - ¿Es que ... únicamente ...?
  lexicon: HALOT
  rationale: La combinación interrogativa y restrictiva se expresa de modo natural con «¿Acaso... solo...?»; mantiene el desafío retórico y la exclusividad.
- source_word: בְּמֹשֶׁה
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - a Moisés
  - con Moisés
  lexicon: HALOT
  rationale: En el contexto de דבר en revelación profética, la preposición apunta a mediación instrumental. «Por medio de» comunica bien en español la idea de canal de revelación.
- source_word: דִּבֶּר יְהוָה
  english_pob_choice: the LORD ... spoken
  chosen_spanish: habló Yahvé
  alternatives_spanish:
  - Yahvé habló
  - Yahvé dijo
  lexicon: HALOT
  rationale: El verbo דבר en este marco es discurso revelador. En español, «habló» conserva el perfecto y la fuerza de comunicación divina sin volverlo demasiado literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se vierte como «Yahvé» según el estándar del proyecto, preservando el nombre propio del Tetragrámaton en lugar de sustituirlo por un título.
- source_word: הֲלֹא גַּם בָּנוּ דִבֵּר
  english_pob_choice: Has he not also spoken through us?
  chosen_spanish: ¿No habló también por medio de nosotros?
  alternatives_spanish:
  - ¿No habló también a nosotros?
  - ¿No habló también con nosotros?
  lexicon: HALOT
  rationale: Se mantiene la misma relación semántica que en la primera cláusula para conservar el paralelo y la pretensión de autoridad profética compartida.
- source_word: וַיִּשְׁמַע יְהוָה
  english_pob_choice: And Yahweh heard it
  chosen_spanish: Y Yahvé lo oyó
  alternatives_spanish:
  - Y Yahvé escuchó esto
  - Y Yahvé escuchó
  lexicon: HALOT
  rationale: El objeto está implícito en hebreo; el pronombre «lo» lo expresa en español de forma natural y fiel al sentido.
theological_decisions:
- issue: Cómo renderizar la mediación revelatoria de ב con דבר
  english_pob_reading: through Moses / through us
  chosen_spanish_reading: por medio de Moisés / por medio de nosotros
  alternative_spanish_readings:
  - a Moisés / a nosotros
  - para Moisés / para nosotros
  rationale: El pasaje trata de autoridad profética y mediación de la palabra divina. «Por medio de» preserva mejor la fuerza instrumental que el contexto exige, sin reducirlo a simple destinatario.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino en español según la terminología del proyecto, evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios pendientes y el estado de concordancia es alto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de manera consistente con la terminología del proyecto.
  - Se conserva el paralelo de las dos cláusulas con «por medio de» para reflejar la misma estructura semántica del hebreo.
  - «Lo» en «Yahvé lo oyó» expresa el objeto implícito del hebreo sin añadir contenido interpretativo.
