revisions:
- from: Y si un hombre hiere a su prójimo[a], tal como hizo, así se le hará a él.
  to: Y si un hombre causa una lesión a su semejante[a], tal como hizo, así se le hará a él.[b]
  rationale: Se ajusta יִתֵּן מוּם a «causa una lesión» para reflejar mejor el daño corporal en registro legal, y se añaden notas que preservan tanto la literalidad principal documentada por el POB como la alternativa léxica para עָמִית. «Semejante» mantiene mejor el matiz interpersonal-comunitario sin las connotaciones más cargadas de «prójimo».
