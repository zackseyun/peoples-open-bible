id: TIT.2.10
reference: Titus 2:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μὴ νοσφιζομένους, ἀλλὰ ⸂πᾶσαν πίστιν⸃ ἐνδεικνυμένους ἀγαθήν, ἵνα τὴν διδασκαλίαν ⸀τὴν τοῦ σωτῆρος ἡμῶν θεοῦ κοσμῶσιν ἐν πᾶσιν.
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/010.yaml
  text: not pilfering[a], but showing all good faith, so that in everything they may adorn the teaching of God our Savior.
  footnotes:
  - marker: a
    text: Or 'showing complete faithfulness' or 'demonstrating full trustworthiness.' The Greek uses pistis, often rendered 'faith,' but here it likely carries the ethical sense of fidelity.
    reason: lexical_alternative
translation:
  language: ko
  text: 슬쩍 빼돌리지 않고, 도리어 온전한 신실함[a]을 나타냄으로써, 모든 일에서 우리 구주 하나님의 가르침을 빛나게 하게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「완전한 충실함을 보임」, 「온전한 신뢰성을 드러냄」. 헬라어 πίστις는 흔히 「믿음」으로 옮겨지나, 본문에서는 윤리적 신실함의 어감이 강하다.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ νοσφιζομένους
  english_pob_choice: not pilfering
  chosen_korean: 슬쩍 빼돌리지 않고
  alternatives_korean:
  - 횡령하지 않고
  - 몰래 가로채지 않고
  lexicon: BDAG
  rationale: νοσφίζομαι(중간태)는 「자기 몫으로 따로 떼어 두다·횡령하다」. 노예가 주인의 재물을 몰래 빼돌리는 행위. 「슬쩍 빼돌리다」가 그 은밀함을 살리며 자연스럽다.
- source_word: πᾶσαν πίστιν ... ἀγαθήν
  english_pob_choice: all good faith
  chosen_korean: 온전한 신실함
  alternatives_korean:
  - 모든 선한 신실함
  - 완전한 충실함
  lexicon: BDAG
  rationale: 본문에서 πίστις는 신학적 「믿음」이 아니라 윤리적 「신실함·충실성」. ἀγαθή가 πίστις를 수식하므로 「선한 신실함」이지만 한국어로는 「온전한 신실함」이 자연스럽고 무게가 동등.
- source_word: ἐνδεικνυμένους
  english_pob_choice: showing
  chosen_korean: 나타냄으로써
  alternatives_korean:
  - 보임으로써
  - 드러냄으로써
  lexicon: BDAG
  rationale: ἐνδείκνυμαι(중간태)는 자신에게서 「드러내 보이다」.
- source_word: τὴν διδασκαλίαν τὴν τοῦ σωτῆρος ἡμῶν θεοῦ
  english_pob_choice: the teaching of God our Savior
  chosen_korean: 우리 구주 하나님의 가르침
  alternatives_korean:
  - 우리의 구주이신 하나님의 교훈
  lexicon: BDAG
  rationale: 1:3과 일관된 「우리 구주 하나님」.
- source_word: κοσμῶσιν
  english_pob_choice: adorn
  chosen_korean: 빛나게 하게
  alternatives_korean:
  - 아름답게 하게
  - 장식하게
  lexicon: BDAG
  rationale: κοσμέω는 「꾸미다·빛나게 하다」. 노예의 신실한 삶이 가르침의 영광을 드러낸다는 본문 흐름. 「빛나게 하다」가 그 영광적 어감을 살린다.
