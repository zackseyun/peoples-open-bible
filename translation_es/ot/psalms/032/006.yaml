    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en la inundación de muchas aguas».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la nota [a] para reflejar la alternativa completa documentada en el POB inglés y se suaviza «grandes aguas torrenciales» a «grandes aguas desbordadas» para mejorar la naturalidad del español manteniendo la imagen de שֶׁטֶף מַיִם רַבִּים.
