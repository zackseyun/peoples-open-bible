    text: 'Hebreo: «sus padres»; es decir, sus antepasados.'
    reason: lexical_alternative
  - marker: b
    text: O «más allá del Río», probablemente en referencia al Éufrates.
    reason: cultural_note
  revision_rationale: Se corrigen los anclajes de notas para que correspondan exactamente a las expresiones explicadas en el rastro inglés y en el hebreo. Se ajusta «vuestros» a «sus» para un español más neutral latinoamericano, manteniendo el masculino específico de אֲבוֹתֵיכֶם. Se simplifica el aparato de notas eliminando una nota redundante y se pule la fluidez con «vivían».
