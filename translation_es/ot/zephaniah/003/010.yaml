base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/003/010.yaml
  text: From beyond the rivers of Cush[a], my suppliants, the daughter of my dispersed ones[c][b], will bring my offering.
  footnotes:
  - marker: a
    text: Or 'my suppliants' instead of 'my worshipers.' The Hebrew term likely refers to those who pray or entreat, and by extension those who worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'the daughter of my scattered ones.' The Hebrew expression is compact and may function as a poetic title for a dispersed community.
    reason: alternative_reading
  - marker: c
    text: '''Cush'' refers to the ancient region south of Egypt, not precisely the same as modern Ethiopia.'
    reason: cultural_note
