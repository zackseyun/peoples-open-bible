translation:
  language: es
  text: Un cántico, un salmo de David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el hebreo puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: song
  chosen_spanish: cántico
  alternatives_spanish:
  - canción
  - himno
  lexicon: HALOT
  rationale: En un encabezado poético, «cántico» conserva el valor de pieza cantada y suena natural y dignificado en español bíblico. «Canción» puede sonar demasiado coloquial, y «himno» introduce una connotación litúrgica más específica de la que el hebreo exige.
- source_word: מִזְמ֣וֹר
  english_pob_choice: psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - salmo musical
  - composición lírica
  lexicon: HALOT
  rationale: «Salmo» es el equivalente establecido y fiel para este género de composición en los encabezados de los Salmos. Mantiene el término técnico sin añadir matices que el hebreo no obliga a expresar aquí.
- source_word: לְ/דָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición לְ en este tipo de superscripción puede indicar autoría, dedicación o asociación. «De David» preserva esa ambigüedad en español, como hace el POB en inglés con «of David», sin resolver indebidamente el dato histórico.
theological_decisions:
- issue: Ambigüedad del encabezado davídico
  english_pob_reading: Retain the ambiguous 'of David' rather than specifying authorship or dedication.
  chosen_spanish_reading: Mantener «de David» sin precisar si indica autor, dedicación o asociación.
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El texto hebreo no exige una decisión más estrecha. Conservar la ambigüedad evita sobreinterpretar el encabezado y respeta la tensión documental señalada en el POB en inglés.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que corrigió la ubicación del marcador: la nota debe referirse a «de David», no a «cántico» o a «salmo». Por eso el marcador se coloca al final de la frase, como en el audit trail inglés revisado.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton.
  - Se prefirió «cántico» para שִׁיר y «salmo» para מִזְמֹור, manteniendo la distinción genérica del hebreo.
  - La puntuación reproduce la estructura breve del encabezado poético y mantiene la nota al final del sintagma afectado.
