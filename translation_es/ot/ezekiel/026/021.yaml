review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: juicio transformador («te convertiré en un espanto»), cese de existencia, búsqueda infructuosa y fórmula profética final. Sin embargo, no preserva plenamente la fuente en dos puntos: (1) la nota [a] no corresponde a la alternativa documentada en el expediente inglés, que contrasta una lectura concesiva con una lectura coordinada de las cláusulas futuras; y (2) «declara Yahvé» omite אֲדֹנָי en נְאֻם אֲדֹנָי יְהוִה, cuando el proyecto pide explicar excepciones pero no borrar sin necesidad un título presente en la fuente.'
  spanish_quality_summary: El español es claro, natural y digno. «Te convertiré en un espanto» y «aunque te busquen, no te encontrarán nunca más» suenan bien. No obstante, «dejarás de existir» es algo interpretativo; «ya no existirás» o «ya no serás» suena más ceñido. La fórmula final mejora en fidelidad y legibilidad como «declara el Señor Yahvé».
  glossary_alignment: Buen uso de «Yahvé» para יהוה. No hay conflicto con otros términos glosarios principales. El problema es que la combinación אֲדֹנָי יְהוִה no debe reducirse simplemente a «Yahvé» en el texto principal cuando el hebreo sí contiene ambos elementos; en español «el Señor Yahvé» es inteligible y evita la convención inglesa de enmascarar el nombre divino.
  issues:
  - severity: high
    issue: La traducción final omite אֲדֹנָי en «נְאֻם אֲדֹנָי יְהוִה».
    rationale: El hebreo expresa ambos títulos. El proyecto prefiere «Yahvé» para יהוה, pero eso no autoriza suprimir אֲדֹנָי sin una razón contextual fuerte. «declara el Señor Yahvé» preserva mejor la fuente.
  - severity: medium
    issue: La nota [a] no reproduce la alternativa real del expediente inglés.
    rationale: La nota inglesa explica que la secuencia hebrea puede leerse de manera coordinada («serás buscada, pero no serás hallada...»), no como «cláusula de resultado». La nota española actual desorienta sobre la cuestión sintáctica.
  - severity: low
    issue: «dejarás de existir» es algo más interpretativo que la cláusula hebrea.
    rationale: וְאֵינֵךְ expresa que ya no está/no existe más. «ya no existirás» es más directo y cercano al hebreo, manteniendo buena naturalidad.
  revised_spanish_text: Te convertiré en un espanto[a], y ya no existirás. Aunque te busquen, no te encontrarán nunca más, declara el Señor Yahvé[b].
  revised_footnotes:
