  language: en
  yaml_path: translation/ot/habakkuk/001/006.yaml
  text: For behold[a], I am raising up the Chaldeans, that bitter and hasty nation[b], which marches through the broad places of the earth to seize dwelling places not its own.
  footnotes:
  - marker: a
    text: Or 'the Babylonians.' The Hebrew reads 'the Chaldeans,' the historical people associated with Neo-Babylonian power.
    reason: lexical_alternative
  - marker: b
    text: Or 'stirring up' for 'raising up.' The Hebrew can express causing a power to arise or be roused for action.
    reason: lexical_alternative
