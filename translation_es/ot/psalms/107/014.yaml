translation:
  language: es
  text: Él los sacó de las tinieblas y de la sombra de muerte[a], e hizo pedazos sus ataduras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «profunda oscuridad». El hebreo צַלְמָוֶת puede denotar tanto la sombra de muerte como una oscuridad profunda.
    reason: lexical_alternative
  - marker: b
    text: O «sus cadenas». El hebreo מוֹסְרוֹתֵיהֶם puede referirse a ataduras, vínculos, grilletes o cadenas.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹצִיאֵם
  english_pob_choice: He brought them out
  chosen_spanish: Él los sacó
  alternatives_spanish:
  - Él los llevó fuera
  - Él los hizo salir
  lexicon: HALOT
  rationale: El verbo causativo de יצא pide en español una forma natural de ‘hacer salir’. «Sacó» conserva el movimiento de liberación y funciona bien en el pasado narrativo del salmo.
- source_word: מֵחֹשֶׁךְ
  english_pob_choice: from darkness
  chosen_spanish: de las tinieblas
  alternatives_spanish:
  - de la oscuridad
  - fuera de la oscuridad
  lexicon: HALOT
  rationale: «Tinieblas» mantiene el registro poético y bíblico de חֹשֶׁךְ. En español suena más solemne que «oscuridad» y sigue siendo claro.
- source_word: וְצַלְמָוֶת
  english_pob_choice: the shadow of death
  chosen_spanish: la sombra de muerte
  alternatives_spanish:
  - profunda oscuridad
  - sombra mortal
  lexicon: HALOT
  rationale: Se conserva la expresión tradicional y lexicalmente defendible «sombra de muerte», que mantiene la ambigüedad entre peligro mortal y oscuridad profunda. La alternativa se preserva en nota.
- source_word: וּמוֹסְרוֹתֵיהֶם
  english_pob_choice: their chains
  chosen_spanish: sus cadenas
  alternatives_spanish:
  - sus vínculos
  - sus ataduras
  - sus grillos
  lexicon: HALOT
  rationale: Aunque מוֹסְרוֹת puede abarcar vínculos, grilletes o ataduras, «cadenas» es una equivalencia natural y vívida en español para la imagen de liberación. Se mantiene la concreción del texto sin exagerar.
- source_word: יְנַתֵּק
  english_pob_choice: he tore apart
  chosen_spanish: rompió
  alternatives_spanish:
  - desgarró
  - arrancó
  - quebró
  lexicon: HALOT
  rationale: En español, con «cadenas» el verbo más natural es «rompió». Aunque יְנַתֵּק tiene fuerza de separación violenta, «rompió» comunica la liberación efectiva sin sonar forzado. La nota conserva la alternativa literal de ‘desatar/arrancar’ implícita en el hebreo.
theological_decisions:
- issue: Alcance de צַלְמָוֶת
  english_pob_reading: the shadow of death, with a footnoted alternative 'deep darkness'
  chosen_spanish_reading: la sombra de muerte, con nota alternativa de ‘profunda oscuridad’
  alternative_spanish_readings:
  - profunda oscuridad
  - oscuridad densa
  rationale: No se resuelve la tensión léxica del hebreo. La forma tradicional conserva el eco de peligro mortal, mientras la nota deja abierta la posibilidad de un idiomatismo de oscuridad profunda.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El texto español sigue la última revisión inglesa al mantener una redacción natural y formal para la liberación de los cautivos, pero no copia mecánicamente el inglés. En vez de trasladar literalmente 'tore apart their bonds', se elige 'rompió sus cadenas' como equivalente idiomático español, mientras la nota preserva la amplitud semántica del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene יהוה; este versículo no lo contiene.
  - Se mantiene el registro poético de «tinieblas» y la frase tradicional «sombra de muerte» por fidelidad lexical y resonancia bíblica.
  - «Cadenas» es una concreción estilística compatible con מוֹסְרוֹתֵיהֶם en contexto de liberación de cautivos.
