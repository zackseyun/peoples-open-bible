translation:
  language: es
  text: Por tanto, he aquí, te estoy entregando[a] a los hijos del oriente por posesión, y pondrán sus campamentos en ti y establecerán sus moradas en ti. Comerán tu fruto y beberán tu leche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al pueblo del oriente» o «a los orientales»; el hebreo dice literalmente «hijos del oriente».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula inferencial introduce la sentencia como consecuencia del reproche anterior; «Por tanto» conserva el valor lógico y el tono formal del juicio profético.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - vé
  lexicon: HALOT
  rationale: La fórmula deíctica divina requiere un marcador enfático en español; «he aquí» mantiene el registro solemne y la fuerza anunciativa mejor que una forma demasiado coloquial.
- source_word: נֹתְנָךְ
  english_pob_choice: I am giving you
  chosen_spanish: te doy
  alternatives_spanish:
  - te estoy dando
  - te daré
  lexicon: HALOT
  rationale: El participio con sujeto de primera persona expresa una acción segura e inminente; en español, el presente «te doy» transmite bien la inmediatez profética sin alargar innecesariamente la frase.
- source_word: לִבְנֵי קֶדֶם
  english_pob_choice: to the sons of the east
  chosen_spanish: a los hijos del oriente
  alternatives_spanish:
  - al pueblo del oriente
  - a los orientales
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática literal «hijos del oriente», ya que el inglés POB retuvo «sons of the east» para preservar el color etnogeográfico del hebreo.
- source_word: לְמוֹרָשָׁה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como heredad
  - como herencia
  lexicon: HALOT
  rationale: En este contexto de conquista y despojo, «posesión» comunica mejor el valor de bien tomado y ocupado que «herencia», que podría sugerir sucesión legítima familiar.
- source_word: וְיִשְּׁבוּ טִירוֹתֵיהֶם
  english_pob_choice: they will set their encampments
  chosen_spanish: pondrán sus campamentos
  alternatives_spanish:
  - levantarán sus campamentos
  - asentarán sus campamentos
  lexicon: HALOT
  rationale: El verbo con el objeto «campamentos» indica instalación o colocación; «pondrán» es una solución natural en español y respeta el sentido de establecimiento de asentamientos nómadas.
- source_word: טִירוֹתֵיהֶם
  english_pob_choice: their encampments
  chosen_spanish: sus campamentos
  alternatives_spanish:
  - sus campamentos nómadas
  - sus aldeas
  lexicon: HALOT
  rationale: «Campamentos» conserva el sentido de asentamientos temporales o seminomádicos mejor que términos más fijos como «aldeas».
- source_word: מִשְׁכְּנֵיהֶם
  english_pob_choice: their dwellings
  chosen_spanish: sus moradas
  alternatives_spanish:
  - sus viviendas
  - sus habitaciones
  lexicon: HALOT
  rationale: «Moradas» reproduce el valor general de lugar de residencia y mantiene un tono bíblico sobrio sin forzar la imagen de tiendas si el término es más amplio.
- source_word: פִרְיֵךְ
  english_pob_choice: your fruit
  chosen_spanish: tu fruto
  alternatives_spanish:
  - tu producción
  - tu cosecha
  lexicon: HALOT
  rationale: Se mantiene la metáfora agrícola literal. «Fruto» conserva el paralelismo del texto hebreo y el vínculo con el rendimiento de la tierra.
- source_word: חֲלָבֵךְ
  english_pob_choice: your milk
  chosen_spanish: tu leche
  alternatives_spanish:
  - la leche de tu tierra
  - tu riqueza
  lexicon: HALOT
  rationale: La lectura literal preserva la imagen concreta del hebreo. Aunque puede ser metonímico de fertilidad o abundancia, el texto no exige una expansión interpretativa en la línea principal.
theological_decisions:
- issue: Referente femenino singular de la dirección profética
  english_pob_reading: Addressed to Ammon/Rabbah as a personified land or nation, rendered with 'you' throughout
  chosen_spanish_reading: Dirigido a una entidad personificada en femenino singular, mantenida con «te/ti/tu»
  alternative_spanish_readings:
  - Dirigido solo a la ciudad personificada
  - Dirigido solo al territorio personificado
  rationale: El hebreo usa sufijos femeninos singulares, habituales para ciudades o territorios personificados. En español conviene conservar la segunda persona singular sin estrechar indebidamente el referente.
  doctrine_reference: Ezequiel 25:4; personificación profética de ciudades y naciones
translation_notes:
  revision_awareness: La versión española sigue de cerca la última revisión inglesa, conservando la estructura de anuncio judicial y las imágenes agrícolas y de asentamiento. Se adoptó un registro más natural en español («te doy», «pondrán sus campamentos», «sus moradas») sin perder el paralelismo ni la literalidad básica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preserva la metáfora concreta de «fruto» y «leche» en lugar de interpretaciones como «producción» o «riqueza» en el texto principal.
  - «Hijos del oriente» conserva el idiomatismo hebreo y requiere nota para lectores que prefieran una equivalencia etnogeográfica más explícita.
  - 'El femenino singular se conserva de forma consistente en toda la línea: «te», «ti», «tu».'
