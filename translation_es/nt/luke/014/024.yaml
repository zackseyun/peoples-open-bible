review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: fórmula directa de λέγω γὰρ ὑμῖν, negación enfática con οὐδεὶς, preservación de ἀνδρῶν como masculino específico, participio pasivo de invitación, imagen verbal de γεύσεται y posesivo ''mi''. La única corrección necesaria está en la nota léxica: el texto principal ya usa ''mi cena'', por lo que la alternativa tradicional no puede repetir exactamente la misma forma.'
  spanish_quality_summary: El español es natural, claro y digno. 'Porque les digo' suena bien en contexto; 'ninguno de aquellos hombres que habían sido invitados probará mi cena' es plenamente legible. La redacción no es acartonada y mantiene el tono parabólico. Solo hace falta reparar la nota al pie para evitar redundancia/confusión.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la fidelidad a ἀνήρ como 'hombres', que está bien preservada. La decisión de 'probará' para γεύομαι y 'cena' para δεῖπνον concuerda con la justificación auditada; también se mantiene correctamente el posesivo 'mi'.
  issues:
  - severity: medium
    issue: La nota al pie repite 'mi cena' como si fuera variante tradicional.
    rationale: El inglés distingue 'my dinner' en el texto principal y ofrece como alternativas 'my banquet' y tradicionalmente 'my supper'. En español, si el texto principal ya dice 'mi cena', no puede presentarse 'mi cena' otra vez como alternativa tradicional. Conviene sustituirla por una opción tradicional distinta, como 'mi supper' no es español; la equivalencia tradicional eclesial más cercana y reconocible es 'mi banquete' o 'mi cena principal' no funciona. Lo más limpio es conservar solo 'mi banquete' y 'tradicionalmente, mi comida de la noche' sería forzado. Mejor ajustar el texto principal a 'mi banquete' o, preferiblemente, mantener 'mi cena' y simplificar la nota a una alternativa real.
  revised_spanish_text: Porque les digo que ninguno de aquellos hombres que habían sido invitados probará mi cena[a].
  revised_footnotes:
  - marker: a
    text: O 'mi banquete'.
    reason: lexical_alternative
  revision_rationale: El texto principal está bien y no requiere cambio. Se revisa únicamente la nota al pie para que presente una alternativa léxica real y no repita la misma expresión del texto principal como si fuera variante tradicional.
