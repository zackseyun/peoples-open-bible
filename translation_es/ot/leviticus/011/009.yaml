review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite en general la permisividad dietética y los criterios de identificación del hebreo: comer de entre lo que está en las aguas, específicamente lo que tiene aletas y escamas en mares y corrientes. Sin embargo, hay dos fallas de fidelidad formal/importancia media: (1) ''Estas podrán comer'' es gramaticalmente incorrecto en español sin el pronombre de objeto (''Estas las podrán comer'' o mejor una reestructuración), y además suena poco natural; (2) la nota [a] está anclada a ''aguas'' aunque explica נְחָלִים, por lo que el marcador está en el lugar equivocado. También conviene evitar ''podrán comer'' aquí, porque en instrucción legal española suena futurizante más que permisiva; ''podrán'' no es imposible, pero ''pueden comer'' o ''podrán comer estas'' reestructurado sería más claro.'
  spanish_quality_summary: 'La legibilidad necesita un ajuste pequeño pero necesario. La oración actual contiene una construcción no idiomática (''Estas podrán comer'') repetida al inicio y al final. Un español más natural y fiel sería ''De todo lo que hay en las aguas, esto podrán comer...'' o mejor ''De todo lo que hay en las aguas, podrán comer esto: ... esos podrán comer''. También la nota al pie debe colocarse sobre ''corrientes'' o ''ríos'', no sobre ''aguas''.'
  glossary_alignment: No hay términos teológicos sensibles aquí. 'Aletas' y 'escamas' están bien. 'Aguas' preserva bien el plural hebreo. Para נְחָלִים, el inglés POB eligió 'streams' con nota alternativa 'rivers'; en español conviene reflejar esa decisión principal con 'corrientes' o 'arroyos' y mantener 'ríos' como alternativa en nota. Eso alinea mejor el razonamiento lexical documentado que hacer principal 'ríos'.
  issues:
  - severity: medium
    issue: 'Construcción inicial y final no idiomática: ''Estas podrán comer'''
    rationale: En español, 'estas' funciona como sujeto, no como objeto directo pospuesto de 'comer'. La frase resulta gramaticalmente defectuosa o al menos muy extraña. El hebreo tiene un demostrativo encabezando la norma; en español hay que reestructurarlo para conservar el sentido sin calco defectuoso.
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica נְחָלִים ('streams/rivers/wadis'), pero el marcador está puesto en 'aguas'. Esto desorienta al lector y no cumple la disciplina de anclar la nota en la palabra pertinente.
  - severity: low
    issue: Elección principal 'ríos' para נְחָלִים se aparta del razonamiento auditado
    rationale: No es una traducción falsa, pero la POB inglesa adoptó 'streams' como lectura principal y dejó 'rivers' en nota. En español, 'corrientes' o 'arroyos' preserva mejor ese valor amplio; 'ríos' puede sonar demasiado estrecho como término principal.
  - severity: low
    issue: Uso de 'podrán comer' en vez de un presente permisivo más natural
    rationale: '''Podrán'' puede entenderse como futuro o capacidad. En legislación/instrucción española, ''pueden comer'' suele comunicar mejor permiso actual. No es un error grave, pero mejora la naturalidad y precisión pragmática.'
  revised_spanish_text: 'De todo lo que hay en las aguas, esto podrán comer: todo lo que en las aguas, en los mares y en las corrientes[a], tenga aletas y escamas, eso podrán comer.'
  revised_footnotes:
  - marker: a
    text: O 'ríos' para 'corrientes' (hebreo נְחָלִים), un término que puede referirse a arroyos, cauces de río o wadis según el contexto.
    reason: lexical_alternative
  revision_rationale: Se reestructuró la oración para producir un español gramatical y natural sin perder el demostrativo enfático del hebreo al inicio y al final ('esto... eso'). Se mantuvo el plural 'aguas' y los términos zoológicos 'aletas y escamas'. Se cambió el principal de נְחָלִים a 'corrientes' para reflejar mejor la elección auditada 'streams', dejando 'ríos' como alternativa en nota. El marcador de nota se movió a la palabra pertinente.
