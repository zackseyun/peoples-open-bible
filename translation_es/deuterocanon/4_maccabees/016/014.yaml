review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: vocativo a la madre, imagen marcial, concesión por edad y sexo, victoria sobre el tirano por la καρτερία, y comparación final con un hombre. Sin embargo, «la piedad de Dios» no representa fielmente εὐσέβειαν θεοῦ en español, porque sugiere una cualidad perteneciente a Dios en vez de piedad/devoción dirigida a Dios. El resto de las elecciones principales son sustancialmente fieles.'
  spanish_quality_summary: El texto es mayormente legible y digno, pero requiere una reparación importante de naturalidad y sentido en la primera frase. «Soldado de la piedad de Dios» suena poco idiomático y ambiguo en español eclesial general. También conviene cerrar la exclamación inicial con puntuación española adecuada. Las demás expresiones («aunque anciana y mujer», «por la constancia», «venciste incluso a un tirano», «en obras y palabras», «fuiste hallada más fuerte que un hombre») son aceptables y claras.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. La cuestión principal es lexical: εὐσέβεια + θεοῦ debe expresarse como «piedad hacia Dios» o «devoción a Dios», no «piedad de Dios». «Soldado» para στρατιῶτι y el contraste «mujer» / «hombre» están bien alineados con la justificación auditada.'
  issues:
  - severity: high
    issue: «la piedad de Dios» traduce de forma engañosa εὐσέβειαν θεοῦ
    rationale: En español, la construcción con «de Dios» se entiende naturalmente como genitivo posesivo o atributivo («la piedad que tiene Dios»), no como piedad dirigida a Dios. El expediente inglés y la semántica griega apoyan una formulación orientada hacia Dios.
  - severity: medium
    issue: «soldado de la piedad de Dios» resulta poco natural en español
    rationale: Además del problema semántico del genitivo, la frase completa suena forzada. «Soldado de la devoción a Dios» o «soldado de la piedad hacia Dios» preserva la metáfora marcial y mejora la legibilidad.
  - severity: low
    issue: Falta el signo de cierre de exclamación tras la invocación inicial
    rationale: La puntuación española pide cerrar la exclamación iniciada por «¡Oh...!»; esto mejora la presentación sin afectar el sentido.
  revised_spanish_text: ¡Oh madre[a], soldado de la devoción a Dios! Aunque anciana y mujer, por la constancia venciste incluso a un tirano, y en obras y palabras fuiste hallada más fuerte que un hombre.
  revised_footnotes:
  - marker: a
    text: O «de la piedad hacia Dios». El griego εὐσέβεια puede denotar reverencia, piedad o devoción.
    reason: lexical_alternative
  revision_rationale: Se corrige εὐσέβειαν θεοῦ a una formulación idiomática y fiel en español («devoción a Dios»), evitando la ambigüedad de «piedad de Dios». Se mantiene «soldado» para conservar la imagen marcial, así como el contraste explícito «mujer» / «hombre». También se ajusta la puntuación para una exclamación inicial bien formada en español.
