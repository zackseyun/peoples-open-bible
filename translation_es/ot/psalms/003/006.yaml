translation:
  language: es
  text: Yo me acosté y dormí; desperté[a], porque Yahvé me sostiene[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me desperté». El hebreo significa «despertar» o «despertarse».
    reason: lexical_alternative
  - marker: b
    text: O «me sustenta» o «me sostiene firmemente».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁכַבְתִּי
  english_pob_choice: I lay down
  chosen_spanish: me acosté
  alternatives_spanish:
  - me eché
  - me tendí
  lexicon: HALOT
  rationale: El verbo שׁכב aquí expresa la acción de acostarse para dormir. En español, «me acosté» comunica de forma natural el inicio de esa acción y mantiene el movimiento poético de la línea.
- source_word: וָאִישָׁנָה
  english_pob_choice: and slept
  chosen_spanish: y dormí
  alternatives_spanish:
  - y me dormí
  - y estaba durmiendo
  lexicon: HALOT
  rationale: De ישׁן, «dormir». La forma breve «y dormí» conserva la concisión del hebreo y encaja con el paralelismo del verso sin añadir matices no presentes.
- source_word: הֱקִיצוֹתִי
  english_pob_choice: I awoke
  chosen_spanish: desperté
  alternatives_spanish:
  - me desperté
  - desperté al alba
  lexicon: HALOT
  rationale: El verbo significa «despertar, despertar(se)». «Desperté» es una traducción directa y digna; el contexto muestra que el sujeto se despierta a sí mismo, sin necesidad de explicitar reflexivamente el verbo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de haber despertado en seguridad. «Porque» expresa con claridad la relación causal en español contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio como «Yahvé», conforme al criterio terminológico del proyecto para יהוה, en lugar de sustituirlo por un título.
- source_word: יִסְמְכֵנִי
  english_pob_choice: sustains me
  chosen_spanish: me sostiene
  alternatives_spanish:
  - me apoya
  - me sostiene y me guarda
  lexicon: HALOT
  rationale: De סמך, con el sentido de apoyar, sostener, mantener firme. «Me sostiene» conserva la idea de apoyo continuo y suena natural en español bíblico moderno.
theological_decisions:
- issue: Cómo verter el Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre de pacto יהוה. Siguiendo la pauta del proyecto, se traduce por «Yahvé» para preservar el nombre propio de Dios y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH'
- issue: Valor aspectual de la secuencia verbal
  english_pob_reading: I lay down and slept; I awoke
  chosen_spanish_reading: Yo me acosté y dormí; desperté
  alternative_spanish_readings:
  - Me acosté y dormí; me desperté
  - Me acosté y me dormí; desperté
  rationale: El hebreo presenta una secuencia breve de acciones en primera persona. La versión española conserva esa progresión sin ampliar el texto ni introducir una explicación interpretativa.
  doctrine_reference: Poetic discourse / verbal sequence
- issue: Sentido de יִסְמְכֵנִי
  english_pob_reading: sustains me
  chosen_spanish_reading: me sostiene
  alternative_spanish_readings:
  - me apoya
  - me sustenta
  rationale: El verbo סמך abarca sostener, apoyar y mantener firme. «Me sostiene» reproduce bien el campo semántico sin perder claridad ni sobrecargar el verso.
  doctrine_reference: Lexical semantics of סמך
translation_notes:
  revision_awareness: El audit trail inglés pasó de «I woke up» a «I awoke» para elevar el registro. La presente propuesta conserva ese registro más formal con «desperté», y mantiene el mismo sentido causal de כִּי y el mismo tratamiento del nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» de manera consistente con la política del proyecto.
  - El verso conserva paralelismo breve y poético sin añadir sujetos o complementos innecesarios.
  - Las notas alternativas reflejan la ambigüedad léxica real del hebreo sin diluir la lectura principal.
