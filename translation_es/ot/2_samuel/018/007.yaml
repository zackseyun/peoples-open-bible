    text: Or 'the blow,' 'the defeat,' or 'the plague.' The Hebrew word can denote a plague in other contexts, but here it refers to the deadly striking in battle.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''twenty thousand.'' ''Men'' is supplied in English for clarity in the battle context.'
    reason: lexical_alternative
