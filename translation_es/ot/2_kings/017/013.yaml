  language: en
  yaml_path: translation/ot/2_kings/017/013.yaml
  text: Yet Yahweh warned Israel and Judah by every prophet and every seer[a], saying, “Turn from your evil ways and keep my commandments and my statutes[c][b], according to all the law that I commanded your fathers and that I sent to you by my servants the prophets.”
