    text: 'O: «los condenaba»; el verbo hebreo puede significar declarar culpable, y aquí probablemente alude a una derrota punitiva infligida a sus enemigos.'
    reason: lexical_alternative
  revision_rationale: Se reemplazó 'la realeza' por 'el reinado' para reflejar mejor הַמְּלוּכָה como ejercicio/posesión del gobierno real, no la cualidad abstracta de ser rey. Se cambió 'Dondequiera que se volvía' por 'Adondequiera que se dirigía' para expresar con más naturalidad el sentido distributivo de פנה. También se pulió la nota al pluralizar 'los condenaba' para corresponder al objeto implícito 'sus enemigos'.
