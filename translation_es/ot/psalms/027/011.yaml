translation:
  language: es
  text: Enséñame tu camino, Yahvé, y guíame por una senda llana[a], a causa de mis enemigos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «senda recta». מִישׁוֹר puede denotar lo llano y, por extensión, lo recto o lo justo.
    reason: lexical_alternative
  - marker: b
    text: O «de los que me observan con hostilidad». El término hebreo puede referirse a enemigos, incluidos adversarios que acechan o vigilan buscando una oportunidad contra el salmista.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרֵנִי
  english_pob_choice: Teach me
  chosen_spanish: Enséñame
  alternatives_spanish:
  - Instrúyeme
  - Muéstrame
  lexicon: HALOT
  rationale: El hifil de ירה tiene el sentido de enseñar o instruir. «Enséñame» conserva ese valor pedagógico y suena natural en español de oración, mejor que un simple «muéstrame».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce según el estándar del proyecto como «Yahvé», preservando el nombre personal divino en lugar de sustituirlo por un título.
- source_word: דַּרְכֶּךָ
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu ruta
  lexicon: HALOT
  rationale: דֶּרֶךְ abarca camino, senda o modo de proceder. «Tu camino» es la opción más natural y fiel, manteniendo tanto la imagen literal como la dimensión moral.
- source_word: וּנְחֵנִי
  english_pob_choice: and lead me
  chosen_spanish: y guíame
  alternatives_spanish:
  - y condúceme
  - y dirígeme
  lexicon: HALOT
  rationale: נחה significa guiar o conducir. «Guíame» conserva bien la metáfora del camino y es idiomático en español.
- source_word: בְּאֹרַח
  english_pob_choice: on a ... path
  chosen_spanish: por una senda
  alternatives_spanish:
  - en una senda
  - sobre una senda
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es בְּ, en español el verbo «guiar» se expresa con naturalidad mediante «por una senda». «Senda» mantiene el matiz de camino trazado.
- source_word: מִישׁוֹר
  english_pob_choice: level
  chosen_spanish: llana
  alternatives_spanish:
  - recta
  - suave
  - nivelada
  lexicon: HALOT
  rationale: מִישׁוֹר denota terreno llano o nivelado, y por extensión rectitud. «Llana» conserva la imagen concreta y funciona bien con «senda».
- source_word: לְמַעַן
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por causa de
  - debido a
  lexicon: HALOT
  rationale: En este contexto introduce la razón de la petición. «A causa de» transmite de modo claro y directo la motivación ante la presencia hostil de los adversarios.
- source_word: שׁוֹרְרָי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - los que me hostigan
  - los que me observan con hostilidad
  lexicon: HALOT
  rationale: El término puede referirse a enemigos o a adversarios que acechan/observan hostilmente. «Mis enemigos» es la traducción más clara en el cuerpo del texto, sin perder la posibilidad semántica amplia.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: 'Se mantiene la política del POB: transliterar el nombre divino para no ocultarlo bajo una sustitución titulativa. «Yahvé» es la forma estándar del proyecto en español.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés coincide estrechamente con el hebreo: petición de enseñanza, guía por un camino llano y motivación por adversarios hostiles. No se identificaron revisiones textuales relevantes; se conservó la lectura principal con notas para las alternativas léxicas más importantes.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la convención del proyecto para יְהוָה.
  - «Camino/senda» se usa de manera consistente para דֶּרֶךְ / אֹרַח según el matiz contextual.
  - «Mis enemigos» conserva el sentido principal, mientras la nota recoge la posibilidad de hostigamiento hostil implícita en el término hebreo.
