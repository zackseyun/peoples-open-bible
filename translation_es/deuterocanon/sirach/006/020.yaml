translation:
  language: es
  text: Difícil es para el necio[a], y el que carece de entendimiento[b] no perseverará en ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ruda» o «áspera»; el paralelo griego dice: «cuán muy áspera/difícil es», lo que apoya el sentido de «difícil».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «falto de corazón», un hebraísmo que significa carecer de entendimiento o de juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲקֻבָּה
  english_pob_choice: difficult
  chosen_spanish: Difícil
  alternatives_spanish:
  - ruda
  - áspera
  - torcida
  lexicon: HALOT
  rationale: El hebreo es inusual y puede sugerir algo torcido, duro o difícil de transitar. El paralelo griego ὡς τραχεῖά ἐστιν σφόδρα apoya un sentido de aspereza/dificultad. En español, 'Difícil' comunica bien la idea sin forzar un calco como 'torcida'.
- source_word: לָאֱוִיל
  english_pob_choice: for a fool
  chosen_spanish: para el necio
  alternatives_spanish:
  - para el insensato
  - al necio
  lexicon: HALOT
  rationale: אֱוִיל es el término sapiencial para el necio en sentido moral e intelectual. 'Necio' es natural en español bíblico y conserva el valor sapiencial mejor que un término meramente psicológico.
- source_word: וְלֹא יְכַלְכְּלֶנָּה
  english_pob_choice: will not endure it
  chosen_spanish: no perseverará en ella
  alternatives_spanish:
  - no la soportará
  - no la sostendrá
  - no permanecerá en ella
  lexicon: HALOT
  rationale: El verbo כלכל puede abarcar sostener, contener o soportar. A la luz del paralelo griego οὐκ ἐμμενεῖ ἐν αὐτῇ ('no permanecerá en ella'), el sentido es de no mantenerse con la sabiduría. 'Perseverará en ella' expresa bien esa continuidad fallida en español.
- source_word: חֲסַר לֵב
  english_pob_choice: one lacking sense
  chosen_spanish: el que carece de entendimiento
  alternatives_spanish:
  - el falto de corazón
  - el que no tiene corazón
  - el falto de juicio
  lexicon: HALOT
  rationale: Literalmente 'falto de corazón' es un hebraísmo, pero en español 'corazón' podría sonar afectivo. 'Carece de entendimiento' conserva la fuerza idiomática de falta de discernimiento sin confundir al lector.
- source_word: ἐμμενεῖ ἐν αὐτῇ
  english_pob_choice: will not endure it
  chosen_spanish: no perseverará en ella
  alternatives_spanish:
  - no permanecerá en ella
  - no se mantendrá en ella
  lexicon: BDAG
  rationale: El griego habla de permanecer en algo. La opción española elegida conserva la idea de continuidad o permanencia en la sabiduría, y evita una formulación demasiado física o mecánica.
theological_decisions:
- issue: Referente de 'ella'
  english_pob_reading: The object is referred to with neuter 'it' in English, avoiding over-personification.
  chosen_spanish_reading: Conservar 'ella' para la sabiduría implícita, siguiendo la referencia femenina natural en español.
  alternative_spanish_readings:
  - no perseverará en eso
  - no perseverará en ello
  rationale: Aunque el hebreo y el griego no nombran explícitamente 'sabiduría' en esta cláusula, el contexto sapiencial hace que el referente sea femenino de manera natural en español. 'Ella' mantiene la cohesión discursiva sin añadir contenido ajeno al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Intensificación del adjetivo
  english_pob_reading: The latest English revision removed 'very' because the Hebrew does not explicitly intensify the adjective.
  chosen_spanish_reading: No intensificar más allá de 'Difícil'.
  alternative_spanish_readings:
  - Muy difícil es para el necio
  rationale: El hebreo y la revisión inglesa reciente no justifican una intensificación adicional. Por eso se evita 'muy' y se mantiene una valoración sobria y fiel al fuente.
  doctrine_reference: Revision awareness / source fidelity
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó 'very' por no estar explícito en el hebreo. La versión española mantiene esa sobriedad y evita intensificar el adjetivo. También sigue el paralelo griego al preferir un verbo de permanencia/continuidad ('perseverará') en vez de una imagen demasiado física de 'sostener'.
  spanish_consistency_notes:
  - Se mantuvo 'necio' como término sapiencial estable y publicable.
  - Se evitó 'corazón' en la línea principal para no inducir una lectura afectiva en español.
  - '''Ella'' remite naturalmente a la realidad sapiencial implícita, sin necesidad de marcar el referente con un neutro artificial en español.'
  - La puntuación sigue un orden directo y readable para lectura litúrgica o devocional.
