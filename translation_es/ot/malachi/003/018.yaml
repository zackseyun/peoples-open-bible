translation:
  language: es
  text: Entonces volverán a ver la diferencia[a] entre el justo y el malvado, entre el que sirve a Dios y el que no le sirve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Entonces volverán y verán entre el justo y el malvado». El hebreo probablemente expresa de manera idiomática que volverán a percibir la distinción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבְתֶּם
  english_pob_choice: Then you will again
  chosen_spanish: Entonces volverán a ver
  alternatives_spanish:
  - Y volverán
  - Entonces se volverán
  lexicon: HALOT
  rationale: El hebreo literalmente dice «y volverán», pero en este contexto la idea idiomática es que recuperarán la percepción de la diferencia. En español, «volverán a ver» conserva el matiz de renovación y conecta naturalmente con el verbo siguiente, sin perder el valor de שוב como regreso/retorno.
- source_word: וּרְאִיתֶם
  english_pob_choice: see
  chosen_spanish: ver
  alternatives_spanish:
  - percibir
  - mirar y ver
  lexicon: HALOT
  rationale: ראה significa «ver» de manera directa. Se mantiene el verbo concreto en español para respetar la imagen original, dejando que el contexto exprese la idea de discernimiento.
- source_word: בֵּין ... לְ
  english_pob_choice: the difference between
  chosen_spanish: la diferencia[a] entre
  alternatives_spanish:
  - entre
  - distinguir entre
  lexicon: HALOT
  rationale: La construcción repetida בין marca contraste. En español, «la diferencia entre» expresa con claridad la relación comparativa implícita, como hizo la traducción inglesa, sin añadir interpretación ajena al texto.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el justo, el recto
  lexicon: HALOT
  rationale: צַדִּיק puede ser «justo» o «recto». En español bíblico y moderno, «el justo» es natural y mantiene la categoría moral-teológica principal. Se evita «recto» por sonar menos estable en este contraste.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  lexicon: HALOT
  rationale: רָשָׁע designa al culpable moralmente opuesto al justo. «Malvado» comunica bien el contraste ético en español contemporáneo y conserva el tono fuerte del hebreo. Se evita «impío» por tender a un registro más confesional y menos directo.
- source_word: עֹבֵד אֱלֹהִים
  english_pob_choice: one who serves God
  chosen_spanish: el que sirve a Dios
  alternatives_spanish:
  - el que sirve a Dios con lealtad
  - el adorador de Dios
  lexicon: HALOT
  rationale: עבד con Dios expresa servicio, obediencia y lealtad cultual. «Sirve a Dios» conserva la fuerza verbal y no reduce el sentido a una sola esfera como «adorar».
- source_word: לַאֲשֶׁר לֹא עֲבָדוֹ
  english_pob_choice: one who does not serve him
  chosen_spanish: el que no lo sirve
  alternatives_spanish:
  - el que no ha servido a Dios
  - el que no le sirve
  lexicon: HALOT
  rationale: La forma relativa contrasta directamente con «el que sirve a Dios». «No lo sirve» mantiene la referencia a Dios y preserva el paralelismo con la primera mitad del verso. El presente español expresa bien la clase de persona descrita, como en la tradición inglesa «does not serve him».
theological_decisions:
- issue: Si explicitar o no un marco de juicio final/esatológico
  english_pob_reading: The verse is rendered as renewed recognition of the distinction God makes between the righteous and the wicked, without importing explicit final-judgment language.
  chosen_spanish_reading: Se traduce como una futura recuperación del discernimiento de la diferencia entre justos y malvados, sin añadir lenguaje explícito de juicio final.
  alternative_spanish_readings:
  - Entonces distinguirán en el juicio entre el justo y el malvado
  - Entonces verán claramente quién es justo y quién es malvado al final
  rationale: El hebreo habla de volver a ver la diferencia, no de especificar aquí el momento escatológico. La traducción preserva esa tensión y no resuelve interpretativamente más de lo que el verso dice.
  doctrine_reference: Preservar la tensión teológica sin sobreexplicar.
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado: no se introdujeron cambios doctrinales ni textuales respecto del estado revisado más reciente; se mantuvo la equivalencia óptima con mayor naturalidad española.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exige; aquí no aparece el tetragrámaton.
  - Se conserva el contraste justo/malvado y la fuerza verbal de «servir» para עבד.
  - La nota [a] acompaña la expresión idiomática de בין y שוב, como en el audit trail inglés.
