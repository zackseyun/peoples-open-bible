translation:
  language: es
  text: 'Llegaron a Balaam y le dijeron[a]: «Así dice Balac hijo de Zipor: Por favor, no te niegues a venir a mí.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de ir a mí». El hebreo usa el verbo común de movimiento הלך en el infinitivo; en español, «venir a mí» refleja mejor la perspectiva del hablante, mientras que «ir a mí» conserva más literalmente la dirección verbal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: They came
  chosen_spanish: Ellos fueron
  alternatives_spanish:
  - Ellos vinieron
  - Llegaron
  lexicon: HALOT
  rationale: El verbo בוא aquí describe el desplazamiento de los mensajeros hacia Balaam. En español, 'fueron' mantiene la dirección narrativa sin sonar forzado; 'vinieron' también sería posible, pero puede sonar menos natural si se enfatiza el movimiento desde el punto de vista del narrador.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - ante
  lexicon: HALOT
  rationale: La preposición direccional se expresa naturalmente con 'a' en español cuando se introduce a la persona a quien se llega.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - Balaam
  lexicon: N/A (nombre propio)
  rationale: Se translitera el nombre propio de manera estándar en español bíblico.
- source_word: וַיֹּאמְרוּ לוֹ
  english_pob_choice: and said to him
  chosen_spanish: y le dijeron
  alternatives_spanish:
  - y le dijeron a él
  - y le hablaron
  lexicon: HALOT
  rationale: אמר con pronombre dativo introduce un acto de comunicación directo. 'Le dijeron' es la forma natural en español y conserva la relación de dirección del discurso.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Así dijo
  lexicon: HALOT
  rationale: 'La fórmula mensajera en español bíblico se vierte mejor con presente: ''Así dice''. Mantiene el tono formal y la vigencia retórica del mensaje.'
- source_word: בָּלָק בֶּן צִפּוֹר
  english_pob_choice: Balak son of Zippor
  chosen_spanish: Balac hijo de Zipor
  alternatives_spanish:
  - Balac, hijo de Zipor
  - Balac, el hijo de Zipor
  lexicon: N/A (nombre propio)
  rationale: Se adapta la transliteración a la forma española usual 'Balac' y 'Zipor'. La relación de constructo se expresa con 'hijo de'.
- source_word: אַל נָא
  english_pob_choice: Please do not
  chosen_spanish: Por favor, no
  alternatives_spanish:
  - Te ruego que no
  - No, por favor
  lexicon: HALOT
  rationale: אַל marca prohibición y נָא añade ruego o cortesía. 'Por favor, no' preserva ambas fuerzas de manera natural en español.
- source_word: תִמָּנַע
  english_pob_choice: refrain
  chosen_spanish: te niegues
  alternatives_spanish:
  - te abstengas
  - te reprimas
  - te detengas
  lexicon: HALOT
  rationale: La raíz מנע expresa negarse, rehusar o abstenerse. En este contexto, con el infinitivo de movimiento, 'te niegues' comunica la idea de rehusar la petición sin perder el matiz de resistencia.
- source_word: מֵהֲלֹךְ
  english_pob_choice: from coming
  chosen_spanish: a venir
  alternatives_spanish:
  - de ir
  - de caminar
  lexicon: HALOT
  rationale: El infinitivo הלך puede ser 'ir' o 'venir' según la perspectiva. Como Balac habla de mover a Balaam hacia él, 'venir a mí' refleja la perspectiva del hablante y produce un español fluido.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La forma direccional con sufijo de primera persona se expresa normalmente como 'a mí'.
translation_notes:
  revision_awareness: 'La redacción sigue el consenso alto del audit trail inglés: fórmula mensajera formal (''Así dice''), tratamiento de la petición cortés de אַל נָא, y decisión sobre הלך condicionada por la perspectiva del hablante. Se adopta una equivalencia óptima en español, manteniendo la tensión entre literalidad de movimiento y naturalidad idiomática.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando el texto lo requiera; este verso no contiene el tetragrámaton.
  - Se usa 'Balac' y 'Zipor' como transliteraciones españolas coherentes con el registro bíblico.
  - '''Por favor, no'' conserva tanto la prohibición como la súplica implícita de נָא.'
  - La nota [a] preserva la alternativa de movimiento literal para no borrar la ambigüedad direccional del hebreo.
