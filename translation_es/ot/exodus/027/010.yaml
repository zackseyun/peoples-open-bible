translation:
  language: es
  text: con sus veinte pilares y sus veinte basas de bronce[a], y los ganchos de los pilares y sus bandas[b] serán de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «zócalos» en lugar de «basas» para los soportes de los pilares.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo vertido «bandas» es incierto; versiones tradicionales suelen tener «filetes».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמֻּדָיו
  english_pob_choice: its twenty pillars
  chosen_spanish: sus veinte pilares
  alternatives_spanish:
  - los veinte pilares de él
  - sus veinte columnas
  lexicon: HALOT
  rationale: עַמּוּד designa aquí los soportes verticales de la estructura del atrio; «pilares» conserva el valor arquitectónico sin sonar arcaico. El sufijo 3ms se refleja con «sus», manteniendo la referencia al elemento precedente.
- source_word: אַדְנֵיהֶם
  english_pob_choice: their twenty bronze bases
  chosen_spanish: sus veinte basas de bronce
  alternatives_spanish:
  - sus veinte zócalos de bronce
  - sus veinte sockets de bronce
  lexicon: HALOT
  rationale: אֶדֶן en contexto tabernacular apunta a la pieza de apoyo inferior de los pilares. «Basas» comunica bien la función estructural en español y evita la ambigüedad moderna de «bases»; se conserva «de bronce» como material.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el término suele referir a un metal de uso constructivo que el inglés POB vierte como «bronze». «Bronce» es natural y fiel en español bíblico.
- source_word: וָוֵי
  english_pob_choice: hooks
  chosen_spanish: ganchos
  alternatives_spanish:
  - ganchos/pasadores
  - clavos
  lexicon: HALOT
  rationale: El término alude a piezas de sujeción en la estructura; «ganchos» es el equivalente más claro y directo en español para este uso.
- source_word: חֲשֻׁקֵיהֶם
  english_pob_choice: bands
  chosen_spanish: bandas
  alternatives_spanish:
  - filletes
  - varillas de unión
  - aros
  lexicon: HALOT
  rationale: El hebreo es incierto en su referencia exacta; la POB inglesa opta por «bands» para no precisar en exceso. «Bandas» mantiene esa amplitud y evita imponer una identificación más técnica de la que el texto garantiza.
- source_word: כָּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - de plata
  lexicon: HALOT
  rationale: El material es literal; en español el predicado nominal «serán de plata» fluye con naturalidad y expresa claramente la materia de los ganchos y las bandas.
- source_word: וְ
  english_pob_choice: with / and
  chosen_spanish: con / y
  alternatives_spanish:
  - y
  lexicon: HALOT
  rationale: El primer וְ enlaza con la descripción anterior y puede rendirse naturalmente con «con»; los demás coordinan elementos y se expresan con «y» para mantener la continuidad sintáctica.
translation_notes:
  revision_awareness: La redacción sigue de cerca la estructura hebrea y coincide sustancialmente con la decisión auditada en inglés; se ajustó la sintaxis al español para evitar el calco «serán plata» y se prefirió «basas» sobre «bases» por claridad arquitectónica. No se detectaron revisiones textuales que afecten el contenido de este versículo.
  spanish_consistency_notes:
  - Se mantuvo la referencia anafórica con «sus» para reproducir los sufijos posesivos del hebreo.
  - Se preservó la ambigüedad del segundo sustantivo técnico («bandas») con nota alternativa, como hace la POB inglesa.
  - 'La materia metálica se expresó de forma idiomática: «de bronce» y «de plata».'
