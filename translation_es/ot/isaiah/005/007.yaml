    rationale: El lector necesita la nota donde aparecen «justicia / sangre derramada» y «rectitud / clamor», no al inicio del versículo. La disciplina de notas exige anclarla en el lugar pertinente.
  - severity: medium
    issue: Falta la nota de alternativa para «el hombre de Judá» con sentido colectivo.
    rationale: El audit trail inglés preserva explícitamente esta alternativa; debe mantenerse también en español por fidelidad documental.
  - severity: low
