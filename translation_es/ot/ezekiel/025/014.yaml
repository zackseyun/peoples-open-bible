revisions:
- from: Y pondré mi venganza sobre Edom por mano de mi pueblo Israel[a], y harán con Edom conforme a mi ira y conforme a mi furor; y conocerán mi venganza[b], declara Yahvé, el Señor.
  to: Y pondré mi venganza sobre Edom por mano de mi pueblo Israel[a], y harán con Edom conforme a mi ira y conforme a mi furor; y conocerán mi venganza, declara el Señor Yahvé.
  rationale: Se corrige la fórmula final para reflejar con mayor fidelidad אֲדֹנָי יְהוִה como «el Señor Yahvé» y se elimina una nota innecesaria que no ofrecía alternativa real ni aclaraba una ambigüedad relevante. El resto del texto puede mantenerse como suficientemente fiel y legible.
