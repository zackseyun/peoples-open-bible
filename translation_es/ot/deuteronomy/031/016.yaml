translation:
  language: es
  text: 'Y Yahvé dijo a Moisés[a]: «Mira, estás por reunirte con tus padres. Entonces este pueblo se levantará y se prostituirá tras los dioses extranjeros de la tierra, en cuyo medio van a entrar[b]. Me abandonarán y quebrantarán mi pacto que hice con ellos[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''prostituirse tras los dioses extranjeros''. La expresión usa la infidelidad sexual como metáfora de la infidelidad al pacto por medio de la idolatría.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa formas singulares en 'él va entrando' y 'en medio de él', con un singular colectivo para Israel/este pueblo; el español expresa el sentido con plural para mayor claridad.
    reason: lexical_alternative
  - marker: c
    text: El hebreo tiene singular en 'con él', refiriéndose colectivamente al pueblo; el español traduce 'con ellos' para comunicar claramente el referente.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como nombre propio, no como sustituto titular. 'Yahvé' es la forma establecida en el proyecto para evitar la máscara devocional 'SEÑOR' y mantener la transparencia del texto fuente.
- source_word: הִנְּךָ שֹׁכֵב עִם אֲבֹתֶיךָ
  english_pob_choice: Behold, you are about to lie down with your fathers
  chosen_spanish: Mira, tú vas a acostarte con tus padres
  alternatives_spanish:
  - He aquí, estás por acostarte con tus padres
  - Mira, estás por dormir con tus padres
  lexicon: HALOT
  rationale: '''Mira'' reproduce la fuerza del marcador discursivo sin sonar arcaico; ''vas a acostarte'' conserva la inminencia. Se mantiene el giro idiomático de muerte ''con tus padres'' en vez de explicitar ''morir'', porque el hebreo lo formula así.'
- source_word: וְקָם
  english_pob_choice: Then this people will rise up
  chosen_spanish: Entonces este pueblo se levantará
  alternatives_spanish:
  - Entonces este pueblo se alzará
  - Y este pueblo se levantará
  lexicon: HALOT
  rationale: '''Se levantará'' es el equivalente natural de קום en futuro secuencial. El matiz de levantarse contra Yahvé queda aportado por el contexto inmediato, sin añadir interpretación extra al verbo.'
- source_word: וְזָנָה
  english_pob_choice: prostitute themselves
  chosen_spanish: se prostituirá
  alternatives_spanish:
  - se prostituirán
  - será infiel
  lexicon: HALOT
  rationale: Se conserva la metáfora sexual-covenantal fuerte del hebreo. En español, 'se prostituirá' mantiene el carácter chocante del texto sin suavizarlo a una expresión genérica como 'será infiel'.
- source_word: אַחֲרֵי אֱלֹהֵי נֵכַר
  english_pob_choice: after the foreign gods
  chosen_spanish: tras los dioses ajenos
  alternatives_spanish:
  - tras los dioses extraños
  - tras los dioses extranjeros
  lexicon: HALOT
  rationale: '''Ajenos'' comunica la extranjería/alteridad de נֵכַר en un español bíblico claro y no demasiado rígido. ''Tras'' refleja el movimiento de seguirlos/adherirse a ellos.'
- source_word: הָאָרֶץ
  english_pob_choice: of the land
  chosen_spanish: del país
  alternatives_spanish:
  - de la tierra
  - de la tierra de aquel lugar
  lexicon: HALOT
  rationale: '''País'' comunica bien ''land'' en español moderno cuando se habla del territorio al que entran, sin perder la referencia geográfica/cultural del texto.'
- source_word: אֲשֶׁר הוּא בָא שָׁמָּה בְּקִרְבּוֹ
  english_pob_choice: into whose midst they are entering
  chosen_spanish: al que va entrando[a]
  alternatives_spanish:
  - en cuyo medio va entrando
  - al que entra en medio de él
  lexicon: HALOT
  rationale: Se opta por una solución fluida en español que preserve el sentido de ingreso al territorio. El singular colectivo del hebreo se explica en nota, ya que una traducción literal 'en cuyo medio' suena pesada y opaca para el lector hispano.
- source_word: וַעֲזָבַנִי
  english_pob_choice: They will forsake me
  chosen_spanish: me dejará
  alternatives_spanish:
  - me abandonará
  - me abandonarán
  lexicon: HALOT
  rationale: '''Dejará'' aquí transmite la ruptura relacional con naturalidad en español. Aunque ''abandonará'' o ''me dejarán'' también son posibles, ''me dejará'' se integra mejor con el sujeto colectivo singular del hebreo conservado en la frase anterior.'
- source_word: וְהֵפֵר אֶת בְּרִיתִי
  english_pob_choice: and break my covenant
  chosen_spanish: quebrantará mi pacto
  alternatives_spanish:
  - romperá mi pacto
  - violará mi pacto
  lexicon: HALOT
  rationale: '''Quebrantar'' es una forma sólida y bíblica en español para הפר en contexto de pacto, y evita la banalidad de ''romperá'' sin perder claridad. ''Pacto'' se mantiene como término de relación covenantal.'
- source_word: אֲשֶׁר כָּרַתִּי אִתּוֹ
  english_pob_choice: that I made with them
  chosen_spanish: el cual hice con él[b]
  alternatives_spanish:
  - que hice con ellos
  - que corté con él
  lexicon: HALOT
  rationale: Se conserva el singular colectivo del hebreo ('con él') para no borrar la tensión textual documentada. 'Hice' sigue el idiomatismo castellano normal para כרת ברית, mientras la nota explica la discrepancia de número.
theological_decisions:
- issue: Metáfora sexual para la idolatría
  english_pob_reading: Retain the metaphor strongly with 'prostitute themselves' rather than reducing it to generic unfaithfulness.
  chosen_spanish_reading: Conservar la metáfora fuerte con 'se prostituirá', sin suavizarla a una infidelidad genérica.
  alternative_spanish_readings:
  - será infiel
  - cometerá adulterio espiritual
  rationale: El hebreo usa deliberadamente un lenguaje sexualizado para expresar infidelidad de pacto. En español conviene mantener esa dureza teológica y retórica, porque el texto no solo informa sobre idolatría sino que la denuncia con vergüenza pública.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Singular colectivo en las referencias al pueblo
  english_pob_reading: Render collective singular references with plural English pronouns where needed for clarity.
  chosen_spanish_reading: Conservar el singular colectivo en el cuerpo del texto y aclararlo en nota.
  alternative_spanish_readings:
  - 'pluralizar todo: ''se prostituirán... me dejarán... hicieron con ellos'''
  - normalizar parcialmente a plural
  rationale: El hebreo presenta una oscilación deliberada entre 'este pueblo' y suffixes singulares. En español, mantener esa tensión donde es viable preserva la huella del original; la nota evita confusión al lector sin borrar el dato gramatical.
  doctrine_reference: Translation philosophy §§5, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que añadió 'up' a 'rise up' para reflejar mejor וְקָם. En español se eligió 'se levantará', que comunica el mismo movimiento sin requerir una duplicación equivalente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma consistente del Nombre divino.
  - Se conserva 'pacto' para בְּרִית, en continuidad con el proyecto POB y con el registro bíblico castellano.
  - Se preserva el singular colectivo del hebreo en la medida en que el español lo permite, con notas donde la concordancia puede desorientar al lector.
  - '''Se prostituirá'' se usa con intención semántica fuerte, no como simple metáfora atenuada.'
