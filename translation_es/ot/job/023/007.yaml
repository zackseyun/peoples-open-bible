translation:
  language: es
  text: Allí un hombre íntegro podría razonar con él[a], y yo sería librado para siempre de mi juez[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «podría argumentar con él» o «podría presentar su caso ante él».
    reason: lexical_alternative
  - marker: b
    text: O «y yo escaparía para siempre de mi juez»; el hebreo también puede entenderse como una liberación del «que me juzga».
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Entonces
  - En aquel lugar
  lexicon: HALOT
  rationale: El adverbio es locativo y remite al lugar imaginado del encuentro. «Allí» conserva esa referencia espacial con naturalidad en español.
- source_word: יָשָׁר
  english_pob_choice: upright
  chosen_spanish: hombre íntegro
  alternatives_spanish:
  - hombre recto
  - hombre justo
  - hombre honrado
  lexicon: HALOT
  rationale: «Íntegro» comunica rectitud moral y probidad personal de forma clara en español, manteniendo la idea ética del término sin sonar excesivamente técnica.
- source_word: נוֹכָח
  english_pob_choice: could reason with
  chosen_spanish: podría razonar con
  alternatives_spanish:
  - podría argumentar con
  - podría presentar su caso ante
  - podría disputar con
  lexicon: HALOT
  rationale: El verbo sugiere un intercambio forense y dialogal. «Razonar con» conserva la idea de argumentación formal sin perder fluidez en español. Se mantiene el modal «podría» para reflejar la posibilidad implícita.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - ante él
  lexicon: HALOT
  rationale: La preposición es literalmente «con». En español, «con él» preserva la cercanía del diálogo directo y evita resolver de más el matiz del escenario judicial.
- source_word: וַאֲפַלְּטָה
  english_pob_choice: and I would be delivered
  chosen_spanish: y yo sería librado
  alternatives_spanish:
  - y yo escaparía
  - y yo sería rescatado
  - y yo sería absuelto
  lexicon: HALOT
  rationale: El campo semántico de פלט incluye librar/escapar. «Sería librado» mantiene la fuerza de liberación sin convertirlo en un tecnicismo jurídico más fuerte que el hebreo.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - permanentemente
  lexicon: HALOT
  rationale: «Para siempre» es la equivalencia natural de permanencia duradera y reproduce el efecto de continuidad total.
- source_word: מִשֹּׁפְטִי
  english_pob_choice: from my judge
  chosen_spanish: de mi juez
  alternatives_spanish:
  - del que me juzga
  - de quien me juzga
  - de mi acusador
  lexicon: HALOT
  rationale: Se conserva la ambigüedad judicial del original. «Mi juez» mantiene la imagen forense y no fuerza una identificación interpretativa más específica.
theological_decisions:
- issue: Ambigüedad del referente judicial
  english_pob_reading: Retain 'my judge' without specifying whether this is God as adjudicator or an adversarial judge from whom Job seeks release.
  chosen_spanish_reading: Mantener «mi juez» sin precisar si se trata de Dios como juez o de la instancia judicial de la que Job pide ser librado.
  alternative_spanish_readings:
  - mi acusador
  - el que me juzga
  rationale: El hebreo permite una lectura judicial amplia, y la tradición de POB conserva esa tensión. En español, «mi juez» mantiene la ambigüedad y el tono forense del pasaje.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La versión sigue el estado más reciente del archivo de referencia, que indica alta concordancia y sin revisiones pendientes; se conservó la ambigüedad jurídica documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando corresponde al Tetragrámaton; aquí no aparece.
  - «Hombre íntegro» y «mi juez» conservan el tono forense y ético del verso.
  - Las notas al pie reproducen las alternativas documentadas en el POB inglés y añaden una aclaración de ambigüedad pertinente al español.
