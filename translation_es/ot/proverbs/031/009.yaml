translation:
  language: es
  text: Abre tu boca[a], juzga con justicia y aboga por la causa del pobre y del necesitado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Habla, juzga justamente y aboga por la causa del pobre y del necesitado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּתַח פִּיךָ
  english_pob_choice: Open your mouth
  chosen_spanish: Abre tu boca
  alternatives_spanish:
  - Habla
  - Levanta tu voz
  lexicon: HALOT
  rationale: Conserva la imagen hebrea de 'abrir la boca' y, al mismo tiempo, funciona naturalmente en español como llamado a hablar en favor de otros. 'Habla' sería más interpretativo; 'Abre tu boca' mantiene mejor la fuerza imagética y la urgencia del mandato.
- source_word: שְׁפָט צֶדֶק
  english_pob_choice: judge righteously
  chosen_spanish: juzga con justicia
  alternatives_spanish:
  - juzga rectamente
  - emite juicio con justicia
  lexicon: HALOT
  rationale: '''Con justicia'' transmite el valor adverbial de צֶדֶק y conserva el marco judicial. ''Rectamente'' es posible, pero en español puede sonar menos jurídico; ''juzga con justicia'' es claro y fiel.'
- source_word: וְדִין
  english_pob_choice: plead the cause of
  chosen_spanish: defiende la causa de
  alternatives_spanish:
  - pleitea por
  - aboga por
  - plead la causa de
  lexicon: HALOT
  rationale: Aunque דין puede incluir la idea de pleito o litigio, en este contexto sapiencial-jurídico la función es de abogar en favor de los vulnerables. 'Defiende la causa de' comunica bien esa mediación legal en español natural; 'plead la cause' sería un calco no idiomático.
- source_word: עָנִי
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el afligido
  - el necesitado
  lexicon: HALOT
  rationale: En contextos legales y sapienciales, עָנִי suele referirse al pobre, especialmente al vulnerable socialmente. Mantener 'el pobre' preserva el término básico y su peso social.
- source_word: אֶבְיוֹן
  english_pob_choice: needy
  chosen_spanish: el necesitado
  alternatives_spanish:
  - el indigente
  - el menesteroso
  - el pobre
  lexicon: HALOT
  rationale: אֶבְיוֹן añade la idea de carencia o necesidad. 'El necesitado' expresa esa segunda matización sin repetir simplemente 'pobre', y mantiene el paralelismo del hebreo.
theological_decisions:
- issue: Mandato de justicia a favor de los vulnerables en un marco jurídico
  english_pob_reading: Open your mouth, judge righteously, and plead the cause of the poor and needy.
  chosen_spanish_reading: Abre tu boca, juzga con justicia, y defiende la causa del pobre y del necesitado.
  alternative_spanish_readings:
  - Abre tu boca, juzga justamente, y pleitea por el pobre y el necesitado.
  - Habla, juzga con justicia, y aboga por el pobre y el necesitado.
  rationale: El hebreo presenta una exhortación concreta a la acción verbal y judicial en favor de quienes carecen de protección. La versión escogida conserva la obligación de intervenir con imparcialidad y a favor de los vulnerables, sin diluir el matiz forense del verbo דין.
  doctrine_reference: Justicia bíblica y defensa del vulnerable en la sabiduría de Proverbios.
translation_notes:
  revision_awareness: 'La lectura inglesa auditada pasó de ''defend the cause'' a ''plead the cause'' para reflejar mejor דין. En español se optó por una solución que conserva esa idea forense sin depender de un calco: ''defiende la causa de'', con ''Abre tu boca'' manteniendo la imagen inicial del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo 'boca' para conservar la imagen hebrea explícita y no reemplazarla por un equivalente más abstracto.
  - '''Con justicia'' refleja el valor adverbial de צֶדֶק sin convertirlo en un sustantivo adicional.'
  - Se diferenciaron 'pobre' y 'necesitado' para respetar el paralelismo de עָנִי y אֶבְיוֹן.
  - No se usó 'SEÑOR' ni terminología eclesiástica no presente en el versículo.
