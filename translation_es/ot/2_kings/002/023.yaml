  yaml_path: translation/ot/2_kings/002/023.yaml
  text: Then he went up from there to Bethel[a]. And as he was going up on the way, small boys came out from the city and mocked him, and said to him, “Go up, baldhead! Go up[b], baldhead!”
  footnotes:
