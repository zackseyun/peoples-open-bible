    text: 'O: «que yo estoy dando». El hebreo usa un participio que literalmente significa «dando»; se conserva ese valor con «doy».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por generaciones eternas» o «a través de todas las generaciones».'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [b] para que comente la frase de duración generacional correspondiente al hebreo לְדֹרֹת עוֹלָם. También se mejora la terminología con «alianza» para βְּרִית y se ajusta «toda criatura viviente» por mayor naturalidad contextual en español, manteniendo fidelidad al sentido amplio de כָּל נֶפֶשׁ חַיָּה.
