translation:
  language: es
  text: 'Y presentarán un holocausto, una ofrenda hecha por fuego, de aroma agradable[a] a Yahvé: un toro, un carnero y siete corderos de un año, sin defecto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «un aroma apacible». La expresión hebrea es una fórmula sacrificial fija para una ofrenda aceptable a Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  english_pob_choice: you shall present
  chosen_spanish: presentarán
  alternatives_spanish:
  - ofrecerán
  - traerán
  lexicon: HALOT
  rationale: En contexto sacrificial, el hifil de קרב expresa llevar/presentar una ofrenda ante Dios. 'Presentarán' conserva el valor ritual y la dirección cultual sin caer en un calco pesado.
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - una ofrenda quemada
  - un sacrificio totalmente quemado
  lexicon: HALOT
  rationale: '''Holocausto'' es el equivalente español tradicional y preciso para la ofrenda totalmente consumida por el fuego. Se mantiene además la equivalencia cultual de la POB inglesa.'
- source_word: אִשֵּׁה
  english_pob_choice: an offering by fire
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda por fuego
  - una ofrenda hecha por fuego
  lexicon: HALOT
  rationale: La expresión describe una ofrenda realizada por fuego. 'Ofrenda encendida' conserva la imagen y fluye bien en español; se añade junto a 'holocausto' para reflejar la doble designación del texto.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: de aroma agradable
  alternatives_spanish:
  - de aroma placentero
  - de aroma soothing
  lexicon: HALOT
  rationale: La fórmula fija indica aceptación y agrado ante Dios. 'De aroma agradable' comunica el sentido idiomático sin perder la referencia sacrificial establecida por la tradición textual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de rendir יהוה como 'Yahvé' en el texto principal. La preposición ל se expresa naturalmente con 'a' en español en este giro de dirección/ofrecimiento.
- source_word: פַּר אֶחָד
  english_pob_choice: one bull
  chosen_spanish: un becerro
  alternatives_spanish:
  - un toro
  - un novillo
  lexicon: HALOT
  rationale: פַּר denota un animal bovino del rebaño apto para sacrificio; en español bíblico, 'becerro' comunica bien la edad/tamaño sacrificial sin introducir precisión no indicada por el hebreo.
- source_word: אַיִל אֶחָד
  english_pob_choice: one ram
  chosen_spanish: un carnero
  alternatives_spanish:
  - un macho carnero
  - un ram
  lexicon: HALOT
  rationale: אַיִל corresponde al carnero sacrificial. 'Carnero' es natural, claro y plenamente fiel al término zoológico del original.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה שִׁבְעָה
  english_pob_choice: seven one-year-old lambs
  chosen_spanish: siete corderos de un año
  alternatives_spanish:
  - siete corderos de un año de edad
  - siete corderos añales
  lexicon: HALOT
  rationale: La construcción hebrea literalmente significa 'corderos hijos de un año'. 'De un año' preserva la restricción etaria de manera idiomática y precisa en español.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin mancha ni defecto
  lexicon: HALOT
  rationale: En el contexto sacrificial, el término exige animales sin defecto físico. 'Sin defecto' es claro, sobrio y plenamente acorde con el valor cultual del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Siguiendo la política del proyecto y la lectura auditada de la POB inglesa, se conserva el nombre divino en forma directa en vez de ocultarlo con una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'Doble expresión sacrificial: עֹלָה + אִשֵּׁה'
  english_pob_reading: a burnt offering, an offering by fire
  chosen_spanish_reading: un holocausto, una ofrenda encendida
  alternative_spanish_readings:
  - un holocausto, una ofrenda por fuego
  - una ofrenda quemada
  rationale: El hebreo usa dos expresiones relacionadas, una para el tipo de sacrificio y otra para su modo de consumación por fuego. Mantener ambas en español evita aplanar la formulación y preserva la riqueza cultual del versículo.
  doctrine_reference: Sacrificial terminology in Torah/Numbers
translation_notes:
  revision_awareness: La versión inglesa auditada está estable y sin cambios recientes; el puntaje de concordancia externa es alto y no se registran revisiones pendientes. La presente redacción española sigue de cerca las decisiones léxicas auditadas y conserva las tensiones terminológicas del texto hebreo sin neutralizarlas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se conserva la distinción entre 'holocausto' y 'ofrenda encendida' para reflejar עֹלָה y אִשֵּׁה.
  - '''Sin defecto'' se usa con valor cultual, no moral.'
  - La puntuación introduce dos puntos antes de la enumeración para reproducir con naturalidad la estructura del hebreo y del texto auditado inglés.
