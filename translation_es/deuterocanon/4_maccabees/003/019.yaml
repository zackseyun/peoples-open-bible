lexical_decisions:
- source_word: Ἤδη
  english_pob_choice: now
  chosen_spanish: y ahora
  alternatives_spanish:
  - ya
  - ahora
  lexicon: LSJ
  rationale: Ἤδη puede significar ‘ya’ o ‘ahora’. En este giro de transición discursiva, ‘y ahora’ expresa con naturalidad el paso a la siguiente sección, manteniendo el matiz temporal y el enlace retórico del griego.
- source_word: καιρός
  english_pob_choice: time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - la ocasión
  - el momento oportuno
  - la sazón
  lexicon: LSJ
  rationale: καιρός designa aquí el momento apto o señalado para el argumento. ‘El tiempo’ es una equivalencia natural y sobria en español; el matiz de oportunidad queda implicado por el contexto y por el verbo que sigue.
- source_word: καλεῖ
  english_pob_choice: calls
  chosen_spanish: nos llama
  alternatives_spanish:
  - nos convoca
  - nos invita
  - nos llama a
  lexicon: LSJ
  rationale: El verbo personifica el tiempo como agente que impulsa el discurso. ‘Nos llama’ conserva esa personificación sin volverla excesiva.
- source_word: ἐπὶ τὴν ἀπόδειξιν
  english_pob_choice: to the demonstration
  chosen_spanish: a la demostración
  alternatives_spanish:
  - a la prueba
  - a la exposición probatoria
  - a la presentación de la prueba
  lexicon: LSJ
  rationale: ἀπόδειξις puede ser demostración o prueba. ‘Demostración’ encaja bien en un contexto retórico y mantiene el sentido evidencial sin sonar demasiado técnico.
- source_word: ἱστορίας
  english_pob_choice: account
  chosen_spanish: del relato
  alternatives_spanish:
  - de la historia
  - de la narración
  - del informe
  lexicon: LSJ
  rationale: Aunque el English POB ajustó hacia ‘account’, el griego ἱστορία puede denotar relato o narración. ‘Relato’ es la opción más natural en español para una presentación histórica contada con finalidad argumentativa, sin reducirla a mera ‘historia’ en sentido moderno.
- source_word: σώφρονος λογισμοῦ
  english_pob_choice: rational self-control
  chosen_spanish: de la prudencia racional
  alternatives_spanish:
  - de la razón templada
  - del razonamiento sobrio
  - de la razón disciplinada
  lexicon: LSJ
  rationale: La expresión combina la dimensión racional de λογισμός con la moderación/autodominio de σώφρων. ‘Prudencia racional’ preserva ambos polos en español con buena dignidad literaria; ‘prudencia’ aquí recoge el juicio moderado y ‘racional’ conserva el componente intelectual.
theological_decisions:
- issue: Fuerza conceptual de σώφρων λογισμός como ideal ético-racional central en 4 Macabeos
  english_pob_reading: rational self-control
  chosen_spanish_reading: prudencia racional
  alternative_spanish_readings:
  - razón templada
  - razonamiento sobrio
  - razón disciplinada
  rationale: El pasaje es más antropológico y filosófico que estrictamente doctrinal, pero la frase es programática en el libro. ‘Prudencia racional’ mantiene tanto la disciplina moral como la actividad reflexiva, sin reducirla a puro intelecto ni a mera autocontrol moral.
  doctrine_reference: 'Translation philosophy §5: consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: El español sigue la última revisión inglesa, que prefirió una equivalencia más natural para ἱστορίας (‘account’). En español se optó por ‘relato’ para conservar la idea de una narración histórica con función argumentativa, y por ‘prudencia racional’ para reflejar la unidad semántica de σώφρονος λογισμοῦ.
  spanish_consistency_notes:
  - Se conserva un registro formal y elevado, adecuado para 4 Macabeos.
  - No se usa ‘Cristo’ ni terminología cristológica, pues el versículo no lo contiene.
  - ‘Tiempo’ se mantiene para καιρός, evitando sobreinterpretar con ‘ocasión’ o ‘momento’ salvo en nota.
  - La nota al pie recoge alternativas reales sin introducir glosas ajenas al texto.
