translation:
  language: es
  text: Tiempo de arrojar piedras[a], y tiempo de recoger piedras; tiempo de abrazar, y tiempo de abstenerse de abrazar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tiempo de tirar piedras, y tiempo de recoger piedras». El hebreo puede leerse de manera literal; algunos intérpretes también lo entienden de forma metafórica en relación con las relaciones humanas, la agricultura o la guerra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  english_pob_choice: a time
  chosen_spanish: tiempo
  alternatives_spanish:
  - una temporada
  - un momento
  lexicon: HALOT
  rationale: עֵת designa un período o punto de tiempo. «Tiempo» mantiene el paralelismo poético repetido del pasaje y es natural en español; «temporada» sonaría menos preciso en este contexto.
- source_word: לְהַשְׁלִיךְ
  english_pob_choice: to throw
  chosen_spanish: tirar
  alternatives_spanish:
  - arrojar
  - lanzar
  - echar
  lexicon: HALOT
  rationale: El verbo hebreo indica la acción concreta de echar/arrojar. «Tirar» es claro y natural en español moderno, y conserva la imagen directa sin volverla arcaica.
- source_word: אֲבָנִים
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - piedros
  - rocas
  lexicon: HALOT
  rationale: אֶבֶן suele corresponder a «piedra». «Piedras» preserva la imagen hebrea de forma idiomática en español; «rocas» sería más pesado y menos preciso.
- source_word: כְּנוֹס
  english_pob_choice: to gather
  chosen_spanish: recoger
  alternatives_spanish:
  - juntar
  - reunir
  - agrupar
  lexicon: HALOT
  rationale: El verbo expresa reunir o recoger. «Recoger» funciona bien en paralelo con «tirar» y transmite la acción concreta de volver a juntar las piedras.
- source_word: לַחֲבוֹק
  english_pob_choice: to embrace
  chosen_spanish: abrazar
  alternatives_spanish:
  - estrechar en brazos
  - dar un abrazo
  lexicon: HALOT
  rationale: חבק significa abrazar. «Abrazar» es la correspondencia directa y suficientemente amplia para un sentido literal o relacional.
- source_word: לִרְחֹק מֵחַבֵּק
  english_pob_choice: to refrain from embracing
  chosen_spanish: abstenerse de abrazar
  alternatives_spanish:
  - dejar de abrazar
  - apartarse de abrazar
  - no abrazar
  lexicon: HALOT
  rationale: La construcción comunica distancia o evitación respecto del acto de abrazar. «Abstenerse de abrazar» preserva el matiz deliberado de la acción, en paralelo con el verbo positivo «abrazar».
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta redacción sigue el texto hebreo y el auditorio inglés POB con alta concordancia, manteniendo la nota alternativa sobre el posible sentido literal o metafórico de «piedras».
  spanish_consistency_notes:
  - Se mantiene «tiempo» para עֵת a lo largo del versículo por coherencia poética.
  - Se preserva la tensión de la imagen de las piedras sin forzar una interpretación única, siguiendo la nota alternativa del POB inglés.
  - «Abstenerse de abrazar» traduce la idea de alejarse/retraerse del acto, más que simplemente «no abrazar».
