    text: 'Paralelo griego: «Estableció para él una alianza eterna, y le dio el sacerdocio del pueblo; lo bendijo con ornamento, y lo ciñó con un manto de gloria». El testimonio hebreo aquí difiere sustancialmente del griego.'
    reason: alternative_reading
  - marker: b
    text: O posiblemente «con la fuerza elevada del toro salvaje». La frase hebrea es difícil, y la imagen puede ser metafórica más que una descripción literal de cuernos ornamentales.
    reason: lexical_alternative
