  - amos
  rationale: Aunque κυρίους literalmente puede ser «señores» o «amos», el contexto de designación política favorece una función de gobierno. «Gobernantes» expresa esa autoridad sin perder el trasfondo de dominio.
  doctrine_reference: No aplica; decisión histórica y léxica contextual.
translation_notes:
  revision_awareness: 'El contexto auditado coincide sustancialmente con la lectura griega y con la versión inglesa POB: no se requieren cambios de fondo. Se mantiene la nota alternativa sobre κυρίους, porque el español también podría sugerir «señores» si se quisiera reflejar el matiz literal.'
  spanish_consistency_notes:
  - Se conserva la referencia masculina explícita de ἄνδρας con «hombres».
  - Se evita traducir κυρίους mecánicamente como «señores» en el texto principal para no crear una connotación feudal no exigida por el contexto.
  - «Tierra» reproduce bien χώρα como territorio gobernado, en línea con el sentido político del pasaje.
