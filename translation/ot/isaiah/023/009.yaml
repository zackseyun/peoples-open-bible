theological_decisions:
- issue: Referent of the feminine suffix in יְעָצָהּ
  chosen_reading: The suffix is rendered generically as 'it,' referring to the announced judgment/oracle against Tyre.
  alternative_readings:
  - The suffix refers specifically to Tyre as a feminine city, i.e., 'has purposed this against her'.
  rationale: English style is smoother with 'has purposed it,' and the immediate infinitive clauses explain the content of the purpose. The feminine object is preserved conceptually without forcing an awkward pronoun chain.
  doctrine_reference: Preserve theological tension rather than resolve it; document ambiguity where present.
