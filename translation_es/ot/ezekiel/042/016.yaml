lexical_decisions:
- source_word: מָדַד
  english_pob_choice: He measured
  chosen_spanish: Midió
  alternatives_spanish:
  - Midió de manera exacta
  - Mide
  lexicon: HALOT
  rationale: El verbo qal perfecto indica una acción puntual de medición; en español, «midió» conserva la sencillez narrativa sin añadir matices no presentes en el hebreo.
- source_word: רוּחַ הַקָּדִים
  english_pob_choice: the east side
  chosen_spanish: el lado oriental
  alternatives_spanish:
  - el lado del oriente
  - la dirección oriental
  lexicon: HALOT
  rationale: En un contexto arquitectónico, רוּחַ con un término direccional expresa lado o orientación, no viento. «Lado oriental» reproduce la referencia espacial con naturalidad en español.
- source_word: בִּקְנֵה הַמִּדָּה
  english_pob_choice: with the measuring reed
  chosen_spanish: con la caña de medir
  alternatives_spanish:
  - por la caña de medir
  - usando la caña de medir
  lexicon: HALOT
  rationale: La preposición instrumental ב indica el medio de la medición. «Caña de medir» es la forma natural y fiel en español para el instrumento.
- source_word: חֲמֵשׁ אמות קָנִים
  english_pob_choice: five hundred reeds
  chosen_spanish: cinquecientos cañas
  alternatives_spanish:
  - cinco cubits, reeds
  - quinientas cañas
  - cincocientos varas
  lexicon: HALOT
  rationale: Aunque el hebreo conserva una forma textual difícil, el contexto inmediato de las mediciones en vv. 16–19 favorece entender la suma como «quinientos cañas/reeds». Se mantiene la unidad de medida y la lectura contextual, sin ocultar la tensión textual.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - en torno
  lexicon: HALOT
  rationale: El adverbio señala el contorno completo de la medida. «Todo alrededor» transmite bien la idea de perímetro en español actual.
translation_notes:
  revision_awareness: Se siguió el acuerdo alto del expediente inglés sin cambios sustantivos. La única tensión relevante es la frase hebrea difícil חֲמֵשׁ אמות קָנִים, que en español se resuelve con una lectura contextual de «quinientas cañas» y se documenta en nota textual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología predeterminada de la serie cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió «caña de medir» para el instrumento, coherente con el léxico arquitectónico bíblico en español.
  - Se conservó el valor direccional de רוּחַ הַקָּדִים como orientación espacial, no como viento.
