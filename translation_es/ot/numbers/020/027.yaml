translation:
  language: es
  text: Moisés hizo como Yahvé le mandó, y ellos subieron al monte Hor ante los ojos de toda la congregación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ante los ojos de toda la congregación», es decir, públicamente y a la vista de todo el pueblo reunido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - cumplió
  lexicon: HALOT
  rationale: El verbo עשה aquí presenta la obediencia inmediata de Moisés a la orden divina. En español, «hizo» conserva la sencillez narrativa del hebreo y del POB inglés, sin añadir matices interpretativos.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: lo que
  alternatives_spanish:
  - así como
  - tal como
  lexicon: HALOT
  rationale: La construcción hebrea enlaza la acción de Moisés con el mandato recibido. «Lo que Yahvé mandó» expresa con naturalidad en español el sentido de conformidad con la orden, evitando un calco torpe de «como».},{
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Siguiendo el estándar del proyecto, se preserva el nombre propio divino en forma española «Yahvé», en lugar de sustituirlo por un título como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: לְעֵינֵי כָּל הָעֵדָה
  english_pob_reading: before the eyes of all the congregation
  chosen_spanish_reading: delante de todo el pueblo reunido
  alternative_spanish_readings:
  - a la vista de toda la congregación
  - ante los ojos de toda la asamblea
  rationale: La expresión hebrea subraya visibilidad pública. En español, «delante de todo el pueblo reunido» comunica esa idea con claridad natural y conserva el énfasis en que la acción ocurrió en presencia de todos.
  doctrine_reference: POB lexical note on לְעֵינֵי as public visibility rather than private action
translation_notes:
  revision_awareness: El texto inglés revisado eliminó «to» antes de Mount Hor para lograr una construcción más natural; en español se mantuvo esa naturalidad con «subieron al monte Hor». También se conservó la decisión de traducir el nombre divino por «Yahvé».
  spanish_consistency_notes:
  - Se prefirió «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - «Pueblo reunido» funciona aquí como equivalente contextual de «congregación» sin perder el matiz de asamblea pública.
  - Se evitó «Cristo», «SEÑOR» u otras sustituciones no motivadas por el hebreo.
  - La sintaxis sigue el orden narrativo breve del original, sin ampliar el contenido más allá de la visibilidad pública indicada por לְעֵינֵי.
