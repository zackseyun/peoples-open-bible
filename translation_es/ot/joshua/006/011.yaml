revisions:
- from: Así el arca de Yahvé rodeó la ciudad[a], dándole una vuelta completa. Luego entraron en el campamento y pasaron la noche en el campamento.
  to: Así el arca de Yahvé rodeó la ciudad[a] una vez. Luego entraron en el campamento y pasaron la noche en el campamento.
  rationale: La revisión elimina una explicitación innecesaria («completa»), preserva mejor la sobriedad del hebreo, mantiene la personificación narrativa del arca como sujeto y conserva la repetición de «campamento» presente en el original.
  reviewer_model: gpt-5.4
