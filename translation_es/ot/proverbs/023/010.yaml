  - «Mojón» se eligió para concretar el límite físico de propiedad, en línea con la decisión inglesa de explicitar «boundary marker».
  - «Huérfanos» preserva la lectura social y legal del verso sin recurrir a una glosa más larga.
  - La nota al pie conserva la alternativa tradicional de «quitar» y «ir a» como reflejo del margen léxico auditado.
