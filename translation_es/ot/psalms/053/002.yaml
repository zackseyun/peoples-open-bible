revisions:
- from: 'El necio dice en su corazón[a]: «No hay Dios». Ellos se han corrompido; han cometido iniquidad abominable; no hay quien haga el bien.'
  to: 'El necio dice en su corazón: «No hay Dios». Ellos se han corrompido; cometen injusticia abominable[a]; no hay quien haga el bien.'
