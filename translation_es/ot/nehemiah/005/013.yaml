translation:
  language: es
  text: 'También sacudí el pliegue de mi manto[a] y dije: «Así sacuda Dios a todo hombre que no cumpla[b] esta promesa; así sea sacudido de su casa y del fruto de su trabajo[c], y quede vacío». Y toda la asamblea dijo: «Amén», y alabó a Yahvé. Y el pueblo hizo conforme a esta promesa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el regazo de mi manto» o «el frente de mi manto». El hebreo se refiere al pliegue de una prenda usado para llevar objetos; el gesto de Nehemías simboliza ser sacudido y despojado de sus bienes.
    reason: lexical_alternative
  - marker: b
    text: O «lleve a cabo esta palabra» o «establezca este asunto». La expresión hebrea significa poner en práctica o cumplir lo comprometido.
    reason: lexical_alternative
  - marker: c
    text: O «de su casa y de su trabajo». El hebreo puede referirse al trabajo mismo o a lo que ese trabajo ha producido.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָצְנִי
  english_pob_choice: the fold of my garment
  chosen_spanish: el pliegue de mi manto
  alternatives_spanish:
  - mi regazo
  - el frente de mi vestido
  - el pliegue de mi ropa
  lexicon: HALOT
  rationale: חָצֶן designa el pliegue o seno de una prenda, el lugar donde puede cargarse algo. En español, «pliegue de mi manto» conserva la imagen concreta del gesto simbólico y suena natural y digno.
- source_word: נָעַרְתִּי / יְנַעֵר / נָעוּר
  english_pob_choice: shook out / shake out / be shaken out
  chosen_spanish: sacudí / sacuda / sacudido
  alternatives_spanish:
  - sacudir / sacuda / sacudido
  - sacudir fuera / sacuda fuera / sacudido fuera
  - arrojar / arroje / arrojado
  lexicon: HALOT
  rationale: La repetición de נער conserva el juego entre la acción simbólica de Nehemías y la maldición invocada. «Sacudir» mantiene el movimiento físico de vaciar una prenda y permite repetir la misma raíz en español.
- source_word: כָּכָה
  english_pob_choice: So may
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Así sea que
  - De este modo
  lexicon: HALOT
  rationale: En una fórmula de imprecación, כָּכָה introduce el deseo o decreto performativo. «Así» reproduce esa fuerza de manera natural en español.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Dios de Israel
  lexicon: HALOT
  rationale: Aunque el hebreo es formalmente definido, aquí funciona como referencia directa al Dios de Israel en el juramento. En español, «Dios» es la forma idiomática y fiel al contexto.
- source_word: כָּל הָאִישׁ
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - cada hombre
  - toda persona
  - cada persona
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino representativo. Se conserva esa forma masculina para respetar la precisión gramatical y la decisión POB de no neutralizarla sin necesidad.
- source_word: יָקִים אֶת הַדָּבָר הַזֶּה
  english_pob_choice: fulfill this promise
  chosen_spanish: cumpla esta promesa
  alternatives_spanish:
  - cumpla este asunto
  - lleve a cabo esta palabra
  - establezca esta palabra
  lexicon: HALOT
  rationale: En contextos de pacto y juramento, הקים דבר significa establecer o llevar a cabo lo comprometido. «Cumpla esta promesa» expresa la fuerza obligacional en español actual y mantiene el sentido de realización, no solo de habla.
- source_word: מִבֵּיתוֹ וּמִיגִיעוֹ
  english_pob_choice: from his house and from his labor
  chosen_spanish: desde su casa y desde su trabajo
  alternatives_spanish:
  - desde su casa y desde el fruto de su trabajo
  - desde su casa y desde lo que ha adquirido
  - desde su casa y desde su ganancia
  lexicon: HALOT
  rationale: יְגִיעַ puede referir al trabajo, al esfuerzo o al producto del esfuerzo. «Su trabajo» conserva la ambigüedad útil entre labor y lo producido por ella, sin forzar una especificación que el hebreo no exige.
- source_word: וְכָכָה יִהְיֶה נָעוּר וָרֵק
  english_pob_choice: so may he be shaken out and emptied
  chosen_spanish: así sea sacudido y quede vacío
  alternatives_spanish:
  - así sea sacudido y vaciado
  - así quede sacudido y vacío
  - así sea arrojado y quede vacío
  lexicon: HALOT
  rationale: 'נָעוּר y רֵק combinan expulsión/descarga con vaciedad. «Sacudido y quede vacío» conserva ambos rasgos: el gesto de expulsión y el resultado de despojo.'
- source_word: הַקָּהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la comunidad reunida
  - el pueblo reunido
  lexicon: HALOT
  rationale: קָהָל es la comunidad reunida. «Asamblea» es natural, neutral y evita resonancias denominacionales no presentes en el texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino como transliteración del Tetragrámaton en la forma española del proyecto: «Yahvé», en lugar de sustituirlo por un título.'
- source_word: כַדָּבָר הַזֶּה
  english_pob_choice: according to this promise
  chosen_spanish: conforme a esta promesa
  alternatives_spanish:
  - según esta palabra
  - conforme a este asunto
  - de acuerdo con esta palabra
  lexicon: HALOT
  rationale: דָּבָר retoma el compromiso jurado. «Promesa» explicita el referente en español sin salir del alcance semántico del pasaje.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto español lo vierte como «Yahvé» para preservar el nombre propio de Dios, no un sustituto titulado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Masculino genérico הָאִישׁ
  english_pob_reading: every man
  chosen_spanish_reading: todo hombre
  alternative_spanish_readings:
  - toda persona
  - cada persona
  - cada hombre
  rationale: La forma hebrea es masculina singular con valor representativo. Se conserva la referencia masculina para no neutralizar una decisión gramatical y semántica del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa auditada revisó «uphold this promise» a «fulfill this promise» para reflejar mejor el valor de הקים דבר como llevar a cabo o establecer lo prometido. La redacción española adopta «cumpla esta promesa» para conservar esa revisión y el matiz de obligación pactada.
  spanish_consistency_notes:
  - Se conserva la repetición de una misma raíz verbal en español con «sacudir / sacudido» para reflejar el juego de palabras del hebreo.
  - «Yahvé» se usa de manera consistente para יְהוָה, sin máscara titulada.
  - «Promesa» traduce el valor contextual de דָּבָר en la fórmula juramentada.
  - «Asamblea» traduce הַקָּהָל sin carga denominacional.
