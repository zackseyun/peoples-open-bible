translation:
  language: es
  text: Allí, mientras lo quemaban con instrumentos ideados para torturarlo[a], se lanzaron sobre él[b] y vertieron líquidos fétidos[c] en sus fosas nasales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Ideados para torturarlo» refleja la idea de κακοτέχνων ὀργάνων: instrumentos hábilmente fabricados con intención dañina. También puede entenderse como «con instrumentos cruelmente ideados».'
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede sugerir no solo «se lanzaron sobre él», sino también «arremetieron contra él» o «saltaron sobre él» en un asalto violento.
    reason: lexical_alternative
  - marker: c
    text: 'χυλούς admite un campo amplio: líquidos, jugos o brebajes. «Líquidos» evita restringir el sentido a una consistencia demasiado espesa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔνθα
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Entonces
  - En ese lugar
  - En aquel momento
  lexicon: LSJ
  rationale: ἔνθα es locativo y narrativo; «Allí» conserva el desplazamiento a la escena y evita reducir indebidamente el valor espacial a un simple marcador temporal.
- source_word: διὰ κακοτέχνων ὀργάνων
  english_pob_choice: with instruments devised for torture
  chosen_spanish: con instrumentos ideados para torturarlo
  alternatives_spanish:
  - con instrumentos cruelmente ideados
  - con instrumentos de crueldad
  - con instrumentos maliciosamente fabricados
  lexicon: LSJ
  rationale: κακότεχνος sugiere una fabricación hábil pero perversa; ὄργανα son instrumentos. En español, «ideados para torturarlo» comunica la finalidad malévola y mantiene la naturalidad, sin ocultar el matiz de artificio cruel.
- source_word: καταφλέγοντες
  english_pob_choice: burning
  chosen_spanish: mientras lo quemaban
  alternatives_spanish:
  - mientras lo abrasaban
  - mientras lo chamuscaban
  lexicon: LSJ
  rationale: El participio expresa acción intensa de quemar/abrasar. «Quemaban» es claro y fiel; «abrasaban» sería más enfático pero menos neutral.
- source_word: ὑπερίπτοσαν
  english_pob_choice: they leaped upon him
  chosen_spanish: se lanzaron sobre él
  alternatives_spanish:
  - saltaron sobre él
  - arremetieron contra él
  - se precipitaron sobre él
  lexicon: LSJ
  rationale: El verbo indica un movimiento violento de salto o acometida. «Se lanzaron sobre él» conserva la agresión física sin forzar una imagen espacial ambigua.
- source_word: δυσώδεις χυλούς
  english_pob_choice: foul-smelling liquids
  chosen_spanish: líquidos fétidos
  alternatives_spanish:
  - líquidos malolientes
  - brebajes fétidos
  - jugos fétidos
  lexicon: LSJ
  rationale: δυσώδης significa fétido/maloliente; χυλός puede ser líquido, jugo o mezcla fluida. «Líquidos fétidos» refleja bien el sentido amplio que el inglés auditado también corrigió desde «broths» a «liquids».
- source_word: μυκτῆρας
  english_pob_choice: nostrils
  chosen_spanish: narices
  alternatives_spanish:
  - fosas nasales
  - ventanas nasales
  lexicon: LSJ
  rationale: Aunque μυκτήρ puede referirse específicamente a las fosas/narices, en español «narices» mantiene la concreción corporal y el tono gráfico del pasaje; «fosas nasales» sería más técnico.
- source_word: κατέχεον
  english_pob_choice: poured
  chosen_spanish: vertieron
  alternatives_spanish:
  - derramaron
  - echaban
  lexicon: LSJ
  rationale: El imperfecto narrativo admite pretérito simple en español. «Vertieron» conserva la acción de vaciar un líquido sobre/into el cuerpo sin sonar demasiado repetitivo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete 1909 y toma en cuenta el ajuste del POB inglés en la revisión final: ὑπερίπτοσαν se refleja mejor como una acometida directa («se lanzaron sobre él») y χυλούς como «líquidos» en vez de «broths». También se preserva la imaginería corporal violenta de μυκτῆρας y el matiz de fabricación malévola en κακοτέχνων ὀργάνων.'
  spanish_consistency_notes:
  - Se mantiene un español bíblico moderno, sin arcaísmos innecesarios.
  - «Yahvé», «Mesías» y otras terminologías doctrinales no aplican en este versículo.
  - Se evita suavizar la violencia del pasaje, conforme al griego y al audit trail inglés.
  - Los corchetes de notas se colocan solo donde la ambigüedad léxica lo requiere.
