translation:
  language: es
  text: Entonces pasó revista a los jóvenes de los comandantes de las provincias, y eran doscientos treinta y dos; y después de ellos pasó revista a todo el pueblo de Israel[a], siete mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘a todos los hijos de Israel’. El hebreo dice literalmente ‘todo el pueblo, todos los hijos de Israel’, una expresión familiar masculina usada para el pueblo de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְקֹד / פָּקַד
  english_pob_choice: mustered
  chosen_spanish: pasó revista
  alternatives_spanish:
  - reunió
  - contó
  - hizo el recuento de
  lexicon: HALOT
  rationale: En este contexto militar, פקד no es solo ‘contar’, sino ordenar y revisar tropas para su disposición. ‘Pasó revista’ conserva la idea de inspección/movilización militar sin perder naturalidad en español.
- source_word: נַעֲרֵי
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - muchachos
  - sirvientes
  - asistentes
  lexicon: HALOT
  rationale: El término puede referirse a jóvenes varones, sirvientes o asistentes. Aquí se traduce como ‘jóvenes’ para mantener el sentido humano y no introducir una función servil que el hebreo no explicita.
- source_word: שָׂרֵי
  english_pob_choice: commanders
  chosen_spanish: comandantes
  alternatives_spanish:
  - jefes
  - oficiales
  - capitanes
  lexicon: HALOT
  rationale: שַׂר es un término amplio de liderazgo; en este marco militar, ‘comandantes’ comunica mejor la función que ‘príncipes’ o ‘oficiales’.
- source_word: הַמְּדִינוֹת
  english_pob_choice: provincial
  chosen_spanish: de las provincias
  alternatives_spanish:
  - de los distritos
  - provinciales
  - de las regiones
  lexicon: HALOT
  rationale: מְדִינָה alude a una unidad administrativa. ‘De las provincias’ es una forma clara y relativamente literal en español; evita el calco adjetival forzado y preserva el matiz administrativo.
- source_word: מָאתַיִם שְׁנַיִם וּשְׁלֹשִׁים
  english_pob_choice: two hundred and thirty-two
  chosen_spanish: doscientos treinta y dos
  alternatives_spanish:
  - doscientos treinta y dos
  lexicon: HALOT
  rationale: Número cardinal directo; en español se expresa de forma estándar y completamente transparente.
- source_word: וְאַחֲרֵיהֶם
  english_pob_choice: after them
  chosen_spanish: y después de ellos
  alternatives_spanish:
  - tras ellos
  - luego de ellos
  - después de éstos
  lexicon: HALOT
  rationale: La frase marca secuencia de la movilización. ‘Y después de ellos’ mantiene el orden concreto del hebreo y su relación temporal.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el ejército
  - toda la gente
  lexicon: HALOT
  rationale: Aunque el contexto es militar, el hebreo dice literalmente ‘todo el pueblo’. Se conserva ese alcance amplio para no estrechar indebidamente el referente.
- source_word: כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the sons of Israel
  chosen_spanish: a todos los hijos de Israel
  alternatives_spanish:
  - a todos los israelitas
  - a todos los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión filial masculina del hebreo, como forma transparente y fiel. ‘Israelitas’ suavizaría la forma explícita del original; aquí se preserva esa terminología por fidelidad textual.
- source_word: שִׁבְעַת אֲלָפִים
  english_pob_choice: seven thousand
  chosen_spanish: siete mil
  alternatives_spanish:
  - siete mil
  lexicon: HALOT
  rationale: Número cardinal directo sin necesidad de ajuste idiomático.
theological_decisions:
- issue: Expresión masculina colectiva 'בְּנֵי יִשְׂרָאֵל'
  english_pob_reading: Or 'all the Israelites.' The Hebrew reads 'all the sons of Israel,' a masculine familial expression used for the people of Israel.
  chosen_spanish_reading: a todos los hijos de Israel
  alternative_spanish_readings:
  - a todos los israelitas
  rationale: Se conserva la forma masculina/familiar del hebreo para no borrar el rasgo expresivo del texto. La alternativa inclusiva ‘israelitas’ es posible, pero aquí se prioriza la transparencia lexical que el POB inglés documenta.
  doctrine_reference: Transparencia textual y fidelidad semántica al alcance masculino colectivo del hebreo.
translation_notes:
  revision_awareness: Se siguió el estado revisado del POB inglés, que mantiene el conteo como 'two hundred and thirty-two' y conserva la estructura secuencial del hebreo. No se introdujeron cambios doctrinales; la única nota textual relevante es la alternativa para 'sons of Israel', ya documentada en el audit trail.
  spanish_consistency_notes:
  - Se usó ‘pasó revista’ para reflejar el matiz militar de פָּקַד sin reducirlo a un simple conteo.
  - Se preservó ‘hijos de Israel’ por transparencia formal, en línea con la decisión inglesa de mantener la expresión masculina familiar.
  - El número se expresó con la forma estándar del español, sin alterar el total ni la secuencia del original.
  - ‘Comandantes de las provincias’ evita una adaptación interpretativa excesiva y conserva la relación administrativa del sintagma hebreo.
