translation:
  language: es
  text: Además, Yahvé tu Dios enviará el avispón[a] entre ellos, hasta que perezcan incluso los que queden y los que se escondan de delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «el terror o pánico»; algunos entienden «el avispón» en sentido figurado como temor enviado por Dios más que como un insecto literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Moreover
  chosen_spanish: Además
  alternatives_spanish:
  - Y además
  - Asimismo
  - Además de eso
  lexicon: HALOT
  rationale: La partícula suma algo adicional y enfático al anuncio anterior. «Además» expresa bien esa adición sin sonar redundante en español.
- source_word: הַצִּרְעָה
  english_pob_choice: the hornet
  chosen_spanish: la avispa
  alternatives_spanish:
  - el avispón
  - el insecto picador
  - el terror/pánico
  lexicon: HALOT
  rationale: La palabra hebrea designa un insecto himenóptero; en español, «avispa» es un equivalente natural y comprensible. Se conserva la posibilidad figurada en la nota porque el pasaje puede entenderse también como terror enviado por Dios.
- source_word: יְשַׁלַּח
  english_pob_choice: will send
  chosen_spanish: enviará
  alternatives_spanish:
  - mandará
  - soltará
  - despachará
  lexicon: HALOT
  rationale: El verbo transmite acción intencional de Yahvé al enviar este agente contra sus enemigos. «Enviará» es el equivalente más directo y digno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término propio del proyecto para el nombre divino, preservando el Tetragrámaton en forma explícita.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, Yahvé
  - tu Dios del pacto
  lexicon: HALOT
  rationale: La posesión directa en hebreo se reproduce con la fórmula natural «tu Dios», que mantiene el tono de alianza y dirección personal.
- source_word: בָּם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - contra ellos
  lexicon: HALOT
  rationale: La preposición expresa la presencia del agente en medio del grupo enemigo. «Entre ellos» conserva el sentido espacial de manera idiomática en español.
- source_word: עַד אֲבֹד
  english_pob_choice: until ... perish
  chosen_spanish: hasta que perezcan
  alternatives_spanish:
  - hasta que sean destruidos
  - hasta desaparecer
  lexicon: HALOT
  rationale: La construcción señala el límite de la acción. «Perezcan» conserva el valor resultativo sin añadir detalles que el hebreo no especifica.
- source_word: הַנִּשְׁאָרִים
  english_pob_choice: those who remain
  chosen_spanish: los que queden
  alternatives_spanish:
  - los que permanezcan
  - los sobrevivientes
  lexicon: HALOT
  rationale: En este contexto militar, el participio se refiere a los que todavía quedan tras el juicio. «Los que queden» es natural y no introduce un tecnicismo interpretativo.
- source_word: וְהַנִּסְתָּרִים
  english_pob_choice: those who hide themselves
  chosen_spanish: los que se escondan
  alternatives_spanish:
  - los que se ocultan
  - los escondidos
  lexicon: HALOT
  rationale: Aunque la forma hebrea puede leerse pasivamente, el contexto favorece la idea de enemigos que intentan ocultarse. «Los que se escondan» comunica bien esa acción en español.
- source_word: מִפָּנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - ante ti
  lexicon: HALOT
  rationale: Se conserva el giro hebreo de proximidad y huida. «De delante de ti» suena natural en español bíblico y mantiene la imagen espacial del original.
theological_decisions:
- issue: El nombre divino יְהוָה en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El original usa explícitamente el Nombre divino. La forma «Yahvé» preserva esa identidad del Dios del pacto sin sustituirla por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido literal o figurado de הַצִּרְעָה
  english_pob_reading: literal 'the hornet' in the main text
  chosen_spanish_reading: 'sentido literal principal: «la avispa»'
  alternative_spanish_readings:
  - el terror/pánico
  - la plaga de avispas
  rationale: El valor léxico básico apunta a un insecto. Se mantiene ese sentido en el texto principal, sin negar la lectura figurada de terror divinamente causado, que queda preservada en la nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió la revisión aplicada que simplificó la apertura inglesa equivalente a «Moreover»; en español se optó por «Además» por claridad y concisión. No se añadieron elementos ajenos al hebreo, y se preservó la tensión interpretativa sobre הַצִּרְעָה mediante una nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del Tetragrámaton.
  - «Entre ellos» conserva la relación espacial del hebreo בָּם.
  - «De delante de ti» reproduce el modismo מִפָּנֶיךָ sin volverlo abstracto.
