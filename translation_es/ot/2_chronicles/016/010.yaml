translation:
  language: es
  text: Entonces Asa se enojó con el vidente y lo puso en la prisión[a], porque estaba enfurecido con él por esto. Y Asa oprimió[b] a algunos del pueblo en aquel tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la casa de los cepos’; la expresión hebrea probablemente designa un lugar de confinamiento con restricción física.
    reason: lexical_alternative
  - marker: b
    text: O ‘aplastó’ o ‘maltrató’; el verbo hebreo es literalmente violento y comunica un abuso severo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְעַס
  english_pob_choice: was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se airó
  - se indignó
  - se enfureció
  lexicon: HALOT
  rationale: כעס expresa enojo o irritación; en español, ‘se enojó’ comunica bien ese estado sin aumentar indebidamente la intensidad.
- source_word: הָרֹאֶה
  english_pob_choice: the seer
  chosen_spanish: el vidente
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: רֹאֶה designa literalmente a un ‘vidente’; mantener ‘vidente’ preserva el término más preciso del hebreo frente al más amplio ‘profeta’.
- source_word: וַיִּתְּנֵהוּ
  english_pob_choice: put him
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo metió
  lexicon: HALOT
  rationale: El verbo נתן con complemento y destino se traduce naturalmente como ‘poner’ a alguien en un lugar.
- source_word: בֵּית הַמַּהְפֶּכֶת
  english_pob_choice: the prison house
  chosen_spanish: la casa del calabozo
  alternatives_spanish:
  - la casa de los cepos
  - la casa de prisión
  - el calabozo
  lexicon: HALOT
  rationale: La expresión es difícil y probablemente indica un lugar de confinamiento con restricción física. ‘Casa del calabozo’ conserva la idea de una ‘casa’ de detención y deja abierta la alternativa más específica de los cepos.
- source_word: בְזַעַף עִמּוֹ
  english_pob_choice: he was enraged with him
  chosen_spanish: estaba enojado con él
  alternatives_spanish:
  - estaba enfurecido con él
  - estaba indignado con él
  - estaba airado con él
  lexicon: HALOT
  rationale: זַעַף comunica ira intensa o indignación. En español, ‘estaba enojado con él’ es fiel y natural; el contexto ya aporta la fuerza del enojo sin necesidad de sobreadjetivar.
- source_word: עַל זֹאת
  english_pob_choice: over this
  chosen_spanish: por esto
  alternatives_spanish:
  - a causa de esto
  - por esa razón
  - sobre esto
  lexicon: HALOT
  rationale: La relación causal es la más clara en español; ‘por esto’ expresa bien la provocación inmediata del acto anterior.
- source_word: וַיְרַצֵּץ
  english_pob_choice: oppressed
  chosen_spanish: oprimió
  alternatives_spanish:
  - aplastó
  - maltrató
  - apremió
  lexicon: HALOT
  rationale: רצץ tiene sentido de ‘aplastar’ o ‘oprimir’. En este contexto humano, ‘oprimió’ mantiene la dureza del acto sin introducir un adverbio interpretativo no presente en el hebreo.
- source_word: מִן הָעָם
  english_pob_choice: some of the people
  chosen_spanish: a algunos del pueblo
  alternatives_spanish:
  - a parte del pueblo
  - a ciertos del pueblo
  - a algunos entre el pueblo
  lexicon: HALOT
  rationale: El partitivo מִן se refleja de manera natural con ‘a algunos del pueblo’, evitando sugerir que afectó a todo el pueblo.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  - en aquella ocasión
  lexicon: HALOT
  rationale: La fórmula temporal estándar en español bíblico puede rendirse como ‘en aquel tiempo’, que es clara y digna.
theological_decisions:
- issue: El término para el funcionario profético
  english_pob_reading: the seer
  chosen_spanish_reading: el vidente
  alternative_spanish_readings:
  - el profeta
  rationale: Se conserva el título específico del hebreo, evitando nivelarlo automáticamente con ‘profeta’. El texto distingue esta designación de otras más generales.
  doctrine_reference: Terminología profética del AT
- issue: La fuerza de בֵּית הַמַּהְפֶּכֶת
  english_pob_reading: the prison house
  chosen_spanish_reading: la casa del calabozo
  alternative_spanish_readings:
  - la casa de los cepos
  - el calabozo
  rationale: La expresión probablemente refiere a un lugar de detención y restricción física. Se deja una traducción que suene natural en español y a la vez permita la alternativa más concreta sin cerrar el sentido.
  doctrine_reference: Lexicografía narrativa del AT
- issue: La violencia verbal de וַיְרַצֵּץ
  english_pob_reading: oppressed
  chosen_spanish_reading: oprimió
  alternative_spanish_readings:
  - aplastó
  - maltrató
  rationale: Se mantiene la dureza del verbo sin añadir intensificadores que el texto no dice explícitamente. La ambigüedad entre opresión social y violencia física queda respetada.
  doctrine_reference: Semántica verbal hebrea
translation_notes:
  revision_awareness: 'La base inglesa revisada eliminó ‘brutally’ y prefirió ‘was enraged with him’ por ‘was in a rage’. La versión española sigue esa revisión: no añade un adverbio intensificador y expresa la segunda cláusula con una forma natural de enojo intenso, preservando la relación causal del hebreo.'
  spanish_consistency_notes:
  - Se usa ‘vidente’ para הָרֹאֶה según la terminología POB, en lugar de sustituirlo por ‘profeta’.
  - Se evita ‘SEÑOR’ para el nombre divino porque este versículo no lo contiene.
  - ‘Oprimió’ reproduce la fuerza de רצץ sin sobreinterpretar con un adverbio como ‘brutalmente’.
  - ‘Casa del calabozo’ mantiene el carácter de un lugar de detención y deja abierta la alternativa textual de los cepos.
