translation:
  language: es
  text: Y en cuanto a Moisés, el hombre de Dios, sus hijos fueron llamados[a] a la tribu de Leví[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron contados como parte de la tribu de Leví». El verbo hebreo puede expresar ser designados o registrados dentro de un grupo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fueron llamados entre la tribu de Leví».'
    reason: previous_rendering
lexical_decisions:
- source_word: וּ/מֹשֶׁה
  english_pob_choice: And as for Moses
  chosen_spanish: Y también Moisés
  alternatives_spanish:
  - Y Moisés
  - Ahora bien, Moisés
  lexicon: HALOT
  rationale: La waw aquí introduce un nuevo elemento en la enumeración. En español, “Y también” conserva la continuidad y el cambio de foco sin añadir contenido interpretativo excesivo.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - un hombre de Dios
  lexicon: HALOT
  rationale: Se mantiene el título reconocido de Moisés y el valor definido del hebreo. “El hombre de Dios” preserva el matiz honorífico sin suavizarlo.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos, sus varones
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural y puede traducirse estrictamente como “sus hijos” en español, aquí el referente inmediato son los descendientes masculinos de Moisés. “Sus hijos” es natural en español y no fuerza una lectura poco idiomática.
- source_word: יִקָּרְאוּ
  english_pob_choice: were called
  chosen_spanish: fueron llamados
  alternatives_spanish:
  - fueron contados
  - fueron tenidos por
  lexicon: HALOT
  rationale: El nifal de קרא permite la idea de ser llamados, designados o registrados. Se conserva el verbo más directo en español, evitando exagerar el matiz administrativo en el cuerpo principal.
- source_word: עַל
  english_pob_choice: among
  chosen_spanish: a
  alternatives_spanish:
  - entre
  - dentro de
  lexicon: HALOT
  rationale: En esta construcción genealógica, el hebreo indica pertenencia o clasificación respecto de la tribu. “A la tribu de Leví” mantiene la frase de forma sobria; la nota explica el posible matiz de inclusión.
- source_word: שֵׁבֶט הַלֵּוִי
  english_pob_choice: the tribe of Levi
  chosen_spanish: la tribu de Leví
  alternatives_spanish:
  - la tribu levítica
  - la tribu de los levitas
  lexicon: HALOT
  rationale: “La tribu de Leví” es la forma más idiomática y precisa en español para שֵׁבֶט הַלֵּוִי, conservando el nombre propio del patriarca tribal.
theological_decisions:
- issue: Incorporación de los hijos de Moisés dentro de la tribu de Leví
  english_pob_reading: his sons were called to the tribe of Levi
  chosen_spanish_reading: sus hijos fueron llamados a la tribu de Leví
  alternative_spanish_readings:
  - sus hijos fueron contados entre la tribu de Leví
  - sus hijos fueron llamados entre la tribu de Leví
  rationale: 'La lectura española conserva el dato genealógico: los hijos de Moisés no forman una casa separada, sino que quedan vinculados a Leví. La formulación evita sobreafirmar un matiz jurídico que el hebreo permite pero que el texto no necesita explicitar aquí.'
  doctrine_reference: 1 Crónicas 23:14; cf. contexto genealógico y tribal de Números 3–4
translation_notes:
  revision_awareness: El texto inglés revisó la solución más explícitamente administrativa (“were counted among”) para volver a “were called to”, más cercana al verbo hebreo יִקָּרְאוּ. La versión española sigue esa última decisión principal, manteniendo una nota que conserva la alternativa de inclusión/registro porque el hebreo y el contexto genealógico la permiten.
  spanish_consistency_notes:
  - Se usa “Yahvé” para el nombre divino cuando aparezca en otros contextos, pero este versículo no lo contiene.
  - Se mantiene “Leví” como nombre propio estándar en español para la tribu.
  - Se prefirió “el hombre de Dios” por ser un título establecido y por reflejar el artículo definido del hebreo.
