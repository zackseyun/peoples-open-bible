theological_decisions:
- issue: Rendering of divine empowerment language
  chosen_reading: the Spirit of the LORD rushed upon him
  alternative_readings:
  - the Spirit of the LORD came powerfully upon him
  rationale: The text depicts a direct act of divine empowerment without specifying moral approval of every subsequent action beyond what the narrative states. The rendering preserves the force of the Hebrew while not importing extra theological explanation.
  doctrine_reference: Preserve theological tension rather than resolve it; YHWH -> the LORD
