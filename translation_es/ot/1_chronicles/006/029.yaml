  glossary_alignment: No hay términos teológicos del glosario principal en juego. La nota sobre «sus hermanos» está bien alineada con la decisión inglesa y con el uso genealógico hebreo. La revisión propuesta afecta solo la transliteración de nombres propios para mejor fidelidad y legibilidad en español.
