review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: negación de castigar a las hijas y nueras, explicación causal por la complicidad de los hombres, referencia a prostitutas y a mujeres ligadas al culto ilícito, y cierre con la ruina de un pueblo sin entendimiento. Sin embargo, la nota [a] está anclada en el lugar equivocado: en el inglés POB la alternativa corresponde a יְפָרֵדוּ (''se apartan / van aparte con prostitutas''), no a תִזְנֶינָה (''se prostituyan''). Eso debe corregirse para preservar el rastro léxico auditado.'
  spanish_quality_summary: El español es claro, natural y digno. 'No castigaré', 'sus hijas', 'sus nueras', 'cometan adulterio' y 'un pueblo sin entendimiento' funcionan bien. 'Prostitutas cultuales' es entendible, aunque algo técnico; sigue aceptablemente la decisión del POB. 'Se hunde' es legible, pero 'cae en ruina' alinea mejor con la nota y con el campo semántico documentado. La reparación principal es reubicar la nota [a] y ajustar el cierre para coherencia con la nota [c].
  glossary_alignment: 'No aparecen términos del glosario principal como Yahvé, Mesías, Cristo, espíritu, etc. Las decisiones léxicas relevantes sí se alinean con el expediente inglés: זנה -> ''se prostituyan'', נאף -> ''cometan adulterio'', קְדֵשׁוֹת -> ''prostitutas cultuales''. La única desalineación sustancial es la asignación de la alternativa de יְפָרֵדוּ a la frase equivocada.'
  issues:
