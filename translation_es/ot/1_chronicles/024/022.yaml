translation:
  language: es
  text: 'Para el izharita[a]: Shelomoth; para los hijos de Shelomoth[b]: Jahat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al izharita». El hebreo con ל puede expresarse como destinación o asignación en esta lista, no solo como relación posesiva.
    reason: lexical_alternative
  - marker: b
