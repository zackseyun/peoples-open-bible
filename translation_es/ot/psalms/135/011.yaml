lexical_decisions:
- source_word: לְ/סִיחוֹן
  english_pob_choice: to Sihon
  chosen_spanish: a Sihón
  alternatives_spanish:
  - Sihón
  lexicon: HALOT
  rationale: El prefijo לְ se conserva como relación direccional/objetivo con la preposición española «a», que resulta natural en la lista paralela y preserva la sintaxis del versículo anterior. El nombre propio se translitera como Sihón.
- source_word: מֶ֤לֶךְ הָ/אֱמֹרִ֗י
  english_pob_choice: king of the Amorites
  chosen_spanish: rey de los amorreos
  alternatives_spanish:
  - el rey amorreo
  - rey del amorreo
  lexicon: HALOT
  rationale: La construcción genitiva se vierte de manera idiomática en español con «rey de los amorreos». El plural étnico refleja mejor el hebreo como designación de pueblo que una forma singular o adjetival.
- source_word: וּ֭/לְ/עוֹג
  english_pob_choice: and to Og
  chosen_spanish: y a Og
  alternatives_spanish:
  - y Og
  lexicon: HALOT
  rationale: Se conserva la conjunción y la preposición de modo explícito. «A» mantiene el paralelismo con el primer miembro y evita perder la relación sintáctica marcada por לְ.
- source_word: מֶ֣לֶךְ הַ/בָּשָׁ֑ן
  english_pob_choice: king of Bashan
  chosen_spanish: rey de Basán
  alternatives_spanish:
  - el rey de Basán
  lexicon: HALOT
  rationale: Se mantiene la construcción sencilla y natural en español, sin añadir artículo innecesario en el contexto enumerativo. «Basán» translitera el topónimo bíblico.
- source_word: וּ֝/לְ/כֹ֗ל
  english_pob_choice: and to all
  chosen_spanish: y a todos
  alternatives_spanish:
  - y a todas
  lexicon: HALOT
  rationale: La preposición לְ se traduce nuevamente con «a», respetando el ritmo acumulativo de la lista. «Todos» concuerda con «reinos» en la línea siguiente por economía sintáctica española.
- source_word: מַמְלְכ֥וֹת
  english_pob_choice: kingdoms
  chosen_spanish: reinos
  alternatives_spanish:
  - dominios
  - reinos soberanos
  lexicon: HALOT
  rationale: «Reinos» es el equivalente más claro y estable para esta referencia histórica-geográfica. Mantiene la fuerza política del sustantivo hebreo sin sobrecargar el texto.
- source_word: כְּנָֽעַן
  english_pob_choice: Canaan
  chosen_spanish: Canaán
  alternatives_spanish:
  - Canán
  lexicon: HALOT
  rationale: Se usa la forma española estándar del topónimo bíblico. No se introduce glosa adicional porque el referente es ampliamente reconocido y el hebreo no presenta ambigüedad aquí.
translation_notes:
  revision_awareness: El inglés POB no añadió notas y mantiene una lectura lineal del hebreo. Esta propuesta sigue de cerca la sintaxis original, conservando la serie de destinatarios/objetivos introducida por לְ con una equivalencia española natural.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - Se mantiene «amorreos» en plural étnico para reflejar el genitivo colectivo del hebreo.
  - La secuencia repetida con «a» reproduce el paralelismo de לְ sin sonar forzada en español.
