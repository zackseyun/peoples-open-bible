revisions:
- from: Y de ellos el rey recibía muchos regalos diversos[a], y los distribuía.
  to: Y de ellos el rey recibía muchos regalos variados[a], y los distribuía.
  rationale: Se retoca la frase para mayor naturalidad en español con «regalos variados», manteniendo el sentido de πολλὰ διάφορα. La nota se simplifica y precisa para reflejar mejor que el objeto no está expresado en griego y que «regalos» es una suplencia contextual ya documentada en el POB inglés.
  reviewer_model: gpt-5.4
