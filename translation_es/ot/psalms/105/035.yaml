translation:
  language: es
  text: Y comió toda la vegetación[a] en su tierra,[b] y comió el fruto de su suelo.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vegetación» sigue el sentido amplio del hebreo עֵשֶׂב; también puede traducirse «hierba».
    reason: lexical_alternative
  - marker: b
    text: 'O «de su tierra». El hebreo בְּאַרְצָם tiene sentido locativo: «en su tierra».'
    reason: lexical_alternative
  - marker: c
    text: O «el producto de su suelo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאכַל
  english_pob_choice: it ate
  chosen_spanish: se comió
  alternatives_spanish:
  - comió
  - devoró
  lexicon: HALOT
  rationale: El verbo hebreo está en 3.ª persona singular y, en el contexto del salmo, remite al agente singular colectivo (la langosta o enjambre devorador). En español, el reflexivo «se comió» reproduce bien la idea de consumo total sin forzar un sujeto personal masculino ni perder la imagen concreta.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo
  - la totalidad de
  lexicon: HALOT
  rationale: El cuantificador expresa totalidad. En español, «toda» concuerda naturalmente con «vegetación» y mantiene el sentido inclusivo de totalidad.
- source_word: עֵשֶׂב
  english_pob_choice: vegetation
  chosen_spanish: vegetación
  alternatives_spanish:
  - hierba
  - pasto
  - grama
  lexicon: HALOT
  rationale: El término hebreo puede significar desde «hierba» hasta crecimiento vegetal en general. Dado el contexto de devastación agrícola, «vegetación» conserva el alcance amplio que adoptó la POB en inglés y evita restringir indebidamente el sentido a un tipo de planta.
- source_word: בְּאַרְצָם
  english_pob_choice: in their land
  chosen_spanish: de su tierra
  alternatives_spanish:
  - en su tierra
  - en su país
  lexicon: HALOT
  rationale: El hebreo señala localización territorial. «De su tierra» funciona como complemento natural de alcance posesivo en español y enlaza bien con el paralelismo del verso, aunque «en su tierra» también sería posible.
- source_word: פְּרִי
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - producto
  - producción
  - cosecha
  lexicon: HALOT
  rationale: «Fruto» conserva la imagen agrícola directa del hebreo y puede abarcar el producto de la tierra sin volver el texto demasiado interpretativo.
- source_word: אַדְמָתָם
  english_pob_choice: their ground
  chosen_spanish: su suelo
  alternatives_spanish:
  - su tierra
  - su terreno
  - su suelo agrícola
  lexicon: HALOT
  rationale: אֲדָמָה alude a tierra arable, suelo o terreno cultivable. «Su suelo» distingue este término de אֶרֶץ en la primera cola y refleja la focalización agrícola del verso. «Su tierra» sería más general, pero perdería esa distinción.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail en inglés: mantiene el sujeto singular implícito del verbo, conserva el paralelismo entre la tierra y el suelo, y reproduce la amplitud semántica de עֵשֶׂב sin reducirla a «hierba» exclusivamente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la distinción entre «tierra» (אֶרֶץ) y «suelo» (אֲדָמָה) para respetar el paralelismo hebreo.
  - «Vegetación» es un término neutro y readable en español moderno, coherente con la opción óptima de la POB inglesa.
