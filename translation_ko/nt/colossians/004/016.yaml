id: COL.4.16
reference: Colossians 4:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ὅταν ἀναγνωσθῇ παρ’ ὑμῖν ἡ ἐπιστολή, ποιήσατε ἵνα καὶ ἐν τῇ ⸀Λαοδικέων ἐκκλησίᾳ ἀναγνωσθῇ, καὶ τὴν ἐκ Λαοδικείας ἵνα καὶ ὑμεῖς ἀναγνῶτε.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/004/016.yaml
  text: And when this letter has been read among you, see that it is also read in the church of the Laodiceans, and that you also read the one from Laodicea.
translation:
  language: ko
  text: 그리고 이 편지가 여러분 가운데서 낭독된 후에는, 라오디게아인들의 회중에서도 낭독되게 하시고, 또한 여러분도 라오디게아에서 온[a] 편지를 낭독하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「라오디게아에서 온 것」의 정체는 불확실하다. 라오디게아에 있는(혹은 그곳을 거쳐 오는) 편지를 가리킬 수 있다.
    reason: cultural_note
lexical_decisions:
- source_word: ὅταν ἀναγνωσθῇ παρ’ ὑμῖν ἡ ἐπιστολή
  english_pob_choice: when this letter has been read among you
  chosen_korean: 이 편지가 여러분 가운데서 낭독된 후에는
  alternatives_korean:
  - 이 편지가 여러분 사이에서 읽힌 후에는
  lexicon: BDAG
  rationale: ἀναγινώσκω의 초기 교회 공동체적 「낭독」 어감 살림.
- source_word: ποιήσατε ἵνα ... ἀναγνωσθῇ
  english_pob_choice: see that it is also read
  chosen_korean: ... 낭독되게 하시고
  alternatives_korean:
  - 반드시 낭독되도록 하시고
  lexicon: BDAG
  rationale: ποιέω + ἵνα 관용을 「~되게 하다」로 옮긴다.
- source_word: ἐν τῇ Λαοδικέων ἐκκλησίᾳ
  english_pob_choice: in the church of the Laodiceans
  chosen_korean: 라오디게아인들의 회중에서도
  alternatives_korean:
  - 라오디게아 교회에서도
  lexicon: BDAG
  rationale: 가정·지역 모임을 가리키므로 글로사리 기본 「회중」 사용.
- source_word: τὴν ἐκ Λαοδικείας ... ὑμεῖς ἀναγνῶτε
  english_pob_choice: that you also read the one from Laodicea
  chosen_korean: 여러분도 라오디게아에서 온 편지를 낭독하십시오
  alternatives_korean:
  - 라오디게아에서 오는 편지도 너희가 읽으라
  lexicon: BDAG
  rationale: 헬라어 생략된 「편지」를 한국어에서 보충하여 명료성을 살린다.
