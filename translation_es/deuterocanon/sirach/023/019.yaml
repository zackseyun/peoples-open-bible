  to: y el temor a él está en los ojos de los hombres[a],
  rationale: Se hace una reparación menor para mejorar la naturalidad del español sin apartarse de la ambigüedad y compresión del griego ni del audit trail inglés. 'El temor a él' es más claro y eclesialmente legible que 'el temor de él'.
