translation:
  language: es
  text: ¿Quién es el hombre sabio que entiende esto? ¿A quién ha hablado la boca de Yahvé[a], para que lo declare? ¿Por qué ha perecido[b] la tierra, asolada como el desierto, sin que nadie pase por ella?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la boca de Yahvé», un modismo profético para expresar el habla directa de Yahvé.'
    reason: cultural_note
  - marker: b
    text: O «ha sido arruinada» para «ha perecido».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי הָאִישׁ הֶחָכָם
  english_pob_choice: Who is the wise man
  chosen_spanish: ¿Quién es el hombre sabio
  alternatives_spanish:
  - ¿Quién es el sabio
  - ¿Quién es el hombre que es sabio
  lexicon: HALOT
  rationale: Conservo el singular masculino explícito de הָאִישׁ הֶחָכָם como «el hombre sabio», manteniendo la fuerza representativa sin neutralizarla a «persona».
- source_word: וְיָבֵן אֶת זֹאת
  english_pob_choice: who understands this
  chosen_spanish: que entiende esto
  alternatives_spanish:
  - que pueda entender esto
  - que comprende esto
  lexicon: HALOT
  rationale: En español, «entiende» comunica de forma natural la capacidad o comprensión requerida por el contexto interrogativo, sin forzar una perífrasis modal.
- source_word: פִּי יְהוָה
  english_pob_choice: the mouth of Yahweh
  chosen_spanish: la boca de Yahvé
  alternatives_spanish:
  - la boca de Yahveh
  - la boca del SEÑOR
  lexicon: HALOT
  rationale: Sigo el valor idiomático del hebreo y la norma del proyecto para יְהוָה como «Yahvé», reteniendo la imagen profética literal de «boca» para no aplanar la expresión a una simple mención de hablar.
- source_word: וְיַגִּדָהּ
  english_pob_choice: that he may declare it
  chosen_spanish: para que lo declare
  alternatives_spanish:
  - y lo declare
  - para que lo diga
  lexicon: HALOT
  rationale: «Declarar» preserva mejor el matiz público/profético del causativo hebreo que un simple «decir».
- source_word: עַל מָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo
  - ¿Por cuál razón
  lexicon: HALOT
  rationale: La pregunta idiomática pide la causa de la desolación; «¿Por qué?» es la equivalencia española más natural y precisa.
- source_word: אָבְדָה הָאָרֶץ
  english_pob_choice: has the land perished
  chosen_spanish: ha perecido la tierra
  alternatives_spanish:
  - se ha arruinado la tierra
  - ha sido destruida la tierra
  lexicon: HALOT
  rationale: «Perecido» conserva el peso solemne de אָבַד sin especificar más de lo que el texto exige.
- source_word: נִצְּתָה
  english_pob_choice: laid waste
  chosen_spanish: asolada
  alternatives_spanish:
  - devastada
  - desolada
  lexicon: HALOT
  rationale: «Asolada» expresa la devastación resultante y mantiene un tono bíblico claro en español.
- source_word: כַמִּדְבָּר
  english_pob_choice: like the wilderness
  chosen_spanish: como el desierto
  alternatives_spanish:
  - como el desierto yermo
  - como el páramo
  lexicon: HALOT
  rationale: Aunque «wilderness» puede ser «el desierto» en español bíblico, aquí la comparación describe desolación; «desierto» comunica bien esa imagen en castellano corriente.
- source_word: מִבְּלִי עֹבֵר
  english_pob_choice: with no one passing through
  chosen_spanish: sin nadie que pase por ella
  alternatives_spanish:
  - sin que nadie pase por ella
  - sin nadie que atraviese por ella
  lexicon: HALOT
  rationale: La construcción española natural necesita un antecedente implícito femenino referido a «la tierra»; «pase por ella» mantiene la idea de tránsito de forma fiel y fluida.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El proyecto exige transliterar el Tetragrámaton como «Yahvé». Mantengo esa forma en la voz profética para conservar el nombre propio divino, no un sustituto titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Conservación del idiomismo profético «la boca de Yahvé»
  english_pob_reading: Retained in the main text
  chosen_spanish_reading: la boca de Yahvé
  alternative_spanish_readings:
  - Yahvé habló
  - la palabra de Yahvé
  rationale: El hebreo usa una metáfora corporal que subraya la inmediatez y autoridad del habla divina. En español, retenerla evita perder esa carga profética.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Forma masculina singular הָאִישׁ הֶחָכָם
  english_pob_reading: wise man
  chosen_spanish_reading: el hombre sabio
  alternative_spanish_readings:
  - el sabio
  - la persona sabia
  rationale: Conservo la forma masculina singular del hebreo y su valor representativo, en línea con la política de precisión de género del proyecto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Ajusté la primera pregunta para reflejar con más naturalidad la construcción hebrea interrogativa, manteniendo el paralelismo entre las dos preguntas y la imagen profética de «la boca de Yahvé». Las notas se anclan ahora explícitamente en el texto con [a], [b] y [c].
  spanish_consistency_notes:
  - Uso «Yahvé» de forma consistente para יְהוָה.
  - Conservo «la boca de Yahvé» como idiomismo profético, no como paráfrasis.
  - «La tierra» se retoma con el pronombre femenino «ella» en la clausula final por concordancia natural en español.
  - Mantengo un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
