    rationale: La nota [a] está colocada sobre ‘dijo’, pero explica una alternativa del verbo יָדוֹן; la nota [b] está sobre ‘permanecerá’, pero explica ‘porque él también es carne’. Esto confunde al lector y no cumple la disciplina de anclar cada nota en la palabra o frase pertinente.
  - severity: medium
