base_translation:
  language: en
  yaml_path: translation/ot/daniel/006/027.yaml
  text: A decree is issued by me[a], that in all the dominion of my kingdom people are to tremble and fear before the God of Daniel, for he is the living God, enduring forever; and his kingdom will not be destroyed[c][b], and his dominion will be to the end.
  footnotes:
