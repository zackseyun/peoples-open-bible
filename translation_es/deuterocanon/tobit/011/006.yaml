translation:
  language: es
  text: 'Y ella lo vio venir[a] y dijo a su padre: «Mira, mi hijo viene, y el hombre que fue con él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «lo percibió viniendo». En contexto, el sentido es que ella lo notó cuando se acercaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: προενόησεν
  english_pob_choice: noticed
  chosen_spanish: lo vio venir
  alternatives_spanish:
  - lo notó venir
  - se dio cuenta de que venía
  - lo percibió venir
  lexicon: LSJ
  rationale: El verbo griego aquí describe la percepción de Tobit acercándose desde lejos; en español, «lo vio venir» comunica de manera natural esa observación visual sin sugerir una identificación más cargada como «reconoció».
- source_word: ἐρχόμενον
  english_pob_choice: coming
  chosen_spanish: venir
  alternatives_spanish:
  - acercarse
  - llegar
  lexicon: BDAG
  rationale: El participio presente indica movimiento hacia el hablante; «venir» conserva la sencillez y el valor direccional del griego.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Mira, pues
  - Ve
  lexicon: BDAG
  rationale: La interjección deíctica pide atención inmediata; «Mira» suena natural y conserva el impulso exclamativo del original.
- source_word: ὁ υἱός μου
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo mío
  lexicon: BDAG
  rationale: Equivalencia directa y natural en español para la relación filial expresada en el griego.
- source_word: ὁ ἄνθρωπος
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el compañero
  lexicon: BDAG
  rationale: El texto griego dice literalmente «el hombre»; mantener esa expresión evita introducir una identificación relacional que el original no formula aquí.
- source_word: ὁ πορευθεὶς μετʼ αὐτοῦ
  english_pob_choice: who went with him
  chosen_spanish: que fue con él
  alternatives_spanish:
  - que viajó con él
  - que anduvo con él
  lexicon: BDAG
  rationale: El participio aoristo remite al acompañamiento en el viaje anterior. «Fue con él» es breve, fiel y claro en español; «viajó con él» sería una alternativa algo más explícita.
translation_notes:
  revision_awareness: La versión inglesa revisó «recognized» a «noticed» para reflejar mejor προενόησεν como percepción/avistamiento desde lejos, no como identificación previa. El español sigue esa revisión con una formulación visual directa («lo vio venir»).
  spanish_consistency_notes:
  - Se mantuvo «hijo» y «hombre» de forma literal para respetar el griego.
  - Se evitó «compañero» porque el texto no lo dice explícitamente.
  - La voz narrativa femenina se conserva con «Y ella».
  - La puntuación de diálogo usa comillas españolas y dos puntos tras el verbo de habla, según uso editorial moderno.
