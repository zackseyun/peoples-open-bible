    text: 'O: «no quebrarán un hueso de él».'
    reason: lexical_alternative
  - marker: b
    text: La cláusula sobre el hueso no quebrado recuerda las instrucciones de la Pascua en Éxodo 12:46.
    reason: cross_reference
