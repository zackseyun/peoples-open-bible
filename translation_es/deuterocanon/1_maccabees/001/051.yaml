translation:
  language: es
  text: De acuerdo con todas estas palabras escribió a su reino entero[a], y nombró supervisores sobre todo el pueblo; y mandó a las ciudades de Judá ofrecer sacrificios, ciudad por ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “escribió a su reino”. El dativo griego puede traducirse de forma más breve; “entero” explicita la amplitud distributiva sugerida por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ πάντας τοὺς λόγους τούτους
  english_pob_choice: According to all these words
  chosen_spanish: De acuerdo con todas estas palabras
  alternatives_spanish:
  - Conforme a todas estas palabras
  - Según todas estas palabras
  lexicon: LSJ
  rationale: λόγοι conserva el valor de “palabras” y κατὰ expresa conformidad. “De acuerdo con” suena natural en español y mantiene el vínculo formal con la proclamación previa sin perder el matiz de correspondencia.
- source_word: ἔγραψεν τῇ βασιλείᾳ αὐτοῦ
  english_pob_choice: he wrote to his whole kingdom
  chosen_spanish: escribió a su reino entero
  alternatives_spanish:
  - escribió a su reino
  - emitió un decreto escrito a su reino
  lexicon: LSJ
  rationale: El dativo señala el ámbito destinatario de la escritura. “Reino entero” refleja la amplitud contextual que la POB inglesa explicitó con “whole”, sin convertir el verbo en una paráfrasis administrativa más fuerte de lo que exige el griego.
- source_word: ἐποίησεν ἐπισκόπους
  english_pob_choice: he appointed overseers
  chosen_spanish: puso inspectores
  alternatives_spanish:
  - nombró supervisores
  - puso overseers
  lexicon: LSJ
  rationale: ἐπίσκοποι aquí son funcionarios de vigilancia real, no “obispos” eclesiásticos. “Inspectores” preserva la función supervisora y evita una lectura anacrónica; “puso” funciona de manera idiomática en español para un nombramiento administrativo.
- source_word: ἐπὶ πάντα τὸν λαόν
  english_pob_choice: over all the people
  chosen_spanish: sobre todo el pueblo
  alternatives_spanish:
  - sobre todo el pueblo
  - sobre toda la gente
  lexicon: LSJ
  rationale: ἐπί con acusativo marca autoridad o jurisdicción. “Sobre todo el pueblo” conserva la relación de supervisión sobre la totalidad del conjunto gobernado.
- source_word: ἐνετείλατο
  english_pob_choice: he commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - mandó y dispuso
  lexicon: LSJ
  rationale: El verbo expresa mandato autoritativo. “Mandó” mantiene la fuerza del comando real en un español claro y sobrio.
- source_word: ταῖς πόλεσιν Ἰούδα
  english_pob_choice: the cities of Judah
  chosen_spanish: a las ciudades de Judá
  alternatives_spanish:
  - a las ciudades de Judá
  - a las ciudades de Judea
  lexicon: LSJ
  rationale: La referencia geográfica-política es Judá. “Ciudades de Judá” es la forma más directa y fiel; la preposición con dativo implícito queda explícita en español por exigencia sintáctica.
- source_word: θυσιάζειν
  english_pob_choice: to offer sacrifices
  chosen_spanish: ofrecer sacrificios
  alternatives_spanish:
  - sacrificar
  - realizar sacrificios
  lexicon: LSJ
  rationale: El infinitivo expresa la acción cultual de sacrificar. “Ofrecer sacrificios” es idiomático en español y mantiene explícita la dimensión ritual.
- source_word: κατὰ πόλιν καὶ πόλιν
  english_pob_choice: city by city
  chosen_spanish: ciudad por ciudad
  alternatives_spanish:
  - en cada ciudad
  - de ciudad en ciudad
  lexicon: LSJ
  rationale: La expresión distributiva indica repetición local en cada ciudad individual. “Ciudad por ciudad” preserva esa fuerza distributiva de manera natural en español.
theological_decisions:
- issue: ἐπισκόπους no debe leerse con sentido eclesiástico posterior
  english_pob_reading: overseers
  chosen_spanish_reading: inspectores
  alternative_spanish_readings:
  - obispos
  - supervisores
  rationale: El contexto es la imposición administrativa del rey, no un oficio de iglesia. “Inspectores” evita importar una teología o eclesiología posterior y conserva el sentido de vigilancia/inspección propio del pasaje.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: He revisado el paquete fuente griego y el auditorial inglés; no se introdujeron cambios sustantivos respecto de la lectura aprobada. La única expansión interpretativa retenida en español es “reino entero”, paralela a la expansión inglesa “whole kingdom”.
  spanish_consistency_notes:
  - Se mantiene “Judá” para la referencia territorial, en continuidad con el griego Ἰούδα.
  - Se evita “obispos” por anacronismo; la terminología administrativa se mantiene neutral.
  - “Ofrecer sacrificios” conserva el matiz cultual sin forzar un calco verbal.
  - La puntuación reproduce la estructura de tres miembros coordinados del griego.
