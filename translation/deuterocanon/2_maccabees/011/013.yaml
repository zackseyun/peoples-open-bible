theological_decisions:
- issue: Reference to divine aid in battle
  chosen_reading: because the mighty God was fighting alongside them
  alternative_readings:
  - with the mighty God as their ally
  - because God, who is mighty, was helping them
  rationale: The text explicitly attributes the Hebrews' unconquerable status to God's active support. The rendering preserves that theological claim without softening it into mere providence or expanding it beyond the military context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
