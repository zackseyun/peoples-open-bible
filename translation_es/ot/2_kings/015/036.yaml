translation:
  language: es
  text: El resto de los hechos de Jotam, que hizo, ¿no están escritos[a] en el libro de las Crónicas[b] de los reyes de Judá?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘registrados’ en vez de ‘escritos’; el participio hebreo es literalmente ‘escritos’, pero el sentido es que estos hechos fueron asentados en un registro real oficial.
    reason: lexical_alternative
  - marker: b
    text: ‘Libro de las Crónicas’ alude a una fuente real de anales, no necesariamente al libro bíblico de Crónicas.
    reason: cross_reference
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest
  chosen_spanish: El resto
  alternatives_spanish:
  - Y el resto
  - Ahora el resto
  - Lo demás
  lexicon: HALOT
  rationale: יֶתֶר expresa la idea de resto o lo que queda. En español, ‘El resto’ conserva la fórmula regnal sin forzar un adverbio innecesario como ‘now’; el conector queda implícito por el flujo natural de la frase.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - hechos y obras
  - deeds
  lexicon: HALOT
  rationale: En esta fórmula histórica, דִּבְרֵי se refiere a las acciones registradas del rey. ‘Hechos’ es natural en español y mantiene mejor el sentido de hazañas o acciones consignadas que un calco como ‘palabras’.
- source_word: יוֹתָם
  english_pob_choice: Jotham
  chosen_spanish: Jotam
  alternatives_spanish:
  - Jotán
  lexicon: convención hispana de nombres bíblicos
  rationale: Se usa la forma hispana tradicional y ampliamente inteligible ‘Jotam’, que corresponde al nombre propio del rey en español bíblico.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: which he did
  chosen_spanish: y lo que hizo
  alternatives_spanish:
  - que hizo
  - lo que realizó
  - lo que llevó a cabo
  lexicon: HALOT
  rationale: 'La cláusula relativa nombra el contenido del ‘resto’: lo que hizo. ‘Y lo que hizo’ reproduce la función de la oración sin una rigidez poco natural en español.'
- source_word: הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no están escritos
  alternatives_spanish:
  - ¿no están registrados
  - ¿no se hallan escritos
  lexicon: HALOT
  rationale: כְּתוּבִים es literalmente ‘escritos’; se mantiene ‘escritos’ en el texto principal por transparencia formal, conservando la pregunta retórica del hebreo.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - sobre el libro
  lexicon: HALOT
  rationale: Aunque el hebreo dice ‘sobre’ un libro/rollo, el español documental normal es ‘en el Libro’. La mayúscula señala el título de la fuente archivística.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: las Crónicas
  alternatives_spanish:
  - los anales
  - los registros de los días
  lexicon: HALOT
  rationale: Aquí la referencia es a un título o nombre de fuente cronística/annalística. ‘Crónicas’ preserva la designación tradicional y resulta idiomático en español.
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - para los reyes de Judá
  - perteneciente a los reyes de Judá
  lexicon: HALOT
  rationale: La construcción final indica pertenencia temática o de procedencia de la fuente; ‘de los reyes de Judá’ es la manera más clara y natural de expresar esa relación en español.
theological_decisions:
- issue: Naturaleza de la fuente citada ('Book of the Chronicles')
  english_pob_reading: refers to a royal annalistic source, not necessarily the biblical book of Chronicles.
  chosen_spanish_reading: alude a una fuente real de anales, no necesariamente al libro bíblico de Crónicas
  alternative_spanish_readings:
  - al libro bíblico de Crónicas
  - a un registro oficial de la corte
  rationale: Se conserva la distinción entre el título de la fuente histórica y el libro canónico posterior. Esto evita confundir la cita regnal con la obra bíblica de Crónicas y mantiene la precisión documental del pasaje.
  doctrine_reference: 2 Re 15:36; nota de fuente histórica/annalística
translation_notes:
  revision_awareness: El texto sigue de cerca la sintaxis y el contenido del hebreo masorético, alineado con la revisión inglesa sin cambios sustantivos. Se mantiene la fórmula regnal y la pregunta retórica, con adaptación natural al español y preservación de la referencia a un registro oficial.
  spanish_consistency_notes:
  - Se mantiene ‘Jotam’ como forma hispana del nombre propio.
  - Se conserva ‘escritos’ para כְּתוּבִים por transparencia, con la alternativa ‘registrados’ en nota.
  - ‘Crónicas’ se usa como nombre de fuente, no como identificación automática del libro canónico.
  - El verbo principal ‘hizo’/‘hechos’ conserva el registro sobrio y administrativo del resumen real.
