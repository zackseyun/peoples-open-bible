translation:
  language: es
  text: Porque Baruc, hijo de Nerías, te está incitando[a] contra nosotros, para entregarnos[b] en manos de los caldeos, para darnos muerte y para llevarnos al exilio a Babilonia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te está instigando» / «te está azuzando».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en manos de los caldeos», un modismo que expresa quedar bajo su poder.'
    reason: cultural_note
  - marker: c
    text: O «para deportarnos a Babilonia».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la acusación en continuidad con el contexto anterior. «Porque» conserva la función explicativa con español natural.
- source_word: בָּרוּךְ בֶּן נֵרִיָּה
  english_pob_choice: Baruch son of Neriah
  chosen_spanish: Baruc, hijo de Nerías
  alternatives_spanish:
  - Baruc, hijo de Nería
  - Baruc, hijo de Neriya
  lexicon: HALOT
  rationale: Se conservan los nombres propios en forma castellana habitual, con patronímico claro y publicable.
- source_word: מַסִּית
  english_pob_choice: is inciting
  chosen_spanish: te está incitando
  alternatives_spanish:
  - te está instigando
  - te está persuadiendo
  lexicon: HALOT
  rationale: El participio hifil expresa una acción hostil y manipuladora. «Incitar» mantiene mejor esa fuerza que «persuadir».
- source_word: אֹתְךָ בָּנוּ
  english_pob_choice: you against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - respecto de nosotros
  - en nuestra contra
  lexicon: HALOT
  rationale: La construcción comunica dirección hostil. En español, «contra nosotros» transmite de manera idiomática la relación implícita.
- source_word: לְמַעַן
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el propósito de
  lexicon: HALOT
  rationale: Marca finalidad. Aquí «para» reproduce la relación de propósito con naturalidad y sin añadir matiz innecesario.
- source_word: תֵּת אֹתָנוּ
  english_pob_choice: give us into the hand of
  chosen_spanish: entregarnos
  alternatives_spanish:
  - darnos
  - ponernos
  lexicon: HALOT
  rationale: La idea es la de poner a alguien bajo el poder de otro. «Entregarnos» capta bien el valor de rendición hostil sin sobrecargar la frase.
- source_word: בְיַד הַכַּשְׂדִּים
  english_pob_choice: into the hand of the Chaldeans
  chosen_spanish: en manos de los caldeos
  alternatives_spanish:
  - en poder de los caldeos
  - a manos de los caldeos
  lexicon: HALOT
  rationale: Se conserva el idiomatismo bíblico con una formulación natural en español. «En manos de» expresa la idea de quedar bajo su dominio.
- source_word: לְהָמִית אֹתָנוּ
  english_pob_choice: to put us to death
  chosen_spanish: para matarnos
  alternatives_spanish:
  - para darnos muerte
  - para quitarnos la vida
  lexicon: HALOT
  rationale: El causativo de מות aquí apunta a ejecución o muerte intencional. «Para matarnos» es directo y fiel al contexto.
- source_word: וּלְהַגְלוֹת אֹתָנוּ
  english_pob_choice: to carry us away into exile
  chosen_spanish: y para llevarnos cautivos
  alternatives_spanish:
  - y para deportarnos
  - y para llevarnos al exilio
  lexicon: HALOT
  rationale: El hifil de גלה implica expulsión forzada. «Llevarnos cautivos» preserva la idea de deportación/exilio con suficiente claridad en español.
- source_word: בָּבֶל
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hasta Babilonia
  - en Babilonia
  lexicon: HALOT
  rationale: Destino del exilio expresado de forma natural con la preposición de movimiento adecuada.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada ligeramente para preferir «give us into the hand of» por ser más natural que la formulación más literal. La redacción española sigue esa misma línea: conserva el modismo bíblico «en manos de» sin sonoridad rígida, y mantiene intacto el paralelismo final «para matarnos y para llevarnos cautivos a Babilonia».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere explícitamente; este versículo no lo contiene.
  - Se prefiere «caldeos» para כַּשְׂדִּים, en continuidad con el uso bíblico de Jeremías.
  - «Llevarnos cautivos» se eligió para conservar la fuerza de exilio/deportación sin perder fluidez en español.
  - No se emplea «Cristo» ni terminología teológica no presente en el pasaje.
