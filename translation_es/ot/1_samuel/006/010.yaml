translation:
  language: es
  text: 'Así hicieron los hombres: tomaron dos vacas lecheras[a] y las uncieron al carro, y encerraron a sus terneros[b] en la casa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vacas lecheras» traduce el sentido contextual de un animal que da leche y tiene crías; también puede entenderse como «vacas nodrizas» o «vacas que daban leche».
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente «sus hijos»; aquí se refiere a las crías de las vacas, es decir, a los terneros.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ ... כֵּן
  english_pob_choice: did so
  chosen_spanish: Así hicieron
  alternatives_spanish:
  - Lo hicieron así
  - Hicieron lo mismo
  lexicon: HALOT
  rationale: La expresión hebrea indica que actuaron conforme a lo que se les había mandado. «Así hicieron» conserva la concisión narrativa y suena natural en español sin perder el valor de conformidad.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - la gente
  - los varones
  lexicon: HALOT
  rationale: אֲנָשִׁים denota aquí a los actores masculinos concretos del relato. «Los hombres» respeta ese valor sin neutralizarlo innecesariamente.
- source_word: שְׁתֵּי פָרוֹת עָלוֹת
  english_pob_choice: two milk cows
  chosen_spanish: dos vacas lecheras
  alternatives_spanish:
  - dos vacas que daban leche
  - dos vacas nodrizas
  lexicon: HALOT
  rationale: פָרוֹת son vacas hembras, y עָלוֹת describe vacas que estaban dando leche y tenían crías dependientes. «Vacas lecheras» comunica con claridad esa condición y mantiene la relevancia contextual para la señal en la narración.
- source_word: וַיַּאַסְרוּם
  english_pob_choice: harnessed them
  chosen_spanish: las uncieron
  alternatives_spanish:
  - las ataron
  - las engancharon
  lexicon: HALOT
  rationale: El verbo אסר es «atar/asegurar», pero en el contexto de animales de tiro la acción funcional es uncir al vehículo. «Uncir» es más preciso y natural en español bíblico que una mera traducción literal de «atar».
- source_word: בָּעֲגָלָה
  english_pob_choice: to the cart
  chosen_spanish: al carro
  alternatives_spanish:
  - a la carreta
  - al carruaje
  lexicon: HALOT
  rationale: עֲגָלָה designa el vehículo de carga. «Carro» es el equivalente español más simple y entendido ampliamente en este contexto; evita introducir una imagen más específica de la que el hebreo exige.
- source_word: וְאֶת בְּנֵיהֶם
  english_pob_choice: their calves
  chosen_spanish: a sus terneros
  alternatives_spanish:
  - a sus crías
  - a sus hijos
  lexicon: HALOT
  rationale: Aunque בְּנֵיהֶם literalmente dice «sus hijos», con vacas como antecedente se refiere a sus crías. «Terneros» explicita el referente zoológico que el contexto requiere y preserva la tensión literal que el hebreo expresa indirectamente.
- source_word: כָּלוּ בַּבָּיִת
  english_pob_choice: shut up their calves in the house
  chosen_spanish: encerraron ... en la casa
  alternatives_spanish:
  - los confinaron en la casa
  - los dejaron encerrados en la casa
  lexicon: HALOT
  rationale: כָּלוּ expresa la acción de cerrar o retener dentro. «Encerraron» transmite la idea de restringirlos. Se conserva «en la casa» porque el hebreo dice literalmente בַּבָּיִת, aunque en contexto pueda aludir a una dependencia o establo.
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo masorético con alta concordancia con el audit trail en inglés. Se mantuvieron las decisiones clave del POB: las vacas como animales lecheros/nodrizos, la acción de unir al vehículo, y la referencia literal «en la casa» para בַּבָּיִת. No se registraron revisiones textuales adicionales en el expediente.'
  spanish_consistency_notes:
  - Se prefirió «vacas lecheras» por coherencia con el valor contextual de עָלוֹת y con el uso del POB inglés «milk cows».
  - Se usó «uncieron» para conservar una acción funcional equivalente a «harnessed» en el contexto de animales de tiro.
  - Se mantuvo la literalidad de «en la casa» porque el hebreo no especifica «establo» o «corral», aunque esa pueda ser la referencia práctica.
