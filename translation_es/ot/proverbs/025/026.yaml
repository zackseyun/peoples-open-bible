revisions:
- from: Como un manantial enturbiado y una fuente corrompida es el justo que cede ante el malvado.
  to: Como un manantial enturbiado y una fuente contaminada es el justo que cede ante el malvado.[a]
  rationale: Se cambia 'corrompida' por 'contaminada' para expresar de forma más natural en español la imagen de una fuente dañada/poluta. Se añade una nota para conservar la alternativa léxica y exegética documentada en el English POB respecto de נִרְפָּשׂ y מָט, así como la variante 'corrompida' para מָשְׁחָת dentro de esa alternativa. No se requieren cambios mayores de estructura ni de sentido.
