translation:
  language: es
  text: Sin pupila[a], falta la luz; y sin conocimiento, falta la sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego conservado lee un dicho distinto: «Un corazón duro estará cargado de dolores, y el pecador añadirá pecados sobre pecados».'
    reason: textual_variant
lexical_decisions:
- source_word: בְּאֵין
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - en ausencia de
  - cuando no hay
  lexicon: HALOT
  rationale: El hebreo con אין expresa ausencia o falta. En español, 'sin' es la forma más natural y compacta para conservar el paralelismo proverbial.
- source_word: אִישׁוֹן
  english_pob_choice: pupil
  chosen_spanish: pupila
  alternatives_spanish:
  - ojo
  - esfera del ojo
  - niñita del ojo
  lexicon: HALOT
  rationale: En el contexto de 'luz', el término designa la pupila. 'Pupila' conserva el sentido anatómico y es inteligible en español moderno; evita una paráfrasis extraña como 'niñita del ojo'.
- source_word: יֶחְסַר / תֶּחְסַר
  english_pob_choice: is lacking
  chosen_spanish: falta
  alternatives_spanish:
  - carece
  - está privado de
  - se le quita
  lexicon: HALOT
  rationale: חסר expresa carencia. 'Falta' reproduce bien esa idea y permite repetir la misma forma en ambos miembros, manteniendo la simetría del verso.
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: la luz
  alternatives_spanish:
  - brillo
  - claridad
  lexicon: HALOT
  rationale: '''Luz'' es el sentido básico y la imagen concreta del refrán. En español, ''la luz'' suena natural en relación con la pupila y la visión.'
- source_word: דַעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - saber
  lexicon: HALOT
  rationale: '''Conocimiento'' corresponde bien al matiz léxico principal y mantiene el paralelismo con ''sabiduría'' sin fusionar ambos conceptos.'
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sabio juicio
  lexicon: HALOT
  rationale: El sentido sapiencial estándar es 'sabiduría'. Es la opción más fiel y estable en español bíblico contemporáneo.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el testimonio griego de Sirácida 3:27
  english_pob_reading: 'The extant Greek witness reads a different saying here: ''A hard heart will be weighed down with pains, and the sinner will add sins upon sins.'''
  chosen_spanish_reading: Traducir el hebreo como texto principal y señalar en nota que el griego conserva un dicho sustancialmente distinto.
  alternative_spanish_readings:
  - '''Un corazón duro será cargado de dolores, y el pecador añadirá pecados sobre pecados.'''
  rationale: La política del proyecto da primacía al hebreo donde se conserva. Aquí la diferencia con el griego no es menor, sino de proverbio completo, así que no debe gobernar el texto principal; sin embargo, merece preservarse por transparencia textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácida desde el hebreo donde exista; usar el griego en vista'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no hacía falta cambio alguno; por eso se conserva la solución ya acordada: texto hebreo como base principal y nota de variante griega por transparencia.'
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' para חָכְמָה y 'conocimiento' para דַעַת para no fusionar ambos términos.
  - '''Pupila'' se usa por su valor anatómico claro y por la decisión inglesa auditada.'
  - La nota reproduce la discrepancia textual sin dejar que el griego desplace el hebreo en el texto principal.
