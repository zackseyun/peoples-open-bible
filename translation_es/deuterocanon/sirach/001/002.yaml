translation:
  language: es
  text: ¿Quién podrá contar la arena de los mares, las gotas de lluvia y los días de la eternidad[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los días de la era' o 'los días de antaño'. El hebreo עוֹלָם puede denotar eternidad, una era o tiempo antiguo; el paralelo griego apoya un sentido de duración inconmensurable.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹל / ἄμμον
  english_pob_choice: sand
  chosen_spanish: arena
  alternatives_spanish:
  - sand
  - granos de arena
  lexicon: HALOT; LXX ἄμμος
  rationale: En español, 'arena' expresa mejor el sustantivo colectivo que el inglés 'sand' y mantiene la imagen bíblica de una cantidad innumerable. 'Granos de arena' especifica demasiado lo que el hebreo y el griego presentan de forma colectiva.
- source_word: יַמִּים / θαλασσῶν
  english_pob_choice: of the seas
  chosen_spanish: de los mares
  alternatives_spanish:
  - del mar
  - de las aguas
  lexicon: HALOT; LXX θαλάσσαι
  rationale: El plural se conserva en español como en el hebreo y el griego. 'De los mares' mantiene la amplitud poética del original sin reducir la imagen a un solo mar.
- source_word: נִטְפֵי מָטָר / σταγόνας ὑετοῦ
  english_pob_choice: the drops of rain
  chosen_spanish: las gotas de lluvia
  alternatives_spanish:
  - las gotas de la lluvia
  - las gotas del aguacero
  lexicon: HALOT; LXX σταγόνας ὑετοῦ
  rationale: La construcción hebrea y el paralelo griego nombran gotas asociadas a la lluvia. 'Gotas de lluvia' es la formulación natural en español y conserva la imagen concreta.
- source_word: וִימוֹת עוֹלָם / ἡμέρας αἰῶνος
  english_pob_choice: the days of eternity
  chosen_spanish: los días de la eternidad
  alternatives_spanish:
  - los días del siglo
  - los días de la era
  - los días de antaño
  lexicon: HALOT; LXX αἰῶνος
  rationale: Se conserva el valor de duración inmensurable que la tradición inglesa expresó como 'eternity'. En español, 'la eternidad' comunica bien la hipérbole sapiencial sin borrar la ambigüedad lexical de עוֹלָם, que también puede abarcar 'edad' o 'tiempo antiguo'.
- source_word: מִי יִמְנֶה / τίς ἐξαριθμήσει
  english_pob_choice: Who can count
  chosen_spanish: ¿Quién podrá contar?
  alternatives_spanish:
  - ¿Quién puede contar?
  - ¿Quién podrá enumerar?
  lexicon: HALOT; LSJ ἐξαριθμέω
  rationale: La pregunta retórica expresa imposibilidad más que mera capacidad futura. 'Podrá contar' transmite ese matiz natural en español y corresponde al valor retórico del hebreo y del griego.
theological_decisions:
- issue: Sentido de עוֹלָם / αἰῶνος en una hipérbole sapiencial
  english_pob_reading: '''the days of eternity'' with note that the Hebrew can also mean ''the days of the age'' or ''the days of old'''
  chosen_spanish_reading: '''los días de la eternidad'', con la misma apertura a ''los días de la era'' o ''los días de antaño'' en nota'
  alternative_spanish_readings:
  - los días de la era
  - los días de antaño
  - los días del siglo
  rationale: La frase no requiere resolver el campo semántico de עוֹלָם en una sola dirección. La opción principal preserva la fuerza de duración inconmensurable que apoya el paralelo griego, mientras la nota mantiene vivas las alternativas documentadas por la POB inglesa.
  doctrine_reference: Mantener la tensión léxica del texto sapiencial; no convertir una hipérbole poética en una definición doctrinal sobre 'eternidad'.
translation_notes:
  revision_awareness: La revisión más reciente del expediente inglés no introdujo cambios; el borrador español sigue el mismo criterio de equivalencia óptima y conserva la nota lexical sobre עוֹלָם.
  spanish_consistency_notes:
  - 'Se conserva la pregunta retórica en singular: ''¿Quién podrá contar?'''
  - Se mantiene el plural de 'mares' conforme al hebreo y al griego.
  - '''Eternidad'' se usa como equivalente principal de la hipérbole, no como afirmación doctrinal técnica.'
  - La nota al pie reproduce en español las alternativas documentadas en el audit trail inglés.
