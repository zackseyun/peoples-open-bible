translation:
  language: es
  text: La circuncisión, en efecto, aprovecha[a] si practicas la ley[b]; pero si eres transgresor de la ley[c], tu circuncisión ha llegado a ser incircuncisión[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'es de valor' para 'aprovecha'.
    reason: lexical_alternative
  - marker: b
    text: O 'si guardas la ley'.
    reason: lexical_alternative
  - marker: c
    text: O 'quebrantador de la ley' o 'infractor de la ley'.
    reason: lexical_alternative
  - marker: d
    text: Lit. 'tu circuncisión ha llegado a ser incircuncisión'; es decir, la circuncisión del pacto pierde su valor cuando se transgrede la ley.
    reason: cultural_note
lexical_decisions:
- source_word: Περιτομὴ
  english_pob_choice: Circumcision
  chosen_spanish: la circuncisión
  alternatives_spanish:
  - Circuncisión
  - la circuncisión ritual
  lexicon: BDAG
  rationale: Se conserva el sustantivo abstracto del rito/pacto, sin convertirlo en una paráfrasis. En español, el artículo ayuda a naturalizar la construcción y mantiene la categoría covenantal que contrasta con ἀκροβυστία.
- source_word: μὲν γὰρ
  english_pob_choice: indeed
  chosen_spanish: en efecto
  alternatives_spanish:
  - ciertamente
  - de hecho
  lexicon: BDAG
  rationale: La combinación introduce una afirmación que queda en tensión con la cláusula adversativa siguiente. 'En efecto' comunica bien el matiz discursivo sin sobrecargar la frase.
- source_word: ὠφελεῖ
  english_pob_choice: is beneficial
  chosen_spanish: aprovecha
  alternatives_spanish:
  - es beneficiosa
  - sirve
  lexicon: BDAG
  rationale: '''Aprovecha'' expresa utilidad o beneficio real de manera natural en español y conserva la idea de valor efectivo sin sonar demasiado técnico.'
- source_word: ἐὰν νόμον πράσσῃς
  english_pob_choice: if you practice the law
  chosen_spanish: si practicas la ley
  alternatives_spanish:
  - si guardas la ley
  - si haces la ley
  lexicon: BDAG
  rationale: Se mantiene el valor de πράσσω como hacer/practicar, evitando sustituirlo automáticamente por 'guardar', que sería más interpretativo. 'La ley' preserva la referencia directa al νόμος del griego.
- source_word: παραβάτης νόμου
  english_pob_choice: a transgressor of the law
  chosen_spanish: transgresor de la ley
  alternatives_spanish:
  - violador de la ley
  - quebrantador de la ley
  - infractor de la ley
  lexicon: BDAG
  rationale: '''Transgresor'' conserva el tono formal y forense de παραβάτης y encaja bien con el paralelo legal de νόμος. Se evita ''quebrantador'' por ser más idiomático pero menos transparente al trasfondo jurídico.'
- source_word: ἡ περιτομή σου
  english_pob_choice: your circumcision
  chosen_spanish: tu circuncisión
  alternatives_spanish:
  - la circuncisión que tienes
  - tu circuncisión ritual
  lexicon: BDAG
  rationale: Se mantiene el posesivo directo y la referencia concreta del rito, preservando la fuerza retórica del apóstol.
- source_word: ἀκροβυστία
  english_pob_choice: uncircumcision
  chosen_spanish: incircuncisión
  alternatives_spanish:
  - no circuncisión
  - uncircuncisión
  lexicon: BDAG
  rationale: '''Incircuncisión'' es el correlato más natural y formal en español para mantener el contraste con ''circuncisión''. También preserva mejor la oposición terminológica del pasaje que una glosa explicativa.'
- source_word: γέγονεν
  english_pob_choice: has become
  chosen_spanish: ha llegado a ser
  alternatives_spanish:
  - se ha convertido en
  - ha venido a ser
  - ha pasado a ser
  lexicon: BDAG
  rationale: El perfecto indica un estado resultante. 'Ha llegado a ser' conserva la idea de cambio efectivo sin suavizar la reversión retórica del texto.
theological_decisions:
- issue: Si la última cláusula debe explicitar el sentido pactal o dejar la reversión en forma concreta
  english_pob_reading: Retain the concrete covenantal expression 'your circumcision has become uncircumcision' in the main text.
  chosen_spanish_reading: Mantener la expresión concreta 'tu circuncisión ha llegado a ser incircuncisión' en el texto principal.
  alternative_spanish_readings:
  - tu circuncisión cuenta como incircuncisión
  - tu circuncisión es tenida por incircuncisión
  rationale: El griego presenta una reversión tajante con γέγονεν; traducirla de modo más explicativo suavizaría la fuerza retórica. La formulación elegida deja visible la tensión teológica entre privilegio ritual y transgresión de la ley.
  doctrine_reference: Romanos 2:25; contraste pacto-señal y obediencia en el argumento paulino
translation_notes:
  revision_awareness: El expediente inglés quedó sin cambios en la última revisión y mostró acuerdo alto; no se detectaron ajustes sustantivos necesarios para el sentido del versículo.
  spanish_consistency_notes:
  - Se usó 'circuncisión/incircuncisión' para mantener el par terminológico del griego y del POB en inglés.
  - Se evitó 'guardar la ley' en el cuerpo principal porque el audit trail favorece 'practice the law' como matiz más literal de πράσσω.
  - '''Transgresor de la ley'' preserva el registro formal del griego mejor que opciones más coloquiales.'
  - Se mantuvo la reversión fuerte del final sin sustituirla por una equivalencia explicativa en el texto principal.
