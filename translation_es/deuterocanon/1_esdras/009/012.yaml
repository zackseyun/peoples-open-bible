    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «los principales» o «los que van delante»; se eligió «dirigentes» por claridad en español.
    reason: lexical_alternative
  - marker: c
    text: «Poblaciones» traduce el sentido comunitario de κατοικίαι; el griego se refiere a las comunidades o localidades de donde procedían, no solo a casas individuales.
    reason: lexical_alternative
  - marker: d
    text: La expresión final es breve y algo comprimida; el sentido es que comparezcan en un momento fijado o programado.
    reason: alternative_reading
  revision_rationale: Se ajustó el texto para reflejar con más precisión el contexto matrimonial ('esposas extranjeras'), el sentido de procedencia de οἱ ἐκ τῶν κατοικιῶν ἡμῶν ('los de nuestras poblaciones') y una formulación española más natural para ἐν τούτοις ('en estos asuntos'). Se conservaron las demás decisiones porque representan fielmente el griego y la auditoría inglesa.
