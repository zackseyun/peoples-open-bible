translation:
  language: es
  text: Y cuando la hayas visto[a], tú también serás reunido a tu pueblo, así como Aarón tu hermano fue reunido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, 'morirás' o 'serás reunido con tus antepasados'. El hebreo dice literalmente 'ser reunido a tu pueblo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתָה
  english_pob_choice: And when you have seen
  chosen_spanish: Y cuando la hayas visto
  alternatives_spanish:
  - y verás
  - y cuando hayas visto
  lexicon: HALOT
  rationale: El verbo ראה en esta secuencia apunta al acto de ver la tierra antes de la muerte de Moisés. El español temporal 'cuando la hayas visto' conserva la relación de antecedencia y suena natural en el contexto narrativo.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - eso
  - ello
  lexicon: HALOT
  rationale: El objeto femenino singular remite a la tierra mencionada en el contexto inmediato; en español, el pronombre femenino 'la' preserva esa referencia de forma más precisa y natural que 'eso' o 'ello'.
- source_word: וְנֶאֱסַפְתָּ
  english_pob_choice: you ... will be gathered
  chosen_spanish: serás reunido
  alternatives_spanish:
  - serás recogido
  - serás tomado
  lexicon: HALOT
  rationale: El nifal de אסף conserva la imagen idiomática de ser 'reunido'. En español, 'serás reunido' mantiene la metáfora sin reducirla de inmediato a 'morir'.
- source_word: אֶל עַמֶּיךָ
  english_pob_choice: to your people
  chosen_spanish: con tu pueblo
  alternatives_spanish:
  - a tu pueblo
  - entre tu pueblo
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'a tu pueblo', en español la expresión funeraria más fluida y idiomática es 'con tu pueblo'. Conserva el sentido relacional del hebreo sin perder naturalidad.
- source_word: גַּם אָתָּה
  english_pob_choice: you also
  chosen_spanish: tú también
  alternatives_spanish:
  - también tú
  - además tú
  lexicon: HALOT
  rationale: La partícula de énfasis se expresa de modo natural como 'tú también', subrayando que Moisés compartirá el mismo destino que Aarón.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: HALOT
  rationale: '''Así como'' introduce con claridad la comparación con Aarón y funciona bien en registro bíblico contemporáneo.'
- source_word: נֶאֱסַף
  english_pob_choice: was gathered
  chosen_spanish: fue reunido
  alternatives_spanish:
  - fue recogido
  - fue juntado
  lexicon: HALOT
  rationale: La repetición del mismo verbo idiomático se refleja con 'fue reunido' para mantener consistencia léxica y la imagen de reunión con el pueblo.
- source_word: אַהֲרֹן אָחִיךָ
  english_pob_choice: Aaron your brother
  chosen_spanish: Aarón, tu hermano
  alternatives_spanish:
  - Aarón tu hermano
  - tu hermano Aarón
  lexicon: HALOT
  rationale: Se conserva el nombre propio con la forma española estándar 'Aarón' y la aposición fraterna con puntuación natural en español.
theological_decisions:
- issue: El idioma funerario de 'ser reunido con tu pueblo'
  english_pob_reading: Retain the idiom as 'be gathered to your people' rather than reducing it to 'die.'
  chosen_spanish_reading: Conservar 'ser reunido con tu pueblo' sin explicitar simplemente 'morir'.
  alternative_spanish_readings:
  - morirás
  - serás reunido con tus antepasados
  - irás a reunirte con tu pueblo
  rationale: El hebreo usa una fórmula convencional que comunica más que el hecho biológico de la muerte; preserva una resonancia familiar y comunitaria. La versión española mantiene esa tensión sin resolverla interpretativamente.
  doctrine_reference: Preservar la tensión textual y la idiomaticidad hebrea; no imponer una explicación doctrinal no formulada por el verso.
translation_notes:
  revision_awareness: El borrador sigue de cerca la auditoría inglesa en el tratamiento del idiomático נֶאֱסַף אֶל־עַמֶּיךָ, pero ajusta 'to your people' a 'con tu pueblo' por naturalidad española, manteniendo el valor metafórico y la referencia comunitaria. No se documentan revisiones posteriores que cambien el sentido base.
  spanish_consistency_notes:
  - Se usa 'Aarón' con tilde según la ortografía española habitual.
  - Se conserva la metáfora de 'ser reunido' para reflejar el hebreo sin reducirla a una paráfrasis explicativa.
  - El pronombre femenino 'la' refleja el antecedente implícito de la tierra mencionado en el contexto inmediato.
  - La nota al pie marca la alternativa interpretativa sin desplazar la lectura principal del texto.
