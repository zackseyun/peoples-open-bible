- from: ¡Mira![a] Mi ojo ha visto todo esto; mi oído lo ha oído y lo ha entendido.
  to: ¡Mira![a] mi ojo ha visto todo esto; mi oído ha escuchado y lo ha entendido.
  rationale: Se conserva la fidelidad al hebreo y al audit trail inglés, pero se mejora la naturalidad del español sustituyendo la construcción torpe 'mi oído lo ha oído' por 'mi oído ha escuchado'. También se corrige la capitalización después de la interjección inicial. La nota léxica se mantiene porque sigue documentando bien las alternativas de וַתָּבֶן לָהּ.
