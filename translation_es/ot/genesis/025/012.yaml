base_translation:
  language: en
  yaml_path: translation/ot/genesis/025/012.yaml
  text: Now these are the generations of Ishmael[a], Abraham’s son, whom Hagar the Egyptian, Sarah’s slave woman[b], bore to Abraham.
  footnotes:
  - marker: a
    text: Or 'And these are the generations of Ishmael.' The Hebrew formula תּוֹלְדוֹת (toledot) is a recurring Genesis heading and can also be rendered 'descendants' or 'family line.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Sarah’s maidservant.' The Hebrew שִׁפְחָה refers to a female slave or servant; 'slave woman' is used here to preserve the bonded status more explicitly.
    reason: lexical_alternative
