translation:
  language: es
  text: 'Y dijo: «¿Cuál es el camino por el que subiremos?». Y dijo: «Por el camino del desierto de Edom[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por la ruta por el desierto de Edom».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y él dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se vierte naturalmente con pasado simple en español. «Y» conserva la secuencia narrativa del hebreo, como en la decisión inglesa.
- source_word: אֵי זֶה הַדֶּרֶךְ
  english_pob_choice: Which way
  chosen_spanish: ¿Cuál es el camino?
  alternatives_spanish:
  - ¿Qué camino es?
  - ¿Cuál camino?
  lexicon: HALOT
  rationale: 'La combinación interrogativa pide en español una pregunta natural por selección: «cuál». «Camino» conserva דֶּרֶךְ con el mismo campo semántico que la versión inglesa retenida como «way».'
- source_word: נַעֲלֶה
  english_pob_choice: shall we go up
  chosen_spanish: subiremos
  alternatives_spanish:
  - subamos
  - iremos hacia arriba
  lexicon: HALOT
  rationale: עלה en este contexto de desplazamiento se expresa de manera idiomática en español con «subir». El futuro pregunta del español transmite bien la deliberación del hebreo sin forzar un auxiliar explícito.
- source_word: דֶּרֶךְ מִדְבַּר אֱדוֹם
  english_pob_choice: By the way of the wilderness of Edom
  chosen_spanish: Por el camino del desierto de Edom
  alternatives_spanish:
  - Por el camino por el desierto de Edom
  - Por la ruta del desierto de Edom
  lexicon: HALOT
  rationale: El sustantivo דֶּרֶךְ puede ser «camino» o «ruta»; aquí se mantiene «camino» por continuidad con la pregunta. מִדְבַּר se vierte como «desierto», una opción válida en español bíblico para el espacio árido, aunque «desierto» puede sugerir más sequedad que «wilderness»; se conserva la relación constructa «de Edom».
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - Idumea
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado, como en la fuente inglesa y en el uso bíblico estándar. «Idumea» sería una forma más tardía/histórica y no necesaria aquí.
theological_decisions:
- issue: El valor de דֶּרֶךְ en la pregunta y la respuesta
  english_pob_reading: Which way ... By the way
  chosen_spanish_reading: ¿Cuál es el camino ... Por el camino
  alternative_spanish_readings:
  - ¿Cuál es la ruta ... Por la ruta
  - ¿Qué camino ... Por el camino
  rationale: 'No se suaviza la repetición de דֶּרֶךְ: la respuesta repite el sustantivo para mantener la cohesión léxica del hebreo y la continuidad del itinerario consultado. Esto evita perder la relación entre pregunta y respuesta.'
  doctrine_reference: Sin implicación doctrinal directa; fidelidad léxica y narrativa.
translation_notes:
  revision_awareness: El contexto inglés muestra un acuerdo alto y sin cambios en la revisión más reciente; por eso se mantiene la lectura principal del recorrido con una sola nota alternativa para דֶּרֶךְ, sin introducir variantes textuales ni teológicas nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva «Edom» como nombre propio transliterado y «camino» de modo uniforme en pregunta y respuesta.
  - La puntuación y comillas siguen el estilo español moderno y legible para lectura eclesial.
