  yaml_path: translation/ot/ezekiel/041/016.yaml
  text: the thresholds[a], the recessed windows, and the galleries all around on their three sides, opposite the threshold, were paneled with wood all around, from the floor up to the windows[c][b]; and the windows were covered.
  footnotes:
