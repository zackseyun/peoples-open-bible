translation:
  language: es
  text: y pieles de carneros teñidas de rojo[a], y pieles de vacas marinas[b], y madera de acacia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo מְאָדָּמִים describe algo «hecho rojo» o «teñido de rojo»; se eligió una formulación natural en español.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo תְּחָשִׁים es incierto. Otras propuestas de traducción incluyen «cueros/pieles de cabra», «pieles de marsopa» o «pieles de dugongo».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹרֹת
  english_pob_choice: skins
  chosen_spanish: pieles
  alternatives_spanish:
  - cueros
  - hides
  lexicon: HALOT
  rationale: El plural constructo de עוֹר se refiere a pieles o cueros animales como material. En español, "pieles" funciona de manera natural en esta lista de materiales del tabernáculo y conserva el valor material sin tecnicismo innecesario.
- source_word: אֵילִם
  english_pob_choice: rams’
  chosen_spanish: de carneros
  alternatives_spanish:
  - de machos oveja
  - de carneros
  lexicon: HALOT
  rationale: El sustantivo designa carneros; "de carneros" reproduce con precisión el referente animal y suena natural en español en una construcción posesiva/material.
- source_word: מְאָדָּמִים
  english_pob_choice: dyed red
  chosen_spanish: teñidas de rojo
  alternatives_spanish:
  - enrojecidas
  - hechas rojas
  lexicon: HALOT
  rationale: 'La forma participial expresa un estado resultante: las pieles fueron puestas rojas. "Teñidas de rojo" comunica bien ese tratamiento material en español y evita una literalidad torpe.'
- source_word: עֹרֹת תְּחָשִׁים
  english_pob_choice: hides of sea cows
  chosen_spanish: pieles de focas
  alternatives_spanish:
  - pieles de animales marinos
  - cueros de dugongo
  - pieles de vacas marinas
  lexicon: HALOT
  rationale: El término תְּחָשִׁים es lexicográficamente incierto. Dado que el audit trail inglés opta por una identificación concreta para reflejar el término con más directitud, en español se mantiene una identificación animal concreta. "Focas" es una equivalencia publicada posible dentro del campo semántico debatido y evita el abstracto interpretativo "cuero fino".
- source_word: עֲצֵי שִׂטִּים
  english_pob_choice: acacia wood
  chosen_spanish: madera de acacia
  alternatives_spanish:
  - madera de acacias
  - madera de shittim
  lexicon: HALOT
  rationale: La frase se refiere a madera de acacia. "Madera de acacia" es claro, moderno y fiel; "shittim" sería transliteración tradicional, no traducción.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde una opción interpretativa (“fine leather”) a una más directa (“hides of sea cows”) para reflejar mejor תְּחָשִׁים. La redacción española sigue esa misma decisión de no suavizar la incertidumbre léxica, pero la expresa con una identificación animal concreta y una nota de alternativa.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de la lista de materiales con coma inicial equivalente a la coordinación hebrea.
  - '"pieles" se usa de forma consistente para עֹרֹת, evitando alternar con "cuero" dentro del mismo versículo.'
  - Se preserva la tensión léxica de תְּחָשִׁים mediante nota, sin convertirla en un equivalente genérico que borre la especificidad del término.
  - '"madera de acacia" sigue la terminología POB estándar y es idiomática en español.'
