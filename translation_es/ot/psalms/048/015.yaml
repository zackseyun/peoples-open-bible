lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior; «porque» conserva bien el valor explicativo y suena natural en español bíblico moderno.
- source_word: זֶה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  - este Dios
  lexicon: HALOT
  rationale: Mantiene el énfasis demostrativo del hebreo, señalando al Dios recién celebrado en el contexto inmediato.
- source_word: אֱלֹהִים אֱלֹהֵינוּ
  english_pob_choice: God is our God
  chosen_spanish: Dios es nuestro Dios
  alternatives_spanish:
  - es Dios, nuestro Dios
  - nuestro Dios es Dios
  lexicon: HALOT
  rationale: Conserva la repetición enfática del sustantivo sin suavizarla, preservando el tono confesional y pactual del hebreo.
- source_word: עוֹלָם וָעֶד
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos y para siempre
  alternatives_spanish:
  - por siempre y para siempre
  - eternamente
  lexicon: HALOT
  rationale: Reproduce la intensificación idiomática con una fórmula española reverente y natural, manteniendo la idea de duración perpetua.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre explícito mantiene el énfasis hebreo; en español no requiere reforzarse más allá de la estructura normal de la oración.
- source_word: יְנַהֲגֵנוּ
  english_pob_choice: will guide us
  chosen_spanish: nos guiará
  alternatives_spanish:
  - nos conducirá
  - nos llevará
  lexicon: HALOT
  rationale: «Guiar» conserva el matiz de conducción providencial o pastoral del verbo y evita una lectura demasiado literal o demasiado general.
- source_word: עַל מוּת
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - hasta la muerte
  - más allá de la muerte
  - en la muerte
  lexicon: HALOT
  rationale: La revisión inglesa optó por evitar una interpretación especulativa de la frase difícil. En español, «para siempre» sigue esa decisión y mantiene la continuidad con la primera cola del versículo, sin resolver artificialmente la dificultad textual.
theological_decisions:
- issue: Tratamiento de la frase difícil עַל־מוּת
  english_pob_reading: forever
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - hasta la muerte
  - más allá de la muerte
  - en la muerte
  rationale: La tradición de la POB registra que el hebreo es difícil. Dado que la revisión inglesa prefirió una lectura no interpretativa, la traducción española sigue ese criterio para no imponer una solución doctrinal o filológica no segura. Se conserva así el énfasis global en la permanencia de la guía divina.
  doctrine_reference: 'Translation philosophy: preservar la tensión textual cuando la evidencia no permite una resolución segura.'
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde una formulación interpretativa («beyond death») a una lectura menos especulativa («forever»). Esta versión española sigue esa revisión y evita resolver la frase difícil con una paráfrasis no respaldada de manera suficiente por el texto.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de las dos expresiones de duración con «por los siglos y para siempre» / «para siempre».
  - Se evita «SEÑOR» para el nombre divino porque aquí el hebreo usa אֱלֹהִים y el texto habla de Dios, no del tetragrámaton.
  - Se conserva «Dios» repetido para reflejar la fuerza enfática del hebreo.
  - La puntuación separa la primera cláusula causal de la afirmación principal, en línea con la sintaxis del verso.
