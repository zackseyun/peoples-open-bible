  yaml_path: translation/ot/1_kings/012/020.yaml
  text: And when all Israel heard that Jeroboam had returned[a], they sent and called him to the assembly and made him king over all Israel. None followed the house of David except the tribe of Judah alone.
  footnotes:
  - marker: a
    text: Or, 'No one remained with the house of David except the tribe of Judah alone.' The Hebrew idiom literally says 'was after the house of David,' expressing allegiance or alignment.
