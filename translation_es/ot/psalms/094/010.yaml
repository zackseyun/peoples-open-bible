- from: El que disciplina a las naciones[a], ¿no reprenderá? El que enseña al hombre conocimiento, ¿no corregirá?
  to: El que disciplina a las naciones, ¿no reprenderá?, el que enseña al hombre[a] conocimiento.
  rationale: Se eliminó el verbo añadido «¿no corregirá?» para volver a la única pregunta retórica del hebreo; se mantuvieron las decisiones léxicas correctas del borrador; y se reubicó la nota al pie junto a «hombre», que es el término que explica.
