translation:
  language: es
  text: Entonces Saúl vistió a David con sus prendas[a], puso un casco de bronce[b] sobre su cabeza y lo vistió con una armadura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su atuendo militar». El término hebreo para las prendas de Saúl puede referirse a vestiduras asociadas con rango o con el combate.
    reason: lexical_alternative
  - marker: b
    text: O «yelmo de bronce» o «cota de malla».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּלְבֵּשׁ
  english_pob_choice: clothed
  chosen_spanish: vistió
  alternatives_spanish:
  - cubrío con vestiduras
  - lo puso a vestir
  lexicon: HALOT
  rationale: El hebreo en causativo expresa hacer que alguien lleve algo. En español, «vistió» conserva bien esa fuerza causal sin sonar forzado.
- source_word: מַדָּיו
  english_pob_choice: his garments
  chosen_spanish: sus prendas
  alternatives_spanish:
  - sus vestiduras
  - sus ropas
  - su atuendo militar
  lexicon: HALOT
  rationale: El término puede abarcar prendas o atuendo asociado al rango o a la guerra. «Prendas» preserva amplitud semántica y evita decidir prematuramente que se trate solo de ropa común o solo de uniforme militar.
- source_word: קוֹבַע נְחֹשֶׁת
  english_pob_choice: a bronze helmet
  chosen_spanish: un casco de bronce
  alternatives_spanish:
  - un yelmo de bronce
  - un casco de cobre
  lexicon: HALOT
  rationale: קוֹבַע designa un casco o yelmo; «casco» es claro y actual en español, y «de bronce» sigue el valor metalúrgico habitual para נְחֹשֶׁת en este contexto.
- source_word: עַל רֹאשׁוֹ
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  - encima de su cabeza
  lexicon: HALOT
  rationale: «Sobre su cabeza» reproduce la relación espacial de manera natural y precisa en español.
- source_word: שִׁרְיוֹן
  english_pob_choice: armor
  chosen_spanish: una armadura
  alternatives_spanish:
  - una coraza
  - un coselete
  - una armadura corporal
  lexicon: HALOT
  rationale: El término denota armadura corporal. «Armadura» es claro en español moderno y mantiene la amplitud del hebreo sin imponer una pieza más específica que el texto no precisa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: conserva la repetición verbal, distingue entre las prendas, el casco de bronce y la armadura, y evita fusionar detalles que el texto separa. También mantiene la ambigüedad léxica de מַדָּיו con una opción amplia y publica-ble.'
  spanish_consistency_notes:
  - Se usa «Saúl» y «David» de forma consistente con la onomástica bíblica española.
  - Se prefirió «bronce» para נְחֹשֶׁת por coherencia con el uso bíblico estándar en metales de armadura.
  - Se mantuvo la repetición de «vistió» para reflejar las dos ocurrencias de וַיַּלְבֵּשׁ.
  - «Armadura» funciona aquí como equivalente general de שִׁרְיוֹן sin especificar un tipo técnico no indicado por el hebreo.
