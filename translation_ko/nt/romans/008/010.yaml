  english_pob_choice: the spirit
  chosen_korean: 영
  alternatives_korean:
  - 성령
  lexicon: BDAG
  rationale: 본 절의 πνεῦμα는 신자의 인격적 영(몸과 대조)으로 해석함이 자연스럽다. 「영」으로 옮기되, 「성령」 해석도 가능함을 인지.
theological_decisions:
- issue: 8:10 「τὸ πνεῦμα ζωή」의 πνεῦμα 정체
  chosen_reading: 신자의 인격적 영(몸/영 대조)으로 옮김
  alternative_readings:
