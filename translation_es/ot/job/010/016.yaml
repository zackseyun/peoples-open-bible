translation:
  language: es
  text: Si me engrandezco[a], me cazas como un león, y otra vez te muestras extraordinario[b] contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es difícil y elíptico; también puede entenderse: «Y si se levanta» o «Si soy exaltado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «actúas de manera extraordinaria contra mí». El hebreo puede denotar una acción extraordinaria o maravillosa, aquí en un contexto hostil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִגְאֶה
  english_pob_choice: If I lift myself up
  chosen_spanish: Si me engrandezco
  alternatives_spanish:
  - Si me levanto
  - Si soy exaltado
  - Si se alza mi cabeza
  lexicon: HALOT
  rationale: El hebreo es elíptico y puede entenderse como elevación, exaltación o engrandecimiento. En español, «si me engrandezco» mantiene el valor condicional y la idea de alzarse/exaltarse sin forzar una imagen mecánica ni perder la tensión del texto.
- source_word: כַּשַּׁחַל
  english_pob_choice: like a lion
  chosen_spanish: como a un león
  alternatives_spanish:
  - como a un león feroz
  - como a una leona
  lexicon: HALOT
  rationale: שַׁחַל designa un león; la comparación directa conserva la fuerza de la imagen depredadora sin añadir especificaciones no exigidas por el hebreo.
- source_word: תְּצוּדֵנִי
  english_pob_choice: you hunt me
  chosen_spanish: me cazas
  alternatives_spanish:
  - me persigues como presa
  - me acechas
  - me atrapas
  lexicon: HALOT
  rationale: El verbo צוד expresa cazar o perseguir como presa. «Me cazas» preserva la imagen de depredación y funciona naturalmente en español junto con «como a un león».
- source_word: וְתָשֹׁב
  english_pob_choice: and again
  chosen_spanish: y otra vez
  alternatives_spanish:
  - y vuelves
  - y de nuevo
  - y una vez más
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «y vuelves/retornas», el contexto exige fuerza iterativa. «Y otra vez» comunica esa repetición de manera clara y fiel.
- source_word: תִּתְפַּלָּא
  english_pob_choice: you show yourself wonderful
  chosen_spanish: te muestras maravilloso
  alternatives_spanish:
  - actúas maravillosamente
  - te muestras admirable
  - te manifiestas maravilloso
  lexicon: HALOT
  rationale: El hitpael de פלא puede significar mostrarse maravilloso o actuar de manera extraordinaria. En este contexto hostil, «te muestras maravilloso» conserva la tensión entre lo admirable y lo terrible sin suavizarla ni resolverla.
- source_word: בִּי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - en mí
  - sobre mí
  - para conmigo
  lexicon: HALOT
  rationale: La preposición ב aquí tiene sentido adversativo por el contexto. «Contra mí» expresa con precisión la dirección hostil de la acción divina en el verso.
theological_decisions:
- issue: Mantener la tensión teológica de פלא en un contexto de aflicción divina
  english_pob_reading: you show yourself wonderful against me
  chosen_spanish_reading: te muestras maravilloso contra mí
  alternative_spanish_readings:
  - actúas maravillosamente contra mí
  - te muestras admirable contra mí
  - te manifiestas de manera extraordinaria contra mí
  rationale: El texto atribuye a Dios una acción extraordinaria en un marco de sufrimiento. La traducción conserva esa tensión sin convertirla en simple ataque ni en un elogio devocional; deja oír la extrañeza que Job expresa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la decisión inglesa más reciente: mantener el valor condicional inicial, conservar la imagen del león y traducir פלא con un término que preserve la ambigüedad entre lo maravilloso y lo hostil. Se evitó resolver la elipsis del hebreo con un sujeto explícito no garantizado, pero se eligió una formulación española natural y publicable.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé en la política general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se prefirió «maravilloso» para reflejar la decisión inglesa final, aunque en español puede sonar más positiva; la nota aclara la tensión contextual.
  - «Contra mí» se usó por la fuerza adversativa del contexto, coherente con el audit trail inglés.
  - No se introdujo «Cristo» ni terminología eclesiástica ajena al texto hebreo.
