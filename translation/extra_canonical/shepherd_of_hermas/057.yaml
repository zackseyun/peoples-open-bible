translation:
  text: 'I say to him, "Lord, explain this to me further." He says, "What are you seeking?" I say, "Are then, Lord, those who indulge and are deceived tormented for the same amount of time as the time of the deceit? It is one hour, but the hour of the torment has the force of thirty days. Therefore, if someone indulges for one day and is deceived, and is tormented for one day, the day of torment is equivalent to a whole year. So then, as many days as a person indulges, for that many years he is tormented." "You see then," he says, "that the time of indulgence and deception is very small, but the time of punishment and torment is great."'
