translation:
  language: es
  text: Así pues, comencemos la narración desde este punto, añadiendo solo esto a lo que ya se ha dicho antes; porque es necio ser prolijo antes de la historia[a] y abreviar la historia misma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el relato' en ambas ocurrencias de 'historia'; el griego ἱστορία/ἱστορίαν puede denotar una investigación o narración histórica en sentido amplio, no solo 'historia' en el sentido moderno académico.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐντεῦθεν
  english_pob_choice: from this point
  chosen_spanish: desde este punto
  alternatives_spanish:
  - desde aquí
  - por tanto, desde aquí
  lexicon: LSJ
  rationale: En contexto funciona como transición discursiva hacia el relato principal. 'Desde este punto' conserva el valor de avance en el discurso sin sonar demasiado espacial.
- source_word: οὖν
  english_pob_choice: So then
  chosen_spanish: Así pues
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: LSJ
  rationale: La partícula introduce conclusión/transición. 'Así pues' es natural en español formal y mantiene el enlace inferencial.
- source_word: ἀρξώμεθα
  english_pob_choice: let us begin
  chosen_spanish: comencemos
  alternatives_spanish:
  - empecemos
  - comencemos ahora
  lexicon: LSJ
  rationale: Es un subjuntivo exhortativo de primera persona plural. 'Comencemos' reproduce bien el tono invitativo del autor.
- source_word: τῆς διηγήσεως
  english_pob_choice: the narrative
  chosen_spanish: la narración
  alternatives_spanish:
  - el relato
  - la historia
  lexicon: LSJ
  rationale: Se trata del discurso escrito que sigue. 'Narración' conserva el matiz literario del griego sin cargar con 'historia' en sentido moderno.
- source_word: τοῖς προειρημένοις
  english_pob_choice: what has been said before
  chosen_spanish: a lo que ya se ha dicho antes
  alternatives_spanish:
  - a lo anteriormente dicho
  - a las cosas ya dichas antes
  lexicon: LSJ
  rationale: La construcción exige una referencia a lo previamente expuesto. La paráfrasis española sigue de cerca el sentido sin forzar un calco.
- source_word: τοσοῦτον ἐπιζεύξαντες
  english_pob_choice: adding only this much
  chosen_spanish: añadiendo solo esto
  alternatives_spanish:
  - añadiendo solo esta pequeña parte
  - uniendo solamente esto
  lexicon: LSJ
  rationale: El participio expresa la adición breve y limitada de una nota al margen de lo anterior. 'Solo esto' recoge la restricción cuantitativa marcada por τοσοῦτον.
- source_word: εὔηθες
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - insensato
  - fatuo
  lexicon: LSJ
  rationale: El término juzga como mala prudencia literaria el hacer demasiado o recortar demasiado. 'Necio' transmite con fuerza esa desaprobación.
- source_word: τὸ μὲν πρὸ τῆς ἱστορίας πλεονάζειν
  english_pob_choice: to be excessive before the history
  chosen_spanish: ser prolijo antes de la historia
  alternatives_spanish:
  - excederse antes de la historia
  - decir demasiado antes de la historia
  lexicon: LSJ
  rationale: πλεονάζειν apunta a excederse en cantidad o amplitud. 'Ser prolijo' comunica bien la idea de extenderse demasiado en el prefacio y suena natural en español.
- source_word: τὴν δὲ ἱστορίαν
  english_pob_choice: the history
  chosen_spanish: la historia
  alternatives_spanish:
  - el relato
  - la narración
  lexicon: LSJ
  rationale: En este contraste, el autor nombra el cuerpo principal del escrito. 'Historia' conserva el paralelo del griego y el sentido de relato histórico.
- source_word: ἐπιτέμνειν
  english_pob_choice: to abridge
  chosen_spanish: abreviar
  alternatives_spanish:
  - cortar
  - recortar
  lexicon: LSJ
  rationale: El verbo indica reducir o cortar la extensión de lo que sigue. 'Abreviar' es la forma española más idiomática para un escrito.
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del audit trail inglés: mantiene la función transicional de Ἐντεῦθεν οὖν, el carácter exhortativo de ἀρξώμεθα y el contraste retórico entre extenderse demasiado antes del relato y abreviarlo. Ajusté ''narración'' y ''prolijo'' para sonar más natural en español sin perder el sentido literario y evaluativo del griego.'
