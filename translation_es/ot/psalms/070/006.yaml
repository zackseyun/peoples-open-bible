translation:
  language: es
  text: Pero en cuanto a mí, soy pobre y necesitado; oh Dios, ven pronto a mí[a]. Tú eres mi ayuda y mi libertador; Yahvé[b], no tardes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «apresúrate a mí»; alternativamente, «apresúrate por mí».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo YHWH; se vierte «Yahvé» según la norma del proyecto, en lugar de la sustitución tradicional «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Pero yo
  - Y en cuanto a mí
  lexicon: HALOT
  rationale: La forma hebrea introduce contraste con lo anterior. En español, «Pero en cuanto a mí» conserva mejor el giro discursivo y la oposición enfática que un simple «Pero yo».
- source_word: עָנִי
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - afligido
  - humilde
  lexicon: HALOT
  rationale: En paralelo con «necesitado», «pobre» comunica la situación de carencia y aflicción de modo natural y fiel al valor del término en este contexto.
- source_word: וְאֶבְיוֹן
  english_pob_choice: and needy
  chosen_spanish: y necesitado
  alternatives_spanish:
  - y desposeído
  - y menesteroso
  lexicon: HALOT
  rationale: «Necesitado» preserva la distinción con «pobre» sin duplicarla de manera innecesaria, y mantiene el matiz de carencia urgente.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡oh Dios!
  lexicon: HALOT
  rationale: Es vocativo directo; en español la interjección «oh» conserva la súplica urgente y la dirección explícita a Dios.
- source_word: חוּשָׁה
  english_pob_choice: hurry
  chosen_spanish: apresúrate
  alternatives_spanish:
  - date prisa
  - corre
  lexicon: HALOT
  rationale: El imperativo pide acción rápida. «Apresúrate» es natural en español bíblico contemporáneo y conserva la urgencia del ruego.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: Aunque el hebreo puede admitir «a mí» o «por mí», en este contexto la dirección del movimiento verbal queda bien expresada con «hacia mí», sin forzar una glosa interpretativa.
- source_word: עֶזְרִי
  english_pob_choice: my help
  chosen_spanish: mi ayuda
  alternatives_spanish:
  - mi auxilio
  - el que me ayuda
  lexicon: HALOT
  rationale: 'La relación nominal en hebreo se conserva mejor con un sustantivo: «mi ayuda». Es claro, sobrio y paralelo al siguiente miembro.'
- source_word: וּמְפַלְטִי
  english_pob_choice: and my deliverer
  chosen_spanish: y mi libertador
  alternatives_spanish:
  - y mi salvador
  - y el que me libra
  lexicon: HALOT
  rationale: El participio expresa al que libra o rescata. «Libertador» mantiene la fuerza personal del título y encaja con el paralelismo; «salvador» sería más amplio y teológicamente más cargado.
- source_word: אַתָּה
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Eres tú
  - Tú
  lexicon: HALOT
  rationale: El hebreo omite el verbo explícito; en español debe expresarse para que la predicación sea natural y clara.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino de forma directa según la norma del proyecto. En un vocativo, el contexto ya aporta la apelación sin necesidad de «oh» repetido.
- source_word: אַל תְּאַחַר
  english_pob_choice: do not delay
  chosen_spanish: no tardes
  alternatives_spanish:
  - no te demores
  - no retrases
  lexicon: HALOT
  rationale: El negativo jussivo pide que Dios no postergue su intervención. «No tardes» es breve, idiomático y conserva la urgencia petitoria.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El texto hebreo usa el Tetragrama. En español del POB se prefiere «Yahvé» como representación estable del nombre propio divino, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de לִי con חוּשָׁה
  english_pob_reading: to me / alternatively, for me
  chosen_spanish_reading: hacia mí
  alternative_spanish_readings:
  - a mí
  - por mí
  - para mí
  rationale: La ambigüedad hebrea permite una dirección personal del ruego. «Hacia mí» comunica el movimiento implícito de la acción divina y deja abierta la lectura de intervención pronta sin reducirla a una sola paráfrasis.
  doctrine_reference: 'DOCTRINE.md: Principles of lexical transparency and retained ambiguity'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el análisis morfológico, manteniendo el paralelismo poético y la urgencia del vocativo. Se preserva la tensión léxica de לִי en la nota, como en el audit trail inglés, y se actualiza el nombre divino a la forma española normativa del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Pobre» y «necesitado» conservan la doble caracterización del hebreo sin redundancia excesiva.
  - La puntuación reproduce el ritmo de dos hemistiquios con una pausa fuerte tras la primera súplica.
