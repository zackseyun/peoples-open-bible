review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido básico del hebreo: toda la tierra entra en un estado de descanso y quietud, seguido por una irrupción de canto. Sin embargo, el verbo final hebreo está en plural (פָּצְחוּ, ''ellos prorrumpen/brotan''), mientras que el español draft usa singular (''prorrumpe''), lo que no preserva la concordancia ni la imagen de pluralidad implícita.'
  spanish_quality_summary: 'El español es generalmente natural y digno. ''Toda la tierra está en reposo y tranquila'' funciona bien, aunque el tramo final necesita reparación gramatical y estilística: con sujeto colectivo previo, ''prorrumpe'' en singular resulta discordante. Una formulación plural impersonal/narrativa como ''prorrumpen en cánticos'' o, más naturalmente, ''estallan en cánticos'' restituye el plural del hebreo. Dado el registro bíblico y la cercanía al audit trail, ''prorrumpen en cánticos'' es adecuado.'
  glossary_alignment: No hay términos de glosario mayor en juego. 'Toda la tierra' alinea bien con כָּל הָאָרֶץ. 'Está en reposo' y 'tranquila' reflejan apropiadamente נָחָה / שָׁקְטָה. La corrección principal es de concordancia verbal y fidelidad al número en פָּצְחוּ.
  issues:
  - severity: high
    issue: 'El verbo final está en singular: ''prorrumpe en cánticos''.'
    rationale: El hebreo פָּצְחוּ es 3ª persona plural. El singular español borra la pluralidad del original y produce una secuencia sintácticamente extraña tras 'Toda la tierra'. Debe revisarse a una forma plural que preserve la imagen de irrupción colectiva.
  - severity: low
    issue: La nota alternativa también repite el singular 'prorrumpe'.
    rationale: 'La alternativa debe reflejar igualmente el plural del hebreo: ''prorrumpen'' o ''irrumpen''/''estallan'' según el giro elegido.'
  revised_spanish_text: Toda la tierra está en reposo y tranquila[a]; prorrumpen en cánticos.
  revised_footnotes:
  - marker: a
    text: 'O: «Toda la tierra ha descansado y está tranquila; prorrumpen en canto jubiloso».'
    reason: lexical_alternative
  revision_rationale: Se corrige 'prorrumpe' a 'prorrumpen' para reflejar fielmente el plural hebreo פָּצְחוּ. Se mantiene el resto del verso porque transmite bien el estado resultante de descanso y quietud. La nota alternativa se ajusta del mismo modo para conservar la concordancia y la fidelidad al original.
