revisions:
- from: En el primer año del reinado de Ciro, el rey Ciro dio órdenes de que se edificara la casa del Señor en Jerusalén, donde ofrecen sacrificios continuos por fuego.
  to: En el primer año del reinado de Ciro, el rey Ciro dio órdenes de que se edificara la casa del Señor en Jerusalén, donde ofrecen sacrificios continuos mediante fuego[a].
  rationale: Se añade la nota al pie requerida para preservar la alternativa léxica documentada en el POB inglés y se mejora la naturalidad de διὰ πυρὸς con 'mediante fuego', que sigue siendo fiel al valor instrumental del griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:24:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis y el sentido general del griego: fórmula de datación, título real, mandato de construcción, localización en Jerusalén y referencia a sacrificios continuos por fuego. Sin embargo, omite la alternativa léxica importante preservada por el POB inglés sobre la frase compacta ὅπου ἐπιθύουσιν διὰ πυρὸς ἐνδελεχοῦς, que puede entenderse también como ''donde sacrifican con fuego continuo''.'
  spanish_quality_summary: El español es claro y digno, pero 'por fuego' suena poco natural en español bíblico actual. 'mediante fuego' o 'con fuego' comunica mejor el valor instrumental sin perder fidelidad. Además, conviene reflejar la nota de alternativa exegética con una nota al pie, ya que el inglés auditado la conserva.
  glossary_alignment: La elección de 'Señor' para κυρίου es aceptable en este contexto griego deuterocanónico y concuerda con la decisión teológica auditada. No hay conflicto mayor con la terminología del proyecto, aunque 'la casa del Señor' conserva bien οἶκος. El resto del léxico principal está alineado.
  issues:
  - severity: medium
    issue: Falta la nota léxica sobre la ambigüedad de la frase sacrificial final.
    rationale: El POB inglés preserva explícitamente la alternativa 'where they sacrifice with continual fire'. Dado que el griego es compacto y admite más de una articulación, la revisión española debe conservar esa información.
  - severity: low
    issue: La expresión 'por fuego' es poco idiomática en español.
    rationale: Aunque refleja literalmente διὰ πυρὸς, en español suena rígida. 'mediante fuego' mantiene el sentido instrumental y mejora la legibilidad sin paráfrasis excesiva.
  revised_spanish_text: En el primer año del reinado de Ciro, el rey Ciro dio órdenes de que se edificara la casa del Señor en Jerusalén, donde ofrecen sacrificios continuos mediante fuego[a].
  revised_footnotes:
  - marker: a
    text: O, 'donde sacrifican con fuego continuo'. La frase griega es compacta y también puede describir el lugar como uno de ofrendas continuas por fuego.
    reason: lexical_alternative
  revision_rationale: Se añade la nota al pie requerida para preservar la alternativa léxica documentada en el POB inglés y se mejora la naturalidad de διὰ πυρὸς con 'mediante fuego', que sigue siendo fiel al valor instrumental del griego.
