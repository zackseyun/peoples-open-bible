review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del arameo: ‘el resto de los pueblos’, la deportación y reasentamiento por Osnappar, ‘la ciudad de Samaria’, el término administrativo para ‘Beyond the River’, y la fórmula epistolar final. Sin embargo, en el segmento וּ/שְׁאָר עֲבַר נַהֲרָה el inglés auditado entiende un valor locativo repetido (‘and in the rest of Beyond the River’), mientras que el español dice ‘y el resto de Más Allá del Río’, lo que suena elíptico y menos fiel al sentido de ubicación/población restante en esa región.'
  spanish_quality_summary: 'El español es mayormente claro, pero tiene dos problemas de naturalidad y precisión: ‘el grande y noble’ suena forzado en español; ‘el gran y noble’ es la forma idiomática normal ante sustantivo propio. Además, ‘y el resto de Más Allá del Río’ queda poco natural; conviene explicitar la preposición locativa y ajustar la referencia a las personas: ‘y al resto que estaba en Más Allá del Río’.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. ‘Osnappar’ conserva correctamente la forma aramea. ‘Samaria’ y la fórmula epistolar final están bien. ‘Más Allá del Río’ puede mantenerse como designación administrativa con mayúsculas, apoyada por nota cultural.
  issues:
  - severity: medium
    issue: Falta de sentido locativo claro en ‘y el resto de Más Allá del Río’
    rationale: El source y el audit trail inglés reflejan que se trata del resto de la población situada en esa región administrativa, no simplemente una frase nominal suelta. En español actual, la omisión de una preposición o de un relativo deja la frase dura y ambigua.
  - severity: low
    issue: ‘el grande y noble Osnappar’ es poco idiomático
    rationale: Aunque semánticamente comprensible, en español culto natural ante nombre propio corresponde ‘el gran y noble Osnappar’. Preserva mejor el tono honorífico sin calco innecesario.
  revised_spanish_text: 'y el resto de los pueblos que el gran y noble Osnappar deportó y estableció en la ciudad de Samaria[a], y al resto que estaba en Más Allá del Río[b], y ahora[c]:'
  revised_footnotes:
