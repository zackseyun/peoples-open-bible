id: 1CO.16.2
reference: 1 Corinthians 16:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: κατὰ μίαν ⸀σαββάτου ἕκαστος ὑμῶν παρ’ ἑαυτῷ τιθέτω θησαυρίζων ὅ τι ⸀ἐὰν εὐοδῶται, ἵνα μὴ ὅταν ἔλθω τότε λογεῖαι γίνωνται.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/016/002.yaml
  text: On the first day of every week[a], each of you is to set something aside, storing up whatever he may prosper in[c][b], so that collections will not be made when I come.
  footnotes:
  - marker: a
    text: Or 'On the first day of the week'; the Greek expression is distributive here, indicating a regular weekly practice.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by himself' or 'with himself.' This may mean each person should set the money aside personally, possibly at home.
    reason: lexical_alternative
  - marker: c
    text: Or 'in keeping with how he prospers.' The sense is that each person should give according to whatever prosperity he has received.
    reason: lexical_alternative
translation:
  language: ko
  text: 매 주의 첫날에 여러분 각자는 형편이 허락하는 대로 무엇이든 자기 곁에 따로 모아 두십시오. 그래야 내가 갈 때에야 연보를 거두지 않게 됩니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατὰ μίαν σαββάτου
  english_pob_choice: On the first day of every week
  chosen_korean: 매 주의 첫날에
  alternatives_korean:
  - 안식 후 첫날에
  - 주일에
  lexicon: BDAG
  rationale: 헬라어는 「안식 후 첫날」을 가리키며, 한국어 자연 표현 「주의 첫날」을 사용한다.
- source_word: εὐοδῶται
  english_pob_choice: may prosper in
  chosen_korean: 형편이 허락하다
  alternatives_korean:
  - 번성하다
  lexicon: BDAG
  rationale: εὐοδόομαι의 「잘 되다·형편이 좋아지다」 함의를 자연스럽게 옮긴다.
