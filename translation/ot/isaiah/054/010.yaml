id: ISA.54.10
reference: Isaiah 54:10
source:
  edition: WLC
  text: כִּ֤י הֶֽ/הָרִים֙ יָמ֔וּשׁוּ וְ/הַ/גְּבָע֖וֹת תְּמוּטֶ֑נָה וְ/חַסְדִּ֞/י מֵ/אִתֵּ֣/ךְ לֹֽא יָמ֗וּשׁ וּ/בְרִ֤ית שְׁלוֹמִ/י֙ לֹ֣א תָמ֔וּט אָמַ֥ר מְרַחֲמֵ֖/ךְ יְהוָֽה־׃ס
translation:
  text: For the mountains may depart and the hills may be shaken[a], but my steadfast love will not depart from you, and my covenant of peace will not be shaken, says Yahweh[c][b], who has compassion on you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be removed' for 'depart' (both occurrences of the verb מוּשׁ).
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates חֶסֶד, a term that can also carry the sense of loyal or covenant love.'
    reason: lexical_alternative
  - marker: c
    text: Or 'my covenant of well-being'; 'peace' (shalom) includes wholeness and welfare, not only the absence of conflict.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Though
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or assurance for the preceding promise; 'For' best preserves the causal/explanatory force in context.
- source_word: הֶהָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Definite article is present; 'the mountains' reflects the Hebrew form and the cosmic-stability imagery.
- source_word: יָמוּשׁוּ
  chosen: may depart
  alternatives:
  - be removed
  - move away
  lexicon: HALOT
  rationale: מוּשׁ conveys removal or departure. 'May depart' fits the parallel with God's love not 'departing' and preserves the verbal repetition later in the verse.
- source_word: הַגְּבָעוֹת
  chosen: the hills
  alternatives:
  - the hillsides
  lexicon: HALOT
  rationale: Standard rendering for גבעות; paired naturally with 'mountains' in English.
- source_word: תְּמוּטֶנָה
  chosen: may be shaken
  alternatives:
  - totter
  - be moved
  - slip
  lexicon: HALOT
  rationale: מוֹט in this context denotes instability or being moved from a fixed position. 'May be shaken' is idiomatic modern English and matches the later repetition with the covenant.
- source_word: וְחַסְדִּי
  chosen: but my steadfast love
  alternatives:
  - but my covenant love
  - but my lovingkindness
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyal love/steadfast love. 'Steadfast love' is the clearest established English rendering without archaic tone; 'but' brings out the contrast with the cosmic imagery.
- source_word: מֵאִתֵּךְ
  chosen: from you
  alternatives:
  - away from you
  lexicon: HALOT
  rationale: Directly expresses separation from the addressee (feminine singular, Zion/Jerusalem personified), which English can render simply as 'from you'.
- source_word: וּבְרִית שְׁלוֹמִי
  chosen: and my covenant of peace
  alternatives:
  - and my covenant of well-being
  - and my peace covenant
  lexicon: HALOT
  rationale: בְּרִית is 'covenant'; שָׁלוֹם includes peace, wholeness, and well-being. 'Covenant of peace' is the most natural and intertextually recognizable rendering.
- source_word: לֹא תָמוּט
  chosen: will not be shaken
  alternatives:
  - will not totter
  - will not be moved
  lexicon: HALOT
  rationale: Repeats the earlier מוט verb; 'will not be shaken' preserves the contrast and reads naturally in English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - has said
  - said
  lexicon: HALOT
  rationale: Prophetic perfect introducing divine speech is commonly rendered as present in English when functioning as a speech formula.
- source_word: מְרַחֲמֵךְ
  chosen: who has compassion on you
  alternatives:
  - your compassionate one
  - who shows you mercy
  lexicon: HALOT
  rationale: Participial form from רחם describes the LORD as the one showing compassion to Zion. Relative-clause rendering is natural English and preserves the ongoing character of the action.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
