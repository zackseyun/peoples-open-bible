translation:
  language: es
  text: Desde que tu hermano Judas ha muerto[a], no hay hombre semejante a él para salir contra los enemigos y Báquides, y los que odian a nuestra nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego tiene después de «Báquides» una construcción áspera (literalmente, «y en los que odian a nuestra nación»). La traducción expresa el sentido aparente en contexto: otro grupo hostil al que se enfrenta el hablante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀφʼ οὗ
  english_pob_choice: Since
  chosen_spanish: Desde que
  alternatives_spanish:
  - Desde el momento en que
  - Después de que
  lexicon: LSJ
  rationale: La construcción introduce una situación temporal con consecuencia presente. «Desde que» comunica bien ese valor temporal-causal en español sin forzar una traducción mecánica.
- source_word: ὁ ἀδελφός σου
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano mayor
  - tu pariente
  lexicon: LSJ
  rationale: El griego expresa de forma directa la relación fraterna; «tu hermano» es fiel y natural.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: LSJ
  rationale: En 1 Macabeos, el nombre propio griego Ἰούδας se vierte normalmente como «Judas» en español para este personaje.
- source_word: τετελεύτηκεν
  english_pob_choice: has died
  chosen_spanish: ha muerto
  alternatives_spanish:
  - ha fallecido
  - ha llegado a su fin
  lexicon: LSJ
  rationale: El perfecto señala una muerte ya consumada con efecto presente. «Ha muerto» es directo y conserva la fuerza factual del verbo.
- source_word: ἀνὴρ ὅμοιος αὐτῷ
  english_pob_choice: a man like him
  chosen_spanish: un hombre semejante a él
  alternatives_spanish:
  - un hombre como él
  - uno semejante a él
  lexicon: LSJ
  rationale: Se conserva ἀνήρ con «hombre» y ὅμοιος con «semejante», manteniendo la comparación de manera clara y sobria.
- source_word: οὐκ ἔστιν
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no se encuentra
  lexicon: LSJ
  rationale: El valor existencial del griego se expresa de forma idiomática en español con «no hay».
- source_word: ἐξελθεῖν
  english_pob_choice: to go out
  chosen_spanish: para salir
  alternatives_spanish:
  - para marchar
  - para ir
  lexicon: LSJ
  rationale: En este contexto militar, «salir» transmite la idea de salir a campaña o al combate sin añadir más de lo que el texto exige.
- source_word: πρὸς τοὺς ἐχθρούς
  english_pob_choice: against the enemies
  chosen_spanish: contra los enemigos
  alternatives_spanish:
  - frente a los enemigos
  - contra nuestros enemigos
  lexicon: LSJ
  rationale: La preposición expresa oposición hostil; «contra» reproduce bien ese sentido en español.
- source_word: Βακχίδην
  english_pob_choice: Bacchides
  chosen_spanish: Bacquides
  alternatives_spanish:
  - Báquides
  - Bacides
  lexicon: LSJ
  rationale: Se conserva el nombre propio del general en una forma española habitual y legible, sin alterar la identificación del personaje.
- source_word: ἐν τοῖς ἐχθαίνουσιν τοῦ ἔθνους ἡμῶν
  english_pob_choice: those who hate our nation
  chosen_spanish: contra los que odian a nuestra nación
  alternatives_spanish:
  - y los que odian a nuestra nación
  - y entre los que odian a nuestra nación
  lexicon: LSJ
  rationale: El griego transmitido tiene una construcción áspera. Siguiendo el juicio del POB en inglés, se expresa la fuerza contextual como otro grupo hostil, manteniendo el tono adversativo del pasaje. «Nuestra nación» conserva ἔθνος como colectividad histórica-política del pueblo judío.
theological_decisions:
- issue: Valor de ἔθνος ἡμῶν
  english_pob_reading: our nation
  chosen_spanish_reading: nuestra nación
  alternative_spanish_readings:
  - nuestro pueblo
  - nuestra gente
  rationale: En este contexto ἔθνος designa al pueblo judío como entidad nacional. «Nación» preserva mejor el matiz político-colectivo que «pueblo» o «gente».
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Conservación del tono masculino de ἀνήρ
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - persona
  - uno
  rationale: El griego usa ἀνήρ, término masculino específico. Se mantiene «hombre» para no neutralizar indebidamente el referente y para reflejar la forma del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que eliminó un segundo «against» para reflejar mejor la coordinación griega y mejorar la fluidez. La versión española sigue esa misma solución contextual, conservando la acumulación hostil sin duplicar innecesariamente la preposición.
  spanish_consistency_notes:
  - Se usa «Judas» para el personaje de 1 Macabeos, conforme al uso habitual para Ἰούδας en este libro.
  - Se usa «Bacquides» como forma española legible del nombre propio del general.
  - Se mantiene «nación» para ἔθνος, en coherencia con el valor político-colectivo del término en 1 Macabeos.
  - Se conserva el carácter masculino de ἀνήρ con «hombre».
