base_translation:
  language: en
  yaml_path: translation/ot/psalms/029/005.yaml
  text: The voice of Yahweh breaks cedars[b][a]; Yahweh shatters the cedars of Lebanon.
  footnotes:
  - marker: a
    text: Or 'The sound of the LORD.' The Hebrew qol can mean 'voice' or 'sound'; 'voice' is chosen here to preserve the psalm's repeated portrayal of the LORD's personal, thunderous utterance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats the same verb root ('break') in both clauses; the second clause is rendered 'shatters' in English to reflect the poetic intensification.
    reason: lexical_alternative
