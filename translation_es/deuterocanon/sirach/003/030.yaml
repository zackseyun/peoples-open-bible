translation:
  language: es
  text: El agua apaga un fuego ardiente[b][a]; así la limosna expía el pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caridad». El hebreo צדקה también puede significar «justicia» o «rectitud», pero el paralelo griego lee ἐλεημοσύνη, que probablemente expresa aquí el sentido de dar limosna a los necesitados.
    reason: lexical_alternative
  - marker: b
    text: El griego tiene «pecados» en plural. El hebreo usa singular, que puede entenderse de modo genérico.
    reason: alternative_reading
lexical_decisions:
- source_word: אש לוהטת
  english_pob_choice: a blazing fire
  chosen_spanish: un fuego ardiente
  alternatives_spanish:
  - un fuego en llamas
  - un fuego abrasador
  - un fuego flameante
  lexicon: HALOT
  rationale: La expresión hebrea describe fuego intensamente encendido. «Fuego ardiente» conserva la imagen concreta y suena natural en español; además, el paralelo griego φλογιζόμενον confirma la idea de un fuego en plena llama.
- source_word: יכבו
  english_pob_choice: extinguishes
  chosen_spanish: apaga
  alternatives_spanish:
  - extingue
  - quema
  - sofoca
  lexicon: HALOT
  rationale: El verbo indica apagar o sofocar el fuego. «Apaga» es el equivalente más claro y directo en español, manteniendo la acción concreta del proverbio. El griego ἀποσβέσει apoya este sentido.
- source_word: מים
  english_pob_choice: Water
  chosen_spanish: El agua
  alternatives_spanish:
  - Las aguas
  - Agua
  lexicon: HALOT
  rationale: El sustantivo funciona de manera colectiva y proverbial. «El agua» es la forma más natural en español y conserva el contraste con el fuego.
- source_word: כן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - por eso
  - de igual modo
  lexicon: HALOT
  rationale: Marca la comparación entre los dos miembros del paralelismo. «Así» es breve, idiomático y adecuado al estilo proverbial.
- source_word: צדקה
  english_pob_choice: almsgiving
  chosen_spanish: la limosna
  alternatives_spanish:
  - la caridad
  - la justicia
  - la rectitud
  lexicon: HALOT
  rationale: Aunque צדקה puede significar «justicia» o «rectitud», en Ben Sira aquí el sentido concreto es dar a los necesitados. La versión griega ἐλεημοσύνη confirma la referencia a obras de misericordia/almosna. «Limosna» preserva ese valor concreto sin volver abstracto el pasaje.
- source_word: תכפר
  english_pob_choice: makes atonement for
  chosen_spanish: expía
  alternatives_spanish:
  - hace expiación por
  - hace atonamiento por
  - cubre
  lexicon: HALOT
  rationale: El verbo כפר en piel expresa hacer expiación/atonar. «Expía» conserva la fuerza teológica del texto en español de manera concisa, en línea con el griego ἐξιλάσεται.
- source_word: חטאת
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - los pecados
  - la culpa
  - el pecado humano
  lexicon: HALOT
  rationale: El hebreo puede funcionar de modo genérico, mientras que el griego tiene plural ἁμαρτίας. En español, el singular genérico «el pecado» mantiene el valor proverbial; el plural queda implícito y se preserva como posibilidad de lectura.
theological_decisions:
- issue: Valor de צדקה en el marco de la expiación
  english_pob_reading: almsgiving makes atonement for sin
  chosen_spanish_reading: la limosna expía el pecado
  alternative_spanish_readings:
  - la justicia expía el pecado
  - la rectitud expía el pecado
  - la caridad expía el pecado
  rationale: La lectura con el griego paralelo favorece una referencia concreta a la limosna/ayuda a los pobres, no a una justicia abstracta. Mantener «expía» preserva la afirmación teológica del proverbio sin suavizarla. Se evita sustituirla por un lenguaje más general que borraría la tensión del texto.
  doctrine_reference: Transparencia original-language-first; conservar la afirmación atonante del texto sapiencial sin armonizarla artificialmente.
- issue: Número de «pecado» frente al plural griego
  english_pob_reading: Greek has 'sins' (plural). The Hebrew 'sin' may be understood generically.
  chosen_spanish_reading: el pecado
  alternative_spanish_readings:
  - los pecados
  - el pecado y la culpa
  rationale: El singular genérico funciona bien en español proverbial y puede incluir el matiz colectivo. Como el hebreo es singular y el griego plural, se conserva la tensión sin forzar una resolución en el texto principal.
  doctrine_reference: Respeto a variantes de número cuando la fuente hebrea y la griega divergen.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés y el paralelo griego/hebreo para conservar el sentido proverbial y la tensión lexical entre צדקה y ἐλεημοσύνη. No se hicieron cambios de revisión adicionales; el borrador se alinea con la lectura aprobada por el contexto de auditoría.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se prefirió «limosna» por su precisión concreta frente a «caridad», que en español puede volverse más amplia y abstracta.
  - «Expía» conserva la fuerza atonante del hebreo כפר y del griego ἐξιλάσεται.
  - El orden y la sintaxis mantienen el paralelismo del proverbio hebreo, con puntuación española natural.
