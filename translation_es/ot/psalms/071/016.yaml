    text: 'O: «mencionaré tu justicia, solo la tuya». El verbo hebreo puede significar «mencionar», «relatar» o «proclamar».'
    reason: lexical_alternative
  - marker: c
    text: «Tu justicia» también puede entenderse como «tu rectitud» o, por el contexto, «tus actos justos».
    reason: lexical_alternative
  revision_rationale: 'Se corrige el borrador para conservar todos los elementos del hebreo: «Vendré» refleja mejor אָבוֹא que «Entraré»; «el Señor Yahvé» preserva el compuesto אֲדֹנָי יְהוִה sin enmascarar יהוה; y la nota del verbo se ajusta a una alternativa real frente a «proclamaré». También se mejora la naturalidad de גבורות con «poderosos hechos».'
