translation:
  language: es
  text: 'Entonces Sedecías dijo a Jeremías: «Que nadie sepa de estas cosas[a], y no morirás[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que nadie sepa de estos asuntos». El hebreo usa «hombre» en sentido genérico.'
    reason: lexical_alternative
  - marker: b
    text: 'La última cláusula puede implicar resultado o propósito: «para que no mueras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva esa secuencia con español natural y formal.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedecías
  alternatives_spanish:
  - Zedequías
  lexicon: Nombre propio bíblico
  rationale: Se translitera el nombre propio con la forma usual en español bíblico, manteniendo identidad y legibilidad.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición de dirección o destinatario se expresa naturalmente con «a» en español.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  lexicon: Nombre propio bíblico
  rationale: Nombre propio bíblico estandarizado en español.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: nadie
  alternatives_spanish:
  - ningún hombre
  - ninguna persona
  lexicon: HALOT
  rationale: El hebreo usa «hombre» de modo genérico, pero en español contemporáneo la fórmula natural y fiel para una prohibición universal es «nadie». La nota conserva la tensión lexical del original.
- source_word: אַל יֵדַע
  english_pob_choice: Let no one know
  chosen_spanish: Que nadie sepa
  alternatives_spanish:
  - No permitas que nadie sepa
  - No sepa nadie
  lexicon: HALOT
  rationale: אַל con yusivo expresa prohibición. «Que nadie sepa» reproduce esa fuerza imperativa de modo idiomático y claro.
- source_word: בַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: about these things
  chosen_spanish: de estas cosas
  alternatives_spanish:
  - sobre estos asuntos
  - de estos asuntos
  lexicon: HALOT
  rationale: דְּבָרִים puede abarcar «cosas», «asuntos» o «palabras»; aquí se refiere a los asuntos mencionados. «De estas cosas» es suficientemente amplio y no sobreinterpreta.
- source_word: וְלֹא תָמוּת
  english_pob_choice: and you will not die
  chosen_spanish: y no morirás
  alternatives_spanish:
  - para que no mueras
  - y así no morirás
  lexicon: HALOT
  rationale: La coordinación hebrea puede expresar resultado o consecuencia. Se mantiene la forma directa del texto, dejando que el contexto sugiera la relación.
theological_decisions:
- issue: 'Función de la cláusula final: consecuencia o propósito'
  english_pob_reading: 'The final clause may imply result or purpose: “so that you will not die.”'
  chosen_spanish_reading: 'La cláusula final se vierte de manera directa: «y no morirás», sin explicitar propósito.'
  alternative_spanish_readings:
  - para que no mueras
  - de modo que no morirás
  rationale: El hebreo permite una relación de resultado o de propósito. La traducción directa preserva la ambigüedad documentada sin forzar una interpretación única.
  doctrine_reference: No aplica; decisión de sintaxis y pragmática textual.
translation_notes:
  revision_awareness: Se siguió el pasaje inglés revisado en el que «no man» fue actualizado a «no one»; en español se optó por una formulación idiomática equivalente («nadie») sin perder la nota sobre el hebreo genérico. También se mantuvo la cláusula final sin explicitar la relación lógica, conforme al audit trail que admite resultado o propósito.
  spanish_consistency_notes:
  - Se usa «Sedecías» y «Jeremías» como formas bíblicas estándar en español.
  - Se preserva la distinción entre la mención genérica del hebreo («hombre») y la naturalidad del español («nadie») mediante nota.
  - «Estas cosas» evita estrechar innecesariamente דְּבָרִים a «palabras» o «asuntos», manteniendo amplitud semántica.
  - La puntuación con comillas angulares sigue norma española y separa adecuadamente el discurso directo.
