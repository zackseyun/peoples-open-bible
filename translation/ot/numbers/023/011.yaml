id: NUM.23.11
reference: Numbers 23:11
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר בָּלָק֙ אֶל בִּלְעָ֔ם מֶ֥ה עָשִׂ֖יתָ לִ֑/י לָ/קֹ֤ב אֹיְבַ/י֙ לְקַחְתִּ֔י/ךָ וְ/הִנֵּ֖ה בֵּרַ֥כְתָּ בָרֵֽךְ־׃
translation:
  text: Then Balak said to Balaam[a], “What have you done to me? I took you to curse my enemies, but look, you have done nothing but bless them!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''you have surely blessed'' or ''you have indeed blessed''; the Hebrew uses a finite verb with an infinitive absolute for emphasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence.
- source_word: מֶה עָשִׂיתָ לִי
  chosen: What have you done to me?
  alternatives:
  - What did you do to me?
  lexicon: HALOT
  rationale: A direct, idiomatic rendering of the interrogative plus verb and prepositional pronoun. Present perfect sounds natural in English for a just-completed action with present relevance.
- source_word: לָקֹב
  chosen: to curse
  alternatives:
  - to denounce
  - to invoke a curse on
  lexicon: HALOT
  rationale: קבב in this context refers to pronouncing a curse. 'Curse' is the standard and clearest English equivalent.
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  lexicon: HALOT
  rationale: Straightforward possessive plural noun; 'my enemies' is the natural equivalent.
- source_word: לְקַחְתִּיךָ
  chosen: I took you
  alternatives:
  - I brought you
  - I hired you
  lexicon: HALOT
  rationale: The verb לקח is literally 'take.' In context Balak had summoned Balaam, but 'I took you' best preserves the Hebrew wording without over-interpreting the arrangement as strictly 'hired' in this verse.
- source_word: וְהִנֵּה
  chosen: but look
  alternatives:
  - and behold
  - look
  lexicon: HALOT
  rationale: Introduces emphatic contrast and surprise. 'But look' captures both the adversative sense in context and the deictic force in readable modern English.
- source_word: בֵּרַכְתָּ בָרֵךְ
  chosen: you have done nothing but bless them
  alternatives:
  - you have surely blessed
  - you have indeed blessed
  - you have blessed abundantly
  lexicon: HALOT
  rationale: The finite verb plus infinitive absolute intensifies the action. English lacks a direct equivalent, so 'have done nothing but bless' conveys emphatic force naturally. 'Them' is supplied from context because the object is implicit in Hebrew but explicit in English.
