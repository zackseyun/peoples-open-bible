  text: עַ֤ל הַר נִשְׁפֶּה֙ שְֽׂאוּ נֵ֔ס הָרִ֥ימוּ ק֖וֹל לָ/הֶ֑ם הָנִ֣יפוּ יָ֔ד וְ/יָבֹ֖אוּ פִּתְחֵ֥י נְדִיבִֽים־־׃
