translation:
  language: es
  text: Entonces Yahvé descubrió[a] los ojos de Balaam, y él vio al ángel[b] de Yahvé de pie en el camino, con su espada desenvainada en la mano[c]; y se inclinó y se postró con el rostro en tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘abrió’ los ojos de Balaam. El verbo hebreo literalmente significa ‘descubrió’.
    reason: lexical_alternative
  - marker: b
    text: O ‘el mensajero de Yahvé’.
    reason: lexical_alternative
  - marker: c
    text: O ‘cayó sobre su rostro’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְגַל
  english_pob_choice: uncovered
  chosen_spanish: descubrió
  alternatives_spanish:
  - abrió
  - reveló
  lexicon: HALOT
  rationale: El verbo hebreo expresa literalmente 'quitar el velo' o 'descubrir'. En español, 'descubrió los ojos' comunica bien la acción idiomática sin perder la idea de remoción de impedimento para ver. 'Abrió' sería más idiomático, pero 'descubrió' conserva mejor la fuerza léxica del hebreo, como en la decisión inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrámaton como 'Yahvé', conforme a la política terminológica del proyecto. Esto evita la sustitución por un título y mantiene la transparencia con el texto fuente.
- source_word: עֵינֵי בִלְעָם
  english_pob_choice: Balaam’s eyes
  chosen_spanish: los ojos de Balaam
  alternatives_spanish:
  - los ojos de Balaam
  - Balaam
  lexicon: HALOT
  rationale: El hebreo presenta una cadena constructa natural que en español se vierte con posesión explícita. 'Los ojos de Balaam' es claro, idiomático y fiel al referente singular.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: Aquí מַלְאַךְ nombra al ser celestial del relato; 'ángel' es el equivalente natural y reconocido en español, mientras que 'mensajero' sería posible pero menos preciso en este contexto narrativo.
- source_word: נִצָּב
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - apostado
  - en pie
  lexicon: HALOT
  rationale: El participio describe la postura fija del ángel. 'De pie' es natural en español y comunica la presencia inmóvil en el camino sin añadir matices ajenos.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: in the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la carretera
  - en la vía
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar camino, ruta o vía. 'Camino' mantiene la neutralidad y funciona bien en español bíblico sin forzar una imagen moderna de carretera.
- source_word: וְחַרְבּוֹ שְׁלֻפָה בְּיָדוֹ
  english_pob_choice: with his sword drawn in his hand
  chosen_spanish: con su espada desenvainada en la mano
  alternatives_spanish:
  - con la espada sacada en la mano
  - con su espada fuera de la vaina en la mano
  lexicon: HALOT
  rationale: שְׁלֻפָה significa 'desenvainada' o 'sacada'. 'Desenvainada' es el término más preciso y natural en español bíblico. Se conserva además 'en la mano' para reflejar la circunstancia acompañante del original.
- source_word: וַיִּקֹּד
  english_pob_choice: he bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - se dobló
  lexicon: HALOT
  rationale: El verbo expresa un gesto de inclinación o abatimiento. 'Se inclinó' reproduce bien la acción física inicial sin adelantar la postración completa que sigue inmediatamente.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: and prostrated himself
  chosen_spanish: y se postró
  alternatives_spanish:
  - y adoró
  - y cayó rostro en tierra
  lexicon: HALOT
  rationale: El hebreo puede implicar postración corporal y, según contexto, adoración. Aquí se mantiene el gesto corporal con 'se postró', evitando resolver la tensión interpretativa a favor de 'adoró'.
- source_word: לְאַפָּיו
  english_pob_choice: with his face to the ground
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con el rostro en el suelo
  - boca abajo
  lexicon: HALOT
  rationale: El modismo hebreo describe caída postrada con el rostro hacia el suelo. 'Con el rostro en tierra' es una fórmula clara, reverente y fiel al gesto concreto.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea editorial del proyecto exige transparentar el tetragrámaton con un nombre propio transliterado. 'Yahvé' mantiene esa transparencia y la continuidad con el resto del corpus español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de וַיִּשְׁתַּחוּ en el contexto narrativo
  english_pob_reading: bodily prostration language ('prostrated himself')
  chosen_spanish_reading: '''se postró'' como gesto corporal, sin traducirlo explícitamente como ''adoró'''
  alternative_spanish_readings:
  - adoró
  - se arrodilló
  rationale: El contexto describe la reacción física de Balaam ante la aparición del ángel. 'Se postró' preserva la acción visible y deja abierta la posible carga reverente sin imponer una interpretación más desarrollada que el texto no explicita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El pasaje coincide con el último pase revisado sin cambios sustantivos; la versión española sigue de cerca el trazado óptimo-equivalente ya validado en inglés, preservando el nombre divino, la imagen verbal de 'descubrir' los ojos y la tensión entre postración corporal y posible adoración.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, en concordancia con el estándar del proyecto.
  - '''Ángel de Yahvé'' se usa de forma uniforme para מַלְאַךְ יְהוָה.'
  - '''Se postró'' preserva la ambigüedad reverente del verbo hebreo sin sobreinterpretar.'
  - La puntuación sigue la sintaxis narrativa natural del español y refleja la coordinación del original.
