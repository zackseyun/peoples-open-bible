translation:
  language: es
  text: 'Pero él dijo[a]: «No es tan fuerte su manera, oh miembros de un demonio[b], como para apartar mi razón. Corten mis miembros, quemen mi carne y tuerzan mis articulaciones»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No es tan fuerte ... como para desviar mi razón».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «miembros de un demonio» refleja el vocativo griego difícil y probablemente insultante, dirigido a los torturadores o a sus cuerpos como instrumentos de crueldad demoníaca.
    reason: cultural_note
lexical_decisions:
- source_word: τρόπος
  english_pob_choice: method
  chosen_spanish: manera
  alternatives_spanish:
  - método
  - modo
  - procedimiento
  lexicon: LSJ
  rationale: En este contexto de tortura, τρόπος expresa la forma o manera de actuar de los verdugos. «Manera» es natural en español y conserva el valor de modo/contrivancia sin sonar técnico o demasiado abstracto.
- source_word: μεροὶ
  english_pob_choice: limbs
  chosen_spanish: miembros
  alternatives_spanish:
  - miembros del cuerpo
  - partes
  - extremidades
  lexicon: LSJ
  rationale: El vocativo griego es difícil y parece aludir a partes corporales de manera despectiva. «Miembros» mantiene la imagen corporal y permite reflejar la dureza del insulto sin forzar una interpretación más específica que el griego no exige.
- source_word: δαῖμον
  english_pob_choice: of a demon
  chosen_spanish: de un demonio
  alternatives_spanish:
  - demoníacos
  - de un diablo
  lexicon: LSJ
  rationale: «De un demonio» conserva el matiz genitivo y la carga insultante/oscura de la expresión griega, sin sustituirla por un término más doctrinalmente fijado que el texto no requiere.
- source_word: λογισμός
  english_pob_choice: reason
  chosen_spanish: razón
  alternatives_spanish:
  - mente
  - juicio racional
  - criterio
  lexicon: LSJ
  rationale: 4 Macabeos enfatiza la razón como principio rector frente a las pasiones. «Razón» reproduce bien ese valor filosófico y es más preciso que «mente» en español para este contraste.
- source_word: ἆξαι
  english_pob_choice: lead ... away
  chosen_spanish: arrastrar
  alternatives_spanish:
  - llevar lejos
  - desviar
  - arrancar
  lexicon: LSJ
  rationale: La imagen es de mover la razón fuera de su curso. «Arrastrar» comunica bien la fuerza del verbo en español y preserva la metáfora de una razón tirada fuera de su lugar.
- source_word: τέμνετέ
  english_pob_choice: Cut off
  chosen_spanish: Corten
  alternatives_spanish:
  - Corten de una vez
  - Corten y separen
  - Cortad
  lexicon: LSJ
  rationale: El imperativo es directo y violento. En español, el contexto ya hace claro que se trata de mutilación; por eso «Corten» basta, mientras que el sentido de separación queda reforzado por el objeto «mis miembros».
- source_word: σάρκας
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - flesh
  - tejido
  - cuerpo
  lexicon: LSJ
  rationale: σάρξ debe mantenerse como «carne» según el valor literal del término en este contexto de tortura física.
- source_word: στρεβλοῦτε
  english_pob_choice: wrench
  chosen_spanish: tuerzan
  alternatives_spanish:
  - retuerzan
  - doblen
  - disloquen
  lexicon: LSJ
  rationale: El verbo describe torcer violentamente. «Tuerzan» conserva la imagen básica y suena natural en español; «retuerzan» sería más explícito, pero menos sobrio.
- source_word: ἄρθρα
  english_pob_choice: joints
  chosen_spanish: articulaciones
  alternatives_spanish:
  - juntas
  - uniones
  - articulaciones del cuerpo
  lexicon: LSJ
  rationale: ἄρθρα designa articulaciones o uniones corporales. «Articulaciones» es el equivalente más preciso y claro en español, y mantiene la progresión corporal del pasaje.
theological_decisions:
- issue: Cómo reflejar la centralidad de λογισμός en 4 Macabeos
  english_pob_reading: reason
  chosen_spanish_reading: razón
  alternative_spanish_readings:
  - mente
  - juicio racional
  - criterio
  rationale: El libro contrapone la razón a la violencia y a las pasiones. «Razón» preserva ese eje conceptual sin domesticar el tono filosófico del texto.
