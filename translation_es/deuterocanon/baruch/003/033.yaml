translation:
  language: es
  text: Él envía la luz[a], y va; la llamó, y le obedeció con temblor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «El que envía la luz, y va». El griego comienza con un participio con artículo que funciona como una descripción a modo de título de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἀποστέλλων
  english_pob_choice: He sends out
  chosen_spanish: Él envía
  alternatives_spanish:
  - El que envía
  - El que manda
  lexicon: BDAG
  rationale: El participio con artículo funciona de modo sustantivo y apunta a Dios en el contexto. En español, un sujeto explícito con verbo finito suena natural y conserva la acción continua o característica sin volver mecánico el participio.
- source_word: τὸ φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: BDAG
  rationale: Se mantiene el sustantivo con artículo porque el griego lo lleva y en español suena natural. El referente es la luz creada, personificada en el verso.
- source_word: πορεύεται
  english_pob_choice: it goes
  chosen_spanish: va
  alternatives_spanish:
  - se va
  - procede
  lexicon: BDAG
  rationale: Va expresa bien el movimiento simple y la respuesta personificada de la luz sin añadir matices innecesarios.
- source_word: ἐκάλεσεν
  english_pob_choice: he called
  chosen_spanish: la llamó
  alternatives_spanish:
  - la convocó
  - la mandó
  lexicon: BDAG
  rationale: Llamó conserva el paralelismo verbal del texto y evita sobredeterminar la acción como una orden técnica; el objeto femenino concuerda con 'la luz'.
- source_word: ὑπήκουσεν αὐτῷ
  english_pob_choice: it obeyed him
  chosen_spanish: le obedeció
  alternatives_spanish:
  - le escuchó
  - le hizo caso
  lexicon: BDAG
  rationale: Obedeció es la equivalencia directa de ὑπακούω en este contexto de creación sometida al mandato divino. El dativo se expresa naturalmente con 'le'.
- source_word: τρόμῳ
  english_pob_choice: with trembling
  chosen_spanish: con temblor
  alternatives_spanish:
  - temblando
  - con temor
  lexicon: BDAG
  rationale: Con temblor reproduce el valor adverbial del dativo y mantiene la imagen vívida de respuesta reverente y estremecida. 'Con temor' suavizaría demasiado la imagen física.
theological_decisions:
- issue: Personificación de la luz obedeciendo a Dios
  english_pob_reading: Retain the personification directly in the main text.
  chosen_spanish_reading: Mantener la personificación de la luz en el texto principal.
  alternative_spanish_readings:
  - Suavizarla como una descripción impersonal del orden natural
  rationale: El griego presenta a la luz como enviada, llamada y obediente con temblor. La traducción conserva esa imagen poética y teológica de la soberanía de Dios sobre la creación sin aplanarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referente del participio articular ὁ ἀποστέλλων
  english_pob_reading: Render with explicit personal subject 'He,' referring to God from the surrounding context.
  chosen_spanish_reading: Usar un sujeto explícito ('Él') referido a Dios por el contexto.
  alternative_spanish_readings:
  - El que envía la luz
  rationale: Aunque el griego tiene un participio sustantivado, el español fluye mejor con un sujeto personal explícito. El contexto identifica claramente a Dios como agente, de modo que no se introduce una idea ajena al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: La versión más reciente del control de revisión indica que no se requirieron cambios y que el estado es de alta concordancia; por ello, el borrador español sigue de cerca la lectura auditada sin introducir ajustes no justificados.
  spanish_consistency_notes:
  - Se conserva 'Dios' implícito en el sujeto 'Él' por el contexto, sin sustituirlo por una glosa interpretativa en el texto principal.
  - '''Luz'' se mantiene como sustantivo concreto y no como metáfora abstracta, conforme al audit trail en inglés.'
  - Se prefirió 'con temblor' para reflejar el dativo τρόμῳ sin perder la fuerza imagética del original.
