translation:
  language: es
  text: y a los de Rakal[a], y a los de los pueblos de los jerameelitas, y a los de los pueblos de los ceneos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rakal también se escribe Racal en algunas tradiciones en inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַאֲשֶׁר
  english_pob_choice: and to those
  chosen_spanish: y a los de
  alternatives_spanish:
  - y para los de
  - y a quienes estaban en
  lexicon: HALOT
  rationale: La construcción repetida con waw + lamed + relativo funciona aquí como una fórmula de distribución/destino. En español, 'y a los de' conserva la referencia a un grupo destinatario sin forzar una paráfrasis más explicativa que el hebreo no exige.
- source_word: בְּרָכָל
  english_pob_choice: in Rakal
  chosen_spanish: Rakal
  alternatives_spanish:
  - Racal
  lexicon: HALOT
  rationale: Es un nombre de lugar; se translitera y no se traduce. Se mantiene 'Rakal' como forma principal, en línea con la opción inglesa auditada y la transliteración directa de las consonantes hebreas.
- source_word: בְּעָרֵי
  english_pob_choice: in the towns of
  chosen_spanish: las ciudades de
  alternatives_spanish:
  - los pueblos de
  - las villas de
  lexicon: HALOT
  rationale: עִיר puede significar 'ciudad' o 'pueblo/aldea' según el contexto. Aquí, al tratarse de una lista geográfica, 'ciudades de' reproduce bien la extensión territorial; 'pueblos' también sería posible, pero 'ciudades' sigue de cerca la redacción auditada inglesa sin sonar forzado.
- source_word: הַיְּרַחְמְאֵלִי
  english_pob_choice: the Jerahmeelites
  chosen_spanish: los jerameelitas
  alternatives_spanish:
  - los jerahmeelitas
  - el jerameelita
  lexicon: HALOT
  rationale: El gentilicio funciona colectivamente como grupo étnico/clánico. En español, 'jerameelitas' es una transliteración más natural y legible que una forma demasiado pegada al hebreo; se mantiene el plural colectivo coherente con 'de las ciudades de'.
- source_word: הַקֵּינִי
  english_pob_choice: the Kenites
  chosen_spanish: los ceneos
  alternatives_spanish:
  - los quenitas
  - el ceneo
  lexicon: HALOT
  rationale: '''Ceneos'' es la forma tradicional y reconocible en español bíblico para este clan, y resulta más natural que una transliteración estricta. Se conserva el plural colectivo por el mismo motivo que en ''jerameelitas''.'
translation_notes:
  revision_awareness: El texto base inglés no presenta cambios revisados ni divergencias textuales; el hebreo masorético y la versión inglesa auditada coinciden en la estructura tripartita de la lista y en la transliteración de Rakal. La principal decisión española fue equilibrar transparencia y legibilidad en los etnónimos y en בְּעָרֵי.
  spanish_consistency_notes:
  - Se mantiene un tono sobrio y registral, adecuado para una lista de distribución de botín.
  - Se evita 'SEÑOR' u otros sustitutos no pertinentes, ya que no hay el Nombre divino en el versículo.
  - Los etnónimos se presentan en plural colectivo para concordar con el sintagma 'de las ciudades de'.
  - Se preserva la nota alternativa sobre Rakal porque la tradición inglesa auditada documenta una variante ortográfica relevante.
