base_translation:
  language: en
  yaml_path: translation/ot/numbers/028/026.yaml
  text: And on the day of the firstfruits[a], when you present a new grain offering to Yahweh at your Feast of Weeks, you shall have a holy convocation[b]. You shall do no ordinary work.
  footnotes:
  - marker: a
    text: Or 'a holy assembly.' The Hebrew phrase is a technical term for a sacred gathering summoned for worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'no laborious work' or 'no occupational work.' The phrase refers to ordinary work associated with daily labor.
    reason: lexical_alternative
