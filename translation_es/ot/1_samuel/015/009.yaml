translation:
  language: es
  text: Pero Saúl y el pueblo le perdonaron la vida[a] a Agag, y reservaron lo mejor de las ovejas y del ganado, y los terneros engordados, y los corderos, y todo lo que era bueno; y no quisieron dedicarlos al exterminio[b]. Pero todo lo despreciable y lo inútil lo dedicaron al exterminio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se apiadaron de». El hebreo expresa una compasión que aquí resulta en preservar la vida en desobediencia.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «dedicar al exterminio», término técnico para poner algo bajo el anatema para su destrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְמֹל
  english_pob_choice: spared
  chosen_spanish: perdonaron
  alternatives_spanish:
  - se apiadaron de
  - les tuvieron compasión
  lexicon: HALOT
  rationale: El verbo expresa aquí no solo un sentimiento interno, sino la decisión de no ejecutar la destrucción ordenada. En español, "perdonaron" comunica bien la omisión deliberada; se mantiene el matiz de clemencia indebida sin volverla una paráfrasis larga.
- source_word: מֵיטַב
  english_pob_choice: the best of
  chosen_spanish: lo mejor de
  alternatives_spanish:
  - la mejor parte de
  - los mejores de
  lexicon: HALOT
  rationale: La construcción indica la porción de mayor calidad entre los animales. "Lo mejor de" es natural en español y conserva el valor evaluativo.
- source_word: הַצֹּאן
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  lexicon: HALOT
  rationale: Es el término específico para ovinos; en este inventario de botín resulta más claro que el colectivo "rebaño".
- source_word: הַבָּקָר
  english_pob_choice: the cattle
  chosen_spanish: el ganado
  alternatives_spanish:
  - las reses
  - el vacuno
  lexicon: HALOT
  rationale: En español "ganado" funciona bien como conjunto y coordina de modo natural con "ovejas". Mantiene la referencia a bovinos sin forzar una especificación demasiado técnica.
- source_word: הַמִּשְׁנִים
  english_pob_choice: the fattened calves
  chosen_spanish: los terneros engordados
  alternatives_spanish:
  - los cebones
  - los animales de segunda cría
  lexicon: HALOT
  rationale: La palabra hebrea es difícil; la tradición la ha entendido de varias maneras. La revisión inglesa reciente favorece "fattened calves", así que en español se opta por un equivalente transparente y comprensible, sin imponer una lectura más incierta como "fatlings".
- source_word: הַכָּרִים
  english_pob_choice: the lambs
  chosen_spanish: los carneros
  alternatives_spanish:
  - los corderos
  - los machos de las ovejas
  lexicon: HALOT
  rationale: Aunque puede referirse a carneros o corderos machos, "carneros" refleja bien el probable sentido de animal masculino del rebaño y encaja con la lista de animales seleccionados.
- source_word: כָּל הַטּוֹב
  english_pob_choice: all that was good
  chosen_spanish: todo lo que era bueno
  alternatives_spanish:
  - todo lo bueno
  - todo lo valioso
  lexicon: HALOT
  rationale: La frase amplía la lista a cualquier cosa considerada deseable. "Todo lo que era bueno" conserva el juicio cualitativo y evita restringirlo solo a valor económico.
- source_word: לֹא אָבוּ
  english_pob_choice: they were not willing
  chosen_spanish: no quisieron
  alternatives_spanish:
  - no estuvieron dispuestos a
  - se negaron a
  lexicon: HALOT
  rationale: El verbo expresa voluntad o consentimiento, no incapacidad. "No quisieron" comunica con concisión que hubo rechazo deliberado a obedecer.
- source_word: הַחֲרִימָם / הֶחֱרִימוּ
  english_pob_choice: devote them to destruction / devoted to destruction
  chosen_spanish: dedicarlo al exterminio
  alternatives_spanish:
  - consagrarlo al exterminio
  - ponerlo bajo anatema para destruirlo
  lexicon: HALOT
  rationale: Se mantiene el valor técnico de חֵרֶם en contexto de guerra santa/judicial. "DedicAR al exterminio" preserva la fuerza del acto sin recurrir a un calco opaco ni a una simple "destrucción" que perdería el matiz ritual-jurídico.
- source_word: כָּל הַמְּלָאכָה
  english_pob_choice: every thing
  chosen_spanish: todo
  alternatives_spanish:
  - toda la propiedad
  - todos los bienes
  lexicon: HALOT
  rationale: Aquí מְלָאכָה funciona como conjunto de bienes/spoils. En español basta con "todo" unido a la frase siguiente; el contexto ya restringe el referente a lo despreciable y lo inútil que fue apartado para destrucción.
- source_word: נְמִבְזָה
  english_pob_choice: despised
  chosen_spanish: despreciable
  alternatives_spanish:
  - despreciado
  - vil
  lexicon: HALOT
  rationale: La forma indica algo tenido en poco o tratado con desprecio. "Despreciable" conserva ese valor evaluativo y enlaza bien con el miembro paralelo siguiente.
- source_word: נָמֵס
  english_pob_choice: worthless
  chosen_spanish: inútil
  alternatives_spanish:
  - sin valor
  - sin provecho
  lexicon: HALOT
  rationale: El término es difícil; en contraste con "todo lo que era bueno" señala lo que no tenía provecho ni valor práctico. "Inútil" comunica esa oposición con claridad en español.
theological_decisions:
- issue: Sentido técnico de חרם en la obediencia de Saúl
  english_pob_reading: devote to destruction
  chosen_spanish_reading: dedicar al exterminio
  alternative_spanish_readings:
  - poner bajo anatema
  - consagrar a la destrucción
  rationale: El relato no trata solo de matar, sino de ejecutar lo que había quedado bajo el ban judicial de Yahvé. "DedicAR al exterminio" mantiene el acto deliberado y su severidad, sin ocultar la tensión teológica de la desobediencia de Saúl.
  doctrine_reference: 1 Sam 15:3, 15:9; lexema חרם en contexto de guerra santa
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que afinó la identificación de הַמִּשְׁנִים como 'the fattened calves' y prefirió una lista de ganado más natural. La versión española sigue esa corrección al usar 'los terneros engordados' y adapta el resto del versículo a un español claro, conservando el valor técnico de חרם.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en la POB española cuando aparezca el nombre divino, aunque en este versículo no aparece.
  - Se conserva un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - '''No quisieron'' refleja la voluntad negada y mantiene la tensión ética del pasaje.'
  - '''Dedicar al exterminio'' se usa de manera consistente para חרם en contexto bélico/judicial.'
