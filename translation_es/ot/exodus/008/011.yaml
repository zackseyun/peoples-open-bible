translation:
  language: es
  text: Pero cuando Faraón vio que había alivio[a], endureció su corazón y no los escuchó, tal como Yahvé había dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había respiro». El término hebreo puede denotar alivio, reposo o un espacio para respirar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - se dio cuenta
  lexicon: HALOT
  rationale: ראייה aquí conserva el sentido básico de ver, pero en contexto implica reconocer un cambio en la situación. «Vio» mantiene el giro hebreo y suena natural en español.
- source_word: כִּי הָיְתָה הָרְוָחָה
  english_pob_choice: that there was relief
  chosen_spanish: que había alivio
  alternatives_spanish:
  - que había respiro
  - que había respite
  lexicon: HALOT
  rationale: רְוָחָה puede expresar alivio, espacio para respirar o un cese de presión. «Alivio» comunica bien la idea en español y preserva la amplitud semántica sin exagerar el matiz.
- source_word: וְהַכְבֵּד אֶת לִבּוֹ
  english_pob_choice: he hardened his heart
  chosen_spanish: endureció su corazón
  alternatives_spanish:
  - hizo pesado su corazón
  - hizo obstinado su corazón
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hacer pesado el corazón», pero en este contexto de Éxodo el idioma establecido expresa obstinación. «Endureció su corazón» conserva el valor idiomático y la tensión literaria del texto.
- source_word: וְלֹא שָׁמַע אֲלֵהֶם
  english_pob_choice: and did not listen to them
  chosen_spanish: y no los escuchó
  alternatives_spanish:
  - y no les hizo caso
  - y no los atendió
  lexicon: HALOT
  rationale: שׁמע con אֶל significa escuchar/atender. «No los escuchó» sigue de cerca la frase hebrea y comunica la negativa a prestar oído.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Conforme al criterio del proyecto, el nombre divino se rinde como «Yahvé» en el texto principal, preservando el nombre propio del pacto en lugar de sustituirlo por un título.
theological_decisions:
- issue: Agencia en el endurecimiento del corazón de Faraón
  english_pob_reading: Pharaoh is presented here as hardening his own heart.
  chosen_spanish_reading: Faraón endurece su propio corazón en esta frase.
  alternative_spanish_readings:
  - Dios endurece el corazón de Faraón en este versículo.
  - Su corazón se endureció.
  rationale: La forma verbal hebrea presenta a Faraón como sujeto agente. Traducirlo así preserva la tensión canónica de Éxodo sin resolver prematuramente el tema de la acción divina en otros pasajes.
  doctrine_reference: Mantener la tensión teológica del texto; no armonizar de forma anticipada con otros versículos.
translation_notes:
  revision_awareness: La revisión más reciente del flujo en inglés quedó sin cambios; la presente redacción sigue de cerca el texto hebreo y la decisión léxica auditada de la POB inglesa, manteniendo el valor idiomático de "endurecer el corazón" y la referencia explícita a Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al criterio del proyecto.
  - Se mantiene «corazón» con el verbo «endureció» para conservar la metáfora hebrea estable de Éxodo.
  - «Alivio» se eligió como término principal por claridad; la nota conserva la alternativa «respiro».
  - La puntuación y el orden siguen un español natural sin suavizar la secuencia causal del hebreo.
