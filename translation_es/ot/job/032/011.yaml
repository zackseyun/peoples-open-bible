    rationale: La auditoría inglesa preserva la ambigüedad/idiomaticidad de עַד תַּחְקְרוּן מִלִּין. Dado que el español también puede aplanarla, conviene mantener una nota léxica equivalente.
  revised_spanish_text: Miren, esperé sus palabras; escuché sus razonamientos[a], hasta que ustedes buscaron palabras[b].
