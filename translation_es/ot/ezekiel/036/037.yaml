translation:
  language: es
  text: 'Así dice el Señor Dios Yahvé: Aun en esto permitiré que la casa de Israel me busque para hacer esto por ellos: los multiplicaré como un rebaño de hombres[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seré consultado por la casa de Israel para hacer esto por ellos».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «como un rebaño de hombres»; es decir, una gran multitud humana como un rebaño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: En español conviene conservar ambos elementos del título compuesto sin crear una duplicación extraña. 'Señor Yahvé' refleja la combinación de אֲדֹנָי con el nombre divino, y sigue el criterio del proyecto de usar 'Yahvé' para יְהוָה.
- source_word: עוֹד זֹאת
  english_pob_choice: Yet in this also
  chosen_spanish: Todavía también en esto
  alternatives_spanish:
  - Y todavía en esto
  - También en esto
  lexicon: HALOT
  rationale: '''עוֹד'' aporta continuación o añadidura; ''זֹאת'' remite al asunto inmediato. ''Todavía también en esto'' conserva la fuerza aditiva y la referencia al tema previo con un español natural.'
- source_word: אִדָּרֵשׁ
  english_pob_choice: I will let ... ask me
  chosen_spanish: permitiré que ... me consulte
  alternatives_spanish:
  - seré consultado por
  - permitiré que ... me busque
  lexicon: HALOT
  rationale: El niphal de דרש aquí expresa ser requerido/consultado. 'Me consulte' preserva la idea de buscar orientación o intervención divina, y 'permitiré que' mantiene la tensión entre la acción soberana de Dios y la necesidad de que Israel se dirija a él.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión pactual corporativa del hebreo sin reducirla a un simple 'Israel'.
- source_word: לַעֲשׂוֹת לָהֶם
  english_pob_choice: to act for them
  chosen_spanish: para hacerles esto
  alternatives_spanish:
  - para obrar por ellos
  - para hacer por ellos esto
  lexicon: HALOT
  rationale: El infinitivo de עשה con לָהֶם es amplio. 'Hacerles esto' mantiene la referencia al acto prometido en el contexto inmediato y evita sobreespecificar 'actuar' en un español menos natural.
- source_word: אַרְבֶּה אֹתָם
  english_pob_choice: I will multiply them
  chosen_spanish: los multiplicaré
  alternatives_spanish:
  - los haré numerosos
  - los aumentaré
  lexicon: HALOT
  rationale: El causativo de רבה se expresa con 'multiplicar' en un registro bíblico claro y fiel al motivo de restauración poblacional.
- source_word: כַּצֹּאן אָדָם
  english_pob_choice: like a flock of men
  chosen_spanish: como un rebaño de hombres
  alternatives_spanish:
  - como un rebaño humano
  - como un rebaño de personas
  lexicon: HALOT
  rationale: 'Se preserva la rareza metafórica del hebreo: literalmente ''rebaño de אדם''. ''Hombres'' mantiene la forma léxica y la nota corporativa/generica del sustantivo, sin suavizar el giro a una expresión más interpretativa.'
theological_decisions:
- issue: Título divino compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: La decisión sigue la política del proyecto de no enmascarar el Nombre divino. En español, 'Yahvé' permite distinguir el tetragrámaton sin perder la solemnidad del título compuesto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH'
- issue: Sentido de אִדָּרֵשׁ entre soberanía divina y petición humana
  english_pob_reading: I will let the house of Israel ask me
  chosen_spanish_reading: permitiré que la casa de Israel me consulte
  alternative_spanish_readings:
  - seré consultado por la casa de Israel
  - permitiré que la casa de Israel me busque
  rationale: 'La frase conserva la tensión teológica: Dios promete la acción, pero también establece que Israel debe dirigirse a él. ''Me consulte'' refleja mejor el valor de דרש en este contexto que una simple ''petición'' o una pasividad absoluta.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Sustantivo אָדָם en expresión colectiva
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - humanidad
  - personas
  rationale: El hebreo usa אדם de modo genérico dentro de una imagen pastoral. 'Hombres' conserva el enlace léxico y la aspereza intencional de la metáfora; una opción neutral suavizaría el efecto del original.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
translation_notes:
  revision_awareness: Revisado frente al último pase auditado (2026-04-23); no se indicaron cambios y el veredicto fue de alta concordancia con observaciones menores. La presente redacción conserva la tensión entre consulta humana y acción divina, y mantiene el Nombre divino como Yahvé conforme a la terminología del proyecto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוִה y 'Señor' para אֲדֹנָי, evitando calcos como 'SEÑOR' en mayúsculas.
  - '''La casa de Israel'' conserva la fórmula corporativa pactual.'
  - '''Multiplicaré'' y ''rebaño de hombres'' retienen la imaginería poblacional del hebreo sin domesticarla.'
  - La nota [a] conserva la alternativa verbal tradicional; [b] explica el giro hebreo poco común.
