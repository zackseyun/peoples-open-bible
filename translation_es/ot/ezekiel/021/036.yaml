translation:
  language: es
  text: Y derramaré sobre ti mi indignación; con el fuego de mi ira soplaré sobre ti, y te entregaré en manos de hombres brutales[a], artífices de destrucción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombres feroces»; literalmente, «hombres ardientes».
    reason: lexical_alternative
  - marker: b
    text: O «diestros en destrucción» o «herreros de ruina».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפַכְתִּי
  english_pob_choice: And I will pour out
  chosen_spanish: Y derramaré
  alternatives_spanish:
  - Y vaciaré
  - Y derramaré por completo
  lexicon: HALOT
  rationale: שׁפך expresa la imagen de derramar una carga de juicio; en español, «derramaré» conserva la metáfora natural y la solemnidad profética mejor que un giro más literal o pesado.
- source_word: זַעְמִי
  english_pob_choice: my indignation
  chosen_spanish: mi indignación
  alternatives_spanish:
  - mi ira
  - mi furor
  lexicon: HALOT
  rationale: זַעַם tiene matiz de indignación/enojo judicial. «Indignación» preserva ese tono moral y sentencioso sin igualar indebidamente este término con עֶבְרָה.
- source_word: בְּאֵשׁ עֶבְרָתִי
  english_pob_choice: with the fire of my wrath
  chosen_spanish: con el fuego de mi ira
  alternatives_spanish:
  - en el fuego de mi furor
  - con el fuego de mi furia
  lexicon: HALOT
  rationale: La expresión intensifica el juicio mediante la imagen del fuego. «Ira» funciona de manera clara y digna en español, y evita repetir «indignación» mientras conserva la fuerza de עֶבְרָה.
- source_word: אָפִיחַ
  english_pob_choice: I will blow on
  chosen_spanish: soplaré sobre ti
  alternatives_spanish:
  - soplaré contra ti
  - exhalaré sobre ti
  lexicon: HALOT
  rationale: El hifil de נפח comunica la acción de soplar o avivar. «Soplaré sobre ti» mantiene la imagen del fuego que se aviva y es natural en español.
- source_word: וּנְתַתִּיךְ בְּיַד
  english_pob_choice: and I will give you into the hand of
  chosen_spanish: y te entregaré en manos de
  alternatives_spanish:
  - y te pondré en manos de
  - y te daré en manos de
  lexicon: HALOT
  rationale: La idiomática hebrea de poner en mano de otro indica entregar al poder de alguien. «Te entregaré en manos de» conserva la fórmula bíblica sin volverla arcaica.
- source_word: אֲנָשִׁים בֹּעֲרִים
  english_pob_choice: brutal men
  chosen_spanish: hombres brutales
  alternatives_spanish:
  - hombres ardientes
  - hombres feroces
  lexicon: HALOT
  rationale: בֹּעֲרִים literalmente significa «ardientes/quemantes», pero aquí describe personas violentas y destructivas. «Brutales» comunica esa fuerza en español; se preserva la alternativa literal en nota.
- source_word: חָרָשֵׁי מַשְׁחִית
  english_pob_choice: craftsmen of destruction
  chosen_spanish: artífices de destrucción
  alternatives_spanish:
  - artesanos de destrucción
  - herreros de ruina
  lexicon: HALOT
  rationale: חָרָשׁ designa a un artesano o artífice; «artífices de destrucción» conserva la metáfora de personas expertas en producir ruina y suena natural en español culto.
theological_decisions:
- issue: Diferenciación de los dos términos de ira/indignación en hebreo
  english_pob_reading: 'Different English terms are used for זַעַם and עֶבְרָה: ''indignation'' and ''wrath''.'
  chosen_spanish_reading: Se distinguen «indignación» y «ira» para reflejar dos términos emparentados pero no idénticos.
  alternative_spanish_readings:
  - Usar «ira» para ambos términos
  - Usar «furor» para ambos términos
  rationale: El hebreo usa dos vocablos de juicio emotivo cercanos para intensificar el lenguaje profético. Mantener dos equivalentes distintos en español ayuda a conservar esa tensión retórica sin fundirlos artificialmente.
  doctrine_reference: Translation philosophy §5 (Consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: La fuente y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; la redacción española sigue esa lectura estable, manteniendo la distinción semántica entre זַעַם y עֶבְרָה y la imagen de entrega en manos de agentes destructivos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en todo el proyecto, aunque este versículo no lo contiene explícitamente.
  - Se evita «SEÑOR» como sustituto del nombre divino porque el texto aquí no presenta un reemplazo nominal, sino una voz divina directa.
  - «Artífices» se usa para conservar el matiz profesional de חָרָשׁ; no se sustituye por «herreros» porque el hebreo es más amplio que el oficio metalúrgico.
  - «Hombres brutales» traduce el efecto contextual de בֹּעֲרִים sin perder la nota literal en la glosa.
  - La estructura verbal en futuro conserva el tono profético de juicio de manera consistente con el registro del pasaje.
