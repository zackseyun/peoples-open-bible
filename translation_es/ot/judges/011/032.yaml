translation:
  language: es
  text: Entonces Jefté cruzó hacia los amonitas[a] para combatir contra ellos, y Yahvé los entregó en su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cruzó hacia los hijos de Amón». La expresión se refiere a que Jefté fue contra los amonitas en batalla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: crossed over
  chosen_spanish: pasó
  alternatives_spanish:
  - cruzó
  - pasó al otro lado
  lexicon: HALOT
  rationale: El hebreo עבר expresa movimiento de paso o cruce. En español, «pasó» conserva la acción concreta sin forzar una imagen geográfica que el contexto no requiere. «Cruzó» es posible, pero puede sonar más físico de lo que el pasaje enfatiza.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - contra
  lexicon: HALOT
  rationale: La preposición básica es direccional («a/toward»). Siguiendo el análisis auditado, no se debe cargar la preposición con valor hostil; la oposición ya aparece en el infinitivo de combate.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - los hijos de Amón
  lexicon: HALOT
  rationale: Se conserva más de cerca la forma hebrea «hijos de Amón», que el español entiende bien y mantiene la imagen genealógica/étnica del original. «Amonitas» sería idiomático, pero atenúa esa forma fuente.
- source_word: לְהִלָּחֶם בָּם
  english_pob_choice: to fight against them
  chosen_spanish: para combatir contra ellos
  alternatives_spanish:
  - para pelear contra ellos
  - para hacer guerra contra ellos
  lexicon: HALOT
  rationale: El infinitivo expresa entablar combate contra un adversario. «Combatir contra ellos» refleja el valor bélico de forma digna y natural; «pelear» es más coloquial, y «hacer guerra» puede sobredimensionar el matiz.
- source_word: וַיִּתְּנֵם
  english_pob_choice: gave them
  chosen_spanish: los entregó
  alternatives_spanish:
  - los dio
  - los puso
  lexicon: HALOT
  rationale: En contexto militar, נתן + «en su mano» funciona como entregar a un enemigo. «Los entregó» comunica la fuerza idiomática mejor que un simple «los dio», y mantiene la relación con la frase siguiente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: «Yahvé». Se evita la sustitución por «SEÑOR» y también la forma inglesa «Yahweh», para ofrecer una forma española estable y reverente.'
- source_word: בְּיָדוֹ
  english_pob_choice: into his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en su poder
  - bajo su control
  - en su poder y dominio
  lexicon: HALOT
  rationale: La imagen hebrea «en su mano» se conserva de manera directa. En español bíblico sigue siendo transparente y mantiene la metáfora de dominio militar sin explicarla en exceso.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama. La política del proyecto pide trasladarlo como «Yahvé» en español, preservando el nombre propio del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto sigue el audit trail inglés: se mantiene el movimiento concreto de עבר, la preposición direccional de אֶל sin valor hostil añadido, el idioma militar de נתן + בְּיָדוֹ, y la elección doctrinal del nombre divino. No se registran revisiones aplicadas en la fuente inglesa; por ello la redacción española refleja el estado estable del texto auditado.'
  spanish_consistency_notes:
  - Se mantiene la terminología del proyecto para יהוה como «Yahvé».
  - «Hijos de Amón» preserva la estructura hebrea sin perder inteligibilidad en español.
  - «En su mano» conserva la metáfora bíblica de entrega militar.
  - La nota al pie marca la lectura idiomática del movimiento bélico sin alterar el texto principal.
