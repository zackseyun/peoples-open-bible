base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/039/003.yaml
  text: 'Then all the officials of the king of Babylon came in and sat in the Middle Gate: Nergal-sharezer[a], Samgar-nebu, Sarsechim the Rab-saris, Nergal-sharezer the Rab-mag[d][c][b], and all the rest of the officials of the king of Babylon.'
  footnotes:
  - marker: a
    text: Or 'at the Middle Gate.' The Hebrew preposition can be rendered either way in this setting.
    reason: lexical_alternative
  - marker: b
    text: The sequence 'Samgar-nebu, Sarsechim the Rab-saris' is difficult. Some interpreters divide the names and titles differently, such as reading 'Samgar' as a title or 'Sarsechim' as an office rather than a personal name.
    reason: alternative_reading
  - marker: c
    text: '''Rab-saris'' is a Babylonian title, traditionally understood as something like ''chief eunuch'' or ''chief court official.'''
    reason: cultural_note
  - marker: d
    text: '''Rab-mag'' is a Babylonian title, possibly meaning ''chief magus'' or a high-ranking ritual official.'
    reason: cultural_note
