id: JOS.22.9
reference: Joshua 22:9
source:
  edition: WLC
  text: וַ/יָּשֻׁ֣בוּ וַ/יֵּלְכ֡וּ בְּנֵי רְאוּבֵ֨ן וּ/בְנֵי גָ֜ד וַ/חֲצִ֣י שֵׁ֣בֶט הַֽ/מְנַשֶּׁ֗ה מֵ/אֵת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל מִ/שִּׁלֹ֖ה אֲשֶׁ֣ר בְּ/אֶֽרֶץ כְּנָ֑עַן לָ/לֶ֜כֶת אֶל אֶ֣רֶץ הַ/גִּלְעָ֗ד אֶל אֶ֤רֶץ אֲחֻזָּתָ/ם֙ אֲשֶׁ֣ר נֹֽאחֲזוּ בָ֔/הּ עַל פִּ֥י יְהוָ֖ה בְּ/יַד מֹשֶֽׁה־־׀־־־־־־׃
translation:
  text: So the sons of Reuben and the sons of Gad and the half-tribe of Manasseh returned and departed from the sons of Israel[a], from Shiloh, which is in the land of Canaan, to go to the land of Gilead, to the land of their possession, which they had taken possession of by the command of Yahweh through Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which they had taken possession of.' The Hebrew verb can emphasize either receiving/holding the land or taking possession of it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: HALOT
  rationale: The verb שוב in wayyiqtol commonly means 'return.' Here it marks departure from the western assembly back toward their own territory. 'Returned' is natural English and preserves the directional sense.
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - departed
  - proceeded
  lexicon: HALOT
  rationale: הלך is the ordinary verb 'go/walk.' Keeping both verbs ('returned and went') reflects the Hebrew sequence rather than collapsing them into a single English verb.
- source_word: בְּנֵי רְאוּבֵן וּבְנֵי גָד וַחֲצִי שֵׁבֶט הַמְנַשֶּׁה
  chosen: the sons of Reuben and the sons of Gad and the half-tribe of Manasseh
  alternatives:
  - the Reubenites, the Gadites, and the half-tribe of Manasseh
  lexicon: HALOT
  rationale: '''Sons of'' is somewhat more formal but closely follows the Hebrew construct and remains readable. ''Half-tribe'' is the standard rendering of חצי שבט.'
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  chosen: from the sons of Israel
  alternatives:
  - away from the Israelites
  - from the Israelites
  lexicon: HALOT
  rationale: מֵאֵת indicates separation from the larger body of Israel. 'From the sons of Israel' preserves the Hebrew phrasing; 'Israelites' is a viable smoother alternative.
- source_word: מִשִּׁלֹה אֲשֶׁר בְּאֶרֶץ כְּנָעַן
  chosen: from Shiloh, which is in the land of Canaan
  alternatives:
  - from Shiloh in the land of Canaan
  lexicon: HALOT
  rationale: The relative clause is retained explicitly with 'which is' to mirror אֲשֶׁר and preserve the appositional geographic identification.
- source_word: לָלֶכֶת
  chosen: to go
  alternatives:
  - in order to go
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To go' is sufficient in English without over-translating the purposive nuance.
- source_word: אֶל אֶרֶץ הַגִּלְעָד
  chosen: to the land of Gilead
  alternatives:
  - to Gilead
  lexicon: HALOT
  rationale: Including 'land of' reflects אֶרֶץ and maintains the territorial emphasis.
- source_word: אֶל אֶרֶץ אֲחֻזָּתָם
  chosen: to the land of their possession
  alternatives:
  - to the land of their property
  - to their own landholding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed holding or possession. 'Land of their possession' preserves the legal-territorial nuance better than the flatter 'their land.'
- source_word: אֲשֶׁר נֹאחֲזוּ בָהּ
  chosen: in which they had obtained property
  alternatives:
  - which they had taken possession of
  - where they had been settled
  lexicon: HALOT
  rationale: The Niphal of אחז here refers to being established in or receiving possession of land. 'Had obtained property' brings out the passive/resultative sense, though 'taken possession of' is also possible.
- source_word: עַל פִּי יְהוָה
  chosen: by the command of the LORD
  alternatives:
  - according to the word of the LORD
  - at the mouth of the LORD
  lexicon: HALOT
  rationale: The idiom עַל־פִּי means 'according to/by the command of.' Per doctrine, יְהוָה is rendered 'the LORD.' 'By the command of the LORD' is idiomatic and faithful.
- source_word: בְּיַד מֹשֶׁה
  chosen: through Moses
  alternatives:
  - by the hand of Moses
  - by Moses
  lexicon: HALOT
  rationale: The idiom 'by the hand of' often means agency or mediation. 'Through Moses' communicates this clearly in modern English while preserving the mediated nature of the command.
