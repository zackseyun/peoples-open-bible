  rationale: 'Se reubicó la nota [a] en la cláusula correspondiente y se ajustó su contenido para reflejar la alternativa documentada por el POB. Se reemplazó “Aquí están” por “Miren: estos son” para representar mejor הִנֵּה en español moderno y digno, sin añadir un tono arcaico innecesario. Se mantuvo el plural “tus dioses” y la fórmula “te hicieron subir de la tierra de Egipto” por fidelidad al hebreo y al razonamiento teológico auditado.'
