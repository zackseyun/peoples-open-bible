translation:
  language: es
  text: Harás una pila[a] de bronce[b], con su base[c] de bronce, para lavar; y la pondrás entre la tienda de reunión y el altar, y pondrás allí agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "lavatorio", una traducción más tradicional para este recipiente grande de lavado usado en el tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: '"Bronce" también puede traducirse "cobre"; el término hebreo puede referirse a cobre o a una aleación de cobre, según el contexto.'
    reason: lexical_alternative
  - marker: c
    text: O "soporte" para "base".
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּיּוֹר
  english_pob_choice: basin
  chosen_spanish: pila
  alternatives_spanish:
  - lavatorio
  - laver
  lexicon: HALOT
  rationale: En contexto del tabernáculo, el recipiente es para lavarse ritual y funcionalmente. "Pila" comunica bien el objeto sin sonar tan técnico como "lavatorio" ni tan arcaico como "laver". Conserva la referencia a un vaso grande para agua.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: Siguiendo la decisión de la POB en inglés para objetos del tabernáculo, "bronce" es la opción más natural y estable en español bíblico moderno. "Cobre" sigue siendo posible, pero aquí "bronce" comunica mejor el uso cultual del material.
- source_word: כַּן
  english_pob_choice: stand
  chosen_spanish: base
  alternatives_spanish:
  - soporte
  - pie
  lexicon: HALOT
  rationale: El término designa la parte que sostiene el recipiente. En español, "base" es claro y fiel; "soporte" sería más explícito pero menos ajustado al objeto. "Pie" es posible, pero algo menos transparente para lectores modernos.
- source_word: לְרָחְצָה
  english_pob_choice: for washing
  chosen_spanish: para lavar
  alternatives_spanish:
  - para el lavado
  - para las abluciones
  lexicon: HALOT
  rationale: La forma infinitiva expresa finalidad. "Para lavar" reproduce la concisión del hebreo sin añadir un objeto que el texto no expresa. "Para el lavado" es válido, pero algo más nominal y menos directo.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo de reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: '"Tienda de reunión" mantiene la designación cultual tradicional y es transparente en español. "Tabernáculo de reunión" es más interpretativo; "tienda del encuentro" suena más libre y menos estable como término técnico.'
- source_word: מִזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Es la traducción directa y adecuada en este contexto sacrificial.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: El adverbio indica ubicación. "Allí" suena más sobrio y bíblico en español general; "ahí" sería igualmente posible pero menos solemne.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  lexicon: HALOT
  rationale: Equivale directamente al plural hebreo usado como sustantivo de masa. En español, el singular mass noun "agua" es la forma natural.
- source_word: וְעָשִׂיתָ ... וְנָתַתָּ ... וְנָתַתָּ
  english_pob_choice: You shall make ... and you shall place ... and you shall put
  chosen_spanish: Harás ... la pondrás ... pondrás
  alternatives_spanish:
  - Haz ... pon ... pon
  lexicon: HALOT
  rationale: El hebreo usa perfectos con waw en contexto instructivo, con fuerza directiva. El futuro de mandato en español conserva bien ese tono jurídico-cultual. "Haz/pon" sería más imperativo, pero menos alineado con la cadencia de instrucción del original.
translation_notes:
  revision_awareness: El contexto auditado en inglés no requirió cambios doctrinales; la revisión más reciente indicó que no había modificaciones necesarias y la concordancia general fue alta. La redacción española sigue de cerca la sintaxis y el orden informativo del hebreo, adaptando sólo lo necesario para una lectura natural en español.
  spanish_consistency_notes:
  - Se mantuvo "bronce" para נְחֹשֶׁת, en coherencia con la convención POB para objetos del tabernáculo.
  - Se eligió "tienda de reunión" para אֹהֶל מוֹעֵד, consistente con la terminología cultual estándar.
  - Se usó "agua" en singular de masa, conforme al uso normal del español.
  - Se preservó el valor directivo de las formas verbales hebreas con futuro de mandato en español.
