translation:
  language: es
  text: y me ha encargado[a] construirle una casa en Jerusalén[b], que está en Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «me ha mandado» o «me ha encomendado». El verbo griego puede denotar hacer saber, designar o comisionar; el paralelo hebreo apoya con más claridad la idea de autorización divina.
    reason: lexical_alternative
  - marker: b
    text: O, «un templo para él». El griego dice literalmente «una casa para él», una manera bíblica común de referirse al templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσήμανέν
  english_pob_choice: has appointed
  chosen_spanish: me ha señalado
  alternatives_spanish:
  - me ha encargado
  - me ha mandado
  - me ha indicado
  lexicon: LSJ
  rationale: El verbo σημαίνω puede significar hacer saber, indicar o designar/encargar según el contexto. Aquí, unido al infinitivo de construir y en un marco de comisión para la restauración, «me ha señalado» conserva la idea de designación/encargo sin volverlo más fuerte de lo que exige el griego.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to build
  chosen_spanish: edifique
  alternatives_spanish:
  - construya
  - reconstruya
  lexicon: LSJ
  rationale: El infinitivo griego dice literalmente «construir». En español, dentro de una orden o comisión, el subjuntivo «edifique» comunica fielmente la acción de construir y suena natural; no se añade «re-» porque el griego no lo expresa de manera explícita.
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  lexicon: LSJ
  rationale: El dativo con οἶκον expresa dedicación o beneficio. En español, el clítico dativo «le» permite mantener esa relación sin introducir una formulación más pesada.
- source_word: οἶκον
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - un templo
  - una casa sagrada
  lexicon: LSJ
  rationale: El griego dice «casa» y no «templo». Aunque el referente es claramente el santuario, se preserva la palabra fuente para no adelantar una interpretación que el texto no explicita.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: standard proper name
  rationale: Forma española estándar del topónimo.
- source_word: τῇ ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: which is in Judea
  chosen_spanish: que está en Judea
  alternatives_spanish:
  - la cual está en Judea
  - en Judea
  lexicon: LSJ
  rationale: La frase articular funciona appositivamente para identificar a Jerusalén por su ubicación. «Que está en Judea» conserva el valor explicativo del griego en un español claro y natural.
theological_decisions:
- issue: Si οἶκον debe verterse como «casa» o como «templo»
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  rationale: Se mantiene «casa» porque el griego usa οἶκον y la filosofía del proyecto favorece la cercanía a la forma fuente cuando el contexto ya hace evidente la referencia al santuario. «Templo» sería una glosa interpretativa legítima, pero no necesaria en el texto principal.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Cómo expresar ἐσήμανέν en un contexto de comisión divina o real
  english_pob_reading: has appointed me
  chosen_spanish_reading: me ha señalado
  alternative_spanish_readings:
  - me ha mandado
  - me ha encargado
  rationale: «Me ha señalado» conserva la idea de designación/encargo sin convertir el verbo en una orden más fuerte de lo que el griego exige. La paralela hebrea apoya la autorización divina, pero el texto griego por sí solo permite una redacción menos intensa.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el último pase indicó que no eran necesarios cambios.
  spanish_consistency_notes:
  - Se mantuvo «Yudea» como Judea, conforme al topónimo bíblico estándar en español.
  - Se preservó la distinción entre «casa» y «templo» en el texto principal, dejando «templo» solo como alternativa en nota.
  - La sintaxis intenta reflejar la comisión del sujeto en una forma natural para el español bíblico contemporáneo.
