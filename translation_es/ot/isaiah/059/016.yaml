base_translation:
  language: en
  yaml_path: translation/ot/isaiah/059/016.yaml
  text: He saw that there was no man[a], and he was appalled that there was no one to intercede; so his own arm brought him salvation[c][b], and his righteousness upheld him.
  footnotes:
  - marker: a
    text: Or 'no one to intervene' or 'no one to plead.' The Hebrew participle can denote one who steps in on behalf of another.
    reason: lexical_alternative
  - marker: b
    text: Or 'his justice upheld him.' The Hebrew term can denote both righteousness and justice.
    reason: lexical_alternative
  - marker: c
    text: '''Man'' translates a singular masculine Hebrew term. Here it refers to the absence of any human agent.'
    reason: cultural_note
