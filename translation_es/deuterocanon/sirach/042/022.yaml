translation:
  language: es
  text: Él vive y está firme para siempre[a][b]; su bondad pasa de una cosa a otra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La redacción hebrea es breve y algo incierta aquí. El paralelo griego conserva un texto diferente y más amplio: «Ni se añadió ni se quitó nada, y no necesitó de ningún consejero. ¡Qué deseables son todas sus obras, y como una chispa se las puede ver!»'
    reason: textual_variant
  - marker: b
    text: 'O: «su bondad pasa sobre cada cosa» / «su bondad pasa de una a otra». La frase hebrea está comprimida, y no es seguro el sentido exacto de «esto sobre esto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוא
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Eso
  lexicon: HALOT
  rationale: El hebreo retoma a Dios en el himno; por eso conviene un pronombre personal en español, no un neutro impersonal.
- source_word: חי
  english_pob_choice: lives
  chosen_spanish: vive
  alternatives_spanish:
  - está vivo
  - está viviendo
  lexicon: HALOT
  rationale: El participio/adjetivo expresa vida continua; «vive» es natural en español y conserva la duración.
- source_word: ועומד
  english_pob_choice: and stands
  chosen_spanish: y permanece
  alternatives_spanish:
  - y se mantiene
  - y se queda
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «está de pie», en español «permanece» comunica mejor la estabilidad duradera sin perder el sentido de permanencia física/metafórica.
- source_word: לעד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: Expresa duración perpetua de forma clara y digna en español contemporáneo.
- source_word: זה על זה
  english_pob_choice: from one thing to another
  chosen_spanish: de una cosa a otra
  alternatives_spanish:
  - una tras otra
  - una sobre otra
  - de ésta a aquélla
  lexicon: HALOT
  rationale: La frase hebrea es comprimida y algo incierta; «de una cosa a otra» conserva la idea distributiva o sucesiva sin fijar en exceso una reconstrucción más técnica.
- source_word: חלף
  english_pob_choice: passes
  chosen_spanish: pasa
  alternatives_spanish:
  - se extiende
  - se sucede
  - atraviesa
  lexicon: HALOT
  rationale: «Pasa» mantiene el movimiento verbal básico y deja abierta la precisión del matiz hebreo, como hace la base inglesa.
- source_word: טובו
  english_pob_choice: his goodness
  chosen_spanish: su bondad
  alternatives_spanish:
  - su bondad/beneficencia
  - su benevolencia
  - su bien
  lexicon: HALOT
  rationale: El sustantivo de טוב suele expresar bondad o beneficencia; «bondad» es la opción más directa y natural en español.
theological_decisions:
- issue: Relación entre el hebreo conservado y el paralelo griego más amplio
  english_pob_reading: Translate the extant Hebrew line as the main text while allowing the Greek to inform the sense of divine permanence and beneficence.
  chosen_spanish_reading: Traducir como texto principal la línea hebrea conservada, dejando que el griego ilumine el trasfondo de permanencia divina y benevolencia.
  alternative_spanish_readings:
  - Adoptar en el texto principal la redacción griega completa del versículo
  - Harmonizar por completo el hebreo con el griego
  rationale: En Sirácida, el hebreo primario se traduce donde se conserva; el griego paralelo sirve como control y como apoyo interpretativo, pero no reemplaza el testimonio hebreo principal.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; use Greek parallel as actual input without displacing Hebrew primacy.'
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la revisión más reciente; se mantuvo la decisión de dar primacía al hebreo conservado y de usar el griego como nota de variante textual.
  spanish_consistency_notes:
  - Se mantiene el pronombre personal «Él» para el referente divino, coherente con el contexto himnístico.
  - «Bondad» conserva el valor benefactivo de טוב sin introducir una paráfrasis más interpretativa.
  - La nota textual recoge la tensión real entre el hebreo breve y el griego más desarrollado, sin armonizarlos artificialmente.
