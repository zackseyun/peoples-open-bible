base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/007/025.yaml
  text: And now there is no one to help us[a]; rather, God has delivered us into their hands[c][b], to be laid low before them in thirst and great destruction.
  footnotes:
  - marker: a
    text: Or 'has handed us over into their hands.' The Greek verb literally means 'has sold,' a stronger metaphor of being given over to enemy power.
    reason: lexical_alternative
  - marker: b
    text: Or 'to be overthrown before them' or 'to be struck down before them.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'in thirst and great destruction' may also be understood as 'by thirst and great ruin,' describing the means or condition of their downfall.
    reason: lexical_alternative
