translation:
  language: es
  text: En el Lugar Santísimo hizo dos querubines, una obra esculpida[a], y los recubrió de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa aquí una expresión rara que también puede entenderse como «obra tallada» u «obra artística».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבֵית קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: In the Most Holy Place
  chosen_spanish: En el Lugar Santísimo
  alternatives_spanish:
  - en la casa del Santo de los Santos
  - en el santuario interior
  lexicon: HALOT
  rationale: La expresión hebrea es un giro idiomático para el recinto más interno del templo. «Lugar Santísimo» comunica bien la fuerza superlativa y es una fórmula clara y reverente en español, sin perder la referencia arquitectónica.
- source_word: כְּרוּבִים שְׁנַיִם
  english_pob_choice: two cherubim
  chosen_spanish: dos querubines
  alternatives_spanish:
  - dos querubines alados
  - dos querubes
  lexicon: HALOT
  rationale: El plural hebreo corresponde naturalmente a «querubines». «Querubes» es menos común y «alados» añade información no explicitada en el verso.
- source_word: מַעֲשֵׂה צַעֲצֻעִים
  english_pob_choice: the work of an image-maker
  chosen_spanish: obra de escultura
  alternatives_spanish:
  - obra esculpida
  - trabajo artístico
  - obra de talla
  lexicon: HALOT
  rationale: La revisión inglesa muestra que el sentido no es el artesano, sino el tipo de obra. En español, «obra de escultura» expresa con naturalidad que los querubines eran figuras esculpidas, manteniendo la ambigüedad razonable del término raro sin identificar indebidamente a una persona.
- source_word: וַיְצַפּוּ אֹתָם זָהָב
  english_pob_choice: and overlaid them with gold
  chosen_spanish: y los recubrió de oro
  alternatives_spanish:
  - y los cubrió de oro
  - y los revistió de oro
  lexicon: HALOT
  rationale: El verbo hebreo describe un revestimiento metálico. «Recubrió de oro» preserva la idea cultual de cubrir con lámina u obra dorada y suena natural en español bíblico moderno.
translation_notes:
  revision_awareness: 'La base inglesa pasó por una corrección importante en la frase מַעֲשֵׂה צַעֲצֻעִים: de «the work of an image-maker» a «a work of sculpture» y luego a una formulación más cercana al hebreo. La versión española evita reproducir el error de tomar el término raro como persona y sigue la solución semántica de una obra esculpida, manteniendo además el registro culto y sobrio del pasaje.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos del proyecto, pero este versículo no contiene el nombre divino.
  - «Querubines» se usa de forma consistente con el lenguaje cultual del templo.
  - «Lugar Santísimo» conserva el valor superlativo del hebreo sin calcado pesado.
