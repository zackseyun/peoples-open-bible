translation:
  language: es
  text: ¿No saben todos los que hacen maldad, los que devoran a mi pueblo como comen pan[a], y no invocan a Yahvé?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «comen a mi pueblo; comen pan»; un modismo que compara el consumo de su pueblo con el acto ordinario de comer pan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Do not ... ?
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  - ¿No es cierto que ...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa; en español, «¿No ...?» conserva esa fuerza de reproche sin añadir más contenido que el del hebreo.
- source_word: יָדְעוּ
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - comprenden
  lexicon: HALOT
  rationale: El verbo ידע aquí expresa conocimiento/reconocimiento general de una realidad evidente. «Saben» comunica mejor esa constatación que un perfecto o una perífrasis más explicativa.
- source_word: כָּל פֹּעֲלֵי אָוֶן
  english_pob_choice: all the workers of wickedness
  chosen_spanish: todos los que hacen maldad
  alternatives_spanish:
  - todos los obradores de maldad
  - todos los malhechores
  lexicon: HALOT
  rationale: El participio se vierte con una relativa natural en español. «Maldad» mantiene el peso moral de אָוֶן sin optar por «iniquidad», que sería más técnico pero menos transparente para lectura pública.
- source_word: אֹכְלֵי עַמִּי
  english_pob_choice: those who eat up my people
  chosen_spanish: los que devoran a mi pueblo
  alternatives_spanish:
  - los que se comen a mi pueblo
  - los que consumen a mi pueblo
  lexicon: HALOT
  rationale: La imagen es de consumo voraz y violento. «Devoran» conserva la metáfora con fuerza idiomática en español y evita suavizarla.
- source_word: אָכְלוּ לֶחֶם
  english_pob_choice: as they eat bread
  chosen_spanish: como si comieran pan
  alternatives_spanish:
  - como comen pan
  - como quien come pan
  lexicon: HALOT
  rationale: El hebreo compara la devoración del pueblo con el acto ordinario de comer pan. La comparación explícita con «como si» comunica bien la naturalidad de la acción sin borrar el valor idiomático.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, preservando el nombre de pacto con la forma española establecida «Yahvé».
- source_word: לֹא קָרָאוּ
  english_pob_choice: do not call on
  chosen_spanish: no invocan
  alternatives_spanish:
  - no llaman
  - no claman
  lexicon: HALOT
  rationale: Con el nombre divino, קרא se entiende como invocar o llamar en oración/culto. «Invocan» recoge mejor ese valor que un simple «llaman».
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el nombre del pacto. Se evita la sustitución por un título en español y se adopta la forma estándar del proyecto, «Yahvé», por fidelidad textual y consistencia editorial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Coincide con el cierre de revisión más reciente: no se requirieron cambios tras la última pasada, y la traducción mantiene el paralelismo y la metáfora alimentaria del hebreo con el nombre divino explícito.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - «Yahvé» se usa consistentemente para יְהוָה conforme al criterio del proyecto.
  - Se conserva la pregunta retórica y el paralelismo interno del verso.
  - La nota al pie marca la doble imagen hebrea de «comer» al pueblo y comer pan, sin convertirla en paráfrasis.
