translation:
  language: es
  text: Allí navegan las naves, y Leviatán, que formaste para jugar en el mar.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Leviatán, que formaste para jugar con él». Algunos entienden la frase final como una referencia a Dios jugando con Leviatán, en vez de Leviatán jugando en el mar.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Allí mismo
  - En ese lugar
  lexicon: HALOT
  rationale: El adverbio locativo apunta al mar mencionado en el versículo anterior; «Allí» conserva la referencia espacial de forma natural en español.
- source_word: אֳנִיּוֹת
  english_pob_choice: the ships
  chosen_spanish: las naves
  alternatives_spanish:
  - los barcos
  - las embarcaciones
  lexicon: HALOT
  rationale: El hebreo nombra barcos de mar; «naves» mantiene el registro poético y digno del salmo. Aunque el artículo no está explícito, en español la clase definida suena natural por el contexto.
- source_word: יְהַלֵּכוּן
  english_pob_choice: move about
  chosen_spanish: navegan
  alternatives_spanish:
  - van
  - se desplazan
  - surcan
  lexicon: HALOT
  rationale: El verbo expresa movimiento continuo sobre el mar. «Navegan» comunica ese desplazamiento en español con claridad poética, sin perder la idea de actividad repetida.
- source_word: לִוְיָתָן
  english_pob_choice: Leviathan
  chosen_spanish: Leviatán
  alternatives_spanish:
  - Leviatán
  lexicon: HALOT
  rationale: Se translitera el nombre propio/figura poética como en el inglés auditado, preservando el eco intertextual y la fuerza literaria del término.
- source_word: זֶה
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  - este
  lexicon: HALOT
  rationale: 'En español es preferible una oración relativa simple: «que formaste...», equivalente natural de la función modificadora de זֶה en el contexto.'
- source_word: יָצַרְתָּ
  english_pob_choice: you formed
  chosen_spanish: formaste
  alternatives_spanish:
  - modelaste
  - hiciste
  - creaste
  lexicon: HALOT
  rationale: «Formaste» conserva el matiz concreto de moldear/forjar que aporta יצר, más preciso que el más general «creaste».
- source_word: לְשַׂחֶק
  english_pob_choice: to play
  chosen_spanish: para jugar
  alternatives_spanish:
  - para divertirse
  - para retozar
  - para jugar alrededor
  lexicon: HALOT
  rationale: El infinitivo final denota actividad lúdica. «Para jugar» transmite el sentido con naturalidad y mantiene el tono imagístico del hebreo.
- source_word: בּוֹ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - en ella
  - con él
  - con ella
  lexicon: HALOT
  rationale: El sufijo masculino singular puede referirse al mar implícito por el contexto inmediato; «en él» preserva la lectura locativa principal del audit trail, aunque en español el antecedente sea implícito.
theological_decisions:
- issue: Referencia del sufijo final בּוֹ tras לְשַׂחֶק
  english_pob_reading: Leviathan was formed to play in the sea
  chosen_spanish_reading: Leviatán fue formado para jugar en el mar
  alternative_spanish_readings:
  - Leviatán fue formado para jugar con él
  - Leviatán fue formado para que Dios juegue con él
  rationale: El contexto inmediato sigue hablando del mar y de las naves que lo atraviesan; por eso la lectura locativa es la principal. Aun así, el hebreo permite la alternativa tradicional de entender el sufijo como relacional o instrumental, y la nota la preserva sin resolver artificialmente la ambigüedad.
  doctrine_reference: Conservar la tensión exegética documentada por el texto y el aparato POB; no imponer una resolución dogmática donde el hebreo admite más de una lectura.
translation_notes:
  revision_awareness: El texto español sigue el pasaje hebreo con alta concordancia al audit trail inglés. Se mantuvo la lectura locativa principal del sufijo final, preservando en nota la alternativa interpretativa tradicional que el POB inglés documenta.
  spanish_consistency_notes:
  - Se usó «Leviatán» como transliteración estable del nombre poético.
  - Se prefirió «naves» sobre un equivalente más coloquial para mantener el registro literario del salmo.
  - Se conservó «formaste» como opción más concreta que «creaste», coherente con el valor de יצר.
  - La nota al pie usa una sola marca y refleja la alternativa de lectura sin duplicar el texto principal.
