translation:
  language: es
  text: para que guarden sus estatutos y observen sus leyes[a]. ¡Alaben a Yah[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Leyes» traduce aquí תורותיו; también podría entenderse como «instrucciones» o «enseñanzas» en otros contextos. Se mantiene «leyes» por el tono normativo del paralelismo con «estatutos».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Yah». Es la forma abreviada del nombre divino en el original, distinta del tetragrámaton YHWH.'
    reason: source_note
lexical_decisions:
- source_word: בַּעֲבוּר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  - para el fin de que
  lexicon: HALOT
  rationale: La preposición expresa finalidad; en español bíblico actual, «para que» comunica con naturalidad ese valor de propósito sin perder la relación causal-final del hebreo.
- source_word: יִשְׁמְרוּ
  english_pob_choice: they might keep
  chosen_spanish: guardaran
  alternatives_spanish:
  - mantuvieran
  - obedecieran
  - cumplieran
  lexicon: HALOT
  rationale: שמר aplicado a mandamientos/statutos conserva la idea de custodiar y obedecer cuidadosamente. «Guardaran» mantiene mejor esa fuerza covenantal que un mero «cumplieran».
- source_word: חֻקָּיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  - sus preceptos
  lexicon: HALOT
  rationale: «Estatutos» reproduce bien el matiz jurídico-normativo de חוקים y se coordina de forma clara con «leyes» en el hemistiquio paralelo.
- source_word: וְתוֹרֹתָיו
  english_pob_choice: and observe his laws
  chosen_spanish: y observaran sus leyes
  alternatives_spanish:
  - y guardaran sus enseñanzas
  - y observaran sus instrucciones
  - y cumplieran sus leyes
  lexicon: HALOT
  rationale: תורות puede significar leyes o instrucciones. En este contexto, «leyes» preserva el alcance normativo y evita reducir el término a solo «enseñanzas»; «observaran» diferencia el verbo siguiente de «guardaran».
- source_word: יִנְצֹרוּ
  english_pob_choice: observe
  chosen_spanish: observaran
  alternatives_spanish:
  - guardaran
  - vigilaran
  - custodiaran
  lexicon: HALOT
  rationale: נצר implica vigilar/guardar cuidadosamente. Aquí, dado el paralelismo con «guardaran», «observaran» ofrece una distinción estilística natural en español y mantiene la idea de atención diligente.
- source_word: הַלְלוּ יָהּ
  english_pob_choice: Praise Yah!
  chosen_spanish: ¡Alabad a Yah!
  alternatives_spanish:
  - ¡Alaben a Yah!
  - ¡Aleluya!
  - ¡Alabad al Señor!
  lexicon: HALOT
  rationale: El hebreo contiene el imperativo plural y el nombre abreviado «Yah», no YHWH. «¡Alabad a Yah!» traduce el imperativo y conserva la forma breve del nombre divino; «¡Aleluya!» oscurecería la estructura imperativa del hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino abreviado יָהּ en la doxología final
  english_pob_reading: Praise Yah!
  chosen_spanish_reading: ¡Alabad a Yah!
  alternative_spanish_readings:
  - ¡Aleluya!
  - ¡Alabad al Señor!
  rationale: La pauta del proyecto para YHWH es «Yahvé», pero aquí el texto no usa el tetragrámaton sino la forma breve יָהּ. Por eso se conserva «Yah» en español, evitando fusionarlo con YHWH o sustituirlo por una fórmula tradicional que borre la forma del hebreo.
  doctrine_reference: 'DOCTRINE.md: la equivalencia de יְהוָה con Yahvé aplica a YHWH; la forma abreviada יָהּ requiere tratamiento diferenciado según el texto fuente.'
translation_notes:
  revision_awareness: Se siguió la lectura estable del hebreo masorético y el audit trail inglés sin cambios sustantivos; el principal punto de decisión fue distinguir la forma abreviada del nombre divino (Yah) de YHWH y reflejar en español el paralelismo verbal con una distinción natural entre «guardar» y «observar».
  spanish_consistency_notes:
  - Se conservó un registro bíblico claro pero moderno, evitando «SEÑOR» como máscara para el nombre divino donde el hebreo dice יָהּ.
  - «Estatutos» y «leyes» mantienen la distinción léxica del paralelismo hebreo.
  - El tono exclamativo final corresponde al cierre doxológico del versículo.
