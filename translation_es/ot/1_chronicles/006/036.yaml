  lexicon: HALOT
  rationale: Es un nombre propio, por lo que se translitera. Se adapta la terminación al español con acento final para mantener la pronunciación natural y la forma breve del nombre, sin añadir una vocal o consonante que no esté motivada por el hebreo.
- source_word: בְנ/וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  - su descendiente
  lexicon: HALOT
  rationale: La forma constructa con sufijo de 3ª masculina singular expresa relación filial directa. En español, «su hijo» comunica esa relación de manera natural y fiel en una genealogía, sin forzar una perífrasis menos idiomática.
- source_word: עֻזִּי
  english_pob_choice: Uzzi
  chosen_spanish: Uzí
  alternatives_spanish:
  - Uzzi
  - Uzi
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la identidad del nombre y se ajusta la acentuación al patrón español para facilitar la lectura pública.
- source_word: זְרַחְיָה
  english_pob_choice: Zerahiah
  chosen_spanish: Zeraquías
  alternatives_spanish:
  - Zerajías
  - Zerahías
  lexicon: HALOT
  rationale: Nombre propio transliterado con equivalencia española estable. Se usa «qu» para reflejar el sonido /k/ antes de «i» en español y se conserva la terminación -ías, frecuente en nombres bíblicos, sin traducir el nombre.
translation_notes:
  revision_awareness: El texto hebreo presenta una secuencia genealógica simple y el audit trail inglés no introduce variantes textuales ni notas. No hay tensiones léxicas o teológicas especiales más allá de la transliteración de nombres propios y la relación filial repetida.
  spanish_consistency_notes:
  - Se mantiene una sintaxis breve y genealógica, paralela a la del hebreo.
  - Se evita «de» repetido para no volver el español innecesariamente pesado; la repetición de «su hijo» conserva el ritmo del original.
  - Los nombres propios se uniforman con acentuación española para lectura pública, sin añadir comentarios textuales.
