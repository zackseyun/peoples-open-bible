translation:
  language: es
  text: Porque mis pensamientos no son los pensamientos de ustedes[a], y los caminos de ustedes no son mis caminos, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque mis planes no son los planes de ustedes, y los caminos de ustedes no son mis caminos». El hebreo מַחְשְׁבוֹת puede llevar también la idea de «planes» o «intenciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: En español, 'Porque' conserva con naturalidad el valor explicativo o de fundamento del hebreo כִּי en este contexto profético, sin introducir un giro más técnico que el texto no exige.
- source_word: מַחְשְׁבוֹתַי / מַחְשְׁבוֹתֵיכֶם
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - planes
  - intenciones
  - pensamientos
  lexicon: HALOT
  rationale: '''Pensamientos'' reproduce de forma amplia la esfera semántica de מַחְשְׁבוֹת, que puede incluir ideas, planes o intenciones. Mantiene además el paralelismo con ''caminos'' sin estrechar el sentido a una sola posibilidad.'
- source_word: דַרְכֵיכֶם / דְּרָכָי
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - caminos
  - sendas
  - maneras
  lexicon: HALOT
  rationale: '''Caminos'' es un equivalente natural en español para דֶּרֶךְ en este uso poético, conservando tanto el matiz literal como el figurado de conducta o proceder. ''Maneras'' sonaría más abstracto y menos congruente con el paralelismo bíblico.'
- source_word: לֹא ... וְלֹא
  english_pob_choice: are not ... and ... are not
  chosen_spanish: no ... ni ...
  alternatives_spanish:
  - no ... y no ...
  - no ... ni ...
  lexicon: HALOT
  rationale: El español expresa de modo más idiomático la segunda negación con 'ni'. Así se conserva el paralelismo sin forzar una repetición artificial de 'no son'.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: '''Declara Yahvé'' preserva el tono solemne de la fórmula profética נְאֻם sin recurrir a una construcción excesivamente rígida. Se mantiene ''Yahvé'' conforme a la convención del proyecto para el nombre divino.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se usa 'Yahvé' como representación en español del Tetragrámaton, conforme a la pauta del proyecto y para evitar la sustitución por un título genérico.
theological_decisions:
- issue: Nombre divino en la fórmula profética
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - dice Yahvé
  - oráculo de Yahvé
  rationale: La fórmula נְאֻם יְהוָה funciona como cierre solemne de una palabra profética. 'Declara Yahvé' preserva esa solemnidad y mantiene visible el nombre divino en vez de sustituirlo por 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se siguió la lectura estable del audit trail en inglés: la cláusula hebrea se entendió como una afirmación explicativa con paralelismo nominal, y la decisión sobre מַחְשְׁבוֹת se mantuvo abierta a la alternativa semántica ''planes'' sin borrar la lectura principal ''pensamientos''. No hay cambios de revisión pendientes en el expediente fuente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene el paralelismo poético con negación repetida y orden sintáctico claro para español.
  - '''Pensamientos'' y ''caminos'' conservan la tensión semántica entre interioridad y conducta presente en el hebreo.'
