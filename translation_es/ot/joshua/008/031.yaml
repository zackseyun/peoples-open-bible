  language: en
  yaml_path: translation/ot/joshua/008/031.yaml
  text: just as Moses the servant of Yahweh had commanded the sons of Israel[a], as it is written in the Book of the Law of Moses, an altar of uncut stones, on which no iron had been wielded[b]; and they offered up burnt offerings on it to Yahweh and sacrificed peace offerings.
