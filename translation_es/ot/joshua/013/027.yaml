translation:
  language: es
  text: y en el valle, Bet-haram, Bet-nimra, Sucot y Zafón—lo restante del reino de Sijón, rey de Hesbón—con el Jordán como frontera, hasta el extremo del mar de Quinéret[a], del otro lado del Jordán, hacia el oriente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta el borde» o «hasta la extremidad del mar de Quinéret».'
    reason: Preserva la alternativa léxica documentada para קְצֵה y coloca la nota en el sintagma correcto.
lexical_decisions:
- source_word: וּ/בָ/עֵמֶק
  english_pob_choice: and in the valley
  chosen_spanish: y en el valle
  alternatives_spanish:
  - y en la llanura
  lexicon: HALOT
  rationale: עֵמֶק nombra una depresión geográfica o valle; aquí introduce una región territorial, y 'en el valle' es natural en español sin perder el sentido espacial.
- source_word: בֵּית הָרָם
  english_pob_choice: Beth-haram
  chosen_spanish: Bet-haram
  alternatives_spanish:
  - Beth-haram
  - Bet Haram
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera en español manteniendo la forma breve y reconocible, sin traducir el elemento בית.
- source_word: וּ/בֵית נִמְרָה
  english_pob_choice: Beth-nimrah
  chosen_spanish: Bet-nimra
  alternatives_spanish:
  - Beth-nimrah
  - Bet Nimra
  lexicon: HALOT
  rationale: Nombre propio; se adapta la transliteración al uso español, conservando la identidad del topónimo sin normalizarlo como nombre común.
- source_word: וְ/סֻכּוֹת
  english_pob_choice: Succoth
  chosen_spanish: Sucot
  alternatives_spanish:
  - Succot
  - Sucoth
  lexicon: HALOT
  rationale: Topónimo conocido; 'Sucot' sigue la transliteración común en español bíblico y evita una grafía demasiado anglicada.
- source_word: וְ/צָפ֗וֹן
  english_pob_choice: Zaphon
  chosen_spanish: Zafón
  alternatives_spanish:
  - Zafon
  - Zaphon
  lexicon: HALOT
  rationale: Aquí funciona como nombre de lugar dentro de la lista territorial, no como el adjetivo 'norte'; 'Zafón' preserva ese valor propio y evita confusión direccional.
- source_word: יֶ֚תֶר מַמְלְכ֗וּת סִיחוֹן֙ מֶ֣לֶךְ חֶשְׁבּ֔וֹן
  english_pob_choice: the rest of the kingdom of Sihon king of Heshbon
  chosen_spanish: lo restante del reino de Sijón, rey de Hesbón
  alternatives_spanish:
  - el resto del reino de Sijón, rey de Hesbón
  - lo que quedaba del reino de Sijón, rey de Hesbón
  lexicon: HALOT
  rationale: יֶתֶר expresa 'resto/restante'; 'lo restante' conserva el matiz de remanente territorial. 'Reino' traduce מַמְלְכוּת con el sentido político-territorial del contexto.
- source_word: הַ/יַּרְדֵּ֖ן וּ/גְבֻ֑ל
  english_pob_choice: with the Jordan as its border
  chosen_spanish: con el Jordán como frontera
  alternatives_spanish:
  - con el Jordán como límite
  - y el Jordán era su frontera
  lexicon: HALOT
  rationale: La secuencia hebrea es compacta y apposicional; en español conviene explicitar la función delimitadora del Jordán sin añadir contenido. 'Frontera' comunica bien el valor territorial.
- source_word: עַד קְצֵה֙ יָם כִּנֶּ֔רֶת
  english_pob_choice: as far as the lower end of the Sea of Kinnereth
  chosen_spanish: hasta el extremo del mar de Quinéret
  alternatives_spanish:
  - hasta el borde del mar de Quinéret
  - hasta el extremo del mar de Cineret
  lexicon: HALOT
  rationale: קְצֵה significa 'extremo/fin'; 'extremo' mantiene el sentido sin forzar una precisión geográfica no explicitada en el hebreo. 'Mar de Quinéret' conserva el nombre bíblico y evita sustituirlo por un nombre posterior.
- source_word: עֵ֥בֶר הַ/יַּרְדֵּ֖ן מִזְרָחָ/ה
  english_pob_choice: beyond the Jordan eastward
  chosen_spanish: del otro lado del Jordán, hacia el oriente
  alternatives_spanish:
  - más allá del Jordán, hacia el oriente
  - al otro lado del Jordán, al oriente
  lexicon: HALOT
  rationale: La fórmula territorial עֵבֶר הַיַּרְדֵּן indica la zona transjordana; 'del otro lado del Jordán' conserva la relación espacial, y 'hacia el oriente' expresa la dirección final con registro bíblico claro.
theological_decisions:
- issue: Tratamiento del nombre divino y de referencias teológicas implícitas
  english_pob_reading: No aparece el nombre divino ni una fórmula confesional directa en este versículo; es una lista territorial.
  chosen_spanish_reading: No se introduce terminología teológica adicional; se conserva el carácter geográfico del texto.
  alternative_spanish_readings:
  - Añadir notas devocionales sobre la repartición de la tierra
  - Explicitar una lectura providencial
  rationale: El hebreo funciona como inventario territorial. Para no sobreinterpretar, la traducción debe permanecer descriptiva y no convertir el pasaje en una glosa teológica.
  doctrine_reference: Principio de lectura literaria-contextual del texto narrativo; evitar añadir dogmática donde el pasaje no la expresa.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del contexto inglés, que mantiene 'eastward' como cierre direccional más formal y ajustado al hebreo. También se respetó la decisión de tratar Zaphon como topónimo y no como 'norte'.
  spanish_consistency_notes:
  - Se usó 'Bet-' para los topónimos hebreos con בית, siguiendo una transliteración natural en español.
  - '''Jordán'' y ''Quinéret'' se mantuvieron como nombres bíblicos; no se sustituyó por terminología posterior como ''mar de Galilea''.'
  - Se evitó 'SEÑOR' u otras máscaras porque no aparece el tetragrámaton en este versículo.
  - La puntuación con rayas largas conserva el inciso explicativo del texto fuente inglés sin exagerar la parataxis hebrea.
