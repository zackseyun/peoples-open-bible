    text: 'O: «no permitió vivir ni a hombre ni a mujer».'
    reason: lexical_alternative
  revision_rationale: Se corrige la expresión literalista 'golpeó la tierra' por 'atacó la región' para reflejar mejor el sentido contextual de וְהִכָּה אֶת הָאָרֶץ en español natural y claro, manteniendo la sobriedad del original sin suavizar ni amplificar la violencia. Se conserva la estructura restante y la nota alternativa porque son fieles al hebreo y al audit trail inglés.
