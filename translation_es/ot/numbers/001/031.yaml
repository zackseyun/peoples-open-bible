  lexicon: HALOT
  rationale: En el contexto del censo, פְּקֻדֵי designa a los que han sido contados o registrados. «Los registrados» conserva la referencia pasiva y suena natural en español sin introducir un matiz militar que el verso no explicita.
- source_word: לְמַטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - pertenecientes a la tribu de
  - de la casa de
  lexicon: HALOT
  rationale: La preposición ל con מַטֶּה en esta fórmula censal indica pertenencia tribal. «De la tribu de» es la opción más idiomática y fiel en español.
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  - Zebulun
  lexicon: Transliteración bíblica estándar en español
  rationale: Se usa la forma bíblica española más reconocible y establecida para el nombre tribal, sin cambiar la referencia.
- source_word: שִׁבְעָה וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  english_pob_choice: 57,400
  chosen_spanish: '57.400'
  alternatives_spanish:
