translation:
  language: es
  text: 'Y tú, habla a los hijos[b] de Israel, diciendo: «Ciertamente[a] deben guardar mis sábados, porque es una señal entre mí y ustedes por todas sus generaciones, para que sepan que yo soy Yahvé, que los santifica[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Solo/No obstante». El hebreo אַךְ puede marcar restricción fuerte o énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Israel», designación de pacto habitual para el pueblo de Israel.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «que los hace santos». El participio hebreo puede expresar la acción de santificar en curso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: And you
  chosen_spanish: Y tú
  alternatives_spanish:
  - Y usted
  - Y tú mismo
  - As you
  lexicon: HALOT
  rationale: La partícula inicial con pronombre enfático conserva el cambio de interlocutor y el énfasis del hebreo sin volverlo más interpretativo de lo necesario. «Y tú» mantiene la fuerza discursiva natural en español.
- source_word: דַּבֵּר
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - di
  - diles
  - hablar
  lexicon: HALOT
  rationale: El imperativo de דבר pide un verbo de habla directa. «Habla» conserva el tono formal del mandato y suena más natural que una calca rígida.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial masculina del hebreo como designación corporativa. «Hijos de Israel» es fiel, bíblicamente reconocible y evita aplanar la forma del original.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y di
  - al decir
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria de cita se refleja con el gerundio español habitual en este tipo de encuadre.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Solo
  - Sin duda
  - No obstante
  lexicon: HALOT
  rationale: אַךְ aquí funciona como marcador de énfasis/restricción. «Ciertamente» comunica la fuerza enfática sin introducir en español una exclusividad demasiado fuerte como «solo».
- source_word: שַׁבְּתֹתַי
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis sábados de reposo
  - mis días de reposo
  - mis Sábados
  lexicon: HALOT
  rationale: El plural hebreo se conserva en plural español. Se prefirió «sábados» por ser la equivalencia más directa y menos eclesiástica que «días de reposo»; el poseedor divino se mantiene con «mis».
- source_word: תִּשְׁמֹרוּ
  english_pob_choice: you shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - guardarán con cuidado
  - cumplirán
  lexicon: HALOT
  rationale: שׁמר admite «guardar/observar». Se eligió «guardarán» por su fuerza de vigilancia y fidelidad, en línea con el valor de custodia del verbo.
- source_word: אוֹת
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - una marca
  - un signo
  - una señal de pacto
  lexicon: HALOT
  rationale: «Señal» es el equivalente natural y bíblico para אוֹת; además, evita sobreespecificar «de pacto» cuando el hebreo no lo dice explícitamente en esta cláusula.
- source_word: בֵּינִי וּבֵינֵיכֶם
  english_pob_choice: between me and you
  chosen_spanish: entre yo y ustedes
  alternatives_spanish:
  - entre mí y ustedes
  - entre yo y vosotros
  - entre mí y vosotros
  lexicon: HALOT
  rationale: Se mantiene el paralelismo personal del hebreo. Aunque el español estándar preferiría «entre mí y ustedes», aquí se preserva la tensión gramatical del original con un pronombre sujeto explícito para reflejar la forma de la fuente.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - a través de sus generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: El idioma hebreo apunta a continuidad histórica a través de las generaciones. «Por todas sus generaciones» conserva la idea de alcance sucesivo y resulta publicable en español.
- source_word: לָדַעַת
  english_pob_choice: so that you may know
  chosen_spanish: para que sepan
  alternatives_spanish:
  - para que conozcan
  - a fin de que sepan
  - para conocer
  lexicon: HALOT
  rationale: La finalidad se expresa con una cláusula de propósito natural en español. El plural del destinatario se mantiene con «sepan», en armonía con el sujeto colectivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino revelado, evitando la sustitución por un título.
- source_word: מְקַדִּשְׁכֶם
  english_pob_choice: who sanctifies you
  chosen_spanish: que los santifica
  alternatives_spanish:
  - que los hace santos
  - que los consagra
  - que los hace santos
  lexicon: HALOT
  rationale: קדשׁ se rinde con el vocabulario teológico de «santificar», que conserva la acción continua de Dios. Se ajusta el pronombre al antecedente plural.»
theological_decisions:
- issue: El Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio divino y no se lo sustituye por una mayúscula litúrgica. «Yahvé» corresponde al estándar del proyecto y mantiene visible el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
- issue: La expresión plural בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina del hebreo por fidelidad lexical, sin perder el sentido corporativo por el contexto de la exhortación a toda la comunidad.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: מְקַדִּשְׁכֶם
  english_pob_reading: who sanctifies you
  chosen_spanish_reading: que los santifica
  alternative_spanish_readings:
  - que los hace santos
  - que los consagra
  rationale: «Santifica» preserva el campo semántico de קדשׁ y la acción presente/continua de Yahvé. No se diluye en una paráfrasis más débil.
  doctrine_reference: 'DOCTRINE.md lexical theology: קדשׁ / sanctify'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y la última revisión, que reportó alta concordancia y sin cambios sustantivos. Se preservaron las decisiones clave: אַךְ como énfasis/restricción, בְּנֵי יִשְׂרָאֵל como fórmula corporativa masculina, שׁמר como «guardar», יְהוָה como «Yahvé», y מְקַדִּשְׁכֶם como «santifica».'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento plural de la segunda persona con «ustedes» en el cuerpo y «sepan» en la finalidad.
  - Se evitó la sustitución de «Yahvé» por «Señor» para no oscurecer el nombre propio del pacto.
  - «Sábados» conserva el plural hebreo de שַׁבְּתֹתַי; no se singularizó.
  - La nota de alternativa para «entre mí y ustedes» se incluye por la tensión entre fidelidad formal y español idiomático.
