revisions:
- from: Yahvé alejará al hombre[a] muy lejos, y serán muchas las desolaciones[b] en medio de la tierra.
  to: Yahvé alejará a la gente[a] muy lejos, y serán muchos los lugares abandonados[b] en medio de la tierra.
  rationale: Se reemplaza «al hombre» por «a la gente» para expresar con claridad el singular colectivo הָאָדָם en español contemporáneo y seguir la dirección del audit trail inglés hacia una referencia colectiva natural. Se reemplaza «las desolaciones» por «los lugares abandonados» porque representa mejor la lectura contextual concreta de הָעֲזוּבָה documentada en el POB, mientras que las posibilidades abstractas se conservan en nota. El resto del versículo se mantiene por fidelidad y buena legibilidad.
