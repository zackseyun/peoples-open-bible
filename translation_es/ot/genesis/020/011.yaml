translation:
  language: es
  text: 'Y Abraham dijo[a]: «Porque dije: “Ciertamente no hay temor de Dios en este lugar, y me matarán por causa de mi esposa”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “no hay reverencia por Dios en este lugar”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אַבְרָהָם
  english_pob_choice: And Abraham said
  chosen_spanish: Y Abraham dijo
  alternatives_spanish:
  - Entonces Abraham dijo
  - Abraham respondió
  lexicon: HALOT
  rationale: Conserva el verbo común 'dijo' para וַיֹּאמֶר y mantiene el sujeto explícito con un orden natural en español.
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Pues
  lexicon: HALOT
  rationale: Introduce de forma causal la explicación de Abraham, como en el audit trail inglés.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - pensé
  - me dije
  lexicon: HALOT
  rationale: Se conserva el sentido básico de 'decir'; el contexto permite un matiz interno, pero el valor léxico directo es suficiente aquí.
- source_word: רַק
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Solo
  - Seguramente
  lexicon: HALOT
  rationale: En español, 'ciertamente' comunica mejor la fuerza enfática de רַק sin sonar tan restrictivo como 'solo'.
- source_word: אֵין יִרְאַת אֱלֹהִים
  english_pob_choice: there is no fear of God
  chosen_spanish: no hay temor de Dios
  alternatives_spanish:
  - no hay reverencia por Dios
  - no hay temor de Dios en absoluto
  lexicon: HALOT
  rationale: Se preserva el modismo bíblico 'temor de Dios', que mantiene el peso moral y religioso del hebreo y del inglés POB.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - aquí
  - en esta región
  lexicon: HALOT
  rationale: Traducción directa, natural y precisa del locativo.
- source_word: וַהֲרָגוּנִי
  english_pob_choice: and they will kill me
  chosen_spanish: y me matarán
  alternatives_spanish:
  - y me matarían
  - y acabarán conmigo
  lexicon: HALOT
  rationale: Expresa el resultado esperado desde la perspectiva de Abraham en estilo natural de discurso directo.
- source_word: עַל דְּבַר אִשְׁתִּי
  english_pob_choice: because of my wife
  chosen_spanish: por causa de mi esposa
  alternatives_spanish:
  - a causa de mi esposa
  - por mi esposa
  lexicon: HALOT
  rationale: La expresión idiomática se vierte con 'por causa de' para conservar la relación causal sin sonar forzada.
theological_decisions:
- issue: יִרְאַת אֱלֹהִים como modismo ético-religioso
  english_pob_reading: 'fear of God; alternative: reverence for God'
  chosen_spanish_reading: temor de Dios
  alternative_spanish_readings:
  - reverencia por Dios
  - temor reverente de Dios
  rationale: Se mantiene el modismo bíblico estándar en español porque expresa mejor la dimensión de responsabilidad moral ante Dios y evita suavizar el término hebreo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se ajustó la salida para anclar correctamente la nota al marcador [a] dentro del texto español, corrigiendo el fallo de validación anterior.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' para אֱלֹהִים, conforme al texto fuente y al estándar POB para 'Dios'.
  - Se mantuvo el paralelismo causal de כִּי / עַל דְּבַר con 'porque' y 'por causa de'.
  - El estilo busca ser publicable y reverente sin calcos innecesarios.
