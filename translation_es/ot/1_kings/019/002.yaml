translation:
  language: es
  text: 'Entonces Jezabel envió un mensajero a Elías[a], diciendo: «Así hagan los dioses, y aun más, si para esta hora mañana no hago que tu vida sea como la vida de uno de ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así haga Dios, y aun más». El hebreo אֱלֹהִים puede leerse en singular («Dios») o en plural («dioses»); aquí el plural encaja mejor con la escena y con las formas verbales plurales del juramento.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces envió
  alternatives_spanish:
  - Y envió
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «entonces» expresa bien la secuencia consecutiva en español sin sonar demasiado mecánico.
- source_word: מַלְאָךְ
  english_pob_choice: messenger
  chosen_spanish: mensajero
  alternatives_spanish:
  - ángel
  lexicon: HALOT
  rationale: En este contexto de corte humana, el término designa a un enviado humano, no a un ser celestial.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: Es la fórmula normal para introducir discurso directo.
- source_word: אֱלֹהִים
  english_pob_choice: the gods
  chosen_spanish: los dioses
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: En la fórmula de juramento de Jezabel, el plural concuerda con el contexto inmediato y con los verbos plurales; por eso se preserva el sentido plural.
- source_word: כֹּה יַעֲשׂוּן אֱלֹהִים וְכֹה יוֹסִפוּן
  english_pob_choice: So may the gods do, and more also
  chosen_spanish: Así hagan los dioses, y así añadan
  alternatives_spanish:
  - Así me hagan los dioses, y así añadan más
  - Así hagan los dioses, y más aún
  lexicon: HALOT
  rationale: Se conserva la fórmula de imprecación sin añadir un objeto explícito que no aparece en el hebreo. «Y así añadan» reproduce el paralelismo intensificador de la segunda cola.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - porque
  - que
  lexicon: HALOT
  rationale: En esta construcción de juramento, כִּי introduce la condición del maldición; en español corresponde naturalmente «si».
- source_word: כָעֵת מָחָר
  english_pob_choice: by this time tomorrow
  chosen_spanish: para esta hora mañana
  alternatives_spanish:
  - a esta hora mañana
  - por esta hora mañana
  lexicon: HALOT
  rationale: La expresión marca el mismo momento al día siguiente; «para esta hora mañana» comunica bien el plazo límite en español.
- source_word: נַפְשְׁךָ
  english_pob_choice: your life
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu alma
  - tu ser
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ se refiere a la vida de la persona, no a «alma» en sentido inmortal.
- source_word: אָשִׂים אֶת נַפְשְׁךָ
  english_pob_choice: I do not make your life
  chosen_spanish: no hago de tu vida
  alternatives_spanish:
  - no ponga tu vida
  - no trate tu vida
  lexicon: HALOT
  rationale: El hebreo usa שׂים con נֶפֶשׁ para expresar la idea de hacer que la vida de alguien quede como la de otro; en español «hacer de tu vida» preserva esa relación sin sobre-interpretar el verbo como «matar».
- source_word: כְּנֶפֶשׁ אַחַד מֵהֶם
  english_pob_choice: like the life of one of them
  chosen_spanish: como la vida de uno de ellos
  alternatives_spanish:
  - como uno de ellos
  - como la vida de cada uno de ellos
  lexicon: HALOT
  rationale: Se mantiene la repetición de «vida» para reflejar el hebreo נֶפֶשׁ y dejar claro el paralelismo con la amenaza anterior.
theological_decisions:
- issue: Sentido de אֱלֹהִים en el juramento de Jezabel
  english_pob_reading: plural, 'the gods'
  chosen_spanish_reading: plural, «los dioses»
  alternative_spanish_readings:
  - singular, «Dios»
  rationale: El hablante es Jezabel, en un entorno pagano, y los verbos asociados son plurales; traducirlo en plural evita imponer una lectura monoteísta que el contexto no exige.
  doctrine_reference: 1 Reyes 19:2; fórmula de juramento en contexto de politeísmo
- issue: Conservación de la amenaza con repetición de נֶפֶשׁ
  english_pob_reading: '''your life'' ... ''the life of one of them'''
  chosen_spanish_reading: «tu vida» ... «la vida de uno de ellos»
  alternative_spanish_readings:
  - «tu alma» ... «el alma de uno de ellos»
  - «tu vida» ... «como uno de ellos»
  rationale: Se conserva la repetición de «vida» para no borrar la tensión léxica del hebreo entre נַפְשְׁךָ y נֶפֶשׁ אַחַד מֵהֶם, y porque en este contexto significa la vida/muerte de la persona.
  doctrine_reference: Nefesh como vida/persona en contexto narrativo
- issue: Verbo 'poner/hacer' en אָשִׂים
  english_pob_reading: I do not make your life
  chosen_spanish_reading: «no hago de tu vida»
  alternative_spanish_readings:
  - «no pongo tu vida»
  - «no trato tu vida»
  rationale: Aunque el hebreo tiene una negación implícita en la fórmula de juramento, el español necesita una formulación fluida y fiel al modismo. «Hacer de tu vida» mantiene la idea de transformar el destino de la persona sin inventar contenido.
  doctrine_reference: Uso idiomático de שׂים con נֶפֶשׁ
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que eliminó un «to me» no presente en el hebreo y mantuvo la fórmula de imprecación breve. La versión española conserva esa misma economía y evita añadir destinatarios o complementos ausentes en el texto fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Mensajero» se mantiene por el valor contextual de מַלְאָךְ en una escena de corte humana.
  - Se preserva «vida» para נֶפֶשׁ a fin de mantener la repetición semítica y la amenaza concreta.
  - La puntuación con comillas angulares sigue el uso editorial en español bíblico moderno.
