revisions:
- from: 'Pero quizá algunos dirían[a]: «No todos logran dominar sus pasiones[b], porque no todos tienen razón prudente».'
  to: 'Pero quizá algunos dirían: «No todos logran dominar sus pasiones[a], porque no todos poseen una razón prudente[b]».'
  rationale: Se elimina la nota no sustancial sobre el orden de palabras, se conserva la alternativa léxica importante de περικρατοῦσιν, y se añade una nota para φρόνιμον ... τὸν λογισμόν conforme a la auditoría inglesa. Además, 'poseen una razón prudente' mejora la naturalidad y evita la ambigüedad idiomática de 'tienen razón prudente'.
