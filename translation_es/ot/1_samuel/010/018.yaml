translation:
  language: es
  text: 'Y dijo a los hijos de Israel[a]: «Así dice Yahvé, el Dios de Israel: Yo hice subir a Israel de Egipto, y los libré a ustedes de la mano de los egipcios y de la mano de todos los reinos que los oprimían».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: El hebreo usa la construcción masculina plural literal, y en español «los hijos de Israel» conserva esa forma sin suavizarla a un etnónimo más general. «Israelitas» sería natural, pero perdería la correspondencia formal que el POB audita.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: Es la fórmula profética/mensajera estándar. «Así dice» conserva su tono solemne y su valor discursivo presente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Nombre divino: transliteración del Tetragrámaton en lugar de una sustitución por título. «Yahvé» preserva el nombre personal revelado a Israel.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción posesiva directa y transparente; «el Dios de Israel» comunica correctamente la relación pactual sin añadir matices no presentes.
- source_word: הֶעֱלֵיתִי
  english_pob_choice: I brought ... up
  chosen_spanish: hice subir
  alternatives_spanish:
  - saqué
  - conduje
  lexicon: HALOT
  rationale: El Hiphil de עלה en contexto de éxodo conserva la imagen de ascenso/salida desde Egipto. «Hice subir» mantiene mejor la metáfora que un simple «saqué».
- source_word: וָאַצִּיל
  english_pob_choice: I delivered
  chosen_spanish: los libré
  alternatives_spanish:
  - los rescaté
  - los salvé
  lexicon: HALOT
  rationale: נצל en Hiphil expresa liberación de poder hostil. «Libré» comunica bien esa acción de rescate/liberación y funciona con el régimen «de la mano de».
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la autoridad de
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo, donde «mano» denota poder o control. La imagen es clara y fiel en español.
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  - los de Egipto
  lexicon: HALOT
  rationale: Siguiendo la revisión auditada del POB, aquí la referencia es al poder/pueblo egipcio, no a la tierra como tal. «Los egipcios» es más exacto y natural en español.
- source_word: כָּל הַמַּמְלָכוֹת
  english_pob_choice: all the kingdoms
  chosen_spanish: todos los reinos
  alternatives_spanish:
  - todas las naciones
  - todos los dominios
  lexicon: HALOT
  rationale: ממלכות es plural y amplio. «Todos los reinos» preserva el alcance total sin añadir elementos ausentes.
- source_word: הַלֹּחֲצִים אֶתְכֶם
  english_pob_choice: that were oppressing you
  chosen_spanish: que los oprimían
  alternatives_spanish:
  - que los hacían presión
  - que los angustiaban
  lexicon: HALOT
  rationale: El participio indica opresión continua o característica. «Oprimían» conserva ese valor durativo y el verbo español es fuerte y natural.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la doctrina del proyecto, se preserva el Nombre divino en transliteración y no se sustituye por un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Gendered ethnonym בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se mantiene la precisión formal del plural masculino hebreo, en línea con la preferencia del proyecto por la exactitud de género cuando el texto la presenta explícitamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: מִיַּד as idiomatic deliverance
  english_pob_reading: from the hand of
  chosen_spanish_reading: de la mano de
  alternative_spanish_readings:
  - del poder de
  - de la autoridad de
  rationale: La imagen de ‘mano’ expresa control o dominio. Conservarla en español preserva la imaginería hebrea y el matiz de liberación de poder hostil.
  doctrine_reference: Lexical/idiomatic correspondence for Hebrew construct phrases
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para precisar ‘from the hand of the Egyptians’ en lugar de ‘from the hand of Egypt’, porque el hebreo apunta al pueblo/poder egipcio. La redacción española sigue esa corrección con «de la mano de los egipcios». También se conserva la decisión del POB de mantener el ethnónimo formal y el nombre divino transliterado.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, no una sustitución por mayúsculas reverenciales.
  - «Hijos de Israel» se mantiene como etnónimo formal, con nota de alternativa idiomática.
  - «De la mano de» conserva la metáfora hebrea de dominio y rescate.
  - «Egipcios» refleja la revisión auditada que evita personificar la tierra como sujeto de la mano.
