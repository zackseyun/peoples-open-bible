translation:
  language: es
  text: 'Entonces Joab mandó traer de Tecoa a una mujer sabia[a], y le dijo: «Por favor, finge estar de duelo, ponte ropa de luto[b] y no te unjas con aceite[c], sino compórtate como una mujer que lleva muchos días de luto por un muerto[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sabia» también puede implicar hábil o sagaz en el contexto de una estrategia cuidadosamente preparada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «vestidos de luto» o «prendas de duelo».
    reason: lexical_alternative
  - marker: c
    text: Abstenerse de aplicarse aceite era una señal cultural de duelo, no una simple omisión de aseo.
    reason: cultural_note
  - marker: d
    text: Literalmente, «como una mujer que ha estado lamentándose por un muerto muchos días».
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּקוֹעָה
  english_pob_choice: Tekoa
  chosen_spanish: Tecoa
  alternatives_spanish:
  - Tecoa
  lexicon: HALOT
  rationale: Es nombre propio de lugar; en español la forma bíblica establecida es «Tecoa». Mantiene transliteración directa sin adaptar el sentido.
- source_word: אִשָּׁה חֲכָמָה
  english_pob_choice: a wise woman
  chosen_spanish: una mujer sabia
  alternatives_spanish:
  - una mujer prudente
  - una mujer hábil
  - una mujer sagaz
  lexicon: HALOT
  rationale: חֲכָמָה aquí conserva el valor básico de sabiduría, con posible matiz de habilidad persuasiva según el contexto narrativo. «Sabia» mantiene la correspondencia léxica y deja que el contexto explique su función.
- source_word: הִתְאַבְּלִי נָא
  english_pob_choice: Please pretend to be mourning
  chosen_spanish: finge estar de duelo
  alternatives_spanish:
  - por favor, ponte en duelo
  - por favor, haz como que estás de duelo
  - por favor, adopta apariencia de duelo
  lexicon: HALOT
  rationale: El hitpael de אבל significa «estar de duelo/mourning», pero aquí la instrucción es performativa dentro del plan de Joab. «Finge estar de duelo» expresa la fuerza pragmática sin borrar el sentido verbal básico.
- source_word: וְלִבְשִׁי נָא בִגְדֵי אֵבֶל
  english_pob_choice: and please put on mourning clothes
  chosen_spanish: y por favor ponte vestidos de luto
  alternatives_spanish:
  - y por favor viste ropa de luto
  - y por favor lleva vestidos de luto
  - y por favor vístete con ropa de duelo
  lexicon: HALOT
  rationale: בִגְדֵי אֵבֶל es una expresión idiomática para prendas asociadas al duelo. «Vestidos de luto» conserva el valor cultural y resulta natural en español bíblico contemporáneo.
- source_word: וְאַל תָּסוּכִי שֶׁמֶן
  english_pob_choice: and do not anoint yourself with oil
  chosen_spanish: y no te unjas con aceite
  alternatives_spanish:
  - y no te pongas aceite
  - y no te frotes con aceite
  - y no te perfumas con aceite
  lexicon: HALOT
  rationale: סוך con שֶׁמֶן alude a aplicarse aceite como parte del aseo normal o de alivio. «Ungir» es fiel al verbo y, en este contexto, comunica la señal visible de luto.
- source_word: זֶה יָמִים רַבִּים
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - por muchos días
  - desde hace muchos días
  - estos muchos días
  lexicon: HALOT
  rationale: La frase hebrea es un modismo de duración prolongada. «Muchos días» es directo y reproduce la idea temporal sin sobreexplicarla.
- source_word: מִתְאַבֶּלֶת עַל מֵת
  english_pob_choice: who has been mourning for the dead
  chosen_spanish: que ha estado de luto por un muerto
  alternatives_spanish:
  - que ha estado llorando por un muerto
  - que lleva tiempo de luto por un muerto
  - que está de duelo por un muerto
  lexicon: HALOT
  rationale: El participio describe un estado continuado. «Ha estado de luto» transmite esa duración; «por un muerto» conserva el singular genérico del hebreo sin especificar un caso concreto.
translation_notes:
  revision_awareness: La redacción sigue la revisión del inglés POB que prefirió una formulación más natural («pretend to be mourning») sin alterar la intención narrativa. En español se optó por una equivalencia igualmente natural («finge estar de duelo»), manteniendo la fuerza performativa del mandato de Joab y conservando los otros rasgos culturales del verso.
  spanish_consistency_notes:
  - Se usa «Tecoa» como topónimo bíblico estándar en español.
  - Se mantiene «luto/duelo» de manera consistente para el campo semántico de אבל.
  - Se conserva la señal cultural del aceite como marcador de duelo.
  - No se introduce terminología eclesiástica ajena al hebreo.
  - La puntuación y las comillas siguen normas tipográficas españolas.
