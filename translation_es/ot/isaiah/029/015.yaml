  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: denuncia profética, ocultamiento deliberado de planes de Yahvé, obras en oscuridad, y las dos preguntas finales. Sin embargo, añade un posesivo no explícito en עֵצָה (''su consejo'') y la nota b en español está anclada al lugar equivocado: la alternativa ''los que cavan/profundizan para ocultar un plan de Yahvé'' corresponde al segmento inicial, no a ''nos ve''.'
  spanish_quality_summary: El español es claro y digno, pero puede sonar más natural y más cercano al hebreo con 'profundizan' en vez de 'se adentran', y conviene eliminar el posesivo añadido en 'su consejo'. También mejora la fluidez retirar la conjunción repetida antes de la segunda cláusula relativa.
  glossary_alignment: Alinea correctamente יהוה como 'Yahvé', preserva 'tinieblas' para בְמַחְשָׁךְ y mantiene el tono profético con '¡Ay de...!'. No hay conflictos terminológicos mayores con el glosario del proyecto.
  issues:
  - severity: medium
    issue: Adición de posesivo en 'su consejo'
    rationale: El hebreo עֵצָה aquí no lleva sufijo posesivo. Aunque el contexto sugiere que son sus planes, añadir 'su' explicita más de lo que dice el texto fuente.
  - severity: medium
    issue: Anclaje incorrecto de la nota [b]
    rationale: La nota alternativa describe una lectura/traducción del segmento inicial ('those who go deep / dig deep...'), pero en el borrador está colocada sobre 'nos ve', lo que confunde al lector y no cumple la disciplina de anclar la nota al lugar pertinente.
  - severity: low
    issue: '''Se adentran'' es menos preciso para la imagen de העמיקים'
    rationale: No es incorrecto, pero 'profundizan' o 'cavan hondo' preserva mejor la metáfora de ir hondo para ocultar, más cerca del hebreo y del razonamiento lexical auditado.
  revised_spanish_text: '¡Ay de los que profundizan[b] para ocultar consejo de Yahvé[a], cuyas obras están en tinieblas, y dicen: «¿Quién nos ve, y quién nos conoce?»'
  revised_footnotes:
