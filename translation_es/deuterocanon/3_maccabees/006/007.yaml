translation:
  language: es
  text: Tú sacaste a Daniel a la luz ileso, cuando había sido arrojado en el suelo[a] a los leones como comida para las bestias, por las calumnias de la envidia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase griega es difícil; literalmente dice «en el suelo». Se conserva de manera sobria en vez de armonizarla con el relato de Daniel.
    reason: textual_variant
  - marker: b
    text: 'O: «por acusaciones nacidas de envidia». El griego combina la idea de calumnia/acusación con la de envidia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαβολαῖς
  english_pob_choice: through the slanders
  chosen_spanish: por las calumnias
  alternatives_spanish:
  - por las acusaciones
  - por las calumnias de
  lexicon: LSJ
  rationale: El dativo plural expresa el medio o instrumento de una denuncia maliciosa; en español, «calumnias» transmite mejor el sentido de acusaciones falsas y hostiles sin perder fuerza.
- source_word: φθόνου
  english_pob_choice: of envy
  chosen_spanish: de la envidia
  alternatives_spanish:
  - de los celos
  - nacidas de la envidia
  lexicon: LSJ
  rationale: El genitivo caracteriza el origen o motivación de las calumnias. «Envidia» es la correspondencia más directa y natural para φθόνος.
- source_word: λέουσι
  english_pob_choice: to the lions
  chosen_spanish: a los leones
  alternatives_spanish:
  - entre los leones
  lexicon: LSJ
  rationale: El dativo marca a los animales a los que Daniel fue entregado. «A los leones» conserva esa relación de manera directa.
- source_word: κατὰ γῆς
  english_pob_choice: on the ground
  chosen_spanish: en el suelo
  alternatives_spanish:
  - sobre la tierra
  - en tierra
  lexicon: LSJ
  rationale: La frase es difícil en el griego transmitido, pero se mantiene de modo sobrio como referencia espacial concreta. «En el suelo» preserva la rareza sin armonizar con el relato de Daniel.
- source_word: ῥιφέντα
  english_pob_choice: had been thrown
  chosen_spanish: había sido arrojado
  alternatives_spanish:
  - había sido lanzado
  - había sido echado
  lexicon: LSJ
  rationale: El participio pasivo de ῥίπτω expresa una acción violenta de arrojar. «Había sido arrojado» comunica bien esa fuerza en español.
- source_word: θηρσὶ βορὰν
  english_pob_choice: as food for the beasts
  chosen_spanish: como comida para las bestias
  alternatives_spanish:
  - como presa de las bestias
  - como alimento para las fieras
  lexicon: LSJ
  rationale: βορά indica comida o presa, y θηρσί se refiere a bestias/animales salvajes. «Como comida para las bestias» mantiene el valor literal y el sentido de destrucción buscado por el texto.
- source_word: εἰς φῶς
  english_pob_choice: into the light
  chosen_spanish: a la luz
  alternatives_spanish:
  - hacia la luz
  - en la luz
  lexicon: LSJ
  rationale: La expresión conserva la imagen de salida o rescate de la oscuridad. En español, «a la luz» suena natural y sigue la metáfora sin añadir elementos ajenos.
- source_word: ἀνήγαγες
  english_pob_choice: you brought ... up
  chosen_spanish: tú sacaste ...
  alternatives_spanish:
  - tú hiciste subir ...
  - tú trajiste ...
  lexicon: LSJ
  rationale: El verbo ἀνάγω puede significar subir, sacar o traer arriba. Aquí el paralelismo con εἰς φῶς favorece «sacaste», que en español comunica bien la idea de rescate y elevación.
- source_word: ἀσινῆ
  english_pob_choice: unharmed
  chosen_spanish: sano y salvo
  alternatives_spanish:
  - ileso
  - sin daño
  lexicon: LSJ
  rationale: ἀσινής significa no dañado, ileso. «Sano y salvo» es una equivalencia idiomática clara en español, aunque añade la matiz de preservación total que encaja con el contexto.
theological_decisions:
- issue: Alusión a la liberación de Daniel de los leones
  english_pob_reading: Render the verse as a direct address to God recalling Daniel's rescue without importing details beyond the Greek wording.
  chosen_spanish_reading: Mantener la dirección a Dios y la memoria de la liberación de Daniel sin añadir la expresión «fosa de los leones» si no está en el griego.
  alternative_spanish_readings:
  - ampliar a «fosa de los leones»
  - parafrasear con el relato conocido de Daniel 6
  rationale: El griego nombra a Daniel, a los leones y la acción de llevarlo a la luz sano e ileso; no menciona explícitamente la fosa. La versión española conserva la alusión sin sobretraducir desde la narrativa conocida.
  doctrine_reference: 'Principio de primacía del original: traducir lo que dice el texto fuente, no la tradición interpretativa posterior.'
- issue: Tratamiento de la frase difícil κατὰ γῆς
  english_pob_reading: Translate conservatively as 'on the ground' and preserve the source awkwardness rather than emending silently.
  chosen_spanish_reading: Traducir de modo conservador con «en el suelo» y mantener la rareza del texto transmitido.
  alternative_spanish_readings:
  - omitir la frase por posible corrupción
  - suavizarla con una imagen del pozo o la fosa
  rationale: La lectura griega es difícil, pero está atestiguada en el texto base usado. La traducción no debe borrar la tensión ni resolverla con material tomado del relato bíblico paralelo.
  doctrine_reference: 'Transparencia textual: cuando la forma del original es incómoda, la traducción debe reflejarlo con sobriedad.'
translation_notes:
  revision_awareness: Se revisó la ubicación de las notas para asegurar que cada marcador aparezca exactamente en el texto español. La redacción final integra ambos marcadores en el segmento principal y evita notas sin anclaje.
  spanish_consistency_notes:
  - Se usa «Dios» en el vocativo implícito solo por el pronombre de segunda persona; no se añadió un sustantivo inexistente en el versículo.
  - Se prefirió «leones» y no «fieras» para conservar el referente explícito del griego.
  - «Sano y salvo» se eligió por claridad natural, pero la nota reconoce la posibilidad más literal de «ileso».
  - Se conservó la dureza de la secuencia causal final sin convertirla en una explicación narrativa ampliada.
