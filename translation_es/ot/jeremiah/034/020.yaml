  to: Los entregaré en manos de sus enemigos y en manos de los que buscan su vida[a], y sus cadáveres[b] llegarán a ser comida para las aves del cielo[c] y para las bestias de la tierra.
  rationale: La revisión hace ajustes menores para mejorar la naturalidad y la fidelidad al audit trail. Se elimina la conjunción inicial por fluidez en español, se cambia 'en mano de' por 'en manos de' para mantener el modismo sin sonar rígido, se usa 'llegarán a ser' para reflejar mejor el valor resultativo de וְהָיְתָה, y se corrigen las notas para que preserven con más precisión las alternativas léxicas documentadas en inglés.
