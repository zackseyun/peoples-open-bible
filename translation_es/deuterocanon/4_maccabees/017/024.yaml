revisions:
- from: Y los hizo nobles y valientes para el combate de infantería[a] y la guerra de sitio, y después de devastarlos[b][c], venció a todos los enemigos.
  to: Y los hizo nobles y valientes para el combate de infantería[a] y la guerra de asedio, y después de saquearlos[b][c], venció a todos los enemigos.
  rationale: Se corrige la nota [c] para que refleje fielmente la decisión documentada sobre el sujeto implícito/comprimido en la cláusula final. También se mejora la naturalidad de πολιορκίαν con «guerra de asedio» y se afina ἐκπορθήσας con «saquearlos», dejando «devastar» en nota como alternativa preservada.
