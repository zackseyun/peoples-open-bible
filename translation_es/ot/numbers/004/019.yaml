review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la línea del POB: mantiene el mandato contrastivo, el sentido benefactivo de לָהֶם, la finalidad ''para que vivan y no mueran'', y la lectura contextual de קֹדֶשׁ הַקֳּדָשִׁים como objetos sagrados y no como recinto. También refleja correctamente la distribución individual de אִישׁ אִישׁ y el binomio servicio/carga.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos problemas de forma y precisión: (1) la nota [a] está anclada en un lugar incorrecto (''por ellos'') y reutilizada de hecho para otra idea distinta en ''asignarán[a]'', contraviniendo la disciplina de anclaje; (2) ''entrarán'' añade un matiz espacial más fuerte que el hebreo יָבֹאוּ, que aquí es simplemente ''vendrán''/''vendrán a hacerlo'' en una instrucción legal. Además, ''cosas santísimas'' es aceptable pero ''objetos santísimos'' encaja mejor con la justificación documentada sobre objetos transportables.'
  glossary_alignment: 'No hay conflictos con la terminología global del proyecto. Los términos clave se mantienen bien: ''Aarón'', ''sus hijos'', ''servicio'', ''carga''. La decisión sobre קֹדֶשׁ הַקֳּדָשִׁים debe alinearse más estrechamente con la rationale inglesa usando ''objetos santísimos'' y conviene conservar una nota alternativa para ''Santo de los Santos'' / ''Lugar Santísimo''.'
  issues:
  - severity: high
    issue: La nota [a] está mal anclada y su marcador se usa de manera incoherente con el contenido señalado.
    rationale: La única nota explica la expresión distributiva אִישׁ אִישׁ, por lo que debe anclarse en 'a cada uno' (o equivalente), no en 'por ellos'. Además, cada marcador debe corresponder a una nota concreta y aparecer en el lugar relevante del texto.
  - severity: medium
    issue: '''Entrarán'' sobretraduce יָבֹאוּ.'
    rationale: El hebreo dice 'vendrán'/'shall come', no necesariamente 'entrarán'. Dado que ya se habla del acercarse a los objetos santísimos, 'vendrán' mantiene la fuerza prescriptiva sin añadir un matiz espacial no exigido.
  - severity: medium
    issue: '''Las cosas santísimas'' es comprensible, pero no es la mejor opción para la rationale documentada del POB.'
    rationale: La documentación inglesa enfatiza que se trata de los objetos más santos en contexto de transporte. 'Objetos santísimos' es más preciso y natural en español eclesial que 'cosas santísimas'.
  - severity: low
    issue: Falta en español una nota alternativa para la lectura tradicional espacial de קֹדֶשׁ הַקֳּדָשִׁים.
    rationale: El English POB preserva explícitamente la alternativa 'Holy of Holies' / 'most holy place'. Dado que el español elige una lectura contextual no espacial, conviene mantener esa alternativa en nota.
  revised_spanish_text: 'Pero hagan esto por ellos, para que vivan y no mueran cuando se acerquen a los objetos santísimos[a]: Aarón y sus hijos vendrán y asignarán a cada uno[b] su servicio y su carga.'
  revised_footnotes:
  - marker: a
    text: O 'el Santo de los Santos' / 'el Lugar Santísimo'. Aquí la frase probablemente se refiere a los objetos sagrados más santos, y no al recinto interior mismo, dado el contexto de las tareas de transporte.
    reason: alternative_reading
  - marker: b
    text: Hebreo 'hombre por hombre', una expresión distributiva que significa que a cada individuo se le asignaba su propio servicio y su propia carga.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de notas para cumplir la disciplina del proyecto, se añade la nota alternativa que conserva la lectura tradicional espacial documentada por el POB, se cambia 'entrarán' por 'vendrán' para reflejar mejor יָבֹאוּ, y se precisa 'objetos santísimos' para alinearse mejor con la rationale contextual sobre objetos transportables.
