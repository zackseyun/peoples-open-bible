    changes_summary: 'Added the omitted main clause from the source: ''Yahweh, you have searched me and known me.'' Preserved the superscription elements and rendered יְהוָה as ''Yahweh.'''
translation:
  language: es
  text: Al director del coro[a]. De David[b]. Un salmo. Yahvé, me has escudriñado y me has conocido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Para el director del coro»; la preposición hebrea puede indicar dirección o dedicación en los encabezados de salmo.
    reason: lexical_alternative
  - marker: b
    text: O «Por David»; el encabezado «De David» conserva la ambigüedad hebrea sobre autoría, dedicación o asociación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster[a].
  chosen_spanish: Al director del coro[a].
  alternatives_spanish:
  - Para el director del coro
  - Al maestro de canto
  - Al músico principal
  lexicon: לְ + מְנַצֵּחַ
  rationale: El hebreo permite una relación de dirección o dedicación en los encabezados de salmo. «Al director del coro» conserva la función litúrgica sin imponer una sola interpretación, y evita una calca menos natural en español.
- source_word: לְדָוִד
  english_pob_choice: Of David.[b]
  chosen_spanish: De David[b].
  alternatives_spanish:
  - Para David
  - Por David
  - Pertenece a David
  lexicon: לְ + דָוִד
  rationale: La preposición hebrea mantiene ambigüedad entre autoría, dedicación o asociación. «De David» preserva esa ambigüedad de forma breve y legible en español.
- source_word: מִזְמוֹר
  english_pob_choice: a psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Salmo
  - Cántico
  - Poema
  lexicon: מִזְמוֹר
  rationale: «Salmo» es el equivalente más directo y reconocido para el género del encabezado. El artículo indefinido refleja el valor nominativo del hebreo en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: Tetragrámaton
  rationale: Se sigue el criterio del proyecto para representar el nombre divino con «Yahvé» en el texto principal, manteniendo la transparencia frente al hebreo original.
- source_word: חֲקַרְתַּנִי
  english_pob_choice: you have searched me
  chosen_spanish: me has examinado
  alternatives_spanish:
  - me has escudriñado
  - me has investigado
  - me has sondeado
  lexicon: חקר
  rationale: «Examinar» comunica bien la acción de investigar a fondo y es natural en español. «Escudriñar» es una alternativa válida, pero «examinar» evita un registro demasiado arcaico o exclusivamente bíblico.
- source_word: וַתֵּדָע
  english_pob_choice: and known me
  chosen_spanish: y conocido
  alternatives_spanish:
  - y me has conocido
  - y has llegado a conocerme
  - y me conoces
  lexicon: ידע
  rationale: En coordinación con «me has examinado», «y conocido» reproduce el paralelismo hebreo de forma concisa. El sentido completo queda claro en la frase española como «me has examinado y conocido».
theological_decisions:
- issue: Preservación del nombre divino en el encabezado
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto fuente contiene explícitamente יהוה. Siguiendo el criterio del proyecto, se evita la sustitución por un título en mayúsculas y se conserva la referencia al nombre propio divino.
  doctrine_reference: Éxodo 3:15; Salmo 83:18
- issue: Ambigüedad de לְדָוִד en el encabezado
  english_pob_reading: Of David.[b]
  chosen_spanish_reading: De David[b].
  alternative_spanish_readings:
  - Para David
  - Por David
  rationale: La evidencia del hebreo no obliga a una sola relación de autoría. «De David» conserva la ambigüedad documental sin resolverla artificialmente.
  doctrine_reference: Principio de cautela textual en encabezados poéticos
translation_notes:
  revision_awareness: 'La versión final incorpora la revisión que restauró la cláusula principal omitida en un pase anterior: «Yahweh, you have searched me and known me». También mantiene los elementos del superscrito y el equivalente transparente para יהוה, conforme al registro de revisión más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יהוה, en coherencia con el estándar del proyecto.
  - «De David» conserva la ambigüedad del hebreo sin convertirla en una afirmación explícita de autoría.
  - 'El paralelismo hebreo se refleja con dos verbos coordinados: «me has examinado y conocido».'
  - El registro del encabezado usa español natural y culto, evitando fórmulas eclesiásticas rígidas donde no aportan precisión.
