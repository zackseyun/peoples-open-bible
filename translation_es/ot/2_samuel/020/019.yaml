- from: Yo soy de los pacíficos y fieles en Israel. Tú buscas destruir una ciudad[a], y una madre en Israel. ¿Por qué habrías de tragar la heredad de Yahvé?
  to: Yo soy una de los pacíficos y fieles en Israel. Tú buscas destruir una ciudad[a] y una madre en Israel. ¿Por qué habrías de tragar la heredad de Yahvé?
  rationale: 'Se hicieron reparaciones menores para mejorar la naturalidad del español y la presentación editorial sin cambiar el sentido: se ajustó la primera frase para expresar mejor el matiz partitivo/colectivo del hebreo, se eliminó la coma innecesaria antes de ''y'', y se normalizó el formato de la nota al pie.'
