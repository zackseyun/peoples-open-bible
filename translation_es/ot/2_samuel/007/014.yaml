review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura relacional del hebreo y la fuerza de ''cometa iniquidad'' / ''lo disciplinaré''. Sin embargo, dos giros españoles no preservan con suficiente naturalidad y claridad el sentido fuente: ''golpes de hijos de hombre'' resulta torpe y poco idiomático, y la nota está anclada en ''padre'' aunque explica una alternativa para la frase final.'
  spanish_quality_summary: El texto es mayormente fiel y digno, pero necesita una reparación menor de legibilidad. 'Vara de hombres' puede mantenerse como literal y comprensible; en cambio 'golpes de hijos de hombre' suena antinatural en español bíblico actual. También conviene mover la nota al sintagma final correspondiente.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La elección de 'iniquidad' y 'disciplinaré' concuerda con la justificación léxica auditada. La excepción necesaria es suavizar 'hijos de hombre' a 'seres humanos' en la nota, y en el texto principal usar una forma más natural sin perder el valor humano/genérico.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en 'padre' pero su contenido trata la frase final sobre los golpes.
    rationale: Los marcadores deben aparecer en el lugar exacto al que pertenece la nota. Tal como está, induce a confusión editorial.
  - severity: medium
    issue: '''Golpes de hijos de hombre'' es una construcción poco natural en español.'
    rationale: Aunque formalmente cercana al hebreo, en español moderno eclesial suena forzada y dificulta la lectura. Puede preservarse el sentido con 'golpes de seres humanos' y mantener la alternativa más idiomática en nota.
  - severity: low
    issue: Falta el artículo en 'con vara de hombres'.
    rationale: El hebreo tiene 'con el cetro/la vara de hombres' como sintagma definido por construcción contextual; en español 'con la vara de hombres' suena algo más completo y natural, aunque no es un error grave.
  revised_spanish_text: Yo seré para él un padre, y él será para mí un hijo. Cuando cometa iniquidad, lo disciplinaré con la vara de hombres y con golpes de seres humanos[a].
  revised_footnotes:
  - marker: a
    text: 'O, más idiomáticamente: “con golpes humanos”. El hebreo dice literalmente: “con los golpes de los hijos de hombre”.'
    reason: lexical_alternative
