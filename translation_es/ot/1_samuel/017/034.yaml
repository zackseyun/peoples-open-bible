translation:
  language: es
  text: 'David dijo a Saúl: «Tu siervo estaba cuidando las ovejas de mi padre, y vino el león o el oso, y se llevó un cordero[a] del rebaño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Un cordero» también puede entenderse como «una oveja» o, más ampliamente, «un animal del rebaño», porque el hebreo permite un sentido menos específico.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹעֶה
  english_pob_choice: tending his father’s sheep
  chosen_spanish: estaba cuidando las ovejas
  alternatives_spanish:
  - estaba pastoreando
  - era pastor de las ovejas
  lexicon: HALOT
  rationale: El participio describe una actividad continua o habitual. En español, «cuidando las ovejas» comunica de forma natural la labor pastoral sin volverlo más abstracto de lo necesario.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: En la fórmula de respeto dirigida a un rey, «tu siervo» refleja humildad cortesana. Aunque el término hebreo puede significar «esclavo», ese matiz no es el principal aquí.
- source_word: לְאָבִיו
  english_pob_choice: for his father
  chosen_spanish: de su padre
  alternatives_spanish:
  - para su padre
  - al servicio de su padre
  lexicon: HALOT
  rationale: 'El sentido es relacional y de encargo: David realizaba el cuidado de las ovejas pertenecientes al padre. «De su padre» mantiene esa relación de pertenencia y dependencia de manera idiomática en español.'
- source_word: בַּצֹּאן
  english_pob_choice: among the flock
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  - entre el rebaño
  lexicon: HALOT
  rationale: En este contexto pastoral, el inglés POB precisa «his father’s sheep». En español, «las ovejas» expresa de manera clara y natural el objeto del cuidado pastoral; «rebaño» queda reservado al cierre con el sustantivo colectivo.
- source_word: וּבָא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - venía
  lexicon: HALOT
  rationale: El valor narrativo es sucesivo y puntual en la cadena de acciones. «Vino» conserva la secuencia de eventos sin introducir una perífrasis menos directa.
- source_word: הָאֲרִי
  english_pob_choice: the lion
  chosen_spanish: el león
  alternatives_spanish:
  - un león
  lexicon: HALOT
  rationale: El hebreo lleva artículo; en español se mantiene naturalmente «el león» para conservar la referencia genérica-vividora del relato.
- source_word: וְאֶת הַדּוֹב
  english_pob_choice: or the bear
  chosen_spanish: o el oso
  alternatives_spanish:
  - y el oso
  lexicon: HALOT
  rationale: 'Aunque el hebreo usa la conjunción «y», el contexto distributivo indica alternativas. En español, «o» preserva mejor el sentido: cualquiera de los dos depredadores podía venir.'
- source_word: וְנָשָׂא
  english_pob_choice: carry off
  chosen_spanish: se llevó
  alternatives_spanish:
  - arrebató
  - llevó consigo
  lexicon: HALOT
  rationale: El verbo describe el acto de tomar presa y llevarla lejos. «Se llevó» suena natural en español y conserva la idea de rapto/pérdida del animal.
- source_word: שֶׂה
  english_pob_choice: a lamb
  chosen_spanish: un cordero
  alternatives_spanish:
  - una oveja
  - una cría
  lexicon: HALOT
  rationale: Aunque el término hebreo puede abarcar un animal del rebaño en general, en este contexto de depredación «un cordero» reproduce bien la imagen concreta y tradicional del animal pequeño arrebatado.
- source_word: מֵהָעֵדֶר
  english_pob_choice: from the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - de entre el rebaño
  lexicon: HALOT
  rationale: «Rebaño» es el equivalente natural de flock en un contexto de ovejas. «Del rebaño» mantiene la relación de procedencia sin forzar una estructura más pesada.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del POB en inglés: se prefirió una secuencia narrativa simple («vino... y se llevó») frente a una perífrasis de hábito, y se mantuvo la lectura distributiva de «el león o el oso» en español, en línea con la revisión que conservó la naturalidad narrativa.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque no aparece ningún término mesiánico en el pasaje.
  - Se mantuvo «siervo» como fórmula de cortesía y no «esclavo», siguiendo el valor pragmático del hebreo en este contexto.
  - «Rebaño» se reservó para el sustantivo colectivo final, mientras que «ovejas» traduce el objeto del cuidado pastoral de manera más natural en la primera cláusula.
