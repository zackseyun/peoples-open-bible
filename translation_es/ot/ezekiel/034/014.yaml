    changes_summary: Replaced 'grazing place' with 'dwelling place' to better reflect נוה in both occurrences and preserve consistency. Left 'pasture/pasture them' and 'rich pasture' unchanged as accurate and natural.
translation:
  language: es
  text: En buen pasto los pastorearé, y en los altos montes de Israel estará su morada[a]. Allí se recostarán en una buena morada, y en pasto abundante[b] pastarán en los montes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su lugar de pastoreo'; el hebreo נוה puede significar morada, habitación o lugar de pastoreo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'pasto graso'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִרְעֶה
  english_pob_choice: pasture
  chosen_spanish: pasto
  alternatives_spanish:
  - pradera
  - pastura
  - pastizal
  lexicon: HALOT
  rationale: El sustantivo refiere al lugar o espacio de pastoreo. En español, 'pasto' comunica con naturalidad esa idea y permite mantener la repetición pastoril del verso sin sonar técnico.
- source_word: טּוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - agradable
  - hermoso
  - excelente
  lexicon: HALOT
  rationale: Es un adjetivo valorativo simple; 'bueno' conserva la fuerza directa del hebreo sin añadir matices no documentados.
- source_word: אֶרְעֶה
  english_pob_choice: I will pasture
  chosen_spanish: los pastorearé
  alternatives_spanish:
  - los apacentaré
  - los alimentaré
  - los apacentaré como pastor
  lexicon: HALOT
  rationale: El verbo pertenece al campo semántico del pastoreo y aquí Dios es el sujeto que cuida al rebaño. 'Pastorearé' mantiene ese vínculo más claramente que un simple 'alimentaré'.
- source_word: הָרֵי מְרוֹם יִשְׂרָאֵל
  english_pob_choice: the high mountains of Israel
  chosen_spanish: los altos montes de Israel
  alternatives_spanish:
  - los montes altos de Israel
  - los montes elevados de Israel
  - los altos montes de Israel
  lexicon: HALOT
  rationale: '''Altos montes'' expresa de forma natural la elevación indicada por מְרוֹם y conserva la imagen geográfica del texto.'
- source_word: נְוֵהֶם
  english_pob_choice: their dwelling place
  chosen_spanish: su morada
  alternatives_spanish:
  - su morada
  - su habitación
  - su pasto
  lexicon: HALOT
  rationale: El sustantivo puede significar morada/aposento, y el contexto de seguridad y reposo favorece 'morada'. Así se respeta la decisión revisada del POB inglés sin perder la ambigüedad pastoral posible.
- source_word: תִּרְבַּצְנָה
  english_pob_choice: they will lie down
  chosen_spanish: se recostarán
  alternatives_spanish:
  - se echarán
  - se tenderán
  - descansarán
  lexicon: HALOT
  rationale: El verbo describe a animales que se echan o se recuestan. 'Se recostarán' preserva la imagen concreta de reposo sin volverla excesivamente literal o brusca en español.
- source_word: בְּנָוֶה טּוֹב
  english_pob_choice: in a good dwelling place
  chosen_spanish: en una buena morada
  alternatives_spanish:
  - en una buena habitación
  - en un buen aposento
  - en una buena morada
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con נוה como 'morada' y se conserva el paralelismo con la primera ocurrencia, tal como el auditor inglés prefirió 'dwelling place' para ambas.
- source_word: מִרְעֶה שָׁמֵן
  english_pob_choice: rich pasture
  chosen_spanish: pasto jugoso
  alternatives_spanish:
  - pasto rico
  - pasto abundante
  - pastura jugosa
  lexicon: HALOT
  rationale: שָׁמֵן literalmente es 'graso/fértil'. 'Pasto jugoso' comunica abundancia y fertilidad de manera natural en español, manteniendo el valor imagético sin caer en un calco torpe.
- source_word: תִּרְעֶינָה
  english_pob_choice: they will feed
  chosen_spanish: pastarán
  alternatives_spanish:
  - comerán
  - pacerán
  - se alimentarán
  lexicon: HALOT
  rationale: Con el rebaño como sujeto, el verbo debe reflejar la acción de pastar/grazing. 'Pastarán' conserva el campo semántico pastoral y la concordancia verbal del plural femenino.
- source_word: אֶל הָרֵי יִשְׂרָאֵל
  english_pob_choice: on the mountains of Israel
  chosen_spanish: sobre los montes de Israel
  alternatives_spanish:
  - en los montes de Israel
  - sobre los montes de Israel
  - hacia los montes de Israel
  lexicon: HALOT
  rationale: Aunque אֶל suele ser 'a/hacia', aquí funciona locativamente dentro de la imagen de pastoreo. 'Sobre' evita una traducción direccional artificial y encaja con el movimiento del ganado en el terreno.
theological_decisions:
- issue: Imagen pastoral concreta frente a abstracción interpretativa
  english_pob_reading: Retain concrete shepherding and grazing imagery throughout rather than abstracting to general provision or rest.
  chosen_spanish_reading: Conservar la imaginería concreta de pastoreo, reposo y pastoreo en lugar de convertirla en una formulación generalizada de cuidado.
  alternative_spanish_readings:
  - Los cuidaré y les daré descanso.
  - En buena provisión los sostendré.
  rationale: El verso pertenece a un oráculo pastoral extendido. Mantener la imagen del rebaño, la morada y el pasto refleja mejor el hebreo y evita borrar la tensión metafórica del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El inglés POB revisó נְוֵהֶם y בְּנָוֶה טּוֹב para preferir 'dwelling place' y conservar coherencia con נוה en ambos casos. Esta versión española sigue esa revisión con 'morada' en ambas ocurrencias, mientras mantiene el resto del lexicón pastoral del verso y respeta la imagen concreta del pastoreo.
  spanish_consistency_notes:
  - 'Se mantiene una cadena léxica coherente: pasto / pastorear / morada / recostarse / pastarán.'
  - '''Montes de Israel'' se conserva de forma estable en ambas menciones.'
  - '''Morada'' traduce נוה en ambas ocurrencias para reflejar la revisión auditada del POB inglés.'
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino explícito en esta línea; la voz del hablante ya está contextualizada por el oráculo previo.
