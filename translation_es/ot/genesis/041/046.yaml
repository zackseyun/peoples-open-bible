translation:
  language: es
  text: Ahora bien, José tenía treinta años cuando estuvo ante[a] Faraón, rey de Egipto. Y José salió de la presencia de Faraón y pasó por[b] toda la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Estuvo ante» traduce el valor temporal de בְּעָמְדוֹ con לִפְנֵי en contexto cortesano: señala el momento en que José compareció ante el rey. También podría expresarse como «cuando compareció ante».'
    reason: lexical_alternative
  - marker: b
    text: «Pasó por» conserva mejor la idea de desplazamiento a través del territorio en וַיַּעְבֹר בְּכָל; también podría decirse «anduvo por toda la tierra de Egipto».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שְׁלֹשִׁים שָׁנָה
  english_pob_choice: was thirty years old
  chosen_spanish: tenía treinta años
  alternatives_spanish:
  - era de treinta años
  - tenía treinta años de edad
  lexicon: HALOT
  rationale: La expresión hebrea de edad funciona idiomáticamente; en español, «tenía treinta años» comunica con naturalidad el dato sin volverla mecánica.
- source_word: בְּעָמְדוֹ
  english_pob_choice: when he stood
  chosen_spanish: cuando se presentó
  alternatives_spanish:
  - cuando estuvo de pie
  - cuando compareció
  lexicon: HALOT
  rationale: 'El sentido es temporal y cortesano: la aparición de José ante el rey. «Se presentó» refleja bien la escena formal ante un soberano en español actual.'
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: HALOT
  rationale: «Ante» conserva la relación espacial/cortesana y suena natural en español en un contexto de audiencia real.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: HALOT
  rationale: Se conserva el título propio histórico-bíblico habitual en español como nombre/título, sin necesidad de convertirlo en título común con artículo.
- source_word: מֶלֶךְ מִצְרָיִם
  english_pob_choice: king of Egypt
  chosen_spanish: rey de Egipto
  alternatives_spanish:
  - el rey de Egipto
  lexicon: HALOT
  rationale: La construcción en aposición identifica a Faraón; en español queda natural como «rey de Egipto».
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: «Salió» reproduce de forma directa el movimiento fuera de la presencia del rey.
- source_word: מִלִּפְנֵי פַרְעֹה
  english_pob_choice: from before Pharaoh
  chosen_spanish: de la presencia de Faraón
  alternatives_spanish:
  - de delante de Faraón
  - desde la presencia de Faraón
  lexicon: HALOT
  rationale: En español, «de la presencia de» expresa con claridad la idiomática hebrea de separación desde el ámbito cortesano, manteniendo la idea sin dureza literal.
- source_word: וַיַּעְבֹר
  english_pob_choice: traveled through
  chosen_spanish: recorrió
  alternatives_spanish:
  - pasó por
  - anduvo por
  lexicon: HALOT
  rationale: «Recorrió» transmite el desplazamiento extendido por el país con una fuerza administrativa y narrativa adecuada, sin sugerir solo un paso breve.
- source_word: בְּכָל אֶרֶץ מִצְרָיִם
  english_pob_choice: through all the land of Egypt
  chosen_spanish: toda la tierra de Egipto
  alternatives_spanish:
  - por toda la tierra de Egipto
  - en toda la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra de Egipto» es una equivalencia bíblica sólida para el territorio; el contexto de movimiento permite omitir la preposición explícita en favor de una construcción natural.
- source_word: וְ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: HALOT
  rationale: La partícula inicial introduce una nueva nota narrativa; «Ahora bien» mantiene continuidad y fluidez discursiva en español.
translation_notes:
  revision_awareness: El inglés POB usa una equivalencia óptima estable, sin notas textuales ni revisiones aplicadas. La versión española sigue esa misma línea, conservando el orden narrativo y el énfasis en la presentación ante Faraón y el desplazamiento por Egipto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Faraón» se usa de forma consistente como título propio sin añadir artículo innecesario.
  - «Tierra de Egipto» conserva el registro bíblico natural en español y evita un calco excesivo de «land».
