translation:
  language: es
  text: También todos los líderes de los sacerdotes y el pueblo aumentaron en infidelidad, conforme[a] a todas las abominaciones de las naciones, y contaminaron la casa de Yahvé[b], que él había consagrado en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como todas las abominaciones de las naciones' o 'siguiendo todas las prácticas detestables de las naciones'.
    reason: lexical_alternative
  - marker: b
    text: '''Yahvé'' representa el nombre divino YHWH.'
    reason: source_note
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Igualmente
  lexicon: HALOT
  rationale: Expresa continuidad e intensificación de manera natural en español, sin añadir énfasis no sustentado por el hebreo.
- source_word: כָּל שָׂרֵי הַכֹּהֲנִים וְהָעָם
  english_pob_choice: all the leaders of the priests and the people
  chosen_spanish: todos los líderes de los sacerdotes y el pueblo
  alternatives_spanish:
  - todos los jefes de los sacerdotes y el pueblo
  - todos los oficiales de los sacerdotes y el pueblo
  lexicon: HALOT
  rationale: שָׂרֵי indica líderes o jefes; se conserva la estructura posesiva del hebreo sin convertirla en un término técnico no presente en el texto.
- source_word: הִרְבּוּ
  english_pob_choice: increased
  chosen_spanish: aumentaron
  alternatives_spanish:
  - se multiplicaron
  - crecieron
  lexicon: HALOT
  rationale: En español, 'aumentaron' comunica el incremento del verbo intensivo sin sonar forzado, y mantiene la relación con el sustantivo intensivo siguiente.
- source_word: לִמְעָול מַעַל
  english_pob_choice: in unfaithfulness
  chosen_spanish: en infidelidad
  alternatives_spanish:
  - en deslealtad
  - en traición
  - cometiendo infidelidad
  lexicon: HALOT
  rationale: El hebreo expresa una falta de fidelidad con matiz de quebranto de pacto. 'Infidelidad' es la opción más clara y suficientemente fuerte en español para este contexto cultual.
- source_word: כְּכֹל תֹּעֲבוֹת הַגּוֹיִם
  english_pob_choice: according to all the abominations of the nations
  chosen_spanish: conforme a todas las abominaciones de las naciones
  alternatives_spanish:
  - según todas las abominaciones de las naciones
  - como todas las abominaciones de las naciones
  - de acuerdo con todas las abominaciones de las naciones
  lexicon: HALOT
  rationale: '''Conforme a'' conserva la idea de conformidad o patrón de conducta. ''Abominaciones'' retiene el peso moral-religioso de תֹּעֲבוֹת.'
- source_word: וַיְטַמְּאוּ
  english_pob_choice: they defiled
  chosen_spanish: contaminaron
  alternatives_spanish:
  - profanaron
  - mancharon
  - hicieron impura
  lexicon: HALOT
  rationale: En contexto del templo, el verbo expresa profanación ritual y moral. 'Contaminaron' funciona bien en español moderno para esa mezcla de impureza cultual y profanación, aunque 'profanaron' también sería posible.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahveh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión literal 'casa de' y el nombre divino según el estándar del proyecto. 'Casa' mantiene el hebraísmo del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el término doctrinal del proyecto para el Tetragrámaton. 'Yahvé' es la forma establecida en el español del POB, no la sustitución por título.
- source_word: אֲשֶׁר הִקְדִּישׁ בִּירוּשָׁלִָם
  english_pob_choice: which he had consecrated in Jerusalem
  chosen_spanish: que él había consagrado en Jerusalén
  alternatives_spanish:
  - que él había santificado en Jerusalén
  - que él había dedicado en Jerusalén
  - que él había hecho santo en Jerusalén
  lexicon: HALOT
  rationale: '''Consagrado'' comunica la dedicación cultual del lugar como objeto separado para Dios. ''Santificado'' es posible, pero ''consagrado'' suena más natural y específico en español eclesial.'
theological_decisions:
- issue: Cómo expresar מָעַל en un contexto de pacto y templo
  english_pob_reading: in unfaithfulness
  chosen_spanish_reading: en infidelidad
  alternative_spanish_readings:
  - en deslealtad
  - en traición
  - en quebranto de pacto
  rationale: El texto describe una ruptura de fidelidad religiosa y cultual, no solo una falta moral genérica. 'Infidelidad' conserva ese peso relacional sin volverlo excesivamente técnico.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El proyecto español usa 'Yahvé' para el Tetragrámaton y evita la sustitución por 'SEÑOR'. Esto preserva la visibilidad del nombre propio de Dios en el texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente (''increased in unfaithfulness'') pero la expresa en español con una construcción más natural: ''aumentaron en infidelidad''. También conserva la relación causal/conformativa del hebreo con ''conforme a''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Casa de Yahvé'' conserva el hebraísmo literal de בֵּית יְהוָה.'
  - '''Infidelidad'' traduce el campo semántico de מָעַל sin perder el matiz de quiebre de lealtad.'
