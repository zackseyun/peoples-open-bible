translation:
  language: es
  text: Bendito[a] serás en la ciudad, y bendito serás en el campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Bendito eres en la ciudad, y bendito eres en el campo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Afortunado
  - Favorecido
  lexicon: HALOT
  rationale: Es un participio pasivo/adjetival de ברך en un contexto de bendición pactual. «Bendito» conserva la fuerza declarativa y religiosa del original mejor que una idea de simple fortuna o favor general.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: serás
  alternatives_spanish:
  - eres
  - serás tú
  lexicon: HALOT
  rationale: El hebreo dirige la bendición a una segunda persona singular masculina. En español, la forma verbal «serás» permite mantener el sujeto implícito sin forzar una repetición innecesaria; el sentido singular queda claro por el contexto.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  - en la urbe
  lexicon: HALOT
  rationale: La preposición ב con עִיר indica localización. «En la ciudad» es la equivalencia más directa y natural, y conserva el contraste con el campo.
- source_word: וּבָרוּךְ
  english_pob_choice: and blessed
  chosen_spanish: y bendito
  alternatives_spanish:
  - y favorecido
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática del predicado hebreo con la conjunción coordinante. «Y bendito» evita suavizar la estructura paralela del verso.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la zona rural
  lexicon: HALOT
  rationale: שָׂדֶה se refiere al campo, el espacio agrícola o abierto. «En el campo» preserva el paralelismo concreto con «en la ciudad» y su contraste urbano/rural.
theological_decisions:
- issue: Certeza verbal implícita en una cláusula nominal de bendición
  english_pob_reading: Blessed shall you be in the city, and blessed shall you be in the field.
  chosen_spanish_reading: Bendito serás en la ciudad, y bendito serás en el campo.
  alternative_spanish_readings:
  - Bendito eres en la ciudad, y bendito eres en el campo.
  rationale: El hebreo es nominal y no lleva verbo explícito; sin embargo, el marco de Deuteronomio 28 comunica una bendición prometida. En español, «serás» transmite mejor esa fuerza prospectiva sin abandonar la estructura de bendición.
  doctrine_reference: 'Translation philosophy: optimal equivalence; conservar el valor promesivo y pactual del texto sin sobreparáfrasis.'
translation_notes:
  revision_awareness: El texto inglés auditado opta por una lectura promesiva con «shall you be» y ofrece como alternativa una lectura presente («are you»). El español principal sigue la lectura promesiva para reflejar el valor contextual del hebreo en Deuteronomio 28, mientras que la nota recoge la alternativa de cláusula nominal presente.
  spanish_consistency_notes:
  - Se mantuvo «bendito» para ברוך, en lugar de «favorecido», por ser la opción pactual más directa.
  - Se prefirió «ciudad» y «campo» para conservar el paralelismo urbano/rural del hebreo.
  - Se evitó «SEÑOR» u այլ sustituciones no pertinentes, ya que el versículo no contiene el nombre divino.
