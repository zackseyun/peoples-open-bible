review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: distingue entre animales domésticos y animales silvestres, mantiene «tu tierra» para בְּאַרְצְךָ, y comunica que todo el producto de la tierra está destinado como alimento. Sin embargo, la nota al pie no preserva correctamente la alternativa documentada en el inglés POB: repite la misma frase en vez de ofrecer una alternativa real equivalente a «todo su rendimiento será para alimento / para comer».'
  spanish_quality_summary: El español es claro y natural en general. «Ganado» y «animales salvajes» funcionan bien, aunque «animales silvestres» también sería posible. La frase principal es legible, pero «todo su producto será para comer» suena algo menos idiomática que «todo su producto será para alimento» o «todo su producto servirá de alimento». Dado que el inglés POB optó por una formulación más idiomática con nota de literalidad, conviene hacer lo mismo en español.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas clave están alineadas: בְּהֵמָה → «ganado», חַיָּה → «animales salvajes/silvestres», אֶרֶץ → «tierra». La corrección necesaria es principalmente en la nota y en la selección más idiomática para לֶאֱכֹל.'
  issues:
  - severity: medium
    issue: La nota al pie repite la misma redacción en vez de ofrecer una alternativa léxica real.
    rationale: El inglés POB documenta una alternativa distinta («all its yield shall be to eat» / «for eating»). La nota española actual dice dos veces «todo su producto será para comer», por lo que no cumple su función auditiva ni preserva la justificación lexical.
  - severity: low
    issue: «Será para comer» es comprensible pero algo menos natural que «será para alimento» en registro legal/instructivo.
    rationale: לֶאֱכֹל expresa finalidad/resultando en alimento. En español bíblico-legible, «para alimento» suena más natural y digno, mientras la alternativa más literal puede conservarse en nota.
  revised_spanish_text: Y para tu ganado[a], y para los animales salvajes que están en tu tierra, todo su producto será para alimento.
  revised_footnotes:
