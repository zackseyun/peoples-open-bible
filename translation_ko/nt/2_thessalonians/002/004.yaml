id: 2TH.2.4
reference: 2 Thessalonians 2:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ ἀντικείμενος καὶ ὑπεραιρόμενος ἐπὶ πάντα λεγόμενον θεὸν ἢ σέβασμα, ὥστε αὐτὸν εἰς τὸν ναὸν τοῦ ⸀θεοῦ καθίσαι ἀποδεικνύντα ἑαυτὸν ὅτι ἔστιν θεός.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/004.yaml
  text: the one who opposes and exalts himself over every so-called god or object of worship[a], so that he takes his seat in the temple of God[b], displaying himself as being God.
translation:
  language: ko
  text: 그는 모든 이른바 신이라 불리는 것이나 경배의 대상 위로 대적하며 자신을 높이는 자이며, 마침내 하나님의 성전에 자리를 잡고 자신을 하나님이라고 내세웁니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「자신이 신이라 내세우며」. 무관사 θεός는 정관사 없이 쓰여 「하나님」 또는 「신」으로 옮길 수 있으나, 하나님의 성전에 자리잡고 자신을 내세우는 신성모독적 정황은 「하나님」 의미를 강화한다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀντικείμενος
  english_pob_choice: the one who opposes
  chosen_korean: 대적하며
  alternatives_korean:
  - 적대하며
  - 반대하며
  lexicon: BDAG
  rationale: 현재 분사의 지속적 대적 의미를 보존한다.
- source_word: ὑπεραιρόμενος
  english_pob_choice: exalts himself over
  chosen_korean: 자신을 높이는
  alternatives_korean:
  - 자신을 들어 올리는
  - 자고하는
  lexicon: BDAG
  rationale: 자기-격상의 반사적 의미를 한국어로 자연스럽게 표현한다.
- source_word: ἐπὶ πάντα λεγόμενον θεὸν
  english_pob_choice: over every so-called god
  chosen_korean: 모든 이른바 신이라 불리는 것 위로
  alternatives_korean:
  - 신이라 일컬어지는 모든 것 위로
  - 신이라 칭하는 모든 것에 대하여
  lexicon: BDAG
  rationale: λεγόμενον의 「소위/이른바」 의미를 살려 그 신성을 긍정하지 않는 어조를 보존한다.
- source_word: σέβασμα
  english_pob_choice: object of worship
  chosen_korean: 경배의 대상
  alternatives_korean:
  - 숭배의 대상
  - 섬김의 대상
  lexicon: BDAG
  rationale: 종교적 경외의 대상을 가리키는 폭넓은 어휘를 「경배의 대상」으로 옮긴다.
- source_word: ὥστε ... καθίσαι
  english_pob_choice: so that he takes his seat
  chosen_korean: 마침내 ~ 자리를 잡고
  alternatives_korean:
  - 그래서 ~ 앉아
  - 결국 ~ 앉아
  lexicon: BDAG
  rationale: ὥστε + 부정사의 결과적 의미를 「마침내 ~하고」로 자연스럽게 표현한다. καθίζω의 의도적 즉위적 앉음을 「자리를 잡다」로 살린다.
- source_word: εἰς τὸν ναὸν τοῦ θεοῦ
  english_pob_choice: in the temple of God
  chosen_korean: 하나님의 성전에
  alternatives_korean:
  - 하나님의 거룩한 곳에
  - 하나님의 지성소에
  lexicon: BDAG
  rationale: ναός는 성전 본체/지성소를 가리키는 표준 어휘. 「성전」이 가장 자연스럽다.
- source_word: ἀποδεικνύντα ἑαυτὸν ὅτι ἔστιν θεός
  english_pob_choice: displaying himself as being God
  chosen_korean: 자신을 하나님이라고 내세웁니다
  alternatives_korean:
  - 자신이 하나님임을 내보입니다
  - 자신을 하나님으로 드러냅니다
  lexicon: BDAG
  rationale: ἀποδείκνυμι의 「공공연히 내보이다·내세우다」 의미를 「내세우다」로 자연스럽게 표현한다.
theological_decisions:
- issue: 무관사 θεός를 「하나님」 또는 「신」으로 옮길지
  chosen_reading: 하나님
  alternative_readings:
  - 신
  rationale: 하나님의 성전에 즉위하고 모든 신적 대상 위에 자신을 높이는 정황은 본문의 신성모독적 절정을 보여준다. 「하나님」으로 옮겨 이 무게를 보존하되, 「신」 가능성을 각주에 둔다. 본 번역은 이 인물의 실재가 신임을 단언하지 않으며, 그의 신성모독적 자임만을 표시한다.
  doctrine_reference: 'Preserve theological tension; original-language primacy'
- issue: ναός의 지시 대상(문자적 성전 / 비유적 거룩한 영역)
  chosen_reading: 「성전」으로 직역하여 해석을 좁히지 않음
  alternative_readings:
  - 문자적 예루살렘 성전
  - 비유적 거룩한 공동체
  rationale: 「성전」은 양 해석을 모두 허용한다. 좁히는 의역을 피한다.
  doctrine_reference: 'Preserve theological tension'
