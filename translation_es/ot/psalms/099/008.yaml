translation:
  language: es
  text: Oh Yahvé, nuestro Dios, tú les respondiste; fuiste para ellos un Dios que perdona[a], y aun así un vengador de sus hechos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un Dios que llevó [su pecado] por ellos»; el participio hebreo puede implicar perdonar al cargar o quitar la culpa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tomando venganza por sus acciones». El hebreo permite aquí un matiz nominal («un vengador») o uno más verbal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino transliterado, no con una sustitución titulada. 'Yahvé' preserva el nombre personal de Dios en español, en continuidad con la política de la POB en inglés.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: 'La forma constructa con sufijo de 1cp expresa posesión relacional: ''nuestro Dios''. En vocativo, el orden ''Oh Yahvé, nuestro Dios'' suena natural y fiel al hebreo.'
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  - vos
  lexicon: HALOT
  rationale: 'El pronombre explícito se conserva para mantener el énfasis del hebreo tras la invocación directa: ''tú les respondiste''.'
- source_word: עֲנִיתָם
  english_pob_choice: answered them
  chosen_spanish: les respondiste
  alternatives_spanish:
  - les contestaste
  - les diste respuesta
  lexicon: HALOT
  rationale: ענה aquí significa responder o contestar; en contexto de intercesión y oración, 'les respondiste' comunica con naturalidad la acción divina sin añadir matices ajenos.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios poderoso
  - Mighty God
  lexicon: HALOT
  rationale: Como predicado nominal, אֵל se entiende naturalmente como 'Dios'. No se introduce una intensificación como 'poderoso' porque el hebreo inmediato no la exige.
- source_word: נֹשֵׂא
  english_pob_choice: forgiving
  chosen_spanish: que perdona
  alternatives_spanish:
  - que lleva lejos la culpa
  - que borra
  - perdonador
  lexicon: HALOT
  rationale: El participio de נשׂא puede expresar 'levantar/llevar', y en contextos de culpa el sentido idiomático es el de perdonar o cargar/quitar la culpa. En español, 'que perdona' conserva la idea principal y evita una explicación demasiado pesada en el texto principal.
- source_word: הָיִיתָ לָהֶם
  english_pob_choice: you were ... to them
  chosen_spanish: fuiste ... para ellos
  alternatives_spanish:
  - estuviste ... para ellos
  - te mostraste ... para ellos
  lexicon: HALOT
  rationale: La construcción היה + ל marca una relación o condición en favor de alguien. 'Fuiste ... para ellos' preserva esa relación sin forzar una perífrasis más interpretativa.
- source_word: וְנֹקֵם
  english_pob_choice: yet an avenger
  chosen_spanish: y aun así un vengador
  alternatives_spanish:
  - y un vengador
  - pero un vengador
  - y tomando venganza
  lexicon: HALOT
  rationale: 'El participio נקם se mantiene como sustantivo de agente: ''un vengador''. Se añadió ''aun así'' para reflejar la tensión adversativa que el inglés de la POB también preserva con ''yet''.'
- source_word: עַל
  english_pob_choice: of
  chosen_spanish: de
  alternatives_spanish:
  - contra
  - sobre
  lexicon: HALOT
  rationale: 'Aunque el hebreo dice literalmente ''sobre/contra'', en español la relación natural con ''vengador'' suele expresarse con ''de'': ''vengador de sus hechos''.'
- source_word: עֲלִילוֹתָם
  english_pob_choice: their deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus acciones
  - sus obras
  - sus malas acciones
  lexicon: HALOT
  rationale: עֲלִילוֹת puede abarcar obras o hechos. 'Hechos' mantiene esa amplitud sin añadir explícitamente una calificación negativa que el sustantivo por sí solo no exige.
theological_decisions:
- issue: Perdón divino junto con venganza/justicia retributiva
  english_pob_reading: The verse is rendered to preserve both God's forgiving character and his just punishment of wrongdoing without resolving the tension.
  chosen_spanish_reading: El versículo conserva tanto el perdón de Dios como su condición de vengador, sin suavizar la tensión entre misericordia y juicio.
  alternative_spanish_readings:
  - Dios los perdonó por completo y castigó solo a otros
  - Dios se vengó directamente de ellos en vez de sus hechos
  rationale: El hebreo pone en paralelo una acción de respuesta perdonadora y una descripción retributiva. La traducción española mantiene ambas afirmaciones tal como están, sin armonizarlas de manera artificial.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el control más reciente indicó que no había cambios necesarios y que hubo alto acuerdo en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - Se preservó la tensión entre perdón y venganza/justicia sin resolverla.
  - '''Hechos'' traduce la amplitud de עֲלִילוֹת sin introducir una condena más fuerte que la del hebreo.'
  - El orden y la puntuación buscan una lectura litúrgica clara en español sin depender de fórmulas eclesiásticas tradicionales.
