translation:
  language: es
  text: Yo mismo le serviré de garante. De mi mano podrás pedírmelo. Si no lo traigo a ti y lo pongo delante de ti, cargaré con la culpa ante ti[a] todos mis días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «habré pecado contra ti todos mis días».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָֽנֹכִי
  english_pob_choice: I myself
  chosen_spanish: Yo mismo
  alternatives_spanish:
  - Yo
  - Solo yo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático; 'Yo mismo' conserva la responsabilidad personal de Judá mejor que un simple 'yo'.
- source_word: אֶֽעֶרְבֶ֔נוּ
  english_pob_choice: will guarantee him
  chosen_spanish: le serviré de garante
  alternatives_spanish:
  - responderé por él
  - seré su fiador
  - garantizaré por él
  lexicon: HALOT
  rationale: El verbo ערב expresa asumir responsabilidad/fiarse por otro. 'Serviré de garante' comunica bien la idea legal de fiador sin perder naturalidad en español.
- source_word: מִיָּדִי
  english_pob_choice: From my hand
  chosen_spanish: De mi mano
  alternatives_spanish:
  - De mi propia mano
  - De mí
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de responsabilidad/entrega. 'De mi mano' refleja el giro idiomático hebreo sin sobreexplicar.
- source_word: תְּבַקְשֶׁנּוּ
  english_pob_choice: you may require him
  chosen_spanish: lo reclamarás
  alternatives_spanish:
  - lo exigirás de mí
  - podrás pedírmelo
  - me lo pedirás
  lexicon: HALOT
  rationale: Aquí בקש tiene valor de exigir/solicitar rendición de cuentas. 'Lo reclamarás' mantiene el sentido jurídico-relacional y suena natural en español.
- source_word: הֲבִיאֹתִיו
  english_pob_choice: bring him
  chosen_spanish: lo traigo
  alternatives_spanish:
  - lo traeré de vuelta
  - lo llevo
  lexicon: HALOT
  rationale: El hifil de בוא es 'traer'. En español, el futuro perifrástico 'lo traigo' dentro de la condición expresa adecuadamente la obligación planteada.
- source_word: וְהִצַּגְתִּיו לְפָנֶיךָ
  english_pob_choice: and set him before you
  chosen_spanish: lo pongo delante de ti
  alternatives_spanish:
  - lo presento delante de ti
  - lo coloco ante ti
  lexicon: HALOT
  rationale: יצג en hifil significa poner/colocar/presentar. 'Lo pongo delante de ti' es claro y conserva la escena concreta.
- source_word: וְחָטָאתִי לְךָ
  english_pob_choice: then I will bear the blame to you all my days
  chosen_spanish: habré cometido culpa contra ti[a]
  alternatives_spanish:
  - habré pecado contra ti[a]
  - quedaré culpable ante ti[a]
  - seré culpable para ti[a]
  lexicon: HALOT
  rationale: חטא puede significar 'pecar', pero en este compromiso interpersonal funciona como incurrir en culpa o responsabilidad. 'Haber cometido culpa contra ti' preserva la tensión moral sin forzar una formulación doctrinal ajena al contexto.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all my days
  chosen_spanish: todos mis días
  alternatives_spanish:
  - todos los días de mi vida
  - para siempre
  lexicon: HALOT
  rationale: La expresión hebrea indica duración vitalicia. 'Todos mis días' es fiel y natural en español.
theological_decisions:
- issue: Valor de וְחָטָאתִי לְךָ en un contexto interpersonal no cultual
  english_pob_reading: then I will bear the blame to you all my days
  chosen_spanish_reading: habré cometido culpa contra ti
  alternative_spanish_readings:
  - habré pecado contra ti
  - quedaré culpable ante ti
  rationale: Se preserva la fuerza de culpa/pecado sin convertirla en una abstracción doctrinal. En este voto de Judá, la frase expresa responsabilidad personal ante su padre, no un tratamiento teológico sistemático del pecado.
  doctrine_reference: Mantener la tensión léxica entre 'pecar' y 'ser culpable' según el contexto narrativo; cf. uso relacional de חטא en promesas de responsabilidad.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail, que estrechó la última cláusula hacia la relación explícita con לְךָ. Por ello se optó por 'contra ti' en el cuerpo y se dejó en nota la alternativa más literal con 'pecado'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque aquí no aparece el nombre divino.
  - Se evitó 'siervo' para ערב porque el contexto es jurídico y de garantía, no de servicio general.
  - Se usó un registro sobrio y bíblico, pero no arcaizante, para conservar legibilidad en español latinoamericano.
