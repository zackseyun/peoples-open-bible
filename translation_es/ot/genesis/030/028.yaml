translation:
  language: es
  text: 'Entonces dijo: «Fija tu salario, y te lo daré».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Especifica tu paga, y te la daré».
    reason: alternativa_lexica
lexical_decisions:
- source_word: וַיֹּאמַר
  english_pob_choice: Then he said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  - Luego dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces dijo» conserva esa secuencia en un español natural y digno.
- source_word: נָקְבָה
  english_pob_choice: Name
  chosen_spanish: Nombra
  alternatives_spanish:
  - Especifica
  - Señala
  - Di con claridad
  lexicon: HALOT
  rationale: En este contexto, נָקַב/נָקְבָה tiene el sentido de designar explícitamente. «Nombra» mantiene la idea de fijar verbalmente una cantidad o condición, como en «nombra tu precio».
- source_word: שְׂכָרְךָ
  english_pob_choice: your wages
  chosen_spanish: tu salario
  alternatives_spanish:
  - tu paga
  - tu jornal
  - tu retribución
  lexicon: HALOT
  rationale: שָׂכָר denota compensación por trabajo. «Salario» comunica bien el valor laboral del término en español moderno; «paga» o «jornal» son posibles pero menos neutros.
- source_word: וְאֶתֵּנָה
  english_pob_choice: and I will give it
  chosen_spanish: y yo lo daré
  alternatives_spanish:
  - y te lo daré
  - y lo pagaré
  - y yo daré
  lexicon: HALOT
  rationale: El verbo נתן significa «dar». Se conserva el futuro con sujeto explícito «yo» para claridad. El objeto singular se refleja con «lo» de acuerdo con el sentido singular de שָׂכָר.
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del POB inglés, que eliminó el complemento añadido «to me» y corrigió el referente a singular («it»). Por eso el español evita introducir un complemento dativo no presente y mantiene el objeto singular implícito en «lo».

    '
  spanish_consistency_notes:
  - Se mantiene un tono bíblico contemporáneo, sin arcaísmos innecesarios.
  - «Salario» se usa aquí por claridad contextual; no pretende normalizar todos los casos de שָׂכָר en la obra.
  - No se añade un destinatario explícito equivalente a «to me», porque el hebreo no lo expresa en esta forma final auditada.
