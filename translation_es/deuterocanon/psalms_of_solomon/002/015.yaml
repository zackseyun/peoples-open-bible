translation:
  language: es
  text: Porque ellas mismas contaminaron lo que era puro[a] en la inmundicia de una mezcla ilícita[b]. Mi vientre y mis entrañas me duelen por estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cosas santas' para 'lo que era puro'.
    reason: lexical_alternative
  - marker: b
    text: La revisión textual favorece aquí 'inmundicia' (ῥύπῳ, 'mugre/inmundicia') y no la lectura previa 'calle'; la expresión 'mezcla' probablemente tiene aquí una carga moral, quizá sexual.
    reason: textual_note
lexical_decisions:
- source_word: ἀνθ' ὧν
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues que
  - Ya que
  lexicon: BDAG
  rationale: Introduce en español la causa del lamento de manera natural y directa, conservando la relación causal sin añadir énfasis lógico excesivo.
- source_word: αὐταὶ
  english_pob_choice: they themselves
  chosen_spanish: ellas mismas
  alternatives_spanish:
  - ellas
  - esas mujeres mismas
  lexicon: BDAG
  rationale: El pronombre es enfático y femenino; 'ellas mismas' preserva esa fuerza sin introducir un sustantivo inexistente en el verso.
- source_word: ἐμίαυσαν
  english_pob_choice: defiled
  chosen_spanish: profanaron
  alternatives_spanish:
  - contaminaron
  - mancharon
  lexicon: BDAG
  rationale: '''Profanaron'' comunica contaminación moral/ritual en un registro solemne y funciona bien con ''lo que era puro''.'
- source_word: ἁγνὰ
  english_pob_choice: what was pure
  chosen_spanish: lo que era puro
  alternatives_spanish:
  - cosas puras
  - lo santo
  lexicon: LSJ
  rationale: La revisión inglesa entiende el neutro plural como una expresión más natural; en español 'lo que era puro' conserva la referencia amplia sin forzar 'cosas'.
- source_word: ἐν ῥύμῳ
  english_pob_choice: in the filth
  chosen_spanish: en la inmundicia
  alternatives_spanish:
  - en la suciedad
  - en la basura
  lexicon: LSJ
  rationale: La evidencia revisada favorece ῥύπῳ ('filth'). 'Inmundicia' mantiene el campo semántico de contaminación y suena digno en español bíblico.
- source_word: ἀναμίξεως
  english_pob_choice: illicit mingling
  chosen_spanish: de una mezcla ilícita
  alternatives_spanish:
  - de una mezcla impura
  - de una mezcla prohibida
  - de un mezclarse ilícito
  lexicon: LSJ
  rationale: Conserva la imagen de mezcla y su carga moral sin sexualizar de modo innecesario; 'ilícita' preserva el juicio ético documentado por el audit trail.
- source_word: τὴν κοιλίαν μου
  english_pob_choice: My belly
  chosen_spanish: Mi vientre
  alternatives_spanish:
  - Mi barriga
  - Mi estómago
  lexicon: BDAG
  rationale: '''Vientre'' es un equivalente corporal directo, grave y más idiomático que ''barriga''; mantiene el peso visceral del lamento.'
- source_word: τὰ σπλάγχνα μου
  english_pob_choice: my inward parts
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mis entrañas internas
  - mi interior
  - mis afectos
  lexicon: BDAG
  rationale: '''Entrañas'' preserva la imaginería corporal y afectiva del griego sin suavizarla hacia ''corazón'' o ''interior''.'
- source_word: πονῶ
  english_pob_choice: ache
  chosen_spanish: me duelen
  alternatives_spanish:
  - sufro dolor
  - adolécenme
  lexicon: BDAG
  rationale: En español, 'me duelen' expresa dolor físico y afectivo de modo natural, cercano al valor de una pena visceral presente.
- source_word: ἐπὶ τούτοις
  english_pob_choice: over these things
  chosen_spanish: por estas cosas
  alternatives_spanish:
  - a causa de estas cosas
  - sobre estas cosas
  lexicon: BDAG
  rationale: '''Por estas cosas'' transmite la causalidad emocional del lamento de forma más fluida en español que una calca como ''sobre estas cosas''.'
theological_decisions:
- issue: Valor moral/ritual de ἐμίαυσαν + ἁγνὰ
  english_pob_reading: They defiled what was pure.
  chosen_spanish_reading: Ellas profanaron lo que era puro.
  alternative_spanish_readings:
  - Ellas contaminaron lo que era puro
  - Ellas mancharon lo puro
  rationale: La combinación apunta a profanación/contaminación moral o ritual. 'Profanaron' conserva esa tensión sin reducirla a mera suciedad física.
  doctrine_reference: Pureza/contaminación ritual y moral en lenguaje bíblico
- issue: ῥύμῳ / ῥύπῳ textual tension
  english_pob_reading: in the filth
  chosen_spanish_reading: en la inmundicia
  alternative_spanish_readings:
  - en la suciedad
  - en la mugre
  rationale: El estado revisado del texto favorece 'filth' más que 'street'. La elección española debe reflejar la corrección textual y no perpetuar la lectura anterior.
  doctrine_reference: Crítica textual y fidelidad al testimonio revisado
- issue: Naturaleza del dolor en κοιλία / σπλάγχνα
  english_pob_reading: My belly and my inward parts ache.
  chosen_spanish_reading: Mi vientre y mis entrañas me duelen.
  alternative_spanish_readings:
  - Mi interior y mis entrañas me duelen
  - Me duele el vientre y el interior
  rationale: Se mantiene el lenguaje corporal fuerte del lamento, evitando espiritualizarlo demasiado; el dolor es visceral y afectivo a la vez.
  doctrine_reference: Antropología bíblica del sufrimiento visceral
translation_notes:
  revision_awareness: 'El audit trail inglés pasó de una lectura espacial (''in a street'') a una corrección textual basada en ῥύπῳ (''in the filth'') y además afinó ''pure things'' a ''what was pure''. La versión española sigue esa revisión: evita la lectura de ''calle'', traduce la contaminación como ''inmundicia'' y mantiene el neutro plural con ''lo que era puro''.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y digno, evitando arcaísmos innecesarios.
  - '''Inmundicia'' y ''profanaron'' conservan la gravedad moral del pasaje.'
  - '''Vientre''/''entrañas'' respeta la imaginería corporal del original sin sustituirla por un lenguaje más abstracto.'
  - La puntuación y el orden español buscan fluidez natural sin borrar la paralelidad del griego.
