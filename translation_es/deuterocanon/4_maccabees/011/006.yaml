lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: La partícula adversativa introduce contraste inmediato; «Pero» es natural en español y conserva el giro directo del griego sin sobrerreformulación.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - tales cosas
  lexicon: BDAG
  rationale: El demostrativo neutro plural se mantiene con un plural amplio en español. «Estas cosas» preserva la referencia abierta del griego.
- source_word: ὑμῶν
  english_pob_choice: from you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de vosotros
  - de ustedes mismos
  - provenientes de ustedes
  lexicon: BDAG
  rationale: El genitivo se entiende con valor relacional/origen en contexto. «De ustedes» refleja de forma natural la procedencia o pertenencia implícita sin forzar un calco como «de ustedes» en sentido posesivo rígido.
- source_word: βασάνων
  english_pob_choice: tortures
  chosen_spanish: torturas
  alternatives_spanish:
  - tormentos
  - penas
  - suplicios
  lexicon: BDAG
  rationale: En este contexto martirial, βάσανος alude a tortura física. «Torturas» conserva la fuerza concreta del término y el plural del griego.
- source_word: ἄξια
  english_pob_choice: worthy of
  chosen_spanish: dignas de
  alternatives_spanish:
  - merecedoras de
  - aptas para
  - aptas a
  lexicon: BDAG
  rationale: ἄξια con genitivo expresa valor o merecimiento. «Dignas de» es la forma española más natural y fiel al sentido relacional del griego.
theological_decisions:
- issue: Relación del genitivo ὑμῶν con la frase entera
  english_pob_reading: '"from you" reflects the likely sense of ὑμῶν in context.'
  chosen_spanish_reading: «de ustedes» expresa el mismo valor de procedencia o relación contextual.
  alternative_spanish_readings:
  - «de ustedes» como posesivo literal
  - «provenientes de ustedes»
  - «de parte de ustedes»
  rationale: No hay una tensión doctrinal, sino una decisión sintáctica. El contexto sugiere que el hablante considera que tales hechos, viniendo de los destinatarios, no merecen las torturas. La formulación española evita el calco duro y conserva la ambigüedad útil del original.
  doctrine_reference: No aplica; decisión sintáctico-lexical.
