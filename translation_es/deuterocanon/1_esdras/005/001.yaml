revisions:
- from: Después de estas cosas[a], fueron escogidos los cabezas de las casas paternas, conforme a sus tribus, con sus mujeres, sus hijos y sus hijas, sus esclavos varones y sus esclavas, y su ganado.
  to: Después de estas cosas, fueron escogidos para subir los jefes de las casas paternas, conforme a sus tribus, junto con sus esposas, sus hijos y sus hijas, sus siervos y sus siervas[a], y su ganado.
  rationale: Se corrigió la omisión de ἀναβῆναι incorporando 'para subir' al texto principal. Se reemplazó 'los cabezas' por 'los jefes' para mejorar la naturalidad del español sin perder el sentido de ἀρχηγοί. Se ajustó 'sus mujeres' a 'sus esposas' para reflejar con precisión αἱ γυναῖκες en este contexto doméstico. Finalmente, se cambió 'esclavos varones y esclavas' por 'siervos y siervas', con nota alternativa, para alinearse con la cautela léxica documentada en la auditoría inglesa respecto de παῖδες / παιδίσκαι.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:40:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: transición temporal, elección de los jefes, organización por tribus, y la lista de esposas, hijos, hijas, siervos/siervas y ganado. Sin embargo, omite en el texto principal el infinitivo ἀναβῆναι (''subir''), relegándolo impropiamente a una nota; además, ''sus mujeres'' no sigue la decisión auditada de ''their wives'' y en español introduce ambigüedad innecesaria. También ''los cabezas'' es poco natural para ἀρχηγοὶ.'
  spanish_quality_summary: 'El español es generalmente claro, pero hay dos problemas de legibilidad importantes: ''los cabezas de las casas paternas'' suena antinatural; ''los jefes de las casas paternas'' o ''los jefes de las casas ancestrales'' sería mejor. Además, la nota [a] explica una omisión que debe estar en el texto, no en nota. El resto de la lista fluye bien; ''ganado'' es natural y adecuado.'
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. En lo léxico, el borrador se aparta de la racionalización POB en dos puntos: convierte ''their wives'' en ''sus mujeres'' pese a que el contexto doméstico favorece ''sus esposas'', y endurece ''male servants/female servants'' a ''esclavos/esclavas'' cuando la auditoría inglesa prefirió una formulación que no sobreafirmara el estatus legal. En español, ''siervos/siervas'' o ''sirvientes/sirvientas'' reflejan mejor esa cautela; ''siervos y siervas'' mantiene dignidad y simetría.'
  issues:
  - severity: high
    issue: Falta 'subir' en el texto principal
    rationale: 'El griego incluye explícitamente ἀναβῆναι. No debe trasladarse solo a una nota, porque forma parte de la proposición principal: fueron escogidos para subir.'
  - severity: medium
    issue: '''los cabezas'' es español poco natural'
    rationale: Aunque intenta reflejar ἀρχηγοί, en español bíblico legible 'los jefes' o 'los jefes de familia' suena mucho mejor sin perder sentido.
  - severity: medium
    issue: '''sus mujeres'' es ambiguo donde el griego significa ''sus esposas'''
    rationale: La auditoría inglesa documenta que αἱ γυναῖκες αὐτῶν aquí significa 'wives'. En español, 'mujeres' puede sonar genérico o coloquial y debilita la precisión familiar del listado.
  - severity: medium
    issue: '''esclavos varones y esclavas'' sobreafirma el estatus frente a la decisión auditada'
    rationale: El inglés POB eligió 'male servants'/'female servants' precisamente para no fijar más de lo que el verso garantiza. El español debería conservar esa cautela léxica.
