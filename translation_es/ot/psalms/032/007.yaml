translation:
  language: es
  text: Tú eres un escondite para mí[a]; de la angustia me preservas; me rodeas con gritos de liberación. Selah[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'refugio' o 'lugar secreto'.
    reason: lexical_alternative
  - marker: b
    text: '''Selah'' probablemente es una notación musical o litúrgica; su significado preciso es incierto.'
    reason: cultural_note
lexical_decisions:
- source_word: סֵתֶר
  english_pob_choice: hiding place
  chosen_spanish: refugio
  alternatives_spanish:
  - lugar de ocultamiento
  - escondite
  - amparo
  lexicon: HALOT
  rationale: El sustantivo denota un lugar de ocultamiento y protección. En español, 'refugio' comunica con naturalidad esa idea de amparo seguro, manteniendo la metáfora sin sonar forzado. No se eligió 'escondite' por su matiz más infantil o casual, ni 'lugar de ocultamiento' por resultar más pesado que el hebreo poético.
- source_word: מִצַּר
  english_pob_choice: from distress
  chosen_spanish: de la angustia
  alternatives_spanish:
  - de la aflicción
  - de la tribulación
  - de la estrechez
  lexicon: HALOT
  rationale: צַר puede abarcar estrechez, angustia o dificultad. Aquí se prioriza el sentido de apuro o aflicción humana sin concretarlo como enemigo personal. 'De la angustia' es natural en español bíblico contemporáneo y conserva la fuerza existencial del contexto.
- source_word: תִּצְּרֵנִי
  english_pob_choice: you preserve me
  chosen_spanish: me preservas
  alternatives_spanish:
  - me guardas
  - me cuidas
  - me conservas
  lexicon: HALOT
  rationale: Desde נצר, el verbo expresa guardar, preservar o proteger. 'Me preservas' reproduce bien el valor de mantenimiento/protección y enlaza con la imagen de refugio. 'Guardar' sería posible, pero en español puede sonar más estrecho o repetitivo frente a 'refugio'.
- source_word: רָנֵּי פַלֵּט
  english_pob_choice: shouts of deliverance
  chosen_spanish: gritos de liberación
  alternatives_spanish:
  - cantos de liberación
  - clamores de rescate
  - voces de liberación
  lexicon: HALOT
  rationale: La construcción compacta puede entenderse como gritos, cantos o clamores vinculados con rescate/liberación. Se eligió 'gritos' para conservar el dinamismo audible del hebreo, y 'liberación' para reflejar de manera amplia פלט como rescate o escape, sin imponer una terminología más doctrinal que la del texto.
- source_word: תְּסוֹבְבֵנִי
  english_pob_choice: you surround me
  chosen_spanish: me rodeas
  alternatives_spanish:
  - me envuelves
  - me cercas
  - me circundas
  lexicon: HALOT
  rationale: סבב significa rodear o encerrar. 'Me rodeas' es claro, idiomático y suficiente para conservar la imagen de protección envolvente. 'Circundas' sería más literal pero menos natural en español moderno.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se conserva la transliteración porque el sentido exacto sigue siendo incierto. No se impone una explicación interpretativa dentro del texto principal.
theological_decisions:
- issue: Naturaleza de los 'gritos de liberación' que rodean al salmista
  english_pob_reading: The phrase is rendered as protective, joyful cries that surround the psalmist.
  chosen_spanish_reading: La frase se entiende como gritos protectores y jubilosos que rodean al salmista.
  alternative_spanish_readings:
  - cantos de victoria
  - cantos sobre la liberación
  - clamores de rescate
  rationale: 'La expresión hebrea רָנֵּי פַלֵּט es breve y poéticamente ambigua. La traducción elegida conserva esa apertura: no especifica si los gritos provienen de Dios, de adoradores o del propio salmista. ''Gritos de liberación'' mantiene el tono vivo del hebreo sin resolver indebidamente la tensión poética.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión final del inglés POB: el versículo termina sin punto después de Selah. En español se mantiene también sin punto final, con puntuación interna correspondiente a estilo bíblico formal.'
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino, por lo que no se introduce.
  - '''Liberación'' se eligió como equivalente amplio de פלט, evitando estrecharlo a un solo matiz teológico o militar.'
  - Se mantuvo 'Selah' sin traducir por la incertidumbre semántica y por consistencia con el tratamiento POB.
  - El verso conserva un registro poético y formal, apto para lectura pública en castellano latinoamericano.
