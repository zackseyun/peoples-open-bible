  glossary_alignment: 'No hay conflictos con los términos troncales del proyecto (Yahvé, Mesías, etc.). La principal cuestión terminológica es סֻכַּת דָּוִיד: conviene seguir la lógica documentada del POB con ''refugio de David'' y conservar ''tienda''/''tabernáculo'' solo como alternativas en nota, sin introducir ''tienda de reunión'', que sería una categoría distinta.'
