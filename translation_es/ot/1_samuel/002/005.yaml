revisions:
- from: Los que estaban saciados se han alquilado por pan[a], pero los que tenían hambre han cesado. Aun la mujer estéril ha dado a luz siete[b], pero la que tenía muchos hijos ha languidecido.
  to: Los que estaban saciados se han vendido por pan[a], pero los que tenían hambre han cesado. Aun la mujer estéril ha dado a luz siete[b], pero la que tenía muchos hijos varones[c] ha languidecido.
  rationale: Reemplacé «se han alquilado» por «se han vendido» para expresar de manera más natural en español la idea de haberse entregado a trabajo dependiente por pan dentro del paralelismo de reversión social. También ajusté «muchos hijos» a «muchos hijos varones» para preservar la decisión documentada de mantener el masculino específico de בָּנִים. Añadí la nota correspondiente sobre «hijos/varones» y mantuve «han cesado» con nota explicativa, así como «siete» con su tensión literal/simbólica.
