translation:
  language: es
  text: 'Y cuando les digan: “Consulten a los médiums[a] y a los espiritistas, que chillan y murmuran[b]”, ¿no debe un pueblo consultar a su Dios? ¿Debe consultar a los muertos en favor de los vivos?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los fantasmas” o “los que tienen espíritus familiares” para “los médiums”. El término hebreo אֹבוֹת se traduce tradicionalmente con terminología ocultista más antigua, pero aquí probablemente se refiere a practicantes de necromancia y no a los espíritus mismos.
    reason: lexical_alternative
  - marker: b
    text: O “que pían y murmuran”. El hebreo imita sonidos extraños, como de ave y en voz baja, asociados con la consulta a espíritus.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי יֹאמְרוּ אֲלֵיכֶם
  english_pob_choice: And when they say to you
  chosen_spanish: Y cuando les digan
  alternatives_spanish:
  - Y si les dicen
  - Porque cuando les digan
  lexicon: HALOT
  rationale: El hebreo introduce una situación esperada o contingente; en español, ‘y cuando’ conserva ese valor discursivo de manera natural sin forzar una condicionalidad más fuerte de la que el contexto requiere.
- source_word: דִּרְשׁוּ
  english_pob_choice: Consult
  chosen_spanish: Consulten
  alternatives_spanish:
  - Busquen
  - Inquieran de
  lexicon: HALOT
  rationale: En este contexto de consulta adivinatoria, ‘consultar’ comunica bien la idea de acudir a una fuente para recibir guía. Mantiene la cohesión con la pregunta posterior sobre consultar a Dios.
- source_word: הָאֹבוֹת
  english_pob_choice: the mediums
  chosen_spanish: los médiums
  alternatives_spanish:
  - los fantasmas
  - los necromantes
  - los que tienen espíritus familiares
  lexicon: HALOT
  rationale: El término designa practicantes de necromancia, no a los espíritus mismos. ‘Médiums’ es claro para el lector moderno y conserva la referencia a mediadores ocultistas, aunque con una resonancia algo más amplia que el hebreo.
- source_word: הַיִּדְּעֹנִים
  english_pob_choice: the spiritists
  chosen_spanish: los espiritistas
  alternatives_spanish:
  - los adivinos
  - los hechiceros
  - los que tienen espíritus familiares
  lexicon: HALOT
  rationale: ‘Espiritistas’ reproduce la clase de practicantes vinculados con consulta a espíritus y empareja con ‘médiums’ de forma natural en español. Se evita ‘hechiceros’, que introduciría una connotación distinta.
- source_word: הַמְצַפְצְפִים
  english_pob_choice: who chirp
  chosen_spanish: que chirrían
  alternatives_spanish:
  - que pían
  - que gorjean
  - que silban
  lexicon: HALOT
  rationale: El participio imita sonidos agudos, casi de ave; ‘chirriar’ conserva la sensación acústica áspera y extraña, cercana al efecto que el inglés POB expresa con ‘chirp’.
- source_word: וְהַמַּהְגִּים
  english_pob_choice: and mutter
  chosen_spanish: y murmuran
  alternatives_spanish:
  - y mascullan
  - y balbucean
  - y mugen
  lexicon: HALOT
  rationale: ‘Murmurar’ expresa un hablar bajo e indistinto y corresponde bien al paralelismo con ‘chirrían’. ‘Murmuran’ es más natural en español bíblico moderno que ‘muten’ o calcos menos idiomáticos.
- source_word: הֲלוֹא עַם אֶל אֱלֹהָיו יִדְרֹשׁ
  english_pob_choice: should not a people consult its God?
  chosen_spanish: ¿no debe un pueblo consultar a su Dios?
  alternatives_spanish:
  - ¿acaso un pueblo no debe consultar a su Dios?
  - ¿no debe un pueblo inquirir de su Dios?
  lexicon: HALOT
  rationale: La pregunta retórica conserva el reproche del hebreo. ‘Consultar a su Dios’ mantiene la repetición léxica con ‘consulten’ y refleja el singular posesivo de אֱלֹהָיו aplicado al colectivo ‘un pueblo’.
- source_word: בְּעַד הַחַיִּים
  english_pob_choice: on behalf of the living
  chosen_spanish: en favor de los vivos
  alternatives_spanish:
  - por los vivos
  - para los vivos
  - en beneficio de los vivos
  lexicon: HALOT
  rationale: ‘בְּעַד’ puede expresar representación o beneficio. ‘En favor de’ comunica esa relación sin sonar forzado y conserva el contraste entre la consulta dirigida a los muertos y el interés por los vivos.
- source_word: אֶל הַמֵּתִים
  english_pob_choice: consult the dead
  chosen_spanish: consultar a los muertos
  alternatives_spanish:
  - inquirir de los muertos
  - ir a los muertos
  lexicon: HALOT
  rationale: La preposición y el objeto dependen del verbo anterior; en español conviene completarlo explícitamente como ‘consultar a los muertos’. Así se preserva el contraste semántico con ‘consultar a su Dios’.
theological_decisions:
- issue: Contraste entre consultar a Dios y consultar a los muertos
  english_pob_reading: The verse condemns seeking guidance from necromantic practitioners instead of from God, without elaborating a broader doctrine of the dead beyond the immediate polemic.
  chosen_spanish_reading: El versículo reprende la búsqueda de guía por medio de prácticas necrománticas en vez de acudir a Dios, sin desarrollar una doctrina más amplia sobre el estado de los muertos.
  alternative_spanish_readings:
  - El versículo solo ridiculiza la irracionalidad de consultar a los muertos.
  - El versículo implica que los muertos no pueden responder, y por eso la práctica es absurda.
  rationale: 'El hebreo presenta una reprensión retórica centrada en la fuente correcta de guía: el pueblo debe consultar a su Dios, no a los muertos. La traducción conserva esa oposición sin añadir conclusiones doctrinales no explicitadas por el texto.'
  doctrine_reference: Isaías 8:19; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El texto sigue de cerca el español de trabajo derivado del POB en inglés, pero ajusta el registro a un español bíblico moderno y transparente. Se conservó la estructura retórica del versículo y se mantuvo la repetición de ‘consultar’ para reflejar el paralelismo del hebreo y la decisión auditada del inglés.
  spanish_consistency_notes:
  - Se usa ‘Dios’ para אֱלֹהָיו, manteniendo el singular posesivo aplicado a ‘un pueblo’.
  - Se evita ‘SEÑOR’ o sustitutos velados para el nombre divino porque este versículo usa אֱלֹהָיו, no el tetragrámaton.
  - ‘Muertos’ se conserva como sustantivo literal para el contraste con ‘vivos’.
  - El par ‘médiums / espiritistas’ busca equivaler la dupla inglesa ‘mediums / spiritists’ sin introducir terminología eclesial tradicional ajena al contexto.
