theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Supplying an implicit verbal sense for the Hebrew phrase וּבִרְכַּת יְהֹוָה בִּשְׂפָתָיו
  chosen_reading: to give the blessing of the LORD with his lips
  alternative_readings:
  - and the blessing of the LORD was on his lips
  - and he blessed with his lips
  rationale: The Hebrew as preserved is compressed and lacks an explicit finite verb in this clause. The Greek parallel provides a coherent purposive infinitive construction, which likely reflects the intended sense. This is a translational supplementation grounded in the parallel source, not a doctrinal expansion.
