  text: '# Source page p0185 (printed 157)

    ܕܚܒܠܐ ܕܐܢܫܝܢ. ܘܐܦܢ

    ܝܬܡܠܠ ܫܡܗ ܒܒܘܝܐܐ

    ܐܢܬܘܢ ܐܬܦܪܫܬܘܢ ܡܢ

    ܨܒܘܬ ܘܐܬܚܠܛ

    ܐܬܦܪܫܬܘܢ ܐܦ ܐܢܬܘܢ

    ܐܚܝ̈ܕܐ ܡܢ ܐܠܝ̈ܨܐ.

    ܘܚܕܝܘ ܡܘܠܕܝܗܘܢ ܐܢܬܘܢ

    ܕܐܝܬ ܗܘܘ ܒܐܪܥܐ

    ܩܕܝܫܬܐ. ܘܐܬܒܝܐܘ ܫܡܗ

    ܕܚܒܠܐ ܐܝܟ ܕܐܡܠܠ.

    ܗܟܝܠ ܐܢܘܢ ܡ̈ܠܐ ܐܣܝܪܐ

    ܕܚܙܝܬܘܢ. ܝܼ. ܡ̈ܠܐ ܕܐܡܪܬ

    ܠܟܘܢ ܕܚܙܝܬܘܢ. ܗܘܘ ܗܘܘ

    ܒܗܘܢ ܪ̈ܘܚܐ ܕܗܘ̣ܘ

    ܒܝܘܡ̈ܬܐ ܕܡܢܘ ܟܕ

    ܚܙܝܬܘܢ ܡܛܠ ܕܣܓܝ ܐܪܥܐ.

    ܘܕܢܫܐ ܡܛܠ ܘܕܝܕ ܕܠܐ.

    ܘܕܡܐ ܐܫܕ ܐܝܟ. ܘܢܦܫ

    ܓܒܪܐ ܒܣܝܡܐ ܛܥܡ.

    ܘܣܓܝ ܡܕܡ̈ܢܐ ܘܡܘ̈ܒܕܢܘܗܝ

    ܒܝܫܬܐ. ܘܩܛܝܪܐ ܐܦܢ ܕܠܐ

    ܢܫܡܥܘܢ ܒܝܬ ܡܕܡܝܗܘܢ.

    ܘܥܒܕ ܓܘܪܐ ܕܚܠܦ ܙ

    ܐܪܥܐ ܡܠܝܘܗܝ ܚܢܢ

    ܠܐܪܥܐ ܪ̈ܘܚܝ. ܘܚܡܫܥܣܪܐ

    ܐܠܘ ܪܢܝܬ ܕܠܡܐ. ܐܝܟ

    ܕܥܘܩܒܠܐ ܛܢܢܬ ܕܚܒܠܬܐ.

    ܘܐܡܪܝܢ ܠܟܘܢ ܪܘܓܙܐ

    ܡܢ ܩܕܡ ܚܒܠܬܐ ܐܝܟ

    ܕܬܬܒܩܪ ܨܐܕܝ. ܐܝܟ

    ܕܐܦ ܥܠܝܟ ܒܝܘ̈ܡܬܟܘܢ.

    ܐܠܐ ܐܦ ܐܠܘ ܬܪܝܢ ܫܒ̈ܛܝܢ

    ܘܦܠܓܗ ܠܟܘܢ ܓܐܪ ܕܝܕܐ

    ܕܐܦ ܝܕܥܝܢ ܠܫܠܡܟ ܐܝܟ

    ܕܚܙܝܬ ܗܫܐ. ܘܒܕܓܘܢ

    ܠܡܘܒܕܘ ܣܓܝܐ ܪܘܚܒܗ

    ܕܡܢܝܡܐ. ܐܝܟ ܕܬܫܬܡܥܘܢ

    ܕܡܕܒܪܐ ܬܪܝܨܝ ܡܢ

    ܒܝܬ ܡܣܝܒܘܬܐ. ܡܛܠ ܗܢܐ

    ܡܢܫܪ ܒܗܘܢ ܙܒܢܐ

    ܐܫܬܬܩܝ ܪ̈ܫܝܥܐ. ܘܒܚܕܘܬܐ

    ܒܙܘܥܐ ܗܘܘ ܡܥܡܘܪ̈ܘܗܝ.

    ܟܕ ܓܝܪ ܐܫܬܡܥܬ ܒܥܘܬܗ

    ܠܘܬ ܡܪܝܡܐ. ܒܐܝܕܝܬܐ

    ܟܕ ܢܦܠ ܡ


    # Source page p0184 (printed 158)

    ܘܗܘܐ ܠܗ ܐܪܙܐ ܥܡܝܩܐ.

    ܠܐ ܗܘܐ ܓܝܪ ܡܡܠܟܢܘܬܗ

    ܚܕܐ. ܐܦ ܠܐ ܓܝܪ ܝܘܡܐ

    ܗܘܐ. ܐܠܐ ܕܡܢ ܙܒܢܐ

    ܀ ܠܝܠܝܐ. ܕܒܐܚܪܝܬܐ ܡܢ

    ܡܢܗ ܐܝܬ ܠܗ ܕܠܥܠܡ.

    ܗܘ ܓܝܪ ܕܡ̇ܪܐ ܕܠܗܘܬ

    .. ܐܦ ܕܠܥܠܡ ܡܕܢ. — .ܝ.

    65 ܘܒܬܪ ܕܝܢ ܡܢܫܐ ܗܘܐ

    ܗܘ ܡܢܫܐ. ܘܡܬܚܫܒ

    ܗܘܐ ܒܙܒܢܗ ܐܝܟ ܗܘ̇

    ܕܠܐ ܒܬܝ̣ ܚܝܒܘܬܐ ܕܠܒܪ

    ܪ̈ܢܝܢ ܠܗܘܢ. ܘܠܝܬ ܐܢܘܢ

    ܡ̈ܪܝܪܐ ܘܩܫ̈ܝܐ. ܬܫܬܥܝ

    66 .. ܕܝܠܗ ܝ. ܘܒ̈ܬܪ ܒܣܝ̈ܡܐ

    ܢܗܘܐ ܕܝܠܗ. ܗܘܐ ܗܘܐ

    ܝܘܡܘܗ̈ܝ ܕܐܡܘܢ

    ܕܫܘܝܐ. ܡ̇ܠܟܐ ܕܝܗܘܕܐ

    ܕܒܗܘ̇ ܙܒܢܐ ܗܘ̣ܘ ܒܠܚܘܕܘܗܝ

    ܡܫܟܚ ܗܘܐ ܠܚܛܝܬܐ

    ܡܢ ܡܠܝܘ ܠܒܗ ܘܡܢ ܟܠܗ̇

    ܢܦܫܗ. ܘܗܘ̣ ܕܡܢ ܠܐܢܫܐ

    ܡܢ ܦܬܓܡܐ. ܘܩܪܝ

    ܟܠܗܘܢ ܡܠܐܟ̈ܐ ܙܥܘܪܝܢ

    ܕܐܬܝܗܒܘ. ܘܗܘ̈ܒܝܐ

    ܦܢܝ ܠܡܕܒܚܐ. ܘܐܢܫ

    ܡܢܐ ܕܚ̈ܛܝܐ. ܘܪܘܪܒܐ

    ܠܙܕܝ̈ܩܐ. ܘܢܒܝܝ ܠܒܘܠܡܘ(ܣ)

    ܚܒܝ̈ܒܐ ܒܣܒܘܠܬܐ.

    ܘܐܦܢ ܡܘ̈ܠܐ

    ܠܐ ܫܡܥܘܗܝ. ܘܥ̣ܒܕ

    ܘܐܒܥܕ ܐܝ̈ܩܪܐ ܣܓܝ̈ܐܐ

    ܘܐܦܘ̈ܕܐ ܡܢ ܐܢܫܐ. ܘܠܐ

    ܗܘܘ ܒܠܚܘܕ ܠܨ̈ܥܨܥܐ

    ܕܚܝܝܢ ܗܘܘ ܩܛ̣ܠ. ܘܐܦ

    ܠܡܝ̈ܬܘܗܝ ܕܐܢܫܝܢ ܕܡܝܬܘ

    ܐܦܩܘ ܡܢ ܩܒܪܐ

    ܘܐܡܪܘ ܐܢܘܢ ܒܙܘܪܐ.

    ܘܥ̣ܒܕܐ ܚܘ̈ܒܐ ܙܩܝܦ

    ܒܒܘܕ̈ܝܗܘܢ. ܘܠܡܩ̈ܢܫܐ

    ܐܩܝܡ ܒܙܘܪܐ. ܘܠܥܝ̈ܒ̣ܝܐ

    ܕ̈ܕ̈ܠܐ ܕܡܣܒܝܢ ܗܘܘ ܠܥܡܡ̣ܐ

    ܐܦ ܠܗܘܢ ܐܩܝܡ ܐܢܘܢ

    ܒܙܘܪܐ. ܘܠܥܡܡܐ ܕܡܫܬܡܥܐ

    ܗܘܘ ܠܗܘܢ ܩ̣ܕ ܚܝ̈ܝܗܝ.

    ܐܪܡܝ ܐܢܘܢ ܒܢܚܠܐ'
