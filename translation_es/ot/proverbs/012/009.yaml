translation:
  language: es
  text: Más vale el que es tenido en poco y tiene un siervo, que el que se honra a sí mismo[a] y carece de pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que el que pretende ser importante y carece de pan». El verbo hebreo puede sugerir hacerse parecer honorable o importante, no solo darse honra a sí mismo en sentido reflexivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better is
  chosen_spanish: Más vale
  alternatives_spanish:
  - Es mejor
  - Mejor es
  lexicon: HALOT
  rationale: En un proverbio comparativo, טוֹב funciona idiomáticamente como una comparación de valor. «Más vale» expresa esa comparación de forma natural en español y conserva el tono sapiencial.
- source_word: נִקְלֶה
  english_pob_choice: one who is lightly esteemed
  chosen_spanish: el que es tenido en poco
  alternatives_spanish:
  - el despreciado
  - el de poco estima
  - el que es menospreciado
  lexicon: HALOT
  rationale: El participio nifal señala a alguien considerado de poca importancia o bajo aprecio. «Tenido en poco» preserva el matiz social de baja estima sin volverlo más fuerte que el hebreo.
- source_word: וְעֶבֶד לוֹ
  english_pob_choice: and has a servant
  chosen_spanish: y tiene un siervo
  alternatives_spanish:
  - y tiene un esclavo
  - y cuenta con un sirviente
  - y tiene un servidor
  lexicon: HALOT
  rationale: El hebreo dice literalmente que hay un עֶבֶד para él; el POB inglés eligió 'servant' por el matiz de un sirviente doméstico en el contraste sapiencial. En español, «siervo» mantiene esa amplitud semántica sin imponer de entrada la fuerza social de «esclavo», aunque esta última sigue siendo una alternativa posible en otros contextos.
- source_word: מִמְּתַכַּבֵּד
  english_pob_choice: than one who honors himself
  chosen_spanish: que el que se honra a sí mismo
  alternatives_spanish:
  - que el que pretende ser importante
  - que el que se glorifica a sí mismo
  - que el que se hace pasar por alguien importante
  lexicon: HALOT
  rationale: 'El hitpael es reflexivo: alguien que se da honor o se presenta como honorable. «Se honra a sí mismo» conserva el sentido reflexivo y deja abierta la tensión documentada entre autoexaltación real y mera apariencia de importancia.'
- source_word: וַחֲסַר לָחֶם
  english_pob_choice: and lacks bread
  chosen_spanish: y carece de pan
  alternatives_spanish:
  - y le falta pan
  - y carece de alimento
  - y no tiene pan
  lexicon: HALOT
  rationale: לֶחֶם puede significar pan o alimento en general. «Pan» preserva la imagen concreta del hebreo y la conexión con la carencia básica; «carece de» reproduce el verbo de falta con tono sobrio y idiomático.
translation_notes:
  revision_awareness: 'Se revisó la equivalencia frente al hebreo y el auditor inglés: se mantuvo la comparación proverbial, la noción de baja estima social, el matiz reflexivo de מִמְּתַכַּבֵּד y la imagen concreta de לָחֶם. No hubo cambios sustantivos respecto del pase más reciente; la formulación española busca sonar natural sin perder la tensión lexical documentada.'
  spanish_consistency_notes:
  - Se evitó «Señor» u otros términos teológicos no presentes en el versículo.
  - «Siervo» se usó por coherencia con el valor contextual de עֶבֶד en este proverbio; no se escogió «esclavo» porque el contraste se centra en la condición doméstica y los medios, no en la institución servil misma.
  - «Más vale» reproduce bien la estructura sapiencial comparativa del hebreo.
  - «Tenido en poco» mantiene un registro comprensible y no intensifica innecesariamente el desprecio.
