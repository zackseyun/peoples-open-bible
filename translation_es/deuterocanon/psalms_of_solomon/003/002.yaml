revisions:
- from: Canten un himno y alaben a Dios[a], el que es digno de alabanza. Canten, y estén en vela por su vigilancia[b]; porque un salmo para Dios desde un corazón bueno es bueno.
  to: Canten un himno y alabanza a Dios[a], el que es digno de alabanza. Canten, y estén vigilantes ante su vigilancia[b]; porque bueno es un salmo para Dios de un corazón bueno.
  rationale: Se revisa para preservar mejor la estructura nominal de ὕμνον καὶ αἶνον, mejorar la correspondencia de la construcción extraña γρηγόρησον ... γρηγόρησιν con una frase española igualmente comprensible, y hacer más natural «de un corazón bueno» sin perder la repetición de «bueno ... bueno» del griego.
