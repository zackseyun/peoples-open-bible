translation:
  language: es
  text: y que lo ponga[a] en manos de los obreros que están encargados en la casa de Yahvé, y que se lo den a los obreros que están en la casa de Yahvé para reparar el daño[b] de la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y que lo dé». El verbo hebreo es «dar», pero el modismo significa poner algo bajo la custodia de alguien.
    reason: lexical_alternative
  - marker: b
    text: Lit. «fortalecer la brecha/daño» de la casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ויתנה / נתן
  english_pob_choice: and let him put it
  chosen_spanish: que lo ponga
  alternatives_spanish:
  - que se lo dé
  - que lo entregue
  lexicon: HALOT
  rationale: El hebreo usa נתן con fuerza jussiva. En este contexto, unido a la idea de custodia, el sentido no es solo “dar” sino “poner” algo bajo control de otros. «Que lo ponga» conserva esa instrucción y evita un español demasiado rígido.
- source_word: עַל יַד
  english_pob_choice: into the hands of
  chosen_spanish: en manos de
  alternatives_spanish:
  - bajo la custodia de
  - a manos de
  lexicon: HALOT
  rationale: La locución hebrea expresa entrega a custodia o control. «En manos de» es la equivalencia natural en español y mantiene la imagen sin calcar mecánicamente la sintaxis hebrea.
- source_word: עֹשֵׂי הַמְּלָאכָה
  english_pob_choice: the workmen
  chosen_spanish: los obreros
  alternatives_spanish:
  - los trabajadores
  - los que hacen la obra
  lexicon: HALOT
  rationale: «Hacedores de la obra» sería demasiado literal en español. «Obreros» comunica bien el grupo de personas involucradas en el trabajo de reparación del templo y preserva el valor laboral del término.
- source_word: הַמֻּפְקָדִים
  english_pob_choice: who are appointed
  chosen_spanish: que están encargados
  alternatives_spanish:
  - que han sido nombrados
  - que están puestos al frente
  - que están designados
  lexicon: HALOT
  rationale: El participio pasivo de פקד señala personas puestas a cargo. «Encargados» conserva la idea de comisión/administración sin sobreespecificar rango jerárquico.
- source_word: בבית יהוה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene «casa» para seguir de cerca בַּיִת y conservar el enlace léxico con «la casa» al final del versículo. «Yahvé» se usa según la norma del proyecto para יהוה.
- source_word: וְיִתְּנוּ אֹתוֹ
  english_pob_choice: and let them give it
  chosen_spanish: y que se lo den
  alternatives_spanish:
  - y que lo entreguen
  - y que lo den
  lexicon: HALOT
  rationale: El verbo continúa la cadena de entrega y custodia; el objeto directo e indirecto en español ayuda a expresar con claridad el movimiento del dinero/material de un grupo a otro.
- source_word: אֲשֶׁר בְּבֵית יְהוָה
  english_pob_choice: who are in the house of Yahweh
  chosen_spanish: que están en la casa de Yahvé
  alternatives_spanish:
  - que trabajan en la casa de Yahvé
  - que se hallan en la casa de Yahvé
  lexicon: HALOT
  rationale: El relativo marca ubicación; «están en la casa de Yahvé» sigue de cerca el hebreo sin añadir la idea de trabajo, que está implícita pero no explícita.
- source_word: לְחַזֵּק
  english_pob_choice: to repair
  chosen_spanish: para reparar
  alternatives_spanish:
  - para fortalecer
  - para restaurar
  lexicon: HALOT
  rationale: חזק significa literalmente «fortalecer», pero aquí describe la acción práctica sobre la estructura del edificio. «Reparar» es la equivalencia contextual más clara en español.
- source_word: בֶּדֶק
  english_pob_choice: the damage
  chosen_spanish: el daño
  alternatives_spanish:
  - la brecha
  - el deterioro
  - la parte dañada
  lexicon: HALOT
  rationale: En esta expresión idiomática, בֶּדֶק alude al daño o deterioro de la casa que necesita arreglo. «El daño» expresa la idea de forma natural y suficientemente cercana al hebreo.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: de la casa
  alternatives_spanish:
  - del templo
  lexicon: HALOT
  rationale: Se conserva «casa» para respetar el vocabulario del hebreo y la coherencia interna del versículo, en lugar de sustituirlo sistemáticamente por «templo».
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton. Siguiendo la convención doctrinal del proyecto, se vierte como «Yahvé» en español, manteniendo visible el nombre del pacto en vez de ocultarlo tras una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El audit trail en inglés no requirió cambios sustanciales en la línea de sentido: mantiene la cadena de custodia, la distinción entre dos grupos de obreros y la nota idiomática sobre «reparar el daño». La versión española sigue esa lectura, con ajustes naturales de sintaxis y con el nombre divino rendido como «Yahvé» conforme a la norma del proyecto.'
  spanish_consistency_notes:
  - Se mantiene «casa de Yahvé» y «la casa» para conservar el paralelismo léxico del hebreo.
  - «Obreros» traduce el campo laboral de עֹשֵׂי הַמְּלָאכָה sin introducir terminología eclesiástica.
  - «Encargados» preserva la idea pasiva de haber sido puestos a cargo.
  - La nota sobre «reparar el daño» recoge la tensión entre el sentido literal de «fortalecer» y el uso contextual del edificio.
