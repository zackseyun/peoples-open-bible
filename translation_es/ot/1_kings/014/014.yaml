- from: Y Yahvé levantará para sí un rey sobre Israel, que exterminará la casa de Jeroboam este día[a]. Pero, ¿qué? Aun ahora.
  to: Yahvé levantará para sí un rey sobre Israel, que cortará de raíz la casa de Jeroboam este día[a]. Pero, ¿qué? Aun ahora.
