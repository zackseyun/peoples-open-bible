translation:
  language: es
  text: Yahvé mismo es el que va delante de ti. Él mismo estará contigo; no te fallará[a] ni te abandonará. No temas ni te desalientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te soltará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa explícitamente el nombre propio divino, no un título genérico. En español POB se conserva ese nombre como «Yahvé», siguiendo la política del proyecto y manteniendo la referencia al pacto.
- source_word: הוּא
  english_pob_choice: himself
  chosen_spanish: mismo / Él mismo
  alternatives_spanish:
  - él
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. «Yahvé mismo» y «Él mismo» conservan esa fuerza sin sonar forzados en español.
- source_word: הַהֹלֵךְ
  english_pob_choice: is the one going
  chosen_spanish: es el que va
  alternatives_spanish:
  - va
  - es el que camina
  lexicon: HALOT
  rationale: El participio expresa acción continua o característica. «Es el que va» reproduce bien la idea de ir delante como guía/protector, con español natural.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - por delante de ti
  lexicon: HALOT
  rationale: La expresión es idiomática de precedencia y conducción. «Delante de ti» es la equivalencia natural en español y mantiene la imagen de guía adelantándose.
- source_word: יִהְיֶה עִמָּךְ
  english_pob_choice: will be with you
  chosen_spanish: estará contigo
  alternatives_spanish:
  - estará con usted
  - permanecerá contigo
  lexicon: HALOT
  rationale: La fórmula de presencia de pacto se expresa de forma clara y directa con «estará contigo». «Con» comunica cercanía relacional sin añadir interpretación.
- source_word: יַרְפְּךָ
  english_pob_choice: will not fail you
  chosen_spanish: no te fallará
  alternatives_spanish:
  - no te dejará caer
  - no te soltará
  - no te desmayará
  lexicon: HALOT
  rationale: El verbo en hifil tiene el matiz de dejar caer, soltar o fallar. «No te fallará» conserva el contraste con «no te abandonará» y es el equivalente más idiomático en español para esta garantía.
- source_word: יַעַזְבֶךָּ
  english_pob_choice: forsake you
  chosen_spanish: te abandonará
  alternatives_spanish:
  - te dejará
  - te desamparará
  lexicon: HALOT
  rationale: עזב expresa dejar/abandonar. «Abandonar» comunica bien el sentido de desamparo; se evita «desamparar» como forma más marcada y menos neutral, aunque sigue siendo una alternativa válida.
- source_word: לֹא תִירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No has de temer
  lexicon: HALOT
  rationale: En este contexto la forma funciona como prohibición/exhortación. «No temas» es breve, solemne y natural en español bíblico contemporáneo.
- source_word: וְלֹא תֵחָת
  english_pob_choice: be dismayed
  chosen_spanish: ni te desalientes
  alternatives_spanish:
  - ni te desmayes
  - ni te aterrices
  - ni te intimides
  lexicon: HALOT
  rationale: חתת en este contexto puede expresar quedar abatido, intimidado o desmoralizado. «Desalientes» comunica la pérdida de ánimo sin duplicar exactamente «temas» y mantiene el paralelismo exhortativo.
theological_decisions:
- issue: Nombre divino יְהוָה en la traducción española
  english_pob_reading: Yahweh (divine name preserved)
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa el nombre del pacto de forma directa. La traducción española conserva ese nombre en vez de ocultarlo con un título, coherente con la política POB y con la trazabilidad al texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'Matiz doble de las negaciones finales: no fallar / no abandonar'
  english_pob_reading: he will not fail you or forsake you
  chosen_spanish_reading: no te fallará ni te abandonará
  alternative_spanish_readings:
  - no te dejará caer ni te dejará
  - no te desamparará ni te abandonará
  rationale: El hebreo emplea dos verbos distintos, uno con matiz de dejar caer/fallar y otro de abandonar. La versión española mantiene esa distinción para no borrar la tensión lexical documentada por el auditor.
  doctrine_reference: HALOT lexical distinction for רפה Hiphil and עזב
- issue: Exhortación final paralela
  english_pob_reading: Do not fear or be dismayed
  chosen_spanish_reading: No temas ni te desalientes
  alternative_spanish_readings:
  - No temas ni te intimides
  - No temas ni te desmayes
  rationale: Se conserva el paralelismo hebreo con dos prohibiciones. «Desalientes» comunica bien el abatimiento o desmoronamiento interior que expresa חתת en un registro natural para el lector actual.
  doctrine_reference: HALOT on חתת in reassurance contexts
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin cambios sustantivos en la revisión más reciente; se mantiene la decisión de preservar el nombre divino como «Yahvé» y de distinguir los dos verbos finales («no te fallará» / «no te abandonará») en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme al estándar español del proyecto.
  - Se preserva el pronombre enfático con «mismo» en la primera cláusula y con «Él mismo» en la segunda.
  - Se evita «Cristo», «SEÑOR» o fórmulas eclesiásticas que no corresponden al hebreo de este versículo.
  - La nota al pie se coloca sobre «delante de ti» para conservar la alternativa idiomática sin alterar el cuerpo principal.
