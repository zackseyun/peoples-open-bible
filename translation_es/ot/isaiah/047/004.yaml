translation:
  language: es
  text: Nuestro Redentor[a]—Yahvé de los Ejércitos[b] es su nombre—es el Santo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Redentor» también podría traducirse «Pariente-Redentor», resaltando el matiz pactual y legal del término hebreo.
    reason: lexical_alternative
  - marker: b
    text: O, tradicionalmente, «Yahvé de las Huestes».
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּאֲלֵנוּ
  english_pob_choice: Our Redeemer
  chosen_spanish: Nuestro Redentor
  alternatives_spanish:
  - Nuestro Rescatador
  - Nuestro Pariente-Redentor
  lexicon: HALOT
  rationale: El participio sustantivado expresa a quien redime. 'Redentor' conserva el peso jurídico-covenantal del término sin volverlo demasiado técnico en el español actual. 'Pariente-Redentor' es posible, pero la relación de parentesco no está explícita en esta formulación breve.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se preserva el nombre divino propio con la forma estándar del proyecto en español: ''Yahvé''. Se evita la sustitución por un título, porque el hebreo usa el Tetragrámaton directamente.'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los Ejércitos celestiales
  - de los Ejércitos/Hostes
  lexicon: HALOT
  rationale: '''Ejércitos'' comunica de manera más directa y natural para el español la imagen concreta del hebreo que la forma tradicional ''Hostes''. Mantiene el matiz militar/potente del título.'
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - su nombre es
  - es el nombre de él
  lexicon: HALOT
  rationale: El español puede reproducir la cláusula nominal de forma natural con 'es su nombre', manteniendo la función de apposición del hebreo sin añadir énfasis interpretativo innecesario.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo de Israel
  lexicon: HALOT
  rationale: Es un título isaiano fijo. 'Santo' reproduce adecuadamente el valor titular y reverencial del hebreo y conserva la resonancia canónica de la expresión.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea editorial del proyecto preserva el nombre propio divino. En español, 'Yahvé' funciona como transliteración reverente y reconocible, evitando la sustitución por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Title יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de los Hostes
  - el SEÑOR de los Ejércitos
  rationale: Se conserva la combinación del nombre divino con el sustantivo plural concreto 'Ejércitos', que en español es más transparente que 'Hostes'. La decisión mantiene el carácter titulado y soberano de la expresión.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5'
- issue: Capitalized divine title in apposition
  english_pob_reading: is the Holy One of Israel
  chosen_spanish_reading: es el Santo de Israel
  alternative_spanish_readings:
  - es el santo de Israel
  - es el Santo de Israel
  rationale: Se capitaliza 'Santo' porque funciona como título divino, en paralelo con la audacia teológica del hebreo y del POB inglés. La minúscula lo volvería un adjetivo común y perdería fuerza titular.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con la evaluación de alta concordancia del pase más reciente, sin introducir revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del nombre divino en español del proyecto.
  - '''Redentor'' se conserva como título divino y se capitaliza por esa función.'
  - '''Ejércitos'' evita el calco tradicional opaco ''Hostes'' pero no altera el contenido semántico.'
  - La puntuación con rayas reproduce la estructura apposicional del hebreo y del POB inglés.
