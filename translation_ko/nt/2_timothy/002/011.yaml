id: 2TI.2.11
reference: 2 Timothy 2:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πιστὸς ὁ λόγος· εἰ γὰρ συναπεθάνομεν, καὶ συζήσομεν·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/011.yaml
  text: 'The saying is trustworthy: for if we died with him, we will also live with him.'
translation:
  language: ko
  text: '이 말씀은 신실합니다.[a] 우리가 그분과 함께 죽었으면, 그분과 함께 살 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 다음 11~13절은 초대교회에서 불려진 찬가(讚歌) 또는 신앙고백의 정형으로 추정된다. 네 개의 조건절(만일 ~ 한다면)이 짝지어 운율을 이룬다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστὸς ὁ λόγος
  english_pob_choice: The saying is trustworthy
  chosen_korean: 이 말씀은 신실합니다
  alternatives_korean:
  - 이 말은 믿을 만합니다
  - 이 말씀은 미쁘십니다
  lexicon: BDAG
  rationale: 목회서신의 정형 표현. 「신실하다」는 πιστός의 신뢰성·진실성을 자연스럽게 담는다. 「미쁘다」는 한국 전통 번역의 옛 어휘로, 현대 합쇼체에 맞지 않는다.
- source_word: συναπεθάνομεν
  english_pob_choice: we died with him
  chosen_korean: 그분과 함께 죽었으면
  alternatives_korean:
  - 함께 죽었으면
  - 그분과 동참하여 죽었으면
  lexicon: BDAG
  rationale: συν- 접두사의 「함께함」을 살려 「그분과 함께」로 명시한다. 부정과거 συναπεθάνομεν은 결정적 과거 행위(세례·결단)를 가리킨다.
- source_word: συζήσομεν
  english_pob_choice: we will also live with him
  chosen_korean: 그분과 함께 살 것입니다
  alternatives_korean:
  - 함께 살 것입니다
  - 그분과 동참하여 살 것입니다
  lexicon: BDAG
  rationale: 미래형의 부활 생명(또는 현재의 새 생명) 약속을 「살 것입니다」로 옮긴다. 11-13절 찬가의 운율을 살려 「죽었으면 ~ 살 것입니다」의 짝을 분명히 보존한다.
theological_decisions:
- issue: 2:11-13 찬가(讚歌)의 운율적 짝 구조 보존
  chosen_reading: 우리가 그분과 함께 죽었으면 그분과 함께 살 것입니다
  alternative_readings:
  - 우리가 함께 죽었으면 함께 살 것입니다
  - 우리가 동참하여 죽었으면 동참하여 살 것입니다
  rationale: 본문은 초대교회의 신앙고백 찬가로 추정되며, 11-13절에 네 개의 조건절(εἰ ~)이 짝을 이룬다. 한국어 번역에서도 운율적 짝을 보존하기 위해 동일한 어법(「~으면 ~ 것입니다」)을 일관되게 사용한다. συν- 접두사의 「그분과 함께」를 명시적으로 살려 그리스도와의 연합 신학을 약화시키지 않는다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological force and literary structure'
