translation:
  language: es
  text: También les preguntamos sus nombres, para dártelos a conocer[a], a fin de que escribiéramos los nombres de los hombres que estaban a su cabeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «para informarte», para el sentido de «para dártelos a conocer».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «que estaban a su cabeza»; es decir, los hombres principales entre ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַף
  english_pob_choice: We also
  chosen_spanish: También
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: La partícula añade otro elemento al reporte. «También» conserva el valor aditivo en un español natural y sobrio.
- source_word: שְׁמָהָתְהֹם
  english_pob_choice: their names
  chosen_spanish: sus nombres
  alternatives_spanish:
  - los nombres de ellos
  lexicon: HALOT
  rationale: El sustantivo con sufijo posesivo plural se expresa de forma idiomática con «sus nombres».
- source_word: שְׁאֵלְנָא לְּהֹם
  english_pob_choice: asked them
  chosen_spanish: les preguntamos
  alternatives_spanish:
  - inquirimos de ellos
  - les consultamos
  lexicon: HALOT
  rationale: El verbo de preguntar/inquirir se vierte de manera directa; el dativo con pronombre encaja naturalmente con «les preguntamos».
- source_word: לְהוֹדָעוּתָךְ
  english_pob_choice: to make them known to you
  chosen_spanish: para dártelos a conocer
  alternatives_spanish:
  - para informarte
  - para hacerte saber
  lexicon: HALOT
  rationale: La forma causativa expresa finalidad de comunicar la información al destinatario. «Dártelos a conocer» conserva el objeto concreto (los nombres) y evita reducirlo a una fórmula más general.
- source_word: נִכְתֻּב
  english_pob_choice: we might write down
  chosen_spanish: escribiéramos
  alternatives_spanish:
  - anotáramos
  - escribiésemos
  lexicon: HALOT
  rationale: El verbo remite a consignar por escrito. En español, el subjuntivo final tras «a fin de que» comunica bien la intención documental sin sobrecargar el estilo.
- source_word: שֻׁם
  english_pob_choice: the names of
  chosen_spanish: los nombres de
  alternatives_spanish:
  - el nombre de
  lexicon: HALOT
  rationale: Aunque la forma sea singular, el sentido colectivo del contexto exige plural en español.
- source_word: גֻּבְרַיָּא
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - la gente
  lexicon: HALOT
  rationale: El término designa varones/hombres. «Los hombres» es la equivalencia directa y clara.
- source_word: דִּי בְרָאשֵׁיהֹם
  english_pob_choice: who were at their head
  chosen_spanish: que estaban a su cabeza
  alternatives_spanish:
  - que eran sus líderes
  - que estaban al frente de ellos
  lexicon: HALOT
  rationale: La expresión aramea es idiomática. «A su cabeza» conserva la imagen original; «estaban a su cabeza» mantiene la metáfora sin forzar un tecnicismo eclesiástico o político.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto arameo y el audit trail inglés: conserva la secuencia de acciones («preguntamos... para... a fin de que...») y mantiene la imagen idiomática de «a su cabeza» en el cierre, sin convertirla prematuramente en una glosa interpretativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - Se evita «Cristo»/«Mesías» porque no aparece vocabulario mesiánico aquí.
  - «Hombres» reproduce el valor básico de גֻּבְרַיָּא sin añadir liderazgo al sustantivo; el liderazgo queda en la frase final.
  - La finalidad se expresa con «para... a fin de que...», reflejando el propósito documental del hebreo arameo sin desdoblar indebidamente el contenido.
