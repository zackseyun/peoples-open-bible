translation:
  language: es
  text: Es bueno que te aferres[a] a esto, y también que no apartes tu mano de aquello; porque el que teme a Dios saldrá[b] de todos ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «retengas esto»; el hebreo usa un verbo de tomar o sujetar con fuerza.
    reason: alternative_reading
  - marker: b
    text: O «saldrá de todos estos asuntos», es decir, emergerá con éxito de todas estas cuestiones; algunos entienden el sentido de manera más interpretativa como «los evitará todos».
    reason: alternative_reading
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: It is good
  chosen_spanish: Bueno es
  alternatives_spanish:
  - Es bueno
  - Bueno
  lexicon: HALOT
  rationale: El hebreo usa un predicado evaluativo breve; en español, «Bueno es» conserva la valoración positiva sin volverlo demasiado interpretativo.
- source_word: אֲשֶׁר תֶּאֱחֹז בָּזֶה
  english_pob_choice: that you should grasp this
  chosen_spanish: que retengas esto
  alternatives_spanish:
  - que tomes esto en tu mano
  - que te aferres a esto
  - que agarres esto
  lexicon: HALOT
  rationale: אחז implica tomar, sujetar o aferrar. «Retengas» mantiene la idea de sujetar y conservar la instrucción previa, evitando una imagen demasiado coloquial.
- source_word: וְגַם מִזֶּה אַל תַּנַּח אֶת יָדֶךָ
  english_pob_choice: and also not withdraw your hand from that
  chosen_spanish: y también no retires tu mano de aquello
  alternatives_spanish:
  - y tampoco apartes tu mano de aquello
  - y no sueltes aquello
  - y tampoco dejes descansar tu mano de aquello
  lexicon: HALOT
  rationale: El giro con mano expresa ceder o apartarse de una conducta. «Retires tu mano» comunica bien el valor idiomático sin perder la imagen corporal.
- source_word: יְרֵא אֱלֹהִים
  english_pob_choice: the one who fears God
  chosen_spanish: el que teme a Dios
  alternatives_spanish:
  - quien teme a Dios
  - la persona que teme a Dios
  lexicon: HALOT
  rationale: La forma participial describe un tipo de persona. «El que teme a Dios» es natural en español y conserva el carácter proverbial del enunciado.
- source_word: יֵצֵא אֶת כֻּלָּם
  english_pob_choice: will come out from them all
  chosen_spanish: saldrá de entre todos ellos
  alternatives_spanish:
  - saldrá de ellos todos
  - saldrá con todos ellos
  - saldrá victorioso de todos ellos
  lexicon: HALOT
  rationale: La cláusula final es comprimida y debatida. «Saldrá de entre todos ellos» conserva la imagen de salir/emergir sin resolverla en una paráfrasis más fuerte como «vencerá» o «evitará».
theological_decisions:
- issue: Cláusula final ambigua sobre la salida del que teme a Dios
  english_pob_reading: The God-fearing person successfully navigates or emerges in relation to both counsels mentioned in context, without specifying a stronger doctrinal conclusion.
  chosen_spanish_reading: La persona que teme a Dios emerge o sale de entre las opciones mencionadas, sin precisar una conclusión doctrinal más fuerte.
  alternative_spanish_readings:
  - evita ambas extremos
  - cumple ambas obligaciones
  - sale victoriosa de todo
  rationale: El hebreo permite más de una lectura, y la POB en inglés preserva esa tensión. La versión española mantiene la imagen de salir, sin convertirla en una interpretación demasiado cerrada.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés POB: se evitó una formulación que sonara a «dejar descansar la mano» y se conservó la idea de «retirar/withdraw»; también se preservó la ambigüedad final de «saldrá de entre todos ellos» sin resolverla como evitar o cumplir. La versión española sigue ese mismo ajuste interpretativo.'
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים según la convención del proyecto.
  - Se evitó «Cristo» y toda terminología no presente en el versículo.
  - La nota al pie se ancla en «retengas» para señalar la alternativa lexical de אחז.
  - «de entre todos ellos» conserva la referencia plural y la imagen de salida sin añadir sujetos implícitos.
