translation:
  language: es
  text: entre toda la carne, conforme a su don[a], y la concedió a los que lo aman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con toda carne» o «a toda carne»; la frase griega puede entenderse como una distribución de la Sabiduría entre todos los seres vivientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ πάσης σαρκὸς
  english_pob_choice: among all flesh
  chosen_spanish: entre toda carne
  alternatives_spanish:
  - con toda carne
  - entre toda la humanidad
  - con toda la humanidad
  lexicon: LSJ
  rationale: μετά con genitivo suele expresar compañía o asociación; aquí conviene un español natural que conserve la imagen de distribución "entre" los seres vivientes. "Carne" mantiene el alcance concreto del griego, sin reducirlo a "humanidad".
- source_word: κατὰ τὴν δόσιν αὐτοῦ
  english_pob_choice: according to his gift
  chosen_spanish: conforme a su don
  alternatives_spanish:
  - según su don
  - de acuerdo con su dádiva
  - conforme a su dádiva
  lexicon: LSJ
  rationale: δόσις puede significar un don o lo dado. "Don" comunica bien la idea de medida de distribución y suena más natural en español bíblico contemporáneo que "dádiva".
- source_word: ἐχορήγησεν
  english_pob_choice: granted
  chosen_spanish: la concedió
  alternatives_spanish:
  - la otorgó
  - la proveyó
  - la dio
  lexicon: LSJ
  rationale: χορηγέω tiene el matiz de proveer generosamente o conceder. "La concedió" preserva el acto de dar con liberalidad y encaja con el registro formal del pasaje.
- source_word: αὐτὴν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - la sabiduría
  lexicon: LSJ
  rationale: El referente es la Sabiduría personificada, pero en español el pronombre átono "la" permite mantener la referencia femenina sin sobrecargar la frase. La personificación queda implícita por el contexto de Sirácida 1.
- source_word: τοῖς ἀγαπῶσιν αὐτόν
  english_pob_choice: to those who love him
  chosen_spanish: a los que lo aman
  alternatives_spanish:
  - para los que lo aman
  - a los que aman a él
  lexicon: LSJ
  rationale: El participio expresa los destinatarios de la acción. "A los que lo aman" es la forma idiomática y clara en español, y mantiene el referente masculino de Dios en el contexto inmediato.
theological_decisions:
- issue: Personificación de la Sabiduría y referente pronominal femenino
  english_pob_reading: The feminine pronoun refers to wisdom, while the masculine pronoun refers to God.
  chosen_spanish_reading: El pronombre femenino se conserva implícitamente en "la", refiriéndose a la Sabiduría personificada; el pronombre masculino final se refiere a Dios.
  alternative_spanish_readings:
  - usar "ello" para despersonalizar la referencia
  - nombrar explícitamente "la Sabiduría" para evitar ambigüedad
  rationale: El texto griego preserva la personificación femenina de la Sabiduría y el referente masculino de Dios. Mantener "la" respeta esa tensión literaria y teológica sin añadir explicaciones al cuerpo del versículo.
  doctrine_reference: Sirácida 1:4-9; preserve theological tension rather than resolve it; gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail inglés, que pasó de un verbo más plano a uno más formalmente apropiado para ἐχορήγησεν. En español se optó por «concedió» para sostener ese tono de concesión generosa sin perder la personificación femenina de la Sabiduría.
  spanish_consistency_notes:
  - Se usa «Sabiduría» como referente implícito de αὐτήν, en continuidad con el contexto inmediato de Sirácida 1.
  - Se evita «SEÑOR» por el nombre divino; el griego aquí tiene αὐτόν y el contexto apunta a Dios, por lo que se traduce «lo».
  - «Carne» conserva el valor colectivo concreto del griego; no se reduce a «humanidad» para no estrechar el alcance.
