translation:
  language: es
  text: Entonces se levantó, fue y siguió hacia Samaria. Estaba en Bet-Équed[a] de los pastores, en el camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bet-Équed probablemente funciona como nombre de lugar. El hebreo podría sugerir algo como «casa de reunión» o, según otras interpretaciones del topónimo, un sitio asociado con el esquileo o la atadura de los pastores; por eso se deja como topónimo en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: Then he arose
  chosen_spanish: Entonces se levantó
  alternatives_spanish:
  - Entonces se puso en pie
  - Entonces se alzó
  lexicon: HALOT
  rationale: El wayyiqtol de קום marca la secuencia narrativa. «Se levantó» conserva ese movimiento sin sonar arcaico en español.
- source_word: וַיָּבֹא
  english_pob_choice: went
  chosen_spanish: y fue
  alternatives_spanish:
  - y vino
  - y llegó
  lexicon: HALOT
  rationale: בוא puede ser «venir» o «ir» según el punto de vista. En español narrativo, «fue» fluye mejor con la secuencia de acciones.
- source_word: וַיֵּלֶךְ שֹׁמְרוֹן
  english_pob_choice: traveled to Samaria
  chosen_spanish: a Samaria
  alternatives_spanish:
  - a Samaria, viajando
  - hacia Samaria
  lexicon: HALOT
  rationale: Se mantiene el destino explícito sin repetir innecesariamente el verbo de movimiento. «A Samaria» expresa el rumbo de הלך de forma natural y fiel.
- source_word: הוּא
  english_pob_choice: He was
  chosen_spanish: Estaba
  alternatives_spanish:
  - Y él estaba
  - Él estaba
  lexicon: HALOT
  rationale: El pronombre independiente introduce una circunstancia de ubicación. En español, «Estaba» comunica de manera clara la situación espacial indicada por el hebreo.
- source_word: בֵּית עֵקֶד
  english_pob_choice: Beth-eked
  chosen_spanish: Bet-edec
  alternatives_spanish:
  - Beth-eked
  - Bet-Eked
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre propio. «Bet-edec» adapta la transliteración al español y evita traducir una etimología incierta en el texto principal.
- source_word: הָרֹעִים
  english_pob_choice: of the shepherds
  chosen_spanish: de los pastores
  alternatives_spanish:
  - de los ganaderos
  - de los pastores/ganaderos
  lexicon: HALOT
  rationale: רֹעִים significa de forma directa «pastores» o «ganaderos». «Pastores» es el equivalente más inmediato y natural en español.
- source_word: בַּדָּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - junto al camino
  - por el camino
  lexicon: HALOT
  rationale: La expresión sitúa el lugar en relación con la ruta. «En el camino» es idiomático en español y conserva el sentido locativo.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético de 2 Reyes 10:12 y el trazado del POB en inglés. La versión inglesa reciente no mostró cambios sustanciales; se mantuvo la lectura de topónimo para Beth-eked y se evitó traducir su etimología en el cuerpo principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo presente el nombre divino; aquí no aparece.
  - Se mantiene «Samaria» como topónimo tradicional en español.
  - Se evita «SEÑOR» o una traducción teológica no pertinente porque el versículo es narrativo y no contiene referencia divina explícita.
  - «Pastores» traduce רֹעִים de forma directa; no se fuerza «siervos» ni otro término eclesiástico.
