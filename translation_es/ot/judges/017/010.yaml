base_translation:
  language: en
  yaml_path: translation/ot/judges/017/010.yaml
  text: Micah said to him[a], “Stay with me, and be a father and a priest to me, and I will give you ten pieces of silver a year, a set of clothes[c][b], and your living.” So the Levite went in.
  footnotes:
  - marker: a
    text: Hebrew literally 'ten silver'; the unit is not specified, so 'ten shekels of silver' is a common interpretive rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'an allowance of clothing.'
    reason: lexical_alternative
  - marker: c
    text: Or simply 'the Levite went'; the Hebrew verb is 'went,' though in context it may imply that he entered Micah's household.
    reason: lexical_alternative
