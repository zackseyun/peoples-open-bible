review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: fórmula profética, anuncio inminente de juicio, ''espada'' como imagen de guerra, y la fórmula fija ''hombre y bestia''. Sin embargo, la renderización de אֲדֹנָי יְהוִה como ''el Señor Yahvé'' añade un artículo y una combinación menos natural en español; además, ''cortaré de ti'' suena incompleto para וְהִכְרַתִּי מִמֵּךְ y conviene explicitar el objeto suprimido en español.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero ''He aquí'' y ''cortaré de ti al hombre y a la bestia'' resultan algo rígidos. Una formulación más natural y fiel sería ''Mira'' o mantener ''He aquí'' según registro; el problema principal es verbal: ''eliminaré de ti a hombre y bestia'' o ''extirparé de ti...'' suena mejor que ''cortaré de ti...''. También conviene ajustar el título divino a ''el Señor, Yahvé''.'
  glossary_alignment: Alinea bien con el proyecto en usar 'Yahvé' para יהוה. 'Hombre y bestia' preserva la fórmula, aunque en español dentro de la sintaxis verbal es mejor 'a hombre y bestia' sin artículo duplicado. No hay conflicto con otros términos clave.
  issues:
  - severity: medium
    issue: Título divino 'el Señor Yahvé'
    rationale: Para אֲדֹנָי יְהוִה, el español más natural y legible es 'el Señor, Yahvé' o 'el Señor Yahvé' según estilo, pero aquí la aposición con coma ayuda a distinguir los dos elementos del título y evita una secuencia algo apelmazada.
  - severity: high
    issue: '''cortaré de ti al hombre y a la bestia'' es poco natural en español'
    rationale: Aunque כרת preserva la imagen de 'cortar', en español transitivo sin complemento explícito queda forzado. En este contexto profético, 'eliminaré de ti a hombre y bestia' comunica fielmente la remoción/exterminio sin sonar calcado.
  - severity: low
    issue: Anclaje de nota b en 'bestia' en vez de en la frase completa
    rationale: La nota explica la fórmula completa 'hombre y bestia', por lo que el anclaje conviene al sintagma entero o al final de la frase, no solo a 'bestia'.
  revised_spanish_text: 'Por tanto, así dice el Señor, Yahvé: He aquí, voy a traer una espada[a] contra ti, y eliminaré de ti a hombre y bestia[b].'
  revised_footnotes:
  - marker: a
    text: 'O: «voy a traer la espada contra ti». En hebreo, «espada» puede funcionar como imagen colectiva de guerra y juicio.'
    reason: lexical_alternative
  - marker: b
    text: «Hombre y bestia» es una fórmula fija de juicio que significa tanto seres humanos como animales.
    reason: cultural_note
  revision_rationale: Se ajusta el título divino para reflejar con más claridad el compuesto אֲדֹנָי יְהוִה en español y se reemplaza 'cortaré de ti' por 'eliminaré de ti' para evitar un calco torpe, manteniendo el sentido de juicio y remoción total. También se ubica mejor la nota de la fórmula 'hombre y bestia'.
