lexical_decisions:
- source_word: וְ/נַחְשׁוֹן
  english_pob_choice: Nahshon
  chosen_spanish: Nahsón
  alternatives_spanish:
  - Naasón
  lexicon: HALOT
  rationale: Nombre propio; lo translitero al español de forma natural. «Nahsón» conserva mejor la forma hebrea נַחְשׁוֹן y evita una adaptación innecesaria.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En genealogías, el hifil de ילד indica causar descendencia o ser padre de. «Engendró» mantiene la fuerza genealógica y funciona bien en español bíblico sin ser excesivamente arcaico.
- source_word: שַׂלְמָא
  english_pob_choice: Salma
  chosen_spanish: Salma
  alternatives_spanish:
  - Salmón
  lexicon: HALOT
  rationale: El hebreo de este versículo es שַׂלְמָא, así que conservo «Salma» como forma principal. Esto preserva la forma del texto fuente frente a armonizaciones con otras genealogías.
- source_word: בֹּעַז
  english_pob_choice: Boaz
  chosen_spanish: Boaz
  lexicon: HALOT
  rationale: Nombre propio; se mantiene la transliteración estándar al español.
theological_decisions:
- issue: Armonización genealógica con otros pasajes
  english_pob_reading: Some translations read Salmon to harmonize with related genealogies (for example, Ruth 4:20–21; Matt. 1:4–5).
  chosen_spanish_reading: Se mantiene «Salma» según el hebreo de este versículo, sin armonizar aquí con otras genealogías.
  alternative_spanish_readings:
  - Salmón para armonizar con Rut 4:20–21 y Mateo 1:4–5.
  rationale: La evidencia textual inmediata de 1 Crónicas 2:11 apoya «Salma». La armonización es una posibilidad interpretativa conocida, pero no debe reemplazar la lectura del texto base en la línea principal.
  doctrine_reference: Crítica textual y armonización genealógica
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto base; no se requieren revisiones sustantivas respecto del audit trail en inglés. Se conserva la variante genealógica documentada como nota, no como lectura principal.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo, por lo que no hay decisión sobre Yahvé.
  - Se usa «engendró» de manera consistente con genealogías bíblicas y con el valor causativo del hifil.
  - La nota al pie preserva la alternativa documentada sin desplazar la lectura principal del hebreo.
