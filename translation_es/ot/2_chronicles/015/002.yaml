  to: 'Y salió al encuentro de Asa y le dijo: «Escúchenme, Asa, y todo Judá y Benjamín: Yahvé está con ustedes mientras ustedes estén con él. Si lo buscan, se dejará encontrar[a] por ustedes; pero si lo abandonan, él los abandonará».'
  rationale: Se elimina la nota innecesaria sobre 'le dijo' y se traslada la nota al punto realmente debatible del versículo, en línea con el rastro de auditoría inglés. También se mejora la naturalidad del español en יִמָּצֵא לָכֶם con 'se dejará encontrar por ustedes', preservando a la vez la alternativa más literal en nota.
