revisions:
- from: Mira[a], estoy reprendiéndoles su simiente, y esparciré estiércol[b] sobre sus rostros —el estiércol de sus fiestas—, y serán llevados con él[c].
  to: Miren, estoy reprendiendo su simiente[a], y esparciré estiércol[b] sobre sus rostros —el estiércol de sus fiestas—, y serán llevados con él[c].
  rationale: Se corrige el anclaje de la nota [a] para que recaiga sobre «simiente», que es el término realmente comentado. Se sustituye «Mira» por «Miren» para concordar con el destinatario plural y sonar natural en español. También se mejora «estoy reprendiéndoles su simiente» a «estoy reprendiendo su simiente», que preserva el sentido del hebreo y del POB pero evita una construcción torpe. Se pulen además la tipografía y el estilo de la nota [a].
