review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en lo esencial: הַמַּלְאָכִים como mensajeros humanos, וְהִנֵּה con fuerza de descubrimiento, תְּרָפִים mantenido por transliteración, y la ubicación del objeto en la cama. Sin embargo, las notas no preservan bien el rastro auditado del inglés: la nota [a] cambia las alternativas documentadas para תְּרָפִים y la nota [b] comenta אֶל en vez del término raro כביר, que es donde el POB inglés colocó la aclaración principal.'
  spanish_quality_summary: El español es claro y mayormente natural, pero “he aquí” suena algo rígido en esta línea y “una cubierta” es menos idiomático que una opción como “un cobertor” para un elemento de cama. Además, la nota [a] está anclada en “mensajeros” pero debería anclarse en “terafim” si se quiere reflejar la nota lexical del inglés. La frase final funciona, aunque “a su cabecera” puede mantenerse.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: no hay nombres divinos ni títulos mesiánicos en juego; la transliteración de תְּרָפִים como “terafim” concuerda con la decisión teológica del POB. La principal desviación está en las notas: deben explicar “terafim” y el término raro de cobertura, no sustituirlos por otras observaciones.'
  issues:
  - severity: medium
    issue: La nota [a] está en el lugar léxico equivocado.
    rationale: El POB inglés pone la nota [a] sobre “the teraphim”, no sobre “the messengers”. En español, si se conservan notas, la marca debe ir en “terafim” y explicar las alternativas “ídolo doméstico” / “imagen idolátrica” o equivalente.
  - severity: medium
    issue: La nota [b] no corresponde al término auditado.
    rationale: La nota inglesa [b] explica el raro hebreo כביר como un tipo de cobertura tejida, no la preposición אֶל. El español debe preservar esa justificación lexical.
  - severity: low
    issue: “una cubierta” es comprensible pero poco natural en contexto de cama.
    rationale: “Cobertor” comunica mejor en español la función de una pieza de cama sin sobreinterpretar más que el hebreo.
  - severity: low
    issue: “he aquí” es fiel pero algo tieso para español contemporáneo.
    rationale: Puede conservarse por dignidad bíblica, pero “y resultó que” o “y allí estaba” serían más naturales. No obstante, no es un error grave.
  revised_spanish_text: Cuando entraron los mensajeros, he aquí, el terafim[a] estaba en la cama, y un cobertor[b] de pelo de cabra estaba a su cabecera.
  revised_footnotes:
