base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/031/006.yaml
  text: And the people of Israel and Judah who lived in the cities of Judah also brought the tithe of cattle and sheep[a], and the tithe of the holy things consecrated to Yahweh their God, and they laid them in heaps[b], heap upon heap.
  footnotes:
  - marker: a
    text: Or 'the tithe of consecrated things' or 'the tithe of holy gifts.' The Hebrew likely refers to items dedicated to God as holy.
    reason: lexical_alternative
  - marker: b
    text: Or 'in heaps, heap upon heap'.
    reason: previous_rendering
