translation:
  language: es
  text: 'Entonces Samuel dijo a Saúl: «¿Por qué me has inquietado al hacerme subir?» Saúl respondió: «Estoy muy angustiado. Los filisteos están combatiendo contra mí, y Dios se ha apartado de mí y ya no me responde, ni por los profetas[a] ni por los sueños. Por eso te he llamado para hacerme saber lo que debo hacer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por la mano de los profetas», un giro idiomático que significa «por medio de los profetas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְגַּזְתַּנִי
  english_pob_choice: have you disturbed me
  chosen_spanish: me has inquietado
  alternatives_spanish:
  - me has molestado
  - me has perturbado
  lexicon: HALOT
  rationale: El verbo expresa causar agitación o inquietud. «Inquietado» conserva la idea de perturbación sin sonar demasiado fuerte ni técnico en español.
- source_word: לְהַעֲלוֹת אֹתִי
  english_pob_choice: by bringing me up
  chosen_spanish: al hacerme subir
  alternatives_spanish:
  - al traerme arriba
  - al subirme
  lexicon: HALOT
  rationale: עלה mantiene la imagen espacial de ‘subir’ en este contexto necromántico. «Hacerme subir» preserva esa imagen sin convertirla en lenguaje de resurrección.
- source_word: צַר לִי מְאֹד
  english_pob_choice: I am in great distress
  chosen_spanish: Estoy muy angustiado
  alternatives_spanish:
  - Estoy en gran aflicción
  - Estoy muy apremiado
  lexicon: HALOT
  rationale: La frase idiomática comunica una presión o angustia intensa. «Angustiado» es natural en español y refleja bien el estado emocional de Saúl.
- source_word: נִלְחָמִים בִּי
  english_pob_choice: are fighting against me
  chosen_spanish: están peleando contra mí
  alternatives_spanish:
  - están guerreando contra mí
  - me están combatiendo
  lexicon: HALOT
  rationale: La construcción indica hostilidad dirigida contra Saúl. «Peleando contra mí» es claro y directo; conserva el sentido militar del verbo.
- source_word: וֵאלֹהִים סָר מֵעָלַי
  english_pob_choice: God has turned away from me
  chosen_spanish: Dios se ha apartado de mí
  alternatives_spanish:
  - Dios se ha alejado de mí
  - Dios se ha retirado de mí
  lexicon: HALOT
  rationale: סור מעל expresa apartarse o retirarse. «Se ha apartado de mí» mantiene la relación personal y el matiz de abandono relacional sin sobreinterpretar la situación.
- source_word: וְלֹא עָנָנִי עוֹד
  english_pob_choice: and no longer answers me
  chosen_spanish: y ya no me responde
  alternatives_spanish:
  - y ya no me contesta
  - y no me responde más
  lexicon: HALOT
  rationale: ענה aquí significa responder. «Ya no me responde» reproduce bien la cesación de la respuesta divina y suena natural en español.
- source_word: בְּיַד הַנְּבִיאִם
  english_pob_choice: either by the prophets
  chosen_spanish: ni por los profetas[a]
  alternatives_spanish:
  - ni mediante los profetas
  - ni por medio de los profetas
  lexicon: HALOT
  rationale: ביד puede expresar medio o agencia. El español «por los profetas» mantiene la concisión del hebreo; la nota aclara el valor idiomático de la expresión.
- source_word: בַּחֲלֹמוֹת
  english_pob_choice: or by dreams
  chosen_spanish: ni por los sueños[b]
  alternatives_spanish:
  - ni mediante sueños
  - ni por medio de los sueños
  lexicon: HALOT
  rationale: La segunda mitad del paralelismo también marca un medio de comunicación. «Sueños» conserva el término simple; la correlación negativa con «ni... ni...» refleja el paralelismo del hebreo.
- source_word: וָאֶקְרָאֶה לְךָ
  english_pob_choice: So I have called for you
  chosen_spanish: Por eso te he llamado
  alternatives_spanish:
  - Así que te he llamado
  - Por eso te he convocado
  lexicon: HALOT
  rationale: קרא con ל puede significar llamar a alguien. «Te he llamado» sigue de cerca el valor verbal sin añadir solemnidad ajena al contexto.
- source_word: לְהוֹדִיעֵנִי
  english_pob_choice: to tell me
  chosen_spanish: para hacerme saber
  alternatives_spanish:
  - para informarme
  - para decirme
  lexicon: HALOT
  rationale: Hifil de ידע = hacer saber. «Hacerme saber» conserva mejor la fuerza causativa que un simple «decirme».
- source_word: מָה אֶעֱשֶׂה
  english_pob_choice: what I should do
  chosen_spanish: lo que debo hacer
  alternatives_spanish:
  - lo que tengo que hacer
  - qué debo hacer
  lexicon: HALOT
  rationale: La pregunta indirecta expresa una solicitud de orientación. «Lo que debo hacer» es idiomático en español y mantiene el contenido directivo.
theological_decisions:
- issue: Presentación de Samuel en la narrativa necromántica
  english_pob_reading: Translate the narrative straightforwardly as presenting Samuel speaking to Saul, without adding interpretive qualifiers such as 'supposedly' or 'apparition.'
  chosen_spanish_reading: Traducir directamente a Samuel como el hablante, sin añadir marcas interpretativas como «supuestamente» o «aparición».
  alternative_spanish_readings:
  - «supuesto Samuel dijo»
  - «la figura de Samuel dijo»
  - «un espíritu que parecía Samuel dijo»
  rationale: 'El hebreo presenta la escena como diálogo directo: «Samuel dijo a Saúl». La traducción debe reflejar esa presentación textual sin resolver debates teológicos externos al versículo.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que simplificó «called for you» a «called you» y quitó el artículo antes de «prophets». La versión española refleja esa misma direccionalidad más directa y conserva el paralelismo hebreo con una negación correlativa clara.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, en coherencia con el estándar del proyecto.
  - Se usa el nombre «Samuel» y «Saúl» de forma consistente con la forma castellana habitual.
  - Se conserva el paralelismo negativo «ni... ni...» para reflejar la estructura de גם ... גם en este contexto.
  - «Profetas» se deja sin artículo en el cuerpo, siguiendo la relación más directa del hebreo y la revisión del POB en inglés.
