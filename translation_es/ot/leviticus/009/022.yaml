translation:
  language: es
  text: Entonces Aarón alzó sus manos[a] hacia el pueblo y los bendijo, y descendió de ofrecer la ofrenda por el pecado[b], el holocausto y las ofrendas de paz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su mano'; la forma hebrea es singular, pero el gesto se entiende comúnmente de manera colectiva como levantar las manos en bendición.
    reason: lexical_alternative
  - marker: b
    text: O 'ofrenda de purificación' para 'ofrenda por el pecado'.
    reason: lexical_alternative
  - marker: c
    text: O 'ofrendas de comunión' u 'ofrendas de bienestar' para 'ofrendas de paz'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  english_pob_choice: lifted up
  chosen_spanish: alzó
  alternatives_spanish:
  - levantó
  - alzó sus manos
  lexicon: HALOT
  rationale: נשא con 'mano' expresa el gesto de levantar para bendecir. 'Alzó' es natural y solemne en español; el complemento 'sus manos' explicita el sentido colectivo del hebreo singular con sufijo, siguiendo el audit trail inglés.
- source_word: יָדוֹ
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - su mano
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el gesto sacerdotal se entiende de manera distributiva como ambas manos. 'Sus manos' comunica el uso idiomático en español sin perder la base textual.
- source_word: אֶל הָעָם
  english_pob_choice: toward the people
  chosen_spanish: hacia el pueblo
  alternatives_spanish:
  - al pueblo
  - sobre el pueblo
  lexicon: HALOT
  rationale: אֶל marca dirección. 'Hacia' conserva la orientación espacial del gesto mejor que una simple destinación verbal.
- source_word: וַיְבָרְכֵם
  english_pob_choice: and blessed them
  chosen_spanish: y los bendijo
  alternatives_spanish:
  - y pronunció una bendición sobre ellos
  lexicon: HALOT
  rationale: ברך en piel significa bendecir. 'Los bendijo' es claro, reverente y fiel al sentido directo.
- source_word: וַיֵּרֶד
  english_pob_choice: and he came down
  chosen_spanish: y descendió
  alternatives_spanish:
  - y bajó
  - y vino abajo
  lexicon: HALOT
  rationale: ירד es 'descender'. 'Descendió' preserva el valor formal y cultual del movimiento después del servicio sacrificial.
- source_word: מֵעֲשֹׂת
  english_pob_choice: from offering
  chosen_spanish: de ofrecer
  alternatives_spanish:
  - después de ofrecer
  - de realizar
  lexicon: HALOT
  rationale: El infinitivo constructo con מן señala salida o transición desde la acción completada. 'De ofrecer' refleja la relación verbal sin volverlo demasiado interpretativo.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda de purificación
  - el sacrificio por el pecado
  lexicon: HALOT
  rationale: En Levítico, חטאת es un término técnico. 'Ofrenda por el pecado' conserva la identificación tradicional en español y deja visible la relación semántica que el inglés POB mantiene con 'sin offering', sin excluir la alternativa funcional de 'ofrenda de purificación'.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  lexicon: HALOT
  rationale: עֹלָה corresponde al sacrificio que asciende en humo. 'Holocausto' es el término bíblico tradicional y reconocible en español; se mantiene por su valor técnico, aunque 'ofrenda quemada' explicita la forma.
- source_word: הַשְּׁלָמִים
  english_pob_choice: the peace offerings
  chosen_spanish: las ofrendas de paz
  alternatives_spanish:
  - las ofrendas de comunión
  - las ofrendas de bienestar
  lexicon: HALOT
  rationale: שׁלמים admite varias matizaciones. 'Ofrendas de paz' conserva la equivalencia tradicional y permite la nota de alternativas de sentido más relacional o de bienestar, como en el audit trail inglés.
theological_decisions:
- issue: Terminología sacrificial técnica en Levítico
  english_pob_reading: Use established cultic terms 'sin offering,' 'burnt offering,' and 'peace offerings' in the main text
  chosen_spanish_reading: 'Usar en el texto principal términos cultuales establecidos: ''ofrenda por el pecado'', ''holocausto'' y ''ofrendas de paz'''
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda quemada
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: El pasaje presenta categorías sacrificiales técnicas. Mantener equivalentes establecidos en español conserva la coherencia interna del libro y la inteligibilidad eclesial, mientras se reconocen las alternativas funcionales sin borrarlas.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Forma singular del hebreo para 'mano' frente al gesto sacerdotal colectivo
  english_pob_reading: Or 'his hand'; the Hebrew form is singular, but the gesture is commonly understood collectively as lifting the hands in blessing.
  chosen_spanish_reading: 'Conservar el gesto como plural idiomático: ''sus manos'''
  alternative_spanish_readings:
  - su mano
  rationale: Aunque el texto hebreo dice singular, el contexto ritual apunta al gesto de bendición con ambas manos. La traducción plural evita una falsa literalidad que oscurezca el uso idiomático reconocido.
  doctrine_reference: Translation philosophy §3 (Lexical and idiomatic transparency)
- issue: Valor de 'peace offerings'
  english_pob_reading: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
  chosen_spanish_reading: '''Ofrendas de paz'' en el texto principal, con alternativas semánticas preservadas'
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: '''Paz'' mantiene la tradición bíblica española, pero las opciones alternativas ayudan a no absolutizar una sola explicación teológica del término técnico.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Revisión auditada: el contexto inglés ya estaba en alto acuerdo y sin cambios aplicados; esta versión española sigue el mismo trazado léxico y sacrificial, conservando las alternativas documentadas para transparencia textual.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera del versículo porque no aparece en el hebreo de este pasaje.
  - 'Se conserva la secuencia cultual: bendición, descenso y enumeración de las ofrendas, sin reordenar el hebreo.'
  - Se usa terminología sacrificial estable en español, con notas de alternativa para no borrar la tensión lexical documentada.
  - El marcador [a] aparece en el punto del gesto de las manos; [b] y [c] marcan términos técnicos de ofrenda conforme al audit trail.
