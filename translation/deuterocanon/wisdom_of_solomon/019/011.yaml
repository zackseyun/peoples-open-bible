translation:
  text: Later they also saw a new generation of birds[a], when, driven by craving, they asked for delicacies of luxury[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a new kind of birds.' The Greek νέαν γένεσιν ὀρνέων can emphasize either a fresh production/appearance or, less likely, a new sort of bird.
    reason: lexical_alternative
  - marker: b
    text: That is, they sought special foods for pleasure rather than mere nourishment; compare the wilderness craving tradition in Exodus 16 and Numbers 11.
    reason: cross_reference
lexical_decisions:
- source_word: ἐφʼ ὑστέρῳ
  chosen: Later on
  alternatives:
  - afterward
  - subsequently
  - at a later time
  lexicon: LSJ
  rationale: The phrase marks a later stage in the narrative sequence. 'Later on' is natural modern English and preserves the temporal progression without sounding wooden.
- source_word: εἶδον
  chosen: they saw
  alternatives:
  - they witnessed
  - they observed
  lexicon: LSJ
  rationale: A straightforward rendering of the aorist of ὁράω. 'Saw' is sufficiently direct and fits the narrative style.
- source_word: νέαν γένεσιν ὀρνέων
  chosen: a new generation of birds
  alternatives:
  - a fresh production of birds
  - a new kind of birds
  - a new birth of birds
  lexicon: LSJ
  rationale: γένεσις here denotes coming-into-being or production. 'Generation' preserves the creation/beginnings nuance better than the flatter 'kind,' while 'of birds' keeps ὀρνέων broad rather than specifying a species.
- source_word: ὅτε
  chosen: when
  alternatives:
  - at the time when
  lexicon: LSJ
  rationale: Simple temporal connector introducing the circumstance under which the birds appeared.
- source_word: ἐπιθυμίᾳ
  chosen: by craving
  alternatives:
  - by desire
  - by lust
  - by appetite
  lexicon: LSJ
  rationale: ἐπιθυμία can range from desire to craving. In this wilderness-food context, 'craving' best conveys excessive appetite without importing sexual connotations.
- source_word: προαχθέντες
  chosen: driven
  alternatives:
  - led on
  - urged forward
  - carried away
  lexicon: LSJ
  rationale: The participle indicates being impelled onward by desire. 'Driven' captures the force of compulsion in idiomatic English.
- source_word: ᾐτήσαντο
  chosen: they asked for
  alternatives:
  - they requested
  - they demanded
  lexicon: LSJ
  rationale: The middle form means they made a request. 'Asked for' is the most neutral rendering; 'demanded' would overstate the verb itself.
- source_word: ἐδέσματα
  chosen: delicacies
  alternatives:
  - foods
  - dishes
  - choice foods
  lexicon: LSJ
  rationale: The term refers to prepared foods or dainties rather than mere sustenance. 'Delicacies' preserves the sense of special, pleasurable food.
- source_word: τρυφῆς
  chosen: for indulgence
  alternatives:
  - for luxury
  - for pleasure
  - of luxury
  lexicon: LSJ
  rationale: τρυφή denotes luxury, softness, or self-indulgent enjoyment. Rendered adverbially in English as 'for indulgence' to show the food was sought not from need but from indulgent desire.
