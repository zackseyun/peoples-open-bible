review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido del griego: ὅπως + subjuntivo se vierte correctamente como «para que ... sea»; la repetición de ἐν τῷ κρυπτῷ se conserva con «en secreto» en ambas cláusulas; «tu Padre que ve en secreto» respeta ὁ πατήρ σου ὁ βλέπων ἐν τῷ κρυπτῷ; y «te recompensará» transmite adecuadamente ἀποδώσει con el matiz positivo documentado. La única corrección necesaria es en la nota alternativa de ἀποδώσει: el inglés auditado tiene «will repay you», que en español corresponde mejor a «te retribuirá» o «te devolverá», no «te pagará», que suena demasiado comercial y menos fiel al registro del contexto.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español eclesial contemporáneo. «Limosna» funciona, aunque es más tradicional que la opción explicativa «dar a los pobres»; dado que el audit trail permite esa forma tradicional con nota, es aceptable. La redacción de la nota [a] necesita un ajuste menor: si el texto principal usa singular («tu limosna»), la alternativa no debería ser «limosnas» sino más bien «dar a los pobres» o «limosna», para evitar una falsa alternativa morfológica. También conviene sustituir las comillas tipográficas inglesas por comillas españolas.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. La decisión «limosna» para ἐλεημοσύνη es permisible por el rationale documentado, siempre que la nota conserve la explicación específica «dar a los pobres». «Te recompensará» está alineado con la decisión teológica de no sobredefinir la naturaleza de la recompensa.
  issues:
  - severity: medium
    issue: La nota [b] usa «te pagará» como alternativa para ἀποδώσει.
    rationale: Aunque formalmente posible, «pagar» introduce un matiz comercial y más duro que el inglés auditado «will repay you». «Te retribuirá» preserva mejor la idea de retribución sin rebajar el registro.
  - severity: low
    issue: La nota [a] ofrece «limosnas» como alternativa.
    rationale: No corresponde bien al singular del texto principal («tu limosna») ni reproduce la alternativa inglesa principal, que explica el sentido como «dar a los pobres». Una nota explicativa como «O “dar a los pobres”» es más fiel al audit trail.
  revised_spanish_text: para que tu limosna[a] sea en secreto; y tu Padre que ve en secreto te recompensará[b].
  revised_footnotes:
  - marker: a
    text: O «dar a los pobres». El término griego se refiere específicamente a dar a los pobres.
    reason: lexical_alternative
  - marker: b
    text: O «te retribuirá».
    reason: alternative_reading
  revision_rationale: 'Se conserva intacto el texto principal porque es fiel y natural. Solo se corrigen las notas para alinearlas mejor con el audit trail inglés y con un español más preciso: [a] ahora refleja la alternativa explicativa real de ἐλεημοσύνη, y [b] evita el matiz comercial de «te pagará».'
