translation:
  language: es
  text: antes de que fuera descubierta tu maldad[a], como en el tiempo de la afrenta de las hijas de Aram[b] y de todas las que la rodean, las hijas de los filisteos[c], que te desprecian por todos lados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «fuera revelada» o «fuera expuesta» para «fuera descubierta».'
    reason: lexical_alternative
  - marker: b
    text: «Aram» suele traducirse tradicionalmente como «Siria». El hebreo dice literalmente «las hijas de Aram».
    reason: alternative_reading
  - marker: c
    text: «Las hijas de los filisteos» es un hebraísmo para el pueblo filisteo o sus ciudades.
    reason: cultural_note
lexical_decisions:
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  - previo a que
  lexicon: HALOT
  rationale: La expresión introduce una anterioridad clara; en español, «antes de que» conserva bien la relación temporal con una cláusula verbal finita y suena natural.
- source_word: תִּגָּלֶה
  english_pob_choice: was uncovered
  chosen_spanish: fuera descubierta
  alternatives_spanish:
  - fuera revelada
  - fuera expuesta
  lexicon: HALOT
  rationale: El nifal de גלה comunica la idea de quedar al descubierto. «Descubierta» mantiene la imagen de exposición y funciona bien con el marco de vergüenza del versículo.
- source_word: רָעָתֵךְ
  english_pob_choice: your wickedness
  chosen_spanish: tu maldad
  alternatives_spanish:
  - tu perversidad
  - tu mal
  lexicon: HALOT
  rationale: «Maldad» comunica culpa moral sin sonar artificial en español; conserva el tono acusatorio del profeta. «Wickedness» no exige siempre el calco «maldad» en sentido técnico, pero aquí sí expresa la carga ética.
- source_word: כְּמוֹ עֵת
  english_pob_choice: as at the time of
  chosen_spanish: como en el tiempo de
  alternatives_spanish:
  - como en la época de
  - tal como en el tiempo de
  lexicon: HALOT
  rationale: La comparación temporal se mantiene de forma directa y legible. «Como en el tiempo de» reproduce el paralelismo sin añadir matices inexistentes.
- source_word: חֶרְפַּת
  english_pob_choice: the reproach of
  chosen_spanish: la afrenta de
  alternatives_spanish:
  - el oprobio de
  - la vergüenza de
  lexicon: HALOT
  rationale: «חרפה» combina vergüenza y desprecio público. «Afrenta» preserva la idea de deshonra y trato humillante en un español bíblico claro.
- source_word: בְּנוֹת אֲרָם
  english_pob_choice: the daughters of Aram
  chosen_spanish: las hijas de Aram
  alternatives_spanish:
  - las mujeres de Aram
  - las hijas de Siria
  lexicon: HALOT
  rationale: Se conserva el giro hebreo «hijas de» como designación idiomática del pueblo/ciudades. No se sustituye por «Siria» en el texto principal para no borrar el dato hebreo, aunque sea una equivalencia tradicional posible.
- source_word: וְכָל סְבִיבוֹתֶיהָ
  english_pob_choice: and all those around her
  chosen_spanish: y de todas las que la rodean
  alternatives_spanish:
  - y de todos los que la rodean
  - y de todo lo que la rodea
  lexicon: HALOT
  rationale: El sufijo femenino singular se refiere al colectivo mencionado y el contexto pide habitantes circundantes; «las que la rodean» hace explícita la referencia sin perder el sentido colectivo.
- source_word: בְּנוֹת פְּלִשְׁתִּים
  english_pob_choice: the daughters of the Philistines
  chosen_spanish: las hijas de los filisteos
  alternatives_spanish:
  - las hijas de Filistea
  - las mujeres de los filisteos
  lexicon: HALOT
  rationale: Se mantiene el hebraísmo idiomático «hijas de» para el colectivo filisteo, como en la POB inglesa. «Filisteos» conserva el referente étnico literal.
- source_word: הַשָּׁאטוֹת
  english_pob_choice: who despise you
  chosen_spanish: que te desprecian
  alternatives_spanish:
  - que te deshonran
  - que se burlan de ti
  lexicon: HALOT
  rationale: El participio expresa una actitud continua de desprecio; «desprecian» es la correspondencia más directa y suficientemente amplia para abarcar el menosprecio hostil.
- source_word: מִסָּבִיב
  english_pob_choice: from every side
  chosen_spanish: por todos lados
  alternatives_spanish:
  - de todos lados
  - desde todos lados
  lexicon: HALOT
  rationale: La idea es de hostilidad circundante e intensa. «Por todos lados» suena natural en español y preserva la imagen de cerco.
theological_decisions:
- issue: Si "חרפה" debe leerse como simple vergüenza o como deshonra pública y reproche
  english_pob_reading: the reproach of
  chosen_spanish_reading: la afrenta de
  alternative_spanish_readings:
  - la vergüenza de
  - el oprobio de
  - la deshonra de
  rationale: El contexto habla de exposición pública de la culpa y de desprecio por otros pueblos. «Afrenta» conserva la dimensión pública, humillante y relacional del término sin reducirlo a un sentimiento interno.
  doctrine_reference: Sabiduría profética sobre vergüenza pública y humillación del pecado; cf. el uso social de חרפה en textos de reproche.
- issue: Si el hebraísmo "hijas de X" debe explicarse o trasladarse literalmente
  english_pob_reading: the daughters of Aram / the daughters of the Philistines
  chosen_spanish_reading: las hijas de Aram / las hijas de los filisteos
  alternative_spanish_readings:
  - las mujeres de Aram / las mujeres de los filisteos
  - el pueblo de Aram / el pueblo filisteo
  rationale: La POB inglesa preserva el idiomático hebreo. En español, mantener «hijas de» respeta el dato textual y la imagen colectiva; una nota aclara el valor idiomático para evitar una lectura meramente biológica.
  doctrine_reference: Principio de fidelidad al hebraísmo cuando no oscurece el sentido y puede ser explicado por nota.
- issue: La referencia del sufijo femenino en "סְבִיבוֹתֶיהָ"
  english_pob_reading: and all those around her
  chosen_spanish_reading: y de todas las que la rodean
  alternative_spanish_readings:
  - y de todos los que la rodean
  - y de todos los de alrededor
  rationale: El antecedente inmediato es Aram y el colectivo circundante se expresa en femenino plural por el hebreo idiomático. En español, «las que la rodean» mantiene el referente colectivo sin forzar un singular abstracto.
  doctrine_reference: Coherencia textual y atención al referente colectivo en profecía de reproche.
translation_notes:
  revision_awareness: 'Se ha seguido el estado de revisión más reciente indicado como sin cambios. El borrador español mantiene la lectura de alta concordancia: anterioridad temporal, exposición pública de la maldad, hebraísmos colectivos («hijas de X») y la nota idiomática para Aram/Filisteos conforme al audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene un registro neutral latinoamericano y una sintaxis digna, evitando calcos demasiado rígidos.
  - «Maldad» y «desprecian» preservan el tono acusatorio sin introducir intensificación no sustentada por el hebreo.
  - La puntuación y las comillas siguen el uso español; las notas se anclan en los elementos que presentan alternativa lexical o idiomática.
