translation:
  language: es
  text: Pues ni hierba[a] ni emplasto[b] los sanó, sino tu palabra, oh Yahvé, sana todas las cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «planta» para «hierba». El término griego puede referirse más ampliamente a la vegetación, pero aquí probablemente significa una hierba medicinal.
    reason: lexical_alternative
  - marker: b
    text: O «cataplasma» para «emplasto». El griego se refiere a una aplicación medicinal usada para sanar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βοτάνη
  english_pob_choice: herb
  chosen_spanish: hierba
  alternatives_spanish:
  - planta
  - vegetación
  - medicina
  lexicon: LSJ
  rationale: En este contexto de sanidad, el término apunta a una planta medicinal o hierba, no a vegetación en general. «Hierba» conserva el contraste con el remedio humano y suena natural en español.
- source_word: μάλαγμα
  english_pob_choice: poultice
  chosen_spanish: emplasto
  alternatives_spanish:
  - cataplasma
  - ungüento
  - apósito
  lexicon: LSJ
  rationale: El sustantivo designa una aplicación medicinal puesta sobre el cuerpo. «Emplasto» comunica un remedio físico aplicado para curar, sin diluir el sentido concreto del término.
- source_word: ἐθεράπευσεν
  english_pob_choice: healed
  chosen_spanish: sanó
  alternatives_spanish:
  - curó
  - tratò
  lexicon: BDAG
  rationale: El verbo expresa restauración efectiva, no mera atención. «Sanó» conserva el sentido de curación y encaja bien con el contraste entre remedios humanos y la acción de Dios.
- source_word: λόγος
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mandato
  - declaración
  lexicon: BDAG
  rationale: Aquí el término remite a la palabra eficaz del Señor. «Palabra» preserva la fuerza teológica y el eco de un habla divina poderosa sin añadir una lectura técnica posterior.
- source_word: ἰώμενος
  english_pob_choice: heals
  chosen_spanish: sana
  alternatives_spanish:
  - cura
  - va sanando
  lexicon: BDAG
  rationale: El participio presente describe la palabra del Señor como característicamente sanadora. «Sana» funciona como predicado natural en español y mantiene el valor durativo o habitual del original.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo
  lexicon: BDAG
  rationale: El plural neutro es amplio y universal. «Todas las cosas» conserva el alcance total y un registro solemne apropiado al texto.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - oh Dueño
  - oh Maestro
  lexicon: BDAG
  rationale: En vocativo dirigido a Dios, «Señor» es la forma natural y reverente en español. Se mantiene el valor de invocación con «oh».
theological_decisions:
- issue: Contraste entre remedios humanos y la acción eficaz de Dios
  english_pob_reading: The verse contrasts ordinary medicinal means with the Lord's effective word, without denying that medicine can exist or be useful in other contexts.
  chosen_spanish_reading: El versículo contrasta medios medicinales ordinarios con la palabra eficaz del Señor, sin negar que la medicina pueda existir o ser útil en otros contextos.
  alternative_spanish_readings:
  - Una lectura fuertemente antimedicina en la que todo remedio humano queda rechazado
  rationale: El griego dice que ni la hierba ni el emplasto los sanó en ese caso, pero la palabra del Señor sí. La traducción conserva ese contraste inmediato sin ampliarlo a una condena general de la medicina.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB, que reformuló la cláusula final como predicado completo: «heals all things». En español se reflejó con «sana todas las cosas», evitando una subordinada relativa menos directa.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para Κύριε en vocativo, de acuerdo con el uso reverente del proyecto.
  - Se evitó «SEÑOR» como máscara tipográfica para preservar el nombre/divino apelativo en español.
  - «Hierba» y «emplasto» conservan el contraste entre remedios ordinarios y la palabra eficaz de Dios.
  - La cláusula final se formuló como predicado completo para corresponder al ajuste editorial más reciente del texto base.
