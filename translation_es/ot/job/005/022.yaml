translation:
  language: es
  text: Ante la destrucción y la hambruna te reirás[a], y no temerás a las fieras de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No temas a las fieras de la tierra». La forma hebrea puede leerse como prohibición, aunque aquí probablemente funciona como promesa de seguridad.'
    reason: alternative_reading
lexical_decisions:
- source_word: שֹׁד
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - devastación
  - ruina
  lexicon: HALOT
  rationale: שֹׁד designa destrucción violenta, devastación o ruina. «Destrucción» es natural en español y conserva el paralelo con «hambre» como calamidades amenazantes.
- source_word: כָּפָן
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - famine
  - hambruna
  lexicon: HALOT
  rationale: El término puede referirse a hambre severa o hambruna. Aquí «hambre» mantiene la brevedad poética en español; «hambruna» sería una alternativa más explícita, pero menos directa al paralelismo.
- source_word: תִּשְׂחָק
  english_pob_choice: you will laugh
  chosen_spanish: te reirás
  alternatives_spanish:
  - te burlarás
  - sonreirás
  lexicon: HALOT
  rationale: El verbo puede expresar risa, con posible matiz de desprecio o triunfo sereno. «Te reirás» preserva la imagen sin fijar en exceso el matiz emocional.
- source_word: מֵחַיַּת הָאָרֶץ
  english_pob_choice: the beasts of the earth
  chosen_spanish: las fieras de la tierra
  alternatives_spanish:
  - los animales salvajes de la tierra
  - las bestias de la tierra
  lexicon: HALOT
  rationale: חַיָּה suele referir animales salvajes o fieras. «Fieras de la tierra» suena natural en registro bíblico en español y conserva el tono elevado del hebreo.
- source_word: אַל תִּירָא
  english_pob_choice: you will not fear
  chosen_spanish: no temerás
  alternatives_spanish:
  - no temas
  - no tendrás miedo
  lexicon: HALOT
  rationale: Aunque אַל con imperfecto suele formar prohibición, en este contexto poético funciona como seguridad prometida. «No temerás» refleja mejor esa lectura que una orden directa.
theological_decisions:
- issue: Fuerza de אַל תִּירָא en el contexto
  english_pob_reading: promissory assurance ('you will not fear')
  chosen_spanish_reading: aseguramiento promisor ('no temerás')
  alternative_spanish_readings:
  - prohibición ('no temas')
  rationale: El versículo continúa una serie de protecciones prometidas. Traducir «no temerás» mantiene el flujo discursivo y la seguridad implícita, sin borrar la ambigüedad gramatical del hebreo.
  doctrine_reference: Translation philosophy §3 (preserve tension where genuine ambiguity exists)
translation_notes:
  revision_awareness: El texto coincide con el pasaje hebreo y con la decisión auditada en inglés; no se registran revisiones aplicadas en la fuente inglesa más reciente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo exige explícitamente; este versículo no contiene el nombre divino.
  - Se evitó «bestias» en el texto principal porque «fieras» preserva el registro poético sin perder el sentido de animales salvajes.
  - Se optó por «hambre» para conservar el paralelismo conciso con «destrucción», dejando «hambruna» como alternativa lexical.
  - La nota reproduce la ambigüedad de אַל תִּירָא sin resolverla de forma unilateral.
