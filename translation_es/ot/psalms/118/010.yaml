translation:
  language: es
  text: Todas las naciones me rodearon; en el nombre de Yahvé[a], las destruí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las destruiré». El verbo hebreo puede entenderse con valor futuro o como una afirmación confiada en este refrán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Todas las
  - Todos los
  lexicon: HALOT
  rationale: כָּל con גּוֹיִם plural requiere un cuantificador total; en español, 'todas' concuerda naturalmente con 'naciones' y conserva el alcance completo.
- source_word: גּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto poético y hostil, גּוֹיִם designa naciones extranjeras que cercan al hablante. 'Las naciones' mantiene el sentido contextual sin cargar con connotaciones posteriores de 'gentiles'.
- source_word: סְבָבוּנִי
  english_pob_choice: surrounded me
  chosen_spanish: me rodearon
  alternatives_spanish:
  - me cercaron
  - me rodearon por completo
  lexicon: HALOT
  rationale: El verbo expresa un cerco hostil; 'me rodearon' es natural en español y conserva la imagen militar sin suavizarla.
- source_word: בְּשֵׁם
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por el nombre de
  - con el nombre de
  lexicon: HALOT
  rationale: La fórmula idiomática se expresa de manera directa con 'en el nombre de', que preserva la idea de actuar bajo la autoridad o invocación del nombre.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino 'Yahvé' conforme al criterio del proyecto, preservando el nombre personal del Dios de Israel en lugar de sustituirlo por un título.
- source_word: אֲמִילַם
  english_pob_choice: I cut them off
  chosen_spanish: yo las corté
  alternatives_spanish:
  - yo las destruiré
  - yo las derribaré
  - las cortaré
  lexicon: HALOT
  rationale: El hifil de מול aquí expresa abatir/cortar a enemigos en un marco de victoria. 'Yo las corté' refleja el valor decisivo y concuerda con el tono triunfal del refrán. La posibilidad futura/confidente queda abierta por la forma verbal hebrea, pero en español se mantiene la lectura más directa y sobria del texto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre propio divino. Siguiendo la práctica del proyecto, se translitera como 'Yahvé' para no ocultar el Tetragrámaton bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the final verb phrase in a victory refrain
  english_pob_reading: I cut them off
  chosen_spanish_reading: yo las corté
  alternative_spanish_readings:
  - yo las cortaré
  - las he cortado
  - las cortaré con certeza
  rationale: El hebreo admite una lectura de acción decidida/afirmada dentro del refrán de victoria. En español, el pretérito simple comunica con naturalidad esa acción contundente, sin resolver de manera excesiva la tensión entre valor retrospectivo y fuerza confidentemente declarativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del historial inglés: se conserva el paralelismo del refrán, el Tetragrámaton se rinde como Yahvé, y la última cláusula mantiene la tensión reconocida entre lectura pasada y futura sin añadir adverbios no sustentados.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se eligió el plural femenino 'las' para concordar con 'naciones' en español.
  - La sintaxis mantiene el orden claro del hebreo sin forzar un calco excesivo.
  - Se evitó 'gentiles' por su carga confesional posterior y menos precisa aquí.
