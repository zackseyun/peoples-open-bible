    reason: lexical_alternative
  - marker: b
    text: 'O: «sus pobres» o «sus humildes». El término hebreo puede referirse a los afligidos, pobres o humildes.'
    reason: lexical_alternative
  revision_rationale: Se corrige la mezcla impropia de registros/personas verbales para el español meta, reemplazando «Aclamad de gozo» por «Canten de gozo», que sigue fielmente el imperativo plural hebreo y suena natural en español neutral latinoamericano. Se conserva «regocíjate, tierra» porque reproduce bien el singular femenino dirigido a la tierra. Se mantienen «Yahvé», «su pueblo» y «sus afligidos» conforme al audit trail y al glosario del proyecto.
