revisions:
- from: Porque el día de Yahvé está cerca sobre todas las naciones[a]. Como tú hiciste, así se hará contigo[b]; tu retribución volverá sobre tu propia cabeza.
  to: Pues el día de Yahvé está cerca sobre todas las naciones[a]. Como hiciste, se hará contigo; tu retribución[b] volverá sobre tu propia cabeza.
  rationale: Se ajusta el inicio a 'Pues' para conservar mejor la fuerza explicativa de כִּי en español bíblico natural, se aligera 'Como tú hiciste' a 'Como hiciste', y se mueve la nota b al sustantivo 'retribución', que es el verdadero punto léxico documentado por el POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:44:06Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: inminencia del día de Yahvé, alcance sobre todas las naciones, fórmula de retribución, y regreso del pago sobre la propia cabeza. Sin embargo, en la primera cláusula ''Porque'' puede sonar menos natural si el versículo se lee de forma aislada, y en la nota b el anclaje no corresponde bien al término hebreo específico גמול (''recompensa/retribución/pago''), porque la nota parece modificar toda la cláusula previa en vez del sustantivo clave.'
  spanish_quality_summary: El español es claro y digno, con buena legibilidad eclesial. 'Yahvé' y 'retribución' están bien escogidos. La construcción 'Como tú hiciste, así se hará contigo' es aceptable, pero 'Como hiciste, se hará contigo' fluye mejor. Además, conviene anclar la nota léxica b en 'retribución' para mayor precisión y limpieza estilística.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé'' correctamente; יוֹם יְהוָה -> ''el día de Yahvé'' correctamente; גמול -> ''retribución'' preserva bien la fuerza judicial. No hay conflictos doctrinales relevantes.'
  issues:
  - severity: medium
    issue: La nota b está colocada sobre la cláusula 'así se hará contigo' en vez de sobre 'tu retribución', que es donde corresponde el término hebreo גְּמֻלְךָ.
    rationale: El English POB documenta la alternativa léxica para 'your recompense', no para 'it will be done to you'. En español, mantener la nota en la cláusula anterior puede confundir al lector sobre qué palabra se está aclarando.
  - severity: low
    issue: '''Porque'' puede ser menos idiomático que ''Pues'' al inicio de un versículo leído de manera independiente.'
    rationale: כִּי sí tiene fuerza causal/explicativa. En español bíblico moderno, 'Pues' suele conservar mejor esa función sin sonar tan subordinado cuando el versículo aparece solo.
  - severity: low
    issue: La presencia de 'tú' en 'Como tú hiciste' no es necesaria.
    rationale: El pronombre explícito no es incorrecto, pero no aporta contraste exigido por el hebreo y hace la línea ligeramente más pesada en español.
  revised_spanish_text: Pues el día de Yahvé está cerca sobre todas las naciones[a]. Como hiciste, se hará contigo; tu retribución[b] volverá sobre tu propia cabeza.
  revised_footnotes:
  - marker: a
    text: 'O: «contra todas las naciones». La preposición puede señalar juicio dirigido hacia las naciones.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu pago» o «tu trato». El hebreo se refiere a lo que vuelve a una persona en respuesta a sus acciones.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el inicio a 'Pues' para conservar mejor la fuerza explicativa de כִּי en español bíblico natural, se aligera 'Como tú hiciste' a 'Como hiciste', y se mueve la nota b al sustantivo 'retribución', que es el verdadero punto léxico documentado por el POB.
