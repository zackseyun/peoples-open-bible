revisions:
- from: Quien perturba su propia casa heredará viento[a][b], y el necio será esclavo del sabio de corazón.
  to: Quien causa problemas a su propia casa[a] heredará viento[b], y el necio será siervo del sabio de corazón.
  rationale: La revisión mantiene la metáfora y la estructura del original, pero mejora la naturalidad y precisión del español. «Causa problemas a su propia casa» expresa mejor el valor de עוֹכֵר en contexto proverbial que «perturba», y «siervo» sigue la justificación contextual del POB para עֶבֶד en vez de endurecerlo a «esclavo». También se reubican las notas para que cada marcador ancle la palabra pertinente.
