review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Dios es el sujeto directo que hiere; se conserva la secuencia temporal inmediata; y se mantiene la imaginería visceral del dolor interno. Sin embargo, hay dos puntos que requieren ajuste: (1) el texto principal usa «el Señor» donde el estándar del proyecto pide «Yahvé» como forma principal; aquí κύριος es título griego, pero la nota actual mezcla demasiado la alternativa con el texto principal. (2) «apenas había terminado de hablar» suena menos natural y ligeramente desajustado en español; conviene «apenas terminó de hablar» o «justo cuando terminó de hablar».'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para mayor naturalidad y precisión. «Lo alcanzó un dolor» es posible, aunque menos vívido que «se apoderó de él» o «lo tomó». «Partes internas» suena algo mecánico; «su interior» mantiene mejor el sentido corporal sin torpeza. La puntuación también mejora con una secuencia más fluida.
  glossary_alignment: 'Hay desalineación parcial con la terminología del proyecto: el texto principal debería preferir «Yahvé» en vez de «Señor». El resto está mayormente alineado: «Dios», «incurable», «entrañas» y la agencia divina directa están bien preservadas.'
  issues:
