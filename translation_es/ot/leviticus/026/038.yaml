translation:
  language: es
  text: Ustedes perecerán entre las naciones[a], y la tierra de sus enemigos los consumirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra de sus enemigos los devorará». El verbo hebreo es literalmente «comer».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲבַדְתֶּם
  english_pob_choice: you will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - se perderán
  - serán destruidos
  - desaparecerán
  lexicon: HALOT
  rationale: El hebreo expresa la consecuencia de ruina/extravío bajo juicio pactual. «Perecerán» conserva esa fuerza sin añadir explícitamente la idea de muerte violenta, igual que el inglés POB evita precisar demasiado.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - en las naciones
  - entre los gentiles
  lexicon: HALOT
  rationale: «Naciones» refleja bien גּוֹיִם sin importar un matiz eclesiástico posterior. «Entre» comunica con naturalidad el sentido locativo de estar dispersos en medio de ellas.
- source_word: וְאָכְלָה
  english_pob_choice: will consume
  chosen_spanish: consumirá
  alternatives_spanish:
  - devorará
  - comerá
  - los tragará
  lexicon: HALOT
  rationale: אַכל es literalmente «comer», pero con «la tierra» como sujeto funciona metafóricamente como consumir. «Consumirá» mantiene el valor figurado y suena natural en español.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - os
  - a ustedes
  lexicon: Syntactic object marker + 2mp suffix
  rationale: El sufijo de objeto de segunda persona plural se expresa naturalmente en español como objeto directo plural. «Los» funciona como referencia plural masculina genérica en estilo bíblico; podría variar según el registro editorial final.
- source_word: אֶרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra/territorio
  - el país
  lexicon: HALOT
  rationale: En este contexto, אֶרֶץ puede rendirse por «tierra» sin perder el valor espacial concreto. Dado que se trata de la tierra vinculada al juicio, «tierra» preserva la imagen bíblica más que «país».
- source_word: אֹיְבֵיכֶם
  english_pob_choice: of your enemies
  chosen_spanish: de sus enemigos
  alternatives_spanish:
  - de los enemigos de ustedes
  - de quienes les son hostiles
  lexicon: HALOT
  rationale: La construcción en español queda bien como complemento del sustantivo «tierra». Se prefiere «sus» porque el contexto dirige la frase al pueblo en segunda persona plural, y «de sus enemigos» suena más fluido que una repetición explícita de «de ustedes».
theological_decisions:
- issue: Mantener la metáfora de la tierra que consume
  english_pob_reading: Retain the metaphor of the enemies' land consuming the exiles as a covenant-curse image.
  chosen_spanish_reading: Conservar que la tierra de sus enemigos «los consumirá», sin convertirlo en una explicación más abstracta.
  alternative_spanish_readings:
  - la tierra de sus enemigos los destruirá
  - la tierra de sus enemigos los hará perecer
  rationale: El hebreo usa un verbo de comer de manera metafórica. Traducirlo como «consumirá» conserva la imagen de juicio y el tono de maldición pactual, en línea con la estrategia de primacía del idioma fuente.
  doctrine_reference: 'Estrategia de traducción: preservar la imagen y la tensión literaria del texto fuente.'
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo masorético y el control cruzado reporta alta coincidencia; no se requieren revisiones respecto del borrador inglés auditado.
  spanish_consistency_notes:
  - Se mantiene «naciones» para גּוֹיִם y no «gentiles», evitando una lectura posterior no requerida por el hebreo.
  - Se conserva la metáfora de אכל como «consumir», con nota alternativa que explicita el sentido literal «comer».
  - «Tierra» se usa para אֶרֶץ por tratarse del ámbito geográfico concreto del juicio.
  - La formulación en plural tercera persona en español sigue el sujeto implícito del contexto inmediato del v. 38.
