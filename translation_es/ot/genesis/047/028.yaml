review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y sigue de cerca la POB inglesa: «vivió», «en la tierra de Egipto», «diecisiete años» y la suma «ciento cuarenta y siete años» son fieles. También conserva correctamente el modismo hebreo «los días de Jacob, los años de su vida» y la nota explicativa correspondiente.'
  spanish_quality_summary: 'El texto es claro y comprensible, pero «Jacob» debe ajustarse a la forma española estándar del nombre propio: «Jacob» en español bíblico es poco natural frente a «Jacob»/«Jacobo»; para la tradición bíblica en español moderno, «Jacob» sí es reconocible, pero el problema principal está en la nota: «duración de vida» suena poco idiomático. Conviene mejorarla a «duración de su vida» o mejor «su vida entera / su vida». Además, mantener «Jacob» es aceptable; no requiere cambio. El resto suena natural y digno.'
  glossary_alignment: No hay términos del glosario base en juego como Yahvé, Mesías o esclavo. Las decisiones léxicas principales concuerdan con la auditoría inglesa. La conservación de «tierra» por אֶרֶץ está bien justificada. La nota idiomática debe pulirse para sonar más natural en español.
  issues:
  - severity: low
    issue: La redacción de la nota al pie usa «duración de vida».
    rationale: Aunque transmite la idea general, «duración de vida» no es una expresión natural en español bíblico general. «duración de su vida», «su vida» o «su vida entera» comunican mejor el sentido del modismo hebreo y leen con más fluidez.
  revised_spanish_text: Jacob vivió en la tierra de Egipto diecisiete años[a], y los días de Jacob, los años de su vida, fueron ciento cuarenta y siete años.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «los días de Jacob, los años de su vida», un modismo hebreo para referirse a toda su vida.'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel al hebreo y a la POB inglesa. Solo se revisa la nota para usar un español más natural y preciso al explicar el modismo hebreo.
