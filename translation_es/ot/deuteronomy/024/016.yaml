translation:
  language: es
  text: No se dará muerte a los padres por causa de los hijos[a], ni se dará muerte a los hijos por causa de los padres[b]; cada hombre será puesto a muerte por su propio pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos varones»; el hebreo dice literalmente «hijos» en ambas cláusulas.
    reason: lexical_alternative
  - marker: b
    text: O «morirán»; el hebreo indica más específicamente que se les dé muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוּמְתוּ / יוּמָתוּ
  english_pob_choice: shall be put to death
  chosen_spanish: se dará muerte
  alternatives_spanish:
  - morirán
  - serán ejecutados
  lexicon: HALOT
  rationale: El hebreo en Hifil de מות expresa causar la muerte, y en este contexto legal se refiere a una pena capital. «Se dará muerte» conserva esa fuerza sin reducirlo al simple hecho de morir ni volverlo más interpretativo con «serán ejecutados».
- source_word: אָבוֹת
  english_pob_choice: fathers
  chosen_spanish: padres
  alternatives_spanish:
  - padres varones
  - progenitores
  lexicon: HALOT
  rationale: El sustantivo hebreo significa literalmente «padres» o «fathers». En español, «padres» comunica bien el paralelo familiar con «hijos» y suena más natural que una forma más marcada como «padres varones».
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - hijos varones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hijos/sons», en español «hijos» preserva el valor familiar del paralelismo y evita una repetición rígida de «padres/hijos»; la nota mantiene visible que el hebreo usa «sons» en ambas cláusulas.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: por causa de
  alternatives_spanish:
  - por
  - a causa de
  - en razón de
  lexicon: HALOT
  rationale: En este marco jurídico, עַל expresa la base o el motivo de la pena. «Por causa de» comunica mejor la relación de responsabilidad que un simple «por», sin añadir interpretación extra.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada persona
  - cada uno
  lexicon: HALOT
  rationale: אִישׁ introduce un principio distributivo individual. «Cada hombre» conserva el singular y la forma masculina del hebreo, igual que la traducción inglesa optó por «each man».
- source_word: בְּחֶטְאוֹ
  english_pob_choice: for his own sin
  chosen_spanish: por su propio pecado
  alternatives_spanish:
  - en su pecado
  - por su pecado
  lexicon: HALOT
  rationale: חטא significa «pecado» o «culpa». En español jurídico-bíblico, «por su propio pecado» expresa bien la responsabilidad individual; «propio» hace explícito el sufijo posesivo y el contraste con la culpa transferida.
theological_decisions:
- issue: Responsabilidad penal individual en pena capital
  english_pob_reading: The verse states that judicial death is to be imposed on the basis of one's own sin, not transferred between fathers and sons.
  chosen_spanish_reading: El versículo afirma que la pena de muerte judicial recae sobre la propia culpa de cada uno, no que se transfiera entre padres e hijos.
  alternative_spanish_readings:
  - Una afirmación general sobre todas las consecuencias del pecado entre generaciones
  - Una regla sobre toda muerte, sin matiz judicial
  rationale: El verbo hebreo en Hifil indica causar la muerte, y el contexto inmediato es legal. Por eso la traducción debe conservar el alcance judicial/capital sin ampliar indebidamente la afirmación a todas las consecuencias posibles del pecado.
  doctrine_reference: Translation philosophy §1, §3, §4
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo final indicó alto acuerdo; por tanto, esta propuesta sigue de cerca el texto hebreo y el criterio ya aprobado en la pauta inglesa, sin añadir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «pecado» para חטא, no «culpa» como término principal, aunque la idea de responsabilidad está implícita.
  - Se usa «padres/hijos» por naturalidad en español, pero las notas conservan la observación de que el hebreo dice literalmente «fathers/sons».
  - La forma impersonal «se dará muerte» conserva la pasiva/causativa del hebreo mejor que una simple traducción con «morirá».
