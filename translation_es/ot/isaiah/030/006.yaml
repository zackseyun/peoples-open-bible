review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del POB inglés: encabezado profético, trayecto peligroso por el Néguev, lista literal de animales amenazantes, transporte de riquezas y tesoros, y conclusión sobre la inutilidad de la misión. Sin embargo, hay dos desajustes relevantes con la decisión auditada: (1) בְּאֶרֶץ צָרָה וְצוּקָה se vertió «angustia y opresión», donde «opresión» sobredetermina צוּקָה; conviene algo como «dificultad» o «penuria». (2) עַל כֶּתֶף עֲיָרִים se cambió de «hombros» a «lomos»; aunque es español natural, el POB documentó preservar la imagen literal «shoulders», y en español «sobre los hombros de los asnos» es inteligible y conserva mejor el paralelismo con «jorobas de camellos».'
  spanish_quality_summary: El español es claro y digno, apto para lectura eclesial amplia. La sintaxis fluye bien y evita calcos duros. Aun así, «serpiente ardiente que vuela» puede pulirse a «serpiente ardiente voladora» o mantenerse; ambas son aceptables. El problema principal de calidad no es de fluidez sino de precisión léxica en «opresión» y de pérdida de viveza hebrea en «lomos».
  glossary_alignment: No hay conflicto con los términos doctrinales del proyecto. «Oráculo», «Negev», «víbora», «jorobas», «tesoros» están bien alineados. La diferenciación de los dos términos de león mediante «leona y león» sigue la justificación documentada. La nota sobre «aprovechar/ayudar» está bien planteada, aunque en el texto principal «no les aprovechará» suena algo menos natural que «no les será de provecho»; sin embargo, es defendible por cercanía léxica al POB.
  issues:
  - severity: medium
    issue: «opresión» para צוּקָה introduce un matiz excesivamente social/político
    rationale: La pareja צָרָה וְצוּקָה denota angustia, estrechez, dificultad, penuria. «Opresión» puede sugerir un opresor humano y va más allá del sentido básico auditado de hardship.
  - severity: medium
    issue: «sobre los lomos de asnos» pierde la imagen concreta de כֶּתֶף
    rationale: El hebreo dice literalmente «hombro», y la auditoría inglesa decidió preservarlo frente a una generalización a «backs». En español «hombros de asnos» es suficientemente natural y mantiene mejor la vividez y el paralelismo.
  - severity: low
    issue: «no les aprovechará» es comprensible pero algo rígido en español moderno
    rationale: Preserva la idea de provecho, pero «no les será de provecho» o «no les beneficiará» sonarían más idiomáticos. No obstante, no es un error y puede mantenerse para conservar cercanía semántica.
  revised_spanish_text: 'Oráculo acerca de las bestias del Negev[a]: por una tierra de angustia y dificultad, de leona y león[b], de víbora y serpiente ardiente que vuela, llevan sus riquezas sobre los hombros de asnos y sus tesoros sobre las jorobas de camellos, a un pueblo que no les aprovechará[c].'
  revised_footnotes:
