    rationale: El hebreo כְאֵלֶּה significa «como estos/estas», con referencia contextual a los ídolos. En español, dejar solo «estas» sin sustantivo expreso produce una frase rígida y menos idiomática. «No es como estos» o «No como estos es…» mejora la naturalidad sin explicitar más de lo debido.
