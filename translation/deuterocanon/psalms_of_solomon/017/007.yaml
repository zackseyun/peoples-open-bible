id: PSS.17.7
reference: Psalms of Solomon 17:7
source:
  edition: lxx-swete-1909
  text: καὶ οὐκ ἐδόξασαν τὸ ὄνομά σου τὸ ἔντιμον· ἐν δόξῃ ἔθεντο βασίλειον ἀντὶ ὕψους αὐτῶν,
  language: Greek
  pages:
  - 806
  validation: swete_direct
translation:
  text: And they did not glorify your honored name[a]; in splendor they set up a kingdom because of their arrogance,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in place of their own exaltation'.
    reason: previous_rendering
lexical_decisions:
- source_word: οὐκ ἐδόξασαν
  chosen: did not glorify
  alternatives:
  - did not honor
  - did not give glory to
  lexicon: LSJ
  entry: null
  rationale: The verb δοξάζω denotes giving honor or glory. 'Did not glorify' preserves the verbal force and fits the God-directed context better than the flatter 'did not honor,' while remaining natural English.
- source_word: τὸ ὄνομά σου τὸ ἔντιμον
  chosen: your honored name
  alternatives:
  - your honorable name
  - your esteemed name
  lexicon: LSJ
  entry: null
  rationale: ἔντιμος denotes what is honored or held in esteem. 'Your honored name' is natural modern English and matches established rendering elsewhere in this corpus.
- source_word: ἐν δόξῃ
  chosen: in splendor
  alternatives:
  - in glory
  - gloriously
  lexicon: LSJ
  entry: null
  rationale: δόξα can mean glory, honor, or splendor. Here it describes the manner or setting of royal establishment; 'in splendor' communicates visible pomp without implying divine glory.
- source_word: ἔθεντο
  chosen: they set up
  alternatives:
  - they established
  - they placed
  lexicon: BDAG
  entry: null
  rationale: τίθημι here carries the sense of putting in place or establishing. 'Set up' is idiomatic and keeps the active political force of the clause.
- source_word: βασίλειον
  chosen: a kingdom
  alternatives:
  - royal rule
  - a kingship
  - a royal house
  lexicon: LSJ
  entry: null
  rationale: The noun can denote kingdom, kingship, or royal establishment. In this immediate context of illegitimate rule and the throne of David in the next verse, 'a kingdom' is the most straightforward and least interpretive choice.
- source_word: ἀντὶ ὕψους αὐτῶν
  chosen: in place of their own exaltation
  alternatives:
  - instead of their height
  - for their own exaltation
  - in place of their high estate
  lexicon: LSJ
  entry: null
  rationale: Literally the phrase speaks of 'height' or 'exaltation.' Because ὕψος can be metaphorical for elevated status or self-exaltation, 'their own exaltation' best captures the likely sense while preserving the underlying ambiguity. The wording remains somewhat compressed in English because the Greek is itself compact.
