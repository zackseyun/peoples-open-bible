revisions:
- from: 'Tú dijiste[a]: «Mira, has derrotado a Edom, y tu corazón te ha enaltecido para jactarte». Ahora quédate en casa. ¿Por qué provocarías un mal, para que caigas tú y Judá contigo?'
  to: 'Tú dijiste[a]: «Mira, has derrotado a Edom, y tu corazón te ha enaltecido para jactarte». Ahora quédate en casa. ¿Por qué has de provocar una desgracia, para que caigas tú y Judá contigo?'
  rationale: Se revisa «un mal» a «una desgracia» para reflejar mejor el sentido contextual de רָעָה como calamidad y para mejorar la naturalidad en español. Se ajusta la interrogación a «¿Por qué has de provocar…?» por mayor fluidez y tono exhortativo. Se amplía la nota al pie para preservar mejor las alternativas documentadas en la auditoría inglesa sobre la expresión idiomática del corazón enaltecido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:01:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: victoria sobre Edom, corazón enaltecido, mandato de quedarse en casa, advertencia contra provocar conflicto y consecuencia de caída para el rey y Judá. Sin embargo, dos puntos requieren ajuste para alinearse mejor con la evidencia fuente y la pista auditada en inglés: (1) בְּרָעָה se entiende mejor aquí como calamidad/desastre, no como «un mal», que en español suena demasiado moral o demasiado vago; (2) la nota alternativa debe reflejar mejor las alternativas auditadas, incluyendo la idea de honor/gloria y el matiz idiomático de autoexaltación. También conviene suavizar «provocarías un mal» a una construcción más natural en español.'
  spanish_quality_summary: El texto es claro y legible en español neutral, con buen registro bíblico moderno. «Mira» y «quédate en casa» funcionan bien. «Has derrotado a Edom» es aceptable aunque algo más interpretativo que «has herido/golpeado/derrotado»; no exige cambio. La principal torpeza estilística es «provocarías un mal», que resulta poco idiomática. «Provocarías una desgracia» o «provocarías un desastre» lee mucho mejor y preserva el contexto militar-político.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. No aparece Yahvé ni otros términos sensibles del glosario. Las decisiones clave concuerdan en general con la auditoría inglesa, salvo que «un mal» no preserva suficientemente el valor contextual de רָעָה como calamidad. La metáfora «tu corazón te ha enaltecido» es compatible con la rationale documentada.
  issues:
  - severity: medium
    issue: «un mal» para בְּרָעָה
    rationale: En este contexto de advertencia bélica, רָעָה denota calamidad/desastre, no principalmente mal moral. «Un mal» en español es ambiguo y menos natural tras «provocar». «Una desgracia» o «un desastre» refleja mejor la intención fuente y la decisión inglesa auditada.
  - severity: low
    issue: La nota al pie no refleja plenamente las alternativas auditadas
    rationale: 'La nota inglesa preserva varias posibilidades: «tu corazón te ha exaltado para gloria» / «te ha hecho orgulloso para honor». La nota española actual recoge solo una de ellas y podría expresar mejor que el hebreo es idiomático y comunica autoexaltación tras la victoria.'
  - severity: low
    issue: Construcción «¿Por qué provocarías…?»
    rationale: No es infiel, pero en español bíblico natural suena mejor «¿Por qué has de provocar…?» o «¿Por qué provocar…?». Esto mejora fluidez sin cambiar el sentido.
