id: 1TI.6.16
reference: 1 Timothy 6:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ μόνος ἔχων ἀθανασίαν, φῶς οἰκῶν ἀπρόσιτον, ὃν εἶδεν οὐδεὶς ἀνθρώπων οὐδὲ ἰδεῖν δύναται· ᾧ τιμὴ καὶ κράτος αἰώνιον· ἀμήν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/016.yaml
  text: who alone has immortality[a], dwelling in unapproachable light, whom no one among men has seen nor is able to see. To him be honor and eternal dominion[b]. Amen.
  footnotes:
  - marker: a
    text: Or "no human being has seen or is able to see."
    reason: lexical_alternative
  - marker: b
    text: Some understand this description and doxology as referring more directly to the Lord Jesus Messiah in the broader context, though the language of invisibility most naturally points to God.
    reason: alternative_reading
translation:
  language: ko
  text: 오직 그분만 죽지 않으심을 가지셨고, 가까이 갈 수 없는 빛 가운데 거하시며, 사람 가운데 아무도 그분을 본 일이 없고 볼 수도 없습니다[a]. 그분께 존귀와 영원한 권능이 있기를 빕니다[b]. 아멘.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「어떤 사람도 그분을 본 적이 없고 볼 수도 없다」.
    reason: lexical_alternative
  - marker: b
    text: 일부는 본 묘사와 송영을 보다 넓은 문맥에서 주 예수 메시아를 직접 가리키는 것으로 이해하지만, 보이지 않음의 언어는 가장 자연스럽게 하나님을 가리킨다.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ μόνος ἔχων ἀθανασίαν
  english_pob_choice: who alone has immortality
  chosen_korean: 오직 그분만 죽지 않으심을 가지셨고
  alternatives_korean:
  - 홀로 불멸을 지니신
  - 홀로 죽지 않는 분이신
  lexicon: BDAG
  rationale: 1:17 ἄφθαρτος(죽지 않으시고)와 일관 「죽지 않음」.
- source_word: φῶς οἰκῶν ἀπρόσιτον
  english_pob_choice: dwelling in unapproachable light
  chosen_korean: 가까이 갈 수 없는 빛 가운데 거하시며
  alternatives_korean:
  - 접근할 수 없는 빛 속에 거하시며
  lexicon: BDAG
  rationale: ἀπρόσιτος의 「접근 불가」를 「가까이 갈 수 없는」으로 자연스럽게.
- source_word: ὃν εἶδεν οὐδεὶς ἀνθρώπων
  english_pob_choice: whom no one among men has seen
  chosen_korean: 사람 가운데 아무도 그분을 본 일이 없고
  alternatives_korean:
  - 어떤 사람도 그분을 본 적이 없고
  lexicon: BDAG
  rationale: 자연스러운 한국어.
- source_word: τιμὴ καὶ κράτος αἰώνιον
  english_pob_choice: honor and eternal dominion
  chosen_korean: 존귀와 영원한 권능
  alternatives_korean:
  - 영예와 영원한 주권
  lexicon: BDAG
  rationale: 1:17 τιμή와 일관 「존귀」. κράτος의 「권능·통치권」을 「권능」으로.
