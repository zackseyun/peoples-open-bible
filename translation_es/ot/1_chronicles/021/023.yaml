    rationale: Los marcadores [a][b][c] aparecen todos al final de «ofrenda vegetal», aunque las notas corresponden a elementos anteriores y distintos. Deben aparecer donde pertenece cada observación para claridad del lector y fidelidad editorial.
  - severity: low
    issue: Cierre ligeramente menos natural en español
    rationale: «Todo lo he dado» no es incorrecto, pero «Lo he dado todo» es más idiomático y mantiene el totalizador hebreo sin pérdida de solemnidad.
