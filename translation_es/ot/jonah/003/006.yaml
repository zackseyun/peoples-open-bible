- from: Cuando la noticia llegó al rey de Nínive[a], se levantó de su trono, se quitó su manto[b], se cubrió de cilicio y se sentó sobre la ceniza[c].
  to: Cuando la noticia llegó al rey de Nínive[a], se levantó de su trono, se quitó su manto[b], se cubrió de cilicio y se sentó en la ceniza[c].
