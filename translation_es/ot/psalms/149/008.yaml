lexical_decisions:
- source_word: לֶאְסֹר
  english_pob_choice: to bind
  chosen_spanish: atar
  alternatives_spanish:
  - ligar
  - prender
  - encadenar
  lexicon: HALOT
  rationale: El infinitivo constructo de אסר expresa la acción de sujetar/restringir. En español, 'atar' comunica de forma natural la idea física de restricción sin sobrecargarla con la noción legal de prisión, y mantiene la relación directa con 'cadenas' y 'grillos'.
- source_word: מַלְכֵיהֶם
  english_pob_choice: their kings
  chosen_spanish: sus reyes
  alternatives_spanish:
  - sus gobernantes
  - sus monarcas
  lexicon: HALOT
  rationale: מֶלֶךְ significa específicamente 'rey'; 'sus reyes' conserva el referente regio sin ampliar el sentido a gobernantes en general. El sufijo plural de tercera persona se refleja con 'sus'.
- source_word: בְּזִקִּים
  english_pob_choice: with chains
  chosen_spanish: con cadenas
  alternatives_spanish:
  - con grillos
  - con ligaduras
  lexicon: HALOT
  rationale: זִקִּים alude a ataduras o cadenas. 'Con cadenas' es la equivalencia más directa y transparente en español, y encaja naturalmente con 'atar'.
- source_word: וְנִכְבְּדֵיהֶם
  english_pob_choice: and their honored men
  chosen_spanish: y a sus hombres honorables
  alternatives_spanish:
  - y a sus nobles
  - y a sus dignatarios
  lexicon: HALOT
  rationale: El participio/adjetivo derivado de כבד conserva la idea de personas 'pesadas' en estatus, es decir, distinguidas u honorables. 'Hombres honorables' mantiene el matiz de personas prominentes sin neutralizar el masculino plural documentado por el hebreo.
- source_word: בְּכַבְלֵי בַרְזֶל
  english_pob_choice: with iron fetters
  chosen_spanish: con grillos de hierro
  alternatives_spanish:
  - con cadenas de hierro
  - con esposas de hierro
  lexicon: HALOT
  rationale: כַּבְלֵי designa vínculos, grilletes o fetters; en español, 'grillos' expresa bien una atadura metálica distinta de 'cadenas'. 'De hierro' preserva la intensificación material del hebreo.
theological_decisions:
- issue: Conservación del paralelismo entre 'cadenas' y el segundo término de sujeción
  english_pob_reading: their honored men with iron fetters
  chosen_spanish_reading: sus hombres honorables con grillos de hierro
  alternative_spanish_readings:
  - sus nobles con cadenas de hierro
  - sus dignatarios con grillos de hierro
  rationale: El hebreo varía el segundo sustantivo de sujeción para intensificar y diversificar la imagen de cautiverio. 'Grillos de hierro' evita repetir 'cadenas' y conserva la tensión poética del paralelismo, además de respetar la concreción física del texto.
  doctrine_reference: Poética bíblica y precisión léxica del hebreo
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y no requirió cambios; esta propuesta mantiene ese consenso, con una sola adaptación estilística al español para leer con naturalidad sin perder la imaginería concreta del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' fuera de este versículo porque no aparece un término divino en el texto.
  - 'Se conserva el paralelismo concreto entre dos clases de ataduras: ''cadenas'' y ''grillos de hierro''.'
  - Se preserva el masculino plural de 'sus hombres honorables' conforme al hebreo y al audit trail inglés.
