translation:
  language: es
  text: Cuando llegó el turno de Ester —la hija de Abihail, tío de Mardoqueo, quien la había tomado como hija[a]— para entrar ante el rey, no pidió nada, sino solo lo que le indicó Hegai, el eunuco[b] del rey, guardián de las mujeres. Y Ester iba ganando favor ante los ojos de todos los que la veían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la había adoptado como hija». El hebreo expresa que Mardoqueo la recibió bajo cuidado filial, sin precisar un acto legal formal.'
    reason: lexical_alternative
  - marker: b
    text: «Eunuco» puede traducirse en algunos contextos como «oficial de corte», pero el entorno del harén favorece aquí el sentido específico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהַגִּיעַ
  english_pob_choice: When ... came
  chosen_spanish: Cuando llegó
  alternatives_spanish:
  - Y cuando llegó
  - Al llegar
  lexicon: HALOT
  rationale: La construcción temporal se expresa con naturalidad en español con 'Cuando llegó'. Mantiene la secuencia narrativa sin añadir elementos ajenos al hebreo.
- source_word: תֹּר
  english_pob_choice: turn
  chosen_spanish: turno
  alternatives_spanish:
  - tiempo asignado
  - momento
  lexicon: HALOT
  rationale: En el contexto de la presentación de las mujeres al rey, el sentido es el de una porción o turno asignado. 'Turno' preserva bien esa idea en español.
- source_word: דֹּד
  english_pob_choice: uncle
  chosen_spanish: tío
  alternatives_spanish:
  - pariente cercano
  - tío materno/paterno
  lexicon: HALOT
  rationale: El término identifica la relación familiar de Abihail con Mardoqueo. 'Tío' sigue la decisión inglesa y encaja con la relación ya establecida en el relato.
- source_word: לָקַח לוֹ לְבַת
  english_pob_choice: had taken her as his own daughter
  chosen_spanish: la había tomado para sí como hija
  alternatives_spanish:
  - la había adoptado como hija
  - la había recibido como hija
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y expresa cuidado filial. 'Tomado para sí como hija' conserva la fuerza del idiomа sin imponer una formulación legal más fuerte que la del texto.
- source_word: לָבוֹא אֶל־הַמֶּלֶךְ
  english_pob_choice: to go in to the king
  chosen_spanish: para entrar ante el rey
  alternatives_spanish:
  - para ir ante el rey
  - para presentarse al rey
  lexicon: HALOT
  rationale: '''Entrar ante el rey'' reproduce el idioma de corte con un español natural y sobrio. ''Ante'' preserva el acceso a su presencia sin explicitar más de lo que el hebreo dice.'
- source_word: לֹא בִקְשָׁה דָּבָר
  english_pob_choice: she asked for nothing
  chosen_spanish: no pidió nada
  alternatives_spanish:
  - no solicitó nada
  - no requirió nada
  lexicon: HALOT
  rationale: La idea es de no pedir nada adicional. 'Pedir' es el equivalente más claro y natural en español.
- source_word: כִּי אִם אֶת אֲשֶׁר יֹאמַר
  english_pob_choice: except what ... advised
  chosen_spanish: sino solo lo que le aconsejaba
  alternatives_spanish:
  - sino únicamente lo que le decía
  - excepto lo que le indicaba
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'lo que diría', el contexto favorece la idea de recomendación. 'Aconsejaba' conserva la matización ya documentada en la revisión inglesa.
- source_word: סְרִיס
  english_pob_choice: eunuch
  chosen_spanish: eunuco
  alternatives_spanish:
  - oficial de corte
  - funcionario
  lexicon: HALOT
  rationale: El contexto del harén favorece el sentido específico de 'eunuco', como en la decisión inglesa. Se mantiene la fuerza léxica del término.
- source_word: שֹׁמֵר הַנָּשִׁים
  english_pob_choice: keeper of the women
  chosen_spanish: guardián de las mujeres
  alternatives_spanish:
  - encargado de las mujeres
  - custodio de las mujeres
  lexicon: HALOT
  rationale: La función de Hegai se expresa bien con 'guardián', que conserva el matiz de custodia y vigilancia sobre las mujeres del palacio.
- source_word: וַתְּהִי ... נֹשֵׂאת חֵן
  english_pob_choice: was gaining favor
  chosen_spanish: iba ganando favor
  alternatives_spanish:
  - estaba ganando favor
  - hallaba favor
  lexicon: HALOT
  rationale: La construcción hebrea presenta un proceso continuo. 'Iba ganando favor' transmite ese aspecto progresivo de forma natural en español.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - delante de
  lexicon: HALOT
  rationale: Se conserva el idiomatismo semítico en una forma normal en español. 'Ante los ojos de' mantiene la imagen y la comprensibilidad.
- source_word: כָּל רֹאֶיהָ
  english_pob_choice: all who saw her
  chosen_spanish: todos los que la veían
  alternatives_spanish:
  - todos los que la veían
  - todos los que la miraban
  lexicon: HALOT
  rationale: El participio expresa a quienes la estaban viendo. 'La veían' es natural y respeta el valor colectivo del hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino inexistente en el versículo
  english_pob_reading: No divine-name masking is involved in this verse.
  chosen_spanish_reading: No se introduce ninguna referencia al nombre divino.
  alternative_spanish_readings:
  - —
  rationale: El versículo no contiene יהוה ni κύριος; por tanto, no hay decisión teológica sobre el nombre divino en este caso.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó 'said' a 'advised' y 'was finding favor' a 'was gaining favor'. La redacción española sigue esa misma actualización semántica con 'aconsejaba' e 'iba ganando favor', manteniendo el tono narrativo formal y la equivalencia óptima.
  spanish_consistency_notes:
  - Se mantiene 'Ester' y 'Mardoqueo' como nombres propios bíblicos estándar en español.
  - Se conserva el orden narrativo del hebreo con una cláusula temporal inicial y una oración principal coordinada.
  - '''Eunuco'' se usa de forma consistente con la decisión inglesa y con el contexto del harén.'
  - '''Favor'' se mantiene como término técnico narrativo, sin sustituirlo por ''gracia'' para no borrar el matiz relacional del hebreo en este contexto.'
