review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura y el sentido general del hebreo: consecuencia inferencial, paralelismo entre cielos y tierra, y la idea de privación del rocío y del producto agrícola. Sin embargo, la colocación de «sobre ustedes» modifica indebidamente en español el objeto retenido («el rocío sobre ustedes») en vez de adjuntarse a «los cielos», que es donde pertenece según עֲלֵיכֶם con שָמַיִם. Eso afecta la fidelidad sintáctica y la claridad.'
  spanish_quality_summary: El texto es mayormente claro y de buen registro bíblico. No obstante, «los cielos han retenido el rocío sobre ustedes» suena ambiguo y poco natural, como si el rocío estuviera siendo retenido encima de ellos. En español fluye mejor «los cielos sobre ustedes han retenido el rocío» o «los cielos, sobre ustedes, han retenido el rocío». El resto del verso es legible y digno. La nota al pie es útil, pero conviene alinear mejor la alternativa principal con el inglés auditado («rendimiento»/«produce») y evitar «país» como primera alternativa contextual, ya que aquí el paralelismo favorece «tierra».
  glossary_alignment: No hay términos de glosario mayores en disputa. «Los cielos», «la tierra» y «rocío» están bien alineados con las decisiones POB. «Su producto» es aceptable para יְבוּלָהּ, aunque «su rendimiento» también sería válido. La nota léxica preserva la alternativa de אֶרֶץ/יְבוּל, pero debe presentarse de modo más ceñido al audit trail.
  issues:
  - severity: high
    issue: Ubicación incorrecta de «sobre ustedes»
    rationale: En el hebreo, עֲלֵיכֶם depende de «los cielos» («los cielos sobre ustedes»), no de «el rocío». La redacción actual altera la relación sintáctica y crea ambigüedad semántica.
  - severity: medium
    issue: Nota al pie parcialmente desalineada con la alternativa auditada
    rationale: La nota inglesa preserva la alternativa «the land has withheld its yield». En español, «la tierra ha retenido su cosecha» introduce una opción más específica que «yield/produce». «Su rendimiento» o «su producto» refleja mejor el rango léxico.
  revised_spanish_text: Por tanto, los cielos sobre ustedes han retenido el rocío[a], y la tierra ha retenido su producto.
  revised_footnotes:
  - marker: a
    text: O «la tierra ha retenido su rendimiento». El hebreo אֶרֶץ puede significar «tierra» o «territorio», y יְבוּל puede rendirse como «producto» o «rendimiento».
    reason: lexical_alternative
  revision_rationale: Se reubica «sobre ustedes» para que modifique correctamente «los cielos», conforme al hebreo עֲלֵיכֶם y a la decisión inglesa «the heavens above you». También se ajusta la nota léxica para conservar más fielmente la alternativa documentada sin sobreespecificar יְבוּל como «cosecha».
