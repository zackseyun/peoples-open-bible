translation:
  language: es
  text: De nuevo, uno con apariencia de hombre me tocó y me fortaleció[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como la apariencia de un hombre» o «uno como un hombre». El hebreo describe la semejanza visible de la figura sin identificarla explícitamente como meramente humana.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  english_pob_choice: Again
  chosen_spanish: De nuevo
  alternatives_spanish:
  - Otra vez
  - Y volvió a
  lexicon: HALOT
  rationale: El hebreo introduce una acción repetida; «De nuevo» reproduce con naturalidad en español el valor resumptivo de יסף seguido de otro verbo finito, sin volverlo demasiado literal.
- source_word: וַיִּגַּע בִּי
  english_pob_choice: touched me
  chosen_spanish: me tocó
  alternatives_spanish:
  - me alcanzó
  - hizo contacto conmigo
  lexicon: HALOT
  rationale: נגע con ב expresa contacto físico; «me tocó» es la forma más directa y natural en español, y mantiene la relación física que precede a la acción de fortalecer.
- source_word: כְּמַרְאֵה אָדָם
  english_pob_choice: one with the appearance of a man
  chosen_spanish: con apariencia de hombre
  alternatives_spanish:
  - como apariencia de hombre
  - con forma humana
  - como un hombre
  lexicon: HALOT
  rationale: כ + מַרְאֶה describe semejanza visible, no identificación. «Con apariencia de hombre» conserva esa tensión y evita afirmar que se trataba simplemente de un hombre.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  lexicon: HALOT
  rationale: En este contexto singular y descriptivo, «hombre» comunica la figura masculina visible indicada por el hebreo sin convertirla en una referencia a la humanidad en general.
- source_word: וַיְחַזְּקֵנִי
  english_pob_choice: strengthened me
  chosen_spanish: me fortaleció
  alternatives_spanish:
  - me dio fuerzas
  - me hizo fuerte
  lexicon: HALOT
  rationale: חזק en piel expresa fortalecer o hacer fuerte. «Me fortaleció» preserva ese sentido amplio, tanto físico como anímico, acorde con el contexto inmediato de Daniel.
theological_decisions:
- issue: Identidad de la figura con apariencia humana
  english_pob_reading: Render descriptively without identifying the being
  chosen_spanish_reading: Describir la figura sin identificarla
  alternative_spanish_readings:
  - un ángel
  - el Cristo preencarnado
  rationale: El texto hebreo solo dice que tenía apariencia de hombre y que tocó y fortaleció a Daniel. La traducción debe conservar esa descripción y no añadir una identificación teológica que el versículo no explicita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El pasaje mantiene alta concordancia con el análisis inglés y no requiere cambios respecto del antecedente auditado; se conserva la ambigüedad descriptiva de la figura y la fuerza iterativa de «again».
  spanish_consistency_notes:
  - Se usa «Dios» y «Yahvé» solo cuando el contexto lo requiera; aquí no aparecen.
  - Se mantiene la distinción descriptiva de apariencia frente a identificación ontológica.
  - «Me fortaleció» conserva el valor amplio del verbo sin reducirlo a simple ánimo.
