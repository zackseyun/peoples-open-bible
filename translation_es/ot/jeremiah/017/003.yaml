translation:
  language: es
  text: Mi montaña en el campo[a]—tu riqueza[b], todos tus tesoros, y tus lugares altos a causa del pecado[c] en todo tu territorio[d]—los daré como botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Oh, mi montaña en el campo». La frase hebrea es difícil y puede referirse a Sion/Jerusalén como la montaña de Yahvé.'
    reason: alternative_reading
  - marker: b
    text: 'O: «tu fuerza» o, menos probablemente aquí, «tu ejército».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «por el pecado en todo tu territorio» o «en pecado en todo tu territorio». La construcción puede expresar causa o ámbito; aquí se traduce de manera causal, como en la lectura de juicio adoptada por la POB.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «por todo tu territorio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרָרִי
  english_pob_choice: My mountain
  chosen_spanish: Mi montaña
  alternatives_spanish:
  - Oh, mi montaña
  - mi montaña del campo
  lexicon: HALOT
  rationale: Conservo el sustantivo concreto y el posesivo de primera persona, tal como la POB inglesa mantiene la imagen literal. En Jeremías puede aludir a Sion/Jerusalén como la montaña de Yahvé; el español no debe resolver la ambigüedad en el cuerpo del texto.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la campiña
  lexicon: HALOT
  rationale: «Campo» comunica de forma natural y suficientemente formal el hebreo literal «en el campo», conservando la imagen y la posible amplitud semántica de campo abierto/campiña.
- source_word: חֵילְךָ
  english_pob_choice: your wealth
  chosen_spanish: tu riqueza
  alternatives_spanish:
  - tu fuerza
  - tu ejército
  - tus recursos
  lexicon: HALOT
  rationale: La POB opta por «wealth» por el paralelo con «all your treasures» y por el contexto de botín. En español, «riqueza» preserva ese sentido económico mejor que «fuerza» o «ejército».
- source_word: כָל אוֹצְרוֹתֶיךָ
  english_pob_choice: all your treasures
  chosen_spanish: todos tus tesoros
  alternatives_spanish:
  - todas tus tesorerías
  - todos tus almacenes
  lexicon: HALOT
  rationale: «Tesoros» es el equivalente más claro y natural para אוֹצְרוֹת en este contexto de juicio y despojo. Mantiene el paralelismo con «riqueza» sin convertirlo en una explicación interpretativa.
- source_word: לָבַז
  english_pob_choice: as plunder
  chosen_spanish: como botín
  alternatives_spanish:
  - para saqueo
  - como despojo
  lexicon: HALOT
  rationale: «Como botín» reproduce bien la fórmula de juicio אֶתֵּן לָבַז y es idiomático en español bíblico moderno. «Botín» preserva el resultado de entrega forzosa sin perder la fuerza militar/judicial.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: daré
  alternatives_spanish:
  - daré yo
  - entregaré
  lexicon: HALOT
  rationale: El futuro simple español expresa naturalmente el imperfecto profético. «Daré» se mantiene cercano al hebreo y evita una paráfrasis más interpretativa como «entregaré».
- source_word: בָּמֹתֶיךָ
  english_pob_choice: your high places
  chosen_spanish: tus lugares altos
  alternatives_spanish:
  - tus altos lugares
  - tus santuarios en las alturas
  lexicon: HALOT
  rationale: «Lugares altos» mantiene el término cultual tradicional y su referencia a santuarios elevados, sin explicitar más de lo que el hebreo exige. No lo sustituyo por «santuarios» para no resolver la identificación de forma indebida.
- source_word: בְּחַטָּאת
  english_pob_choice: because of sin
  chosen_spanish: a causa del pecado
  alternatives_spanish:
  - por el pecado
  - en pecado
  lexicon: HALOT
  rationale: La preposición ב aquí funciona de manera causal en el contexto de juicio. «A causa del pecado» expresa esa relación sin perder la brevedad de la construcción hebrea.
- source_word: בְּכָל גְּבוּלֶיךָ
  english_pob_choice: throughout all your territory
  chosen_spanish: en todo tu territorio
  alternatives_spanish:
  - por todo tu territorio
  - dentro de todos tus límites
  lexicon: HALOT
  rationale: «Territorio» comunica el valor de גבול en sentido de extensión territorial. «En todo» conserva el matiz distributivo de la POB inglesa y la cobertura total del alcance del pecado.
theological_decisions:
- issue: Referente de «Mi montaña en el campo»
  english_pob_reading: A reference to the LORD's mountain/Zion-Jerusalem exposed to judgment
  chosen_spanish_reading: Una referencia a la montaña de Yahvé, probablemente Sion/Jerusalén, expuesta al juicio
  alternative_spanish_readings:
  - «Oh, mi montaña en el campo» como vocativo
  - Una referencia más general a la región montañosa
  rationale: La frase hebrea es difícil y la POB conserva la imagen literal sin cerrarla. En español conviene mantener la misma apertura, pero la nota puede aclarar que probablemente alude a Sion/Jerusalén como la montaña de Yahvé.
  doctrine_reference: Jeremías 17:3; teología de Sion en Jeremías
- issue: Relación causal de «a causa del pecado en todo tu territorio»
  english_pob_reading: because of sin throughout all your territory
  chosen_spanish_reading: El pecado extendido por todo el territorio es la base del juicio de entrega al saqueo
  alternative_spanish_readings:
  - «en pecado en todo tu territorio»
  - «por el pecado en todo tu territorio»
  rationale: La POB entiende la frase como causal y no meramente locativa. En español, «a causa del pecado» comunica el juicio sin borrar la ambigüedad de si el pecado es la causa o la esfera, aunque la decisión principal sigue siendo causal.
  doctrine_reference: Jeremías 17:3; lenguaje profético de juicio
- issue: Entrega como botín
  english_pob_reading: I will give as plunder
  chosen_spanish_reading: Yahvé declara que entregará estas posesiones como botín
  alternative_spanish_readings:
  - «las daré como botín»
  - «las entregaré como despojo»
  rationale: La fórmula profética debe sonar judicial y violenta, no ornamental. «Daré como botín» conserva la fuerza del hebreo לָבַז y sigue la elección inglesa de «as plunder».
  doctrine_reference: Jeremías 17:3; fórmulas de juicio del AT
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente de la POB inglesa, que reordenó la oración para que «tus lugares altos» sea otro objeto de «daré como botín» y mantuvo la frase causal «a causa del pecado en todo tu territorio». En español se preserva ese orden y esa relación sintáctica.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el Tetragrámaton.
  - Se conserva la imagen de «montaña» en vez de resolverla como una paráfrasis interpretativa.
  - Se mantiene «lugares altos» por su valor cultual tradicional y su transparencia lexical.
  - Se traduce «לָבַז» con «como botín», coherente con la fórmula de juicio.
  - La puntuación con rayas reproduce la segmentación retórica del original y de la POB inglesa.
