translation:
  language: es
  text: No te inquietes[a] a causa de los malhechores; no envidies a los impíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te irrites».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְחַר
  english_pob_choice: be agitated
  chosen_spanish: te irrites
  alternatives_spanish:
  - te agites
  - te exasperes
  - te enfurezcas
  lexicon: HALOT
  rationale: El hitpael de חרה expresa aquí un calentamiento o turbación interior. «Te irrites» comunica esa perturbación emocional de manera natural en español sin reducirla solo a enojo ni sonar tan débil o arcaico como «te inquietes» en este contexto prohibitivo.
- source_word: בַּמְּרֵעִים
  english_pob_choice: because of evildoers
  chosen_spanish: a causa de los malhechores
  alternatives_spanish:
  - por causa de los malhechores
  - a causa de los evildoers
  - por los malhechores
  lexicon: HALOT
  rationale: La preposición ב con este verbo funciona de manera causal o relacionada con el motivo de la reacción. «A causa de» conserva ese sentido. «Malhechores» refleja bien el participio como personas que hacen mal, con un registro proverbial claro.
- source_word: תְּקַנֵּא
  english_pob_choice: envy
  chosen_spanish: envidies
  alternatives_spanish:
  - tengas celos de
  - te pongas celoso de
  - anheles
  lexicon: HALOT
  rationale: En este paralelismo sapiencial, קנא con ב expresa envidia o celos hacia otros. «Envidies» es la equivalencia idiomática más transparente en español y mantiene la prohibición en paralelo con el primer hemistiquio.
- source_word: בָּרְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los injustos
  - los culpables
  lexicon: HALOT
  rationale: «Impíos» preserva el término sapiencial para el grupo moralmente perverso y mantiene el contraste proverbial entre justos e impíos. «Malvados» es posible, pero «impíos» encaja mejor con el registro bíblico de Proverbios.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No debes
  - Nunca
  lexicon: HALOT
  rationale: אַל con el imperfecto/jussive introduce una prohibición simple. «No» es la forma más natural y fiel en español para el mandato negativo.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el testimonio hebreo masorético aportado y con la línea auditada en inglés; la única decisión relevante es lexical, especialmente la fuerza de תִּתְחַר y la causalidad de בַּמְּרֵעִים.
  spanish_consistency_notes:
  - Se preservó el paralelismo de dos prohibiciones breves, como en el hebreo.
  - Se evitó «SEÑOR» u otras sustituciones porque no aparece el nombre divino en este versículo.
  - «Impíos» mantiene el registro sapiencial estándar sin suavizar la categoría moral.
  - La nota al pie se ancla solo en el verbo del primer hemistiquio, siguiendo la alternativa registrada en el inglés POB.
