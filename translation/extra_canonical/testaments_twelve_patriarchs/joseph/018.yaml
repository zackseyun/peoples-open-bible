translation:
  text: |-
    1. If, then, you also walk in the commandments of the Lord, God will exalt you in good things forever.
    2. And if anyone wants to do evil to you, you, by doing good, pray for him, and you will be delivered from every evil by the Lord.
    3. For see, you yourselves know that through my humility and my long-suffering I took as my wife the daughter of the priest of Heliopolis, and a hundred talents of gold were given to me with her, and my Lord made them subject to me.
    4. Even so
