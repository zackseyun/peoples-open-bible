translation:
  language: es
  text: ¿No fue por su mano que el sol se detuvo[b], y un día fue como dos[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «un día fue como dos días». El hebreo dice simplemente «como dos», y «días» se entiende por el contexto.'
    reason: lexical_alternative
  - marker: b
    text: Alude a la tradición de la victoria de Josué, en la que se detuvo el curso del sol; compárese Josué 10:12–14.
    reason: cross_reference
lexical_decisions:
- source_word: הלא
  english_pob_choice: Was it not
  chosen_spanish: ¿No fue...?
  alternatives_spanish:
  - ¿Acaso no fue...?
  - ¿No fue acaso...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera asentimiento. En español, «¿No fue...?" conserva bien ese valor enfático y suena natural en un registro bíblico moderno.
- source_word: בידו
  english_pob_choice: by his hand
  chosen_spanish: por su mano
  alternatives_spanish:
  - en su mano
  - por medio de él
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de la mano como agente/instrumento. «Por su mano» comunica la causalidad sin perder la metáfora corporal del hebreo.
- source_word: עמד
  english_pob_choice: stood still
  chosen_spanish: se detuvo
  alternatives_spanish:
  - se mantuvo inmóvil
  - se paró
  lexicon: HALOT
  rationale: En referencia al sol, el verbo expresa el cese de su movimiento. «Se detuvo» es idiomático en español y preserva la idea de interrupción del curso solar.
- source_word: השמש
  english_pob_choice: the sun
  chosen_spanish: el sol
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del término.
- source_word: יום אחד
  english_pob_choice: one day
  chosen_spanish: un día
  alternatives_spanish:
  - un solo día
  lexicon: HALOT
  rationale: Traducción directa de la expresión temporal. «Un día» reproduce la sencillez del hebreo.
- source_word: כשנים
  english_pob_choice: was like two
  chosen_spanish: fue como dos
  alternatives_spanish:
  - era como dos días
  - fue como dos días
  lexicon: HALOT
  rationale: El hebreo dice literalmente «como dos», con «día» implícito por el contexto. Se conserva la concisión del original; la nota aclara la alternativa más explícita.
theological_decisions:
- issue: Milagro del sol detenido en la tradición de Josué
  english_pob_reading: Render the statement straightforwardly as a historical claim within the poem of praise, without naturalizing it.
  chosen_spanish_reading: Traducir la afirmación de manera directa, como un hecho presentado por el texto, sin convertirlo en mera metáfora.
  alternative_spanish_readings:
  - Interpretarlo como hipérbole poética sobre la victoria militar o la luz del día.
  - Suavizarlo a una expresión figurada del avance del combate.
  rationale: El hebreo y el paralelo griego presentan el evento como el sol detenido y el día extendido. La traducción española debe conservar esa tensión teológica y no resolverla por adelantado.
  doctrine_reference: Primacía del texto original; conservar la tensión teológica sin naturalización interpretativa.
translation_notes:
  revision_awareness: La redacción sigue la revisión del audit trail que prefirió «was like two» sobre «became like two» para ajustarse mejor al hebreo היה y mantener un tono más formal y natural. El español refleja esa decisión con «fue como dos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la metáfora concreta de «mano» en lugar de una paráfrasis causal más abstracta.
  - «Se detuvo» conserva el valor de cese del movimiento sin añadir explicaciones interpretativas.
