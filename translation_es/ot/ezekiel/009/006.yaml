translation:
  language: es
  text: 'Hombre anciano, hombre joven, virgen, niños pequeños y mujeres: mátenlos por completo. Pero no se acerquen a ningún hombre sobre quien esté la marca[a], y comiencen por mi santuario. Y comenzaron con los hombres ancianos[b] que estaban delante de la casa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'taw'; es decir, la señal protectora puesta sobre los fieles (véase 9:4).
    reason: lexical_alternative
  - marker: b
    text: 'O: «los ancianos» que estaban delante de la casa (es decir, del templo).'
    reason: alternative_reading
lexical_decisions:
- source_word: זָקֵן
  english_pob_choice: old man
  chosen_spanish: viejo
  alternatives_spanish:
  - anciano
  - hombre viejo
  lexicon: HALOT
  rationale: El hebreo usa el singular distributivo dentro de una lista de categorías. En español, "viejo" mantiene la categoría de edad sin forzar el sentido institucional de "anciano" o "presbítero".
- source_word: בָּחוּר
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - joven hombre
  lexicon: HALOT
  rationale: El término designa a un varón joven en la plenitud de la vida. "Joven" conserva esa categoría etaria de forma natural en español.
- source_word: בְתוּלָה
  english_pob_choice: virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - joven mujer
  - doncella
  lexicon: HALOT
  rationale: El sentido léxico básico es "virgen"; no hay indicio suficiente para rebajar la fuerza del término a una mera referencia a edad o estado social.
- source_word: טַף
  english_pob_choice: little children
  chosen_spanish: niños pequeños
  alternatives_spanish:
  - niños
  - pequeños
  lexicon: HALOT
  rationale: La palabra alude a los pequeños, especialmente niños de corta edad. "Niños pequeños" comunica mejor la especificidad y la carga emotiva del término.
- source_word: נָשִׁים
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  lexicon: HALOT
  rationale: En una lista demográfica como esta, el sentido genérico "mujeres" es el más directo; "esposas" introduciría una relación no señalada por el contexto.
- source_word: תַּהַרְג֣וּ
  english_pob_choice: you shall kill
  chosen_spanish: los matarás
  alternatives_spanish:
  - mátalos
  - los destruirás
  lexicon: HALOT
  rationale: El inglés POB conserva la severidad del mandato. En español, el futuro con valor imperativo comunica la orden de manera natural; el objeto directo retoma la serie nominal anterior.
- source_word: לְמַשְׁחִית
  english_pob_choice: to destruction
  chosen_spanish: hasta la destrucción
  alternatives_spanish:
  - para destrucción
  - hasta el exterminio
  lexicon: HALOT
  rationale: La expresión intensifica el mandato hacia una destrucción total. "Hasta la destrucción" conserva el matiz preposicional y evita sobreparafrasear.
- source_word: הַתָּו
  english_pob_choice: the mark
  chosen_spanish: la marca
  alternatives_spanish:
  - la señal
  - la marca taw
  lexicon: HALOT
  rationale: En contexto se trata de la señal protectora puesta sobre los fieles. "La marca" comunica la función; la alusión más literal al taw se reserva para nota.
- source_word: אַל תִּגַּשׁוּ
  english_pob_choice: do not come near
  chosen_spanish: no se acerquen
  alternatives_spanish:
  - no se aproximen
  - no toquen
  lexicon: HALOT
  rationale: El verbo expresa aproximarse o llegar cerca. "No se acerquen" evita añadir la idea de tocar, que sería una interpretación más estrecha de la prohibición.
- source_word: וּמִמִּקְדָּשִׁי תָּחֵלּוּ
  english_pob_choice: begin at my sanctuary
  chosen_spanish: y comiencen desde mi santuario
  alternatives_spanish:
  - y comiencen en mi santuario
  - y empiecen por mi santuario
  lexicon: HALOT
  rationale: El verbo en este contexto indica iniciar la acción; "santuario" es el equivalente usual de מִקְדָּשׁ. "Desde" conserva la idea de punto de arranque sin sugerir otra relación espacial.
- source_word: וַיָּחֵלּוּ
  english_pob_choice: so they began
  chosen_spanish: Y comenzaron
  alternatives_spanish:
  - Y empezaron
  lexicon: HALOT
  rationale: La waw narrativa avanza la acción; "Y comenzaron" reproduce bien ese flujo en español.
- source_word: בָּאֲנָשִׁים הַזְּקֵנִים
  english_pob_choice: with the old men
  chosen_spanish: con los hombres viejos
  alternatives_spanish:
  - con los ancianos
  - con los viejos
  lexicon: HALOT
  rationale: La repetición de זקן puede aludir a edad, aunque el contexto del templo permite una lectura de "ancianos". Se mantiene "hombres viejos" para conservar la lectura etaria principal y la tensión interpretativa.
- source_word: לִפְנֵי הַבָּיִת
  english_pob_choice: who were before the house
  chosen_spanish: que estaban delante de la casa
  alternatives_spanish:
  - que estaban ante el templo
  - que estaban delante de la casa de Dios
  lexicon: HALOT
  rationale: בַּיִת aquí puede referirse al edificio del templo. "Delante de la casa" preserva la literalidad del hebreo y deja abierta la identificación contextual.
theological_decisions:
- issue: 'Cómo reflejar הַתָּו: marca protectora o referencia a la letra taw'
  english_pob_reading: the mark; note that it is the Hebrew 'taw' and the protective sign from v. 4
  chosen_spanish_reading: la marca; en nota, la referencia al taw hebreo y a la señal protectora de 9:4
  alternative_spanish_readings:
  - la señal
  - la marca taw
  rationale: 'El texto principal debe comunicar la función narrativa inmediata: distinguir a los preservados. La nota conserva la alusión literal a la letra taw sin perder la lectura funcional.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Si הַזְּקֵנִים debe leerse como categoría de edad o cargo
  english_pob_reading: old men, with a footnote allowing elders
  chosen_spanish_reading: hombres viejos, con nota que deja abierta la posibilidad de "ancianos"
  alternative_spanish_readings:
  - ancianos
  - presbíteros
  rationale: El versículo empieza con una serie de grupos demográficos. No obstante, el escenario del templo hace plausible una lectura de cargo, por lo que conviene preservar la ambigüedad en nota.
  doctrine_reference: Translation philosophy §3, §4
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que restauró los sustantivos singulares distributivos del hebreo al inicio de la lista y mantuvo la intensidad de la frase final. Para el español, se conservaron las categorías singulares en la secuencia inicial y se resolvió la forma verbal con un futuro de mandato natural.
  spanish_consistency_notes:
  - Se usa "Yahvé" como forma base en el proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - '"Santuario" se mantiene para מִקְדָּשׁ; "casa" conserva la posible referencia contextual al templo sin explicitarla en el texto principal.'
  - Se conserva la tensión entre lectura etaria y lectura de cargo para זְקֵנִים mediante una nota, no mediante una sustitución dogmática.
