  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: עָלָיו = «Sobre él», אַשְׁפָּה = «carcaj», חֲנִית = «lanza», כִידוֹן = «jabalina». Se debe corregir la distribución y redacción de las notas para alinearlas con el expediente inglés y con el hebreo.'
