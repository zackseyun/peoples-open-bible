translation:
  language: es
  text: Sedequías tenía veintiún años cuando llegó a ser rey[a], y reinó once años en Jerusalén. Su madre se llamaba Hamutal, hija de Jeremías de Libna[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “cuando comenzó a reinar”.
    reason: lexical_alternative
  - marker: b
    text: O “desde Libna”.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְאַחַת שָׁנָה
  english_pob_choice: was twenty-one years old
  chosen_spanish: tenía veintiún años
  alternatives_spanish:
  - era hijo de veintiún años
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de edad. En español, 'tenía veintiún años' comunica con naturalidad el sentido sin introducir una literalidad extraña.
- source_word: בְמָלְכוֹ
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a ser rey
  - en su reinar
  lexicon: HALOT
  rationale: La construcción con ב más el infinitivo de מלך marca el momento de la entronización o acceso al trono. 'Comenzó a reinar' mantiene ese valor temporal con español claro.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  lexicon: HALOT
  rationale: El verbo indica el ejercicio efectivo del reinado, no solo el estado de tener el título. 'Reinó' es la equivalencia directa y precisa.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa exige una traducción directa y natural en español.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: Su madre se llamaba
  alternatives_spanish:
  - Y el nombre de su madre era
  lexicon: HALOT
  rationale: La genealogía hebrea se expresa de modo más idiomático en español con una construcción verbal personal. Conserva el dato sin calco innecesario.
- source_word: חמיטל
  english_pob_choice: Hamutal
  chosen_spanish: Hamutal
  alternatives_spanish:
  - Hamital
  lexicon: HALOT
  rationale: Se translitera el nombre propio. Se conserva la forma habitual en español y en la tradición académica.
- source_word: בַּת יִרְמְיָהוּ
  english_pob_choice: the daughter of Jeremiah
  chosen_spanish: hija de Jeremías
  lexicon: HALOT
  rationale: La relación filial es estándar y se traduce de forma directa. 'Jeremías' es la transliteración estable del nombre אישי.
- source_word: מִלִּבְנָה
  english_pob_choice: of Libnah
  chosen_spanish: de Libna
  alternatives_spanish:
  - de Libná
  - de Libnah
  lexicon: HALOT
  rationale: El hebreo puede señalar procedencia o asociación geográfica. En español, 'de Libna' conserva esa relación de manera natural; la nota explica la alternativa 'desde Libna'/'de Libna' implícita en el hebreo.
translation_notes:
  revision_awareness: El texto concuerda con el contexto auditado en inglés y con la revisión más reciente, que no introdujo cambios. Se mantiene la equivalencia semántica del modismo de edad, del valor temporal de בְמָלְכוֹ y de la posible ambigüedad de מִלִּבְנָה.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en otros contextos, pero este versículo no contiene el nombre divino.
  - Se mantiene 'reinó' para מָלַךְ y 'comenzó a reinar' para בְמָלְכוֹ, distinguiendo acceso al trono y ejercicio del reinado.
  - Se transliteran los nombres propios de manera uniforme en español.
  - La nota de 'Libna' preserva la alternativa de procedencia indicada por el audit trail en inglés.
