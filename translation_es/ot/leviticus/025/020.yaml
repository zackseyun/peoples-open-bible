  source_alignment_summary: 'El borrador sigue bien la estructura condicional y la pregunta principal del hebreo, y conserva la alternativa léxica para תְּבוּאָתֵנוּ. Sin embargo, no refleja con suficiente precisión el valor prospectivo uniforme de los imperfectos en la segunda cláusula: «no sembramos» rompe la correspondencia con נִזְרָע y con el paralelo «ni recogeremos». Además, «Pues» es posible para הֵן, pero en esta configuración después de la pregunta funciona mejor una formulación más directa de constatación.'
  spanish_quality_summary: El texto es legible y digno, pero presenta una mezcla verbal poco natural («no sembramos ni recogeremos») dentro de una misma explicación futura. «Nuestra producción» es comprensible, aunque algo técnica; puede mantenerse por fidelidad al rango semántico, con nota. Una leve regularización mejora claridad y fluidez.
  glossary_alignment: No hay términos de glosario mayor en juego. La nota léxica sobre תְּבוּאָה está bien orientada. La revisión propuesta mantiene «producción» con alternativas «cosecha» y «rendimiento».
  issues:
  - severity: medium
    issue: Tiempo verbal inconsistente en «no sembramos ni recogeremos»
    rationale: Los verbos hebreos נִזְרָע y נֶאֱסֹף son paralelos y describen la situación futura anticipada del séptimo año. En español, mezclar presente y futuro debilita esa simetría y suena menos natural.
  - severity: low
    issue: «Pues» para הֵן es defendible pero menos nítido aquí
    rationale: Tras la pregunta, הֵן introduce una constatación enfática/expositiva. «Miren» sería demasiado coloquial y «He aquí» demasiado rígido; omitir un conector enfático débil y dejar la segunda oración explicativa resulta más natural en español formal.
