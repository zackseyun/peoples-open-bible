  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: David consulta a Yahvé, recibe la orden de no subir, de rodear por detrás y de venir contra los filisteos frente a los בכאים. Sin embargo, «los álamos» no refleja la decisión léxica auditada ni la evidencia disponible; el inglés POB eligió «balsam trees» con nota de incertidumbre, y «álamos» introduce una identificación botánica distinta y poco sustentada. También la nota sobre Yahvé es innecesaria como alternativa, ya que el proyecto fija «Yahvé» como forma principal, no como lectura alternativa que requiera nota.'
  spanish_quality_summary: El español es claro y digno. «Consultó a Yahvé» y «No subirás» funcionan bien. «Da la vuelta por detrás de ellos» es comprensible, aunque «rodea por detrás de ellos» o «da un rodeo» sería algo más táctico; no obstante, no es un problema grave. El punto principal de calidad y fidelidad es reemplazar «álamos» por una forma que siga la decisión base y mantenga la incertidumbre botánica en nota.
  glossary_alignment: 'Se alinea bien con la norma del proyecto en «Yahvé». No hay conflictos con otra terminología clave. La mayor desviación es בְּכָאִים: debe reflejar «balsameros»/«árboles de bálsamo» o una forma equivalente, con nota para «baca»/«morales», en vez de «álamos».'
  issues:
  - severity: high
    issue: «los álamos» para בְּכָאִים
    rationale: La auditoría inglesa eligió «the balsam trees» y preservó la incertidumbre en nota. «Álamos» no corresponde a esa decisión y puede dar una identificación errónea del árbol.
  - severity: medium
    issue: Nota [a] sobre «Yahveh»
    rationale: El proyecto ya establece «Yahvé» como forma principal para יהוה. Presentar «Yahveh» como alternativa en nota aquí no responde a una ambigüedad del texto fuente ni a una necesidad del lector.
  revised_spanish_text: 'Así que David consultó a Yahvé, y él dijo: «No subirás; da la vuelta por detrás de ellos, y vendrás contra ellos de frente a los balsameros[a]».'
  revised_footnotes:
