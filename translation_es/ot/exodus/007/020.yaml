translation:
  language: es
  text: Entonces Moisés y Aarón hicieron así[a], tal como Yahvé había mandado. Y él levantó la vara y golpeó el agua que estaba en el Nilo ante los ojos del faraón y ante los ojos de sus siervos, y toda el agua que estaba en el Nilo se convirtió en sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el río»; en Éxodo este término suele referirse específicamente al Nilo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  english_pob_choice: did so
  chosen_spanish: hicieron así
  alternatives_spanish:
  - lo hicieron así
  - así lo hicieron
  lexicon: HALOT
  rationale: Expresa la idea de cumplimiento de la orden previa sin añadir paráfrasis. En español, "hicieron así" mantiene la brevedad narrativa del hebreo y del POB inglés.
- source_word: כַּאֲשֶׁר צִוָּה
  english_pob_choice: just as ... had commanded
  chosen_spanish: tal como ... había mandado
  alternatives_spanish:
  - como ... había mandado
  - justo como ... había mandado
  lexicon: HALOT
  rationale: '"Tal como" conserva la comparación enfática del hebreo y el pluscuamperfecto refleja que la orden precedía a la acción.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Sigue el convenio de la POB en español para el Nombre divino: Yahvé. Evita la sustitución por un título y mantiene la trazabilidad al Tetragrama.'
- source_word: וַיָּרֶם
  english_pob_choice: he raised
  chosen_spanish: levantó
  alternatives_spanish:
  - alz ó
  - levantó en alto
  lexicon: HALOT
  rationale: En este contexto narrativo, "levantó" reproduce el gesto de elevar la vara antes del golpe. No se fuerza una glosa más interpretativa.
- source_word: בַּמַּטֶּה
  english_pob_choice: the staff
  chosen_spanish: la vara
  alternatives_spanish:
  - el bastón
  - la vara
  lexicon: HALOT
  rationale: '"Vara" es un equivalente natural y fiel para מַטֶּה en este relato; "bastón" sería menos adecuado en español bíblico narrativo.'
- source_word: וַיַּךְ אֶת הַמַּיִם
  english_pob_choice: struck the water
  chosen_spanish: hirió el agua
  alternatives_spanish:
  - golpeó el agua
  - azotó el agua
  lexicon: HALOT
  rationale: '"Hirió" mantiene la fuerza de נכה y evita una expresión demasiado mecánica. En español bíblico, también conserva la acción eficaz sobre el agua.'
- source_word: הַיְאֹר
  english_pob_choice: the Nile
  chosen_spanish: el Nilo
  alternatives_spanish:
  - el río
  lexicon: HALOT
  rationale: Como en el audit trail inglés, en Éxodo יְאֹר apunta específicamente al Nilo. Traducirlo como nombre propio elimina ambigüedad innecesaria.
- source_word: לְעֵינֵי ... וּלְעֵינֵי
  english_pob_choice: before Pharaoh's eyes and before the eyes of his servants
  chosen_spanish: ante los ojos del faraón y ante los ojos de sus siervos
  alternatives_spanish:
  - a la vista del faraón y a la vista de sus siervos
  - delante del faraón y delante de sus siervos
  lexicon: HALOT
  rationale: Conserva la repetición hebrea y el énfasis en la publicidad del acto. "Ante los ojos" es claro, solemne y cercano al hebreo.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  lexicon: HALOT
  rationale: La base léxica es "siervos/esclavos"; como aquí se trata del séquito de Faraón, "siervos" preserva el valor directo sin sobreespecificar rango.
- source_word: וַיֵּהָפְכוּ
  english_pob_choice: was turned
  chosen_spanish: se convirtió
  alternatives_spanish:
  - fue vuelto
  - se tornó
  lexicon: HALOT
  rationale: Aunque el hebreo es plural con "todas las aguas", en español resulta natural el singular de masa. "Se convirtió" comunica el cambio de estado/resultativo sin sonar forzado.
- source_word: לְדָם
  english_pob_choice: to blood
  chosen_spanish: en sangre
  alternatives_spanish:
  - a sangre
  - hasta sangre
  lexicon: HALOT
  rationale: En español, el resultado se expresa mejor con "en sangre"; mantiene la idea de transformación del agua sin perder la relación con el verbo anterior.
theological_decisions:
- issue: Tratamiento del Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La POB inglesa fija Yahweh para el Tetragrama; en español, la convención editorial del proyecto usa Yahvé como forma estable y reconocible. No se sustituye por un título como "Señor".
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé / Yahweh según lengua meta'
- issue: Referencia a la transformación del agua
  english_pob_reading: all the water ... was turned to blood
  chosen_spanish_reading: todas las aguas ... se convirtieron en sangre
  alternative_spanish_readings:
  - el agua ... se convirtió en sangre
  - toda el agua ... fue cambiada en sangre
  rationale: El hebreo pluraliza "todas las aguas"; en español bíblico, puede conservarse el plural para respetar la concordancia del texto y la distribución total del juicio sobre el Nilo.
  doctrine_reference: Principio de cercanía formal con concordancia contextual
- issue: Título/estado de 'servants' en la corte de Faraón
  english_pob_reading: his servants
  chosen_spanish_reading: sus siervos
  alternative_spanish_readings:
  - sus servidores
  - sus oficiales
  rationale: No hay base para elevar el término a "oficiales". "Siervos" preserva la amplitud semántica y la tensión social del relato.
  doctrine_reference: Principio léxico de no sobreespecificación
translation_notes:
  revision_awareness: He seguido de cerca el texto hebreo y el audit trail inglés, manteniendo la decisión lexical clave sobre יהוה → Yahvé y la referencia específica a יְאֹר como el Nilo. También he preservado la visibilidad pública del acto con una repetición española equivalente a לְעֵינֵי...וּלְעֵינֵי.
  spanish_consistency_notes:
  - Se evita "SEÑOR" para יְהוָה, conforme al estándar del proyecto.
  - Se prefiere "Yahvé" sobre "Yahweh" en español por consistencia editorial.
  - '"Siervos" se usa como equivalente directo de עֲבָדָיו sin convertirlo en un término administrativo más específico.'
  - La nota al pie se ancla en "Nilo" para reflejar la alternativa hebrea 'el río' sin perder claridad contextual.
