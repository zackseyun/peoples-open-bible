translation:
  language: es
  text: Te vestí con tela bordada[a], te puse sandalias de cuero fino[b], te envolví en lino fino y te cubrí con seda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un tejido costoso»; la identificación precisa del término hebreo es incierta.
    reason: lexical_alternative
  - marker: b
    text: El hebreo תָּחַשׁ se refiere a un material usado para calzado fino; su origen animal o material exacto es incierto, por eso se traduce aquí «cuero fino» en vez de una identificación más especulativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִקְמָה
  english_pob_choice: embroidered cloth
  chosen_spanish: tela bordada
  alternatives_spanish:
  - tejido bordado
  - paño bordado
  lexicon: HALOT
  rationale: El sustantivo nombra material o labor bordada, no un tipo de prenda. «Tela bordada» conserva la imagen textil de forma natural en español sin especificar indebidamente una vestidura particular.
- source_word: תָּחַשׁ
  english_pob_choice: fine leather
  chosen_spanish: cuero fino
  alternatives_spanish:
  - cuero delicado
  - cuero de animal marino
  - piel fina
  lexicon: HALOT
  rationale: La identificación exacta del material es incierta. En contexto de calzado, «cuero fino» mantiene el sentido de un material de lujo sin imponer una identificación zoológica especulativa.
- source_word: וָאֶנְעֲלֵךְ תָּחַשׁ
  english_pob_choice: put fine leather sandals on you
  chosen_spanish: te puse sandalias de cuero fino
  alternatives_spanish:
  - te calzé con cuero fino
  - te puse calzado de cuero fino
  lexicon: HALOT
  rationale: El verbo sugiere poner calzado a alguien. En español, «sandalias» hace explícito el tipo de calzado implicado y resulta idiomático, conservando la imagen de adorno y prestigio.
- source_word: שֵׁשׁ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino de calidad
  lexicon: HALOT
  rationale: שֵׁשׁ designa un tejido fino de alto valor. «Lino fino» preserva la cualidad de lujo que exige el contexto.
- source_word: וָאֶחְבְּשֵׁךְ בַּשֵּׁשׁ
  english_pob_choice: wrapped you in fine linen
  chosen_spanish: te envolví en lino fino
  alternatives_spanish:
  - te ceñí con lino fino
  - te vestí con lino fino
  lexicon: HALOT
  rationale: חבש puede significar atar, ceñir o envolver. Aquí la secuencia de vestiduras favorece «te envolví», que expresa la acción de cubrir/adornar sin sugerir vendaje médico.
- source_word: מֶשִׁי
  english_pob_choice: silk
  chosen_spanish: seda
  alternatives_spanish:
  - tela costosa
  - tejido fino
  lexicon: HALOT
  rationale: El término apunta a una tela valiosa; «seda» es la equivalencia tradicional y más comprensible en español para un tejido de lujo, manteniendo la nota de incertidumbre cuando se necesita.
- source_word: וָאֲכַסֵּךְ
  english_pob_choice: covered you
  chosen_spanish: te cubrí
  alternatives_spanish:
  - te velé
  - te abrigué
  lexicon: HALOT
  rationale: כסה significa cubrir o velar. «Te cubrí» es la traducción más directa y adecuada para la progresión de adornos acumulados en el versículo.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios aplicados; el borrador mantiene la lectura de lujo acumulativo del hebreo y la misma cautela ante las dos lexicales inciertas (רִקְמָה y תָּחַשׁ).'
  spanish_consistency_notes:
  - Se conserva el paralelismo de cuatro acciones sucesivas con verbos en pretérito perfecto simple.
  - «Lino fino» y «seda» mantienen el registro de lujo del pasaje sin añadir detalles no presentes en el hebreo.
  - Se evita «SEÑOR» u otras sustituciones teológicas porque el versículo no contiene el nombre divino ni un título que requiera ajuste doctrinal.
