  to: Y todo el pueblo se reunió como un solo hombre[a] en la plaza que estaba delante de la Puerta del Agua, y le dijeron a Esdras el escriba que trajera el Libro de la Ley de Moisés, que Yahvé había mandado a Israel.
  rationale: Se hizo una reparación menor de naturalidad española al añadir el clítico en «le dijeron a Esdras», sin cambiar el sentido del hebreo. También se corrigió la nota al pie para usar una alternativa idiomática española fiel al valor del modismo hebreo.
