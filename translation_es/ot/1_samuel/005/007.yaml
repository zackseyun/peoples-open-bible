    text: 'O: «no debe quedarse con nosotros». El verbo hebreo puede significar «sentarse», «habitar» o «permanecer».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su mano es pesada contra nosotros», un modismo para una fuerte presión o juicio divino.'
    reason: lexical_alternative
