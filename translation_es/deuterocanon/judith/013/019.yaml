translation:
  language: es
  text: Y bendito es Yahvé, Dios[a], que creó los cielos y la tierra, que te guió a herir la cabeza del gobernante de nuestros enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «te guió para el herimiento de la cabeza del gobernante de nuestros enemigos». El griego es más literal: «te dirigió hacia/para una herida de la cabeza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογημένος
  english_pob_choice: blessed
  chosen_spanish: bendito
  alternatives_spanish:
  - alabado
  - bendecido
  lexicon: LEH/BDAG
  rationale: En una fórmula doxológica, «bendito» conserva en español la fuerza benedictoria y litúrgica del participio griego mejor que un giro más explicativo.
- source_word: Κύριος ὁ θεὸς
  english_pob_choice: the Lord God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - el Señor Dios
  - el Señor, Dios
  lexicon: LEH
  rationale: Se mantiene el nombre divino como «Yahvé» según la convención del proyecto; «Dios» conserva la aposición griega ὁ θεός sin oscurecerla con una simple sustitución devocional.
- source_word: ἔκτισεν
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - hizo
  - fundó
  lexicon: LEH
  rationale: «Creó» expresa con naturalidad en español la acción divina de κτίζω respecto de los cielos y la tierra, sin debilitar el contenido de creación.
- source_word: τοὺς οὐρανοὺς καὶ τὴν γῆν
  english_pob_choice: the heavens and the earth
  chosen_spanish: los cielos y la tierra
  alternatives_spanish:
  - el cielo y la tierra
  lexicon: LEH
  rationale: El plural griego οὐρανούς se refleja mejor con «los cielos»; así se conserva la forma de la fuente y el registro bíblico natural en español.
- source_word: κατεύθυνέν
  english_pob_choice: directed
  chosen_spanish: te dirigió
  alternatives_spanish:
  - te guió
  - enderezó tu camino
  lexicon: LEH
  rationale: «Dirigió» reproduce la idea de orientar hacia un fin sin añadir más de lo que el verbo y la construcción con εἰς permiten.
- source_word: εἰς τραῦμα κεφαλῆς
  english_pob_choice: to strike the head
  chosen_spanish: para herir la cabeza
  alternatives_spanish:
  - para golpear la cabeza
  - para causar una herida en la cabeza
  lexicon: LEH
  rationale: El inglés POB revisado opta por «strike» para captar con más naturalidad εἰς τραῦμα κεφαλῆς; en español, «para herir la cabeza» conserva la relación telica y el matiz de lesión sin forzar una perífrasis demasiado dura.
- source_word: ἄρχοντος
  english_pob_choice: the ruler
  chosen_spanish: del jefe
  alternatives_spanish:
  - del gobernante
  - del príncipe
  - del soberano
  lexicon: LEH
  rationale: En este contexto narrativo y militar, «jefe» comunica bien el sentido de quien encabeza a los enemigos; se evita «príncipe» por su posible carga tradicional menos precisa en español contemporáneo.
- source_word: ἐχθρῶν ἡμῶν
  english_pob_choice: of our enemies
  chosen_spanish: de nuestros enemigos
  alternatives_spanish:
  - de los enemigos contra nosotros
  lexicon: LEH
  rationale: Se mantiene el genitivo posesivo sencillo y directo con «de nuestros enemigos».
theological_decisions:
- issue: Nombre divino en un contexto que en griego usa Κύριος ὁ θεός
  english_pob_reading: the Lord God
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor, Dios
  rationale: La política del proyecto pide traducir יהוה/YHWH como «Yahvé» y no ocultarlo bajo una máscara de mayúsculas. Aunque el griego dice Κύριος ὁ θεός, aquí la fórmula apunta al Dios de Israel; por eso se conserva «Yahvé» y se explica la equivalencia funcional con «Dios».
  doctrine_reference: 'Proyecto POB: convención del nombre divino; preservación del referente de Éxodo 3 y uso de κύριος en la LXX'
- issue: Agencia divina en la acción de Judith
  english_pob_reading: who directed you to strike the head of the ruler of our enemies
  chosen_spanish_reading: que te dirigió para herir la cabeza del jefe de nuestros enemigos
  alternative_spanish_readings:
  - que te guió para herir la cabeza del jefe de nuestros enemigos
  - que te encaminó a herir la cabeza del jefe de nuestros enemigos
  rationale: Se preserva la atribución explícita de la victoria a la dirección de Dios, sin convertirla en una afirmación más fuerte de causalidad que la que el verbo griego requiere.
  doctrine_reference: Tensión entre providencia divina y acción humana; equivalencia óptima
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa más reciente: la frase fue afinada de «to wound» a «to strike» para hacer más directo εἰς τραῦμα κεφαλῆς. En español se optó por «para herir la cabeza», que mantiene la relación de finalidad y la lesión implícita sin sobrecargar la línea con una construcción menos natural.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» según la terminología del proyecto para el nombre divino.
  - «Cielos» refleja el plural griego οὐρανούς.
  - «Jefe» se usa como equivalente contextual de ἄρχων en este pasaje, sin introducir un título eclesiástico o monárquico ajeno al contexto.
  - La nota al pie mantiene la alternativa literal del giro εἰς τραῦμα para dejar visible la tensión léxica del original.
