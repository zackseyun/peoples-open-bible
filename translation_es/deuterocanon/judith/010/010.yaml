    text: O «barranco» o «paso de montaña» para αὐλών.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν οὕτως
  english_pob_choice: they did so
  chosen_spanish: Y hicieron así
  alternatives_spanish:
  - Y así lo hicieron
  - Y procedieron así
  lexicon: LSJ
  rationale: La fórmula griega confirma la acción previa; en español, "hicieron así" conserva ese valor narrativo sin sonar arcaico.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió fuera
  - partió
  lexicon: LSJ
  rationale: En este contexto de salida de una casa o ciudad, "salió" es natural y fiel al movimiento indicado por el verbo griego.
- source_word: παιδίσκη
  english_pob_choice: maid
  chosen_spanish: criada
  alternatives_spanish:
  - sirvienta
  - muchacha
  lexicon: LSJ
  rationale: '"Criada" comunica el estatus subordinado de la joven acompañante de Judith con claridad en español moderno, sin cargarla de un matiz demasiado doméstico o anticuado.'
- source_word: ἀπεσκόπευον
  english_pob_choice: kept watching
  chosen_spanish: la estuvieron observando
  alternatives_spanish:
  - la observaron continuamente
  - seguían mirándola
  lexicon: LSJ
  rationale: El imperfecto sugiere acción continua; "la estuvieron observando" reproduce bien esa duración en español y mantiene el matiz visual del verbo.
- source_word: ἄνδρες τῆς πόλεως
  english_pob_choice: the men of the city
  chosen_spanish: los hombres de la ciudad
  alternatives_spanish:
  - los varones de la ciudad
  - los hombres de la aldea
  lexicon: LSJ
  rationale: Se conserva la referencia masculina explícita del griego y la formulación directa del grupo observador.
- source_word: ἕως οὗ κατέβη τὸ ὄρος
  english_pob_choice: until she went down the mountain
  chosen_spanish: hasta que bajó del monte
  alternatives_spanish:
  - hasta que descendió del monte
  - hasta que bajó de la montaña
  lexicon: LSJ
  rationale: '"Bajó del monte" es una equivalencia clara y idiomática para el descenso topográfico sin sobretraducir el verbo.'
- source_word: ἕως διῆλθεν τὸν αὐλῶνα
  english_pob_choice: until she passed through the valley
  chosen_spanish: hasta que atravesó el valle[a]
  alternatives_spanish:
  - hasta que pasó por el valle
  - hasta que cruzó el valle
  lexicon: LSJ
  rationale: '"Atravesó" refleja bien el paso a través de un espacio geográfico. Se mantiene la apertura semántica de αὐλών mediante una nota con alternativas posibles como "valle", "barranco" o "paso de montaña".'
- source_word: οὐκ ἔτι ἐθεώρουν αὐτήν
  english_pob_choice: they could no longer see her
  chosen_spanish: ya no pudieron verla
  alternatives_spanish:
  - ya no la veían
  - no la vieron más
  lexicon: LSJ
  rationale: La forma española expresa la cesación de la visión de manera natural y conserva el sentido resultativo del original.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan estrechamente; se ha mantenido la secuencia narrativa y la tensión léxica de αὐλών mediante una nota, sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se prefirió "salió" sobre "partió" para mantener el movimiento simple del griego.
  - Se usó "criada" para παιδίσκη por claridad narrativa y consistencia con un servicio doméstico subordinado.
  - Se evitó "SEÑOR" o terminología teológica no presente en el versículo.
  - La nota [a] se ancla en el sintagma geográfico para preservar la alternativa semántica del término griego.
