translation:
  language: es
  text: 'Entonces Isaías hijo de Amoz envió a Ezequías, diciendo: «Así dice Yahvé, el Dios de Israel: Lo que me has pedido en oración[a] acerca de Senaquerib, rey de Asiria, lo he oído».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Lo que has orado a mí acerca de Senaquerib, rey de Asiria...»'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo también puede reflejarse más literalmente con el orden: «Lo que me has pedido en oración acerca de Senaquerib, rey de Asiria, lo he oído».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió un mensaje
  lexicon: HALOT
  rationale: El verbo expresa simplemente el acto de enviar. En español, «envió» reproduce esa acción sin añadir contenido que el hebreo no explicita.
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ
  english_pob_choice: Isaiah son of Amoz
  chosen_spanish: Isaías hijo de Amoz
  alternatives_spanish:
  - Isaías, hijo de Amoz
  - Isaías el hijo de Amoz
  lexicon: HALOT
  rationale: Se conserva el patronímico de forma natural en español, con la transliteración estándar de los nombres propios.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La forma participial introduce el discurso directo de manera continua; «diciendo» mantiene ese flujo discursivo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se expresa con un presente solemne y natural en español, equivalente al valor formular del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md contested term: YHWH'
  rationale: Se traduce el Tetragrama con el nombre divino «Yahvé», siguiendo el criterio del proyecto de no ocultar el nombre propio de Dios detrás de una sustitución titular.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  - el Dios que es de Israel
  lexicon: HALOT
  rationale: El constructo identifica a Yahvé como el Dios del pacto de Israel; la formulación española es directa y fiel.
- source_word: אֲשֶׁר
  english_pob_choice: What
  chosen_spanish: Lo que
  alternatives_spanish:
  - el cual
  - que
  lexicon: HALOT
  rationale: Se conserva el valor relativo de la construcción sin imponer en español una causalidad que el hebreo no exige. «Lo que» permite introducir el contenido de la oración de forma precisa.
- source_word: הִתְפַּלַּלְתָּ אֵלַי
  english_pob_choice: you have prayed to me
  chosen_spanish: has orado a mí
  alternatives_spanish:
  - has orado ante mí
  - me has orado
  lexicon: HALOT
  rationale: Se conserva el verbo de oración con el matiz direccional de אֶל/אֵלַי. «Has orado» mantiene el perfecto español y la referencia a una oración ya realizada con relevancia presente.
- source_word: אֶל סַנְחֵרִב מֶלֶךְ אַשּׁוּר
  english_pob_choice: concerning Sennacherib king of Assyria
  chosen_spanish: acerca de Senaquerib, rey de Asiria
  alternatives_spanish:
  - sobre Senaquerib, rey de Asiria
  - respecto de Senaquerib, rey de Asiria
  lexicon: HALOT
  rationale: La preposición tras el verbo de oración indica el asunto de la petición. «Acerca de» comunica bien ese objeto temático sin volverlo más hostil o técnico de lo que exige el hebreo.
- source_word: שָׁמָעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - he escuchado
  - escuché
  lexicon: HALOT
  rationale: El perfecto español refleja la respuesta divina inmediata y actual al pedido de Ezequías.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa el Tetragrama directamente. En español, «Yahvé» conserva el nombre propio de Dios y evita la sustitución por un título, conforme al criterio del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of אֲשֶׁר in the clause introducing the prayer
  english_pob_reading: What you have prayed to me concerning Sennacherib king of Assyria, I have heard.
  chosen_spanish_reading: Lo que has orado a mí acerca de Senaquerib, rey de Asiria, he oído.
  alternative_spanish_readings:
  - Lo que has orado ante mí acerca de Senaquerib, rey de Asiria, he oído.
  - Tu oración acerca de Senaquerib, rey de Asiria, la he oído.
  rationale: Se conserva la construcción relativa sin convertirla en una causal explícita. Así se respeta mejor la relación discursiva del hebreo y la revisión más reciente del POB inglés.
  doctrine_reference: Grammar and discourse relation; no doctrinal issue
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó una lectura causal por una relativa para reflejar mejor אֲשֶׁר. La línea española sigue esa revisión y evita introducir «porque». También se conserva la respuesta divina en perfecto («he oído») y el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - «Lo que» preserva la relación relativa sin sobrerinterpretar la cláusula.
  - 'Los nombres propios siguen transliteración habitual en español bíblico: Isaías, Ezequías y Senaquerib.'
  - El marcador [a] aparece en el texto principal y la nota amplía solo una alternativa literal, sin añadir contenido doctrinal.
