id: ISA.9.18
reference: Isaiah 9:18
source:
  edition: WLC
  text: בְּ/עֶבְרַ֛ת יְהוָ֥ה צְבָא֖וֹת נֶעְתַּ֣ם אָ֑רֶץ וַ/יְהִ֤י הָ/עָם֙ כְּ/מַאֲכֹ֣לֶת אֵ֔שׁ אִ֥ישׁ אֶל אָחִ֖י/ו לֹ֥א יַחְמֹֽלוּ־׃
translation:
  text: By the wrath of Yahweh of hosts the land is scorched[a], and the people have become like fuel for the fire; no man spares his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land is burned up' or 'the land is darkened.' The Hebrew verb is rare and its precise nuance is debated; the immediate fire imagery supports the rendering 'is scorched.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעֶבְרַת
  chosen: By the wrath of
  alternatives:
  - In the fury of
  - Through the wrath of
  lexicon: HALOT
  rationale: עֶבְרָה denotes overflowing anger, fury, or wrath. 'By the wrath of' preserves the instrumental sense of ב and the judicial force of the noun without over-paraphrase.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD of armies
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is traditionally and accurately rendered 'hosts,' conveying heavenly armies and sovereign martial power; 'armies' is possible but narrower.
- source_word: נֶעְתַּם
  chosen: is scorched
  alternatives:
  - is burned up
  - is darkened
  lexicon: HALOT
  rationale: The verb from עתם is difficult and has been understood as 'be burned/scorched' or 'be darkened.' In context with immediate fire imagery (fuel for the fire), 'is scorched' best fits the semantic field while avoiding an overly totalizing 'burned up.' The alternative is preserved in a footnote.
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' In this prophetic judgment context focused on a people and their social collapse, 'land' is the more contextually bounded rendering.
- source_word: וַיְהִי הָעָם
  chosen: and the people have become
  alternatives:
  - and the people became
  - and the people are
  lexicon: HALOT
  rationale: The wayyiqtol advances the description of resulting condition. Present perfect English ('have become') reads naturally while preserving the resultant state.
- source_word: כְּמַאֲכֹלֶת אֵשׁ
  chosen: like fuel for the fire
  alternatives:
  - like food for fire
  - like kindling for fire
  lexicon: HALOT
  rationale: The phrase literally means something eaten by fire. 'Fuel for the fire' is idiomatic modern English that preserves the metaphor of consumability better than the awkwardly literal 'food for fire.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - each man
  - one man
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, אִישׁ is rendered 'a man.' In context it functions distributively, but singular 'a man' preserves the Hebrew form and representative force.
- source_word: אֶל אָחִיו
  chosen: his brother
  alternatives:
  - his fellow
  - his kinsman
  lexicon: HALOT
  rationale: אָח commonly means 'brother' and here likely extends to fellow member of the people. 'His brother' preserves the familial language and the social horror of internecine violence.
- source_word: לֹא יַחְמֹלוּ
  chosen: does not spare
  alternatives:
  - does not have compassion on
  - does not pity
  lexicon: HALOT
  rationale: חמל denotes sparing out of pity or compassion. 'Does not spare' is concise and forceful in a violence context, while retaining the compassion nuance implicitly.
