revisions:
- from: Y los hijos de Israel fueron reunidos y provistos[a][b], y salieron al encuentro de ellos. Los hijos de Israel acamparon frente a ellos como dos pequeños rebaños de cabras[c], mientras Aram llenaba la tierra.
  to: Y los hijos de Israel fueron movilizados y provistos[a][b], y salieron al encuentro de ellos. Los hijos de Israel acamparon frente a ellos como dos pequeños rebaños de cabras[c], mientras Aram llenó la tierra.
  rationale: Se ajustó 'fueron reunidos' a 'fueron movilizados' para reflejar mejor el sentido militar de הָתְפָּקְדוּ; se cambió 'llenaba la tierra' por 'llenó la tierra' para corresponder mejor al verbo narrativo hebreo; y se mejoró la nota b para ofrecer alternativas reales a 'provistos'.
