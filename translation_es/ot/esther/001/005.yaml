translation:
  language: es
  text: Y cuando se cumplieron estos días, el rey dio un banquete[a] para todas las personas que estaban presentes en Susa la ciudadela[b], desde el grande hasta el pequeño[c], durante siete días, en el patio del jardín del palacio del rey[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fiesta»; el término hebreo suele referirse a un banquete, a menudo con bebida.
    reason: lexical_alternative
  - marker: b
    text: O «en la ciudadela de Susa».
    reason: lexical_alternative
  - marker: c
    text: O «del más grande al más pequeño», un modismo que indica personas de todo rango.
    reason: lexical_alternative
  - marker: d
    text: El último término también puede traducirse «pabellón» o «casa»; «palacio» encaja mejor con el entorno real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִמְלֹאת
  english_pob_choice: And when ... were completed
  chosen_spanish: Y cuando se cumplieron
  alternatives_spanish:
  - Y al completarse
  - Y cuando ... hubieron terminado
  lexicon: HALOT
  rationale: La expresión temporal con ב e infinitivo constructo de מלא señala el momento en que algo llega a su término. «Se cumplieron» conserva la idea de completarse y suena natural en español bíblico contemporáneo.
- source_word: הַיָּמִים הָאֵלֶּה
  english_pob_choice: these days
  chosen_spanish: estos días
  alternatives_spanish:
  - aquellos días
  lexicon: HALOT
  rationale: El demostrativo hebreo es proximal. «Estos días» sigue de cerca el referente temporal ya mencionado sin añadir distancia interpretativa.
- source_word: עָשָׂה
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - hizo
  - ofreció
  - celebró
  lexicon: HALOT
  rationale: Con מִשְׁתֶּה, el verbo «hacer» funciona idiomáticamente para organizar o dar un banquete. En español, «dio un banquete» expresa el evento de forma natural y cercana al sentido idiomático del hebreo.
- source_word: מִשְׁתֶּה
  english_pob_choice: banquet
  chosen_spanish: banquete
  alternatives_spanish:
  - banquete de bebida
  - fiesta
  lexicon: HALOT
  rationale: «Banquete» comunica bien el contexto real y ceremonial. Mantiene la fuerza festiva del sustantivo hebreo sin recargar la frase con una glosa más técnica.
- source_word: לְכָל הָעָם
  english_pob_choice: for all the people
  chosen_spanish: para todo el pueblo
  alternatives_spanish:
  - para toda la gente
  - para toda la población
  lexicon: HALOT
  rationale: «עָם» designa aquí al conjunto de personas presentes. «Pueblo» es amplio y natural en español bíblico, y evita reducir el alcance a una etnia específica.
- source_word: הַנִּמְצְאִים
  english_pob_choice: who were present
  chosen_spanish: que se hallaba
  alternatives_spanish:
  - que estaban presentes
  - que estaban allí
  lexicon: HALOT
  rationale: El participio nifal de מצא aquí indica los que estaban allí, presentes en el lugar. «Se hallaba» conserva el matiz de presencia local sin sonar forzado.
- source_word: בְּשׁוּשַׁן הַבִּירָה
  english_pob_choice: in Susa the citadel
  chosen_spanish: en Susa la ciudadela
  alternatives_spanish:
  - en la ciudadela de Susa
  - en Susa la fortaleza
  lexicon: HALOT
  rationale: «בירה» designa una ciudadela o acrópolis fortificada. «Ciudadela» sigue bien la estructura appositiva hebrea y preserva el tono histórico del topónimo.
- source_word: לְמִגָּדוֹל וְעַד קָטָן
  english_pob_choice: from great to small
  chosen_spanish: desde el grande hasta el pequeño
  alternatives_spanish:
  - del mayor al menor
  - de grandes a pequeños
  - desde el más alto hasta el más bajo
  lexicon: HALOT
  rationale: La expresión es un modismo inclusivo de todos los rangos. «Desde el grande hasta el pequeño» refleja con fidelidad el paralelismo hebreo; aunque suena algo más literal que otras opciones, conserva el contraste social del original.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: HALOT
  rationale: La duración se expresa naturalmente en español con «durante». Mantiene sin ambigüedad el lapso completo del banquete.
- source_word: בַּחֲצַר
  english_pob_choice: in the court
  chosen_spanish: en el patio
  alternatives_spanish:
  - en el atrio
  - en la corte
  lexicon: HALOT
  rationale: Aquí חָצֵר apunta al espacio abierto del recinto real. «Patio» comunica bien la zona física sin confundirla con la institución política de «corte».
- source_word: גִּנַּת
  english_pob_choice: of the garden
  chosen_spanish: del jardín
  alternatives_spanish:
  - del huerto
  - de la huerta
  lexicon: HALOT
  rationale: El sustantivo en constructo describe el espacio ajardinado contiguo. «Jardín» es la equivalencia más natural y adecuada en español.
- source_word: בִּיתַן
  english_pob_choice: of the king’s palace
  chosen_spanish: del palacio del rey
  alternatives_spanish:
  - del pabellón del rey
  - de la casa del rey
  lexicon: HALOT
  rationale: El término persa puede entenderse como palacio, pabellón o casa. En este contexto real, «palacio del rey» transmite con claridad el referente arquitectónico sin perder la ambigüedad histórica básica.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto hebreo WLC y coincide con el audit trail inglés en las decisiones principales. No se registraron revisiones aplicadas en la última pasada, y el control cruzado indicó alto acuerdo y sin objeciones.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó «Mesías/Cristo» sin uso en este versículo.
  - «Banquete» traduce מִשְׁתֶּה siguiendo la elección auditada en inglés; la nota preserva la alternativa «fiesta».
  - «Ciudadela» traduce בירה en armonía con la apposición «Susa la ciudadela».
  - El modismo inclusivo de rango se mantuvo con un paralelo semántico en español sin neutralizar la gradación original.
