translation:
  language: es
  text: 'Cuando los dos se mostraron al destacamento de los filisteos, los filisteos dijeron: «¡Miren[a], los hebreos[b] están saliendo de los agujeros donde se habían escondido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «¡Vean!».'
    reason: alternative_reading
  - marker: b
    text: Conserva el etnónimo usado por los filisteos, no “israelitas”.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּגָּלוּ
  english_pob_choice: revealed themselves
  chosen_spanish: se mostraron
  alternatives_spanish:
  - se revelaron
  - se dejaron ver
  lexicon: HALOT
  rationale: 'El nifal aquí tiene sentido reflexivo: no solo “fueron vistos”, sino que Jonathan y su escudero se hicieron visibles a propósito. En español, “se mostraron” comunica bien esa acción intencional sin sonar forzado.'
- source_word: שְׁנֵיהֶם
  english_pob_choice: the two of them
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - los dos de ellos
  lexicon: HALOT
  rationale: La forma dual subraya que se trata de Jonathan y su escudero. “Los dos” es natural en español y conserva esa referencia conjunta.
- source_word: מַצַּב פְּלִשְׁתִּים
  english_pob_choice: the Philistine garrison
  chosen_spanish: el destacamento de los filisteos
  alternatives_spanish:
  - la guarnición de los filisteos
  - el puesto filisteo
  lexicon: HALOT
  rationale: El sustantivo militar denota una fuerza apostada en un lugar. “Destacamento” comunica la idea de tropa estacionada sin exigir un matiz más técnico que el texto no obliga a fijar.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Miren ahí!
  - ¡Vean!
  lexicon: HALOT
  rationale: Es una partícula de atención y sorpresa en el habla de los filisteos. “¡Miren!” preserva la fuerza discursiva en español moderno y suena natural en diálogo.
- source_word: עִבְרִים
  english_pob_choice: the Hebrews
  chosen_spanish: los hebreos
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene el etnónimo usado por los filisteos, con su matiz de etiqueta externa y despectiva posible. Cambiar a “israelitas” borraría ese color del original.
- source_word: יֹצְאִים
  english_pob_choice: are coming out
  chosen_spanish: están saliendo
  alternatives_spanish:
  - salen
  - van saliendo
  lexicon: HALOT
  rationale: El participio expresa acción en curso desde la perspectiva de los filisteos. “Están saliendo” conserva ese aspecto progresivo de manera clara.
- source_word: מִן הַחֹרִים
  english_pob_choice: out of the holes
  chosen_spanish: de los agujeros
  alternatives_spanish:
  - de las cuevas
  - de los escondites
  lexicon: HALOT
  rationale: חֹרִים significa literalmente “agujeros” o cavidades. “Agujeros” conserva la imagen concreta y el tono de burla de los filisteos; “cuevas” sería demasiado específico.
- source_word: אֲשֶׁר הִתְחַבְּאוּ שָׁם
  english_pob_choice: where they had hidden themselves
  chosen_spanish: donde se habían escondido
  alternatives_spanish:
  - en donde se habían ocultado
  - donde se ocultaron
  lexicon: HALOT
  rationale: 'El hitpael es reflexivo: se escondieron a sí mismos. El pluscuamperfecto español refleja bien que el escondite ocurrió antes del comentario de los filisteos.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo: mantiene el sujeto dual, la imagen concreta de los “agujeros” y el tiempo anterior del escondite. También toma en cuenta la revisión inglesa que añadió el artículo antes de “Hebrews”; en español se resuelve naturalmente con “los hebreos”.'
  spanish_consistency_notes:
  - Se usó “Yahvé” como norma general del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó “Cristo”/“Mesías” porque no corresponde al contenido del versículo.
  - Se conservó un registro militar claro y bíblico con “destacamento”, en lugar de suavizar la escena con una paráfrasis.
