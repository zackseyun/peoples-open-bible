revisions:
- from: 'No permitas que Ezequías los[a] engañe, diciendo: «Yahvé nos librará». ¿Han librado los dioses de las naciones, cada uno[b], a su tierra de la mano del rey de Asiria?'
  to: 'No dejen que Ezequías los extravíe[a], diciendo: «Yahvé nos librará». ¿Han librado los dioses de las naciones, cada uno[b], a su tierra de la mano del rey de Asiria?'
  rationale: Se ajusta el imperativo a plural para una exhortación más natural al grupo, se reemplaza «engañe» por «extravíe» para reflejar mejor יַסִּית, y se corrige la nota [a] para que exprese con buen español la alternativa léxica documentada en el POB inglés.
