id: ACT.17.31
reference: Acts 17:31
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀καθότι ἔστησεν ἡμέραν ἐν ᾗ μέλλει κρίνειν τὴν οἰκουμένην ἐν δικαιοσύνῃ ἐν ἀνδρὶ ᾧ ὥρισεν, πίστιν παρασχὼν πᾶσιν ἀναστήσας αὐτὸν ἐκ νεκρῶν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/017/031.yaml
  text: because he has fixed a day on which he is going to judge the inhabited world in righteousness by a man whom he appointed[b][a], having given proof to all by raising him from the dead.
  footnotes:
  - marker: a
    text: Or 'with justice' for 'in righteousness' (δικαιοσύνῃ).
    reason: lexical_alternative
  - marker: b
    text: Or 'having furnished assurance to all'; more literally, 'having given faith to all' (πίστιν παρασχὼν πᾶσιν), though here the sense is public proof or assurance.
    reason: alternative_reading
translation:
  language: ko
  text: 이는 그가 정하신 한 사람을 통하여 의로 세상을 심판하실 날을 정하시고, 그를 죽은 자들 가운데서 살리심으로 모든 사람에게 그 증거를 주셨기 때문입니다.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 아레오바고 연설의 결론 — 부활을 심판의 보증으로 제시
  chosen_reading: 심판하실 한 사람의 부활을 모든 사람에게 주신 증거(πίστιν)로 옮김
  alternative_readings:
  - 확신/보증
  rationale: πίστις는 여기서 「증거·보증」의 의미로 쓰인다. 단순한 신앙이 아니라 「공적 증명」으로서, 부활이 종말론적 심판자의 정체성을 확정한다는 바울의 핵심 논점을 살린다.
  doctrine_reference: 'BDAG πίστις §1.b; DOCTRINE.md: kerygma'
