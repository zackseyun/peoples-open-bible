review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: contraste concesivo, descubrimiento del ladrón, restitución multiplicada y pérdida total de los bienes de su casa. Sin embargo, no preserva del todo la fuerza modal paralela de los dos verbos finales: tanto יְשַׁלֵּם como יִתֵּן funcionan en contexto de obligación legal, por lo que conviene mantener esa obligación explícita también en español en la segunda cláusula.'
  spanish_quality_summary: El español es claro y natural, pero la nota al pie contiene un anglicismo/error grave («sietefold») y una formulación poco idiomática. Además, «entregará» sin modal debilita el paralelismo jurídico. Una pequeña revisión mejora fidelidad y legibilidad.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones principales son adecuadas: «hallado», «deberá pagar», «riqueza», «casa». La alternativa de שִׁבְעָתַיִם debe expresarse en español correcto como «séptuplo» o «siete veces».'
  issues:
  - severity: medium
    issue: La segunda cláusula omite la fuerza obligatoria explícita de יִתֵּן.
    rationale: El POB inglés marca paralelismo con «he must repay ... he must give». «Entregará» suena más predictivo que obligacional; «deberá entregar» o «deberá dar» preserva mejor el matiz legal del hebreo en contexto.
  - severity: high
    issue: La nota al pie usa el anglicismo/forma errónea «sietefold».
    rationale: No es español correcto y perjudica la calidad editorial. Debe reemplazarse por una alternativa española fiel, como «séptuplo» o «siete veces».
  - severity: low
    issue: La nota al pie puede formular con más claridad la alternativa semántica de שִׁבְעָתַיִם.
    rationale: El inglés distingue entre «sevenfold» y «seven times». En español conviene explicitar que la expresión puede referirse a restitución en séptuplo o a una cantidad de siete veces.
  revised_spanish_text: Sin embargo, si es hallado[a], deberá pagar siete veces; deberá entregar toda la riqueza de su casa.
  revised_footnotes:
  - marker: a
    text: O «en séptuplo». La expresión hebrea también puede denotar restitución en una cantidad de siete veces.
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del borrador, pero se corrige la nota al pie al español idiomático y se restituye en la segunda cláusula la fuerza obligatoria paralela del hebreo y del POB inglés mediante «deberá entregar». No se requiere nota adicional ni adjudicación compleja.
