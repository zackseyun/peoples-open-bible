translation:
  language: es
  text: Y estableceré para ellos un pacto eterno,[a] para que yo sea su Dios y ellos sean mi pueblo; y ya no quitaré a mi pueblo Israel de la tierra que les di.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para ser su Dios y para que ellos sean mi pueblo». El griego expresa el propósito o contenido del pacto con una construcción infinitiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στήσω
  english_pob_choice: I will establish
  chosen_spanish: estableceré
  alternatives_spanish:
  - pondré en vigor
  - haré firme
  - instituiré
  lexicon: BDAG
  rationale: En este contexto de pacto, στήσω expresa la idea de poner en vigor o establecer solemnemente una relación pactal. «Estableceré» es natural en español y conserva el peso covenantal sin sonar mecánico.
- source_word: διαθήκην αἰώνιον
  english_pob_choice: an everlasting covenant
  chosen_spanish: un pacto eterno
  alternatives_spanish:
  - un pacto perpetuo
  - un pacto para siempre
  lexicon: BDAG
  rationale: «Pacto» refleja bien διαθήκη en lenguaje bíblico, y «eterno» comunica la duración duradera de αἰώνιον con dignidad y claridad. «Eterno» evita una paráfrasis excesiva y mantiene el registro bíblico.
- source_word: τοῦ εἶναί με αὐτοῖς εἰς θεόν
  english_pob_choice: that I may be their God
  chosen_spanish: para que yo sea para ellos Dios
  alternatives_spanish:
  - para ser Dios para ellos
  - a fin de ser para ellos su Dios
  lexicon: BDAG
  rationale: El griego usa una construcción infinitiva de propósito/contenido. En español, «para que yo sea para ellos Dios» conserva esa finalidad sin perder naturalidad. Se evita agregar artículos o fórmulas más litúrgicas que el griego no exige.
- source_word: αὐτοὶ ἔσονταί μοι εἰς λαόν
  english_pob_choice: they may be my people
  chosen_spanish: ellos sean para mí pueblo
  alternatives_spanish:
  - ellos serán para mí un pueblo
  - ellos sean mi pueblo
  lexicon: BDAG
  rationale: Se preserva la reciprocidad pactal y la orientación «para mí». «Pueblo» sin artículo reproduce la solemnidad del hebraísmo y la estructura breve del griego, aunque en español también sería posible «un pueblo».
- source_word: οὐ κινήσω ἔτι
  english_pob_choice: I will no longer remove
  chosen_spanish: ya no apartaré
  alternatives_spanish:
  - ya no removeré
  - ya no desplazaré
  - ya no sacaré
  lexicon: BDAG
  rationale: Con ἀπό + tierra, κινήσω comunica la idea de mover fuera o apartar de la tierra. «Apartaré» transmite el sentido de remoción/exilio sin sonar técnico o forzado en español.
- source_word: τὸν λαόν μου Ἰσραήλ
  english_pob_choice: my people Israel
  chosen_spanish: a mi pueblo Israel
  alternatives_spanish:
  - a Israel, mi pueblo
  - a mi pueblo, Israel
  lexicon: BDAG
  rationale: Se conserva el orden afectivo y pactal del genitivo posesivo. «Mi pueblo Israel» mantiene la relación de pertenencia y la apposición del texto griego.
- source_word: ἀπὸ τῆς γῆς
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra prometida
  - fuera de la tierra
  lexicon: BDAG
  rationale: En el contexto de restauración, γῆ se refiere a la tierra dada a Israel. «De la tierra» es fiel y sobrio; no se añade «prometida» porque el griego aquí dice «la tierra que les di».
- source_word: ἧς ἔδωκα αὐτοῖς
  english_pob_choice: that I gave to them
  chosen_spanish: que les di
  alternatives_spanish:
  - que les había dado
  - la cual les di
  lexicon: BDAG
  rationale: El aoristo apunta al acto previo de donación divina. «Que les di» es directo y exacto en español, conservando la relación con la tierra dada por Dios.
theological_decisions:
- issue: 'Fórmula de pacto: infinitivo de propósito/contenido'
  english_pob_reading: that I may be their God and they may be my people
  chosen_spanish_reading: para que yo sea para ellos Dios y ellos sean para mí pueblo
  alternative_spanish_readings:
  - para que yo sea su Dios y ellos sean mi pueblo
  - para ser para ellos Dios y para que ellos sean mi pueblo
  rationale: El griego presenta una construcción infinitiva que expresa el contenido/propósito del pacto. En español, «para que» comunica bien esa finalidad sin convertirla en mera cita litúrgica ni endurecerla con una traducción demasiado literal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Promesa de no remover a Israel de la tierra
  english_pob_reading: I will no longer remove my people Israel from the land
  chosen_spanish_reading: ya no apartaré a mi pueblo Israel de la tierra
  alternative_spanish_readings:
  - ya no removeré a mi pueblo Israel de la tierra
  - ya no lo sacaré de la tierra
  - nunca más arrancaré a mi pueblo Israel de la tierra
  rationale: κινήσω con ἀπό aquí señala no volver a desplazar a Israel fuera de la tierra dada. «Apartaré» evita intensificar con «arrancar» y también evita la ambigüedad más débil de «mover».
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y el griego subyacente. Se mantuvo la fórmula de pacto con una traducción española natural, se evitó el reemplazo litúrgico de los términos de pacto por opciones menos específicas, y se conservó la promesa territorial de no expulsión/desplazamiento. No se documentan revisiones posteriores en el paquete fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - «Pacto» se usa para διαθήκη en coherencia con el lenguaje bíblico de alianza solemne.
  - «Pueblo» se mantiene en singular colectivo para reflejar λαόν.
  - «Tierra» se conserva sin expansión interpretativa, porque el propio texto la define como la dada por Dios.
