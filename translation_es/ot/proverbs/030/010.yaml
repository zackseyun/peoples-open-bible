review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: prohibición de hablar mal de un עֶבֶד ante la autoridad que lo posee, advertencia de maldición y consecuencia de culpa. Sin embargo, hay dos desajustes importantes: 1) «No calumnies» es forma verbal incorrecta para el imperativo negativo con tú; debe ser «No calumnies» solo con voseo, pero el resto del verso usa «te/quedes», así que en español neutral debe ser «No calumnies» evitado a favor de «No calumnies»? Mejor «No calumnies» sigue siendo incorrecto para tuteo; la forma correcta es «No calumnies» en subjuntivo de tú, pero en uso general suena marcada; «No calumnies» is actually correct orthographically, yet the construction chosen overall is less natural than «No calumnies a un esclavo ante su amo». 2) «ante su señor» debilita la relación social concreta de אֶל אדניו documentada por la auditoría inglesa como «to his master» y en español puede sonar ambiguo o demasiado elevado. «a su amo» representa mejor
    la relación esclavo-amo en este contexto. Además, «para que no» expresa finalidad, no advertencia; «no sea que» refleja mejor פֶּן.'
  spanish_quality_summary: El texto es comprensible, pero «ante su señor» suena menos natural y menos preciso que «a su amo» en un contexto de esclavitud. También conviene ajustar la conjunción de advertencia a «no sea que» para sonar más idiomático y fiel al hebreo. El resto del verso fluye bien y mantiene un registro moderno y digno.
  glossary_alignment: Se mantiene correctamente עֶבֶד como «esclavo», en línea con la política del proyecto y la nota léxica. No hay términos divinos en juego. El problema principal de glosario es que אֲדוֹן en esta relación social debe verterse como «amo» más que «señor» para conservar la lógica amo-esclavo documentada en el English POB.
  issues:
  - severity: high
    issue: Relación social mal precisada en «ante su señor»
    rationale: El hebreo אֶל אדניו se refiere al amo del esclavo. «Señor» en español puede sonar demasiado amplio, honorífico o ambiguo; «amo» transmite con más precisión la relación social que el proverbio presupone.
  - severity: medium
    issue: «para que no» no refleja bien el valor de advertencia de פֶּן
    rationale: 'פֶּן introduce una consecuencia temida: «no sea que» o «no vaya a ser que». «Para que no» tiende a leerse como finalidad, no como advertencia.'
  - severity: low
    issue: La redacción verbal inicial es mejorable en naturalidad
    rationale: Aunque «calumniar» puede defenderse léxicamente, la frase completa gana naturalidad proverbial con «No calumnies a un esclavo a su amo» frente a «ante su señor». Mantener «calumnies» es aceptable, pero necesita el ajuste contextual de la frase.
  revised_spanish_text: No calumnies a un esclavo[a] ante su amo, no sea que te maldiga y quedes culpable.
  revised_footnotes:
