base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/015/013.yaml
  text: Then Samuel came to Saul[a], and Saul said to him, “Blessed are you to Yahweh[b]; I have carried out the word of Yahweh.”
  footnotes:
