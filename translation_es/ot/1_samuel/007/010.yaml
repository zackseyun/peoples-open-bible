revisions:
- from: Y mientras Samuel ofrecía el holocausto[a], los filisteos se acercaron para la batalla contra Israel. Pero Yahvé tronó con gran sonido en aquel día contra los filisteos, y los llenó de confusión, y fueron derrotados delante de Israel.
  to: Mientras Samuel ofrecía el holocausto, los filisteos se acercaron para la batalla contra Israel. Pero Yahvé tronó con gran estruendo[a] en aquel día contra los filisteos, y los confundió, y fueron derrotados delante de Israel.
  rationale: 'Se hicieron ajustes menores de estilo y precisión: se eliminó la conjunción inicial para un comienzo más natural; «con gran sonido» se cambió a «con gran estruendo[a]» para mejorar la legibilidad española mientras la nota preserva la literalidad documentada del hebreo; y «los llenó de confusión» se simplificó a «los confundió», que expresa mejor el efecto causativo en contexto bélico sin sobreinterpretar. No se requieren cambios doctrinales ni adjudicación compleja.'
