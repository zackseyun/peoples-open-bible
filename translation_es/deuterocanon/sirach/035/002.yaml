translation:
  language: es
  text: Golpea a un pueblo extranjero[a][b], y que vean tus obras poderosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo griego conservado para este versículo difiere considerablemente del testimonio hebreo y parece reflejar una forma textual distinta; esta traducción sigue el hebreo conservado.
    reason: textual_variant
  - marker: b
    text: El imperativo hebreo es difícil y su matiz exacto no es del todo seguro. También puede entenderse de manera más suave, como «Déjate de un pueblo extranjero» o «Ten trato con un pueblo extranjero»; aquí se sigue la lectura principal adoptada por la auditoría inglesa revisada.
    reason: lexical_alternative
lexical_decisions:
- source_word: הרף
  english_pob_choice: Strike
  chosen_spanish: Golpea
  alternatives_spanish:
  - Deja
  - Afloja
  - Aparta
  lexicon: HALOT
  rationale: El auditor en inglés pasó de una opción más suave a 'Strike' para reflejar mejor el imperativo hebreo en su contexto. En español, 'Golpea' preserva esa fuerza verbal sin suavizarla indebidamente.
- source_word: על
  english_pob_choice: with
  chosen_spanish: a
  alternatives_spanish:
  - con
  - hacia
  - sobre
  lexicon: HALOT
  rationale: 'Con el verbo de choque/acción directa, la relación idiomática en español se expresa naturalmente con objeto directo introducido por ''a'': ''Golpea a...''. Evita forzar un ''con'' que no refleja bien el giro resultante en esta lectura.'
- source_word: עם נכר
  english_pob_choice: a foreign people
  chosen_spanish: un pueblo extranjero
  alternatives_spanish:
  - extranjeros
  - una nación extraña
  - un pueblo ajeno
  lexicon: HALOT
  rationale: '''עם'' es colectivo (''pueblo'') y ''נכר'' señala extranjería u otredad. ''Un pueblo extranjero'' conserva el carácter colectivo mejor que ''extranjeros'' y suena natural en español bíblico moderno.'
- source_word: ויראו
  english_pob_choice: and let them see
  chosen_spanish: y que vean
  alternatives_spanish:
  - y vean
  - y verán
  - para que vean
  lexicon: HALOT
  rationale: El prefijo puede entenderse con valor volitivo/jussivo tras el imperativo previo. 'Y que vean' mantiene esa fuerza exhortativa sin volverla simplemente futura.
- source_word: גבורתיך
  english_pob_choice: your mighty deeds
  chosen_spanish: tus hechos poderosos
  alternatives_spanish:
  - tu poder
  - tus obras poderosas
  - tus hazañas
  lexicon: HALOT
  rationale: El plural con sufijo de segunda persona apunta a manifestaciones visibles de poder. 'Hechos poderosos' comunica acciones observables mejor que un sustantivo abstracto como 'poder'.
theological_decisions:
- issue: Prioridad del testimonio hebreo frente al paralelo griego muy divergente
  english_pob_reading: Translate from the extant Hebrew as the primary witness, while noting the Greek parallel is substantially different and does not control the English rendering here.
  chosen_spanish_reading: Traducir según el hebreo conservado como testimonio primario, reconociendo en nota que el paralelo griego difiere mucho y no determina la redacción principal.
  alternative_spanish_readings:
  - Una versión basada en el griego hablaría de cuidar, sentarse, descansar y recibir una corona.
  rationale: La política del proyecto da primacía al hebreo cuando se conserva. Aquí el griego de Swete representa una forma textual sustancialmente distinta, así que no debe armonizarse artificialmente con el hebreo.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; usar el griego como control sin anular indebidamente el testimonio hebreo.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión reciente que sustituyó una lectura suave por 'Strike' para representar con mayor precisión הרף. Por eso la redacción española usa un verbo fuerte ('Golpea') y no una paráfrasis relajada; además, se mantiene la transparencia sobre la fuerte discrepancia con el griego paralelo.
  spanish_consistency_notes:
  - Se mantiene 'pueblo extranjero' para conservar el sentido colectivo de עם נכר.
  - '''Hechos poderosos'' evita reducir גבורתיך a poder abstracto y permite la lectura visible exigida por ''vean''.'
  - La nota textual distingue explícitamente entre el hebreo base y el paralelo griego divergente, siguiendo la auditoría inglesa.
