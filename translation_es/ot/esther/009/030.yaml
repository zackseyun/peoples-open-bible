translation:
  language: es
  text: Y envió cartas a todos los judíos en las ciento veintisiete provincias del reino de Ahasuero[a], palabras de paz y verdad[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ahasuero es la forma española tradicional del nombre hebreo; algunos lo identifican históricamente con Jerjes I.
    reason: cultural_note
  - marker: b
    text: O «un mensaje de paz y verdad». El hebreo literalmente dice «palabras de paz y verdad».
    reason: lexical_alternative
  - marker: c
    text: «Verdad» aquí también puede entenderse como «fidelidad» o «fiabilidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: And he sent
  chosen_spanish: Y envió
  alternatives_spanish:
  - Entonces envió
  lexicon: HALOT
  rationale: El wayyiqtol narrativo avanza la acción. «Y envió» conserva la secuencia narrativa hebrea con naturalidad en español sin añadir matiz temporal no explícito.
- source_word: סְפָרִים
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - documentos
  - mensajes escritos
  lexicon: HALOT
  rationale: En este contexto persa administrativo, el plural alude a comunicaciones escritas. «Cartas» es el equivalente más natural y fiel en español, manteniendo el carácter de misiva oficial.
- source_word: אֶל כָּל הַיְּהוּדִים
  english_pob_choice: to all the Jews
  chosen_spanish: a todos los judíos
  alternatives_spanish:
  - a cada judío
  lexicon: HALOT
  rationale: La expresión es colectiva y distributiva. «A todos los judíos» reproduce el alcance grupal del hebreo sin sobrecargarlo.
- source_word: אֶל שֶׁבַע וְעֶשְׂרִים וּמֵאָה מְדִינָה
  english_pob_choice: in the one hundred twenty-seven provinces
  chosen_spanish: en las ciento veintisiete provincias
  alternatives_spanish:
  - a las ciento veintisiete provincias
  lexicon: HALOT
  rationale: El segundo אֶל introduce el ámbito geográfico donde estaban los destinatarios. «En las ciento veintisiete provincias» expresa mejor en español que los judíos estaban distribuidos por ese territorio.
- source_word: מְדִינָה
  english_pob_choice: provinces
  chosen_spanish: provincias
  alternatives_spanish:
  - distritos
  - satrapías
  lexicon: HALOT
  rationale: En Ester, מְדִינָה designa regiones administrativas del Imperio persa. «Provincias» es el equivalente claro y estándar en español.
- source_word: מַלְכוּת אֲחַשְׁוֵרֹשׁ
  english_pob_choice: of the kingdom of Ahasuerus
  chosen_spanish: del reino de Ahasuero
  alternatives_spanish:
  - del reino de Ahasvero
  - del reino de Asuero
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma directa. «Del reino de Ahasuero» conserva el registro imperial y el nombre hebreo tradicional en español.
- source_word: אֲחַשְׁוֵרֹשׁ
  english_pob_choice: Ahasuerus
  chosen_spanish: Ahasuero
  alternatives_spanish:
  - Ahasvero
  - Asuero
  - Jerjes
  lexicon: HALOT
  rationale: El nombre se translitera al uso español tradicional de la forma hebrea. Se evita sustituirlo por una identificación histórica moderna.
- source_word: דִּבְרֵי שָׁלוֹם וֶאֱמֶת
  english_pob_choice: words of peace and truth
  chosen_spanish: palabras de paz y verdad
  alternatives_spanish:
  - un mensaje de paz y verdad
  - palabras de paz y fidelidad
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «palabras de paz y verdad». Se conserva «palabras» para mantener el giro formal del original. «Verdad» retiene el sentido básico; «fidelidad» queda como matiz posible.
theological_decisions:
- issue: Sentido de אֱמֶת en el cierre de la carta
  english_pob_reading: ‘Truth’ may also be understood as ‘faithfulness’ or ‘reliability’ in this context.
  chosen_spanish_reading: «Verdad» en el texto principal, con la posibilidad de entenderla también como «fidelidad» o «fiabilidad».
  alternative_spanish_readings:
  - «fidelidad»
  - «fiabilidad»
  - «lealtad»
  rationale: El hebreo admite un campo semántico más amplio que la mera exactitud proposicional. Mantener «verdad» preserva la equivalencia más directa; señalar la alternativa evita estrechar indebidamente el sentido.
  doctrine_reference: Estudio léxico-semántico de אֱמֶת; uso contextual en Ester 9:30
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés: no hubo revisiones aplicadas y el control cruzado informó alta concordancia con solo observaciones menores; por eso se mantuvieron las opciones léxicas principales y se trasladaron las ambigüedades relevantes al español en notas.'
  spanish_consistency_notes:
  - Se preservó el nombre hebreo tradicional «Ahasuero» en vez de una identificación histórica en el texto principal, con nota explicativa.
  - Se mantuvo el paralelismo formal «palabras de paz y verdad» para reflejar el constructo hebreo.
  - La puntuación y el orden responden al estilo bíblico español moderno sin eliminar el tono administrativo del original.
