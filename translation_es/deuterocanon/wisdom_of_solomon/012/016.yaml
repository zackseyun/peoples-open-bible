translation:
  language: es
  text: Porque tu fuerza es el principio de la justicia[a][b], y tu dominio sobre todos te lleva a ser indulgente con todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuente de la justicia». El griego ἀρχή puede significar «principio», «fuente» o «primer principio».
    reason: lexical_alternative
  - marker: b
    text: O «rectitud» para «justicia». El griego δικαιοσύνη puede abarcar ambos sentidos.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰσχύς
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: LSJ
  rationale: ἰσχύς denota fuerza, capacidad o vigor. En español, «fuerza» conserva bien la idea de energía eficaz de Dios sin volverla demasiado abstracta como «poder».
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: LSJ
  rationale: El campo semántico de δικαιοσύνη incluye «righteousness» y «justice». Aquí se eligió «justicia» porque en español suena natural en una afirmación sobre el ejercicio recto del gobierno divino, y la alternativa doctrinal se preserva en nota.
- source_word: ἀρχή
  english_pob_choice: beginning
  chosen_spanish: principio
  alternatives_spanish:
  - comienzo
  - fuente
  - primer principio
  lexicon: LSJ
  rationale: ἀρχή puede significar inicio, fuente o principio. «Principio» reproduce de modo natural en español la idea de fundamento u origen sin cerrar indebidamente la gama semántica.
- source_word: δεσπόζειν
  english_pob_choice: dominion over all
  chosen_spanish: dominio sobre todos
  alternatives_spanish:
  - señorío sobre todos
  - reinado sobre todos
  - gobierno sobre todos
  lexicon: LSJ
  rationale: El infinitivo expresa ejercer dominio o señorío. «Dominio sobre todos» mantiene la fuerza de soberanía y el paralelismo con la frase siguiente sin introducir una lectura más dura como «dominar».
- source_word: φείδεσθαι
  english_pob_choice: spare
  chosen_spanish: perdones
  alternatives_spanish:
  - ahorras
  - eximes
  - te abstienes de dañar
  lexicon: LSJ
  rationale: φείδεσθαι significa ahorrar, perdonar o abstenerse de destruir. En español, «perdonas» comunica la idea de no tratar a todos con destrucción, aunque el verbo sigue siendo interpretativo; por eso se mantiene la nota sobre el sentido de «perdonar/ahorrar».
- source_word: ποιεῖ
  english_pob_choice: causes you to spare all
  chosen_spanish: hace que perdones a todos
  alternatives_spanish:
  - te causa a perdonar a todos
  - te lleva a perdonar a todos
  - te hace perdonar a todos
  lexicon: LSJ
  rationale: 'El verbo introduce una relación de resultado: tu dominio sobre todos produce tu trato indulgente con todos. «Hace que perdones a todos» conserva esa causalidad en un español claro y litúrgicamente aceptable.'
- source_word: πάντων ... πάντων
  english_pob_choice: over all ... all
  chosen_spanish: sobre todos ... a todos
  alternatives_spanish:
  - sobre todos ... todos
  - sobre todo ... a todos
  - sobre todas las cosas ... a todas
  lexicon: LSJ
  rationale: La repetición enfática de πάντων se conserva con «todos / a todos», manteniendo el alcance universal y el paralelismo retórico del griego.
theological_decisions:
- issue: δικαιοσύνη en una afirmación sapiencial sobre el carácter y el gobierno de Dios
  english_pob_reading: righteousness, with a footnoted alternative justice
  chosen_spanish_reading: justicia, con la alternativa «rectitud» preservada en nota
  alternative_spanish_readings:
  - rectitud
  - righteousness transliterado no es necesario
  rationale: En esta sección sapiencial, δικαιοσύνη describe el ejercicio correcto del poder divino. «Justicia» es idiomático en español y expresa bien el marco judicial-moral; se conserva la tensión semántica con «rectitud» para no borrar el matiz de recto obrar divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — δικαιοσύνη puede rendirse como «righteousness» o «justice» según el contexto'
- issue: φείδεσθαι como verbo de restricción benévola
  english_pob_reading: spare
  chosen_spanish_reading: perdonar / ahorrar en sentido de no destruir
  alternative_spanish_readings:
  - ahorrar
  - refrendarse de dañar
  - mostrar misericordia
  rationale: El verbo griego no significa primariamente «absolver» en sentido forense, sino abstenerse de dañar o destruir. «Perdonar» se usa aquí como una forma natural de expresar esa benevolencia, pero la nota deja claro que el sentido literal es «ahorrar / perdonar en el sentido de no destruir».
  doctrine_reference: LSJ φείδομαι; POB policy on lexical/theological tension preservation
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó «mastery over all» a «dominion over all» y «makes you spare all» a «causes you to spare all». En español, «dominio sobre todos» y «hace que perdones a todos» siguen esa revisión y conservan la causalidad del griego, con leve adaptación idiomática para lectura pública.
  spanish_consistency_notes:
  - Se mantuvo un registro digno y neutral, apto para lectura eclesial amplia.
  - Se prefirió «fuerza» para ἰσχύς por claridad y naturalidad en español.
  - Se conservó la amplitud de πάντων con «todos / a todos» sin restringir el referente a personas o cosas.
  - Se evitó «SEÑOR» como sustituto del nombre divino porque aquí no aparece el Tetragrama ni κύριος como cita directa.
  - Se preservó la tensión semántica de δικαιοσύνη mediante nota, sin borrar la posibilidad de «rectitud».
