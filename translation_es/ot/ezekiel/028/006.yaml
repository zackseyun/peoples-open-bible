    issue: Uso de «el Señor DIOS» para אֲדֹנָי יְהוִה
    rationale: El proyecto establece explícitamente que יהוה se traduzca «Yahvé» en el texto principal, no mediante mayúsculas sustitutivas. «DIOS» aquí enmascara el nombre divino en vez de preservarlo.
  - severity: medium
    issue: «has puesto tu corazón» debilita la decisión léxica auditada para תִּתְּךָ אֶת לְבָבְךָ
    rationale: Aunque idiomático, el rastro inglés y la rationale favorecen «made your heart». En español, «has hecho tu corazón» preserva mejor la idea de haberte constituido interiormente de ese modo, no solo de haber dirigido el corazón.
  revised_spanish_text: 'Por tanto, así dice el Señor Yahvé: Porque has hecho tu corazón como el corazón de un dios[a],'
  revised_footnotes:
  - marker: a
    text: O «como el corazón de Dios». El hebreo אֱלֹהִים puede significar «Dios», «un dios» o «dioses», según el contexto.
