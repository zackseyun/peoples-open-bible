translation:
  language: es
  text: Por eso[a], hasta el día de hoy los hijos de Israel no comen el tendón[b] de la cadera, que está sobre la cavidad del muslo[c], porque tocó la cavidad del muslo de Jacob en el tendón de la cadera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los israelitas”; hebreo “los hijos de Israel”.
    reason: lexical_alternative
  - marker: b
    text: El hebreo se refiere tradicionalmente a un tendón o tejido cordiforme específico cerca de la zona de la cadera o del muslo; algunos lo identifican más específicamente como el nervio o tendón ciático.
    reason: cultural_note
  - marker: c
    text: O “el tendón de la cadera que está sobre la cavidad del muslo”.
    reason: previous_rendering
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Expresa la relación causal-consecutiva con naturalidad en español y mantiene el valor explicativo de la fórmula introductoria.
- source_word: לֹא יֹאכְלוּ
  english_pob_choice: do not eat
  chosen_spanish: no comen
  alternatives_spanish:
  - no suelen comer
  - no comen habitualmente
  lexicon: HALOT
  rationale: El imperfecto hebreo en este contexto describe una costumbre vigente; el presente español comunica bien esa práctica continua sin sobrerreformularla.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Conserva la formulación familiar y transparente del hebreo. 'Israelitas' sería natural, pero suaviza la forma del texto fuente.
- source_word: גִּיד
  english_pob_choice: sinew
  chosen_spanish: sinew
  alternatives_spanish:
  - tendón
  - nervio
  lexicon: HALOT
  rationale: Se mantiene 'sinew' como equivalencia directa del inglés POB y como término amplio para el tejido cordiforme aludido por el hebreo, sin forzar una identificación anatómica más precisa de lo que el texto explicita.
- source_word: הַנָּשֶׁה
  english_pob_choice: of the hip
  chosen_spanish: de la cadera
  alternatives_spanish:
  - de la cadera/anca
  - de la articulación de la cadera
  lexicon: HALOT
  rationale: '''Cadera'' comunica de forma clara y sobria el área anatómica en español. Evita una explicación técnica no garantizada por el pasaje, aunque el trasfondo tradicional pueda identificarlo de manera más específica.'
- source_word: אֲשֶׁר עַל כַּף הַיָּרֵךְ
  english_pob_choice: which is on the socket of the thigh
  chosen_spanish: que está sobre la cavidad de la cadera
  alternatives_spanish:
  - que está sobre el hueco de la cadera
  - que está sobre la cavidad del muslo
  lexicon: HALOT
  rationale: '''כַּף'' admite la idea de cavidad/hueco y ''יָרֵךְ'' se relaciona con la región de la cadera o muslo. ''Cavidad de la cadera'' conserva la imagen concreta con buen castellano y sin añadir más anatomía de la necesaria.'
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Equivale de manera idiomática a la expresión temporal hebrea y conserva el valor de persistencia histórica.
- source_word: כִּי נָגַע
  english_pob_choice: because he touched
  chosen_spanish: porque tocó
  alternatives_spanish:
  - porque entró en contacto con
  - porque golpeó
  lexicon: HALOT
  rationale: '''Tocó'' es la correspondencia básica y más fiel para נגע. No se intensifica el verbo, porque el hebreo mismo no exige un matiz más fuerte en la forma verbal.'
- source_word: בְּכַף יֶרֶךְ יַעֲקֹב
  english_pob_choice: the socket of Jacob’s thigh
  chosen_spanish: la cavidad de la cadera de Jacob
  alternatives_spanish:
  - la cavidad del muslo de Jacob
  - la articulación de la cadera de Jacob
  lexicon: HALOT
  rationale: Se mantiene la misma opción anatómica que antes para dar consistencia. Aunque 'muslo' también es posible, 'cadera' evita un desplazamiento semántico dentro del mismo versículo.
- source_word: בְּגִיד הַנָּשֶׁה
  english_pob_choice: at the sinew of the hip
  chosen_spanish: en el sinew de la cadera
  alternatives_spanish:
  - en el tendón de la cadera
  - junto al sinew de la cadera
  lexicon: HALOT
  rationale: La preposición בְ aquí puede marcar localización o referencia al punto de contacto, y se conserva el mismo sustantivo que al inicio para mantener consistencia léxica. Se evita una identificación anatómica más técnica que el hebreo no explicita.
theological_decisions:
- issue: Persistencia de una costumbre alimentaria de Israel
  english_pob_reading: 'The verse explains an ongoing practice: the sons of Israel do not eat this sinew to this day.'
  chosen_spanish_reading: El versículo presenta una costumbre vigente hasta la fecha, sin convertirla en una prohibición universal para todos los lectores.
  alternative_spanish_readings:
  - una prohibición ritual universal
  - una explicación meramente histórica sin fuerza actual
  rationale: 'El hebreo usa una observación histórica de práctica continuada. La traducción debe reflejar ese alcance: una costumbre identitaria de Israel, no una generalización doctrinal más allá del texto.'
  doctrine_reference: Génesis 32:33; observación narrativa sobre práctica de Israel
translation_notes:
  revision_awareness: 'El contexto inglés muestra revisiones para evitar una redacción anatómicamente redundante y para volver desde un tecnicismo (''sciatic tendon'') a una equivalencia más cercana a גִּיד הַנָּשֶׁה. En español se siguió esa orientación: se evitó ''ciático'' y se mantuvo un término amplio (''sinew'') con notas de alternativa, conservando además la repetición interna del mismo sustantivo para respetar la estructura del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo una sola opción léxica para גִּיד en todo el versículo para preservar la repetición del hebreo.
  - Se empleó 'cadera' de modo uniforme para הַנָּשֶׁה y la región correlativa, evitando alternar con 'muslo' dentro de la misma frase.
  - Se prefirió una sintaxis española directa y publicable, sin perder la explicación causal y temporal del texto fuente.
