    issue: «sea llevado de ti» es un calco poco natural de מֵאִתָּךְ
    rationale: Aunque semánticamente apunta a separación, en español bíblico legible «de tu lado» o «de tu presencia» comunica mejor la idea contextual de ser quitado estando junto a Eliseo.
  - severity: low
    issue: «te será así» suena rígido
    rationale: La fórmula hebrea יְהִי לְךָ כֵן puede representarse con más naturalidad como «así será para ti», manteniendo la misma fuerza y referencia al resultado concedido.
  - severity: low
    issue: La nota al pie repite la misma formulación poco idiomática
    rationale: 'Si se conserva la alternativa auditada, debe ajustarse al español natural: «cuando yo sea llevado de tu lado».'
