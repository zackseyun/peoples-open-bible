revisions:
- from: Y consagrarás el pecho de la ofrenda mecida y la pierna de la ofrenda alzada[a], la cual fue mecida y la cual fue alzada, del carnero de la investidura[b], de lo que era de Aarón y de lo que era de sus hijos.
  to: Y consagrarás el pecho de la ofrenda mecida y el muslo de la contribución[a], que fue mecido y que fue alzado, del carnero de la investidura[b], de lo que pertenecía a Aarón y de lo que pertenecía a sus hijos.
  rationale: Se cambió «pierna» por «muslo» para reflejar mejor שׁוֹק; «ofrenda alzada» por «contribución» para alinearse con la revisión inglesa que evitó añadir «offering»; se aclaró la construcción relativa y se naturalizó la posesión final en español. También se reparó la nota léxica [a] para que sea coherente y útil.
  reviewer_model: gpt-5.4
