translation:
  language: es
  text: Oh Israel[a], cuán grande es la casa de Dios, y cuán vasto es el lugar de su posesión;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «el lugar de su creación». El griego κτῆσεως puede significar posesión o propiedad, y en algunos contextos también creación o aquello que ha sido adquirido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ
  english_pob_choice: O
  chosen_spanish: ¡Oh
  alternatives_spanish:
  - O
  lexicon: LSJ
  rationale: Mantiene el valor vocativo y exclamativo del griego en un español natural y solemne.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: nombre propio
  rationale: Se conserva el nombre propio transliterado, como en la práctica habitual del proyecto.
- source_word: ὡς μέγας
  english_pob_choice: how great
  chosen_spanish: cuán grande
  alternatives_spanish:
  - qué grande
  lexicon: LSJ
  rationale: La exclamación con ὡς + adjetivo se vierte mejor con una exclamación natural en español, preservando el tono admirativo.
- source_word: ὁ οἶκος τοῦ θεοῦ
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - la casa de Dios
  - la casa de Dios
  lexicon: LSJ
  rationale: «Casa de Dios» es la opción más directa y fiel al sintagma griego, sin especificar innecesariamente si se trata de templo, morada o ámbito.
- source_word: ἐπιμήκης
  english_pob_choice: vast
  chosen_spanish: vasto
  alternatives_spanish:
  - largo
  - extenso
  - inmenso
  lexicon: LSJ
  rationale: Aunque el sentido literal remite a longitud o extensión, en español «vasto» expresa con naturalidad la amplitud espacial que el contexto exige.
- source_word: ὁ τόπος
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - la región
  - el dominio
  lexicon: LSJ
  rationale: «Lugar» reproduce el valor básico y concreto del sustantivo griego sin introducir una interpretación más específica.
- source_word: τῆς κτήσεως αὐτοῦ
  english_pob_choice: of his possession
  chosen_spanish: de su posesión
  alternatives_spanish:
  - de su creación
  - de lo que posee
  - de su propiedad
  lexicon: LSJ
  rationale: «Posesión» conserva el genitivo de pertenencia y encaja con el lenguaje espacial del verso; «creación» queda como alternativa posible pero más interpretativa.
theological_decisions:
- issue: Sentido de κτήσεως en relación con el ámbito de Dios
  english_pob_reading: '''his possession'' with a footnoted alternative ''his creation'''
  chosen_spanish_reading: «su posesión», con nota de alternativa «su creación»
  alternative_spanish_readings:
  - su creación
  - su propiedad
  rationale: El verso describe la grandeza del ámbito o dominio de Dios; por eso se prefiere una lectura de pertenencia/posesión. Sin embargo, κτῆσις también puede referirse a lo adquirido o, en algunos contextos, a la creación, y esa tensión se conserva en nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta propuesta sigue el acuerdo alto del control cruzado y mantiene la alternativa semántica de κτῆσεως en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino explícito; aquí el texto dice θεοῦ, por lo que corresponde «Dios».
  - Se conserva el tono exclamativo con «¡Oh… cuán…!» para reflejar la fuerza retórica del griego.
  - «Casa de Dios» y «lugar» se mantienen sin ampliar el sentido a «templo» o «dominio», para no sobreinterpretar el pasaje.
