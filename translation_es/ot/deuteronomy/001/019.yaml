    issue: «nos partimos de Horeb»
    rationale: En español neutro, «partirse» es reflexivo con otros sentidos y «nos partimos de Horeb» suena incorrecto. El hebreo וַנִּסַּע expresa partir/ponerse en marcha; «partimos de Horeb» preserva el sentido con naturalidad.
  - severity: low
    issue: Puntuación con punto y coma antes de «y llegamos»
    rationale: No es erróneo, pero una coma refleja mejor la coordinación narrativa simple del hebreo y mejora la fluidez.
