translation:
  language: es
  text: El que revela secretos destruye la confianza[a], y nunca hallará un amigo para su alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «misterios» o «confidencias» para «secretos».
    reason: lexical_alternative
  - marker: b
    text: Expresión griega que significa un amigo verdaderamente cercano o adecuado a su propio ser.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ ἀποκαλύπτων
  english_pob_choice: Whoever reveals
  chosen_spanish: El que revela
  alternatives_spanish:
  - Quien revela
  - El que descubre
  lexicon: BDAG
  rationale: El participio con artículo expresa una generalización proverbial; «El que revela» mantiene ese valor y suena natural en español sin perder el carácter sentencioso.
- source_word: μυστήρια
  english_pob_choice: secrets
  chosen_spanish: secretos
  alternatives_spanish:
  - misterios
  - confidencias
  lexicon: BDAG
  rationale: En este contexto sapiencial se trata de asuntos privados confiados a alguien, no de «misterios» teológicos. «Secretos» es la opción más clara y fiel al contexto.
- source_word: ἀπώλεσεν
  english_pob_choice: destroys
  chosen_spanish: destruye
  alternatives_spanish:
  - ha destruido
  - arruina
  - pierde
  lexicon: BDAG
  rationale: Aunque el griego usa aoristo, en un proverbio transmite una verdad general y vigente; «destruye» reproduce bien ese valor gnómico en español.
- source_word: πίστιν
  english_pob_choice: trust
  chosen_spanish: la confianza
  alternatives_spanish:
  - la fe
  - la fidelidad
  - la credibilidad
  lexicon: BDAG
  rationale: 'Aquí πίστις no tiene sentido doctrinal sino relacional: el que revela secretos rompe la confianza. «La confianza» comunica mejor esa fuerza en español que «la fe».'
- source_word: οὐ μὴ εὕρῃ
  english_pob_choice: will never find
  chosen_spanish: nunca hallará
  alternatives_spanish:
  - jamás encontrará
  - no encontrará nunca
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con subjuntivo expresa imposibilidad futura; «nunca hallará» conserva esa fuerza de manera idiomática.
- source_word: φίλον
  english_pob_choice: a friend
  chosen_spanish: un amigo
  alternatives_spanish:
  - un amigo fiel
  - una amistad
  lexicon: BDAG
  rationale: El objeto singular indefinido en un proverbio se traduce naturalmente como «un amigo».
- source_word: πρὸς τὴν ψυχὴν αὐτοῦ
  english_pob_choice: for his soul
  chosen_spanish: para su alma
  alternatives_spanish:
  - para su propia vida
  - cercano a su persona
  - afín a su ser
  lexicon: BDAG
  rationale: Mantiene la imagen fuente de ψυχή y su gravedad. En español, «para su alma» conserva el matiz de alguien íntimamente adecuado o unido a su propia vida/interior.
theological_decisions:
- issue: Valor de πίστις en un proverbio sapiencial
  english_pob_reading: trust
  chosen_spanish_reading: confianza
  alternative_spanish_readings:
  - fe
  - fidelidad
  rationale: Se evita una lectura doctrinal donde el contexto habla de lealtad interpersonal y custodia de secretos. «Confianza» sigue el sentido relacional documentado por el texto fuente y el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation philosophy #1 y #5'
- issue: Mantenimiento de la imagen «para su alma»
  english_pob_reading: for his soul
  chosen_spanish_reading: para su alma
  alternative_spanish_readings:
  - para sí mismo
  - para su vida
  rationale: Se conserva la formulación idiomática del griego para no borrar la tensión entre imagen literal y sentido de cercanía íntima. La nota permite al lector entender que apunta a un amigo verdaderamente afín a la persona.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #4'
translation_notes:
  revision_awareness: El inglés auditado pasó de «has destroyed trust» a «destroys trust» para reflejar mejor el valor proverbial del aoristo griego; la traducción española adopta también un presente gnómico («destruye») para conservar ese efecto. Se mantuvo la estructura completa de la sentencia y la imagen final de ψυχή.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» solo cuando el contexto lo exige; aquí no aplica.
  - Se evita «fe» para πίστις porque el contexto es interpersonal, no doctrinal.
  - Se conserva «alma» para ψυχή, siguiendo la imagen del griego sin modernizarla a una paráfrasis abstracta.
  - La frase proverbial se formula en presente para reflejar mejor la generalidad del original.
