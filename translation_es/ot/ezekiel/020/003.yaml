  to: 'Hijo del hombre[a], habla a los ancianos de Israel y diles: Así dice el Señor Yahvé: ¿Es para consultarme que ustedes han venido? Vivo yo, no seré consultado por ustedes[b], declara el Señor Yahvé.'
