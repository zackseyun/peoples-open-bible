translation:
  language: es
  text: Porque el que trajo sobre ustedes estos males[a] los rescatará de la mano de sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estas calamidades» o «estas aflicciones». El griego τὰ κακὰ puede referirse tanto a males como a desgracias o sufrimientos graves.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαγαγὼν
  english_pob_choice: brought ... upon
  chosen_spanish: trajo sobre ustedes
  alternatives_spanish:
  - trajo
  - hizo venir sobre ustedes
  - causó que vinieran sobre ustedes
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción de traer o hacer venir algo sobre alguien. «Trajo sobre ustedes» conserva el movimiento direccional y la relación causal sin volver la frase pesada en español.
- source_word: τὰ κακὰ
  english_pob_choice: these evils
  chosen_spanish: estos males
  alternatives_spanish:
  - estas calamidades
  - estas desgracias
  - estos males
  lexicon: BDAG
  rationale: κακά puede referirse a males, calamidades o aflicciones graves. «Males» mantiene el alcance amplio del griego y, en español bíblico, puede abarcar tanto el daño sufrido como el carácter adverso del juicio.
- source_word: ἐξελεῖται
  english_pob_choice: will rescue
  chosen_spanish: los rescatará
  alternatives_spanish:
  - los librará
  - los salvará
  - los sacará
  lexicon: BDAG
  rationale: El futuro medio de ἐξαιρέω significa rescatar o librar de peligro. «Rescatará» transmite una liberación activa y clara en español moderno.
- source_word: ἐκ χειρὸς
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la mano de
  - de las manos de
  lexicon: BDAG
  rationale: La expresión es un modismo bíblico para autoridad o control. «De la mano de» preserva el giro idiomático y sugiere dominio sin explicitarlo en exceso.
- source_word: ἐχθρῶν
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - fuerzas enemigas
  lexicon: BDAG
  rationale: El sentido ordinario es «enemigos»; no hay razón contextual para debilitarlo o tecnificarlo.
theological_decisions:
- issue: Agencia divina en juicio y liberación
  english_pob_reading: The same implied divine actor who brought the calamities is also the one who will rescue the people.
  chosen_spanish_reading: El mismo agente implícito que trajo estos males es también quien rescatará al pueblo.
  alternative_spanish_readings:
  - Una lectura impersonal que atenúe la causalidad divina de los males
  - Una reformulación que separe el juicio de la liberación
  rationale: El griego presenta un solo sujeto como responsable tanto de la aflicción como de la rescate. La traducción conserva esa tensión teológica sin suavizarla, conforme al principio de transparencia textual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El testimonio inglés indica que no hubo revisiones posteriores y que el pasaje mantiene alto acuerdo con el corpus adjudicado; por eso se conserva la solución base sin cambios sustantivos. La nota léxica sobre τὰ κακὰ se refleja en una alternativa española equivalente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece ningún nombre divino explícito.
  - «Rescató/ rescatará» se reserva para ἐξαιρέω; no se sustituye por «salvará» para preservar el matiz de liberación desde peligro.
  - «De la mano de» conserva el modismo bíblico sin convertirlo en una paráfrasis de poder o dominio.
  - «Males» mantiene la ambigüedad controlada entre mal moral y calamidad, tal como lo permite τὰ κακὰ.
