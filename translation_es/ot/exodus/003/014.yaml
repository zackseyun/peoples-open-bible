translation:
  language: es
  text: 'Y Dios dijo a Moisés[a]: «Yo Soy el que Soy». Y dijo: «Así dirás a los hijos de Israel[b]: “Yo Soy me ha enviado a ustedes”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Seré lo que seré», o «Seré quien seré». El verbo hebreo puede llevar aquí también sentido futuro además de fuerza presente.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  - ser divino
  lexicon: HALOT
  rationale: En este contexto narrativo, el plural morfológico funciona como designación singular del Dios de Israel; en español, «Dios» conserva esa referencia natural y reverente sin perder la singularidad contextual.
- source_word: אֶהְיֶה
  english_pob_choice: I AM
  chosen_spanish: YO SOY
  alternatives_spanish:
  - YO SERÉ
  - SERÉ
  - YO LLEGARÉ A SER
  lexicon: HALOT
  rationale: El imperfecto hebreo puede expresar presente o futuro según el contexto. La POB en inglés mantiene la fuerza de autoidentificación con «I AM», y en español «YO SOY» reproduce esa identificación solemne. Se conserva la tensión semántica del imperfecto en la nota alternativa, pues también puede leerse con matiz futuro.
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: el que
  alternatives_spanish:
  - que
  - quien
  - lo que
  lexicon: HALOT
  rationale: En español, «el que» da una construcción natural y personal para la autoidentificación divina, equivalente idiomático de la opción inglesa «who» sin endurecer el sintaxis.
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: HALOT
  rationale: «Así» conserva el tono formal de fórmula de envío o mandato, de manera natural en español bíblico contemporáneo.
- source_word: תֹאמַר
  english_pob_choice: you shall say
  chosen_spanish: dirás
  alternatives_spanish:
  - deberás decir
  - has de decir
  lexicon: HALOT
  rationale: El imperfecto con fuerza directiva se expresa con el futuro simple «dirás», que en español transmite mandato sin sobrecargar el estilo.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos varones de Israel
  - a los israelitas
  - a los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva «hijos de Israel» por cercanía formal al hebreo y por el carácter ya fijado de la expresión bíblica en español, aunque la observación lexical puede anotarse aparte cuando conviene al lector.
- source_word: שְׁלָחַנִי
  english_pob_choice: has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  - me envía
  lexicon: HALOT
  rationale: El perfecto hebreo con sufijo expresa una acción completada con relevancia presente; en español, el perfecto compuesto «me ha enviado» comunica bien esa vigencia del envío.
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y respondió
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Y dijo» es breve, fiel y natural en español.
theological_decisions:
- issue: Cómo traducir la auto-designación divina אֶהְיֶה אֲשֶׁר אֶהְיֶה
  english_pob_reading: I AM WHO I AM
  chosen_spanish_reading: YO SOY EL QUE SOY
  alternative_spanish_readings:
  - SERÉ EL QUE SERÉ
  - YO SERÉ EL QUE SERÉ
  - SERÉ QUIEN SERÉ
  rationale: La frase funciona como auto-revelación divina y como base de un nombre o designación que se repite en la segunda mitad del versículo. «YO SOY EL QUE SOY» reproduce la solemnidad de la lectura principal de la POB en inglés y mantiene la tensión de ser/presencia sin resolverla totalmente en un futuro exclusivo. La alternativa futura se preserva en nota porque el imperfecto hebreo admite ese matiz.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
- issue: Si la segunda ocurrencia de אֶהְיֶה debe mantenerse como designación repetida
  english_pob_reading: ‘I AM has sent me to you.’
  chosen_spanish_reading: «YO SOY me ha enviado a ustedes»
  alternative_spanish_readings:
  - «El que soy me ha enviado a ustedes»
  - «SERÉ me ha enviado a ustedes»
  rationale: La POB en inglés repite la misma designación para conservar la fuerza del paralelo. En español, repetir «YO SOY» mantiene esa correspondencia inmediata con la primera cláusula y resalta que el nombre/designación es lo que se comunica a Israel.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
- issue: Tratamiento de la expresión «sons of Israel»
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos del pueblo de Israel
  rationale: Aunque la nota inglesa explicita el hebreo masculino, en español «hijos de Israel» es la forma tradicional y transparente que conserva la estructura nominal del original sin alterar el referente colectivo.
  doctrine_reference: 'Translation philosophy §2: retain source structure where intelligible'
translation_notes:
  revision_awareness: Se cotejó el pasaje con la última pasada de revisión marcada como sin cambios y con el resumen de control cruzado de alto acuerdo; no se detectaron correcciones necesarias respecto al sentido principal de la POB en inglés, solo decisiones de formulación española y preservación de la tensión semántica del imperfecto hebreo.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים, conforme al criterio del proyecto para la deidad de Israel.
  - Se mantiene «YO SOY» como forma principal y mayúscula para señalar la auto-designación divina, en paralelo con la POB inglesa.
  - Se conserva «hijos de Israel» como eco formal del hebreo; la nota aclara la forma literal.
  - Se evita «SEÑOR» para el nombre divino, porque aquí el término fuente es אֱלֹהִים, no el tetragrámaton.
