  to: Y ahora[a], nuestra carne es como la carne de nuestros hermanos, nuestros hijos como sus hijos; y, sin embargo, aquí estamos, sometiendo a nuestros hijos y a nuestras hijas a la esclavitud, y algunas de nuestras hijas ya han sido esclavizadas. Pero no está en nuestro poder ayudar[b], y nuestros campos y nuestras viñas pertenecen a otros.
