translation:
  language: es
  text: Entonces clamaron a Yahvé[a], y él puso oscuridad entre ustedes y los egipcios, y trajo el mar sobre él y lo cubrió, y sus ojos vieron lo que hice en Egipto. Entonces vivieron en el desierto muchos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo tiene pronombres singulares aquí: «sobre él» y «lo cubrió». El sentido puede ser colectivo, refiriéndose a Egipto o al ejército egipcio; muchas traducciones lo expresan como «ellos/los».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּצְעֲקוּ
  english_pob_choice: they cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - clamaron en voz alta
  lexicon: HALOT 6817
  rationale: צעק expresa un clamor de auxilio en angustia. «Clamaron» conserva la fuerza apelativa y encaja naturalmente con el movimiento hacia Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT 3068
  rationale: Se conserva el nombre propio del pacto como transliteración española estándar del Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: מַאֲפֵל
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - sombras densas
  lexicon: HALOT 3990
  rationale: El sustantivo designa oscuridad o penumbra; «oscuridad» es claro y fiel, sin intensificar innecesariamente el matiz.
- source_word: בֵּינֵיכֶם וּבֵין הַמִּצְרִים
  english_pob_choice: between you and the Egyptians
  chosen_spanish: entre ustedes y los egipcios
  alternatives_spanish:
  - entre vosotros y los egipcios
  - entre ustedes y Egipto
  lexicon: HALOT 996
  rationale: Se mantiene la relación espacial/relacional «entre» y se traduce el segundo plural por un español neutral de registro bíblico moderno.
- source_word: וַיָּבֵא עָלָיו אֶת הַיָּם
  english_pob_choice: brought the sea upon him
  chosen_spanish: trajo el mar sobre ellos
  alternatives_spanish:
  - trajo el mar sobre él
  - hizo venir el mar sobre ellos
  lexicon: HALOT 935 / 5921
  rationale: Aunque el hebreo conserva un sufijo singular, el contexto inmediato y la revisión del POB inglés favorecen una lectura colectiva; en español se refleja el referente plural explícito «los egipcios» mediante «ellos».
- source_word: וַיְכַסֵּהוּ
  english_pob_choice: covered him
  chosen_spanish: los cubrió
  alternatives_spanish:
  - lo cubrió
  - los cubrió con él
  lexicon: HALOT 3680
  rationale: Se sigue la revisión inglesa que resuelve la referencia de modo colectivo. «Los cubrió» mantiene el sentido y evita una construcción extraña en español.
- source_word: וַתִּרְאֶינָה עֵינֵיכֶם
  english_pob_choice: your eyes saw
  chosen_spanish: sus ojos vieron
  alternatives_spanish:
  - vieron sus ojos
  - ustedes vieron
  lexicon: HALOT 7200 / 5869
  rationale: Se conserva la imagen enfática de los ojos como testigos directos. En español, «sus ojos» reproduce la expresión sin perder naturalidad en el discurso directo.
- source_word: אֵת אֲשֶׁר עָשִׂיתִי בְּמִצְרָיִם
  english_pob_choice: what I did in Egypt
  chosen_spanish: lo que hice en Egipto
  alternatives_spanish:
  - lo que hice contra Egipto
  - lo que realicé en Egipto
  lexicon: HALOT 834 / 6213
  rationale: «Lo que hice en Egipto» sigue la forma más llana del hebreo, dejando que el contexto exodal determine si el sentido incluye acción contra Egipto.
- source_word: וַתֵּשְׁבוּ
  english_pob_choice: you lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se quedaron
  lexicon: HALOT 3427
  rationale: ישב puede significar habitar, permanecer o vivir. Aquí «habitaron» mantiene la idea de residencia prolongada en el desierto con un tono bíblico natural.
- source_word: יָמִים רַבִּים
  english_pob_choice: many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - muchos días
  - durante muchos días
  lexicon: HALOT 3117 / 7227
  rationale: La expresión se conserva de forma literal y natural en español, sin convertirla en una paráfrasis temporal más vaga.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre personal de Dios tal como lo exige la política del POB y como lo apoya el hebreo del pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Pronombres singulares/plurales en la referencia a los egipcios
  english_pob_reading: the sea upon them ... covered them
  chosen_spanish_reading: el mar sobre ellos ... los cubrió
  alternative_spanish_readings:
  - el mar sobre él ... lo cubrió
  - el mar sobre los egipcios ... los cubrió
  rationale: La revisión inglesa ya opta por la lectura plural contextual; en español se adopta la misma resolución para evitar una ambigüedad que no añade valor al lector y para reflejar el referente colectivo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Preserve source sense while allowing contextually warranted collective reference'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que resolvió los pronombres singulares del hebreo en plural por el contexto colectivo de «los egipcios». También conserva la decisión estable sobre el nombre divino como «Yahvé» y mantiene el tono sobrio, no parafrástico, del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יְהוָה.
  - Se evita «SEÑOR» para no ocultar el nombre divino.
  - 'Se usa español neutral de registro bíblico: «ustedes», «egipcios», «habitaron».'
  - Se conserva la progresión narrativa del hebreo sin añadir explicaciones interpretativas no requeridas por el texto.
