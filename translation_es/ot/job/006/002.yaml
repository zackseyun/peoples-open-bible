translation:
  language: es
  text: ¡Oh, si se pesara por completo mi angustia[a], y se alzara juntamente mi calamidad en las balanzas[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi dolor». El término hebreo puede denotar angustia interior, vexación o provocación/enfado.
    reason: lexical_alternative
  - marker: b
    text: O «en la balanza» en lugar de «en las balanzas».
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּ
  english_pob_choice: Oh, that
  chosen_spanish: ¡Oh, si...!
  alternatives_spanish:
  - ¡Ojalá!
  - Si tan solo
  lexicon: HALOT
  rationale: El hebreo introduce un deseo lamentativo; en español, «¡Oh, si...!» conserva el tono de anhelo dolido sin sonar forzado ni demasiado moderno.
- source_word: שָׁק֣וֹל יִשָּׁקֵ֣ל
  english_pob_choice: were fully weighed
  chosen_spanish: se pesara por completo
  alternatives_spanish:
  - fuera plenamente pesado
  - se pesara cuidadosamente
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la acción. «Se pesara por completo» comunica bien la ponderación total y la fuerza enfática del hebreo, manteniendo el pasivo natural en español.
- source_word: כַּעְשִׂי
  english_pob_choice: my vexation
  chosen_spanish: mi enfado
  alternatives_spanish:
  - mi vexación
  - mi dolor
  - mi irritación
  lexicon: HALOT
  rationale: El término puede abarcar vexación, enojo o provocación/aflicción. En español, «enfado» expresa la tensión afectiva del lamento sin reducirlo solo a tristeza ni imponer una lectura moralizante; «vexación» sería más técnico pero menos natural para la mayoría de lectores.
- source_word: וְהַוָּתִי
  english_pob_choice: my calamity
  chosen_spanish: mi calamidad
  alternatives_spanish:
  - mi ruina
  - mi desastre
  - mi desgracia
  lexicon: HALOT
  rationale: «Calamidad» reproduce bien el peso objetivo de la desgracia sufrida y mantiene el paralelismo con el primer miembro. Es una opción directa y digna para el registro poético.
- source_word: בְּמֹאזְנַיִם
  english_pob_choice: in the balances
  chosen_spanish: en las balanzas
  alternatives_spanish:
  - en la balanza
  - sobre las balanzas
  - en la báscula
  lexicon: HALOT
  rationale: La forma dual alude a instrumentos de pesaje. «En las balanzas» preserva el plural poético y la imagen del juicio/pesaje, que el español entiende con claridad.
- source_word: יִשְׂאוּ
  english_pob_choice: lifted
  chosen_spanish: se alzara
  alternatives_spanish:
  - se levantara
  - fuera puesto
  - se cargara
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa «alzar/levantar/llevar». En el contexto de pesar en balanzas, «se alzara» transmite el gesto de levantar el objeto para colocarlo o equilibrarlo, sin perder naturalidad.
- source_word: יָחַד
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - a la vez
  - en conjunto
  - juntos
  lexicon: HALOT
  rationale: Este adverbio indica que ambos elementos son tratados como un solo conjunto en la balanza. «Juntamente» conserva el matiz formal y poético del paralelismo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido del hebreo y el audit trail inglés. Se conserva la estructura de deseo lamentativo, la intensificación del pesaje y el paralelismo poético, con una solución española natural pero suficientemente transparente para revisión auditable.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene el registro poético y de lamento sin recurrir a terminología eclesiástica fija que no esté apoyada por la fuente.
  - «Balanzas» conserva el plural del hebreo y la imagen de pesaje; no se simplifica a un singular sin necesidad.
