review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: David se levanta temprano, él y sus hombres regresan a territorio filisteo, y los filisteos suben a Jezreel. También conserva la nota sobre el idiomatismo de עלה. Sin embargo, la sintaxis española «para ir por la mañana a regresar» suena forzada y menos fiel al flujo natural del hebreo que una formulación como «para ir por la mañana y volver». Además, la nota [a] está mal anclada: el texto marcado es «temprano», pero la nota trata de la construcción de los infinitivos, no de וַיַּשְׁכֵּם.'
  spanish_quality_summary: La frase principal es comprensible, pero «para ir por la mañana a regresar» resulta poco natural en español general y reduce la legibilidad eclesial. «Volver» encaja mejor que «regresar» aquí por fluidez narrativa. También conviene mover la nota [a] al segmento de los infinitivos para que el anclaje corresponda al contenido de la nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Filisteos» y «Jezreel» están bien. «Subieron» preserva correctamente el idiomatismo de עלה. No hay cuestiones teológicas sensibles.
  issues:
  - severity: medium
    issue: Sintaxis española forzada en «para ir por la mañana a regresar»
    rationale: Aunque intenta calcar los dos infinitivos hebreos, en español esa secuencia suena antinatural. «Para ir por la mañana y volver a la tierra de los filisteos» preserva ambos movimientos con mejor español.
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota [a] explica una alternativa para la cadena de infinitivos hebreos, pero el marcador aparece en «temprano». Debe anclarse en la frase verbal correspondiente.
  - severity: low
    issue: «Regresar» es correcto pero menos fluido que «volver» en este contexto narrativo
    rationale: Ambos son fieles, pero «volver» produce una lectura más natural y ligera sin pérdida semántica.
  revised_spanish_text: Así que David se levantó temprano, él y sus hombres, para ir por la mañana y volver[a] a la tierra de los filisteos. Y los filisteos subieron a Jezreel[b].
  revised_footnotes:
  - marker: a
    text: 'O: «para ir por la mañana a regresar a la tierra de los filisteos». Los infinitivos hebreos pueden verterse de manera más formal.'
    reason: lexical_alternative
  - marker: b
    text: «Subieron» refleja el hebreo idiomático de movimiento hacia un lugar; alternativamente, «marcharon a Jezreel».
    reason: lexical_alternative
  revision_rationale: Se mejoró la naturalidad del español manteniendo la secuencia de los dos infinitivos hebreos, y se corrigió el anclaje de la nota [a] para que corresponda al punto textual que realmente comenta.
