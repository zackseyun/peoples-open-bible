review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura del versículo: Yahvé secó las aguas del Jordán delante de Israel hasta que cruzaron, tal como hizo con el mar del éxodo. Sin embargo, hay un error importante en la expresión de יַם סוּף: «el mar de Reeds» deja un término inglés sin traducir y no cumple la decisión léxica auditada; debe verterse naturalmente al español como «el mar de los Juncos» o equivalente. Además, la nota tradicional «mar Rojo» está anclada erróneamente a «secó[a]» en vez de al nombre del mar, y el borrador duplica innecesariamente la misma nota con dos marcadores.'
  spanish_quality_summary: El español es generalmente claro y legible, pero «el mar de Reeds» es antinatural y mezcla idiomas. También puede mejorarse la fluidez evitando la repetición enfática de «ustedes» en «hasta que ustedes pasaron». El resto del verso suena digno y comprensible.
  glossary_alignment: Alinea correctamente יְהוָה > «Yahvé» y אֱלֹהֵיכֶם > «su Dios». הוֹבִישׁ > «secó» es adecuado. La principal desviación terminológica es יַם סוּף, que debe reflejar el sentido hebreo en español, no conservar la palabra inglesa «Reeds». La nota tradicional «mar Rojo» debe mantenerse, pero con un solo marcador colocado sobre la frase correspondiente.
  issues:
  - severity: high
    issue: «el mar de Reeds» mezcla inglés y español
    rationale: No es español natural ni una representación fiel del término hebreo dentro del estilo meta del proyecto. La decisión auditada inglesa «Sea of Reeds» debe trasladarse semánticamente al español, p. ej. «mar de los Juncos».
  - severity: high
    issue: La nota [a] está anclada a «secó» en lugar de a יַם סוּף
    rationale: La nota «Tradicionalmente, “el mar Rojo”» explica el nombre del mar, no el verbo הוֹבִישׁ. El anclaje actual induce a error.
  - severity: medium
    issue: Hay dos notas idénticas para una sola alternativa léxica
    rationale: Solo se necesita una nota tradicional para el nombre «mar de los Juncos». Duplicarla añade ruido sin beneficio.
  - severity: low
    issue: «hasta que ustedes pasaron» suena algo pesado
    rationale: En español neutral, «hasta que pasaron» conserva el sentido sin repetir el pronombre, aunque esto es estilístico y no un problema de fidelidad.
  revised_spanish_text: Porque Yahvé su Dios secó las aguas del Jordán delante de ustedes, hasta que pasaron, tal como Yahvé su Dios hizo con el mar de los Juncos[a], el cual secó delante de nosotros hasta que pasamos.
  revised_footnotes:
  - marker: a
    text: Tradicionalmente, «el mar Rojo».
    reason: lexical_alternative
  revision_rationale: Se corrige la mezcla de idiomas en יַם סוּף con una forma española natural y fiel («mar de los Juncos»), y se reubica la nota tradicional al término que realmente explica. También se elimina la duplicación innecesaria de notas y se aligera levemente la sintaxis sin cambiar el sentido.
