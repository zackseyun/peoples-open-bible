translation:
  language: es
  text: 'Pero él mismo caminó un día de camino por el desierto, y llegó y se sentó debajo de una retama[a]. Y pidió morir, y dijo: «Basta; ahora, Yahvé, toma mi vida[b], porque no soy mejor que mis padres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arbusto de retama». רֹתֶם designa un arbusto del desierto, no necesariamente un árbol.
    reason: lexical_alternative
  - marker: b
    text: Lit. «mi alma/vida». En este contexto, נֶפֶשׁ se refiere a la vida de la persona que desea morir.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמִּדְבָּר
  english_pob_choice: into the wilderness
  chosen_spanish: por el desierto
  alternatives_spanish:
  - en el desierto
  - hacia el desierto
  lexicon: HALOT
  rationale: מִדְבָּר puede abarcar desierto o región árida. En español, 'por el desierto' comunica el avance dentro de esa zona sin forzar una preposición de dirección que sonaría menos natural con el resto de la cláusula.
- source_word: דֶּרֶךְ יוֹם
  english_pob_choice: a day's journey
  chosen_spanish: un día de jornada
  alternatives_spanish:
  - una jornada de un día
  - un día de camino
  lexicon: HALOT
  rationale: La expresión hebrea indica la distancia recorrida en un día. 'Un día de jornada' conserva la medida temporal y el sentido de recorrido; aunque es menos idiomática que en inglés, evita perder la idea de distancia.
- source_word: רֹתֶם
  english_pob_choice: broom tree
  chosen_spanish: una retama
  alternatives_spanish:
  - un arbusto de retama
  - un árbol de retama
  lexicon: HALOT
  rationale: רֹתֶם designa el arbusto desértico conocido como retama. En español, 'retama' es la opción más natural y amplia; mantiene la identificación botánica sin imponer la categoría 'árbol' que no es segura.
- source_word: וַיִּשְׁאַל אֶת־נַפְשׁוֹ לָמוּת
  english_pob_choice: he asked that he might die
  chosen_spanish: pidió para sí morir
  alternatives_spanish:
  - pidió que muriera
  - pidió la muerte
  - pidió que su vida terminara
  lexicon: HALOT
  rationale: La construcción hebrea expresa una petición de muerte para sí mismo. 'Pidió para sí morir' conserva la relación del verbo con נֶפֶשׁ sin reducirla de inmediato a una formulación interpretativa excesiva.
- source_word: רַב עַתָּה
  english_pob_choice: It is enough; now
  chosen_spanish: Basta; ahora
  alternatives_spanish:
  - Es suficiente; ahora
  - Ya basta
  lexicon: HALOT
  rationale: רַב aquí funciona como exclamación de suficiencia. 'Basta' reproduce bien la fuerza emotiva y permite conservar 'ahora' como elemento separado de urgencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: De acuerdo con el estándar del proyecto en español, el Tetragrámaton se vierte 'Yahvé' como nombre propio divino. Se evita 'SEÑOR' por ser una sustitución de máscara, no una transliteración del nombre.
- source_word: קַח נַפְשִׁי
  english_pob_choice: take my life
  chosen_spanish: toma mi vida
  alternatives_spanish:
  - toma mi alma
  - toma mi vida y quítamela
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se refiere a la vida de Elijah en el marco de su deseo de morir. 'Mi vida' es claro en español y respeta el sentido sin introducir una antropología ajena al contexto.
- source_word: כִּי לֹא טוֹב אָנֹכִי מֵאֲבֹתָי
  english_pob_choice: for I am no better than my fathers
  chosen_spanish: porque no soy mejor que mis padres
  alternatives_spanish:
  - porque no soy mejor que mis antepasados
  - pues no soy mejor que mis padres
  lexicon: HALOT
  rationale: טוֹב con מִן expresa comparación de superioridad. 'Mejor que' preserva esa relación comparativa y 'mis padres' sigue de cerca el hebreo y el patrón bíblico de referencia a los antepasados.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh in the audit context, with a footnote noting the Hebrew divine name
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente en un ruego dirigido a Dios. En la tradición POB en español, se mantiene el nombre propio divino 'Yahvé' para preservar la referencia directa al nombre revelado, evitando la sustitución litúrgica 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto de revisión en inglés eliminó una marca innecesaria antes de 'broom tree' para sonar más natural, pero mantuvo sin cambios el resto. En español, se conservó la idea de un arbusto singular con 'una retama', sin añadir numeración ni énfasis extra, y se ajustó el orden para una lectura natural sin perder las correspondencias hebreas principales.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma principal del nombre divino, coherente con el estándar español del proyecto.
  - '''retama'' se usó como equivalente natural de רֹתֶם, con nota para preservar la alternativa botánica.'
  - La secuencia narrativa conserva los verbos de movimiento y asiento en forma simple y directa.
  - '''mis padres'' traduce el plural posesivo del hebreo de manera fiel y natural en español.'
