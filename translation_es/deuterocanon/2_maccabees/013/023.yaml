translation:
  language: es
  text: Atacó a los que estaban con Judas[a], pero fue derrotado. Desesperado, tomó a Felipe en Antioquía, el que había quedado a cargo de los asuntos; quedó confundido, apeló a los judíos, se sometió y juró cumplir todas las condiciones justas[b]. Se reconcilió, ofreció sacrificio, honró el santuario y el lugar, y mostró benevolencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La secuencia griega alrededor de «tomó a Felipe» es comprimida y difícil; el matiz exacto de la acción contra Felipe no puede precisarse con total seguridad.
    reason: textual_variant
  - marker: b
    text: 'O: «a todo lo que era justo». La frase puede referirse en general a condiciones justas o específicamente a los términos del acuerdo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέβαλεν
  english_pob_choice: attacked
  chosen_spanish: atacó
  alternatives_spanish:
  - asaltó
  - arremetió contra
  lexicon: LSJ
  rationale: El verbo expresa un ataque militar o agresión contra un grupo. «Atacó» es natural y fiel al sentido bélico del contexto.
- source_word: τοῖς περὶ τὸν Ἰούδαν
  english_pob_choice: those around Judas
  chosen_spanish: a los que estaban con Judas
  alternatives_spanish:
  - al grupo de Judas
  - a los hombres de Judas
  lexicon: LSJ
  rationale: 'La frase griega es idiomática y literal: quienes estaban en torno a Judas, es decir, su grupo. La versión conserva esa relación sin precisar más de lo que el texto dice.'
- source_word: ἥττων ἐγένετο
  english_pob_choice: was defeated
  chosen_spanish: fue derrotado
  alternatives_spanish:
  - quedó vencido
  - salió derrotado
  lexicon: LSJ
  rationale: La expresión indica derrota en combate. «Fue derrotado» comunica claramente el resultado militar.
- source_word: μετέλαβεν
  english_pob_choice: took Philip
  chosen_spanish: tomó a Felipe
  alternatives_spanish:
  - aprehendió a Felipe
  - se apoderó de Felipe
  lexicon: LSJ
  rationale: Siguiendo la revisión del audit trail, la construcción se toma de modo más directo con el objeto «Felipe». En español, «tomó a Felipe» mantiene la compresión del griego sin inventar un detalle específico no explicitado.
- source_word: ἀπονοηθεὶς
  english_pob_choice: having become desperate
  chosen_spanish: habiendo caído en desesperación
  alternatives_spanish:
  - habiendo perdido el ánimo
  - desesperado
  lexicon: LSJ
  rationale: El participio expresa un estado de desesperación o desánimo extremo. La formulación conserva el giro participial y el matiz intensivo.
- source_word: τὸν Φίλιππον ἐν Ἀντιοχίᾳ τὸν ἀπολελειμμένον ἐπὶ τῶν πραγμάτων
  english_pob_choice: Philip in Antioch, the one left in charge of affairs
  chosen_spanish: Felipe en Antioquía, el que había quedado a cargo de los asuntos
  alternatives_spanish:
  - Felipe en Antioquía, dejado al frente de los asuntos
  - Felipe en Antioquía, encargado de los asuntos
  lexicon: LSJ
  rationale: La frase indica una responsabilidad administrativa o de gobierno. «A cargo de los asuntos» refleja ese sentido sin sobrecargar con terminología moderna demasiado técnica.
- source_word: συνεχύθη
  english_pob_choice: was confounded
  chosen_spanish: fue confundido
  alternatives_spanish:
  - quedó confuso
  - fue desconcertado
  lexicon: LSJ
  rationale: El pasivo comunica perturbación o desconcierto. «Fue confundido» conserva la forma sobria y formal del original, aunque en español también puede leerse como «quedó confundido».
- source_word: παρεκάλεσεν
  english_pob_choice: appealed to
  chosen_spanish: rogó a
  alternatives_spanish:
  - imploró a
  - apeló a
  lexicon: LSJ
  rationale: En este contexto diplomático, el verbo puede expresar súplica o petición insistente. «Rogó a» transmite esa urgencia sin imponer un tecnicismo ajeno al registro narrativo.
- source_word: ὑπετάγη
  english_pob_choice: submitted
  chosen_spanish: se sometió
  alternatives_spanish:
  - cedió
  - se rindió
  lexicon: LSJ
  rationale: La voz media/pasiva expresa rendición o sumisión. «Se sometió» es el equivalente español más directo y neutral.
- source_word: ἐπὶ πᾶσι τοῖς δικαίοις
  english_pob_choice: to all the just terms
  chosen_spanish: cumplir todas las condiciones justas
  alternatives_spanish:
  - a todas las condiciones justas
  - a todo lo que era justo
  lexicon: LSJ
  rationale: La frase puede aludir a términos de arreglo o a lo que es justo en general. Se opta por una formulación que preserve el posible matiz pactado sin perder la amplitud semántica del griego.
- source_word: συνελύθη
  english_pob_choice: was reconciled
  chosen_spanish: se reconcilió
  alternatives_spanish:
  - llegó a un acuerdo
  - cesó la enemistad
  lexicon: LSJ
  rationale: El verbo sugiere el cese de hostilidad o una reconciliación. «Se reconcilió» funciona bien en español y sigue la lectura del POB inglés.
- source_word: θυσίαν προσήγαγεν
  english_pob_choice: offered sacrifice
  chosen_spanish: ofreció sacrificio
  alternatives_spanish:
  - presentó un sacrificio
  - hizo una ofrenda
  lexicon: LSJ
  rationale: Es una fórmula cultual estándar. «Ofreció sacrificio» mantiene el acto ritual sin interpretarlo teológicamente.
- source_word: τὸν νεὼ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el templo
  - el recinto sagrado
  lexicon: LSJ
  rationale: ναός designa el santuario o edificio sagrado, no simplemente el conjunto del complejo. «Santuario» preserva mejor esa precisión que «templo» en este contexto.
- source_word: τὸν τόπον
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - ese lugar
  lexicon: LSJ
  rationale: El griego dice literalmente «el lugar». Se mantiene la neutralidad y la referencia reverente sin añadir «santo» u otra especificación no expresada.
- source_word: ἐφιλανθρώπησεν
  english_pob_choice: showed kindness
  chosen_spanish: mostró bondad
  alternatives_spanish:
  - actuó con benevolencia
  - trató humanamente
  lexicon: LSJ
  rationale: El verbo expresa benevolencia o trato amable. «Mostró bondad» es claro, digno y suficientemente amplio para el cierre breve del versículo.
theological_decisions:
- issue: Tratamiento de las condiciones juradas y su posible valor jurídico o moral
  english_pob_reading: to all the just terms
  chosen_spanish_reading: cumplir todas las condiciones justas
  alternative_spanish_readings:
  - a todas las condiciones justas
  - a todo lo que era justo
  rationale: El griego ἐπὶ πᾶσι τοῖς δικαίοις admite tanto una referencia a términos de acuerdo como a lo justo en general. La versión española mantiene esa tensión con una formulación que suena naturalmente contractual y no cierra indebidamente el sentido.
  doctrine_reference: Mantener la ambigüedad semántica donde el texto es compacto y no resuelve si se trata de condiciones pactadas o de justicia general.
- issue: Terminología cultual de ναός y θυσίαν προσήγαγεν
  english_pob_reading: sanctuary ... offered sacrifice
  chosen_spanish_reading: santuario ... ofreció sacrificio
  alternative_spanish_readings:
  - templo ... ofreció sacrificio
  - santuario ... hizo una ofrenda
  rationale: Se conserva el carácter cultual e histórico del pasaje sin introducir lenguaje doctrinal posterior. «Santuario» es más preciso que «templo» para ναός, y «ofreció sacrificio» refleja el acto ritual de forma directa.
  doctrine_reference: Priorizar el sentido histórico-cultual del texto deuterocanónico sin sobreinterpretación teológica.
- issue: Pasivo de συνεχύθη y su tono narrativo
  english_pob_reading: was confounded
  chosen_spanish_reading: fue confundido
  alternative_spanish_readings:
  - quedó confundido
  - fue desconcertado
  rationale: El término puede expresar confusión, desconcierto o turbación. Se elige una forma sobria que conserva la pasividad y el desorden interior/político sin forzar una psicologización excesiva.
  doctrine_reference: Respetar la densidad narrativa del original griego en un relato histórico.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que ajustó la frase central para reflejar más directamente μετέλαβεν con τὸν Φίλιππον y suavizó el valor de συνεχύθη a un pasivo más formal. La redacción española conserva esa cautela y evita especificar una acción contra Felipe que el griego no determina con claridad.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se mantiene «Mesías/Cristo» fuera de este pasaje porque no aparece ninguna de esas formas en la fuente.
  - Se usa «santuario» para ναός y «sacrificio» para θυσίαν según el contexto cultual del pasaje.
  - Se evita «siervo» porque no corresponde a δοῦλος en este versículo.
  - Se conserva la ambigüedad de la cláusula de condiciones justas, como en el audit trail inglés, sin reducirla a una sola lectura.
