translation:
  language: es
  text: y de nuevo vuelve corriendo a su propio lugar en un día[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vuelve a su propio lugar en un solo día». El verbo griego enfatiza un movimiento rápido, por eso se mantuvo «vuelve corriendo» en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: LSJ
  rationale: El adverbio marca repetición; «otra vez» es natural en español y conserva la idea de recurrencia sin elevar el registro.
- source_word: ἀποτρέχει
  english_pob_choice: runs back
  chosen_spanish: corre de vuelta
  alternatives_spanish:
  - vuelve corriendo
  - regresa corriendo
  - retorna
  lexicon: LSJ
  rationale: El verbo compuesto subraya movimiento rápido con sentido de regreso. «Corre de vuelta» preserva la vivacidad del griego mejor que un simple «regresa».
- source_word: εἰς τὸν ἑαυτοῦ τόπον
  english_pob_choice: to its own place
  chosen_spanish: a su propio lugar
  alternatives_spanish:
  - a su lugar
  - a su lugar propio
  lexicon: LSJ
  rationale: «ἑαυτοῦ» añade posesión reflexiva; «su propio lugar» mantiene ese matiz con claridad en español.
- source_word: ἐν μιᾷ ἡμέρᾳ
  english_pob_choice: in one day
  chosen_spanish: en un día
  alternatives_spanish:
  - en un solo día
  - dentro de un día
  lexicon: LSJ
  rationale: La expresión temporal indica que la acción se completa dentro del lapso de un día. «En un día» es idiomático y fiel.
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones sustantivas; el sentido estable es de retorno rápido a su lugar propio en el transcurso de un día.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología teológica no presente en el versículo.
  - Se mantuvo un registro bíblico claro y moderno, sin calcos innecesarios.
  - «Lugar» conserva el valor básico de τόπος sin introducir matices interpretativos adicionales.
