    rationale: Esto altera la correspondencia entre texto, fuente y notas. En la revisión, la nota [b] debe ir en la exclamación final, no en «cadáveres».
  - severity: low
    issue: Se añadió una nota [c] sobre el valor impersonal/colectivo de הִשְׁלִיךְ que no es necesaria en el español final.
    rationale: La impersonalidad ya queda bien resuelta en español con un plural tácito/indefinido; la nota añade carga sin necesidad para el lector final.
  - severity: low
