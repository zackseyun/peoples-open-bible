translation:
  language: es
  text: Aunque el odio esté cubierto con engaño[a], su mal será expuesto en la asamblea[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «con astucia» o «por medio del engaño». El hebreo apunta a una ocultación lograda mediante conducta engañosa.
    reason: lexical_alternative
  - marker: b
    text: O «en la congregación». El hebreo se refiere a una comunidad reunida o asamblea.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּכַּסֶּה
  english_pob_choice: is covered
  chosen_spanish: se cubra
  alternatives_spanish:
  - es cubierto
  - puede quedar cubierto
  - se oculta
  lexicon: HALOT
  rationale: El nifal imperfecto de כסה expresa aquí una acción pasiva/reflexiva en sentido proverbial. En español, «se cubra» conserva la posibilidad de cobertura sin forzar un presente demasiado mecánico.
- source_word: שִׂנְאָה
  english_pob_choice: hatred
  chosen_spanish: el odio
  alternatives_spanish:
  - la odio
  - la hostilidad
  - el rencor
  lexicon: HALOT
  rationale: El sustantivo denota odio/hostilidad. «Odio» es el equivalente natural y claro en español para el abstracto hebreo.
- source_word: בְּמַשָּׁאוֹן
  english_pob_choice: with deceit
  chosen_spanish: con engaño
  alternatives_spanish:
  - con guile
  - por medio de engaño
  - con astucia
  lexicon: HALOT
  rationale: El POB inglés entiende el término como conducta engañosa o guile. En español, «engaño» comunica el medio de manera natural y mantiene el sentido instrumental del prefijo בְּ.
- source_word: תִּגָּלֶה
  english_pob_choice: will be exposed
  chosen_spanish: será expuesta
  alternatives_spanish:
  - será revelada
  - quedará descubierta
  - será puesta al descubierto
  lexicon: HALOT
  rationale: El nifal imperfecto de גלה, con רָעָתוֹ como sujeto, expresa el paso de lo oculto a lo visible. «Será expuesta» conserva bien esa apertura pública y el paralelismo proverbial.
- source_word: רָעָתוֹ
  english_pob_choice: his evil
  chosen_spanish: su maldad
  alternatives_spanish:
  - su mal
  - su perversidad
  - su malicia
  lexicon: HALOT
  rationale: רָעָה puede abarcar mal, maldad o conducta dañina. «Maldad» es suficientemente amplia y suena natural en español bíblico contemporáneo, sin reducir el alcance del hebreo.
- source_word: בְקָהָל
  english_pob_choice: in the assembly
  chosen_spanish: en la asamblea
  alternatives_spanish:
  - en la congregación
  - ante la comunidad
  - públicamente
  lexicon: HALOT
  rationale: קָהָל designa una comunidad reunida o asamblea. «Asamblea» preserva el referente concreto mejor que una paráfrasis adverbial.
translation_notes:
  revision_awareness: El contexto fuente y el audit trail inglés muestran alta concordancia y ninguna revisión aplicada; se mantiene el paralelismo antitético y la lectura proverbial general sin suavizar el contraste entre el ocultamiento del odio y la exposición pública del mal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene «asamblea» para קָהָל, en línea con la decisión inglesa de conservar el marco comunitario concreto.
  - Se evita «congregación» en el texto principal porque «asamblea» conserva mejor el matiz de reunión comunitaria sin carga eclesiástica adicional.
