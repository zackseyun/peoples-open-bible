  text: וְ/גַם אֲנִי֙ נָתַ֣תִּי לָ/הֶ֔ם חֻקִּ֖ים לֹ֣א טוֹבִ֑ים וּ/מִ֨שְׁפָּטִ֔ים לֹ֥א יִֽחְי֖וּ בָּ/הֶֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/025.yaml
  text: Moreover[b][a], I myself gave them statutes that were not good and ordinances by which they could not live.
  footnotes:
  - marker: a
    text: Or, interpretively, 'I gave them over to statutes that were not good,' preserving the sense that this was a judicial act rather than God issuing morally defective laws.
    reason: alternative_reading
  - marker: b
    text: The phrase 'live by them' echoes the covenantal idiom that obedience to God's statutes leads to life (compare Lev 18:5). Here the expression is deliberately reversed.
    reason: cross_reference
