translation:
  language: es
  text: Y cuando toda la nación terminó de circuncidarse, permanecieron en sus lugares en el campamento hasta que se recuperaron[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta que fueron sanados» o «hasta que revivieron».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: And when
  chosen_spanish: Y sucedió que, cuando
  alternatives_spanish:
  - Y cuando
  - Aconteció que, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una cláusula temporal. En español, «Y sucedió que, cuando» conserva el valor narrativo sin volverse forzada.
- source_word: תַּמּוּ
  english_pob_choice: had finished
  chosen_spanish: terminó de
  alternatives_spanish:
  - había terminado de
  - acabó de
  lexicon: HALOT
  rationale: El verbo expresa completitud de la acción. «Terminó de» reproduce bien la idea de finalización y funciona naturalmente con el sujeto colectivo.
- source_word: כָל הַגּוֹי
  english_pob_choice: all the nation
  chosen_spanish: toda la nación
  alternatives_spanish:
  - todo el pueblo
  - toda la gente
  lexicon: HALOT
  rationale: Se mantiene el singular colectivo del hebreo. «Nación» conserva la fuerza corporativa que el audit trail inglés quiso preservar.
- source_word: לְהִמּוֹל
  english_pob_choice: being circumcised
  chosen_spanish: circuncidarse
  alternatives_spanish:
  - ser circuncidados
  - someterse a la circuncisión
  lexicon: HALOT
  rationale: El infinitivo niphal aquí describe la acción sufrida/realizada por el grupo. «Circuncidarse» da una construcción verbal natural en español y preserva la voz media/pasiva implícita.
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: they remained
  chosen_spanish: se quedaron
  alternatives_spanish:
  - permanecieron
  - se mantuvieron
  lexicon: HALOT
  rationale: El contexto es de permanencia tras la circuncisión, no de postura sentada. «Se quedaron» comunica bien la continuidad de la estancia.
- source_word: תַחְתָּם
  english_pob_choice: in their places
  chosen_spanish: en sus lugares
  alternatives_spanish:
  - donde estaban
  - en el mismo lugar
  lexicon: HALOT
  rationale: La expresión idiomática no debe leerse literalmente como «debajo de ellos». «En sus lugares» refleja la idea contextual de permanecer donde estaban.
- source_word: בַּמַּחֲנֶה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - en el campamento militar
  lexicon: HALOT
  rationale: Renderiza de forma directa la localización del texto hebreo con español claro y natural.
- source_word: עַד חֲיוֹתָם
  english_pob_choice: until they recovered
  chosen_spanish: hasta que sanaron
  alternatives_spanish:
  - hasta que se recuperaron
  - hasta que fueron sanados
  lexicon: HALOT
  rationale: El sentido contextual de חיה aquí es la restauración de la salud/fortaleza después de la circuncisión. «Sanaron» es breve y transparente en español, manteniendo la posibilidad semántica de recuperación general.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota no anclada. El texto español ahora no contiene marcas de nota, por lo que no hay desajuste entre marcas y notas.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y publicable.
  - Se evitó el calco «bajo ellos» para תַחְתָּם por su ambigüedad y por el contexto médico de la frase.
  - Se prefirió «nación» para conservar el singular colectivo del hebreo, en línea con el audit trail inglés.
  - Se usó «circuncidarse» como forma española natural que conserva el valor reflexivo/pasivo del infinitivo hebreo.
