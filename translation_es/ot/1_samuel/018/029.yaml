translation:
  language: es
  text: Saúl siguió temiendo[a] a David aún más, y Saúl era enemigo de David todos sus días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Saúl continuó temiendo a David» o «Saúl siguió temiendo a David todavía más». El hebreo combina «añadió/continuó» con «temer», y עוֹד intensifica la idea.
    reason: lexical_alternative
  - marker: b
    text: O «Saúl era enemigo de David todos los días», es decir, de manera continua. La frase hebrea puede enfatizar la duración constante más que limitarse estrictamente a la vida de Saúl.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאסֶף
  english_pob_choice: continued
  chosen_spanish: siguió
  alternatives_spanish:
  - continuó
  - volvió a
  lexicon: HALOT
  rationale: El verbo idiomático con infinitivo expresa continuidad de la acción o estado; «siguió» comunica naturalmente esa progresión en español sin perder el matiz aspectual.
- source_word: לֵרֹא
  english_pob_choice: to fear
  chosen_spanish: temiendo
  alternatives_spanish:
  - temer
  - tener miedo de
  lexicon: HALOT
  rationale: Se conserva el campo semántico de ירא con un verbo que expresa temor real y sostenido. El gerundio encaja con la continuidad marcada por el hebreo.
- source_word: מִפְּנֵי דָוִד
  english_pob_choice: David
  chosen_spanish: a David
  alternatives_spanish:
  - por David
  - ante David
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática que, con ירא, señala el objeto del temor. En español, «a David» completa de forma natural el verbo temer.
- source_word: עוֹד
  english_pob_choice: even more
  chosen_spanish: aún más
  alternatives_spanish:
  - todavía más
  - más todavía
  - más aún
  lexicon: HALOT
  rationale: עוֹד intensifica la idea de aumento. «Aún más» preserva esa escalada de manera clara y sobria.
- source_word: וַיְהִי
  english_pob_choice: was
  chosen_spanish: fue
  alternatives_spanish:
  - era
  - llegó a ser
  lexicon: HALOT
  rationale: En el cierre resumido, היה presenta el estado resultante de Saúl. «Fue» mantiene ese valor copulativo y narrativo.
- source_word: אֹיֵב
  english_pob_choice: enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - adversario
  - hostil
  lexicon: HALOT
  rationale: El sustantivo denota enemistad activa. «Enemigo» es la opción más directa y fiel al valor léxico.
- source_word: אֶת דָּוִד
  english_pob_choice: David’s enemy
  chosen_spanish: de David
  alternatives_spanish:
  - para con David
  - contra David
  lexicon: HALOT
  rationale: La construcción marca a David como el referente de la enemistad. En español, «enemigo de David» es natural y conserva la relación objetiva.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all his days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - todos los días
  - durante todo su tiempo
  lexicon: HALOT
  rationale: La frase hebrea puede referirse a duración continua; con sujeto singular, «todos sus días» expresa bien la permanencia de la hostilidad a lo largo de su vida.
translation_notes:
  revision_awareness: El texto español sigue el pasaje base sin cambios textuales en la revisión más reciente; la redacción se mantiene alineada con el consenso de alta concordancia del control cruzado.
  spanish_consistency_notes:
  - Se mantuvo «David» como objeto del temor y de la enemistad, coherente con la sintaxis hebrea y la auditoría inglesa.
  - Se evitó «SEÑOR» u otra terminología no pertinente; el versículo no contiene el Tetragrámaton ni vocabulario cristológico.
  - «Aún más» preserva la intensificación de עוֹד sin convertirla en mera temporalidad.
  - «Todos sus días» conserva el valor de duración continua documentado en la nota inglesa.
