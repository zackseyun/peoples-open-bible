translation:
  language: es
  text: Entonces Oseas hijo de Ela conspiró contra Peka hijo de Remalías, lo hirió, lo mató y reinó en su lugar, en el año vigésimo[a] de Jotam hijo de Uzías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice «en el año veinte de Jotam hijo de Uzías». Esto crea una dificultad cronológica en los datos de los reinados; algunos intérpretes intentan armonizarlo con el reinado de Acaz, pero la traducción sigue la redacción hebrea.
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּקְשָׁר קֶשֶׁר
  english_pob_choice: conspired against
  chosen_spanish: conspiró contra
  alternatives_spanish:
  - trazó una conspiración contra
  - maquinó contra
  lexicon: HALOT
  rationale: El hebreo usa una construcción enfática de verbo + sustantivo de la misma raíz, pero el POB inglés revisado decidió no repetir la redundancia en la lengua meta. En español, «conspiró contra» comunica la acción de manera natural y fiel sin añadir madera innecesaria.
- source_word: הוֹשֵׁעַ
  english_pob_choice: Hoshea
  chosen_spanish: Oseas
  alternatives_spanish:
  - Hoshea
  lexicon: Convención bíblica hispana
  rationale: En español bíblico, el nombre se transmite normalmente como «Oseas», forma estable y reconocible para lectores de habla hispana. No afecta el referente histórico y mejora la legibilidad.
- source_word: בֶּן אֵלָה
  english_pob_choice: son of Elah
  chosen_spanish: hijo de Ela
  alternatives_spanish:
  - hijo de Elá
  lexicon: Construcción genealógica estándar
  rationale: Se conserva la filiación directa del hebreo para identificación histórica. «Hijo de» reproduce con precisión בֶּן.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - en contra de
  lexicon: HALOT
  rationale: En contextos de conspiración, עַל introduce hostilidad dirigida a una persona; «contra» es el equivalente natural en español.
- source_word: פֶּקַח בֶּן רְמַלְיָהוּ
  english_pob_choice: Pekah son of Remaliah
  chosen_spanish: Peka, hijo de Remalías
  alternatives_spanish:
  - Pekaj, hijo de Remalías
  lexicon: Convención bíblica hispana
  rationale: Se adapta el nombre al uso español («Peka») y se conserva el patronímico. La forma «Remalías» es la habitual en español y mantiene la identificación dinástica.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo derribó
  alternatives_spanish:
  - lo hirió
  - lo golpeó
  lexicon: HALOT
  rationale: נכה puede significar golpear, herir o derribar. Como el verbo siguiente ya expresa la muerte, «lo derribó» preserva la secuencia violenta sin convertir este verbo en un sinónimo directo de matar.
- source_word: וַיְמִיתֵהוּ
  english_pob_choice: put him to death
  chosen_spanish: lo mató
  alternatives_spanish:
  - le dio muerte
  - lo hizo morir
  lexicon: HALOT
  rationale: El hifil de מות es causativo, pero en español «lo mató» expresa de forma clara y natural el resultado. La fuerza causativa ya queda implícita en el contexto narrativo.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  english_pob_choice: reigned in his place
  chosen_spanish: reinó en su lugar
  alternatives_spanish:
  - reinó en lugar de él
  - fue rey en su lugar
  lexicon: HALOT
  rationale: «Reinó en su lugar» reproduce con naturalidad el sentido de sucesión marcado por תַּחְתָּיו sin sobrecargar la frase.
- source_word: בִּשְׁנַת עֶשְׂרִים
  english_pob_choice: in the twentieth year
  chosen_spanish: en el año veinte
  alternatives_spanish:
  - en el vigésimo año
  lexicon: HALOT
  rationale: Ambas opciones son correctas; «en el año veinte» suena más idiomático en español narrativo, mientras mantiene el valor regnal del hebreo.
- source_word: לְיוֹתָם בֶּן עֻזִיָּה
  english_pob_choice: of Jotham son of Uzziah
  chosen_spanish: de Jotam, hijo de Uzías
  alternatives_spanish:
  - de Jotam, hijo de Azarías
  lexicon: Convención bíblica hispana
  rationale: El ל introduce la referencia regnal; «de Jotam» refleja adecuadamente la fórmula. Se conserva la filiación como en el hebreo y se usa la forma española más difundida de Uzías.
theological_decisions:
- issue: Tensión cronológica en la fórmula regnal
  english_pob_reading: Translate the Masoretic dating formula straightforwardly as 'in the twentieth year of Jotham son of Uzziah.'
  chosen_spanish_reading: 'Traducir de manera directa: «en el año veinte de Jotam, hijo de Uzías».'
  alternative_spanish_readings:
  - armonizar implícitamente con el reinado de Acaz
  - alterar o emendar la cronología en el texto principal
  rationale: La lectura hebrea presenta una dificultad cronológica conocida dentro de Reyes. La traducción debe reflejar el texto recibido sin resolver el problema por armonización o emendación en el cuerpo principal. Si se añadieran notas, deberían señalar la tensión sin ocultarla.
  doctrine_reference: Principios POB de fidelidad textual y transparencia
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB inglés: se evita la repetición redundante equivalente a ''in a conspiracy'' y se mantiene la secuencia verbal simple ''conspiró contra / lo derribó / lo mató / reinó en su lugar''.'
  spanish_consistency_notes:
  - Se usa «Oseas» para el nombre propio en español, pero se mantiene la identificación histórica completa con el patronímico.
  - Se conserva la estructura narrativa breve del hebreo sin añadir explicaciones en el texto principal.
  - La fórmula cronológica se traduce literalmente, sin intentar resolver la tensión histórica dentro del versículo.
