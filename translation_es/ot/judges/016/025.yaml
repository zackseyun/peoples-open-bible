base_translation:
  language: en
  yaml_path: translation/ot/judges/016/025.yaml
  text: And when their hearts were merry[a], they said, “Call for Samson, so that he may entertain us.” So they called for Samson from the prison house, and he entertained them[b]. And they made him stand between the pillars.
  footnotes:
  - marker: a
    text: Or 'so that he may perform for us' or 'so that he may make sport for us.' The Hebrew verb can denote amusement, mockery, or public performance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the house of the prisoners,' that is, from the prison house.
    reason: lexical_alternative
