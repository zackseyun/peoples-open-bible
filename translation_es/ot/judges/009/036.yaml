revisions:
- from: 'Cuando Gaal vio al pueblo[a], le dijo a Zebul: «Mira, viene gente bajando de las cimas de los montes». Pero Zebul le respondió: «Estás viendo la sombra de los montes como hombres».'
  to: 'Cuando Gaal vio al pueblo, le dijo a Zebul: «Mira, viene gente descendiendo de las cimas de los montes». Pero Zebul le dijo: «Estás viendo la sombra de los montes como hombres[a]».'
  rationale: Se corrigió el anclaje de la nota al pie para que corresponda a la alternativa textual real preservada por el POB inglés. También se ajustó «le respondió» a «le dijo» por mayor cercanía al hebreo, y se refinó la expresión del descenso a «viene gente descendiendo» para mejor registro y claridad.
