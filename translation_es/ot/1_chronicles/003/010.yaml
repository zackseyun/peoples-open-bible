translation:
  language: es
  text: Y el hijo de Salomón fue Roboam; Abías su hijo[a], Asa su hijo, Josafat su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Abías». En 1–2 Reyes, el mismo rey también aparece con la variante nominal «Abijam».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בֶן
  english_pob_choice: And the son of
  chosen_spanish: Y el hijo de
  alternatives_spanish:
  - Ahora el hijo de
  - e hijo de
  lexicon: HALOT
  rationale: El hebreo introduce una serie genealógica con ו + בֶן. En español, «Y el hijo de» conserva la continuidad enumerativa y la relación de descendencia sin añadir explicación innecesaria.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: HALOT
  rationale: Nombre propio estándar en español para שְׁלֹמֹה.
- source_word: רְחַבְעָם
  english_pob_choice: Rehoboam
  chosen_spanish: Roboam
  alternatives_spanish:
  - Rehoboam
  lexicon: HALOT
  rationale: Se adopta la forma habitual en español bíblico para רְחַבְעָם. Aunque el inglés POB usa 'Rehoboam', en español «Roboam» es la forma tradicional y clara para el lector.
- source_word: אֲבִיָּה
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abijah
  - Abijam
  lexicon: HALOT
  rationale: El hebreo aquí presenta אֲבִיָּה. En español, la forma bíblica consagrada es «Abías». Se mantiene la referencia del nombre tal como aparece en Crónicas, sin importar la variante que pueda aparecer en Reyes.
- source_word: בְנ/וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  - su descendiente
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera masculina singular expresa filiación inmediata en la genealogía. «Su hijo» es la equivalencia natural en español y preserva el ritmo repetitivo del listado.
- source_word: אָסָא
  english_pob_choice: Asa
  chosen_spanish: Asa
  alternatives_spanish:
  - Asá
  lexicon: HALOT
  rationale: Nombre propio estándar en español para אָסָא. La forma sin tilde es la más extendida en biblias y referencias bíblicas españolas.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  - Jehoshafat
  lexicon: HALOT
  rationale: La forma habitual en español para יְהוֹשָׁפָט es «Josafat». Se evita la grafía inglesa transliterada porque no es la forma idiomática del español bíblico.
translation_notes:
  revision_awareness: La versión inglesa POB fue revisada y quedó sin cambios; el presente borrador español sigue la misma secuencia genealógica breve, conservando la alternancia nombre + su hijo y reflejando la nota de variante nominal únicamente para אֲבִיָּה.
  spanish_consistency_notes:
  - Se mantiene el patrón genealógico conciso del hebreo, sin introducir verbos adicionales.
  - Se prefieren las formas españolas bíblicas asentadas para los nombres propios, evitando transliteraciones inglesas.
  - La nota al pie conserva la tensión documental entre la forma de Crónicas y la variante de Reyes sin mezclar ambas en el texto principal.
