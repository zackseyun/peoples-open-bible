lexical_decisions:
- source_word: לְיֵשׁוּעַ
  english_pob_choice: to Jeshua
  chosen_spanish: a Jesúa
  alternatives_spanish:
  - para Jesúa
  lexicon: HALOT
  rationale: El לְ marca asignación dentro de la secuencia de turnos/lotes sacerdotales. En español, «a» comunica naturalmente la adjudicación o correspondencia del lote. Se mantiene el nombre propio transliterado en forma cercana al hebreo, siguiendo el patrón de la POB.
- source_word: הַתְּשִׁיעִי
  english_pob_choice: the ninth
  chosen_spanish: el noveno
  alternatives_spanish:
  - noveno
  lexicon: HALOT
  rationale: El ordinal con artículo funciona de modo sustantivo y señala el noveno puesto en la secuencia. «El noveno» conserva la estructura enumerativa del hebreo y su carácter de lista.
- source_word: לִשְׁכַנְיָהוּ
  english_pob_choice: to Shecaniah
  chosen_spanish: a Shecanías
  alternatives_spanish:
  - para Shecanías
  lexicon: HALOT
  rationale: De nuevo, el לְ expresa asignación en el orden establecido por sorteo. Se translitera el nombre propio con una forma española habitual y legible.
- source_word: הָעֲשִׂירִי
  english_pob_choice: the tenth
  chosen_spanish: el décimo
  alternatives_spanish:
  - décimo
  lexicon: HALOT
  rationale: El ordinal con artículo indica el décimo lugar o turno. «El décimo» preserva la concisión del hebreo y el paralelismo con «el noveno».
translation_notes:
  revision_awareness: El paquete de origen y el audit trail en inglés muestran alta concordancia y ninguna revisión aplicada; no hay variantes textuales ni notas previas que deban reflejarse en el español.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis breve y paralela para reflejar el estilo de lista del verso.
  - Se prefirió «a» para לְ en vez de «para», porque aquí se trata de adjudicación en un orden, no de finalidad.
  - Los nombres propios se transliteran sin domesticar su forma a equivalentes bíblicos tradicionales, para conservar la trazabilidad con el hebreo.
