translation:
  text: 'For it is written thus: “And it came to pass after some days that Cain brought from the fruits of the earth a sacrifice to God[a], and Abel also brought from the firstborn of the sheep and from their fat portions. And God looked upon Abel and upon his gifts, but to Cain and to his sacrifices he paid no attention. And Cain was greatly grieved, and his face fell. And God said to Cain, ‘Why have you become deeply grieved, and why has your face fallen? If you offer rightly, but do not divide rightly, have you not sinned? Be still; his turning is toward you, and you shall rule over him.’ And Cain said to Abel his brother, ‘Let us go out into the field.’ And it came to pass, while they were in the field, Cain rose up against Abel his brother and killed him.” You see, brothers, jealousy and envy brought about brother-murder. Because of jealousy our father Jacob fled from the face of Esau his brother. Jealousy caused Joseph to be persecuted even to death and to come even into slavery. Jealousy compelled Moses to flee from the face of Pharaoh king of Egypt, when he heard from his fellow tribesman, ‘Who appointed you judge or magistrate over us? Do you want to kill me, as you killed the Egyptian yesterday?’ Because of jealousy Aaron and Miriam lodged outside the camp. Jealousy brought Dathan and Abiram down alive into Hades because they rebelled against Moses, the attendant of God. Because of jealousy David incurred envy not only from the foreigners[b][c][d][e][e][f], but was also persecuted by Saul king of Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording of the Genesis citation is difficult in Greek and likely reflects the Septuagint form of Genesis 4:7. 'Do not divide rightly' may also be understood as 'do not apportion rightly' or 'do not distinguish rightly.'
    reason: lexical_alternative
    anchor_ref: '4:4'
  - marker: f
    text: The pair 'jealousy and envy' renders two related but distinct Greek terms, ζῆλος and φθόνος.
    reason: lexical_alternative
    anchor_ref: '4:7'
  - marker: e
    text: '''Hades'' is the Greek term for the realm of the dead.'
    reason: cultural_note
    anchor_ref: '4:12'
  - marker: e
    text: See Numbers 16 for the rebellion of Dathan and Abiram against Moses.
    reason: cross_reference
    anchor_ref: '4:12'
  - marker: d
    text: Or 'but upon Cain and upon his sacrifices he did not pay attention.'.
    reason: previous_rendering
  - marker: c
    text: Or 'Let us go through into the field.'.
    reason: previous_rendering
  - marker: b
    text: Or 'Who appointed you ruler or judge over us?'.
    reason: previous_rendering
lexical_decisions:
- source_word: θυσίαν
  chosen: offering
  alternatives:
  - sacrifice
  lexicon: LSJ
  rationale: In the Genesis citation, θυσία can mean sacrifice, but 'offering' better fits the broader act of presentation from produce while remaining faithful to the cultic sense.
- source_word: πρωτοτόκων
  chosen: firstborn
  alternatives:
  - firstlings
  lexicon: LSJ
  rationale: '''Firstborn'' is clear modern English and preserves the sacrificial priority of Abel''s gift.'
- source_word: στεάτων
  chosen: fat portions
  alternatives:
  - fat things
  - fat
  lexicon: LSJ
  rationale: This reflects the sacrificial portions specifically, with natural English phrasing.
- source_word: δώροις
  chosen: gifts
  alternatives:
  - offerings
  lexicon: LSJ
  rationale: The text varies terms between Abel's gifts and Cain's sacrifices; preserving the distinction maintains the rhetorical texture of the citation.
- source_word: οὐ προσέσχεν
  chosen: did not pay attention
  alternatives:
  - did not regard
  - did not look upon
  lexicon: LSJ
  rationale: The verb means to turn one's attention toward or regard. 'Did not pay attention' is idiomatic and preserves the sense of divine non-regard without overinterpreting.
- source_word: ἐλυπήθη ... λίαν
  chosen: was greatly grieved
  alternatives:
  - was very distressed
  - was exceedingly upset
  lexicon: LSJ
  rationale: Keeps the emotional weight of λύπη and the intensifier λίαν in elevated but readable English.
- source_word: συνέπεσεν τῷ προσώπῳ
  chosen: his face fell
  alternatives:
  - his countenance fell
  lexicon: LSJ
  rationale: This is the natural English equivalent of the idiom and preserves the scriptural cadence.
- source_word: ὀρθῶς προσενέγκῃς
  chosen: offer rightly
  alternatives:
  - bring rightly
  - present rightly
  lexicon: LSJ
  rationale: Retains the moral and cultic force of ὀρθῶς with a concise English rendering.
- source_word: μὴ διέλῃς
  chosen: do not divide rightly
  alternatives:
  - do not apportion rightly
  - do not distinguish rightly
  lexicon: LSJ
  rationale: The clause is difficult and echoes the LXX wording. 'Divide rightly' preserves the formal ambiguity rather than resolving it interpretively.
- source_word: ἡσύχασον
  chosen: Be still
  alternatives:
  - Be quiet
  - Be calm
  lexicon: LSJ
  rationale: A brief imperative that preserves the terse force of the Greek.
- source_word: ἀποστροφὴ
  chosen: turning
  alternatives:
  - turning back
  - inclination
  - desire
  lexicon: LSJ
  rationale: The phrase is notoriously difficult; 'turning' is a restrained rendering that keeps the relational orientation without importing later interpretive tradition.
- source_word: ἄρξεις
  chosen: you shall rule
  alternatives:
  - you will master
  - you shall govern
  lexicon: LSJ
  rationale: '''Rule'' is the standard and sufficiently broad rendering for the future of ἄρχω here.'
- source_word: ζῆλος
  chosen: jealousy
  alternatives:
  - zeal
  - envy
  lexicon: BDAG
  rationale: In this chapter the vice sense is dominant, as shown by the examples and by pairing with φθόνος. 'Jealousy' best carries the destructive interpersonal force.
- source_word: φθόνος
  chosen: envy
  alternatives:
  - jealousy
  lexicon: BDAG
  rationale: Rendering φθόνος as 'envy' alongside ζῆλος as 'jealousy' preserves the rhetorical pairing without collapsing the two terms into one English word.
- source_word: ἀδελφοκτονίαν
  chosen: brother-murder
  alternatives:
  - fratricide
  - the murder of a brother
  lexicon: LSJ
  rationale: '''Brother-murder'' is transparent and forceful, preserving the compound''s stark moral weight without resorting to a Latinate term.'
- source_word: ἀπὸ προσώπου
  chosen: from the face of
  alternatives:
  - from before
  - from
  lexicon: LSJ
  rationale: This Hebraic expression is preserved in several places to maintain scriptural cadence and intertextual texture.
- source_word: ὁμοφύλου
  chosen: fellow tribesman
  alternatives:
  - kinsman
  - one of his own people
  lexicon: LSJ
  rationale: The word denotes one of the same stock or people. 'Fellow tribesman' preserves the ethnic-kinship nuance in a biblical register.
- source_word: ηὐλίσθησαν
  chosen: lodged
  alternatives:
  - encamped
  - dwelt
  lexicon: LSJ
  rationale: The passive here refers to their being made to stay outside the camp; 'lodged' is concise and natural.
- source_word: ᾅδου
  chosen: Hades
  alternatives:
  - the grave
  - the underworld
  lexicon: BDAG
  rationale: The Greek names the realm of the dead. 'Hades' preserves the term directly and avoids flattening it into a less precise equivalent.
- source_word: θεράποντα
  chosen: attendant
  alternatives:
  - servant
  - minister
  lexicon: LSJ
  rationale: θεράπων is more dignified and specific than ordinary servant language; 'attendant' preserves the honorific nuance in relation to God.
- source_word: ἀλλοφύλων
  chosen: foreigners
  alternatives:
  - Philistines
  - those of another race
  lexicon: LSJ
  rationale: The Greek is broader than a proper ethnic name here; 'foreigners' preserves the generic sense of outsiders.
theological_decisions:
- issue: Difficult Genesis 4 citation in v. 4 ('οὐκ ἐὰν ὀρθῶς προσενέγκῃς, ὀρθῶς δὲ μὴ διέλῃς, ἥμαρτες;')
  chosen_reading: Rendered formally as 'If you offer rightly, but do not divide rightly, have you not sinned?'
  alternative_readings:
  - If you offered correctly but did not distribute correctly, did you not sin?
  - If you brought it rightly but did not distinguish rightly, you sinned.
  rationale: The Greek is textually and interpretively difficult, reflecting the LXX form of Genesis 4:7. A more formal rendering preserves the ambiguity for audit rather than resolving it into a paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Vice terminology ζῆλος and φθόνος
  chosen_reading: Rendered as 'jealousy and envy'
  alternative_readings:
  - envy and jealousy
  - zeal and envy
  rationale: In context both terms are negative, and the chapter's paraenetic force depends on naming destructive rivalry. Distinguishing the two in English preserves the rhetorical accumulation.
  doctrine_reference: Consistency of key terms, or documented exception.
- issue: ᾅδης in v. 12
  chosen_reading: Rendered as 'Hades'
  alternative_readings:
  - the grave
  - the underworld
  rationale: The Greek term refers to the realm of the dead, not merely burial. Transliteration preserves the conceptual world of the text without overexplaining in the main line.
  doctrine_reference: Original-language primacy over translation tradition.
