translation:
  language: es
  text: Hallará herida y deshonra[a], y su oprobio no será borrado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'herida y deshonra', o más concretamente como daño corporal y vergüenza pública.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''su oprobio no será borrado'' / ''su deshonra no será borrada''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶגַע
  english_pob_choice: injury
  chosen_spanish: herida
  alternatives_spanish:
  - injuria
  - daño
  - golpe
  - aflicción
  lexicon: HALOT
  rationale: נֶגַע puede referirse a un golpe, herida o aflicción. En este contexto sapiencial, 'herida' conserva la imagen concreta de daño físico y funciona bien junto con la consecuencia social expresada por 'deshonra'.
- source_word: קָלוֹן
  english_pob_choice: disgrace
  chosen_spanish: deshonra
  alternatives_spanish:
  - vergüenza
  - desgracia
  - oprobio
  - ignominia
  lexicon: HALOT
  rationale: קָלוֹן expresa deshonor público. 'Deshonra' comunica de forma natural en español la pérdida de honor social y moral, manteniendo la fuerza pública del término.
- source_word: יִמְצָא
  english_pob_choice: will find
  chosen_spanish: Hallará
  alternatives_spanish:
  - encontrará
  - le sobrevendrá
  - vendrá sobre él
  lexicon: HALOT
  rationale: מצא literalmente significa 'hallar/encontrar'. 'Hallará' preserva la imagen verbal hebrea y en español puede funcionar como resultado inevitable que le alcanza.
- source_word: חֶרְפָּתוֹ
  english_pob_choice: his reproach
  chosen_spanish: su oprobio
  alternatives_spanish:
  - su reproche
  - su afrenta
  - su vergüenza
  lexicon: HALOT
  rationale: חֶרְפָּה denota reproche, afrenta u oprobio persistente ante otros. 'Oprobio' mantiene el matiz de reproche público y duradero, más cercano al campo semántico del término hebreo que 'vergüenza'.
- source_word: לֹא תִמָּחֶה
  english_pob_choice: will not be wiped away
  chosen_spanish: no será borrado
  alternatives_spanish:
  - no será borrado de él
  - no será eliminado
  - no se borrará
  lexicon: HALOT
  rationale: La voz nifal de מחה expresa ser borrado, borrado por lavado o eliminado. 'No será borrado' conserva la imagen de una marca que permanece y suena natural en español.
translation_notes:
  revision_awareness: La versión española sigue de cerca el hebreo y el audit trail inglés, manteniendo la estructura binaria de consecuencias y el cierre con permanencia de la deshonra. No se incorporaron revisiones posteriores porque el estado más reciente indica que no hubo cambios.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo hebreo con dos consecuencias principales: daño físico y deshonra pública.'
  - Se eligió 'oprobio' para חֶרְפָּה en la línea principal para conservar la idea de reproche público duradero, mientras la nota ofrece 'deshonra' como alternativa más transparente.
  - Se preserva el valor idiomático de 'hallará' para יִמְצָא en vez de explicitar un verbo dinámico que debilitaría el eco del hebreo.
