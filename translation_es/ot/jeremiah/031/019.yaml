translation:
  language: es
  text: Porque después de volver[a], me arrepentí; y después de ser instruido, me golpeé el muslo[b]. Me avergoncé, y también quedé humillado, porque llevé el oprobio de mi juventud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de regresar, sentí pesar»; el hebreo distingue «volver» (שׁוּב) de «arrepentirse/sentir pesar» (נחם).
    reason: lexical_alternative
  - marker: b
    text: «Me golpeé el muslo» es un gesto hebreo de duelo, conmoción o remordimiento.
    reason: cultural_note
  - marker: c
    text: O «la vergüenza de mi juventud».
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבִי
  english_pob_choice: I turned back
  chosen_spanish: después de volver
  alternatives_spanish:
  - después de regresar
  - después de dar la vuelta
  - después de volverme
  lexicon: HALOT
  rationale: שׁוּב expresa la idea concreta de volver/retornar, distinta del arrepentimiento de נִחַמְתִּי. En español, «volver» conserva esa imagen de retorno y mantiene la distinción verbal que el hebreo presenta.
- source_word: נִחַמְתִּי
  english_pob_choice: I repented
  chosen_spanish: me arrepentí
  alternatives_spanish:
  - me lamenté
  - sentí arrepentimiento
  lexicon: HALOT
  rationale: En este contexto penitencial, נִחַם comunica contrición moral. «Me arrepentí» es la forma más natural y fiel en español para expresar ese cambio interior sin debilitarlo a mero pesar.
- source_word: הִוָּדְעִי
  english_pob_choice: I was instructed
  chosen_spanish: después de ser instruido
  alternatives_spanish:
  - después de que me enseñaran
  - después de llegar a saber
  - después de haber sido advertido
  lexicon: HALOT
  rationale: El pasivo de ידע aquí apunta a recibir comprensión o instrucción correctiva. «Ser instruido» reproduce bien la pasividad y el matiz de aprendizaje recibido, en paralelo con el inglés auditado.
- source_word: סָפַקְתִּי עַל יָרֵךְ
  english_pob_choice: I struck my thigh
  chosen_spanish: me golpeé el muslo
  alternatives_spanish:
  - me di palmadas en el muslo
  - me pegué en el muslo
  - me azoté el muslo
  lexicon: HALOT
  rationale: La expresión es un gesto corporal de duelo, conmoción o remordimiento. «Golpeé el muslo» conserva el acto físico sin introducir una interpretación más fuerte de la que exige el hebreo. Se añadió una nota para explicar el gesto cultural.
- source_word: בֹּשְׁתִּי
  english_pob_choice: I was ashamed
  chosen_spanish: me avergoncé
  alternatives_spanish:
  - sentí vergüenza
  - estuve avergonzado
  lexicon: HALOT
  rationale: בּוֹשׁ expresa vergüenza. «Me avergoncé» es idiomático y claro en español, y conserva la respuesta emocional directa del hablante.
- source_word: נִכְלַמְתִּי
  english_pob_choice: humiliated
  chosen_spanish: quedé humillado
  alternatives_spanish:
  - fui humillado
  - quedé avergonzado
  lexicon: HALOT
  rationale: 'Se mantiene la distinción respecto de בֹּשְׁתִּי: aquí el español da un matiz de mortificación pública o vergüenza intensificada con «quedé humillado». Así no se aplana el par de verbos del hebreo.'
- source_word: נָשָׂאתִי
  english_pob_choice: I bore
  chosen_spanish: cargué
  alternatives_spanish:
  - llevé
  - soporté
  - he cargado
  lexicon: HALOT
  rationale: נָשָׂא puede expresar llevar o cargar un peso. En español, «cargué» comunica bien la idea de asumir o soportar una carga de reproche, sin perder la concreción de la imagen.
- source_word: חֶרְפַּת נְעוּרָי
  english_pob_choice: the disgrace of my youth
  chosen_spanish: la vergüenza de mi juventud
  alternatives_spanish:
  - el oprobio de mi juventud
  - la deshonra de mi juventud
  - el reproche de mi juventud
  lexicon: HALOT
  rationale: חֶרְפָּה tiene un campo de deshonra/reproche/disgracia. Aquí «vergüenza» funciona bien en español junto con la serie de emociones del versículo, y «de mi juventud» preserva la referencia retrospectiva a pecados tempranos.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: El primer כִּי introduce la explicación del lamento; «Porque» expresa esa conexión causal o explicativa. El segundo כִּי se refleja naturalmente con «porque» en la última cláusula.
theological_decisions:
- issue: 'Secuencia de conversión: volver y luego arrepentirse'
  english_pob_reading: The verse is rendered as a personal confession of repentance following restoration and instruction, with שׁוּב and נחם kept distinct as related but separate movements.
  chosen_spanish_reading: El verso presenta primero un volver atrás y después un arrepentimiento, manteniendo dos pasos relacionados pero distintos.
  alternative_spanish_readings:
  - Pude traducirse todo como «me arrepentí» en ambas cláusulas
  - o como «después de volver, sentí dolor»
  rationale: 'El hebreo distingue dos verbos, y la versión española conserva esa tensión en vez de fusionarlos. Esto protege la progresión experiencial del texto: retorno, instrucción, lamento y vergüenza.'
  doctrine_reference: Translation philosophy §3, §5
- issue: Gesto corporal de duelo
  english_pob_reading: '''I struck my thigh'' is a Hebrew gesture of grief, shock, or remorse.'
  chosen_spanish_reading: «Me golpeé el muslo» conserva el gesto corporal y se entiende como señal de duelo o remordimiento.
  alternative_spanish_readings:
  - «me di palmadas en el muslo»
  - «me pegué en el muslo»
  rationale: El texto no describe violencia literal sino una acción convencional de lamento. La traducción mantiene la imagen y la complementa con nota explicativa para el lector hispanohablante.
  doctrine_reference: Translation philosophy §5
- issue: Matiz de חֶרְפָּה
  english_pob_reading: Or 'the reproach of my youth.'
  chosen_spanish_reading: «La vergüenza de mi juventud» conserva el valor deshonroso del término sin ocultar la carga moral del recuerdo.
  alternative_spanish_readings:
  - «el reproche de mi juventud»
  - «el oprobio de mi juventud»
  rationale: En español, «vergüenza» enlaza bien con los verbos previos de vergüenza y humillación; aun así, el término admite el matiz alternativo de reproche/oprobio, que se preserva en nota.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura auditada del POB en inglés y conserva la distinción léxica entre שׁוּב y נחם, así como el doblete de vergüenza/humillación. No se registraron revisiones posteriores en el paquete fuente, y el cotejo externo indica alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo porque no aparece el nombre divino explícitamente en el hebreo.
  - Se preserva la primera persona confesional y el orden retórico del verso.
  - Se distingue entre vergüenza interna («me avergoncé») y humillación social/intensificada («quedé humillado»).
  - La nota al pie del primer verbo evita fusionar el retorno físico/metafórico con el arrepentimiento moral.
  - Se usa puntuación española y un tono bíblico moderno, sin arcaísmos innecesarios.
