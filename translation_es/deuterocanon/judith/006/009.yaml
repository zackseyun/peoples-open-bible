translation:
  language: es
  text: Y si esperas en tu corazón que no serán tomados[a], no caiga tu rostro[b]. He hablado, y ninguna de mis palabras fallará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán capturados». El pasivo griego puede llevar aquí con naturalidad un sentido militar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no caiga tu rostro», un modismo para desanimarse o quedar abatido.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπερ
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si en verdad
  - Y si es que
  lexicon: LSJ
  rationale: La partícula introduce una condición con cierto matiz enfático; «Y si» conserva la conexión discursiva y suena natural en español sin exagerar el énfasis.
- source_word: ἐλπίζεις
  english_pob_choice: you hope
  chosen_spanish: esperas
  alternatives_spanish:
  - esperas con confianza
  - tienes la esperanza
  lexicon: BDAG
  rationale: El presente expresa una expectativa actual y continua. «Esperas» es directo y mantiene el sentido afectivo de la esperanza sin volverlo demasiado interpretativo.
- source_word: τῇ καρδίᾳ σου
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - con tu corazón
  - dentro de ti
  lexicon: LSJ
  rationale: Es un modismo interior que en español se expresa naturalmente con «en tu corazón»; conserva la antropología del texto y su valor idiomático.
- source_word: οὐ λημφθήσονται
  english_pob_choice: they will not be taken
  chosen_spanish: no serán tomados
  alternatives_spanish:
  - no serán capturados
  - no serán apresados
  lexicon: BDAG
  rationale: «Tomados» preserva la pasiva y deja abierta la fuerza contextual del verbo, como en el inglés POB. «Capturados» sería una alternativa contextual válida, especialmente en lenguaje militar.
- source_word: μὴ συμπεσέτω σου τὸ πρόσωπον
  english_pob_choice: do not let your face fall
  chosen_spanish: no deje caer tu rostro
  alternatives_spanish:
  - no estés abatido
  - no se abata tu semblante
  lexicon: LSJ
  rationale: La imagen corporal se conserva con una construcción natural en español. «No deje caer tu rostro» mantiene la metáfora del griego y sugiere desánimo visible, como en el audit trail inglés.
- source_word: ἐλάλησα
  english_pob_choice: I have spoken
  chosen_spanish: He hablado
  alternatives_spanish:
  - Hablé
  lexicon: BDAG
  rationale: El aoristo solemne se vierte como perfecto para reflejar el tono autoritativo y la vigencia del enunciado, siguiendo la lógica del POB inglés.
- source_word: οὐδὲν διαπεσεῖται
  english_pob_choice: none ... will fail
  chosen_spanish: ninguna de mis palabras fallará
  alternatives_spanish:
  - nada de lo dicho por mí fallará
  - ninguna ... quedará sin cumplirse
  lexicon: LSJ
  rationale: El verbo comunica que las palabras no caerán en vacío ni dejarán de cumplirse. «Fallará» transmite con claridad el efecto de cumplimiento en español, con sujeto explícito tomado del contexto («mis palabras»).
- source_word: τῶν ῥημάτων μου
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis declaraciones
  lexicon: BDAG
  rationale: «Palabras» es la equivalencia más directa y natural para ῥήματα en este contexto de proclamación solemne.
theological_decisions:
- issue: Conservar la idiomática corporal del desánimo
  english_pob_reading: do not let your face fall
  chosen_spanish_reading: no deje caer tu rostro
  alternative_spanish_readings:
  - no estés abatido
  - no se abata tu semblante
  rationale: El griego usa una imagen física, no un término abstracto para tristeza. La versión española conserva la metáfora para no perder la textura retórica del pasaje, aunque sea posible una paráfrasis más explicativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Fuerza de certeza en la declaración final
  english_pob_reading: none of my words will fail
  chosen_spanish_reading: ninguna de mis palabras fallará
  alternative_spanish_readings:
  - nada de lo dicho por mí fallará
  - mis palabras no fallarán
  rationale: La declaración funciona como garantía solemne. «Fallará» comunica que no quedará incumplida ni sin efecto, manteniendo la afirmación de fiabilidad total del hablante.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés, que prefirió un presente simple para ἐλπίζεις («hope») en lugar de una perífrasis progresiva. En español se reflejó con «esperas», por ser el presente más natural y fiel al valor aspectual, manteniendo el resto del tono solemne y la estructura del enunciado.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera del versículo porque no aparece léxico divino explícito en el texto griego.
  - 'Se conserva el paralelismo de dos afirmaciones: exhortación negativa y garantía final.'
  - «Rostro» se usa de manera literal para preservar el modismo; «semblante» queda como alternativa interpretativa.
  - La puntuación separa claramente la condición, la exhortación y la aseveración final, como en el griego y el POB inglés.
