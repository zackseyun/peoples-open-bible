translation:
  language: es
  text: 'La transgresión habla al malvado dentro de mi corazón: no hay temor de Dios delante de sus ojos[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «dentro de mi corazón». Algunas versiones antiguas y traducciones modernas suavizan esto a «dentro de su corazón» o lo parafrasean como «tengo en mi corazón un mensaje acerca del malvado».'
    reason: alternative_reading
  - marker: b
    text: 'O: «Dentro de mi corazón, la transgresión habla al malvado».'
    reason: previous_rendering
lexical_decisions:
- source_word: נְאֻם
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - declara
  - proclama
  - oráculo
  lexicon: HALOT
  rationale: El sustantivo introduce una palabra solemne o pronunciamiento. En español, «habla» comunica de manera natural esa voz interior o declaración que se expresa, sin forzar un calco como «oráculo» donde el contexto no lo exige.
- source_word: פֶּשַׁע
  english_pob_choice: Transgression
  chosen_spanish: la rebelión
  alternatives_spanish:
  - la transgresión
  - la maldad
  - el delito
  lexicon: HALOT
  rationale: El término hebreo puede denotar rebelión o quebrantamiento voluntario. «Rebelión» conserva bien el peso moral y la idea de desafío al orden de Dios; «transgresión» también es posible, pero en español puede sonar más técnico y menos inmediato.
- source_word: לָרָשָׁע
  english_pob_choice: to the wicked
  chosen_spanish: al malvado
  alternatives_spanish:
  - al impío
  - al perverso
  - al malvado hombre
  lexicon: HALOT
  rationale: El destinatario es el singular representativo «el malvado». «Malvado» es claro y natural en español, y mantiene el carácter moral del adjetivo sin introducir un matiz eclesiástico más marcado como «impío».
- source_word: בקרב לבי
  english_pob_choice: within my heart
  chosen_spanish: dentro de mi corazón
  alternatives_spanish:
  - en medio de mi corazón
  - dentro de mi interior
  - dentro de mi mente
  lexicon: HALOT
  rationale: Se retiene la lectura masorética de primera persona singular («mi corazón»). «Dentro de mi corazón» expresa con naturalidad la locución hebrea y deja visible la dificultad interpretativa sin emendar el texto.
- source_word: אֵין פַּחַד אֱלֹהִים
  english_pob_choice: there is no fear of God
  chosen_spanish: no hay temor de Dios
  alternatives_spanish:
  - no hay miedo de Dios
  - no hay reverencia por Dios
  lexicon: HALOT
  rationale: «Temor de Dios» es la equivalencia estable para el hebreo פַּחַד en este dicho. «Temor» conserva la reverencia y seriedad del término sin reducirlo a pánico o simple emoción.
- source_word: לְנֶגֶד עֵינָיו
  english_pob_choice: before his eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - ante sus ojos
  - frente a sus ojos
  - a la vista de sus ojos
  lexicon: HALOT
  rationale: La expresión idiomática se traduce de forma natural con «delante de sus ojos», que preserva la imagen de algo puesto ante la mirada o consideración de la persona.
theological_decisions:
- issue: 'Lectura difícil de בקרב לבי: ''mi corazón'' frente a posibles suavizaciones'
  english_pob_reading: 'Retain the MT sense: the psalmist reports an inner discernment—''within my heart''—while the wicked person remains the subject of the second clause (''his eyes'').'
  chosen_spanish_reading: 'Se conserva el sentido del texto masorético: el salmista registra una percepción interior —«dentro de mi corazón»— mientras que el malvado sigue siendo el referente de la segunda cláusula («sus ojos»).'
  alternative_spanish_readings:
  - «dentro de su corazón»
  - «tengo en mi corazón un mensaje acerca del malvado»
  - emendar la frase para eliminar la tensión
  rationale: La lectura hebrea recibida tiene la forma de primera persona singular y crea una tensión real. La traducción la mantiene en vez de resolverla por armonización, porque la prioridad es dejar auditable la dificultad del texto fuente.
  doctrine_reference: Principios de traducción POB §§1, 3
- issue: 'Relación entre la primera y la segunda cláusula: el sujeto del ''temor de Dios'''
  english_pob_reading: The psalmist reports an inner oracle concerning the wicked; the second clause describes that wicked person's lack of reverence.
  chosen_spanish_reading: La primera cláusula se entiende como una percepción interior del salmista acerca del malvado, y la segunda como la descripción de su falta de temor de Dios.
  alternative_spanish_readings:
  - Tomar ambas cláusulas como si hablaran directamente del malvado sin mediación
  - Leer 'mi corazón' como si fuera 'su corazón'
  rationale: La puntuación y el orden español buscan reflejar la ambigüedad controlada del hebreo sin borrar la primera persona del texto masorético. Esto preserva la tensión literaria y evita una resolución interpretativa no sustentada por el fuente.
  doctrine_reference: Principios de traducción POB §§1, 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que reordenó la frase inicial en inglés para acercarla al hebreo sin perder claridad. En español, se mantuvo el inicio con la localización «Dentro de mi corazón» para reflejar mejor la relación sintáctica del texto fuente y conservar la lectura difícil de בקרב לבי.
  spanish_consistency_notes:
  - Se preservó «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se eligió «rebelión» para פֶּשַׁע y no «pecado», para mantener la fuerza de ruptura voluntaria.
  - Se conservó la primera persona singular «mi corazón», porque el hebreo masorético la contiene y la POB inglesa la documenta como lectura difícil.
  - Se usó «temor de Dios» como fórmula bíblica reconocible y fiel al hebreo.
  - La puntuación con dos puntos reproduce la relación explicativa entre la primera y la segunda cláusula.
