review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura tripartita del griego y conserva los contrastes clave: oración/ayuno/limosna/δικαιοσύνη, poco vs. mucho, y limosna vs. acumular oro. Sin embargo, hay dos desajustes con el rastro POB y con la naturalidad del español: (1) las notas [a] y [b] están ancladas en «ayuno» y «injusticia», pero en realidad documentan alternativas para δικαιοσύνη/ἀδικία; deben ir ancladas donde aparecen esos términos. (2) «hacer limosna» reproduce literalmente ποιῆσαι ἐλεημοσύνην, pero en español resulta innecesariamente forzado; «dar limosna» preserva el sentido con mejor legibilidad, y el matiz literal puede documentarse en nota si fuera necesario, aunque aquí no es imprescindible porque el inglés ya lo registró como alternativa, no como obligación formal para español.'
  spanish_quality_summary: El español es claro y mayormente natural, con buen registro bíblico moderno. «La oración con ayuno, limosna y justicia es buena» funciona bien. «Un poco con justicia es mejor que mucho con injusticia» también es idiomático. El principal problema de calidad es «hacer limosna», que suena poco idiomático en español general eclesial; «dar limosna» es mucho más natural sin apartarse del sentido. También conviene corregir la colocación de las notas para que no creen confusión.
  glossary_alignment: No aparecen términos del glosario mayor como Yahvé, Mesías, Espíritu, etc. La decisión de usar «justicia / injusticia» para δικαιοσύνη / ἀδικία es defendible en Tobit y está respaldada por la alternativa documentada en el audit trail inglés, aunque la nota debe expresarlo correctamente. «Limosna» para ἐλεημοσύνη y «oro» para χρυσίον están bien alineados. El cambio a «dar limosna» mejora la idiomaticidad española sin violar la evidencia fuente.
  issues:
