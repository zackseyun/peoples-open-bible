review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro POB en la estructura retórica, la idea de infidelidad en מָעַל מַעַל, la ira que viene sobre toda la congregación, y la cláusula final que preserva la advertencia sobre las consecuencias corporativas. Sin embargo, hay un ajuste léxico importante en בַּחֵרֶם: «lo dedicado al anatema» suena menos natural y menos preciso que una formulación explícita del concepto de חֵרֶם como aquello dedicado a destrucción. También conviene normalizar la grafía de los nombres al uso bíblico español más reconocible.'
  spanish_quality_summary: La redacción es en general clara y digna, pero «en lo dedicado al anatema» resulta algo forzada en español e introduce una combinación poco idiomática. «Zérah» y «Acan» también son menos naturales para lectores bíblicos hispanohablantes que «Zéraj» y «Acán». El resto del verso fluye bien y mantiene el tono solemne sin calco excesivo.
  glossary_alignment: 'No hay conflicto con los términos de proyecto como Yahvé, Mesías, etc., que no aparecen aquí. La principal cuestión terminológica es חֵרֶם: el POB inglés hace explícito «what was devoted to destruction» y deja la alternativa «the devoted things» en nota. En español conviene reflejar esa decisión principal en el texto y reservar «anatema» o «lo puesto bajo prohibición» para la nota.'
  issues:
  - severity: medium
    issue: Renderización de חֵרֶם como «lo dedicado al anatema»
    rationale: 'Aunque intenta conservar un término técnico, la frase es poco natural y no expresa con suficiente claridad el sentido principal documentado por el POB: algo «dedicado a destrucción» o «puesto bajo prohibición para destrucción».'
  - severity: medium
    issue: Grafía de nombres «Acan» y «Zérah»
    rationale: Para una Biblia en español, «Acán» es la forma asentada y más legible. «Zérah» con h final es ajeno al uso español bíblico común; «Zéraj» representa mejor la adaptación tradicional del nombre hebreo.
  - severity: low
    issue: Nota a usa «anatema» como eje de la explicación
    rationale: Dado que el texto principal debería expresar la decisión semántica principal, la nota debe presentar «anatema» como alternativa técnica/tradicional, no como el centro de la elección.
  revised_spanish_text: ¿No fue Acán hijo de Zéraj quien actuó infielmente en lo dedicado a destrucción[a], y vino la ira sobre toda la congregación de Israel? Y aquel hombre no pereció solo en su iniquidad[b].
  revised_footnotes:
