translation:
  language: es
  text: Porque la razón no domina sobre las propias pasiones[a], sino sobre las cosas opuestas a la justicia y al valor y al dominio propio y a la prudencia; y sobre estas, no para destruirlas, sino para no cederles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud» en lugar de «justicia» para δικαιοσύνη.
    reason: lexical_alternative
lexical_decisions:
- source_word: λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - el juicio racional
  - la mente
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός designa la facultad de deliberación racional. «La razón» conserva bien el argumento filosófico y suena natural en español, sin volverlo demasiado técnico.
- source_word: κρατεῖ
  english_pob_choice: does not rule over
  chosen_spanish: no domina sobre
  alternatives_spanish:
  - no gobierna sobre
  - no tiene dominio sobre
  - no prevalece sobre
  lexicon: LSJ
  rationale: κρατέω expresa ejercer dominio o poder sobre algo. «No domina sobre» mantiene la metáfora de gobierno con un español claro y digno.
- source_word: παθῶν
  english_pob_choice: passions
  chosen_spanish: las propias pasiones
  alternatives_spanish:
  - los propios afectos
  - los propios impulsos
  - las propias emociones
  lexicon: LSJ
  rationale: Aquí πάθη tiene sentido ético-filosófico, no de «sufrimientos». «Pasiones» es la equivalencia más directa; «propias» refleja el matiz de ἑαυτοῦ / one's own.
- source_word: τῶν τῆς δικαιοσύνης καὶ ἀνδρείας καὶ σωφροσύνης καὶ φρονήσεως ἐναντίων
  english_pob_choice: those things opposed to justice and courage and self-control and prudence
  chosen_spanish: las cosas opuestas a la justicia y al valor y al dominio propio y a la prudencia
  alternatives_spanish:
  - las cosas contrarias a la justicia y al coraje y a la templanza y a la sabiduría práctica
  - los opuestos de la justicia y del valor y del autodominio y de la prudencia
  lexicon: LSJ
  rationale: La frase apunta a lo contrario de las cuatro virtudes cardinales. «Opuestas a» reproduce bien ἐναντίων y evita una paráfrasis excesiva.
- source_word: δικαιοσύνης
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: LSJ
  rationale: En esta lista de virtudes helenísticas, «justicia» encaja mejor que «rectitud» y respeta el marco ético del pasaje.
- source_word: ἀνδρείας
  english_pob_choice: courage
  chosen_spanish: valor
  alternatives_spanish:
  - courage
  - bravura
  - fortaleza
  lexicon: LSJ
  rationale: ἀνδρεία es la virtud del valor/coraje/fortaleza. «Valor» es natural en español y conserva el registro de virtud.
- source_word: σωφροσύνης
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autodominio
  - autocontrol
  - templanza
  lexicon: LSJ
  rationale: σωφροσύνη implica moderación disciplinada y dominio de sí. «Dominio propio» es claro, moderno y suficientemente fiel al sentido moral.
- source_word: φρονήσεως
  english_pob_choice: prudence
  chosen_spanish: prudencia
  alternatives_spanish:
  - sabiduría práctica
  - entendimiento
  - sensatez
  lexicon: LSJ
  rationale: φρόνησις alude a sabiduría práctica o juicio prudente. «Prudencia» mantiene el tono de virtud y el paralelismo de la lista.
- source_word: καταλῦσαι
  english_pob_choice: to destroy them
  chosen_spanish: destruirlas
  alternatives_spanish:
  - abolirlas
  - hacerlas desaparecer
  - derribarlas
  lexicon: LSJ
  rationale: El infinitivo indica anular o deshacer lo opuesto, no simplemente ignorarlo. «Destruirlas» preserva la fuerza del contraste con la cláusula siguiente.
- source_word: μὴ εἴξαι
  english_pob_choice: not to yield to them
  chosen_spanish: no cederles
  alternatives_spanish:
  - no rendirse a ellas
  - no darles paso
  - no someterse a ellas
  lexicon: LSJ
  rationale: εἴκω significa ceder o dar lugar. «No cederles» es conciso y mantiene el sentido de no conceder terreno a esas cosas.
theological_decisions:
- issue: δικαιοσύνη en una lista de virtudes filosóficas
  english_pob_reading: justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: El contexto no es paulino ni covenantal sino una enumeración de virtudes cardinales helenísticas. Por eso «justicia» comunica mejor el valor filosófico del término; se evita desplazarlo a «rectitud», aunque esa opción sigue siendo semánticamente posible.
  doctrine_reference: 'DOCTRINE.md: términos disputados para δικαιοσύνη; variar según contexto cuando la lista es filosófica o ética'
translation_notes:
  revision_awareness: El borrador sigue la lectura revisada del inglés POB, manteniendo «one's own passions» como «las propias pasiones» y la estructura breve «things opposed to...», sin convertirla en una explicación más larga de lo que el griego exige.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «justicia» para δικαιοσύνη por el marco de virtudes cardinales; la alternativa «rectitud» queda documentada en nota.
  - «Dominio propio» se usa para σωφροσύνη porque en español transmite mejor la idea de autodominio ético que «templanza» en registro actual.
