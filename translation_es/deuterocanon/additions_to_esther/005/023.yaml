translation:
  language: es
  text: para que tanto ahora como después de estas cosas haya liberación para nosotros y para los persas que nos favorecen[a], pero para los que maquinan contra nosotros[b], un memorial de destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'salvación' para 'liberación'; σωτηρία puede tener ambos sentidos, pero aquí probablemente se refiere a preservación concreta del peligro.
    reason: lexical_alternative
  - marker: b
    text: O 'un recuerdo de destrucción' o 'un recordatorio de su destrucción'. La expresión griega es compacta y puede denotar un memorial duradero de la caída de los que maquinan contra nosotros.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: LSJ
  rationale: Introduce la relación de propósito/resultado de manera natural en español y conserva la orientación hacia lo que sigue.
- source_word: σωτηρία
  english_pob_choice: deliverance
  chosen_spanish: liberación
  alternatives_spanish:
  - salvación
  - rescate
  lexicon: LSJ
  rationale: En este contexto cortesano y político, el término apunta a preservación concreta del peligro. 'Liberación' comunica bien esa idea sin cargar el texto con una lectura exclusivamente doctrinal.
- source_word: εὐνοοῦσιν
  english_pob_choice: who are well-disposed toward us
  chosen_spanish: que nos son bien dispuestos
  alternatives_spanish:
  - que nos favorecen
  - nuestros aliados
  - nuestros amigos entre los persas
  lexicon: LSJ
  rationale: La expresión conserva la noción de benevolencia o disposición favorable. La formulación española mantiene la formalidad del matiz griego.
- source_word: Πέρσαις
  english_pob_choice: the Persians
  chosen_spanish: los persas
  alternatives_spanish:
  - persas
  lexicon: LSJ
  rationale: El dativo coordinado con ἡμῖν se refleja de forma idiomática como un grupo personal identificado en español con artículo.
- source_word: ἐπιβουλεύουσιν
  english_pob_choice: plotting against us
  chosen_spanish: maquinan contra nosotros
  alternatives_spanish:
  - conspiran contra nosotros
  - traman contra nosotros
  - planean contra nosotros
  lexicon: LSJ
  rationale: El verbo expresa hostilidad e intriga. 'Maquinar contra' conserva el sentido de conspiración maliciosa con buena naturalidad en español.
- source_word: μνημόσυνον
  english_pob_choice: a memorial
  chosen_spanish: un memorial
  alternatives_spanish:
  - un recuerdo
  - un monumento conmemorativo
  - un recordatorio
  lexicon: LSJ
  rationale: '''Memorial'' conserva la fuerza formal y solemne del sustantivo, y encaja con la expresión compacta del griego.'
- source_word: ἀπωλείας
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: LSJ
  rationale: La palabra alude a una caída catastrófica. 'Destrucción' es la opción directa y transparente en español.
- source_word: μετὰ ταῦτα
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de esto
  - más tarde
  - en adelante
  lexicon: LSJ
  rationale: Mantiene el paralelismo temporal con 'ahora' y refleja con fidelidad la secuencia del texto griego.
theological_decisions:
- issue: Alcance de σωτηρία en un relato de corte deuterocanónico
  english_pob_reading: deliverance
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - salvación
  - rescate
  rationale: El contexto inmediato trata de preservación frente al peligro, no de una formulación doctrinal abstracta. 'Liberación' conserva ese sentido concreto sin borrar la posible amplitud del término griego.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
- issue: Fuerza de μνημόσυνον τῆς ἀπωλείας
  english_pob_reading: a memorial of destruction
  chosen_spanish_reading: un memorial de destrucción
  alternative_spanish_readings:
  - un recuerdo de destrucción
  - un recordatorio de su destrucción
  rationale: La frase griega es breve y solemne. 'Memorial de destrucción' preserva la densidad formal y la ambigüedad suficiente para no explicar de más.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, §6'
translation_notes:
  revision_awareness: 'Sin cambios necesarios respecto al último repaso: el borrador español conserva el sentido del griego con las mismas decisiones léxicas y la misma lectura contextual de la cláusula de propósito/resultados y de la expresión memorial.'
  spanish_consistency_notes:
  - Se usa 'liberación' para σωτηρία en coherencia con el contexto político-cortesano y con la decisión inglesa de 'deliverance'.
  - Se mantiene 'memorial' para μνημόσυνον, evitando 'recuerdo' como texto principal para no suavizar la solemnidad del original.
  - '''Maquinan contra nosotros'' preserva la hostilidad activa de ἐπιβουλεύουσιν sin introducir un tono más moderno o menos específico.'
  - Se conserva una sintaxis natural en español con 'para que' y 'después de estas cosas' para respetar la estructura temporal del griego.
