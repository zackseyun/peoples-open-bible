review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue correctamente el hebreo como texto principal, conserva bien el paralelismo proverbial y mantiene la nota sobre la fuerte divergencia del griego en el segundo colon. «El pie del necio se apresura a una casa» refleja fielmente רֶגֶל נָבָל מִהֲרָה אֶל בָּיִת. En la segunda línea, «se inclina ante los grandes» transmite adecuadamente יַכְנִיעַ לָרַבִּים según la decisión inglesa. El único problema relevante es «hombre de esquemas», que en español suena poco idiomático y demasiado calcado; no comunica con claridad el sentido de designios o maquinaciones.
  spanish_quality_summary: El español es en general claro y digno, pero «un hombre de esquemas» resulta poco natural en registro bíblico y puede entenderse como alguien que hace diagramas o estructuras conceptuales. Una pequeña reparación a «un hombre de maquinaciones» mejora notablemente la legibilidad y preserva el matiz calculador del hebreo. El resto del verso y la nota al pie son buenos.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Necio», «pie», «se apresura», «se inclina» y «los grandes» están bien alineados con las decisiones fuente. La principal cuestión léxica es reemplazar el calco «esquemas» por una opción española más natural y semánticamente precisa para מְזִימוֹת.
  issues:
  - severity: medium
    issue: «un hombre de esquemas» suena antinatural y semánticamente débil en español bíblico
    rationale: Aunque intenta reflejar literalmente «of schemes», en español «esquemas» no evoca bien planes calculados o designios; puede sonar técnico o moderno. «Maquinaciones» conserva mejor el campo semántico de מְזִימוֹת y la ambivalencia moral indicada en el expediente inglés.
  revised_spanish_text: El pie del necio se apresura a una casa[a], pero un hombre de maquinaciones se inclina ante los grandes.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «pero un hombre muy experimentado se avergonzará ante un rostro/presencia». El hebreo y el griego difieren notablemente en el segundo hemistiquio.'
    reason: alternative_reading
  revision_rationale: 'Se hace una sola corrección léxica menor: «de esquemas» pasa a «de maquinaciones» para lograr un español más natural y fiel al sentido de מְזִימוֹת como designios o planes calculados. Se conserva el resto del texto y la nota, que ya reflejan bien la evidencia hebrea y la divergencia griega.'
