translation:
  language: es
  text: 'Al sonido[a] de la trompeta, dice: «¡Ajá![b]»; desde lejos huele la batalla, el trueno[c] de los comandantes y el grito de guerra[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al toque de la trompeta»; el hebreo marca la ocasión en que la trompeta suena.
    reason: alternative_reading
  - marker: b
    text: «¡Ajá!» es una interjección de entusiasmo o excitación que expresa la disposición del caballo para la batalla.
    reason: cultural_note
  - marker: c
    text: O «el estruendo de los comandantes y el clamor»; רַעַם es literalmente «trueno», usado aquí de modo metafórico para el ruido militar, y תְרוּעָה puede indicar un grito de batalla o una señal sonora.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּדֵי
  english_pob_choice: At the blast of
  chosen_spanish: Al sonido
  alternatives_spanish:
  - Al toque de
  - Al blast de
  lexicon: HALOT
  rationale: El hebreo es un modismo que marca la ocasión del sonar de la trompeta. «Al sonido» expresa bien el momento sin forzar un calco poco natural en español. Se deja la nota para la alternativa «al sonido»/«al toque» según el matiz de ocasión o señal.
- source_word: שֹׁפָר
  english_pob_choice: trumpet
  chosen_spanish: trompeta
  alternatives_spanish:
  - cuerno
  - cuerno de carnero
  lexicon: HALOT
  rationale: En este contexto poético-militar, la trompeta funciona como instrumento de señal. «Trompeta» es idiomática y clara; «cuerno de carnero» sería más literal pero menos natural aquí.
- source_word: יֹאמַר
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - clama
  - dice para sí
  lexicon: HALOT
  rationale: El verbo común «decir» conserva la personificación del caballo sin añadir interpretación. El presente narrativo en español mantiene viveza poética.
- source_word: הֶאָח
  english_pob_choice: Aha!
  chosen_spanish: ¡Ajá!
  alternatives_spanish:
  - ¡Ja!
  - ¡Ah!
  lexicon: HALOT
  rationale: Es una interjección de entusiasmo o excitación. «¡Ajá!» reproduce bien el impulso de gozo/alerta del caballo ante la batalla sin sonar excesivamente coloquial.
- source_word: וּמֵרָחוֹק
  english_pob_choice: From far away
  chosen_spanish: desde lejos
  alternatives_spanish:
  - desde lejos mismo
  - desde muy lejos
  lexicon: HALOT
  rationale: La frase indica distancia. «Desde lejos» es natural y conserva el contraste espacial del verso.
- source_word: יָרִיחַ
  english_pob_choice: he smells
  chosen_spanish: percibe
  alternatives_spanish:
  - huele
  - siente el olor de
  lexicon: HALOT
  rationale: Aunque literalmente es «oler», en español «percibe» evita una construcción extraña y sigue la imagen concreta de captar la batalla a distancia por el olor/indicio. La elección intenta conservar la vividez sin volverla torpe.
- source_word: מִלְחָמָה
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  lexicon: HALOT
  rationale: «Batalla» se ajusta al escenario inmediato y al singular poético. «Guerra» sería más general; «combate» más técnico.
- source_word: רַעַם
  english_pob_choice: the thunder of
  chosen_spanish: el trueno
  alternatives_spanish:
  - el estruendo
  - el rugido
  lexicon: HALOT
  rationale: El término es literalmente «trueno», y el POB inglés conserva la metáfora. En español se mantiene «trueno» para no diluir la imagen sonora y atmosférica aplicada a los líderes.
- source_word: שָׂרִים
  english_pob_choice: commanders
  chosen_spanish: los comandantes
  alternatives_spanish:
  - los jefes
  - los capitanes
  - los príncipes
  lexicon: HALOT
  rationale: En el contexto militar, שָׂרִים son líderes de tropas. «Comandantes» comunica mejor esa función que «príncipes», que en español sugeriría un rango real ajeno al contexto.
- source_word: וּתְרוּעָה
  english_pob_choice: and the war cry
  chosen_spanish: y el grito de guerra
  alternatives_spanish:
  - y el clamor
  - y la aclamación
  lexicon: HALOT
  rationale: El sustantivo puede significar grito, clamor o señal sonora. Aquí, junto con «el trueno de los comandantes», «grito de guerra» expresa bien el sentido militar sin perder la tensión semántica del término.
theological_decisions:
- issue: Metáfora animal de percepción y respuesta bélica
  english_pob_reading: The warhorse is personified as reacting eagerly to the trumpet and battle noise.
  chosen_spanish_reading: El caballo de guerra es personificado como si reconociera y respondiera con entusiasmo al sonido de la trompeta y al ruido de la batalla.
  alternative_spanish_readings:
  - El caballo simplemente oye la trompeta
  - El texto habla de un caballo literal sin personificación
  rationale: 'No hay tensión doctrinal directa, pero sí una decisión interpretativa: conservar la personificación poética sin atenuarla. El español debe dejar ver que se trata de una imagen literaria fuerte, no de una descripción prosaica.'
  doctrine_reference: Poética bíblica y antropomorfismo/animalización literaria
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con acuerdo alto y sin revisiones aplicadas; la redacción española mantiene la misma lectura óptima-equivalente, conservando la metáfora bélica y la personificación del caballo.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino en conformidad con las normas del proyecto, aunque este versículo no lo contiene.
  - Se mantuvo «trompeta» como instrumento de señal para coherencia con el contexto militar-poético.
  - Se evitó «príncipes» para שָׂרִים porque en español sonaría monárquico y no militar.
