review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del hebreo: la vid e higuera del hablante quedan reducidas a desolación/resto, luego despojadas y finalmente con sus ramas blanqueadas. Sin embargo, dos elecciones debilitan la fidelidad: «la ha echado» no expresa con suficiente claridad el valor de וְהִשְׁלִיךְ (‘arrojar/echar fuera’), y «sus sarmientos» inclina innecesariamente la referencia hacia la vid cuando el sujeto inmediato de שָׂרִיגֶיהָ es más naturalmente la higuera en esta cláusula. La nota b también falla con «tentáculos», que no corresponde al campo semántico botánico del hebreo.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «la ha echado» suena incompleto o poco natural en registro bíblico contemporáneo; «la ha arrojado» o «la ha echado fuera» sería mejor. «Sarmientos» es preciso para la vid, pero aquí puede confundir al lector porque la cláusula final probablemente describe las ramas de la higuera devastada. «Brotes/tentáculos» en la nota es impropio; «brotes/zarcillos» o «brotes/ramas tiernas» sería legible y fiel.
  glossary_alignment: No hay conflictos con terminología teológica de proyecto. Las decisiones léxicas principales («mi vid», «desolación», «mi higuera», «tocón») están bien encaminadas. La revisión propuesta ajusta únicamente matices léxicos y de legibilidad botánica.
  issues:
  - severity: medium
    issue: «la ha echado» es insuficiente para וְהִשְׁלִיךְ
    rationale: El hebreo expresa arrojar/castar con más fuerza y direccionalidad. En español, «echar» sin complemento suena truncado; «la ha arrojado» preserva mejor la violencia del acto.
  - severity: medium
    issue: «sus sarmientos» puede desviar el referente de שָׂרִיגֶיהָ
    rationale: Aunque שָׂרִיג puede significar sarmientos/brotes, el contexto inmediato en la cláusula final apunta más naturalmente a la higuera. «Sus ramas» mantiene fidelidad y claridad, mientras la nota puede preservar «brotes» o «zarcillos» como alternativas.
  - severity: low
    issue: La nota b usa «tentáculos», término inadecuado
    rationale: «Tentáculos» no pertenece al léxico botánico apropiado para שָׂרִיג. Conviene reemplazarlo por «zarcillos» o un equivalente vegetal claro.
