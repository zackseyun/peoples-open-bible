    rationale: La nota [a] explica una alternativa para δικαιοσύνη, pero está colocada en «ayuno»; la [b] explica la pareja ἀδικία/δικαιοσύνη, pero su anclaje en «injusticia» no corresponde del todo al primer término afectado. Los marcadores deben aparecer junto a «justicia» y «injusticia» según su contenido.
  - severity: medium
    issue: «Hacer limosna» es poco natural en español.
    rationale: Aunque refleja de cerca ποιῆσαι ἐλεημοσύνην, el español bíblico y general prefiere «dar limosna». El proyecto pide evitar calcos de madera cuando el español se vuelve antinatural.
  revised_spanish_text: La oración con ayuno, limosna y justicia[a] es buena; un poco con justicia es mejor que mucho con injusticia[b]. Es bueno dar limosna antes que atesorar oro.
  revised_footnotes:
