translation:
  language: es
  text: Y Nabucodonosor, rey de los asirios, envió a todos los que habitaban en Persia y a todos los que habitaban hacia el occidente[a] —a los que habitaban en Cilicia y Damasco, el Líbano y el Antilíbano, y a todos los que habitaban a lo largo de la costa—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia las regiones occidentales». El griego dice literalmente «a todos los que habitaban hacia el occidente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: «Envió» expresa con naturalidad la acción de mandar un mensaje o emisarios y conserva la sencillez del verbo griego sin añadir contenido no explícito.
- source_word: ἐπὶ πάντας τοὺς κατοικοῦντας
  english_pob_choice: to all who lived
  chosen_spanish: a todos los que habitaban
  alternatives_spanish:
  - a todos los que vivían
  - a todos los habitantes
  lexicon: BDAG
  rationale: La construcción se conserva con una relativa verbal que refleja el participio griego. «Habitaban» mantiene el valor descriptivo de κατοικοῦντας sin volverlo demasiado abstracto.
- source_word: τὴν Περσίδα
  english_pob_choice: Persia
  chosen_spanish: Persia
  alternatives_spanish:
  - la región de Persia
  - Perside
  lexicon: LSJ
  rationale: El topónimo designa la región de Persia; «Persia» es la forma geográfica clara y natural en español.
- source_word: πρὸς δυσμαῖς
  english_pob_choice: toward the west
  chosen_spanish: hacia el occidente
  alternatives_spanish:
  - hacia el oeste
  - al occidente
  lexicon: LSJ
  rationale: El giro es direccional, no un nombre regional fijo. «Hacia el occidente» conserva el matiz de orientación y suena digno en español bíblico.
- source_word: κατοικοῦντας τὴν Κιλικίαν
  english_pob_choice: those living in Cilicia
  chosen_spanish: los que habitaban en Cilicia
  alternatives_spanish:
  - los habitantes de Cilicia
  - los que vivían en Cilicia
  lexicon: BDAG
  rationale: Se mantiene la repetición del participio con una construcción equivalente en español, evitando convertirlo prematuramente en un sustantivo.
- source_word: Δαμασκόν
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damasco
  lexicon: LSJ
  rationale: Topónimo estándar en español.
- source_word: τὸν Λίβανον καὶ Ἀντιλίβανον
  english_pob_choice: Lebanon and Anti-Lebanon
  chosen_spanish: el Líbano y el Antilíbano
  alternatives_spanish:
  - el Líbano y Anti-Líbano
  - el Líbano y el Antilíbano
  lexicon: LSJ
  rationale: Se conservan los nombres geográficos convencionales en español y el paralelismo de dos cadenas montañosas distintas.
- source_word: κατὰ πρόσωπον παραλίας
  english_pob_choice: along the seacoast
  chosen_spanish: frente a la costa
  alternatives_spanish:
  - a lo largo de la costa
  - junto a la costa
  - en la costa
  lexicon: LSJ
  rationale: La expresión griega es idiomática y literalmente alude a la zona que está «frente» al litoral. «Frente a la costa» preserva esa imagen; el POB inglés optó por una equivalencia más interpretativa, pero en español conviene retener la tensión espacial del original.
theological_decisions:
- issue: Título de Nabucodonosor como «rey de los asirios»
  english_pob_reading: Nebuchadnezzar king of the Assyrians
  chosen_spanish_reading: Nabucodonosor, rey de los asirios
  alternative_spanish_readings:
  - Nabucodonosor, rey de Asiria
  - Nabucodonosor, rey de los asirios
  rationale: Se conserva el título tal como lo presenta el texto fuente, aunque históricamente resulte tensionante, porque el deber aquí es reflejar la forma del documento y no armonizarla.
  doctrine_reference: Fidelidad textual y respeto por la lectura canónica del deuterocanon
- issue: Valor direccional de πρὸς δυσμαῖς
  english_pob_reading: toward the west
  chosen_spanish_reading: hacia el occidente
  alternative_spanish_readings:
  - al occidente
  - hacia el oeste
  - en el occidente
  rationale: No se convierte en un nombre fijo de región. La orientación geográfica se mantiene como dirección, porque eso es lo que el griego expresa.
  doctrine_reference: Precisión semántica del texto bíblico
- issue: Expresión idiomática de κατὰ πρόσωπον παραλίας
  english_pob_reading: along the seacoast
  chosen_spanish_reading: frente a la costa
  alternative_spanish_readings:
  - a lo largo de la costa
  - junto a la costa
  - frente al litoral
  rationale: Se preserva la imagen espacial de estar «frente» a la costa, sin perder inteligibilidad en español. La equivalencia inglesa es más explicativa; la española puede retener mejor la metáfora geográfica.
  doctrine_reference: Transparencia semántica y conservación de imágenes del original
translation_notes:
  revision_awareness: El contexto inglés no requirió revisiones de contenido; se mantuvo la lectura estable. La única diferencia relevante para el español es la preferencia por una equivalencia más transparente en la expresión final de κατὰ πρόσωπον παραλίας, sin borrar el valor idiomático del original.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - Se mantuvo «asirios» como gentilicio del título transmitido por el griego, sin corregir la historicidad del pasaje.
  - Se prefirió «habitar» para reproducir la repetición del participio κατοικοῦντας de forma uniforme.
  - Los topónimos se dieron en formas españolas estándar y reconocibles para lectura eclesial.
  - La nota [a] marca la alternativa lexical principal sin duplicar el sentido del texto base.
