  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: «Hoy», segunda persona plural, salida presente/inminente, y la referencia calendárica al mes de Abib. También mantiene correctamente «Abib» con nota cultural. Sin embargo, «van saliendo» introduce un matiz aspectual algo coloquial y progresivo-distributivo que no refleja tan bien como otras opciones la fuerza simple e inmediata de יֹצְאִים en este contexto solemne.'
  spanish_quality_summary: El español es comprensible, pero «Hoy ustedes van saliendo» suena menos natural y menos digno en registro bíblico que «Hoy ustedes salen» o «Hoy están saliendo». Además, el anclaje de la nota está colocado en «saliendo[a]», aunque la nota explica «Abib»; debe anclarse en «Abib[a]».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Abib» está bien preservado. La elección de «ustedes» encaja con el objetivo de español latinoamericano neutral. La mejora principal es estilística y de correspondencia de nota, no terminológica.
  issues:
  - severity: medium
    issue: «van saliendo» no es la mejor representación española de יֹצְאִים
    rationale: Aunque intenta reflejar aspecto en curso, en español suena coloquial y añade un matiz de progresión gradual. «salen» expresa con más naturalidad y dignidad la salida presente/inminente en un anuncio solemne.
  - severity: medium
    issue: La nota [a] está anclada a la palabra equivocada
    rationale: La nota explica el significado cultural de «Abib», no el verbo «saliendo». Según las reglas del proyecto, el marcador debe aparecer en la palabra o frase relevante del texto.
  revised_spanish_text: Hoy ustedes salen, en el mes de Abib[a].
