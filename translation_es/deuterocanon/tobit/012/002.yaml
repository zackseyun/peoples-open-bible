translation:
  language: es
  text: 'Y dijo[a]: «Padre[b], no sufro pérdida al darle la mitad de lo que he traído de vuelta».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «no soy perjudicado / no salgo dañado». Se ha traducido de manera natural por la idea de no sufrir pérdida en este intercambio.'
    reason: lexical_alternative
  - marker: b
    text: El paralelo semítico apoya el sentido de «traído de vuelta», no solo «traído», porque el contexto es el regreso con los bienes recuperados.
    reason: cross_reference
lexical_decisions:
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - mi padre
  lexicon: LSJ
  rationale: Es un vocativo directo; en español «Padre» conserva la inmediatez del griego y suena natural en el discurso filial.
- source_word: οὐ βλάπτομαι
  english_pob_choice: I lose nothing
  chosen_spanish: no sufro pérdida
  alternatives_spanish:
  - no salgo perjudicado
  - no me hago ningún daño
  - no pierdo nada
  lexicon: LSJ
  rationale: El verbo expresa quedar perjudicado o sufrir detrimento en este contexto económico; «no sufro pérdida» comunica bien la idea sin volverla demasiado coloquial.
- source_word: δοὺς
  english_pob_choice: by giving
  chosen_spanish: al darle
  alternatives_spanish:
  - dándole
  - por darle
  - habiéndole dado
  lexicon: LSJ
  rationale: 'El participio aoristo circunstancial se vierte de forma natural en español con una construcción causal/circunstancial: «al darle».'
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: LSJ
  rationale: En español, el dativo indirecto se expresa con clítico; el antecedente implícito es Rafael/Azarías.
- source_word: τὸ ἥμυσυ
  english_pob_choice: half
  chosen_spanish: la mitad
  alternatives_spanish:
  - la media parte
  - el medio
  lexicon: LSJ
  rationale: El sustantivo neutro «half» se expresa idiomáticamente como «la mitad», que es preciso y claro en español.
- source_word: ὧν ἐνήνοχα
  english_pob_choice: of what I have brought back
  chosen_spanish: de lo que he traído de vuelta
  alternatives_spanish:
  - de lo que he traído
  - de las cosas que he traído de vuelta
  lexicon: LSJ
  rationale: El perfecto indica una acción completada con relevancia presente. «Traído de vuelta» sigue el contexto de regreso y refleja el sentido de retorno que el audit trail destaca.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene alineado con el pasaje griego de Swete y con el paralelo semítico señalado en el expediente auditable.
  spanish_consistency_notes:
  - Se mantiene «Padre» como vocativo directo, no como posesivo.
  - Se evita «Señor» porque no corresponde a este verso.
  - «La mitad» conserva la cuantificación exacta del griego.
  - La formulación española busca ser publicable y fiel al tono narrativo breve del original.
