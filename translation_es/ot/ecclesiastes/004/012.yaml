translation:
  language: es
  text: Y si alguien domina a uno, dos se pondrán contra él; y una cuerda[a] triple no se rompe pronto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una cuerda de tres hebras». El hebreo describe una cuerda hecha triple, compuesta de tres partes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Pero si
  lexicon: HALOT
  rationale: El hebreo conserva la continuidad condicional con una conjunción inicial; en español, «Y si» mantiene ese enlace sin forzar un contraste inexistente.
- source_word: יִתְקְפוֹ
  english_pob_choice: someone overpowers one
  chosen_spanish: uno prevalece contra uno
  alternatives_spanish:
  - uno sobrepuja a uno
  - alguien prevalece contra uno
  - uno domina a uno
  lexicon: HALOT
  rationale: El verbo comunica imponerse o prevalecer con fuerza sobre otro. En español, «uno prevalece contra uno» conserva el valor relacional y proverbial sin añadir el matiz de ataque que el hebreo no exige.
- source_word: הָאֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - el uno
  - una persona
  lexicon: HALOT
  rationale: La forma singular retoma al individuo aislado del contexto. «Uno» es breve, proverbial y fiel a la economía del hebreo.
- source_word: הַשְּׁנַיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - los dos
  - dos personas
  lexicon: HALOT
  rationale: El dual contrasta directamente con «uno» y se expresa con naturalidad en español como «dos».
- source_word: יַעַמְד֣וּ נֶגְדּוֹ
  english_pob_choice: will stand against him
  chosen_spanish: se le opondrán
  alternatives_spanish:
  - permanecerán contra él
  - le resistirán
  - se pondrán frente a él
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «se pondrán delante/contra él». En español, «se le opondrán» mantiene la idea adversativa de oposición y suena más natural que un calco espacial.
- source_word: וְהַחוּט
  english_pob_choice: and a cord
  chosen_spanish: y la cuerda
  alternatives_spanish:
  - y un cordón
  - y el cordel
  - y la cuerda
  lexicon: HALOT
  rationale: חוט puede ser hilo, cordón o cuerda. Dado el marco proverbial de resistencia, «cuerda» comunica mejor la fuerza de la metáfora que «hilo» o «cordón».
- source_word: הַמְשֻׁלָּשׁ
  english_pob_choice: threefold
  chosen_spanish: de tres dobleces
  alternatives_spanish:
  - trenzada en tres
  - triplicada
  - de tres hebras
  lexicon: HALOT
  rationale: La forma describe algo hecho triple o compuesto de tres partes. «De tres dobleces» conserva la idea de una cuerda formada por varios pliegues sin imponer una imagen demasiado específica. No se privilegia una sola lectura alternativa, pero la redacción admite el sentido de «trenzada en tres».
- source_word: לֹא בִמְהֵרָה
  english_pob_choice: is not quickly
  chosen_spanish: no se rompe pronto
  alternatives_spanish:
  - no se rompe rápidamente
  - no se corta con facilidad
  - no se quiebra pronto
  lexicon: HALOT
  rationale: El hebreo usa una negación con un adverbio de rapidez; en castellano, «no se rompe pronto» transmite con naturalidad el sentido resultante de resistencia temporal, sin desplazarlo a «fácilmente» como interpretación secundaria.
- source_word: יִנָּתֵק
  english_pob_choice: broken
  chosen_spanish: se rompe
  alternatives_spanish:
  - se parte
  - se quiebra
  - se desgarra
  lexicon: HALOT
  rationale: El niphal de נתק apunta a ser arrancado o partido. Para una cuerda, «se rompe» es el equivalente más claro y publicable en español, y conserva la fuerza del enunciado proverbial.
translation_notes:
  revision_awareness: El texto hebreo fue cotejado con la traducción inglesa POB y su nota léxica; no se introdujeron cambios doctrinales ni variantes textuales, y se mantuvo la alternativa interpretativa sobre la imagen de la cuerda triple en una nota al pie.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Uno/dos» reproduce el contraste proverbial del hebreo sin añadir personas explícitas.
  - «Cuerda» se eligió por la fuerza de la metáfora; la nota preserva la alternativa «hebras» por si el lector prefiere una imagen más cercana al hebreo.
  - La construcción «se le opondrán» evita una traducción rígidamente literal y conserva el valor relacional de נֶגֶד.
  - «No se rompe pronto» intenta reflejar el adverbio hebreo de rapidez sin convertirlo en un adverbio de facilidad.
