translation:
  language: es
  text: 'Entonces José dijo a sus hermanos y a la familia de su padre[a]: «Subiré y le informaré a Faraón, y le diré: “Mis hermanos y la familia de mi padre, que estaban en la tierra de Canaán, han venido a mí”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la casa de su padre»; también después, «la casa de mi padre». Aquí la expresión hebrea se refiere a la unidad familiar o doméstica, no solo al edificio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; «Entonces» comunica bien la secuencia en español sin perder el flujo narrativo.
- source_word: אֶל אֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos varones
  - a sus hermanos/sus parientes
  lexicon: HALOT
  rationale: El contexto identifica a los hermanos de José; «hermanos» es preciso y natural en español.
- source_word: וְאֶל בֵּית אָבִיו
  english_pob_choice: and to his father’s household
  chosen_spanish: y a la casa de su padre
  alternatives_spanish:
  - y a la familia de su padre
  - y al hogar de su padre
  lexicon: HALOT
  rationale: בַּיִת en este constructo puede referirse a la unidad familiar. En español, «casa de su padre» conserva la imagen hebrea y deja abierta la fuerza de hogar/familia; la nota recoge la alternativa de sentido.
- source_word: אֶעֱלֶה
  english_pob_choice: I will go up
  chosen_spanish: Subiré
  alternatives_spanish:
  - Iré
  - Subiré allá
  lexicon: HALOT
  rationale: עלה normalmente significa «subir». Se mantiene el verbo de movimiento ascendente, que en español resulta claro y fiel.
- source_word: וְאַגִּידָה
  english_pob_choice: and report
  chosen_spanish: e informaré
  alternatives_spanish:
  - y le diré
  - y comunicaré
  lexicon: HALOT
  rationale: נגד en piel tiene el sentido de dar a conocer o informar. «Informaré» preserva el matiz de reporte formal ante Faraón.
- source_word: לְפַרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - ante Faraón
  - a el Faraón
  lexicon: HALOT
  rationale: Se conserva el nombre/título propio usual en español bíblico. «A Faraón» es idiomático.
- source_word: וְאֹמְרָה אֵלָיו
  english_pob_choice: and I will say to him
  chosen_spanish: y le diré
  alternatives_spanish:
  - y le hablaré
  - y le diré a él
  lexicon: HALOT
  rationale: La cohorte/forma de intención se expresa naturalmente con futuro en español. Se evita la redundancia de «a él».
- source_word: אַחַי
  english_pob_choice: My brothers
  chosen_spanish: Mis hermanos
  alternatives_spanish:
  - Mis hermanos varones
  - Mis hermanos
  lexicon: HALOT
  rationale: Coincide con el referente explícito del discurso de José; se mantiene la relación de posesión en la primera persona.
- source_word: וּבֵית אָבִי
  english_pob_choice: and my father’s household
  chosen_spanish: y la casa de mi padre
  alternatives_spanish:
  - y mi casa paterna
  - y la familia de mi padre
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea «casa de mi padre», que en español puede abarcar la unidad familiar. Esto mantiene la posible tensión entre casa física y clan/familia sin resolverla de más.
- source_word: אֲשֶׁר בְּאֶרֶץ כְּנַעַן
  english_pob_choice: who were in the land of Canaan
  chosen_spanish: que estaban en la tierra de Canaán
  alternatives_spanish:
  - que estaban en la tierra de Canaán
  - que se hallaban en la tierra de Canaán
  lexicon: HALOT
  rationale: El relativo carece de verbo finito explícito; en español se necesita uno. «Estaban» sigue la solución del POB inglés y expresa ubicación pasada de manera natural.
- source_word: בָּאוּ אֵלַי
  english_pob_choice: have come to me
  chosen_spanish: han venido a mí
  alternatives_spanish:
  - han llegado a mí
  - vinieron a mí
  lexicon: HALOT
  rationale: El perfecto hebreo comunica acción completada con relevancia presente; el presente perfecto español «han venido» reproduce bien ese valor.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y la solución auditada del POB inglés. Se conservó la secuencia narrativa, el verbo direccional «subiré», el valor de reporte formal ante Faraón, y la tensión semántica de בֵּית אָבִיו mediante «la casa de su padre» con nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Faraón» como forma española estándar del nombre/título.
  - Se conserva «tierra de Canaán» para הארץ/אֶרֶץ כְּנַעַן.
  - Se usa futuro simple para intención («Subiré», «informaré», «le diré») siguiendo el tono del discurso directo.
  - La nota [a] se ancla en «casa de su padre» para señalar la alternativa semántica sin alterar el texto principal.
