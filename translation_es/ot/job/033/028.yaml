translation:
  language: es
  text: Ha redimido mi alma de pasar a la fosa[b][a], y mi vida verá la luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha rescatado mi vida de bajar a la fosa».
    reason: lexical_alternative
  - marker: b
    text: «La fosa» es una imagen hebrea común de la muerte o la tumba.
    reason: cultural_note
lexical_decisions:
- source_word: פָּדָה
  english_pob_choice: has redeemed
  chosen_spanish: ha redimido
  alternatives_spanish:
  - ha rescatado
  - ha redimido mediante rescate
  - ha librado
  lexicon: HALOT
  rationale: פָּדָה expresa redimir o rescatar mediante liberación de peligro o esclavitud. «Ha redimido» conserva el valor concreto de rescate sin introducir de manera explícita una paga que el hebreo no menciona aquí.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí
  - mi ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o persona. Aquí se mantiene «mi alma» para conservar el paralelismo poético con «mi vida» en el segundo hemistiquio y reflejar la distinción que la POB inglesa preserva.
- source_word: מֵעֲבֹר
  english_pob_choice: from passing into
  chosen_spanish: de pasar por
  alternatives_spanish:
  - de entrar en
  - de cruzar hacia
  - de ir a parar a
  lexicon: HALOT
  rationale: La construcción expresa ser retenido para no atravesar o entrar en la esfera indicada. «De pasar por» comunica el movimiento sin volverlo demasiado literal o duro para el español, y permite el vínculo poético con el lugar de muerte.
- source_word: בַּשַּׁחַת
  english_pob_choice: the pit
  chosen_spanish: el sepulcro
  alternatives_spanish:
  - el pozo
  - la fosa
  - la tumba
  lexicon: HALOT
  rationale: שַׁחַת designa un hoyo o fosa y, por extensión, la región de la muerte o del sepulcro. En español, «el sepulcro» hace explícita la fuerza mortuoria del símbolo; «la fosa» o «el pozo» son posibles, pero menos naturales en este contexto para muchos lectores. Se conserva la imagen de muerte sin perder inteligibilidad.
- source_word: וְחַיָּתִי
  english_pob_choice: and my life
  chosen_spanish: y mi vida
  alternatives_spanish:
  - y mi ser viviente
  - y mi existencia
  - y yo
  lexicon: HALOT
  rationale: חַיָּה/חַיָּתִי alude a la vida o existencia viviente. «Mi vida» mantiene el paralelismo con «mi alma» y suena natural en español bíblico contemporáneo.
- source_word: בָּאוֹר
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  - la claridad
  lexicon: HALOT
  rationale: Con artículo definido, la expresión se vierte naturalmente como «la luz». Se conserva el contraste poético con el sepulcro y la posible alusión a la vida/restauración.
- source_word: תִּרְאֶה
  english_pob_choice: will look upon
  chosen_spanish: verá
  alternatives_spanish:
  - mirará
  - contemplará
  - verá con sus ojos
  lexicon: HALOT
  rationale: El imperfecto se traduce en futuro dentro del paralelismo poético. «Verá» es la opción más clara y fiel; «mirará» o «contemplará» añaden matices no requeridos por el hebreo.
theological_decisions:
- issue: Sujeto implícito del verbo de redención
  english_pob_reading: He has redeemed my soul
  chosen_spanish_reading: Ha redimido mi alma
  alternative_spanish_readings:
  - Él ha redimido mi alma
  - Dios ha redimido mi alma
  - Ha redimido mi alma
  rationale: El hebreo presenta un verbo perfecto de 3ª masculina singular sin sujeto explícito. En español conviene no forzar un sujeto donde el texto no lo expresa. La forma impersonal verbal mantiene la apertura del original y deja que el contexto identifique al agente divino.
  doctrine_reference: Gramática hebrea del sujeto implícito; contexto inmediato de la intervención salvadora de Dios en Job 33.
- issue: Imagen de la muerte en שַׁחַת
  english_pob_reading: the pit is a common Hebrew image for death or the grave
  chosen_spanish_reading: el sepulcro como imagen de muerte o tumba
  alternative_spanish_readings:
  - el pozo como imagen de muerte
  - la fosa como imagen de la tumba
  rationale: La POB inglesa conserva la metáfora del 'pit' y anota su valor cultural. En español, «sepulcro» comunica de forma más transparente la esfera de la muerte para lectores actuales, aunque también suaviza el dibujo de un hoyo. Se mantiene la referencia a la muerte en la nota para no perder la tensión imagen/realidad.
  doctrine_reference: Imagen poética hebrea de la muerte; paralelismo con vida/luz frente a sepulcro.
translation_notes:
  revision_awareness: 'El texto inglés POB más reciente se mantiene sin cambios en su sentido general: rescate/redención, contraste entre la fosa/pit y la luz, y el valor poético de los dos hemistiquios. La decisión española ajusta «the pit» a «el sepulcro» para mayor claridad lectora, sin abandonar la nota que preserva la imagen hebrea.'
  spanish_consistency_notes:
  - Se mantuvo «redimido» para פָּדָה, en línea con el léxico POB de rescate/redención.
  - Se preservó la distinción poética entre «mi alma» y «mi vida».
  - Se evitó introducir «Cristo» o terminología doctrinal ajena al versículo.
  - Se tradujo el paralelismo final con «verá la luz», una forma natural y fiel al hebreo.
