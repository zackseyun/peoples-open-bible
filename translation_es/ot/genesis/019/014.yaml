translation:
  language: es
  text: 'Entonces Lot salió y habló a sus yernos[a], los que iban a tomar a sus hijas en matrimonio, y les dijo: «¡Levántense, salgan de este lugar[b], porque Yahvé está a punto de destruir la ciudad!». Pero a los ojos de sus yernos parecía como si estuviera bromeando.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus yernos, los que habían tomado a sus hijas en matrimonio»; la frase hebrea puede referirse tanto a hombres ya casados con las hijas de Lot como a quienes estaban por casarse con ellas.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «como uno que bromeaba a los ojos de sus yernos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲתָנָיו
  english_pob_choice: his sons-in-law
  chosen_spanish: sus yernos
  alternatives_spanish:
  - sus yernos / sus futuros yernos
  - sus parientes por matrimonio
  lexicon: HALOT
  rationale: חָתָן puede designar tanto al yerno como al novio/prometido. En este contexto, el complemento participial siguiente permite conservar la relación matrimonial con una expresión natural en español. «Yernos» es idiomático y mantiene la ambigüedad contextual que el hebreo deja abierta.
- source_word: לֹקְחֵי בְנֹתָיו
  english_pob_choice: who were to marry his daughters
  chosen_spanish: los que iban a tomar a sus hijas en matrimonio
  alternatives_spanish:
  - los que habían tomado a sus hijas en matrimonio
  - los que tomaban a sus hijas
  lexicon: HALOT
  rationale: El participio de לקח con «sus hijas» puede señalar a quienes las estaban tomando para matrimonio. El contexto narrativo favorece un valor inminente o prospectivo, no necesariamente un matrimonio ya consumado. «Iban a tomar... en matrimonio» conserva esa tensión sin forzar el cierre del sentido.
- source_word: קוּמוּ צְאוּ
  english_pob_choice: Get up, get out
  chosen_spanish: ¡Levántense, salgan!
  alternatives_spanish:
  - ¡Pónganse de pie, salgan!
  - ¡Levántense, váyanse!
  lexicon: HALOT
  rationale: Los dos imperativos son breves y urgentes. En español, «Levántense, salgan» conserva la doble orden y el tono apremiante sin volverse mecánico.
- source_word: מִן־הַמָּקוֹם הַזֶּה
  english_pob_choice: of this place
  chosen_spanish: de este lugar
  alternatives_spanish:
  - de este sitio
  - fuera de este lugar
  lexicon: HALOT
  rationale: Con צְאוּ, el español natural es «salgan de este lugar». «Lugar» mantiene la deíxis del hebreo y la referencia inmediata al sitio amenazado.
- source_word: מַשְׁחִית
  english_pob_choice: is about to destroy
  chosen_spanish: está a punto de destruir
  alternatives_spanish:
  - va a destruir
  - está destruyendo
  lexicon: HALOT
  rationale: El participio hifil expresa una acción inminente. «Está a punto de destruir» preserva ese valor de inminencia mejor que un futuro simple o un presente continuo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce como «Yahvé», conforme al criterio del proyecto, para preservar el nombre divino en lugar de sustituirlo por un título.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - esta ciudad
  lexicon: HALOT
  rationale: El sustantivo definido refiere a la ciudad ya identificada en el contexto narrativo. «La ciudad» es la forma directa y suficiente en español.
- source_word: כִּמְצַחֵק
  english_pob_choice: to be joking
  chosen_spanish: como uno que se burlaba
  alternatives_spanish:
  - como uno que bromeaba
  - como si estuviera bromeando
  - como un bromista
  lexicon: HALOT
  rationale: La expresión comunica apariencia de falta de seriedad. Aunque «bromear» sería posible, «burlarse» refleja mejor el efecto percibido por los yernos y mantiene la ambigüedad entre broma y menosprecio. Se conserva «como» para reproducir el hebreo כִּ־.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of his sons-in-law
  chosen_spanish: ante los ojos de sus yernos
  alternatives_spanish:
  - a los ojos de sus yernos
  - en la opinión de sus yernos
  lexicon: HALOT
  rationale: La locución hebrea es idiomática. «Ante los ojos de» conserva el giro figurado y la perspectiva de evaluación, sin perder claridad en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo emplea el Nombre divino explícitamente. En español, «Yahvé» preserva la forma reverente y auditable del nombre personal de Dios, coherente con la práctica terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: La frase participial sobre la acción de Lot hacia sus yernos
  english_pob_reading: his sons-in-law, who were to marry his daughters
  chosen_spanish_reading: sus yernos, los que iban a tomar a sus hijas en matrimonio
  alternative_spanish_readings:
  - sus yernos, los que habían tomado a sus hijas en matrimonio
  - sus futuros yernos
  rationale: El hebreo permite una lectura no cerrada sobre el estado matrimonial. La redacción española conserva esa tensión sin decidir indebidamente entre matrimonio ya consumado o inminente.
  doctrine_reference: N/A — decisión de alcance semántico y narrativo
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en lo esencial: el Nombre divino se mantiene como Yahvé; חֲתָנָיו + לֹקְחֵי בְנֹתָיו conserva la ambigüedad matrimonial; מַשְׁחִית se traduce con inminencia; y וַיְהִי כִמְצַחֵק בְּעֵינֵי se vierte con una expresión española que preserve la percepción de burla/juego. No se documentan revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton en lugar de «SEÑOR».
  - Se conserva una formulación natural y solemne, sin calcar el inglés de manera rígida.
  - La nota [a] preserva la ambigüedad hebrea sobre si los varones ya eran yernos o estaban por serlo.
  - La nota [b] explicita la construcción hebrea para sostener la lectura de apariencia de burla.
