lexical_decisions:
- source_word: נַפְתִּי
  english_pob_choice: I have perfumed
  chosen_spanish: He perfumado
  alternatives_spanish:
  - He aromatizado
  - He impregnado de aroma
  lexicon: HALOT
  rationale: El verbo apunta a aplicar fragancia o especias en un contexto de preparación aromática; en español, «he perfumado» comunica bien el efecto resultante y mantiene naturalidad sin perder la imagen.
- source_word: מִשְׁכָּבִי
  english_pob_choice: my bed
  chosen_spanish: mi cama
  alternatives_spanish:
  - mi lecho
  - mi diván
  lexicon: HALOT
  rationale: El término puede significar lecho o lugar para acostarse; en este contexto de seducción, «mi cama» es claro, idiomático y fiel al referente.
- source_word: מֹר
  english_pob_choice: myrrh
  chosen_spanish: mirra
  alternatives_spanish:
  - mirra aromática
  lexicon: HALOT
  rationale: «Mirra» es el equivalente habitual y preciso del aromático hebreo מור; es comprensible en español bíblico y moderno.
- source_word: אֲהָלִים
  english_pob_choice: aloes
  chosen_spanish: áloes
  alternatives_spanish:
  - aloewood
  - madera de áloe
  - agarwood
  lexicon: HALOT
  rationale: 'Se conserva el renderizado bíblico tradicional «áloes», pero su sentido se aclara en la nota: no se trata de la planta moderna de aloe vera, sino de una madera fragante usada en perfumes.'
- source_word: וְקִנָּמוֹן
  english_pob_choice: and cinnamon
  chosen_spanish: y canela
  alternatives_spanish:
  - y cinamomo
  lexicon: HALOT
  rationale: «Canela» es la traducción natural y exacta de קִנָּמוֹן; funciona bien en español contemporáneo sin perder el valor aromático del listado.
