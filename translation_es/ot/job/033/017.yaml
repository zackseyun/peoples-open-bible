- from: para apartar al hombre de su hecho,[a] y para ocultar la soberbia al hombre.
  to: para apartar al hombre de su acción,[a] y para ocultar la soberbia del hombre.
  rationale: Se reemplaza «hecho» por «acción» para una equivalencia más natural y fiel a מַעֲשֶׂה en español. Se cambia «al hombre» por «del hombre» para evitar una lectura dativa engañosa y reflejar mejor el sentido contextual de suprimir/ocultar la soberbia de la persona. La nota se ajusta en paralelo para mantener claridad idiomática sin perder la alternativa más literal.
