translation:
  language: es
  text: 'Habla a los hijos de Israel y diles[a]: «Cuando crucen el Jordán a la tierra de Canaán,»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Habla a
  - Di
  lexicon: HALOT
  rationale: El imperativo de דבר pide una orden directa de comunicación. «Habla» conserva la fuerza imperativa y suena natural en español; el complemento «a» queda con el destinatario explícito.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente filial y masculina plural. «Los hijos de Israel» mantiene esa forma sin neutralizarla en «israelitas», que sería una opción idiomática pero menos cercana al hebreo.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y di a ellos
  - y háblales
  lexicon: HALOT
  rationale: En español, después de un imperativo de habla, «y diles» resulta más natural y sigue el encadenamiento verbal del hebreo. Conserva la función de ambos verbos sin sobrecargar la frase.
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Porque
  - pues
  lexicon: HALOT
  rationale: Aquí כִּי introduce una circunstancia futura, no una causalidad. «Cuando» reproduce con claridad el valor temporal que el POB inglés también reconoció.
- source_word: עֹבְרִים
  english_pob_choice: you cross
  chosen_spanish: crucen
  alternatives_spanish:
  - pasen
  - estén cruzando
  lexicon: HALOT
  rationale: El participio con אַתֶּם funciona con valor de futuro cercano en una cláusula temporal. En español, el subjuntivo futuro de mandato indirecto/circunstancia, «crucen», expresa bien el sentido legal-instructivo.
- source_word: אֶת הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  - el Jordán
  lexicon: HALOT
  rationale: En español bíblico, «el Jordán» es claro e idiomático; añadir «río» no es necesario porque el referente geográfico ya es conocido por el contexto.
- source_word: אַרְצָה כְּנָעַן
  english_pob_choice: into the land of Canaan
  chosen_spanish: hacia la tierra de Canaán
  alternatives_spanish:
  - a la tierra de Canaán
  - hacia la tierra de Canaán
  lexicon: HALOT
  rationale: El sufijo direccional de אֶרֶץ expresa movimiento hacia una tierra. «Hacia» conserva la orientación del desplazamiento y evita afirmar de forma más fuerte que ya están entrando, aunque el contexto lo implica.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo el ancla [a] exactamente en el texto español y manteniendo la nota sólo donde el marcador aparece. La redacción sigue el texto hebreo y el criterio léxico del POB inglés, con una adaptación española natural.
  spanish_consistency_notes:
  - Se preserva la secuencia imperativa hebrea con dos verbos de habla.
  - Se mantiene «hijos de Israel» por cercanía al hebreo, con nota de alternativa idiomática.
  - «Jordán» se usa como nombre geográfico sin añadir glosas innecesarias.
  - «Tierra de Canaán» se conserva con dirección marcada por «hacia» para reflejar el valor del sufijo direccional.
