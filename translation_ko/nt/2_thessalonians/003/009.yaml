id: 2TH.3.9
reference: 2 Thessalonians 3:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐχ ὅτι οὐκ ἔχομεν ἐξουσίαν, ἀλλ’ ἵνα ἑαυτοὺς τύπον δῶμεν ὑμῖν εἰς τὸ μιμεῖσθαι ἡμᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/009.yaml
  text: not because we do not have the right, but in order to give ourselves to you as an example for you to imitate us.
translation:
  language: ko
  text: 우리에게 권리[a]가 없어서가 아니라, 여러분에게 우리 자신을 본보기[b]로 내어 주어 여러분이 우리를 본받게 하기 위함이었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「권한」, 「자격」. 본 정황에서는 사도적 사역에 대한 물질적 지원을 받을 정당한 자격을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「본」, 「모델」, 「패턴」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουσίαν
  english_pob_choice: the right
  chosen_korean: 권리
  alternatives_korean:
  - 권한
  - 자격
  lexicon: BDAG
  rationale: 정황상 사도적 지원의 정당한 자격을 가리키므로 「권리」가 자연스럽다. 「권한」(권력)은 너무 강하다.
- source_word: ἑαυτοὺς
  english_pob_choice: ourselves
  chosen_korean: 우리 자신을
  alternatives_korean:
  - 자신을
  lexicon: BDAG
  rationale: 재귀대명사 보존.
- source_word: τύπον
  english_pob_choice: an example
  chosen_korean: 본보기
  alternatives_korean:
  - 본
  - 모범
  lexicon: BDAG
  rationale: τύπος의 따라야 할 모범의 의미를 「본보기」로 자연스럽게 옮긴다.
- source_word: δῶμεν
  english_pob_choice: give
  chosen_korean: 내어 주어
  alternatives_korean:
  - 드러내어
  - 보여 주어
  lexicon: BDAG
  rationale: ἑαυτοὺς τύπον δῶμεν의 헬라어 이미지(「자신을 본으로 내어 주다」)를 보존.
- source_word: εἰς τὸ μιμεῖσθαι
  english_pob_choice: for you to imitate
  chosen_korean: 여러분이 우리를 본받게 하기 위함
  alternatives_korean:
  - 여러분으로 우리를 본받게 하려고
  lexicon: BDAG
  rationale: 목적 구문의 자연스러운 사역적 표현.
- source_word: οὐχ ὅτι οὐκ
  english_pob_choice: not because we do not
  chosen_korean: ~가 없어서가 아니라
  alternatives_korean:
  - ~을 가지지 않아서가 아니라
  lexicon: BDAG
  rationale: 이중 부정 도입 구조.
- source_word: ἀλλ’ ἵνα
  english_pob_choice: but in order to
  chosen_korean: ~위함이었습니다
  alternatives_korean:
  - 도리어 ~ 위함입니다
  lexicon: BDAG
  rationale: 적극적 목적을 자연스러운 한국어로 종결.
theological_decisions:
- issue: ἐξουσία의 정황적 의미
  chosen_reading: 사도적 사역에 대한 물질적 지원을 받을 정당한 권리. 의도적으로 행사하지 않음
  alternative_readings:
  - 사도적 권위 일반
  rationale: 본문 정황은 일과 부담의 문제를 다루므로 좁은 의미의 「권리」가 자연스럽다. 일반적 「사도적 권위」 해석으로 확대하지 않는다.
  doctrine_reference: 'Original-language primacy; preserve text as it stands'
