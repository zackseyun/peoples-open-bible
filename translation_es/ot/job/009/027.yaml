base_translation:
  language: en
  yaml_path: translation/ot/job/009/027.yaml
  text: If I say[a], ‘I will forget my complaint[b]; I will put aside my sad face and be cheerful,’
  footnotes:
  - marker: a
    text: Or 'my musing' / 'my meditation'; the Hebrew term can denote inward speech, reflection, or complaint, but in this lament context 'complaint' best fits.
    reason: lexical_alternative
  - marker: b
    text: Literally 'I will leave my face and brighten up,' an idiom for setting aside a downcast expression and trying to appear cheerful.
    reason: cultural_note
