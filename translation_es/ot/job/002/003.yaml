base_translation:
  language: en
  yaml_path: translation/ot/job/002/003.yaml
  text: Then Yahweh said to the Accuser[a], “Have you set your heart on my servant Job? For there is no one like him on the earth, a blameless and upright man, one who fears God and turns away from evil. He still holds fast his integrity[d][c][b], though you incited me against him to destroy him for nothing.”
  footnotes:
  - marker: a
    text: Or “Have you considered my servant Job?” Literally, “Have you set your heart on my servant Job?”
    reason: lexical_alternative
  - marker: b
    text: Hebrew הַשָּׂטָן, “the Accuser”; traditionally “Satan.”
    reason: alternative_reading
  - marker: c
    text: Or “to destroy him” or “to ruin him”; Hebrew literally “to swallow him up.”
    reason: lexical_alternative
  - marker: d
    text: “For nothing” may also mean “without cause,” and likely echoes Job 1:9, where the Accuser asks whether Job fears God “for nothing.”
    reason: cross_reference
