base_translation:
  language: en
  yaml_path: translation/ot/numbers/005/018.yaml
  text: Then the priest shall set the woman before Yahweh[a], uncover the woman's head[b], and place in her hands the grain offering of remembrance—it is a grain offering of jealousy—while in the priest's hand are the bitter waters that bring a curse.
  footnotes:
  - marker: a
    text: Or 'uncover the woman's head' or 'let the woman's hair hang loose.' The Hebrew idiom literally says 'loosen/unbind the woman's head,' likely referring to unbinding her hair as part of the ritual.
    reason: lexical_alternative
  - marker: b
    text: Or 'the bitter waters that bring the curse.' The Hebrew participle can be understood as describing waters that effect or carry a curse.
    reason: lexical_alternative
