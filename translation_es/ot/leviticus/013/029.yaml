translation:
  language: es
  text: Cuando un hombre o una mujer tenga una afección[a] en la cabeza[b] o en la barba,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aflicción», «enfermedad» o «marca»; el hebreo negaʿ es un término amplio en Levítico para una lesión visible o un brote que el sacerdote examina.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «cabeza»; en este contexto quizá más específicamente el cuero cabelludo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ ... אִשָּׁה
  english_pob_choice: a man or a woman
  chosen_spanish: un hombre o una mujer
  alternatives_spanish:
  - un hombre o mujer
  - alguien, sea hombre o mujer
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a ambos sexos; en español conviene conservar esa precisión sin neutralizarla a un genérico.
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En este contexto legal/procedimental, la cláusula presenta un caso. «Cuando» comunica bien esa condición en español y mantiene el valor del hebreo.
- source_word: יִהְיֶה בּוֹ
  english_pob_choice: has
  chosen_spanish: tenga
  alternatives_spanish:
  - tiene
  - haya en él
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; en español, una formulación natural en este contexto es «tenga» una afección. Mantiene el sentido de una condición que se presenta en la persona.
- source_word: נָגַע
  english_pob_choice: infection
  chosen_spanish: afección
  alternatives_spanish:
  - aflicción
  - enfermedad
  - llaga
  - marca
  lexicon: HALOT
  rationale: נגע es un término amplio en Levítico para una lesión o manifestación visible examinada por el sacerdote. «Afección» conserva amplitud semántica sin imponer una diagnosis médica moderna.
- source_word: בְּרֹאשׁ
  english_pob_choice: on the head
  chosen_spanish: en la cabeza
  alternatives_spanish:
  - en el cuero cabelludo
  - sobre la cabeza
  lexicon: HALOT
  rationale: «Cabeza» traduce de forma directa רֹאשׁ. Aunque el contexto puede referirse más específicamente al cuero cabelludo, el hebreo es más general.
- source_word: בְזָקָן
  english_pob_choice: on the beard
  chosen_spanish: en la barba
  alternatives_spanish:
  - sobre la barba
  lexicon: HALOT
  rationale: זָקָן significa «barba»; la preposición hebrea admite «en» o «sobre» en español, y «en la barba» suena natural y fiel.
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo base y con la lectura auditada en inglés; no se observan revisiones aplicadas en la fuente inglesa más reciente. Se conserva la estructura condicional y el doble referente de sexo, junto con las notas léxicas donde el hebreo tiene amplitud semántica.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparece el nombre divino; este versículo no lo contiene.
  - Se evita «persona» para no borrar la explicitación de hombre y mujer presente en el hebreo.
  - «Afección» se eligió como equivalente amplio de נגע, manteniendo la posibilidad de matiz patológico o lesional sin estrechar indebidamente el término.
