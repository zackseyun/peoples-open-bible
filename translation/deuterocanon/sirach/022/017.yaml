translation:
  text: A heart set firm on thoughtful understanding is like a plastered wall with a sanded finish[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek image is architectural and somewhat compressed: literally, something like ''a heart made firm on a mind of understanding, like the finish of a sanded wall, smoothed/plastered.'' The exact nuance of the wall-surface terms is uncertain, but the point is stability and sound construction.'
    reason: cultural_note
lexical_decisions:
- source_word: καρδία
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: LSJ
  rationale: In wisdom literature, καρδία commonly denotes the inner seat of thought and resolve, not merely emotion. 'Heart' preserves the biblical anthropological sense and keeps the metaphor compact.
- source_word: ἠδρασμένη
  chosen: set firm
  alternatives:
  - established
  - made steadfast
  - fixed
  lexicon: LSJ
  rationale: The participle conveys something made stable or firmly established. 'Set firm' is idiomatic modern English and preserves the passive/resultative sense better than a looser paraphrase.
- source_word: ἐπὶ
  chosen: 'on'
  alternatives:
  - upon
  - by means of
  - with reference to
  lexicon: LSJ
  rationale: The preposition is retained in a fairly literal way. In context it links the heart's firmness to the basis or sphere of understanding; 'on' preserves the image without over-interpreting the syntax.
- source_word: διανοίας συνέσεως
  chosen: thoughtful understanding
  alternatives:
  - intelligent reflection
  - understanding of insight
  - considered discernment
  lexicon: LSJ
  rationale: The genitive chain is somewhat compressed. διανοία suggests thought/intention/mind, and σύνεσις denotes understanding or discernment. 'Thoughtful understanding' renders both elements in natural English without flattening either term.
- source_word: ὡς
  chosen: is like
  alternatives:
  - like
  - as
  lexicon: LSJ
  rationale: This introduces a simile. 'Is like' makes the comparison explicit in smooth English.
- source_word: κόσμος
  chosen: finish
  alternatives:
  - ornament
  - adornment
  - decoration
  lexicon: LSJ
  rationale: κόσμος often means order or adornment. In this construction with wall-building terms, it likely refers to the wall's dressed or finished surface rather than decorative ornament in a modern aesthetic sense. 'Finish' fits the construction image.
- source_word: ψαμμωτός
  chosen: sanded
  alternatives:
  - stuccoed with sand
  - gritted
  - sand-plastered
  lexicon: LSJ
  rationale: The adjective is rare and related to sand (ψάμμος). It likely describes a sand-based coating or texture. 'Sanded' is concise and communicates the surface treatment, though the exact ancient building nuance is not fully certain.
- source_word: τοίχου
  chosen: wall
  alternatives:
  - partition wall
  lexicon: LSJ
  rationale: Standard rendering for τοῖχος. 'Wall' is sufficient here.
- source_word: ξυστοῦ
  chosen: plastered
  alternatives:
  - smoothed
  - polished
  - rubbed smooth
  lexicon: LSJ
  rationale: The adjective suggests a scraped, smoothed, or finished surface. Because the phrase describes a constructed wall surface, 'plastered' captures the architectural sense in readable English, while the following phrase specifies the finish.
