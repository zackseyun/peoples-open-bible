translation:
  language: es
  text: 'Así dice Yahvé: Si pueden[a] quebrantar mi pacto con el día y mi pacto con la noche, de modo que el día y la noche no estuvieran[b] a su tiempo señalado,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si quebrantan mi pacto con el día y mi pacto con la noche». El hebreo permite una condicional más directa; la redacción principal destaca el matiz retórico de imposibilidad presente en el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de modo que no hubiera día y noche a su tiempo señalado». El hebreo usa una construcción de finalidad/resultado con הֱיוֹת, sin introducir explícitamente movimiento; la traducción principal evita añadirlo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto es lo que dice Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera natural en español con «Así dice». Se mantiene «Yahvé» para el nombre divino conforme al criterio del proyecto y al hebreo יְהוָה.
- source_word: אִם תָּפֵרוּ
  english_pob_choice: If you can break
  chosen_spanish: Si pudiéran[a] quebrantar
  alternatives_spanish:
  - Si quebrantaran
  - Si pudieran romper
  lexicon: HALOT
  rationale: תָּפֵרוּ en hifil significa quebrantar/invalidar un pacto. «Pudieran» recoge la fuerza retórica de imposibilidad que el inglés auditado marcó con «can», sin convertirla en una mera condición neutra. «Quebrantar» conserva el peso jurídico del verbo.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: «Pacto» es el equivalente más estable para בְּרִית en contexto bíblico y teológico en español, conservando el valor formal de relación comprometida y vinculante.
- source_word: הַיּוֹם
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - el tiempo del día
  - el día claro
  lexicon: HALOT
  rationale: Se traduce literalmente por «el día» para mantener el paralelismo con «la noche» y la imagen de orden creado.
- source_word: הַלָּיְלָה
  english_pob_choice: the night
  chosen_spanish: la noche
  alternatives_spanish:
  - la oscuridad de la noche
  lexicon: HALOT
  rationale: Se conserva el sustantivo simple «la noche» por paralelismo y claridad.
- source_word: וּלְבִלְתִּי הֱיוֹת
  english_pob_choice: so that ... will not be
  chosen_spanish: de modo que ... no estuvieran
  alternatives_spanish:
  - para que ... no hubiera
  - hasta que ... no existieran
  lexicon: HALOT
  rationale: 'La construcción expresa resultado: la ruptura del pacto implicaría que el ciclo día-noche no existiera en su orden regular. «No estuvieran» evita añadir movimiento y refleja de forma natural el valor existencial de הֱיוֹת en español.'
- source_word: יֽוֹמָם וָלַיְלָה
  english_pob_choice: day and night
  chosen_spanish: el día y la noche
  alternatives_spanish:
  - día y noche
  - de día y de noche
  lexicon: HALOT
  rationale: Se mantiene la pareja fija «el día y la noche» para reproducir el merismo y la secuencia creada.
- source_word: בְּעִתָּם
  english_pob_choice: at their appointed time
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - a su tiempo
  - en el tiempo fijado para ellos
  lexicon: HALOT
  rationale: עֵת indica tiempo fijado o adecuado. «Tiempo señalado» comunica bien la regularidad ordenada por Dios; «en su» retoma naturalmente el referente plural implícito en el hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue el estándar del proyecto para el Tetragrama: «Yahvé». Esto preserva el nombre del pacto sin ocultarlo bajo un título genérico.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza retórica de la condicional imposible
  english_pob_reading: If you can break
  chosen_spanish_reading: Si pudiéran[a] quebrantar
  alternative_spanish_readings:
  - Si quebrantaran
  - Si llegaran a quebrantar
  rationale: El contexto subraya la imposibilidad de romper el orden creado. El español con subjuntivo imperfecto mantiene la idea condicional e hipotética sin perder la fuerza argumentativa del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense without paraphrase'
translation_notes:
  revision_awareness: La auditoría inglesa revisó la cláusula final de «will not come» a «will not be» para ajustarse más de cerca al hebreo הֱיוֹת. Esta versión española sigue esa revisión con «no estuvieran» y evita verbos de movimiento. También conserva la fuerza condicional imposible señalada en el audit trail con una forma hipotética en subjuntivo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino, coherente con el proyecto.
  - Se usa «pacto» para בְּרִית en toda la cláusula, manteniendo uniformidad terminológica.
  - Se conserva el paralelismo «el día y la noche» para reflejar la estructura binaria del hebreo.
  - El marcador [a] está anclado en el verbo condicional y el [b] en la cláusula final, siguiendo la disciplina de notas del proyecto.
