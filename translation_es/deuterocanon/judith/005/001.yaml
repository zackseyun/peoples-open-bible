translation:
  language: es
  text: Y se le informó que los hijos[a] de Israel se habían preparado para la guerra, y habían bloqueado los caminos de la región montañosa, y habían fortificado toda cumbre de todo monte alto, y habían puesto obstáculos[b] en las llanuras, a Holofernes, el comandante en jefe de las fuerzas de Asiria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» / «los hijos de Israel». El griego dice literalmente «los hijos de Israel», una designación étnica estándar.
    reason: lexical_alternative
  - marker: b
    text: O «trampas» o «barricadas» para «obstáculos»; el término griego puede denotar algo que hace tropezar, pero aquí se trata de impedimentos físicos en un contexto militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνηγγέλη
  english_pob_choice: it was reported
  chosen_spanish: fue notificado
  alternatives_spanish:
  - fue informado
  - se le comunicó
  lexicon: BDAG
  rationale: El pasivo impersonal expresa bien que la noticia llegó a Holofernes sin destacar al mensajero. 'Fue notificado' mantiene el carácter formal del reporte y evita una paráfrasis excesiva.
- source_word: ἀρχιστρατήγῳ
  english_pob_choice: commander-in-chief
  chosen_spanish: comandante en jefe
  alternatives_spanish:
  - generalísimo
  - comandante supremo
  lexicon: LSJ
  rationale: El título griego señala el rango militar más alto. 'Comandante en jefe' es la equivalencia natural y fiel en español moderno.
- source_word: δυνάμεως Ἀσσούρ
  english_pob_choice: of the forces of Assyria
  chosen_spanish: de las fuerzas de Asiria
  alternatives_spanish:
  - del ejército de Asiria
  - del poder de Asiria
  lexicon: LSJ
  rationale: En contexto militar, δύναμις designa fuerzas armadas. 'Fuerzas de Asiria' conserva ese sentido colectivo sin volverlo abstracto.
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos del Israel
  lexicon: LSJ
  rationale: Se conserva la designación étnica literal del griego. 'Hijos de Israel' es idiomático en español bíblico y visible para el lector.
- source_word: παρεσκευάσθησαν εἰς πόλεμον
  english_pob_choice: had prepared for war
  chosen_spanish: se habían preparado para la guerra
  alternatives_spanish:
  - se habían alistado para la guerra
  - se habían preparado para el combate
  lexicon: BDAG
  rationale: El verbo expresa preparación o disposición previa; el pluscuamperfecto español refleja bien el estado previo al reporte. 'Guerra' reproduce el sustantivo amplio del griego.
- source_word: τὰς ὁδοὺς τῆς ὀρεινῆς
  english_pob_choice: the roads of the hill country
  chosen_spanish: los caminos de la región montañosa
  alternatives_spanish:
  - los caminos de la sierra
  - los caminos de la zona montañosa
  lexicon: LSJ
  rationale: Ὀρεινή denota región montañosa o hill country. 'Región montañosa' es claro en español y conserva la geografía defensiva sin forzar un topónimo.
- source_word: συνέκλεισαν
  english_pob_choice: had blocked
  chosen_spanish: habían cerrado
  alternatives_spanish:
  - habían bloqueado
  - habían sellado
  lexicon: BDAG
  rationale: El verbo significa cerrar o impedir el paso. 'Habían cerrado los caminos' suena natural en español y conserva la idea de clausura militar.
- source_word: ἐτείχισαν
  english_pob_choice: fortified
  chosen_spanish: fortificado
  alternatives_spanish:
  - amurallado
  - levantado murallas alrededor de
  lexicon: LSJ
  rationale: El verbo indica fortificar o amurallar. 'Fortificado' mantiene el sentido militar sin añadir detalles que el texto no da.
- source_word: πᾶσαν κορυφὴν ὄρους ὑψηλοῦ
  english_pob_choice: every summit of every high mountain
  chosen_spanish: toda cumbre de todo monte alto
  alternatives_spanish:
  - cada cumbre de cada monte alto
  - toda cima de todo monte elevado
  lexicon: LSJ
  rationale: Se conserva el valor distributivo enfatizado en la revisión inglesa con 'every'. 'Monte alto' refleja ὄρους ὑψηλοῦ con lenguaje bíblico claro y no rebuscado.
- source_word: σκάνδαλα
  english_pob_choice: obstacles
  chosen_spanish: obstáculos
  alternatives_spanish:
  - trampas
  - barreras
  - tropiezos
  lexicon: BDAG
  rationale: En este contexto militar-topográfico, el término se refiere a impedimentos físicos. 'Obstáculos' evita la connotación teológica posterior de 'piedra de tropiezo'.
- source_word: ἐν τοῖς πεδίοις
  english_pob_choice: in the plains
  chosen_spanish: en las llanuras
  alternatives_spanish:
  - en los llanos
  - en la llanura
  lexicon: LSJ
  rationale: πέδιον designa llanura o terreno llano. 'Llanuras' es una forma natural y precisa en español.
theological_decisions:
- issue: Designación étnica οἱ υἱοὶ Ἰσραήλ
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del Israel
  rationale: No hay aquí un cruce doctrinal mayor, pero sí una decisión de fidelidad lexical. Mantener la forma literal preserva la visibilidad del origen griego y evita neutralizar el matiz tradicional.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido militar de σκάνδαλα
  english_pob_reading: obstacles
  chosen_spanish_reading: obstáculos
  alternative_spanish_readings:
  - trampas
  - barreras
  - tropiezos
  rationale: El contexto describe defensas y preparativos bélicos, no una categoría moral o religiosa. 'Obstáculos' resguarda ese sentido físico y evita asociarlo con el uso teológico de 'tropiezo'.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete 1909 y toma como contexto la revisión inglesa más reciente, que añadió 'every' para reflejar con mayor plenitud πᾶσαν κορυφήν ὄρους ὑψηλοῦ. Por eso se mantiene en español la repetición distributiva 'toda ... de todo ...', sin suavizarla.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se conserva el orden narrativo del griego sin convertir la lista militar en una paráfrasis.
  - '''Obstáculos'' se mantiene por coherencia con el tratamiento POB de σκάνδαλα en contexto bélico.'
  - '''Hijos de Israel'' es la opción literal y consistente con la política de visibilizar la forma fuente cuando no crea oscuridad indebida.'
