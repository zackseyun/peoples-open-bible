translation:
  language: es
  text: Pero cuando Sostrato[a], el comandante de la ciudadela, presionaba la reclamación —porque la administración de los ingresos le correspondía—, por esta razón los dos fueron convocados por el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sostratus». La forma española «Sostrato» adapta el nombre propio al uso hispano; la forma griega transliterada conserva más de cerca el original.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιουμένου δὲ τὴν ἀπαίτησιν
  english_pob_choice: pressed the claim
  chosen_spanish: presionaba la reclamación
  alternatives_spanish:
  - hacía la demanda
  - insistía en la reclamación
  - perseguía la reclamación
  lexicon: LSJ
  rationale: El participio genitivo absoluto expresa una acción en curso de insistencia o exigencia. «Presionaba la reclamación» conserva la idea de insistencia administrativa sin volverlo demasiado técnico o rígido.
- source_word: Σωστράτου
  english_pob_choice: Sostratus
  chosen_spanish: Sostrato
  alternatives_spanish:
  - Sostratus
  lexicon: convención de transliteración
  rationale: En español bíblico es preferible la forma grecolatina adaptada «Sostrato», conservando el nombre propio con pronunciación natural para el lector hispano.
- source_word: τοῦ τῆς ἀκροπόλεως ἐπάρχου
  english_pob_choice: the commander of the citadel
  chosen_spanish: el comandante de la ciudadela
  alternatives_spanish:
  - el gobernador de la ciudadela
  - el prefecto de la ciudadela
  lexicon: LSJ
  rationale: ἔπαρχος puede ser un cargo de autoridad civil o militar. En este contexto de custodia y administración de una fortaleza, «comandante» comunica bien el carácter de supervisión militar-administrativa. «Ciudadela» refleja ἀκρόπολις como parte fortificada de la ciudad.
- source_word: πρὸς τοῦτον γὰρ ἦν
  english_pob_choice: belonged to him
  chosen_spanish: le correspondía
  alternatives_spanish:
  - estaba bajo su autoridad
  - era de su competencia
  - le pertenecía
  lexicon: LSJ
  rationale: La frase señala jurisdicción o competencia sobre el asunto. «Le correspondía» expresa con naturalidad esa esfera de responsabilidad sin sugerir posesión estrictamente material.
- source_word: ἡ τῶν διαφόρων πρᾶξις
  english_pob_choice: the administration of the revenues
  chosen_spanish: la administración de los ingresos
  alternatives_spanish:
  - la administración de las rentas
  - el manejo de los fondos
  - la recaudación de los ingresos
  lexicon: LSJ
  rationale: διαφορά en contexto administrativo puede referirse a ingresos, rentas o fondos. «Ingresos» mantiene amplitud semántica; «administración» sigue la revisión inglesa que prefirió un registro más formal para πρᾶξις.
- source_word: διʼ ἣν αἰτίαν
  english_pob_choice: for this reason
  chosen_spanish: por esta razón
  alternatives_spanish:
  - por eso
  - por tal motivo
  - por lo cual
  lexicon: LSJ
  rationale: Conector causal directo y claro en español, equivalente al valor explicativo de la construcción griega.
- source_word: οἱ δύο
  english_pob_choice: the two
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - las dos personas
  lexicon: LSJ
  rationale: La referencia retoma a las dos personas ya mencionadas. En español, «los dos» es natural y no añade información no explícita.
- source_word: ὑπὸ τοῦ βασιλέως προσεκλήθησαν
  english_pob_choice: were summoned by the king
  chosen_spanish: fueron convocados por el rey
  alternatives_spanish:
  - fueron llamados por el rey
  - fueron citados por el rey
  - fueron convocados ante el rey
  lexicon: LSJ
  rationale: El pasivo de προσκαλέω implica llamada o convocatoria. «Convocados» es formal y adecuado al contexto cortesano, sin introducir el matiz judicial de «citados».
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa que prefirió «administration» para πρᾶξις y eliminó el añadido explicativo «men» porque no aparece en el griego. También se evitó sobretraducir ἀκρόπολις como un término técnico distinto de «ciudadela».
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, con sintaxis clara y sin calcos innecesarios.
  - Se evitó añadir «hombres» u otra especificación no explícita en οἱ δύο.
  - La puntuación con rayas reproduce la explicación causal intermedia del texto fuente, como en la auditoría inglesa.
