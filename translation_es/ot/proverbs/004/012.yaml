translation:
  language: es
  text: Cuando camines[a], no se estrechará tu paso; y si corres, no tropezarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “tu paso no se verá restringido”. El verbo hebreo transmite la idea de ser estrechado, constreñido o limitado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלֶכְתְּךָ
  english_pob_choice: When you walk
  chosen_spanish: Cuando andes
  alternatives_spanish:
  - Al andar
  - Mientras caminas
  - Cuando camines
  lexicon: HALOT
  rationale: 'El infinitivo constructo con ב indica un marco temporal: ''cuando'' / ''al''. ''Cuando andes'' conserva la relación temporal y suena natural en español, sin volver mecánica la estructura hebrea.'
- source_word: יֵצַר
  english_pob_choice: will be hindered
  chosen_spanish: no se estrechará
  alternatives_spanish:
  - no será impedido
  - no se verá restringido
  - no se estrechará tu paso
  lexicon: HALOT
  rationale: El verbo expresa la idea de volverse angosto, restringido o constreñido. 'No se estrechará' refleja mejor la imagen espacial del hebreo que un mero 'será impedido', y mantiene la tensión lexical documentada en la nota inglesa.
- source_word: צַעֲדֶךָ
  english_pob_choice: your step
  chosen_spanish: tu paso
  alternatives_spanish:
  - tu andar
  - tus pasos
  - tu huella
  lexicon: HALOT
  rationale: El sustantivo singular con sufijo de 2ms puede funcionar como imagen colectiva del caminar. 'Tu paso' conserva el singular y el valor de ruta/movimiento; en español es más idiomático que un plural obligatorio.
- source_word: וְאִם
  english_pob_choice: and if
  chosen_spanish: y si
  alternatives_spanish:
  - y cuando
  - aunque
  lexicon: HALOT
  rationale: La partícula condicional se mantiene con 'y si', respetando la conexión del hebreo y el paralelismo condicional sin intensificarlo a 'aunque'.
- source_word: תָּרוּץ
  english_pob_choice: you run
  chosen_spanish: corres
  alternatives_spanish:
  - eches a correr
  - corrieras
  - vayas corriendo
  lexicon: HALOT
  rationale: רוץ significa 'correr'. 'Corres' preserva el paralelo simple y directo con el primer hemistiquio, sin suavizar ni amplificar el verbo.
- source_word: תִכָּשֵׁל
  english_pob_choice: you will not stumble
  chosen_spanish: no tropezarás
  alternatives_spanish:
  - no caerás
  - no vacilarás
  - no resbalarás
  lexicon: HALOT
  rationale: כשל denota tropezar o tambalearse, con posible extensión figurada. 'No tropezarás' comunica con claridad la imagen sapiencial y mantiene la ambigüedad física/moral sin añadir interpretación.
translation_notes:
  revision_awareness: La revisión más reciente del POB inglés no cambió el versículo y conservó la elección ‘will be hindered’; la nota lexical indica la alternativa literal de ser estrechado o restringido. El español adopta una solución más imagética, pero mantiene la tensión semántica del hebreo con una nota equivalente.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino.
  - Se mantiene un registro sapiencial claro y sobrio, sin arcaísmos innecesarios.
  - La metáfora de movimiento/camino se conserva en 'andar', 'paso' y 'tropezar'.
