translation:
  language: es
  text: ¿Qué ventaja tiene un hombre[a] de todo su trabajo en que se afana bajo el sol?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: "un ser humano", "una persona". El hebreo usa un singular masculino con valor representativo general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Cuál
  - ¿Qué cosa
  lexicon: HALOT
  rationale: Interrogativo directo que conserva el inicio breve y retórico del hebreo.
- source_word: יִּתְר֖וֹן
  english_pob_choice: profit
  chosen_spanish: ventaja
  alternatives_spanish:
  - provecho
  - ganancia
  - beneficio
  lexicon: HALOT
  rationale: En Eclesiastés el término apunta a lo que queda como saldo útil o ganancia duradera; 'ventaja' comunica bien esa idea sin forzar un matiz monetario demasiado estrecho.
- source_word: לָֽאָדָ֑ם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - la humanidad
  - la gente
  lexicon: HALOT
  rationale: El hebreo es singular masculino con valor representativo general. 'Un hombre' preserva la forma singular y el tono proverbial del texto, con fuerza genérica en español.
- source_word: בְּכָל
  english_pob_choice: from all
  chosen_spanish: en todo
  alternatives_spanish:
  - de todo
  - por todo
  - en cada
  lexicon: HALOT
  rationale: La construcción en hebreo sitúa la pregunta en la esfera total de la labor; 'en todo su trabajo' es natural en español y refleja la totalidad contemplada.
- source_word: עֲמָל֔וֹ
  english_pob_choice: his labor
  chosen_spanish: su trabajo
  alternatives_spanish:
  - su labor
  - su toil
  - su afán
  lexicon: HALOT
  rationale: עָמָל puede llevar el sentido de trabajo penoso o fatiga. 'Trabajo' es claro y digno en español; el matiz de esfuerzo se recupera en el verbo siguiente.
- source_word: שֶֽׁיַּעֲמֹ֖ל
  english_pob_choice: at which he toils
  chosen_spanish: con que se afana
  alternatives_spanish:
  - en que se afana
  - en el que se afana
  - con que trabaja
  lexicon: HALOT
  rationale: El verbo expresa esfuerzo fatigoso. 'Se afana' preserva esa intensidad y evita repetir 'trabajo' de forma demasiado mecánica.
- source_word: תַּ֥חַת הַשָּֽׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: debajo del sol
  alternatives_spanish:
  - bajo el sol
  - bajo el sol de este mundo
  lexicon: HALOT
  rationale: Frase programática de Eclesiastés para la esfera terrenal observable. 'Debajo del sol' es fiel, idiomático y reconocible en español bíblico.
theological_decisions:
- issue: Valor genérico de אָדָם en una pregunta proverbial
  english_pob_reading: man / a man, with a footnote allowing humankind or a person
  chosen_spanish_reading: un hombre, con valor representativo general
  alternative_spanish_readings:
  - una persona
  - la humanidad
  - el ser humano
  rationale: El hebreo usa un singular masculino que funciona representativamente. En español, 'un hombre' conserva la forma del original y puede leerse genéricamente; la ambigüedad de género se reconoce implícitamente sin alterar el texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: La versión anterior falló porque el marcador de nota [a] no estaba presente en el texto. Esta revisión lo inserta en 'un hombre[a]' para que la nota quede anclada correctamente y sea validable.
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre 'trabajo' y 'se afana' para reflejar el juego de sustantivo + verbo del hebreo.
  - '''Debajo del sol'' conserva la fórmula característica de Eclesiastés sin añadir glosa interpretativa en el texto principal.'
  - Se evita 'SEÑOR' o terminología teológica no presente; el versículo no contiene el nombre divino ni referencias cristológicas.
