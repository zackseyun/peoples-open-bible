    text: El griego dice «los reyes de los caldeos» (plural). El paralelo hebreo de 2 Crónicas 36 enfatiza al rey de Babilonia/Nabucodonosor. El texto principal sigue el testimonio griego de 1 Esdras.
    reason: textual_variant
  revision_rationale: 'Se cambió «el Señor» por «Yahvé» para alinearlo con la terminología del proyecto para el nombre divino. También se suavizaron dos giros poco naturales: «se entretenían escarneciendo» pasó a «se burlaban de», y «ordenó hacer subir» a «ordenó que ... subieran contra ellos», manteniendo el sentido de burla reiterada y de avance militar ordenado.'
