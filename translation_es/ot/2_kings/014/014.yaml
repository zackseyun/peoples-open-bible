translation:
  language: es
  text: Tomó todo el oro y la plata, y todos los utensilios hallados en la casa de Yahvé y en los tesoros de la casa del rey, y los rehenes[a], y volvió a Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de las garantías» o «los hijos de los fiadores»; probablemente se refiere a personas tomadas como seguridad, es decir, rehenes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: He took
  chosen_spanish: Tomó
  alternatives_spanish:
  - Y tomó
  - Y se llevó
  lexicon: HALOT
  rationale: El wayyiqtol narrativo pide un pretérito simple en español. Omito la conjunción inicial para mantener fluidez narrativa, como hace la versión inglesa de referencia.
- source_word: כָּל הַזָּהָב וְהַכֶּסֶף
  english_pob_choice: all the gold and silver
  chosen_spanish: todo el oro y la plata
  alternatives_spanish:
  - todo el oro y la plata
  - todo el oro y la plata
  lexicon: HALOT
  rationale: כָּל expresa totalidad; en español, 'todo el oro y la plata' conserva esa amplitud sin necesidad de repetir artículos. 'Plata' es el equivalente natural de כֶּסֶף en este contexto de botín valioso.
- source_word: כָּל הַכֵּלִים
  english_pob_choice: all the vessels
  chosen_spanish: todos los utensilios
  alternatives_spanish:
  - todos los vasos
  - todos los objetos
  lexicon: HALOT
  rationale: כֵּלִים abarca implementos, artículos o utensilios. 'Utensilios' comunica bien el inventario de templo/palacio en español sin forzar una lectura litúrgica específica como 'vasos'.
- source_word: הַנִּמְצְאִים
  english_pob_choice: found
  chosen_spanish: hallados
  alternatives_spanish:
  - que se hallaban
  - encontrados
  lexicon: HALOT
  rationale: 'El participio funciona adjetivalmente: los utensilios estaban allí. ''Hallados'' reproduce esa cualidad de ubicación encontrada y suena natural en español bíblico moderno.'
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: Se conserva 'casa' para reflejar la expresión hebrea literal, y 'Yahvé' sigue el estándar del proyecto para יהוה. Evito 'SEÑOR' porque ocultaría el nombre divino.
- source_word: וּבְאֹצְרוֹת בֵּית הַמֶּלֶךְ
  english_pob_choice: and in the treasuries of the king’s house
  chosen_spanish: y en los tesoros de la casa del rey
  alternatives_spanish:
  - y en los tesoros de la casa real
  - y en las tesorerías de la casa del rey
  lexicon: HALOT
  rationale: אֹצְרוֹת son tesoros/almacenes de riqueza; 'tesoros' es claro en español. 'Casa del rey' mantiene la forma hebrea sin sustituirla por 'palacio', que sería más interpretativo.
- source_word: בְּנֵי הַתַּעֲרֻבוֹת
  english_pob_choice: the hostages
  chosen_spanish: los hijos de las garantías
  alternatives_spanish:
  - los rehenes
  - los hijos de los fiadores
  - los hijos de las prendas
  lexicon: HALOT
  rationale: Conservo una traducción más cercana a la forma hebrea para no borrar la tensión lexical que el audit trail marca. 'Garantías' intenta reflejar el valor de seguridad/pledge de תַּעֲרֻבוֹת, aunque su sentido contextual apunta a personas retenidas como garantía.
- source_word: וַיָּשָׁב שֹׁמְרֹנָה
  english_pob_choice: and returned to Samaria
  chosen_spanish: y volvió a Samaria
  alternatives_spanish:
  - y regresó a Samaria
  - y retornó a Samaria
  lexicon: HALOT
  rationale: שׁוּב en narrativa se expresa naturalmente como 'volver/ regresar'. 'Volvió a Samaria' es breve y fiel al movimiento de retorno.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: the house of Yahweh
  chosen_spanish_reading: la casa de Yahvé
  alternative_spanish_readings:
  - la casa del SEÑOR
  - la casa de Yahveh
  rationale: El proyecto prescribe 'Yahvé' para יהוה en el texto principal. Mantenerlo hace auditable la decisión y evita el reemplazo litúrgico tradicional por 'SEÑOR'.
  doctrine_reference: Conventional renderings of the Tetragrammaton; project-level terminology default
- issue: Sentido de בְּנֵי הַתַּעֲרֻבוֹת
  english_pob_reading: the hostages
  chosen_spanish_reading: los hijos de las garantías
  alternative_spanish_readings:
  - los rehenes
  - los hijos de las prendas
  - los hijos de los fiadores
  rationale: El inglés POB toma la frase como personas retenidas como seguridad. En español, 'rehenes' sería idiomático pero perdería la huella formal del hebreo; por eso se conserva una forma más cercana al original, dejando visible la tensión lexical que el contexto resuelve.
  doctrine_reference: Lexical ambiguity in narrative Hebrew; source-driven contextual sense
- issue: Carácter del botín enumerado
  english_pob_reading: all the gold and silver, and all the vessels ... and the hostages
  chosen_spanish_reading: todo el oro y la plata, y todos los utensilios ... y los hijos de las garantías
  alternative_spanish_readings:
  - todo el oro y la plata, y todos los utensilios ... y los rehenes
  rationale: 'No hay un problema doctrinal aquí, pero sí una decisión de fidelidad: el versículo enumera saqueo material y personas. La traducción española mantiene ambos elementos sin suavizar la dureza del texto.'
  doctrine_reference: Narrative fidelity to the Hebrew source
translation_notes:
  revision_awareness: La base inglesa más reciente eliminó el artículo repetido antes de 'silver' y retiró 'also', manteniendo 'hostages' como lectura natural. La versión española sigue esa línea de concisión, pero decide no traducir el último grupo por un equivalente interpretativo sin marca, para preservar la ambigüedad lexical observada en el hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה, en lugar de 'SEÑOR'.
  - '''casa del rey'' reproduce la forma hebrea mejor que ''palacio'' y mantiene uniformidad con otros pasajes.'
  - '''utensilios'' se prefiere aquí a ''vasos'' por el contexto de objetos de templo/palacio.'
  - La nota al pie ancla la tensión de בְּנֵי הַתַּעֲרֻבוֹת sin resolverla de manera prematura en el cuerpo del texto.
