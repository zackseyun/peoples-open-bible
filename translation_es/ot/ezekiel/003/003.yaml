revisions:
- from: 'Y él me dijo[a]: «Hijo de hombre, alimenta tu vientre y llena tus entrañas con este rollo que yo te doy». Y lo comí, y en mi boca fue dulce como miel.'
  to: 'Y él me dijo[a]: «Hijo de hombre, alimenta tu vientre y llena tus entrañas con este rollo que yo te doy». Entonces lo comí, y me supo en la boca dulce como miel.'
  rationale: 'Se conserva toda la estructura y las decisiones léxicas principales del borrador, pero se corrige una formulación española poco natural («en mi boca fue») por una expresión idiomática que comunica el mismo efecto sensorial del hebreo: «me supo en la boca dulce como miel». También se ajusta «Y lo comí» a «Entonces lo comí» para una progresión narrativa más fluida sin alterar el sentido.'
