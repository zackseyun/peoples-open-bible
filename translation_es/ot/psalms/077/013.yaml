translation:
  language: es
  text: Meditaré sobre toda tu obra[a], y ponderaré tus hechos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hablaré de tus hechos». El verbo hebreo puede significar meditar, ponderar o hablar/discurrir; aquí el sentido reflexivo encaja mejor con el paralelismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָגִיתִי
  english_pob_choice: I will meditate
  chosen_spanish: Meditaré
  alternatives_spanish:
  - y meditaré
  - musearé
  lexicon: HALOT
  rationale: El verbo הגה en este contexto poético expresa reflexión contemplativa. «Meditaré» comunica bien la fuerza interior y resulta natural en español bíblico moderno, sin perder el matiz de musing/reflexión.
- source_word: בְּכָל
  english_pob_choice: on all
  chosen_spanish: en toda
  alternatives_spanish:
  - sobre toda
  - acerca de toda
  lexicon: HALOT
  rationale: Con verbos de pensamiento, la preposición hebrea puede introducir el contenido del acto mental. En español, «en toda» funciona de manera idiomática con «meditar» y conserva la relación de objeto de reflexión.
- source_word: פָּעֳלֶךָ
  english_pob_choice: your work
  chosen_spanish: tu obra
  alternatives_spanish:
  - tu trabajo
  - tus obras
  lexicon: HALOT
  rationale: פֹּעַל puede referirse a trabajo, obra o acto. «Tu obra» conserva el valor singular colectivo y suena más natural en español poético que «tu trabajo», mientras mantiene la correspondencia con el primer miembro del paralelismo.
- source_word: וּבַעֲלִילוֹתֶיךָ
  english_pob_choice: your deeds
  chosen_spanish: tus hechos
  alternatives_spanish:
  - tus obras
  - tus actos
  lexicon: HALOT
  rationale: עֲלִילָה denota hechos, actos o acciones realizadas. «Tus hechos» es claro y mantiene el paralelismo con «tu obra» sin añadir una intensificación no explícita en el sustantivo.
- source_word: אָשִׂיחָה
  english_pob_choice: I will ponder
  chosen_spanish: ponderaré
  alternatives_spanish:
  - meditaré
  - hablaré
  lexicon: HALOT
  rationale: שיח puede significar reflexionar, ponderar o hablar/discurrir. Como el primer hemistiquio ya usa «meditaré», «ponderaré» preserva la variación poética y el sentido reflexivo preferido por el contexto, a la vez que deja visible la alternativa de habla en la nota.
translation_notes:
  revision_awareness: 'El texto sigue el testimonio masorético (WLC) y el audit trail inglés: mantiene la duplicación poética entre «obra» y «hechos», y conserva la tensión semántica de הגה/שיח entre reflexión y habla mediante la nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente es el nombre divino; aquí no aparece.
  - Se mantuvo «obra/hechos» para reflejar la variación poética del original sin homogeneizar ambos miembros.
  - La nota a pie preserva la alternativa de sentido verbal sin desplazar la lectura contemplativa preferida por el contexto.
