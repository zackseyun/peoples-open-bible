base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/001/007.yaml
  text: But Yahweh said to me[a], “Do not say, ‘I am a youth,’ for to all to whom I send you, you shall go, and all that I command you[b], you shall speak.”
  footnotes:
  - marker: a
    text: Or “I am a young man,” “I am a boy.” The Hebrew נַעַר can denote a range of youthfulness or inexperience.
    reason: lexical_alternative
  - marker: b
    text: Or “wherever I send you, you shall go.” The Hebrew expression can be understood more generally of every destination or assignment to which the LORD sends Jeremiah.
    reason: alternative_reading
