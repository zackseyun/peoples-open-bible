review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura comparativa del hebreo: cielos/altura, tierra/profundidad, corazón de los reyes, y la idea final de inescrutabilidad. Sin embargo, «no hay quien lo escudriñe» introduce un objeto singular explícito («lo») y una construcción personal que suena más interpretativa que el hebreo nominal אֵין חֵקֶר, mejor reflejado por «no tiene escrutinio/sondeo» o, de forma natural en español, «es inescrutable» / «no se puede escudriñar».'
  spanish_quality_summary: El texto es legible y digno, pero «para la altura» resulta algo forzado en español corriente. «En cuanto a la altura» sería más explicativo pero menos terso; puede mantenerse la concisión con «Los cielos, por su altura…». Además, los dos primeros segmentos agradecen una puntuación más fluida. La cláusula final debe sonar más natural y fiel sin el pronombre «lo».
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Los cielos», «la tierra», «corazón» y «reyes» están bien alineados. La principal corrección es lexical/sintáctica en אֵין חֵקֶר.
  issues:
  - severity: medium
    issue: «no hay quien lo escudriñe» sobreinterpreta אֵין חֵקֶר
    rationale: El hebreo dice literalmente «no hay búsqueda/escudriñamiento», no «no hay quien lo escudriñe». La versión española añade un sujeto indefinido y un objeto pronominal no presente en el original.
  - severity: low
    issue: «para la altura» suena poco natural en español bíblico moderno
    rationale: Aunque refleja la preposición de referencia, en español la frase resulta algo rígida. Una formulación como «por su altura» conserva la comparación de modo más idiomático.
  - severity: low
    issue: Falta una nota para la alternativa de la cláusula final
    rationale: El inglés conserva la literalidad y alternativas para אֵין חֵקֶר. En español conviene preservar esa información, especialmente si se opta por una formulación más idiomática en el texto principal.
  revised_spanish_text: 'Los cielos, por su altura[a], y la tierra, por su profundidad, y el corazón de los reyes: es inescrutable[b].'
  revised_footnotes:
  - marker: a
    text: 'O: «en altura» o «con respecto a la altura»; el hebreo usa una preposición de referencia.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «no hay escudriñamiento» o «no hay manera de descubrirlo»; el hebreo dice literalmente «no hay búsqueda/finding out».
    reason: lexical_alternative
