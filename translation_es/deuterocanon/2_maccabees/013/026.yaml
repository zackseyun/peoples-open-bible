translation:
  language: es
  text: Lisias se presentó ante el tribunal[a], presentó su defensa[b] lo mejor que pudo, los persuadió, los calmó, los hizo bien dispuestos, y regresó a Antioquía. Así, el ataque y la retirada del rey[c] siguieron su curso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asiento de juicio» o «plataforma» para βῆμα.
    reason: lexical_alternative
  - marker: b
    text: O «adecuadamente» o «según lo permitían las circunstancias» para el adverbio detrás de «presentó su defensa lo mejor que pudo».
    reason: lexical_alternative
  - marker: c
    text: O «el asalto y el repliegue del rey» para el movimiento militar resumido aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσῆλθεν
  english_pob_choice: came forward
  chosen_spanish: se presentó
  alternatives_spanish:
  - se acercó
  - compareció
  lexicon: LSJ
  rationale: En un contexto público y judicial, «se presentó» comunica que Lisias comparece ante la instancia sin añadir movimiento innecesario ni sonar arcaico.
- source_word: βῆμα
  english_pob_choice: tribunal
  chosen_spanish: tribunal
  alternatives_spanish:
  - estrado
  - plataforma
  - asiento de juicio
  lexicon: LSJ
  rationale: Aquí βῆμα funciona en un marco oficial/judicial; «tribunal» expresa la función del lugar mejor que un término meramente físico.
- source_word: ἀπελογήσατο
  english_pob_choice: made ... a defense
  chosen_spanish: hizo una defensa
  alternatives_spanish:
  - se defendió
  - presentó su defensa
  lexicon: LSJ
  rationale: La forma media indica la acción de defenderse o presentar defensa. «Hizo una defensa» conserva la estructura y el valor forense del verbo.
- source_word: ἐνδεχομένως
  english_pob_choice: as good a defense as he could
  chosen_spanish: tan buena como pudo
  alternatives_spanish:
  - como las circunstancias permitían
  - de manera adecuada
  - lo mejor que pudo
  lexicon: LSJ
  rationale: El adverbio es difícil y expresa suficiencia relativa o posibilidad según las circunstancias. «Tan buena como pudo» mantiene la idea de capacidad limitada sin cerrar indebidamente el matiz.
- source_word: συνέπεισεν
  english_pob_choice: persuaded them
  chosen_spanish: los persuadió
  alternatives_spanish:
  - los convenció
  - los ganó para su causa
  lexicon: LSJ
  rationale: El verbo conserva el sentido básico de persuadir/convencer; «persuadió» es claro y no añade coloración que el griego no exige.
- source_word: κατεπράϋνεν
  english_pob_choice: calmed them
  chosen_spanish: los calmó
  alternatives_spanish:
  - los apaciguó
  - los sosegó
  lexicon: LSJ
  rationale: El verbo indica aquietar o apaciguar. «Los calmó» es natural y fiel al resultado buscado.
- source_word: εὐμενεῖς ἐποίησεν
  english_pob_choice: made them well-disposed
  chosen_spanish: los hizo bien dispuestos
  alternatives_spanish:
  - les ganó la buena voluntad
  - los dejó favorables
  lexicon: LSJ
  rationale: La construcción causativa expresa que quedaron con actitud favorable. «Bien dispuestos» reproduce el matiz de disposición favorable sin forzar un idioma más interpretativo.
- source_word: ἀνέζευξεν
  english_pob_choice: returned to Antioch
  chosen_spanish: regresó a Antioquía
  alternatives_spanish:
  - se retiró a Antioquía
  - volvió a Antioquía
  - levantó campamento y regresó a Antioquía
  lexicon: LSJ
  rationale: Según la revisión del POB, el verbo apunta a partir o levantar campamento más que a un “marchar” específico. «Regresó» capta el movimiento de vuelta sin sobretraducir el aspecto militar.
- source_word: ἐφόδου
  english_pob_choice: attack
  chosen_spanish: ataque
  alternatives_spanish:
  - asalto
  - avance
  lexicon: LSJ
  rationale: En este resumen de campaña, «ataque» expresa bien el movimiento hostil del rey y mantiene la concisión del original.
- source_word: ἀναζυγῆς
  english_pob_choice: withdrawal
  chosen_spanish: retirada
  alternatives_spanish:
  - retreat
  - repliegue
  - levantamiento de campamento
  lexicon: LSJ
  rationale: El sustantivo alude a la vuelta o retirada militar, con posible idea de levantar campamento. «Retirada» conserva ese sentido sin estrecharlo indebidamente.
theological_decisions:
- issue: Tensión entre el movimiento militar del rey y la formulación resumida del final del verso
  english_pob_reading: The king’s attack and withdrawal proceeded.
  chosen_spanish_reading: Así, el ataque y la retirada del rey siguieron su curso.
  alternative_spanish_readings:
  - Así, el ataque y la retirada del rey ocurrieron.
  - Así, el ataque y el repliegue del rey prosiguieron.
  rationale: El griego cierra con una síntesis narrativa de la campaña. «Siguieron su curso» reproduce el valor resumidor de ἐχώρησεν sin añadir una interpretación más fuerte que el texto no exige.
  doctrine_reference: 'DOCTRINE.md: preserve narrative restraint; do not collapse military summary into paraphrase'
translation_notes:
  revision_awareness: Se siguió la revisión auditada del POB que prefirió «returned to Antioch» sobre una formulación más militarizada, porque ἀνέζευξεν apunta a partir o levantar campamento más que a «marcharse» en sentido técnico. La traducción española conserva esa moderación con «regresó».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se eligió «tribunal» para βῆμα por coherencia con el contexto judicial y con la decisión inglesa auditada.
  - Se usó «retirada» para ἀναζυγή por equivalencia natural en español, conservando el matiz militar sin exagerarlo.
