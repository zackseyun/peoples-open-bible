translation:
  language: es
  text: Quien derrame la sangre de un ser humano[a], por un ser humano su sangre será derramada; porque Dios hizo al ser humano a su imagen[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ser humano» aquí traduce אָדָם en sentido genérico, es decir, una persona humana o la humanidad, no varones solamente.
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «porque en la imagen de Dios hizo al ser humano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁפֵךְ
  english_pob_choice: Whoever sheds
  chosen_spanish: El que derrame
  alternatives_spanish:
  - Quien derrame
  - El que derrama
  lexicon: HALOT
  rationale: El participio qal tiene valor genérico y proverbial. «El que derrame» conserva ese tono jurídico y suena natural en español; el subjuntivo mantiene la generalidad normativa sin volverlo narrativo.
- source_word: דַּם
  english_pob_choice: blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre vital
  - la sangre derramada
  lexicon: HALOT
  rationale: En este contexto denota la vida arrebatada por violencia. «La sangre» es la forma directa y estable en español para el giro de derramamiento de sangre.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: de un ser humano
  alternatives_spanish:
  - del hombre
  - de la humanidad
  - de una persona
  lexicon: HALOT
  rationale: Aquí אָדָם es genérico y no masculino exclusivo. «Ser humano» preserva el valor universal sin introducir ambigüedad de sexo, y funciona bien en el primer miembro de la frase.
- source_word: בָּאָדָם
  english_pob_choice: by man
  chosen_spanish: por un ser humano
  alternatives_spanish:
  - por el hombre
  - por la humanidad
  - por una persona
  lexicon: HALOT
  rationale: La preposición ב aquí tiene sentido instrumental/agentivo. «Por un ser humano» expresa con naturalidad que la retribución o ejecución corresponde a acción humana, manteniendo el paralelismo con אָדָם.
- source_word: דָּמוֹ
  english_pob_choice: his blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - su propia sangre
  - la sangre de él
  lexicon: HALOT
  rationale: El sufijo pronominal se conserva literalmente. En español, el contexto deja claro que se refiere al homicida, por lo que «su sangre» es suficiente y no recarga la frase.
- source_word: יִשָּׁפֵךְ
  english_pob_choice: shall be shed
  chosen_spanish: será derramada
  alternatives_spanish:
  - deberá ser derramada
  - será vertida
  lexicon: HALOT
  rationale: El nifal imperfecto se traduce en voz pasiva. «Será derramada» conserva el tono solemne y legal; «deberá» añadiría obligación explícita no marcada por la forma verbal.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base o razón de la norma anterior. «Porque» es la equivalencia más natural y clara en español contemporáneo.
- source_word: בְּצֶלֶם אֱלֹהִים
  english_pob_choice: in his image
  chosen_spanish: a su imagen
  alternatives_spanish:
  - en su imagen
  - a imagen de Dios
  - en la imagen de Dios
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en la imagen de Dios». Como el sujeto de עָשָׂה es Dios, el español puede expresar el mismo sentido con «a su imagen», una formulación idiomática y fiel que evita repetición innecesaria.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El verbo singular עָשָׂה exige sentido singular aquí. «Dios» es la equivalencia directa y normal en español.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo al
  - creó
  - formó
  lexicon: HALOT
  rationale: עָשָׂה suele significar «hacer». «Hizo» es la forma más directa y evita introducir el matiz técnico de «crear» que correspondería a ברא.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: al ser humano
  alternatives_spanish:
  - al hombre
  - a la humanidad
  - a la persona humana
  lexicon: HALOT
  rationale: Se mantiene la referencia genérica de אָדָם al final del versículo. «Al ser humano» preserva la universalidad y la conexión retórica con las ocurrencias previas del término.
theological_decisions:
- issue: Alcance genérico de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: ser humano
  alternative_spanish_readings:
  - hombre
  - humanidad
  - persona
  rationale: El hebreo usa אָדָם de manera representativa y universal. En español, «ser humano» comunica con claridad que no se limita a varones, sin perder el carácter singular y proverbial del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Sentido de בָּאָדָם en la retribución
  english_pob_reading: by man shall his blood be shed
  chosen_spanish_reading: por un ser humano su sangre será derramada
  alternative_spanish_readings:
  - por el hombre su sangre será derramada
  - su sangre será derramada entre los hombres
  - su sangre será derramada por la humanidad
  rationale: La construcción puede leerse como agente/medio en una afirmación jurídica. «Por un ser humano» mantiene esa responsabilidad humana sin convertir la línea en una paráfrasis doctrinal más amplia de lo que exige el hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Cláusula de la imagen de Dios
  english_pob_reading: for God made man in his image
  chosen_spanish_reading: porque Dios hizo al ser humano a su imagen
  alternative_spanish_readings:
  - porque en la imagen de Dios lo hizo
  - porque en su imagen hizo Dios al ser humano
  rationale: 'El hebreo fundamenta la norma en la imagen de Dios. El español conserva el contenido teológico central: la dignidad especial del ser humano por haber sido hecho conforme a la imagen divina.'
  doctrine_reference: Génesis 1:26-27; DOCTRINE.md §Imago Dei
- issue: Valor legal-proverbial del versículo
  english_pob_reading: Whoever sheds... shall be shed
  chosen_spanish_reading: El que derrame... será derramada
  alternative_spanish_readings:
  - Quien derrame... deberá ser derramada
  - El que derrama... se le derramará
  rationale: La forma verbal y el orden mantienen el tono sentencioso y recíproco del hebreo, sin añadir explicaciones sobre ejecución, proceso judicial o pena más allá de lo que el texto expresa.
  doctrine_reference: Génesis 9:5-6
translation_notes:
  revision_awareness: La base inglesa presenta alta concordancia con revisiones menores pendientes, sin cambios sustantivos en el sentido. En español se optó por una equivalencia óptima que conserva el paralelismo de אָדָם, la voz pasiva legal de יִשָּׁפֵךְ y la cláusula de la imago Dei, evitando masculinizar innecesariamente el término genérico.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים por el singular verbal del contexto.
  - Se traduce אָדָם de manera consistente con 'ser humano' para evitar sesgo masculino, dado que el hebreo es genérico aquí.
  - Se conserva la pasiva solemne 'será derramada' para reflejar el nifal sin añadir obligación explícita.
  - '''A su imagen'' mantiene la referencia teológica y suena natural en español; la nota preserva la alternativa más literal.'
