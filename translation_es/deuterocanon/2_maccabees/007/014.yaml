revisions:
- from: 'Y cuando estaba a punto de morir, dijo esto: «Es preferible, cuando se muere a manos de hombres, esperar las esperanzas dadas por Dios, de que uno será resucitado de nuevo por él[a]. Pero para ustedes no habrá resurrección para vida[b]».'
  to: 'Y cuando estaba a punto de morir, dijo esto: «Es preferible, cuando se muere a manos de hombres, aguardar las esperanzas dadas por Dios: ser levantado otra vez por él[a]. Pero para ti no habrá resurrección a vida[b]».'
  rationale: Se corrige el singular del destinatario para ajustarlo al griego. Se suavizan dos calcos duros del inglés/griego («esperar las esperanzas», «uno será resucitado de nuevo por él») con formulaciones más naturales en español, sin perder el plural de las esperanzas ni la agencia divina en la resurrección. También se afina «para vida» a «a vida» por claridad y fluidez.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:55:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro de auditoría inglés: conserva la inminencia de la muerte, la preferibilidad del martirio frente a la esperanza dada por Dios, la agencia divina en la resurrección y la frase teológicamente cargada «resurrección ... a vida». Sin embargo, presenta dos problemas de fidelidad/formulación: cambia el singular del destinatario griego (σοὶ) a plural («ustedes») y usa expresiones poco naturales o demasiado calcadas («esperar las esperanzas», «uno será resucitado de nuevo por él»).'
  spanish_quality_summary: La redacción es comprensible, pero suena rígida en puntos clave. «Esperar las esperanzas» es gramatical pero muy poco idiomático en español; conviene una formulación que preserve el plural sin sonar torpe. «De que uno será resucitado de nuevo por él» también resulta pesada; «ser levantado otra vez por él» o una estructura equivalente mejora la legibilidad sin perder el sentido. «Resurrección para vida» puede afinarse a «resurrección a vida» para sonar más natural y seguir siendo formal.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεοῦ está bien como «Dios». No aparecen Yahvé/Mesías/Cristo/espíritu/esclavo, etc. La decisión teológica de mantener la tensión en «resurrección a vida» está bien alineada con la nota inglesa.'
  issues:
  - severity: high
    issue: Cambio indebido de singular a plural en el destinatario final
    rationale: El griego σοὶ μὲν γὰρ es singular («pero para ti»), y el inglés POB también tiene singular («for you»). El borrador dice «para ustedes», alterando el número y la fuerza del reproche dirigido al tirano.
  - severity: medium
    issue: «Esperar las esperanzas» suena excesivamente calcado
    rationale: Aunque intenta preservar el plural ἐλπίδας, en español esta secuencia resulta poco natural y distrae. Puede mantenerse el plural semántico con «aguardar las cosas esperadas dadas por Dios» o, más fluidamente, con una ligera recodificación que aún preserve el sentido de esperanzas procedentes de Dios.
  - severity: medium
    issue: «Uno será resucitado de nuevo por él» es torpe en español
    rationale: La combinación de «uno», futuro pasivo y «de nuevo» produce una frase pesada. El sentido pasivo y la agencia divina pueden conservarse mejor con «ser levantado otra vez por él» o «ser resucitado otra vez por él» dentro de una estructura más natural.
  - severity: low
    issue: «Resurrección para vida» es menos natural que «resurrección a vida»
    rationale: Ambas son defendibles para εἰς ζωὴν, pero «a vida» suena más compacta y natural en español bíblico moderno, manteniendo la tensión teológica recogida por la nota.
  revised_spanish_text: 'Y cuando estaba a punto de morir, dijo esto: «Es preferible, cuando se muere a manos de hombres, aguardar las esperanzas dadas por Dios: ser levantado otra vez por él[a]. Pero para ti no habrá resurrección a vida[b]».'
  revised_footnotes:
