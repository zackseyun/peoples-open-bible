base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/039/011.yaml
  text: And it will be in that day that I will give Gog a burial place there in Israel[a], the Valley of the Passersby, east of the sea; and it will block the passersby. There they will bury Gog and all his multitude[c][b], and they will call it the Valley of Hamon-gog.
  footnotes:
  - marker: a
    text: Or 'the valley of those who pass by' / 'the valley of the passersby.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in front of the sea'; the Hebrew expression may denote orientation rather than strict eastward direction.
    reason: lexical_alternative
  - marker: c
    text: Hamon-gog likely means 'multitude of Gog.'
    reason: lexical_alternative
