translation:
  language: es
  text: Y una vasija de barro en la que sea hervida será quebrada; pero si es hervida en una vasija de bronce[a], esta será fregada a fondo y enjuagada con agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vasija de cobre». El hebreo נְחֹשֶׁת puede referirse a cobre o bronce según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְלִי חֶרֶשׂ
  english_pob_choice: earthenware vessel
  chosen_spanish: vasija de barro
  alternatives_spanish:
  - vasija de cerámica
  - recipiente de barro
  lexicon: HALOT
  rationale: כְלִי es un término general para recipiente o vasija, y חֶרֶשׂ especifica un material de barro/alfarería. «Vasija de barro» comunica bien la distinción material en español natural y conserva el contraste ritual del pasaje.
- source_word: תְּבֻשַּׁל / בֻּשָּׁלָה
  english_pob_choice: is boiled
  chosen_spanish: se haya cocido / se ha cocido
  alternatives_spanish:
  - se hierva / se haya hervido
  - se cocine / se haya cocinado
  lexicon: HALOT
  rationale: בשל en este contexto sacrificial puede referirse a cocer o hervir. En español, «cocer» es más amplio y natural para una vasija usada en preparación ritual; mantiene el pasivo y no fuerza solo el sentido de hervido.
- source_word: בּוֹ
  english_pob_choice: in which
  chosen_spanish: en la que
  alternatives_spanish:
  - en ella
  - donde
  lexicon: HALOT
  rationale: El sufijo pronominal remite a la vasija. «En la que» conserva la relación locativa de modo idiomático en español.
- source_word: יִשָּׁבֵר
  english_pob_choice: must be broken
  chosen_spanish: será quebrada
  alternatives_spanish:
  - debe ser quebrada
  - tendrá que romperse
  lexicon: HALOT
  rationale: En material legal, el imperfecto niphal expresa una instrucción obligatoria. «Será quebrada» mantiene el tono normativo sin recurrir necesariamente a una perífrasis más explicativa.
- source_word: כְלִי נְחֹשֶׁת
  english_pob_choice: bronze vessel
  chosen_spanish: vasija de bronce
  alternatives_spanish:
  - vasija de cobre
  - recipiente de bronce
  lexicon: HALOT
  rationale: נְחֹשֶׁת puede referirse a cobre o bronce según el contexto. «Bronce» sigue la decisión de la POB inglesa para el metal de utensilios antiguos y evita el «bronce» tradicional sin explicación adicional ni el anacronismo de «latón».
- source_word: וּמֹרַק
  english_pob_choice: it must be scoured
  chosen_spanish: será restregada
  alternatives_spanish:
  - será fregada
  - será limpiada a fondo
  lexicon: HALOT
  rationale: מרק expresa frotar o limpiar vigorosamente. «Restregada» conserva la fuerza física del verbo y funciona bien junto con la acción siguiente de enjuagar.
- source_word: וְשֻׁטַּף בַּמָּיִם
  english_pob_choice: and rinsed with water
  chosen_spanish: y enjuagada con agua
  alternatives_spanish:
  - y lavada con agua
  - y aclarada con agua
  lexicon: HALOT
  rationale: שטף implica lavar/enjuagar con agua corriente o abundante. «Enjuagada» acompaña naturalmente a «restregada» y mantiene la secuencia de limpieza ritual.
translation_notes:
  revision_awareness: La revisión más reciente indica alto acuerdo y no aplicó cambios; se conserva la solución principal del audit trail inglés, con adaptación natural al español y sin añadir interpretaciones no sustentadas por el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preserva el registro legal-ritual del mandato mediante futuros/ perífrasis pasivas en español.
  - «Vasija» se usa de forma consistente para כְלִי; «barro» y «bronce» distinguen claramente los materiales.
  - Se evita traducir mecánicamente con «cocido» como simple sinónimo de «cocinado»; aquí intenta reflejar el uso ritual de preparación por calor.
