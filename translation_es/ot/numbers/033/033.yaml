  rationale: Se conserva el nombre propio y la relación preposicional de procedencia con «de». Se translitera el topónimo con adaptación ortográfica española mínima para la legibilidad.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y levantaron campamento
  lexicon: HALOT
  rationale: חנה en contextos de itinerario indica detenerse para acampar. «Acamparon» es natural, claro y fiel al sentido del movimiento en la lista de estaciones.
- source_word: בְּיָטְבָתָה
