translation:
  language: es
  text: Y sin embargo[a], aun si nuestra ley no fuera verdaderamente divina, como tú supones, aunque nosotros pensamos que es divina, de todos modos no tendrías derecho a anular nuestra honra por nuestra piedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra reputación de piedad». La frase griega puede expresar honra o reputación fundadas en la reverencia a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: καίτοι
  english_pob_choice: And yet
  chosen_spanish: Y sin embargo
  alternatives_spanish:
  - No obstante
  - Y aun así
  lexicon: LSJ
  rationale: Expresa bien el giro concesivo-adversativo con fuerza retórica, sin sonar forzado en español.
- source_word: κατὰ ἀλήθειαν
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - en verdad
  - realmente
  lexicon: LSJ
  rationale: Mantiene el valor adverbial de ‘en realidad / truly’ aplicado a la afirmación sobre la ley.
- source_word: ὁ νόμος ἡμῶν
  english_pob_choice: our law
  chosen_spanish: nuestra ley
  alternatives_spanish:
  - nuestra Ley
  - nuestra Torá
  lexicon: LSJ
  rationale: ‘Ley’ refleja el término griego sin añadir una glosa doctrinal; el posesivo preserva la referencia identitaria del grupo.
- source_word: θεῖος
  english_pob_choice: divine
  chosen_spanish: divina
  alternatives_spanish:
  - de Dios
  - procedente de Dios
  lexicon: LSJ
  rationale: ‘Divina’ reproduce directamente el adjetivo griego sin ampliar la afirmación más allá de lo que el texto dice.
- source_word: ὑπολαμβάνεις
  english_pob_choice: you suppose
  chosen_spanish: supones
  alternatives_spanish:
  - piensas
  - presupones
  lexicon: LSJ
  rationale: Conserva el matiz de juicio atribuido al interlocutor en un registro ligeramente polémico.
- source_word: νομίζομεν
  english_pob_choice: we think
  chosen_spanish: pensamos
  alternatives_spanish:
  - consideramos
  - sostenemos
  lexicon: LSJ
  rationale: Mantiene la contraposición explícita entre la suposición del adversario y la convicción del hablante sin sobrerreformularla.
- source_word: οὐδὲ οὕτως ἔχων
  english_pob_choice: even so
  chosen_spanish: de todos modos
  alternatives_spanish:
  - aun así
  - en tal caso
  lexicon: LSJ
  rationale: Resume naturalmente la concesión y evita una construcción demasiado literal que sonarìa pesada en español.
- source_word: ἀκυρῶσαι
  english_pob_choice: nullify
  chosen_spanish: anular
  alternatives_spanish:
  - invalidar
  - dejar sin efecto
  lexicon: LSJ
  rationale: ‘Anular’ comunica bien la idea jurídica de hacer ineficaz o sin valor algo.
- source_word: τὴν ἐπὶ τῇ εὐσεβείᾳ δόξαν
  english_pob_choice: our honor in matters of piety
  chosen_spanish: nuestra reputación en materia de piedad
  alternatives_spanish:
  - nuestro honor en cosas de piedad
  - nuestra honra por nuestra piedad
  - nuestra reputación piadosa
  lexicon: LSJ
  rationale: La expresión griega puede denotar estatus honorífico o repute fundado en la reverencia a Dios; ‘reputación’ preserva ese sentido social sin perder la dimensión religiosa de εὐσέβεια.
theological_decisions:
- issue: Valor de θεῖος aplicado a la ley
  english_pob_reading: rendered as 'divine' without expanding to 'given by God'
  chosen_spanish_reading: ‘divina’ sin ampliar a ‘de Dios’
  alternative_spanish_readings:
  - ‘de Dios’
  - ‘dada por Dios’
  rationale: El griego afirma que la ley es ‘divina’; la traducción conserva ese nivel exacto de afirmación y evita introducir una formulación más fuerte que el texto no exige.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de δόξα en la frase sobre εὐσέβεια
  english_pob_reading: our honor in matters of piety
  chosen_spanish_reading: nuestra reputación en materia de piedad
  alternative_spanish_readings:
  - nuestra honra en asuntos de piedad
  - nuestro honor por la piedad
  rationale: Aquí δόξα apunta a prestigio/renombre o condición honorífica. ‘Reputación’ conserva mejor ese componente social y encaja con el marco argumentativo del pasaje.
  doctrine_reference: Translation philosophy §5, §6
- issue: εὐσέβεια como virtud religiosa
  english_pob_reading: piety
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - religiosidad
  rationale: ‘Piedad’ preserva la categoría ética y religiosa propia de 4 Macabeos, sin reducirla a mera religiosidad externa.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca el último pase inglés, conservando el giro concesivo (‘And yet’ → ‘Y sin embargo’) y la relación entre la suposición del interlocutor, la convicción del hablante y la cláusula final sobre anular la honra/reputación. Se evitó endurecer θεῖος como ‘de Dios’ y se mantuvo la tensión léxica de δόξα + εὐσέβεια con una nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como terminología base del proyecto solo cuando corresponda; este versículo no lo contiene.
  - ‘Ley’ se usó en minúscula porque el griego no marca capitalización; el referente sigue siendo la ley judía.
  - ‘Piedad’ se preservó para εὐσέβεια en la nota y en el sentido del texto, manteniendo coherencia con el léxico del proyecto.
  - ‘Anular’ se eligió por su fuerza jurídico-textual y por correspondencia con ἀκυρόω, evitando un matiz más suave como ‘invalidar’.
