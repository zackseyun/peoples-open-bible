  to: Egipto se convertirá en desolación, y Edom en un desierto de desolación, por la violencia contra[a] los hijos de Judá[b], cuya sangre inocente[c] derramaron en su tierra.
  rationale: Se corrige un error gramatical importante ('cuya' en lugar de 'cuyo') y se reubican las notas para que correspondan exactamente a las alternativas léxicas documentadas en el POB inglés. También se mejora la naturalidad de 'violencia contra' sin apartarse del hebreo ni del expediente auditado.
