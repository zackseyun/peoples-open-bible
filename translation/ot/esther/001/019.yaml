id: EST.1.19
reference: Esther 1:19
source:
  edition: WLC
  text: אִם עַל הַ/מֶּ֣לֶךְ ט֗וֹב יֵצֵ֤א דְבַר מַלְכוּת֙ מִ/לְּ/פָנָ֔י/ו וְ/יִכָּתֵ֛ב בְּ/דָתֵ֥י פָֽרַס וּ/מָדַ֖י וְ/לֹ֣א יַעֲב֑וֹר אֲשֶׁ֨ר לֹֽא תָב֜וֹא וַשְׁתִּ֗י לִ/פְנֵי֙ הַ/מֶּ֣לֶךְ אֲחַשְׁוֵר֔וֹשׁ וּ/מַלְכוּתָ/הּ֙ יִתֵּ֣ן הַ/מֶּ֔לֶךְ לִ/רְעוּתָ֖/הּ הַ/טּוֹבָ֥ה מִמֶּֽ/נָּה־־־־־׃
translation:
  text: 'If it seems good to the king[a], let a royal decree go out from before him and be written among the laws of Persia and Media, so that it may not be revoked: that Vashti is not to come before King Ahasuerus[c][b], and let the king give her royal position to another woman better than she.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If it pleases the king.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that it may not be altered' or 'so that it may not be transgressed.' The Hebrew idiom refers to the decree's fixed legal force.
    reason: lexical_alternative
  - marker: c
    text: Literally 'her royalty' or 'her queenship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם עַל־הַמֶּלֶךְ טוֹב
  chosen: If it seems good to the king
  alternatives:
  - If it pleases the king
  - If it is good in the king's sight
  lexicon: HALOT
  rationale: This idiom introduces a deferential courtly proposal. 'Seems good to the king' is natural modern English while preserving the sense of royal approval. 'Pleases the king' is possible, but 'seems good' stays closer to the Hebrew טוב construction.
- source_word: יֵצֵא דְבַר מַלְכוּת מִלְּפָנָיו
  chosen: let a royal decree go out from him
  alternatives:
  - let a word of kingship go out from him
  - let an edict issue from his presence
  lexicon: HALOT
  rationale: דְבַר מַלְכוּת refers to an official royal pronouncement, not merely a 'word.' 'Royal decree' captures the legal-administrative force in idiomatic English. 'From him' reflects מִלְּפָנָיו in context as issuance from the king's authority.
- source_word: וְיִכָּתֵב בְּדָתֵי פָרַס וּמָדַי
  chosen: and be written among the laws of Persia and Media
  alternatives:
  - and be written in the laws of Persia and Media
  - and be recorded among the statutes of Persia and Media
  lexicon: HALOT
  rationale: The passive expresses formal inscription into the legal corpus. 'Among the laws' communicates incorporation into the recognized body of law. 'Persia and Media' follows the Hebrew order.
- source_word: וְלֹא יַעֲבוֹר
  chosen: so that it may not be revoked
  alternatives:
  - and not be transgressed
  - and not pass away
  - and not be altered
  lexicon: HALOT
  rationale: In this legal context, the idiom means the decree is not to be set aside or rescinded. 'Revoked' best conveys the force in contemporary legal English, rather than the more wooden 'not pass over' or 'not be transgressed.'
- source_word: אֲשֶׁר לֹא תָבוֹא וַשְׁתִּי לִפְנֵי הַמֶּלֶךְ
  chosen: that Vashti is not to come before
  alternatives:
  - that Vashti shall not come before
  - namely, that Vashti must not come before
  lexicon: HALOT
  rationale: This clause gives the content of the decree. 'Is not to come before' is clear, idiomatic, and preserves the prohibitive force without sounding archaic.
- source_word: לִפְנֵי הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: King Ahasuerus
  alternatives:
  - the king, Ahasuerus
  lexicon: HALOT
  rationale: English normally places the royal title before the name. This preserves both the title and the personal name without awkwardness.
- source_word: וּמַלְכוּתָהּ
  chosen: her royal position
  alternatives:
  - her queenship
  - her kingdom
  - her royalty
  lexicon: HALOT
  rationale: Here מַלְכוּת refers not to a territorial kingdom but to Vashti's royal status or office as queen. 'Royal position' is clear and avoids the potentially abstract or uncommon 'queenship.'
- source_word: יִתֵּן הַמֶּלֶךְ לִרְעוּתָהּ
  chosen: let the king give ... to another woman
  alternatives:
  - let the king give ... to her companion
  - let the king give ... to her neighbor
  lexicon: HALOT
  rationale: רְעוּת can denote another woman/companion in relation to her. In this context of replacing Vashti, 'another woman' best conveys the intended referent in natural English.
- source_word: הַטּוֹבָה מִמֶּנָּה
  chosen: better than she
  alternatives:
  - better than her
  - more worthy than she
  lexicon: HALOT
  rationale: The phrase is comparative. 'Better than she' is a slightly more formal but still natural rendering after 'another woman,' and preserves the evaluative comparison without adding moral specifics not stated in the Hebrew.
