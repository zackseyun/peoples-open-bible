    rationale: Aunque יָשָׁר puede significar «recto», en Proverbios 16:25 el punto no es la rectitud geométrica o moral afirmada objetivamente, sino lo que a alguien le parece correcto. En español, «le parece recto» es comprensible pero menos natural y menos preciso pragmáticamente que «le parece correcto».
  revised_spanish_text: Hay un camino que le parece correcto a un hombre, pero su fin son los caminos de muerte.
  revision_rationale: Se ajusta solo «recto» a «correcto» para lograr un español más natural y expresar con mayor precisión el valor evaluativo-subjetivo del hebreo en este contexto. Se conservan «un hombre» por fidelidad al singular representativo y «los caminos de muerte» para mantener el plural del texto fuente.
