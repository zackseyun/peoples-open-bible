translation:
  language: es
  text: Y a la medianoche, Yahvé derribó[a] a todo primogénito en la tierra de Egipto, desde el primogénito de Faraón, que estaba sentado en su trono, hasta el primogénito del cautivo, que estaba en el foso de la prisión[b], y a todo primogénito del ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "hirió de muerte".
    reason: lexical_alternative
  - marker: b
    text: O "del prisionero que estaba en el calabozo"; literalmente, "en la casa del pozo".
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y aconteció que...
  alternatives_spanish:
  - Y sucedió que...
  - Y fue que...
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva introduce la secuencia del relato. En español, 'Y aconteció que' conserva ese avance narrativo sin perder el tono bíblico ni volverse demasiado arcaico.
- source_word: בַּחֲצִי הַלַּיְלָה
  english_pob_choice: at midnight
  chosen_spanish: a la medianoche
  alternatives_spanish:
  - en medio de la noche
  - a mitad de la noche
  lexicon: HALOT
  rationale: La expresión idiomática hebrea significa literalmente 'en la mitad de la noche'. 'A la medianoche' es el equivalente español natural y preciso, como en la decisión inglesa auditada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del texto hebreo. El proyecto POB fija 'Yahvé' en español para יְהוָה, manteniendo la decisión teológica de no sustituirlo por un título como 'Señor'.
- source_word: הִכָּה
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - derribó
  - hizo morir
  lexicon: HALOT
  rationale: נכה expresa 'golpear, herir, herir mortalmente' según el contexto. 'Hirió' conserva el verbo de impacto sin interpretar de más como 'mató', aunque el resultado narrativo sea la muerte de los primogénitos.
- source_word: כָל בְּכוֹר
  english_pob_choice: every firstborn
  chosen_spanish: todo primogénito
  alternatives_spanish:
  - cada primogénito
  - todo hijo primogénito
  lexicon: HALOT
  rationale: בכור designa al primogénito. 'Todo primogénito' refleja el alcance distributivo de כָל y mantiene el sustantivo de pertenencia familiar en un español bíblico claro.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  - en Egipto
  lexicon: HALOT
  rationale: '''Tierra'' reproduce bien la fórmula geográfica y literaria del hebreo, y en español mantiene el registro formal sin perder inteligibilidad.'
- source_word: מִבְּכֹר פַּרְעֹה
  english_pob_choice: from the firstborn of Pharaoh
  chosen_spanish: desde el primogénito de Faraón
  alternatives_spanish:
  - desde el primogénito de Faraón
  - del primogénito de Faraón
  lexicon: HALOT
  rationale: La construcción de rango מן...עד se expresa naturalmente con 'desde... hasta...'. 'Primogénito de Faraón' conserva la estructura del hebreo y evita reinterpretar el término como mero 'hijo'.
- source_word: הַיֹּשֵׁב עַל כִּסְאוֹ
  english_pob_choice: who sat on his throne
  chosen_spanish: que se sentaba sobre su trono
  alternatives_spanish:
  - que estaba sentado sobre su trono
  - que se sienta sobre su trono
  - que se sentaba en su trono
  lexicon: HALOT
  rationale: El participio describe la condición real de Faraón. 'Se sentaba sobre su trono' conserva el trasfondo de entronización y se ajusta al tiempo narrativo del versículo.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - incluso hasta
  lexicon: HALOT
  rationale: En la serie de alcance מן...עד, 'hasta' es el correlato natural de 'desde' en español y marca el límite inclusivo del juicio.
- source_word: בְּכוֹר הַשְּׁבִי
  english_pob_choice: the firstborn of the captive
  chosen_spanish: el primogénito del cautivo
  alternatives_spanish:
  - el primogénito del preso
  - el primogénito del prisionero
  lexicon: HALOT
  rationale: שבי se refiere a una persona tomada cautiva. 'Cautivo' es más amplio y fiel que 'prisionero' como término aislado, y mantiene el contraste social del pasaje.
- source_word: אֲשֶׁר בְּבֵית הַבּוֹר
  english_pob_choice: who was in the prison pit
  chosen_spanish: que estaba en la casa del pozo
  alternatives_spanish:
  - que estaba en la prisión
  - que estaba en el calabozo
  - que estaba en el pozo de la prisión
  lexicon: HALOT
  rationale: בור significa literalmente 'pozo/pit' y, en contexto de encierro, alude a un lugar de reclusión. 'Casa del pozo' preserva los dos elementos concretos del hebreo sin resolverlos del todo en un término más abstracto como 'calabozo'. Esto deja visible la tensión lexical documentada por la fuente.
- source_word: וְכֹל בְּכוֹר בְּהֵמָה
  english_pob_choice: and every firstborn of the livestock
  chosen_spanish: y a todo primogénito del ganado
  alternatives_spanish:
  - y a todo primogénito de los animales
  - y a todo primogénito del ganado
  lexicon: HALOT
  rationale: בהמה aquí se refiere a animales domésticos/ganado. 'Ganado' es natural en español bíblico y suficientemente amplio para reflejar la referencia a los animales de crianza, sin restringirla indebidamente a solo 'reses'.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la política del proyecto, se mantiene el nombre propio de Dios en español como 'Yahvé', en lugar de sustituirlo por 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the plague verb הִכָּה
  english_pob_reading: struck down
  chosen_spanish_reading: hirió
  alternative_spanish_readings:
  - mató
  - golpeó mortalmente
  - hirió de muerte
  rationale: La lectura inglesa preserva la imaginería del golpe sin reducirla de inmediato a 'killed'. En español, 'hirió' mantiene esa misma fuerza verbal y deja que el contexto narre el efecto mortal.
  doctrine_reference: HALOT / contexto narrativo de Éxodo 12:29
- issue: Meaning of בְּבֵית הַבּוֹר
  english_pob_reading: in the prison pit
  chosen_spanish_reading: en la casa del pozo
  alternative_spanish_readings:
  - en el calabozo
  - en la prisión-pit
  - en la fosa de la prisión
  rationale: La fuente conserva 'prison pit' como expresión concreta, evitando neutralizarla en simple 'prison'. 'Casa del pozo' deja visibles tanto בית como בור, preservando la tensión entre edificio/lugar y pozo/fosa.
  doctrine_reference: HALOT; lexical tension in the Hebrew source
translation_notes:
  revision_awareness: 'El borrador sigue la lectura auditada en inglés (optimal-equivalence) y mantiene sus decisiones clave: nombre divino como Yahvé, rango ''desde... hasta...'', y la expresión concreta ''prison pit'' sin aplanarla. Se adaptó el registro al español con equivalencias naturales, pero conservando la fuerza narrativa y la tensión lexical donde la fuente la documenta.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה, conforme al estándar del proyecto.
  - '''Primogénito'' traduce בכור en todas sus apariciones dentro del versículo.'
  - Se conserva el paralelismo de rango con 'desde... hasta...'.
  - '''Ganado'' representa בהמה en un sentido amplio de animales domésticos, coherente con el contexto de la plaga.'
