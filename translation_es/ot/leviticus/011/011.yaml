translation:
  language: es
  text: Y les serán detestables; no comerán nada de la carne de esos animales[a], y tendrán por detestables sus carcasas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: "abominable". El hebreo expresa algo ritualmente repulsivo o detestable en este contexto alimentario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁקֶץ
  english_pob_choice: detestable
  chosen_spanish: cosa detestable
  alternatives_spanish:
  - abominación
  - detestable
  - cosa abominable
  lexicon: HALOT
  rationale: El sustantivo hebreo expresa repulsión ritual en este contexto alimentario. En español, 'cosa detestable' conserva el valor evaluativo sin cargar de más el término con un matiz moral generalizado que el pasaje no exige.
- source_word: יִהְיוּ לָכֶם
  english_pob_choice: they shall be to you
  chosen_spanish: serán para ustedes
  alternatives_spanish:
  - serán para ustedes cosa detestable
  - les serán
  - serán de ustedes
  lexicon: HALOT
  rationale: La construcción se conserva con el complemento dativo implícito en español. 'Para ustedes' refleja la relación de prohibición/regard hacia estos animales sin forzar una paráfrasis.
- source_word: מִבְּשָׂרָם
  english_pob_choice: any of their flesh
  chosen_spanish: nada de su carne
  alternatives_spanish:
  - de su carne
  - alguna de su carne
  - parte de su carne
  lexicon: HALOT
  rationale: Tras la negación, el מן partitivo se expresa naturalmente como 'nada de su carne', que comunica la prohibición total de comer de ella. Se mantiene el sustantivo 'carne' según el valor léxico básico.
- source_word: נִבְלָתָם
  english_pob_choice: their carcasses
  chosen_spanish: sus cadáveres
  alternatives_spanish:
  - sus carroñas
  - sus cadáveres
  - sus cuerpos muertos
  lexicon: HALOT
  rationale: נְבֵלָה designa el cuerpo muerto del animal. 'Cadáveres' es preciso y natural en español; 'carroñas' sería más marcado y menos neutral, aunque posible en ciertos registros.
- source_word: תְּשַׁקֵּצוּ
  english_pob_choice: regard ... as detestable
  chosen_spanish: tendrán por detestables
  alternatives_spanish:
  - los considerarán detestables
  - los aborrecerán
  - los tratarán como detestables
  lexicon: HALOT
  rationale: El verbo piel vinculado a שֶׁקֶץ expresa tratar/considerar como repulsivo o detestable. 'Tendrán por detestables' reproduce bien el juicio ritual y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Lenguaje de repulsión ritual vs. moralización
  english_pob_reading: Render the terms with ritual-revulsion language ('detestable') rather than moralized language like 'abomination.'
  chosen_spanish_reading: 'Conservar lenguaje de repulsión ritual: ''cosa detestable'' / ''detestables''.'
  alternative_spanish_readings:
  - abominación / abominable
  - inmundo
  - impuro
  rationale: El pasaje trata de distinciones alimentarias de pureza ritual. 'Detestable' y 'cosa detestable' preservan esa fuerza sin trasladar el texto a una categoría moral más amplia ni reemplazar el término con 'impuro', que sería menos preciso aquí.
  doctrine_reference: Principio de primacía del texto original; distinciones rituales de Levítico 11 sin sobreextensión doctrinal
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés al mantener la coordinación inicial con 'Y' implícito en la construcción española, y se conservó la secuencia de las tres cláusulas con puntuación fuerte entre la primera y la segunda. La decisión española opta por una formulación idiomática que refleja el partitivo hebreo y el valor ritual de שֶׁקֶץ y תְּשַׁקֵּצוּ.
  spanish_consistency_notes:
  - Se mantuvo 'detestable' como eje léxico para שֶׁקֶץ y תְּשַׁקֵּצוּ.
  - Se usó 'carne' para בשר y 'cadáveres' para נבלות, evitando términos más interpretativos.
  - La puntuación con punto y coma ayuda a reflejar la estructura coordinada del hebreo y la revisión inglesa reciente.
