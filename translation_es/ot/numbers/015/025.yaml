  text: וְ/כִפֶּ֣ר הַ/כֹּהֵ֗ן עַֽל כָּל עֲדַ֛ת בְּנֵ֥י יִשְׂרָאֵ֖ל וְ/נִסְלַ֣ח לָ/הֶ֑ם כִּֽי שְׁגָגָ֣ה הִ֔וא וְ/הֵם֩ הֵבִ֨יאוּ אֶת קָרְבָּנָ֜/ם אִשֶּׁ֣ה לַֽ/יהוָ֗ה וְ/חַטָּאתָ֛/ם לִ/פְנֵ֥י יְהוָ֖ה עַל שִׁגְגָתָֽ/ם־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/015/025.yaml
  text: And the priest shall make atonement for all the congregation of the sons of Israel[a], and they shall be forgiven, because it was an unintentional error, and they have brought their offering, an offering made by fire to Yahweh, and their sin offering before Yahweh[c][b], for their unintentional error.
  footnotes:
  - marker: a
    text: Or 'an offering by fire to the LORD.' The Hebrew term can emphasize an offering made by fire; 'food offering' is a common contextual rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'their purification offering.' The Hebrew term often rendered 'sin offering' can also be understood as an offering for purification in sacrificial contexts.
    reason: lexical_alternative
  - marker: c
    text: Or 'because it was an unintentional error; and they have brought'.
    reason: previous_rendering
