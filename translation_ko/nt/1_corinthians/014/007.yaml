  text: ὅμως τὰ ἄψυχα φωνὴν διδόντα, εἴτε αὐλὸς εἴτε κιθάρα, ἐὰν διαστολὴν τοῖς φθόγγοις μὴ ⸀δῷ, πῶς γνωσθήσεται τὸ αὐλούμενον ἢ τὸ κιθαριζόμενον;
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/007.yaml
  text: Even lifeless things that produce sound—whether flute or harp—if they do not give a distinction in the notes[a], how will what is played on the flute or on the harp be recognized?
  footnotes:
  - marker: a
    text: Or 'whether flute or lyre.' The Greek κιθάρα refers to an ancient stringed instrument more specifically like a lyre, though 'harp' is used here for readability.
    reason: lexical_alternative
translation:
  language: ko
  text: 소리를 내는 생명 없는 것들, 곧 피리든 거문고든, 음에 구별을 주지 않는다면 피리로 내는 소리인지 거문고로 내는 소리인지 어떻게 알겠습니까?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 κιθάρα는 고대의 현악기로, 본래는 라이어에 가깝지만 한국어 독자에게 익숙한 「거문고」로 옮긴다.
    reason: lexical_alternative
