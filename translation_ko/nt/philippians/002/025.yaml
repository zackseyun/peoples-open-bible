id: PHP.2.25
reference: Philippians 2:25
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀναγκαῖον δὲ ἡγησάμην Ἐπαφρόδιτον τὸν ἀδελφὸν καὶ συνεργὸν καὶ συστρατιώτην μου, ὑμῶν δὲ ἀπόστολον καὶ λειτουργὸν τῆς χρείας μου, πέμψαι πρὸς ὑμᾶς,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/025.yaml
  text: 'But I considered it necessary to send to you Epaphroditus—my brother and fellow worker and fellow soldier, and your messenger and minister to my need—'
translation:
  language: ko
  text: 그러나 나는 에바브로디도—나의 형제이며, 동역자이며, 함께 싸우는 군사이고, 또한 여러분의 사자[a]요 나의 필요를 섬기는 일꾼[b]인 그를—여러분에게 보내는 것이 필요하다고 여겼습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「사도」. 그러나 여기서는 빌립보 교회가 바울에게 「보낸 자」로서의 사사로운 사명적 의미가 강하다.
    reason: alternative_reading
  - marker: b
    text: 또는 「나의 필요를 채우는 종」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναγκαῖον
  english_pob_choice: necessary
  chosen_korean: 필요하다
  alternatives_korean:
  - 부득이하다
  - 마땅하다
  lexicon: BDAG
  rationale: 필요성·당위를 표시. 「필요하다」가 ἡγησάμην(여겼다)과 자연스럽게 결합한다.
- source_word: ἡγησάμην
  english_pob_choice: I considered
  chosen_korean: 여기다
  alternatives_korean:
  - 생각하다
  - 판단하다
  lexicon: BDAG
  rationale: 부정과거 중간태로 바울의 판단을 도입한다. 「여기다」가 평가적 어조를 자연스럽게 살린다.
- source_word: πέμψαι
  english_pob_choice: to send
  chosen_korean: 보내다
  alternatives_korean:
  - 되돌려 보내다
  lexicon: BDAG
  rationale: 부정사가 ἡγησάμην에 의존한다. 본 구절 자체는 「되돌려 보내다」를 명시하지 않으므로 단순 「보내다」로 옮긴다.
- source_word: ἀδελφὸν
  english_pob_choice: brother
  chosen_korean: 형제
  alternatives_korean:
  - 신앙 안의 형제
  lexicon: BDAG
  rationale: 신앙 공동체 안의 가족적 호칭. 직접적 「형제」가 자연스럽다.
- source_word: συνεργὸν
  english_pob_choice: fellow worker
  chosen_korean: 동역자
  alternatives_korean:
  - 함께 일하는 자
  - 협력자
  lexicon: BDAG
  rationale: 바울 서신의 정형 어휘. 한국 교회 전통의 「동역자」가 자연스럽고 분명하다.
- source_word: συστρατιώτην
  english_pob_choice: fellow soldier
  chosen_korean: 함께 싸우는 군사
  alternatives_korean:
  - 전우
  - 같이 싸우는 군사
  lexicon: BDAG
  rationale: 군사적 비유를 한국어로 자연스럽게 풀어 보존한다.
- source_word: ἀπόστολον
  english_pob_choice: messenger
  chosen_korean: 사자
  alternatives_korean:
  - 사도
  - 보냄받은 자
  lexicon: BDAG
  rationale: 본 문맥에서는 빌립보 교회가 바울에게 보낸 자를 가리키며, 사도직의 기술적 의미가 아니다. 「사자」가 보냄의 의미를 자연스럽게 담는다.
- source_word: λειτουργὸν
  english_pob_choice: minister
  chosen_korean: 섬기는 일꾼
  alternatives_korean:
  - 봉사자
  - 종
  lexicon: BDAG
  rationale: λειτουργός는 봉사·사역을 수행하는 자. 「섬기는 일꾼」이 그 봉사의 무게를 자연스럽게 담는다.
- source_word: τῆς χρείας μου
  english_pob_choice: to my need
  chosen_korean: 나의 필요를
  alternatives_korean:
  - 나의 필요에
  - 나의 필요를 위하여
  lexicon: BDAG
  rationale: 섬김의 대상을 「나의 필요를」로 자연스럽게 옮긴다.
theological_decisions:
- issue: ἀπόστολον을 「사도」의 기술적 의미로 옮길지, 「사자」의 폭넓은 의미로 옮길지
  chosen_reading: 사자
  alternative_readings:
  - 사도
  - 보냄받은 자
  rationale: 본 문맥은 에바브로디도가 빌립보 교회에 의해 바울에게 보냄을 받은 자임을 분명히 한다. 「사자」가 보냄받은 대표자의 어휘적 의미를 보존하면서, 더 공식적인 사도직 의미를 끌어들이지 않는다.
