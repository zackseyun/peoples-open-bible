translation:
  language: es
  text: Entonces un hombre limpio[a] tomará hisopo, lo sumergirá en el agua y rociará sobre la tienda, sobre todos los utensilios, sobre las personas que estaban allí, y sobre el que tocó el hueso, o el cuerpo del que fue muerto violentamente[b], o el muerto, o la sepultura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre que esté limpio». El hebreo es singular masculino.
    reason: lexical_alternative
  - marker: b
    text: O «el muerto violentamente» o «un cadáver de alguien muerto violentamente». El término hebreo se refiere específicamente a uno muerto por violencia, distinguiéndolo del más general «el muerto» en la frase siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵזוֹב
  english_pob_choice: hyssop
  chosen_spanish: hisopo
  alternatives_spanish:
  - una planta de hisopo
  - ramas de hisopo
  lexicon: HALOT
  rationale: Hisopo es el equivalente español tradicional y preciso para el vegetal ritual usado en actos de purificación. Mantiene el registro cultual sin diluir el referente botánico.
- source_word: בַּמַּיִם
  english_pob_choice: in the water
  chosen_spanish: en el agua
  alternatives_spanish:
  - en agua
  lexicon: HALOT
  rationale: Se conserva el artículo implícito en español por naturalidad y porque el contexto inmediato remite al agua preparada para purificación.
- source_word: אִישׁ טָהוֹר
  english_pob_choice: a clean man
  chosen_spanish: un hombre limpio
  alternatives_spanish:
  - un hombre puro
  - un hombre que esté limpio
  lexicon: HALOT
  rationale: Limpio reproduce el valor ritual de טָהוֹר sin moralizarlo como 'puro'. Se conserva hombre para reflejar el singular masculino del hebreo.
- source_word: וְהִזָּה
  english_pob_choice: sprinkle
  chosen_spanish: rociará
  alternatives_spanish:
  - esparcirá
  - salpicará
  lexicon: HALOT
  rationale: Rociará comunica en español el acto ritual de distribuir gotas sobre objetos y personas. 'Rociar' es natural y suficientemente preciso para el contexto cultual.
- source_word: הָאֹהֶל
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - el tent
  lexicon: HALOT
  rationale: La tienda es la equivalencia idiomática natural en español para el hebreo de una vivienda temporal. En el contexto de impureza por muerte, no se trata del tabernáculo sino de la tienda/domicilio afectado.
- source_word: הַכֵּלִים
  english_pob_choice: the vessels
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los vasos
  - los objetos
  lexicon: HALOT
  rationale: Utensilios es más transparente para lectores hispanos que 'vasos' y conserva el campo semántico de implementos u objetos de uso.
- source_word: הַנְּפָשׁוֹת
  english_pob_choice: the persons
  chosen_spanish: las personas
  alternatives_spanish:
  - las almas
  - los seres
  lexicon: HALOT
  rationale: En este contexto נפשות designa a los individuos presentes, por lo que 'personas' evita la connotación antropológica de 'almas' y mantiene el sentido relacional.
- source_word: הַנֹּגֵעַ
  english_pob_choice: the one who touched
  chosen_spanish: el que tocó
  alternatives_spanish:
  - quien tocó
  - la persona que tocó
  lexicon: HALOT
  rationale: El participio sustantivado se expresa de forma natural con 'el que tocó', preservando la referencia a un individuo afectado sin añadir explicaciones innecesarias.
- source_word: בָּעֶצֶם
  english_pob_choice: the bone
  chosen_spanish: el hueso
  alternatives_spanish:
  - un hueso
  lexicon: HALOT
  rationale: Se mantiene el artículo por la forma hebrea. 'Hueso' es el equivalente directo y natural en español.
- source_word: בֶחָלָל
  english_pob_choice: the slain body
  chosen_spanish: el caído
  alternatives_spanish:
  - el asesinado
  - el muerto por violencia
  - el caído en batalla
  lexicon: HALOT
  rationale: Se opta por 'el caído' para conservar la distinción semántica del término de muerte violenta sin sobreexplicar el modo de la muerte. El contexto ya lo diferencia del siguiente 'el muerto'.
- source_word: בַמֵּת
  english_pob_choice: the dead person
  chosen_spanish: el muerto
  alternatives_spanish:
  - la persona muerta
  - el cadáver
  lexicon: HALOT
  rationale: '''El muerto'' mantiene la brevedad y la distinción frente a ''el caído''. Aunque puede sonar menos explícito que ''persona muerta'', conserva el alcance general del hebreo מֵת.'
- source_word: בַקָּבֶר
  english_pob_choice: the grave
  chosen_spanish: la sepultura
  alternatives_spanish:
  - la tumba
  - la fosa
  lexicon: HALOT
  rationale: Sepultura es un equivalente reverente y claro en español, adecuado para el lugar de entierro. Conserva el campo funerario sin perder dignidad.
theological_decisions:
- issue: Pureza ritual frente a pureza moral
  english_pob_reading: clean
  chosen_spanish_reading: limpio
  alternative_spanish_readings:
  - puro
  rationale: En este contexto el término describe pureza ceremonial vinculada con la contaminación por muerte, no perfección moral. 'Limpio' reproduce mejor esa categoría bíblica en español.
  doctrine_reference: Números 19 y la distinción bíblica entre pureza ritual y santidad moral
- issue: Terminología para חָלָל en un contexto de impureza por muerte
  english_pob_reading: the slain body
  chosen_spanish_reading: el caído
  alternative_spanish_readings:
  - el asesinado
  - el muerto por violencia
  rationale: El hebreo distingue una muerte violenta de la muerte general. 'El caído' conserva esa tensión sin forzar una interpretación demasiado específica que el verso no explicita.
  doctrine_reference: Lexicografía de impureza por contacto con los muertos en Números 19
- issue: Masculino singular de אִישׁ
  english_pob_reading: a clean man
  chosen_spanish_reading: un hombre limpio
  alternative_spanish_readings:
  - una persona limpia
  rationale: Se conserva el masculino singular porque el hebreo lo emplea de manera explícita. No se neutraliza el término, aunque la función ritual es la de una persona ceremonialmente apta.
  doctrine_reference: Principio de correspondencia gramatical con el hebreo
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés, conservando la distinción entre 'clean man' y las tres categorías finales de contaminación por muerte. No se adoptó la fórmula eclesiástica tradicional 'sacerdote' o 'SEÑOR', porque aquí no aparece y no corresponde al pasaje. Se mantuvo la progresión ritual de verbo en futuro para un estilo español bíblico legible.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton ni κύριος.
  - '''Limpio'' se reserva para pureza ritual y no debe confundirse con valor moral.'
  - '''Hisopo'' se mantiene como término técnico-bíblico estable.'
  - Se eligió 'sepultura' por claridad y dignidad, pero 'tumba' quedaría dentro del mismo campo semántico en otros contextos.
