translation:
  text: Stand by your covenant and attend to it, and grow old in your work.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew witness: ''The gift of a righteous man will stand for those who fear him, and his favor will prosper forever.'' The Hebrew and Greek differ substantially here.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַתַּן
  chosen: covenant
  alternatives:
  - gift
  - portion
  lexicon: HALOT
  rationale: 'The extant Hebrew reads ''gift of a righteous man stands for those who fear him,'' but the Greek parallel presents a substantially different text: ''Stand in your covenant...'' Given the task requirement to use the parallel Greek as actual translation input and the strong coherence of the Greek imperative sequence, the main translation follows the Greek line here. The Hebrew appears to reflect a divergent Vorlage or secondary reading rather than a directly alignable equivalent.'
- source_word: διαθήκῃ
  chosen: covenant
  alternatives:
  - agreement
  - commitment
  lexicon: BDAG
  rationale: διαθήκη in biblical-religious usage is best rendered 'covenant.' 'Agreement' is too flat, and 'commitment' would over-interpret. The phrase ἐν διαθήκῃ σου naturally yields 'by/in your covenant,' idiomatically 'Stand by your covenant.'
- source_word: στῆθι
  chosen: Stand by
  alternatives:
  - stand in
  - remain in
  - hold fast to
  lexicon: BDAG
  rationale: The imperative calls for steadfast continuance. 'Stand by' gives clear modern English while preserving the sense of remaining firm in relation to the covenant. 'Stand in' is more literal but less idiomatic in English.
- source_word: ὁμίλει
  chosen: attend to
  alternatives:
  - converse in
  - occupy yourself with
  - meditate on
  lexicon: BDAG
  rationale: ὁμιλέω can mean associate with, be occupied with, or engage in. In this context, paired with covenant, 'attend to it' conveys ongoing practical engagement without forcing a narrowly verbal sense like 'speak of it.'
- source_word: παλαιώθητι
  chosen: grow old
  alternatives:
  - grow worn
  - become seasoned
  - persevere to old age
  lexicon: BDAG
  rationale: The verb literally relates to becoming old/aged. 'Grow old' preserves the concrete image and the exhortation to lifelong perseverance in one's labor.
- source_word: ἔργῳ
  chosen: work
  alternatives:
  - task
  - labor
  - occupation
  lexicon: BDAG
  rationale: ἔργον here refers to one's work or labor. 'Work' is the most natural and broad English equivalent.
