translation:
  language: es
  text: 'Y tú, hijo de hombre, di a los hijos[a] de tu pueblo: la justicia del justo no lo librará en el día de su transgresión, y la maldad del impío no lo hará tropezar[b] en el día en que se aparte de su maldad[c]; y el justo no podrá vivir por ella en el día de su pecado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse, de manera más dinámica, como 'tu pueblo'. El hebreo dice literalmente 'los hijos de tu pueblo'.
    reason: lexical_alternative
  - marker: b
    text: O 'no caerá por ella'. El hebreo usa la imagen de tropezar.
    reason: lexical_alternative
  - marker: c
    text: Es decir, por su justicia anterior. El pronombre hebreo es femenino singular y corresponde a 'justicia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Conserva el apelativo profético fijo de Ezequiel y su fuerza literaria repetida, sin suavizarlo a una forma más interpretativa.
- source_word: בְּנֵי עַמְּךָ
  english_pob_choice: the sons of your people
  chosen_spanish: los hijos de tu pueblo
  alternatives_spanish:
  - tu pueblo
  - los descendientes de tu pueblo
  lexicon: HALOT
  rationale: Mantiene la expresión filial explícita del hebreo y la concordancia natural en español, sin reducirla a la idea más general de 'tu pueblo'.
- source_word: צִדְקַת
  english_pob_choice: the righteousness of the righteous
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia del justo
  lexicon: HALOT
  rationale: En este contexto el sustantivo designa la condición/conducta justa; 'justicia' conserva el peso moral y judicial sin introducir una formulación demasiado explicativa en el cuerpo del verso.
- source_word: הַצַּדִּיק
  english_pob_choice: the righteous
  chosen_spanish: del justo
  alternatives_spanish:
  - del recto
  - del justo hombre
  lexicon: HALOT
  rationale: Se usa el adjetivo sustantivado en singular, como en el hebreo, para conservar la simetría del paralelismo.
- source_word: תַצִּילֶנּוּ
  english_pob_choice: will not deliver him
  chosen_spanish: no lo librará
  alternatives_spanish:
  - no lo salvará
  - no lo rescatará
  lexicon: HALOT
  rationale: '''Librará'' transmite bien el valor de rescatar/liberar del verbo en un marco profético-jurídico y evita cargar el verso con matices soteriológicos adicionales.'
- source_word: בְּיוֹם פִּשְׁעוֹ
  english_pob_choice: in the day of his transgression
  chosen_spanish: en el día de su transgresión
  alternatives_spanish:
  - el día de su rebelión
  - cuando transgreda
  lexicon: HALOT
  rationale: '''Transgresión'' es un equivalente claro y solemne para פֶּשַׁע/פִּשְׁעַ, y preserva la temporalidad nominal del hebreo.'
- source_word: רִשְׁעַת הָרָשָׁע
  english_pob_choice: the wickedness of the wicked
  chosen_spanish: la maldad del impío
  alternatives_spanish:
  - la maldad del malvado
  - la culpa del impío
  lexicon: HALOT
  rationale: Conserva el juego de palabras entre 'maldad' e 'impío' sin forzar un giro más abstracto como 'culpa'.
- source_word: יִכָּשֶׁל בָּהּ
  english_pob_choice: he will not stumble by it
  chosen_spanish: no hará tropezar a este
  alternatives_spanish:
  - no tropezará por ella
  - no caerá por ella
  - no será hecho tropezar por ella
  lexicon: HALOT
  rationale: El hebreo usa la imagen de tropezar; sin embargo, en español 'tropezar por ella' suena menos natural en la segunda cláusula. 'No hará tropezar a este' conserva la idea de impedimento causado por la maldad y mantiene la referencia pronominal femenina de manera legible en español.
- source_word: בְּיוֹם שׁוּבוֹ מֵרִשְׁעוֹ
  english_pob_choice: in the day he turns from his wickedness
  chosen_spanish: en el día en que se aparte de su maldad
  alternatives_spanish:
  - en el día que vuelva de su maldad
  - cuando se aparte de su maldad
  - en el día de su apartarse de su maldad
  lexicon: HALOT
  rationale: '''Apartarse de'' expresa con naturalidad el valor de שוב con מן en un contexto de retorno/abandono del pecado, manteniendo el movimiento de arrepentimiento sin excesiva paráfrasis.'
- source_word: וְצַדִּיק
  english_pob_choice: and the righteous
  chosen_spanish: y el justo
  alternatives_spanish:
  - y el recto
  - y el justo hombre
  lexicon: HALOT
  rationale: Se conserva el paralelo con la primera cláusula y el uso sustantivado singular del adjetivo.
- source_word: לֹא יוּכַל לִחְיוֹת בָּהּ
  english_pob_choice: will not be able to live by it
  chosen_spanish: no podrá vivir por ella
  alternatives_spanish:
  - no podrá vivir a causa de ella
  - no vivirá por ella
  lexicon: HALOT
  rationale: '''Por ella'' mantiene el referente femenino implícito y la relación instrumental/causal sin añadir un sustantivo explícito que el hebreo deja abierto.'
- source_word: בְּיוֹם חֲטֹאתוֹ
  english_pob_choice: in the day of his sin
  chosen_spanish: en el día de su pecado
  alternatives_spanish:
  - cuando peque
  - en el día en que peque
  lexicon: HALOT
  rationale: Se conserva la construcción nominal paralela a 'día de su transgresión' y se traduce חטא como 'pecado' por ser la opción más natural y cercana en español bíblico actual.
theological_decisions:
- issue: Cómo expresar el valor moral-jurídico de צִדְקָה sin diluir el paralelismo
  english_pob_reading: The righteousness of the righteous will not deliver him...
  chosen_spanish_reading: la justicia del justo no lo librará...
  alternative_spanish_readings:
  - la rectitud del justo no lo librará
  - la justicia del justo no lo salvará
  rationale: '''Justicia'' mantiene el campo semántico del término hebreo y la fuerza del contraste con ''maldad''. ''Librará'' conserva el sentido de rescatar/deliver sin convertir la frase en una afirmación doctrinal más amplia.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo reflejar la imagen de כשל en la segunda cláusula
  english_pob_reading: he will not stumble by it
  chosen_spanish_reading: no hará tropezar a este
  alternative_spanish_readings:
  - no tropezará por ella
  - no caerá por ella
  rationale: El texto usa una imagen concreta de tropiezo; la versión elegida comunica el mismo efecto en español con fluidez. No se elimina la tensión de que la maldad anterior no sirve de causa determinante cuando la persona se aparta de ella.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Alcance teológico de la última cláusula sobre el justo y su pecado
  english_pob_reading: and the righteous will not be able to live by it in the day of his sin
  chosen_spanish_reading: y el justo no podrá vivir por ella en el día de su pecado
  alternative_spanish_readings:
  - y el justo no podrá vivir por su justicia en el día de su pecado
  - y el justo no podrá vivir a causa de ella en el día de su pecado
  rationale: Se mantiene el pronombre femenino implícito y la simetría del verso, evitando resolver de antemano si 'ella' se refiere simplemente a su justicia previa o a su estado anterior; el versículo formula un principio profético sobre responsabilidad presente, no una tesis sistemática completa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que eliminó 'man' después de 'righteous' y 'wicked'. Por eso el español usa 'el justo' y 'el impío' sin añadir sustantivos explicativos como 'hombre'. También se respetó el valor del pronombre femenino singular en los enlaces de referencia, aunque en español se resolvió con 'ella' y con una reformulación idiomática para la segunda cláusula.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma de proyecto cuando corresponda; este versículo no lo contiene.
  - Se mantiene el paralelismo de tres miembros y el registro profético solemne.
  - '''Justo/impío'' se usa como adjetivo sustantivado para seguir el hebreo y evitar redundancias.'
  - No se introdujo 'Cristo', 'SEÑOR' ni lenguaje interpretativo ajeno al verso.
