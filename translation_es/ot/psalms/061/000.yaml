translation:
  language: es
  text: Para el director del coro; con instrumentos de cuerda. De David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por David» o «Para David»; la construcción hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Para el maestro de coro
  - Para el líder
  lexicon: HALOT
  rationale: En los títulos de salmos, el término designa a quien dirige la ejecución musical. «Director del coro» comunica de forma clara y natural esa función, sin volverla demasiado genérica ni introducir una precisión no pedida por el hebreo.
- source_word: עַל
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - sobre
  - según
  - para
  lexicon: HALOT
  rationale: En esta superscripción, la preposición introduce el acompañamiento o la indicación musical. «Con» suena natural en español y conserva la idea de acompañamiento instrumental.
- source_word: נְגִינַת
  english_pob_choice: stringed instruments
  chosen_spanish: instrumentos de cuerda
  alternatives_spanish:
  - música de cuerda
  - acompañamiento de cuerda
  - instrumental de cuerda
  lexicon: HALOT
  rationale: El sustantivo se refiere a música tocada con cuerdas o al acompañamiento de cuerda. «Instrumentos de cuerda» es la opción más idiomática y transmite bien el sentido musical probable del encabezado.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  - Perteneciente a David
  lexicon: HALOT
  rationale: La preposición lamed en los títulos de salmos es flexible y puede señalar autoría, asociación o dedicación. «De David» preserva esa amplitud mejor que una fórmula más específica como «Por David».
theological_decisions:
- issue: Ambigüedad del lamed en el título davídico
  english_pob_reading: Of David
  chosen_spanish_reading: De David
  alternative_spanish_readings:
  - Por David
  - Para David
  rationale: El encabezado no obliga a decidir si se trata de autoría estricta, asociación o dedicación. Mantener «De David» preserva la tensión documental en lugar de resolverla con una afirmación histórica más fuerte que la del texto.
  doctrine_reference: Preservar la ambigüedad textual y no sobreespecificar la autoría.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la ubicación del marcador de la nota sobre «Of David»; por eso el marcador [a] se coloca en «De David» y no en «instrumentos de cuerda».
  spanish_consistency_notes:
  - Se mantuvo «David» como nombre propio sin artículo.
  - Se evitó «SEÑOR» porque el texto hebreo aquí no contiene el Tetragrámaton.
  - Se eligió una sintaxis breve y litúrgica, adecuada para un encabezado de salmo.
