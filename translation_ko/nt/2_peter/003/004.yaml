id: 2PE.3.4
reference: 2 Peter 3:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ λέγοντες· Ποῦ ἐστιν ἡ ἐπαγγελία τῆς παρουσίας αὐτοῦ; ἀφ’ ἧς γὰρ οἱ πατέρες ἐκοιμήθησαν, πάντα οὕτως διαμένει ἀπ’ ἀρχῆς κτίσεως.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/003/004.yaml
  text: and saying[a], “Where is the promise of his coming? For ever since the fathers fell asleep[b], all things continue just as they have from the beginning of creation.”
  footnotes:
  - marker: a
    text: Or “presence” or “arrival” for “coming” (παρουσία). In this context it refers to the expected future return of Christ.
    reason: lexical_alternative
  - marker: b
    text: “Fell asleep” is a Greek euphemism for death.
    reason: lexical_alternative
translation:
  language: ko
  text: '그들은 말합니다: 「그분의 재림[a]에 대한 약속이 어디 있느냐? 조상들이 잠든 이래로 모든 것이 창조의 시작부터 그대로 계속되고 있다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 παρουσία는 「임재·도래·재림」. 3장 문맥은 종말적 도래에 초점이 있으므로 「재림」으로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρουσία
  english_pob_choice: coming
  chosen_korean: 재림
  alternatives_korean:
  - 임재
  - 도래
  - 오심
  lexicon: BDAG
  rationale: 3장에서는 종말적 도래의 의미가 분명하므로 「재림」을 채택. 1:16의 「임재」와 다른 결정.
- source_word: οἱ πατέρες ἐκοιμήθησαν
  english_pob_choice: fathers fell asleep
  chosen_korean: 조상들이 잠들다
  alternatives_korean:
  - 조상들이 죽다
  lexicon: BDAG
  rationale: 죽음의 완곡어법을 보존.
theological_decisions:
- issue: παρουσία의 문맥별 번역
  chosen_reading: 3장에서는 「재림」, 1:16에서는 「임재」
  alternative_readings:
  - 전 문맥 통일하여 「재림」
  - 전 문맥 통일하여 「임재」
  rationale: 1:16의 παρουσία는 변화산의 영광 목격이 미래 도래의 전조로 기능하는 자리이므로 「임재」가 두 함의를 모두 포섭한다. 3:4·3:12의 παρουσία는 종말적 도래에 초점이 분명하므로 「재림」으로 옮긴다. 일관성보다 문맥적 정확성을 우선한다.
  doctrine_reference: Translation philosophy §3, §6
