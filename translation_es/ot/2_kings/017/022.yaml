translation:
  language: es
  text: Y los hijos de Israel anduvieron en todos los pecados que Jeroboam había cometido; no se apartaron de ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de ello»; el singular probablemente se refiere de manera colectiva al camino o patrón pecaminoso recién mencionado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: walked
  chosen_spanish: anduvieron
  alternatives_spanish:
  - caminaron
  - anduvieron por
  lexicon: HALOT
  rationale: El verbo הלך con ב puede expresar un modo de conducta. En español, «anduvieron» conserva la metáfora moral de conducta continua sin sonar tan calcado como «caminaron en».
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión de pacto y linaje del hebreo. «Hijos de Israel» mantiene mejor la forma del original que «israelitas».
- source_word: בְּכָל
  english_pob_choice: in all
  chosen_spanish: en todos
  alternatives_spanish:
  - según todos
  - en cada
  lexicon: HALOT
  rationale: La preposición con כָּל comunica totalidad del patrón de conducta. «En todos» reproduce bien la idea de inmersión total en esos pecados.
- source_word: חַטֹּאות
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - ofensas
  - acciones pecaminosas
  lexicon: HALOT
  rationale: El sustantivo plural refiere actos concretos de pecado. «Pecados» es el equivalente directo y natural en español bíblico contemporáneo.
- source_word: עָשָׂה
  english_pob_choice: had committed
  chosen_spanish: había cometido
  alternatives_spanish:
  - había hecho
  - había realizado
  lexicon: HALOT
  rationale: Aunque literalmente es «hizo», en español «había cometido» expresa la fuerza moral de cometer pecados sin añadir contenido ajeno.
- source_word: לֹא סָרוּ
  english_pob_choice: did not turn away
  chosen_spanish: no se apartaron
  alternatives_spanish:
  - no se desviaron
  - no dieron vuelta atrás
  lexicon: HALOT
  rationale: סור puede significar apartarse o desviarse. «No se apartaron» transmite la persistencia en el mismo camino pecaminoso de forma clara y natural.
- source_word: מִמֶּנָּה
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de eso
  - de ella
  lexicon: HALOT
  rationale: El sufijo femenino singular hebreo probablemente mira de manera colectiva al patrón pecaminoso mencionado. En español, «de ellos» se ajusta naturalmente a «los pecados» y conserva la referencia colectiva sin obscurecerla.
theological_decisions:
- issue: Referente del sufijo singular final מִמֶּנָּה tras el plural «pecados»
  english_pob_reading: Render idiomatically as 'from them,' referring to Jeroboam's sins collectively.
  chosen_spanish_reading: Traducirlo como «de ellos», tomando los pecados de Jeroboam en conjunto.
  alternative_spanish_readings:
  - de eso
  - de ella
  rationale: El hebreo usa un sufijo singular femenino después de un antecedente plural, lo que puede funcionar colectivamente. En español, el plural explícito evita ambigüedad y mantiene la idea de que Israel no se apartó del conjunto de esos pecados.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La fuente hebrea y el audit trail inglés están en alto acuerdo; no se requieren revisiones respecto del borrador base. Se mantuvo la tensión del sufijo singular final explicándola en nota y resolviéndola de modo idiomático en español.
  spanish_consistency_notes:
  - Se usa «hijos de Israel» para conservar la fórmula de pacto del hebreo.
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton.
  - Se mantiene «pecados» en plural para reflejar חַטֹּאות y la acumulación del patrón descrito.
  - La nota al pie preserva la observación sobre el singular hebreo final sin forzar una traducción no idiomática.
