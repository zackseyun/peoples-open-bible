id: JHN.8.4
reference: John 8:4
source:
  edition: robinson-pierpont-2005-byzantine
  text: λέγουσιν αὐτῷ, Διδάσκαλε, αὕτη ἡ γυνὴ κατείληπται ἐπαυτοφώρῳ μοιχευομένη.
  language: Greek
translation:
  text: They[a] said to him, "Teacher, this woman has been caught in the very act
    of committing adultery."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Continuation of the account of the woman caught in adultery (John 7:53–8:11).
      See note on John 7:53.
    reason: textual_critical
lexical_decisions:
- source_word: λέγουσιν
  chosen: said
  alternatives:
  - say
  - were saying
  lexicon: BDAG
  rationale: Historical present tense, translated as simple past for natural English
    narrative flow.
- source_word: κατείληπται
  chosen: has been caught
  alternatives:
  - was caught
  - is caught
  lexicon: BDAG
  rationale: Perfect passive indicative, indicating a completed action with continuing
    relevance or results.
- source_word: ἐπαυτοφώρῳ
  chosen: in the very act
  alternatives:
  - red-handed
  - in the act
  lexicon: BDAG
  rationale: An idiom originally meaning 'caught with the theft', used generally for
    being caught in the very commission of a crime.
- source_word: μοιχευομένη
  chosen: of committing adultery
  alternatives:
  - while committing adultery
  - adulterating
  lexicon: BDAG
  rationale: Present participle modifying the woman's state when caught; translated
    with 'of' to complete the English idiom 'caught in the act of'.
