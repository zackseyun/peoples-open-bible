translation:
  language: es
  text: Ha oprimido al pobre y al necesitado, ha cometido un robo, no ha devuelto la prenda, ha levantado sus ojos hacia los ídolos[a] y ha hecho una abominación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גִּלּוּלִים es un término despectivo para «ídolos», con un matiz peyorativo como «ídolos inmundos» o «ídolos de estiércol».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנִי וְאֶבְיוֹן
  english_pob_choice: the poor and needy
  chosen_spanish: el pobre y el necesitado
  alternatives_spanish:
  - el pobre y el menesteroso
  - el pobre y el indigente
  lexicon: HALOT
  rationale: La pareja hebrea funciona como una expresión fija para personas socialmente vulnerables. En español, «pobre y necesitado» comunica bien la condición económica y social sin volver la frase artificial.
- source_word: הוֹנָה
  english_pob_choice: has oppressed
  chosen_spanish: ha oprimido
  alternatives_spanish:
  - ha agraviado
  - ha defraudado
  lexicon: HALOT
  rationale: El verbo expresa trato abusivo o explotador. «Oprimido» conserva la fuerza social y moral del contexto junto a «pobre y necesitado».
- source_word: גְּזֵלוֹת גָּזָל
  english_pob_choice: committed robbery
  chosen_spanish: ha cometido robo
  alternatives_spanish:
  - ha robado
  - ha cometido actos de robo
  lexicon: HALOT
  rationale: La construcción intensiva con sustantivo + verbo pide un sustantivo de acción en español. «Ha cometido robo» mantiene la intensidad y suena natural.
- source_word: חֲבֹל לֹא יָשִׁיב
  english_pob_choice: not returned a pledge
  chosen_spanish: no ha devuelto la prenda
  alternatives_spanish:
  - no ha restituido el empeño
  - no ha devuelto lo tomado en prenda
  lexicon: HALOT
  rationale: חֲבֹל alude a un objeto dado o tomado como garantía. «Prenda» es el equivalente más breve y reconocible en español bíblico, y «devolver» refleja el sentido causativo del verbo.
- source_word: וְאֶל הַגִּלּוּלִים נָשָׂא עֵינָיו
  english_pob_choice: lifted up his eyes to the idols
  chosen_spanish: ha levantado sus ojos hacia los ídolos
  alternatives_spanish:
  - ha mirado a los ídolos
  - ha alzado la vista hacia los ídolos
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática del hebreo sin explicitarla como «adoró». «Ha levantado sus ojos» mantiene la transparencia textual y deja que el contexto indique el sentido idolátrico.
- source_word: הַגִּלּוּלִים
  english_pob_choice: the idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - los ídolos inmundos
  - los ídolos de estiércol
  lexicon: HALOT
  rationale: En el texto principal conviene una traducción clara y directa. El matiz despectivo del término hebreo se preserva en nota para no sobrecargar el cuerpo del versículo.
- source_word: תּוֹעֵבָה עָשָׂה
  english_pob_choice: done an abomination
  chosen_spanish: ha hecho una abominación
  alternatives_spanish:
  - ha cometido una abominación
  - ha hecho algo abominable
  lexicon: HALOT
  rationale: La colocación nominal hebrea se conserva de forma cercana. «Abominación» mantiene el registro bíblico y la gravedad moral del término.
theological_decisions:
- issue: Idioma de la idolatría sin explicitar el acto
  english_pob_reading: The verse is rendered as describing concrete covenant violations, including idolatrous devotion ('lifted up his eyes to the idols') and morally detestable action ('done an abomination').
  chosen_spanish_reading: El versículo describe transgresiones concretas del pacto, incluyendo un gesto de orientación idolátrica («ha levantado sus ojos hacia los ídolos») y una acción moralmente detestable («ha hecho una abominación»).
  alternative_spanish_readings:
  - «ha adorado a los ídolos»
  - «ha mirado a los ídolos»
  rationale: Se preserva la metáfora hebrea del levantamiento de los ojos, sin resolverla prematuramente como adoración. Así se mantiene la tensión textual y se permite que el contexto cargue el sentido idolátrico.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La auditoría inglesa indica alta concordancia y sin cambios en la última revisión; por eso el español sigue de cerca las decisiones léxicas ya validadas, con adaptación natural al español sin alterar el sentido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Prenda» se usa en sentido jurídico-comercial, no como objeto devocional.
  - La nota del marcador a preserva el matiz despectivo de גִּלּוּלִים sin introducirlo de manera pesada en el texto principal.
