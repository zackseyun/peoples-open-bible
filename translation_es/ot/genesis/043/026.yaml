translation:
  language: es
  text: Cuando José entró en la casa, le llevaron el regalo[a] que tenían en las manos a la casa[b], y se inclinaron ante él hasta el suelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el presente»; el término hebreo puede también significar «tributo» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite «a la casa / en la casa» dos veces en el versículo, probablemente para marcar tanto la entrada de José como el ingreso del regalo. También puede entenderse: «le llevaron el regalo que tenían en las manos a la casa».'
    reason: source_note
lexical_decisions:
- source_word: וַיָּבֹא / came into the house
  english_pob_choice: came into the house
  chosen_spanish: entró en la casa
  alternatives_spanish:
  - vino a la casa
  - llegó a la casa
  lexicon: HALOT
  rationale: El hebreo expresa movimiento hacia el interior de la casa. En español, "entró en la casa" comunica de forma natural tanto el movimiento como el ingreso al recinto, sin perder el valor direccional del verbo.
- source_word: הַבַּיְתָה / into the house
  english_pob_choice: into the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - a la casa
  - dentro de la casa
  lexicon: HALOT
  rationale: La forma direccional hebrea se conserva mejor en español con una expresión que indique interioridad. Aquí "en la casa" funciona idiomáticamente después de "entró", mientras que la repetición posterior se mantiene explícita con "dentro de la casa".
- source_word: וַיָּבִיאוּ לוֹ / they brought to him
  english_pob_choice: they brought to him
  chosen_spanish: le llevaron a él
  alternatives_spanish:
  - le llevaron
  - le presentaron
  lexicon: HALOT
  rationale: El verbo hiphil de בוא requiere una acción de llevar/traer. "Le llevaron a él" conserva el objeto indirecto explícito del hebreo y evita suavizar la relación de destinatario; se mantiene la redundancia pronominal para reflejar la forma semítica y la focalización del destinatario.
- source_word: הַמִּנְחָה / the gift
  english_pob_choice: the gift
  chosen_spanish: la ofrenda
  alternatives_spanish:
  - el regalo
  - el presente
  - el tributo
  lexicon: HALOT
  rationale: מנחה puede significar regalo, tributo u ofrenda según el contexto. Dado que aquí se trata de un obsequio diplomático llevado a José, "ofrenda" conserva una formalidad respetuosa y deja abierta la posible carga de tributo/presentación sin volverlo cultual.
- source_word: אֲשֶׁר בְּיָדָם / that was in their hands
  english_pob_choice: that was in their hands
  chosen_spanish: que tenían en las manos
  alternatives_spanish:
  - que estaba en sus manos
  - que llevaban en las manos
  lexicon: HALOT
  rationale: La frase hebrea es literalmente "que estaba en sus manos". "Que tenían en las manos" mantiene la imagen concreta y resulta natural en español, sin perder el plural y la materialidad del gesto.
- source_word: הַבָּיְתָה / into the house
  english_pob_choice: into the house
  chosen_spanish: dentro de la casa
  alternatives_spanish:
  - a la casa
  - en la casa
  lexicon: HALOT
  rationale: La repetición del complemento direccional se conserva de manera audible en español con "dentro de la casa", que refleja mejor el segundo movimiento de entrada y evita diluir la repetición textual del hebreo.
- source_word: וַיִּשְׁתַּחֲווּ לוֹ / they bowed down before him
  english_pob_choice: they bowed down before him
  chosen_spanish: se inclinaron ante él
  alternatives_spanish:
  - se postraron ante él
  - se arrodillaron ante él
  - se inclinaron delante de él
  lexicon: HALOT
  rationale: שחה indica un gesto de reverencia/prosternación. "Se inclinaron ante él" expresa homenaje con naturalidad en español; evita un exceso de arcaísmo y, al mismo tiempo, no elimina la solemnidad del acto.
- source_word: אָֽרְצָה / to the ground
  english_pob_choice: to the ground
  chosen_spanish: hasta el suelo
  alternatives_spanish:
  - al suelo
  - a tierra
  - hasta la tierra
  lexicon: HALOT
  rationale: La forma direccional de ארץ apunta hacia la tierra/suelo. "Hasta el suelo" mantiene la imagen de descenso completo y refuerza el carácter corporal del gesto de postración.
theological_decisions:
- issue: דִגְשׁ en el acto de homenaje ante José
  english_pob_reading: they bowed down to the ground before him
  chosen_spanish_reading: se inclinaron ante él hasta el suelo
  alternative_spanish_readings:
  - se postraron ante él hasta el suelo
  - se inclinaron hasta el suelo delante de él
  rationale: No se introduce una lectura litúrgica ni se reduce el gesto a un simple saludo. El español conserva la reverencia intensa del hebreo, compatible con homenaje cortesano y con la anticipación narrativa de la exaltación de José.
  doctrine_reference: Narrative honor-shame dynamics; no doctrinal expansion beyond the text.
translation_notes:
  revision_awareness: 'La redacción española toma en cuenta el cierre de revisión del texto inglés: se mantiene la doble referencia espacial («en la casa» / «dentro de la casa») y se preserva el destinatario explícito con estructura natural en español, evitando una imitación mecánica del orden del inglés o del hebreo que oscurezca la relación entre acción, objeto y destinatario.'
  spanish_consistency_notes:
  - Se usa «José» para יוֹסֵף conforme al estándar del proyecto.
  - Se evita «SEÑOR» o cualquier equivalencia no pertinente; el versículo no contiene el nombre divino.
  - «Ofrenda» se emplea aquí por la amplitud semántica de מנחה, no como término sacrificial técnico.
  - La repetición espacial se conserva mediante dos expresiones distintas para reflejar el hebreo sin sonar tautológico en español.
