translation:
  language: es
  text: En el año treinta y nueve de Azarías, rey de Judá, Menahem hijo de Gadi comenzó a reinar sobre Israel, y reinó diez años en Samaria.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת
  english_pob_choice: In the ... year
  chosen_spanish: En el año ...
  alternatives_spanish:
  - Durante el año ...
  - En el ... año
  lexicon: HALOT
  rationale: La fórmula de sincronismo regnal en español se expresa de manera natural con 'En el año ...'. Mantiene el valor temporal del hebreo sin volverla pesada o artificial.
- source_word: שְׁלֹשִׁים וָ/תֵשַׁע שָׁנָה
  english_pob_choice: thirty-ninth year
  chosen_spanish: treinta y nueve
  alternatives_spanish:
  - trigésimo noveno
  - treinta y nueve años
  lexicon: HALOT
  rationale: En este tipo de datación regnal, el numeral funciona con sentido ordinal; en español la forma más clara y natural es 'treinta y nueve' dentro de la fórmula 'en el año treinta y nueve'.
- source_word: לַ/עֲזַרְיָה
  english_pob_choice: of Azariah
  chosen_spanish: de Azarías
  alternatives_spanish:
  - perteneciente a Azarías
  lexicon: HALOT
  rationale: La preposición ל en esta cronología refiere al año de reinado de Azarías. 'De Azarías' comunica correctamente la relación sin añadir matices ajenos.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Es un sintagma titular directo; 'rey de Judá' es la correspondencia más fiel y transparente.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - se hizo rey
  - comenzó a reinar
  lexicon: HALOT
  rationale: Aquí el verbo señala acceso al trono, no la duración del reinado, porque la duración se expresa aparte. 'Llegó a ser rey' evita confundir el acto de ascenso con el ejercicio continuado del reinado.
- source_word: מְנַחֵם בֶּן גָּדִי
  english_pob_choice: Menahem son of Gadi
  chosen_spanish: Menahem hijo de Gadi
  alternatives_spanish:
  - Menahem, hijo de Gadi
  lexicon: HALOT
  rationale: Los nombres propios se transliteran; 'hijo de' es la equivalencia natural de בן en una identificación narrativa.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - para Israel
  - contra Israel
  lexicon: HALOT
  rationale: Con מלך, עַל indica dominio o gobierno. 'Sobre Israel' conserva esa fuerza de soberanía sin suavizarla.
- source_word: עֶשֶׂר שָׁנִים
  english_pob_choice: ten years
  chosen_spanish: diez años
  alternatives_spanish:
  - por diez años
  lexicon: HALOT
  rationale: Es una duración simple del reinado; 'diez años' es la traducción directa y natural.
- source_word: בְּ/שֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  lexicon: HALOT
  rationale: La frase locativa identifica el lugar de su reinado. 'En Samaria' es la forma española estándar y fiel.
theological_decisions:
- issue: Conservación de la fórmula cronológica regnal sin armonización interpretativa
  english_pob_reading: The verse states a synchronism between Azariah's thirty-ninth year and Menahem's accession and reign length without interpretive smoothing.
  chosen_spanish_reading: El versículo conserva el sincronismo cronológico entre el año de Azarías y el acceso al reino de Menahem, sin añadir explicación interpretativa.
  alternative_spanish_readings:
  - En el año trigésimo noveno...
  - En el año treinta y nueve...
  rationale: No hay tensión doctrinal, pero sí una forma técnica de cronología histórica que conviene preservar con exactitud. La redacción española mantiene la estructura del registro histórico del texto.
  doctrine_reference: Historiografía bíblica / cronología regnal
translation_notes:
  revision_awareness: Se corrigió la validación previa eliminando toda nota al pie no anclada en el texto. La redacción actual no requiere marcas de nota porque no introduce alternativas textuales ni ambigüedades que necesiten comentario adicional.
  spanish_consistency_notes:
  - Se usa 'Azarías' según la forma española habitual del nombre hebreo en este contexto.
  - Se mantiene 'Menahem' como transliteración del nombre propio, de acuerdo con la práctica del proyecto.
  - Se conserva 'rey' y 'reino' en sentido político-histórico, sin sustituirlos por vocabulario eclesiástico.
  - '''Samaria'' se mantiene como topónimo tradicional reconocible en español.'
