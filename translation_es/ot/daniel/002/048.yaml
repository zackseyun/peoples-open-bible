  text: אֱדַ֨יִן מַלְכָּ֜/א לְ/דָנִיֵּ֣אל רַבִּ֗י וּ/מַתְּנָ֨ן רַבְרְבָ֤ן שַׂגִּיאָן֙ יְהַב לֵ֔/הּ וְ/הַ֨שְׁלְטֵ֔/הּ עַ֖ל כָּל מְדִינַ֣ת בָּבֶ֑ל וְ/רַב סִגְנִ֔ין עַ֖ל כָּל חַכִּימֵ֥י בָבֶֽל־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/048.yaml
  text: Then the king made Daniel great and gave him many great gifts[b][a], and he made him ruler over the whole province of Babylon and chief prefect over all the wise men of Babylon.
  footnotes:
  - marker: a
    text: Or 'promoted Daniel.' The Aramaic verb literally means 'made great' and in context refers to royal exaltation.
    reason: lexical_alternative
  - marker: b
    text: The title rendered 'chief prefect' refers to a high-ranking official set over other court officials or administrators.
    reason: cultural_note
