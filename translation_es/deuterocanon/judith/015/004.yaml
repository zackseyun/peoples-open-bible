review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del rastro auditado en inglés: Ozías envía mensajeros a varias localidades y a todo el territorio de Israel para informar lo sucedido y convocar una salida masiva contra los enemigos. Sin embargo, «para que todos salieran contra los enemigos para destruirlos» pierde un poco la fuerza idiomática de ἐκχυθῶσιν (''derramarse/salir en masa'') al omitir explícitamente el matiz colectivo, que sí se documenta en la nota y en la decisión léxica inglesa.'
  spanish_quality_summary: 'El español es claro y legible, con buen registro bíblico moderno. La única mejora necesaria es estilística y semántica menor: hacer más natural y más fiel el giro final con «salieran en masa» en lugar de solo «salieran». También conviene mantener la estructura de destino con repetición de «a» para mayor naturalidad en español.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios transliterados son aceptables en contexto deuterocanónico; «mensajeros», «territorio», «enemigos» y «destruirlos» concuerdan con las decisiones auditadas. La nota léxica sobre ἐκχυθῶσιν está bien preservada.
  issues:
  - severity: medium
    issue: Se atenúa el matiz de ἐκχυθῶσιν al traducir solo «salieran».
    rationale: El griego usa una imagen idiomática de derramarse o lanzarse en masa. Aunque la nota lo explica, el texto principal puede reflejarlo mejor con «salieran en masa» sin volverse torpe.
  - severity: low
    issue: La cadena de destinos suena algo menos natural sin repetir la preposición antes de cada topónimo.
    rationale: «a Betomesthaim, a Choba y a Chola» es correcto, pero dado el patrón de la frase y el tono narrativo, «a Betomesthaim, a Choba, a Chola» o mantener la serie actual no afecta la fidelidad. Es un asunto menor de fluidez.
  revised_spanish_text: Y Ozías envió mensajeros a Betomesthaim, a Choba y a Chola[a], y a todo el territorio de Israel, para anunciar lo que había sucedido, y para que todos salieran en masa contra los enemigos para destruirlos.
  revised_footnotes:
  - marker: a
    text: Literalmente, el griego dice «para que todos fueran derramados contra los enemigos», una imagen idiomática de salir o lanzarse en masa al ataque.
    reason: lexical_alternative
  revision_rationale: Se añade «en masa» para reflejar mejor el valor idiomático de ἵνα πάντες ἐκχυθῶσιν, ya documentado en la nota y en la auditoría inglesa, sin sacrificar naturalidad en español. El resto del texto puede mantenerse.
