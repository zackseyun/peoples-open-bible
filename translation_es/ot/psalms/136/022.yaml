review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien נַחֲלָה como «herencia» y עַבְדּוֹ como «su siervo», pero no preserva adecuadamente la decisión léxica/teológica del refrán: חַסְדּוֹ en Salmo 136 apunta a amor leal/pactual más que a «misericordia». Además, la formulación española del estribillo suena menos idiomática y menos alineada con el sentido durativo de «for his steadfast love endures forever».'
  spanish_quality_summary: «Una herencia para Israel, su siervo» es claro y natural. El problema principal es «porque para siempre es su misericordia», que resulta poco fluido en español contemporáneo y debilita el matiz de lealtad firme. Una redacción como «porque su amor leal permanece para siempre» mantiene dignidad bíblica y mejor legibilidad.
  glossary_alignment: Alinea bien «siervo» para עַבְדּוֹ según la rationale documentada. No alinea bien חַסְדּוֹ con la preferencia POB por «steadfast love»; en español conviene evitar «misericordia» como texto principal aquí y reservarlo como alternativa en nota. «Yahvé» no aparece en este versículo.
  issues:
  - severity: high
    issue: «su misericordia» para חַסְדּוֹ en el refrán principal
    rationale: El expediente inglés documenta «steadfast love» por su carga de amor leal y pactual; «misericordia» estrecha o desplaza ese matiz y no preserva la decisión teológica central del salmo.
  - severity: medium
    issue: «porque para siempre es su misericordia» suena poco idiomático
    rationale: Aunque comprensible, el orden y el predicado nominal no expresan tan bien en español la idea de duración continua del refrán como «permanece para siempre» o equivalente.
  - severity: low
    issue: Nota a de «su esclavo» es innecesariamente fuerte como alternativa destacada
    rationale: El análisis POB favorece claramente «siervo» en este contexto pactual; puede omitirse la nota para no introducir una alternativa que aquí no es la mejor lectura española.
  revised_spanish_text: Una herencia para Israel, su siervo, porque su amor leal[a] permanece para siempre.
  revised_footnotes:
  - marker: a
    text: O «su misericordia», «su amor constante» o «su bondad». El hebreo חַסְדּוֹ alude con frecuencia al amor leal y pactual de Dios.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «misericordia» en el texto principal por «amor leal» para reflejar mejor חַסְדּוֹ según la rationale auditada de «steadfast love». También se recasta el refrán como «permanece para siempre» para expresar con naturalidad en español la duración continua de לְעוֹלָם. Se mantiene «herencia» y «siervo» por buena alineación con el hebreo y con las decisiones del POB.
