translation:
  language: es
  text: Entonces quise conocer[a] la verdad acerca de la cuarta bestia, que era diferente de todas ellas, sumamente aterradora, con dientes de hierro y garras de bronce, que devoraba, trituraba y pisoteaba el resto con sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «averiguar la verdad acerca de la cuarta bestia». El arameo expresa un deseo de conocer algo con certeza.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - En aquel momento
  lexicon: HALOT
  rationale: Marca discursiva temporal; «Entonces» mantiene la secuencia narrativa con naturalidad en español.
- source_word: צְבִית
  english_pob_choice: I wanted
  chosen_spanish: quise
  alternatives_spanish:
  - deseé
  - quería
  lexicon: HALOT
  rationale: Expresa la intención o deseo de Daniel de manera directa. «Quise» conserva el impulso volitivo sin sonar demasiado interpretativo.
- source_word: לְיַצָּבָא
  english_pob_choice: to know the truth / to know for certain
  chosen_spanish: conocer la verdad
  alternatives_spanish:
  - saber con certeza
  - averiguar la verdad
  lexicon: HALOT
  rationale: El valor idiomático apunta a conocer algo con certeza o a la verdad de la cuestión. «Conocer la verdad» refleja bien el matiz y sigue la revisión inglesa más reciente.
- source_word: עַל
  english_pob_choice: about
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: HALOT
  rationale: Con verbos de conocimiento o indagación, «acerca de» es una preposición natural y fiel al sentido relacional del arameo.
- source_word: חֵיוְתָא רְבִיעָיְתָא
  english_pob_choice: the fourth beast
  chosen_spanish: la cuarta bestia
  alternatives_spanish:
  - la bestia cuarta
  lexicon: HALOT
  rationale: Traducción directa y idiomática del sintagma nominal con ordinal.
- source_word: דִּי הֲוָת שָׁנְיָה מִן כָּלְהוֹן
  english_pob_choice: which was different from all of them
  chosen_spanish: que era diferente de todas ellas
  alternatives_spanish:
  - que era distinta de todas ellas
  - que se diferenciaba de todas
  lexicon: HALOT
  rationale: «Diferente» conserva el contraste sin introducir una connotación más fuerte que la del arameo.
- source_word: דְּחִילָה יַתִּירָה
  english_pob_choice: exceedingly terrifying
  chosen_spanish: sumamente aterradora
  alternatives_spanish:
  - sumamente temible
  - extraordinariamente espantosa
  lexicon: HALOT
  rationale: La intensificación se preserva con un adverbio fuerte; «aterradora» mantiene el tono vívido del lenguaje de bestia.
- source_word: שִׁנַּיּהּ דִּי פַרְזֶל
  english_pob_choice: with teeth of iron
  chosen_spanish: con dientes de hierro
  alternatives_spanish:
  - con sus dientes de hierro
  - con dientes hechos de hierro
  lexicon: HALOT
  rationale: La construcción descriptiva se vierte de forma natural en español y mantiene la imagen metálica.
- source_word: וְטִפְרַיּהּ דִּי נְחָשׁ
  english_pob_choice: and claws of bronze
  chosen_spanish: y garras de bronce
  alternatives_spanish:
  - y uñas de bronce
  - y uñas/garras de bronce
  lexicon: HALOT
  rationale: «Garras» es la opción más adecuada para la imaginería de bestia; se conserva el posible trasfondo de «uñas», pero sin perder la fuerza visual.
- source_word: אָכְלָה
  english_pob_choice: devoured
  chosen_spanish: devoraba
  alternatives_spanish:
  - devoró
  - comía
  lexicon: HALOT
  rationale: En la secuencia descriptiva, el imperfecto español ayuda a reflejar la acción característica o reiterada de la bestia.
- source_word: מַדֲּקָה
  english_pob_choice: crushed
  chosen_spanish: trituraba
  alternatives_spanish:
  - desmenuzaba
  - aplastaba
  lexicon: HALOT
  rationale: «Trituraba» expresa con fuerza la idea de romper o pulverizar; mantiene el paralelismo violento con «devoraba» y «pisoteaba».
- source_word: וּשְׁאָרָא
  english_pob_choice: the rest
  chosen_spanish: lo que quedaba
  alternatives_spanish:
  - el resto
  - lo restante
  lexicon: HALOT
  rationale: La referencia es al remanente tras las acciones destructivas; «lo que quedaba» es claro y evita restringir indebidamente el alcance nominal.
- source_word: בְּרַגְלַיּהּ רָפְסָה
  english_pob_choice: trampled ... with its feet
  chosen_spanish: pisoteaba ... con sus pies
  alternatives_spanish:
  - pisaba ... con sus pies
  - aplastaba ... con sus pies
  lexicon: HALOT
  rationale: «Pisoteaba» comunica con precisión el verbo de pisar/trample y conserva el valor corporal explícito de «con sus pies».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa reciente que sustituyó «for certain» por «the truth» y «what was left» por «the rest». Por eso la formulación española adopta «conocer la verdad» y una referencia al remanente con «lo que quedaba», sin introducir una interpretación más amplia que la del texto.
  spanish_consistency_notes:
  - Se conservó «bestia» para חֵיוְתָא, en línea con la imaginería del pasaje.
  - Se mantuvo «garras de bronce» como solución preferente para טִפְרַיּהּ, con nota implícita sobre la posible alternativa «uñas».
  - Se tradujo la secuencia verbal con imperfectos («devoraba, trituraba y pisoteaba») para reflejar el carácter descriptivo del hebreo/arameo en contexto narrativo profético.
  - Se usó «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton ni una referencia directa al nombre divino.
