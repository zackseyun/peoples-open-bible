  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; por consistencia con la política del proyecto, se lo traslada como nombre propio «Yahvé» en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
