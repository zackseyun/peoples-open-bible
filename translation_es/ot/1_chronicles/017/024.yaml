translation:
  language: es
  text: 'Que sea establecido, y sea engrandecido tu nombre para siempre, diciendo: «Yahvé de los ejércitos, el Dios de Israel, es Dios para Israel[a]», y que la casa[b] de David tu siervo sea establecida delante de ti.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé de los ejércitos, el Dios de Israel, es el Dios de Israel». El hebreo dice más literalmente: «es Dios para Israel».'
    reason: lexical_alternative
  - marker: b
    text: «Casa» aquí tiene el sentido de la casa real o dinastía de David.
    reason: cultural_note
lexical_decisions:
- source_word: וְיֵאָמֵן
  english_pob_choice: May it be established
  chosen_spanish: Que sea establecido
  alternatives_spanish:
  - Que sea confirmado
  - Que permanezca firme
  lexicon: HALOT
  rationale: El nifal expresa aquí un ruego para que algo quede firme o asentado. «Que sea establecido» conserva bien la fuerza optativa y mantiene el paralelismo con el segundo uso de נָכוֹן al final del verso.
- source_word: וְיִגְדַּל
  english_pob_choice: may ... be magnified
  chosen_spanish: que sea engrandecido
  alternatives_spanish:
  - que sea grande
  - que sea exaltado
  lexicon: HALOT
  rationale: גדל en este contexto tiene fuerza jussiva respecto al nombre divino. «Engrandecido» preserva el matiz honorífico mejor que una simple traducción por «ser grande».
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu reputación
  - tu renombre
  lexicon: HALOT
  rationale: Se conserva «nombre» por ser el giro hebreo normal para identidad revelada, fama y honra. Parafrasearlo borraría esa densidad semántica.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - hasta la eternidad
  lexicon: HALOT
  rationale: Es una fórmula idiomática de duración perpetua. «Para siempre» es natural en español y transmite el alcance temporal sin endurecer el estilo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - así que digan
  lexicon: HALOT
  rationale: Se mantiene la estructura discursiva introduciendo la confesión que sigue. «Diciendo» reproduce la relación sintáctica sin sobreparafrasear.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se usa la transliteración establecida en el proyecto para el nombre divino, en lugar de sustituirlo por un título. Esto preserva el nombre personal del pacto.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de las huestes
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: El título divino admite un rango semántico amplio. En español, «de los ejércitos» es transparente y fiel; conserva la imagen de fuerzas celestiales y terrenales bajo su mando.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción en estado constructo se refleja de forma directa. «Dios de Israel» es la forma natural y fiel en español.
- source_word: אֱלֹהִים לְיִשְׂרָאֵל
  english_pob_choice: is God to Israel
  chosen_spanish: es Dios para Israel
  alternatives_spanish:
  - es Dios a Israel
  - es el Dios de Israel
  lexicon: HALOT
  rationale: Se conserva la preposición ל con valor relacional/benefactivo. «Para Israel» evita absorber el matiz en una posesión más suave y respeta la tensión lexical documentada por el audit trail inglés.
- source_word: וּבֵית דָּוִיד עַבְדְּךָ
  english_pob_choice: and ... the house of David your servant
  chosen_spanish: y la casa de David tu siervo
  alternatives_spanish:
  - y la dinastía de David tu siervo
  - y el linaje de David tu siervo
  lexicon: HALOT
  rationale: בַּיִת en contexto dinástico puede referirse a la casa real o dinastía. «Casa» conserva la transparencia literal; el sentido dinástico queda disponible por el contexto.
- source_word: נָכוֹן
  english_pob_choice: be established
  chosen_spanish: sea establecida
  alternatives_spanish:
  - sea hecha firme
  - sea segura
  lexicon: HALOT
  rationale: Se mantiene el campo semántico de quedar firmemente asentado. Repetir «establecida» ayuda a reflejar la cohesión del verso con el primer verbo.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  lexicon: HALOT
  rationale: «Delante de ti» es una traducción relacional directa y suficientemente idiomática en español. Conserva la imagen espacial sin perder el sentido de presencia divina.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea el Tetragrámaton directamente. Se adopta «Yahvé» según la convención del proyecto para mantener el nombre propio del pacto y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the imperfect/jussive verbs in the prayer
  english_pob_reading: Optative 'May it be established ... may your name be magnified ... may the house of David ... be established'
  chosen_spanish_reading: 'Optativo: «Que sea establecido ... que sea engrandecido ... que la casa de David ... sea establecida»'
  alternative_spanish_readings:
  - 'Futuro: «será establecido ... será engrandecido ... será establecida»'
  rationale: David está orando en respuesta a la promesa divina, así que los imperfectos funcionan mejor como peticiones o deseos, no como simples predicciones.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
- issue: Sense of אֱלֹהִים לְיִשְׂרָאֵל
  english_pob_reading: is God to Israel
  chosen_spanish_reading: es Dios para Israel
  alternative_spanish_readings:
  - es Dios a Israel
  - es Israel’s God
  rationale: Se conserva el valor relacional de ל sin convertirlo en una posesión idiomática. «Para Israel» mantiene la orientación covenantal que el audit trail inglés quiso preservar.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
translation_notes:
  revision_awareness: El borrador sigue el último ajuste del audit trail inglés, que prefirió «God to Israel» por su correspondencia más cercana con לְיִשְׂרָאֵל. En español se optó por «Dios para Israel», porque conserva mejor la misma tensión relacional/benefactiva sin sonar forzado. También se mantuvo la lectura optativa del conjunto verbal y el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva el paralelismo con «establecido / establecida» para reflejar la repetición de la raíz semántica.
  - «Casa de David» se mantiene literal, con el sentido dinástico inferido por contexto.
  - No se introduce «Cristo», «SEÑOR» ni otras sustituciones tradicionales sin base textual.
