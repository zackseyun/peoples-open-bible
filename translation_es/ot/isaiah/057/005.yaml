    rationale: Aunque la nota léxica admite proyecciones o divisiones, el POB auditado optó por «clefts». En español, «salientes» apunta a protuberancias, no a hendiduras u oquedades ocultas; «hendiduras» o «grietas» representa mejor el contexto.
