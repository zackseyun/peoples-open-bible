base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/002/032.yaml
  text: They carried Asahel and buried him in his father's tomb[a], which was at Bethlehem. Then Joab and his men traveled all night[b], and daybreak came upon them at Hebron.
  footnotes:
  - marker: a
    text: Or 'in his father's grave.' The Hebrew קֶבֶר can refer either to a grave or to a tomb/family burial place.
    reason: lexical_alternative
  - marker: b
    text: Or 'the dawn broke on them at Hebron.' The Hebrew idiom literally says 'it became light for them.'
    reason: lexical_alternative
