  rationale: Se ajusta «tuvieron envidia» a «tuvieron celos» para reflejar mejor קנא en un contexto de rivalidad y mantener mayor cercanía con la decisión fuente. Se añade una nota con la alternativa documentada para קְדוֹשׁ יְהוָה, preservando la evidencia léxica y teológica de la auditoría inglesa.
