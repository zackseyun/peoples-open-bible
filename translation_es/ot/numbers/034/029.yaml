translation:
  language: es
  text: Estos son aquellos a quienes Yahvé mandó repartir la herencia a los hijos de Israel en la tierra de Canaán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estos son los que Yahvé mandó dar en herencia a los hijos de Israel en la tierra de Canaán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are the ones
  chosen_spanish: Estos son los que
  alternatives_spanish:
  - Estos son
  - Estos son aquellos
  lexicon: HALOT
  rationale: El demostrativo introduce una identificación conclusiva; en español, «Estos son los que» conserva la fuerza referencial y suena natural sin añadir contenido ajeno.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: los que
  alternatives_spanish:
  - quienes
  - que
  lexicon: HALOT
  rationale: Como relativo referido a personas, «los que» mantiene el valor relacional del hebreo y funciona bien tras «son».
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: HALOT
  rationale: El verbo básico es «mandar/ordenar». «Mandó» preserva el sentido léxico sin endurecer innecesariamente el registro español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino según la norma del proyecto: la transliteración «Yahvé», en lugar de una sustitución titulativa.'
- source_word: לְנַחֵל
  english_pob_choice: to apportion the inheritance
  chosen_spanish: para asignar la herencia
  alternatives_spanish:
  - para repartir la herencia
  - para dar la herencia
  - para adjudicar la herencia
  lexicon: HALOT
  rationale: El infinitivo causativo expresa la acción de hacer que Israel reciba la herencia. «Asignar la herencia» comunica el proceso de reparto/herencia sin sonar forzado en español.
- source_word: אֶת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los israelitas
  - al pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión literal y formal «hijos de Israel», coherente con el hebreo y con el estilo reverente del texto.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  - en la tierra de Canaan
  lexicon: HALOT
  rationale: La construcción hebrea incluye explícitamente «tierra»; por eso se mantiene «en la tierra de Canaán».
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del POB de no ocultar el Tetragrámaton tras una sustitución. «Yahvé» preserva el nombre propio del pacto en español.
  doctrine_reference: 'DOCTRINE.md — contested terms: יְהוָה / YHWH'
translation_notes:
  revision_awareness: El audit trail en inglés no requirió cambios sustantivos; la revisión más reciente indicó que no había modificaciones necesarias. La versión española sigue esa misma lectura, conservando el nombre divino y la idea de adjudicación de la herencia con formulación natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del nombre divino en todo el texto.
  - Se prefirió «hijos de Israel» para conservar la forma hebrea literal y consistente con el registro formal del pasaje.
  - «Asignar la herencia» refleja la acción de reparto hereditario sin introducir una glosa interpretativa más amplia.
