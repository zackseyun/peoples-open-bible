  lexicon: Crum; Greek loan semantics in Coptic Christian texts
  rationale: Technical locus of Valentinian soteriology; capitalized to signal the
    eschatological/rest motif, not merely physical rest.
- source_word: ⲡⲓⲱⲧ
  chosen: the Father
  alternatives:
