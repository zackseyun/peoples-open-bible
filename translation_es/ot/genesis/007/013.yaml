translation:
  language: es
  text: Ese mismo día Noé entró en el arca[a], con Sem, Cam y Jafet, hijos de Noé, la mujer de Noé y las tres mujeres de sus hijos con ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vino al arca». El verbo hebreo es literalmente «vino», pero aquí se refiere a entrar.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «con ellos»; el plural masculino se refiere de manera más natural al grupo familiar ya mencionado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: On that very day
  chosen_spanish: En ese mismo día
  alternatives_spanish:
  - En aquel mismo día
  - Ese mismo día
  lexicon: HALOT
  rationale: La expresión intensifica la especificidad temporal. «En ese mismo día» conserva el énfasis de «very/same» con un español natural y solemne.
- source_word: בָּא
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - vino
  - llegó
  - entró en
  lexicon: HALOT
  rationale: Aunque el verbo base es «vino / came», el contexto con el arca exige el sentido de ingreso. «Entró» comunica el movimiento hacia el interior sin sobrecargar la frase.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noe
  lexicon: nombre propio bíblico
  rationale: Nombre propio bíblico estándar en español.
- source_word: וְשֵׁם וְחָם וָיֶפֶת
  english_pob_choice: with Shem, Ham, and Japheth
  chosen_spanish: con Sem, Cam y Jafet
  alternatives_spanish:
  - y Sem, y Cam, y Jafet
  - con Sem, Cam, y Jafet
  lexicon: nombres propios
  rationale: El hebreo coordina los nombres; en español, «con» comunica de forma natural que acompañan a Noé al arca, como en el audit trail inglés.
- source_word: בְּנֵי נֹחַ
  english_pob_choice: Noah’s sons
  chosen_spanish: hijos de Noé
  alternatives_spanish:
  - los hijos de Noé
  - los hijos de Noé
  lexicon: HALOT
  rationale: La construcción de relación se expresa de manera directa y natural en español con «hijos de Noé».
- source_word: וְאֵשֶׁת נֹחַ
  english_pob_choice: and Noah’s wife
  chosen_spanish: la mujer de Noé
  alternatives_spanish:
  - y la esposa de Noé
  - y la mujer de Noé
  lexicon: HALOT
  rationale: «Mujer» es una equivalencia sobria y fiel al vínculo posesivo del hebreo; evita introducir un matiz conyugal más marcado que el texto no exige, aunque «esposa» sería posible.
- source_word: וּשְׁלֹשֶׁת נְשֵׁי בָנָיו
  english_pob_choice: and the three wives of his sons
  chosen_spanish: las tres mujeres de sus hijos
  alternatives_spanish:
  - las tres esposas de sus hijos
  - las tres mujeres de sus hijos
  lexicon: HALOT
  rationale: El hebreo usa «mujeres/esposas» en sentido relacional. Se mantiene «mujeres» para no forzar un término más técnico que el propio hebreo no usa y para reflejar la misma amplitud semántica.
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - con ellos mismos
  - junto con ellos
  lexicon: HALOT
  rationale: El plural masculino refuerza que el grupo ya nombrado es el referente natural. «Con ellos» reproduce la idea de acompañamiento y preserva la fuerza colectiva del pronombre.
- source_word: אֶל הַתֵּבָה
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - al arca
  - hacia el arca
  lexicon: HALOT
  rationale: En español, con el verbo «entró» basta el complemento de destino implícito; «el arca» identifica el objeto narrativo estándar del relato de Noé.
theological_decisions:
- issue: Cómo reflejar el movimiento verbal hacia el arca sin perder la literalidad del hebreo
  english_pob_reading: The Hebrew verb is literally 'came,' but in context it refers to entering.
  chosen_spanish_reading: «entró» comunica el hecho narrativo de ingresar al arca sin convertir el texto en una paráfrasis libre.
  alternative_spanish_readings:
  - vino al arca
  - llegó al arca
  - vino y entró en el arca
  rationale: El contexto no es simplemente desplazamiento, sino entrada efectiva al arca. «Entró» mantiene la tensión entre la literalidad del verbo hebreo y la claridad narrativa.
  doctrine_reference: Narrativa del diluvio / fidelidad semántica al evento
- issue: Cómo traducir אִתָּם al final de la lista de personas
  english_pob_reading: with them
  chosen_spanish_reading: con ellos
  alternative_spanish_readings:
  - junto con ellos
  - con el grupo
  rationale: El pronombre plural masculino apunta al grupo familiar ya mencionado. «Con ellos» preserva la referencia colectiva sin duplicar torpemente la preposición en español.
  doctrine_reference: Referencia anafórica y cohesión del texto
- issue: Cómo verter נְשֵׁי בָנָיו
  english_pob_reading: the three wives of his sons
  chosen_spanish_reading: las tres mujeres de sus hijos
  alternative_spanish_readings:
  - las tres esposas de sus hijos
  - las tres mujeres de sus hijos
  rationale: El hebreo emplea una designación relacional básica. Se evita endurecer el sustantivo a «esposas» si el texto fuente no lo requiere de manera explícita, aunque esa opción sería aceptable en español.
  doctrine_reference: Léxico relacional en genealogías y listas narrativas
translation_notes:
  revision_awareness: El draft inglés más reciente osciló entre «as well» y «with them» para reflejar אִתָּם; en español se resolvió la misma tensión manteniendo «con ellos», que suena natural y sigue el pronombre plural del hebreo. También se preservó el movimiento de entrada con «entró» para no perder la lectura contextual del verbo «vino».
  spanish_consistency_notes:
  - Se usa «arca» para תֵּבָה, conforme al uso bíblico estándar del relato de Noé.
  - 'Se mantienen los nombres propios bíblicos habituales en español: Noé, Sem, Cam y Jafet.'
  - «Mujer de Noé» se conserva como traducción sobria del constructo hebreo, sin imponer «esposa» como única opción.
  - No se añadió puntuación explicativa interna al versículo más allá de la necesaria para lectura española clara.
