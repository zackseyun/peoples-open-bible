- from: Cuando David y sus hombres llegaron a la ciudad, he aquí, estaba quemada[a] por el fuego, y sus mujeres, hijos e hijas habían sido llevados cautivos.
  to: Cuando David y sus hombres llegaron a la ciudad, y he aquí que estaba quemada[a], y sus esposas, hijos e hijas habían sido llevados cautivos.
  rationale: Se ajusta «sus mujeres» a «sus esposas» para reflejar con mayor precisión el sentido contextual de וּנְשֵׁיהֶם y la decisión léxica documentada en inglés. También se mejora la naturalidad de la cláusula con הִנֵּה y de la expresión sobre el fuego, preservando el matiz mediante nota sin forzar una construcción menos idiomática en español.
