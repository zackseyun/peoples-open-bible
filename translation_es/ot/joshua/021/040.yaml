translation:
  language: es
  text: Todas las ciudades para los hijos de Merari[a], por sus familias—los restantes de entre las familias de los levitas[b]—fueron doce ciudades por sorteo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para los descendientes de Merari' o 'para los meraritas'.
    reason: lexical_alternative
  - marker: b
    text: O 'el resto de las familias levíticas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הֶעָרִים
  english_pob_choice: All the cities
  chosen_spanish: Todas las ciudades
  alternatives_spanish:
  - Todas las poblaciones
  - Todas las villas
  lexicon: HALOT
  rationale: עִיר puede ser 'ciudad' o 'población', pero en listas de repartos territoriales 'ciudades' conserva mejor la forma del registro y el valor de unidades asignadas. 'Todas' refleja כָּל con naturalidad en español.
- source_word: לִבְנֵי מְרָרִי
  english_pob_choice: for the sons of Merari
  chosen_spanish: para los hijos de Merari
  alternatives_spanish:
  - para los descendientes de Merari
  - para los meraritas
  lexicon: HALOT
  rationale: בְּנֵי es literalmente 'hijos de'. 'Hijos de Merari' mantiene la forma genealógica del hebreo; 'descendientes' o 'meraritas' aclaran, pero se alejan más de la formulación fuente.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their families
  chosen_spanish: por sus familias
  alternatives_spanish:
  - según sus familias
  - por clanes
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede ser 'familia' o 'clan'. 'Por sus familias' conserva la idea distributiva del reparto y suena natural en español.
- source_word: הַנּוֹתָרִים
  english_pob_choice: the remaining ones
  chosen_spanish: las restantes
  alternatives_spanish:
  - los que quedaban
  - los restantes
  lexicon: HALOT
  rationale: El participio sustantivado expresa a los que quedaron después de una parte ya tratada. 'Las restantes' recoge ese valor de manera concisa; concuerda con 'ciudades' en español.
- source_word: מִמִּשְׁפְּחוֹת הַלְוִיִּם
  english_pob_choice: from the families of the Levites
  chosen_spanish: de entre las familias de los levitas
  alternatives_spanish:
  - de las familias de los levitas
  - de entre los clanes de los levitas
  lexicon: HALOT
  rationale: La preposición מִן aquí señala procedencia o selección dentro de un grupo. 'De entre' comunica mejor que un simple 'de' que se trata del resto dentro del conjunto levítico.
- source_word: וַיְהִי גּוֹרָלָם
  english_pob_choice: were ... by lot
  chosen_spanish: fueron ... por sorteo
  alternatives_spanish:
  - les tocó ... por sorteo
  - fueron ... por suerte
  lexicon: HALOT
  rationale: גּוֹרָל es 'suerte' o 'sorteo' en el contexto de repartos. 'Por sorteo' hace explícito el mecanismo de asignación sin introducir una idea ajena; evita una construcción demasiado literal como 'su lote fue'.
- source_word: עָרִים שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: twelve cities
  chosen_spanish: doce ciudades
  alternatives_spanish:
  - doce poblaciones
  - doce villas
  lexicon: HALOT
  rationale: Se mantiene la unidad de medida territorial como 'ciudades', en concordancia con el contexto de repartos levíticos y con la decisión inglesa.
theological_decisions:
- issue: La expresión final de reparto por suerte/lote
  english_pob_reading: were twelve cities by lot
  chosen_spanish_reading: fueron doce ciudades por sorteo
  alternative_spanish_readings:
  - les tocaron doce ciudades por sorteo
  - fueron doce ciudades por su lote
  rationale: El hebreo habla del resultado de una asignación hecha por sorteo. En español, 'por sorteo' comunica ese procedimiento con claridad y sin borrar el sentido de providencia/distribución inherente al texto, pero sin forzar una teología explícita que el versículo no desarrolla.
  doctrine_reference: Josué 18–21; reparto de la herencia por suertes
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar 'their' antes de 'lot' y dejar simplemente 'by lot'. La redacción española sigue esa lectura más directa con 'por sorteo', evitando un posesivo que no está en el hebreo.
  spanish_consistency_notes:
  - Se mantiene 'ciudades' para la unidad territorial, coherente con otras listas de herencia.
  - Se usa 'hijos de' como reflejo transparente de בְּנֵי, con alternativa documentada en nota.
  - '''Familias'' se conserva para מִשְׁפָּחָה, sin convertirlo automáticamente en ''clanes''.'
  - '''Por sorteo'' preserva el valor de גּוֹרָל sin introducir terminología eclesiástica.'
