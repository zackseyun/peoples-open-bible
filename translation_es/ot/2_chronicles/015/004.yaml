translation:
  language: es
  text: Pero en su angustia[a] volvieron a Yahvé, el Dios de Israel, y lo buscaron, y él fue hallado[b] por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «en su angustia», con singular que se entiende de manera colectiva para Israel.
    reason: lexical_alternative
  - marker: b
    text: 'O: «se dejó hallar por ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - regresaron
  - volvieron atrás
  - se volvieron
  lexicon: HALOT
  rationale: שׁוּב expresa volver/retornar. En español, «volvieron» comunica bien el retorno relacional a Dios sin sonar rígido. «Se volvieron» podría sugerir solo cambio de dirección, y «volvieron atrás» suena demasiado físico.
- source_word: בַּצַּר לוֹ
  english_pob_choice: in their distress
  chosen_spanish: en su angustia
  alternatives_spanish:
  - en su aflicción
  - cuando estaban angustiados
  - en su aprieto
  lexicon: HALOT
  rationale: צַר aquí denota estrechez, angustia o aflicción. Conservé el singular posesivo «su» porque el hebreo tiene לוֹ; no resolví la tensión al plural en el texto principal. «Angustia» es natural en español y mantiene la fuerza de la situación.
- source_word: עַל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - para Yahvé
  lexicon: HALOT
  rationale: Con שׁוּב, עַל marca el giro de retorno hacia Yahvé. En español, la preposición natural es «a». Se conserva «Yahvé» según la norma del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se traslada como «Yahvé», no como un título sustitutivo. Esto preserva el nombre personal revelado a Israel.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de los israelitas
  - el Dios perteneciente a Israel
  lexicon: HALOT
  rationale: La cadena constructa se mantiene de forma directa y clara. «El Dios de Israel» conserva el vínculo pactual y la identificación histórica.
- source_word: וַיְבַקְשֻׁהוּ
  english_pob_choice: sought him
  chosen_spanish: lo buscaron
  alternatives_spanish:
  - lo buscaron con empeño
  - lo procuraron
  - lo buscaron a él
  lexicon: HALOT
  rationale: בקשׁ con objeto personal puede traducirse como buscar a alguien. «Lo buscaron» es natural en español y refleja la acción de volver a Dios en dependencia.
- source_word: וַיִּמָּצֵא לָהֶם
  english_pob_choice: he was found by them
  chosen_spanish: fue hallado por ellos
  alternatives_spanish:
  - se dejó hallar por ellos
  - se les hizo hallar
  - lo hallaron
  lexicon: HALOT
  rationale: El nifal de מצא admite pasiva simple. «Fue hallado por ellos» conserva la forma pasiva y la tensión teológica sin añadir una explicación interpretativa. «Hallado» suena bíblico pero sigue siendo claro en español.
theological_decisions:
- issue: Referencia del sufijo singular en בַּצַּר לוֹ
  english_pob_reading: Render the singular suffix collectively as 'their' in English
  chosen_spanish_reading: Conservar el singular posesivo «su» en «en su angustia», con referencia colectiva implícita a Israel
  alternative_spanish_readings:
  - en su angustia, entendiendo «su» como corporativo
  - en su angustia, es decir, la de Israel
  - en su angustia / en su aflicción
  rationale: El hebreo tiene un singular pronominal; el contexto del libro habla corporativamente de Israel. En español, «su» permite respetar la forma del original sin forzar la resolución del referente. La colectividad queda implícita por el contexto inmediato.
  doctrine_reference: Principio de fidelidad formal con inteligibilidad contextual; no borrar tensiones gramaticales cuando el texto las presenta.
- issue: Agencia divina en וַיִּמָּצֵא לָהֶם
  english_pob_reading: he was found by them
  chosen_spanish_reading: fue hallado por ellos
  alternative_spanish_readings:
  - se dejó hallar por ellos
  - fue encontrado por ellos
  rationale: La pasiva simple reproduce con fidelidad la voz del nifal hebreo. Aunque la formulación puede insinuar hallazgo pasivo, el contexto bíblico ya comunica la respuesta de Dios a quienes lo buscan. No se añadió una paráfrasis explicativa para no suavizar la construcción.
  doctrine_reference: Preservar la tensión entre pasividad gramatical y agencia teológica sin resolverla en exceso.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió una pasiva directa («he was found by them») frente a una paráfrasis más explicativa. Por eso el español usa también una pasiva simple («fue hallado por ellos») y no una forma reflexiva interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de acuerdo con la política del proyecto para יְהוָה.
  - «Dios de Israel» conserva la construcción pactual sin añadir explicaciones.
  - Se usa «angustia» para צַר por ser natural y semánticamente fuerte en español.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al versículo.
  - La pasiva «fue hallado por ellos» preserva la cautela teológica del inglés auditado.
