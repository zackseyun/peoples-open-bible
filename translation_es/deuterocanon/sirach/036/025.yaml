translation:
  language: es
  text: Si hay en su lengua misericordia y mansedumbre[a][b], su marido no es como los hijos de los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «su marido no es como otros hombres». El griego dice «los hijos de los hombres», una expresión proverbial masculina.'
    reason: lexical_alternative
  - marker: b
    text: El texto griego aquí es algo abrupto en su expresión; el sentido es que una esposa cuya habla está marcada por misericordia y mansedumbre hace que su marido sea excepcional.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπὶ γλώσσης αὐτῆς
  english_pob_choice: on her tongue
  chosen_spanish: en su lengua
  alternatives_spanish:
  - sobre su lengua
  - en su խոսca
  - en su habla
  lexicon: LSJ
  rationale: En español, «en su lengua» conserva la imagen concreta del órgano del habla sin sonar tan rígido como una calca de «sobre su lengua». También mantiene la transparencia del griego, donde la expresión señala el contenido de lo que ella dice.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - clemencia
  - compasión
  - misericordia
  lexicon: LSJ
  rationale: «Misericordia» es la equivalencia más natural y reconocible en español bíblico para ἔλεος. Aunque «misericordia» y «compasión» se solapan, «misericordia» mantiene mejor el valor moral y religioso del término.
- source_word: πραΰτης
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - gentileza
  - suavidad
  - humildad
  lexicon: LSJ
  rationale: Para el español bíblico, «mansedumbre» comunica con más precisión la virtud de πραΰτης que «gentileza», que puede sonar más social que moral. Aunque «mansedumbre» puede tener resonancias tradicionales, aquí refleja bien el matiz de apacibilidad y dominio suave de sí.
- source_word: ὁ ἀνὴρ αὐτῆς
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  - su hombre
  lexicon: LSJ
  rationale: En este contexto matrimonial, ἀνήρ significa «marido». «Su marido» es claro, idiomático y fiel al sentido relacional del texto.
- source_word: καθʼ υἱοὺς ἀνθρώπων
  english_pob_choice: like the sons of men
  chosen_spanish: como los hijos de los hombres
  alternatives_spanish:
  - como otros hombres
  - como seres humanos
  - como la gente común
  lexicon: LSJ
  rationale: Se conserva la forma masculina proverbial del griego, tal como hace el POB inglés, para no neutralizar una expresión heredada del texto. «Como otros hombres» explica el sentido, pero borra la imagen literal; por eso queda como alternativa, no como texto principal.
theological_decisions:
- issue: Expresión masculina proverbial en καθʼ υἱοὺς ἀνθρώπων
  english_pob_reading: The Greek says 'the sons of men,' a masculine proverbial expression.
  chosen_spanish_reading: La expresión «los hijos de los hombres» se conserva como fórmula proverbial masculina.
  alternative_spanish_readings:
  - como otros hombres
  - como la gente común
  - como seres humanos
  rationale: La forma griega es masculina y proverbial, y el proyecto pide no neutralizarla en el texto principal sin razón textual. Mantenerla preserva la tensión entre la literalidad del giro y su sentido probable de comparación con hombres ordinarios.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido global de la oración en una frase gramaticalmente algo abrupta
  english_pob_reading: the sense is that a wife whose speech is marked by mercy and gentleness makes her husband exceptional.
  chosen_spanish_reading: El sentido es que una esposa cuya habla está marcada por misericordia y mansedumbre hace que su marido sea excepcional.
  alternative_spanish_readings:
  - una esposa así honra a su marido
  - su marido no es como los demás hombres
  rationale: El griego es algo enrevesado, pero el contexto orienta a una afirmación de efecto moral y social. La redacción española principal conserva la estructura del original sin sobreexplicar; la explicación del sentido queda para la nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: El cotejo final indica alta coincidencia y sin cambios sustantivos en la última pasada. La principal cuestión para el español es conservar la imagen masculina proverbial del cierre sin borrar la tensión idiomática del griego. Se han ajustado las elecciones léxicas para un español bíblico claro y publicable.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y comprensible para lectorado hispano amplio.
  - «Misericordia» y «mansedumbre» reflejan dos virtudes distintas del griego sin fusionarlas.
  - La nota sobre «como otros hombres» se reserva como alternativa, no como sustituto del texto principal, para preservar la forma del source text.
  - Se evitó «SEÑOR» y otras convenciones no pertinentes porque el versículo no contiene el tetragrámaton ni κύριος en función divina.
