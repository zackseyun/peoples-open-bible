translation:
  language: es
  text: Koz engendró a Anub, a Hazzobebah[a] y las familias[b] de Aharhel, hijo de Harum.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Zobebah», si no se refleja en la transliteración el artículo prefijado del hebreo.
    reason: lexical_alternative
  - marker: b
    text: «Familias» también puede rendirse como «clanes» en este contexto genealógico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וֹץ
  english_pob_choice: Koz
  chosen_spanish: Koz
  alternatives_spanish:
  - Hakkoz
  lexicon: HALOT
  rationale: Nombre propio; se translitera. Se conserva la forma breve 'Koz', siguiendo la elección auditada en inglés y el valor consonántico del hebreo, sin añadir el artículo que no aparece en este versículo.
- source_word: הוֹלִ֔יד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En genealogías, הוֹלִיד expresa generación o paternidad. 'Engendró' conserva el sentido genealógico de manera natural y algo más formal en español bíblico que 'fue padre de'.
- source_word: עָנ֖וּב
  english_pob_choice: Anub
  chosen_spanish: Anub
  lexicon: HALOT
  rationale: Nombre propio; transliteración directa y estable.
- source_word: הַ/צֹּבֵבָ֑ה
  english_pob_choice: Hazzobebah
  chosen_spanish: Hazzobebah
  alternatives_spanish:
  - Zobebah
  lexicon: HALOT
  rationale: Se mantiene la forma con h inicial reflejando el artículo prefijado que el texto hebreo presenta y que el audit trail inglés preserva. La alternativa sin h queda como posibilidad reconocida.
- source_word: וּ/מִשְׁפְּח֥וֹת
  english_pob_choice: and the families of
  chosen_spanish: y a las familias de
  alternatives_spanish:
  - y a los clanes de
  - y las familias de
  lexicon: HALOT
  rationale: En listas genealógicas, מִשְׁפְּחוֹת puede referirse a grupos familiares extensos o clanes. 'Familias' es más transparente; se añade 'a' por el régimen del verbo y la enumeración personal en español.
- source_word: אֲחַרְחֵ֖ל
  english_pob_choice: Aharhel
  chosen_spanish: Aharhel
  lexicon: HALOT
  rationale: Nombre propio; transliteración directa.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  lexicon: HALOT
  rationale: Marcador genealógico estándar en español, equivalente directo de la relación filial del hebreo.
- source_word: הָרֽוּם
  english_pob_choice: Harum
  chosen_spanish: Harum
  alternatives_spanish:
  - Haram
  lexicon: HALOT
  rationale: Nombre propio; se sigue la vocalización masorética 'Harum', que el audit trail inglés también prioriza sobre la variante 'Haram'.
translation_notes:
  revision_awareness: El borrador sigue la evaluación de alta concordancia y no introduce cambios respecto del audit trail en inglés. Se conserva la estructura genealógica, la transliteración de los nombres propios y la alternativa textual para Hazzobebah/Zobebah.
  spanish_consistency_notes:
  - Se usa 'engendró' para mantener un registro genealógico natural y fiel al Hiphil de הוֹלִיד.
  - Se conserva 'familias' en el cuerpo, con nota alternativa 'clanes' por el matiz genealógico del sustantivo.
  - Los nombres propios se transliteran de manera consistente sin normalizarlos a formas tradicionales distintas de las auditadas.
  - Se mantiene la sintaxis enumerativa con repetición de 'a' para claridad en español.
