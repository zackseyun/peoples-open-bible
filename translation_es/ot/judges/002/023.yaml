translation:
  language: es
  text: Así que Yahvé dejó a estas naciones[a], sin expulsarlas rápidamente, y no las entregó en la mano de Josué.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estos pueblos»; el hebreo puede referirse tanto a naciones como a pueblos, según el énfasis del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנַּח / left
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó permanecer
  - permitió que permanecieran
  - dejó en el lugar
  lexicon: HALOT
  rationale: El hebreo expresa que Yahvé las dejó subsistir o permanecer; en español, «dejó» reproduce la acción básica sin añadir una expansión como «en el lugar». El contexto ya deja claro que no fueron expulsadas.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, según el criterio del proyecto. «Yahvé» mantiene la referencia personal del nombre del pacto y evita la sustitución por un título.
- source_word: הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: these nations
  chosen_spanish: estas naciones
  alternatives_spanish:
  - estos pueblos
  - estas gentes
  lexicon: HALOT
  rationale: גוֹיִם suele referir a colectivos nacionales o étnicos; «naciones» es natural en español bíblico contemporáneo y conserva mejor el matiz de grupos políticos/étnicos que «pueblos» en este contexto.
- source_word: לְבִלְתִּי הוֹרִישָׁם מַהֵר
  english_pob_choice: not driving them out quickly
  chosen_spanish: sin expulsarlas pronto
  alternatives_spanish:
  - sin desposeerlas pronto
  - sin echarlas pronto
  - no expulsándolas rápidamente
  lexicon: HALOT
  rationale: La construcción negativa final expresa que no fueron removidas con rapidez. «Sin expulsarlas pronto» comunica el sentido de manera natural y breve; «expulsar» transmite bien la idea de desalojar del territorio, evitando la rigidez de un calco.
- source_word: הוֹרִישָׁם
  english_pob_choice: driving them out
  chosen_spanish: expulsarlas
  alternatives_spanish:
  - desposeerlas
  - echarlas fuera
  lexicon: HALOT
  rationale: El verbo causativo de ירשׁ en este pasaje tiene el sentido de quitarles posesión/territorio, es decir, expulsarlas. «Expulsarlas» es claro en español y preserva la fuerza concreta del acto.
- source_word: וְלֹא נְתָנָם בְּיַד יְהוֹשֻׁעַ
  english_pob_choice: and he did not give them into the hand of Joshua
  chosen_spanish: y no las entregó en mano de Josué
  alternatives_spanish:
  - y no las puso en mano de Josué
  - y no las entregó en la mano de Josué
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea «en mano de», que expresa poder o control. «Entregó en mano de Josué» mantiene el tono bíblico y la imagen original sin convertirla en una abstracción.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El verso usa directamente יְהוָה. Conforme a la línea doctrinal del proyecto, se traduce como «Yahvé» para preservar el nombre revelado de Dios y no sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La imagen idiomática de 'into the hand of Joshua'
  english_pob_reading: into the hand of Joshua
  chosen_spanish_reading: en mano de Josué
  alternative_spanish_readings:
  - en la mano de Josué
  - bajo el poder de Josué
  rationale: La expresión hebrea conserva una imagen de dominio o entrega en combate. En español, «en mano de Josué» mantiene la metáfora y el registro bíblico sin perder inteligibilidad.
  doctrine_reference: Uso idiomático bíblico de la metáfora de la mano como poder/control
translation_notes:
  revision_awareness: La redacción española sigue el sentido del texto hebreo y el audit trail inglés. Se evitó la expansión «en el lugar» retirada en la revisión final inglesa, y se conservó la metáfora de «en mano de» por ser parte del idiomatismo bíblico. El adverbio «pronto» representa la idea de no expulsarlos con rapidez.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה en coherencia con el criterio del proyecto.
  - Se prefiere «naciones» para גּוֹיִם, con nota alternativa para «pueblos».
  - Se conserva «en mano de» como equivalente idiomático de בְּיַד.
  - «Expulsar» se usa para el valor causativo de הוֹרִישׁ en este contexto territorial.
