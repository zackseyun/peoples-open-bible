revisions:
- from: Los lazos de Sheol me rodearon[a][b]; las trampas de la muerte me confrontaron.
  to: Los lazos de Seol[a] me rodearon; las trampas de la muerte me salieron al encuentro[b].
  rationale: Se cambia «Sheol» por «Seol» para ajustarlo a la ortografía española habitual sin perder la transliteración ni la tensión teológica del hebreo. Se sustituye «me confrontaron» por «me salieron al encuentro» para lograr un español más natural y fiel al valor léxico de קדם como venir al encuentro/preceder en contexto hostil. Se conservan las notas, ajustadas al texto revisado y al orden de marcadores en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:43:33Z'
