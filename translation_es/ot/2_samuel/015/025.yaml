translation:
  language: es
  text: 'Entonces el rey dijo a Sadoc[a]: «Devuelve el arca de Dios a la ciudad. Si hallo favor ante los ojos de Yahvé, él me hará volver y me dejará verla y ver su morada»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y me mostrará a mí[a] y su habitación»; el hebreo también puede entenderse con una referencia más centrada en Dios, aunque el antecedente inmediato es «el arca de Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: הָשֵׁב
  english_pob_choice: Return
  chosen_spanish: Devuelve
  alternatives_spanish:
  - Vuelve
  - Haz regresar
  lexicon: HALOT 7725
  rationale: El imperativo de שוב dirigido a Sadoc pide que el arca sea enviada de regreso. «Devuelve» conserva la orden directa y suena natural en español.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca de Yahvé
  - el arca del Señor
  lexicon: HALOT 727 + 430
  rationale: El hebreo dice literalmente «Dios», no el Tetragrámaton, así que se mantiene «de Dios» sin armonizarlo a «Yahvé».
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - a la ciudad
  - dentro de la ciudad
  lexicon: HALOT 5892
  rationale: El sustantivo definido se entiende por el contexto como destino; «a la ciudad» queda explícito y natural en español.
- source_word: אִם אֶמְצָא חֵן בְּעֵינֵי יְהוָה
  english_pob_choice: If I find favor in the eyes of Yahweh
  chosen_spanish: Si hallo favor ante los ojos de Yahvé
  alternatives_spanish:
  - Si encuentro gracia ante los ojos de Yahvé
  - Si llego a agradar a Yahvé
  lexicon: HALOT 2580 + 5869
  rationale: «Hallar favor» preserva el modismo hebreo y su matiz relacional. «Ante los ojos de» mantiene la transparencia al giro original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT 3068
  rationale: La política del proyecto es transliterar el nombre divino como «Yahvé», no sustituirlo por un título.
- source_word: וֶהֱשִׁבַנִי
  english_pob_choice: he will bring me back
  chosen_spanish: él me hará volver
  alternatives_spanish:
  - él me traerá de vuelta
  - él me devolverá
  lexicon: HALOT 7725
  rationale: La forma causativa expresa que Yahvé es quien provoca el regreso. «Me hará volver» conserva ese valor sin sonar forzado.
- source_word: וְהִרְאַנִי
  english_pob_choice: and let me see
  chosen_spanish: y me dejará verla
  alternatives_spanish:
  - y me hará verla
  - y me permitirá verla
  lexicon: HALOT 7200
  rationale: La causativa de ראה se expresa bien en español con una idea de permiso/providencia. Se hace concordar el referente más inmediato en femenino, «el arca».
- source_word: אֹתוֹ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  - eso
  lexicon: HALOT 853
  rationale: En español, el pronombre retoma naturalmente «el arca» en femenino. El contexto inmediato favorece ese antecedente concreto.
- source_word: נָוֵהוּ
  english_pob_choice: its dwelling place
  chosen_spanish: su morada
  alternatives_spanish:
  - su lugar de morada
  - su habitación
  lexicon: HALOT 5116
  rationale: נוה puede referirse a morada/domicilio. «Su morada» conserva la ambigüedad respetando el posible alcance sacral sin especificar más de lo que el texto dice.
theological_decisions:
- issue: Referencia de «la/lo» y «su morada» en la cláusula final
  english_pob_reading: The phrase refers to the ark and the place where it dwells in Jerusalem, while leaving room for a more God-centered reference.
  chosen_spanish_reading: La frase se lee primariamente del arca y de su morada, sin cerrar la posibilidad de una referencia más centrada en Dios.
  alternative_spanish_readings:
  - Se refiere directamente a Dios y a su morada.
  - Se refiere solo al arca y al lugar donde permanece.
  rationale: El antecedente inmediato es «el arca de Dios», pero el objeto porta la presencia divina. La redacción española conserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica textual sin sobreinterpretación.
translation_notes:
  revision_awareness: El texto sigue de cerca el último pase revisado del inglés POB, que quedó sin cambios; se mantuvo la misma resolución básica de sentido y se adaptó al español con equivalencias naturales.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme a la política del proyecto.
  - Se conservó «arca de Dios» en vez de armonizar a «arca de Yahvé» porque el hebreo aquí dice אֱלֹהִים.
  - Se prefirió «favor»/«hallar favor» por su valor idiomático y relacional.
  - Se mantuvo la tensión interpretativa del final sin explicitar más de lo que el hebreo permite.
