translation:
  language: es
  text: También tú te embriagarás[a]; serás escondida[b]. También tú buscarás un refugio[c] del enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estarás ebria»; el hebreo puede conservar la imagen de embriaguez como figura de aturdimiento bajo juicio.'
    reason: lexical_alternative
  - marker: b
    text: «Serás escondida» refleja de cerca el estado pasivo del hebreo; también puede entenderse como «serás oculta» o, interpretativamente, «desaparecerás».
    reason: lexical_alternative
  - marker: c
    text: 'O: «un baluarte» o «una fortaleza»; el término hebreo puede designar un lugar fortificado, pero aquí se usa como medio de seguridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁכְּרִי
  english_pob_choice: will become drunk
  chosen_spanish: te embriagarás
  alternatives_spanish:
  - estarás ebria
  - te intoxicarás
  lexicon: HALOT
  rationale: El verbo hebreo שׁכר en qal expresa volverse ebrio/intoxicado. En español, «te embriagarás» conserva la imagen concreta y suena natural en registro profético. Evita una paráfrasis que ya explicite la interpretación metafórica, que el contexto deja abierta.
- source_word: תְּהִי נַעֲלָמָה
  english_pob_choice: you will be hidden
  chosen_spanish: serás escondida
  alternatives_spanish:
  - serás ocultada
  - te volverás oculta
  - desaparecerás
  lexicon: HALOT
  rationale: La construcción con היה + forma pasiva/resultativa de עלם comunica un estado de ser escondida u oculta. «Serás escondida» reproduce bien la pasividad del hebreo y mantiene la tensión entre ocultación y desaparición sin forzarla.
- source_word: תְּבַקְשִׁי
  english_pob_choice: will seek
  chosen_spanish: buscarás
  alternatives_spanish:
  - buscarás
  - procurarás
  - tratarás de hallar
  lexicon: HALOT
  rationale: בקש en piel puede significar buscar, procurar o intentar obtener. «Buscarás» es la forma más directa y idiomática en español, suficientemente amplia para el sentido de procurar un medio de seguridad.
- source_word: מָעוֹז
  english_pob_choice: a refuge
  chosen_spanish: un refugio
  alternatives_spanish:
  - una fortaleza
  - un baluarte
  - protección
  lexicon: HALOT
  rationale: מָעוֹז nombra un lugar o medio de fuerza y seguridad. «Refugio» comunica la función inmediata en contexto; «fortaleza» o «baluarte» son posibles, pero tienden a fijar la imagen arquitectónica más que la idea de protección.
- source_word: מֵאוֹיֵב
  english_pob_choice: from the enemy
  chosen_spanish: frente al enemigo
  alternatives_spanish:
  - del enemigo
  - ante el enemigo
  - contra el enemigo
  lexicon: HALOT
  rationale: La preposición מן con אוֹיֵב expresa separación/protección, es decir, buscar refugio respecto del enemigo. «Frente al enemigo» preserva el carácter amenazante de la situación y evita la ambigüedad de un español demasiado abstracto.
- source_word: גַּם אַתְּ
  english_pob_choice: You too
  chosen_spanish: También tú
  alternatives_spanish:
  - Tú también
  - Aun tú
  lexicon: HALOT
  rationale: La repetición enfatiza que Nínive compartirá el mismo destino que la ciudad mencionada antes. «También tú» mantiene el énfasis comparativo e inevitable del hebreo con naturalidad en español.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés con alta concordancia: se mantuvieron las tres proposiciones del versículo, el paralelismo «También tú...», la imagen de embriaguez y ocultación, y la alternativa léxica de מָעוֹז como «fortaleza/stronghold» quedó reflejada en nota. No hubo revisiones aplicadas en el inglés final, por lo que el español conserva una equivalencia óptima sin añadir interpretación externa.'
  spanish_consistency_notes:
  - Se usa «tú» singular para corresponder al femenino singular hebreo אַתְּ.
  - «Embriagarás» se prefiere sobre «estarás ebria» por mayor naturalidad y porque mantiene la fuerza verbal del hebreo.
  - «Serás escondida» preserva la pasividad/resultatividad sin convertir el verbo en una glosa interpretativa.
  - Se evita «SEÑOR» o terminología no presente en el versículo; no hay referencia explícita al nombre divino en este texto.
  - «Refugio» se mantiene como opción funcional; la nota conserva la alternativa documental «fortaleza» para el matiz de מָעוֹז.
