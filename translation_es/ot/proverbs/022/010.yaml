translation:
  language: es
  text: Expulsa al escarnecedor[a], y saldrá la contienda; cesarán el juicio[b] y la deshonra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «burlador» o «mofador». El hebreo לֵץ es un término sapiencial para una persona que se burla con arrogancia y desprecia la corrección y la sabiduría.
    reason: lexical_alternative
  - marker: b
    text: El hebreo דִּין puede significar «juicio», «disputa» o «caso legal». Aquí se traduce «juicio» para reflejar más directamente el término hebreo, aunque en este contexto también puede aludir a contención o controversia.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּרֵשׁ
  english_pob_choice: Drive out
  chosen_spanish: Expulsa
  alternatives_spanish:
  - Echa fuera
  - Destierra
  lexicon: HALOT
  rationale: El imperativo גרשׁ expresa expulsar o hacer salir a alguien con fuerza. «Expulsa» conserva esa fuerza en español moderno y mantiene el tono proverbial y directo del hebreo.
- source_word: לֵץ
  english_pob_choice: a scoffer
  chosen_spanish: escarnecedor
  alternatives_spanish:
  - burlador
  - mofador
  lexicon: HALOT
  rationale: לֵץ designa en Proverbios a quien desprecia la corrección y se burla con arrogancia. «Escarnecedor» es el término español que mejor conserva ese perfil sapiencial y el matiz más fuerte que «burlador».
- source_word: מָדוֹן
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - pleito
  - discordia
  lexicon: HALOT
  rationale: מָדוֹן alude a disputa, riña o discordia. «Contienda» funciona bien en castellano bíblico y conserva el sentido de conflicto relacional que cesa al expulsar al escarnecedor.
- source_word: וְיֵצֵא
  english_pob_choice: will go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - se irá
  - se apartará
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfecta, en el proverbio expresa resultado esperado. «Saldrá» reproduce el efecto consecuente de manera natural en español y respeta el paralelismo con el imperativo inicial.
- source_word: דִּין
  english_pob_choice: judgment
  chosen_spanish: la disputa
  alternatives_spanish:
  - el juicio
  - la contienda legal
  lexicon: HALOT
  rationale: En este contexto דין está junto a מָדוֹן y en paralelo con la idea de conflicto, por lo que no conviene leerlo aquí como «juicio» judicial. «Disputa» conserva la tensión del texto y evita una lectura más técnica que el contexto no exige.
- source_word: וְיִשְׁבֹּת
  english_pob_choice: will cease
  chosen_spanish: cesarán
  alternatives_spanish:
  - cesará
  - se detendrán
  lexicon: HALOT
  rationale: שׁבת significa cesar o llegar a su fin. Dado que en español el par coordinado «la disputa y la vergüenza» es plural de sentido, «cesarán» fluye mejor y mantiene el registro proverbial.
- source_word: קָלוֹן
  english_pob_choice: disgrace
  chosen_spanish: la vergüenza
  alternatives_spanish:
  - la deshonra
  - el oprobio
  lexicon: HALOT
  rationale: קָלוֹן puede significar vergüenza, deshonra u oprobio. «Vergüenza» es el equivalente más natural y comprensible en español, sin perder el matiz de desprestigio social del término.
theological_decisions:
- issue: ¿Debe דין traducirse como «juicio» o como término de conflicto?
  english_pob_reading: The English POB revised from 'contention' to 'judgment' to reflect דִּין more directly, while still reading the proverb as conflict speech in context.
  chosen_spanish_reading: Se mantiene como «disputa» para reflejar el sentido contextual de conflicto y no introducir un lenguaje judicial más técnico que oscurezca el paralelismo.
  alternative_spanish_readings:
  - el juicio
  - la contienda legal
  rationale: La pareja hebrea מָדוֹן // דִּין, unida al cierre con קָלוֹן, favorece una lectura de riña o controversia social. En español, «juicio» podría sugerir procedimiento legal o valoración divina y debilitar la imagen proverbial del texto.
  doctrine_reference: 'Sabiduría proverbial: lectura contextual del paralelismo hebreo; cf. uso polisémico de דין en lexicografía hebrea.'
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió en el audit trail de 'contention' a 'judgment' para דין. Esta versión española registra esa tensión semántica y decide explícitamente por el valor contextual de conflicto, sin borrar la posibilidad léxica de «juicio» que sigue documentada en el hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma del proyecto para el tetragrámaton, pero este versículo no lo contiene.
  - Se usa un registro bíblico sobrio pero contemporáneo, evitando arcaísmos innecesarios como 'mofador' o 'escarnecedor' sin nota.
  - 'Se conserva la coordinación natural del proverbio en español con dos resultados: salida de la contienda y cese de disputa/vergüenza.'
