- from: Y cuando le hablaban día tras día, él no les escuchaba[a]; entonces se lo dijeron a Amán, para ver si las palabras de Mardoqueo se mantendrían, porque les había dicho que era judío.
  to: Y cuando le hablaban día tras día, él no les escuchaba; y se lo dijeron a Amán, para ver si las palabras de Mardoqueo[a] se mantendrían, porque les había dicho que era judío.
  rationale: Se elimina 'entonces' para evitar añadir un matiz no explícito en el hebreo narrativo. Se traslada la nota al lugar de la ambigüedad principal preservada por el POB inglés, en 'las palabras de Mardoqueo', y se reemplaza la nota sobre 'no les escuchaba' por una que refleja la justificación léxica documentada para הֲיַעַמְדוּ דִּבְרֵי מָרְדֳּכַי. El resto del texto español puede conservarse.
