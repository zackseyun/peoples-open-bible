translation:
  language: es
  text: Un hermano ofendido[a] es más difícil de ganar que una ciudad fortificada, y las contiendas son como los cerrojos de una ciudadela[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Un hermano agraviado es más difícil de ganar que una ciudad fortificada”. El participio hebreo puede enfatizar a alguien que ha sido ofendido o agraviado.
    reason: lexical_alternative
  - marker: b
    text: O “y las disputas son como el cerrojo de una ciudadela/palacio”. El sustantivo final puede denotar una residencia fortificada (“ciudadela”) o “palacio”, pero el contexto defensivo favorece “ciudadela”.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָח
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - un hermano
  - un pariente cercano
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal 'brother' con 'hermano', porque el proverbio mantiene la imagen de una relación cercana y personal. 'Pariente cercano' ampliaría indebidamente el campo semántico.
- source_word: נִפְשָׁע
  english_pob_choice: offended
  chosen_spanish: ofendido
  alternatives_spanish:
  - agraviado
  - herido
  - violentado
  lexicon: HALOT
  rationale: El valor relacional del participio permite 'ofendido', que en español expresa bien una ruptura interpersonal y sigue la lectura preferida del POB. 'Agraviado' y 'herido' son posibles, pero menos naturales en el proverbio.
- source_word: מִקִּרְיַת עֹז
  english_pob_choice: than a fortified city
  chosen_spanish: que una ciudad fortificada
  alternatives_spanish:
  - que una ciudad fuerte
  - que una ciudad de fortaleza
  lexicon: HALOT
  rationale: '''Ciudad fortificada'' reproduce bien la imagen defensiva de קִרְיַת עֹז y suena natural en español. Mantiene el contraste comparativo sin perder la fuerza militar de la expresión.'
- source_word: וּמְדֹנִים
  english_pob_choice: and quarrels
  chosen_spanish: las contiendas
  alternatives_spanish:
  - las querellas
  - las disputas
  - los pleitos
  lexicon: HALOT
  rationale: '''Contiendas'' conserva el tono proverbial y el campo de conflicto verbal/social. ''Quarrels'' en inglés se vuelve aquí una opción española formal y clara.'
- source_word: כִּבְרִיחַ
  english_pob_choice: are like the bars of
  chosen_spanish: son como los cerrojos de
  alternatives_spanish:
  - son como las barras de
  - son como el cerrojo de
  lexicon: HALOT
  rationale: '''בריח'' es un cierre o barra de seguridad; ''cerrojos'' comunica en español la idea de bloqueo y refuerzo. Aunque el hebreo puede ser singular/collectivo, el plural español fluye mejor en la imagen.'
- source_word: אַרְמוֹן
  english_pob_choice: a citadel
  chosen_spanish: una ciudadela
  alternatives_spanish:
  - un palacio
  - una fortaleza
  lexicon: HALOT
  rationale: '''Ciudadela'' preserva el matiz de recinto fuerte y defendido, coherente con la imagen de barras/cerrojos y con la opción inglesa ''citadel''. ''Palacio'' sería posible léxicamente, pero debilita la metáfora defensiva.'
translation_notes:
  revision_awareness: 'Se revisó el antecedente inglés auditado y la corrección solicitada: ahora ambos marcadores de nota aparecen explícitamente en el texto español, junto a los términos que sostienen las alternativas léxicas.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por defecto cuando corresponda, pero este verso no lo contiene.
  - Se preserva el paralelismo proverbial y la imagen militar/defensiva sin suavizarla.
  - Se evitó 'siervo' o 'Cristo' porque no aplican al pasaje.
  - La puntuación sigue el orden hebreo-espíritu del dicho, con una estructura natural para español bíblico moderno.
