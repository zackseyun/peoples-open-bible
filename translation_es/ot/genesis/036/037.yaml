translation:
  language: es
  text: Entonces murió Samlah, y Shaúl[a] de Rehobot junto al Río[b] reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Saúl», la forma tradicional castellana del nombre.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Rehobot el Río», probablemente Rehobot situado junto a un río notable.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: Then ... died
  chosen_spanish: Entonces murió
  alternatives_spanish:
  - Y murió
  - Luego murió
  lexicon: HALOT
  rationale: El wayyiqtol narra avance secuencial. «Entonces» conserva la progresión narrativa natural en español sin sobrecargar el verso.
- source_word: שַׂמְלָה
  english_pob_choice: Samlah
  chosen_spanish: Samlá
  alternatives_spanish:
  - Samlah
  lexicon: transliteración del nombre hebreo
  rationale: Se translitera el nombre propio de forma cercana al hebreo; se evita la adaptación inglesa, y se conserva la forma breve y publicable en español.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: En la fórmula sucesoria, מלך expresa reinar; «reinó» preserva la fórmula dinástica sin introducir matices no presentes en el hebreo.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - después de él
  - en lugar de él
  lexicon: HALOT
  rationale: La locución sucesoria תחתיו pide una equivalencia idiomática. «En su lugar» es natural en español y mantiene la idea de sustitución dinástica.
- source_word: שָׁאוּל
  english_pob_choice: Shaul
  chosen_spanish: Shaúl
  alternatives_spanish:
  - Saúl
  lexicon: transliteración del nombre hebreo
  rationale: Se prefiere una transliteración directa de שָׁאוּל. «Saúl» es la forma tradicional castellana, pero aquí se conserva la proximidad al hebreo, coherente con el criterio POB.
- source_word: מֵרְחֹבוֹת
  english_pob_choice: from Rehoboth
  chosen_spanish: de Rehobot
  alternatives_spanish:
  - desde Rehobot
  - de Rejobot
  lexicon: HALOT
  rationale: El prefijo מִן marca procedencia o asociación. Se mantiene el topónimo como nombre propio, sin traducir el sentido común de la raíz.
- source_word: הַנָּהָר
  english_pob_choice: on the River
  chosen_spanish: sobre el río
  alternatives_spanish:
  - del río
  - junto al río
  lexicon: HALOT
  rationale: Con Rehobot, la frase funciona como calificativo geográfico. «Sobre el río» reproduce la relación locativa del hebreo con una expresión natural en español, sin fijar indebidamente un río concreto.
translation_notes:
  revision_awareness: 'El inglés auditado mantuvo la fórmula completa y la reordenó para fluidez: «Samlah died, and Shaul from Rehoboth on the River reigned in his place». La versión española conserva todos los elementos semánticos y la relación sucesoria, sin depender mecánicamente del orden inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el nombre divino, pero este versículo no lo contiene.
  - Se preserva la transliteración directa de los nombres propios, coherente con el criterio POB y con el hebreo de base.
  - «En su lugar» traduce la fórmula de sucesión תחתיו de manera idiomática y no interpretativa.
