translation:
  language: es
  text: Aleja tu mano de mí[a], y no permitas que tu pavor[b] me aterre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Retira tu mano de mí».
    reason: lexical_alternative
  - marker: b
    text: O «tu terror» en lugar de «tu pavor».
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפְּךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu palma
  lexicon: HALOT
  rationale: כַּף puede referirse a la palma/mano; en este modismo de acción divina, «mano» mantiene la imagen corporal concreta y su fuerza poética en español.
- source_word: מֵעָלַי
  english_pob_choice: far from me
  chosen_spanish: lejos de mí
  alternatives_spanish:
  - de mí
  - alejado de mí
  lexicon: HALOT
  rationale: La combinación con עַל sugiere alejamiento respecto de lo que está «sobre» el hablante; «lejos de mí» comunica bien esa distancia sin perder naturalidad en español.
- source_word: הַרְחַק
  english_pob_choice: Withdraw
  chosen_spanish: Aparta
  alternatives_spanish:
  - Retira
  - Aleja
  lexicon: HALOT
  rationale: El hifil imperativo de רחק expresa hacer distante/alejar. «Aparta» conserva la orden directa dirigida a Dios y funciona bien con «tu mano».
- source_word: אֵמָתְךָ
  english_pob_choice: your dread
  chosen_spanish: tu terror
  alternatives_spanish:
  - tu pavor
  - tu espanto
  lexicon: HALOT
  rationale: אֵימָה significa terror/dread. «Terror» preserva el sustantivo abstracto y la fuerza temible asociada a Dios; es una opción más fuerte que suavizarlo como «miedo».
- source_word: תְּבַעֲתַנִּי
  english_pob_choice: let ... terrify me
  chosen_spanish: me espante
  alternatives_spanish:
  - me aterre
  - me asuste
  lexicon: HALOT
  rationale: בעת puede significar aterrorizAR/espantar/dismayar. «Espante» mantiene el efecto provocado por el sujeto femenino singular («tu terror») y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Lenguaje antropomórfico atribuido a Dios («tu mano»).
  english_pob_reading: Retain the anthropomorphic expression literally as 'your hand.'
  chosen_spanish_reading: Conservar literalmente «tu mano».
  alternative_spanish_readings:
  - tu poder
  - tu golpe
  rationale: El hebreo usa imagen corporal concreta para la acción divina. Mantenerla evita interpretar de antemano si Job piensa en poder, disciplina o aflicción; conserva la tensión poética del texto.
  doctrine_reference: Principio de primacía del texto original; preservar la imagen sin resolver su ambigüedad.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés que sustituyó «from upon me» por «far from me» para reflejar mejor הַרְחַק con מֵעָלַי. En español, «lejos de mí» recoge esa actualización y mantiene la relación con la imagen de la mano que se aparta.
  spanish_consistency_notes:
  - Se prefirió «Dios» solo en decisiones teológicas; el versículo no nombra a Dios explícitamente, por lo que el texto conserva el pronombre de segunda persona.
  - Se mantuvo «terror» en lugar de atenuarlo a «miedo» para respetar la fuerza léxica de אֵימָה.
  - «Espante» traduce adecuadamente el verbo causativo/provocativo asociado al sujeto femenino singular del hebreo.
