review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en casi todos los puntos: cláusula casuística, verbo específico de cornear, distinción ''hombre o mujer'', prohibición de comer la carne, y sentido jurídico de נָקִי. Sin embargo, ''muere'' sin sujeto explícito después de ''una mujer'' suena ambiguo en español, y ''será apedreado sin falta'' es menos natural que una formulación que mantenga la fuerza enfática sin rigidez.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para mejorar naturalidad y precisión referencial. 'Y la mata' expresa mejor el resultado sobre la víctima humana en esta construcción legal. También conviene simplificar la intensificación a 'ciertamente será apedreado', más idiomática que 'sin falta' en este registro.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Buey' para שׁוֹר es defendible en este contexto legal y ya está documentado con nota. 'Dueño' para בעל y 'carne' para בשרו están bien. La cláusula final debe seguir preservando la amplitud jurídica de נָקִי; 'queda libre' lo hace aceptablemente.
  issues:
  - severity: medium
    issue: Ambigüedad de 'y muere'
    rationale: En español, tras 'a un hombre o a una mujer', el singular sin sujeto explícito puede sonar suelto o menos claro que en hebreo/inglés. La ley describe el resultado de la cornada sobre la víctima; 'y la mata' o 'y este muere' evita tropiezo sintáctico.
  - severity: low
    issue: '''será apedreado sin falta'' suena algo forzado'
    rationale: La construcción reproduce la intensificación, pero no es la opción más natural en español bíblico moderno. 'Ciertamente será apedreado' o 'será apedreado sin remedio' transmite mejor el énfasis legal.
  revised_spanish_text: Y si un buey[a] cornea a un hombre o a una mujer y la mata, el buey ciertamente será apedreado, y no se comerá su carne; pero el dueño del buey queda libre.[b]
  revised_footnotes:
  - marker: a
    text: O “toro” o “res”. El hebreo שׁוֹר designa un bovino en un contexto legal; se eligió “buey” por claridad y porque no impone innecesariamente un matiz más específico.
    reason: lexical_alternative
  - marker: b
    text: O “es inocente” o “no es responsable”. El hebreo נָקִי es un término legal que aquí indica quedar libre o exento de pena en este caso.
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor para mejorar la claridad referencial del resultado sobre la víctima humana y para dar una intensificación más natural al mandato legal. Además, se añadió la nota del valor jurídico de נָקִי, preservando una alternativa que el inglés POB documenta y que conviene mantener en español.
