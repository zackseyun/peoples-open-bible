  source_alignment_summary: 'El borrador refleja bien la secuencia fuente: ayuno, cilicio, ceniza sobre la cabeza y rasgar las vestiduras. Sin embargo, «se vistieron de cilicio y ceniza sobre sus cabezas» coordina de manera ambigua dos complementos bajo el mismo verbo y puede sugerir en español que también ‘se vistieron de ceniza’. El griego distingue mejor ponerse cilicio y llevar/echar ceniza sobre la cabeza.'
  spanish_quality_summary: El español es mayormente claro y digno, pero la construcción actual suena algo trabada y menos natural de lo deseable. Una leve reparación mejora la legibilidad y preserva mejor la secuencia ritual sin añadir interpretación.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Cilicio», «ceniza» y «vestiduras» son opciones adecuadas en este contexto. Se mantiene correctamente «ayunaron».
  issues:
