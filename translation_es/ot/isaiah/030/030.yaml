translation:
  language: es
  text: Yahvé hará oír la majestad de su voz[a], y mostrará el golpe descendente de su brazo, con furiosa ira y una llama de fuego consumidor, con aguacero violento[b], tempestad y piedras de granizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el descenso de su brazo"; la expresión hebrea es difícil y puede enfatizar el movimiento descendente del brazo de Yahvé en el juicio, más que el impacto mismo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "chaparrón"; el término hebreo probablemente alude a un estallido violento de lluvia o tormenta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: nombre divino tetragramático
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando la referencia explícita al Nombre propio y evitando el sustituto litúrgico 'SEÑOR'.
- source_word: הִשְׁמִיעַ
  english_pob_choice: will make ... heard
  chosen_spanish: hará oír
  alternatives_spanish:
  - hará escuchar
  - proclamará
  lexicon: HALOT
  rationale: El hiphil expresa causación; 'hará oír' conserva el valor causativo con español natural y fiel al eco auditivo del original.
- source_word: הוֹד קוֹלֹו
  english_pob_choice: the majesty of his voice
  chosen_spanish: la majestad de su voz
  alternatives_spanish:
  - el esplendor de su voz
  - la gloria de su voz
  lexicon: HALOT
  rationale: הוֹד transmite majestad/esplendor. 'Majestad' funciona bien en un contexto teofánico y mantiene la solemnidad del original.
- source_word: נַחַת זְרֹעוֹ
  english_pob_choice: the descending blow of his arm
  chosen_spanish: el golpe descendente de su brazo
  alternatives_spanish:
  - el descenso de su brazo
  - el brazo que desciende
  - el golpe de su brazo al bajar
  lexicon: HALOT
  rationale: Se conserva la tensión del hebreo entre el movimiento descendente y el impacto judicial. 'Golpe descendente' expresa ambas ideas sin anular la dificultad del giro.
- source_word: יַרְאֶה
  english_pob_choice: will show
  chosen_spanish: mostrará
  alternatives_spanish:
  - hará ver
  - exhibirá
  lexicon: HALOT
  rationale: El hiphil de ראה tiene sentido causativo de 'mostrar'. 'Mostrará' es el equivalente más natural en español.
- source_word: בְּזַעַף אַף
  english_pob_choice: in furious anger
  chosen_spanish: con furiosa ira
  alternatives_spanish:
  - en ira furiosa
  - con ira encendida
  - con indignación furiosa
  lexicon: HALOT
  rationale: La construcción intensifica la ira divina; 'furiosa ira' conserva la duplicación enfática y el tono profético sin suavizarlo.
- source_word: לַהַב אֵשׁ אוֹכֵלָה
  english_pob_choice: a flame of consuming fire
  chosen_spanish: llama de fuego consumidor
  alternatives_spanish:
  - llama de fuego devorador
  - flama de fuego que consume
  lexicon: HALOT
  rationale: Se mantiene la imagen poética de una llama ligada al fuego que consume. 'Consuming' se vierte con participio/adjetivo en español natural y bíblico.
- source_word: נֶפֶץ
  english_pob_choice: cloudburst
  chosen_spanish: nube de tormenta
  alternatives_spanish:
  - chaparrón
  - aguacero violento
  - nube que estalla
  lexicon: HALOT
  rationale: Aunque el término es difícil, el contexto meteorológico de juicio invita a una expresión que preserve la idea de violencia atmosférica. 'Nube de tormenta' es la opción más prudente y comprensible en español, sin cerrar indebidamente el matiz.
- source_word: זֶרֶם
  english_pob_choice: storm
  chosen_spanish: tempestad
  alternatives_spanish:
  - tormenta
  - torrente
  - aguacero
  lexicon: HALOT
  rationale: El sustantivo puede denotar una tormenta o torrente. 'Tempestad' encaja con la secuencia y eleva el registro poético.
- source_word: אֶבֶן בָּרָד
  english_pob_choice: hailstones
  chosen_spanish: piedras de granizo
  alternatives_spanish:
  - granizo
  - piedras de hielo
  - bolas de granizo
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'piedra de granizo'; 'piedras de granizo' conserva el idiomatismo y el plural de la imagen.
theological_decisions:
- issue: Imagen antropomórfica del brazo de Yahvé y la ira divina
  english_pob_reading: Retain the concrete anthropomorphic language as poetic theophany/judgment imagery without softening it.
  chosen_spanish_reading: Mantener el lenguaje concreto del brazo y la ira como imagen poética de teofanía y juicio, sin reducirlo a una abstracción.
  alternative_spanish_readings:
  - interpretarlo solo como manifestación de poder
  - suavizar la imagen corporal
  rationale: El hebreo emplea deliberadamente imaginería corporal y meteorológica para intensificar el juicio. La traducción debe preservar esa fuerza profética y no desdibujarla.
  doctrine_reference: Poética profética; teofanía judicial en el AT
translation_notes:
  revision_awareness: 'El texto sigue de cerca el análisis léxico del hebreo y la auditoría inglesa: mantiene el nombre divino explícito, el valor causativo de הִשְׁמִיעַ y יַרְאֶה, y conserva la dificultad de נַחַת זְרֹעוֹ mediante una formulación que deja visible el movimiento descendente y el golpe. Se preserva también la secuencia de juicio meteorológico con un registro bíblico natural en español.'
  spanish_consistency_notes:
  - '''Yahvé'' se usa consistentemente para יְהוָה según el estándar del proyecto.'
  - '''brazo'' se conserva por la imaginería corporal del hebreo, sin convertirlo en una abstracción.'
  - '''llama de fuego consumidor'' mantiene el participio adjetival y el paralelismo poético.'
  - '''piedras de granizo'' reproduce el idiomatismo de אֶבֶן בָּרָד con un español transparente.'
