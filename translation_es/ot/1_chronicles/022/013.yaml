review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien la estructura principal del hebreo: consecuencia (''Entonces''), condición de obediencia cuidadosa, distinción entre ''estatutos'' y ''juicios'', uso de ''Yahvé'', y las prohibiciones finales. Sin embargo, la fórmula חֲזַק וֶאֱמָץ está mal resuelta en español: ''Esfuérzate y esfuérzate con valor'' no corresponde fielmente al emparejamiento semántico ''sé fuerte y valiente/courageous'' y suena como repetición artificial de una sola idea.'
  spanish_quality_summary: El español es mayormente claro, pero la frase 'Esfuérzate y esfuérzate con valor' es poco natural y estilísticamente débil para un registro bíblico digno. Además, 'si cuidas de hacer' es comprensible, aunque 'si tienes cuidado de poner por obra' o 'si cuidas de cumplir' sería más idiomático; no obstante, no exige corrección obligatoria. El resto del versículo es legible y adecuado.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé''; חֻקִּים y מִשְׁפָּטִים se distinguen como ''estatutos'' y ''juicios''; se conserva la nota léxica sobre תַּצְלִיחַ. La principal desviación es la mala representación de חֲזַק וֶאֱמָץ, donde debe preferirse ''Sé fuerte y valiente'' o equivalente establecido.'
  issues:
  - severity: high
    issue: La traducción de חֲזַק וֶאֱמָץ como 'Esfuérzate y esfuérzate con valor' es semántica y estilísticamente deficiente.
    rationale: 'El hebreo expresa dos exhortaciones complementarias: fortaleza y valentía/coraje. El borrador repite ''esfuérzate'', perdiendo la distinción léxica y produciendo una frase poco idiomática en español.'
  - severity: low
    issue: La nota al pie en inglés marcada como b sobre los términos legales distintos no fue preservada.
    rationale: Aunque el español distingue 'estatutos' y 'juicios' en el texto, la auditoría inglesa sí documenta explícitamente la alternativa y la distinción. No es indispensable, pero conviene conservarla para transparencia léxica.
  revised_spanish_text: Entonces prosperarás[a], si cuidas de hacer los estatutos y los juicios[b] que Yahvé mandó a Moisés para Israel. Sé fuerte y valiente. No temas, ni te desalientes.
  revised_footnotes:
  - marker: a
    text: O «tendrás éxito». El verbo hebreo puede denotar prosperar o tener éxito.
    reason: lexical_alternative
  - marker: b
    text: O «los decretos y las ordenanzas». Los dos términos legales hebreos son distintos y se conservan con traducciones separadas.
    reason: lexical_alternative
