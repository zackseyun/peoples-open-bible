review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: Yahvé pone su venganza sobre/contra Edom, Israel es el instrumento humano, la acción se realiza conforme a la ira y al furor divinos, y el resultado es que conocerán su venganza. Sin embargo, hay dos problemas de fidelidad formal: (1) la fórmula final אֲדֹנָי יְהוִה está mejor representada en español como «el Señor Yahvé» o equivalente, no «Yahvé, el Señor», porque el orden hebreo es título + nombre; (2) la nota [b] no ofrece realmente una alternativa léxica ni aclara una ambigüedad nueva, sino que repite el texto y comenta la repetición, por lo que no corresponde como nota en este registro.'
  spanish_quality_summary: El español es en general claro y digno. «Pondré mi venganza sobre Edom» y «por mano de mi pueblo Israel» suenan naturales en registro bíblico. El punto más débil de naturalidad es «harán con Edom», que es comprensible pero algo torpe en español contemporáneo; «actuarán contra Edom» sería más natural, pero sobreespecifica levemente el valor amplio de עשה. Por eso puede mantenerse. La reparación necesaria es principalmente la fórmula divina final y la limpieza de notas.
  glossary_alignment: Buen alineamiento con la terminología del proyecto en «Yahvé», «venganza», «ira», «furor». La decisión compuesta «Yahvé, el Señor» no sigue bien la pauta del proyecto para preservar YHWH sin desordenar el título hebreo; «el Señor Yahvé» conserva mejor tanto el nombre divino como el orden semántico del original.
  issues:
  - severity: medium
    issue: Orden y representación de אֲדֹנָי יְהוִה
    rationale: El borrador tiene «declara Yahvé, el Señor». Aunque preserva ambos elementos, invierte el orden del hebreo y suena más parentético que titular. «declara el Señor Yahvé» refleja mejor el compuesto hebreo y sigue la política de usar «Yahvé» para יְהוָה.
  - severity: low
    issue: Nota [b] innecesaria/mal clasificada
    rationale: La nota «O ‘conocerán mi venganza’» no aporta una alternativa real, porque repite exactamente el texto principal. El comentario sobre repetición enfática puede ir en decisiones léxicas, pero no necesita nota de lector si no hay alternativa o ambigüedad que aclarar.
  revised_spanish_text: Y pondré mi venganza sobre Edom por mano de mi pueblo Israel[a], y harán con Edom conforme a mi ira y conforme a mi furor; y conocerán mi venganza, declara el Señor Yahvé.
  revised_footnotes:
  - marker: a
    text: Literalmente, «por mano de mi pueblo Israel»; es un giro instrumental que significa que Dios actuará mediante su pueblo.
    reason: lexical_alternative
  revision_rationale: Se corrige la fórmula final para reflejar con mayor fidelidad אֲדֹנָי יְהוִה como «el Señor Yahvé» y se elimina una nota innecesaria que no ofrecía alternativa real ni aclaraba una ambigüedad relevante. El resto del texto puede mantenerse como suficientemente fiel y legible.
