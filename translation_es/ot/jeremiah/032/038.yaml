translation:
  language: es
  text: Y ellos serán mi pueblo[a], y yo seré su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «serán para mí por pueblo, y yo seré para ellos por Dios», una fórmula hebrea de pacto que expresa pertenencia mutua y relación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: And they will be
  chosen_spanish: Y ellos serán
  alternatives_spanish:
  - Y ellos estarán
  - Y llegarán a ser
  lexicon: HALOT
  rationale: El verbo היה en esta promesa profética expresa estado futuro de pertenencia relacional; en español, «serán» conserva mejor la copulativa simple que «estarán» o una paráfrasis de cambio de estado.
- source_word: לִי
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: 'Aunque לִי es literalmente «para mí / a mí», en esta fórmula de pacto el español natural y fiel es posesivo: «mi pueblo».'
- source_word: לְעָם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - un pueblo
  lexicon: HALOT
  rationale: עָם en contexto de pacto designa una colectividad definida en relación con Dios. «Pueblo» conserva el valor colectivo y bíblico mejor que «gente».
- source_word: וַאֲנִי
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - pero yo
  - así que yo
  lexicon: HALOT
  rationale: La partícula coordinante mantiene el paralelismo recíproco de la fórmula. «Y yo» refleja mejor la simetría que introducir contraste con «pero».
- source_word: אֶהְיֶה
  english_pob_choice: I will be
  chosen_spanish: seré
  alternatives_spanish:
  - estaré
  - llegaré a ser
  lexicon: HALOT
  rationale: El imperfecto de היה expresa aquí futuro de compromiso de pacto. «Seré» preserva el vínculo verbal con «serán» y suena natural en español.
- source_word: לָהֶם
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - para ellos
  lexicon: HALOT
  rationale: En español, el posesivo «su» comunica la relación de pertenencia del pacto de manera equivalente a la lectura idiomática inglesa «their».
- source_word: לֵאלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un Dios
  - su Dios
  lexicon: HALOT
  rationale: אֱלֹהִים aquí funciona en la fórmula relacional de pacto. «Dios» mantiene la referencia al Dios del pacto sin volverla indefinida.
theological_decisions:
- issue: Fórmula de pacto recíproco
  english_pob_reading: And they will be my people, and I will be their God.
  chosen_spanish_reading: Y ellos serán mi pueblo, y yo seré su Dios.
  alternative_spanish_readings:
  - Y serán para mí un pueblo, y yo seré para ellos Dios.
  - Y ellos serán mi pueblo, y yo seré Dios para ellos.
  rationale: El hebreo presenta una fórmula de pertenencia mutua y relación de pacto. La traducción elegida conserva esa reciprocidad en un español natural, sin borrar el matiz relacional que el texto explícitamente expresa.
  doctrine_reference: Jeremías 32:38; fórmula de pacto en la Escritura hebrea
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisión reciente; se mantuvo la lectura consensuada de alta concordancia. La versión española sigue la misma decisión de equivalencia óptima, conservando la fórmula de pacto sin sobreexplicarla en el cuerpo principal.
  spanish_consistency_notes:
  - Se eligió «pueblo» para לְעָם por consistencia con el uso bíblico de colectivo pactal.
  - Se mantuvo «Dios» en mayúscula como nombre/título relacional en la fórmula del pacto.
  - La nota al pie conserva la literalidad semítica para no perder el trasfondo de pertenencia recíproca.
