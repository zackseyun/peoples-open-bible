translation:
  language: es
  text: Canten a Yahvé; bendigan su nombre; anuncien[a] su salvación de día en día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «anuncien las buenas noticias de su salvación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Canten alabanzas
  - Canten un cántico
  lexicon: HALOT
  rationale: El imperativo plural de שׁיר pide una invitación directa a cantar. En español, «Canten» comunica de forma natural la acción sin añadir «alabanzas», que no está expresado explícitamente en el hebreo.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton aparece de forma directa en el texto fuente. Según la terminología base del proyecto, se conserva el nombre divino como «Yahvé» en vez de sustituirlo por una convención reverencial.
- source_word: בָּרֲכוּ
  english_pob_choice: bless
  chosen_spanish: bendigan
  alternatives_spanish:
  - alaben
  - elogien
  lexicon: HALOT
  rationale: El piel imperativo de ברך conserva mejor en español el valor verbal de «bendecir» que el de «alabar». Así se mantiene la distinción léxica entre el primer mandato y este segundo.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su fama
  - su renombre
  lexicon: HALOT
  rationale: «Nombre» refleja directamente שם con sufijo posesivo. Aunque incluye idea de reputación o identidad, el texto principal debe preservar la expresión concreta del hebreo.
- source_word: בַּשְּׂרוּ
  english_pob_choice: proclaim
  chosen_spanish: anuncien
  alternatives_spanish:
  - proclamen
  - den a conocer
  - anuncien la buena noticia
  lexicon: HALOT
  rationale: בשר en piel suele tener el matiz de anunciar buenas nuevas. «Anuncien» funciona bien en español y deja abierta la fuerza específica del término sin sobrecargar el verso; el matiz de buenas nuevas se preserva en la nota.
- source_word: מִיּוֹם לְיוֹם
  english_pob_choice: from day to day
  chosen_spanish: de día en día
  alternatives_spanish:
  - día tras día
  - cada día
  lexicon: HALOT
  rationale: La locución idiomática expresa repetición continua. «De día en día» conserva la forma hebrea y su sentido de continuidad.
- source_word: יְשׁוּעָתוֹ
  english_pob_choice: his salvation
  chosen_spanish: su salvación
  alternatives_spanish:
  - su liberación
  - su rescate
  lexicon: HALOT
  rationale: יְשׁוּעָה abarca salvación/liberación. «Salvación» es la equivalencia más amplia y natural en este contexto litúrgico.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre pactal de Dios. La decisión del proyecto es conservarlo como «Yahvé», evitando la sustitución por un título genérico o una forma tradicional menos transparente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de בשר en contexto de proclamación
  english_pob_reading: proclaim / announce the good news of his salvation
  chosen_spanish_reading: anuncien su salvación
  alternative_spanish_readings:
  - proclamen su salvación
  - anuncien las buenas noticias de su salvación
  rationale: El verbo admite el matiz de buena noticia, pero el hebreo del verso no añade un sustantivo equivalente a «noticia». Por eso el texto principal mantiene una formulación breve y la posibilidad de una lectura más específica queda explicada en la nota.
  doctrine_reference: 'DOCTRINE.md: lexical precision without expansion'
translation_notes:
  revision_awareness: El paquete fuente muestra alta concordancia entre la traducción inglesa POB, el análisis léxico y la revisión reciente, sin cambios aplicados. La versión española conserva esa misma estructura de tres imperativos y sigue la decisión doctrinal de usar Yahvé para יהוה.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo verbal: cantar / bendecir / anunciar.'
  - «Su nombre» y «su salvación» conservan el sufijo posesivo del hebreo.
  - La preposición final se tradujo con una locución idiomática natural en español sin perder la repetición continua del original.
