  text: Πόσοι¹⁸ τῶν ἀνθρώπων *ἤθελον αὐτὸν ἀνελεῖν¹⁹, καὶ ὁ Θεὸς ἐσκέπασεν αὐτόν²⁰· ὁ γὰρ φοβούμενος τὸν Θεὸν καὶ ἀγαπῶν τὸν πλησίον²¹ ὑπὸ *τοῦ πνεύματος²² τοῦ Βελίαρ οὐ δύναται πληγῆναι, σκεπαζόμενος²³ ὑπὸ τοῦ φόβου τοῦ Θεοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/003/004.yaml
  text: How many men wanted to kill him, and God sheltered him; for the one who fears God and loves his neighbor cannot be struck by the spirit of Beliar, being sheltered by the fear of God.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:06Z'
    unchanged: false
    changes_summary: Replaced 'yet' with 'and' to reflect the simple Greek conjunction more closely, and joined the clauses with a semicolon for smoother formal English while preserving the source structure.
translation:
  language: es
  text: Cuántos hombres quisieron matarlo, y Dios lo amparó; pues el que teme a Dios y ama a su prójimo no puede ser herido por el espíritu de Beliar, estando amparado por el temor de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤθελον αὐτὸν ἀνελεῖν
  english_pob_choice: wanted to kill him
  chosen_spanish: quisieron matarlo
  alternatives_spanish:
  - quisieron darle muerte
  - deseaban matarlo
  lexicon: LSJ
  rationale: Imperfecto con sentido conativo; 'quisieron matarlo' es directo y natural.
- source_word: ἐσκέπασεν
  english_pob_choice: sheltered
  chosen_spanish: amparó
  alternatives_spanish:
  - cubrió
  - protegió
  lexicon: BDAG
  rationale: 'Conserva la imaginería protectora. Sigue revisión POB que cambió ''yet'' a ''and'' (conjunción simple): aquí ''y''.'
- source_word: πληγῆναι
  english_pob_choice: be struck
  chosen_spanish: ser herido
  alternatives_spanish:
  - ser golpeado
  lexicon: BDAG
  rationale: Pasivo verbal por golpe de poder hostil.
- source_word: σκεπαζόμενος ὑπὸ τοῦ φόβου τοῦ Θεοῦ
  english_pob_choice: being sheltered by the fear of God
  chosen_spanish: estando amparado por el temor de Dios
  alternatives_spanish:
  - siendo cubierto por el temor de Dios
  lexicon: BDAG
  rationale: Conserva el participio y el motivo del 'temor de Dios' como amparo.
translation_notes:
  revision_awareness: El POB inglés fue revisado de 'yet God sheltered him. For...' a 'and God sheltered him; for...' para reflejar la conjunción griega simple. La versión española sigue 'y Dios lo amparó; pues'.
  spanish_consistency_notes:
  - Βελίαρ → 'Beliar'
  - πλησίον → 'prójimo'
  - σκεπάζω → 'amparar'
