translation:
  language: es
  text: Que les dé sabiduría de corazón[b][a], y que haya paz entre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Variante griega: «alegría de corazón» en lugar de «sabiduría de corazón».'
    reason: alternative_reading
  - marker: b
    text: 'El griego también amplía la bendición: «y paz en nuestros días en Israel, como en los días de antaño».'
    reason: textual_variant
lexical_decisions:
- source_word: יִתֵּן
  english_pob_choice: May he give
  chosen_spanish: Que os dé
  alternatives_spanish:
  - Que dé
  - Que él os dé
  lexicon: HALOT
  rationale: El hebreo funciona como jussivo en una bendición; en español, una forma desiderativa con «Que» transmite mejor el ruego que un futuro simple.
- source_word: לָכֶם
  english_pob_choice: you
  chosen_spanish: os
  alternatives_spanish:
  - a vosotros
  - a ustedes
  lexicon: HALOT
  rationale: El dativo plural se integra naturalmente en la cláusula desiderativa; «os» conserva el valor de destinatarios sin recargar la frase.
- source_word: חָכְמַת לֵבָב
  english_pob_choice: wisdom of heart
  chosen_spanish: sabiduría de corazón
  alternatives_spanish:
  - sabiduría del corazón
  - sabiduría de mente
  lexicon: HALOT
  rationale: Sigo la lectura hebrea principal con el paralelo idiomático español más natural. «Corazón» conserva el centro interior de discernimiento y voluntad; «mente» debilitaría el eco hebreo.
- source_word: וִיהִי
  english_pob_choice: and may there be
  chosen_spanish: y que haya
  alternatives_spanish:
  - y haya
  - y que sea
  lexicon: HALOT
  rationale: La segunda forma jussiva pide un giro volitivo en español; «y que haya» mantiene el tono de bendición y evita un futuro indicativo.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: «Paz» es la equivalencia más directa y estable para el sustantivo hebreo aquí, sin perder la amplitud de armonía y bienestar.
- source_word: בֵּינֵיכֶם
  english_pob_choice: among you
  chosen_spanish: entre vosotros
  alternatives_spanish:
  - entre ustedes
  - en medio de vosotros
  lexicon: HALOT
  rationale: «Entre vosotros» conserva la relación recíproca del hebreo; es más fiel que un simple «con vosotros» y refleja mejor la imagen espacial interpersonal.
- source_word: δῴη ὑμῖν εὐφροσύνην καρδίας
  english_pob_choice: May he give you wisdom of heart
  chosen_spanish: Que os dé sabiduría de corazón
  alternatives_spanish:
  - Que os dé alegría de corazón
  - Que os dé gozo de corazón
  lexicon: LSJ
  rationale: Se preserva la lectura principal hebrea en el texto, pero la nota recoge la variante griega «alegría/gozo de corazón». En español, la sintaxis de la bendición sigue la hebrea, mientras el matiz griego queda documentado en nota.
- source_word: καὶ γενέσθαι εἰρήνην ἐν ἡμέραις ἡμῶν ἐν Ἰσραὴλ κατὰ τὰς ἡμέρας τοῦ αἰῶνος
  english_pob_choice: and peace in our days in Israel, as in the days of old
  chosen_spanish: y que haya paz entre vosotros
  alternatives_spanish:
  - y haya paz en nuestros días en Israel, como en los días de antaño
  - y que haya paz en nuestros días
  lexicon: LSJ
  rationale: La expansión griega se preserva como variante en nota, no en el texto principal, porque el hebreo recibido es más breve y gobierna la redacción base. La nota permite auditar la diferencia sin armonizarla al cuerpo del verso.
theological_decisions:
- issue: Prioridad del hebreo frente a la expansión griega en Sirácide
  english_pob_reading: Follow the Hebrew Cairo Geniza reading 'wisdom of heart' in the main text
  chosen_spanish_reading: Seguir la lectura hebrea «sabiduría de corazón» en el texto principal
  alternative_spanish_readings:
  - Seguir la variante griega «alegría de corazón»
  - Incorporar la expansión griega sobre Israel y los días antiguos
  rationale: En Sirácide, cuando el hebreo está conservado con alta confianza, gobierna la traducción principal. La forma griega relevante se registra en nota para transparencia, pero no sustituye la lectura base hebrea.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; Translation philosophy #1 original-language primacy over translation tradition'
- issue: Mantenimiento del tono benedictorio y no narrativo
  english_pob_reading: May he give ... and may there be ...
  chosen_spanish_reading: Que os dé ... y que haya ...
  alternative_spanish_readings:
  - Os dará ... y habrá ...
  - Dé ... y haya ...
  rationale: El contexto es una bendición invocatoria, no una afirmación descriptiva. El español desiderativo reproduce mejor la fuerza pragmática del hebreo jussivo y del griego optativo.
  doctrine_reference: 'PHILOSOPHY.md: preserve discourse force and illocution in translation'
translation_notes:
  revision_awareness: 'El pasaje se mantiene sin cambios respecto al control reciente: el hebreo de alta confianza sigue gobernando el texto principal, y las diferencias griegas se conservan únicamente como notas de variante para transparencia auditada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el Tetragrámaton.
  - Se usa «sabiduría de corazón» para reflejar la metáfora hebrea de discernimiento interior sin sustituirla por una paráfrasis psicológica moderna.
  - «Entre vosotros» conserva la relación comunitaria del hebreo בֵּינֵיכֶם y evita diluir el sentido recíproco.
