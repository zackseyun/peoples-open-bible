review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: paciencia prolongada, testimonio/amonestación por el Espíritu mediante los profetas, negativa a escuchar y entrega al poder de otros pueblos. Sin embargo, dos elecciones atenúan o vuelven menos natural el sentido: «no escucharon» no expresa tan claramente la resistencia volitiva de הֶאֱזִינוּ en contexto, y «en mano de» suena poco idiomático en español moderno; «en manos de» o «en poder de» comunica mejor el modismo hebreo sin perder fuerza.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita un ajuste de naturalidad y precisión semántica. «Porque por muchos años» es aceptable, aunque algo pesado; el resto fluye bien. La nota al pie actual es problemática porque repite exactamente la lectura principal y por tanto no ofrece una alternativa real.
  glossary_alignment: 'Buen alineamiento con los términos del proyecto: «Espíritu» está bien capitalizado en contexto profético; no hay conflictos con Yahvé/Mesías u otros términos clave. «Testificaste contra ellos» conserva la decisión forense del POB inglés, aunque en español podría sonar un poco rígido; sigue siendo defendible. Conviene mantenerlo por fidelidad al rastro de auditoría.'
  issues:
  - severity: medium
    issue: «pero no escucharon» debilita el matiz de rechazo
    rationale: וְלֹא הֶאֱזִינוּ en este contexto expresa no solo falta de oír, sino negativa a atender. «No quisieron escuchar» o «no quisieron oír» preserva mejor la fuerza volitiva reflejada también en el inglés POB revisado («would not listen»).
  - severity: medium
    issue: «en mano de» no es la forma española más natural del modismo
    rationale: Aunque intenta conservar la metáfora bíblica, en español general y eclesial la expresión natural es «en manos de» o «en poder de». El singular «mano» suena forzado aquí.
  - severity: medium
    issue: La nota [a] no aporta una alternativa real
    rationale: La nota repite exactamente la misma frase que aparece en el texto principal, de modo que no cumple función de variante léxica. Debe eliminarse o sustituirse por una alternativa genuina. Dado que el texto principal mantiene «testificaste contra ellos», no hace falta nota.
  revised_spanish_text: Porque por muchos años fuiste paciente con ellos y testificaste contra ellos por tu Espíritu mediante tus profetas, pero no quisieron escuchar. Entonces los entregaste en manos de los pueblos de las tierras.
  revision_rationale: 'Se mantiene la base fiel del borrador, pero se corrigen tres puntos: se elimina una nota redundante; se refuerza el matiz de negativa en «no quisieron escuchar»; y se cambia «en mano de» por «en manos de» para un español más natural sin perder el modismo de dominio. No se requiere adjudicación adicional porque los ajustes son claros y de bajo riesgo doctrinal.'
