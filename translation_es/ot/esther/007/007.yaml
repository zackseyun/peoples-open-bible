    rationale: El hebreo tiene literalmente 'se puso/estuvo de pie para buscar su vida de/ante Ester la reina'. 'Permaneció' explica el sentido, pero como nota de literalidad conviene reflejar con más precisión el verbo básico.
  revised_spanish_text: Entonces el rey se levantó, enfurecido, del banquete del vino y se fue al jardín del palacio[c], pero Amán se quedó[a] para suplicar por su vida a la reina Ester, porque vio que la calamidad[b] estaba ya determinada por el rey.
