revisions:
- from: Ahora el pueblo estaba como quienes se quejan de la desgracia[a] al oído de Yahvé[b]; Yahvé lo oyó, y su furor se encendió, y el fuego de Yahvé ardió entre ellos y consumió a algunos al borde del campamento[c].
  to: Ahora el pueblo estaba como quienes se quejan por la adversidad[a] a oídos de Yahvé[b]; Yahvé lo oyó, y su furor se encendió, y el fuego de Yahvé[c] ardió entre ellos y consumió a algunos al borde del campamento[d].
  rationale: Se ajusta «de la desgracia» a «por la adversidad» para reflejar mejor el sentido contextual de רַע y mejorar la naturalidad en español. Se refina la nota del modismo auditivo para representar con mayor fidelidad el hebreo. Se añade la nota alternativa sobre «fuego de Yahvé» porque el POB inglés la conserva, y se amplía la nota espacial final para reflejar mejor las alternativas documentadas.
