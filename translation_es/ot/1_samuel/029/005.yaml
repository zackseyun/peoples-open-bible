translation:
  language: es
  text: '¿No es este David[a], de quien cantaban entre sí en las danzas, diciendo: «Saúl hirió a sus millares, y David a sus diez millares[b]»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «de quien respondían respecto de él en las danzas»; un modismo para canto responsorial o antifonal.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «diez millares»; el término también puede entenderse más generalmente como «miríadas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  english_pob_choice: Is this not
  chosen_spanish: ¿No es este...
  alternatives_spanish:
  - ¿No es este en verdad...
  - ¿Acaso no es este...
  lexicon: HALOT
  rationale: La pregunta retórica hebrea pide reconocimiento; en español, «¿No es este...?» conserva la forma interrogativa y la fuerza de admiración o confirmación sin volverla más enfática de lo que permite el texto.
- source_word: זֶה דָוִד
  english_pob_choice: this ... David
  chosen_spanish: este David
  alternatives_spanish:
  - este es David
  - este David mismo
  lexicon: HALOT
  rationale: El demostrativo con el nombre identifica a David de manera enfática. «Este David» es breve y natural en español, manteniendo la señalización de reconocimiento del original.
- source_word: יַעֲנוּ לֹו
  english_pob_choice: they sang to one another
  chosen_spanish: cantaban entre sí
  alternatives_spanish:
  - respondían por él
  - cantaban sobre él
  lexicon: HALOT
  rationale: עָנָה en este giro apunta a canto responsorial o antífona. «Cantaban entre sí» conserva la reciprocidad y el carácter coral sin traducirlo de forma demasiado literal como si fuera una simple respuesta verbal.
- source_word: בַּמְּחֹלֹות
  english_pob_choice: in the dances
  chosen_spanish: en las danzas
  alternatives_spanish:
  - en los bailes
  - mientras danzaban
  lexicon: HALOT
  rationale: El plural concreto se conserva con «las danzas», que suena digno y bíblico en español. «Bailes» sería más coloquial; «mientras danzaban» pierde el sustantivo plural.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  - con estas palabras
  lexicon: HALOT
  rationale: Es el introducer de cita estándar. «Diciendo» mantiene la transición directa al refrán citado sin añadir interpretación.
- source_word: הִכָּה
  english_pob_choice: has struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - derribó
  - mató
  lexicon: HALOT
  rationale: En español bíblico, «herir» puede reflejar el valor de נכה como golpear o abatir en contexto militar. Se evita «mató» porque el hebreo del refrán destaca la acción de golpear/abatir, y «hirió» conserva mejor la formulación poética y tradicional.
- source_word: בַּאֲלָפָיו
  english_pob_choice: his thousands
  chosen_spanish: a sus millares
  alternatives_spanish:
  - sus miles
  - a sus miles
  lexicon: HALOT
  rationale: אֶלֶף puede designar millar. «Millares» preserva el paralelo numérico con el miembro siguiente y suena natural en español bíblico; la preposición «a» refleja el movimiento implícito del refrán militar de victoria/abatimiento.
- source_word: וְדָוִד בְּרִבְבֹתָיו
  english_pob_choice: and David his ten thousands
  chosen_spanish: y David a sus diez millares
  alternatives_spanish:
  - y David sus miríadas
  - y David a sus miríadas
  lexicon: HALOT
  rationale: רְבָבָה significa diez mil o miríada. «Diez millares» conserva el contraste numérico con «millares» y mantiene la simetría del refrán. Se conserva el posesivo plural «sus» como en el hebreo.
translation_notes:
  revision_awareness: 'Se sigue el texto hebreo masorético (WLC) y el audit trail en inglés. La revisión previa indicó alta concordancia y no requirió cambios sustantivos; en español se mantuvo la misma lectura semántica, ajustando solo la idiomaticidad: se prefirió «cantaban entre sí» para el valor responsorial de יַעֲנוּ לוֹ y «hirió»/«millares» para conservar el tono poético del refrán militar.'
  spanish_consistency_notes:
  - Se mantuvo «David» y no «Mesías/Cristo», porque el versículo nombra al personaje histórico sin título cristológico.
  - Se evitó «SEÑOR» u otra máscara para el nombre divino porque el verso no contiene el Tetragrámaton.
  - «Millares» y «diez millares» conservan la simetría numérica del refrán y la tensión lexical con la alternativa «miríadas» en la nota.
  - La puntuación y el orden de la cita siguen la cadencia de un dicho cantado, no de prosa explicativa.
