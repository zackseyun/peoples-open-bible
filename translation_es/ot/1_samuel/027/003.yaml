base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/027/003.yaml
  text: So David stayed with Achish in Gath[a], he and his men, each man with his household—David with his two wives, Ahinoam the Jezreelite and Abigail[b], the wife of Nabal the Carmelite.
  footnotes:
  - marker: a
    text: Or 'lived with Achish in Gath.' The Hebrew verb can denote dwelling or remaining for a time.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'man and his household,' a distributive expression meaning each man together with those of his house.
    reason: lexical_alternative
