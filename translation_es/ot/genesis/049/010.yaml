revisions:
- from: No se apartará el cetro de Judá[a], ni el bastón del gobernante de entre sus pies, hasta que venga Shiloh; y a él será la obediencia de los pueblos[b].
  to: No se apartará el cetro de Judá, ni el bastón del gobernante de entre sus pies, hasta que venga Shiloh[a]; y a él le pertenecerá la obediencia de los pueblos[b].
  rationale: Se corrige el anclaje de la nota textual para que recaiga sobre ‘Shiloh’, que es el término explicado por la nota. También se mejora la naturalidad del español en la cláusula final con ‘a él le pertenecerá…’, preservando la misma fuerza semántica y la decisión léxica del POB. Se mantienen las decisiones principales auditadas y no hace falta una relectura doctrinal de fondo.
