  yaml_path: translation/deuterocanon/4_maccabees/007/004.yaml
  text: No city under siege ever held out against many and varied siege engines as that most holy man[a], while his sacred soul was being burned by tortures and the wheel[b], stirred up those besieging him through the reason that defends godliness.
  footnotes:
  - marker: a
    text: Or 'racks' or more generally 'instruments of torture' for 'the wheel' (στρέβλαις). The exact device term is difficult, though it clearly refers to torturous means.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of reason defending godliness/piety.' The Greek places strong emphasis on λογισμός ('reason') as the power by which he resisted.
    reason: lexical_alternative
