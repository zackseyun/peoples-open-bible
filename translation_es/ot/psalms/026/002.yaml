translation:
  language: es
  text: Examíname, Yahvé, y pruébame; refina mis riñones[a] y mi corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «riñones», una figura para los pensamientos, afectos o el ser interior más profundo.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּחָנֵנִי
  english_pob_choice: Examine me
  chosen_spanish: Examíname
  alternatives_spanish:
  - Prúebame
  - Examíneme
  lexicon: HALOT
  rationale: בחן expresa examinar, probar o someter a prueba con el matiz de verificar la autenticidad. «Examíname» conserva ese valor forense y distingue este verbo del siguiente, evitando una simple repetición.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», manteniendo el nombre personal de Dios en vez de sustituirlo por un título.'
- source_word: וְנַסֵּנִי
  english_pob_choice: and test me
  chosen_spanish: y pruébame
  alternatives_spanish:
  - y examíname
  - y ponme a prueba
  lexicon: HALOT
  rationale: נסה suele implicar poner a prueba o probar en el sentido de comprobar por experiencia. «Pruébame» mantiene el paralelismo con el verbo anterior y el sentido de prueba real, sin borrar la distinción semántica.
- source_word: צרופה
  english_pob_choice: refine
  chosen_spanish: refina
  alternatives_spanish:
  - purifica
  - afina
  - ensaya
  lexicon: HALOT
  rationale: צרף es un término metalúrgico de refinación o fundición. «Refina» es natural en español y conserva la imagen de depuración por medio de la prueba.
- source_word: כִלְיוֹתַי
  english_pob_choice: my mind
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mis riñones
  - mi interior
  - mis afectos más íntimos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «riñones», pero en la antropología poética hebrea este órgano representa el centro íntimo de emociones y pensamientos. Frente a la revisión inglesa que optó por «mind», el español conserva la imagen corporal más auditable, apoyada por una nota explicativa.
- source_word: וְלִבִּי
  english_pob_choice: and my heart
  chosen_spanish: y mi corazón
  alternatives_spanish:
  - y mi mente
  - y mi interior
  lexicon: HALOT
  rationale: לֵב/לֵבָב designa el centro interior de la persona, incluyendo pensamiento, voluntad y afectos. «Corazón» es el equivalente natural y tradicional en español bíblico, y funciona bien en paralelo con «entrañas».
theological_decisions:
- issue: Imagen antropológica concreta en poesía hebrea
  english_pob_reading: Retain the literal body-part imagery ('kidneys' and 'heart') rather than replacing it with an interpretive paraphrase.
  chosen_spanish_reading: Mantener la imagen corporal («entrañas» y «corazón») en vez de reducirla a una paráfrasis como «mi mente y mi corazón».
  alternative_spanish_readings:
  - «Refina mi interior y mi corazón»
  - «Refina mis pensamientos y mi corazón»
  - «Refina mis riñones y mi corazón»
  rationale: La poesía hebrea usa lenguaje corporal concreto para hablar del ser interior. En español, «entrañas» comunica ese centro íntimo con fuerza poética y evita despojar el verso de su imaginería. La nota preserva la referencia más literal al hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «kidneys» por «mind» para hacer más natural la expresión, pero el texto hebreo sigue usando una imagen corporal. Esta versión española conserva esa imagen con «entrañas», manteniendo la transparencia al original y explicando el hebraísmo en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - 'Se mantiene el paralelismo verbal con dos imperativos distintos: «Examíname» / «pruébame».'
  - «Entrañas» se emplea como equivalente poético de la interioridad hebrea, no como referencia anatómica literal en contexto médico.
  - La nota al pie marca explícitamente el hebraísmo de כִלְיוֹתַי sin borrar la imagen del texto principal.
