translation:
  language: es
  text: Porque ellos han subido a Asiria, como un asno salvaje, solo[a]; Efraín ha contratado amantes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «como un asno salvaje por sí solo» o «un asno salvaje solitario».'
    reason: lexical_alternative
  - marker: b
    text: «Amantes» conserva la metáfora de infidelidad del pacto; el referente político son aliados extranjeros.
    reason: theological_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación causal o explicativa con el contexto anterior. «Porque» preserva mejor esa conexión en español natural.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: HALOT
  rationale: El pronombre explícito queda bien reflejado con «ellos»; no es necesario forzar la intensificación en la versión principal.
- source_word: עָלוּ
  english_pob_choice: have gone up
  chosen_spanish: han subido
  alternatives_spanish:
  - subieron
  - han ido
  lexicon: HALOT
  rationale: «Subir» conserva el idiomatismo hebreo de desplazamiento hacia Asiria y mantiene el matiz de movimiento ascendente.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  lexicon: HALOT
  rationale: Nombre propio estándar en español para la potencia/nación mencionada.
- source_word: פֶּרֶא
  english_pob_choice: wild donkey
  chosen_spanish: asno salvaje
  alternatives_spanish:
  - asno montaraz
  - burro salvaje
  lexicon: HALOT
  rationale: «Asno salvaje» comunica el animal silvestre con claridad y es idiomático en español; mantiene la imagen zoológica del original.
- source_word: בּוֹדֵד
  english_pob_choice: wandering alone
  chosen_spanish: solo
  alternatives_spanish:
  - solitario
  - errante, solo
  lexicon: HALOT
  rationale: El participio expresa aislamiento/soledad. En español, «solo» resume bien la idea sin añadir un movimiento que el hebreo no exige explícitamente.
- source_word: לוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - por sí mismo
  - por su cuenta
  lexicon: HALOT
  rationale: El pronombre intensifica la soledad. Repetir «solo» reproduce esa intensificación de forma natural en español.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  lexicon: HALOT
  rationale: Nombre propio bíblico usual en español para el reino/nación de Israel del norte.
- source_word: הִתְנוּ
  english_pob_choice: has hired
  chosen_spanish: ha contratado
  alternatives_spanish:
  - ha alquilado
  - ha comprado
  lexicon: HALOT
  rationale: El verbo denota obtener mediante pago. «Ha contratado» mantiene la idea de adquisición pagada y suena natural en español, sin desactivar la metáfora profética.
- source_word: אֲהָבִים
  english_pob_choice: lovers
  chosen_spanish: amantes
  alternatives_spanish:
  - amores
  - amantes/aliados
  lexicon: HALOT
  rationale: «Amantes» conserva la metáfora marital/sexual de Oseas y evita una lectura demasiado interpretativa como «aliados».
theological_decisions:
- issue: Metáfora de infidelidad y posible referencia política
  english_pob_reading: Retain the marital/sexual metaphor explicitly with 'hired lovers' rather than interpret it directly as political allies.
  chosen_spanish_reading: Conservar explícitamente la metáfora con «ha contratado amantes», permitiendo que el lector infiera el trasfondo político sin perder el lenguaje profético.
  alternative_spanish_readings:
  - ha contratado aliados
  - ha pagado por amantes
  rationale: Oseas usa deliberadamente el lenguaje de adulterio/prostitución para denunciar la infidelidad del pacto. Traducirlo con «amantes» preserva esa carga teológica y retórica.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con el control de revisión de la base inglesa: no hubo cambios aplicados en la última pasada, y el inglés mantiene alta concordancia con el hebreo. Esta versión española sigue el mismo perfil de fidelidad metafórica y no introduce interpretaciones ajenas al texto base.'
  spanish_consistency_notes:
  - Se mantiene «Asiria» y «Efraín» como nombres propios convencionales en español.
  - Se conserva la metáfora de infidelidad con «amantes», sin reemplazarla por «aliados» en el texto principal.
  - Se refleja el hebreo con dos menciones de soledad mediante «solo» para reproducir el énfasis del participio y su pronombre adjunto.
  - 'La puntuación divide naturalmente las dos imágenes del versículo: desplazamiento a Asiria y compra de amantes.'
