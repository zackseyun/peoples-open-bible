  language: en
  yaml_path: translation/ot/1_kings/007/018.yaml
  text: He made the pillars[a], and two rows all around on the one latticework, to cover the capitals that were on top of the pomegranates[b]; and so he did for the second capital.
  footnotes:
  - marker: a
    text: Or 'the pomegranate ornaments.' The Hebrew says 'the pomegranates,' likely referring to decorative pomegranate-shaped elements on the capitals.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of this verse is difficult, and some interpreters understand the rows as belonging to the pomegranate decoration around the latticework of each capital.
    reason: alternative_reading
