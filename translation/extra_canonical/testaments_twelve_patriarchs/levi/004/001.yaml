  text: Νῦν οὖν γίνωσκε¹ ὅτι ποιήσει Κύριος κρίσιν ἐπὶ τοὺς υἱοὺς τῶν ἀνθρώπων. Ὅτι² πετρῶν³ σχιζομένων, καὶ τοῦ ἡλίου σβεννυμένου⁴ καὶ ὑδάτων⁵ ξηραινομένων καὶ τοῦ⁶ πυρὸς καταπτήσσοντος⁷ καὶ πάσης [τῆς]⁸ κτίσεως κλονουμένης⁹ καὶ τῶν ἀοράτων πνευμάτων¹⁰ τηκομένων¹¹ καὶ¹² τοῦ ᾅδου σκυλευομένου¹³ [ἐπὶ τῷ πάθει τοῦ ὑψίστου]¹⁴ *οἱ ἄνθρωποι ἀπειθοῦντες ἐπιμενοῦσι ταῖς ἀδικίαις¹⁵, διὰ τοῦτο ἐν Γτῇ¹⁶ κολάσει κριθήσονται.
  language: Greek
translation:
  text: "Now therefore know that the Lord will execute judgment upon the sons of men.
    For when rocks are split, and the sun is extinguished, and waters dry up, and
    fire cowers, and all creation is shaken, and the invisible spirits melt away,
    and Hades is plundered [at the suffering of the Most High], disobedient men will
    persist in their injustices; therefore they will be judged in punishment."
