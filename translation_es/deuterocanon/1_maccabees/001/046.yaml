lexical_decisions:
- source_word: μιᾶναι
  english_pob_choice: to defile
  chosen_spanish: profanar
  alternatives_spanish:
  - contaminar
  - manchar
  - envilecer
  lexicon: BDAG
  rationale: El griego expresa volver ritualmente impuro o mancillar lo sagrado. En español, 'profanar' transmite bien el atentado contra lo consagrado en contexto cultual, y aquí evita sonar demasiado físico como 'contaminar'. Aunque 'manchar' o 'contaminar' son posibles, 'profanar' conserva mejor la fuerza religiosa del pasaje.
- source_word: ἁγίασμα
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto sagrado
  - el santuario del templo
  lexicon: LEH
  rationale: En este contexto de ataque al culto judío, ἁγίασμα designa el espacio sagrado del templo. 'Santuario' es la equivalencia natural en español y mantiene el valor cultual sin sobreexplicar.
- source_word: καὶ ἁγίους
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - los santos
  - los seres santos
  - las cosas consagradas
  lexicon: LEH
  rationale: Aunque el griego es morfológicamente ambiguo en la tradición de lectura auditada, la revisión inglesa final optó por 'holy things'. En español, 'las cosas santas' sigue esa decisión y evita la lectura personal de 'los santos', que sería menos segura en este versículo.
theological_decisions:
- issue: Referente de ἁγίους
  english_pob_reading: holy things
  chosen_spanish_reading: cosas santas
  alternative_spanish_readings:
  - los santos
  - el pueblo santo
  - los consagrados
  rationale: Sigo la revisión final del POB inglés, que corrigió la interpretación hacia un referente neutro/objetual por fidelidad contextual. En español, 'cosas santas' conserva esa lectura y evita imponer una referencia a personas que el contexto inmediato no exige.
  doctrine_reference: DOCTRINE.md §§1, 4, 5
translation_notes:
  revision_awareness: La redacción refleja la revisión final del audit trail inglés, que cambió la lectura de 'the holy ones' a 'the holy things' para ajustarse mejor a ἁγίους en este contexto. La elección española evita la lectura personal y sigue esa decisión revisada.
  spanish_consistency_notes:
  - Se mantiene 'santuario' para ἁγίασμα conforme al uso cultual del pasaje.
  - Se evita 'santos' para ἁγίους porque la revisión auditada del POB inglés favorece un referente no personal.
  - '''Profanar'' se usa como equivalente español más natural para la impureza ritual/desacralización en contexto del templo.'
