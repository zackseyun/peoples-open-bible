review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: las aves migratorias reconocen sus tiempos y, en contraste, el pueblo no reconoce el mishpat de Yahvé. También mantiene correctamente ''Yahvé'' para יְהוָה y el valor adversativo de וְעַמִּי como ''pero mi pueblo''. Sin embargo, las notas no preservan bien las alternativas documentadas en el audit trail inglés: la nota [a] debería tratar la incertidumbre de סוס/golondrina-vencejo, no ofrecer variantes para מוֹעֲדֶיהָ; y la nota [b] debería tratar las alternativas de מִשְׁפַּט יְהוָה (''ordenanza'', ''justicia''), no repetir una variante menor de ''venida/llegada''.'
  spanish_quality_summary: El texto es claro, natural y digno en español. 'Cigüeña', 'tórtola', 'golondrina' y 'grulla' funcionan bien, y 'tiempos señalados' suena idiomático. 'Guardan el tiempo de su venida' es comprensible, pero 'observan el tiempo de su llegada' o 'guardan el tiempo de su llegada' sería un poco más natural; aun así, no es un problema serio. La principal necesidad de revisión está en las notas, no en la redacción principal.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé''; מִשְׁפָּט -> ''juicio'' con la fuerza profética conservada; תֹר -> ''tórtola''; עָגוּר -> ''grulla''. La elección ''golondrina'' para סוס es aceptable y sigue la revisión inglesa aplicada. Lo que falla es la conservación de las alternativas léxicas relevantes del POB en las notas al pie.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada a 'tiempos señalados', pero la alternativa auditada en inglés corresponde a סוס ('swallow/swift'), no a מוֹעֲדֶיהָ.
    rationale: El proyecto exige preservar alternativas significativas del audit trail. Aquí se desplazó la nota a otro elemento léxico, perdiendo la incertidumbre documentada sobre la identificación del ave.
  - severity: medium
    issue: La nota [b] explica 'venida/llegada', pero la nota inglesa documentada corresponde a 'the judgment of Yahweh' con alternativas 'ordinance/justice'.
    rationale: Esto omite una alternativa semántica importante para מִשְׁפַּט יְהוָה, que sí tiene peso exegético y debe conservarse en español.
  - severity: low
    issue: '''Guardan el tiempo de su venida'' es algo menos natural en español contemporáneo que ''guardan el tiempo de su llegada'' u ''observan el tiempo de su llegada''.'
    rationale: No es incorrecto, pero una pequeña mejora de fluidez favorece la legibilidad sin apartarse del sentido literal.
  revised_spanish_text: Aun la cigüeña en los cielos conoce sus tiempos señalados, y la tórtola, la golondrina[a] y la grulla observan el tiempo de su llegada; pero mi pueblo no conoce el juicio de Yahvé[b].
  revised_footnotes:
  - marker: a
    text: También puede traducirse 'vencejo'; la identificación exacta de esta ave en hebreo es incierta.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse 'la ordenanza de Yahvé' o 'la justicia de Yahvé'.
    reason: lexical_alternative
  revision_rationale: 'Se conservaron las decisiones léxicas principales del borrador, pero se corrigieron las notas para que reflejen las alternativas realmente documentadas en el audit trail inglés: la incertidumbre de סוס y las posibilidades semánticas de מִשְׁפַּט יְהוָה. Además, se mejoró levemente la naturalidad de ''guardan el tiempo de su venida'' a ''observan el tiempo de su llegada''.'
