revisions:
- from: Y hubo otro águila grande, de grandes alas y de mucho plumaje[a]; y he aquí, esta vid inclinó sus raíces hacia él y extendió sus ramas hacia él[b], para que la regara desde los bancales donde estaba plantada[c].
  to: Y hubo otra águila grande, de grandes alas y de abundante plumaje[a]; y he aquí, esta vid inclinó sus raíces hacia él y extendió sus ramas hacia él[b], para que él la regara[c] desde los bancales donde estaba plantada[d].
  rationale: Se ajusta la redacción final para mejorar la claridad sintáctica en español y conservar mejor el propósito del infinitivo hebreo. Se añade la nota faltante correspondiente a la alternativa de construcción final documentada en la POB inglesa. También se pule «mucho plumaje» a «abundante plumaje» por naturalidad, sin cambiar el sentido.
