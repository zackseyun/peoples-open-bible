base_translation:
  language: en
  yaml_path: translation/ot/genesis/045/001.yaml
  text: Then Joseph could no longer restrain himself before all those standing by him[a], and he cried out[c][b], “Have everyone go out from me!” And no one remained with him when Joseph made himself known to his brothers.
