translation:
  language: es
  text: Entonces David fue y tomó los huesos de Saúl y los huesos de Jonatán, su hijo, de los ciudadanos de Jabes-galaad[a], que los habían robado de la plaza pública de Bet-sán[c], donde los filisteos los habían colgado[b] el día en que hirieron de muerte a Saúl en Gilboa[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'restos'; el hebreo dice más literalmente 'huesos'.
    reason: lexical_alternative
  - marker: b
    text: '''Los habían colgado'' también puede traducirse ''los habían expuesto'' o, en una lectura más fuerte, ''los habían empalado''; el verbo hebreo por sí mismo significa más directamente ''colgar''.'
    reason: lexical_alternative
  - marker: c
    text: '''Plaza pública'' refleja el hebreo para un espacio abierto o plaza de la ciudad.'
    reason: lexical_alternative
  - marker: d
    text: Gilboa designa la zona montañosa donde Saúl cayó (cf. 1 Samuel 31:8–13).
    reason: cross_reference
lexical_decisions:
- source_word: עַצְמוֹת
  english_pob_choice: bones
  chosen_spanish: huesos
  alternatives_spanish:
  - restos
  lexicon: HALOT
  rationale: El término hebreo denota literalmente huesos. En este contexto funerario y de recuperación de sepultura, 'huesos' conserva la concreción del texto y evita una interpretación más libre como 'restos'.
- source_word: בַּעֲלֵי
  english_pob_choice: citizens of
  chosen_spanish: ciudadanos de
  alternatives_spanish:
  - hombres de
  - habitantes de
  lexicon: HALOT
  rationale: El constructo con nombre de lugar funciona idiomáticamente como referencia a las personas asociadas con Jabes-galaad. 'Ciudadanos de' expresa bien esa pertenencia cívica en español sin reducirlo solo a varones.
- source_word: יָבֵישׁ גִּלְעָד
  english_pob_choice: Jabesh-gilead
  chosen_spanish: Jabes-galaad
  alternatives_spanish:
  - Jabes de Galaad
  - Jabés-galaad
  lexicon: convención toponímica
  rationale: Se translitera el topónimo con la forma española transparente y bíblicamente reconocible. El guion ayuda a mantener un solo nombre compuesto.
- source_word: גָּנְבוּ
  english_pob_choice: had stolen
  chosen_spanish: habían robado
  alternatives_spanish:
  - habían sustraído
  - habían tomado en secreto
  lexicon: HALOT
  rationale: El verbo significa 'robar'. El pluscuamperfecto español reproduce bien la acción anterior al traslado de David en la oración relativa.
- source_word: מֵרְחֹב
  english_pob_choice: from the public square
  chosen_spanish: del lugar público
  alternatives_spanish:
  - de la plaza pública
  - de la plaza
  lexicon: HALOT
  rationale: '''רְחֹב'' designa un espacio abierto o plaza. En español, ''lugar público'' mantiene la amplitud semántica sin forzar un término urbano demasiado específico donde el texto hebreo no lo exige.'
- source_word: בֵּית שַׁן
  english_pob_choice: Beth-shan
  chosen_spanish: Bet-sán
  alternatives_spanish:
  - Bet Shan
  - Beit-shean
  lexicon: convención toponímica
  rationale: Se usa la transliteración común en español para el lugar.
- source_word: תְּלוּם שָׁם
  english_pob_choice: had hung them there
  chosen_spanish: los habían colgado
  alternatives_spanish:
  - los habían exhibido
  - los habían empalado
  lexicon: HALOT
  rationale: El verbo básico es 'colgar'. Aunque el contexto de humillación pública admite otras posibilidades, 'colgado' es la opción más directa y menos interpretativa. Se omite 'allí' porque el español ya lo sugiere por el complemento de origen y la relativa.
- source_word: הַכּוֹת ... אֶת שָׁאוּל
  english_pob_choice: struck down Saul
  chosen_spanish: derrotaron a Saúl
  alternatives_spanish:
  - hirieron a Saúl
  - mataron a Saúl
  lexicon: HALOT
  rationale: La construcción refiere al golpe letal infligido por los filisteos a Saúl. 'Derrotaron' conserva el sentido narrativo general y evita afirmar más de lo que el verbo, por sí solo, exige en este contexto.
- source_word: בַּגִּלְבֹּעַ
  english_pob_choice: on Gilboa
  chosen_spanish: en Gilboa
  alternatives_spanish:
  - en el monte Gilboa
  - sobre Gilboa
  lexicon: convención toponímica
  rationale: Se mantiene la forma breve del hebreo sin añadir 'monte', aunque el contexto lo presupone. 'En Gilboa' es natural en español y fiel a la concisión original.
- source_word: וַיֵּלֶךְ ... וַיִּקַּח
  english_pob_choice: Then David went and took
  chosen_spanish: Entonces David fue y tomó
  alternatives_spanish:
  - Y David fue y tomó
  - Luego David fue y tomó
  lexicon: HALOT
  rationale: La secuencia con waw consecutiva avanza la narración. 'Entonces' mantiene ese encadenamiento en español y 'fue y tomó' reproduce con naturalidad la acción sucesiva.
- source_word: יְהוֹנָתָן בְּנוֹ
  english_pob_choice: Jonathan his son
  chosen_spanish: Jonatán, su hijo
  alternatives_spanish:
  - su hijo Jonatán
  - Jonatán, hijo suyo
  lexicon: convención sintáctica
  rationale: El español expresa la aposición de forma natural con coma. Se conserva claramente la relación filial sin recargar la frase.
theological_decisions:
- issue: 'אמת de los cuerpos recuperados: ''bones'' y no ''remains'''
  english_pob_reading: The POB keeps 'bones' and notes 'remains' only as an alternative.
  chosen_spanish_reading: '''Huesos'' en el texto principal; ''restos'' solo como alternativa implícita en la nota.'
  alternative_spanish_readings:
  - restos
  rationale: El relato insiste en la materialidad de los restos recuperados. Mantener 'huesos' evita suavizar el lenguaje funerario y sigue de cerca el hebreo, como hace la POB inglesa.
  doctrine_reference: Respeto por el sentido literal del texto y por la realidad histórica del enterramiento/recolección de restos.
- issue: Sentido de תלה en el tratamiento postmortem
  english_pob_reading: '''Hung them'' with notes that ''displayed'' or ''impaled'' are possible stronger readings.'
  chosen_spanish_reading: '''Los habían colgado'' con nota de alternativa para ''exhibido'' o ''empalado''.'
  alternative_spanish_readings:
  - los habían exhibido
  - los habían empalado
  rationale: El hebreo permite un espectro de sentidos en un contexto de escarnio público. En español, 'colgar' es la base léxica más fiel; las otras opciones quedan preservadas en nota para no borrar la tensión semántica.
  doctrine_reference: Principio de transparencia textual y preservación de ambigüedad documentada.
- issue: Referencia a la acción de los filisteos contra Saúl
  english_pob_reading: '''struck down Saul'''
  chosen_spanish_reading: '''derrotaron a Saúl'''
  alternative_spanish_readings:
  - hirieron a Saúl
  - mataron a Saúl
  rationale: La construcción hebrea con נכה puede abarcar golpear/derrotar/matar según contexto. Como el versículo ya presupone la muerte de Saúl y el castellano necesita una formulación fluida, 'derrotaron' mantiene el acto decisivo sin sobreespecificar el verbo.
  doctrine_reference: Precisión semántica según contexto narrativo.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió 'citizens of Jabesh-gilead' sobre 'men of Jabesh-gilead'. Por eso se eligió 'ciudadanos de Jabes-galaad', manteniendo la naturalidad cívica y sin volver a una formulación masculina más estrecha. También se conservó la lectura inglesa de 'hung them' como base, con la misma gama de alternativas en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene 'Saúl' y 'Jonatán' como formas españolas estándar para los nombres propios.
  - 'Se conserva la topografía bíblica con transliteraciones habituales en español: ''Jabes-galaad'', ''Bet-sán'', ''Gilboa''.'
  - La puntuación sigue la sintaxis española y mantiene la relativa explicativa con comas para mayor claridad.
  - Se ha preservado la ambigüedad del verbo de ejecución pública con una nota que recoge las alternativas documentadas.
