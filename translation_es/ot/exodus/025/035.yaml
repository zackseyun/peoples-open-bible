translation:
  language: es
  text: y un botón[a] debajo de dos ramas de ella[b], y un botón debajo de dos ramas de ella, y un botón debajo de dos ramas de ella, para las seis ramas que salen del candelabro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'bulbo'; el hebreo כפתר se refiere a un adorno redondeado del candelabro.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice 'de ella', probablemente refiriéndose al candelabro como la fuente de donde salen las ramas.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַפְתֹּר
  english_pob_choice: bulb
  chosen_spanish: bulbo
  alternatives_spanish:
  - nudo
  - botón
  - ornamento redondeado
  lexicon: HALOT
  rationale: En el contexto del candelabro del tabernáculo, כפתר designa una protuberancia ornamental redondeada. 'Bulbo' refleja la forma redondeada y sigue la decisión auditada del inglés POB; 'nudo' o 'botón' sonarían menos precisos en español aquí.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - subyacente a
  lexicon: HALOT
  rationale: La preposición marca posición inferior respecto de cada par de ramas. 'Debajo de' es la opción más natural y exacta en español moderno.
- source_word: שְׁנֵי הַקָּנִים
  english_pob_choice: two branches
  chosen_spanish: dos ramas
  alternatives_spanish:
  - dos brazos
  - dos varas
  lexicon: HALOT
  rationale: En la descripción de la menorá, קנים se refiere a los elementos proyectados del candelabro. 'Ramas' conserva la imagen arbórea y coincide con la lectura inglesa auditada.
- source_word: מִמֶּנָּה
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de la menorá
  - del candelabro
  lexicon: HALOT
  rationale: El pronombre femenino singular remite al candelabro. 'De él' preserva la anáfora sin explicitar más de lo que dice el hebreo; en español, 'candelabro' es masculino, pero el antecedente implícito sigue siendo el objeto designado en el texto.
- source_word: לְשֵׁשֶׁת הַקָּנִים
  english_pob_choice: for the six branches
  chosen_spanish: para las seis ramas
  alternatives_spanish:
  - correspondientes a las seis ramas
  - en relación con las seis ramas
  lexicon: HALOT
  rationale: La ל aquí expresa distribución/función. 'Para las seis ramas' comunica el sentido organizativo de la frase sin recargarla.
- source_word: הַיֹּצְאִים
  english_pob_choice: going out
  chosen_spanish: que salen
  alternatives_spanish:
  - que brotan
  - que se extienden
  lexicon: HALOT
  rationale: El participio describe las ramas que se proyectan desde el candelabro. 'Que salen' es una traducción directa y clara en español.
- source_word: מִן הַמְּנֹרָה
  english_pob_choice: from the lampstand
  chosen_spanish: del candelabro
  alternatives_spanish:
  - de la menorá
  - desde el candelabro
  lexicon: HALOT
  rationale: מנרה es el candelabro del tabernáculo. 'Candelabro' traduce el sustantivo común con claridad; se evita transliterar 'menorá' como nombre propio porque el término aquí es un objeto cultual común.
translation_notes:
  revision_awareness: El inglés POB revisó 'knob' a 'bulb' para כפתר, manteniendo la estructura repetida y la relación espacial del texto. La versión española sigue esa revisión y conserva la anáfora de 'from it' sin expandirla innecesariamente.
  spanish_consistency_notes:
  - Se traduce מְנֹרָה como 'candelabro' en lugar de transliterar 'menorá', de acuerdo con la preferencia del proyecto por traducir sustantivos comunes.
  - Se mantiene la repetición tripartita del hebreo para reflejar la estructura técnica de la descripción.
  - No se introduce una nota teológica porque el versículo es descriptivo y no presenta una decisión doctrinal explícita.
