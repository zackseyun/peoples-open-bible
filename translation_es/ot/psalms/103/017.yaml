translation:
  language: es
  text: Pero el amor fiel[a] de Yahvé es de eternidad a eternidad sobre los que le temen, y su rectitud[b] hasta los hijos de sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amor leal» o «misericordia». El hebreo חֶסֶד puede abarcar amor pactal, lealtad y misericordia.
    reason: lexical_alternative
  - marker: b
    text: O «justicia». El hebreo צִדְקָה puede expresar rectitud o justicia según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחֶסֶד
  english_pob_choice: the steadfast love
  chosen_spanish: la misericordia
  alternatives_spanish:
  - el amor leal
  - el amor fiel
  - la fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד abarca amor leal, bondad pactal y misericordia. En español, 'misericordia' comunica una actitud benevolente y perseverante, aunque no agota el matiz de lealtad pactal; por eso se preserva la alternativa en nota. Se mantiene el valor contrastivo inicial con 'Pero' conforme al paralelo poético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' en el texto principal, siguiendo la norma del proyecto para preservar el nombre divino en lugar de sustituirlo por un título.
- source_word: מֵעוֹלָם וְעַד עוֹלָם
  english_pob_choice: from everlasting to everlasting
  chosen_spanish: desde la eternidad y hasta la eternidad
  alternatives_spanish:
  - de eternidad a eternidad
  - para siempre y por siempre
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de duración ilimitada en ambas direcciones. 'Desde la eternidad y hasta la eternidad' conserva el paralelismo y suena natural en español bíblico actual.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - para
  - contra
  - en
  lexicon: HALOT
  rationale: Aquí עַל marca el objeto sobre el cual reposa la acción de Yahvé. 'Sobre' reproduce mejor la imagen espacial-poética que 'para' o 'en'.
- source_word: יְרֵאָיו
  english_pob_choice: those who fear him
  chosen_spanish: los que le temen
  alternatives_spanish:
  - los que le reverencian
  - los reverentes hacia él
  lexicon: HALOT
  rationale: El participio expresa a quienes temen a Yahvé en sentido reverente y de pacto. 'Los que le temen' conserva la fuerza bíblica sin suavizarla a mera deferencia.
- source_word: וְצִדְקָתוֹ
  english_pob_choice: and his righteousness
  chosen_spanish: y su justicia
  alternatives_spanish:
  - y su rectitud
  - y su justicia/righteousness
  lexicon: HALOT
  rationale: צִדְקָה puede significar 'justicia' o 'rectitud'. Aquí el paralelismo con la misericordia y la referencia generacional favorecen 'justicia', sin excluir el matiz moral-covenantal.
- source_word: לִבְנֵי בָנִים
  english_pob_choice: to children's children
  chosen_spanish: para los hijos de sus hijos
  alternatives_spanish:
  - para los nietos
  - para los descendientes
  lexicon: HALOT
  rationale: El hebreo es una expresión idiomática generacional. 'Los hijos de sus hijos' conserva la imagen familiar y la amplitud de la promesa mejor que el término más específico 'nietos'.
theological_decisions:
- issue: Sentido de חֶסֶד en el contexto del Salmo
  english_pob_reading: steadfast love
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - amor leal
  - amor fiel
  - bondad pactal
  rationale: El texto habla del carácter perdurable de Yahvé. Aunque 'amor leal' se aproxima más a la dimensión pactal, 'misericordia' es una opción bíblica clara en español y mantiene el tono de benevolencia duradera; la nota preserva el matiz alternativo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; contested terms principle'
- issue: Sentido de צִדְקָה en paralelo con חֶסֶד
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: En poesía hebrea, צִדְקָה puede abarcar justicia y rectitud. En este versículo, la relación con las generaciones favorece una lectura de fidelidad justa y estable; 'justicia' mantiene esa amplitud sin forzar un sentido meramente forense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; contested terms principle on preserving alternatives where significant'
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no se requirieron cambios y que el consenso de verificación fue alto; por eso esta propuesta conserva la estructura semántica del texto fuente sin introducir reajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el nombre divino, conforme a la terminología del proyecto.
  - Se mantiene el paralelismo poético con 'Pero' al inicio, reflejando la conexión contrastiva con el versículo anterior.
  - La frase 'los que le temen' conserva el valor reverencial de יְרֵאָיו sin reemplazarlo por una expresión más débil.
  - '''Hijos de sus hijos'' preserva la idiomática generacional del hebreo sin reducirla a una equivalencia estrecha.'
