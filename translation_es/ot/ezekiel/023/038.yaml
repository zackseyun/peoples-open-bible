translation:
  language: es
  text: 'Además, me hicieron esto: contaminaron mi santuario en aquel mismo día, y profanaron mis sábados.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ע֥וֹד זֹ֖את
  english_pob_choice: Moreover, ... this
  chosen_spanish: Además, ... esto
  alternatives_spanish:
  - También, ... esto
  - Aún más, ... esto
  lexicon: HALOT
  rationale: La combinación añade una acusación más; «además» comunica bien el valor acumulativo sin perder la referencia a «esto» como hecho ya mencionado.
- source_word: עָ֣שׂוּ לִ֑/י
  english_pob_choice: they did this to me
  chosen_spanish: hicieron esto contra mí
  alternatives_spanish:
  - hicieron esto a mí
  - hicieron esto para mí
  lexicon: HALOT
  rationale: En este contexto de ofensa contra Dios, «contra mí» expresa mejor el matiz adversativo y el agravio personal que el simple «a mí», sin forzar una paráfrasis mayor.
- source_word: טִמְּא֤וּ
  english_pob_choice: they defiled
  chosen_spanish: profanaron
  alternatives_spanish:
  - contaminaron
  - hicieron impuro
  lexicon: HALOT
  rationale: Aunque el verbo puede tener la idea de impurificar ritualmente, en el contexto del santuario español «profanar» comunica de forma natural la violación de lo santo y preserva el peso cultual del término.
- source_word: מִקְדָּשִׁ/י֙
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi lugar santo
  - mi templo
  lexicon: HALOT
  rationale: «Santuario» es más amplio y preciso que «templo»; mantiene el sentido de espacio sagrado sin restringir innecesariamente el hebreo.
- source_word: בַּ/יּ֣וֹם הַ/ה֔וּא
  english_pob_choice: on that same day
  chosen_spanish: en aquel mismo día
  alternatives_spanish:
  - en ese mismo día
  - en aquel día
  lexicon: HALOT
  rationale: La expresión remite al mismo día de las abominaciones previas; «aquel mismo día» conserva la fuerza de proximidad referencial que el inglés POB explicitó con «same».
- source_word: שַׁבְּתוֹתַ֖/י
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis días de sábado
  - mis días de reposo
  lexicon: HALOT
  rationale: Se conserva el plural del hebreo. «Sábados» es la forma breve y natural en español, aunque en sentido bíblico alude a las observancias sabáticas de Yahvé.
- source_word: חִלֵּֽלוּ
  english_pob_choice: they profaned
  chosen_spanish: profanaron
  alternatives_spanish:
  - desecraron
  - trataron como común
  lexicon: HALOT
  rationale: «Profanar» es el equivalente cultual más directo en español para una violación de cosas santas; mantiene el registro teológico del texto.
theological_decisions:
- issue: Lenguaje de impurificación y profanación de lo santo
  english_pob_reading: Retain 'sanctuary' and 'Sabbaths' with explicitly holiness-violation language ('defiled,' 'profaned').
  chosen_spanish_reading: Conservar «santuario» y «sábados», usando lenguaje explícito de violación de lo santo («profanaron»).
  alternative_spanish_readings:
  - usar «templo» y «deshonraron»
  - usar «lugar santo» y «contaminaron»
  rationale: El versículo denuncia una ofensa cultual y de pacto; «santuario» y «profanaron» preservan esa gravedad mejor que términos más generales.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: Coincide con la lectura auditada de alta concordancia; no se registran revisiones posteriores ni variantes textuales relevantes en el paquete fuente.
  spanish_consistency_notes:
  - 'Se mantiene una terminología cultual coherente: santuario / profanaron / sábados.'
  - Se evita «SEÑOR» porque el hebreo aquí usa la primera persona divina, no una cita indirecta del nombre divino.
  - Se conserva el carácter plural de שַׁבְּתוֹתַי con «mis sábados», en vez de singularizarlo.
