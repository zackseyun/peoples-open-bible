translation:
  language: es
  text: 'Por tanto, escuchen el consejo de Yahvé, que ha planeado contra Babilonia, y sus propósitos que ha dispuesto contra la tierra de los caldeos: seguramente los pequeños del rebaño los arrastrarán[a]; seguramente dejará desolada su pastura[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los más pequeños del rebaño». La expresión hebrea puede referirse metafóricamente a los más débiles o a los de menor importancia entre los atacantes de Babilonia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su morada» o «su habitación». נָוֶה puede significar pastura, morada o lugar de estancia; aquí «pastura» preserva mejor la imagen del rebaño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Marca la consecuencia lógica del oráculo anterior sin sobrecargar el tono profético. En español, 'Por tanto' conserva bien la inferencia formal.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: escuchen
  alternatives_spanish:
  - oigan
  - atiendan
  lexicon: HALOT
  rationale: El imperativo plural pide una escucha atenta. 'Escuchen' es natural y puede incluir la idea de obedecer o prestar atención.
- source_word: עֲצַת יְהוָה
  english_pob_choice: the counsel of Yahweh
  chosen_spanish: el consejo de Yahvé
  alternatives_spanish:
  - el plan de Yahvé
  - el designio de Yahvé
  lexicon: HALOT
  rationale: '''Consejo'' conserva la idea deliberativa de עֵצָה y mantiene una distinción útil frente a ''propósitos'' en la segunda mitad del versículo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: Project default / Tetragrammaton
  rationale: Se sigue el criterio del proyecto para el nombre divino. Se evita la sustitución por un título para preservar el nombre personal de Dios.
- source_word: יָעַץ אֶל־בָּבֶל
  english_pob_choice: has planned against Babylon
  chosen_spanish: ha planeado contra Babilonia
  alternatives_spanish:
  - ha dispuesto contra Babilonia
  - ha maquinado contra Babilonia
  lexicon: HALOT
  rationale: '''Planeado'' expresa la intención deliberada de forma idiomática en español; ''contra'' refleja el valor hostil de אֶל en este contexto.'
- source_word: וּמַחְשְׁבוֹתָיו
  english_pob_choice: and his purposes
  chosen_spanish: y sus propósitos
  alternatives_spanish:
  - y sus planes
  - y sus designios
  lexicon: HALOT
  rationale: Se opta por 'propósitos' para mantener el paralelismo con 'consejo' sin repetir exactamente la misma palabra. En español comunica bien la intención deliberada divina.
- source_word: חָשַׁב
  english_pob_choice: has purposed / has devised
  chosen_spanish: ha dispuesto
  alternatives_spanish:
  - ha planeado
  - ha ideado
  lexicon: HALOT
  rationale: '''Ha dispuesto'' traduce el acto deliberado sin redundancia excesiva con ''ha planeado''. Mantiene la fuerza intencional del verbo.'
- source_word: אֶרֶץ כַּשְׂדִּים
  english_pob_choice: the land of the Chaldeans
  chosen_spanish: la tierra de los caldeos
  alternatives_spanish:
  - la tierra de Caldea
  - Caldea
  lexicon: HALOT
  rationale: '''Tierra de los caldeos'' reproduce con transparencia la expresión hebrea y conserva el vínculo geográfico-étnico.'
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: seguramente
  alternatives_spanish:
  - ciertamente
  - de seguro
  lexicon: HALOT
  rationale: En esta construcción enfática, la secuencia funciona como aseveración fuerte, no como condición literal. 'Seguramente' transmite bien ese valor retórico en español.
- source_word: יִסְחָבוּם
  english_pob_choice: will drag them away
  chosen_spanish: los arrastrarán
  alternatives_spanish:
  - los llevarán arrastrando
  - los arrebatarán
  lexicon: HALOT
  rationale: '''Arrastrarán'' conserva la imagen física de סחב. El objeto directo se mantiene con claridad en español.'
- source_word: צְעִירֵי הַצֹּאן
  english_pob_choice: the little ones of the flock
  chosen_spanish: los pequeños del rebaño
  alternatives_spanish:
  - los más pequeños del rebaño
  - los jóvenes del rebaño
  lexicon: HALOT
  rationale: Se preserva la metáfora de rebaño sin explicitar en el texto principal si se trata de débiles, jóvenes o mínimos. 'Pequeños' mantiene la imagen y el potencial de doble sentido.
- source_word: יַשִּׁים
  english_pob_choice: he will make
  chosen_spanish: hará
  alternatives_spanish:
  - hará que sea
  - convertirá
  lexicon: HALOT
  rationale: El verbo causativo se vierte de forma natural con 'hará' en la construcción resultativa que sigue.
- source_word: עֲלֵיהֶם
  english_pob_choice: their / because of them
  chosen_spanish: su
  alternatives_spanish:
  - sobre ellos
  - a causa de ellos
  lexicon: HALOT
  rationale: La referencia posesiva se integra naturalmente en español como 'su morada'. Se evita duplicar el valor preposicional con una segunda frase causal, siguiendo la revisión del audit trail.
- source_word: נָוֶה
  english_pob_choice: pasture / habitation
  chosen_spanish: morada
  alternatives_spanish:
  - pastizal
  - morada / pasto
  lexicon: HALOT
  rationale: El término puede significar pasto, morada o habitación. Dado que el español 'morada' puede abarcar el lugar de estancia y funciona bien con 'hacer desolada', se evita una expresión demasiado técnica; el contexto de rebaño queda preservado por la primera cláusula.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrama. En español, 'Yahvé' conserva el nombre propio divino sin sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: The force of אִם לֹא in prophetic rhetoric
  english_pob_reading: Surely
  chosen_spanish_reading: seguramente
  alternative_spanish_readings:
  - ciertamente
  - de seguro
  rationale: No se trata de una condición literal, sino de una afirmación enfática en tono oracular. 'Seguramente' conserva esa fuerza asseverativa.
  doctrine_reference: 'POB translation philosophy: preserve source-text force without flattening rhetorical idioms'
- issue: Metaphor of צְעִירֵי הַצֹּאן
  english_pob_reading: the little ones of the flock
  chosen_spanish_reading: los pequeños del rebaño
  alternative_spanish_readings:
  - los más pequeños del rebaño
  - los débiles del rebaño
  rationale: Se preserva la imagen en el texto principal, sin convertirla explícitamente en interpretación. Esto evita sobreexplicar una metáfora que el hebreo mantiene viva.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source-text sense without paraphrase beyond what the text warrants'
translation_notes:
  revision_awareness: Se integró la revisión del audit trail que evita duplicar עֲלֵיהֶם con una frase causal adicional. También se tuvo en cuenta la preferencia revisada por 'propósitos' en paralelo con 'consejo', aunque en español se optó por 'sus propósitos' y un verbo distinto ('ha dispuesto') para evitar redundancia innecesaria. El resto sigue de cerca el texto hebreo y la línea óptima-equivalente del POB inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Tetragrama, conforme al estándar del proyecto.
  - Se evitó 'Señor' como sustitución del nombre divino.
  - Se preservó la metáfora de 'los pequeños del rebaño' sin interpretación explícita en el cuerpo principal.
  - Se tradujo אֶל en sentido hostil como 'contra' por el contexto.
  - Se eligió un español natural pero sobrio, apto para lectura eclesial amplia.
