translation:
  language: es
  text: Al tiempo señalado volverá y vendrá al sur[a]; pero no será como la anterior o como la posterior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero no será como antes y como después». El hebreo deja la comparación comprimida y algo elíptica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמּוֹעֵד
  english_pob_choice: At the appointed time
  chosen_spanish: Al tiempo señalado
  alternatives_spanish:
  - En el tiempo señalado
  - Al tiempo fijado
  lexicon: HALOT
  rationale: מועֵד designa un tiempo fijado o señalado. «Al tiempo señalado» conserva la referencia temporal precisa y suena natural en español sin convertirlo en fiesta ni reunión.
- source_word: יָשׁוּב
  english_pob_choice: he will return
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - volverá de nuevo
  lexicon: HALOT
  rationale: שׁוּב expresa volver o regresar. «Volverá» es breve, idiomático y fiel al movimiento de retorno en el contexto militar.
- source_word: וּבָא
  english_pob_choice: and come
  chosen_spanish: y vendrá
  alternatives_spanish:
  - y entrará
  - y llegará
  lexicon: HALOT
  rationale: בוא puede significar venir o entrar. «Vendrá» preserva el movimiento hacia un destino sin forzar el matiz de entrada.
- source_word: בַנֶּגֶב
  english_pob_choice: into the south
  chosen_spanish: al sur
  alternatives_spanish:
  - hacia el sur
  - al Négueb
  lexicon: HALOT
  rationale: En Daniel 11 el contraste es geopolítico entre norte y sur. «Al sur» mantiene ese sentido direccional general mejor que limitarlo al desierto o región del Négueb.
- source_word: וְלֹא תִהְיֶה
  english_pob_choice: but it will not be
  chosen_spanish: pero no será
  alternatives_spanish:
  - pero no ocurrirá
  - pero no resultará
  lexicon: HALOT
  rationale: El hebreo usa verbo femenino singular con referente implícito, probablemente la campaña o incursión. «No será» conserva esa impersonalidad y la comparación abierta del texto.
- source_word: כָרִאשֹׁנָה
  english_pob_choice: as the former
  chosen_spanish: como la primera
  alternatives_spanish:
  - como la anterior
  - como antes
  lexicon: HALOT
  rationale: רִאשׁוֹנָה es «la primera» o «la anterior». «Como la primera» mantiene el paralelismo con la segunda parte de la frase y la comparativa breve del hebreo.
- source_word: וְכָאַחֲרֹנָה
  english_pob_choice: or as the latter
  chosen_spanish: ni como la postrera
  alternatives_spanish:
  - ni como la última
  - ni como la posterior
  lexicon: HALOT
  rationale: אַחֲרוֹנָה es «la postrera/última». Dado que el hebreo une ambas comparaciones de modo comprimido, en español se puede mantener el paralelismo con «ni como...» sin añadir una explicación ajena al texto.
theological_decisions:
- issue: Elipsis comparativa del final del verso
  english_pob_reading: but it will not be as the former or as the latter
  chosen_spanish_reading: pero no será como la primera ni como la postrera
  alternative_spanish_readings:
  - pero no será como antes ni como después
  - pero no será como la primera y la última
  rationale: El hebreo es comprimido y deja la comparación algo elíptica. La versión española conserva esa tensión sin resolverla de forma interpretativa. «Ni como... ni como...» refleja mejor la negación doble implícita que una expansión más explicativa.
  doctrine_reference: Fidelidad sintáctica al hebreo; no hay implicación doctrinal directa.
translation_notes:
  revision_awareness: El texto inglés auditado ya identifica la elipsis del cierre y la opción alternativa «before/afterward». La redacción española conserva esa misma tensión comparativa, ajustando el orden para una lectura natural en español y manteniendo la referencia geopolítica de «south» como «sur».
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió «al sur» por el contraste norte/sur del capítulo, no por la región específica del Négueb.
  - «Ni como la postrera» mantiene el paralelismo con el hebreo y evita cerrar indebidamente la comparación.
