  consult_excerpt: 'When he was revealed, he taught them about the Father, the uncontainable
    one, and breathed into them what’s in the thought, doing his will. When many had
    received the light, they turned 31 to him. For the material ones were strangers,
    who didn’t see his form or know him. For he came by means of fleshly form, and
    nothing could block his path, because incorruptibility can’t be grasped. Moreover,
    he said new things while he spoke about what’s in the Father’s heart and brought
    out the complete Word. When the light spoke through his mouth, and by his voice
    gave birth to life, he gave them thought, wisdom, mercy, salvation, and the Spirit
    of power from the infinity and sweetness of the Father. He caused punishments
    and torments to cease, because they led astray into Error and bondage those who
    needed mercy. He dissolved and confounded them with knowledge. He became:

    a Way for those who were led astray,

    knowledge for those who were ignorant,

    a discovery for those who were searching,

    strength for those who were wavering, and

    purity for those who were impure.'
translation:
  text: 'When he was revealed[a], he taught them of the Father—the uncontainable one—and
    he breathed into them what is in the Thought, accomplishing his will. Many received
    the Light and turned to him, for the material ones were strangers; they did not
    behold his form nor know him. He came by means of a fleshly form, and nothing
    was able to block his way, because incorruptibility is ungraspable.


    He spoke things new, speaking out what is in the Father’s heart, and he brought
    forth the complete Word; when the Light spoke from his mouth, and his voice gave
    birth to life, he gave them Thought, understanding, mercy, salvation, and the
    Spirit of power, from the infinity and sweetness of the Father.


    He caused punishments and scourges to cease, because they were leading into Error
    and into captivity those who had need of mercy. He dissolved them, and he confounded
    them by Knowledge.


    Thus he became:

    - a Way for those who were wandering,

    - Knowledge for those who were ignorant,

    - a Discovery for those who were seeking,

    - Strength for those who were wavering,

    - and Purity for those who were defiled.'
  philosophy: optimal-equivalence
  footnotes:
