translation:
  language: es
  text: 'Mira, Yahvé, y contempla: ¿a quién has hecho esto? ¿Deberían las mujeres comer su fruto[a], los hijos que criaron[b]? ¿Deberían ser asesinados el sacerdote y el profeta en el santuario del Señor?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su fruto», es decir, su propia descendencia.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «los pequeños que mimaron / criaron con ternura».
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Mira atentamente
  - Ve
  lexicon: HALOT
  rationale: El imperativo inicial es una súplica urgente en un lamento. «Mira» conserva la fuerza directa y natural en español, sin volverlo demasiado coloquial ni arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Siguiendo la convención del proyecto para el Tetragrámaton, se usa «Yahvé» como transliteración del nombre divino, no una sustitución reverencial como «SEÑOR».
- source_word: וְהַבִּיטָה
  english_pob_choice: and see
  chosen_spanish: y contempla
  alternatives_spanish:
  - y mira
  - y observa
  - y ve
  lexicon: HALOT
  rationale: El segundo imperativo intensifica la apelación. «Contempla» mantiene esa fuerza enfática y distingue el paralelismo de «mira» sin sonar artificioso.
- source_word: לְמִי
  english_pob_choice: to whom
  chosen_spanish: ¿a quién
  alternatives_spanish:
  - ¿contra quién
  - ¿para quién
  lexicon: HALOT
  rationale: 'La construcción interrogativa pide el destinatario u objeto del acto: «¿a quién has hecho esto?». Es la opción más natural y fiel en español.'
- source_word: עוֹלַלְתָּ כֹּה
  english_pob_choice: have you done this
  chosen_spanish: has hecho esto
  alternatives_spanish:
  - has tratado así
  - has obrado así
  lexicon: HALOT
  rationale: El verbo expresa tratar de manera severa o devastadora. En español, «has hecho esto» conserva la formulación breve del lamento, mientras el contexto carga el valor de daño.
- source_word: אִם תֹּאכַ֨לְנָה
  english_pob_choice: Should women eat
  chosen_spanish: ¿Deberían las mujeres comer
  alternatives_spanish:
  - ¿Comerán las mujeres
  - ¿Acaso comerán las mujeres
  lexicon: HALOT
  rationale: Aquí אִם introduce una pregunta retórica horrorizada, no una condición. «¿Deberían...?» refleja mejor el tono de reproche y consternación.
- source_word: נָשִׁים
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las madres
  lexicon: HALOT
  rationale: Se refiere a mujeres adultas en el contexto del asedio, especialmente madres. «Las mujeres» es amplio y claro; el contexto precisa la referencia.
- source_word: פִּרְיָם
  english_pob_choice: their offspring
  chosen_spanish: su fruto
  alternatives_spanish:
  - su descendencia
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su fruto». Se conserva la imagen idiomática con «su fruto», porque el español puede sostenerla sin perder claridad y así mantiene la tensión lexical documentada.
- source_word: עֹלֲלֵי טִפֻּחִים
  english_pob_choice: the children they have cared for
  chosen_spanish: los hijos que criaron
  alternatives_spanish:
  - los niños que acariciaron
  - los pequeños que mimaron
  lexicon: HALOT
  rationale: La expresión alude a pequeños criados con ternura, incluso «dandled». «Los hijos que criaron» comunica la relación afectiva y de cuidado en un español natural, sin exagerar el matiz.
- source_word: אִם יֵהָרֵג
  english_pob_choice: Should ... be killed
  chosen_spanish: ¿Deberían ser muertos
  alternatives_spanish:
  - ¿Deberían ser asesinados
  - ¿Serán muertos
  lexicon: HALOT
  rationale: Se conserva la pregunta retórica. «Ser muertos» mantiene el tono formal y pasivo del hebreo, sin suavizar el horror del enunciado.
- source_word: בְּמִקְדַּשׁ
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en el lugar santo
  - en el templo
  lexicon: HALOT
  rationale: «Santuario» corresponde directamente a מִקְדָּשׁ y preserva el carácter sagrado del lugar.
- source_word: אֲדֹנָי
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Señor Dios
  lexicon: HALOT
  rationale: Aquí אֲדֹנָי funciona como título divino. En español se vierte «el Señor» para diferenciarlo del nombre propio Yahvé que aparece al inicio del versículo.
- source_word: כֹּהֵן וְנָבִיא
  english_pob_choice: priest and prophet
  chosen_spanish: el sacerdote y el profeta
  alternatives_spanish:
  - sacerdote y profeta
  lexicon: HALOT
  rationale: Los sustantivos aparecen en singular como pares representativos. El artículo definido en español hace natural la referencia concreta dentro de la escena lamentada.
theological_decisions:
- issue: Distinción entre el nombre divino y el título divino en un mismo versículo
  english_pob_reading: Yahweh rendered 'Yahweh'; אֲדֹנָי rendered 'the Lord'
  chosen_spanish_reading: Yahvé al inicio; «el Señor» al final
  alternative_spanish_readings:
  - «Señor» para ambos
  - «Yahvé» y luego «Yahvé»
  rationale: El hebreo distingue entre el Tetragrámaton y el título אֲדֹנָי. Mantener esa distinción en español preserva el dato textual y la convención del proyecto para YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה/YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «their own fruit» por «their offspring» para mayor naturalidad, pero mantuvo la glosa explicativa sobre el cuidado tierno de los niños. En español se conserva la imagen hebrea literal «su fruto» y se añade una nota que explicita la alternativa interpretativa, de modo que no se pierda la tensión léxica documentada por el audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה y «el Señor» para אֲדֹנָי, siguiendo la distinción auditada.
  - Se mantiene la estructura de dos preguntas retóricas con «¿Deberían...?» para reflejar el tono de shock del hebreo.
  - «Su fruto» preserva la metáfora hebrea; la nota aclara el sentido de descendencia sin sustituir la imagen en el texto principal.
  - «Santuario» conserva el valor sagrado de מִקְדָּשׁ y es coherente con el registro bíblico del pasaje.
