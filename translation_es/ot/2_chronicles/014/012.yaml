translation:
  language: es
  text: Asa y el pueblo que estaba con él los persiguieron hasta Gerar[a], y los cusitas cayeron hasta que no quedó ninguno con vida, porque quedaron destrozados delante de Yahvé y delante de su campamento[b]. Entonces se llevaron una cantidad muy grande de botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «etíopes». El hebreo dice «cusitas», es decir, gente de Cus.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «delante de su ejército». El hebreo puede significar «campamento» o «ejército»; el sufijo puede entenderse como el campamento o ejército de Asa, aunque algunos lo refieren al campamento o hueste de Yahvé.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּרְדְּפֵם
  english_pob_choice: pursued them
  chosen_spanish: los persiguieron
  alternatives_spanish:
  - los fueron persiguiendo
  - los acosaron
  lexicon: HALOT
  rationale: רדף expresa persecución militar; en español, «perseguir» comunica con naturalidad la acción y conserva el tono narrativo.
- source_word: עַד לִגְרָר
  english_pob_choice: as far as Gerar
  chosen_spanish: hasta Gerar
  alternatives_spanish:
  - hasta llegar a Gerar
  - tan lejos como Gerar
  lexicon: HALOT
  rationale: עַד con un topónimo marca el límite alcanzado; «hasta Gerar» es directo y fiel al alcance del texto.
- source_word: מִכּוּשִׁים
  english_pob_choice: Cushites
  chosen_spanish: cusitas
  alternatives_spanish:
  - cushitas
  - etíopes
  lexicon: HALOT
  rationale: El hebreo señala a los pueblos de Cus. «Cusitas» preserva mejor la referencia etnogeográfica que «etíopes», que puede sonar más tradicional pero menos preciso.
- source_word: וַיִּפֹּל מִכּוּשִׁים
  english_pob_choice: the Cushites fell until none remained alive
  chosen_spanish: los cusitas cayeron hasta que no les quedó vida
  alternatives_spanish:
  - los cusitas cayeron
  - hubo cusitas caídos
  lexicon: HALOT
  rationale: La construcción con נפל + מן indica bajas entre el grupo; la ampliación «hasta que no les quedó vida» reproduce la fuerza totalizadora de «no quedó vida».
- source_word: לְאֵין לָהֶם מִחְיָה
  english_pob_choice: that none remained alive
  chosen_spanish: hasta que no les quedó vida
  alternatives_spanish:
  - hasta no quedarles vida
  - sin que les quedara vida
  lexicon: HALOT
  rationale: מִחְיָה apunta a vida/sustento vital; en este contexto militar, la idea es que no hubo sobrevivientes. La formulación española mantiene esa intensidad sin sonar forzada.
- source_word: נִשְׁבְּרוּ
  english_pob_choice: were shattered
  chosen_spanish: quedaron destrozados
  alternatives_spanish:
  - fueron quebrados
  - fueron destrozados
  lexicon: HALOT
  rationale: El pasivo de שבר expresa ruina decisiva. «Destrozados» conserva la imagen de quebranto total con un español natural y enérgico.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino Yahvé según la pauta del proyecto, y «delante de» conserva el modismo hebreo de derrota en presencia/poder de Dios.
- source_word: וְלִפְנֵי מַחֲנֵהוּ
  english_pob_choice: before his camp
  chosen_spanish: delante de su campamento
  alternatives_spanish:
  - delante de su ejército
  - delante de su campamento/ejército
  lexicon: HALOT
  rationale: מַחֲנֶה puede ser «campamento» o «ejército». Aquí «campamento» sigue más de cerca la forma hebrea y preserva la ambigüedad del referente del sufijo.
- source_word: וַיִּשְׂאוּ שָׁלָל
  english_pob_choice: they carried off plunder
  chosen_spanish: se llevaron un botín
  alternatives_spanish:
  - tomaron botín
  - cargaron con botín
  lexicon: HALOT
  rationale: נשא + שׁלל expresa el traslado de lo capturado; «se llevaron un botín» es claro y sobrio en español.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: a very great amount of plunder
  chosen_spanish: muy grande
  alternatives_spanish:
  - en gran abundancia
  - grandísimo
  lexicon: HALOT
  rationale: La doble intensificación se vierte con «muy grande», que preserva la abundancia sin recargar la frase.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de manera directa; en español del proyecto se normaliza como «Yahvé», evitando el sustituto litúrgico y conservando el nombre de pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de la frase final sobre la derrota
  english_pob_reading: they were shattered before Yahweh and before his camp
  chosen_spanish_reading: quedaron destrozados delante de Yahvé y delante de su campamento
  alternative_spanish_readings:
  - quedaron quebrados delante de Yahvé y delante de su ejército
  - quedaron destrozados delante de Yahvé y delante de su ejército
  rationale: 'La redacción conserva la tensión del hebreo entre la acción divina y la humana: la derrota ocurre tanto ante Yahvé como ante el grupo militar asociado a Asa, sin resolver de antemano el referente del sufijo.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve tension rather than resolve it beyond the text)
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que sustituyó una formulación más interpretativa por una más literal en la cláusula de las bajas, ajustó el referente de מַחֲנֵהוּ hacia «campamento» para seguir más de cerca el hebreo, y reforzó la intensidad del botín final. La presente traducción refleja esas decisiones y mantiene la ambigüedad relevante del sufijo sin forzar una identificación no explicitada por el texto.
  spanish_consistency_notes:
  - Se emplea «Yahvé» de manera consistente para יְהוָה, conforme a la política del proyecto.
  - Se preserva «cusitas» para כּוּשִׁים, evitando el tradicional «etíopes» salvo nota alternativa.
  - «Delante de» reproduce el valor idiomático de לִפְנֵי en contexto militar-teológico.
  - «Campamento» se mantiene para מַחֲנֶה, dejando abierta la posible lectura de «ejército» en nota.
  - La intensidad final se expresa con «muy grande», en paralelo con la acumulación hebrea הַרְבֵּה מְאֹד.
