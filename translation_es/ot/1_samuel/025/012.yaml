translation:
  language: es
  text: Entonces los jóvenes[a] de David dieron la vuelta y emprendieron el regreso; volvieron, llegaron y le informaron todas estas palabras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Jóvenes» traduce el hebreo נַעֲרֵי sin decidir aquí por «siervos», porque el término puede abarcar juventud, ayudantes o retenedores según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «todas estas cosas». El hebreo דְּבָרִים puede referirse tanto a palabras dichas como a asuntos o hechos; aquí se prefiere «palabras» porque el informe trata de la respuesta verbal de Nabal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּהַפְכ֥וּ
  english_pob_choice: turned back
  chosen_spanish: volvieron
  alternatives_spanish:
  - dieron media vuelta
  - regresaron
  lexicon: HALOT
  rationale: El hebreo expresa un cambio de dirección en contexto de viaje; en español, «volvieron» comunica ese retroceso de forma natural y fiel, sin sugerir una acción física de «voltear».
- source_word: נַעֲרֵֽי דָוִ֖ד
  english_pob_choice: David’s young men
  chosen_spanish: los jóvenes de David
  alternatives_spanish:
  - los muchachos de David
  - los siervos de David
  lexicon: HALOT
  rationale: נַעַר puede referirse a joven, ayudante o servidor. «Jóvenes» conserva la amplitud lexical que el POB inglés mantuvo con «young men» y evita decidir sin necesidad por «siervos».
- source_word: לְדַרְכָּם
  english_pob_choice: on their way
  chosen_spanish: por su camino
  alternatives_spanish:
  - en su camino
  - de camino
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y marca la ruta de regreso. «Por su camino» suena natural en español y preserva la idea de trayecto sin forzar un calco.
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: they returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron atrás
  - se volvieron
  lexicon: HALOT
  rationale: El verbo repite la noción de retorno de manera explícita. «Regresaron» conserva esa redundancia narrativa que el hebreo presenta con dos verbos de movimiento.
- source_word: וַיָּבֹאוּ
  english_pob_choice: and came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - entraron
  lexicon: HALOT
  rationale: En secuencia narrativa, «llegaron» refleja de modo claro el segundo verbo de movimiento y evita una repetición demasiado dura en español.
- source_word: וַיַּגִּדוּ ל֔וֹ
  english_pob_choice: and told him
  chosen_spanish: e informaron a él
  alternatives_spanish:
  - y le contaron
  - y le dijeron
  lexicon: HALOT
  rationale: נגד aquí tiene el sentido de comunicar o reportar. «Informaron» conserva el matiz de reporte; la construcción «a él» refleja el ל֔וֹ, aunque en español también podría pronominalizarse.
- source_word: כְּכֹל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - todo esto que dijeron
  lexicon: HALOT
  rationale: El POB inglés prefirió «words» por el foco en un discurso citado. En español, «palabras» mantiene ese foco verbal y deja abierta la posibilidad de «cosas» sin borrarla.
translation_notes:
  revision_awareness: El texto sigue de cerca el pasaje hebreo y el auditorial inglés POB, manteniendo la cadena narrativa de verbos de movimiento y la ambigüedad lexical de דְּבָרִים. No se introdujeron revisiones textuales ni cambios de sentido respecto al paquete fuente; solo se ajustó el orden y la naturalidad del español.
  spanish_consistency_notes:
  - Se usó «Dios»/«Yahvé» según los valores por defecto del proyecto, aunque este versículo no contiene ninguno de esos términos.
  - Se evitó «siervos» para נַעַר para no cerrar prematuramente el rango semántico que el inglés POB preserva con «young men».
  - Se mantuvo la secuencia narrativa de cuatro verbos con la mínima suavización necesaria para un español publicable.
