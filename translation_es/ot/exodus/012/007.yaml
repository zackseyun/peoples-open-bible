revisions:
- from: Tomarán[a] de la sangre y la pondrán sobre los dos postes y sobre el dintel de las casas en las que la comerán.
  to: Tomarán parte de la sangre y la pondrán sobre los dos postes de la puerta y sobre el dintel de las casas en las que la comerán[a].
  rationale: Se ajusta el partitivo de מִן, se precisa el referente arquitectónico de מְזוּזוֹת y se corrige la nota para que preserve una alternativa real, en línea con el expediente inglés POB y con mejor fidelidad al hebreo.
