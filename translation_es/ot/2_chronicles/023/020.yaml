translation:
  language: es
  text: Entonces tomó a los comandantes de centenas, a los nobles[a], a los gobernantes del pueblo y a todo el pueblo de la tierra[b], e hizo bajar al rey de la casa de Yahvé. Entraron por la puerta superior de la casa del rey[c] y sentaron al rey sobre el trono del reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los poderosos» o «los dignatarios»; el hebreo puede referirse a personas prominentes o poderosas.
    reason: lexical_alternative
  - marker: b
    text: Expresión hebrea común en narraciones reales para el pueblo como cuerpo socio-político.
    reason: cultural_note
  - marker: c
    text: O «el palacio real».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הַמֵּאוֹת
  english_pob_choice: the commanders of hundreds
  chosen_spanish: los capitanes de cientos
  alternatives_spanish:
  - los comandantes de cientos
  - los centuriones
  lexicon: HALOT
  rationale: El hebreo nombra un cargo militar por la unidad de cien. «Capitanes de cientos» conserva la estructura semítica y su función, sin introducir un equivalente romano como «centuriones».
- source_word: הָאַדִּירִים
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los poderosos
  - los dignatarios
  lexicon: HALOT
  rationale: El término puede referirse a personas prominentes o poderosas. En este contexto cortesano y político, «nobles» comunica mejor el rango social sin forzar el sentido físico de fuerza.
- source_word: הַמֹּשְׁלִים בָּעָם
  english_pob_choice: the rulers of the people
  chosen_spanish: los gobernantes del pueblo
  alternatives_spanish:
  - los que gobiernan al pueblo
  - los magistrados del pueblo
  lexicon: HALOT
  rationale: El participio expresa ejercicio de autoridad sobre el pueblo. «Gobernantes» mantiene la idea de autoridad y resulta natural en español; se conserva la relación con «el pueblo».
- source_word: כָּל עַם הָאָרֶץ
  english_pob_choice: all the people of the land
  chosen_spanish: todo el pueblo de la tierra
  alternatives_spanish:
  - todo el pueblo del país
  - todo el pueblo de la región
  lexicon: HALOT
  rationale: Se preserva la expresión idiomática hebrea. Aunque puede sonar amplia en español, «de la tierra» deja visible el giro socio-político del original; la nota explica el uso idiomático.
- source_word: וַיּוֹרֶד אֶת הַמֶּלֶךְ
  english_pob_choice: brought the king down
  chosen_spanish: bajaron al rey
  alternatives_spanish:
  - hicieron bajar al rey
  - trajeron al rey abajo
  lexicon: HALOT
  rationale: El hiphil de ירד indica hacer descender. En español, «bajaron al rey» conserva el movimiento desde un lugar más alto hacia otro más bajo y suena natural en la secuencia narrativa.
- source_word: מִבֵּית יְהוָה
  english_pob_choice: from the house of Yahweh
  chosen_spanish: de la casa de Yahvé
  alternatives_spanish:
  - del templo de Yahvé
  - de la casa de Yahweh
  lexicon: HALOT
  rationale: 'Se mantiene la terminología del proyecto: el Tetragrámaton se vierte «Yahvé». «Casa» conserva בית sin reemplazarlo por «templo», que sería válido pero más interpretativo.'
- source_word: בְּתוֹךְ שַׁעַר הָעֶלְיוֹן
  english_pob_choice: through the upper gate
  chosen_spanish: por la puerta superior
  alternatives_spanish:
  - por la puerta de arriba
  - a través de la puerta superior
  lexicon: HALOT
  rationale: La frase hebrea combina dirección espacial con una abertura de acceso. «Puerta superior» comunica el referente arquitectónico y «por» expresa el paso a través de ella con naturalidad en español.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio del rey
  - la casa real
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa del rey». «Casa» conserva la forma original; «palacio» sería más interpretativo y menos transparente para el auditable del texto.
- source_word: וַיּוֹשִׁיבוּ
  english_pob_choice: seated
  chosen_spanish: sentaron
  alternatives_spanish:
  - pusieron sentado
  - hizo sentar
  lexicon: HALOT
  rationale: El causativo expresa que lo hicieron sentarse en el trono. «Sentaron» es la forma española más directa y adecuada al gesto de entronización.
- source_word: כִּסֵּא הַמַּמְלָכָה
  english_pob_choice: the throne of the kingdom
  chosen_spanish: el trono del reino
  alternatives_spanish:
  - el trono real
  - el trono de la realeza
  lexicon: HALOT
  rationale: 'Se conserva la estructura nominal del hebreo: «trono del reino». «Real» sería más idiomático, pero menos transparente respecto de ממלכה.'
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la pauta del proyecto para español, se traduce como «Yahvé», preservando el nombre de pacto y evitando la sustitución por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé'
- issue: Valor de ‘the people of the land’ como expresión socio-política
  english_pob_reading: Hebrew 'all the people of the land,' a common expression in royal narratives for the populace as a socio-political body.
  chosen_spanish_reading: ‘todo el pueblo de la tierra’ como expresión idiomática del conjunto popular
  alternative_spanish_readings:
  - ‘todo el pueblo del país’
  - ‘los habitantes de la tierra’
  rationale: La frase hebrea es una fórmula fija de narrativas reales. Se conserva literalmente en el texto principal para no perder su carácter técnico; la nota aclara que no se trata simplemente de una referencia geográfica.
  doctrine_reference: 'POB audit trail: cultural_note for עַם הָאָרֶץ'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: el texto inglés ya fija «commanders of hundreds», «nobles», «rulers of the people», «all the people of the land», «brought the king down», «house of Yahweh», «upper gate», «king’s house» y «throne of the kingdom». La versión española conserva esa estructura con equivalencias transparentes y añade notas solo donde el español puede ocultar el valor idiomático o la alternativa lexical documentada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para יהוה.
  - Se usa «casa» en «casa de Yahvé» y «casa del rey» para conservar la forma hebrea del original.
  - «Pueblo de la tierra» se conserva literal por su valor técnico; la nota explica su sentido colectivo.
  - Se evita «Cristo», «SEÑOR» y «palacio» porque no son las opciones auditadas aquí ni las más transparentes para este verso.
  - La puntuación en español sigue la cadencia narrativa de una sola oración con cláusulas coordinadas.
