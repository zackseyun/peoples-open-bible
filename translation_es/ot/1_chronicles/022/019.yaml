translation:
  language: es
  text: Ahora dispongan su corazón y su alma[a] para buscar a Yahvé su Dios; levántense y construyan el santuario de Yahvé Dios[b], para traer el arca del pacto de Yahvé y los utensilios sagrados de Dios a la casa que ha de ser construida para el nombre de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: “den su corazón y su alma” para buscar a Yahvé su Dios.'
    reason: lexical_alternative
  - marker: b
    text: ‘Casa’ aquí se refiere al edificio del templo que ha de construirse para el nombre de Yahvé.
    reason: cultural_note
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora bien
  - Entonces
  lexicon: HALOT
  rationale: Marca temporal y discursiva de urgencia exhortativa; 'Ahora' es natural en español y conserva la inmediatez del mandato.
- source_word: תְּנוּ לְבַבְכֶם וְנַפְשְׁכֶם
  english_pob_choice: set your heart and your soul
  chosen_spanish: entreguen su corazón y su alma
  alternatives_spanish:
  - pongan su corazón y su alma
  - den su corazón y su alma
  - dispongan su corazón y su alma
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'den'; en español, 'entreguen' conserva la fuerza voluntaria y total de la dedicación sin sonar mecánico. Mantiene los dos centros interiores sin fusionarlos.
- source_word: לְבָב / נֶפֶשׁ
  english_pob_choice: heart and soul
  chosen_spanish: corazón y alma
  alternatives_spanish:
  - corazón y vida
  - interior y alma
  - mente y alma
  lexicon: HALOT
  rationale: Conserva la pareja antropológica del hebreo. 'Corazón' en español bíblico comunica voluntad/íntimo propósito; 'alma' preserva נֶפֶשׁ sin reducirlo a 'vida' o 'ser'.
- source_word: לִדְרוֹשׁ
  english_pob_choice: to seek
  chosen_spanish: buscar
  alternatives_spanish:
  - buscar a
  - consultar
  - inquirir de
  lexicon: HALOT
  rationale: En este contexto, דרשׁ con Dios expresa búsqueda devota y orientación a él; 'buscar' es claro y fiel en español, aunque 'consultar' o 'inquirir de' pueden aparecer en contextos oraculares más específicos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el nombre divino, evitando el reemplazo por una convención de ocultamiento. 'Yahvé' es la forma preferida en el texto español principal.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - su Dios propio
  lexicon: HALOT
  rationale: Refleja el posesivo plural de segunda persona en registro natural y reverente. En español, el referente está claro por el contexto imperativo.
- source_word: וְקוּמוּ
  english_pob_choice: Rise up
  chosen_spanish: levántense
  alternatives_spanish:
  - ábranse paso
  - arríbanse
  - alcense
  lexicon: HALOT
  rationale: Imperativo exhortativo de קום; 'levántense' transmite el llamado a acción inmediata con buen español contemporáneo.
- source_word: וּבְנוּ
  english_pob_choice: and build
  chosen_spanish: y construyan
  alternatives_spanish:
  - y edifiquen
  - y levanten
  lexicon: HALOT
  rationale: '''Construyan'' es el equivalente más natural para el acto de edificar una estructura. ''Edifiquen'' sería más tradicional, pero en español moderno puede sonar más abstracto.'
- source_word: מִקְדַּשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el templo
  - el lugar santo
  lexicon: HALOT
  rationale: מקדשׁ designa un lugar santo/culto; 'santuario' preserva mejor el valor de consagración que 'templo' y encaja con el paralelismo del versículo.
- source_word: יְהוָה הָאֱלֹהִים
  english_pob_choice: Yahweh God
  chosen_spanish: de Yahvé Dios
  alternatives_spanish:
  - de Yahvé, el Dios
  - del Dios Yahvé
  lexicon: HALOT
  rationale: Conserva la yuxtaposición hebrea del nombre divino con el sustantivo 'Dios' sin convertirla automáticamente en una fórmula litúrgica fija. El genitivo en español requiere 'de' para buena fluidez.
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: para traer
  alternatives_spanish:
  - para llevar
  - para introducir
  lexicon: HALOT
  rationale: Infinitivo de propósito; 'para traer' mantiene la finalidad del verbo sin añadir matices de traslado no garantizados por el hebreo.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahveh
  - el arca de la alianza de Yahvé
  lexicon: HALOT
  rationale: '''Pacto'' traduce בְּרִית de forma más literal y consistente con el proyecto. ''Arca del pacto de Yahvé'' preserva la cadena genitiva y la referencia covenantal.'
- source_word: וּכְלֵי קֹדֶשׁ הָאֱלֹהִים
  english_pob_choice: and the holy vessels of God
  chosen_spanish: y los utensilios santos de Dios
  alternatives_spanish:
  - y los vasos santos de Dios
  - y los objetos santos de Dios
  - y los utensilios sagrados de Dios
  lexicon: HALOT
  rationale: כְּלִים son objetos/utensilios de uso cultual; 'utensilios' es claro en español y evita la posible solemnidad ambigua de 'vasos'. 'Santos' refleja קֹדֶשׁ con fuerza adjetival directa.
- source_word: לַבַּיִת
  english_pob_choice: into the house
  chosen_spanish: a la casa
  alternatives_spanish:
  - al templo
  - a la casa-templo
  lexicon: HALOT
  rationale: '''Casa'' conserva el hebraísmo y la referencia al edificio sagrado. El contexto ya aclara que se trata de la casa/santuario que será construida.'
- source_word: הַנִּבְנֶה
  english_pob_choice: that is to be built
  chosen_spanish: que ha de ser construida
  alternatives_spanish:
  - que será construida
  - que se construirá
  lexicon: HALOT
  rationale: El participio tiene valor prospectivo; 'ha de ser construida' expresa el proyecto futuro con un tono digno y preciso.
- source_word: לְשֵׁם יְהוָה
  english_pob_choice: for the name of Yahweh
  chosen_spanish: para el nombre de Yahvé
  alternatives_spanish:
  - para el nombre de Yahveh
  - en honor del nombre de Yahvé
  lexicon: HALOT
  rationale: Respeta el idiomático 'para el nombre de' sin sustituirlo por una paráfrasis devocional. Mantiene la densidad teológica del 'nombre' como dedicación del edificio a Yahvé.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo contiene directamente el Tetragrámaton. En la línea del proyecto, se preserva el nombre divino con una forma española legible, sin ocultarlo bajo una convención litúrgica. 'Yahvé' es la forma elegida en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Anthropological pair 'heart and soul'
  english_pob_reading: Retained both terms explicitly
  chosen_spanish_reading: Mantenidos como 'corazón y alma'
  alternative_spanish_readings:
  - resumidos como 'todo el ser'
  - '''mente y corazón'''
  rationale: El hebreo usa dos facultades interiores para intensificar una dedicación total. Mantener ambos términos evita diluir la carga retórica y antropológica del mandato.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
- issue: Rendering of בְּרִית
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  rationale: '''Pacto'' preserva el valor bíblico-jurídico del término y su vínculo con la teología de la alianza divina. Es consistente con el vocabulario del proyecto y evita una equivalencia más vaga.'
  doctrine_reference: 'DOCTRINE.md lexical consistency: covenant terminology'
- issue: Meaning of 'house' in the closing phrase
  english_pob_reading: House here refers to the temple building to be constructed for the LORD's name.
  chosen_spanish_reading: casa referida al edificio sagrado a construir para el nombre de Yahvé
  alternative_spanish_readings:
  - templo
  - casa del templo
  rationale: Se conserva 'casa' porque el hebreo usa בית y el propio contexto lo define como el edificio destinado al nombre de Yahvé. La nota aclara la referencia arquitectónica sin borrar el hebraísmo.
  doctrine_reference: DOCTRINE.md translation philosophy on preserving source imagery
translation_notes:
  revision_awareness: 'Se revisó el pasaje frente al audit trail inglés: se conservó la estructura exhortativa, la pareja antropológica ''corazón y alma'', el nombre divino como Yahvé, y el hebraísmo ''casa'' con aclaración contextual. No hubo revisiones textuales adicionales en el registro inglés, y el dictamen de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para יְהוָה.
  - Se usó 'pacto' para בְּרִית conforme al léxico del proyecto.
  - '''Santuario'' y ''casa'' se distinguieron para reflejar מִקְדַּשׁ y בַּיִת sin fusionarlos.'
  - 'Se preservó la coordinación de imperativos: ahora / levántense / construyan / para traer.'
  - Los marcadores de nota [a] y [b] aparecen solo donde corresponde en el texto principal.
