  text: קָרְבָּנ֞/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒ מִזְרָ֤ק אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם מְלֵאִ֗ים סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/007/031.yaml
  text: His offering was one silver plate[a], its weight one hundred thirty shekels, one silver basin of seventy shekels, according to the sanctuary shekel[c][b]; both of them were full of fine flour mixed with oil for a grain offering.
  footnotes:
  - marker: a
    text: Or 'dish' for 'plate' (Hebrew קַעֲרָה), a ritual vessel.
    reason: lexical_alternative
  - marker: b
    text: Or 'bowl' for 'basin' (Hebrew מִזְרָק), a vessel associated with sacrificial use.
    reason: lexical_alternative
  - marker: c
    text: That is, according to the standard sanctuary weight.
    reason: cultural_note
