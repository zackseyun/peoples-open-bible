translation:
  language: es
  text: Y este día les será como memorial, y lo celebrarán como fiesta para Yahvé; por todas sus generaciones, lo celebrarán como estatuto perpetuo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un estatuto permanente» o «una ordenanza perpetua». La expresión hebrea חֻקַּת עוֹלָם suele denotar una ordenanza duradera y en vigor de modo continuo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: shall be
  chosen_spanish: les será
  alternatives_spanish:
  - será para ustedes
  - habrá de ser para ustedes
  lexicon: HALOT
  rationale: En este contexto jurídico-instructivo, la forma expresa una disposición normativa futura. «Les será» comunica con naturalidad esa obligación/prescripción sin perder el matiz prospectivo del hebreo.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: este día
  alternatives_spanish:
  - este mismo día
  - este día aquí
  lexicon: HALOT
  rationale: La demostrativa es directa y suficiente; «este día» conserva la referencia inmediata sin añadir énfasis no exigido por el hebreo.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: les
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: HALOT
  rationale: En español, el dativo «les» funciona bien con «ser» para expresar destino o beneficio normativo. Mantiene la relación establecida por el hebreo.
- source_word: לְזִכָּרוֹן
  english_pob_choice: as a memorial
  chosen_spanish: para memoria
  alternatives_spanish:
  - como memorial
  - como recordatorio
  lexicon: HALOT
  rationale: «זִכָּרוֹן» puede ser «memorial» o «recuerdo/rememoración». «Para memoria» conserva la función conmemorativa de forma sobria y evita un tecnicismo menos natural en español, sin diluir el sentido cultual.
- source_word: וְחַגֹּתֶם ... חַג
  english_pob_choice: you shall celebrate it as a feast
  chosen_spanish: lo celebrarán como fiesta
  alternatives_spanish:
  - lo observarán como fiesta
  - lo festejarán como festividad
  lexicon: HALOT
  rationale: El verbo חגג y el sustantivo חַג comparten raíz; «celebrarán ... como fiesta» preserva esa relación verbal-nominal con una formulación idiomática en español. «Fiesta» refleja bien el carácter cultual y festivo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: DOCTRINE.md contested terms
  rationale: Se mantiene el nombre divino explícito según la política del proyecto. «Para Yahvé» expresa dirección/dedicación de la fiesta y evita el ocultamiento del tetragrámaton.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - a través de sus generaciones
  lexicon: HALOT
  rationale: La expresión idiomática indica observancia continuada en la sucesión generacional. «Por todas sus generaciones» es clara, natural y plenamente abarcadora en español.
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: estatuto perpetuo
  alternatives_spanish:
  - estatuto permanente
  - decreto perpetuo
  - ordenanza perpetua
  lexicon: HALOT
  rationale: «חֻקָּה» tiene fuerza legal de estatuto/prescripción; «עוֹלָם» en este marco señala duración continua. «Estatuto perpetuo» preserva la solemnidad jurídica y la continuidad duradera sin forzar una precisión filosófica no explícita.
- source_word: תְּחָגֻּהוּ
  english_pob_choice: you shall celebrate it
  chosen_spanish: lo celebrarán
  alternatives_spanish:
  - lo observarán
  - lo festejarán
  lexicon: HALOT
  rationale: Se retoma el mismo verbo para conservar el enlace con la primera mitad del versículo y la repetición enfática del mandato. «Lo celebrarán» es natural y mantiene la fuerza del imperativo/jusivo.
theological_decisions:
- issue: Nombre divino יהוה en un mandato festivo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el tetragrámaton, y la política del proyecto pide reflejarlo como nombre propio. «Yahvé» mantiene la referencia al Dios del pacto y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor legal de חֻקַּת עוֹלָם
  english_pob_reading: a permanent statute
  chosen_spanish_reading: estatuto perpetuo
  alternative_spanish_readings:
  - estatuto permanente
  - ordenanza perpetua
  - decreto perpetuo
  rationale: La frase no requiere una afirmación metafísica, sino la fijación de una observancia obligatoria y continua para Israel. «Estatuto perpetuo» preserva la fuerza jurídica y la duración duradera del precepto.
  doctrine_reference: DOCTRINE.md Translation philosophy §6 (readable modern Spanish) and §5 (consistency of key terms)
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo masorético y la línea de auditoría inglesa, pero adapta el resultado a un español natural y publicable. Se preservan las dos repeticiones de חגג con la misma raíz léxica en español («celebrarán») y se mantiene la tensión interpretativa de חֻקַּת עוֹלָם mediante una nota breve de alternativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme a la política terminológica del proyecto.
  - Se conserva el paralelismo verbal de חגג con «celebrarán» en ambas cláusulas.
  - «Memoria» se emplea en sentido conmemorativo/cultual, no meramente psicológico.
  - «Estatuto perpetuo» evita la arcaización innecesaria de «para siempre» y mantiene la fuerza legal del hebreo.
