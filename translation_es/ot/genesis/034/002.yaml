translation:
  language: es
  text: Cuando Siquem, hijo de Hamor el heveo, el príncipe de la tierra, la vio, la tomó, se acostó con ella y la humilló[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo también puede entenderse más explícitamente aquí como un acto de violencia sexual; muchas traducciones dicen «la violó». El verbo puede denotar aflicción, humillación o violación, y en este contexto se refiere a una violación sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  - notó
  lexicon: HALOT
  rationale: ראייה en la secuencia narrativa wayyiqtol pide un verbo simple y natural; «vio» conserva la linealidad del relato sin añadir matiz no presente.
- source_word: שְׁכֶם בֶּן חֲמ֛וֹר
  english_pob_choice: Shechem son of Hamor
  chosen_spanish: Siquem, hijo de Hamor
  alternatives_spanish:
  - Siquem, el hijo de Hamor
  - Siquem, hijo de Hamor
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de manera convencional al español; el giro de parentesco se expresa de forma natural con «hijo de».
- source_word: הַחִוִּי
  english_pob_choice: the Hivite
  chosen_spanish: el heveo
  alternatives_spanish:
  - el hivitita
  - el de los hivitas
  lexicon: HALOT
  rationale: El etnónimo se vierte con el gentilicio bíblico usual en español, «heveo», que es claro y reconocible para el lector bíblico.
- source_word: נְשִׂיא הָאָרֶץ
  english_pob_choice: the prince of the land
  chosen_spanish: el príncipe de la tierra
  alternatives_spanish:
  - el jefe de la tierra
  - el gobernante de la tierra
  - un príncipe de la tierra
  lexicon: HALOT
  rationale: נָשִׂיא denota líder o príncipe; «príncipe» preserva el rango social-político sin convertirlo en rey. «La tierra» reproduce con sobriedad el alcance territorial del sustantivo hebreo.
- source_word: וַיִּקַּח אֹתָהּ
  english_pob_choice: he took her
  chosen_spanish: la tomó
  alternatives_spanish:
  - la agarró
  - la secuestró
  - la se apoderó de ella
  lexicon: HALOT
  rationale: לקח se mantiene en su sentido básico de «tomar»; el español breve «la tomó» conserva la secuencia verbal y deja que el contexto cargue la violencia del acto.
- source_word: וַיִּשְׁכַּב אֹתָהּ
  english_pob_choice: lay with her
  chosen_spanish: se acostó con ella
  alternatives_spanish:
  - yacía con ella
  - durmió con ella
  lexicon: HALOT
  rationale: La expresión es un eufemismo idiomático de relaciones sexuales; «se acostó con ella» es un equivalente español natural y grave, sin trivializar la escena.
- source_word: וַיְעַנֶּהָ
  english_pob_choice: humiliated her
  chosen_spanish: la humilló
  alternatives_spanish:
  - la violó
  - la afligió
  - la oprimió
  lexicon: HALOT
  rationale: ענה en este contexto admite afligir, humillar o violar. Siguiendo la revisión inglesa más reciente, «la humilló» refleja con mayor proximidad el verbo y conserva la tensión lexical, sin cerrar el sentido a una sola paráfrasis penal.
theological_decisions:
- issue: Cómo expresar la violencia sexual sin suavizarla ni sobre-especificar el verbo final
  english_pob_reading: 'The verse presents a progression: ''he took her and lay with her and humiliated her.'' The English audit trail keeps the final clause less explicit than ''raped her'' while still indicating sexual violation.'
  chosen_spanish_reading: 'El español conserva la progresión: «la tomó, se acostó con ella y la humilló», dejando que la secuencia verbal comunique la violencia sin añadir una glosa interpretativa externa.'
  alternative_spanish_readings:
  - «la tomó, se acostó con ella y la violó»
  - «la tomó, se acostó con ella y la afligió»
  - «la tomó, se acostó con ella y la ultrajó»
  rationale: La formulación mantiene el paralelismo del hebreo y respeta la decisión del POB inglés de no imponer una equivalencia demasiado cerrada. «La humilló» preserva la ambigüedad lexical real de ענה y, al mismo tiempo, en este contexto comunica una grave deshonra y violencia.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que sustituyó «violated her» por «humiliated her» para reflejar con más de cerca el verbo hebreo ענה sin perder la gravedad del contexto. La versión española adopta esa misma preferencia y evita una paráfrasis más fuerte que cierre el rango semántico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Siquem» para el nombre propio siguiendo la ortografía bíblica española más difundida.
  - Se conserva la progresión verbal del hebreo con tres acciones sucesivas, sin fusionarlas en una sola glosa.
  - No se emplea «SEÑOR» ni «Cristo», pues no aparecen en el texto fuente.
