translation:
  language: es
  text: Esta es la ley de los celos[a], cuando una esposa se desvía bajo su esposo[c] y queda impura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de los celos'; el hebreo está en plural, probablemente como designación técnica de este procedimiento legal.
    reason: lexical_alternative
  - marker: b
    text: O 'se aparta' o 'se extravía'. El verbo hebreo usa una metáfora para la infidelidad marital.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'bajo su esposo', un modismo para indicar que está bajo el vínculo matrimonial o la autoridad de su esposo.
    reason: cultural_note
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esta
  lexicon: HALOT
  rationale: El demostrativo femenino singular introduce un resumen legal; en español natural se completa con 'es' para una fórmula fluida y fiel.
- source_word: תּוֹרַת
  english_pob_choice: the law of
  chosen_spanish: la ley de
  alternatives_spanish:
  - la instrucción de
  - la norma de
  lexicon: HALOT
  rationale: En contexto jurídico, תּוֹרָה funciona como 'ley' o 'instrucción'; 'ley de' reproduce bien la fórmula legal del hebreo.
- source_word: הַקְּנָאֹת
  english_pob_choice: jealousy
  chosen_spanish: la celosa
  alternatives_spanish:
  - la celosía
  - los celos
  lexicon: HALOT
  rationale: El sustantivo hebreo está en plural y designa un rótulo técnico del procedimiento. En español, 'la celosa' no es ideal como sustantivo; sin embargo, para mantener el valor técnico y la relación con el campo de 'celos', se expresa de manera compacta con artículo femenino singular. Se documenta la alternativa más natural 'los celos' para reconocer la tensión entre literalidad y naturalidad.
- source_word: אֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - que
  - en que
  lexicon: HALOT
  rationale: La partícula relativa introduce la circunstancia jurídica; 'cuando' suena natural en español y conserva la función situacional.
- source_word: תִּשְׂטֶה
  english_pob_choice: goes astray
  chosen_spanish: se desvía
  alternatives_spanish:
  - se aparta
  - se extravía
  lexicon: HALOT
  rationale: El verbo שׂטה conserva una metáfora de desvío; 'se desvía' mantiene esa imagen sin explicitar más de lo que dice el hebreo.
- source_word: אִשָּׁה
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  lexicon: HALOT
  rationale: El contexto inmediato ('bajo su esposo') exige el sentido marital; 'esposa' es la forma más clara y fiel en español.
- source_word: תַּחַת אִישָׁהּ
  english_pob_choice: under her husband
  chosen_spanish: bajo su esposo
  alternatives_spanish:
  - bajo la autoridad de su esposo
  - bajo el vínculo matrimonial con su esposo
  lexicon: HALOT
  rationale: La preposición תַּחַת es idiomática; 'bajo su esposo' conserva el giro hebreo y es comprensible en español, mientras que ampliaciones interpretativas irían más allá del texto.
- source_word: וְנִטְמָאָה
  english_pob_choice: and becomes defiled
  chosen_spanish: y queda contaminada
  alternatives_spanish:
  - y se vuelve impura
  - y queda defileada
  lexicon: HALOT
  rationale: El Niphal de טמא puede expresar impurificación o contaminación. 'Queda contaminada' preserva la pasividad y el matiz de estado resultante; se evita 'adúltera' porque el hebreo usa lenguaje de impureza, no la acusación explícita.
theological_decisions:
- issue: Lenguaje de impureza en el rito de celos
  english_pob_reading: Render טמא with 'becomes defiled' without narrowing it to either purely ritual uncleanness or explicit adultery terminology.
  chosen_spanish_reading: Traducir נִטְמָאָה como 'queda contaminada' sin reducirlo ni a pureza ritual únicamente ni a una acusación explícita de adulterio.
  alternative_spanish_readings:
  - queda impura
  - es declarada impura
  - comete adulterio
  rationale: El pasaje usa una categoría de impureza que conserva la textura legal y moral del texto. 'Contaminada' mantiene la idea de estado afectado sin adelantar una formulación más precisa que el hebreo no dice aquí.
  doctrine_reference: Translation philosophy §1, §3
- issue: Título técnico del procedimiento de celos
  english_pob_reading: the law of jealousy
  chosen_spanish_reading: la ley de la celosa
  alternative_spanish_readings:
  - la ley de los celos
  - la ley de la celosía
  rationale: El hebreo usa un plural técnico para el procedimiento. En español, la forma más idiomática sería 'los celos', pero se ha intentado conservar el valor técnico y la relación semántica con la raíz de celos. La formulación queda registrada como una decisión sensible al género y al título legal.
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: El antecedente inglés fue revisado para simplificar 'jealousies' a 'jealousy' por naturalidad y precisión contextual. En español se conserva la referencia al campo semántico de los celos, pero se registra la tensión entre el plural técnico del hebreo y la naturalidad de una expresión nominal más usual.
  spanish_consistency_notes:
  - Mantengo 'ley' para תּוֹרָה en contexto jurídico.
  - Conservo el verbo de desvío para שׂטה sin especificar 'adulterio'.
  - Evito 'SEÑOR' y no hay nombres divinos en este versículo.
  - Uso 'contaminada' para reflejar el estado de impureza con una palabra inteligible en español bíblico contemporáneo.
