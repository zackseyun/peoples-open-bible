translation:
  language: es
  text: 'Entonces respondieron todos los hombres malos y despreciables[a], de entre los hombres que habían ido con David, y dijeron: «Porque no fueron conmigo[b], no les daremos nada del botín[c] que recuperamos, excepto que cada hombre tome a su esposa y a sus hijos, y se los lleve y se vaya».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Despreciables» traduce בְלִיַּעַל aquí como término descriptivo; alternativamente, «sin ley».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «conmigo» en singular dentro de la cita, aunque los que hablan son un grupo; se conserva esa forma en la traducción.
    reason: textual_variant
  - marker: c
    text: «Botín» también puede traducirse como «saqueo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: Then ... answered
  chosen_spanish: Entonces respondió
  alternatives_spanish:
  - Y respondió
  - Luego respondió
  lexicon: HALOT
  rationale: La partícula narrativa avanza la escena e introduce la réplica. «Entonces» conserva ese impulso discursivo con español natural.
- source_word: כָּל אִישׁ רָע וּבְלִיַּעַל
  english_pob_choice: every wicked and worthless man
  chosen_spanish: cada hombre malo y perverso
  alternatives_spanish:
  - cada hombre malvado y despreciable
  - cada hombre perverso e indigno
  lexicon: HALOT
  rationale: Se preserva el doble matiz negativo. «Perverso» intenta reflejar la carga de בְלִיַּעַל sin convertirlo en nombre propio ni en una etiqueta doctrinal posterior.
- source_word: מֵהָאֲנָשִׁים אֲשֶׁר הָלְכוּ עִם דָּוִד
  english_pob_choice: from among the men who had gone with David
  chosen_spanish: de entre los hombres que habían ido con David
  alternatives_spanish:
  - de los hombres que habían ido con David
  - entre los hombres que habían ido con David
  lexicon: HALOT
  rationale: «De entre» refleja el valor partitivo de מִן y conserva la idea de que eran un subgrupo dentro de la compañía de David.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y hablaron
  - y respondieron
  lexicon: HALOT
  rationale: Mantiene la secuencia narrativa de introducción del discurso directo.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Por cuanto
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: HALOT
  rationale: La construcción causal queda bien con «por cuanto», que suena digno y conserva el matiz explicativo del hebreo.
- source_word: לֹא הָלְכוּ עִמִּי
  english_pob_choice: they did not go with me
  chosen_spanish: no fueron conmigo
  alternatives_spanish:
  - no anduvieron conmigo
  - no vinieron conmigo
  lexicon: HALOT
  rationale: Se respeta la primera persona singular del sufijo («conmigo»), tal como lo conserva la auditoría inglesa, sin nivelar la tensión hacia un plural.
- source_word: לֹא נִתֵּן לָהֶם
  english_pob_choice: we will not give them
  chosen_spanish: no les daremos
  alternatives_spanish:
  - no se les dará
  - no les debemos dar
  lexicon: HALOT
  rationale: El plural volitivo se expresa naturalmente en futuro español, manteniendo la determinación del grupo.
- source_word: מֵהַשָּׁלָל
  english_pob_choice: any of the spoil
  chosen_spanish: nada del botín
  alternatives_spanish:
  - ninguna parte del botín
  - algo del botín
  lexicon: HALOT
  rationale: «Botín» comunica el sentido militar del hebreo; el alcance partitivo queda expresado con «nada de».
- source_word: אֲשֶׁר הִצַּלְנוּ
  english_pob_choice: that we recovered
  chosen_spanish: que hemos rescatado
  alternatives_spanish:
  - que recuperamos
  - que hemos recuperado
  lexicon: HALOT
  rationale: «Rescatar» refleja היטיב la idea de librar/recuperar de manos enemigas en este contexto de incursión, sin perder el matiz de recuperación de bienes.
- source_word: כִּי אִם
  english_pob_choice: except that
  chosen_spanish: sino que
  alternatives_spanish:
  - excepto que
  - salvo que
  lexicon: HALOT
  rationale: En español, «sino que» introduce con claridad la única concesión después de una negación.
- source_word: אִישׁ אֶת אִשְׁתּוֹ וְאֶת בָּנָיו
  english_pob_choice: each man may take his wife and his children
  chosen_spanish: cada hombre tome su esposa y sus hijos
  alternatives_spanish:
  - cada uno tome su esposa y sus hijos
  - cada hombre tome su mujer y sus hijos
  lexicon: HALOT
  rationale: «Cada hombre» distribuye el sujeto, y «hijos» sigue el paralelo semítico sin forzar una restricción solo a varones cuando el contexto familiar es general.
- source_word: וְיִנְהֲגוּ וְיֵלֵכוּ
  english_pob_choice: and lead them away and go
  chosen_spanish: y los lleve y se vaya
  alternatives_spanish:
  - y los conduzca y se vaya
  - y los saque y se vaya
  lexicon: HALOT
  rationale: «Llevar» comunica de manera natural la idea de conducir a los familiares al partir. El singular distributivo «cada hombre» permite el cambio a forma singular en español.
theological_decisions:
- issue: Tratamiento de בְלִיַּעַל
  english_pob_reading: worthless
  chosen_spanish_reading: perverso
  alternative_spanish_readings:
  - despreciable
  - indigno
  - sin valor
  rationale: En este contexto funciona como caracterización moral, no como nombre propio. «Perverso» conserva la descalificación ética sin importar asociaciones doctrinales posteriores.
  doctrine_reference: Principio de primacía del sentido original; no introducir lecturas tardías no exigidas por el texto.
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra alta concordancia y solo una revisión menor: la adición de «among/from among» para reflejar mejor el partitivo hebreo. Esta versión española incorpora ese valor con «de entre» y mantiene las demás decisiones principales del trail: carácter despectivo de בְלִיַּעל, causalidad de יַעַן אֲשֶׁר, y la tensión de la cita con «conmigo» en singular.'
  spanish_consistency_notes:
  - Se mantuvo «David» como nombre propio sin transliteración adicional.
  - Se evitó «SEÑOR» porque no aparece el nombre divino en este versículo.
  - El registro es bíblico contemporáneo, con sintaxis natural en español y sin arcaísmos innecesarios.
  - «Botín» se usa de forma uniforme para שָׁלָל en coherencia con el contexto militar.
