revisions:
- from: Y si una prenda[a] tiene en ella una plaga de tzaraat[b], sea una prenda de lana o una prenda de lino,
  to: Y si una prenda tiene en ella una afección de lepra[a], sea una prenda de lana o una prenda de lino,
