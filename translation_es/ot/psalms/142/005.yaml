- from: 'Mira a la derecha y ve: no hay quien me reconozca[a]; se ha perdido el refugio[b] para mí; no hay quien busque mi vida.'
  to: 'Mira a la derecha y ve: no hay quien me reconozca; el refugio se ha perdido de mí[a]; no hay quien busque mi vida[b].'
  rationale: Se ajusta «para mí» a «de mí» para reflejar mejor מִמֶּנִּי y el rastro auditado. Se elimina la nota redundante sobre «me reconozca» y se preserva en nota la alternativa tradicional de נֶפֶשׁ, ya que el inglés auditado la conservó. La redacción resultante sigue siendo comprensible en español y más fiel al hebreo.
