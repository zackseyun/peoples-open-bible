translation:
  language: es
  text: Pero Adoni-bezek huyó[a], y ellos lo persiguieron, lo capturaron y le cortaron los pulgares y los dedos gordos de los pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «los pulgares de sus manos y de sus pies», es decir, sus pulgares y los dedos gordos de los pies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנָס
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - fue puesto en fuga
  - escapó
  lexicon: HALOT
  rationale: נוס en este contexto expresa huida. «Huyó» es natural en español y conserva la fuerza narrativa; «escapó» podría sugerir que logró salir libre, lo que aquí queda matizado por su posterior captura.
- source_word: אֲדֹנִי בֶזֶק
  english_pob_choice: Adoni-bezek
  chosen_spanish: Adoni-bezec
  alternatives_spanish:
  - Adoni-bezek
  - Señor de Bezec
  lexicon: HALOT
  rationale: Se conserva como nombre propio transliterado. En español se ajusta la grafía a una forma más natural y coherente con la ortografía usual de topónimos bíblicos, sin traducir sus componentes como título común.
- source_word: וַיִּרְדְּפוּ אַחֲרָיו
  english_pob_choice: they pursued him
  chosen_spanish: lo persiguieron
  alternatives_spanish:
  - lo siguieron de cerca
  - lo acosaron
  lexicon: HALOT
  rationale: רדף + אחרי expresa persecución. «Lo persiguieron» es la equivalencia directa, sobria y narrativa.
- source_word: וַיֹּאחֲזוּ אֹתוֹ
  english_pob_choice: seized him
  chosen_spanish: lo capturaron
  alternatives_spanish:
  - lo asieron
  - lo prendieron
  lexicon: HALOT
  rationale: אחז es tomar o apoderarse de alguien. En español, «lo capturaron» comunica con claridad una aprehensión efectiva y violenta, coherente con el contexto de la escena.
- source_word: וַיְקַצְּצוּ
  english_pob_choice: cut off
  chosen_spanish: le cortaron
  alternatives_spanish:
  - le amputaron
  - le cercenaron
  lexicon: HALOT
  rationale: קצץ describe cortar o cercenar miembros. «Le cortaron» preserva la sobriedad del hebreo sin añadir un tecnicismo médico innecesario.
- source_word: בְּהֹנוֹת יָדָיו וְרַגְלָיו
  english_pob_choice: thumbs and big toes
  chosen_spanish: los pulgares de las manos y los de los pies
  alternatives_spanish:
  - los pulgares y los dedos gordos de los pies
  - los pulgares y los gordos dedos de los pies
  lexicon: HALOT
  rationale: בֹּהֶן se refiere al pulgar del pie/mano según el miembro nombrado. Como el hebreo dice literalmente «los pulgares de sus manos y sus pies», el español conserva la estructura de manos y pies, aclarando el referente con una forma legible y sin perder la tensión semántica entre literalidad e idiomatización.
translation_notes:
  revision_awareness: El texto inglés auditado no presenta revisiones sustantivas y mantiene alta concordancia con la fuente; la versión española sigue esa misma línea, trasladando el relato de forma directa y con una única nota léxica para el giro corporal hebreo.
  spanish_consistency_notes:
  - Se usa «Adoni-bezec» como forma española coherente de nombre propio, evitando traducirlo como título común.
  - 'Se mantiene una dicción narrativa compacta: «huyó», «lo persiguieron», «lo capturaron», «le cortaron».'
  - La nota [a] preserva la alternativa interpretativa necesaria para el hebreo literal sin sobrecargar el texto principal.
