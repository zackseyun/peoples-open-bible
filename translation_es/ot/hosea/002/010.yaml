revisions:
- from: Pero ella no sabía que era yo quien le daba el grano[a], el mosto y el aceite, y quien multiplicaba para ella la plata y el oro[b], que hicieron para Baal.
  to: Pero ella no sabía que era yo quien le di el grano, el vino nuevo y el aceite[a], y quien le multipliqué la plata y el oro, que ellos hicieron en imagen de Baal[b].
  rationale: Se corrige la lectura principal de la cláusula final para alinearla con la decisión auditada del POB, dejando la alternativa en nota. También se reubican correctamente los marcadores de notas, se mejora la naturalidad y precisión del español con pretéritos, y se cambia «mosto» por «vino nuevo» para mayor claridad y mejor correspondencia con la tríada agrícola profética.
