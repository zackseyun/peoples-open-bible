translation:
  language: es
  text: 'Y cada uno tenía cuatro rostros: el rostro del primero era el rostro del querubín[a], y el rostro del segundo era el rostro de un hombre, y el tercero, el rostro de un león[b], y el cuarto, el rostro de un águila.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ezequiel 1:10 describe el rostro correspondiente como el de un buey; aquí el hebreo dice ‘el querubín’.
    reason: cross_reference
  - marker: b
    text: O ‘buitre’ para ‘águila’; el término hebreo puede referirse en sentido más amplio a un ave grande de presa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַרְבָּעָה פָנִים לְאֶחָד
  english_pob_choice: And each one had four faces
  chosen_spanish: Y cada uno tenía cuatro rostros
  alternatives_spanish:
  - Y cuatro rostros correspondían a cada uno
  - Y había cuatro rostros para cada uno
  lexicon: HALOT
  rationale: El hebreo es una construcción nominal sin verbo; en español conviene explicitarlo con ‘tenía’ para una lectura natural, conservando el sentido distributivo de לְאֶחָד con ‘cada uno’.
- source_word: פְּנֵי הָאֶחָד
  english_pob_choice: the face of the first
  chosen_spanish: el rostro del primero
  alternatives_spanish:
  - el primer rostro
  - el rostro del uno
  lexicon: HALOT
  rationale: En la secuencia del versículo, הָאֶחָד funciona como ordinal. ‘El primero’ refleja mejor esa estructura que una traducción meramente literal de ‘el uno’.
- source_word: הַכְּרוּב
  english_pob_choice: the cherub
  chosen_spanish: el querubín
  alternatives_spanish:
  - un querubín
  - el rostro del querubín
  lexicon: HALOT
  rationale: Se conserva el sustantivo técnico ‘querubín’ para mantener la referencia del texto hebreo, que aquí dice explícitamente ‘el querubín’ y no armoniza con Ezequiel 1:10.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: rostro de hombre
  alternatives_spanish:
  - rostro humano
  - rostro de un hombre
  lexicon: HALOT
  rationale: En esta lista visionaria, אָדָם designa un rostro humano. ‘Rostro de hombre’ sigue bien la forma española establecida y mantiene la fuerza concreta del hebreo.
- source_word: אַרְיֵה
  english_pob_choice: a lion
  chosen_spanish: rostro de león
  alternatives_spanish:
  - rostro leonino
  - rostro de un león
  lexicon: HALOT
  rationale: Designación animal directa; ‘león’ conserva la imagen sin añadir matices no presentes en el texto.
- source_word: נָשֶׁר
  english_pob_choice: an eagle
  chosen_spanish: águila
  alternatives_spanish:
  - ave de rapiña
  - buitre
  lexicon: HALOT
  rationale: ‘Águila’ es la equivalencia más natural y tradicional para la imagen profética. Se mantiene abierta, mediante nota, la posibilidad léxica más amplia de un ave grande de presa.
theological_decisions:
- issue: Diferencia entre ‘querubín’ aquí y el ‘buey’/‘toro’ de Ezequiel 1:10
  english_pob_reading: Translate the text as 'the cherub' without harmonizing it to 'ox.'
  chosen_spanish_reading: Traducir ‘el querubín’ sin armonizarlo con ‘buey’ o ‘toro’
  alternative_spanish_readings:
  - Traducir ‘buey’ para ajustarlo a Ezequiel 1:10
  - Parafrasear como ‘querubín semejante a un toro’
  rationale: El hebreo recibido de este versículo dice explícitamente ‘el querubín’. La traducción debe preservar esa lectura y dejar visible la tensión con el pasaje paralelo, no resolverla por armonización.
  doctrine_reference: Prioridad del texto hebreo recibido; preservar tensiones intertextuales en lugar de suavizarlas.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el auditorio en inglés de POB. No se requieren revisiones adicionales respecto del pasaje base.
  spanish_consistency_notes:
  - Se mantiene ‘querubín’ como término técnico y no se sustituye por vocabulario eclesiástico genérico.
  - Se usa ‘rostro’ de manera uniforme para פָנִים / פְּנֵי.
  - Se conserva ‘águila’ como lectura principal, con la alternativa léxica documentada en nota.
  - Se evita armonizar Ezequiel 10:14 con Ezequiel 1:10 en el cuerpo del texto.
