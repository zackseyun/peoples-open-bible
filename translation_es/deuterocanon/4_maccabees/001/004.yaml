translation:
  language: es
  text: 'pero también se muestra que domina sobre las pasiones que estorban la rectitud[a], como la malicia, y sobre las pasiones que estorban el valor: la ira, el dolor y el miedo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las pasiones que estorban la justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: κυριεύειν
  english_pob_choice: to rule over
  chosen_spanish: domina sobre
  alternatives_spanish:
  - rige sobre
  - tiene dominio sobre
  lexicon: LSJ
  rationale: El infinitivo expresa ejercer dominio o control. En español, «domina sobre» conserva la idea de señorío sin sonar forzado, y encaja con el tono argumentativo del pasaje.
- source_word: ἀναφαίνεται
  english_pob_choice: is shown
  chosen_spanish: se muestra
  alternatives_spanish:
  - aparece
  - queda manifiesto
  lexicon: LSJ
  rationale: El verbo indica que algo llega a hacerse evidente. «Se muestra» reproduce bien la voz impersonal y la evidencia argumentativa del griego.
- source_word: ἐμποδιστικῶν
  english_pob_choice: that hinder
  chosen_spanish: que estorban
  alternatives_spanish:
  - que impiden
  - obstaculizadoras
  lexicon: LSJ
  rationale: El adjetivo describe pasiones que actúan como impedimento. «Que estorban» es natural en español y mantiene la relación funcional con la virtud afectada.
- source_word: παθῶν
  english_pob_choice: passions
  chosen_spanish: pasiones
  alternatives_spanish:
  - sufrimientos
  - emociones
  - afectos
  lexicon: LSJ
  rationale: En este contexto filosófico-moral, πάθη designa impulsos o pasiones, no sufrimientos externos. «Pasiones» es el equivalente más preciso.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/r rectitud
  lexicon: LSJ
  rationale: Aunque el inglés POB privilegia «righteousness», en español «justicia» conserva la amplitud ética del término y, además, sigue la alternativa lexical preservada en la nota inglesa. Aquí se mantiene la tensión entre justicia y rectitud sin borrarla.
- source_word: κακοηθείας
  english_pob_choice: malice
  chosen_spanish: malicia
  alternatives_spanish:
  - mala disposición
  - malignidad
  lexicon: LSJ
  rationale: El sustantivo nombra una mala disposición o mala intención. «Malicia» es conciso, idiomático y fiel al vicio enumerado.
- source_word: ἀνδρείας
  english_pob_choice: courage
  chosen_spanish: valor
  alternatives_spanish:
  - coraje
  - bravura
  - fortaleza
  lexicon: LSJ
  rationale: En la lista de virtudes, ἀνδρεία alude a la valentía o firmeza moral. «Valor» es claro en español y evita un matiz marcadamente genderizado.
- source_word: θυμοῦ
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furor
  - cólera
  lexicon: LSJ
  rationale: Aquí el término aparece entre pasiones que obstaculizan el valor, por lo que el sentido negativo de «ira» es apropiado y solemne.
- source_word: πόνου
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - aflicción
  - pena
  - sufrimiento
  lexicon: LSJ
  rationale: Dentro de la secuencia de pasiones opuestas al valor, «dolor» es la opción más directa y natural para el lector hispanohablante.
- source_word: φόβου
  english_pob_choice: fear
  chosen_spanish: miedo
  alternatives_spanish:
  - temor
  - terror
  lexicon: LSJ
  rationale: El sentido básico es «fear». «Miedo» comunica claramente la emoción mencionada sin intensificarla más de lo que el griego exige.
theological_decisions:
- issue: δικαιοσύνη en una lista de virtudes filosóficas
  english_pob_reading: 'righteousness, with a footnote: Or ''the passions that hinder justice.'''
  chosen_spanish_reading: justicia, con nota alternativa de «rectitud»
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: En español, «justicia» es una traducción natural y mantiene la alternativa que el audit trail inglés preserva. La nota evita borrar la tensión semántica entre la virtud moral general y la noción más jurídica/ética de justicia.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternative justice preserved'
translation_notes:
  revision_awareness: El inglés POB más reciente permanece sin cambios tras revisión; el presente borrador sigue la misma decisión de fondo para δικαιοσύνη, pero en español opta por «justicia» en el texto principal y conserva la alternativa «rectitud» en la nota para reflejar la ambigüedad documentada sin mecanizar el inglés.
  spanish_consistency_notes:
  - Se mantiene el registro moral-filosófico del pasaje con léxico claro y no eclesiástico.
  - «Pasiones» traduce consistentemente πάθη en sentido ético-psicológico.
  - La pareja «justicia/rectitud» preserva la tensión semántica documentada sin diluirla.
  - «Valor» evita importar un matiz de género innecesario para ἀνδρεία.
  - La puntuación española distribuye la enumeración de manera legible y acorde al original.
