translation:
  language: es
  text: Y yo también, mis hermanos y mis muchachos[a], les prestamos[b] dinero y grano. Por favor, dejemos esta carga[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis sirvientes» o «mis ayudantes».
    reason: lexical_alternative
  - marker: b
    text: O «les hacemos préstamos»; el hebreo puede implicar también actuar como acreedor, no solo prestar en sentido neutral.
    reason: lexical_alternative
  - marker: c
    text: O «esta deuda» o «esta exacción»; el hebreo literalmente dice «esta carga».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And I also
  chosen_spanish: Y yo también
  alternatives_spanish:
  - Además yo
  - Asimismo yo
  lexicon: HALOT
  rationale: La combinación añade énfasis y vincula la práctica de Nehemías con lo dicho antes. «Y yo también» conserva la fuerza aditiva de forma natural en español.
- source_word: אַחַי
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis parientes
  - mis compatriotas
  lexicon: HALOT
  rationale: Se mantiene el parentesco literal de «hermanos», que preserva la solidaridad social del hebreo y sigue de cerca la decisión del POB inglés.
- source_word: וּנְעָרַי
  english_pob_choice: my young men
  chosen_spanish: mis jóvenes
  alternatives_spanish:
  - mis sirvientes
  - mis ayudantes
  lexicon: HALOT
  rationale: «Jóvenes» conserva el valor léxico básico de נְעָרִים sin decidir de antemano si se trata de edad, condición doméstica o cortejo. En español es natural y deja abierta la alternativa documentada.
- source_word: נֹשִׁים בָּהֶם
  english_pob_choice: are lending them
  chosen_spanish: les prestamos
  alternatives_spanish:
  - les hacemos préstamos
  - somos acreedores de ellos
  lexicon: HALOT
  rationale: El verbo hebreo puede significar prestar o actuar como acreedor. Dado el contexto de presión económica, «les prestamos» conserva la relación financiera sin forzar la lectura más negativa en el texto principal; la tensión se mantiene para la nota textual/lexical.
- source_word: כֶּסֶף וְדָגָן
  english_pob_choice: money and grain
  chosen_spanish: dinero y grano
  alternatives_spanish:
  - plata y grano
  - dinero y cereal
  lexicon: HALOT
  rationale: «Dinero» expresa con claridad el valor económico de כֶּסֶף en este contexto de préstamos; «grano» traduce directamente דָגָן y funciona bien en español actual.
- source_word: נַעַזְבָה נָּא
  english_pob_choice: Please, let us stop
  chosen_spanish: Por favor, dejemos
  alternatives_spanish:
  - Por favor, abandonemos
  - Por favor, cesemos
  lexicon: HALOT
  rationale: 'La forma cohortativa con נָא expresa exhortación. «Dejemos» comunica el llamado a poner fin a la práctica. En español, el verbo necesita un complemento implícito que el contexto aporta: esta carga/práctica.'
- source_word: הַמַּשָּׁא הַזֶּה
  english_pob_choice: this burden
  chosen_spanish: esta carga
  alternatives_spanish:
  - esta opresión
  - esta deuda
  lexicon: HALOT
  rationale: «Carga» mantiene la metáfora literal de מַשָּׂא y su sentido de peso opresivo. «Deuda» o «opresión» explicitan la situación, pero «carga» es más cercano al hebreo y suficientemente claro en contexto.
theological_decisions:
- issue: Cómo reflejar la relación económica sin suavizarla indebidamente
  english_pob_reading: are lending them money and grain
  chosen_spanish_reading: les prestamos dinero y grano
  alternative_spanish_readings:
  - les hacemos préstamos de dinero y grano
  - somos acreedores de ellos
  rationale: 'El hebreo admite una relación de préstamo con potencial matiz de acreedor. La redacción española conserva la ambigüedad principal: no la transforma en una denuncia explícita, pero tampoco oculta que el contexto es de carga económica. La frase siguiente («dejemos esta carga») ayuda a leer la situación como opresiva sin añadir más de lo que dice el verso.'
  doctrine_reference: Justicia social y trato económico íntegro; el texto denuncia una carga financiera real sin expandirla doctrinalmente.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés del POB y no se detectaron revisiones aplicadas; la redacción española busca mantener la misma tensión léxica documentada (especialmente en נֹשִׁים y מַשָּׂא) sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se usa «dinero» para כֶּסֶף por claridad contemporánea, manteniendo el paralelismo con «grano».
  - Se usa «carga» como equivalente principal de מַשָּׂא para conservar la metáfora física y social.
  - «Jóvenes» se eligió como forma amplia y neutral para נְעָרִים, dejando abierta la lectura de sirvientes/ayudantes en nota.
  - Se preserva el apelativo directo y plural «mis hermanos» para אַחַי, coherente con el tono solidario del pasaje.
