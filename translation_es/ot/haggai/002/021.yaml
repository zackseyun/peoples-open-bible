translation:
  language: es
  text: 'Habla a Zorobabel, gobernador de Judá, diciendo: Yo sacudo los cielos y la tierra.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: אֱמֹר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: El imperativo de אמר introduce un mandato profético. En español, «Habla a...» conserva mejor el encargo directo y suena natural antes del destinatario explícito. «Di» también es posible, pero «habla» comunica con mayor claridad la forma de proclamación.
- source_word: זְרֻבָּבֶל
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubbabel
  lexicon: Nombre propio bíblico
  rationale: En español bíblico tradicional y readable, «Zorobabel» es la forma asentada del nombre. Mantiene identificación inmediata para el lector hispanohablante sin alterar la referencia al personaje.
- source_word: פַּחַת יְהוּדָה
  english_pob_choice: governor of Judah
  chosen_spanish: gobernador de Judá
  alternatives_spanish:
  - prefecto de Judá
  - gobernador de Judea
  lexicon: HALOT
  rationale: פַּחַת designa una autoridad provincial bajo administración imperial; «gobernador» es la equivalencia moderna más clara y natural. «Prefecto» es más técnico pero menos idiomático; «Judea» desplaza el marco del hebreo de esta unidad.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: El infinitivo quotativo se vierte de manera directa con «diciendo», preservando la estructura introductoria del discurso sin recargar el español.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  - yo
  lexicon: Hebrew discourse pronoun
  rationale: El pronombre explícito mantiene el énfasis de la declaración divina. En español, «Yo» antepuesto reproduce esa prominencia.
- source_word: מַרְעִישׁ
  english_pob_choice: I am shaking
  chosen_spanish: estoy sacudiendo
  alternatives_spanish:
  - sacudiré
  - voy a sacudir
  lexicon: HALOT
  rationale: El participio hifil de רעשׁ puede expresar acción en curso o valor inminente en el discurso profético. Dado el estado del audit trail inglés final, «estoy sacudiendo» conserva el aspecto presente/progresivo sin introducir una futuraidad no explícita en el hebreo.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo se traduce mejor como «los cielos», que preserva el alcance cósmico y la forma plural. «El cielo» reduce ese matiz y «los cielos» es más fiel al paralelo con la tierra.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En paralelo con «los cielos», «la tierra» comunica el campo total de la acción. «El mundo» sería más interpretativo; «la tierra» mantiene la correspondencia léxica con el hebreo.
theological_decisions:
- issue: Alcance de la sacudida
  english_pob_reading: cosmic judgment language affecting the whole created order
  chosen_spanish_reading: lenguaje de sacudida cósmica que abarca todo el orden creado
  alternative_spanish_readings:
  - principalmente convulsión política entre naciones
  - imagen limitada al ámbito histórico inmediato
  rationale: La pareja «los cielos y la tierra» en español conserva el alcance cósmico del hebreo y no restringe indebidamente la imagen a un solo nivel histórico. El contexto posterior puede concretar aplicaciones políticas, pero aquí la redacción debe mantener la amplitud original.
  doctrine_reference: Lenguaje profético de juicio y soberanía divina sobre la creación
- issue: Valor verbal de מַרְעִישׁ
  english_pob_reading: I am shaking rather than an explicit future
  chosen_spanish_reading: estoy sacudiendo
  alternative_spanish_readings:
  - sacudiré
  - voy a sacudir
  - estoy por sacudir
  rationale: El auditoría inglesa revisó la futuraidad explícita y dejó el presente progresivo. En español, «estoy sacudiendo» refleja mejor el participio sin añadir una marca futura que el hebreo no formula de manera directa.
  doctrine_reference: Aspecto verbal profético y traducción del participio
translation_notes:
  revision_awareness: El audit trail inglés pasó de «am about to shake» a «am shaking» para reflejar mejor el participio hebreo. La versión española sigue esa decisión y evita introducir una futuraidad explícita no marcada en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; aquí no ocurre.
  - «Judá» se conserva como nombre territorial bíblico estándar en español.
  - La elección de «cielos» en plural preserva el paralelismo con «tierra» y evita reducir el alcance cósmico.
