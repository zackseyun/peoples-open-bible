    rationale: El inglés final dice «in the interpretation of his heart», y el propio registro lexical da «en la interpretación de su corazón» como alternativa preferible. «Desde» fuerza una idea de procedencia ya expresada por el verbo y empeora la naturalidad.
  - severity: medium
