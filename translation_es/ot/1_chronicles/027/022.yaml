lexical_decisions:
- source_word: לְ/דָן
  english_pob_choice: For Dan
  chosen_spanish: Para Dan
  alternatives_spanish:
  - De Dan
  - Para la tribu de Dan
  lexicon: HALOT
  rationale: El prefijo ל en este encabezado administrativo expresa asignación o pertenencia funcional. «Para Dan» conserva la idea de designación para esa tribu sin forzar una formulación más pesada.
- source_word: עֲזַרְאֵל
  english_pob_choice: Azarel
  chosen_spanish: Azarel
  alternatives_spanish:
  - Azareel
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera directa y reconocible en español bíblico.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La construcción indica filiación; «hijo de» es la equivalencia natural y transparente en este tipo de registro genealógico/administrativo.
- source_word: יְרֹחָם
  english_pob_choice: Jeroham
  chosen_spanish: Jeroham
  alternatives_spanish:
  - Yeroham
  lexicon: HALOT
  rationale: Nombre propio transliterado según uso bíblico común, manteniendo cercanía con la forma hebrea.
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estos son
  lexicon: HALOT
  rationale: El pronombre deíctico plural introduce una conclusión resumida. En español, «Estos eran» fluye de manera natural en una cláusula copulativa implícita.
- source_word: שָׂרֵי
  english_pob_choice: leaders
  chosen_spanish: jefes
  alternatives_spanish:
  - líderes
  - jefes tribales
  - oficiales
  lexicon: HALOT
  rationale: En este contexto administrativo, «jefes» comunica el rol de autoridad con un tono bíblico claro y sin imponer una traducción demasiado moderna o burocrática.
- source_word: שִׁבְטֵי
  english_pob_choice: of the tribes of
  chosen_spanish: de las tribus de
  alternatives_spanish:
  - de los clanes de
  lexicon: HALOT
  rationale: Se mantiene el sustantivo «tribus» por ser la correspondencia directa del hebreo constructo y por conservar la estructura del encabezado.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio nacional estándar, sin necesidad de adaptación.
