  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: imperativo de selección, matiz reflexivo, varones, cualidades de sabiduría y discernimiento, procedencia tribal y nombramiento posterior por Moisés. Sin embargo, la colocación de las notas no sigue el rastro de auditoría inglés: la nota [a] debe anclarse en ''bien conocidos/reconocidos'', no en ''hombres''; y la nota sobre ''heads'' debe corresponder a ''jefes''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'discernientes' suena poco natural en español bíblico general. 'Entendidos' o 'perspicaces' sería más idiomático; en este contexto 'entendidos' mantiene bien la idea de capacidad de juicio. También 'de entre sus tribus' suena más natural y precisa que 'de sus tribus' para una selección de candidatos.
  glossary_alignment: No hay conflicto con la terminología teológica global. Se preserva correctamente 'hombres' para אֲנָשִׁים. La decisión de no calcar ראשׁ como 'cabezas' puede mantenerse en español con nota literal, pero la nota debe anclarse en 'jefes'.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a palabras equivocadas.
    rationale: En el inglés, la nota [a] explica וִידֻעִים ('well-known/known/recognized'), pero en el borrador español [a] está puesta en 'hombres'. La nota [b] explica ראשׁ ('heads/leaders'), pero en el borrador [b] está puesta en 'bien conocidos'.
  - severity: medium
    issue: '''discernientes'' suena forzado en español.'
    rationale: Aunque semánticamente posible, no es la opción más natural ni más eclesialmente legible. 'Entendidos' transmite mejor la idea de comprensión perceptiva en un registro digno.
  - severity: low
    issue: '''de sus tribus'' podría precisarse idiomáticamente.'
    rationale: '''De entre sus tribus'' expresa con mayor claridad que los hombres son seleccionados desde dentro de las tribus, en línea con el valor contextual señalado en la auditoría inglesa.'
  revised_spanish_text: Elijan para ustedes hombres sabios, entendidos y reconocidos[a] de entre sus tribus, y yo los nombraré como sus jefes[b].
  revised_footnotes:
  - marker: a
    text: O 'conocidos' o 'bien conocidos'; el hebreo puede poner el acento en hombres de reputación establecida entre las tribus.
    reason: lexical_alternative
  - marker: b
    text: O 'líderes'. Literalmente, 'cabezas'.
    reason: lexical_alternative
