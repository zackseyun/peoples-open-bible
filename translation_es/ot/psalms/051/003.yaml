  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Dios', 'misericordias', 'transgresiones' y 'borra' están alineados. Para חָנֵּנִי conviene evitar 'misericordia' en el texto principal para no colapsar los términos paralelos; 'favor' o 'gracia' funcionan mejor que 'clemente'.
