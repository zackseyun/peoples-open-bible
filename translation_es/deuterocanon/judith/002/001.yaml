translation:
  language: es
  text: Y en el año decimoctavo, el día veintidós del primer mes, vino una palabra[a] en la casa[b] de Nabucodonosor, rey de los asirios, para tomar venganza de todo el territorio[c], tal como había hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se decidió un asunto' o 'se emitió un decreto'. El griego dice más literalmente 'llegó a haber una palabra', sin precisar si se trata de un decreto, una resolución o un anuncio.
    reason: alternative_reading
  - marker: b
    text: O 'en el palacio/corte de Nabucodonosor'. El griego dice 'casa', que también puede referirse a una residencia real o a la corte.
    reason: lexical_alternative
  - marker: c
    text: O 'toda la tierra'. El griego γῆ puede significar 'tierra' o 'territorio'; aquí el contexto favorece un sentido territorial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ ἔτει τῷ ὀκτωκαιδεκάτῳ
  english_pob_choice: in the eighteenth year
  chosen_spanish: en el año dieciocho
  alternatives_spanish:
  - durante el año dieciocho
  - en el decimoctavo año
  lexicon: LSJ
  rationale: La construcción temporal se conserva de manera directa y natural en español. 'En el año dieciocho' mantiene el valor cronológico del griego sin forzar un orden más literal que suene menos idiomático.
- source_word: δευτέρᾳ καὶ εἰκάδι
  english_pob_choice: on the twenty-second day
  chosen_spanish: el día veintidós
  alternatives_spanish:
  - el segundo y vigésimo día
  - el día veintidós del mes
  lexicon: LSJ
  rationale: La expresión griega designa el día veintidós del mes. 'El día veintidós' es claro y fiel; el contexto del mes ya queda explícito con 'del primer mes'.
- source_word: τοῦ πρώτου μηνός
  english_pob_choice: of the first month
  chosen_spanish: del primer mes
  alternatives_spanish:
  - en el primer mes
  lexicon: LSJ
  rationale: El genitivo se refleja de forma natural con 'del primer mes'. Mantiene la relación de la fecha sin agregar matiz interpretativo.
- source_word: ἐγένετο λόγος
  english_pob_choice: a word came
  chosen_spanish: vino una palabra
  alternatives_spanish:
  - llegó una palabra
  - se pronunció una palabra
  - vino un decreto
  lexicon: LSJ
  rationale: Se conserva la imagen verbal del griego, que literalmente dice que 'vino' una 'palabra'. En español, 'vino una palabra' reproduce la formulación con el menor grado posible de interpretación adicional, dejando abierta la posible fuerza de decisión, anuncio o resolución.
- source_word: ἐν οἴκῳ Ναβουχοδονοσὸρ
  english_pob_choice: in the house of Nebuchodonosor
  chosen_spanish: en la casa de Nabucodonosor
  alternatives_spanish:
  - en el palacio de Nabucodonosor
  - en la corte de Nabucodonosor
  lexicon: LSJ
  rationale: οἶκος se rinde por 'casa' por ser el equivalente más cercano al texto. 'Palacio' o 'corte' expresan una posible implicación, pero el griego no obliga a esa especificación.
- source_word: βασιλέως Ἀσσυρίων
  english_pob_choice: king of the Assyrians
  chosen_spanish: rey de los asirios
  alternatives_spanish:
  - rey asirio
  lexicon: LSJ
  rationale: La frase se traduce de manera directa para conservar la estructura de título y el genitivo de pertenencia. 'Rey de los asirios' es transparente y fiel.
- source_word: ἐκδικῆσαι
  english_pob_choice: to take vengeance on
  chosen_spanish: para tomar venganza sobre
  alternatives_spanish:
  - para vengarse de
  - para ejercer venganza sobre
  lexicon: LSJ
  rationale: Se mantiene el sentido de retribución de ἐκδικῆσαι sin añadir un reflexivo que el griego no expresa explícitamente. 'Tomar venganza sobre' conserva la fuerza judicial/retributiva del verbo.
- source_word: πᾶσαν τὴν γῆν
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la región
  - todo el país
  lexicon: LSJ
  rationale: Aunque el inglés POB opta por 'land' por el contexto territorial, en español 'tierra' reproduce con naturalidad la amplitud de γῆ y conserva la ambigüedad entre territorio y tierra/país sin universalizar indebidamente.
- source_word: καθὼς ἐλάλησεν
  english_pob_choice: just as he had spoken
  chosen_spanish: tal como había hablado
  alternatives_spanish:
  - como había hablado
  - justo como había dicho
  lexicon: LSJ
  rationale: La cláusula final mantiene la referencia a lo ya pronunciado. 'Tal como había hablado' es fiel al verbo griego y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: 'ἐγένετο λόγος: si debe especificarse como decreto, palabra o resolución'
  english_pob_reading: a word came
  chosen_spanish_reading: vino una palabra
  alternative_spanish_readings:
  - vino un decreto
  - se emitió una orden
  - se decidió un asunto
  rationale: El griego es deliberadamente menos específico que 'decreto'. La versión española conserva esa apertura y no adelanta la clase exacta de acto de gobierno o de pronunciación.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: 'πᾶσαν τὴν γῆν: si debe leerse como tierra/territorio o como mundo'
  english_pob_reading: all the land
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - toda la tierra habitada
  - todo el territorio
  - todo el mundo
  rationale: El contexto narrativo sugiere un ámbito territorial, pero 'tierra' en español conserva una amplitud que puede abarcar ese sentido sin forzar una restricción geográfica artificial ni convertirlo en una afirmación cosmológica.
  doctrine_reference: Translation philosophy §1
- issue: 'ἐν οἴκῳ: si debe reflejarse como ''casa'' o elevarse a ''palacio/corte'''
  english_pob_reading: in the house of Nebuchodonosor
  chosen_spanish_reading: en la casa de Nabucodonosor
  alternative_spanish_readings:
  - en el palacio de Nabucodonosor
  - en la corte de Nabucodonosor
  rationale: La forma 'casa' respeta el sustantivo del texto fuente. Las alternativas introducen una interpretación social o arquitectónica que el griego no exige.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que corrigió 'to avenge himself on' a 'to take vengeance on' para no añadir un reflexivo inexistente en el griego. Por eso el español usa 'para tomar venganza sobre' y evita cualquier forma reflexiva. También se respetó la tensión lexical de γῆ y de οἶκος, manteniendo notas alternativas en lugar de cerrar prematuramente el sentido.
  spanish_consistency_notes:
  - Se usa 'Nabucodonosor' como forma española estable del nombre propio.
  - Se mantiene 'asirios' para βασιλέως Ἀσσυρίων, en línea con un título étnico-político directo.
  - Se prefirió 'tierra' y no 'mundo' para no sobregeneralizar γῆ.
  - La puntuación mantiene una sola oración larga, acorde con el período narrativo del griego.
