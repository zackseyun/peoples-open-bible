translation:
  language: es
  text: Pero Onán sabía que la descendencia no sería suya[a]; así que, cada vez que se unía a la mujer de su hermano, lo derramaba en el suelo[b], para no dar descendencia a su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “simiente” en ambas cláusulas. Aquí se refiere al heredero o a la descendencia en el contexto del levirato.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “lo derramaba en tierra”. El hebreo dice literalmente que “arruinaba/destruía [eso] hacia tierra”, describiendo el acto de Onán para impedir la concepción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּדַע
  english_pob_choice: knew
  chosen_spanish: sabía
  alternatives_spanish:
  - conocía
  - entendía
  lexicon: HALOT
  rationale: En narrativa, ידע expresa conocimiento cierto o consciente. "Sabía" es natural en español y conserva la afirmación factual sin añadir matices innecesarios.
- source_word: הַזָּרַע
  english_pob_choice: the offspring
  chosen_spanish: el descendiente
  alternatives_spanish:
  - la descendencia
  - la simiente
  - la semilla
  lexicon: HALOT
  rationale: En el contexto de levirato, זרע se refiere al heredero/prole esperada, no a una semilla literal. "El descendiente" hace visible el valor de heredero, aunque "descendencia" se mantiene como alternativa en la cláusula final.
- source_word: לֹּא ל֖וֹ יִהְיֶה הַזָּרַע
  english_pob_choice: the offspring would not be his
  chosen_spanish: el descendiente no sería suyo
  alternatives_spanish:
  - la descendencia no sería suya
  - la semilla no sería suya
  - el hijo no sería contado como suyo
  lexicon: HALOT
  rationale: La idea central es posesión/atribución legal del heredero. "Sería suyo" comunica que el hijo resultante no le pertenecería a Onán, sino al hermano fallecido.
- source_word: וְהָיָה אִם־בָּא
  english_pob_choice: so whenever he went in
  chosen_spanish: así que, cada vez que se llegaba
  alternatives_spanish:
  - y cuando se llegaba
  - así que, siempre que entraba
  lexicon: HALOT
  rationale: La construcción hebrea expresa acción repetida en pasado. "Cada vez que se llegaba" conserva el valor iterativo y el eufemismo bíblico de la relación sexual.
- source_word: בָּא אֶל אֵשֶׁת אָחִיו
  english_pob_choice: went in to his brother’s wife
  chosen_spanish: se llegaba a la mujer de su hermano
  alternatives_spanish:
  - se unía a la mujer de su hermano
  - tenía relaciones con la mujer de su hermano
  - entraba a la mujer de su hermano
  lexicon: HALOT
  rationale: '"Llegarse a" mantiene el eufemismo bíblico en español y resulta más idiomático que una traducción literal pesada; conserva la referencia sexual sin explicitar más de lo que el hebreo exige.'
- source_word: וְשִׁחֵת אַרְצָה
  english_pob_choice: he spilled it on the ground
  chosen_spanish: derramaba el semen en tierra
  alternatives_spanish:
  - lo derramaba en tierra
  - lo vertía en el suelo
  - lo desperdiciaba en tierra
  lexicon: HALOT
  rationale: El hebreo dice literalmente que "arruinó/destrozó hacia tierra", una descripción eufemística de impedir la concepción. Como el contexto hace claro que se trata de semen, "derramaba el semen en tierra" mantiene la fuerza semántica y la claridad en español, sin sobretraducir el verbo más allá del acto descrito.
- source_word: אַרְצָה
  english_pob_choice: on the ground
  chosen_spanish: en tierra
  alternatives_spanish:
  - al suelo
  - sobre el suelo
  - a tierra
  lexicon: HALOT
  rationale: La forma direccional con sufijo local se expresa de modo natural como "en tierra"; conserva el sentido espacial del hebreo.
- source_word: לְבִלְתִּי נְתָן זֶרַע לְאָחִיו
  english_pob_choice: so as not to give offspring to his brother
  chosen_spanish: para no dar descendencia a su hermano
  alternatives_spanish:
  - para no dar simiente a su hermano
  - para no darle descendencia a su hermano
  - a fin de no proporcionar descendencia a su hermano
  lexicon: HALOT
  rationale: La cláusula final expresa propósito. "Dar descendencia" comunica adecuadamente la función levirática de producir un heredero para el hermano fallecido; es preferible a "simiente" en español por claridad y registro.
theological_decisions:
- issue: 'Doble valor de זרע: heredero legal y acto físico evitado'
  english_pob_reading: Render the first זרע and the final זרע as 'offspring' in the main text, while translating וְשִׁחֵת אַרְצָה in a way that clearly indicates he prevented conception by wasting semen.
  chosen_spanish_reading: Traducir la primera ocurrencia de זרע con un término de herencia familiar ("descendiente") y la última con "descendencia", mientras se explicita en la acción que el acto físico consistió en derramar el semen en tierra.
  alternative_spanish_readings:
  - Usar "simiente" en todo el versículo
  - Usar "hijo" en ambos lugares
  - Explicitar solo "lo derramaba en tierra"
  rationale: 'El versículo opera en dos niveles: el legal-familiar del heredero y el físico del acto sexual evitado. En español, un término de herencia evita que el lector entienda la primera ocurrencia como semen, mientras la explicitación de "semen" en la acción aclara el mecanismo sin introducir una interpretación ajena al texto.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió "wasted it on the ground" por "spilled it on the ground" para hacer más directa y natural la acción; esta redacción española sigue ese ajuste con "derramaba el semen en tierra", manteniendo tono formal y claridad contextual. También se preservó la distinción levirática de זרע mediante vocabulario de descendencia en lugar de una transliteración o de "semilla" en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita "Cristo" porque no hay terminología mesiánica en el pasaje.
  - '"Se llegaba" conserva el eufemismo bíblico sin rusticidad ni explicitación innecesaria.'
  - '"Descendiente/descendencia" preserva la tensión legal-familiar del texto hebreo.'
