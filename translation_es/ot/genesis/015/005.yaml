translation:
  language: es
  text: 'Entonces lo llevó afuera y dijo[a]: «Por favor, mira hacia los cielos y cuenta las estrellas, si puedes contarlas». Entonces le dijo: «Así será tu descendencia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu simiente»; el sustantivo hebreo es singular en la forma, pero colectivo en el sentido, y puede referirse a la descendencia en conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא
  english_pob_choice: brought ... outside
  chosen_spanish: lo sacó afuera
  alternatives_spanish:
  - lo llevó afuera
  - lo sacó al exterior
  lexicon: HALOT
  rationale: 'El hifil de יצא es causativo: hizo salir a alguien. «Lo sacó afuera» conserva esa causalidad con español natural y directo.'
- source_word: הַחוּצָה
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - al exterior
  lexicon: HALOT
  rationale: La forma direccional indica movimiento hacia afuera. «Afuera» expresa bien la orientación espacial sin rigidez.
- source_word: הַבֶּט נָא
  english_pob_choice: Please look
  chosen_spanish: Por favor, mira
  alternatives_spanish:
  - Mira, por favor
  - Mira ahora
  - Te ruego, mira
  lexicon: HALOT
  rationale: הבט es un imperativo de «mirar»; נא suaviza o pide con cortesía. «Por favor» comunica ese matiz en español contemporáneo.
- source_word: הַשָּׁמַיְמָה
  english_pob_choice: toward the heavens
  chosen_spanish: hacia los cielos
  alternatives_spanish:
  - hacia el cielo
  - hacia los cielos
  - al cielo
  lexicon: HALOT
  rationale: El sufijo direccional requiere una orientación hacia arriba. «Los cielos» preserva mejor el plural hebreo y el registro bíblico que «el cielo».
- source_word: וּסְפֹר
  english_pob_choice: and count
  chosen_spanish: y cuenta
  alternatives_spanish:
  - y enumera
  - y numera
  lexicon: HALOT
  rationale: ספר aquí significa contar/enumerar. «Cuenta» es el equivalente claro y natural en español.
- source_word: הַכּוֹכָבִים
  english_pob_choice: the stars
  chosen_spanish: las estrellas
  alternatives_spanish:
  - los astros
  - las constelaciones
  lexicon: HALOT
  rationale: Equivalente léxico directo y preciso.
- source_word: אִם תּוּכַל לִסְפֹּר אֹתָם
  english_pob_choice: if you are able to count them
  chosen_spanish: si puedes contarlas
  alternatives_spanish:
  - si eres capaz de contarlas
  - si logras contarlas
  lexicon: HALOT
  rationale: La cláusula expresa capacidad. «Si puedes contarlas» es fiel, natural y conserva el sentido condicional de habilidad.
- source_word: כֹּה יִהְיֶה
  english_pob_choice: So shall ... be
  chosen_spanish: Así será
  alternatives_spanish:
  - De este modo será
  - Así va a ser
  lexicon: HALOT
  rationale: La fórmula comparativa/resultativa hebrea se refleja con una construcción solemne y idiomática en español.
- source_word: זַרְעֶךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus descendientes
  - tu prole
  lexicon: HALOT
  rationale: זרע es singular en forma pero colectivo en sentido. «Descendencia» conserva el valor colectivo sin forzar el literalismo de «semilla/simiente» ni resolver demasiado la pluralidad.
theological_decisions:
- issue: Ambigüedad colectiva de זַרְעֶךָ en la promesa a Abram
  english_pob_reading: your offspring
  chosen_spanish_reading: tu descendencia
  alternative_spanish_readings:
  - tu simiente
  - tus descendientes
  rationale: 'Se preserva la tensión del hebreo: un sustantivo singular con sentido colectivo. «Tu descendencia» mantiene esa amplitud y evita cerrar la lectura hacia un plural explícito que el hebreo no exige.'
  doctrine_reference: Preservar tensión léxica documentada; no resolver prematuramente un término promesa-clave.
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente sin cambios del expediente inglés: el texto permanece estable y no hay revisiones aplicadas que alteren esta sección. Se conservó la nota lexical sobre זַרְעֶךָ por su importancia para la promesa abrahámica.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del proyecto solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se prefirió «descendencia» para זרע por claridad natural en español, conservando la referencia colectiva.
  - El imperativo singular de segunda persona se expresa de modo directo con «mira» y «cuenta», acorde con el hebreo.
