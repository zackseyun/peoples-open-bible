translation:
  language: es
  text: 'Y después de recibir una copa[a] y dar gracias, dijo: «Tomen esto y repártanlo entre ustedes[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la copa». El griego dice simplemente «una copa» sin artículo, aunque el contexto de la comida puede sugerir una copa específica.
    reason: lexical_alternative
  - marker: b
    text: O «divídanlo entre ustedes». El verbo puede significar «dividir» o «repartir/distribuir» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεξάμενος
  english_pob_choice: after receiving
  chosen_spanish: después de recibir
  alternatives_spanish:
  - habiendo recibido
  - al recibir
  lexicon: BDAG
  rationale: El participio aoristo medio marca una acción anterior a la del verbo principal. «Después de recibir» conserva esa secuencia en español de manera natural y sin sobrecargar el estilo.
- source_word: ποτήριον
  english_pob_choice: a cup
  chosen_spanish: una copa
  alternatives_spanish:
  - el cáliz
  - una copa
  lexicon: BDAG
  rationale: El griego carece de artículo; por eso se mantiene el valor anartro con «una copa». Se evita «el cáliz», que introduce un registro litúrgico más específico que el texto no exige.
- source_word: εὐχαριστήσας
  english_pob_choice: giving thanks
  chosen_spanish: dar gracias
  alternatives_spanish:
  - habiendo dado gracias
  - dando gracias
  lexicon: BDAG
  rationale: El participio expresa acción concomitante o anterior de acción de gracias. «Dar gracias» es idiomático en español y preserva el sentido verbal sin importar terminología sacramental posterior.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dijo
  - expresó
  lexicon: BDAG
  rationale: El griego simplemente dice «dijo»; no se añade el destinatario en el texto principal porque no está explícito. La puntuación ya hace claro que habla a los presentes.
- source_word: Λάβετε
  english_pob_choice: Take
  chosen_spanish: Tomen
  alternatives_spanish:
  - Reciban
  - Tomen ustedes
  lexicon: BDAG
  rationale: Imperativo plural de λαμβάνω. «Tomen» es el equivalente más natural para la acción inmediata en contexto de mesa.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta copa
  - esto mismo
  lexicon: BDAG
  rationale: El demostrativo neutro se conserva como «esto», sin repetir interpretativamente «copa» en el cuerpo principal. Eso respeta la concisión del griego.
- source_word: διαμερίσατε
  english_pob_choice: divide
  chosen_spanish: repártanlo
  alternatives_spanish:
  - divídanlo
  - distribúyanlo
  lexicon: BDAG
  rationale: El verbo puede significar dividir o distribuir. En español, «repartanlo»/«repártanlo» comunica mejor la acción de compartir en un grupo que «dividan», que puede sonar más abstracto o violento.
- source_word: εἰς ἑαυτούς
  english_pob_choice: among yourselves
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - unos a otros
  - entre vosotros
  lexicon: BDAG
  rationale: La frase recíproca se expresa de forma natural con «entre ustedes». Mantiene la idea de distribución mutua sin sugerir posesión individual.
theological_decisions:
- issue: Si traducir ποτήριον y εὐχαριστήσας con lenguaje eucarístico/litúrgico
  english_pob_reading: 'Use ordinary narrative language: ''a cup'' and ''giving thanks'''
  chosen_spanish_reading: 'Usar lenguaje narrativo ordinario: «una copa» y «dar gracias»'
  alternative_spanish_readings:
  - «el cáliz» y «bendijo»
  - «la copa» y «eucaristió»
  rationale: El versículo narra una acción de Jesús en la mesa sin introducir terminología sacramental posterior que el griego no exige. «Dar gracias» conserva la acción de agradecimiento sin sobrerinterpretación doctrinal.
  doctrine_reference: 'Principio POB: primacía del original; no introducir formulaciones doctrinales no explícitas en el texto.'
- issue: Cómo reflejar la reciprocidad de διαμερίσατε εἰς ἑαυτούς
  english_pob_reading: divide it among yourselves
  chosen_spanish_reading: repártanlo entre ustedes
  alternative_spanish_readings:
  - divídanlo entre ustedes
  - compártanlo entre ustedes
  rationale: La acción es distributiva y recíproca. «Repártanlo» mantiene ese valor sin oscurecer la relación entre los discípulos ni convertir el mandato en una mera partición matemática.
  doctrine_reference: Principio de claridad narrativa sin perder la fuerza verbal del imperativo.
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios requeridos; se mantiene la lectura narrativa sobria y la decisión de no convertir el enunciado en lenguaje litúrgico técnico.
  spanish_consistency_notes:
  - Se conserva la distinción entre la copa mencionada y la acción de dar gracias, sin añadir vocabulario eucarístico.
  - Se opta por un imperativo plural natural en español, coherente con el plural griego.
  - La nota a evita fijar interpretativamente el sustantivo como una copa específica, en línea con el anartro griego.
  - La nota b preserva la alternativa de traducción verbal documentada por el audit trail inglés.
