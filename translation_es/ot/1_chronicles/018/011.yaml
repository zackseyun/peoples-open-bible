translation:
  language: es
  text: 'El rey David también dedicó estas cosas[a] a Yahvé, junto con la plata y el oro que había tomado[b] de todas las naciones: de Edom, de Moab, de los amonitas[c], de los filisteos y de Amalec.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los»; el pronombre se refiere a los objetos de bronce mencionados en el versículo anterior.
    reason: cross_reference
  - marker: b
    text: O «se había llevado»; el verbo hebreo puede significar «levantar/llevar», aquí con el sentido de tomar botín o tributo de naciones conquistadas.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «los hijos de Amón», es decir, los amonitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: HALOT
  rationale: Expresa la continuidad con el versículo anterior de manera natural en español, manteniendo la fuerza aditiva de גַּם.
- source_word: אֹתָם
  english_pob_choice: these
  chosen_spanish: esto
  alternatives_spanish:
  - los
  - estas cosas
  lexicon: HALOT
  rationale: El pronombre retoma los objetos de bronce mencionados en el versículo anterior; en español, ‘esto’ permite una referencia anafórica natural sin sobrecargar el texto. La nota aclara el referente.
- source_word: הִקְדִּישׁ
  english_pob_choice: dedicated
  chosen_spanish: dedicó
  alternatives_spanish:
  - consagró
  - apartó como santo
  lexicon: HALOT
  rationale: En contexto de ofrenda/tesoro del templo, ‘dedicó’ comunica el acto de separar algo para Yahvé con claridad y sin añadir solemnidad no exigida por el hebreo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al SEÑOR
  lexicon: DOCTRINE.md contested term YHWH
  rationale: Se conserva el nombre divino en forma directa según el criterio del proyecto; ‘a Yahvé’ refleja adecuadamente la dirección de la dedicación.
- source_word: עִם
  english_pob_choice: along with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - además de
  lexicon: HALOT
  rationale: Marca que la plata y el oro fueron incluidos en la misma dedicación junto con los objetos previamente mencionados.
- source_word: הַכֶּסֶף וְהַזָּהָב
  english_pob_choice: the silver and the gold
  chosen_spanish: la plata y el oro
  alternatives_spanish:
  - plata y oro
  - la plata y el oro
  lexicon: HALOT
  rationale: Se conservan los artículos definidos, que en español dan el sentido de inventario o botín específico presentado en el texto.
- source_word: אֲשֶׁר נָשָׂא
  english_pob_choice: that he had taken
  chosen_spanish: que había tomado
  alternatives_spanish:
  - que había llevado
  - que había llevado consigo
  lexicon: HALOT
  rationale: El verbo נשא aquí expresa el haber tomado/obtenido como botín o tributo; ‘había tomado’ sigue el sentido revisado del POB en inglés y evita una paráfrasis más fuerte.
- source_word: מִכָּל הַגּוֹיִם
  english_pob_choice: from all the nations
  chosen_spanish: de todas las naciones
  alternatives_spanish:
  - de todos los pueblos
  - entre todas las naciones
  lexicon: HALOT
  rationale: ‘Naciones’ conserva el matiz político-histórico del contexto militar; ‘de’ reproduce el origen de lo tomado.
- source_word: מִבְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: de los amonitas
  alternatives_spanish:
  - de los hijos de Amón
  - de los ammonitas
  lexicon: HALOT
  rationale: La expresión hebrea literal ‘hijos de Amón’ se expresa con el etnónimo idiomático ‘amonitas’, que es claro y fiel al referente.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español, el estándar del proyecto es ‘Yahvé’, que preserva el nombre propio del Dios del pacto y evita la sustitución por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Objeto pronominal de אֹתָם
  english_pob_reading: these
  chosen_spanish_reading: esto
  alternative_spanish_readings:
  - los
  - estas cosas
  rationale: El antecedente inmediato son los objetos de bronce del versículo anterior. ‘Esto’ evita forzar género/número en español cuando el referente abarca un conjunto ya mencionado; la nota explicita la referencia para no perder la tensión anafórica.
  doctrine_reference: Cross-reference to 1 Chronicles 18:10
translation_notes:
  revision_awareness: El POB en inglés revisó ‘carried off’ a ‘taken’ para hacer más natural y neutral el verbo inglés. Esta versión española sigue esa decisión con ‘había tomado’, sin introducir una imagen más violenta ni una paráfrasis que exceda el hebreo. También conserva la referencia anafórica al versículo previo mediante nota, en línea con el audit trail.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ conforme al estándar del proyecto para יהוה.
  - Se mantiene ‘naciones’ en lugar de ‘pueblos’ por el contexto militar-político del pasaje.
  - ‘Amonitas’ traduce funcionalmente ‘los hijos de Amón’ y se aclara en nota.
  - La puntuación con dos puntos introduce la lista de naciones siguiendo el flujo del hebreo y del POB en inglés.
