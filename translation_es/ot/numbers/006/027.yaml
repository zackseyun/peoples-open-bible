translation:
  language: es
  text: Así pondrán mi nombre sobre los hijos de Israel[a], y yo mismo los bendeciré[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''los israelitas'' o ''el pueblo de Israel''. Hebreo: ''los hijos de Israel''.'
    reason: lexical_alternative
  - marker: b
    text: La expresión 'poner mi nombre sobre' probablemente significa invocar el nombre de Yahvé sobre ellos y señalarlos como pertenecientes a él.
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׂמוּ
  english_pob_choice: So they shall put
  chosen_spanish: Así pondrán
  alternatives_spanish:
  - Y pondrán
  - De este modo pondrán
  - Entonces pondrán
  lexicon: HALOT
  rationale: שׂוּם significa 'poner/colocar'. 'Así' conserva la relación consecutiva con la bendición sacerdotal previa y suena natural en español, sin perder la fuerza futura del verbo.
- source_word: אֶת שְׁמִי
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi nombre propio
  - mi nombre, el de Yahvé
  lexicon: HALOT
  rationale: '''Nombre'' se conserva literalmente porque en este contexto tiene valor representativo y de pacto. No se sustituye por una explicación como ''autoridad'' o ''presencia'' para no exceder el texto.'
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: '''Sobre'' reproduce el valor concreto de colocar el nombre divino sobre el pueblo y funciona de modo natural en español.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión literal 'hijos de Israel' para reflejar el hebraísmo del texto y su continuidad bíblica. 'Los israelitas' sería una alternativa idiomática, pero menos literal.
- source_word: וַאֲנִי
  english_pob_choice: and I myself
  chosen_spanish: y yo mismo
  alternatives_spanish:
  - y yo
  - entonces yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; 'yo mismo' transmite bien esa fuerza enfática sin añadir contenido ajeno.
- source_word: אֲבָרֲכֵם
  english_pob_choice: will bless them
  chosen_spanish: los bendeciré
  alternatives_spanish:
  - los bendeciré ciertamente
  - yo los bendeciré
  lexicon: HALOT
  rationale: El verbo ברך se vierte de forma directa como 'bendecir'. El objeto plural queda claro por el contexto y la forma verbal.
theological_decisions:
- issue: Sentido de poner el nombre de Yahvé sobre Israel
  english_pob_reading: Retain the concrete covenantal expression 'put my name on' without interpretive expansion.
  chosen_spanish_reading: Conservar la expresión concreta 'poner mi nombre sobre' sin expandirla interpretativamente.
  alternative_spanish_readings:
  - invocar mi nombre sobre
  - marcarlos como pertenecientes a mí
  rationale: El hebreo presenta un idioma de identificación y pertenencia de pacto; la traducción lo conserva de forma concreta para no reducir su alcance teológico a una sola paráfrasis.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Forma masculina plural בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina plural como equivalente literal del hebreo, reconociendo que abarca a la comunidad del pacto completa.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El borrador se ajusta al texto hebreo de Números 6:27 y al control de calidad de la traducción inglesa POB: se conserva la estructura consecutiva, el valor literal de ''nombre'' y la expresión de pacto ''sobre los hijos de Israel'', sin introducir paráfrasis teológicas innecesarias.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar del nombre divino en el proyecto, aunque en este versículo el hebreo muestra 'mi nombre' y no el tetragrámaton explícito.
  - '''Hijos de Israel'' se mantiene por fidelidad al hebraísmo; ''israelitas'' queda como alternativa de nota.'
  - La puntuación y el uso de mayúsculas siguen la norma general del español moderno.
