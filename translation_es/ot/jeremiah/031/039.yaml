translation:
  language: es
  text: Y la línea de medir saldrá[a] más lejos, hacia adelante[b] hasta la colina de Gareb, y luego girará hacia Goah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «de nuevo»; aquí se prefiere el sentido espacial de continuación o ampliación del límite.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «frente a ello» u «opuesto a ello»; el referente exacto del sufijo en נֶגְדּוֹ se infiere por el contexto de la descripción de límites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  english_pob_choice: will go out
  chosen_spanish: se extenderá
  alternatives_spanish:
  - saldrá
  - irá hacia afuera
  - se alargará
  lexicon: HALOT
  rationale: El verbo expresa desplazamiento o prolongación de una línea. En español, «se extenderá» comunica con naturalidad la imagen de la cuerda de medición avanzando en el espacio, sin perder el valor concreto del original.
- source_word: עוֹד
  english_pob_choice: farther
  chosen_spanish: más allá
  alternatives_spanish:
  - de nuevo
  - todavía
  - más lejos
  lexicon: HALOT
  rationale: En este contexto de delimitación territorial, la idea es de ampliación espacial, no de repetición. «Más allá» preserva esa progresión y suena idiomático en español.
- source_word: קוה הַמִּדָּה
  english_pob_choice: the measuring line
  chosen_spanish: la cuerda de medir
  alternatives_spanish:
  - la línea de medir
  - la línea de medición
  - el cordel de medir
  lexicon: HALOT
  rationale: La construcción se refiere al instrumento usado para medir límites. «Cuerda de medir» conserva la imagen concreta y es natural en español bíblico contemporáneo.
- source_word: נֶגְדּוֹ
  english_pob_choice: straight ahead
  chosen_spanish: en línea recta
  alternatives_spanish:
  - frente a él
  - enfrente de él
  - delante de él
  lexicon: HALOT
  rationale: La expresión apunta a una dirección frontal o opuesta dentro de una descripción de límites. «En línea recta» transmite bien el avance direccional sin sobrecargar el texto con un referente ambiguo.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: hacia
  alternatives_spanish:
  - a
  - sobre
  - contra
  lexicon: HALOT
  rationale: Con un destino topográfico, «hacia» expresa la orientación del movimiento de la cuerda de medir de modo más natural que «sobre» o «a» en esta frase.
- source_word: גִּבְעַת גָּרֵב
  english_pob_choice: the hill of Gareb
  chosen_spanish: la colina de Gareb
  alternatives_spanish:
  - el monte de Gareb
  - la colina Gareb
  lexicon: HALOT
  rationale: גִּבְעַת designa una elevación; «colina» es una equivalencia clara y no demasiado elevada. Se mantiene el nombre propio transliterado «Gareb».
- source_word: וְנָסַב
  english_pob_choice: and then it will turn
  chosen_spanish: y luego se volverá
  alternatives_spanish:
  - y dará vuelta
  - y rodeará
  - y se curvará
  lexicon: HALOT
  rationale: En una descripción de límites, el verbo indica cambio de dirección. «Se volverá» preserva la idea de giro de manera breve y natural; «luego» refleja la secuencia del recorrido.
- source_word: גֹּעָתָה
  english_pob_choice: toward Goah
  chosen_spanish: hacia Goá
  alternatives_spanish:
  - a Goá
  - en dirección a Goá
  lexicon: HALOT
  rationale: Se trata de un topónimo con matiz direccional. «Hacia Goá» conserva la orientación y adapta el nombre al español con acento gráfico para facilitar la lectura.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo WLC y armoniza con el audit trail inglés: se conserva la imagen concreta de la cuerda de medir, la expansión espacial de עוֹד, la dirección de נֶגְדּוֹ y el giro final hacia un topónimo. No se introdujeron revisiones textuales ni cambios doctrinales.'
  spanish_consistency_notes:
  - Se mantiene el estilo bíblico sobrio y legible en español moderno.
  - Se usa «cuerda de medir» para conservar la concreción instrumental de קוה הַמִּדָּה.
  - Los topónimos se transliteran de forma estable y con acento gráfico español cuando corresponde.
  - 'La secuencia verbal refleja el flujo del recorrido: extensión, avance y giro final.'
