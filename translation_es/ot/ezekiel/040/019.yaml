translation:
  language: es
  text: 'Entonces midió el ancho desde delante de la puerta[a] inferior hasta delante del patio interior, por fuera: cien codos[b], hacia el oriente y hacia el norte.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el portal inferior». El término hebreo para «puerta» puede referirse a la estructura de la entrada en su conjunto, no solo a la abertura.
    reason: lexical_alternative
  - marker: b
    text: Es decir, la medida era de cien codos tanto para el lado oriental como para el lado septentrional.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּמָד
  english_pob_choice: Then he measured
  chosen_spanish: Entonces midió
  alternatives_spanish:
  - Y midió
  - Luego midió
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción en la visión. «Entonces» conserva la secuencia narrativa de forma natural en español.
- source_word: רֹחַב
  english_pob_choice: the width
  chosen_spanish: el ancho
  alternatives_spanish:
  - la anchura
  - la medida del ancho
  lexicon: HALOT
  rationale: El sustantivo expresa la dimensión transversal medida de una estructura. «Ancho» es claro y actual en español, y mantiene el sentido arquitectónico.
- source_word: מִלִּפְנֵי
  english_pob_choice: from the front of
  chosen_spanish: desde enfrente de
  alternatives_spanish:
  - desde la frente de
  - desde delante de
  lexicon: HALOT
  rationale: Aquí לפני es espacial y marca el punto de inicio de la medición. «Enfrente de» comunica mejor la orientación arquitectónica que una traducción más literal pero menos natural.
- source_word: הַשַּׁעַר הַתַּחְתּוֹנָה
  english_pob_choice: the lower gate
  chosen_spanish: la puerta inferior
  alternatives_spanish:
  - la puerta baja
  - la puerta de abajo
  lexicon: HALOT
  rationale: Se conserva la tensión documentada entre «gate» como estructura y la puerta/portada. En español, «puerta inferior» suena más natural, pero no elimina la posibilidad estructural del término; la nota explica la alternativa lexical.
- source_word: לִפְנֵי הֶחָצֵר הַפְּנִימִי
  english_pob_choice: to the front of the inner court
  chosen_spanish: hasta enfrente del patio interior
  alternatives_spanish:
  - hasta la frente del patio interior
  - ante el patio interior
  lexicon: HALOT
  rationale: Se mantiene el paralelismo espacial de לפני como punto final de la medición. «Patio interior» traduce con claridad el espacio arquitectónico para el lector español.
- source_word: מִחוּץ
  english_pob_choice: outside
  chosen_spanish: por fuera
  alternatives_spanish:
  - afuera
  - exteriormente
  lexicon: HALOT
  rationale: La preposición indica que la medición se toma del lado exterior. «Por fuera» es idiomático y preciso en español.
- source_word: מֵאָה אַמָּה
  english_pob_choice: one hundred cubits
  chosen_spanish: cien codos
  alternatives_spanish:
  - cien codos de medida
  - cien medidas
  lexicon: HALOT
  rationale: Se conserva la unidad cultural de medida sin convertirla. «Codos» mantiene la precisión del texto y la relación con la arquitectura antigua.
- source_word: הַקָּדִים וְהַצָּפוֹן
  english_pob_choice: to the east and to the north
  chosen_spanish: hacia el oriente y hacia el norte
  alternatives_spanish:
  - al oriente y al norte
  - hacia el este y hacia el norte
  lexicon: HALOT
  rationale: Los sustantivos direccionales resumen que la misma medida aplica a ambos lados. «Oriente» conserva el registro bíblico y es entendible en español; se explicita la dirección distributiva con «hacia».
theological_decisions:
- issue: Direccionalidad distributiva de la medida
  english_pob_reading: one hundred cubits, to the east and to the north
  chosen_spanish_reading: cien codos, hacia el oriente y hacia el norte
  alternative_spanish_readings:
  - cien codos, al oriente y al norte
  - cien codos, para el oriente y para el norte
  rationale: El hebreo puede resumir que la medida de cien codos corresponde a las dos orientaciones. La redacción española preserva esa lectura distributiva sin sugerir una sola dirección global.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'Se siguió el ajuste revisado del inglés POB en la frase direccional: la versión final usa «to the east and to the north», por lo que el español expresa la distribución con «hacia el oriente y hacia el norte» en vez de una formulación más rígida o ambigua. También se preservó la lectura espacial de לפני como marco de la medición.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca, aunque este versículo no lo contiene.
  - «Oriente» se usa como equivalente bíblico de dirección, no como nombre propio litúrgico.
  - «Cien codos» conserva la unidad antigua y evita conversiones modernas.
  - La nota a resuelve la ambigüedad de «puerta» frente a «portal/estructura de la puerta», siguiendo el audit trail inglés.
