    issue: La nota [a] no corresponde a una alternativa real y está mal ubicada.
    rationale: En el inglés, la nota [a] ofrece la alternativa léxica «snares and nets», no una repetición de toda la cláusula. En español, la nota actual repite «cuyo corazón son trampas y redes», exactamente lo mismo que el texto principal, por lo que no aporta variante útil. Además, el anclaje más natural es sobre «trampas», no sobre «la mujer».
  - severity: low
    issue: La cláusula «cuyo corazón son trampas y redes» es comprensible pero algo poco natural en español.
    rationale: El hebreo predica directamente la metáfora sobre «corazón», y debe preservarse. En español, una leve reestructuración como «cuyo corazón es una trampa y una red» sería más idiomática, pero introduciría singulares no presentes en el original. Mejor mantener el plural y la literalidad, aceptando cierta aspereza, o usar una formulación muy cercana.
  revised_spanish_text: Y encuentro más amarga que la muerte a la mujer cuyo corazón es[a] trampas y redes, y cuyas manos son cadenas. El que es bueno delante de Dios[b] escapará de ella, pero el pecador será atrapado por ella.
