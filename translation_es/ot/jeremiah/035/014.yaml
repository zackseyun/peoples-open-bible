base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/035/014.yaml
  text: The words of Jehonadab son of Rechab[a], which he commanded his sons—not to drink wine—have been upheld, and they have not drunk wine to this day, because they have obeyed the command of their father. But I have spoken to you, rising early and speaking[b], and you have not listened to me.
  footnotes:
