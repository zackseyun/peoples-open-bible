revisions:
- from: 'Algunos de Manasés también se pasaron a David cuando él vino con los filisteos contra Saúl para la guerra[a]; aunque no los ayudaron, porque los señores de los filisteos, después de tomar consejo, lo enviaron lejos, diciendo[b]: «A costa de nuestras cabezas, él puede pasarse a su señor Saúl».'
  to: 'Algunos de Manasés también se pasaron a David cuando vino con los filisteos contra Saúl a la batalla[a], aunque no los ayudaron, porque los señores de los filisteos, después de deliberar, lo despidieron, diciendo[b]: «A costa de nuestras cabezas, podría pasarse a su amo Saúl».'
  rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad: «a la batalla» en vez de «para la guerra»; «después de deliberar» por el hebreo de consejo; «lo despidieron» para reflejar mejor que los jefes filisteos lo apartaron de la campaña; y «podría pasarse a su amo Saúl» para reproducir mejor tanto la posibilidad temida como el valor relacional de אֲדֹנָיו.'
