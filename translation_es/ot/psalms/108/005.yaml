translation:
  language: es
  text: Porque tu amor fiel es grande por encima de los cielos, y tu fidelidad[a] alcanza hasta las nubes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu verdad». El hebreo también puede entenderse así; sin embargo, en paralelo con «amor fiel» aquí expresa bien la idea de fidelidad o confiabilidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque es que
  lexicon: HALOT
  rationale: Introduce la razón o base del enunciado poético anterior. En español, «Porque» conserva bien la relación causal y suena natural en el registro bíblico actual.
- source_word: גָדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - alta
  - enorme
  - poderosa
  lexicon: HALOT
  rationale: El adjetivo expresa magnitud. «Grande» es la opción más directa y fiel en español, sin desplazar el foco hacia una cualidad distinta como poder o altura.
- source_word: מֵעַל שָׁמַיִם
  english_pob_choice: above the heavens
  chosen_spanish: sobre los cielos
  alternatives_spanish:
  - más allá de los cielos
  - por encima de los cielos
  - sobre los cielos
  lexicon: HALOT
  rationale: La imagen es de elevación y trascendencia. «Sobre los cielos» mantiene la metáfora espacial del hebreo y funciona de modo natural en español poético.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu amor constante
  - tu amor fiel
  - tu misericordia
  lexicon: HALOT
  rationale: חֶסֶד combina lealtad, benevolencia y compromiso pactual. En español, «misericordia» es una opción bíblica amplia y reconocible, pero no agota la fidelidad implícita; por eso se conserva la tensión en la nota mediante la referencia al atributo de lealtad implícita en el paralelismo.
- source_word: וְעַד
  english_pob_choice: and ... to / reaches to
  chosen_spanish: alcanza hasta
  alternatives_spanish:
  - llega hasta
  - se extiende hasta
  - y hasta
  lexicon: HALOT
  rationale: El valor de límite/extensión se expresa con naturalidad mediante «alcanza hasta», que reproduce el movimiento vertical y evita añadir un verbo ajeno al paralelismo.
- source_word: שְׁחָקִים
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - los cielos
  - las alturas
  - las nubes
  lexicon: HALOT
  rationale: En poesía hebrea, שְׁחָקִים puede designar las nubes o la región nubosa alta. «Las nubes» conserva la imagen concreta y corresponde al par poético con «los cielos».
- source_word: אֲמִתֶּךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu verdad
  - tu confiabilidad
  - tu lealtad
  lexicon: HALOT
  rationale: Aunque אֱמֶת puede traducirse «verdad», en paralelo con חֶסֶד aquí expresa la confiabilidad estable de Dios. «Fidelidad» comunica bien esa cualidad relacional y pactual en español.
theological_decisions:
- issue: Cómo traducir el par חֶסֶד / אֱמֶת en la alabanza a Dios
  english_pob_reading: '''your steadfast love'' and ''your faithfulness'''
  chosen_spanish_reading: «tu misericordia» y «tu fidelidad»
  alternative_spanish_readings:
  - «tu amor constante» y «tu verdad»
  - «tu misericordia» y «tu verdad»
  - «tu amor fiel» y «tu confiabilidad»
  rationale: El hebreo presenta un paralelismo clásico de atributos del pacto. «Misericordia» capta el carácter benévolo y compasivo de חֶסֶד en español bíblico; «fidelidad» refleja la idea de confiabilidad que la POB inglesa resolvió con «faithfulness». Se evita imponer «verdad» como única opción porque en este contexto la relación con חֶסֶד favorece la noción de firmeza/lealtad.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El expediente inglés no registra revisiones aplicadas y el último paso de revisión quedó sin cambios; esta propuesta sigue de cerca ese estado estable, conservando el paralelismo poético y la opción léxica principal con una nota para la alternativa semántica de אֱמֶת.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito.
  - Se usa puntuación poética clara en español y se conserva el paralelismo entre altura («sobre los cielos») y extensión («alcanza hasta las nubes»).
  - «Misericordia» se eligió como equivalente bíblico natural de חֶסֶד, pero la nota preserva la alternativa «fidelidad» para אֱמֶת y su posible matiz de «verdad».
