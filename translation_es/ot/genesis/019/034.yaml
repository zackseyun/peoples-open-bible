translation:
  language: es
  text: 'Y sucedió al día siguiente que la mayor[a] dijo a la menor: «Mira, anoche me acosté con mi padre. Hagámosle beber vino también esta noche; luego ven y acuéstate con él, para que preservemos descendencia de nuestro padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la primogénita». «La mayor» expresa el contraste de edad con un español más natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי מִמָּחֳרָת
  english_pob_choice: And it happened on the next day
  chosen_spanish: Y sucedió al día siguiente
  alternatives_spanish:
  - Y aconteció al día siguiente
  - Al día siguiente
  lexicon: HALOT
  rationale: Mantiene la apertura narrativa del wayyiqtol sin volverla arcaica. 'Sucedió' conserva el valor discursivo de inicio de escena; 'al día siguiente' refleja claramente מִמָּחֳרָת.
- source_word: הַבְּכִירָה
  english_pob_choice: the firstborn
  chosen_spanish: la mayor
  alternatives_spanish:
  - la primogénita
  - la primera nacida
  lexicon: HALOT
  rationale: En español, 'la mayor' comunica de forma natural la idea de la hija de más edad. 'Primogénita' es más literal, pero puede sonar más técnico; se reserva como alternativa válida.
- source_word: הַצְּעִירָה
  english_pob_choice: the younger
  chosen_spanish: la menor
  alternatives_spanish:
  - la más joven
  - la más pequeña
  lexicon: HALOT
  rationale: Como contraste con 'la mayor', 'la menor' expresa con naturalidad la oposición de edad. El hebreo usa un adjetivo sustantivado, por lo que el español puede hacer lo mismo.
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Fíjate
  lexicon: HALOT
  rationale: '''Mira'' reproduce bien el gesto de llamar la atención sobre lo que sigue, con tono natural en diálogo directo.'
- source_word: שָׁכַבְתִּי אֶת אָבִי
  english_pob_choice: I lay with my father
  chosen_spanish: me acosté con mi padre
  alternatives_spanish:
  - dormí con mi padre
  - tuve relaciones con mi padre
  lexicon: HALOT
  rationale: En este contexto, שׁכב funciona como eufemismo sexual. 'Me acosté con mi padre' conserva el eufemismo y el registro grave sin hacerlo clínico ni ambiguo.
- source_word: אֶמֶשׁ
  english_pob_choice: last night
  chosen_spanish: anoche
  alternatives_spanish:
  - la noche pasada
  - ayer por la noche
  lexicon: HALOT
  rationale: '''Anoche'' es la equivalencia natural y precisa en español para la noche anterior.'
- source_word: נַשְׁקֶנּוּ יַיִן
  english_pob_choice: Let us make him drink wine
  chosen_spanish: Emborrachémoslo
  alternatives_spanish:
  - Hagámosle beber vino
  - Démosle vino para que beba
  lexicon: HALOT
  rationale: El hebreo expresa una acción causativa con vino. 'Emborrachémoslo' transmite el propósito implícito con mucha claridad en español; aunque más interpretativo que una versión literal, refleja el efecto buscado en el contexto narrativo.
- source_word: גַּם הַלַּיְלָה
  english_pob_choice: tonight also
  chosen_spanish: también esta noche
  alternatives_spanish:
  - esta noche también
  - de nuevo esta noche
  lexicon: HALOT
  rationale: Conserva la adición de גַּם y el marco temporal de הַלַּיְלָה en un orden natural para el español.
- source_word: וּבֹאִי
  english_pob_choice: Then come
  chosen_spanish: luego entra
  alternatives_spanish:
  - entonces ven
  - después ven
  lexicon: HALOT
  rationale: El imperativo introduce la siguiente acción. 'Entra' expresa la idea de acercarse/entrar donde está él, y 'luego' marca el avance secuencial.
- source_word: שִׁכְבִי עִמּוֹ
  english_pob_choice: lie with him
  chosen_spanish: acuéstate con él
  alternatives_spanish:
  - duerme con él
  - ten relaciones con él
  lexicon: HALOT
  rationale: '''Acuéstate con él'' preserva el eufemismo hebreo y su gravedad sin volverse demasiado explícito.'
- source_word: וּנְחַיֶּה
  english_pob_choice: so that we may preserve
  chosen_spanish: para que preservemos
  alternatives_spanish:
  - para que mantengamos
  - para que conservemos
  lexicon: HALOT
  rationale: El piel de חיה aquí tiene sentido causativo de mantener con vida/preservar. 'Preservemos' capta bien el objetivo de la acción y suena natural en español.
- source_word: מֵאָבִינוּ זָרַע
  english_pob_choice: offspring from our father
  chosen_spanish: descendencia de nuestro padre
  alternatives_spanish:
  - semilla de nuestro padre
  - prole de nuestro padre
  lexicon: HALOT
  rationale: זֶרַע literalmente es 'semilla', pero en este contexto designa progenie. 'Descendencia' comunica el sentido idiomático con claridad en español y evita una literalidad confusa.
theological_decisions:
- issue: Eufemismo sexual de שׁכב
  english_pob_reading: I lay with my father / lie with him
  chosen_spanish_reading: me acosté con mi padre / acuéstate con él
  alternative_spanish_readings:
  - dormí con mi padre / duerme con él
  - tuve relaciones con mi padre / ten relaciones con él
  rationale: Se conserva el eufemismo del hebreo en lugar de reemplazarlo por una expresión totalmente clínica o explícita. Esto mantiene el registro narrativo y la ambigüedad controlada del texto fuente.
  doctrine_reference: N/A
- issue: Sentido de זֶרַע como progenie
  english_pob_reading: offspring
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - offspring
  - prole
  - semilla
  rationale: Se evita una traducción que suene biológica o mecánica en español, pero se conserva el sentido reproductivo del hebreo. 'Descendencia' transmite la idea de continuidad familiar que la escena busca asegurar.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin cambios en su evaluación más reciente; la presente versión española sigue de cerca sus decisiones léxicas principales, especialmente los eufemismos sexuales y el valor idiomático de זֶרַע como 'descendencia'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantiene 'descendencia' para זֶרַע en coherencia con la práctica POB de preservar el sentido idiomático sin calco forzado.
  - El registro busca ser bíblico y sobrio, pero en español natural y publicable.
  - La oposición 'la mayor / la menor' refleja bien el contraste hebreo entre הבכירה y הצעירה.
