translation:
  language: es
  text: 'Y estos son los nombres de los hijos[a] que le nacieron en Jerusalén: Samúa, Sobab, Natán y Salomón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los nacidos». El hebreo no usa el sustantivo ordinario para «hijos», aunque todos los nombres enumerados son masculinos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Ahora estos son
  - Estos son
  lexicon: HALOT
  rationale: La conjunción y el demostrativo introducen una lista. «Y estos son» conserva la continuidad narrativa y suena natural en español.
- source_word: שְׁמוֹת
  english_pob_choice: the names of
  chosen_spanish: los nombres de
  alternatives_spanish:
  - los nombres
  lexicon: HALOT
  rationale: El constructo plural introduce la lista de personas; en español, «los nombres de» expresa con claridad la relación genitiva.
- source_word: הַיְלוּדִים
  english_pob_choice: the children born
  chosen_spanish: los nacidos
  alternatives_spanish:
  - los hijos nacidos
  - los engendrados
  - los hijos
  lexicon: HALOT
  rationale: El participio pasivo de ילד significa literalmente «los nacidos». En español, «los nacidos» mantiene la fuerza léxica sin imponer «hijos», que sería más específico de lo que el hebreo dice.
- source_word: אֲשֶׁר הָיוּ לוֹ
  english_pob_choice: to him
  chosen_spanish: que tuvo
  alternatives_spanish:
  - que eran suyos
  - que le pertenecían
  - que eran de él
  lexicon: HALOT
  rationale: La construcción relativa con היה + ל expresa posesión. Dado que el participio ya comunica nacimiento, «que tuvo» reproduce de modo idiomático la idea de hijos nacidos a él.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Preposición locativa directa; no requiere ajuste especial.
- source_word: שַׁמּוּעַ
  english_pob_choice: Shammua
  chosen_spanish: Samúa
  alternatives_spanish:
  - Samuá
  lexicon: transliteration
  rationale: Nombre propio hebreo adaptado al uso español tradicional de transliteración bíblica, con acentuación gráfica para lectura natural.
- source_word: שׁוֹבָב
  english_pob_choice: Shobab
  chosen_spanish: Sobab
  alternatives_spanish:
  - Shobab
  lexicon: transliteration
  rationale: Se mantiene el nombre propio con adaptación ortográfica coherente al español bíblico.
- source_word: נָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Nathan
  lexicon: transliteration
  rationale: Nombre propio de uso bíblico asentado en español con tilde prosódica.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Shelomó
  lexicon: transliteration
  rationale: Se usa la forma española establecida del nombre, conforme al uso bíblico habitual en español.
theological_decisions:
- issue: 'Valor de הַיְלוּדִים: «hijos» vs. «nacidos»'
  english_pob_reading: the children born / the ones born; note that the Hebrew does not use the ordinary noun for sons, though all are male
  chosen_spanish_reading: los nacidos
  alternative_spanish_readings:
  - los hijos nacidos
  - los hijos
  - los engendrados
  rationale: El hebreo resalta el estado de nacimiento más que el parentesco con el sustantivo usual para «hijos». En español, «los nacidos» conserva esa tensión sin normalizarla en «hijos».
  doctrine_reference: Lexical precision; no doctrinal issue
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al sentido base. Se ha mantenido la observación lexical sobre הַיְלוּדִים y se ha preservado la lista de nombres propios con formas españolas usuales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «nacidos» para reflejar el participio hebreo y evitar una sobreinterpretación como «hijos» en el texto principal.
  - 'Los nombres propios se presentan con formas españolas corrientes: Samúa, Sobab, Natán y Salomón.'
