translation:
  language: es
  text: 'Porque así dice Yahvé a los eunucos[a] que guardan mis sábados, que eligen lo que me agrada y que se aferran a mi pacto:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oficiales de la corte», ya que el término hebreo puede designar funcionarios reales en algunos contextos; aquí, sin embargo, el contexto favorece claramente el sentido literal de «eunucos».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del Tetragrámaton, siguiendo la decisión base de la POB en inglés de no sustituirlo por un título. En español, 'Yahvé' es la forma estándar de transliteración usada en este proyecto.
- source_word: לַסָּרִיסִים
  english_pob_choice: to the eunuchs
  chosen_spanish: a los eunucos
  alternatives_spanish:
  - a los oficiales de la corte
  - a los funcionarios de palacio
  lexicon: HALOT
  rationale: El contexto inmediato de Isaías 56:3-5 trata de la inclusión de quienes antes quedaban excluidos por su condición corporal; por eso se mantiene el sentido literal 'eunucos' y no una acepción administrativa más amplia.
- source_word: אֲשֶׁר יִשְׁמְרוּ
  english_pob_choice: who keep
  chosen_spanish: que guardan
  alternatives_spanish:
  - que observan
  - que preservan
  lexicon: HALOT
  rationale: '''Guardar'' reproduce bien el valor pactal de observancia fiel. En español comunica tanto cumplimiento como custodia, sin perder el matiz de lealtad.'
- source_word: שַׁבְּתוֹתַי
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis días de reposo
  - mis sabbats
  lexicon: HALOT
  rationale: Se mantiene la pluralidad explícita del hebreo. 'Sábados' es la opción más directa y readable en español; 'días de reposo' suaviza la referencia pero diluye la forma plural y la alusión cultual.
- source_word: וּבָחֲרוּ
  english_pob_choice: and choose
  chosen_spanish: que eligen
  alternatives_spanish:
  - y eligen
  - que escogen
  lexicon: HALOT
  rationale: Se adopta una cláusula relativa paralela, como en la revisión inglesa más reciente, para reflejar la secuencia hebrea y evitar una cadena menos fluida en español. 'Eligen' conserva la decisión voluntaria.
- source_word: בַּאֲשֶׁר חָפָצְתִּי
  english_pob_choice: what I delight in
  chosen_spanish: lo que yo deseo
  alternatives_spanish:
  - lo que me deleita
  - lo que me agrada
  lexicon: HALOT
  rationale: חפץ expresa deleite/deseo/agrado. En español, 'lo que yo deseo' es natural y suficientemente amplio; 'me deleita' sería más afectivo, pero puede sonar más marcado que el hebreo en este contexto.
- source_word: וּמַחֲזִיקִים
  english_pob_choice: and hold fast
  chosen_spanish: que se aferran
  alternatives_spanish:
  - que se mantienen firmes en
  - que se aferran a
  lexicon: HALOT
  rationale: El participio expresa adherencia continua. 'Se aferran' reproduce bien la fuerza de sujeción perseverante; 'mantenerse firmes en' sería más explicativo, pero menos cercano al verbo hebreo.
- source_word: בִּבְרִיתִי
  english_pob_choice: to my covenant
  chosen_spanish: a mi pacto
  alternatives_spanish:
  - a mi alianza
  - a mi convenio
  lexicon: HALOT
  rationale: '''Pacto'' conserva el lenguaje bíblico de alianza vinculante y evita un matiz contractual moderno que ''convenio'' podría sugerir. En español, la preposición ''a'' con ''aferrarse'' expresa bien la adhesión.'
theological_decisions:
- issue: Alcance de סָרִיסִים en Isaías 56:4
  english_pob_reading: literal eunuchs
  chosen_spanish_reading: eunucos literales
  alternative_spanish_readings:
  - oficiales de la corte
  - funcionarios reales
  rationale: La POB en inglés juzga que el contexto favorece el sentido literal, y esa decisión debe mantenerse porque el pasaje justamente responde a la exclusión ritual/social de este grupo. Traducirlo como cargo administrativo borraría la tensión redentora del texto.
  doctrine_reference: Isaías 56:3-5; Deuteronomio 23:1
- issue: Tono profético de fórmula introductoria
  english_pob_reading: For thus says Yahweh
  chosen_spanish_reading: Porque así dice Yahvé
  alternative_spanish_readings:
  - Pues así dice Yahvé
  - Porque de esta manera habla Yahvé
  rationale: '''Así dice'' preserva la fórmula profética solemne sin volverla arcaizante. ''Porque'' mantiene la conexión discursiva con lo anterior, como en el hebreo כִּי.'
  doctrine_reference: Fórmula profética estándar en el AT
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó las cláusulas coordinadas repetidas por relativas paralelas ('who choose... and who hold fast...'). La propuesta española sigue esa revisión con 'que eligen...' y 'que se aferran...' para conservar el paralelismo y la fluidez formal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para el Tetragrámaton.
  - Se usa 'pacto' de forma consistente con el lenguaje de alianza bíblica del POB.
  - Se conserva la pluralidad de שַׁבְּתוֹתַי con 'mis sábados' en vez de singularizar.
  - La puntuación final con dos puntos refleja la apertura hacia la continuación del versículo siguiente.
