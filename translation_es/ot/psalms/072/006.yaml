translation:
  language: es
  text: Que descienda como lluvia sobre la hierba segada[a][b], como aguaceros que riegan la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse como futuro: «Descenderá como lluvia sobre la hierba segada». El imperfecto hebreo admite tanto valor de deseo o petición como de descripción futura en contexto.'
    reason: alternative_reading
  - marker: b
    text: «Hierba segada» corresponde al hebreo usualmente entendido como algo cortado o segado; algunos han propuesto «vellón», pero la imagen agrícola encaja mejor aquí.
    reason: lexical_alternative
  - marker: c
    text: También puede traducirse «el país» o «el suelo»; aquí se conserva «la tierra» por su amplitud poética.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵרֵד
  english_pob_choice: May he come down
  chosen_spanish: Que descienda
  alternatives_spanish:
  - Que baje
  - Que venga hacia abajo
  - Descenderá
  lexicon: HALOT
  rationale: El verbo ירד expresa movimiento hacia abajo. En este contexto de bendición real, el hebreo imperfecto se entiende mejor como deseo/petición; por eso se usa un subjuntivo optativo en español. 'Descienda' conserva la imagen y suena natural en registro bíblico.
- source_word: כְּמָטָר
  english_pob_choice: like rain
  chosen_spanish: como lluvia
  alternatives_spanish:
  - como lluvia
  - igual que lluvia
  lexicon: HALOT
  rationale: La comparación con כ + מָטָר es directa. 'Como lluvia' es la equivalencia más natural y fiel en español.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: La preposición עַל aquí expresa cobertura/superposición. 'Sobre' reproduce bien la relación espacial y el tono poético.
- source_word: גֵּז
  english_pob_choice: mown grass
  chosen_spanish: la hierba segada
  alternatives_spanish:
  - la hierba cortada
  - el pasto segado
  - el vellón esquilado
  lexicon: HALOT
  rationale: El término puede referirse a algo cortado o esquilado. En este contexto agrícola, 'hierba segada' conserva la imagen del campo regado por la lluvia y evita la lectura menos probable de 'vellón'.
- source_word: כִּרְבִיבִים
  english_pob_choice: like showers
  chosen_spanish: como aguaceros
  alternatives_spanish:
  - como lluvias torrenciales
  - como chaparrones
  - como lluvias
  lexicon: HALOT
  rationale: רְבִיבִים denota lluvias/copiosos aguaceros. 'Aguaceros' comunica la abundancia de manera natural en español y mantiene el paralelismo poético.
- source_word: זַרְזִיף
  english_pob_choice: that water
  chosen_spanish: que riegan
  alternatives_spanish:
  - que humedecen
  - que empapan
  - que derraman
  lexicon: HALOT
  rationale: La forma rara funciona aquí como acción de hacer caer/verter agua. Un verbo en español hace la frase fluida y conserva el efecto de las lluvias sobre la tierra.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el suelo
  - el país
  lexicon: HALOT
  rationale: אָרֶץ puede ser 'tierra', 'país' o 'suelo'. En este paralelismo poético, 'la tierra' es la opción más amplia y natural; mantiene también la resonancia de fertilidad.
theological_decisions:
- issue: Fuerza del imperfecto hebreo en un salmo de bendición real
  english_pob_reading: 'jussive-like wish/prayer: ''May he come down'''
  chosen_spanish_reading: 'optativo/petición: ''Que descienda'''
  alternative_spanish_readings:
  - Descenderá
  - Descienda
  rationale: El salmo funciona como bendición y súplica por el rey, así que conviene preservar el tono de petición sin convertirlo en una afirmación predictiva más fuerte de lo que exige el hebreo. El optativo español reproduce esa tensión litúrgica.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con la última revisión del testimonio inglés: no se aplicaron cambios ulteriores al sentido, y la versión española sigue de cerca el acuerdo alto del control cruzado.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto cuando el texto la requiera, aunque este versículo no la contiene.
  - Se preserva la tensión del imperfecto hebreo con un optativo español, en línea con la lectura devocional del contexto.
  - '''Tierra'' se usa en sentido amplio y poético, no como una localización restringida.'
