translation:
  language: es
  text: 'Pero si les parece malo servir a Yahvé[a], escojan hoy para ustedes a quién servirán: si a los dioses que sirvieron sus padres[b][c] más allá del Río, o a los dioses de los amorreos, en cuya tierra ustedes habitan. Pero en cuanto a mí y a mi casa[d], serviremos a Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'les resulta malo' o 'les parece inapropiado'; literalmente, 'es malo en sus ojos'.
    reason: lexical_alternative
  - marker: b
    text: '''Más allá del Río'' se refiere al Éufrates.'
    reason: cultural_note
  - marker: c
    text: O 'sus antepasados sirvieron'; el hebreo dice literalmente 'sus padres sirvieron'.
    reason: lexical_alternative
  - marker: d
    text: O 'mi hogar'; 'mi casa' también puede referirse a mi hogar o a mi familia doméstica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם / וְ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La conjunción introduce contraste y condición. 'Pero si' conserva el giro adversativo y suena natural en español sin debilitar la fuerza retórica del hebreo.
- source_word: רַע בְּעֵינֵיכֶם
  english_pob_choice: it is evil in your eyes
  chosen_spanish: les parece malo
  alternatives_spanish:
  - es malo a sus ojos
  - les parece malo
  - les resulta malo
  lexicon: HALOT
  rationale: 'El hebreo es idiomático: literalmente ''malo en sus ojos''. En español, ''les parece malo'' comunica la valoración subjetiva sin perder el sentido moral de ''malo''; evita un calco duro como ''en sus ojos''.'
- source_word: לַעֲבֹד אֶת יְהוָה
  english_pob_choice: to serve Yahweh
  chosen_spanish: servir a Yahvé
  alternatives_spanish:
  - adorar a Yahvé
  - dar culto a Yahvé
  lexicon: HALOT
  rationale: עבד en este contexto de pacto expresa lealtad y servicio religioso. 'Servir' preserva la repetición del verbo a lo largo del versículo y evita estrecharlo indebidamente a 'adorar'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino como ''Yahvé'', no la sustitución por ''SEÑOR''.'
- source_word: בַּחֲרוּ לָכֶם הַיּוֹם
  english_pob_choice: choose for yourselves today
  chosen_spanish: escojan hoy para ustedes
  alternatives_spanish:
  - elijan hoy para ustedes
  - escojan para ustedes hoy
  lexicon: HALOT
  rationale: El imperativo plural y el matiz reflexivo se expresan de modo natural con 'escojan ... para ustedes'. 'Hoy' mantiene la urgencia temporal.
- source_word: אֶת מִי תַעֲבֹדוּן
  english_pob_choice: whom you will serve
  chosen_spanish: a quién servirán
  alternatives_spanish:
  - a quién van a servir
  - a quién servirán ustedes
  lexicon: HALOT
  rationale: En español, después de 'escojan' la estructura 'a quién' es idiomática. El futuro 'servirán' refleja la decisión consecuente del hebreo y mantiene la tensión deliberativa.
- source_word: אֱלֹהִים ... אֱלֹהֵי
  english_pob_choice: gods
  chosen_spanish: a los dioses
  alternatives_spanish:
  - a las deidades
  - a los dioses paganos
  lexicon: HALOT
  rationale: El plural refiere a deidades paganas. 'Dioses' reproduce la dicción bíblica común y conserva el paralelo con el segundo miembro del versículo.
- source_word: אֲשֶׁר עָבְדוּ אֲבוֹתֵיכֶם
  english_pob_choice: your fathers served
  chosen_spanish: que sirvieron sus padres
  alternatives_spanish:
  - que sirvieron sus antepasados
  - que sirvieron sus padres y antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus padres'. 'Padres' preserva la forma masculina y la referencia genealógica del texto; no se neutraliza a 'antepasados' sin necesidad textual.
- source_word: בְּעֵבֶר הַנָּהָר
  english_pob_choice: beyond the River
  chosen_spanish: más allá del Río
  alternatives_spanish:
  - al otro lado del Río
  - más allá del río
  lexicon: HALOT
  rationale: Se conserva la expresión geográfica convencional, con mayúscula en 'Río' porque funciona como designación conocida en el contexto. 'Más allá' refleja היטב la referencia espacial desde la perspectiva israelita.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - los amorritas
  lexicon: HALOT
  rationale: Nombre étnico estándar en español bíblico. 'Amorreos' es la forma más reconocible y fiel al grupo mencionado.
- source_word: אֲשֶׁר אַתֶּם יֹשְׁבִים בְּאַרְצָם
  english_pob_choice: in whose land you are dwelling
  chosen_spanish: en cuya tierra ustedes habitan
  alternatives_spanish:
  - en cuya tierra ustedes viven
  - en cuya tierra están habitando
  lexicon: HALOT
  rationale: '''Habitan'' mantiene un registro sobrio y duradero, adecuado para el contexto. Conserva el sentido de residencia estable en la tierra de otro pueblo.'
- source_word: וְאָנֹכִי וּבֵיתִי
  english_pob_choice: But as for me and my house
  chosen_spanish: Pero yo y mi casa
  alternatives_spanish:
  - Pero yo y mi hogar
  - Pero yo y mi familia
  lexicon: HALOT
  rationale: '''Casa'' reproduce el valor bíblico de casa/hogar/household y permite la misma amplitud semántica que la forma inglesa auditada.'
- source_word: נַעֲבֹד
  english_pob_choice: we will serve
  chosen_spanish: serviremos
  alternatives_spanish:
  - serviremos a Yahvé
  - lo serviremos
  lexicon: HALOT
  rationale: El futuro español expresa la decisión firme y la resolución colectiva. Se mantiene el verbo 'servir' para conservar la repetición estructural del versículo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la norma del proyecto, se translitera el nombre divino como 'Yahvé', preservando el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor religioso y de pacto de עבד
  english_pob_reading: serve
  chosen_spanish_reading: servir
  alternative_spanish_readings:
  - adorar
  - dar culto
  rationale: En Joshua 24:15 la repetición de עבד estructura la decisión de lealtad exclusiva. 'Servir' mantiene esa red de significado mejor que estrecharlo a 'adorar', que en español sugiere solo el acto cultual.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
- issue: Plural deidades frente al singular divino
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - deidades
  - dioses paganos
  rationale: El hebreo contrasta al Yahvé de Israel con deidades ajenas. El plural 'dioses' conserva el contraste textual y evita confundirlo con un uso singular de 'Dios'.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: El inglés auditado fue revisado desde 'seems evil' a 'is evil' para mayor exactitud léxica. La versión española refleja esa decisión con 'les parece malo', que preserva el matiz idiomático hebreo sin endurecerlo innecesariamente; también conserva la repetición de 'servir' y el nombre divino transliterado conforme al estándar del proyecto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה de manera consistente.
  - Se mantiene 'servir' para עבד en todos los casos del versículo.
  - '''Dioses'' se conserva en plural para las deidades paganas.'
  - '''Casa'' sigue la amplitud semántica de household.'
  - La mayúscula en 'Río' distingue la referencia geográfica fija.
