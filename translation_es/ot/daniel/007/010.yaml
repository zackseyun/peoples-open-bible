revisions:
- from: Un río de fuego fluía y salía de delante de él[a]; mil millares le servían, y diez mil veces diez mil estaban de pie delante de él. El tribunal se sentó[b], y los libros fueron abiertos[c].
  to: Un río de fuego fluía y salía de delante de él[a]; mil millares le servían, y diez mil veces diez mil estaban de pie delante de él. El tribunal tomó asiento[b], y los libros fueron abiertos[c].
  rationale: Se hace una reparación menor para mejorar la naturalidad idiomática del modismo judicial arameo en español. «Tomó asiento» comunica mejor que «se sentó» la instalación formal del tribunal, en plena coherencia con la nota del POB inglés y sin alterar el sentido fuente.
