translation:
  language: es
  text: los hijos de Nezía[a], los hijos de Hatifa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'descendientes de Nezía ... descendientes de Hatifa'. En estas listas, el hebreo 'hijos de' suele designar una línea familiar o un clan, no necesariamente hijos biológicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros del clan de
  lexicon: HALOT
  rationale: En listas genealógicas posexílicas, בְּנֵי funciona como fórmula de linaje o grupo familiar. 'Los hijos de' conserva la estructura formal del texto y es una equivalencia natural en español bíblico; 'descendientes de' explicaría el sentido corporativo, pero sería menos pegado a la forma del hebreo.
- source_word: נְצִיחַ
  english_pob_choice: Neziah
  chosen_spanish: Nezías
  alternatives_spanish:
  - Netzías
  - Netsíaj
  lexicon: HALOT
  rationale: Es un nombre propio y debe transliterarse. 'Nezías' adapta la forma inglesa POB al español con una vocalización natural, manteniendo la referencia nominal sin interpretarla.
- source_word: חֲטִיפָא
  english_pob_choice: Hatipha
  chosen_spanish: Hatifa
  alternatives_spanish:
  - Hatifa
  - Hatipá
  lexicon: HALOT
  rationale: También es un nombre propio de registro genealógico. 'Hatifa' conserva cercanía fonética con la forma hebrea y resulta más natural en español que una transliteración marcada por aspiración o grafías poco usuales.
translation_notes:
  revision_awareness: El texto hebreo y la traducción auditada en inglés coinciden plenamente; no hay variantes textuales relevantes ni revisiones pendientes. Se mantiene la fórmula genealógica breve, con una nota que preserva la alternativa corporativa documentada por la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene 'hijos de' como fórmula genealógica, coherente con la práctica de POB y con el valor idiomático del hebreo.
  - Los nombres propios se transliteran de forma breve y legible para lectores hispanohablantes, evitando traducirlos o sustituirlos por equivalentes tradicionales no atestiguados.
  - No hay términos teológicos ni cambios de sentido adicionales en este versículo.
