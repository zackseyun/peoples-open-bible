revisions:
- from: 'Pero ella les dijo[a]: «No me llamen Noemí; llámenme Mara, porque el Todopoderoso me ha amargado mucho».'
  to: 'Pero ella les dijo[a]: «No me llamen Noemí; llámenme Mara, porque el Todopoderoso me ha hecho muy amarga».'
  rationale: Se revisa «me ha amargado mucho» a «me ha hecho muy amarga» para seguir más de cerca el hebreo הֵמַר, alinearse con la revisión final del inglés POB y preservar con mayor claridad el juego de palabras con «Mara». Se mejora la nota para que exprese el valor semántico de los nombres de forma más natural en español. No se requiere adjudicación adicional porque la corrección es menor y está bien sustentada por el audit trail existente.
