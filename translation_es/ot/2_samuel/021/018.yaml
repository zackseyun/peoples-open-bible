revisions:
- from: Después de esto[a], hubo otra vez guerra con los filisteos en Gob; entonces Sibecai[b] el husatita hirió a Saf[c], que era de entre los descendientes de Rapha[d].
  to: Después de esto, hubo otra vez guerra con los filisteos en Gob, y entonces Sibecai el husatita derribó a Saf[a], que era de entre los descendientes de Rapha[b].
  rationale: La revisión corrige el anclaje de la nota textual para que recaiga sobre «Saf», elimina notas léxicas secundarias no exigidas por el expediente inglés, y fortalece «hirió» a «derribó» para reflejar mejor הִכָּה en contexto bélico. También se alisa la puntuación para una lectura más natural en español sin alterar el sentido.
