translation:
  language: es
  text: '«¿Los hombres de Queila me entregarán en su mano[a]? ¿Descenderá Saúl, como ha oído tu siervo? Yahvé, Dios de Israel, por favor, díselo a tu siervo». Y Yahvé dijo: «Descenderá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en su mano», un modismo que significa en el poder de Saúl.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסְגִּרֻנִי
  english_pob_choice: hand me over
  chosen_spanish: me entregarán
  alternatives_spanish:
  - me entregarán en sus manos
  - me pondrán en poder de Saúl
  - me entregarán
  lexicon: HALOT
  rationale: La idea central es la de entregar a alguien al poder de otro. En español, «me entregarán» transmite bien esa transferencia hostil sin sonar forzado; el complemento «en su mano» ya preserva la imagen idiomática hebrea del poder/control.
- source_word: בַעֲלֵי קְעִילָה
  english_pob_choice: the men of Keilah
  chosen_spanish: los hombres de Queila
  alternatives_spanish:
  - los dueños de Queila
  - los habitantes de Queila
  - los señores de Queila
  lexicon: HALOT
  rationale: Aunque בעלי puede sugerir propietarios o señores, aquí el contexto civil apunta a los pobladores o líderes de la ciudad. «Los hombres de Queila» sigue la lectura contextual adoptada en la POB inglesa y es natural en español.
- source_word: בְיָדוֹ
  english_pob_choice: into his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en su poder
  - a él
  - bajo su poder
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de «mano» como poder o dominio. En español, «en su mano» mantiene el valor idiomático y la conexión con la frase tradicional, sin ocultar la fuerza del hebreo.
- source_word: יֵרֵד
  english_pob_choice: come down
  chosen_spanish: descenderá
  alternatives_spanish:
  - bajará
  - vendrá abajo
  - descenderá
  lexicon: HALOT
  rationale: El verbo significa literalmente «bajar/descender». Dado que la respuesta divina repite la misma forma verbal, «descenderá» preserva mejor la correspondencia verbal y el registro bíblico.
- source_word: כַּאֲשֶׁר שָׁמַע עַבְדֶּךָ
  english_pob_choice: as your servant has heard
  chosen_spanish: como ha oído tu siervo
  alternatives_spanish:
  - según ha oído tu siervo
  - tal como lo ha oído tu siervo
  - como tu siervo ha oído
  lexicon: HALOT
  rationale: La cláusula presenta la información que David ha recibido. «Como ha oído tu siervo» reproduce de forma concisa el valor comparativo y la referencia humilde de עַבְדֶּךָ.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aquí la autoidentificación ante Dios es una fórmula reverente. En español eclesial, «tu siervo» comunica mejor la relación de humilde servicio que «tu esclavo», sin perder la deferencia del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». Mantiene el nombre propio divino en vez de sustituirlo por un título, de acuerdo con la política terminológica dada.'
- source_word: הַגֶּד נָא
  english_pob_choice: please tell
  chosen_spanish: por favor, habla
  alternatives_spanish:
  - por favor, dime
  - te ruego que me digas
  - por favor, haz saber
  lexicon: HALOT
  rationale: El imperativo de נגד con נא pide una comunicación clara y urgente. En este contexto de oración, «por favor, habla» es una manera natural de expresar la petición de revelación; la alternativa más literal sería «por favor, dime/declárame».
- source_word: וַיֹּאמֶר יְהוָה
  english_pob_choice: And Yahweh said
  chosen_spanish: Yahvé dijo
  alternatives_spanish:
  - Yahvé respondió
  - Entonces Yahvé dijo
  - Yahvé contestó
  lexicon: HALOT
  rationale: La respuesta divina introduce el oráculo. Se mantiene el nombre divino y un verbo narrativo simple en español; el matiz de respuesta queda implícito por el contexto.
theological_decisions:
- issue: Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La lectura adoptada en la POB inglesa es «Yahweh». En español, la forma equivalente y de uso más amplio en traducciones modernas es «Yahvé», que preserva el nombre personal de Dios sin la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: «En su mano» como idiomático de poder
  english_pob_reading: into his hand
  chosen_spanish_reading: en su mano
  alternative_spanish_readings:
  - en su poder
  - bajo su poder
  rationale: La POB inglesa decidió conservar la imagen hebrea de «hand» para no perder la metáfora de control. El español puede mantener esa imagen de manera natural; por eso se conserva «mano» en vez de explicitar solo «poder».
  doctrine_reference: Consistencia con la decisión léxica de conservar metáforas hebreas cuando siguen siendo inteligibles
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota sin ancla. El texto español ya no incluye ningún marcador de nota y, por tanto, no requiere footnotes.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» en toda la unidad.
  - Se conserva la metáfora de «mano» para בְיָדוֹ, en paralelo con la decisión inglesa.
  - El tono de petición reverente se expresa con «por favor» y «tu siervo», en un registro bíblico moderno y claro.
  - Se usa «descenderá» para reproducir de manera consistente el verbo verbalmente repetido en la pregunta y la respuesta.
