revisions:
- from: Y te libraré[a] de la mano de hombres malos, y te redimiré[b] de la garra[c] de los violentos.
  to: Y te libraré[a] de la mano de hombres malvados, y te redimiré[b] del poder de los despiadados[c].
  rationale: Se corrige la imagen excesivamente interpretativa «garra» y se la reemplaza por «poder», que comunica bien el sentido idiomático de control hostil detrás de מִכַּף sin introducir metáfora ajena. Se reubica y corrige la nota [c] para que corresponda a עָרִצִים, conforme al audit trail inglés. También se mejora «hombres malos» a «hombres malvados» por mayor naturalidad y precisión moral en español bíblico.
