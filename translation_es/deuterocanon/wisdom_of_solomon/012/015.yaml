translation:
  language: es
  text: Pero, siendo justo, gobiernas todas las cosas justamente, considerando ajeno a tu poder[b] condenar a quien no merece ser castigado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a quien no está sujeto a castigo». El griego dice literalmente «al que no debe ser castigado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «extraño a tu poder» o «incompatible con tu poder».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo en sentido moral
  lexicon: LSJ
  rationale: El griego presenta un predicado de carácter divino que se empareja con δικαίως en la misma cláusula. En español, 'justo' conserva bien la correspondencia léxica con 'justamente' y mantiene la repetición retórica sin sonar forzado.
- source_word: δικαίως
  english_pob_choice: righteously
  chosen_spanish: justamente
  alternatives_spanish:
  - rectamente
  - con justicia
  lexicon: LSJ
  rationale: '''Justamente'' preserva el enlace cognado con δίκαιος y mantiene la idea de obrar de acuerdo con la justicia. ''Rectamente'' sería posible, pero pierde la repetición audible del original.'
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el universo entero
  lexicon: LSJ
  rationale: '''Todas las cosas'' reproduce el alcance global sin añadir una cosmología más específica de la que el griego exige.'
- source_word: διέπεις
  english_pob_choice: govern
  chosen_spanish: gobiernas
  alternatives_spanish:
  - diriges
  - administras
  - riges
  lexicon: LSJ
  rationale: '''Gobiernas'' comunica el sentido de conducción ordenada y administración sabia. Es natural en español y conserva la dimensión de gobierno providencial.'
- source_word: αὐτὸν τὸν μὴ ὀφείλοντα κολασθῆναι
  english_pob_choice: one who does not deserve to be punished
  chosen_spanish: a quien no merece ser castigado
  alternatives_spanish:
  - al que no es deudor de castigo
  - al que no está sujeto a ser castigado
  - al que no merece ser castigado
  lexicon: LSJ
  rationale: ὀφείλω con infinitivo expresa obligación o responsabilidad. 'Merece ser castigado' es la forma española más clara y fiel al sentido idiomático que la POB inglesa ya había captado.
- source_word: καταδικάσαι
  english_pob_choice: to condemn
  chosen_spanish: condenar
  alternatives_spanish:
  - sentenciar
  - declarar culpable
  lexicon: LSJ
  rationale: El verbo es judicial. 'Condenar' conserva la fuerza legal y moral del término sin suavizarlo.
- source_word: ἀλλότριον
  english_pob_choice: foreign
  chosen_spanish: ajeno
  alternatives_spanish:
  - extraño
  - ajeno a
  - incompatible
  lexicon: LSJ
  rationale: '''Ajeno'' reproduce muy bien la idea de algo no propio ni conforme a la naturaleza del sujeto. En español suena natural con ''a tu poder'' y conserva la metáfora de extrañeza o no pertenencia.'
- source_word: ἡγούμενος
  english_pob_choice: considering
  chosen_spanish: considerando
  alternatives_spanish:
  - teniendo por
  - juzgando
  - estimando
  lexicon: LSJ
  rationale: Es un participio de evaluación mental. 'Considerando' es la opción más directa y transparente en español.
- source_word: τῆς σῆς δυνάμεως
  english_pob_choice: your power
  chosen_spanish: tu poder
  alternatives_spanish:
  - tu fuerza
  - tu autoridad
  lexicon: LSJ
  rationale: '''Poder'' conserva la amplitud de δύναμις sin restringirlo a fuerza física ni reducirlo a autoridad jurídica.'
theological_decisions:
- issue: Relación entre justicia divina y poder divino
  english_pob_reading: The verse states that condemning the innocent is contrary to God's power/character, not that power is arbitrary.
  chosen_spanish_reading: El verso afirma que condenar al inocente es ajeno al poder de Dios, no que su poder sea arbitrario.
  alternative_spanish_readings:
  - '...es indigno de tu poder...'
  - '...es incompatible con tu poder...'
  rationale: '''Ajeno a tu poder'' deja intacta la tensión teológica del original: la justicia de Dios no se presenta como un adorno externo, sino como algo coherente con su poder. Evita explicar demasiado el vínculo entre poder y carácter.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: Este borrador sigue el pasaje griego de la edición Swete 1909 y el rastro de auditoría inglés sin depender mecánicamente de la formulación inglesa. No hay revisiones aplicadas en la versión fuente; se conserva la misma decisión de sentido y el mismo equilibrio entre justicia, gobierno y poder.
  spanish_consistency_notes:
  - Se mantuvo la repetición léxica de la familia δικ- con «justo/justamente» para reflejar la estructura retórica del griego.
  - Se eligió «ajeno» para ἀλλότριον porque en español sostiene bien la noción de algo no propio o no correspondiente sin requerir una paráfrasis más larga.
  - «Condenar» y «castigar» se diferenciaron para respetar la distinción entre el acto judicial de condena y la pena resultante.
  - No se usó «SEÑOR» ni terminología litúrgica ajena al texto; el versículo no contiene el nombre divino explícito en esta forma griega.
