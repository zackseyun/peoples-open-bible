translation:
  language: es
  text: 'Y Dios salió al encuentro de Balaam[a], y él le dijo: «He dispuesto los siete altares y he ofrecido un toro y un carnero sobre el altar[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios se encontró con Balaam»; el verbo hebreo puede expresar un encuentro y, en algunos contextos, también un matiz de acontecer o de dar con alguien.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «sobre el altar» en singular; el sentido distributivo («sobre cada altar») se entiende por el contexto de los siete altares.
    reason: source_note
lexical_decisions:
- source_word: וַיִּקָּר / met
  english_pob_choice: met Balaam
  chosen_spanish: se encontró con Balaam
  alternatives_spanish:
  - se encontró con
  - encuentró a Balaam
  - le salió al encuentro
  lexicon: HALOT
  rationale: El verbo puede expresar un encuentro real y, según el contexto, también puede sugerir un acontecer. En español, «se encontró con» comunica un encuentro divino sin introducir una idea de casualidad excesiva ni volverla demasiado técnica.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Con verbo singular y referente claro, el título plural hebreo funciona aquí como singular divino; en español, «Dios» es la forma natural y precisa.
- source_word: אֶל בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - a Balaam
  lexicon: standard transliteration
  rationale: Se conserva el nombre propio tradicional en transliteración, con el dativo implícito en la construcción verbal española.
- source_word: וַיֹּאמֶר אֵלָיו
  english_pob_choice: and he said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y dijo a él
  - y le habló
  lexicon: HALOT
  rationale: El sujeto de la palabra citada es Balaam; el pronombre clítico «le» mantiene claridad y fluidez sin añadir contenido.
- source_word: אֶת שִׁבְעַת הַמִּזְבְּחֹת
  english_pob_choice: the seven altars
  chosen_spanish: los siete altares
  alternatives_spanish:
  - siete altares
  lexicon: HALOT
  rationale: El marcador de objeto y el sustantivo definido apuntan a un grupo específico ya mencionado en el contexto; el artículo español lo refleja bien.
- source_word: עָרַכְתִּי
  english_pob_choice: I have arranged
  chosen_spanish: he dispuesto
  alternatives_spanish:
  - he arreglado
  - he preparado
  - he puesto en orden
  lexicon: HALOT
  rationale: «Disponer» conserva la idea de ordenar/preparar y suena natural en español cultual. «He preparado» sería posible, pero pierde algo de la noción de ordenamiento.
- source_word: וָאַעַל
  english_pob_choice: and offered
  chosen_spanish: he ofrecido
  alternatives_spanish:
  - he subido
  - he sacrificado
  - he alzado
  lexicon: HALOT
  rationale: En contexto sacrificial, עלה puede significar «ofrecer»; el perfecto compuesto español expresa la acción completada con relevancia inmediata en el relato.
- source_word: פָּר
  english_pob_choice: a bull
  chosen_spanish: un toro
  alternatives_spanish:
  - un novillo
  - un buey
  lexicon: HALOT
  rationale: «Toro» es una equivalencia clara y digna en español para el animal sacrificial, sin añadir la especificación de edad que el hebreo no requiere explícitamente aquí.
- source_word: וָאַיִל
  english_pob_choice: and a ram
  chosen_spanish: y un carnero
  alternatives_spanish:
  - y un macho cabrío
  - y un cordero macho
  lexicon: HALOT
  rationale: «Carnero» corresponde al uso sacrificial normal de איל y mantiene la simetría con «toro».
- source_word: בַּמִּזְבֵּחַ
  english_pob_choice: on each altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - sobre cada altar
  - en el altar
  lexicon: HALOT
  rationale: El hebreo tiene singular con artículo; por fidelidad al texto base, el español conserva el singular. La distribución implícita queda sugerida por el contexto de los siete altares sin expandirla en la línea principal.
theological_decisions:
- issue: Naturaleza del encuentro divino en וַיִּקָּר
  english_pob_reading: Render as a real divine meeting without suggesting randomness
  chosen_spanish_reading: Se expresa como un encuentro real de Dios con Balaam, sin insinuar azar puro
  alternative_spanish_readings:
  - Dios ocurrió con Balaam
  - Dios aconteció a Balaam
  - Dios se le apareció a Balaam
  rationale: El hebreo puede tener un matiz de acontecer, pero en este contexto narrativo no conviene sugerir casualidad. «Se encontró con» conserva la idea de encuentro efectivo y deja abierta la tensión lexical sin borrarla.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación entre el singular final «el altar» y los siete altares previos
  english_pob_reading: The English revision expanded distributively to 'each altar'
  chosen_spanish_reading: Se mantiene el singular «el altar» en el texto principal
  alternative_spanish_readings:
  - sobre cada altar
  - sobre los altares
  rationale: El hebreo final usa singular definido; aunque el contexto sugiere una distribución entre los siete altares, el español principal no debe resolver de manera más explícita de lo que el texto dice. La nota puede señalar la lectura distributiva implícita.
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió la redacción a una forma más directa de encuentro y añadió un matiz distributivo en «each altar». En español se preserva el encuentro directo con una formulación natural y se mantiene el singular del final para seguir más de cerca el hebreo, dejando el valor distributivo en nota.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים con verbo singular.
  - Se evita «SEÑOR» porque el texto hebreo no contiene יהוה.
  - Se traduce עלה en contexto sacrificial como «ofrecer».
  - Se conserva la tensión lexical de וַיִּקָּר mediante una nota de alternativa.
  - Se mantiene un registro culto, claro y publicable, sin calcos innecesarios.
