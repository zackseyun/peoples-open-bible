id: 2CO.5.21
reference: 2 Corinthians 5:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀τὸν μὴ γνόντα ἁμαρτίαν ὑπὲρ ἡμῶν ἁμαρτίαν ἐποίησεν, ἵνα ἡμεῖς γενώμεθα δικαιοσύνη θεοῦ ἐν αὐτῷ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/021.yaml
  text: He made the one who did not know sin to be sin for us, so that in him we might become the righteousness of God.
  footnotes:
  - marker: a
    text: Or 'sin offering.' The Greek says 'sin' both times; some understand the second occurrence sacrificially.
    reason: alternative_reading
  - marker: b
    text: Or 'justice of God' or 'righteousness from God.'
    reason: lexical_alternative
translation:
  language: ko
  text: 하나님께서는 죄를 알지 못하신 분을 우리를 위하여 죄로 삼으셨으니, 이는 우리가 그분 안에서 하나님의 의가 되게 하려는 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὴ γνόντα ἁμαρτίαν
  english_pob_choice: did not know sin
  chosen_korean: 죄를 알지 못하신 분
  alternatives_korean:
  - 죄를 알지 못한 자
  lexicon: BDAG
  rationale: 메시아의 죄 없음 — 합쇼체 존칭 「분」.
- source_word: ἁμαρτίαν ἐποίησεν
  english_pob_choice: made ... to be sin
  chosen_korean: 죄로 삼으셨다
  alternatives_korean:
  - 죄가 되게 하셨다
  - 속죄제로 삼으셨다
  lexicon: BDAG
  rationale: '본 어구는 해석사의 핵심 격전지: (a) 죄 자체로 삼다 — 가장 직접적 읽기 (b) 속죄제로 삼다 — 레위기 LXX에서 ἁμαρτία가 「속죄제」를 가리키는 용례 근거 (c) 죄로 여기다 — 법정적 전가. 본문은 (a)의 직접성을 그대로 보존하여 「죄로 삼으셨다」로 옮기며, 「속죄제로 삼다」로 자동 완화하지 않는다.'
- source_word: δικαιοσύνη θεοῦ
  english_pob_choice: the righteousness of God
  chosen_korean: 하나님의 의
  alternatives_korean: []
  lexicon: BDAG
  rationale: 바울 칭의 신학의 정립 어휘.
theological_decisions:
- issue: 5:21 ὑπὲρ ἡμῶν ἁμαρτίαν ἐποίησεν의 직접성 보존 — 「죄로 삼으셨다」 vs 「속죄제로 삼으셨다」
  chosen_reading: 하나님께서는 죄를 알지 못하신 분을 우리를 위하여 죄로 삼으셨으니
  alternative_readings:
  - 그를 우리를 위하여 속죄제로 삼으셨으니 (LXX 레위기의 ἁμαρτία = 속죄제 용례 근거)
  - 그를 우리를 위하여 죄로 여기셨으니 (법정적 전가만)
  rationale: '본문 어구의 lexical 역사: (1) 헬라어 ἁμαρτία는 LXX 레위기에서 종종 「속죄제」(חַטָּאת)를 가리키며, 일부 주석가들은 본 절에서도 「속죄제로 삼으셨다」로 읽는다 (예: N.T. Wright). (2) 그러나 (a) 본 절은 레위기 인용이나 직접 인유가 명시되지 않음 (b) 「죄를 알지 못하신 분」과의 대비는 「죄」의 동일 의미를 전제로 함 (c) 바울이 「속죄제」를 의도했다면 명시할 수 있었음 — 등의 근거로 「죄로 삼으셨다」가 본문의 직접 읽기로 폭넓게 지지받는다. 본 번역은 본문의 어려움과 직접성을 그대로 보존하여 「죄로 삼으셨다」로 옮기며, 「속죄제」로 자동 완화하지 않는다. 한국 전통 번역(개역개정 등)도 「죄로 삼으신 것은」으로 직접성을 보존해 왔다.'
  doctrine_reference: DOCTRINE.md §1 source-primacy; preserve difficult statements; do not soften
