translation:
  language: es
  text: Y también los vasos de la casa de Dios[a], de oro y de plata, que Nabucodonosor sacó del templo que estaba en Jerusalén y llevó a Babilonia, sean devueltos y llevados al templo que está en Jerusalén, cada uno a su debido lugar; y tú los pondrás en la casa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sean restituidos, y que cada uno sea llevado al templo que está en Jerusalén, a su lugar». La construcción aramea alrededor de esta cláusula es algo difícil, pero el sentido general es la restauración de los vasos del templo a sus lugares correspondientes en Jerusalén.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַף
  english_pob_choice: And also
  chosen_spanish: Y también
  alternatives_spanish:
  - Además
  - Y además
  lexicon: HALOT
  rationale: La partícula aditiva introduce un elemento נוסף del decreto; "Y también" conserva la suma de ideas con español natural y sobrio.
- source_word: מָאנֵי
  english_pob_choice: vessels
  chosen_spanish: vasos
  alternatives_spanish:
  - utensilios
  - vasijas
  lexicon: HALOT
  rationale: En contexto cultual, el término abarca objetos sagrados del templo. "Vasos" es amplio y natural en español bíblico contemporáneo, sin perder el valor de objetos litúrgicos.
- source_word: בֵית אֱלָהָא
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se conserva la expresión literal del arameo para mantener la distinción con הֵיכְלָא, que aquí sí se vierte como "templo".
- source_word: דִּי דַהֲבָה וְכַסְפָּא
  english_pob_choice: gold and silver
  chosen_spanish: de oro y de plata
  alternatives_spanish:
  - de oro y plata
  - oro y plata
  lexicon: HALOT
  rationale: La construcción aramea describe la materia de los vasos. En español, el genitivo se expresa mejor con "de oro y de plata" para evitar rigidez y mantener claridad.
- source_word: הַנְפֵּק
  english_pob_choice: took out
  chosen_spanish: sacó
  alternatives_spanish:
  - extrajo
  - quitó
  lexicon: HALOT
  rationale: El verbo indica retirar desde el templo. "Sacó" comunica bien la acción histórica sin tecnicismo excesivo.
- source_word: הֵיכְלָא
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - palacio
  - santuario
  lexicon: HALOT
  rationale: En este pasaje el referente es el templo de Jerusalén, no un palacio real; "templo" preserva la referencia espacial y cultual.
- source_word: וְהֵיבֵל
  english_pob_choice: brought
  chosen_spanish: llevó
  alternatives_spanish:
  - trajó
  - transportó
  lexicon: HALOT
  rationale: La acción de traslado hacia Babilonia se expresa de forma natural con "llevó".
- source_word: יַהֲתִיבוּן
  english_pob_choice: be returned
  chosen_spanish: sean devueltos
  alternatives_spanish:
  - sean restituidos
  - sean restaurados
  lexicon: HALOT
  rationale: 'El sentido es restitutivo: que vuelvan a su lugar legítimo. "Sean devueltos" conserva la pasiva/jussiva del decreto sin añadir interpretación doctrinal.'
- source_word: וִיהָךְ
  english_pob_choice: let each be brought
  chosen_spanish: y llevados
  alternatives_spanish:
  - y que cada uno vaya
  - y que sean llevados
  lexicon: HALOT
  rationale: El arameo es difícil aquí; la POB inglesa opta por una solución distributiva. En español, "y llevados" enlaza con "sean devueltos" y permite entender la restitución hacia el templo de Jerusalén.
- source_word: לְאַתְרֵהּ
  english_pob_choice: to its place
  chosen_spanish: a su lugar
  alternatives_spanish:
  - a su sitio
  - a su debido lugar
  lexicon: HALOT
  rationale: La frase alude al lugar apropiado de cada objeto dentro del templo. "A su lugar" es conciso y fiel.
- source_word: וְתַחֵת
  english_pob_choice: and you shall put them
  chosen_spanish: y tú los pondrás
  alternatives_spanish:
  - y los colocarás
  - y tú los colocarás
  lexicon: HALOT
  rationale: La segunda persona singular se conserva como mandato dirigido a un funcionario. "Pondrás" es directo y transparente en español.
- source_word: בְּבֵית אֱלָהָא
  english_pob_choice: in the house of God
  chosen_spanish: en la casa de Dios
  alternatives_spanish:
  - en el templo de Dios
  lexicon: HALOT
  rationale: Se repite la misma expresión que al inicio para mantener la correspondencia lexical del arameo y la estructura del mandato.
theological_decisions:
- issue: Distinción entre "casa de Dios" y "templo"
  english_pob_reading: The POB preserves "house of God" for בֵית אֱלָהָא and "temple" for הֵיכְלָא.
  chosen_spanish_reading: Conservar "casa de Dios" para בֵית אֱלָהָא y "templo" para הֵיכְלָא.
  alternative_spanish_readings:
  - usar "templo" en ambas expresiones
  - usar "casa" y "templo" indistintamente
  rationale: La diferencia léxica del arameo es significativa y el texto la mantiene. Reproducirla en español ayuda a no borrar la tensión/documentación del original entre la morada de Dios y el edificio del templo.
  doctrine_reference: Lexical transparency / temple terminology
- issue: Forma restitutiva del decreto
  english_pob_reading: be returned and brought ... each to its place
  chosen_spanish_reading: sean devueltos y llevados ... cada uno a su lugar
  alternative_spanish_readings:
  - sean restaurados y traídos
  - sean restituidos y llevados
  rationale: El pasaje ordena la devolución de objetos sagrados a sus emplazamientos propios. "Devueltos" y "llevados" mantienen el doble movimiento de regreso y reinstalación sin sobreinterpretar el texto.
  doctrine_reference: Textual/imperatival force
translation_notes:
  revision_awareness: La versión inglesa revisada afinó la relación entre 'be returned' y 'brought ... each to its place', evitando un calco torpe. La redacción española sigue esa revisión al unir "sean devueltos y llevados" y al explicitar "cada uno a su lugar".
  spanish_consistency_notes:
  - Se mantiene "Y también" para la partícula aditiva inicial.
  - Se preserva la distinción terminológica "casa de Dios" / "templo".
  - Se usa "Dios" y no una sustitución reverencial encubridora, conforme al criterio del proyecto.
  - La segunda persona singular de la orden final se expresa con "tú los pondrás".
