translation:
  language: es
  text: Y miré[a], y he aquí había tendones sobre ellos, y la carne había subido, y la piel los cubría desde arriba; pero no había aliento[b] en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede significar «vi» o «miré». Aquí se prefiere «miré» para mantener el carácter de observación visionaria.
    reason: lexical_alternative
  - marker: b
    text: El hebreo רוּחַ puede significar «aliento», «viento» o «espíritu». Aquí «aliento» encaja mejor con los cuerpos aún sin vida, pero el pasaje más amplio juega con los tres sentidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתִי
  english_pob_choice: And I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - Y vi
  lexicon: HALOT
  rationale: En primera persona, ראה puede expresarse como 'ver' o 'mirar'. 'Miré' conserva mejor el acto consciente de observar en la visión profética y suena natural en español narrativo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: Es un marcador discursivo de sorpresa e intensidad. 'He aquí' reproduce bien ese golpe visual y solemne sin volverlo demasiado coloquial.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - sobre
  lexicon: HALOT
  rationale: La preposición על con sufijo indica colocación sobre la estructura reconstituida. 'Sobre ellos' es claro y fiel en español.
- source_word: גִּדִים
  english_pob_choice: sinews
  chosen_spanish: tendones
  alternatives_spanish:
  - nervios
  - sienes
  lexicon: HALOT
  rationale: El término alude a tejidos conectivos del cuerpo. En español moderno, 'tendones' comunica mejor la imagen anatómica que 'sinews', sin perder el sentido.
- source_word: וּבָשָׂר עָלָה
  english_pob_choice: and flesh had come up
  chosen_spanish: y la carne había subido
  alternatives_spanish:
  - y la carne había crecido
  - y la carne había brotado
  lexicon: HALOT
  rationale: בשר es 'carne'. עלה aquí expresa que la carne va apareciendo/levantándose sobre los huesos; 'había subido' sigue de cerca el movimiento del hebreo y mantiene el orden de la visión.
- source_word: וַיִּקְרַם
  english_pob_choice: and skin covered
  chosen_spanish: y la piel los cubría
  alternatives_spanish:
  - y la piel se extendía sobre ellos
  - y la piel se formó sobre ellos
  lexicon: HALOT
  rationale: קרם describe la formación o cobertura de una capa. 'Los cubría' es la forma española más natural y conserva el resultado visible de la acción.
- source_word: עוֹר
  english_pob_choice: skin
  chosen_spanish: la piel
  alternatives_spanish:
  - el pellejo
  lexicon: HALOT
  rationale: En contexto corporal humano, עוֹר significa 'piel'. 'Piel' es el equivalente normal y más inteligible en español.
- source_word: מִלְמָעְלָה
  english_pob_choice: from above
  chosen_spanish: desde arriba
  alternatives_spanish:
  - por encima
  - de arriba
  lexicon: HALOT
  rationale: La frase indica cobertura desde la parte superior o exterior. 'Desde arriba' conserva la dirección sin sonar forzado.
- source_word: וְרוּחַ אֵין בָּהֶם
  english_pob_choice: but there was no breath in them
  chosen_spanish: pero no había espíritu en ellos
  alternatives_spanish:
  - pero no había aliento en ellos
  - pero no había vida en ellos
  - pero no había viento en ellos
  lexicon: HALOT
  rationale: 'רוּחַ tiene un campo semántico triple: soplo/aliento, viento y espíritu. Dado el rango bíblico y la tensión teológica del pasaje, ''espíritu'' preserva esa ambigüedad mejor que una sola glosa fisiológica, sin negar que el cuerpo aún está sin vida.'
theological_decisions:
- issue: Cómo traducir רוּחַ en el valle de huesos secos
  english_pob_reading: breath
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - aliento
  - viento
  rationale: El inglés POB eligió 'breath' por el estado de los cuerpos reconstituidos, pero también preservó la amplitud semántica en nota. En español, 'espíritu' deja abierta la relación con vida, soplo y Espíritu divino en el contexto amplio de Ezequiel 37, sin resolver prematuramente la tensión.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó el 'over' redundante en la frase sobre la piel; por eso el español dice simplemente 'la piel los cubría desde arriba', sin añadir un equivalente innecesario. También se respetó la decisión final de mantener 'breath' como lectura principal en inglés, aunque en español se optó por 'espíritu' para preservar la tensión semántica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis narrativa directa y solemne, adecuada para una visión profética.
  - Se usó 'carne' y no una paráfrasis como 'tejido' para no diluir el hebreo בשר.
  - No se introdujo 'SEÑOR' ni otras convenciones de ocultamiento del nombre divino, porque el versículo no contiene el Tetragrámaton.
  - La nota sobre רוּחַ explica la ambigüedad sin resolverla de forma doctrinalmente reductiva.
