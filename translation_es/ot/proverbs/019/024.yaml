    rationale: '''No la volverá a su boca'' es entendible, pero en español natural el movimiento de retorno se expresa mejor con ''volver a llevar'' o ''llevar de nuevo''.'
  revised_spanish_text: El perezoso entierra[a] su mano en el plato[b]; ni siquiera la vuelve a llevar a su boca.
