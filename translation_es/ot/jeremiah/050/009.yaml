revisions:
- from: Porque, he aquí, yo despierto y hago subir contra Babilonia una asamblea de grandes naciones desde la tierra del norte. Se dispondrán contra ella; desde allí será capturada. Sus flechas son como las de un guerrero hábil[a]; no volverá vacío[b].
  to: Porque, he aquí, yo incito y hago subir contra Babilonia una asamblea de grandes naciones desde la tierra del norte. Se dispondrán contra ella; desde allí será capturada. Sus flechas son como las de un guerrero hábil[a]; ninguna vuelve vacía[b].
  rationale: 'Se revisó «despierto» a «incito» para expresar mejor en español la idea de suscitar naciones para la guerra. Se cambió la cláusula final a «ninguna vuelve vacía» para evitar un sujeto singular engañoso y mantener la eficacia de las flechas como imagen inmediata. También se alinearon las notas con el audit trail inglés: la nota [a] conserva la alternativa literal de la comparación comprimida, y la nota [b] explica «desde allí» en el lugar correspondiente del texto.'
  reviewer_model: gpt-5.4
