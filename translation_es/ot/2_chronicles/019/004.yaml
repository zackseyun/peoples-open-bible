revisions:
- from: Así, Josafat habitó en Jerusalén[a], y volvió a salir entre el pueblo desde Beerseba hasta la región montañosa de Efraín, y los hizo volver a Yahvé[b], el Dios de sus padres.
  to: Así, Josafat vivió en Jerusalén[a], y volvió a salir entre el pueblo desde Beerseba hasta la región montañosa de Efraín, y los hizo volver a Yahvé[b], el Dios de sus padres.
  rationale: Se cambia «habitó» por «vivió» para ajustarse mejor a la naturalidad moderna y al rationale documentado en el audit trail inglés para ישב. Se conserva el resto, porque refleja fielmente el hebreo y la terminología del proyecto. La nota b se mantiene con una formulación editorialmente clara y compatible con la preferencia española por «Yahvé».
