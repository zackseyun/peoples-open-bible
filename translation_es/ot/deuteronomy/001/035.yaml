translation:
  language: es
  text: Ningún hombre[a] de entre estos hombres de esta generación mala verá la buena tierra que juré dar a vuestros padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «antepasados». Hebreo: «a vuestros padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם יִרְאֶה אִישׁ
  english_pob_choice: Not one man ... shall see
  chosen_spanish: Ningún hombre[a] ... verá
  alternatives_spanish:
  - No un hombre ... verá
  - Ninguna persona ... verá
  lexicon: HALOT
  rationale: La frase hebrea funciona aquí como una fórmula negativa enfática, no como una condición simple. En español, «Ningún hombre ... verá» conserva la fuerza distributiva de «Not one man ... shall see» y mantiene el tono judicial del pasaje.
- source_word: בָּאֲנָשִׁים הָאֵלֶּה
  english_pob_choice: among these men
  chosen_spanish: de entre estos hombres
  alternatives_spanish:
  - entre estos hombres
  - de estos hombres
  lexicon: HALOT
  rationale: El ב partitivo se expresa de forma natural con «de entre». Así se preserva la referencia al grupo específico del desierto sin perder fluidez en español.
- source_word: הַדּוֹר הָרָע הַזֶּה
  english_pob_choice: this evil generation
  chosen_spanish: esta generación mala
  alternatives_spanish:
  - esta generación malvada
  - esta generación perversa
  lexicon: HALOT
  rationale: «דור» es «generación». Para «רע», «mala» es fiel y claro en español; evita intensificar más allá del hebreo, que sí marca una cualidad moral negativa pero no exige necesariamente una equivalencia más fuerte.
- source_word: הָאָרֶץ הַטּוֹבָה
  english_pob_choice: the good land
  chosen_spanish: la buena tierra
  alternatives_spanish:
  - la tierra buena
  - la tierra hermosa
  lexicon: HALOT
  rationale: «La buena tierra» es una traducción directa y natural del sintagma nominal hebreo, y conserva el valor covenantal de la tierra prometida sin añadir matices no presentes en el texto.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: that I swore
  chosen_spanish: que juré
  alternatives_spanish:
  - que prometí con juramento
  - que hice juramento de
  lexicon: HALOT
  rationale: «נשבע» implica juramento solemne. «Juré» es breve, idiomático y suficientemente solemne en español; no hace falta expandirlo más allá del alcance del hebreo.
- source_word: לָתֵת
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - entregar
  - conceder
  lexicon: HALOT
  rationale: El verbo básico «dar» corresponde directamente a נתן y evita sobreinterpretar con «conceder», que puede sonar más interpretativo en este contexto.
- source_word: לַאֲבֹתֵיכֶם
  english_pob_choice: to your fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a vuestros padres». En español, el referente colectivo queda claro con «sus padres» en el discurso narrativo, manteniendo la referencia a los antepasados patriarcales. La nota preserva la alternativa «antepasados» sin sustituir el texto principal.
theological_decisions:
- issue: Mantenimiento de «padres» frente a neutralización a «antepasados»
  english_pob_reading: to your fathers
  chosen_spanish_reading: a sus padres
  alternative_spanish_readings:
  - a sus antepasados
  rationale: El hebreo es explícitamente masculino plural y el POB inglés retiene esa forma en el texto principal. En español, «padres» reproduce con fidelidad la formulación del original; «antepasados» se conserva como alternativa léxica en nota para el lector que necesite explicitar el referente histórico.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El pasaje coincide con el contexto auditado del inglés POB y no requiere revisión adicional: la negación enfática, el sustantivo generacional y la referencia a los padres/antepasados se mantienen de forma coherente con el texto fuente y con el último pase de revisión, que no introdujo cambios.'
  spanish_consistency_notes:
  - He mantenido el orden semántico del hebreo sin calco excesivo, usando una negación enfática natural en español.
  - «Hombres» conserva la referencia masculina del hebreo y del inglés POB; la nota permite la lectura más amplia «antepasados» sin reemplazar el texto principal.
  - «Buena tierra» y «generación mala» reflejan el valor léxico básico de los adjetivos hebreos sin intensificación innecesaria.
  - El marcador [a] está anclado en «hombre» para señalar la alternativa sobre לַאֲבֹתֵיכֶם sin duplicar notas.
