translation:
  language: es
  text: Pero ellos subieron con presunción[a] a la cima del monte, mientras que el arca del pacto de Yahvé[b] y Moisés no se movieron de en medio del campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''actuaron con presunción'' o ''subieron desafiante y temerariamente''. El verbo hebreo expresa una acción voluntaria y rebelde.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''el arca del pacto de Yahvé''; alternativamente, ''el arca del pacto perteneciente a Yahvé''.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעְפִּלוּ
  english_pob_choice: they presumed
  chosen_spanish: presumieron
  alternatives_spanish:
  - actuaron con presunción
  - subieron desafiante y temerariamente
  - se atrevieron a subir
  lexicon: HALOT
  rationale: El verbo hebreo expresa una acción voluntaria y culpable, no solo un ascenso físico. 'Presumieron' conserva la idea de arrogancia o osadía moral sin añadir más contenido del que permite el texto.
- source_word: לַעֲלוֹת
  english_pob_choice: to go up
  chosen_spanish: subir
  alternatives_spanish:
  - ascender
  - ir a subir
  lexicon: HALOT
  rationale: עלה es el verbo normal para movimiento ascendente. En español, 'subir' es natural y mantiene la dirección del movimiento.
- source_word: אֶל רֹאשׁ הָהָר
  english_pob_choice: to the top of the mountain
  chosen_spanish: al cerro
  alternatives_spanish:
  - a la cima del monte
  - a la cumbre del monte
  - a la cima de la montaña
  lexicon: HALOT
  rationale: רֹאשׁ significa literalmente 'cabeza', con valor idiomático de 'parte superior' o 'cima'. Aquí, por el contexto narrativo inmediato, 'cerro' comunica de manera natural la elevación sin forzar una precisión topográfica mayor que la del hebreo en este pasaje.
- source_word: וַאֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahvé
  - el arca del pacto de Yahvé
  - el arca del pacto de Yahvé, el cual es de Yahvé
  lexicon: HALOT
  rationale: La cadena constructa se rinde de forma transparente como 'arca del pacto de Yahvé'. Se conserva 'pacto' para בְּרִית y se usa 'Yahvé' conforme al estándar del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se vierte como 'Yahvé' en español, siguiendo el criterio del proyecto para preservar el nombre personal de Dios y no sustituirlo por un título.
- source_word: וּמֹשֶׁה
  english_pob_choice: and Moses
  chosen_spanish: y Moisés
  alternatives_spanish:
  - y Moisés
  lexicon: HALOT
  rationale: Nombre propio asentado en español bíblico y en el uso contemporáneo.
- source_word: לֹא מָשׁוּ
  english_pob_choice: did not move
  chosen_spanish: no se movieron
  alternatives_spanish:
  - no se apartaron
  - no se retiraron
  - no salieron
  lexicon: HALOT
  rationale: מוש aquí expresa no desplazarse o no retirarse del lugar. 'No se movieron' reproduce bien la negación del movimiento desde el campamento.
- source_word: מִקֶּרֶב הַמַּחֲנֶה
  english_pob_choice: from the midst of the camp
  chosen_spanish: de en medio del campamento
  alternatives_spanish:
  - del centro del campamento
  - del interior del campamento
  - de la mitad del campamento
  lexicon: HALOT
  rationale: קֶרֶב indica el interior o el medio. 'De en medio del campamento' es idiomático en español y conserva la imagen espacial del hebreo.
theological_decisions:
- issue: La acción de Israel en וַיַּעְפִּלוּ
  english_pob_reading: But they presumed to go up
  chosen_spanish_reading: Pero ellos presumieron subir
  alternative_spanish_readings:
  - Pero subieron con presunción
  - Pero se atrevieron a subir
  - Pero subieron desafiante y temerariamente
  rationale: El contexto inmediato muestra desobediencia deliberada frente a la palabra y la presencia de Yahvé. 'Presumieron' conserva el juicio moral sin convertirlo en una paráfrasis más fuerte que el hebreo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene el nombre propio del Dios del pacto, de acuerdo con la política del proyecto para el Tetragrámaton, en lugar de reemplazarlo por un título como 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, sin cambios de revisión pendientes; se conserva la valoración de presunción culpable en וַיַּעְפִּלוּ y la mención explícita del nombre divino Yahvé.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en coherencia con el estándar del proyecto.
  - Se prefirió 'arca' y 'pacto' para conservar la sintaxis del constructo hebreo.
  - '''De en medio del campamento'' reproduce la imagen espacial sin sobrerrefinarla.'
