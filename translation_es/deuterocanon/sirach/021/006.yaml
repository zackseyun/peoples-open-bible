translation:
  language: es
  text: El que odia la reprensión[a] está en la huella de un pecador, pero el que teme al Señor volverá en su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «está en el rastro de un pecador». El griego de la primera cláusula es elíptico y no expresa un verbo finito; el español suple de forma natural la relación implícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: μισῶν
  english_pob_choice: one who hates
  chosen_spanish: el que odia
  alternatives_spanish:
  - quien odia
  - el que aborrece
  lexicon: BDAG
  rationale: El participio funciona como sustantivo para describir un tipo de persona; en español, "el que odia" conserva ese valor caracterizador de manera natural. "Aborrece" es posible, pero suena más intenso de lo que el contexto exige.
- source_word: ἐλεγμὸν
  english_pob_choice: reproof
  chosen_spanish: reprensión
  alternatives_spanish:
  - reproche
  - corrección
  - amonestación
  lexicon: LSJ
  rationale: En literatura sapiencial, ἐλεγμός es una corrección verbal o censura moral. "Reprensión" mantiene bien ese campo semántico en español sin cargarlo excesivamente hacia condena o castigo.
- source_word: ἐν ἴχνει
  english_pob_choice: is in the track of
  chosen_spanish: está en la senda de
  alternatives_spanish:
  - está en la huella de
  - sigue la senda de
  - va tras las huellas de
  lexicon: LSJ
  rationale: La imagen literal es la de estar en la huella o rastro de alguien. En español, "está en la senda de" comunica la metáfora de trayectoria y conserva la idea de seguir el camino de otro, sin añadir el verbo explícito de caminar que no está en el griego.
- source_word: ἁμαρτωλοῦ
  english_pob_choice: a sinner
  chosen_spanish: un pecador
  alternatives_spanish:
  - el pecador
  - un hombre pecador
  lexicon: BDAG
  rationale: El singular funciona de modo genérico; "un pecador" preserva la caracterización sapiencial sin convertirla en referencia a una persona específica.
- source_word: ὁ φοβούμενος Κύριον
  english_pob_choice: one who fears the Lord
  chosen_spanish: el que teme al Señor
  alternatives_spanish:
  - quien teme al Señor
  - el que teme a Yahvé
  lexicon: BDAG
  rationale: El participio sustantivado se rinde de forma natural como "el que teme". Aunque el proyecto suele usar "Yahvé" para יהוה, aquí el texto griego dice Κύριον y el audit trail inglés mantiene "Lord"; "Señor" conserva esa equivalencia reverente sin forzar una identificación explícita con el nombre divino en el texto principal.
- source_word: ἐπιστρέψει
  english_pob_choice: will turn back
  chosen_spanish: se volverá
  alternatives_spanish:
  - volverá
  - se convertirá
  - volverá atrás
  lexicon: BDAG
  rationale: El futuro de ἐπιστρέφω puede ser "volverse/volver". "Se volverá" es idiomático en español y conserva la idea de retorno interior; no se traduce como "se arrepentirá" porque el contexto resalta el giro de la disposición, no un término técnico de arrepentimiento.
- source_word: ἐν καρδίᾳ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en el corazón
  - interiormente
  lexicon: BDAG
  rationale: La expresión semítica/antropológica se preserva con "en su corazón". Aunque el griego carece de un posesivo explícito, el español requiere concordancia natural y mantiene el sentido interior del giro.
theological_decisions:
- issue: Rendición de Κύριος en un dicho sapiencial de Sirácide
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Dueño
  - Maestro
  rationale: El audit trail inglés adopta "Lord" para κύριος, y en este contexto sapiencial dirigido a Dios, "Señor" es el equivalente español más fiel y reverente. Se evita "Yahvé" en el cuerpo principal porque el griego cita κύριος y no el tetragrámaton hebreo aquí; también se evita "Dueño/Maestro" por no corresponder al registro devocional del pasaje.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord / equivalencia reverente en español'
- issue: Valor de ἐπιστρέψει en relación con la disposición interior
  english_pob_reading: will turn back in his heart
  chosen_spanish_reading: se volverá en su corazón
  alternative_spanish_readings:
  - se arrepentirá en su corazón
  - volverá en su corazón
  - cambiará de mente en su corazón
  rationale: La lectura inglesa conserva el movimiento de retorno y lo sitúa interiormente. En español, "se volverá en su corazón" mantiene la imagen sin introducir de forma innecesaria la terminología técnica de arrepentimiento, que podría ir más allá del griego en este contexto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «walks in the track» a «is in the track» para ajustarse mejor a la elipsis del griego. En español, «está en la senda de» sigue esa revisión y evita añadir un verbo de caminar que el original no expresa explícitamente.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος de acuerdo con el audit trail inglés y la equivalencia reverente establecida para el griego.
  - Se prefirió «reprensión» para ἐλεγμός por ser un término claro y de registro sapiencial en español.
  - «Se volverá en su corazón» conserva la interioridad del giro sin sobrertraducir a un tecnicismo teológico.
  - La imagen de camino/huella se preserva con «senda», que suena natural en español y mantiene el campo semántico de ἴχνος.
