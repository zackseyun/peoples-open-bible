translation:
  language: es
  text: Y cuando el ángel de Yahvé[a] habló estas palabras a todos los hijos de Israel[b], el pueblo alzó sus voces y lloraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el mensajero de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a todos los israelitas»; literalmente, «a todos los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּדַבֵּר
  english_pob_choice: And when ... spoke
  chosen_spanish: Y sucedió que, cuando ... habló
  alternatives_spanish:
  - Y aconteció que, cuando ... habló
  - Y cuando ... habló
  lexicon: HALOT
  rationale: El hebreo usa una fórmula narrativa temporal con waw consecutivo e infinitivo constructo. En español, 'Y sucedió que, cuando...' conserva el avance narrativo sin volverlo áspero ni excesivamente literal.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh / Or 'the messenger of the LORD.'
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar 'mensajero' o 'ángel'; en este contexto narrativo, 'ángel' es la forma más natural y coincide con el uso bíblico establecido. Se conserva Yahvé como nombre divino según la directriz del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' en el texto principal, siguiendo la norma del proyecto para mantener el nombre propio divino y evitar la sustitución por un título.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este mensaje
  lexicon: HALOT
  rationale: דְּבָרִים aquí se refiere a lo que acaba de decirse; 'palabras' mantiene el foco verbal y suena natural en español.
- source_word: אֶל כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: to all the sons of Israel
  chosen_spanish: a todos los hijos de Israel
  alternatives_spanish:
  - a todos los israelitas
  - a todos los hijos de Israel
  lexicon: HALOT
  rationale: '''Hijos de Israel'' reproduce de cerca la expresión hebrea בני ישראל y conserva su fuerza tradicional sin neutralizar el género gramatical del original.'
- source_word: וַיִּשְׂאוּ ... אֶת קוֹלָם
  english_pob_choice: the people raised their voices
  chosen_spanish: el pueblo alzó su voz
  alternatives_spanish:
  - el pueblo levantó la voz
  - el pueblo alzó sus voces
  lexicon: HALOT
  rationale: El hebreo usa un modismo para expresar un clamor audible. 'Alzó su voz' comunica bien el sentido en español y mantiene el valor idiomático; el singular colectivo refleja el hebreo con naturalidad.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: En este contexto, עָם designa al conjunto de Israel reunido; 'el pueblo' es la equivalencia más clara y bíblicamente reconocible en español.
- source_word: וַיִּבְכּוּ
  english_pob_choice: and wept
  chosen_spanish: y lloró
  alternatives_spanish:
  - y lloraron
  - y se pusieron a llorar
  - y lloró amargamente
  lexicon: HALOT
  rationale: בכה admite 'llorar' o 'llorar/sollozar' en español. Se usa el singular colectivo 'lloró' para concordar con 'el pueblo' y para evitar una repetición pesada; el verbo conserva el sentido de duelo o aflicción.
theological_decisions:
- issue: Nombre divino יהוה en la traducción española
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente יהוה. La política del proyecto pide transliterar el nombre divino, y en español 'Yahvé' es la forma más extendida y legible para mantener ese valor propio sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre מַלְאַךְ יְהוָה y su traducción
  english_pob_reading: the angel of Yahweh / Or 'the messenger of the LORD.'
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: La expresión hebrea puede entenderse como 'mensajero' o 'ángel'. En la tradición bíblica y en el flujo narrativo de este versículo, 'ángel' es la lectura más natural; la alternativa se conserva como posibilidad léxica, pero no se impone en el texto principal.
  doctrine_reference: HALOT / uso bíblico de מַלְאַךְ יְהוָה
translation_notes:
  revision_awareness: El texto inglés auditado quedó sin cambios en la última revisión; no se observaron revisiones aplicadas al sentido base. La versión española mantiene esa misma lectura, preservando las dos alternativas léxicas documentadas para בני ישראל y מַלְאַךְ יְהוָה mediante notas al pie.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de manera uniforme para el Tetragrámaton.
  - Se conserva el registro bíblico natural con 'el pueblo' y 'hijos de Israel'.
  - Se usa un verbo colectivo en singular ('lloró') para reflejar el sujeto colectivo 'el pueblo' y evitar una pluralización innecesaria.
  - Las notas al pie distinguen entre la alternativa de destinatarios ('israelitas') y la alternativa léxica de מַלְאַךְ ('mensajero').
