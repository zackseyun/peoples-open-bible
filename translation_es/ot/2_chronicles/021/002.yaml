base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/021/002.yaml
  text: 'And he had brothers[a], the sons of Jehoshaphat: Azariah, Jehiel, Zechariah, Azariahu, Michael, and Shephatiah[b]. All these were the sons of Jehoshaphat king of Israel.'
  footnotes:
  - marker: a
    text: 'Hebrew: ''king of Israel.'' Jehoshaphat is more commonly identified historically as king of Judah; Chronicles here uses ''Israel,'' likely in a broader covenantal sense.'
    reason: alternative_reading
  - marker: b
    text: The fourth name is spelled differently in Hebrew from the first Azariah; the distinction is preserved here as 'Azariahu.'
    reason: lexical_alternative
