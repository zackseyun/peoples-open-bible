translation:
  language: es
  text: 'Entonces Amasías, rey de Judá, tomó consejo y envió a Joás hijo de Joacaz, hijo de Jehú, rey de Israel, diciendo: «Ven, enfrentémonos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «veámonos cara a cara». El modismo hebreo es literalmente sobre ver el rostro del otro, y aquí probablemente señala una confrontación directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ
  english_pob_choice: took counsel
  chosen_spanish: tomó consejo
  alternatives_spanish:
  - consultó
  - deliberó
  lexicon: HALOT
  rationale: El nifal de יעץ expresa deliberación o consulta antes de actuar. «Tomó consejo» conserva el matiz formal y narrativo sin volver la frase más explicativa de lo que permite el hebreo.
- source_word: וַיִּשְׁלַח אֶל
  english_pob_choice: sent to
  chosen_spanish: envió a
  alternatives_spanish:
  - envió mensajeros a
  - mandó a
  lexicon: HALOT
  rationale: El hebreo dice simplemente que envió a alguien; no explicita mensajeros. «Envió a» sigue de cerca la construcción y evita añadir información no presente.
- source_word: יוֹאָשׁ ... מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: Joash son of Jehoahaz, son of Jehu, king of Israel
  chosen_spanish: Joás hijo de Joacaz, hijo de Jehú, rey de Israel
  alternatives_spanish:
  - Joás, hijo de Joacaz, hijo de Jehú, rey de Israel
  lexicon: HALOT
  rationale: Se transliteran los nombres propios de forma consistente y se conserva la genealogía/título porque el texto la expresa de manera explícita y sitúa políticamente el conflicto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y le dijo
  lexicon: HALOT
  rationale: Es la introducción narrativa habitual al discurso directo; «diciendo» mantiene el registro formal sin sobreinterpretar el sujeto implícito.
- source_word: לְךָ
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Anda
  - Vamos
  lexicon: HALOT
  rationale: Aquí la forma funciona como una invitación desafiante. «Ven» es la equivalencia más natural y concisa en español.
- source_word: נִתְרָאֶה פָנִים
  english_pob_choice: let us face one another
  chosen_spanish: enfrentémonos
  alternatives_spanish:
  - veámonos la cara
  - nos veamos cara a cara
  - nos enfrentemos cara a cara
  lexicon: HALOT
  rationale: El hebreo literalmente alude a ver rostros, pero en este contexto político-militar la fuerza idiomática es de confrontación directa. «Enfrentémonos» recoge esa intención de modo natural en español, sin perder el valor retador de la expresión.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo base y toma como guía la revisión auditada del POB en inglés, que ajustó la última cláusula para enfatizar la confrontación directa de forma idiomática. Por eso se eligió «enfrentémonos» en lugar de una traducción más literal pero menos natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque el nombre divino no aparece aquí.
  - 'Los nombres propios se conservaron con formas españolas ampliamente reconocibles: Amasías, Judá, Joás, Joacaz, Jehú, Israel.'
  - Se evitó «SEÑOR» y otras sustituciones no presentes en el texto fuente.
  - La frase final se resolvió como imperativo inclusivo de confrontación directa, coherente con el valor idiomático señalado en la auditoría en inglés.
