  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: superscrito «De David», doble prohibición, y el paralelismo entre agitación ante los malvados y envidia de los que obran mal. Sin embargo, las notas no preservan completamente la auditoría inglesa: la nota [b] se aplicó al primer hemistiquio, pero falta una nota para la alternativa de בְּעֹשֵׂי עַוְלָה («los que hacen injusticia» / «obreros de iniquidad»).'
  spanish_quality_summary: El español es claro, natural y de registro digno. «No te irrites» y «por causa de» son legibles. Aun así, «hacen lo malo» suena un poco débil frente a עַוְלָה, que en contexto admite mejor «injusticia» o «maldad». «Obran mal» fluye mejor en español bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El verso no contiene términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión «De David» concuerda con la práctica esperada para superscritos. La revisión propuesta fortalece la representación de עַוְלָה sin apartarse del rationale documentado.
  issues:
  - severity: medium
    issue: Falta una nota para la alternativa léxica de בְּעֹשֵׂי עַוְלָה.
    rationale: La auditoría inglesa preserva una alternativa para «those who do wrong» («those who do injustice» / «workers of unrighteousness»). El borrador español no la trasladó; en cambio, usó [b] para la alternativa de תִּתְחַר.
  - severity: low
    issue: «Los que hacen lo malo» atenúa el matiz de עַוְלָה.
    rationale: Aunque posible, «lo malo» es más amplio y menos concreto que «injusticia» / «maldad». En este paralelismo sapiencial, «los que obran mal» conserva mejor el valor participial y suena más idiomático.
  - severity: low
    issue: La redacción de la nota [a] puede pulirse.
    rationale: 'La nota actual empieza con comillas y dos puntos de forma poco natural. Conviene uniformarla al estilo de notas del proyecto: «O “Por David”...».'
  revised_spanish_text: De David[a]. No te irrites por causa de los malhechores[b]; no envidies a los que obran mal[c].
