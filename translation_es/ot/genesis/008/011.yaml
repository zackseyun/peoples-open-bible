revisions:
- from: Y la paloma vino a él al atardecer[a], y he aquí, una hoja de olivo recién arrancada[b] estaba en su pico. Entonces Noé supo que las aguas se habían retirado[c] de sobre la tierra.
  to: Y la paloma vino a él al atardecer[a], y he aquí, una hoja de olivo recién arrancada[b] estaba en su boca. Entonces Noé supo que las aguas habían menguado[c] de sobre la tierra.
  rationale: Se ajusta 'pico' a 'boca' para reflejar con más fidelidad בְּפִיהָ y la decisión léxica documentada en el POB. Se cambia 'se habían retirado' por 'habían menguado' para corresponder mejor a קַלּוּ הַמַּיִם; la alternativa en nota queda como 'habían disminuido', más cercana a las opciones auditadas que el original 'retirado'. El resto del versículo puede mantenerse.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:20:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido general del hebreo: la paloma llega a Noé al atardecer, trae una hoja de olivo recién desprendida, y Noé infiere que las aguas habían disminuido de sobre la tierra. También conserva adecuadamente las alternativas léxicas principales en notas. Sin embargo, hay dos desajustes frente a la evidencia fuente y al rastro de auditoría inglés: (1) בְּפִיהָ es literalmente ''en su boca'', y aunque ''pico'' es idiomático para aves, aquí el POB inglés documentó explícitamente ''mouth'' como decisión léxica; en español ''boca'' preserva mejor la forma fuente sin volverse ininteligible. (2) קַלּוּ הַמַּיִם se acerca más a ''habían menguado/disminuido'' que a ''se habían retirado'', que añade un matiz de retroceso espacial ya suficientemente expresado por מֵעַל.'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Al atardecer'' y ''y he aquí'' funcionan bien. No obstante, ''vino a él'' suena algo tieso en español bíblico corriente; ''vino a Noé'' sería más natural, pero no es necesario corregirlo si se quiere mantener cercanía formal. La reparación principal es léxica: ''boca'' y ''habían menguado'' o ''habían disminuido'' mejoran fidelidad sin sacrificar legibilidad.'
  glossary_alignment: 'No hay términos del glosario maestro especialmente conflictivos en este versículo. La terminología principal está bien: ''Noé'', ''paloma'', ''olivo'', ''tierra''. La revisión propuesta alinea mejor la decisión léxica documentada para בְּפִיהָ (''mouth'') y para קַלּוּ (''subsided/abated'' = menguar/disminuir más que retirarse).'
  issues:
  - severity: medium
    issue: '''en su pico'' para בְּפִיהָ'
    rationale: El hebreo dice literalmente 'en su boca', y el expediente inglés defendió conservar 'mouth'. 'Pico' es idiomático, pero se aparta de la decisión fuente sin necesidad.
  - severity: medium
    issue: '''se habían retirado'' para קַלּוּ הַמַּיִם'
    rationale: El verbo expresa que las aguas habían menguado/disminuido/abatido. 'Retirado' introduce un matiz dinámico de retroceso que no es la mejor equivalencia aquí, especialmente porque 'de sobre la tierra' ya expresa la relación espacial.
  revised_spanish_text: Y la paloma vino a él al atardecer[a], y he aquí, una hoja de olivo recién arrancada[b] estaba en su boca. Entonces Noé supo que las aguas habían menguado[c] de sobre la tierra.
  revised_footnotes:
  - marker: a
    text: O 'volvió a él'; el verbo hebreo significa propiamente 'vino', aunque el contexto implica un regreso.
    reason: lexical_alternative
  - marker: b
    text: '''Recién arrancada'' traduce un adjetivo hebreo que sugiere algo arrancado o desprendido, indicando que la hoja había sido tomada recientemente de un olivo vivo.'
    reason: lexical_alternative
  - marker: c
    text: O 'las aguas habían disminuido'.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'pico' a 'boca' para reflejar con más fidelidad בְּפִיהָ y la decisión léxica documentada en el POB. Se cambia 'se habían retirado' por 'habían menguado' para corresponder mejor a קַלּוּ הַמַּיִם; la alternativa en nota queda como 'habían disminuido', más cercana a las opciones auditadas que el original 'retirado'. El resto del versículo puede mantenerse.
