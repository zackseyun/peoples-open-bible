translation:
  language: es
  text: Manténganse despiertos y oren[a], para que no entren en tentación. El espíritu, en verdad, está dispuesto, pero la carne es débil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “prueba” o “tribulación” para πειρασμόν.
    reason: lexical_alternative
lexical_decisions:
- source_word: γρηγορεῖτε
  english_pob_choice: Stay awake
  chosen_spanish: Manténganse despiertos
  alternatives_spanish:
  - Permanezcan despiertos
  - Estén alerta
  lexicon: BDAG
  rationale: El imperativo plural de γρηγορέω expresa vigilia y atención. En español, "manténganse despiertos" conserva la idea de permanecer en estado de alerta sin sonar arcaico, y funciona bien en este contexto de exhortación inmediata.
- source_word: προσεύχεσθε
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - estén orando
  - recen
  lexicon: BDAG
  rationale: El imperativo presente de προσεύχομαι pide una acción continua o sostenida. "Oren" es natural y digno en español, y mantiene la fuerza exhortativa sin sobrecargar el texto.
- source_word: ἵνα μὴ ἔλθητε
  english_pob_choice: so that you may not enter
  chosen_spanish: para que no entren
  alternatives_spanish:
  - a fin de que no entren
  - para no caer
  lexicon: BDAG
  rationale: La construcción con ἵνα μή expresa propósito o prevención. "Para que no entren" transmite claramente esa finalidad en español contemporáneo y evita un giro demasiado literal o arcaico.
- source_word: εἰς πειρασμόν
  english_pob_choice: into temptation
  chosen_spanish: en tentación
  alternatives_spanish:
  - en prueba
  - en prueba o tentación
  lexicon: BDAG
  rationale: πειρασμός puede significar tentación, prueba o prueba/ensayo. Aquí la advertencia encaja mejor con "tentación"; en español, "en tentación" comunica el sentido de entrada o exposición a esa situación, aunque la nota conserva la alternativa de sentido más amplia.
- source_word: τὸ μὲν πνεῦμα
  english_pob_choice: The spirit indeed
  chosen_spanish: El espíritu, en verdad
  alternatives_spanish:
  - El espíritu ciertamente
  - El Espíritu, en verdad
  lexicon: BDAG
  rationale: Aquí πνεῦμα se entiende mejor como el espíritu humano, no como el Espíritu Santo. En español, "El espíritu, en verdad" respeta el contraste con δέ y evita mayúsculas teológicas que introducirían una lectura no exigida por el contexto.
- source_word: πρόθυμον
  english_pob_choice: is willing
  chosen_spanish: está dispuesto
  alternatives_spanish:
  - es voluntarioso
  - está dispuesto de corazón
  lexicon: BDAG
  rationale: πρόθυμος denota disposición, buena voluntad o prontitud. "Está dispuesto" es una equivalencia natural y fiel que preserva la idea de intención sincera.
- source_word: ἡ δὲ σὰρξ
  english_pob_choice: but the flesh
  chosen_spanish: pero la carne
  alternatives_spanish:
  - pero el cuerpo
  - pero la naturaleza humana
  lexicon: BDAG
  rationale: σάρξ se traduce normalmente como "carne" cuando el texto conserva el contraste antropológico amplio. Aquí se mantiene la tensión entre la disposición interna y la fragilidad humana sin reemplazar el término por una paráfrasis doctrinal.
- source_word: ἀσθενής
  english_pob_choice: is weak
  chosen_spanish: es débil
  alternatives_spanish:
  - es frágil
  - es enfermiza
  lexicon: BDAG
  rationale: ἀσθενής significa débil, enfermo o impotente según el contexto. "Es débil" reproduce con precisión la fragilidad humana que contrasta con el espíritu dispuesto.
theological_decisions:
- issue: Referente de πνεῦμα
  english_pob_reading: human spirit / inner willingness
  chosen_spanish_reading: espíritu humano / disposición interior
  alternative_spanish_readings:
  - Espíritu Santo
  - ánimo
  rationale: El contraste inmediato con "la carne" y la escena de Getsemaní favorecen entender πνεῦμα como la disposición interior humana. La traducción evita capitalizarlo para no imponer una referencia al Espíritu Santo que el contexto no requiere.
  doctrine_reference: Primacía del contexto inmediato y del contraste antropológico; no resolver la ambigüedad con una lectura doctrinal no necesaria.
- issue: Rendering of σάρξ
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - cuerpo
  - naturaleza pecaminosa
  rationale: Se conserva "carne" para mantener la tensión lexical del original. "Naturaleza pecaminosa" interpretaría más de lo que el versículo dice, y "cuerpo" reduciría indebidamente el contraste.
  doctrine_reference: Mantener el término clave σάρξ sin sobredeterminar su sentido; lectura contextual de la debilidad humana.
translation_notes:
  revision_awareness: El audit trail en inglés no muestra revisiones aplicadas y el último pase quedó sin cambios; por eso la versión española sigue de cerca las decisiones ya validadas, conservando la ambigüedad de πειρασμόν mediante nota y manteniendo el contraste antropológico de πνεῦμα / σάρξ.
  spanish_consistency_notes:
  - Se mantiene el tratamiento plural implícito de Jesús a los discípulos con formas de respeto bíblico natural en español.
  - '"Carne" se conserva como término técnico-bíblico, no se reemplaza por una paráfrasis explicativa.'
  - La nota de πειρασμόν acompaña el único punto con alternativa semántica relevante en el versículo.
