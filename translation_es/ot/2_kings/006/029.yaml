translation:
  language: es
  text: 'Así que hervimos a mi hijo y nos lo comimos[a]. Entonces le dije al día siguiente: «Da a tu hijo[b], para que nos lo comamos», pero ella escondió a su hijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cocinamos a mi hijo y nos lo comimos’ o ‘cocimos a mi hijo y lo comimos’.
    reason: lexical_alternative
  - marker: b
    text: O ‘y nos lo comeremos’; la forma hebrea puede leerse más simplemente como futuro, aunque el contexto favorece un sentido de finalidad o resultado tras «Da a tu hijo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנְּבַשֵּׁל
  english_pob_choice: we boiled
  chosen_spanish: cocimos
  alternatives_spanish:
  - hervimos
  - lo cocimos
  lexicon: HALOT
  rationale: El hebreo בשׁל puede abarcar ‘cocinar’ y, en este contexto, la POB inglesa documenta la alternativa ‘we cooked my son and ate him’. En español, ‘cocimos’ comunica con naturalidad la acción culinaria sin forzar un tecnicismo, mientras que ‘hervimos’ sería demasiado específico y estrecho.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo varón
  - mi niño
  lexicon: HALOT
  rationale: בן aquí es literalmente ‘hijo/son’; ‘mi hijo’ mantiene la referencia concreta y directa del texto. ‘Mi hijo varón’ sería redundante en español y ‘mi niño’ suaviza indebidamente el término.
- source_word: וַנֹּאכְלֵהוּ
  english_pob_choice: and ate him
  chosen_spanish: nos lo comimos
  alternatives_spanish:
  - y lo comimos
  - y nos lo comimos
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular debe permanecer visible en español. ‘Nos lo comimos’ conserva el sujeto plural y el objeto directo masculino, y además suena más idiomático que repetir ‘y comimos a él’.
- source_word: וָאֹמַר אֵלֶיהָ
  english_pob_choice: Then I said to her
  chosen_spanish: Entonces le dije a ella
  alternatives_spanish:
  - Y le dije
  - Luego le dije a ella
  lexicon: HALOT
  rationale: El waw-consecutivo avanza la narración; ‘Entonces’ reproduce bien ese valor discursivo. ‘Le dije a ella’ conserva el complemento femenino explícito que el hebreo marca con el sufijo pronominal.
- source_word: בַּיּוֹם הָאַחֵר
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - al otro día
  lexicon: HALOT
  rationale: La expresión idiomática natural en español es ‘al día siguiente’. Comunica el mismo valor temporal que el inglés auditado y el hebreo, sin añadir o restar contenido.
- source_word: תְּנִי
  english_pob_choice: Give
  chosen_spanish: Da
  alternatives_spanish:
  - Entrega
  - Dale
  lexicon: HALOT
  rationale: El imperativo femenino singular de נתן se expresa con naturalidad como ‘Da’. ‘Entrega’ sería más interpretativo y menos directo.
- source_word: בְּנֵךְ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu hijo varón
  - tu niño
  lexicon: HALOT
  rationale: Se mantiene el parentesco concreto ‘hijo’ y el posesivo de segunda persona singular femenina implícito en el contexto. ‘Tu hijo varón’ sería innecesariamente explícito.
- source_word: וְנֹאכְלֶנּוּ
  english_pob_choice: so that we may eat him
  chosen_spanish: para que nos lo comamos
  alternatives_spanish:
  - y lo comamos
  - a fin de que nos lo comamos
  lexicon: HALOT
  rationale: La forma verbal tras el imperativo expresa finalidad o resultado; ‘para que’ reproduce mejor esa relación que un simple ‘y’. El clítico ‘lo’ conserva el objeto masculino singular del hebreo.
- source_word: וַתַּחְבִּא
  english_pob_choice: but she hid
  chosen_spanish: pero ella escondió
  alternatives_spanish:
  - y ella escondió
  - mas ella escondió
  lexicon: HALOT
  rationale: 'El waw final es naturalmente adversativo en contexto: en vez de entregar al hijo, lo ocultó. ‘Escondió’ es el equivalente más directo de חבא, y ‘pero’ explicita el contraste narrativo que el inglés POB también señaló.'
- source_word: בְּנָהּ
  english_pob_choice: her son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - su hijo
  - a su hijo varón
  lexicon: HALOT
  rationale: Para el español, el objeto directo personal suele requerir la preposición ‘a’. Mantener ‘su hijo’ preserva el sentido literal, y la forma con ‘a’ mejora la legibilidad sin alterar el contenido.
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia entre el texto hebreo, la lectura auditada inglesa y la revisión más reciente: no hubo cambios aplicados y el veredicto de revisión fue de acuerdo. Se conservaron los tres referentes familiares concretos (‘mi hijo’, ‘tu hijo’, ‘su hijo’) y el contraste final adversativo de la acción.'
  spanish_consistency_notes:
  - Se mantuvo ‘hijo’ de forma consistente para בֵּן/בְּנִי/בְּנֵךְ/בְּנָהּ, sin reducirlo a ‘niño’.
  - Se evitó ‘SEÑOR’ u otra terminología de nombre divino porque el versículo no contiene referencias a YHWH.
  - Se preservó la fuerza literal de la escena sin suavizar el lenguaje de comer el hijo, conforme al hebreo y al inglés auditado.
  - Se usó ‘cocimos’ en vez de ‘hervimos’ para reflejar la amplitud semántica del verbo sin estrecharlo indebidamente.
