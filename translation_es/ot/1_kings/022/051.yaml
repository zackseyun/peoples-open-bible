translation:
  language: es
  text: Y Josafat durmió con sus padres, y fue sepultado con sus padres en la ciudad de David su padre[a][b]; y Joram su hijo llegó a ser rey en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Durmió con sus padres'' reproduce el hebreo como eufemismo tradicional de muerte, no una descripción literal del acto de dormir.'
    reason: lexical_alternative
  - marker: b
    text: '''Su padre'' sigue el lenguaje genealógico hebreo, donde ''padre'' puede abarcar antepasado o fundador dinástico.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: En fórmulas reales funerarias, שׁכב con 'con sus padres' funciona como un eufemismo convencional de muerte. 'Durmió' conserva esa forma idiomática sin volverla demasiado explicativa; 'murió' explicaría el sentido pero perdería la huella formular.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus ancestros
  lexicon: HALOT
  rationale: '''Padres'' reproduce de manera más directa el lenguaje genealógico hebreo y mantiene el valor formular. ''Antepasados'' aclara el sentido, pero suaviza la formulación tradicional del texto fuente.'
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - fue depositado en sepultura
  lexicon: HALOT
  rationale: El nifal expresa pasivamente la acción de sepultar. 'Fue sepultado' es fiel, claro y algo más digno en español que un simple 'fue enterrado', sin añadir información no presente.
- source_word: בְּעִיר דָּוִד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad de David
  lexicon: HALOT
  rationale: Se conserva la expresión toponímica establecida y transparente. En español, la forma con artículo funciona naturalmente y no introduce interpretación adicional.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su antepasado
  - su progenitor
  lexicon: HALOT
  rationale: Aunque David es antepasado lejano, el hebreo usa lenguaje genealógico amplio. Se mantiene 'su padre' porque reproduce la formulación del texto y deja visible la tensión hereditaria sin resolverla por paráfrasis.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: became king
  chosen_spanish: reinó
  alternatives_spanish:
  - llegó a reinar
  - se hizo rey
  lexicon: HALOT
  rationale: Aquí el verbo marca el acceso al trono en la fórmula de sucesión. 'Reinó' es una rendición sobria y aceptable en español bíblico, aunque 'llegó a reinar' también podría explicitar la idea de ascenso; se prefirió la forma más concisa.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en lugar de él
  - en su puesto
  lexicon: HALOT
  rationale: La frase expresa sucesión en el oficio real. 'En su lugar' es idiomático en español y conserva el valor de reemplazo sin añadir matices administrativos.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el tramo de auditoría proporcionado; el texto inglés final fue confirmado sin cambios y el acuerdo de revisión indicó alta coincidencia.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la fórmula dinástica con 'con sus padres' y 'en su lugar' para mantener la cadencia y la equivalencia auditables.
  - Se usa 'fue sepultado' en vez de 'fue enterrado' para un tono más digno y cercano al registro bíblico sin salir del sentido léxico.
