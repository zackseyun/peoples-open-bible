translation:
  language: es
  text: Entren por la puerta angosta[a]. Porque ancha es la puerta y espacioso[b] el camino que lleva a la destrucción[c], y muchos son los que entran por ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puerta estrecha». στενός puede significar «estrecho» o «angosto».
    reason: lexical_alternative
  - marker: b
    text: O «ancho» o «amplio». εὐρύχωρος puede significar «ancho» o «espacioso».
    reason: lexical_alternative
  - marker: c
    text: O «ruina» o «perdición». ἀπώλεια puede denotar destrucción, ruina o perdición.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰσέλθατε
  english_pob_choice: Enter
  chosen_spanish: Entren
  alternatives_spanish:
  - Entrad
  - Entran
  lexicon: BDAG
  rationale: El aoristo imperativo plural pide una orden directa. «Entren» comunica el mandato con naturalidad en español moderno y conserva el valor exhortativo sin añadir palabras innecesarias.
- source_word: διὰ τῆς στενῆς πύλης
  english_pob_choice: through the narrow gate
  chosen_spanish: por la puerta angosta
  alternatives_spanish:
  - por la puerta estrecha
  - a través de la puerta angosta
  lexicon: BDAG
  rationale: διά con genitivo expresa paso por medio de algo; en español, «por» es la forma más natural. «Puerta» traduce πύλη en este contexto. «Angosta» mantiene la imagen espacial de restricción; «estrecha» sería igualmente posible, pero «angosta» suena más concreta y menos abstracta.
- source_word: στενῆς
  english_pob_choice: narrow
  chosen_spanish: angosta
  alternatives_spanish:
  - estrecha
  - reducida
  lexicon: BDAG
  rationale: Se conserva el sentido espacial de limitación. «Angosta» funciona bien en contraste con la puerta «ancha» del versículo siguiente y suena idiomática en español.
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la base explicativa de la exhortación. «Porque» es el equivalente más directo y natural en español.
- source_word: πλατεῖα ἡ πύλη
  english_pob_choice: wide is the gate
  chosen_spanish: ancha es la puerta
  alternatives_spanish:
  - la puerta es ancha
  - espaciosa es la puerta
  lexicon: BDAG
  rationale: Se conserva la estructura predicativa enfática del griego con un orden natural en español. «Ancha» corresponde bien a πλατεῖα y mantiene el contraste con la puerta angosta.
- source_word: εὐρύχωρος ἡ ὁδός
  english_pob_choice: broad is the road
  chosen_spanish: espacioso el camino
  alternatives_spanish:
  - ancho el camino
  - amplio el camino
  lexicon: BDAG
  rationale: εὐρύχωρος puede significar «amplio», «ancho» o «espacioso». Se elige «espacioso» para conservar la fuerza del griego sin repetir exactamente «ancha», y para respetar la nota léxica del POB inglés sobre la posibilidad de un matiz de amplitud/espacio.
- source_word: ἡ ὁδός
  english_pob_choice: road
  chosen_spanish: camino
  alternatives_spanish:
  - ruta
  - sendero
  lexicon: BDAG
  rationale: «Camino» es una equivalencia clara y natural para ὁδός en español bíblico contemporáneo. Mantiene la metáfora de tránsito sin sonar demasiado técnico.
- source_word: ἡ ἀπάγουσα
  english_pob_choice: that leads
  chosen_spanish: que lleva
  alternatives_spanish:
  - que conduce
  - que va a
  lexicon: BDAG
  rationale: El participio presente se vierte con una relativa natural en español. «Lleva» reproduce bien la idea direccional de ἀπάγω y resulta idiomático.
- source_word: εἰς τὴν ἀπώλειαν
  english_pob_choice: to destruction
  chosen_spanish: a la destrucción
  alternatives_spanish:
  - a la ruina
  - a la perdición
  lexicon: BDAG
  rationale: «Destrucción» preserva la gravedad del término ἀπώλεια sin cerrar la amplitud semántica del original. Se mantiene la tensión teológica que el POB inglés deja abierta entre destrucción, ruina y perdición.
- source_word: πολλοί εἰσιν οἱ εἰσερχόμενοι δι’ αὐτῆς
  english_pob_choice: many are those who enter through it
  chosen_spanish: y muchos son los que entran por ella
  alternatives_spanish:
  - y muchos entran por ella
  - y muchos son los que pasan por ella
  lexicon: BDAG
  rationale: Se conserva el énfasis en «muchos» y la construcción participial con una formulación natural en español. «Por ella» refleja el femenino de αὐτῆς, retomando la puerta y evitando introducir una explicitación no dicha en el texto griego.
theological_decisions:
- issue: Sentido de ἀπώλεια en la advertencia de Jesús
  english_pob_reading: destruction
  chosen_spanish_reading: destrucción
  alternative_spanish_readings:
  - ruina
  - perdición
  rationale: La frase advierte de un fin gravemente desastroso, pero el texto no define con más precisión su naturaleza teológica. «Destrucción» conserva esa seriedad y deja intacta la tensión doctrinal, como en el POB inglés.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma excesiva.
- issue: Referente de αὐτῆς en la última cláusula
  english_pob_reading: through it
  chosen_spanish_reading: por ella
  alternative_spanish_readings:
  - por esa puerta
  - por ese camino
  rationale: El pronombre femenino griego remite con más probabilidad a «la puerta» que al «camino». «Por ella» mantiene la referencia pronominal sin añadir un sustantivo ausente en el texto, respetando la revisión del POB inglés.
  doctrine_reference: Coherencia referencial y fidelidad al antecedente gramatical más probable.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo. La revisión relevante aclaró la referencia de αὐτῆς al final como «it» sin añadir «gate». En español se mantuvo esa referencia con «por ella», evitando una explicitación no presente en el griego. También se atendió la nota léxica sobre εὐρύχωρος, conservando una opción española que permita la amplitud semántica de «broad/spacious».
  spanish_consistency_notes:
  - Se mantiene «puerta» para πύλη, de modo coherente con el contraste interno del versículo y con la tradición del POB inglés.
  - Se prefirió «camino» para ὁδός por claridad y fluidez en español, sin perder la metáfora de tránsito.
  - Se evitó «SEÑOR» o terminología eclesiástica no presente, ya que este versículo no contiene el Tetragrámaton ni vocabulario cultual específico.
  - La puntuación conserva dos oraciones breves como en el inglés POB, con una cadencia exhortativa y luego explicativa.
