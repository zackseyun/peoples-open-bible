reference: Galatians 5:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὑμεῖς γὰρ ἐπ’ ἐλευθερίᾳ ἐκλήθητε, ἀδελφοί· μόνον μὴ τὴν ἐλευθερίαν εἰς ἀφορμὴν τῇ σαρκί, ἀλλὰ διὰ τῆς ἀγάπης δουλεύετε ἀλλήλοις·
base_translation:
  language: en
  yaml_path: translation/nt/galatians/005/013.yaml
  text: For you were called to freedom[a], brothers; only do not use your freedom as an opportunity for the flesh[d][c][b], but through love serve one another.
  footnotes:
  - marker: a
    text: '"Brothers" translates the masculine plural Greek term, which in this letter addresses the whole believing community, including women.'
    reason: lexical_alternative
  - marker: b
    text: 'Or "as an occasion for the flesh"; that is, as a base or opportunity for self-directed sinful desire.'
    reason: lexical_alternative
  - marker: c
    text: '"The flesh" here refers not merely to the physical body but to fallen human impulses; some translations render it "the sinful nature."'
    reason: alternative_reading
  - marker: d
    text: 'The verb rendered "serve" is related to the word for "slave" and carries the sense of giving oneself in service to others.'
    reason: lexical_alternative
translation:
  language: ko
  text: 형제 여러분, 여러분은 자유를 위해 부르심을 받았습니다. 다만 그 자유를 육체를 위한 빌미로 삼지 말고, 도리어 사랑을 통해 서로 종노릇 하십시오[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 δουλεύετε는 「노예처럼 섬기다」를 뜻한다. 자유 안에서의 사랑이 가진 역설적 「자기 매임」을 강조한다.
    reason: lexical_alternative
lexical_decisions:
