translation:
  language: es
  text: Ahora bien, cuando Jeroboam hijo de Nebat oyó de eso[a]—mientras todavía estaba en Egipto, adonde había huido del rey Salomón[b]—Jeroboam seguía viviendo en Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice simplemente «oyó» sin especificar el objeto; el contexto inmediato sugiere la noticia mencionada en la narración anterior.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice más literalmente «de delante de» o «de la presencia de» el rey Salomón; aquí se expresa de forma natural en español como huida del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y sucedió
  - Entonces
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva funciona como transición discursiva; «Ahora bien» mantiene el flujo natural del español sin calcar la estructura hebrea.
- source_word: כִּשְׁמֹעַ
  english_pob_choice: when ... heard
  chosen_spanish: cuando ... oyó
  alternatives_spanish:
  - al oír
  - apenas ... oyó
  lexicon: HALOT
  rationale: La construcción temporal se conserva de manera directa y natural en español.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nebat
  alternatives_spanish:
  - Jeroboam, hijo de Nebat
  lexicon: HALOT
  rationale: Se conserva el nombre propio con la filiación explícita; «hijo de» es la forma bíblica más directa y clara en español.
- source_word: וְהוּא עוֹדֶנּוּ בְמִצְרַיִם
  english_pob_choice: while he was still in Egypt
  chosen_spanish: mientras todavía estaba en Egipto
  alternatives_spanish:
  - y él aún estaba en Egipto
  - siendo que todavía estaba en Egipto
  lexicon: HALOT
  rationale: El hebreo expresa una circunstancia concomitante y continua; «todavía estaba» reproduce el valor aspectual de continuidad.
- source_word: אֲשֶׁר בָּרַח מִפְּנֵי הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: where he had fled from King Solomon
  chosen_spanish: adonde había huido de delante del rey Salomón
  alternatives_spanish:
  - donde había huido del rey Salomón
  - adonde había escapado del rey Salomón
  lexicon: HALOT
  rationale: «Huir de delante de» refleja con mayor precisión la fuerza de מִפְּנֵי, que no es solo separación espacial sino huida en presencia/poder del rey. «Había huido» conserva el anterior del pluscuamperfecto.
- source_word: וַיֵּשֶׁב
  english_pob_choice: was still living
  chosen_spanish: seguía viviendo
  alternatives_spanish:
  - moraba aún
  - permanecía
  lexicon: HALOT
  rationale: El verbo ישב aquí comunica residencia continuada; «seguía viviendo» refleja bien la revisión inglesa que optó por una vivencia continua y natural en español.
- source_word: בְּמִצְרָיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: Renderización geográfica estándar y fiel al texto.
translation_notes:
  revision_awareness: La revisión inglesa cambió «remained in Egypt» por «was still living in Egypt» para reflejar mejor la continuidad temporal de וַיֵּשֶׁב. La versión española adopta «seguía viviendo» para alinearse con esa revisión y con el matiz continuativo del hebreo. También se mantuvo la nota sobre el objeto implícito de «oyó», pues el hebreo no lo expresa de manera explícita.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada en este proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se mantiene «Egipto» como topónimo estándar.
  - Se conserva el paralelismo narrativo de la oración larga sin añadir contenido explicativo ajeno al texto.
