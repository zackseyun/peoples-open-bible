base_translation:
  language: en
  yaml_path: translation/ot/2_kings/009/011.yaml
  text: Then Jehu went out to the servants of his master[a], and one said to him, “Is all well? Why did this madman come to you?” And he said to them[c][b], “You know the man and his talk.”
  footnotes:
  - marker: a
    text: Or, “Is all well?” Hebrew literally asks, “Is it peace?”
    reason: lexical_alternative
  - marker: b
    text: Or, “this insane man” or “this crazy fellow.” The Hebrew is a contemptuous label.
    reason: lexical_alternative
  - marker: c
    text: Or, “his babble” / “his manner of speaking.” The Hebrew can refer broadly to a person's speech or discourse.
    reason: lexical_alternative
