    issue: Falta la coma serial antes de ‘y Aram’
    rationale: El español estándar no usa coma antes de la conjunción final en una lista simple; el borrador copia la puntuación inglesa más que la convención española.
  - severity: low
    issue: La nota b puede formularse mejor para el lector hispano
    rationale: La explicación actual es válida, pero ‘variación transliterada’ suena algo forzada. Conviene decir con más naturalidad que el hebreo admite distintas transliteraciones y mencionar las variantes documentadas.
