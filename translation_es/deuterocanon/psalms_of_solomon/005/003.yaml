lexical_decisions:
- source_word: ἐὰν δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: BDAG
  rationale: Conserva la fuerza condicional de ἐὰν y el matiz adversativo/conector de δέ. “Pero si” suena natural en español y mantiene el giro de la súplica.
- source_word: κεκραγέναι
  english_pob_choice: I cry out
  chosen_spanish: clamo
  alternatives_spanish:
  - he clamado
  - grito
  lexicon: BDAG
  rationale: El infinitivo perfecto de κράζω funciona en este contexto de oración como una acción referida al hablante. En español, “clamo” comunica la súplica intensa sin forzar un perfecto poco natural.
- source_word: με
  english_pob_choice: I
  chosen_spanish: (implícito en el verbo)
  alternatives_spanish:
  - me
  lexicon: BDAG
  rationale: En griego, με cumple la función de sujeto del infinitivo. En español se expresa de manera natural con la forma verbal de primera persona, sin necesidad de pronombre explícito.
- source_word: πρὸς σέ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  lexicon: BDAG
  rationale: En un contexto de oración, πρὸς con objeto personal se vierte de modo natural como “a ti”. “Hacia ti” sería más literal, pero menos idiomático.
- source_word: μὴ παρασιωπήσῃς
  english_pob_choice: do not be silent
  chosen_spanish: no guardes silencio
  alternatives_spanish:
  - no te calles
  - no pases en silencio
  lexicon: BDAG
  rationale: El verbo implica callar o pasar algo en silencio. “No guardes silencio” preserva el tono relacional y reverente, y evita una lectura demasiado interpretativa como “ignorar”.
- source_word: ἀπʼ ἐμοῦ
  english_pob_choice: to me
  chosen_spanish: para conmigo
  alternatives_spanish:
  - de mí
  - a mí
  lexicon: BDAG
  rationale: La expresión final indica la relación del silencio divino respecto del hablante. “Para conmigo” suena natural en español bíblico-digno y comunica la dirección personal de la negativa sin alejarse del sentido.
translation_notes:
  revision_awareness: El texto base inglés fue revisado de “toward me” a “to me” por naturalidad; en español se reflejó esa relación con una expresión idiomática equivalente (“para conmigo”) sin perder la referencia directa al hablante. La nota conserva la alternativa más literal para el giro verbal griego.
  spanish_consistency_notes:
  - Se mantuvo un registro reverente y directo propio de la poesía de súplica.
  - Se evitó “SEÑOR” u otras sustituciones teológicas no presentes en el griego.
  - Se prefirió “clamo” frente a una paráfrasis más explicativa para respetar la intensidad del verbo griego.
