  text: יְהוָ֣ה מָ֭לָךְ יִרְגְּז֣וּ עַמִּ֑ים יֹשֵׁ֥ב כְּ֝רוּבִ֗ים תָּנ֥וּט הָ/אָֽרֶץ׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/099/001.yaml
  text: Yahweh reigns[a]; let the peoples tremble. He sits enthroned upon the cherubim[b]; let the earth quake.
  footnotes:
