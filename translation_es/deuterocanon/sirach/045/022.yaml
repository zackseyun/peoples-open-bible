translation:
  language: es
  text: Pero en su tierra no heredará, y entre ellos no se le asignará heredad; las ofrendas de Yahvé[a] son su porción y su herencia entre los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «pues él mismo es tu porción, herencia», que refleja una forma distinta de la cláusula final respecto del hebreo conservado, el cual dice: «las ofrendas de Yahvé son su porción y su herencia».'
    reason: alternative_reading
lexical_decisions:
- source_word: אך
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: HALOT
  rationale: El hebreo introduce un contraste; «Pero» comunica la adversativa de forma natural en español sin sobrecargar el tono.
- source_word: בארצם
  english_pob_choice: in their land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en su país
  - en su territorio
  lexicon: HALOT
  rationale: «Tierra» conserva el campo semántico de heredad y posesión territorial que el contexto exige, y corresponde bien al paralelo griego γῇ.
- source_word: לא ינחל
  english_pob_choice: he will not inherit
  chosen_spanish: no heredará
  alternatives_spanish:
  - no recibirá herencia
  - no tendrá heredad
  lexicon: HALOT
  rationale: Se mantiene el valor verbal de נחל con un futuro natural en español; «heredará» conserva la acción de recibir por herencia sin sonar forzado.
- source_word: לא יחלק נחלה
  english_pob_choice: will not be allotted an inheritance
  chosen_spanish: no se le asignará heredad
  alternatives_spanish:
  - no se le repartirá heredad
  - no recibirá una porción de herencia
  lexicon: HALOT
  rationale: El sentido pasivo del reparto territorial queda mejor en español con «se le asignará heredad». «Heredad» evita la redundancia de «herencia» y preserva el lenguaje legal-sacral.
- source_word: אשי יהוה
  english_pob_choice: the offerings of Yahweh
  chosen_spanish: las ofrendas de Yahvé
  alternatives_spanish:
  - los sacrificios de Yahvé
  - las ofrendas encendidas de Yahvé
  lexicon: HALOT
  rationale: Se traduce el sustantivo por el término claro «ofrendas», que en español puede abarcar el conjunto sacrificial del contexto. Se mantiene «Yahvé» según el criterio del proyecto para יהוה.
- source_word: חלקו ונחלתו
  english_pob_choice: his portion and his inheritance
  chosen_spanish: su porción y su herencia
  alternatives_spanish:
  - su parte y su heredad
  - su porción y su heredad
  lexicon: HALOT
  rationale: «Porción» y «herencia» conservan el par técnico de reparto cultual y patrimonial. «Herencia» resulta más natural que «heredad» en esta clausula fija, aunque ambas son posibles.
- source_word: בתוך בני ישראל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los hijos de Israel
  - en medio de los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva la forma fuente «hijos de Israel» porque refleja el hebreo literal y el uso corporativo del pueblo. «Entre» expresa bien la ubicación comunitaria y evita una lectura demasiado física.
theological_decisions:
- issue: Si seguir el hebreo conservado o la forma griega final que dice que él mismo es la porción/herencia.
  english_pob_reading: 'Main text follows the extant Hebrew: the offerings of Yahweh are his portion and his inheritance; the Greek parallel is preserved in a footnote.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo: las ofrendas de Yahvé son su porción y su herencia.'
  alternative_spanish_readings:
  - él mismo es tu porción y herencia
  - él mismo es su porción y herencia
  rationale: La política del proyecto da primacía al hebreo de Ben Sira donde está conservado. Sin embargo, el paralelo griego presenta una variante real y teológicamente relevante. Por eso se mantiene el hebreo en el cuerpo y se registra la alternativa griega en nota, sin suavizar la tensión entre ambos testigos.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; DOCTRINE.md: preserve theological tension rather than resolve it silently.'
translation_notes:
  revision_awareness: Se ha seguido la revisión más reciente del audit trail que elimina la coma antes de «entre los hijos de Israel», de modo que la frase final modifica naturalmente toda la cláusula. El resto del versículo se mantiene fiel al hebreo preservado, incluyendo la referencia a las ofrendas y el lenguaje de herencia.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al criterio del proyecto.
  - Se mantiene el paralelismo legal-sacral con «porción» y «herencia» para conservar el tono técnico del hebreo.
  - «Hijos de Israel» reproduce la formulación literal del original y se conserva como designación corporativa del pueblo.
  - La nota al pie marca la tensión entre el hebreo conservado y el paralelo griego, sin armonizarlos en el texto principal.
