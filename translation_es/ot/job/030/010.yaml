translation:
  language: es
  text: Me aborrecen; se mantienen lejos de mí[a], y no se abstienen de escupir ante mi rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «no retienen escupitajo ante/de delante de mi rostro». La expresión hebrea comunica un acto abierto de desprecio dirigido personalmente a Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּעֲבוּנִי
  english_pob_choice: they abhor me
  chosen_spanish: me aborrecen
  alternatives_spanish:
  - me detestan
  - me repugnan
  lexicon: HALOT
  rationale: תעב expresa una repulsión intensa. «Aborrecer» mantiene la fuerza afectiva y social del verbo sin sonar tan duro como una traducción demasiado literal o demasiado coloquial.
- source_word: רָחֲקוּ מֶנִּי
  english_pob_choice: they keep far from me
  chosen_spanish: se mantienen lejos de mí
  alternatives_spanish:
  - se alejan de mí
  - se apartan de mí
  lexicon: HALOT
  rationale: רחק indica estar o mantenerse a distancia. «Se mantienen lejos de mí» conserva tanto la distancia física como el rechazo social implícito en el contexto.
- source_word: וּמִפָּנַי
  english_pob_choice: before my face
  chosen_spanish: delante de mi rostro
  alternatives_spanish:
  - ante mi rostro
  - en mi presencia
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «de mi rostro/presencia». En combinación con el escupir, «delante de mi rostro» conserva la referencia directa sin imponer un modismo español más interpretativo.
- source_word: לֹא חָשְׂכוּ
  english_pob_choice: they do not hold back
  chosen_spanish: no se abstienen
  alternatives_spanish:
  - no se contienen
  - no dejan de
  lexicon: HALOT
  rationale: חשׂך significa retener, ahorrar o abstenerse. Aquí rige la acción de escupir; «no se abstienen» comunica la falta de contención con naturalidad en español.
- source_word: רֹק
  english_pob_choice: spitting
  chosen_spanish: escupir
  alternatives_spanish:
  - saliva
  - escupitajo
  lexicon: HALOT
  rationale: El sustantivo denota saliva o esputo, pero el sentido en contexto es la acción humillante de escupir. «Escupir» preserva el valor verbal y el desprecio abierto descrito en la nota inglesa.
translation_notes:
  revision_awareness: La versión inglesa fue revisada de «in my face» a «before my face» para acercarse más al hebreo; la redacción española sigue esa decisión con «delante de mi rostro», evitando el modismo «en mi cara» por ser más interpretativo que el hebreo.
  spanish_consistency_notes:
  - Se conserva «rostro» para mantener la correspondencia con פָנַי y evitar suavizar la imagen de desprecio.
  - 'La secuencia verbal evita calcos pesados y mantiene un paralelismo natural en español: aborrecimiento, distancia y acto de escupir.'
  - No se introduce terminología doctrinal ni equivalentes litúrgicos; el verso es de registro narrativo-poético y debe permanecer concreto.
