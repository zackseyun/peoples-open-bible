translation:
  language: es
  text: 'Y José dijo: «Traigan su ganado, y yo les daré[a] a cambio de su ganado, si el dinero se ha acabado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «les daré por/en relación con su ganado»; no se explicita aquí un objeto como «alimento», aunque el contexto de la hambruna lo sugiere.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר יוֹסֵף / And Joseph said
  english_pob_choice: And Joseph said
  chosen_spanish: Y José dijo
  alternatives_spanish:
  - Entonces José dijo
  - Y dijo José
  lexicon: HALOT
  rationale: Se conserva la narración simple del hebreo con el nombre propio sujeto. «Y José dijo» reproduce con naturalidad el enlace narrativo וַ y el verbo de habla sin añadir énfasis no requerido.
- source_word: הָבוּ
  english_pob_choice: Bring
  chosen_spanish: Traigan
  alternatives_spanish:
  - Den
  - Presenten
  lexicon: HALOT
  rationale: El imperativo plural pide una entrega/presentación concreta del bien. «Traigan» es idiomático en español y mantiene el sentido de llevar el ganado ante José para el trueque.
- source_word: מִקְנֵיכֶם
  english_pob_choice: your livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - su ganado
  - sus animales
  - su hato
  lexicon: HALOT
  rationale: «Ganado» comunica bien el conjunto de animales de cría implicado por מִקְנֶה. Se evita «cattle» por ser más estrecho y «animales» por ser demasiado general. El posesivo plural «su» refleja el plural hebreo con naturalidad colectiva en español.
- source_word: וְאֶתְּנָה לָכֶם
  english_pob_choice: and I will give to you
  chosen_spanish: y yo les daré
  alternatives_spanish:
  - y les daré
  - y yo les daré alimento
  - y yo les daré provisiones
  lexicon: HALOT
  rationale: El hebreo no expresa aquí un objeto directo; por eso no se introduce «alimento» en el texto principal. «Les daré» respeta la sobriedad del original y el contexto inmediato hace inteligible que se trata de un intercambio para obtener sustento.
- source_word: בְּמִקְנֵיכֶם
  english_pob_choice: in exchange for your livestock
  chosen_spanish: en intercambio por su ganado
  alternatives_spanish:
  - a cambio de su ganado
  - por su ganado
  - en trueque por su ganado
  lexicon: HALOT
  rationale: El בּ indica aquí relación de intercambio/medio. «En intercambio por» expresa con claridad el valor transaccional sin forzar una paráfrasis interpretativa. «A cambio de» y «en trueque por» son viables, pero la forma elegida conserva un tono más sobrio y bíblico.
- source_word: אִם אָפֵס כָּסֶף
  english_pob_choice: if the money is gone
  chosen_spanish: si el dinero se ha acabado
  alternatives_spanish:
  - si el dinero se agotó
  - si ya no queda dinero
  - puesto que el dinero se ha acabado
  lexicon: HALOT
  rationale: Se mantiene «si» en el texto principal, como en la cláusula hebrea, sin resolverla de manera interpretativa. «Se ha acabado» refleja אָפֵס como terminación/exhaustión. La lectura causal de «puesto que» se conserva como posibilidad contextual, no como sustitución obligatoria del original.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de suplir «food» a omitir ese objeto para ceñirse más al hebreo, y también optó por conservar el valor condicional de אִם. La redacción española sigue esa revisión: no añade «alimento» en el cuerpo del texto, mantiene la cláusula con «si», y expresa el intercambio con una fórmula transparente y natural.'
  spanish_consistency_notes:
  - Se mantiene «ganado» como equivalente estable de מִקְנֶה en este contexto económico-rural.
  - Se evita «Cristo», «Señor» u այլ terminología no pertinente; el texto conserva los nombres y la estructura narrativa simples.
  - «Yo les daré» preserva el sujeto explícito, en línea con el hebreo y con un español claro.
  - La nota b recoge la ambigüedad contextual sin convertirla en paráfrasis dentro del texto principal.
