revisions:
- from: 'Declaren entre las naciones y proclamen; levanten una bandera. Proclamen; no lo oculten. Digan: “Babilonia ha sido capturada; Bel ha sido avergonzado; Merodac ha sido consternado. Sus ídolos[a] han sido avergonzados; sus falsos dioses[b] han sido consternados.”'
  to: 'Declaren entre las naciones y proclamen; levanten una bandera. Proclamen; no lo oculten. Digan: «Babilonia ha sido capturada; Bel ha sido avergonzado; Merodac[a] está consternado. Sus imágenes han sido avergonzadas; sus ídolos[b] están consternados».'
  rationale: La revisión restituye la distinción auditada entre «imágenes» y «ídolos», elimina la interpretación añadida de «falsos dioses», añade la nota sobre Merodac/Marduk presente en la auditoría inglesa, y mejora la naturalidad española de חַת / חַתּוּ con «está/están consternado(s)». Se mantienen Bel y Merodac como transliteraciones y el resto de la estructura proclamatoria del hebreo.
  reviewer_model: gpt-5.4
