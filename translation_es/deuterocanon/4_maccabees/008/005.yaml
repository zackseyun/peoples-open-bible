translation:
  language: es
  text: ¡Jóvenes[a], yo admiro cordialmente la hermosura de cada uno de ustedes, y, valorando tan altamente este gran número de hermanos, no solo les exhorto a no ser arrastrados a la misma locura que el anciano que ya ha sido torturado, sino también—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego se interrumpe aquí con «sino también», y la oración continúa en el versículo siguiente.
    reason: textual_variant
lexical_decisions:
- source_word: Ὦ νεανίαι
  english_pob_choice: Young men
  chosen_spanish: ¡Jóvenes!
  alternatives_spanish:
  - ¡Muchachos!
  - ¡Jóvenes varones!
  lexicon: LSJ
  rationale: νεανίαι es vocativo plural masculino para jóvenes/hombres jóvenes. En español, «Jóvenes» es natural, digno y conserva el vocativo sin añadir una especificación innecesaria.
- source_word: φιλοφρόνως
  english_pob_choice: warmly
  chosen_spanish: cordialmente
  alternatives_spanish:
  - amablemente
  - con afecto
  - graciosamente
  lexicon: LSJ
  rationale: La idea es de trato amable y afectuoso. «Cordialmente» comunica bien el tono afectivo sin perder registro formal.
- source_word: καθʼ ἑνὸς ἑκάστου ὑμῶν
  english_pob_choice: each one of you
  chosen_spanish: de cada uno de ustedes
  alternatives_spanish:
  - de cada uno de vosotros
  - individualmente, cada uno de ustedes
  lexicon: LSJ
  rationale: La expresión distribuye la admiración sobre cada persona en particular. «De cada uno de ustedes» mantiene esa fuerza individualizadora en español neutral.
- source_word: θαυμάζω τὸ κάλλος
  english_pob_choice: I admire the beauty
  chosen_spanish: admiro la hermosura
  alternatives_spanish:
  - admiro la belleza
  - me maravillo de la hermosura
  lexicon: LSJ
  rationale: θαυμάζω puede ser admirar o maravillar(se). Aquí, en un elogio retórico, «admiro» funciona bien. Para κάλλος, «hermosura» conserva un matiz de belleza visible y noble, sin sonar excesivamente moderno.
- source_word: τὸ πλῆθος τοσούτων ἀδελφῶν
  english_pob_choice: this great number of brothers
  chosen_spanish: este gran número de hermanos
  alternatives_spanish:
  - esta gran multitud de hermanos
  - este gran grupo de hermanos
  lexicon: LSJ
  rationale: πλῆθος señala multitud o cantidad. «Gran número» refleja con precisión el énfasis cuantitativo, y «hermanos» preserva el parentesco masculino explícito del contexto.
- source_word: ὑπερτιμῶν
  english_pob_choice: valuing so highly
  chosen_spanish: valorando tan altamente
  alternatives_spanish:
  - estimando tan altamente
  - apreciando en tan alto grado
  lexicon: LSJ
  rationale: El participio expresa una valoración muy elevada. «Valorando tan altamente» sigue de cerca la sintaxis del griego y mantiene el tono retórico.
- source_word: οὐ μόνον συμβουλεύω
  english_pob_choice: I not only urge
  chosen_spanish: no solo les exhorto
  alternatives_spanish:
  - no solo les aconsejo
  - no solo les recomiendo
  lexicon: LSJ
  rationale: συμβουλεύω puede ser aconsejar, exhortar o instar. Dado el contexto persuasivo y admonitorio, «exhorto» comunica mejor la fuerza exhortativa que un simple consejo.
- source_word: μὴ μανῆναι ... μανίαν
  english_pob_choice: not to be driven mad ... madness
  chosen_spanish: a no dejarse llevar por la misma locura
  alternatives_spanish:
  - a no enloquecer con la misma locura
  - a no caer en la misma locura
  lexicon: LSJ
  rationale: El griego conserva un juego de cognados con μανῆναι / μανίαν. «Dejarse llevar por la misma locura» preserva la idea de perder el control y permite mantener en español la repetición conceptual sin sonar forzado.
- source_word: τὴν αὐτὴν τῷ προβασανισθέντι γέροντι μανίαν
  english_pob_choice: the same madness as the old man who has already been tortured
  chosen_spanish: la misma locura que el anciano que ya ha sido torturado
  alternatives_spanish:
  - la misma locura que el anciano previamente torturado
  - la misma locura que el viejo que ya había sido torturado
  lexicon: LSJ
  rationale: 'τῷ προβασανισθέντι indica un hecho previo: «ya ha sido torturado». γέρων es simplemente «anciano» / «viejo»; aquí «anciano» es más digno y natural en español.'
- source_word: ἀλλὰ καὶ
  english_pob_choice: but also—
  chosen_spanish: sino también—
  alternatives_spanish:
  - pero también—
  - y también—
  lexicon: LSJ
  rationale: La frase queda inconclusa en el versículo; el español debe reflejar la continuidad suspendida. «Sino también—» conserva el empuje contrastivo del griego y deja abierta la continuación.
theological_decisions:
- issue: Tratamiento del vocativo masculino νεανίαι en un contexto de hermanos varones
  english_pob_reading: Young men
  chosen_spanish_reading: Jóvenes
  alternative_spanish_readings:
  - Muchachos
  - Jóvenes varones
  rationale: El contexto inmediato habla de hermanos varones; no se trata de un masculino genérico sino de un grupo masculino concreto. «Jóvenes» es fiel, sobrio y suficientemente claro en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Mantener la incompletitud sintáctica al final del versículo
  english_pob_reading: but also—
  chosen_spanish_reading: sino también—
  alternative_spanish_readings:
  - pero también—
  - y también—
  rationale: El griego termina en una conjunción que continúa la frase en el versículo siguiente. No debe completarse artificialmente la idea; el guion largo preserva la transparencia textual.
  doctrine_reference: PHILOSOPHY.md transparency principles
translation_notes:
  revision_awareness: La redacción sigue el sentido consolidado del auditoría inglesa, incluyendo la lectura revisada de «this great number of brothers» y la idea pasiva de «be driven mad». Se ajustó al español con un registro formal y natural, preservando la cláusula final incompleta mediante raya.
  spanish_consistency_notes:
  - Se mantiene «hermanos» para ἀδελφῶν por el contexto masculino explícito.
  - Se eligió «locura» para μανία / μανῆναι a fin de conservar el juego verbal del griego.
  - No se introdujo «Cristo», «SEÑOR» ni otros equivalentes no presentes en el versículo.
  - La puntuación con raya final refleja la ruptura del texto en el límite del versículo.
