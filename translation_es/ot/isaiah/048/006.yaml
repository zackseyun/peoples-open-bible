translation:
  language: es
  text: Has oído; mira todo esto. ¿Y no lo declararás? Desde ahora te hago oír cosas nuevas[a], cosas reservadas que no conocías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosas guardadas en reserva» / «cosas custodiadas». El hebreo sugiere asuntos retenidos hasta el momento oportuno para darlos a conocer.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתָּ
  english_pob_choice: You have heard
  chosen_spanish: Has oído
  alternatives_spanish:
  - Has escuchado
  - Oíste
  lexicon: HALOT
  rationale: Perfecto 2ms de שׁמע. En español, «has oído» transmite bien el resultado presente de una revelación ya recibida, sin sonar forzado ni demasiado coloquial.
- source_word: חֲזֵה
  english_pob_choice: see
  chosen_spanish: mira
  alternatives_spanish:
  - ve
  - mira ahora
  - he aquí
  lexicon: HALOT
  rationale: Imperativo de חזה. «Mira» es natural en español moderno y conserva el llamado a atender visualmente lo ya oído; evita el arcaísmo de «he aquí».
- source_word: כֻּלָּהּ
  english_pob_choice: all this
  chosen_spanish: todo esto
  alternatives_spanish:
  - todo ello
  - todo lo anterior
  lexicon: HALOT
  rationale: El sufijo femenino singular apunta colectivamente a lo dicho antes. «Todo esto» es idiomático y reproduce la referencia global del hebreo.
- source_word: הֲלוֹא תַגִּידוּ
  english_pob_choice: will you not declare it?
  chosen_spanish: ¿Y no lo declararás?
  alternatives_spanish:
  - ¿No lo declararéis?
  - ¿No lo darás a conocer?
  lexicon: HALOT
  rationale: Hiphil de נגד con interrogación retórica. Se traduce con fuerza declarativa. Aunque el hebreo cambia a 2mp, el español puede mantener el singular representativo para no sonar abrupto; la lectura colectiva queda implícita en el contexto.
- source_word: הִשְׁמַעְתִּיךָ
  english_pob_choice: I make you hear
  chosen_spanish: te hago oír
  alternatives_spanish:
  - te he hecho oír
  - te hago escuchar
  lexicon: HALOT
  rationale: Causativo de שׁמע. «Te hago oír» conserva el matiz de causar la audición y suena natural con «desde ahora»; no añade pasado perfecto que el contexto no exige.
- source_word: חֲדָשׁוֹת
  english_pob_choice: new things
  chosen_spanish: cosas nuevas
  alternatives_spanish:
  - nuevas cosas
  - novedades
  lexicon: HALOT
  rationale: Plural sustantivado/adjetival. «Cosas nuevas» es claro y directo en español; «novedades» puede sonar más informativo que profético.
- source_word: מֵעַתָּה
  english_pob_choice: From now on
  chosen_spanish: Desde ahora
  alternatives_spanish:
  - A partir de ahora
  - De ahora en adelante
  lexicon: HALOT
  rationale: Marca un nuevo tramo de revelación. «Desde ahora» es conciso y natural, y corresponde al giro temporal del hebreo.
- source_word: וּנְצֻרוֹת
  english_pob_choice: hidden things / things kept in reserve / guarded things
  chosen_spanish: cosas reservadas
  alternatives_spanish:
  - cosas escondidas
  - cosas guardadas
  - cosas retenidas
  lexicon: HALOT
  rationale: La forma pasiva de נצר puede implicar guardar, reservar o mantener en custodia. «Reservadas» conserva esa tensión sin cerrar indebidamente entre «escondidas» y «guardadas».
- source_word: וְלֹא יְדַעְתָּם
  english_pob_choice: that you have not known
  chosen_spanish: que no has conocido
  alternatives_spanish:
  - que no conocías
  - que no sabías
  lexicon: HALOT
  rationale: Perfecto 2ms + sufijo 3mp de ידע. «No has conocido» mantiene la perspectiva de estado no adquirido y encaja con el paralelismo de «cosas nuevas» y «cosas reservadas».
theological_decisions:
- issue: Cambio de número en la segunda persona
  english_pob_reading: Retain generic English 'you' without marking the Hebrew shift from singular to plural and back
  chosen_spanish_reading: Mantener el singular representativo en la segunda pregunta y en la línea final, sin hacer explícito el cambio a plural en el texto principal
  alternative_spanish_readings:
  - ¿Y no lo declararéis?
  - Desde ahora les hago oír cosas nuevas...
  rationale: El hebreo alterna 2ms/2mp/2ms, probablemente pasando del representante de Israel al pueblo en conjunto y de vuelta. En español, marcarlo de forma rígida puede sonar artificial; el singular mantiene fluidez y deja el matiz colectivo en el contexto inmediato.
  doctrine_reference: Translation philosophy §5 (consistencia documentada) y §6 (lectura moderna y clara)
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del audit trail inglés: se omitió cualquier añadido equivalente a «now» antes de «see», y se mantuvo el giro de revelación progresiva con «Desde ahora». También se reflejó la alternativa lexical documentada para נְצֻרוֹת mediante una nota de reserva, sin desplazar el sentido principal de «cosas reservadas».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente explícito en la base hebrea.
  - «Mesías/Cristo» no aparece en el versículo.
  - Se conservó «oír» y no «escuchar» para reflejar mejor el causativo de שׁמע en un registro bíblico sobrio.
  - La nota a pie de página se ancló en «cosas nuevas», siguiendo la práctica del audit trail inglés al preservar una alternativa lexical relevante.
