translation:
  language: es
  text: Y heriré a los habitantes de esta ciudad, tanto al hombre como a la bestia; morirán por una gran pestilencia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהִכֵּיתִי
  english_pob_choice: And I will strike
  chosen_spanish: Y golpearé
  alternatives_spanish:
  - Y heriré
  - Y golpearé de muerte
  lexicon: HALOT
  rationale: El verbo de נכה conserva la acción divina directa de golpear/herir. «Golpearé» es natural en español moderno y no añade la idea de muerte antes de que el texto la exprese explícitamente.
- source_word: יֹשְׁבֵי הָעִיר הַזֹּאת
  english_pob_choice: the inhabitants of this city
  chosen_spanish: los habitantes de esta ciudad
  alternatives_spanish:
  - los moradores de esta ciudad
  - los que habitan en esta ciudad
  lexicon: HALOT
  rationale: «Habitantes» comunica bien el participio de ישב y mantiene el tono formal del anuncio profético.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la gente
  lexicon: HALOT
  rationale: En la pareja distributiva con «bestia», «el hombre» preserva mejor el contraste humano/animal que una forma colectiva más amplia.
- source_word: הַבְּהֵמָה
  english_pob_choice: beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - el animal
  - el ganado
  lexicon: HALOT
  rationale: «Bestia» conserva el paralelismo tradicional con «hombre» y la fuerza del juicio; «animal» sería más neutro, pero menos expresivo en este contexto.
- source_word: בְּדֶבֶר גָּדוֹל
  english_pob_choice: by a great pestilence
  chosen_spanish: de una gran pestilencia
  alternatives_spanish:
  - por una gran peste
  - con una gran pestilencia
  lexicon: HALOT
  rationale: דבר en Jeremías suele designar una peste/pestilencia como juicio pactal. «Pestilencia» conserva ese matiz bíblico; «gran» refleja גָּדוֹל como intensidad.
- source_word: יָמֻתוּ
  english_pob_choice: they will die
  chosen_spanish: morirán
  alternatives_spanish:
  - van a morir
  - habrán de morir
  lexicon: HALOT
  rationale: El futuro simple en español transmite con naturalidad el resultado anunciado. No hace falta explicitar el sujeto porque el contexto ya lo establece.
- source_word: וְאֶת הָאָדָם וְאֶת הַבְּהֵמָה
  english_pob_choice: both man and beast
  chosen_spanish: tanto al hombre como a la bestia
  alternatives_spanish:
  - al hombre y a la bestia
  - tanto al hombre como al animal
  lexicon: HALOT
  rationale: La correlación «tanto... como...» refleja la inclusión de ambos objetos y suena idiomática en español, manteniendo la antítesis hombre/bestia.
theological_decisions:
- issue: Cómo renderizar אָדָם en una fórmula de juicio con contraste humano/animal
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - la gente
  rationale: La lectura de la POB conserva el contraste con «beast». En español, «el hombre» mantiene esa fuerza distributiva sin diluirla en un colectivo abstracto.
  doctrine_reference: 'DOCTRINE.md: אָדָם (*adam*) en contextos contrastivos puede ser «man / humankind»; aquí se prefiere la forma que preserve la antítesis con la bestia.'
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta notas ni revisiones aplicadas; el texto español sigue directamente la lectura estable de la POB con ajuste idiomático mínimo.
  spanish_consistency_notes:
  - Se mantiene «pestilencia» para דבר, en línea con el registro profético y el uso ya fijado por la POB.
  - Se evita «SEÑOR» o cualquier sustitución teológica no requerida, porque este versículo no contiene el Tetragrámaton.
  - Se conserva la pareja «hombre / bestia» con valor distributivo, sin neutralizarla en términos más genéricos.
