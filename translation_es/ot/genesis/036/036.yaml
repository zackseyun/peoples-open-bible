translation:
  language: es
  text: Y Hadad murió, y Samlah de Masrekah[a] reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Masrekah». El hebreo con מִן puede indicar procedencia o asociación con un lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - murió
  lexicon: HALOT
  rationale: El wayyiqtol narra el siguiente hecho en secuencia; en español, 'murió' es la opción más natural y directa para esta fórmula real de sucesión, equivalente funcional de 'died' en el POB inglés.
- source_word: הֲדָד
  english_pob_choice: Hadad
  chosen_spanish: Hadad
  alternatives_spanish:
  - Hadad
  lexicon: transliteración onomástica
  rationale: Es un nombre propio; se conserva por transliteración sin traducirlo.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: מלך en esta fórmula dinástica expresa ejercicio de realeza. 'Reinó' mantiene la brevedad y el tono de lista sucesoria del hebreo y del POB inglés.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La expresión con תחת y sufijo indica reemplazo sucesorio. 'En su lugar' comunica ese sentido de sustitución de manera natural en español.
- source_word: שַׂמְלָה
  english_pob_choice: Samlah
  chosen_spanish: Samlá
  alternatives_spanish:
  - Samlah
  lexicon: transliteración onomástica
  rationale: Se conserva el nombre propio, adaptando la acentuación al español para facilitar la lectura sin alterar la identificación.
- source_word: מִמַּשְׂרֵקָה
  english_pob_choice: from Masrekah
  chosen_spanish: de Masreca
  alternatives_spanish:
  - de Masréca
  - de Masreca
  lexicon: HALOT
  rationale: El prefijo מן aquí marca procedencia o asociación con un lugar. En español, 'de Masreca' reproduce de forma natural la relación locativa/originaria que el POB inglés dejó abierta.
translation_notes:
  revision_awareness: 'El texto español sigue el acuerdo alto de la auditoría inglesa: mantiene la fórmula sucesoria breve (''murió'' / ''reinó en su lugar'') y conserva la ambigüedad legítima de מִן respecto de Masreca, sin forzar una sola lectura.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando el hebreo subyacente lo exige; este versículo no lo contiene.
  - Se mantiene el estilo de lista dinástica, conciso y sin añadidos explicativos en el cuerpo del texto.
  - '''Samlá'' conserva una adaptación gráfica mínima para lectura española, mientras la nota permite la forma internacional del nombre.'
