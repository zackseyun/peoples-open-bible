translation:
  language: es
  text: 'Ella lo sujetó y lo besó[a]; con rostro atrevido le dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con rostro descarado» o «con audacia desvergonzada». El hebreo expresa una firmeza frontal e impávida, no solo valentía en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶחֱזִיקָה בּוֹ
  english_pob_choice: She seized him
  chosen_spanish: Ella lo sujetó
  alternatives_spanish:
  - Ella lo agarró
  - Ella lo tomó del brazo
  - Ella lo asió
  lexicon: HALOT
  rationale: החזיק con ב indica tomar o sujetar a alguien. «Sujetó» conserva la fuerza física y súbita de la acción sin sonar tan coloquial como «agarró» ni añadir un detalle no presente como «del brazo».
- source_word: וְנָשְׁקָה לּוֹ
  english_pob_choice: and kissed him
  chosen_spanish: y lo besó
  alternatives_spanish:
  - y le dio un beso
  - y lo besó con un beso
  lexicon: HALOT
  rationale: נשק en qal significa normalmente «besar». «Lo besó» reproduce de forma directa la secuencia narrativa del hebreo y mantiene el paralelismo con el sujeto y objeto personales.
- source_word: הֵעֵזָה פָנֶיהָ
  english_pob_choice: with a bold face
  chosen_spanish: con rostro atrevido
  alternatives_spanish:
  - con rostro descarado
  - con una audacia en el rostro
  - con gesto atrevido
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente involucra la «cara/rostro». «Rostro atrevido» conserva esa imagen facial y comunica la idea de audacia o brazenness sin borrar la tensión léxica del original.
- source_word: וַתֹּאמַר לוֹ
  english_pob_choice: she said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo a él
  - le habló
  lexicon: HALOT
  rationale: El hebreo incluye el complemento indirecto «a él». «Le dijo» es la forma natural en español y preserva esa relación explícita sin añadir contenido.
translation_notes:
  revision_awareness: El texto inglés POB fue revisado sin cambios en esta pasada y alcanzó alto acuerdo con el revisor; por eso la traducción española sigue de cerca sus decisiones léxicas, especialmente en el verbo físico inicial y en la expresión idiomática del «rostro atrevido».
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé/Mesías» fuera del versículo porque no aparecen en el texto.
  - Se evitó «besólo» o construcciones arcaizantes; el español usa orden y clíticos naturales sin perder la secuencia del hebreo.
  - La nota conserva la tensión semántica de הֵעֵזָה פָנֶיהָ, importante para no reducir el matiz a simple valentía.
