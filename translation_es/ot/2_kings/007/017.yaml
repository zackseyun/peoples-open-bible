translation:
  language: es
  text: Entonces el rey había puesto al oficial[a], sobre cuya mano se apoyaba[b], a cargo de la puerta; pero el pueblo lo pisoteó en la puerta, y murió, tal como lo había dicho el hombre de Dios, el que habló cuando el rey descendió adonde él estaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el capitán» o «el ayudante real»; el hebreo שָׁלִישׁ designa a un alto oficial cercano al rey.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre cuya mano se apoyaba», una expresión hebrea para un asistente real cercano.
    reason: cultural_note
lexical_decisions:
- source_word: הִפְקִיד
  english_pob_choice: had appointed
  chosen_spanish: había nombrado
  alternatives_spanish:
  - había puesto a cargo
  - había designado
  lexicon: HALOT
  rationale: El verbo hiphil aquí expresa asignación de responsabilidad u oficio. En español, «había nombrado» comunica bien la acción anterior del rey y encaja con el valor de designación oficial del contexto.
- source_word: הַשָּׁלִישׁ
  english_pob_choice: the officer
  chosen_spanish: el oficial
  alternatives_spanish:
  - el capitán
  - el ayudante real
  - el funcionario
  lexicon: HALOT
  rationale: שָׁלִישׁ puede referirse a un alto oficial cercano al rey. «Oficial» conserva amplitud y evita concretar indebidamente un rango específico que el hebreo no precisa con total claridad.
- source_word: אֲשֶׁר נִשְׁעָן עַל יָדוֹ
  english_pob_choice: on whose hand he leaned
  chosen_spanish: sobre cuya mano se apoyaba
  alternatives_spanish:
  - en cuyo brazo se apoyaba
  - en quien se apoyaba
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la «mano» para no diluir el giro idiomático. «Se apoyaba» expresa la relación de cercanía y dependencia sin introducir más de lo que el texto dice.
- source_word: עַל הַשַּׁעַר
  english_pob_choice: to be in charge of the gate
  chosen_spanish: para que estuviera a cargo de la puerta
  alternatives_spanish:
  - sobre la puerta
  - en la puerta
  - para encargarse de la puerta
  lexicon: HALOT
  rationale: Con הִפְקִיד, עַל indica asignación de supervisión. «A cargo de la puerta» comunica la función más que una simple ubicación, y «puerta» mantiene la palabra recurrente del pasaje bíblico, aunque «portón» también sería posible según el contexto.
- source_word: וַיִּרְמְסֻהוּ
  english_pob_choice: trampled him
  chosen_spanish: lo atropelló
  alternatives_spanish:
  - lo pisoteó
  - lo aplastó
  - lo pasó por encima
  lexicon: HALOT
  rationale: רמס significa pisotear/trampear. En español, «atropelló» comunica la violencia del hecho y funciona de forma natural en una escena de multitud; «pisoteó» sería más literal, pero «atropelló» transmite bien la presión arrolladora del pueblo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  lexicon: HALOT
  rationale: El sustantivo básico es «pueblo». Aunque el contexto describe una muchedumbre, «el pueblo» respeta mejor el término hebreo y mantiene el sujeto colectivo general.
- source_word: בַּשַּׁעַר
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en el portón
  - en la puerta de entrada
  lexicon: HALOT
  rationale: En español, «puerta» es una forma natural para el espacio de acceso de una ciudad fortificada; «en la puerta» reproduce la localización del hebreo sin forzar un tecnicismo.
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: just as ... had spoken
  chosen_spanish: tal como había hablado
  alternatives_spanish:
  - como había dicho
  - justo como había hablado
  lexicon: HALOT
  rationale: La fórmula señala cumplimiento profético. «Tal como había hablado» preserva el tono solemne y mantiene el vínculo con la palabra previa del varón de Dios.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el profeta de Dios
  lexicon: HALOT
  rationale: Se conserva el título hebreo tradicional «hombre de Dios», que es reconocible en español y evita sustituirlo por «profeta», término que el texto no usa aquí.
- source_word: בְּרֶדֶת הַמֶּלֶךְ אֵלָיו
  english_pob_choice: when the king came down to him
  chosen_spanish: cuando el rey descendió a él
  alternatives_spanish:
  - cuando el rey bajó a él
  - cuando el rey vino a él
  lexicon: HALOT
  rationale: Se mantiene el verbo de movimiento descendente para reflejar el hebreo. «Descendió» conserva el paralelismo narrativo con la escena previa y el sentido espacial original.
theological_decisions:
- issue: Cumplimiento profético explícito
  english_pob_reading: The verse is rendered to emphasize that the officer's death fulfilled the prior word spoken by the man of God, without adding claims beyond the text.
  chosen_spanish_reading: La frase final deja explícito que la muerte del oficial ocurrió conforme a la palabra previa del hombre de Dios, sin añadir interpretaciones ajenas al versículo.
  alternative_spanish_readings:
  - Una versión más neutra podría limitarse a narrar la muerte sin enfatizar el cumplimiento.
  - 'También podría traducirse con menos explicitud de fórmula: «como había dicho el hombre de Dios».'
  rationale: El hebreo enlaza el hecho con la palabra profética anterior mediante la fórmula repetida de «habló/dijo». Conviene preservar esa relación narrativa y teológica sin suavizarla ni expandirla.
  doctrine_reference: Preservar la tensión y el peso narrativo del cumplimiento profético; primacía del texto original sobre la tradición traductora.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: conserva la secuencia narrativa, mantiene el título «hombre de Dios», refleja la fórmula de cumplimiento profético y evita precisar más de lo que el hebreo permite en שָׁלִישׁ. La principal adaptación al español es usar «atropelló» para la violencia de רמס, por ser natural y expresivo en una escena de multitud.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto en todo el proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - «Oficial» se usa como equivalente amplio de שָׁלִישׁ sin imponer un rango militar específico.
  - Se conserva la imagen de «mano» en el giro idiomático para respetar el hebreo.
  - «Puerta» se emplea de manera uniforme para הַשַּׁעַר y בַּשַּׁעַר.
  - La fórmula profética «tal como había hablado» preserva la relación entre evento y palabra anunciada.
