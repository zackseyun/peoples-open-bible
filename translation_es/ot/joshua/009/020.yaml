translation:
  language: es
  text: Esto es lo que haremos con ellos y los dejaremos vivir[a], para que no venga sobre nosotros la ira[b] por el juramento que les hicimos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los mantendremos con vida» o «los perdonaremos».
    reason: lexical_alternative
  - marker: b
    text: La palabra hebrea puede referirse de manera general a ira, pero en este contexto probablemente implica la ira divina relacionada con la violación del juramento.
    reason: theological_note
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is what
  chosen_spanish: Esto es lo que
  alternatives_spanish:
  - Esto
  - Así
  lexicon: HALOT
  rationale: La fórmula introductoria en español necesita una expansión mínima para sonar natural y conservar la función discursiva del demostrativo sin añadir contenido.
- source_word: נַעֲשֶׂה
  english_pob_choice: we will do
  chosen_spanish: haremos
  alternatives_spanish:
  - haremos esto
  - vamos a hacer
  lexicon: HALOT
  rationale: El imperfecto 1cp en contexto deliberativo expresa intención futura; «haremos» comunica esa decisión de manera directa y natural en español.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: con ellos
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: En español, con el verbo implícito de acción sobre personas, «con ellos» no es adecuado; «a ellos» sería literal, pero aquí el sentido global de la medida aplicada se expresa mejor en la secuencia completa con «los dejaremos vivir». Por eso el dativo semántico queda integrado en el complemento verbal.
- source_word: וְהַחֲיֵה אֹתָם
  english_pob_choice: let them live
  chosen_spanish: los dejaremos vivir
  alternatives_spanish:
  - los mantendremos con vida
  - los dejaremos vivir y los conservaremos con vida
  - los perdonaremos
  lexicon: HALOT
  rationale: El causativo de חיה pide una idea de permitir/causar que sigan vivos. «Los dejaremos vivir» reproduce bien la fuerza verbal y mantiene el orden de la cláusula hebrea sin volverla más interpretativa de lo necesario.
- source_word: קֶצֶף
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - enojo
  - indignación
  lexicon: HALOT
  rationale: En español, «ira» conserva la gravedad del término. Se evita explicitar «de Yahvé» porque el hebreo solo dice que venga ira, aunque el contexto sugiere una ira divina.
- source_word: עַל הַשְּׁבוּעָה
  english_pob_choice: because of the oath
  chosen_spanish: a causa del juramento
  alternatives_spanish:
  - por el juramento
  - por causa del juramento
  - debido al juramento
  lexicon: HALOT
  rationale: La preposición עַל aquí expresa base o motivo. «A causa de» reproduce bien la relación causal en español y mantiene el valor jurídico del juramento.
- source_word: אֲשֶׁר נִשְׁבַּעְנוּ לָהֶם
  english_pob_choice: that we swore to them
  chosen_spanish: que les hicimos
  alternatives_spanish:
  - que les juramos
  - que juramos a ellos
  - que habíamos jurado a ellos
  lexicon: HALOT
  rationale: El hebreo usa el verbo jurar con el dativo de destinatario. En español, «hacer un juramento» es una forma idiomática y precisa, pero para no perder la relación explícita con el acto de jurar, la frase se conserva más cerca del contenido con «juramento que les hicimos» en la lectura global del versículo.
theological_decisions:
- issue: Naturaleza de קֶצֶף en el contexto del juramento
  english_pob_reading: Rendered generically as 'wrath' without explicitly supplying 'the LORD's wrath' in the main text.
  chosen_spanish_reading: «ira» sin añadir explícitamente «de Yahvé» en el texto principal.
  alternative_spanish_readings:
  - «la ira de Yahvé»
  - «la ira del Señor»
  - «el castigo de Dios»
  rationale: El hebreo no nombra al sujeto de la ira. Aunque el contexto sugiere una reacción divina al quebrantar el juramento, el texto principal debe conservar esa tensión sin resolverla artificialmente. La nota puede aclarar la implicación contextual si es necesario.
  doctrine_reference: Teología bíblica del juramento y de la retribución divina; fidelidad al texto fuente sin sobreespecificación
- issue: Relación entre el juramento y el temor a la ira
  english_pob_reading: Wrath may not come upon us because of the oath that we swore to them.
  chosen_spanish_reading: «para que no venga sobre nosotros la ira a causa del juramento que les hicimos».
  alternative_spanish_readings:
  - «para que no caiga sobre nosotros la ira por el juramento que les hicimos»
  - «para que no nos alcance la ira por el juramento que les hicimos»
  rationale: «Venga sobre nosotros» conserva bien la imagen dinámica de עַל con יִהְיֶה y evita suavizar la advertencia. «A causa del juramento» mantiene el vínculo causal con el acto comprometedor.
  doctrine_reference: Hermenéutica del lenguaje figurado y de la causalidad en textos narrativos
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del inglés POB, que ajustó la puntuación para reflejar el orden hebreo: primero la decisión («Esto es lo que haremos con ellos»), luego la consecuencia («y los dejaremos vivir»). La versión española conserva esa secuencia y evita una estructura demasiado explicativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exige explícitamente; aquí el hebreo no lo menciona, por lo que no se introduce en la traducción principal.
  - Se usa «juramento» en lugar de «promesa» para conservar el carácter solemne y legal del contexto.
  - Se evita «Señor» como sustituto automático del nombre divino porque no aparece en el hebreo de este versículo.
  - La cláusula final conserva la relación causal fuerte entre el juramento y la ira, sin convertirla en una paráfrasis libre.
