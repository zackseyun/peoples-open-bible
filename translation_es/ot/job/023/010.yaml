translation:
  language: es
  text: Pero él conoce el camino conmigo[a]; cuando me haya probado[b], saldré como oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi camino»; el hebreo también puede suavizarse así, pero la expresión más literal es «él conoce el camino conmigo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «si me prueba» o «después de haberme probado»; la construcción hebrea permite más de un matiz temporal.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Porque
  - Pues
  - Sin embargo
  lexicon: HALOT
  rationale: En contexto, la partícula introduce contraste con la queja previa de Job; en español, "Pero" expresa mejor ese giro adversativo que una causal simple como "Porque".
- source_word: יָדַע
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - ha conocido
  - está al tanto de
  lexicon: HALOT
  rationale: El hebreo habla de conocimiento pleno y continuo. "Conoce" conserva esa relación personal y actual, y funciona bien con la expresión siguiente.
- source_word: דֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: mi camino
  alternatives_spanish:
  - el camino
  - la senda
  - mi ruta
  lexicon: HALOT
  rationale: Aunque el texto hebreo dice literalmente "el camino", la frase con el sufijo y el contexto permiten entender el camino de Job. En español, "mi camino" comunica de manera natural la referencia implícita sin perder la metáfora del curso de vida.
- source_word: עִמָּדִי
  english_pob_choice: with me
  chosen_spanish: mi
  alternatives_spanish:
  - conmigo
  - que está conmigo
  - de mí
  lexicon: HALOT
  rationale: La construcción hebrea literalmente es "conmigo"; el inglés POB preserva la literalidad, pero en español decir "el camino conmigo" sería poco natural. Se integra el valor relacional en "mi camino" por economía y claridad, sin cambiar el sentido básico.
- source_word: בְּחָנַנִי
  english_pob_choice: when he has tested me
  chosen_spanish: cuando me haya probado
  alternatives_spanish:
  - si me prueba
  - después de haberme probado
  - cuando me pruebe
  - cuando me haya examinado
  lexicon: HALOT
  rationale: בחן puede significar probar o examinar. Dado el símil de oro, "probar" mantiene mejor la imagen de refinamiento. El subjuntivo perfecto en español refleja bien la idea temporal/resultativa permitida por la forma hebrea.
- source_word: כַּזָּהָב
  english_pob_choice: like gold
  chosen_spanish: como oro
  alternatives_spanish:
  - cual oro
  - igual que el oro
  lexicon: HALOT
  rationale: La comparación es directa; "como oro" es la forma más natural y fiel en español, preservando la imagen metálica sin endurecerla.
- source_word: אֵצֵא
  english_pob_choice: I will come out
  chosen_spanish: saldré
  alternatives_spanish:
  - saldré adelante
  - emergeré
  - saldré fuera
  - saldré como
  lexicon: HALOT
  rationale: יצא expresa salir o salir a la luz. En español, "saldré" mantiene la brevedad del verbo y encaja con el paralelismo del resultado del prueba/refinamiento.
theological_decisions:
- issue: Relación entre la prueba divina y el desenlace de Job
  english_pob_reading: Preserve the metaphor of testing and the positive outcome without forcing a doctrinal conclusion about sanctification or forensic justification.
  chosen_spanish_reading: Conservar la imagen de la prueba y el resultado favorable, sin fijar si el énfasis es purificación moral o vindicación judicial.
  alternative_spanish_readings:
  - Leerlo principalmente como purificación
  - Leerlo principalmente como vindicación forense
  rationale: El hebreo admite más de una matización temporal y teológica. La redacción española mantiene abierta esa tensión, como hace el POB en inglés, sin resolverla más allá de la metáfora de oro.
  doctrine_reference: Mantener la tensión teológica del texto; no imponer una lectura doctrinal única.
translation_notes:
  revision_awareness: 'Se revisó el rastro auditado en inglés y el contexto hebreo. La versión española busca equilibrio entre literalidad y naturalidad: conserva el giro adversativo, la imagen de prueba/refinamiento y la ambigüedad temporal del verbo final, sin diluir la metáfora.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el tetragrámaton solo cuando el texto lo requiera; aquí el pronombre de tercera persona evita introducirlo explícitamente.
  - Se prefirió «probar» sobre «examinar» por la imagen de oro y refinamiento.
  - Se evitó «Cristo/Mesías», ya que no aparece en el pasaje.
  - La puntuación y el orden responden a un español publicable y bíblico, sin calcos innecesarios.
