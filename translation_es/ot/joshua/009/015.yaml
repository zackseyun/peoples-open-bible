translation:
  language: es
  text: Así Josué hizo la paz con ellos e hizo un pacto con ellos para dejarlos vivir[a][b], y los jefes de la congregación les juraron[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «hizo un pacto con ellos». El hebreo dice literalmente: «cortó un pacto».'
    reason: lexical_alternative
  - marker: b
    text: O «para preservarles la vida» o «para perdonarles la vida».
    reason: lexical_alternative
  - marker: c
    text: O «los líderes de la asamblea» o «los jefes de la comunidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ ... שָׁלוֹם
  english_pob_choice: made peace
  chosen_spanish: hizo paz
  alternatives_spanish:
  - hizo la paz
  - estableció paz con ellos
  lexicon: HALOT
  rationale: El hebreo expresa una relación de paz establecida; en español, «hizo paz» conserva la brevedad idiomática y el sentido relacional sin expandir innecesariamente el texto.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: Convención onomástica bíblica en español
  rationale: El nombre propio se adapta a la forma bíblica usual en español, «Josué», para legibilidad y coherencia canónica.
- source_word: וַיִּכְרֹת ... בְּרִית
  english_pob_choice: made a covenant
  chosen_spanish: hizo un pacto
  alternatives_spanish:
  - concertó un pacto
  - estableció un pacto
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «cortó un pacto», la revisión inglesa ya optó por «made a covenant»; en español, «hizo un pacto» comunica con naturalidad el mismo acto pactal sin perder la referencia al convenio formal.
- source_word: לְחַיּוֹתָם
  english_pob_choice: to let them live
  chosen_spanish: para dejarlos vivir
  alternatives_spanish:
  - para preservarlos con vida
  - para perdonarles la vida
  lexicon: HALOT
  rationale: 'El infinitivo con sufijo expresa finalidad: que siguieran con vida. «Dejarlos vivir» es claro y no sobreinterpreta el matiz.'
- source_word: וַיִּשָּׁבְעוּ לָהֶם
  english_pob_choice: swore to them
  chosen_spanish: les juraron
  alternatives_spanish:
  - juraron ante ellos
  - les hicieron juramento
  lexicon: HALOT
  rationale: El verbo implica tomar un juramento; en español, «les juraron» es conciso y refleja la fuerza obligativa del acto.
- source_word: נְשִׂיאֵי הָעֵדָה
  english_pob_choice: the leaders of the congregation
  chosen_spanish: los jefes de la congregación
  alternatives_spanish:
  - los líderes de la congregación
  - los jefes de la asamblea
  - los principales de la comunidad
  lexicon: HALOT
  rationale: «נְשִׂיאִים» puede referirse a jefes o líderes, y «הָעֵדָה» al cuerpo congregado del pueblo. «Jefes de la congregación» preserva el registro corporativo y la estructura de autoridad sin introducir terminología eclesiástica ajena.
theological_decisions:
- issue: Covenant terminology and imagery
  english_pob_reading: made a covenant
  chosen_spanish_reading: hizo un pacto
  alternative_spanish_readings:
  - concertó un pacto
  - estableció un pacto
  rationale: Se mantiene el acto jurídico-teológico del pacto sin forzar un calco de «cortar». La formulación española conserva la seriedad pactal y la intención narrativa de compromiso vinculante.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of הָעֵדָה
  english_pob_reading: the congregation
  chosen_spanish_reading: la congregación
  alternative_spanish_readings:
  - la asamblea
  - la comunidad
  rationale: «La congregación» preserva el sentido colectivo del pueblo reunido y evita importar estructuras eclesiales posteriores. «Jefes de la congregación» mantiene la relación entre autoridad y cuerpo comunitario.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «cut a covenant» por «made a covenant» para mayor naturalidad, manteniendo el sentido del hebreo. El español sigue esa decisión con «hizo un pacto», evitando un calco menos natural y conservando el valor jurídico del acto.
  spanish_consistency_notes:
  - Se usó «Josué» como forma bíblica estándar en español.
  - Se preservó «congregación» para הָעֵדָה, en línea con el sentido corporativo del texto.
  - Se evitó «SEÑOR» y otros reemplazos no pertinentes, pues no aparece el Tetragrámaton en este versículo.
  - Se mantuvo un registro bíblico sobrio y moderno, sin arcaísmos innecesarios.
