translation:
  language: es
  text: Porque tú hiciste las cosas anteriores y las que siguieron, y las presentes y las que han de venir las dispusiste[a], y llegaron a ser las cosas que dispusiste[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «las proyectaste» o «las concebiste»; el verbo griego puede expresar pensar, considerar o proponerse algo. Además, el griego acumula expresiones temporales para abarcar lo anterior, lo posterior, lo presente y lo venidero.
    reason: lexical_alternative
  - marker: b
    text: O «llegaron a ser lo que dispusiste»; el sentido es que lo que Dios había concebido o propuesto llegó a realizarse.
    reason: alternative_reading
lexical_decisions:
- source_word: σὺ γὰρ
  english_pob_choice: For you
  chosen_spanish: Porque tú
  alternatives_spanish:
  - Pues tú
  - Porque en verdad tú
  lexicon: BDAG
  rationale: γάρ introduce la razón de la súplica; en español, «Porque tú» preserva la fuerza causal y la segunda persona enfática sin sonar forzado.
- source_word: ἐποίησας
  english_pob_choice: made
  chosen_spanish: hiciste
  alternatives_spanish:
  - hiciste llegar a ser
  - creaste
  lexicon: BDAG
  rationale: ποιέω aquí expresa hacer/realizar más que una fórmula técnica de creación; «hiciste» mantiene amplitud semántica y el paralelismo con el resultado posterior.
- source_word: τὰ πρότερα ἐκείνων
  english_pob_choice: the former things / those that followed
  chosen_spanish: las cosas antiguas
  alternatives_spanish:
  - las cosas anteriores
  - las cosas de antes
  lexicon: BDAG
  rationale: La secuencia griega es compacta y temporal; «las cosas antiguas» comunica el valor de anterioridad de τὰ πρότερα con buena naturalidad en español, aunque no reproduce de modo literal la deixis de ἐκείνων.
- source_word: τὰ μετέπειτα
  english_pob_choice: those that followed
  chosen_spanish: las que siguieron
  alternatives_spanish:
  - las posteriores
  - las que vinieron después
  lexicon: BDAG
  rationale: μετέπειτα señala lo que viene después; «las que siguieron» conserva la relación temporal y la continuidad con el plural neutro.
- source_word: τὰ νῦν
  english_pob_choice: the present things
  chosen_spanish: las presentes
  alternatives_spanish:
  - las de ahora
  - las cosas ahora
  lexicon: BDAG
  rationale: νῦν marca el tiempo presente; «las presentes» mantiene la enumeración temporal compacta y paralela.
- source_word: τὰ ἐπερχόμενα
  english_pob_choice: the things to come
  chosen_spanish: las que han de venir
  alternatives_spanish:
  - las venideras
  - las que vienen
  lexicon: BDAG
  rationale: ἐπερχόμενα refiere a lo que viene o se aproxima; «las que han de venir» es natural, solemne y fiel al matiz futuro.
- source_word: διενοήθης
  english_pob_choice: you planned
  chosen_spanish: las pensaste
  alternatives_spanish:
  - las proyectaste
  - las propusiste
  lexicon: BDAG
  rationale: διανοέομαι puede significar pensar, considerar o proponerse algo. Dado el contexto de soberanía divina sobre el tiempo, «las pensaste» conserva el acto interior de concebir/idear sin imponer un tecnicismo excesivo.
- source_word: ἃ ἐνενοήθης
  english_pob_choice: what you planned
  chosen_spanish: las que pensaste
  alternatives_spanish:
  - lo que pensaste
  - las que concebiste
  lexicon: BDAG
  rationale: El relativo retoma el contenido pensado por Dios; repetir «pensaste» refleja la correspondencia semántica entre διενοήθης y ἐνενοήθης y mantiene la coherencia del griego.
- source_word: ἐγενήθησαν
  english_pob_choice: came to be
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - se hicieron realidad
  - acontecieron
  lexicon: BDAG
  rationale: γίνομαι aquí indica que lo pensado por Dios pasó a existir/ocurrir. «Llegaron a ser» preserva el sentido resultativo sin reducirlo a mero suceso.
theological_decisions:
- issue: Relación entre el pensamiento divino y el cumplimiento de lo pensado
  english_pob_reading: Render the verbs in terms of God's making and planning across all times without adding philosophical terminology.
  chosen_spanish_reading: Expresar que Dios hizo, pensó y luego llegaron a ser las cosas pensadas, sin introducir lenguaje filosófico ajeno al texto.
  alternative_spanish_readings:
  - Dios comprendió todas las cosas
  - Dios decretó todas las cosas
  rationale: El griego subraya la soberanía de Dios sobre pasado, presente y futuro mediante una cadena de acción/pensamiento/realización. «Pensaste» y «llegaron a ser» conservan la tensión entre intención y cumplimiento sin sobreexplicar.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Tomé como base la revisión inglesa más reciente, que clarificó la secuencia temporal y evitó una formulación oscura. En español, opté por una estructura igualmente clara y formal, manteniendo el catálogo temporal del griego y el paralelismo entre el pensar divino y el llegar a ser de las cosas.
  spanish_consistency_notes:
  - Usé un registro bíblico formal pero natural en español latinoamericano.
  - 'Mantuve un paralelismo verbal claro: hiciste / pensaste / llegaron a ser.'
  - Elegí términos temporales distintos para cada segmento griego, evitando homogeneizar indebidamente el original.
  - Conservé la ambigüedad productiva de διανοέομαι con una solución que no fuerza una doctrina más allá del texto.
