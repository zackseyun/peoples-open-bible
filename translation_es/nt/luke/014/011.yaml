    issue: La nota [a] no ofrece una alternativa real para ὅτι.
    rationale: El inglés documenta una alternativa entre «For» y «because». En español, el texto principal ya usa «Porque», pero la nota [a] repite «porque...» en lugar de dar una opción como «Pues...» o «Ya que...». Así no preserva la racionalidad auditada de la nota léxica.
