translation:
  language: es
  text: Tú los amonestaste para hacerlos volver[a] a tu ley, pero ellos obraron con presunción y no escucharon tus mandamientos; pecaron contra tus juicios, por los cuales el hombre vivirá si los hace. Presentaron un hombro rebelde, endurecieron su cerviz[b] y no quisieron escuchar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para volverlos a tu ley». El hebreo usa un verbo causativo de hacer regresar; «ley» aquí traduce la torá en sentido pactual.'
    reason: lexical_alternative
  - marker: b
    text: 'Alusión a Levítico 18:5: la obediencia a los estatutos de Dios se presenta como el camino de la vida.'
    reason: cross_reference
lexical_decisions:
- source_word: וַתָּעַד בָּהֶם
  english_pob_choice: You warned them
  chosen_spanish: Tú los amonestaste
  alternatives_spanish:
  - Tú les diste testimonio
  - Tú los advertiste
  lexicon: HALOT
  rationale: El hifil de עוד expresa advertencia solemne o testimonio contra alguien. «Amonestar» comunica bien esa advertencia seria en español sin perder el tono de reprensión pactual.
- source_word: לַהֲשִׁיבָם אֶל תּוֹרָתֶךָ
  english_pob_choice: in order to bring them back to your law
  chosen_spanish: para hacerlos volver a tu ley
  alternatives_spanish:
  - para volverlos a tu ley
  - para restaurarlos a tu instrucción
  lexicon: HALOT
  rationale: שׁוּב en hifil es causar retorno. «Hacerlos volver» conserva la idea de retorno forzado o buscado, y «ley» mantiene el valor pactual/jurídico que el contexto favorece.
- source_word: הֵזִידוּ
  english_pob_choice: they acted presumptuously
  chosen_spanish: obraron con presunción
  alternatives_spanish:
  - obraron con arrogancia
  - obraron con soberbia
  lexicon: HALOT
  rationale: El verbo זיד implica insolencia o presunción deliberada. «Obrar con presunción» reproduce mejor esa actitud de rebeldía que una mera referencia al orgullo interno.
- source_word: לֹא שָׁמְעוּ לְמִצְוֺתֶיךָ
  english_pob_choice: did not listen to your commandments
  chosen_spanish: no escucharon tus mandamientos
  alternatives_spanish:
  - no obedecieron tus mandamientos
  - no prestaron oído a tus mandamientos
  lexicon: HALOT
  rationale: שׁמע conserva el matiz de escuchar con obediencia. «No escucharon» mantiene el idioma bíblico y, en contexto, implica desobediencia.
- source_word: וּבְמִשְׁפָּטֶיךָ חָטְאוּ בָם
  english_pob_choice: they sinned against your judgments
  chosen_spanish: pecaron contra tus juicios
  alternatives_spanish:
  - pecaron respecto de tus decretos
  - pecaron contra tus ordenanzas
  lexicon: HALOT
  rationale: מִשְׁפָּטִים señala decisiones/ordenanzas jurídicas de Dios. «Juicios» preserva esa fuerza legal y el registro tradicional sin sustituirlo por una frase demasiado explicativa.
- source_word: אֲשֶׁר יַעֲשֶׂה אָדָם וְחָיָה בָהֶם
  english_pob_choice: by which a man shall live if he does them
  chosen_spanish: por los cuales el hombre vivirá si los hace
  alternatives_spanish:
  - por los cuales una persona vivirá si los hace
  - que si el hombre los hace, vivirá por ellos
  lexicon: HALOT
  rationale: La cláusula evoca Levítico 18:5. «El hombre» conserva el singular genérico masculino del hebreo אָדָם, y «vivirá si los hace» refleja de modo natural el orden revisado del inglés POB y el sentido del hebreo.
- source_word: וַיִּתְּנוּ כָתֵף סוֹרֶרֶת
  english_pob_choice: They gave a stubborn shoulder
  chosen_spanish: Les dieron hombro contumaz
  alternatives_spanish:
  - presentaron un hombro rebelde
  - volvieron un hombro rebelde
  lexicon: HALOT
  rationale: Es un modismo de resistencia obstinada. «Hombro contumaz» conserva la metáfora y la dureza del hebreo mejor que una paráfrasis más plana.
- source_word: וְעָרְפָּם הִקְשׁוּ
  english_pob_choice: stiffened their neck
  chosen_spanish: endurecieron su cerviz
  alternatives_spanish:
  - endurecieron su cuello
  - pusieron rígida su cerviz
  lexicon: HALOT
  rationale: El hebreo usa una imagen idiomática de obstinación. «Cerviz» mantiene el eco bíblico y el paralelismo con la metáfora del hombro.
- source_word: וְלֹא שָׁמֵעוּ
  english_pob_choice: would not listen
  chosen_spanish: no quisieron escuchar
  alternatives_spanish:
  - no escucharon
  - rehusaron escuchar
  lexicon: HALOT
  rationale: El cierre resume una negativa persistente. «No quisieron escuchar» comunica mejor la resistencia voluntaria que un simple pasado descriptivo.
theological_decisions:
- issue: Sentido genérico de אָדָם en la cláusula de vida
  english_pob_reading: a man / if a man does them
  chosen_spanish_reading: el hombre / si los hace
  alternative_spanish_readings:
  - una persona
  - la gente
  rationale: El hebreo usa אָדָם en singular genérico con fuerza representativa. Se conserva «el hombre» para no neutralizar indebidamente el texto, dejando claro en la nota que se trata de un uso genérico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Eco de Levítico 18:5 en la frase de vida por los mandamientos
  english_pob_reading: an allusion to Leviticus 18:5
  chosen_spanish_reading: una alusión a Levítico 18:5
  alternative_spanish_readings:
  - referencia a Levítico 18:5
  - eco de Levítico 18:5
  rationale: La expresión de vida por los estatutos reproduce claramente el patrón de Levítico 18:5. La nota ayuda a que el lector perciba la intertextualidad sin alterar el cuerpo del versículo.
  doctrine_reference: Cross-reference note in English POB audit trail
translation_notes:
  revision_awareness: 'La revisión inglesa reciente ajustó la cláusula final sobre los juicios para reflejar mejor el hebreo: «by which a man shall live if he does them». La redacción española sigue ese orden natural: «por los cuales el hombre vivirá si los hace», manteniendo la relación entre juicios, obediencia y vida. También se preservó la tensión lexical de «hombre» como genérico representativo, sin neutralizarla.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito mediante segunda persona en todo el versículo, conforme al estándar del proyecto para el nombre divino cuando el hebreo tiene sufijo de 2ª persona.
  - «Ley» se usa para תּוֹרָה en este contexto pactual; no se sustituyó por «instrucción» en el texto principal para conservar la fuerza normativa.
  - Se eligieron imágenes idiomáticas españolas («hombro contumaz», «cerviz») para preservar el paralelismo poético del hebreo.
  - Se evitó «obedecer» en el primer miembro para no duplicar innecesariamente el valor de «escuchar» y mantener la variedad semántica del original.
