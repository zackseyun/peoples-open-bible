translation:
  language: es
  text: Antes de formarte en el vientre, te conocí[a]; y antes de que salieras del vientre, te aparté[b]; te designé como profeta a las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «te conocí» también puede implicar estima personal o elección, pero la traducción conserva la expresión más amplia.
    reason: lexical_alternative
  - marker: b
    text: O, «te consagré».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  english_pob_choice: Before
  chosen_spanish: Antes de
  alternatives_spanish:
  - Antes que
  - Previo a
  lexicon: HALOT
  rationale: La partícula temporal expresa anterioridad simple. «Antes de» es natural en español y conserva la secuencia sin añadir énfasis no explícito en el hebreo.
- source_word: אצור/ך
  english_pob_choice: I formed you
  chosen_spanish: te formé
  alternatives_spanish:
  - te modelé
  - te creé
  lexicon: HALOT
  rationale: El verbo de יצר conserva la imagen concreta de dar forma. «Te formé» reproduce bien esa idea en español y evita sustituirla por «te creé», que sería más amplio que el matiz del texto.
- source_word: בַבטן
  english_pob_choice: in the womb
  chosen_spanish: en el vientre
  alternatives_spanish:
  - en el seno materno
  - en el vientre materno
  lexicon: HALOT
  rationale: En contexto prenatal, la referencia es al lugar de gestación. «Vientre» es una solución española natural y fiel; «vientre materno» o «seno materno» serían posibles, pero más explicativos.
- source_word: יְדַעְתִּיךָ
  english_pob_choice: I knew you
  chosen_spanish: te conocí
  alternatives_spanish:
  - te conocí íntimamente
  - te escogí
  lexicon: HALOT
  rationale: Se mantiene el verbo «conocer» para no estrechar el campo semántico de ידע a una sola idea de elección. «Te conocí» conserva la tensión lexical y relacional del original, como en el POB inglés.
- source_word: וּבְטֶרֶם
  english_pob_choice: and before
  chosen_spanish: y antes de
  alternatives_spanish:
  - e incluso antes de
  - y previo a
  lexicon: HALOT
  rationale: La conjunción suma la segunda cláusula temporal. «Y antes de» refleja el paralelismo hebreo de manera directa y fluida.
- source_word: תֵּצֵא
  english_pob_choice: you came out
  chosen_spanish: salieras
  alternatives_spanish:
  - salieras a la luz
  - vinieras al mundo
  lexicon: HALOT
  rationale: El verbo יצא literalmente es «salir». En este contexto de nacimiento, «salieras» mantiene la concreción del hebreo y suena natural en español, sin reemplazarlo por una paráfrasis más interpretativa.
- source_word: מֵרֶחֶם
  english_pob_choice: from the womb
  chosen_spanish: del vientre
  alternatives_spanish:
  - del seno
  - del vientre materno
  lexicon: HALOT
  rationale: La preposición más el sustantivo designan procedencia prenatal. «Del vientre» es la forma breve y clara en español; el complemento «materno» puede quedar implícito por el contexto.
- source_word: הִקְדַּשְׁתִּיךָ
  english_pob_choice: I set you apart
  chosen_spanish: te aparté
  alternatives_spanish:
  - te consagré
  - te santifiqué
  lexicon: HALOT
  rationale: קדש en hiphil puede significar consagrar o apartar para un fin santo. «Te aparté» comunica ese acto de dedicación sin cargarlo con terminología eclesiástica más técnica; la alternativa «te consagré» se preserva en la nota.
- source_word: נָבִיא
  english_pob_choice: a prophet
  chosen_spanish: como profeta
  alternatives_spanish:
  - profeta
  - en calidad de profeta
  lexicon: HALOT
  rationale: 'El sustantivo se traduce de forma estándar. Se introduce «como» para reflejar la función predicativa de la frase en español: te puse como profeta.'
- source_word: לַגּוֹיִם
  english_pob_choice: to the nations
  chosen_spanish: para las naciones
  alternatives_spanish:
  - a las naciones
  - para los pueblos
  lexicon: HALOT
  rationale: גוֹיִם alude a naciones/pueblos. «Para las naciones» expresa bien el destino y alcance del encargo profético sin introducir el uso neotestamentario de «gentiles».
- source_word: נְתַתִּיךָ
  english_pob_choice: I appointed you
  chosen_spanish: te puse
  alternatives_spanish:
  - te nombré
  - te asigné
  lexicon: HALOT
  rationale: נתן puede funcionar en contextos de comisión como «poner», «asignar» o «nombrar». «Te puse» es más breve y bíblicamente natural en español; el sentido de designación queda claro por el complemento «como profeta para las naciones».
theological_decisions:
- issue: Alcance de ידע en «te conocí»
  english_pob_reading: Retain the broader relational verb 'I knew you' without narrowing it to 'chose you'.
  chosen_spanish_reading: Mantener «te conocí» en el texto principal, sin reducirlo a «te escogí».
  alternative_spanish_readings:
  - te escogí
  - te reconocí
  rationale: El hebreo ידע puede incluir conocimiento personal, relacional y de elección implícita. Traducirlo con «conocer» preserva la ambigüedad fecunda del texto y deja visible la tensión lexical que el POB inglés también mantiene.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Matiz de הִקְדַּשְׁתִּיךָ
  english_pob_reading: Use 'I set you apart' rather than the more technical 'I consecrated you.'
  chosen_spanish_reading: Usar «te aparté» en el texto principal, con «te consagré» como alternativa preservada.
  alternative_spanish_readings:
  - te consagré
  - te santifiqué
  rationale: Ambas opciones son posibles; «te aparté» resulta más natural y comunica dedicación a un propósito santo. La alternativa más técnica se preserva para auditabilidad y para no perder la posible fuerza cultual del verbo.
  doctrine_reference: Translation philosophy §6 Readable modern English, not archaic or academic
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo (WLC) y el audit trail inglés POB sin cambios relevantes posteriores; la versión española mantiene el paralelismo temporal, la tensión semántica de ידע y la alternativa lexical de קדש documentada en el registro inglés.
  spanish_consistency_notes:
  - Se emplea «Yahvé» sólo cuando el hebreo lo exija explícitamente; este versículo no contiene el Tetragrámaton.
  - «Vientre» se usa de forma consistente para בטן/רחם en este contexto prenatal.
  - Se evitó «gentiles» para גוים, manteniendo «naciones» como en el inglés POB.
  - La frase «te puse como profeta» conserva un español bíblico claro sin depender de fórmula litúrgica fija.
