id: PSS.15.1
reference: Psalms of Solomon 15:1
source:
  edition: lxx-swete-1909
  text: Ἐν τῷ θλίβεσθαί με ἐπεκαλεσάμην τὸ ὄνομα Κυρίου, εἰς βοήθειαν ἤλπισα τοῦ θεοῦ Ἰακώβ, καὶ ἐσώθην·
  language: Greek
  pages:
  - 804
  validation: swete_direct
translation:
  text: When I was in distress[a], I called on the name of the Lord; I hoped for help from the God of Jacob[b], and I was saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I was saved.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I hoped in the God of Jacob for help'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἐν τῷ θλίβεσθαί με
  chosen: When I was in distress
  alternatives:
  - In my affliction
  - When I was afflicted
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is naturally temporal here ('when ...'), and θλίβω/θλίβομαι in this context denotes being pressed or distressed. 'In distress' is idiomatic modern English while preserving the sense of affliction.
- source_word: ἐπεκαλεσάμην
  chosen: I called on
  alternatives:
  - I called upon
  - I invoked
  lexicon: BDAG
  rationale: The middle form here means to call upon or invoke. 'Called on' is clear modern English and preserves the prayerful appeal implied by the expression.
- source_word: τὸ ὄνομα Κυρίου
  chosen: the name of the Lord
  lexicon: BDAG
  rationale: This is a standard biblical expression for invoking the Lord himself. κύριος is rendered 'Lord' per project policy for Kyrios.
- source_word: εἰς βοήθειαν
  chosen: for help
  alternatives:
  - for assistance
  - unto help
  lexicon: BDAG
  rationale: The phrase expresses the goal or expected result of the hoping. 'For help' is the most natural concise rendering in English.
- source_word: ἤλπισα
  chosen: I hoped in
  alternatives:
  - I trusted in
  - I set my hope on
  lexicon: BDAG
  rationale: ἐλπίζω can denote hoping or placing confidence. 'Hoped in' keeps the lexical connection to hope while still sounding acceptable in context.
- source_word: τοῦ θεοῦ Ἰακώβ
  chosen: the God of Jacob
  lexicon: BDAG
  rationale: A fixed biblical designation for Israel's God; it should be preserved straightforwardly rather than expanded.
- source_word: ἐσώθην
  chosen: I was delivered
  alternatives:
  - I was saved
  lexicon: BDAG
  rationale: σῴζω can mean save or deliver. In a context of distress and appeal for help, 'delivered' better communicates concrete rescue without importing a narrower theological sense, while the alternative remains valid.
