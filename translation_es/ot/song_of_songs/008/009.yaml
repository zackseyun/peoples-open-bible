translation:
  language: es
  text: Si ella es muro[a], edificaremos sobre ella un torreón de plata; pero si ella es puerta[b], la cercaremos con una tabla de cedro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'torreón de plata'. La expresión hebrea puede referirse a una estructura fortificada o semejante a una torre.
    reason: lexical_alternative
  - marker: b
    text: O 'la guardaremos con una tabla de cedro'. El verbo hebreo puede llevar el sentido de cercar, encerrar, asediar o guardar.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹמָה
  english_pob_choice: wall
  chosen_spanish: muro
  alternatives_spanish:
  - pared
  - muralla
  lexicon: HALOT
  rationale: El término designa un muro o pared; 'muro' conserva la imagen base y funciona bien en español para la metáfora de firmeza o contención, sin forzar una lectura excesivamente militar.
- source_word: נִבְנֶה
  english_pob_choice: we will build
  chosen_spanish: edificaremos
  alternatives_spanish:
  - construiremos
  - edificaremos nosotros
  lexicon: HALOT
  rationale: El verbo en imperfecto 1cp expresa una acción futura condicionada; 'edificaremos' mantiene el sentido de construir sobre algo y suena natural en español bíblico formal.
- source_word: טִירַת כָּסֶף
  english_pob_choice: a battlement of silver
  chosen_spanish: un torreón de plata
  alternatives_spanish:
  - una torre de plata
  - un adarve de plata
  lexicon: HALOT
  rationale: La expresión puede aludir a una estructura fortificada o tipo torre. 'Torreón' preserva el valor de fortaleza/torre y evita una precisión arquitectónica demasiado moderna; 'de plata' conserva el material literal.
- source_word: דֶּלֶת
  english_pob_choice: door
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - puerta
  lexicon: HALOT
  rationale: Aunque en inglés se eligió 'door', en español 'puerta' es la equivalencia natural y mantiene la imagen doméstica/metafórica mejor que 'portón'.
- source_word: נָצ֥וּר
  english_pob_choice: we will enclose
  chosen_spanish: la cerraremos
  alternatives_spanish:
  - la cercaremos
  - la encerraremos
  lexicon: HALOT
  rationale: El verbo admite la idea de cercar, encerrar o asediar. En español, 'la cerraremos' transmite bien la idea de cerrar y asegurar una puerta; por el contexto metafórico, no se impone una lectura militar explícita.
- source_word: לוּחַ אָרֶז
  english_pob_choice: a board of cedar
  chosen_spanish: una tabla de cedro
  alternatives_spanish:
  - un tablón de cedro
  - una plancha de cedro
  lexicon: HALOT
  rationale: '''Tabla'' es una equivalencia clara y sobria para לוּחַ; ''de cedro'' conserva el material literal y la imagen concreta de la pieza de madera.'
- source_word: עָלֶיהָ
  english_pob_choice: on her
  chosen_spanish: sobre ella
  alternatives_spanish:
  - encima de ella
  - contra ella
  lexicon: HALOT
  rationale: La preposición 'sobre' conserva el valor espacial de על con el sufijo femenino singular y reproduce la metáfora de construir sobre la mujer como muro.
- source_word: וְאִם
  english_pob_choice: but if
  chosen_spanish: pero si
  alternatives_spanish:
  - y si
  - mas si
  lexicon: HALOT
  rationale: '''Pero si'' expresa con claridad el contraste entre las dos condiciones, como en la versión inglesa auditada.'
theological_decisions:
- issue: Metáfora de la mujer como muro/puerta en un pasaje sobre amor y honra
  english_pob_reading: The verse presents conditional metaphors of wall and door without resolving them into a single doctrinal statement; the imagery remains open and figurative.
  chosen_spanish_reading: El verso conserva las metáforas condicionales de muro y puerta sin fijarlas como alegoría cerrada; la ambigüedad figurada se mantiene.
  alternative_spanish_readings:
  - Interpretar el muro como castidad o firmeza moral de manera explícita
  - Convertir la puerta en una imagen de vulnerabilidad sexual de modo directo
  rationale: La tarea exige no borrar una tensión léxica o teológica documentada. Mantener la imagen abierta respeta el texto hebreo y la cautela del POB en la nota sobre alternativas arquitectónicas.
  doctrine_reference: Canticum Canticorum 8:9; prudencia hermenéutica ante metáforas nupciales y de protección
- issue: Valor de נָצוּר entre cerrar, cercar, guardar o asediar
  english_pob_reading: The Hebrew verb can carry the sense of enclosing, besieging, or guarding.
  chosen_spanish_reading: Se traduce con 'la cerraremos', dejando implícita la idea de cerrar o asegurar, sin imponer una lectura militar.
  alternative_spanish_readings:
  - la cercaremos
  - la asediaremos
  - la guardaremos
  rationale: La nota inglesa preserva la tensión semántica. En español, 'la cerraremos' permite la lectura de asegurar una puerta y evita una militarización innecesaria, sin negar las otras posibilidades.
  doctrine_reference: HALOT sobre צור; nota lexical de alternativas
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y toma como guía la solución inglesa auditada, pero ajusta algunas elecciones al español natural: ''muro'' para חוֹמָה, ''torreón'' para טִירַת כָּסֶף y ''la cerraremos'' para נָצוּר. No se detectaron revisiones previas aplicadas en el paquete fuente; se preserva la ambigüedad léxica documentada en las notas.'
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' fuera del versículo porque no aparecen en el texto.
  - Se conserva el paralelismo condicional con 'Si... pero si...' para reflejar la estructura hebrea.
  - '''Sobre ella'' reproduce el valor preposicional de עָלֶיהָ en la primera cláusula; en la segunda, el objeto directo pronominal ''la'' sigue el español natural tras ''cerraremos''.'
  - No se introduce terminología eclesiástica tradicional que oscurezca la metáfora arquitectónica original.
