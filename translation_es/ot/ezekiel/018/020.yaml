    text: 'O, más literalmente: «El alma que peca, esa morirá». Aquí «alma» (hebreo נֶפֶשׁ, nefesh) se refiere al individuo responsable.'
    reason: lexical_alternative
  - marker: b
    text: «Llevar la iniquidad» es un modismo jurídico hebreo que puede abarcar tanto culpa como la responsabilidad que conlleva.
    reason: cultural_note
  revision_rationale: Se corrige la nota léxica para preservar la alternativa más literal documentada ('alma') y se reubica la nota jurídica al verbo/frase que realmente explica ('llevar la iniquidad'). También se suaviza 'esa morirá' a 'esa misma morirá' para mejor naturalidad sin perder el énfasis del hebreo.
