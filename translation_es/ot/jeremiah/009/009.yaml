translation:
  language: es
  text: Sobre los montes alzaré llanto y lamento, y sobre los pastizales del desierto, un lamento, porque han sido devastados[a], de modo que no pasa ningún hombre[b], y ya no se oye el sonido del ganado. Desde las aves de los cielos[c] hasta los animales, han huido; se han ido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han sido quemados». El verbo hebreo pasivo puede denotar devastación de manera más general, aunque probablemente también esté presente la imagen de incendio.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «ningún hombre», con «hombre» usado genéricamente para cualquier persona.
    reason: lexical_alternative
  - marker: c
    text: O «las aves del cielo». El hebreo «cielos» es una manera común de referirse al cielo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשָּׂא
  english_pob_choice: I will lift up
  chosen_spanish: alzaré
  alternatives_spanish:
  - levantaré
  - elevaré
  lexicon: HALOT
  rationale: El verbo hebreo נשׂא conserva la imagen de elevar o levantar una expresión de duelo. En español, «alzaré» mantiene esa fuerza idiomática sin sonar forzado.
- source_word: בְכִי
  english_pob_choice: weeping
  chosen_spanish: llanto
  alternatives_spanish:
  - lloro
  - lágrimas
  lexicon: HALOT
  rationale: Es un sustantivo de duelo y llanto. «Llanto» es natural en español y encaja bien con el paralelismo poético.
- source_word: נֶהִי
  english_pob_choice: wailing
  chosen_spanish: lamento
  alternatives_spanish:
  - clamor de duelo
  - plañido
  lexicon: HALOT
  rationale: El término expresa duelo y lamentación. «Lamento» conserva el registro poético y distingue esta voz del término posterior קִינָה.
- source_word: נְאוֹת מִדְבָּר
  english_pob_choice: the pastures of the wilderness
  chosen_spanish: las praderas del desierto
  alternatives_spanish:
  - los pastizales del desierto
  - los lugares de pasto del desierto
  lexicon: HALOT
  rationale: La construcción remite a lugares de pastoreo en tierra árida. «Praderas del desierto» comunica la imagen de forma clara y literaria en español.
- source_word: קִינָה
  english_pob_choice: a lament
  chosen_spanish: una endecha
  alternatives_spanish:
  - un lamento
  - un canto fúnebre
  lexicon: HALOT
  rationale: קִינָה designa un lamento formal o canto fúnebre. «Endecha» conserva ese valor técnico-poético mejor que un simple «lamento» en español, y evita repetir exactamente la forma anterior.
- source_word: נִצְּתוּ
  english_pob_choice: they are laid waste
  chosen_spanish: han sido devastadas
  alternatives_spanish:
  - han sido arrasadas
  - están devastadas
  lexicon: HALOT
  rationale: La versión inglesa opta por el sentido general de devastación, sin fijar necesariamente la metáfora de fuego. «Han sido devastadas» respeta esa amplitud y suena natural en español.
- source_word: מִבְּלִי אִישׁ עֹבֵר
  english_pob_choice: so that no man passes through
  chosen_spanish: sin que pase ningún hombre
  alternatives_spanish:
  - de modo que no pasa nadie
  - sin que nadie pase
  lexicon: HALOT
  rationale: La expresión denota abandono total. En español, «sin que pase ningún hombre» conserva el valor genérico de אִישׁ que la traducción inglesa anotó como humano genérico.
- source_word: קוֹל מִקְנֶה
  english_pob_choice: the sound of livestock
  chosen_spanish: el sonido del ganado
  alternatives_spanish:
  - la voz del ganado
  - el sonido de los rebaños
  lexicon: HALOT
  rationale: קול es «sonido/voz» y מִקְנֶה se refiere al ganado o animales domésticos. «Ganado» es el equivalente más natural y amplio en español.
- source_word: מֵעֹוף הַשָּׁמַיִם
  english_pob_choice: From the birds of the heavens
  chosen_spanish: Desde las aves de los cielos
  alternatives_spanish:
  - Desde las aves del cielo
  - Desde las aves del firmamento
  lexicon: HALOT
  rationale: Se conserva la formulación cosmológica hebrea. «De los cielos» mantiene el plural del hebreo y la amplitud imagística del original; la nota explica la posibilidad de «cielo» en singular.
- source_word: בְּהֵמָה
  english_pob_choice: beasts
  chosen_spanish: los animales
  alternatives_spanish:
  - las bestias
  - el ganado
  lexicon: HALOT
  rationale: Aquí el término abarca animales de manera general dentro de un rango poético. «Los animales» evita una restricción innecesaria que «bestias» podría sugerir en español.
- source_word: נָדְד֖וּ הָלָכ֑וּ
  english_pob_choice: they have fled; they are gone
  chosen_spanish: han huido; se han ido
  alternatives_spanish:
  - han escapado; se han alejado
  - se han dispersado; se han ido
  lexicon: HALOT
  rationale: Los dos verbos intensifican la idea de desaparición. La pareja «han huido; se han ido» preserva la duplicación enfática sin sonar redundante.
theological_decisions:
- issue: Personificación del lamento sobre montes y pasturas devastadas
  english_pob_reading: The verse is poetic, describing mourning over devastated land and the disappearance of life.
  chosen_spanish_reading: El verso conserva el tono poético de duelo por una tierra devastada y vaciada de vida.
  alternative_spanish_readings:
  - Una lectura más literal y seca podría decir simplemente que la tierra está arrasada.
  - Otra podría suavizar la imagen poética, pero eso perdería el paralelismo del hebreo.
  rationale: 'No hay una cuestión doctrinal controvertida aquí, pero sí una decisión de registro: mantener el paralelismo poético y la personificación del duelo sin explicitar más de lo que el texto dice.'
  doctrine_reference: Poética profética; sin referencia doctrinal específica
- issue: Valor genérico de אִישׁ en «ningún hombre»
  english_pob_reading: Hebrew 'no man passes through,' with 'man' used generically for any person.
  chosen_spanish_reading: Se mantuvo «ningún hombre» con sentido genérico.
  alternative_spanish_readings:
  - ninguna persona
  - nadie
  rationale: La nota inglesa preserva el valor genérico masculino del hebreo. En español, «ningún hombre» es fiel al dato gramatical; la nota aclara que no excluye a las mujeres en el referente genérico.
  doctrine_reference: Uso genérico del masculino en lenguaje bíblico
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la cláusula de נִצְּתוּ desde 'burned up' a 'laid waste' para evitar sobreespecificar el fuego. Esta versión española sigue esa revisión con «han sido devastadas», manteniendo el sentido amplio de desolación. También conserva la doble cadencia final ('han huido; se han ido') y la nota sobre el hebreo genérico de 'man'.
  spanish_consistency_notes:
  - Se mantuvo Yahvé no aplica aquí porque el versículo no contiene el nombre divino.
  - Se prefirió «ganado» para מִקְנֶה, en línea con el valor de animales domésticos y el contexto de desolación pastoral.
  - «Aves de los cielos» preserva la imaginería hebrea y queda explicada en la nota para lectores que prefieran «cielo».
  - «Endecha» se usa de forma técnica-poética para קִינָה y evita colapsarlo con el «lamento» previo.
  - La puntuación reproduce el paralelismo del hebreo y la intensificación final con dos verbos consecutivos.
