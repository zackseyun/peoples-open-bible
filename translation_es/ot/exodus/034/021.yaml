translation:
  language: es
  text: Seis días trabajarás[a], pero el séptimo día cesarás; en tiempo de arar y en tiempo de siega cesarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reposarás». El verbo hebreo significa cesar o detenerse, y por extensión descansar.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁשֶׁת יָמִים
  english_pob_choice: Six days
  chosen_spanish: Seis días
  alternatives_spanish:
  - Por seis días
  - Durante seis días
  lexicon: HALOT
  rationale: La construcción hebrea expresa un lapso de seis días; el español más directo y natural es «Seis días», que conserva la tersura del original sin añadir una preposición no presente en el hebreo.
- source_word: תַּעֲבֹד
  english_pob_choice: you shall work
  chosen_spanish: trabajarás
  alternatives_spanish:
  - deberás trabajar
  - podrás trabajar
  - harás tu labor
  lexicon: HALOT
  rationale: El verbo qal imperfecto en este contexto tiene fuerza instructiva/covenantal. «Trabajarás» mantiene esa obligatoriedad sin suavizarla a permiso («podrás») ni introducir una perífrasis más interpretativa.
- source_word: וּ/בַ/יּ֥וֹם הַ/שְּׁבִיעִ֖י
  english_pob_choice: but on the seventh day
  chosen_spanish: pero en el séptimo día
  alternatives_spanish:
  - y en el séptimo día
  - mas en el séptimo día
  lexicon: HALOT
  rationale: Aunque la partícula puede ser simple conjunción, aquí el contraste con los seis días de trabajo es claro; «pero» expresa ese giro discursivo de manera natural en español.
- source_word: תִּשְׁבֹּת
  english_pob_choice: you shall cease
  chosen_spanish: cesarás
  alternatives_spanish:
  - reposarás
  - descansarás
  - te detendrás
  lexicon: HALOT
  rationale: El núcleo léxico de שׁבת es cesar/detenerse. «Cesarás» preserva ese valor básico mejor que «descansarás», que puede sugerir solo reposo físico y no el cese de la labor. Se mantiene la misma solución en ambas apariciones por consistencia.
- source_word: בֶּ/חָרִ֥ישׁ
  english_pob_choice: in plowing time
  chosen_spanish: en tiempo de arar
  alternatives_spanish:
  - en tiempo de arado
  - durante la labranza
  - en la temporada de arar
  lexicon: HALOT
  rationale: חרישׁ se refiere al arar/plowing, con matiz temporal por el contexto. «En tiempo de arar» comunica bien ese valor de temporada o momento agrícola sin volverlo demasiado técnico.
- source_word: וּ/בַ/קָּצִ֖יר
  english_pob_choice: and in harvest
  chosen_spanish: y en tiempo de siega
  alternatives_spanish:
  - y en la siega
  - y en la cosecha
  - y durante la siega
  lexicon: HALOT
  rationale: קציר puede referirse a la siega/cosecha, y el paralelo con «en tiempo de arar» favorece una expresión temporal similar. «En tiempo de siega» conserva la estructura paralela y el sentido agrícola del término.
- source_word: תִּשְׁבֹּת (second occurrence)
  english_pob_choice: you shall cease
  chosen_spanish: cesarás
  alternatives_spanish:
  - reposarás
  - descansarás
  - te detendrás
  lexicon: HALOT
  rationale: La repetición final refuerza la prohibición de trabajar aun en épocas de máxima actividad agrícola. Repetir «cesarás» mantiene la correspondencia léxica con el primer uso y la fuerza enfática del hebreo.
theological_decisions:
- issue: Sentido de שׁבת en un mandato sabático
  english_pob_reading: Translate as 'cease' rather than 'rest' in both occurrences.
  chosen_spanish_reading: Traducir como «cesarás» y no como «descansarás» en ambas apariciones.
  alternative_spanish_readings:
  - Traducir como «descansarás»
  - Traducir como «reposarás»
  rationale: El versículo subraya el cese de la labor incluso en períodos críticos de cultivo y cosecha. «Cesarás» preserva el sentido lexical de detener la actividad sin añadir una implicación subjetiva de reposo que el hebreo no exige.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: El texto coincide con el pasaje fuente y sigue la revisión estable más reciente del audit trail en inglés, sin cambios aplicados. Se conservó la decisión clave de traducir שׁבת con un verbo de cese para mantener la consistencia léxica y el contraste entre trabajo y cesación.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre las dos ocurrencias de תִּשְׁבֹּת con «cesarás».
  - Se evitó «SEÑOR» u otra terminología no pertinente porque el versículo no contiene el Tetragrámaton ni κύριος.
  - «Tiempo de arar» y «tiempo de siega» preservan el marco agrícola del hebreo sin sobreexplicar.
  - La nota [a] refleja la alternativa léxica documentada en el audit trail inglés y es útil en español porque «cesar» puede sonar menos usual que «descansar» en lectura devocional.
