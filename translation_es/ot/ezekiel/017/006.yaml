base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/017/006.yaml
  text: And it sprouted and became a spreading vine[a], low in stature, with its branches turned toward him and its roots beneath him[c][b]. So it became a vine and produced branches and sent out boughs.
  footnotes:
  - marker: a
    text: Or 'luxuriant' or 'branching' vine' for 'spreading vine.'
    reason: lexical_alternative
  - marker: b
    text: The repeated 'became a vine' is retained from the Hebrew for emphasis.
    reason: lexical_alternative
  - marker: c
    text: The pronouns 'him' likely refer to the great eagle in the allegory (cf. Ezek 17:3–4), though some render them more impersonally as 'it.'
    reason: cross_reference
