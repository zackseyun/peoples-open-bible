    rationale: לַהֲמִיתוֹ en este entorno narrativo-judicial se expresa mejor como «para darle muerte» o equivalente. Esto preserva mejor la gravedad que el inglés POB justificó con «to put him to death».
  revised_spanish_text: Pero la mano de Ahicam hijo de Safán estaba con Jeremías[a], de modo que no fue entregado en manos[b] del pueblo para darle muerte.
