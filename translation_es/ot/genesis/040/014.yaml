revisions:
- from: Pero si me recuerdas junto contigo[a] cuando te vaya bien, te ruego que me muestres bondad, y hagas mención de mí ante Faraón[b], y me saques de esta casa.
  to: Pero si me recuerdas cuando te vaya bien,[a] te ruego que me muestres bondad, y me menciones a Faraón,[b] y me saques de esta casa.
  rationale: La revisión corrige el principal problema de fidelidad y naturalidad al eliminar del texto principal el calco impropio «junto contigo», pero preserva el matiz hebreo en una nota clara y exacta. También ajusta «ante Faraón» a «a Faraón» para reflejar mejor אֶל y simplifica la expresión a un español más natural y fiel.
