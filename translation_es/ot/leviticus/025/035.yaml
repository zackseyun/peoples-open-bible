translation:
  language: es
  text: Si tu hermano se empobrece y su mano flaquea contigo[b], entonces lo sustentarás[a]; vivirá contigo como extranjero residente o como residente temporal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «lo sustentarás —al extranjero residente y al residente temporal—»; la frase hebrea «extranjero residente y residente temporal» está sintácticamente comprimida y puede entenderse de otra manera.
    reason: alternative_reading
  - marker: b
    text: Lit., «su mano flaquea contigo»; es un modismo que expresa la pérdida de medios o la incapacidad de sostenerse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Y si
  - Ahora si
  lexicon: HALOT
  rationale: Introduce una cláusula condicional de caso legal; en español, «Si» transmite con naturalidad la estructura del hebreo sin añadir un matiz no presente.
- source_word: יָמוּךְ
  english_pob_choice: becomes poor
  chosen_spanish: se empobrece
  alternatives_spanish:
  - se hace pobre
  - llega a ser pobre
  lexicon: HALOT
  rationale: El verbo expresa un deterioro económico. «Se empobrece» comunica esa disminución de recursos de forma clara y digna.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano de comunidad
  - tu pariente
  lexicon: HALOT
  rationale: Se conserva el término de parentesco literal, como en el texto fuente, sin sustituirlo por una paráfrasis interpretativa.
- source_word: וּמָטָה יָדוֹ עִמָּךְ
  english_pob_choice: and his hand falters with you
  chosen_spanish: y su mano flaquea contigo
  alternatives_spanish:
  - y le fallan los medios contigo
  - y su mano desfallece contigo
  lexicon: HALOT
  rationale: La expresión idiomática se mantiene de manera transparente. «Flaquea» preserva la imagen de la mano como metáfora de capacidad o recursos, sin resolverla demasiado temprano.
- source_word: וְהֶחֱזַקְתָּ בּוֹ
  english_pob_choice: then you shall support him
  chosen_spanish: entonces lo sustentarás
  alternatives_spanish:
  - entonces lo apoyarás
  - entonces lo sostendrás
  - entonces lo fortalecerás
  lexicon: HALOT
  rationale: El hiphil de חזק aquí implica darle sostén efectivo. «Sustentar» conserva mejor la fuerza de apoyo material y social que un simple «ayudar».
- source_word: גֵּר
  english_pob_choice: resident foreigner
  chosen_spanish: residente extranjero
  alternatives_spanish:
  - forastero residente
  - extranjero residente
  - forastero
  lexicon: HALOT
  rationale: Se prefiere una formulación clara y moderna que conserve el matiz de residencia estable dentro de la comunidad, sin recurrir a «forastero» como término principal por su posible ambigüedad.
- source_word: וְתוֹשָׁב
  english_pob_choice: temporary resident
  chosen_spanish: residente temporal
  alternatives_spanish:
  - morador temporal
  - habitante temporal
  - estante temporal
  lexicon: HALOT
  rationale: Distingue el segundo término del primero y mantiene la idea de una permanencia no plena o no permanente.
- source_word: גֵּר וְתוֹשָׁב
  english_pob_choice: as a resident foreigner or a temporary resident
  chosen_spanish: como residente extranjero o como residente temporal
  alternatives_spanish:
  - como extranjero residente o residente temporal
  - como residente forastero o residente temporal
  lexicon: HALOT
  rationale: La lectura castellana conserva la compresión sintáctica del hebreo sin forzar una paráfrasis mayor. El «como» muestra que la frase final modifica el modo de su vida contigo.
- source_word: וָחַי
  english_pob_choice: so that he may live
  chosen_spanish: vivirá
  alternatives_spanish:
  - para que viva
  - y vivirá
  - a fin de que viva
  lexicon: HALOT
  rationale: En español, el futuro simple puede expresar el resultado esperado en esta norma legal. Mantiene fluidez y evita una sobreexplicación del propósito.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con vosotros
  - entre vosotros
  - con ustedes
  lexicon: HALOT
  rationale: Reproduce la relación de cercanía y convivencia del hebreo con una forma natural en español, sin perder el vínculo comunitario.
theological_decisions:
- issue: Conservación de la imagen idiomática de la mano que flaquea
  english_pob_reading: Literal, 'his hand falters with you,' an idiom for losing means or becoming unable to support himself.
  chosen_spanish_reading: Se mantiene la imagen de «su mano flaquea contigo» en el texto principal.
  alternative_spanish_readings:
  - sus recursos se agotan contigo
  - le fallan los medios contigo
  - ya no puede sostenerse
  rationale: La traducción conserva la tensión entre literalidad e idiomatismo para no borrar la metáfora hebrea ni ocultar su fuerza semántica; la nota permite la aclaración semántica sin reemplazar el texto base.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Relación de 'residente extranjero o residente temporal' con el sujeto del mandato
  english_pob_reading: 'Render as a comparative/appositional phrase modifying how the poor brother is to be supported: ''as a resident foreigner or a temporary resident.'''
  chosen_spanish_reading: 'La frase final se entiende como una comparación de su modo de vivir contigo: «como residente extranjero o como residente temporal».'
  alternative_spanish_readings:
  - susténlo, al residente extranjero y al residente temporal
  - susténlo como residente extranjero y como residente temporal
  rationale: El hebreo es comprimido; la redacción española sigue la lectura appositiva/comparativa sin resolver en exceso la ambigüedad. Se preserva así el margen interpretativo documentado por el POB inglés.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó עִמָּךְ a «with you» y reordenó la cláusula final para que «as a resident foreigner or a temporary resident» modifique con mayor naturalidad el estado del sujeto. La versión española sigue esa decisión, manteniendo además la nota sobre la compresión sintáctica del hebreo.
  spanish_consistency_notes:
  - Se conservó «tu hermano» para אָחִיךָ, acorde con el tono legal-covenantal del pasaje.
  - «Sustentar» se eligió por su fuerza material y social, más cercana al hiphil de חזק en este contexto que «ayudar».
  - «Residente extranjero / residente temporal» mantiene la distinción léxica entre גֵּר y תוֹשָׁב sin recurrir a un término tradicional único que borre la diferencia.
  - Se evitó «SEÑOR» u otra convención de sustitución porque este versículo no contiene el Tetragrámaton.
