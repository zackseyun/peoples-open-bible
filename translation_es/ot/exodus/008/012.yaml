  to: 'Entonces Yahvé dijo a Moisés: «Di a Aarón: “Extiende tu vara y golpea el polvo de la tierra, y se convertirá en piojos[a] en toda la tierra de Egipto”».'
  rationale: Se conserva toda la estructura y el sentido del original, pero se ajusta el término principal para לְכִנִּם a una opción más reconocible en lectura bíblica española, manteniendo explícitamente en nota la incertidumbre léxica del hebreo. También se elimina la nota innecesaria sobre «Yahvé» para evitar sobrecargar el versículo con información no esencial.
