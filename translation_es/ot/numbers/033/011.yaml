translation:
  language: es
  text: Salieron del Mar Rojo[a] y acamparon en el desierto de Sin[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del Mar de Juncos». El hebreo yam suf se traduce tradicionalmente «Mar Rojo», pero la versión más literal suele entenderse como «Mar de Juncos».
    reason: lexical_alternative
  - marker: b
    text: «Sin» es el nombre de una región desértica, no el concepto moral de pecado.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: En la fórmula itineraria de Números 33, נסע expresa la salida de un campamento o lugar. En español, «salieron» transmite de manera natural y precisa ese movimiento inicial sin volverlo demasiado literario.
- source_word: מִיַּם סוּף
  english_pob_choice: from the Red Sea
  chosen_spanish: del Mar Rojo
  alternatives_spanish:
  - del Mar de Juncos
  - del mar de las cañas
  lexicon: HALOT
  rationale: El POB inglés tomó «Red Sea» como topónimo tradicional, preservando en nota la alternativa más literal. En español, «Mar Rojo» es el equivalente tradicional y reconocible para este nombre geográfico; la lectura más literal se conserva en nota.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: y acamparon
  alternatives_spanish:
  - y acamparon allí
  - y plantaron el campamento
  lexicon: HALOT
  rationale: חנה designa hacer campamento en un contexto de itinerario del desierto. «Acamparon» es claro y conserva el sentido concreto del verbo sin añadir matices no presentes en el hebreo.
- source_word: בְּמִדְבַּר סִין
  english_pob_choice: in the wilderness of Sin
  chosen_spanish: en el desierto de Sin
  alternatives_spanish:
  - en la región desértica de Sin
  - en el yermo de Sin
  lexicon: HALOT
  rationale: מִדְבָּר puede ser «desierto» o «tierra despoblada». Aquí el topónimo exige una expresión geográfica natural en español. «Sin» se translitera como nombre propio y no se traduce por su semejanza con la palabra española «sin».
theological_decisions:
- issue: Nombre geográfico 'Sin' y posible confusión con el concepto moral de 'pecado'
  english_pob_reading: '''Sin'' is the name of a wilderness region, not the moral concept of sin.'
  chosen_spanish_reading: '''Sin'' es el nombre de una región desértica, no el concepto moral de pecado.'
  alternative_spanish_readings:
  - '''Sin'' no significa pecado aquí.'
  - '''Sin'' es un topónimo, no un término ético.'
  rationale: El hebreo presenta un topónimo que coincide accidentalmente con una palabra española cargada de sentido moral. Para evitar confusión pastoral y filológica, se explicita que se trata de un nombre de lugar y no del concepto de pecado.
  doctrine_reference: Ninguna; nota de desambiguación léxica y cultural
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente y con el resumen de verificación: no se requieren cambios textuales adicionales respecto del contenido fuente y la decisión lexical principal se mantiene estable.'
  spanish_consistency_notes:
  - Se mantuvo la fórmula narrativa breve propia de las listas de itinerario de Números.
  - Se prefirió «Mar Rojo» como topónimo tradicional, conservando la alternativa literal en nota.
  - Se evitó «SEÑOR» u otra sustitución teológica porque el verso no contiene el nombre divino.
  - «Sin» se dejó como nombre propio transliterado para preservar la distinción con el sustantivo español «sin».
