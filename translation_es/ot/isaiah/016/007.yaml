translation:
  language: es
  text: Por tanto, Moab se lamentará por Moab; todo entero se lamentará. Por las tortas de pasas[a] de Kir-hareset gemirán, completamente abatidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «por los cimientos de Kir-hareset»; el hebreo אֲשִׁישֵׁי es difícil, pero el Texto Masorético se lee más naturalmente como «tortas de pasas».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Introduce la consecuencia del juicio previo con una conexión inferencial natural en español, sin debilitar el valor consecutivo del hebreo.
- source_word: יְיֵלִיל
  english_pob_choice: will wail
  chosen_spanish: se lamentará
  alternatives_spanish:
  - aullará
  - gemirá
  lexicon: HALOT
  rationale: El verbo expresa lamento intenso en contexto de juicio. 'Se lamentará' conserva el campo semántico del duelo y suena más natural y digno que 'aullará' en español bíblico.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: HALOT
  rationale: Nombre propio transliterado; mantiene la personificación de la nación/territorio.
- source_word: לְמוֹאָב
  english_pob_choice: for Moab
  chosen_spanish: por Moab
  alternatives_spanish:
  - contra Moab
  - a causa de Moab
  lexicon: HALOT
  rationale: La ל aquí marca el objeto o motivo del lamento. 'Por Moab' permite la lectura de Moab llorando por sí mismo, en línea con el audit trail inglés.
- source_word: כֻּלֹּה
  english_pob_choice: all of it
  chosen_spanish: todo él
  alternatives_spanish:
  - todo ello
  - toda la nación
  lexicon: HALOT
  rationale: La referencia colectiva a Moab como entidad personificada puede expresarse en español con 'todo él', manteniendo la personificación que el inglés resolvió como 'all of it'.
- source_word: לַאֲשִׁישֵׁי
  english_pob_choice: for the raisin-cakes
  chosen_spanish: por los pasteles de uva pasa[a]
  alternatives_spanish:
  - por los pasteles prensados
  - por los pasteles de pasas
  lexicon: HALOT
  rationale: La palabra hebrea es difícil, pero el texto masorético se entiende más naturalmente como 'pasteles de uva pasa/raisin-cakes'. Se eligió una forma clara en español que preserve la imagen de abundancia perdida.
- source_word: קִיר חֲרֶשֶׂת
  english_pob_choice: Kir-hareseth
  chosen_spanish: Kir-hareset
  alternatives_spanish:
  - Kir-hareseth
  - Quir-hareset
  lexicon: HALOT
  rationale: Topónimo transliterado; se adapta mínimamente a la ortografía española manteniendo reconocible el nombre propio.
- source_word: תֶּהְגּוּ
  english_pob_choice: you will moan
  chosen_spanish: ustedes gemirán
  alternatives_spanish:
  - ustedes se lamentarán
  - ustedes murmurarán
  lexicon: HALOT
  rationale: El verbo puede significar gemir, murmurar o proferir un lamento bajo. 'Gemirán' recoge bien el tono audible de aflicción y permite el cambio a segunda persona plural que el hebreo sugiere.
- source_word: אַךְ
  english_pob_choice: utterly
  chosen_spanish: completamente
  alternatives_spanish:
  - solo
  - ciertamente
  - enteramente
  lexicon: HALOT
  rationale: Aquí funciona como intensificador, no como restricción. 'Completamente' expresa la fuerza enfática de modo claro en español contemporáneo.
- source_word: נְכָאִים
  english_pob_choice: stricken
  chosen_spanish: abatidos
  alternatives_spanish:
  - heridos
  - aplastados
  - afligidos
  lexicon: HALOT
  rationale: El término describe a los que han sido golpeados/derribados por la aflicción. 'Abatidos' transmite bien la idea de estar vencidos y hundidos en duelo o desastre.
theological_decisions:
- issue: Personificación de Moab como sujeto que llora por sí mismo
  english_pob_reading: Moab will wail for Moab; all of it will wail.
  chosen_spanish_reading: Moab se lamentará por Moab; todo él se lamentará.
  alternative_spanish_readings:
  - Moab lamentará a Moab
  - Moab llorará por Moab
  rationale: 'Se preserva la personificación nacional del hebreo y del inglés auditado, sin convertirla en una expresión meramente impersonal. ''Se lamentará por Moab'' deja intacta la ambigüedad retórica: la nación llora por su propia ruina.'
  doctrine_reference: Poética profética; personificación literaria sin implicación doctrinal específica
- issue: Sentido de אַךְ + נְכָאִים
  english_pob_reading: utterly stricken
  chosen_spanish_reading: completamente abatidos
  alternative_spanish_readings:
  - enteramente heridos
  - totalmente aplastados
  rationale: Se conserva la acumulación de intensificación y estado de ruina. El español requiere concordancia fluida con el plural verbal, por lo que el participio/adjetivo se adapta en plural sin borrar la dureza del juicio.
  doctrine_reference: Lenguaje de juicio profético; no afecta una doctrina específica
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión que movió la frase preposicional para hacerla más natural: de una construcción equivalente a ''ustedes gemirán por...'' a ''por los pasteles... ustedes gemirán''. La versión española sigue esa estructura natural y mantiene la ambigüedad lexical de אֲשִׁישֵׁי mediante nota.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' cuando no aparece en este versículo; aquí no corresponde introducir ningún nombre divino.
  - Se usó 'Kir-hareset' como transliteración consistente de topónimos en español.
  - Se evitó 'SEÑOR' o paráfrasis explicativas no sustentadas por el hebreo.
  - La nota al pie preserva la alternativa textual/lexical documentada por el audit trail inglés.
