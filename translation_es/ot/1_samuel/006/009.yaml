    text: Or 'this great disaster' or 'this great calamity.' The Hebrew word can denote severe harm or calamity, not necessarily moral evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'it was a chance occurrence for us.'
    reason: lexical_alternative
