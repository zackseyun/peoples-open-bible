review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: prohibición total de consumir cualquier cosa leudada y mandato positivo de comer panes sin levadura en todos sus lugares de residencia. Sin embargo, la colocación de las notas está invertida respecto al inglés auditado y respecto a las unidades fuente: la nota sobre la amplitud de מַחְמֶצֶת debe anclarse en «nada leudado», mientras que la nota sobre בְּכֹל מוֹשְׁבֹתֵיכֶם debe anclarse en la frase locativa. Además, «moradas» es inteligible pero algo tieso en español actual; «lugares donde habitan» o «hogares» sería más natural, aunque «moradas» no es incorrecto.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para mejorar naturalidad y precisión de notas. «No comerán nada leudado» es bueno. «En todas sus moradas» es comprensible, pero suena más literario que natural; «en todos sus hogares» podría sonar demasiado doméstico, mientras que el hebreo también puede abarcar asentamientos. Una solución equilibrada y legible es «en todos los lugares donde habitan».
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Panes sin levadura» representa bien מַצּוֹת. «Leudado» preserva la amplitud de מַחְמֶצֶת, aunque en varias regiones «con levadura» sería más idiomático; no obstante, el término elegido es aceptable y teológicamente neutro.
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas a las frases equivocadas.
    rationale: La nota que explica la amplitud de מַחְמֶצֶת corresponde a «nada leudado», no a la frase locativa. La nota sobre «por todas sus poblaciones / todo lugar donde habiten» corresponde a בְּכֹל מוֹשְׁבֹתֵיכֶם, no a «leudado». Esto afecta la fidelidad del aparato de notas al rastro de auditoría.
  - severity: low
    issue: «Moradas» suena algo poco natural en español contemporáneo neutral.
    rationale: Aunque semánticamente posible para מוֹשְׁבֹתֵיכֶם, una formulación más natural y ampliamente comprensible mejora la legibilidad sin perder alcance.
  revised_spanish_text: No comerán nada leudado[a]; en todos los lugares donde habitan[b] comerán panes sin levadura.
  revised_footnotes:
  - marker: a
    text: O «ninguna cosa leudada». El hebreo es más amplio que «pan» y abarca cualquier cosa hecha con levadura o leudada.
    reason: lexical_alternative
  - marker: b
    text: O «en todas sus moradas» o «por todas sus poblaciones». La frase se refiere a todo lugar donde habiten.
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a las palabras fuente correctas y se mejora la naturalidad de «moradas» con una expresión más clara en español neutral, sin cambiar el sentido del hebreo ni del POB inglés.
