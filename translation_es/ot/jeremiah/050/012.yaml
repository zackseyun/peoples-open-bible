revisions:
- from: Tu madre quedará totalmente avergonzada; la que te dio a luz será deshonrada. Mira[a], ella será la última de las naciones, un desierto, una tierra seca y un desierto.
  to: Su madre quedará totalmente avergonzada; la que los dio a luz será deshonrada. Miren[a], ella será la última de las naciones, un desierto, una tierra seca y una estepa.
  rationale: Se ajusta el tratamiento pronominal al plural del hebreo con un español natural («su madre ... los dio a luz»), se conserva la metáfora maternal y el futuro profético, y se repara la tríada final diferenciando los tres términos de desolación. «Estepa» para עֲרָבָה evita la repetición de «desierto» y preserva mejor la gradación semántica documentada en el audit trail inglés.
