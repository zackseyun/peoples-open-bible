translation:
  language: es
  text: 'Siguió desde allí y encontró a Jonadab, hijo de Recab, que venía a su encuentro. Lo saludó[a] y le dijo: «¿Está tu corazón recto, como mi corazón está con tu corazón?[b]» Jonadab respondió: «Sí, sí[c]». Entonces él dijo: «Dame tu mano». Y él le dio su mano, y lo hizo subir junto a sí al carro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo bendijo». El verbo hebreo puede significar «bendecir», pero en esta escena de encuentro probablemente funciona como saludo o salutación.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «¿Está tu corazón recto, como mi corazón con tu corazón?». La expresión comunica lealtad mutua o alineación de propósito.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «Sí, y sí»; una afirmación enfática.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ מִשָּׁם
  english_pob_choice: He went on from there
  chosen_spanish: Él siguió de allí
  alternatives_spanish:
  - Él fue de allí
  - Él se fue de allí
  lexicon: HALOT
  rationale: El imperfecto narrativo con מִשָּׁם indica continuidad de movimiento desde el lugar anterior. «Siguió de allí» conserva la progresión narrativa con español natural.
- source_word: וַיִּמְצָא אֶת יְהוֹנָדָב בֶּן־רֵכָב
  english_pob_choice: found Jehonadab the son of Rechab
  chosen_spanish: encontró a Jonadab, hijo de Recab
  alternatives_spanish:
  - halló a Jonadab, hijo de Recab
  - se encontró con Jonadab, hijo de Recab
  lexicon: HALOT
  rationale: מצא normalmente significa «encontrar». Aunque el contexto es un encuentro en el camino, «encontró» preserva mejor el valor léxico que un simple «se encontró con».
- source_word: לִקְרָאתוֹ
  english_pob_choice: coming to meet him
  chosen_spanish: que venía a su encuentro
  alternatives_spanish:
  - para encontrarse con él
  - que iba a su encuentro
  lexicon: HALOT
  rationale: La construcción con קרא expresa movimiento para el encuentro. «Venía a su encuentro» comunica claramente la dirección del movimiento sin añadir más de lo que dice el hebreo.
- source_word: וַיְבָרְכֵהוּ
  english_pob_choice: He greeted him
  chosen_spanish: Lo saludó
  alternatives_spanish:
  - Lo bendijo
  - Lo saludó respetuosamente
  lexicon: HALOT
  rationale: ברך puede significar «bendecir», pero en una escena de encuentro funciona como saludo o salutación. «Lo saludó» evita imponer una bendición formal no explicitada por el contexto.
- source_word: הֲיֵשׁ אֶת־לְבָבְךָ יָשָׁר
  english_pob_choice: Is your heart upright
  chosen_spanish: ¿Está tu corazón recto?
  alternatives_spanish:
  - ¿Está tu corazón íntegro?
  - ¿Está tu corazón honrado?
  lexicon: HALOT
  rationale: לֵבָב denota la disposición interior, y יָשָׁר expresa rectitud/uprightness. «Recto» conserva la imagen de integridad interior y mantiene la fuerza relacional del hebreo.
- source_word: כַּאֲשֶׁר לְבָבִי עִם־לְבָבֶךָ
  english_pob_choice: as my heart is with your heart
  chosen_spanish: como mi corazón está con tu corazón
  alternatives_spanish:
  - como mi corazón está alineado con tu corazón
  - como mi corazón está hacia tu corazón
  lexicon: HALOT
  rationale: La frase es idiomática y relacional. Mantener «corazón» en ambos lados preserva la metáfora de lealtad interior; «con» refleja עִם sin interpretar en exceso.
- source_word: יֵשׁ וָיֵשׁ
  english_pob_choice: It is, it is
  chosen_spanish: Sí, sí
  alternatives_spanish:
  - Es así, es así
  - Ciertamente, ciertamente
  lexicon: HALOT
  rationale: La duplicación intensifica la afirmación. En español, «sí, sí» comunica la respuesta enfática con naturalidad, sin ocultar la repetición.
- source_word: תְּנָה אֶת־יָדֶךָ
  english_pob_choice: Give me your hand
  chosen_spanish: Dame tu mano
  alternatives_spanish:
  - Extiende tu mano
  - Pon tu mano
  lexicon: HALOT
  rationale: El imperativo de נתן con «mano» es un modismo para extenderla como señal de compromiso o ayuda. «Dame tu mano» es idiomático en español y corresponde a la solicitud.
- source_word: וַיִּתֵּן יָדוֹ
  english_pob_choice: he gave him his hand
  chosen_spanish: y él le dio su mano
  alternatives_spanish:
  - y dio su mano
  - y extendió su mano
  lexicon: HALOT
  rationale: La segunda cláusula responde directamente a la petición. Se conserva la referencia pronominal que en hebreo queda implícita y el paralelismo con la expresión anterior.
- source_word: וַיַּעֲלֵהוּ אֵלָיו אֶל־הַמֶּרְכָּבָה
  english_pob_choice: he took him up to himself into the chariot
  chosen_spanish: y lo hizo subir junto a sí en el carro
  alternatives_spanish:
  - y lo subió junto a sí al carro
  - y lo llevó consigo al carro
  lexicon: HALOT
  rationale: עלה en hifil significa hacer subir o llevar arriba. «Lo hizo subir junto a sí» conserva el sentido de movimiento ascendente y la cercanía de אֵלָיו sin atribuir más de lo que dice el texto.
theological_decisions:
- issue: Cómo renderizar ברך en una escena de encuentro sin forzar una bendición cultual
  english_pob_reading: He greeted him
  chosen_spanish_reading: Lo saludó
  alternative_spanish_readings:
  - Lo bendijo
  - Lo saludó como gesto de cortesía
  rationale: El inglés POB ya señala que el verbo puede significar «bless», pero que en este contexto probablemente funciona como saludo. En español, «lo saludó» mantiene esa lectura contextual y evita una lectura litúrgica no asegurada por el relato.
  doctrine_reference: Ninguna
- issue: Cómo traducir la frase de lealtad del corazón sin debilitar su fuerza relacional
  english_pob_reading: Is your heart upright, as my heart is with your heart?
  chosen_spanish_reading: ¿Está tu corazón recto, como mi corazón está con tu corazón?
  alternative_spanish_readings:
  - ¿Está tu corazón derecho, como mi corazón con tu corazón?
  - ¿Es tu corazón íntegro, como mi corazón está con el tuyo?
  rationale: La pregunta apunta a alineación interior y fidelidad mutua, no solo a una cualidad moral abstracta. «Corazón recto» conserva la tensión entre integridad moral y lealtad personal sin resolverla en una sola dirección.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del POB inglés: en las cláusulas finales se mantuvieron pronombres implícitos/expresos que corresponden al hebreo, evitando repetir el nombre de Jehú donde el texto no lo repite. También se siguió la nota auditada de que ברך aquí probablemente es un saludo, no una bendición formal.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el tetragrámaton en este texto.
  - Se prefirió «corazón» para לֵבָב, en línea con el valor relacional e interior del hebreo.
  - Se evitó «siervo» o vocabulario eclesiástico no presente; el versículo es narrativo y de alianza personal.
  - Se conservó el paralelismo pronominal de las cláusulas finales para reflejar el hebreo y la revisión inglesa más reciente.
