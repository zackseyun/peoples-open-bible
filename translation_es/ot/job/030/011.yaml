    issue: La nota [a] traduce erróneamente la alternativa como «su arco».
    rationale: El inglés documenta «his bowstring», no «his bow». Cambiar de cuerda a arco modifica el objeto y falsea la evidencia léxica.
  - severity: medium
    issue: «su cordón» es una elección poco adecuada para יִתְרוֹ.
    rationale: En español bíblico y general, «cuerda» comunica mejor la imagen de cord/string. «Cordón» suena diminutivo, ornamental o técnico, y debilita la metáfora.
  - severity: medium
    issue: La cláusula «ellos han quitado la rienda de delante de mí» es demasiado literal y poco idiomática.
    rationale: El POB inglés ya determinó que el sentido es «cast off restraint before me». En español, conviene expresar el sentido principal en el texto y dejar la imagen literal en nota.
  revised_spanish_text: Porque él ha aflojado su cuerda[a] y me ha afligido, ellos han desechado toda contención[b] ante mí.
