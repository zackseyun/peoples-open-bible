translation:
  language: es
  text: Y revistió la gran casa con madera de ciprés[a], la revistió de oro fino, y puso sobre ella palmeras y cadenas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "madera de enebro" o "madera de abeto" para בְּרוֹשׁ. La identidad exacta del término hebreo es debatida.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "palmeras y cadenas"; probablemente se trata de motivos decorativos aplicados a la sala.'
    reason: cultural_note
lexical_decisions:
- source_word: הַבַּיִת הַגָּדוֹל
  english_pob_choice: the great house
  chosen_spanish: la gran casa
  alternatives_spanish:
  - el gran edificio
  - la gran sala principal
  lexicon: HALOT
  rationale: בַּיִת significa literalmente "casa", pero en un contexto de construcción del templo puede referirse a la edificación principal. "Casa" conserva el término arquitectónico básico; "gran" reproduce fielmente הַגָּדוֹל.
- source_word: חִפָּה
  english_pob_choice: paneled
  chosen_spanish: revistió
  alternatives_spanish:
  - cubrió
  - forró
  lexicon: HALOT
  rationale: El verbo חפה significa cubrir u overlay. En español, "revistió" comunica mejor una cobertura aplicada a una superficie arquitectónica que un simple "cubrió", y evita la rigidez de un calco.
- source_word: עֵץ בְּרוֹשִׁים
  english_pob_choice: cypress wood
  chosen_spanish: madera de ciprés
  alternatives_spanish:
  - madera de junípero
  - madera de abeto
  lexicon: HALOT
  rationale: בְּרוֹשׁ tiene debate lexical, pero la opción principal en la POB inglesa es "cypress wood". "Madera de ciprés" mantiene esa decisión y expresa con claridad el material indicado por עֵץ.
- source_word: וַיְחַפֵּהוּ זָהָב טוֹב
  english_pob_choice: overlaid it with fine gold
  chosen_spanish: la cubrió de oro fino
  alternatives_spanish:
  - la revistió de oro fino
  - la cubrió con oro bueno
  lexicon: HALOT
  rationale: La repetición de חפה indica cubrir/overlay. "La cubrió de oro fino" es natural en español y preserva tanto la acción de recubrir como la calidad de זָהָב טוֹב, literalmente "oro bueno".
- source_word: וַיַּעַל עָלָיו
  english_pob_choice: put palm trees and chains on it
  chosen_spanish: puso sobre ella
  alternatives_spanish:
  - aplicó sobre ella
  - colocó sobre ella
  lexicon: HALOT
  rationale: עלה en este contexto describe añadir o aplicar ornamentación sobre la superficie. "Puso sobre ella" refleja el orden natural del español y conserva la relación espacial del hebreo.
- source_word: תִּמֹרִים
  english_pob_choice: palm trees
  chosen_spanish: palmeras
  alternatives_spanish:
  - palmeras talladas
  - figuras de palmeras
  lexicon: HALOT
  rationale: El hebreo nombra "palmeras" o formas de palmera. "Palmeras" mantiene el término directo; el contexto decorativo sugiere ornamento, pero el texto fuente no explicita el material ni la técnica.
- source_word: וְשַׁרְשְׁרֹות
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - eslabones
  - guirnaldas
  lexicon: HALOT
  rationale: שַׁרְשְׁרוֹת denota cadenas o adornos en forma de cadena. "Cadenas" es la equivalencia más directa y transparente para el lector español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la solución auditada en inglés: conserva la secuencia de recubrimiento con madera y oro, y mantiene los adornos finales como objetos colocados sobre la superficie, no como una paráfrasis general. Se integró la revisión inglesa que favorece "put ... on it" mediante "puso sobre ella".'
  spanish_consistency_notes:
  - Se usa "Yahvé" por defecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se mantiene "la gran casa" en vez de una paráfrasis litúrgica como "templo", porque el hebreo dice literalmente "casa".
  - '"Ciprés" sigue la elección auditada de la POB inglesa, con nota de alternativa por la discusión lexical de בְּרוֹשׁ.'
  - '"Palmeras y cadenas" se conserva con nota explicativa porque el hebreo puede referirse a ornamentos, pero el texto no lo explicita en la superficie semántica.'
