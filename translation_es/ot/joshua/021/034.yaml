review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: continuación distributiva («Y a las familias de»), identificación del subgrupo levítico («los levitas restantes»), procedencia («de la tribu de Zabulón») y la lista de dos ciudades con sus tierras circundantes. Sin embargo, el topónimo קַרְתָּה no está fielmente representado por «Quirta»; la evidencia y la auditoría inglesa apoyan «Kartah»/«Kartha» como variantes transliteradas, no una adaptación libre con cambio consonántico.'
  spanish_quality_summary: El español es generalmente claro y legible. «Y a las familias de los hijos de Merari» y «los levitas restantes» suenan naturales en contexto de lista. «Ejidos» puede funcionar para מִגְרָשֶׁהָ en registros bíblicos modernos, aunque es regional y algo técnico; no obstante, sigue siendo defendible. El problema principal de calidad es «Quirta», que no es una forma reconocible ni justificada del topónimo.
  glossary_alignment: No hay términos teológicos sensibles aquí. La alineación léxica con el proyecto es buena en general. Se conserva correctamente «Merari», «levitas», «tribu de Zabulón» y el valor de מִגְרָשֶׁהָ. Debe corregirse el nombre de lugar קַרְתָּה a «Kartah», con nota para la variante «Kartha», en consonancia con la auditoría inglesa y la transliteración más cercana al hebreo.
  issues:
  - severity: high
    issue: Topónimo קַרְתָּה traducido como «Quirta»
    rationale: «Quirta» no refleja de manera fiel ni reconocible el topónimo hebreo ni la decisión documentada en el POB inglés. Introduce un cambio consonántico no sustentado por la fuente. Debe usarse «Kartah» y preservar «Kartha» como variante en nota.
  - severity: low
    issue: La nota al pie está anclada en «Merari[a]» pero trata sobre «Quirta»
    rationale: El marcador [a] debe aparecer en el lugar pertinente del texto, es decir, junto al topónimo al que explica. Tal como está, la nota no cumple la disciplina de anclaje requerida.
  revised_spanish_text: 'Y a las familias de los hijos de Merari, los levitas restantes, de la tribu de Zabulón: Jocneam con sus ejidos, y Kartah[a] con sus ejidos.'
  revised_footnotes:
