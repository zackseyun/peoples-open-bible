translation:
  language: es
  text: 'Pero dijimos: «No podemos bajar. Si nuestro hermano menor está con nosotros, entonces bajaremos, porque no podemos ver el rostro[a] del hombre si nuestro hermano menor no está con nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «ver el rostro del hombre», un modismo que significa comparecer ante él o presentarse en su presencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֹּאמֶר
  english_pob_choice: But we said
  chosen_spanish: Pero dijimos
  alternatives_spanish:
  - Y dijimos
  - Entonces dijimos
  lexicon: HALOT
  rationale: El waw narrativo avanza la escena; «Pero» conserva el matiz discursivo de contraste suave con la situación previa, y «dijimos» es el valor directo de אמר en primera persona plural.
- source_word: לֹא נוּכַל לָרֶדֶת
  english_pob_choice: We cannot go down
  chosen_spanish: No podemos bajar
  alternatives_spanish:
  - No podemos descender
  - No somos capaces de bajar
  lexicon: HALOT
  rationale: נוּכַל expresa capacidad; en español «podemos»/«no podemos» es natural. «Bajar» conserva el movimiento geográfico implícito en ירד sin volverlo forzado.
- source_word: אִם יֵשׁ אָחִינוּ הַקָּטֹן אִתָּנוּ
  english_pob_choice: unless our youngest brother is with us
  chosen_spanish: Si nuestro hermano menor está con nosotros
  alternatives_spanish:
  - Si nuestro hermano más joven está con nosotros
  - A menos que nuestro hermano menor esté con nosotros
  lexicon: HALOT
  rationale: El hebreo presenta una condición positiva; en español es más transparente mantener «si» y dejar que la relación lógica se complete en la cláusula siguiente. הַקָּטֹן aquí designa al hermano menor de la familia, no simplemente a uno pequeño de estatura.
- source_word: וְיָרַדְנוּ
  english_pob_choice: then we will go down
  chosen_spanish: entonces bajaremos
  alternatives_spanish:
  - y bajaremos
  - bajaremos entonces
  lexicon: HALOT
  rationale: La forma verbal funciona como consecuencia de la condición. «Entonces» hace explícita esa relación en español y preserva el carácter consecutivo del miembro.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: כִּי introduce aquí la razón de la negativa; «porque» comunica claramente la causalidad en español moderno. Se evita «pues» por posible ambigüedad de registro.
- source_word: לִרְאוֹת פְּנֵי הָאִישׁ
  english_pob_choice: see the man's face
  chosen_spanish: ver el rostro de aquel hombre
  alternatives_spanish:
  - ver la faz de aquel hombre
  - presentarnos ante aquel hombre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ver el rostro de...», un modismo para comparecer ante alguien. Se conserva la imagen concreta con «rostro», que en español es más natural que «cara» en este registro, y se añade «aquel» para reflejar la referencia contextual a José sin imponer un título no presente en el texto.
- source_word: וְאָחִינוּ הַקָּטֹן אֵינֶנּוּ אִתָּנוּ
  english_pob_choice: if our youngest brother is not with us
  chosen_spanish: si nuestro hermano menor no está con nosotros
  alternatives_spanish:
  - y nuestro hermano menor no está con nosotros
  - si nuestro hermano más joven no está con nosotros
  lexicon: HALOT
  rationale: 'Aunque el hebreo usa waw, el sentido sigue siendo condicional: la imposibilidad de comparecer depende de la ausencia del hermano menor. El español repite la condición con «si» para mantener la fuerza lógica y la repetición retórica del original.'
theological_decisions:
- issue: Referencia al divino nombre y ausencia de implicación teológica directa
  english_pob_reading: No theological decision is noted in the English audit for this verse.
  chosen_spanish_reading: No se introduce ninguna referencia teológica adicional; el versículo permanece como relato familiar.
  alternative_spanish_readings:
  - Añadir una lectura devocional implícita
  - Explicitar una aplicación espiritual
  rationale: El texto hebreo y el audit inglés describen una conversación narrativa sin carga doctrinal directa. La traducción debe mantener ese nivel sin añadir interpretación.
  doctrine_reference: Ninguna específica; fidelidad narrativa
- issue: Modismo hebreo de ‘ver el rostro’
  english_pob_reading: Hebrew literally, 'see the face of the man,' an idiom meaning to appear before him or come into his presence.
  chosen_spanish_reading: «ver el rostro de aquel hombre» con el valor idiomático de comparecer ante él
  alternative_spanish_readings:
  - presentarnos ante aquel hombre
  - ver la presencia de aquel hombre
  rationale: Se preserva la imagen semítica sin perder inteligibilidad. En español, «rostro» mantiene la metáfora; la nota aclara que no se trata solo de percepción visual.
  doctrine_reference: Principios de traducción semítica y transparencia textual
translation_notes:
  revision_awareness: 'El análisis inglés muestra dos decisiones importantes: mantener la imagen de «see the man''s face» y evitar una solución tautológica para la condición y su consecuencia. La versión española conserva la estructura en dos pasos: primero la imposibilidad («No podemos bajar»), luego la condición repetida («si nuestro hermano menor está con nosotros») y su resultado («entonces bajaremos»), sin forzar una construcción con «a menos que» que en español podría sonar menos transparente al hebreo.'
  spanish_consistency_notes:
  - Se mantiene «hermano menor» para הַקָּטֹן, en línea con el sentido familiar y no meramente físico.
  - Se evita «SEÑOR» o «Mesías», porque el versículo no contiene esos términos.
  - Se usa «rostro» para פְּנֵי, preservando la metáfora semítica.
  - Se evita «siervo»/«esclavo» porque no aparece δοῦλος en este pasaje.
  - La puntuación conserva la cita directa y la articulación lógica del discurso.
