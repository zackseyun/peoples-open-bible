review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del hebreo: Sihón no permitió el paso, reunió a todo su pueblo, salió al encuentro de Israel en el desierto y luego combatió contra Israel. Sin embargo, la distribución y el contenido de las notas no siguen fielmente el rastro auditado en inglés: falta la nota sobre «todo su pueblo», se introdujo una nota nueva sobre «en el desierto» que no corresponde a una ambigüedad relevante en español, y la nota sobre la variante de Jahaz/Jahzah quedó anclada en el lugar equivocado. También conviene ajustar «Llegó a Jahaz» a «vino a Jahaz» o «llegó a Jahaz»; ambas pueden funcionar, pero «vino a Jahaz» refleja mejor וַיָּבֹא dentro de la secuencia narrativa.'
  spanish_quality_summary: El español es claro y natural. «No permitió», «salió al encuentro de», y «peleó contra Israel» son lecturas idiomáticas y fieles. No obstante, las notas necesitan reorganización para evitar confusión y para preservar las decisiones léxicas documentadas por el POB inglés. Además, es preferible no marcar con nota el topónimo en sí, sino la mención pertinente, y mantener el orden de marcadores sin saltos extraños.
  glossary_alignment: 'No hay términos teológicos mayores en juego. El borrador mantiene bien las opciones léxicas principales: «no permitió» por נָתַן idiomático, «territorio» por בִּגְבֻלוֹ, y «peleó contra» por וַיִּלָּחֶם בְּ. La excepción problemática no es de glosario sino de aparato de notas: debe conservarse la alternativa «frontera» y la nota de «todo su pueblo», y la variante «Jahzah» puede conservarse como nota secundaria sobre el topónimo.'
  issues:
  - severity: medium
    issue: Falta la nota léxica sobre «todo su pueblo».
    rationale: El inglés auditado preserva explícitamente que el hebreo dice «all his people» y no «army». Esa decisión debe mantenerse también en español porque protege contra una sobreinterpretación militar.
  - severity: medium
    issue: La nota [b] sobre «en el desierto» introduce una explicación no requerida.
    rationale: El POB inglés no nota «in the wilderness» para justificar movimiento; más bien la nota c inglesa trata la variante Jahaz/Jahzah, y la b inglesa trata «all his people». En español no surge una ambigüedad nueva que justifique esa nota.
  - severity: low
    issue: La nota sobre Jahaz/Jahzah está mal anclada y fuera de la secuencia esperable de marcadores.
    rationale: Si se conserva, debe ir anclada al topónimo «Jahaz[a/b/c]» o al lugar correspondiente en el texto revisado, no desplazar otras notas más importantes.
  revised_spanish_text: Pero Sihón no permitió a Israel pasar por su territorio[a]. Así que Sihón reunió a todo su pueblo[b] y salió al encuentro de Israel en el desierto. Vino a Jahaz[c] y peleó contra Israel.
