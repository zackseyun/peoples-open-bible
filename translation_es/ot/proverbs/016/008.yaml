translation:
  language: es
  text: Mejor es poco con rectitud que grandes ingresos[a] sin justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosechas», «rendimientos» o «ganancias». El término hebreo puede referirse al producto agrícola o, más ampliamente, a retornos materiales.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Mejor
  lexicon: HALOT
  rationale: En el estilo proverbial hebreo, טוב funciona comparativamente. En español, la construcción natural y sobria es «Mejor es ... que ...», que preserva la forma sentenciosa sin sonar forzada.
- source_word: מְעַט
  english_pob_choice: a little
  chosen_spanish: poco
  alternatives_spanish:
  - un poco
  - una pequeña cantidad
  lexicon: HALOT
  rationale: מְעַט expresa una cantidad pequeña. «Poco» mantiene la concisión proverbial y suena más directo que una perífrasis.
- source_word: בִּצְדָקָה
  english_pob_choice: with righteousness
  chosen_spanish: con justicia
  alternatives_spanish:
  - con rectitud
  - en justicia
  - con integridad
  lexicon: HALOT
  rationale: Aunque el inglés POB distingue «righteousness» de «justice» en paralelo con מִשְׁפָּט, en español «justicia» aquí comunica con claridad la idea de conducta recta/uprightness asociada al pequeño bien poseído. Se mantiene el contraste ético, aunque con un término más natural para la frase nominal preposicional.
- source_word: תְּבוּאוֹת
  english_pob_choice: revenues
  chosen_spanish: ingresos
  alternatives_spanish:
  - rendimientos
  - ganancias
  - cosechas
  lexicon: HALOT
  rationale: תְּבוּאוֹת puede referirse a producto, rendimiento o retornos materiales. «Ingresos» es comprensible en español contemporáneo y conserva el valor económico general, sin restringirlo solo a agricultura.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: derecho
  alternatives_spanish:
  - justicia
  - rectitud
  - equidad
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar justicia, orden debido o decisión justa. En esta cola, «sin derecho» reproduce de manera breve la idea de ausencia de orden justo o de lo que es debido, y evita repetir «justicia» en una forma que en español podría sonar redundante junto a la primera cola.
theological_decisions:
- issue: Distinción entre צְדָקָה y מִשְׁפָּט
  english_pob_reading: Render them distinctly as 'righteousness' and 'justice'
  chosen_spanish_reading: Se distingue la primera cola con «con justicia» y la segunda con «sin derecho», manteniendo la oposición ética entre una posesión pequeña acompañada por lo recto y abundancia obtenida sin orden justo.
  alternative_spanish_readings:
  - con rectitud / sin justicia
  - con justicia / sin justicia
  - con integridad / sin derecho
  rationale: El hebreo contrapone dos ámbitos afines pero no idénticos. En español, repetir «justicia» en ambas mitades atenúa la variedad semántica; «sin derecho» conserva el juicio moral-jurídico de מִשְׁפָּט y mantiene viva la tensión del proverbio.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el consenso alto del audit trail inglés: mantiene la estructura comparativa proverbial, distingue el juicio ético de ambas colas y conserva la amplitud semántica de תְּבוּאוֹת mediante una nota de alternativa léxica.'
  spanish_consistency_notes:
  - Se prefirió «Mejor es... que...» por naturalidad proverbial en español.
  - «Poco» conserva la brevedad de מְעַט sin añadir matices ajenos.
  - «Con justicia» traduce la cualidad moral de צְדָקָה de forma clara y usable en español.
  - «Sin derecho» evita que ambas mitades queden con la misma palabra y preserva la fuerza jurídico-ética de מִשְׁפָּט.
  - La nota aclara que «ingresos» es una elección de lectura amplia, no una restricción agrícola del término hebreo.
