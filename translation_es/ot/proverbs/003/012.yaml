translation:
  language: es
  text: Porque Yahvé reprende al que ama[a], como un padre al hijo en quien se deleita[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «corrige» o «disciplina». El verbo hebreo enfatiza la reprensión o corrección; en el contexto contribuye al tema más amplio de la disciplina de Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y como un padre al hijo que favorece».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o explicación del proverbio anterior; en español, «Porque» conserva bien esa relación causal/discursiva sin sonar forzado.
- source_word: אֶת אֲשֶׁר
  english_pob_choice: the one ... whom
  chosen_spanish: al que
  alternatives_spanish:
  - al que ... a quien
  - al que ... quien
  lexicon: HALOT
  rationale: La construcción hebrea señala a una persona concreta como objeto del amor divino. «Al que» es natural en español y preserva la referencia singular personal.
- source_word: יֶאֱהַב
  english_pob_choice: he loves
  chosen_spanish: ama
  alternatives_spanish:
  - quiere
  - tiene cariño por
  lexicon: HALOT
  rationale: אהב expresa amor real y relacional; «ama» es la equivalencia más directa y evita debilitar el vínculo afectivo del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Nombre divino en español, manteniendo el nombre de pacto en lugar de una sustitución por «SEÑOR».
- source_word: יוֹכִיחַ
  english_pob_choice: reproves
  chosen_spanish: reprende
  alternatives_spanish:
  - corrige
  - reprocha
  - disciplina
  lexicon: HALOT
  rationale: El verbo denota reprobación/corrección verbal o moral. «Reprende» conserva esa fuerza más específicamente que «disciplina», que sería más amplio teológicamente.
- source_word: וּכְאָב
  english_pob_choice: as a father
  chosen_spanish: como un padre
  alternatives_spanish:
  - y como un padre
  - así como un padre
  lexicon: HALOT
  rationale: La partícula comparativa introduce una símil. «Como un padre» reproduce con naturalidad la comparación sin añadir contenido.
- source_word: בֵּן
  english_pob_choice: the son
  chosen_spanish: al hijo
  alternatives_spanish:
  - al hijo varón
  - al hijo
  lexicon: HALOT
  rationale: El hebreo usa masculino singular representativo. «Al hijo» preserva la imagen paterno-filial del proverbio sin neutralizarla.
- source_word: יִרְצֶה
  english_pob_choice: in whom he delights
  chosen_spanish: en quien se deleita
  alternatives_spanish:
  - a quien favorece
  - a quien acepta
  lexicon: HALOT
  rationale: רצה aquí expresa agrado/favor. «Se deleita» mantiene la fuerza positiva y la relación afectiva entre padre e hijo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se preserva el Nombre propio del pacto, conforme al criterio del proyecto, evitando la convención de ocultarlo tras «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Imaginería paterna y filiación masculina
  english_pob_reading: as a father the son
  chosen_spanish_reading: como un padre al hijo
  alternative_spanish_readings:
  - como un padre a un hijo
  - como progenitor al niño
  rationale: El hebreo mantiene la imagen masculina singular de padre/hijo. La traducción conserva esa forma por fidelidad al texto y a la estrategia de precisión de género del proyecto.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #4'
- issue: Alcance de יוֹכִיחַ
  english_pob_reading: reproves
  chosen_spanish_reading: reprende
  alternative_spanish_readings:
  - corrige
  - disciplina
  rationale: El verbo apunta primero a reprensión/corrección. «Reprende» evita expandir el sentido más allá de lo que el lexema exige, aunque el contexto más amplio sí incluye disciplina.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios necesarios y el veredicto de concordancia fue alto. La redacción española sigue el audit trail inglés, pero rehace naturalmente la sintaxis para español y conserva la tensión léxica entre «reprende/corrige/disciplina» y «se deleita/favorece».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se prefirió «reprende» sobre «corrige» o «disciplina» para reflejar el núcleo léxico de יוֹכִיחַ sin diluirlo.
  - La comparación se mantiene explícita con «como un padre», evitando una paráfrasis más libre.
  - Se conservó la filiación masculina singular con «hijo» y «al hijo», conforme a la imagen del proverbio.
