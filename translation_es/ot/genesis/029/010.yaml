translation:
  language: es
  text: Y cuando Jacob vio a Raquel[a], la hija de Labán, hermano de su madre, y el rebaño de Labán, hermano de su madre, Jacob se acercó y rodó la piedra de la boca del pozo, y dio de beber al rebaño de Labán, hermano de su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hermano de su madre» se repite tres veces en este versículo, subrayando la relación familiar de Jacob con Labán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: And when
  chosen_spanish: Y aconteció que, cuando
  alternatives_spanish:
  - Y cuando
  - Y sucedió que, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una nueva escena y una acción sucesiva. «Y aconteció que, cuando» conserva el valor temporal y el tono narrativo sin volverlo rígido.
- source_word: רָאָה
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - percibió
  lexicon: HALOT
  rationale: Aquí el verbo expresa percepción visual directa; «vio» es la equivalencia más natural y precisa en español.
- source_word: בַּת
  english_pob_choice: the daughter of
  chosen_spanish: la hija de
  alternatives_spanish:
  - hija de
  lexicon: HALOT
  rationale: La construcción identifica a Raquel por filiación. «La hija de» reproduce bien el valor appositivo del hebreo y suena natural en español.
- source_word: אֲחִי אִמּוֹ
  english_pob_choice: his mother’s brother
  chosen_spanish: hermano de su madre
  alternatives_spanish:
  - tío materno
  - el hermano de su madre
  lexicon: HALOT
  rationale: Se conserva la fórmula de parentesco explícita del hebreo. «Hermano de su madre» mantiene la repetición y evita sustituirla por el más idiomático pero menos transparente «tío materno».
- source_word: צֹאן
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - las ovejas
  - el ganado menor
  lexicon: HALOT
  rationale: En este contexto colectivo de animales de pastoreo, «rebaño» comunica el conjunto de manera natural y conserva la referencia amplia del término.
- source_word: וַיִּגַּשׁ
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - llegó cerca
  lexicon: HALOT
  rationale: El verbo indica movimiento hacia el pozo y la acción siguiente. «Se acercó» es una forma clara y idiomática en español.
- source_word: וַיָּגֶל
  english_pob_choice: rolled ... from
  chosen_spanish: quitó ... de sobre
  alternatives_spanish:
  - rodó ... de
  - desplazó ... de sobre
  lexicon: HALOT
  rationale: El hebreo usa un verbo de rodar respecto de la piedra. En español, «quitó de sobre» transmite el resultado concreto de mover la piedra sin perder la imagen de que estaba encima de la boca del pozo.
- source_word: מֵעַל פִּי הַבְּאֵר
  english_pob_choice: from the mouth of the well
  chosen_spanish: de sobre la boca del pozo
  alternatives_spanish:
  - de la boca del pozo
  - de encima de la boca del pozo
  lexicon: HALOT
  rationale: Se preserva la metáfora espacial de «boca» para el orificio del pozo y la preposición de separación del hebreo. «De sobre» refleja mejor la posición de la piedra que una simple «de».
- source_word: וַיַּשְׁקְ
  english_pob_choice: watered
  chosen_spanish: dio de beber
  alternatives_spanish:
  - abrevó
  - regó
  lexicon: HALOT
  rationale: El verbo causativo significa dar de beber a animales. «Dio de beber» es claro, fiel y evita el matiz agrícola de «regó».
theological_decisions:
- issue: Repetición de la expresión de parentesco de Labán
  english_pob_reading: Hebrew repeats 'his mother’s brother' three times in this verse, emphasizing Jacob’s family connection to Laban.
  chosen_spanish_reading: Se mantiene la repetición de «hermano de su madre» tres veces, para conservar el énfasis genealógico del hebreo.
  alternative_spanish_readings:
  - Usar una sola vez «tío materno» y abreviar las repeticiones
  - Variar entre «hermano de su madre» y «tío materno»
  rationale: La reiteración es parte del diseño del versículo y subraya la conexión familiar de Jacob con Labán. Suprimirla o variarla debilitaría ese efecto retórico.
  doctrine_reference: Énfasis literario y genealógico del texto hebreo; fidelidad a la repetición retórica
- issue: Relación entre «pozo» y «boca del pozo»
  english_pob_reading: rolled the stone from the mouth of the well
  chosen_spanish_reading: «Quitó la piedra de sobre la boca del pozo» conserva la imagen espacial del hebreo y el acto concreto de remover la cobertura.
  alternative_spanish_readings:
  - «Quitó la piedra del pozo»
  - «Rodó la piedra de la boca del pozo»
  rationale: La formulación elegida retiene la localización de la piedra y la imagen del acceso al agua sin sonar torpe en español.
  doctrine_reference: Precisión descriptiva del relato narrativo; preservación de la metáfora de la 'boca' del pozo
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado más reciente del contexto inglés: se adoptó la formulación más cercana al hebreo para la acción de mover la piedra («from the mouth of the well»), preservando la naturalidad en español mediante «de sobre la boca del pozo». No se introdujeron expansiones doctrinales ni cambios de sentido respecto del texto base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo presenta el nombre divino; este versículo no lo contiene.
  - Se mantiene «hermano de su madre» por transparencia y por el énfasis retórico repetido en el hebreo.
  - «Rebaño» se eligió como término colectivo natural para צֹאן en este contexto pastoral.
  - «Boca del pozo» conserva la metáfora espacial del hebreo y ayuda a mantener la imagen narrativa.
