translation:
  language: es
  text: Y cuando la puerta estaba a punto de cerrarse al oscurecer[a], los hombres salieron. No sé adónde fueron los hombres. Persíganlos rápidamente, porque los alcanzarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando estaba oscuro»; la expresión hebrea señala el momento de cerrarse la puerta al comenzar la oscuridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And when
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y cuando
  - Y aconteció que
  lexicon: HALOT
  rationale: La forma narrativa introduce el siguiente hecho; en español, «Y sucedió que» conserva el valor secuencial sin sonar tan arcaico como «aconteció que» y evita un calco rígido de «and when».
- source_word: הַשַּׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de la ciudad
  - la puerta/portón
  lexicon: HALOT
  rationale: En Jericó se trata del acceso amurallado de la ciudad; «puerta» es el equivalente natural en español bíblico actual y mantiene la generalidad del hebreo sin explicitar «de la ciudad».
- source_word: לִסְגֹּר
  english_pob_choice: was about to be shut
  chosen_spanish: estaba a punto de cerrarse
  alternatives_spanish:
  - iba a cerrarse
  - estaba para cerrarse
  lexicon: HALOT
  rationale: El infinitivo con ל expresa inminencia; «estaba a punto de cerrarse» comunica bien la proximidad temporal del acto de cerrar.
- source_word: בַּחֹשֶׁךְ
  english_pob_choice: at dark
  chosen_spanish: al oscurecer
  alternatives_spanish:
  - cuando oscurecía
  - al anochecer
  - cuando ya era oscuro
  lexicon: HALOT
  rationale: La expresión señala el inicio de la oscuridad, no solo un estado estático. «Al oscurecer» refleja ese umbral temporal con naturalidad en español.
- source_word: וְהָאֲנָשִׁים יָצָאוּ
  english_pob_choice: the men went out
  chosen_spanish: los hombres salieron
  alternatives_spanish:
  - los hombres se fueron
  - los hombres partieron
  lexicon: HALOT
  rationale: יצא indica salida física; «salieron» preserva el movimiento concreto y evita suavizarlo con «se fueron», que puede sonar más interpretativo.
- source_word: לֹא יָדַעְתִּי
  english_pob_choice: I do not know
  chosen_spanish: No sé
  alternatives_spanish:
  - No lo sé
  - No sabía
  lexicon: HALOT
  rationale: En diálogo directo, el perfecto hebreo funciona como estado presente. «No sé» reproduce mejor la afirmación actual de ignorancia.
- source_word: אָ֥נָה הָלְכ֖וּ
  english_pob_choice: where the men went
  chosen_spanish: adónde fueron
  alternatives_spanish:
  - dónde fueron
  - a dónde fueron
  lexicon: HALOT
  rationale: אָנה pregunta por destino; «adónde» comunica mejor la dirección/objeto del movimiento que un simple «dónde».
- source_word: הָֽאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - esos hombres
  - aquellos hombres
  lexicon: HALOT
  rationale: La repetición se conserva para transparencia; «los hombres» mantiene la referencia a los espías sin añadir precisión inexistente en el hebreo.
- source_word: רִדְפ֥וּ
  english_pob_choice: Pursue
  chosen_spanish: Persíganlos
  alternatives_spanish:
  - Síganlos
  - Vayan tras ellos
  lexicon: HALOT
  rationale: El imperativo exige acción urgente. «Persíganlos» retiene la fuerza militar/de persecución del verbo mejor que opciones más débiles como «síganlos».
- source_word: מַהֵר
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - deprisa
  - sin demora
  lexicon: HALOT
  rationale: El adverbio modifica la orden; «rápidamente» es directo y conserva el matiz de urgencia sin intensificarlo innecesariamente.
- source_word: אַחֲרֵיהֶם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - tras ellos
  - después de ellos
  lexicon: HALOT
  rationale: En español, el objeto clítico ya puede absorber el valor de persecución cuando el verbo es transitivo; se evita una redundancia poco natural.
- source_word: כִּי תַשִּׂיגֻם
  english_pob_choice: for you will overtake them
  chosen_spanish: porque los alcanzarán
  alternatives_spanish:
  - pues los alcanzarán
  - porque darán con ellos
  lexicon: HALOT
  rationale: נשׂג en Hiphil expresa alcanzar/overtake. «Alcanzarán» es el equivalente más natural y mantiene la razón dada para la orden.
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y quedó sin cambios; por eso la versión española sigue de cerca sus decisiones léxicas clave, pero ajusta la redacción a un español natural y transparente, especialmente en la fórmula narrativa, el valor inminente de לִסְגּוֹר y la nota temporal de בַּחֹשֶׁךְ.
  spanish_consistency_notes:
  - Se mantuvo la referencia doble a «los hombres» para transparencia respecto del hebreo y para conservar el énfasis narrativo de Rahab.
  - Se prefirió «persíganlos» frente a formas más suaves para conservar la fuerza imperativa del contexto de búsqueda militar.
  - La nota al pie se ancla en «al oscurecer» porque allí está la decisión lexical sensible de בַּחֹשֶׁךְ.
