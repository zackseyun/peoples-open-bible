translation:
  language: es
  text: ¿Por qué hemos de vivir todavía?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «¿Por qué es todavía para nosotros vivir?». El griego usa una pregunta idiomática de lamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα τί
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué hemos de…?
  alternatives_spanish:
  - ¿Por qué…?
  - ¿Para qué…?
  - ¿Por qué deberíamos…?
  lexicon: LSJ
  rationale: La secuencia ἵνα τί funciona aquí como una pregunta idiomática de lamento, equivalente a «why?». En español, «¿Por qué hemos de…?» conserva el tono deliberativo/urgente que tiene el inglés POB con «Why should», sin volver la frase demasiado literal o pesada.
- source_word: ἡμῖν
  english_pob_choice: we
  chosen_spanish: hemos de
  alternatives_spanish:
  - nosotros
  - para nosotros
  - nos toca
  lexicon: BDAG
  rationale: El dativo ἡμῖν forma parte de la expresión idiomática «para nosotros vivir». En español, se evita una construcción dativa extraña y se integra de manera natural en «hemos de seguir viviendo».
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: seguir
  alternatives_spanish:
  - todavía
  - aún
  - seguir todavía
  lexicon: BDAG
  rationale: ἔτι expresa continuidad. En esta pregunta de queja, «seguir viviendo» transmite bien la idea de continuidad en la vida con un matiz idiomático más natural que repetir «todavía/aún» de forma rígida.
- source_word: ζῇν
  english_pob_choice: live
  chosen_spanish: viviendo
  alternatives_spanish:
  - vivir
  - estar vivos
  - continuar viviendo
  lexicon: BDAG
  rationale: El infinitivo ζῇν denota vivir/continuar con vida. «Viviendo» con «seguir» reproduce de forma fluida la acción continua sin sobretraducción.
theological_decisions:
- issue: Tono de lamento desesperado
  english_pob_reading: The Greek is an idiomatic lamenting question.
  chosen_spanish_reading: La pregunta española conserva el tono de lamento sin añadir contenido doctrinal.
  alternative_spanish_readings:
  - ¿Por qué deberíamos seguir viviendo?
  - ¿Para qué seguir viviendo?
  rationale: El versículo expresa una queja retórica sobre la conveniencia de seguir con vida. La versión elegida mantiene esa carga emotiva sin convertirla en exhortación o en afirmación doctrinal.
  doctrine_reference: None
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto griego proporcionado y con el seguimiento inglés; no hubo revisiones aplicadas en el registro fuente. La versión española conserva la estructura interrogativa idiomática y el matiz de lamento reconocido en el audit trail.
  spanish_consistency_notes:
  - Se prefiere un español bíblico moderno y claro, evitando un calco como «¿Por qué para nosotros todavía vivir?»
  - El marcador de nota [a] se coloca en la frase interrogativa completa porque la alternativa afecta a toda la construcción idiomática, no solo a una palabra aislada.
  - No se introducen términos teológicos adicionales; el sentido depende del contexto literario inmediato y no de una doctrina específica.
