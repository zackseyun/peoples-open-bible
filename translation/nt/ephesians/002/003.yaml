  from: doing the wills of the flesh and of the thoughts
  to: fulfilling the desires of the flesh and of the mind
  rationale: The phrase 'the wills of the flesh' is grammatically correct but idiomatically stiff in English. Similarly, 'of the thoughts' is a weak rendering for 'τῶν διανοιῶν', which points to the mind or faculty of reason as a source of impulse, parallel to the flesh. 'Fulfilling the desires of the flesh and of the mind' is a more natural and common rendering that captures the parallelism and the meaning of the Greek terms effectively, even if it uses 'desires' for a different Greek root than 'ἐπιθυμίαις'.
- timestamp: '2026-04-21T03:01:52Z'
