translation:
  language: es
  text: y Naamán, Ahías y Gera—él[a] los llevó al destierro[b] y engendró a Uza y a Ahihud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los llevó al destierro». El sujeto de «él» es singular en la sintaxis y, de manera más natural, se refiere a Gera; sin embargo, la genealogía de este pasaje es textualmente y sintácticamente difícil.'
    reason: alternative_reading
  - marker: b
    text: 'O «los exilió» o «los deportó». El verbo hebreo es causativo: «hizo que fueran al exilio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲמָן
  english_pob_choice: Naaman
  chosen_spanish: Naamán
  alternatives_spanish:
  - Naamán
  - Naaman
  lexicon: HALOT
  rationale: Nombre propio; en español conviene conservar la transliteración con acento agudo para reflejar la pronunciación natural y la adaptación ortográfica usual.
- source_word: אֲחִיָּה
  english_pob_choice: Ahijah
  chosen_spanish: Ahías
  alternatives_spanish:
  - Ahiyah
  - Ahiya
  lexicon: HALOT
  rationale: Nombre propio. La forma española bíblica más transparente y legible es «Ahías», que mantiene la relación sonora con el hebreo sin forzar una grafía inglesa.
- source_word: גֵרָא
  english_pob_choice: Gera
  chosen_spanish: Gera
  alternatives_spanish:
  - Guera
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa, sin traducirlo.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - este
  - éste
  lexicon: HALOT
  rationale: Pronombre resumptivo/emfático; en castellano, «él» conserva la referencia singular y la secuencia genealógica natural.
- source_word: הֶגְלָם
  english_pob_choice: carried them into exile
  chosen_spanish: los llevó al destierro
  alternatives_spanish:
  - los exilió
  - los deportó
  lexicon: HALOT
  rationale: El verbo causativo de גלה expresa hacer ir al exilio. «Los llevó al destierro» preserva la idea causativa y suena natural en español; «exilió» o «deportó» son alternativas más compactas pero menos transparentes respecto al matiz de movimiento.
- source_word: וְהוֹלִיד
  english_pob_choice: and fathered
  chosen_spanish: y engendró
  alternatives_spanish:
  - y fue padre de
  - y procreó
  lexicon: HALOT
  rationale: Verbo genealógico en sentido de engendrar/paternidad. «Engendró» conserva la función genealógica y la concisión del texto, aunque «fue padre de» sería una alternativa más explícita en español.
- source_word: עֻזָּא
  english_pob_choice: Uzza
  chosen_spanish: Uza
  alternatives_spanish:
  - Uzza
  lexicon: HALOT
  rationale: Nombre propio; la forma española habitual simplifica la geminación consonántica final sin alterar la identidad del nombre.
- source_word: אֲחִיחֻד
  english_pob_choice: Ahihud
  chosen_spanish: Ahihud
  alternatives_spanish:
  - Ajihud
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar; se mantiene la forma más reconocible para lectores bíblicos en español.
theological_decisions:
- issue: Referencia del sujeto singular «él» en una genealogía textualmente difícil
  english_pob_reading: The subject of 'he' is syntactically singular, most naturally referring to Gera, though the genealogy in this section is textually and syntactically difficult.
  chosen_spanish_reading: «él» se mantiene como referente singular, sin resolver de manera artificial la dificultad textual; en lectura natural, apunta a Gera.
  alternative_spanish_readings:
  - «él» puede leerse como Gera
  - «él» podría referirse a otro antepasado por la dificultad del pasaje
  rationale: La tradición auditada del POB conserva la ambigüedad y la dificultad sintáctica. El español debe hacer lo mismo, evitando una clarificación excesiva que elimine la tensión textual.
  doctrine_reference: Crítica textual y exégesis genealógica; conservación de ambigüedad donde el hebreo la presenta.
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios: el pasaje fue confirmado con acuerdo alto. Por eso se conservan la estructura genealógica difícil y la equivalencia óptima ya auditada, sin introducir conjeturas nuevas.'
  spanish_consistency_notes:
  - Se usa «destierro» para reflejar el movimiento al exilio con un tono bíblico claro y contemporáneo.
  - Se evita «SEÑOR» u այլ sustituciones porque el texto no contiene el nombre divino.
  - Se mantiene la puntuación genealógica con dos puntos para reproducir el quiebre sintáctico del hebreo y el inglés auditado.
  - Los nombres propios se adaptan al español cuando la forma española está bien establecida (Naamán, Ahías, Uza) y se conserva la transliteración estable cuando procede (Gera, Ahihud).
