  rationale: Se reordenó la oración para que «contra los que venían del ejército» modifique claramente a «se levantaron», como en el hebreo. Se ajustó «de los jefes» a «de entre los jefes» para mejorar la naturalidad sin perder el sentido de procedencia desde la dirigencia de Efraín, y se añadió una nota para conservar la alternativa más idiomática y la formulación literal documentada en la auditoría inglesa.
