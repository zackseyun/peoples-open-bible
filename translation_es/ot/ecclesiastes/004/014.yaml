translation:
  language: es
  text: Porque salió de la casa de los presos[a] para reinar, aunque aún en su reino[b] había nacido pobre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede leerse 'de la prisión'; el hebreo dice literalmente 'de la casa de los presos'.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse 'durante su reinado'; בְּמַלְכוּתוֹ puede abarcar 'reino' o 'reinado'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֵּית הָסוּרִים
  english_pob_choice: from the house of prisoners
  chosen_spanish: de la casa de los presos
  alternatives_spanish:
  - de la prisión
  - de la casa de confinamiento
  lexicon: HALOT
  rationale: Conservo la imagen concreta de 'casa' y el contenido de confinamiento/prisión. 'Presos' refleja el valor sustantivo de הָסוּרִים y mantiene una frase natural en español sin perder la transparencia del hebreo.
- source_word: יָצָא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - emergió
  lexicon: HALOT
  rationale: '''Salió'' es la correspondencia más directa y natural en español para el verbo de movimiento fuera de un lugar de encierro.'
- source_word: לִמְלֹךְ
  english_pob_choice: to reign
  chosen_spanish: para reinar
  alternatives_spanish:
  - para llegar a reinar
  - para gobernar
  lexicon: HALOT
  rationale: '''Reinar'' preserva el sentido real/monárquico del infinitivo sin introducir una expansión interpretativa como ''llegar a ser rey''.'
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - incluso
  - también
  lexicon: HALOT
  rationale: En la segunda cláusula funciona con fuerza concesiva/intensificadora; 'aun' comunica mejor la sorpresa o contraste implícito que 'también'.
- source_word: בְּמַלְכוּתוֹ
  english_pob_choice: in his kingdom
  chosen_spanish: en su reino
  alternatives_spanish:
  - durante su reinado
  - en su realeza
  lexicon: HALOT
  rationale: '''Reino'' es la forma más natural en español y mantiene la ambigüedad posible entre el lugar/situación del reino y el período del reinado, tal como lo deja abierto el hebreo.'
- source_word: נוֹלַד
  english_pob_choice: had been born
  chosen_spanish: nació
  alternatives_spanish:
  - había nacido
  lexicon: HALOT
  rationale: El perfecto pasivo hebreo puede expresarse en español con pasado simple sin forzar el valor temporal; 'había nacido' aclara la anterioridad, pero suena menos directo y añade una relación temporal explícita que el español no exige.
- source_word: רָשׁ
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - destituido
  lexicon: HALOT
  rationale: '''Pobre'' es la equivalencia básica, clara y idiomática; conserva la tensión social/económica del hebreo sin endurecerla más de lo que el término exige.'
- source_word: כִּי ... כִּי
  english_pob_choice: For ... though
  chosen_spanish: Porque ... aunque
  alternatives_spanish:
  - Pues ... aunque
  - Ya que ... aunque
  lexicon: HALOT
  rationale: La primera כִּי introduce la explicación causal; la segunda tiene fuerza concesiva en el contexto y se vierte naturalmente con 'aunque', evitando una repetición mecánica de 'porque'.
translation_notes:
  revision_awareness: Se siguió el testimonio hebreo masorético (WLC) y el auditorio inglés de POB. La principal decisión fue mantener la imagen hebrea 'casa de los presos' en el texto principal, con una alternativa natural 'prisión' en nota. También se preservó la ambigüedad de בְּמַלְכוּתוֹ con 'reino' y nota sobre 'reinado', como hace el POB inglés con 'kingdom/reign'.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' para el nombre divino cuando aparece; este versículo no lo contiene.
  - Se usó 'pobre' como traducción básica de רָשׁ por coherencia con el léxico POB.
  - Se mantuvo un estilo bíblico claro y sobrio, evitando arcaísmos innecesarios.
  - La puntuación refleja la oposición causal/concesiva del hebreo mediante coma y 'aunque'.
