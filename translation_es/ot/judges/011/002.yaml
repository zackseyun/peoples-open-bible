revisions:
- from: 'La esposa de Gilead le dio a luz hijos. Y cuando los hijos de su esposa crecieron[a], expulsaron a Jefté y le dijeron: «No heredarás en la casa de nuestro padre, porque eres hijo de otra mujer».'
  to: 'La esposa de Galaad le dio hijos varones. Y cuando los hijos varones de su esposa crecieron[a], expulsaron a Jefté y le dijeron: «No heredarás en la casa de nuestro padre, porque eres hijo de otra mujer».'
  rationale: Se ajusta el nombre propio a la forma española usual ('Galaad'), se reemplaza la construcción poco natural 'le dio a luz hijos' por 'le dio hijos varones', y se conserva explícitamente el valor masculino de בָּנִים / בְנֵי con 'hijos varones', en línea con el análisis fuente y la política de precisión léxica. El resto del versículo es fiel y claro, por lo que solo requiere reparación menor.
