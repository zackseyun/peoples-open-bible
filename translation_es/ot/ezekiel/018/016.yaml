translation:
  language: es
  text: No ha oprimido a nadie, no ha tomado prenda[a] ni ha robado; ha dado su pan[b] al hambriento y ha cubierto al desnudo con una prenda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha tomado una garantía», o «ha tomado la prenda de un deudor». El hebreo se refiere a tomar una garantía de deuda, a menudo con la implicación de una práctica abusiva o injusta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «su pan».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: anyone
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - cualquiera
  lexicon: HALOT
  rationale: En este contexto ético con negaciones encadenadas, el hebreo funciona de modo genérico. «Nadie» transmite con naturalidad el alcance representativo sin añadir un masculino innecesario.
- source_word: הוֹנָה
  english_pob_choice: has not oppressed
  chosen_spanish: ha oprimido
  alternatives_spanish:
  - ha maltratado
  - ha defraudado
  - ha agraviado
  lexicon: HALOT
  rationale: El verbo puede abarcar trato injusto u opresivo. «Oprimido» conserva el peso social y moral del término en un contexto de justicia hacia el prójimo.
- source_word: חֲבֹל ... חָבָל
  english_pob_choice: has not taken a pledge
  chosen_spanish: no ha tomado prenda
  alternatives_spanish:
  - no ha tomado un empeño
  - no ha exigido una garantía
  - no ha confiscado un bien en prenda
  lexicon: HALOT
  rationale: La idea legal es la de tomar una prenda o garantía de un deudor. «Prenda» es conciso y transparente en español; mantiene la referencia jurídica sin forzar una paráfrasis más larga.
- source_word: גְזֵלָה ... גָזָל
  english_pob_choice: has not robbed
  chosen_spanish: no ha robado
  alternatives_spanish:
  - no ha saqueado
  - no ha cometido robo
  lexicon: HALOT
  rationale: El sustantivo/verbo intensifica la apropiación violenta o injusta. «Robado» comunica bien esa fuerza en español natural y concordante con el paralelismo.
- source_word: לַחְמוֹ
  english_pob_choice: his bread
  chosen_spanish: su pan
  alternatives_spanish:
  - su alimento
  - su comida
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de לחם como «pan», aun cuando pueda implicar alimento en sentido amplio. «Su pan» refleja con mayor fidelidad el texto y su fuerza de compartir sustento propio.
- source_word: לְרָעֵב
  english_pob_choice: to the hungry
  chosen_spanish: al hambriento
  alternatives_spanish:
  - a la persona hambrienta
  - a los hambrientos
  lexicon: HALOT
  rationale: El adjetivo usado sustantivamente designa al hambriento. «Al hambriento» mantiene la generalidad ética y suena natural en español bíblico contemporáneo.
- source_word: עֵרוֹם
  english_pob_choice: the naked
  chosen_spanish: al desnudo
  alternatives_spanish:
  - al desnudo sin ropa
  - al que no tiene ropa
  lexicon: HALOT
  rationale: «Desnudo» es la equivalencia directa más clara. La forma sustantivada con artículo conserva el paralelismo con el hambriento.
- source_word: כִּסָּה בָגֶד
  english_pob_choice: covered the naked with a garment
  chosen_spanish: ha cubierto al desnudo con un vestido
  alternatives_spanish:
  - ha vestido al desnudo
  - lo ha cubierto con un manto
  - ha cubierto al desnudo con una prenda
  lexicon: HALOT
  rationale: El hebreo dice literalmente «cubrió con un vestido/garment». «Vestido» conserva la concreción del objeto mencionado en el texto y evita colapsarlo del todo en la interpretación más general de «vestir».
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo de WLC y el expediente auditado en inglés: conserva la secuencia de negaciones, mantiene la imaginería concreta de pan/hambriento/desnudo y refleja la decisión léxica de ''pledge'' mediante ''prenda'' en español. Se evita una paráfrasis explicativa que diluya la tensión jurídica del término.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantiene «pan» para לחם, como imagen concreta y transparente.
  - Se prefirió «prenda» para חבל en vez de «garantía» o «empeño» por mayor cercanía al campo jurídico y mejor correspondencia con el audit trail.
  - «Al desnudo» conserva la sustantivación del hebreo y el paralelismo con «al hambriento».
