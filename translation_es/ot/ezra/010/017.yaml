translation:
  language: es
  text: Y terminaron con todos los hombres que habían tomado esposas extranjeras, para el primer día del primer mes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta el primer día del primer mes». La expresión temporal hebrea admite ambas lecturas; el texto principal usa una formulación natural en español para indicar la fecha límite en que quedó concluido el asunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַלּוּ
  english_pob_choice: they finished
  chosen_spanish: terminaron
  alternatives_spanish:
  - acabaron
  - concluyeron
  lexicon: HALOT
  rationale: El verbo indica completar/cerrar el proceso. «Terminaron» es natural en español y conserva la idea de llevar la gestión a su fin.
- source_word: בַּכֹּל
  english_pob_choice: with all
  chosen_spanish: con todos
  alternatives_spanish:
  - respecto de todos
  - en cuanto a todos
  lexicon: HALOT
  rationale: La construcción refleja el alcance total de los casos tratados. «Con todos» reproduce bien el sentido procedimental de haber terminado el asunto en todos los casos.
- source_word: אֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - las personas
  lexicon: HALOT
  rationale: El hebreo es masculino plural específico; en contexto se refiere a los varones implicados. «Los hombres» es claro y fiel.
- source_word: הַהֹשִׁיבוּ
  english_pob_choice: had taken
  chosen_spanish: habían tomado
  alternatives_spanish:
  - habían hecho tomar
  - habían establecido con ellas
  - habían llevado a sus casas
  lexicon: HALOT
  rationale: La forma causativa literal de «hacer habitar» funciona aquí como un modismo que, en contexto, apunta a tomar mujeres como esposas. «Habían tomado» mantiene el valor idiomático sin forzar una paráfrasis más interpretativa.
- source_word: נָשִׁים נָכְרִיּוֹת
  english_pob_choice: foreign wives
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - esposas extranjeras
  - mujeres forasteras
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mujeres extranjeras». Aunque el contexto marital está claro, el texto hebreo no añade explícitamente «esposas»; por eso se prefiere una formulación más pegada al original y se deja que el contexto haga la precisión relacional.
- source_word: עַד יוֹם אֶחָד
  english_pob_choice: by the first day
  chosen_spanish: para el primer día
  alternatives_spanish:
  - hasta el primer día
  - al primer día
  lexicon: HALOT
  rationale: La expresión temporal marca el límite alcanzado. «Para el primer día» comunica en español que ese fue el plazo o fecha-meta de conclusión, manteniendo la ambigüedad temporal del hebreo entre «hasta» y «para».
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: of the first month
  chosen_spanish: del mes primero
  alternatives_spanish:
  - del primer mes
  - del mes inicial
  lexicon: HALOT
  rationale: La referencia calendárica hebrea se expresa de forma natural como «mes primero». Esta forma preserva el orden y el tono bíblico sin perder claridad.
theological_decisions:
- issue: Relación entre «mujeres extranjeras» y el sentido matrimonial implícito del pasaje
  english_pob_reading: foreign wives
  chosen_spanish_reading: mujeres extranjeras
  alternative_spanish_readings:
  - esposas extranjeras
  - mujeres forasteras
  rationale: El inglés POB explicita «wives» por el contexto de Esdras 10. En español se mantuvo «mujeres extranjeras» porque el hebreo literal es esa expresión y el contexto ya señala el problema matrimonial; así se evita introducir una equivalencia más interpretativa que el hebreo inmediato no verbaliza.
  doctrine_reference: Ezra 10; intertextual context of covenant separation without doctrinal expansion
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; se conservó su solución contextual para la expresión temporal, pero en español se optó por una formulación más cercana al hebreo literal («para el primer día del mes primero») mientras se documenta la alternativa temporal en la nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exige explícitamente; este versículo no lo contiene.
  - 'Se mantuvo un nivel de literalidad moderado: no se añadió «esposas» al texto principal para no sobreinterpretar el sustantivo hebreo «mujeres».'
  - «Mes primero» conserva el registro bíblico y la nomenclatura calendárica del original.
  - La nota al pie preserva la ambigüedad reconocida por el POB inglés entre límite temporal y fecha alcanzada.
