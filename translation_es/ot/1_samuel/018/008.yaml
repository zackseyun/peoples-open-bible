base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/018/008.yaml
  text: Then Saul became very angry[a], and this matter displeased him. He said, “They have given David ten thousands, but to me they have given the thousands[b]; what more can he have but the kingdom?”
  footnotes:
  - marker: a
    text: Or, more formally, “They have ascribed ten thousands to David, but to me they have ascribed the thousands.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew is compressed: “and still to him only the kingdom,” meaning that in Saul’s view the only thing left for David to receive is the kingdom.'
    reason: lexical_alternative
