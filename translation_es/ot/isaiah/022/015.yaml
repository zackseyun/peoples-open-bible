    changes_summary: Replaced 'GOD' with 'Yahweh' to reflect the divine name יְהוָה more accurately and consistently. Kept the rest unchanged, since 'Go, come to this steward, to Shebna, who is over the house' faithfully represents the Hebrew and reads naturally enough in formal register.
translation:
  language: es
  text: 'Así dice el Señor Yahvé de los ejércitos: Ve[a], preséntate ante este mayordomo, ante Sebna, el que está sobre la casa[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ve, entra adonde este funcionario, Sebna». El hebreo conserva dos imperativos, «ve, ven/entra», que pueden funcionar juntos de manera idiomática.'
    reason: lexical_alternative
  - marker: b
    text: «El que está sobre la casa» designa a un alto administrador del palacio, es decir, un mayordomo principal.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética introductoria funciona naturalmente en español con «Así dice», que conserva el tono solemne y el valor de anuncio autorizado sin volverla demasiado rígida.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En el texto español se expresa el nombre propio divino como «Yahvé», conforme a la terminología del proyecto, evitando la sustitución por una convención de ocultamiento.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «De los ejércitos» comunica la imagen del título divino con claridad en español moderno y mantiene la amplitud semántica de «hosts», sin estrecharlo innecesariamente a una sola esfera.
- source_word: לֶךְ בֹּא
  english_pob_choice: Go, come
  chosen_spanish: Ve, entra
  alternatives_spanish:
  - Ve, ven
  - Ve, acércate
  lexicon: HALOT
  rationale: Se conservan las dos imperativas, como en el hebreo. «Entra» es el equivalente más natural de la idea direccional de «bōʾ» en este contexto; no se colapsa la doble fuerza verbal.
- source_word: הַסֹּכֵן
  english_pob_choice: steward
  chosen_spanish: mayordomo
  alternatives_spanish:
  - administrador
  - funcionario
  lexicon: HALOT
  rationale: En español, «mayordomo» expresa bien la idea de un funcionario doméstico de alto rango encargado de la administración de la casa/palacio. Se mantiene la relación con «la casa» sin imponer un término eclesiástico.
- source_word: הַזֶּה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - ese
  lexicon: HALOT
  rationale: Se conserva el demonstrativo proximal del hebreo, con su posible matiz despectivo o señalador en el contexto.
- source_word: עַל שֶׁבְנָא
  english_pob_choice: to Shebna
  chosen_spanish: a Sebna
  alternatives_spanish:
  - sobre Sebna
  - acerca de Sebna
  lexicon: HALOT
  rationale: La secuencia funciona como aposición identificadora del funcionario mencionado. En español, «a Sebna» integra de forma natural esa identificación sin introducir un matiz hostil no exigido aquí.
- source_word: עַל הַבָּיִת
  english_pob_choice: who is over the house
  chosen_spanish: el que está sobre la casa
  alternatives_spanish:
  - el que está a cargo de la casa
  - el administrador del palacio
  lexicon: HALOT
  rationale: Se preserva la idiomaticidad hebrea de «estar sobre la casa». «Casa» mantiene la imagen literal; «palacio» queda como interpretación posible, pero no se impone en el texto principal.
theological_decisions:
- issue: Representación del nombre divino YHWH en el título אֲדֹנָי יְהוִה
  english_pob_reading: the Lord Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé de los ejércitos
  rationale: El texto hebreo contiene el nombre propio divino יְהוִה. Siguiendo la norma del proyecto, se lo traduce como «Yahvé» en lugar de ocultarlo tras un sustituto tipográfico. Dado que el versículo es una fórmula oracular, la función teológica del nombre debe quedar visible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de la doble imperativa לֶךְ בֹּא
  english_pob_reading: Go, come
  chosen_spanish_reading: Ve, entra
  alternative_spanish_readings:
  - Ve, ven
  - Ve, acércate
  rationale: La duplicación verbal puede ser idiomática y enfática. En español, «Ve, entra» preserva la fuerza de movimiento hacia el destinatario sin suavizar la orden ni fundir las dos acciones en una sola.
  doctrine_reference: 'POB source audit: lexical_alternative for the paired imperatives'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del contexto inglés, que sustituyó «Lord GOD» por «Lord Yahweh» para reflejar con más precisión el nombre divino יְהוִה. También se preservó la decisión auditada de mantener las dos imperativas del hebreo y la identificación funcional de Shebna como alto funcionario doméstico/palaciego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal para יְהוִה, conforme al criterio del proyecto.
  - «De los ejércitos» se eligió para צְבָאוֹת por ser una equivalencia transparente y ampliamente comprensible.
  - No se usó «SEÑOR» como sustituto tipográfico, para conservar la visibilidad del nombre divino.
  - «Mayordomo» se empleó por su cercanía semántica con el cargo de administración de la casa, sin introducir terminología eclesiástica.
