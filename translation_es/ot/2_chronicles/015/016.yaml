base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/015/016.yaml
  text: Even Maacah[a], the mother of King Asa, he removed from being queen mother, because she had made a dreadful image for Asherah; and Asa cut down her dreadful image, crushed it[c][b], and burned it in the Kidron Valley.
  footnotes:
  - marker: a
    text: Or 'an abominable image' or 'a horrid thing.' The Hebrew term denotes a repulsive or terrifying cult object.
    reason: lexical_alternative
  - marker: b
    text: '''Asherah'' may refer to the goddess or to the cult symbol associated with her; older English versions sometimes render it ''grove.'''
    reason: cultural_note
  - marker: c
    text: Or 'in the brook/wadi Kidron.'
    reason: lexical_alternative
