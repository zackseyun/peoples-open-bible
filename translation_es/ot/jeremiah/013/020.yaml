translation:
  language: es
  text: Alza tus ojos y mira a los que vienen del norte. ¿Dónde está el rebaño que te fue dado, tus hermosas[a] ovejas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gloriosas». La expresión hebrea puede denotar belleza, esplendor o gloria.
    reason: lexical_alternative
lexical_decisions:
- source_word: שאי / עיני(כם)
  english_pob_choice: Lift up your eyes
  chosen_spanish: Levanten sus ojos
  alternatives_spanish:
  - Alcen sus ojos
  - Levanten la vista
  lexicon: HALOT
  rationale: El hebreo usa un imperativo de alzar/levantar y la imagen de los ojos como objeto del movimiento. En español, «Levanten sus ojos» conserva la fuerza concreta y suena natural; se optó por una forma impersonal/plural reverente que encaja con el destinatario colectivo del pasaje.
- source_word: וראי
  english_pob_choice: and see
  chosen_spanish: y vean
  alternatives_spanish:
  - y miren
  - y observen
  lexicon: HALOT
  rationale: El imperativo de ראה pide una acción directa de percepción. «Vean» mantiene la inmediatez del hebreo sin añadir matices interpretativos.
- source_word: הבאים
  english_pob_choice: those who are coming
  chosen_spanish: los que vienen
  alternatives_spanish:
  - los que llegan
  - los que se acercan
  lexicon: HALOT
  rationale: El participio sustantivado indica personas en movimiento hacia el lugar del juicio. «Los que vienen» conserva el valor verbal y la referencia abierta del original.
- source_word: מצפון
  english_pob_choice: from the north
  chosen_spanish: del norte
  alternatives_spanish:
  - desde el norte
  lexicon: HALOT
  rationale: Expresión geográfica directa; se mantiene sencilla y transparente. El matiz ominoso asociado en Jeremías queda implícito, como en el hebreo.
- source_word: העדר
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - el rebaño de ovejas
  - el ganado
  lexicon: HALOT
  rationale: עֵדֶר suele designar un rebaño, especialmente de ovejas. «Rebaño» mantiene la metáfora pastoral y evita decidir prematuramente su referente histórico.
- source_word: נתן לך
  english_pob_choice: that was given to you
  chosen_spanish: que te fue dado
  alternatives_spanish:
  - que te entregaron
  - que se te confió
  lexicon: HALOT
  rationale: La pasiva de נתן se refleja con una construcción pasiva natural en español. «Te fue dado» preserva la idea de recepción/encargo sin explicitar más de lo que el texto dice.
- source_word: צאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - ovejas del rebaño
  lexicon: HALOT
  rationale: צֹאן refiere a ovejas o ganado menor. Aquí se traduce como «ovejas» para mantener el paralelismo pastoral y no repetir «rebaño» de manera redundante.
- source_word: תפארתך
  english_pob_choice: your beautiful sheep
  chosen_spanish: de hermosura
  alternatives_spanish:
  - gloriosas
  - espléndidas
  - hermosas
  lexicon: HALOT
  rationale: תפארת puede significar belleza, esplendor o gloria. La frase española «ovejas de hermosura» conserva la ambigüedad léxica y el tono elevado, evitando resolver demasiado pronto entre belleza y gloria.
theological_decisions:
- issue: Referente metafórico del rebaño
  english_pob_reading: Retain the pastoral metaphor without making the referent explicit in the main text.
  chosen_spanish_reading: Mantener la metáfora pastoral sin explicitar en el cuerpo del texto a quién representa el rebaño.
  alternative_spanish_readings:
  - Hacer explícito que el rebaño representa a Judá o Jerusalén
  - Identificar el rebaño con el pueblo confiado a la ciudad o a sus gobernantes
  rationale: El hebreo presenta la imagen sin desarrollarla. Para preservar la tensión retórica y no imponer una lectura más estrecha que la del pasaje, la traducción deja abierto el referente, aunque la nota permite reconocer la alternativa semántica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje muestra alta concordancia y no hubo cambios necesarios en el pase más reciente.
  spanish_consistency_notes:
  - Se mantuvo «norte» como dirección geográfica simple, sin ampliar el trasfondo histórico en el texto principal.
  - «Rebaño» y «ovejas» se distribuyen para conservar el paralelismo entre עדר y צאן sin redundancia pesada.
  - La nota de pie preserva la alternativa léxica entre belleza/esplendor/gloria para תפארת, siguiendo el audit trail inglés.
  - Se evitó identificar explícitamente el rebaño con Judá/Jerusalén en el texto principal para respetar la metáfora abierta del original.
