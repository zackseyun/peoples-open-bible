translation:
  language: es
  text: O habla a la tierra[a], y ella te enseñará[b]; y los peces del mar te contarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «al país» o «al territorio»; el hebreo אֶרֶץ puede significar «tierra» o «país/territorio». Aquí se adopta «tierra» por el alcance cósmico del pasaje.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice literalmente: «y ella te enseñará», con «tierra» en femenino gramatical; el pronombre femenino se conserva para reflejar esa personificación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֤וֹ
  english_pob_choice: Or
  chosen_spanish: O
  alternatives_spanish:
  - O bien
  - O también
  lexicon: HALOT
  rationale: La partícula disyuntiva introduce una alternativa retórica; en español, «O» conserva la brevedad y el tono poético del original sin añadir matiz innecesario.
- source_word: שִׂ֣יחַ
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - di
  - conversa
  - medita
  lexicon: HALOT
  rationale: En este imperativo con לָאָרֶץ, el verbo pide un acto de hablar o dirigirse a la tierra, no una reflexión interna. «Habla» es natural y mantiene la apelación poética.
- source_word: לָ/אָ֣רֶץ
  english_pob_choice: to the earth
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra
  - a la región
  - al país
  lexicon: HALOT
  rationale: Aunque אֶרֶץ puede ser «tierra» o «país», aquí el contexto amplio de la creación favorece «tierra» frente a «país» o «región».
- source_word: וְ/תֹרֶ֑/ךָּ
  english_pob_choice: and it will teach you
  chosen_spanish: y ella te enseñará
  alternatives_spanish:
  - y te enseñará
  - y ella te instruirá
  lexicon: HALOT
  rationale: El hebreo personifica a «la tierra» con verbo femenino singular. En español, «ella» preserva esa referencia y la personificación; «enseñará» conserva la idea de enseñar sin sonar forzado.
- source_word: וִֽ/יסַפְּר֥וּ לְ֝/ךָ֗
  english_pob_choice: and ... will tell you
  chosen_spanish: te lo contarán
  alternatives_spanish:
  - te contarán
  - te lo dirán
  - te lo relatarán
  lexicon: HALOT
  rationale: ספּר en este contexto poético comunica declarar o contar. «Te lo contarán» suena natural en español y mantiene el paralelismo didáctico con la línea anterior.
- source_word: דְּגֵ֣י הַ/יָּֽם
  english_pob_choice: the fish of the sea
  chosen_spanish: los peces del mar
  alternatives_spanish:
  - los peces del mar
  - los peces del océano
  - los peces del agua
  lexicon: HALOT
  rationale: La construcción de complemento posesivo se vierte de forma directa. «Del mar» preserva la imagen hebrea y su cadencia poética.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y coincide con la línea interpretativa del POB en inglés: imperativo de hablar, personificación femenina de la tierra, y paralelismo con los peces del mar. No se detectan revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se mantiene «tierra» en lugar de «land»/«país» para conservar la amplitud del contexto.
  - Se conserva el pronombre femenino «ella» para reflejar la concordancia hebrea con אֶרֶץ.
  - «Te lo contarán» recoge de manera idiomática el valor de contar/relatar de ספר sin perder el sentido poético.
