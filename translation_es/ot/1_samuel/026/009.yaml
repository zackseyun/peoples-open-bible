translation:
  language: es
  text: 'Pero David dijo a Abisai: «No lo destruyas[a], porque ¿quién puede extender su mano contra el ungido de Yahvé[b] y quedar sin culpa?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa aquí un verbo de destrucción que, en este contexto, apunta a la acción letal que Abisai propone contra Saúl; por eso la traducción conserva el verbo amplio «destruir».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «ungido»; el mismo campo léxico queda luego asociado con «Mesías». Aquí se refiere a Saúl como el rey ungido por Yahvé, no a un título mesiánico en sentido pleno.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But David said
  chosen_spanish: Pero David dijo
  alternatives_spanish:
  - Y David dijo
  - Entonces David dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en este contexto también introduce contraste con la propuesta implícita de Abisai, por eso «Pero» transmite bien el matiz adversativo que la auditoría inglesa resaltó.
- source_word: אַ ל תַּשְׁחִיתֵהוּ
  english_pob_choice: Do not destroy him
  chosen_spanish: No lo destruyas
  alternatives_spanish:
  - No lo mates
  - No lo arruines
  lexicon: HALOT
  rationale: El hiphil de שׁחת puede significar destruir o arruinar. «No lo destruyas» conserva el alcance del verbo hebreo sin reducirlo de antemano a «matar», aunque el contexto sea mortal.
- source_word: מִי
  english_pob_choice: who can
  chosen_spanish: ¿quién puede
  alternatives_spanish:
  - ¿quién
  - ¿quién ha de poder
  lexicon: HALOT
  rationale: La pregunta es retórica y expresa posibilidad e impunidad moral. «¿quién puede» reproduce bien ese valor en español natural.
- source_word: שָׁלַח יָדוֹ
  english_pob_choice: stretch out his hand
  chosen_spanish: extender su mano
  alternatives_spanish:
  - alzar su mano
  - levantar su mano
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para actuar contra alguien, a menudo violentamente. «Extender su mano» preserva el modismo con claridad en español.
- source_word: בִּמְשִׁיחַ יְהוָה
  english_pob_choice: against the LORD’s anointed
  chosen_spanish: contra el ungido de Yahvé
  alternatives_spanish:
  - contra el ungido de Yahvé
  - contra el Mesías de Yahvé
  lexicon: HALOT
  rationale: 'Se mantiene «ungido» para reflejar el sentido histórico inmediato: Saúl como rey consagrado por Yahvé. No se sustituye por «Mesías» en el texto principal para no importar una carga cristológica no expresada aquí, aunque se preserva la conexión léxica.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino, visible también en la relación con «ungido».
- source_word: וְנִקָּה
  english_pob_choice: and remain guiltless
  chosen_spanish: y quedar sin culpa
  alternatives_spanish:
  - y permanecer inocente
  - y quedar impune
  lexicon: HALOT
  rationale: נקה en esta construcción comunica quedar libre de culpa o responsabilidad. «Quedar sin culpa» conserva esa fuerza y evita restringir el sentido solo a castigo legal.
theological_decisions:
- issue: Renderización de מְשִׁיחַ aplicado a Saúl
  english_pob_reading: the LORD’s anointed
  chosen_spanish_reading: el ungido de Yahvé
  alternative_spanish_readings:
  - el Mesías de Yahvé
  - el ungido del SEÑOR
  rationale: La frase hebrea usa el mismo campo léxico que luego se asocia con «Mesías», pero aquí designa a Saúl como rey ungido por Yahvé. «Ungido» conserva el sentido inmediato y mantiene la tensión léxica sin sobrecargar el versículo con una lectura mesiánica ajena al contexto.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres; preservar la tensión teológica sin resolverla innecesariamente.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en la auditoría inglesa; el texto inglés quedó sin cambios tras la última pasada, y la versión española sigue esa lectura estable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino según el estándar del proyecto.
  - Se traduce מָשִׁיחַ como «ungido» en el texto principal, reservando la conexión con «Mesías» para la nota.
  - Se conserva el valor retórico de la pregunta con «¿quién puede… y quedar sin culpa?».
  - «Destruyas» y «quedar sin culpa» reflejan el campo semántico de שׁחת y נקה sin estrecharlos indebidamente.
