translation:
  language: es
  text: Las dos tribus y la media tribu han tomado su heredad al otro lado[a] del Jordán, en Jericó, hacia el oriente[b], hacia la salida del sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “más allá del Jordán”.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “hacia el oriente, hacia la salida del sol”, una expresión doble que enfatiza el lado oriental.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁנֵי הַמַּטּוֹת
  english_pob_choice: the two tribes
  chosen_spanish: las dos tribus
  alternatives_spanish:
  - las dos varas
  - los dos cetros
  lexicon: HALOT
  rationale: En este contexto de distribución territorial, מַטֶּה funciona idiomáticamente como “tribu”, no como “vara” o “cetro”. El plural con numeral debe leerse como las dos tribus participantes.
- source_word: וַחֲצִי הַמַּטֶּה
  english_pob_choice: and the half-tribe
  chosen_spanish: y la media tribu
  alternatives_spanish:
  - y la mitad de la tribu
  - y el medio-tribu
  lexicon: HALOT
  rationale: La expresión designa una unidad administrativa reconocida, no solo una fracción matemática. “Media tribu” preserva la terminología bíblica natural en español.
- source_word: לָקְחוּ
  english_pob_choice: have taken
  chosen_spanish: han recibido
  alternatives_spanish:
  - han tomado
  - tomaron
  - han obtenido
  lexicon: HALOT
  rationale: El verbo hebreo es “tomar”, pero en este resumen explicativo del reparto de la tierra, “han recibido” comunica mejor el resultado del acto distributivo sin perder el sentido de posesión efectiva. Aun así, se conserva la idea de acción completada en el perfecto.
- source_word: נַחֲלָתָם
  english_pob_choice: their inheritance
  chosen_spanish: su heredad
  alternatives_spanish:
  - su herencia
  - su posesión
  - su heredad asignada
  lexicon: HALOT
  rationale: נַחֲלָה en contexto de tierra pactal refiere la porción asignada como heredad. “Heredad” conserva mejor ese valor bíblico que “posesión”; en español, también evita una posible lectura puramente económica.
- source_word: מֵעֵבֶר לְיַרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del río Jordán
  lexicon: HALOT
  rationale: La frase es idiomática y depende del punto de referencia. “Al otro lado del Jordán” reproduce esa orientación espacial de forma natural en español; “más allá” también sería posible, pero suena un poco más abstracto.
- source_word: יְרֵחוֹ
  english_pob_choice: at Jericho
  chosen_spanish: cerca de Jericó
  alternatives_spanish:
  - en Jericó
  - junto a Jericó
  lexicon: HALOT
  rationale: En el hebreo, el topónimo localiza la región del cruce sin afirmar necesariamente que estén dentro de la ciudad. “Cerca de Jericó” expresa mejor la función adverbial del nombre en español.
- source_word: קֵדְמָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: La forma direccional expresa orientación. “Hacia el oriente” mantiene un registro digno y claro, y conserva la dirección sin convertirla en un sustantivo fijo.
- source_word: מִזְרָחָה
  english_pob_choice: toward the sunrise
  chosen_spanish: hacia donde sale el sol
  alternatives_spanish:
  - hacia el nacimiento del sol
  - hacia el este
  lexicon: HALOT
  rationale: El hebreo repite la dirección con una imagen ligada al amanecer. En español, “hacia donde sale el sol” reproduce esa imagen de manera comprensible y preserva la duplicación enfática con קֵדְמָה.
theological_decisions:
- issue: Reduplicación direccional en hebreo
  english_pob_reading: eastward, toward the sunrise
  chosen_spanish_reading: hacia el oriente, hacia donde sale el sol
  alternative_spanish_readings:
  - al oriente, hacia el amanecer
  - hacia el este, hacia el sol naciente
  rationale: No hay aquí una doctrina en disputa, pero sí una intensificación semítica que conviene no aplanar. La doble expresión mantiene el énfasis de orientación oriental del texto hebreo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La traducción se ajusta al pasaje breve sin cambios de revisión aplicados en el audit trail; se conserva la alta concordancia del inglés POB con el hebreo y se explicita en español la misma combinación de ubicación geográfica y énfasis direccional.
  spanish_consistency_notes:
  - Se usa “Yahvé” para el Nombre divino cuando aparece; aquí no ocurre.
  - Se prefiere “heredad” para נַחֲלָה en contexto territorial pactal.
  - Se mantiene “media tribu” como término bíblico natural para וַחֲצִי הַמַּטֶּה.
  - La duplicación direccional se conserva con dos miembros en español para no borrar el paralelismo hebreo.
