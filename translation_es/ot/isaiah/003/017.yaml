translation:
  language: es
  text: Por tanto, el Señor herirá la coronilla de las hijas de Sion con llagas, y Yahvé descubrirá sus partes íntimas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su desnudez'; el hebreo es difícil, y algunos lo entienden de manera más específica como un eufemismo para partes íntimas, mientras que otros lo entienden de manera diferente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׂפַּח
  english_pob_choice: will strike ... with scabs
  chosen_spanish: herirá ... con tiña
  alternatives_spanish:
  - la afligirá con llagas
  - la golpeará con sarna
  lexicon: HALOT
  rationale: El verbo expresa una acción punitiva que produce una condición cutánea visible. En español, 'herirá ... con tiña' conserva la fuerza de juicio y la imagen corporal sin volverla mecánica; 'llagas' o 'sarna' son alternativas más interpretativas o menos precisas para el estado descrito.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: HALOT
  rationale: Se trata del título divino אֲדֹנָי, distinto del nombre YHWH que aparece después. 'El Señor' mantiene la distinción formal en español y sigue el registro reverente del texto.
- source_word: קָדְקֹד
  english_pob_choice: the crown
  chosen_spanish: la coronilla
  alternatives_spanish:
  - el cogote
  - la cima de la cabeza
  lexicon: HALOT
  rationale: '''Coronilla'' comunica en español el sentido de la parte superior de la cabeza y evita ambigüedad con una corona real. Es una equivalencia natural para la imagen anatómica del hebreo.'
- source_word: בְּנוֹת צִיּוֹן
  english_pob_choice: the daughters of Zion
  chosen_spanish: las hijas de Sion
  alternatives_spanish:
  - las mujeres de Sion
  lexicon: HALOT
  rationale: Se conserva la fórmula poética y profética 'las hijas de Sion' para no diluir la personificación. 'Mujeres de Sion' sería explicativo, pero menos transparente respecto de la forma del original.
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: El proyecto usa 'Yahvé' para יהוה. Mantenerlo aquí distingue claramente el nombre divino del título אֲדֹנָי anterior y es fiel a la convención del POB.
- source_word: פָּתְהֵן
  english_pob_choice: their private parts
  chosen_spanish: sus partes íntimas
  alternatives_spanish:
  - su desnudez
  - sus vergüenzas
  lexicon: HALOT
  rationale: El hebreo es difícil y probablemente funciona como eufemismo de exposición íntima. 'Partes íntimas' preserva esa reserva en español sin cerrar indebidamente la ambigüedad; 'desnudez' es más general y 'vergüenzas' suena menos natural aquí.
- source_word: יְעָרֶה
  english_pob_choice: will lay bare
  chosen_spanish: descubrirá
  alternatives_spanish:
  - desnudará
  - pondrá al descubierto
  lexicon: HALOT
  rationale: '''Descubrir'' es la manera más natural en español bíblico y moderno para ''lay bare'' / ''uncover''. Mantiene el sentido de exposición humillante sin exagerar ni interpretar más allá del texto.'
theological_decisions:
- issue: Distinguir entre אֲדֹנָי y יהוה en la misma cláusula
  english_pob_reading: Render אֲדֹנָי as 'the Lord' and יהוה as 'Yahweh'
  chosen_spanish_reading: Renderizar אֲדֹנָי como 'el Señor' y יהוה como 'Yahvé'
  alternative_spanish_readings:
  - Renderizar ambos como 'el Señor'
  - Conservar ambos como 'Señor'
  rationale: El hebreo diferencia intencionalmente dos designaciones divinas. La traducción española debe preservar esa distinción para que el lector perciba la estructura del verso y no se pierda el contraste entre título y nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Términos en disputa — יְהוָה YHWH → Yahvé'
- issue: Mantener la tensión semántica de פָּתְהֵן sin resolverla en exceso
  english_pob_reading: A euphemistic reference to intimate parts exposed in humiliation
  chosen_spanish_reading: Un eufemismo para partes íntimas expuestas en humillación
  alternative_spanish_readings:
  - La desnudez en general
  - Una referencia a la frente o coronilla
  rationale: El contexto de juicio y vergüenza favorece la exposición íntima, pero el término sigue siendo difícil. 'Partes íntimas' conserva la cautela del POB y deja abierta la discusión lexical en vez de fijar un sentido más allá de la evidencia.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla'
- issue: El tono de juicio corporal en paralelo con el verbo de exposición
  english_pob_reading: strike ... with scabs / lay bare
  chosen_spanish_reading: herirá ... con tiña / descubrirá
  alternative_spanish_readings:
  - afligirá ... con llagas / desnudará
  - golpeará ... con enfermedad / pondrá al descubierto
  rationale: La traducción española debe reflejar tanto el castigo físico como la humillación pública. 'Herirá ... con tiña' y 'descubrirá' conservan ese doble efecto de aflicción y exposición sin suavizarlo.
  doctrine_reference: 'Translation philosophy §2: Fidelidad semántica con equivalencia óptima'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y sin cambios necesarios; por eso este borrador sigue de cerca la lectura auditada del inglés POB, manteniendo la distinción entre אֲדֹנָי y יהוה y conservando la ambigüedad lexical de פָּתְהֵן con una nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה, coherente con el estándar del proyecto.
  - Se usa 'el Señor' para אֲדֹנָי para mantener la distinción con el nombre divino.
  - '''Hijas de Sion'' conserva la personificación profética del hebreo.'
  - '''Partes íntimas'' evita una paráfrasis excesiva y mantiene la tensión interpretativa del término difícil.'
