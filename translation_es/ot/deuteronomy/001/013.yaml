revisions:
- from: Elijan para ustedes hombres[a] sabios, discernientes y bien conocidos[b] de sus tribus, y yo los nombraré como sus jefes.
  to: Elijan para ustedes hombres sabios, entendidos y reconocidos[a] de entre sus tribus, y yo los nombraré como sus jefes[b].
  rationale: Se corrigieron los anclajes de las notas para que correspondan a los términos hebreos documentados en la auditoría inglesa. Se reemplazó 'discernientes' por 'entendidos' para mejorar la naturalidad y legibilidad sin perder el matiz de juicio perceptivo. Se ajustó 'de sus tribus' a 'de entre sus tribus' para expresar mejor la selección desde el interior de las tribus. Se mantuvo 'jefes' en el texto principal por naturalidad española, con nota que conserva la literalidad 'cabezas'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:27Z'
review_pass:
