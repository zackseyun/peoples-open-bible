    rationale: Aunque busca reflejar el plural hebreo, en español ‘han arado / han segado / han comido’ se interpreta naturalmente como tercera persona plural. Sin ‘ustedes’, la lectura queda poco natural y puede confundir el referente.
  - severity: high
