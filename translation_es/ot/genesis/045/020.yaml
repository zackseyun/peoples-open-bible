    text: 'O: "no se preocupen por sus bienes". Literalmente, "que sus ojos no perdonen sus enseres"; el hebreo conserva la imagen del "ojo" como sujeto del verbo.'
    reason: lexical_alternative
  revision_rationale: Se revisa para conservar la imagen hebrea de 'ojo' sin caer en una construcción española ininteligible. 'Que sus ojos no perdonen' refleja mejor עֵינְכֶם ... תָּחֹס que 'vuestra vista tenga compasión'. Se mantiene 'enseres' como opción válida y digna para כְּלֵיכֶם. Se cambia 'será vuestro' a 'es suyo' para reflejar la posesión enfática de לָכֶם הוּא. También se adapta el tratamiento a un registro más neutral latinoamericano.
