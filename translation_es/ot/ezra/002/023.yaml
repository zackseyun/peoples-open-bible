  lexicon: HALOT
  rationale: El constructo plural de אִישׁ señala aquí a los miembros masculinos de un grupo ligado a un lugar en una lista censal. «Los hombres de» conserva ese valor de forma directa y natural en español; «la gente de» diluiría el masculino explícito del hebreo.
- source_word: עֲנָתוֹת
  english_pob_choice: Anathoth
  chosen_spanish: Anatot
  alternatives_spanish:
  - Anatoth
  lexicon: HALOT
  rationale: Es un topónimo propio. Se translitera al español con una forma clara y reconocible; «Anatot» evita una adaptación innecesaria del final hebreo y mantiene la identidad del lugar.
- source_word: מֵאָה עֶשְׂרִים וּשְׁמֹנָה
  english_pob_choice: one hundred twenty-eight
  chosen_spanish: ciento veintiocho
  alternatives_spanish:
