translation:
  language: es
  text: 'Estos son los hijos de Zibeón: Aía y Aná. Este es Aná, quien halló los yemim[a] en el desierto mientras apacentaba los asnos para Zibeón su padre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El significado del hebreo yemim es incierto. Se ha entendido como «manantiales termales» o, en algunas interpretaciones antiguas y posteriores, como «mulos». El texto principal conserva el término hebreo porque la evidencia léxica no permite una decisión segura.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - varones de
  lexicon: HALOT
  rationale: En un contexto genealógico, el hebreo constructo señala descendencia masculina, pero en español «hijos de» comunica con naturalidad la relación genealógica sin sonar forzado. «Descendientes de» es posible, pero diluye la forma directa del parentesco en esta lista familiar.
- source_word: צִבְעוֹן
  english_pob_choice: Zibeon
  chosen_spanish: Zibeón
  alternatives_spanish:
  - Zibeón
  lexicon: transliteración estándar del nombre propio
  rationale: Se translitera el nombre propio. Se mantiene la forma española usual con tilde para respetar la acentuación del castellano sin alterar la identificación del personaje.
- source_word: אַיָּה
  english_pob_choice: Aiah
  chosen_spanish: Aía
  alternatives_spanish:
  - Aia
  - Aya
  lexicon: transliteración estándar del nombre propio
  rationale: El nombre se translitera como nombre propio. «Aía» conserva la secuencia vocálica y resulta legible en español; «Aia» es posible, pero la tilde ayuda a marcar la pronunciación.
- source_word: וַעֲנָה / עֲנָה
  english_pob_choice: Anah
  chosen_spanish: Aná
  alternatives_spanish:
  - Anah
  - Ana
  lexicon: transliteración estándar del nombre propio
  rationale: El nombre se conserva como propio. Se usa «Aná» para reflejar la acentuación final en español y evitar confusión con «Ana», que sería otra forma nominal común en español.
- source_word: הוּא עֲנָה
  english_pob_choice: This is the Anah
  chosen_spanish: Este es el Aná
  alternatives_spanish:
  - Este es Aná
  - Éste es el Aná
  lexicon: HALOT
  rationale: 'La construcción identificativa hebrea se vierte de modo natural con «Este es». Se conserva el artículo ante el nombre para marcar la identificación enfática: no es cualquier Aná, sino este mismo.'
- source_word: מָצָא
  english_pob_choice: found
  chosen_spanish: halló
  alternatives_spanish:
  - encontró
  - descubrió
  lexicon: HALOT
  rationale: «Halló» expresa el sentido de encontrar con un registro bíblico claro y sobrio. «Encontró» sería también correcto, pero «halló» mantiene mejor el tono narrativo formal.
- source_word: הַיֵּמִם
  english_pob_choice: yemim
  chosen_spanish: yēmîm
  alternatives_spanish:
  - yemim
  - hot springs
  - mulos
  lexicon: HALOT
  rationale: El término hebreo es raro y de sentido incierto. Se conserva una transliteración levemente marcada («yēmîm») para no imponer una interpretación discutida en el texto principal; las alternativas tradicionales siguen siendo posibles según la evidencia, pero no seguras.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en la estepa
  lexicon: HALOT
  rationale: Aquí se opta por «desierto» como equivalente español natural y ampliamente inteligible para מִדְבָּר. Aunque «wilderness» podría corresponder también a «desierto» o «yermo», en español «desierto» comunica bien el ambiente inhóspito sin perder el valor bíblico del término.
- source_word: בִּרְעֹתוֹ
  english_pob_choice: while he was pasturing
  chosen_spanish: mientras apacentaba
  alternatives_spanish:
  - mientras pastoreaba
  - cuando apacentaba
  lexicon: HALOT
  rationale: El infinitivo con preposición indica acción simultánea. «Apacentaba» es una equivalencia española natural y bíblicamente reconocible; con «asnos» se entiende el cuidado de los animales sin forzar «pastorear», que suena menos idiomático para este caso.
- source_word: הַחֲמֹרִים
  english_pob_choice: the donkeys
  chosen_spanish: los asnos
  alternatives_spanish:
  - los burros
  - los pollinos
  lexicon: HALOT
  rationale: «Asnos» conserva el registro bíblico y es fiel al animal designado. «Burros» es demasiado coloquial; «pollinos» no corresponde aquí.
- source_word: לְצִבְעוֹן אָבִיו
  english_pob_choice: for Zibeon his father
  chosen_spanish: de Zibeón su padre
  alternatives_spanish:
  - para Zibeón su padre
  - de su padre Zibeón
  lexicon: HALOT
  rationale: La relación posesiva y filial se expresa de forma natural en español con «de Zibeón su padre». Se evita «para», que podría sonar teleológico o instrumental, y se conserva la apposición filial del hebreo.
theological_decisions:
- issue: Valor del término genealógico y repetición identificativa de Aná
  english_pob_reading: This is the Anah who...
  chosen_spanish_reading: Este es el Aná que...
  alternative_spanish_readings:
  - Éste es el Aná que...
  - Este es Aná, el que...
  rationale: 'No hay una decisión doctrinal, pero sí una decisión de precisión textual: la frase identifica a un individuo concreto dentro de la genealogía. Se mantiene la fuerza identificativa sin suavizarla en una mera cláusula relativa impersonal.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y el audit trail inglés: conserva la estructura genealógica, la identificación enfática de Aná, y la forma no resuelta del término raro הַיֵּמִם. No se incorporaron revisiones posteriores porque el expediente indica que no hubo cambios aplicados y el estado final fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «hijos de» frente a «descendientes de» por tratarse de una lista genealógica directa.
  - Los nombres propios se transliteran con ortografía española cuando ayuda a la lectura, sin reinterpretarlos.
  - Se conserva el término raro como transliteración para no cerrar indebidamente una ambigüedad léxica documentada.
