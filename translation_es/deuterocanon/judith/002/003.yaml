translation:
  language: es
  text: Y ellos también decidieron destruir a todos los que no habían seguido la palabra de su boca[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda carne». El griego dice «toda carne», un modismo bíblico para «todos» o «toda la humanidad», que puede conservarse literalmente pero aquí se expresa de forma más natural en español.
    reason: lexical_alternative
  - marker: b
    text: O «el mandato de su boca» o «la orden dicha por él». El griego mantiene la imagen de una palabra pronunciada que funciona como mandato.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ αὐτοὶ
  english_pob_choice: And they too
  chosen_spanish: Y ellos también
  alternatives_spanish:
  - Y ellos mismos
  - También ellos
  lexicon: BDAG
  rationale: La combinación añade inclusión o énfasis. «Y ellos también» conserva ese matiz de suma con una forma natural en español.
- source_word: ἔκριναν
  english_pob_choice: decided
  chosen_spanish: decidieron
  alternatives_spanish:
  - juzgaron
  - determinaron
  - decretaron
  lexicon: BDAG
  rationale: El verbo expresa tomar una resolución. «Decidieron» reproduce el sentido deliberativo sin cargarlo innecesariamente de tono legal.
- source_word: ὀλεθρεῦσαι
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - aniquilar
  - exterminar
  - arrasar
  lexicon: LSJ
  rationale: El infinitivo indica la intención de causar ruina o destrucción. «Destruir» es fuerte y fiel sin intensificar más de lo que exige el griego.
- source_word: πᾶσαν σάρκα
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - todos
  - toda la humanidad
  lexicon: LSJ
  rationale: La frase bíblica se conserva como idiomática. «Toda carne» mantiene la textura del original y la fuerza semítica de la expresión.
- source_word: οἳ οὐκ ἠκολούθησαν
  english_pob_choice: who had not followed
  chosen_spanish: que no había seguido
  alternatives_spanish:
  - que no obedecieron
  - que no habían ido tras
  lexicon: BDAG
  rationale: ἀκολουθέω significa literalmente «seguir». En este contexto implica obediencia, pero «había seguido» conserva la imagen verbal y deja que el complemento la precise.
- source_word: τῷ λόγῳ
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mandato
  - la orden
  lexicon: BDAG
  rationale: λόγος puede significar palabra, mensaje o mandato. Como la frase siguiente ya indica el origen oral, «la palabra» preserva la literalidad y sigue siendo inteligible en español.
- source_word: τοῦ στόματος αὐτοῦ
  english_pob_choice: of his mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - salida de su boca
  - pronunciada por él
  lexicon: LSJ
  rationale: Se conserva el giro semítico de procedencia oral. En español, «de su boca» es una expresión literal, natural y suficientemente transparente.
theological_decisions:
- issue: σάρξ en un contexto idiomático y no paulino
  english_pob_reading: all flesh
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - todos
  - toda la humanidad
  rationale: Aquí σάρξ funciona como idiomática bíblica para la totalidad de los afectados, no como «naturaleza pecaminosa». Mantener «carne» preserva el registro bíblico y evita importar una teología ajena al contexto.
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos para σάρξ; filosofía de traducción #5'
- issue: λόγος unido a «de su boca»
  english_pob_reading: the word of his mouth
  chosen_spanish_reading: la palabra de su boca
  alternative_spanish_readings:
  - el mandato de su boca
  - la orden dicha por él
  rationale: El inglés POB preserva la imagen de una palabra que sale de la boca. En español, «la palabra de su boca» mantiene esa tensión entre palabra y mandato sin resolverla demasiado pronto.
  doctrine_reference: BDAG para λόγος; decisión léxica sobre el genitivo explicativo
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que prefirió «of his mouth» por su mayor literalidad formal respecto del genitivo griego. En español se reflejó con «de su boca», manteniendo el mismo equilibrio entre literalidad y naturalidad.
  spanish_consistency_notes:
  - Se evitó traducir πᾶσαν σάρκα como «todos» en el texto principal para conservar el modismo bíblico documentado por el POB en inglés.
  - Se prefirió «la palabra de su boca» en vez de «el mandato de su boca» porque el auditable POB inglés preserva λόγος como «word» y explica el posible sentido de orden en nota.
  - «Y ellos también» mantiene el valor inclusivo/emfático de καὶ αὐτοὶ sin recurrir a una construcción demasiado marcadamente enfática en español.
