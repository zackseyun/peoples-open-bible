translation:
  language: es
  text: 'Así dice el Señor Yahvé: Yo extenderé mi red sobre ti con una asamblea de muchos pueblos[a], y ellos te sacarán con mi red de arrastre[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con/en una asamblea de muchos pueblos»; la frase también puede entenderse como que muchos pueblos son el medio por el cual Dios extiende la red.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y ellos te sacarán en mi red». El hebreo usa aquí un segundo término de red, distinto del primero en el versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: El título compuesto combina אֲדֹנָי con el nombre divino יְהוָה. En español, "Yahvé" preserva el nombre propio del pacto, conforme al criterio del proyecto, y "Señor" traduce apropiadamente אֲדֹנָי sin recurrir a la máscara tradicional "SEÑOR".
- source_word: וּפָרַשְׂתִּי
  english_pob_choice: I will spread
  chosen_spanish: extenderé
  alternatives_spanish:
  - esparciré
  - desplegaré
  lexicon: HALOT
  rationale: En el contexto de una red, פרשׂ expresa la acción de abrirla o extenderla. "Extenderé" comunica bien la imagen en español sin forzar una construcción pesada.
- source_word: רִשְׁתִּי
  english_pob_choice: my net
  chosen_spanish: mi red
  alternatives_spanish:
  - mi malla
  - mi red de pesca
  lexicon: HALOT
  rationale: רֶשֶׁת es la red común. "Red" es el equivalente natural y mantiene la imagen básica del texto.
- source_word: בִּקְהַל עַמִּים רַבִּים
  english_pob_choice: with an assembly of many peoples
  chosen_spanish: en medio de una asamblea de muchos pueblos
  alternatives_spanish:
  - con una asamblea de muchos pueblos
  - en una asamblea de muchos pueblos
  - por medio de una asamblea de muchos pueblos
  lexicon: HALOT
  rationale: La preposición ב aquí admite un valor circunstancial o instrumental. "En medio de" deja abierta la idea de que la red se extiende en el contexto de una multitud reunida, y no elimina la posibilidad, señalada en la auditoría inglesa, de que esos pueblos funcionen como medio o instrumento.
- source_word: וְהֶעֱלוּךָ
  english_pob_choice: and they will haul you up
  chosen_spanish: y ellos te sacarán
  alternatives_spanish:
  - y te levantarán
  - y te traerán arriba
  - y te sacarán arriba
  lexicon: HALOT
  rationale: עלה en Hiphil conserva la idea de hacer subir, pero en la metáfora de pesca/captura en español "sacar" resulta natural y fiel al sentido de extraer a la presa desde abajo.
- source_word: בְּחֶרְמִי
  english_pob_choice: in my dragnet
  chosen_spanish: con mi red de arrastre
  alternatives_spanish:
  - en mi red de arrastre
  - con mi dragnet
  - en mi dragnet
  lexicon: HALOT
  rationale: חֶרֶם aquí es un término de red distinto de רֶשֶׁת. "Red de arrastre" preserva la distinción léxica y la fuerza de captura intensificada mejor que repetir simplemente "red". "Con" refleja bien el valor instrumental del hebreo en esta cláusula.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה dentro del título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: La auditoría inglesa usa "GOD" para señalar el Tetragrama en el título compuesto; en español, "Yahvé" hace visible el nombre divino sin ocultarlo tras una convención tipográfica. "Señor" conserva el valor de אֲדֹנָי y evita un calco como "Señor SEÑOR".
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de la frase בִּקְהַל עַמִּים רַבִּים como instrumento o circunstancia
  english_pob_reading: with an assembly of many peoples
  chosen_spanish_reading: en medio de una asamblea de muchos pueblos
  alternative_spanish_readings:
  - con una asamblea de muchos pueblos
  - por medio de una asamblea de muchos pueblos
  rationale: 'La nota inglesa preserva la posibilidad de que muchos pueblos sean el instrumento por el cual Dios extiende la red. El español elegido mantiene esa tensión sin cerrarla del todo: puede leerse como contexto circunstancial y también deja abierta la lectura instrumental.'
  doctrine_reference: HALOT; nota lexical del texto base
- issue: Mantenimiento de la metáfora de pesca/captura con dos términos distintos de red
  english_pob_reading: net / dragnet
  chosen_spanish_reading: red / red de arrastre
  alternative_spanish_readings:
  - red / dragnet
  - malla / red de arrastre
  rationale: El texto hebreo distingue entre רִשְׁתִּי y חֶרְמִי. La versión española conserva esa distinción para no borrar la variación retórica y el énfasis del juicio figurado.
  doctrine_reference: HALOT; nota lexical del texto base
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo (WLC) y la auditoría inglesa disponible. No se introdujeron revisiones textuales adicionales; se preservó la distinción entre los dos términos de red y la ambigüedad instrumental/circunstancial de la frase central.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה según la terminología por defecto del proyecto.
  - Se mantuvo «Señor» para אֲדֹנָי en el título compuesto.
  - Se conservó la diferencia entre «red» y «red de arrastre» para reflejar dos lexemas hebreos distintos.
  - Se eligió una formulación que no cierra la posible lectura instrumental de «en medio de una asamblea de muchos pueblos».
