lexical_decisions:
- source_word: ὁ γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  lexicon: BDAG
  rationale: γάρ introduce la razón o explicación del contexto anterior; en español, «Porque» conserva bien esa conexión causal y suena natural en registro bíblico actual.
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: BDAG
  rationale: El referente es el Dios de Israel; «Dios» es la forma directa y fiel en español, sin necesidad de añadir determinación.
- source_word: δείξει
  english_pob_choice: will show
  chosen_spanish: mostrará
  alternatives_spanish:
  - revelará
  - hará visible
  lexicon: BDAG
  rationale: El futuro de δείκνυμι expresa hacer ver o mostrar. «Mostrará» es la opción más natural y conserva la acción divina de poner algo a la vista de otros.
- source_word: τῇ ὑπʼ οὐρανὸν πάσῃ
  english_pob_choice: to all under heaven
  chosen_spanish: a todos los que están bajo el cielo
  alternatives_spanish:
  - a todo el mundo bajo el cielo
  - a todos debajo del cielo
  lexicon: BDAG
  rationale: La expresión es una idiomatización de alcance universal. «A todos los que están bajo el cielo» mantiene la imagen y el alcance sin perder claridad en español.
- source_word: τὴν σὴν
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - tuya
  - de ti
  lexicon: BDAG
  rationale: El griego usa segunda persona singular; «tu» preserva el trato directo a Jerusalén/Sion en el contexto.
- source_word: λαμπρότητα
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - resplandor
  - gloria
  - brillo
  lexicon: BDAG
  rationale: λαμπρότης puede denotar brillo, magnificencia o esplendor. «Esplendor» recoge bien la mezcla de brillo visible y dignidad exaltada, como en la decisión inglesa.
theological_decisions:
- issue: Naturaleza de la «λαμπρότητα» de Jerusalén
  english_pob_reading: splendor
  chosen_spanish_reading: esplendor
  alternative_spanish_readings:
  - gloria
  - resplandor
  rationale: El versículo habla de la magnificencia restaurada de Jerusalén que Dios hará visible a las naciones. «Esplendor» evita cargar el término con «gloria» como equivalente técnico cuando el griego no usa δόξα, pero sigue expresando una grandeza luminosa y honorífica.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden en alto grado; no hubo revisiones aplicadas en la última pasada, así que la redacción española sigue de cerca esa lectura estable sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεὸς de acuerdo con el estándar del proyecto.
  - Se traduce λαμπρότητα como «esplendor» para conservar el matiz luminoso sin forzar «gloria» como término técnico.
  - Se conserva el alcance universal de τῇ ὑπʼ οὐρανὸν πάσῃ con una construcción natural en español.
  - Se usa puntuación española estándar y se coloca la nota en el término principal con [a].
