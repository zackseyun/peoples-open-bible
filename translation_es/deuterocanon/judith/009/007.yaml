translation:
  language: es
  text: Porque he aquí, los asirios se han multiplicado en su fuerza; se han ensalzado sobre caballo y jinete; se han jactado en el brazo de los soldados de a pie; han puesto su esperanza[a] en escudo y lanza y arco y honda, y no han sabido que tú eres el Señor[b], el que destroza las guerras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han confiado en escudo y lanza y arco y honda». El verbo griego puede significar tanto esperar como confiar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «quien termina las guerras». Literalmente, «el que destroza las guerras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ γὰρ
  english_pob_choice: For behold
  chosen_spanish: Porque he aquí
  alternatives_spanish:
  - He aquí
  - Pues he aquí
  lexicon: LSJ
  rationale: Conserva la fuerza de llamada de atención de ἰδοὺ y la conexión explicativa de γάρ sin volver la frase pesada en español.
- source_word: ἐπληθύνθησαν
  english_pob_choice: have multiplied
  chosen_spanish: se han multiplicado
  alternatives_spanish:
  - han aumentado
  - se han hecho muchos
  lexicon: LSJ
  rationale: Reproduce el matiz de aumento en número o magnitud sin precisar indebidamente si el énfasis es numérico o militar.
- source_word: ἐν δυνάμει αὐτῶν
  english_pob_choice: in their strength
  chosen_spanish: en su fuerza
  alternatives_spanish:
  - en su poder
  - por su fuerza
  lexicon: LSJ
  rationale: fuerza transmite bien δύναμις en un contexto bélico y mantiene la construcción preposicional del griego.
- source_word: ὑψώθησαν
  english_pob_choice: have been exalted
  chosen_spanish: se han ensalzado
  alternatives_spanish:
  - han sido levantados
  - se han enaltecido
  lexicon: LSJ
  rationale: En español, 'ensalzarse' comunica elevación y autoexaltación sin reducir el verbo a una mera interpretación psicológica.
- source_word: ἐφʼ ἵππῳ καὶ ἀναβάτῃ
  english_pob_choice: on horse and rider
  chosen_spanish: sobre caballo y jinete
  alternatives_spanish:
  - en caballo y jinete
  - a caballo y jinete
  lexicon: LSJ
  rationale: '''Sobre'' refleja la preposición griega y la imagen de dominio militar; ''caballo y jinete'' preserva el par concreto de la fuente.'
- source_word: ἐγαυρίασαν
  english_pob_choice: have boasted
  chosen_spanish: se han jactado
  alternatives_spanish:
  - se han gloriado
  - han presumido
  lexicon: LSJ
  rationale: '''Jactarse'' expresa bien la arrogancia triunfal del verbo en este contexto bélico y mantiene un registro bíblico claro.'
- source_word: ἐν βραχίονι πεζῶν
  english_pob_choice: in the arm of foot soldiers
  chosen_spanish: en el brazo de los soldados de a pie
  alternatives_spanish:
  - en el brazo de la infantería
  - en la fuerza de los soldados de a pie
  lexicon: LSJ
  rationale: '''Brazo'' conserva la metáfora concreta; ''soldados de a pie'' aclara πεζῶν para el lector moderno sin introducir tecnicismo innecesario.'
- source_word: ἤλπισαν
  english_pob_choice: have hoped in
  chosen_spanish: han esperado en
  alternatives_spanish:
  - han confiado en
  - han puesto su esperanza en
  lexicon: LSJ
  rationale: '''Esperar en'' mantiene la posible doble fuerza de esperanza y confianza sin perder el enlace verbal de la serie griega.'
- source_word: ἀσπίδι καὶ ἐν γαίσῳ καὶ τόξῳ καὶ σφενδόνῃ
  english_pob_choice: shield and spear and bow and sling
  chosen_spanish: escudo y lanza y arco y honda
  alternatives_spanish:
  - escudo, lanza, arco y honda
  - escudo y lanza y arco y tiradera
  lexicon: LSJ
  rationale: Usa vocabulario militar natural en español y conserva la acumulación asindética del texto fuente.
- source_word: οὐκ ἔγνωσαν
  english_pob_choice: they have not known
  chosen_spanish: no han sabido
  alternatives_spanish:
  - no han conocido
  - no han reconocido
  lexicon: LSJ
  rationale: '''Saber'' en español puede expresar conocimiento real y reconocimiento; aquí conserva la gravedad del fracaso espiritual sin sonar forzado.'
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Señor
  lexicon: LSJ
  rationale: En este versículo la fuente griega usa κύριος como título divino; 'el Señor' es la correspondencia española más natural. Se conserva la mayúscula reverencial y no se inserta 'Yahvé' porque el texto fuente no explicita el tetragrama.
- source_word: συντρίβων πολέμους
  english_pob_choice: the one who shatters wars
  chosen_spanish: el que destroza las guerras
  alternatives_spanish:
  - el que quebranta las guerras
  - el que aplasta las guerras
  lexicon: LSJ
  rationale: '''Destroza'' refleja la energía de συντρίβων y mantiene la imagen concreta de quebrar/romper guerras, sin suavizarla a ''termina'' o ''acaba''.'
theological_decisions:
- issue: Cómo verter κύριος en una plegaria deuterocanónica dirigida al Dios de Israel
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - el Señor Yahvé
  rationale: El griego presenta κύριος como título divino. 'El Señor' mantiene la referencia teológica sin añadir un nombre propio que no aparece en el texto fuente; la mayúscula distingue el uso reverencial.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; no masking of YHWH unless warranted by source'
- issue: Si traducir συντρίβων πολέμους de forma más dinámica como 'quien pone fin a las guerras'
  english_pob_reading: the one who shatters wars
  chosen_spanish_reading: el que destroza las guerras
  alternative_spanish_readings:
  - el que pone fin a las guerras
  - el que rompe las guerras
  rationale: La fuente griega es imagística y violenta; 'destroza' preserva la tensión retórica y no reduce el participio a una paráfrasis interpretativa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue la lectura revisada del audit trail inglés: ἐφʼ ἵππῳ καὶ ἀναβάτῃ se refleja con «sobre caballo y jinete», no con una preposición menos exacta. También se preserva la imagen fuerte de συντρίβων πολέμους como acción de quebrar/destrozar, en lugar de suavizarla a una formulación puramente dinámica.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - La serie de armas conserva la repetición de conjunciones para reflejar el ritmo del griego.
  - No se usa «Yahvé» porque en este versículo el griego dice κύριος; la traducción respeta la titulación del texto fuente.
  - Se conserva la mayúscula reverencial en «Señor» para distinguir el título divino del uso común.
