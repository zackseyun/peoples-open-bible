translation:
  language: es
  text: No quedaron Anakim en la tierra de los hijos de Israel[a]; solo en Gaza, Gat y Asdod[b] quedaron algunos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «No quedaron Anakim en la tierra de los hijos de Israel; solo en Gaza, Gat y Asdod permanecieron».'
    reason: alternative_reading
lexical_decisions:
- source_word: נוֹתַר
  english_pob_choice: were left
  chosen_spanish: No quedaron
  alternatives_spanish:
  - No fueron dejados
  - No permanecieron
  lexicon: HALOT
  rationale: El nifal de נותר expresa el resultado de quedar/restar tras la conquista. En español, «quedaron» comunica bien ese estado resultante con naturalidad y sin perder la pasividad implícita.
- source_word: עֲנָקִים
  english_pob_choice: Anakim
  chosen_spanish: anaceos
  alternatives_spanish:
  - anakitas
  - Anakim
  lexicon: HALOT
  rationale: La forma española tradicional y readable para este grupo es «anaceos», que preserva el etnónimo bíblico sin depender de un calco del inglés. Evita tanto la expansión interpretativa («descendientes de Anac») como una transliteración menos natural en español.
- source_word: בְּאֶרֶץ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: in the land of the sons of Israel
  chosen_spanish: en la tierra de los hijos de Israel
  alternatives_spanish:
  - en la tierra de los israelitas
  - en la tierra de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la estructura del hebreo, «hijos de Israel», porque el POB inglés retuvo «sons of Israel» por fidelidad léxica y por su valor literario. «Tierra» mantiene el término amplio de אֶרֶץ sin restringirlo a «territorio».
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - excepto
  lexicon: HALOT
  rationale: «Solo» expresa la limitación/excepción marcada por רַק de modo directo y idiomático en español.
- source_word: בְּעַזָּה בְּגַת וּבְאַשְׁדּוֹד
  english_pob_choice: in Gaza, Gath, and Ashdod
  chosen_spanish: en Gaza, Gat y Asdod
  alternatives_spanish:
  - en Gaza, Gath y Ashdod
  - en Gaza, Gat, y Asdod
  lexicon: HALOT
  rationale: 'Los nombres propios se adaptan a la forma corriente en español bíblico: «Gat» y «Asdod». Se mantiene la serie de lugares como lista coordinada, con la preposición implícita ante cada topónimo por economía idiomática.'
- source_word: נִשְׁאָרוּ
  english_pob_choice: did some remain
  chosen_spanish: quedaron algunos
  alternatives_spanish:
  - permanecieron
  - siguieron quedando
  lexicon: HALOT
  rationale: El plural retoma a los anaceos como sujeto implícito en esos lugares. «Quedaron algunos» conserva la idea de un remanente sin introducir un énfasis excesivo ni repetir innecesariamente el sujeto.
theological_decisions:
- issue: Cómo expresar la exclusión total salvo un remanente local
  english_pob_reading: No Anakim were left ... only in Gaza, Gath, and Ashdod did some remain.
  chosen_spanish_reading: No quedaron anaceos ...; solo en Gaza, Gat y Asdod quedaron algunos.
  alternative_spanish_readings:
  - No quedaron anaceos ...; únicamente en Gaza, Gat y Asdod permanecieron algunos.
  - No fueron dejados anaceos ...; excepto en Gaza, Gat y Asdod, quedaron algunos.
  rationale: La frase bíblica afirma una derrota amplia de los anaceos, con una excepción localizada. El español debe mantener tanto la negación general como el remanente real en las ciudades mencionadas, sin suavizar la tensión entre exclusión y supervivencia parcial.
  doctrine_reference: Joshua 11:21-22; conquest narrative and remnant motif
translation_notes:
  revision_awareness: 'El texto sigue de cerca el consenso del audit trail inglés: verbo resultativo para נותר, etnónimo preservado para עֲנָקִים, construcción literal «hijos de Israel», y lista de ciudades con remanente explícito. No se registraron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se prefirió «tierra» para אֶרֶץ por coherencia con el registro bíblico y con la traducción inglesa auditada.
  - Se usó «anaceos» como forma española estable para עֲנָקִים, evitando transliteración innecesaria.
  - La nota a aclara la literalidad de «hijos de Israel»; la nota b preserva la lectura alternativa sobre la clausula final.
  - 'Los topónimos se normalizan en ortografía española bíblica: Gat, Asdod.'
