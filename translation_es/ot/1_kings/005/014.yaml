base_translation:
  language: en
  yaml_path: translation/ot/1_kings/005/014.yaml
  text: And people from all the peoples came to hear the wisdom of Solomon[b][a], from all the kings of the earth who had heard of his wisdom.
  footnotes:
  - marker: a
    text: Or 'from all the nations.' The Hebrew עַמִּים is plural and can denote peoples or nations.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''from all the kings of the earth''; this likely means that such visitors came from, or were sent by, kings throughout the world who had heard of Solomon''s wisdom.'
    reason: cultural_note
