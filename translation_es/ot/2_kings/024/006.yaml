translation:
  language: es
  text: Y Joacim durmió con sus padres[a], y Joaquín, su hijo, llegó a ser rey en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más interpretativamente, «murió». El hebreo dice literalmente «durmió con sus padres», una fórmula fija para la muerte de un rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: El hebreo usa la fórmula real fija וַיִּשְׁכַּב עִם אֲבֹתָיו. En español, «durmió con sus padres» conserva la imagen idiomática sin forzar una paráfrasis interpretativa como «murió».
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: «Padres» reproduce mejor el valor idiomático de אבותיו en esta fórmula regia y mantiene la cercanía con el texto fuente. «Antepasados» aclara el sentido pero se aleja del giro tradicional del hebreo.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: became king
  chosen_spanish: reinó
  alternatives_spanish:
  - llegó a ser rey
  - asumió el trono
  lexicon: HALOT
  rationale: Aunque el inglés POB distingue el momento de accession with «became king», en español «reinó» funciona de modo natural como fórmula de entronización en un enunciado breve de sucesión. «Asumió el trono» explicita la sucesión, pero añade una formulación más libre.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su hijo varón
  lexicon: HALOT
  rationale: Es un simple dato de filiación; «su hijo» es la traducción directa y suficiente.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - después de él
  - en vez de él
  lexicon: HALOT
  rationale: «En su lugar» expresa con claridad la idea de sucesión y reemplazo sin introducir matices temporales extraños. «Después de él» es posible, pero puede sonar menos específico respecto del relevo regio.
- source_word: יְהוֹיָקִים / יְהוֹיָכִין
  english_pob_choice: Jehoiakim / Jehoiachin
  chosen_spanish: Joacim / Joaquín
  alternatives_spanish:
  - Jehoiaquim / Jehoiaquín
  lexicon: Nombres propios bíblicos estándar en español
  rationale: Se emplean las formas españolas usuales y reconocibles en lectura bíblica, preservando la identificación de los reyes sin transliteración excesivamente técnica.
theological_decisions:
- issue: Conservar la fórmula de muerte real sin resolverla interpretativamente
  english_pob_reading: Retain 'slept with his fathers' in the main text; footnote notes that it can be read more interpretively as 'died.'
  chosen_spanish_reading: Mantener «durmió con sus padres» en el texto principal y explicar en nota que es una fórmula hebrea de muerte regia.
  alternative_spanish_readings:
  - «murió»
  - «murió y fue sepultado con sus padres»
  rationale: El hebreo no afirma explícitamente el entierro en este versículo; por eso conviene conservar la fórmula idiomática y no añadir información no presente en la línea fuente. La nota permite al lector español entender el valor convencional de la expresión.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve source tension rather than smoothing it over.'
translation_notes:
  revision_awareness: Este borrador sigue de cerca el texto hebreo y la decisión inglesa de mantener la fórmula real de muerte. Se adapta a un español bíblico natural, usando nombres propios usuales en español y conservando la nota sobre el sentido idiomático de «durmió con sus padres».
  spanish_consistency_notes:
  - Se mantiene la distinción entre la fórmula de muerte regia y una paráfrasis interpretativa.
  - «En su lugar» conserva la relación de sucesión expresada por תַּחְתָּיו.
  - Los nombres propios se normalizan a formas bíblicas de uso común en español para máxima legibilidad.
