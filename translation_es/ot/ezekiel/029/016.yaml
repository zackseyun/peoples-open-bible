translation:
  language: es
  text: Y ya no será para la casa de Israel una fuente de confianza[a], que recuerde la iniquidad[b] cuando se vuelvan tras ellos; y sabrán que yo soy el Señor Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confianza», «seguridad» o «apoyo». El término hebreo se refiere a algo en lo que se confía para estar a salvo.
    reason: lexical_alternative
  - marker: b
    text: O «que les recuerde la culpa» o «que haga recordar la culpa».
    reason: lexical_alternative
  - marker: c
    text: Aquí se refleja אֲדֹנָי יְהוִה, literalmente «Señor Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יִהְיֶה עוֹד
  english_pob_choice: it will no longer be
  chosen_spanish: ya no será más
  alternatives_spanish:
  - no será más
  - ya no existirá
  lexicon: HALOT
  rationale: La combinación de negación con el imperfecto de היה y עוֹד expresa cese futuro. «Ya no será más» conserva ese valor de discontinuidad futura con español natural.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: for the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - a la casa de Israel
  - para Israel
  lexicon: HALOT
  rationale: Se preserva la expresión pactual «casa de Israel» sin reducirla a «Israel». «Para» funciona bien en esta predicación de destino/relación.
- source_word: לְמִבְטָח
  english_pob_choice: a source of confidence
  chosen_spanish: una fuente de confianza
  alternatives_spanish:
  - confianza
  - seguridad
  - amparo
  lexicon: HALOT
  rationale: מִבְטָח designa algo en lo que se confía como base de seguridad. «Fuente de confianza» conserva la idea de objeto o apoyo en que se deposita confianza, con español claro.
- source_word: מַזְכִּיר עָוֺן
  english_pob_choice: bringing iniquity to remembrance
  chosen_spanish: que haga venir a memoria la iniquidad
  alternatives_spanish:
  - recordando la iniquidad
  - que trae el pecado a la memoria
  - haciendo recordar la culpa
  lexicon: HALOT
  rationale: 'El hifil de זכר tiene sentido causativo: hacer recordar. «Haga venir a memoria» conserva esa fuerza sin sonar rígido. «Iniquidad» mantiene el peso moral de עָוֺן.'
- source_word: עָוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecado
  lexicon: HALOT
  rationale: Aquí el término apunta al mal culpable, no solo al sentimiento subjetivo de culpa. «Iniquidad» preserva el peso ético y judicial del vocablo.
- source_word: בִּפְנוֹתָם אַחֲרֵיהֶם
  english_pob_choice: when they turn after them
  chosen_spanish: cuando se vuelvan tras ellos
  alternatives_spanish:
  - cuando se inclinen tras ellos
  - cuando los sigan
  - al volverse tras ellos
  lexicon: HALOT
  rationale: La construcción con ב marca circunstancia temporal; la frase idiomática «volverse tras» reproduce el hebreo de seguir/buscar apoyo en ellos sin suavizar la imagen.
- source_word: וְיָדְעוּ
  english_pob_choice: then they will know
  chosen_spanish: y sabrán
  alternatives_spanish:
  - entonces sabrán
  - y conocerán
  lexicon: HALOT
  rationale: El simple «y» puede expresar consecuencia; aquí se mantiene una forma sobria y directa. «Sabrán» comunica el reconocimiento resultante.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor YHWH
  - el Señor Dios
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto de renderizar יְהוָה como «Yahvé». En el título compuesto, «Señor Yahvé» preserva ambos elementos de אֲדֹנָי יְהוִה sin ocultar el nombre divino.
theological_decisions:
- issue: Renderización del Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor YHWH
  rationale: El hebreo incluye explícitamente el Tetragrámaton. Conforme al estándar del proyecto, se usa «Yahvé» para preservar el nombre de pacto, mientras «Señor» traduce אֲדֹנָי.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de מִבְטָח como objeto de dependencia política
  english_pob_reading: a source of confidence
  chosen_spanish_reading: una fuente de confianza
  alternative_spanish_readings:
  - una confianza
  - una seguridad
  - un apoyo
  rationale: El contexto condena la dependencia de Israel en Egipto. «Fuente de confianza» mantiene explícita la idea de algo en que se apoya la seguridad humana, sin convertirlo en paráfrasis libre.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — optimal equivalence, preserve source plain sense'
translation_notes:
  revision_awareness: La traducción sigue el pasaje hebreo directamente y concuerda en lo esencial con el audit trail inglés. Se ajustó la fórmula divina a la terminología española del proyecto («Yahvé») y se mantuvo la tensión lexical de מִבְטָח y מַזְכִּיר עָוֺן sin suavizarla.
  spanish_consistency_notes:
  - Se conservó «casa de Israel» como expresión pactual fija.
  - Se evitó «SEÑOR» como máscara del nombre divino; se usa «Yahvé» conforme al estándar del proyecto.
  - «Iniquidad» se mantiene para עָוֺן por su peso moral/judicial, no como simple sentimiento de culpa.
  - La sintaxis busca naturalidad española sin perder la relación causal y temporal del hebreo.
