lexical_decisions:
- source_word: הַחֲמִישִׁי
  english_pob_choice: The fifth
  chosen_spanish: El quinto
  alternatives_spanish:
  - El quinto lote
  - La quinta división
  lexicon: HALOT
  rationale: El hebreo usa un ordinal con artículo en una lista elíptica; en español, «El quinto» conserva esa elipsis sin añadir «lote» o «división» al texto principal.
- source_word: נְתַנְיָהוּ
  english_pob_choice: Nethaniah
  chosen_spanish: Natanías
  alternatives_spanish:
  - Netanías
  - Nataniahu
  lexicon: transliteración del nombre propio
  rationale: Se translitera el nombre propio en forma natural para el español bíblico, manteniendo el valor nominal sin convertirlo en un título ni explicar etimología no requerida por el versículo.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos e hijas
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por «sons» para reflejar el masculino plural, en español «hijos» funciona de modo natural y puede abarcar el plural masculino del hebreo en este contexto de enumeración familiar, sin introducir una especificación innecesaria.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de sangre
  lexicon: HALOT
  rationale: «Hermanos» es la correspondencia directa del hebreo אח aquí y encaja con la fórmula de lista del capítulo; no se amplía a «parientes» porque el texto no lo exige.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce
  - sumaban doce
  lexicon: HALOT
  rationale: El numeral final indica el total del grupo; en español basta «doce» como cierre de la enumeración, sin añadir un verbo explícito que no está en el hebreo.
theological_decisions:
- issue: Elipsis de la fórmula de sorteo/turno en una lista de asignaciones
  english_pob_reading: The fifth; ... Or, in context, 'The fifth lot was for Nethaniah; his sons and his brothers were twelve.' The Hebrew omits words such as 'lot' or 'was for,' which are inferred from the surrounding list.
  chosen_spanish_reading: El quinto fue Natanías; sus hijos y sus hermanos fueron doce.
  alternative_spanish_readings:
  - El quinto lote fue para Natanías; sus hijos y sus hermanos fueron doce.
  - La quinta división fue para Natanías; sus hijos y sus hermanos fueron doce.
  rationale: El contexto del capítulo permite entender una asignación por sorteo, pero el hebreo de este versículo no lo expresa de manera explícita. La redacción principal conserva la elipsis; la nota ofrece la lectura contextual sin imponerla en el cuerpo del texto.
  doctrine_reference: Contexto literario de listas de turnos/asignaciones en 1 Crónicas 25
translation_notes:
  revision_awareness: El texto sigue de cerca el patrón revisado del inglés POB, que aclaró la sintaxis con punto y coma y mantuvo la inferencia contextual de la lista; en español se conserva la misma tensión entre la formulación breve del hebreo y la lectura contextual del roster.
  spanish_consistency_notes:
  - Se mantiene una transliteración uniforme del nombre propio como «Natanías».
  - «Hijos» y «hermanos» reproducen la relación familiar del hebreo sin ampliar el sentido.
  - La nota al pie preserva la alternativa contextual de «lote» sin moverla al texto principal.
