  text: וַ/יֹּ֣אמֶר יְהוָ֔ה אַתָּ֥ה חַ֨סְתָּ֙ עַל הַ/קִּ֣יקָי֔וֹן אֲשֶׁ֛ר לֹא עָמַ֥לְתָּ בּ֖/וֹ וְ/לֹ֣א גִדַּלְתּ֑/וֹ שֶׁ/בִּן לַ֥יְלָה הָיָ֖ה וּ/בִן לַ֥יְלָה אָבָֽד־־־־׃
