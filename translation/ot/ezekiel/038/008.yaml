id: EZK.38.8
reference: Ezekiel 38:8
source:
  edition: WLC
  text: מִ/יָּמִ֣ים רַבִּים֮ תִּפָּקֵד֒ בְּ/אַחֲרִ֨ית הַ/שָּׁנִ֜ים תָּב֣וֹא אֶל אֶ֣רֶץ מְשׁוֹבֶ֣בֶת מֵ/חֶ֗רֶב מְקֻבֶּ֨צֶת֙ מֵ/עַמִּ֣ים רַבִּ֔ים עַ֚ל הָרֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁר הָי֥וּ לְ/חָרְבָּ֖ה תָּמִ֑יד וְ/הִיא֙ מֵ/עַמִּ֣ים הוּצָ֔אָה וְ/יָשְׁב֥וּ לָ/בֶ֖טַח כֻּלָּֽ/ם׀־׀־׃
translation:
  text: After many days you will be mustered[a]; in the latter years you will come into a land restored from the sword, gathered from many peoples, onto the mountains of Israel, which had been a continual waste; but it was brought out from the peoples[b], and all of them will dwell securely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will be visited' or 'you will be summoned.' The Hebrew likely carries the sense of being called up or mustered for action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the latter years'; some translations render 'in the latter days.'
    reason: alternative_reading
lexical_decisions:
- source_word: תִּפָּקֵד
  chosen: you will be mustered
  alternatives:
  - you will be visited
  - you will be summoned
  lexicon: HALOT
  rationale: Niphal of פקד here in a military/invasion context most naturally means being called up, appointed, or mustered for action rather than merely 'visited.' This fits the following movement into the land.
- source_word: בְּאַחֲרִית הַשָּׁנִים
  chosen: in the latter years
  alternatives:
  - in the latter days
  - at the end of the years
  lexicon: HALOT
  rationale: The Hebrew says 'end/latter part of the years,' not the more common 'latter days.' 'Latter years' preserves the wording while remaining natural English.
- source_word: אֶרֶץ מְשׁוֹבֶבֶת מֵחֶרֶב
  chosen: a land restored from the sword
  alternatives:
  - a land brought back from the sword
  - a land turned back from the sword
  lexicon: HALOT
  rationale: מְשׁוֹבֶבֶת from שוב conveys restoration/bringing back. With מֵחֶרֶב, the sense is a land recovered from war's devastation, not literally turned away from a sword.
- source_word: מְקֻבֶּצֶת מֵעַמִּים רַבִּים
  chosen: gathered from many peoples
  alternatives:
  - collected from many nations
  lexicon: HALOT
  rationale: The passive participle indicates the land's people have been regathered from among many peoples. 'Peoples' reflects עמים more directly than 'nations' here.
- source_word: עַל הָרֵי יִשְׂרָאֵל
  chosen: onto the mountains of Israel
  alternatives:
  - against the mountains of Israel
  - upon the mountains of Israel
  lexicon: HALOT
  rationale: With the motion verb תבוא, עַל can indicate movement onto/upon a place. 'Onto' best reflects arrival into the region of Israel's mountains.
- source_word: אֲשֶׁר הָיוּ לְחָרְבָּה תָּמִיד
  chosen: which had been a continual waste
  alternatives:
  - which had always been a ruin
  - which had become a perpetual desolation
  lexicon: HALOT
  rationale: The clause describes the prior condition of the mountains/land as long desolated. 'Continual waste' is idiomatic and preserves the durative force of תָּמִיד.
- source_word: וְהִיא מֵעַמִּים הוּצָאָה
  chosen: But it was brought out from the peoples
  alternatives:
  - and it was brought out from the peoples
  - and she was brought out from the peoples
  lexicon: HALOT
  rationale: The feminine pronoun refers to the land. English normally uses 'it' for land here. The conjunction can be rendered simply 'and,' but 'but' helps mark the contrast between former desolation and present restoration without overparaphrasing.
- source_word: וְיָשְׁבוּ לָבֶטַח כֻּלָּם
  chosen: and all of them will dwell securely
  alternatives:
  - and they will all live in safety
  - and all of them will dwell in security
  lexicon: HALOT
  rationale: ישב + לבטח is a common expression for secure dwelling. 'All of them' preserves the explicit כֻּלָּם.
