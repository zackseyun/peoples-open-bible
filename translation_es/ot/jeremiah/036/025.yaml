translation:
  language: es
  text: Sin embargo, aun Elnatán, Dalaía y Guemarías[a] rogaron al rey que no quemara el rollo, pero él no los escuchó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «suplicaron al rey que no quemara el rollo».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Yet even
  chosen_spanish: Pero aun
  alternatives_spanish:
  - Y también
  - Además, aun
  lexicon: HALOT
  rationale: La combinación añade información con matiz adversativo en contexto; 'Pero aun' conserva la idea de continuidad inesperada frente a la oposición previa y suena natural en español.
- source_word: הִפְגִּעוּ
  english_pob_choice: urged
  chosen_spanish: rogaron
  alternatives_spanish:
  - suplicaron
  - insistieron ante
  - intercedieron ante
  lexicon: HALOT
  rationale: El hifil de פגע aquí expresa una petición intensa dirigida al rey. 'Rogar' comunica bien el ruego insistente sin endurecer la sintaxis española.
- source_word: בַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - con el rey
  - ante el rey
  lexicon: HALOT
  rationale: En español, el régimen natural de 'rogar' con destinatario personal es 'al rey'; preserva el valor direccional de la construcción hebrea sin calco.
- source_word: לְבִלְתִּי שְׂרֹף
  english_pob_choice: not to burn
  chosen_spanish: que no quemara
  alternatives_spanish:
  - para no quemar
  - que no se quemara
  lexicon: HALOT
  rationale: La finalidad/prevención se expresa con una subordinada volitiva en español. 'Que no quemara' reproduce mejor la súplica dirigida al rey que un infinitivo pesado.
- source_word: הַמְּגִלָּה
  english_pob_choice: the scroll
  chosen_spanish: el rollo
  alternatives_spanish:
  - el pergamino
  - el documento
  lexicon: HALOT
  rationale: '''מְגִלָּה'' nombra un rollo escrito; ''rollo'' es preciso y natural en español bíblico, y evita modernizar indebidamente a ''documento''.'
- source_word: וְלֹא שָׁמַע אֲלֵיהֶם
  english_pob_choice: but he did not listen to them
  chosen_spanish: y él no les hizo caso
  alternatives_spanish:
  - pero no los escuchó
  - y no los oyó
  lexicon: HALOT
  rationale: El sentido es negativa negativa de atender la súplica. 'No les hizo caso' expresa bien la negativa a atender; se mantiene 'y' porque el contraste ya está claro por el contexto y no requiere forzar un 'pero'.
translation_notes:
  revision_awareness: 'Se siguió el hebreo masorético con el mismo sentido que el audit trail inglés: una súplica insistente de tres oficiales para impedir que el rey queme el rollo, seguida de la negativa del rey a atenderlos. No hay variación textual relevante en este versículo en el paquete suministrado.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' en otros contextos del proyecto, pero aquí no aparece el nombre divino.
  - Se prefirió 'rollo' para mantener la terminología bíblica concreta de מְגִלָּה.
  - '''Rogaron'' conserva la intensidad de la petición sin elevarla a un registro excesivamente eclesiástico.'
