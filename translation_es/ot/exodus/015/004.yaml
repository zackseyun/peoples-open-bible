translation:
  language: es
  text: Los carros de Faraón y su ejército los arrojó al mar[a], y lo mejor de sus oficiales fue hundido en el mar de juncos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente se traduce «Mar Rojo». El hebreo dice «mar de juncos».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְכְּבֹת
  english_pob_choice: chariots
  chosen_spanish: carros de guerra
  alternatives_spanish:
  - carros
  - carrozas de guerra
  lexicon: HALOT
  rationale: El sustantivo designa vehículos militares concretos. En español, «carros de guerra» conserva la referencia bélica y resulta natural y claro; «carros» sería más breve pero menos explícito.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: Uso bíblico estándar
  rationale: «Faraón» es la transliteración estable del título/nombre en español bíblico y mantiene la referencia histórica sin necesidad de artículo en este contexto poético.
- source_word: וְחֵילוֹ
  english_pob_choice: and his army
  chosen_spanish: y su ejército
  alternatives_spanish:
  - y su fuerza
  - y su hueste
  lexicon: HALOT
  rationale: חֵיל aquí se refiere a fuerza militar. «Ejército» comunica bien el sentido marcial en español actual sin perder el valor colectivo.
- source_word: יָרָה
  english_pob_choice: he cast
  chosen_spanish: los arrojó
  alternatives_spanish:
  - los lanzó
  - los tiró
  lexicon: HALOT
  rationale: El verbo puede significar arrojar/lanzar. En este contexto poético de juicio, «los arrojó» reproduce la fuerza del acto divino con un registro digno y natural.
- source_word: בַיָּם
  english_pob_choice: into the sea
  chosen_spanish: al mar
  alternatives_spanish:
  - en el mar
  lexicon: HALOT
  rationale: Con «arrojar», el español idiomático pide «al mar» para expresar movimiento hacia dentro del agua. «En el mar» sonaría menos directo.
- source_word: וּמִבְחַר
  english_pob_choice: the choicest
  chosen_spanish: la élite
  alternatives_spanish:
  - los escogidos
  - lo mejor
  lexicon: HALOT
  rationale: El término expresa lo seleccionado y de mayor calidad. «La élite» refleja bien el sentido de los hombres de mayor rango o selección especial en el ejército.
- source_word: שָׁלִשָׁיו
  english_pob_choice: his officers
  chosen_spanish: de sus oficiales
  alternatives_spanish:
  - de sus capitanes
  - de sus comandantes
  lexicon: HALOT
  rationale: שָׁלִישׁ designa oficiales militares de rango selecto. «Oficiales» es suficientemente preciso y evita especificar más de lo que el contexto exige.
- source_word: טֻבְּעוּ
  english_pob_choice: were sunk
  chosen_spanish: fue hundida
  alternatives_spanish:
  - fueron hundidos
  - se hundieron
  lexicon: HALOT
  rationale: El pasivo pide una expresión pasiva en español. Aunque el referente es colectivo, el sintagma «la élite» funciona como colectivo singular; por eso se eligió «fue hundida» para mantener concordancia y el matiz pasivo.
- source_word: בְיַם סוּף
  english_pob_choice: in the Sea of Reeds
  chosen_spanish: en el mar de Juncos
  alternatives_spanish:
  - en el Mar Rojo
  lexicon: HALOT
  rationale: Se preserva el sentido literal de יַם סוּף como «mar de juncos» para seguir la primacía del hebreo. «Mar Rojo» queda como alternativa tradicional, pero no se adopta en el texto principal.
theological_decisions:
- issue: 'יַם סוּף: traducción tradicional frente a sentido literal'
  english_pob_reading: Sea of Reeds
  chosen_spanish_reading: mar de Juncos
  alternative_spanish_readings:
  - Mar Rojo
  rationale: La POB en inglés eligió el sentido literal para privilegiar la evidencia del hebreo. En español, «mar de Juncos» mantiene esa primacía y preserva la tensión con la tradición, que puede reconocerse en nota.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: El borrador sigue el pasaje sin cambios respecto del último repaso disponible; no se reportaron revisiones aplicadas y el cotejo final indicó alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Faraón» como transliteración estable y «Yahvé» no aparece en este versículo.
  - 'Se conserva el paralelismo poético con dos miembros: el arrojamiento al mar y el hundimiento de la élite.'
  - Se evita «SEÑOR» o «Mar Rojo» en el texto principal para respetar la primacía del hebreo y la decisión auditada de la POB.
