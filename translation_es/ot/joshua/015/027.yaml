  source_alignment_summary: 'El hebreo de JOS 15:27 es una simple lista de tres topónimos coordinados: חֲצַר גַּדָּה, חֶשְׁמוֹן, וּבֵית פָּלֶט. El borrador español preserva bien la estructura de lista y el valor onomástico de los nombres, pero dos notas y una forma gráfica no reflejan fielmente el rastro auditado en inglés.'
  spanish_quality_summary: El español es legible, pero conviene normalizar la capitalización y las notas. 'Hazar-Gadda' usa una mayúscula interna menos natural frente al patrón auditado compuesto; además, la nota b del borrador no corresponde al sentido de la nota inglesa, que ofrece alternativas concretas para בֵּית פָּלֶט, no para חֶשְׁמוֹן.
  glossary_alignment: 'No hay términos teológicos en juego. La transliteración de topónimos es correcta en principio. Conviene alinear mejor con la lógica del POB: conservar el topónimo compuesto con guion y reflejar en notas las alternativas documentadas (''Hazargadda'' / ''Bet Pelet'' / ''Casa de Pelet'').'
