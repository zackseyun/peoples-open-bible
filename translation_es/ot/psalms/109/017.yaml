    issue: «estuvo lejos de él» añade un matiz temporal que el texto auditado evitó
    rationale: La revisión inglesa cambió de «stayed far from him» a «was far from him» para no añadir duración. En español, «estuvo lejos» también puede sonar a estado delimitado; «estaba lejos de él» o «estuvo apartada de él» serían opciones, pero «estaba lejos de él» es la más simple y fiel.
