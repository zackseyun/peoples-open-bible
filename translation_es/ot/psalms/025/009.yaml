translation:
  language: es
  text: Él guía a los humildes[a] en justicia[b], y enseña a los humildes su camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los mansos»; el hebreo también puede referirse a los humildes, a los mansos o a los afligidos, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «en juicio» o «en lo recto».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַדְרֵךְ
  english_pob_choice: guides
  chosen_spanish: guía
  alternatives_spanish:
  - conduce
  - dirige
  lexicon: HALOT
  rationale: 'El hifil expresa acción causativa: hacer andar/encaminar. «Guía» reproduce bien ese sentido en español, con naturalidad y sin perder la idea de dirección providencial.'
- source_word: עֲנָוִים
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los mansos
  - los meek
  - los afligidos
  - los humildes de espíritu
  lexicon: HALOT
  rationale: En este contexto sapiencial, el término apunta a personas humildes y enseñables delante de Dios. «Los humildes» conserva el valor moral y espiritual sin restringir innecesariamente el alcance.
- source_word: בַּמִּשְׁפָּט
  english_pob_choice: in justice
  chosen_spanish: en justicia
  alternatives_spanish:
  - en juicio
  - en lo recto
  - según justicia
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar juicio, justicia o decisión legal. Dado el audit trail inglés, «en justicia» mantiene la fuerza ética y judicial del término y evita que «juicio» suene punitivo en español.
- source_word: וִילַמֵּד
  english_pob_choice: he teaches
  chosen_spanish: enseña
  alternatives_spanish:
  - instruye
  - y enseña
  lexicon: HALOT
  rationale: El piel de למד significa enseñar o instruir. En español, «enseña» es claro y fiel, y el valor conjuntivo ya queda asumido por la coordinación natural de la frase.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - sus caminos
  lexicon: HALOT
  rationale: El singular con sufijo de tercera persona favorece un singular idiomático. «Su camino» comunica bien el modo de obrar y la trayectoria moral/divina sin pluralizar indebidamente.
theological_decisions:
- issue: Sentido de עֲנָוִים como humildes, mansos o afligidos
  english_pob_reading: Rendered as 'the humble' to emphasize the spiritually lowly/teachable rather than merely socially oppressed.
  chosen_spanish_reading: «los humildes» para destacar la disposición espiritual de docilidad ante Dios.
  alternative_spanish_readings:
  - los mansos
  - los afligidos
  rationale: El versículo contrapone la guía y la enseñanza divinas con la postura de quienes se dejan formar por Dios. «Los humildes» preserva esa dimensión teológica y no limita el término a una condición social.
  doctrine_reference: Sabiduría bíblica; humildad delante de Dios
- issue: Valor semántico de מִשְׁפָּט
  english_pob_reading: in justice / in judgment / in what is right
  chosen_spanish_reading: «en justicia» como esfera o norma de la guía divina.
  alternative_spanish_readings:
  - en juicio
  - en lo recto
  rationale: La opción evita una lectura meramente forense de «juicio» y conserva el matiz de rectitud y decisión justa que el término puede abarcar en hebreo.
  doctrine_reference: Justicia de Dios; rectitud del obrar divino
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: conserva la repetición de עֲנָוִים, respeta el valor causativo del hifil en יַדְרֵךְ, mantiene מִשְׁפָּט como esfera normativa de la guía divina y reproduce דַּרְכּוֹ en singular. No se detectaron cambios de revisión en el material de referencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como terminología estándar del proyecto solo cuando el hebreo lo exige explícitamente; aquí no aparece el tetragrámaton, por lo que no se introduce.
  - Se evita «Mesías»/«Cristo» porque el versículo no contiene lenguaje mesiánico.
  - «Guía» y «enseña» mantienen un registro bíblico claro y moderno sin volver literalista la sintaxis hebrea.
  - Las notas al pie preservan las alternativas léxicas relevantes del audit trail inglés y añaden solo equivalencias necesarias para el español.
