translation:
  language: es
  text: Entonces los coatitas[a] partieron, llevando las cosas del santuario, y levantaron el tabernáculo antes de que llegaran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «llevando el santuario» o «portadores del santuario»; aquí la expresión se refiere a los muebles u objetos sagrados transportados por los coatitas, distinguidos de la estructura del tabernáculo mencionada después.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסְעוּ
  english_pob_choice: Then ... set out
  chosen_spanish: Entonces ... partieron
  alternatives_spanish:
  - Y ... partieron
  - Entonces ... salieron
  lexicon: HALOT
  rationale: El waw narrativo aquí continúa la secuencia del viaje; «entonces» conserva la relación temporal y «partieron» comunica de forma natural la acción de desplazarse en contexto campamental.
- source_word: הַקְּהָתִים
  english_pob_choice: the Kohathites
  chosen_spanish: los quenitas de Coat
  alternatives_spanish:
  - los coatitas
  - los hijos de Coat
  lexicon: HALOT
  rationale: Se mantiene el referente tribal/clánico con una forma española reconocible. «De Coat» preserva la relación genealógica del hebreo, y «quenitas» aquí se usa como gentilicio derivado en la tradición española del nombre propio, sin perder la identificación con el grupo de Coat.
- source_word: נֹשְׂאֵי הַמִּקְדָּשׁ
  english_pob_choice: carrying the sanctuary things
  chosen_spanish: llevando las cosas del santuario
  alternatives_spanish:
  - portando los objetos del santuario
  - llevando las cosas sagradas
  lexicon: HALOT
  rationale: El participio plural expresa a los portadores; en español, «llevando» reproduce bien la función verbal. «Las cosas del santuario» conserva la correspondencia más cercana con el hebreo y evita una paráfrasis excesiva.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la tienda de reunión
  - la morada
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente establecido en este contexto del santuario del desierto y corresponde al término técnico del hebreo.
- source_word: עַד בֹּאָם
  english_pob_choice: before they arrived
  chosen_spanish: antes de que ellos llegaran
  alternatives_spanish:
  - hasta su llegada
  - para cuando llegaron
  lexicon: HALOT
  rationale: 'La cláusula marca anterioridad temporal: el tabernáculo ya estaba levantado cuando ellos llegaron. «Antes de que ellos llegaran» expresa esa relación con claridad en español.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste de la revisión inglesa: mantiene la fuerza verbal activa de וְהֵקִימוּ («levantaron») y conserva la distinción entre los objetos sagrados transportados por los coatitas y la estructura del tabernáculo, que ya estaba erigida cuando ellos llegaron.'
  spanish_consistency_notes:
  - Se prefirió «tabernáculo» para מִשְׁכָּן por consistencia técnica en el contexto del desierto.
  - Se mantuvo una distinción léxica entre «las cosas del santuario» y «el tabernáculo» para reflejar la tensión documentada en el audit trail inglés.
  - La nota al pie está anclada al grupo étnico para evitar sobrecargar el sintagma de referencia y preservar la alternativa lexical documentada.
