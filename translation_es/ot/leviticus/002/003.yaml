translation:
  language: es
  text: 'Y lo que quede de la ofrenda de cereal[a] será para Aarón y para sus hijos: una porción santísima, de las ofrendas de alimento[b] de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «de la ofrenda de grano»; también puede entenderse como «de la oblación».
    reason: lexical_alternative
  - marker: b
    text: O, «de las ofrendas por fuego de Yahvé» o «de las ofrendas hechas por fuego de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתֶרֶת
  english_pob_choice: what is left
  chosen_spanish: lo que quede
  alternatives_spanish:
  - lo que reste
  - el remanente
  - lo que permanece
  lexicon: HALOT
  rationale: El participio sustantivado expresa la porción sobrante de la ofrenda. «Lo que quede» es natural en español y conserva la idea de resto sin volverlo demasiado técnico.
- source_word: מִן הַמִּנְחָה
  english_pob_choice: of the grain offering
  chosen_spanish: de la ofrenda de cereal
  alternatives_spanish:
  - de la ofrenda de grano
  - de la oblación
  lexicon: HALOT
  rationale: מִנְחָה en Levítico 2 designa la ofrenda cereal o de grano. «Cereal» es una opción clara y ampliamente comprensible en español bíblico moderno; «oblation» sería más tradicional pero menos transparente.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  english_pob_choice: for Aaron and for his sons
  chosen_spanish: será para Aarón y para sus hijos
  alternatives_spanish:
  - pertenecerá a Aarón y a sus hijos
  - quedará para Aarón y para sus hijos
  lexicon: HALOT
  rationale: El ל indica asignación o pertenencia. «Será para» comunica la asignación sacerdotal con claridad y mantiene el sentido de derecho alimentario/ritual.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: a most holy portion
  chosen_spanish: una porción santísima
  alternatives_spanish:
  - santísimo
  - santo de santos
  - una porción muy santa
  lexicon: HALOT
  rationale: La construcción superlativa señala el máximo grado de santidad cultual. Añadir «porción» en español hace explícito el referente implícito del hebreo y evita que la frase suene como un lugar.
- source_word: מֵאִשֵּׁי יְהוָה
  english_pob_choice: from the food offerings of Yahweh
  chosen_spanish: de las ofrendas encendidas de Yahvé
  alternatives_spanish:
  - de las ofrendas por fuego de Yahvé
  - de las ofrendas hechas por fuego a Yahvé
  - de las ofrendas de alimento de Yahvé
  lexicon: HALOT
  rationale: אִשֵּׁה es un término técnico sacrificial relacionado con ofrendas hechas por fuego. «Ofrendas encendidas» preserva el vínculo con el fuego sin reducirlo a un mero género alimentario; la nota conserva la alternativa lexical de POB. Se usa «Yahvé» conforme al principio del proyecto para el Tetragrama.
theological_decisions:
- issue: Jerarquía de santidad en קֹדֶשׁ קָדָשִׁים
  english_pob_reading: a most holy portion
  chosen_spanish_reading: una porción santísima
  alternative_spanish_readings:
  - santísimo
  - una porción muy santa
  - santo de santos
  rationale: La frase clasifica la porción sobrante dentro del nivel más alto de santidad del sistema sacrificial. «Porción santísima» transmite esa categoría sin importar la asociación posterior de «santo de santos» como lugar del santuario.
  doctrine_reference: Levítico 2:3; clasificación cultual de santidad en el sistema sacrificial.
- issue: Renderización de אִשֵּׁי יְהוָה
  english_pob_reading: the food offerings of Yahweh
  chosen_spanish_reading: las ofrendas encendidas de Yahvé
  alternative_spanish_readings:
  - las ofrendas por fuego de Yahvé
  - las ofrendas hechas por fuego a Yahvé
  - las ofrendas de alimento de Yahvé
  rationale: El hebreo permite una referencia técnica a ofrendas presentadas por fuego. «Encendidas» conserva el componente de fuego y evita imponer una lectura exclusivamente alimentaria donde el hebreo tiene una fuerza cultual más amplia. La nota preserva la alternativa documentada por la POB inglesa.
  doctrine_reference: Levítico 2:3; términos técnicos sacrificiales.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura cultual del hebreo con equivalencia óptima: la sustantivación de «lo que quede», la asignación sacerdotal con ל, la categoría superlativa de santidad, y la expresión técnica de las ofrendas de Yahvé. No se adoptó una traducción mecánica del inglés cuando el español requería explicitar «porción» o elegir entre el valor técnico de אִשֵּׁי y su equivalente más natural.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - «Ofrenda de cereal» se usa para מִנְחָה en el contexto levítico de ofrenda vegetal/cereal.
  - Se prefirió «porción santísima» en lugar de «santo de santos» para evitar confusión con un espacio sagrado.
  - La nota de pie conserva la alternativa lexical de las ofrendas por fuego, en paralelo con el audit trail inglés.
