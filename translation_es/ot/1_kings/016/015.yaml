  yaml_path: translation/ot/1_kings/016/015.yaml
  text: In the twenty-seventh year of Asa king of Judah[a], Zimri reigned seven days in Tirzah, while the people were camped against Gibbethon, which belonged to the Philistines.
  footnotes:
