    reason: lexical_alternative
  - marker: b
    text: O «lo aprovechan» / «les beneficia». El verbo hebreo puede significar ser útil o provechoso, o ayudar a impulsar algo; aquí probablemente expresa que su acción favorece la ruina de Job.
    reason: lexical_alternative
  - marker: c
    text: O «no hay ayudador para ellos». La cláusula final es breve y puede significar o bien que actúan sin que nadie los ayude, o bien que no tienen ayudador.
    reason: lexical_alternative
