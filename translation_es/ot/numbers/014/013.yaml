translation:
  language: es
  text: 'Pero Moisés dijo a Yahvé[a]: «Entonces los egipcios oirán, porque por tu poder sacaste a este pueblo de entre ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces los egipcios han oído, porque por tu poder sacaste a este pueblo de entre ellos». La forma verbal hebrea puede entenderse como pasada o como futura/resultativa dentro del ruego de Moisés; el texto principal adopta el sentido prospectivo que encaja con el argumento circundante.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But Moses said
  chosen_spanish: Pero Moisés dijo
  alternatives_spanish:
  - Entonces Moisés dijo
  - Y Moisés dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración, pero aquí el giro discursivo responde a la sentencia anterior de Yahvé; por eso «Pero» comunica mejor el contraste implícito que «Y». «Entonces» también es posible, pero el contraste queda menos marcado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma estándar del proyecto en español, «Yahvé», en vez de una sustitución por título. «Jehová» no se adopta por la norma del proyecto y por su forma tradicional menos transparente.
- source_word: וְשָׁמְעוּ
  english_pob_choice: Then the Egyptians will hear
  chosen_spanish: Entonces los egipcios oirán
  alternatives_spanish:
  - Y los egipcios oirán
  - Los egipcios habrán oído
  lexicon: HALOT
  rationale: El hebreo puede leerse con valor prospectivo dentro del argumento de Moisés; por eso el futuro español encaja con el hilo del ruego. Se evita un pasado simple porque no refleja tan bien la consecuencia que Moisés plantea.
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  - Egipto, es decir, los egipcios
  lexicon: HALOT
  rationale: El sujeto de «oirán» son las personas, no la tierra, de modo que «los egipcios» es la equivalencia más natural y clara. «Egipto» sería posible como colectivo, pero aquí suena menos preciso.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de lo que los egipcios oirán; en español «porque» expresa con naturalidad esa relación causal. «Pues» también sería viable, pero su registro puede sonar más literario o ambiguo.
- source_word: הֶעֱלִיתָ
  english_pob_choice: you brought up
  chosen_spanish: has sacado
  alternatives_spanish:
  - has subido
  - has hecho subir
  - has sacado de allí
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente «hacer subir / traer arriba», en el contexto del éxodo la idea de liberación desde Egipto se expresa de manera más clara con «sacar». Se conserva, sin embargo, el movimiento de salida implicado por el contexto narrativo.
- source_word: בְכֹחֲךָ
  english_pob_choice: by your power
  chosen_spanish: por tu poder
  alternatives_spanish:
  - con tu poder
  - en tu poder
  - mediante tu poder
  lexicon: HALOT
  rationale: La preposición hebrea marca medio o instrumento; «por tu poder» suena natural en español y preserva la idea de que la acción ocurrió por la fuerza divina. «Con tu poder» podría sonar menos idiomático en este contexto.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: El singular colectivo עָם con demostrativo se refleja de modo más fiel y eclesialmente claro con «este pueblo». «Esta gente» rebajaría el tono y «esta nación» introduciría una matización política no exigida por el hebreo.
- source_word: מִקִּרְבּוֹ
  english_pob_choice: from among them
  chosen_spanish: de en medio de ellos
  alternatives_spanish:
  - de entre ellos
  - de su medio
  - de su interior
  lexicon: HALOT
  rationale: El sufijo singular colectivo puede referirse a Egipto como conjunto, pero en español la referencia pluralizada queda más clara en «ellos». «De en medio de ellos» mantiene bien la imagen espacial de extracción desde el centro del grupo.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton; conforme a la política del proyecto, se traslada como «Yahvé» para preservar el nombre personal del pacto. No se emplea «SEÑOR» como sustitución litúrgica ni «Jehová» por no ser la forma adoptada por el proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios respecto al análisis base; esta versión conserva la misma lectura contextual del verbo y la misma decisión sobre el nombre divino, adaptadas al español con léxico natural y fiel al hebreo.
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto: Yahvé para יְהוָה, pueblo para עָם y poder para כֹחַ.'
  - Se prefirió un español claro y bíblico sin calcos innecesarios, evitando «SEÑOR» como máscara del nombre divino.
  - La lectura de «has sacado» refleja la tensión verbal señalada en el audit trail; la nota conserva la alternativa pasada/resultativa.
  - El sujeto se expresa como «los egipcios» para evitar ambigüedad entre tierra y población.
