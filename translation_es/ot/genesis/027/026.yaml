translation:
  language: es
  text: 'Entonces su padre Isaac le dijo: «Acércate[a], por favor, y bésame, hijo mío».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Aproxímate, por favor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Y ... le dijo
  - Luego ... le dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» comunica con naturalidad la secuencia en español sin perder el valor progresivo del verbo.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El dativo de la preposición y sufijo se expresa naturalmente en español con el clítico indirecto «le», evitando una redundancia innecesaria.
- source_word: יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: convención onomástica estándar
  rationale: Nombre propio conservado sin adaptación, conforme al uso español bíblico.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su papá
  lexicon: HALOT
  rationale: Se mantiene el parentesco formal y la apposición relacional del hebreo; «su padre» conserva el tono narrativo y la identificación familiar.
- source_word: גְּשָׁה
  english_pob_choice: Come near
  chosen_spanish: Acércate
  alternatives_spanish:
  - Ven acá
  - Aproxima
  lexicon: HALOT
  rationale: El imperativo de נגשׁ pide cercanía física. «Acércate» es la equivalencia española más natural y fiel al gesto solicitado.
- source_word: נָּא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: La partícula suaviza la orden; «por favor» transmite adecuadamente la cortesía sin introducir temporalidad indebida.
- source_word: וּשְׁקָה
  english_pob_choice: and kiss me
  chosen_spanish: y bésame
  alternatives_spanish:
  - y dame un beso
  - y bésame a mí
  lexicon: HALOT
  rationale: El verbo נשׁק con sufijo de 1cs se expresa de forma directa como «bésame», sin añadir matices idiomáticos ajenos al hebreo.
- source_word: לִּי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: El sufijo pronominal se refleja como objeto directo en español por exigencia verbal; «me» preserva la función sintáctica natural.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: HALOT
  rationale: El vocativo se vierte mejor como «hijo mío», que reproduce con más naturalidad en español la apelación afectuosa del hebreo.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y armoniza con el audit trail inglés sin introducir expansiones interpretativas; se conservó la petición afectuosa y la secuencia narrativa, y se optó por una formulación idiomática en español para el vocativo final.
  spanish_consistency_notes:
  - Se mantiene «Isaac» como nombre propio estándar.
  - Se usa «por favor» para la partícula נָא, coherente con el valor de cortesía señalado en el audit trail.
  - «Acércate» refleja el imperativo de movimiento hacia el hablante sin calco rígido.
  - El vocativo final «hijo mío» se adapta a la naturalidad del español, sin perder el tono familiar.
