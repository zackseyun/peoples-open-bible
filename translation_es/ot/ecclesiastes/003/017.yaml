translation:
  language: es
  text: 'Dije en mi corazón: «Dios juzgará al justo y al malvado[a], porque hay un tiempo para todo asunto y para toda acción allí[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para todo propósito y para toda obra». Los términos hebreos también pueden traducirse de manera más formal como «propósito» y «obra».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo incluye «allí» al final de la cláusula. Puede señalar el lugar o la ocasión del juicio de Dios; algunas traducciones lo suavizan en español.
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַרְתִּי אֲנִי בְּלִבִּי
  english_pob_choice: I said in my heart
  chosen_spanish: Yo dije en mi corazón
  alternatives_spanish:
  - Me dije a mí mismo
  - Pensé para mis adentros
  lexicon: HALOT
  rationale: Mantiene el modismo hebreo de hablar internamente sin volverlo una mera paráfrasis psicológica. «En mi corazón» es natural en español bíblico actual y conserva la imagen original.
- source_word: הַצַּדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el justo como persona
  lexicon: HALOT
  rationale: El sustantivo/adjetivo substantivado contrasta con el malvado y en español «el justo» comunica bien la categoría moral y judicial.
- source_word: הָרָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el injusto
  lexicon: HALOT
  rationale: «Malvado» conserva el contraste ético fuerte del hebreo sin forzar un matiz técnico específico de impiedad religiosa que el contexto inmediato no exige.
- source_word: יִשְׁפֹּט
  english_pob_choice: will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - juzgará Dios
  - hará justicia a
  lexicon: HALOT
  rationale: El imperfecto apunta a acción futura en contexto; «juzgará» expresa con claridad la decisión divina futura.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  lexicon: HALOT
  rationale: Es el uso normal en español y preserva la referencia al único Dios verdadero sin necesidad de artículo.
- source_word: עֵת
  english_pob_choice: a time
  chosen_spanish: un tiempo
  alternatives_spanish:
  - un momento
  - una ocasión
  lexicon: HALOT
  rationale: «Tiempo» mantiene el enlace literario con el tema del capítulo y funciona bien con la idea de una ocasión establecida.
- source_word: לְכָל חֵפֶץ
  english_pob_choice: for every matter
  chosen_spanish: para todo propósito
  alternatives_spanish:
  - para todo asunto
  - para toda cosa
  lexicon: HALOT
  rationale: La POB inglesa recoge la amplitud semántica de חֵפֶץ; en español «propósito» conserva esa apertura y refleja la posibilidad señalada en la nota inglesa. Aunque «asunto» es posible, «propósito» da mejor el posible alcance de intención/causa en este contexto literario.
- source_word: וְעַל כָּל הַמַּעֲשֶׂה
  english_pob_choice: and for every deed
  chosen_spanish: y para toda obra
  alternatives_spanish:
  - y para todo hecho
  - y para toda acción
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede ser trabajo, obra o acción; «obra» conserva la amplitud y encaja con la construcción paralela del verso. También permite la resonancia de evaluación divina sin restringirlo solo a actos aislados.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - en ese lugar
  lexicon: HALOT
  rationale: Se conserva el adverbio final para reflejar la tensión del hebreo. «Allí» suena natural en español y mantiene abierta la referencia espacial u ocasional sin resolverla.
theological_decisions:
- issue: Tratamiento del adverbio final שָׁם en relación con el juicio divino
  english_pob_reading: Retain the literal 'there' in the main text, preserving the ambiguity about place or occasion of judgment.
  chosen_spanish_reading: 'Conservar «allí» al final: «… y para toda obra, allí»'
  alternative_spanish_readings:
  - omitir el adverbio para suavizar la frase
  - 'reformular: «… y para toda obra, en aquel lugar»'
  rationale: El texto hebreo incluye שָׁם y la POB inglesa decidió no eliminarlo. Mantener «allí» preserva la ambigüedad auditable sobre si apunta al lugar, al momento o a la esfera del juicio de Dios, sin imponer una resolución interpretativa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y textual en vez de resolverla'
- issue: Renderizado de חֵפֶץ con posible doble matiz de propósito/asunto
  english_pob_reading: '''for every matter'' with footnote noting ''purpose'' as a formal alternative.'
  chosen_spanish_reading: «para todo propósito» en el texto principal, con nota que reconoce la alternativa de «asunto/obra»
  alternative_spanish_readings:
  - para todo asunto
  - para todo deseo
  rationale: En español, «propósito» mantiene el rango semántico que la nota inglesa destaca y se integra bien con la idea de un tiempo señalado. Se evita reducir el término a un simple deseo subjetivo, pero se reconoce en nota que el hebreo puede leerse de manera más formal o más concreta.
  doctrine_reference: HALOT; nota lexical de la POB inglesa
- issue: Término moral para הָרָשָׁע
  english_pob_reading: the wicked
  chosen_spanish_reading: el malvado
  alternative_spanish_readings:
  - el impío
  - el perverso
  rationale: «Malvado» comunica el contraste ético sin cargar de antemano una terminología confesional específica. En este contexto sapiencial, mantiene el paralelismo con «el justo» y la oposición judicial.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: La versión final sigue la revisión inglesa que movió «there» al final para reflejar mejor el orden hebreo y preservar el énfasis de שָׁם. En español se mantuvo ese adverbio final como «allí», evitando una paráfrasis que lo borre.
  spanish_consistency_notes:
  - Se usa «Dios» sin artículo como convención española normal, en línea con el referente teológico del texto.
  - Se conserva el paralelismo entre «el justo» y «el malvado» para mantener la antítesis moral del hebreo.
  - «En mi corazón» se deja literal y no se reemplaza por un equivalente más psicológico para no perder el modismo semita.
  - «Allí» al final debe leerse con ambigüedad abierta; no se interpreta explícitamente como lugar, momento o esfera.
