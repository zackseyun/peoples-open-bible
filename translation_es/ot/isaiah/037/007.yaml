    issue: Las notas al pie están invertidas y mal ancladas
    rationale: 'La nota [a] está colocada en «He aquí», pero explica שְׁמוּעָה («informe/noticia/rumor»). La nota [b] está colocada en «un espíritu», pero su contenido dice «O: “un espíritu”», lo cual no aporta alternativa real para רוּחַ y además contradice el audit trail inglés, donde la alternativa era para נוֹתֵן: «I am giving».'
  - severity: medium
    issue: La nota sobre רוּחַ no preserva la alternativa documentada correcta
    rationale: 'El inglés auditado registra para la nota b: «Or ''I am giving him a spirit.''» El borrador español reemplaza eso por una pseudoalternativa redundante («O: “un espíritu”»), perdiendo información sobre la opción verbal relevante.'
  - severity: low
    issue: «a espada» podría ser menos transparente que «por la espada»
    rationale: «A espada» es natural en español, pero «por la espada» expresa con mayor claridad el instrumental/medio del hebreo y se alinea mejor con la formulación auditada «by the sword». No es error grave, pero sí una mejora recomendable.
