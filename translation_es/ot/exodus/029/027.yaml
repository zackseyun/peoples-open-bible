review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y conserva el lenguaje ritual concreto: «consagrarás», «pecho», «mecida», «alzada», y la nota sobre אֵיל הַמִּלֻּאִים. Sin embargo, hay dos desajustes relevantes: שׁוֹק se justificó en el rastro inglés como «thigh» y en español conviene «muslo», no «pierna»; además, el inglés revisado redujo תְּרוּמָה a «contribution», no «contribution offering», por lo que «la ofrenda alzada» añade «ofrenda» innecesariamente. También la relativa singular «la cual fue mecida y la cual fue alzada» suena ambigua frente a dos porciones coordinadas.'
  spanish_quality_summary: El texto es legible, pero «pierna» es menos preciso anatómica y cultualmente que «muslo». «De lo que era de Aarón» resulta algo duro; «de lo que pertenecía a Aarón» es más natural sin sobreinterpretar. La nota [a] en el borrador está internamente defectuosa, porque ofrece como alternativa prácticamente la misma frase y además introduce una formulación tradicional confusa. Conviene simplificarla y alinearla con el rastro inglés.
  glossary_alignment: 'Sin conflictos con el glosario mayor del proyecto. Las decisiones cultuales requieren mejor alineación con la auditoría inglesa: תְּנוּפָה = «ofrenda mecida» está bien; תְּרוּמָה aquí debe representarse mejor como «contribución[a]» o, si se explicita, con nota que preserve «ofrenda alzada» como alternativa. אֵיל הַמִּלֻּאִים puede mantenerse como «carnero de la investidura» con nota explicativa.'
  issues:
  - severity: medium
    issue: «pierna» para שׁוֹק
    rationale: El expediente inglés prefirió «thigh» por precisión anatómica. En español bíblico y cultual «muslo» corresponde mejor que «pierna», que es más amplia.
  - severity: medium
    issue: «ofrenda alzada» añade «ofrenda» donde la revisión inglesa la omitió
    rationale: La revisión auditada cambió «contribution offering» a «contribution» para acercarse más al hebreo. En español, «la contribución» preserva mejor esa decisión, con nota léxica para «ofrenda alzada» como alternativa.
  - severity: low
    issue: 'Relativa singular ambigua: «la cual fue mecida y la cual fue alzada»'
    rationale: El hebreo se refiere al conjunto de las porciones mencionadas mediante dos pasivas coordinadas. En español fluye mejor «que fue mecido y que fue alzado» referido al conjunto sacrificial de forma neutra, o una reformulación no ambigua.
  - severity: low
    issue: Nota [a] defectuosa y poco clara
    rationale: 'La nota actual repite casi la misma expresión y añade una alternativa tradicional inexacta/confusa. Debe reflejar el rastro inglés: «O ‘el muslo de la ofrenda alzada’; tradicionalmente, ‘la ofrenda mecida’/‘la ofrenda elevada’ según el término» no es adecuado tal como está; lo mejor es explicar «ofrenda alzada» o «ofrenda elevada» como alternativa para תרומה.'
  - severity: low
    issue: «de lo que era de Aarón» suena forzado
    rationale: Aunque cercano al inglés revisado, en español «de lo que pertenecía a Aarón» y «de lo que pertenecía a sus hijos» es más natural y preserva el sentido posesivo.
  revised_spanish_text: Y consagrarás el pecho de la ofrenda mecida y el muslo de la contribución[a], que fue mecido y que fue alzado, del carnero de la investidura[b], de lo que pertenecía a Aarón y de lo que pertenecía a sus hijos.
  revised_footnotes:
