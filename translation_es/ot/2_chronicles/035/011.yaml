    text: El verbo puede traducirse también «asperjaron». Es el término sacrificial habitual para la aplicación ritual de la sangre en el altar; «de sus manos» indica que la recibían de quienes habían sacrificado.
    reason: lexical_alternative
  - marker: c
    text: Es decir, los levitas les quitaban el cuero a los animales sacrificados.
    reason: cultural_note
