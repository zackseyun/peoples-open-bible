id: MRK.10.10
reference: Mark 10:10
source:
  edition: SBLGNT
  text: Καὶ ⸂εἰς τὴν οἰκίαν⸃ πάλιν οἱ μαθηταὶ ⸂περὶ τούτου⸃ ⸀ἐπηρώτων αὐτόν.
translation:
  text: And in the house again[b][a], the disciples were asking him about this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And in the house again the disciples were asking him about this.'
    reason: lexical_alternative
  - marker: b
    text: Or 'began asking him about this again'.
    reason: previous_rendering
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: Standard connective linking this scene to the preceding discussion. 'And' preserves the narrative flow without adding temporal nuance beyond the Greek.
- source_word: εἰς τὴν οἰκίαν
  chosen: when they were back in the house
  alternatives:
  - in the house
  - into the house
  - at home
  lexicon: BDAG
  rationale: Literally 'into the house,' but in narrative context this idiom marks a return to a private setting. 'When they were back in the house' brings out the locative-situational sense in natural English while preserving the movement implied by εἰς.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - back
  lexicon: BDAG
  rationale: 'Here πάλιν most naturally modifies the questioning: the disciples asked him again about the matter. This fits the context, since the topic had just been raised publicly.'
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article with μαθηταί identifies the known group of Jesus' followers. 'The disciples' is sufficient in context and avoids adding 'his' where the Greek does not require it.
- source_word: περὶ τούτου
  chosen: about this
  alternatives:
  - about this matter
  - concerning this
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase. 'This' refers to the teaching on divorce in the preceding context; 'about this' is concise and natural.
- source_word: ἐπηρώτων
  chosen: began asking
  alternatives:
  - were asking
  - asked
  - questioned
  lexicon: BDAG
  rationale: The imperfect tense indicates ongoing or repeated action in past time. 'Began asking' captures the inceptive/iterative feel in idiomatic English better than a simple past, while avoiding an overly wooden 'were asking.'
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; standard English rendering.
