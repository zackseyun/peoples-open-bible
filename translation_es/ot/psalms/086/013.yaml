translation:
  language: es
  text: Pues grande es tu amor leal hacia mí, y has librado mi alma del Seol[a] más profundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la morada de los muertos» o «de la tumba». «Seol» es el término hebreo para el ámbito de los muertos.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior. En español, «Porque» conserva bien la relación causal/explicativa del hebreo sin volver la línea pesada o demasiado expositiva.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor leal
  alternatives_spanish:
  - tu misericordia
  - tu amor constante
  - tu fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד expresa amor de pacto, lealtad y bondad sostenida. «Amor leal» preserva esa fuerza relacional y pactal mejor que «misericordia», que estrecha demasiado el sentido, y evita una formulación demasiado larga o arcaizante.
- source_word: גָּדוֹל
  english_pob_choice: is great
  chosen_spanish: es grande
  alternatives_spanish:
  - es abundante
  - es poderoso
  lexicon: HALOT
  rationale: El adjetivo significa simplemente «grande». «Es grande» reproduce el valor básico con naturalidad en español.
- source_word: עָלַי
  english_pob_choice: toward me
  chosen_spanish: para conmigo
  alternatives_spanish:
  - sobre mí
  - hacia mí
  - por mí
  lexicon: HALOT
  rationale: Con חֶסֶד, la preposición marca dirección o relación benefactora. «Para conmigo» expresa bien esa orientación de favor en español bíblico actual, sin sonar forzado como «sobre mí».
- source_word: וְהִצַּלְתָּ
  english_pob_choice: and you have delivered
  chosen_spanish: y has librado
  alternatives_spanish:
  - y has rescatado
  - y me has salvado
  lexicon: HALOT
  rationale: El hifil de נצל implica librar, rescatar, salvar de un peligro. «Has librado» mantiene el registro poético y el matiz de liberación efectiva.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí mismo
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o la persona misma. Aquí, en paralelo con Sheol, «mi alma» conserva la profundidad antropológica y el tono poético del hebreo.
- source_word: מִשְּׁאוֹל
  english_pob_choice: from Sheol
  chosen_spanish: del Sheol
  alternatives_spanish:
  - del sepulcro
  - de la morada de los muertos
  - de la tumba
  lexicon: HALOT
  rationale: Se preserva la transliteración «Sheol» para no aplanar el concepto hebreo en una sola equivalencia posterior. La traducción mantiene la imagen original del ámbito de los muertos.
- source_word: תַּחְתִּיָּה
  english_pob_choice: the lowest Sheol
  chosen_spanish: más bajo
  alternatives_spanish:
  - inferior
  - más profundo
  - de lo más bajo
  lexicon: HALOT
  rationale: El término intensifica la idea de lo que está debajo o en lo más bajo. En español, «más bajo» comunica el superlativo descendente y evita una paráfrasis más amplia que diluya el hebraísmo.
theological_decisions:
- issue: Cómo representar שְׁאוֹל sin importar una equivalencia doctrinal posterior ni borrar la imagen poética hebrea
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - sepulcro
  - morada de los muertos
  - tumba
  rationale: La transliteración preserva el término técnico-poético hebreo y su ambigüedad histórica. Las alternativas interpretan el concepto, pero pueden reducir su alcance imaginativo o teológico.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo reflejar תַּחְתִּיָּה sin convertirlo en una explicación excesiva
  english_pob_reading: the lowest Sheol
  chosen_spanish_reading: más bajo
  alternative_spanish_readings:
  - el más bajo Sheol
  - las profundidades de Sheol
  rationale: La frase corta conserva la intensificación descendente de שְׁאוֹל תַּחְתִּיָּה y permite que el lector perciba la fuerza poética del hebreo. «Las profundidades de Sheol» explicaría más, pero también interpretaría más.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El texto base inglés fue revisado desde «the depths of Sheol» a «the lowest Sheol» para reflejar más directamente שְׁאוֹל תַּחְתִּיָּה; la versión española sigue esa revisión con «más bajo» y conserva «Sheol» para no perder el término hebreo.
  spanish_consistency_notes:
  - Se usa «Sheol» de forma consistente como transliteración del término hebreo, no como «sepulcro» en el texto principal.
  - «Amor leal» se adopta como equivalente estable de חֶסֶד cuando el contexto es relacional/pactual.
  - «Librado» mantiene el matiz de rescate/liberación de peligro, coherente con el registro poético del salmo.
