revisions:
- from: Y el remanente de Jacob estará entre las naciones[a], en medio de muchos pueblos, como león entre las bestias del bosque, como leoncillo entre rebaños de ovejas, que, si pasa, pisa y despedaza[b], y no hay quien rescate.
  to: Y el remanente de Jacob estará entre las naciones, en medio de muchos pueblos, como un león entre las bestias del bosque[a], como leoncillo entre rebaños de ovejas, que, si pasa, pisotea y despedaza[b], y no hay quien rescate.
  rationale: Se reubicó y corrigió la nota [a] para que corresponda a «bestias del bosque», en línea con la alternativa léxica documentada en el audit trail. Se fortaleció רמס con «pisotea» para reflejar mejor la violencia del hebreo y del inglés POB «tramples». Se ajustó ligeramente la prosa a un español más natural con «como un león». También se hizo que la nota [b] refleje mejor la alternativa expansiva documentada (‘tears to pieces’).
  reviewer_model: gpt-5.4
