id: 2PE.3.10
reference: 2 Peter 3:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἥξει δὲ ⸀ἡμέρα κυρίου ὡς ⸀κλέπτης, ἐν ᾗ οἱ οὐρανοὶ ῥοιζηδὸν παρελεύσονται, στοιχεῖα δὲ καυσούμενα ⸀λυθήσεται, καὶ γῆ καὶ τὰ ἐν αὐτῇ ἔργα ⸀εὑρεθήσεται.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/003/010.yaml
  text: But the day of the Lord will come like a thief[a], in which the heavens will pass away with a roar, and the elements, being burned, will be dissolved[c][b], and the earth and the works in it will be found.
  footnotes:
  - marker: a
    text: Or 'the heavenly bodies' for 'the elements' (στοιχεῖα); the term can refer more specifically to the components of the cosmos in this context.
    reason: lexical_alternative
  - marker: b
    text: Some understand 'will be found' to mean 'will be laid bare' or 'will be exposed.'
    reason: alternative_reading
  - marker: c
    text: Many manuscripts read 'will be burned up' instead of 'will be found.'
    reason: textual_variant
translation:
  language: ko
  text: 그러나 주님의 날은 도둑같이 올 것입니다. 그 날에는 하늘이 굉음과 함께 사라지고, 원소들[a]은 불에 타서 풀어질 것이며, 땅과 그 안의 행위들이 드러나게 될 것입니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 στοιχεῖα는 우주의 기본 구성 요소들을 가리키며, 천체(해·달·별 등)를 가리키는 해석도 가능하다. 용어집의 표준 등가어 「원소들」을 채택한다.
    reason: lexical_alternative
  - marker: b
    text: 다수 사본은 「드러나다」(εὑρεθήσεται) 대신 「불사르다」(κατακαήσεται)로 읽는다. SBLGNT는 「드러나다」를 채택하며, 이는 「폭로되다」 또는 「벌거벗겨지다」로도 풀이될 수 있다.
    reason: textual_variant
lexical_decisions:
- source_word: ἡμέρα κυρίου
  english_pob_choice: day of the Lord
  chosen_korean: 주님의 날
  alternatives_korean:
  - 주의 날
  lexicon: BDAG
  rationale: 여기서 「주」는 메시아의 종말적 도래의 날(예수)을 가리키는 신약 정형 표현이므로 「야훼」가 아닌 「주님」을 채택. 3:8과는 다른 결정.
- source_word: στοιχεῖα
  english_pob_choice: elements
  chosen_korean: 원소들
  alternatives_korean:
  - 천체들
  - 구성 요소들
  lexicon: BDAG
  rationale: 용어집 표준.
- source_word: ῥοιζηδὸν
  english_pob_choice: with a roar
  chosen_korean: 굉음과 함께
  alternatives_korean:
  - 요란한 소리로
  lexicon: BDAG
  rationale: 신약 유일례. 강렬한 음향 이미지.
- source_word: εὑρεθήσεται
  english_pob_choice: will be found
  chosen_korean: 드러나게 되다
  alternatives_korean:
  - 발견되다
  - 폭로되다
  - 벌거벗겨지다
  lexicon: BDAG
  rationale: 본문의 어려운 독본을 「드러남」(폭로의 함의 포함)으로 옮긴다.
theological_decisions:
- issue: 3:10의 「주의 날」 — κύριος를 「야훼」가 아닌 「주님」으로
  chosen_reading: 주님의 날 (메시아의 종말적 도래)
  alternative_readings:
  - 야훼의 날 (구약 종말 정형 표현)
  rationale: 베드로후서 3:10의 ἡμέρα κυρίου는 구약 「YHWH의 날」 모티프를 이어받지만, 본문 흐름(3:4의 그분의 재림에 관한 약속)에서 그리스도의 도래로 재맥락화되어 있다. 따라서 신약적 종말 「주님의 날」로 옮긴다. 3:8과는 다른 결정.
  doctrine_reference: Translation philosophy §3, §6; cf. 1 Thess 5:2
