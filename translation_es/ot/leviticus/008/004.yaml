translation:
  language: es
  text: Y Moisés hizo como Yahvé le mandó, y la congregación se reunió[a] a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También podría traducirse: «la asamblea se congregó» o «la congregación fue reunida». El verbo hebreo permite más de una forma idiomática de expresar este reunirse colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - actuó
  - realizó
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio ('hacer/hacer algo'). En este contexto de obediencia a un mandato, 'hizo' conserva la naturalidad y la fuerza directa del acto obediente en español.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - como
  - tal como
  - según
  lexicon: HALOT
  rationale: '''Como'' expresa con claridad la conformidad con lo mandado sin volver la frase pesada. ''Tal como'' sería posible, pero no aporta suficiente valor adicional aquí.'
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había mandado
  - había ordenado
  - había instruido
  lexicon: HALOT
  rationale: צָוָה denota una orden con autoridad. 'Había mandado' mantiene ese peso y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahweh
  lexicon: HALOT
  rationale: La política terminológica del proyecto para יְהוָה es 'Yahvé' en el texto principal. Se preserva el nombre propio divino, en lugar de sustituirlo por un título como 'SEÑOR'.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - le
  - a él
  - lo
  lexicon: HALOT
  rationale: El pronombre retoma a Moisés. En español, 'le' funciona de manera natural con 'mandar a alguien' y evita una construcción más rígida.
- source_word: וַתִּקָּהֵל
  english_pob_choice: assembled
  chosen_spanish: se reunió
  alternatives_spanish:
  - se reunió
  - se congregó
  - se juntó
  lexicon: HALOT
  rationale: 'La forma nifal de קהל permite un sentido medio/pasivo: la asamblea se juntó. ''Se reunió'' comunica bien el evento colectivo y es idiomático en español.'
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la congregación
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: עֵדָה designa al pueblo reunido del pacto. 'Congregación' conserva el sentido colectivo establecido en la tradición de traducción del Pentateuco y es claro para lectores eclesiales.
- source_word: אֶל
  english_pob_choice: at
  chosen_spanish: a
  alternatives_spanish:
  - a
  - hacia
  - junto a
  lexicon: HALOT
  rationale: 'Con ''la entrada'', la preposición natural en español es ''a'': ''a la entrada''. Mantiene el valor direccional/local del hebreo.'
- source_word: פֶּתַח
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - la entrada
  - el umbral
  - la puerta
  lexicon: HALOT
  rationale: פֶּתַח es una abertura o entrada. 'La entrada' es la opción más clara y fiel en español, sin cerrar indebidamente el matiz espacial.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - el tabernáculo de reunión
  - la tienda de reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'tienda de reunión', en este contexto cultual el término español más reconocido y preciso es 'tabernáculo de reunión'. Mantiene la función litúrgica del lugar sin perder el carácter técnico del santuario.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahweh
  rationale: Se preserva el nombre propio del pacto en vez de sustituirlo por un título. 'Yahvé' es la forma establecida para este proyecto en español y corresponde al Tetragrámaton del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor de וַתִּקָּהֵל y הָעֵדָה
  english_pob_reading: the congregation assembled
  chosen_spanish_reading: la congregación se reunió
  alternative_spanish_readings:
  - la congregación se reunió
  - la congregación fue reunida
  - la asamblea se congregó
  rationale: El hebreo permite un matiz activo intransitivo o pasivo; el inglés POB deja abierta esa variación. En español, 'se reunió' conserva la ambigüedad funcional sin forzar una voz pasiva poco natural.
  doctrine_reference: POB lexical policy on Niphal collective gathering verbs
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente y con la lectura inglesa auditada; la única adaptación relevante fue hacer más idiomático en español el binomio verbal de obediencia ('hizo como Yahvé le había mandado') y elegir 'tabernáculo de reunión' para el nombre cultual establecido en español, manteniendo intacta la relación semántica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, conforme al criterio del proyecto.
  - Se tradujo עֵדָה como 'congregación' para conservar continuidad con el Pentateuco.
  - Se prefirió 'tabernáculo de reunión' como equivalente estable de אֹהֶל מוֹעֵד en contexto cultual.
  - La nota a pie de página señala una alternativa real del verbo nifal sin introducir una nueva interpretación.
