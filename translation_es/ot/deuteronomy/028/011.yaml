translation:
  language: es
  text: Yahvé te hará abundar en bienestar[a], en el fruto de tu vientre[b], en el fruto de tu ganado y en el fruto de tu tierra[c], en la tierra que Yahvé juró a tus padres darte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para bien» o «para bienestar».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «fruto de tu vientre», un modismo para hijos o descendencia.'
    reason: lexical_alternative
  - marker: c
    text: O «el producto de tu tierra» o «la cosecha de tu suelo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹתִרְךָ
  english_pob_choice: will make you abound
  chosen_spanish: te hará abundar
  alternatives_spanish:
  - te hará tener abundancia
  - te hará prosperar
  - te hará tener más que suficiente
  lexicon: HALOT
  rationale: 'El hifil de יתר es causativo: Yahvé causa aumento o sobra. «Te hará abundar» conserva ese matiz causativo y la idea de incremento sin añadir una paráfrasis más libre.'
- source_word: לְטוֹבָה
  english_pob_choice: in prosperity
  chosen_spanish: en bienestar
  alternatives_spanish:
  - para bien
  - en prosperidad
  - para tu bien
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «para bien», y en este contexto de bendición apunta a bienestar favorable. «En bienestar» mantiene el sentido de bien/beneficio sin imponer necesariamente el matiz económico de «prosperidad».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La forma española establecida en el proyecto es «Yahvé», transliteración del nombre divino, en lugar de sustituirlo por un título como «SEÑOR».
- source_word: בִּפְרִי בִטְנְךָ
  english_pob_choice: in the fruit of your womb
  chosen_spanish: en el fruto de tu vientre
  alternatives_spanish:
  - en tus hijos
  - en tu descendencia
  - en el fruto de tu seno
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «fruto de tu vientre» porque el hebreo usa una fórmula repetida de «fruto de...», y en español es clara y fiel.
- source_word: וּבִפְרִי בְהַמְתְּךָ
  english_pob_choice: in the fruit of your livestock
  chosen_spanish: en el fruto de tu ganado
  alternatives_spanish:
  - en el fruto de tus animales
  - en la cría de tu ganado
  - en el aumento de tu ganado
  lexicon: HALOT
  rationale: «Ganado» es un colectivo natural en español para el ámbito doméstico-agrario del pasaje y mantiene el paralelismo con «fruto de».
- source_word: וּבִפְרִי אַדְמָתֶךָ
  english_pob_choice: in the fruit of your ground
  chosen_spanish: en el fruto de tu tierra
  alternatives_spanish:
  - en el fruto de tu suelo
  - en el producto de tu tierra
  - en la cosecha de tu tierra
  lexicon: HALOT
  rationale: אַדְמָה aquí se refiere al terreno cultivable; «tierra» es la forma más natural en español y conserva el paralelismo con las dos expresiones anteriores.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en el país
  - sobre el suelo
  lexicon: HALOT
  rationale: La preposición עַל puede expresarse naturalmente con «sobre» en español. «Tierra» conserva la referencia al ámbito prometido y evita restringirlo solo a «suelo».
- source_word: אֲשֶׁר נִשְׁבַּע יְהוָה לַאֲבֹתֶיךָ לָתֶת לָךְ
  english_pob_choice: that Yahweh swore to your fathers to give you
  chosen_spanish: que Yahvé juró a tus padres darte
  alternatives_spanish:
  - que Yahvé juró dar a tus padres y a ti
  - que Yahvé juró a tus antepasados darte
  - que Yahvé prometió a tus padres darte
  lexicon: HALOT
  rationale: La cláusula relativa modifica «la tierra». «Juró a tus padres darte» refleja con concisión el juramento ancestral y el destinatario final, sin introducir una expansión innecesaria.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En la serie española del POB, la forma adoptada es «Yahvé», preservando el nombre pactal de Dios sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de לְטוֹבָה
  english_pob_reading: in prosperity
  chosen_spanish_reading: en bienestar
  alternative_spanish_readings:
  - en prosperidad
  - para bien
  - para bienestar
  rationale: La frase hebrea literalmente apunta a «para bien» o «para beneficio». En esta bendición, «bienestar» expresa el resultado favorable sin cargar el verso con un matiz exclusivamente material.
  doctrine_reference: HALOT; contexto de bendición pactual en Deuteronomio 28
- issue: Mantener el hebraísmo «fruto de tu vientre»
  english_pob_reading: Retain the idiom 'fruit of your womb'
  chosen_spanish_reading: fruto de tu vientre
  alternative_spanish_readings:
  - hijos
  - descendencia
  - fruto de tu seno
  rationale: Se conserva la idiomática hebrea porque el verso construye un paralelismo deliberado entre fertilidad humana, animal y agrícola mediante la repetición de «fruto de...».
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: Coincide con el último pase sin cambios sustanciales; se mantiene la lectura auditada de abundancia causativa, el nombre divino como Yahvé y la repetición idiomática de «fruto de...», con una ligera preferencia española por «bienestar» para לְטוֹבָה.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene el paralelismo triple con «fruto de tu...».
  - «Tierra» se emplea de forma amplia para אֲדָמָה/אַדְמָה según el contexto.
  - La construcción «te hará abundar» conserva la voz causativa del hebreo.
