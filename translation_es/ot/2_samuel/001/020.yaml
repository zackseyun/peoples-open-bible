translation:
  language: es
  text: No lo cuenten en Gat; no anuncien la noticia en las calles de Ascalón, no sea que se alegren las hijas de los filisteos, no sea que exulten las hijas de los incircuncisos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 'Literalmente, «las hijas de los incircuncisos»; es un término de reproche pactual para los filisteos. Alternativamente: «las hijas de los incircuncisos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּגִּידוּ
  english_pob_choice: tell it
  chosen_spanish: lo cuenten
  alternatives_spanish:
  - lo digan
  - lo informen
  lexicon: HALOT
  rationale: El hebreo pide un verbo de comunicación directa y el POB inglés eligió 'tell it' por su naturalidad. En español, 'lo cuenten' conserva ese tono coloquial-neutral sin perder el valor de comunicar un hecho ya implícito por el contexto.
- source_word: בְגַת
  english_pob_choice: in Gath
  chosen_spanish: en Gat
  alternatives_spanish:
  - en Gath
  lexicon: HALOT
  rationale: Se conserva el topónimo bíblico con transliteración breve y reconocible en español. 'Gat' evita una adaptación ajena al nombre propio original.
- source_word: תְּבַשְּׂרוּ
  english_pob_choice: proclaim the news
  chosen_spanish: anuncien la noticia
  alternatives_spanish:
  - proclamen la noticia
  - lleven la noticia
  lexicon: HALOT
  rationale: El piel de בשר tiene el sentido de dar/traer noticia en forma pública. 'Anuncien la noticia' mantiene la fuerza comunicativa y la publicidad del acto sin volverlo artificioso en español.
- source_word: בְּחוּצֹת אַשְׁקְלֹון
  english_pob_choice: in the streets of Ashkelon
  chosen_spanish: en las calles de Ascalón
  alternatives_spanish:
  - en las plazas de Ascalón
  - en los espacios públicos de Ascalón
  lexicon: HALOT
  rationale: חוּצוֹת designa espacios abiertos y calles de la ciudad. 'Calles' es la opción más natural y pública en español. 'Ascalón' es la forma hispana tradicional del topónimo, útil para lectores bíblicos en español.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: El español actual suele expresar este giro final/preservativo de manera más natural con 'para que no'. Conserva la relación de temor o prevención que introduce פֶּן.
- source_word: תִּשְׂמַחְנָה
  english_pob_choice: rejoice
  chosen_spanish: se alegren
  alternatives_spanish:
  - se regocijen
  - se gocen
  lexicon: HALOT
  rationale: שמַח expresa alegría; en español 'se alegren' suena claro y digno en este lamento poético. 'Regocijarse' sería posible pero más marcado y menos natural.
- source_word: בְּנוֹת פְּלִשְׁתִּים
  english_pob_choice: the daughters of the Philistines
  chosen_spanish: las hijas de los filisteos
  alternatives_spanish:
  - las mujeres de los filisteos
  - las hijas filisteas
  lexicon: HALOT
  rationale: Se conserva la personificación poética del texto hebreo. 'Hijas de los filisteos' refleja literalmente la construcción y mantiene el tono de burla/celebración pública.
- source_word: תַּעֲלֹזְנָה
  english_pob_choice: exult
  chosen_spanish: exulten
  alternatives_spanish:
  - triunfen
  - se regocijen intensamente
  lexicon: HALOT
  rationale: עלז es más intenso que שמח. 'Exulten' preserva esa intensificación léxica y el paralelismo ascendente del verso.
- source_word: בְּנוֹת הָעֲרֵלִים
  english_pob_choice: the daughters of the uncircumcised
  chosen_spanish: las hijas de los incircuncisos
  alternatives_spanish:
  - las hijas de los no circuncidados
  - las hijas de los incircuncisos ones
  lexicon: HALOT
  rationale: Se conserva el insulto pactual literalmente, como en el POB inglés, porque el término remite a la identidad de los filisteos en contraste con el pacto de circuncisión. 'Incircuncisos' mantiene esa carga religiosa y retórica sin diluirla en un insulto genérico.
theological_decisions:
- issue: Tratamiento del término pactual עֲרֵלִים
  english_pob_reading: the uncircumcised
  chosen_spanish_reading: los incircuncisos
  alternative_spanish_readings:
  - los no circuncidados
  - los paganos
  rationale: La metáfora no es solo anatómica; funciona como designación de reproche en clave de pacto. 'Incircuncisos' conserva esa tensión histórica y teológica, evitando reemplazarla por un equivalente más interpretativo como 'paganos' o 'impuros'.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El texto sigue de cerca la línea hebrea y el audit trail inglés sin depender de un calco servil. Se adoptan equivalentes españoles naturales ('lo cuenten', 'anuncien la noticia', 'para que no') y se conserva la carga teológica de 'incircuncisos' como insulto pactual. No se detectaron revisiones previas que alteren la decisión de fondo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no requerido aquí; no aparece el nombre divino en este versículo.
  - Se usó 'Ascalón' como forma tradicional y 'Gat' como transliteración breve habitual en español bíblico.
  - Se preservó el paralelismo poético con dos cláusulas de prevención y dos miembros finales ascendentes.
  - No se suavizó el término covenantal 'incircuncisos', por coherencia con la POB y la fuerza del hebreo.
