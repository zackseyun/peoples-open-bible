translation:
  language: es
  text: 'Entonces el rey mandó a Ebed-melec el cusita[a], diciendo: «Toma contigo de aquí treinta hombres, y saca a Jeremías el profeta de la cisterna[b] antes de que muera».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el etíope». El hebreo dice «el cusita», es decir, un hombre procedente de Cus.
    reason: lexical_alternative
  - marker: b
    text: O «del pozo» o, en la tradición inglesa antigua, «de la mazmorra». El hebreo בּוֹר puede significar pozo, cisterna o calabozo; aquí «cisterna» encaja mejor con el contexto narrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַוֶּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden a
  lexicon: HALOT
  rationale: El verbo expresa una orden real directa. En español, «mandó» conserva la autoridad del acto y fluye con naturalidad narrativa; «ordenó» también sería posible, pero «mandó» encaja bien con la voz de mando del rey.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es el sustantivo definido normal; no requiere matiz adicional en español.
- source_word: עֶבֶד מֶלֶךְ
  english_pob_choice: Ebed-melech
  chosen_spanish: Ebed-melec
  alternatives_spanish:
  - Ebed-melech
  - Abdé-melec
  lexicon: HALOT
  rationale: Se trata de un nombre propio. Se translitera de forma consistente en español como nombre, no como frase común de oficio.
- source_word: הַכּוּשִׁי
  english_pob_choice: the Cushite
  chosen_spanish: el cusita
  alternatives_spanish:
  - el etíope
  lexicon: HALOT
  rationale: «Cusita» reproduce más directamente el etnónimo hebreo כּוּשִׁי. «Etíope» es tradicional, pero puede ser menos preciso geográficamente; por eso se conserva como alternativa en la nota.
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Lleva
  - Toma para ti
  lexicon: HALOT
  rationale: El imperativo לקח se expresa de manera natural con «toma». Mantiene el tono directo de la instrucción sin añadir paráfrasis.
- source_word: בְּיָדְךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - en tu mano
  - bajo tu cargo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en tu mano», pero en este contexto idiomático significa llevarlos bajo tu dirección. «Contigo» preserva la naturalidad española y el sentido de acompañamiento/encargo.
- source_word: מִזֶּה
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - desde aquí
  - de este lugar
  lexicon: HALOT
  rationale: La referencia es al lugar inmediato. «De aquí» es la forma más directa y natural en español.
- source_word: שְׁלֹשִׁים אֲנָשִׁים
  english_pob_choice: thirty men
  chosen_spanish: treinta hombres
  alternatives_spanish:
  - treinta personas
  lexicon: HALOT
  rationale: El hebreo usa el plural masculino explícito. «Hombres» conserva ese dato gramatical, siguiendo la especificidad del original.
- source_word: וְהַעֲלִיתָ
  english_pob_choice: bring up
  chosen_spanish: saca
  alternatives_spanish:
  - haz subir
  - trae arriba
  lexicon: HALOT
  rationale: En castellano, con el complemento siguiente «de la cisterna», «saca» comunica de forma inmediata la extracción hacia afuera/arriba. También preserva la urgencia de la acción; «haz subir» sería más literal, pero menos natural.
- source_word: יִרְמְיָהוּ הַנָּבִיא
  english_pob_choice: Jeremiah the prophet
  chosen_spanish: Jeremías el profeta
  alternatives_spanish:
  - el profeta Jeremías
  lexicon: HALOT
  rationale: Se mantiene el nombre propio con el título presente en hebreo. El orden «Jeremías el profeta» sigue de cerca la estructura del texto y evita invertir el foco.
- source_word: מִן הַבּוֹר
  english_pob_choice: from the cistern
  chosen_spanish: de la cisterna
  alternatives_spanish:
  - del pozo
  - del hoyo
  - de la mazmorra
  lexicon: HALOT
  rationale: בור puede ser pozo, cisterna, hoyo o calabozo según contexto. Aquí el contexto narrativo apunta a una cisterna; por eso se mantiene esa elección precisa.
- source_word: בְּטֶרֶם יָמוּת
  english_pob_choice: before he dies
  chosen_spanish: antes de que muera
  alternatives_spanish:
  - antes de morir
  - antes que muera
  lexicon: HALOT
  rationale: בטרם marca un límite temporal y el verbo expresa la muerte inminente. «Antes de que muera» es claro, natural y fiel al valor temporal del hebreo.
theological_decisions:
- issue: Título aplicado a Jeremías
  english_pob_reading: Jeremiah the prophet
  chosen_spanish_reading: Jeremías el profeta
  alternative_spanish_readings:
  - el profeta Jeremías
  rationale: No hay tensión doctrinal especial, pero se conserva el título profético porque está en el hebreo y subraya la condición de Jeremías como portavoz de Yahvé en la narrativa.
  doctrine_reference: Profecía / vocación profética en el AT
translation_notes:
  revision_awareness: El texto español sigue la lectura revisada del POB inglés que desplazó el orden a «bring Jeremiah the prophet up from the cistern» para mayor naturalidad, conservando en español el mismo sentido y la misma urgencia narrativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; en este versículo no aparece.
  - Se translitera el nombre propio como «Ebed-melec» para coherencia en español.
  - «Cusita» se mantiene como etnónimo técnico, con «etíope» como alternativa de nota.
  - «Cisterna» se conserva como elección principal por precisión contextual frente a «pozo» o «calabozo».
