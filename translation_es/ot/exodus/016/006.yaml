translation:
  language: es
  text: 'Entonces Moisés y Aarón dijeron a todos los hijos de Israel[a]: «Al atardecer sabrán que Yahvé los sacó de la tierra de Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a todos los israelitas». El hebreo dice literalmente «a todos los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  - Luego ... dijeron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «entonces» conserva bien esa secuencia en español sin sonar tan mecánico como «y».
- source_word: מֹשֶׁה וְאַהֲרֹן
  english_pob_choice: Moses and Aaron
  chosen_spanish: Moisés y Aarón
  alternatives_spanish:
  - Moisés y Aaron
  lexicon: Nombres propios bíblicos
  rationale: Se conserva la forma española estándar de los nombres propios, con el orden del original.
- source_word: אֶל כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: to all the sons of Israel
  chosen_spanish: a todos los hijos de Israel
  alternatives_spanish:
  - a todos los israelitas
  - a todos los hijos de Israel
  lexicon: HALOT
  rationale: «בְּנֵי» es literalmente «hijos/sons de». Se mantiene la transparencia del hebreo con una forma natural en español; «israelitas» es más idiomático pero menos fiel a la expresión hebrea explícita.
- source_word: עֶרֶב
  english_pob_choice: At evening
  chosen_spanish: Al atardecer
  alternatives_spanish:
  - En la tarde
  - Al anochecer
  lexicon: HALOT
  rationale: El sustantivo funciona temporalmente; «al atardecer» comunica la referencia horaria de manera natural y digna en español.
- source_word: וִידַעְתֶּם
  english_pob_choice: you will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  lexicon: HALOT
  rationale: Aquí el futuro simple expresa el conocimiento que se dará por la señal anunciada. «Sabrán» es la opción más directa y natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT / doctrinal rendering of the divine name
  rationale: Se usa «Yahvé» como forma española principal del nombre divino, preservando el Tetragrámaton sin sustituirlo por un título.
- source_word: הוֹצִיא
  english_pob_choice: brought ... out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los hizo salir
  - los había sacado
  lexicon: HALOT
  rationale: El hifil de יצא significa «sacar / hacer salir». En español, «los sacó» es natural y mantiene la acción de éxodo con fuerza narrativa pasada.
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: Se conserva «tierra» para reflejar אֶרֶץ explícitamente, como en el inglés auditado que preserva «land».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La política del proyecto pide preservar el nombre divino; en español, «Yahvé» es la forma asentada y legible, y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expresión filial en בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - hijos de Israel
  - israelitas
  - hijos/descendientes de Israel
  rationale: Se conserva la transparencia del hebreo sin ocultar el masculino plural del original. «Hijos de Israel» mantiene la correspondencia formal y es comprensible en español bíblico.
  doctrine_reference: HALOT; criterio de transparencia léxica del POB
translation_notes:
  revision_awareness: El antecedente inglés mantiene una decisión estable y sin cambios en la revisión más reciente; también conserva la nota léxica sobre בְּנֵי יִשְׂרָאֵל. La presente redacción española sigue esa línea, adaptando la expresión a una forma natural en español y preservando la transparencia del nombre divino y de la frase hebrea.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la política española del nombre divino.
  - «Hijos de Israel» refleja la estructura hebrea y armoniza con la nota de alternativa.
  - «Al atardecer» evita sobreinterpretar el valor temporal de עֶרֶב.
  - La sintaxis mantiene el orden narrativo y la cláusula de contenido introducida por «que».
