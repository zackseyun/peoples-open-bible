base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/015/022.yaml
  text: And Samuel said[a], “Does Yahweh delight in burnt offerings and sacrifices as much as in obeying the voice of Yahweh? Behold, to obey is better than sacrifice, and to listen than the fat of rams.”
