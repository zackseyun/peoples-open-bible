translation:
  language: es
  text: Mira[a], para ellos eres como un canto sensual, de hermosa voz y que toca bien; oyen tus palabras, pero no las ponen por obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un canto amoroso». La expresión hebrea puede denotar deseo apasionado o sensual; la frase subraya que tratan el mensaje del profeta como entretenimiento atractivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנְּךָ
  english_pob_choice: Look, you are
  chosen_spanish: Mira, para ellos eres
  alternatives_spanish:
  - Mira, eres
  - He aquí, eres
  - Mira, para ellos tú eres
  lexicon: HALOT
  rationale: הִנֵּה introduce atención y énfasis. «Mira» conserva el valor de llamada al oyente con español natural. «Para ellos eres» refleja la relación expresada por לָהֶם sin añadir interpretación.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - ante ellos
  lexicon: HALOT
  rationale: La preposición ל puede señalar la perspectiva o evaluación de la audiencia. «Para ellos» comunica bien que así lo perciben o lo consideran, sin forzar un sentido de destinatario físico.
- source_word: כְּשִׁיר עֲגָבִים
  english_pob_choice: like a sensual song
  chosen_spanish: como un canto sensual
  alternatives_spanish:
  - como un canto amoroso
  - como un canto erótico
  - como una canción sensual
  lexicon: HALOT
  rationale: שִׁיר es «canto/canción» y עֲגָבִים denota deseo apasionado o sensual, con matiz potencialmente desordenado. «Canto sensual» conserva la fuerza atractiva y la tensión moral sin volverlo más explícito de lo que exige el hebreo.
- source_word: יְפֵה קוֹל
  english_pob_choice: with a beautiful voice
  chosen_spanish: de voz hermosa
  alternatives_spanish:
  - con voz hermosa
  - de una voz hermosa
  - de voz bella
  lexicon: HALOT
  rationale: La expresión describe la cualidad agradable del sonido vocal. «De voz hermosa» suena natural en español y mantiene la función adjetival del hebreo.
- source_word: וּמֵטִב נַגֵּן
  english_pob_choice: and skillful playing
  chosen_spanish: y hábil en tañer
  alternatives_spanish:
  - y hábil tocando
  - y diestro en tocar
  - y buen músico
  lexicon: HALOT
  rationale: El participio intensifica la destreza en la ejecución musical. «Hábil en tañer» conserva el campo semántico de tocar un instrumento y mantiene un registro digno; «tañer» es algo más literario pero apropiado aquí.
- source_word: וְשָׁמְעוּ אֶת דְּבָרֶיךָ
  english_pob_choice: they hear your words
  chosen_spanish: oyen tus palabras
  alternatives_spanish:
  - escuchan tus palabras
  - oyen la palabra que dices
  lexicon: HALOT
  rationale: שׁמע aquí es recepción auditiva del mensaje. «Oyen tus palabras» mantiene el vínculo verbal con el contraste siguiente entre oír y obedecer.
- source_word: וְעֹשִׂים אֵינָם אוֹתָם
  english_pob_choice: but they do not do them
  chosen_spanish: pero no las ponen por obra
  alternatives_spanish:
  - pero no las hacen
  - pero no las practican
  - pero no las cumplen
  lexicon: HALOT
  rationale: עָשָׂה con el objeto de las palabras implica ejecutarlas o llevarlas a efecto. «Poner por obra» es una equivalencia española clara y bíblicamente reconocible, sin perder el contraste entre oír y obedecer.
theological_decisions:
- issue: Matiz moral de עֲגָבִים
  english_pob_reading: sensual song
  chosen_spanish_reading: canto sensual
  alternative_spanish_readings:
  - canto amoroso
  - canto erótico
  rationale: Se conserva el matiz de atracción apetecible con una posible carga moral problemática. «Canto sensual» refleja mejor el reproche profético que una expresión neutral como «canto amoroso».
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la tensión lexical de עֲגָבִים y el contraste entre oír las palabras y no ponerlas por obra. No se introdujeron cambios textuales respecto al sentido base del POB inglés; la única nota conserva la alternativa lexicológica documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantiene el par «oír / poner por obra» para preservar el contraste profético entre recepción y obediencia.
  - «Tañer» se eligió por su registro culto y por corresponder al campo musical del hebreo sin introducir tecnicismos modernos.
