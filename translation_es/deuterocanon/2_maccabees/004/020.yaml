lexical_decisions:
- source_word: ἕνεκα
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - porque
  - por motivo de
  - debido a
  lexicon: LSJ
  rationale: La preposición griega introduce la causa u ocasión. «A causa de» conserva ese valor causal en español natural y formal, sin añadir matices ajenos.
- source_word: τῶν παρόντων
  english_pob_choice: the present circumstances
  chosen_spanish: las circunstancias presentes
  alternatives_spanish:
  - la situación presente
  - lo que está presente
  - las necesidades actuales
  lexicon: LSJ
  rationale: El participio sustantivado neutro plural se refiere de modo amplio a lo que está ocurriendo o a las condiciones presentes. «Circunstancias presentes» mantiene esa amplitud sin concretar más de lo que dice el griego.
- source_word: κατασκευάς
  english_pob_choice: outfitting
  chosen_spanish: apresto
  alternatives_spanish:
  - preparación
  - equipo
  - equipamiento
  - construcción
  lexicon: LSJ
  rationale: En el contexto naval de las trirremes, el término apunta a la preparación y provisión práctica. «Apresto» transmite mejor en español la idea de dejar algo listo para su uso que «construcción» o un mero «equipo».
- source_word: τριηρέων
  english_pob_choice: triremes
  chosen_spanish: trirremes
  alternatives_spanish:
  - barcos de guerra
  - naves de tres bancos de remos
  lexicon: LSJ
  rationale: El griego nombra una clase específica de nave antigua. «Trirremes» conserva esa especificidad histórica y coincide con el valor técnico del término.
translation_notes:
  revision_awareness: El texto griego es breve y de sintaxis elíptica; la revisión inglesa reciente no alteró la lectura base. La principal decisión fue cómo verter τῶν παρόντων y κατασκευάς en un español natural sin perder la referencia al contexto naval. La nota conserva la alternativa lexical documentada por el POB en inglés.
  spanish_consistency_notes:
  - Se mantuvo «trirremes» por precisión histórica y técnica.
  - Se evitó «SEÑOR» u այլ terminología no pertinente; el versículo no contiene léxico divino.
  - «Apresto» se eligió como solución española idiomática para la idea de preparación/equipamiento naval.
  - La puntuación reproduce el valor causal inicial con coma equivalente al giro griego.
