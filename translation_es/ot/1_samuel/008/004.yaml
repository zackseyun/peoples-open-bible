translation:
  language: es
  text: Entonces todos los ancianos de Israel se reunieron y fueron a Samuel en Ramá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «a Ramá»; aquí se traduce «en Ramá» para expresar con naturalidad en español el destino como lugar donde estaba Samuel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקַבְּצוּ
  english_pob_choice: gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: HALOT
  rationale: El hitpael de קבץ expresa una acción colectiva/reflexiva de juntarse. «Se reunieron» comunica naturalmente esa reunión conjunta sin forzar el español, y conserva el matiz narrativo de movimiento hacia una asamblea.
- source_word: כֹּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - el conjunto de
  - la totalidad de
  lexicon: HALOT
  rationale: «Todos» expresa de manera directa el valor distributivo de כֹּל y corresponde al sentido de grupo completo representativo.
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los jefes de Israel
  - los líderes de Israel
  lexicon: HALOT
  rationale: «Ancianos» es el equivalente más natural y tradicional para זִקְנֵי en este contexto sociopolítico. Mantiene el valor de líderes senior/representativos sin sustituirlo por un término más interpretativo como «jefes».
- source_word: וַיָּבֹאוּ אֶל
  english_pob_choice: came to
  chosen_spanish: fueron a
  alternatives_spanish:
  - vinieron a
  - se acercaron a
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «came to», en español «fueron a» expresa bien el desplazamiento hacia Samuel y suena más natural en la secuencia narrativa. «Vinieron a» podría sonar menos idiomático aquí desde la perspectiva del narrador.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  alternatives_spanish:
  - Samuél
  lexicon: convención onomástica estándar
  rationale: Se mantiene el nombre propio bíblico en su forma habitual en español.
- source_word: הָרָמָתָה
  english_pob_choice: at Ramah
  chosen_spanish: en Ramá
  alternatives_spanish:
  - a Ramá
  - en Ramata
  lexicon: HALOT
  rationale: El hebreo con he direccional puede sugerir movimiento hacia el lugar, pero en español es más natural expresar la localización resultante con «en Ramá», igual que la nota inglesa explica que la frase identifica la ubicación de Samuel. Se conserva el nombre de lugar con la forma española habitual «Ramá».
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios; el texto español sigue la misma resolución auditada: el movimiento del grupo hacia Samuel se expresa de forma natural, y el valor direccional del topónimo se conserva en una nota.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Ancianos» mantiene el término sociopolítico estándar sin suavizarlo a «líderes» o «jefes».
  - «Ramá» sigue la forma española corriente del topónimo bíblico, coherente con la convención del proyecto.
