revisions:
- from: No tomarán mujer prostituta[a] ni profanada, ni mujer divorciada de su marido; porque él es santo para su Dios.
  to: No tomarán una prostituta ni una mujer profanada[a], ni una mujer divorciada de su marido; porque él es santo para su Dios.
