translation:
  language: es
  text: Cuando lo midieron con el ómer[a], al que recogió mucho no le sobró, y al que recogió poco no le faltó; cada uno recogió según lo que podía comer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el que tenía mucho no tuvo exceso, y el que tenía poco no careció de nada».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמֹדּוּ
  english_pob_choice: When they measured
  chosen_spanish: Cuando lo midieron
  alternatives_spanish:
  - Y lo midieron
  - Cuando midieron
  lexicon: medir
  rationale: מדד significa medir. En español, la forma temporal con «Cuando» reproduce bien el avance narrativo y la relación con el resultado siguiente, sin añadir elementos ajenos al texto.
- source_word: בָעֹמֶר
  english_pob_choice: by the omer
  chosen_spanish: por el omer
  alternatives_spanish:
  - con el omer
  - según el omer
  - en el omer
  lexicon: omer
  rationale: עֹמֶר es una unidad concreta de medida seca. Se conserva como «omer» para mantener el referente cultural y técnico; «por el omer» comunica la medida como estándar de medición sin convertirla en una paráfrasis.
- source_word: הֶעְדִּיף
  english_pob_choice: had nothing left over
  chosen_spanish: no le sobró
  alternatives_spanish:
  - no tuvo exceso
  - no tuvo de sobra
  - no le quedó sobrante
  lexicon: sobrar
  rationale: El verbo expresa la idea de tener excedente o sobrante. «No le sobró» es natural en español y mantiene el contraste con «no le faltó».
- source_word: הַמַּרְבֶּה
  english_pob_choice: the one who gathered much
  chosen_spanish: al que recogió mucho
  alternatives_spanish:
  - al que tenía mucho
  - al que reunió mucho
  lexicon: recoger
  rationale: En el contexto del maná, el participio se entiende según la acción de recoger. «Recogió mucho» hace explícita la acción implícita y preserva el paralelismo con «recogió poco».
- source_word: הֶחְסִיר
  english_pob_choice: had no lack
  chosen_spanish: no le faltó
  alternatives_spanish:
  - no tuvo carencia
  - no careció de nada
  lexicon: faltar
  rationale: El verbo indica faltar o quedar deficiente. «No le faltó» reproduce el balance del hebreo de forma breve y clara, sin perder la idea de suficiencia.
- source_word: הַמַּמְעִיט
  english_pob_choice: the one who gathered little
  chosen_spanish: al que recogió poco
  alternatives_spanish:
  - al que tenía poco
  - al que reunió poco
  lexicon: recoger
  rationale: Como con el participio anterior, el contexto de la recolección del maná permite explicitar la acción. «Recogió poco» mantiene el paralelismo y la simetría del verso.
- source_word: אִישׁ
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - cada cual
  lexicon: cada uno
  rationale: אִישׁ funciona distributivamente. «Cada uno» conserva esa distribución sin forzar una lectura exclusivamente masculina en español.
- source_word: לְפִי אָכְלוֹ
  english_pob_choice: according to what he could eat
  chosen_spanish: según lo que podía comer
  alternatives_spanish:
  - de acuerdo con su comida
  - en proporción a lo que comía
  - según su capacidad de comer
  lexicon: comer
  rationale: La expresión hebrea es idiomática y apunta a la cantidad apta para consumo. «Según lo que podía comer» comunica la medida de necesidad con naturalidad y sin sobreexplicar.
- source_word: לָקָטוּ
  english_pob_choice: gathered
  chosen_spanish: recogió / recogieron
  alternatives_spanish:
  - juntó / juntaron
  - recolectó / recolectaron
  lexicon: recoger
  rationale: לָקָטוּ es el verbo de recoger/reunir en la narrativa del maná. Se usa «recogió» en la cláusula distributiva y se mantiene la misma raíz verbal para conservar cohesión estilística.
theological_decisions:
- issue: Lectura distributiva de אִישׁ ... אָכְלוֹ
  english_pob_reading: Render distributively as 'each one ... what he could eat'
  chosen_spanish_reading: Cada uno ... según lo que podía comer
  alternative_spanish_readings:
  - cada hombre ... según su comer
  - cada persona ... según lo que podía comer
  rationale: El hebreo emplea formas singulares con valor distributivo. «Cada uno» conserva esa fuerza distributiva sin restringir el sentido a varones, y el singular verbal «podía» mantiene el eco del idiomático hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se revisó el texto inglés auditado y no se detectaron revisiones posteriores que obligaran a alterar la estructura de la frase o el sentido básico. La traducción española sigue la misma decisión distributiva y el mismo contraste de suficiencia/sobrante.
  spanish_consistency_notes:
  - Se conserva «omer» como unidad de medida técnica, sin sustituirla por una equivalencia aproximada.
  - Se mantiene el paralelismo «recogió mucho / recogió poco» para reflejar el juego de contraste del hebreo.
  - «No le sobró / no le faltó» reproduce la simetría semántica del texto fuente con español natural.
  - El distributivo «cada uno» evita una lectura masculina exclusiva de אִישׁ en este contexto.
