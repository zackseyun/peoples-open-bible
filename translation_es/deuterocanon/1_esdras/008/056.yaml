translation:
  language: es
  text: Y con ellos, de entre sus hermanos[a], diez hombres. Y les pesé[b] la plata y el oro y los vasos sagrados de la casa de nuestro Señor, que el rey, sus consejeros, los nobles y todo Israel habían dado como regalo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''diez de sus hermanos''. El griego literalmente dice ''de entre sus hermanos, diez hombres''.'
    reason: lexical_alternative
  - marker: b
    text: El griego transmitido trae ἔστησα ('puse' o 'coloqué'), pero el paralelo hebreo lee 'pesé', y el contexto de plata, oro y vasos favorece ese sentido; por eso la traducción adopta 'les pesé'.
    reason: textual_variant
lexical_decisions:
- source_word: μετʼ αὐτῶν ... ἄνδρας δέκα
  english_pob_choice: And with them, from among their brothers, ten men
  chosen_spanish: Y con ellos, de entre sus hermanos, diez hombres
  alternatives_spanish:
  - Y con ellos, diez hombres de entre sus hermanos
  - Y con ellos, de sus hermanos, diez hombres
  lexicon: LSJ
  rationale: Conserva la secuencia abrupta del griego y mantiene explícito ἄνδρας ('hombres'). 'De entre sus hermanos' refleja ἐκ τῶν ἀδελφῶν αὐτῶν con naturalidad en español.
- source_word: ἔστησα αὐτοῖς / ואשקלה על־ידם
  english_pob_choice: I weighed out to them
  chosen_spanish: les pesé
  alternatives_spanish:
  - les asigné
  - les puse delante
  lexicon: LSJ + paralelo MT
  rationale: Aunque el griego transmitido dice ἔστησα, el paralelo hebreo y el contexto de plata, oro y vasos indican el sentido de pesar y entregar formalmente. 'Les pesé' conserva esa tensión textual y la acción concreta.
- source_word: τὸ ἀργύριον καὶ τὸ χρυσίον
  english_pob_choice: the silver and the gold
  chosen_spanish: la plata, el oro
  alternatives_spanish:
  - la plata y el oro
  - el dinero y el oro
  lexicon: LSJ
  rationale: '''Plata'' y ''oro'' son más precisos que ''dinero'' aquí, porque se trata de metales valiosos pesados y transferidos.'
- source_word: τὰ ἱερὰ σκεύη
  english_pob_choice: the holy vessels
  chosen_spanish: los vasos sagrados
  alternatives_spanish:
  - los vasos santos
  - los utensilios sagrados
  - los objetos consagrados
  lexicon: LSJ
  rationale: '''Vasos sagrados'' conserva el valor cultual de σκεύη sin volverlo demasiado técnico; en español bíblico ''vasos'' puede referirse a recipientes u objetos del templo.'
- source_word: τοῦ οἴκου τοῦ κυρίου ἡμῶν
  english_pob_choice: of the house of our Lord
  chosen_spanish: de la casa de nuestro Señor
  alternatives_spanish:
  - de la casa de nuestro Dueño
  - de la casa del Señor nuestro
  lexicon: LSJ
  rationale: Se conserva κύριος como 'Señor', en armonía con el registro bíblico y con el texto griego, sin sustituirlo por una forma de máscara litúrgica. 'Casa' preserva el lenguaje del templo.
- source_word: οὕτως ἐδωρήσατο
  english_pob_choice: had given as a gift
  chosen_spanish: habían dado como ofrenda
  alternatives_spanish:
  - habían dado como regalo
  - habían donado
  lexicon: LSJ
  rationale: El verbo indica dar como regalo. 'Como ofrenda' hace explícita la entrega cultual en este contexto, manteniendo la idea de don previo.
- source_word: οἱ σύμβουλοι αὐτοῦ
  english_pob_choice: his counselors
  chosen_spanish: sus consejeros
  alternatives_spanish:
  - sus counselors
  - sus asesores
  lexicon: LSJ
  rationale: '''Consejeros'' es la equivalencia natural en español para σύμβουλοι en un contexto real.'
- source_word: οἱ μεγιστᾶνες
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los magnates
  - los grandes
  lexicon: LSJ
  rationale: '''Nobles'' comunica el rango elevado sin arcaísmo excesivo; mantiene el sentido de μεγιστᾶνες como grandes del reino.'
theological_decisions:
- issue: κύριος aplicado al templo de Dios en 1 Esdras
  english_pob_reading: our Lord
  chosen_spanish_reading: nuestro Señor
  alternative_spanish_readings:
  - el Señor
  - nuestro Maestro
  rationale: El texto griego dice κυρίου ἡμῶν. Se traduce 'Señor' como término directo para κύριος, sin reemplazarlo por una máscara tipográfica. En este libro griego, no se introduce 'Yahvé' porque el verso no presenta el nombre divino hebreo explícito.
  doctrine_reference: 'DOCTRINE.md: κύριος → Señor/Lord; no masking by default in Spanish'
- issue: Tensión textual entre ἔστησα y el paralelo hebreo de pesar
  english_pob_reading: I weighed out to them
  chosen_spanish_reading: les pesé
  alternative_spanish_readings:
  - les puse delante
  - les asigné
  rationale: La traducción sigue el sentido contextual y el paralelo hebreo, porque el versículo trata de metales y objetos sagrados entregados formalmente. 'Les pesé' preserva la operación física y la tensión documental.
  doctrine_reference: 'PHILOSOPHY.md: Greek primary with parallel-source sanity check for 1 Esdras'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando ambos marcadores de nota en el texto principal: [a] en ''con ellos'' y [b] en ''les pesé''. También se mantuvo la decisión revisada de ''de entre sus hermanos'' para reflejar con más precisión ἐκ τῶν ἀδελφῶν αὐτῶν.'
  spanish_consistency_notes:
  - Se evita la máscara litúrgica 'SEÑOR' y se usa 'Señor' de forma directa para κύριος, coherente con el texto griego y con el criterio POB.
  - '''Vasos sagrados'' conserva un registro bíblico natural en español y no sustituye innecesariamente el término cultual.'
  - 'La frase final mantiene el orden de los donantes del griego: rey, consejeros, nobles y todo Israel.'
