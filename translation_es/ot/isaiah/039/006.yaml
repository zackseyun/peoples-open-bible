review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo: anuncio profético inminente, traslado total de los bienes a Babilonia, y cierre oracular con el nombre divino Yahvé. También preserva correctamente «casa» y el sentido pasivo de וְנִשָּׂא. Sin embargo, «han acumulado» para אָצְרוּ se aleja del matiz específico de guardar/atesorar/almacenar, y el anclaje de la nota [b] en «padres» puede inducir a leer progenitores inmediatos más que antepasados/forefathers; conviene ajustar la frase para mantener mejor el matiz de tesoro almacenado y la referencia histórica.'
  spanish_quality_summary: El español es claro y natural. «Mira, vienen días...» suena idiomático y digno. No obstante, «lo que tus padres han acumulado» es menos preciso que «han guardado/han atesorado», y «hasta hoy» puede afinarse a «hasta este día» o «hasta el día de hoy» para reflejar mejor la fórmula hebrea. La puntuación y el flujo general son buenos.
  glossary_alignment: Se alinea bien con la terminología del proyecto al usar «Yahvé» para יְהוָה. No hay otros términos de glosario especialmente conflictivos en este versículo. La decisión sobre אֲבֹתֶיךָ debe conservar la literalidad de «padres» con nota aclaratoria, como en el rastro inglés.
  issues:
  - severity: medium
    issue: «han acumulado» debilita el matiz de אָצְרוּ
    rationale: El verbo hebreo denota guardar/almacenar/atesorar reservas o tesoros. «Acumular» comunica resultado material, pero pierde el matiz de tesoro guardado que el inglés auditado preserva con «stored up». «Han guardado» o «han atesorado» reflejan mejor la evidencia fuente.
  - severity: low
    issue: «hasta hoy» es algo menos cercano que «hasta este día»
    rationale: «Hasta hoy» es natural, pero la fórmula hebrea עַד הַיּוֹם הַזֶּה se refleja con más cercanía y dignidad en «hasta este día» o «hasta el día de hoy».
  - severity: low
    issue: La nota [a] sobre «Mira» es innecesariamente explicativa
    rationale: La nota inglesa solo preserva una alternativa léxica para הִנֵּה, no una mini justificación estilística. En español conviene una nota más breve y paralela, o incluso omitirla; pero si se conserva, debe centrarse en la alternativa relevante.
  revised_spanish_text: Mira[a], vienen días en que todo lo que hay en tu casa, y lo que tus padres[b] han guardado hasta este día, será llevado a Babilonia; no quedará nada, dice Yahvé.
  revised_footnotes:
  - marker: a
    text: O «He aquí» o «Mira».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tus padres». También puede entenderse «tus antepasados».
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura y el tono del borrador, pero se ajusta אָצְרוּ a «han guardado» para reflejar mejor el sentido de bienes almacenados/atesorados, y se afina עַד הַיּוֹם הַזֶּה con «hasta este día». También se simplifica la nota [a] para que funcione como verdadera alternativa léxica y quede más alineada con el patrón del audit trail inglés.
