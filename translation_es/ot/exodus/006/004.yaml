translation:
  language: es
  text: También establecí mi pacto con ellos, para darles la tierra de Canaán, la tierra de su residencia como forasteros[a], donde residieron como forasteros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la tierra de sus residencias como forasteros, en la cual residieron como forasteros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: I also
  chosen_spanish: También
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: Conserva el valor aditivo de וְגַם sin sobrecargar el español; en este contexto, 'también' enlaza naturalmente con la afirmación anterior.
- source_word: הֲקִמֹתִי
  english_pob_choice: established
  chosen_spanish: establecí
  alternatives_spanish:
  - confirmé
  - afirmé
  - levanté
  lexicon: HALOT
  rationale: Con בְּרִית, קום expresa la acción de instituir/confirmar un pacto. 'Establecí' reproduce bien la fuerza covenantal en español bíblico moderno sin calco forzado.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: '''Pacto'' es el equivalente más directo y amplio para בְּרִית en castellano bíblico actual; ''alianza'' puede sonar más bilateral o político y no siempre refleja la carga del término.'
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto a ellos
  - con los patriarcas
  lexicon: HALOT
  rationale: Mantiene la relación directa del sufijo pronominal y evita añadir especificación no expresada en el hebreo, aunque el contexto se refiera a los patriarcas.
- source_word: לָתֵת לָהֶם
  english_pob_choice: to give them
  chosen_spanish: para darles
  alternatives_spanish:
  - para dar a ellos
  - a fin de darles
  lexicon: HALOT
  rationale: La construcción de infinitivo de propósito se expresa de modo natural con 'para darles'; conserva el dativo sin redundancia innecesaria.
- source_word: אֶרֶץ כְּנָעַן
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - la tierra de Canaan
  - la tierra cananea
  lexicon: HALOT
  rationale: '''Tierra'' mantiene la concreción geográfica y el paralelismo con el segundo sintagma. ''Canaán'' es el nombre propio estándar en español.'
- source_word: אֶרֶץ מְגֻרֵיהֶם
  english_pob_choice: the land of their sojourning
  chosen_spanish: la tierra de su peregrinación
  alternatives_spanish:
  - la tierra de su estadía forastera
  - la tierra de su morada como extranjeros
  lexicon: HALOT
  rationale: מגור expresa residencia temporal como extranjero/forastero. 'Peregrinación' comunica el matiz de transitoriedad y extranjería en un español bíblico legible, aunque 'sojourning' tenga un sentido más técnico.
- source_word: אֲשֶׁר גָּרוּ בָהּ
  english_pob_choice: where they sojourned
  chosen_spanish: donde peregrinaron
  alternatives_spanish:
  - en la que habitaron como forasteros
  - en la que moraron como extranjeros
  lexicon: HALOT
  rationale: גור conserva la idea de residir como forastero; 'peregrinaron' mantiene la conexión semántica con 'peregrinación' y sugiere estancia no permanente, aunque no sea una equivalencia mecánica.
theological_decisions:
- issue: Formulación del vínculo pactual con los patriarcas
  english_pob_reading: I also established my covenant with them
  chosen_spanish_reading: También establecí mi pacto con ellos
  alternative_spanish_readings:
  - También confirmé mi pacto con ellos
  - También afirmé mi pacto con ellos
  rationale: El hebreo presenta una acción divina de instaurar/ratificar el pacto. 'Establecí' conserva la solemnidad del compromiso sin introducir matices doctrinales ajenos al texto.
  doctrine_reference: Pacto abrahámico/patriarcal (Génesis 15; 17; Éxodo 2–6)
- issue: El campo semántico de מגור/גור
  english_pob_reading: the land of their sojourning, where they sojourned
  chosen_spanish_reading: la tierra de su peregrinación, donde peregrinaron
  alternative_spanish_readings:
  - la tierra de su estancia forastera, donde habitaron como extranjeros
  - la tierra de su morada como forasteros, donde moraron como extranjeros
  rationale: Se preserva la tensión entre residencia real y condición de extrañeza. 'Peregrinación' evita reducir el sentido a simple viaje y mantiene el aspecto de vida temporal en tierra ajena.
  doctrine_reference: Tema bíblico de los patriarcas como peregrinos/extranjeros (Génesis 23:4; Hebreos 11:9-10)
- issue: Elección de 'pacto' frente a 'alianza'
  english_pob_reading: my covenant
  chosen_spanish_reading: mi pacto
  alternative_spanish_readings:
  - mi alianza
  - mi convenio
  rationale: '''Pacto'' es el término más estable para ברית en traducciones bíblicas en español y mantiene el peso jurídico-teológico del texto. ''Alianza'' puede funcionar, pero es menos precisa en este contexto.'
  doctrine_reference: Teología bíblica del pacto
translation_notes:
  revision_awareness: 'El borrador español sigue de cerca la revisión más reciente del POB en inglés, que prefirió una formulación más formal del último miembro: ''the land of their sojourning, where they sojourned''. Por eso se conservó la duplicación semántica en español con ''la tierra de su peregrinación, donde peregrinaron'', en lugar de una paráfrasis más interpretativa.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece en este segmento; el texto trata únicamente del pacto y de la tierra prometida.
  - Se eligió 'pacto' como término consistente para בְּרִית, en línea con el uso POB y con el registro bíblico en español.
  - La duplicación 'tierra de su peregrinación / donde peregrinaron' intenta reproducir el paralelismo del hebreo sin sonar excesivamente arcaica.
