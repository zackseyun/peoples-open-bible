    rationale: Dice «O “los israelitas” o “los hijos de Israel”», pero «los hijos de Israel» ya es el texto principal. La nota debe ofrecer alternativas reales, por ejemplo «los israelitas» o «los hijos de Jacob/Israel» solo si estuviera justificado; aquí basta con «los israelitas» y «los hijos de Israel» no como alternativa sino como forma hebrea subyacente.
