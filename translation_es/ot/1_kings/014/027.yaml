revisions:
- from: Así el rey Roboam hizo escudos de bronce en lugar de ellos y los puso[a] en manos de los comandantes de los corredores, los cuales guardaban la entrada de la casa del rey[b].
  to: Así el rey Roboam hizo escudos de bronce en lugar de ellos y los confió[a] a los comandantes de los corredores reales, que guardaban la entrada de la casa del rey[b].
  rationale: Se ajustó «los puso en manos de» a «los confió a» para reflejar mejor el sentido de encargar bajo custodia de וְהִפְקִיד עַל יַד. Se añadió «reales» a «corredores» para conservar la literalidad del hebreo y, a la vez, evitar una lectura moderna equívoca. También se simplificó la relativa a «que guardaban» para mayor naturalidad.
  reviewer_model: gpt-5.4
