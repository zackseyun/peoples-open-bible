translation:
  language: es
  text: Y a todos los que vigilaban la ciudad,[a] escribió que se les dieran porciones asignadas y paga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lotes y paga». El sustantivo griego κλῆρος puede significar literalmente «lote» o «suerte», y también una porción o parte asignada.
    reason: lexical_alternative
lexical_decisions:
- source_word: φρουροῦσι
  english_pob_choice: who guarded
  chosen_spanish: que guardaban
  alternatives_spanish:
  - que estaban guardando
  - que vigilaban
  lexicon: LSJ
  rationale: El participio presente expresa a los encargados de la custodia de la ciudad. «Guardaban» conserva la acción continua o habitual sin sonar forzado en español.
- source_word: πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - ciudad
  lexicon: LSJ
  rationale: El artículo griego se refleja naturalmente con «la ciudad».
- source_word: ἔγραψε
  english_pob_choice: he wrote that
  chosen_spanish: les escribió que
  alternatives_spanish:
  - escribió que
  - les ordenó por escrito que
  lexicon: LSJ
  rationale: Se mantiene el verbo «escribir» del griego, con el dativo implícito en español para el destinatario. No se reemplaza por «ordenó» porque el texto dice literalmente que escribió.
- source_word: δοῦναι
  english_pob_choice: should be given
  chosen_spanish: se les dieran
  alternatives_spanish:
  - darles
  - que se les diera
  lexicon: LSJ
  rationale: El infinitivo dependiente de ἔγραψε expresa el contenido de la instrucción escrita. La pasiva impersonal española reproduce bien la idea de provisión ordenada.
- source_word: κλήρους
  english_pob_choice: allotments
  chosen_spanish: lotes
  alternatives_spanish:
  - suerte
  - porciones
  - partes
  lexicon: LSJ
  rationale: κλῆρος puede significar «lote», «porción» o «asignación». «Lotes» conserva la posibilidad lexical de «sort/lot» y la idea de porciones asignadas sin cerrarla excesivamente.
- source_word: ὀψώνια
  english_pob_choice: wages
  chosen_spanish: paga
  alternatives_spanish:
  - salario
  - remuneración
  - sueldo
  lexicon: BDAG
  rationale: En contexto administrativo/militar, ὀψώνια denota compensación o paga. «Paga» es natural en español y conserva mejor que «salario» el matiz de remuneración asignada.
translation_notes:
  revision_awareness: El texto inglés POB tradujo κλήρους como «allotments» y añadió una nota sobre «lots»/«share/portion». En español se eligió «lotes» para conservar esa ambigüedad administrativamente concreta sin perder la resonancia de reparto por suerte/asignación.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de esta unidad porque no aparece ningún tetragrámaton ni equivalente en el versículo.
  - Se evitó «señor»/«ordenó» para no sustituir el verbo explícito «escribió» del griego.
  - «Paga» se prefirió a «salario» por ser más breve y acorde al registro de provisión militar o administrativa.
