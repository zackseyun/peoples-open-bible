translation:
  language: es
  text: Y tú tampoco quebrantarás ni una sola de las palabras de tu señor, sino que las cumplirás plenamente, exactamente como te he mandado, y no tardarás en hacerlas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐ παραβήσῃ
  english_pob_choice: must not transgress
  chosen_spanish: no quebrantarás
  alternatives_spanish:
  - no transgredirás
  - no violarás
  - no pasarás por alto
  lexicon: BDAG
  rationale: παραβαίνω expresa la idea de traspasar o infringir un mandato. En español, «quebrantar» conserva bien la fuerza normativa sin sonar tan técnico como «transgredir» y sin perder claridad.
- source_word: ἓν τι τῶν ῥημάτων
  english_pob_choice: a single one of your lord’s words
  chosen_spanish: ni una sola de las palabras
  alternatives_spanish:
  - ni una palabra
  - ni una sola cosa de las palabras
  - ni una sola de sus palabras
  lexicon: BDAG
  rationale: La expresión distributiva enfatiza que ni un elemento debe omitirse o infringirse. «Ni una sola de las palabras» mantiene ese énfasis sin endurecer el español.
- source_word: τοῦ κυρίου σου
  english_pob_choice: your lord
  chosen_spanish: de tu señor
  alternatives_spanish:
  - de tu amo
  - de tu dueño
  lexicon: BDAG
  rationale: Aquí κύριος se refiere a un superior humano en una cadena de mando, no al título divino. «Señor» es la equivalencia natural y respeta el valor léxico sin convertirlo en un título eclesial.
- source_word: ἐπιτελῶν ἐπιτελέσεις
  english_pob_choice: you shall surely carry out
  chosen_spanish: cumplirás con toda exactitud
  alternatives_spanish:
  - cumplirás plenamente
  - realizarás con exactitud
  - llevarás a cabo por completo
  lexicon: BDAG
  rationale: La combinación participio + verbo finito intensifica la orden. «Con toda exactitud» busca reproducir esa insistencia enfática sin una repetición forzada en español.
- source_word: καθότι προστέταχά σοι
  english_pob_choice: exactly as I have commanded you
  chosen_spanish: como te he mandado
  alternatives_spanish:
  - tal como te he mandado
  - exactamente como te he mandado
  - según te he mandado
  lexicon: BDAG
  rationale: προστέταχά σοι expresa mandato directo. En español, la exactitud ya quedó marcada en la cláusula anterior, así que «como te he mandado» mantiene naturalidad y fidelidad.
- source_word: οὐ μακρυνεῖς
  english_pob_choice: you shall not delay
  chosen_spanish: no tardarás
  alternatives_spanish:
  - no demorarás
  - no te retrasarás
  - no dilatarás
  lexicon: LSJ
  rationale: En este contexto, μακρύνω significa prolongar o diferir la acción. «No tardarás» comunica bien la urgencia del imperativo y suena natural en español.
- source_word: τοῦ ποιῆσαι αὐτά
  english_pob_choice: to do them
  chosen_spanish: en hacerlas
  alternatives_spanish:
  - para hacerlas
  - de hacerlas
  - a hacerlas
  lexicon: BDAG
  rationale: El infinitivo articular con τοῦ después de μακρυνεῖς expresa la acción que no debe demorarse. «En hacerlas» refleja mejor el matiz de retraso respecto de la acción que un simple «hacerlas».
theological_decisions:
- issue: κύριος referido a un superior humano y no al Nombre divino
  english_pob_reading: your lord
  chosen_spanish_reading: tu señor
  alternative_spanish_readings:
  - tu amo
  - tu dueño
  rationale: El contexto es militar y administrativo, con una orden emitida por una autoridad humana. Por eso no se debe volver a una fórmula reverencial que sugiera el título divino.
  doctrine_reference: 'DOCTRINE.md: κύριος es contexto-sensible; para referentes humanos, se traduce según el rango y no como título divino'
translation_notes:
  revision_awareness: La versión española corrige la omisión del marcador de nota detectada en la validación anterior eliminando toda nota no anclada. Se mantiene la lectura contextual de κύριος como superior humano y se preserva el énfasis intensivo del griego sin calco excesivo.
  spanish_consistency_notes:
  - Se mantiene «señor» en minúscula por tratarse de un referente humano.
  - Se evita «Cristo»/«SEÑOR» porque no hay referencia cristológica ni al nombre divino.
  - «No tardarás» conserva el tono imperativo urgente del final de la frase.
  - La coordinación inicial con «Y tú también» reproduce el énfasis del griego καὶ σὺ δὲ.
