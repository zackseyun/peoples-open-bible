translation:
  language: es
  text: El hombre que halaga a su prójimo extiende una red para sus pasos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su amigo». El hebreo רֵעַ puede denotar vecino, amigo o compañero.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para sus pasos» o «para sus pies»; imagen de colocar una trampa en su trayecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֶּבֶר
  english_pob_choice: A man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Una persona
  - Quien
  lexicon: HALOT
  rationale: גֶּבֶר es masculino singular y en el proverbio funciona de manera representativa. «El hombre» conserva la forma proverbial y la referencia genérica sin neutralizar indebidamente el rasgo masculino del hebreo.
- source_word: מַחֲלִיק
  english_pob_choice: who flatters
  chosen_spanish: que halaga
  alternatives_spanish:
  - que habla con suavidad
  - que endulza sus palabras
  lexicon: HALOT
  rationale: El participio hiphil de חלק aquí expresa la idea de hablar con suavidad con intención lisonjera. «Halaga» comunica de forma natural y breve la fuerza ética negativa del proverbio.
- source_word: עַל רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su amigo
  - a su compañero
  lexicon: HALOT
  rationale: רֵעַ puede significar vecino, amigo o compañero. En español, «prójimo» preserva el sentido relacional amplio y la carga ética del dicho sapiencial mejor que «amigo», que sería demasiado estrecho.
- source_word: רֶשֶׁת
  english_pob_choice: a net
  chosen_spanish: una red
  alternatives_spanish:
  - una trampa
  - un lazo
  lexicon: HALOT
  rationale: רֶשֶׁת nombra un objeto concreto para capturar. «Red» conserva la imagen material básica del hebreo con naturalidad en español.
- source_word: פּוֹרֵשׂ
  english_pob_choice: spreads
  chosen_spanish: extiende
  alternatives_spanish:
  - tiende
  - despliega
  lexicon: HALOT
  rationale: El participio de פרש significa extender o desplegar. «Extiende» funciona bien con «una red» y mantiene la metáfora de caza/trampa.
- source_word: עַל פְּעָמָיו
  english_pob_choice: for his steps
  chosen_spanish: para sus pasos
  alternatives_spanish:
  - para sus pies
  - en su camino
  lexicon: HALOT
  rationale: פְּעָמִים alude literalmente a pasos o pisadas. «Para sus pasos» reproduce la imagen sin convertirla en una paráfrasis más libre como «en su camino».
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y mantiene la imagen proverbial de la trampa en los pasos. Se adopta «prójimo» para רֵעַ por su amplitud relacional en español, y «red» para רֶשֶׁת como equivalente concreto y natural. No se introducen cambios textuales respecto del paquete fuente; la decisión principal es idiomática, no doctrinal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un sustituto divino.
  - «Halaga» se usa aquí con valor negativo, acorde con el sentido sapiencial de lisonja engañosa.
  - «Prójimo» se eligió por amplitud semántica; si el contexto editorial prefiriera mayor literalidad, podría alternarse con «amigo» en nota.
  - La imagen de «red» y «pasos» conserva el paralelismo hebreo sin reformularlo a un abstracto como «trampa» o «camino».
