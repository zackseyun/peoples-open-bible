translation:
  language: es
  text: Estos son los enumerados de las familias de los hijos de Merari, a quienes Moisés y Aarón enumeraron conforme a la boca de Yahvé[a], por mano de Moisés.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «según la boca de Yahvé», es decir, «por mandato de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «por la mano de Moisés», es decir, «por medio de Moisés».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos
  lexicon: HALOT
  rationale: La fórmula española presenta de modo natural una declaración resumidora y conserva el valor demostrativo del hebreo.
- source_word: פְקוּדֵי
  english_pob_choice: the counted men
  chosen_spanish: los contados
  alternatives_spanish:
  - los enumerados
  - los registrados
  - el censo
  lexicon: HALOT
  rationale: En este contexto censal, el participio sustantivado expresa a las personas contadas; «los contados» mantiene la correspondencia léxica sin añadir matiz militar explícito que el versículo no exige.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: of the families
  chosen_spanish: de las familias
  alternatives_spanish:
  - de los clanes
  lexicon: HALOT
  rationale: «Familias» reproduce de manera directa el término hebreo y funciona bien en la cadena constructa.
- source_word: בְּנֵי מְרָרִי
  english_pob_choice: of the sons of Merari
  chosen_spanish: de los hijos de Merari
  alternatives_spanish:
  - de los meraritas
  - de los hijos de Merarí
  lexicon: HALOT
  rationale: Se mantiene la expresión filial del hebreo para mayor transparencia textual. «Merarí» es posible, pero «Merari» coincide con el uso transliterado habitual en la obra fuente.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - que
  - los cuales
  lexicon: HALOT
  rationale: Se refiere a personas contadas; «a quienes» conserva mejor la función relativa de objeto directo que el hebreo desempeña en español natural.
- source_word: פָּקַד
  english_pob_choice: counted
  chosen_spanish: contaron
  alternatives_spanish:
  - numeraron
  - registraron
  - musteraron
  lexicon: HALOT
  rationale: Se conserva la repetición léxica con פְקוּדֵי mediante la raíz española «contar», que es la opción más clara y natural aquí.
- source_word: עַל פִּי יְהוָה
  english_pob_choice: according to the mouth of Yahweh
  chosen_spanish: conforme a la boca de Yahvé
  alternatives_spanish:
  - según la boca de Yahvé
  - de acuerdo con la boca de Yahvé
  - por mandato de Yahvé
  lexicon: HALOT
  rationale: «Boca» mantiene la imaginería hebrea auditiva y formal del original; «conforme a» comunica la relación normativa. No se sustituye por una explicación interpretativa en el texto principal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio de la obra de traducir el Tetragrama por el nombre divino «Yahvé», preservando la referencia personal del texto hebreo.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por mano de Moisés
  alternatives_spanish:
  - por medio de Moisés
  - a través de Moisés
  - por la mano de Moisés
  lexicon: HALOT
  rationale: La locución hebrea de agencia se conserva de forma idiomática en español con «por mano de», que mantiene la imagen y permite una lectura transparente del original.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama y la política de la obra es no ocultarlo mediante una sustitución titular. «Yahvé» es la forma española establecida para reflejar el nombre divino con transparencia auditada.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Mantenimiento de la imagen hebrea עַל פִּי / בְּיַד
  english_pob_reading: according to the mouth of Yahweh / by the hand of Moses
  chosen_spanish_reading: conforme a la boca de Yahvé / por mano de Moisés
  alternative_spanish_readings:
  - según la boca de Yahvé / por la mano de Moisés
  - por mandato de Yahvé / por medio de Moisés
  rationale: Se preserva la metáfora de 'boca' y 'mano' en el texto principal, como hace el audit trail inglés, para dejar visible la forma hebrea; la nota permite expresar el sentido idiomático sin borrar la imagen original.
  doctrine_reference: Principio de transparencia formal con aclaración lexical en nota
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó עַל־פִּי יְהוָה de 'at the mouth of Yahweh' a 'according to the mouth of Yahweh' para reflejar con mayor precisión la relación normativa del hebreo; la redacción española sigue ese ajuste con 'conforme a la boca de Yahvé', manteniendo al mismo tiempo la imagen literal en el texto y la aclaración idiomática en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «Moisés» y «Aarón» con la ortografía española habitual.
  - «Por mano de» se conserva como calco controlado de agencia, no como galicismo, porque está anclado en el hebreo y aclarado por nota.
  - No se introduce «censo» en el cuerpo del verso para no añadir un sustantivo no presente; la idea de enumeración queda en «los contados».
