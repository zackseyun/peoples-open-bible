id: JOS.17.9
reference: Joshua 17:9
source:
  edition: WLC
  text: וְ/יָרַ֣ד הַ/גְּבוּל֩ נַ֨חַל קָנָ֜ה נֶ֣גְבָּ/ה לַ/נַּ֗חַל עָרִ֤ים הָ/אֵ֨לֶּה֙ לְ/אֶפְרַ֔יִם בְּ/ת֖וֹךְ עָרֵ֣י מְנַשֶּׁ֑ה וּ/גְב֤וּל מְנַשֶּׁה֙ מִ/צְּפ֣וֹן לַ/נַּ֔חַל וַ/יְהִ֥י תֹצְאֹתָ֖י/ו הַ/יָּֽמָּ/ה׃
translation:
  text: Then the border went down to the Brook of Kanah[a], south of the brook. These cities belonged to Ephraim among the cities of Manasseh, and the border of Manasseh was on the north side of the brook[c][b], and its end was at the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Wadi Kanah.' The Hebrew נחל can refer to a seasonal streambed or ravine as well as a brook.
    reason: lexical_alternative
  - marker: b
    text: That is, Ephraim had cities situated within the territory assigned to Manasseh.
    reason: cultural_note
  - marker: c
    text: '''The sea'' here refers to the Mediterranean Sea.'
    reason: cultural_note
lexical_decisions:
- source_word: וְיָרַד
  chosen: Then ... went down
  alternatives:
  - and descended
  - and went down
  lexicon: HALOT
  rationale: In boundary descriptions ירד commonly describes the line descending in elevation or direction. 'Went down' is natural modern English; 'Then' captures the narrative-sequential waw without over-literal repetition of 'and'.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: In allotment texts גבול refers to a territorial boundary line. 'Border' is concise and idiomatic in English.
- source_word: נַחַל קָנָה
  chosen: the Brook of Kanah
  alternatives:
  - the Wadi Kanah
  - the Kanah brook
  lexicon: HALOT
  rationale: נחל can denote a wadi or streamcourse. 'Brook' is a readable compromise in English for a named watercourse; the proper name is transliterated as 'Kanah' per the translation philosophy on names.
- source_word: נֶגְבָּה לַנַּחַל
  chosen: southward to the brook
  alternatives:
  - to the south of the brook
  - southward along the brook
  lexicon: HALOT
  rationale: נֶגְבָּה marks southward/south side orientation. Given the syntax of the boundary notice, 'southward to the brook' best preserves the directional movement without over-specifying whether the line ran along or merely toward the stream.
- source_word: עָרִים הָאֵלֶּה לְאֶפְרַיִם
  chosen: These cities belonged to Ephraim
  alternatives:
  - these cities were Ephraim's
  - these cities were for Ephraim
  lexicon: HALOT
  rationale: The verbless clause indicates possession/allotment. 'Belonged to Ephraim' makes the territorial sense explicit in natural English.
- source_word: בְּתוֹךְ עָרֵי מְנַשֶּׁה
  chosen: among the cities of Manasseh
  alternatives:
  - in the midst of the cities of Manasseh
  - within the cities of Manasseh
  lexicon: HALOT
  rationale: בתוך here indicates inclusion/enclaving. 'Among' is idiomatic and communicates that Ephraimite cities were situated within Manassehite territory.
- source_word: וּגְבוּל מְנַשֶּׁה מִצְּפוֹן לַנַּחַל
  chosen: and the border of Manasseh was on the north side of the brook
  alternatives:
  - and Manasseh's border was north of the brook
  - and the border of Manasseh was to the north of the brook
  lexicon: HALOT
  rationale: מִצְּפוֹן expresses location on/from the north side. 'On the north side of the brook' fits the boundary context and balances precision with readability.
- source_word: וַיְהִי תֹצְאֹתָיו הַיָּמָּה
  chosen: and its end was at the sea
  alternatives:
  - and its goings out were toward the sea
  - and its extremities reached the sea
  lexicon: HALOT
  rationale: תוצאות in boundary formulas refers to the termination or outgoing point(s) of a border. Singular English 'its end' is smoother than the literal plural and adequately represents the formula. 'The sea' in this geographic context refers to the Mediterranean.
