translation:
  language: es
  text: 'Jonatán respondió y dijo a Adonías[a]: «Al contrario, nuestro señor el rey David ha hecho rey a Salomón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «Pero nuestro señor el rey David ha hecho rey a Salomón». El hebreo אֲבָל puede traducirse de manera más mínima como «pero», aunque aquí lleva fuerza correctiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: En español, «respondió» mantiene el valor de respuesta en diálogo y suena natural junto con el verbo siguiente. Se conserva el paralelismo narrativo hebreo sin volverlo pesado.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: אמר es el verbo normal de decir. Junto con «respondió», reproduce la secuencia hebrea «respondió y dijo» de manera idiomática en español.
- source_word: לַאֲדֹנִיָּהוּ
  english_pob_choice: to Adonijah
  chosen_spanish: a Adonías
  alternatives_spanish:
  - para Adonías
  lexicon: HALOT
  rationale: El nombre propio se translitera según el uso español del proyecto; la preposición ל se vierte naturalmente con «a» en este contexto de destinatario del habla.
- source_word: אֲבָל
  english_pob_choice: On the contrary
  chosen_spanish: Al contrario
  alternatives_spanish:
  - Pero
  - Sin embargo
  lexicon: HALOT
  rationale: La partícula tiene aquí fuerza correctiva y de contraste; «Al contrario» expresa mejor esa corrección que un simple «pero».
- source_word: אֲדֹנֵינוּ
  english_pob_choice: our lord
  chosen_spanish: nuestro señor
  alternatives_spanish:
  - nuestro amo
  lexicon: HALOT
  rationale: En el contexto real, el término funciona como título deferente dirigido al rey. «Nuestro señor» conserva el valor de deferencia sin introducir una formulación más rígida o menos natural.
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El hebreo lleva el título definido; en español, «el rey» es la forma directa y clara, y mantiene el valor titulativo antes del nombre propio.
- source_word: הִמְלִיךְ
  english_pob_choice: has made Solomon king
  chosen_spanish: ha hecho rey a Salomón
  alternatives_spanish:
  - ha proclamado rey a Salomón
  - ha puesto a Salomón como rey
  lexicon: HALOT
  rationale: El hifil de מלך significa causar que alguien sea rey. «Ha hecho rey a Salomón» conserva esa fuerza causativa sin añadir la especificidad de «ungido» que no está en el verbo.
- source_word: אֶת שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: a Salomón
  alternatives_spanish:
  - Salomón
  lexicon: HALOT
  rationale: En español, con el verbo causativo «ha hecho rey», el objeto personal se expresa naturalmente con «a». Se mantiene el nombre propio sin traducir el marcador de objeto como tal.
theological_decisions:
- issue: El alcance de אֲבָל como corrección enfática
  english_pob_reading: On the contrary
  chosen_spanish_reading: Al contrario
  alternative_spanish_readings:
  - Pero
  - Sin embargo
  rationale: La escena exige una refutación explícita de la impresión contraria; «Al contrario» refleja mejor la réplica correctiva que un conector meramente adversativo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se corrigió el fallo anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español donde corresponde, junto a la forma de destino «Adonías[a]».
  spanish_consistency_notes:
  - Se mantuvo un registro cortesano y bíblico claro, con «nuestro señor el rey David» como apposición natural.
  - Se evitó «Cristo» o terminología no presente en el versículo.
  - Se preservó la fuerza causativa de הִמְלִיךְ con una construcción española idiomática.
  - La puntuación de cita sigue el uso español moderno con comillas angulares para el discurso directo.
