    rationale: La nota explica el verbo Ἐκλείπομεν («Vamos desfalleciendo día tras día»), pero en el texto está colocada sobre «para que se fueran[a]», que corresponde a τοῦ ἀπελθεῖν. Esto distorsiona la evidencia léxica y debe corregirse.
  - severity: medium
    issue: «Los seguían instando y presionando» añade un objeto explícito no presente en el griego.
    rationale: El original dice que seguían urgiendo e insistiendo en irse/retirarse; no especifica aquí a quién instaban. En español, una formulación sin «los» evita una precisión innecesaria y suena más natural.
  - severity: low
    issue: «Para que se fueran» es menos directo que una formulación militar como «para retirarse».
    rationale: Ambas son posibles, pero «retirarse» refleja mejor el contexto de repliegue militar y evita una subordinada algo más pesada.
