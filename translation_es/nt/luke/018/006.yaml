translation:
  language: es
  text: 'Y dijo el Señor[a]: «Escuchen lo que dice el juez injusto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el juez inicuo». La expresión griega es literalmente «el juez de injusticia» o «el juez de iniquidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: El aoristo introductorio de λέγω se traduce naturalmente como pasado simple narrativo. «Dijo» es la forma más idiomática y directa en español.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: δέ marca continuación narrativa; «Y» conserva esa conexión sin añadir contraste ni temporalidad excesiva.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el maestro
  lexicon: BDAG
  rationale: Se mantiene el valor titular y cristológico de κύριος según el criterio del proyecto. «Señor» es el equivalente español natural y reverente, preferible a «maestro» por el contexto lucano.
- source_word: Ἀκούσατε
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Presten atención
  lexicon: BDAG
  rationale: El imperativo aoristo exige atención activa. En español, el plural «Escuchen» comunica con claridad la exhortación y suena natural en el discurso directo.
- source_word: τί
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - qué
  lexicon: BDAG
  rationale: En español, tras «escuchen» la construcción más natural es «lo que dice», que expresa el contenido de la palabra interrogativa τί sin volverla forzada.
- source_word: ὁ κριτὴς
  english_pob_choice: the judge
  chosen_spanish: el juez
  lexicon: BDAG
  rationale: Traducción directa del sustantivo; el artículo definido remite al juez ya introducido en la parábola.
- source_word: τῆς ἀδικίας
  english_pob_choice: unrighteous
  chosen_spanish: injusto
  alternatives_spanish:
  - de injusticia
  - malvado
  lexicon: BDAG
  rationale: El genitivo es cualitativo/atributivo. «Juez injusto» reproduce bien la fuerza moral y legal de ἀδικία en español, y es la opción más transparente y natural para el lector.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - está diciendo
  lexicon: BDAG
  rationale: El presente histórico se mantiene con «dice», que conserva viveza y correspondencia natural con el griego.
theological_decisions:
- issue: Rendering of κύριος as a title for Jesus
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el maestro
  rationale: Se conserva el tratamiento titular de κύριος aplicado a Jesús en Lucas. «Señor» mantiene el peso cristológico sin explicar ni suavizar el término con una paráfrasis funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord)'
translation_notes:
  revision_awareness: El texto en inglés fue revisado y quedó sin cambios; el cotejo posterior reporta alta concordancia y ningún problema. La versión española sigue ese estado estable, conservando la misma decisión léxica principal para κύριος y la misma alternativa semántica para τῆς ἀδικίας mediante una nota breve.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, en coherencia con el tratamiento POB del término cuando se refiere a Jesús.
  - Se usa «juez injusto» como equivalente idiomático de ὁ κριτὴς τῆς ἀδικίας, sin perder la posibilidad literal reflejada en la nota.
  - El imperativo plural «Escuchen» evita una calca singular y corresponde al tono exhortativo del griego.
  - La puntuación y las comillas siguen el uso editorial habitual en español bíblico moderno.
