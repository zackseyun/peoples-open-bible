theological_decisions:
- issue: Genealogical names diverge from more familiar biblical spellings
  chosen_reading: 'Retain transliterated forms close to the Greek witness: Gersam, Kaath, Ambram, Isachar, Chebron, Ozeel, Mooli, Mouses, Jochebed.'
  alternative_readings:
  - Normalize to Masoretic/English Bible forms such as Gershon, Kohath, Amram, Izhar, Hebron, Uzziel, Mahli, Mushi
  rationale: The project philosophy prefers original-language primacy and transliterated names. Since this chapter is a genealogical notice in a Greek witness, preserving the Greek-form names keeps the translation auditable and avoids silently harmonizing to later familiar forms.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; DOCTRINE.md: transliterate names'
- issue: Chronological statement about Jochebed as 'my daughter'
  chosen_reading: Translate the Greek claim directly without harmonizing it to Exodus genealogies.
  alternative_readings:
  - Emend or paraphrase to avoid the apparent genealogical difficulty
  - Interpret 'daughter' loosely as descendant
  rationale: The Greek witness explicitly says 'my daughter.' Transparency requires rendering the text as it stands and leaving harmonization questions to notes rather than altering the translation.
  doctrine_reference: 'PHILOSOPHY.md: translate what is in the source text and expose tensions rather than bury them'
