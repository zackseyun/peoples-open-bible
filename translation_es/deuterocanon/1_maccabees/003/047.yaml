    issue: Coordinación ambigua de «cilicio y ceniza sobre sus cabezas»
    rationale: Aunque el inglés auditado suavizó la repetición verbal, en español la frase «se vistieron de cilicio y ceniza sobre sus cabezas» no separa con suficiente claridad los dos gestos. El original griego enumera actos distintos de luto; conviene explicitarlos con una estructura natural en español.
  revised_spanish_text: Y ayunaron aquel día, y se vistieron de cilicio, y pusieron ceniza sobre sus cabezas, y rasgaron sus vestiduras.
  revision_rationale: Se introduce el verbo «pusieron» para evitar la ambigüedad sintáctica creada por la coordinación bajo «se vistieron de». Esta pequeña reparación conserva todos los elementos del griego y los presenta con claridad idiomática en español.
