  text: אֲשֶׁ֤ר הראית/נו צָר֥וֹת רַבּ֗וֹת וְ/רָ֫ע֥וֹת תָּשׁ֥וּב תחיי/נו וּֽ/מִ/תְּהֹמ֥וֹת הָ֝/אָ֗רֶץ תָּשׁ֥וּב תַּעֲלֵֽ/נִי׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/071/020.yaml
  text: You[a], who have made us see many troubles and calamities, will return and revive us[d][c][b]; and from the depths of the earth you will return and bring me up.
  footnotes:
  - marker: a
    text: 'Or ''have shown us many troubles and calamities.'' The Hebrew verb is causative: ''made us see'' or ''shown us.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'and many evils.' Here 'evils' refers to calamities or afflictions, not moral evil.
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew shifts from ''us'' to ''me'': ''revive us ... bring me up.'''
    reason: textual_variant
  - marker: d
    text: '''From the depths of the earth'' may refer metaphorically to extreme humiliation or near death, and may also echo descent to the grave.'
    reason: cultural_note
