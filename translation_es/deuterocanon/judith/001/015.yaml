translation:
  language: es
  text: Y capturó a Arfaxad en los montes de Ragau[a], y lo venció por la fuerza con sus jabalinas, y lo destruyó hasta aquel día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Rages», forma más tradicional del nombre del lugar en algunas traducciones; el testimonio griego aquí lee Ragau.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔλαβε
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - apresó
  - se apoderó de
  lexicon: BDAG
  rationale: En un contexto militar, el verbo indica la captura de un enemigo. «Capturó» comunica mejor la acción hostil que un simple «tomó» y es natural en español.
- source_word: ἐν τοῖς ὄρεσι
  english_pob_choice: in the mountains
  chosen_spanish: en los montes
  alternatives_spanish:
  - en las montañas
  - en la cordillera
  - en el país montañoso
  lexicon: BDAG
  rationale: «Montes» conserva bien el plural griego de ὄρη y suena sobrio en español bíblico. «Montañas» también sería posible, pero «montes» evita una repetición demasiado moderna.
- source_word: Ῥαγαῦ
  english_pob_choice: Ragau
  chosen_spanish: Ragau
  alternatives_spanish:
  - Rages
  lexicon: LSJ
  rationale: Se mantiene la transliteración del testimonio griego de Swete, siguiendo la preferencia del proyecto por la forma del idioma fuente. La variante tradicional «Rages» queda reflejada en la nota.
- source_word: κατηνάγκισεν
  english_pob_choice: overpowered
  chosen_spanish: lo sobrepujó
  alternatives_spanish:
  - lo venció por la fuerza
  - lo dominó
  - lo forzó
  lexicon: LSJ
  rationale: El verbo expresa constricción o sometimiento por la fuerza. «Lo sobrepujó» intenta recoger esa superioridad violenta sin añadir un matiz de mera persuasión; aunque menos común, mantiene la fuerza del combate.
- source_word: σιβύναις
  english_pob_choice: javelins
  chosen_spanish: jabalinas
  alternatives_spanish:
  - lanzas
  - dardos
  - venablos
  lexicon: LSJ
  rationale: σiβύνη designa una arma arrojadiza o lanza ligera de tipo cazador. «Jabalinas» es el equivalente español más cercano y conserva la imagen concreta del arma.
- source_word: ἐξωλέθρευσεν
  english_pob_choice: destroyed
  chosen_spanish: lo destruyó
  alternatives_spanish:
  - lo aniquiló
  - lo exterminó
  - lo destruyó por completo
  lexicon: BDAG
  rationale: El verbo apunta a destrucción total, más fuerte que «matar». «Lo destruyó» mantiene la intensidad sin sobrecargar el texto; el contexto bélico ya comunica la derrota completa.
- source_word: ἕως τῆς ἡμέρας ἐκείνης
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta aquel día
  - hasta hoy
  - hasta ese día
  lexicon: BDAG
  rationale: «Hasta este día» reproduce naturalmente la deixis del griego y es la forma más idiomática en español para indicar la vigencia del hecho desde la perspectiva del narrador.
translation_notes:
  revision_awareness: 'El texto español sigue el ajuste reciente del POB inglés en ἕως τῆς ἡμέρας ἐκείνης: se vierte de manera natural como «hasta este día», no como una calca más marcada. También se preserva la transliteración de Ῥαγαῦ del testimonio griego, con nota de variante tradicional.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y directo.
  - «Hasta este día» conserva la perspectiva narrativa del original.
  - La nota de variante se vincula únicamente al topónimo Ragau y no introduce otros cambios textuales.
