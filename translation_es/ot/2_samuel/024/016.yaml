translation:
  language: es
  text: 'Cuando el ángel extendió su mano contra Jerusalén para destruirla, Yahvé desistió[a] respecto de la calamidad y dijo al ángel que destruía al pueblo: «Basta[b]; ahora retira tu mano». Y el ángel de Yahvé estaba junto a la era de Arauná, el jebuseo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé cedió respecto del desastre». El hebreo dice literalmente «desistió/cedió respecto de la calamidad/desastre»; aquí רָעָה significa calamidad, no mal moral.'
    reason: lexical_alternative
  - marker: b
    text: Ornán es la forma del nombre que aparece en el pasaje paralelo de 1 Crónicas 21:15.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּשְׁלַח יָדוֹ
  english_pob_choice: stretched out his hand
  chosen_spanish: extendió su mano
  alternatives_spanish:
  - estiró su mano
  - alzó su mano
  - tendió su mano
  lexicon: HALOT
  rationale: El hebreo expresa el modismo de extender la mano para una acción. «Extendió su mano» conserva la imagen concreta y suena natural en español sin perder el matiz de inicio de una acción hostil.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: En este contexto narrativo el referente es un agente celestial de juicio; «ángel» es la equivalencia adecuada y mantiene la lectura del POB inglés.
- source_word: לְשַׁחֲתָהּ
  english_pob_choice: to destroy it
  chosen_spanish: para destruirla
  alternatives_spanish:
  - para arruinarla
  - para llevarla a destrucción
  lexicon: HALOT
  rationale: El infinitivo indica acción destructiva contra Jerusalén. «Destruirla» es directo, idiomático y fiel al valor verbal del hebreo.
- source_word: וַיִּנָּחֶם יְהוָה אֶל הָרָעָה
  english_pob_choice: the LORD relented concerning the calamity
  chosen_spanish: Yahvé se arrepintió respecto de la calamidad
  alternatives_spanish:
  - Yahvé se retractó respecto de la calamidad
  - Yahvé desistió de la calamidad
  lexicon: HALOT
  rationale: נחם en nifal puede expresar arrepentimiento/ceder/relentir. Siguiendo la nota del POB inglés, «calamidad» evita leer רָעָה como mal moral; «se arrepintió respecto de» conserva la fuerza antropopática del hebreo y el régimen con אֶל.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se mantiene la transliteración del Nombre divino según la norma del proyecto, en lugar de ocultarlo con un sustituto tradicional.
- source_word: הַמַּשְׁחִית בָּעָם
  english_pob_choice: who was destroying the people
  chosen_spanish: que destruía al pueblo
  alternatives_spanish:
  - que estaba destruyendo al pueblo
  - el que destruía al pueblo
  lexicon: HALOT
  rationale: El participio funciona de modo atributivo. «Que destruía al pueblo» preserva la acción en curso y resulta natural en español.
- source_word: רַב
  english_pob_choice: Enough
  chosen_spanish: Basta
  alternatives_spanish:
  - Es suficiente
  - Ya basta
  - Basta ya
  lexicon: HALOT
  rationale: Aquí רַב funciona como interjección de suficiencia. «Basta» reproduce con claridad la fuerza imperativa y la brevedad del original.
- source_word: עַתָּה הֶרֶף יָדֶךָ
  english_pob_choice: now withdraw your hand
  chosen_spanish: ahora retira tu mano
  alternatives_spanish:
  - ahora deja caer tu mano
  - ahora detén tu mano
  - ahora suelta tu mano
  lexicon: HALOT
  rationale: הרף expresa cesar o desistir; con «tu mano» forma un modismo de detener la acción. «Retira tu mano» conserva el gesto corporal y comunica con claridad el cese de la destrucción.
- source_word: וּמַלְאַךְ יְהוָה
  english_pob_choice: And the angel of Yahweh
  chosen_spanish: Y el ángel de Yahvé
  alternatives_spanish:
  - Y el ángel de Yahweh
  lexicon: HALOT
  rationale: Se conserva la construcción posesiva y la terminología del Nombre divino del proyecto, evitando una sustitución por «el SEÑOR».
- source_word: הָיָה עִם
  english_pob_choice: was by
  chosen_spanish: estaba junto a
  alternatives_spanish:
  - estaba cerca de
  - estaba al lado de
  - estaba en
  lexicon: HALOT
  rationale: עִם puede expresar cercanía o ubicación asociada. «Estaba junto a» comunica proximidad locativa de manera natural en español.
- source_word: גֹּרֶן
  english_pob_choice: threshing floor
  chosen_spanish: la era
  alternatives_spanish:
  - la era de trillar
  - la era de la trilla
  lexicon: HALOT
  rationale: En español bíblico «era» es el término tradicional y claro para el espacio de trillar, equivalente funcional de «threshing floor». Se evita el calco «piso de trilla» por resultar menos idiomático.
- source_word: הָאֹרְנָה
  english_pob_choice: Araunah
  chosen_spanish: Arauná
  alternatives_spanish:
  - Araunah
  - Ornán
  lexicon: HALOT
  rationale: Se adopta una forma española de la transliteración del nombre de 2 Samuel. La forma «Arauná» es más fluida en español y respeta la identidad nominal del texto; «Ornán» queda como alternativa de la forma paralela de Crónicas.
- source_word: הַיְבֻסִי
  english_pob_choice: the Jebusite
  chosen_spanish: el jebuseo
  alternatives_spanish:
  - el jebuseíta
  lexicon: HALOT
  rationale: El gentilicio se traduce de manera directa y reconocible en español bíblico como «jebuseo».
theological_decisions:
- issue: Antropopatismo en וַיִּנָּחֶם יְהוָה
  english_pob_reading: Yahweh relented concerning the calamity
  chosen_spanish_reading: Yahvé se arrepintió respecto de la calamidad
  alternative_spanish_readings:
  - Yahvé desistió de la calamidad
  - Yahvé se retractó respecto de la calamidad
  rationale: La frase hebrea describe un cambio de curso respecto del juicio anunciado. «Se arrepintió» conserva el lenguaje antropopático del original; «calamidad» aclara que רָעָה aquí no significa mal moral. Se mantiene abierta la tensión teológica sin suavizarla en exceso.
  doctrine_reference: Translation philosophy §3; decisión doctrinal sobre el Nombre divino
- issue: Identidad de מַלְאַךְ יְהוָה
  english_pob_reading: rendered as 'the angel of Yahweh' without resolving further theological identification
  chosen_spanish_reading: el ángel de Yahvé, sin resolver su identificación teológica
  alternative_spanish_readings:
  - una manifestación teofánica
  - un mensajero angélico creado
  rationale: El versículo nombra al personaje pero no obliga a decidir entre una teofanía o un ángel creado. La traducción conserva la designación textual y evita imponer una interpretación no explicitada por el pasaje.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide con la revisión inglesa más reciente, que mantuvo sin cambios la solución óptima-equivalente. No se requieren ajustes de revisión adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton de manera consistente con el estándar del proyecto.
  - Se mantiene «ángel de Yahvé» como fórmula estable, sin resolver la cuestión teológica de su identidad.
  - «Calamidad» se usa para רָעָה en este contexto, para preservar la distinción entre desastre y mal moral.
  - «Era» se emplea para גֹּרֶן por ser el equivalente español bíblico más natural y legible.
  - El nombre propio se castellaniza como «Arauná» en la línea principal, con nota a la forma paralela «Ornán».
