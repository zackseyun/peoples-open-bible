    rationale: Esto crea una nota redundante e imprecisa. Dado que el texto principal ya usa «Yahvé», la nota de alternativa debe señalar otras posibilidades de transliteración, especialmente «Yahweh» y «Jehová», en paralelo con la auditoría inglesa.
  revised_spanish_text: Yahvé habló a Moisés[a], diciendo,
