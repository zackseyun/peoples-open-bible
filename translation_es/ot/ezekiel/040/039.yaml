translation:
  language: es
  text: Y en el pórtico de la puerta había dos mesas de este lado y dos mesas de aquel lado[a], sobre las cuales degollaban el holocausto, el sacrificio por el pecado[b] y la ofrenda por la culpa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de un lado ... del otro lado’ para expresar la disposición bilateral de las mesas.
    reason: lexical_alternative
  - marker: b
    text: O ‘ofrenda de purificación’ para ‘sacrificio por el pecado’; el hebreo puede referirse a la ofrenda vinculada con la purificación del pecado o de la impureza.
    reason: lexical_alternative
  - marker: c
    text: O ‘ofrenda de reparación’ para ‘ofrenda por la culpa’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְאֻלָם
  english_pob_choice: And in the portico
  chosen_spanish: Y en el pórtico
  alternatives_spanish:
  - Y en el vestíbulo
  - Y en el pórtico de entrada
  lexicon: HALOT
  rationale: אֻלָם designa un espacio de acceso tipo pórtico/vestíbulo. "Pórtico" conserva el matiz arquitectónico y suena natural en español bíblico contemporáneo.
- source_word: הַשַּׁעַר
  english_pob_choice: of the gate
  chosen_spanish: de la puerta
  alternatives_spanish:
  - de la puerta de acceso
  - de la puerta/portal
  lexicon: HALOT
  rationale: En este contexto visionario- arquitectónico, "puerta" comunica con claridad la estructura sin perder la referencia al acceso del recinto.
- source_word: שְׁנַיִם שֻׁלְחָנוֹת ... וּשְׁנַיִם שֻׁלְחָנוֹת
  english_pob_choice: two tables on this side and two tables on that side
  chosen_spanish: dos mesas de este lado y dos mesas de aquel lado
  alternatives_spanish:
  - dos mesas aquí y dos mesas allí
  - dos mesas de un lado y dos mesas del otro lado
  lexicon: HALOT
  rationale: La duplicación numérica y sustantiva describe una disposición bilateral. "De este lado ... de aquel lado" refleja bien el hebreo espacial y mantiene la simetría.
- source_word: מִפּוֹ ... מִפֹּה
  english_pob_choice: on this side ... on that side
  chosen_spanish: de este lado ... de aquel lado
  alternatives_spanish:
  - aquí ... allí
  - desde aquí ... desde allí
  lexicon: HALOT
  rationale: Aunque literalmente puede sonar como "desde aquí", el sentido espacial en esta descripción es lateral. La opción elegida evita una construcción menos natural en español.
- source_word: לִשְׁחֹט
  english_pob_choice: they slaughtered
  chosen_spanish: se degollaban
  alternatives_spanish:
  - mataban
  - sacrificaban
  lexicon: HALOT
  rationale: שׁחט es el verbo sacrificial de degollar/slaughter. "Se degollaban" conserva la crudeza ritual del acto y evita suavizarlo en exceso con "sacrificaban".
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  lexicon: HALOT
  rationale: En español bíblico, "holocausto" es el término tradicional para עֹלָה y conserva el valor de ofrenda totalmente quemada. Aquí se usa por fidelidad terminológica y legibilidad eclesial.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: el sacrificio por el pecado
  alternatives_spanish:
  - la ofrenda por el pecado
  - la ofrenda de purificación
  lexicon: HALOT
  rationale: חַטָּאת puede referirse tanto al pecado como a la ofrenda asociada con su purificación. Se eligió una formulación explicativa que mantiene el vínculo con el pecado sin perder la fuerza sacrificial.
- source_word: הָאָשָׁם
  english_pob_choice: the guilt offering
  chosen_spanish: la ofrenda por la culpa
  alternatives_spanish:
  - la ofrenda de reparación
  - la ofrenda por la culpa/reparación
  lexicon: HALOT
  rationale: אָשָׁם apunta al sacrificio relacionado con culpa y reparación. "Ofrenda por la culpa" conserva esa relación y sigue siendo comprensible en español moderno.
theological_decisions:
- issue: Mantener la tipología sacrificial sin imponer una lectura doctrinal adicional
  english_pob_reading: burnt offering, sin offering, and guilt offering
  chosen_spanish_reading: holocausto, sacrificio por el pecado y ofrenda por la culpa
  alternative_spanish_readings:
  - holocausto, ofrenda de purificación y ofrenda de reparación
  - holocausto, ofrenda por el pecado y ofrenda por la restitución
  rationale: El pasaje es una descripción del templo y enumera categorías sacrificiales conocidas. La traducción conserva los nombres cultuales en una forma inteligible, sin ampliar el texto con explicaciones doctrinales que no están explícitas aquí.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El texto español sigue el ajuste del auditable inglés POB que tomó el infinitivo con sentido práctico en contexto: no como una mera finalidad abstracta, sino como la función de las mesas. También conserva la alternativa interpretativa para חַטָּאת y אָשָׁם en notas, como hace el auditor inglés.'
  spanish_consistency_notes:
  - Se mantiene ‘pórtico’ para אֻלָם como término arquitectónico coherente con otros pasajes del templo.
  - Se usa ‘holocausto’ como equivalente tradicional de עֹלָה, en lugar de ‘ofrenda quemada’, por consistencia cultual.
  - ‘Sacrificio por el pecado’ y ‘ofrenda por la culpa’ preservan la distinción de los dos términos sacrificiales sin confundirlos con categorías morales genéricas.
  - La construcción ‘se degollaban’ refleja el uso impersonal/pasivo de la acción en contexto litúrgico.
