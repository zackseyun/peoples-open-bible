translation:
  language: es
  text: ¿Es este hombre, Conías[b], una vasija[a] despreciada y quebrada, o una vasija en la cual no hay agrado? ¿Por qué fueron arrojados él y su descendencia, y lanzados a una tierra que no conocían?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un objeto despreciado y hecho pedazos», o posiblemente «un ídolo/imagen despreciado». El hebreo עֶצֶב puede designar una cosa fabricada, incluso un ídolo o imagen; el texto principal conserva la imagen de alfarería porque el paralelismo con כְּלִי favorece ese campo semántico.'
    reason: lexical_alternative
  - marker: b
    text: Conías es la forma abreviada hebrea del rey también conocido como Jeconías (compárese Jer 24:1; 27:20).
    reason: cross_reference
lexical_decisions:
- source_word: הָעֶצֶב
  english_pob_choice: pot
  chosen_spanish: recipiente
  alternatives_spanish:
  - vasija
  - olla
  - vaso
  lexicon: HALOT
  rationale: El hebreo puede referirse a un objeto moldeado, incluso con connotaciones de ídolo o imagen; pero el paralelismo con כְּלִי ('recipiente') y los adjetivos de desprecio/rotura favorecen la imagen de alfarería. En español, 'recipiente' conserva el carácter genérico y permite mantener el paralelismo con 'recipiente' en la frase siguiente sin introducir una especie demasiado específica.
- source_word: נִבְזֶה
  english_pob_choice: despised
  chosen_spanish: despreciado
  alternatives_spanish:
  - menospreciado
  - deshonrado
  - despreciable
  lexicon: HALOT
  rationale: '''Despreciado'' conserva el valor pasivo y la vergüenza social de la repulsa del rey. ''Despreciable'' desplazaría el matiz hacia una cualidad moral, que el hebreo no exige.'
- source_word: נָפוּץ
  english_pob_choice: broken
  chosen_spanish: quebrado
  alternatives_spanish:
  - roto
  - destrozado
  - hecho pedazos
  lexicon: HALOT
  rationale: En este contexto de vasija/recipiente, 'quebrado' comunica bien la rotura material. Mantiene la imagen concreta sin intensificarla más allá de lo que el texto requiere.
- source_word: הָאִישׁ הַזֶּה
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este varón
  - esta persona
  lexicon: HALOT
  rationale: Es una equivalencia directa y natural en español para el demostrativo con el sustantivo masculino, manteniendo la señalización de Conías como referente específico.
- source_word: כָּנְיָהוּ
  english_pob_choice: Coniah
  chosen_spanish: Conías
  alternatives_spanish:
  - Coníasu
  - Jeconías
  rationale: La forma hebrea de este versículo es la abreviación 'Coniah'; en español se reproduce como 'Conías' para reflejar esa forma abreviada, no la forma más larga 'Jeconías'.
- source_word: אִם
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - si
  - o bien
  lexicon: HALOT
  rationale: En la pregunta retórica introduce una alternativa, no una condición. 'O' comunica mejor esa fuerza comparativa en español.
- source_word: כְּלִי אֵין חֵפֶץ בּוֹ
  english_pob_choice: a vessel in which there is no delight
  chosen_spanish: un recipiente en el cual no hay deleite
  alternatives_spanish:
  - un recipiente en el que no se tiene agrado
  - una vasija sin agrado
  - un recipiente no deseado
  lexicon: HALOT
  rationale: La frase mantiene la referencia a un objeto del que no se toma agrado o deleite, sin convertirla en 'inservible' o 'sin valor', lo cual añadiría fuerza evaluativa no explícita en חֵפֶץ.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué se debe
  lexicon: HALOT
  rationale: Interrogativo estándar y directo en español.
- source_word: הוּטֲלוּ
  english_pob_choice: have been hurled out
  chosen_spanish: fueron arrojados
  alternatives_spanish:
  - fueron lanzados
  - fueron echados
  - fueron expulsados
  lexicon: HALOT
  rationale: El pasivo intensivo sugiere una acción violenta. 'Fueron arrojados' preserva el impacto de expulsión forzosa sin sobreespecificar el lugar de origen.
- source_word: הוּא וְזַרְעוֹ
  english_pob_choice: he and his offspring
  chosen_spanish: él y su descendencia
  alternatives_spanish:
  - él y su simiente
  - él y sus hijos
  lexicon: HALOT
  rationale: '''Descendencia'' conserva la referencia dinástica y lineal de זֶרַע mejor que una lectura restringida a hijos inmediatos.'
- source_word: וְהֻשְׁלְכּוּ
  english_pob_choice: and cast
  chosen_spanish: y lanzados
  alternatives_spanish:
  - y arrojados
  - y echados
  - y tirados
  lexicon: HALOT
  rationale: El segundo pasivo refuerza la expulsión. 'Lanzados' permite distinguir el segundo verbo del primero, manteniendo la duplicación enfática del hebreo.
- source_word: עַל הָאָרֶץ
  english_pob_choice: into a land
  chosen_spanish: a una tierra
  alternatives_spanish:
  - sobre la tierra
  - hacia una tierra
  - en una tierra
  lexicon: HALOT
  rationale: Aunque עַל puede ser 'sobre', en este pasaje el sentido idiomático es de deportación/traslado. 'A una tierra' comunica la dirección del desplazamiento en español.
- source_word: אֲשֶׁר לֹא יָדָעוּ
  english_pob_choice: that they did not know
  chosen_spanish: que no conocían
  alternatives_spanish:
  - que no habían conocido
  - que no sabían
  lexicon: HALOT
  rationale: '''Conocer'' en español refleja bien la idea hebrea de no estar familiarizados con esa tierra. El imperfecto plural español acompaña al sujeto plural ''él y su descendencia''.'
theological_decisions:
- issue: Lectura de הָעֶצֶב como objeto fabricado frente a un sentido figurado de idol/image
  english_pob_reading: The English POB notes the alternative 'a despised, shattered idol/image' but prefers pottery imagery because of the parallel with 'vessel'.
  chosen_spanish_reading: '''recipiente'' en el texto principal, con posibilidad de entender la imagen como objeto moldeado; no se convierte en ''ídolo'' en el texto principal.'
  alternative_spanish_readings:
  - ídolo
  - imagen
  - vasija
  rationale: El contexto inmediato favorece la comparación con כְּלִי ('recipiente') y con la rotura y el desecho. Mantener una imagen de alfarería evita imponer una lectura cultual que el verso no hace explícita, pero la nota permite la alternativa lexical reconocida por el POB inglés.
  doctrine_reference: Jeremías 22:28; léxico de עֶצֶב en HALOT
- issue: Tono de rechazo y humillación en la triple descripción del rey
  english_pob_reading: The object is 'despised, broken vessel, or a vessel in which there is no delight'.
  chosen_spanish_reading: '''despreciado, quebrado, o un recipiente en el cual no hay deleite'''
  alternative_spanish_readings:
  - despreciado, roto
  - menospreciado, destrozado
  - despreciado, quebrado, o un recipiente sin agrado
  rationale: La traducción conserva la serie de calificaciones sin suavizarlas. 'Deleite' reproduce con dignidad el valor de חֵפֶץ sin volverlo meramente estético o sentimental.
  doctrine_reference: Jeremías 22:28; compárese el juicio sobre la casa real en el contexto de Jeremías
- issue: Expulsión forzosa del rey y su descendencia
  english_pob_reading: Why have he and his offspring been hurled out and cast into a land that they did not know?
  chosen_spanish_reading: '''¿Por qué fueron arrojados él y su descendencia, y lanzados a una tierra que no conocían?'''
  alternative_spanish_readings:
  - ¿Por qué fueron expulsados...?
  - ¿Por qué los arrojaron...?
  rationale: El pasivo conserva el tono de sentencia sufrida bajo la acción judicial de Dios por medio de los acontecimientos históricos. 'Arrojados' y 'lanzados' reproducen la violencia de los dos verbos hebreos sin convertir la frase en una interpretación más explicativa de lo que el texto dice.
  doctrine_reference: Jeremías 22:28; tema de juicio y destierro en la monarquía davídica
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente, que cambió 'shattered pot' a 'broken vessel' para alinear mejor el léxico con כְּלִי; por eso el español principal usa 'recipiente'/'quebrado' en vez de una imagen más intensificada como 'hecho pedazos'. También se preservó la forma abreviada del nombre propio, correspondiente a la decisión inglesa de 'Coniah'.
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo.'
  - Se mantuvo la alternancia de dos verbos pasivos ('fueron arrojados' / 'lanzados') para reflejar el hebreo.
  - '''descendencia'' traduce זֶרַע en sentido dinástico, evitando ''simiente'' por estilo.'
  - La puntuación en forma de pregunta retórica se ajusta al español estándar, conservando la estructura comparativa del hebreo.
