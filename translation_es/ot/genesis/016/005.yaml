    text: 'O: «Mi agravio recaiga sobre ti», conservando más literalmente la frase hebrea; el sentido es una acusación de que Abram carga con la responsabilidad por la injusticia que Sarai ha sufrido.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «en tu seno»; aquí es un modismo de recepción íntima.
    reason: lexical_alternative
