translation:
  language: es
  text: para ofrecer holocaustos a Yahvé sobre el altar del holocausto, continuamente, por la mañana y por la tarde, y conforme a todo lo que está escrito en la ley[a] de Yahvé, que él mandó a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'instrucción' de Yahvé; hebreo torá puede significar tanto 'ley' como 'instrucción'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַעֲלוֹת
  english_pob_choice: to offer
  chosen_spanish: ofrecer
  alternatives_spanish:
  - presentar
  - hacer subir
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo hiphil de עלה funciona idiomáticamente como 'ofrecer' una víctima. 'Ofrecer' comunica la acción cultual sin volverla demasiado literal o extraña en español.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas íntegras
  lexicon: HALOT
  rationale: El término técnico hebreo עֹלָה designa la ofrenda totalmente quemada. En español bíblico, 'holocausto' conserva ese valor cultual y refleja la terminología sacrificial con precisión.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al Señor
  lexicon: HALOT
  rationale: El nombre divino יְהוָה se conserva como 'Yahvé' según la convención del proyecto, y la preposición ל se rinde naturalmente con 'a' en un contexto de dedicación de la ofrenda.
- source_word: מִזְבַּח הָעֹלָה
  english_pob_choice: the altar of burnt offering
  chosen_spanish: el altar del holocausto
  alternatives_spanish:
  - el altar de la ofrenda quemada
  - el altar para el holocausto
  lexicon: HALOT
  rationale: La construcción nominal señala el altar específico asociado con esta clase de ofrenda. 'Del holocausto' es la forma tradicional y clara en español para este uso técnico.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - de continuo
  - regularmente
  lexicon: HALOT
  rationale: El adverbio expresa continuidad regular en el rito. 'Continuamente' mantiene esa fuerza sin añadir interpretación.
- source_word: לַבֹּקֶר וְלָעָרֶב
  english_pob_choice: morning and evening
  chosen_spanish: por la mañana y por la tarde
  alternatives_spanish:
  - mañana y tarde
  - en la mañana y en la tarde
  lexicon: HALOT
  rationale: La pareja temporal describe el ritmo diario de los holocaustos. 'Por la mañana y por la tarde' es natural en español y preserva el paralelismo.
- source_word: וּלְכָל הַכָּתוּב
  english_pob_choice: and according to all that is written
  chosen_spanish: y conforme a todo lo que está escrito
  alternatives_spanish:
  - y según todo lo que está escrito
  - y de acuerdo con todo lo escrito
  lexicon: HALOT
  rationale: La frase indica conformidad con las prescripciones escritas. 'Conforme a' es una equivalencia precisa y formal en español bíblico.
- source_word: בְּתוֹרַת יְהוָה
  english_pob_choice: in the law of Yahweh
  chosen_spanish: en la ley de Yahvé
  alternatives_spanish:
  - en la instrucción de Yahvé
  - en la Torá de Yahvé
  lexicon: HALOT
  rationale: Aquí תּוֹרָה tiene un sentido normativo y legal, por lo que 'ley' comunica bien la fuerza regulativa del texto. 'Instrucción' queda como alternativa semántica válida, pero menos directa en este contexto cultual.
- source_word: אֲשֶׁר צִוָּה עַל יִשְׂרָאֵל
  english_pob_choice: which he commanded for Israel
  chosen_spanish: que él mandó a Israel
  alternatives_spanish:
  - que él mandó para Israel
  - que ordenó sobre Israel
  lexicon: HALOT
  rationale: La construcción expresa que los mandatos fueron dados a Israel. 'Mandó a Israel' es una forma natural en español que conserva el destinatario del encargo sin sobrecargar la frase.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton y el proyecto pide conservarlo como 'Yahvé' en el texto principal. Se evita 'Señor' como sustitución de ocultamiento y se mantiene la transparencia del nombre pactual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de תּוֹרָה en contexto cultual-legal
  english_pob_reading: law of Yahweh
  chosen_spanish_reading: ley de Yahvé
  alternative_spanish_readings:
  - instrucción de Yahvé
  - Torá de Yahvé
  rationale: Aunque תּוֹרָה puede significar 'instrucción', el contexto de normas rituales favorece 'ley' en español para expresar el carácter prescriptivo del pasaje. Se conserva la alternativa semántica en la nota para no borrar la amplitud del hebreo.
  doctrine_reference: HALOT, תּוֹרָה; uso cultual-legislativo en Pentateuco y Crónicas
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el consenso de auditoría mantiene la lectura de alta concordancia con solo observaciones menores. La redacción española sigue ese estado estable y conserva las decisiones léxicas y teológicas principales del expediente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה, según la terminología del proyecto.
  - Se conserva la distinción cultual de עֹלָה como 'holocausto' y no como una paráfrasis general de 'ofrenda'.
  - '''Ley'' se usa como equivalente principal de תּוֹרָה en este contexto, pero la nota preserva ''instrucción'' como alternativa legítima.'
  - La sintaxis española sigue el orden semántico del hebreo sin calco excesivo, priorizando claridad litúrgica y fidelidad documental.
