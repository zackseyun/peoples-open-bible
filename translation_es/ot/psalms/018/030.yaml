translation:
  language: es
  text: Pues por ti puedo correr contra una tropa[a], y por mi Dios puedo saltar sobre una muralla[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por ti corro contra una partida de saqueadores».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por mi Dios puedo saltar sobre un muro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Introduce la base explicativa del testimonio poético. En español, «Porque» comunica de forma natural la relación causal o fundamentadora del verso sin perder el flujo del hebreo.
- source_word: בְךָ
  english_pob_choice: by you
  chosen_spanish: por ti
  alternatives_spanish:
  - por medio de ti
  - a causa de ti
  - con tu ayuda
  lexicon: HALOT
  rationale: El valor instrumental/agentivo de la preposición se expresa de manera natural con «por ti», que en español conserva la idea de apoyo o medio divino sin forzar una construcción más pesada.
- source_word: אָרֻץ
  english_pob_choice: I can run against
  chosen_spanish: correré contra
  alternatives_spanish:
  - puedo correr contra
  - arremeteré contra
  - correré hacia
  lexicon: HALOT
  rationale: El verbo hebreo comunica correr/embestir en contexto militar. «Correré contra» conserva la imagen concreta de avance ofensivo; el potencial queda implícito por el paralelismo y la dependencia de Yahvé, como en la lectura inglesa.
- source_word: גְּדוּד
  english_pob_choice: a troop
  chosen_spanish: una tropa
  alternatives_spanish:
  - una banda
  - un grupo armado
  - una partida de saqueadores
  lexicon: HALOT
  rationale: «Tropa» mantiene el sentido militar general del sustantivo sin especificar indebidamente si se trata de un destacamento, banda o partida de incursión.
- source_word: וּבֵאלֹהַי
  english_pob_choice: and by my God
  chosen_spanish: y por mi Dios
  alternatives_spanish:
  - y con mi Dios
  - y por medio de mi Dios
  - y gracias a mi Dios
  lexicon: HALOT
  rationale: 'Se conserva el paralelismo con el primer miembro y la relación instrumental: la acción es posible por Dios. «Mi Dios» retiene la confesión personal del salmista.'
- source_word: אֲדַלֶּג
  english_pob_choice: I can leap over
  chosen_spanish: saltaré sobre
  alternatives_spanish:
  - podré saltar sobre
  - brincaré sobre
  - saltaré por encima de
  lexicon: HALOT
  rationale: El verbo indica saltar o dar un salto para franquear un obstáculo. «Saltaré sobre» suena natural en español y conserva la imagen de superar una barrera de manera enérgica.
- source_word: שׁוּר
  english_pob_choice: a wall
  chosen_spanish: una muralla
  alternatives_spanish:
  - un muro
  - una pared
  - una fortificación
  lexicon: HALOT
  rationale: Aunque el lexema básico es «muro/pared», el contexto militar favorece una defensa fortificada. «Muralla» transmite mejor en español el matiz bélico-poético que «pared».
theological_decisions:
- issue: Concretar la imagen militar sin espiritualizarla
  english_pob_reading: Retain the concrete military imagery as Davidic testimony of divine empowerment.
  chosen_spanish_reading: Conservar la imagen militar concreta como testimonio davídico de que Dios habilita la victoria.
  alternative_spanish_readings:
  - Generalizar la frase como superación de obstáculos
  - Espiritualizarla como una imagen interior
  rationale: El hebreo usa términos militares explícitos («tropa», «muralla»). La versión española mantiene esa concreción histórica y poética, sin convertirla en una metáfora más general de la vida cristiana.
  doctrine_reference: Principio de primacía del texto original y preservación de la imaginería histórico-poética.
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto del contexto inglés y conserva la estructura paralela del hebreo. Se adopta un español natural y publicable, con un leve ajuste semántico en «muralla» para reflejar el marco defensivo del término hebreo sin exagerar la especificación.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים según la convención del proyecto.
  - Se mantiene el paralelismo preposicional «por ti / por mi Dios» para reflejar el valor instrumental de ב.
  - Se conserva la imaginería militar concreta en lugar de una aplicación devocional general.
