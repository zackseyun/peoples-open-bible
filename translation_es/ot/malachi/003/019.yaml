    rationale: El POB inglés preserva la alternativa «burning like a furnace». El borrador español sustituyó esa nota por «O “mira”» para הִנֵּה, que es menos significativa y no responde al principal punto léxico auditado.
  - severity: low
    issue: «Paja» es comprensible pero menos precisa que «rastrojo» para קַשׁ.
    rationale: קַשׁ se refiere mejor al rastrojo o paja seca residual; «paja» no es erróneo, pero puede sugerir material ya separado y no reproduce tan bien la imagen profética tradicional de material de poscosecha fácilmente consumible.
  - severity: medium
    issue: La nota sobre «Yahvé de los Ejércitos» está mal redactada y no explica con precisión la decisión traductora.
    rationale: 'Decir «Hebreo: “Yahvé de los ejércitos”» no distingue entre la forma hebrea y la traducción española; además, no explica que se evita la convención de sustitución del nombre divino y que «Ejércitos» busca transparencia semántica.'
