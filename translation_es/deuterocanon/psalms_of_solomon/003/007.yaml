    text: O «la fidelidad» o «la integridad»; ἀλήθεια aquí puede entenderse como una cualidad ética, no solo como veracidad literal.
    reason: lexical_alternative
  revision_rationale: Se ajusta la primera frase a «del justo» para dar mayor coherencia proverbial con la segunda cláusula singular y evitar una mezcla de plural y singular menos natural en español. Se conserva «verdad» en el texto principal por fidelidad a la decisión auditada del inglés, y se mantiene la nota con alternativas éticas. «Su salvador» en minúscula mejora la fluidez en este contexto genérico sin alterar el sentido.
