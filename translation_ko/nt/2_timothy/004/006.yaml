id: 2TI.4.6
reference: 2 Timothy 4:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐγὼ γὰρ ἤδη σπένδομαι, καὶ ὁ καιρὸς τῆς ⸂ἀναλύσεώς μου⸃ ἐφέστηκεν.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/006.yaml
  text: For I am already being poured out as a drink offering, and the time of my departure has come.
translation:
  language: ko
  text: 나는 이미 전제(奠祭)로 부어지고 있고[a], 떠날 때가 닥쳐왔습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 σπένδομαι는 제단에 부어 드리는 음료 제사(奠祭)에 비유한 표현이다. 바울이 자신의 임박한 순교를 제사 행위로 보고 있음을 함의한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπένδομαι
  english_pob_choice: I am already being poured out as a drink offering
  chosen_korean: 이미 전제(奠祭)로 부어지고 있고
  alternatives_korean:
  - 이미 부어 드려지고 있고
  - 이미 음료 제사로 부어지고 있고
  lexicon: BDAG
  rationale: σπένδω는 「부어 드리는 음료 제사(奠祭)를 드림」. 「전제(奠祭)로 부어지다」가 그 제사적 함의를 정확히 보존한다. 한자 (奠祭)를 병기하여 의미를 분명히 한다.
- source_word: ὁ καιρὸς τῆς ἀναλύσεώς μου ἐφέστηκεν
  english_pob_choice: the time of my departure has come
  chosen_korean: 떠날 때가 닥쳐왔습니다
  alternatives_korean:
  - 나의 떠날 시간이 임박했습니다
  - 나의 풀려 갈 때가 다가왔습니다
  lexicon: BDAG
  rationale: ἀνάλυσις는 「풀어 놓음·떠남」이며, 본 절에서는 죽음을 가리키는 완곡어. 「떠나다」가 죽음을 자연스럽게 함의한다. ἐφίστημι의 「임박하여 들이닥침」(3:1과 같은 어휘)을 「닥쳐오다」로 일관되게 옮긴다.
theological_decisions:
- issue: 4:6-8 임종 직전 자기 회고 — 전제·경주·면류관 이미지의 보존
  chosen_reading: 나는 이미 전제(奠祭)로 부어지고 있고 떠날 때가 닥쳐왔습니다
  alternative_readings:
  - 나는 이미 부어 드려지는 제물이 되었고, 떠날 때가 이르렀습니다
  rationale: 4:6-8은 바울의 사역 회고이며 본 절의 「전제로 부어짐」 이미지는 7-8절의 「선한 싸움·달려갈 길·의의 면류관」으로 이어진다. 제사·경기·왕관의 세 이미지가 차례로 임종 직전의 권면에 무게를 더하므로, 첫 이미지인 「전제」의 제사적 함의를 흐리지 않고 한자 병기로 분명히 보존한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; north-star — true and powerful meaning'
