  yaml_path: translation/deuterocanon/1_maccabees/011/067.yaml
  text: And Jonathan and his camp encamped by the water of Gennesar[b][a], and they rose early in the morning and went to the plain of Nasor.
  footnotes:
  - marker: a
    text: Or 'to the plain of Nasor.' The Greek says literally 'rose early in the morning into/to the plain of Nasor,' with the motion toward the plain implied rather than expressed by a separate travel verb.
    reason: lexical_alternative
  - marker: b
    text: Gennesar is the form found in the Greek text here; many readers will know the place-name as Gennesaret.
    reason: alternative_reading
