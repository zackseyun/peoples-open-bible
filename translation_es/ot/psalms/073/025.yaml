revisions:
- from: ¿A quién tengo yo en los cielos, sino a ti? Y fuera de ti[a], no deseo nada en la tierra.
  to: ¿A quién tengo yo en el cielo, sino a ti? Y aparte de ti[a], no deseo nada en la tierra.
  rationale: 'Se ajusta la redacción para mayor naturalidad y fidelidad idiomática al sentido exclusivo del hebreo y de la auditoría inglesa: «aparte de ti» expresa mejor la exclusividad que «fuera de ti», y «en el cielo» suena más natural en español sin perder el paralelismo cielo/tierra. La nota conserva la alternativa más literal y explica la elipsis del original.'
