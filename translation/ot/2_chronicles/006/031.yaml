theological_decisions:
- issue: Meaning of 'fear' in relation to covenant obedience
  chosen_reading: Retain 'fear you' in the main text, with the sense of reverent covenantal fear expressed through obedience.
  alternative_readings:
  - revere you
  - stand in awe of you
  rationale: The Hebrew ירא regularly carries the theological sense of reverent fear before God. Rendering it as 'fear' preserves biblical diction and theological weight, while the following phrase 'by walking in your ways' clarifies that this fear is obedient reverence, not mere dread.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of הָאֲדָמָה
  chosen_reading: Translate as 'the land' rather than 'the earth.'
  alternative_readings:
  - the earth
  - the ground
  rationale: Because the clause explicitly identifies it as what God gave to 'our fathers,' the referent is the covenant land promised to Israel's ancestors. This avoids importing a universalized sense not demanded by the context.
  doctrine_reference: Translation philosophy §§1, 5
