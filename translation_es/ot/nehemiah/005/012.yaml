translation:
  language: es
  text: 'Y ellos dijeron: «Lo devolveremos[a], y no les exigiremos nada; haremos como tú dices». Entonces llamé a los sacerdotes y los hice jurar[b] hacer conforme a esta palabra[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lo devolveremos» traduce la idea de restitución del hebreo נָשִׁיב; también podría expresarse «lo restauraremos» o «lo devolveremos», con el objeto explícito por claridad contextual.
    reason: lexical_alternative
  - marker: b
    text: 'El verbo hebreo implica administrar un juramento: «los hice jurar» o «los puse bajo juramento».'
    reason: lexical_alternative
  - marker: c
    text: דָּבָר puede significar «palabra», «asunto» o, por el contexto, una obligación asumida; aquí se mantiene «palabra» para seguir de cerca el hebreo sin expandirlo a «promesa».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשִׁיב
  english_pob_choice: we will restore it
  chosen_spanish: Devolveremos
  alternatives_spanish:
  - lo restauraremos
  - lo devolveremos
  lexicon: HALOT
  rationale: El verbo hifil de שוב expresa aquí la restitución de lo retenido o exigido. En español, «devolver» comunica bien la idea de restituir sin cargar de interpretación adicional; se omite el objeto explícito porque el contexto lo provee.
- source_word: וּמֵהֶם לֹא נְבַקֵּשׁ
  english_pob_choice: from them we will require nothing
  chosen_spanish: de ellos no pediremos nada
  alternatives_spanish:
  - no les exigiremos nada
  - no requeriremos nada de ellos
  lexicon: HALOT
  rationale: בקש puede abarcar pedir, buscar o exigir. En este contexto legal-económico, la fuerza es renunciar a cualquier demanda. «No pediremos nada de ellos» suena natural en español y conserva la idea de no reclamar.
- source_word: כֵּן נַעֲשֶׂה
  english_pob_choice: we will do
  chosen_spanish: haremos
  alternatives_spanish:
  - así haremos
  - de ese modo haremos
  lexicon: HALOT
  rationale: La partícula כֵּן refuerza la conformidad con la demanda de Nehemías. En español, la idea queda suficientemente expresada con «haremos», especialmente dentro de la cita completa.
- source_word: כַּאֲשֶׁר אַתָּה אוֹמֵר
  english_pob_choice: as you say
  chosen_spanish: como tú dices
  alternatives_spanish:
  - tal como dices
  - según dices
  lexicon: HALOT
  rationale: La comparación expresa aceptación directa de la instrucción de Nehemías. «Como tú dices» es claro, digno y fiel al registro del diálogo.
- source_word: וָאֶקְרָא אֶת הַכֹּהֲנִים
  english_pob_choice: Then I called the priests
  chosen_spanish: Entonces llamé a los sacerdotes
  alternatives_spanish:
  - entonces convoqué a los sacerdotes
  - luego llamé a los sacerdotes
  lexicon: HALOT
  rationale: קרא con objeto directo puede significar llamar o convocar. «Llamé» es suficientemente preciso y natural; el marcador temporal «Entonces» reproduce la secuencia narrativa.
- source_word: וָאַשְׁבִּיעֵם
  english_pob_choice: made them swear
  chosen_spanish: los hice jurar
  alternatives_spanish:
  - los puse bajo juramento
  - les tomé juramento
  lexicon: HALOT
  rationale: El hifil de שבע significa causar que alguien jure, es decir, administrar un juramento. «Los hice jurar» conserva la fuerza causal sin introducir un término más técnico que el español común no exige.
- source_word: לַעֲשׂוֹת כַּדָּבָר הַזֶּה
  english_pob_choice: to do according to this word
  chosen_spanish: que harían conforme a esta palabra
  alternatives_spanish:
  - a hacer conforme a esta palabra
  - a hacer conforme a este asunto
  lexicon: HALOT
  rationale: דָּבָר puede significar palabra, asunto o compromiso. Dado que el pasaje formaliza una obligación pública mediante juramento, «esta palabra» sigue de cerca el hebreo sin expandir a «promesa». La subordinada con «que harían» hace explícito el contenido del juramento en español.
translation_notes:
  revision_awareness: 'Se siguió el último ajuste del audit trail inglés al preferir «esta palabra» frente a una expansión interpretativa como «esta promesa». También se conservó el valor jurídico-práctico del pasaje: restitución, renuncia a exigir, y juramento público.'
  spanish_consistency_notes:
  - Se mantuvo «sacerdotes» para כהנים según el uso bíblico estándar en español.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en este versículo.
  - La secuencia narrativa se reflejó con «Entonces» para וָאֶקְרָא.
  - No se añadió glosa doctrinal; el énfasis del versículo es jurídico y comunitario.
