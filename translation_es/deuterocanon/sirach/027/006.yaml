review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido proverbial del hebreo con apoyo del paralelo griego: el fruto revela algo del árbol y el razonamiento revela la inclinación interior. Sin embargo, falla en un punto básico de fidelidad lingüística en español: ''la cultivo'' es gramaticalmente incorrecto para עֲבֹדַת עֵץ / γεώργιον ξύλου, cuyo valor está bien representado por ''el cultivo''. El resto de la línea, ''el razonamiento de un hombre muestra la inclinación de su corazón'', preserva adecuadamente חֶשְׁבּוֹן, יֵצֶר y la referencia genérica singular apoyada por el griego.'
  spanish_quality_summary: La calidad general es buena y legible, pero el artículo incorrecto en 'la cultivo' hace que el texto no sea publicable. 'El fruto muestra el cultivo de un árbol' es natural, claro y digno. La segunda mitad suena bien en español e integra con fluidez la estructura proverbial.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Fruto', 'razonamiento' e 'inclinación' siguen el audit trail inglés. No aparecen términos teológicos sensibles del glosario global. La elección de 'un hombre' concuerda con la decisión documentada sobre ἀνθρώπου / אֶחָד como singular representativo.
  issues:
  - severity: high
    issue: Artículo y género incorrectos en 'la cultivo'
    rationale: 'El sustantivo correcto en español es masculino: ''el cultivo''. La forma actual es gramaticalmente defectuosa y no puede justificarse por imitación de la estructura hebrea.'
  - severity: low
    issue: Redacción de la nota al pie puede simplificarse y alinearse mejor con el audit trail
    rationale: La nota actual es aceptable, pero conviene reflejar más claramente que el hebreo suena literalmente como 'obra/trabajo de un árbol' mientras el griego apoya el sentido agrícola de 'cultivo'.
  revised_spanish_text: El fruto muestra el cultivo[a] de un árbol; así, el razonamiento de un hombre muestra la inclinación de su corazón.
  revised_footnotes:
  - marker: a
    text: El hebreo dice literalmente algo como 'la obra' o 'el trabajo de un árbol'; el paralelo griego apoya el sentido de 'cultivo', es decir, el cuidado agrícola del árbol.
    reason: alternative_reading
  revision_rationale: 'Se requiere una reparación menor pero necesaria: corregir ''la cultivo'' a ''el cultivo''. También se ajusta levemente la nota para que refleje con más precisión la relación entre la literalidad hebrea y el apoyo del griego paralelo, sin cambiar el sentido adoptado por el POB inglés.'
