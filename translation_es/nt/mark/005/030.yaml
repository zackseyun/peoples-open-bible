translation:
  language: es
  text: 'Y al instante Jesús, al darse cuenta en sí mismo de que había salido de él poder, se volvió en medio de la multitud y dijo: «¿Quién tocó mis vestiduras?»'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: Conserva la rapidez narrativa característica de Marcos. «Al instante» es natural en español y mantiene el valor temporal fuerte sin sonar arcaico.
- source_word: ἐπιγνοὺς
  english_pob_choice: perceiving
  chosen_spanish: al percibirse
  alternatives_spanish:
  - al reconocer
  - al darse cuenta
  lexicon: BDAG
  rationale: La idea es de tomar plena conciencia. «Percibirse» mantiene el matiz de percepción interna y se ajusta al giro explicativo que sigue.
- source_word: ἐν ἑαυτῷ
  english_pob_choice: in himself
  chosen_spanish: en sí mismo
  alternatives_spanish:
  - dentro de sí
  - interiormente
  lexicon: BDAG
  rationale: Expresa consciencia interna, no observación externa. La forma idiomática en español es directa y fiel.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - poder milagroso
  lexicon: BDAG
  rationale: «Poder» corresponde de manera amplia a δύναμις y evita especificar «milagroso», que el texto no añade explícitamente.
- source_word: ἐξελθοῦσαν
  english_pob_choice: had gone out
  chosen_spanish: que había salido de él
  alternatives_spanish:
  - que salió de él
  - que había procedido de él
  lexicon: BDAG
  rationale: El participio indica una salida ya cumplida antes de la percepción de Jesús; el pluscuamperfecto lo refleja con claridad en español.
- source_word: ἐπιστραφεὶς
  english_pob_choice: turned around
  chosen_spanish: se volvió
  alternatives_spanish:
  - giró
  - se volvió alrededor
  lexicon: BDAG
  rationale: «Se volvió» es la manera más natural de expresar el giro físico en el contexto de la multitud.
- source_word: ἐν τῷ ὄχλῳ
  english_pob_choice: in the crowd
  chosen_spanish: en la multitud
  alternatives_spanish:
  - entre la multitud
  - en medio de la multitud
  lexicon: BDAG
  rationale: «Multitud» transmite el sentido de ὄχλος de forma natural y digna en español, con el mismo valor contextual de gente reunida y apretada.
- source_word: ἔλεγεν
  english_pob_choice: said
  chosen_spanish: decía
  alternatives_spanish:
  - dijo
  - seguía diciendo
  lexicon: BDAG
  rationale: El imperfecto puede sugerir acción en curso; «decía» lo conserva mejor que un aoristo castellano simple y suena natural en el discurso directo.
- source_word: ἥψατο
  english_pob_choice: touched
  chosen_spanish: ha tocado
  alternatives_spanish:
  - tocó
  - ha llegado a tocar
  lexicon: BDAG
  rationale: El perfecto en español comunica bien el hecho recientemente ocurrido y la pregunta inmediata de Jesús. Mantiene el sentido idiomático de contacto físico.
- source_word: τῶν ἱματίων
  english_pob_choice: my garments
  chosen_spanish: mis vestiduras
  alternatives_spanish:
  - mis vestidos
  - mis ropas
  - mis prendas
  lexicon: BDAG
  rationale: «Vestiduras» es formal y corresponde al plural de ἱμάτια. Mantiene el registro sobrio de la traducción inglesa revisada a «garments» y evita reducirlo a una sola prenda.
theological_decisions:
- issue: Jesús percibe que el poder ha salido de él
  english_pob_reading: Retained the text's straightforward statement that Jesus perceived power had gone out from him, without reducing it to mere metaphor or expanding it into a doctrinal explanation.
  chosen_spanish_reading: Se conserva la afirmación directa de que Jesús percibió que había salido de él poder, sin convertirla en metáfora ni explicar mecánicamente el milagro.
  alternative_spanish_readings:
  - Jesús sintió que una fuerza sanadora había salido de él
  - Jesús solo tuvo una impresión subjetiva
  rationale: El verso presenta un hecho narrativo real dentro del ministerio sanador de Jesús. La redacción española mantiene la afirmación sin añadir interpretaciones que el texto no exige.
  doctrine_reference: Cristología; afirmación narrativa del milagro; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: El texto inglés revisado cambió «clothes» por «garments» para elevar el registro y acercarse más a ἱματίων; la versión española sigue esa revisión con «vestiduras», manteniendo el plural y el tono formal. También se preservó el valor aspectual de ἔλεγεν con «decía» y la secuencia de percepción + salida de poder + giro en la multitud.
  spanish_consistency_notes:
  - Se usó «poder» para δύναμις, coherente con el valor amplio del término y con la práctica POB de no sobreespecificar.
  - «Vestiduras» mantiene el plural de ἱμάτια; la nota alternativa permite leer «mis vestiduras» o «mis prendas» según preferencia estilística.
  - La puntuación española introduce coma tras «Jesús[a]» para reflejar la aposición narrativa y la progresión verbal del griego.
