review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español acierta en la mayor parte del sentido fuente: «Y dijo», «Bendito sea», «Yahvé», «el Dios de Sem», «y que Canaán sea ... esclavo» reflejan bien el hebreo. Sin embargo, el pronombre en לָמוֹ es plural en la evidencia fuente y el expediente inglés documenta esa pluralidad como significativa. El texto español principal con «su esclavo» neutraliza/colapsa esa pluralidad; aunque la nota la menciona, el texto principal no la preserva.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico digno. «Bendito sea Yahvé» y «el Dios de Sem» suenan bien en español eclesial contemporáneo. La única mejora necesaria es hacer coincidir el texto principal con la fuerza plural del hebreo de manera idiomática; «su esclavo» resulta ambiguo y desalineado con la fuente. «Su esclavo» no es incorrecto como español, pero sí insuficiente frente a la evidencia textual disponible.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; עֶבֶד -> «esclavo» correctamente; nombre propio «Sem» y «Canaán» bien. La desviación principal está en לָמוֹ, donde debe preservarse el plural mejor en el texto principal. En español idiomático, «su esclavo» no distingue singular/plural; «esclavo de ellos» o «esclavo para ellos» preserva mejor la decisión léxica documentada.'
  issues:
  - severity: high
    issue: El texto principal no preserva la pluralidad de לָמוֹ.
    rationale: La evidencia fuente muestra un sufijo/pronombre plural, y el expediente inglés lo trata como una decisión teológica/lexical significativa. «Su esclavo» borra en español la pluralidad documentada.
  - severity: medium
    issue: La nota al pie está anclada en «dijo» en vez de en la frase afectada.
    rationale: La nota trata la alternativa de «esclavo de ellos», pero el marcador [a] está puesto tras «dijo». Debe anclarse donde surge la ambigüedad, en la frase final sobre la servidumbre de Canaán.
  - severity: low
    issue: La rationale teológica española para un referente singular contextual no sigue bien la evidencia auditada previa al nivel fuente.
    rationale: Aunque hubo una revisión inglesa hacia «his slave», el paquete fuente y las decisiones léxicas/theológicas inglesas documentadas favorecen preservar el plural; la revisión española debe priorizar la evidencia fuente y dejar la alternativa singular, si se desea, como nota secundaria, no como texto principal.
  revised_spanish_text: 'Y dijo: «Bendito sea Yahvé, el Dios de Sem, y que Canaán sea esclavo de ellos[a]».'
