id: ACT.13.48
reference: Acts 13:48
source:
  edition: SBLGNT
  text: ἀκούοντα δὲ τὰ ἔθνη ⸀ἔχαιρον καὶ ἐδόξαζον τὸν λόγον τοῦ ⸀κυρίου, καὶ ἐπίστευσαν ὅσοι ἦσαν τεταγμένοι εἰς ζωὴν αἰώνιον·
translation:
  text: When the Gentiles heard this[a], they began rejoicing and glorifying the word of the Lord, and all who had been appointed for eternal life believed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had been disposed toward eternal life.' The Greek participle can be understood differently by interpreters, but the passive sense 'had been appointed' is the most straightforward rendering here.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούοντα
  chosen: heard this
  alternatives:
  - hearing
  - when they heard
  lexicon: BDAG
  rationale: The present participle is adverbial, introducing the circumstance for the main verbs. English idiom is best served by 'When ... heard this,' with 'this' supplied from context to make the object explicit.
- source_word: τὰ ἔθνη
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Acts this term commonly distinguishes non-Jews from Jews; 'the Gentiles' best captures the contextual sense, though 'the nations' is the more literal gloss.
- source_word: ἔχαιρον
  chosen: began rejoicing
  alternatives:
  - rejoiced
  - were rejoicing
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or inceptive action. 'Began rejoicing' reflects the narrative force better than a simple past while remaining natural English.
- source_word: ἐδόξαζον
  chosen: glorifying
  alternatives:
  - praising
  - honoring
  lexicon: BDAG
  rationale: δοξάζω often carries the sense 'glorify' in Luke-Acts, especially in relation to God or God's word. The participial-like English form coordinates naturally with the prior imperfect.
- source_word: τὸν λόγον τοῦ κυρίου
  chosen: the word of the Lord
  alternatives:
  - the message of the Lord
  lexicon: BDAG
  rationale: λόγος here refers to the proclaimed message, but 'word' preserves the biblical idiom and theological resonance. κύριος follows the doctrinal default 'Lord'.
- source_word: ἐπίστευσαν
  chosen: believed
  alternatives:
  - came to faith
  - put their faith
  lexicon: BDAG
  rationale: Aorist indicative is well rendered by the simple past 'believed.' This avoids importing interpretive expansion beyond the Greek.
- source_word: ὅσοι
  chosen: all who
  alternatives:
  - as many as who
  - those who
  lexicon: BDAG
  rationale: The relative pronoun with quantitative force is idiomatically rendered 'all who' in English.
- source_word: τεταγμένοι
  chosen: had been appointed
  alternatives:
  - had been assigned
  - had been arranged
  - had been disposed
  lexicon: BDAG
  rationale: The perfect passive participle of τάσσω most naturally denotes having been appointed or designated. 'Had been appointed' preserves the passive form and avoids paraphrastic weakening. Because this term is theologically contested, alternatives are preserved in a footnote rather than adopted in the main text.
- source_word: εἰς ζωὴν αἰώνιον
  chosen: for eternal life
  alternatives:
  - to eternal life
  lexicon: BDAG
  rationale: εἰς with this expression can be rendered 'for' or 'to'; 'for eternal life' is idiomatic and preserves the telic sense without awkwardness.
