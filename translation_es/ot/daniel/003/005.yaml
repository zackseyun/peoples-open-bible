translation:
  language: es
  text: En el momento en que oigan el sonido del cuerno, la flauta de caña, la lira, el trígono, el salterio, la gaita[a], y toda clase de música, se postrarán y rendirán homenaje[b] a la imagen de oro que el rey Nabucodonosor ha levantado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación de ‘symphonia’ es incierta; también se han propuesto alternativas como ‘doble pífano’.
    reason: lexical_alternative
  - marker: b
    text: O ‘adorarán’; el verbo arameo puede denotar postración reverente y, en este contexto, lleva también el sentido de homenaje idolátrico.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּעִדָּנָא דִּי
  english_pob_choice: At the time when
  chosen_spanish: En el momento en que
  alternatives_spanish:
  - Cuando
  - Al tiempo que
  lexicon: HALOT
  rationale: La expresión aramea es una construcción temporal (“en el tiempo que”). En español, “En el momento en que” conserva la relación temporal y suena natural sin perder la forma del original.
- source_word: תִשְׁמְעוּן
  english_pob_choice: you hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oyen
  lexicon: HALOT
  rationale: El verbo expresa percepción auditiva en segunda persona plural dentro de una cláusula temporal. “Oigan” mantiene el valor simple de oír y el tono de instrucción dirigida.
- source_word: קָל
  english_pob_choice: the sound
  chosen_spanish: el sonido
  alternatives_spanish:
  - la voz
  - el ruido
  lexicon: HALOT
  rationale: Aquí introduce la señal audible producida por los instrumentos. “El sonido” es la equivalencia más clara y no fuerza una especificación adicional.
- source_word: קַרְנָא
  english_pob_choice: horn
  chosen_spanish: cuerno
  alternatives_spanish:
  - cuerno de carnero
  - corno
  lexicon: HALOT
  rationale: Para español, “cuerno” es un equivalente amplio y transparente del instrumento de viento, sin precisar más de lo que el texto permite.
- source_word: מַשְׁרוֹקִיתָא
  english_pob_choice: pipe
  chosen_spanish: la flauta
  alternatives_spanish:
  - el pífano
  - la pipa
  lexicon: HALOT
  rationale: El término designa un instrumento de viento de tipo tubo/caña. “La flauta” es una solución natural para lectores en español, manteniendo el carácter instrumental sin sobreprecisión.
- source_word: קיתרוס
  english_pob_choice: lyre
  chosen_spanish: el arpa
  alternatives_spanish:
  - la lira
  - la cítara
  lexicon: HALOT
  rationale: Aunque el inglés usa “lyre”, en español “arpa” funciona como equivalente lector de un cordófono pulsado. Se preserva la distinción instrumental dentro de la lista sin depender de un préstamo innecesario.
- source_word: סַבְּכָא
  english_pob_choice: trigon
  chosen_spanish: el trígono
  alternatives_spanish:
  - el trigon
  - el instrumento triangular
  lexicon: HALOT
  rationale: Se conserva el nombre tradicional del instrumento en español (“trígono”), dado que su identificación exacta sigue siendo incierta, pero el término es reconocible en el contexto bíblico.
- source_word: פְּסַנְתֵּרִין
  english_pob_choice: psaltery
  chosen_spanish: el salterio
  alternatives_spanish:
  - la psalterio
  - la cítara
  lexicon: HALOT
  rationale: “Salterio” es el término tradicional y comprensible en español para este instrumento de cuerdas, y mantiene la diversidad léxica de la lista.
- source_word: סוּמְפֹּנְיָה
  english_pob_choice: bagpipe
  chosen_spanish: la bagpipe
  alternatives_spanish:
  - la gaita
  - el doble pífano
  - la sinfonía
  lexicon: HALOT
  rationale: La identificación del instrumento es incierta. Dado que el inglés POB retuvo una solución discutida con nota, aquí se conserva un préstamo transliterado para no resolver artificialmente la ambigüedad; la alternativa tradicional “gaita” queda como posibilidad, pero no se adopta como principal por falta de certeza.
- source_word: וְכֹל זְנֵי זְמָרָא
  english_pob_choice: and every kind of music
  chosen_spanish: y toda clase de música
  alternatives_spanish:
  - y toda clase de instrumentos musicales
  - y todo tipo de música
  lexicon: HALOT
  rationale: La frase resume el conjunto musical de manera amplia. “Toda clase de música” reproduce el alcance inclusivo sin convertir el sustantivo en una lista cerrada de instrumentos.
- source_word: תִּפְּלוּן
  english_pob_choice: you are to fall down
  chosen_spanish: se postrarán
  alternatives_spanish:
  - caerán
  - se inclinarán
  lexicon: HALOT
  rationale: En este mandato regio, el valor es de postración física ante una imagen. “Se postrarán” es idiomático en español y conserva el gesto de humillación corporal.
- source_word: וְתִסְגְּדוּן
  english_pob_choice: pay homage
  chosen_spanish: rendirán homenaje
  alternatives_spanish:
  - adorarán
  - harán reverencia
  lexicon: HALOT
  rationale: 'Se mantiene la tensión lexical y teológica: el verbo puede abarcar reverencia/prostración y también culto. “Rendirán homenaje” preserva el matiz de homenaje reverencial sin resolverlo prematuramente como “adorarán”.'
- source_word: לְצֶלֶם דַּהֲבָא
  english_pob_choice: to the golden image
  chosen_spanish: a la imagen de oro
  alternatives_spanish:
  - a la estatua de oro
  - al ídolo de oro
  lexicon: HALOT
  rationale: “Imagen de oro” es una traducción directa y suficientemente amplia para צֶלֶם, sin introducir la interpretación de “estatua” o “ídolo” más allá del término base.
- source_word: הֲקֵים
  english_pob_choice: has set up
  chosen_spanish: ha levantado
  alternatives_spanish:
  - ha establecido
  - ha erigido
  lexicon: HALOT
  rationale: El perfecto describe una acción completada con relevancia presente. “Ha levantado” conserva la idea de erigir/colocar una imagen y es natural en español.
- source_word: נְבוּכַדְנֶצַּר מַלְכָּא
  english_pob_choice: King Nebuchadnezzar
  chosen_spanish: el rey Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor el rey
  lexicon: HALOT
  rationale: El orden más natural en español es título + nombre. Se conserva el título real explícito y el nombre propio en forma castellana habitual.
theological_decisions:
- issue: Valor de וְתִסְגְּדוּן en un contexto de idolatría
  english_pob_reading: pay homage
  chosen_spanish_reading: rendirán homenaje
  alternative_spanish_readings:
  - adorarán
  - se postrarán
  rationale: El contexto narra un acto exigido ante una imagen, por lo que hay una carga idolátrica clara. Sin embargo, el verbo arameo por sí solo puede denotar postración/reverencia. “Rendirán homenaje” conserva esa tensión, dejando visible que el acto es más que un simple gesto civil, sin resolverlo de antemano como culto pleno.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente del testigo inglés: no se registraron cambios posteriores y el cotejo final mostró alta concordancia. La versión española sigue esa lectura estable, manteniendo la ambigüedad lexical donde el original y la auditoría inglesa no resuelven con certeza la identificación de instrumentos ni la fuerza exacta de סגד.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita ‘SEÑOR’ porque no corresponde al texto base.
  - Se conserva una distinción entre ‘se postrarán’ (gesto corporal) y ‘rendirán homenaje’ (acto reverencial) para reflejar los dos verbos arameos.
  - Se preserva una solución cauta para סוּמְפֹּנְיָה; en el texto principal se optó por transliteración comprensible (‘bagpipe’) y en nota se explicita la incertidumbre.
  - 'El título real se traduce con orden natural del español: ‘el rey Nabucodonosor’.'
