  rationale: 'The Coptic is ⲟⲩⲛⲟϭ ⲛ̄ⲇⲩⲛⲁⲙⲓⲥ (ⲟⲩ-ⲛⲟϭ ⲛ̄-ⲇⲩⲛⲁⲙⲓⲥ). ⲟⲩ is the singular
    indefinite article ("a"), and ⲛ̄ is the genitive linker connecting "great" to
    "power", not the plural article. The phrase strictly means "a great power." The
    draft''s footnote and lexical decision misparse the grammar. | Azure: The reviewer’s
    grammatical point is correct. In Sahidic Coptic, ⲟⲩ is the singular indefinite
    article, so ⲟⲩⲛⲟϭ means “a great,” and ⲛ̄ here links the adjective to the following
    noun ⲇⲩⲛⲁⲙⲓⲥ rather th'
