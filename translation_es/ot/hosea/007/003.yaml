translation:
  language: es
  text: Por su maldad alegran al rey, y por sus mentiras[a] a los príncipes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y por su engaño, los oficiales».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרָעָתָם
  english_pob_choice: By their evil
  chosen_spanish: Por su maldad
  alternatives_spanish:
  - Con su maldad
  - Por su maldad
  - Por su perversidad
  lexicon: HALOT
  rationale: El ב instrumental se expresa naturalmente en español con «por» cuando indica medio o causa. «Maldad» conserva la concisión del hebreo y el valor colectivo de la conducta culpable sin endurecer innecesariamente el tono.
- source_word: יְשַׂמְּחוּ
  english_pob_choice: they make the king glad
  chosen_spanish: alegran al rey
  alternatives_spanish:
  - hacen al rey feliz
  - le dan alegría al rey
  - lo alegran
  lexicon: HALOT
  rationale: El piel causativo de שׂמח exige una idea de causar alegría. «Alegra[n] al rey» es natural en español y preserva el valor causativo sin convertirlo en una mera emoción pasiva.
- source_word: מֶלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey
  - al monarca
  - a un rey
  lexicon: HALOT
  rationale: Aunque el hebreo no lleva artículo, el contexto apunta a un rey determinado. En español, el objeto directo personal se expresa de forma natural con «al rey».
- source_word: וּבְכַחֲשֵׁיהֶם
  english_pob_choice: and by their lies
  chosen_spanish: y por sus mentiras
  alternatives_spanish:
  - y por su engaño
  - y por su falsedad
  - y por sus mentiras
  lexicon: HALOT
  rationale: כחשׁ puede abarcar mentira, engaño o negación. Aquí, en paralelo con «su maldad», «mentiras» es una correspondencia directa y clara en español; mantiene la fuerza moral del término sin expandirlo a una interpretación más amplia que el texto no exige.
- source_word: שָׂרִים
  english_pob_choice: the princes
  chosen_spanish: los príncipes
  alternatives_spanish:
  - los príncipes
  - los oficiales
  - los gobernantes
  lexicon: HALOT
  rationale: «Príncipes» preserva el matiz cortesano y político del hebreo שרים y mantiene el paralelismo con «rey». En español bíblico contemporáneo sigue siendo comprensible y suficientemente formal.
translation_notes:
  revision_awareness: La revisión inglesa eliminó una coma innecesaria después de «lies» para mayor fluidez. En español no se requiere una coma equivalente; la coordinación con «y por sus mentiras a los príncipes» fluye de manera natural. Se mantiene la estructura causal paralela del hebreo sin añadir puntuación que sugiera un quiebre inexistente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «rey» / «príncipes» para conservar el campo político-cortesano del texto.
  - No se introduce «Cristo» ni terminología cristológica ajena al pasaje.
