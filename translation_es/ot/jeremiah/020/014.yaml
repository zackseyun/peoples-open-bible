translation:
  language: es
  text: Maldito sea el día en que nací[a]; el día en que mi madre me dio a luz[b], no sea bendito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Sea maldito el día en que nací».
    reason: lexical_alternative
  - marker: b
    text: O, «el día en que mi madre me alumbró».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed be
  chosen_spanish: Maldito sea
  alternatives_spanish:
  - Sea maldito
  - Accursed sea
  lexicon: HALOT
  rationale: ארור expresa una maldición o imprecación. En español, «Maldito sea» conserva la fuerza optativa y el tono de lamento sin sonar artificial, y evita cambiar el sentido a una simple descripción.
- source_word: הַיּוֹם
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - ese día
  - aquel día
  lexicon: HALOT
  rationale: 'Se trata de un día específico: el día del nacimiento del hablante. «El día» mantiene la referencia definida y el paralelismo del versículo.'
- source_word: אֲשֶׁר
  english_pob_choice: on which
  chosen_spanish: en que
  alternatives_spanish:
  - cuando
  - en el que
  lexicon: HALOT
  rationale: El relativo temporal en español suena más natural como «en que» con un sustantivo temporal como «día». Conserva la relación temporal sin sobrecargar la frase.
- source_word: יֻלַּדְתִּי
  english_pob_choice: I was born
  chosen_spanish: nací
  alternatives_spanish:
  - fui nacido
  - fui traído al mundo
  lexicon: HALOT
  rationale: El pasivo de ילד se expresa con naturalidad en español como «nací». Es la equivalencia idiomática más directa y fiel al evento del nacimiento.
- source_word: יְלָדַתְנִי אִמִּי
  english_pob_choice: my mother bore me
  chosen_spanish: mi madre me dio a luz
  alternatives_spanish:
  - mi madre me parió
  - mi madre me alumbró
  lexicon: HALOT
  rationale: ילד aplicado a la madre significa dar a luz. «Me dio a luz» es claro, digno y suficientemente literal para conservar la concreción maternal del hebreo.
- source_word: אַל יְהִי
  english_pob_choice: let it not be
  chosen_spanish: no sea
  alternatives_spanish:
  - que no sea
  - no llegue a ser
  lexicon: HALOT
  rationale: El jussivo negativo expresa una prohibición o deseo. «No sea» reproduce mejor la fuerza optativa en español dentro de la cláusula final.
- source_word: בָרוּךְ
  english_pob_choice: blessed
  chosen_spanish: bendito
  alternatives_spanish:
  - bendecido
  - afortunado
  lexicon: HALOT
  rationale: El contraste léxico con «maldito» funciona mejor en español con «bendito», que mantiene el paralelismo antitético del hebreo y la solución del inglés POB.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo de WLC y coincide con la lectura estable del audit trail inglés: dos miembros paralelos, una maldición inicial y una prohibición final de bendición. No hay revisiones aplicadas en el expediente inglés, y la redacción mantiene esa estabilidad.'
  spanish_consistency_notes:
  - Se conservó la repetición de «el día» para reflejar el paralelismo hebreo.
  - Se usó «Maldito sea» como equivalente natural de la imprecación sin perder la fuerza semántica de ארור.
  - Se evitó «SEÑOR» o formas litúrgicas no pertinentes, ya que el versículo no contiene el nombre divino.
  - «Mi madre me dio a luz» se eligió por claridad y dignidad; la alternativa más cruda se reservó en nota.
