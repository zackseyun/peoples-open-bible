review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: un reporte establecido (''Hemos oído'') seguido por la acumulación retórica de términos de soberbia de Moab. También preserva la intensificación de גֵּאֶה מְאֹד con ''sumamente orgulloso''. Sin embargo, la preposición en ''Hemos oído del orgullo de Moab'' suena menos natural y menos precisa que ''Hemos oído acerca del orgullo de Moab'' o ''Hemos oído hablar del orgullo de Moab''.'
  spanish_quality_summary: El texto es claro y digno, pero requiere un ajuste menor de naturalidad y puntuación. En español bíblico moderno, el guion largo reproduce mejor la apposición enfática del inglés auditado y del hebreo acumulativo que los dos puntos. Además, 'acerca del orgullo de Moab' lee mejor que 'del orgullo de Moab'. El resto del verso es legible y mantiene bien la cadencia de denuncia profética.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Orgullo', 'altivez', 'arrogancia' y 'corazón' corresponden adecuadamente al campo semántico del hebreo y al razonamiento léxico documentado en el POB inglés. La repetición de vocabulario de soberbia se conserva correctamente.
  issues:
  - severity: medium
    issue: La frase inicial 'Hemos oído del orgullo de Moab' es poco idiomática en español.
    rationale: Aunque comprensible, 'oír de' aquí suena calcado. 'Hemos oído acerca del orgullo de Moab' conserva mejor el valor reportativo del perfecto hebreo y mejora la naturalidad sin alejarse del original.
  - severity: low
    issue: Los dos puntos debilitan la estructura parentética enfática.
    rationale: El audit trail inglés usa rayas para la inserción enfática 'he is exceedingly proud'. En español, las rayas reproducen mejor esa pausa explicativa y la fuerza retórica del hebreo.
  revised_spanish_text: 'Hemos oído acerca del orgullo de Moab—es sumamente orgulloso[a]—: de su altivez, su orgullo, su arrogancia y la altivez de su corazón.'
