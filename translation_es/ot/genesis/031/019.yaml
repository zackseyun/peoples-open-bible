translation:
  language: es
  text: Ahora Labán había ido a esquilar su rebaño, y Raquel robó los ídolos domésticos[a] que pertenecían a su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo terafim; también puede traducirse «terafines» o «dioses domésticos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pues
  lexicon: HALOT
  rationale: El conector abre una nueva escena narrativa. «Ahora» reproduce bien el valor discursivo de introducción sin volver la oración forzada en español.
- source_word: הָלַךְ
  english_pob_choice: had gone
  chosen_spanish: había ido
  alternatives_spanish:
  - fue
  - había marchado
  lexicon: HALOT
  rationale: El perfecto narrativo de fondo se expresa naturalmente con pluscuamperfecto en español, mostrando que Labán ya estaba ausente cuando Raquel actuó.
- source_word: לִגְזֹז
  english_pob_choice: to shear
  chosen_spanish: esquilar
  alternatives_spanish:
  - trasquilar
  - cortar la lana de
  lexicon: HALOT
  rationale: El infinitivo denota esquilar animales del rebaño. «Esquilar» es el equivalente preciso y corriente en español bíblico.
- source_word: צֹאנוֹ
  english_pob_choice: his flock
  chosen_spanish: su rebaño
  alternatives_spanish:
  - sus ovejas
  - su ganado menor
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovejas y cabras como conjunto. «Rebaño» conserva la amplitud colectiva y suena natural en español.
- source_word: וַתִּגְנֹב
  english_pob_choice: stole
  chosen_spanish: robó
  alternatives_spanish:
  - hurtó
  - tomó a escondidas
  lexicon: HALOT
  rationale: El verbo implica apropiación ilícita. «Robó» preserva la fuerza moral y legal del hebreo sin suavizarla.
- source_word: הַתְּרָפִים
  english_pob_choice: the household idols
  chosen_spanish: los ídolos domésticos
  alternatives_spanish:
  - los terafines
  - los dioses domésticos
  lexicon: HALOT
  rationale: El término designa objetos cultuales domésticos. «Ídolos domésticos» comunica su función religiosa y su ámbito familiar; se preserva la alternativa léxica en la nota.
- source_word: אֲשֶׁר לְאָבִיהָ
  english_pob_choice: that belonged to her father
  chosen_spanish: que pertenecían a su padre
  alternatives_spanish:
  - que eran de su padre
  - que eran propiedad de su padre
  lexicon: HALOT
  rationale: La frase expresa posesión. «Pertenecían a su padre» refleja la relación genitiva de forma clara y natural.
theological_decisions:
- issue: Traducción de תְּרָפִים, objeto de culto doméstico
  english_pob_reading: household idols
  chosen_spanish_reading: ídolos domésticos
  alternative_spanish_readings:
  - terafines
  - dioses domésticos
  rationale: No hay una disputa doctrinal aquí, sino una decisión léxica-cultural. «Ídolos domésticos» evita ocultar el carácter idolátrico del objeto y al mismo tiempo explica su contexto familiar; la transliteración y la variante «dioses domésticos» se conservan como alternativas auditables.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El contexto de auditoría indica alta concordancia y ningún cambio aplicado en la última revisión; por eso se mantiene la estructura narrativa del original y la equivalencia óptima del inglés POB, con ajuste natural al español para el pluscuamperfecto y el conector discursivo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Ídolos domésticos» conserva la carga religiosa del término sin imponer una glosa interpretativa más allá del hebreo.
  - El pluscuamperfecto («había ido») refleja correctamente el trasfondo narrativo del verbo hebreo en contexto.
