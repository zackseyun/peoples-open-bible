translation:
  text: Do not seek counsel from every man[b][a], but keep one counselor out of a thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not consult every man.' The Greek verb can mean 'consult' or 'take counsel.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'one out of a thousand' is proverbial hyperbole, urging extreme selectivity in choosing a counselor.
    reason: cultural_note
lexical_decisions:
- source_word: μὴ
  chosen: Do not
  alternatives:
  - not
  lexicon: BDAG
  rationale: Standard prohibitive particle with the imperative; English negative command is most natural.
- source_word: ἐν παντὶ ἀνθρώπῳ
  chosen: from every man
  alternatives:
  - with every person
  - in every man
  - from everyone
  lexicon: BDAG
  rationale: With συμβούλευε, the phrase is idiomatically about consulting or taking counsel from someone. ἀνθρώπῳ is singular masculine/generic; per gender-accurate policy, 'man' is retained rather than flattened to 'person,' since the Greek form is singular masculine and proverbial.
- source_word: συμβούλευε
  chosen: seek counsel
  alternatives:
  - take counsel
  - consult
  - deliberate
  lexicon: BDAG
  rationale: The verb can mean to consult or take counsel. 'Seek counsel' reads naturally in English and preserves the advisory sense without over-paraphrase.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Simple adversative contrast between the negative command and the positive instruction.
- source_word: ἕνα ἐκ χιλίων
  chosen: one out of a thousand
  alternatives:
  - one from a thousand
  - one among a thousand
  lexicon: BDAG
  rationale: A literal rendering that preserves the proverb-like hyperbole of extreme selectivity.
- source_word: σύμβουλον
  chosen: counselor
  alternatives:
  - advisor
  - one who gives counsel
  lexicon: BDAG
  rationale: Direct nominal cognate to the counsel theme in the verse; 'counselor' is clear modern English and keeps the lexical connection.
- source_word: ἔχε
  chosen: keep
  alternatives:
  - have
  - retain
  lexicon: BDAG
  rationale: Imperative of possession/retention. 'Keep' better conveys maintaining a trusted counselor rather than merely having one in the abstract.
