translation:
  language: es
  text: Porque no hay parte para los levitas entre ustedes, pues el sacerdocio de Yahvé es su heredad[a]. Y Gad, Rubén y la media tribu de Manasés han recibido su heredad al otro lado del Jordán, hacia el oriente, que les dio Moisés, siervo de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'su heredad'; el singular probablemente se refiere de manera colectiva a Leví/los levitas, por eso el texto principal conserva un posesivo de sentido colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵלֶק
  english_pob_choice: portion
  chosen_spanish: parte
  alternatives_spanish:
  - porción
  - reparto
  lexicon: HALOT
  rationale: חֵלֶק expresa una porción o parte asignada. En español, 'parte' mantiene la idea de repartición tribal sin sonar artificial en la frase negativa inicial.
- source_word: לַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - la tribu de Leví
  - los levitas
  lexicon: HALOT
  rationale: El nombre tribal se conserva de forma natural en español como 'los levitas', con el referente colectivo requerido por el contexto.
- source_word: בְּקִרְבְּכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - en su seno
  lexicon: HALOT
  rationale: La expresión distributiva en contexto de reparto territorial se entiende con claridad como 'entre ustedes'; evita el calco rígido 'en medio de ustedes' sin perder el sentido.
- source_word: כְהֻנַּת יְהוָה
  english_pob_choice: the priesthood of Yahweh
  chosen_spanish: el sacerdocio de Yahvé
  alternatives_spanish:
  - el sacerdocio de Yahvé
  - el ministerio sacerdotal de Yahvé
  lexicon: HALOT
  rationale: כְהֻנָּה designa el sacerdocio u oficio sacerdotal. Se conserva 'sacerdocio' como término institucional y se usa 'Yahvé' para el Nombre divino según el criterio POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se traduce directamente el Tetragrámaton con la forma POB establecida en español, evitando la sustitución por un título.
- source_word: נַחֲלָתוֹ
  english_pob_choice: their inheritance
  chosen_spanish: su heredad
  alternatives_spanish:
  - su herencia
  - su posesión heredada
  lexicon: HALOT
  rationale: Aunque el sufijo hebreo es singular, el referente es colectivo. 'Su heredad' conserva la noción bíblica de herencia territorial y permite en español un posesivo natural para el grupo levítico.
- source_word: לָקְחוּ
  english_pob_choice: have received
  chosen_spanish: han recibido
  alternatives_spanish:
  - recibieron
  - tomaron
  lexicon: HALOT
  rationale: En contexto de asignación territorial, 'han recibido' expresa recepción legítima de una asignación, más que simple toma material.
- source_word: נַחֲלָתָם
  english_pob_choice: their inheritance
  chosen_spanish: su heredad
  alternatives_spanish:
  - su herencia
  - su posesión
  lexicon: HALOT
  rationale: Se mantiene el término de asignación territorial con 'heredad', que en español bíblico comunica bien la distribución tribal.
- source_word: מֵעֵבֶר לַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - del otro lado del Jordán
  lexicon: HALOT
  rationale: La locución geográfica se vuelve natural en español con 'al otro lado del Jordán', sin perder la referencia espacial establecida por el texto.
- source_word: מִזְרָחָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: '''Oriente'' es una opción digna y clara en español bíblico; conserva el valor direccional adverbial del hebreo.'
- source_word: מֹשֶׁה עֶבֶד יְהוָה
  english_pob_choice: Moses the servant of Yahweh
  chosen_spanish: Moisés, siervo de Yahvé
  alternatives_spanish:
  - Moisés, siervo de Yahvé
  - Moisés, el siervo de Yahvé
  lexicon: HALOT
  rationale: עֶבֶד aquí funciona como título honorífico del pacto; 'siervo' es el equivalente natural en español, mejor que 'esclavo' en este contexto.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: Se mantiene la convención del POB en español para el Tetragrámaton, preservando el nombre propio del Dios del pacto en lugar de una sustitución por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sufijo singular en נַחֲלָתוֹ
  english_pob_reading: their inheritance
  chosen_spanish_reading: su heredad
  alternative_spanish_readings:
  - su herencia
  rationale: El hebreo conserva un sufijo singular, pero el referente es colectivo (los levitas). En español, 'su heredad' comunica naturalmente esa lectura corporativa sin introducir una ambigüedad innecesaria.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense in readable modern Spanish'
translation_notes:
  revision_awareness: El texto hebreo y el aparato inglés concuerdan en alto grado. Se conserva la distinción entre חֵלֶק ('parte') y נַחֲלָה ('heredad') con léxico español diferenciado, se mantiene el nombre divino Yahvé, y se refleja la lectura colectiva de נַחֲלָתוֹ sin forzar una construcción singular en español.
  spanish_consistency_notes:
  - Se usó 'heredad' de forma consistente para נַחֲלָה, reservando 'parte' para חֵלֶק.
  - Se evitó 'SEÑOR' para יְהוָה conforme al criterio del proyecto.
  - '''Siervo de Yahvé'' mantiene el título honorífico sin cargarlo con la fuerza léxica de ''esclavo''.'
  - La puntuación y el orden de cláusulas siguen el flujo del hebreo y del texto auditado en inglés, pero con sintaxis española natural.
