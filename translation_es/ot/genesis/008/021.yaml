    text: Or 'the soothing aroma.' The Hebrew sacrificial expression can emphasize that the aroma is pleasing or calming.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to his heart.'
    reason: lexical_alternative
  - marker: c
    text: Or 'because of humankind.' The Hebrew 'man' here is generic, referring to humanity.
    reason: lexical_alternative
  - marker: d
    text: Or 'the inclination of man’s heart is evil from his youth.'
    reason: lexical_alternative
