base_translation:
  language: en
  yaml_path: translation/ot/isaiah/059/006.yaml
  text: Their webs will not become clothing[a], nor will they cover themselves with their works; their works are works of wickedness[b], and deeds of violence are in their hands.
  footnotes:
  - marker: a
    text: Or 'their spiderwebs.' The Hebrew term refers to what is woven/spun; 'webs' preserves the metaphor without over-specifying.
    reason: lexical_alternative
  - marker: b
    text: Or 'their deeds are deeds of iniquity.'
    reason: lexical_alternative
