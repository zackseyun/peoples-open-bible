translation:
  language: es
  text: Cualquiera que toque la carne del hombre con flujo lavará su ropa y se bañará en agua[a], y quedará impuro hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cuerpo del hombre con flujo». El hebreo dice literalmente «la carne del que tiene flujo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנֹּגֵעַ
  english_pob_choice: Whoever touches
  chosen_spanish: Cualquiera que toque
  alternatives_spanish:
  - El que toque
  - Quien toque
  lexicon: HALOT
  rationale: 'El participio con artículo funciona de manera sustantiva y general: una persona cualquiera que realiza la acción. «Cualquiera que toque» conserva el valor legal general y suena natural en español.'
- source_word: בִּבְשַׂר
  english_pob_choice: the flesh of
  chosen_spanish: la carne de
  alternatives_spanish:
  - el cuerpo de
  lexicon: HALOT
  rationale: בָּשָׂר significa literalmente «carne». En este contexto de pureza ritual, mantener «carne» conserva con más precisión la formulación hebrea, aunque «cuerpo» sería una adaptación más suave.
- source_word: הַזָּב
  english_pob_choice: the man with the discharge
  chosen_spanish: el hombre con flujo
  alternatives_spanish:
  - el que tiene flujo
  - el hombre con la secreción
  lexicon: HALOT
  rationale: El participio de זוּב designa aquí a una persona con una descarga corporal anormal. «Flujo» expresa el referente de manera comprensible en español sin añadir interpretación médica extra.
- source_word: יְכַבֵּס בְּגָדָיו
  english_pob_choice: shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - lavará su ropa
  - deberá lavar sus vestidos
  lexicon: HALOT
  rationale: כִּבֵּס se refiere a lavar prendas. «Vestidos» mantiene un registro bíblico sobrio y cercano al léxico legal; «ropa» sería más idiomático, pero menos preciso respecto a la unidad vestimentaria.
- source_word: וְרָחַץ בַּמַּיִם
  english_pob_choice: and bathe in water
  chosen_spanish: y se bañará en agua
  alternatives_spanish:
  - y se lavará en agua
  - y se bañará con agua
  lexicon: HALOT
  rationale: רָחַץ aquí alude al lavado del cuerpo. «Se bañará en agua» conserva el paralelo hebreo y la fuerza del rito, evitando añadir «él» porque el sujeto ya está implícito en español.
- source_word: וְטָמֵא
  english_pob_choice: and he shall be unclean
  chosen_spanish: y será inmundo
  alternatives_spanish:
  - y quedará impuro
  - y será impuro
  lexicon: HALOT
  rationale: טָמֵא expresa impureza ritual, no culpa moral. «Inmundo» es un equivalente tradicional y breve; se mantiene el lenguaje de pureza cultual sin traducirlo como pecado.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  lexicon: HALOT
  rationale: La expresión marca la duración de la impureza hasta el final del día. «Tarde» es una forma natural y precisa en español para este marco temporal.
theological_decisions:
- issue: Impunidad ritual vs. culpa moral
  english_pob_reading: Render טָמֵא as ritual 'unclean' without importing moral guilt language.
  chosen_spanish_reading: Traducir טָמֵא como «inmundo» para mantener la categoría ritual, sin sugerir pecado moral.
  alternative_spanish_readings:
  - impuro
  - contaminado
  rationale: En Levítico 15 la preocupación es la pureza ceremonial dentro del sistema levítico. «Inmundo» comunica la condición cultual establecida por el texto y evita asociarla automáticamente con culpa ética.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sentido de בִּבְשַׂר en contexto legal
  english_pob_reading: The Hebrew literally says 'the flesh of the one with the discharge.'
  chosen_spanish_reading: Mantener «la carne del hombre con flujo» y no sustituirlo por una explicación interpretativa.
  alternative_spanish_readings:
  - el cuerpo del hombre con flujo
  - la piel del hombre con flujo
  rationale: El hebreo usa «carne», y la POB inglesa conservó esa tensión con una nota alternativa. En español también conviene preservar el término base, dejando abierta la posibilidad de una lectura más idiomática sin borrar el dato lexical.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'El pasaje coincide con el último pase revisado: no se documentaron cambios posteriores ni observaciones de revisión; se mantiene la misma decisión de sentido y de nivel de literalidad, adaptada al español con conservación del léxico ritual.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero en este versículo no aparece el nombre divino.
  - «Inmundo» conserva el valor ritual de טָמֵא sin moralizarlo.
  - «Carne» se usa de forma deliberada por su correspondencia directa con בָּשָׂר.
  - El tiempo final del día se expresa como «hasta la tarde», equivalente natural de «until the evening».
