revisions:
- from: 'Y yo les dije[a]: «Han llegado hasta la región montañosa de los amorreos, la cual Yahvé nuestro Dios nos está dando».'
  to: 'Y les dije[a]: «Han llegado a la región montañosa de los amorreos, la cual Yahvé nuestro Dios nos está dando».'
  rationale: 'Se hicieron dos ajustes menores de estilo y fidelidad: se eliminó «yo» para evitar un énfasis no presente en el hebreo, y se cambió «hasta» por «a» para un español más natural con «llegar», sin perder el sentido de destino alcanzado. Se conservó la nota léxica sobre la ambigüedad de הַר.'
