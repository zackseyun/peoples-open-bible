  text: שֶׁ֚בֶר תַּ֣חַת שֶׁ֔בֶר עַ֚יִן תַּ֣חַת עַ֔יִן שֵׁ֖ן תַּ֣חַת שֵׁ֑ן כַּ/אֲשֶׁ֨ר יִתֵּ֥ן מוּם֙ בָּֽ/אָדָ֔ם כֵּ֖ן יִנָּ֥תֶן בּֽ/וֹ׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/024/020.yaml
  text: fracture for fracture[a], eye for eye, tooth for tooth; as he inflicts an injury on a person[b], so it shall be inflicted on him.
  footnotes:
  - marker: a
    text: Or 'as he causes a blemish/disfigurement in a person, so it shall be done to him.' The Hebrew uses 'give' with 'blemish/injury,' an idiom rendered here as 'inflicts an injury.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in a man.' Here 'man' functions as a representative singular for a human being in case law.
    reason: cultural_note
