translation:
  language: es
  text: Y Bacquides se enteró de ello el día de reposo[a], y él mismo y todo su ejército vinieron al otro lado del Jordán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega dice literalmente «en el día de los sábados», un giro idiomático que aquí significa «el día de reposo» o «el sábado».
    reason: lexical_alternative
  - marker: b
    text: El griego πέραν τοῦ Ἰορδάνη puede significar «al otro lado del Jordán» o «más allá del Jordán»; aquí se opta por la primera opción por ser más neutral y natural en español.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγνω
  english_pob_choice: learned of it
  chosen_spanish: se enteró
  alternatives_spanish:
  - llegó a saberlo
  - tuvo noticia de ello
  - se informó
  lexicon: BDAG
  rationale: El aoristo de γινώσκω aquí expresa adquisición de información, no solo conocimiento estático. «Se enteró» comunica ese valor ingresivo de modo natural en español y permite omitir un complemento explícito equivalente a «of it», que el contexto ya aporta.
- source_word: τῇ ἡμέρᾳ τῶν σαββάτων
  english_pob_choice: on the Sabbath day
  chosen_spanish: en el día de los sábados
  alternatives_spanish:
  - en el día de reposo
  - en sábado
  - el día de los sábados
  lexicon: LSJ
  rationale: Se conserva la forma literal del griego, que usa el plural σαββάτων. Aunque la POB inglesa lo aclara como «on the Sabbath day», en español «en el día de los sábados» mantiene visible la expresión idiomática y su tensión lexical; la nota explica el sentido de «sábado» singular.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él personalmente
  - él mismo en persona
  - él
  lexicon: BDAG
  rationale: El pronombre es enfático. «Él mismo» preserva esa fuerza en español sin cargar el estilo.
- source_word: πᾶν τὸ στράτευμα αὐτοῦ
  english_pob_choice: all his army
  chosen_spanish: todo su ejército
  alternatives_spanish:
  - toda su tropa
  - todas sus fuerzas
  - su ejército entero
  lexicon: LSJ
  rationale: στράτευμα designa una fuerza militar. «Ejército» es la equivalencia natural y transparente en español; «todo» conserva el valor totalizador de πᾶν.
- source_word: πέραν τοῦ Ἰορδάνη
  english_pob_choice: to the other side of the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - a la otra orilla del Jordán
  - más allá del Jordán
  - del otro lado del Jordán
  lexicon: BDAG
  rationale: πέραν puede indicar movimiento hacia el lado opuesto del río. «Al otro lado del Jordán» es natural y neutral en español, y mantiene la referencia geográfica sin forzar «más allá», que puede sonar más interpretativo.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete 1909 y toma como guía la decisión revisada de la POB inglesa de preferir «the other side of the Jordan» frente a una formulación más marcada. También conserva la ambigüedad idiomática de τῇ ἡμέρᾳ τῶν σαββάτων mediante una nota explicativa.
  spanish_consistency_notes:
  - Se mantiene «Bacquides» como forma española habitual del nombre propio, coherente con el uso bíblico en español.
  - Se usa «Jordán» con artículo masculino implícito en la preposición compuesta «al otro lado del Jordán», conforme al español bíblico contemporáneo.
  - No se introduce lenguaje eclesiástico adicional; el verso es narrativo e histórico, por lo que se preserva un registro sobrio y directo.
