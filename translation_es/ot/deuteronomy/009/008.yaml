revisions:
- from: Hasta en Horeb ustedes provocaron a Yahvé[a] a ira, y Yahvé se enojó con ustedes hasta el punto de destruirlos[b].
  to: Aun en Horeb ustedes provocaron la ira de Yahvé[a], y Yahvé se enojó con ustedes tanto que estaba dispuesto a destruirlos[b].
  rationale: 'Se revisa el versículo para eliminar el calco poco natural «provocaron a Yahvé a ira» y reemplazarlo por una expresión española idiomática que conserva la fuerza causativa del hebreo: «provocaron la ira de Yahvé». También se ajusta el inicio a «Aun en Horeb», que mantiene el matiz enfático de וּבְחֹרֵב de forma más natural. La segunda cláusula se formula como «tanto que estaba dispuesto a destruirlos» para expresar claramente la conexión entre la ira divina y la amenaza de destrucción, en línea con la auditoría inglesa y el hebreo. Se completan además las alternativas de la nota [a].'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:00:09Z'
