translation:
  language: es
  text: Todos los pilares alrededor del atrio estarán ceñidos con plata[a], con sus ganchos de plata y sus bases[b] de bronce[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «unidos con barras de plata»; el hebreo puede referirse al herraje o enlazado de plata que une los pilares.
    reason: lexical_alternative
  - marker: b
    text: O «zócalos»; el hebreo puede designar las piezas metálicas de asiento o encaje de los pilares.
    reason: lexical_alternative
  - marker: c
    text: O «cobre», pues el término hebreo puede abarcar cobre o una aleación de cobre en el uso antiguo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Cada uno de los
  - Todos los
  lexicon: HALOT
  rationale: El valor distributivo/total del hebreo se expresa naturalmente en español con «todos», manteniendo la referencia colectiva a los pilares sin añadir énfasis innecesario.
- source_word: עַמּוּדֵי
  english_pob_choice: the pillars
  chosen_spanish: los pilares
  alternatives_spanish:
  - los postes
  - las columnas
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, «pilares» comunica mejor los soportes verticales del atrio y coincide con la decisión inglesa auditada.
- source_word: הֶחָצֵר
  english_pob_choice: the courtyard
  chosen_spanish: del atrio
  alternatives_spanish:
  - del patio
  - del recinto
  lexicon: HALOT
  rationale: «Atrio» es el término bíblico habitual para el espacio cercado del tabernáculo y evita la ambigüedad de «patio»; conserva el sentido técnico del recinto exterior.
- source_word: סָבִיב
  english_pob_choice: around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en torno a
  lexicon: HALOT
  rationale: Adverbio de localización; «alrededor» suena natural en español y refleja que los pilares están distribuidos en todo el contorno.
- source_word: מְחֻשָּׁקִים
  english_pob_choice: banded
  chosen_spanish: bandados
  alternatives_spanish:
  - unidos con barras de plata
  - ceñidos con plata
  - filleteados
  lexicon: HALOT
  rationale: El hebreo describe un trabajo de enlace o bandado con plata. «Bandados» conserva la imagen arquitectónica sin recurrir al arcaísmo de «filleteados», mientras la nota preserva la alternativa de barras o unión.
- source_word: כֶּסֶף
  english_pob_choice: with silver
  chosen_spanish: con plata
  alternatives_spanish:
  - de plata
  lexicon: HALOT
  rationale: La materia del bandado se expresa de manera más natural en español con «con plata», siguiendo la relación material indicada por el hebreo.
- source_word: וָוֵיהֶם
  english_pob_choice: their hooks
  chosen_spanish: sus ganchos
  alternatives_spanish:
  - sus argollas
  - sus clavijas
  lexicon: HALOT
  rationale: «Ganchos» es la equivalencia más probable y clara para וָו en este contexto de la cortina y los soportes; mantiene la función de sujeción.
- source_word: כָּסֶף
  english_pob_choice: of silver
  chosen_spanish: de plata
  alternatives_spanish:
  - plateados
  lexicon: HALOT
  rationale: Se conserva la construcción material del hebreo para los ganchos, evitando una adjetivación que podría oscurecer la consistencia terminológica.
- source_word: אַדְנֵיהֶם
  english_pob_choice: their bases
  chosen_spanish: sus bases
  alternatives_spanish:
  - sus zócalos
  - sus encajes
  lexicon: HALOT
  rationale: «Bases» traduce de forma clara y fiel el soporte inferior de los pilares; se preserva la alternativa técnica «zócalos» en la nota si se quisiera enfatizar la función de asiento.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: «Bronce» sigue la decisión inglesa auditada y es la forma más reconocible en español para el metal del tabernáculo, sin excluir la nota sobre el posible rango semántico de cobre/cobre aleado.
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente en inglés quedó sin cambios y con acuerdo alto; por eso esta propuesta sigue de cerca la segmentación y las decisiones léxicas auditadas, sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda a un tetragrámaton explícito; este versículo no lo contiene.
  - Se usa «atrio» como término técnico consistente para חָצֵר en el tabernáculo.
  - «Bronce» se conserva en el texto principal y «cobre» queda como alternativa anotada, en línea con el audit trail inglés.
  - No se introduce lenguaje eclesiástico no atestado por el hebreo ni por la tradición auditada.
