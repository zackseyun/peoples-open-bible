revisions:
- from: 'Pero el jefe de los eunucos dijo[a] a Daniel: «Temo a mi señor el rey, que asignó su comida y su bebida. ¿Por qué habría de ver vuestro rostro[h] abatido, más que el de los jóvenes de vuestra misma edad? Así pondríais en peligro mi cabeza ante el rey».'
  to: 'Pero el jefe de los eunucos dijo[a] a Daniel: «Temo a mi señor el rey, que asignó su comida y su bebida. ¿Por qué habría de ver sus rostros[b] abatidos, más que los de los jóvenes de su misma edad? Así pondrían en peligro mi cabeza ante el rey[c]».'
  rationale: Se corrigió la incoherencia pronominal usando un tratamiento uniforme y natural para español neutro ('sus'). Se reemplazó el marcador erróneo 'h' por 'b' y se añadió la nota 'c' para preservar la explicación del modismo hebreo sobre 'mi cabeza'. También se ajustó 'vuestro rostro' a 'sus rostros' para reflejar mejor el plural hebreo y mejorar la fluidez.
