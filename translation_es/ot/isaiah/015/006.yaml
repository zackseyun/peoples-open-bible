translation:
  language: es
  text: Porque las aguas de Nimrim se volverán desolación[a], porque se secó la hierba, se acabó la vegetación, y no quedó nada verde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedarán desoladas» / «se convertirán en una tierra desolada». La frase hebrea es compacta y puede describir ya sea las aguas mismas como desoladas, o la zona de las aguas volviéndose desolada.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: La partícula introduce una explicación o razón dentro del anuncio profético; «porque» conserva bien ese enlace causal/explanatorio en español natural.
- source_word: מֵי נִמְרִים
  english_pob_choice: the waters of Nimrim
  chosen_spanish: las aguas de Nimrim
  alternatives_spanish:
  - el agua de Nimrim
  - las aguas de Nimrim
  lexicon: HALOT
  rationale: El constructo plural מֵי pide «las aguas de». Se mantiene Nimrim como nombre propio transliterado según el valor toponímico del hebreo.
- source_word: מְשַׁמּוֹת
  english_pob_choice: desolations
  chosen_spanish: desolaciones
  alternatives_spanish:
  - lugares desolados
  - desolación
  - tierras devastadas
  lexicon: HALOT
  rationale: El plural femenino del hebreo expresa estados o realidades devastadas. «Desolaciones» conserva la forma plural y la dureza del término, siguiendo la decisión inglesa de no suavizarlo a una abstracción singular.
- source_word: יִהְיוּ
  english_pob_choice: will become
  chosen_spanish: serán
  alternatives_spanish:
  - se volverán
  - llegarán a ser
  - serán convertidas en
  lexicon: HALOT
  rationale: En español, con predicado nominal, «serán» comunica de manera natural el estado resultante. «Se volverán» habría explicitado más el cambio, pero aquí la estructura profética admite «serán» sin perder la idea de desolación resultante.
- source_word: יָבֵשׁ חָצִיר
  english_pob_choice: the grass is dried up
  chosen_spanish: se secó la hierba
  alternatives_spanish:
  - la hierba está seca
  - la hierba se ha secado
  lexicon: HALOT
  rationale: חָצִיר suele referirse a hierba/pasto. «Se secó la hierba» mantiene la imagen de sequedad y el aspecto consumado del hebreo, con fluidez en español.
- source_word: כָּלָה דֶשֶׁא
  english_pob_choice: the vegetation is gone
  chosen_spanish: se acabó la vegetación
  alternatives_spanish:
  - la vegetación fue consumida
  - se consumió la vegetación
  lexicon: HALOT
  rationale: דֶשֶׁא apunta a vegetación tierna o brotes. «Vegetación» es un equivalente amplio y claro; «se acabó» refleja bien la idea de que ha llegado a su fin.
- source_word: יֶרֶק
  english_pob_choice: green thing
  chosen_spanish: nada verde
  alternatives_spanish:
  - ninguna cosa verde
  - ninguna vegetación verde
  - nada de verdor
  lexicon: HALOT
  rationale: El hebreo usa un término amplio para lo verde o verdoso. «Nada verde» conserva el alcance general y suena más natural en español que «cosa verde», sin concretar más de lo que permite el texto.
- source_word: לֹא הָיָה
  english_pob_choice: no green thing remains
  chosen_spanish: no quedó
  alternatives_spanish:
  - no hubo
  - ya no hubo
  - no permanece
  lexicon: HALOT
  rationale: Aunque el hebreo está formalmente en pasado, el efecto es de ausencia total en la escena descrita. «No quedó nada verde» expresa bien esa pérdida completa sin sobrecargar la frase.
theological_decisions:
- issue: Cómo representar el tono profético de ruina total sin suavizar el juicio
  english_pob_reading: The waters of Nimrim will become desolations ... the grass is dried up ... no green thing remains.
  chosen_spanish_reading: Las aguas de Nimrim serán desolaciones ... se secó la hierba ... no quedó nada verde.
  alternative_spanish_readings:
  - Las aguas de Nimrim se volverán desolación
  - las aguas de Nimrim serán lugares desolados
  rationale: 'No hay una decisión doctrinal distintiva, pero sí una decisión retórica-teológica: mantener el lenguaje severo de devastación tal como aparece en el hebreo y en la auditoría inglesa, sin convertirlo en una simple descripción paisajística.'
  doctrine_reference: Juicio profético en Isaías; no aplica una referencia doctrinal sistemática específica
- issue: 'Ambigüedad de מְשַׁמּוֹת: ¿las aguas mismas o el área/las fuentes se vuelven desoladas?'
  english_pob_reading: The Hebrew phrase is compact and may describe either the waters themselves as desolated or the area of the waters as becoming desolate.
  chosen_spanish_reading: las aguas de Nimrim serán desolaciones
  alternative_spanish_readings:
  - las aguas de Nimrim serán desoladas
  - el lugar de las aguas de Nimrim será desolado
  rationale: Se conserva la ambigüedad compacta del hebreo sin resolverla de forma innecesaria. «Serán desolaciones» permite leer tanto el estado de las aguas como el entorno devastado, como en la nota inglesa.
  doctrine_reference: Precisión exegética frente a ambigüedad textual; no aplica una doctrina específica
translation_notes:
  revision_awareness: La auditoría inglesa indica high agreement, con la última revisión marcada como unchanged; por eso este borrador sigue de cerca la solución inglesa y conserva la ambigüedad de מְשַׁמּוֹת en una nota breve. No se detectan revisiones aplicadas que obliguen a ajustar la lectura.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene la transliteración de Nimrim como topónimo propio.
  - «Desolaciones» se conserva en plural para reflejar el hebreo y el enfoque de la versión inglesa.
  - 'La cláusula final se vierte con una negación de resultado completa: «no quedó nada verde».'
