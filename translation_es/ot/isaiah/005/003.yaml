review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido del hebreo: transición discursiva (''Y ahora''), doble apelación singular representativa (''habitante de Jerusalén'' / ''hombre de Judá''), imperativo de juicio, partícula de ruego y el litigio metafórico ''entre mí y mi viña''. La nota sobre el singular representativo también refleja correctamente el dato fuente y el rastro de auditoría inglés.'
  spanish_quality_summary: 'La principal dificultad está en la mezcla de registros/pronombres: ''habitante... y hombre...'' están en singular representativo, pero ''juzgad'' introduce voseo plural peninsular arcaizante, impropio del objetivo de español neutral latinoamericano y menos natural con ese vocativo singular. ''Juzguen'' suena más natural y sigue reflejando el imperativo plural hebreo dirigido colectivamente. El resto del verso es claro y digno.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece el nombre divino ni otros términos sensibles del glosario. 'Viña' para כַּרְמִי es adecuado en este contexto.
  issues:
  - severity: medium
    issue: Uso de 'juzgad' en español objetivo
    rationale: Aunque refleja el plural hebreo, 'juzgad' es una forma de segunda persona plural asociada al español peninsular y resulta menos adecuada para un español neutral latinoamericano/broadly church-readable. 'Juzguen' comunica mejor el mandato colectivo sin perder fidelidad.
  - severity: low
    issue: Ligera tensión entre vocativo singular representativo y verbo plural
    rationale: La tensión viene del propio hebreo y debe mantenerse en sustancia, pero en español conviene resolverla con una forma verbal natural ('juzguen') en lugar de una forma marcada regionalmente.
  revised_spanish_text: Y ahora, habitante de Jerusalén y hombre de Judá[a], juzguen, por favor, entre mí y mi viña.
