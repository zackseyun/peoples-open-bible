translation:
  language: es
  text: 'Y Josué les dijo: “No teman ni se desalienten. Esfuércense y cobren ánimo, porque así hará Yahvé a todos sus enemigos, contra quienes ustedes pelean.”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר אֲלֵיהֶם / יְהוֹשֻׁעַ
  english_pob_choice: And Joshua said to them
  chosen_spanish: Y Josué les dijo
  alternatives_spanish:
  - Entonces Josué les dijo
  lexicon: HALOT
  rationale: La waw narrativa se conserva con 'Y' para el avance del relato; 'les dijo' reproduce el dativo pronominal natural en español. 'Josué' sigue la transliteración estándar del nombre propio.
- source_word: אַל תִּירְאוּ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No se asusten
  lexicon: HALOT
  rationale: ירא en prohibición negativa admite 'temer' o 'tener miedo'; 'No teman' mantiene la correspondencia léxica más directa y el tono formal del mandato.
- source_word: וְאַל תֵּחָתּוּ
  english_pob_choice: and do not be dismayed
  chosen_spanish: ni se atemoricen
  alternatives_spanish:
  - ni se desanimen
  - ni queden consternados
  - ni se quiebren
  lexicon: HALOT
  rationale: חתת en esta forma negativa expresa ser quebrantado, aterrarse o desmayar de ánimo. 'Atemorizarse' conserva la cercanía semántica con el primer mandato sin borrar la segunda intensificación del hebreo.
- source_word: חִזְק֣וּ וְאִמְצ֔וּ
  english_pob_choice: Be strong and courageous
  chosen_spanish: Esfuércense y cobren ánimo
  alternatives_spanish:
  - Sean fuertes y valientes
  - Sean fuertes y resueltos
  lexicon: HALOT
  rationale: La fórmula fija de Josué combina fortaleza con firmeza de ánimo. 'Esfuércense' refleja el componente de fortalecerse/ser fuertes, y 'cobren ánimo' expresa el matiz de valentía o resolución sin caer en un calco rígido.
- source_word: כִּי כָכָה
  english_pob_choice: for thus
  chosen_spanish: porque así
  alternatives_spanish:
  - porque de esta manera
  - pues así
  lexicon: HALOT
  rationale: ככה introduce la manera en que actuará Yahvé. 'Porque así' es natural en español y conserva la referencia demostrativa y causal del hebreo, de acuerdo con la revisión inglesa más formal ('thus').
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue el término proyectado para el nombre divino en español: ''Yahvé''. Conserva el nombre pactal sin ocultarlo tras una sustitución devocional.'
- source_word: לְכָל אֹיְבֵיכֶם
  english_pob_choice: to all your enemies
  chosen_spanish: a todos sus enemigos
  alternatives_spanish:
  - contra todos sus enemigos
  - a todos los enemigos de ustedes
  lexicon: HALOT
  rationale: Con עשה + ל, el sentido apunta a lo que Yahvé hará respecto de los enemigos. En español, 'a todos sus enemigos' fluye de manera natural; el posesivo de tercera persona concuerda con el referente de Yahvé en el contexto.
- source_word: אֲשֶׁר אַתֶּם נִלְחָמִים אוֹתָם
  english_pob_choice: against whom you are fighting
  chosen_spanish: contra los cuales ustedes pelean
  alternatives_spanish:
  - con quienes ustedes combaten
  - a quienes ustedes están combatiendo
  lexicon: HALOT
  rationale: El hebreo usa una construcción relativa con objeto directo marcado que en español requiere adaptación. 'Contra los cuales ustedes pelean' preserva el sentido adversativo y la relación relativa sin endurecer el idioma; 'ustedes' evita ambigüedad de sujeto y objeto.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה en una fórmula de ánimo militar
  english_pob_reading: Yahweh will do
  chosen_spanish_reading: Yahvé hará
  alternative_spanish_readings:
  - Yahvé actuará
  - el Señor hará
  rationale: Se mantiene el nombre divino explícito en lugar de una sustitución convencional. En este contexto, el nombre del pacto subraya que la victoria depende de la acción de Yahvé, no solo de una referencia genérica a 'el Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Doble prohibición: fear / dismayed'
  english_pob_reading: Do not fear and do not be dismayed
  chosen_spanish_reading: No teman ni se atemoricen
  alternative_spanish_readings:
  - No teman ni se desmayen
  - No teman ni se quiebren
  rationale: Se conserva la distinción entre dos verbos hebreos relacionados pero no idénticos. La segunda expresión no se aplana en un simple sinónimo de la primera; 'atemorizarse' comunica el desmoronamiento interno que añade חתת.
  doctrine_reference: Lexical/theological tension preserved from HALOT and the POB English footnote
translation_notes:
  revision_awareness: El inglés POB evolucionó de 'this is what' a 'thus' para reflejar más directamente ככה y mantener un registro formal. En español, 'porque así' preserva ese matiz formal y la fuerza demostrativa del hebreo sin sonar artificial.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma consistente del nombre divino.
  - Se usa 'Josué' y no 'Joshua' por convención bíblica en español.
  - Se evita 'SEÑOR' para no ocultar el Tetragrámaton.
  - Se conserva un tono exhortativo paralelo en dos miembros negativos y dos imperativos positivos.
  - '''ustedes'' se emplea para claridad referencial y concordancia con la segunda persona plural del hebreo.'
