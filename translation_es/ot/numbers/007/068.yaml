lexical_decisions:
- source_word: כַּף
  english_pob_choice: dish
  chosen_spanish: fuente
  alternatives_spanish:
  - plato
  - vasija
  - recipiente
  lexicon: HALOT
  rationale: En el contexto cultual de Números 7, כף designa un pequeño recipiente ceremonial. En español, «fuente» comunica un recipiente hondo o poco profundo de uso formal sin sonar a cubierto de mesa como «cuchara», y evita perder el matiz del objeto litúrgico.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: Número cardinal femenino que concuerda con כַּף.
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: de diez
  alternatives_spanish:
  - diez
  - que pesa diez
  lexicon: HALOT
  rationale: El hebreo omite la unidad explícita, pero la fórmula de Números 7 expresa peso. En español, «de diez siclos» preserva la elipsis sin añadir una explicación excesiva al texto principal.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro puro
  - dorada
  lexicon: HALOT
  rationale: Aquí funciona naturalmente como material del recipiente; «de oro» es la formulación más clara y fiel en español.
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - colmada de
  - llena con
  lexicon: HALOT
  rationale: Adjetivo predicativo que describe el contenido de la vasija; «llena de» es la equivalencia más natural en español.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume aromático
  - aroma
  lexicon: HALOT
  rationale: Término estándar para la sustancia aromática ofrecida en el culto.
translation_notes:
  revision_awareness: 'Se observó alta concordancia con el inglés POB y no hubo cambios textuales aplicados en la revisión más reciente. La versión española sigue la misma solución de equivalencia óptima: mantener la fórmula cultual, explicitar el peso implícito y conservar el tono sobrio del inventario ofrenda.'
  spanish_consistency_notes:
  - Se conserva la unidad de peso como «siclos» para reflejar el formulario repetido de Números 7.
  - Se evita «cuchara» porque en español moderno sugiere utensilio de mesa y no el recipiente ceremonial.
  - Se traduce el material como «de oro» para mantener una sintaxis natural sin perder la relación con el recipiente.
