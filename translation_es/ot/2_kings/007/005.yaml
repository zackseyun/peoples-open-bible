translation:
  language: es
  text: Así que se levantaron al anochecer para ir al campamento de Aram. Cuando llegaron al borde del campamento de Aram[a], he aquí que no había nadie allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «no había nadie allí».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּק֣וּמוּ
  english_pob_choice: So they arose
  chosen_spanish: Así que se levantaron
  alternatives_spanish:
  - Entonces se levantaron
  - Y se levantaron
  lexicon: HALOT
  rationale: El wayyiqtol de קום avanza la narración. «Se levantaron» conserva el movimiento narrativo con un español natural; «Así que» refleja la secuencia implícita del waw en este contexto.
- source_word: בַנֶּשֶׁף
  english_pob_choice: at twilight
  chosen_spanish: al anochecer
  alternatives_spanish:
  - al crepúsculo
  - al atardecer
  lexicon: HALOT
  rationale: נֶשֶׁף expresa el tiempo de luz menguante. «Al anochecer» es idiomático en español y comunica bien el marco temporal de la salida.
- source_word: לָבוֹא
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - para venir
  - para entrar
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Para ir» es la forma más natural en español para el desplazamiento hacia el campamento de Aram.
- source_word: מַחֲנֵה אֲרָם
  english_pob_choice: the camp of Aram
  chosen_spanish: el campamento de Aram
  alternatives_spanish:
  - el campamento arameo
  - el campamento de los arameos
  lexicon: HALOT
  rationale: Se mantiene el nombre propio «Aram» en una construcción transparente. «Campamento» comunica mejor que un calco más rígido de מַחֲנֶה en español actual.
- source_word: וַיָּבֹאוּ
  english_pob_choice: When they came
  chosen_spanish: Cuando llegaron
  alternatives_spanish:
  - Y llegaron
  - Al llegar
  lexicon: HALOT
  rationale: El segundo wayyiqtol continúa la secuencia narrativa. «Cuando llegaron» suaviza la transición a la cláusula siguiente sin perder el valor temporal.
- source_word: עַד קְצֵה
  english_pob_choice: to the edge of
  chosen_spanish: al borde de
  alternatives_spanish:
  - hasta el extremo de
  - hasta la orilla de
  lexicon: HALOT
  rationale: La expresión señala el límite externo. «Al borde de» es claro, natural y suficientemente cercano al sentido del hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí que
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: הִנֵּה introduce una sorpresa súbita. «He aquí que» conserva ese golpe discursivo en un español digno y bíblico.
- source_word: אֵין שָׁם אִישׁ
  english_pob_choice: there was no one there
  chosen_spanish: no había nadie allí
  alternatives_spanish:
  - no había ningún hombre allí
  - no había persona alguna allí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «no hay allí un hombre», pero en español «nadie» transmite de forma natural la ausencia de cualquier persona. Se evita una traducción rígida que sonaría artificial, sin borrar el sentido general de אִישׁ.
theological_decisions:
- issue: אִישׁ como singular masculino en un contexto de ausencia general de personas
  english_pob_reading: there was no one there
  chosen_spanish_reading: no había nadie allí
  alternative_spanish_readings:
  - no había ningún hombre allí
  - no había persona alguna allí
  rationale: Aunque el hebreo usa el singular masculino אִישׁ, el referente es genérico. En español, «nadie» comunica el mismo hecho sin introducir una lectura masculinizada innecesaria. Se preserva así el sentido del relato y la fluidez del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: The verb נָשַׁף/נֶשֶׁף and the narrative setting of dusk
  english_pob_reading: at twilight
  chosen_spanish_reading: al anochecer
  alternative_spanish_readings:
  - al crepúsculo
  - al atardecer
  rationale: No hay carga doctrinal aquí, pero sí una decisión de precisión temporal. «Al anochecer» mantiene la escena en una franja de luz decreciente sin exagerar la especificidad astronómica del término.
  doctrine_reference: DOCTRINE.md §Lexical clarity
translation_notes:
  revision_awareness: El audit trail inglés pasó de una formulación más literal («no man there») a una más idiomática («no one there»). La versión española sigue esa revisión con «nadie» para reflejar con naturalidad el valor genérico del hebreo, sin perder la precisión del original.
  spanish_consistency_notes:
  - Se mantiene «Aram» como nombre propio, conforme al patrón POB.
  - «Campamento» se usa de manera uniforme para מַחֲנֶה.
  - «He aquí que» preserva la función discursiva de וְהִנֵּה en registro bíblico natural.
  - La nota a pie de página ofrece la alternativa idiomática sin duplicar el sentido en el cuerpo principal.
