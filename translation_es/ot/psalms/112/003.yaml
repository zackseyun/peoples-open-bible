lexical_decisions:
- source_word: הוֹן
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - patrimonio
  - riqueza material
  lexicon: HALOT
  rationale: הוֹן denota posesiones o riqueza material. «Riqueza» comunica bien el sentido general en español y mantiene la cercanía semántica con el paralelo siguiente sin sonar forzado.
- source_word: וָעֹשֶׁר
  english_pob_choice: and riches
  chosen_spanish: y bienes
  alternatives_spanish:
  - y riquezas
  - y abundancia
  - y patrimonio
  lexicon: HALOT
  rationale: עֹשֶׁר puede expresar riquezas o abundancia. Aquí «bienes» ayuda a conservar la duplicación poética de dos términos cercanos pero no idénticos, evitando una repetición plana con «riqueza».
- source_word: בְּבֵיתוֹ
  english_pob_choice: are in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su hogar
  - en su familia
  - en su casa y familia
  lexicon: HALOT
  rationale: 'La imagen hebrea es concreta: las posesiones están localizadas en la esfera doméstica del justo. «En su casa» conserva esa concreción y permite el matiz de casa/hogar/entorno familiar.'
- source_word: וְצִדְקָתוֹ
  english_pob_choice: and his righteousness
  chosen_spanish: y su justicia
  alternatives_spanish:
  - y su rectitud
  - y su justicia recta
  lexicon: HALOT
  rationale: צִדְקָה admite «justicia» o «rectitud». Dado que el POB inglés preservó la alternativa «justice» en nota, «justicia» mantiene esa tensión léxica en español sin convertirla en un término meramente devocional.
- source_word: עֹמֶדֶת
  english_pob_choice: stands
  chosen_spanish: permanece
  alternatives_spanish:
  - se mantiene
  - se alza
  - está en pie
  lexicon: HALOT
  rationale: El participio de עמד lleva la imagen de estar firme o en pie. «Permanece» suena natural en español y conserva la idea de estabilidad duradera; el verbo literal «está en pie» sería más marcado y menos fluido.
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para perpetuidad
  lexicon: HALOT
  rationale: לָעַד expresa duración indefinida y continua. «Para siempre» es la forma idiomática y clara en español para este valor temporal.
theological_decisions:
- issue: Sentido de «su justicia» en un contexto de bendición material
  english_pob_reading: The phrase refers to the righteous person's enduring uprightness/generosity rather than a technical doctrine of imputed righteousness.
  chosen_spanish_reading: La frase se entiende como la rectitud/justicia perdurable del hombre justo, no como una formulación técnica de justificación imputada.
  alternative_spanish_readings:
  - Su vindicación pactal por Dios
  - Una lectura anticipatoria ligada a la justicia divina
  rationale: En el salmo, el sujeto es el justo bendecido, y la línea final describe la permanencia de su vida recta y de su recuerdo fructífero. La traducción conserva la expresión posesiva directa y no introduce categorías doctrinales posteriores que el hebreo no explicita.
  doctrine_reference: Preservar la tensión teológica sin resolverla; no importar afirmaciones doctrinales que el texto no hace explícitas.
translation_notes:
  revision_awareness: 'Revisión auditada contra el texto hebreo de WLC y el expediente inglés POB: la duplicación poética de הוֹן / עֹשֶׁר se conserva con dos sustantivos cercanos en español, y צִדְקָה se mantiene en una zona semántica abierta entre justicia y rectitud sin forzar una lectura doctrinal específica.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el verso no contiene el tetragrámaton ni una cita directa del nombre divino.
  - «Casa» se usa en sentido concreto con posible extensión a hogar/hogarío, coherente con el hebreo בַּיִת.
  - La puntuación sigue el ritmo poético de dos cola breves con paralelismo semántico.
