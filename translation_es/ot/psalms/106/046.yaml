translation:
  language: es
  text: Él hizo que encontraran compasión ante todos sus captores[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él los dio a compasión ante todos sus captores», es decir, hizo que sus captores les mostraran compasión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: He caused them to find
  chosen_spanish: Él les hizo encontrar
  alternatives_spanish:
  - Él les dio
  - Él les concedió
  lexicon: HALOT
  rationale: נתן aquí funciona de manera causativa con לְרַחֲמִים; por eso el español debe expresar que Dios hizo que recibieran/encontraran compasión, no simplemente que 'dio' algo de forma directa. 'Hizo encontrar' conserva la agencia divina y suena natural en español.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - los
  lexicon: HALOT
  rationale: El objeto pronominal se refiere al pueblo en contexto. En español, con 'hacer encontrar' es más natural expresar el beneficiario con 'les' que con un objeto directo repetido.
- source_word: לְרַחֲמִים
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordia
  - piedad
  - misericordias
  lexicon: HALOT
  rationale: רַחֲמִים puede significar compasión, misericordia o piedad. 'Compasión' comunica bien el valor léxico y evita el plural poco idiomático 'misericordias'.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: '''Delante de'' preserva la relación espacial/social del hebreo y es natural en español contemporáneo. Mantiene la idea de estar expuestos al juicio o disposición de otros.'
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - todo
  lexicon: HALOT
  rationale: Con el participio siguiente, 'todos los que' expresa adecuadamente el sentido colectivo de כָּל.
- source_word: שׁוֹבֵיהֶם
  english_pob_choice: who had taken them captive
  chosen_spanish: los que los habían tomado cautivos
  alternatives_spanish:
  - sus captores
  - los que los habían llevado cautivos
  lexicon: HALOT
  rationale: El participio de שבה con sufijo posesivo se refiere a quienes los capturaron. La traducción verbal 'los que los habían tomado cautivos' conserva con claridad el matiz histórico y evita una simplificación excesiva.
theological_decisions:
- issue: Agencia divina explícita
  english_pob_reading: The subject 'He' refers to God as the active cause of their finding compassion.
  chosen_spanish_reading: Él es el agente que hace que ellos encuentren compasión.
  alternative_spanish_readings:
  - Les fue dada compasión delante de todos sus captores.
  - Ellos hallaron compasión delante de todos los que los habían cautivado.
  rationale: El hebreo usa verbo activo singular masculino; el salmista atribuye a Dios la acción. El español mantiene esa agencia con 'Él les hizo encontrar' en vez de una pasiva impersonal.
  doctrine_reference: Salmo 106:46; traducción con agencia divina preservada
- issue: Sentido de לְרַחֲמִים en esta construcción
  english_pob_reading: '''find compassion'' captures the idiom better than a literal ''receive mercies''.'
  chosen_spanish_reading: '''encontrar compasión'' capta el giro idiomático mejor que una forma literal como ''recibir misericordias''.'
  alternative_spanish_readings:
  - '''recibir compasión'''
  - '''hallar favor'''
  rationale: En español, 'encontrar compasión' es idiomático y mantiene la idea de un efecto favorable otorgado por Dios sin volver el verso artificial o demasiado interpretativo.
  doctrine_reference: HALOT; POB revision awareness
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó 'receive compassion' por 'find compassion' por ser más natural e idiomático. El español sigue esa decisión con 'les hizo encontrar compasión', preservando a la vez el matiz causativo del hebreo y la opción alternativa que entiende el verbo como 'dar compasión' en el sentido de hacer que los captores la mostraran.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el versículo no contiene el Tetragrámaton explícito; el sujeto queda simplemente como 'Él', acorde con el contexto del salmo.
  - Se prefirió 'compasión' sobre 'misericordia' para evitar una pluralización poco natural y mantener el valor léxico central de רַחֲמִים.
  - '''Delante de'' mantiene una relación más directa con לִפְנֵי que ''en presencia de'' sin perder claridad.'
