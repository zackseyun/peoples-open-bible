  yaml_path: translation/ot/job/026/014.yaml
  text: Look[a], these are the fringes of his ways[b], and what a mere whisper we hear of him! But the thunder of his power—who can understand it?
  footnotes:
  - marker: a
    text: Or 'the ends/outskirts of his ways.' The Hebrew suggests only the outermost edges of what God does are in view.
    reason: lexical_alternative
  - marker: b
    text: Or 'what a faint hint of a thing we hear of him.' The Hebrew expression is rare and emphasizes how little is heard compared with the 'thunder' of his power.
    reason: lexical_alternative
