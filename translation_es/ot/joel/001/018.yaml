  text: מַה נֶּאֶנְחָ֣ה בְהֵמָ֗ה נָבֹ֨כוּ֙ עֶדְרֵ֣י בָקָ֔ר כִּ֛י אֵ֥ין מִרְעֶ֖ה לָ/הֶ֑ם גַּם עֶדְרֵ֥י הַ/צֹּ֖אן נֶאְשָֽׁמוּ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/joel/001/018.yaml
  text: How the animals groan! The herds of cattle wander in confusion[a], because there is no pasture for them[b]; even the flocks of sheep suffer.
  footnotes:
  - marker: a
    text: Or 'are bewildered' or 'are perplexed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bear guilt' / 'are held guilty.' The Hebrew verb can carry judicial overtones; here it likely means the sheep suffer the consequences of the devastation.
    reason: lexical_alternative
