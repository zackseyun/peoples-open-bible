    reason: lexical_alternative
  - marker: b
    text: «Négueb» también puede traducirse «sur» o «región del sur», pero aquí probablemente designa la zona geográfica concreta de Canaán.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «junto al lado del Jordán»; idiomáticamente, «junto al Jordán» o «a lo largo del Jordán».'
    reason: lexical_alternative
  revision_rationale: Se añadió la nota léxica faltante para יוֹשֵׁב, se mantuvo la nota sobre «Négueb» y se ajustó la última frase a «a lo largo del Jordán» para reflejar mejor el modismo hebreo עַל יַד, con notas simplificadas y alineadas con el audit trail inglés.
