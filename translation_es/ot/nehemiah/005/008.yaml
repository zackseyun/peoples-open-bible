revisions:
- from: 'Y les dije[a]: «Nosotros hemos rescatado[b] a nuestros hermanos judíos, que habían sido vendidos a las naciones, según nuestras posibilidades. Pero ustedes están vendiendo a sus hermanos, y ¿deberían ser vendidos a nosotros[c]?». Entonces callaron y no hallaron qué responder.'
  to: 'Y les dije: «Nosotros hemos rescatado[a] a nuestros hermanos judíos, que habían sido vendidos a las naciones, según nuestras posibilidades. Pero ustedes están vendiendo a sus hermanos, ¿y van a ser vendidos de nuevo a nosotros[b]?». Entonces callaron y no hallaron qué responder.'
  rationale: Se eliminó la nota [a] original por ser innecesaria y no corresponder a una alternativa significativa. Se mantuvo «hemos rescatado» con su nota léxica, y se rehízo la cláusula final para que el español suene natural y conserve la fuerza retórica del hebreo y de la revisión inglesa. «De nuevo» explicita de manera mínima la consecuencia implícita en el contexto.
  reviewer_model: gpt-5.4
