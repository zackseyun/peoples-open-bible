translation:
  language: es
  text: Pasó por la región montañosa de Efraín y pasó por la tierra de Salisa[a], pero no los encontraron. Luego pasaron por la tierra de Saalim, pero no estaban allí[b]. Luego pasó por la tierra de Benjamín, pero no los encontraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no los encontraron»; el objeto implícito son los asnos perdidos mencionados en el contexto anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y no había» o «y no había nada»; expresión elíptica que significa que los asnos no estaban allí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר / וַיַּעַבְרוּ
  english_pob_choice: passed through
  chosen_spanish: pasó por / pasaron por
  alternatives_spanish:
  - atravesó
  - transitó por
  - recorrió
  lexicon: HALOT
  rationale: עבר con בְ indica desplazamiento a través de un territorio. En español, «pasó por» comunica de forma natural la secuencia de búsqueda por regiones sucesivas, manteniendo el valor itinerante del hebreo.
- source_word: בְּהַר אֶפְרַיִם
  english_pob_choice: the hill country of Ephraim
  chosen_spanish: la región montañosa de Efraín
  alternatives_spanish:
  - el monte de Efraín
  - los montes de Efraín
  lexicon: HALOT
  rationale: En expresiones geográficas, הַר puede referirse al área montañosa, no a una sola montaña. «Región montañosa» evita un calco duro y conserva el sentido geográfico de itinerario.
- source_word: אֶרֶץ שָׁלִשָׁה
  english_pob_choice: the land of Shalishah
  chosen_spanish: la tierra de Salisa
  alternatives_spanish:
  - la región de Salisa
  lexicon: HALOT
  rationale: אֶרֶץ designa aquí un territorio con nombre propio. Se conserva el topónimo con transliteración española naturalizada como «Salisa» para lectura bíblica clara.
- source_word: וְלֹא מָצָאוּ
  english_pob_choice: but they did not find them
  chosen_spanish: pero no los encontraron
  alternatives_spanish:
  - y no los encontraron
  - pero no encontraron a los asnos
  lexicon: HALOT
  rationale: 'El objeto está implícito en el contexto anterior: los asnos perdidos. En español es natural suplir el pronombre «los» sin añadir explícitamente «asnos», porque el antecedente ya es conocido en el relato.'
- source_word: אֶרֶץ שַׁעֲלִים
  english_pob_choice: the land of Shaalim
  chosen_spanish: la tierra de Saalim
  alternatives_spanish:
  - la región de Saalim
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado. «Tierra» reproduce el valor territorial de אֶרֶץ y funciona bien en español narrativo bíblico.
- source_word: וָאַיִן
  english_pob_choice: but they were not there
  chosen_spanish: pero allí no había nada
  alternatives_spanish:
  - y no había nada
  - pero no estaban allí
  - pero no había nadie
  lexicon: HALOT
  rationale: 'La expresión hebrea es elíptica: literalmente «y no había nada». En este contexto la ausencia se refiere a lo buscado; «allí no había nada» conserva la concisión y hace explícita la negación de presencia sin sobreespecificar.'
- source_word: אֶרֶץ יְמִינִי
  english_pob_choice: the land of Benjamin
  chosen_spanish: la tierra de Benjamín
  alternatives_spanish:
  - el territorio de Benjamín
  - la tierra de los benjaminitas
  lexicon: HALOT
  rationale: El gentilicio/adjetival יְמִינִי se entiende geográficamente como referencia a Benjamín. «Tierra de Benjamín» es idiomática en español bíblico y conserva el paralelo con los demás topónimos.
theological_decisions:
- issue: Preserving the ellipsis about the missing animals without overexplaining
  english_pob_reading: but they did not find them / but they were not there
  chosen_spanish_reading: pero no los encontraron / pero allí no había nada
  alternative_spanish_readings:
  - pero no encontraron a los asnos
  - pero no estaban allí
  rationale: 'El hebreo alterna una negación con objeto implícito y una fórmula elíptica de ausencia. La traducción mantiene esa tensión: en un caso se deja el objeto recuperable por contexto; en el otro, se conserva la elipsis con una negación de presencia natural en español.'
  doctrine_reference: No aplica; decisión de estructura narrativa y referencia implícita.
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió «Then» antes de la cláusula final para reflejar mejor la secuencia narrativa. En español se mantiene con «Luego» en los dos puntos de transición para preservar el ritmo progresivo del relato.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - 'Se conservan topónimos bíblicos de forma transliterada naturalizada en español: Salisa y Saalim.'
  - Se evita añadir «asnos» en el texto principal porque el antecedente ya está claramente establecido en el contexto inmediato; la aclaración queda en nota.
