translation:
  language: es
  text: Lo persiguió hasta Azoto, y los campamentos entablaron batalla detrás de él[a]. Y Apolonio dejó atrás a mil jinetes[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «los campamentos se unieron detrás de él para batalla». La expresión probablemente se refiere a fuerzas militares que entablaron combate en su retaguardia.'
    reason: lexical_alternative
  - marker: b
    text: El texto griego, tal como está, termina con «Y Apolonio dejó atrás a mil jinetes», lo que suena como una cláusula incompleta y probablemente continúa en el versículo siguiente.
    reason: textual_variant
lexical_decisions:
- source_word: δίωξεν
  english_pob_choice: pursued
  chosen_spanish: lo persiguió
  alternatives_spanish:
  - lo siguió persiguiendo
  - lo cazó
  lexicon: LSJ
  rationale: En contexto militar, διώκω expresa perseguir con hostilidad. «Lo persiguió» conserva el sentido de persecución bélica sin añadir matices excesivos.
- source_word: ὀπίσω αὐτοῦ
  english_pob_choice: after him
  chosen_spanish: lo persiguió
  alternatives_spanish:
  - tras él
  - detrás de él
  lexicon: LSJ
  rationale: Con un verbo de persecución, el complemento queda integrado naturalmente en español; no hace falta duplicarlo literalmente en la primera cláusula.
- source_word: εἰς Ἄζωτον
  english_pob_choice: as far as Azotus
  chosen_spanish: hasta Azoto
  alternatives_spanish:
  - a Azoto
  - así como Azoto
  lexicon: LSJ
  rationale: '«Hasta» comunica bien el alcance de la persecución, como en la decisión inglesa «as far as». Se mantiene el topónimo en forma española tradicional: Azoto.'
- source_word: συνῆψαν
  english_pob_choice: joined battle
  chosen_spanish: se unieron ... en batalla
  alternatives_spanish:
  - entablaron batalla
  - chocaron en combate
  lexicon: LSJ
  rationale: El verbo puede significar entrar en combate o unirse para combatir. «Se unieron ... en batalla» conserva la idea de convergencia bélica sin imponer más precisión que la del griego.
- source_word: αἱ παρεμβολαὶ
  english_pob_choice: the camps
  chosen_spanish: los campamentos
  alternatives_spanish:
  - los campamentos militares
  - las huestes
  - los ejércitos
  lexicon: LSJ
  rationale: παρεμβολή significa literalmente campamento o encampamento. «Campamentos» sigue de cerca el griego y funciona en el relato militar.
- source_word: ὀπίσω αὐτοῦ
  english_pob_choice: behind him
  chosen_spanish: detrás de él
  alternatives_spanish:
  - tras él
  - a sus espaldas
  lexicon: LSJ
  rationale: Aquí la frase tiene valor espacial, no de persecución. «Detrás de él» conserva esa relación posicional con naturalidad en español.
- source_word: εἰς πόλεμον
  english_pob_choice: battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - a la batalla
  - para combatir
  - en combate
  lexicon: LSJ
  rationale: El griego indica entrada en acción bélica. «En batalla» refleja el valor de combate inmediato sin ampliar a «guerra».
- source_word: ἀπέλειπεν
  english_pob_choice: left behind
  chosen_spanish: dejó atrás
  alternatives_spanish:
  - dejó
  - reservó atrás
  lexicon: LSJ
  rationale: La preposición ἀπο- aporta sentido separativo. «Dejó atrás» preserva esa idea sin especificar más de lo que dice el texto.
- source_word: χιλίαν ἵππον
  english_pob_choice: a thousand horsemen
  chosen_spanish: a mil jinetes
  alternatives_spanish:
  - mil jinetes
  - mil de caballería
  lexicon: LSJ
  rationale: En uso militar, ἵππος puede referirse metonímicamente a caballería. «Jinetes» es claro en español y mantiene la fuerza numérica del pasaje.
translation_notes:
  revision_awareness: El texto griego transmitido termina de forma abrupta con «y Apolonio dejó atrás a mil jinetes», como ya observó el audit trail inglés; por eso la traducción española mantiene la clausura abierta sin intentar completar la frase.
  spanish_consistency_notes:
  - Se usa «Azoto» como forma española estable del topónimo Ἄζωτον.
  - Se mantiene «campamentos» para παρεμβολαί, conforme al valor literal y militar del término.
  - Se traduce ἵππον como «jinetes» por el uso metonímico militar de «caballo/caballería» en el griego.
  - No se introduce lenguaje eclesiástico ni teológico ajeno al género narrativo bélico del pasaje.
