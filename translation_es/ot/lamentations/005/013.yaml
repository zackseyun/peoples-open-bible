translation:
  language: es
  text: Los jóvenes cargan piedras de molino[a], y los muchachos se tambalean[b] bajo leña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Piedras de molino» traduce el sentido concreto que el inglés POB toma como principal; el hebreo también puede aludir, de forma más amplia, al trabajo de molienda o a un molino en general.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tropiezan» o «vacilan»; la imagen sugiere que los muchachos flaquean bajo una carga de leña o madera.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחוּרִים
  english_pob_choice: Young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los jóvenes adultos
  - los mozos
  lexicon: HALOT
  rationale: El término designa varones jóvenes en la plenitud de la edad; en español, «los jóvenes» comunica esa fuerza social y física sin sobrecargar el verso con una paráfrasis.
- source_word: טְחוֹן
  english_pob_choice: millstones
  chosen_spanish: piedras de molino
  alternatives_spanish:
  - molinos
  - trabajo de molienda
  - piedras para moler
  lexicon: HALOT
  rationale: La elección inglesa privilegia el objeto pesado asociado con la molienda. En español, «piedras de molino» es la forma natural y concreta para conservar la imagen de carga física.
- source_word: נָשָׂאוּ
  english_pob_choice: carry
  chosen_spanish: cargan
  alternatives_spanish:
  - llevan
  - soportan
  - cargan sobre sí
  lexicon: HALOT
  rationale: El verbo expresa cargar o llevar un peso; «cargan» mantiene la acción concreta y el tono de trabajo forzado en el lamento.
- source_word: וּנְעָרִים
  english_pob_choice: and boys
  chosen_spanish: y los muchachos
  alternatives_spanish:
  - y los jóvenes
  - y los muchachitos
  - y los adolescentes
  lexicon: HALOT
  rationale: «Muchachos» preserva la diferencia respecto de «jóvenes» y refuerza el contraste con la mayor edad/fuerza del primer hemistiquio.
- source_word: בָּעֵץ
  english_pob_choice: under wood
  chosen_spanish: bajo la madera
  alternatives_spanish:
  - bajo la leña
  - con la madera
  - bajo cargas de madera
  lexicon: HALOT
  rationale: La imagen es de abatimiento bajo una carga material. «Bajo la madera» conserva la relación espacial y la concreción del objeto, sin suavizarla en una interpretación más abstracta.
- source_word: כָּשָׁלוּ
  english_pob_choice: stagger
  chosen_spanish: tropiezan
  alternatives_spanish:
  - vacilan
  - se tambalean
  - caen
  lexicon: HALOT
  rationale: El verbo hebreo apunta a tropezar/flaquear. «Tropiezan» mantiene la imagen física de pérdida de equilibrio que el inglés expresa con «stagger».
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje con alta concordancia respecto del audit trail inglés: mantiene el paralelismo, conserva la imaginería de carga física y reproduce la diferencia entre varones jóvenes y muchachos. Se evita una lectura más abstracta de טְחוֹן porque el contexto favorece un objeto pesado de molienda, pero se deja constancia de la alternativa semántica.'
  spanish_consistency_notes:
  - Se usa «jóvenes» para בַּחוּרִים y «muchachos» para נְעָרִים para preservar el contraste del hebreo.
  - «Bajo la madera» conserva la imagen de carga opresiva sin convertirla en paráfrasis.
  - No se introduce terminología eclesiástica tradicional; el verso es poético y descriptivo.
  - Los corchetes de notas se colocan solo donde hay una alternativa lexical real en el texto.
