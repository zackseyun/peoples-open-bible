translation:
  language: es
  text: Recuerda lo que Yahvé tu Dios hizo a Miriam en el camino cuando ustedes salían de Egipto.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que Yahvé tu Dios había hecho a Miriam».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, durante el viaje de Israel después del éxodo; véase Números 12:1–15.
    reason: cross_reference
lexical_decisions:
- source_word: זָכ֕וֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Ten presente
  - Haz memoria de
  lexicon: HALOT
  rationale: El imperativo de זכר pide una orden directa de recordar. «Recuerda» es natural en español, conserva el tono exhortativo y la fuerza de memoria covenantal sin añadir paráfrasis.
- source_word: אֵת אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - eso que
  lexicon: HALOT
  rationale: La combinación del marcador de objeto con el relativo introduce el contenido recordado. «Lo que» es la forma española más natural y fiel al valor de la cláusula.
- source_word: עָשָׂה
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - había hecho
  - trató
  lexicon: HALOT
  rationale: El verbo expresa la acción de Yahvé respecto de Miriam. «Hizo» refleja de manera directa la acción narrada sin introducir un matiz aspectual no requerido por el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino transliterado según la norma del proyecto. «Yahvé» mantiene el nombre propio del pacto y evita la sustitución por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios
  lexicon: HALOT
  rationale: La forma con sufijo de segunda persona masculina singular se traduce de modo directo como «tu Dios», expresión covenantal estándar y clara en español.
- source_word: לְמִרְיָם
  english_pob_choice: to Miriam
  chosen_spanish: a Miriam
  alternatives_spanish:
  - contra Miriam
  - sobre Miriam
  lexicon: HALOT
  rationale: La preposición ל con עשה puede marcar a la persona afectada por la acción. En español, «a Miriam» conserva esa relación sin decidir de más entre matices como «contra» o «para».
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - durante el viaje
  lexicon: HALOT
  rationale: «En el camino» es el equivalente natural de la expresión espacial hebrea y funciona bien como marco narrativo del episodio.
- source_word: בְּצֵאתְכֶם
  english_pob_choice: when you were coming out
  chosen_spanish: cuando salían
  alternatives_spanish:
  - cuando ustedes salían
  - al salir
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo tiene valor temporal. «Cuando salían» preserva el proceso de la salida y suena idiomático en español bíblico contemporáneo.
- source_word: מִמִּצְרַיִם
  english_pob_choice: of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - fuera de Egipto
  lexicon: HALOT
  rationale: La preposición מן, unida al verbo de salida, se rinde naturalmente como «de Egipto» en español; el contexto ya comunica la idea de salida.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El hebreo contiene יְהוָה de forma explícita, por lo que se conserva el nombre propio y no se lo sustituye por un título. «Yahvé» sigue la terminología del proyecto y mantiene la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Referencia temporal del episodio de Miriam
  english_pob_reading: That is, during Israel's journey after the exodus; see Numbers 12:1–15.
  chosen_spanish_reading: durante el camino de Israel después del éxodo
  alternative_spanish_readings:
  - en la travesía después del éxodo
  - mientras Israel salía de Egipto
  rationale: El hebreo sitúa el hecho «en el camino» y «cuando salían de Egipto». La formulación elegida conserva el marco histórico sin convertirlo en una explicación interpretativa dentro del texto principal.
  doctrine_reference: 'Cruzada canónica: Números 12:1–15'
translation_notes:
  revision_awareness: El inglés auditado retiró una coma innecesaria para mayor fluidez, pero no cambió el contenido semántico. El español sigue esa misma línea de lectura continua, sin pausa artificial entre «camino» y la cláusula temporal.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma del nombre divino conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del Tetragrámaton para mantener transparencia con el hebreo.
  - «Recuerda» refleja el imperativo breve y directo del hebreo.
  - «Miriam» se mantiene como nombre propio sin adaptar la forma bíblica tradicional.
  - La puntuación con dos notas al pie corresponde a la alternativa verbal y a la referencia cruzada canónica.
