translation:
  language: es
  text: Cuando un extranjero[a] resida con ustedes en su tierra, no lo maltraten[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Extranjero» traduce el hebreo ger, un no nativo que vive entre Israel; en otros contextos también puede verterse como «forastero residente» o «residente extranjero».
    reason: cultural_note
  - marker: b
    text: O «no lo opriman» o «no lo traten injustamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  - Y si
  lexicon: HALOT
  rationale: La construcción introduce un caso legal esperado o contemplado. «Cuando» conserva ese matiz situacional en español y suena natural en una norma.
- source_word: יָג֧וּר
  english_pob_choice: resides
  chosen_spanish: resida
  alternatives_spanish:
  - habite
  - viva
  - more
  lexicon: HALOT
  rationale: El verbo גור expresa residencia estable de un no nativo; «resida» mantiene la idea de vivir de modo continuado sin sonar arcaico.
- source_word: אִתְּךָ
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - contigo
  lexicon: HALOT
  rationale: El sufijo es singular en hebreo, pero el mandamiento se dirige al pueblo como comunidad en el plural. En español, «con ustedes» comunica de forma natural el destinatario colectivo.
- source_word: גֵּר
  english_pob_choice: foreigner
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - forastero residente
  - sojourner
  lexicon: HALOT
  rationale: גֵּר designa a un no israelita que vive dentro de la sociedad de Israel; «extranjero» expresa bien la no pertenencia nativa. No se usa «forastero» porque en español puede sonar a simple visitante o desconocido, y «sojourner» sería un calco innecesario.
- source_word: בְּאַרְצְכֶם
  english_pob_choice: in your land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en su país
  - en la tierra de ustedes
  lexicon: HALOT
  rationale: «Tierra» conserva la resonancia bíblica y pactal de אֶרֶץ mejor que «país». Se evita «su» ambiguo mediante el complemento plural de contexto en la cláusula anterior.
- source_word: לֹא תוֹנ֖וּ
  english_pob_choice: you shall not mistreat
  chosen_spanish: no lo maltraten
  alternatives_spanish:
  - no lo opriman
  - no le hagan daño
  - no lo traten injustamente
  lexicon: HALOT
  rationale: יַנה en hifil puede significar hacer injusticia, oprimir o maltratar. «Maltratar» es claro y suficientemente amplio; «oprimir» queda como alternativa semántica más fuerte, y «tratar injustamente» sería más explicativo que directo.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - al extranjero
  lexicon: HALOT
  rationale: El objeto masculino singular se conserva con el pronombre átono «lo», manteniendo la referencia personal sin neutralizar el género gramatical del hebreo.
theological_decisions:
- issue: Sentido social y legal de גֵּר en la legislación de santidad
  english_pob_reading: foreigner
  chosen_spanish_reading: extranjero
  alternative_spanish_readings:
  - forastero
  - residente extranjero
  - sojourner
  rationale: El término no describe a un turista ni a un desconocido pasajero, sino a un no israelita que vive entre el pueblo y queda bajo su protección legal. «Extranjero» comunica esa alteridad básica; el matiz de residencia queda en el verbo «resida».
  doctrine_reference: Translation philosophy §§5–6; policy on context-sensitive lexical force
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado sin cambios del tramo inglés: no se incorporaron revisiones pendientes y se mantuvo la solución léxica estable para גֵּר, יגור y לא תונו.'
  spanish_consistency_notes:
  - Se conservó el tono legal directo del versículo con una prohibición breve y pública.
  - Se mantuvo «tierra» para אֶרֶץ por coherencia con el registro bíblico del POB.
  - Se evitó «Señor» o sustituciones teológicas no pertinentes, ya que el versículo no contiene el tetragrámaton ni el nombre divino.
