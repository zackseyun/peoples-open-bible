translation:
  language: es
  text: Cuando llegó el séptimo mes[a], y los hijos de Israel[b] estaban cada uno en sus propios lugares[c], se reunieron unánimes en el espacio abierto[d] de la primera puerta del lado oriental.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La referencia temporal expresa la llegada del mes; también podría entenderse como «cuando comenzó el séptimo mes».
    reason: alternative_reading
  - marker: b
    text: O, «los israelitas». El griego dice literalmente «los hijos de Israel», una expresión familiar y de pacto.
    reason: lexical_alternative
  - marker: c
    text: El paralelo hebreo en Nehemías enfatiza que Israel estaba asentado en sus poblaciones; aquí el griego presenta de modo semejante a cada persona en su propio lugar antes de la asamblea.
    reason: cross_reference
  - marker: d
    text: O, «el lugar amplio» o «la plaza». El griego denota un área espaciosa y abierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐνστάντος
  english_pob_choice: had come
  chosen_spanish: llegó
  alternatives_spanish:
  - había llegado
  - había venido
  - se había iniciado
  lexicon: LSJ
  rationale: El genitivo absoluto marca la llegada del séptimo mes; «llegó» comunica con naturalidad el comienzo temporal sin perder el valor aspectual del griego.
- source_word: τοῦ ἑβδόμου μηνός
  english_pob_choice: the seventh month
  chosen_spanish: el séptimo mes
  alternatives_spanish:
  - el mes séptimo
  lexicon: LSJ
  rationale: Es una referencia calendárica directa; se conserva de forma simple y transparente.
- source_word: τῶν υἱῶν Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos del Israel
  lexicon: LSJ
  rationale: Se conserva la expresión familiar y covenantal del griego. «Hijos» mantiene la transparencia lexical mejor que una colectivización como «israelitas».
- source_word: ἕκαστος ἐν τοῖς ἰδίοις
  english_pob_choice: each in their own places
  chosen_spanish: cada uno en sus propios lugares
  alternatives_spanish:
  - cada uno en su propio lugar
  - cada uno en sus casas
  - cada uno en lo suyo
  lexicon: LSJ
  rationale: La construcción plural/neutra admite una referencia distributiva. «Sus propios lugares» mantiene la idea de pertenencia y ubicación sin forzar «casas» o «ciudades».
- source_word: συνήχθησαν
  english_pob_choice: they gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: LSJ
  rationale: Verbo narrativo natural en español; comunica la acción colectiva de modo digno y claro.
- source_word: ὁμοθυμαδόν
  english_pob_choice: with one accord
  chosen_spanish: unánimes
  alternatives_spanish:
  - con un mismo sentir
  - de común acuerdo
  - con un solo ánimo
  lexicon: LSJ
  rationale: El adverbio enfatiza unidad de intención, no solo proximidad física. «Unánimes» expresa bien esa unanimidad en español bíblico moderno.
- source_word: εἰς τὸ εὐρύχωρον
  english_pob_choice: in the open area
  chosen_spanish: en el espacio abierto
  alternatives_spanish:
  - en la explanada
  - en el lugar amplio
  - en la plaza
  lexicon: LSJ
  rationale: El sustantivo indica un ámbito amplio y abierto. «Espacio abierto» evita precisar más de lo que el texto afirma.
- source_word: τοῦ πρώτου πυλῶνος
  english_pob_choice: of the first gate
  chosen_spanish: de la primera puerta
  alternatives_spanish:
  - de la puerta principal
  - de la primera entrada
  lexicon: LSJ
  rationale: Se mantiene la literalidad básica de «primer/primera» porque el matiz arquitectónico exacto no es seguro.
- source_word: τοῦ πρὸς τῇ ἀνατολῇ
  english_pob_choice: on the east
  chosen_spanish: la del oriente
  alternatives_spanish:
  - la oriental
  - la que da al oriente
  - la del lado oriental
  lexicon: LSJ
  rationale: La frase identifica la puerta por su orientación. «La del oriente» suena natural en español y conserva la referencia direccional.
theological_decisions:
- issue: Expresión covenantal y género gramatical en τῶν υἱῶν Ἰσραήλ
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del pueblo de Israel
  rationale: Se preserva la formulación familiar del griego por transparencia textual y porque la POB inglesa también la retuvo. Aunque «israelitas» es idiomático, atenúa la fuerza lexical de la expresión.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Unidad de acción en ὁμοθυμαδόν
  english_pob_reading: with one accord
  chosen_spanish_reading: unánimes
  alternative_spanish_readings:
  - con un mismo sentir
  - de común acuerdo
  rationale: La unidad aquí es de intención y propósito, no mera simultaneidad. «Unánimes» conserva mejor esa dimensión comunitaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca explícitamente en el texto español. El contenido mantiene concordancia alta con el griego Swete 1909 y con la auditoría inglesa; no se introdujeron cambios de sentido respecto del pass previo, solo ajuste de anclaje de notas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva «los hijos de Israel» por transparencia lexical y coherencia con la política de género-accurate.
  - «Espacio abierto» evita sobreinterpretar εὐρύχωρον como una plaza formal o un patio específico.
