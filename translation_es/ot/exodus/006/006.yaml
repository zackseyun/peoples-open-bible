translation:
  language: es
  text: 'Por tanto, di a los hijos de Israel[a]: «Yo soy Yahvé, y yo los sacaré de debajo de las cargas de Egipto, y los libraré de su esclavitud[c], y los redimiré con un brazo extendido y con grandes juicios[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los descendientes de Israel’ o ‘los israelitas’. El hebreo dice literalmente ‘hijos de Israel’.
    reason: lexical_alternative
  - marker: c
    text: O ‘de su servidumbre’. El término hebreo puede denotar servicio o labor, pero aquí se refiere a servidumbre opresiva.
    reason: lexical_alternative
  - marker: d
    text: O ‘con grandes actos de juicio’.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - a los hijos de Jacob
  - a los israelitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘a los hijos/sones de Israel’. En español, ‘hijos de Israel’ conserva la expresión familiar y el marcador de grupo del original; ‘israelitas’ es más fluido, pero menos transparente al hebreo.
- source_word: יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: Yo soy Yahvé
  alternatives_spanish:
  - Yo soy Yahvé
  - Yo soy el SEÑOR
  lexicon: HALOT
  rationale: El texto fuente usa el nombre propio del pacto, y el estándar del proyecto en español es ‘Yahvé’. Se evita el reemplazo por ‘SEÑOR’ porque ocultaría el nombre divino explícito del hebreo.
- source_word: וְהוֹצֵאתִי
  english_pob_choice: I will bring you out
  chosen_spanish: los sacaré
  alternatives_spanish:
  - los sacaré
  - los haré salir
  - los traeré fuera
  lexicon: HALOT
  rationale: ‘Sacar’ comunica de manera natural en español la salida efectiva del dominio egipcio y mantiene el movimiento de extracción implícito en el hebreo.
- source_word: מִתַּחַת סִבְלֹת מִצְרַיִם
  english_pob_choice: from under the burdens of Egypt
  chosen_spanish: de debajo de las cargas de Egipto
  alternatives_spanish:
  - de debajo de las cargas de Egipto
  - de debajo de la opresión de Egipto
  - de debajo del yugo de Egipto
  lexicon: HALOT
  rationale: ‘Cargas’ conserva la imagen concreta de peso/carga de סִבְלֹת y ‘de debajo de’ refleja מִתַּחַת con precisión. ‘Opresión’ o ‘yugo’ explicitan más de lo que el término exige.
- source_word: וְהִצַּלְתִּי
  english_pob_choice: I will deliver you
  chosen_spanish: los libraré
  alternatives_spanish:
  - los libraré
  - los rescataré
  - los salvaré
  lexicon: HALOT
  rationale: ‘Librar’ expresa rescate y liberación de una situación de dominio o peligro, y corresponde bien al valor de נצל en este contexto narrativo.
- source_word: מֵעֲבֹדָתָם
  english_pob_choice: from their slavery
  chosen_spanish: de su esclavitud
  alternatives_spanish:
  - de su esclavitud
  - de su servidumbre
  - de su bondage
  lexicon: HALOT
  rationale: Aquí עֲבֹדָה no es trabajo neutral sino servidumbre opresiva. ‘Esclavitud’ preserva la fuerza social y teológica del contexto exódico mejor que ‘servicio’ o ‘trabajo’.
- source_word: וְגָאַלְתִּי
  english_pob_choice: I will redeem you
  chosen_spanish: los redimiré
  alternatives_spanish:
  - los redimiré
  - los reclamaré como parientes
  - los rescataré mediante rescate
  lexicon: HALOT
  rationale: '‘Redimir’ conserva el campo semántico de גאל: redención por pariente y liberación con carga legal/covenantal. Otras opciones aclaran, pero pierden la densidad bíblica del término.'
- source_word: בִּזְרֹעַ נְטוּיָה
  english_pob_choice: with an outstretched arm
  chosen_spanish: con brazo extendido
  alternatives_spanish:
  - con brazo extendido
  - con brazo alzado
  - con brazo tendido
  lexicon: HALOT
  rationale: ‘Brazo extendido’ reproduce el modismo antropomórfico de forma natural en español y mantiene la imagen de poder desplegado sin explicitarla excesivamente.
- source_word: וּבִשְׁפָטִים גְּדֹלִים
  english_pob_choice: and with great judgments
  chosen_spanish: y con grandes juicios
  alternatives_spanish:
  - y con grandes juicios
  - y con grandes actos de juicio
  - y con severos juicios
  lexicon: HALOT
  rationale: ‘Juicios’ es la forma más cercana al sustantivo hebreo שְׁפָטִים. ‘Actos de juicio’ explicita la idea, pero ‘grandes juicios’ conserva mejor la concisión del original.
theological_decisions:
- issue: Nombre divino יְהוָה en la declaración directa
  english_pob_reading: I am Yahweh
  chosen_spanish_reading: Yo soy Yahvé
  alternative_spanish_readings:
  - Yo soy Yahvé
  - Yo soy el SEÑOR
  rationale: La traducción española del proyecto preserva el nombre divino revelado en el hebreo en lugar de sustituirlo por un título. Esto evita ocultar la autoidentificación del pacto y mantiene continuidad con la política textual del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de עֲבֹדָתָם en el contexto del Éxodo
  english_pob_reading: from their slavery
  chosen_spanish_reading: de su esclavitud
  alternative_spanish_readings:
  - de su esclavitud
  - de su servidumbre
  - de su bondage
  rationale: El contexto inmediato de opresión faraónica exige una palabra que exprese servidumbre coercitiva. ‘Esclavitud’ es la opción más clara y fiel al efecto del pasaje, sin suavizar la condición de Israel.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
- issue: Imagen de liberación divina en ‘brazo extendido’ y ‘grandes juicios’
  english_pob_reading: with an outstretched arm and with great judgments
  chosen_spanish_reading: con brazo extendido y con grandes juicios
  alternative_spanish_readings:
  - con brazo extendido y con grandes juicios
  - con brazo poderoso y con grandes actos de juicio
  rationale: 'Se conserva la antropomorfía bíblica y el lenguaje judicial del texto porque ambos forman parte de la teología narrativa del éxodo: liberación poderosa y juicio contra Egipto.'
  doctrine_reference: Exodus 6:6; cf. Exodus 7–12
translation_notes:
  revision_awareness: La revisión más reciente indicó ‘unchanged’ y el informe cruzado mostró alta concordancia (agreement 1.0). No se registraron revisiones aplicadas; la redacción española sigue de cerca la lectura auditada del hebreo y del inglés POB, con la terminología del proyecto para el nombre divino.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה conforme al estándar español del proyecto.
  - ‘Hijos de Israel’ conserva la literalidad hebrea y se ancla con nota alternativa para ‘israelitas’.
  - ‘Esclavitud’ traduce עֲבֹדָה en sentido opresivo, evitando ‘servicio’ por ser engañoso en este contexto.
  - ‘Brazo extendido’ y ‘grandes juicios’ preservan las imágenes idiomáticas y judiciales del hebreo sin paráfrasis excesiva.
  - La puntuación de discurso directo sigue el español moderno y mantiene la cadencia solemne del oráculo.
