  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La decisión 'árboles de loto' con nota alternativa está alineada con la POB inglesa. El ajuste principal es léxico-estilístico en בְּסֵתֶר y en la coordinación con קָנֶה וּבִצָּה.
