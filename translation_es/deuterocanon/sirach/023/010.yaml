translation:
  language: es
  text: Porque así como un esclavo sometido a examen constante no quedará libre de cardenales, así también el que jura y nombra el Nombre continuamente[a] nunca será purificado del pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y nombrando el Nombre continuamente'. El griego probablemente alude al uso repetido del nombre divino al jurar o en habla irreverente.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκέτης
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  - doméstico
  lexicon: BDAG
  rationale: El término griego puede designar a un servidor doméstico, pero el contexto comparativo subraya su condición sometida y su falta de libertad frente al examen y la corrección. 'Esclavo' conserva mejor esa fuerza que 'siervo', que en español suaviza demasiado la relación de dependencia.
- source_word: ἐξεταζόμενος ἐνδελεχῶς
  english_pob_choice: under constant examination
  chosen_spanish: sometido a examen constante
  alternatives_spanish:
  - siendo examinado continuamente
  - bajo examen continuo
  - examinado de manera constante
  lexicon: BDAG
  rationale: La combinación expresa una acción durativa y repetida. 'Sometido a examen constante' suena natural en español y mantiene la idea de escrutinio persistente sin reducirla a una sola inspección.
- source_word: ἀπὸ μώλωπος οὐκ ἐλαττωθήσεται
  english_pob_choice: will not be free from bruises
  chosen_spanish: no quedará libre de cardenales
  alternatives_spanish:
  - no se librará de moretones
  - no quedará sin cardenales
  - no escapará a los cardenales
  lexicon: LSJ
  rationale: μώλωψ es una marca o contusión producida por golpes; en español 'cardenales' comunica bien la imagen física. 'No quedará libre de' refleja el giro idiomático, es decir, que no saldrá sin tales marcas.
- source_word: ὁ ὀμνύων
  english_pob_choice: one who keeps swearing
  chosen_spanish: el que jura
  alternatives_spanish:
  - el que sigue jurando
  - quien toma juramentos
  - el que hace juramentos
  lexicon: BDAG
  rationale: El participio presente sugiere una práctica habitual. En español, el contexto ya aporta la repetición mediante 'continuamente', por lo que 'el que jura' es suficiente y más directo.
- source_word: καὶ ὀνομάζων
  english_pob_choice: and naming the Name
  chosen_spanish: y nombra el Nombre
  alternatives_spanish:
  - y invoca el Nombre
  - y pronuncia el Nombre
  - y menciona el Nombre
  lexicon: BDAG
  rationale: La POB en inglés preserva la tensión reverencial con 'the Name'. En español, 'el Nombre' con mayúscula reproduce esa alusión sin añadir explícitamente 'Dios', y 'nombra' conserva la literalidad de ὀνομάζω.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - constantemente
  - todo el tiempo
  - sin cesar
  lexicon: BDAG
  rationale: La expresión marca repetición continua. 'Continuamente' es formal, claro y equivalente al valor aspectual del griego.
- source_word: ἀπὸ ἁμαρτίας οὐ μὴ καθαρισθῇ
  english_pob_choice: will never be cleansed from sin
  chosen_spanish: no será limpiado del pecado
  alternatives_spanish:
  - nunca será purificado del pecado
  - no quedará purificado del pecado
  - jamás será limpio del pecado
  lexicon: BDAG
  rationale: καθαρίζω aquí tiene sentido moral/religioso de limpieza. 'Limpiado del pecado' conserva esa imagen y permite que el 'no' enfático haga el trabajo de la negación absoluta.
theological_decisions:
- issue: Referencia de 'nombrar el Nombre' en un contexto de juramentos
  english_pob_reading: An allusion to invoking the divine name in habitual oath-taking or irreverent speech
  chosen_spanish_reading: Una alusión a invocar o pronunciar el Nombre divino de manera habitual al jurar
  alternative_spanish_readings:
  - mención general de un nombre sin referencia divina explícita
  - simple acto de hablar del nombre sin carga reverencial
  rationale: El contexto inmediato trata de juramentos y habla irreverente. La traducción mantiene la alusión mediante 'el Nombre' y no añade una expansión interpretativa mayor que el griego no exige.
  doctrine_reference: Principio de primacía del original y preservación de la tensión lexical/theological sin resolverla de forma expansiva.
translation_notes:
  revision_awareness: 'El inglés POB revisó el texto para acercarse más a οἰκέτης y ἐξεταζόμενος, y para traducir ἀπὸ μώλωπος οὐκ ἐλαττωθήσεται de forma más natural. La presente versión española sigue esas decisiones: conserva la fuerza de esclavitud de οἰκέτης, la idea de examen persistente, y la negación enfática sobre el resultado moral del habla juramentada.'
  spanish_consistency_notes:
  - Se usa 'esclavo' para mantener la fuerza léxica establecida por POB cuando la sujeción es central.
  - '''El Nombre'' se capitaliza para reflejar la alusión reverencial ya documentada en el audit trail.'
  - '''Continuamente'' y ''examen constante'' mantienen la repetición durativa del griego.'
  - '''Limpiado del pecado'' conserva la imagen de καθαρίζω sin sustituirla por una paráfrasis doctrinal.'
