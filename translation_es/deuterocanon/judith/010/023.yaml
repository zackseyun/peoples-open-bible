review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro POB en la mayor parte del versículo: «delante de él» refleja bien κατὰ πρόσωπον αὐτοῦ; «se maravillaron», «belleza de su rostro», y «la levantaron» son fieles. La principal desviación está en θεραπόντων, donde «sirvientes» endurece innecesariamente el matiz cortesano que el inglés auditado fijó como «attendants». También «cayendo sobre su rostro» suena poco natural en español para ἐπὶ πρόσωπον.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene dos puntos de naturalidad mejorables: «sirvientes» suena más servil que cortesano, y «cayendo sobre su rostro» es un calco poco idiomático. «Sus asistentes» y «cayendo rostro en tierra» o equivalente conservan mejor el sentido con español más natural y bíblicamente legible.'
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. La decisión sobre προσεκύνησεν como «se inclinó ante él» es aceptable y coherente con el contexto humano; no requiere cambiarse, aunque «se postró ante él» también sería posible. La revisión necesaria es léxica/estilística, no doctrinal.
  issues:
  - severity: medium
    issue: «sirvientes» para θεραπόντων
    rationale: El rastro inglés documenta un contexto cortesano con «attendants». «Sirvientes» introduce un matiz más doméstico o servil que no refleja tan bien θεράπων en esta escena.
  - severity: medium
    issue: «cayendo sobre su rostro» es un calco poco natural
    rationale: Aunque literal, en español suena torpe. El griego describe una postración física; «cayendo rostro en tierra» expresa mejor la imagen sin perder fidelidad.
  revised_spanish_text: Ahora bien, cuando Judith llegó[a] delante de él y de sus asistentes, todos se maravillaron de la belleza de su rostro; y, cayendo rostro en tierra, se inclinó ante él, y ellos la levantaron.
  revised_footnotes:
  - marker: a
    text: O «en su presencia». El giro griego puede expresar llegada ante alguien en contexto cortesano.
    reason: lexical_alternative
