translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés[a]: «Mira, te he hecho Dios para Faraón, y Aarón tu hermano será tu profeta».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «te he hecho Dios para Faraón». El hebreo presenta a Moisés en un papel representativo semejante al de Dios ante Faraón, con Aarón como su profeta.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, transliterado según la política del proyecto. «Yahvé» evita la sustitución por un título y corresponde al tratamiento dado en la base inglesa.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y dijo
  lexicon: HALOT
  rationale: La waw narrativa avanza la acción; «Entonces» expresa con naturalidad en español el valor secuencial conservado por «Then» en la auditoría inglesa.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  lexicon: HALOT
  rationale: Imperativo de atención dirigido a Moisés. «Mira» es natural en español bíblico contemporáneo y mantiene la fuerza exhortativa sin sobrerrepresentar el matiz.
- source_word: נְתַתִּיךָ
  english_pob_choice: I have made you
  chosen_spanish: te he hecho
  alternatives_spanish:
  - te he puesto
  - te he nombrado
  - te he dado
  lexicon: HALOT
  rationale: Aunque el verbo básico es «dar», el complemento predicativo exige en español un sentido resultativo. «Te he hecho» sigue de cerca la revisión inglesa más reciente y preserva la construcción sin forzar una paráfrasis.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - como Dios
  - un dios
  - divino
  lexicon: HALOT
  rationale: Se mantiene el término directo «Dios» para reflejar el predicado hebreo. En español, la relación funcional-representativa queda contextualmente matizada por «para el faraón» y por la cláusula paralela sobre Aarón como profeta. No se añade «como» porque la revisión textual inglesa optó por una formulación más directa.
- source_word: לְפַרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: para el faraón
  alternatives_spanish:
  - ante el faraón
  - respecto del faraón
  lexicon: HALOT
  rationale: La preposición לְ aquí marca relación/dirección. «Para el faraón» comunica la función asignada a Moisés en relación con Faraón y fluye bien en español.
- source_word: נְבִיאֶךָ
  english_pob_choice: your prophet
  chosen_spanish: tu profeta
  alternatives_spanish:
  - tu portavoz
  - tu vocero
  lexicon: HALOT
  rationale: Se conserva el término técnico «profeta», como en la traducción inglesa, porque el mismo versículo establece la estructura representativa entre Moisés y Aarón.
- source_word: יִהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  lexicon: HALOT
  rationale: Futuro simple natural en español. «Será» mantiene la relación de estado/función prevista en la cláusula.
theological_decisions:
- issue: Cómo expresar a Moisés como אֱלֹהִים respecto del faraón sin implicar deidad ontológica
  english_pob_reading: I have made you God to Pharaoh
  chosen_spanish_reading: te he hecho Dios para el faraón
  alternative_spanish_readings:
  - te he hecho como Dios para el faraón
  - te he hecho un dios para el faraón
  - te he puesto como Dios ante el faraón
  rationale: 'Se conserva la tensión del hebreo y la decisión inglesa revisada: una función representativa de autoridad divina frente al faraón, no una declaración de que Moisés sea Dios por naturaleza. El contexto inmediato con Aarón como «tu profeta» sostiene el paralelismo funcional.'
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Relación entre la fórmula divina y el rol profético de Aarón
  english_pob_reading: Aaron your brother will be your prophet
  chosen_spanish_reading: Aarón, tu hermano, será tu profeta
  alternative_spanish_readings:
  - Aarón, tu hermano, será tu portavoz
  - Aarón, tu hermano, será tu vocero
  rationale: «Profeta» preserva el término bíblico y la estructura de mediación del versículo. Traducirlo como «portavoz» aclararía la función, pero perdería el vocabulario teológico que el texto introduce deliberadamente.
  doctrine_reference: 'Prophetic mediation; Translation philosophy #3'
translation_notes:
  revision_awareness: La base inglesa revisó la frase desde «I have made you like God to Pharaoh» a «I have made you God to Pharaoh» para reflejar más directamente el hebreo. El español sigue esa decisión revisada y evita añadir «como», manteniendo la tensión funcional sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantiene «profeta» para נְבִיאֶךָ, en coherencia con la auditoría inglesa.
  - Se conserva el trato directo singular («te», «tu») para el discurso a Moisés.
  - No se introducen notas al pie porque el texto español no requiere una ambigüedad adicional distinta de la ya resuelta en la decisión teológica.
