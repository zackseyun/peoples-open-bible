translation:
  language: es
  text: 'Sin embargo, dicen a Dios: «Apártate de nosotros[a], y no deseamos el conocimiento de tus caminos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aléjate de nosotros» / «Vete lejos de nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Yet they say
  chosen_spanish: Sin embargo, dicen
  alternatives_spanish:
  - Y dijeron
  - Así dicen
  lexicon: HALOT
  rationale: El waw consecutivo en discurso poético puede expresar una acción formulada como actitud recurrente o característica. «Sin embargo» conserva el matiz adversativo que el POB inglés marcó con «Yet», y «dicen» suena natural en español para la cita directa.
- source_word: לָאֵל
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  - a El
  lexicon: HALOT
  rationale: Aquí אֵל funciona como referencia a Dios, no como nombre propio. En español, «a Dios» es claro y fiel al valor del término sin introducir una forma menos natural.
- source_word: סוּר מִמֶּנּוּ
  english_pob_choice: Depart from us
  chosen_spanish: Apártate de nosotros
  alternatives_spanish:
  - Aléjate de nosotros
  - Vete de nosotros
  lexicon: HALOT
  rationale: El imperativo סוּר puede significar «apartarse, retirarse, irse». «Apártate de nosotros» preserva la fuerza directa del mandato y mantiene la tensión teológica de hablarle así a Dios. El POB inglés anotó alternativas como «Turn aside from us»; en español, «apártate» cubre bien ese campo semántico.
- source_word: וְדַעַת
  english_pob_choice: and we do not desire the knowledge
  chosen_spanish: y no hemos deseado el conocimiento
  alternatives_spanish:
  - y no deseamos el conocimiento
  - y no queremos el conocimiento
  - y no nos ha agradado el conocimiento
  lexicon: HALOT
  rationale: La conjunción simple «y» sigue el ajuste revisado del POB inglés, que evitó imponer una relación causal con «for». «No hemos deseado» refleja חָפַצְנוּ como una negativa de deseo/voluntad, sin convertirla en mera emoción.
- source_word: דְּרָכֶיךָ
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tus vías
  - tus sendas
  lexicon: HALOT
  rationale: «Caminos» es la forma española más natural para דְּרָכִים en este contexto y conserva el sentido moral y de conducta divina que el POB inglés resume como «ways».
- source_word: לֹא חָפָצְנוּ
  english_pob_choice: we do not desire
  chosen_spanish: no hemos deseado
  alternatives_spanish:
  - no deseamos
  - no nos hemos deleitado en
  - no hemos querido
  lexicon: HALOT
  rationale: חפץ expresa deseo, deleite o complacencia. «No hemos deseado» mantiene la fuerza volitiva y deja abierta la tensión entre deseo, deleite y rechazo, sin reducir el hebreo a una sola matiz emocional.
theological_decisions:
- issue: Mantener la insolencia del discurso humano dirigido a Dios
  english_pob_reading: 'Direct address retained: ''Depart from us'''
  chosen_spanish_reading: 'Dirección directa mantenida: «Apártate de nosotros»'
  alternative_spanish_readings:
  - «Déjanos en paz»
  - «Aléjate de nosotros»
  rationale: El hebreo presenta una orden frontal dirigida a Dios; la traducción no debe suavizarla. «Apártate de nosotros» conserva el choque teológico y moral de la escena, tal como lo hace el POB inglés.
  doctrine_reference: 'Principio de traducción: no paraprasear más allá de lo que el texto original permite y no resolver la tensión teológica.'
translation_notes:
  revision_awareness: El borrador sigue la revisión del POB inglés que cambió la relación de la segunda cláusula de «for» a «and», reflejada en español con «y», para respetar más de cerca la conjunción hebrea y el paralelismo del verso.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל, no «El», porque el contexto es de referencia divina común y no de nombre propio.
  - Se usa «caminos» para דְּרָכֶיךָ por ser la equivalencia más idiomática y teológicamente resonante en español.
  - Se conserva el presente «dicen» para reflejar el carácter proverbial/escénico del dicho en poesía, aunque el hebreo tenga waw consecutivo narrativo.
