  yaml_path: translation/ot/ezekiel/011/013.yaml
  text: And it happened[a], as I was prophesying, that Pelatiah son of Benaiah died. Then I fell on my face and cried out with a loud voice and said, “Ah, Lord GOD[b], will you make a complete end of the remnant of Israel?”
  footnotes:
