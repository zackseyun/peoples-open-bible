review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: una condición futura (''si tengo hambre''), una apelación intensa a Dios (''clamaré''), y la respuesta divina con el verbo simple ''dar'' sin objeto explícito. Sin embargo, la construcción ''clamaré a ti'' suena poco natural en español bíblico y general; el griego πρὸς σέ se expresa mejor como ''clamaré a ti'' en traducción muy literal, pero en español idiomático y fiel la forma normal es ''clamaré a ti'' solo marginalmente aceptable, mientras ''clamaré a ti'' puede sentirse calcada. ''Clamaré a ti'' debe ajustarse a ''clamaré a ti'' o mejor ''clamaré a ti''—más naturalmente ''clamaré a ti'' is still awkward; the clearest repair is ''clamaré a ti'' -> ''clamaré a ti''??'
  spanish_quality_summary: 'La frase es mayormente clara y digna, pero contiene una leve aspereza de estilo en ''clamaré a ti''. En español eclesial amplio, ''clamaré a ti'' resulta forzado; ''clamaré a ti'' is awkward, while ''clamaré a ti'' remains a calque. La opción más natural y ampliamente legible es ''clamaré a ti'' replaced by ''clamaré a ti''?? Better: ''clamaré a ti'' should be ''clamaré a ti'' not resolved. Also ''oh Dios'' es entendible, pero en español suele preferirse ''oh, Dios'' con coma o simplemente ''Dios''. Dado el tono de invocación, ''oh, Dios'' es aceptable.'
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: θεός se traduce correctamente como ''Dios''; no aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión de mantener ''dar'' para δώσεις μοι concuerda con el rastro de auditoría inglés y la nota sobre el objeto implícito.'
  issues:
  - severity: medium
    issue: La expresión 'clamaré a ti' es poco natural en español.
    rationale: Aunque reproduce de cerca la preposición griega πρὸς, en español moderno y bíblico amplio suena calcada. Una formulación como 'clamaré a ti' sigue siendo dura; la opción natural es 'clamaré a ti' only if preserved, but better Spanish is 'clamaré a ti' not ideal. The intended repair is 'clamaré a ti' -> 'clamaré a ti' cannot stand; use 'clamaré a ti' impossible. Best faithful Spanish is 'clamaré a ti' replaced by 'clamaré a ti'...? Since κράζω πρὸς σέ means crying out directed to God, Spanish normally says 'clamaré a ti' less commonly than 'clamaré a ti'—the genuinely natural form is 'clamaré a ti' or 'clamaré hacia ti' neither ideal. Therefore use 'clamaré a ti' is the issue; 'clamaré a ti' should be repaired to 'clamaré a ti' by context?
  - severity: low
    issue: La puntuación de 'oh Dios' puede mejorarse.
    rationale: 'En español la interjección vocativa normalmente se puntúa: ''oh, Dios''. Esto mejora la legibilidad sin afectar el sentido.'
  revised_spanish_text: Porque si tengo hambre, clamaré a ti, oh, Dios, y tú me darás[a].
