    rationale: El hebreo, según el audit trail, expresa sangre derramada con carga de culpa moral/legal ('bloodguilt'). 'Caer en sangre' es opaco e idiomáticamente débil en español; puede sonar a accidente o metáfora, no a incurrir en culpa por derramamiento de sangre.
  - severity: medium
    issue: La nota [a] repite el texto principal en vez de ofrecer una alternativa real
    rationale: El audit trail inglés conserva en nota la opción más explícita o más literal frente a la elección principal. Aquí la nota dice exactamente 'de vengarte con tu propia mano', que ya está en el texto, por lo que no aporta información textual ni léxica.
