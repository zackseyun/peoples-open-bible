translation:
  language: es
  text: 'Y Jesús le respondió[b]: «Está escrito: El hombre[a] no vivirá solo de pan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una persona», con el mismo sentido genérico para la humanidad.
    reason: lexical_alternative
  - marker: b
    text: Jesús está citando Deuteronomio 8:3.
