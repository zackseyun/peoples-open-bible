review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura general del griego: interrogatorio formal, propósito de informar y escribir, identificación nominal de los responsables, y solicitud de un registro de nombres. Sin embargo, ''los hombres que iban al frente'' omite el pronombre implícito de relación (''de ellos'') que sí está reflejado en el inglés auditado (''who were leading them'') y en τῶν προκαθηγουμένων / τοὺς ἀφηγουμένους dentro del marco relacional. Además, la nota [b] no sigue del todo la razón auditada en inglés, que enfatiza un registro oficial de supervisores, no solo una imagen relacional.'
  spanish_quality_summary: El español es claro y digno, pero 'iban al frente' suena algo incompleto sin complemento en este contexto administrativo; 'los dirigían' o 'estaban al frente de ellos' lee con más precisión. 'A su cabeza' es entendible pero ligeramente calcado; puede mantenerse si se explica mejor, aunque 'al frente de ellos' suena más natural en español general. También conviene alinear la segunda nota con el sentido administrativo de 'registro oficial'.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son adecuadas, salvo que la formulación de liderazgo debería reflejar mejor la relación con el grupo y la nota sobre ὀνοματογραφίαν / τῶν προκαθηγουμένων debe conservar el matiz de registro oficial documentado en el POB inglés.
  issues:
  - severity: medium
    issue: '''que iban al frente'' no explicita a quién encabezaban'
    rationale: El griego y el inglés auditado indican relación con el grupo ('leading them'). En español, la frase queda más precisa como 'que los dirigían' o 'que estaban al frente de ellos'.
  - severity: medium
    issue: La nota [b] no conserva el matiz administrativo principal
    rationale: La nota inglesa explica que se trata de un registro oficial de los líderes a cargo de la obra. La nota española actual solo comenta la imagen relacional del griego y pierde esa información contextual importante.
  - severity: low
    issue: '''a su cabeza'' suena algo calcado'
    rationale: Es comprensible, pero 'al frente de ellos' o 'sus dirigentes' resulta más natural en español neutral sin perder sentido.
  revised_spanish_text: Entonces les preguntamos, para hacértelo saber y para escribirte los nombres de los hombres que los dirigían[a], y les pedimos la lista de nombres de los que estaban al frente de ellos[b].
  revised_footnotes:
  - marker: a
    text: O, 'que iban al frente de ellos'; el participio griego es algo difícil y puede enfatizar tanto el liderazgo como a quienes presentaban el informe formal.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'la lista de nombres de los que estaban al frente de ellos' se refiere a un registro oficial de los dirigentes que supervisaban la obra.
    reason: cultural_note
  revision_rationale: Se ajusta la primera frase para reflejar con más claridad la relación de liderazgo sobre el grupo ('los dirigían') y se hace más natural la segunda ('al frente de ellos'). También se corrige la nota [b] para conservar el matiz administrativo documentado en el audit trail inglés sobre un registro oficial de supervisores.
