translation:
  language: es
  text: de la trampa de los que vigilaban mi tropiezo[a], y de la mano de los que buscaban mi vida. Tú me salvaste de muchas aflicciones[b], y de la angustia de una llama alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que vigilaban mi caída» o «los que vigilaban mi cojera/tropiezo». La expresión hebrea es idiomática y algo incierta.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice: «y de la angustia de una llama alrededor». El paralelo griego amplía la descripción del rescate y difiere notablemente en esta parte.'
    reason: textual_variant
lexical_decisions:
- source_word: מִמּוֹקֵשׁ / ἐκ παγίδος
  english_pob_choice: from the snare
  chosen_spanish: de la trampa
  alternatives_spanish:
  - del lazo
  - de la red
  lexicon: HALOT / contexto poético
  rationale: En español, «trampa» comunica con naturalidad la imagen de captura o acecho. «Lazo» sería posible, pero aquí el paralelismo con vigilancia hostil favorece una imagen más general de emboscada o trampa.
- source_word: צוֹפֵי צַלְעִי / διαβολῆς γλώσσης
  english_pob_choice: those watching for my stumbling
  chosen_spanish: los que vigilaban mi tropiezo
  alternatives_spanish:
  - los que vigilaban mi caída
  - los que acechaban mi paso en falso
  - los que observaban mi cojera
  lexicon: HALOT / idiomático
  rationale: La frase hebrea es idiomática y algo incierta; «tropiezo» conserva la idea de una caída o falla sin forzar una imagen demasiado técnica. «Vigilaban» mantiene el matiz de observación hostil que exige el contexto.
- source_word: וּמִּיַד / ἀπὸ χειλέων
  english_pob_choice: and from the hand of
  chosen_spanish: y de la mano de
  alternatives_spanish:
  - y del poder de
  - y del control de
  lexicon: HALOT / idiomático
  rationale: «Mano de» preserva el hebraísmo de poder o dominio, y funciona bien en español bíblico sin volverlo arcaico en exceso.
- source_word: מְבַקְשֵׁי נַפְשִׁי / ἀπὸ χειλέων ἐργαζομένων ψεῦδος
  english_pob_choice: those seeking my life
  chosen_spanish: los que buscaban mi vida
  alternatives_spanish:
  - los que buscaban matarme
  - los que buscaban mi alma
  lexicon: HALOT
  rationale: «Vida» refleja el valor de נֶפֶשׁ en contexto de amenaza. Evita introducir una lectura ontológica de «alma» que el hebreo no exige aquí.
- source_word: הוֹשַׁעְתָּנִי / ἐγένου βοηθός
  english_pob_choice: You saved me
  chosen_spanish: Tú me salvaste
  alternatives_spanish:
  - Tú me libraste
  - Tú me socorriste
  lexicon: HALOT
  rationale: «Salvar» reproduce de forma directa el sentido del verbo, y en español mantiene la relación personal con Dios expresada por el discurso en segunda persona.
- source_word: מֵרַבּוֹת צָרוֹת / κατὰ τὸ πλῆθος ἐλέου
  english_pob_choice: from many troubles
  chosen_spanish: de muchas aflicciones
  alternatives_spanish:
  - de muchas angustias
  - de grandes aflicciones
  lexicon: HALOT
  rationale: «Aflicciones» conserva el registro bíblico y el plural hebreo; «muchas» mantiene la idea cuantitativa que el audit trail prefirió.
- source_word: וּמִמְּצוּקוֹת שַׁלְהֶבֶת מִסָּבִיב
  english_pob_choice: from the distress of a flame all around
  chosen_spanish: de la angustia de una llama todo alrededor
  alternatives_spanish:
  - de la angustia de una llama alrededor
  - de una llama angustiosa que rodeaba todo
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de fuego/llama sin resolver si es literal o metafórica. «Angustia» refleja מְצוּקוֹת y «todo alrededor» preserva la idea de cerco.
theological_decisions:
- issue: Si el último miembro describe fuego literal o aflicción figurada
  english_pob_reading: from the distress of a flame all around
  chosen_spanish_reading: de la angustia de una llama todo alrededor
  alternative_spanish_readings:
  - de una llama ardiente que me cercaba
  - de la angustia de un fuego alrededor
  rationale: El hebreo permite ambas posibilidades; la redacción española conserva la imagen sin despejarla. Esto mantiene la tensión textual en vez de interpretarla prematuramente.
  doctrine_reference: Preservar la ambigüedad legítima del texto fuente; primacía del hebreo sobre una resolución interpretativa excesiva.
- issue: Cómo entender נֶפֶשׁ en un contexto de hostilidad
  english_pob_reading: those seeking my life
  chosen_spanish_reading: los que buscaban mi vida
  alternative_spanish_readings:
  - los que buscaban mi alma
  - los que querían quitarme la vida
  rationale: «Vida» expresa el sentido contextual de amenaza y búsqueda de destrucción personal. Evita importar una antropología del alma que no es la función principal del pasaje.
  doctrine_reference: Traducción semántica contextual, sin añadir doctrina ajena al giro idiomático.
translation_notes:
  revision_awareness: El borrador sigue el testimonio hebreo principal de Sirácides 51:3, con apoyo del paralelo griego para no perder de vista la ampliación de rescate. No se adoptaron cambios de la revisión más reciente porque el estado indicado es de estabilidad y acuerdo alto.
  spanish_consistency_notes:
  - Se mantuvo «Tú» con mayúscula por dirigirse a Dios en segunda persona.
  - 'Se prefirió vocabulario bíblico sobrio y moderno: «trampa», «tropiezo», «aflicciones», «llama».'
  - No se usó «SEÑOR» ni «Mesías» porque este versículo no contiene esos términos.
  - La frase «de la mano de» conserva el hebraísmo de poder/dominio sin volver el español artificial.
