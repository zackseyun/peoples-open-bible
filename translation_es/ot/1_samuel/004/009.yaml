translation:
  language: es
  text: ¡Cobrad ánimo y sed hombres[a], filisteos, no sea que lleguéis a ser esclavos de los hebreos, como ellos lo han sido de vosotros[b]. ¡Sed hombres y pelead!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mostraos hombres» o «actuad como hombres». El hebreo usa un modismo masculino de valentía.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como ellos fueron esclavos de vosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְחַזְּקוּ
  english_pob_choice: Be strong
  chosen_spanish: Cobrad ánimo
  alternatives_spanish:
  - Fortalézcanse
  - Sean fuertes
  lexicon: HALOT
  rationale: El hitpael imperativo plural exhorta a tomar valor y fuerza en un contexto de guerra. «Cobrad ánimo» comunica bien la carga exhortativa y resulta natural en español, sin perder el impulso marcial del hebreo.
- source_word: וִהְיוּ לַאֲנָשִׁים
  english_pob_choice: be men
  chosen_spanish: sed hombres
  alternatives_spanish:
  - muéstrense hombres
  - actúen como hombres
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de valentía viril y no solo de madurez genérica. «Sed hombres» conserva la forma marcada y el tono retórico del original, tal como lo refleja la decisión inglesa.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: O Philistines
  chosen_spanish: filisteos
  alternatives_spanish:
  - ¡oh, filisteos!
  - filisteos
  lexicon: HALOT
  rationale: El vocativo está claro por el contexto. En español, el vocativo puede quedar implícito por la exclamación inicial y la puntuación, sin necesidad de añadir una partícula que suene forzada.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o si no
  lexicon: HALOT
  rationale: Introduce una advertencia sobre un resultado indeseable. «No sea que» es una equivalencia natural y elevada en español, adecuada para este registro.
- source_word: תַּעַבְדּוּ
  english_pob_choice: you become slaves to
  chosen_spanish: os hagáis esclavos de
  alternatives_spanish:
  - servís a
  - seáis sometidos a
  lexicon: HALOT
  rationale: En este contexto militar-político, el verbo עבד expresa sometimiento servil y no mera prestación voluntaria de servicio. «Haceros esclavos» conserva la fuerza del inglés POB y del hebreo, sin suavizar la amenaza.
- source_word: לָעִבְרִים
  english_pob_choice: the Hebrews
  chosen_spanish: los hebreos
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: El texto hebreo dice «hebreos», un término de designación externa que no conviene armonizar con «israelitas». La forma española mantiene esa precisión léxica.
- source_word: כַּאֲשֶׁר עָבְדוּ לָכֶם
  english_pob_choice: as they have been to you
  chosen_spanish: como ellos lo han sido de vosotros
  alternatives_spanish:
  - como ellos os han servido
  - como ellos fueron esclavos de vosotros
  lexicon: HALOT
  rationale: La comparación remite al estado previo de subordinación de los hebreos respecto de los filisteos. El giro elegido preserva el paralelismo con «esclavos» y evita una repetición pesada, mientras mantiene la relación de dependencia.
- source_word: וִהְיִיתֶם לַאֲנָשִׁים
  english_pob_choice: Be men
  chosen_spanish: Sed hombres
  alternatives_spanish:
  - Mostraos hombres
  - Actuad como hombres
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del modismo para reproducir el efecto retórico del hebreo y la consistencia con la primera cláusula.
- source_word: וְנִלְחַמְתֶּם
  english_pob_choice: and fight
  chosen_spanish: y pelead
  alternatives_spanish:
  - y combatid
  - y luchad
  lexicon: HALOT
  rationale: En un llamado previo a la batalla, «pelead» es directo, natural y suficientemente fuerte para reflejar el imperativo exhortativo.
theological_decisions:
- issue: Modismo masculino de valentía en לַאֲנָשִׁים
  english_pob_reading: be men
  chosen_spanish_reading: sed hombres
  alternative_spanish_readings:
  - mostraos hombres
  - actuad como hombres
  rationale: Se preserva el lenguaje masculino marcado del original, porque aquí funciona como exhortación guerrera dirigida a combatientes masculinos. Neutralizarlo borraría una señal retórica y semántica del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sometimiento servil en עבד
  english_pob_reading: become slaves to
  chosen_spanish_reading: os hagáis esclavos de
  alternative_spanish_readings:
  - servís a
  - seáis sometidos a
  rationale: La escena no describe servicio voluntario, sino la amenaza de derrota y sujeción militar. «Esclavos» conserva la fuerza del término y evita desdibujar la imagen de cautiverio implícita en el contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1; Contested terms table on δοῦλος by analogy of bonded-status explicitness
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el presente borrador sigue de cerca la lectura inglesa auditada y la base hebrea, manteniendo el paralelismo retórico, la fuerza de «esclavos» y el modismo masculino.
  spanish_consistency_notes:
  - Se mantiene «hebreos» y no «israelitas», conforme al término del texto fuente.
  - «Cobrad ánimo» evita un calco rígido de «be strong» pero conserva el valor exhortativo marcial.
  - La duplicación de «Sed hombres» reproduce la repetición enfática del hebreo.
  - Se usa puntuación exclamativa para reflejar la arenga de combate.
  - Las notas a pie preservan alternativas relevantes sin neutralizar el género del modismo.
