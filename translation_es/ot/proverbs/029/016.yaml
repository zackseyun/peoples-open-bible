translation:
  language: es
  text: Cuando los impíos se multiplican, la transgresión aumenta; pero los justos verán su caída.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''verán su caída/ruina''. El verbo hebreo significa simplemente ''ver'', y el sustantivo puede rendirse como ''caída'' o ''ruina''.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּרְבוֹת
  english_pob_choice: When ... increase
  chosen_spanish: Cuando ... se multiplican
  alternatives_spanish:
  - Al multiplicarse
  - En el multiplicarse de
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo comunica circunstancia temporal. En español, 'Cuando ... se multiplican' conserva esa relación y suena natural sin perder la idea de aumento numérico.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los injustos
  lexicon: HALOT
  rationale: Como sustantivo plural aplicado a personas moralmente culpables, 'impíos' es un equivalente bíblico claro y digno en español, cercano a 'the wicked'.
- source_word: יִרְבֶּה
  english_pob_choice: increases
  chosen_spanish: aumenta
  alternatives_spanish:
  - se multiplica
  - crece
  lexicon: HALOT
  rationale: El verbo repite la raíz de la primera cola y expresa el resultado del aumento. 'Aumenta' mantiene la simetría con 'se multiplican' y es idiomático en español.
- source_word: פָּשַׁע
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - rebelión
  - pecado
  lexicon: HALOT
  rationale: '''Transgresión'' preserva el sentido de violación o rebeldía del término hebreo, más preciso que el genérico ''pecado''.'
- source_word: וְצַדִּיקִים
  english_pob_choice: but the righteous
  chosen_spanish: pero los justos
  alternatives_spanish:
  - y los justos
  - pero los rectos
  lexicon: HALOT
  rationale: El valor adversativo del ו se expresa naturalmente con 'pero' en el contraste entre las dos mitades. 'Justos' corresponde bien al sustantivo plural.
- source_word: בְּמַפַּלְתָּם
  english_pob_choice: upon their downfall
  chosen_spanish: su caída
  alternatives_spanish:
  - su derrumbe
  - su caída/ruina
  lexicon: HALOT
  rationale: El sustantivo puede referirse a 'caída' o 'derrumbe'. En español, 'su caída' es breve y fiel; el sufijo se entiende como referido a los impíos del primer hemistiquio.
- source_word: יִרְאוּ
  english_pob_choice: will look upon
  chosen_spanish: verán
  alternatives_spanish:
  - mirarán
  - contemplarán
  lexicon: HALOT
  rationale: ראה significa 'ver'. En español, 'verán' conserva la simpleza del verbo hebreo y deja abierta la observación contemplativa implícita sin añadir matiz excesivo.
theological_decisions:
- issue: Referente del sufijo en 'su caída'
  english_pob_reading: The suffix refers to the wicked of the first colon.
  chosen_spanish_reading: El sufijo se entiende como referido a los impíos del primer hemistiquio.
  alternative_spanish_readings:
  - Podría leerse de manera más general como la caída de quienes caen.
  rationale: La proximidad sintáctica y el paralelismo favorecen tomar el sufijo como referencia a los impíos. No se trata de una cuestión doctrinal, sino de una decisión gramatical y contextual.
  doctrine_reference: Sintaxis y paralelismo poético del proverbio
- issue: Matiz de יִרְאוּ en relación con la caída
  english_pob_reading: The righteous will look upon their downfall.
  chosen_spanish_reading: Los justos verán su caída.
  alternative_spanish_readings:
  - Los justos contemplarán su caída.
  - Los justos observarán su caída.
  rationale: El hebreo usa simplemente 'ver'. En español, 'verán' reproduce con exactitud ese valor básico sin introducir triunfo, ironía o morbosidad que el texto no explicita.
  doctrine_reference: Lexema ראה / uso sapiencial
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; por eso la propuesta española sigue de cerca la lectura establecida, manteniendo la alternativa lexical principal en nota.
  spanish_consistency_notes:
  - Se mantiene 'impíos' para רְשָׁעִים y 'justos' para צַדִּיקִים, en línea con el registro sapiencial.
  - Se conserva 'transgresión' para פָּשַׁע para no diluir su fuerza de ruptura/rebeldía.
  - La nota recoge la alternativa semántica de מַפָּלָה sin sobrecargar el texto principal.
  - '''Verán'' respeta el valor básico de ראה; la nota preserva la alternativa ''caída/ruina'' sin perder la relación con el audit trail inglés.'
