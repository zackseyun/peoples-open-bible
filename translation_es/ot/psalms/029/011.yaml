translation:
  language: es
  text: Yahvé da[a] fuerza a su pueblo; Yahvé bendice a su pueblo con paz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo imperfecto también puede entenderse con fuerza futura: «dará».'
    reason: alternative_reading
  - marker: b
    text: «Paz» traduce shalom, término que también puede incluir bienestar, plenitud y wholeness.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino del pacto (Tetragrámaton), y la pauta del proyecto pide preservarlo en español como «Yahvé», no sustituirlo por un título. «Jehová» se evita por no corresponder a la transliteración preferida del audit trail inglés.
- source_word: עֹז
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  - vigor
  lexicon: HALOT
  rationale: El sustantivo expresa fuerza/mayor capacidad. En español, «fuerza» funciona con naturalidad con el verbo «dar» y mantiene el paralelismo poético sin sobredeterminar el matiz hacia «poder».
- source_word: לְעַמּוֹ
  english_pob_choice: to his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - para su pueblo
  - a su gente
  lexicon: HALOT
  rationale: 'La lamed indica aquí destinatario: Yahvé da fuerza «a» su pueblo. «Pueblo» conserva el término corporativo del hebreo y del audit trail inglés.'
- source_word: יִתֵּן
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - dará
  - dé
  lexicon: HALOT
  rationale: El imperfecto hebreo puede leerse como declaración habitual/confidente. En español, el presente «da» reproduce esa fuerza declarativa y mantiene el paralelismo con «bendice».
- source_word: יְבָרֵךְ
  english_pob_choice: blesses
  chosen_spanish: bendice
  alternatives_spanish:
  - bendecirá
  - bendiga
  lexicon: HALOT
  rationale: Como en el primer colon, el imperfecto funciona bien como enunciado declarativo. «Bendice» es el equivalente natural y fiel para el valor verbal de ברך en este contexto.
- source_word: אֶת עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  lexicon: HALOT
  rationale: El marcador de objeto directo más el sustantivo con sufijo se expresa naturalmente con «a su pueblo», manteniendo la repetición retórica del hebreo.
- source_word: בַשָּׁלוֹם
  english_pob_choice: with peace
  chosen_spanish: con paz
  alternatives_spanish:
  - en paz
  - con bienestar
  - con plenitud
  lexicon: HALOT
  rationale: «Shalom» abarca paz, bienestar y plenitud. El audit trail inglés eligió «peace» en el texto principal; en español «con paz» conserva el sentido base sin expandirlo en el cuerpo del versículo.
theological_decisions:
- issue: Nombre divino YHWH en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el Nombre propio del pacto según la pauta doctrinal del proyecto. No se sustituye por un título litúrgico ni por una forma tradicional menos transparente.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יהוה / YHWH'
- issue: Valor aspectual de los imperfectos יִתֵּן / יְבָרֵךְ
  english_pob_reading: present habitual/declarative ('gives ... blesses')
  chosen_spanish_reading: presente declarativo ('da ... bendice')
  alternative_spanish_readings:
  - futuro ('dará ... bendecirá')
  - juntivo/optativo ('que Yahvé dé ... que Yahvé bendiga')
  rationale: En este cierre poético, el presente español expresa con naturalidad la declaración confiada del texto hebreo, sin perder la posibilidad futura, que puede anotarse como lectura alternativa.
  doctrine_reference: DOCTRINE.md — Poetic imperfects and discourse aspect
translation_notes:
  revision_awareness: 'Alineado con el último pass de revisión: alta concordancia, sin cambios requeridos. Se conserva la decisión del audit trail inglés de leer los imperfectos como declaraciones presentes, pero se registra la alternativa futura en nota. La traducción del Nombre divino sigue la política POB de transparencia y preservación del Tetragrámaton.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente como equivalente del Tetragrámaton.
  - Se usa «pueblo» en ambos hemistiquios para reflejar la repetición del hebreo.
  - «Con paz» se reserva para el sentido central de shalom en el texto principal, con expansión semántica en la nota.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto donde corresponde.
