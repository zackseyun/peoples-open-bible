translation:
  language: es
  text: Así que he demostrado que no solo los hombres dominaron las pasiones, sino que también una mujer despreció[a] los mayores tormentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desdeñó los mayores tormentos» o «tuvo en poco los mayores tormentos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέδειξα
  english_pob_choice: I have shown
  chosen_spanish: he mostrado
  alternatives_spanish:
  - he probado
  - he demostrado
  lexicon: BDAG
  rationale: El aoristo de ἀποδείκνυμι puede significar 'mostrar', 'demostrar' o 'probar'. 'He mostrado' conserva el valor de conclusión retórica del contexto y suena natural en español moderno sin sobrerreclamar una demostración formal.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Marca una inferencia o conclusión. 'Así' preserva la relación lógica y funciona con fluidez en español culto contemporáneo.
- source_word: τῶν παθῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los impulsos
  - los afectos
  - los sufrimientos
  lexicon: BDAG
  rationale: 'En 4 Macabeos πάθη tiene sentido ético-filosófico: pasiones que la razón domina, no sufrimientos externos. En español, ''pasiones'' conserva ese campo semántico y mantiene la tensión doctrinal del texto.'
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - varones
  - personas
  lexicon: BDAG
  rationale: El griego dice literalmente 'hombres', en contraste con 'una mujer' en la segunda mitad del versículo. Se preserva el contraste de género del argumento.
- source_word: ἐπεκράτησαν
  english_pob_choice: master
  chosen_spanish: dominaron
  alternatives_spanish:
  - vencieron
  - tomaron control de
  - se impusieron sobre
  lexicon: BDAG
  rationale: El verbo expresa ejercer control o superioridad sobre algo. 'Dominaron' reproduce bien la idea de gobierno moral sobre las pasiones y es idiomático en español.
- source_word: γυνή
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - la mujer
  - una esposa
  lexicon: BDAG
  rationale: El singular anartro es indefinido; aquí presenta un ejemplo representativo, no una identificación formal. 'Una mujer' respeta ese valor y evita introducir 'esposa' sin base contextual.
- source_word: τῶν μεγίστων βασάνων
  english_pob_choice: the greatest tortures
  chosen_spanish: los tormentos más grandes
  alternatives_spanish:
  - las mayores torturas
  - los tormentos más severos
  - los suplicios más terribles
  lexicon: BDAG
  rationale: βάσανοι en contexto martirial apunta a tormentos/suplicios. 'Tormentos más grandes' es una equivalencia transparente y natural; conserva el superlativo μεγίστων sin cargar el español con una formulación demasiado técnica.
- source_word: ὑπερεφρόνησεν
  english_pob_choice: despised / thought little of
  chosen_spanish: despreció
  alternatives_spanish:
  - desdeñó
  - consideró insignificantes
  - pensó poco de
  lexicon: BDAG
  rationale: El verbo significa tratar algo como indigno de consideración, despreciarlo o tenerlo en poco. 'Despreció' expresa con fuerza esa valoración negativa y sigue de cerca la revisión del inglés POB hacia un verbo más directo.
theological_decisions:
- issue: πάθη como categoría ética en 4 Macabeos
  english_pob_reading: passions
  chosen_spanish_reading: pasiones
  alternative_spanish_readings:
  - emociones
  - sufrimientos
  rationale: El libro usa πάθη en el marco de la virtud y el dominio racional. Traducirlo como 'pasiones' mantiene la lectura antropológica y moral del texto, en vez de convertirlo en referencia a sufrimiento físico.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 5
- issue: Contraste de género entre ἄνδρες y γυνή
  english_pob_reading: men ... a woman
  chosen_spanish_reading: los hombres ... una mujer
  alternative_spanish_readings:
  - las personas ... una mujer
  rationale: El contraste retórico del versículo opone ejemplos masculinos a la figura femenina destacada. Mantener el género explícito en español preserva el énfasis literario y el sentido del argumento.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB inglés: πάθη se mantiene como ''las pasiones'' y ὑπερεφρόνησεν se vierte con un verbo más directo (''despreció''), evitando una paráfrasis más débil. También se conserva el contraste de género entre ''los hombres'' y ''una mujer''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - '''Pasiones'' se conserva con sentido ético-filosófico, no como ''sufrimientos''.'
  - '''Tormentos'' se eligió para βασάνων por claridad y naturalidad en español, sin perder el matiz martirial.'
  - La nota [a] mantiene la alternativa semántica reflejada en el audit trail inglés.
