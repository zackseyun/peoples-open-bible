translation:
  language: es
  text: 'Pero él se negó y dijo: «No comeré». Sin embargo, sus siervos, junto con la mujer, le insistieron[a], y él escuchó lo que le decían[b]. Entonces se levantó del suelo y se sentó en la cama[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo presionaron»; el hebreo expresa una insistencia fuerte.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «escuchó la voz de ellos».
    reason: lexical_alternative
  - marker: c
    text: «Cama» también puede referirse a un lecho o diván en este contexto.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְמָאֵן
  english_pob_choice: he refused
  chosen_spanish: se negó
  alternatives_spanish:
  - se rehusó
  - refusó
  lexicon: HALOT
  rationale: מָאֵן expresa negativa o rechazo. En español, «se negó» comunica de manera natural la decisión voluntaria de no acceder a comer, sin añadir matices no presentes en el hebreo.
- source_word: לֹא אֹכַל
  english_pob_choice: I will not eat
  chosen_spanish: No comeré
  alternatives_spanish:
  - No voy a comer
  - No comeré nada
  lexicon: HALOT
  rationale: El imperfecto con לֹא en discurso directo expresa la negativa de Saul. «No comeré» mantiene la sencillez del hebreo y evita añadir un objeto no explicitado.
- source_word: וַיִּפְרְצוּ בּוֹ
  english_pob_choice: he listened to their voice / urged him
  chosen_spanish: le insistieron
  alternatives_spanish:
  - lo urgieron
  - le presionaron
  - insistieron con él
  lexicon: HALOT
  rationale: El idiomático פרץ ב indica una presión insistente, no una ruptura literal. «Le insistieron» conserva la fuerza de la demanda sin volverla demasiado técnica o demasiado fuerte para el español corriente.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus esclavos
  lexicon: HALOT
  rationale: En este contexto de corte real, עֲבָדִים son los que están al servicio de Saul. «Siervos» es natural en español bíblico y refleja la relación de servicio sin forzar el matiz de esclavitud, que aquí no es el foco narrativo.
- source_word: וְגַם הָאִשָּׁה
  english_pob_choice: along with the woman
  chosen_spanish: junto con la mujer
  alternatives_spanish:
  - y también la mujer
  - y la mujer también
  lexicon: HALOT
  rationale: La expresión añade a la mujer como parte del grupo que lo urge. «Junto con la mujer» conserva el valor aditivo de וְגַם y fluye bien en español.
- source_word: וַיִּשְׁמַע לְקוֹלָם
  english_pob_choice: he listened to their voice
  chosen_spanish: escuchó su voz
  alternatives_spanish:
  - los escuchó
  - les obedeció
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «escuchó a su voz». Mantener «su voz» preserva la textura idiomática del original y evita reducirlo a una obediencia explícita que el texto no formula directamente.
- source_word: מֵהָאָרֶץ
  english_pob_choice: from the ground
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del suelo
  - de la tierra
  lexicon: HALOT
  rationale: אֶרֶץ puede referirse al suelo o la tierra sobre la cual estaba postrado. «De la tierra» sigue de cerca el hebreo y funciona bien en español; «del suelo» sería una alternativa contextual igualmente válida.
- source_word: הַמִּטָּה
  english_pob_choice: bed
  chosen_spanish: la cama
  alternatives_spanish:
  - el lecho
  - el diván
  lexicon: HALOT
  rationale: מִטָּה puede designar una cama o un lecho/camastro. «La cama» es la opción más clara y natural en español para este contexto doméstico, sin perder la posibilidad de un mueble de descanso más amplio.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del texto inglés POB, que eliminó un adverbio añadido en un borrador anterior (“strongly”) por no estar explícito en el hebreo, y mantiene la construcción idiomática «he listened to their voice» como textura de fuente, reflejada aquí con «escuchó su voz».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología predeterminada para el tetragrámaton cuando aparezca; en este versículo no ocurre.
  - Se usó «siervos» por el contexto cortesano; no se optó por «esclavos» porque el rasgo de servidumbre no es el foco del pasaje.
  - «Escuchó su voz» conserva el hebraísmo «oír/escuchar la voz» en una forma comprensible para lector hispanohablante.
