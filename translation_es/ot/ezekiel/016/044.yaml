translation:
  language: es
  text: 'Mira[a], todo el que usa proverbios acerca de ti usará este proverbio, diciendo: «De tal madre, tal hija».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa la raíz משל aquí en el sentido de hablar o usar un proverbio, no de gobernar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: El hebreo introduce una llamada de atención. «Mira» conserva la fuerza deíctica en español moderno y suena natural; «He aquí» sería más tradicional, pero menos directo.
- source_word: כָּל הַמֹּשֵׁל
  english_pob_choice: everyone who uses proverbs
  chosen_spanish: todo el que usa proverbios
  alternatives_spanish:
  - todo el que habla en proverbios
  - todo el que cita proverbios
  - el que compone proverbios
  lexicon: HALOT
  rationale: Se mantiene el sentido lexical documentado de משל como ‘usar/decir un proverbio’, no ‘gobernar’. «Todo el que» conserva el valor distributivo de כָּל.
- source_word: עָלַיִךְ
  english_pob_choice: about you
  chosen_spanish: acerca de ti
  alternatives_spanish:
  - contra ti
  - con respecto a ti
  - sobre ti
  lexicon: HALOT
  rationale: La partícula marca el tema del proverbio. «Acerca de ti» es fiel y natural; «contra ti» añade hostilidad que el preposición por sí sola no exige.
- source_word: יִמְשֹׁל
  english_pob_choice: will use this proverb
  chosen_spanish: usará este proverbio
  alternatives_spanish:
  - dirá este proverbio
  - citará este proverbio
  - pronunciará este proverbio
  lexicon: HALOT
  rationale: Se refleja el mismo verbo de raíz משל en su uso proverbial. «Usará este proverbio» evita confundirlo con el sentido de «reinar» y sigue de cerca la decisión auditada en inglés.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dirá
  - para decir
  lexicon: HALOT
  rationale: Fórmula estándar de introducción de discurso directo; «diciendo» es la correspondencia más sobria y transparente.
- source_word: כְאִמָּה בִּתָּהּ
  english_pob_choice: Like mother, like daughter
  chosen_spanish: Como la madre, así la hija
  alternatives_spanish:
  - Como madre, como hija
  - Tal madre, tal hija
  - Como la madre, así su hija
  lexicon: HALOT
  rationale: Se conserva el carácter proverbial y la brevedad del hebreo. «Así» reproduce la correlación retórica sin añadir elementos ajenos al texto.
translation_notes:
  revision_awareness: 'La redacción sigue el expediente inglés auditado: mantiene el valor proverbial de משל, conserva el tono de advertencia de הִנֵּה y reproduce la máxima final con la misma concisión sentenciosa. No se requieren revisiones textuales en esta pasada.'
  spanish_consistency_notes:
  - Se usa «proverbio» de manera consistente para משל en este versículo.
  - Se evita «SEÑOR» u այլ sustituto porque no aparece el nombre divino en este pasaje.
  - La puntuación mantiene una cita directa breve y claramente reconocible para lectura pública.
