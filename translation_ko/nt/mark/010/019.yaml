base_translation:
  language: en
  yaml_path: translation/nt/mark/010/019.yaml
  text: 'You know the commandments: Do not murder[a], do not commit adultery, do not steal, do not bear false witness, do not defraud[b], honor your father and mother.'
  footnotes:
  - marker: a
    text: Or 'Do not kill.' The Greek verb here more specifically denotes murder or unlawful killing, so 'murder' is preferred.
    reason: lexical_alternative
  - marker: b
    text: '''Do not defraud'' may also be rendered ''Do not deprive'' or ''Do not rob.'' The term refers to withholding what is rightfully another''s, often by exploitation.'
    reason: lexical_alternative
