translation:
  language: es
  text: Su descendencia[b] será poderosa en la tierra[a]; la generación de los rectos será bendecida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en el país”; hebreo אֶרֶץ puede significar “tierra” o “país”, aunque “en la tierra” encaja bien con el marco del salmo.
    reason: lexical_alternative
  - marker: b
    text: O “sus descendientes”; זֶרַע es un término colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּבּוֹר
  english_pob_choice: mighty
  chosen_spanish: poderosa
  alternatives_spanish:
  - fuerte
  - poderosa
  - valerosa
  lexicon: HALOT
  rationale: Aquí גִּבּוֹר describe a la descendencia como dotada de fuerza o prominencia. "Poderosa" conserva ese tono elevado sin restringirlo a una imagen militar específica, de modo parecido a "mighty" en la versión inglesa.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  - en el país
  lexicon: HALOT
  rationale: אָרֶץ puede significar "tierra" o "país/land". En español, "en la tierra" mantiene la amplitud semántica y el registro natural; el contexto sapiencial permite esta opción sin forzar una lectura más técnica.
- source_word: יִהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - será
  - estará
  - llegará a ser
  lexicon: HALOT
  rationale: El hebreo expresa futuro simple. "Será" es la forma más directa y natural en español para ese valor predictivo.
- source_word: זַרְעוֹ
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su descendencia
  - sus hijos
  - su linaje
  lexicon: HALOT
  rationale: 'זֶרַע es colectivo: no se limita a hijos individuales. "Descendencia" conserva ese sentido colectivo y evita el arcaísmo de "simiente" o la reducción a un plural más estrecho.'
- source_word: דּוֹר
  english_pob_choice: the generation
  chosen_spanish: la generación
  alternatives_spanish:
  - la generación
  - un generación
  - la posteridad
  lexicon: HALOT
  rationale: La construcción con יְשָׁרִים pide el sintagma "la generación de los rectos". En español, el artículo definido conserva el carácter de clase o grupo caracterizado por la rectitud.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los rectos
  - los justos
  - los íntegros
  lexicon: HALOT
  rationale: יׁשָרִים enfatiza la idea de rectitud o integridad moral. "Rectos" distingue este término de otros como צַדִּיק ("justo") y sigue de cerca la decisión inglesa de no nivelar el matiz.
- source_word: יְבֹרָךְ
  english_pob_choice: will be blessed
  chosen_spanish: será bendecida
  alternatives_spanish:
  - será bendecida
  - será bendito
  - recibirá bendición
  lexicon: HALOT
  rationale: La pasiva de ברך debe conservarse como lenguaje de bendición, no reducirse a prosperidad general. "Será bendecida" reproduce el valor pasivo y el registro teológico del texto.
theological_decisions:
- issue: Alcance de la bendición sobre la descendencia/generación
  english_pob_reading: Retain the straightforward statement of blessing on the offspring/generation without narrowing it to either purely material prosperity or guaranteed covenantal salvation.
  chosen_spanish_reading: Mantener una afirmación directa de bendición sobre la descendencia y la generación, sin reducirla ni a prosperidad material solamente ni a salvación espiritual garantizada.
  alternative_spanish_readings:
  - prosperidad material solamente
  - salvación espiritual garantizada de los descendientes
  rationale: El hebreo habla en términos amplios de fuerza y bendición dentro del marco sapiencial. La traducción debe preservar ese alcance y no introducir una precisión doctrinal que el versículo no formula.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios y la concordancia con la auditoría inglesa fue alta.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo del hebreo con dos cláusulas coordinadas separadas por punto y coma.
  - '"Rectos" se usa de forma consistente para יְשָׁרִים, evitando mezclarlo con "justos".'
  - '"Bendecida" conserva la voz pasiva teológica de ברך.'
  - Las notas al pie respetan las alternativas documentadas en la auditoría inglesa y las presentan en español con los mismos marcadores requeridos.
