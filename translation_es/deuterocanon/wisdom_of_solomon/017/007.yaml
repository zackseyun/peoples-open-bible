translation:
  language: es
  text: Y los trucos del arte mágico[a] quedaron abatidos, y la presunción[b] de entendimiento recibió una refutación humillante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las burlas/engaños del arte mágico yacían postrados». El griego ἐμπαίγματα puede sugerir exhibiciones engañosas o burlas, y κατέκειτο puede verterse más literalmente como «yacía postrado» o «yacían postrados».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la humillante refutación de la presunción en el entendimiento». ἔλεγχος es un sustantivo («refutación», «exposición»), y φρόνησις también puede traducirse «entendimiento» o «prudencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαγικῆς
  english_pob_choice: magical
  chosen_spanish: arte mágico
  alternatives_spanish:
  - magia
  - arte de magia
  - artes mágicas
  lexicon: LSJ
  rationale: El genitivo adjetival modifica τέχνης; en español, 'arte mágico' conserva la referencia a una técnica practicada sin forzar 'sorcellería' o un matiz más técnico de 'magia'.
- source_word: ἐμπαίγματα
  english_pob_choice: tricks
  chosen_spanish: trucos
  alternatives_spanish:
  - mockerías
  - engaños
  - ficciones
  lexicon: LSJ
  rationale: En el contexto de una práctica ocultista fallida, el sustantivo apunta a artificios o engaños; 'trucos' es natural en español y mantiene la idea de maniobra fraudulenta o de exhibición engañosa.
- source_word: κατέκειτο
  english_pob_choice: were laid low
  chosen_spanish: quedaron humillados
  alternatives_spanish:
  - quedaron abatidos
  - yació prostrado
  - fueron derribados
  lexicon: LSJ
  rationale: El imperfecto expresa una condición de derrota o postración; 'quedaron humillados' preserva el resultado de abatimiento de forma idiomática en español.
- source_word: φρονήσει
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - prudencia
  - sabiduría
  - inteligencia
  lexicon: LSJ
  rationale: El contexto es la pretensión intelectual de los magos; 'entendimiento' sigue de cerca la revisión inglesa y mantiene la fuerza cognitiva de φρόνησις sin cargarla de 'sabiduría' en un sentido más amplio.
- source_word: ἀλαζονίας
  english_pob_choice: boast
  chosen_spanish: presunción
  alternatives_spanish:
  - jactancia
  - arrogancia
  - vanagloria
  lexicon: LSJ
  rationale: El término denota arrogancia jactanciosa; 'presunción' preserva la idea de autoexaltación y encaja bien con el sustantivo que sigue.
- source_word: ἔλεγχος
  english_pob_choice: was disgracefully rebuked
  chosen_spanish: fue reprendido
  alternatives_spanish:
  - fue refutado
  - fue expuesto
  - fue reprobado
  lexicon: LSJ
  rationale: ἔλεγχος puede ser 'reprensión', 'refutación' o 'exposición'; 'fue reprendido' mantiene el valor de corrección o desautorización, y permite reflejar la fuerza verbal del cierre español.
- source_word: ἐφύβριστος
  english_pob_choice: disgracefully
  chosen_spanish: de manera vergonzosa
  alternatives_spanish:
  - vergonzosamente
  - con oprobio
  - de forma humillante
  lexicon: LSJ
  rationale: El adjetivo comunica humillación e insulto; 'de manera vergonzosa' expresa el carácter deshonroso del rechazo con naturalidad en español.
theological_decisions:
- issue: Juicio sobre la práctica mágica sin añadir demonología explícita
  english_pob_reading: The verse depicts magical practice as fraudulent and humiliated, without importing later demonological categories.
  chosen_spanish_reading: El verso presenta la práctica mágica como desacreditada y humillada, sin introducir categorías demonológicas posteriores.
  alternative_spanish_readings:
  - El verso condena la hechicería como tal.
  - El verso presenta la magia como pura falsedad demoníaca.
  rationale: La base griega enfatiza el derrumbe y la exposición de la pretensión, no desarrolla aquí una demonología explícita. La formulación española conserva ese juicio sin añadir contenido doctrinal no dado por el texto.
  doctrine_reference: 'Principio POB: primacía del idioma original; no importar categorías doctrinales ajenas al pasaje.'
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó φρόνησις de 'wisdom' a 'understanding' y ἔλεγχος de 'exposed' a 'rebuked'. La presente versión española sigue esa línea, evitando 'sabiduría' como equivalente principal y usando una forma verbal de reprensión/refutación; además, conserva el matiz de humillación de ἐφύβριστος.
  spanish_consistency_notes:
  - Se mantiene 'arte mágico' para μαγικῆς τέχνης, en vez de 'sorcerería', porque el texto describe la práctica como un arte/técnica y no necesita un término más cargado.
  - '''Entendimiento'' traduce φρόνησις de modo consistente con la revisión inglesa y evita sobrerrepresentar el término como ''sabiduría''.'
  - La construcción pasiva/resultado se expresa con 'quedaron humillados' para mantener naturalidad española y la idea de abatimiento del imperfecto griego.
