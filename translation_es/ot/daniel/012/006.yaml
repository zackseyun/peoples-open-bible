translation:
  language: es
  text: 'Y le dijo al hombre vestido de lino, que estaba sobre las aguas del río[a]: «¿Hasta cuándo será el fin de estas maravillas?[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que estaba encima de las aguas del río».
    reason: lexical_alternative
  - marker: b
    text: O «¿Hasta cuándo será el fin de estas cosas asombrosas?».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Entonces le dijo
  - Y dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol pide una sucesión simple en español. «Y le dijo» conserva la conexión narrativa sin añadir una matiz temporal más fuerte que el hebreo no exige.
- source_word: לָאִישׁ
  english_pob_choice: to the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a un hombre
  - al varón
  lexicon: HALOT
  rationale: El artículo definido señala un referente identificable en el contexto visionario, por lo que «al hombre» refleja mejor la referencia concreta que «a un hombre».
- source_word: לְבוּשׁ הַבַּדִּים
  english_pob_choice: clothed in linen
  chosen_spanish: vestido de lino
  alternatives_spanish:
  - vestido con lino
  - clothed in linen
  lexicon: HALOT
  rationale: 'En español, «vestido de lino» es natural y fiel al valor del participio: describe la vestimenta del personaje. Se evita una repetición innecesaria de «ropa» o «vestiduras» porque el hebreo presenta el rasgo distintivo de su atuendo, no un sustantivo explícito equivalente.'
- source_word: הַבַּדִּים
  english_pob_choice: linen
  chosen_spanish: lino
  alternatives_spanish:
  - lienzo
  - lino fino
  lexicon: HALOT
  rationale: בַּדִּים apunta al tejido de lino. «Lino» es la equivalencia directa y comprensible; «lino fino» añadiría una precisión no explícita aquí.
- source_word: אֲשֶׁר מִמַּעַל לְמֵימֵי הַיְאֹר
  english_pob_choice: who was above the waters of the river
  chosen_spanish: que estaba sobre las aguas del río
  alternatives_spanish:
  - que estaba encima de las aguas del río
  - que estaba por encima de las aguas del río
  lexicon: HALOT
  rationale: מִמַּעַל indica ubicación superior; «sobre» comunica bien esa posición en español. Se mantiene «río» siguiendo el contexto inmediato y la decisión inglesa de no imponer «Nilo» donde el texto visionario no lo requiere.
- source_word: עַד מָתַי
  english_pob_choice: How long until
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será
  - ¿Cuánto tiempo hasta
  lexicon: HALOT
  rationale: Es el equivalente idiomático natural en español para la pregunta de duración prospectiva. Conserva el alcance temporal del hebreo sin sobreexplicar.
- source_word: קֵץ
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el término
  - la conclusión
  lexicon: HALOT
  rationale: En este contexto, קֵץ funciona como punto de término. «Fin» es el equivalente más claro y natural en español, y mantiene el valor de terminación del acontecimiento.
- source_word: הַפְּלָאוֹת
  english_pob_choice: these wonders
  chosen_spanish: estas maravillas
  alternatives_spanish:
  - estas cosas maravillosas
  - estos prodigios
  lexicon: HALOT
  rationale: פְּלָאוֹת deriva de פלא, cosas extraordinarias o maravillosas. «Maravillas» reproduce bien la fuerza admirativa sin cargarlo innecesariamente con un matiz técnico o litúrgico.
theological_decisions:
- issue: Identidad del hombre vestido de lino y del hablante
  english_pob_reading: Retain the Hebrew's simple narrative reference ('he said') and the descriptive title ('the man clothed in linen') without identifying the figures beyond the text.
  chosen_spanish_reading: Mantener la referencia narrativa simple («le dijo») y el título descriptivo («el hombre vestido de lino») sin identificar a los personajes más allá de lo que el texto dice.
  alternative_spanish_readings:
  - Identificar explícitamente al personaje como un ángel
  - Interpretar al hombre vestido de lino como una manifestación cristofánica
  rationale: El versículo no identifica de forma explícita al hablante ni obliga a una identificación cristológica del hombre vestido de lino. Para conservar la tensión teológica documentada en la POB inglesa, la traducción deja los referentes en la forma descriptiva del hebreo.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto mantiene el acuerdo alto con la auditoría inglesa, con ajustes solo para una fluidez natural en español y una conservación precisa de las ambigüedades del original.
  spanish_consistency_notes:
  - Se mantiene «lino» de forma consistente para בַּדִּים, sin sustituirlo por un término más tradicional que agregue connotaciones no explícitas.
  - «Río» se conserva como en la auditoría inglesa, evitando identificar el curso de agua con el Nilo sin base inmediata del contexto.
  - Se usa «maravillas» para הַפְּלָאוֹת, manteniendo el carácter extraordinario de los hechos sin reinterpretación doctrinal.
  - La puntuación reproduce el tono de pregunta directa del hebreo con cierre citacional claro en español.
