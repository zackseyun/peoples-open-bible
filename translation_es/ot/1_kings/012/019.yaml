translation:
  language: es
  text: Entonces Israel se ha rebelado[a] contra la casa de David hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Entonces Israel se rebeló contra la casa de David hasta hoy».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְשְׁעוּ
  english_pob_choice: has rebelled
  chosen_spanish: se ha rebelado
  alternatives_spanish:
  - se rebeló
  - está en rebelión
  - se ha sublevado
  lexicon: HALOT
  rationale: El verbo פשע, en contextos políticos, expresa rebelión o alzamiento contra una autoridad legítima. 'Se ha rebelado' conserva el valor verbal directo que el POB inglés prefirió al revisar desde una forma más explicativa. El perfecto compuesto español comunica bien la continuidad hasta 'hoy'.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene el nombre propio 'Israel', como en el texto hebreo y en el POB inglés. En este contexto designa al reino/nación del norte frente a la casa davídica.
- source_word: בְּבֵית דָּוִד
  english_pob_choice: against the house of David
  chosen_spanish: contra la casa de David
  alternatives_spanish:
  - contra la casa davídica
  - frente a la casa de David
  - desde la casa de David
  lexicon: HALOT
  rationale: La preposición ב con פשע funciona con fuerza adversativa; por eso se traduce 'contra'. 'Casa de David' preserva el sentido dinástico y coincide con la decisión auditada en inglés.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - todavía hoy
  lexicon: HALOT
  rationale: La fórmula hebrea marca continuidad desde el hecho narrado hasta el presente del narrador. 'Hasta hoy' es una equivalencia natural y concisa en español.
translation_notes:
  revision_awareness: El inglés POB revisó la idea desde 'has been in rebellion' a 'has rebelled' para hacer más directo el verbo, manteniendo 'to this day'. El español sigue esa revisión con un perfecto compuesto natural ('se ha rebelado') y conserva la continuidad con 'hasta hoy'.
  spanish_consistency_notes:
  - Se mantiene 'casa de David' para el linaje/dinastía, no una paráfrasis como 'dinastía davídica'.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes, pues no aparece el Tetragrámaton en este versículo.
  - '''Hasta hoy'' reproduce el valor idiomático de continuidad sin añadir explicación interpretativa.'
