id: MRK.3.13
reference: Mark 3:13
source:
  edition: SBLGNT
  text: Καὶ ἀναβαίνει εἰς τὸ ὄρος καὶ προσκαλεῖται οὓς ἤθελεν αὐτός, καὶ ἀπῆλθον πρὸς αὐτόν.
translation:
  text: And he went up on the mountain and called to himself those whom he wanted[b][a], and they came to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those he wanted'; the Greek includes an emphatic 'he himself.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they came to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβαίνει
  chosen: went up
  alternatives:
  - goes up
  - ascends
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, idiomatic English narrative commonly renders it with a past tense. 'Went up' preserves the directional sense of ascent without the elevated tone of 'ascends'.
- source_word: εἰς τὸ ὄρος
  chosen: on the mountain
  alternatives:
  - into the mountain
  - to the mountain
  - up the mountain
  lexicon: BDAG
  rationale: With ἀναβαίνει, the phrase naturally conveys ascent onto/up a mountain or hill country location. 'On the mountain' is idiomatic English and reflects the article without overpressing specificity.
- source_word: προσκαλεῖται
  chosen: called to himself
  alternatives:
  - summoned
  - called
  lexicon: BDAG
  rationale: 'The middle voice suggests personal involvement or interest: Jesus calls them to himself. ''Summoned'' is possible, but ''called to himself'' better preserves both the relational nuance and the prepositional force implied by the verb.'
- source_word: οὓς ἤθελεν αὐτός
  chosen: those whom he himself wanted
  alternatives:
  - those he wanted
  - those whom he desired
  lexicon: BDAG
  rationale: The explicit αὐτός is emphatic, so 'he himself' preserves the emphasis. 'Wanted' is the most natural rendering of θέλω here; 'desired' sounds overly strong or formal in English.
- source_word: ἀπῆλθον πρὸς αὐτόν
  lemma: ἀπέρχομαι
  chosen: they went to him
  alternatives:
  - they came to him
  - they went away to him
  lexicon: BDAG
  rationale: ἀπέρχομαι literally means 'go away/go,' but with πρὸς αὐτόν the sense is movement toward Jesus. English idiom could use 'came to him,' but 'went to him' more transparently reflects the Greek verb while remaining natural.
