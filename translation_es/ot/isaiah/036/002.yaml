translation:
  language: es
  text: Entonces el rey de Asiria envió al Rabsaqué[a] desde Laquis a Jerusalén, al rey Ezequías, con un gran ejército[b]. Y se apostó junto al canal del estanque superior, en la calzada del campo del batanero[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Título asirio transliterado; posibles equivalentes: «copero mayor» o «jefe de campo».'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «con una gran fuerza militar».
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, «el campo del batanero».
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: el Rabsaqué
  alternatives_spanish:
  - el copero mayor
  - el jefe de campo
  lexicon: HALOT
  rationale: El hebreo parece designar un cargo asirio, no necesariamente un nombre propio. En español, «Rabsaqué» conserva la transliteración tradicional del título sin forzar una equivalencia funcional incierta; las alternativas explicitan posibles sentidos del cargo.
- source_word: בְּחֵיל כָּבֵד
  english_pob_choice: with a great army
  chosen_spanish: con un gran ejército
  alternatives_spanish:
  - con una gran fuerza militar
  - con una fuerza poderosa
  lexicon: HALOT
  rationale: חֵיל puede referirse a tropa, ejército o fuerza militar, y כָּבֵד intensifica la magnitud. «Gran ejército» comunica bien el valor militar y sigue de cerca la lectura revisada del POB en inglés.
- source_word: תְעָלַת
  english_pob_choice: conduit
  chosen_spanish: canal
  alternatives_spanish:
  - conducto
  - acueducto
  lexicon: HALOT
  rationale: El término describe una conducción de agua; «canal» es claro y natural en español, sin perder la referencia topográfica del pasaje.
- source_word: הַבְּרֵכָה הָעֶלְיוֹנָה
  english_pob_choice: the upper pool
  chosen_spanish: el estanque superior
  alternatives_spanish:
  - el depósito superior
  - la alberca superior
  lexicon: HALOT
  rationale: La expresión nombra un punto concreto del sistema de agua de Jerusalén. «Estanque superior» mantiene la forma breve e idiomática del lugar, en línea con la opción inglesa revisada.
- source_word: מְסִלַּת
  english_pob_choice: highway
  chosen_spanish: camino
  alternatives_spanish:
  - carretera
  - calzada
  lexicon: HALOT
  rationale: Aunque puede implicar una vía elevada o importante, en español «camino» conserva el sentido locativo sin sonar demasiado técnico. Se evita exagerar la elevación implícita en el término.
- source_word: שְׂדֵה כוֹבֵס
  english_pob_choice: the fuller’s field
  chosen_spanish: el campo del lavador
  alternatives_spanish:
  - el campo del batanero
  - el campo del fuller
  lexicon: HALOT
  rationale: כּוֹבֵס designa a quien lava o prepara tejidos. «Lavador» es más transparente para el lector moderno; se conserva la ambigüedad ocupacional del oficio sin imponer una equivalencia más técnica como «batanero».
- source_word: וַיַּעֲמֹד
  english_pob_choice: he stood
  chosen_spanish: se detuvo
  alternatives_spanish:
  - se puso de pie
  - tomó posición
  lexicon: HALOT
  rationale: En este contexto narrativo, el verbo indica que ocupó un lugar o se paró allí; «se detuvo» fluye con naturalidad en español y conserva el movimiento hacia la ubicación descrita.
- source_word: יְרוּשָׁלַמָה
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  lexicon: HALOT
  rationale: La terminación direccional se expresa idiomáticamente con «a» en español, que comunica el movimiento hacia la ciudad.
theological_decisions:
- issue: Rendición del título asirio רַב שָׁקֵה
  english_pob_reading: Likely an Assyrian official title; possible renderings include 'chief cupbearer' or 'field commander.'
  chosen_spanish_reading: Título asirio transliterado como «Rabsaqué»
  alternative_spanish_readings:
  - copero mayor
  - jefe de campo
  rationale: El texto no obliga a identificar con certeza la función exacta del cargo. Mantener la transliteración preserva la tensión lexical histórica y evita una falsa precisión doctrinal o histórica.
  doctrine_reference: Principio de transparencia textual y cautela exegética
- issue: Referencia al lugar 'campo del lavador'
  english_pob_reading: Traditionally 'the fuller’s field.'
  chosen_spanish_reading: «campo del lavador» en el texto principal
  alternative_spanish_readings:
  - campo del batanero
  - campo del fuller
  rationale: El hebreo nombra un oficio relacionado con el lavado/procesamiento de telas. «Lavador» es comprensible en español moderno; no se oculta la posible lectura tradicional, pero tampoco se impone sin necesidad.
  doctrine_reference: Principio de equivalencia óptima y legibilidad eclesial
- issue: Descripción de la fuerza militar
  english_pob_reading: with a great army
  chosen_spanish_reading: con un gran ejército
  alternative_spanish_readings:
  - con una gran fuerza militar
  - con una fuerza poderosa
  rationale: La expresión mantiene el valor bélico del hebreo sin suavizarlo ni amplificarlo más de lo que el texto justifica.
  doctrine_reference: Fidelidad semántica al registro narrativo
translation_notes:
  revision_awareness: 'El español sigue la revisión más reciente del POB en inglés: se adopta «great army» para בְּחֵיל כָּבֵד y se prefiere la forma tradicional «fuller’s field» como alternativa anotada; para la prosa española se opta por una formulación clara y natural («gran ejército», «campo del lavador») sin perder la base hebrea ni la transparencia audit trail.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conserva la transliteración de cargos y topónimos cuando el texto fuente no permite una equivalencia funcional precisa.
  - Se evita «Señor» para el nombre divino, pero aquí no aplica.
  - «Campo del lavador» se usa como solución española legible, con nota que preserva la alternativa tradicional.
  - 'La puntuación sigue el flujo narrativo del hebreo: envío, localización, posición y descripción del sitio.'
