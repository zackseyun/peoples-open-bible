translation:
  language: es
  text: Y con el tiempo[a], Caín trajo a Yahvé[c] una ofrenda del fruto de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «desde el fin de días»; es decir, después de transcurrido un período de tiempo.'
    reason: lexical_alternative
  - marker: b
    text: O «del producto de la tierra».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «a Yahvé» representa el nombre divino YHWH; alternativamente, algunas traducciones lo traducen «al SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y fue que
  - Y sucedió que
  - Y ocurrió que
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce la secuencia de eventos. En español, 'Y aconteció que' conserva el valor de transición narrativa sin sonar tan mecánico como una traducción literal de la construcción verbal.
- source_word: מִקֵּץ יָמִים
  english_pob_choice: in the course of time
  chosen_spanish: al cabo de un tiempo
  alternatives_spanish:
  - después de un tiempo
  - con el paso del tiempo
  - al final de días
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente temporal ('desde el fin de días'), pero en contexto indica que transcurrió un período antes de la ofrenda. 'Al cabo de un tiempo' preserva ese sentido idiomático sin sugerir un fin escatológico.
- source_word: וַיָּבֵא
  english_pob_choice: brought
  chosen_spanish: trajo
  alternatives_spanish:
  - presentó
  - llevó
  - ofreció
  lexicon: HALOT
  rationale: El causativo de בוא aquí significa traer/presentar. 'Trajo' es natural en español y mantiene la sencillez del acto narrado.
- source_word: קַיִן
  english_pob_choice: Cain
  chosen_spanish: Caín
  alternatives_spanish:
  - Cain
  lexicon: Transliteración estándar
  rationale: Se usa la forma bíblica usual en español, con tilde normativa.
- source_word: מִנְחָה
  english_pob_choice: an offering
  chosen_spanish: una ofrenda
  alternatives_spanish:
  - un presente
  - un tributo
  - una dádiva
  lexicon: HALOT
  rationale: En contexto de culto, מִנְחָה puede ser una ofrenda, regalo o tributo. 'Ofrenda' es la opción más clara y reverente en español, sin restringir indebidamente el tipo de don.
- source_word: מִפְּרִי הָאֲדָמָה
  english_pob_choice: from the fruit of the ground
  chosen_spanish: del fruto de la tierra
  alternatives_spanish:
  - del fruto del suelo
  - de lo que produce la tierra
  - de la producción de la tierra
  lexicon: HALOT
  rationale: Hebreo usa 'fruto' y 'tierra'/'suelo'. 'Del fruto de la tierra' reproduce de cerca la imagen agrícola y mantiene la conexión con la vocación de Caín. 'Tierra' resulta más natural que 'suelo' en español bíblico contemporáneo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: DOCTRINE.md contested terms
  rationale: 'Se sigue el término POB para el nombre divino: ''Yahvé''. La preposición hebrea marca destinatario de la ofrenda, por lo que en español se expresa con ''a''.'
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español se preserva el nombre pactal con la forma adoptada por POB, 'Yahvé', en vez de una sustitución funcional como 'el SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sense of מִקֵּץ יָמִים
  english_pob_reading: a non-eschatological temporal idiom
  chosen_spanish_reading: un modismo temporal no escatológico
  alternative_spanish_readings:
  - al final de los días
  - en el fin de los tiempos
  rationale: En este versículo no hay indicación de escatología; el foco es el transcurso de un período antes de la ofrenda. La traducción evita introducir asociaciones doctrinales ajenas al contexto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve the source text''s plain sense'
- issue: Nature of מִנְחָה in worship context
  english_pob_reading: an offering
  chosen_spanish_reading: una ofrenda
  alternative_spanish_readings:
  - un regalo
  - un tributo
  rationale: Aunque el término puede abarcar regalo o tributo, aquí el contexto es cultual. 'Ofrenda' comunica adecuadamente la acción ritual sin sobreespecificar la clase de ofrenda.
  doctrine_reference: HALOT semantic range for מִנְחָה
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la revisión más reciente: no se requieren cambios respecto del sentido temporal idiomático, la ofrenda de Caín ni el tratamiento del nombre divino.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, en coherencia con el criterio POB en español.
  - '''Ofrenda'' se usa en sentido cultual general, sin añadir categorías sacrificiales no explicitadas por el hebreo.'
  - La puntuación y el orden conservan el flujo narrativo breve del hebreo.
  - '''Tierra'' traduce de forma natural הָאֲדָמָה y evita un calco excesivo con ''suelo''.'
