translation:
  language: es
  text: 'Y dijeron[a][b]: «Llamemos a la joven y preguntémosle».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase hebrea dice literalmente «preguntemos a su boca», es decir, escuchemos su propia respuesta directamente.
    reason: lexical_alternative
  - marker: b
    text: O «preguntemos qué tiene que decir».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y ellos dijeron
  alternatives_spanish:
  - Entonces dijeron
  - Y dijeron
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce la respuesta de los hablantes en la secuencia narrativa. «Y ellos dijeron» conserva el flujo hebreo con español natural y claro.
- source_word: נִקְרָא
  english_pob_choice: Let us call
  chosen_spanish: Llamemos
  alternatives_spanish:
  - Convocamos
  - Llamaremos
  lexicon: HALOT
  rationale: 'El cohortativo plural expresa una propuesta volitiva: «llamemos». «Convocar» es posible, pero «llamar» es más directo y encaja mejor en el contexto.'
- source_word: לַנַּעֲרָ
  english_pob_choice: the young woman
  chosen_spanish: a la joven
  alternatives_spanish:
  - a la muchacha
  - a la doncella
  lexicon: HALOT
  rationale: נַעֲרָה designa a una mujer joven en edad de casarse; «joven» es natural en español actual y evita tanto el infantilismo de «muchacha» como el arcaísmo de «doncella».
- source_word: וְנִשְׁאֲלָה
  english_pob_choice: and ask
  chosen_spanish: y preguntémosle
  alternatives_spanish:
  - y consultémosle
  - y inquiramos de ella
  lexicon: HALOT
  rationale: שאל aquí continúa la propuesta de obtener su respuesta. «Preguntémosle» expresa con claridad la acción sin forzar una construcción más pesada.
- source_word: אֶת פִּיהָ
  english_pob_choice: her mouth / ask her
  chosen_spanish: preguntémosle
  alternatives_spanish:
  - preguntemos a su boca
  - preguntemos lo que dice
  - oigamos su propia respuesta
  lexicon: HALOT
  rationale: La expresión literal «su boca» es un hebraísmo que en español sonaría extraño. El sentido es solicitar su respuesta personal directamente; por eso se integra en «preguntémosle», manteniendo la referencia implícita sin añadir una paráfrasis extensa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente simplificó la última cláusula desde una expansión interpretativa a un «ask her» más literal. En español, «preguntémosle» conserva esa brevedad y a la vez comunica de forma natural la idiomática hebrea «preguntar a su boca».
  spanish_consistency_notes:
  - Se mantuvo Yahvé en otros contextos según la convención del proyecto; este versículo no contiene el nombre divino.
  - Se evitó «Cristo»/«Mesías» porque no aplica al pasaje.
  - Se optó por «joven» para נַעֲרָה por edad y naturalidad en español.
  - La puntuación y comillas siguen el uso tipográfico español.
