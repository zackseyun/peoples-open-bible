translation:
  language: es
  text: Y sobre la compañía[a] de la tribu de los hijos de Neftalí, Ahira hijo de Enán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ejército», «hueste» o «división» para «compañía». El hebreo צְבָא se refiere a un contingente tribal organizado dentro de la disposición del campamento y la marcha.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And over
  chosen_spanish: Y sobre
  alternatives_spanish:
  - Y sobre
  - Y al frente de
  - Y encima de
  lexicon: HALOT
  rationale: La preposición עַל en esta fórmula de organización tribal expresa jurisdicción o responsabilidad 'sobre' un contingente. 'Y sobre' conserva la relación sintáctica y el paralelismo con la lista precedente sin añadir matices no presentes en el hebreo.
- source_word: צְבָא
  english_pob_choice: company
  chosen_spanish: compañía
  alternatives_spanish:
  - ejército
  - hueste
  - división
  lexicon: HALOT
  rationale: En este contexto de marcha y disposición del campamento, צְבָא designa un contingente organizado. 'Compañía' mantiene la idea de unidad ordenada sin forzar la noción de un ejército nacional permanente. La nota en inglés de 'army/host/division' queda reflejada con un término español igualmente amplio.
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - bastón
  - estirpe tribal
  lexicon: HALOT
  rationale: Aquí מַטֵּה no es el objeto literal 'vara', sino la unidad tribal. 'Tribu' es el equivalente claro y fiel en español contemporáneo.
- source_word: בְּנֵי נַפְתָּלִי
  english_pob_choice: the sons of Naphtali
  chosen_spanish: los hijos de Neftalí
  alternatives_spanish:
  - los descendientes de Neftalí
  - la gente de Neftalí
  lexicon: HALOT
  rationale: Se conserva la construcción literal 'hijos de' porque el hebreo la usa explícitamente y porque funciona bien en fórmulas tribales. 'Neftalí' sigue la forma española habitual del nombre.
- source_word: אֲחִירַע
  english_pob_choice: Ahira
  chosen_spanish: Ahira
  alternatives_spanish:
  - Ajira
  lexicon: transliteration convention
  rationale: Nombre propio transliterado según uso estándar en español bíblico, manteniendo la forma reconocible del original.
- source_word: בֶּן עֵינָן
  english_pob_choice: son of Enan
  chosen_spanish: hijo de Enán
  alternatives_spanish:
  - el hijo de Enán
  lexicon: HALOT
  rationale: Se vierte el patronímico de manera idiomática en español. Se conserva el nombre propio con acento gráfico españolizado según la pronunciación habitual en lectura bíblica.
theological_decisions:
- issue: Naturaleza de צְבָא en un contexto de campamento y marcha
  english_pob_reading: company
  chosen_spanish_reading: compañía
  alternative_spanish_readings:
  - ejército
  - hueste
  - división
  rationale: No se presupone una organización militar plena, sino un contingente tribal ordenado. 'Compañía' evita sobredeterminar el término y conserva la tensión entre el sentido militar amplio y la organización censal/campamental.
  doctrine_reference: Números 1–2; 10:14-28
translation_notes:
  revision_awareness: El texto inglés POB está en alta concordancia con el hebreo y no muestra revisiones aplicadas; se siguió el mismo sentido general, trasladando al español la decisión léxica de צְבָא como un contingente organizado y manteniendo la fórmula tribal y patronímica sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene 'tribu' para מַטֵּה en concordancia con el uso técnico del pasaje.
  - Se usa 'hijos de' para בְּנֵי como reflejo formal de la fórmula tribal hebrea.
  - 'Los nombres propios se transliteran en forma española convencional: Neftalí, Ahira, Enán.'
