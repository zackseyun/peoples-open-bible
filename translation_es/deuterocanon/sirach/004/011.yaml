translation:
  language: es
  text: La Sabiduría[a] ha instruido a sus hijos e hijas, y atiende a todos los que la entienden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y se apodera de los que la buscan». El hebreo conservado dice: «y da testimonio en favor de todos los que tienen entendimiento en ella».'
    reason: textual_variant
lexical_decisions:
- source_word: חָכְמוֹת / Ἡ σοφία
  english_pob_choice: Wisdom
  chosen_spanish: la Sabiduría
  alternatives_spanish:
  - Sabiduría
  lexicon: HALOT; LXX 1909
  rationale: El hebreo presenta una forma plural de apariencia, pero funciona como un sustantivo personificado singular; el griego paralelo confirma Ἡ σοφία en singular. En español se conserva la personificación con artículo femenino y mayúscula inicial.
- source_word: לִמְּדָה
  english_pob_choice: has instructed
  chosen_spanish: ha instruido
  alternatives_spanish:
  - ha enseñado
  - enseña
  lexicon: HALOT
  rationale: למד expresa 'enseñar/instruir'. 'Ha instruido' mantiene el valor de acción completada con fuerza proverbial y suena natural en español bíblico contemporáneo.
- source_word: בָנֶיהָ
  english_pob_choice: her children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus hijos e hijas
  lexicon: HALOT
  rationale: Aunque el inglés opta por 'children' para no restringir el sentido, en español 'hijos' puede abarcar descendencia/adherentes de forma idiomática y es más natural en este marco personificado.
- source_word: וְתָעִיד
  english_pob_choice: she gives heed
  chosen_spanish: atiende
  alternatives_spanish:
  - da testimonio
  - testifica
  - presta atención
  lexicon: HALOT
  rationale: El hebreo puede entenderse como 'dar testimonio' o 'hacer caso/atender' según el contexto y la tradición textual. La revisión inglesa optó por una lectura que refleje mejor el hebreo y la frase siguiente; en español 'atiende' conserva la idea de prestar atención a quienes la comprenden sin introducir un objeto ajeno.
- source_word: לְכָל מְבִינִים בָּהּ
  english_pob_choice: to all who understand her
  chosen_spanish: a todos los que la entienden
  alternatives_spanish:
  - para todos los que la comprenden
  - a los que tienen entendimiento en ella
  lexicon: HALOT
  rationale: מְבִינִים alude a personas con discernimiento/comprensión. 'Entienden' reproduce bien la relación directa con Sabiduría y evita una formulación más interpretativa.
theological_decisions:
- issue: Personificación femenina de la Sabiduría
  english_pob_reading: Retain feminine pronouns ('her') for Wisdom
  chosen_spanish_reading: Conservar la personificación femenina de Sabiduría
  alternative_spanish_readings:
  - neutralizar como 'la sabiduría' sin rasgos personales
  - masculinizar o abstraer el sujeto
  rationale: El hebreo y el griego presentan Sabiduría como figura femenina personificada. El español mantiene esa imagen con 'la Sabiduría' y pronombres femeninos implícitos en 'la entienden'.
  doctrine_reference: 'DOCTRINE.md: preservar el sentido del origen; respetar el género gramatical cuando es literariamente intencional.'
- issue: Divergencia entre el hebreo y el paralelo griego en el segundo colon
  english_pob_reading: Translate the Hebrew second colon as primary text
  chosen_spanish_reading: Seguir el hebreo como texto principal y reservar el paralelo griego en nota
  alternative_spanish_readings:
  - 'seguir el griego: ''y se apodera de los que la buscan'''
  - armonizar ambos en una paráfrasis
  rationale: El hebreo conservado es la base primaria para Ben Sira; el griego ofrece una redacción distinta y valiosa, pero no debe ocultarse la tensión textual. Por eso se refleja en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir Ben Sira desde el hebreo donde existe; documentar honestamente las variantes textuales.'
translation_notes:
  revision_awareness: La redacción inglesa revisada pasó de una formulación más forense ('bears witness') a 'gives heed' para acercarse mejor al hebreo ותעיד y a מבינים בה. El español sigue esa línea de revisión con 'atiende', evitando una paráfrasis forense demasiado fuerte y manteniendo la tensión textual con el paralelo griego en nota.
  spanish_consistency_notes:
  - Se conserva 'Sabiduría' como nombre personificado femenino, coherente con el uso de la POB y con el hebreo/griego.
  - '''Atiende'' en español busca reflejar la revisión inglesa sin perder la posible resonancia de ''dar testimonio'' en el trasfondo hebreo; la nota documenta la alternativa griega y la lectura hebrea explícita.'
  - Se evita 'Cristo', 'Señor' u otra terminología ajena al versículo; no hay léxico teológico de ese tipo aquí.
  - La puntuación y el orden responden al español natural, pero la estructura básica de dos miembros paralelos se mantiene.
