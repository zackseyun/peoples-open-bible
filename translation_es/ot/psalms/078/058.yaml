translation:
  language: es
  text: Ellos lo provocaron a ira con sus lugares altos[a], y con sus imágenes talladas[b] provocaron sus celos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lugares altos» se refiere a santuarios locales de culto, a menudo asociados con adoración ilícita e idolatría.
    reason: cultural_note
  - marker: b
    text: 'O: «sus ídolos» o «sus imágenes esculpidas».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «lo provocaron a celos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְעִיסוּהוּ
  english_pob_choice: They provoked him to anger
  chosen_spanish: Ellos lo provocaron a ira
  alternatives_spanish:
  - Ellos lo enojaron
  - Ellos lo ofendieron
  lexicon: HALOT
  rationale: El hebreo en Hifil expresa causar ira o provocar a ira. «Provocaron a ira» conserva mejor el valor causativo que un simple «enojaron».
- source_word: בְּבָמוֹתָם
  english_pob_choice: with their high places
  chosen_spanish: con sus lugares altos
  alternatives_spanish:
  - por medio de sus lugares altos
  - mediante sus lugares altos
  lexicon: HALOT
  rationale: בָּמוֹת alude a lugares de culto elevados o santuarios altos; «lugares altos» es la equivalencia más transparente y usual en español bíblico. El uso de «con» refleja el valor instrumental del hebreo como en la POB inglesa.
- source_word: וּבִפְסִילֵיהֶם
  english_pob_choice: and with their carved images
  chosen_spanish: con sus imágenes talladas
  alternatives_spanish:
  - con sus ídolos
  - con sus imágenes esculpidas
  lexicon: HALOT
  rationale: פְּסִילִים designa imágenes esculpidas o talladas para culto. «Imágenes talladas» mantiene la concreción material y evita el término más interpretativo «ídolos».
- source_word: יַקְנִיאוּהוּ
  english_pob_choice: they made him jealous
  chosen_spanish: lo hicieron celoso
  alternatives_spanish:
  - lo provocaron a celos
  - lo movieron a celos
  lexicon: HALOT
  rationale: El Hifil de קנא expresa provocar celos o celo. «Lo hicieron celoso» conserva la tensión teológica del lenguaje covenantal aplicado a Dios, sin reducirlo solo a ira.
theological_decisions:
- issue: Lenguaje de celos divinos
  english_pob_reading: Retain 'made him jealous' as covenantal jealousy rather than softening to mere anger or envy.
  chosen_spanish_reading: Mantener «lo hicieron celoso» como celos de pacto, no como simple enojo ni envidia común.
  alternative_spanish_readings:
  - lo provocaron a celos
  - despertaron su celo
  rationale: El hebreo usa קנא respecto de Dios en un contexto de idolatría y exclusividad de adoración. Conservar «celoso» preserva la tensión teológica en vez de resolverla en un término más genérico.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión inglesa más reciente mantuvo el texto sin cambios; el borrador español sigue esa lectura estable y conserva la tensión entre ira y celos del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «lugares altos» como término técnico bíblico, no se sustituyó por una paráfrasis cultual más general.
  - 'Se conservó el paralelo entre dos expresiones instrumentales: «con sus lugares altos» / «con sus imágenes talladas».'
  - Se prefirió «lo hicieron celoso» para reflejar קנא sin diluirlo en «envidia» o solo «ira».
