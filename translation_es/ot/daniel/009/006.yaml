revisions:
- from: No hemos escuchado[a] a tus siervos, los profetas, que hablaron en tu nombre a nuestros reyes, a nuestros oficiales, a nuestros padres[b] y a todo el pueblo de la tierra.
  to: No hemos escuchado[a] a tus siervos, los profetas, que hablaron en tu nombre a nuestros reyes, a nuestros oficiales, a nuestros padres[b] y a todo el pueblo del país.
  rationale: Se ajusta la frase final a 'todo el pueblo del país' para expresar en español natural el valor contextual de הָאָרֶץ sin introducir una lectura global de 'la tierra'. Se conservan las decisiones léxicas y teológicas principales del borrador, incluyendo 'escuchado' con nota alternativa y 'nuestros padres' con nota de 'antepasados'.
  reviewer_model: gpt-5.4
