translation:
  language: es
  text: Ciertamente comerán y quedarán satisfechos[a], y alabarán el nombre de Yahvé, su Dios, que ha obrado maravillosamente con ustedes[b]; y mi pueblo nunca más será avergonzado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Comerán en abundancia y quedarán saciados». El hebreo usa una construcción enfática: «comer, comerán».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que ha hecho maravillas con ustedes».'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «y mi pueblo no será avergonzado para siempre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲכַלְתֶּם אָכוֹל
  english_pob_choice: You will surely eat
  chosen_spanish: Ciertamente comerán
  alternatives_spanish:
  - Comerán con abundancia
  - Ciertamente comerán en abundancia
  lexicon: HALOT
  rationale: El hebreo usa verbo finito más infinitivo absoluto para intensificar la acción. En español, «ciertamente» conserva bien el énfasis sin añadir más cantidad de la que el texto exige por sí mismo. Dejé «comerán» simple y natural, y la nota conserva la alternativa más explícita.
- source_word: וְשָׂבוֹעַ
  english_pob_choice: and be satisfied
  chosen_spanish: y quedarán satisfechos
  alternatives_spanish:
  - y estarán saciados
  - y quedarán llenos
  lexicon: HALOT
  rationale: El verbo expresa saciedad después de comer. «Quedarán satisfechos» comunica el estado resultante en un español digno y claro, sin perder el matiz de plenitud alimentaria.
- source_word: וְהִלַּלְתֶּם
  english_pob_choice: and you will praise
  chosen_spanish: y alabarán
  alternatives_spanish:
  - y darán alabanza
  - y celebrarán con alabanza
  lexicon: HALOT
  rationale: El piel de הלל aquí significa alabar. «Alabarán» es la forma directa y natural en español para este contexto de adoración pactal.
- source_word: שֵׁם יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: the name of Yahweh your God
  chosen_spanish: el nombre de Yahvé, su Dios
  alternatives_spanish:
  - el nombre de Yahvé, el Dios de ustedes
  - el nombre de Yahvé, vuestro Dios
  lexicon: HALOT
  rationale: Conservé «el nombre» porque en hebreo no es un mero rótulo sino la identidad y reputación revelada de Dios. Usé «Yahvé» por la norma del proyecto para el Tetragrámaton, y «su Dios» mantiene la relación posesiva deכם en español natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término estándar del proyecto para el nombre divino. «Yahvé» es la forma principal en el texto español, evitando el ocultamiento por «SEÑOR».
- source_word: אֲשֶׁר עָשָׂה עִמָּכֶם לְהַפְלִיא
  english_pob_choice: who has dealt wondrously with you
  chosen_spanish: que ha hecho maravillas con ustedes
  alternatives_spanish:
  - que ha actuado maravillosamente con ustedes
  - que ha obrado maravillosamente entre ustedes
  lexicon: HALOT
  rationale: El hebreo habla de obrar «de manera maravillosa» con el pueblo. «Ha hecho maravillas con ustedes» refleja bien la construcción con עִם y mantiene el énfasis en la acción divina sin forzar un modismo ajeno al español.
- source_word: וְלֹא יֵבֹשׁוּ עַמִּי לְעוֹלָם
  english_pob_choice: and my people will never again be put to shame
  chosen_spanish: y mi pueblo nunca más será avergonzado
  alternatives_spanish:
  - y mi pueblo no será avergonzado para siempre
  - y mi pueblo jamás volverá a ser avergonzado
  lexicon: HALOT
  rationale: בושׁ aquí expresa vergüenza pública, deshonra o humillación. «Será avergonzado» mantiene la pasiva y la dimensión de deshonra. «Nunca más» comunica bien el valor permanente de לְעוֹלָם en este contexto profético.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La política del proyecto pide no enmascararlo con «SEÑOR», así que el español mantiene el nombre propio divino en forma reverente y reconocible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance permanente de לְעוֹלָם junto con יֵבֹשׁוּ
  english_pob_reading: my people will never again be put to shame
  chosen_spanish_reading: mi pueblo nunca más será avergonzado
  alternative_spanish_readings:
  - mi pueblo no será avergonzado para siempre
  - mi pueblo jamás volverá a ser avergonzado
  rationale: La frase hebrea expresa una negación duradera de la vergüenza futura. «Nunca más» transmite de forma idiomática esa reversión definitiva sin perder el sentido de permanencia.
  doctrine_reference: Restauración pactal y reversión de la vergüenza en el oráculo de Joel
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios respecto al texto base, y el cotejo externo mostró alta concordancia. La presente propuesta conserva esa lectura, ajustándola al español con la misma fuerza enfática y la misma decisión doctrinal sobre el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de manera consistente para יְהוָה.
  - Se preservó la relación de posesión en «su Dios» para אֱלֹהֵיכֶם.
  - Se evitó «SEÑOR» como sustituto del nombre divino, conforme a la pauta del proyecto.
  - «Avergonzado» conserva la pasiva y la idea de deshonra pública más que un mero sentimiento interno.
