translation:
  language: es
  text: Y harás cinco barras de madera de acacia para los marcos[a] de un lado del tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tablas» en vez de «marcos»; el término hebreo se refiere a los miembros estructurales del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y harás tú
  - Y debes hacer
  lexicon: HALOT
  rationale: En instrucciones de construcción, el perfecto con waw funciona como mandato secuencial. «Harás» conserva el tono procedimental y suena natural en español bíblico moderno.
- source_word: בְרִיחִם
  english_pob_choice: bars
  chosen_spanish: barras
  alternatives_spanish:
  - travesaños
  - cerrojos
  lexicon: HALOT
  rationale: El término señala piezas estructurales que sostienen los marcos. «Barras» refleja bien la función sin añadir precisión no explícita en el hebreo.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de shittim
  lexicon: HALOT
  rationale: La cadena nominal expresa la materia de la que están hechas las barras. En español, «madera de acacia» es claro y fiel al sentido idiomático del hebreo.
- source_word: לְקַרְשֵׁי
  english_pob_choice: for the frames
  chosen_spanish: para los marcos
  alternatives_spanish:
  - para las tablas
  - para los tablones
  lexicon: HALOT
  rationale: El POB inglés optó por «frames» para destacar la función estructural de קֶרֶשׁ. En español, «marcos» transmite esa función mejor que «tablas», aunque sigue siendo una aproximación interpretativa al término técnico.
- source_word: צֶלַע
  english_pob_choice: side
  chosen_spanish: lado
  alternatives_spanish:
  - costado
  - flanco
  lexicon: HALOT
  rationale: Aquí no se trata de «costilla», sino del lado lateral de la estructura. «Lado» es la equivalencia más natural y precisa en español.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda
  lexicon: HALOT
  rationale: «Tabernáculo» es el término establecido en español para la estructura sagrada del Éxodo y corresponde al sentido contextual del sustantivo.
- source_word: הָאֶחָד
  english_pob_choice: the one
  chosen_spanish: el primero
  alternatives_spanish:
  - el uno
  - el otro lado
  lexicon: HALOT
  rationale: En este contexto, el adjetivo identifica un lado concreto dentro de un par. Dado que el versículo siguiente presenta el lado correspondiente, «el primero» comunica con claridad la referencia al primer lado mencionado sin perder la definitud del hebreo.
translation_notes:
  revision_awareness: 'La versión española sigue el texto hebreo consonante y la morfología de WLC, a la vez que aprovecha la auditoría inglesa: se mantiene la lectura estructural de בְרִיחִם y קַרְשֵׁי, y se conserva la referencia a un lado específico del tabernáculo. No se documentan revisiones textuales o doctrinales adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - Se preserva el estilo instructivo de la sección, con futuro exhortativo en español.
  - «Marcos» se usa como solución funcional para קַרְשֵׁי, pero se deja nota alternativa porque el término puede entenderse también como «tablas» según la tradición de traducción.
  - No se introduce lenguaje confesional adicional; el verso es puramente arquitectónico y cultual.
