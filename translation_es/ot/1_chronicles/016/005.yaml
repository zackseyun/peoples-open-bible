translation:
  language: es
  text: Asaf era el principal[a], y en segundo lugar estaba Zacarías; luego Jeiel, Simeramot, Jehiel, Matitías, Eliab, Benaía, Obed-edom y Jeiel, con instrumentos de arpas y liras[b]; y Asaf hacía sonar los címbalos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y su segundo era Zacarías». El hebreo indica un rango de segundo lugar respecto de Asaf.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo distingue dos instrumentos de cuerda: nebalim y kinnorot; aquí se reflejan como «arpas» y «liras».'
    reason: cultural_note
lexical_decisions:
- source_word: הָרֹאשׁ
  english_pob_choice: the chief
  chosen_spanish: el principal
  alternatives_spanish:
  - el jefe
  - el líder
  lexicon: HALOT
  rationale: En esta lista de músicos y responsables, רֹאשׁ expresa rango o preeminencia, no una parte del cuerpo. «El principal» comunica bien la idea de primera posición sin introducir un matiz eclesiástico que el hebreo no exige.
- source_word: וּמִשְׁנֵהוּ
  english_pob_choice: and second to him was
  chosen_spanish: y después de él estaba
  alternatives_spanish:
  - y su segundo era
  - y en segundo lugar estaba
  lexicon: HALOT
  rationale: El sufijo posesivo indica relación de segundo rango respecto de Asaf. «Después de él estaba» mantiene la relación de precedencia en español natural; la nota conserva la posibilidad más literal de «su segundo».
- source_word: יְעִיאֵל / וִיעִיאֵל
  english_pob_choice: Jeiel
  chosen_spanish: Jeiel
  alternatives_spanish:
  - Jaaiel
  - Jeiel
  lexicon: HALOT
  rationale: Se conserva la transliteración estándar del nombre propio y se mantiene igual en sus dos apariciones para reflejar la repetición del hebreo.
- source_word: בִּכְלֵי נְבָלִים
  english_pob_choice: with instruments of harps
  chosen_spanish: con instrumentos de arpas
  alternatives_spanish:
  - con arpas
  - con instrumentos de liras
  lexicon: HALOT
  rationale: כְּלֵי pide «instrumentos de», y נְבָלִים se refiere a un instrumento de cuerda. «Arpas» sigue la decisión del POB inglés y es comprensible en español; se conserva la idea de instrumentos, no solo del objeto musical aislado.
- source_word: וּבְכִנֹּרוֹת
  english_pob_choice: and lyres
  chosen_spanish: y liras
  alternatives_spanish:
  - y arpas
  - y cítaras
  lexicon: HALOT
  rationale: Se distingue de נבלים y se traduce con un término español que preserve esa diferencia instrumental. «Liras» es claro y mantiene la distinción que el texto hebreo marca.
- source_word: בַּמְצִלְתַּיִם
  english_pob_choice: the cymbals
  chosen_spanish: los címbalos
  alternatives_spanish:
  - címbalos
  - las campanas
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido; en español «los címbalos» suena natural y refleja el objeto asignado a Asaf. Se evita cualquier término más general que diluya el instrumento específico.
- source_word: מַשְׁמִיעַ
  english_pob_choice: sounded
  chosen_spanish: hacía sonar
  alternatives_spanish:
  - sonaba
  - los hacía resonar
  - hacía oír
  lexicon: HALOT
  rationale: El causativo implica hacer oír el sonido de los címbalos. «Hacía sonar» expresa bien la acción instrumental y el valor causativo sin volverlo rígido.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no hubo cambios de revisión posteriores; la decisión principal fue preservar en español la distinción entre rango jerárquico e instrumentos musicales, manteniendo la repetición de Jeiel.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se preserva «Jeiel» en ambas apariciones para consistencia onomástica.
  - «Arpas» y «liras» reproducen la distinción de dos instrumentos de cuerda documentada en el contexto inglés.
