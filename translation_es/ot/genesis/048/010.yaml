revisions:
- from: Ahora los ojos de Israel estaban pesados por la edad[a]; ya no podía ver. Entonces él[b] los acercó a él, y los besó y los abrazó.
  to: Ahora los ojos de Israel estaban debilitados por la vejez[a]; no podía ver. Entonces los acercó hacia sí[b], y los besó y los abrazó.
  rationale: Se ajusta el modismo a un español natural y fiel al sentido, se elimina el 'ya' añadido, y se reemplaza la formulación rígida 'él... a él' por una construcción idiomática que mantiene la ambigüedad del hebreo mejor que el borrador.
