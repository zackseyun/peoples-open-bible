translation:
  language: es
  text: Vuestros turbantes[a] estarán sobre vuestras cabezas, y vuestras sandalias sobre vuestros pies; no haréis duelo ni lloraréis, sino que os consumiréis en vuestras iniquidades[b] y gemiréis cada uno a su hermano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vuestros tocados' o 'vuestro adorno de cabeza'; el término hebreo se refiere a un cubrecabeza ornamental, probablemente un turbante en este contexto de duelo.
    reason: lexical_alternative
  - marker: b
    text: '''En vuestras iniquidades'' también puede entenderse como ''por vuestras iniquidades'' o, por extensión del término hebreo, ''en vuestra culpa''.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''un hombre a su hermano'' o ''cada hombre a su hermano''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְאֵרֵיכֶם
  english_pob_choice: your turbans
  chosen_spanish: tu tocado[a]
  alternatives_spanish:
  - tus turbantes
  - tu adorno de cabeza
  - tu finura
  lexicon: HALOT
  rationale: El término hebreo designa un adorno para la cabeza; en este contexto de duelo, el matiz de tocado ornamental comunica bien la idea sin imponer de antemano una pieza cultural demasiado específica. Mantengo la nota alternativa para reflejar que puede entenderse como cubrecabeza ornamental, cercano a turbante.
- source_word: נַעֲלֵיכֶם
  english_pob_choice: your sandals
  chosen_spanish: tus sandalias
  alternatives_spanish:
  - tus zapatos
  - tu calzado
  lexicon: HALOT
  rationale: El hebreo nombra el calzado de modo general en un marco antiguo; 'sandalias' es la opción más natural y culturalmente congruente en español bíblico moderno.
- source_word: תִסְפְּדוּ
  english_pob_choice: mourn
  chosen_spanish: harán duelo
  alternatives_spanish:
  - lamentarán
  - se lamentarán
  lexicon: HALOT
  rationale: '''Hacer duelo'' expresa en español la forma ritual o funeraria del verbo ספד mejor que un simple ''lamentar'', y encaja con la prohibición de los ritos de luto.'
- source_word: תִבְכּוּ
  english_pob_choice: weep
  chosen_spanish: llorarán
  alternatives_spanish:
  - sollozarán
  - derramarán lágrimas
  lexicon: HALOT
  rationale: '''Llorar'' conserva el paralelismo directo con el hebreo y su registro solemne. En español, funciona naturalmente junto con ''hacer duelo''.'
- source_word: נְמַקֹּתֶם
  english_pob_choice: you will waste away
  chosen_spanish: se consumirán
  alternatives_spanish:
  - se desharán
  - se agotarán
  - se marchitarán
  lexicon: HALOT
  rationale: El verbo expresa descomposición o desgaste bajo juicio. 'Consumirse' transmite bien el desvanecimiento interno y evita una imagen demasiado literal de putrefacción.
- source_word: בַּעֲוֺנֹתֵיכֶם
  english_pob_choice: in your iniquities
  chosen_spanish: por causa de sus iniquidades
  alternatives_spanish:
  - en sus iniquidades
  - en su culpa
  - a causa de sus iniquidades
  lexicon: HALOT
  rationale: El hebreo admite la idea de estar 'en' la culpa/iniquidad o de sufrir por ella. Aquí se opta por una causalidad explícita en español para mayor claridad, sin perder el vínculo con el pecado y su consecuencia. El cambio a tercera persona responde al español del contexto inmediato en estilo de discurso directo profético colectivo.
- source_word: נְהַמְתֶּם
  english_pob_choice: groan
  chosen_spanish: gemirán
  alternatives_spanish:
  - murmurarán
  - gimiendo
  - proferirán gemidos
  lexicon: HALOT
  rationale: El verbo implica un sonido grave de angustia. 'Gemir' preserva la cualidad acústica y el tono de aflicción mejor que 'murmurar'.
- source_word: אִישׁ אֶל אָחִיו
  english_pob_choice: each man to his brother
  chosen_spanish: unos a otros
  alternatives_spanish:
  - cada uno a su hermano
  - un hombre a su hermano
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente 'un hombre a su hermano', en español la expresión idiomática más fiel y natural es 'unos a otros'. La nota mantiene visible la forma hebrea para no borrar el detalle relacional del original.
theological_decisions:
- issue: Representación de עָוֹן en un contexto de juicio
  english_pob_reading: in your iniquities
  chosen_spanish_reading: por causa de sus iniquidades
  alternative_spanish_readings:
  - en sus iniquidades
  - en su culpa
  - por su culpa
  rationale: El término hebreo puede abarcar pecado, culpa y la consecuencia judicial. La formulación elegida hace explícita la relación de causa y juicio, sin reducir el alcance semántico a una sola noción. Se mantiene la tensión entre culpa y castigo que el hebreo permite.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 5
- issue: Lenguaje relacional masculino singular en אִישׁ אֶל אָחִיו
  english_pob_reading: each man to his brother
  chosen_spanish_reading: unos a otros
  alternative_spanish_readings:
  - cada uno a su hermano
  - un hombre a su hermano
  rationale: El hebreo usa masculino singular y parentesco fraterno. Sin embargo, en español la fórmula idiomática 'unos a otros' comunica la reciprocidad del gesto/queja sin sonar forzada. La nota deja constancia del valor literal para no ocultar el marcado masculino del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y toma como apoyo el audit trail inglés: ''turbans'' se ha vertido aquí de modo más natural como ''tocado'' con nota alternativa a ''turbante''; ''waste away'' se ha expresado como ''se consumirán''; y ''groan to one another'' como ''gemirán unos a otros'', respetando la progresión del juicio y la aflicción. Se conserva la tensión léxica de עָוֹן mediante una causalidad explícita en español, sin borrar la ambigüedad entre pecado y consecuencia.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se evita 'SEÑOR' por convención de ocultamiento del nombre divino, no aplicable aquí.
  - '''Harán duelo'' y ''llorarán'' mantienen el paralelismo del hebreo y el registro profético.'
  - Se prefiere 'tocado' con nota para no sobretraducir ni fijar indebidamente la forma del adorno.
  - La tercera persona plural del final se emplea para reflejar el plural del discurso colectivo en español, manteniendo la imagen de reciprocidad.
