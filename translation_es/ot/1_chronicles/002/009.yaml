translation:
  language: es
  text: 'Los hijos de Hezrón, que le nacieron: Jerameel, Ram y Quelubai[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Quelubai es probablemente la misma persona que en otra parte de esta genealogía se llama Caleb.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: En español genealógico, «los hijos de» reproduce con naturalidad el valor constructo de בְנֵי y no requiere conservar la conjunción inicial. Mantiene el tono de lista genealógica sin sobrecargar la sintaxis.
- source_word: חֶצְרוֹן
  english_pob_choice: Hezron
  chosen_spanish: Hezrón
  alternatives_spanish:
  - Hezron
  lexicon: Nombre propio estándar
  rationale: Se translitera al español como «Hezrón», ajustando la acentuación gráfica para una lectura natural en español y conservando el nombre propio sin interpretarlo.
- source_word: אֲשֶׁר נוֹלַד לוֹ
  english_pob_choice: who were born to him
  chosen_spanish: que le nacieron
  alternatives_spanish:
  - que nacieron para él
  - que le fueron nacidos
  lexicon: HALOT
  rationale: 'La forma pasiva hebrea con לּוֹ se vierte de manera natural en español con una construcción intransitiva: «que le nacieron». Conserva el sentido de descendencia sin convertirlo en una paráfrasis demasiado activa como «que él engendró».'
- source_word: יְרַחְמְאֵל
  english_pob_choice: Jerahmeel
  chosen_spanish: Jerameel
  alternatives_spanish:
  - Jerahmeel
  lexicon: Nombre propio estándar
  rationale: Se adapta el nombre al español bíblico común como «Jerameel», forma inteligible y estable en la tradición hispanohablante, manteniendo la identificación del personaje.
- source_word: רָם
  english_pob_choice: Ram
  chosen_spanish: Ram
  alternatives_spanish:
  - Rám
  lexicon: Nombre propio estándar
  rationale: El nombre propio se conserva como «Ram», forma breve y reconocible en español.
- source_word: כְּלוּבָי
  english_pob_choice: Chelubai
  chosen_spanish: Quelubai
  alternatives_spanish:
  - Chelubai
  - Caleb
  lexicon: HALOT
  rationale: La forma consonántica se refleja directamente en español como «Quelubai», preservando el valor del nombre en este versículo. Se evita armonizarlo en el texto principal con «Caleb», porque esa identificación pertenece al nivel de nota, no al texto base.
translation_notes:
  revision_awareness: La revisión más reciente del paquete confirma que no hubo cambios necesarios y que el acuerdo con la evaluación cruzada fue alto; por eso se mantiene la estructura genealógica simple del hebreo y la nota de identificación alternativa para כְּלוּבָי.
  spanish_consistency_notes:
  - Se mantiene un registro genealógico sobrio, sin añadir conectores explicativos que no están en el hebreo.
  - Se usa «le nacieron» para preservar la pasividad relativa sin forzar una construcción más interpretativa.
  - Los nombres propios se adaptan al uso español cuando es natural y reconocible, pero se conserva la identificación alternativa de Quelubai/Caleb en nota.
  - La nota al pie se ancla solo en el nombre donde existe la alternativa documentada.
