review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia ritual y mantiene la distinción entre las tres piezas: una pieza de pan, una torta con aceite y una oblea, tomadas del canasto de panes sin levadura delante de Yahvé. Sin embargo, la nota al pie está mal anclada: [a] aparece sobre «pan» pero la nota explica יהוה/YHWH, que corresponde a «Yahvé». Además, «un pan» suena demasiado genérico para כִּכַּר לֶחֶם y debilita la precisión ritual de una pieza/unidad concreta.'
  spanish_quality_summary: El español es claro y legible, con registro bíblico natural. «Torta de pan con aceite», «oblea» y «delante de Yahvé» funcionan bien. Conviene mejorar «un pan» a «una hogaza de pan» para reflejar mejor la unidad específica y conservar el contraste con la torta siguiente. También conviene alinear la nota al pie con el lugar correcto del texto.
  glossary_alignment: La renderización de יהוה como «Yahvé» sigue correctamente la política del proyecto. No hay conflicto relevante con otros términos de glosario. La nota de alternativa debe quedar anclada en «Yahvé[a]», no en «pan».
  issues:
  - severity: high
    issue: La nota al pie está anclada en la palabra equivocada.
    rationale: 'El marcador [a] aparece en «pan[a]», pero la nota dice «Hebreo: “YHWH”...», lo cual corresponde al nombre divino «Yahvé». Esto crea una incoherencia editorial y semántica.'
  - severity: medium
    issue: «un pan» es demasiado inespecífico para כִּכַּר לֶחֶם.
    rationale: כִּכַּר לֶחֶם denota una pieza/unidad de pan, a menudo redonda. «Una hogaza de pan» refleja mejor el valor léxico y preserva la distinción con חַלַּת לֶחֶם שֶׁמֶן.
  - severity: low
    issue: La nota al pie usa «también puede transliterarse “Yahvé”», que no aporta una verdadera alternativa en español.
    rationale: Dado que el texto principal ya usa «Yahvé», la alternativa útil sería «Yahweh» si se conserva la nota heredada del audit trail. Debe formularse de manera coherente con el texto español.
  revised_spanish_text: y una hogaza de pan, una torta de pan con aceite, y una oblea, del canasto de los panes sin levadura que está delante de Yahvé[a].
  revised_footnotes:
