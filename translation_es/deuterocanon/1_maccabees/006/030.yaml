  lexicon: LSJ
  rationale: La frase griega dice literalmente «de los caballos»; en esta enumeración militar, la metonimia puede dejarse visible en español. Se conserva así la tensión entre literalidad y sentido militar.
- source_word: ἐλέφαντες
  english_pob_choice: elephants
  chosen_spanish: elefantes
  lexicon: LSJ
  rationale: Equivalente léxico directo.
- source_word: εἰδότες πόλεμον
  english_pob_choice: trained for war
  chosen_spanish: entrenados para la guerra
  alternatives_spanish:
