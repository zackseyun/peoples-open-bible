translation:
  language: es
  text: 'Y cuando había terminado de comer la vegetación de la tierra, dije: «Señor Yahvé, por favor, perdona. ¿Cómo podrá ponerse en pie Jacob[a]? Porque es pequeño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién levantará a Jacob?»'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה אִם
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y aconteció que cuando
  - Y sucedió que cuando
  lexicon: HALOT
  rationale: La secuencia introduce el siguiente cuadro de la visión en sentido temporal. En español, «Y cuando» conserva el avance narrativo de forma natural sin cargar la frase con un giro arcaizante.
- source_word: כִּלָּה לֶאֱכוֹל
  english_pob_choice: it had finished eating
  chosen_spanish: hubo terminado de comer
  alternatives_spanish:
  - había terminado de comer
  - terminó de comer
  lexicon: HALOT
  rationale: La construcción expresa una acción completada antes del siguiente evento. «Hubo terminado de comer» mantiene el valor perfectivo y suena adecuado en español bíblico contemporáneo.
- source_word: עֵשֶׂב הָאָרֶץ
  english_pob_choice: the vegetation of the land
  chosen_spanish: la vegetación de la tierra
  alternatives_spanish:
  - la hierba de la tierra
  - las plantas de la tierra
  lexicon: HALOT
  rationale: עֵשֶׂב puede abarcar hierba, vegetación o plantas. «Vegetación» evita estrechar demasiado el sentido y conserva la imagen de devastación amplia. «Tierra» funciona en español para el alcance del daño, sin forzar una lectura global.
- source_word: וָאֹמַר
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - entonces dije
  lexicon: HALOT
  rationale: Es un perfecto narrativo simple; «dije» es claro y natural en español.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Dios
  - Señor Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino YHWH como «Yahvé» según el estándar del proyecto. En la combinación con אֲדֹנָי, «Señor Yahvé» evita la redundancia de «Señor SEÑOR» y mantiene ambos elementos reverentemente.
- source_word: סְלַח נָא
  english_pob_choice: please forgive
  chosen_spanish: por favor, perdona
  alternatives_spanish:
  - perdona, por favor
  - te ruego, perdona
  lexicon: HALOT
  rationale: Es una súplica urgente de perdón/intercesión. «Por favor, perdona» conserva la fuerza rogativa de נָא en español contemporáneo.
- source_word: מִי יָקוּם יַעֲקֹב
  english_pob_choice: How can Jacob stand?
  chosen_spanish: ¿Cómo podrá ponerse en pie Jacob?
  alternatives_spanish:
  - ¿Quién levantará a Jacob?
  - ¿Quién podrá hacer que Jacob se mantenga en pie?
  lexicon: HALOT
  rationale: El hebreo permite una lectura idiomática sobre la incapacidad de Jacob para mantenerse. «Ponerse en pie» expresa bien la imagen de resistencia/supervivencia sin resolver del todo la tensión del verbo קום. La alternativa causal/restaurativa se conserva en la nota textual.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se preserva el nombre propio hebreo, como hace el texto fuente; el referente es la nación, pero la forma literal es «Jacob».
- source_word: כִּי קָטֹן הוּא
  english_pob_choice: For he is small
  chosen_spanish: Porque es pequeño
  alternatives_spanish:
  - Porque es insignificante
  - Porque es débil
  lexicon: HALOT
  rationale: קָטֹן denota pequeñez, pequeñez social o insignificancia. «Pequeño» mantiene la amplitud semántica sin cargar una interpretación más específica de la necesaria.
theological_decisions:
- issue: Rendering of the divine name in אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahvé
  rationale: El texto hebreo usa el Tetragrámaton directamente. La política del proyecto es rendir YHWH como «Yahvé», por lo que aquí se mantiene el nombre del pacto en lugar de una sustitución genérica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sense of מִי יָקוּם יַעֲקֹב
  english_pob_reading: How can Jacob stand?
  chosen_spanish_reading: ¿Cómo podrá ponerse en pie Jacob?
  alternative_spanish_readings:
  - ¿Quién levantará a Jacob?
  - ¿Quién podrá hacer que Jacob se mantenga en pie?
  rationale: Se preserva la tensión del texto entre una lectura de incapacidad y una posible lectura restaurativa. La formulación principal comunica la imposibilidad de resistencia, sin borrar la alternativa lexical del verbo קום, que queda abierta en la nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se corrigió el anclaje de la nota para que el marcador [a] aparezca explícitamente en el texto español, evitando el error de validación previo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene «Jacob» como nombre propio literal y no se sustituye por «Israel».
  - «Pequeño» conserva la amplitud semántica de קָטֹן sin fijar innecesariamente un matiz específico.
  - La nota [a] está anclada directamente en la cláusula donde surge la ambigüedad de יָקוּם.
