translation:
  language: es
  text: Mi corazón está golpeado como la hierba y marchito, pues olvido[a] comer mi pan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he olvidado comer mi pan»; el perfecto hebreo puede leerse como una descripción presente de aflicción continua o como una acción ya cumplida con efecto vigente.'
    reason: lexical_alternative
  - marker: b
    text: «Mi pan» también puede significar «mi alimento» en sentido más general.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּכָּה
  english_pob_choice: is struck down
  chosen_spanish: está herido
  alternatives_spanish:
  - está golpeado
  - está herido de golpe
  - está abatido
  lexicon: HALOT
  rationale: El pasivo de נכה expresa ser golpeado o herido; en español, "está herido" comunica la violencia recibida sin sonar forzado, y mantiene la imagen de aflicción corporal aplicada al corazón poético.
- source_word: כָעֵשֶׂב
  english_pob_choice: like grass
  chosen_spanish: como hierba
  alternatives_spanish:
  - como césped
  - como pasto
  - como vegetación
  lexicon: HALOT
  rationale: עֵשֶׂב suele significar hierba/vegetación baja; "como hierba" es claro, natural y conserva la comparación de fragilidad y sequedad.
- source_word: וַיִּבַשׁ
  english_pob_choice: and withered
  chosen_spanish: se seca
  alternatives_spanish:
  - se marchita
  - se secó
  - se ha secado
  lexicon: HALOT
  rationale: יבש puede significar secarse o marchitarse. "Se seca" funciona bien en español como descripción poética en curso y mantiene la imagen de pérdida de vitalidad.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi mente
  - mi ser interior
  lexicon: HALOT
  rationale: לֵב designa el centro interior de la persona, incluyendo pensamiento y emoción. "Mi corazón" conserva el término antropológico poético y es transparente en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Aquí introduce la causa del estado descrito. "Pues" es natural en español bíblico moderno y conserva la relación causal sin dureza explicativa.
- source_word: שָׁכַחְתִּי
  english_pob_choice: I forget
  chosen_spanish: he olvidado
  alternatives_spanish:
  - olvido
  - he dejado de
  - he descuidado
  lexicon: HALOT
  rationale: Aunque formalmente es perfecto, en contexto expresa una omisión real con efecto presente. El perfecto español "he olvidado" preserva bien el matiz de acción pasada con resultado vigente.
- source_word: מֵאֲכֹל
  english_pob_choice: to eat
  chosen_spanish: comer
  alternatives_spanish:
  - para comer
  - de comer
  lexicon: HALOT
  rationale: Tras "olvidar", el infinitivo hebreo se vierte idiomáticamente con "comer". Es una equivalencia natural que mantiene el sentido de descuido alimentario.
- source_word: לַחְמִי
  english_pob_choice: my bread
  chosen_spanish: mi pan
  alternatives_spanish:
  - mi alimento
  - mi comida
  - mi sustento
  lexicon: HALOT
  rationale: לֶחֶם literalmente es pan, y a menudo comida en general. "Mi pan" conserva la imagen concreta del hebreo; además, en español bíblico sigue siendo entendible como alimento básico.
theological_decisions:
- issue: Alcance antropológico de "corazón"
  english_pob_reading: my heart
  chosen_spanish_reading: mi corazón
  alternative_spanish_readings:
  - mi interior
  - mi ser
  rationale: El hebreo לֵב puede abarcar emoción, pensamiento y voluntad. Mantener "mi corazón" preserva la amplitud antropológica sin reducirla a un solo aspecto psicológico.
  doctrine_reference: Antropología bíblica; poesía hebrea
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la decisión inglesa reciente de mantener el sujeto explícito, el paralelismo entre el golpe y el marchitarse, y el sustantivo concreto "pan". Para evitar el problema de validación previo, ambas notas están ancladas explícitamente en el texto español mediante [a] y [b].
  spanish_consistency_notes:
  - Se mantiene "mi corazón" para לִבִּי, en coherencia con el uso POБ de corazón como centro interior.
  - Se evita "Señor" o sustitución litúrgica; no hay nombre divino en este versículo.
  - '"Mi pan" conserva la concreción del hebreo y permite la ampliación semántica mediante nota.'
  - La frase verbal en español usa presente perfecto para reflejar el perfecto hebreo con efecto actual.
