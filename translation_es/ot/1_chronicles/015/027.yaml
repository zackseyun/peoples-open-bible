translation:
  language: es
  text: Y David estaba vestido con un manto de lino fino, como todos los levitas que llevaban el arca, y los cantores, y Quenanías, el líder de la carga de los cantores[a]; y sobre David había un efod de lino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Quenanías, líder del canto» o «líder de la música». La frase hebrea es difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְכֻרְבָּל
  english_pob_choice: was clothed
  chosen_spanish: estaba vestido
  alternatives_spanish:
  - estaba envuelto
  - estaba revestido
  lexicon: HALOT
  rationale: El participio pasivo expresa que David llevaba puesta una prenda. En español, 'estaba vestido' comunica con naturalidad esa idea sin forzar un giro más literal que sonaría rígido.
- source_word: בִּמְעִיל
  english_pob_choice: robe
  chosen_spanish: un manto
  alternatives_spanish:
  - una túnica exterior
  - una vestidura
  lexicon: HALOT
  rationale: El término designa una prenda exterior distintiva. 'Manto' funciona bien en español bíblico y mantiene el carácter ceremonial de la vestidura.
- source_word: בּוּץ
  english_pob_choice: fine linen
  chosen_spanish: de lino fino
  alternatives_spanish:
  - de lino fino de calidad
  - de lino
  lexicon: HALOT
  rationale: '''Lino fino'' preserva tanto el material como su connotación de calidad elevada, siguiendo la decisión auditada del inglés POB.'
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas del templo
  lexicon: HALOT
  rationale: Es el grupo tribal/cúltico estándar; 'levitas' es la forma estable y transparente en español.
- source_word: הַנֹּשְׂאִים אֶת הָאָרוֹן
  english_pob_choice: who were carrying the ark
  chosen_spanish: que llevaban el arca
  alternatives_spanish:
  - que transportaban el arca
  - que cargaban el arca
  lexicon: HALOT
  rationale: '''Llevaban'' expresa bien la acción procesional y evita una dureza innecesaria. Mantiene el movimiento continuo del participio.'
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores
  - los cantantes
  lexicon: HALOT
  rationale: El verbo hebreo se refiere específicamente a cantar. 'Cantores' es un equivalente natural y litúrgico en español, más preciso que 'músicos'.
- source_word: כְנַנְיָה
  english_pob_choice: Chenaniah
  chosen_spanish: Quenanías
  alternatives_spanish:
  - Chenanías
  - Kenanías
  lexicon: transliteration
  rationale: Se usa una transliteración española tradicional y legible. 'Quenanías' refleja bien el hebreo consonántico y evita una forma híbrida anglicada.
- source_word: הַשַּׂר
  english_pob_choice: the leader
  chosen_spanish: el líder
  alternatives_spanish:
  - el jefe
  - el oficial
  lexicon: HALOT
  rationale: Denota a quien está a cargo. 'Líder' es claro y conserva el sentido de autoridad sin introducir un matiz más administrativo de lo necesario.
- source_word: הַמַּשָּׂא
  english_pob_choice: the carrying
  chosen_spanish: del canto
  alternatives_spanish:
  - del transporte
  - de la carga
  lexicon: HALOT
  rationale: La frase hebrea es difícil y el contexto inmediato de 'los cantores' favorece una relación con el canto. Siguiendo la revisión inglesa, se opta por una lectura que une el sustantivo con la actividad musical, sin negar la tensión textual.
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: de los cantores
  alternatives_spanish:
  - de los cantores
  - de los músicos
  lexicon: HALOT
  rationale: En la construcción difícil, repetir 'cantores' ayuda a mantener la referencia al grupo mencionado explícitamente en el hebreo.
- source_word: אֵפוֹד
  english_pob_choice: ephod
  chosen_spanish: efod
  alternatives_spanish:
  - efod
  - vestidura ritual
  lexicon: HALOT
  rationale: Se conserva el término técnico 'efod' porque es una prenda cultual específica que no conviene diluir con una paráfrasis.
- source_word: בָּד
  english_pob_choice: linen
  chosen_spanish: de lino
  alternatives_spanish:
  - de lino
  - de tela de lino
  lexicon: HALOT
  rationale: '''De lino'' reproduce el material de forma directa y natural en español.'
theological_decisions:
- issue: Naturaleza de la vestimenta de David en el contexto de la procesión
  english_pob_reading: Retain 'ephod' as a specific garment without importing priestly claims beyond the text.
  chosen_spanish_reading: Mantener 'efod' como prenda específica, sin convertir el texto en una afirmación explícita de sacerdocio.
  alternative_spanish_readings:
  - vestidura sacerdotal
  - prenda ritual
  rationale: El versículo describe lo que David llevaba puesto, pero no formula aquí una tesis doctrinal sobre su oficio. Conservar 'efod' preserva el dato textual y evita resolver una tensión que el hebreo no resuelve explícitamente.
  doctrine_reference: 'Principio de traducción POB: no importar afirmaciones doctrinales no expresadas por el texto; preservar la tensión teológica cuando exista.'
- issue: Frase sintácticamente difícil sobre Quenanías
  english_pob_reading: leader of the singing of the singers
  chosen_spanish_reading: el líder del canto de los cantores
  alternative_spanish_readings:
  - el líder del canto
  - el jefe de los cantores
  - el líder de la música
  rationale: La secuencia hebrea es oscura y admite más de una lectura. La redacción principal sigue la resolución más cercana al audito inglés revisado, pero en español se mantiene la rareza relativa para no borrar la dificultad original.
  doctrine_reference: Principio de primacía del idioma original y de transparencia en los lugares de ambigüedad textual.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB en inglés, que ajustó 'clothed in' a 'clothed with' y afinó la frase difícil sobre Quenanías hacia 'leader of the singing of the singers'. En español se reflejó esa orientación con 'estaba vestido con' y 'el líder del canto de los cantores', manteniendo al mismo tiempo la ambigüedad razonable del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en la serie POB salvo que este versículo no lo contenga.
  - Se preserva 'efod' como tecnicismo cultual, coherente con el estándar POB.
  - Se prefiere 'cantores' para הַמְשֹׁרְרִים por consistencia con el valor verbal de cantar.
  - La transliteración 'Quenanías' sigue una norma española legible y evita mezcla con grafía inglesa.
