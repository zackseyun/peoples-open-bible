translation:
  language: es
  text: Hay quien pretende ser rico[a], y no tiene nada; hay quien pretende ser pobre[a], pero tiene gran riqueza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Hay quien se hace rico, y no tiene nada; hay quien se hace pobre, pero tiene gran riqueza''. Los verbos reflexivos hebreos pueden describir tanto una apariencia o auto-presentación como el hacerse rico o pobre de verdad; el texto principal favorece el sentido de apariencia por la ironía aguda del proverbio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is
  chosen_spanish: Hay
  alternatives_spanish:
  - Existe
  - Hay quien
  lexicon: HALOT
  rationale: La partícula existencial introduce una observación general. En español, 'Hay' conserva el tono gnómico y natural del proverbio; se completa con 'quien' para mantener la construcción proverbial.
- source_word: מִתְעַשֵּׁר
  english_pob_choice: pretends to be rich
  chosen_spanish: se hace rico
  alternatives_spanish:
  - pretende ser rico
  - se muestra rico
  - se enriquece a sí mismo
  lexicon: HALOT
  rationale: El hitpael admite tanto la idea de aparentar riqueza como la de hacerse rico. Dado el paralelismo con la segunda cola y la ironía del proverbio, 'se hace rico' preserva esa tensión sin limitarla solo a la apariencia externa.
- source_word: וְאֵין כֹּל
  english_pob_choice: yet has nothing
  chosen_spanish: y no tiene nada
  alternatives_spanish:
  - pero no tiene nada en absoluto
  - y no posee nada
  lexicon: HALOT
  rationale: La negación con כֹּל intensifica la falta total. En español, 'no tiene nada' transmite con claridad esa carencia absoluta; se mantiene la coordinación simple para conservar el ritmo sentencioso.
- source_word: מִתְרוֹשֵׁשׁ
  english_pob_choice: pretends to be poor
  chosen_spanish: se hace pobre
  alternatives_spanish:
  - pretende ser pobre
  - se muestra pobre
  - se empobrece a sí mismo
  lexicon: HALOT
  rationale: La forma reflexiva puede significar aparentar pobreza o rebajarse a pobreza. 'Se hace pobre' mantiene la paralela ambigüedad de la primera cola y evita decidir demasiado pronto entre apariencia y autohumillación material.
- source_word: וְהוֹן רָב
  english_pob_choice: yet has great wealth
  chosen_spanish: pero tiene muchas riquezas
  alternatives_spanish:
  - pero posee gran riqueza
  - y tiene abundantes bienes
  lexicon: HALOT
  rationale: הוֹן es riqueza/bienes, y רָב intensifica la abundancia. 'Muchas riquezas' suena natural en español y conserva el sentido de abundancia sustancial; 'pero' refleja mejor el contraste antitético que 'y'.
translation_notes:
  revision_awareness: El contexto inglés ofrece una traducción con enfoque en la apariencia ('pretends to be rich/poor') y una nota que reconoce la alternativa reflexiva ('makes himself rich/poor'). La versión española conserva esa tensión semántica con 'se hace rico/se hace pobre', sin cerrar de forma excesiva el valor del hitpael. La intensificación de כֹּל se refleja como negación total en español, y הוֹן רָב se vierte con una expresión natural de abundancia.
  spanish_consistency_notes:
  - Se mantiene 'rico/pobre' por fidelidad al contraste léxico del proverbio y por claridad en español.
  - Se evita 'SEÑOR' o terminología teológica no pertinente; el versículo es sapiencial y no contiene nombres divinos.
  - La puntuación reproduce dos miembros antitéticos con punto y coma, siguiendo el paralelismo hebreo.
