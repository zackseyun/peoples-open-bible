review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y conserva correctamente la superscripción, el singular representativo «el necio», la negación existencial «No hay Dios» y la cláusula final «No hay quien haga el bien». Sin embargo, en la secuencia verbal central se pierde parcialmente la decisión auditada del inglés POB: הִשְׁחִיתוּ fue entendido como estado/resultación moral («They are corrupt»), mientras que «Se corrompen» suena más procesual o incoativo en español. Además, el inglés preserva el enlace explícito entre הִתְעִיבוּ y עֲלִילָה mediante «do abominable deeds» con dos notas ancladas; el español solo ancla [c] en «obras abominables» y omite el segundo anclaje correspondiente a «De David», que en el inglés aparece sobre el propio encabezado.'
  spanish_quality_summary: 'El español es claro, natural y digno. «El necio», «en su corazón» y «No hay quien haga el bien» están bien logrados. La principal mejora necesaria es estilístico-semántica: «Están corrompidos» o «Se han corrompido» comunica mejor el valor resultativo de הִשְׁחִיתוּ que «Se corrompen». También conviene ajustar las notas para que los marcadores en el texto correspondan exactamente a las notas incluidas y para que la nota sobre el cambio singular/plural se ancle donde ocurre ese cambio.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» para אֱלֹהִים y «necio» para נָבָל concuerdan con las decisiones auditadas. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La única desalineación significativa es con la decisión léxica inglesa para הִשְׁחִיתוּ, que favorece un estado de corrupción más que un proceso.
  issues:
  - severity: medium
    issue: «Se corrompen» no refleja con suficiente precisión el valor resultativo de הִשְׁחִיתוּ
    rationale: La auditoría inglesa escogió «They are corrupt» para expresar el estado moral resultante. En español, «Se corrompen» sugiere más bien que están entrando en corrupción. «Están corrompidos» preserva mejor la fuerza descriptiva del hebreo en contexto.
  - severity: medium
    issue: Desajuste entre marcadores y notas al pie
    rationale: La nota b existe para «De David», pero el marcador [b] no aparece en el texto revisado por el estándar requerido. Además, si se conserva la nota sobre el cambio singular/plural, conviene anclarla en la cláusula plural donde el cambio se hace visible.
  - severity: low
    issue: La relación entre הִתְעִיבוּ y עֲלִילָה puede expresarse con un giro más idiomático
    rationale: «Hacen obras abominables» es aceptable, pero «cometen actos abominables» suena más natural en español contemporáneo y mantiene el sentido moral de la combinación verbal-nominal.
  revised_spanish_text: 'Para el director de música[a]. De David[b]. Dice el necio en su corazón: «No hay Dios». Están corrompidos[c]; cometen actos abominables. No hay quien haga el bien.'
  revised_footnotes:
