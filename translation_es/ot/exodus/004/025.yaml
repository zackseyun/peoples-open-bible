translation:
  language: es
  text: 'Entonces Séfora tomó un pedernal, cortó el prepucio de su hijo, le tocó los pies[a] con él, y dijo: «Sin duda eres un esposo de sangre para mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus pies». «Pies» puede ser un eufemismo de genitales, y el pronombre puede referirse a Moisés o a su hijo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹר
  english_pob_choice: flint
  chosen_spanish: pedernal
  alternatives_spanish:
  - silex
  - piedra afilada
  lexicon: HALOT
  rationale: El hebreo designa una piedra dura usada para cortar; en español, «pedernal» conserva la imagen concreta y el valor instrumental del objeto mejor que una paráfrasis genérica.
- source_word: עָרְלַת בְּנָהּ
  english_pob_choice: her son's foreskin
  chosen_spanish: el prepucio de su hijo
  alternatives_spanish:
  - el prepucio de su hijo varón
  - la piel del prepucio de su hijo
  lexicon: HALOT
  rationale: «Prepucio» es el término anatómico preciso y reproduce la fuerza directa del constructo hebreo sin suavizarlo.
- source_word: וַתַּגַּע
  english_pob_choice: touched
  chosen_spanish: tocó
  alternatives_spanish:
  - puso
  - aplicó
  - rozó
  lexicon: HALOT
  rationale: El verbo básico נגע es «tocar»; «tocó» mantiene la sencillez verbal y deja abierta la manera exacta del contacto, como en el texto fuente.
- source_word: לְרַגְלָיו
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus piernas
  - sus genitales
  lexicon: HALOT
  rationale: La lectura primaria es «pies». Se conserva esa forma en el texto principal porque el hebreo es deliberadamente ambiguo y la posible alusión eufemística debe quedar documentada, no resuelta por anticipado.
- source_word: כִּי
  english_pob_choice: Surely
  chosen_spanish: Sin duda
  alternatives_spanish:
  - ciertamente
  - de veras
  - porque
  lexicon: HALOT
  rationale: Aquí la partícula introduce una exclamación enfática; «Sin duda» comunica bien el tono insistente y evita el «porque» causal, que sería menos natural en español.
- source_word: חֲתַן דָּמִים
  english_pob_choice: a bridegroom of blood
  chosen_spanish: un esposo de sangre
  alternatives_spanish:
  - un novio de sangre
  - un esposo ensangrentado
  - un pariente de sangre
  lexicon: HALOT
  rationale: La expresión es oscura y debe mantenerse como fórmula extraña. «Esposo» preserva el campo nupcial del hebreo y «de sangre» conserva la metáfora sin interpretarla en exceso.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - para mí misma
  lexicon: HALOT
  rationale: Con una expresión nominal como «esposo de sangre», el español natural suele expresar la relación con «para mí»; mantiene el valor personal sin forzar una sintaxis poco idiomática.
theological_decisions:
- issue: Ambigüedad de «sus pies» y posible eufemismo corporal
  english_pob_reading: Retain the literal wording 'his feet' without specifying beyond the Hebrew text
  chosen_spanish_reading: Mantener «sus pies» en el texto principal y señalar en nota que puede ser eufemismo de genitales, con referentе incierto
  alternative_spanish_readings:
  - sus genitales
  - los pies de Moisés
  - los genitales de Moisés
  - los pies del hijo
  rationale: El hebreo permite varias lecturas y la traducción debe preservar esa tensión interpretativa. El texto principal conserva la literalidad, mientras la nota documenta las alternativas sin imponer una solución.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se revisó el pasaje contra el texto hebreo y el audit trail inglés; no se introdujeron cambios respecto del acuerdo de alta concordancia reportado en la fuente. Se mantuvo la ambigüedad central del hebreo en la nota, sin resolverla en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «prepucio» por precisión anatómica y coherencia con el tono directo del hebreo.
  - Se evitó «Cristo/Mesías» porque no aparece en el pasaje.
  - Se conservó la expresión difícil «esposo de sangre» para no diluir la rareza semántica del hebreo.
  - La nota usa «pies» en sentido literal y documenta el posible eufemismo sin trasladarlo al texto principal.
