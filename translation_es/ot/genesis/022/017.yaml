    reason: alternative_reading
  revision_rationale: 'Se requiere una reparación pequeña pero importante para alinear el español con una decisión auditada clave: conservar la tensión del singular colectivo en la última cláusula. ''Los enemigos de él'' es menos elegante, pero deja visible en español lo que el hebreo marca y lo que el English POB decidió preservar. También se ajusta ''en la orilla'' a ''a la orilla'' por mejor naturalidad, sin cambiar el sentido. La nota c se reemplaza para reflejar la alternativa plural documentada por la auditoría inglesa.'
