  to: Y, habiendo sido animados por las muy nobles palabras de Judas, capaces de impulsarlos a la virtud y de hacer viriles las almas de los jóvenes[a][b], resolvieron no limitarse a emprender la campaña[c], sino avanzar con valentía y, trabándose en combate con toda bravura, decidir el asunto[d], porque la ciudad, las cosas santas y el templo también estaban en peligro.
  rationale: Se corrige la nota [a] al español, se mejora la naturalidad de «tan nobles» a «muy nobles», y se reformula la cláusula de μὴ στρατεύεσθαι para expresar con mayor claridad el matiz contextual de «no limitarse a hacer campaña», en línea con el griego y la auditoría inglesa.
