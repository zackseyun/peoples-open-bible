translation:
  language: es
  text: Su padre les dio muchos dones de plata[a], oro y cosas preciosas, junto con ciudades fortificadas en Judá; pero dio el reino a Jehoram, porque era el primogénito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cosas escogidas' o 'dones costosos' para 'cosas preciosas'. El término hebreo puede referirse en general a artículos valiosos o selectos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - había dado
  lexicon: HALOT
  rationale: El verbo נתן en la secuencia narrativa se expresa de forma natural con el pretérito simple español 'dio', manteniendo la acción histórica directa sin forzar pluscuamperfecto.
- source_word: מַתָּנ֨וֹת רַבּ֜וֹת
  english_pob_choice: many gifts
  chosen_spanish: muchos dones
  alternatives_spanish:
  - muchos regalos
  - numerosos dones
  lexicon: HALOT
  rationale: '''Dones'' conserva el valor de obsequios concedidos por un padre en contexto real/real, y ''muchos'' refleja la abundancia de רַבּוֹת con naturalidad en español.'
- source_word: לְכֶסֶף וּלְזָהָב
  english_pob_choice: of silver, gold
  chosen_spanish: de plata, oro
  alternatives_spanish:
  - en plata y oro
  - consistentes en plata y oro
  lexicon: HALOT
  rationale: La preposición española 'de' comunica con claridad la clase o material de los dones, equivalente funcionalmente al uso categorial del hebreo.
- source_word: וּלְמִגְדָּנ֔וֹת
  english_pob_choice: precious things
  chosen_spanish: cosas preciosas
  alternatives_spanish:
  - objetos preciosos
  - cosas selectas
  - dones costosos
  lexicon: HALOT
  rationale: מִגְדָּנוֹת puede abarcar artículos valiosos o escogidos; 'cosas preciosas' preserva amplitud semántica sin restringirlo indebidamente a alimentos o a una sola categoría de bienes.
- source_word: עִם עָרֵי מְצֻרוֹת
  english_pob_choice: along with fortified cities
  chosen_spanish: junto con ciudades fortificadas
  alternatives_spanish:
  - junto con ciudades amuralladas
  - así como ciudades fortificadas
  lexicon: HALOT
  rationale: '''Junto con'' reproduce la idea de acompañamiento/adición de עִם, y ''ciudades fortificadas'' mantiene la fuerza militar/defensiva de מְצֻרוֹת.'
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - en la tierra de Judá
  lexicon: HALOT
  rationale: La preposición locativa se vierte con 'en', y 'Judá' conserva el nombre geográfico-bíblico sin glosa innecesaria.
- source_word: וְאֶת הַמַּמְלָכָה נָתַן לִיהוֹרָם
  english_pob_choice: but he gave the kingdom to Jehoram
  chosen_spanish: pero dio el reino a Joram
  alternatives_spanish:
  - y dio el reino a Joram
  lexicon: HALOT
  rationale: Aunque el hebreo coordina con וְ, el contraste discursivo con la repartición de bienes a los demás hijos justifica 'pero' en español para reflejar la tensión narrativa que la POB inglesa ya marcó.
- source_word: כִּי ה֥וּא הַ/בְּכֽוֹר
  english_pob_choice: because he was the firstborn
  chosen_spanish: porque él era el primogénito
  alternatives_spanish:
  - pues era el primogénito
  - porque era el primogénito
  lexicon: HALOT
  rationale: '''Primogénito'' es el término español estándar y fiel para הַבְּכוֹר; se mantiene el sujeto explícito ''él'' para clarificar la referencia a Joram y conservar el énfasis causal.'
theological_decisions:
- issue: Primogenitura como fundamento de la transferencia del reino
  english_pob_reading: because he was the firstborn
  chosen_spanish_reading: porque él era el primogénito
  alternative_spanish_readings:
  - pues era el primogénito
  - ya que era el primogénito
  rationale: No se introduce una explicación legal adicional que no esté en el verso. La cláusula causal se conserva de modo directo para respetar que el texto presenta la primogenitura como razón explícita de la concesión del reino.
  doctrine_reference: Primogenitura / derecho familiar en narrativas regias (cf. uso bíblico de הבכור)
- issue: Contraste entre dones materiales y entrega del reino
  english_pob_reading: but he gave the kingdom to Jehoram
  chosen_spanish_reading: pero dio el reino a Joram
  alternative_spanish_readings:
  - y dio el reino a Joram
  rationale: Se preserva el contraste narrativo entre la distribución de regalos y la asignación del reino a un solo hijo. El 'pero' no añade doctrina, sino que reproduce el valor discursivo que la POB inglesa ya señaló.
  doctrine_reference: Narrativa dinástica / distribución de herencia en contextos monárquicos
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: el inglés POB mantiene ''precious things'' con nota de alternativa léxica, y no hubo revisiones posteriores. La versión española sigue esa decisión, conservando la amplitud semántica de מִגְדָּנוֹת y el contraste discursivo entre los dones y el reino.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - '''Joram'' se mantiene como forma breve coherente con el español bíblico; el inglés POB usa ''Jehoram'', pero el referente es el mismo personaje.'
  - '''Primogénito'' traduce de manera estable הַבְּכוֹר sin ampliar a ''hijo mayor'', para conservar la fuerza técnica del término.'
  - Se evita 'siervo' u otra terminología ajena porque no aparece vocabulario de servicio en el verso.
