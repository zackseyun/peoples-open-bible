translation:
  language: es
  text: La muerte y la vida están en poder de la lengua[b][a], y los que la aman comerán su fruto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «La muerte y la vida están en la mano de la lengua».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, los que aman usar la lengua experimentarán las consecuencias de sus palabras, ya sea para muerte o para vida.
    reason: cultural_note
lexical_decisions:
- source_word: מָוֶת
  english_pob_choice: Death
  chosen_spanish: Muerte
  alternatives_spanish:
  - muerte
  lexicon: HALOT
  rationale: Se mantiene el sustantivo abstracto en contraste directo con 'vida', como en el hebreo. En español, la mayúscula inicial no es necesaria; se conserva el sentido sin personificar el término.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vidas
  - vivir
  lexicon: HALOT
  rationale: Aunque el hebreo es plural morfológico, aquí funciona como un abstracto colectivo. 'Vida' reproduce mejor el paralelismo antitético con 'muerte'.
- source_word: בְּיַד
  english_pob_choice: are in the power of
  chosen_spanish: están en poder de
  alternatives_spanish:
  - están en la mano de
  - están bajo el control de
  lexicon: HALOT
  rationale: La imagen literal es 'en la mano de', pero en español 'en poder de' comunica de manera natural la idea de dominio o control sin perder el trasfondo metafórico.
- source_word: לָשׁוֹן
  english_pob_choice: the tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - la lengua / el habla
  - la palabra
  lexicon: HALOT
  rationale: Se prefiere 'lengua' por su concreción corporal y por mantener la figura proverbial del órgano que produce palabras. 'Tongue' en inglés puede sonar más idiomático como 'lengua' en español que como 'habla'.
- source_word: אֹהֲבֶיהָ
  english_pob_choice: those who love it
  chosen_spanish: los que la aman
  alternatives_spanish:
  - los que aman la lengua
  - sus amantes
  - los que aman hablar
  lexicon: HALOT
  rationale: El sufijo pronominal retoma 'lengua'. 'La aman' conserva la ambigüedad del hebreo, sin precisar innecesariamente si se trata de amar el hablar, usar mucho la lengua o deleitarse en su poder.
- source_word: יֹאכַל
  english_pob_choice: will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - comerá
  - comerán de
  lexicon: HALOT
  rationale: El plural en español armoniza con el sujeto plural 'los que la aman'. Se conserva el futuro proverbial de consecuencia.
- source_word: פִּרְיָהּ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - el fruto de ella
  - su producto
  - su resultado
  lexicon: HALOT
  rationale: '''Fruto'' conserva la metáfora agrícola y su valor de consecuencia/resultados. ''Su fruto'' mantiene brevedad y paralelismo con el hebreo.'
theological_decisions:
- issue: La fuerza proverbial de consecuencias morales asociadas al habla
  english_pob_reading: Those who love it likely refers to those who love using the tongue; that is, they will experience the consequences of their words, whether for death or for life.
  chosen_spanish_reading: 'los que la aman: quienes aman usar la lengua, y por eso experimentarán las consecuencias de sus palabras, para muerte o para vida'
  alternative_spanish_readings:
  - 'los que la aman: los que aman la lengua'
  - 'los que la aman: los que aman hablar'
  rationale: 'Se conserva la ambigüedad del hebreo y del audit trail inglés: no se concreta excesivamente el referente de ''amarla'', pero sí se aclara en nota que apunta al uso de la lengua y a las consecuencias morales de las palabras.'
  doctrine_reference: Sabiduría proverbial sobre responsabilidad moral del habla; cf. Santiago 3:5-12.
translation_notes:
  revision_awareness: Se siguió el texto hebreo directo y se alineó con el audit trail inglés de la POB. Se mantuvo el paralelismo antitético 'muerte/vida', se conservó la metáfora corporal de 'lengua' y se reflejó la expresión idiomática de בְּיַד como 'en poder de', con una nota que preserva la alternativa más literal. No se introdujeron cambios textuales respecto al sentido confirmado por la revisión más reciente; la solución española busca claridad natural sin borrar la ambigüedad deliberada del hebreo sobre 'amarla'.
  spanish_consistency_notes:
  - Se usa 'lengua' para לָשׁוֹן, coherente con el valor corporal-metafórico.
  - Se usa 'fruto' para פִּרְיָהּ, preservando la metáfora agrícola de consecuencias.
  - Se evita 'SEÑOR' u otras convenciones no pertinentes; no hay lenguaje divino en este versículo.
  - La puntuación y el orden sintáctico siguen el paralelismo del hebreo con una construcción natural en español.
