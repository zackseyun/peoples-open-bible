translation:
  language: es
  text: Pero si lo golpeó con un instrumento de hierro y murió, es un asesino[a]; el asesino ciertamente debe morir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Instrumento de hierro» conserva la amplitud del hebreo כְּלִי בַרְזֶל; también puede entenderse como «implemento de hierro» u «objeto de hierro», sin especificar un arma particular.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La partícula introduce un caso condicional dentro de una secuencia legal. «Pero si» conserva el matiz de transición adversativa que ya estaba en la solución inglesa y suena natural en español jurídico-bíblico.
- source_word: בִּכְלִי בַרְזֶל
  english_pob_choice: with an iron tool
  chosen_spanish: con un instrumento de hierro
  alternatives_spanish:
  - con una herramienta de hierro
  - con un implemento de hierro
  - con un objeto de hierro
  lexicon: HALOT
  rationale: כְּלִי es semánticamente amplio y no nombra un arma específica. «Instrumento de hierro» mantiene esa amplitud mejor que «arma», y conserva la idea de un objeto utilizable sin sobreespecificar.
- source_word: הִכָּהוּ
  english_pob_choice: he struck him
  chosen_spanish: lo golpeó
  alternatives_spanish:
  - lo hirió
  - lo golpeó con fuerza
  - lo hirió de un golpe
  lexicon: HALOT
  rationale: El verbo admite la idea de golpear o herir con violencia. «Lo golpeó» es natural en español y preserva el acto físico sin añadir matices que el hebreo no exige explícitamente.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y él murió
  - y falleció
  lexicon: HALOT
  rationale: La secuencia narrativa se conserva de forma directa. «Y murió» reproduce el resultado inmediato sin introducir causalidad adicional.
- source_word: רֹצֵחַ הוּא
  english_pob_choice: he is a murderer
  chosen_spanish: es un asesino
  alternatives_spanish:
  - es un homicida
  - es un homicida culpable
  - es un asesino deliberado
  lexicon: HALOT
  rationale: En este contexto legal, רֹצֵחַ señala culpabilidad por muerte intencional. «Asesino» comunica esa fuerza jurídica y moral con claridad en español; «homicida» puede sonar más técnico o más amplio, según el oído del lector.
- source_word: מוֹת יוּמַת
  english_pob_choice: must surely be put to death
  chosen_spanish: ciertamente debe ser condenado a muerte
  alternatives_spanish:
  - debe ser muerto sin falta
  - debe ser puesto a muerte
  - debe morir ciertamente
  lexicon: HALOT
  rationale: El giro intensivo del hebreo exige una obligación penal enfática. «Ciertamente debe ser condenado a muerte» conserva la solemnidad legal y evita una literalidad que en español sonaría menos natural que el pasivo jurídico.
- source_word: הָרֹצֵחַ
  english_pob_choice: the murderer
  chosen_spanish: el asesino
  alternatives_spanish:
  - el homicida
  - aquel asesino
  lexicon: HALOT
  rationale: La forma definida retoma al culpable ya identificado. «El asesino» mantiene la cohesión terminológica con la primera cláusula y el peso jurídico de la reiteración final.
theological_decisions:
- issue: Clasificación moral y legal de רֹצֵחַ en este caso
  english_pob_reading: murderer
  chosen_spanish_reading: asesino
  alternative_spanish_readings:
  - homicida
  - asesino culpable
  rationale: El contexto de la ley sobre homicidio distingue entre muerte accidental e intencional. Aquí la culpa es explícita y la pena es capital; por eso «asesino» refleja mejor la lectura legal y moral que un término más neutral o técnico.
  doctrine_reference: Numbers 35; Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la última revisión, con acuerdo alto entre revisores. La redacción española sigue esa lectura estable y conserva la distinción legal central sin ampliar el sentido del hebreo.
  spanish_consistency_notes:
  - Se mantiene «asesino» de manera uniforme para רֹצֵחַ, en coherencia con la culpabilidad intencional que el contexto exige.
  - «Instrumento de hierro» evita convertir el término amplio כְּלִי en «arma», respetando la amplitud lexical documentada.
  - La construcción final «ciertamente debe ser condenado a muerte» intenta preservar el hebreo enfático מוֹת יוּמַת en un español jurídico claro y publicable.
