translation:
  language: es
  text: Porque todos los seres humanos son por naturaleza necios[a], en quienes había ignorancia de Dios; y a partir de las cosas buenas visibles no pudieron conocer al que es[b], ni prestando atención a sus obras reconocieron al artífice[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los hombres» o «todas las personas»; el griego usa un masculino genérico para la humanidad.
    reason: lexical_alternative
  - marker: b
    text: O «el que existe» o «el que es». La expresión griega puede funcionar como designación divina.
    reason: alternative_reading
  - marker: c
    text: O «el artesano» o «el hacedor».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μάταιοι
  english_pob_choice: foolish
  chosen_spanish: necios
  alternatives_spanish:
  - vanos
  - insensatos
  - fútiles
  lexicon: LSJ
  rationale: El contexto no habla solo de inutilidad, sino de una vaciedad/sinrazón en el juicio respecto de Dios. «Necios» comunica mejor esa carga sapiencial en español, sin reducirlo a mera ineficacia.
- source_word: πάντες ἄνθρωποι
  english_pob_choice: all people
  chosen_spanish: todos los seres humanos
  alternatives_spanish:
  - todos los hombres
  - toda la humanidad
  - todas las personas
  lexicon: LSJ
  rationale: El griego usa ἄνθρωποι en plural masculino con valor genérico. En español, «todos los seres humanos» mantiene la universalidad sin forzar un masculino genérico innecesario.
- source_word: φύσει
  english_pob_choice: by nature
  chosen_spanish: por naturaleza
  alternatives_spanish:
  - naturalmente
  - según su naturaleza
  lexicon: LSJ
  rationale: La locución adverbial expresa condición o modo innato; «por naturaleza» es la correspondencia más directa y natural en español.
- source_word: θεοῦ ἀγνωσία
  english_pob_choice: ignorance of God
  chosen_spanish: ignorancia de Dios
  alternatives_spanish:
  - falta de conocimiento de Dios
  - desconocimiento de Dios
  lexicon: LSJ
  rationale: La frase griega denota ignorancia respecto de Dios. «Ignorancia de Dios» conserva el genitivo y la brevedad del original sin añadir una lectura más fuerte que el texto mismo.
- source_word: ἐκ τῶν ὁρωμένων ἀγαθῶν
  english_pob_choice: from the good things that are seen
  chosen_spanish: desde las cosas buenas que se ven
  alternatives_spanish:
  - a partir de las cosas buenas visibles
  - desde los bienes visibles
  lexicon: LSJ
  rationale: «ὁρωμένων» apunta a lo visible/percibido por la vista, y «ἀγαθῶν» aquí se refiere a los bienes del orden creado. La formulación española mantiene la referencia a lo visible y a su bondad sin hacerla más técnica de lo necesario.
- source_word: οὐκ ἴσχυσαν εἰδέναι
  english_pob_choice: were not able to know
  chosen_spanish: no pudieron conocer
  alternatives_spanish:
  - no fueron capaces de conocer
  - no lograron conocer
  lexicon: LSJ
  rationale: ἰσχύω con infinitivo expresa capacidad; «no pudieron conocer» preserva esa fuerza con buen ritmo en español.
- source_word: τὸν ὄντα
  english_pob_choice: the One who is
  chosen_spanish: al que es
  alternatives_spanish:
  - al que existe
  - al que es el que existe
  - al Ser
  lexicon: LSJ
  rationale: La expresión puede funcionar como designación reverente de Dios. En español, «al que es» conserva la forma breve y la tensión teológica, sin resolverla con una paráfrasis explicativa.
- source_word: τοῖς ἔργοις προσχόντες
  english_pob_choice: by paying attention to his works
  chosen_spanish: prestando atención a sus obras
  alternatives_spanish:
  - fijándose en sus obras
  - dando atención a sus obras
  lexicon: LSJ
  rationale: προσέχω aquí significa atender cuidadosamente. «Prestando atención» refleja bien la idea de observación deliberada y mantiene fluidez natural.
- source_word: ἐπέγνωσαν
  english_pob_choice: did they recognize
  chosen_spanish: reconocieron
  alternatives_spanish:
  - llegaron a conocer
  - percibieron
  lexicon: LSJ
  rationale: En este contexto inferencial, ἐπιγινώσκω puede implicar reconocer al creador a partir de sus obras. «Reconocieron» conserva esa idea de identificación por indicios.
- source_word: τὸν τεχνίτην
  english_pob_choice: the craftsman
  chosen_spanish: al artífice
  alternatives_spanish:
  - al artesano
  - al creador
  - al artesano experto
  lexicon: LSJ
  rationale: Τεχνίτης es literalmente un artesano o artífice. «Artífice» comunica el matiz de habilidad creadora y funciona bien en registro bíblico solemne.
theological_decisions:
- issue: τὸν ὄντα como designación divina
  english_pob_reading: the One who is
  chosen_spanish_reading: al que es
  alternative_spanish_readings:
  - al que existe
  - al Ser
  rationale: La expresión puede aludir reverentemente a Dios como el que verdaderamente es. Mantener «al que es» preserva la ambigüedad sagrada y evita cerrar el sentido con una interpretación más explícita.
  doctrine_reference: Preservar la tensión teológica del título sin resolverla.
- issue: Uso de un masculino genérico en ἄνθρωποι
  english_pob_reading: all people
  chosen_spanish_reading: todos los seres humanos
  alternative_spanish_readings:
  - todos los hombres
  - toda la humanidad
  rationale: El griego es masculino plural con valor genérico. En español se optó por una forma inclusiva que comunica claramente el universal sin perder el alcance antropológico del original.
  doctrine_reference: Mantener la universalidad del sujeto sin masculinizar innecesariamente el español.
translation_notes:
  revision_awareness: La base auditada del inglés revisó «futile» a «foolish» y «men» a «people»; la versión española sigue esa revisión al preferir «necios» y una formulación inclusiva («todos los seres humanos»), conservando además la tensión teológica de τὸν ὄντα y el matiz artesanal de τὸν τεχνίτην.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el pasaje no contiene el tetragrámaton ni κύριος.
  - Se mantuvo «Dios» en «ignorancia de Dios» para reflejar el genitivo del original.
  - «Artífice» se eligió por su registro bíblico y su cercanía a la imagen de habilidad creadora.
  - Las notas a pie de página conservan alternativas reales del griego sin sobreexplicar el pasaje.
