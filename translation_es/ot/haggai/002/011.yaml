translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: Pregunta a los sacerdotes por una instrucción[a], diciendo,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la ley» o «por un dictamen». Aquí la palabra hebrea torá probablemente significa una instrucción o decisión sacerdotal sobre un caso concreto, no necesariamente la Torá como libro.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se conserva en un registro natural y solemne. «Así dice» reproduce bien la apertura mensajera sin volverla arcaica.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé Todopoderoso
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé». צְבָאוֹת se vierte con el equivalente tradicional «de los ejércitos», que mantiene el título divino sin aclararlo en exceso.'
- source_word: שְׁאַל
  english_pob_choice: Ask
  chosen_spanish: Pregunta
  alternatives_spanish:
  - Consulta
  - Inquiere
  lexicon: HALOT
  rationale: El imperativo directo dirigido al profeta se expresa de forma natural en español como «Pregunta». Conserva el sentido de solicitar respuesta a los sacerdotes.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes levíticos
  - el sacerdocio
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente claro y estándar en español. Se evita «sacerdocio» porque el hebreo se refiere a personas concretas.
- source_word: תּוֹרָה
  english_pob_choice: for a ruling
  chosen_spanish: por una decisión legal
  alternatives_spanish:
  - sobre la ley
  - por una instrucción
  lexicon: HALOT
  rationale: Aquí תּוֹרָה no designa el Pentateuco ni «la Ley» como corpus, sino una respuesta normativa sacerdotal sobre un caso concreto. «Decisión legal» refleja esa función, manteniendo la tensión entre instrucción y veredicto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y diciendo,
  - 'al decir:'
  lexicon: HALOT
  rationale: Se conserva la partícula introductoria que enlaza con la pregunta del versículo siguiente. «Diciendo,» es breve y fiel al valor de introducción del discurso.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto pide traducir directamente el Tetragrámaton como «Yahvé». Se mantiene el nombre pactual en vez de enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de תּוֹרָה en un contexto sacerdotal
  english_pob_reading: for a ruling
  chosen_spanish_reading: por una decisión legal
  alternative_spanish_readings:
  - sobre la ley
  - por una instrucción
  rationale: 'La lectura funcional es sacerdotal-jurídica: los sacerdotes deben emitir una determinación sobre un caso de pureza/impureza en el contexto inmediato. «Decisión legal» preserva ese valor sin convertirlo en una referencia al libro de la Torá.'
  doctrine_reference: Contexto inmediato de Hageo 2:12-13; uso legal-sacerdotal de תּוֹרָה
- issue: Registro profético de apertura
  english_pob_reading: Thus says
  chosen_spanish_reading: Así dice
  alternative_spanish_readings:
  - Así ha dicho
  - Esto dice
  rationale: La formulación mantiene el estilo profético solemne sin cargarlo con una sintaxis innecesariamente arcaica. No implica cambio doctrinal, sino adecuación de registro.
  doctrine_reference: Convención profética hebrea de fórmula mensajera
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: no hay revisiones aplicadas en el registro base, y la cruz-verificación indica alto acuerdo. La única decisión sensible es el valor de תּוֹרָה, que en este contexto se entiende funcionalmente como dictamen/instrucción sacerdotal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto para el nombre divino.
  - «Sacerdotes» refleja el objeto directo plural concreto del hebreo.
  - El texto principal evita «la Ley» para no sobrerelacionar תּוֹרָה con el corpus mosaico en sentido amplio.
  - La puntuación con dos puntos tras la fórmula profética refleja bien la transición al mandato siguiente.
