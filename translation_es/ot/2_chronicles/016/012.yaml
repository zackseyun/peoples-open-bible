  yaml_path: translation/ot/2_chronicles/016/012.yaml
  text: In the thirty-ninth year of his reign[a], Asa became diseased in his feet; his disease became very severe. Yet even in his disease he did not seek Yahweh, but the physicians.
  footnotes:
  - marker: a
    text: Or 'did not inquire of the LORD, but from the physicians.' The Hebrew clause is elliptical and contrasts seeking the LORD with turning to physicians.
    reason: lexical_alternative
