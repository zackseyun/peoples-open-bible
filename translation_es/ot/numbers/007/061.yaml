translation:
  language: es
  text: Su ofrenda fue un plato de plata[a], su peso era de ciento treinta siclos; una fuente[b] de plata de setenta siclos, según el siclo del santuario[c]; ambos llenos de flor de harina mezclada con aceite, para una ofrenda de cereal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuente» o «bandeja» por «plato» (קַעֲרָה).
    reason: lexical_alternative
  - marker: b
    text: O «cuenco» por «fuente» (מִזְרָק), un recipiente usado en el servicio del santuario.
    reason: lexical_alternative
  - marker: c
    text: «Según el siclo del santuario» significa según la pesa estándar del santuario.
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  english_pob_choice: His offering was
  chosen_spanish: Su ofrenda fue
  alternatives_spanish:
  - Su ofrenda consistía en
  - Su don fue
  lexicon: HALOT
  rationale: קָרְבָּן designa una ofrenda presentada en contexto cultual. «Ofrenda» conserva el valor técnico y la naturalidad en español; el verbo copulativo ayuda a introducir el inventario nominal.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  english_pob_choice: one silver plate
  chosen_spanish: un plato de plata
  alternatives_spanish:
  - un cuenco de plata
  - un dish de plata
  lexicon: HALOT
  rationale: קַעֲרָה es un recipiente poco profundo. «Plato» comunica bien la forma en español moderno y sigue la decisión inglesa; «cuenco» es posible, pero sugiere mayor hondura.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  english_pob_choice: its weight one hundred thirty shekels
  chosen_spanish: de peso de ciento treinta siclos
  alternatives_spanish:
  - que pesaba ciento treinta siclos
  - su peso era de ciento treinta siclos
  lexicon: HALOT
  rationale: El hebreo expresa literalmente el peso. «De peso de» mantiene la estructura nominal y el dato cuantitativo sin añadir paráfrasis.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  english_pob_choice: one silver basin
  chosen_spanish: un tazón de plata
  alternatives_spanish:
  - un cuenco de plata
  - una vasija de plata
  lexicon: HALOT
  rationale: מִזְרָק es un recipiente de servicio cultual. «Tazón» funciona como equivalente comprensible en español; se conserva la posibilidad de leerlo como recipiente para uso ritual, sin reducirlo a vajilla doméstica.
- source_word: שִׁבְעִים שֶׁקֶל
  english_pob_choice: of seventy shekels
  chosen_spanish: de setenta siclos
  alternatives_spanish:
  - de peso de setenta siclos
  - con un peso de setenta siclos
  lexicon: HALOT
  rationale: Se mantiene la especificación de peso como complemento directo del recipiente, siguiendo la fórmula de inventario del hebreo.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the shekel of the sanctuary
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según la medida del santuario
  lexicon: HALOT
  rationale: La frase fija un patrón de peso sagrado o del santuario. «Según» refleja bien la norma de referencia; «siclo» conserva el término monetario/pesado tradicional.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos recipientes
  lexicon: HALOT
  rationale: El pronombre remite a los dos objetos mencionados. En español, «ambos» es suficiente y natural, sin perder la referencia dual.
- source_word: מְלֵאִים
  english_pob_choice: full of
  chosen_spanish: llenos de
  alternatives_spanish:
  - colmados de
  - repletos de
  lexicon: HALOT
  rationale: «Llenos de» reproduce de forma directa el estado de los recipientes y es la opción más clara para lectura pública.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: «Flor de harina» es la expresión técnica tradicional y fiel para la harina refinada usada en ofrendas, sin perder inteligibilidad.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - mezclada con el aceite
  - meneada con aceite
  lexicon: HALOT
  rationale: El participio pasivo indica harina combinada con aceite. «Mezclada con aceite» es natural y exacto en español; no se requiere un matiz más técnico aquí.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para una ofrenda vegetal
  alternatives_spanish:
  - para una ofrenda de cereal
  - para una oblación
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial puede significar ofrenda de cereal/grano. Se eligió «ofrenda vegetal» para conservar una designación amplia y cultual en español, acorde con el uso POB de diferenciar este término del genérico «ofrenda».
theological_decisions:
- issue: Naturaleza de מִנְחָה en el sistema sacrificial
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de cereal
  - oblación
  rationale: La palabra hebrea pertenece al ámbito de las ofrendas no animales. En español, «ofrenda vegetal» conserva el contraste con otros sacrificios y evita reducirla a un mero producto agrícola.
  doctrine_reference: Levítico 2; Números 28–29
- issue: Siclo del santuario como estándar normativo
  english_pob_reading: according to the shekel of the sanctuary
  chosen_spanish_reading: según el siclo del santuario
  alternative_spanish_readings:
  - conforme al siclo del santuario
  - según la medida del santuario
  rationale: La frase no introduce santidad del metal sino una norma de pesas. «Según» comunica adecuadamente la referencia metrológica sin oscurecer la función cultual.
  doctrine_reference: Éxodo 30:13; Levítico 27:25
- issue: Recipiente מִזְרָק en contexto de culto
  english_pob_reading: basin
  chosen_spanish_reading: tazón
  alternative_spanish_readings:
  - tazón ritual
  - cuenco
  rationale: No hay señal en el hebreo de un objeto doméstico común; es un recipiente de servicio. «Tazón» es funcional y comprensible, aunque mantiene cierta ambigüedad que el contexto ritual resuelve.
  doctrine_reference: Números 7:13, 19, 25
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «by the shekel of the sanctuary» a «according to the shekel of the sanctuary» para expresar con más naturalidad la norma de peso; el español sigue esa lectura normativa con «según». No se introdujeron variantes textuales adicionales porque el hebreo y el audit trail están en alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» donde corresponda, pero en este versículo no aparece el nombre divino.
  - Se evitó «SEÑOR» como sustituto teológico no presente en el texto fuente.
  - «Ofrenda vegetal» se usa de manera coherente para מִנְחָה en contexto sacrificial.
  - Los términos de peso se expresan con «siclos» para mantener la unidad metrológica del texto.
