translation:
  language: es
  text: Así quedó roto[a] en aquel día, y así los afligidos[b] del rebaño, que me observaban, supieron que era la palabra de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue anulado» o «fue revocado», destacando la fuerza pactual de la imagen.
    reason: lexical_alternative
  - marker: b
    text: O «los pobres del rebaño» o «los humildes del rebaño».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֻּפַר
  english_pob_choice: it was broken
  chosen_spanish: quedó roto
  alternatives_spanish:
  - fue anulado
  - fue revocado
  lexicon: HALOT
  rationale: El pasivo de פרר aquí se refiere al símbolo pastoral/covenantal del contexto inmediato. «Quedó roto» conserva la imagen concreta y permite que la nulidad o revocación del pacto se entienda por el contexto, sin borrar la metáfora.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Es una fórmula temporal profética estándar. «En aquel día» es natural en español y mantiene el valor de marcador escatológico/narrativo.
- source_word: וַיֵּדְעוּ כֵן
  english_pob_choice: and thus ... knew
  chosen_spanish: y así ... supieron
  alternatives_spanish:
  - y entonces ... supieron
  - y ... supieron
  lexicon: HALOT
  rationale: כֵן expresa la consecuencia lógica del acto anterior. «Y así» conserva esa relación causal/confirmatoria sin forzar una paráfrasis.
- source_word: עֲנִיֵּי הַצֹּאן
  english_pob_choice: the afflicted of the flock
  chosen_spanish: los afligidos de las ovejas
  alternatives_spanish:
  - los pobres de las ovejas
  - los humildes de las ovejas
  lexicon: HALOT
  rationale: עֲנִיִּים puede significar pobres, afligidos o humildes. Aquí «afligidos» capta mejor la condición oprimida del grupo en el contexto profético.
- source_word: הַשֹּׁמְרִים אֹתִי
  english_pob_choice: who were watching me
  chosen_spanish: que me estaban observando
  alternatives_spanish:
  - que velaban por mí
  - que me vigilaban
  lexicon: HALOT
  rationale: El participio de שׁמר con objeto indica observar/guardar atentamente. «Me estaban observando» es claro y preserva la relación directa con el hablante.
- source_word: כִּי דְבַר יְהוָה הוּא
  english_pob_choice: that it was the word of Yahweh
  chosen_spanish: que era la palabra de Yahvé
  alternatives_spanish:
  - que era palabra de Yahvé
  - que esto era la palabra de Yahvé
  lexicon: HALOT
  rationale: El hebreo identifica el acontecimiento como palabra de Yahvé cumplida o autenticada. Se mantiene «palabra de Yahvé» conforme al criterio del proyecto para יְהוָה.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según la convención del proyecto, se traduce como «Yahvé» para preservar el nombre de pacto y evitar el mascaramiento convencional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto inglés fue revisado y quedó sin cambios; la versión española sigue de cerca el análisis auditado y conserva las tensiones léxicas documentadas, especialmente en פרר, עֲנִיִּים y el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en vez de «SEÑOR» para la coherencia con la política del proyecto.
  - «Aquel día» conserva el marcador profético temporal sin añadir interpretación.
  - «Los afligidos de las ovejas» intenta reflejar el grupo social descrito sin diluir la ambigüedad posible de עֲנִיֵּי.
