base_translation:
  language: en
  yaml_path: translation/ot/genesis/034/030.yaml
  text: Then Jacob said to Simeon and Levi[a], “You have brought trouble on me, making me stink among the inhabitants of the land, among the Canaanites and the Perizzites. Since I am few in number, they will gather against me and strike me down[b], and I will be destroyed—I and my household.”
  footnotes:
