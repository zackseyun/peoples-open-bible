translation:
  language: es
  text: Y si andan contra mí[a] y no quieren escucharme, entonces seguiré castigándolos[b] siete veces, conforme a sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en hostilidad hacia mí' / 'en oposición a mí'. El hebreo 'caminar conmigo en qeri' es difícil; en este capítulo expresa una postura de oposición, no mera casualidad.
    reason: lexical_alternative
  - marker: b
    text: O 'les añadiré golpes siete veces por sus pecados'. El hebreo literalmente expresa añadir o aumentar el castigo.
    reason: alternative_reading
lexical_decisions:
- source_word: תֵּֽלְכ֤וּ עִמִּ/י֙ קֶ֔רִי
  english_pob_choice: you walk contrary to me
  chosen_spanish: andan conmigo en oposición
  alternatives_spanish:
  - andan conmigo con hostilidad
  - van en oposición a mí
  - caminan contra mí
  lexicon: HALOT
  rationale: El hebreo usa 'caminar' de modo idiomático para la conducta. En español, 'andan conmigo en oposición' conserva la idea relacional e idiomática sin sonar forzado. 'Contra mí' es posible, pero 'en oposición' comunica mejor el matiz de actitud hostil o contraria que el contexto exige.
- source_word: תֹאב֖וּ
  english_pob_choice: are not willing
  chosen_spanish: no quieren
  alternatives_spanish:
  - no están dispuestos
  - se niegan
  - no consienten
  lexicon: HALOT
  rationale: El verbo expresa voluntad, no solo una acción futura. 'No quieren' mantiene esa fuerza volitiva de manera natural en español. 'Se niegan' o 'no están dispuestos' serían aceptables, pero añaden un tono ligeramente más explicativo.
- source_word: לִ/שְׁמֹ֣עַֽ לִ֑/י
  english_pob_choice: to listen to me
  chosen_spanish: escucharme
  alternatives_spanish:
  - oírme
  - obedecerme
  - darme oído
  lexicon: HALOT
  rationale: '''Escucharme'' conserva el verbo básico del hebreo y en contexto de pacto deja abierta la implicación de obediencia, como en el audit trail inglés. ''Obedecerme'' sería más interpretativo; ''oírme'' es posible pero menos idiomático en esta construcción.'
- source_word: וְ/יָסַפְתִּ֤י
  english_pob_choice: I will continue
  chosen_spanish: yo les seguiré trayendo
  alternatives_spanish:
  - yo añadiré
  - yo aumentaré
  - seguiré golpeándolos
  lexicon: HALOT
  rationale: El verbo literalmente significa 'añadir/aumentar'. En este contexto de sanción progresiva, 'seguiré trayendo' comunica la idea de una acción adicional y continuada. La forma verbal evita convertir el verbo en una mera repetición mecánica de 'golpear' sin perder la escalada del juicio.
- source_word: מַכָּ֔ה
  english_pob_choice: to strike you
  chosen_spanish: un golpe
  alternatives_spanish:
  - un azote
  - una herida
  - un castigo
  lexicon: HALOT
  rationale: El sustantivo puede abarcar golpe, azote o plaga. Dado que el audit trail inglés lo vertió verbalmente como 'to strike you', en español conviene sustantivarlo como 'un golpe' para conservar la fuerza física y punitiva sin especificar indebidamente una plaga concreta.
- source_word: שֶׁ֖בַע
  english_pob_choice: sevenfold
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete veces más
  - en siete pliegues
  - séptuplo
  lexicon: HALOT
  rationale: En español bíblico y claro, 'siete veces' expresa mejor la intensificación que el adverbial 'siete veces más' y evita un latinismo menos natural. El sentido de aumento punitivo queda preservado por el contexto.
- source_word: כְּ/חַטֹּאתֵי/כֶֽם
  english_pob_choice: according to your sins
  chosen_spanish: conforme a sus pecados
  alternatives_spanish:
  - según sus pecados
  - en proporción a sus pecados
  - por sus pecados
  lexicon: HALOT
  rationale: El prefijo כ aquí marca correspondencia/proporción. 'Conforme a sus pecados' preserva esa relación sin reducirla a causalidad simple. Se usa 'sus' para concordar con el tono general de destinatario plural y evitar una repetición excesiva de 'vuestros' en español moderno.
theological_decisions:
- issue: Naturaleza de la sanción del pacto
  english_pob_reading: Render the verse as an escalation of divine judgment proportionate to Israel's sins without specifying a particular mechanism beyond the text.
  chosen_spanish_reading: Presentar el versículo como una escalada del juicio divino, proporcionada a los pecados, sin concretar un mecanismo específico más allá del texto.
  alternative_spanish_readings:
  - Especificar el castigo como 'plaga'
  - 'Reducir la fórmula a una causalidad simple: ''por sus pecados'''
  rationale: Leviticus 26 belongs to the covenant sanctions section. The Spanish should preserve the warning of increased divine judgment, but not narrow מַכָּה to one mechanism such as 'plaga' unless the text itself demands it. 'Conforme a sus pecados' preserves the proportionality of the warning and keeps the sanction formula open within the Hebrew evidence.
  doctrine_reference: Levítico 26:14-39; pacto/sanciones del pacto
- issue: Relación de קֶרִי con la actitud humana hacia Yahvé
  english_pob_reading: In this chapter it conveys a stance of opposition rather than mere chance.
  chosen_spanish_reading: En esta sección comunica una postura de oposición u hostilidad hacia Yahvé, no mera casualidad.
  alternative_spanish_readings:
  - Entenderlo como 'azar' o 'casualidad'
  - Suavizarlo a una simple falta de atención
  rationale: El contexto repetido de Levítico 26 muestra que קֶרִי aquí no describe azar, sino una postura covenantal contraria. 'En oposición' mantiene esa tensión sin sustituirla por lenguaje tradicional que podría ocultar el matiz del hebreo.
  doctrine_reference: Levítico 26:21, 23, 27, 40; HALOT sobre קֶרִי
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la revisión más reciente, que no introdujo cambios; la versión española adopta las decisiones léxicas y teológicas ya estabilizadas, ajustándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma estándar del proyecto para el nombre divino cuando aparezca en el contexto; aquí el verso no lo nombra explícitamente, pero el 'me/mí' conserva la referencia de primera persona divina.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - '''Escucharme'' conserva la ambigüedad obediencia/oír del hebreo.'
  - '''Conforme a sus pecados'' preserva la proporcionalidad, no una causalidad simplificada.'
  - Se conserva el registro sobrio y de sanción pactual propio de Levítico 26.
