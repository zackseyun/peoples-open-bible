translation:
  language: es
  text: Entonces acércalos uno al otro para ti como un solo palo[a], para que lleguen a ser uno[b] en tu mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un solo palo». La expresión hebrea puede entenderse como resultado («en un solo palo») o como estado («como un solo palo»).
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y serán para unos en tu mano», un giro idiomático que expresa que llegan a ser uno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרַב
  english_pob_choice: Then bring ... near
  chosen_spanish: Entonces acércalos
  alternatives_spanish:
  - Y acércalos
  - Luego acércalos
  lexicon: HALOT
  rationale: El verbo expresa la acción ordenada de poner las piezas en proximidad. «Acércalos» comunica bien el imperativo causativo sin sobrecargar el texto.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - las
  lexicon: HALOT
  rationale: El pronombre directo se refiere a los dos palos; en español el objeto directo masculino plural es natural y transparente aquí.
- source_word: אֶחָד אֶל אֶחָד
  english_pob_choice: to each other
  chosen_spanish: uno al otro
  alternatives_spanish:
  - el uno al otro
  - uno con otro
  lexicon: HALOT
  rationale: La expresión hebrea es recíproca. «Uno al otro» conserva la relación mutua de manera idiomática en español.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para usted
  lexicon: HALOT
  rationale: El dativo señala la participación personal de Ezequiel en el acto simbólico. «Para ti» es suficiente y natural en español, sin añadir énfasis reflexivo no exigido por el hebreo.
- source_word: לְעֵץ אֶחָד
  english_pob_choice: as one stick
  chosen_spanish: como un solo palo
  alternatives_spanish:
  - como un solo bastón
  - como una sola pieza de madera
  lexicon: HALOT
  rationale: עֵץ aquí designa el objeto de madera usado como signo. «Palo» evita una lectura demasiado literaria de «árbol» y corresponde al objeto físico del pasaje; «como» sigue la revisión del POB inglés que prefirió el valor de estado más que el de resultado.
- source_word: וְהָיוּ
  english_pob_choice: so that they may become
  chosen_spanish: para que lleguen a ser
  alternatives_spanish:
  - y serán
  - y lleguen a ser
  lexicon: HALOT
  rationale: La forma verbal expresa resultado intencional en este mandato. «Para que lleguen a ser» comunica el propósito de la acción sin perder el matiz resultativo.
- source_word: לַאֲחָדִים
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un solo conjunto
  - unidos
  lexicon: HALOT
  rationale: El plural hebreo idiomático apunta a unidad. En español, «uno» mantiene la fuerza de la identidad unificada mejor que una paráfrasis explicativa.
- source_word: בְיָדֶךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tu mano misma
  lexicon: HALOT
  rationale: La imagen concreta del signo profético se conserva mejor con la formulación literal y clara «en tu mano».
theological_decisions:
- issue: Naturaleza del signo de unión de los dos palos
  english_pob_reading: Render the physical sign-act plainly as the sticks becoming one, without importing later theological or political interpretation into the verse itself.
  chosen_spanish_reading: 'Presentar el acto físico con claridad: dos palos que llegan a ser uno en la mano de Ezequiel, sin anticipar la interpretación histórica más amplia.'
  alternative_spanish_readings:
  - unirlos
  - fusionarlos
  rationale: El versículo describe el gesto profético; el contexto mayor explicará su significado. La traducción debe preservar la imagen concreta y no convertirla en una explicación interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión del POB en inglés cambió «into one stick» por «as one stick» para reflejar mejor לְעֵץ אֶחָד. Esta versión española sigue esa decisión con «como un solo palo», y mantiene el valor resultativo de וְהָיוּ mediante «para que lleguen a ser uno».
  spanish_consistency_notes:
  - Se usa «Yahvé» en todo el proyecto cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - Se conserva «palo» para el objeto de madera del signo, en línea con el contexto visual del pasaje.
  - Se mantiene «uno» para לַאֲחָדִים, preservando la unidad idiomática sin expandir el sentido interpretativo.
