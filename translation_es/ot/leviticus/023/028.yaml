revisions:
- from: No harán ningún trabajo en este mismo día[a], porque es un Día de Expiación, para hacer expiación por ustedes delante de Yahvé su Dios.
  to: No harán ningún trabajo en este mismo día[a], porque es un Día de Expiación, para hacer expiación por ustedes delante de Yahvé, su Dios.
  rationale: Se conserva casi todo el borrador porque es fiel al hebreo y al rastro de auditoría inglés. Solo se ajusta la puntuación en «Yahvé, su Dios» para que el español sea natural y claro, preservando la relación de pacto expresada por אֱלֹהֵיכֶם. No se requiere una revisión doctrinal adicional.
