review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del hebreo: causalidad por la abundancia de las iniquidades, comercio injusto, profanación de los santuarios, fuego que sale de en medio del destinatario, consumo por ese fuego, reducción a ceniza y juicio público ante los observadores. Sin embargo, omite dos notas del rastro inglés que conviene preservar: la alternativa para «comercio» y la nota sobre «fuego de en medio de ti». Además, «ese te consumió» no es la mejor solución para הִיא אֲכָלַתְךָ en español bíblico natural.'
  spanish_quality_summary: El español es mayormente claro y digno, pero hay pequeños ajustes para mayor naturalidad y fidelidad. «Ese te consumió» suena algo forzado e innecesariamente demostrativo; «este te consumió» tampoco sería ideal. Lo más natural es «este fuego te consumió» o simplemente «te consumió», pero dado que el hebreo explicita el referente con pronombre, «ese fuego te consumió» no es óptimo. También conviene alinear «ceniza» con el plural más idiomático «cenizas» en español, aunque el singular no es imposible. La puntuación con raya reproduce bien la progresión del juicio.
  glossary_alignment: 'No hay conflicto con los términos del proyecto. «Iniquidades», «santuarios», «profanaste» y «fuego» están bien encaminados. La principal cuestión es estilística y de preservación del aparato: deben mantenerse también las alternativas de «comercio» y la lectura de «de en medio de ti», como en el audit trail inglés.'
  issues:
  - severity: medium
    issue: Faltan dos notas significativas del audit trail inglés
    rationale: El inglés conserva alternativas para רְכֻלָּתְךָ («trade / trading / commerce») y para וָאוֹצִא אֵשׁ מִתּוֹכְךָ («from within you»). El borrador español solo conserva la nota sobre «santuarios», perdiendo parte de la justificación léxica y la ambigüedad preservada por POB.
  - severity: medium
    issue: «ese te consumió» suena poco natural y no representa bien la referencia al fuego
    rationale: 'Aunque busca reflejar el pronombre femenino הִיא, en español el demostrativo masculino «ese» para referirse a «fuego» resulta torpe. Una solución natural y fiel es explicitar el referente: «ese fuego te consumió» o mejor aún «este fuego te consumió» según deíxis; pero dado el contexto narrativo, «ese fuego te consumió» queda menos marcado que «ese te consumió».'
  - severity: low
    issue: «a ceniza» puede mejorarse a «a cenizas»
    rationale: El singular español es posible, pero la locución más idiomática y ampliamente comprensible es «reducir a cenizas», que además corresponde bien al inglés auditado «reduced you to ashes».
  revised_spanish_text: Por la abundancia de tus iniquidades, en la injusticia de tu comercio[a], profanaste tus santuarios[b]; por eso saqué fuego de en medio de ti[c]—ese fuego te consumió—, y te reduje a cenizas sobre la tierra, a la vista de todos los que te veían.
  revised_footnotes:
