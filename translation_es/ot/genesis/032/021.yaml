translation:
  language: es
  text: 'Y también dirán: “Mira, tu siervo Jacob viene detrás de nosotros”, porque dijo: “Apaciguaré[a] su rostro con el presente que va delante de mí, y después veré su rostro[b]; quizá me acepte”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "Apaciguaré su rostro"—el verbo está relacionado con el lenguaje de expiación, pero aquí se refiere a calmar a Esaú con un presente.'
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: "levantar mi rostro", es decir, "aceptarme" o "mostrarme favor".'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  lexicon: HALOT
  rationale: En este contexto Jacob habla con extrema deferencia ante Esaú. El POB inglés decidió 'your servant' por el registro de subordinación; en español, 'esclavo' conserva mejor la fuerza léxica de עבד que 'siervo', aunque suene más fuerte. Se mantiene la humildad diplomática sin suavizar indebidamente el término.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Miren
  lexicon: HALOT
  rationale: Es una partícula discursiva de atención. 'Mira' reproduce la inmediatez con español natural; 'He aquí' sería más tradicional pero más marcado estilísticamente.
- source_word: אַחֲרֵינוּ
  english_pob_choice: is behind us
  chosen_spanish: viene detrás de nosotros
  alternatives_spanish:
  - está detrás de nosotros
  - va detrás de nosotros
  lexicon: HALOT
  rationale: La frase indica posición relativa de los mensajeros respecto de Jacob y su grupo. 'Viene detrás de nosotros' comunica el movimiento/seguimiento de manera clara en español y conserva el sentido espacial de la expresión.
- source_word: אֲכַפְּרָה
  english_pob_choice: I will appease
  chosen_spanish: Apaciguaré
  alternatives_spanish:
  - haré expiación por
  - aquietaré
  - propiciaré
  lexicon: HALOT
  rationale: כפר aquí aparece en un marco interpersonal, no cultual. El POB inglés eligió 'appease' para evitar importar la teología sacrificial al texto principal; en español, 'apaciguar' transmite la idea de calmar/placar sin perder la relación con el campo semántico de expiación, que se explica en nota.
- source_word: פָנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - él
  - su presencia
  lexicon: HALOT
  rationale: Se conserva 'rostro' para mantener la repetición literaria de פנים y la imagen corporal/relacional del hebreo. 'Presencia' suavizaría la reiteración y perdería parte del juego verbal.
- source_word: מִנְחָה
  english_pob_choice: the gift
  chosen_spanish: el presente
  alternatives_spanish:
  - el regalo
  - la ofrenda
  - el tributo
  lexicon: HALOT
  rationale: En la narración se trata del obsequio conciliador enviado a Esaú. 'Presente' es un equivalente natural y digno en español; 'ofrenda' sonaría más cultual y 'tributo' más político de lo que requiere el contexto.
- source_word: הַהֹלֶכֶת לְפָנַי
  english_pob_choice: that is going ahead of me
  chosen_spanish: que va delante de mí
  alternatives_spanish:
  - que me precede
  - que va antes que yo
  lexicon: HALOT
  rationale: La cláusula participial describe el presente avanzando delante de Jacob. 'Va delante de mí' preserva la imagen direccional de forma natural y cercana al hebreo.
- source_word: אֶרְאֶה פָנָיו
  english_pob_choice: I will see his face
  chosen_spanish: veré su rostro
  alternatives_spanish:
  - veré su cara
  - lo veré
  - veré su presencia
  lexicon: HALOT
  rationale: Se mantiene la literalidad de 'rostro' para conservar la repetición de פנים en el versículo. Esto respeta la textura literaria del hebreo y prepara la lectura del giro idiomático final.
- source_word: יִשָּׂא פָנַי
  english_pob_choice: he will lift up my face
  chosen_spanish: me acepte
  alternatives_spanish:
  - levante mi rostro
  - me favorezca
  - me reciba favorablemente
  lexicon: HALOT
  rationale: Es un modismo hebreo de acogida favorable. El texto principal de español opta por 'me acepte', en línea con la revisión inglesa más natural ('accept me'), mientras la nota conserva el valor literal del hebreo.
- source_word: אוּלַי
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - a lo mejor
  lexicon: HALOT
  rationale: Expresa esperanza e incertidumbre. 'Quizá' es sobrio, moderno y plenamente adecuado al tono del pasaje.
theological_decisions:
- issue: כפר en contexto interpersonal versus cultual
  english_pob_reading: I will appease him
  chosen_spanish_reading: Apaciguaré
  alternative_spanish_readings:
  - haré expiación por él
  - lo propiciaré
  - aquietaré su enojo
  rationale: La forma verbal deriva de כפר, pero aquí Jacob habla de un presente para calmar a Esaú, no de un acto ritual de expiación. El español principal evita trasladar de manera automática la terminología sacrificial, aunque la nota permite ver la conexión léxica con expiación.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Idiomático final de 'levantar el rostro'
  english_pob_reading: perhaps he will accept me
  chosen_spanish_reading: quizá me acepte
  alternative_spanish_readings:
  - quizá levante mi rostro
  - quizá me favorezca
  - quizá me reciba
  rationale: El hebreo expresa una recepción favorable mediante un modismo de 'rostro'. El español principal usa una formulación natural y comunicativa, sin borrar el valor idiomático que se conserva en nota.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del POB inglés que prefirió expresiones más naturales en el discurso principal (''appease him'', ''accept me'') sin perder la transparencia del hebreo en los puntos donde la repetición de ''rostro''/''face'' es literariamente importante. El español sigue esa línea: naturaliza el verbo principal (''apaciguar'', ''acepte'') pero conserva ''rostro'' en las repeticiones clave para reflejar פנים.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' como convención del proyecto solo cuando correspondiera; este versículo no contiene el tetragrámaton.
  - Se mantuvo 'rostro' de forma consistente para פנים, evitando alternar con 'cara' o 'presencia' en el cuerpo del versículo.
  - '''Presente'' se empleó para מִנְחָה en su sentido narrativo de obsequio conciliador, no cultual.'
  - La puntuación y comillas siguen el estilo editorial español contemporáneo.
