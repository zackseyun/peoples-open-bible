translation:
  language: es
  text: Pues Amán hijo de Hamdatá, el agagueo, enemigo de todos los judíos, había tramado destruir a los judíos, y había echado Pur[a], es decir, la suerte, para aplastarlos[b] y para destruirlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conserva «Pur» como préstamo del hebreo/persa porque el texto mismo lo explica como «la suerte» y así se mantiene el vínculo con Purim en el contexto inmediato.
    reason: cultural_note
  - marker: b
    text: O «sumirlos en pánico», «confundirlos». El verbo también puede expresar la idea de causar tumulto o desconcierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón explicativa de la referencia contextual; en español, «Porque» conserva bien el valor causal/expositivo de כִּי en esta posición.
- source_word: הָמָן בֶּן הַמְּדָתָא הָאֲגָגִי
  english_pob_choice: Haman son of Hammedatha the Agagite
  chosen_spanish: Amán hijo de Hamdatá, el agagueo
  alternatives_spanish:
  - Amán hijo de Hamedata, el agagueo
  - Amán hijo de Hamdatá el agagueo
  lexicon: HALOT
  rationale: Los nombres propios se transliteran al español de forma legible. «Agagueo» conserva la designación étnica/dinástica del hebreo sin reemplazarla por una explicación no presente en el texto.
- source_word: צֹרֵר
  english_pob_choice: the enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - adversario
  - opresor
  - fiero enemigo
  lexicon: HALOT
  rationale: El participio funciona como designación caracterizadora de hostilidad; «enemigo» es natural y suficientemente fuerte en español, sin suavizar la fuerza del término.
- source_word: כָּל הַיְּהוּדִים
  english_pob_choice: all the Jews
  chosen_spanish: todos los judíos
  alternatives_spanish:
  - todos los judíos del reino
  - todo el pueblo judío
  lexicon: HALOT
  rationale: El hebreo es definido y total. «Todos los judíos» mantiene la amplitud y la referencia directa del original.
- source_word: חָשַׁב עַל
  english_pob_choice: had plotted against
  chosen_spanish: había tramado contra
  alternatives_spanish:
  - había planeado contra
  - había urdido contra
  lexicon: HALOT
  rationale: La construcción expresa un designio hostil, no mero pensamiento. «Tramado contra» comunica mejor la intención maliciosa y el matiz de conspiración.
- source_word: לְאַבְּדָם
  english_pob_choice: to destroy them
  chosen_spanish: destruirlos
  alternatives_spanish:
  - aniquilarlos
  - hacerlos perecer
  lexicon: HALOT
  rationale: «Destruir» reproduce con fidelidad la fuerza de אבד en este contexto de exterminio intencional y es idiomático en español.
- source_word: וְהִפִּיל פּוּר
  english_pob_choice: and had cast Pur
  chosen_spanish: y había echado Pur
  alternatives_spanish:
  - y había echado el Pur
  - y había lanzado Pur
  lexicon: HALOT
  rationale: Se conserva el préstamo «Pur» por su importancia en la conexión con Purim, siguiendo la decisión auditada de mantener el término propio.
- source_word: הוּא הַגּוֹרָל
  english_pob_choice: that is, the lot
  chosen_spanish: es decir, la suerte
  alternatives_spanish:
  - o sea, la suerte
  - esto es, el sorteo
  lexicon: HALOT
  rationale: «Suerte» comunica en español el valor de גורל como resultado echado por sorteo. Se mantiene la glosa explicativa appositiva de la fuente; «suerte» también deja visible la tensión con el término técnico de sorteo.
- source_word: לְהֻמָּם
  english_pob_choice: to crush them
  chosen_spanish: aplastarlos
  alternatives_spanish:
  - abatirlos
  - derribarlos
  - destrozarlos
  lexicon: HALOT
  rationale: La revisión inglesa favorece una fuerza más física que «confundir». «Aplastarlos» conserva el sentido de violencia y derrota sin introducir una paráfrasis excesiva.
- source_word: וּלְאַבְּדָם
  english_pob_choice: and to destroy them
  chosen_spanish: y para destruirlos
  alternatives_spanish:
  - y destruirlos
  - y aniquilarlos
  lexicon: HALOT
  rationale: Se conserva la repetición del objetivo final de exterminio. La preposición «para» refleja bien la finalidad y mantiene el paralelismo con el hebreo.
translation_notes:
  revision_awareness: La versión sigue la decisión revisada del audit trail inglés de traducir לְהֻמָּם con una imagen de fuerza física («aplastarlos») en lugar de la lectura más débil «confundirlos». También respeta la conservación de Pur con glosa explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene la transliteración de nombres propios en forma naturalizada para lectores hispanohablantes.
  - «Suerte» se eligió para la glosa de גורל por ser comprensible y por conservar la relación conceptual con un sorteo ritual/providencial.
