review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo y del POB inglés: Yahvé, Moisés, la orden a Faraón, el endurecimiento del corazón y el propósito de poner las señales. Sin embargo, hay dos desajustes importantes: «Entra a Faraón» suena impropio en español para בֹּא אֶל־פַּרְעֹה y no expresa bien la idea de ir a su presencia; y «para que ponga» introduce ambigüedad de sujeto, cuando el hebreo y el POB inglés expresan claramente «para que yo ponga». Además, el inglés auditado optó por el sentido contextual «among them», mientras el borrador principal vuelve a la literalidad singular «en medio de él»; esa opción puede sostenerse solo como alternativa en nota, no como texto principal si se quiere seguir el audit trail.'
  spanish_quality_summary: 'La legibilidad general es buena, pero hay problemas de naturalidad y corrección: «Entra a Faraón» es poco idiomático; «estas mis señales» resulta algo forzado en español moderno; la nota a contiene el error tipográfico «idiomaa». También conviene hacer explícito el sujeto en «para que yo ponga» para evitar que parezca que Faraón pone las señales.'
  glossary_alignment: 'Se alinea bien con la terminología del proyecto en «Yahvé», «corazón» y «siervos». «He endurecido» preserva correctamente la decisión teológica principal, con la alternativa literal en nota. El único punto de alineación deficiente con el audit trail es בְּקִרְבּוֹ: el texto principal debería seguir la decisión contextual «entre ellos / en medio de ellos», dejando «en su medio» en nota como alternativa literal.'
  issues:
  - severity: high
    issue: «Entra a Faraón» no es una formulación española natural ni suficientemente fiel a בֹּא אֶל־פַּרְעֹה.
    rationale: El hebreo expresa ir/entrar a la presencia de Faraón. En español bíblico y general se entiende mejor «Ve a Faraón» o «Entra ante Faraón». La forma actual suena como movimiento físico 'dentro de' una persona.
  - severity: high
    issue: «para que ponga» deja ambiguo el sujeto y debilita la sintaxis del propósito.
    rationale: 'שִׁתִי es primera persona singular: «para que yo ponga». Sin el pronombre, el lector puede leer que el sujeto es Faraón o Moisés.'
  - severity: medium
    issue: El texto principal usa «en medio de él» donde el POB inglés decidió contextualmente «among them».
    rationale: La ambigüedad singular debe preservarse en nota, pero el texto principal auditado entiende que las señales se muestran en el ámbito de Faraón y sus siervos. «Entre ellos» o «en medio de ellos» comunica mejor el sentido contextual.
  - severity: low
    issue: «estas mis señales» es comprensible pero algo rígido para el español moderno.
    rationale: «Estas señales mías» o simplemente «estas señales mías» preserva posesión y deixis con mejor fluidez.
  - severity: low
    issue: 'La nota [a] contiene un error tipográfico: «idiomaa».'
    rationale: Debe corregirse a «idioma» o mejor «modismo»/«expresión idiomática».
  revised_spanish_text: 'Entonces Yahvé dijo a Moisés[a]: «Ve a Faraón, porque yo he endurecido su corazón y el corazón de sus siervos[b], para que yo ponga estas señales mías entre ellos».

    '
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «he hecho pesado su corazón». Esta expresión idiomática indica que Yahvé endureció o volvió insensible a Faraón.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «en su medio». Puede referirse específicamente a Faraón, o a Faraón junto con sus siervos o su corte.'
    reason: alternative_reading
  revision_rationale: Se revisa la orden a una formulación española natural («Ve a Faraón»), se hace explícito el sujeto de propósito («yo ponga»), y se alinea el texto principal con la decisión contextual del POB inglés para בְּקִרְבּוֹ («entre ellos»), preservando la literalidad singular en nota. También se mejora la fluidez de «estas señales mías» y se corrige la nota con el error tipográfico.
