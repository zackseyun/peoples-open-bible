translation:
  text: Let your thoughts be with the discerning, and let all your speech be in the law of the Most High.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Cairo Geniza Hebrew at this verse reads instead: ''Do not envy a successful arrogant man; remember that until death he will not go unpunished.'' The Hebrew witness here appears to reflect a different or displaced line, so the Greek was followed for the main text.'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ μετὰ συνετῶν
  chosen: with the discerning
  alternatives:
  - with wise men
  - among the prudent
  lexicon: LSJ
  rationale: The Hebrew witness in Zone 1 is marked major_mismatch against the Greek parallel and appears to reflect a different line; for this verse the Greek provides the coherent wording aligned with the verse reference. συνετῶν denotes people of understanding or discernment; 'the discerning' is natural modern English and preserves the adjectival force without over-specifying gender.
- source_word: ἔστω ὁ διαλογισμός σου
  chosen: let your thoughts be
  alternatives:
  - let your reflection be
  - let your deliberation be
  lexicon: LSJ
  rationale: διαλογισμός can mean thought, reflection, or reasoning. 'Thoughts' is the most readable rendering here, while 'let ... be' preserves the imperative force of ἔστω.
- source_word: πᾶσα διήγησίς σου
  chosen: all your speech
  alternatives:
  - all your discourse
  - every conversation of yours
  lexicon: LSJ
  rationale: διήγησις can denote discourse, narration, or conversation. In this wisdom context, 'speech' is broad and idiomatic, covering what one says generally without sounding technical.
- source_word: ἐν νόμῳ Ὑψίστου
  chosen: in the law of the Most High
  alternatives:
  - according to the law of the Most High
  - within the law of the Most High
  lexicon: LSJ
  rationale: A fairly direct rendering best preserves the source. 'Most High' is the standard translation of Ὑψίστου as a divine title. 'In the law' reflects the Greek preposition and the wisdom emphasis that one's speech should be shaped by divine instruction.
