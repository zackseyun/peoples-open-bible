translation:
  language: es
  text: Y tú[a], tú mismo, soltarás tu heredad que yo te di, y haré que sirvas a tus enemigos en una tierra que no has conocido; porque ustedes han encendido un fuego en mi ira[c][b]; arderá para siempre[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «soltarás / dejarás ir tu heredad»; el verbo hebreo lleva la imagen de soltar o renunciar a ella.
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa del singular («tú») al plural («ustedes») en «ustedes han encendido», probablemente al pasar de Judá personificada al pueblo como conjunto.
    reason: alternative_reading
  - marker: c
    text: O «en mi furor». Literalmente, «en mi nariz / fosa nasal», un modismo hebreo para la ira.
    reason: lexical_alternative
  - marker: d
    text: O «por una era» / «perpetuamente»; עוֹלָם puede indicar duración prolongada o indefinida según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַטְתָּה
  english_pob_choice: you yourself will let go
  chosen_spanish: soltarás
  alternatives_spanish:
  - dejarás ir
  - cederás
  - abandonarás
  lexicon: HALOT
  rationale: שׁמט expresa la idea de soltar, dejar caer o dejar ir. En español, «soltar» conserva la imagen concreta sin volverse demasiado interpretativo; en este contexto judicial comunica bien la pérdida o renuncia forzada de la heredad.
- source_word: וּבְךָ
  english_pob_choice: you yourself
  chosen_spanish: incluso por ti mismo
  alternatives_spanish:
  - tú mismo
  - por ti mismo
  - incluso tú
  lexicon: HALOT
  rationale: La expresión es idiomática y de valor enfático. «Incluso por ti mismo» reproduce la intensificación sin forzar una sintaxis extraña en español; mantiene el énfasis del hebreo que recae sobre la persona dirigida.
- source_word: מִנַּחֲלָתְךָ
  english_pob_choice: of your inheritance
  chosen_spanish: tu heredad
  alternatives_spanish:
  - tu herencia
  - tu posesión heredada
  - tu patrimonio
  lexicon: HALOT
  rationale: נחלה puede referir a herencia, porción heredada o posesión asignada. En Jeremías, el término tiene carga territorial y pactal; «heredad» comunica bien esa realidad bíblica en español sin perder el matiz de posesión recibida de Dios.
- source_word: נָתַתִּי לָךְ
  english_pob_choice: that I gave you
  chosen_spanish: que yo te di
  alternatives_spanish:
  - que yo te entregué
  - que yo te concedí
  - que yo te asigné
  lexicon: HALOT
  rationale: נתן se traduce de manera directa y natural como «dar». La forma simple mantiene la claridad y la relación de don divino implicada en el texto.
- source_word: וְהַעֲבַדְתִּיךָ
  english_pob_choice: I will make you serve
  chosen_spanish: haré que sirvas
  alternatives_spanish:
  - te haré servir
  - te obligaré a servir
  - te haré esclavo para servir
  lexicon: HALOT
  rationale: 'El hifil de עבד es causativo: «hacer servir». «Haré que sirvas» conserva esa causatividad de manera idiomática en español y evita añadir una dureza no explícita en la forma verbal.'
- source_word: אֶת אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: a tus enemigos
  alternatives_spanish:
  - a tus adversarios
  - a quienes te odian
  lexicon: HALOT
  rationale: El objeto directo del verbo causativo son los enemigos. «A tus enemigos» es la equivalencia más directa y natural.
- source_word: בָּאָרֶץ אֲשֶׁר לֹא יָדָעְתָּ
  english_pob_choice: in a land that you have not known
  chosen_spanish: en una tierra que no has conocido
  alternatives_spanish:
  - en una tierra que no conoces
  - en una tierra desconocida para ti
  lexicon: HALOT
  rationale: ידע aquí tiene sentido de conocimiento experiencial o familiaridad. La frase española reproduce bien la extrañeza de una tierra ajena sin añadir explicaciones.
- source_word: אֵשׁ קְדַחְתֶּם
  english_pob_choice: you have kindled a fire
  chosen_spanish: han encendido un fuego
  alternatives_spanish:
  - han prendido un fuego
  - han avivado un fuego
  - han encendido el fuego
  lexicon: HALOT
  rationale: קדח significa encender o prender fuego. «Han encendido un fuego» conserva la metáfora y permite reflejar el cambio a plural documentado en el hebreo, sin resolverlo artificialmente en singular.
- source_word: בְּאַפִּי
  english_pob_choice: in my anger
  chosen_spanish: en mi ira
  alternatives_spanish:
  - en mi furor
  - en mi enojo
  - en mi nariz
  lexicon: HALOT
  rationale: אַף es literalmente nariz/nostril, pero como modismo denota ira. «En mi ira» es la forma española más natural y fiel al sentido idiomático; la tensión literal queda documentada en la nota.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - para un tiempo indefinido
  - por la eternidad
  lexicon: HALOT
  rationale: עוֹלָם puede expresar duración indefinida o permanente según el contexto. En lenguaje profético de juicio, «para siempre» es la opción más clara y natural en español.
- source_word: תּוּקָד
  english_pob_choice: it will burn
  chosen_spanish: arderá
  alternatives_spanish:
  - seguirá ardiendo
  - será encendido
  - quemará
  lexicon: HALOT
  rationale: La forma verbal remite al fuego en estado continuado o resultante. «Arderá» ofrece un español sobrio y directo, conservando la idea de un fuego que continúa su efecto.
theological_decisions:
- issue: Cambio de segunda persona singular a plural en la acusación final
  english_pob_reading: Retain singular address in the first clauses and plural in 'you have kindled' without smoothing the shift away.
  chosen_spanish_reading: Mantener la dirección singular en la primera parte y reflejar el plural en «han encendido».
  alternative_spanish_readings:
  - Uniformar todo en singular
  - Suavizar el plural como un singular colectivo
  rationale: El hebreo pasa deliberadamente del singular al plural, probablemente de Judá personificada al pueblo en conjunto. Mantener ese cambio preserva la retórica profética y evita borrar una tensión textual real.
  doctrine_reference: Conservar la tensión textual y retórica sin armonización artificial.
- issue: Sentido de עַד עוֹלָם en contexto de juicio
  english_pob_reading: Render as 'forever' in the main text.
  chosen_spanish_reading: Traducirlo como «para siempre».
  alternative_spanish_readings:
  - por un siglo
  - por largo tiempo
  - de manera perpetua
  rationale: En este contexto, la expresión comunica duración continua o indefinida del castigo. «Para siempre» es la forma más natural en español y respeta la fuerza profética del juicio.
  doctrine_reference: Mantener la amplitud semántica de עוֹלָם según el contexto.
translation_notes:
  revision_awareness: 'La redacción española sigue el último pase de revisión del inglés POB: se conserva el énfasis inicial de «you, even by yourself» mediante «incluso por ti mismo», se mantiene «let go» con un verbo concreto y se adopta una puntuación formal con punto y coma antes de la cláusula final. También se preserva la distinción entre singular inicial y plural en la acusación final.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton; la referencia a la ira divina se traduce directamente como «mi ira».
  - Se usa «heredad» para mantener el valor pactal y territorial de נחלה en Jeremías.
  - Se conserva el cambio singular/plural del hebreo en la última acusación, aun cuando el español podría suavizarlo, porque es parte de la carga retórica del texto.
  - Se prefirió «para siempre» sobre fórmulas más técnicas para no debilitar la sentencia profética.
  - La frase «han encendido» se deja en plural para reflejar la observación del audit trail sobre el cambio de persona.
