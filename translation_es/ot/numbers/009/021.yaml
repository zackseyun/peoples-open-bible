revisions:
- from: Y a veces la nube estaba desde la tarde hasta la mañana; cuando la nube era levantada en la mañana[a], ellos se ponían en marcha. O si era de día y de noche, cuando la nube era levantada, ellos se ponían en marcha.
  to: Y a veces la nube estaba desde la tarde hasta la mañana; cuando la nube se alzaba por la mañana[a], ellos se ponían en marcha. O si era de día y de noche, cuando la nube se alzaba, ellos se ponían en marcha.
  rationale: Se ajustó la expresión de עלה a una forma española más natural («se alzaba») sin perder la función señalizadora destacada por la POB, y se refinó «en la mañana» a «por la mañana» para mejorar la idiomaticidad. El resto del versículo puede mantenerse.
