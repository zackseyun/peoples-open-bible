  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ζηνᾶν τὸν νομικὸν καὶ ⸀Ἀπολλῶν σπουδαίως πρόπεμψον, ἵνα μηδὲν αὐτοῖς λείπῃ.
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/013.yaml
  text: Diligently send Zenas the lawyer and Apollos on their way[a], so that they may lack nothing.
  footnotes:
  - marker: a
    text: Or 'help Zenas the lawyer and Apollos on their journey diligently.' The verb can imply providing practical support for travel, not merely sending them away.
    reason: lexical_alternative
translation:
  language: ko
  text: 율법사 세나와 아볼로의 여정을 힘써 도와 보내십시오[a]. 그들에게 부족한 것이 하나도 없게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「율법사 세나와 아볼로의 여정을 부지런히 도우십시오」. 헬라어 동사는 단순히 떠나보내는 것이 아니라 여행에 필요한 실질적 도움을 함의할 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζηνᾶν τὸν νομικὸν
  english_pob_choice: Zenas the lawyer
  chosen_korean: 율법사 세나
  alternatives_korean:
  - 변호사 세나
  - 법학자 세나
  lexicon: BDAG
  rationale: νομικός는 「율법(법)의 전문가」. 유대적·헬레니즘적 어감 양립이 가능하며, 한국 교회 전통의 「율법사」가 정립된 등가어. 세나는 글로서리 기본값.
- source_word: Ἀπολλῶν
  english_pob_choice: Apollos
  chosen_korean: 아볼로
  alternatives_korean:
  - 아폴로스
  lexicon: BDAG
  rationale: 글로서리 기본값.
- source_word: σπουδαίως πρόπεμψον
  english_pob_choice: Diligently send ... on their way
  chosen_korean: 여정을 힘써 도와 보내십시오
  alternatives_korean:
  - 부지런히 그 여정을 도우십시오
  - 부족함 없이 보내십시오
  lexicon: BDAG
  rationale: προπέμπω는 단순한 「배웅」이 아니라 「여행 길에 필요한 것을 갖춰 보내다」의 어감을 가진다. 「여정을 도와 보내다」가 그 실질적 지원의 의미를 살린다.
- source_word: ἵνα μηδὲν αὐτοῖς λείπῃ
  english_pob_choice: so that they may lack nothing
  chosen_korean: 그들에게 부족한 것이 하나도 없게
  alternatives_korean:
  - 그들에게 모자란 것이 없도록
  - 그들이 아무것도 부족하지 않도록
  lexicon: BDAG
  rationale: 자연스러운 한국어 「부족한 것이 하나도 없다」.
