translation:
  language: es
  text: Y Matanías hijo de Mica[a], hijo de Zabdi, hijo de Asaf, era el principal, quien comenzaba la acción de gracias en oración; y Bakbucías era el segundo entre sus hermanos; y Abda hijo de Samúa, hijo de Galal, hijo de Jedutún.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'daba gracias en oración'; el hebreo puede entenderse más literalmente como 'cabeza del comienzo, dando gracias en oración', indicando que Matanías presidía o iniciaba la acción de gracias.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ
  english_pob_choice: head
  chosen_spanish: jefe
  alternatives_spanish:
  - cabeza
  - principal
  - líder
  lexicon: HALOT
  rationale: En una lista de cargos o funciones, רֹאשׁ indica una posición de primacía o liderazgo. En español, 'jefe' transmite esa función de manera natural y mantiene el valor relacional del hebreo sin volverlo demasiado abstracto.
- source_word: הַתְּחִלָּה
  english_pob_choice: the one who began
  chosen_spanish: quien iniciaba
  alternatives_spanish:
  - el que comenzaba
  - el iniciador
  - el primero
  lexicon: HALOT
  rationale: El sustantivo 'comienzo' funciona aquí ligado al rol de Matanías. En español, una forma verbal como 'quien iniciaba' preserva la idea de iniciativa o comienzo sin forzar una expresión nominal poco natural.
- source_word: יְהוֹדֶה
  english_pob_choice: began the thanksgiving
  chosen_spanish: iniciaba la acción de gracias
  alternatives_spanish:
  - daba gracias
  - ofrecía acción de gracias
  - alzaba la alabanza
  lexicon: HALOT
  rationale: El verbo en hifil, en contexto litúrgico, apunta a dar gracias o ofrecer acción de gracias. Se eligió 'acción de gracias' para conservar el sustantivo culto presente en el campo semántico del hebreo y del audit trail inglés, evitando reducirlo solo a 'daba gracias'.
- source_word: לַתְּפִלָּה
  english_pob_choice: in prayer
  chosen_spanish: en oración
  alternatives_spanish:
  - para la oración
  - durante la oración
  - al orar
  lexicon: HALOT
  rationale: La preposición ל expresa aquí la esfera u ocasión de la acción. 'En oración' es la forma más natural en español y preserva el marco litúrgico señalado por el inglés POB.
- source_word: מִשְׁנֶה
  english_pob_choice: second
  chosen_spanish: el segundo
  alternatives_spanish:
  - segundo en rango
  - el sustituto
  - el adjunto
  lexicon: HALOT
  rationale: מִשְׁנֶה denota una posición secundaria. 'El segundo' es breve, exacto y apropiado en un listado nominal, sin introducir una función administrativa no explicitada por el texto.
- source_word: מֵאֶחָיו
  english_pob_choice: among his brothers
  chosen_spanish: entre sus hermanos
  alternatives_spanish:
  - entre sus parientes
  - entre sus compañeros
  - entre sus hermanos de clan
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente 'de/entre sus hermanos'. 'Entre sus hermanos' conserva la expresión relacional y evita expandirla a un grupo específico que el texto no nombra.
- source_word: יְדִיתוּן
  english_pob_choice: Jeduthun
  chosen_spanish: Jedutún
  alternatives_spanish:
  - Jedutún
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma estándar para español bíblico. 'Jedutún' mantiene cercanía fonética y lectura natural en español, en continuidad con la práctica de transliterar nombres personales.
theological_decisions:
- issue: Sentido de ידה en contexto de culto
  english_pob_reading: thanksgiving/praise rather than confession
  chosen_spanish_reading: acción de gracias más que confesión
  alternative_spanish_readings:
  - alabanza
  - confesión
  - dar gracias
  rationale: El contexto levítico y la coordinación con 'Asaf' favorecen el sentido de agradecer/celebrar. 'Acción de gracias' preserva la tensión lexical de ידה sin convertirla en una sola paráfrasis devocional. La lectura de 'confesión' queda menos probable en este pasaje.
  doctrine_reference: Salmo 100:4; 1 Crónicas 16:4-7
translation_notes:
  revision_awareness: Se siguió el audit trail inglés, especialmente la decisión de mantener la doble idea de liderazgo e inicio litúrgico. La revisión inglesa eliminó una formulación innecesariamente pesada ('the one') sin cambiar el contenido; en español se optó por una sintaxis igualmente fluida y formal, conservando el matiz de iniciación del agradecimiento.
  spanish_consistency_notes:
  - Se usó 'acción de gracias' para reflejar el valor litúrgico de ידה, evitando reducirlo solo a 'confesión'.
  - Se transliteraron los nombres propios de manera uniforme y se mantuvo 'Jedutún' como forma estándar en español.
  - '''Entre sus hermanos'' conserva la relación grupal sin añadir una identificación no explícita en el hebreo.'
  - La nota al pie marca la alternativa lexical principal sin duplicar marcadores.
