translation:
  language: es
  text: ¡Oh, madre[a] de muchos hijos y de hijos hermosos, yo, mujer viuda y sola, muy doliente[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «madre de muchos hijos» expresa el sentido de πολύπαις, literalmente ‘con muchos hijos’, en español natural.
    reason: lexical_alternative
  - marker: b
    text: «muy doliente» procura conservar el sentido intensivo de πολύθρηνος; también podría traducirse «muy afligida» o «llena de lamento».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ
  english_pob_choice: O / Alas for me
  chosen_spanish: ¡Oh!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ah!
  lexicon: LSJ
  rationale: El griego introduce una exclamación/lamento; en español, «¡Oh!» conserva la interjección directa sin añadir interpretación excesiva. «¡Ay!» sería más explícitamente lamentoso, pero ya se expresa el tono doliente con el adjetivo final.
- source_word: πολύπαις
  english_pob_choice: the mother of many
  chosen_spanish: madre de muchos
  alternatives_spanish:
  - madre de muchos hijos
  - madre numerosa
  lexicon: LSJ
  rationale: El compuesto indica literalmente tener muchos hijos. En español, «madre de muchos» reproduce el valor del compuesto con naturalidad y mantiene la autoidentificación materna implícita.
- source_word: καλλίπαις
  english_pob_choice: of beautiful children
  chosen_spanish: de hijos hermosos
  alternatives_spanish:
  - de hijos bellos
  - de hijos excelentes
  - de hijos nobles
  lexicon: LSJ
  rationale: El adjetivo puede apuntar a belleza o excelencia. Dado que el texto griego en este punto usa una formulación elogiosa, «hermosos» conserva el sentido más directo sin imponer «nobles», que sería más interpretativo.
- source_word: γυνή
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  - señora
  lexicon: BDAG/LSJ
  rationale: Aquí λειτουργa como autoidentificación en aposición y coordina con el lamento personal. «Mujer» es el equivalente más directo y preserva el tono del original.
- source_word: χήρα
  english_pob_choice: a widow
  chosen_spanish: viuda
  alternatives_spanish:
  - una viuda
  lexicon: BDAG/LSJ
  rationale: El sustantivo indica claramente el estado civil tras la muerte del esposo. En español, «viuda» integra naturalmente la construcción nominal.
- source_word: μόνη
  english_pob_choice: alone
  chosen_spanish: sola
  alternatives_spanish:
  - solitaria
  - abandonada
  lexicon: BDAG/LSJ
  rationale: El término subraya aislamiento. «Sola» es la opción más breve y fiel; «abandonada» añadiría una inferencia no obligada por el griego.
- source_word: πολύθρηνος
  english_pob_choice: much-lamenting
  chosen_spanish: muy doliente
  alternatives_spanish:
  - muy afligida
  - muy llorosa
  - llena de lamento
  lexicon: LSJ
  rationale: El adjetivo expresa abundancia de lamento/duelo. «Muy doliente» mantiene el carácter intensivo y funciona bien en español literario; evita convertirlo en pasivo («muy llorada») o en una paráfrasis más larga.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se optó por una interjección breve equivalente a ὦ, se preservaron todos los rasgos descriptivos del griego y se evitó introducir una lectura interpretativa como «nobles» donde el griego permite también la belleza/excelencia.'
  spanish_consistency_notes:
  - Se mantiene «viuda» para χήρα y «sola» para μόνη, distinguiendo estado civil de aislamiento.
  - Se tradujo πολύθρηνος con un adjetivo intensivo en lugar de una paráfrasis verbal para conservar la concisión del original.
  - Se evitó el uso de «Cristo», «Señor» u այլ terminología no presente en este versículo.
  - La puntuación exclamativa intenta reproducir el tono de lamento del griego inicial sin sobreinterpretarlo.
