  rationale: Se reubicó la nota al sintagma correcto para que corresponda a אִיִּים רַבִּים, se ajustó la fórmula divina a «el Señor Yahvé» para reflejar mejor אֲדֹנָי יְהוִה y la terminología del proyecto, y se sustituyó «hacia» por «a» para un español más natural sin alterar el sentido.
