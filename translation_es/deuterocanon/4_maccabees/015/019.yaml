translation:
  language: es
  text: Ni siquiera cuando un tercer hijo estaba exhalando su último aliento lloraste, al ver los ojos de cada uno, como toros[b], mirando los suplicios y el mismo tormento, y sus fosas nasales anunciando la muerte[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 'El griego sugiere una comparación con toros: una mirada feroz, firme y resuelta ante el suplicio.'
    reason: cultural_note
  - marker: c
    text: Lit. «sus narices/fosas nasales anunciando la muerte». La imagen corporal es vívida y puede aludir al modo visible de respirar al final de la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ τρίτος ἀποψύχων
  english_pob_choice: Nor, as a third son was breathing his last
  chosen_spanish: Ni siquiera cuando un tercero estaba exhalando su último aliento
  alternatives_spanish:
  - Ni siquiera, con un tercero muriendo,
  - Ni siquiera cuando moría un tercero
  lexicon: LSJ
  rationale: ἀποψύχω expresa expirar o exhalar la vida. En español, «exhalando su último aliento» conserva el valor de agonía final con naturalidad. Se deja implícito el sustantivo del contexto, como en el griego elíptico.
- source_word: θεωροῦσα
  english_pob_choice: when you saw
  chosen_spanish: al ver
  alternatives_spanish:
  - mientras veías
  - contemplando
  lexicon: LSJ
  rationale: El participio describe la acción de observar. «Al ver» encaja bien en la pregunta retórica y evita una formulación demasiado literal en español.
- source_word: ταυρηδὸν
  english_pob_choice: bull-like
  chosen_spanish: toros[b]
  alternatives_spanish:
  - como toros
  - toroídamente
  lexicon: LSJ
  rationale: El adverbio griego es un símil fuerte y compacto. «Toros» en aposición con la nota mantiene la imagen de vigor feroz; en español fluido, «como toros» sería la opción más natural, pero se opta por un anclaje breve para preservar la fuerza del original y la decisión auditada del POB inglés.
- source_word: ἐπὶ τῶν βασάνων ὁρῶντας
  english_pob_choice: looking upon the tortures
  chosen_spanish: mirando los suplicios
  alternatives_spanish:
  - contemplando los tormentos
  - mirando las torturas
  lexicon: LSJ
  rationale: βάσανοι puede referirse a torturas, tormentos o suplicios. «Suplicios» mantiene el registro culto y el sentido de castigo cruel, sin sobrecargar el español con un tecnicismo forense.
- source_word: τὸν αὐτὸν αἰκισμόν
  english_pob_choice: the same torment
  chosen_spanish: el mismo tormento
  alternatives_spanish:
  - el mismo suplicio
  - el mismo maltrato
  lexicon: LSJ
  rationale: αἰκισμός denota maltrato cruel o tortura. «Tormento» comunica bien la repetición del mismo sufrimiento sobre cada uno, y corresponde al valor ya discernido en el audit trail inglés.
- source_word: τοὺς μυκτῆρας προσημειουμένους αὐτῶν τὸν θάνατον
  english_pob_choice: their nostrils foretelling death
  chosen_spanish: sus narices anunciando la muerte[c]
  alternatives_spanish:
  - sus narices presagiando la muerte
  - sus fosas nasales anunciando la muerte
  lexicon: LSJ
  rationale: μυκτῆρες puede significar narices o fosas nasales; προσημειόω es indicar de antemano, anunciar o presagiar. Se mantiene la imagen corporal abrupta del griego con «narices», como hizo el inglés con «nostrils», porque es una figura vívida y no conviene suavizarla.
- source_word: οὐκ ἔκλαυσας
  english_pob_choice: did you weep
  chosen_spanish: ¿no lloraste?
  alternatives_spanish:
  - ¿no lloraste tú?
  - ¿no sollozaste?
  lexicon: LSJ
  rationale: κλαίω es llorar o llorar con llanto. «¿No lloraste?» reproduce con claridad la pregunta retórica y su tono de reproche.
theological_decisions:
- issue: Supresión/expansión del sujeto elíptico en el inicio
  english_pob_reading: Supplied 'son' in English ('as a third son was breathing his last')
  chosen_spanish_reading: Se deja el sujeto implícito en español ('un tercero') dentro del contexto de los hijos
  alternative_spanish_readings:
  - un tercer hijo
  - el tercero
  rationale: El griego es elíptico, y el contexto inmediato ya trata de los hijos de la madre. En español, la elipsis se puede conservar sin perder inteligibilidad; por eso no se introduce «hijo» en el texto principal, aunque sigue siendo una lectura contextual válida.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de la imagen de ταυρηδόν aplicada a los ojos
  english_pob_reading: The expression 'like bulls' likely describes the fierce, steadfast way the sons looked at the tortures before them.
  chosen_spanish_reading: Se aplica la imagen a los ojos/ la mirada de los hijos con el matiz de firmeza feroz
  alternative_spanish_readings:
  - aplicarla a su comportamiento general
  - traducirla como 'como toros' sin más
  rationale: La estructura griega sitúa el símil junto a la visión de los ojos; por eso se conserva ligado a la mirada. En español, «toros» sin comparativo sería menos natural, pero la nota preserva la equivalencia semántica con la solución inglesa auditada.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: He seguido la última revisión inglesa al mantener la imagen bull-like y el verbo que expresa anuncio previo de la muerte, pero he adaptado la sintaxis al español para que suene publicable. También he conservado la elipsis inicial propia del griego, sin forzar una expansión innecesaria en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se ha preferido «suplicios/tormento» para mantener el campo semántico de βάσανοι y αἰκισμός sin repetir exactamente la misma palabra en exceso.
  - Se conserva la imagen corporal cruda de «narices» para reflejar la audacia del griego y del POB inglés, sin domesticarla a una paráfrasis menos concreta.
  - El tono se mantiene como pregunta retórica directa, acorde con la acusación implícita del contexto.
