translation:
  language: es
  text: Los hijos de Páhat-Moab[a], de los hijos de Jesúa y de Joab[b], dos mil ochocientos dos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego transmite Φθαλεμωάβ; la tradición paralela hebrea suele leer Pahath-moab.
    reason: textual_variant
  - marker: b
    text: El griego dice «Jeshua y Roboab»; el paralelo de Esdras/Nehemías suele alinearse con «Jeshua y Joab». Como 1 Esdras a menudo reordena o remodela su material fuente, la forma griega sigue siendo significativa aunque el paralelo difiera.
    reason: textual_variant
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: LSJ
  rationale: En una lista genealógica o censal, υἱοὶ funciona como designación de linaje. «Los hijos de» conserva la estructura formal del griego y su tono de registro, sin añadir interpretación.
- source_word: Φθαλεμωάβ
  english_pob_choice: Phath-moab
  chosen_spanish: Páhat-Moab
  alternatives_spanish:
  - Pahat-Moab
  - Phath-moab
  lexicon: LSJ
  rationale: El testimonio griego es primario aquí, pero la tradición paralela hebrea/mesiánica asocia este nombre con Pahath-moab. En español se conserva la forma cercana al valor reconocido en la tradición paralela, ajustada a una transliteración legible y sin borrar la tensión textual documentada.
- source_word: εἰς
  english_pob_choice: of
  chosen_spanish: entre
  alternatives_spanish:
  - de
  - con referencia a
  lexicon: LSJ
  rationale: En este contexto de lista, εἰς no expresa movimiento sino relación de pertenencia o incorporación. «Entre» comunica de manera natural que este grupo se cuenta dentro del conjunto de los hijos nombrados a continuación, sin forzar una construcción posesiva poco idiomática en español.
- source_word: τοὺς υἱοὺς Ἰησοῦ καὶ Ῥοβοάβ
  english_pob_choice: the sons of Jeshua and Joab
  chosen_spanish: los hijos de Jesúa y de Joab
  alternatives_spanish:
  - los hijos de Jesús y Roboab
  - los hijos de Jesúa y Roboab
  lexicon: LSJ
  rationale: Ἰησοῦ en este contexto postexílico corresponde al nombre propio conocido como Jesúa, no al nombre neotestamentario «Jesús». Ῥοβοάβ se mantiene como Joab en el texto principal siguiendo la decisión inglesa de reflejar la identificación probable del paralelo, mientras que el posible eco griego queda absorbido por la transparencia de la nota textual del nombre anterior.
- source_word: δισχίλιοι ὀκτακόσιοι δύο
  english_pob_choice: two thousand eight hundred and two
  chosen_spanish: dos mil ochocientos dos
  alternatives_spanish:
  - '2.802'
  lexicon: LSJ
  rationale: Es un total cardinal directo; en español, la forma escrita mantiene el registro literario y el estilo de lista censal del pasaje.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete como ancla primaria, pero se tuvo en cuenta la advertencia de desajuste mayor y el paralelo hebreo/masorético aproximado. La traducción española conserva la lista genealógica, la diferencia nominal de Φθαλεμωάβ y la tensión entre la forma griega Ῥοβοάβ y el paralelo común con Joab, tal como reflejan las decisiones inglesas y sus notas.
  spanish_consistency_notes:
  - Se usa «Jesúa» para Ἰησοῦ en contexto genealógico postexílico, reservando «Jesús» para el nombre neotestamentario.
  - Se usa «hijos» por la fórmula censal/genealógica de υἱοὶ.
  - Se mantiene el nombre principal con transliteración española legible y se documenta la variante paralela en nota.
  - La puntuación y el orden siguen una lista nominal breve y solemne, adecuada para POB.
