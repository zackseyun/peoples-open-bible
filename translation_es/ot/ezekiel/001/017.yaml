translation:
  language: es
  text: Mientras iban,[a] iban en cualquiera de sus cuatro direcciones; no giraban mientras iban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en cualquiera de sus cuatro lados»; el hebreo puede entenderse como lados espaciales o como direcciones de movimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל אַרְבַּעַת רִבְעֵיהֶן
  english_pob_choice: in any of their four directions
  chosen_spanish: en cualquiera de sus cuatro direcciones
  alternatives_spanish:
  - en sus cuatro lados
  - en cualquiera de sus cuatro lados
  - según sus cuatro direcciones
  lexicon: HALOT
  rationale: El hebreo combina la idea de ‘cuatro’ con ‘quartos/lados/direcciones’. En español, ‘direcciones’ comunica mejor el movimiento espacial y evita una imagen demasiado estática, mientras que ‘de sus cuatro’ conserva la relación posesiva del texto.
- source_word: בְּלֶכְתָּם
  english_pob_choice: as they moved
  chosen_spanish: como se movían
  alternatives_spanish:
  - cuando iban
  - mientras iban
  - al moverse
  lexicon: HALOT
  rationale: El infinitivo con ב expresa acción concomitante. ‘Como se movían’ reproduce bien esa simultaneidad en español sin endurecer el estilo.
- source_word: יֵלֵכוּ
  english_pob_choice: they went on
  chosen_spanish: se movían
  alternatives_spanish:
  - iban
  - seguían
  - caminaban
  lexicon: HALOT
  rationale: En este contexto visionario, el imperfecto describe una acción característica y continua. ‘Se movían’ evita la repetición excesiva de ‘iban’ y mantiene el sentido de desplazamiento.
- source_word: יִסַּבּוּ
  english_pob_choice: turn
  chosen_spanish: se volvían
  alternatives_spanish:
  - giraban
  - se desviaban
  - cambiaban de dirección
  lexicon: HALOT
  rationale: El verbo hebreo aquí niega el acto de girar o apartarse del rumbo. ‘Se volvían’ es una forma natural y fiel en español, cercana al valor de no cambiar de curso.
- source_word: בְּלֶכְתָּן
  english_pob_choice: as they went
  chosen_spanish: al moverse
  alternatives_spanish:
  - cuando iban
  - mientras iban
  - como se movían
  lexicon: HALOT
  rationale: El segundo infinitivo con ב refuerza la simultaneidad. ‘Al moverse’ recoge bien el matiz temporal y evita una repetición mecánica de la primera cláusula.
translation_notes:
  revision_awareness: La redacción inglesa fue revisada desde una formulación más literal (‘on their four sides as they moved’) a otra más natural (‘in any of their four directions’). La versión española sigue esa revisión, pero conserva la doble referencia temporal de los infinitivos con ב y el contraste con la negación de ‘volverse’.
  spanish_consistency_notes:
  - Se mantiene ‘movían’/‘se movían’ para el valor dinámico del pasaje visionario.
  - Se evita ‘Cristo’ u otra terminología teológica ajena al texto; no hay contenido doctrinal explícito en este versículo.
  - La nota al pie conserva la ambigüedad entre ‘lados’ y ‘direcciones’, presente en el hebreo y en la nota inglesa.
