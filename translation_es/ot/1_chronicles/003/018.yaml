  text: Malquiram[a], Pedaía, Senazar, Jecamía, Josama y Nedabía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La transliteración de nombres hebreos puede variar en español; por ejemplo, también podría leerse «Malkiram» o «Yecamía» según distintas convenciones onomásticas.
