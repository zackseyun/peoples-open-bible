translation:
  language: es
  text: Y en el noveno año de su reinado, en el décimo mes, el décimo día del mes, vino Nabucodonosor[b], rey de Babilonia, él y todo su ejército, contra Jerusalén; acamparon contra ella y construyeron a su alrededor un muro de asedio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo דָּיֵק también puede traducirse «obras de asedio» o «rampa». Aquí se opta por «muro de asedio» por claridad.
    reason: lexical_alternative
  - marker: b
    text: La grafía hebrea del nombre del rey aquí corresponde más de cerca a «Nabucodrezar»; la forma tradicional en español es «Nabucodonosor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And in / it happened
  chosen_spanish: Y en
  alternatives_spanish:
  - Y aconteció en
  - Y sucedió en
  lexicon: HALOT
  rationale: La forma hebrea introduce el marco narrativo temporal. En español, «Y en» conserva la progresión narrativa sin volver la frase pesada o artificial.
- source_word: בַשָּׁנָה הַתְּשִׁעִית לְמָלְכוֹ
  english_pob_choice: in the ninth year of his reign
  chosen_spanish: en el noveno año de su reinado
  alternatives_spanish:
  - en el noveno año de su gobierno
  - en el noveno año de su realeza
  lexicon: HALOT
  rationale: «Reinado» comunica con claridad la fórmula regnal y mantiene el valor real del sustantivo verbal hebreo.
- source_word: בַחֹדֶשׁ הָעֲשִׂירִי
  english_pob_choice: in the tenth month
  chosen_spanish: en el mes décimo
  alternatives_spanish:
  - en el décimo mes
  lexicon: HALOT
  rationale: Se conserva el orden natural del español bíblico y se evita introducir un nombre de mes que el hebreo no da.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  english_pob_choice: on the tenth day of the month
  chosen_spanish: a los diez días del mes
  alternatives_spanish:
  - el día diez del mes
  - el décimo día del mes
  lexicon: HALOT
  rationale: La construcción hebrea idiomática se expresa de modo claro y natural. «A los diez días» reproduce bien la referencia calendárica sin añadir información.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - avanzó
  lexicon: HALOT
  rationale: En contexto militar, «vino» preserva el movimiento narrativo simple del hebreo y suena más natural que «llegó» en una acción de avance bélico.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodrecar
  - Nebucodonosor
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional y reconocible del nombre, sin perder la referencia al mismo rey. La nota textual sobre la grafía hebrea se preserva en el aparato por medio de la anotación crítica.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - monarca de Babilonia
  lexicon: HALOT
  rationale: Correspondencia directa del título genitivo.
- source_word: הוּא וְכָל חֵילוֹ
  english_pob_choice: he and all his army
  chosen_spanish: él y todo su ejército
  alternatives_spanish:
  - él y todas sus fuerzas
  - él con todo su ejército
  lexicon: HALOT
  rationale: «Ejército» es el equivalente más claro de חֵיל en este contexto bélico. El pronombre enfático «él» se conserva para reflejar el hebreo.
- source_word: עַל יְרוּשָׁלַםִ
  english_pob_choice: against Jerusalem
  chosen_spanish: contra Jerusalén
  alternatives_spanish:
  - sobre Jerusalén
  - hacia Jerusalén
  lexicon: HALOT
  rationale: En contexto de asedio, עַל comunica hostilidad. «Contra» reproduce mejor esa fuerza que las opciones neutrales.
- source_word: וַיַּחֲנוּ עָלֶיהָ
  english_pob_choice: they encamped against it
  chosen_spanish: acamparon contra ella
  alternatives_spanish:
  - se acamparon contra ella
  - pusieron campamento contra ella
  lexicon: HALOT
  rationale: «Acamparon» es un verbo militar claro y fiel; «contra ella» mantiene el sentido hostil del hebreo.
- source_word: וַיִּבְנוּ עָלֶיהָ דָּיֵק
  english_pob_choice: built a siege wall against it / around it
  chosen_spanish: edificaron contra ella un muro de sitio
  alternatives_spanish:
  - levantaron contra ella un muro de sitio
  - construyeron contra ella obras de sitio
  lexicon: HALOT
  rationale: דָּיֵק designa obras de asedio; «muro de sitio» conserva la imagen concreta sin diluirla. Se mantiene «contra ella» para reflejar la orientación hostil.
- source_word: סָבִיב
  english_pob_choice: around it
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en derredor
  lexicon: HALOT
  rationale: El adverbio culmina la imagen del cerco. «Alrededor» es natural y claramente expresa la circunvalación de la ciudad.
theological_decisions:
- issue: Nombre divino no presente en el versículo
  english_pob_reading: No theological note added in English POB
  chosen_spanish_reading: No se introduce ningún equivalente divino en el texto español
  alternative_spanish_readings:
  - Sustituir con fórmulas reverenciales añadidas
  - Usar títulos devocionales no presentes
  rationale: El versículo no contiene el nombre divino ni un título que requiera decisión teológica de traducción. Se evita añadir material devocional ajeno al hebreo.
  doctrine_reference: Fidelidad textual / no adición
- issue: Gesto militar de asedio
  english_pob_reading: against Jerusalem ... encamped against it ... built a siege wall around it
  chosen_spanish_reading: contra Jerusalén ... acamparon contra ella ... edificaron contra ella un muro de sitio alrededor
  alternative_spanish_readings:
  - hacia Jerusalén ... se instalaron cerca de ella
  - sobre Jerusalén ... levantaron un cerco
  rationale: La secuencia enfatiza hostilidad y cerco militar, no simple desplazamiento. «Contra» y «muro de sitio» preservan esa tensión bélica sin suavizarla.
  doctrine_reference: Contexto histórico-literario del sitio de Jerusalén
- issue: Nombre propio del rey
  english_pob_reading: Nebuchadnezzar / note about Hebrew spelling more closely corresponding to Nebuchadrezzar
  chosen_spanish_reading: Nabucodonosor[b]
  alternative_spanish_readings:
  - Nabucodrecar[b]
  - Nebucodonosor
  rationale: Se usa la forma establecida en español para legibilidad litúrgica y pública, mientras la nota preserva la tensión textual sobre la grafía hebrea más cercana a «Nebuchadrezzar».
  doctrine_reference: Criterio de transliteración histórica y audit trail textual
translation_notes:
  revision_awareness: 'Coincide con el trazado auditado: no se requieren revisiones sustantivas respecto del contexto inglés; se conserva la cronología, la referencia bélica y la alternativa textual del nombre del rey, con adaptación natural al español.'
  spanish_consistency_notes:
  - Se mantiene «contra» para עַל en todo el encuadre militar del versículo.
  - «Muro de sitio» conserva el valor de asedio de דָּיֵק sin perder legibilidad.
  - Se usa «reinado» como equivalente estable de la fórmula regnal hebrea.
  - La nota del nombre propio preserva la tensión entre la grafía hebrea y la forma tradicional en español.
  - No se emplea «SEÑOR» ni otro equivalente divino porque el versículo no lo contiene.
