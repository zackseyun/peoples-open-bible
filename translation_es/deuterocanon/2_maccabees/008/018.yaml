review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: contraste entre la confianza enemiga en armas y arrojo, y la confianza judía en Dios; conserva también el alcance retórico de ''al mundo entero''. Sin embargo, pierde parte del paralelismo aspectual de πεποίθασιν / πεποίθαμεν al traducir la segunda cláusula como ''confiamos'' en vez de una formulación paralela a ''han puesto su confianza''. Además, la nota sobre ἑνὶ νεύματι se aleja un poco del matiz más concreto de ''asentimiento/ademán/señal'' al hablar de ''indicio breve''.'
  spanish_quality_summary: 'El español es claro y digno, pero puede mejorarse para reforzar el paralelismo retórico del original y del English POB: ''han puesto su confianza ... hemos puesto nuestra confianza ...''. También conviene simplificar la puntuación en torno a ''con un solo gesto'' para mayor fluidez. ''Audacia'' es aceptable, aunque algo más ambigua que ''arrojo'' o ''valentía''; no es un error grave.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Dios Todopoderoso' traduce bien παντοκράτωρ. No aparecen términos de glosario sensibles como Yahvé, Mesías o esclavo. La principal cuestión léxica es de estilo y fidelidad al perfecto griego, no de glosario.
  issues:
  - severity: medium
    issue: Pérdida del paralelismo de πεποίθασιν / πεποίθαμεν
    rationale: El griego usa formas paralelas de perfecto en ambas mitades del versículo. El borrador traduce 'han puesto su confianza ... pero nosotros confiamos', lo que debilita el contraste formal preservado por el English POB y por el original. En español suena natural mantener 'han puesto ... hemos puesto'.
  - severity: low
    issue: Nota léxica de ἑνὶ νεύματι algo imprecisa
    rationale: La nota actual dice que el griego alude a 'un gesto o indicio breve'. 'Indicio' no representa bien νεῦμα, que aquí se acerca más a gesto, señal o ademán, incluso asentimiento con la cabeza. Conviene ajustar la explicación para preservar mejor la imagen.
  revised_spanish_text: Pues ellos —dijo— han puesto su confianza en las armas y la audacia, pero nosotros hemos puesto nuestra confianza en Dios Todopoderoso, que puede derribar, con un solo gesto[a], tanto a los que vienen contra nosotros como al mundo entero.
  revised_footnotes:
  - marker: a
    text: 'O: «con una sola señal» o «con un solo ademán». El griego se refiere literalmente a un gesto o señal breve, y enfatiza con cuánta facilidad Dios puede derribar a los enemigos.'
    reason: lexical_alternative
  revision_rationale: Se revisa para restaurar el paralelismo del original y del English POB ('han puesto ... hemos puesto'), mejorar la fluidez sintáctica, y afinar la nota léxica sobre ἑνὶ νεύματι sin cambiar el sentido principal. El cambio es pequeño y no requiere adjudicación adicional.
