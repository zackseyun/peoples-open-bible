  text: γράψαντες διὰ χειρὸς ⸀αὐτῶν· Οἱ ἀπόστολοι καὶ οἱ ⸀πρεσβύτεροι ἀδελφοὶ τοῖς κατὰ τὴν Ἀντιόχειαν καὶ Συρίαν καὶ Κιλικίαν ἀδελφοῖς τοῖς ἐξ ἐθνῶν χαίρειν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/015/023.yaml
  text: 'Having written by their hand: “The apostles and the elder brothers[a], to the brothers from among the Gentiles in Antioch and Syria and Cilicia[c][b], greetings.”'
  footnotes:
  - marker: a
    text: Or more idiomatically, 'sent through them' or 'by them'; Greek literally, 'by their hand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the elders, brothers'; many translations take this as 'the apostles and the elders, brothers,' while the Greek most naturally reads 'the elder brothers.'
    reason: alternative_reading
  - marker: c
    text: '''Brothers'' here may refer inclusively to fellow believers, that is, the whole community including women.'
    reason: lexical_alternative
