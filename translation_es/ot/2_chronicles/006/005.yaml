base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/006/005.yaml
  text: From the day that I brought my people out of the land of Egypt[a], I have not chosen a city from any of the tribes of Israel to build a house for my name to be there[c][b], nor have I chosen a man to be ruler over my people Israel.
  footnotes:
  - marker: a
    text: Or 'Since the day that I brought my people out of the land of Egypt, I did not choose...' The Hebrew perfects can be rendered with simple past, but the English present perfect better conveys the continuing force from that past point.
    reason: lexical_alternative
  - marker: b
    text: '''House'' refers to the temple; the Hebrew uses ''house'' rather than the more interpretive English term ''temple.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'leader' or 'prince' for 'ruler.'
    reason: lexical_alternative
