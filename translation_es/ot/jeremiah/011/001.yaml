lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  - Esta palabra
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra', 'asunto' o 'mensaje'. En la fórmula profética, 'la palabra' conserva el molde literario y es natural en español sin reducir indebidamente el alcance a solo 'mensaje'.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: La partícula relativa se expresa con 'que' en español contemporáneo y mantiene la relación directa con 'palabra'.
- source_word: הָיָה
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'fue/estuvo', la fórmula profética 'vino a Jeremías' refleja el valor idiomático de origen y comunicación del mensaje.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección hacia Jeremías; en español la construcción natural es 'vino a Jeremías'.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - —
  lexicon: Nombres propios
  rationale: Nombre propio bíblico en forma española estándar.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de parte de
  - desde
  lexicon: HALOT
  rationale: La preposición de origen se expresa naturalmente en español con 'de'; el sentido es que la palabra procede de Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del hebreo con la forma española 'Yahvé', conforme al criterio del proyecto de no sustituirlo por un título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo introduce la palabra divina siguiente; 'diciendo' preserva el marcador discursivo hebreo de manera fluida en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. La política del proyecto pide renderizarlo como 'Yahvé' en español, manteniendo el nombre propio del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente: el audit trail inglés no registra cambios pendientes y mantiene la equivalencia óptima para esta fórmula profética.'
  spanish_consistency_notes:
