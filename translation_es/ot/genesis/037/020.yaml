translation:
  language: es
  text: 'Y ahora[a], vamos, matémoslo y arrojémoslo en uno de los pozos[b], y diremos: ‘Un animal salvaje[c] lo ha devorado.’ Entonces veremos qué será de sus sueños.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse ‘Pues ahora’. La expresión hebrea funciona como marcador discursivo urgente al introducir la propuesta.
    reason: lexical_alternative
  - marker: b
    text: O ‘cisternas’. El hebreo בּוֹר puede referirse a un pozo, foso o depósito subterráneo según el contexto.
    reason: lexical_alternative
  - marker: c
    text: O ‘bestia salvaje’. La expresión hebrea puede traducirse de manera más tradicional con ese giro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Conserva tanto el valor conectivo de la partícula como la urgencia temporal del discurso. ‘Así que ahora’ suena natural en español y refleja el arranque enfático de la propuesta.
- source_word: לְכוּ
  english_pob_choice: come
  chosen_spanish: vengan
  alternatives_spanish:
  - vamos
  - vengan pues
  lexicon: HALOT
  rationale: En este contexto es una exhortación plural al grupo, no un simple mandato de desplazamiento. ‘Vengan’ transmite bien el tono de incitación inmediata.
- source_word: וְנַהַרְגֵהוּ
  english_pob_choice: let us kill him
  chosen_spanish: matémoslo
  alternatives_spanish:
  - y lo matemos
  - mátémoslo
  lexicon: HALOT
  rationale: La forma cohortativa expresa acción propuesta por el grupo; el imperativo exhortativo español ‘matémoslo’ reproduce mejor esa volición compartida que una simple futura narración.
- source_word: וְנַשְׁלִכֵהוּ
  english_pob_choice: throw him
  chosen_spanish: arrojémoslo
  alternatives_spanish:
  - echémoslo
  - lancémoslo
  lexicon: HALOT
  rationale: ‘Arrojar’ mantiene con buena dignidad el valor de lanzar/castigar del verbo hebreo y encaja con el paralelo de la primera acción.
- source_word: בְּאַחַד הַבֹּרוֹת
  english_pob_choice: into one of the pits
  chosen_spanish: en uno de los pozos[a]
  alternatives_spanish:
  - en uno de los hoyos
  - en una de las cisternas[a]
  lexicon: HALOT
  rationale: El sustantivo בּוֹר puede ser pozo, foso o cisterna. Dado el contexto narrativo, ‘pozos’ es claro en español; se preserva la alternativa técnica en nota porque la gama semántica no se agota en una sola opción.
- source_word: וְאָמַרְנוּ
  english_pob_choice: and we will say
  chosen_spanish: y diremos
  alternatives_spanish:
  - y diríamos
  - entonces diremos
  lexicon: HALOT
  rationale: La secuencia planeada se expresa de modo natural en español con futuro simple. Mantiene el encadenamiento de acciones imaginadas por los hermanos.
- source_word: חַיָּה רָעָה
  english_pob_choice: a wild animal / a wild beast
  chosen_spanish: un animal salvaje[b]
  alternatives_spanish:
  - una fiera[b]
  - una bestia salvaje[b]
  lexicon: HALOT
  rationale: La expresión hebrea denota un animal peligroso del campo. ‘Animal salvaje’ es claro y sobrio; la nota preserva la posibilidad tradicional de ‘bestia salvaje’ sin imponer un matiz más fuerte del necesario.
- source_word: אֲכָלָתְהוּ
  english_pob_choice: has devoured him
  chosen_spanish: lo ha devorado
  alternatives_spanish:
  - lo ha comido
  - lo ha devorado por completo
  lexicon: HALOT
  rationale: ‘Devorar’ reproduce bien la idea de consumo total y coincide con la corrección textual del inglés POB. En español suena más natural y formal que un simple ‘comer’ en esta declaración fingida.
- source_word: וְנִרְאֶה
  english_pob_choice: Then we will see
  chosen_spanish: Entonces veremos
  alternatives_spanish:
  - y veremos
  - luego veremos
  lexicon: HALOT
  rationale: La forma expresa el resultado desafiante que esperan obtener tras su plan. ‘Entonces veremos’ preserva el valor consecutivo y el tono de burla.
- source_word: מַה יִּהְי֖וּ חֲלֹמֹתָיו
  english_pob_choice: what becomes of his dreams
  chosen_spanish: qué será de sus sueños
  alternatives_spanish:
  - qué pasará con sus sueños
  - en qué quedarán sus sueños
  lexicon: HALOT
  rationale: ‘Qué será de…’ conserva la fuerza idiomática del hebreo y el desafío implícito sobre el cumplimiento de los sueños de José. Evita una paráfrasis excesiva y mantiene la tensión narrativa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y, a la vez, toma en cuenta la revisión inglesa más reciente: se mantiene ‘devorado’ para אֲכָלָתְהוּ, y la cita final incluye la cláusula completa dentro de las palabras habladas, como en el pasaje auditado.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ para el nombre divino cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se eligió un registro sobrio y congregacionalmente legible, evitando tanto arcaísmos innecesarios como coloquialismos.
  - ‘Pozos’ refleja la gama semántica de בּוֹר sin ocultarla; la nota preserva la alternativa ‘cisternas’.
  - Se conservó el tono de planificación malévola con futuros exhortativos en español, en línea con el valor cohortativo del hebreo.
