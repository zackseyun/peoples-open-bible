  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Holocausto», «toros», «carneros», «corderos de un año», «machos cabríos» y «ofrenda por el pecado» son compatibles con el expediente inglés y con el sentido hebreo. La nota sobre «ofrenda de purificación» preserva correctamente la alternativa lexical de חַטָּאת.
