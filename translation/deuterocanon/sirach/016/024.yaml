theological_decisions:
- issue: Addressee specification
  chosen_reading: No explicit 'child/son' in the main text
  alternative_readings:
  - Listen to me, child, and receive understanding...
  rationale: The Hebrew primary witness lacks an explicit filial address, while the Greek parallel includes τέκνον ('child'). Because the project prioritizes the Hebrew where extant, the main text follows the Hebrew. The Greek addition is preserved in a footnote as a meaningful alternative witness.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it
- issue: Anthropological language of 'heart'
  chosen_reading: Retain 'heart' explicitly
  alternative_readings:
  - pay careful attention
  - take my words seriously
  rationale: Both Hebrew and Greek explicitly mention the heart. Retaining 'heart' preserves the biblical conception of the inner faculty of thought and attention rather than modernizing it away.
  doctrine_reference: Preserve theological tension rather than resolve it
