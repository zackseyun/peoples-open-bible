base_translation:
  language: en
  yaml_path: translation/ot/1_kings/001/002.yaml
  text: So his servants said to him[a], “Let them seek for my lord the king a young virgin, and let her stand before the king and be his caregiver, and let her lie in your bosom[c][b], so that my lord the king may be warm.”
  footnotes:
  - marker: a
    text: Or 'let her stand before the king'; the Hebrew idiom can mean to attend or wait on someone in service.
    reason: lexical_alternative
  - marker: b
    text: Or 'attendant' or 'nurse' for 'caregiver'; the Hebrew term is rare and denotes one who ministers to or cares for another.
    reason: lexical_alternative
  - marker: c
    text: Literally 'in your bosom.'
    reason: lexical_alternative
