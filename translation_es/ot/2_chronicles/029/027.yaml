    unchanged: false
    changes_summary: Revised 'commanded to offer up' to 'commanded that the burnt offering be offered' for natural and accurate English after the causative construction. Retained the rest, with 'Yahweh' for the divine name.
translation:
  language: es
  text: Entonces Ezequías mandó que se ofreciera el holocausto sobre el altar[a]. Y al comenzar el holocausto, comenzó también el canto de Yahvé[b], con las trompetas y por medio de los instrumentos de David, rey de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «que se subiera el holocausto»; el hebreo literalmente dice «para hacer subir el holocausto».
    reason: alternative_reading
  - marker: b
    text: O, «el canto a Yahvé». El hebreo literalmente dice «el canto de Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said / commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - dijo
  - ordenó
  lexicon: HALOT
  rationale: En español, dentro de esta construcción con infinitivo causativo, «mandó» comunica con naturalidad la fuerza directiva del verbo sin caer en una calca incómoda; preserva el valor de mandato que la sintaxis hebrea expresa aquí.
- source_word: לְהַעֲלוֹת
  english_pob_choice: to offer up
  chosen_spanish: que se ofreciera
  alternatives_spanish:
  - que fuera presentado
  - que se subiera
  lexicon: HALOT
  rationale: El infinitivo causativo se vierte de manera natural como una pasiva de mandato en español. El contexto sacrificial exige el sentido cultual de ofrecer, no el simple de ‘subir’.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - el sacrificio quemado
  - la ofrenda quemada
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «holocausto» es la equivalencia cultual estable para עֹלָה. Mantiene el término técnico del sacrificio sin reemplazarlo por una paráfrasis.
- source_word: לַמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: «Sobre el altar» reproduce bien la relación espacial del hebreo y suena natural en español litúrgico.
- source_word: וּבְעֵת
  english_pob_choice: at the time
  chosen_spanish: Y al comenzar
  alternatives_spanish:
  - y en el momento
  - y cuando
  lexicon: HALOT
  rationale: El hebreo enlaza temporalmente la acción con el inicio del holocausto. En español, «al comenzar» conserva esa simultaneidad sin sonar rígido.
- source_word: הֵחֵל ... הֵחֵל
  english_pob_choice: began ... began also
  chosen_spanish: comenzó ... comenzó también
  alternatives_spanish:
  - empezó ... empezó también
  - se inició ... se inició también
  lexicon: HALOT
  rationale: La repetición verbal es importante y se conserva en español para reflejar la coordinación literaria entre el holocausto y el canto.
- source_word: שִׁיר יְהוָה
  english_pob_choice: the song of Yahweh
  chosen_spanish: el canto de Yahvé
  alternatives_spanish:
  - la canción de Yahvé
  - el canto para Yahvé
  lexicon: HALOT
  rationale: Se mantiene la estructura nominal literal del hebreo para no resolver la tensión entre pertenencia, dirección o dedicación. «Canto» es más natural que «canción» en registro bíblico y litúrgico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: הַחֲצֹצְרוֹת
  english_pob_choice: the trumpets
  chosen_spanish: las trompetas
  alternatives_spanish:
  - las trompetas de plata
  - las cornetas
  lexicon: HALOT
  rationale: El término genérico es suficiente aquí; el texto no especifica plata, y «trompetas» conserva la referencia instrumental sin añadir información.
- source_word: וְעַל יְדֵי
  english_pob_choice: by means of
  chosen_spanish: por medio de
  alternatives_spanish:
  - con
  - mediante
  lexicon: HALOT
  rationale: La expresión idiomática señala instrumento o medio; «por medio de» conserva el valor instrumental de forma clara en español.
- source_word: כְּלֵי דָּוִיד
  english_pob_choice: the instruments of David
  chosen_spanish: los instrumentos de David
  alternatives_spanish:
  - los utensilios de David
  - los instrumentos musicales de David
  lexicon: HALOT
  rationale: En este contexto cultual-musical, «instrumentos» es el equivalente más directo y sobrio para כְּלִי.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - rey de Israel
  lexicon: HALOT
  rationale: Se conserva el título real tal como aparece en el hebreo, en aposición a David.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino, no un título. Siguiendo la convención del proyecto, se preserva el nombre Yahvé para evitar ocultarlo detrás de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of שִׁיר יְהוָה
  english_pob_reading: the song of Yahweh
  chosen_spanish_reading: el canto de Yahvé
  alternative_spanish_readings:
  - el canto para Yahvé
  - el canto de alabanza a Yahvé
  rationale: 'Se conserva la ambigüedad del constructo hebreo: puede expresar pertenencia, dirección o dedicación. «De Yahvé» mantiene la forma literal sin resolver el matiz.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción española sigue el pasaje hebreo directo y toma en cuenta el ajuste de la versión inglesa revisada de una construcción torpe hacia una orden indirecta natural. También conserva la repetición de «comenzó» para reflejar el paralelismo literario entre el inicio del holocausto y del canto. El nombre divino se traduce según la política del proyecto como Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה en todo el verso.
  - Se usa «holocausto» como término técnico de עֹלָה.
  - Se conserva la repetición verbal «comenzó ... comenzó también» para reflejar el hebreo.
  - «Canto» se eligió sobre «canción» por registro bíblico más adecuado.
  - La frase instrumental «por medio de» corresponde a וְעַל יְדֵי sin añadir precisión no explícita.
