translation:
  language: es
  text: Y si un hombre tiene una emisión de semen[a][b], lavará en agua todo su cuerpo y quedará inmundo hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «una emisión seminal» o, más literalmente, «una emisión de semilla».'
    reason: lexical_alternative
  - marker: b
    text: «Inmundo» aquí se refiere a impureza ritual en el marco de las leyes levíticas, no necesariamente a culpa moral.
    reason: cultural_note
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un hombre
  lexicon: HALOT
  rationale: Se conserva el referente masculino explícito del hebreo y de la decisión inglesa; en español, «un hombre» es natural y precisa sin borrar el valor legal del sujeto.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - si
  lexicon: HALOT
  rationale: En este contexto jurídico casuístico, la condición es más natural en español con «si».
- source_word: תֵצֵא מִמֶּנּוּ
  english_pob_choice: has an emission
  chosen_spanish: tiene una emisión
  alternatives_spanish:
  - le sale una emisión
  - hay una salida de
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sale de él», en español jurídico-ritual la formulación idiomática «tiene una emisión» comunica el hecho sin calcar torpemente la estructura hebrea.
- source_word: שִׁכְבַת זָרַע
  english_pob_choice: an emission of semen
  chosen_spanish: una emisión de semen
  alternatives_spanish:
  - una emisión seminal
  - una emisión de semilla
  - una eyaculación
  lexicon: HALOT
  rationale: 'Se sigue la lectura lexical del POB inglés: la expresión designa una descarga seminal. «Semen» es claro, sobrio y más preciso que «semilla» en español moderno.'
- source_word: וְרָחַץ
  english_pob_choice: he shall wash
  chosen_spanish: lavará
  alternatives_spanish:
  - se lavará
  - se bañará
  - lavará
  lexicon: HALOT
  rationale: En español, «lavará» reproduce la obligación ritual de forma natural. «Lavará toda su carne» mantiene la cercanía al hebreo sin introducir una paráfrasis innecesaria.
- source_word: בַּמַּיִם
  english_pob_choice: in water
  chosen_spanish: en agua
  alternatives_spanish:
  - con agua
  - en agua
  lexicon: HALOT
  rationale: «En agua» corresponde directamente al valor preposicional del hebreo y al inglés POB, conservando el marco ritual de ablución.
- source_word: אֶת כָּל בְּשָׂרוֹ
  english_pob_choice: all his flesh
  chosen_spanish: toda su carne
  alternatives_spanish:
  - todo su cuerpo
  - todo su ser corporal
  - todo su cuerpo carnal
  lexicon: HALOT
  rationale: Se preserva «carne» para reflejar el hebreo בָּשָׂר y la decisión inglesa de no suavizarlo a «cuerpo»; en español bíblico-legal, «toda su carne» es comprensible y mantiene la tensión lexical.
- source_word: וְטָמֵא
  english_pob_choice: and be unclean
  chosen_spanish: y será inmundo
  alternatives_spanish:
  - y quedará inmundo
  - y será impuro
  - y quedará impuro
  lexicon: HALOT
  rationale: Se mantiene «inmundo» por su equivalencia tradicional y su peso técnico en las leyes de pureza; a la vez, se conserva la lectura ritual, no moral, del término.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta la noche
  - hasta el anochecer
  - hasta la tarde
  lexicon: HALOT
  rationale: «Hasta la tarde» refleja de manera directa la indicación temporal del hebreo y la formulación inglesa, sin sobreinterpretar el límite horario.
theological_decisions:
- issue: Naturaleza de טָמֵא en legislación de pureza
  english_pob_reading: ritually unclean, not necessarily morally guilty
  chosen_spanish_reading: inmundo en sentido ritual, no necesariamente culpable moralmente
  alternative_spanish_readings:
  - impuro moralmente
  - ceremonialmente contaminado
  - definidamente culpable
  rationale: 'Se conserva la tensión del texto: la impureza es cultual/ritual dentro de la ley levítica, no una acusación automática de pecado moral. La nota evita que el lector español lea «inmundo» como juicio ético.'
  doctrine_reference: Levítico 15; distinguir impureza ritual de culpa moral.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide sustancialmente con la solución inglesa auditada: condicional jurídico, emisión seminal, lavado de toda la persona y estado de impureza hasta el anochecer. No se incorporaron revisiones posteriores porque el expediente indica que no hubo cambios en la última pasada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva «carne» para בָּשָׂר, en lugar de sustituirlo por «cuerpo», para respetar la consistencia léxica del proyecto.
  - «Inmundo» se usa como término técnico de pureza ritual, no como valoración moral.
