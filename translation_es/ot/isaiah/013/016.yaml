  spanish_quality_summary: El español es claro y natural, pero «sus infantes» suena algo menos idiomático que «sus niños pequeños» o «sus pequeños»; aun así, es aceptable y conserva bien la edad/vulnerabilidad. El problema principal de legibilidad y precisión es «sus mujeres serán violadas», que en español puede sonar más amplio o ambiguo que el hebreo aquí. Conviene también anclar la nota al término explícito principal, no al final de toda la oración.
  glossary_alignment: 'No hay conflicto con la terminología global principal del proyecto. La revisión necesaria es contextual: אִשָּׁה en plural constructo con sufijo 3mp aquí debe mantenerse como «esposas» para alinearse con el audit trail y con la sintaxis del hebreo. La elección «violadas» está bien alineada con la política de evitar eufemismos.'
