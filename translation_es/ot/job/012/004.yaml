translation:
  language: es
  text: Soy objeto de burla para mi amigo[a], yo que clamé a Dios y él le respondió[b], objeto de burla para el justo e íntegro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para su amigo»; el sufijo hebreo también puede entenderse así, aunque el contexto favorece «mi amigo» porque Job habla de sus propios compañeros.'
    reason: alternative_reading
  - marker: b
    text: 'O: «y me respondió»; la forma hebrea tiene objeto en tercera persona («le»), pero el referente es Job mismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂחֹק
  english_pob_choice: a laughingstock
  chosen_spanish: una burla
  alternatives_spanish:
  - un hazmerreír
  - objeto de risa
  - escarnio
  lexicon: HALOT
  rationale: El sustantivo expresa risa o desprecio dirigido contra alguien. En español, 'una burla' comunica la idea de ser objeto de ridículo de manera natural y sin perder la fuerza predicativa del hebreo.
- source_word: לְרֵעֵהוּ
  english_pob_choice: to my friend
  chosen_spanish: para mi amigo
  alternatives_spanish:
  - para su amigo
  - para un amigo
  - para su compañero
  lexicon: HALOT
  rationale: 'El contexto en boca de Job favorece la referencia en primera persona: Job habla de cómo lo ven sus cercanos. ''Para mi amigo'' conserva esa lectura, aunque el sufijo hebreo admite la alternativa de tercera persona que se mantiene en nota.'
- source_word: אֶהְיֶה
  english_pob_choice: I am
  chosen_spanish: soy
  alternatives_spanish:
  - he llegado a ser
  - seré
  lexicon: HALOT
  rationale: Aunque la forma es imperfecta, aquí expresa el estado presente del hablante en contexto de lamento. En español, el presente 'soy' transmite con naturalidad esa situación actual.
- source_word: קֹרֵא לֶאֱלוֹהַּ
  english_pob_choice: one who called to God
  chosen_spanish: yo que clamé a Dios
  alternatives_spanish:
  - quien clamó a Dios
  - el que clamó a Dios
  - llamando a Dios
  lexicon: HALOT
  rationale: La construcción participial seguida por la narración encaja bien como relativa en español. 'Clamé a Dios' expresa con más dignidad y fidelidad al registro del lamento la acción de invocar a Dios.
- source_word: וַיַּעֲנֵהוּ
  english_pob_choice: and he answered him
  chosen_spanish: y él le respondió
  alternatives_spanish:
  - y él me respondió
  - y le respondió
  lexicon: HALOT
  rationale: El hebreo conserva un objeto de tercera persona ('le/respondió a él'), pero el referente es Job. En español, 'le respondió' mantiene la forma del texto y deja explícita la ambigüedad referencial; la nota preserva la posibilidad de 'me respondió'.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el íntegro
  lexicon: HALOT
  rationale: '''Justo'' es la traducción más estable en contexto sapiencial para צדיק y conserva la fuerza moral y relacional del término sin sobreinterpretarlo.'
- source_word: תָּמִים
  english_pob_choice: blameless
  chosen_spanish: el hombre íntegro
  alternatives_spanish:
  - el hombre blameless
  - el hombre de integridad
  - el hombre perfecto
  lexicon: HALOT
  rationale: En Job, תמים describe integridad moral, no perfección sin pecado. 'Íntegro' comunica bien la idea de totalidad moral y evita el sentido engañosamente absoluto de 'perfecto'.
theological_decisions:
- issue: Si 'blameless' debe sugerir perfección moral absoluta
  english_pob_reading: '''blameless'' as integrity language, not absolute perfection'
  chosen_spanish_reading: '''íntegro'' como lenguaje de integridad, no de impecabilidad absoluta'
  alternative_spanish_readings:
  - '''perfecto'''
  - '''sin culpa'''
  rationale: La evidencia léxica en Job favorece una descripción de integridad/entereza. 'Íntegro' preserva la gravedad del autoelogio de Job sin convertirlo en afirmación de impecabilidad doctrinalmente problemática.
  doctrine_reference: Translation philosophy §6; evitar sobretraducir la moralidad del término más allá de la intención del texto
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste revisado del audit trail inglés: la frase final no se toma como aposición independiente, sino como complemento relacional (''para el justo y el hombre íntegro''). También se ha conservado la ambigüedad del sufijo de לְרֵעֵהוּ y del objeto de וַיַּעֲנֵהוּ mediante notas.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' en la terminología general del proyecto, pero aquí el texto hebreo dice אֱלוֹהַּ y el destinatario explícito es 'Dios'; por eso se tradujo 'Dios' sin introducir el tetragrámaton.
  - '''Justo'' y ''íntegro'' siguen el contraste sapiencial típico de Job y evitan mezclar esta línea con formulaciones litúrgicas más tradicionales.'
  - Se prefirió un español directo y publicable, manteniendo la cadencia paralela del hebreo sin añadir explicaciones interpretativas al cuerpo del versículo.
