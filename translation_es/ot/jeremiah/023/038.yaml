revisions:
- from: 'Pero si dicen[a]: «La carga de Yahvé», por tanto, así dice Yahvé: Porque han dicho esta palabra, «La carga de Yahvé», y les envié para decirles: «No digan: “La carga de Yahvé”»,'
  to: 'Pero si ustedes dicen[a]: «La carga de Yahvé», por tanto, así dice Yahvé: Porque han dicho esta palabra, «La carga de Yahvé», aunque les envié a decirles: «No digan: “La carga de Yahvé”»,'
  rationale: Se conserva la traducción base, pero se ajusta el inicio a «si ustedes dicen» para reflejar con más claridad la segunda persona plural y se cambia «y les envié para decirles» por «aunque les envié a decirles» para preservar la fuerza concesiva contextual documentada en el audit trail inglés y mejorar la naturalidad citativa de לֵאמֹר en español.
