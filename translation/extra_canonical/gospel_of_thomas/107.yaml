translation:
  text: Jesus said[a], The kingship is like a shepherd who had a hundred sheep. One
    of them—the great one—went astray. He left the ninety‑nine and searched for the
    one until he found it. After he had toiled, he said to the sheep[i][h][g][f][e][d][c][b],
    I love you more than the ninety‑nine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Kingship’ renders ⲡⲙⲛⲧⲣⲣⲟ, an abstract for reign/rule; ‘kingdom’ is a common
      but potentially more spatial translation.
    reason: lexical_alternative
  - marker: b
    text: The text reads literally ‘the great one’ (ⲡⲛⲟϭ), which can mean ‘largest.’
    reason: lexical_alternative
  - marker: c
    text: ⲡⲥⲧⲉⲯⲓⲧ is the manuscript’s form for ‘the ninety‑nine,’ likely influenced
      by Greek numeral forms.
    reason: dialect_note
  - marker: d
    text: ⲟⲩⲟϣⲕ can mean ‘love’ or ‘prefer’; either ‘I love you’ or ‘I prefer you’
      is possible.
    reason: lexical_alternative
  - marker: e
    text: ‘To the sheep’ (ⲡⲉⲥⲟⲟⲩ) has a minor restored letter in the manuscript (NHAM02.50
      lb 27).
    reason: lacuna_or_restoration
  - marker: f
    text: Although the scenario implies a shepherd, the Coptic says ‘a man who had
      a hundred sheep’ without naming him ‘shepherd.’
    reason: cultural_note
  - marker: g
    text: ⲥⲱⲣⲙ is ‘go astray/wander’; the pastoral setting governs the nuance here.
    reason: cultural_note
  - marker: h
    text: The clause ‘after he had toiled’ reflects Coptic ⲛⲧⲁⲣⲉ‑ plus ϩⲓⲥⲉ, implying
      effort before the saying is spoken.
    reason: cultural_note
  - marker: i
    text: Or 'a man who had'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: kingship
  alternatives:
  - kingdom
  - reign
  lexicon: Crum, s.v. ⲣⲣⲟ; Layton, Grammar §72
  rationale: Abstract noun mnt- + rro denotes ‘kingship, reign’ rather than a territorial
    realm; ‘kingship’ preserves the conceptual nuance found often in Thomas.
- source_word: ⲟⲩⲣⲱⲙⲉ
  chosen: a man
  alternatives:
  - a person
  lexicon: Crum, s.v. ⲣⲱⲙⲉ
  rationale: Default meaning is ‘man, human being’; context implies a stock owner
    (implicitly a shepherd) but the text says simply ‘a man’.
- source_word: ϣⲱⲥ (ⲛϣⲱⲥ)
  chosen: had
  alternatives:
  - possessed
  lexicon: Crum, s.v. ϣⲱⲥ
  rationale: Common verb for ‘to have’; simple past ‘had’ is idiomatic in English.
- source_word: ⲛϣⲉ
  chosen: sheep
  alternatives:
  - small livestock
  lexicon: Crum, s.v. ϣⲉ
  rationale: Covers sheep/goats; in this narrative ‘sheep’ is the natural rendering.
- source_word: ⲁⲟⲩⲁ ϩⲛⲛⲧⲟⲟⲩ
  chosen: one of them
  alternatives:
  - one among them
  lexicon: Layton, Grammar §98 (partitive with ϩⲛ)
  rationale: Partitive construction; ‘one of them’ is concise and accurate.
- source_word: ⲥⲱⲣⲙ
  chosen: went astray
  alternatives:
  - wandered off
  - erred
  lexicon: Crum, s.v. ⲥⲱⲣⲙ
  rationale: Verb denotes going astray/erring; ‘went astray’ matches the pastoral
    context.
- source_word: ⲡⲛⲟϭ
  chosen: the great one
  alternatives:
  - the largest
  - the big one
  lexicon: Crum, s.v. ⲛⲟϭ
  rationale: Adjective ‘great/large’; the predicate construction marks the straying
    sheep as ‘the great one.’
- source_word: ⲕⲱ
  chosen: left
  alternatives:
  - abandoned
  lexicon: Crum, s.v. ⲕⲱ
  rationale: Basic meaning ‘leave’; ‘left’ keeps the narrative neutral (not as strong
    as ‘abandoned’).
- source_word: ⲡⲥⲧⲉⲯⲓⲧ
  chosen: the ninety‑nine
  alternatives:
  - the ninety‑nine sheep
  lexicon: Layton, NHS notes on numerals; compare Greek influence
  rationale: Conventional reading in Thomas for the numeral 99; context supplies ‘sheep’
    so it need not be repeated.
- source_word: ϣⲓⲛⲉ ⲛⲥⲁ ⲡⲓⲟⲩⲁ
  chosen: searched for the one
  alternatives:
  - looked for the one
  - sought after the one
  lexicon: Crum, s.v. ϣⲓⲛⲉ; Layton, Grammar §138 (ⲛⲥⲁ as ‘after/for’)
  rationale: ϣⲓⲛⲉ ‘seek’ with ⲛⲥⲁ marks the object of pursuit.
- source_word: ϣⲁⲛⲧⲉ ... ϩⲉ
  chosen: until he found it
  alternatives:
  - until he came upon it
  lexicon: Layton, Grammar §162 (ϣⲁⲛⲧⲉ temporal ‘until’); Crum, s.v. ϩⲉ
  rationale: Standard temporal clause ‘until’ plus verb ‘find’.
- source_word: ϩⲓⲥⲉ
  chosen: had toiled
  alternatives:
  - had labored
  - was worn out
  lexicon: Crum, s.v. ϩⲓⲥⲉ
  rationale: Conveys exertion/fatigue prior to the speech; English pluperfect matches
    Coptic ⲛⲧⲁⲣⲉ‑ construction.
- source_word: ⲡⲉⲥⲟⲟⲩ
  chosen: to the sheep
  alternatives:
  - to the animal
  lexicon: Crum, s.v. ϣⲉ (for species)
  rationale: Direct object of address; species is already clear.
- source_word: ⲟⲩⲟϣⲕ
  chosen: I love you
  alternatives:
  - I prefer you
  - I care for you
  lexicon: Crum, s.v. ⲟⲩⲟϣⲕ
  rationale: Verb can mean ‘love’ or ‘desire/prefer’; ‘love’ fits the emotive speech,
    with ‘prefer’ a viable nuance.
- source_word: ⲡⲁⲣⲁ
  chosen: more than
  alternatives:
  - rather than
  lexicon: Lambdin, §128 (Greek loan preposition)
  rationale: Comparative preposition; ‘more than’ suits the comparative of affection.
textual_note: 'Dialect and orthography: Sahidic with Lycopolitan flavor. Repeated
  postposed subject pronoun ⲛⲧⲟϥ in the narrative clauses is typical. The numeral
  ⲡⲥⲧⲉⲯⲓⲧ is the manuscript’s form for ‘ninety‑nine,’ a Greek‑influenced or specialized
  numeral form in NH codices. A minor restoration is noted at NHAM02.50 lb 27 in ⲡⲉⲥⲟⲟⲩ
  (printed as ⲙ̄ⲡⲉⲥⲟ[[ⲩ]]ⲟⲩ), where a damaged letter is supplied. Initial clause shows
  compressed/variant spacing in the manuscript (lb 22), normalized by Dilley to ⲡⲙⲛⲧⲣⲣⲟ
  ⲉⲣⲉ…; no substantive ambiguity arises. No Greek POxy overlap exists for this saying.'
