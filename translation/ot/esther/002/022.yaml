id: EST.2.22
reference: Esther 2:22
source:
  edition: WLC
  text: וַ/יִּוָּדַ֤ע הַ/דָּבָר֙ לְ/מָרְדֳּכַ֔י וַ/יַּגֵּ֖ד לְ/אֶסְתֵּ֣ר הַ/מַּלְכָּ֑ה וַ/תֹּ֧אמֶר אֶסְתֵּ֛ר לַ/מֶּ֖לֶךְ בְּ/שֵׁ֥ם מָרְדֳּכָֽי׃
translation:
  text: When the matter became known to Mordecai[a], he told Queen Esther[c][b], and Esther told the king in Mordecai's name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was made known to Mordecai.' The Hebrew passive can emphasize either that the matter came to his knowledge or that someone informed him.
    reason: lexical_alternative
  - marker: b
    text: Or 'Esther the queen.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the name of Mordecai' or 'on Mordecai's behalf.' The phrase indicates that Esther presented the report as coming from Mordecai.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּדַע
  chosen: became known
  alternatives:
  - was made known
  - came to light
  lexicon: HALOT
  rationale: 'The Niphal of ידע here is passive/inchoative: the matter came to Mordecai''s knowledge. ''Became known'' is natural English and preserves the passive sense without over-specifying agency.'
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the plot
  - the affair
  lexicon: HALOT
  rationale: דבר is broad, but in this immediate context it refers to the assassination scheme just mentioned. 'The matter' is idiomatic and sufficiently specific without importing more interpretation than the text states.
- source_word: לְמָרְדֳּכַי
  chosen: to Mordecai
  alternatives:
  - by Mordecai
  lexicon: HALOT
  rationale: The preposition ל with the passive verb marks the person to whom the information became known. 'To Mordecai' best reflects the syntax.
- source_word: וַיַּגֵּד
  chosen: he told
  alternatives:
  - he reported
  - he informed
  lexicon: HALOT
  rationale: נגד in Hiphil commonly means to tell or report. 'He told' is straightforward modern English and fits the narrative flow.
- source_word: לְאֶסְתֵּר הַמַּלְכָּה
  chosen: Queen Esther
  alternatives:
  - Esther the queen
  lexicon: HALOT
  rationale: The Hebrew apposition literally reads 'to Esther the queen.' 'Queen Esther' is idiomatic English while preserving her royal title.
- source_word: וַתֹּאמֶר
  chosen: spoke
  alternatives:
  - said
  - told
  lexicon: HALOT
  rationale: Although אמר is often rendered 'said,' English normally says one 'speaks to' a person rather than 'says to' him in this context. 'Spoke to the king' is idiomatic and faithful to the communicative act.
- source_word: לַמֶּלֶךְ
  chosen: to the king
  lexicon: HALOT
  rationale: Directly reflects the prepositional phrase and maintains the court setting.
- source_word: בְּשֵׁם מָרְדֳּכָי
  chosen: in Mordecai's name
  alternatives:
  - in the name of Mordecai
  - on Mordecai's behalf
  lexicon: HALOT
  rationale: בשם most naturally means 'in the name of.' Here it indicates that Esther identified Mordecai as the source of the report. 'In Mordecai's name' is concise and preserves that attribution better than the more interpretive 'on Mordecai's behalf.'
