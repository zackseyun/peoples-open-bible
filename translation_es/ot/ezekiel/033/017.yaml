  to: 'Sin embargo, los hijos de tu pueblo dicen[a]: «El camino del Señor no es justo», pero su propio camino no es justo.'
  rationale: Se cambia «Yahvé» por «el Señor» para reflejar fielmente אֲדֹנָי en la fuente hebrea. Se alisa la segunda cláusula para un español más natural, manteniendo la misma inversión retórica y la repetición deliberada de «no es justo». Se ajusta la nota léxica para ofrecer alternativas más cercanas al rango semántico y al expediente inglés.
