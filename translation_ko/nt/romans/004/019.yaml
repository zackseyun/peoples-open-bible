  - 주시했습니다
  lexicon: BDAG
  rationale: 강조 κατα-의 「철저히 ~함」을 「깊이 살피다」로 옮긴다. 본 절의 핵심은 그가 현실을 직시했음에도 믿음이 약해지지 않았다는 것.
- source_word: νενεκρωμένον / νέκρωσιν
  english_pob_choice: as good as dead / deadness
  chosen_korean: 이미 죽은 것과 같음 / 죽었음
  alternatives_korean:
