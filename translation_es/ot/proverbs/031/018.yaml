translation:
  language: es
  text: Percibe que su mercancía es buena[a][b]; su lámpara no se apaga de noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prueba», con el matiz de discernimiento por experiencia más que de comer literalmente.
    reason: lexical_alternative
  - marker: b
    text: O «su comercio» o «su ganancia» es buena.
    reason: lexical_alternative
lexical_decisions:
- source_word: טָעֲמָה
  english_pob_choice: she perceives
  chosen_spanish: Percibe
  alternatives_spanish:
  - Saborea
  - Prueba
  - Se da cuenta
  lexicon: HALOT
  rationale: El verbo hebreo literalmente es «gustar/probar», pero en contexto sapiencial expresa discernimiento por experiencia. «Percibe» conserva esa idea evaluativa sin volverlo un calco físico de comer o saborear.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues
  - porque
  - que realmente
  lexicon: HALOT
  rationale: Introduce el contenido de lo que ella percibe; en español, «que» es la complementación más natural y fiel al valor introductorio del hebreo aquí.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - rentable
  - provechosa
  - beneficiosa
  lexicon: HALOT
  rationale: Se mantiene el sentido amplio de bondad/validez del adjetivo. «Buena» deja abierta la implicación comercial sin reducirla de entrada a «rentable».
- source_word: סַחְרָהּ
  english_pob_choice: her merchandise
  chosen_spanish: su mercancía
  alternatives_spanish:
  - su comercio
  - su negocio
  - su ganancia
  lexicon: HALOT
  rationale: El sustantivo puede referirse a mercancía, comercio o ganancia. «Mercancía» preserva el matiz concreto y material del contexto, sin estrecharlo a beneficio abstracto.
- source_word: לֹא יִכְבֶּה
  english_pob_choice: does not go out
  chosen_spanish: no se apaga
  alternatives_spanish:
  - no se extingue
  - no se va a apagar
  - no se consume
  lexicon: HALOT
  rationale: Para una lámpara, «apagarse» es la equivalencia idiomática natural en español. Conserva la imagen doméstica y proverbial del hebreo.
- source_word: בַלַּיְלָה
  english_pob_choice: at night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: Expresión temporal natural en español moderno, equivalente al valor adverbial del hebreo.
- source_word: נֵרָהּ
  english_pob_choice: her lamp
  chosen_spanish: su lámpara
  alternatives_spanish:
  - su luz
  - su candil
  lexicon: HALOT
  rationale: «Lámpara» reproduce con precisión el objeto concreto del texto. «Luz» sería más abstracto y «candil» demasiado regional/antiguo para un texto de amplia lectura.
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado final del texto inglés auditado, que mantiene una equivalencia óptima y no registra revisiones sustantivas; se preserva la misma doble ambigüedad léxica de טָעֲמָה y סַחְרָהּ mediante notas alternativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros contextos cuando el hebreo nombra el Tetragrámaton; este versículo no lo contiene.
  - Se prefiere «mercancía» y no «profit/ganancia» para mantener la concreción del sustantivo hebreo.
  - Se evita «Cristo», «Señor» u այլ fórmulas tradicionales no presentes en el texto.
  - La construcción verbal en presente («percibe», «no se apaga») refleja el valor proverbial del hebreo en español natural.
