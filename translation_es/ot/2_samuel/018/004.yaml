translation:
  language: es
  text: 'El rey les dijo[a]: «Lo que les parezca bueno, lo haré». Entonces el rey se puso junto a la puerta[b], y todo el pueblo salió[c] por cientos y por miles.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Lo que es bueno en sus ojos, lo haré». La expresión significa lo que ellos juzgan mejor.'
    reason: lexical_alternative
  - marker: b
    text: O «al lado de la puerta» / «junto a la entrada». El hebreo dice literalmente «a la mano de la puerta», un modismo para indicar una posición al lado de ella.
    reason: lexical_alternative
  - marker: c
    text: Es decir, en unidades militares organizadas.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר יִיטַב בְּעֵינֵיכֶם
  english_pob_choice: What seems good in your eyes
  chosen_spanish: Lo que les parezca bueno
  alternatives_spanish:
  - Lo que sea bueno a sus ojos
  - Lo que ustedes juzguen mejor
  lexicon: HALOT
  rationale: La expresión hebrea usa la imagen idiomática de 'en los ojos' para evaluación o aprobación. En español, 'les parezca bueno' conserva el sentido de discernimiento o juicio sin sonar forzado, aunque pierde la imagen literal; por eso se mantiene en una nota.
- source_word: אֶעֱשֶׂה
  english_pob_choice: I will do
  chosen_spanish: lo haré
  alternatives_spanish:
  - lo haré así
  - eso haré
  lexicon: HALOT
  rationale: El verbo עשה es amplio y aquí expresa simple conformidad del rey con la decisión de ellos. 'Lo haré' es directo, natural y suficientemente amplio.
- source_word: אֶל יַד הַשַּׁעַר
  english_pob_choice: beside the gate
  chosen_spanish: junto a la puerta
  alternatives_spanish:
  - al lado de la puerta
  - junto a la entrada
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'a la mano de la puerta', un modismo de cercanía. 'Junto a la puerta' comunica bien la ubicación en español sin calco incómodo. Se conserva la alternativa literal en nota.
- source_word: וְכָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo de soldados
  lexicon: HALOT
  rationale: Aunque el contexto es militar, el hebreo dice 'todo el pueblo'. 'Pueblo' respeta el término de origen y mantiene el tono narrativo; el contexto de salida en unidades aclara la organización militar.
- source_word: יָצְאוּ
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - marchó
  - salieron
  lexicon: HALOT
  rationale: El verbo יצא significa 'salir' de manera básica. En español, el singular colectivo 'todo el pueblo salió' fluye naturalmente y refleja el movimiento de salida sin añadir matiz militar explícito que el verbo por sí solo no exige.
- source_word: לְמֵאוֹת וְלַאֲלָפִים
  english_pob_choice: by hundreds and by thousands
  chosen_spanish: por cientos y por miles
  alternatives_spanish:
  - en grupos de cientos y de miles
  - por centenas y por millares
  lexicon: HALOT
  rationale: La construcción numérica refleja agrupación organizada, probablemente militar. 'Por cientos y por miles' conserva la estructura paralela del hebreo y es claro en español. La nota puede explicitar que se trata de unidades organizadas.
translation_notes:
  revision_awareness: El texto en español sigue de cerca el sentido y la estructura del POB inglés, manteniendo la imagen idiomática principal mediante una formulación natural. No se observaron revisiones posteriores que alteren la decisión de fondo; se conserva el mismo juicio de equivalencia óptima con notas para las expresiones idiomáticas y de organización militar.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando corresponde; este versículo no lo contiene.
  - Se mantiene 'pueblo' como traducción de הָעָם, evitando sustituirlo por 'tropa' o 'ejército' porque el hebreo no lo dice de forma explícita.
  - Se conserva la puntuación narrativa con comillas españolas y notas al pie marcadas en el texto.
