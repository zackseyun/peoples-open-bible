translation:
  language: es
  text: Ahora bien, un hombre de la casa de Leví fue y tomó por esposa a una hija de Leví[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «una mujer levita». El hebreo dice literalmente «una hija de Leví», es decir, una descendiente femenina de Leví.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - se fue
  lexicon: HALOT
  rationale: En este contexto narrativo, וַיֵּלֶךְ introduce la acción del hombre con un movimiento básico. «Fue» conserva la secuencia verbal sin sobreexplicar el desplazamiento.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un esposo
  lexicon: HALOT
  rationale: אִישׁ designa aquí a un individuo masculino de manera general. «Un hombre» mantiene la anonimidad narrativa y evita anticipar el resultado matrimonial.
- source_word: מִבֵּית לֵוִי
  english_pob_choice: from the house of Levi
  chosen_spanish: de la casa de Leví
  alternatives_spanish:
  - de la familia de Leví
  - de la tribu de Leví
  lexicon: HALOT
  rationale: «Casa de Leví» reproduce la expresión genealógica del hebreo בַּיִת en sentido de linaje o clan. «Familia de Leví» es posible, pero suaviza la forma original; «tribu» amplía demasiado el alcance inmediato.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se casó con
  - tomó por esposa
  lexicon: HALOT
  rationale: לקח conserva su valor básico de «tomar». En un contexto matrimonial, el español necesita una aclaración para que el verbo no quede ambiguo; por eso se expresa como «tomó por esposa».
- source_word: בַּת לֵוִי
  english_pob_choice: a daughter of Levi
  chosen_spanish: a una hija de Leví
  alternatives_spanish:
  - a una mujer levita
  - a la hija de Leví
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «hija de Leví» y puede referirse a una descendiente femenina de Leví. «Hija de Leví» conserva la forma genética y el paralelo con «casa de Leví»; la alternativa «mujer levita» interpreta el sentido y se reserva para nota.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que existe alto acuerdo con el control cruzado. La presente redacción mantiene esa lectura, preservando la secuencia narrativa, el valor genealógico de «casa de Leví» y la literalidad de «hija de Leví» con una nota de alternativa léxica.
  spanish_consistency_notes:
  - Se mantiene «Leví» como forma propia del nombre tribal en español.
  - Se evita «SEÑOR» o cualquier sustituto porque el verso no contiene el tetragrámaton.
  - «Tomó por esposa» aclara el sentido matrimonial de לקח sin reemplazar el núcleo léxico de «tomó».
  - La nota[a] debe anclar la posible lectura «mujer levita» como alternativa aceptada pero no primaria.
