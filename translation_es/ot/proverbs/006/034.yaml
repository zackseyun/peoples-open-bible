    reason: lexical_alternative
  revision_rationale: Se corrige la colocación de las notas para que correspondan exactamente a las palabras que explican. Además, se ajusta «no tendrá compasión» a «no tendrá misericordia» por mejor alineación con la decisión principal del POB inglés («show no mercy») y por un registro español bíblico más natural. También se usa «Pues» como enlace explicativo más fluido en estilo proverbial; este cambio es menor pero mejora la legibilidad.
