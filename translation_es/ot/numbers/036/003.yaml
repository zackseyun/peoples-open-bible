translation:
  language: es
  text: Y si llegan a ser esposas de alguno de los hijos de las tribus de los hijos de Israel, entonces su herencia será quitada de la herencia de nuestros padres y añadida a la herencia de la tribu a la que pertenezcan, y será quitada de la porción asignada[a] de nuestra herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “del lote de nuestra herencia”. El hebreo dice literalmente “del lote”, refiriéndose a la porción asignada por sorteo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: if they become
  chosen_spanish: Y si llegan a ser
  alternatives_spanish:
  - Y serán
  - Y si son
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente coordinada, el contexto expresa una condición hipotética; por eso se traduce con 'si'. 'Llegan a ser' conserva el valor resultativo sin sonar forzado en español.
- source_word: לְאֶחָד
  english_pob_choice: to one
  chosen_spanish: de uno
  alternatives_spanish:
  - para uno
  - a uno
  lexicon: HALOT
  rationale: En un contexto matrimonial, el destinatario de la unión se expresa naturalmente en español con 'de uno' al describir el vínculo con un hombre concreto.
- source_word: מִבְּנֵי שִׁבְטֵי בְנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of the tribes of the sons of Israel
  chosen_spanish: de los hijos de las tribus de los hijos de Israel
  alternatives_spanish:
  - de los miembros de las tribus de Israel
  - de las tribus de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la estructura genealógica y tribal del hebreo, sin aplanarla a 'israelitas', porque el texto enfatiza la pertenencia tribal dentro de Israel.
- source_word: לְנָשִׁים
  english_pob_choice: wives
  chosen_spanish: esposas
  alternatives_spanish:
  - mujeres
  - como esposas
  lexicon: HALOT
  rationale: En español, 'esposas' comunica el sentido matrimonial con claridad y dignidad; evita la ambigüedad de 'mujeres'.
- source_word: וְנִגְרְעָה
  english_pob_choice: will be taken away
  chosen_spanish: será quitada
  alternatives_spanish:
  - será disminuida
  - será reducida
  lexicon: HALOT
  rationale: El nifal de גרע expresa pérdida efectiva de porción. 'Será quitada' reproduce la fuerza de desposesión mejor que un mero debilitamiento cuantitativo.
- source_word: נַחֲלָתָן
  english_pob_choice: their inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su heredad
  - su posesión hereditaria
  lexicon: HALOT
  rationale: '''Herencia'' es el término bíblico más transparente y coherente en este pasaje de reparto de tierra.'
- source_word: מִנַּחֲלַת אֲבֹתֵינוּ
  english_pob_choice: from the inheritance of our fathers
  chosen_spanish: de la herencia de nuestros padres
  alternatives_spanish:
  - de la herencia de nuestros antepasados
  - de nuestra herencia ancestral
  lexicon: HALOT
  rationale: Se mantiene la referencia patriarcal y tribal del hebreo con 'padres', que en este contexto ancestral es idiomática en español bíblico y contemporáneo.
- source_word: וְנוֹסַף
  english_pob_choice: and added
  chosen_spanish: y añadida
  alternatives_spanish:
  - y se añadirá
  - y agregada
  lexicon: HALOT
  rationale: El participio/resultado se incorpora al predicado en español de forma natural, conservando la idea de transferencia efectiva a otra porción de tierra.
- source_word: עַל נַחֲלַת הַמַּטֶּה
  english_pob_choice: to the inheritance of the tribe
  chosen_spanish: a la herencia de la tribu
  alternatives_spanish:
  - sobre la herencia de la tribu
  - a la herencia tribal
  lexicon: HALOT
  rationale: '''Tribu'' traduce מַטֶּה en su sentido administrativo y territorial. ''A la herencia de la tribu'' refleja el movimiento de adición al patrimonio tribal.'
- source_word: אֲשֶׁר תִּהְיֶינָה לָהֶם
  english_pob_choice: to which they belong
  chosen_spanish: a la que pertenezcan
  alternatives_spanish:
  - a la que pertenecerán
  - en la que estén
  lexicon: HALOT
  rationale: La cláusula relativa indica la tribu del marido al que se unen; 'pertenezcan' comunica afiliación vigente sin forzar el tiempo verbal.
- source_word: וּמִגֹּרַל
  english_pob_choice: from the allotted portion
  chosen_spanish: del lote
  alternatives_spanish:
  - de la suerte
  - de la porción asignada por sorteo
  lexicon: HALOT
  rationale: Se mantiene la metáfora concreta de 'lote/suerte' del hebreo. En nota se aclara que se trata de la porción asignada por sorteo, evitando perder el trasfondo legal del reparto.
- source_word: נַחֲלָתֵנוּ
  english_pob_choice: of our inheritance
  chosen_spanish: de nuestra herencia
  alternatives_spanish:
  - de nuestra posesión hereditaria
  - de nuestra heredad
  lexicon: HALOT
  rationale: Se conserva la repetición de נַחֲלָה con la misma palabra base 'herencia', para mantener cohesión léxica con el resto del versículo.
- source_word: יִגָּרֵעַ
  english_pob_choice: it will be taken away
  chosen_spanish: será quitada
  alternatives_spanish:
  - será disminuida
  - será retirada
  lexicon: HALOT
  rationale: La repetición del mismo verbo refuerza la pérdida de porción. Reproducir 'será quitada' mantiene ese énfasis retórico en español.
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el texto hebreo y el expediente inglés: conserva la estructura condicional implícita, mantiene la repetición de נַחֲלָה con ''herencia'' y refleja la fuerza de desposesión de גרע con ''será quitada''. La nota reproduce la alternativa léxica registrada en el POB inglés para גּוֹרָל.'
  spanish_consistency_notes:
  - Se usa 'herencia' de manera uniforme para נַחֲלָה en todo el versículo.
  - Se conserva 'tribu' para מַטֶּה en el sentido de distribución territorial.
  - '''Esposas'' traduce לְנָשִׁים en un registro claro y no arcaizante.'
  - '''Lote'' se usa con nota explicativa para mantener el valor técnico de גּוֹרָל sin perder naturalidad en español.'
