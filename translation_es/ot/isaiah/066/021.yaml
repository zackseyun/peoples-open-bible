translation:
  language: es
  text: Y aún de ellos tomaré para sacerdotes y para levitas[a][b], dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de entre ellos’; el hebreo deja implícito el antecedente tomado del contexto anterior.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse ‘como sacerdotes y como levitas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And even
  chosen_spanish: Y aun
  alternatives_spanish:
  - Y también
  - Aun
  lexicon: HALOT
  rationale: La partícula combina continuación con énfasis. 'Y aun' conserva la relación aditiva y el matiz sorprendente sin sonar forzada en español.
- source_word: מֵהֶם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de en medio de ellos
  - de entre ellos
  lexicon: HALOT
  rationale: La preposición מן con sufijo indica selección dentro de un grupo. 'De ellos' mantiene la forma breve y deja el valor partitivo claro por el verbo y el contexto.
- source_word: אֶקַּח
  english_pob_choice: I will take some
  chosen_spanish: tomaré
  alternatives_spanish:
  - tomaré algunos
  - elegiré
  lexicon: HALOT
  rationale: לקח significa literalmente 'tomar', pero aquí expresa tomar para destinar. En español, el objeto implícito queda suficientemente indicado por la frase de destino, sin añadir 'algunos' que no está en el hebreo.
- source_word: לַכֹּהֲנִים
  english_pob_choice: for priests
  chosen_spanish: para sacerdotes
  alternatives_spanish:
  - como sacerdotes
  - a sacerdotes
  lexicon: HALOT
  rationale: ל marca designación o destinación. 'Para sacerdotes' reproduce esa función de asignación y usa el término español común y reverente para כֹּהֲנִים.
- source_word: לַלְוִיִּם
  english_pob_choice: for Levites
  chosen_spanish: para levitas
  alternatives_spanish:
  - como levitas
  - a levitas
  lexicon: HALOT
  rationale: Se conserva la designación paralela de la línea hebrea. 'Levitas' es el término estándar en español y mantiene la correspondencia con la clase levítica.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - dijo Yahvé
  - declara Yahvé
  lexicon: HALOT
  rationale: La fórmula profética usa el perfecto אמר con valor enunciativo presente. Se conserva 'dice' y se traduce el nombre divino como 'Yahvé' conforme al criterio editorial del proyecto.
theological_decisions:
- issue: Alcance del referente implícito en 'de ellos'
  english_pob_reading: The verse is translated without specifying the antecedent beyond 'them,' allowing the broader context to indicate that people from the nations are in view.
  chosen_spanish_reading: La traducción deja el antecedente implícito en 'de ellos', sin precisarlo más allá del contexto inmediato.
  alternative_spanish_readings:
  - de entre ellos
  - de algunos de ellos
  rationale: El hebreo no repite el antecedente. Mantener la referencia implícita conserva la tensión exegética y evita cerrar el alcance con una aclaración que el texto no da.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
- issue: Naturaleza de la designación 'para sacerdotes y para levitas'
  english_pob_reading: '''for priests and for Levites'' may also be rendered ''as priests and as Levites.'''
  chosen_spanish_reading: '''para sacerdotes y para levitas'' se mantiene como traducción principal, con la posibilidad de entender también una designación funcional.'
  alternative_spanish_readings:
  - como sacerdotes y como levitas
  - para ejercer como sacerdotes y como levitas
  rationale: El hebreo con ל expresa destinación/nombramiento. En español, 'para' reproduce bien la estructura y permite la lectura funcional sin imponerla como paráfrasis.
  doctrine_reference: Nombramiento funcional según el valor de ל en contextos de designación.
translation_notes:
  revision_awareness: Se corrigió el fallo de validación anterior asegurando que ambos marcadores de nota aparezcan exactamente en el texto español. La redacción mantiene la economía del hebreo, conserva la fórmula profética y no añade explícitamente 'algunos' porque esa cuantificación ya queda implícita en el verbo y en la selección desde un grupo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el estándar del proyecto para יְהוָה.
  - '''Sacerdotes'' y ''levitas'' conservan el valor de designación sin imponer una paráfrasis interpretativa.'
  - La partícula 'y aun' refleja tanto continuidad como énfasis.
  - Las notas al pie están ancladas y numeradas de forma única, sin reutilizar marcadores.
