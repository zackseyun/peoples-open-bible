translation:
  language: es
  text: Como el deseo de un eunuco de desflorar a una joven,[b] así es el que dicta juicios por la fuerza.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con violencia». La frase griega ἐν βίᾳ puede enfatizar la coerción o la acción violenta.
    reason: lexical_alternative
  - marker: b
    text: La imagen del proverbio puede resaltar ya sea la impropiedad de dictar juicios por la fuerza, ya sea su carácter absurdo, frustrado o estéril.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιθυμία
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - ansia
  - codicia
  - lujuria
  lexicon: BDAG
  rationale: ἐπιθυμία puede expresar deseo o anhelo en sentido amplio. «Deseo» conserva la comparación proverbial sin cargar de antemano el término con una intensificación moral que el griego no explicita por sí solo.
- source_word: εὐνούχου
  english_pob_choice: eunuch’s
  chosen_spanish: de un eunuco
  alternatives_spanish:
  - de un castrado
  - de un hombre castrado
  lexicon: BDAG
  rationale: «Eunuco» es el equivalente directo y tradicional para εὐνοῦχος. Mantiene la imagen cultural y física del dicho sin sustituirla por una glosa explicativa que debilitaría la fuerza del símil.
- source_word: ἀποπαρθενῶσαι
  english_pob_choice: to deflower
  chosen_spanish: desflorar
  alternatives_spanish:
  - quitar la virginidad a
  - violar la virginidad de
  lexicon: LSJ
  rationale: El verbo apunta literalmente a privar de virginidad a una muchacha. «Desflorar» es la opción española más cercana y concisa, y preserva la concreción sexual del verbo mejor que una perífrasis más explicativa.
- source_word: νεάνιδα
  english_pob_choice: a young woman
  chosen_spanish: a una joven
  alternatives_spanish:
  - a una muchacha
  - a una doncella
  lexicon: BDAG
  rationale: νεάνιδα designa a una mujer joven. «Joven» es claro, actual y suficiente para el sentido del pasaje; «muchacha» o «doncella» serían posibles, pero una tiene un matiz más coloquial y la otra es más tradicional/arcaica.
- source_word: ὁ ποιῶν
  english_pob_choice: one who renders
  chosen_spanish: el que dicta
  alternatives_spanish:
  - el que hace
  - el que realiza
  - el que pronuncia
  lexicon: BDAG
  rationale: Aunque literalmente es «el que hace», el complemento κρίματα exige un matiz judicial. «Dicta» comunica de modo natural la acción de emitir juicios o decisiones en español y conserva la agencia activa del participio.
- source_word: ἐν βίᾳ
  english_pob_choice: by force
  chosen_spanish: por la fuerza
  alternatives_spanish:
  - con violencia
  - violentamente
  lexicon: BDAG
  rationale: La frase puede expresar coerción o acción violenta. «Por la fuerza» es una forma idiomática y clara en español que mantiene el carácter coercitivo del original sin sobredeterminar el matiz exacto.
- source_word: κρίματα
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - decisiones judiciales
  - justicia
  lexicon: BDAG
  rationale: El plural κρίματα se refiere a decisiones judiciales o actos de juicio. «Juicios» es la forma más directa y transparente en español, y conserva el paralelismo jurídico del proverbio.
theological_decisions:
- issue: Sentido moral del símil
  english_pob_reading: The proverb condemns coercive or violent administration of judgment while leaving room for the nuance of futility or incongruity.
  chosen_spanish_reading: El proverbio presenta como algo profundamente impropio el dictar juicios por la fuerza, sin cerrar la posibilidad de que también se enfatice lo absurdo o estéril de esa acción.
  alternative_spanish_readings:
  - La comparación podría subrayar sobre todo la inutilidad o imposibilidad del acto.
  - La comparación podría subrayar únicamente la violencia y la injusticia del proceder.
  rationale: El griego ofrece un símil sin explicación adicional. La traducción conserva la imagen y la ambigüedad interpretativa, evitando resolver de manera excesiva si el énfasis principal recae en la impropiedad moral, la absurdidad o la frustración del acto.
  doctrine_reference: Conservar la tensión interpretativa del proverbio sin domesticarla.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete y el criterio óptimo-equivalente de la versión inglesa auditada. Se mantuvo la imagen proverbial, se conservó el matiz judicial de κρίματα y se dejó visible la ambigüedad de ἐν βίᾳ mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se prefirió «eunuco» y no una glosa más explicativa para no debilitar la imagen proverbial.
  - Se optó por «juicios» para κρίματα, manteniendo el tono jurídico del pasaje.
  - «Por la fuerza» funciona en español como equivalente natural de ἐν βίᾳ y preserva la posibilidad de coerción o violencia.
