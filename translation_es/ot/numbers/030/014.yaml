translation:
  language: es
  text: Todo voto y todo juramento vinculante de afligir el alma[a], su marido podrá confirmarlo, o su marido podrá anularlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "negarse a sí mismo" o "humillarse". El hebreo dice literalmente: "afligir el alma".'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵדֶר
  english_pob_choice: vow
  chosen_spanish: voto
  alternatives_spanish:
  - voto solemne
  - promesa votiva
  lexicon: HALOT
  rationale: נֵדֶר en este contexto legal-cultual se refiere a un compromiso hecho ante Dios. 'Voto' sería el equivalente más directo; 'voto' en español bíblico moderno mantiene esa fuerza. 'Voto solemne' explicita el matiz sagrado, pero añade algo que el hebreo no dice.
- source_word: שְׁבֻעַת אִסָּר
  english_pob_choice: binding oath
  chosen_spanish: juramentación de afligir el alma
  alternatives_spanish:
  - juramento vinculante
  - juramento de obligación
  lexicon: HALOT
  rationale: La expresión hebrea combina 'juramento' con la idea de vínculo/restricción. Mantengo 'juramentación' para reflejar el sustantivo formal y su carácter jurídico. Evito diluir el conjunto en una sola glosa interpretativa; el peso de אִסָּר queda recogido por el contexto de obligación.
- source_word: לְעַנֹּת נָפֶשׁ
  english_pob_choice: to afflict the soul
  chosen_spanish: de afligir el alma
  alternatives_spanish:
  - de negarse a sí mismo
  - de humillarse
  lexicon: HALOT
  rationale: 'Conservo el giro idiomático visible: לְעַנֹּת נָפֶשׁ. ''Afligir el alma'' reproduce la imagen hebrea con naturalidad bíblica en español, sin sustituirla por una interpretación más explícita como ''negarse a sí mismo''.'
- source_word: נָפֶשׁ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - uno mismo
  - vida
  - persona
  lexicon: HALOT
  rationale: En esta fórmula, 'alma' preserva tanto la tradición semántica como el paralelismo del hebreo. Aunque נֶפֶשׁ también puede ser 'persona' o 'vida', aquí la expresión fija favorece 'alma'.
- source_word: אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  - su hombre
  lexicon: HALOT
  rationale: En contexto matrimonial legal, אִישׁ con sufijo de 3ª femenina singular significa 'su marido'. 'Marido' conserva un tono legal y relacional adecuado; 'esposo' sería también posible, pero 'marido' encaja mejor con el registro jurídico.
- source_word: יְקִימֶנּוּ
  english_pob_choice: may confirm it
  chosen_spanish: podrá confirmarlo
  alternatives_spanish:
  - podrá establecerlo
  - podrá mantenerlo en vigor
  lexicon: HALOT
  rationale: El hiphil de קום expresa hacer que el voto permanezca válido. 'Confirmarlo' comunica bien esa validez legal en español contemporáneo y conserva la idea de sostenerlo en pie.
- source_word: יְפֵרֶנּוּ
  english_pob_choice: may annul it
  chosen_spanish: podrá anularlo
  alternatives_spanish:
  - podrá invalidarlo
  - podrá romperlo
  lexicon: HALOT
  rationale: El hiphil de פרר tiene fuerza jurídica de invalidación. 'Anularlo' es el equivalente español más natural para un acto legal que deja sin efecto un voto.
- source_word: כָּל ... וְכָל
  english_pob_choice: Every ... and every ...
  chosen_spanish: Todo ... y toda ...
  alternatives_spanish:
  - Cada ... y cada ...
  - Todo ... y todo ...
  lexicon: HALOT
  rationale: La repetición de כָּל intensifica la distribución sobre ambas categorías. 'Todo ... y toda ...' conserva esa amplitud en español; ajusté el género según el sustantivo correspondiente.
translation_notes:
  revision_awareness: El texto sigue el testimonio masorético de Números 30:14 y conserva la tensión idiomática de לְעַנֹּת נָפֶשׁ. Frente a la versión inglesa, se prefirió un español bíblico claro ('alma', 'marido', 'anularlo') sin perder el marco jurídico del verso ni forzar una paráfrasis devocional.
  spanish_consistency_notes:
  - Se mantuvo 'alma' para נָפֶשׁ en la expresión fija, en coherencia con el valor idiomático resaltado por el POB inglés.
  - '''Marido'' se usó de forma consistente para אִישָׁהּ en contexto legal matrimonial.'
  - '''Confirmarlo'' y ''anularlo'' preservan el contraste jurídico entre validar e invalidar el voto.'
  - La nota textual deja visible la alternativa interpretativa principal sin reemplazar la imagen hebrea.
