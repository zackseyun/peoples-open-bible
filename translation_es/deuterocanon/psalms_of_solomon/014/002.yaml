translation:
  language: es
  text: Los santos del Señor vivirán en él para siempre[a]; el paraíso del Señor, los árboles de la vida[b], son sus santos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los santos», o «los piadosos», para ὅσιοι.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «los árboles» en plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσιοι
  english_pob_choice: holy ones
  chosen_spanish: santos
  alternatives_spanish:
  - santos del Señor
  - piadosos
  - devotos
  lexicon: LSJ
  rationale: ὅσιοι designa a personas marcadas por piedad o santidad. En español, «santos» comunica bien esa cualidad religiosa sin necesidad de una glosa más pesada. Se conserva la posibilidad interpretativa de «piadosos/devotos» en nota, porque el término no exige una equivalencia eclesiástica técnica.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Maestro
  lexicon: LSJ
  rationale: Se sigue la convención del texto base para κύριος como «Señor». En español, «del Señor» resulta natural y mantiene el registro reverente del pasaje.
- source_word: ζήσονται
  english_pob_choice: will live
  chosen_spanish: vivirán
  alternatives_spanish:
  - estarán vivos
  - tendrán vida
  lexicon: LSJ
  rationale: El futuro de ζάω se expresa con naturalidad como «vivirán». Es la opción más directa y adecuada para un texto poético y formal.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - con él
  - por él
  lexicon: LSJ
  rationale: La preposición ἐν se conserva como «en», y el antecedente más cercano y natural en este contexto es el Señor. «En él» preserva la idea de vida hallada dentro de la relación con él, sin resolver la expresión en una paráfrasis.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  lexicon: LSJ
  rationale: En español idiomático, «para siempre» comunica bien el valor durativo de εἰς τὸν αἰῶνα. Evita la literalidad áspera de «para el siglo/edad».
- source_word: παράδεισος
  english_pob_choice: paradise
  chosen_spanish: paraíso
  alternatives_spanish:
  - jardín
  lexicon: LSJ
  rationale: «Paraíso» conserva el tono elevado y escatológico del griego mejor que «jardín». En español cristiano es plenamente inteligible y fiel al matiz del término.
- source_word: τὰ ξύλα τῆς ζωῆς
  english_pob_choice: the trees of life
  chosen_spanish: los árboles de la vida
  alternatives_spanish:
  - el árbol de la vida
  - la madera de la vida
  lexicon: LSJ
  rationale: Se mantiene el plural griego τὰ ξύλα con «los árboles». Aunque la imaginería bíblica suele asociarse al singular, aquí el griego es claramente plural y no debe armonizarse artificialmente.
- source_word: ὅσιοι αὐτοῦ
  english_pob_choice: his holy ones
  chosen_spanish: sus santos
  alternatives_spanish:
  - sus santos varones
  - sus piadosos
  lexicon: LSJ
  rationale: La repetición de ὅσιοι al final funciona como predicado nominal. «Sus santos» permite mantener la identificación poética entre el paraíso del Señor, los árboles de la vida y sus santos, sin convertirla en una simple relación de posesión.
theological_decisions:
- issue: Lectura de la segunda cláusula sin verbo explícito
  english_pob_reading: The paradise of the Lord, the trees of life, are his holy ones.
  chosen_spanish_reading: el paraíso del Señor, los árboles de la vida, son sus santos.
  alternative_spanish_readings:
  - el paraíso del Señor pertenece a sus santos
  - sus santos están en el paraíso del Señor, los árboles de la vida
  rationale: El griego presenta una serie de nominativos en aposición sin verbo expreso. La traducción elegida conserva esa identificación poética y no la reduce a posesión o localización, respetando la tensión metafórica del original.
  doctrine_reference: Preservar la tensión poética y teológica sin resolverla de manera interpretativa excesiva.
- issue: Antecedente de ἐν αὐτῷ
  english_pob_reading: in him
  chosen_spanish_reading: en él
  alternative_spanish_readings:
  - en ello
  - en ella
  rationale: El contexto inmediato del texto base vincula la vida a la figura del Señor, y la formulación española mantiene esa conexión sin añadir explicaciones no presentes en la línea griega suministrada.
  doctrine_reference: Mantener la relación reverente de vida con Dios/Señor tal como la expresión recibida la presenta.
translation_notes:
  revision_awareness: 'La versión española toma en cuenta el historial de revisión del texto inglés: se rechazó la lectura que reubicaba ἐν αὐτῷ como «por ello» y se mantuvo la comprensión recibida de la cláusula con «vivirán en él». En el español, sin embargo, la nota lexical deja abierta la alternativa de ὅσιοι como «santos/piadosos», y se conserva el plural de «árboles» para no suavizar el griego. También se preserva la construcción nominal de la segunda cláusula para no convertirla en una paráfrasis posesiva o locativa.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en coherencia con el registro bíblico estándar del proyecto.
  - Se mantiene «paraíso» y no «jardín» para conservar el matiz escatológico.
  - Se evita «Cristo» o terminología litúrgica no presente en el griego.
  - El plural «árboles de la vida» se conserva explícitamente en el texto y se anota.
  - La cláusula final queda como identificación poética, no como simple posesión.
