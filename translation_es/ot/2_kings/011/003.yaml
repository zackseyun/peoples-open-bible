translation:
  language: es
  text: Y él estaba con ella en la casa de Yahvé[a], oculto durante seis años, mientras Atalía reinaba sobre el país.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el templo de Yahvé». El hebreo dice literalmente «en la casa de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And he was
  chosen_spanish: Y él estaba
  alternatives_spanish:
  - Y él fue
  - Y él permanecía
  lexicon: HALOT
  rationale: El wayyiqtol de היה introduce el estado narrativo resultante. En español, «estaba» comunica ese estado continuo con naturalidad y evita un pasado puntual demasiado fuerte.
- source_word: אִתָּהּ
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - junto a ella
  - con ella misma
  lexicon: HALOT
  rationale: El sufijo femenino singular señala a la mujer referida en el contexto. «Con ella» preserva la referencia sin sobreexplicar en el cuerpo principal.
- source_word: בֵּית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «casa de Yahvé». Se mantiene «casa» para conservar la imagen original; «templo» sería contextual pero menos literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio doctrinal del proyecto de transliterar el nombre divino como «Yahvé» en el texto principal, en lugar de sustituirlo por un título.
- source_word: מִתְחַבֵּא
  english_pob_choice: hidden
  chosen_spanish: oculto
  alternatives_spanish:
  - escondido
  - en ocultamiento
  lexicon: HALOT
  rationale: El participio hitpael expresa estado de ocultación ligado al sujeto. «Oculto» refleja bien el matiz pasivo/reflexivo adoptado por la revisión inglesa, y suena natural en español formal.
- source_word: שֵׁשׁ שָׁנִים
  english_pob_choice: for six years
  chosen_spanish: durante seis años
  alternatives_spanish:
  - por seis años
  - seis años
  lexicon: HALOT
  rationale: La duración temporal se expresa con claridad mediante «durante seis años», que conserva el valor de extensión del hebreo sin sonar forzado.
- source_word: וַעֲתַלְיָה
  english_pob_choice: while Athaliah
  chosen_spanish: mientras Atalía
  alternatives_spanish:
  - y Atalía
  - cuando Atalía
  lexicon: HALOT
  rationale: La conjunción aporta simultaneidad con la cláusula anterior. «Mientras» hace explícito el trasfondo temporal sin añadir contenido ajeno.
- source_word: מֹלֶכֶת
  english_pob_choice: was reigning
  chosen_spanish: reinaba
  alternatives_spanish:
  - estaba reinando
  - gobernaba
  lexicon: HALOT
  rationale: El participio femenino singular expresa acción en curso. «Reinaba» es la forma más natural y conserva la duratividad del contexto narrativo.
- source_word: עַל הָאָרֶץ
  english_pob_choice: over the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el país
  - sobre la tierra
  lexicon: HALOT
  rationale: Aquí הָאָרֶץ apunta al ámbito del dominio político, no a la tierra como planeta. «La tierra» reproduce la amplitud semántica hebrea; en español bíblico también puede leerse como el territorio bajo su gobierno.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Se conserva el nombre propio divino en español como «Yahvé», conforme al criterio del proyecto, en vez de enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La pauta inglesa revisada pasó de 'hiding' a 'hidden' para reflejar mejor el sentido pasivo/reflexivo del participio hebreo. En español se recoge ese ajuste con «oculto», evitando una forma activa que sugeriría una acción sostenida por el sujeto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, siguiendo la terminología base del proyecto.
  - «Casa de Yahvé» conserva la metáfora literal hebrea; la nota permite la alternativa contextual «templo».
  - «Atalía» usa la forma española habitual del nombre propio.
  - «La tierra» se conserva como equivalente amplio de הָאָרֶץ sin reducirlo innecesariamente a «país».
  - La estructura general sigue el orden narrativo del hebreo sin rigidizar el español.
