translation:
  language: es
  text: Mantén estricta vigilancia sobre una hija obstinada[a], no sea que, al encontrar libertad para sí misma, haga uso de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «sobre una hija obstinada, refuerza la guardia, para que no, al encontrar libertad para sí misma, haga uso de ella». El texto es breve; «ella» se refiere a la libertad u holgura hallada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ ... θυγατρί
  english_pob_choice: over a ... daughter
  chosen_spanish: sobre una hija
  alternatives_spanish:
  - respecto de una hija
  - con relación a una hija
  lexicon: LSJ
  rationale: ἐπί con dativo expresa aquí el objeto sobre el cual recae la vigilancia o la supervisión. En español, «sobre» conserva bien esa idea de custodia encima de alguien.
- source_word: ἀδιατρέπτως
  english_pob_choice: headstrong
  chosen_spanish: obstinada
  alternatives_spanish:
  - inflexible
  - indócil
  - terca
  lexicon: LSJ
  rationale: El adverbio presenta el carácter de la hija como no fácilmente vuelto o persuadido. «Obstinada» comunica mejor en español la fuerza conductual del término sin sonar antinatural.
- source_word: στερέωσον φυλακήν
  english_pob_choice: keep strict watch
  chosen_spanish: mantén una vigilancia estricta
  alternatives_spanish:
  - establece una guardia firme
  - pon una guardia firme
  - asegura la vigilancia
  lexicon: LSJ
  rationale: El imperativo más el sustantivo significan literalmente hacer firme una guardia. En español, «mantén una vigilancia estricta» conserva la fuerza intensiva y suena natural y reverente.
- source_word: ἵνα μὴ
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - no sea que
  lexicon: Greek grammar
  rationale: La cláusula expresa finalidad negativa. «Para que no» es claro en español y preserva la relación causal-final sin agregar paráfrasis.
- source_word: εὑροῦσα ἄνεσιν
  english_pob_choice: finding freedom
  chosen_spanish: al encontrar libertad
  alternatives_spanish:
  - al hallar descanso
  - al hallar alivio
  - al encontrar holgura
  lexicon: LSJ
  rationale: ἄνεσις puede ser alivio, descanso o libertad de restricción. En este contexto de custodia, «libertad» capta mejor la idea de soltarse del freno.
- source_word: ἑαυτῇ
  english_pob_choice: for herself
  chosen_spanish: para sí misma
  alternatives_spanish:
  - para ella misma
  - en beneficio propio
  lexicon: Greek grammar
  rationale: El dativo reflexivo se expresa de manera idiomática en español como «para sí misma», manteniendo el matiz de autodestinación.
- source_word: χρήσηται
  english_pob_choice: she make use of it
  chosen_spanish: no la use
  alternatives_spanish:
  - no se aproveche de ella
  - no haga uso de ella
  lexicon: LSJ
  rationale: χράομαι significa usar o hacer uso de. Como el contexto retoma la libertad/holgura hallada, el pronombre femenino «la» en español hace referencia natural a esa libertad. La negación en la cláusula final está expresada por «no».
theological_decisions:
- issue: Tono disciplinario y familiar del proverbio
  english_pob_reading: Keep strict watch over a headstrong daughter, lest, finding freedom for herself, she make use of it.
  chosen_spanish_reading: Mantén una vigilancia estricta sobre una hija obstinada, para que, al encontrar libertad para sí misma, no la use.
  alternative_spanish_readings:
  - Vigila con firmeza a una hija obstinada, para que no abuse de la libertad que encuentre.
  - Pon una guardia firme sobre una hija obstinada, no sea que, al hallar libertad para sí misma, la use.
  rationale: La lectura conserva el consejo sapiencial de vigilancia paterna sin suavizar la dureza del original. «Mantén una vigilancia estricta» refleja la intensidad del mandato y «no la use» preserva la referencia al objeto encontrado, evitando moralizar o expandir el sentido.
  doctrine_reference: Sabiduría sapiencial; ética familiar en literatura deuterocanónica.
translation_notes:
  revision_awareness: El pasaje griego presenta una formulación breve y algo abrupta. Se siguió la lectura inglesa auditada en cuanto al sentido general, pero se ajustó el español para conservar el objeto implícito de χρήσηται como femenino («la»), ya que remite naturalmente a ἄνεσιν. No se detectaron revisiones posteriores que alteraran la sustancia del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - «Libertad» se usa aquí para ἄνεσις por el contexto de restricción y vigilancia; no implica una traducción teológica más amplia.
  - Se conserva un registro formal y sapiencial, evitando una paráfrasis moralizante.
