review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: causalidad divina en מַצְמִיחַ, provisión de hierba para el ganado, vegetación para la actividad humana, y el resultado de sacar pan de la tierra. Sin embargo, la nota al pie está mal anclada: la alternativa «para la humanidad» corresponde a «del hombre», no a «ganado». Además, «para sacar pan de la tierra» es comprensible, pero «para que la tierra produzca pan» o «para sacar de la tierra pan» sería más natural; aun así, la reparación imprescindible es el anclaje de la nota.'
  spanish_quality_summary: El español es claro y digno, pero el anclaje erróneo de la nota crea confusión lectora. «Hace brotar» y «ganado» son buenas opciones. «Para el trabajo del hombre» es aceptable, aunque algo menos formalmente ambiguo que «para el servicio del hombre». La frase final suena mejor en español con «de la tierra» más cerca de «pan» o con una formulación más idiomática.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Hombre» para אָדָם genérico sigue el audit trail inglés, con alternativa inclusiva en nota. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre «ganado» pero su contenido explica «hombre / humanidad».
    rationale: Esto altera la correspondencia entre texto y nota y puede hacer pensar erróneamente que la alternativa afecta a «ganado». La marca debe ir en «hombre[a]».
  - severity: low
    issue: «Para sacar pan de la tierra» es algo tosco en español.
    rationale: Aunque no es infiel, suena menos natural que alternativas como «para sacar de la tierra pan» o «para que la tierra produzca pan». No requiere adjudicación compleja y puede mejorarse en la revisión.
  revised_spanish_text: Hace brotar hierba para el ganado, y plantas para el trabajo del hombre[a], para sacar de la tierra pan.
  revised_footnotes:
  - marker: a
    text: O «para la humanidad». El hebreo usa אָדָם («hombre») en sentido genérico y representativo.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda a «hombre», que es donde recae la alternativa inclusiva documentada por el audit trail inglés. También se suaviza levemente la frase final a un orden más natural en español sin cambiar el sentido fuente.
