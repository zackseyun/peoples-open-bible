translation:
  language: es
  text: Y el rey y los gobernantes les juraron esto[a]; entonces él salió de la fortaleza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “sobre estas condiciones”, haciendo explícito que el juramento se refería a los términos previamente acordados.'
    reason: lexical_alternative
  - marker: b
    text: El griego tiene un verbo singular (“salió”), aunque el contexto inmediato podría llevar a algunos a entender un sujeto más amplio o colectivo; compárese “salieron”.
    reason: alternative_reading
lexical_decisions:
- source_word: ὤμοσεν
  english_pob_choice: swore
  chosen_spanish: juraron
  alternatives_spanish:
  - hicieron un juramento
  - juró
  lexicon: BDAG
  rationale: ὄμνυμι expresa prestar juramento. En español, 'juraron' comunica con naturalidad el acto solemne y conserva el valor jurídico del griego.
- source_word: ὁ βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: BDAG
  rationale: Traducción directa y natural de βασιλεύς en narrativa histórica.
- source_word: οἱ ἄρχοντες
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los jefes
  - los oficiales
  lexicon: BDAG
  rationale: ἄρχοντες puede abarcar autoridades o dirigentes. 'Gobernantes' mantiene el sentido político sin restringirlo demasiado.
- source_word: ἐπὶ τούτοις
  english_pob_choice: this / on these terms
  chosen_spanish: esto
  alternatives_spanish:
  - sobre estas condiciones
  - en estos términos
  lexicon: BDAG
  rationale: La frase remite a las condiciones ya establecidas. En el cuerpo del texto, 'esto' es fluido; la alternativa más explícita queda reflejada en la nota.
- source_word: ἐξῆλθεν
  english_pob_choice: he came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió él
  - salieron
  lexicon: BDAG
  rationale: El verbo aoristo singular se rinde naturalmente con 'salió'. En español, el sujeto puede quedar implícito sin perder claridad.
- source_word: τοῦ ὀχυρώματος
  english_pob_choice: the stronghold
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - el fuerte
  - la plaza fuerte
  lexicon: LSJ
  rationale: ὀχύρωμα designa un lugar fortificado. 'Fortaleza' es claro y idiomático en español, y conserva bien el campo militar.
translation_notes:
  revision_awareness: Texto revisado a partir del griego de Swete (1909) y del rastro auditado en inglés. No se requieren cambios de fondo respecto al sentido del versículo; se conservó la ambigüedad del sujeto singular en la segunda cláusula mediante una nota.
  spanish_consistency_notes:
  - Se mantuvo 'rey' y 'gobernantes' en registro político-histórico, sin introducir términos eclesiásticos.
  - '''Fortaleza'' se eligió como equivalente natural de ὀχύρωμα, sin cargarlo con matices arquitectónicos innecesarios.'
  - La nota de ἐπὶ τούτοις preserva la alternativa semántica documentada por la POB inglesa.
