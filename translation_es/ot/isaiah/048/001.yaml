translation:
  language: es
  text: Oigan esto, casa de Jacob, ustedes que son llamados por el nombre de Israel y que salieron de las aguas[a] de Judá, los que juran por el nombre de Yahvé e invocan al Dios de Israel, pero no en verdad ni en justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de las aguas de Judá»; probablemente significa «de la descendencia» o «de los lomos de Judá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ זֹאת
  english_pob_choice: Hear this
  chosen_spanish: Oigan esto
  alternatives_spanish:
  - Escuchen esto
  - Oigan esto
  lexicon: HALOT
  rationale: El imperativo plural con el demostrativo pide una exhortación directa. «Oigan esto» mantiene el tono de llamado profético y suena natural en español.
- source_word: בֵּית יַעֲקֹב
  english_pob_choice: house of Jacob
  chosen_spanish: casa de Jacob
  alternatives_spanish:
  - casa de Jacob
  - casa/linaje de Jacob
  lexicon: HALOT
  rationale: «Casa de Jacob» conserva el idiomático profético y la resonancia del hebreo sin añadir interpretación.
- source_word: הַנִּקְרָאִים בְּשֵׁם יִשְׂרָאֵל
  english_pob_choice: you who are called by the name of Israel
  chosen_spanish: ustedes que son llamados por el nombre de Israel
  alternatives_spanish:
  - los que son llamados por el nombre de Israel
  - ustedes que llevan el nombre de Israel
  lexicon: HALOT
  rationale: La pasiva con בְּשֵׁם expresa designación nominal. «Llamados por el nombre de Israel» preserva la construcción y evita convertirla en un simple apodo.
- source_word: וּמִמֵּי יְהוּדָה יָצָאוּ
  english_pob_choice: and who came out from the waters of Judah
  chosen_spanish: y que salieron de las aguas de Judá
  alternatives_spanish:
  - y que salieron de las aguas de Judá
  - y que provinieron de Judá
  - y que brotaron de Judá
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «aguas» para transparencia textual. En español, «salieron de las aguas de Judá» mantiene la extrañeza del hebreo sin forzar una paráfrasis en el cuerpo del texto.
- source_word: הַנִּשְׁבָּעִים בְּשֵׁם יְהוָה
  english_pob_choice: who swear by the name of Yahweh
  chosen_spanish: los que juran por el nombre de Yahvé
  alternatives_spanish:
  - los que juran por el nombre de Yahvé
  - los que hacen juramento por el nombre de Yahvé
  lexicon: HALOT
  rationale: «Juran por el nombre de Yahvé» es la correspondencia más directa y transparente del hebreo, manteniendo el valor invocacional del juramento.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, usando «Yahvé» en vez de la sustitución tradicional «SEÑOR».
- source_word: וּבֵאלֹהֵי יִשְׂרָאֵל יַזְכִּירוּ
  english_pob_choice: and invoke the God of Israel
  chosen_spanish: y mencionan al Dios de Israel
  alternatives_spanish:
  - y invocan al Dios de Israel
  - y mencionan al Dios de Israel
  - y hacen mención del Dios de Israel
  lexicon: HALOT
  rationale: Aquí זכר en Hifil puede expresar hacer mención en contexto de culto/juramento. Se conserva «mencionan» para no exagerar el matiz devocional más allá del hebreo, mientras la nota léxica deja abierta la fuerza de invocación.
- source_word: לֹא בֶאֱמֶת
  english_pob_choice: but not in truth
  chosen_spanish: pero no en verdad
  alternatives_spanish:
  - pero no en verdad
  - pero no con sinceridad
  - pero no fielmente
  lexicon: HALOT
  rationale: «En verdad» reproduce la expresión compacta y admite tanto veracidad como fidelidad, sin cerrar la tensión semántica del hebreo.
- source_word: וְלֹא בִצְדָקָה
  english_pob_choice: or in righteousness
  chosen_spanish: ni en justicia
  alternatives_spanish:
  - ni en justicia
  - ni en rectitud
  lexicon: HALOT
  rationale: «צְדָקָה» puede ser justicia o rectitud. «Justicia» conserva bien el contraste ético-forense del reproche profético y funciona naturalmente junto a «verdad».
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino. Para coherencia con el proyecto, se translitera como «Yahvé» y no se oculta tras una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de יַזְכִּירוּ en un contexto de juramento/invocación
  english_pob_reading: invoke the God of Israel
  chosen_spanish_reading: mencionan al Dios de Israel
  alternative_spanish_readings:
  - invocan al Dios de Israel
  - hacen mención del Dios de Israel
  rationale: El hebreo permite un rango entre «hacer mención» e «invocar». Se eligió «mencionan» para ser más sobrio en el texto principal, sin perder la nota de uso religioso que queda documentada en la decisión léxica.
  doctrine_reference: HALOT על זכר Hifil en contexto cúltico/juramentario
- issue: Imagen de 'las aguas de Judá'
  english_pob_reading: from the waters of Judah
  chosen_spanish_reading: de las aguas de Judá
  alternative_spanish_readings:
  - del linaje de Judá
  - de la descendencia de Judá
  - de las entrañas de Judá
  rationale: Se mantiene la imagen literal en el texto para transparencia hacia el hebreo, y se deja la explicación idiomática en nota. Así se preserva la tensión entre literalidad e inteligibilidad.
  doctrine_reference: 'Translation philosophy: transparencia al original con apoyo de nota para modismo hebreo'
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo con alta concordancia con el control cruzado más reciente, sin cambios respecto del flujo de revisión auditado. Se conserva la transparencia de la imagen «aguas de Judá» y el nombre divino «Yahvé» según la política del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, en línea con el estándar del proyecto.
  - Se mantiene «casa de Jacob» como idiomático profético estable.
  - «Verdad» y «justicia» conservan el paralelismo moral del cierre.
  - La nota sobre «aguas de Judá» explica el modismo sin reemplazarlo en el cuerpo del verso.
