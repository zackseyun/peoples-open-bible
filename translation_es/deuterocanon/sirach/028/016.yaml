translation:
  language: es
  text: Quien presta atención a eso nunca hallará descanso, ni acampará con quietud[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «ni acampará» o «ni morará con quietud».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ προσέχων
  english_pob_choice: Whoever pays attention
  chosen_spanish: Quien le presta atención
  alternatives_spanish:
  - Quien da oído
  - El que atiende a ello
  - Quien se fija en ello
  lexicon: BDAG
  rationale: El participio articular griego funciona de manera genérica. «Quien le presta atención» conserva esa generalidad y suena natural en español, sin perder la idea de dirigir la atención hacia algo.
- source_word: αὐτῇ
  english_pob_choice: to it
  chosen_spanish: le
  alternatives_spanish:
  - a eso
  - a ella
  - a ello
  lexicon: BDAG
  rationale: El pronombre remite al sustantivo femenino del contexto griego. En español, un dativo clítico como «le» evita una referencia forzada al género gramatical y mantiene la relación indirecta con el objeto atendido.
- source_word: οὐ μὴ εὑρῇ
  english_pob_choice: will never find
  chosen_spanish: nunca hallará
  alternatives_spanish:
  - no hallará jamás
  - jamás encontrará
  - de ningún modo hallará
  lexicon: BDAG
  rationale: La construcción οὐ μή con subjuntivo expresa negación enfática. «Nunca hallará» transmite con claridad esa fuerza sin sonar artificial en español.
- source_word: ἀνάπαυσιν
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - reposo
  - alivio
  - descanso interior
  lexicon: BDAG
  rationale: «Descanso» es el equivalente más natural y directo en español para el contexto sapiencial de tranquilidad interior o sosiego.
- source_word: οὐδὲ κατασκηνώσει
  english_pob_choice: nor will he settle down
  chosen_spanish: ni acampará
  alternatives_spanish:
  - ni morará
  - ni se establecerá
  - ni tenderá su tienda
  lexicon: BDAG
  rationale: El verbo griego evoca literalmente acampar o habitar. «Acampará» conserva esa imagen más de cerca que una paráfrasis como «se establecerá», y el contexto permite que la figura funcione en español.
- source_word: μεθʼ ἡσυχίας
  english_pob_choice: in peace
  chosen_spanish: con quietud
  alternatives_spanish:
  - en paz
  - con tranquilidad
  - en sosiego
  lexicon: BDAG
  rationale: ἡσυχία significa quietud, calma o tranquilidad. «Con quietud» sigue de cerca el valor léxico del término y preserva el matiz de calma sin introducir una lectura más amplia como «paz».
translation_notes:
  revision_awareness: La fuente griega y el audit trail inglés coinciden de manera alta; se mantuvo la negación enfática y la imagen verbal de κατασκηνώσει, ajustando el castellano para que suene natural sin perder la fuerza del original.
  spanish_consistency_notes:
  - Se usó «descanso» para ἀνάπαυσιν, en línea con el valor básico señalado por el inglés.
  - Se evitó «SEÑOR» u otra terminología no pertinente, pues el versículo no contiene el nombre divino.
  - «Con quietud» preserva mejor ἡσυχία que una equivalencia más interpretativa como «en paz».
