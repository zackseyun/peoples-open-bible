translation:
  language: es
  text: Si él da quietud[a], ¿quién puede condenar? Si esconde su rostro, ¿quién puede verlo[b]? Esto es así tanto para una nación[c] como para un hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «da descanso». El verbo hebreo tiene fuerza causativa; puede sugerir también calma o paz.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿quién puede contemplarlo?». El verbo hebreo significa «mirar» o «ver».'
    reason: lexical_alternative
  - marker: c
    text: Lit. «y sobre una nación y sobre un hombre por igual»; es decir, el principio vale tanto para una nación como para un individuo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַשְׁקִט
  english_pob_choice: gives quietness
  chosen_spanish: da quietud
  alternatives_spanish:
  - causa quietud
  - da descanso
  - da paz
  lexicon: HALOT
  rationale: El hifil de שקט tiene valor causativo; «da quietud» conserva esa fuerza en español sin sonar forzado. «Da paz» sería posible, pero puede estrechar demasiado el campo semántico respecto de la idea más amplia de calma/quietud.
- source_word: יַרְשִׁעַ
  english_pob_choice: condemn
  chosen_spanish: condenar
  alternatives_spanish:
  - declarar culpable
  - declarar impío
  - acusar
  lexicon: HALOT
  rationale: En este contexto forense, el sentido es pronunciar culpable o condenar. «Condenar» es la opción más natural y fiel al valor judicial del verbo.
- source_word: יַסְתֵּר פָּנִים
  english_pob_choice: hides his face
  chosen_spanish: esconde su rostro
  alternatives_spanish:
  - oculta su rostro
  - vuelve su rostro aparte
  - retira su rostro
  lexicon: HALOT
  rationale: La expresión mantiene el hebraísmo antropomórfico y la tensión teológica de ocultamiento divino. «Esconde su rostro» es claro en español y conserva la imagen sin suavizarla.
- source_word: יְשׁוּרֶנּוּ
  english_pob_choice: behold him
  chosen_spanish: verlo
  alternatives_spanish:
  - contemplarlo
  - beberlo
  - mirarlo
  lexicon: HALOT
  rationale: שור significa mirar/observar/behold. En español, «verlo» es más natural que «behold him» y conserva el contraste con «esconde su rostro».
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  - nación extranjera
  lexicon: HALOT
  rationale: Aquí גוי designa una colectividad político-social. «Nación» comunica mejor esa entidad colectiva que «pueblo», que podría resultar más vago.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - el ser humano
  - la humanidad
  lexicon: HALOT
  rationale: El paralelo con «nación» favorece un singular individual. «Un hombre» preserva la forma concreta y la fuerza representativa del hebreo sin abstraerla demasiado.
- source_word: יָחַד
  english_pob_choice: alike
  chosen_spanish: por igual
  alternatives_spanish:
  - igualmente
  - a la vez
  - juntos
  lexicon: HALOT
  rationale: Yajad funciona adverbialmente para indicar aplicabilidad equivalente. «Por igual» expresa esa equivalencia de forma natural en español.
- source_word: וְעַל גּוֹי וְעַל אָדָם יָחַד
  english_pob_choice: for a nation and for a man alike
  chosen_spanish: para una nación y para un hombre
  alternatives_spanish:
  - sobre una nación y sobre un hombre
  - contra una nación y contra un hombre
  - para nación y hombre por igual
  lexicon: HALOT
  rationale: Con על en esta cláusula resumidora, el sentido es de alcance/aplicación más que de localización. «Para» comunica bien esa aplicación universal sin cargar indebidamente un matiz de juicio que el hebreo no explicita aquí.
theological_decisions:
- issue: Antropomorfismo divino en «esconde su rostro»
  english_pob_reading: Retain the anthropomorphic expression 'hides his face' literally.
  chosen_spanish_reading: Conservar literalmente «esconde su rostro».
  alternative_spanish_readings:
  - se aparta de él
  - retira su favor
  - oculta su presencia
  rationale: La imagen es teológicamente significativa y conviene preservar la tensión del ocultamiento divino en vez de explicarla como mera retirada de favor. La traducción literal sigue el valor idiomático del hebreo y deja abierta su amplitud.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
- issue: Alcance universal de la cláusula final
  english_pob_reading: 'Apply the statement equally to collective and individual human subjects: ''for a nation and for a man alike.'''
  chosen_spanish_reading: 'Aplicar la afirmación por igual a una colectividad y a un individuo: «para una nación y para un hombre».'
  alternative_spanish_readings:
  - ya sea contra una nación o contra un hombre
  - para una nación y para un hombre por igual
  rationale: La clausula final amplía el principio tanto al ámbito corporativo como al individual. «Por igual» explicita la equivalencia funcional de יָחַד sin imponer una lectura adversativa que el hebreo no exige.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue el último pase revisado sin cambios necesarios y toma en cuenta el informe de alta concordancia, manteniendo la lectura forense de יַרְשִׁעַ, la imagen antropomórfica de ocultamiento y el valor adverbial de יָחַד.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el nombre divino explícito.
  - Se conserva un registro sobrio y bíblico, evitando el calco rígido cuando la sintaxis española requiere naturalidad.
  - «Condenar» se usa en sentido judicial, coherente con la fuerza forense del hebreo.
  - La cláusula final se traduce con un alcance universal sin sobredeterminar la preposición עַל.
