translation:
  language: es
  text: para ofrecer sacrificios sobre el altar de su Señor[a], el que está en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo del contexto cercano lee “la casa de su Dios que está en Jerusalén”, por lo que el referente es el Dios de Israel; aquí, sin embargo, el griego dice “su Señor, el que está en Jerusalén”.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so as to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - de modo que
  lexicon: BDAG
  rationale: Introduce propósito de forma natural en español; aquí una construcción final breve comunica el objetivo sin sobrecargar la frase.
- source_word: προσενεγκεῖν
  english_pob_choice: to offer
  chosen_spanish: ofrecer
  alternatives_spanish:
  - presentar
  - llevar para ofrecer
  lexicon: BDAG
  rationale: En contexto cultual, 'ofrecer' expresa la acción sacrificial con claridad y corresponde bien al valor ritual del infinitivo griego.
- source_word: θυσίας
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas
  lexicon: BDAG
  rationale: Término cultual directo y transparente en español; mantiene el sentido sacrificial del texto griego.
- source_word: ἐπὶ τὸ θυσιαστήριον
  english_pob_choice: upon the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - ante el altar
  lexicon: BDAG
  rationale: Con movimiento ritual hacia el altar, 'sobre el altar' conserva la dirección del acto sin sonar artificioso en español.
- source_word: τοῦ κυρίου αὐτῶν
  english_pob_choice: of their Lord
  chosen_spanish: de su Señor
  alternatives_spanish:
  - de su Dueño
  - de su Señor Dios
  lexicon: BDAG
  rationale: Se mantiene κύριος como 'Señor' según el uso del proyecto. En español, 'de su Señor' conserva el título reverencial y el posesivo colectivo. Se evita importar 'Dios' al cuerpo principal, porque el griego dice κυρίου y no θεοῦ.
- source_word: τὸ ἐν Ἰερουσαλήμ
  english_pob_choice: the one in Jerusalem
  chosen_spanish: el que está en Jerusalén
  alternatives_spanish:
  - la que está en Jerusalén
  - el altar que está en Jerusalén
  lexicon: BDAG
  rationale: La frase articular con complemento locativo identifica de manera restrictiva el altar; 'el que está en Jerusalén' es natural y preserva esa referencia específica.
theological_decisions:
- issue: κύριος en contexto cultual de 1 Esdras
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Señor Dios
  rationale: Se conserva el título reverencial 'Señor' para κύριος, coherente con la política terminológica del proyecto y con el contexto de culto israelita. Aunque el paralelo hebreo apunte a 'Dios', el texto griego recibido no lo dice explícitamente, por lo que no se sustituye en el cuerpo principal.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord / Señor; primacía del texto de fuente sobre la tradición paralela'
- issue: Diferencia entre el griego y el paralelo hebreo respecto del referente divino
  english_pob_reading: their Lord, the one in Jerusalem
  chosen_spanish_reading: su Señor[a] ... el que está en Jerusalén
  alternative_spanish_readings:
  - su Dios
  - el Señor su Dios
  rationale: 'La nota preserva honestamente la tensión textual: el griego dice ''su Señor'', mientras el paralelo hebreo del contexto circundante habla de ''la casa de su Dios''. No se armoniza el texto principal, pero se documenta la lectura alternativa apoyada por el paralelo.'
  doctrine_reference: Principio de primacía del idioma fuente y de preservación de variantes relevantes
translation_notes:
  revision_awareness: 'Se siguió el progreso editorial del POB en inglés: la última revisión prefirió una formulación más natural para el acto sacrificial (''offer sacrifices on''). En español se reflejó ese ajuste con ''ofrecer sacrificios sobre'', manteniendo el valor cultual de προσενεγκεῖν y el movimiento hacia el altar. También se respetó la decisión de conservar ''Lord'' para κύριος y de documentar en nota la discrepancia con el paralelo hebreo.'
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος, en línea con la terminología del proyecto.
  - Se evitó 'Dios' en el texto principal porque el griego no usa θεός en este versículo.
  - La construcción 'el que está en Jerusalén' conserva la función restrictiva del artículo griego.
  - El registro busca ser bíblico y claro sin caer en arcaismos innecesarios.
