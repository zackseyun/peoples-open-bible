translation:
  language: es
  text: Yo, la sabiduría, habito con prudencia[a], y hallo conocimiento y discreción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo, la Sabiduría, he habitado con prudencia». El hebreo permite también un perfecto («he habitado»); además, מְזִמּוֹת puede traducirse como «planes», «designios» o «discreción», según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - Sabiduría
  lexicon: HALOT
  rationale: חָכְמָה denota 'sabiduría'. En español, 'sabiduría' comunica el sustantivo con naturalidad y conserva la personificación poética sin necesidad de convertirlo en nombre propio en el texto principal.
- source_word: שָׁכַ֣נְתִּי
  english_pob_choice: dwell
  chosen_spanish: habito
  alternatives_spanish:
  - he habitado
  - resido
  lexicon: HALOT
  rationale: שׁכן expresa morar o habitar. El presente en español preserva mejor la personificación y la vivacidad del discurso sapiencial, mientras que el perfecto ('he habitado') queda como alternativa válida.
- source_word: עָרְמָה
  english_pob_choice: prudence
  chosen_spanish: prudencia
  alternatives_spanish:
  - astucia
  - sensatez
  lexicon: HALOT
  rationale: En Proverbios el término tiene valor positivo. 'Prudencia' evita el matiz negativo de 'astucia' y transmite el sentido de juicio práctico y rectitud de criterio.
- source_word: דַעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - conocer
  - ciencia
  lexicon: HALOT
  rationale: דעת se traduce normalmente como 'conocimiento'. 'Conocimiento' mantiene la distinción con 'sabiduría' y suena natural en español bíblico contemporáneo.
- source_word: מְזִמּוֹת
  english_pob_choice: discretion
  chosen_spanish: discreción
  alternatives_spanish:
  - planes
  - designios
  - buen juicio
  lexicon: HALOT
  rationale: El término puede significar planes, designios o discreción según el contexto. Aquí la paralelismo positivo con prudencia y conocimiento favorece 'discreción', que en español expresa juicio reservado y sano discernimiento.
- source_word: אֶמְצָא
  english_pob_choice: I find
  chosen_spanish: hallo
  alternatives_spanish:
  - encuentro
  - descubro
  lexicon: HALOT
  rationale: מצא significa 'encontrar/hallar'. 'Hallar' conserva la imagen bíblica de descubrimiento y es idiomático en un registro digno.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción une dos miembros paralelos sin añadir énfasis no explicitado por el hebreo.
theological_decisions:
- issue: Personificación de la sabiduría
  english_pob_reading: Render the speaker as personified wisdom without importing later christological identification into the translation.
  chosen_spanish_reading: Conservar a la sabiduría como voz personificada, sin convertirla en un nombre propio ni añadir una identificación cristológica explícita.
  alternative_spanish_readings:
  - Capitalizar 'Sabiduría' para marcar la figura personificada
  - Introducir una lectura cristológica
  rationale: Proverbios 8 presenta una personificación poética. El español debe mantener esa tensión literaria y teológica sin resolverla por la vía de una identificación doctrinal que el versículo no formula.
  doctrine_reference: Preservar la tensión teológica; primacía del texto original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés en dos puntos clave: (1) שָׁכַ֣נְתִּי se dejó en presente para conservar la personificación, aunque se reconoce la alternativa del perfecto; (2) וְדַעַת מְזִמּוֹת se reflejó como ''conocimiento y discreción'', no como una construcción posesiva, para respetar la conjunción hebrea y la revisión más reciente del texto inglés.'
  spanish_consistency_notes:
  - 'Se mantuvo el orden paralelo del hebreo: sujeto personificado + verbo de habitar + complemento con prudencia + coordinación final con dos sustantivos.'
  - Se evitó 'Cristo' o 'Mesías' porque el pasaje no los menciona y la auditoría inglesa explícitamente preserva la personificación sin identificación doctrinal.
  - '''Sabiduría'' aparece en minúscula en el cuerpo del verso para seguir la personificación sin convertirla en nombre propio; la mayúscula queda como alternativa en nota.'
  - '''Discreción'' se eligió por coherencia con ''prudencia'' y ''conocimiento'' dentro del léxico sapiencial.'
  - La nota de pie conserva la alternativa del perfecto, ya que el hebreo admite esa lectura y el inglés auditado la documenta.
