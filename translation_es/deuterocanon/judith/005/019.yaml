revisions:
- from: Y ahora, habiéndose vuelto a su Dios, subieron de entre la dispersión, donde habían sido esparcidos; tomaron posesión de Jerusalén, donde estaba su santuario, y se establecieron en la región montañosa[a], porque había quedado desolada[b].
  to: Y ahora, habiéndose vuelto a su Dios, subieron de los lugares donde habían sido esparcidos, tomaron posesión de Jerusalén, donde estaba su santuario, y se establecieron en la región montañosa[a], porque había quedado desierta[b].
  rationale: Se reemplazó «de entre la dispersión, donde habían sido esparcidos» por «de los lugares donde habían sido esparcidos» para lograr un español natural y, a la vez, reflejar la revisión auditada del POB en inglés que resolvió la construcción griega pleonástica. También se cambió «había quedado desolada» por «había quedado desierta» para expresar mejor el sentido contextual de ἔρημος como lugar abandonado o despoblado, más que arruinado. Se eliminó el punto y coma para mejorar la fluidez.
