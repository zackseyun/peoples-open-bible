translation:
  language: es
  text: 'Que no digan en su corazón[a]: «¡Ajá, nuestro deseo!». Que no digan: «Nos lo hemos tragado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra alma», «lo que deseábamos» o «nuestro apetito». El sustantivo hebreo nephesh aquí probablemente expresa deseo interior o satisfacción más que el alma inmaterial.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Let them not
  chosen_spanish: No permitan que
  alternatives_spanish:
  - No digan
  - Que no digan
  lexicon: HALOT
  rationale: אַל con imperfecto/jusivo expresa una petición negativa; en español, «No permitan que» conserva el matiz de súplica dirigida a Dios y funciona de modo natural.
- source_word: יֹאמְרוּ
  english_pob_choice: say
  chosen_spanish: digan
  alternatives_spanish:
  - declaren
  - hablen
  lexicon: HALOT
  rationale: אָמַר es el verbo común «decir»; «digan» es la correspondencia más directa y idiomática.
- source_word: בְלִבָּם
  english_pob_choice: in their heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en sus corazones
  - para sí
  lexicon: HALOT
  rationale: Mantiene el modismo hebreo de pensamiento interior, con singular colectivo natural en español.
- source_word: הֶאָח
  english_pob_choice: Aha
  chosen_spanish: ¡Ajá!
  alternatives_spanish:
  - ¡Ja!
  - ¡Ah!
  lexicon: HALOT
  rationale: Interjección de triunfo burlón o malévolo; «¡Ajá!» preserva la fuerza exclamativa en español actual.
- source_word: נַפְשֵׁנוּ
  english_pob_choice: our desire
  chosen_spanish: nuestro anhelo
  alternatives_spanish:
  - nuestra alma
  - lo que deseábamos
  - nuestro apetito
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí probablemente expresa deseo, satisfacción o apetito interior, no «alma» en sentido metafísico. «Anhelo» comunica bien esa fuerza en español sin borrar la ambigüedad de fondo.
- source_word: בִּלַּעֲנוּהוּ
  english_pob_choice: We have swallowed him up
  chosen_spanish: Lo hemos devorado
  alternatives_spanish:
  - Lo hemos tragado
  - Lo hemos engullido
  lexicon: HALOT
  rationale: El verbo בלע significa «tragar/engullir/devorar». «Lo hemos devorado» transmite la imagen de consumación total con buena naturalidad en español; se conserva el objeto pronominal.
translation_notes:
  revision_awareness: El texto coincide sustancialmente con el paquete fuente y con la auditoría inglesa; no se observaron revisiones aplicadas en el pass más reciente.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de dos prohibiciones con la misma estructura para reflejar el hebreo.
  - Se evitó «alma» en el cuerpo principal porque la nota auditable del inglés señala un uso más amplio de nephesh.
  - «Devorado» es una equivalencia dinámica moderada de בלע; conserva la imagen de ingestión total sin introducir un registro demasiado técnico.
