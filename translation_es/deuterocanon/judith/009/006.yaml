translation:
  language: es
  text: 'Y lo que había planeado quedó dispuesto, y dijeron: «Aquí estamos; porque todos tus caminos están preparados, y tu juicio está en conocimiento previo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu juicio está según conocimiento previo»; o: «tu juicio está en tu conocimiento previo». La frase griega es compacta y puede expresar que el juicio de Dios se ubica dentro de su conocimiento previo o se ajusta a él.'
    reason: alternative_reading
lexical_decisions:
- source_word: παρέστησαν
  english_pob_choice: stood ready
  chosen_spanish: quedó dispuesto
  alternatives_spanish:
  - quedó listo
  - estuvo preparado
  - quedó en pie
  lexicon: LSJ
  rationale: El contexto habla de lo que Dios había planeado; en español, «quedó dispuesto» comunica bien la idea resultativa de algo ya puesto en orden para ejecutarse, sin forzar una imagen demasiado física.
- source_word: ἃ ἐβουλεύσω
  english_pob_choice: what I planned
  chosen_spanish: lo que había planeado
  alternatives_spanish:
  - lo que había determinado
  - lo que había resuelto
  - lo que había proyectado
  lexicon: LSJ
  rationale: El relativo con βουλεύω expresa lo deliberado o proyectado. «Había planeado» conserva el sentido intencional y suena natural en español contemporáneo.
- source_word: πάρεσμεν
  english_pob_choice: we are here
  chosen_spanish: Aquí estamos
  alternatives_spanish:
  - Estamos presentes
  - Aquí nos tienes
  - Estamos aquí
  lexicon: LSJ
  rationale: La frase es una declaración inmediata de presencia y disposición. «Aquí estamos» transmite bien la prontitud del griego en un español natural.
- source_word: ὁδοί
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - cursos
  - vías
  lexicon: LSJ
  rationale: En este contexto de los modos de obrar de Dios, «caminos» es una equivalencia amplia y reconocible; mantiene la metáfora sin restringirla a trayectos físicos.
- source_word: ἕτοιμοι
  english_pob_choice: are prepared
  chosen_spanish: están preparados
  alternatives_spanish:
  - están listos
  - están dispuestos
  - están prontos
  lexicon: LSJ
  rationale: El adjetivo predicativo describe los caminos de Dios como ya preparados. «Están preparados» refleja con claridad ese estado resultante.
- source_word: κρίσις
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - decisión
  - justicia
  lexicon: LSJ
  rationale: Aquí se trata de la determinación judicial de Dios. «Juicio» preserva mejor el peso forense y teológico que «decisión», y evita desplazar el sentido hacia una cualidad abstracta como «justicia».
- source_word: πρόγνωσις
  english_pob_choice: foreknowledge
  chosen_spanish: conocimiento previo
  alternatives_spanish:
  - presciencia
  - previo conocimiento
  - conocimiento de antemano
  lexicon: LSJ
  rationale: «Conocimiento previo» comunica de manera clara y digna el sentido de conocer antes. Se evita «presciencia» por sonar más técnico y menos transparente para la lectura pública.
theological_decisions:
- issue: Relación entre el juicio divino y la πρόγνωσις
  english_pob_reading: your judgment is in foreknowledge
  chosen_spanish_reading: tu juicio está en conocimiento previo
  alternative_spanish_readings:
  - tu juicio está según conocimiento previo
  - tu juicio está en tu conocimiento previo
  - tu juicio está de acuerdo con conocimiento previo
  rationale: La preposición griega ἐν es compacta y no obliga a fijar una sola relación lógica. La redacción principal conserva esa tensión sin decidir entre valor locativo, instrumental o normativo; las alternativas quedan abiertas para reflejar la ambigüedad documentada en la POB inglesa.
  doctrine_reference: Preservar la tensión textual sin resolverla de forma dogmática.
translation_notes:
  revision_awareness: El texto base inglés no requirió cambios de revisión; se mantuvo la misma solución interpretativa para παρέστησαν y para ἐν προγνώσει, trasladándolas al español con una equivalencia clara y pública.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo exija explícitamente; en este versículo no aparece el nombre divino, por lo que no se inserta ninguna sustitución.
  - Se eligió «juicio» para κρίσις por su valor judicial; «justicia» habría desplazado el foco semántico.
  - «Conocimiento previo» evita tecnicismos y preserva la ambigüedad del griego, coherente con la nota de la POB inglesa.
