translation:
  language: es
  text: Pero si ella llega a tener esposo[a], y sus votos están sobre ella, o la expresión precipitada de sus labios[b], con la cual se ha obligado,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llega a ser esposa de un hombre» / «está casada con un esposo». El hebreo idiomáticamente dice «es/llega a ser para un hombre».
    reason: lexical_alternative
  - marker: b
    text: O «la expresión de sus labios». La frase probablemente alude a una obligación verbal asumida de manera impulsiva, distinta de un voto formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La conjunción introduce un caso condicional dentro de la legislación; «pero» conserva el matiz de transición respecto del caso anterior, y «si» mantiene la estructura condicional natural en español.
- source_word: הָיוֹ תִהְיֶה לְאִישׁ
  english_pob_choice: she becomes a wife to a husband
  chosen_spanish: llega a ser esposa de un hombre
  alternatives_spanish:
  - se casa con un hombre
  - se vuelve esposa de un hombre
  - llega a ser mujer de un hombre
  lexicon: HALOT
  rationale: La hebrea expresa un cambio de estado relacional/matrimonial. «Llega a ser esposa de un hombre» sigue de cerca el valor idiomático sin reducirlo a un giro moderno demasiado libre.
- source_word: וּנְדָרֶיהָ עָלֶיהָ
  english_pob_choice: and her vows are upon her
  chosen_spanish: y sus votos están sobre ella
  alternatives_spanish:
  - y sus votos permanecen sobre ella
  - y sus votos siguen obligándola
  - y sus votos quedan sobre ella
  lexicon: HALOT
  rationale: Se conserva la imagen legal de una obligación «sobre ella». «Están sobre ella» mantiene la metáfora hebrea sin interpretar prematuramente su validez jurídica.
- source_word: מִבְטָא שְׂפָתֶיהָ
  english_pob_choice: the rash utterance of her lips
  chosen_spanish: la expresión precipitada de sus labios
  alternatives_spanish:
  - la utterancia de sus labios
  - la declaración apresurada de sus labios
  - la palabra impulsiva de sus labios
  lexicon: HALOT
  rationale: מִבְטָא es una expresión/utterancia. En este contexto legal, el adjetivo «precipitada» comunica la idea de una palabra dicha impulsivamente, sin convertirla en un término técnico distinto del hebreo.
- source_word: אֲשֶׁר אָסְרָה
  english_pob_choice: by which she has bound herself
  chosen_spanish: con la cual se ha ligado a sí misma
  alternatives_spanish:
  - por la cual se ha obligado
  - con la cual se ha obligado
  - por medio de la cual se ha atado
  lexicon: HALOT
  rationale: אָסַר en contexto de voto es «ligar/obligar». «Se ha ligado a sí misma» conserva la metáfora de autoobligación. Se añade «a sí misma» para hacer explícito el reflexivo implícito en el hebreo.
- source_word: עַל נַפְשָׁהּ
  english_pob_choice: herself
  chosen_spanish: a sí misma
  alternatives_spanish:
  - su alma
  - su vida
  - sobre sí misma
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí funciona de modo reflexivo en un contexto jurídico de autoobligación, no como antropología del alma. «A sí misma» evita importar un sentido doctrinal ajeno al pasaje.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un contexto de votos
  english_pob_reading: herself
  chosen_spanish_reading: a sí misma
  alternative_spanish_readings:
  - su alma
  - su vida
  rationale: La referencia es a una obligación autoimpuesta. Traducir נֶפֶשׁ como «alma» o «vida» introduciría una carga antropológica que el contexto legal no exige. «A sí misma» preserva el sentido reflexivo y jurídico.
  doctrine_reference: Principio de primacía del idioma original; evitar imponer categorías doctrinales no presentes en el contexto.
translation_notes:
  revision_awareness: El texto español sigue el estado más reciente del audit trail en cuanto a la corrección de la construcción matrimonial («llega a ser esposa de un hombre») y mantiene la distinción entre votos formales y la expresión precipitada de los labios. Se ha conservado la metáfora legal de obligación «sobre ella» y se ha explicitado el valor reflexivo de נֶפֶשׁ sin introducir antropología ajena al contexto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; en este versículo no aparece.
  - Se mantiene «esposa» para la relación matrimonial y «votos» para נדרים, evitando términos litúrgicos que no están en el hebreo.
  - La secuencia condicional y la coordinación de alternativas siguen la sintaxis hebrea sin resultar forzadas en español.
  - Las notas conservan la tensión entre una «expresión» verbal y su posible carácter de compromiso impulsivo, conforme al audit trail inglés.
