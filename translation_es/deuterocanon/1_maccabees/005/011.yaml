    text: O «tomar la fortaleza antes que nosotros» u «ocupar primero la fortaleza». El verbo griego enfatiza una toma preventiva o anticipada.
    reason: lexical_alternative
  revision_rationale: Se reemplazó «tomar por asalto» por «apoderarse de» para evitar añadir un modo de ataque no explícito en el griego, y se preservó el matiz preventivo de προκαταλαβέσθαι en una nota, en línea con el audit trail inglés. Se cambió «a la que hemos huido» por «en la que nos hemos refugiado» para reflejar con naturalidad el sentido de καταφεύγω. También se ajustó «va al frente de» a «dirige» para una expresión militar más clara y fluida en español.
