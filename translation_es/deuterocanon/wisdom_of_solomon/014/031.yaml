base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/014/031.yaml
  text: For it is not the power of the things by which they swear[a], but the punishment of those who sin[b], that always pursues the transgression of the unrighteous.
  footnotes:
  - marker: a
    text: Or, 'the power of oaths' or 'the power of what they swear by.' The Greek expression is compressed and may refer either to the oath itself or to the entities invoked in swearing.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the punishment of sinners always pursues the transgression of the unrighteous.'
    reason: alternative_reading
