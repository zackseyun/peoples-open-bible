    rationale: Para בְּנֵי עַמּוֹן, el equivalente idiomático en español es «amonitas», no «ammonitas». La doble m responde a transliteración extranjera, no al uso normal español.
  - severity: low
    issue: La forma «Nahas» es posible, pero menos consistente que «Nahash» con la evidencia fuente y el rastro POB en inglés.
    rationale: El inglés auditado conserva «Nahash». La castellanización «Nahas» no es necesariamente errónea, pero aquí no está documentada como convención del proyecto y puede dificultar la correspondencia con el nombre fuente.
  revised_spanish_text: Después de esto, murió Nahash, rey de los amonitas, y su hijo reinó en su lugar.
  revision_rationale: Se corrige «ammonitas» a «amonitas» por ser la forma española estándar y se ajusta «Nahas» a «Nahash» para una transliteración más transparente y consistente con la evidencia fuente y el audit trail inglés. El resto del versículo ya era fiel y natural.
