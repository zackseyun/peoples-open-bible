translation:
  language: es
  text: Estarán emparejadas abajo[a], y juntas estarán completas[b] en su parte superior, hasta el primer aro[c]. Así será para ambas; serán para las dos esquinas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gemelas» o «a juego» abajo; el hebreo describe a las dos tablas como un par correspondiente.
    reason: lexical_alternative
  - marker: b
    text: O «enteras» o «perfectamente ajustadas» en su parte superior; el término hebreo enfatiza integridad estructural, no perfección moral.
    reason: lexical_alternative
  - marker: c
    text: O «hasta el aro primero»; la frase puede referirse al aro que une las tablas emparejadas en la parte superior.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹאֲמִים
  english_pob_choice: paired
  chosen_spanish: emparejadas
  alternatives_spanish:
  - pareadas
  - gemelas
  - coincidentes
  lexicon: HALOT
  rationale: El hebreo indica que las tablas forman un par o conjunto correspondiente. «Emparejadas» comunica esa relación estructural de modo natural en español, sin perder la idea de correspondencia entre las dos piezas.
- source_word: מִלְּמַטָּה
  english_pob_choice: at the bottom
  chosen_spanish: por abajo
  alternatives_spanish:
  - en la parte inferior
  - desde abajo
  - abajo
  lexicon: HALOT
  rationale: La frase señala el extremo inferior de las tablas. «Por abajo» es claro y fluido en español para una instrucción de carpintería/ensamblaje; conserva la ubicación sin forzar una formulación demasiado literal.
- source_word: וְיַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntas
  alternatives_spanish:
  - a la vez
  - en conjunto
  - unidas
  lexicon: HALOT
  rationale: El adverbio enfatiza que ambas piezas funcionan como una unidad. «Juntas» expresa bien esa unión funcional y mantiene el tono concreto del texto.
- source_word: תַמִּים
  english_pob_choice: complete
  chosen_spanish: completas
  alternatives_spanish:
  - enteras
  - íntegras
  - perfectamente ajustadas
  lexicon: HALOT
  rationale: Aquí el sentido es estructural, no moral. «Completas» conserva la idea de integridad/terminación de la forma, coherente con la decisión inglesa de evitar una lectura ética de perfección.
- source_word: עַל רֹאשׁוֹ
  english_pob_choice: at its top
  chosen_spanish: en su parte superior
  alternatives_spanish:
  - en su cima
  - sobre su extremo superior
  - en su cabeza
  lexicon: HALOT
  rationale: «Cabeza» es literal, pero en español suena poco natural para una pieza de madera. «Parte superior» comunica el extremo superior de la estructura con fidelidad y claridad.
- source_word: אֶל הַטַּבַּעַת הָאֶחָת
  english_pob_choice: to the first ring
  chosen_spanish: hasta el primer aro
  alternatives_spanish:
  - hasta el aro único
  - hasta el aro primero
  - a la primera anilla
  lexicon: HALOT
  rationale: El hebreo apunta a un aro específico en la parte superior; la tradición auditada en inglés opta por «the first ring» como lectura más natural de הָאֶחָת en este contexto. «Aro» funciona bien en español para un elemento circular de sujeción, y «hasta» conserva la idea de alcance/límite.
- source_word: כֵּן יִהְיֶה לִשְׁנֵיהֶם
  english_pob_choice: So it shall be for both of them
  chosen_spanish: Así será para las dos
  alternatives_spanish:
  - De este modo será para ambas
  - Así quedará para ambas
  - Así será para ambas
  lexicon: HALOT
  rationale: La cláusula resume la instrucción para el par de tablas. Como el referente inmediato es femenino plural implícito en español («tablas»), «las dos» evita ambigüedad y respeta la referencia al par.
- source_word: לִשְׁנֵי הַמִּקְצֹעֹת
  english_pob_choice: for the two corners
  chosen_spanish: para las dos esquinas
  alternatives_spanish:
  - para las dos piezas de esquina
  - para los dos ángulos
  - para las dos esquinas del fondo
  lexicon: HALOT
  rationale: מִקְצֹעֹת designa esquinas o elementos de esquina. «Esquinas» es la opción más directa y transparente en español; no se añade precisión contextual no exigida por el versículo.
theological_decisions:
- issue: Sentido de תַמִּים en una instrucción de construcción
  english_pob_reading: The Hebrew term emphasizes structural completeness here, not moral perfection.
  chosen_spanish_reading: El término enfatiza completitud estructural, no perfección moral.
  alternative_spanish_readings:
  - El término significa que estén enteras.
  - El término indica que estén perfectamente ajustadas.
  rationale: El pasaje describe ensamblaje de madera/estructura del tabernáculo. Mantener explícita la distinción evita trasladar al texto una lectura ética que el contexto no sustenta.
  doctrine_reference: Éxodo 26:24; distinción semántica entre integridad estructural y perfección moral
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «up to the one ring» a «to the first ring» por mayor naturalidad y por una lectura más precisa de הָאֶחָת en este contexto. La versión española refleja esa revisión con «hasta el primer aro».
  spanish_consistency_notes:
  - Se mantuvo Yahvé como forma estándar del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió lenguaje arquitectónico claro y no moralizante para תַמִּים, en continuidad con el audit trail inglés.
  - Se prefirió una formulación española natural («por abajo», «parte superior», «primer aro») sin perder la relación con el hebreo.
  - Las notas a pie conservan las alternativas léxicas documentadas y señalan la ambigüedad del texto fuente.
