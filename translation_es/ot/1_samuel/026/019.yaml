  to: 'Y ahora[a], por favor, que mi señor el rey oiga las palabras de su esclavo. Si Yahvé te ha incitado contra mí, acepte él una ofrenda; pero si son hombres, ellos están malditos delante de Yahvé, porque hoy me han expulsado de tener parte[b] en la heredad de Yahvé, diciendo: «Ve, sirve a otros dioses».'
  rationale: Se corrige la cláusula de maldición a una declaración predicativa, en línea con el hebreo y la auditoría inglesa. Se reemplaza «para que no me aparte» por «de tener parte» para reflejar correctamente la exclusión de la heredad de Yahvé. También se suaviza el calco «los hijos de los hombres» a «hombres» para mejor español sin pérdida semántica. Las notas se ajustan para corresponder exactamente al texto revisado.
