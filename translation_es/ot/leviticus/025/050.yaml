review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue de cerca la auditoría inglesa: cálculo con el comprador, desde el año de la autoventa hasta el jubileo, precio proporcional al número de años, y comparación con un trabajador contratado. Sin embargo, hay una mejora importante de legibilidad y fidelidad idiomática en la frase temporal «se vendió a él», que en español suena poco natural; «se vendió a su comprador» o «se vendió a él» puede aclararse mejor sin perder el sentido reflexivo. También conviene ajustar «estará con él» a «estará con su comprador» para evitar ambigüedad referencial en español.'
  spanish_quality_summary: El texto es claro y mayormente natural, con registro digno y comprensible. «Hará el cálculo» y «el precio de su venta será según el número de años» funcionan bien. «Como los días de un jornalero» es fiel, aunque algo rígido; sigue aceptablemente la literalidad elegida por la POB. La principal aspereza es «desde el año en que se vendió a él», construcción gramaticalmente posible pero poco idiomática en español actual. La nota a también usa «renderizarse», anglicismo evitable.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος/esclavo, etc. «Jubileo» está bien conservado. «Jornalero» es defendible para שָׂכִיר, aunque «trabajador asalariado» sería más explicativo; no es necesario cambiarlo porque la auditoría inglesa preserva la imagen comparativa.
  issues:
  - severity: medium
    issue: «desde el año en que se vendió a él» suena poco natural en español
    rationale: Aunque reproduce la estructura del inglés auditado, en español eclesial general la secuencia «venderse a él» resulta áspera. Puede mantenerse el sentido reflexivo con una formulación más idiomática como «desde el año en que se vendió a su comprador».
  - severity: low
    issue: Posible ambigüedad de referente en «estará con él»
    rationale: El hebreo permite el pronombre, pero en español, tras varias referencias masculinas, repetir «su comprador» mejora la claridad sin añadir significado.
  - severity: low
    issue: 'Anglicismo en la nota: «renderizarse»'
    rationale: Para notas de traducción bíblica en español es preferible «traducirse» o «expresarse».
  revised_spanish_text: Hará el cálculo con su comprador desde el año en que se vendió a su comprador hasta el año del jubileo[a], y el precio de su venta será según el número de años[b]; como los días de un jornalero, estará con su comprador.
  revised_footnotes:
