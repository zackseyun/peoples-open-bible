review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del griego: los adversarios oyen, temen, pierden el ánimo y encienden fuegos en su campamento. Sin embargo, la traducción principal de ἔπηξαν τὴν καρδίαν αὐτῶν como «se les heló el corazón» privilegia una imagen literal que en español suele sugerir terror súbito más que desaliento o pérdida de valor. El English POB puso el sentido idiomático en el texto principal («lost heart») y reservó la imagen literal para nota; conviene hacer lo mismo en español.'
  spanish_quality_summary: El español es claro y natural en casi todo el versículo. La única expresión mejorable es «se les heló el corazón», que suena vívida pero puede desviar el sentido hacia espanto físico/emocional. «Perdieron el ánimo» o «perdieron el valor» comunica mejor el modismo en español moderno y eclesialmente legible.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Adversarios», «preparados para la guerra» y «campamento» están bien alineados con las decisiones léxicas auditadas. La nota debe conservar la alternativa literal del idiomático corazón 'fijado/congelado'.
  issues:
  - severity: medium
    issue: La cláusula principal usa «se les heló el corazón» para ἔπηξαν τὴν καρδίαν αὐτῶν.
    rationale: Aunque el griego tiene una imagen de corazón congelado/fijado, la decisión auditada en inglés pone en el texto principal el sentido idiomático de desaliento. En español, «se les heló el corazón» puede entenderse como sobresalto intenso más que como pérdida de ánimo; por fidelidad semántica y claridad, es mejor usar una equivalencia idiomática en el texto y dejar la literalidad en nota.
  revised_spanish_text: Y cuando los adversarios oyeron que Jonatán y los que estaban con él estaban preparados para la guerra, tuvieron miedo y perdieron el ánimo[a], y encendieron fuegos en su campamento.
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «fijaron/congelaron su corazón»; es un modismo que expresa desaliento o pérdida de valor.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la traducción del modismo griego al sentido principal documentado por la auditoría inglesa: no una sensación física de terror, sino desánimo o pérdida de valor. La imagen literal se conserva en nota, como corresponde.'
