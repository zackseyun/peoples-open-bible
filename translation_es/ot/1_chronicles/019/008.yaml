translation:
  language: es
  text: 'Cuando David oyó[a], envió a Joab y a todo el ejército: los valientes[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se enteró» o «recibió la noticia».'
    reason: lexical_alternative
  - marker: b
    text: «Los valientes» puede referirse a los guerreros valerosos de David o a su fuerza de combate de élite.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: lo oyó
  alternatives_spanish:
  - se enteró
  - recibió la noticia
  lexicon: HALOT
  rationale: El hebreo שׁמע en este contexto narrativo indica que David recibió el informe. «Lo oyó» conserva la forma directa y natural en español, y deja implícita la recepción de noticias sin forzar una paráfrasis.
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo שלח en narrativa militar se rinde bien con «envió». Es claro, formal y mantiene el sentido de acción dirigida sin añadir matices no presentes en el hebreo.
- source_word: יוֹאָב
  english_pob_choice: Joab
  chosen_spanish: Joab
  alternatives_spanish:
  - Yoab
  lexicon: convención onomástica
  rationale: Se conserva la forma habitual en español bíblico, «Joab», por claridad y reconocimiento lector.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - el conjunto de
  - la totalidad de
  lexicon: HALOT
  rationale: כָּל modifica la construcción siguiente. «Todo el ejército» transmite con naturalidad el alcance total del grupo sin perder el valor de totalidad.
- source_word: צָבָא
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerzas
  - hueste
  lexicon: HALOT
  rationale: En contexto militar, צָבָא refiere a una fuerza organizada. «Ejército» es el equivalente moderno más claro y natural en español.
- source_word: הַגִּבּוֹרִים
  english_pob_choice: the mighty men
  chosen_spanish: los valientes
  alternatives_spanish:
  - los poderosos
  - los hombres valientes
  lexicon: HALOT
  rationale: El término גִּבּוֹרִים puede referir a guerreros valerosos o a la fuerza selecta de David. «Los valientes» preserva la idea léxica de hombres de valor y suena más natural en español que una repetición rígida de «mighty men».
- source_word: וְאֵת כָּל צָבָא הַגִּבּוֹרִים
  english_pob_choice: and all the army, the mighty men
  chosen_spanish: y a todo el ejército, los valientes
  alternatives_spanish:
  - y a todo el ejército de los valientes
  - y a toda la hueste, los valientes
  lexicon: HALOT
  rationale: 'La apposición hebrea se refleja con una coma en español: «todo el ejército, los valientes». Así se conserva la relación entre «ejército» y «los valientes» sin fundirlos en una sola expresión menos transparente.'
translation_notes:
  revision_awareness: 'El inglés revisado añadió una coma para reflejar la estructura appositiva: «all the army, the mighty men». La versión española imita esa apposición con «todo el ejército, los valientes», manteniendo el mismo efecto sintáctico y la ambigüedad léxica documentada.'
  spanish_consistency_notes:
  - Se mantuvo «Joab» según la forma usual en español bíblico.
  - Se evitó «SEÑOR» o términos de equivalente teológico no presentes en el versículo.
  - La ambigüedad de הַגִּבּוֹרִים se conserva de forma controlada en nota, sin sobreexplicar el texto principal.
  - La coma entre «ejército» y «los valientes» reproduce la estructura apposicional observada en la revisión inglesa.
