revisions:
- from: Entonces Zorobabel hijo de Salatiel, y Josué hijo de Josadac, el sumo sacerdote, y todo el remanente[a] del pueblo escucharon la voz de Yahvé su Dios y las palabras de Hageo el profeta, como[b] Yahvé su Dios lo había enviado; y el pueblo temió delante de Yahvé.
  to: Entonces Zorobabel hijo de Salatiel, y Josué hijo de Josadac, el sumo sacerdote, y todo el remanente[a] del pueblo escucharon la voz de Yahvé su Dios y las palabras de Hageo el profeta, como[b] Yahvé su Dios lo había enviado; y el pueblo tuvo temor delante de Yahvé.
  rationale: Se conserva casi todo el borrador por su fidelidad al hebreo y al audit trail inglés. Solo se ajusta la cláusula final de «temió» a «tuvo temor» para resolver la tensión entre el sujeto colectivo singular en español y el verbo plural hebreo, manteniendo a la vez el matiz reverencial de ירא sin sobreinterpretarlo.
