translation:
  language: es
  text: Y el rey envió a Nicanor[a], uno de sus gobernantes distinguidos, que odiaba y era hostil a Israel, y le ordenó destruir al pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno de sus oficiales ilustres».
    reason: lexical_alternative
  - marker: b
    text: O «extirpar al pueblo» o «desarraigar al pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: En español, «envió» conserva el valor narrativo de mandar a alguien con una misión y suena natural y digno en registro bíblico.
- source_word: ὁ Βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el Rey
  lexicon: LSJ
  rationale: Se trata del monarca humano del contexto histórico; la minúscula evita una lectura reverencial no presente en el griego.
- source_word: Νικάνορα
  english_pob_choice: Nikanor
  chosen_spanish: Nicanor
  alternatives_spanish:
  - Nikanor
  lexicon: transliteration
  rationale: En español bíblico y eclesial, «Nicanor» es la forma más reconocible y establecida del nombre propio.
- source_word: ἕνα τῶν ἀρχόντων αὐτοῦ τῶν ἐνδόξων
  english_pob_choice: one of his honored rulers
  chosen_spanish: uno de sus gobernantes distinguidos
  alternatives_spanish:
  - uno de sus oficiales ilustres
  - uno de sus príncipes distinguidos
  lexicon: LSJ
  rationale: ἄρχων puede abarcar gobernante, oficial o autoridad; «gobernantes» comunica la función, y «distinguidos» refleja ἔνδοξος sin forzar un término demasiado jerárquico o arcaico.
- source_word: μισοῦντα
  english_pob_choice: who hated
  chosen_spanish: que odiaba
  alternatives_spanish:
  - que aborrecía
  - odiando
  lexicon: LSJ
  rationale: La cláusula relativa expresa la disposición de Nicanor hacia Israel; «odiaba» es directo y fiel al matiz fuerte del participio.
- source_word: ἐχθραίνοντα
  english_pob_choice: was hostile to
  chosen_spanish: era hostil contra
  alternatives_spanish:
  - actuaba como enemigo contra
  - mostraba hostilidad contra
  lexicon: LSJ
  rationale: Se mantiene la distinción entre odiar y ser hostil, sin reducir ambos verbos a un solo sinónimo. «Contra» suena natural en español para hostilidad dirigida a un pueblo.
- source_word: ἐνετείλατο
  english_pob_choice: commanded
  chosen_spanish: le ordenó
  alternatives_spanish:
  - le mandó
  - le encargó
  lexicon: LSJ
  rationale: El verbo expresa una orden dada con autoridad; «le ordenó» conserva bien esa fuerza en español formal.
- source_word: ἐξᾶραι τὸν λαόν
  english_pob_choice: to destroy the people
  chosen_spanish: destruir al pueblo
  alternatives_spanish:
  - exterminar al pueblo
  - arrasar al pueblo
  - extirpar al pueblo
  lexicon: LSJ
  rationale: El contexto bélico y la historia de persecución requieren un verbo fuerte. «Destruir» preserva la gravedad sin exceder lo que el griego permite; el objeto colectivo se expresa naturalmente con «al pueblo».
theological_decisions:
- issue: Intensidad de ἐξᾶραι τὸν λαόν
  english_pob_reading: destroy the people
  chosen_spanish_reading: destruir al pueblo
  alternative_spanish_readings:
  - exterminar al pueblo
  - extirpar al pueblo
  - arrasar al pueblo
  rationale: El griego indica la eliminación del pueblo en un contexto hostil. «Destruir» comunica la amenaza con solemnidad y mantiene el rango semántico sin convertirla en una interpretación más específica de la necesaria.
  doctrine_reference: Principio de primacía del idioma original y equivalencia óptima; preservar la fuerza del juicio/violencia narrada sin suavizarla.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió «destroy the people» por un registro más formal que «wipe out» sin perder la fuerza de ἐξᾶραι. En español se reflejó esa decisión con «destruir al pueblo».
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque aquí no aparece el nombre divino ni un sustituto reverencial.
  - Se usa «Nicanor» como forma establecida en español, aunque el inglés audit trail prefiera la transliteración más cercana al griego.
  - Se mantiene la diferencia entre «odiaba» y «era hostil» para no aplanar las dos participios griegos.
  - «Pueblo» traduce τὸν λαόν de forma colectiva y natural en español bíblico.
  - Las notas a y b conservan alternativas léxicas pertinentes sin duplicar el contenido del cuerpo principal.
