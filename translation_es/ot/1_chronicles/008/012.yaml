translation:
  language: es
  text: 'Los hijos de Elpaal: Eber, Misham y Semed[b]; él edificó Ono y Lod y sus aldeas[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'sus hijas', un modismo hebreo para las aldeas o asentamientos dependientes de una ciudad.
    reason: lexical_alternative
  - marker: b
    text: El pronombre 'él' se entiende más naturalmente como referido a Semed, el último hijo nombrado; algunos lo toman de manera más amplia respecto de la línea familiar.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: La forma constructa plural introduce una lista genealógica. En español, 'Los hijos de' comunica de manera natural el encabezado genealógico sin añadir un matiz conjuntivo innecesario.
- source_word: אֶלְפַּעַל
  english_pob_choice: Elpaal
  chosen_spanish: Elpaal
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de manera directa y transparente.
- source_word: עֵבֶר
  english_pob_choice: Eber
  chosen_spanish: Eber
  alternatives_spanish:
  - Heber
  lexicon: Nombre propio
  rationale: Transliteración directa acorde con la grafía hebrea y la práctica POB de preservar la forma más inmediata al original.
- source_word: וּמִשְׁעָם
  english_pob_choice: Misham
  chosen_spanish: Misham
  lexicon: Nombre propio
  rationale: Nombre propio transliterado directamente.
- source_word: וָשָׁמֶד
  english_pob_choice: and Shemed
  chosen_spanish: Semed
  alternatives_spanish:
  - Shemed
  - Shamed
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio manteniendo la consonantización hebrea con una adaptación española breve y legible. Se evita 'Shemed' por la grafía inglesa y 'Shamed' por sugerir una vocalización menos directa; 'Semed' funciona bien en español como forma transliterada.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - quien
  lexicon: HALOT
  rationale: El pronombre independiente de 3ms se entiende de forma más natural como 'él', retomando al último individuo nombrado. La alternativa 'quien' introduciría un giro relativo no exigido por el hebreo.
- source_word: בָּנָה
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: El perfecto qal de בנה significa 'construir/edificar'. 'Edificó' conserva el sentido básico con registro digno y bíblico sin cargar una interpretación adicional como 'fundó' o 'reconstruyó'.
- source_word: אֶת אוֹנוֹ
  english_pob_choice: Ono
  chosen_spanish: Ono
  lexicon: Topónimo
  rationale: Topónimo transliterado directamente; el marcador de objeto no se expresa en español.
- source_word: וְאֶת לֹד
  english_pob_choice: and Lod
  chosen_spanish: y Lod
  alternatives_spanish:
  - y Lida
  lexicon: Topónimo
  rationale: Se mantiene la forma hebrea directa 'Lod' frente a una forma posterior como 'Lida', para seguir más de cerca el texto fuente.
- source_word: וּבְנֹתֶיהָ
  english_pob_choice: and its villages
  chosen_spanish: y sus ciudades
  alternatives_spanish:
  - y sus aldeas
  - y sus poblados
  - y sus hijas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'y sus hijas', un modismo para asentamientos dependientes de una ciudad. 'Ciudades' es una equivalencia sobria y comprensible en español, aunque deja menos explícita la imagen idiomática; por eso se conserva la nota de lectura alternativa.
theological_decisions:
- issue: Pronombre singular 'él'
  english_pob_reading: he most naturally refers to Shemed, the last named son; some understand it more loosely in relation to the family line.
  chosen_spanish_reading: él se refiere naturalmente a Semed, el último hijo nombrado; también puede entenderse de manera más amplia respecto de la línea familiar.
  alternative_spanish_readings:
  - quien edificó podría referirse a toda la línea
  - el sujeto podría ser colectivo
  rationale: Se mantiene la ambigüedad controlada del hebreo, favoreciendo la referencia inmediata al último nombre sin excluir una lectura más amplia de la genealogía. No se resuelve dogmáticamente el antecedente.
  doctrine_reference: Ninguna; cuestión sintáctico-referencial
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó 'with its surrounding villages' por 'and its villages' para acercarse más al hebreo. Esta versión española sigue esa mayor literalidad y evita ampliar el modismo a 'aldeas circundantes' en el cuerpo del texto, reservando la explicación idiomática para la nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar del nombre divino cuando aparezca, pero este versículo no lo contiene.
  - '''Lod'' se conserva transliterado para seguir el hebreo; no se sustituye por una forma histórica posterior.'
  - '''edificó'' mantiene el valor básico de בנה sin introducir ''fundó'' ni ''reconstruyó''.'
  - '''sus ciudades'' refleja la revisión textual inglesa más literal; la nota aclara el modismo hebreo.'
  - La puntuación con dos puntos tras el encabezado genealógico reproduce la función de introducción de lista.
