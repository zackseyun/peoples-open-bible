review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: imperativo de atención, vocativo a gobernantes, objeto colectivo de su gobierno, y tono de reprensión por su orgullo. Sin embargo, «se enorgullecen sobre muchedumbres de naciones» no representa bien el valor idiomático de γεγαυρωμένοι ἐπὶ ὄχλοις ἐθνῶν; en español «sobre» suena poco natural y puede sugerir ubicación o dominio físico más que la base/objeto de la jactancia. La nota inglesa ya documenta la alternativa «because of throngs of nations», y el español debe reflejar mejor ese matiz.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «se enorgullecen sobre muchedumbres de naciones» es torpe en español. «Escuchen» funciona, aunque «Presten oído» sería más literal; no es necesario cambiarlo. «Ustedes que gobiernan multitudes» es legible y natural. Conviene ajustar la segunda mitad para una formulación idiomática y fiel, como «se jactan de las muchedumbres de naciones».
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. Las decisiones léxicas principales están en línea con la POB, salvo la preposición/construcción para ἐπί con γεγαυρωμένοι, donde el español actual requiere una adaptación idiomática más fiel al sentido de jactarse por/de aquello que poseen o dominan.
  issues:
  - severity: medium
    issue: 'Construcción no idiomática: «se enorgullecen sobre muchedumbres de naciones»'
    rationale: Aunque intenta seguir de cerca «over crowds of nations», en español «enorgullecerse sobre» no suena natural ni comunica bien que las muchedumbres son la base u objeto de la jactancia.
  - severity: low
    issue: «Se enorgullecen» atenúa el matiz de «boast»
    rationale: γεγαυρωμένοι tiene un matiz de altivez/jactancia; «se jactan» refleja mejor el tono de reprensión que «se enorgullecen», que puede sonar menos crítico.
  - severity: low
    issue: La nota alternativa puede afinarse en naturalidad
    rationale: «Por las muchedumbres de las naciones» es comprensible, pero «de las muchedumbres de naciones» o «a causa de muchedumbres de naciones» se ajusta mejor al español y al sentido documentado.
  revised_spanish_text: Escuchen[a], ustedes que gobiernan multitudes y se jactan de las muchedumbres de naciones.
  revised_footnotes:
  - marker: a
    text: 'O: «Presten atención, ustedes que tienen poder sobre una multitud y exultan a causa de muchedumbres de naciones».'
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y el tono del original, pero se reemplaza «se enorgullecen sobre» por «se jactan de» para lograr un español natural que represente mejor la jactancia expresada por γεγαυρωμένοι ἐπὶ. La nota alternativa también se ajusta para reflejar el valor posible de ἐπί como base/causa de la exultación.
