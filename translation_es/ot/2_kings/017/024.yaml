revisions:
- from: Entonces el rey de Asiria hizo venir gente de Babilonia[a], de Cutá, de Avva, de Hamat y de Sefarvaim, y la asentó en las ciudades de Samaria, en lugar de los hijos de Israel[b]. Tomaron posesión de Samaria y habitaron en sus ciudades.
  to: Entonces el rey de Asiria hizo venir gente de Babilonia, de Cutá, de Avva[a], de Hamat y de Sefarvaim, y los estableció en las ciudades de Samaria, en lugar de los hijos de Israel[b]. Tomaron posesión de Samaria y habitaron en sus ciudades.
  rationale: Se corrigió la nota [a] para alinearla con la alternativa documentada sobre Avva/Awwa y se movió su anclaje al topónimo correcto. También se reemplazó «la asentó» por «los estableció», que expresa bien el causativo de ישׁב y evita una formulación poco natural en español con «gente». Se conservaron «los hijos de Israel» y el resto de las decisiones léxicas principales por su fidelidad al expediente y buena legibilidad.
