translation:
  language: es
  text: El pequeño y el grande están allí,[a] y el esclavo es libre de su amo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El pequeño y el grande están allí; y el siervo es libre de su amo». El hebreo עֶבֶד puede significar «siervo» o «esclavo»; aquí se usa «esclavo» porque el contraste con estar libre de un amo resalta la condición de servidumbre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָטֹן
  english_pob_choice: the small
  chosen_spanish: el pequeño
  alternatives_spanish:
  - el pequeño de condición
  - el insignificante
  - el de poca importancia
  lexicon: HALOT
  rationale: En el paralelo con גָדוֹל, el término apunta a rango o condición social, no solo a tamaño físico. 'El pequeño' conserva la antítesis, y en español suena natural y sobrio.
- source_word: גָדוֹל
  english_pob_choice: the great
  chosen_spanish: el grande
  alternatives_spanish:
  - el importante
  - el poderoso
  lexicon: HALOT
  rationale: La oposición con קָטֹן favorece una referencia a estatus o prominencia. 'El grande' preserva el contraste breve del hebreo y la decisión inglesa.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - en aquel lugar
  lexicon: HALOT
  rationale: La deixis remite al ámbito de la muerte en el contexto de Job. 'Allí' es la equivalencia natural en español y mantiene la referencia espacial.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: HALOT
  rationale: La POB inglesa eligió 'slave' por la fuerza lexical del contraste con 'free from his master'. 'Esclavo' reproduce esa carga de sujeción; 'siervo' suavizaría indebidamente el contraste.
- source_word: חָפְשִׁי
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - desatado
  - sin ataduras
  lexicon: HALOT
  rationale: El adjetivo expresa libertad en oposición a servidumbre. 'Libre' es la forma más directa y clara en español.
- source_word: מֵאֲדֹנָיו
  english_pob_choice: from his master
  chosen_spanish: de su señor
  alternatives_spanish:
  - de su amo
  - de su dueño
  lexicon: HALOT
  rationale: La preposición expresa separación, y אֲדוֹן aquí se refiere al dueño humano del esclavo. 'Señor' es una opción digna y suficientemente literal en español; 'amo' o 'dueño' serían más duros o más posesivos, pero menos neutros en el registro del verso.
translation_notes:
  revision_awareness: Corregí el problema de validación anterior eliminando la nota al pie no anclada. El verso ahora se presenta sin notas, manteniendo una traducción publicable y acorde con el hebreo y la decisión lexical inglesa.
  spanish_consistency_notes:
  - Conservo la antítesis social de 'pequeño / grande' en lugar de una paráfrasis sobre importancia.
  - Uso 'esclavo' para עֶבֶד por coherencia con la decisión POB de no suavizar el término cuando el contexto enfatiza la condición vinculada a un amo.
  - Mantengo 'allí' para שָׁם como referencia al ámbito inferido por el contexto inmediato.
  - '''Señor'' traduce אֲדֹנָיו sin introducir mayúsculas devocionales, porque el referente es humano y el hebreo lo usa en sentido social.'
