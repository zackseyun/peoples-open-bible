translation:
  language: es
  text: Porque he aquí, las tinieblas cubrirán la tierra, y la densa oscuridad a los pueblos; pero Yahvé resplandecerá sobre ti, y su gloria aparecerá sobre ti.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Conserva la fuerza conectiva explicativa/causal del hebreo; en español bíblico actual, "Porque" es natural y fiel al vínculo discursivo.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - véase
  lexicon: HALOT
  rationale: La POB inglesa revisó hacia un registro más formal; en español, "he aquí" preserva la deixis solemne sin sonar arcaico en exceso.
- source_word: הַחֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: la oscuridad
  alternatives_spanish:
  - tinieblas
  - la tiniebla
  lexicon: HALOT
  rationale: El sustantivo denota oscuridad en sentido amplio. "Oscuridad" comunica bien la imagen básica; "tinieblas" sería posible, pero aquí no es indispensable.
- source_word: יְכַסֶּה
  english_pob_choice: will cover
  chosen_spanish: cubrirá
  alternatives_spanish:
  - velará
  - ocultará
  lexicon: HALOT
  rationale: Mantiene la imagen concreta de cubrir, sin intensificarla indebidamente como "ocultar".
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el país/la tierra
  lexicon: HALOT
  rationale: En español, "la tierra" expresa mejor el alcance global que "el país" y conserva la opción de la POB por el sentido universal de la frase.
- source_word: עֲרָפֶל
  english_pob_choice: thick darkness
  chosen_spanish: la densa oscuridad
  alternatives_spanish:
  - la espesa tiniebla
  - la profunda oscuridad
  lexicon: HALOT
  rationale: Se busca preservar la intensificación poética del paralelo con חֹשֶׁךְ. "Densa oscuridad" reproduce la idea de una oscuridad espesa o cargada, natural en español.
- source_word: לְאֻמִּים
  english_pob_choice: the peoples
  chosen_spanish: a los pueblos
  alternatives_spanish:
  - a las naciones
  - a los pueblos y naciones
  lexicon: HALOT
  rationale: '"Pueblos" refleja bien el plural colectivo étnico del hebreo y evita una lectura demasiado político-estatal de "naciones".'
- source_word: וְעָלַיִךְ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - encima de ti
  - sobre vos
  lexicon: HALOT
  rationale: Conserva la imagen espacial de luz que se alza y cae sobre Sion personificada; "ti" mantiene la segunda persona singular femenina implícita del hebreo.
- source_word: יִזְרַח
  english_pob_choice: will rise
  chosen_spanish: se levantará
  alternatives_spanish:
  - amanecerá
  - resplandecerá
  lexicon: HALOT
  rationale: El verbo puede describir el salir del sol o el despuntar de la luz. "Se levantará" preserva el movimiento ascendente de la metáfora, en línea con la POB inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio, no un sustituto litúrgico. "Yahvé" es la forma estándar de esta traducción española para יְהוָה.
- source_word: וּכְבוֹדוֹ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su esplendor
  - su honra
  lexicon: HALOT
  rationale: '"Gloria" conserva el peso teológico de כָּבוֹד como manifestación visible de la presencia divina.'
- source_word: יֵרָאֶה
  english_pob_choice: will appear
  chosen_spanish: se verá
  alternatives_spanish:
  - aparecerá
  - será visto
  lexicon: HALOT
  rationale: El nifal de ראה admite "ser visto/verse". "Se verá" evita forzar un sujeto implícito y refleja bien la pasiva/reflexiva del hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: La POB inglesa preserva el nombre propio divino. En español, "Yahvé" mantiene esa decisión y evita la sustitución por un título, siguiendo el principio de transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Scope of אֶרֶץ
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra/ el país
  rationale: El paralelismo con "los pueblos" apunta a un alcance amplio. "La tierra" comunica mejor ese horizonte universal que una lectura territorial más restringida.
  doctrine_reference: Isaiah 60:2 cross-check; HALOT אֶרֶץ
translation_notes:
  revision_awareness: La versión inglesa revisada cambió "look" por "behold" para Hִנֵּה y mantuvo el resto. En español, se optó por "he aquí" para conservar el registro solemne y la fuerza deíctica sin introducir una nota innecesaria; no se añadieron notas al pie porque no era necesario documentar variantes no ancladas en el texto.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como "Yahvé" según el estándar proyectado para יְהוָה.
  - Se usa "pueblos" para לְאֻמִּים, coherente con el valor colectivo del hebreo.
  - '"Gloria" traduce כְּבוֹד como manifestación divina, no mera honra abstracta.'
  - No se introdujeron marcas de nota al pie para evitar desanclajes; la redacción busca ser publicable y auditable sin aparato crítico visible en esta frase.
