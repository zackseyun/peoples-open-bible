revisions:
- from: 'Entonces Joiadá, el sacerdote, mandó a los capitanes de centenas, encargados[a] del ejército, y les dijo: «Saquen a ella entre las filas, y al que venga tras ella, mátenlo a espada». Porque el sacerdote había dicho: «No sea muerta en la casa de Yahvé».'
  to: 'Entonces Joiadá, el sacerdote, mandó a los capitanes de cien, encargados del ejército, y les dijo: «Sáquenla entre las filas[a], y al que venga tras ella, mátenlo a espada». Porque el sacerdote había dicho: «No debe ser ejecutada en la casa de Yahvé».'
  rationale: 'La revisión corrige tres puntos principales: 1) mueve la nota al lugar correcto, sobre la frase difícil «entre las filas»; 2) reemplaza el calco antinatural «Saquen a ella» por «Sáquenla»; 3) sustituye «No sea muerta» por «No debe ser ejecutada», que comunica bien la prohibición pasiva/judicial del hebreo en español claro y digno. Además, «capitanes de cien» mejora la naturalidad sin introducir anacronismos.'
  reviewer_model: gpt-5.4
