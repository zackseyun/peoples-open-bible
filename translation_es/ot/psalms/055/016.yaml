translation:
  language: es
  text: Caiga la muerte sobre ellos[a]; que desciendan vivos al Seol[b], porque hay maldad en su morada[c], en medio de ellos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Caigan desolaciones sobre ellos», «Que la muerte venga súbitamente sobre ellos», o algo similar. La primera palabra hebrea es difícil y su matiz exacto es incierto.'
    reason: textual_variant
  - marker: b
    text: Seol es el término hebreo para el ámbito de los muertos; alternativamente, «la sepultura».
    reason: lexical_alternative
  - marker: c
    text: 'O: «en su habitación» o «en su residencia»; el término puede referirse al lugar donde habitan o se alojan.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «dentro de ellos» o «entre ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ישימות
  english_pob_choice: Let death come upon them
  chosen_spanish: Caiga muerte sobre ellos
  alternatives_spanish:
  - Que venga muerte sobre ellos
  - Caigan desolaciones sobre ellos
  - Que la muerte venga súbitamente sobre ellos
  lexicon: HALOT
  rationale: La forma hebrea es difícil y el propio audit trail inglés conserva la incertidumbre. En español, «Caiga muerte sobre ellos» mantiene el tono imprecatorio y la brevedad poética sin añadir una interpretación más fuerte que el texto no asegure. Se preserva así la tensión lexical, dejando abiertas las alternativas documentadas.
- source_word: עָלֵימוֹ
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - sobre ellos
  - contra ellos
  lexicon: HALOT
  rationale: La preposición con sufijo de 3.ª persona plural se expresa naturalmente con «sobre ellos», que conserva el matiz de caída/visita que tiene el hebreo poético.
- source_word: יֵרְדוּ
  english_pob_choice: let them go down
  chosen_spanish: que desciendan
  alternatives_spanish:
  - que bajen
  - que vayan abajo
  lexicon: HALOT
  rationale: «Desciendan» conserva la imagen direccional y es más literario que «bajen», sin perder claridad en español moderno.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el Seol
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se translitera el término como «Seol» para preservar el concepto hebreo sin reducirlo de antemano a «sepulcro» o a una noción doctrinal posterior como «infierno». Se mantiene la ambigüedad semántica documentada.
- source_word: חַיִּים
  english_pob_choice: alive
  chosen_spanish: vivos
  alternatives_spanish:
  - vivos
  - siendo aún vivos
  lexicon: HALOT
  rationale: «Vivos» reproduce el valor adverbial con naturalidad en español y conserva el contraste con la caída a Seol.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce con claridad la razón de la imprecación en español contemporáneo.
- source_word: רָעוֹת
  english_pob_choice: evil
  chosen_spanish: maldad
  alternatives_spanish:
  - mal
  - maldades
  - maldad / calamidades
  lexicon: HALOT
  rationale: El contexto apunta a mal moral o perversidad presente entre ellos. «Maldad» comunica mejor esa carga que «mal» y evita reducirlo solo a desgracias.
- source_word: בִּמְגוּרָם
  english_pob_choice: in their dwelling
  chosen_spanish: en su morada
  alternatives_spanish:
  - en su morada
  - en su habitación
  - en su lugar de residencia
  lexicon: HALOT
  rationale: «Morada» es claro, digno y bíblicamente idiomático en español, y preserva el sentido locativo del sustantivo sin fijarlo innecesariamente a un solo matiz.
- source_word: בְּקִרְבָּם
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - en su interior
  - entre ellos
  lexicon: HALOT
  rationale: «En medio de ellos» mantiene la ambigüedad posible entre interioridad y convivencia/comunidad, como refleja el audit trail inglés con «in their midst» y las alternativas «within them» / «among them».
theological_decisions:
- issue: Tratamiento de שְׁאוֹל
  english_pob_reading: Retain the Hebrew term 'Sheol' in the main text
  chosen_spanish_reading: Retener «Seol» en el texto principal
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  - el infierno
  rationale: La elección conserva el trasfondo del hebreo bíblico y evita resolver demasiado pronto una noción que tiene alcance poético y teológico amplio. No se adopta «infierno», porque introduciría una identificación doctrinal que el texto hebreo aquí no obliga.
  doctrine_reference: 'Translation philosophy: primacía de la lengua מקור; preservar la tensión teológica del término hebreo en lugar de cerrarla con una equivalencia doctrinal posterior.'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés, que eliminó «deceitfully» por no estar sustentado en el hebreo. La redacción española evita ese añadido y mantiene el paralelismo: caída de muerte, descenso vivo al Seol y fundamentación en la maldad presente en su morada y en medio de ellos.'
  spanish_consistency_notes:
  - Se usa «Seol» de forma consistente como transliteración del término hebreo, conforme al criterio POB de no resolverlo automáticamente como «infierno».
  - Se conserva el tono poético-imprecatorio del verso con verbos en subjuntivo jussivo («Caiga», «que desciendan»).
  - «Maldad» se emplea para רָעוֹת siguiendo el valor moral documentado por el audit trail; no se suaviza a «desgracias» en el texto principal.
  - «En medio de ellos» preserva la doble posibilidad espacial/interior que el inglés auditado deja abierta.
