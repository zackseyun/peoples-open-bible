translation:
  language: es
  text: No obedeceremos el mandato del rey[a], desviándonos de nuestro culto a la derecha o a la izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No escucharemos la ley del rey». El verbo griego puede significar «escuchar» u «obedecer», y νόμος se traduce más literalmente como «ley».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκουσόμεθα
  english_pob_choice: obey
  chosen_spanish: escucharemos
  alternatives_spanish:
  - obedeceremos
  - atenderemos
  lexicon: BDAG
  rationale: El griego puede significar tanto 'oír/escuchar' como 'obedecer' según el contexto. Aquí el rechazo se formula con el verbo de escuchar, y en español 'no escucharemos' conserva esa fuerza verbal sin perder la idea de desobediencia implícita; por eso se mantiene la ambigüedad auditiva documentada por el POB inglés.
- source_word: νόμον
  english_pob_choice: command
  chosen_spanish: ley
  alternatives_spanish:
  - mandato
  - comando
  - decreto
  lexicon: LSJ
  rationale: Aunque el POB inglés pasó por 'command', el griego λέει literalmente 'ley'. En español, 'ley del rey' reproduce con precisión la forma original y deja visible la tensión entre autoridad real y fidelidad cultual; 'mandato' o 'decreto' serían posibles, pero suavizan la formulación del texto base.
- source_word: παρελθεῖν
  english_pob_choice: turning aside
  chosen_spanish: apartándonos
  alternatives_spanish:
  - desviándonos
  - apartándonos de
  - pasando de largo
  lexicon: LSJ
  rationale: El infinitivo expresa desviación respecto de una práctica establecida. 'Apartándonos' transmite la idea de apartarse o desviarse en español natural y permite mantener el paralelo con 'a la derecha o a la izquierda'.
- source_word: λατρίαν
  english_pob_choice: worship
  chosen_spanish: culto
  alternatives_spanish:
  - adoración
  - servicio
  - servicio cultual
  lexicon: BDAG
  rationale: En este contexto se trata de la observancia religiosa de Israel. 'Culto' es claro en español e incluye la dimensión de servicio religioso sin imponer una equivalencia demasiado moderna o restringida como 'adoración'.
- source_word: δεξιὰν ἢ ἀριστεράν
  english_pob_choice: to the right or to the left
  chosen_spanish: ni a la derecha ni a la izquierda
  alternatives_spanish:
  - a la derecha o a la izquierda
  - ni hacia la derecha ni hacia la izquierda
  lexicon: LSJ
  rationale: La expresión es un modismo de no desviarse en absoluto. En español, la construcción negativa correlativa ('ni... ni...') comunica mejor el sentido idiomático de firmeza y evita que se lea como una simple alternativa direccional.
theological_decisions:
- issue: Relación entre la ley del rey y la fidelidad al culto
  english_pob_reading: The king’s command is set against faithful worship; the POB makes the royal order explicit and contrasts it with worship.
  chosen_spanish_reading: La 'ley del rey' se entiende como una ordenanza real opuesta al culto fiel de Israel, sin suavizar la contraposición.
  alternative_spanish_readings:
  - el mandato del rey
  - el decreto del rey
  - la orden del rey
  rationale: El griego usa νόμος con un gobernante humano, y el contraste con λατρίαν ἡμῶν muestra una colisión entre autoridad política y práctica religiosa. 'Ley del rey' preserva el vocabulario del texto y deja visible esa tensión sin convertirla en lenguaje eclesiástico posterior.
  doctrine_reference: 'Principio de traducción: primacía del original y conservación de tensiones léxicas y teológicas documentadas.'
translation_notes:
  revision_awareness: El texto inglés auditado revisó 'decree' a 'command' para νόμος, pero el griego y la nota léxica conservan 'law' como opción más literal. La presente versión española refleja esa tensión de manera auditable mediante 'ley', mientras mantiene la fuerza de rechazo con 'no escucharemos'.
  spanish_consistency_notes:
  - Se conserva la referencia a la práctica de Israel con 'culto', evitando el término más genérico 'adoración' porque el contexto es cultual y comunitario.
  - La nota al pie recoge la alternativa literal 'ley' frente a lecturas interpretativas como 'mandato' o 'decreto', siguiendo el audit trail inglés.
  - La estructura negativa 'ni a la derecha ni a la izquierda' mantiene el modismo bíblico de no desviarse en absoluto.
