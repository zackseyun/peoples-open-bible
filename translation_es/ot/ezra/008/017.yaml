    rationale: El inglés POB conserva una nota cultural para aclarar que «ministers» no implica oficio religioso posterior. En español «ministros» también puede sugerir un cargo eclesiástico o incluso civil, por lo que la aclaración es importante y debe anclarse en el texto.
  - severity: low
