    text: «Batido» se refiere al aceite obtenido de aceitunas machacadas o batidas; algunas traducciones dicen «prensado».
    reason: lexical_alternative
  - marker: c
    text: O, «para un cordero»; en contexto, probablemente se refiere al primero de los dos corderos diarios mencionados en los versículos circundantes.
    reason: alternative_reading
  revision_rationale: 'La revisión corrige el principal problema de fidelidad idiomática en español: «para el cordero uno». Se reemplaza por «para el cordero», que conserva la definición del hebreo sin producir una construcción extraña en español, mientras la nota mantiene la alternativa «para un cordero» y la posible referencia contextual al primero de los dos corderos diarios. Se preservan las demás decisiones léxicas del audit trail.'
