revisions:
- from: Tu ojo no tendrá compasión[a] de él, sino que purgarás la sangre inocente[b] de Israel, y te irá bien.
  to: Tu ojo no se compadecerá de él[a], sino que purgarás la sangre inocente[b] de Israel, y te irá bien.
  rationale: Se ajusta la frase principal a un español más natural sin perder el modismo hebreo del 'ojo'. Se corrige la nota [a] para evitar 'perdón' como absolución moral y reflejar mejor la alternativa documentada de 'spare', es decir, no mostrar indulgencia ni dejar sin ejecutar la justicia debida. La nota [b] se conserva esencialmente igual porque comunica bien la idea de culpa de sangre comunitaria.
