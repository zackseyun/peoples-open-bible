revisions:
- from: Lo pondrás[a] en una sola canasta, y lo llevarás[b] en la canasta, junto con el becerro y los dos carneros.
  to: Los pondrás en una sola canasta[a], y los acercarás en la canasta[b], junto con el toro y los dos carneros.
  rationale: Se corrige el pronombre al plural para reflejar אוֹתָם, se reemplaza «llevarás» por «acercarás» para conservar el matiz cultual de הקריב, se ajusta פַּר a «toro» conforme a la decisión auditada «bull», y se limpian las notas para que su español sea natural y preciso.
