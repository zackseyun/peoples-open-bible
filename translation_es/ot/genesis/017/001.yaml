translation:
  language: es
  text: 'Cuando Abram tenía noventa y nueve años, Yahvé se apareció a Abram y le dijo: «Yo soy Dios Todopoderoso[a]. Camina delante de mí y sé intachable».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: El Shaddai. Tradicionalmente se translitera más que se traduce; el matiz exacto de Shaddai es debatido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי / when ... was
  english_pob_choice: When Abram was
  chosen_spanish: Cuando Abram tenía
  alternatives_spanish:
  - Y aconteció que Abram tenía
  - Ahora bien, Abram tenía
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce el marco temporal de la escena. En español, «Cuando Abram tenía…» comunica con naturalidad ese valor temporal sin forzar un calco arcaico.
- source_word: בֶּן תִּשְׁעִים שָׁנָה וְתֵשַׁע שָׁנִים
  english_pob_choice: ninety-nine years old
  chosen_spanish: noventa y nueve años
  alternatives_spanish:
  - de noventa y nueve años
  - noventa y nueve años de edad
  lexicon: HALOT
  rationale: La expresión hebrea de edad equivale idiomáticamente a una edad cumplida. En español, «noventa y nueve años» es la forma más natural y fiel, y evita el literalismo «un hijo de noventa años y nueve años».
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - apareció
  - se dejó ver
  - se reveló
  lexicon: HALOT
  rationale: En este contexto narrativo con Yahvé como sujeto, «se apareció» mantiene el sentido de aparición divina que el POB inglés expresa con «appeared».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre propio divino sin sustituirlo por un título. En español, «Yahvé» es la forma recomendada para esta serie y corresponde al valor auditado del tetragrámaton.
- source_word: אֵל שַׁדַּי
  english_pob_choice: God Almighty
  chosen_spanish: Dios Todopoderoso
  alternatives_spanish:
  - Dios Omnipotente
  - El Shaddai
  - Dios el Todopoderoso
  lexicon: HALOT
  rationale: El POB inglés traduce el título en vez de transliterarlo. En español, «Dios Todopoderoso» comunica de forma clara y digna el título divino, sin perder la fuerza del epíteto.
- source_word: הִתְהַלֵּךְ לְפָנַי
  english_pob_choice: Walk before me
  chosen_spanish: Camina delante de mí
  alternatives_spanish:
  - Anda delante de mí
  - Vive en mi presencia
  - Camina en mi presencia
  lexicon: HALOT
  rationale: La imagen de caminar se mantiene, pero en español «delante de mí» suena más natural que un calco rígido. Conserva el matiz relacional y de conducta de vida del hebreo.
- source_word: וֶהְיֵה תָמִים
  english_pob_choice: and be blameless
  chosen_spanish: y sé intachable
  alternatives_spanish:
  - y sé irreprochable
  - y sé íntegro
  - y sé perfecto
  lexicon: HALOT
  rationale: תָמִים en este contexto expresa integridad moral y fidelidad de vida. «Intachable» conserva la exigencia ética sin sugerir perfección absoluta, que sería una sobretraducción.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La lectura auditada del texto es el nombre propio del pacto, no un título sustituido. «Yahvé» preserva esa identidad divina en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Título divino אֵל שַׁדַּי
  english_pob_reading: God Almighty
  chosen_spanish_reading: Dios Todopoderoso
  alternative_spanish_readings:
  - El Shaddai
  - Dios Omnipotente
  rationale: El texto bíblico presenta un título divino, y el POB inglés opta por traducirlo. En español, se mantiene la traducción semántica para no introducir transliteración innecesaria en el cuerpo del verso.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; §3
translation_notes:
  revision_awareness: El paquete fuente muestra alta concordancia y no registra revisiones aplicadas; por eso la redacción española sigue de cerca la lectura auditada del inglés POB, ajustando solo la idiomaticidad necesaria en español y conservando la tensión léxica de אֵל שַׁדַּי mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al criterio doctrinal del proyecto.
  - Se traduce אֵל שַׁדַּי como «Dios Todopoderoso» en el texto principal y se preserva la forma hebrea en nota por su relevancia léxica.
  - «Intachable» se eligió para תָמִים por su valor ético-covenantal y su naturalidad en español.
  - La puntuación y el estilo mantienen un registro bíblico moderno, sin arcaísmos innecesarios.
