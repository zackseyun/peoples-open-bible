base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/003/003.yaml
  text: God comes from Teman[a], and the Holy One from Mount Paran. Selah. His splendor covers the heavens[d][c][b], and his praise fills the earth.
  footnotes:
  - marker: a
    text: Teman may also be understood more generally as 'the south,' though here it is likely the place name, parallel to Mount Paran.
    reason: lexical_alternative
  - marker: b
    text: Selah is a liturgical or musical term of uncertain meaning, traditionally left untranslated.
    reason: cultural_note
  - marker: c
    text: Or 'his majesty' or 'his glory' covers the heavens.
    reason: lexical_alternative
  - marker: d
    text: Or 'his praise has filled the earth.' The Hebrew verbal form may also be rendered as past or future in this poetic context.
    reason: alternative_reading
