translation:
  language: es
  text: 'Pero si el esclavo dice claramente[a]: «Amo a mi amo, a mi esposa y a mis hijos[b]; no saldré libre»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dice con énfasis» / «dice expresamente»; el hebreo usa un infinitivo absoluto con el verbo finito para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: Lit. «mis hijos varones»; la forma hebrea es masculina plural, aunque en este contexto doméstico puede usarse de manera general para los hijos de la familia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La partícula introduce una excepción contrastiva respecto del caso anterior; «Pero si» conserva mejor esa oposición que un simple «si», y suena natural en español.
- source_word: אָמֹר יֹאמַר
  english_pob_choice: plainly says
  chosen_spanish: dice claramente
  alternatives_spanish:
  - dice con énfasis
  - dice expresamente
  - dice ciertamente
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la afirmación. «Dice claramente» comunica esa fuerza enfática sin sonar forzado en español.
- source_word: הָעֶבֶד
  english_pob_choice: the slave
  chosen_spanish: el esclavo
  alternatives_spanish:
  - el siervo
  - el criado
  - el esclavo contratado
  lexicon: HALOT
  rationale: El contexto jurídico trata de una persona vinculada por servidumbre y su salida a libertad; «esclavo» preserva mejor el valor de estado ligado que «siervo».
- source_word: אָהַבְתִּי
  english_pob_choice: I love
  chosen_spanish: amo
  alternatives_spanish:
  - he amado
  - quiero a
  lexicon: HALOT
  rationale: En discurso directo, el perfecto hebreo expresa una disposición presente y estable. En español, el presente («amo») suena más natural y fiel a ese sentido.
- source_word: אֲדֹנִי
  english_pob_choice: my master
  chosen_spanish: mi amo
  alternatives_spanish:
  - mi señor
  - mi dueño
  lexicon: HALOT
  rationale: En este marco doméstico-legal, «amo» refleja la relación de autoridad sobre el esclavo. «Señor» sería demasiado elevado y «dueño» desplaza el matiz relacional.
- source_word: אִשְׁתִּי
  english_pob_choice: my wife
  chosen_spanish: mi esposa
  alternatives_spanish:
  - mi mujer
  lexicon: HALOT
  rationale: Es una equivalencia directa y digna, adecuada al registro bíblico contemporáneo en español.
- source_word: בָּנָי
  english_pob_choice: my children
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis niños
  - mi descendencia
  lexicon: HALOT
  rationale: La forma hebrea es masculina plural y puede abarcar a los hijos en sentido familiar. Aquí «hijos» conserva la forma más cercana al hebreo, como lo permite el contexto doméstico.
- source_word: לֹא אֵצֵא
  english_pob_choice: I will not go out
  chosen_spanish: no saldré
  alternatives_spanish:
  - no me iré
  - no saldré fuera
  lexicon: HALOT
  rationale: «Salir» reproduce el idiomático hebreo para abandonar el servicio; en español basta el verbo simple, con el contexto de libertad ya explicitado por la cláusula siguiente.
- source_word: חָפְשִׁי
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - en libertad
  - como hombre libre
  lexicon: HALOT
  rationale: El adjetivo describe el estado de liberación. «Libre» es la equivalencia más natural y precisa en español.
theological_decisions:
- issue: Rendering of עבד in legal servitude context
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: Sigo la decisión POB de mantener el rasgo de sujeción legal cuando es central. «Esclavo» hace visible el estado de dependencia que la ley está regulando; «siervo» lo suaviza indebidamente en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contested bonded-status rendering by analogy
- issue: Familial plural בנים in household context
  english_pob_reading: my children
  chosen_spanish_reading: mis hijos
  alternative_spanish_readings:
  - mis niños
  - mis muchachos
  rationale: Aunque la forma hebrea es masculina plural, en contexto de hogar puede abarcar la descendencia como conjunto. «Hijos» mantiene la ambigüedad heredada del hebreo sin forzar una paráfrasis.
  doctrine_reference: HALOT semantic range; POB lexical note on masculine plural family reference
translation_notes:
  revision_awareness: 'El borrador sigue la lectura auditada de alta concordancia: mantiene el valor legal de עבד como «esclavo», conserva el énfasis del infinitivo absoluto con una solución española natural, y preserva la posible amplitud de בנים sin añadir explicaciones que el texto no exige.'
  spanish_consistency_notes:
  - Se usa «esclavo» de manera consistente para el estatus jurídico de עבד en este versículo, conforme a la pauta POB para contextos de servidumbre vinculada.
  - Se prefirió «amo» para אֲדֹנִי dentro del diálogo directo, porque en español refleja mejor la relación doméstica concreta que «señor».
  - La frase «no saldré libre» se evitó porque suena menos idiomática en español; «no saldré» ya implica el marco de liberación en el contexto inmediato.
