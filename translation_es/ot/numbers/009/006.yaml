translation:
  language: es
  text: Había hombres que estaban impuros por causa de un cadáver humano[a], de modo que no podían guardar la Pascua ese día; y se acercaron ante Moisés y ante Aarón ese día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «impuros para la נפש de un hombre», un giro idiomático que señala impureza causada por un cadáver humano.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now there were
  chosen_spanish: Ahora había
  alternatives_spanish:
  - Y había
  - Entonces había
  lexicon: HALOT
  rationale: La construcción narrativa introduce una nueva circunstancia. «Ahora había» conserva la función de encuadre del hebreo con un español natural y digno.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - algunos hombres
  lexicon: HALOT
  rationale: El sustantivo es masculino plural específico; «hombres» mantiene la referencia de género y el valor concreto del original.
- source_word: טְמֵאִים לְנֶפֶשׁ אָדָם
  english_pob_choice: unclean by reason of a human corpse
  chosen_spanish: impuros por causa de un cadáver humano
  alternatives_spanish:
  - impuros por causa de un muerto
  - impuros por un cuerpo muerto
  - contaminados por un cadáver humano
  lexicon: HALOT
  rationale: En contexto legal-ritual, la frase alude a impureza por contacto con la muerte. «Cadáver humano» explicita el sentido ritual sin moralizarlo; «impuros» conserva el término técnico de pureza, y «por causa de» reproduce el matiz formal del audit trail inglés.
- source_word: וְלֹא יָכְלוּ
  english_pob_choice: so they could not
  chosen_spanish: de modo que no podían
  alternatives_spanish:
  - y no podían
  - así que no les fue posible
  lexicon: HALOT
  rationale: La cláusula expresa imposibilidad resultante. «De modo que» hace explícita la relación causal implícita en el hebreo y en el inglés auditado.
- source_word: לַעֲשֹׂת הַפֶּסַח
  english_pob_choice: keep the Passover
  chosen_spanish: celebrar la Pascua
  alternatives_spanish:
  - guardar la Pascua
  - hacer la Pascua
  - observar la Pascua
  lexicon: HALOT
  rationale: «Hacer la Pascua» es literal, pero poco natural en español; «celebrar la Pascua» comunica la observancia festivo-ritual sin perder el referente pascual. Se evita «guardar» por sonar menos idiomático en este contexto.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - en ese día
  lexicon: HALOT
  rationale: «En aquel día» preserva la deixis narrativa y el tono formal del relato.
- source_word: וַיִּקְרְבוּ לִפְנֵי
  english_pob_choice: and they came near before
  chosen_spanish: se acercaron ante
  alternatives_spanish:
  - vinieron delante de
  - se presentaron ante
  lexicon: HALOT
  rationale: «Se acercaron» refleja קרב; «ante» traduce לִפְנֵי con una preposición sobria y natural. «Se presentaron ante» sería interpretativo, aunque posible.
- source_word: מֹשֶׁה ... אַהֲרֹן
  english_pob_choice: Moses ... Aaron
  chosen_spanish: Moisés ... Aarón
  lexicon: HALOT
  rationale: Se conservan los nombres propios en su forma castellana estándar, en continuidad con el uso bíblico en español.
theological_decisions:
- issue: Naturaleza de la impureza
  english_pob_reading: Render as ritual uncleanness caused by contact with a human corpse, without importing moral defilement.
  chosen_spanish_reading: Traducir como impureza ritual por contacto con un cadáver humano, sin sugerir culpa moral.
  alternative_spanish_readings:
  - impureza ceremonial
  - contaminación legal
  rationale: En la legislación pentateuca, esta impureza es cultual/ritual, no necesariamente ética. La formulación española debe conservar esa distinción para no sobreinterpretar el texto.
  doctrine_reference: 'Principio de lectura del Pentateuco: pureza ritual versus pecado moral.'
translation_notes:
  revision_awareness: El inglés auditado fue revisado de «because of» a «by reason of» para la frase de impureza; la versión española adopta un registro formal equivalente («por causa de») y conserva la explicación ritual del idioma hebreo. También se mantiene la estructura narrativa de escena y la llegada de los hombres ante Moisés y Aarón.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; este versículo no contiene el tetragrámaton.
  - Se mantiene «Pascua» como término bíblico establecido para הַפֶּסַח.
  - Se preserva el matiz técnico de impureza ritual con «impuros», no con lenguaje moralizante.
  - 'Los nombres propios siguen la ortografía castellana habitual: Moisés, Aarón.'
