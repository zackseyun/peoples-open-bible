  rationale: 'La revisión corrige dos puntos de fidelidad léxica y uno de claridad sintáctica: σώφρονες se expresa mejor como «dueños de sí» que como «sensatos»; φυλάσσοντας τὰ νόμιμα se vuelve más natural y preciso con «guardando la ley»; y «la obedecían» explicita αὐτῇ. Además, se suaviza «amantes de sus hermanos» a «amaban a sus hermanos» para una lectura más natural sin perder la referencia masculina del original.'
