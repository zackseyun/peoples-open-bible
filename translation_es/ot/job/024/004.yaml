review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: los opresores hacen apartarse a los necesitados del camino, y los pobres del lugar se esconden juntos. Sin embargo, la nota [a] no preserva correctamente la alternativa inglesa documentada, porque repite esencialmente la misma idea en vez de reflejar la variante «del camino/de la vía» frente a «del camino» o «de la senda». Además, el texto principal usa «de la tierra», mientras que la decisión léxica auditada prefiere «land» en sentido social-comunitario; en español, «del país» o «de la tierra» pueden funcionar, pero aquí «del país» comunica mejor ese matiz contextual.'
  spanish_quality_summary: El español es claro y natural. «Apartan a los necesitados del camino» y «juntos se esconden» son legibles y dignos. La única mejora estilístico-semántica importante es preferir «los pobres del país» en el texto principal para reflejar mejor el ámbito humano/social del hebreo, dejando «de la tierra» como alternativa en nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Necesitados» para אֶבְיוֹנִים y «pobres» para עֲנִיֵּי mantiene la distinción documentada. «Apartan» es aceptable para יַטּוּ. Se recomienda ajustar la nota [a] para que sea una verdadera alternativa léxica de מִדָּרֶךְ, y mover «de la tierra» a nota para עֲנִיֵּי אָרֶץ.
  issues:
  - severity: medium
    issue: La nota [a] no conserva la alternativa documentada del inglés.
    rationale: La nota inglesa ofrece «They turn the needy from the way», o sea una alternativa para la expresión espacial/idiomática. «O «los apartan del camino»» no aporta una variante real y además introduce un objeto implícito distinto al texto base.
  - severity: medium
    issue: «Los pobres de la tierra» en el texto principal atenúa la preferencia contextual por «land» como ámbito social-comunitario.
    rationale: El audit trail explica que «land» es preferible a «earth» en este contexto. En español, «de la tierra» puede sonar más amplio o más literal; «del país» transmite mejor el paisaje social humano del verso.
  revised_spanish_text: Ellos apartan a los necesitados del camino[a]; juntos se esconden los pobres del país[b].
  revised_footnotes:
  - marker: a
    text: O «los apartan de la senda».
    reason: lexical_alternative
  - marker: b
    text: O «los pobres de la tierra».
    reason: lexical_alternative
  revision_rationale: 'Se mantiene la redacción principal con un ajuste menor: «del país» refleja mejor el matiz contextual de אָרֶץ como ámbito social/comunitario. También se corrige la nota [a] para que preserve una alternativa léxica real y útil en español, en vez de repetir casi exactamente el texto principal.'
