translation_notes:
  revision_awareness: La versión inglesa auditada ya fue aprobada sin cambios en la última revisión; la presente redacción española sigue de cerca las decisiones léxicas y la estructura narrativa del original hebreo, manteniendo las alternativas documentadas donde el español introduce matices propios.
  spanish_consistency_notes:
  - Se mantuvo «Joram» para Yoram, en línea con la forma española habitual del nombre, mientras la nota preserva la forma hebrea/inglesa «Yoram».
  - Se usó «arameos» en el texto principal, con nota sobre la variante tradicional «sirios», para reflejar con mayor precisión el etnónimo del hebreo.
  - Se eligió «bajó» para ירד, conservando el matiz direccional sin añadir explicaciones implícitas.
  - No se añadió ninguna terminología litúrgica o doctrinal ajena al hebreo del versículo.
