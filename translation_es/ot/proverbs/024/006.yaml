revisions:
- from: Porque con prudentes estrategias harás guerra[a], y la victoria[b] está en la abundancia de consejeros.
  to: Porque con sabia estrategia[a] harás la guerra, y la victoria[b] está en la abundancia de consejeros.
  rationale: Se ajusta תַּחְבֻּלוֹת a «sabia estrategia» para conservar mejor el matiz de guía estratégica documentado en el expediente inglés, y se cambia «harás guerra» por «harás la guerra» para un español más natural sin perder fidelidad al modismo hebreo. Se mantienen «victoria» y «abundancia de consejeros» por ser fieles al contexto y a las decisiones auditadas.
