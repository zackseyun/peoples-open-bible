base_translation:
  language: en
  yaml_path: translation/ot/judges/020/028.yaml
  text: And Phinehas the son of Eleazar[a], son of Aaron, stood before him in those days, saying, “Shall I yet again go out to battle against the sons of Benjamin my brother, or shall I stop?” And Yahweh said, “Go up[c][b], for tomorrow I will give him into your hand.”
  footnotes:
  - marker: a
    text: Or “stood before him,” with the pronoun understood as referring to the LORD rather than to the ark mentioned in the previous verse.
    reason: alternative_reading
  - marker: b
    text: Hebrew “the sons of Benjamin, my brother,” preserving the language of kinship even in civil war.
    reason: cultural_note
  - marker: c
    text: Or “I will deliver him into your hand.” The singular “him” likely treats Benjamin collectively.
    reason: lexical_alternative
