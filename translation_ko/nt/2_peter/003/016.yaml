source:
  edition: SBLGNT
  text: ὡς καὶ ἐν πάσαις ⸀ταῖς ἐπιστολαῖς λαλῶν ἐν αὐταῖς περὶ τούτων, ἐν ⸀αἷς ἐστιν δυσνόητά τινα, ἃ οἱ ἀμαθεῖς καὶ ἀστήρικτοι στρεβλοῦσιν ὡς καὶ τὰς λοιπὰς γραφὰς πρὸς τὴν ἰδίαν αὐτῶν ἀπώλειαν.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/003/016.yaml
  text: as also in all his letters[a], speaking in them about these things. In them are some things hard to understand, which the ignorant and unstable twist, as they do the rest of the Scriptures[c][b], to their own destruction.
  footnotes:
  - marker: a
    text: Or 'the other Scriptures.' The Greek can mean either 'the rest' or 'the other,' though 'the rest of the Scriptures' best fits the comparison being made.
    reason: lexical_alternative
  - marker: b
    text: Or 'untaught' for 'ignorant.'
    reason: lexical_alternative
  - marker: c
    text: Or 'distort' for 'twist.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그가 모든 편지에서도 이러한 일들에 대하여 말하니, 그 안에는 알기 어려운 것들이 있어서 무지하고 안정되지 못한 자들이 다른 성경들에 대해서도 그러하듯이 그것들을 비틀어 자기들의 멸망을 초래합니다.
  philosophy: optimal-equivalence
