review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue fielmente el hebreo y el audit trail inglés en los puntos principales: Moisés y Aarón, todas estas señales, delante de Faraón, Yahvé endureció el corazón de Faraón, y no dejó salir a los hijos de Israel de su tierra. También preserva correctamente ''Yahvé'' para יְהוָה y ''los hijos de Israel'' para בְּנֵי יִשְׂרָאֵל.'
  spanish_quality_summary: 'El español es claro y digno, pero la sintaxis final suena menos natural y ligeramente ambigua: ''no dejó salir de su tierra a los hijos de Israel'' puede entenderse con tropiezo por la colocación del complemento. Conviene ajustar el orden para mayor fluidez sin perder el matiz de מֵאַרְצוֹ. Además, la nota c ofrece como alternativa exactamente la misma frase que el texto principal, lo cual debe corregirse.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → ''Yahvé''; מֹפְתִים → ''señales'' con alternativa ''maravillas''; וַיְחַזֵּק → ''endureció'' con alternativas más literales; בְּנֵי יִשְׂרָאֵל → ''los hijos de Israel''. La única corrección necesaria es en la nota léxica c, para que las alternativas sean reales y no repitan la lectura principal.'
  issues:
  - severity: medium
    issue: Orden sintáctico poco natural en la cláusula final
    rationale: La secuencia 'no dejó salir de su tierra a los hijos de Israel' es comprensible, pero en español más natural y claro es 'no dejó salir a los hijos de Israel de su tierra' o 'no dejó que los hijos de Israel salieran de su tierra'. El ajuste mejora legibilidad sin alterar el sentido fuente.
  - severity: medium
    issue: La nota c repite la lectura principal como si fuera alternativa
    rationale: 'La nota dice: ''O «los israelitas» o «los hijos de Israel». Literalmente, «los hijos de Israel».'' Pero el texto principal ya usa ''los hijos de Israel''. Esto vuelve incoherente la nota. Debe conservar alternativas reales, por ejemplo ''los israelitas'' o ''los hijos de Israel'', con una formulación que identifique que la principal es literal, o bien cambiar la nota para ''los israelitas'' o ''los hijos de Israel'' / ''los hijos de Jacob'' solo si está justificado; aquí basta con corregir la redacción.'
  revised_spanish_text: Y Moisés y Aarón hicieron todas estas señales delante de Faraón[a], y Yahvé endureció el corazón de Faraón[b], y no dejó salir a los hijos de Israel[c] de su tierra.
