base_translation:
  language: en
  yaml_path: translation/ot/isaiah/060/004.yaml
  text: Lift up your eyes all around and see[a]; all of them gather together; they come to you. Your sons will come from far away[b], and your daughters will be carried on the hip.
  footnotes:
  - marker: a
    text: Or 'at the side'; the Hebrew phrase may denote being carried at one's side, commonly understood as on the hip.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be nursed' or 'will be supported'; the verb can carry a nuance of being cared for, though 'will be carried' best fits the immediate image.
    reason: lexical_alternative
