  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: mantiene el contraste espacial/de estatus («por debajo… no por encima»), conserva «pecamos» para ἡμάρτομεν, y preserva el modismo «escuchar su voz». Sin embargo, el sujeto griego es tercera persona plural («ellos/los del pueblo llegaron a estar»), mientras que el español «quedaron» puede sonar demasiado estático frente al valor resultativo de ἐγενήθησαν. Además, la colocación de las notas no sigue el anclaje del audit trail inglés: la nota sobre el contraste espacial debe ir con «por debajo/no por encima», y la nota sobre el modismo debe anclarse a «su voz», no a «Yahvé nuestro Dios».'
  spanish_quality_summary: El español es claro y natural, de registro bíblico moderno. La principal mejora es usar una forma más transparente al valor verbal de γίνομαι («llegaron a estar») y recolocar las notas para evitar confusión. «Yahvé nuestro Dios» es legible y acorde al proyecto, aunque sin artículo puede sonar algo menos idiomático que «contra Yahvé, nuestro Dios» o «contra Yahvé nuestro Dios»; la forma actual sigue siendo aceptable.
  glossary_alignment: 'Alineado en general con la terminología del proyecto: κύριος/trasfondo divino se vierte como «Yahvé», ἡμάρτομεν como «pecamos», y φωνή como «voz». Se preserva correctamente el idioma bíblico en vez de sustituirlo por «obedecer». La única corrección necesaria es técnica/estilística en ἐγενήθησαν y en el uso de notas al pie.'
  issues:
