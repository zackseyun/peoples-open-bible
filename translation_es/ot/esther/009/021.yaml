translation:
  language: es
  text: para establecer entre ellos que observaran el día catorce del mes de Adar[a], y el día quince de él, año tras año,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «cada año» o «año por año». El hebreo repite «año» para dar énfasis distributivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקַיֵּם
  english_pob_choice: to establish
  chosen_spanish: para establecer
  alternatives_spanish:
  - para confirmar
  - para instituir
  lexicon: HALOT
  rationale: El infinitivo intensivo de קום aquí expresa fijar o establecer una obligación práctica. En español, «establecer» conserva el matiz administrativo-jurídico del contexto de la carta de Mardoqueo sin sonar forzado.
- source_word: עֲלֵיהֶם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - sobre ellos
  - para ellos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sobre ellos», el contexto muestra que se trata de imponer o fijar una observancia dentro de la comunidad; «entre ellos» comunica mejor la distribución comunitaria de la orden en español.
- source_word: לִהְיוֹת עֹשִׂים
  english_pob_choice: that they should observe
  chosen_spanish: que observaran
  alternatives_spanish:
  - que hicieran
  - que guardaran
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «ser haciendo», pero con días festivos/commemorativos el español natural es «observar». «Observaran» mantiene la idea de práctica anual sin volverla demasiado interpretativa.
- source_word: אֵת יוֹם אַרְבָּעָה עָשָׂר לְחֹדֶשׁ אֲדָר
  english_pob_choice: the fourteenth day of the month Adar
  chosen_spanish: el día catorce del mes de Adar
  alternatives_spanish:
  - el día catorce del mes de Adar
  - el catorce del mes de Adar
  lexicon: HALOT
  rationale: Se conserva la fórmula calendárica formal del hebreo. «Día catorce» es claro y público en español, y mantiene el orden conceptual de la fecha.
- source_word: וְאֵת יוֹם חֲמִשָּׁה עָשָׂר בּוֹ
  english_pob_choice: and the fifteenth day of it
  chosen_spanish: y el día quince de él
  alternatives_spanish:
  - y el día quince del mismo
  - y el quince de ese mes
  lexicon: HALOT
  rationale: El pronombre hebreo remite al mes mencionado antes. «De él» es fiel y transparente, aunque algo formal; evita repetir «mes» y preserva la referencia anafórica.
- source_word: בְּכָל שָׁנָה וְשָׁנָה
  english_pob_choice: year after year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - año por año
  lexicon: HALOT
  rationale: El hebreo repite «año» para dar énfasis distributivo. «Año tras año» reproduce bien esa repetición con naturalidad en español. Se prefiere esta forma a una simple equivalencia como «cada año» porque pierde parte del énfasis.
translation_notes:
  revision_awareness: Se incorporó la revisión del inglés POB que reemplazó la forma menos natural de la nota distributiva por una expresión idiomática. En español se resolvió con «año tras año», que conserva el valor repetitivo y el tono natural.
  spanish_consistency_notes:
  - Se mantiene «Adar» como nombre propio calendárico, conforme al estilo bíblico estándar.
  - Se evita «guardar» como término dominante para no añadir una connotación legalista no exigida por el hebreo; «observar» conserva mejor el sentido festivo-ritual.
  - La referencia pronominal de בּוֹ se traduce con «de él» para no perder la cohesión del texto breve.
  - El registro es formal y bíblico, pero con sintaxis española natural.
