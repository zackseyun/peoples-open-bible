review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo: introducción de lista, ''los nombres de los jefes de Esaú'', y las tres frases clasificatorias (''según sus clanes'', ''según sus lugares'', ''por sus nombres''), seguida de la enumeración titulada. Sin embargo, dos transliteraciones se apartan innecesariamente del rastro auditado y de una representación más fiel del hebreo en español: ''Alvá'' debería ser ''Alva'' para reflejar עַלְוָה sin acento añadido, y la nota de ''Timná'' tampoco conviene como variante española principal documentada; si se conserva la alternativa del inglés, debe adaptarse mejor como ''Timnáh'' o, más simplemente, la nota puede mencionar la forma alternativa sin forzar acento prosódico español. También conviene capitalizar ''Jefe'' en la serie, para reflejar su función de título repetido como en el inglés POB.'
  spanish_quality_summary: La redacción es clara y natural en español bíblico moderno. 'Según sus clanes' y 'según sus lugares' suenan bien, y 'por sus nombres' es aceptable. El principal problema de calidad está en las formas propias 'Alvá' y la nota 'Timná', que se sienten artificiales en español. Además, la serie gana consistencia visual con 'Jefe Timna, Jefe Alva, Jefe Jetet'.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La decisión de traducir אַלּוּף como ''jefe/Jefe'' está alineada con el POB y evita el tradicional pero engañoso ''duque''. Los nombres propios requieren ajuste menor para alinearse con el rastro léxico inglés: ''Alvah'' se representa mejor como ''Alva'' en español, con nota sobre ''Alía'' en 1 Crónicas 1:51.'
  issues:
  - severity: medium
    issue: La forma 'Alvá' introduce un acento no motivado por el hebreo ni por el uso español.
    rationale: עַלְוָה corresponde de manera más natural a 'Alva'. El acento gráfico en 'Alvá' suena artificioso y no está respaldado por el audit trail inglés, que conserva 'Alvah' como forma base.
  - severity: low
    issue: La nota 'Timná' como transliteración alternativa es poco natural en español.
    rationale: Si se quiere preservar la alternativa documentada 'Timnah', en español conviene representarla de forma más transparente, no como 'Timná', que parece una adaptación ortográfica ad hoc.
  - severity: low
    issue: El título repetido 'jefe' debería ir con mayúscula inicial en la enumeración.
    rationale: El audit trail inglés capitaliza 'Chief' por su función titular en la lista. 'Jefe Timna, Jefe Alva, Jefe Jetet' da mejor consistencia formal en español.
  revised_spanish_text: 'Y estos son los nombres de los jefes de Esaú, según sus clanes, según sus lugares, por sus nombres: Jefe Timna[a], Jefe Alva[b], Jefe Jetet.'
  revised_footnotes:
