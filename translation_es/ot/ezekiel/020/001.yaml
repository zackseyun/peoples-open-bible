translation:
  language: es
  text: Y aconteció en el séptimo año, en el quinto mes, el día diez del mes, que algunos[a] de los ancianos de Israel vinieron a consultar a Yahvé[b], y se sentaron delante de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vinieron hombres de entre los ancianos de Israel». El hebreo dice más literalmente: «hombres de entre los ancianos de Israel», lo que puede indicar representantes tomados de los ancianos.'
    reason: lexical_alternative
  - marker: b
    text: «Consultar a Yahvé» también puede rendirse «buscar a Yahvé» o «inquirir de Yahvé»; aquí la idea es una búsqueda formal de dirección o respuesta divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un nuevo episodio fechado; «aconteció» conserva el tono bíblico sin caer en un calco duro ni en arcaísmo excesivo.
- source_word: בַּשָּׁנָה הַשְּׁבִיעִית
  english_pob_choice: in the seventh year
  chosen_spanish: en el séptimo año
  alternatives_spanish:
  - en el año séptimo
  lexicon: HALOT
  rationale: El hebreo expresa literalmente la datación; «en el séptimo año» es natural en español y mantiene la información sin añadir el marco del exilio que no está explicitado aquí.
- source_word: בַּחֲמִשִׁי בֶּעָשׂוֹר לַחֹדֶשׁ
  english_pob_choice: in the fifth month, on the tenth day of the month
  chosen_spanish: en el quinto mes, a los diez días del mes
  alternatives_spanish:
  - en el quinto mes, el décimo día del mes
  - el día diez del quinto mes
  lexicon: HALOT
  rationale: Se conserva la fórmula cronológica hebrea con repetición de «del mes», porque el texto la presenta de manera formal y no conviene compactarla más de lo que el hebreo permite.
- source_word: בָּאוּ אֲנָשִׁים מִזִּקְנֵי יִשְׂרָאֵל
  english_pob_choice: some of the elders of Israel came
  chosen_spanish: algunos de los ancianos de Israel vinieron
  alternatives_spanish:
  - vinieron hombres de entre los ancianos de Israel
  - vinieron hombres de los ancianos de Israel
  lexicon: HALOT
  rationale: La POB inglesa trató la expresión como idiomática y representativa; «algunos de los ancianos de Israel» comunica con naturalidad que no necesariamente vino todo el cuerpo de ancianos, sino representantes de ellos.
- source_word: לִדְרֹשׁ אֶת יְהוָה
  english_pob_choice: to inquire of Yahweh
  chosen_spanish: a consultar a Yahvé
  alternatives_spanish:
  - a inquirir de Yahvé
  - a buscar a Yahvé
  lexicon: HALOT
  rationale: דָּרַשׁ con Dios aquí remite a buscar respuesta o dirección divina de forma formal; «consultar a Yahvé» expresa bien esa función en español contemporáneo, sin perder la idea de solicitud oracular.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre propio divino en lugar de sustituirlo por un título.'
- source_word: וַיֵּשְׁבוּ לְפָנָי
  english_pob_choice: and they sat before me
  chosen_spanish: y se sentaron delante de mí
  alternatives_spanish:
  - y se sentaron ante mí
  - y tomaron asiento delante de mí
  lexicon: HALOT
  rationale: La escena describe postura física y presencia formal ante el profeta; «delante de mí» mantiene la proximidad espacial y la presentación respetuosa sin forzar solemnidad adicional.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En español se adopta «Yahvé» para preservar el nombre propio revelado, conforme a la decisión doctrinal del proyecto y sin ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia temporal implícita
  english_pob_reading: Leave the dating as 'the seventh year' without added specification
  chosen_spanish_reading: Mantener «en el séptimo año» sin precisar el exilio
  alternative_spanish_readings:
  - en el séptimo año del exilio
  - en el séptimo año del cautiverio de Joaquín
  rationale: Aunque el trasfondo histórico mayor probablemente sea el exilio, el versículo no lo dice de manera explícita. La traducción no debe importar un dato no expresado en el hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: La base inglesa revisó una formulación más literal de «men from the elders of Israel» hacia «some of the elders of Israel» para reflejar mejor el hebreo idiomático. La versión española sigue esa misma lectura representativa sin sobretraducir ni añadir el marco del exilio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «ancianos de Israel» para זִקְנֵי יִשְׂרָאֵל, coherente con el registro bíblico en español.
  - La preposición «delante de mí» conserva la idea de presencia ante el profeta, sin introducir matices interpretativos nuevos.
