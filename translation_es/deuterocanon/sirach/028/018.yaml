translation:
  language: es
  text: Muchos han caído por la boca de la espada[a], pero no así los que han caído a causa de la lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «por la boca de la espada». Muchas versiones la vierten como «por el filo de la espada», pero la redacción más literal conserva el contraste con «lengua».
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Un gran número
  - Muchas personas
  lexicon: LSJ
  rationale: El adjetivo cuantitativo es directo y natural en español; «Muchos» conserva la generalidad proverbial sin añadir carga interpretativa.
- source_word: ἔπεσαν
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - cayeron
  - han sido derribados
  lexicon: LSJ
  rationale: El aoristo expresa un hecho real y repetido; el presente perfecto funciona bien en un dicho sapiencial y mantiene la vigencia del enunciado.
- source_word: ἐν στόματι μαχαίρας
  english_pob_choice: by the mouth of the sword
  chosen_spanish: a la boca de la espada
  alternatives_spanish:
  - por el filo de la espada
  - a la boca de una espada
  lexicon: LSJ
  rationale: Se conserva la imagen literal de «boca» para mantener el contraste con «lengua». «Filo» sería idiomático, pero debilitaría el juego verbal del texto.
- source_word: καὶ οὐχ ὡς
  english_pob_choice: but not as
  chosen_spanish: pero no así
  alternatives_spanish:
  - y no como
  - pero no tanto como
  lexicon: LSJ
  rationale: La comparación es contrastiva y el español puede expresarla con naturalidad como «pero no así» sin forzar una repetición innecesaria.
- source_word: οἱ πεπτωκότες
  english_pob_choice: those who have fallen
  chosen_spanish: los que han caído
  alternatives_spanish:
  - los caídos
  - los que cayeron
  lexicon: LSJ
  rationale: El participio perfecto queda bien reflejado con una construcción relativa. «Los caídos» es posible, pero pierde algo de la repetición verbal del primer miembro.
- source_word: διὰ γλῶσσαν
  english_pob_choice: because of the tongue
  chosen_spanish: a causa de la lengua
  alternatives_spanish:
  - por la lengua
  - debido a la lengua
  - por hablar
  lexicon: LSJ
  rationale: Se conserva la metáfora concreta de la lengua como instrumento dañino. «Hablar» aclararía el sentido, pero suavizaría la imagen original.
theological_decisions:
- issue: Contraste imagístico entre arma física y habla dañina
  english_pob_reading: Preserve the literal body-part imagery ('mouth' and 'tongue') rather than smoothing to abstract 'edge' and 'speech.'
  chosen_spanish_reading: Conservar «boca» y «lengua» en lugar de sustituirlas por «filo» y «habla».
  alternative_spanish_readings:
  - «por el filo de la espada» y «por hablar»
  - «por la espada» y «por la palabra»
  rationale: No se trata de una cuestión doctrinal, sino retórica y sapiencial. La fuerza del versículo depende del choque entre la imagen corporal de la espada y la de la lengua; por eso conviene mantener el paralelismo concreto.
  doctrine_reference: Principios de traducción POB §§1, 6
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente eliminó la repetición explícita de «many» después de «not as» para ajustarse mejor al griego. Por eso el español evita cualquier duplicación innecesaria y usa una comparación breve: «pero no así los que han caído a causa de la lengua».'
  spanish_consistency_notes:
  - Se mantiene «espada» y no se introduce una paráfrasis con «filo» para preservar el paralelismo boca/lengua.
  - «Lengua» se conserva como metáfora de la palabra dañina, en línea con el texto griego y con la decisión inglesa auditada.
  - El tono es proverbial y sobrio, con vocabulario comprensible en lectura eclesial latinoamericana.
