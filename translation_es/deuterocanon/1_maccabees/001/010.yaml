  rationale: 'Se hace una reparación menor para mejorar la naturalidad y la fidelidad idiomática de ῥίζα ἁμαρτωλός en español: «raíz de pecado» conserva la metáfora literal y expresa el juicio moral de manera más natural que «raíz pecadora». Se mantienen intactos el resto de los elementos bien resueltos del borrador y las notas, salvo el ajuste coherente de la nota [a].'
