translation:
  language: es
  text: Y se puso en camino para ir a la tierra de los extranjeros[a], y pasó por Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, posiblemente, «la tierra de los filisteos»; el griego ἀλλόφυλοι puede funcionar en el uso bíblico como designación convencional de los filisteos, pero aquí se mantiene la traducción más amplia porque el verso no lo precisa más.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  english_pob_choice: he set out
  chosen_spanish: se puso en camino
  alternatives_spanish:
  - partió
  - salió
  lexicon: LSJ
  rationale: El aoristo de ἀπαίρω indica el inicio de la marcha. «Se puso en camino» comunica bien ese arranque de la acción en español sin sonar rígido.
- source_word: τοῦ πορευθῆναι
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - para viajar
  - para proceder
  lexicon: LSJ
  rationale: El infinitivo articular expresa propósito; «para ir» es la forma más directa y natural en este contexto.
- source_word: γῆν ἀλλοφύλων
  english_pob_choice: the land of the foreigners
  chosen_spanish: la tierra de los extranjeros
  alternatives_spanish:
  - la tierra de los filisteos
  - tierra extranjera
  lexicon: LSJ
  rationale: «ἀλλόφυλοι» literalmente significa personas de otro linaje o pueblo. Mantengo la lectura amplia «extranjeros» porque el verso no identifica de manera explícita a los filisteos, aunque esa posibilidad existe en el uso bíblico.
- source_word: διεπορεύετο
  english_pob_choice: he passed through
  chosen_spanish: atravesó
  alternatives_spanish:
  - pasó por
  - recorrió
  lexicon: LSJ
  rationale: El imperfecto describe un tránsito en curso; «atravesó» en español transmite con claridad el paso por una región sin añadir matices innecesarios.
- source_word: τὴν Σαμάριαν
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - la Samaria
  lexicon: LSJ
  rationale: Nombre geográfico estándar; se conserva la transliteración usual en español.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior añadiendo el marcador [a] en el texto principal junto al término correspondiente; no se introdujeron notas sin anclaje.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece el Tetragrámaton ni κύριος en este versículo.
  - «Extranjeros» conserva el alcance amplio de ἀλλόφυλοι sin forzar una identificación étnica no explícita en el texto.
  - «Se puso en camino» reproduce mejor el inicio de la acción que un simple «partió» en este contexto narrativo.
