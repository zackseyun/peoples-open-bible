translation:
  language: es
  text: Entonces se abrieron los ojos de ambos, y supieron que estaban desnudos. Así cosieron hojas de higuera y se hicieron coberturas[a] para sí mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ceñidores' o 'delantales' para 'coberturas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפָּקַחְנָה
  english_pob_choice: were opened
  chosen_spanish: se abrieron
  alternatives_spanish:
  - fueron abiertos
  - se les abrieron
  lexicon: HALOT
  rationale: El hebreo expresa una apertura pasiva/intransitiva de los ojos; el español natural y fiel es el reflexivo 'se abrieron', que conserva la imagen sin añadir interpretación.
- source_word: עֵינֵי שְׁנֵיהֶם
  english_pob_choice: the eyes of both of them
  chosen_spanish: los ojos de ambos
  alternatives_spanish:
  - los ojos de los dos
  - ambos tuvieron los ojos abiertos
  lexicon: HALOT
  rationale: '''Los ojos de ambos'' refleja claramente la construcción hebrea y mantiene el énfasis en los dos participantes sin volverse torpe en español.'
- source_word: וַיֵּדְעוּ
  english_pob_choice: they knew
  chosen_spanish: supieron
  alternatives_spanish:
  - conocieron
  - se dieron cuenta
  lexicon: HALOT
  rationale: '''Supieron'' comunica el hecho de llegar a saber en este contexto narrativo y evita el giro más interpretativo de ''se dieron cuenta'', aunque ''conocieron'' sería menos natural aquí.'
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que supieron; 'que' es la equivalencia directa y natural en español.
- source_word: עֵירֻמִּם
  english_pob_choice: naked
  chosen_spanish: desnudos
  alternatives_spanish:
  - sin ropa
  - desnudos/as
  lexicon: HALOT
  rationale: '''Desnudos'' es la correspondencia normal y fiel del hebreo; conserva el vínculo narrativo con la desnudez previa sin suavizar el término.'
- source_word: וַיִּתְפְּרוּ
  english_pob_choice: they sewed
  chosen_spanish: cosieron
  alternatives_spanish:
  - suturaron
  - cortaron y cosieron
  lexicon: HALOT
  rationale: '''Cosieron'' es el verbo natural para la acción descrita y preserva el carácter sencillo y concreto del relato.'
- source_word: עֲלֵה תְאֵנָה
  english_pob_choice: fig leaves
  chosen_spanish: hojas de higuera
  alternatives_spanish:
  - hojas de la higuera
  - hojas de higuera
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'hoja de higuera'; en español 'hojas de higuera' es claro, natural y exacto, manteniendo la especie del árbol.
- source_word: וַיַּעֲשׂוּ לָהֶם
  english_pob_choice: made coverings for themselves
  chosen_spanish: se hicieron
  alternatives_spanish:
  - hicieron para sí
  - se hicieron coberturas
  lexicon: HALOT
  rationale: La construcción refleja la acción deliberada en favor de sí mismos. En español, el pronombre reflexivo 'se hicieron' conserva ese matiz de autoprovición.
- source_word: חֲגֹרֹת
  english_pob_choice: coverings
  chosen_spanish: coberturas
  alternatives_spanish:
  - ceñidores
  - delantales
  - lienzos
  lexicon: HALOT
  rationale: '''Coberturas'' preserva la amplitud semántica del hebreo sin forzar un tipo específico de prenda. Evita precisar más de lo que el texto establece, como hizo la POB inglesa.'
theological_decisions:
- issue: How to render the result of new knowledge without importing extra doctrine
  english_pob_reading: Render descriptively without importing explicit theological conclusions beyond the text.
  chosen_spanish_reading: 'Traducir de modo descriptivo: se abrieron los ojos, supieron que estaban desnudos y se hicieron coberturas.'
  alternative_spanish_readings:
  - traducir como 'se avergonzaron'
  - añadir 'tomaron conciencia de su culpa'
  rationale: El versículo no dice explícitamente 'vergüenza' ni explica el mecanismo de esa nueva conciencia. La redacción española conserva la tensión narrativa sin resolverla doctrinalmente.
  doctrine_reference: Translation philosophy §3
- issue: Ambiguity of חֲגֹרֹת and the extent of self-covering
  english_pob_reading: coverings
  chosen_spanish_reading: coberturas
  alternative_spanish_readings:
  - delantales
  - ceñidores
  - lienzos
  rationale: '''Coberturas'' mantiene la ambigüedad legítima del hebreo y evita imponer una forma de prenda más concreta de lo que el texto permite.'
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La redacción española sigue de cerca el estado inglés más reciente, especialmente en la clausula final ('made coverings for themselves' / 'se hicieron coberturas para sí mismos'), pero reordena naturalmente en español para lograr fluidez sin perder el paralelo hebreo. También conserva la distinción entre la apertura de los ojos, el conocimiento de su desnudez y la acción de cubrirse, sin añadir explicaciones no presentes en el texto.
  spanish_consistency_notes:
  - Se mantiene 'desnudos' para עֵירֻמִּם, siguiendo la fuerza lexical habitual y evitando eufemismos.
  - '''Coberturas'' se usa como equivalente general de חֲגֹרֹת, en coherencia con la POB inglesa y con la decisión de no sobrerprecisar la prenda.'
  - El marcador de nota [a] queda anclado en 'coberturas' porque allí reside la principal ambigüedad léxica del verso.
