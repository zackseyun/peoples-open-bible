base_translation:
  language: en
  yaml_path: translation/ot/psalms/058/011.yaml
  text: The righteous will rejoice when he sees vengeance[b][a]; he will wash his feet in the blood of the wicked.
  footnotes:
  - marker: a
    text: Or 'because he has seen vengeance.' The Hebrew conjunction can be read causally ('because/for') as well as temporally ('when').
    reason: lexical_alternative
  - marker: b
    text: The image 'wash his feet in the blood of the wicked' is poetic and depicts the completeness of judgment, not a command for personal violence.
    reason: cultural_note
