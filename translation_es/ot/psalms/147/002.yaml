translation:
  language: es
  text: Yahvé edifica Jerusalén; reúne a los expulsados[a] de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dispersos», «los desterrados» o «los exiliados de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹנֵה
  english_pob_choice: builds
  chosen_spanish: edifica
  alternatives_spanish:
  - construye
  - levanta
  lexicon: HALOT
  rationale: El participio qal expresa una acción característica o continua; en español, «edifica» comunica bien la idea de construir y también permite el matiz de restauración sin añadir innecesariamente «arriba» o «de nuevo». Se evita una traducción demasiado mecánica y se mantiene la fuerza verbal presente.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Nombre propio asentado en español bíblico y plenamente inteligible para lectores de iglesia. Se conserva la forma usual española del topónimo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para el Tetragrámaton, usando «Yahvé» como nombre divino personal. Se evita «el SEÑOR» por ser una sustitución convencional que borra el nombre revelado.
- source_word: נִדְחֵי
  english_pob_choice: the outcasts
  chosen_spanish: los desterrados
  alternatives_spanish:
  - los dispersos
  - los exiliados
  - los expulsados
  lexicon: HALOT
  rationale: El participio sustantivado de נדח refiere a quienes han sido echados lejos o apartados. «Desterrados» conserva la idea de estar apartados de su lugar y funciona de forma natural en español; además, no estrecha el sentido únicamente a deportación formal.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre nacional propio; se mantiene sin cambio.
- source_word: יְכַנֵּס
  english_pob_choice: he gathers
  chosen_spanish: reúne
  alternatives_spanish:
  - junta
  - agrupa
  - congrega
  lexicon: HALOT
  rationale: El piel imperfecto de כנס significa reunir o congregar. «Reúne» es natural en español y conserva la acción restauradora de Dios sobre los dispersos sin añadir matices eclesiásticos no presentes en el hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: La línea del POB en español debe preservar el nombre propio divino en lugar de sustituirlo por un título. «Yahvé» es la forma del proyecto para el Tetragrámaton y mantiene la referencia directa al Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de restauración en «edifica Jerusalén»
  english_pob_reading: builds Jerusalem
  chosen_spanish_reading: edifica Jerusalén
  alternative_spanish_readings:
  - construye Jerusalén
  - levanta Jerusalén
  rationale: El hebreo no añade un adverbio equivalente a «up»; por eso se evita introducirlo. Aun así, el contexto del Salmo sugiere restauración/reedificación de la ciudad, y «edifica» permite ese matiz sin sobretraducir.
  doctrine_reference: PSA.147.2 audit trail; applied_revisions retained restoration sense without adding extra wording
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo directo y toma en cuenta la revisión auditada del inglés POB: se eliminó el añadido equivalente a «up» y se conservó la lectura simple «builds Jerusalem». En español, esto se refleja con «edifica Jerusalén», que no introduce un adverbio inexistente en el hebreo y, a la vez, conserva el sentido restaurador del contexto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar español del proyecto.
  - Se evita «Cristo» y cualquier terminología cristológica ajena al verso.
  - «Desterrados» mantiene un registro bíblico natural en español y no fuerza un término técnico eclesiástico.
  - «Reúne» preserva la acción de juntar personas dispersas sin añadir una connotación litúrgica.
  - 'La sintaxis española sigue el paralelismo hebreo: sujeto divino + verbo + complemento; luego verbo con objeto humano.'
  - No se añadieron notas al pie porque el verso no presenta una variante textual o lexical que requiera anclaje adicional en el texto español.
