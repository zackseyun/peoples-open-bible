translation:
  language: es
  text: Las bendiciones[a] desbordaron como el Nilo, y como un río[b] empaparon el mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «bendiciones»; el griego paralelo tiene el singular «su bendición».
    reason: alternative_reading
  - marker: b
    text: También puede entenderse como «regaron el mundo» o «saturaron la tierra seca»; el paralelo griego habla de un diluvio que empapó la tierra seca.
    reason: lexical_alternative
lexical_decisions:
- source_word: ברכות
  english_pob_choice: Blessings
  chosen_spanish: Las bendiciones
  alternatives_spanish:
  - La bendición
  - Sus bendiciones
  lexicon: HALOT
  rationale: El hebreo presenta un plural, y la revisión inglesa final también opta por el plural para seguir el texto hebreo. En español, el plural conserva la idea de abundancia desbordante sin forzar un singular colectivo artificial.
- source_word: כיאור
  english_pob_choice: like the Nile
  chosen_spanish: como el Nilo
  alternatives_spanish:
  - como el río Nilo
  - como un río
  lexicon: HALOT
  rationale: יאר suele designar específicamente al Nilo; por eso se mantiene el referente concreto, que preserva la imagen egipcia del desbordamiento.
- source_word: הציפה
  english_pob_choice: overflowed
  chosen_spanish: desbordaron
  alternatives_spanish:
  - inundaron
  - cubrieron
  lexicon: HALOT
  rationale: El verbo expresa inundación/sobreabundancia de agua. En español, 'desbordaron' comunica bien la imagen de aguas que rebasan su cauce y encaja con el plural del sustantivo.
- source_word: וכנהר
  english_pob_choice: and like a river
  chosen_spanish: y como un río
  alternatives_spanish:
  - y como el río
  - y como una corriente
  lexicon: HALOT
  rationale: La comparación introduce una segunda imagen acuática. 'Un río' mantiene la naturalidad en español y refleja el carácter comparativo del hebreo y del paralelo griego.
- source_word: תבל
  english_pob_choice: the world
  chosen_spanish: la tierra habitable
  alternatives_spanish:
  - el mundo
  - la tierra
  lexicon: HALOT
  rationale: תבל puede denotar el mundo habitado. 'La tierra habitable' conserva ese matiz de espacio poblado sin perder inteligibilidad en español contemporáneo.
- source_word: ריותה
  english_pob_choice: drenched
  chosen_spanish: empaparon
  alternatives_spanish:
  - regaron
  - saturaron
  - mojaron
  lexicon: HALOT
  rationale: El verbo apunta a saturación con agua. 'Empaparon' transmite la fuerza de la imagen y evita la literalidad extraña de 'ebriaron' del griego, que en contexto funciona como una metáfora de saturación.
theological_decisions:
- issue: Número del sustantivo principal
  english_pob_reading: 'plural: ''Blessings'''
  chosen_spanish_reading: 'plural: ''Las bendiciones'''
  alternative_spanish_readings:
  - 'singular colectivo: ''La bendición'''
  rationale: El hebreo consonántico es plural, y la revisión inglesa más reciente también ajusta el texto a ese plural. Se conserva así la pluralidad sin imponer un singular colectivo que no está exigido por el hebreo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referente implícito del sufijo posesivo
  english_pob_reading: '''His'' left as-is without explicit identification'
  chosen_spanish_reading: no se explicita un sujeto posesivo en el texto principal
  alternative_spanish_readings:
  - las bendiciones de Dios
  - sus bendiciones
  rationale: Como el verso hebreo no nombra el referente del sufijo en esta línea, el español evita añadir 'de Dios' o cualquier otro referente explícito. Se conserva la misma indeterminación respetando el alcance del texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de la última imagen acuática
  english_pob_reading: '''drenched the world'' / ''watered the world'' / ''saturated the dry land'''
  chosen_spanish_reading: '''empaparon la tierra habitable'''
  alternative_spanish_readings:
  - '''regaron el mundo'''
  - '''saturaron la tierra seca'''
  rationale: El hebreo y el griego coinciden en una metáfora de saturación por agua. 'Empaparon' mantiene la imagen viva en español sin introducir una lectura demasiado técnica o demasiado libre.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final inglesa que volvió al plural ('Blessings') para ajustarse al hebreo, aunque la nota inglesa conserva el singular griego como variante. La versión española sigue ese último ajuste y mantiene la alternativa griega en nota.
  spanish_consistency_notes:
  - Se conserva el plural inicial y la imagen hídrica fuerte del texto fuente.
  - Se evita traducir mecánicamente el griego ἐμέθυσεν como 'embriagaron', porque en contexto funciona como metáfora de saturación.
  - '''Tierra habitable'' se usa para תבל con un matiz más preciso que ''mundo'', pero dentro de un registro natural y eclesial.'
