translation:
  language: es
  text: Así David no trajo el arca[a] consigo, a la Ciudad de David; más bien[b], la apartó a la casa de Obed-edom el gitita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no removió el arca consigo». El verbo hebreo puede significar «quitar», «retirar» o, en este contexto, «traer» o «llevar».
    reason: lexical_alternative
  - marker: b
    text: O «la desvió» o «la llevó aparte» a la casa de Obed-edom.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵסִיר
  english_pob_choice: did not bring
  chosen_spanish: no trajo
  alternatives_spanish:
  - no quitó
  - no removió
  - no llevó
  lexicon: HALOT
  rationale: El hebreo הֵסִיר puede expresar quitar, remover, apartar o hacer llevar. En este contexto narrativo, con el arca como objeto y el destino explícito, «no trajo» comunica de forma natural que David no la llevó hasta su destino previsto, sin perder la idea de movimiento/traslado que el verbo admite aquí.
- source_word: אֵלָיו
  english_pob_choice: to himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - a él
  - para sí
  lexicon: HALOT
  rationale: La forma pronominal apunta de modo reflexivo al propio David. «A sí mismo» conserva esa relación y hace claro que se trata de su propio destino, no solo de «a él» de manera genérica.
- source_word: עִיר דָּוִיד
  english_pob_choice: the City of David
  chosen_spanish: la Ciudad de David
  alternatives_spanish:
  - la ciudad de David
  lexicon: HALOT
  rationale: Es un nombre fijo de lugar. En español, la forma estable y comprensible es «la Ciudad de David», preferible a una versión más literal pero menos idiomática como «la ciudad de David».
- source_word: וַיַּטֵּהוּ
  english_pob_choice: he turned it aside
  chosen_spanish: la apartó
  alternatives_spanish:
  - la desvió
  - la hizo ir aparte
  lexicon: HALOT
  rationale: נָטָה aquí describe redirigir el arca fuera del rumbo esperado. «La apartó» conserva la imagen concreta de desviarla sin endurecer el español con un calco poco natural. El pronombre femenino concuerda con «el arca» en español.
- source_word: בֵּית
  english_pob_choice: the house of
  chosen_spanish: la casa de
  alternatives_spanish:
  - el hogar de
  - la familia de
  lexicon: HALOT
  rationale: En este contexto narrativo se trata del lugar donde el arca fue alojada. «La casa de» es la equivalencia más directa y contextual; «hogar» o «familia» introducirían matices no exigidos por el texto.
- source_word: עֹבֵד אֱדֹם
  english_pob_choice: Obed-edom
  chosen_spanish: Obed-edom
  alternatives_spanish:
  - Obed-Edom
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre propio según el uso común en español bíblico. La forma con guion mantiene la unidad del nombre compuesto.
- source_word: הַגִּתִּי
  english_pob_choice: the Gittite
  chosen_spanish: el gʹtita
  alternatives_spanish:
  - el gita
  - el de Gat
  lexicon: HALOT
  rationale: El adjetivo gentilicio procede de Gat. En español, «gʹtita» conserva el vínculo semítico y evita confundirlo con una forma española no asentada; «el de Gat» sería más explicativo pero menos compacto. Si se prefiere una forma más traducional, «el gita» sería una alternativa viable, pero aquí se opta por una transliteración consistente con el nombre propio.
translation_notes:
  revision_awareness: El texto base en inglés está en acuerdo alto con la revisión más reciente y no presenta cambios sustantivos pendientes; la redacción española sigue la misma solución léxica principal, preservando la ambigüedad verbal documentada en el pie de nota.
  spanish_consistency_notes:
  - Se mantuvo «Ciudad de David» como nombre fijo de lugar.
  - Se usó «Obed-edom» como transliteración estándar del nombre propio.
  - Se preservó la alternativa verbal documentada para הֵסִיר mediante nota al pie.
  - Se evitó sustituir el gentilicio por una paráfrasis extensa, manteniendo el valor compacto del original.
