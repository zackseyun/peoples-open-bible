id: JER.50.45
reference: Jeremiah 50:45
source:
  edition: WLC
  text: לָ/כֵ֞ן שִׁמְע֣וּ עֲצַת יְהוָ֗ה אֲשֶׁ֤ר יָעַץ֙ אֶל בָּבֶ֔ל וּ/מַ֨חְשְׁבוֹתָ֔י/ו אֲשֶׁ֥ר חָשַׁ֖ב אֶל אֶ֣רֶץ כַּשְׂדִּ֑ים אִם לֹ֤א יִסְחָבוּ/ם֙ צְעִירֵ֣י הַ/צֹּ֔אן אִם לֹ֥א יַשִּׁ֛ים עֲלֵי/הֶ֖ם נָוֶֽה־־־־־׃
translation:
  text: 'Therefore hear the counsel of Yahweh that he has planned against Babylon[a], and his thoughts that he has devised against the land of the Chaldeans: Surely the little ones of the flock will drag them away[c][b]; surely he will make their pasture desolate.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the least of the flock'; the phrase likely refers metaphorically to the weakest or least significant of Babylon's attackers.
    reason: lexical_alternative
  - marker: b
    text: Or 'their habitation.' The Hebrew word can mean 'pasture,' 'abode,' or 'dwelling place.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he will make their pasture desolate because of them'.
    reason: previous_rendering
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence or conclusion of the preceding oracle.
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע; 'hear' preserves the prophetic summons and can include the sense of attentive listening.
- source_word: עֲצַת יְהוָה
  chosen: the counsel of the LORD
  alternatives:
  - the plan of the LORD
  lexicon: HALOT
  rationale: עֵצָה can mean counsel, plan, or purpose. 'Counsel' preserves the deliberative nuance, while the following verb 'has planned' makes the sense clear in English. יְהוָה follows the doctrinal default as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יָעַץ אֶל־בָּבֶל
  chosen: has planned against Babylon
  alternatives:
  - has purposed against Babylon
  - has counseled against Babylon
  lexicon: HALOT
  rationale: Though אֶל is formally 'to/toward,' in this hostile context with Babylon it is best rendered 'against.' 'Planned' is idiomatic and matches the sense of deliberate intention.
- source_word: וּמַחְשְׁבוֹתָיו
  chosen: and his thoughts
  alternatives:
  - and his plans
  - and his designs
  lexicon: HALOT
  rationale: מַחֲשָׁבוֹת literally means thoughts/plans. 'Thoughts' keeps the lexical distinction from עֲצָה while still allowing the following verb to express purposeful intent.
- source_word: חָשַׁב
  chosen: has devised
  alternatives:
  - has planned
  - has intended
  lexicon: HALOT
  rationale: Used here for intentional planning. 'Has devised' avoids repeating 'planned' and preserves the active deliberative sense.
- source_word: אֶרֶץ כַּשְׂדִּים
  chosen: the land of the Chaldeans
  alternatives:
  - Chaldea
  lexicon: HALOT
  rationale: A more transparent rendering of the Hebrew phrase than the conventional shorthand 'Chaldea.'
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - Indeed
  - If not
  lexicon: HALOT
  rationale: In oath-like prophetic rhetoric, אִם לֹא functions idiomatically as a strong asseveration rather than a literal conditional. 'Surely' captures the force in natural English.
- source_word: יִסְחָבוּם
  chosen: will drag them away
  alternatives:
  - will drag them off
  - will pull them away
  lexicon: HALOT
  rationale: 'סחב conveys dragging or hauling. The 3mp subject with 3mp object is retained: ''they...them.'' ''Away'' clarifies the hostile removal implied by the context.'
- source_word: צְעִירֵי הַצֹּאן
  chosen: the little ones of the flock
  alternatives:
  - the least of the flock
  - the young of the flock
  lexicon: HALOT
  rationale: Literally 'the small/young ones of the flock.' This likely metaphorically refers to the weakest or least significant attackers, but the image is preserved in the main text.
- source_word: יַשִּׁים
  chosen: he will make
  alternatives:
  - he will set
  - he will render
  lexicon: HALOT
  rationale: 'Hiphil of שׁמם/שים? In this construction the sense is causative/resultative: he will make/render. This fits the object-complement relationship with נָוֶה.'
- source_word: עֲלֵיהֶם
  chosen: because of them
  alternatives:
  - over them
  - upon them
  lexicon: HALOT
  rationale: 'Though literally ''over/upon them,'' the idiom in context is best represented as resultative/causal: the pasture becomes desolate on account of what happens to them. This avoids awkward English while preserving the judgment sense.'
- source_word: נָוֶה
  chosen: their pasture desolate
  alternatives:
  - their habitation desolate
  - the pastureland over them desolate
  lexicon: HALOT
  rationale: נָוֶה can denote pasture, abode, or habitation. Given the flock imagery immediately preceding, 'pasture' best preserves the metaphorical coherence. 'Desolate' is supplied from the judgment context and common usage in this idiom, since the Hebrew construction is elliptical in English if rendered too literally.
