translation:
  language: es
  text: No descubrirás la desnudez de la hija de tu hijo ni de la hija de tu hija[a][b], porque su desnudez es la tuya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «No tendrás relaciones sexuales con la hija de tu hijo ni con la hija de tu hija». El hebreo, literalmente, dice «descubrir la desnudez de».'
    reason: lexical_alternative
  - marker: b
    text: La cláusula final es literalmente «porque su desnudez es la tuya»; conserva la idea de que estas descendientes se entienden como extensión de la propia familia y, por tanto, quedan sexualmente prohibidas.
    reason: cultural_note
lexical_decisions:
- source_word: עֶרְוַת / עֶרְוָתָן / עֶרְוָתְךָ
  english_pob_choice: nakedness
  chosen_spanish: desnudez
  alternatives_spanish:
  - desnudez sexual
  - desnudez vergonzosa
  - parte íntima
  lexicon: HALOT
  rationale: Conservo el sustantivo concreto del hebreo para mantener el eufemismo legal de Levítico 18. En español, 'desnudez' preserva mejor la fórmula repetida y la relación intertextual con otros versículos del capítulo que una paráfrasis más explícita.
- source_word: בַּת בִּנְךָ
  english_pob_choice: your son's daughter
  chosen_spanish: la hija de tu hijo
  alternatives_spanish:
  - tu nieta por tu hijo
  - la hija de tu descendiente varón
  lexicon: HALOT
  rationale: La construcción española directa conserva la precisión genealógica del hebreo y evita introducir explicaciones que el texto no expresa.
- source_word: בַת בִּתְּךָ
  english_pob_choice: your daughter's daughter
  chosen_spanish: la hija de tu hija
  alternatives_spanish:
  - tu nieta por tu hija
  - la hija de tu descendiente mujer
  lexicon: HALOT
  rationale: Mantiene el paralelismo con la primera mitad del versículo y refleja de forma directa la relación de parentesco.
- source_word: לֹא תְגַלֶּה
  english_pob_choice: You shall not uncover
  chosen_spanish: No descubrirás
  alternatives_spanish:
  - No debes descubrir
  - No has de descubrir
  - No te acercarás
  lexicon: HALOT
  rationale: '''Descubrir'' reproduce de manera natural en español el valor del hebreo גלה en esta fórmula legal. Conserva el registro normativo y el paralelismo habitual de Levítico 18 sin convertirlo en una paráfrasis sexual explícita.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en
  lexicon: HALOT
  rationale: '''Porque'' expresa con claridad la relación causal del hebreo y funciona bien en español contemporáneo.'
- source_word: הֵנָּה
  english_pob_choice: they are
  chosen_spanish: la tuya
  alternatives_spanish:
  - son tuyas
  - son tu desnudez
  - son tu propia desnudez
  lexicon: HALOT
  rationale: El hebreo final dice literalmente que 'ellas' son tu desnudez. En español, 'su desnudez es la tuya' conserva la tensión semántica entre parentesco cercano y prohibición sexual, sin suavizarla ni expandirla demasiado.
theological_decisions:
- issue: 'Racionalidad final: ''for their nakedness is your own'''
  english_pob_reading: The clause is preserved literally to reflect the kinship-based rationale of incest prohibition without overexplaining it in the main text.
  chosen_spanish_reading: Su desnudez es la tuya.
  alternative_spanish_readings:
  - porque son tu propia carne
  - porque su desnudez es como la tuya
  - porque son tu desnudez
  rationale: El hebreo presenta una razón relacional, no una explicación analítica moderna. La traducción elegida conserva esa lógica de pertenencia familiar y el eco del eufemismo legal, evitando reemplazarla por 'carne' o por una paráfrasis interpretativa que debilitaría el texto.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el cierre revisado del POB inglés, que pasó de una explicación más libre a una fórmula más literal: ''for their nakedness is your own''. En español se mantuvo esa contención semántica, preservando el eufemismo legal y la justificación de parentesco.'
  spanish_consistency_notes:
  - Se mantiene 'desnudez' para עֶרְוָה en coherencia con el registro legal de Levítico 18.
  - Se conserva el orden genealógico 'hija de tu hijo / hija de tu hija' para reflejar la precisión del hebreo.
  - El tono normativo 'No descubrirás' preserva la forma jurídica del mandamiento.
  - La nota b se ancla en la cláusula final, donde aparece la mayor tensión interpretativa del versículo.
