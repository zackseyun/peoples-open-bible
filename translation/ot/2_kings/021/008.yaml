id: 2KI.21.8
reference: 2 Kings 21:8
source:
  edition: WLC
  text: וְ/לֹ֣א אֹסִ֗יף לְ/הָנִיד֙ רֶ֣גֶל יִשְׂרָאֵ֔ל מִן הָ֣/אֲדָמָ֔ה אֲשֶׁ֥ר נָתַ֖תִּי לַֽ/אֲבוֹתָ֑/ם רַ֣ק אִם יִשְׁמְר֣וּ לַ/עֲשׂ֗וֹת כְּ/כֹל֙ אֲשֶׁ֣ר צִוִּיתִ֔י/ם וּ/לְ/כָל הַ֨/תּוֹרָ֔ה אֲשֶׁר צִוָּ֥ה אֹתָ֖/ם עַבְדִּ֥/י מֹשֶֽׁה־׀־־־׃
translation:
  text: And I will not again make Israel’s foot wander from the land that I gave to their fathers[a], if only they are careful to do according to all that I commanded them[c][b], and according to all the law that my servant Moses commanded them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make Israel move' / 'remove Israel from the land.' The Hebrew literally says 'make Israel’s foot wander,' preserving the image of displacement.
    reason: lexical_alternative
  - marker: b
    text: Or 'their ancestors.' Hebrew 'their fathers' is a covenantal expression for the forefathers of Israel.
    reason: lexical_alternative
  - marker: c
    text: '''The law'' may also be rendered ''the instruction''; here it refers to the Mosaic Torah commanded through Moses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹסִיף
  chosen: I will not again make
  alternatives:
  - I will no longer
  - I will not continue to
  lexicon: HALOT
  rationale: 'With לֹא plus יסף in the Hiphil, the idiom expresses cessation of repeated action: ''not add again'' = ''not again.'' Rendering with ''again'' preserves the Hebrew force more naturally than a wooden ''add.'''
- source_word: לְהָנִיד רֶגֶל
  chosen: make Israel’s foot wander
  alternatives:
  - make Israel move
  - cause Israel to totter
  - remove Israel
  lexicon: HALOT
  rationale: The Hiphil of נוד/ניד with 'foot' is an idiom for causing displacement or wandering. 'Make Israel’s foot wander' keeps the concrete imagery while remaining intelligible. More interpretive renderings like 'remove Israel' flatten the metaphor too quickly.
- source_word: רֶגֶל יִשְׂרָאֵל
  chosen: Israel’s foot
  alternatives:
  - the foot of Israel
  lexicon: HALOT
  rationale: The singular 'foot' is retained because the Hebrew uses the singular body-part idiomatically for the nation. This preserves the vividness of the source text.
- source_word: הָאֲדָמָה
  chosen: the land
  alternatives:
  - the ground
  - the soil
  lexicon: HALOT
  rationale: In covenantal and territorial context, אֲדָמָה refers to the land given to the ancestors, not merely soil. 'Land' is the natural English equivalent here.
- source_word: נָתַתִּי לַאֲבוֹתָם
  chosen: that I gave to their fathers
  alternatives:
  - that I gave to their ancestors
  lexicon: HALOT
  rationale: '''Fathers'' is a standard covenantal expression in this context and reflects the Hebrew directly. It is not exclusively male in referent but points to the patriarchal ancestors of Israel.'
- source_word: רַק אִם
  chosen: if only
  alternatives:
  - provided that
  - only if
  lexicon: HALOT
  rationale: The phrase introduces a condition with restrictive force. 'If only' captures the conditional and restrictive sense in smooth English without overstating it.
- source_word: יִשְׁמְרוּ לַעֲשׂוֹת
  chosen: they are careful to do
  alternatives:
  - they keep to do
  - they observe to do
  - they are careful to obey
  lexicon: HALOT
  rationale: The idiom שמר + infinitive means to keep/watch carefully so as to do. 'Are careful to do' preserves both obedience and attentiveness without paraphrasing beyond the text.
- source_word: כְּכֹל אֲשֶׁר צִוִּיתִים
  chosen: according to all that I commanded them
  alternatives:
  - all that I commanded them
  - everything I commanded them
  lexicon: HALOT
  rationale: 'The prefixed כ marks conformity: ''according to all.'' Retaining this wording reflects the comprehensive standard of obedience.'
- source_word: וּלְכָל הַתּוֹרָה
  chosen: and according to all the law
  alternatives:
  - and all the instruction
  - and according to the whole law
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction, but in this Mosaic covenant context 'the law' is the most natural and established rendering. The added 'according to' carries over the preposition for parallelism with the previous clause.
- source_word: עַבְדִּי מֹשֶׁה
  chosen: my servant Moses
  alternatives:
  - Moses my servant
  lexicon: HALOT
  rationale: The construct phrase is straightforward. 'My servant Moses' is idiomatic English and preserves the honorific designation without importing later theological nuance.
