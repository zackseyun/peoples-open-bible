  to: Si hay hambruna en la tierra, si hay peste, tizón, añublo, langosta u oruga[a]; si su enemigo lo sitia en la tierra de sus puertas[b]; cualquier plaga, cualquier enfermedad—
  rationale: Se corrige «hambre» a «hambruna» para reflejar mejor רָעָב en contexto de calamidad nacional; se traslada la nota [a] al término correspondiente, חָסִיל, y se vierte como «oruga» con la misma incertidumbre léxica preservada por el POB inglés; y se reemplaza «lo aprieta» por «lo sitia» para reproducir el sentido contextual de asedio de כִּי יָצַר לוֹ אֹיְבוֹ. Se mantiene «la tierra de sus puertas» con nota, por fidelidad a la metonimia hebrea y al audit trail inglés.
