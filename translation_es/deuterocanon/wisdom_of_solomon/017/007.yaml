- from: Y quedaron humillados los trucos del arte mágico[a], y la presunción[b] de entendimiento fue reprendido de manera vergonzosa.
  to: Y los trucos del arte mágico[a] quedaron abatidos, y la presunción[b] de entendimiento recibió una refutación humillante.
