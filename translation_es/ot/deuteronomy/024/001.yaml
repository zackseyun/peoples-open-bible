    text: O «un asunto de indecencia» o «algo vergonzoso». La frase hebrea es deliberadamente ambigua y se ha interpretado de más de una manera.
    reason: lexical_alternative
  revision_rationale: Se ajusta «Cuando» a «Si» para reflejar con mayor precisión la protasis legal condicional del hebreo y de la auditoría inglesa. Se mueve la nota al sintagma ambiguo «alguna indecencia» para anclarla donde realmente pertenece. Se cambia «la despide de su casa» por «la envía fuera de su casa» para conservar el componente espacial explícito del original.
