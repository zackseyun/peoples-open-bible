translation:
  language: es
  text: los hijos de Besai[a], los hijos de Meunim[b], los hijos de Nefusésim[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Bessai». Las grafías en español pueden variar según la convención de transliteración; aquí se sigue una forma cercana al hebreo.
    reason: lexical_alternative
  - marker: b
    text: O «Meunitas», si se entiende como una designación de pueblo o grupo y no solo como un nombre transliterado.
    reason: lexical_alternative
