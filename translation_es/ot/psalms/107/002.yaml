translation:
  language: es
  text: Díganlo los redimidos de Yahvé, a quienes él ha redimido de la mano del enemigo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del adversario». El sustantivo hebreo puede designar a un adversario, opresor o enemigo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאמְרוּ
  english_pob_choice: Let ... say so
  chosen_spanish: Díganlo
  alternatives_spanish:
  - Que digan
  - Digan
  lexicon: HALOT
  rationale: 'El imperfecto con valor exhortativo se expresa de forma natural en español con un imperativo plural: «Díganlo». Conserva el tono volitivo del hebreo sin añadir contenido ajeno.'
- source_word: גְּאוּלֵי
  english_pob_choice: the redeemed
  chosen_spanish: los redimidos
  alternatives_spanish:
  - los rescatados
  - los rescatados por precio
  lexicon: HALOT
  rationale: «Redimidos» reproduce el campo léxico de גאל y mantiene la resonancia teológica de liberación pactal que el texto enfatiza por repetición con el verbo siguiente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración directa como «Yahvé», conforme al criterio del POB en español para representar יְהוָה sin sustituirlo por un título.
- source_word: גְּאָלָם
  english_pob_choice: he has redeemed
  chosen_spanish: ha redimido
  alternatives_spanish:
  - los ha rescatado
  - los ha redimido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada con efecto presente; «ha redimido» conserva esa fuerza y repite el mismo núcleo léxico de «redimidos» para reflejar la reiteración intencional del hebreo.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de las manos de
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo de la «mano» como imagen de dominio o control, que en español es comprensible y preserva la metáfora original.
- source_word: צָר
  english_pob_choice: the foe
  chosen_spanish: el enemigo
  alternatives_spanish:
  - el adversario
  - el opresor
  - el enemigo
  lexicon: HALOT
  rationale: El sustantivo admite varias posibilidades contextuales. En español, «enemigo» comunica con claridad la noción de adversario hostil y preserva la ambigüedad relativa del hebreo sin forzar una lectura más específica.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. La convención del POB evita la sustitución por un título y preserva el nombre propio divino en español como «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje de redención repetido en el versículo
  english_pob_reading: redeemed / redeemed
  chosen_spanish_reading: redimidos / ha redimido
  alternative_spanish_readings:
  - rescatados / ha rescatado
  - los rescatados / ha rescatado
  rationale: El hebreo repite גאל para subrayar la acción salvífica de Yahvé. «Redimir» conserva mejor el valor teológico y lexical del término que «rescatar», aunque ambas opciones sean posibles en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: No se aplicaron revisiones textuales en el pasaje; la redacción sigue de cerca el hebreo WLC y el audit trail inglés, preservando la repetición de la raíz גאל y el modismo de la «mano».
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar proyectual en español.
  - Se mantiene «redimidos/redimido» para reflejar la repetición de גאל.
  - La construcción exhortativa en español queda en plural imperativo para el valor volitivo del hebreo.
  - La nota de pie marca la ambigüedad léxica de צָר sin alterar el sentido principal del versículo.
