    text: O «la llaga inflamada» o «la úlcera».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y vivió»; en este contexto, significa que se recuperó.
    reason: lexical_alternative
  revision_rationale: Se ajusta הַשְּׁחִין a «forúnculo» para reflejar mejor la decisión lexical auditada («boil») y sus alternativas. Se mejora la naturalidad del español al quitar el pronombre explícito innecesario y se simplifica el aparato de notas eliminando una nota no sustantiva sobre el orden de palabras.
