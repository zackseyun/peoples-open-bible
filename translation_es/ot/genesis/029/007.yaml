base_translation:
  language: en
  yaml_path: translation/ot/genesis/029/007.yaml
  text: Then he said[a], “Look, the day is still long; it is not time for the livestock to be gathered. Water the flock[b], then go and pasture them.”
  footnotes:
  - marker: a
    text: Or “it is still broad daylight.” The Hebrew idiom literally says “the day is still great/long,” meaning much of the day remains.
    reason: lexical_alternative
  - marker: b
    text: “Livestock” renders a collective term that can refer broadly to domesticated herd animals, while “the flock” renders a more specific term for small livestock such as sheep or goats.
    reason: lexical_alternative
