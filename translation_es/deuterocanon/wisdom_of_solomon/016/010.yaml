  to: Pero los dientes de serpientes venenosas no pudieron vencer a tus hijos[a], porque tu misericordia vino en su ayuda y los sanó.
  rationale: Se ajusta ἀντιπαρῆλθεν a «vino en su ayuda» para expresar con claridad la intervención socorredora de la misericordia de Dios. Se mantiene «tus hijos» por fidelidad a υἱούς y se simplifica la nota al pie para reflejar mejor la alternativa documentada en la auditoría inglesa.
