review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés en los puntos principales: לָכֵן = «Por tanto», יְרֵאוּהוּ = «le temerán», y לֹא יִרְאֶה = «no considera» refleja adecuadamente el sentido idiomático de «regardar/tomar en cuenta». También conserva la alternativa léxica en nota para ראה.'
  spanish_quality_summary: La redacción es clara y digna, pero «los hombres» suena menos natural en español eclesial general que «la gente» o «los seres humanos» para un plural genérico. Además, «a ningún sabio de corazón» pasa el singular al español, mientras el hebreo expresa una clase plural («wise of heart»). «a los sabios de corazón» suena más fiel y más idiomático, y permite que la nota alternativa «no ve a los sabios de corazón» conserve mejor el contraste con el hebreo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones para «temerán», «considera» y «de corazón» son compatibles con la política. La única mejora recomendada es de naturalidad y correspondencia distributiva/plural para אֲנָשִׁים y חַכְמֵי לֵב.
  issues:
  - severity: medium
    issue: «los hombres» como genérico
    rationale: Aunque defendible, en español neutral contemporáneo puede sonar más marcado o menos inclusivo que el hebreo genérico אֲנָשִׁים requiere. «La gente» conserva bien el sentido humano colectivo y lee con mayor naturalidad.
  - severity: medium
    issue: «a ningún sabio de corazón» singulariza una expresión plural
    rationale: חַכְמֵי לֵב es plural («los sabios de corazón / los sabios de mente/corazón»). El inglés usó «any who are wise of heart» para valor distributivo, pero en español «no considera a los sabios de corazón» expresa mejor la clase plural sin rigidez.
  - severity: low
    issue: La nota al pie puede ajustarse al plural del texto revisado
    rationale: Si se revisa la frase principal al plural, la nota debe reflejar el mismo anclaje para mantener coherencia formal.
  revised_spanish_text: Por tanto, la gente le temerá[a]; él no considera a los sabios de corazón.
  revised_footnotes:
  - marker: a
    text: 'O: «él no ve a los sabios de corazón»; el verbo hebreo puede significar «ver» o «considerar», y la frase puede subrayar el desdén de Dios por la sabiduría humana ante él.'
    reason: lexical_alternative
  revision_rationale: Se hace un ajuste menor para mejorar la naturalidad del español y reflejar mejor el plural hebreo en «sabios de corazón», sin cambiar el sentido ni la decisión teológica del POB. Se añade «él» para claridad sintáctica en español y se armoniza la nota con el texto revisado.
