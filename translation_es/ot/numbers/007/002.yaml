  text: וַ/יַּקְרִ֨יבוּ֙ נְשִׂיאֵ֣י יִשְׂרָאֵ֔ל רָאשֵׁ֖י בֵּ֣ית אֲבֹתָ֑/ם הֵ֚ם נְשִׂיאֵ֣י הַ/מַּטֹּ֔ת הֵ֥ם הָ/עֹמְדִ֖ים עַל הַ/פְּקֻדִֽים־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/007/002.yaml
  text: Then the leaders of Israel[a], the heads of their fathers’ houses, brought near. They were the leaders of the tribes[c][b]; they were the ones over those who were counted.
  footnotes:
  - marker: a
    text: Or 'presented' instead of 'brought offerings'; the Hebrew verb literally means 'brought near' and in this context refers to presenting dedication gifts.
    reason: lexical_alternative
  - marker: b
    text: '''Fathers’ houses'' refers to ancestral family units or clans within Israel.'
    reason: cultural_note
  - marker: c
    text: Or 'they were those in charge of the counted men' / 'the mustered men.' The Hebrew expression refers to those overseeing the census-registered group.
    reason: lexical_alternative
