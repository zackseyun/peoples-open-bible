translation:
  language: es
  text: Ella se ciñe la cintura con fuerza y fortalece sus brazos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se ciñe los lomos con fuerza». El hebreo conserva una imagen corporal concreta de preparación y vigor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָגְרָה
  english_pob_choice: girds
  chosen_spanish: se ciñe
  alternatives_spanish:
  - se ajusta
  - se ciñe la cintura
  - se arma
  lexicon: HALOT
  rationale: חָגַר expresa la acción concreta de ceñirse o ajustarse la ropa/equipo alrededor del cuerpo. En español, «se ciñe» conserva mejor la imagen corporal y de preparación que una paráfrasis como «se viste».
- source_word: בְּעֹז
  english_pob_choice: with strength
  chosen_spanish: con fuerza
  alternatives_spanish:
  - con poder
  - con vigor
  - con fortaleza
  lexicon: HALOT
  rationale: עֹז denota fuerza, vigor o poder. «Con fuerza» es natural en español y mantiene el valor instrumental del prefijo בְּ sin perder la concreción física del pasaje.
- source_word: מָתְנֶיהָ
  english_pob_choice: her waist
  chosen_spanish: sus lomos
  alternatives_spanish:
  - su cintura
  - sus caderas
  - su cintura y lomos
  lexicon: HALOT
  rationale: El hebreo apunta a la zona de la cintura/lomos. «Sus lomos» conserva el color bíblico y la imagen de preparación corporal; «cintura» sería más explícito, pero menos cercano al campo semántico tradicional de la zona media del cuerpo.
- source_word: וַתְּאַמֵּץ
  english_pob_choice: makes strong
  chosen_spanish: fortalece
  alternatives_spanish:
  - hace fuertes
  - da firmeza a
  - refuerza
  lexicon: HALOT
  rationale: La forma piel comunica hacer fuerte o dar vigor. «Fortalece» reproduce bien la fuerza causativa del verbo y suena natural en español bíblico contemporáneo.
- source_word: זְרֹעוֹתֶיהָ
  english_pob_choice: her arms
  chosen_spanish: sus brazos
  alternatives_spanish:
  - sus antebrazos
  - sus miembros superiores
  lexicon: HALOT
  rationale: זְרֹעוֹת son «brazos». «Sus brazos» es la equivalencia directa y clara en español, manteniendo el paralelismo con la imagen de trabajo y capacidad física.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide sustancialmente con el audit trail inglés, conservando la metáfora corporal de ceñirse y el paralelismo con fortalecer los brazos. No se introdujeron cambios de sentido respecto a la revisión más reciente.
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico digno y moderno, evitando calcos excesivamente literales salvo donde la imagen corporal del hebreo lo requiere.
  - «Lomos» se eligió para preservar la tensión lexical documentada en el original; la nota ofrece «cintura» como alternativa más explicativa.
  - «Fortalece» mantiene el aspecto causativo del verbo hebreo y armoniza con el paralelismo del verso.
