    issue: «la realeza» para הַמְּלוּכָה
    rationale: Aunque posible, en español «realeza» suele denotar la condición/clase real o la familia real más que el ejercicio del gobierno real. El contexto trata de reafirmar el gobierno/oficio regio de Saúl después de la victoria; «reinado» comunica esto con más precisión y naturalidad.
