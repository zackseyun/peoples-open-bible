translation:
  language: es
  text: ¿Qué es el hombre[a], para que lo recuerdes, y el hijo del hombre[b], para que lo atiendas[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombre mortal» para «hombre»; el hebreo אֱנוֹשׁ suele resaltar la fragilidad humana.
    reason: lexical_alternative
  - marker: b
    text: «Hijo del hombre» aquí es un modismo hebreo para un ser humano. El uso bíblico posterior puede darle un sentido mesiánico, pero en este salmo funciona como paralelo poético de la humanidad.
    reason: cross_reference
  - marker: c
    text: O «lo visites», «cuides de él» o «lo tomes en cuenta» para «lo atiendas».
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  english_pob_choice: What is
  chosen_spanish: ¿Qué es
  alternatives_spanish:
  - ¿Qué
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica con sentido copulativo implícito; en español, «¿Qué es…?» expresa con naturalidad esa estructura sin añadir contenido.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el hombre mortal
  - el ser humano
  - la humanidad
  lexicon: HALOT
  rationale: «אֱנוֹשׁ» destaca la fragilidad humana. «El hombre» conserva el singular representativo y la paralela con «hijo del hombre»; «hombre mortal» explicita la idea, pero sería más interpretativo.
- source_word: תִזְכְּרֶנּוּ
  english_pob_choice: you remember him
  chosen_spanish: lo recuerdes
  alternatives_spanish:
  - te acuerdes de él
  - lo tengas presente
  - lo tengas en memoria
  lexicon: HALOT
  rationale: «זכר» significa primariamente «recordar». En español, «recordar» con pronombre enclítico en la subordinada («lo recuerdes») mantiene la cercanía semántica y el tono bíblico, sin caer en un calco rígido.
- source_word: וּבֶן אָדָם
  english_pob_choice: and the son of man
  chosen_spanish: y el hijo del hombre
  alternatives_spanish:
  - y un hijo de hombre
  - y el ser humano
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo poético paralelo a «אֱנוֹשׁ». Se conserva el giro tradicional «hijo del hombre» para mantener la imagen y la correspondencia formal, sin marcar aquí un título mesiánico explícito.
- source_word: תִפְקְדֶנּוּ
  english_pob_choice: you attend to him
  chosen_spanish: lo atiendas
  alternatives_spanish:
  - lo visites
  - te ocupes de él
  - lo tengas en cuenta
  lexicon: HALOT
  rationale: '«פקד» tiene un rango amplio: atender, visitar, cuidar, tomar en cuenta. «Atender» reproduce bien el acto de atención divina sin forzar una connotación de visita judicial o de cuidado más específico de lo que el contexto exige.'
theological_decisions:
- issue: Lenguaje masculino representativo para la humanidad
  english_pob_reading: Retain 'man' and 'son of man' in the main text
  chosen_spanish_reading: Mantener «el hombre» y «el hijo del hombre» en el texto principal
  alternative_spanish_readings:
  - los seres humanos
  - la humanidad
  - los mortales
  rationale: El hebreo usa sustantivos masculinos singulares con fuerza representativa. En español, conservar esa forma preserva el paralelismo poético y evita neutralizar el género donde el texto fuente lo usa de manera marcada.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
- issue: Carácter mesiánico de «hijo del hombre» en este salmo
  english_pob_reading: Render generically as a human-reference idiom, not as an explicit messianic title
  chosen_spanish_reading: Tratarlo aquí como un modismo de referencia humana, no como un título mesiánico explícito
  alternative_spanish_readings:
  - capitalizarlo como título
  - sugerir una lectura mesiánica en el cuerpo del texto
  rationale: En el contexto inmediato de Salmo 8:5, la frase funciona como paralelismo poético sobre la pequeñez humana ante Dios. La aplicación cristológica posterior no obliga a introducir una señal mesiánica en la redacción principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión más reciente del auditor indica que no se requirieron cambios; esta redacción mantiene el acuerdo alto con el análisis inglés, conservando el paralelismo, el registro poético y las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo el singular representativo («el hombre» / «el hijo del hombre») para reflejar el hebreo y su paralelismo.
  - Se evitó introducir «SEÑOR» u otras sustituciones, ya que el versículo no contiene el nombre divino.
  - «Atiendas» conserva el rango de פקד sin sobredeterminarlo como «visitar» o «cuidar».
  - Las notas al pie respetan las alternativas documentadas y no añaden lecturas doctrinales no sustentadas por el contexto inmediato.
