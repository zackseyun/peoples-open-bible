translation:
  language: es
  text: También escribió acerca de la provisión y de la vestidura sacerdotal con la que ministran allí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego es algo trabado: literalmente, «la provisión y la vestidura sacerdotal, en la que ministran en ella». El pronombre probablemente remite a la vestidura, aunque la frase puede reflejar una forma textual comprimida o inestable.'
    reason: textual_variant
lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - redactó
  - puso por escrito
  lexicon: BDAG
  rationale: El aoristo de γράφω indica acción de escribir. En español, «escribió» es la opción más directa y natural, sin añadir matices de promulgación que no están en el verbo mismo.
- source_word: χορηγίαν
  english_pob_choice: provision
  chosen_spanish: sustento
  alternatives_spanish:
  - provisión
  - abastecimiento
  - asignación
  lexicon: LSJ
  rationale: χορηγία puede referirse al suministro o provisión de lo necesario. En este contexto de servicio templario, «sustento» comunica bien la idea de apoyo material sin forzar una noción técnica de ración o salario. Se conserva la amplitud semántica del término.
- source_word: ἱερατικὴν στολὴν
  english_pob_choice: the priestly garment
  chosen_spanish: el vestido sacerdotal
  alternatives_spanish:
  - la prenda sacerdotal
  - el atuendo sacerdotal
  - la vestidura sacerdotal
  lexicon: LSJ
  rationale: στολή suele denotar una vestidura o traje formal. «Vestido sacerdotal» mantiene el singular griego y resulta claro en español; «vestidura» sería igualmente posible, pero puede sonar más litúrgica y menos transparente.
- source_word: ἐν τίνι
  english_pob_choice: in which
  chosen_spanish: en el que
  alternatives_spanish:
  - con el que
  - donde
  lexicon: LSJ
  rationale: La construcción griega es algo trabada. «En el que» conserva la relación preposicional con el vestidado/vestido sin suavizar de más la sintaxis del original.
- source_word: λατρεύουσιν
  english_pob_choice: they minister
  chosen_spanish: ministraban
  alternatives_spanish:
  - servían
  - rendían culto
  lexicon: BDAG
  rationale: En contexto sacerdotal, λατρεύω denota servicio cultual. «Ministraban» conserva ese sentido formal y eclesial sin reducirlo simplemente a «servían», que sería más general.
- source_word: ἐν αὐτῇ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ella
  - en él
  lexicon: LSJ
  rationale: El pronombre femenino es difícil de enlazar limpiamente en español debido a la frase griega condensada. «Allí» refleja de manera natural el sentido locativo del segmento, siguiendo la revisión inglesa que optó por una solución natural sin perder la referencia espacial.
theological_decisions:
- issue: Tratamiento de la ambigüedad sintáctica del pronombre final
  english_pob_reading: The Greek wording is awkward; the pronoun likely refers to the robe, though the line may reflect a compressed or unstable textual form.
  chosen_spanish_reading: Se mantiene una formulación natural en español sin decidir explícitamente si el pronombre final recae sobre el vestido o sobre el lugar, porque el griego es comprimido y algo inestable.
  alternative_spanish_readings:
  - en el que ministraban en él
  - en el que ministraban en ella
  - en la cual ministraban
  rationale: 'La fuente griega presenta una tensión real: el femenino ἐν αὐτῇ sugiere el sustantivo femenino previo, pero la secuencia completa es difícil. El español «allí» conserva el sentido sin sobreinterpretar la referencia pronominal.'
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente en un punto clave: evita una traducción rígida del cierre griego y resuelve ἐν αὐτῇ con una expresión locativa natural. A diferencia de la versión inglesa revisada, la español conserva de forma más visible la posible referencia ambigua mediante una nota, para no borrar la tensión textual documentada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando corresponda; en este versículo no aparece el nombre divino.
  - «Ministraban» se usa en sentido cultual, no como equivalencia general de «servir» en cualquier contexto.
  - Se prefirió «vestido sacerdotal» a «ropa» o «atuendo» para sostener el registro formal del texto.
  - La nota al pie marca la dificultad del griego sin convertirla en una reconstrucción excesiva.
