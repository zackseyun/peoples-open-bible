translation:
  language: es
  text: Alégrese tu padre y tu madre[a], y regocíjese la que te dio a luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «alégrense».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂמַח
  english_pob_choice: be glad
  chosen_spanish: alégrese
  alternatives_spanish:
  - alégrense
  - esté alegre
  - se alegre
  lexicon: HALOT
  rationale: Es un jussivo de deseo/exhortación; en español, el imperativo de tercera persona singular («alégrese») comunica bien la idea de «que se alegre» sin volverla mecánica. Mantiene la coordinación con el segundo verbo de alegría.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - tu papá
  - el padre que tienes
  lexicon: HALOT
  rationale: La posesión es directa y simple; «tu padre» reproduce con naturalidad la referencia del hebreo.
- source_word: וְאִמֶּךָ
  english_pob_choice: and your mother
  chosen_spanish: y tu madre
  alternatives_spanish:
  - y tu mamá
  - y la madre que tienes
  lexicon: HALOT
  rationale: Coordinación nominal simple; se conserva la forma clara y sobria del original.
- source_word: וְתָגֵל
  english_pob_choice: and let ... rejoice
  chosen_spanish: y regocíjese
  alternatives_spanish:
  - y exulte
  - y se alegre
  lexicon: HALOT
  rationale: El verbo גיל expresa una alegría más intensa que שׂמח; «regocijarse» preserva mejor esa fuerza elevada que un simple «alegrarse».
- source_word: יוֹלַדְתֶּךָ
  english_pob_choice: her who gave birth to you
  chosen_spanish: la que te dio a luz
  alternatives_spanish:
  - la que te llevó en su vientre
  - la que te parió
  - la que te engendró
  lexicon: HALOT
  rationale: El participio femenino con sufijo de segunda persona masculina se refiere a la madre como la que te dio a luz. «La que te dio a luz» es la opción más transparente y fiel en español; evita introducir una formulación más técnica o más áspera de lo que pide el contexto.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura hebrea y la solución inglesa auditada, manteniendo la asimetría verbal entre שׂמח y גיל. No se documentaron revisiones textuales o teológicas que requirieran ajuste.
  spanish_consistency_notes:
  - Se conserva el tratamiento de segunda persona singular («tu», «te») coherente con el sufijo hebreo.
  - Se evita «Cristo», «SEÑOR» u أخرى terminología no pertinente al versículo.
  - «Regocíjese» se usa para marcar una intensidad mayor que «alégrese», siguiendo la distinción léxica del hebreo.
