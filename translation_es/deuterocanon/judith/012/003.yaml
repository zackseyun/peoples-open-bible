translation:
  language: es
  text: 'Y Holofernes le dijo: «Pero si se agotan las cosas que tienes contigo, ¿de dónde conseguiremos para ti provisiones[a] como esas? Porque no hay entre nosotros nadie de tu nación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alimento» o «suministros» por «provisiones»; el griego usa δύναμιν aquí en un sentido contextual inusual, aparentemente refiriéndose a sustento más que a poder o fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπεν πρὸς αὐτὴν Ὁλοφέρνης
  english_pob_choice: And Holofernes said to her
  chosen_spanish: Y Holofernes le dijo
  alternatives_spanish:
  - Y Holofernes dijo a ella
  - Entonces Holofernes le dijo
  lexicon: LSJ
  rationale: El griego introduce discurso directo de manera simple; en español, «le dijo» es natural y mantiene la relación dativa sin sobrecargar la frase. Se conserva el nombre propio como en el texto fuente.
- source_word: Ἐὰν δὲ ἐκλίπῃ
  english_pob_choice: if the things you have with you run out
  chosen_spanish: si se agotan
  alternatives_spanish:
  - si faltan
  - si se acaban
  - si llegaran a faltar
  lexicon: LSJ
  rationale: ἐκλίπῃ expresa quedar exhausto o faltar; «se agotan» reproduce bien la idea de desabastecimiento en español moderno y encaja con el contexto de provisiones.
- source_word: τὰ μετὰ σοῦ ὄντα
  english_pob_choice: the things you have with you
  chosen_spanish: las cosas que tienes contigo
  alternatives_spanish:
  - lo que llevas contigo
  - las provisiones que llevas contigo
  lexicon: LSJ
  rationale: La expresión es amplia y literalmente dice «las cosas que están contigo». «Las cosas que tienes contigo» sigue de cerca el griego sin fijar prematuramente el referente, que se aclara por el contexto.
- source_word: πόθεν ἐξοίσομεν σοι
  english_pob_choice: from where shall we get for you
  chosen_spanish: ¿de dónde te obtendremos
  alternatives_spanish:
  - ¿de dónde te conseguiremos
  - ¿de dónde te traeremos
  lexicon: LSJ
  rationale: ἐξοίσομεν es futuro de ἐκφέρω, «sacar/traer». En este contexto la idea es conseguir algo para su uso; «obtendremos» mantiene el sentido funcional del verbo sin volverlo demasiado literal o extraño.
- source_word: δύναμιν
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - alimento
  - sustento
  - provisiones de comida
  lexicon: LSJ
  rationale: Aquí δύναμις tiene un sentido contextual inusual; no significa «poder» o «fuerza», sino algo que se usa como abastecimiento. «Provisiones» preserva esa rareza semántica y coincide con el audit trail inglés.
- source_word: ὁμοίαν αὐτοῖς
  english_pob_choice: like them
  chosen_spanish: semejantes a ellas
  alternatives_spanish:
  - parecidas a ellas
  - del mismo tipo que ellas
  lexicon: LSJ
  rationale: El femenino singular concuerda por sentido con las cosas/provisiones mencionadas. «Semejantes a ellas» conserva la comparación y la referencia anafórica al suministro anterior.
- source_word: οὐ γάρ ἐστιν μεθʼ ἡμῶν ἐκ τοῦ ἔθνους σου
  english_pob_choice: For there is no one with us from your nation
  chosen_spanish: Porque no hay entre nosotros nadie de tu nación
  alternatives_spanish:
  - Pues no hay con nosotros nadie de tu pueblo
  - Porque no hay entre nosotros nadie de tu nación
  lexicon: LSJ
  rationale: ἔθνος designa aquí el grupo étnico/ nacional de Judit. «De tu nación» conserva el matiz del original y el mismo valor que la traducción inglesa auditada.
theological_decisions:
- issue: Sentido de δύναμις como abastecimiento y no como poder/fuerza
  english_pob_reading: provisions; the Greek uses δύναμιν here in an unusual contextual sense, apparently referring to sustenance rather than power or strength.
  chosen_spanish_reading: provisiones
  alternative_spanish_readings:
  - fuerza
  - poder
  - alimento
  rationale: El contexto inmediato habla de lo que Judith ha traído consigo y de la posibilidad de reabastecerla; por eso el término debe entenderse como suministros. Traducirlo como «fuerza» o «poder» oscurecería el sentido contextual reconocido por el POB inglés.
  doctrine_reference: Lexical/contextual sense in deuterocanonical narrative; no doctrinal issue.
translation_notes:
  revision_awareness: This Spanish draft follows the latest English POB revision that changed ‘bring you’ to ‘get for you,’ preserving the revised functional sense in Spanish with «obtendremos». It also preserves the documented lexical tension in δύναμις by rendering it as «provisiones» rather than a standard power/strength term.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» as a project default only when the divine name appears; aquí no ocurre.
  - Se evita «Cristo»/«Mesías» porque no hay terminología cristológica en este versículo.
  - El registro es formal pero natural, adecuado para lectura eclesial amplia.
  - No se introducen notas al pie porque no hay una alternativa textual que requiera anclaje adicional en este versículo.
