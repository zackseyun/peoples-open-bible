translation:
  language: es
  text: 'Por tanto, así dice Yahvé de los ejércitos: «Miren, los refinaré y los pondré a prueba[b]; porque, ¿cómo podría yo actuar de otro modo a causa de la hija[a] de mi pueblo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «mi pueblo» o «mi pueblo querido». El hebreo dice literalmente «la hija de mi pueblo», una expresión profética de ternura y relación de pacto.
    reason: lexical_alternative
  - marker: b
    text: O, «pues, ¿cómo podría yo hacer de otra manera?».
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se conserva el nombre divino YHWH como «Yahvé», según la terminología del proyecto, y צְבָאוֹת se vierte con la expresión amplia y reconocible «de los ejércitos», que mantiene el alcance semántico sin reducirlo solo a ejércitos humanos.
- source_word: הִנְנִי
  english_pob_choice: Behold, I will / I am
  chosen_spanish: Miren,
  alternatives_spanish:
  - He aquí,
  - Miren, yo
  lexicon: HALOT
  rationale: El hebreo tiene fuerza deíctica y enfática. En español, «Miren» conserva la solemnidad profética y suena natural sin forzar una calca como «He aquí» en el flujo de la oración.
- source_word: צוֹרְפָם
  english_pob_choice: I will refine them
  chosen_spanish: los refinaré
  alternatives_spanish:
  - los fundiré
  - los purificaré
  lexicon: HALOT
  rationale: «Refinar» reproduce el campo metalúrgico del verbo צרף y preserva la metáfora. «Purificar» sería más interpretativo; «fundir» estrecharía demasiado la imagen al proceso técnico.
- source_word: וּבְחַנְתִּים
  english_pob_choice: and test them
  chosen_spanish: los pondré a prueba
  alternatives_spanish:
  - los probaré
  - los examinaré
  lexicon: HALOT
  rationale: «Poner a prueba» comunica bien בחן en español y conserva la idea de examen/discernimiento sin perder el enlace natural con «refinaré».
- source_word: כִּי אֵיךְ אֶעֱשֶׂה
  english_pob_choice: for how else shall I act
  chosen_spanish: porque, ¿cómo podría yo actuar de otro modo?
  alternatives_spanish:
  - porque, ¿cómo podría yo hacerlo de otra manera?
  - pues, ¿qué otra cosa podría yo hacer?
  lexicon: HALOT
  rationale: La pregunta retórica expresa constricción motivada por la condición del pueblo. «Actuar de otro modo» es un equivalente español natural que conserva el matiz de inevitabilidad sin añadir explicaciones ajenas al texto.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por causa de
  - debido a
  lexicon: HALOT
  rationale: «A causa de» corresponde bien al valor causal de מִפְּנֵי y mantiene el registro sobrio del pasaje.
- source_word: בַּת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - mi pueblo querido
  - mi querido pueblo
  lexicon: HALOT
  rationale: Se preserva el giro figurado literal del hebreo para no borrar la tensión afectiva y profética. «Mi pueblo querido» es una alternativa idiomática, pero interpretativa; la forma literal queda mejor respaldada por el texto fuente.
theological_decisions:
- issue: Mantenimiento del nombre divino frente a sustitución por título
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - el Señor de los ejércitos
  - SEÑOR de los ejércitos
  rationale: Se sigue la convención del proyecto de traducir יהוה como «Yahvé», evitando la sustitución por un título y preservando la referencia al nombre personal revelado.
  doctrine_reference: Tetragrammaton policy; Translation philosophy §§1, 3
- issue: Preservación del tono profético y de la metáfora metalúrgica
  english_pob_reading: Behold, I will refine them and test them
  chosen_spanish_reading: Miren, los refinaré y los pondré a prueba
  alternative_spanish_readings:
  - He aquí, los refinaré y los probaré
  - Miren, los purificaré y los examinaré
  rationale: La imagen del refinado mantiene la metáfora de juicio y purificación sin espiritualizarla en exceso. «Poner a prueba» conserva el paralelismo con el refinado y la seriedad del acto divino.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Interpretación de la expresión 'la hija de mi pueblo'
  english_pob_reading: the daughter of my people
  chosen_spanish_reading: la hija de mi pueblo
  alternative_spanish_readings:
  - mi pueblo querido
  - mi querida gente
  rationale: Se conserva la expresión heredada del hebreo para no diluir su carga afectiva y de pacto. La literalidad permite una nota explicativa sin resolver prematuramente la imagen en una paráfrasis.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fuerza de la pregunta retórica final
  english_pob_reading: for how else shall I act
  chosen_spanish_reading: porque, ¿cómo podría yo actuar de otro modo?
  alternative_spanish_readings:
  - pues, ¿qué otra cosa podría yo hacer?
  - porque, ¿cómo podría yo hacerlo de otra manera?
  rationale: La formulación mantiene la presión retórica del hebreo y evita convertir la pregunta en una explicación doctrinal añadida. El sentido es de acción inevitable en respuesta a la condición del pueblo.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'La redacción española sigue el pasaje hebreo directo y el audit trail inglés con un ajuste de registro: se conserva la metáfora de refinado/test de forma natural en español, se mantiene el nombre divino «Yahvé» según la política del proyecto, y se refleja la revisión más reciente del inglés al usar futuro simple («refinaré», «pondré a prueba») y una pregunta retórica formal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de acuerdo con la terminología del proyecto.
  - «De los ejércitos» preserva צְבָאוֹת sin sobreespecificar.
  - La imagen metalúrgica se conserva con «refinaré» y «pondré a prueba».
  - La expresión «la hija de mi pueblo» se conserva literal en el texto y se explica en nota para no perder la tensión afectiva del hebreo.
  - El signo de puntuación final se ajusta al español con comillas de cita y pregunta retórica interna.
