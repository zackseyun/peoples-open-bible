translation:
  language: es
  text: Entonces un hombre de Benjamín corrió desde la línea de batalla y llegó a Siló aquel mismo día[a][b], con su ropa rasgada y tierra sobre su cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la batalla» o «de las filas»; el término hebreo se refiere más específicamente a la línea o disposición de combate.
    reason: lexical_alternative
  - marker: b
    text: La ropa rasgada y la tierra sobre la cabeza eran señales acostumbradas de duelo, angustia o desastre.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּרָץ
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - se apresuró
  - huyó
  lexicon: HALOT
  rationale: El verbo básico de movimiento rápido se expresa de manera natural en español con «corrió». «Huyó» añadiría la idea de escape, que no está en el verbo por sí mismo.
- source_word: אִישׁ בִּנְיָמִן
  english_pob_choice: a man of Benjamin
  chosen_spanish: un hombre de Benjamín
  alternatives_spanish:
  - un benjaminita
  - un hombre de la tribu de Benjamín
  lexicon: HALOT
  rationale: «Un hombre de Benjamín» sigue de cerca la construcción hebrea sin volverla más interpretativa. «Benjaminita» es posible, pero menos transparente; «de la tribu de» añade información no explícita.
- source_word: מֵהַמַּעֲרָכָה
  english_pob_choice: from the battle line
  chosen_spanish: desde la línea de batalla
  alternatives_spanish:
  - desde la batalla
  - desde las filas
  - desde el frente de combate
  lexicon: HALOT
  rationale: La raíz y el uso apuntan a la disposición militar/linea de enfrentamiento, no solo a la idea general de guerra. «Línea de batalla» conserva ese matiz con claridad en español.
- source_word: וַיָּבֹא שִׁלֹה
  english_pob_choice: came to Shiloh
  chosen_spanish: llegó a Siló
  alternatives_spanish:
  - vino a Siló
  - arribó a Siló
  lexicon: HALOT
  rationale: «Llegó a Siló» es la forma más natural y fiel para el verbo de movimiento con destino. Mantiene la sencillez narrativa del hebreo.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that same day
  chosen_spanish: aquel mismo día
  alternatives_spanish:
  - ese mismo día
  - en aquel día
  lexicon: HALOT
  rationale: «Aquel mismo día» comunica la continuidad temporal inmediata que el inglés POB explicita con «that same day», sin perder la base literal de «en aquel día».
- source_word: וּמַדָּיו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - su ropa
  - sus prendas
  - sus vestiduras
  lexicon: HALOT
  rationale: El plural hebreo se refiere a la ropa/vestimenta. «Vestidos» conserva un registro digno y tradicional, a la vez que evita restringirlo a una sola prenda.
- source_word: קְרֻעִים
  english_pob_choice: torn
  chosen_spanish: rotos
  alternatives_spanish:
  - rasgados
  - hechos pedazos
  lexicon: HALOT
  rationale: En el contexto de duelo o desastre, «rotos» es una equivalencia clara y natural. «Rasgados» sería más literal respecto del acto de romper, pero menos idiomático como descripción general.
- source_word: וַאֲדָמָה עַל רֹאשׁוֹ
  english_pob_choice: and dirt on his head
  chosen_spanish: tierra sobre su cabeza
  alternatives_spanish:
  - polvo sobre su cabeza
  - barro sobre su cabeza
  lexicon: HALOT
  rationale: אֲדָמָה significa «tierra/suelo/terreno»; «tierra» conserva mejor el valor léxico que «polvo». La preposición «sobre» refleja de modo natural la imagen de la señal ritual.
theological_decisions:
- issue: Señales de duelo y desastre expresadas en la vestimenta y la cabeza
  english_pob_reading: Torn clothes and dirt on the head were customary signs of grief, distress, or disaster.
  chosen_spanish_reading: Los vestidos rotos y la tierra sobre la cabeza se entienden como señales acostumbradas de duelo, angustia o desastre.
  alternative_spanish_readings:
  - eran simples descripciones físicas
  - eran señales de luto בלבד
  rationale: Aunque el verso no lo explica explícitamente, el contexto cultural justifica conservar la carga simbólica de estas acciones. La formulación española mantiene esa lectura sin convertirla en paráfrasis excesiva.
  doctrine_reference: Uso cultural del luto en el antiguo Israel; cf. Gn 37:29, 34; 2 S 1:2, 11-12
translation_notes:
  revision_awareness: El control comparativo disponible indica alta concordancia con el testimonio hebreo y sin revisiones pendientes relevantes; por ello, el borrador sigue de cerca la lectura del texto fuente y el desglose léxico ya auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente explícito.
  - «Siló» conserva la acentuación habitual en español para el topónimo.
  - Se prefirió «tierra» frente a «polvo» para no suavizar el valor léxico de אֲדָמָה.
  - Se evitó «huía» o «escapó», porque el hebreo solo afirma que corrió.
