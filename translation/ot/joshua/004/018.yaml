id: JOS.4.18
reference: Joshua 4:18
source:
  edition: WLC
  text: וַ֠/יְהִי ב/עלות הַ/כֹּהֲנִ֜ים נֹשְׂאֵ֨י אֲר֤וֹן בְּרִית יְהוָה֙ מִ/תּ֣וֹךְ הַ/יַּרְדֵּ֔ן נִתְּק֗וּ כַּפּוֹת֙ רַגְלֵ֣י הַ/כֹּהֲנִ֔ים אֶ֖ל הֶ/חָרָבָ֑ה וַ/יָּשֻׁ֤בוּ מֵֽי הַ/יַּרְדֵּן֙ לִ/מְקוֹמָ֔/ם וַ/יֵּלְכ֥וּ כִ/תְמוֹל שִׁלְשׁ֖וֹם עַל כָּל גְּדוֹתָֽי/ו־־־־־׃
translation:
  text: And it happened[a], when the priests carrying the ark of the covenant of Yahweh came up from the midst of the Jordan, and the soles of the priests’ feet were lifted up to the dry ground[b], that the waters of the Jordan returned to their place and went as before over all its banks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''as yesterday and the third day,'' an idiom meaning ''as before'' or ''as formerly.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'when the priests carrying the ark of the covenant of the LORD came up from the midst of the Jordan, and the soles of the priests’ feet were lifted up onto the dry ground, that the waters of the Jordan returned to their place'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: בעלות
  chosen: when ... came up
  alternatives:
  - when ... went up
  - as ... were coming up
  lexicon: HALOT
  rationale: Infinitive construct of עלה with temporal ב, introducing the circumstance. 'Came up' fits movement out of the riverbed into the narrator's frame.
- source_word: נֹשְׂאֵי
  chosen: carrying
  alternatives:
  - bearing
  lexicon: HALOT
  rationale: Participle of נשׂא describing the priests. 'Carrying' is clear modern English; 'bearing' is possible but less natural.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: Construct chain rendered transparently. YHWH follows doctrine default as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִתּוֹךְ הַיַּרְדֵּן
  chosen: from the midst of the Jordan
  alternatives:
  - from the middle of the Jordan
  - from within the Jordan
  lexicon: HALOT
  rationale: תוך emphasizes the interior/middle of the river, not merely its bank. 'The Jordan' is retained as the river name.
- source_word: נִתְּקוּ
  chosen: were lifted up
  alternatives:
  - were pulled away
  - were removed
  - were detached
  lexicon: HALOT
  rationale: The verb marks the feet being drawn up/out from the riverbed onto dry land. 'Were lifted up' best fits the physical motion in context and avoids an overly mechanical sense like 'detached.'
- source_word: כַּפּוֹת רַגְלֵי
  chosen: the soles of ... feet
  alternatives:
  - the bottoms of ... feet
  lexicon: HALOT
  rationale: כף with feet refers to the sole/underside. 'Soles of the priests’ feet' is the idiomatic English equivalent.
- source_word: אֶל הֶחָרָבָה
  chosen: onto the dry ground
  alternatives:
  - to the dry land
  - to the dry ground
  lexicon: HALOT
  rationale: חרבה denotes dry land/ground in contrast to the river. 'Onto' reflects movement from water to dry ground.
- source_word: וַיָּשֻׁבוּ מֵי הַיַּרְדֵּן לִמְקוֹמָם
  chosen: the waters of the Jordan returned to their place
  alternatives:
  - the Jordan's waters returned to their place
  lexicon: HALOT
  rationale: Straightforward rendering of the clause, preserving the personified motion of the waters returning.
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - flowed
  - moved
  lexicon: HALOT
  rationale: הלך is literally 'went.' Although English might idiomatically say 'flowed,' 'went' preserves the Hebrew verbal choice while remaining understandable in context.
- source_word: כִּתְמוֹל שִׁלְשׁוֹם
  chosen: as before
  alternatives:
  - as yesterday and the day before
  - as formerly
  lexicon: HALOT
  rationale: Hebrew idiom meaning 'as previously/formerly.' 'As before' is concise and natural in English.
- source_word: עַל כָּל גְּדוֹתָיו
  chosen: over all its banks
  alternatives:
  - over all its shores
  - along all its banks
  lexicon: HALOT
  rationale: גדות refers to riverbanks. 'Over all its banks' conveys the overflowing condition described earlier in the narrative.
