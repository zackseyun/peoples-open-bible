translation:
  language: es
  text: Miren qué clase de amor nos ha dado el Padre[a], para que seamos llamados hijos de Dios, y lo somos[b]. Por esta razón el mundo no nos conoce[e][d][c], porque no lo conoció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «qué tipo de amor»; tradicionalmente, «cuán grande amor». El griego enfatiza la cualidad del amor del Padre y expresa asombro.
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos omiten «y lo somos».
    reason: textual_variant
  - marker: c
    text: O «no nos reconoce ... no lo reconoció».
    reason: lexical_alternative
  - marker: d
    text: «Lo» se entiende más naturalmente como el Padre en este versículo; algunos lo refieren a Cristo dentro del contexto joánico.
    reason: alternative_reading
  - marker: e
    text: 'O: «el mundo no nos conoce: porque no lo conoció».'
    reason: previous_rendering
lexical_decisions:
- source_word: ἴδετε
  english_pob_choice: See
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren ustedes
  lexicon: BDAG
  rationale: El imperativo plural llama la atención con fuerza. «Miren» es natural en español actual y conserva el carácter exhortativo sin volverse arcaico.
- source_word: ποταπὴν
  english_pob_choice: what kind of
  chosen_spanish: qué clase de
  alternatives_spanish:
  - qué tipo de
  - qué clase
  lexicon: BDAG
  rationale: El griego expresa asombro por la cualidad del amor, no solo por su magnitud. «Qué clase de» preserva mejor esa admiración cualitativa que una simple intensificación como «cuán grande».
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor
  lexicon: BDAG
  rationale: «Amor» es la equivalencia directa y el registro más natural para el contexto joánico.
- source_word: δέδωκεν
  english_pob_choice: has given
  chosen_spanish: ha dado
  alternatives_spanish:
  - ha concedido
  - ha otorgado
  lexicon: BDAG
  rationale: El perfecto apunta a un acto pasado con resultado vigente. «Ha dado» conserva bien ese valor sin sonar forzado en español.
- source_word: ὁ πατὴρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el Padre
  lexicon: BDAG
  rationale: Se trata del título divino en contexto joánico. Se mantiene la mayúscula por tratarse de Dios.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: La cláusula expresa finalidad/resultado. En español, «para que» comunica mejor esa relación que un simple «que».
- source_word: τέκνα θεοῦ
  english_pob_choice: children of God
  chosen_spanish: hijos de Dios
  alternatives_spanish:
  - hijos e hijas de Dios
  - niños de Dios
  lexicon: BDAG
  rationale: τέκνα es genérico e inclusivo. En español, «hijos de Dios» es una forma estable y bíblica; aquí funciona como término de parentesco espiritual sin necesidad de explicitar género en el texto principal.
- source_word: κληθῶμεν
  english_pob_choice: should be called
  chosen_spanish: seamos llamados
  alternatives_spanish:
  - podamos ser llamados
  - se nos llame
  lexicon: BDAG
  rationale: El subjuntivo pasivo tras ἵνα se expresa de modo natural con «seamos llamados», que preserva el matiz telico/resultativo.
- source_word: καὶ ἐσμέν
  english_pob_choice: and we are
  chosen_spanish: y lo somos
  alternatives_spanish:
  - y somos
  - y verdaderamente lo somos
  lexicon: BDAG
  rationale: 'La afirmación es enfática: no solo somos llamados hijos de Dios, sino que realmente lo somos. «Lo somos» evita repetición y mantiene la fuerza del griego.'
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Por tal razón
  lexicon: BDAG
  rationale: Marca inferencia explicativa de manera clara y digna en español.
- source_word: ὁ κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo
  lexicon: BDAG
  rationale: Se conserva el término literal, que en Juan suele designar el orden humano en rebeldía contra Dios, sin interpretarlo de más en el texto principal.
- source_word: οὐ γινώσκει ἡμᾶς
  english_pob_choice: does not know us
  chosen_spanish: no nos conoce
  alternatives_spanish:
  - no nos reconoce
  lexicon: BDAG
  rationale: «Conocer» preserva la repetición léxica con el verbo siguiente y encaja con el sentido relacional de γινώσκω. La alternativa «reconoce» queda como matiz posible.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Aquí introduce la causa de la incomprensión del mundo; «porque» lo expresa de forma directa y natural.
- source_word: οὐκ ἔγνω αὐτόν
  english_pob_choice: it did not know him
  chosen_spanish: no lo conoció
  alternatives_spanish:
  - no lo reconoció
  lexicon: BDAG
  rationale: Se conserva la repetición de «conocer» para reflejar la raíz verbal compartida con γινώσκει. El pronombre se mantiene deliberadamente neutro en español para no resolver más de lo que el contexto inmediato exige.
theological_decisions:
- issue: Sentido de τέκνα θεοῦ en español
  english_pob_reading: children of God
  chosen_spanish_reading: hijos de Dios
  alternative_spanish_readings:
  - hijos e hijas de Dios
  - niños de Dios
  rationale: El griego usa un término inclusivo para descendencia/parentesco. En español, «hijos de Dios» es la forma eclesial y bíblica más asentada sin perder el alcance genérico del plural.
  doctrine_reference: Lenguaje filial de adopción en 1 Juan 3:1; evitar sobre-explicación en el texto principal.
- issue: Referente de αὐτόν
  english_pob_reading: him = the Father
  chosen_spanish_reading: no lo conoció
  alternative_spanish_readings:
  - no lo conoció [= al Padre]
  - no lo conoció [= a Cristo]
  rationale: El español mantiene la ambigüedad referencial con «lo». En la lógica inmediata del versículo, el referente más cercano es el Padre; sin embargo, la tradición joánica admite una resonancia cristológica. Se preserva la tensión sin cerrarla en el texto principal.
  doctrine_reference: Preservar la tensión interpretativa documentada por el audit trail.
- issue: Incluir καὶ ἐσμέν en el texto principal
  english_pob_reading: include in main text as 'and we are'
  chosen_spanish_reading: y lo somos
  alternative_spanish_readings:
  - omit it as a textual variant
  - y somos
  rationale: Se sigue el texto crítico SBLGNT que incluye καὶ ἐσμέν. La frase refuerza que los creyentes no solo son llamados hijos de Dios, sino que efectivamente lo son.
  doctrine_reference: Variantes textuales preservadas en nota; afirmación identitaria mantenida en el texto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada al inglés que reemplazó una construcción poco fluida con coma antes de «because»; en español se reflejó directamente con una relación causal simple («porque») sin puntuación redundante. También se consideró la estabilidad de la última revisión sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula para el referente divino.
  - Se conserva «conocer/conoció» para reflejar la repetición léxica de γινώσκω/ἔγνω.
  - «Hijos de Dios» sigue el uso bíblico estándar y el valor inclusivo de τέκνα.
  - La ambigüedad del pronombre objeto se preserva en español sin forzar una resolución en el texto principal.
  - Las notas alternativas se limitan a opciones realmente sustentadas por el audit trail inglés.
