revisions:
- from: Ahora, el nombre del hombre israelita[a], que fue derribado, que fue derribado junto con la mujer madianita, era Zimri hijo de Salu[b], príncipe de una casa paterna entre los simeonitas.
  to: Ahora, el nombre del hombre israelita[a], que fue muerto, que fue muerto junto con la mujer madianita, era Zimri hijo de Salu[b], jefe de una casa paterna entre los simeonitas.
  rationale: Se reemplaza «príncipe» por «jefe» para reflejar con más fidelidad נְשִׂיא sin connotación monárquica. También se cambia «derribado» por «muerto» para un español más natural en el contexto narrativo y para expresar con mayor claridad el resultado letal del verbo repetido, manteniendo el énfasis del hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:06:50Z'
