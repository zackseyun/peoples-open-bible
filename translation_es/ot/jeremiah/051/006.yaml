translation:
  language: es
  text: Huyan de en medio de Babilonia, y que cada uno salve su vida. No perezcan[a] en su iniquidad, porque este es el tiempo de la venganza de Yahvé; él le paga su merecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No sean destruidos en su culpa» o «No perezcan a causa de su iniquidad». El hebreo puede apuntar tanto a quedar envueltos en el pecado de Babilonia como a sufrir el juicio que viene por él.'
    reason: alternative_reading
lexical_decisions:
- source_word: נֻסוּ
  english_pob_choice: Flee
  chosen_spanish: Huyan
  alternatives_spanish:
  - Escapen
  - Huyan lejos
  lexicon: HALOT
  rationale: El imperativo plural pide una salida urgente; «Huyan» conserva la fuerza directa de «Flee» y es natural en español.
- source_word: מִתּוֹךְ בָּבֶל
  english_pob_choice: from the midst of Babylon
  chosen_spanish: de en medio de Babilonia
  alternatives_spanish:
  - de dentro de Babilonia
  - de la mitad de Babilonia
  lexicon: HALOT
  rationale: «תּוֹךְ» señala interior o medio; «de en medio de» mantiene la imagen de salir desde el centro de la ciudad/sistema sin sonar artificial.
- source_word: וּמַלְּטוּ אִישׁ נַפְשׁוֹ
  english_pob_choice: and let each man save his life
  chosen_spanish: y que cada uno salve su vida
  alternatives_spanish:
  - y que cada hombre libre su alma
  - y que cada uno escape con vida
  lexicon: HALOT
  rationale: El giro idiomático con נֶפֶשׁ aquí apunta a la vida/la propia preservación. «Cada uno» conserva el valor distributivo de אִישׁ; «salve su vida» comunica bien la urgencia sin sobreinterpretar el hebreo.
- source_word: אַל תִּדַּמּוּ
  english_pob_choice: Do not perish
  chosen_spanish: No perezcan
  alternatives_spanish:
  - No sean destruidos
  - No sean cortados
  lexicon: HALOT
  rationale: La forma prohibitiva en contexto de juicio se entiende naturalmente como «perecer». En español, «No perezcan» es claro y evita una expresión demasiado técnica.
- source_word: בַּעֲוֺנָהּ
  english_pob_choice: in her iniquity
  chosen_spanish: en su iniquidad
  alternatives_spanish:
  - por su culpa
  - por causa de su iniquidad
  lexicon: HALOT
  rationale: «Iniquidad» conserva el núcleo léxico de עָוֹן y deja abierta la tensión documentada entre culpa y juicio consecuente. El posesivo femenino sigue a Babilonia.
- source_word: עֵת נְקָמָה
  english_pob_choice: the time of Yahweh's vengeance
  chosen_spanish: tiempo de venganza
  alternatives_spanish:
  - el tiempo de venganza
  - tiempo de represalia
  lexicon: HALOT
  rationale: La construcción expresa una temporada señalada para retribución. «Tiempo de venganza» es fiel y sobrio en español.
- source_word: לַיהוָה
  english_pob_choice: Yahweh's
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - de parte de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según la política del proyecto. En español, el dativo puede leerse naturalmente como acción que corresponde a Yahvé.
- source_word: גְּמוּל
  english_pob_choice: what she deserves
  chosen_spanish: su merecido
  alternatives_spanish:
  - retribución
  - pago
  lexicon: HALOT
  rationale: גְּמוּל designa recompensa o retribución. «Su merecido» es idiomático en español y comunica la justicia retributiva sin perder el sentido.
- source_word: מְשַׁלֵּם
  english_pob_choice: he is repaying
  chosen_spanish: él le paga
  alternatives_spanish:
  - él le está pagando
  - él le retribuye
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inminente. «Le paga» es más natural que una perífrasis pesada y mantiene la idea de retribución.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente; conforme a la terminología del proyecto, se vierte «Yahvé» para conservar el nombre del pacto sin mascarlo como título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH'
- issue: Ambigüedad de בַּעֲוֺנָהּ
  english_pob_reading: in her iniquity / because of her iniquity
  chosen_spanish_reading: en su iniquidad
  alternative_spanish_readings:
  - por su culpa
  - por causa de su iniquidad
  - en su castigo
  rationale: El hebreo puede abarcar culpa o el juicio que deriva de ella. La redacción española mantiene esa tensión sin decidirla en exceso, como hace el audit trail inglés.
  doctrine_reference: Jeremías 51:6; nota léxica de עָוֹן
- issue: Llamado urgente a salir de Babilonia
  english_pob_reading: Flee from the midst of Babylon
  chosen_spanish_reading: Huyan de en medio de Babilonia
  alternative_spanish_readings:
  - Escapen de Babilonia
  - Salgan de Babilonia rápidamente
  rationale: La urgencia profética y la imagen de salir del centro de una realidad condenada se conservan mejor con «de en medio de».
  doctrine_reference: Contexto profético de juicio sobre Babilonia
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «perish» por naturalidad y ajustó la relación con Yahweh's vengeance a una forma posesiva más fluida. En español, esa naturalidad se reflejó con «No perezcan» y «tiempo de venganza para Yahvé», manteniendo el sentido de retribución divina.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se conserva «Babilonia» como topónimo y símbolo profético sin reinterpretación.
  - «Iniquidad» se mantiene para עָוֹן, dejando abierta la relación entre culpa y castigo.
  - No se introduce «Cristo» ni otro título no presente en el versículo.
  - El tono es imperativo y profético, no explicativo ni devocional.
