review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la mayor parte del sentido fuente: ''tus ojos vieron'', ''señales'', ''maravillas'', ''mano poderosa'', ''brazo extendido'', el nombre divino ''Yahvé'' y la comparación ''así hará''. Sin embargo, ''con todos los pueblos'' debilita la dirección de la acción de Yahvé en לְכָל הָעַמִּים; en español aquí conviene ''a todos los pueblos'' para reflejar mejor el objeto afectado. También ''de los que tú tienes miedo'' es comprensible pero menos digno y algo más coloquial que ''de los que tienes miedo'' o ''a los que temes''.'
  spanish_quality_summary: 'El texto es legible y natural, pero requiere pulido menor para estilo bíblico digno y precisión sintáctica. ''Con todos los pueblos'' suena demasiado relacional/acompañante y no suficientemente directivo. ''Tú tienes miedo'' añade un pronombre no necesario en español y rebaja un poco el tono. La nota [a] también puede simplificarse: ''pruebas de examen'' suena torpe; ''grandes pruebas'' / ''grandes testings'' no es buen español, mejor ''grandes pruebas'' con alternativa ''grandes actos de prueba'' o ''grandes pruebas'' / ''grandes pruebas severas''.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto en ''Yahvé'' para יְהוָה y ''pueblos'' para עַמִּים. No hay problema con ''maravillas'' y ''mano poderosa''. La principal desalineación es sintáctica: la decisión documentada inglesa ''to all the peoples'' no respalda bien ''con todos los pueblos''.'
  issues:
  - severity: medium
    issue: Preposición 'con' en 'con todos los pueblos'
    rationale: El hebreo לְכָל הָעַמִּים aquí señala los pueblos como objeto afectado por la acción divina. 'Con' en español sugiere compañía o relación general; 'a todos los pueblos' refleja mejor el sentido y sigue más de cerca el audit trail inglés.
  - severity: low
    issue: Registro algo coloquial en 'de los que tú tienes miedo'
    rationale: La frase es entendible, pero en español bíblico digno suena mejor 'de los que tienes miedo' o 'a los que temes'. El pronombre 'tú' no es necesario para conservar el énfasis del original.
  - severity: low
    issue: Nota [a] usa 'pruebas de examen'
    rationale: Esa alternativa no suena natural en español y no representa bien la explicación lexical. Conviene una formulación más clara como 'grandes actos de prueba' o una glosa sobre pruebas severas.
  revised_spanish_text: las grandes pruebas[a] que tus ojos vieron, y las señales, y las maravillas, y la mano poderosa, y el brazo extendido por medio del cual Yahvé tu Dios te sacó; así hará Yahvé tu Dios a todos los pueblos[b] de los que tienes miedo.
  revised_footnotes:
