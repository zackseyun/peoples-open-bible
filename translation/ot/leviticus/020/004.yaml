theological_decisions:
- issue: Rendering of the cultic recipient לַמֹּלֶךְ
  chosen_reading: Molech
  alternative_readings:
  - the king
  rationale: Although the consonants could in theory be read as 'the king,' in Leviticus 18:21 and 20:2–5 the context strongly supports the name/designation of the prohibited cult recipient. Transliteration avoids importing an interpretive paraphrase while preserving the established referent.
