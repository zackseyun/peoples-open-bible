translation:
  language: es
  text: Y se unieron a ellos de entre las otras naciones de la tierra[a], y quedaron establecidos en el altar, en su lugar; porque estaban en enemistad con ellos. Todas las naciones de la tierra prevalecieron contra ellos, y ofrecieron sacrificios en el tiempo señalado y holocaustos a Yahvé[c][b], por la mañana y por la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron reunidos con ellos». El verbo griego también puede sugerir que personas de las otras naciones se adhirieron a la comunidad que había regresado.
    reason: lexical_alternative
  - marker: b
    text: El griego aquí es más amplio que el paralelo hebreo aproximado en Esdras 3:2, porque añade referencias a la enemistad de las naciones de la tierra y a la ofrenda regular de sacrificios por la mañana y por la tarde.
    reason: cross_reference
  - marker: c
    text: O «holocaustos». El término griego puede designar ofrendas totalmente consumidas por el fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισυνήχθησαν αὐτοῖς
  english_pob_choice: were gathered to them
  chosen_spanish: se reunieron a ellos
  alternatives_spanish:
  - fueron reunidos a ellos
  - se unieron a ellos
  lexicon: LSJ
  rationale: El griego pasivo puede sugerir también una acción reflexiva o de adhesión al grupo. «Se reunieron a ellos» conserva la idea de agregación sin forzar una interpretación más específica que el texto no exige.
- source_word: ἐκ τῶν ἄλλων ἐθνῶν τῆς γῆς
  english_pob_choice: from the other nations of the land
  chosen_spanish: desde las otras naciones de la tierra
  alternatives_spanish:
  - desde los otros pueblos de la tierra
  - desde las naciones vecinas de la tierra
  lexicon: LSJ
  rationale: «ἔθνη» puede ser «naciones» o «pueblos». «Las otras naciones de la tierra» sigue de cerca el griego y evita precisar geografía o identidad étnica más allá de lo dicho.
- source_word: κατωρθώθησαν
  english_pob_choice: were established
  chosen_spanish: fueron establecidos
  alternatives_spanish:
  - fueron fortalecidos
  - quedaron firmes
  - fueron puestos en orden
  lexicon: LSJ
  rationale: Es un verbo difícil en contexto. Dado el añadido locativo «junto al altar en su lugar», «fueron establecidos» comunica mejor la idea de quedar firmes o asentados en su posición sin resolver de más la dificultad léxica.
- source_word: ἐπὶ τὸ θυσιαστήριον ἐπὶ τοῦ τόπου αὐτῶν
  english_pob_choice: at the altar in its place
  chosen_spanish: junto al altar en su lugar
  alternatives_spanish:
  - en el altar en su lugar
  - sobre el altar en su lugar
  - junto al altar en su sitio
  lexicon: LSJ
  rationale: La repetición de ἐπί da un matiz locativo que en español se expresa con naturalidad como «junto al altar en su lugar». Mantiene la referencia al lugar propio del altar sin sonar forzado.
- source_word: ἐν ἔχθρᾳ ἦσαν αὐτοῖς
  english_pob_choice: they were in hostility toward them
  chosen_spanish: estaban en enemistad con ellos
  alternatives_spanish:
  - eran hostiles a ellos
  - estaban en hostilidad hacia ellos
  lexicon: LSJ
  rationale: «ἔχθρα» es enemistad/hostilidad. «Enemistad» mantiene el sustantivo y la tensión relacional, conservando la dureza del griego.
- source_word: κατίσχυσαν αὐτοὺς
  english_pob_choice: prevailed against them
  chosen_spanish: prevalecieron contra ellos
  alternatives_spanish:
  - los sobrepujaron
  - los dominaron
  - fueron más fuertes que ellos
  lexicon: LSJ
  rationale: «Prevalecieron contra ellos» reproduce bien el sentido de imponerse o ser más fuertes contra otro, sin añadir violencia específica que el verbo no menciona explícitamente.
- source_word: κατὰ τὸν καιρὸν
  english_pob_choice: at the appointed time
  chosen_spanish: en el tiempo señalado
  alternatives_spanish:
  - en el tiempo establecido
  - a su debido tiempo
  - según el tiempo establecido
  lexicon: LSJ
  rationale: La frase apunta al momento prescrito para el sacrificio. «Tiempo señalado» transmite regularidad cultual y funciona con naturalidad en español.
- source_word: ὁλοκαυτώματα
  english_pob_choice: whole burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas totalmente quemadas
  - sacrificios quemados por completo
  lexicon: LSJ
  rationale: En español bíblico «holocausto» es el término más transparente y reconocido para una ofrenda consumida totalmente por el fuego. Se mantiene la fuerza ritual del término sin explicitarla en exceso en el texto principal.
- source_word: Κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - a Yahvé
  - al Señor Yahvé
  lexicon: LSJ
  rationale: Aunque la norma del proyecto para יהוה es «Yahvé», aquí el texto griego trae Κυρίῳ. En este caso, el traductor inglés POB eligió «the Lord»; en español, «el Señor» preserva el ecosistema de la cita griega sin introducir una equivalencia directa con el Nombre divino hebreo que el versículo no contiene de forma explícita.
- source_word: τὸ πρωϊνὸν καὶ τὸ δειλινόν
  english_pob_choice: morning and evening
  chosen_spanish: por la mañana y por la tarde
  alternatives_spanish:
  - mañana y tarde
  - de mañana y de tarde
  lexicon: LSJ
  rationale: Es la pareja temporal cultual habitual. «Por la mañana y por la tarde» es natural en español y conserva la distribución diaria del sacrificio.
theological_decisions:
- issue: Relación de este versículo griego con el paralelo hebreo más breve en Esdras 3:2
  english_pob_reading: Translate the fuller Greek text as the primary witness, without harmonizing it to the shorter Hebrew parallel
  chosen_spanish_reading: Traducir el texto griego más pleno como testigo primario, sin armonizarlo con el paralelo hebreo más breve
  alternative_spanish_readings:
  - Suavizar u omitir las cláusulas sobre enemistad y prevalecer para acercarlo a Esdras 3:2
  - Reordenar el versículo según la tradición hebrea paralela
  rationale: La política del proyecto da primacía al griego para 1 Esdras. Por eso se conservan las expansiones y tensiones del versículo griego en español, en vez de reducirlo al molde del paralelo hebreo aproximado.
  doctrine_reference: 'PHILOSOPHY.md: WLC MT parallels for 1 Esdras; Translation philosophy §1 original-language primacy'
- issue: Cómo expresar la relación con las naciones sin introducir categorías interpretativas ajenas
  english_pob_reading: Use 'other nations of the land' and 'hostility' language only as stated in the Greek
  chosen_spanish_reading: Usar «las otras naciones de la tierra» y «enemistad» solo como lo dice el griego
  alternative_spanish_readings:
  - los pueblos de la tierra
  - los extranjeros
  - los enemigos
  rationale: El texto describe oposición real, pero no desarrolla etiquetas teológicas o étnicas más allá de ἔθνη y ἔχθρᾳ. La traducción conserva esa tensión sin sobreinterpretarla.
  doctrine_reference: Translation philosophy §3 preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión del audit trail: se evitó añadir un sujeto cuantificado como «algunos», se prefirió una redacción que refleje el pasivo de ἐπισυνήχθησαν, y se mantuvo la expansión griega frente al paralelo hebreo breve. También se respetó la eliminación de un matiz concesivo no explícito en el griego.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para Κυρίῳ en coherencia con la traducción inglesa auditada y con el griego, sin introducir «Yahvé» donde el texto fuente no lo explicita.
  - «Holocaustos» se usa en sentido sacrificial técnico, no en sentido moderno extrabíblico.
  - La formulación «las otras naciones de la tierra» conserva la ambigüedad histórica y no la convierte en una categoría etnográfica más precisa de lo que permite el texto.
