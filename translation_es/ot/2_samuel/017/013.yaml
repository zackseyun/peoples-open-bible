translation:
  language: es
  text: Y si él se retira a una ciudad, entonces todo Israel traerá cuerdas a esa ciudad, y la arrastraremos hasta el wadi[a], hasta que allí no se encuentre ni siquiera una piedra pequeña[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arroyo» o «quebrada» para «wadi» (heb. naḥal), un cauce estacional o barranco.
    reason: lexical_alternative
  - marker: b
    text: O «ni siquiera una piedra pequeña». El hebreo usa una imagen hiperbólica de destrucción total.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵאָסֵף
  english_pob_choice: withdraws
  chosen_spanish: se refugia
  alternatives_spanish:
  - se retira
  - se recoge
  - se resguarda
  lexicon: HALOT
  rationale: El nifal de אסף aquí expresa la idea de buscar amparo o retirarse a un lugar fortificado. «Se refugia» comunica bien el sentido militar sin depender de una calca de «es recogido».
- source_word: וְהִשִּׂיאוּ
  english_pob_choice: will bring
  chosen_spanish: traerá
  alternatives_spanish:
  - llevará
  - aportará
  - cargará
  lexicon: HALOT
  rationale: Con חֲבָלִים como objeto, el verbo apunta a llevar cuerdas al sitio. En español, «traerá» suena natural y conserva el movimiento hacia la ciudad.
- source_word: חֲבָלִים
  english_pob_choice: ropes
  chosen_spanish: cuerdas
  alternatives_spanish:
  - sogas
  - cordeles
  - lazos
  lexicon: HALOT
  rationale: La imagen concreta es de material para arrasar o derribar la ciudad. «Cuerdas» es claro y idiomático en español, y mantiene la fuerza de la escena de asedio.
- source_word: וְסָחַבְנוּ אֹתוֹ
  english_pob_choice: we will drag it
  chosen_spanish: la arrastraremos
  alternatives_spanish:
  - la jalaremos
  - la llevaremos a rastras
  - la haremos arrastrar
  lexicon: HALOT
  rationale: סחב expresa arrastrar o llevar a rastras. «La arrastraremos» preserva la violencia hiperbólica del verbo y encaja bien con la continuidad de la imagen.
- source_word: הַנַּחַל
  english_pob_choice: the wadi
  chosen_spanish: el wadi
  alternatives_spanish:
  - el torrente
  - la quebrada
  - el arroyo
  lexicon: HALOT
  rationale: '«Wadi» conserva con precisión el rasgo geográfico del hebreo naḥal: cauce estacional o barranco. Se mantiene como término técnico, como en la base inglesa, para no perder la referencia topográfica.'
- source_word: גַּם צְרוֹר
  english_pob_choice: not even a small stone
  chosen_spanish: ni siquiera una piedra pequeña
  alternatives_spanish:
  - ni siquiera una piedrita
  - ni siquiera un guijarro
  - ni una sola piedra pequeña
  lexicon: HALOT
  rationale: צְרוֹר designa una piedra pequeña; la expresión es hiperbólica y totalizante. «Piedra pequeña» conserva el valor formal más que «piedrita», sin perder la idea de mínimum.
theological_decisions:
- issue: Alcance hiperbólico de destrucción total
  english_pob_reading: The Hebrew says 'not even a pebble/stone' as a hyperbolic image of total destruction.
  chosen_spanish_reading: «ni siquiera una piedra pequeña» como imagen hiperbólica de destrucción total.
  alternative_spanish_readings:
  - «ni siquiera un guijarro»
  - «ni una sola piedrita»
  rationale: El versículo usa hipérbole militar para describir arrasamiento completo. La formulación elegida mantiene el peso del original sin suavizar ni exagerar más allá del hebreo.
  doctrine_reference: Literalidad figurada y retórica bíblica; cf. lenguaje hiperbólico de juicio y guerra en el AT.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del inglés POB: se mantiene «to the wadi» como referencia direccional precisa y se refleja «small stone» con una expresión formal en español. También se conserva la lectura de guerra/asedio del nifal de אסף y del causativo de נשׂא con cuerdas como objeto.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el Tetragrámaton en general, aunque este versículo no lo contiene.
  - Se evita «SEÑOR» como máscara; el verso no requiere una decisión sobre el nombre divino.
  - «wadi» se mantiene como tecnicismo geográfico para preservar la imagen original y la continuidad con la auditoría inglesa.
  - El pronombre de objeto se resuelve en femenino («la arrastraremos») porque el referente inmediato es «ciudad».
