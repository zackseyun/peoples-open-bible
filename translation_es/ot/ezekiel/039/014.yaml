revisions:
- from: Y apartarán hombres de continuo[a], que pasarán por la tierra enterrando a los que pasan[b], a los que quedaron sobre la superficie de la tierra, para limpiarla. Al cabo de siete meses harán una búsqueda[c].
  to: Y apartarán hombres de continuo[a], que pasarán por la tierra enterrando a los que pasan por ella[b], es decir, a los que quedaron sobre la superficie de la tierra, para limpiarla. Al cabo de siete meses harán una búsqueda[c].
  rationale: Se revisa la repetición de עבר para que el español conserve la dificultad del hebreo sin sugerir de forma primaria que están enterrando a transeúntes vivos. La aclaración «es decir» hace explícita la aposición ya presente en el original. Se mantienen la nota sobre la dificultad textual y el resto de las decisiones léxicas principales.
  reviewer_model: gpt-5.4
