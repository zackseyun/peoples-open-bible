translation:
  language: es
  text: Así, el rey de Israel y Josafat, rey de Judá, subieron a Ramot de Galaad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron
  - ascendieron
  - subieron
  lexicon: HALOT
  rationale: El hebreo עלה conserva el sentido básico de ‘subir/ascender’. En español, ‘subieron’ reproduce bien el movimiento hacia un lugar elevado o hacia una meta geográfica, sin añadir matiz militar que no está en el verbo mismo.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el rey de Isra'el
  - Israel, su rey
  lexicon: HALOT
  rationale: La construcción nominal hebrea se refleja de forma natural y transparente como ‘el rey de Israel’. Mantiene el título real definido que el contexto ya identifica.
- source_word: וִיהוֹשָׁפָט
  english_pob_choice: and Jehoshaphat
  chosen_spanish: y Josafat
  alternatives_spanish:
  - y Jehosafat
  - y Jehosafat
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma española habitual ‘Josafat’, más natural y reconocible para lectores bíblicos en español, sin perder la identidad del personaje.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: El sintagma apposicional se vierte de manera fluida como ‘rey de Judá’, conservando la relación de título y territorio sin sobrecargar la frase con repeticiones innecesarias.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: HALOT
  rationale: En español, ‘a’ expresa de modo natural la dirección hacia un destino. En este contexto de desplazamiento, evita la rigidez de ‘hacia’ y mantiene el valor direccional del hebreo.
- source_word: רָמֹת גִּלְעָד
  english_pob_choice: Ramoth-gilead
  chosen_spanish: Ramot de Galaad
  alternatives_spanish:
  - Ramot-galaad
  - Ramot de Gilead
  lexicon: HALOT
  rationale: Se conserva el topónimo compuesto con una forma española clara y reverente. ‘De Galaad’ refleja bien la relación del nombre compuesto y evita una transliteración excesivamente técnica o poco natural.
translation_notes:
  revision_awareness: 'El verso presenta alta concordancia con el texto hebreo base y con la auditoría inglesa: se mantiene el orden narrativo, la acción de ascenso y la composición del topónimo sin introducir ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ porque el versículo no contiene el tetragrámaton ni una cita divina.
  - Se eligió ‘Josafat’ como forma española reconocible y estable en el uso bíblico, manteniendo el nombre propio sin traducir.
  - ‘Ramot de Galaad’ preserva el valor de topónimo compuesto y sigue de cerca el hebreo sin calcado forzado.
