  to: Y entregaron la plata pesada en manos[a] de los obreros que estaban puestos a cargo de la casa de Yahvé[b], y la pagaron a los carpinteros y a los constructores que trabajaban en la casa de Yahvé.
  rationale: 'La revisión corrige la distribución semántica del hebreo: «obreros» traduce עֹשֵׂי הַמְּלָאכָה, mientras «puestos a cargo de» recoge הַפְּקֻדִים. También amplía «albañiles» a «constructores» para no estrechar indebidamente בֹּנִים. Se mantiene «plata pesada» y «Yahvé», y se mejora la naturalidad de עַל יַד con «en manos», preservando el literal en nota.'
