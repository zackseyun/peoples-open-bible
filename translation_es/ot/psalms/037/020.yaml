review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del hebreo y del POB inglés: valor causal de כִּי, «los impíos», futuro «perecerán», uso correcto de «Yahvé» para יהוה, preservación de la dificultad de כִּיקַר כָּרִים con nota alternativa, y repetición del verbo de desaparición. Sin embargo, «son como la gloria de los pastos» introduce un verbo copulativo no expresado y debilita la secuencia verbal hebrea/inglesa, donde los enemigos de Yahvé no quedan definidos estáticamente sino que se encaminan a desaparecer. Conviene ajustar la sintaxis para reflejar mejor la progresión: comparación seguida de consumición/desaparición.'
  spanish_quality_summary: El español es claro y digno, pero la frase central suena algo rígida y menos idiomática por «son como la gloria de los pastos; se desvanecen». Una formulación con «serán como…» o mejor con pausa comparativa ligada al resultado mejora fluidez y concordancia con el paralelismo poético. También es preferible un punto y coma o raya más natural que dos puntos en este contexto. El resto del verso es legible y adecuado.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → «Yahvé» correctamente; no hay conflictos con términos doctrinales principales. «Impíos» es aceptable para רְשָׁעִים en salmo sapiencial. La nota con «la grasa de los corderos» preserva la alternativa tradicional documentada. No se detectan choques de glosario mayores.'
  issues:
  - severity: medium
    issue: La cláusula «y los enemigos de Yahvé son como la gloria de los pastos» añade un presente copulativo estático.
    rationale: El hebreo no necesita expresarlo así, y el POB inglés enlaza la comparación con el proceso de desvanecerse. En español, «son como» puede sonar definicional y afloja la fuerza de juicio inminente.
  - severity: low
    issue: La puntuación con dos puntos antes de «como humo» suena algo mecánica.
    rationale: Un punto y coma o raya fluye mejor en poesía bíblica española y preserva el paralelismo sin parecer explicación escolar.
  revised_spanish_text: Porque los impíos perecerán[a], y los enemigos de Yahvé, como la gloria de los pastos, se desvanecen; como humo se desvanecen.
