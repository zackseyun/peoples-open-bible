review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español refleja fielmente el hebreo y el rastro de auditoría en inglés: אָדָם como individuo proverbial representativo («Un hombre»), תּוֹעֶה con la imagen de desviarse del camino, מִדֶּרֶךְ הַשְׂכֵּל como «del camino del entendimiento», בִּקְהַל como «en la asamblea», רְפָאִים correctamente entendido como los muertos y no como grupo étnico, y יָנוּחַ expresado de manera natural como resultado final («descansará»).'
  spanish_quality_summary: El español es claro, natural, digno y ampliamente legible en registro bíblico moderno. La sintaxis fluye bien y evita calcos torpes. «Asamblea de los muertos» suena idiomático y conserva la fuerza corporativa del hebreo. La nota al pie está bien anclada y explica adecuadamente la alternativa léxica.
  glossary_alignment: 'No hay términos del glosario de proyecto en juego que entren en conflicto. Las decisiones léxicas principales se alinean con la filosofía POB: «camino» preserva el término sapiencial, «entendimiento» mantiene el registro de sabiduría, y רְפָאִים se vierte como «los muertos» con la alternativa «las sombras» en nota.'
  issues:
  - severity: low
    issue: «Descansará» podría leerse con matiz demasiado positivo en español.
    rationale: El inglés prefirió «will come to rest» para evitar una impresión de reposo apacible; sin embargo, en contexto proverbial y junto con «en la asamblea de los muertos», «descansará» sigue comunicando adecuadamente el destino final y no exige corrección.
