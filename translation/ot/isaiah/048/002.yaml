theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the people's relation to the holy city
  chosen_reading: they are called by the holy city
  alternative_readings:
  - they are called from the holy city
  rationale: The Hebrew can be read as source ('from') or designation/identity ('by'). The immediate context emphasizes claimed covenant identity, so the naming/designation nuance is preferred in the main text while the source-oriented alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological tension/ambiguity in footnotes)
