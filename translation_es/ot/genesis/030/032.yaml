translation:
  language: es
  text: Deja que pase por todo tu rebaño hoy[a], apartando de allí toda oveja moteada y manchada, toda oveja de color oscuro[a] entre las ovejas, y todo el que esté manchado y moteado entre las cabras[b]; y ese será mi salario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse 'marrón' por 'de color oscuro' (חוּם). El hebreo se refiere a una coloración oscura o marrón entre las ovejas.
    reason: lexical_alternative
  - marker: b
    text: Los términos traducidos aquí como 'moteada' (נָקֹד) y 'manchada' (טָלוּא) son colores o patrones afines; la distinción exacta puede superponerse, de modo que también podría leerse 'manchada y moteada' o una formulación semejante.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶעֱבֹר
  english_pob_choice: Let me pass through
  chosen_spanish: Deja que pase
  alternatives_spanish:
  - Permíteme pasar
  - Déjame pasar
  lexicon: HALOT
  rationale: 'En este contexto de negociación, la forma volitiva o permisiva del verbo se expresa mejor en español como petición: ''Deja que pase''. Conserva la idea de atravesar el rebaño sin volverlo una afirmación meramente futura.'
- source_word: בְּכָל צֹאנְךָ
  english_pob_choice: through all your flock
  chosen_spanish: por todo tu rebaño
  alternatives_spanish:
  - por todo tu ganado menor
  - entre todo tu rebaño
  lexicon: HALOT
  rationale: צֹאן designa un colectivo de ganado menor, especialmente ovejas y cabras. 'Rebaño' es natural en español y mantiene el sentido colectivo sin forzar la enumeración desde el inicio.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Adverbio temporal simple; 'hoy' es la equivalencia moderna y clara.
- source_word: הָסֵר מִשָּׁם
  english_pob_choice: removing from there
  chosen_spanish: apartando de allí
  alternatives_spanish:
  - sacando de allí
  - separando de allí
  lexicon: HALOT
  rationale: El verbo expresa la acción concreta de retirar/separar animales del rebaño. 'Apartando de allí' comunica bien la separación física implícita en el mandato.
- source_word: כָּל שֶׂה
  english_pob_choice: every ... sheep / every ... one
  chosen_spanish: toda oveja
  alternatives_spanish:
  - todo animal del rebaño
  - cada res
  lexicon: HALOT
  rationale: שֶׂה puede referirse a una res del ganado menor en general, pero aquí el español lector entiende mejor 'oveja' en la primera mención, dado que el versículo luego distingue ovejas y cabras. Se mantiene la fluidez sin perder el campo semántico pastoril.
- source_word: נָקֹד
  english_pob_choice: speckled
  chosen_spanish: moteada
  alternatives_spanish:
  - salpicada
  - pecosa
  lexicon: HALOT
  rationale: El término describe un patrón con pequeñas manchas o puntos. 'Moteada' es una opción española natural que conserva la idea de marcas pequeñas y dispersas.
- source_word: טָלוּא
  english_pob_choice: spotted
  chosen_spanish: manchada
  alternatives_spanish:
  - patcheada
  - moteada
  lexicon: HALOT
  rationale: El adjetivo refiere a una coloración con manchas o parches. 'Manchada' distingue suficientemente esta cualidad en español y evita una repetición rígida con 'moteada'.
- source_word: חוּם
  english_pob_choice: dark-colored
  chosen_spanish: de color oscuro
  alternatives_spanish:
  - moreno
  - marrón
  lexicon: HALOT
  rationale: El hebreo indica una coloración oscura o marrón; 'de color oscuro' es más amplio y seguro que fijar un tono específico, preservando la incertidumbre lexicográfica documentada en el POB inglés.
- source_word: בַּכְּשָׂבִים
  english_pob_choice: among the sheep
  chosen_spanish: entre las ovejas
  alternatives_spanish:
  - entre los corderos
  - entre el ganado ovino
  lexicon: HALOT
  rationale: Aunque el plural puede a veces traducirse 'corderos', aquí el contraste con cabras favorece el colectivo 'ovejas'. 'Entre' reproduce bien la preposición distributiva del hebreo.
- source_word: בָּעִזִּים
  english_pob_choice: among the goats
  chosen_spanish: entre las cabras
  alternatives_spanish:
  - entre las cabras hembras
  - entre las cabrillas
  lexicon: HALOT
  rationale: עִזִּים designa cabras; 'cabras' es el colectivo normal en español y mantiene la simetría con 'ovejas'.
- source_word: שְׂכָרִי
  english_pob_choice: my wages
  chosen_spanish: mi salario
  alternatives_spanish:
  - mi paga
  - mi jornal
  lexicon: HALOT
  rationale: שָׂכָר significa salario, paga o recompensa. 'Salario' es claro y natural en un acuerdo laboral, y conserva el valor de contraprestación.
translation_notes:
  revision_awareness: 'Se revisó el tramo de coloración animal para mantener la tensión léxica documentada por el audit trail inglés: חוּם quedó como una designación amplia de color oscuro, y נָקֹד/טָלוּא se diferenciaron en español con equivalentes naturales sin absolutizar una distinción que el propio expediente reconoce como parcialmente superpuesta.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo donde aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó 'SEÑOR' por tratarse de una escena de diálogo humano sin sustitución teológica.
  - '''Rebaño'' traduce el colectivo צֹאן de forma natural en español, acorde con el uso POB de ganado menor sin sobrecargar la frase inicial.'
  - '''Salario'' fue preferido sobre ''recompensa'' o ''paga'' por la claridad contractual del contexto con Labán.'
