translation:
  language: es
  text: Y el ejército de Faraón salió de Egipto, y cuando los caldeos[a] que estaban sitiando Jerusalén oyeron la noticia acerca de ellos[b], se retiraron de Jerusalén[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los babilonios» por «los caldeos».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «oyeron su noticia»; es decir, oyeron la noticia acerca del ejército de Faraón.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «subieron de sobre Jerusalén», un modismo que aquí significa que se retiraron del asedio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/חֵ֥יל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - tropas
  lexicon: HALOT
  rationale: En el contexto de Faraón y del movimiento militar, חֵיל designa una fuerza armada. En español, «ejército» comunica de forma natural y precisa esa referencia militar.
- source_word: פַּרְעֹ֖ה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: HALOT
  rationale: Es el título/nombre estándar en español bíblico. Se conserva como nombre propio histórico sin añadir explicación.
- source_word: יָצָ֣א מִ/מִּצְרָ֑יִם
  english_pob_choice: had come out from Egypt
  chosen_spanish: salió de Egipto
  alternatives_spanish:
  - había salido de Egipto
  - marchó de Egipto
  lexicon: HALOT
  rationale: El hebreo presenta una acción ya cumplida que antecede a la secuencia narrativa. En español, el pretérito simple funciona de manera natural en este marco narrativo y no obliga a una perífrasis más pesada.
- source_word: הַ/כַּשְׂדִּ֜ים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo más cercano al hebreo, como en la POB inglesa. «Babilonios» sería una equivalencia interpretativa no necesaria en el texto principal.
- source_word: הַ/צָּרִ֤ים עַל יְרוּשָׁלִַ֨ם
  english_pob_choice: who were besieging Jerusalem
  chosen_spanish: que estaban sitiando Jerusalén
  alternatives_spanish:
  - que sitiaban Jerusalén
  - que estaban cercando Jerusalén
  lexicon: HALOT
  rationale: El participio con עַל describe una acción continua de asedio. «Estaban sitiando» preserva bien el aspecto progresivo y el sentido militar.
- source_word: אֶת שִׁמְעָ֔/ם
  english_pob_choice: the report about them
  chosen_spanish: la noticia acerca de ellos
  alternatives_spanish:
  - el reporte sobre ellos
  - el informe acerca de ellos
  - la noticia de ellos
  lexicon: HALOT
  rationale: שֵׁמַע significa «report, news, tidings». Con el sufijo pronominal, el sentido es la noticia referente al ejército de Faraón. «Noticia acerca de ellos» conserva el valor relacional sin sonar forzado.
- source_word: וַ/יֵּ֣עָל֔וּ מֵ/עַ֖ל יְרוּשָׁלִָֽם
  english_pob_choice: they withdrew from Jerusalem
  chosen_spanish: se retiraron de Jerusalén
  alternatives_spanish:
  - subieron de sobre Jerusalén
  - levantaron el sitio de Jerusalén
  - se apartaron de Jerusalén
  lexicon: HALOT
  rationale: Literalmente, el hebreo dice «subieron de sobre Jerusalén», un modismo de levantarse del asedio. La traducción principal comunica el resultado militar en español natural sin borrar el trasfondo idiomático.
- source_word: וְ
  english_pob_choice: Now
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: HALOT
  rationale: La conjunción simplemente enlaza el episodio con lo anterior. En español, «Y» mantiene la conexión narrativa de manera sobria y fiel.
theological_decisions:
- issue: Modo de referirse al pueblo/imperio de Babilonia
  english_pob_reading: the Chaldeans
  chosen_spanish_reading: los caldeos
  alternative_spanish_readings:
  - los babilonios
  rationale: La fuente hebrea usa el etnónimo caldeo; la POB inglesa lo conserva en el texto principal. En español se mantiene esa relación fuente-cercana, dejando la equivalencia histórica «babilonios» como alternativa implícita, no como sustitución del texto.
  doctrine_reference: Neutral historical rendering; no doctrinal issue.
translation_notes:
  revision_awareness: El texto coincide sustancialmente con la lectura final aprobada en el audit trail inglés. No se requieren revisiones textuales adicionales; se ha conservado la relación entre el hebreo idiomático y la equivalencia española natural.
  spanish_consistency_notes:
  - Se mantiene «Faraón» como título propio y «caldeos» como etnónimo fuente-cercano.
  - Se evita «SEÑOR» o equivalentes no pertinentes porque no aparece el nombre divino en este versículo.
  - «Sitiando» conserva el valor aspectual del participio hebreo.
  - Las notas al pie distinguen entre traducción principal y sentido literal idiomático, siguiendo el patrón POB.
