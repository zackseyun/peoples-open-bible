  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: nombres propios correctos, «concubinas» preservado con consistencia, y sin conflictos con términos teológicos clave del glosario. No hay asuntos de Yahvé/Mesías/etc. en este versículo.'
