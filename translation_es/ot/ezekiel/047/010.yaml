review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la escena y la estructura del hebreo: pescadores junto al agua, extensión geográfica de En-gadi a En-eglaim, lugar para tender redes, gran variedad y abundancia de peces. Sin embargo, hay dos puntos mejorables frente a la evidencia fuente y al rastro inglés: (1) «se pondrán» es menos fiel que «estarán/de pie» o «se pararán», porque עמד enfatiza estar apostados/erguidos más que el acto de comenzar a colocarse; (2) «de muchos géneros» suena taxonómico y poco natural en español bíblico moderno, mientras que el sentido documentado es variedad de clases/especies, con la literalidad preservada en nota.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «de muchos géneros» resulta menos idiomático y puede distraer. También conviene armonizar el topónimo con la forma del inglés auditado y de uso más extendido, «En-gadi» o «En-guedi»; dado el material provisto, mantener «En-gadi» es aceptable. La oración fluye mejor con «estarán junto a ella» que con «se pondrán junto a ella».
  glossary_alignment: No hay términos teológicos de proyecto en juego salvo topónimos y la designación «Mar Grande», que está bien conservada con nota cultural. La nota [a] preserva correctamente la alternativa literal de לְמִינָה. Se recomienda cambiar «géneros» por «clases» en el texto principal para reflejar mejor la decisión léxica auditada («of many kinds»).
  issues:
  - severity: medium
    issue: Verbo «se pondrán» para יעמדו
    rationale: עמד denota principalmente 'estar de pie/estar apostados'. «Se pondrán» desplaza el foco al inicio de la acción y suena menos preciso que «estarán» en este contexto descriptivo-profético.
  - severity: medium
    issue: «de muchos géneros» para לְמִינָה
    rationale: Aunque intenta comunicar diversidad, «géneros» suena técnico y menos natural en español eclesial general. «De muchas clases» transmite mejor la variedad de especies documentada por la nota literal.
  revised_spanish_text: Y acontecerá que los pescadores estarán junto a ella; desde En-gadi hasta En-eglaim habrá un lugar para tender las redes. Sus peces serán de muchas clases[a], como los peces del Mar Grande[b], muy numerosos.
  revised_footnotes:
