translation:
  language: es
  text: 'Por tanto, diles[a]: «Así dice el Señor Yahvé: Haré cesar este proverbio, y no lo volverán a usar como proverbio en Israel. Pero diles: “Se han acercado los días, y la palabra de toda visión”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «diles» reproduce el mandato directo del hebreo y mantiene el paralelismo del doble encargo profético.
    reason: source_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conector inferencial natural en español para introducir la consecuencia del contexto anterior, sin perder el valor causal-consecutivo del hebreo.
- source_word: אֱמֹר אֲלֵיהֶם / דַּבֵּר אֲלֵיהֶם
  english_pob_choice: say to them
  chosen_spanish: diles
  alternatives_spanish:
  - di a ellos
  - háblales
  lexicon: HALOT
  rationale: El mandato profético exige una forma directa y breve; «diles» preserva la fuerza del imperativo y evita redundancia innecesaria.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: Thus says the Lord GOD
  chosen_spanish: Así dice el Señor Yahvé
  alternatives_spanish:
  - Así dice el Señor Dios
  - Así ha dicho el Señor Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética y el nombre divino YHWH como «Yahvé», conforme al criterio del proyecto. «Señor Yahvé» evita la sustitución por «SEÑOR» y conserva el valor del nombre propio.
- source_word: הִשְׁבַּתִּי
  english_pob_choice: I will put an end to
  chosen_spanish: Haré cesar
  alternatives_spanish:
  - Pondré fin a
  - Haré que cese
  lexicon: HALOT
  rationale: El hiphil de שבת expresa causar el cese. «Haré cesar» conserva la fuerza verbal y resulta idiomático en español bíblico contemporáneo.
- source_word: הַמָּשָׁל הַזֶּה
  english_pob_choice: this proverb
  chosen_spanish: este proverbio
  alternatives_spanish:
  - esta sentencia
  - este refrán
  lexicon: HALOT
  rationale: מָשָׁל aquí remite al dicho popular del contexto, no a una parábola narrativa; «proverbio» comunica mejor ese valor.
- source_word: וְלֹא יִמְשְׁלוּ אֹתוֹ עוֹד בְּיִשְׂרָאֵל
  english_pob_choice: and they will no longer use it as a proverb in Israel
  chosen_spanish: y no lo volverán a usar como proverbio en Israel
  alternatives_spanish:
  - y ya no lo citarán como proverbio en Israel
  - y no lo emplearán más proverbially en Israel
  lexicon: HALOT
  rationale: El verbo משל en qal aquí significa emplear/decir proverbialmente. La expansión «usar como proverbio» evita el sentido incorrecto de gobernar y preserva el objeto referencial.
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino
  - Más bien
  lexicon: HALOT
  rationale: Marca contraste con la frase anterior y en español resulta más natural que una traducción más literal de la expresión exceptiva.
- source_word: קָרְבוּ הַיָּמִים
  english_pob_choice: The days have drawn near
  chosen_spanish: Se han acercado los días
  alternatives_spanish:
  - Los días se han acercado
  - Los días están cerca
  lexicon: HALOT
  rationale: El perfecto comunica cercanía ya efectuada o inminente; «se han acercado» refleja bien esa proximidad enunciada proféticamente.
- source_word: וּדְבַר כָּל חָזוֹן
  english_pob_choice: and the word of every vision
  chosen_spanish: y la palabra de toda visión
  alternatives_spanish:
  - y el dicho de toda visión
  - y la palabra de cada visión
  lexicon: HALOT
  rationale: Se mantiene la literalidad de דָּבָר como «palabra» sin ampliar a «cumplimiento», para respetar el ajuste revisado del POB y dejar la tensión interpretativa visible en el propio español.
theological_decisions:
- issue: Renderización del Tetragrámaton en la fórmula profética
  english_pob_reading: the Lord GOD / Yahweh in the divine name context
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahvéh
  rationale: El proyecto pide traducir YHWH como «Yahvé». En la fórmula אֲדֹנָי יְהוִה, «Señor Yahvé» conserva tanto el título אדני como el nombre propio divino sin ocultarlo mediante una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de וּדְבַר כָּל חָזוֹן
  english_pob_reading: the word of every vision
  chosen_spanish_reading: la palabra de toda visión
  alternative_spanish_readings:
  - el cumplimiento de toda visión
  - el mensaje de toda visión
  rationale: Se evita convertir el sustantivo en una interpretación explicativa. «La palabra de toda visión» deja abierta la relación entre palabra, contenido y realización, tal como exige la cautela revisional del POB.
  doctrine_reference: Revision awareness / lexical caution on דָּבָר
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB, que corrigió la cláusula final de una interpretación expansiva («fulfillment») a una forma más cercana al hebreo («word of every vision»). El español sigue esa decisión y evita añadir el sentido de «cumplimiento» en el texto principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» para YHWH conforme al criterio del proyecto, evitando la convención «SEÑOR».
  - Se prefirió «proverbio» para מָשָׁל porque el contexto trata de un dicho popular citado en el capítulo.
  - Se mantuvo el paralelismo profético con dos imperativos de habla («diles ... Pero diles»).
  - «La palabra de toda visión» conserva la ambigüedad controlada del hebreo y la revisión auditada del inglés POB.
