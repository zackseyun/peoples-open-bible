translation:
  language: es
  text: Pero mi pueblo—es decir, Israel—son los que clamaron a Dios[a] y fueron salvados. Y el Señor salvó a su pueblo, y el Señor nos rescató de todos estos males, y Dios hizo las señales y las grandes maravillas que no han sucedido entre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que buscaron ayuda de Dios». La expresión griega es algo abrupta, pero el sentido es que Israel apeló a Dios y fue librado por él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνος
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - nación
  lexicon: BDAG
  rationale: ἔθνος aquí no apunta a una nación-Estado moderna, sino al colectivo del hablante identificado enseguida como Israel. 'Pueblo' conserva mejor el sentido relacional y comunitario en español.
- source_word: οὗτός ἐστιν Ἰσραήλ
  english_pob_choice: that is, Israel
  chosen_spanish: es decir, Israel
  alternatives_spanish:
  - esto es, Israel
  - o sea, Israel
  lexicon: BDAG
  rationale: La cláusula funciona como aposición explicativa. 'Es decir, Israel' refleja bien la identificación sin volverla demasiado literal o extraña en español.
- source_word: οἱ βοηθήσαντες πρὸς τὸν θεόν
  english_pob_choice: those who cried out to God
  chosen_spanish: aquél que clamó a Dios
  alternatives_spanish:
  - los que buscaron ayuda de Dios
  - los que acudieron a Dios en busca de ayuda
  - los que ayudaron hacia Dios
  lexicon: BDAG
  rationale: El griego es abrupto/forzado si se vierte mecánicamente. En contexto, la idea es que Israel acudió a Dios pidiendo auxilio y él los libró; 'clamó a Dios' conserva la orientación suplicante sin sugerir que Israel ayudó a Dios.
- source_word: σωθέντες
  english_pob_choice: were saved
  chosen_spanish: fue salvado
  alternatives_spanish:
  - fue rescatado
  - fue librado
  lexicon: BDAG
  rationale: Se mantiene el campo semántico de salvación/liberación con un pasivo natural en español. Aunque el sujeto colectivo es 'mi pueblo', el verbo singular sigue la forma elíptica del griego y la construcción apposicional del pasaje.
- source_word: ἔσωσεν
  english_pob_choice: saved
  chosen_spanish: salvó
  alternatives_spanish:
  - libró
  - rescató
  lexicon: BDAG
  rationale: '''Salvó'' conserva la raíz compartida con σωθέντες y mantiene la continuidad léxica que el griego marca entre ambos verbos.'
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - libró
  - delivró
  lexicon: BDAG
  rationale: '''Rescató'' diferencia este verbo de ἔσωσεν sin perder el valor de liberación desde peligro; en español suena natural y mantiene la distinción observada en la traducción inglesa.'
- source_word: τῶν κακῶν τούτων
  english_pob_choice: all these evils
  chosen_spanish: todos estos males
  alternatives_spanish:
  - todos estos males y calamidades
  - todos estos males y desgracias
  - todos estos males y peligros
  lexicon: BDAG
  rationale: '''Males'' conserva la amplitud de κακά sin cargar innecesariamente una connotación moral abstracta. En esta lista de amenazas y aflicciones, el plural funciona bien en español.'
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - portentos
  lexicon: BDAG
  rationale: '''Señales'' es el equivalente bíblico más natural en español y preserva el carácter de actos evidenciales/divinos.'
- source_word: τέρατα τὰ μεγάλα
  english_pob_choice: the great wonders
  chosen_spanish: las grandes maravillas
  alternatives_spanish:
  - los grandes prodigios
  - las grandes señales portentosas
  lexicon: BDAG
  rationale: '''Maravillas'' transmite bien τέρατα en contexto bíblico y conserva el paralelismo con ''señales''. La intensificación de μεγάλα queda clara con ''grandes''.'
- source_word: ἃ οὐ γέγονεν ἐν τοῖς ἔθνεσιν
  english_pob_choice: that have not happened among the nations
  chosen_spanish: que no han sucedido entre las naciones
  alternatives_spanish:
  - que no han ocurrido entre las naciones
  - que no han tenido lugar entre las naciones
  lexicon: BDAG
  rationale: '''Han sucedido'' refleja la relevancia del perfecto griego y suena fluido en español. ''Entre las naciones'' mantiene el contraste con Israel sin suavizar el referente colectivo.'
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: BDAG
  rationale: En este pasaje griego deuterocanónico la forma es κύριος, no el tetragrámaton hebreo. Siguiendo el criterio auditado del POB inglés, 'el Señor' traduce el título divino sin forzar la convención de 'Yahvé' cuando el texto fuente inmediato es griego.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Dios verdadero
  lexicon: BDAG
  rationale: Se traduce de forma directa y estándar. La alternancia con 'el Señor' se preserva para reflejar la variación del texto griego.
theological_decisions:
- issue: Interpretación de οἱ βοηθήσαντες πρὸς τὸν θεόν
  english_pob_reading: The phrase refers to Israel appealing to God for help, not helping God.
  chosen_spanish_reading: La frase indica que Israel clamó a Dios pidiéndole ayuda, no que ayudara a Dios.
  alternative_spanish_readings:
  - Israel buscó ayuda de Dios
  - Israel acudió a Dios por ayuda
  - Israel ayudó hacia Dios
  rationale: Un calco literal sería teológicamente confuso y lingüísticamente torpe. El contexto inmediato de salvación y rescate exige entender la expresión como una súplica o apelación a Dios.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Diferenciación de ἔσωσεν y ἐρρύσατο
  english_pob_reading: Different English verbs ('saved' / 'rescued') reflect the Greek distinction while preserving their semantic relationship.
  chosen_spanish_reading: 'Se conservan dos verbos distintos: ''salvó'' y ''rescató''.'
  alternative_spanish_readings:
  - salvó ... libró
  - libró ... rescató
  rationale: En español conviene mantener la relación semántica sin aplanar el contraste entre los dos verbos griegos. 'Salvó' / 'rescató' reproduce bien la continuidad y la variación.
  doctrine_reference: Translation philosophy §5
- issue: Uso de κύριος en un contexto griego deuterocanónico
  english_pob_reading: '''Lord'' is preferred over ''the LORD'' because the source has κύριος, not the Hebrew divine name.'
  chosen_spanish_reading: Se usa 'el Señor' y no 'Yahvé' en esta cláusula.
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto fuente inmediato es griego y presenta el título κύριος. Para esta sección, 'el Señor' respeta el registro bíblico y evita introducir el nombre divino hebreo donde no está en el griego auditado.
  doctrine_reference: Project terminology defaults; translation philosophy §§2, 4
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del POB inglés, incorporando la aposición más natural ('es decir, Israel') y manteniendo la distinción entre 'salvó' y 'rescató'. También se ha respetado la nota sobre la rareza de la frase griega, trasladándola a una nota española equivalente.
  spanish_consistency_notes:
  - Se mantiene 'el Señor' para κύριος en coherencia con el griego inmediato y con el criterio auditado del POB inglés.
  - Se usa 'Dios' para θεός sin añadir artículos o perífrasis innecesarias.
  - '''Pueblo'' se prefiere a ''nación'' para ἔθνος en este contexto identitario-covenantal.'
  - La nota a pie preserva la alternativa interpretativa principal sin añadir especulación.
  - El estilo es bíblico moderno y digno, evitando arcaísmos innecesarios.
