base_translation:
  language: en
  yaml_path: translation/ot/ezra/002/001.yaml
  text: Now these are the sons of the province who came up from the captivity of the exiles[a], whom Nebuchadnezzar king of Babylon had carried away to Babylon, and they returned to Jerusalem and Judah[c][b], each to his own city.
  footnotes:
  - marker: a
    text: Hebrew 'sons of the province' is an idiom for the members or people of the province; the translation keeps the literal form to reflect the source wording.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the exile' or 'from the captivity.' The Hebrew expression is fuller, literally 'from the captivity of the exiles.'
    reason: lexical_alternative
  - marker: c
    text: Nebuchadnezzar is also spelled 'Nebuchadrezzar' in some English transliterations.
    reason: lexical_alternative
