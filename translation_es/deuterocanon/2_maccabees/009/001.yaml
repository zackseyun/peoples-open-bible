- from: Ahora, por aquel tiempo, Antíoco resultó estar volviendo en deshonra desde las regiones alrededor de Persia[a].
  to: Por ese tiempo, Antíoco volvía vergonzosamente[a] desde las regiones alrededor de Persia.
  rationale: 'Se revisa para mejorar la naturalidad y fidelidad del español: «Por ese tiempo» expresa bien el marco temporal aproximado con transición narrativa; se evita «resultó estar», que aquí suena artificial; y se reemplaza «en deshonra» por «vergonzosamente», que sí funciona como adverbio de modo y refleja la revisión inglesa hacia una vuelta ignominiosa, mientras la nota conserva las alternativas semánticas del griego ἀκόσμως.'
  reviewer_model: gpt-5.4
