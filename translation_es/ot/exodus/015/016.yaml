review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: caída de terror/pavor, paralización ante el brazo divino, doble ''hasta que pase'', uso de ''Yahvé'', y ''adquiriste'' para קָנִיתָ. Sin embargo, una nota al pie no preserva fielmente las alternativas documentadas para יִדְּמוּ.'
  spanish_quality_summary: El español es claro, natural y digno. 'Terror y pavor', 'por la grandeza de tu brazo' y 'como una piedra' funcionan bien. El texto principal no requiere cambio sustantivo. La reparación necesaria es en la nota [a], que actualmente duplica la idea de silencio y omite la alternativa de inmovilidad/quietud más cercana al inglés auditado.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה -> ''Yahvé''; עם -> ''pueblo''; קנה -> ''adquiriste'' sin sobretraducir a ''redimiste''. No hay conflicto relevante de glosario en el texto principal.'
  issues:
  - severity: medium
    issue: La nota [a] no reproduce fielmente las alternativas léxicas para יִדְּמוּ.
    rationale: El inglés POB conserva 'they will be silent' y 'they will be motionless' como alternativas a 'they will be still'. La nota española dice 'quedarán callados' o 'quedarán en silencio', que son prácticamente sinónimos entre sí y dejan fuera la alternativa de inmovilidad/quietud corporal, importante por el contexto 'como una piedra'.
  revised_spanish_text: Terror y pavor caerán sobre ellos[a]; por la grandeza de tu brazo quedarán inmóviles como una piedra, hasta que pase tu pueblo, oh Yahvé[b][c], hasta que pase este pueblo que tú adquiriste.
  revised_footnotes:
  - marker: a
    text: O 'quedarán callados' o 'quedarán quietos' para 'quedarán inmóviles'.
    reason: lexical_alternative
  - marker: b
    text: O 'hasta que crucen ... hasta que este pueblo que tú adquiriste cruce'.
    reason: lexical_alternative
  - marker: c
    text: '''Adquiriste'' también puede verterse ''compraste'' o, en un sentido pactal más amplio, ''hiciste tuyo''.'
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al hebreo y al rastro de auditoría inglés. Solo se corrige la nota [a] para reflejar mejor las alternativas semánticas de יִדְּמוּ, preservando tanto la posibilidad de silencio como la de quietud/inmovilidad.
