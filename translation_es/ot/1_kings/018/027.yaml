translation:
  language: es
  text: 'Y aconteció al mediodía que Elías se burló de ellos y dijo: «Griten a gran voz, porque es un dios. Porque está meditando, o se ha apartado[a], o está de viaje. Quizá está durmiendo y despertará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «está haciendo sus necesidades». La expresión hebrea probablemente es eufemística.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y pasó
  - Y sucedió
  lexicon: HALOT
  rationale: La fórmula narrativa de wayyiqtol introduce una nueva escena. «Y aconteció» conserva ese valor discursivo con un tono natural y digno en español.
- source_word: בַצָּהֳרַיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a mediodía
  - al medio día
  lexicon: HALOT
  rationale: La expresión hebrea señala la mitad del día; «al mediodía» es la equivalencia española más clara y natural.
- source_word: וַיְהַתֵּל
  english_pob_choice: mocked
  chosen_spanish: se burlaba de
  alternatives_spanish:
  - se mofaba de
  - se burló de
  lexicon: HALOT
  rationale: El verbo indica burla despectiva. El imperfecto español en contexto narrativo expresa la acción con fluidez y mantiene el matiz de escarnio.
- source_word: בָּהֶם
  english_pob_choice: them
  chosen_spanish: de ellos
  alternatives_spanish:
  - contra ellos
  - a ellos
  lexicon: HALOT
  rationale: Con el verbo de burla, el español exige normalmente una construcción preposicional. «De ellos» refleja el objeto de la burla sin endurecer el giro.
- source_word: קִרְאוּ בְקוֹל גָּדוֹל
  english_pob_choice: Cry out with a loud voice
  chosen_spanish: Griten a gran voz
  alternatives_spanish:
  - Clamen a gran voz
  - Griten con voz fuerte
  lexicon: HALOT
  rationale: Se conserva el imperativo plural y la idiomática hebrea «con gran voz». «Griten» comunica bien la intensidad retórica sin perder naturalidad.
- source_word: אֱלֹהִים הוּא
  english_pob_choice: for he is a god
  chosen_spanish: porque dios es
  alternatives_spanish:
  - porque es un dios
  - porque él es dios
  lexicon: HALOT
  rationale: El contexto es la burla de Elías a Baal, no una afirmación teológica sobre Yahvé. En español, «dios es» mantiene el valor indefinido e irónico; al estar en minúscula, evita identificarlo con el Dios de Israel.
- source_word: שִׂיחַ
  english_pob_choice: he is musing
  chosen_spanish: está meditando
  alternatives_spanish:
  - está pensando
  - está ensimismado
  lexicon: HALOT
  rationale: El término apunta a actividad mental o contemplativa. «Está meditando» conserva la ambigüedad y el tono burlón sin forzar una explicación demasiado específica.
- source_word: שִׂיג לוֹ
  english_pob_choice: he has gone aside
  chosen_spanish: se ha apartado
  alternatives_spanish:
  - ha ido aparte
  - se ha retirado
  lexicon: HALOT
  rationale: La expresión es probablemente eufemística. «Se ha apartado» preserva el eufemismo y la indeterminación del hebreo, dejando abierta la referencia probable a una necesidad corporal.
- source_word: דֶרֶךְ לוֹ
  english_pob_choice: he is on a journey
  chosen_spanish: está de viaje
  alternatives_spanish:
  - va por el camino
  - está viajando
  lexicon: HALOT
  rationale: El modismo indica ausencia por desplazamiento. «Está de viaje» es idiomático en español y reproduce el sentido nominal del hebreo.
- source_word: אוּלַי יָשֵׁן הוּא וְיִקָץ
  english_pob_choice: Perhaps he is sleeping and will awake
  chosen_spanish: Quizá está durmiendo y despertará
  alternatives_spanish:
  - Tal vez duerme y despertará
  - Quizá está dormido y despertará
  lexicon: HALOT
  rationale: La frase conserva la ironía de la sugerencia de Elías. «Despertará» reproduce el verbo intransitivo y mantiene el estilo sobrio del registro bíblico.
theological_decisions:
- issue: Rendering of אֱלֹהִים in the mockery directed at Baal
  english_pob_reading: a god
  chosen_spanish_reading: dios es
  alternative_spanish_readings:
  - es un dios
  - él es dios
  rationale: El texto no confiesa al Dios verdadero sino que ironiza sobre Baal. La minúscula en español ayuda a conservar la indefinición y evita una lectura que identifique el término con Yahvé.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Preserving the euphemistic force of שִׂיג לוֹ
  english_pob_reading: he has gone aside
  chosen_spanish_reading: se ha apartado
  alternative_spanish_readings:
  - ha ido aparte
  - se ha retirado
  rationale: La expresión hebrea es indirecta y probablemente eufemística. La traducción principal mantiene esa reserva, sin suprimir la tensión léxica ni volverla grosera en el texto principal.
  doctrine_reference: Translation philosophy §1; §3
translation_notes:
  revision_awareness: El borrador sigue el sentido y la revisión final del testimonio inglés, especialmente la preferencia por una formulación más formal para «will awake». También conserva la decisión del POB inglés de mantener el eufemismo de שִׂיג לוֹ en el texto principal y documentar la alternativa más explícita aparte.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el tetragrámaton en el versículo.
  - Se mantiene «dios» en minúscula dentro de la cita para conservar el valor irónico e indefinido de אֱלֹהִים en este contexto.
  - «Meditar» y «apartarse» se eligen para reflejar la ambigüedad del hebreo sin exceder la evidencia fuente.
  - La puntuación y el uso de comillas siguen el español estándar y permiten una lectura pública fluida.
