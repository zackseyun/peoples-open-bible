review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: instrucción a Moisés, separación de la porción selecta, y cómputo de esa ofrenda para los levitas como producto agrícola. Sin embargo, hay varios puntos donde el español no sigue bien ni el hebreo ni la línea del POB inglés: וְאָמַרְתָּ אֲלֵהֶם se debe expresar naturalmente como «les dirás», no «hablarás a ellos»; el verbo principal en la cláusula temporal está en 2mp y conviene mantener la idea de «elevar/ofrecer en contribución» mejor que «aparten»; y לַלְוִיִּם se alinea mejor con «a los levitas» que con «para los levitas».'
  spanish_quality_summary: 'La redacción actual tiene varios giros poco naturales en español bíblico legible: «hablarás a ellos» y «de ello» suenan calcados. «Será contado» también suena menos idiomático aquí que «se les contará» o «será contado a los levitas». La frase agrícola con «era» y «lagar» es buena y de registro adecuado. Hace falta un ajuste menor para mejorar fluidez sin perder precisión.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión de traducir חֶלְבּוֹ como «su mejor parte» está bien sustentada y la nota léxica debe mantenerse. La principal corrección es de fidelidad sintáctica y naturalidad española, no de glosario teológico.
  issues:
  - severity: medium
    issue: «Y hablarás a ellos» es un calco no natural
    rationale: וְאָמַרְתָּ אֲלֵהֶם corresponde a «y les dirás» o «y dirás a ellos», pero en español normal y digno la forma idiomática es «les dirás».
  - severity: medium
    issue: «Cuando aparten» debilita la imagen de contribución elevada
    rationale: בַּהֲרִימְכֶם proviene de רום en Hifil y en contexto cultual apunta a levantar/ofrecer como contribución. «Aparte» comunica separación, pero pierde parte del matiz técnico que el POB inglés preserva con «lift up».
  - severity: medium
    issue: «para los levitas» no refleja tan bien la relación dativa de imputación como «a los levitas»
    rationale: וְנֶחְשַׁב לַלְוִיִּם en el contexto de cómputo/asignación se expresa mejor en español como «se contará a los levitas» o «será contado a los levitas».
  - severity: low
    issue: «de ello» suena rígido
    rationale: Aunque comprensible, «de ello» resulta poco natural. «de él» o reformular toda la cláusula mejora la legibilidad.
  revised_spanish_text: 'Y les dirás: «Cuando eleven[a] su mejor parte de él, se les contará a los levitas como el producto de la era y como el producto del lagar.»'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «su grasa»; aquí el término se usa idiomáticamente para la porción más rica o mejor de la ofrenda.'
    reason: lexical_alternative
