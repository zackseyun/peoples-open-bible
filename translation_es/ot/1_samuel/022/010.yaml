translation:
  language: es
  text: Y consultó a Yahvé por él[a], y le dio provisiones, y le dio la espada de Goliat el Filisteo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "consultó a Yahvé en su favor".
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל לּוֹ בַּיהוָה
  english_pob_choice: he inquired of Yahweh for him
  chosen_spanish: consultó a Yahvé por él
  alternatives_spanish:
  - preguntó a Yahvé por él
  - inquirió de Yahvé por él
  - consultó a Yahvé para él
  lexicon: HALOT
  rationale: שׁאל con בַּיהוָה expresa consultar o inquirir de Dios; en español, "consultó" comunica bien el acto cultual sin sonar arcaico. Mantengo "por él" para reflejar לּוֹ como acción en su favor, no simplemente dirección del acto.
- source_word: בַּיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md contested terms; HALOT
  rationale: La fuente hebrea usa el nombre divino יְהוָה; conforme al criterio del proyecto, se traslada como "Yahvé" en el texto principal, no como máscara litúrgica."
- source_word: צֵידָה
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - alimentos
  - víveres
  - suministros
  lexicon: HALOT
  rationale: צֵידָה se refiere a provisiones para el camino o sustento. "Provisiones" conserva esa amplitud y suena natural en español bíblico actual.
- source_word: נָתַן לּוֹ
  english_pob_choice: gave him
  chosen_spanish: le dio
  alternatives_spanish:
  - le proporcionó
  - le entregó
  - le dio a él
  lexicon: HALOT
  rationale: '"Dar" reproduce directamente נתן y mantiene la repetición enfática del hebreo. "Le dio" es idiomático en español y conserva el ritmo del versículo.'
- source_word: וְאֵת חֶרֶב גָּלְיָת הַפְּלִשְׁתִּי
  english_pob_choice: the sword of Goliath the Philistine
  chosen_spanish: la espada de Goliat el filisteo
  alternatives_spanish:
  - la espada de Goliat, el filisteo
  - la espada de Goliat el filisteo
  lexicon: HALOT
  rationale: El sintagma constructo se vierte con "de" para claridad y fidelidad. Conservo "el filisteo" como epíteto identificador, tal como en el hebreo.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. En el español del proyecto, la forma principal es "Yahvé", preservando el nombre del pacto y evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de לּוֹ en la cláusula verbal
  english_pob_reading: for him
  chosen_spanish_reading: por él
  alternative_spanish_readings:
  - para él
  - a favor de él
  rationale: La referencia no indica mero destinatario, sino mediación en favor de otra persona. "Por él" conserva esa función intercesora de manera natural en español.
  doctrine_reference: Lexical decision for שׁאל + לּוֹ in 1 Samuel 22:10
translation_notes:
  revision_awareness: 'La revisión inglesa reciente no cambió el contenido del versículo; la lectura quedó estable. El español sigue la misma línea auditada: nombre divino explícito, valor de consulta cultual para שׁאל, y repetición de "le dio" para נתן.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente para יְהוָה.
  - Se conserva el paralelismo verbal del hebreo con dos instancias de "le dio".
  - '"Goliat el filisteo" mantiene el epíteto identificador sin añadir puntuación interpretativa innecesaria.'
