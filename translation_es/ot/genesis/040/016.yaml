translation:
  language: es
  text: 'Cuando el panadero principal vio que había interpretado bien, le dijo a Yosef: «Yo también tuve un sueño, y he aquí que tres canastas de pan blanco[a] estaban sobre mi cabeza».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de productos horneados»; el término hebreo חֹרִי es incierto y puede describir ya sea el contenido como pan blanco/panes blancos, o bien las canastas como tejidas o perforadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂר הָאֹפִים
  english_pob_choice: the chief baker
  chosen_spanish: el jefe de los panaderos
  alternatives_spanish:
  - el capitán de los panaderos
  - el príncipe de los panaderos
  lexicon: HALOT
  rationale: שַׂר designa un jefe u अधिकारी/funcionario, y הָאֹפִים identifica a los panaderos como oficio o gremio. «Jefe de los panaderos» conserva el sentido de cargo sin sonar forzado en español.
- source_word: כִּי טוֹב פָּתָר
  english_pob_choice: that he had interpreted well
  chosen_spanish: que había interpretado bien
  alternatives_spanish:
  - que había dado una buena interpretación
  - que había interpretado favorablemente
  lexicon: HALOT
  rationale: La cláusula expresa que la interpretación de José fue reconocida como buena/exitosa. «Había interpretado bien» mantiene el valor adverbial de manera natural en español.
- source_word: אַף אֲנִי
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - incluso yo
  - yo asimismo
  lexicon: HALOT
  rationale: La combinación añade al hablante al relato anterior con énfasis. «Yo también» es la forma más natural y fiel en español.
- source_word: בַּחֲלֹמִי
  english_pob_choice: in my dream
  chosen_spanish: tuve un sueño
  alternatives_spanish:
  - soñé
  - en mi sueño
  lexicon: HALOT
  rationale: El hebreo es elíptico y de estilo de relato onírico. La revisión inglesa mostró que «I also had a dream» es la forma natural y exacta; en español, «tuve un sueño» comunica ese mismo giro sin la incompletud de una traducción rígida.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: Es un marcador discursivo de vividez en la visión/sueño. «Y he aquí que» preserva el tono narrativo solemne y la introducción repentina de la escena.
- source_word: שְׁלֹשָׁה סַלֵּי
  english_pob_choice: three baskets
  chosen_spanish: tres canastas
  alternatives_spanish:
  - tres cestas
  - tres canastos
  lexicon: HALOT
  rationale: La construcción denota tres recipientes de este tipo. «Canastas» es claro y público en español; se evita una especificación innecesaria en el sustantivo base.
- source_word: חֹרִי
  english_pob_choice: of white bread
  chosen_spanish: de pan blanco[b]
  alternatives_spanish:
  - de productos horneados
  - de cestería
  - de panes blancos
  lexicon: HALOT
  rationale: El término es difícil y puede referirse tanto al contenido como a la clase de las canastas. La POB inglesa optó por «white bread» en el texto principal y dejó la incertidumbre en nota; en español se conserva esa decisión con «pan blanco».
- source_word: עַל רֹאשִׁי
  english_pob_choice: were on my head
  chosen_spanish: estaban sobre mi cabeza
  alternatives_spanish:
  - estaban en mi cabeza
  - estaban encima de mi cabeza
  lexicon: HALOT
  rationale: Es una expresión locativa simple. «Sobre mi cabeza» es natural, claro y suficientemente formal en español.
- source_word: יוֹסֵף
  english_pob_choice: Yoseph
  chosen_spanish: José
  alternatives_spanish:
  - Yosef
  - Yoseph
  lexicon: Uso bíblico español estándar para el nombre personal.
  rationale: Aunque la POB inglesa translitera «Yoseph» por convención del proyecto, en español la forma bíblica plenamente reconocible es «José», que comunica el referente sin pérdida de sentido.
theological_decisions:
- issue: Tratamiento del nombre propio יוֹסֵף
  english_pob_reading: Yoseph
  chosen_spanish_reading: José
  alternative_spanish_readings:
  - Yosef
  - Yoseph
  rationale: No hay carga doctrinal específica aquí; la decisión es de inteligibilidad bíblica en español. Se usa la forma asentada y reconocible en la tradición española para el nombre del personaje.
  doctrine_reference: N/A
- issue: Ambigüedad de חֹרִי
  english_pob_reading: white bread / perforated or woven baskets (note)
  chosen_spanish_reading: pan blanco[b]
  alternative_spanish_readings:
  - productos horneados
  - canastas perforadas o tejidas
  rationale: 'Se preserva la tensión léxica: el texto principal sigue la lectura de ''pan blanco'', mientras la nota mantiene la alternativa relacionada con el material o la forma de las canastas. No se resuelve artificialmente una ambigüedad que el hebreo no aclara.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del contexto inglés, que corrigió la frase torpe «I also was in my dream» a la forma natural «I also had a dream». Se conservó además la decisión revisada de mantener la ambigüedad léxica de חֹרִי en una nota, no en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, evitando calcos innecesarios.
  - Se traduce el nombre אישי conforme al uso bíblico español habitual para máxima legibilidad.
  - La fórmula visionaria «y he aquí que» conserva el efecto narrativo del hebreo.
  - La ambigüedad de חֹרִי se refleja de manera auditable en nota, no se elimina del texto principal.
