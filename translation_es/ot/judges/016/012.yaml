translation:
  language: es
  text: 'Entonces Dalila tomó sogas nuevas y lo ató con ellas[a], y le dijo: «¡Los filisteos están sobre ti, Sansón!». Y el que estaba al acecho[b] se hallaba sentado en la habitación interior[c], pero él las reventó de sobre sus brazos como un hilo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuerdas». El hebreo puede referirse a ligaduras resistentes como sogas o cuerdas.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «la emboscada» o «el que estaba al acecho»; el hebreo usa un participio singular que puede ser colectivo o personal.'
    reason: alternative_reading
  - marker: c
    text: O «cámara interior».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבֹתִים
  english_pob_choice: ropes
  chosen_spanish: cuerdas
  alternatives_spanish:
  - sogas
  - cuerdas gruesas
  lexicon: HALOT
  rationale: El hebreo designa ligaduras resistentes; en español, «cuerdas» comunica bien la idea sin sonar tan pesado como «sogas» en este contexto narrativo. Mantiene la alternativa inglesa «ropes/cords» sin exagerar el grosor.
- source_word: חֲדָשִׁים
  english_pob_choice: new
  chosen_spanish: nuevas
  alternatives_spanish:
  - recién hechas
  - frescas
  lexicon: HALOT
  rationale: El adjetivo es directo y el español «nuevas» conserva la fuerza narrativa de algo no debilitado previamente.
- source_word: וַתַּאַסְרֵהוּ
  english_pob_choice: bound him
  chosen_spanish: lo ató
  alternatives_spanish:
  - lo sujetó
  - lo amarró
  lexicon: HALOT
  rationale: «Ató» es el equivalente natural y fiel del verbo אסר. «Lo ató» evita una redundancia poco fluida con «cuerdas».
- source_word: פְּלִשְׁתִּים עָלֶיךָ
  english_pob_choice: The Philistines are upon you
  chosen_spanish: ¡Los filisteos sobre ti, Sansón!
  alternatives_spanish:
  - ¡Los filisteos están sobre ti, Sansón!
  - ¡Los filisteos te atacan, Sansón!
  lexicon: HALOT
  rationale: Se conserva la exclamación idiomática, pero en español se omite el verbo copulativo para sonar natural y urgente. «Sobre ti» mantiene la imagen hebrea de inminencia y cercanía.
- source_word: וְהָאֹרֵב
  english_pob_choice: the ambush
  chosen_spanish: el que estaba al acecho
  alternatives_spanish:
  - la emboscada
  - el emboscado
  lexicon: HALOT
  rationale: El participio singular en hebreo puede referirse a una persona o al grupo oculto. El español «el que estaba al acecho» preserva esa ambigüedad personal sin forzar «la emboscada», que suena menos literal en español.
- source_word: יֹשֵׁב
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - permanecía sentado
  - estaba allí
  lexicon: HALOT
  rationale: «Estaba sentado» reproduce la imagen concreta del participio y conserva el valor de posición/espera.
- source_word: בֶּחָדֶר
  english_pob_choice: in the inner room
  chosen_spanish: en la habitación interior
  alternatives_spanish:
  - en el cuarto interior
  - en la cámara interior
  lexicon: HALOT
  rationale: «Habitación interior» expresa bien חֶדֶר en un registro claro y actual; «cámara» podría sonar demasiado eclesiástico o arcaico en español contemporáneo.
- source_word: וַיְנַתְּקֵם
  english_pob_choice: he snapped them
  chosen_spanish: las arrancó
  alternatives_spanish:
  - las quebró
  - las desgarró
  lexicon: HALOT
  rationale: El verbo comunica ruptura violenta y súbita. «Arrancó» transmite bien el desgarro con una sintaxis natural en español.
- source_word: מֵעַל זְרֹעֹתָיו
  english_pob_choice: from off his arms
  chosen_spanish: de sobre sus brazos
  alternatives_spanish:
  - de sus brazos
  - de encima de sus brazos
  lexicon: HALOT
  rationale: «De sobre» conserva la relación espacial de מעל y el movimiento de desprendimiento, aunque en español sea menos común que una simple preposición.
- source_word: כַּחוּט
  english_pob_choice: like a thread
  chosen_spanish: como un hilo
  alternatives_spanish:
  - como un hilo fino
  - como una hebra
  lexicon: HALOT
  rationale: En español «hilo» es más natural que «thread» traducido como «hilo»; mantiene la imagen de fragilidad y ruptura fácil. «Hebra» sería más literaria.
theological_decisions:
- issue: 'Ambigüedad de וְהָאֹרֵב: persona singular o grupo/emboscada'
  english_pob_reading: The ambush was sitting in the inner room
  chosen_spanish_reading: Y el que estaba al acecho estaba sentado en la habitación interior
  alternative_spanish_readings:
  - Y la emboscada estaba sentada en la habitación interior
  - Y los que estaban al acecho estaban en la habitación interior
  rationale: El hebreo usa un participio singular que puede leerse colectivamente o de modo personal. Siguiendo la nota auditada del inglés, el español mantiene la ambigüedad con una forma personal singular, evitando convertirlo sin necesidad en una entidad impersonal.
  doctrine_reference: Ninguna; decisión de traducción narrativa y sintáctica.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés de POB, con acuerdo alto en el análisis léxico. No se detectaron revisiones aplicadas en el expediente, así que se mantuvo la solución base con ajustes naturales al español y una preservación explícita de la ambigüedad de וְהָאֹרֵב.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «Sansón» y «Dalila» como nombres propios establecidos.
  - Se evitó «SEÑOR» porque no corresponde aquí.
  - Se conservó un registro narrativo sobrio, cercano al español bíblico moderno, sin calco rígido del inglés.
