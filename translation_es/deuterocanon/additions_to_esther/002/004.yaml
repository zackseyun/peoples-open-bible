  yaml_path: translation/deuterocanon/additions_to_esther/002/004.yaml
  text: among all the tribes throughout the inhabited world there is mixed in a certain hostile people[a], opposed in its laws to every nation, and continually disregarding the decrees of the kings[c][b], so that the blameless joint-rule directed by us may not be maintained.
  footnotes:
  - marker: a
    text: Or 'contrary in their customs to every nation.' The Greek νόμοι can mean either 'laws' or, more broadly, customary practices.
    reason: lexical_alternative
  - marker: b
    text: The Greek text here is syntactically compressed; 'disregarding the decrees of the kings' reflects a likely sense of passing by or neglecting royal commands.
    reason: lexical_alternative
  - marker: c
    text: Or 'common government' or 'shared rule' for 'joint-rule' (Greek συναρχίαν).
    reason: lexical_alternative
