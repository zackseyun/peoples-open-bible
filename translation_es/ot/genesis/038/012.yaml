  language: en
  yaml_path: translation/ot/genesis/038/012.yaml
  text: After many days had passed[a], the daughter of Shua, Judah’s wife, died. When Judah was comforted[c][b], he went up to Timnah to his sheep shearers—he and his friend Hirah the Adullamite.
