revisions:
- from: No se detuvo hasta prevalecer en dispersarlos, como en orfandad[c][b][a], y asoló una casa por causa de deseo sin ley.
  to: No se detuvo hasta lograr dispersarlos, como en orfandad[c][b][a], y asoló una casa por causa de deseo ilícito.
  rationale: Se ajusta «prevalecer en dispersarlos» a «lograr dispersarlos» para un español más natural sin perder el sentido de ἐνίκησεν σκορπίσαι; se cambia «deseo sin ley» por «deseo ilícito» para expresar con claridad el matiz moral/legal de παρανόμου; y se corrige la nota léxica con una alternativa española idiomática en lugar de «bereavimiento».
