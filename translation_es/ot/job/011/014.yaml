translation:
  language: es
  text: Si hay iniquidad en tu mano[a], aléjala, y no permitas que la injusticia habite en tus tiendas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Si hay maldad en tu mano, aléjala’.
    reason: lexical_alternative
  - marker: b
    text: ‘En tus tiendas’ alude a tu ámbito doméstico o vida del hogar.
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - Si de veras
  lexicon: HALOT
  rationale: Introduce la cláusula condicional de manera natural y fiel al hebreo, sin añadir énfasis que el texto no requiere.
- source_word: אָוֶן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - iniquidad moral
  - maldad o perversidad
  lexicon: HALOT
  rationale: El contexto es exhortativo y moral; 'iniquidad' conserva ese peso ético y mantiene distinción respecto de עַוְלָה sin volver la frase demasiado interpretativa.
- source_word: בְּיָדְךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - bajo tu mano
  - a tu alcance
  - en tu poder
  lexicon: HALOT
  rationale: La imagen hebrea de posesión, práctica o control se conserva con la expresión literal y natural 'en tu mano'.
- source_word: הַרְחִיקֵהוּ
  english_pob_choice: put it far away
  chosen_spanish: aléjala
  alternatives_spanish:
  - ponla lejos
  - arrójala lejos
  - apártala
  lexicon: HALOT
  rationale: El verbo en hifil exige una acción activa de separación o remoción. 'Aléjala' transmite bien la fuerza causativa y suena natural en español.
- source_word: וְאַל תַּשְׁכֵּן
  english_pob_choice: and do not let dwell
  chosen_spanish: y no permitas que habite
  alternatives_spanish:
  - y no dejes que habite
  - y no la hagas morar
  - y no la dejes morar
  lexicon: HALOT
  rationale: La construcción prohibitiva con שכן expresa no permitir residencia. 'No permitas que habite' comunica la idea sin perder la imagen de permanencia.
- source_word: בְּאֹהָלֶיךָ
  english_pob_choice: in your tents
  chosen_spanish: en tus tiendas
  alternatives_spanish:
  - en tu tienda
  - en tu casa
  - en tu hogar
  lexicon: HALOT
  rationale: El plural hebreo se conserva con 'tiendas', que mantiene el trasfondo concreto y la imagen doméstica del texto.
- source_word: עַוְלָה
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - injusticia
  - agravio
  lexicon: HALOT
  rationale: Mantiene el paralelismo ético con אָוֶן y reproduce con precisión el valor de injusticia, sin fusionar ambos términos en uno solo.
theological_decisions:
- issue: Paralelismo moral entre אָוֶן y עַוְלָה
  english_pob_reading: Render both with distinct but related ethical terms ('iniquity' / 'injustice')
  chosen_spanish_reading: 'Renderizar ambos con términos relacionados pero no idénticos: ''iniquidad'' / ''injusticia'''
  alternative_spanish_readings:
  - Usar el mismo término para ambos
  - Generalizar ambos como 'mal'
  rationale: El verso usa dos vocablos morales cercanos para intensificar la exhortación. Mantener dos términos relacionados preserva el paralelismo poético y evita aplanar la dicción hebrea.
  doctrine_reference: 'Translation philosophy #5: Consistency of key terms, or documented exception.'
- issue: '''Tus tiendas'' como ámbito doméstico'
  english_pob_reading: ‘In your tents’ refers to one’s domestic sphere or household life.
  chosen_spanish_reading: ‘En tus tiendas’ conserva la imagen concreta y sugiere tu esfera doméstica sin sustituirla por una paráfrasis.
  alternative_spanish_readings:
  - en tu casa
  - en tu hogar
  - en tu vida familiar
  rationale: La forma plural del hebreo es explícita y conviene mantenerla. La imagen de tiendas preserva el color histórico y deja al lector captar el sentido doméstico del contexto.
  doctrine_reference: 'Translation philosophy #2: Preserve source imagery where intelligible.'
translation_notes:
  revision_awareness: El texto inglés auditado mantuvo una equivalencia óptima estable, sin revisiones aplicadas; esta propuesta sigue de cerca el hebreo WLC y conserva la distinción léxica entre אָוֶן e עַוְלָה con una formulación española natural y publicable.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva el plural 'tiendas' para reflejar בְּאֹהָלֶיךָ.
  - Se evita traducir con 'siervo' u otras formulaciones no pertinentes; el versículo es moral y exhortativo.
  - '''Iniquidad'' e ''injusticia'' se distinguen deliberadamente para sostener el paralelismo poético hebreo.'
