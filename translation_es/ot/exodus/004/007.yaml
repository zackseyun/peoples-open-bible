  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. «Seno» para חֵיק y «carne» para בשר están alineados con la evidencia léxica y la rationale documentada.
