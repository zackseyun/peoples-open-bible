  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido del hebreo: tránsito por el desierto, rodear Edom y Moab, aproximación por el lado oriental de Moab, campamento al otro lado del Arnón, y explicación de que no entraron en territorio moabita porque el Arnón marcaba su frontera. Sin embargo, la nota [b] no preserva una alternativa real, porque repite exactamente la redacción ya usada en el texto español en vez de reflejar la alternativa inglesa/documentada (''más allá del Arnón'' frente a ''al otro lado del Arnón'').'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Fue por el desierto'', ''rodeó'', ''parte oriental'', ''acamparon'' y ''territorio'' funcionan bien. Hay una pequeña mejora estilística posible en la puntuación: conviene mantener la conjunción adversativa explícita (''pero'') antes de ''no entraron'', como en el inglés POB y en el contraste del hebreo.'
  glossary_alignment: 'No hay términos del glosario maestro especialmente implicados aquí. Las decisiones léxicas principales concuerdan con la auditoría inglesa: ''tierra'' para אֶרֶץ, ''acamparon'' para חנה, y ''territorio/límite'' para las dos ocurrencias de גְּבוּל con matiz contextual. No hay conflicto terminológico teológico.'
  issues:
  - severity: medium
    issue: La nota [b] no ofrece una alternativa distinta
    rationale: 'El texto principal dice ''al otro lado del Arnón[b]'' y la nota dice ''O: «al otro lado del Arnón»''. Eso invalida la función de la nota. Debe conservar la alternativa documentada, por ejemplo ''más allá del Arnón'' si el texto mantiene ''al otro lado del Arnón'', o viceversa.'
  - severity: low
