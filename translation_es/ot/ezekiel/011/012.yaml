translation:
  language: es
  text: Entonces sabrán que yo soy Yahvé[a], que no anduvieron en mis estatutos ni cumplieron mis juicios, sino que actuaron conforme a los juicios de las naciones que están alrededor de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las prácticas» o «las costumbres» de las naciones que están alrededor de ustedes. El hebreo aquí puede referirse no solo a «juicios» en sentido legal, sino también a modos de obrar o costumbres seguidas por esas naciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: terminología POB para el nombre divino
  rationale: 'Sigo el criterio del proyecto para el Tetragrámaton: en español se usa «Yahvé» para preservar el nombre propio del pacto, en lugar de ocultarlo con un título. Mantiene la equivalencia con el inglés POB «Yahweh».'
- source_word: חֻקַּי
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» transmite bien la fuerza legal-covenantal de חֻקִּים y conserva una distinción útil frente a מִשְׁפָּטִים, que en la siguiente cláusula se rinde con otra palabra.
- source_word: הֲלַכְתֶּם
  english_pob_choice: you have not walked
  chosen_spanish: no anduvieron
  alternatives_spanish:
  - no caminaron
  - no vivieron
  lexicon: HALOT
  rationale: Conservo el idiomatismo bíblico de «andar» para reflejar el hebreo «caminar». En español resulta natural y mantiene la imagen de conducta continua.
- source_word: מִשְׁפָּטַי / מִשְׁפְּטֵי
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - ordenanzas
  - reglas
  - prácticas
  lexicon: HALOT
  rationale: '«Juicios» mantiene la continuidad léxica con el inglés POB y refleja la gama de מִשְׁפָּט: decisiones/mandatos normativos. En español suena más natural que repetir «juicios» en sentido meramente judicial, pero conserva la tensión legal del término.'
- source_word: עֲשִׂיתֶם
  english_pob_choice: you have not carried out / you have acted
  chosen_spanish: no cumplieron; sino que actuaron
  alternatives_spanish:
  - no hicieron; sino que hicieron
  - no llevaron a cabo; sino que procedieron
  lexicon: HALOT
  rationale: Para עשה, «cumplir» funciona bien con mandatos y normas; en la cláusula adversativa, «actuaron» traduce con naturalidad עשה + כ, expresando que siguieron el patrón de las naciones.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: HALOT
  rationale: «Las naciones» conserva el referente del hebreo y la coherencia con la audiencia comparada de pueblos circundantes.
- source_word: סְבִיבוֹתֵיכֶם
  english_pob_choice: that are around you
  chosen_spanish: que están alrededor de ustedes
  alternatives_spanish:
  - que los rodean
  - vecinas a ustedes
  lexicon: HALOT
  rationale: Mantengo la relación espacial explícita del hebreo y adapto el pronombre al español latinoamericano neutro con «ustedes».
theological_decisions:
- issue: Cómo rendir el nombre de pacto יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto es no mascarar el nombre divino con un título. «Yahvé» preserva el valor de nombre propio del pacto y es la opción coherente con el marco editorial del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene la estructura causal y adversativa del hebreo, con una nota para la amplitud semántica de מִשְׁפָּט. La versión española conserva esa tensión: «juicios» en ambas ocurrencias para mantener la repetición léxica, pero la nota reconoce que el término también puede entenderse como «prácticas» o «costumbres» en el último miembro. No se detectaron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantuvo la repetición de «juicios» para reflejar la repetición de מִשְׁפָּט en el hebreo y la decisión del POB inglés.
  - Se usó «ustedes» por coherencia con español latinoamericano neutral y para evitar un voseo/regionalismo.
  - «Sino que» expresa la oposición implícita de וּכְ־ en la última cláusula sin sobretraducir el hebreo.
