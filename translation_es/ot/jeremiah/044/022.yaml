base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/044/022.yaml
  text: And Yahweh could no longer bear it because of the evil of your deeds[a], because of the abominations that you committed. So your land became a ruin, a desolation, and a curse, without inhabitant[c][b], as it is this day.
  footnotes:
  - marker: a
    text: Or 'could no longer endure.' The Hebrew literally says 'could no longer bear,' expressing that the LORD's forbearance had reached its limit because of their evil deeds and abominations.
    reason: lexical_alternative
  - marker: b
    text: '''A desolation'' may also carry the sense of ''an object of horror/astonishment.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'an object of cursing,' that is, something invoked as a formula of curse.
    reason: lexical_alternative
