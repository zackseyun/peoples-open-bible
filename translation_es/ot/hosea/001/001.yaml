translation:
  language: es
  text: La palabra de Yahvé[a] que vino a Oseas hijo de Beeri, en los días de Uzías, Jotam, Acaz y Ezequías, reyes de Judá, y en los días de Jeroboam hijo de Joás, rey de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se traduce «el SEÑOR»; alternativamente, «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: דְּבַר
  english_pob_choice: The word of
  chosen_spanish: La palabra de
  alternatives_spanish:
  - El mensaje de
  - La palabra
  lexicon: HALOT
  rationale: Se conserva la fórmula profética fija דְּבַר יְהוָה como 'la palabra de Yahvé', que en español transmite mejor el registro revelatorio que 'mensaje' y mantiene la construcción genitiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto fuente usa el Nombre divino, no un título. En español de la POB se adopta 'Yahvé' como forma principal para el Tetragrámaton, preservando la referencia personal al Nombre revelado.
- source_word: אֲשֶׁר הָיָה אֶל
  english_pob_choice: that came to
  chosen_spanish: que vino a
  alternatives_spanish:
  - que llegó a
  - que fue dirigida a
  lexicon: HALOT
  rationale: La fórmula profética hebrea expresa la llegada de la palabra/revelación al profeta. 'Que vino a' conserva ese valor idiomático sin volverlo literal en exceso.
- source_word: הוֹשֵׁעַ
  english_pob_choice: Hosea
  chosen_spanish: Oseas
  alternatives_spanish:
  - Hosea
  lexicon: HALOT
  rationale: Se usa la forma española usual del nombre propio, adecuada para lectura eclesial y reconocible en español.
- source_word: בֶּן בְּאֵרִי
  english_pob_choice: son of Beeri
  chosen_spanish: hijo de Beeri
  alternatives_spanish:
  - el hijo de Beeri
  lexicon: HALOT
  rationale: La relación patronímica se expresa de manera directa y natural en español; 'hijo de' preserva el valor genealógico sin añadir determinación no presente en el hebreo.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante los días de
  - en tiempos de
  lexicon: HALOT
  rationale: Se mantiene el idiomismo temporal repetido del hebreo. 'En los días de' es fiel y claro en español, y conserva la cadencia histórica del encabezado.
- source_word: עֻזִּיָּה יוֹתָם אָחָז יְחִזְקִיָּה
  english_pob_choice: Uzziah, Jotham, Ahaz, and Hezekiah
  chosen_spanish: Uzías, Jotam, Acaz y Ezequías
  alternatives_spanish:
  - Ozías, Jotam, Acaz y Ezequías
  lexicon: HALOT
  rationale: Se emplean las formas españolas de uso bíblico más extendido, manteniendo la secuencia de reyes de Judá. 'Uzías' responde a la forma común en traducciones en español.
- source_word: מַלְכֵי יְהוּדָה
  english_pob_choice: kings of Judah
  chosen_spanish: reyes de Judá
  alternatives_spanish:
  - los reyes de Judá
  lexicon: HALOT
  rationale: La apposición queda clara en español sin artículo adicional; se conserva la identificación histórica de los cuatro reyes mencionados.
- source_word: וּ/בִ/ימֵי
  english_pob_choice: and in the days of
  chosen_spanish: y en los días de
  alternatives_spanish:
  - y durante los días de
  - y en tiempos de
  lexicon: HALOT
  rationale: Se mantiene la conjunción hebrea y la segunda marca temporal, dejando ver la separación entre la línea de Judá y la referencia al reino del norte.
- source_word: יָרָבְעָם בֶּן יוֹאָשׁ
  english_pob_choice: Jeroboam son of Joash
  chosen_spanish: Jeroboam hijo de Joás
  alternatives_spanish:
  - Jeroboam, hijo de Joás
  lexicon: HALOT
  rationale: Se preserva el patronímico con la forma española Joás. La ausencia de coma sigue bien la sintaxis del encabezado y evita sobreinterpretar la estructura.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - el rey de Israel
  lexicon: HALOT
  rationale: La frase funciona como aposición a Jeroboam y se traduce de forma directa; 'rey de Israel' conserva el título y la referencia política sin añadidos.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo presenta explícitamente el Tetragrámaton. Se evita la sustitución por un título para no ocultar el Nombre propio. 'Yahvé' es la opción principal de la POB en español y es compatible con la intención doctrinal de preservar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español junto al término al que corresponde. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma principal para יְהוָה, coherente con el estándar del proyecto.
  - 'Se usaron formas españolas bíblicas comunes para los nombres propios: Oseas, Uzías, Jotam, Acaz, Ezequías, Jeroboam y Joás.'
  - Se conservó la fórmula profética y la estructura temporal repetida para reflejar el encabezado hebreo sin paraphraseo excesivo.
