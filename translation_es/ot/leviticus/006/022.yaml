lexical_decisions:
- source_word: כָּל
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo varón
  lexicon: HALOT
  rationale: El valor distributivo del hebreo se conserva mejor con "todo" en español. Unido a "varón" en la frase, expresa que se trata de cada miembro masculino elegible, no de un grupo colectivo vago.
- source_word: זָכָר
  english_pob_choice: male
  chosen_spanish: varón
  alternatives_spanish:
  - macho
  - hombre
  lexicon: HALOT
  rationale: '"Varón" es el equivalente natural y digno en español para la referencia masculina específica del texto legal. "Macho" suena animalizante; "hombre" puede sugerir humanidad en general o varón adulto sin la precisión requerida.'
- source_word: בַּכֹּהֲנִים
  english_pob_choice: among the priests
  chosen_spanish: entre los sacerdotes
  alternatives_spanish:
  - de entre los sacerdotes
  - en los sacerdotes
  lexicon: HALOT
  rationale: La preposición ב con el sustantivo definido expresa pertenencia o membresía dentro del grupo sacerdotal. "Entre los sacerdotes" reproduce bien ese matiz de inclusión dentro del cuerpo sacerdotal.
- source_word: יֹאכַל
  english_pob_choice: may eat
  chosen_spanish: podrá comer
  alternatives_spanish:
  - puede comer
  - comerá
  lexicon: HALOT
  rationale: En material legal, el imperfecto expresa permiso/regulación. "Podrá comer" comunica autorización normativa en español mejor que un futuro simple, y evita la idea de un mandato meramente predictivo.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - la
  - eso
  lexicon: HALOT
  rationale: Aunque el antecedente hebreo es femenino, en español el referente implícito de la porción ofrecida se expresa naturalmente con el pronombre neutro de objeto directo "lo". No se amplía el sustantivo para no ir más allá del texto.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: cosa santísima
  alternatives_spanish:
  - santísimo
  - lo más santo
  - cosa sumamente santa
  lexicon: HALOT
  rationale: El hebreo usa un idiomático superlativo de santidad. "Cosa santísima" mantiene la fuerza de categoría/estado sagrado sin introducir la expresión tradicional "Santo de los santos", que aquí podría sugerir un lugar en vez de una cualidad ritual.
- source_word: הִוא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - es ella
  - ello es
  lexicon: HALOT
  rationale: El hebreo retoma el antecedente femenino, pero el español exige una cópula natural sin pronombre explícito. "Es" conserva la afirmación breve y directa del original.
translation_notes:
  revision_awareness: Se siguió el tenor del paquete fuente y del audit trail inglés sin cambios recientes relevantes; la redacción española mantiene el permiso cultual, la membresía sacerdotal y el superlativo idiomático de santidad.
  spanish_consistency_notes:
  - Se preserva "sacerdotes" para כֹּהֲנִים en coherencia con el contexto levítico.
  - Se usa "varón" para זָכָר por precisión semántica.
  - Se conserva el sentido permisivo de יֹאכַל con "podrá comer".
  - Se mantiene el superlativo idiomático de קֹדֶשׁ קָדָשִׁים en una nota de pie, evitando una paráfrasis excesiva en el texto principal.
