  rationale: 'Se corrigió ''otro palo'' a ''un palo'' para no añadir un matiz no explícito en el hebreo. También se normalizó el aparato de notas para reflejar mejor las alternativas léxicas documentadas por la POB inglesa: una sola nota para עֵץ en ambas apariciones, una nota para ''hijos de Israel'', y una para חברו. Se mantuvo el resto del phrasing porque es fiel, claro y apropiado en español bíblico actual.'
