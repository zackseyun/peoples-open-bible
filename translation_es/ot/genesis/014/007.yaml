base_translation:
  language: en
  yaml_path: translation/ot/genesis/014/007.yaml
  text: Then they turned back and came to En-mishpat (that is[a], Kadesh), and struck all the country of the Amalekites[c][b], and also the Amorites who were living in Hazazon-tamar.
  footnotes:
  - marker: a
    text: En-mishpat means 'spring of judgment.'
    reason: cultural_note
  - marker: b
    text: Or 'all the field/country of the Amalekites.' The Hebrew literally reads 'all the field of the Amalekite,' likely meaning the region occupied by the Amalekites.
    reason: lexical_alternative
  - marker: c
    text: Hazazon-tamar is identified with En-gedi in 2 Chronicles 20:2.
    reason: cross_reference
