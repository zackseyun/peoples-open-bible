review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y la auditoría inglesa en los elementos principales: «Yahvé», la continuidad de la ira hasta cumplir el propósito divino, «los propósitos de su corazón» y la cláusula final de comprensión futura. Sin embargo, hay dos desajustes relevantes: (1) la nota al pie [a] está anclada a «volverá», pero su contenido corresponde a «En los últimos días»; y (2) «hasta que haya hecho esto» explicita «esto» donde el hebreo y el POB dejan el objeto implícito («hecho[o] / lo haya hecho»), lo cual añade una especificación innecesaria.'
  spanish_quality_summary: El español es claro y digno, pero «no volverá» puede sonar levemente incompleto en este contexto; «no se volverá atrás» refleja mejor la idea de no retroceder/cesar. También conviene mover la nota al pie al sintagma temporal correcto. El resto del verso es natural y bien legible.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; מְזִמּוֹת לִבּוֹ -> «los propósitos de su corazón» adecuado; בְּאַחֲרִית הַיָּמִים puede verterse como «en los últimos días», aunque en español bíblico «en los días postreros» o «en el tiempo final» también podrían considerarse. No hay conflicto doctrinal mayor. La principal corrección es de anclaje de nota y de no sobretraducir עֲשֹׂתוֹ.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en «volverá», pero el contenido de la nota explica la expresión temporal «En los últimos días».
    rationale: Las notas deben anclarse exactamente a la palabra o frase pertinente. Tal como está, induce a error y no cumple la disciplina de marcado requerida.
  - severity: medium
    issue: «Hasta que haya hecho esto» añade «esto», que no está explícito en el hebreo.
    rationale: La auditoría inglesa preserva el objeto implícito («done it»). En español, «hasta que lo haya hecho» o «hasta que haya hecho[o]» mantiene mejor la elipsis original sin introducir una referencia más definida.
  - severity: low
    issue: «No volverá» es posible, pero menos preciso que una formulación que exprese retroceso o cesación.
    rationale: שׁוּב aquí comunica que la ira de Yahvé no se echará atrás ni cesará antes de completar su propósito. «No se volverá atrás» o «no retrocederá» lo aclaran mejor en español.
  revised_spanish_text: El ardor de la ira de Yahvé no se volverá atrás hasta que lo haya hecho y hasta que haya establecido los propósitos de su corazón. En los últimos días[a] lo entenderán.
  revised_footnotes:
