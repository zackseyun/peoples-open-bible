translation:
  language: es
  text: Al sonido del jinete y del arquero[a], toda ciudad huye[b]; se meten en los matorrales[c] y suben entre las peñas. Toda ciudad queda abandonada, y ningún hombre[d] habita en ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por el sonido del jinete y del arquero». La preposición hebrea puede expresar ocasión o causa.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo también puede entenderse colectivamente: «toda la ciudad huye».'
    reason: lexical_alternative
  - marker: c
    text: El término hebreo es incierto; algunos lo toman como «nubes», pero el contexto de ocultamiento favorece una vegetación densa.
    reason: lexical_alternative
  - marker: d
    text: 'O: «y no habita en ellas nadie». El hebreo dice literalmente «ningún hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקּוֹל
  english_pob_choice: At the sound of
  chosen_spanish: Al sonido de
  alternatives_spanish:
  - Por el sonido de
  - A causa del sonido de
  lexicon: HALOT
  rationale: La preposición מִן con קוֹל puede expresar causa u ocasión. «Al sonido de» conserva la inmediatez del pánico sin fijar de más el matiz causal.
- source_word: פָּרָשׁ
  english_pob_choice: the horseman
  chosen_spanish: el jinete
  alternatives_spanish:
  - el hombre a caballo
  - el caballerista
  lexicon: HALOT
  rationale: El término militar hebreo se refiere a un combatiente montado. En español, «jinete» comunica de forma natural la imagen del atacante a caballo.
- source_word: וְרֹמֵה קֶשֶׁת
  english_pob_choice: and the archer
  chosen_spanish: y del arquero
  alternatives_spanish:
  - y del que dispara el arco
  - y del tirador con arco
  lexicon: HALOT
  rationale: La frase participial significa literalmente «el que dispara el arco». «Arquero» es el equivalente idiomático moderno más claro y fiel.
- source_word: בֹּרַחַת כָּל הָעִיר
  english_pob_choice: every city flees
  chosen_spanish: toda ciudad huye
  alternatives_spanish:
  - huye toda la ciudad
  - toda la ciudad huye
  lexicon: HALOT
  rationale: Aunque עיר está en singular, כל + singular funciona distributivamente. «Toda ciudad» conserva ese valor colectivo sin perder la fluidez del español.
- source_word: בָּאוּ
  english_pob_choice: they go
  chosen_spanish: entran
  alternatives_spanish:
  - van
  - llegan
  lexicon: HALOT
  rationale: El verbo es literalmente «vinieron/entraron», y en contexto describe el movimiento hacia refugios. «Entran» expresa con naturalidad la huida hacia escondites.
- source_word: בֶּעָבִים
  english_pob_choice: into the thickets
  chosen_spanish: en los matorrales
  alternatives_spanish:
  - entre los matorrales
  - en los espesos
  - en la espesura
  lexicon: HALOT
  rationale: En este contexto de huida y ocultamiento, el término se entiende mejor como vegetación densa/refugio, no como «nubes». «Matorrales» comunica esa cobertura natural.
- source_word: וּבַכֵּפִים עָלוּ
  english_pob_choice: and climb up among the rocks
  chosen_spanish: y suben entre las peñas
  alternatives_spanish:
  - y suben por las peñas
  - y ascienden entre las rocas
  - y trepan a los riscos
  lexicon: HALOT
  rationale: כֵּפִים designa rocas/peñas. «Suben entre las peñas» mantiene el movimiento ascendente y la idea de buscar refugio en terreno abrupto.
- source_word: עֲזוּבָה
  english_pob_choice: is abandoned
  chosen_spanish: queda abandonada
  alternatives_spanish:
  - está abandonada
  - queda desierta
  lexicon: HALOT
  rationale: El sentido resultativo/pasivo es claro. «Queda abandonada» suena natural y preserva la imagen de una ciudad vaciada por la guerra.
- source_word: וְאֵין יוֹשֵׁב בָּהֵן אִישׁ
  english_pob_choice: and no man dwells in them
  chosen_spanish: y no habita en ellas ningún hombre
  alternatives_spanish:
  - y no vive en ellas ningún hombre
  - y no mora en ellas hombre alguno
  lexicon: HALOT
  rationale: El hebreo usa אישׁ con participio singular masculino para subrayar una deshabitación total. Se conserva «ningún hombre» para mantener esa fuerza genérica y el matiz del original.
translation_notes:
  revision_awareness: El texto inglés de POB no fue revisado en la pasada más reciente; el estado de la comparación cruzada es de alta concordancia y no se registraron cambios. La presente versión española sigue ese mismo perfil, manteniendo las decisiones léxicas principales y las ambigüedades documentadas del original hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por norma del proyecto solo cuando aparezca el tetragrama; este versículo no lo contiene.
  - Se conservó el valor distributivo de «toda ciudad» sin convertirlo en plural explícito.
  - «Matorrales» se eligió para reflejar la incertidumbre léxica de בֶּעָבִים sin cerrar indebidamente la lectura a «nubes».
  - «Ningún hombre» preserva el énfasis del hebreo en la despoblación total sin neutralizar el sustantivo אישׁ.
