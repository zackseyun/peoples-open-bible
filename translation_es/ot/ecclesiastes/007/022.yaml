translation:
  language: es
  text: Pues tu corazón sabe que muchas veces tú mismo también has maldecido a otros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'has insultado a otros' o 'has hablado mal de otros'. El verbo hebreo puede denotar maldecir con palabras, pero en contexto también puede referirse de manera más amplia a insultar o hablar contra otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la explicación o razón de la afirmación anterior; en español, 'Porque' conserva esa fuerza causal sin sonar forzado.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - asimismo
  lexicon: HALOT
  rationale: El primer גַּם añade el matiz de inclusión respecto al conocimiento del corazón; 'también' es la opción más natural y fiel.
- source_word: פְּעָמִים רַבּוֹת
  english_pob_choice: many times
  chosen_spanish: muchas veces
  alternatives_spanish:
  - con frecuencia
  - en muchas ocasiones
  lexicon: HALOT
  rationale: El giro hebreo literalmente significa 'muchas veces/ocasiones'; 'muchas veces' preserva con claridad esa repetición sin sobreinterpretar.
- source_word: יָדַע
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - está consciente
  lexicon: HALOT
  rationale: En este contexto gnómico, el verbo expresa conocimiento asentado y personal; 'sabe' es natural en español y mantiene la observación interior del texto.
- source_word: לִבְּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu mente
  lexicon: HALOT
  rationale: '''Corazón'' conserva la antropología hebrea del centro interior de pensamiento y conciencia; no se neutraliza como ''mente''.'
- source_word: גַּם אַתָּה
  english_pob_choice: you yourself have also
  chosen_spanish: tú mismo también
  alternatives_spanish:
  - tú también
  - hasta tú
  lexicon: HALOT
  rationale: La combinación intensifica la implicación personal del oyente. 'Tú mismo también' preserva tanto el énfasis reflexivo como el aditivo.
- source_word: קִלַּלְתָּ
  english_pob_choice: cursed
  chosen_spanish: has maldecido
  alternatives_spanish:
  - has insultado
  - has hablado mal de
  lexicon: HALOT
  rationale: '''Maldecir'' reproduce con mayor precisión el valor verbal principal de קִלֵּל, y mantiene la simetría con la idea de recibir maldición en el contexto. Se conserva la posible amplitud semántica en nota.'
- source_word: אֲחֵרִים
  english_pob_choice: others
  chosen_spanish: a otros
  alternatives_spanish:
  - a otras personas
  - a los demás
  lexicon: HALOT
  rationale: El plural indefinido se traduce de forma concisa y directa como 'a otros'.
theological_decisions:
- issue: 'Alcance semántico de קִלֵּל: maldecir vs. hablar mal/insultar'
  english_pob_reading: The Hebrew verb can denote cursing in speech, but in context it may refer more broadly to insulting or speaking against others.
  chosen_spanish_reading: has maldecido
  alternative_spanish_readings:
  - has insultado
  - has hablado mal de otros
  rationale: La lectura principal debe mantener la fuerza lexical del verbo como en el texto base; en español, 'maldecido' es la forma más directa. La amplitud contextual se preserva en nota para no borrar la tensión semántica.
  doctrine_reference: Lexical theology of speech and moral reciprocity in Ecclesiastes 7:21–22
translation_notes:
  revision_awareness: La versión española sigue la revisión auditada del inglés, que retiró el primer 'also' por naturalidad y mantuvo el énfasis personal y el 'also' final. En español se reflejan esos matices con una sola aparición de 'también' vinculada a 'tú mismo', sin añadir énfasis innecesario.
  spanish_consistency_notes:
  - Se mantuvo 'corazón' para לִבְּךָ por consistencia con la antropología bíblica hebrea.
  - Se prefirió 'maldecido' frente a opciones más suaves para respetar la fuerza del verbo, dejando la amplitud semántica en la nota.
  - Se usó 'Porque' para la relación explicativa inicial, en paralelo con el inglés POB 'For'.
