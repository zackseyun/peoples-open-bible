translation:
  language: es
  text: 'Y los hijos de Bela: Ezbón[a], Uzzi, Uzziel, Jerimot e Iri; cinco jefes de casas paternas, hombres de gran valor; y su inscripción genealógica fue de veintidós mil treinta y cuatro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “su registro genealógico” o “su inscripción por genealogía”. El término hebreo se refiere a ser consignado en registros genealógicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: En contexto genealógico, בנים puede ampliarse a “descendientes”, pero aquí sigue una lista nominal de varones concretos; “hijos de” conserva la relación genealógica de forma natural en español.
- source_word: בֶלַע
  english_pob_choice: Bela
  chosen_spanish: Bela
  lexicon: Nombre propio
  rationale: Nombre propio transliterado.
- source_word: אֶצְבּוֹן
  english_pob_choice: Ezbon
  chosen_spanish: Ezbón
  alternatives_spanish:
  - Ezbun
  - Azzbón
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio con acento gráfico para la lectura española. La forma inglesa auditable es Ezbon; “Ezbón” refleja directamente la base consonántica hebrea y adapta la prosodia al español.
- source_word: עֻזִּי
  english_pob_choice: Uzzi
  chosen_spanish: Uzzi
  lexicon: Nombre propio
  rationale: Transliteración directa y ampliamente inteligible en español bíblico.
- source_word: עֻזִּיאֵל
  english_pob_choice: Uzziel
  chosen_spanish: Uzziel
  lexicon: Nombre propio
  rationale: Nombre propio transliterado; se mantiene la forma próxima al hebreo y al uso bíblico tradicional.
- source_word: וִירִימ֨וֹת
  english_pob_choice: Jerimoth
  chosen_spanish: Jerimot
  alternatives_spanish:
  - Jerimoth
  lexicon: Nombre propio
  rationale: Se adapta la terminación para una lectura española más natural. El audit trail inglés conserva Jerimoth; “Jerimot” es una transliteración más directa al español sin alterar la identificación del nombre.
- source_word: וְעִירִ֜י
  english_pob_choice: Iri
  chosen_spanish: Iri
  alternatives_spanish:
  - Irri
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de modo simple y reconocible.
- source_word: חֲמִשָּׁה
  english_pob_choice: five
  chosen_spanish: cinco
  lexicon: HALOT
  rationale: Número cardinal literal que modifica la lista de nombres.
- source_word: רָאשֵׁי בֵּית אָבוֹת
  english_pob_choice: heads of fathers’ houses
  chosen_spanish: jefes de casas paternas
  alternatives_spanish:
  - cabezas de casas paternas
  - jefes de casas ancestrales
  lexicon: HALOT
  rationale: “Jefes” preserva la metáfora de liderazgo; “casas paternas” reproduce el sintagma técnico de clan/linaje sin sustituirlo por un equivalente eclesiástico o sociológico más interpretativo.
- source_word: גִּבּוֹרֵי חֲיָלִים
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - guerreros valientes
  - hombres poderosos y valerosos
  lexicon: HALOT
  rationale: En español, “mighty men of valor” puede sonar redundante o arcaizante. “Hombres valientes” conserva la fuerza militar y la valoración de capacidad sin endurecer innecesariamente la expresión.
- source_word: וְהִתְיַחְשָׂם
  english_pob_choice: their genealogical enrollment
  chosen_spanish: su inscripción genealógica
  alternatives_spanish:
  - su registro genealógico
  - su enrolamiento genealógico
  - su genealogía
  lexicon: HALOT
  rationale: El hitpael de יחס en Crónicas remite a quedar inscritos/registrados por genealogía. “Inscripción genealógica” mantiene el valor documental del término y evita reducirlo a “genealogía”, que perdería la idea de registro formal.
- source_word: עֶשְׂרִים וּשְׁנַיִם אֶלֶף וּשְׁלֹשִׁים וְאַרְבָּעָה
  english_pob_choice: twenty-two thousand and thirty-four
  chosen_spanish: veintidós mil y treinta y cuatro
  alternatives_spanish:
  - '22.034'
  - veintidós mil treinta y cuatro
  lexicon: HALOT
  rationale: Se mantiene el número en palabras, conforme al registro literario de la fuente inglesa y al estilo bíblico de listas censales.
theological_decisions:
- issue: Valor del término técnico de registro genealógico
  english_pob_reading: their genealogical enrollment
  chosen_spanish_reading: su inscripción genealógica
  alternative_spanish_readings:
  - su genealogía
  - su registro por genealogía
  rationale: 'La cuestión no es doctrinal en sentido estricto, pero sí metodológica: el hebreo no solo nombra una genealogía abstracta, sino una inscripción en registros. La traducción elegida preserva esa tensión documental.'
  doctrine_reference: Chronicles genealogy/register terminology (textual-historical precision)
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al marcador [a] dentro del texto español. No se introdujeron notas sin anclaje y se mantuvo la lectura de alta concordancia con el audit trail inglés.
  spanish_consistency_notes:
  - Se usó “hijos de” para בני en contexto genealógico, manteniendo naturalidad y precisión.
  - Se evitó “SEÑOR” para no ocultar el nombre divino, aunque este versículo no lo contiene.
  - La lista de nombres propios se conservó en transliteración directa, con adaptación mínima al español solo donde mejora la lectura.
  - Se prefirió una fórmula documental para וְהִתְיַחְשָׂם que preserve el matiz de registro formal.
