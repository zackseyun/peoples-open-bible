base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/033/020.yaml
  text: 'And of Gad he said: “Blessed is he who enlarges Gad[a]. He dwells like a lioness, and tears off arm[c][b], even scalp.”'
  footnotes:
  - marker: a
    text: Or 'Blessed be he who enlarges Gad'; the subject may be understood implicitly as God, though the Hebrew does not state it explicitly.
    reason: alternative_reading
  - marker: b
    text: '''Like a lioness'' may also be rendered ''like a lion''; the Hebrew term can denote a powerful lion more generally.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'arm, even crown of the head.'
    reason: lexical_alternative
