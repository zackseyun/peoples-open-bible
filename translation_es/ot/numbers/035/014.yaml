    rationale: Ambas opciones son fieles, pero «al otro lado del Jordán» es más idiomática y directa en español general sin perder la neutralidad geográfica del hebreo.
  revised_spanish_text: Asignarán[a] tres de las ciudades al otro lado del Jordán[b], y tres de las ciudades en la tierra de Canaán; serán ciudades de refugio.
