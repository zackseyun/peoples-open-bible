translation:
  language: es
  text: 'A los buenos ciudadanos judíos: muchas salutaciones, salud y prosperidad[b]. Rey Antíoco y general[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego pone el nombre y los títulos del remitente después de la fórmula de saludo. Se ha mantenido ese orden marcado en español; por eso la identificación aparece al final.
    reason: cultural_note
  - marker: b
    text: «Prosperidad» traduce εὖ πράττειν en el sentido de «ir bien». También podría entenderse como «bienestar».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῖς χρηστοῖς
  english_pob_choice: to the good
  chosen_spanish: a los buenos
  alternatives_spanish:
  - a los bondadosos
  - a los dignos
  lexicon: LSJ
  rationale: χρηστός en este saludo epistolar expresa aprobación de los destinatarios; «buenos» conserva la valoración positiva de forma natural en español sin sobrerinterpretar cualidades morales específicas.
- source_word: Ἰουδαίοις
  english_pob_choice: Jewish
  chosen_spanish: judíos
  alternatives_spanish:
  - judeanos
  lexicon: LSJ
  rationale: En 2 Macabeos el término designa al pueblo judío; «judíos» es la equivalencia más clara y fiel para el contexto de la salutación.
- source_word: τοῖς πολίταις
  english_pob_choice: citizens
  chosen_spanish: ciudadanos
  alternatives_spanish:
  - compatriotas
  - miembros de la ciudad
  lexicon: LSJ
  rationale: πολίτης significa «ciudadano»; «ciudadanos» conserva el tono formal del saludo y evita explicaciones innecesarias.
- source_word: πολλὰ χαίρειν
  english_pob_choice: many greetings
  chosen_spanish: muchas salutaciones
  alternatives_spanish:
  - muchos saludos
  - muchas gracias
  lexicon: LSJ
  rationale: La fórmula es epistolar; «muchas salutaciones» transmite el plural intensivo de πολλά y mantiene un registro elevado y comprensible en español.
- source_word: ὑγιαίνειν
  english_pob_choice: health
  chosen_spanish: salud
  alternatives_spanish:
  - bienestar
  - buena salud
  lexicon: LSJ
  rationale: En esta secuencia de deseos, el infinitivo griego funciona como saludo de bienestar. «Salud» es la forma española más breve y natural para ese deseo.
- source_word: εὖ πράττειν
  english_pob_choice: prosperity
  chosen_spanish: prosperidad
  alternatives_spanish:
  - bienestar
  - que les vaya bien
  lexicon: LSJ
  rationale: εὖ πράττειν significa «andar bien / ir bien»; en una fórmula de cortesía, «prosperidad» comunica adecuadamente el deseo de que les vaya bien.
- source_word: βασιλεὺς Ἀντίοχος καὶ στρατηγὸς
  english_pob_choice: King Antiochus and general
  chosen_spanish: Rey Antíoco y general
  alternatives_spanish:
  - Antíoco, rey y general
  - el rey Antíoco y general
  lexicon: LSJ
  rationale: La construcción griega coloca el nombre y los títulos del remitente después del saludo. Se conserva el orden marcado con una formulación española natural, sin suavizar la aposición titular.
translation_notes:
  revision_awareness: Se siguió el paquete griego de Swete (1909) y el audit trail inglés sin introducir cambios textuales adicionales; la principal decisión de estilo fue naturalizar la fórmula epistolar en español manteniendo el orden griego del remitente.
  spanish_consistency_notes:
  - Se usó «salud» como equivalente breve de ὑγιαίνειν dentro de la fórmula de saludo.
  - Se mantuvo «Rey Antíoco» y no «Antíoco el rey» para conservar la aposición titulativa sin sonar forzado en español.
  - No se introdujo «Cristo» ni terminología eclesial ajena al pasaje; el registro sigue siendo el de una salutación diplomática/epistolar.
