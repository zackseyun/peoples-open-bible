    text: 'O: «en unidad».'
    reason: previous_rendering
  revision_rationale: Se revisa únicamente el encabezado a 'Cántico de las subidas' para mejorar la naturalidad y legibilidad del español sin apartarse del sentido de שיר המעלות. Se conserva el resto del versículo porque refleja adecuadamente el hebreo y la auditoría inglesa final. La nota c se mantiene, pero su razón se ajusta a 'previous_rendering' para reflejar mejor que 'en unidad' es una alternativa de tradición/renderizado previo, no la opción principal preferida.
