    rationale: Dado que הִגַּשְׁתֶּם se auditó como «Did you bring», una solución como «¿Me trajeron...?» suena más natural en español y refleja mejor la decisión documentada sin perder el matiz cultual.
  revised_spanish_text: ¿Me trajeron sacrificios y ofrendas[a] en el desierto durante cuarenta años, casa de Israel?
