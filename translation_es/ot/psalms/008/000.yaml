translation:
  language: es
  text: Al director del coro[a]; según la Gitit[b]. Salmo de David[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo לַמְנַצֵּחַ; en los salmos suele indicar al responsable de la interpretación musical, no simplemente a un «líder» genérico.
    reason: cultural_note
  - marker: b
    text: Hebreo הַגִּתִּית; el término es oscuro y probablemente designa una indicación musical, quizá una melodía, un instrumento o un patrón de ejecución.
    reason: lexical_alternative
  - marker: c
    text: O «por David» o «para David». El hebreo «de David» puede indicar autoría, asociación o dedicatoria.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director del coro
  - Al músico principal
  - Para el director musical
  lexicon: HALOT
  rationale: En los encabezados de salmos, el participio designa al responsable de la ejecución musical. 'Director del coro' comunica de manera clara y natural la función litúrgico-musical sin volverlo más técnico de lo que permite el hebreo.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - de acuerdo con
  - sobre
  - para
  lexicon: HALOT
  rationale: En una superscripción musical, la preposición introduce una indicación de ejecución o referencia a un término técnico. 'Según' conserva esa relación sin decidir indebidamente si se trata de instrumento, melodía o patrón musical.
- source_word: הַגִּתִּית
  english_pob_choice: the Gittith
  chosen_spanish: la Guitit
  alternatives_spanish:
  - la Gitit
  - el instrumento gitita
  - la melodía Gitit
  lexicon: HALOT
  rationale: El referente exacto es incierto; por eso se translitera. 'Guitit' intenta reflejar la forma hebrea con una ortografía española natural, preservando la opacidad semántica del término.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Canción
  - Melodía
  lexicon: HALOT
  rationale: '''Salmo'' es el equivalente estándar y más preciso para este rótulo genérico en los encabezados bíblicos.'
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: '''De David'' conserva la ambigüedad del hebreo entre autoría, asociación o dedicación, sin resolverla prematuramente. Es el correlato natural de ''of David'' en español.'
theological_decisions:
- issue: Relación de לְדָוִד con David
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: La superscripción hebrea no obliga a una sola relación precisa. Mantener 'de David' preserva la tensión interpretativa y no cierra la cuestión histórica o composicional más allá de lo que el texto demuestra.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El contexto inglés revisó la puntuación para unir las indicaciones musicales en una sola superscripción: “For the choir director; according to the Gittith. A psalm of David.” La versión española sigue esa estructura unificada con punto y coma, manteniendo la relación entre las dos primeras indicaciones antes del título principal.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el texto no contiene el Tetragrámaton.
  - Se prefirió 'salmo' por ser el rótulo de género más transparente en español.
  - '''Guitit'' conserva la incertidumbre del término hebreo sin explicarlo excesivamente en el cuerpo del texto.'
  - '''de David'' mantiene la ambigüedad del hebreo לְ sin forzar una decisión de autoría.'
