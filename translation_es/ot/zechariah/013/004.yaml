translation:
  language: es
  text: Y en aquel día los profetas se avergonzarán cada uno de su visión cuando profetice, y no se pondrán un manto de pelo[a] para engañar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''un manto de cabello'' o ''una vestidura de pelo''. La expresión alude a una prenda áspera asociada con la apariencia profética.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''para mentir''. El verbo hebreo puede denotar falsedad o engaño; aquí se refiere al uso de vestimenta profética para inducir a error.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: Y ... se avergonzarán
  alternatives_spanish:
  - Y sucederá
  - Y acontecerá
  lexicon: WLC/HALOT
  rationale: En español, la fórmula profética se expresa con naturalidad mediante una apertura narrativa breve; aquí el verbo principal del verso ya lleva la carga temporal y discursiva, así que una introducción sobria con 'Y' conserva el arranque del hebreo sin sonar forzado.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en aquel tiempo
  lexicon: WLC/HALOT
  rationale: '''En aquel día'' es la equivalencia española más estable para la fórmula profética y conserva el valor escatológico/marker temporal del hebreo.'
- source_word: יֵבֹשׁוּ
  english_pob_choice: will ... be ashamed
  chosen_spanish: se avergonzarán
  alternatives_spanish:
  - serán avergonzados
  - quedarán avergonzados
  lexicon: WLC/HALOT
  rationale: El verbo hebreo expresa vergüenza o deshonra. 'Se avergonzarán' mantiene el sentido reflexivo y es idiomático en español sin imponer de entrada la idea de una vergüenza meramente externa.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los videntes
  - los que profetizan
  lexicon: WLC/HALOT
  rationale: Se conserva el sustantivo directo del hebreo. No se añade 'falsos' en el texto principal porque el verso dice 'profetas'; la evaluación contextual queda implícita en el pasaje mayor.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - uno por uno
  lexicon: WLC/HALOT
  rationale: El distributivo hebreo se vierte de forma natural con 'cada uno', que preserva la individualización sin cargar el español con redundancia.
- source_word: מֵחֶזְיֹנוֹ
  english_pob_choice: of his vision
  chosen_spanish: de su visión
  alternatives_spanish:
  - acerca de su visión
  - por su visión
  lexicon: WLC/HALOT
  rationale: '''De su visión'' reproduce la relación semántica básica sin decidir de manera excesiva si la vergüenza es por el contenido, por la falsa revelación o por el desmentido de la visión.'
- source_word: בְּהִנָּבְאֹתוֹ
  english_pob_choice: when he prophesies
  chosen_spanish: cuando profetice
  alternatives_spanish:
  - mientras profetiza
  - al profetizar
  lexicon: WLC/HALOT
  rationale: El infinitivo con prefijo temporal se expresa con 'cuando profetice', que mantiene la idea de simultaneidad/ocasión. Se usa subjuntivo futuro por el valor prospectivo del contexto.
- source_word: וְלֹא יִלְבְּשׁוּ
  english_pob_choice: and they will not put on
  chosen_spanish: y no se pondrán
  alternatives_spanish:
  - y no vestirán
  - y no llevarán
  lexicon: WLC/HALOT
  rationale: '''Ponerse'' es la forma natural en español para adoptar una prenda. Conserva la intención deliberada de vestir cierto atuendo identificador.'
- source_word: אַדֶּרֶת שֵׂעָר
  english_pob_choice: a hairy cloak
  chosen_spanish: un manto de pelo
  alternatives_spanish:
  - un manto de cabello
  - una vestidura de pelo
  lexicon: WLC/HALOT
  rationale: La expresión hebrea describe una prenda externa de pelo o pelo áspero. 'Manto de pelo' mantiene la concreción del objeto y evita una glosa interpretativa más amplia; el sentido alternativo se documenta en nota.
- source_word: לְמַעַן כַּחֵשׁ
  english_pob_choice: in order to deceive
  chosen_spanish: para engañar
  alternatives_spanish:
  - para mentir
  - para falsear
  lexicon: WLC/HALOT
  rationale: El infinitivo final de כחש puede abarcar mentir o engañar. En este contexto de vestimenta profética usada como fachada, 'engañar' transmite el efecto pretendido sin restringir innecesariamente el matiz verbal.
theological_decisions:
- issue: Si identificar explícitamente a los profetas como falsos en el texto principal
  english_pob_reading: Retain 'the prophets' without adding 'false'
  chosen_spanish_reading: Conservar 'los profetas' sin añadir 'falsos'
  alternative_spanish_readings:
  - los falsos profetas
  rationale: El contexto amplio denuncia la profecía falsa, pero este versículo nombra simplemente a 'los profetas'. Mantener el sustantivo sin calificativo respeta el alcance explícito del hebreo y preserva la tensión contextual para que la interpretación surja del pasaje completo.
  doctrine_reference: 'Principio de fidelidad textual: no resolver interpretaciones contextuales añadiendo contenido que el verso no dice de manera explícita.'
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registraron cambios sustantivos en la solución inglesa; la versión española mantiene esa lectura alta en acuerdo y conserva el mismo conjunto de decisiones léxicas y teológicas, adaptándolas a un español natural y publicable.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Profetas'' se mantiene sin intensificador interpretativo, coherente con la cautela del POB.'
  - '''Engañar'' refleja la finalidad de la conducta externa descrita por el hebreo, en línea con la nota inglesa sobre ''deceive''.'
  - La puntuación y el orden mantienen el paralelismo del hebreo sin sonar calcado.
