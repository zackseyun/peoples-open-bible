review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del hebreo: sembrar en el octavo año, comer del producto almacenado/viejo hasta el noveno, y seguir comiendo lo viejo hasta que llegue la cosecha de ese año. También conserva correctamente la repetición de יָשָׁן. Sin embargo, varias elecciones léxicas suenan poco naturales o imprecisas en español bíblico claro.'
  spanish_quality_summary: La redacción es comprensible, pero 'producto viejo' y 'su producto' suenan mecánicos y poco idiomáticos en este contexto agrícola. 'Lo viejo' funciona, pero en combinación con 'producto' produce una mezcla menos natural que 'cosecha antigua' / 'lo antiguo'. Además, 'año octavo' y 'año noveno' son posibles, pero 'octavo año' y 'noveno año' suenan más naturales en español general contemporáneo.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. La revisión propuesta mejora la naturalidad de תְּבוּאָה como 'cosecha' y mantiene יָשָׁן con una nota que preserve la elipsis hebrea ('antigua' / 'lo antiguo').
  issues:
  - severity: medium
    issue: '''producto'' para תְּבוּאָה suena poco natural en este contexto'
    rationale: Aunque semánticamente posible, en un pasaje agrícola y de ciclos anuales 'cosecha' expresa mejor la producción del campo y la disponibilidad de alimentos.
  - severity: medium
    issue: '''su producto'' es una referencia pronominal correcta pero torpe en español'
    rationale: El hebreo permite la referencia breve 'su produce', pero en español 'la cosecha de ese año' o 'su cosecha' suena más claro; aquí conviene explicitar 'de ese año' para evitar rigidez y posible ambigüedad.
  - severity: low
    issue: '''año octavo/noveno'' resulta menos natural que ''octavo/noveno año'''
    rationale: No es incorrecto, pero la sintaxis ordinal preferida en español contemporáneo y eclesial legible suele ser 'octavo año'.
  - severity: low
    issue: La nota al pie debe ajustarse al nuevo léxico español
    rationale: Si se reemplaza 'viejo' por 'antigua/lo antiguo', la nota debe reflejar con precisión la alternativa y la elipsis del hebreo.
  revised_spanish_text: Sembrarán en el octavo año y comerán de la cosecha antigua hasta el noveno año; hasta que llegue la cosecha de ese año[a], comerán lo antiguo.
  revised_footnotes:
  - marker: a
    text: O 'lo antiguo' también en la primera expresión. En hebreo, en ambos casos el texto dice simplemente 'viejo/antiguo', y el sustantivo se sobreentiende por el contexto.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el español para sonar más natural y preciso en un contexto agrícola: תְּבוּאָה se vierte mejor como ''cosecha'' que como ''producto''; se mejora la fluidez con ''octavo año/noveno año''; y se mantiene la repetición de יָשָׁן mediante ''antigua'' / ''lo antiguo'', conservando en nota que el hebreo dice solo ''viejo/antiguo''. No se requiere adjudicación adicional.'
