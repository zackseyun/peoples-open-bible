translation:
  language: es
  text: Los burladores inflaman[a][b] una ciudad, pero los sabios apartan la ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Inflaman» conserva la metáfora del hebreo: no solo «causan problemas», sino que provocan o avivan un conflicto público.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «prenden fuego a una ciudad»; el verbo hebreo admite una imagen de encender o agitar violentamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי לָצוֹן
  english_pob_choice: Mockers
  chosen_spanish: los hombres de burla
  alternatives_spanish:
  - los burladores
  - los escarnecedores
  - los que se burlan
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente ‘hombres de burla / escarnio’. En español, ‘los hombres de burla’ conserva el sustantivo de cualidad y el tono proverbial; ‘burladores’ sería más idiomático, pero diluye un poco la estructura nominal del hebreo.
- source_word: יָפִיחוּ
  english_pob_choice: inflame
  chosen_spanish: inflaman
  alternatives_spanish:
  - prenden fuego a
  - encienden
  - avivan
  lexicon: HALOT
  rationale: El verbo está usado de forma metafórica. ‘Inflaman’ preserva la imagen de avivar o provocar una ciudad, sin reducirlo a una simple acción física ni perder el valor figurado de agitación cívica.
- source_word: קִרְיָה
  english_pob_choice: a city
  chosen_spanish: una ciudad
  alternatives_spanish:
  - un pueblo
  - una villa
  lexicon: HALOT
  rationale: ‘Ciudad’ es el equivalente natural y suficiente en español para קִרְיָה en este contexto sapiencial; ‘pueblo’ o ‘villa’ rebajarían la escala social implícita.
- source_word: חֲכָמִים
  english_pob_choice: wise men
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - los prudentes
  - los que son sabios
  lexicon: HALOT
  rationale: En español, ‘los sabios’ expresa con naturalidad el plural masculino genérico del hebreo y mantiene el paralelo directo con el sujeto anterior. ‘Los hombres sabios’ sería más explícito, pero menos fluido.
- source_word: יָשִׁיבוּ
  english_pob_choice: turn away
  chosen_spanish: apartan
  alternatives_spanish:
  - hacen retroceder
  - reprimen
  - desvían
  lexicon: HALOT
  rationale: El Hiphil de שוב con אָף como objeto sugiere hacer retroceder o desviar la ira. ‘Apartan’ conserva esa fuerza verbal y funciona bien en español, sin sobreexplicar el mecanismo.
- source_word: אָף
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - la cólera
  - el furor
  lexicon: HALOT
  rationale: ‘Ira’ recoge el sentido bíblico más solemne y concentrado de אָף. ‘Enojo’ sería más coloquial; ‘cólera’ y ‘furor’ sonarían más intensos de lo que el proverbio exige.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo de Proverbios 29:8 y el audit trail inglés: se mantiene la metáfora verbal de יָפִיחוּ y el contraste antitético con חֲכָמִים יָשִׁיבוּ אָף. No se introdujeron revisiones textuales ni tensiones doctrinales adicionales en este versículo.'
  spanish_consistency_notes:
  - Se usa ‘sabios’ para חֲכָמִים, coherente con el plural masculino del hebreo y con un español natural.
  - Se evita ‘SEÑOR’ porque el versículo no contiene el nombre divino.
  - Se mantiene ‘ira’ para אָף para conservar un registro bíblico sobrio y evitar una paráfrasis más débil.
  - ‘Inflaman’ preserva el valor metafórico y no lo reduce a una explicación interpretativa.
