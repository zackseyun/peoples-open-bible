translation:
  language: es
  text: Y el pueblo de Israel y de Judá, que habitaba en las ciudades de Judá, también trajo el diezmo del ganado vacuno y de las ovejas, y el diezmo de las cosas santas[a], consagradas a Yahvé su Dios; y las pusieron en montones[b], montón tras montón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el diezmo de las cosas consagradas»; o «el diezmo de los dones santos». El hebreo probablemente se refiere a bienes u ofrendas dedicados a Dios como santos.
    reason: lexical_alternative
  - marker: b
    text: O «en montones, montón tras montón». La repetición hebrea intensifica la imagen de una gran acumulación.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי יִשְׂרָאֵל וִיהוּדָה
  english_pob_choice: the people of Israel and Judah
  chosen_spanish: los hijos de Israel y de Judá
  alternatives_spanish:
  - el pueblo de Israel y de Judá
  - los israelitas y los de Judá
  lexicon: HALOT
  rationale: בני puede significar literalmente «hijos/descendientes», pero aquí designa al grupo corporativo. En español, «los hijos de Israel y de Judá» conserva la forma bíblica sin reducirla a una mera paráfrasis, y sigue siendo natural en registro bíblico.
- source_word: הַיֹּשְׁבִים בְּעָרֵי יְהוּדָה
  english_pob_choice: who lived in the cities of Judah
  chosen_spanish: los que habitaban en las ciudades de Judá
  alternatives_spanish:
  - los que vivían en las ciudades de Judá
  - los residentes en las ciudades de Judá
  lexicon: HALOT
  rationale: El participio de ישב expresa residencia estable. «Habitaban» mantiene un tono bíblico claro y fiel, y «ciudades» refleja directamente עָרֵי.
- source_word: גַּם הֵם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - ellos también
  - incluso ellos
  lexicon: HALOT
  rationale: La partícula intensifica la inclusión de este grupo en la acción. «También» comunica bien el matiz aditivo sin sobrecargar la sintaxis española.
- source_word: מַעְשַׂר
  english_pob_choice: tithe
  chosen_spanish: diezmo
  alternatives_spanish:
  - tenta parte
  - décima parte
  lexicon: HALOT
  rationale: En contexto cultual, el término técnico español más estable es «diezmo», que conserva el valor religioso e institucional del hebreo.
- source_word: בָּקָר וָצֹאן
  english_pob_choice: cattle and sheep
  chosen_spanish: ganado vacuno y de ovejas
  alternatives_spanish:
  - bueyes y ovejas
  - ganado y rebaño
  lexicon: HALOT
  rationale: בקר se expresa con precisión como «ganado vacuno». צאן es un colectivo de pequeños animales domésticos; «de ovejas» sigue la solución del POB inglés y resulta idiomático y claro en español, aunque «rebaño» sería más general.
- source_word: וּמַעְשַׂר קָדָשִׁים
  english_pob_choice: and the tithe of the holy things
  chosen_spanish: y el diezmo de las cosas santas
  alternatives_spanish:
  - y el diezmo de las cosas consagradas
  - y el diezmo de los dones santos
  lexicon: HALOT
  rationale: קָדָשִׁים aquí apunta a cosas puestas aparte para Dios. «Cosas santas» preserva la amplitud del hebreo y deja abierta la posible referencia a ofrendas o bienes dedicados.
- source_word: הַמְקֻדָּשִׁים
  english_pob_choice: consecrated
  chosen_spanish: consagradas
  alternatives_spanish:
  - dedicadas
  - santificadas
  lexicon: HALOT
  rationale: El participio pasivo de קדש indica que esas cosas han sido apartadas para Dios. «Consagradas» conserva bien el matiz cultual y evita rebajar la fuerza técnica del término.
- source_word: לַיהוָה אֱלֹהֵיהֶם
  english_pob_choice: to Yahweh their God
  chosen_spanish: a Yahvé su Dios
  alternatives_spanish:
  - para Yahvé su Dios
  - a Yahvé, su Dios
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» según la norma del proyecto para יהוה. La preposición ל se vierte naturalmente como «a» en el contexto de entrega de bienes consagrados.
- source_word: הֵבִיאוּ
  english_pob_choice: brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - presentaron
  - llevaron
  lexicon: HALOT
  rationale: El hiphil de בוא expresa traer algo hacia un lugar. «Trajeron» es una solución directa, natural y fiel al movimiento narrativo.
- source_word: וַיִּתְּנוּ
  english_pob_choice: they laid them
  chosen_spanish: las pusieron
  alternatives_spanish:
  - las colocaron
  - las depositaron
  lexicon: HALOT
  rationale: נתן aquí describe el acto de colocar los bienes en montones. «Las pusieron» funciona bien en español y evita añadir interpretaciones no presentes en el hebreo.
- source_word: עֲרֵמוֹת עֲרֵמוֹת
  english_pob_choice: in heaps, heap upon heap
  chosen_spanish: en montones, montón tras montón
  alternatives_spanish:
  - en montones, montón sobre montón
  - en muchos montones
  lexicon: HALOT
  rationale: La repetición intensifica la imagen de apilar en gran cantidad. «Montones, montón tras montón» reproduce el efecto de acumulación sin sonar rígido en español. Se conserva la duplicación para no perder la intensificación hebrea.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton. Conforme a la terminología base del proyecto, se traduce como «Yahvé» para preservar el nombre de pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nature of קָדָשִׁים הַמְקֻדָּשִׁים
  english_pob_reading: the holy things consecrated to Yahweh their God
  chosen_spanish_reading: las cosas santas, consagradas a Yahvé su Dios
  alternative_spanish_readings:
  - los objetos santos consagrados a Yahvé su Dios
  - las ofrendas santas consagradas a Yahvé su Dios
  rationale: El hebreo es amplio y puede referirse a bienes u ofrendas dedicadas. «Cosas santas» conserva esa amplitud sin forzar una especificación que el verso no exige.
  doctrine_reference: HALOT / lexical context in 2 Chr 31:6
translation_notes:
  revision_awareness: The Spanish draft follows the latest English revision that restored «in heaps, heap upon heap» and preserves the repeated Hebrew noun with an intensified Spanish equivalent. It also keeps the audited preference for a reverent, direct rendering of the divine name and the cultic vocabulary, while avoiding an over-specific expansion of קָדָשִׁים beyond what the source warrants.
  spanish_consistency_notes:
  - Usar «Yahvé» de manera consistente para יהוה.
  - Mantener «diezmo» para מַעְשַׂר en contextos cultuales.
  - Conservar «consagradas/consagrados» para קדש cuando el contexto sea de apartamiento sagrado.
  - Preservar la duplicación enfática hebrea con una duplicación española natural, no meramente explicativa.
  - Evitar alternar innecesariamente entre «hijos» y «pueblo» en contextos corporativos dentro de la misma perícopa.
