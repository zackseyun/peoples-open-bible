translation:
  language: es
  text: En el tercer año, Josafat, rey de Judá, bajó al encuentro del rey de Israel.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendió adonde estaba el rey de Israel». El verbo hebreo literalmente significa «bajó» y puede reflejar elevación geográfica además de un simple desplazamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: In
  chosen_spanish: En
  alternatives_spanish:
  - Y aconteció
  - Ahora bien
  lexicon: HALOT
  rationale: El hebreo introduce la referencia temporal del relato. En español, comenzar con «En» mantiene la función narrativa sin añadir una fórmula más pesada que no aporta contenido adicional.
- source_word: בַּשָּׁנָה הַשְּׁלִישִׁית
  english_pob_choice: the third year
  chosen_spanish: el tercer año
  alternatives_spanish:
  - en el tercer año
  lexicon: HALOT
  rationale: La expresión temporal se conserva de forma directa. El español admite el sintagma nominal con artículo definido igual que el inglés auditado, y comunica con claridad el marco cronológico.
- source_word: וַיֵּרֶד
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - fue hacia abajo
  lexicon: HALOT
  rationale: El verbo hebreo ירד significa literalmente «bajar/descender». En español, «bajó» preserva esa dirección y resulta natural en una narración histórica. Se evita «fue» porque borraría la imagen espacial que el hebreo deja abierta.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  lexicon: standard Spanish biblical proper-name usage
  rationale: Se emplea la forma tradicional y reconocible en español, que corresponde al nombre hebreo transliterado y es ampliamente entendible para lectores eclesiales hispanohablantes.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: La cadena constructa se expresa naturalmente como «rey de Judá». Se mantiene el valor titular y político sin sobrecargar la frase con un artículo innecesario.
- source_word: אֶל מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: to the king of Israel
  chosen_spanish: al rey de Israel
  alternatives_spanish:
  - hacia el rey de Israel
  - al rey de Israel
  lexicon: HALOT
  rationale: אֶל marca dirección hacia una persona. En español, la contracción «al» comunica con naturalidad el movimiento/dirigirse hacia el rey de Israel, manteniendo la referencia política formal.
theological_decisions:
- issue: La dirección verbal «bajó» puede implicar topografía además de simple viaje
  english_pob_reading: The Hebrew verb literally means 'went down' and may reflect geographical elevation as well as simple travel.
  chosen_spanish_reading: «bajó» conserva la imagen espacial sin decidir si el énfasis es geográfico o meramente narrativo.
  alternative_spanish_readings:
  - descendió
  - fue al rey de Israel
  rationale: No se elimina la tensión interpretativa del hebreo. «Bajó» deja abierta la posibilidad de una bajada real desde Judá/Jerusalén hacia Israel/Samaria, como indica el audit trail inglés, sin forzar una explicación en el texto principal.
  doctrine_reference: Topografía narrativa bíblica; fidelidad semántica al verbo hebreo
translation_notes:
  revision_awareness: El pasaje revisado más reciente indica que no hubo cambios necesarios y el cruce de control mostró alta concordancia; por eso la redacción española sigue de cerca el audit trail inglés, manteniendo la imagen verbal de ירד y una sintaxis fluida en español.
  spanish_consistency_notes:
  - Se usa «Judá» e «Israel» como nombres geográficos/políticos estables en español bíblico.
  - Se mantiene «rey de Israel» en minúsculas para el título común, conforme a uso editorial bíblico en español.
  - La nota al pie conserva la alternativa lexical documentada por la POB inglesa sin introducir lecturas adicionales.
