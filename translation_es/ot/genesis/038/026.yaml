revisions:
- from: 'Entonces Judá lo reconoció y dijo: “Ella es más justa que yo[a], porque no la di a Shelah, mi hijo”. Y no volvió a conocerla[b].'
  to: 'Entonces Judá los reconoció y dijo[a]: «Ella es más justa que yo, porque no la di a Shelah, mi hijo». Y no volvió a conocerla[b].'
  rationale: Se cambia «lo reconoció» por «los reconoció» para reflejar fielmente el objeto implícito plural del contexto narrativo inmediato, en línea con la decisión auditada en inglés. Se conserva «más justa que yo» por su vínculo con צדק y «conocerla» por preservar el eufemismo hebreo. También se ajusta la puntuación para un español más natural. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
