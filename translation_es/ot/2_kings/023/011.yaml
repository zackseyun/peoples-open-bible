base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/011.yaml
  text: He removed the horses that the kings of Judah had dedicated to the sun[a], from the entrance of the house of Yahweh to the chamber of Nethan-melech the court official, which was in the precincts[b]; and he burned the chariots of the sun with fire.
  footnotes:
  - marker: a
    text: Or 'the eunuch'; the Hebrew term can denote either a eunuch or a royal/court official.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'precincts' is rare and may refer to an outlying or peripheral part of the temple complex; alternatives include 'suburbs' or 'colonnades.'
    reason: lexical_alternative
