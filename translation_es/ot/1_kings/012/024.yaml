revisions:
- from: 'Así dice Yahvé: «No suban ni peleen[a] contra sus hermanos, los hijos de Israel. Vuélvase cada uno a su casa, porque esta cosa[b] viene de mí». Y escucharon la palabra de Yahvé, y volvieron para ir conforme a la palabra de Yahvé.'
  to: 'Así dice Yahvé: «No suban ni peleen[a] contra sus hermanos, los hijos de Israel. Vuelvan, cada uno a su casa[c], porque este asunto[b] es de mí». Y escucharon la palabra de Yahvé, y se volvieron para irse conforme a la palabra de Yahvé.'
  rationale: 'La revisión corrige tres puntos principales: (1) cambia «Vuélvase» por «Vuelvan» para reflejar el imperativo plural hebreo y mantener la distribución con «cada uno»; (2) sustituye «esta cosa viene de mí» por «este asunto es de mí», que es más natural en español y más cercano al ajuste de la auditoría inglesa; y (3) mejora «volvieron para ir» a «se volvieron para irse», que conserva la doble acción hebrea con mejor fluidez. También se añade la nota cultural sobre «hermanos» preservada en la auditoría inglesa.'
