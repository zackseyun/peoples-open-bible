translation:
  language: es
  text: 'Maldito[a] el que desplaza el lindero de su prójimo. Y todo el pueblo dirá: «Amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O tradicionalmente, «lindero». El hebreo alude al límite de una propiedad o a la marca que lo señala.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Cursed
  - Anatematizado
  - Maldito
  lexicon: HALOT
  rationale: El hebreo formula una maldición pactual/jurídica. En español, "maldito" comunica esa sentencia con naturalidad y sin el tono excesivamente litúrgico de "anatema".
- source_word: מַסִּיג
  english_pob_choice: the one who moves
  chosen_spanish: el que desplaza
  alternatives_spanish:
  - el que mueve
  - el que quita
  - el que traslada
  lexicon: HALOT
  rationale: El participio describe a la persona caracterizada por mover el límite. "Desplaza" conserva la idea de mover un lindero de su lugar sin reducirlo a una remoción total.
- source_word: גְּבוּל
  english_pob_choice: boundary marker
  chosen_spanish: lindero
  alternatives_spanish:
  - límite
  - marca de límite
  - mojón
  lexicon: HALOT
  rationale: En contexto jurídico-rural, "lindero" es una forma clara y natural para el límite de una propiedad. Mantiene la referencia concreta del hebreo mejor que un abstracto general.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor’s
  chosen_spanish: de su prójimo
  alternatives_spanish:
  - de su vecino
  - de su compañero
  - de su semejante
  lexicon: HALOT
  rationale: '"Prójimo" conserva el sentido relacional y comunitario del hebreo en un contexto ético-legal, sin limitarlo a la vecindad física.'
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo de Israel
  - toda la gente
  lexicon: HALOT
  rationale: El hebreo dice literalmente "todo el pueblo"; en español, la construcción singular colectiva resulta más natural que "todas las personas" y no añade lo que el texto no explicita.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: HALOT
  rationale: '"Amén" es el equivalente litúrgico consolidado en español y preserva la respuesta comunitaria del hebreo.'
theological_decisions:
- issue: Naturaleza de la maldición pactual
  english_pob_reading: Cursed is the one who moves his neighbor’s boundary marker
  chosen_spanish_reading: Maldito el que desplaza el lindero de su prójimo
  alternative_spanish_readings:
  - Anatematizado el que desplaza el lindero de su prójimo
  - Cursed is the one who moves his neighbor’s boundary marker
  rationale: La versión española debe mantener el carácter de sanción pactual y legal. "Maldito" reproduce la fuerza declarativa del juicio sin oscurecer el sentido para lectores modernos.
  doctrine_reference: Deuteronomio 27; fórmula de maldición pactual en el marco del pacto mosaico.
- issue: Respuesta comunitaria ritual
  english_pob_reading: And all the people shall say, “Amen.”
  chosen_spanish_reading: 'Y todo el pueblo dirá: «Amén»'
  alternative_spanish_readings:
  - 'Y todo el pueblo responderá: «Amén»'
  - 'Y todo el pueblo dirá: «Así sea»'
  rationale: '"Dirá" mantiene la forma fórmula-respuesta del hebreo. "Responderá" sería posible, pero el texto enfatiza la declaración coral; "Amén" conserva la respuesta litúrgica heredada.'
  doctrine_reference: Liturgia de ratificación comunitaria; respuesta afirmativa al juicio pronunciado.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el contexto inglés; la traducción española sigue de cerca la lectura auditada y conserva la tensión léxica entre un límite abstracto y un marcador concreto de propiedad.
  spanish_consistency_notes:
  - Se mantiene "Amén" como fórmula litúrgica estable.
  - '"Prójimo" refleja el valor comunitario del hebreo sin añadir especificación geográfica.'
  - '"Lindero" ofrece una solución española natural para el ámbito agrario-jurídico del pasaje.'
