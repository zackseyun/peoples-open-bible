translation:
  language: es
  text: Pero si, a su vista, la erupción escamosa ha permanecido igual, y en ella ha brotado cabello negro, la erupción escamosa está sanada; él es limpio, y el sacerdote lo declarará limpio.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el sacerdote lo dará por limpio». El verbo hebreo también puede traducirse «lo limpiará», pero aquí se refiere al dictamen formal del sacerdote después de que la afección ha sanado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעֵינָיו
  english_pob_choice: in his sight
  chosen_spanish: a su juicio
  alternatives_spanish:
  - a sus ojos
  - en su opinión
  - a la vista de él
  lexicon: HALOT
  rationale: La expresión hebrea señala la evaluación del examinador. En español, «a su juicio» conserva el matiz de valoración sin sonar forzado ni demasiado literal.
- source_word: עָמַד
  english_pob_choice: has remained unchanged
  chosen_spanish: se ha mantenido sin cambio
  alternatives_spanish:
  - ha permanecido
  - ha quedado igual
  - se ha quedado
  lexicon: HALOT
  rationale: En este contexto diagnóstico, el verbo describe una condición que no ha avanzado ni cambiado. «Se ha mantenido sin cambio» preserva ese sentido con claridad natural.
- source_word: הַנֶּתֶק
  english_pob_choice: the scaly eruption
  chosen_spanish: la tiña
  alternatives_spanish:
  - la erupción escamosa
  - la afección
  - la lesión
  lexicon: HALOT
  rationale: El término designa una afección cutánea concreta del pasaje. «Tiña» comunica una lesión visible y reconocible en español, aunque mantiene una leve tensión con la amplitud del hebreo; por eso se conserva la nota para el marcador alternativo.
- source_word: שֵׂעָר שָׁחֹר
  english_pob_choice: black hair
  chosen_spanish: cabello negro
  alternatives_spanish:
  - pelo negro
  - cabello oscuro
  lexicon: HALOT
  rationale: La traducción sigue de cerca el adjetivo hebreo «negro» y usa «cabello» como término claro y digno en español.
- source_word: צָמַח בּוֹ
  english_pob_choice: has grown in it
  chosen_spanish: ha brotado ... en ella
  alternatives_spanish:
  - ha crecido en ella
  - ha salido en ella
  - ha nacido en ella
  lexicon: HALOT
  rationale: El hebreo indica crecimiento dentro del área afectada. «Ha brotado» conserva la imagen de emergencia del cabello en la lesión, y «en ella» mantiene el referente femenino de la afección.
- source_word: נִרְפָּא
  english_pob_choice: is healed
  chosen_spanish: ha sanado
  alternatives_spanish:
  - está sanada
  - se ha curado
  - está curada
  lexicon: HALOT
  rationale: El pasivo hebreo indica que la afección ha sido restaurada a salud. «Ha sanado» es natural en español y evita reducirlo solo a una curación física mecánica.
- source_word: טָהוֹר הוּא
  english_pob_choice: he is clean
  chosen_spanish: él es limpio
  alternatives_spanish:
  - él está limpio
  - está limpio
  - es puro
  lexicon: HALOT
  rationale: En el marco levítico, el predicado de pureza ritual debe mantenerse. «Limpio» reproduce el valor técnico que el POB inglés conserva con «clean», sin sustituirlo por una formulación más eclesiástica.
- source_word: וְטִהֲרוֹ הַכֹּהֵן
  english_pob_choice: and the priest shall pronounce him clean
  chosen_spanish: y el sacerdote lo declarará limpio
  alternatives_spanish:
  - y el sacerdote lo limpiará
  - y el sacerdote lo declarará puro
  - y el sacerdote lo purificará
  lexicon: HALOT
  rationale: La acción sacerdotal aquí es una declaración formal de estado ritual, no una curación física. «Declarará limpio» refleja mejor esa función jurídica/ritual que «limpiará» o «purificará».
theological_decisions:
- issue: Distinción entre la sanidad de la afección y el veredicto sacerdotal
  english_pob_reading: the priest shall pronounce him clean
  chosen_spanish_reading: el sacerdote lo declarará limpio
  alternative_spanish_readings:
  - el sacerdote lo limpiará
  - el sacerdote lo declarará puro
  rationale: El hebreo distingue la sanidad de la lesión («ha sanado») del acto posterior del sacerdote. La traducción escogida evita insinuar que el sacerdote produce la sanidad; más bien emite el fallo ritual correspondiente.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés: mantiene la secuencia diagnóstico → sanidad → declaración sacerdotal, conserva la tensión técnica de טָהוֹר/טִהֵר con «limpio» y «declarará limpio», y evita convertir la última cláusula en un acto de sanación.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente contiene el nombre divino; este versículo no lo contiene.
  - «Limpio» se mantiene como término técnico de pureza ritual, no como simple higiene.
  - La voz pasiva/estado resultante de נִרְפָּא se expresa con perfecto compuesto para una lectura natural en español.
  - El marcador de nota a se coloca en «tiña» porque allí está la principal tensión léxica frente al hebreo.
