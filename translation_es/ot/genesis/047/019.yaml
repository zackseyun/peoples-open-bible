  - marker: c
    text: Or 'servants.' The Hebrew term can denote various forms of servitude, but here the bonded economic sense is prominent.
    reason: lexical_alternative
  - marker: d
    text: Or 'be laid waste.'
    reason: lexical_alternative
  - marker: e
    text: Or 'so that we may live and not die, and that the land may not become desolate'.
