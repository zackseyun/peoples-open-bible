  lexicon: 'Crum (krrō: be found/meet); context-formula in Thunder'
  rationale: ϯⲛⲁ- is future, but Thunder’s self-ascriptions are gnomic. Rendered as
    timeless ‘is found’ to preserve the formulaic cadence (“I am … who is found …”).
- source_word: ⲁⲛⲟⲕ
  chosen: I am
  alternatives:
  - I
  lexicon: Standard Sahidic pronoun
  rationale: Retain explicit ‘I am’ to keep the poem’s anaphora and paradox engine
    intact.
- source_word: ⲛⲉⲧⲕⲗⲏϣ
  chosen: trembling
