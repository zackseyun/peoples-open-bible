theological_decisions:
- issue: Relation of Job 42:3 to the divine speech in Job 38:2
  chosen_reading: Render the wording actually present in 42:3 ('hides counsel') while preserving the more traditional 'darkens counsel' as an alternative note.
  alternative_readings:
  - darkens counsel without knowledge
  rationale: Job appears to quote or adapt the Lord's earlier rebuke, but the Hebrew here differs lexically from 38:2. To honor original-language primacy, the translation follows the wording of 42:3 itself rather than harmonizing it to the earlier verse.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
