    issue: «en su mano» para בְּיֶדְכֶם
    rationale: El hebreo lleva sufijo 2mp y el inglés auditado tiene «into your hand». En español neutro y legible, «en sus manos» comunica mejor el plural y el modismo de entrega al poder de alguien. «En su mano» suena forzado y potencialmente ambiguo.
  - severity: low
    issue: «desde la emboscada»
    rationale: No es incorrecto, pero «de la emboscada» es más idiomático y más cercano al valor simple de מִן en este contexto militar.
  - severity: low
    issue: Nota al pie sobre «la emboscada»
    rationale: La nota actual añade la opción de referirse «al grupo apostado en ella», matiz no respaldado por la nota inglesa, que habla del lugar/posición de emboscada. Conviene ajustar la nota para reflejar la alternativa documentada sin expandirla.
  revised_spanish_text: Entonces ustedes se levantarán de la emboscada[a] y tomarán la ciudad, porque Yahvé su Dios la entregará en sus manos.
  revised_footnotes:
  - marker: a
    text: O «del lugar de la emboscada». El hebreo puede referirse a la emboscada como tal o a la posición de emboscada.
    reason: lexical_alternative
