translation:
  text: |-
    1. The Lord gave me favor because I obeyed my father. 2. Therefore I never grieved Jacob my father, for I did everything he told me. 3. And Abraham my forefather blessed me to reign in Israel, and Jacob blessed me in the same way. 4. And I know what evils you will do in the last days.
    
    5. Guard yourselves, therefore, my children, from sexual immorality and from the love of money, and listen to Judah your father. 6. For these turn one away from the law of God, and blind the purpose of the soul, and teach arrogance, and do not allow a man to show mercy to his neighbor. 7. They deprive his soul of every goodness, and hold him fast in pains and labors; they drive sleep away from him, and consume his flesh. 8. They hinder the sacrifices of God, and he does not remember the blessing of God. He does not listen when a prophet speaks, and he resents words of godliness. 9. For he is enslaved to two contrary passions, and is not able to obey God, because they have blinded his soul.
