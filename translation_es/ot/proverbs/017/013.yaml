translation:
  language: es
  text: Quien paga mal por bien[a], el mal no se apartará de su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la calamidad no se apartará de su casa». La segunda aparición de רָעָה puede referirse al mal moral o a una consecuencia dañina o desastre; el texto principal conserva la repetición hebrea.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵשִׁיב
  english_pob_choice: repays
  chosen_spanish: devuelve
  alternatives_spanish:
  - retribuye
  - paga
  lexicon: HALOT
  rationale: El participio hiphil de שוב expresa hacer volver algo en intercambio. En español, «devuelve» conserva mejor la reciprocidad proverbial que «retribuye», y evita sobrecargar el verso con un término más técnico; «paga» puede sonar demasiado financiero.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - daño
  - calamidad
  lexicon: HALOT
  rationale: La primera ocurrencia contrasta con «bien» y puede abarcar mal moral o trato nocivo. «Mal» preserva esa amplitud y la antítesis del proverbio; «daño» o «calamidad» estrechan demasiado el sentido.
- source_word: תַּחַת
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en lugar de
  - a cambio de
  lexicon: HALOT
  rationale: La preposición marca intercambio o sustitución. «Por» es la forma natural en español para expresar reciprocidad sin perder la relación de equivalencia implícita.
- source_word: טוֹבָה
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - bondad
  - beneficio
  lexicon: HALOT
  rationale: Aquí el término funciona de manera general y balanceada con «mal». «Bien» mantiene el paralelismo y suena natural en español proverbial; «bondad» podría personalizar el acto en exceso.
- source_word: לֹא תמיש
  english_pob_choice: will not depart
  chosen_spanish: no se apartará
  alternatives_spanish:
  - no saldrá
  - no se irá
  lexicon: HALOT
  rationale: La forma hiphil expresa alejamiento o remoción. «No se apartará» es idiomático y conserva la idea de permanencia de la consecuencia dentro del ámbito del hogar.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la calamidad
  - el desastre
  lexicon: HALOT
  rationale: Se mantiene la repetición léxica del hebreo y del POB inglés. «El mal» deja abierta la tensión entre mal moral y resultado dañino; las alternativas explicitan más el efecto, pero reducen la ambigüedad intencional.
- source_word: מִבֵּיתוֹ
  english_pob_choice: from his house
  chosen_spanish: de su casa
  alternatives_spanish:
  - de su hogar
  - de su familia
  lexicon: HALOT
  rationale: בַּיִת puede referirse a casa, hogar o linaje doméstico. «Casa» es la correspondencia más directa y conserva el modismo proverbial, con suficiente amplitud para implicar la esfera familiar.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran alta concordancia y sin revisiones aplicadas; se mantiene la repetición de רָעָה en ambas ocurrencias para reflejar la simetría retórica y la ambigüedad léxica documentada.
  spanish_consistency_notes:
  - Se prefirió «bien/mal» para conservar el paralelismo antitético del proverbio.
  - Se evitó «señor» o formas eufemísticas porque no hay tetragrámaton en este verso.
  - «Casa» se usa con valor proverbial amplio, no solo como edificio físico.
