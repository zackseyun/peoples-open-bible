translation:
  language: es
  text: El hombre oprimido por culpa de sangre[a] huirá hasta la fosa[b]; que nadie lo sostenga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «oprimido/cargado por la sangre de una vida». La expresión se refiere a culpa de sangre por quitar una vida.
    reason: lexical_alternative
  - marker: b
    text: O «al sepulcro» o «a la tumba». El hebreo «fosa» puede implicar un final mortal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָדָם
  english_pob_choice: A man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Una persona
  - La persona
  - El ser humano
  lexicon: HALOT
  rationale: El singular hebreo presenta a un individuo representativo, no a la humanidad en general. «El hombre» conserva ese valor singular y personal sin volver abstracto el proverbio.
- source_word: עָשֻׁק
  english_pob_choice: oppressed
  chosen_spanish: oprimido
  alternatives_spanish:
  - afligido
  - aplastado
  - cargado
  lexicon: HALOT
  rationale: El término expresa una condición de estar bajo presión o violencia. «Oprimido» mantiene la fuerza del participio y resulta natural en español.
- source_word: בְּדַם נָפֶשׁ
  english_pob_choice: bloodguilt
  chosen_spanish: por sangre derramada
  alternatives_spanish:
  - por culpa de sangre
  - con la sangre de una vida
  - con sangre de una vida
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y alude a culpa por quitar una vida. «Sangre derramada» conserva la imagen concreta del derramamiento y deja visible la carga de sangre culpable sin forzar una explicación interpretativa dentro del texto principal.
- source_word: עַד בּוֹר
  english_pob_choice: as far as the pit
  chosen_spanish: hasta el sepulcro
  alternatives_spanish:
  - hasta el pozo
  - hasta la fosa
  - hasta la tumba
  lexicon: HALOT
  rationale: «בוֹר» puede significar pozo/fosa y, por extensión, la muerte o el sepulcro. Dado el paralelismo con la huida fatal del culpable, «sepulcro» comunica bien la resonancia de muerte que la POB inglesa preserva con «pit».
- source_word: אַל יִתְמְכוּ בּוֹ
  english_pob_choice: let no one support him
  chosen_spanish: no lo sostenga nadie
  alternatives_spanish:
  - nadie lo sostenga
  - no lo apoye nadie
  - que nadie lo sostenga
  lexicon: HALOT
  rationale: El jussivo plural funciona como una prohibición impersonal. «No lo sostenga nadie» es idiomático en español y conserva la idea de impedir todo apoyo o sostenimiento.
translation_notes:
  revision_awareness: Se tomó como base la revisión más reciente de la POB inglesa, que reemplazó una formulación más literal por «oppressed by bloodguilt». En español se mantuvo la claridad idiomática y se conservó la imagen concreta de sangre derramada, mientras que «sepulcro» recoge la posible fuerza mortal de בּוֹר.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y «Cristo» porque no aparecen en este verso.
  - Se mantuvo un registro sobrio y proverbial, con sintaxis breve y directa.
  - «Sangre derramada» preserva la tensión entre imagen concreta e implicación jurídica de culpa.
  - «No lo sostenga nadie» respeta el valor prohibitivo del hebreo sin sonar arcaico.
