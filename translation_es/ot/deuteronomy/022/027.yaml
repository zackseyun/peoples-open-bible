translation:
  language: es
  text: Porque la encontró en el campo[a]; la joven desposada gritó, pero no había quien la rescatara[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en campo abierto»; el hebreo se refiere a un lugar rural y aislado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no había quien la salvara».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduces la explicación del juicio legal anterior. En español, «porque» conserva bien la relación causal/expositiva y suena natural al inicio de una cláusula legal.
- source_word: בַשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la campiña
  lexicon: HALOT
  rationale: El hebreo apunta a un lugar rural y aislado, no solo a un terreno sembrado. «Campo» comunica de forma natural el entorno abierto y aislado que sostiene la lógica jurídica del pasaje.
- source_word: מְצָאָהּ
  english_pob_choice: he found her
  chosen_spanish: lo encontró
  alternatives_spanish:
  - la encontró
  - dio con ella
  lexicon: HALOT
  rationale: El verbo significa «encontrar»; en este contexto se refiere al hombre que la encuentra en el campo. En español, el referente masculino del sujeto se mantiene por el contexto inmediato del caso legal, y «lo encontró» sigue la secuencia del sujeto implícito del hebreo tal como viene en la narración legal.
- source_word: צָעֲקָה
  english_pob_choice: cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - dio voces
  lexicon: HALOT
  rationale: La forma expresa un grito de angustia o auxilio. «Gritó» es breve y fiel; «clamó» también sería posible, pero «gritó» conserva mejor la fuerza inmediata del verbo sin añadir matices religiosos ajenos.
- source_word: הנער
  english_pob_choice: young woman
  chosen_spanish: joven
  alternatives_spanish:
  - muchacha
  - doncella
  lexicon: HALOT
  rationale: El contexto exige un referente femenino; en español, «joven» funciona naturalmente como sustantivo elíptico dentro de «la joven desposada». Evita tanto la infantilización de «muchacha» como el tono arcaizante de «doncella».
- source_word: הַמְאֹרָשָׂה
  english_pob_choice: betrothed
  chosen_spanish: desposada
  alternatives_spanish:
  - prometida
  - comprometida en matrimonio
  lexicon: HALOT
  rationale: La palabra denota un estado legal de compromiso matrimonial formal. «Desposada» preserva ese valor jurídico tradicional con dignidad; «prometida» podría sonar demasiado moderno y menos preciso para la institución antigua.
- source_word: וְאֵין מוֹשִׁיעַ לָהּ
  english_pob_choice: but there was no one to rescue her
  chosen_spanish: y no había quien la rescatara
  alternatives_spanish:
  - y no había quien la salvara
  - y no había rescatador para ella
  lexicon: HALOT
  rationale: La cláusula afirma la ausencia de auxiliador. «Rescatara» comunica con claridad el sentido de salvar de una situación de peligro inmediato; mantiene la fuerza legal y evita una carga teológica excesiva.
theological_decisions:
- issue: Estado legal de la mujer הַמְאֹרָשָׂה
  english_pob_reading: betrothed
  chosen_spanish_reading: desposada
  alternative_spanish_readings:
  - prometida
  - comprometida en matrimonio
  rationale: El pasaje depende del estatus formal de la mujer dentro de la ley israelita. «Desposada» conserva la seriedad jurídica y el carácter previo al matrimonio consumado sin introducir doctrinas posteriores.
  doctrine_reference: Translation philosophy §1, §6
- issue: Ausencia de auxilio en la escena
  english_pob_reading: but there was no one to rescue her
  chosen_spanish_reading: y no había quien la rescatara
  alternative_spanish_readings:
  - y no había quien la salvara
  rationale: El énfasis del hebreo recae en que no hubo quien interviniera. «Rescatar» expresa mejor el auxilio concreto y contextual, sin trasladar el término a un registro exclusivamente soteriológico.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido legal del hebreo y el registro óptimo-equivalente del POB inglés. Se mantuvo la ambigüedad contextual del lugar como espacio rural aislado y del verbo final como rescate/auxilio, sin forzar una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó «SEÑOR» y también la formulación litúrgica tradicional cuando no era necesaria.
  - «Desposada» preserva el valor legal antiguo de הַמְאֹרָשָׂה con mayor precisión que «comprometida».
  - «Rescatar» se eligió por su claridad contextual y para no cargar el verbo con una lectura exclusivamente teológica.
