translation:
  language: es
  text: amando a Yahvé tu Dios[a], escuchando su voz y aferrándote a él[b]; porque él es tu vida y la longitud de tus días, para que habites en la tierra que Yahvé juró a tus padres[c], a Abraham, a Isaac y a Jacob, para darles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obedeciendo a su voz»; el modismo hebreo «escuchar su voz» suele incluir la idea de atenderla u obedecerla.
    reason: lexical_alternative
  - marker: b
    text: O «adheriéndote a él».
    reason: lexical_alternative
  - marker: c
    text: O «a tus antepasados»; se conserva «padres» porque el texto nombra de inmediato a Abraham, Isaac y Jacob.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאַהֲבָה
  english_pob_choice: by loving
  chosen_spanish: amando
  alternatives_spanish:
  - por amar
  - al amar
  - en amar
  lexicon: HALOT
  rationale: El infinitivo con ל expresa medio o manera en la cadena de exhortaciones. En español, el gerundio «amando» reproduce de forma natural ese valor instrumental sin convertir la frase en una explicación más libre.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el criterio del proyecto, preservando el valor pactual y evitando el masking litúrgico con «SEÑOR».
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Yahvé
  - tu Dios, Yahvé
  lexicon: HALOT
  rationale: La construcción posesiva se vuelve de manera directa como apposición natural en español, sin añadir elementos no presentes en el hebreo.
- source_word: לִשְׁמֹעַ בְּקֹלוֹ
  english_pob_choice: by listening to his voice
  chosen_spanish: escuchando su voz
  alternatives_spanish:
  - oyendo su voz
  - escuchando y obedeciendo su voz
  - obedeciendo su voz
  lexicon: HALOT
  rationale: «שׁמע + בְּקוֹל» conserva el modismo de escuchar la voz; «escuchando» mantiene la imagen concreta y deja el matiz de obediencia implícito en el contexto, como en el audit trail inglés.
- source_word: וּלְדָבְקָה בּוֹ
  english_pob_choice: and by holding fast to him
  chosen_spanish: aferrándote a él
  alternatives_spanish:
  - apegándote a él
  - uniéndote a él
  - pegándote a él
  lexicon: HALOT
  rationale: דבק expresa adherirse estrechamente; «aferrarte» comunica bien la idea de adhesión leal y continua con un registro natural en español, evitando la arcaización de «adherirse» o «clevarse».
- source_word: כִּי הוּא חַיֶּיךָ
  english_pob_choice: for he is your life
  chosen_spanish: porque él es tu vida
  alternatives_spanish:
  - pues él es tu vida
  - porque él es la fuente de tu vida
  lexicon: HALOT
  rationale: Se conserva el referente personal del pronombre, que en el flujo del hebreo apunta a Yahvé. La formulación directa «tu vida» reproduce con fidelidad la cláusula nominal.
- source_word: וְאֹרֶךְ יָמֶיךָ
  english_pob_choice: and the length of your days
  chosen_spanish: y la longitud de tus días
  alternatives_spanish:
  - y la prolongación de tus días
  - y tu larga vida
  lexicon: HALOT
  rationale: La expresión idiomática se mantiene de modo bastante literal para conservar la resonancia bíblica y la simetría del paralelismo.
- source_word: לָשֶׁבֶת עַל הָאֲדָמָה
  english_pob_choice: that you may dwell on the land
  chosen_spanish: para que habites en la tierra
  alternatives_spanish:
  - para morar en la tierra
  - para vivir en la tierra
  lexicon: HALOT
  rationale: El infinitivo se vierte con finalidad en español. «Habites» conserva el tono pactual de residencia estable; «tierra» corresponde mejor al campo semántico territorial que «terreno» o «suelo».
- source_word: אֲשֶׁר נִשְׁבַּע יְהוָה
  english_pob_choice: that Yahweh swore
  chosen_spanish: que Yahvé juró
  alternatives_spanish:
  - que Yahvé prometió con juramento
  - que el SEÑOR juró
  lexicon: HALOT
  rationale: נשבע es «jurar»; se mantiene la fuerza formal del juramento pactual sin suavizarla a «prometió».
- source_word: לַאֲבֹתֶיךָ
  english_pob_choice: to your fathers
  chosen_spanish: a tus padres
  alternatives_spanish:
  - a tus antepasados
  - a tus padres y antepasados
  lexicon: HALOT
  rationale: Se conserva «padres» como equivalente tradicional y fiel a la forma masculina del hebreo, pero en español se adapta a «padres» en sentido ancestral; esto encaja con la especificación inmediata de Abraham, Isaac y Jacob.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  english_pob_choice: to Abraham, to Isaac, and to Jacob
  chosen_spanish: a Abraham, a Isaac y a Jacob
  alternatives_spanish:
  - para Abraham, para Isaac y para Jacob
  lexicon: HALOT
  rationale: Se conserva la enumeración con preposición repetida de forma natural en español, reflejando la solemnidad del juramento y los nombres propios tal como aparecen en el texto.
- source_word: לָתֵת לָהֶם
  english_pob_choice: to give to them
  chosen_spanish: para dársela
  alternatives_spanish:
  - para dárselo
  - para darla a ellos
  - para darles
  lexicon: HALOT
  rationale: El objeto implícito en español se refiere a «la tierra», antecedente inmediato del versículo. Aunque el hebreo dice «a ellos», el pronombre enclítico permite una traducción natural y evita una redundancia pesada.
theological_decisions:
- issue: Referencia de «él» en «porque él es tu vida»
  english_pob_reading: The pronoun refers to the LORD himself.
  chosen_spanish_reading: El pronombre se refiere a Yahvé mismo.
  alternative_spanish_readings:
  - El pronombre podría entenderse de manera más general como la vida de obedecer al pacto.
  - El pronombre podría leerse como una referencia resumida al conjunto de la obediencia descrita antes.
  rationale: El antecedente más próximo y más fuerte es «Yahvé tu Dios», y esa lectura personal encaja con la teología deuteronómica de la vida como relación con Yahvé. La traducción mantiene esa referencia sin diluirla en una abstracción.
  doctrine_reference: Preservar la referencia personal cuando el hebreo la favorece; no resolver innecesariamente la tensión conceptual entre persona y camino de obediencia.
translation_notes:
  revision_awareness: Se siguió el cierre revisado del audit trail inglés, que prefirió una relación más directa con la cláusula final de propósito («that you may dwell») en lugar de una paráfrasis más expansiva. En español se reflejó con «para que habites», manteniendo la formalidad y la continuidad sintáctica del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se preserva la imagen pactual de «escuchar su voz» y «aferrarte a él» sin ocultar la posible implicación de obediencia.
  - «Tierra» se usa en sentido territorial/covenantal, no como suelo genérico.
  - La enumeración de Abraham, Isaac y Jacob se conserva para sostener la referencia de «tus padres».
