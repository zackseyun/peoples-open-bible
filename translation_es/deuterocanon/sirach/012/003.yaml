translation:
  language: es
  text: No hay bien para el que persiste en la maldad[a], ni para el que no ha hecho justicia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de la primera cola es difícil; el griego paralelo apoya el sentido de una persistencia continua en el mal.
    reason: alternative_reading
  - marker: b
    text: El hebreo dice «no ha hecho ṣedaqá», es decir, «justicia/rectitud»; el paralelo griego lee «no ha concedido limosna o misericordia».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין טוֹבָה
  english_pob_choice: There is no good
  chosen_spanish: No hay bien
  alternatives_spanish:
  - No existe bien
  - No hay beneficio
  lexicon: HALOT
  rationale: El hebreo expresa ausencia de bien de manera directa; en español, «No hay bien» conserva esa estructura sin sonar forzado. Mantiene la correspondencia con el griego οὐκ ἔστιν ἀγαθὰ.
- source_word: לִמְנֹחַ
  english_pob_choice: to one who persists
  chosen_spanish: para el que persiste
  alternatives_spanish:
  - para el que se detiene en
  - para el que se entrega a
  - para el que continúa
  lexicon: HALOT
  rationale: La forma hebrea es difícil y el paralelo griego τῷ ἐνδελεχίζοντι apunta a continuidad o persistencia. «Persiste» recoge bien esa duración sin añadir más de lo que sugieren las fuentes.
- source_word: רָשָׁע
  english_pob_choice: in wickedness
  chosen_spanish: en la maldad
  alternatives_spanish:
  - al malvado
  - en lo malo
  - en la impiedad
  lexicon: HALOT
  rationale: El hebreo puede funcionar como sustantivo/adjetivo; con la construcción total, «en la maldad» expresa bien la idea verbal de permanecer en el mal, en línea con el griego εἰς κακά.
- source_word: צְדָקָה
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - limosna
  - caridad
  - justicia
  lexicon: HALOT
  rationale: Aunque el hebreo puede significar «justicia» o «rectitud», el paralelo griego ἐλεημοσύνην favorece el campo de la misericordia/limosna. «Misericordia» es la opción más amplia y natural en español para este contexto sapiencial.
- source_word: לֹא עָשָׂה
  english_pob_choice: does not show
  chosen_spanish: no ha practicado
  alternatives_spanish:
  - no ha hecho
  - no ejerce
  - no muestra
  lexicon: HALOT
  rationale: El hebreo dice literalmente «no ha hecho»; con el objeto implícito de benevolencia, en español «ha practicado misericordia» suena natural y conserva el sentido de acción habitual. El griego μὴ χαριζομένῳ también sugiere una actitud de no conceder/mostrar benevolencia.
theological_decisions:
- issue: Valor de צְדָקָה en este dicho sapiencial
  english_pob_reading: ethical mercy/charity rather than abstract righteousness
  chosen_spanish_reading: misericordia, entendida como benevolencia práctica
  alternative_spanish_readings:
  - justicia
  - rectitud
  - limosna
  rationale: El contexto y el paralelo griego orientan el término hacia la benevolencia activa más que hacia una categoría doctrinal abstracta. Por eso se eligió «misericordia» en el texto y se deja constancia de las alternativas posibles.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; consistency of key terms or documented exception'
- issue: Relación entre el hebreo y el griego en la segunda cola
  english_pob_reading: Hebrew 'does not do ṣedaqah'; Greek 'does not grant almsgiving/mercy.'
  chosen_spanish_reading: «no ha practicado misericordia», con base hebrea y apoyo del paralelo griego
  alternative_spanish_readings:
  - «no ha hecho justicia»
  - «no ha dado limosna»
  rationale: 'La redacción española intenta respetar ambos testigos: el hebreo favorece una acción no realizada, y el griego explicita una benevolencia/limosna no concedida. «Practicado misericordia» preserva la dimensión ética sin reducirla a un tecnicismo.'
  doctrine_reference: 'DOCTRINE.md: original-language primacy; audit trail transparency'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que volvió al hebreo para la segunda cola («has not done righteousness»). La versión española intenta mantener esa fidelidad al hebreo sin perder el apoyo interpretativo del griego, por lo que se escogió «ha practicado misericordia» como solución que conserva la acción requerida por el verbo y el campo semántico de צְדָקָה.
  spanish_consistency_notes:
  - Se usa «misericordia» como término ético amplio, evitando «justicia» en el texto principal para no endurecer el sentido sapiencial.
  - «Maldad» traduce de manera natural el campo de רָשָׁע/κακά sin introducir un sustantivo de persona donde el contexto es más verbal.
  - Se prefirió «ha practicado» sobre «ha hecho» para que el español suene natural con una virtud/obra de benevolencia.
  - La puntuación con dos miembros coordinados reproduce el paralelismo semítico del original.
