translation:
  language: es
  text: Porque he aquí[a], en aquellos días y en aquel tiempo, cuando yo restaure la prosperidad de Judá y Jerusalén,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando yo restaure la cautividad de Judá y Jerusalén»; también, «cuando traiga de vuelta a los cautivos de Judá y Jerusalén». El hebreo usa un modismo para restaurar a un pueblo desde la aflicción, con frecuencia en un marco de exilio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la declaración como fundamento o explicación del contexto previo. En español, «Porque» preserva la fuerza conectiva de כִּי sin sonar tan arcaico como «Pues» en este lugar.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre un acontecimiento profético importante. «He aquí» conserva el registro bíblico y la urgencia del original, equivalente al «behold» del POB inglés.
- source_word: בַּיָּמִים הָהֵמָּה
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  lexicon: HALOT
  rationale: Expresión temporal fija en el discurso profético. «Aquellos» comunica mejor la distancia futura y el valor referencial del hebreo.
- source_word: וּבָעֵת הַהִיא
  english_pob_choice: and at that time
  chosen_spanish: y en aquel tiempo
  alternatives_spanish:
  - y en ese tiempo
  - y en aquel momento
  lexicon: HALOT
  rationale: Mantiene el paralelismo temporal de la primera cola. «Aquel tiempo» es la forma más natural y digna en español para reproducir la repetición enfática.
- source_word: אֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en que
  - en el cual
  lexicon: HALOT
  rationale: Aquí la relativa introduce una cláusula temporal ligada al acto de restauración. «Cuando» expresa mejor esa relación que una traducción más literal pero menos natural.
- source_word: אשוב
  english_pob_choice: I restore
  chosen_spanish: yo restaure
  alternatives_spanish:
  - yo restaure de nuevo
  - yo vuelva a restaurar
  lexicon: HALOT
  rationale: La forma verbal hebrea, en este idiomático giro con שְׁבוּת, apunta al acto divino de restaurar. En español se usa el subjuntivo futuro dependiente de «cuando» para reflejar el valor prospectivo del hebreo.
- source_word: אֶת שְׁב֥וּת
  english_pob_choice: the fortunes
  chosen_spanish: las fortunas
  alternatives_spanish:
  - el cautiverio
  - la cautividad
  - los cautivos
  lexicon: HALOT
  rationale: El POB inglés opta por «fortunes» para reflejar el modismo hebreo שׁוּב אֶת־שְׁבוּת como restauración del estado o condición de un pueblo. En español, «las fortunas» conserva esa lectura idiomática; las alternativas más literales se mantienen como posibilidad semántica.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judá
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español, correspondiente al reino y pueblo de Judá.
- source_word: וִירוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español para la ciudad de Jerusalén.
theological_decisions:
- issue: Idiomático שׁוּב אֶת־שְׁבוּת como restauración de una condición de aflicción
  english_pob_reading: render as 'restore the fortunes' in the main text, with a footnote noting captivity/exiles alternatives
  chosen_spanish_reading: renderizar como «restaure las fortunas» en el texto principal, con nota sobre «cautiverio», «cautividad» o «cautivos»
  alternative_spanish_readings:
  - restaure el cautiverio
  - traiga de vuelta a los cautivos
  - restaure la cautividad
  rationale: El hebreo es un modismo reconocido que puede referirse a la restitución de una situación de ruina o a un trasfondo de exilio. La traducción principal conserva la lectura idiomática del POB y la nota mantiene transparente la alternativa histórico-exílica.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor prospectivo de la cláusula temporal introducida por אֲשֶׁר
  english_pob_reading: when I restore
  chosen_spanish_reading: «cuando yo restaure» en lugar de un presente simple
  alternative_spanish_readings:
  - cuando yo restauro
  - cuando yo vuelva a restaurar
  rationale: En español, el subjuntivo en cláusulas temporales futuras reproduce mejor el carácter profético y prospectivo del hebreo que un presente indicativo.
  doctrine_reference: Gramática española de subordinación temporal futura; coherencia con el discurso profético
- issue: Registro profético solemne de הִנֵּה
  english_pob_reading: behold
  chosen_spanish_reading: «he aquí»
  alternative_spanish_readings:
  - miren
  - vean
  rationale: «He aquí» preserva la solemnidad bíblica sin introducir un estilo excesivamente arcaico o devocionalista.
  doctrine_reference: Convención estilística bíblica en español
translation_notes:
  revision_awareness: El borrador sigue de cerca el expediente auditado del POB inglés para Joel 4:1. Se preserva el encadenamiento causal/explicativo de כִּי, el énfasis de הִנֵּה, el paralelismo temporal de בַּיָּמִים הָהֵמָּה / וּבָעֵת הַהִיא, y la ambigüedad idiomática de שׁוּב אֶת־שְׁבוּת mediante una traducción principal idiomática con nota alternativa. No se observan revisiones textuales en el expediente inglés que requieran ajuste adicional.
  spanish_consistency_notes:
  - Se usa «Judá» y «Jerusalén» como nombres propios bíblicos estándar y coherentes en todo el proyecto.
  - «He aquí» queda anclado con nota porque es un marcador retórico importante y su equivalente moderno puede variar.
  - Se mantiene la puntuación con coma final para integrarse con la continuidad del contexto inmediato, tal como el inglés termina en coma para enlazar con el verso siguiente.
