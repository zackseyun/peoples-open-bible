review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia imperativa del hebreo y conserva adecuadamente las costumbres de duelo sin sobreinterpretarlas. Sin embargo, las notas al pie están ancladas en lugares incorrectos: [a] aparece sobre «en silencio» pero la nota trata de «bigote/labio superior», y [b] aparece sobre «bigote» pero la nota trata de «pan de los hombres». Además, «por el muerto» singulariza donde el hebreo usa plural genérico «los muertos», y conviene ajustar la redacción para mayor fidelidad y fluidez.'
  spanish_quality_summary: El español es claro y digno, con buen registro bíblico moderno. «Gime en silencio» y «ponte el turbante» funcionan bien. Hay una pequeña mejora estilística posible en «no hagas duelo por los muertos», que suena más natural y más cercano al hebreo que «por el muerto». También conviene simplificar «colócate las sandalias en los pies» a «ponte las sandalias en los pies» para paralelismo natural.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto. Los términos clave se manejan bien: «turbante», «bigote» con alternativa «labio superior», y «pan de los hombres» conservan la auditabilidad del original. La revisión propuesta solo corrige anclajes de notas y mejora fidelidad en «los muertos».'
  issues:
  - severity: high
    issue: Los marcadores de notas al pie están invertidos.
    rationale: La nota [a] explica «labio superior/bigote», pero en el texto está colocada tras «en silencio». La nota [b] explica «pan de los hombres», pero en el texto está colocada tras «bigote». Esto rompe la trazabilidad entre texto y nota, y viola el requisito de anclar cada nota exactamente en la frase pertinente.
  - severity: medium
    issue: «por el muerto» no refleja bien el plural genérico hebreo מֵתִים.
    rationale: El hebreo dice literalmente «duelo de muertos / por los muertos». En español, «por los muertos» preserva mejor el sentido genérico de las prácticas funerarias, mientras que «por el muerto» puede sonar innecesariamente singular y concreto.
  - severity: low
    issue: «colócate las sandalias en los pies» es correcto pero algo menos natural que «ponte las sandalias en los pies».
    rationale: No es un error de significado, pero «ponte» da un paralelismo más limpio con «ponte el turbante» y suena más idiomático en español general.
  revised_spanish_text: Gime en silencio; no hagas duelo por los muertos. Ponte el turbante y ponte las sandalias en los pies. No te cubras el bigote[a], y no comas el pan de los hombres[b].
