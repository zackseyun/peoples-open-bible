  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» para אֱלֹהִים es correcto. Se preserva adecuadamente «tu brazo» para זְרוֹעֲךָ. «Tu poder» para גבורתך es una elección válida y no borra la distinción con «brazo».
