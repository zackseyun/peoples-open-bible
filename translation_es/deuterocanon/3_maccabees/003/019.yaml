revisions:
- from: Y al hacer patente su hostilidad contra nosotros, ellos, solos entre las naciones, actúan con arrogancia frente a los reyes y frente a sus propios benefactores, y no quieren ofrecer nada genuino[a].
  to: Y al hacer patente su hostilidad hacia nosotros, ellos solos entre las naciones actúan con arrogancia frente a los reyes y frente a sus propios benefactores, y no quieren ofrecer nada genuino[a].
  rationale: Se hizo una reparación menor para reflejar mejor εἰς ἡμᾶς con 'hacia nosotros', aligerar la puntuación y corregir la nota alternativa para que suene natural y gramatical en español, manteniendo intacto el sentido auditado del pasaje.
