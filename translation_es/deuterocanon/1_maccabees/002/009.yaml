  to: Los vasos de su gloria fueron llevados cautivos[a]; sus infantes fueron abatidos en sus calles[b], sus hombres jóvenes por la espada del enemigo.
  rationale: Se ajusta «sus jóvenes» a «sus hombres jóvenes» para conservar el matiz masculino de νεανίσκοι, en línea con la evidencia griega y el audit trail inglés. También se mejora «fueron muertos» a «fueron abatidos» para lograr un español más natural y solemne sin alterar el sentido básico de ἀπεκτάθη.
