lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué han de...
  alternatives_spanish:
  - ¿Por qué...
  - ¿Por qué dirán...
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica con fuerza de reproche; en español, «han de decir» mantiene la carga retórica sin volverla meramente futura o descriptiva.
- source_word: יֹאמְרוּ
  english_pob_choice: say
  chosen_spanish: decir
  alternatives_spanish:
  - dirán
  - están diciendo
  lexicon: HALOT
  rationale: El imperfecto qal 3mp expresa una acción que el salmista objeta como posible o recurrente; «han de decir» en español conserva ese valor modal-retórico mejor que un futuro simple.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: «Las naciones» reproduce de forma directa el referente de גּוֹיִם en este salmo, sin introducir connotaciones posteriores de «gentiles».
- source_word: אַיֵּה
  english_pob_choice: Where
  chosen_spanish: ¿Dónde...
  alternatives_spanish:
  - ¿Dónde está...
  lexicon: HALOT
  rationale: La interrogación de lugar requiere en español una forma natural con verbo copulativo implícito; «¿Dónde está...?» es idiomático y fiel al sentido del hebreo.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ya
  - pues
  lexicon: HALOT
  rationale: Aquí נָא añade inmediatez y tono de burla; «ahora» preserva esa urgencia y el matiz de desafío.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su dios
  - sus dioses
  lexicon: HALOT
  rationale: Aunque el sustantivo puede ser morfológicamente plural, el contexto señala al Dios de Israel. En español, «su Dios» comunica el referente singular sin suavizar la burla del texto.
theological_decisions:
- issue: Referencia de אֱלֹהֵיהֶם
  english_pob_reading: their God
  chosen_spanish_reading: su Dios
  alternative_spanish_readings:
  - su dios
  - sus dioses
  rationale: La pregunta de las naciones se burla de la aparente ausencia del Dios de Israel; no describe dioses indefinidos. Mantener «Dios» con mayúscula respeta la referencia contextual sin añadir explicaciones doctrinales externas.
  doctrine_reference: Referencia contextual del nombre divino en el salmo; no hay afirmación doctrinal adicional más allá del reproche de los paganos.
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando el marcador [a] directamente en el texto español y alineando la nota con la alternativa ya registrada en el auditario inglés.
  spanish_consistency_notes:
  - Se usó «las naciones» para הַגּוֹיִם en concordancia con la pauta del proyecto.
  - Se mantuvo «Dios» con mayúscula por referencia al Dios de Israel, no como deidad genérica.
  - La pregunta se formuló de modo retórico con «han de decir» para reflejar la fuerza del hebreo sin perder naturalidad en español.
