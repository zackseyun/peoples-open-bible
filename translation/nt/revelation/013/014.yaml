theological_decisions:
- issue: Divine-passive implication in ἐδόθη
  chosen_reading: Retain the passive 'it was given' without making God the explicit giver.
  alternative_readings:
  - he was allowed
  - God gave him power
  rationale: Apocalyptic literature often uses the passive to imply permission under divine sovereignty. Making God explicit would go beyond the wording; using 'it was given' preserves the theological tension and source-text restraint.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Force of ἔζησεν in relation to the beast's wound
  chosen_reading: Render as 'yet lived' rather than an explicit resurrection formula.
  alternative_readings:
  - came to life
  - was revived
  rationale: The clause indicates life after a deadly-looking wound, but the verse itself does not require a full doctrinal claim about resurrection. 'Yet lived' preserves the narrative effect without importing a stronger theological interpretation than the Greek states.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
