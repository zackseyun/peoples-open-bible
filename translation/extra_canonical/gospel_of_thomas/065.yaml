    “Go—let the workers give me the fruit of the vineyard.” The workers seized his
    slave; they beat him a little and sent him away. The slave went and reported to
    his master. His master said, “Perhaps they did not know him.” He sent another
    slave; the workers did likewise to the other. Then the master sent his son. He
