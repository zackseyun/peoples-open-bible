- from: Dichosos[a] los que te vieron y murieron, y dichoso eres tú, porque ciertamente vivirás.
  to: Dichoso el que te vio y murió[a], y dichoso eres tú, porque ciertamente vivirás.
  rationale: Se corrige la primera cláusula al singular para seguir el texto hebreo base y la auditoría inglesa del POB, evitando que el griego paralelo reemplace silenciosamente la lectura principal. Se conserva “dichoso” y la nota del paralelo griego, con un anclaje más adecuado en el punto de divergencia textual.
