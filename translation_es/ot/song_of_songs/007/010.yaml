translation:
  language: es
  text: Y tu boca[a] es como el mejor vino, que baja suavemente para mi amado[b], deslizándose sobre los labios de los dormidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu paladar'; el término hebreo se refiere más específicamente al techo de la boca o al sentido del gusto.
    reason: lexical_alternative
  - marker: b
    text: O 'haciendo hablar a los labios de los dormidos'. El verbo hebreo es raro y puede describir tanto un movimiento suave sobre los labios como el efecto de despertar o hablar producido por el vino.
    reason: alternative_reading
lexical_decisions:
- source_word: חִכֵּךְ
  english_pob_choice: your mouth
  chosen_spanish: tu paladar
  alternatives_spanish:
  - tu boca
  - tu paladar
  - tu gusto
  lexicon: HALOT
  rationale: El hebreo se refiere más precisamente al paladar o al techo de la boca. En español, 'paladar' conserva mejor la precisión anatómica que 'boca', sin perder la fuerza poética del verso.
- source_word: כְּיֵין הַטּוֹב
  english_pob_choice: like the best wine
  chosen_spanish: como el mejor vino
  alternatives_spanish:
  - como vino bueno
  - como vino excelente
  - como el vino más fino
  lexicon: HALOT
  rationale: La expresión compara el paladar con vino de calidad superior; 'el mejor vino' transmite de manera natural el matiz superlativo de הַטּוֹב en un español literario y claro.
- source_word: הוֹלֵךְ
  english_pob_choice: going down
  chosen_spanish: que baja
  alternatives_spanish:
  - que desciende
  - que va bajando
  - que se va deslizando
  lexicon: HALOT
  rationale: Aplicado al vino, el participio comunica el movimiento al ser bebido. 'Que baja' es una forma natural en español y conserva la imagen de descenso sin sobreexplicarla.
- source_word: לְדוֹדִי
  english_pob_choice: for my beloved
  chosen_spanish: para mi amado
  alternatives_spanish:
  - a mi amado
  - para mi amado
  lexicon: HALOT
  rationale: La preposición ל admite relación o dirección. 'Para mi amado' refleja bien la orientación afectiva y la idea de algo que le resulta grato o apropiado.
- source_word: לְמֵישָׁרִים
  english_pob_choice: smoothly
  chosen_spanish: suavemente
  alternatives_spanish:
  - lisa y rectamente
  - rectamente
  - con suavidad
  lexicon: HALOT
  rationale: Aunque literalmente alude a 'rectitud' o 'línea recta', en este contexto con vino la fuerza idiomática apunta a un fluir delicado. 'Suavemente' preserva el sentido poético sin sonar forzado.
- source_word: דּוֹבֵב
  english_pob_choice: gliding over
  chosen_spanish: deslizándose
  alternatives_spanish:
  - pasando suavemente
  - moviéndose con suavidad
  - haciendo hablar
  lexicon: HALOT
  rationale: El verbo es raro y admite una lectura de movimiento delicado sobre los labios. 'Deslizándose' mantiene esa ambigüedad poética y deja abierta la posible lectura causativa, sin imponerla.
- source_word: שִׂפְתֵי יְשֵׁנִים
  english_pob_choice: the lips of sleepers
  chosen_spanish: los labios de los dormidos
  alternatives_spanish:
  - los labios de los que duermen
  - los labios de los dormidos
  lexicon: HALOT
  rationale: La construcción posesiva se conserva de forma literal y poética. 'Los dormidos' es una forma más natural en español que 'los que duermen' dentro de la línea poética.
theological_decisions:
- issue: 'Ambigüedad de דּוֹבֵב: movimiento físico o efecto de hacer hablar'
  english_pob_reading: The Hebrew verb is rare and may describe either gentle movement over the lips or the awakening/speaking effect of the wine.
  chosen_spanish_reading: deslizándose sobre los labios de los dormidos
  alternative_spanish_readings:
  - haciendo hablar a los labios de los dormidos
  - deslizándose y haciendo hablar
  rationale: La línea española mantiene la imagen principal de movimiento suave sin decidir de manera tajante la lectura causativa. Así se preserva la tensión documentada por el texto base y la nota inglesa.
  doctrine_reference: Nota lexical/poética, sin implicación doctrinal directa.
translation_notes:
  revision_awareness: La revisión más reciente del pasaje quedó sin cambios; el texto inglés de referencia mantiene alta concordancia con el original y solo presenta observaciones menores sobre el valor léxico de חִכֵּךְ y la rareza de דּוֹבֵב.
  spanish_consistency_notes:
  - Se ha mantenido 'Yahvé' como norma del proyecto solo cuando aparezca el nombre divino; en este verso no aplica.
  - Se prefirió 'paladar' por precisión léxica, pero se dejó la alternativa en nota porque el POB inglés optó por 'mouth' por razones idiomáticas.
  - '''Los dormidos'' conserva el paralelismo poético y evita introducir una explicación interpretativa no exigida por el hebreo.'
