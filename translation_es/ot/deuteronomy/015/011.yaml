  revision_rationale: Se ajusta la primera cláusula para reflejar mejor el ámbito de la tierra pactal sin sugerir el planeta en sentido abstracto; se añade la nota documentada para ‘hermano’; y se mejora levemente la naturalidad del mandato enfático en español manteniendo la distinción entre ‘afligido’ y ‘pobre’.
