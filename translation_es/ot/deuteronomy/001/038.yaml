    issue: Pronombre objeto incorrecto en 'él hará que Israel lo herede'
    rationale: El sufijo hebreo en יַנְחִלֶנָּה es femenino singular y el expediente inglés lo vincula a 'la tierra'. En español, 'lo' contradice ese referente; debe ser 'la' o una reformulación equivalente.
  - severity: medium
    issue: La nota al pie actual no preserva la alternativa léxica documentada en inglés
    rationale: La nota inglesa marcada [a] pertenece a la cláusula final sobre נחל, no al nombre 'Joshua son of Nun'. Si se mantiene una nota, debe anclarse en la frase de herencia y reflejar las alternativas 'darla a Israel como herencia' / 'repartirla a Israel'.
  - severity: low
    issue: Leve rigidez estilística por el uso repetido de 'él'
    rationale: El hebreo usa הוּא de forma enfática/discursiva, pero en español normal no hace falta repetir el pronombre sujeto. Omitirlo mejora la fluidez sin perder sentido.
  revised_spanish_text: Josué hijo de Nun, que está delante de ti, entrará allí. Fortalécelo, porque él hará que Israel la herede[a].
