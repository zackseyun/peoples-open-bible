translation:
  language: es
  text: 'Y aquellos hombres le dijeron: «Estamos impuros[a] por causa de un cadáver humano. ¿Por qué se nos impide[b] presentar la ofrenda de Yahvé en su tiempo señalado, en medio de los hijos de Israel?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «impuros para el alma de un hombre», un modismo que aquí significa impureza por contacto con un cadáver humano.
    reason: lexical_alternative
  - marker: b
    text: O «¿Por qué quedamos excluidos de presentar la ofrenda de Yahvé...?»
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And those men said to him
  chosen_spanish: Y aquellos hombres le dijeron
  alternatives_spanish:
  - Y esos hombres le dijeron
  - Y aquellos varones le dijeron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo introduce discurso directo; en español, «le dijeron» reproduce bien la acción de hablar. «Aquellos hombres» conserva el valor deíctico/emphático de הָהֵמָּה sin sonar forzado.
- source_word: הָאֲנָשִׁים הָהֵמָּה
  english_pob_choice: those men
  chosen_spanish: aquellos hombres
  alternatives_spanish:
  - esos hombres
  - los mismos hombres
  lexicon: HALOT
  rationale: La combinación de sustantivo + demostrativo es enfática. «Aquellos hombres» mantiene la referencia destacada sin sobrecargar la frase.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Moisés
  lexicon: HALOT
  rationale: El pronombre clítico en español es la forma natural para el dativo de destinatario; el contexto identifica a Moisés, pero no es necesario explicitarlo en el texto.
- source_word: טְמֵאִים
  english_pob_choice: unclean
  chosen_spanish: impuros
  alternatives_spanish:
  - inmundos
  - ritualmente impuros
  lexicon: HALOT
  rationale: En contexto cultual, el sentido es impureza ritual. «Impuros» es claro y digno en español; la nota aclara la referencia cultual sin imponer un tecnicismo pesado.
- source_word: לְנֶפֶשׁ אָדָם
  english_pob_choice: by a human corpse
  chosen_spanish: por causa de un cadáver humano
  alternatives_spanish:
  - por contacto con un cadáver humano
  - por un muerto
  - por causa de un hombre muerto
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de impureza por cadáver. «Cadáver humano» comunica con precisión la idea de contaminación por muerte y evita la literalidad opaca de «alma de hombre».
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué viene que
  lexicon: HALOT
  rationale: Interrogativo directo y natural para su protesta.
- source_word: נִגָּרַע
  english_pob_choice: should we be kept from
  chosen_spanish: se nos debe impedir
  alternatives_spanish:
  - se nos ha de excluir
  - se nos debe privar
  lexicon: HALOT
  rationale: El nifal de גרע expresa ser apartado o excluido. «Se nos debe impedir» conserva la pasiva/restricción de acceso de forma idiomática en español.
- source_word: לְבִלְתִּי הַקְרִב
  english_pob_choice: from presenting
  chosen_spanish: presentar
  alternatives_spanish:
  - ofrecer
  - traer
  - acercar para ofrecer
  lexicon: HALOT
  rationale: En contexto sacrificial, הקריב significa presentar/ofrecer. Aquí, con «impedir», el infinitivo simple «presentar» es claro y evita redundancia.
- source_word: קָרְבַּן
  english_pob_choice: the offering
  chosen_spanish: la ofrenda
  alternatives_spanish:
  - la ofrenda sacrificial
  - el sacrificio
  lexicon: HALOT
  rationale: קָרְבָּן designa una ofrenda traída ante Dios; «ofrenda» conserva la amplitud sacrificial sin forzar una equivalencia técnica única.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Nombre divino: «Yahvé» en el texto principal, preservando el nombre propio del pacto en lugar de una sustitución por título.'
- source_word: בְּמֹעֲדוֹ
  english_pob_choice: at its appointed time
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - en su tiempo establecido
  - en su momento fijado
  lexicon: HALOT
  rationale: מועד aquí denota el tiempo fijado por prescripción cultual. «Tiempo señalado» comunica bien la cita/ocasión establecida.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: en medio de los hijos de Israel
  alternatives_spanish:
  - entre los hijos de Israel
  - entre los israelitas
  lexicon: HALOT
  rationale: Se conserva la fórmula hebrea «hijos de Israel» por fidelidad al ethnónimo bíblico. «En medio de» refleja correctamente בְּתוֹךְ y su sentido de participación comunitaria.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrama. Conforme al criterio del proyecto, se translitera el Nombre divino como «Yahvé» en vez de sustituirlo por un título tradicional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Render of cultic impurity in טְמֵאִים
  english_pob_reading: unclean
  chosen_spanish_reading: impuros
  alternative_spanish_readings:
  - ritualmente impuros
  - inmundos
  rationale: La impureza aquí es ritual/cultual, no moral. «Impuros» funciona en español bíblico moderno y la nota lexical preserva el matiz específico.
  doctrine_reference: DOCTRINE.md Translation philosophy; purity/impurity terminology
- issue: Idiom לְנֶפֶשׁ אָדָם
  english_pob_reading: by a human corpse
  chosen_spanish_reading: por causa de un cadáver humano
  alternative_spanish_readings:
  - por contacto con un cadáver humano
  - por un muerto
  rationale: La frase hebrea indica contaminación por cadáver. «Cadáver humano» explicita el referente sin perder la fuerza legal/cultual del modismo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; contested idioms
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió precisar לְנֶפֶשׁ אָדָם como «by a human corpse» en lugar de «because of a dead man». La versión española sigue esa decisión y evita una traducción literal opaca; también conserva el nombre divino como Yahvé conforme al criterio POB en español.
  spanish_consistency_notes:
  - Se mantuvo «hijos de Israel» para conservar la fórmula bíblica y su correspondencia con el texto hebreo.
  - Se eligió «Yahvé» como forma regular del Tetragrama en el texto principal.
  - «Impuro»/«impuros» se usa en sentido cultual; la nota a aclara la idiomaticidad de la expresión hebrea.
  - «Presentar la ofrenda» refleja el sacrificial הקריב sin repetir innecesariamente la idea de ofrenda dentro del verbo.
