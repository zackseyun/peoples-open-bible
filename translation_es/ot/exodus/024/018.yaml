translation:
  language: es
  text: Moisés entró en medio de la nube[a] y subió al monte. Y Moisés estuvo en el monte cuarenta días y cuarenta noches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la nube» o «dentro de la nube». El hebreo enfatiza que Moisés entró en la propia nube.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - vino
  - fue
  - ingresó
  lexicon: HALOT
  rationale: בוא expresa movimiento de entrada; «entró» comunica de forma natural que Moisés penetró en el ámbito de la nube, sin perder la dirección del verbo.
- source_word: בְּתוֹךְ
  english_pob_choice: into the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - dentro de
  - en el interior de
  - en medio del
  lexicon: HALOT
  rationale: תוך señala el interior o centro. «En medio de» conserva la fuerza espacial de que Moisés entró en la propia nube, no solo cerca de ella.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube espesa
  - la nube
  - la nube divina
  lexicon: HALOT
  rationale: Se mantiene el sustantivo simple «nube», porque el hebreo no añade aquí un adjetivo como «espesa»; así se conserva la imagen teofánica sin ampliar el texto.
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia
  - subió al
  lexicon: HALOT
  rationale: עלה significa subir/ascender. «Subió» es natural en español y preserva el movimiento vertical sin un registro innecesariamente solemne.
- source_word: אֶל הָהָר
  english_pob_choice: the mountain
  chosen_spanish: al monte
  alternatives_spanish:
  - a la montaña
  - al monte Sinaí
  - hacia el monte
  lexicon: HALOT
  rationale: «Al monte» refleja bien el destino del ascenso y suena bíblico sin depender de una glosa interpretativa adicional.
- source_word: וַיְהִי
  english_pob_choice: was
  chosen_spanish: estuvo
  alternatives_spanish:
  - estaba
  - permaneció
  - fue
  lexicon: HALOT
  rationale: Aquí היה introduce la duración de la estancia de Moisés. «Estuvo» expresa de manera clara su permanencia durante el periodo indicado.
- source_word: בָּהָר
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - sobre el monte
  - en la montaña
  - sobre la montaña
  lexicon: HALOT
  rationale: La preposición ב con הַר puede expresarse naturalmente como ubicación en el monte. «En el monte» mantiene la referencia espacial sin forzar un matiz inexistente.
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לָיְלָה
  english_pob_choice: forty days and forty nights
  chosen_spanish: cuarenta días y cuarenta noches
  alternatives_spanish:
  - cuarenta días y cuarenta noches
  - cuarenta jornadas y cuarenta noches
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática de duración con sus equivalentes directos en español, sin suavizar ni reinterpretar la cifra.
theological_decisions:
- issue: La nube como imagen de la presencia divina
  english_pob_reading: the cloud
  chosen_spanish_reading: la nube
  alternative_spanish_readings:
  - la nube espesa
  - la nube de la presencia
  rationale: El hebreo usa עָנָן sin calificativo adicional. La traducción conserva la imagen teofánica básica sin explicarla más de lo que el texto permite.
  doctrine_reference: Priorizar la evidencia del hebreo y preservar la tensión interpretativa en la teofanía.
translation_notes:
  revision_awareness: El texto inglés de referencia ya optó por «entered into the midst of the cloud» con nota alternativa; la versión española reproduce esa decisión con una formulación natural («entró en medio de la nube») y conserva la alternativa en nota para reflejar la intensidad espacial del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Moisés» como nombre propio en toda la línea.
  - Se usa «monte» para reflejar el uso bíblico habitual de הָהָר en este contexto.
  - No se introduce «SEÑOR» ni «Cristo», porque este versículo no contiene esos términos.
  - La duración se expresa con el paralelo español normal «días/noches» para mantener la estructura del hebreo.
