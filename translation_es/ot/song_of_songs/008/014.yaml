translation:
  language: es
  text: ¡Huye[a], mi amado[c][b], y sé como una gacela o un joven ciervo por los montes de especias!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Corre». El verbo hebreo puede traducirse más literalmente como «huye» o «corre», pero aquí probablemente expresa movimiento veloz dentro de la imaginería amorosa, no una huida por temor.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un joven ciervo». La expresión hebrea alude literalmente a una cría joven de los ciervos/venados.'
    reason: lexical_alternative
  - marker: c
    text: Compárese Cantar 2:17, donde aparece una imagen semejante del amado como gacela o joven ciervo en las alturas.
    reason: cross_reference
lexical_decisions:
- source_word: בְּרַח
  english_pob_choice: Flee
  chosen_spanish: ¡Huye!
  alternatives_spanish:
  - ¡Escapa!
  - ¡Corre!
  - ¡Apresúrate a irte!
  lexicon: HALOT
  rationale: El imperativo de ברח expresa movimiento rápido de salida. En español, «huye» conserva la fuerza verbal y la inmediatez del original sin sonar excesivamente literal en un contexto poético amoroso; «escapa» o «corre» serían posibles, pero menos precisos o menos naturales aquí.
- source_word: דּוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: amado mío
  alternatives_spanish:
  - mi amado
  - mi amor
  lexicon: HALOT
  rationale: דּוֹדִי es un término de afecto para el varón amado en Cantar. «Amado mío» preserva la relación afectiva y la especificidad del vocativo. «Mi amor» es más idiomático en algunos registros, pero puede perder algo de la claridad relacional del hebreo.
- source_word: וּדְמֵה לְךָ
  english_pob_choice: and be like
  chosen_spanish: y sé como
  alternatives_spanish:
  - y hazte como
  - y semejante a ti
  lexicon: HALOT
  rationale: דמה con ל indica semejanza. «Y sé como» comunica de manera natural el imperativo de comparación, manteniendo el paralelismo poético.
- source_word: לִצְבִי
  english_pob_choice: a gazelle
  chosen_spanish: una gacela
  alternatives_spanish:
  - una corza
  - un ciervo
  lexicon: HALOT
  rationale: צְבִי nombra un animal esbelto y ágil, normalmente «gacela». Es la opción más clara y poéticamente adecuada para el lector español.
- source_word: אֹו לְעֹפֶר הָאַיָּלִים
  english_pob_choice: or a young stag
  chosen_spanish: o un joven ciervo
  alternatives_spanish:
  - o una cría de los ciervos
  - o un cervatillo
  lexicon: HALOT
  rationale: עֹפֶר designa un animal joven; הָאַיָּלִים se refiere a ciervos/venados. «Joven ciervo» mantiene la imagen masculina del paralelo y evita una frase más pesada como «cría de los ciervos».
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - por
  lexicon: HALOT
  rationale: El preposición עַל aquí expresa ubicación o desplazamiento en terreno elevado. «Sobre» reproduce bien la imagen de movimiento en las alturas.
- source_word: הָרֵי בְשָׂמִים
  english_pob_choice: the mountains of spices
  chosen_spanish: los montes de aromas
  alternatives_spanish:
  - los montes de especias
  - los montes de perfumes
  lexicon: HALOT
  rationale: בְשָׂמִים puede significar especias, perfumes o sustancias aromáticas. «Aromas» evita restringir indebidamente el sentido botánico y conserva el valor poético de fragancia; «montes» funciona mejor en español poético que «montañas» en este verso breve.
theological_decisions:
- issue: Imágenes amorosas en un cierre de poema
  english_pob_reading: The verse uses swift-movement imagery from romantic poetry, not fear or hostility.
  chosen_spanish_reading: El verso conserva el imperativo y la imagen de movimiento ágil como figura poética amorosa, no como rechazo agresivo.
  alternative_spanish_readings:
  - «huye» podría leerse como rechazo
  - «apresúrate» suavizaría en exceso la urgencia
  rationale: La línea final de Cantar 8:14 retoma el lenguaje imagético de 2:17. En español conviene mantener la tensión entre imperativo y ternura sin convertirlo en una despedida hostil. «Huye» conserva la nitidez del hebreo; el vocativo «amado mío» orienta la lectura hacia el registro afectivo del poema.
  doctrine_reference: Poética bíblica / Cantar de los Cantares 2:17; 8:14
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que corrigió «Hurry away» a «Flee» por mayor cercanía léxica al hebreo. La versión española refleja esa decisión con «Huye», preservando al mismo tiempo el marco poético y afectivo del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este verso no contiene el nombre divino.
  - Se prefirió «amado» para דּוֹדִי, coherente con el uso de Cantar y con el audit trail inglés.
  - Se eligió «gacela» y «joven ciervo» para mantener el paralelismo animal sin introducir tecnicismos.
  - «Montes de aromas» busca una equivalencia poética fiel al hebreo בְשָׂמִים sin fijar indebidamente la sustancia aromática.
