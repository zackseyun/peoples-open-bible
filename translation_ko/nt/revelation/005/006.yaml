id: REV.5.6
reference: 'Revelation 5:6'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καὶ εἶδον ἐν μέσῳ τοῦ θρόνου καὶ τῶν τεσσάρων ζῴων καὶ ἐν μέσῳ τῶν πρεσβυτέρων ἀρνίον ⸀ἑστηκὸς ὡς ἐσφαγμένον, ⸀ἔχων κέρατα ἑπτὰ καὶ ὀφθαλμοὺς ἑπτά, ⸀οἵ εἰσιν τὰ ἑπτὰ πνεύματα τοῦ θεοῦ, ⸀ἀπεσταλμένοι εἰς πᾶσαν τὴν γῆν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/005/006.yaml
  text: 'And I saw[a], in the midst of the throne and of the four living creatures, and in the midst of the elders, a Lamb standing as though it had been slain, having seven horns and seven eyes[b], which are the seven Spirits of God sent out into all the earth.'
  footnotes:
  - marker: a
    text: Or, more literally, 'as slain' or 'as if slaughtered.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the seven Spirits of God' is retained as written; some understand it as a symbolic way of speaking of the Holy Spirit in sevenfold fullness.
    reason: alternative_reading
translation:
  language: ko
  text: '또 내가 보니, 보좌와 네 생물 사이, 그리고 장로들 사이에 한 어린 양이 서 계셨는데, 마치 죽임을 당하신 것 같았습니다[a]. 그분께는 일곱 뿔과 일곱 눈이 있었으니, 이는 온 땅으로 보내심을 받은 하나님의 일곱 영입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 더 직역하여 「죽임을 당한 듯한」 혹은 「학살된 듯한」.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρνίον
  english_pob_choice: Lamb
  chosen_korean: 어린 양
  alternatives_korean:
  - 새끼 양
  lexicon: BDAG
  rationale: '한국 교회 전통의 「어린 양」을 유지. 메시아적 희생의 이미지를 일관되게 보존한다.'
- source_word: ἐσφαγμένον
  english_pob_choice: as though it had been slain
  chosen_korean: 죽임을 당하신 것 같았습니다
  alternatives_korean:
  - 학살당한 듯한
  lexicon: BDAG
  rationale: 'σφάζω는 제물을 「죽이다」의 무거운 어휘이다. 송영의 무게를 살리되 「죽임을 당하신」으로 옮긴다.'
theological_decisions:
- issue: '5장 도입부의 「죽임을 당한 어린 양」 이미지 보존'
  chosen_reading: '「죽임을 당하신 것 같은 어린 양」'
  alternative_readings:
  - 학살된 어린 양
  rationale: 'ἐσφαγμένον은 제물의 살해를 가리키는 무거운 어휘이며, 5장 전체가 이 이미지 위에서 송영을 전개한다. 한국어로도 「죽임을 당하신」으로 옮겨 십자가 희생의 무게를 5:9, 5:12와 일관되게 살린다.'
  doctrine_reference: 'DOCTRINE.md: 십자가 어휘의 무게 보존'
