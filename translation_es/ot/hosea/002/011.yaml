    issue: Las notas al pie están ancladas a las palabras equivocadas.
    rationale: En el texto, [a] aparece en 'tiempo', pero su nota trata la alternativa para וְהִצַּלְתִּי ('arrebataré'). [b] aparece en 'quitaré', pero su nota trata 'su desnudez'. Esto rompe la trazabilidad auditada y contradice la instrucción de que cada nota debe aparecer en el lugar relevante del texto.
  - severity: medium
    issue: La nota sobre 'su desnudez' está mal redactada tipográficamente.
    rationale: 'La cadena actual incluye comillas y puntuación defectuosas (''Hebreo: ''''su desnudez'''' ...), lo que reduce la calidad editorial.'
  - severity: low
    issue: '''En su temporada'' es menos preciso y algo menos bíblico que otras opciones posibles.'
    rationale: מועד tiene matiz de tiempo señalado/apropiado. 'Temporada' se entiende, pero 'en su tiempo señalado' o 'en su estación' preservan mejor el registro y el paralelismo con 'en su tiempo'.
  revised_spanish_text: Por tanto, volveré y tomaré de nuevo mi grano en su tiempo, y mi vino nuevo en su tiempo señalado; y quitaré[a] mi lana y mi lino, que eran para cubrir su desnudez[b].
  revised_footnotes:
