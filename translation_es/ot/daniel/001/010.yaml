base_translation:
  language: en
  yaml_path: translation/ot/daniel/001/010.yaml
  text: But the chief of the eunuchs said to Daniel[a], “I fear my lord the king, who assigned your food and your drink[c][b]. Why should he see your faces looking worse than the youths who are of your own age? Then you would endanger my head with the king.”
  footnotes:
  - marker: a
    text: Or 'the chief official.' The Hebrew term for 'eunuchs' can also refer more broadly to royal court officials.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'your faces gloomy' or 'troubled.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'you would make my head liable to the king,' an idiom meaning to put his life in danger before the king.
    reason: lexical_alternative
