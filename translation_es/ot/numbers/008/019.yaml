translation:
  language: es
  text: Y yo he dado a los levitas como un don[a] a Aarón y a sus hijos, de entre los hijos de Israel[b], para hacer el servicio de los hijos de Israel en el tabernáculo de reunión, y para hacer expiación por los hijos de Israel, para que no haya entre los hijos de Israel una plaga cuando los hijos de Israel se acerquen al lugar santo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "a los levitas, que son dados a Aarón y a sus hijos". El hebreo repite la raíz "dar" para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "de en medio de los hijos de Israel".'
    reason: lexical_alternative
  - marker: c
    text: 'O: "el santuario".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְּנָה
  english_pob_choice: And I have given
  chosen_spanish: Y yo he dado
  alternatives_spanish:
  - Y di
  - Y he entregado
  lexicon: HALOT
  rationale: La forma verbal hebrea conserva una fuerza de acción divina ya realizada con efecto vigente; el pretérito perfecto compuesto español comunica bien ese valor resultativo en un discurso divino sin perder la naturalidad.
- source_word: הַלְוִיִּם נְתֻנִים
  english_pob_choice: the Levites as a gift
  chosen_spanish: a los levitas como un don
  alternatives_spanish:
  - a los levitas como regalo
  - a los levitas, dados
  lexicon: HALOT
  rationale: Se mantiene el sentido enfático del doble נתן/נתונים con 'como un don', que expresa la idea de que los levitas son dados para este propósito; 'don' es más digno y más bíblico en español que 'regalo'.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  english_pob_choice: to Aaron and to his sons
  chosen_spanish: para Aarón y para sus hijos
  alternatives_spanish:
  - a Aarón y a sus hijos
  - en favor de Aarón y de sus hijos
  lexicon: HALOT
  rationale: El ל indica destinatario/beneficiario; 'para' comunica bien esa relación de entrega y destino, y en español suena natural en este contexto cultual.
- source_word: מִתּוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from among the sons of Israel
  chosen_spanish: de en medio de los hijos de Israel
  alternatives_spanish:
  - de entre los hijos de Israel
  - de en medio de los israelitas
  lexicon: HALOT
  rationale: '''De en medio de'' refleja con mayor cercanía el hebreo מִתּוֹךְ y preserva la idea de selección desde dentro del pueblo; se mantiene ''hijos de Israel'' por la política de precisión del proyecto.'
- source_word: לַעֲבֹד אֶת עֲבֹדַת
  english_pob_choice: to do the service of
  chosen_spanish: para hacer el servicio de
  alternatives_spanish:
  - para realizar el servicio de
  - para ejercer el servicio de
  lexicon: HALOT
  rationale: La construcción verbal + sustantivo cognado en hebreo se reproduce con un giro español sobrio y comprensible. 'Hacer el servicio' conserva la repetición semántica sin sonar forzado.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en la tienda de reunión
  - en la carpa de reunión
  lexicon: HALOT
  rationale: '''Tabernáculo de reunión'' es la expresión cultual estable en español bíblico y comunica el referente sagrado con claridad. Aunque ''tienda'' es literal, ''tabernáculo'' evita ambigüedad en lectura eclesial.'
- source_word: וּלְכַפֵּר עַל
  english_pob_choice: and to make atonement for
  chosen_spanish: y para hacer expiación
  alternatives_spanish:
  - y para expiar
  - y para efectuar expiación
  lexicon: HALOT
  rationale: Se prefiere 'hacer expiación' para preservar el campo sacerdotal de כפר sin imponer una explicación doctrinal más estrecha. En español mantiene la tensión cultual entre purificación y cobertura expiatoria.
- source_word: נֶגֶף
  english_pob_choice: a plague
  chosen_spanish: una plaga
  alternatives_spanish:
  - un azote
  - una mortandad
  - un golpe
  lexicon: HALOT
  rationale: '''Plaga'' es el equivalente más claro e idiomático en el contexto de juicio divino asociado al acceso indebido al santuario.'
- source_word: בְּגֶשֶׁת
  english_pob_choice: when ... come near
  chosen_spanish: cuando los hijos de Israel se acerquen
  alternatives_spanish:
  - al acercarse los hijos de Israel
  - cuando se aproximen los hijos de Israel
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa circunstancia temporal; 'cuando ... se acerquen' es una solución natural en español y mantiene el valor de proximidad ritual.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the holy place
  chosen_spanish: el lugar santo
  alternatives_spanish:
  - el santo lugar
  - el santuario
  lexicon: HALOT
  rationale: En este contexto, el término puede referirse al espacio sagrado del santuario. 'Lugar santo' conserva la concreción espacial sin reducirlo indebidamente a una sola institución o edificio.
theological_decisions:
- issue: Función de los levitas entre Israel y Aarón
  english_pob_reading: The Levites are given from among Israel to Aaron and his sons to perform Israel's service and to make atonement on Israel's behalf.
  chosen_spanish_reading: Los levitas son dados desde dentro de Israel a Aarón y a sus hijos para realizar el servicio de Israel y hacer expiación por Israel.
  alternative_spanish_readings:
  - Los levitas solo asisten en tareas prácticas sin función expiatoria.
  - Los levitas son entregados para sustituir totalmente a Israel.
  rationale: 'La traducción conserva ambas afirmaciones del texto: servicio y expiación. No se atenúa ni se amplía la función levítica; se deja la tensión teológica tal como aparece en el hebreo y en el audit trail inglés.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Preservación de la fórmula בני ישראל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: Se mantiene la expresión formal y gender-accurate del hebreo, coherente con la política del proyecto y con el testimonio del texto fuente.
  doctrine_reference: Gender-accurate over gender-neutral.
- issue: Sentido de כפר
  english_pob_reading: make atonement for
  chosen_spanish_reading: hacer expiación
  alternative_spanish_readings:
  - hacer propiciación
  - expiar por
  rationale: '''Hacer expiación'' conserva el lenguaje sacerdotal sin cerrarlo a una sola teoría doctrinal; es suficientemente amplio para el contexto levítico y transparente para lectores bíblicos en español.'
  doctrine_reference: Preserve cultic ambiguity where the source does.
translation_notes:
  revision_awareness: La redacción sigue el ajuste de la última revisión inglesa que prefirió 'as a gift' por ser más natural y exacto que 'as ones given'. En español se reflejó esa decisión con 'como un don', manteniendo el énfasis de נתונים sin sonar artificial. También se respetó la lectura estable de 'tent of meeting'/'holy place' y la función dual de servicio + expiación.
  spanish_consistency_notes:
  - Se mantuvo 'hijos de Israel' por consistencia con la política de precisión formal del proyecto.
  - Se evitó 'SEÑOR' o 'Cristo' porque el versículo no los requiere.
  - Se usó 'tabernáculo de reunión' como equivalente cultual estable para בְּאֹהֶל מוֹעֵד.
  - Se eligió 'lugar santo' para evitar restringir el referente a una única noción institucional cuando el contexto puede abarcar el espacio sagrado del santuario.
