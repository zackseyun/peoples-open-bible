translation:
  language: es
  text: 'Manos flojas y rodillas que flaquean: una esposa que no bendice a su marido[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una esposa que no bendice a su marido», con el sentido posible de «que no hace que su marido se tenga por dichoso» o «que no lo hace feliz/afortunado». El paralelo griego dice: «la que no considera dichoso a su marido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רִפְיוֹן
  english_pob_choice: slack
  chosen_spanish: flojas
  alternatives_spanish:
  - debilitadas
  - laxas
  - aflojas
  lexicon: HALOT
  rationale: El sustantivo expresa flojedad o debilidad física. «Flojas» conserva la imagen corporal breve y natural en español, equivalente a la idea de manos relajadas o sin firmeza.
- source_word: יָדַיִם
  english_pob_choice: hands
  chosen_spanish: manos
  alternatives_spanish:
  - brazos
  lexicon: HALOT
  rationale: La referencia es literal a la parte del cuerpo, y «manos» mantiene la imagen paralela con «rodillas».
- source_word: כִשְׁלוֹן
  english_pob_choice: failing
  chosen_spanish: vacilantes
  alternatives_spanish:
  - fallidas
  - tambaleantes
  - debilitadas
  lexicon: HALOT
  rationale: El hebreo sugiere tropiezo o falla de apoyo. «Vacilantes» transmite en español la idea de rodillas que ceden o flaquean sin sonar forzado.
- source_word: בִּרְכַּיִם
  english_pob_choice: knees
  chosen_spanish: rodillas
  alternatives_spanish:
  - piernas
  lexicon: HALOT
  rationale: Es un equivalente directo y conserva la metáfora corporal del texto.
- source_word: אִשָּׁה
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  lexicon: HALOT
  rationale: El contexto inmediato «su marido» define la relación conyugal; por eso «esposa» es más preciso que «mujer».
- source_word: לֹא תְאַשֵּׁר
  english_pob_choice: does not bless
  chosen_spanish: no bendice
  alternatives_spanish:
  - no llama bienaventurado
  - no considera dichoso
  - no hace feliz
  lexicon: HALOT
  rationale: El piel de אשר aquí puede significar declarar o tratar como bendecido/feliz. Siguiendo la revisión inglesa, «bendice» es más natural en español y mantiene la conexión con la bendición, mientras que la nota recoge la alternativa de «contar por bendito/afortunado» que refleja el griego.
- source_word: בַּעֲלָהּ
  english_pob_choice: her husband
  chosen_spanish: a su marido
  alternatives_spanish:
  - a su esposo
  - a su hombre
  lexicon: HALOT
  rationale: En contexto matrimonial, «marido» comunica con claridad la relación; es además una equivalencia idiomática natural en español.
theological_decisions:
- issue: Relación entre el hebreo conservado y el paralelo griego sobre la esposa negativa
  english_pob_reading: Translate the Hebrew as primary while allowing the Greek to confirm the verse's appositional structure and negative characterization.
  chosen_spanish_reading: Traducir el hebreo como texto principal, sin importar al cuerpo del versículo la cláusula ampliada del griego; la nota conserva la alternativa de leer el sentido como «contar bendito».
  alternative_spanish_readings:
  - «Una esposa que no cuenta a su marido por bendito»
  - «Una esposa que no hace feliz a su marido»
  - «Una esposa que no lo llama dichoso»
  rationale: El testimonio hebreo es el que gobierna aquí, pero el paralelo griego confirma que la idea central es la ausencia de bendición/reconocimiento de dicha para el marido. Por eso el texto principal mantiene una formulación breve y el aparato deja abierta la matización semántica.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando está disponible; usar el griego como control paralelo sin desplazar el testimonio principal.'
translation_notes:
  revision_awareness: El borrador inglés revisado pasó de «make her husband blessed» a «bless her husband» para sonar más directo; la versión española sigue esa revisión con «bendice», pero conserva en nota la alternativa más cercana al griego («cuenta por bendito»).
  spanish_consistency_notes:
  - Se evita «SEÑOR» o fórmulas litúrgicas porque aquí no aparece el Tetragrámaton.
  - «Marido» se usa de forma consistente para בַּעַל en contexto matrimonial.
  - «Bendice» mantiene la fuerza verbal directa; la nota conserva la matización semántica del paralelo griego.
  - La imagen corporal se conserva sin abstracciones como «debilidad moral», porque el hebreo y el griego usan metáfora física.
