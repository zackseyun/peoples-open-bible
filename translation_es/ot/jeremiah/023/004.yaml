translation:
  language: es
  text: Y levantaré sobre ellos pastores que los pastorearán[a]; ya no temerán, ni quedarán consternados, ni faltará ninguno, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni habrá ninguno ausente» / «ni se perderá ninguno». El hebreo probablemente significa que ningún miembro del rebaño faltará o quedará sin contar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  english_pob_choice: I will raise up
  chosen_spanish: haré levantar
  alternatives_spanish:
  - levantaré
  - pondré
  - estableceré
  lexicon: HALOT
  rationale: En este contexto הקים expresa hacer surgir o poner en función a alguien para una tarea de liderazgo. «Haré levantar» conserva la iniciativa divina y la idea de hacer aparecer/instalar, sin volver demasiado interpretativo el verbo.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - para ellos
  - encima de ellos
  lexicon: HALOT
  rationale: La preposición עַל con lenguaje de gobierno o cuidado transmite autoridad y responsabilidad «sobre» el pueblo. «Sobre ellos» refleja mejor esa relación que «para ellos».
- source_word: רֹעִים
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores de ovejas
  - guías
  - líderes
  lexicon: HALOT
  rationale: «Pastores» es el equivalente natural en español para mantener la imagen de pastoreo del contexto. «Líderes» aclararía, pero perdería la metáfora profética.
- source_word: וְרָעוּם
  english_pob_choice: who will shepherd them
  chosen_spanish: y ellos los pastorearán
  alternatives_spanish:
  - y los apacentarán
  - y los cuidarán
  - y los guiarán como pastores
  lexicon: HALOT
  rationale: El verbo comparte raíz con «pastores», por eso conviene conservar la palabra de la misma familia verbal en español. «Pastorearán» preserva el juego léxico y la imagen pastoral; «apacentarán» sería posible, pero suena más estrecho y menos natural aquí.
- source_word: וְלֹא יִירְאוּ עוֹד
  english_pob_choice: and they will no longer fear
  chosen_spanish: no temerán más
  alternatives_spanish:
  - no tendrán más miedo
  - ya no temerán
  lexicon: HALOT
  rationale: «Temerán» reproduce היטב el valor básico de ירא en este contexto de opresión y mal liderazgo. «Más» comunica el sentido de עוֹד y mantiene fluidez española.
- source_word: וְלֹא יֵחַתּוּ
  english_pob_choice: nor be dismayed
  chosen_spanish: ni se espantarán
  alternatives_spanish:
  - ni se acobardarán
  - ni se desmayarán
  - ni se desalentarán
  lexicon: HALOT
  rationale: חתת puede denotar quedar quebrantado, atemorizado o desanimado. «Espantarán» conserva la fuerza de impacto y evita fusionar este verbo con el anterior, aunque en español la diferencia es más de matiz que en hebreo.
- source_word: וְלֹא יִפָּקֵדוּ
  english_pob_choice: nor will any be missing
  chosen_spanish: ni faltará ninguno
  alternatives_spanish:
  - ni habrá ninguno ausente
  - ni se perderá ninguno
  - ni faltará nadie
  lexicon: HALOT
  rationale: פקד en niphal aquí probablemente significa estar ausente, faltar o quedar sin contar. «Faltará ninguno» transmite la idea distributiva de que no habrá ausencia en el rebaño, sin introducir de forma explícita la noción de «perdido».
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: El formulario profético puede traducirse de manera breve y natural con «dice Yahvé». Se mantiene el nombre divino según la convención del proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Conservación de la metáfora del pastor
  english_pob_reading: Retain literal 'shepherds' and 'shepherd them' language
  chosen_spanish_reading: Conservar «pastores» y «pastorearán»
  alternative_spanish_readings:
  - reducir a «líderes» y «cuidarán de ellos»
  - usar solo un verbo genérico como «guiarán»
  rationale: La fuerza del versículo está en restaurar liderazgo mediante la imagen pastoral; esa metáfora conecta con el contexto inmediato de malos pastores y por eso debe permanecer visible en español.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de וְלֹא יִפָּקֵדוּ
  english_pob_reading: Express the result as 'nor will any be missing'
  chosen_spanish_reading: «ni faltará ninguno»
  alternative_spanish_readings:
  - «ni habrá ninguno ausente»
  - «ni se perderá ninguno»
  rationale: 'La frase expresa preservación completa del rebaño: nadie quedará sin contar o ausente. «Faltará ninguno» preserva esa concreción sin cargar el texto con un lenguaje doctrinal posterior que no está explícito aquí.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión final del contexto inglés indica alta concordancia y no registra cambios aplicados; por ello, la redacción española sigue de cerca las decisiones auditadas del POB en este versículo, manteniendo la metáfora pastoral y la clausula de preservación final con un equivalente natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme a la convención del proyecto.
  - Se usa «pastores/pastorearán» para conservar la misma familia léxica del hebreo.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - La nota al pie solo cubre la alternativa léxica de יִפָּקֵדוּ, porque es la única ambigüedad relevante preservada por el POB inglés.
