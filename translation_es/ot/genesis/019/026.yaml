translation:
  language: es
  text: Pero su esposa miró hacia atrás, estando detrás de él[a], y se convirtió en un pilar de sal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'miró detrás'; el hebreo dice más literalmente que miró 'desde detrás de él'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּבֵּט
  english_pob_choice: looked back
  chosen_spanish: miró hacia atrás
  alternatives_spanish:
  - miró
  - volvió la vista atrás
  - miró atrás
  lexicon: HALOT, BDB
  rationale: נבט significa 'mirar'. En este contexto narrativo, con la frase siguiente sobre su posición relativa a Lot, 'miró hacia atrás' comunica con naturalidad la acción y conserva el sentido de retorno de la mirada sin añadir motivo.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - la esposa de él
  lexicon: HALOT, BDB
  rationale: El sufijo pronominal de tercera masculina singular indica 'su esposa', referida a la esposa de Lot. 'Esposa' mantiene el registro digno y claro en español bíblico contemporáneo.
- source_word: מֵאַחֲרָיו
  english_pob_choice: from behind him
  chosen_spanish: desde detrás de él
  alternatives_spanish:
  - desde atrás de él
  - por detrás de él
  - detrás de él
  lexicon: HALOT, BDB
  rationale: 'La preposición con אַחַר y sufijo expresa posición espacial: ''desde detrás de él''. Esta forma conserva la información del hebreo y evita perder la localización relativa a Lot.'
- source_word: וַתְּהִי
  english_pob_choice: she became
  chosen_spanish: se convirtió en
  alternatives_spanish:
  - llegó a ser
  - fue
  - quedó
  lexicon: HALOT, BDB
  rationale: היה en esta secuencia narrativa expresa un cambio de estado. 'Se convirtió en' reproduce mejor el valor resultativo de 'became' que un simple 'fue' o 'estuvo'.
- source_word: נְצִיב
  english_pob_choice: a pillar
  chosen_spanish: una columna
  alternatives_spanish:
  - un pilar
  - una columna erguida
  - un monumento
  lexicon: HALOT, BDB
  rationale: נְצִיב designa algo erguido o establecido. En español, 'columna' es una opción natural y comprensible; se mantiene el valor visual de algo erecto, sin forzar un matiz litúrgico de 'pilar' si no es necesario.
- source_word: מֶלַח
  english_pob_choice: of salt
  chosen_spanish: de sal
  alternatives_spanish:
  - sal
  - salina
  lexicon: HALOT, BDB
  rationale: La relación constructa se expresa naturalmente con 'de sal'. 'De sal' preserva la imagen concreta y no añade interpretación.
theological_decisions:
- issue: Naturaleza de la transformación de la esposa de Lot
  english_pob_reading: 'Render the text straightforwardly as an actual becoming: ''she became a pillar of salt.'''
  chosen_spanish_reading: 'Traducir de forma directa la transformación real: ''se convirtió en una columna de sal''.'
  alternative_spanish_readings:
  - se volvió como una columna de sal
  - quedó como una columna de sal
  rationale: El hebreo presenta una secuencia verbal simple sin marcadores comparativos. Mantener el enunciado como transformación real respeta la fuerza narrativa del texto sin suavizarlo en símil.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal y que no haya notas sin anclaje. La redacción sigue el auditable equilibrio entre literalidad hebrea y español idiomático.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - Se prefirió 'columna' por claridad y naturalidad en español, manteniendo el valor de objeto erguido de נְצִיב.
  - Se conservó la transformación como resultado real ('se convirtió en') sin introducir comparación.
  - El orden de los complementos busca reflejar el hebreo sin producir una construcción forzada en español.
