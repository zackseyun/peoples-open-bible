translation:
  language: es
  text: Ya quedando completamente desangrado[a], sacó sus entrañas y, tomándolas con ambas manos, las agitó ante las multitudes; y, invocando al Soberano de la vida y del espíritu[b] para que se las devolviera otra vez, murió de esta manera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ya completamente sin sangre»; el griego expresa un estado ya en curso, no solo una condición estática.
    reason: lexical_alternative
  - marker: b
    text: «Espíritu» también puede entenderse como «aliento»; la frase podría verterse «Soberano de la vida y del aliento».
    reason: lexical_alternative
lexical_decisions:
- source_word: παντελῶς ἔξαιμος
  english_pob_choice: completely drained of blood
  chosen_spanish: completamente desangrado
  alternatives_spanish:
  - totalmente sin sangre
  - completamente exsangüe
  lexicon: LSJ
  rationale: παντελῶς intensifica ἔξαιμος; en español, «desangrado» comunica el sentido físico y gráfico con naturalidad, sin tecnicismo excesivo. «Exsangüe» sería más médico y menos accesible.
- source_word: ἤδη γινόμενος
  english_pob_choice: already becoming
  chosen_spanish: ya empezando a quedar
  alternatives_spanish:
  - ya quedando
  - ya haciéndose
  lexicon: LSJ
  rationale: La participación en curso está en el griego; «ya empezando a quedar» conserva el matiz procesivo y evita una simple descripción estática.
- source_word: προβαλὼν
  english_pob_choice: pulled out
  chosen_spanish: sacó
  alternatives_spanish:
  - sacó hacia afuera
  - arrancó
  lexicon: LSJ
  rationale: Con τὰ ἔντερα, el verbo describe la salida de las entrañas del cuerpo. «Sacó» es fiel y más natural que un calco más áspero o un verbo demasiado interpretativo.
- source_word: τὰ ἔντερα
  english_pob_choice: his entrails
  chosen_spanish: sus entrañas
  alternatives_spanish:
  - sus intestinos
  - sus vísceras
  lexicon: LSJ
  rationale: «Entrañas» reproduce bien el registro crudo y narrativo del pasaje; «intestinos» es más técnico y «vísceras» más general.
- source_word: λαβὼν ἑκατέραις ταῖς χερσίν
  english_pob_choice: taking them in both hands
  chosen_spanish: tomándolas con ambas manos
  alternatives_spanish:
  - agarrándolas con ambas manos
  - teniéndolas en ambas manos
  lexicon: LSJ
  rationale: La frase participial se mantiene de modo claro y directo. «Tomándolas» conserva la secuencia de acciones sin añadir matiz ajeno.
- source_word: ἐνέσεισε
  english_pob_choice: shook them at
  chosen_spanish: las agitó ante
  alternatives_spanish:
  - las sacudió ante
  - las blandió ante
  lexicon: LSJ
  rationale: El verbo puede denotar agitar, sacudir o mostrar con violencia; «agitó ante» conserva la fuerza demostrativa sin convertir el gesto en un lanzamiento que el griego no exige.
- source_word: τοῖς ὄχλοις
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - la gente
  - las turbas
  lexicon: LSJ
  rationale: «Multitudes» es neutro y plural como el griego, y evita tanto la simplificación singular como una carga peyorativa no obligada por el texto.
- source_word: τὸν δεσπόζοντα
  english_pob_choice: the Master
  chosen_spanish: el Dueño
  alternatives_spanish:
  - el Maestro
  - el Soberano
  lexicon: LSJ
  rationale: δεσπόζω/δεσπότης expresa dominio y soberanía; «Dueño» preserva esa relación de señorío personal. «Maestro» sugeriría enseñanza, y «Soberano» sería más abstracto.
- source_word: τῆς ζωῆς καὶ τοῦ πνεύματος
  english_pob_choice: of life and spirit
  chosen_spanish: de la vida y del espíritu
  alternatives_spanish:
  - de la vida y del aliento
  - de la vida y de la respiración
  lexicon: LSJ
  rationale: «Espíritu» mantiene la amplitud de πνεῦμα y deja abierta la posible resonancia de «aliento» sin reducir el término a un solo sentido. En español, la coordinación natural pide artículo en ambos miembros.
- source_word: τὰ αὐτὰ αὐτῷ πάλιν ἀποδοῦναι
  english_pob_choice: to give these back to him again
  chosen_spanish: para que se las devolviera otra vez
  alternatives_spanish:
  - para devolverle esas mismas cosas otra vez
  - para restituírselas
  lexicon: LSJ
  rationale: El antecedente más cercano de «estas mismas cosas» remite a la vida y el espíritu, no a las entrañas. «Se las devolviera otra vez» es idiomático en español y mantiene la idea de restitución.
- source_word: μετήλλαξεν
  english_pob_choice: he died
  chosen_spanish: murió de esta manera
  alternatives_spanish:
  - murió así
  - pasó de esta vida
  lexicon: LSJ
  rationale: El verbo funciona como eufemismo de muerte. «Murió de esta manera» conserva el cierre narrativo sobrio sin perder la fuerza del original.
theological_decisions:
- issue: Referencia de «vida y espíritu» y del objeto de la devolución
  english_pob_reading: The prayer addresses God as sovereign over life and spirit and asks for their restoration to the dying man.
  chosen_spanish_reading: La invocación presenta a Dios como Dueño de la vida y del espíritu, y pide que le sean devueltos al hombre que agoniza.
  alternative_spanish_readings:
  - que le sean devueltos el aliento y la vida
  - que le sean devueltas esas mismas cosas a las que alude el texto
  rationale: El contexto favorece que «estas mismas cosas» remita a vida/espíritu, no a las entrañas. Al traducir con «Dueño» y «espíritu», se conserva la tensión teológica sobre qué exactamente se pide que vuelva, sin resolverla de antemano en una formulación doctrinal posterior.
  doctrine_reference: Preservar la tensión teológica del texto sin sobreespecificar.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió «shook them at the crowds» frente a «hurled them at the crowds» para reflejar mejor ἐνέσεισε. En español se adoptó «las agitó ante» para conservar ese matiz de agitación/brandir, evitando un verbo de lanzamiento demasiado fuerte.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en el proyecto, pero aquí el griego usa δεσπόζοντα y la referencia es al soberano de la vida y del espíritu; por eso no se introduce Yahvé sin base textual explícita en este versículo.
  - Se traduce πνεῦμα como «espíritu» en el texto principal, dejando abierta en nota la alternativa «aliento», conforme al audit trail.
  - Se usa un registro digno y moderno, evitando arcaísmos litúrgicos no exigidos por el griego.
