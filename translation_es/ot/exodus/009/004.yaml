translation:
  language: es
  text: Pero Yahvé hará una distinción entre el ganado de Israel y el ganado de Egipto, de modo que nada que pertenezca a los hijos[a] de Israel morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas»; el hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִפְלָה
  english_pob_choice: will make a distinction
  chosen_spanish: hará una distinción
  alternatives_spanish:
  - distinguirá
  - separará
  lexicon: HALOT
  rationale: El hifil de פלא expresa hacer una diferencia clara o una separación efectiva entre dos grupos. «Harà una distinción» conserva bien el matiz causativo y suena natural en español bíblico moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre propio del pacto según la convención del proyecto en español: «Yahvé», en lugar de sustituirlo por un título.'
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and ...
  chosen_spanish: entre ... y ...
  alternatives_spanish:
  - entre ... e ...
  lexicon: HALOT
  rationale: La pareja correlativa indica contraste entre dos referentes; «entre ... y ...» es la equivalencia normal y clara en español.
- source_word: מִקְנֵה
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - ganado doméstico
  - animales de cría
  lexicon: HALOT
  rationale: En este contexto de plagas sobre animales, «ganado» comunica bien el conjunto de animales domésticos sin restringirlo a bovinos.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - los egipcios
  lexicon: HALOT
  rationale: 'El constructo puede entenderse como designación nacional: «el ganado de Egipto». En español resulta natural y fiel mantener el país como referencia colectiva.'
- source_word: וְלֹא יָמוּת
  english_pob_choice: so that nothing ... will die
  chosen_spanish: de modo que ... morirá
  alternatives_spanish:
  - y no morirá
  - para que no muera
  lexicon: HALOT
  rationale: 'La relación es resultativa: la distinción produce que no haya muerte entre los de Israel. «De modo que» hace explícita esa consecuencia sin añadir contenido.'
- source_word: מִכָּל
  english_pob_choice: nothing
  chosen_spanish: nada de lo que
  alternatives_spanish:
  - nada
  - ninguna cosa
  lexicon: HALOT
  rationale: Con el verbo negado y el sustantivo singular siguiente, el sentido es distributivo e inclusivo. «Nada de lo que» conserva mejor la idea de totalidad que una simple negación genérica.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: belonging to the sons of Israel
  chosen_spanish: de lo que pertenece a los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - de los hijos de Israel
  lexicon: HALOT
  rationale: La preposición ל- aquí expresa pertenencia/relación. En español, «pertenece a» hace visible esa función sin perder la expresión bíblica «hijos de Israel».
- source_word: דָּבָר
  english_pob_choice: thing
  chosen_spanish: nada de lo que pertenece
  alternatives_spanish:
  - cosa
  - algo
  lexicon: HALOT
  rationale: En una construcción negativa, דָּבָר funciona como «cosa/thing» en sentido amplio. La solución española evita un calco rígido y mantiene el valor idiomático.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: transliterar el nombre divino en vez de ocultarlo con un título genérico. «Yahvé» es la forma establecida en el texto español.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión nacional/familiar בני ישראל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos de Jacob
  rationale: Se conserva la forma bíblica masculina plural sin neutralizarla a una etnónimo más general, porque el texto fuente usa la expresión de linaje/pueblo y no requiere otra domesticación.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «not one thing» a «nothing» para naturalidad formal. La redacción española sigue ese sentido distributivo e inclusivo con «nada de lo que pertenece a los hijos de Israel», evitando endurecerlo en un calco demasiado literal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se traduce מִקְנֵה con «ganado» en un contexto de plaga sobre animales, evitando «cattle» demasiado estrecho.
  - Se preserva la expresión bíblica «hijos de Israel» y se deja la alternativa «los israelitas» en nota.
  - La cláusula final expresa el resultado con «de modo que», acorde con el valor consecutivo del hebreo.
  - No se añadió ninguna nota sin anclaje; el marcador [a] aparece en el texto principal.
