    issue: La frase 'dirán lo mismo' añade contenido no presente en el hebreo.
    rationale: El texto fuente tiene simplemente תֹּאמַרְנָה ... לְכֹל שָׂרֵי הַמֶּלֶךְ, 'dirán a todos los oficiales del rey'. 'Lo mismo' interpreta que repetirán exactamente el ejemplo de la reina, pero esa explicitación no está en la forma hebrea ni en la traducción inglesa auditada.
  - severity: medium
    issue: Falta una nota sobre la elipsis de la cláusula final.
    rationale: El POB inglés documenta que 'and enough contempt and wrath' es elíptico y que se suple un verbo para claridad. En español, 'y habrá bastante...' también es una suplencia interpretativa y conviene preservarla en nota.
  - severity: low
    issue: La nota [b] sobre 'oído/escuchado' no aporta una alternativa exegéticamente relevante.
    rationale: El audit trail inglés no trata esta palabra como una variación significativa, sino como una elección estilística normal. En cambio, el espacio de notas se aprovecha mejor en la elipsis final o manteniendo las alternativas semánticas más importantes.
