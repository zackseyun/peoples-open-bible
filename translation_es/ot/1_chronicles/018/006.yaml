base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/018/006.yaml
  text: And David placed garrisons in Aram of Damascus[a], and the Arameans became David’s servants, bringing tribute[c][b]. And Yahweh gave victory to David wherever he went.
  footnotes:
  - marker: a
    text: Or 'stationed forces' or more literally 'put' in Aram of Damascus; the Hebrew verb itself is simply 'placed,' with 'garrisons' understood from the military context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Aram'; traditionally 'Syria' or 'the Syrians.'
    reason: alternative_reading
  - marker: c
    text: Or 'delivered David' or 'saved David'; in this battle context, 'gave victory' expresses the sense.
    reason: lexical_alternative
