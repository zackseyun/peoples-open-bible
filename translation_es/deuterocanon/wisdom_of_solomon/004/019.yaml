translation:
  language: es
  text: Y después de esto, serán un cadáver deshonrado y un oprobio entre los muertos para siempre[a]. Porque él los derribará de cabeza y mudos, y los sacudirá desde sus cimientos; serán arrasados hasta el extremo, sufrirán dolor[b], y su memoria perecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un cuerpo caído deshonrado»; πτῶμα puede designar un cuerpo caído o un cadáver, subrayando la vergüenza de su final.
    reason: lexical_alternative
  - marker: b
    text: El sujeto de «los derribará» y «los sacudirá» queda implícito en el griego; en contexto se refiere al juicio de Dios, aunque el versículo no repite el nombre divino.
    reason: alternative_reading
lexical_decisions:
- source_word: πτῶμα
  english_pob_choice: corpse
  chosen_spanish: cadáver
  alternatives_spanish:
  - cuerpo caído
  - cuerpo muerto
  - carroña
  lexicon: LSJ
  rationale: En este contexto de juicio y deshonra, πτῶμα no es solo una 'caída', sino el resultado corporal de la caída. 'Cadáver' comunica con naturalidad la concreción del final vergonzoso. Mantengo la posibilidad de 'cuerpo caído' en nota porque el matiz de 'cuerpo caído' también está presente en el griego.
- source_word: ἄτιμον
  english_pob_choice: dishonored
  chosen_spanish: deshonrado
  alternatives_spanish:
  - sin honor
  - desacreditado
  - afrentado
  lexicon: LSJ
  rationale: ἄτιμος expresa falta de honor o deshonra. 'Deshonrado' conserva esa fuerza de vergüenza pública y encaja bien con 'cadáver'.
- source_word: ὕβριν
  english_pob_choice: a reproach
  chosen_spanish: un oprobio
  alternatives_spanish:
  - un reproche
  - una afrenta
  - una vergüenza
  lexicon: LSJ
  rationale: En español, 'oprobio' expresa mejor el estado de deshonra pública que 'reproche' en una frase nominal fija. Conserva el valor de menosprecio social que el POB inglés buscó con 'a reproach'.
- source_word: ἐν νεκροῖς
  english_pob_choice: among the dead
  chosen_spanish: entre los muertos
  alternatives_spanish:
  - con los muertos
  - en medio de los muertos
  lexicon: LSJ
  rationale: La preposición ἐν con plural de personas se traduce naturalmente como 'entre'. Esto preserva la idea de su ubicación/contado entre los muertos como parte de la vergüenza final.
- source_word: διʼ αἰῶνος
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  - por un siglo
  lexicon: LSJ
  rationale: '''Para siempre'' comunica con claridad la duración indefinida y el tono solemne del juicio. Es el equivalente más idiomático y fiel en español moderno.'
- source_word: ῥήξει
  english_pob_choice: will dash ... down
  chosen_spanish: los derribará de cabeza
  alternatives_spanish:
  - los arrojará abajo
  - los precipitará
  - los quebrará
  lexicon: LSJ
  rationale: ῥήγνυμι puede implicar golpear o arrojar violentamente. Dado que sigue πρηνεῖς, la imagen principal es la caída violenta de bruces. 'Derribará de cabeza' conserva ese impulso físico en español natural.
- source_word: ἀφώνους
  english_pob_choice: speechless
  chosen_spanish: sin voz
  alternatives_spanish:
  - mudos
  - callados
  - sin poder hablar
  lexicon: LSJ
  rationale: '''Sin voz'' mantiene el sentido de quedar imposibilitados para hablar y suena menos interpretativo que ''mudos'', que en español puede sugerir una condición permanente. Aquí la idea es el efecto del juicio.'
- source_word: πρηνεῖς
  english_pob_choice: headlong
  chosen_spanish: de cabeza
  alternatives_spanish:
  - de bruces
  - pronos
  - bocabajo
  lexicon: LSJ
  rationale: El término describe la postura de la caída, inclinada hacia delante. 'De cabeza' funciona bien en combinación con 'derribará' para expresar la caída violenta; 'de bruces' se reserva como posible matiz alternativo si se desea enfatizar la postura final.
- source_word: σαλεύσει
  english_pob_choice: shake
  chosen_spanish: los sacudirá
  alternatives_spanish:
  - los hará tambalear
  - los desarraigará
  - los estremecerá
  lexicon: LSJ
  rationale: '''Sacudirá'' reproduce la violencia del verbo y corresponde al paralelismo con ''desde sus cimientos''. Es claro, sobrio y fiel.'
- source_word: ἐκ θεμελίων
  english_pob_choice: from their foundations
  chosen_spanish: desde sus cimientos
  alternatives_spanish:
  - de sus fundamentos
  - desde los fundamentos
  lexicon: LSJ
  rationale: '''Desde sus cimientos'' es la forma más natural en español y conserva la imagen de desestabilización total. ''Cimientos'' traduce bien la metáfora de θεμέλια.'
- source_word: ἕως ἐσχάτου
  english_pob_choice: to the uttermost
  chosen_spanish: hasta lo más extremo
  alternatives_spanish:
  - hasta el extremo
  - por completo
  - hasta el fin
  lexicon: LSJ
  rationale: La expresión griega marca totalidad y extremo. 'Hasta lo más extremo' mantiene el sentido intensivo y el tono elevado del pasaje, sin sonar excesivamente idiomático o demasiado interpretativo.
- source_word: χερσωθήσονται
  english_pob_choice: will be laid waste
  chosen_spanish: serán arrasados
  alternatives_spanish:
  - serán desolados
  - quedarán devastados
  - serán dejados baldíos
  lexicon: LSJ
  rationale: El verbo expresa devastación o desolación total. 'Arrasados' comunica bien la idea de ruina completa y mantiene la fuerza del juicio. La pasiva en español conserva el resultado sin añadir sujeto.
- source_word: ἐν ὀδύνῃ
  english_pob_choice: in pain
  chosen_spanish: en dolor
  alternatives_spanish:
  - en angustia
  - en tormento
  - en pena
  lexicon: LSJ
  rationale: Ὀδύνη denota dolor/angustia. 'En dolor' es literal y sobrio; aunque menos idiomático que 'con dolor', preserva la preposición y la crudeza del estado descrito.
- source_word: ἡ μνήμη αὐτῶν ἀπολεῖται
  english_pob_choice: their memory will perish
  chosen_spanish: su memoria perecerá
  alternatives_spanish:
  - su recuerdo desaparecerá
  - la memoria de ellos se perderá
  - su recuerdo se extinguirá
  lexicon: LSJ
  rationale: La frase griega dice que su memoria será destruida o desaparecerá. 'Su memoria perecerá' es breve, solemne y fiel al giro del inglés POB.
theological_decisions:
- issue: Sujeto implícito de los verbos de juicio
  english_pob_reading: Rendered as 'he will' without specifying the referent by name
  chosen_spanish_reading: «él» los derribará / los sacudirá, sin nombrar explícitamente a Dios
  alternative_spanish_readings:
  - Dios los derribará y sacudirá
  - el Señor los derribará y sacudirá
  - serán derribados y sacudidos (pasivo impersonal)
  rationale: El griego mantiene un sujeto masculino singular implícito en los verbos de acción. En contexto se entiende como el agente del juicio divino, pero el versículo no repite un nombre divino. Conservar 'él' respeta la sintaxis del original y evita introducir una explicitación que el texto no da en esta cláusula.
  doctrine_reference: Primacía del texto original y preservación de la tensión gramatical del sujeto implícito.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés, que ajustó la coordinación de 'headlong and speechless'. En español se reflejó esa coordinación con 'de cabeza y sin voz' dentro del flujo natural de la frase, sin añadir cambios doctrinales ni expandir el contenido del verso.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término predeterminado solo cuando el original lo exige explícitamente; este versículo no lo nombra, por lo que no se introduce.
  - '''Mesías/Cristo'' no aplica en este pasaje.'
  - Se conserva un registro solemne y bíblico, evitando arcaísmos innecesarios pero sin paraphrasear la secuencia de juicio.
  - La pasiva y los participios se han vertido de forma que la violencia del original permanezca clara en español.
