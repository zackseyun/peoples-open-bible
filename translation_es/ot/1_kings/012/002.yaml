review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: transición narrativa, cláusula temporal con ''oyó'', la circunstancia parentética de que Jeroboam aún estaba en Egipto, y la idea final de residencia continuada en Egipto. También preserva correctamente la nota de que el objeto de ''oyó'' está implícito. Sin embargo, ''oyó de ello'' suena poco natural en español bíblico actual, y ''de delante del rey Salomón'' resulta demasiado calcado para el texto principal, aunque la fuerza de מִפְּנֵי puede explicarse en nota.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita un ajuste pequeño para sonar natural en español amplio y eclesial. 'Oyó de ello' debe cambiarse a 'oyó de eso' o simplemente 'oyó'; dado el rastro inglés, 'oyó de eso' conserva el objeto implícito. Además, conviene mover la explicación más literal de מִפְּנֵי a nota y usar en el texto principal 'de' o 'huyendo de'.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Nombres y topónimo están bien: ''Jeroboam'', ''Nebat'', ''Egipto''. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La elección ''seguía viviendo'' encaja bien con la decisión inglesa revisada para וַיֵּשֶׁב.'
  issues:
  - severity: medium
    issue: '''oyó de ello'' es poco idiomático en español moderno'
    rationale: Aunque busca reflejar 'heard of it', en español neutral 'ello' suena rígido y literario. 'Oyó de eso' conserva el referente implícito con mejor naturalidad.
  - severity: medium
    issue: '''de delante del rey Salomón'' es demasiado literal para el texto principal'
    rationale: La expresión comunica la fuerza de מִפְּנֵי, pero en español corriente resulta forzada. El matiz de presencia/poder puede conservarse en una nota, mientras el texto principal use una forma más natural como 'del rey Salomón'.
  revised_spanish_text: Ahora bien, cuando Jeroboam hijo de Nebat oyó de eso[a]—mientras todavía estaba en Egipto, adonde había huido del rey Salomón[b]—Jeroboam seguía viviendo en Egipto.
  revised_footnotes:
