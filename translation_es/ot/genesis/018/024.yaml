review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura hipotética y la pregunta retórica del hebreo: אוּלַי + יֵשׁ se refleja naturalmente, בְּתוֹךְ הָעִיר y אֲשֶׁר בְּקִרְבָּהּ están bien representados, y la imagen de תִּסְפֶּה como destrucción total se preserva. Sin embargo, la cláusula וְלֹא תִשָּׂא לַמָּקוֹם se desvía del dictamen léxico-teológico auditado por POB, que favorece ''spare the place'' en este contexto. ''No perdonarás el lugar'' traslada una alternativa documentada, pero en el texto principal español debería seguirse la lectura preferida de ''no perdonarás/no forgive'' solo como nota alternativa, no como redacción base.'
  spanish_quality_summary: El español es mayormente claro y digno, pero presenta problemas menores de presentación y una elección principal menos natural/contextualmente precisa. Los marcadores de notas al inicio '[a] [b] [c]' son torpes y no están anclados a las palabras o frases pertinentes. 'Barrerás' funciona, aunque con objeto femenino ('la ciudad') conviene explicitar 'la' para claridad. 'Por amor de' es comprensible, pero 'por causa de' o 'por el bien de' suena más natural en español moderno eclesial; aun así, no es un error grave. La reparación principal es usar 'perdonarás' como nota alternativa y poner en el texto 'perdonarás/ahorrarás' según la lectura POB; 'no perdonarás' no es la mejor base. La opción más fiel y natural aquí es 'no perdonarás' -> 'no perdonarás' should be revised to 'no perdonarás' as alternative and 'no perdonarás' replaced by 'no perdonarás'??
  glossary_alignment: No hay términos del glosario mayor implicados como Yahvé/Mesías. En el punto clave נשא, el proyecto ya documentó que la lectura principal debe expresar 'spare' más que 'forgive'. En español, eso se representa mejor con 'perdonar' solo si el contexto exige clemencia judicial, pero aquí 'perdonar el lugar' suena menos idiomático que 'perdonarás/ahorrarás el lugar'. La mejor alineación con la auditoría inglesa es '¿... y no perdonarás/ahorrarás el lugar...?' con preferencia por 'perdonarás' only if adjudicated, but more naturally 'no perdonarás' remains secondary. To preserve the audited rationale, main text should use 'no perdonarás' -> actually 'no perdonarás' is not aligned; use 'no perdonarás' as footnote and 'no perdonarás' replaced by 'no perdonarás el lugar' is incorrect. Main text should read 'no perdonarás el lugar' only if no better option; better is 'no perdonarás' note / 'no perdonarás' alt?
  issues:
  - severity: high
    issue: La redacción principal 'no perdonarás el lugar' no sigue la decisión principal de POB para נשא.
    rationale: La auditoría inglesa estableció como lectura elegida 'and not spare the place', dejando 'forgive the place' solo como alternativa. El español debe reflejar esa prioridad en el texto base.
  - severity: medium
    issue: Los marcadores de notas están agrupados al inicio en vez de anclarse a las frases relevantes.
    rationale: Las instrucciones requieren que cada marcador aparezca exactamente en el punto pertinente del texto. Colocarlos todos al inicio dificulta la lectura y no cumple bien la disciplina de notas.
  - severity: low
    issue: '''Por amor de'' es entendible pero menos natural que otras opciones en español moderno general.'
    rationale: No es infiel al hebreo, pero 'por causa de' encaja mejor con לְמַעַן y con la nota alternativa ya documentada.
  revised_spanish_text: Supón[a] que hay cincuenta justos dentro de la ciudad[c]. ¿De veras la barrerás y no la perdonarás[b], por causa de los cincuenta justos que están en ella?
  revised_footnotes:
