base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/003/007.yaml
  text: But they kept spreading talk about the disagreement over acts of homage and foods[a], saying that these people would be in accord with neither the king nor the authorities, but were hostile and greatly opposed to public affairs[b]; and they brought upon them no ordinary fear.
  footnotes:
  - marker: a
    text: Or 'worship and foods.' The Greek for 'acts of homage' can also be rendered 'worship' or 'obeisances,' preserving ambiguity between religious and courtly acts of reverence.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they attached to them no ordinary fear,' meaning they burdened them with a serious public fear or suspicion.
    reason: lexical_alternative
