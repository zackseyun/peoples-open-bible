translation:
  language: es
  text: Después de levantar campamento, llegó a Damasco y recorrió toda la región.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναζεύξας
  english_pob_choice: after breaking camp
  chosen_spanish: después de romper campamento
  alternatives_spanish:
  - después de partir
  - después de levantarse de campamento
  - después de emprender la marcha
  lexicon: LSJ
  rationale: ἀναζεύγνυμι suele referirse a levantar o romper campamento en contexto de marcha militar. «Romper campamento» conserva mejor ese matiz que un simple «partir», y sigue siendo natural en español bíblico actual.
- source_word: ἦλθεν
  english_pob_choice: he came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - fue
  lexicon: BDAG
  rationale: Con εἰς Δαμασκόν, «llegó a Damasco» expresa con naturalidad el sentido de movimiento hacia un destino. En español, «vino a Damasco» sonaría menos idiomático en este contexto narrativo.
- source_word: διώδευσεν
  english_pob_choice: traveled through
  chosen_spanish: recorrió
  alternatives_spanish:
  - atravesó
  - pasó por
  - viajó por
  lexicon: LSJ
  rationale: El verbo denota atravesar o hacer el recorrido por una zona. «Recorrió» comunica bien la acción de moverse a través de un territorio sin reducirla a un mero paso puntual.
- source_word: ἐν πάσῃ τῇ χώρᾳ
  english_pob_choice: through the whole region
  chosen_spanish: toda la región
  alternatives_spanish:
  - toda la tierra
  - todo el país
  - toda la comarca
  lexicon: BDAG
  rationale: χώρα aquí alude a una extensión territorial alrededor de Damasco. «Región» evita sobrecargar el texto con «país» y mantiene el alcance geográfico amplio sin volverlo moderno en exceso.
- source_word: καὶ ... καὶ
  english_pob_choice: And ... and
  chosen_spanish: Y ... y
  alternatives_spanish:
  - Entonces ... y
  - Y ... después
  lexicon: —
  rationale: Se conserva la sucesión narrativa simple del griego con la repetición de «y», sin forzar una conexión lógica más fuerte que la del texto fuente.
translation_notes:
  revision_awareness: Base grounded on the Swete Greek text and the English POB audit trail; no prior Spanish draft existed, and no textual or interpretive revisions were required beyond normal Spanish naturalness.
