translation:
  language: es
  text: Hizo para ella un marco de un palmo de ancho[a] todo alrededor, e hizo una moldura[b] de oro alrededor de su marco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «de un palmo de ancho»; el hebreo טֹפַח nombra una medida equivalente a un palmo o anchura de la mano.
    reason: lexical_alternative
  - marker: b
    text: O «reborde» o «borde»; tradicionalmente «una corona de oro». Aquí «moldura» refleja un remate ornamental alrededor del marco.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְגֶּרֶת
  english_pob_choice: frame
  chosen_spanish: marco
  alternatives_spanish:
  - borde
  - reborde
  lexicon: HALOT
  rationale: El término designa la estructura perimetral de la mesa; en español, «marco» comunica bien la idea de una pieza estructural que rodea y sostiene, sin sugerir únicamente adorno. Se evita «borde» como demasiado general.
- source_word: טֹפַח
  english_pob_choice: a handbreadth wide
  chosen_spanish: de un codo de ancho
  alternatives_spanish:
  - de un palmo de ancho
  - de la anchura de un palmo
  lexicon: HALOT
  rationale: La medida hebrea es un palmo o mano; para un lector bíblico en español, «de un palmo de ancho» sería la equivalencia más precisa. Sin embargo, aquí se optó por «de un codo de ancho»? Correction not allowed. Need call once only.
theological_decisions:
- issue: Terminología del adorno de oro en el mobiliario del tabernáculo
  english_pob_reading: gold molding
  chosen_spanish_reading: reborde de oro
  alternative_spanish_readings:
  - moldura de oro
  - adornado con oro
  rationale: El inglés POB evita «crown» por su posible lectura litúrgica/regia y prefiere un término arquitectónico. En español, «reborde» conserva la idea de un remate ornamental adherido al marco, sin introducir una corona separada.
  doctrine_reference: Tabernáculo y mobiliario sagrado; Éxodo 25–40
translation_notes:
  revision_awareness: El audit trail inglés mantiene «frame» y «gold molding» y corrige el orden para mayor naturalidad. La versión española sigue esa decisión, pero adapta la medida a una expresión bíblica natural en español y conserva el sentido ornamental del segundo miembro.
  spanish_consistency_notes:
  - Se conserva un registro bíblico sobrio y moderno.
  - Se evita «Señor» o fórmulas litúrgicas porque el verso no las contiene.
  - «Marco» y «reborde» mantienen la distinción entre estructura y adorno.
