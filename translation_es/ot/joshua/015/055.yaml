lexical_decisions:
- source_word: מָעוֹן
  english_pob_choice: Maon
  chosen_spanish: Maón
  alternatives_spanish:
  - Maón
  lexicon: HALOT
  rationale: Es un nombre propio de lugar en una lista de asentamientos; se translitera en vez de traducirse. En español, la acentuación gráfica ayuda a reflejar la pronunciación natural del topónimo.
- source_word: כַּרְמֶל
  english_pob_choice: Carmel
  chosen_spanish: Carmelo
  alternatives_spanish:
  - Carmel
  lexicon: HALOT
  rationale: Aquí funciona como topónimo; en español bíblico es más natural y reconocible 'Carmelo'. No se traduce como sustantivo común.
- source_word: וָ/זִיף
  english_pob_choice: Ziph
  chosen_spanish: Zif
  alternatives_spanish:
  - Ziph
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se prefiere 'Zif' para una transliteración más cercana al hebreo y al uso bíblico en español, manteniendo el valor topográfico.
- source_word: וְ/יוּטָּה
  english_pob_choice: and Juttah
  chosen_spanish: Jutá
  alternatives_spanish:
  - Yutá
  - Juttá
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera. Se opta por 'Jutá' para conservar una forma breve y readable en español, mientras que la conjunción queda implícita en la coordinación del listado.
