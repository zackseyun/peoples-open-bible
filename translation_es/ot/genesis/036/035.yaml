translation:
  language: es
  text: Y Husam murió, y Hadad hijo de Bedad reinó en su lugar, quien[a] hirió a Madián en el campo de Moab[b]; y el nombre de su ciudad fue Avit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quien derrotó a Madián en el campo de Moab». El hebreo del participio dice literalmente «el que hirió a Madián».'
    reason: lexical_alternative
  - marker: b
    text: «Campo de Moab» también puede entenderse de modo más amplio como «territorio» o «país» de Moab.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - muerto
  lexicon: HALOT
  rationale: El verbo hebreo de מות expresa muerte de manera directa. «Murió» es la equivalencia natural y sobria en español, sin eufemismo añadido.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  english_pob_choice: reigned in his place
  chosen_spanish: reinó en su lugar
  alternatives_spanish:
  - reinó después de él
  - fue rey en lugar de él
  lexicon: HALOT
  rationale: מלך indica reinar, y תחתיו marca sucesión. «Reinó en su lugar» conserva ambas ideas en un español claro y fiel.
- source_word: הֲדַד בֶּן בְּדַד
  english_pob_choice: Hadad son of Bedad
  chosen_spanish: Hadad hijo de Bedad
  alternatives_spanish:
  - Hadad, hijo de Bedad
  lexicon: HALOT
  rationale: Los nombres propios se transliteran, y בן se expresa naturalmente como «hijo de» en una nota genealógica.
- source_word: הַמַּכֶּה
  english_pob_choice: the one who struck
  chosen_spanish: el que hirió
  alternatives_spanish:
  - el que golpeó
  - el que derrotó
  - el heridor de
  lexicon: HALOT
  rationale: El participio hifil de נכה identifica a Hadad por una acción notable. «El que hirió» mantiene la cercanía léxica y suena idiomático en español. «Derrotó» sería más interpretativo.
- source_word: אֶת מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - los madianitas
  lexicon: HALOT
  rationale: El hebreo nombra a Madián como objeto directo. En español, el nombre propio «Madián» preserva la forma del texto sin expandirlo interpretativamente a «madianitas».
- source_word: בִּשְׂדֵה מוֹאָב
  english_pob_choice: in the field of Moab
  chosen_spanish: en el campo de Moab
  alternatives_spanish:
  - en el territorio de Moab
  - en la tierra de Moab
  - en el país de Moab
  lexicon: HALOT
  rationale: שָׂדֶה significa literalmente «campo». «Campo de Moab» conserva la imagen espacial del hebreo; las otras opciones amplían el sentido geográfico con más interpretación.
- source_word: וְשֵׁם עִירוֹ
  english_pob_choice: and the name of his city was
  chosen_spanish: y el nombre de su ciudad fue
  alternatives_spanish:
  - y su ciudad se llamaba
  - y el nombre de su ciudad era
  lexicon: HALOT
  rationale: Es una fórmula nominal hebrea estándar. La opción elegida mantiene el tono de registro formal y la estructura de la declaración.
- source_word: עֲוִית
  english_pob_choice: Avith
  chosen_spanish: Avit
  alternatives_spanish:
  - Avit
  - Awit
  lexicon: HALOT
  rationale: Como topónimo, se translitera. «Avit» es una forma breve y natural en español que refleja bien la forma consonántica sin añadir vocalización no necesaria.
theological_decisions:
- issue: La relación entre la muerte de Husham y la sucesión real de Hadad
  english_pob_reading: And Husham died, and Hadad son of Bedad reigned in his place
  chosen_spanish_reading: Y Husam murió, y Hadad hijo de Bedad reinó en su lugar
  alternative_spanish_readings:
  - Y Husam murió, y Hadad hijo de Bedad reinó después de él
  - Y Husam murió, y Hadad hijo de Bedad fue rey en su lugar
  rationale: No hay una cuestión doctrinal explícita, pero sí una relación de sucesión política que conviene conservar sin ampliarla. «En su lugar» refleja bien la dependencia de תחתיו.
  doctrine_reference: Ninguna; nota de sucesión narrativa
- issue: El participio que describe a Hadad por su acción contra Madián
  english_pob_reading: who struck Midian
  chosen_spanish_reading: el que hirió a Madián
  alternative_spanish_readings:
  - el que derrotó a Madián
  - el que golpeó a Madián
  rationale: La auditable tensión está entre una traducción literal («hirió/golpeó») y una más interpretativa («derrotó»). Se conserva la forma menos interpretativa para no borrar la ambigüedad del participio hebreo.
  doctrine_reference: Ninguna; decisión lexical con implicación histórica
- issue: Topónimo final de la ciudad de Hadad
  english_pob_reading: the name of his city was Avith
  chosen_spanish_reading: el nombre de su ciudad fue Avit
  alternative_spanish_readings:
  - el nombre de su ciudad era Avit
  - su ciudad se llamaba Avit
  rationale: Se preserva la fórmula de identificación y el carácter de topónimo. No hay carga doctrinal; la decisión busca claridad y consistencia onomástica.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del inglés auditado: se evita una paráfrasis explicativa con guiones y se mantiene la frase participial de manera directa. La elección española refleja esa misma preferencia por una formulación sobria y cercana al hebreo.'
  spanish_consistency_notes:
  - Se transliteran los nombres propios como Husam, Hadad, Bedad, Madián y Avit de manera uniforme.
  - Se mantiene el valor de sucesión con «reinó en su lugar», en paralelo al inglés auditado.
  - «El que hirió» conserva la tensión léxica del participio hebreo sin resolverla prematuramente en «derrotó».
  - 'Se respeta la formulación formal de la nota de lugar final: «el nombre de su ciudad fue».'
