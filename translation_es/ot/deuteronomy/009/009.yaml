translation:
  language: es
  text: Cuando subí al monte para recibir las tablas de piedra[a], las tablas del pacto[b] que Yahvé hizo[c] con ustedes, permanecí en el monte cuarenta días y cuarenta noches; no comí pan ni bebí agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “para tomar”; aquí “para recibir” refleja el sentido de Moisés subiendo para que se le entregaran las tablas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “las tablas de piedra”.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, “cortó con ustedes”, un modismo hebreo común para hacer un pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲלֹתִי
  english_pob_choice: When I went up
  chosen_spanish: Cuando subí
  alternatives_spanish:
  - Cuando ascendí
  - Al subir yo
  lexicon: HALOT
  rationale: La forma temporal con ב + infinitivo expresa “cuando/al subir”. En español, “subí” conserva el movimiento ascendente de manera natural y fiel al contexto narrativo.
- source_word: הָהָרָה
  english_pob_choice: the mountain
  chosen_spanish: al monte
  alternatives_spanish:
  - a la montaña
  - al monte santo
  lexicon: HALOT
  rationale: El hebreo apunta a una montaña concreta en el relato. “Monte” es una opción natural en español bíblico y conserva la referencia sin sobrerreformular.
- source_word: לָקַחַת
  english_pob_choice: to receive
  chosen_spanish: para recibir
  alternatives_spanish:
  - para tomar
  - para obtener
  lexicon: HALOT
  rationale: Aunque el verbo básico es “tomar”, aquí el sentido es que Moisés sube para que le sean dadas las tablas. “Recibir” expresa mejor ese valor contextual sin perder la relación con el original.
- source_word: לוּחֹת הָאֲבָנִים
  english_pob_choice: the stone tablets
  chosen_spanish: las tablas de piedra
  alternatives_spanish:
  - las tablas de piedra
  - las tablas de piedras
  lexicon: HALOT
  rationale: La construcción hebrea literalmente habla de tablas de piedra. “Tablas de piedra” es natural en español y mantiene el material indicado por el hebreo.
- source_word: לוּחֹת הַבְּרִית
  english_pob_choice: the tablets of the covenant
  chosen_spanish: las tablas del pacto
  alternatives_spanish:
  - las tablas del pacto
  - las tablas del convenio
  lexicon: HALOT
  rationale: El hebreo repite “tablas” y añade el genitivo “del pacto”. “Pacto” conserva el peso bíblico-jurídico del término mejor que alternativas más modernas.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión doctrinal del proyecto de transliterar el nombre divino como “Yahvé” en lugar de sustituirlo por un título. Esto preserva el nombre personal del texto hebreo.
- source_word: וָאֵשֵׁב
  english_pob_choice: I remained
  chosen_spanish: permanecí
  alternatives_spanish:
  - me quedé
  - habité
  lexicon: HALOT
  rationale: El verbo ישב puede significar sentarse, habitar o permanecer. En un contexto de duración sobre el monte, “permanecí” comunica con claridad la idea de estancia prolongada.
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לַיְלָה
  english_pob_choice: forty days and forty nights
  chosen_spanish: cuarenta días y cuarenta noches
  alternatives_spanish:
  - cuarenta días y cuarenta noches
  lexicon: HALOT
  rationale: Es la expresión hebrea estándar de duración y se puede verter de forma directa en español sin pérdida de sentido.
- source_word: לֶחֶם לֹא אָכַלְתִּי
  english_pob_choice: I ate no bread
  chosen_spanish: no comí pan
  alternatives_spanish:
  - no comí pan
  - no comí alimento
  lexicon: HALOT
  rationale: לֶחֶם es literalmente “pan”. Aunque puede ampliar a alimento, aquí conviene mantener el término concreto que usa el hebreo.
- source_word: וּמַיִם לֹא שָׁתִיתִי
  english_pob_choice: and drank no water
  chosen_spanish: ni bebí agua
  alternatives_spanish:
  - ni bebí agua
  - y no bebí agua
  lexicon: HALOT
  rationale: La coordinación negativa se expresa con naturalidad en español mediante “ni”, preservando el paralelismo con la cláusula anterior.
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama directamente. Siguiendo la línea doctrinal del proyecto, se conserva el nombre propio divino en español como “Yahvé”, en lugar de ocultarlo detrás de una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: כָּרַת יְהוָה עִמָּכֶם
  english_pob_reading: the covenant that Yahweh made with you
  chosen_spanish_reading: el pacto que Yahvé hizo con ustedes
  alternative_spanish_readings:
  - el pacto que Yahvé hizo con ustedes
  - el pacto que Yahvé cortó con ustedes
  rationale: El hebreo usa el idioma de ‘cortar un pacto’. En español bíblico, ‘hizo un pacto’ comunica la función idiomática sin forzar una fórmula extraña, aunque la nota lexical permite recordar la literalidad del verbo.
  doctrine_reference: Standard Hebrew covenant idiom (כרת ברית)
translation_notes:
  revision_awareness: 'El borrador sigue el estado más reciente del audit trail en inglés, sin cambios pendientes: la evaluación cruzada mostró alto acuerdo y no se registraron revisiones posteriores. Se mantiene la decisión doctrinal de traducir el Tetragrama por un nombre propio en español y se conservan las principales alternativas léxicas relevantes para auditoría.'
  spanish_consistency_notes:
  - Se usó “Yahvé” de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se eligió “pacto” para בְּרִית en un registro bíblico natural y comprensible.
  - Se mantuvo “tablas de piedra” como equivalencia clara de לוּחֹת הָאֲבָנִים, sin diluir el material del objeto.
  - La negación final se resolvió con “ni bebí agua” para conservar el paralelismo y la naturalidad del español.
  - No se añadieron glosas doctrinales al texto principal; las tensiones léxicas quedan documentadas en las notas.
