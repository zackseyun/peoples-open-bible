translation:
  language: es
  text: 'Entonces, al ver esto, el fariseo que lo había invitado se dijo a sí mismo: «Si este hombre fuera profeta, sabría quién y qué clase de mujer es esta[a], que lo está tocando, porque es pecadora[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quién y qué tipo de mujer es esta». El griego resalta tanto la identidad como la calidad o reputación de la mujer.
    reason: lexical_alternative
  - marker: b
    text: O «que es pecadora». La cláusula puede oírse como el contenido de lo que él sabría o como la razón del juicio sobre la mujer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν δὲ
  english_pob_choice: Now when ... saw this
  chosen_spanish: al ver esto
  alternatives_spanish:
  - cuando vio esto
  - y al verlo
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción circunstancial previa al verbo principal; en español, «al ver esto» expresa con naturalidad esa relación temporal. «Esto» conserva la referencia al gesto previo en el relato.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Entonces
  alternatives_spanish:
  - y
  - pero
  lexicon: BDAG
  rationale: Aquí δέ marca avance narrativo, no oposición fuerte. «Entonces» funciona como conector discursivo natural en español y mantiene el flujo de la escena.
- source_word: ὁ Φαρισαῖος
  english_pob_choice: the Pharisee
  chosen_spanish: el fariseo
  alternatives_spanish:
  - el fariseo aquel
  - ese fariseo
  lexicon: BDAG
  rationale: Designación grupal estándar; se conserva el artículo definido con valor referencial en la narración.
- source_word: ὁ καλέσας αὐτὸν
  english_pob_choice: who had invited him
  chosen_spanish: que lo había invitado
  alternatives_spanish:
  - que lo invitó
  - que lo había llamado
  lexicon: BDAG
  rationale: En contexto de comida/hospedaje, καλέω significa «invitar». El pluscuamperfecto español expresa que la invitación ocurrió antes de que lo viera.
- source_word: εἶπεν ἐν ἑαυτῷ λέγων
  english_pob_choice: he said to himself
  chosen_spanish: se dijo a sí mismo
  alternatives_spanish:
  - pensó para sí
  - habló consigo mismo
  lexicon: BDAG
  rationale: La expresión idiomática ἐν ἑαυτῷ indica habla interior; «se dijo a sí mismo» reproduce bien la autoconversación sin forzar el griego repetitivo de «diciendo».
- source_word: Οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - éste
  - este
  lexicon: BDAG
  rationale: El demostrativo tiene matiz despectivo/distanciador en la boca del fariseo. «Este hombre» transmite mejor esa distancia que un simple «este».
- source_word: εἰ ἦν προφήτης
  english_pob_choice: If this man were a prophet
  chosen_spanish: Si este hombre fuera profeta
  alternatives_spanish:
  - si este hombre es profeta
  - si fuera profeta
  lexicon: BDAG
  rationale: 'La condición contrafáctica del griego se expresa en español con subjuntivo imperfecto: «fuera». Se conserva «profeta» como título bíblico habitual y transparente.'
- source_word: ἐγίνωσκεν ἂν
  english_pob_choice: he would know
  chosen_spanish: sabría
  alternatives_spanish:
  - conocería
  - reconocería
  lexicon: BDAG
  rationale: La construcción imperfecto + ἄν expresa resultado irreal/contrario a los hechos. «Sabría» es la equivalencia condicional correcta en español para la apódosis irreal. En español, «sabría» es la equivalencia más natural y se integra con la subordinada para expresar capacidad de conocimiento en el escenario hipotético.
- source_word: τίς καὶ ποταπὴ
  english_pob_choice: who and what sort of
  chosen_spanish: quién y qué clase de
  alternatives_spanish:
  - quién y de qué clase
  - quién y qué tipo de
  lexicon: BDAG
  rationale: 'Los dos interrogativos conservan dos aspectos: identidad y calidad/índole. «Qué clase de» mantiene ese doble énfasis de forma idiomática en español.'
- source_word: ἡ γυνὴ ἥτις ἅπτεται αὐτοῦ
  english_pob_choice: woman this is who is touching him
  chosen_spanish: mujer es esta, que lo está tocando
  alternatives_spanish:
  - mujer es esta, que lo toca
  - mujer que lo está tocando
  lexicon: BDAG
  rationale: Se conserva la estructura explicativa y deíctica del griego, evitando suavizarla. El presente progresivo «lo está tocando» refleja bien la acción en curso de ἅπτεται.
- source_word: ἅπτεται
  english_pob_choice: is touching
  chosen_spanish: está tocando
  alternatives_spanish:
  - toca
  - está en contacto con
  lexicon: BDAG
  rationale: El presente medio indica contacto en desarrollo en la escena. «Está tocando» mantiene el aspecto progresivo sin perder naturalidad española.
- source_word: ὅτι ἁμαρτωλός ἐστιν
  english_pob_choice: because she is a sinner
  chosen_spanish: porque es pecadora
  alternatives_spanish:
  - porque es una pecadora
  - pues es pecadora
  lexicon: BDAG
  rationale: ὅτι aquí da la razón del juicio del fariseo. ἁμαρτωλός concuerda con γυνή y en español se naturaliza como «pecadora»; se omite el artículo por estilo idiomático, aunque la traducción alterna puede explicitarlo.
theological_decisions:
- issue: Condicional irreal sobre Jesús como profeta
  english_pob_reading: 'Rendered as a contrary-to-fact condition: ''If this man were a prophet, he would know ...'''
  chosen_spanish_reading: «Si este hombre fuera profeta, sabría ...» como condicional contrafáctica.
  alternative_spanish_readings:
  - «Si este hombre es profeta, sabría ...»
  - «Si este hombre fuera profeta, conocería ...»
  rationale: El griego εἰ ἦν ... ἐγίνωσκεν ἂν expresa una hipótesis irreal desde la perspectiva del fariseo. Se conserva la tensión sin corregirla ni armonizarla teológicamente.
  doctrine_reference: Preservar la tensión narrativa y cristológica del texto sin resolverla prematuramente.
- issue: 'Valor de ὅτι: contenido o causa del juicio'
  english_pob_reading: '''because she is a sinner.'' The clause may be heard either as the content of what he would know or as the reason for the woman''s character.'
  chosen_spanish_reading: «porque es pecadora» como causa del razonamiento del fariseo.
  alternative_spanish_readings:
  - «que es pecadora»
  - «pues es pecadora»
  rationale: El contexto permite leer ὅτι como razón explicativa de la evaluación del fariseo. En español, «porque» hace explícita esa fuerza causal sin cerrar del todo la posibilidad de que también funcione como contenido conocido.
  doctrine_reference: Mantener la ambigüedad funcional del causal/contenido cuando el griego la permite.
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra revisiones aplicadas; el punto principal ya estaba resuelto como lectura contrafáctica y se ha mantenido esa línea, adaptándola al español con subjuntivo imperfecto y un léxico natural pero no suavizado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando corresponda, pero este versículo no contiene el nombre divino.
  - «profeta» se conserva como término bíblico estándar; no se reemplaza por una paráfrasis.
  - Se prefiere «pecadora» para ἁμαρτωλός, con nota de alternativa para explicitar el artículo si se desea.
  - La estructura deíctica «este hombre» conserva el matiz distante del demostrativo griego.
