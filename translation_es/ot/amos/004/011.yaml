    text: Or 'among you'; the Hebrew preposition may be read without making the partitive sense explicit.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'like the overthrow of God of Sodom and Gomorrah,' that is, like the overthrow God brought on Sodom and Gomorrah.
    reason: lexical_alternative
  - marker: c
    text: Or 'a firebrand rescued from the blaze.'
    reason: lexical_alternative
