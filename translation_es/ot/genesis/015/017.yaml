translation:
  language: es
  text: Cuando el sol se había puesto y estaba oscuro, he aquí, un brasero humeante[a] y una antorcha de fuego pasaron entre estos pedazos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un horno humeante» o «un horno para fuego humeante». El término hebreo puede designar un horno o recipiente para fuego; aquí se elige «brasero» porque suena más natural en español para esta escena.
    reason: lexical_alternative
  - marker: b
    text: Los «pedazos» son las partes divididas de los animales preparadas antes en el rito del pacto (véase Gén. 15:10).
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And when ...
  chosen_spanish: Y sucedió que ...
  alternatives_spanish:
  - Y aconteció que ...
  - Y ocurrió que ...
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce la secuencia de eventos. «Y sucedió que» conserva el arranque histórico sin sonar tan arcaico como «aconteció».
- source_word: הַשֶּׁמֶשׁ בָּאָה
  english_pob_choice: the sun had gone down
  chosen_spanish: el sol se había puesto
  alternatives_spanish:
  - el sol había bajado
  - el sol se había ido
  lexicon: HALOT
  rationale: בוא con «sol» es un modismo de puesta de sol; «se había puesto» es el equivalente natural en español y conserva la imagen concreta.
- source_word: וַעֲלָטָה הָיָה
  english_pob_choice: and it was dark
  chosen_spanish: y había oscuridad
  alternatives_spanish:
  - y era oscuro
  - y reinaba oscuridad
  lexicon: HALOT
  rationale: עֲלָטָה designa oscuridad u obscuridad/gloom. «Había oscuridad» refleja el sustantivo de modo más directo que una simple adjetivación.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y de pronto
  lexicon: HALOT
  rationale: «He aquí» preserva el valor de presentación vívida y solemne del hebreo, alineado con la fuerza literaria de הִנֵּה.
- source_word: תַנּוּר עָשָׁן
  english_pob_choice: a smoking firepot
  chosen_spanish: un horno humeante
  alternatives_spanish:
  - un horno de humo
  - un horno ahumado
  lexicon: HALOT
  rationale: תַנּוּר puede ser horno o recipiente para fuego/calor. En español, «horno humeante» es transparente y respeta la imagen sin forzar «furnace», que sería menos natural aquí.
- source_word: וְלַפִּיד אֵשׁ
  english_pob_choice: a flaming torch
  chosen_spanish: una antorcha de fuego
  alternatives_spanish:
  - una antorcha flamígera
  - una tea de fuego
  lexicon: HALOT
  rationale: לַפִּיד es una antorcha/tea; el añadido de אֵשׁ intensifica la cualidad ígnea. «Antorcha de fuego» mantiene la literalidad de la expresión y su fuerza visual.
- source_word: אֲשֶׁר עָבַר
  english_pob_choice: passed
  chosen_spanish: pasaron
  alternatives_spanish:
  - pasó
  - que pasó
  lexicon: HALOT
  rationale: El antecedente compuesto de los símbolos ígneos permite el plural en español para reflejar la escena conjunta. Mantiene la fluidez del verbo principal sin perder el referente colectivo.
- source_word: בֵּין הַגְּזָרִים הָאֵלֶּה
  english_pob_choice: between these pieces
  chosen_spanish: entre estos pedazos
  alternatives_spanish:
  - entre estas piezas
  - entre estos trozos
  lexicon: HALOT
  rationale: גְּזָרִים son las partes divididas de los animales del rito. «Pedazos» conserva la concreción física y el enlace directo con el contexto del pacto.
theological_decisions:
- issue: Naturaleza de las figuras de fuego en la escena del pacto
  english_pob_reading: Render the imagery descriptively without explicitly identifying the objects as God himself in the translation line.
  chosen_spanish_reading: Se mantiene la descripción visible de los objetos de fuego sin identificarlos explícitamente como Yahvé en la línea principal.
  alternative_spanish_readings:
  - una manifestación de la presencia de Yahvé pasó entre los pedazos
  - Yahvé pasó entre estos pedazos en forma de horno humeante y antorcha de fuego
  rationale: El contexto mayor sugiere una manifestación divina, pero el hebreo de este versículo nombra sólo los símbolos visibles. La traducción conserva esa tensión teológica y evita resolverla de forma interpretativa dentro del texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó en concordancia alta con el auditor inglés y no requirió ajustes posteriores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para el nombre divino cuando aparezca en el contexto inmediato, aunque aquí no se explicita dentro del versículo.
  - 'Se conserva una equivalencia óptima: registro bíblico digno, español natural y correspondencia cercana con las imágenes hebreas.'
  - «Horno humeante» y «antorcha de fuego» preservan la materialidad de los símbolos sin añadir interpretación teológica en la línea principal.
