translation:
  language: es
  text: 'David dijo a Aquís: «Pero ¿qué he hecho? ¿Y qué has hallado en tu siervo desde el día en que he estado delante de ti hasta hoy[a], para que no vaya y pelee contra los enemigos de mi señor el rey[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el día en que vine a estar delante de ti hasta hoy». El hebreo es más literalmente «desde el día en que estuve delante de ti».'
    reason: lexical_alternative
  - marker: b
    text: «Mi señor el rey» se deja tal como fue dicho. La expresión puede referirse sencillamente a Aquís o conservar una ambigüedad deliberada en el contexto narrativo.
    reason: alternative_reading
lexical_decisions:
- source_word: דָּוִד / David
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - Davíd
  lexicon: N/A
  rationale: Es un nombre propio bíblico ya asentado en español; ‘David’ es la forma clara y estándar.
- source_word: אֶל אָכִישׁ
  english_pob_choice: to Achish
  chosen_spanish: a Aquís
  alternatives_spanish:
  - a Akís
  - a Aquis
  lexicon: N/A
  rationale: Se usa una forma española transparente y reconocible del nombre filisteo, sin necesidad de transliteración cruda.
- source_word: כִּי מֶה עָשִׂיתִי
  english_pob_choice: But what have I done?
  chosen_spanish: Pero ¿qué he hecho?
  alternatives_spanish:
  - ¿Qué he hecho?
  - Pues ¿qué he hecho?
  lexicon: HALOT
  rationale: כִּי introduce aquí una réplica de protesta; en español ‘pero’ comunica mejor el matiz adversativo que un ‘porque’ literal. La pregunta mantiene la queja retórica sin añadir contenido.
- source_word: וּמַה מָּצָאתָ בְעַבְדְּךָ
  english_pob_choice: And what have you found in your servant
  chosen_spanish: ¿Y qué has hallado en tu esclavo[a]?
  alternatives_spanish:
  - ¿Y qué has hallado en tu siervo?
  - ¿Y qué has encontrado en tu esclavo?
  lexicon: HALOT
  rationale: Se conserva el valor fuerte de עבד como ‘esclavo’, coherente con la decisión léxica de POB cuando el término carga fuerza social. ‘Hallado en’ refleja el hebreo con naturalidad, sin convertirlo en una acusación explícita no presente en el texto.
- source_word: בְעַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  lexicon: HALOT
  rationale: Aunque el registro es deferencial, el hebreo עבד conserva la fuerza léxica de dependencia. Se mantiene ‘esclavo’ para no suavizar el término, dejando al contexto el matiz cortesano.
- source_word: מִיּוֹם אֲשֶׁר הָיִיתִי לְפָנֶיךָ עַד הַיּוֹם הַזֶּה
  english_pob_choice: from the day I have been before you until this day
  chosen_spanish: desde el día en que he estado delante de ti hasta hoy
  alternatives_spanish:
  - desde el día en que estuve delante de ti hasta hoy
  - desde el día en que he estado en tu presencia hasta hoy
  lexicon: HALOT
  rationale: Se preserva la literalidad relacional de ‘estar delante de ti’ para no expandir el texto a ‘entré en tu servicio’, que interpretaría el sentido. ‘Hasta hoy’ reproduce el cierre temporal del hebreo con fluidez.
- source_word: כִּי לֹא אָבוֹא וְנִלְחַמְתִּי
  english_pob_choice: that I should not go and fight
  chosen_spanish: para que no vaya y pelee
  alternatives_spanish:
  - para no ir y pelear
  - que no vaya y pelee
  lexicon: HALOT
  rationale: La cláusula expresa el resultado/objeto del reclamo de David; ‘para que no’ conserva bien esa relación. ‘Pelear’ funciona de manera natural con נלחם y mantiene el sentido bélico.
- source_word: בְּאֹיְבֵי
  english_pob_choice: against the enemies of
  chosen_spanish: contra los enemigos de
  alternatives_spanish:
  - contra los adversarios de
  - frente a los enemigos de
  lexicon: HALOT
  rationale: Con נלחם, el hebreo marca al oponente de combate; ‘contra’ es la equivalencia española más directa y clara.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi amo el rey
  lexicon: HALOT
  rationale: ‘Señor’ reproduce el honorífico humano sin implicar divinidad. La apposición ‘el rey’ conserva el tono cortesano y la ambigüedad narrativa del original.
theological_decisions:
- issue: Ambigüedad de ‘mi señor el rey’
  english_pob_reading: Retain the phrase as spoken, without identifying whether 'my lord the king' refers sincerely to Achish or is intentionally ambiguous in light of David's loyalty to Saul/Israel.
  chosen_spanish_reading: Mantener ‘mi señor el rey’ tal como habla David, sin decidir si se refiere sinceramente a Aquís o si la frase conserva una ambigüedad narrativa.
  alternative_spanish_readings:
  - identificar explícitamente a Aquís como su señor
  - explicar en la traducción que se trata de una cortesía diplomática
  rationale: El hebreo no resuelve la intención de David. La traducción debe preservar esa tensión en vez de aclararla con una glosa interpretativa en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audio trail: se evita interpretar בְעַבְדְּךָ como una acusación (‘contra tu esclavo’) y se mantiene la literalidad relacional de הָיִיתִי לְפָנֶיךָ como ‘he estado delante de ti’, sin expandirlo a ‘entré en tu servicio’.'
  spanish_consistency_notes:
  - Se mantiene Yahvé/Jesús/Mesías como normas del proyecto, aunque este versículo no los contiene.
  - Se conserva ‘esclavo’ para עבד en coherencia con la decisión POB cuando el registro léxico debe quedar fuerte.
  - Se usa ‘mi señor el rey’ como honorífico humano, evitando cualquier lectura divina de אֲדֹנִי.
