  text: μὴ ἑαυτοὺς ἐκδικοῦντες, ἀγαπητοί, ἀλλὰ δότε τόπον τῇ ὀργῇ, γέγραπται γάρ· Ἐμοὶ ἐκδίκησις, ἐγὼ ἀνταποδώσω, λέγει κύριος.
base_translation:
  language: en
  yaml_path: translation/nt/romans/012/019.yaml
  text: 'Do not avenge yourselves[a], beloved, but give place to wrath, for it is written: “Vengeance is mine; I will repay[b], says the Lord.”'
  footnotes:
  - marker: a
    text: Or “leave room for wrath,” likely meaning God’s wrath in light of the following quotation.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “Vengeance is mine; I will repay.”'
    reason: alternative_reading
translation:
  language: ko
  text: '사랑하는 자들이여, 여러분 스스로 원수를 갚지 말고, 진노하심에 자리를 내어 드리십시오. 기록된 바와 같습니다: 「원수 갚는 것은 내게 있으니, 내가 갚을 것이다, 주께서 말씀하신다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 신명기 32:35 인용. 헬라어 κύριος는 히브리 본문 יהוה를 옮긴 것이지만, 신약 인용 본문은 그 호칭을 명시적으로 보존하지 않으므로 「주」로 두고 야훼 인용 배경을 각주에 둔다.
    reason: cross_reference
lexical_decisions:
- source_word: λέγει κύριος
  english_pob_choice: says the Lord
  chosen_korean: 주께서 말씀하신다
  alternatives_korean:
  - 야훼께서 말씀하신다
  lexicon: BDAG
  rationale: 신약 인용 본문이 κύριος로만 두므로 「주」를 유지하고, 신명기 32:35의 야훼 인용임을 각주에 둔다.
