revisions:
- from: Y yo mismo esconderé sin falta mi rostro[a] en aquel día, por todo el mal que ha hecho, porque se ha vuelto a otros dioses.
  to: Y yo mismo ciertamente esconderé mi rostro[a] en aquel día, por todo el mal que ha hecho, porque se ha vuelto a otros dioses.
  rationale: Se ajusta únicamente la intensificación verbal para que el español suene más natural y solemne, manteniendo intactas la literalidad de «mi rostro», el singular implícito y la estructura causal del hebreo. No se requieren cambios doctrinales ni textuales de fondo.
