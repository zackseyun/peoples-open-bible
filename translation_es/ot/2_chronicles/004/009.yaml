    text: Or 'gates for the court.' The Hebrew noun more commonly means 'doors,' so 'doors' is retained in the main text for consistency.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their doors'; English could also smooth this to 'its doors,' referring collectively to the court structures.
    reason: lexical_alternative
  - marker: c
    text: Or 'copper.' The Hebrew term can refer broadly to copper or bronze; 'bronze' fits the temple-furnishing context.
    reason: lexical_alternative
