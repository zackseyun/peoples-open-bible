base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/009/055.yaml
  text: For they were also inspired by the words in which they had been instructed[b][a], and they were gathered together.
  footnotes:
  - marker: a
    text: The Greek verb rendered 'were instructed' is uncommon here and could be understood more literally as being 'imbued' or 'inspired'; the Hebrew parallel supports the sense of gaining understanding in the words of the law.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel in Nehemiah 8:13 reads more directly, 'they gathered ... to gain insight into the words of the law.' 1 Esdras presents the scene in a compressed Greek form.
    reason: cross_reference
