translation:
  language: es
  text: 'Y la carta del rey contenía esto[a]: «Rey Antíoco a su hermano[b] Lisias, saludos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «Y la carta del rey contenía así». En español se expresa de modo más natural como «contenía esto».'
    reason: lexical_alternative
  - marker: b
    text: «Hermano» puede referirse a un parentesco literal o a una fórmula de cortesía de la corte; el griego solo dice «hermano».
    reason: cultural_note
lexical_decisions:
- source_word: Ἡ ... ἐπιστολὴ
  english_pob_choice: the ... letter
  chosen_spanish: la carta
  alternatives_spanish:
  - la epístola
  - la misiva
  lexicon: LSJ
  rationale: ἐπιστολή designa una comunicación escrita; en español, «carta» es la equivalencia natural y clara para un encabezado epistolar de corte real.
- source_word: περιεῖχεν
  english_pob_choice: contained
  chosen_spanish: contenía
  alternatives_spanish:
  - decía
  - rezaba
  - incluía
  lexicon: LSJ
  rationale: El verbo griego indica que la carta llevaba dentro ese contenido. «Contenía» conserva la relación semántica con el original y suena natural en español.
- source_word: οὕτως
  english_pob_choice: this / as follows
  chosen_spanish: esto
  alternatives_spanish:
  - así
  - como sigue
  lexicon: LSJ
  rationale: Después de «contenía», «esto» reproduce la introducción del contenido de la carta con concisión equivalente a la del griego.
- source_word: Βασιλεὺς
  english_pob_choice: King
  chosen_spanish: El rey
  alternatives_spanish:
  - Rey
  - El soberano
  lexicon: LSJ
  rationale: En el encabezado epistolar, Βασιλεὺς funciona como título. En español, «El rey» mantiene el valor titulary y resulta idiomático.
- source_word: Ἀντίοχος
  english_pob_choice: Antiochus
  chosen_spanish: Antíoco
  alternatives_spanish:
  - Antíoco
  lexicon: propio_nombre
  rationale: Se translitera el nombre propio con la forma habitual en español bíblico.
- source_word: τῷ ἀδελφῷ
  english_pob_choice: to his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - al hermano
  - a su hermano, en sentido cortesano
  lexicon: LSJ
  rationale: El dativo marca destinatario. «Hermano» se conserva porque el griego no especifica si es parentesco literal o fórmula cortesana; el posesivo español se ajusta naturalmente al encabezado de carta.
- source_word: Λυσίᾳ
  english_pob_choice: Lysias
  chosen_spanish: Lisias
  alternatives_spanish:
  - Lysias
  lexicon: propio_nombre
  rationale: Se usa la forma castellanizada habitual del nombre propio en contexto bíblico.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - salud
  - que te vaya bien
  - regocijo
  lexicon: LSJ
  rationale: En fórmulas epistolares, χαίρειν es un saludo establecido. «Saludos» comunica esa función sin el error de traducirlo literalmente como «regocíjate».
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete 1909 y conserva la fórmula epistolar, alineándose con la lectura auditada en la POB inglesa. No se introducen ampliaciones interpretativas; se mantiene la ambigüedad de «hermano» documentada en el aparato inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en la política general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «carta» frente a «epístola» por naturalidad en español sin perder formalidad.
  - Se usó «saludos» como equivalente funcional de χαίρειν en encabezamiento de carta.
