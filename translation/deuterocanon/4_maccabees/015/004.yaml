reference: 4 Maccabees 15:4
source:
  edition: lxx-swete-1909
  text: Ὦ τίνα τρόπον ἠθολογήσαιμι φιλότεκνα γονέων πάθη, ψυχῆς τε καὶ μορφῆς ὁμοιότητα εἰς μικρὸν παιδοχαρακτῆρα θαυμάσιον ἐναποσφραγίζοντα, μάλιστα διὰ τὸ τῶν πατέρων τοῖς γεννηθεῖσιν τὰς μητέρας καθεστάναι συμπαθεστέρας.
  language: Greek
  pages:
