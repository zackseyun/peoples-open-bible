    text: Or 'What comes up in your spirit.' The Hebrew says literally, 'the thing coming up upon your spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will never come to pass'; the Hebrew uses an infinitive absolute with the verb for emphasis.
    reason: lexical_alternative
  - marker: c
    text: That is, serving idols made of wood and stone.
    reason: cultural_note
  - marker: d
    text: Or 'worshiping wood and stone.'
    reason: alternative_reading
