translation:
  language: es
  text: José era el gobernante del país; él era quien vendía grano a toda la gente del país. Cuando llegaron los hermanos de José, se inclinaron ante él[a], con el rostro en tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se postraron ante él». El verbo hebreo puede denotar una inclinación profunda o una postración como acto de homenaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשַּׁלִּיט
  english_pob_choice: the ruler
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el gobernante
  - el que tenía autoridad
  lexicon: HALOT
  rationale: El término indica a quien ejerce autoridad o dominio. «Gobernador» comunica bien la función administrativa en el contexto de Egipto sin exagerar ni volver el texto rígido.
- source_word: עַל הָאָרֶץ
  english_pob_choice: over the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra del país
  - sobre la tierra de Egipto
  lexicon: HALOT
  rationale: Aquí אֶרֶץ se refiere al territorio del relato, no al mundo entero. «Tierra» conserva la amplitud del hebreo y funciona de modo natural en español bíblico.
- source_word: הַמַּשְׁבִּיר
  english_pob_choice: the one who sold grain
  chosen_spanish: el que vendía grano
  alternatives_spanish:
  - el distribuidor de grano
  - el proveedor de grano
  - el vendedor
  lexicon: HALOT
  rationale: El participio hifil de שׁבר en este contexto alude a la venta de grano en tiempo de hambre. «Vendía grano» refleja la función narrada y evita un sustantivo demasiado abstracto.
- source_word: לְכָל עַם הָאָרֶץ
  english_pob_choice: to all the people of the land
  chosen_spanish: a todo el pueblo de la tierra
  alternatives_spanish:
  - a toda la gente de la tierra
  - a todo el pueblo del país
  lexicon: HALOT
  rationale: עַם es colectivo singular, por eso «pueblo». Se mantiene «de la tierra» para conservar el valor local de אֶרֶץ en este pasaje.
- source_word: אֲחֵי יוֹסֵף
  english_pob_choice: Joseph’s brothers
  chosen_spanish: los hermanos de José
  alternatives_spanish:
  - los hermanos de José
  lexicon: HALOT
  rationale: La construcción posesiva en español suena natural y fiel. «José» es la forma estándar del nombre en español bíblico.
- source_word: וַיִּשְׁתַּחֲווּ ל֥וֹ
  english_pob_choice: bowed down to him
  chosen_spanish: se inclinaron ante él
  alternatives_spanish:
  - se postraron ante él
  - se prosternaron ante él
  - le rindieron homenaje
  lexicon: HALOT
  rationale: שׁחה puede expresar una inclinación profunda o postración. «Se inclinaron ante él» comunica el acto de homenaje sin cargar innecesariamente con lenguaje cultual de «adoración».
- source_word: אַפַּיִם אָרְצָה
  english_pob_choice: with their faces to the ground
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con la cara en tierra
  - postrados rostro en tierra
  lexicon: HALOT
  rationale: El modismo describe una postración completa. «Con el rostro en tierra» es una equivalencia natural y fiel en español, preservando la imagen corporal del hebreo.
- source_word: וְ
  english_pob_choice: Now
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: HALOT
  rationale: En español narrativo, la simple conjunción «Y» reproduce bien la continuidad del relato sin añadir una marca discursiva más interpretativa.
theological_decisions:
- issue: La acción de los hermanos hacia José
  english_pob_reading: bowed down to him
  chosen_spanish_reading: se inclinaron ante él
  alternative_spanish_readings:
  - se postraron ante él
  - se prosternaron ante él
  - le rindieron homenaje
  rationale: La escena cumple los sueños previos de José y expresa sumisión social y familiar, no culto divino. «Se inclinaron ante él» conserva la reverencia corporal sin introducir «adoración».
  doctrine_reference: Mantener la tensión narrativa sin convertir el gesto en afirmación teológica de culto.
translation_notes:
  revision_awareness: No se registraron revisiones posteriores en el audit trail; la versión inglesa final quedó sin cambios, y el español sigue esa lectura estable.
  spanish_consistency_notes:
  - Se mantiene «José» para el nombre propio, conforme al uso bíblico en español.
  - Se usa «tierra» para אֶרֶץ, preservando el sentido local del pasaje.
  - Se evita «adoraron» o «worshiped» para la postura de los hermanos, porque el contexto es de homenaje y sumisión, no de culto.
