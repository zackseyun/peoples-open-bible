  yaml_path: translation/deuterocanon/judith/011/008.yaml
  text: For we have heard of your wisdom and the cunning of your soul[a], and it has been reported throughout all the earth that you alone are good in all the kingdom, mighty in knowledge[c][b], and marvelous in the armies of war.
  footnotes:
  - marker: a
    text: Or "the cunning of your soul"; Greek ψυχή can mean "soul," "life," or the inner self, but here likely refers to the faculty of thought or intention.
    reason: lexical_alternative
  - marker: b
    text: Or "throughout all the land"; Greek γῆ may mean either "land" or "earth/world" depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or "in the whole kingdom"; the singular likely refers to his realm, not to every kingdom universally.
    reason: lexical_alternative
