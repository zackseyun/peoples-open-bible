translation:
  language: es
  text: He aquí, aun la luna no resplandece[a], y las estrellas no son puras[b] ante sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no brilla» / «no da luz».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no son limpias» o, posiblemente, «no son brillantes» ante sus ojos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí, pues
  lexicon: HALOT
  rationale: Mantiene el valor exhortativo y de llamado a la atención de la interjección hebrea en un registro natural para el español bíblico contemporáneo.
- source_word: עַד
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - incluso
  - hasta
  lexicon: HALOT
  rationale: 'En este giro intensifica la referencia: no solo la luna, sino aun la luna. ''Aun'' conserva bien esa fuerza enfática sin volver el verso pesado.'
- source_word: יָרֵחַ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - el astro lunar
  lexicon: HALOT
  rationale: Equivalente directo y natural del cuerpo celeste nombrado en el hebreo.
- source_word: לֹא יַאֲהִיל
  english_pob_choice: does not shine
  chosen_spanish: no resplandece
  alternatives_spanish:
  - no alumbra
  - no da luz
  - no brilla
  lexicon: HALOT
  rationale: El verbo hebreo apunta a la idea de emitir luz o brillar. 'Resplandece' conserva el matiz poético y evita una banalización demasiado coloquial.
- source_word: וְכוֹכָבִים
  english_pob_choice: and the stars
  chosen_spanish: y las estrellas
  alternatives_spanish:
  - y los astros
  lexicon: HALOT
  rationale: Traducción directa del sustantivo colectivo/plural para el conjunto de luces celestes.
- source_word: לֹא זַכּוּ
  english_pob_choice: are not pure
  chosen_spanish: no son puras
  alternatives_spanish:
  - no están limpias
  - no son limpias
  - no son brillantes
  lexicon: HALOT
  rationale: El campo semántico incluye limpieza/pureza y, por extensión contextual, aptitud o brillantez. En español, 'puras' preserva mejor la valoración cualitativa sin decidir prematuramente por una sola imagen física.
- source_word: בְעֵינָיו
  english_pob_choice: in his eyes
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - a sus ojos
  - en sus ojos
  - en su opinión
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de evaluación. 'Ante sus ojos' mantiene la imagen y su sentido valorativo, con una fluidez más natural en español que una calca rígida.
theological_decisions:
- issue: Referente del sufijo de tercera persona masculina singular en בְעֵינָיו
  english_pob_reading: his = God
  chosen_spanish_reading: sus = Dios
  alternative_spanish_readings:
  - sus = un observador indefinido
  - sus = él
  rationale: El contexto inmediato de Job 25:2–6 trata de la trascendencia y pureza de Dios frente a lo creado. Por eso, 'sus ojos' se entiende naturalmente de Dios, aunque el pronombre se mantiene sin mayúscula para seguir la convención estilística del texto corrido.
  doctrine_reference: Teología de la santidad y trascendencia divina en Job 25:2–6
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido del hebreo y coincide con la línea interpretativa del POB en inglés; no se detectaron revisiones sustantivas en el pase más reciente, por lo que no se incorporan cambios adicionales.
  spanish_consistency_notes:
  - Se preserva el paralelismo poético entre la luna y las estrellas.
  - Se evitó 'SEÑOR' para el referente divino, porque aquí el texto habla de evaluación divina mediante el sufijo posesivo, no de una sustitución por el nombre divino.
  - '''Puras'' mantiene la tensión lexical entre pureza moral y brillo físico, sin borrar la ambigüedad documentada en el audit trail.'
  - La puntuación refleja el ritmo poético de la línea hebrea y la lectura pública en español.
