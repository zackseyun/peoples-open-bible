  language: en
  yaml_path: translation/ot/zechariah/012/010.yaml
  text: And I will pour out on the house of David and on the inhabitants of Jerusalem a spirit of grace and supplication[a], and they will look to me, whom they have pierced, and they will mourn for him as one mourns for an only son[c][b], and weep bitterly for him as one weeps bitterly for a firstborn.
  footnotes:
