translation:
  language: es
  text: Y escucha las súplicas de tu siervo y de tu pueblo Israel cuando oren hacia este lugar. Y que tú escuches desde el lugar de tu morada[a], desde los cielos, y cuando escuches, perdones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''escucha las súplicas de tu siervo y de tu pueblo Israel''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתָּ / תִּשְׁמַע / וְשָׁמַעְתָּ
  english_pob_choice: hear / may you hear / when you hear
  chosen_spanish: escuchas / que tú escuches / cuando escuches
  alternatives_spanish:
  - oigas / que oigas / cuando oigas
  - atiendas / que atiendas / cuando atiendas
  lexicon: HALOT
  rationale: Conservo la repetición del verbo hebreo שׁמע con un mismo núcleo verbal en español. 'Escuchar' comunica el acto de oír con atención, que en este contexto de oración encaja bien sin perder el paralelismo. El subjuntivo 'que tú escuches' refleja el valor petitorio de תִּשְׁמַע, y 'cuando escuches' permite llegar de forma natural a 'perdones'.
- source_word: תַּחֲנוּנֵי
  english_pob_choice: pleas
  chosen_spanish: súplicas
  alternatives_spanish:
  - ruegos
  - peticiones
  - suplicaciones
  lexicon: HALOT
  rationale: El término expresa ruegos intensos por misericordia o favor. 'Súplicas' conserva la carga afectiva y la solemnidad del término mejor que un equivalente más débil.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En la oración real dirigida a Dios, el valor relacional y honorífico domina. 'Siervo' es el equivalente español más natural y reverente; 'esclavo' resultaría demasiado fuerte para este contexto, aunque refleja la raíz léxica en otros pasajes.
- source_word: וְעַמְּךָ יִשְׂרָאֵל
  english_pob_choice: and of your people Israel
  chosen_spanish: y de tu pueblo Israel
  alternatives_spanish:
  - y tu pueblo Israel
  - y de tu pueblo, Israel
  lexicon: HALOT
  rationale: Mantengo la relación posesiva con 'de tu pueblo' para reflejar el hebreo constructo y la coordinación con 'tu siervo'. 'Israel' queda como identificación del pueblo sin alterar el sentido.
- source_word: יִתְפַּלְלוּ
  english_pob_choice: they pray
  chosen_spanish: oren
  alternatives_spanish:
  - recen
  - hagan oración
  - se pongan a orar
  lexicon: HALOT
  rationale: El verbo denota orar; 'oren' es una forma clara y digna en español contemporáneo. La dirección de la oración se expresa con la frase siguiente, no dentro del verbo mismo.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: toward this place
  chosen_spanish: hacia este lugar
  alternatives_spanish:
  - a este lugar
  - en dirección a este lugar
  lexicon: HALOT
  rationale: '''Hacia'' transmite la orientación espacial de la oración sin forzar una literalidad extraña. ''Lugar'' mantiene la referencia al templo sin imponer una terminología más eclesiástica.'
- source_word: מִמְּקוֹם שִׁבְתְּךָ
  english_pob_choice: from your dwelling place
  chosen_spanish: desde el lugar de tu morada
  alternatives_spanish:
  - desde tu morada
  - desde el lugar donde moras
  lexicon: HALOT
  rationale: '''Lugar de tu morada'' preserva de manera transparente la estructura hebrea y sugiere una morada estable y trascendente. Esta formulación ayuda a mantener la tensión entre el templo como punto de referencia y el verdadero ámbito celestial de Dios.'
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - desde el firmamento
  lexicon: HALOT
  rationale: El plural hebreo שָׁמַיִם conserva mejor su forma con 'los cielos'. Aunque 'desde el cielo' sería idiomático, 'los cielos' deja ver con más claridad la forma del original y mantiene el registro bíblico.
- source_word: סָלָחְתָּ
  english_pob_choice: forgive
  chosen_spanish: perdones
  alternatives_spanish:
  - perdones con clemencia
  - absuelvas
  lexicon: HALOT
  rationale: El verbo significa perdonar en un contexto de culpa o pecado. 'Perdones' es la equivalencia más directa y natural en español; 'absuelvas' añade un matiz más técnico-jurídico que no se impone aquí.
theological_decisions:
- issue: Tensión entre el templo y la trascendencia divina
  english_pob_reading: The verse preserves both prayer toward the temple ('this place') and God's true dwelling as heaven.
  chosen_spanish_reading: El verso conserva tanto la oración dirigida hacia este lugar como la afirmación de que Dios escucha desde el lugar de su morada, desde los cielos.
  alternative_spanish_readings:
  - Dios oye únicamente desde el cielo, sin referencia funcional al templo
  - El templo es el lugar donde Dios está localizado
  rationale: 'El hebreo mantiene unidos ambos polos: el pueblo ora hacia el templo, pero Dios escucha desde su morada celestial. La traducción evita resolver esa tensión y la expresa con claridad en español.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El contexto inglés POB ya había estabilizado la lectura principal ('hear/forgive') y no mostraba revisiones posteriores con cambios sustantivos; la versión española sigue esa línea, pero opta por 'escuchar' y 'súplicas' para un registro bíblico natural en español y conserva la tensión teológica entre el templo y los cielos.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; en este verso no aparece directamente.
  - '''Siervo'' se usa por el valor honorífico de עבד en oración dirigida a Dios, coherente con la política española del proyecto y la decisión inglesa de no usar ''slave'' aquí.'
  - '''Cielos'' se eligió para reflejar el plural hebreo שָׁמַיִם y para mantener continuidad bíblica en español sin borrar la referencia al ámbito celestial.'
  - El marcaje de nota al pie solo se usa donde hay una alternativa lexical real preservada del audit trail inglés.
