translation:
  language: es
  text: Que él se siente entronizado[a] para siempre delante de Dios; dispón que el amor constante y la verdad[b] lo guarden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que él more delante de Dios para siempre». El verbo puede significar «sentarse», «permanecer» o «morar»; en este contexto real probablemente lleva matiz de entronización.'
    reason: lexical_alternative
  - marker: b
    text: «Verdad» también puede traducirse aquí como «fidelidad»; la pareja hebrea «amor constante y verdad/fidelidad» es una expresión común de la lealtad y confiabilidad pactales de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשֵׁב
  english_pob_choice: May he sit enthroned
  chosen_spanish: Que él se siente entronizado
  alternatives_spanish:
  - Que él more
  - Que él se siente
  - Que él reine
  lexicon: HALOT
  rationale: El imperfecto qal de ישב puede expresar sentarse, morar o entronizarse según el contexto. En un salmo real, la idea de entronización expresa mejor la función regia que un simple «se siente» o «more». El subjuntivo exhortativo «que él se siente» conserva el matiz optativo del hebreo.
- source_word: עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: En poesía, עוֹלָם señala duración continua. «Para siempre» es natural en español y preserva la idea de permanencia sin sobrecargar el estilo.
- source_word: לִפְנֵי אֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en la presencia de Dios
  - ante Dios
  lexicon: HALOT
  rationale: לִפְנֵי significa literalmente «delante de / en presencia de». «Delante de Dios» mantiene la imagen espacial y la relación reverente sin introducir una paráfrasis excesiva.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: lealtad amorosa
  alternatives_spanish:
  - amor constante
  - amor leal
  - misericordia
  lexicon: HALOT
  rationale: חֶסֶד tiene un campo semántico de amor leal, fidelidad pactal y benevolencia. «Lealtad amorosa» intenta conservar tanto el componente afectivo como el de fidelidad, evitando reducirlo a «misericordia».
- source_word: אֱמֶת
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la fidelidad
  - la confiabilidad
  lexicon: HALOT
  rationale: אֱמֶת puede significar verdad, fidelidad o fiabilidad. Se mantiene «la verdad» por transparencia léxica, mientras que la pareja con חֶסֶד deja oír su valor de fidelidad pactal.
- source_word: מַן
  english_pob_choice: appoint
  chosen_spanish: que ... guarden
  alternatives_spanish:
  - dispón
  - ordena
  - establece
  lexicon: HALOT
  rationale: 'La forma se entiende como imperativo de מנה con sentido de asignar o disponer. En español, el mandato se expresa de manera más natural y coherente en la segunda mitad del versículo: «que ... lo guarden», haciendo explícita la función de esas cualidades como custodias.'
- source_word: יִנְצְרֻהוּ
  english_pob_choice: to guard him
  chosen_spanish: lo guarden
  alternatives_spanish:
  - lo preserven
  - lo custodien
  - lo vigilen
  lexicon: HALOT
  rationale: נצר significa guardar, preservar o custodiar. «Lo guarden» es claro y reproduce bien la función protectora de חֶסֶד y אֱמֶת personificadas como guardianas del rey.
theological_decisions:
- issue: Fuerza del imperfecto/jusivo en una oración real
  english_pob_reading: 'Rendered as a prayer/wish: ''May he sit enthroned'''
  chosen_spanish_reading: «Que él se siente entronizado» como deseo/oración
  alternative_spanish_readings:
  - «Él se sentará entronizado»
  - «Que él more»
  rationale: El contexto es peticional y el segundo hemistiquio contiene una petición dirigida a Dios. Mantener un subjuntivo exhortativo preserva la unidad del verso como oración, no como mera predicción.
  doctrine_reference: Translation philosophy §3 (preservar la tensión cuando hay ambigüedad)
- issue: Sentido de la pareja חֶסֶד וֶאֱמֶת
  english_pob_reading: 'Personified divine qualities: ''steadfast love and truth'''
  chosen_spanish_reading: 'Cualidades personificadas: «lealtad amorosa y la verdad»'
  alternative_spanish_readings:
  - «amor constante y fidelidad»
  - «misericordia y verdad»
  rationale: La pareja hebrea suele expresar la lealtad pactal y la confiabilidad de Dios. «Lealtad amorosa» conserva la tensión entre afecto y fidelidad; «la verdad» mantiene la transparencia léxica, sin borrar el trasfondo de fidelidad que el binomio sugiere.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave o excepción documentada)
translation_notes:
  revision_awareness: Coincide con la última pasada del texto fuente en que no hubo cambios necesarios; se mantiene la lectura óptima con el matiz regio de ישב, el valor pactal de חֶסֶד וֶאֱמֶת y la resolución del segundo hemistiquio como petición de guarda.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, sin sustituciones litúrgicas.
  - Se evita «SEÑOR» porque el texto hebreo usa אֱלֹהִים.
  - Se conserva una solución reverente y moderna, sin calcos excesivos.
  - La colocación de los corchetes de nota sigue el texto español publicado y no altera el sentido base.
