review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el contenido de la fuente hebrea: sacrificio de holocausto a Yahvé, fórmula sacrificial fija «רֵיחַ נִיחֹחַ», y la lista de animales con edad y condición. Sin embargo, hay un desajuste gramatical importante en el número de persona: el hebreo וְהִקְרַבְתֶּם es 2ª persona plural («ustedes presentarán»), pero el español usa singular («Presentarás»). Además, conviene hacer más natural la cláusula final para unir explícitamente la condición «sin defecto» con los animales, como en el hebreo y el inglés auditado.'
  spanish_quality_summary: El español es generalmente claro y digno, con buena terminología cultual («holocausto», «carnero», «Yahvé»). «Novillo de la vacada» es comprensible, aunque algo menos natural que «novillo del ganado» o «toro de la vacada»; no es un error, pero el ajuste principal necesario es concordar con el plural y mejorar la fluidez final. La nota al pie está bien anclada y bien formulada.
  glossary_alignment: 'Se alinea bien con la política del proyecto: יהוה -> «Yahvé»; עֹלָה -> «holocausto»; רֵיחַ נִיחֹחַ -> «aroma agradable» con nota alternativa; תְּמִימִם -> «sin defecto». No hay conflictos doctrinales ni terminológicos mayores.'
  issues:
  - severity: high
    issue: Cambio indebido de plural a singular en el verbo principal
    rationale: וְהִקְרַבְתֶּם es 2ª persona plural. «Presentarás» altera la referencia gramatical del mandato colectivo. Debe ser «Presentarán» o, mejor, «Presentarán ustedes» si se quisiera enfatizar, aunque no es necesario.
  - severity: medium
    issue: La cláusula final suena invertida en español
    rationale: «Sin defecto serán para ustedes» reproduce de forma algo rígida el orden hebreo. Una forma más natural y fiel al sentido es «deberán ser sin defecto para ustedes» o «serán para ustedes sin defecto»; la primera expresa bien el valor legislativo sin perder לָכֶם.
  revised_spanish_text: 'Presentarán a Yahvé un holocausto[a], aroma agradable: un novillo de la vacada, un carnero y siete corderos machos de un año; deberán ser sin defecto para ustedes.'
  revised_footnotes:
