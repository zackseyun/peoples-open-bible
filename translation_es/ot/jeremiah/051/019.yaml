translation:
  language: es
  text: No es como estos la Porción de Jacob[a], porque él es el que formó todo, y la tribu de su heredad[b]; Yahvé de los ejércitos es su nombre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la porción de Jacob». El hebreo puede significar tanto que Yahvé es la parte asignada a Jacob como, menos probablemente en este contexto, que Jacob posee esta porción.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y la tribu de su heredad». El referente es Jacob/Israel como el pueblo perteneciente a Yahvé; algunas traducciones explicitan «Israel» por claridad a partir del paralelo en Jeremías 10:16.'
    reason: alternative_reading
  - marker: c
    text: 'Traducción tradicional: «Yahvé de las huestes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כְאֵלֶּה
  english_pob_choice: Not like these
  chosen_spanish: No como estos
  alternatives_spanish:
  - No como ellos
  lexicon: HALOT
  rationale: Mantiene el demostrativo plural inmediato y la comparación con los ídolos del contexto, sin diluir la referencia.
- source_word: חֵלֶק יַעֲקֹב
  english_pob_choice: the Portion of Jacob
  chosen_spanish: la Porción de Jacob
  alternatives_spanish:
  - la porción de Jacob
  - la porción de Jacob de
  lexicon: HALOT
  rationale: Conservar la mayúscula en «Porción» refleja su función como designación divina en el contexto, mientras que «de Jacob» mantiene el sentido de pertenencia/porción asignada.
- source_word: יוֹצֵר הַכֹּל
  english_pob_choice: the one who formed everything
  chosen_spanish: el que formó todo
  alternatives_spanish:
  - el que formó todas las cosas
  - el hacedor de todo
  lexicon: HALOT
  rationale: «Formó» reproduce el valor de יוֹצֵר como formar/modelar, y «todo» es una forma natural y compacta en español para הַכֹּל.
- source_word: וְשֵׁבֶט נַחֲלָתוֹ
  english_pob_choice: and the tribe of his inheritance
  chosen_spanish: la tribu de su heredad
  alternatives_spanish:
  - la tribu de su herencia
  - la vara de su heredad
  lexicon: HALOT
  rationale: «Tribu» respeta el sentido del hebreo en este paralelismo con el pueblo perteneciente a Yahvé; «heredad» conserva el matiz de posesión asignada y su registro bíblico.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir יהוה como «Yahvé». «De los Ejércitos» expresa de modo transparente צְבָאוֹת y conserva el sentido militar/cósmico mejor que una transliteración o una fórmula más tradicional opaca.
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - su nombre es
  - ese es su nombre
  lexicon: HALOT
  rationale: Completa naturalmente la cláusula nominal en español y conserva la identificación solemne del nombre divino.
theological_decisions:
- issue: Renderizado del Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el nombre del pacto; conforme al criterio del proyecto, se conserva como «Yahvé» en vez de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Relación entre 'Jacob' y 'Israel' en la cláusula final
  english_pob_reading: and the tribe of his inheritance is Israel; Yahweh of Armies is his name.
  chosen_spanish_reading: la tribu de su heredad es Israel
  alternative_spanish_readings:
  - la tribu de su heredad
  - Israel es la tribu de su heredad
  rationale: Aunque el hebreo base dice solo «la tribu de su heredad», el contexto y el paralelismo cercano hacen explícito que el referente es Israel. Se conserva esa explicitación en el cuerpo principal, como permite el audit trail, sin alterar el resto del versículo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que reordenó la cláusula final para reflejar con más naturalidad el hebreo y la decisión final de usar el nombre divino «Yahweh/Yahvé» en lugar de «el SEÑOR». La versión española mantiene esa orientación, pero adapta el orden para que suene natural en español sin perder la estructura del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה de forma consistente con el criterio del proyecto.
  - Se usó «Porción» con mayúscula como designación divina, en línea con la lectura del audit trail.
  - «Ejércitos» traduce צְבָאוֹת con claridad y evita la opacidad de «huestes» para lectores modernos.
  - Se conservó el paralelismo semántico entre Jacob e Israel sin borrar la tensión textual entre el MT y el contexto cercano.
