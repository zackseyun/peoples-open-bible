revisions:
- from: Cuando yo haga de la tierra de Egipto una desolación[a], y la tierra quede desolada, vaciada de todo lo que la llena, cuando hiera a todos los que habitan en ella, entonces sabrán que yo soy Yahvé.
  to: Cuando yo haga de la tierra de Egipto una desolación[a], y la tierra quede desolada, vaciada de todo lo que la llena, cuando abata a todos los que habitan en ella, entonces sabrán que yo soy Yahvé.
  rationale: 'Se conserva todo el borrador salvo un ajuste puntual: «hiera» se cambia por «abata» para reflejar mejor la fuerza destructiva de בְּהַכּוֹתִי en este contexto de juicio. No se requieren cambios en la nota ni en la traducción de «Yahvé».'
