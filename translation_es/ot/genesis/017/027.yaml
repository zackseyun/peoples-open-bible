translation:
  language: es
  text: Y todos los hombres de su casa, los nacidos en la casa y los comprados con dinero de un extranjero[a], fueron circuncidados con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijo de un extranjero», un modismo que significa «extranjero» o «forastero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  english_pob_choice: And all
  chosen_spanish: Y todos
  alternatives_spanish:
  - y cada uno
  - y todos ellos
  lexicon: HALOT
  rationale: וְ añade continuidad narrativa y כָּל expresa totalidad. «Y todos» conserva la amplitud del hebreo y suena natural en español.
- source_word: אַנְשֵׁי בֵיתוֹ
  english_pob_choice: the men of his household
  chosen_spanish: los hombres de su casa
  alternatives_spanish:
  - los varones de su casa
  - los hombres de su hogar
  lexicon: HALOT
  rationale: אַנְשֵׁי es plural de «hombres» y בֵיתוֹ significa «su casa/maison doméstica». En el contexto de la circuncisión, «los hombres de su casa» mantiene el referente masculino sin volverlo innecesariamente técnico.
- source_word: יְלִיד בָּיִת
  english_pob_choice: those born in the house
  chosen_spanish: los nacidos en la casa
  alternatives_spanish:
  - los nacidos en su casa
  - los de nacimiento doméstico
  lexicon: HALOT
  rationale: La expresión designa a los que nacieron dentro del ámbito doméstico. «Los nacidos en la casa» conserva el sentido social-legal y es idiomático en español.
- source_word: וּמִקְנַת כֶּסֶף
  english_pob_choice: and those bought with money
  chosen_spanish: los comprados con dinero
  alternatives_spanish:
  - los adquiridos con dinero
  - los comprados por dinero
  lexicon: HALOT
  rationale: La construcción se refiere a personas adquiridas por compra. «Comprados con dinero» es claro y refleja el valor transaccional del hebreo.
- source_word: מֵאֵת בֶּן נֵכָר
  english_pob_choice: from a foreigner
  chosen_spanish: de un extranjero
  alternatives_spanish:
  - de un forastero
  - de un outsider
  lexicon: HALOT
  rationale: La frase idiomática בֶּן נֵכָר funciona como designación de alguien ajeno o extranjero. «De un extranjero» expresa bien el sentido sin traducir mecánicamente la metáfora filial.
- source_word: נִמֹּלוּ
  english_pob_choice: were circumcised
  chosen_spanish: fueron circuncidados
  alternatives_spanish:
  - se circuncidaron
  lexicon: HALOT
  rationale: La forma nifal se entiende mejor en pasivo. «Fueron circuncidados» evita sugerir una acción reflexiva no exigida por el hebreo.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: La preposición marca acompañamiento en el acto de la circuncisión. «Con él» es breve, preciso y natural en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y coincide en sustancia con el rastro auditado en inglés: inclusión total del grupo doméstico, distinción entre nacidos en casa y comprados, y voz pasiva para la circuncisión.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «extranjero» para בֶּן נֵכָר, con nota para el modismo hebreo subyacente.
  - «Circuncidados» se usa en pasivo para reflejar el nifal hebreo sin añadir reflexividad.
