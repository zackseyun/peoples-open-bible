    issue: '''flecha aguda'' suena poco natural para חֵץ שָׁנוּן'
    rationale: שָׁנוּן significa 'afilado/aguzado'. En español, 'aguda' no es la opción más idiomática para una flecha como arma; 'afilada' preserva mejor la imagen concreta y la claridad.
  - severity: low
    issue: La nota al pie de 'maza' no refleja de forma óptima la alternativa auditada
    rationale: El POB inglés documenta específicamente 'maul' como alternativa. En español, 'mazo' funciona bien como alternativa principal; la nota puede ser más breve y directa.
  revised_spanish_text: Una maza[a], una espada y una flecha afilada es el hombre que da falso testimonio contra su prójimo.
