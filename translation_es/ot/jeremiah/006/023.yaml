revisions:
- from: Empuñan arco y jabalina; son crueles y no tienen compasión. Su voz brama como el mar[a], y montan sobre caballos, dispuestos como un hombre para la batalla contra ti, hija de Sion.
  to: Empuñan arco y jabalina; son crueles y no tienen compasión. Su estruendo brama como el mar, y cabalgan sobre caballos, dispuestos como un hombre[a] para la batalla contra ti, hija de Sion.
  rationale: Se corrige 'su voz' a 'su estruendo' para reflejar mejor el valor colectivo de קוֹלָם en este contexto militar y alinearlo con la decisión documentada del POB. Se reubica la nota [a] al sintagma 'como un hombre', que es el verdadero punto de ambigüedad de כְאִישׁ. Se hace un ajuste menor de estilo a 'cabalgan sobre caballos' para mayor naturalidad, sin alterar el sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:33:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y la mayoría de las decisiones del POB inglés: armas, crueldad colectiva, ausencia de misericordia, estruendo marítimo, jinetes, formación para batalla y apóstrofe final a Sion. Sin embargo, en dos puntos se aleja innecesariamente del rastro auditado: קוֹלָם se documentó como ''their sound'', no ''su voz'', y la nota [a] en español está mal anclada al mar en vez de al sintagma ''como un hombre'', que es donde pertenece la ambigüedad de כְאִישׁ.'
  spanish_quality_summary: El español es claro y digno, pero conviene pulir la precisión léxica y el anclaje de la nota. 'Su voz' personifica más de lo que pide el hebreo; 'su estruendo' o 'su sonido' representa mejor el efecto colectivo del ejército. También 'montan sobre caballos' es aceptable, pero 'cabalgan sobre caballos' o 'montan a caballo' suena algo más natural; no es un error grave. La frase general es plenamente legible.
  glossary_alignment: No hay conflicto con las pautas principales del glosario del proyecto. 'Hija de Sion' es una excepción legítima y bien motivada frente al inglés 'daughter Zion'. No aparecen términos sensibles como Yahvé, Mesías o δοῦλος. La revisión propuesta mantiene la lógica léxica auditada del POB, especialmente para קוֹלָם y כְאִישׁ.
  issues:
  - severity: medium
    issue: קֹולָם se tradujo como 'su voz' en vez de un término de sonido colectivo.
    rationale: El POB inglés documenta 'their sound' por la imagen auditiva del ejército rugiendo como el mar. 'Voz' introduce una personificación más marcada y estrecha el campo semántico de קול.
  - severity: high
    issue: La nota [a] está colocada tras 'mar' en vez de en 'como un hombre'.
    rationale: La nota explica la ambigüedad de כְאִישׁ ('como un hombre' / 'como un solo hombre'), no la comparación con el mar. El anclaje actual induce a pensar que la variante afecta 'mar' o el ruido, lo cual desinforma al lector.
  - severity: low
    issue: La redacción de la nota puede ajustarse para corresponder más exactamente al inglés auditado.
    rationale: La alternativa documentada es 'como un solo hombre para la batalla', y la explicación puede decir que el singular puede entenderse como comparación guerrera o como énfasis en formación unida.
  revised_spanish_text: Empuñan arco y jabalina; son crueles y no tienen compasión. Su estruendo brama como el mar, y cabalgan sobre caballos, dispuestos como un hombre[a] para la batalla contra ti, hija de Sion.
  revised_footnotes:
  - marker: a
    text: 'O: «dispuestos como un solo hombre para la batalla». El singular hebreo כְאִישׁ puede entenderse como una comparación guerrera («como un hombre») o como énfasis en una formación unida («como un solo hombre»).'
    reason: lexical_alternative
  revision_rationale: Se corrige 'su voz' a 'su estruendo' para reflejar mejor el valor colectivo de קוֹלָם en este contexto militar y alinearlo con la decisión documentada del POB. Se reubica la nota [a] al sintagma 'como un hombre', que es el verdadero punto de ambigüedad de כְאִישׁ. Se hace un ajuste menor de estilo a 'cabalgan sobre caballos' para mayor naturalidad, sin alterar el sentido.
