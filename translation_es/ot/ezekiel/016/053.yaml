    rationale: «Es decir, en medio de las otras ciudades/restauraciones mencionadas» mezcla referentes y añade «restauraciones», que no está en la nota inglesa ni es necesario para entender בְּתוֹכָהְנָה. La nota pertinente documentada es la explicación cultural de «hijas».
  - severity: low
    issue: La colocación de notas puede mejorar para corresponder mejor a los puntos de ambigüedad reales.
    rationale: La primera nota conviene anclarla en «fortunas», y la segunda en «hijas», reflejando exactamente las dos notas del POB inglés.
