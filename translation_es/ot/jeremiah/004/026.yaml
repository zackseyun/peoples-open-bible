translation:
  language: es
  text: Miré[a], y he aquí, la tierra fértil era un desierto, y todas sus ciudades fueron derribadas delante de Yahvé[b], ante su ardiente ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Carmel; aquí probablemente se usa en sentido más amplio de tierra fértil o cultivada, no del monte Carmelo como región específica.
    reason: lexical_alternative
  - marker: b
    text: 'O: «por causa de Yahvé, por causa de su ardiente ira». La frase hebrea repite literalmente «de/desde delante de la faz de», y puede expresar causalidad en contexto de juicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָאִיתִי
  english_pob_choice: I looked
  chosen_spanish: Miré
  alternatives_spanish:
  - Vi
  lexicon: HALOT
  rationale: En un reporte profético de visión, ראיתי puede entenderse como 'vi' o 'miré'. 'Miré' conserva el carácter de observación visionaria y suena natural en español sin perder el matiz de atención dirigida.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y entonces
  lexicon: HALOT
  rationale: הִנֵּה funciona como marcador discursivo de énfasis e introduce una escena inesperada. 'He aquí' preserva esa vividez solemne en español bíblico moderno.
- source_word: הַכַּרְמֶל
  english_pob_choice: the fruitful land
  chosen_spanish: el terreno fértil
  alternatives_spanish:
  - el Carmelo
  - la tierra fértil
  - la tierra cultivada
  lexicon: HALOT
  rationale: כַּרְמֶל puede referirse al monte Carmelo o, por sentido común, a tierra fértil/cultivada. Aquí el contraste con 'desierto' favorece el sentido común; 'terreno fértil' comunica bien la oposición semántica sin forzar el topónimo.
- source_word: הַמִּדְבָּר
  english_pob_choice: a wilderness
  chosen_spanish: un desierto
  alternatives_spanish:
  - una región despoblada
  - un yermo
  - un desierto desolado
  lexicon: HALOT
  rationale: מִדְבָּר designa un lugar desolado o yermo, no necesariamente arena. En español, 'desierto' es la forma más natural y fuerte para expresar la devastación del contraste.
- source_word: וְכָל עָרָיו
  english_pob_choice: and all its cities
  chosen_spanish: y todas sus ciudades
  alternatives_spanish:
  - y todas sus poblaciones
  lexicon: HALOT
  rationale: El sufijo posesivo masculino singular se refiere al territorio mencionado antes; en español, 'sus' resulta la referencia más natural y clara.
- source_word: נִתְּצוּ
  english_pob_choice: were torn down
  chosen_spanish: fueron derribadas
  alternatives_spanish:
  - fueron demolidas
  - fueron destruidas
  lexicon: HALOT
  rationale: El nifal de נתץ comunica que las ciudades han sido derribadas/demolidas. 'Fueron derribadas' conserva la fuerza visual del derribo y mantiene un registro bíblico claro.
- source_word: מִפְּנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - por causa de Yahvé
  - ante Yahvé
  - frente a Yahvé
  lexicon: HALOT
  rationale: La expresión literal 'de delante de / ante la presencia de' puede sugerir también causalidad en contexto de juicio. 'Delante de Yahvé' preserva la fórmula hebrea y deja que el paralelo explique la idea de juicio/presencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé'' como transliteración del nombre divino, evitando la sustitución titulada.'
- source_word: מִפְּנֵי חֲרוֹן אַפּוֹ
  english_pob_choice: before his fierce anger
  chosen_spanish: delante de su ardiente ira
  alternatives_spanish:
  - por causa de su ardiente ira
  - ante el ardor de su ira
  - delante de su furor
  lexicon: HALOT
  rationale: חֲרוֹן אַף es una expresión idiomática de ira intensa/ardiente. 'Ardiente ira' conserva el calor semántico y la repetición de 'delante de' mantiene la estructura hebrea del paralelismo.
theological_decisions:
- issue: Cómo expresar la referencia a YHWH sin sustituir el nombre divino por un título
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La política del proyecto es conservar el nombre propio divino en transliteración, por lo que 'Yahvé' es la opción coherente y auditables frente a una sustitución por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo con la ayuda del auditorio en inglés: mantiene la imagen de tierra fértil convertida en desierto y conserva la repetición de la fórmula preposicional para no borrar la tensión entre presencia y causalidad en el juicio.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Terreno fértil'' traduce el valor común de כַּרְמֶל en este contexto, evitando leerlo automáticamente como topónimo.'
  - Se mantiene el paralelismo 'delante de... delante de...' para reflejar el hebreo y permitir la lectura causal alternativa en la nota.
