    issue: אֶרֶץ se tradujo como 'tierra' en el texto principal
    rationale: El audit trail inglés decidió 'land' por el contraste con permanecer en la tierra en el v. 21. 'Tierra' en español mantiene una ambigüedad hacia 'earth/mundo' que aquí conviene reducir.
