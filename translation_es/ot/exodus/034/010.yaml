translation:
  language: es
  text: 'Y dijo: «Mira, yo hago un pacto delante de todo tu pueblo. Haré maravillas[a] que no han sido creadas en toda la tierra ni entre todas las naciones. Y todo el pueblo en medio del cual tú estás verá la obra de Yahvé, porque es algo sobrecogedor[b] lo que yo hago contigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «prodigios» o «portentos». El hebreo usa el término de «maravillas»; se conserva ese vocabulario en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O, «que inspira temor reverente». El hebreo נוֹרָא puede abarcar temor reverente, sobrecogimiento y majestad temible; «sobrecogedor» evita sugerir solo peligrosidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «Mira» funciona como marcador deíctico y de solemnidad sin sonar tan arcaico como «He aquí»; conserva la fuerza de presentación inmediata del hebreo.
- source_word: כֹּרֵת בְּרִית
  english_pob_choice: am making a covenant
  chosen_spanish: hago un pacto
  alternatives_spanish:
  - estoy haciendo un pacto
  - estoy sellando un pacto
  - corto un pacto
  lexicon: HALOT
  rationale: La imagen literal de «cortar un pacto» es hebrea, pero en español puede sonar dura o artificial. «Hago un pacto» comunica el acto pactal con claridad; el presente «hago» refleja la forma verbal enfática del hebreo con valor de acción inmediata.
- source_word: נֶגֶד כָּל עַמְּךָ
  english_pob_choice: Before all your people
  chosen_spanish: delante de todo tu pueblo
  alternatives_spanish:
  - en presencia de todo tu pueblo
  - ante todo tu pueblo
  lexicon: HALOT
  rationale: «Delante de» mantiene la idea de visibilidad pública y presencia testimonial. «Todo tu pueblo» conserva el sentido colectivo de עַמְּךָ.
- source_word: נִפְלָאֹת
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - portentos
  - prodigios
  - maravillas grandiosas
  lexicon: HALOT
  rationale: «Maravillas» es un equivalente natural y reverente para actos extraordinarios de Dios. Evita tanto el arcaísmo como una paráfrasis excesiva.
- source_word: אֲשֶׁר לֹא נִבְרְאוּ
  english_pob_choice: such as have not been created
  chosen_spanish: que no han sido creadas
  alternatives_spanish:
  - que no han sido hechas
  - que nunca se han creado
  - que no han ocurrido
  lexicon: HALOT
  rationale: Se conserva el verbo «crear» porque el hebreo usa ברא y no un verbo genérico de «hacer». El femenino plural concuerda con «maravillas» y preserva la fuerza lexical del original.
- source_word: בְכָל הָאָרֶץ וּבְכָל הַגּוֹיִם
  english_pob_choice: in all the earth or among any of the nations
  chosen_spanish: en toda la tierra ni entre todas las naciones
  alternatives_spanish:
  - en toda la tierra y entre todas las naciones
  - por toda la tierra y entre las naciones
  lexicon: HALOT
  rationale: «Ni» reproduce bien el paralelo negativo del hebreo entre dos ámbitos que no han visto tales actos. «Tierra» se conserva por el alcance amplio que sugiere el texto junto con «naciones».
- source_word: וְרָאָה כָל הָעָם
  english_pob_choice: And all the people ... will see
  chosen_spanish: Y todo el pueblo ... verá
  alternatives_spanish:
  - Y el pueblo todo ... verá
  - Y toda la gente ... verá
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es singular, el sujeto colectivo «todo el pueblo» permite en español un verbo singular natural. «Verá» mantiene el valor futuro/promisorio del contexto.
- source_word: אֲשֶׁר אַתָּה בְקִרְבּוֹ
  english_pob_choice: in whose midst you are
  chosen_spanish: en medio del cual tú estás
  alternatives_spanish:
  - entre el cual tú estás
  - en cuya presencia tú estás
  lexicon: HALOT
  rationale: «En medio del cual» conserva el campo semántico espacial y comunitario de בְקִרְבּוֹ. La relativa mantiene la referencia al pueblo.
- source_word: מַעֲשֵׂה יְהוָה
  english_pob_choice: the work of Yahweh
  chosen_spanish: la obra de Yahvé
  alternatives_spanish:
  - la acción de Yahvé
  - la obra de Yahvé Dios
  - el obrar de Yahvé
  lexicon: HALOT
  rationale: «Obra» reproduce bien el constructo y su amplitud para una acción poderosa de Dios. Se mantiene «Yahvé» conforme al criterio del proyecto para el Nombre divino.
- source_word: נוֹרָא הוּא
  english_pob_choice: it is an awesome thing
  chosen_spanish: es algo temible
  alternatives_spanish:
  - es algo imponente
  - es algo que inspira temor reverente
  - es algo asombroso
  lexicon: HALOT
  rationale: «Temible» conserva el peso de reverencia y temor del término hebreo sin volverlo meramente coloquial como «impresionante». La formulación impersonal «algo temible» refleja bien el hebreo nominal.
- source_word: אֲשֶׁר אֲנִי עֹשֶׂה עִמָּךְ
  english_pob_choice: what I am doing with you
  chosen_spanish: lo que yo hago contigo
  alternatives_spanish:
  - lo que estoy haciendo contigo
  - lo que yo hago para contigo
  lexicon: HALOT
  rationale: «Contigo» conserva la relación directa de participación/presencia del hebreo עִמָּךְ. El presente simple español expresa con naturalidad la acción divina en curso o inminente.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se traduce con el Nombre propio «Yahvé» para preservar la referencia pactual y evitar el reemplazo litúrgico por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza de ברא en la cláusula de novedades extraordinarias
  english_pob_reading: retain 'created' language
  chosen_spanish_reading: retener el lenguaje de «creadas»
  alternative_spanish_readings:
  - hacer/realizar
  - producir
  rationale: Se mantiene «creadas» porque el hebreo emplea ברא, un verbo teológicamente cargado que el audit trail inglés también preserva. Esto evita diluir la afirmación de novedad absoluta en mero lenguaje de eficacia.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail inglés: se prefirió un registro formal pero natural, se mantuvo el lenguaje de «creadas» para ברא y se ajustó la cláusula final para reflejar mejor la sintaxis hebrea de «algo temible lo que yo hago contigo».'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma consistente para el Nombre divino.
  - Se usa «pacto» para בְּרִית, en línea con el uso bíblico y la inteligibilidad actual.
  - Se mantiene «maravillas» y «creadas» para respetar la tensión lexical del hebreo.
  - Las notas están ancladas únicamente donde aparecen los marcadores en el texto, sin marcadores huérfanos.
