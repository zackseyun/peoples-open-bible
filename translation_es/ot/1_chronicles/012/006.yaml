translation:
  language: es
  text: Eluzai, Jerimot, Bealía, Semariahu, y Sefatías el harufita[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el harifita». La forma gentilicia hebrea puede reflejar un nombre de clan también representado en otros lugares con la forma Harif.
