translation:
  language: es
  text: Y le envió un broche de oro, como es costumbre dar a los parientes de los reyes; y le dio Accarón[a] y todo su territorio como herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Accarón es la forma griega del nombre del lugar más conocido en hebreo como Ecrón.
    reason: lexical_alternative
lexical_decisions:
- source_word: πόρπην χρυσῆν
  english_pob_choice: a gold clasp
  chosen_spanish: un broche de oro
  alternatives_spanish:
  - un broche dorado
  - un broche de oro fino
  - una hebilla de oro
  lexicon: LSJ
  rationale: πόρπη puede referirse a un broche, hebilla o broche ornamental de sujeción. ‘Broche de oro’ conserva el objeto concreto y su valor, y suena natural en español sin introducir una forma demasiado específica que el griego no obliga a precisar.
- source_word: ὡς ἔθος ἐστὶν διδόσθαι
  english_pob_choice: as is the custom to give
  chosen_spanish: como es costumbre dar
  alternatives_spanish:
  - como es costumbre entregar
  - como suele darse
  - según es la costumbre de dar
  lexicon: LSJ
  rationale: La frase idiomática expresa una práctica establecida. ‘Como es costumbre dar’ sigue de cerca la construcción griega y mantiene claridad en español actual.
- source_word: τοῖς συγγενεῦσιν τῶν βασιλέων
  english_pob_choice: to the king’s kinsmen
  chosen_spanish: a los parientes de los reyes
  alternatives_spanish:
  - a los parientes del rey
  - a los familiares de los reyes
  - a los de la parentela real
  lexicon: LSJ
  rationale: συγγενεύς significa pariente o consanguíneo. Se preserva el plural del griego con ‘los reyes’ y se evita una singularización que estrecharía el sentido del texto.
- source_word: Ἀκκαρὼν
  english_pob_choice: Accaron
  chosen_spanish: Accarón
  alternatives_spanish:
  - Ekron
  - Accaron
  lexicon: LSJ
  rationale: Se translitera la forma griega Ἀκκαρών como ‘Accarón’, siguiendo el texto fuente y la práctica del proyecto de reflejar la forma griega; ‘Ekron’ queda como alternativa más conocida en español bíblico.
- source_word: τὰ ὅρια αὐτῆς
  english_pob_choice: all its territory
  chosen_spanish: todo su territorio
  alternatives_spanish:
  - todos sus límites
  - todas sus fronteras
  - todo su contorno
  lexicon: LSJ
  rationale: ὅρια significa literalmente límites o fronteras, pero en este contexto designa el ámbito territorial completo. ‘Todo su territorio’ conserva ese sentido contextual, como ya decidió la revisión inglesa.
- source_word: εἰς κληρονομίαν
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como heredad
  - en herencia
  - por herencia
  lexicon: LSJ
  rationale: κληρονομία denota herencia o posesión heredada. ‘Como herencia’ reproduce bien la idea legal-dinástica del pasaje sin sobreexplicar.
translation_notes:
  revision_awareness: La base inglesa revisada cambió ‘borders’ por ‘territory’ para hacer más natural πάντα τὰ ὅρια αὐτῆς; la versión española sigue esa decisión con ‘todo su territorio’, manteniendo el sentido de posesión territorial completa. También se conserva la transliteración del topónimo desde la forma griega, con nota alternativa al equivalente hebreo más familiar.
  spanish_consistency_notes:
  - Se usa ‘Dios’/‘Yahvé’ según corresponda en otros pasajes; aquí no aparece teonimia.
  - Se evita ‘SEÑOR’ porque el versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - La nota al pie marca la forma griega del topónimo y su equivalente hebreo más conocido.
