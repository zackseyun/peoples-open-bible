translation:
  language: es
  text: Anduvo en el camino de los reyes de Israel, como había hecho la casa de Ahab, porque la hija de Ahab era su esposa; e hizo lo malo a los ojos de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: He walked
  chosen_spanish: Anduvo
  alternatives_spanish:
  - Caminó
  - Fue
  lexicon: HALOT
  rationale: הלך con בְּדֶרֶךְ es un modismo de conducta; en español, «anduvo» conserva la imagen de caminar y puede expresar conducta de vida sin sonar excesivamente literal.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way of
  chosen_spanish: en el camino de
  alternatives_spanish:
  - en la senda de
  - según el camino de
  lexicon: HALOT
  rationale: דֶּרֶךְ aquí denota manera de proceder, no una ruta física. «En el camino de» conserva la metáfora hebrea de conducta.
- source_word: מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: the kings of Israel
  chosen_spanish: los reyes de Israel
  alternatives_spanish:
  - los monarcas de Israel
  - los reyes del reino de Israel
  lexicon: HALOT
  rationale: La frase es directa y refiere al patrón moral-político de los gobernantes del norte. «Reyes» es natural y fiel.
- source_word: כַּאֲשֶׁר עָשׂוּ בֵּית אַחְאָב
  english_pob_choice: as the house of Ahab had done
  chosen_spanish: como había hecho la casa de Ahab
  alternatives_spanish:
  - tal como hizo la casa de Ahab
  - como la casa de Ahab había hecho
  lexicon: HALOT
  rationale: בַּיִת en contexto real puede significar casa dinástica. «Casa de Ahab» preserva la expresión bíblica y su sentido de linaje sin explicitar más de lo que el texto dice.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal de su alineación con la casa de Ahab. «Porque» es natural en español y expresa bien la relación causal.
- source_word: בַּת אַחְאָב
  english_pob_choice: Ahab’s daughter
  chosen_spanish: la hija de Ahab
  alternatives_spanish:
  - la hija de Ahab
  - la hija de Akab
  lexicon: HALOT
  rationale: El hebreo usa la relación filial; el versículo no nombra aquí a Atalía. «Hija de Ahab» sigue de cerca el original.
- source_word: הָיְתָה לּוֹ אִשָּׁה
  english_pob_choice: was his wife
  chosen_spanish: era su esposa
  alternatives_spanish:
  - fue su esposa
  - le era esposa
  lexicon: HALOT
  rationale: La construcción expresa estado conyugal, no el momento del matrimonio. «Era su esposa» es idiomático y preciso.
- source_word: וַיַּעַשׂ הָרַע
  english_pob_choice: he did what was evil
  chosen_spanish: hizo lo malo
  alternatives_spanish:
  - hizo el mal
  - actuó mal
  lexicon: HALOT
  rationale: הָרַע es el sustantivo/adjetivo sustantivado «lo malo/lo evil». «Hizo lo malo» conserva la forma evaluativa hebrea sin suavizarla.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - a la vista de Yahvé
  lexicon: HALOT
  rationale: La fórmula evaluativa hebrea se puede verter de modo natural con «ante los ojos de». Mantiene el valor de juicio divino y el estilo bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», no sustituirlo por un título.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino, no un título genérico. En español del proyecto, la forma establecida es «Yahvé», preservando la identidad personal del nombre pactal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula evaluativa final
  english_pob_reading: he did what was evil in the eyes of Yahweh
  chosen_spanish_reading: hizo lo malo ante los ojos de Yahvé
  alternative_spanish_readings:
  - hizo el mal a los ojos de Yahvé
  - hizo lo que era malo ante Yahvé
  rationale: La combinación conserva tanto el sustantivo evaluativo hebreo como la imagen de valoración divina. «Ante los ojos de» preserva la idiomática bíblica de juicio moral.
  doctrine_reference: Uso semántico de fórmulas evaluativas en narrativa histórica bíblica
translation_notes:
  revision_awareness: 'Coincide con el repaso más reciente del inglés POB: no hubo cambios de fondo y la lectura quedó confirmada por alta concordancia. La draft española sigue de cerca esa solución, ajustando solo la naturalidad idiomática del español y la convención del proyecto para יְהוָה.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma uniforme para יְהוָה.
  - «Casa de Ahab» mantiene el nombre tal como aparece en el hebreo fuente.
  - La elección «hizo lo malo» refleja la evaluación moral sin añadir glosa interpretativa.
  - El paralelismo causal y narrativo se mantiene con conectores simples y claros.
