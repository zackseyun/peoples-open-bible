review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura hebrea y las decisiones auditadas en inglés: conserva la triple referencia temporal, traduce יַעֲמֹד con un verbo dinámico apropiado, mantiene ''el gran príncipe'', y refleja correctamente la crisis sin precedentes y la escapatoria del pueblo inscrito en el libro. Sin embargo, la colocación de las notas no corresponde bien a los puntos léxicos documentados: la nota [a] en ''angustia'' cambia la alternativa inglesa ''time of trouble'' a ''aflicción'', y las notas [b][c] están invertidas respecto del sentido fuente, pues [c] en el texto ancla a ''escapará'' pero la nota [c] actual habla de ''inscritos en el libro''. Además, ''todos los que se hallen escritos'' es comprensible, pero ''todo el que se halle escrito'' refleja mejor כָּל הַנִּמְצָא כָּתוּב y su singular distributivo.'
  spanish_quality_summary: El español es legible y digno, con tono bíblico moderno. No obstante, 'que está de pie sobre los hijos de tu pueblo' suena algo rígido en español; 'que está sobre los hijos de tu pueblo' preserva mejor la imagen hebrea sin la torpeza de 'de pie'. También conviene ajustar las notas para que sean idiomáticas y estén ancladas al lugar correcto.
  glossary_alignment: 'No hay conflicto con la terminología global del proyecto. Los nombres y términos clave están bien: ''Miguel'', ''príncipe'', ''angustia'', ''libro''. La decisión de mantener ''escapará'' concuerda con la auditoría inglesa. La principal corrección requerida es de correspondencia nota-ancla y una leve mejora de naturalidad en הָעֹמֵד עַל.'
  issues:
  - severity: medium
    issue: Las notas al pie [b] y [c] no corresponden a los lugares correctos del texto.
    rationale: La nota sobre 'será librado' debe anclarse a 'escapará', mientras que la nota sobre 'inscritos' debe anclarse a la frase de 'escrito(s) en el libro'. Tal como está, [c] en el texto apunta a 'escapará' pero su contenido trata otra expresión.
  - severity: medium
    issue: La nota [a] no preserva con precisión la alternativa auditada para עֵת צָרָה.
    rationale: 'El inglés preserva ''a time of trouble''. En español, la alternativa más directa y fiel es ''un tiempo de dificultad'' o ''un tiempo de problemas'', pero dentro del registro bíblico ''un tiempo de aflicción'' es posible aunque se aleja algo de ''trouble''. Conviene usar una alternativa más cercana: ''un tiempo de dificultad'' o ''un tiempo de angustia/aflicción'' según base principal. Dado que el texto principal ya usa ''angustia'', la nota puede ofrecer ''un tiempo de aflicción'' solo si se entiende como alternativa española legítima; aun así, es menos exacta respecto de la auditoría inglesa.'
  - severity: low
    issue: '''Que está de pie sobre'' suena poco natural en español.'
    rationale: Aunque intenta conservar la imagen de הָעֹמֵד עַל, en español resulta torpe. 'Que está sobre' conserva mejor la literalidad básica y la inteligibilidad; la alternativa interpretativa 'que vela por' puede ir en nota.
  - severity: low
    issue: '''Todos los que se hallen escritos'' puede mejorarse a singular distributivo.'
    rationale: El hebreo כָּל הַנִּמְצָא כָּתוּב se representa con más precisión y mejor fluidez como 'todo el que sea hallado escrito' o 'todo el que se halle escrito', sin perder el sentido colectivo.
  revised_spanish_text: Y en aquel tiempo se levantará Miguel, el gran príncipe que está sobre[a] los hijos de tu pueblo. Y habrá un tiempo de angustia[b], cual no ha habido desde que hubo nación hasta aquel tiempo. Y en aquel tiempo tu pueblo escapará[c], todo el que se halle escrito[d] en el libro.
  revised_footnotes:
