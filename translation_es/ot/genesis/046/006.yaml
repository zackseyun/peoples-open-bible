translation:
  language: es
  text: 'Tomaron su ganado y sus posesiones, que habían adquirido en la tierra de Canaán, y llegaron a Egipto: Jacob y toda su descendencia[a] con él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'descendientes'. El hebreo puede denotar la semilla, la descendencia o los descendientes de una persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: They took
  chosen_spanish: Tomaron
  alternatives_spanish:
  - Y tomaron
  - Llevaron
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción secuencial. En español, el verbo simple en pretérito mantiene la fluidez narrativa sin forzar un calco innecesario de la conjunción inicial.
- source_word: מִקְנֵיהֶם
  english_pob_choice: their livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus reses
  - sus rebaños y ganados
  lexicon: HALOT
  rationale: מִקְנֶה puede abarcar animales de crianza y ganado en conjunto. 'Ganado' comunica bien en español bíblico moderno y preserva la referencia al patrimonio animal migratorio.
- source_word: רְכוּשָׁם
  english_pob_choice: their possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - sus bienes
  - su propiedad
  lexicon: HALOT
  rationale: רְכוּשׁ designa bienes o propiedad movible. 'Posesiones' distingue con claridad este conjunto del ganado mencionado antes.
- source_word: אֲשֶׁר רָכְשׁוּ
  english_pob_choice: that they had acquired
  chosen_spanish: que habían adquirido
  alternatives_spanish:
  - que habían obtenido
  - que habían conseguido
  lexicon: HALOT
  rationale: El relativo especifica el origen de esas posesiones en Canaán. El pluscuamperfecto refleja correctamente la adquisición previa al viaje.
- source_word: בְּאֶרֶץ כְּנַעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en la tierra de Canaán
  - en Canaán
  lexicon: HALOT
  rationale: '''Tierra'' conserva la concreción geográfica y el peso patrimonial/covenantal del hebreo אֶרֶץ mejor que una simple mención toponímica.'
- source_word: וַיָּבֹאוּ מִצְרָיְמָה
  english_pob_choice: and they came to Egypt
  chosen_spanish: y llegaron a Egipto
  alternatives_spanish:
  - y vinieron a Egipto
  - y entraron en Egipto
  lexicon: HALOT
  rationale: בוא con terminación direccional expresa movimiento hacia Egipto. 'Llegaron' es natural en español narrativo y no añade el matiz de cruce fronterizo que 'entraron' podría sugerir.
- source_word: יַעֲקֹב וְכָל זַרְעוֹ
  english_pob_choice: Jacob and all his offspring
  chosen_spanish: Jacob y toda su descendencia
  alternatives_spanish:
  - Jacob y toda su posteridad
  - Jacob y toda su simiente
  lexicon: HALOT
  rationale: זֶרַע puede significar semilla, descendencia u offspring. Aquí el sentido es colectivo genealógico; 'descendencia' es claro, digno y evita la literalidad extraña de 'simiente'.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: La frase final subraya la compañía de Jacob. 'Con él' es la equivalencia natural y directa en español.
theological_decisions:
- issue: זֶרַע como término genealógico colectivo
  english_pob_reading: Or 'descendants.' The Hebrew word can denote one's seed, offspring, or descendants.
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - descendientes
  - simiente
  rationale: 'No hay una lectura doctrinal compleja, pero sí una tensión léxica importante: זֶרַע puede ser físico, genealógico o colectivo. ''Descendencia'' conserva la amplitud sin perder claridad para el lector actual.'
  doctrine_reference: Lexical semantics of Hebrew זֶרַע
- issue: Énfasis narrativo en la migración de la familia de Jacob
  english_pob_reading: Jacob and all his offspring with him
  chosen_spanish_reading: Jacob y toda su descendencia con él
  alternative_spanish_readings:
  - Jacob y todos sus descendientes con él
  - Jacob y toda su simiente con él
  rationale: La formulación mantiene el sentido de familia unida en el traslado, sin convertir el verso en una paráfrasis ni introducir nociones adicionales. La frase final conserva la cohesión del grupo que entra en Egipto.
  doctrine_reference: Narrative coherence in Genesis 46
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incluyendo el marcador [a] directamente en el texto español en el punto correspondiente a זַרְעוֹ, de modo que la nota queda anclada y auditable.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre 'ganado' y 'posesiones' para reflejar מִקְנֶה y רְכוּשׁ por separado.
  - '''Tierra de Canaán'' conserva la forma territorial del hebreo y su resonancia narrativa.'
  - '''Llegaron a Egipto'' expresa adecuadamente וַיָּבֹאוּ מִצְרָיְמָה en español natural.'
  - '''Descendencia'' evita el arcaísmo de ''simiente'' pero mantiene la amplitud semántica de זֶרַע.'
  - Se usó un estilo bíblico moderno, digno y publicable, sin depender de fórmulas eclesiásticas tradicionales que oculten el texto fuente.
