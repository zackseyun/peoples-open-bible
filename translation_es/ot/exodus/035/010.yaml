translation:
  language: es
  text: Y toda persona hábil[a] entre ustedes vendrá y hará todo lo que Yahvé ha mandado.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «sabio de corazón», un modismo para alguien con destreza o habilidad, especialmente en el trabajo artesanal.
    reason: lexical_alternative
  - marker: b
    text: O «todo el que sea hábil entre ustedes». El hebreo es gramaticalmente masculino singular con fuerza distributiva.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: And every
  chosen_spanish: Y todo
  alternatives_spanish:
  - Y cada
  - Y todo el
  lexicon: HALOT
  rationale: El hebreo usa כָל con un sustantivo singular para un valor distributivo. En español, «todo» transmite mejor ese sentido general y fluido que una coletividad abstracta.
- source_word: חֲכַם לֵב
  english_pob_choice: skillful person
  chosen_spanish: sabio de corazón
  alternatives_spanish:
  - persona sabia de corazón
  - hábil de corazón
  - sabio
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «sabio de corazón», una idiomática que en este contexto no describe solo conocimiento intelectual, sino aptitud práctica para la obra del tabernáculo. Conservo la metáfora de «corazón» y la tensión entre sabiduría y destreza en el texto principal.
- source_word: בָּכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - de entre ustedes
  lexicon: HALOT
  rationale: La preposición indica ubicación dentro del grupo. «Entre ustedes» es natural en español y preserva el matiz comunitario.
- source_word: יָבֹאוּ
  english_pob_choice: shall come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrán
  - deberá venir
  - vendrán y
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es plural, el sustantivo distributivo singular permite un español más natural en singular genérico. El mandato se conserva por el contexto imperativo de la construcción del santuario.
- source_word: וְיַעֲשׂוּ
  english_pob_choice: and make
  chosen_spanish: y hará
  alternatives_spanish:
  - y harán
  - y construirá
  - y fabricará
  lexicon: HALOT
  rationale: En este contexto concreto, עשה implica realizar/construir la obra. Opto por «hará» para mantener la fluidez y el valor amplio de «hacer» sin forzar una especificación demasiado técnica.
- source_word: אֵת כָּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo aquello que
  - cuanto
  - todo cuanto
  lexicon: HALOT
  rationale: «Todo lo que» es la equivalencia más natural y completa para introducir la cláusula relativa de totalidad.
- source_word: צִוָּה יְהוָה
  english_pob_choice: the LORD has commanded
  chosen_spanish: Yahvé ha mandado
  alternatives_spanish:
  - Yahvé ha ordenado
  - Yahvé mandó
  - el Señor ha mandado
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la terminología del proyecto. «Ha mandado» refleja bien la fuerza normativa del perfecto hebreo en este contexto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el tetragrámaton; por la terminología del proyecto, se mantiene el nombre propio de Dios como «Yahvé» y no se lo reemplaza por una convención de máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de חֲכַם לֵב en contexto artesanal
  english_pob_reading: skillful person
  chosen_spanish_reading: sabio de corazón
  alternative_spanish_readings:
  - persona hábil
  - persona experta
  - sabio
  rationale: La POB inglesa documenta la tensión entre la literalidad idiomática («wise of heart») y el sentido funcional de destreza. En español se preserva la metáfora de «corazón» para no borrar el rasgo semítico del giro, dejando que el contexto tabernacular indique la habilidad práctica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Valor distributivo del singular hebreo
  english_pob_reading: everyone who is skillful among you
  chosen_spanish_reading: todo sabio de corazón entre ustedes
  alternative_spanish_readings:
  - cada sabio de corazón entre ustedes
  - cualquiera que sea sabio de corazón entre ustedes
  rationale: El hebreo usa un singular masculino con fuerza distributiva. El español «todo sabio» mantiene esa estructura sin perder el alcance colectivo, y evita una expansión interpretativa innecesaria.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete hebreo y el audit trail inglés: conserva el idiomático «sabio de corazón», refleja el valor distributivo del singular y mantiene el nombre divino «Yahvé» conforme a la terminología del proyecto. La principal diferencia frente a la revisión inglesa reciente es que el español conserva el giro semítico en el texto base mientras explica su sentido en nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «entre ustedes» por naturalidad y claridad comunitaria.
  - El singular distributivo se mantuvo en «todo sabio de corazón» para reflejar la forma hebrea.
  - La nota a explica la metáfora sin reemplazarla en el cuerpo del texto.
