  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Espíritu» respeta el valor de רוּחַ; «necios» corresponde bien a כְּסִילִים en literatura sapiencial; «enojo» y «reposa» siguen las decisiones léxicas documentadas sin introducir aplanamientos innecesarios.
