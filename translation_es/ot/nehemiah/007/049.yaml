translation:
  language: es
  text: los hijos de Hanan[a], los hijos de Giddel, los hijos de Gahar—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de» para cada repetición de «hijos de»; la fórmula genealógica hebrea puede designar un clan o linaje familiar, no solo hijos varones inmediatos.
