translation:
  language: es
  text: Tus hombres caerán a espada, y tus valientes[a] en batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus héroes» o «tus guerreros» en lugar de «tus valientes»; el hebreo גְּבוּרָה designa fuerza o valentía y, por metonimia, a quienes la poseen.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְתַיִךְ
  english_pob_choice: your men
  chosen_spanish: tus hombres
  alternatives_spanish:
  - tus varones
  - tus muertos
  lexicon: HALOT
  rationale: El sustantivo (lemma 4962) puede denotar hombres/personas en uso poético, no cadáveres en este contexto; el POB inglés descartó 'your dead' por ser prematuro dado que el verbo siguiente narra precisamente su caída. 'Tus hombres' es el equivalente español más natural y directo para la población masculina de la ciudad personificada como Sión. 'Tus varones' enfatizaría el género de forma más marcada de lo que requiere el hebreo; 'tus muertos' se rechaza por las mismas razones que el POB inglés.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: HALOT
  rationale: La preposición bet instrumental más חֶרֶב expresa el medio de muerte en combate. En español bíblico el giro idiomático consagrado para נָפַל + בַּחֶרֶב es 'caer a espada', más conciso y natural que 'por la espada' y más idiomático que 'con la espada'. Preserva la fuerza marcial sin perífrasis.
- source_word: יִפֹּלוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - han de caer
  - habrán de caer
  lexicon: HALOT
  rationale: Imperfecto Qal 3mp de נָפַל en contexto profético con valor de futuro. 'Caerán' es el futuro simple español que reproduce con exactitud el aspecto y la fuerza profética del imperfecto hebreo. 'Han de caer' añadiría un matiz de inevitabilidad que va más allá de lo que el texto hebreo requiere explícitamente.
- source_word: וּגְבוּרָתֵךְ
  english_pob_choice: your mighty men
  chosen_spanish: tus valientes
  alternatives_spanish:
  - tus guerreros
  - tus héroes
  - tu poderío
  lexicon: HALOT
  rationale: גְּבוּרָה (lemma 1369) denota fuerza/valentía y con frecuencia designa, por metonimia, a los hombres que poseen esa cualidad. En paralelismo con 'tus hombres' y seguido de 'en batalla', la lectura metonímica personal es la más convincente, tal como documenta el POB inglés. La revisión de 'mighty ones' a 'mighty men' confirma el referente personal. 'Tus valientes' preserva el vínculo léxico con el valor/fuerza y designa naturalmente a personas; 'tus guerreros' especificaría demasiado la función militar; 'tu poderío' mantendría el abstracto y perdería el referente humano que el contexto exige.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - en la guerra
  - en combate
  lexicon: HALOT
  rationale: מִלְחָמָה (lemma 4421) significa 'guerra/batalla'. 'En batalla' es paralelo exacto de 'a espada' en el primer hemistiquio y es la construcción española estándar en este tipo de parallelismus membrorum bélico. 'En la guerra' amplía innecesariamente el alcance; 'en combate' es viable pero menos idiomático en el registro bíblico español.
theological_decisions:
- issue: Sufijos de segunda persona femenina singular que dirigen la palabra a Sión personificada
  english_pob_reading: The verse addresses personified Zion/Jerusalem as 'you/your.'
  chosen_spanish_reading: El posesivo 'tus' en 'tus hombres' y 'tus valientes' preserva el discurso directo a la ciudad personificada sin añadir una etiqueta interpretativa explícita en el texto.
  alternative_spanish_readings:
  - Añadir una aposición como 'tus hombres, oh Sión' para aclarar el destinatario femenino
  rationale: El hebreo usa sufijos 2fs (ךְ) que apuntan a Sión/Jerusalén como ciudad personificada en género femenino, patrón constante en el contexto de Isaías 3. En español, 'tus' es invariable en número respecto al género del poseedor, de modo que la personificación femenina queda preservada implícitamente sin necesidad de glosarla en el texto de publicación, en coherencia con la decisión del POB inglés de no insertar etiquetas interpretativas en el verso mismo.
  doctrine_reference: 'Contexto inmediato: Isaías 3:16ss. dirigido a las hijas de Sión; la ciudad como figura femenina es convención profética constante.'
translation_notes:
  revision_awareness: 'El POB inglés sufrió una revisión el 23 de abril de 2026 que cambió ''your mighty ones'' por ''your mighty men'' con el fin de lograr una correspondencia léxica más precisa y un inglés más formal. La decisión española de ''tus valientes'' recoge el espíritu de esa revisión: identifica personas (los guerreros valerosos de la ciudad) antes que una cualidad abstracta, y mantiene el vínculo léxico con el campo semántico de valor/fuerza que exige גְּבוּרָה.'
  spanish_consistency_notes:
  - No aparece el nombre divino (יהוה) en este versículo; el valor predeterminado 'Yahvé' no es aplicable.
  - '''Tus valientes'' sigue el principio del proyecto de fidelidad semántica a la fuente por encima de fraseos eclesiásticos tradicionales (''tus poderosos'', ''tus hombres de guerra'').'
  - El giro idiomático 'caer a espada' es la expresión bíblica española establecida para נָפַל בַּחֶרֶב y no constituye un calco forzado.
  - La elisión del verbo en el segundo hemistiquio ('y tus valientes en batalla', sin repetir 'caerán') reproduce con fidelidad el paralelismo elíptico del hebreo, que es natural también en español poético.
