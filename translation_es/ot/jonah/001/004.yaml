translation:
  language: es
  text: Pero Yahvé[a] lanzó un gran viento sobre el mar, y hubo una gran tormenta en el mar[b], de modo que la nave parecía a punto de quebrarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé lanzó un gran viento sobre el mar». El hebreo waw puede traducirse simplemente como «y»; se eligió «Pero» para reflejar el contraste narrativo después de la huida de Jonás.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «la nave pensaba ser quebrada». Se trata de una personificación hebrea: la nave parecía estar a punto de partirse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: But the LORD
  chosen_spanish: Pero Yahvé
  alternatives_spanish:
  - Yahvé
  - Y entonces Yahvé
  lexicon: HALOT
  rationale: El hebreo lleva la conjunción waw con un matiz narrativo que, en contexto, marca contraste tras la huida de Jonás; por eso se conserva con «Pero». El nombre divino se vierte como «Yahvé» según el criterio de la POB en español, en lugar de ocultarlo como «SEÑOR».
- source_word: הֵטִיל
  english_pob_choice: hurled
  chosen_spanish: lanzó
  alternatives_spanish:
  - arrojó
  - tiró
  lexicon: HALOT
  rationale: El verbo expresa una acción enérgica de arrojar/castigar. «Lanzó» mantiene fuerza y naturalidad en español; «arrojó» también es posible, pero suena algo más marcado y menos fluido aquí.
- source_word: רוּחַ גְּדוֹלָה
  english_pob_choice: a great wind
  chosen_spanish: un gran viento
  alternatives_spanish:
  - un viento poderoso
  - un viento fuerte
  lexicon: HALOT
  rationale: En el contexto marítimo, רוּחַ significa «viento», no «espíritu». «Grande» se conserva como «gran» para reflejar el repetido calificativo hebreo y mantener la correspondencia léxica.
- source_word: אֶל הַיָּם
  english_pob_choice: onto the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - hacia el mar
  - encima del mar
  lexicon: HALOT
  rationale: La preposición apunta al mar como destino de la acción. «Sobre el mar» es natural en español y preserva el sentido direccional sin sonar forzado.
- source_word: וַיְהִי סַעַר גָּדוֹל
  english_pob_choice: and there was a great storm
  chosen_spanish: y hubo una gran tormenta
  alternatives_spanish:
  - y se levantó una gran tempestad
  - y ocurrió una gran tormenta
  lexicon: HALOT
  rationale: וַיְהִי introduce el resultado; «hubo» es la forma más idiomática en español. סַעַר designa una tormenta violenta; «tormenta» es claro y «gran» conserva la repetición del adjetivo.
- source_word: בַּיָּם
  english_pob_choice: on the sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - sobre el mar
  - en alta mar
  lexicon: HALOT
  rationale: La frase ubica la tormenta en la esfera del mar. «En el mar» es la opción más natural en español y evita una literalidad innecesaria.
- source_word: וְהָאֳנִיָּה
  english_pob_choice: so that the ship
  chosen_spanish: de modo que la nave
  alternatives_spanish:
  - y la nave
  - de modo que el barco
  lexicon: HALOT
  rationale: El giro en contexto expresa consecuencia, no simple coordinación. «Nave» funciona bien en registro bíblico y literario; «barco» también es válido, pero menos elevado.
- source_word: חִשְּׁבָה
  english_pob_choice: seemed
  chosen_spanish: parecía
  alternatives_spanish:
  - pensaba
  - era considerada
  lexicon: HALOT
  rationale: 'El verbo, aplicado a un sujeto inanimado, personifica la nave: «parecía» transmite la idea de que estaba a punto de suceder sin forzar el sentido literal de «pensó».'
- source_word: לְהִשָּׁבֵר
  english_pob_choice: about to be broken up
  chosen_spanish: a punto de quebrarse
  alternatives_spanish:
  - a punto de romperse
  - a punto de deshacerse
  lexicon: HALOT
  rationale: El infinitivo pasivo indica inminencia de ruptura. «Quebrarse» conserva la imagen de fractura de una embarcación y suena adecuado en español bíblico contemporáneo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La POB en español adopta «Yahvé» para el Tetragrámaton, manteniendo visible el nombre propio de pacto sin la convención de ocultarlo tras «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Hebrew personification in the ship clause
  english_pob_reading: Literally, 'the ship thought to be broken.' This is a Hebrew personification meaning the ship seemed likely to break apart.
  chosen_spanish_reading: «la nave parecía a punto de quebrarse»
  alternative_spanish_readings:
  - «la nave pensaba quebrarse»
  - «la nave estaba por romperse»
  rationale: 'Se conserva la personificación implícita sin volverla absurda en español: la idea funcional es que la nave estaba al borde de partirse. «Parecía» reproduce el efecto observado por la traducción auditada.'
  doctrine_reference: 'Principio de equivalencia óptima: mantener la imagen sin oscurecer el sentido'
translation_notes:
  revision_awareness: Se ha cotejado el texto inglés auditado y no se detectan revisiones posteriores aplicadas; por tanto, la redacción española sigue de cerca la decisión estable más reciente, preservando el matiz adversativo de la waw y la personificación del barco.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino de forma consistente con el estándar del proyecto.
  - Se usa «mar» y «nave» con registro bíblico sin introducir tecnicismos innecesarios.
  - Se conserva la repetición de «gran» para reflejar גְּדוֹלָה / גָּדוֹל.
  - La cláusula final se expresa con inminencia («a punto de quebrarse») para respetar לְהִשָּׁבֵר.
