  yaml_path: translation/ot/ezekiel/045/004.yaml
  text: It is a holy portion of the land; it shall be for the priests[a], the ministers of the sanctuary, who draw near to minister to Yahweh. And it shall be for them as a place for houses and as a holy place for the sanctuary.
