  yaml_path: translation/nt/romans/011/002.yaml
  text: God has not rejected his people[a], whom he foreknew. Or do you not know what the Scripture says in the passage about Elijah[c][b], how he appeals to God against Israel?
  footnotes:
  - marker: a
    text: Greek 'in Elijah,' an idiom meaning 'in the passage about Elijah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'how he pleads with God against Israel.'
    reason: lexical_alternative
  - marker: c
    text: '''Foreknew'' could also be rendered ''knew beforehand''; some interpret it more strongly as implying prior choice, but the Greek term itself is left untranslated in that theological tension here.'
    reason: alternative_reading
