review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura participial («sabiendo»), la distinción entre πάθη y πόνοι, y el sentido programático de ὁ εὐσεβὴς λογισμός. Sin embargo, en la cláusula final desplaza el contraste del griego: el texto fuente dice que la razón piadosa es dueña «no solo de los [sufrimientos/padecimientos] de dentro sino también de los dolores de fuera», no «de los dolores internos». Conviene conservar la elipsis griega de τῶν ἔνδοθεν como «lo interior / lo de dentro» o una formulación equivalente, para no mezclar indebidamente πάθη con πόνοι.'
  spanish_quality_summary: El español es legible, pero «debeśpotης -> dueña» suena menos natural para «la razón» en este registro que «señora» o mejor una reformulación verbal como «domina». Dado que el borrador ya optó por una estructura nominal, «es dueña de» es comprensible. El problema principal de calidad y fidelidad está en «dolores internos», que introduce un contenido no expresado por τῶν ἔνδοθεν y debilita la antítesis conceptual del versículo.
  glossary_alignment: No hay conflictos con el glosario mayor del proyecto. «Razón piadosa» es defendible para ὁ εὐσεβὴς λογισμός, aunque «razón reverente» también sería posible; la nota alternativa está bien orientada. «Pasiones» para πάθη y «dolores» para πόνοι mantienen correctamente la distinción léxica documentada en el POB inglés.
  issues:
  - severity: high
    issue: «dolores internos» traduce en exceso τῶν ἔνδοθεν
    rationale: 'El griego contrasta τῶν παθῶν con τῶν ἔνδοθεν ... τῶν ἔξωθεν πόνων. Al añadir «dolores» al miembro interior, el español fusiona categorías que el original mantiene distintas: pasiones internas frente a dolores externos.'
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real
    rationale: La nota dice «O “la razón piadosa”...», repitiendo la lectura principal. Debe presentar una alternativa auténtica, como «la razón devota» o «la razón reverente».
  - severity: low
    issue: «dueña de» es aceptable pero algo menos idiomático en este registro
    rationale: Para δεσπότης, «es dueña de» comunica dominio, pero una formulación como «domina» o «es señora de» podría sonar más natural/literaria. No es necesario forzar cambio si se corrige el problema principal.
  revised_spanish_text: sabiendo que la razón piadosa[a] es dueña de las pasiones[b], y no solo de lo interior, sino también de los dolores externos.
