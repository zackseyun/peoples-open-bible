revisions:
- from: Ahora pues, envía a un hombre en quien tú confíes, y que vaya y vea toda la destrucción que ha causado a nosotros y a la tierra del rey, y que los castigue a ellos y a todos los que los ayudan.
  to: Ahora, pues, envía a un hombre en quien confías, y que vaya y vea toda la destrucción que nos ha hecho a nosotros y a la tierra del rey, y que los castigue, a ellos y a todos los que los ayudan.
  rationale: Se ajusta una construcción poco idiomática ('ha causado a nosotros') a una forma natural y fiel al griego ('nos ha hecho a nosotros'). También se mejora la fluidez con 'en quien confías' y una ligera puntuación para clarificar el objeto del castigo, sin cambiar el sentido del texto fuente.
