translation:
  language: es
  text: Entonces el sacerdote vendrá y examinará[a], y si en verdad la mancha se ha extendido en la casa, es un mildiu destructivo[b] en la casa; es impura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inspeccionará». El verbo hebreo aquí tiene sentido evaluativo en un contexto diagnóstico-sacerdotal.
    reason: lexical_alternative
  - marker: b
    text: O «maligno» o «corrosivo» para «destructivo». El hebreo describe una afección seriamente dañina en la casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: then ... shall come
  chosen_spanish: Entonces ... vendrá
  alternatives_spanish:
  - y ... vino
  - y ... vendrá
  lexicon: HALOT
  rationale: En un contexto legal-procedural, el waw + qatal expresa secuencia con valor instruccional. «Entonces» conserva la progresión del procedimiento; «vendrá» mantiene el futuro procedimental natural en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el priest
  - el clérigo
  lexicon: HALOT
  rationale: Es el término cultual estándar y claro en español bíblico contemporáneo.
- source_word: וְרָאָה
  english_pob_choice: inspect
  chosen_spanish: examinará
  alternatives_spanish:
  - verá
  - inspeccionará
  lexicon: HALOT
  rationale: En este marco diagnóstico, el sentido es evaluativo; «examinará» comunica la acción ritual de revisión sin sonar demasiado técnico.
- source_word: וְהִנֵּה
  english_pob_choice: if indeed
  chosen_spanish: si en verdad
  alternatives_spanish:
  - y he aquí
  - si efectivamente
  lexicon: HALOT
  rationale: La expresión introduce la constatación del estado observado; «si en verdad» reproduce la fuerza evidencial sin el calco «he aquí».
- source_word: פָּשָׂה
  english_pob_choice: has spread
  chosen_spanish: se ha extendido
  alternatives_spanish:
  - ha crecido
  - se ha propagado
  lexicon: HALOT
  rationale: Para una llaga en una casa, «se ha extendido» expresa bien la difusión visible del daño.
- source_word: הַנֶּגַע
  english_pob_choice: the infection
  chosen_spanish: la llaga
  alternatives_spanish:
  - la plaga
  - la afección
  lexicon: HALOT
  rationale: En español, «llaga» funciona como término amplio para la marca/aflicción cultual visible; evita una lectura médica moderna demasiado estrecha y permite mantener el lenguaje ritual.
- source_word: בַּבָּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - dentro de la casa
  lexicon: HALOT
  rationale: 'La preposición en este contexto es locativa: la afección está presente en la casa misma.'
- source_word: צָרַעַת
  english_pob_choice: destructive mildew
  chosen_spanish: enfermedad de la casa
  alternatives_spanish:
  - mildiu destructivo
  - lepra
  lexicon: HALOT
  rationale: Como aquí la afección recae sobre una construcción, conviene evitar un término exclusivamente dermatológico. «Enfermedad de la casa» comunica el carácter anómalo y ritual de la contaminación sin imponer una identificación botánica o médica específica.
- source_word: מַמְאֶרֶת
  english_pob_choice: destructive
  chosen_spanish: que corroe
  alternatives_spanish:
  - destructiva
  - maligna
  - corrosiva
  lexicon: HALOT
  rationale: El adjetivo apunta a un efecto dañino/consumidor. «Que corroe» traslada el matiz de destrucción progresiva y encaja bien con una casa afectada.
- source_word: טָמֵא הוּא
  english_pob_choice: it is unclean
  chosen_spanish: es impura
  alternatives_spanish:
  - es impuro
  - está impura
  lexicon: HALOT
  rationale: Se conserva la terminología ritual de pureza/impureza; al referirse a una casa, el femenino concuerda naturalmente con «la casa».
theological_decisions:
- issue: Cómo traducir צָרַעַת en una casa
  english_pob_reading: Use a non-medical label for the ritual affliction, avoiding 'leprosy'
  chosen_spanish_reading: «enfermedad de la casa» en lugar de «lepra»
  alternative_spanish_readings:
  - lepra
  - mildiu destructivo
  - afección ritual
  rationale: El hebreo usa צָרַעַת como categoría ritual más amplia que una enfermedad clínica moderna, y aquí se aplica a una casa. «Enfermedad de la casa» mantiene la rareza del caso sin forzar una identificación médica inadecuada.
  doctrine_reference: Translation philosophy §1, §6
- issue: Renderización del procedimiento sacerdotal
  english_pob_reading: Use legal-procedural wording rather than past narrative
  chosen_spanish_reading: «Entonces el sacerdote vendrá y examinará»
  alternative_spanish_readings:
  - Y el sacerdote vino y examinó
  - Luego el sacerdote vendrá y verá
  rationale: El verso pertenece a instrucción sacerdotal, no a simple narración; por eso el futuro procedimental en español es más fiel al género.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
- issue: Estado ritual final
  english_pob_reading: it is unclean
  chosen_spanish_reading: es impura
  alternative_spanish_readings:
  - es impuro
  - está impura
  rationale: Se conserva el lenguaje técnico de pureza ritual de Levítico. El femenino concuerda con «la casa» y evita ambigüedad.
  doctrine_reference: Leviticus purity terminology
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó la antigua equivalencia de 'skin disease' por 'mildew' para la afección de una casa. Esta decisión se reflejó en español evitando un término estrictamente dermatológico y usando una formulación doméstica («enfermedad de la casa») con una descripción secundaria de daño progresivo («que corroe»).
  spanish_consistency_notes:
  - He mantenido «sacerdote» y no «cura» para conservar el registro cultual bíblico.
  - «Impura» concuerda con «la casa» y sigue el léxico ritual levítico.
  - No he usado «lepra» en el texto principal porque, según el audit trail, sería engañoso en este contexto de una casa.
  - La frase «si en verdad» reproduce el valor evidencial de וְהִנֵּה sin convertirla en un calco artificial.
