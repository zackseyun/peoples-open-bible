translation:
  language: es
  text: Yo sola[a] rodeé la bóveda del cielo, y caminé en las profundidades de los abismos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el círculo del cielo». El término griego puede denotar una extensión circular o una bóveda curva.
    reason: lexical_alternative
  - marker: b
    text: O «las honduras». El griego tiene una forma plural, que sugiere profundidades insondables.
    reason: lexical_alternative
lexical_decisions:
- source_word: γῦρον οὐρανοῦ
  english_pob_choice: vault of heaven
  chosen_spanish: la bóveda del cielo
  alternatives_spanish:
  - el círculo del cielo
  - la cúpula del cielo
  - el arco del cielo
  lexicon: LSJ
  rationale: γῦρον puede denotar una forma circular o un contorno curvo; en este contexto cosmológico, el POB inglés eligió "vault" para expresar la imagen del cielo como una bóveda. "Bóveda" comunica de forma natural en español esa curvatura abovedada sin perder la fuerza poética del original.
- source_word: ἐκύκλωσα
  english_pob_choice: encircled
  chosen_spanish: rodeé
  alternatives_spanish:
  - circundé
  - encerré
  - di vueltas alrededor de
  lexicon: LSJ
  rationale: El verbo expresa movimiento circular alrededor de algo. En español, "rodeé" conserva la acción circular con fluidez natural; "circundé" es más técnico y menos transparente para lectura bíblica general.
- source_word: μόνη
  english_pob_choice: I alone
  chosen_spanish: Yo sola
  alternatives_spanish:
  - sola
  - yo sola
  - solamente yo
  lexicon: LSJ
  rationale: El adjetivo femenino singular concuerda con la hablante personificada. "Yo sola" mantiene el énfasis de exclusividad que el inglés expresa con "I alone" y evita que se pierda la focalización personal.
- source_word: βάθει
  english_pob_choice: depths
  chosen_spanish: las profundidades
  alternatives_spanish:
  - el fondo
  - la profundidad
  - las honduras
  lexicon: LSJ
  rationale: Aunque βάθει es singular en forma, la construcción idiomática en español pide un sustantivo plural o colectivo. "Las profundidades" refleja bien el ámbito abismal y conserva la solemnidad del griego.
- source_word: ἀβύσσων
  english_pob_choice: abysses
  chosen_spanish: los abismos
  alternatives_spanish:
  - las simas
  - las honduras
  - los abismos
  lexicon: LSJ
  rationale: El plural genitivo sugiere múltiples profundidades insondables. "Abismos" preserva el registro elevado y el plural de manera clara en español; además, encaja naturalmente con "profundidades".
- source_word: περιεπάτησα
  english_pob_choice: walked
  chosen_spanish: caminé
  alternatives_spanish:
  - anduve
  - recorrí
  - paseé
  lexicon: LSJ
  rationale: El verbo literalmente significa "anduve/caminé alrededor". "Caminé" mantiene la imagen concreta y, en español, suena más directo y digno que un calco excesivamente literal.
theological_decisions:
- issue: Habla personificada de Sabiduría en primera persona femenina
  english_pob_reading: Retain first-person feminine-exclusive language as the speech of personified Wisdom without importing later doctrinal identification.
  chosen_spanish_reading: Conservar la primera persona femenina singular como habla de Sabiduría personificada, sin forzar una identificación doctrinal posterior.
  alternative_spanish_readings:
  - interpretarlo directamente como una afirmación sobre una hipóstasis divina
  - neutralizar el género con una forma impersonal
  rationale: Sirácides 24 presenta a la Sabiduría hablando en primera persona. El español debe conservar esa voz femenina y exclusiva para no borrar la estrategia literaria del pasaje ni resolver debates teológicos que el versículo no resuelve por sí mismo.
  doctrine_reference: Preservar la tensión teológica sin cerrarla; lectura literaria de Sabiduría personificada.
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés, incluyendo la decisión revisada de mantener el plural de ἀβύσσων como 'abysses/deeps' y la preferencia por una imagen cosmológica elevada para γῦρον. La versión española conserva esa tensión lexical con 'bóveda' y 'abismos', y ajusta la sintaxis para que la repetición del sujeto se entienda de manera natural en español.
  spanish_consistency_notes:
  - Se mantuvo el género femenino singular de la hablante con 'Yo sola'.
  - Se evitó 'Señor' o un equivalente de ocultamiento para el nombre divino, pues no aparece en este versículo.
  - '''Bóveda'' y ''abismos'' sostienen un registro cósmico elevado coherente con la POB.'
  - Las notas al pie preservan alternativas reales del griego sin sobreexplicar el versículo.
