  glossary_alignment: 'La terminología principal está alineada: אֱלֹהִים se traduce correctamente como «Dios», y no hay conflicto con los defaults del proyecto. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La nota sobre «los cielos» está bien justificada. La única mejora léxica necesaria es «la casa de Dios» para preservar mejor el sintagma definido.'
