base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/085.yaml
  text: Jesus said[1], "Adam came into being from a great power and a great wealth, and he did not become worthy of you. For had he been worthy[2], he would not have tasted death."
  footnotes:
  - marker: '1'
    text: The manuscript contains lacunae at the words for 'worthy' (ⲉ̣[ϥⲙ]ⲡ̣ϣⲁ) and 'he would have tasted' ([ⲛⲉϥⲛⲁϫⲓ] ϯ̣ⲡ̣[ⲉ). The restorations are standard and universally accepted based on context and available space.
    reason: textual_variant
  - marker: '2'
    text: The Coptic ⲛⲉⲩⲁⲝⲓⲟⲥ (ⲛⲉ ⲟⲩⲁⲝⲓⲟⲥ) functions here as the protasis of an unreal condition ('had he been worthy'), paired with the apodosis ⲛⲉϥⲛⲁϫⲓ ϯⲡⲉ ('he would have tasted').
    reason: register_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo[a]: «Adán surgió[b] de un gran poder y de una gran riqueza, y no llegó a ser digno de ustedes. Porque, si hubiera sido digno[c], no habría probado[d] la muerte».'
  philosophy: formal
  footnotes:
  - marker: a
    text: El testimonio copto presenta lagunas en las palabras equivalentes a «digno» y «habría probado»; las restauraciones adoptadas siguen la lectura estándar aceptada por el contexto y el espacio disponible.
    reason: textual_variant
  - marker: b
    text: «Surgió» traduce el valor de origen o aparición de ϣⲱⲡⲉ ⲉⲃⲟⲗ, equivalente a «llegó a existir» o «vino a ser».
    reason: lexical_alternative
  - marker: c
    text: 'La construcción copta expresa aquí una condición irreal: «si hubiera sido digno».'
    reason: theological_note
  - marker: d
    text: La expresión copta ϫⲓ ϯⲡⲉ es idiomática y significa «probar / gustar»; no se trata de una referencia locativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓ︤ⲥ︥ / ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Dijo Jesús
  - Jesús expresó
  lexicon: Coptic verbal formula introducing direct speech
  rationale: La fórmula narrativa introduce un dicho directo; en español, «Jesús dijo» es claro, fiel y de registro adecuado. Mantiene el orden normal sin añadir énfasis interpretativo.
- source_word: ϣⲱⲡⲉ ⲉⲃⲟⲗ
  english_pob_choice: came into being
  chosen_spanish: surgió
  alternatives_spanish:
  - llegó a existir
  - vino a ser
  - apareció
  lexicon: Crum 584a
  rationale: El griego/cóptico equivalente expresa origen o entrada en existencia. «Surgió» conserva el sentido de comenzar a existir sin sonar mecánico en español; evita «nació», que implicaría más concretamente parto o generación.
- source_word: ⲟⲩⲛⲟϭ ⲛⲇⲩⲛⲁⲙⲓⲥ
  english_pob_choice: a great power
  chosen_spanish: un gran poder
  alternatives_spanish:
  - un poder grande
  - un gran poderío
  lexicon: Crum 585; general lexical value of ⲇⲩⲛⲁⲙⲓⲥ as power
  rationale: 'La revisión textual corrige la lectura plural: el artículo indefinido singular hace que sea «un gran poder», no «grandes poderes». «Poder» conserva el valor abstracto y la fuerza del sustantivo.'
- source_word: ⲟⲩⲛⲟϭ ⲛⲙⲛⲧⲣⲙⲙⲁⲟ
  english_pob_choice: a great wealth
  chosen_spanish: una gran riqueza
  alternatives_spanish:
  - unas grandes riquezas
  - gran riqueza
  - una gran abundancia
  lexicon: Crum 295b
  rationale: ⲙⲛⲧⲣⲙⲙⲁⲟ nombra riqueza/estado de ser rico. «Riqueza» refleja bien el abstracto singular y coordina con «un gran poder».
- source_word: ⲙⲡϣⲁ
  english_pob_choice: worthy
  chosen_spanish: digno
  alternatives_spanish:
  - merecedor
  - apto
  lexicon: Crum 208b
  rationale: En español, «digno» es la forma más natural y solemnemente fiel para el valor de «worthy». Mantiene la evaluación moral o de correspondencia implícita en el dicho.
- source_word: ϫⲓ ϯⲡⲉ
  english_pob_choice: tasted
  chosen_spanish: probó
  alternatives_spanish:
  - gustó
  - experimentó
  - saboreó
  lexicon: Crum 421a
  rationale: El idiomatismo copto significa «gustar/probar» en relación con «muerte». «Probó la muerte» preserva la fuerza idiomática clásica en español y evita la redundancia de «experimentó la muerte», aunque esa sea una alternativa válida.
theological_decisions:
- issue: Lectura contrafactual de la condición con ‘worthy’
  english_pob_reading: he did not become worthy; had he been worthy, he would not have tasted death
  chosen_spanish_reading: no llegó a ser digno... si hubiera sido digno, no habría probado la muerte
  alternative_spanish_readings:
  - no era digno... si hubiera sido digno, no habría probado la muerte
  - no resultó digno...
  rationale: El copto usa una forma que expresa una situación contraria a los hechos; «no llegó a ser digno» comunica el proceso/resultado sin borrar la tensión de una condición irreal. La apódosis se mantiene en pasado perfecto compuesto condicional con «habría probado» para reflejar el contrafactual.
  doctrine_reference: Gramática de condición irreal / contrafactual en el Coptic phrasing; sin afirmación doctrinal adicional
- issue: Valor de ‘adán’ como sujeto histórico o arquetípico
  english_pob_reading: Adam
  chosen_spanish_reading: Adán
  alternative_spanish_readings:
  - el Adán
  - el hombre primordial
  rationale: El texto nombra a Adán de forma directa; «Adán» es la forma estándar y fiel. No se añade glosa interpretativa sobre si es personaje histórico o arquetipo, porque el dicho no la explicita.
  doctrine_reference: Antropología bíblica / recepción de Adán como figura representativa
- issue: ‘Death’ como término directo sin suavización
  english_pob_reading: death
  chosen_spanish_reading: la muerte
  alternative_spanish_readings:
  - morir
  - el morir
  rationale: Se conserva el sustantivo concreto «la muerte» porque el idiomatismo «probar la muerte» lo requiere y porque el texto contrasta existencia/valía con muerte, no simplemente el acto de morir.
  doctrine_reference: Semántica del término muerte en dicho sapiencial/gnóstico
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la lectura de «great powers» a «a great power», así como la observación filológica sobre el idiomatismo ϫⲓ ϯⲡⲉ y la forma contrafactual de la apódosis. La redacción española sigue esas correcciones y evita interpretaciones pluralizantes o locativas.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio estándar y «digno» para ⲙⲡϣⲁ.
  - Se prefirió «poder» en singular para reflejar la corrección textual de la revisión.
  - «Riqueza» y «muerte» conservan el paralelismo conceptual del dicho.
  - Las notas preservan la tensión textual sin sobrecargar el texto principal.
