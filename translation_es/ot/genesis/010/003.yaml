review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura hebrea genealógica: «Y los hijos de Gomer» corresponde bien a וּבְנֵי גֹמֶר, y conserva adecuadamente la secuencia de tres nombres. También mantiene la variante textual documentada para רִיפַת en nota. Sin embargo, dos transliteraciones se apartan innecesariamente del rastro auditado del POB y de una forma más reconocible en español: «Askenaz» frente a «Ashkenaz/Ashquenaz», y sobre todo «Togarma» frente a la forma más fiel «Togarmá», que preserva mejor la vocal final acentuada de תֹגַרְמָה y evita una pronunciación llana menos precisa.'
  spanish_quality_summary: El español es legible y natural para una genealogía. «Y los hijos de Gomer» suena bien en contexto bíblico. La nota textual está clara. No obstante, las formas propias «Askenaz» y «Togarma» reducen la fidelidad de transliteración y la reconocibilidad bíblica; «Togarmá» además mejora la pronunciación en español. Conviene un ajuste menor.
  glossary_alignment: 'No hay términos teológicos sensibles del glosario principal en este versículo. La decisión «hijos de» se alinea bien con el uso genealógico del proyecto. En nombres propios, conviene ceñirse más estrechamente a la transliteración auditada: mantener «Rifat» con nota sobre «Difat», y usar una forma de Ashkenaz más cercana al original y al inglés auditado. «Togarmá» es preferible a «Togarma».'
  issues:
  - severity: medium
    issue: «Askenaz» se aparta del nombre auditado «Ashkenaz» sin una justificación fuerte.
    rationale: Aunque una adaptación española es posible, aquí la h elimina una correspondencia reconocible con la tradición bíblica y con el rastro auditado. «Ashquenaz» o «Ashkenaz» conservan mejor la forma del nombre sin afectar la legibilidad.
  - severity: medium
    issue: «Togarma» pierde la acentuación final recomendable de «Togarmá».
    rationale: La forma hebrea תֹגַרְמָה se refleja mejor con acento final en español; «Togarma» induce una pronunciación llana menos fiel. Es un ajuste pequeño pero importante en un nombre propio.
  revised_spanish_text: 'Y los hijos de Gomer: Ashkenaz[a], Rifat y Togarmá.'
  revised_footnotes:
  - marker: a
    text: 1 Crónicas 1:6 tiene «Difat» en lugar de «Rifat».
    reason: textual_variant
  revision_rationale: 'Se mantiene la estructura genealógica y la nota textual del borrador, pero se corrigen dos nombres propios para una transliteración más fiel y reconocible: «Ashkenaz» en lugar de «Askenaz», siguiendo más de cerca el nombre auditado, y «Togarmá» en lugar de «Togarma», para reflejar mejor la pronunciación y forma del hebreo. No se requieren cambios doctrinales ni estructurales.'
