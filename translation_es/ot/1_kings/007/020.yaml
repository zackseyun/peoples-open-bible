translation:
  language: es
  text: Y los capiteles estaban sobre los dos pilares[a], también arriba, frente al abombamiento que estaba junto al enrejado; y las granadas eran doscientas, en hileras alrededor[c][b], sobre el segundo capitel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre el otro capitel». El hebreo «el segundo» puede simplemente distinguir el capitel correspondiente de la segunda columna en esta descripción arquitectónica.
    reason: alternative_reading
  - marker: b
    text: Hebreo literalmente «la barriga», probablemente una referencia a la parte redondeada y abombada del capitel.
    reason: lexical_alternative
  - marker: c
    text: Es decir, el enrejado decorativo unido a los capiteles.
    reason: cultural_note
lexical_decisions:
- source_word: כֹתָרֹת
  english_pob_choice: capitals
  chosen_spanish: capiteles
  alternatives_spanish:
  - capiteles de columna
  - coronas
  lexicon: HALOT
  rationale: En contexto arquitectónico, כֹתָרֹת designa la parte superior ornamental de las columnas. «Capiteles» es el equivalente técnico y claro en español moderno; «coronas» sería demasiado general y podría confundir.
- source_word: עַל שְׁנֵי הָעַמּוּדִים
  english_pob_choice: on the two pillars
  chosen_spanish: sobre los dos pilares
  alternatives_spanish:
  - encima de los dos pilares
  - sobre las dos columnas
  lexicon: HALOT
  rationale: «Sobre» conserva la relación espacial natural en español para un elemento colocado arriba de otro. «Pilares» sigue bien el registro arquitectónico del pasaje.
- source_word: גַּם מִמַּעַל
  english_pob_choice: also above
  chosen_spanish: también arriba
  alternatives_spanish:
  - también encima
  - además arriba
  lexicon: HALOT
  rationale: La partícula aditiva גַּם se expresa con «también», y מִמַּעַל con «arriba» para mantener la indicación vertical sin sobretraducir.
- source_word: מִלְעֻמַּת הַבֶּטֶן
  english_pob_choice: opposite the bulge
  chosen_spanish: frente al abombamiento
  alternatives_spanish:
  - frente a la barriga
  - opuesto al abombamiento
  - frente a la protuberancia
  lexicon: HALOT
  rationale: הַבֶּטֶן literalmente es «vientre/barriga», pero aquí describe una forma arquitectónica. «Abombamiento» preserva la idea de una parte redondeada sin antropomorfismo.
- source_word: אֲשֶׁר לְעֵבֶר שבכה
  english_pob_choice: that was beside the latticework
  chosen_spanish: que estaba junto al enrejado
  alternatives_spanish:
  - que estaba junto al enrejado
  - que estaba al otro lado del enrejado
  - que estaba frente al enrejado
  lexicon: HALOT
  rationale: שְׁבָכָה es un enrejado o labor de red decorativa. «Enrejado» funciona de modo natural en español y mantiene el carácter ornamental. «Junto a» reproduce con cautela la relación espacial incierta del hebreo.
- source_word: הָרִמּוֹנִים
  english_pob_choice: the pomegranates
  chosen_spanish: las granadas
  alternatives_spanish:
  - las granadas ornamentales
  - los granados
  lexicon: HALOT
  rationale: En este pasaje se trata de adornos con forma de granada. En español bíblico y contemporáneo, «granadas» comunica el motivo ornamental sin explicar de más.
- source_word: מָאתַיִם
  english_pob_choice: two hundred
  chosen_spanish: doscientas
  alternatives_spanish:
  - doscientos
  lexicon: HALOT
  rationale: El sustantivo implícito es femenino plural por concordancia con «granadas», por eso se usa «doscientas».
- source_word: טֻרִים
  english_pob_choice: in rows
  chosen_spanish: en hileras
  alternatives_spanish:
  - en filas
  - en cursos
  lexicon: HALOT
  rationale: «Hileras» transmite bien la disposición repetida y ordenada de los adornos; es natural en español y mantiene la idea de arreglo lineal.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en derredor
  lexicon: HALOT
  rationale: Marca la disposición circular de los adornos sin añadir matices innecesarios.
- source_word: עַל הַכֹּתֶרֶת הַשֵּׁנִית
  english_pob_choice: on the second capital
  chosen_spanish: sobre el segundo capitel
  alternatives_spanish:
  - sobre el otro capitel
  - sobre el capitel segundo
  lexicon: HALOT
  rationale: «Segundo» sigue de cerca el hebreo הַשֵּׁנִית. La lectura distributiva «el otro» queda preservada como alternativa posible porque el contexto arquitectónico puede distinguir el par de capiteles.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requerían cambios sustantivos; este borrador mantiene esa estabilidad y conserva la ambigüedad arquitectónica documentada en el aparato inglés.
  spanish_consistency_notes:
  - Se usó «capitel/capiteles» para el término arquitectónico, en coherencia con el valor técnico de כֹתָרֹת.
  - Se evitó «SEÑOR» o vocabulario teológico no pertinente, porque el versículo es descriptivo y arquitectónico.
  - Se mantuvo la ambigüedad de הַשֵּׁנִית mediante nota, sin imponer una identificación demasiado cerrada.
  - «Enrejado» se eligió para שבכה por claridad en español, conservando el sentido ornamental del hebreo.
