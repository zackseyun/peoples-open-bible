translation:
  language: es
  text: Bendigan a Yahvé, sus ángeles, poderosos en fuerza, los que cumplen su palabra[a], obedeciendo la voz de su palabra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que hacen su palabra».'
    reason: lexical_alternative
  - marker: b
    text: 'O más literalmente: «escuchando la voz de su palabra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרֲכוּ
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendigan
  - Bendiguen
  - Alaben
  lexicon: HALOT
  rationale: El imperativo plural se dirige a los ángeles. «Bendigan» conserva el valor de ברך y mantiene el paralelismo del salmo con el llamado a bendecir a Yahvé; «alaben» sería más general y perdería esa especificidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención POB para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en vez de sustituirlo por un título. Esto preserva el nombre personal del pacto.'
- source_word: מַלְאָכָיו
  english_pob_choice: his angels
  chosen_spanish: sus ángeles
  alternatives_spanish:
  - sus ángeles
  - sus mensajeros
  lexicon: HALOT
  rationale: En este contexto poético y celestial, el término alude a seres celestiales, no a mensajeros humanos. «Ángeles» es la equivalencia más natural y precisa en español.
- source_word: גִּבֹּרֵי כֹחַ
  english_pob_choice: mighty in strength
  chosen_spanish: poderosos en fuerza
  alternatives_spanish:
  - poderosos en fuerza
  - fuertes y poderosos
  - héroes de poder
  lexicon: HALOT
  rationale: La frase constructa expresa a los que son poderosos por su fuerza. «Poderosos en fuerza» conserva la relación semántica sin militarizarla ni volverla demasiado literal. «Fuertes y poderosos» suaviza la imagen pero pierde la estructura del hebreo.
- source_word: עֹשֵׂי דְבָרוֹ
  english_pob_choice: who do his word
  chosen_spanish: los que hacen su palabra
  alternatives_spanish:
  - los que hacen su palabra
  - los que cumplen su palabra
  - los que ejecutan su palabra
  lexicon: HALOT
  rationale: «Hacer su palabra» preserva la construcción hebrea y la repetición de דְבָרוֹ. «Cumplen su palabra» explicita el sentido, pero en español puede sugerir principalmente promesa en vez de mandato; «hacen» mantiene mejor la amplitud de דָּבָר.
- source_word: לִשְׁמֹעַ
  english_pob_choice: obeying
  chosen_spanish: obedeciendo
  alternatives_spanish:
  - obedeciendo
  - oyendo
  - escuchando
  lexicon: HALOT
  rationale: En este contexto, שׁמע implica oír con respuesta obediente. «Obedeciendo» expresa el valor funcional del verbo sin perder la conexión con el acto de oír; «oyendo/escuchando» sería más literal, pero menos claro en español sobre la respuesta requerida.
- source_word: בְּקוֹל דְּבָרוֹ
  english_pob_choice: the voice of his word
  chosen_spanish: la voz de su palabra
  alternatives_spanish:
  - la voz de su palabra
  - el sonido de su palabra
  - su voz que expresa su palabra
  lexicon: HALOT
  rationale: Se conserva la imagen auditiva del hebreo. «La voz de su palabra» es un calco semántico aceptable en español bíblico y refleja el original con mayor fidelidad que «el sonido de su palabra», que sería menos natural y diluye la personificación del término.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: La lectura POB distingue el nombre del pacto del título «Señor». En español, «Yahvé» preserva esa decisión doctrinal y de traducción, manteniendo la transparencia del nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de לִשְׁמֹעַ con obediencia angélica
  english_pob_reading: obeying
  chosen_spanish_reading: obedeciendo
  alternative_spanish_readings:
  - oyendo
  - escuchando
  - atendiendo
  rationale: El contexto destaca a los ángeles como ejecutores de la palabra de Dios. Traducir שׁמע como «obedeciendo» conserva el componente de oído-respuesta sin introducir una formulación doctrinal ajena al hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión inglés: la formulación más reciente prefirió «obeying the voice of his word» sobre una redacción más redundante. En español se reflejó esa decisión con «obedeciendo la voz de su palabra», manteniendo la tensión entre el oír y el obedecer. También se preservó la elección doctrinal de traducir יְהוָה como «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para el Tetragrámaton, en coherencia con el proyecto.
  - Se usa «palabra» para דָּבָר, conservando la repetición del hebreo en ambas ocurrencias.
  - «Obedeciendo» se emplea como solución contextual para שׁמע, sin borrar su matiz auditivo, que queda visible en la nota a.
  - La puntuación y el orden buscan ser fluidos en español sin perder el paralelismo poético del original.
