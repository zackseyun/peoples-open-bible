revisions:
- from: Pero Heliodoro estaba ejecutando lo que había sido decidido[a].
  to: Pero Heliodoro estaba llevando a cabo lo que había sido decidido[a].
  rationale: Se cambia 'estaba ejecutando' por 'estaba llevando a cabo' para reflejar mejor ἐπετέλει en español natural y claro, conservando el aspecto imperfectivo y la idea de poner en efecto una decisión previa. Se mantiene en nota la alternativa más literal cercana al inglés auditado.
