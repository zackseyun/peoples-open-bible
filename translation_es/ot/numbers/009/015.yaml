  text: וּ/בְ/יוֹם֙ הָקִ֣ים אֶת הַ/מִּשְׁכָּ֔ן כִּסָּ֤ה הֶֽ/עָנָן֙ אֶת הַ/מִּשְׁכָּ֔ן לְ/אֹ֖הֶל הָ/עֵדֻ֑ת וּ/בָ/עֶ֜רֶב יִהְיֶ֧ה עַֽל הַ/מִּשְׁכָּ֛ן כְּ/מַרְאֵה אֵ֖שׁ עַד בֹּֽקֶר־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/009/015.yaml
  text: Now on the day the tabernacle was set up[a], the cloud covered the tabernacle, the tent of the testimony; and in the evening it was over the tabernacle like the appearance of fire until morning.
  footnotes:
