  - severity: low
    issue: La nota lexical alternativa puede afinarse para corresponder a la nueva redacción.
    rationale: Si el texto principal cambia a 'en posesión', conviene mantener la nota como alternativas de sentido de ירשׁ sin introducir confusión sintáctica.
