review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: mantiene ''tirano'', el contraste entre castigo terrenal y castigo continuo, la imposibilidad enfática de Antíoco y la idea de asimilación a prácticas extranjeras y alejamiento de las tradiciones paternas. Sin embargo, la nota al pie no se alinea bien con el texto griego ni con la formulación española, porque dice que el griego tiene «eternas» en femenino plural sin sustantivo explícito; eso suena gramaticalmente extraño en español y no representa de manera clara la elipsis griega.'
  spanish_quality_summary: El español principal es natural, claro y digno. 'Habitantes de Jerusalén' y 'apartarse de las costumbres de sus padres' son legibles y fieles. La única reparación necesaria es la nota al pie, para que su explicación lingüística sea idiomática y precisa en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Tirano', 'castigado', 'eternamente', 'costumbres extranjeras' y 'costumbres de sus padres' concuerdan con las decisiones auditadas y con un español eclesial moderno y comprensible.
  issues:
  - severity: medium
    issue: La nota al pie sobre ἀϊδίων está formulada de manera poco natural e imprecisa en español.
    rationale: Decir que el griego tiene una expresión elíptica con «eternas» deja un adjetivo femenino plural suelto en español que no explica bien la elipsis del original. Conviene describirla de forma más exacta, por ejemplo como 'una expresión elíptica con “eterno”' o indicando que no se explicita el sustantivo.
  revised_spanish_text: Y el tirano Antíoco también ha sido castigado en la tierra[a], y es castigado eternamente; porque no pudo en absoluto obligar a los habitantes de Jerusalén a adoptar costumbres extranjeras y a apartarse de las costumbres de sus padres,
  revised_footnotes:
  - marker: a
    text: 'O: «es castigado eternamente» o «es castigado con castigos eternos». El griego tiene una expresión elíptica con «eterno» y no explicita el sustantivo.'
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal, porque es fiel y natural. Solo se corrige la nota al pie para expresar la elipsis griega de manera idiomática y precisa en español, sin dejar un adjetivo suelto gramaticalmente confuso.
