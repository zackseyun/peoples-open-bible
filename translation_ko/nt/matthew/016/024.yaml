  text: 'Then Jesus said to his disciples[a], "If anyone wants to come after me, let him deny himself and take up his cross and follow me."'
translation:
  language: ko
  text: '그때에 예수께서 자기 제자들에게 말씀하셨습니다. 「누구든지 나를 따라오려면, 자기 자신을 부인하고 자기 십자가를 지고 나를 따르라.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어는 단수·문법적 남성형으로 대표적 의미. 보다 포괄적으로 「누구든지 나를 따라오려면, 자신을 부인하고 자신의 십자가를 지고 나를 따라야 한다」로도 옮길 수 있다.
