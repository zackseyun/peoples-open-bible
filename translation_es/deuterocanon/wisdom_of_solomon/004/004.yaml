- from: Porque aun si brota por un tiempo en ramas[a], estando inseguro[b] será sacudido por el viento, y por la fuerza de los vientos será arrancado de raíz.
  to: Porque aun si brota por un tiempo en ramas[a], estando sin firmeza[b] será sacudido por el viento, y por la fuerza de los vientos será arrancado de raíz.
