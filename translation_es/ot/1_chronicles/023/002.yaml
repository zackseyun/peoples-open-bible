translation:
  language: es
  text: Y reunió a todos los líderes de Israel[a], a los sacerdotes y a los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los príncipes de Israel», «los oficiales de Israel» o «los jefes de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  english_pob_choice: And he gathered
  chosen_spanish: Y reunió
  alternatives_spanish:
  - Y juntó
  - Y convocó
  - Y congregó
  lexicon: HALOT
  rationale: אסף expresa la acción de reunir o convocar a personas. En español, "reunió" comunica de forma natural la progresión narrativa del waw consecutivo sin perder el sentido de reunir en un solo lugar o bajo una sola convocatoria.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos los
  alternatives_spanish:
  - todo el
  - cada uno de los
  lexicon: HALOT
  rationale: El cuantificador marca totalidad. Con un sustantivo plural en español, "todos los" es la forma más natural y fiel.
- source_word: שָׂרֵי יִשְׂרָאֵל
  english_pob_choice: the leaders of Israel
  chosen_spanish: los líderes de Israel
  alternatives_spanish:
  - los príncipes de Israel
  - los oficiales de Israel
  - los jefes de Israel
  lexicon: HALOT
  rationale: שָׂרִים puede significar príncipes, jefes, oficiales o líderes. En este contexto administrativo, "líderes" evita una lectura monárquica innecesaria de "príncipes" y preserva el rango de autoridad sin sobrerregularlo.
- source_word: וְהַכֹּהֲנִים
  english_pob_choice: and the priests
  chosen_spanish: a los sacerdotes
  alternatives_spanish:
  - y los sacerdotes
  lexicon: HALOT
  rationale: כֹּהֲנִים se refiere de manera directa a los sacerdotes. En español, con el verbo "reunir", el acusativo preposicional "a los" fluye mejor y mantiene la referencia clara.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y a los levitas
  alternatives_spanish:
  - y los levitas
  lexicon: HALOT
  rationale: לְוִיִּם se conserva como designación tribal y cultual estándar. "Levitas" es el equivalente español natural y reconocible, sin necesidad de paraphrasis.
translation_notes:
  revision_awareness: 'El texto hebreo es directo y coincide con el testimonio inglés auditado: un verbo de reunión seguido por tres grupos nominales. No hay variantes textuales relevantes en el paquete suministrado, y la única decisión sensible es el alcance de שָׂרֵי יִשְׂרָאֵל, que en español puede expresarse con varias opciones legítimas.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '"Líderes" evita el sesgo de "príncipes" cuando no hay referencia explícita a hijos reales.'
  - La coordinación con "a los sacerdotes" y "a los levitas" conserva la estructura enumerativa del hebreo sin añadir información interpretativa.
