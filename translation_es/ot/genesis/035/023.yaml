    rationale: 'La nota dice «O...: “el primogénito de Jacob, Rubén”», pero el texto principal ya dice casi eso mismo, solo con el marcador insertado antes de la coma. La nota debe preservar la alternativa formal frente a un texto principal verdaderamente natural en español.'
  revised_spanish_text: 'Los hijos de Lea: Rubén, el primogénito de Jacob[a], Simeón, Leví, Judá, Isacar y Zabulón.'
