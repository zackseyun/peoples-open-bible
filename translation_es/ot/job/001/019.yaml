translation:
  language: es
  text: Y he aquí[a], un gran viento vino del otro lado del desierto, y golpeó las cuatro esquinas de la casa, y cayó sobre los jóvenes, y murieron[b]; y solo yo he escapado para decírtelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un viento poderoso» o «un gran vendaval».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los jóvenes». El término también puede significar «muchachos» o, en algunos contextos, «servidores».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y de pronto
  lexicon: HALOT
  rationale: La partícula introduce el informe con viveza e inmediatez. «He aquí» conserva bien el valor deíctico y el tono elevado del POB en un español natural y publicable.
- source_word: רוּחַ גְּדוֹלָה
  english_pob_choice: a great wind
  chosen_spanish: un gran viento
  alternatives_spanish:
  - un viento poderoso
  - un gran vendaval
  lexicon: HALOT
  rationale: Aquí רוּחַ debe entenderse como viento, no como espíritu ni aliento. «Gran viento» sigue de cerca el paralelismo sustantivo-adjetivo del hebreo sin cargar el sentido más allá de lo que el contexto exige.
- source_word: מֵעֵבֶר הַמִּדְבָּר
  english_pob_choice: from across the wilderness
  chosen_spanish: de más allá del desierto
  alternatives_spanish:
  - del otro lado del desierto
  - desde el otro lado del desierto
  lexicon: HALOT
  rationale: מֵעֵבֶר indica procedencia desde el otro lado o de más allá. «De más allá del desierto» preserva esa dirección sin precisar geografía innecesaria.
- source_word: וַיִּגַּע בְּאַרְבַּע פִּנּוֹת הַבַּיִת
  english_pob_choice: struck the four corners of the house
  chosen_spanish: golpeó las cuatro esquinas de la casa
  alternatives_spanish:
  - tocó las cuatro esquinas de la casa
  - alcanzó las cuatro esquinas de la casa
  lexicon: HALOT
  rationale: נגע puede ser tocar, alcanzar o golpear. Por el efecto destructivo que sigue, «golpeó» transmite mejor la fuerza del evento en español sin abandonar el valor verbal del texto.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el edificio
  lexicon: HALOT
  rationale: «Casa» es el equivalente más directo y natural. No hay razón contextual para generalizar a «edificio».
- source_word: וַיִּפֹּל עַל הַנְּעָרִים
  english_pob_choice: and it fell on the young men
  chosen_spanish: y cayó sobre los jóvenes
  alternatives_spanish:
  - y cayó sobre los muchachos
  - y cayó sobre los sirvientes
  lexicon: HALOT
  rationale: נְעָרִים puede significar jóvenes, muchachos o servidores. Se conserva la referencia masculina y relativamente amplia con «jóvenes», sin imponer «sirvientes», que sería interpretativamente más cargado.
- source_word: הַנְּעָרִים
  english_pob_choice: The term can also mean 'youths' or, in some contexts, 'servants.'
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los servidores
  lexicon: HALOT
  rationale: El término hebreo admite varias posibilidades. En español, «jóvenes» mantiene el rango semántico básico y deja abierta la tensión léxica documentada por el POB.
- source_word: וַיָּמ֑וּתוּ
  english_pob_choice: and they died
  chosen_spanish: y murieron
  alternatives_spanish:
  - y fueron muertos
  lexicon: HALOT
  rationale: Se traduce el verbo מוּת de manera directa. «Murieron» respeta la forma hebrea sin añadir causación explícita que el texto no formula aquí.
- source_word: וָאִמָּלְטָה
  english_pob_choice: and I alone have escaped
  chosen_spanish: y solo yo he escapado
  alternatives_spanish:
  - y yo solo escapé
  - y solo yo escapé
  lexicon: HALOT
  rationale: El verbo expresa escape o libramiento. El perfecto compuesto «he escapado» suena natural en el reporte del mensajero y comunica su estado presente tras el evento.
- source_word: רַק אֲנִי לְבַדִּי
  english_pob_choice: I alone
  chosen_spanish: solo yo
  alternatives_spanish:
  - yo solo
  - únicamente yo
  lexicon: HALOT
  rationale: Se condensan las dos marcas de exclusividad para evitar redundancia artificial en español. «Solo yo» conserva el énfasis enfático del hebreo.
- source_word: לְהַגִּיד לָךְ
  english_pob_choice: to tell you
  chosen_spanish: para darte la noticia
  alternatives_spanish:
  - para informarte
  - para decírtelo
  lexicon: HALOT
  rationale: La finalidad del mensajero no es solo «decir», sino comunicar la noticia del desastre. «Darte la noticia» comunica la función pragmática del infinitivo hebreo con naturalidad en español.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió «behold» por un registro más formal. En español se reflejó esa decisión con «Y he aquí», manteniendo el tono solemne sin perder claridad. También se preservó la estructura causal y narrativa del hebreo: viento, golpe, caída, muerte y escape del mensajero.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en este proyecto, pero en este versículo no aparece el Tetragrámaton.
  - Se mantuvo «jóvenes» para נְעָרִים siguiendo la misma cautela lexical del POB en inglés.
  - «He aquí» se eligió por su formalidad y por su capacidad de reproducir la deixis de וְהִנֵּה sin sonar arcaizante en exceso.
  - «Desierto» traduce הַמִּדְבָּר de manera estándar; no se amplía a «estepa» o «región desierta» porque el contexto no lo exige.
