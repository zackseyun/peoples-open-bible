  glossary_alignment: No hay conflictos con la terminología del proyecto. «Siervo» está justificado contextual y cortesmente para עבד en este entorno real. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas documentadas son coherentes con la política del proyecto.
