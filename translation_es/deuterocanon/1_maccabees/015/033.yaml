translation:
  language: es
  text: 'Simón respondió y le dijo: «No hemos tomado tierra ajena[a], ni nos hemos apoderado de lo que pertenece a otros, sino solo de la herencia de nuestros padres, la cual en otro tiempo fue ocupada injustamente[b] por nuestros enemigos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “tierra de otro”; el griego subraya tierra que pertenece a otros.
    reason: lexical_alternative
  - marker: b
    text: O “arbitrariamente” o “sin debido juicio”; el adverbio griego puede subrayar tanto la injusticia como la falta de procedimiento correcto.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἀποκριθεὶς Σίμων εἶπεν αὐτῷ
  english_pob_choice: And Simon answered and said to him
  chosen_spanish: Y respondiendo Simón, le dijo
  alternatives_spanish:
  - Y Simón respondió y le dijo
  - Simón respondió y dijo a él
  lexicon: LSJ
  rationale: La construcción participial + verbo de decir se vierte con una fórmula natural y solemne en español. Se mantiene el destinatario con pronombre enclítico para conservar el sentido directo del griego.
- source_word: γῆν ἀλλοτρίαν
  english_pob_choice: foreign land
  chosen_spanish: tierra ajena
  alternatives_spanish:
  - tierra extranjera
  - tierra de otros
  lexicon: LSJ
  rationale: ἀλλότριος expresa pertenencia ajena, no necesariamente nacionalidad. 'Tierra ajena' reproduce bien la idea de tierra que no les pertenece, y evita una connotación política más fuerte que el griego no exige.
- source_word: εἴλημμεν
  english_pob_choice: have taken
  chosen_spanish: hemos tomado
  alternatives_spanish:
  - hemos recibido
  - hemos apropiado
  lexicon: LSJ
  rationale: El perfecto de λαμβάνω expresa una acción resultante; 'hemos tomado' conserva la negación de adquisición indebida sin añadir matiz técnico.
- source_word: ἀλλοτρίων
  english_pob_choice: what belongs to others
  chosen_spanish: lo que pertenece a otros
  alternatives_spanish:
  - lo ajeno
  - lo que pertenece a extranjeros
  lexicon: LSJ
  rationale: El genitivo plural es más amplio que 'tierras' y se refiere a bienes o posesiones ajenas. 'Lo que pertenece a otros' sigue de cerca el valor del griego y evita restringirlo solo a territorio.
- source_word: κεκρατήκαμεν
  english_pob_choice: seized
  chosen_spanish: hemos arrebatado
  alternatives_spanish:
  - hemos dominado
  - hemos ocupado
  lexicon: LSJ
  rationale: κρατέω en contexto político-territorial puede implicar dominio o apoderamiento. 'Arrebatado' expresa con fuerza una toma indebida y encaja con la negación de Simón.
- source_word: τῆς κληρονομίας τῶν πατέρων ἡμῶν
  english_pob_choice: the inheritance of our fathers
  chosen_spanish: la herencia de nuestros padres
  alternatives_spanish:
  - la herencia ancestral de nuestros padres
  - el patrimonio de nuestros padres
  lexicon: LSJ
  rationale: κληρονομία denota herencia/patrimonio recibido. Se conserva 'nuestros padres' por fidelidad al plural masculino del griego y por su resonancia histórica.
- source_word: ἀκρίτως
  english_pob_choice: unjustly
  chosen_spanish: sin justo juicio
  alternatives_spanish:
  - injustamente
  - arbitrariamente
  - sin debido juicio
  lexicon: LSJ
  rationale: El adverbio puede expresar falta de juicio correcto o de procedimiento justo. 'Sin justo juicio' preserva esa tensión mejor que una sola etiqueta moral, y deja abierta la dimensión legal del término.
- source_word: ἐν τινι καιρῷ
  english_pob_choice: at one time
  chosen_spanish: en cierto tiempo
  alternatives_spanish:
  - en un tiempo dado
  - en una ocasión
  lexicon: LSJ
  rationale: La expresión es indefinida; 'en cierto tiempo' suena natural en español y conserva la referencia a un período no especificado.
- source_word: κατεκρατήθη
  english_pob_choice: was taken over
  chosen_spanish: fue tomada
  alternatives_spanish:
  - fue ocupada
  - fue sometida
  lexicon: LSJ
  rationale: El pasivo de κατακρατέω indica que algo quedó bajo control o dominio. En español, 'fue tomada' funciona bien con 'tierra' y respeta la idea de ocupación injusta sin sobreexplicar.
theological_decisions:
- issue: Conservar la reivindicación de herencia sin añadir un argumento teológico extra
  english_pob_reading: but only the inheritance of our fathers
  chosen_spanish_reading: sino solo la herencia de nuestros padres
  alternative_spanish_readings:
  - sino únicamente la herencia de nuestros padres
  - sino la herencia ancestral de nuestros padres
  rationale: El griego afirma una reclamación patrimonial, no una expansión interpretativa. 'Solo' reproduce la exclusividad de la respuesta de Simón sin cargar el verso con lenguaje no presente en el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Mantener el matiz legal de ἀκρίτως
  english_pob_reading: which at one time was unjustly taken over by our enemies
  chosen_spanish_reading: fue tomada por nuestros enemigos, en cierto tiempo, sin justo juicio
  alternative_spanish_readings:
  - fue tomada por nuestros enemigos, en un tiempo dado, injustamente
  - fue ocupada por nuestros enemigos, arbitrariamente
  rationale: La respuesta del griego sugiere tanto injusticia como falta de juicio/procedimiento. La formulación elegida preserva esa tensión legal y moral sin reducirla solo a 'injustamente'.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Mantener el valor masculino explícito de πατέρων
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  - nuestros mayores
  rationale: El griego usa un plural masculino específico y no un término neutral general. 'Nuestros padres' es fiel, natural en español bíblico y preserva la filiación histórica del reclamo.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción española sigue el estado revisado más reciente del POB inglés: se prefirió una equivalencia para ἀλλοτρίων más amplia que ''for foreigners'' y una temporalidad indefinida más cercana a ''at one time'' que a ''for a time''. También se conservó la tensión del adverbio ἀκρίτως mediante una nota que admite la lectura de falta de juicio/procedimiento, en línea con el audit trail.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o 'Cristo' porque no aparecen en el versículo.
  - Se mantuvo 'padres' para reflejar el plural masculino del griego y la terminología histórica del POB.
  - La frase 'sin justo juicio' preserva la ambigüedad legal/moral del griego y no la reduce a una sola interpretación.
  - 'El orden de la cláusula final fue ajustado para sonar natural en español, pero conserva los tres elementos del original: agente, tiempo indefinido y falta de juicio.'
