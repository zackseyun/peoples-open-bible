review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: secuencia temporal («Entonces»), sujeto singular representativo («el justo»), comparecencia ante sus agresores y sentido general de vindicación pública. Sin embargo, «se pondrá» no expresa tan bien στήσεται como «estará en pie» o «se mantendrá en pie», y «con gran confianza» atenúa el matiz principal de παρρησία, que en este contexto judicial apunta más a valentía/denuedo que a mera confianza.'
  spanish_quality_summary: 'El texto es comprensible, pero «se pondrá» suena incompleto o poco idiomático sin complemento explícito («de pie»), y la nota al pie contradice el texto principal: ofrece como alternativa exactamente la misma frase ya usada en el cuerpo del versículo. Conviene mejorar naturalidad y coherencia nota-texto.'
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «El justo» es una buena solución para ὁ δίκαιος y preserva el singular masculino representativo conforme a la justificación documentada. El principal ajuste léxico necesario es παρρησία → «valentía»/«denuedo» más que «confianza».
  issues:
  - severity: medium
    issue: «se pondrá» para στήσεται es débil y poco natural en este contexto
    rationale: El verbo griego describe ponerse en pie/comparecer firmemente. En español, «se pondrá» sin «de pie» suena incompleto; «estará en pie» comunica mejor la postura y la escena de vindicación.
  - severity: medium
    issue: «con gran confianza» debilita el sentido de ἐν παρρησίᾳ πολλῇ
    rationale: παρρησία en contexto forense y de confrontación pública se acerca más a «valentía», «denuedo» o «audacia» que a confianza interior. «Con gran valentía» preserva mejor la fuerza del original y del English POB.
  - severity: high
    issue: La nota al pie está mal formulada y no corresponde al texto anclado
    rationale: El texto principal ya dice «delante de los que lo afligieron», pero la nota presenta esa misma redacción como alternativa. La alternativa real documentada por el audit trail es la forma más literal «delante de la faz/rostro de...», explicada como opción lexical.
  revised_spanish_text: Entonces el justo estará en pie con gran valentía delante de los que lo afligieron[a].
