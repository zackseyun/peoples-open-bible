review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no preserva fielmente el primer miembro del griego. πρὸ πυρὸς significa ''antes del fuego'', pero el texto español lo cambió erróneamente a ''Antes del derramamiento de sangre'', confundiendo el referente del primer hemistiquio con αἱμάτων del segundo. El resto del sentido proverbial sí está claro: vapor y humo preceden al fuego, y el habla abusiva precede al derramamiento de sangre.'
  spanish_quality_summary: El español es legible y digno, pero contiene un error grave de sentido en la primera cláusula. Además, la nota al pie incluye el anglicismo 'reviling', impropio en una edición española. 'Injuria' es aceptable, aunque 'abuso verbal' o 'insulto' serían más transparentes; aun así, puede mantenerse con nota aclaratoria.
  glossary_alignment: No hay conflicto con la terminología doctrinal principal del proyecto. La decisión para λοιδορία como 'injuria' es defendible, pero debe explicarse con alternativas españolas solamente. La decisión léxica para πυρὸς está desalineada con la fuente y debe corregirse a 'fuego'.
  issues:
  - severity: high
    issue: El primer miembro traduce πρὸ πυρὸς como 'Antes del derramamiento de sangre'
    rationale: La fuente griega dice literalmente 'antes del fuego', y la imagen comparativa depende de esa referencia. Cambiarla por 'derramamiento de sangre' rompe el paralelismo y altera el proverbio.
  - severity: medium
    issue: La nota al pie usa el término inglés 'reviling'
    rationale: Las notas deben ser plenamente españolas y legibles para el público meta; aquí corresponde 'vituperio', 'injuria', 'insulto' o 'abuso verbal'.
  - severity: low
    issue: '''Injuria'' puede resultar algo menos transparente que ''insulto'' o ''abuso verbal'''
    rationale: No es incorrecto, pero conviene aclararlo en nota porque en algunos contextos hispanos puede sonar más jurídico o literario.
  revised_spanish_text: Antes del fuego vienen el vapor del horno y el humo; así, antes del derramamiento de sangre viene la injuria[a].
  revised_footnotes:
  - marker: a
    text: O «insulto», «vituperio» o «abuso verbal»; el término griego se refiere a habla ofensiva o insultante.
    reason: lexical_alternative
  revision_rationale: Se corrige el error principal de sentido restaurando 'fuego' en el primer miembro para reflejar πρὸ πυρὸς y conservar el paralelismo proverbial de la fuente. Se mantiene 'injuria' como opción digna y fiel para λοιδορία, pero la nota se normaliza al español y ofrece alternativas comprensibles.
