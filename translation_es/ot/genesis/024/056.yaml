- from: 'Pero él les dijo[a]: «No me detengan, porque Yahvé ha hecho prosperar mi camino. Despáchennme para que yo vaya a mi amo».'
  to: 'Pero él les dijo[a]: «No me demoren, porque Yahvé ha hecho prosperar mi camino. Envíenme para que vaya a mi amo».'
  rationale: Se ajusta «No me detengan» a «No me demoren» para reflejar mejor el verbo hebreo de retrasar/retener; se reemplaza la forma incorrecta «Despáchennme» por «Envíenme», que preserva el imperativo de שׁלח con español más claro y natural; se mantiene «Yahvé», la nota sobre «mi camino» y «mi amo» por su buena alineación con la fuente y la política terminológica.
