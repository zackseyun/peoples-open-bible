translation:
  language: es
  text: Así era hermoso por su grandeza, por la longitud de sus ramas, porque su raíz estaba junto a aguas abundantes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchas aguas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְּיִף
  english_pob_choice: it was beautiful
  chosen_spanish: era hermoso
  alternatives_spanish:
  - se hizo hermoso
  - era bello
  lexicon: HALOT
  rationale: El hebreo describe el estado/apariencia del árbol en forma narrativa. En español, «era hermoso» mantiene el valor descriptivo sin volverlo más técnico o arcaico de lo necesario. «Hermoso» funciona bien en este contexto imagístico; «bello» sería posible, pero menos natural aquí.
- source_word: בְּגָדְלוֹ
  english_pob_choice: in its greatness
  chosen_spanish: por su grandeza
  alternatives_spanish:
  - en su grandeza
  - por su tamaño
  lexicon: HALOT
  rationale: El sustantivo גדל expresa grandeza o magnitud. La preposición ב en este contexto se entiende de modo causal/descriptivo. En español, «por su grandeza» comunica mejor la relación de causa que «en su grandeza», que suena menos idiomático aquí.
- source_word: בְּאֹרֶךְ
  english_pob_choice: in the length of
  chosen_spanish: por la longitud de
  alternatives_spanish:
  - en la longitud de
  - por el largo de
  lexicon: HALOT
  rationale: אֹרֶךְ significa longitud. «Longitud» conserva el registro algo más elevado del pasaje y evita reducir el término a un «largo» demasiado coloquial. La repetición de la relación causal con «por» mantiene la lógica del hebreo en español natural.
- source_word: דָּלִיּוֹתָיו
  english_pob_choice: its branches
  chosen_spanish: sus ramas
  alternatives_spanish:
  - sus sarmientos
  - sus boughs
  lexicon: HALOT
  rationale: El término se refiere a ramas colgantes o extendidas. «Ramas» es la opción más clara para el lector español contemporáneo. «Sarmientos» sería demasiado específico y podría sugerir vid; «ramas» conserva el sentido general sin perder la imagen.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón de su belleza y grandeza. «Porque» expresa con claridad la causalidad en español moderno y mantiene la fuerza explicativa del hebreo.
- source_word: הָיָה שָׁרְשׁוֹ אֶל
  english_pob_choice: its root was by
  chosen_spanish: su raíz estaba junto a
  alternatives_spanish:
  - su raíz estaba hacia
  - su raíz llegaba hasta
  lexicon: HALOT
  rationale: La construcción hebrea indica proximidad o relación con el agua. «Junto a» expresa cercanía sin forzar el verbo a una idea de alcance que no está explícita en el texto. «Estaba junto a» conserva la imagen de arraigo cerca de la fuente de sustento.
- source_word: מַיִם רַבִּים
  english_pob_choice: abundant waters
  chosen_spanish: muchas aguas
  alternatives_spanish:
  - aguas abundantes
  - grandes aguas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «aguas רבות/muchas». La POB inglesa opta por «abundant waters» y añade nota para la lectura más literal. En español, «muchas aguas» preserva mejor la forma del original y mantiene la posible resonancia de «muchas aguas» frente a una paráfrasis más interpretativa.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y, al mismo tiempo, toma en cuenta la decisión inglesa de entender בְּגָדְלוֹ y בְּאֹרֶךְ de modo descriptivo/causal. Se conserva la ambigüedad relevante en מַיִם רַבִּים mediante una nota alternativa, aunque en el texto principal se prefirió la forma más literal española.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aparece.
  - Se evita «SEÑOR» o equivalentes porque el versículo no contiene el tetragrámaton.
  - «Hermoso» y «grandeza» conservan un registro digno y poético sin arcaísmo excesivo.
  - La estructura causal con «porque» y «por» busca reflejar el paralelismo del hebreo sin sonar forzada en español.
