revisions:
- from: De oídas te había oído[a], pero ahora mis ojos te han visto.
  to: De oídas[a] había oído de ti, pero ahora mi ojo te ha visto.
  rationale: Se revisa para reflejar con mayor precisión el sentido contextual de שְׁמַעְתִּיךָ como conocimiento acerca de Dios por testimonio indirecto («había oído de ti») y para conservar el singular poético de עֵינִי («mi ojo»), ambos puntos explícitamente sustentados por el rastro auditado en inglés. «De oídas» se mantiene porque comunica bien el valor idiomático de לְשֵׁמַע אֹזֶן en español natural.
