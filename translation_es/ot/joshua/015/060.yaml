translation:
  language: es
  text: 'Quiriat-baal (es decir, Quiriat-jearim), y Rabá: dos ciudades con sus asentamientos[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus aldeas». El término hebreo se refiere a asentamientos dependientes asociados con las ciudades nombradas.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְיַת בַּעַל
  english_pob_choice: Kiriath-baal
  chosen_spanish: Quiriat-baal
  alternatives_spanish:
  - Quiriat Baal
  - Ciudad de Baal
  lexicon: HALOT
  rationale: Es un nombre propio de lugar, por lo que se translitera en español. Mantengo la forma compuesta con guion para reflejar el nombre fijo y evitar convertirlo en una frase común como «Ciudad de Baal».
- source_word: הִיא
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - es
  - o sea
  lexicon: HALOT
  rationale: El pronombre tiene valor epexegético, identificando Quiriat-baal con Quiriat-jearim. «Es decir» comunica naturalmente esa explicación en español sin perder el valor de identificación.
- source_word: קִרְיַת יְעָרִים
  english_pob_choice: Kiriath-jearim
  chosen_spanish: Quiriat-jearim
  alternatives_spanish:
  - Quiriat Jearim
  - Ciudad de bosques
  lexicon: HALOT
  rationale: Es otro nombre propio de lugar, por lo que se translitera. Conservo el guion para el nombre tradicional compuesto y evitar una traducción etimológica no requerida por el contexto.
- source_word: הָרַבָּה
  english_pob_choice: Rabbah
  chosen_spanish: Rabá
  alternatives_spanish:
  - Rabbá
  - la Rabá
  lexicon: HALOT
  rationale: Es un topónimo; en español conviene adaptar la transliteración con acento gráfico para la pronunciación. No conservo el artículo como parte del nombre porque el uso de nombres propios en español normalmente lo omite cuando no es integral.
- source_word: עָרִים שְׁתַּיִם
  english_pob_choice: two cities
  chosen_spanish: dos ciudades
  alternatives_spanish:
  - dos poblados
  - dos villas
  lexicon: HALOT
  rationale: Mantengo «ciudades» como equivalente territorial convencional para עָרִים en listas de herencia y distribución. «Poblados» sería más genérico, pero atenúa la correspondencia con el patrón del texto fuente.
- source_word: חַצְרֵיהֶן
  english_pob_choice: their settlements
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus asentamientos
  - sus villas
  lexicon: HALOT
  rationale: En listas de repartición, חַצְרֵי/חָצֵר alude a dependencias rurales asociadas a una ciudad principal. «Aldeas» es natural en español y cubre el sentido de asentamientos dependientes mejor que una traducción demasiado técnica.
translation_notes:
  revision_awareness: La versión inglesa auditada se mantiene sin cambios; el texto español sigue de cerca la identificación appositiva y la lista territorial, ajustando únicamente la transliteración y la naturalidad sintáctica del español.
  spanish_consistency_notes:
  - Uso «Yahvé» para el nombre divino cuando aparezca, pero este versículo no lo contiene.
  - Conservo transliteraciones de topónimos propios para seguir la práctica POB documentada.
  - «Aldeas» traduce el valor funcional de חַצְרֵיהֶן sin borrar la relación de dependencia con las ciudades principales.
