revisions:
- from: Sin embargo, Yahvé se apegó a tus padres[a], para amarlos, y eligió a su descendencia después de ellos —a ustedes— de entre todos los pueblos, como hasta hoy.
  to: Sin embargo, Yahvé puso su afecto en tus padres[a], para amarlos, y eligió a su descendencia después de ellos—ustedes—de entre todos los pueblos, como sucede hoy.
  rationale: Se ajusta חָשַׁק a «puso su afecto en» para reflejar mejor la decisión léxica auditada y un español más natural y digno. Se cambia «como hasta hoy» por «como sucede hoy» para expresar con más precisión el valor de כַּיּוֹם הַזֶּה. También se pule el inciso aposicional para mayor naturalidad tipográfica y sintáctica en español.
  reviewer_model: gpt-5.4
