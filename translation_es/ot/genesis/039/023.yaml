base_translation:
  language: en
  yaml_path: translation/ot/genesis/039/023.yaml
  text: The chief of the prison paid attention to nothing that was in his hand[a], because Yahweh was with him; and whatever he did[c][b], Yahweh made prosper.
  footnotes:
