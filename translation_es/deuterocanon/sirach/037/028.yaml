translation:
  language: es
  text: Hay un sabio que es sabio para su pueblo[a]; el fruto de su conocimiento está en sus cuerpos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado en Kahana para este versículo es difícil y no coincide de cerca con el griego: literalmente, «Y hay un sabio que será sabio para su pueblo; el fruto de su conocimiento está en sus cuerpos». Por esta divergencia textual, la traducción conserva aquí la lectura hebrea y deja constancia de la diferencia con el testimonio griego.'
    reason: textual_variant
lexical_decisions:
- source_word: וְיֵשׁ
  english_pob_choice: And there is
  chosen_spanish: Y hay
  alternatives_spanish:
  - Y existe
  - Y hay allí
  lexicon: HALOT
  rationale: La fórmula hebrea de existencia se vierte con un español natural y sobrio. 'Y hay' conserva el valor presentativo sin forzar una construcción más pesada.
- source_word: חָכָם
  english_pob_choice: wise man
  chosen_spanish: sabio
  alternatives_spanish:
  - hombre sabio
  - persona sabia
  lexicon: HALOT
  rationale: '''Sabio'' reproduce el sustantivo/adjetivo sustantivado de forma fluida en español y mantiene la repetición del término en el verso.'
- source_word: לְעַמּוֹ
  english_pob_choice: for his people
  chosen_spanish: para su pueblo
  alternatives_spanish:
  - para su gente
  - en favor de su pueblo
  lexicon: HALOT
  rationale: La preposición לְ en este contexto expresa relación y beneficio; 'para su pueblo' conserva esa orientación sin sobreinterpretar el matiz.
- source_word: יֶחְכָּם
  english_pob_choice: will be wise
  chosen_spanish: es sabio
  alternatives_spanish:
  - se hará sabio
  - será sabio
  lexicon: HALOT
  rationale: El imperfecto hebreo admite valor habitual o prospectivo. En español, el presente gnómico comunica mejor la idea proverbial y mantiene la fuerza sentenciosa.
- source_word: פְּרִי דַעְתּוֹ
  english_pob_choice: the fruit of his knowledge
  chosen_spanish: el fruto de su conocimiento
  alternatives_spanish:
  - el fruto de su saber
  - el resultado de su conocimiento
  lexicon: HALOT
  rationale: '''Fruto'' conserva la metáfora original y ''conocimiento'' sigue de cerca דַּעַת. No se expande a una paráfrasis más interpretativa.'
- source_word: בִּגְוִיָתָם
  english_pob_choice: in their body
  chosen_spanish: en su cuerpo
  alternatives_spanish:
  - en sus cuerpos
  - en su organismo
  lexicon: HALOT
  rationale: Aunque el hebreo puede sugerir plural, el sentido corporal se expresa con una forma natural en español. Se evita cargar el texto con una nota antropológica que el verso no explicita.
theological_decisions:
- issue: Relación entre el hebreo transmitido y el paralelo griego
  english_pob_reading: The extant Cairo Geniza Hebrew for this verse is difficult and does not closely match the Greek; the Greek provides the coherent base text in the earlier audit, but the latest revision restored the Hebrew reading.
  chosen_spanish_reading: Se traduce el hebreo transmitido, con una nota que reconoce la dificultad textual y la divergencia con el griego.
  alternative_spanish_readings:
  - 'Una traducción basada en el griego: ''Porque no todo es útil para todos, y no toda persona se deleita en todo.'''
  rationale: El expediente pide un borrador español fuente-consciente; dado que la revisión más reciente revirtió al hebreo, conviene reflejar esa forma textual y conservar la tensión documentada en nota. Así no se borra la variante atestiguada.
  doctrine_reference: Crítica textual; Sirach textual tradition
- issue: Singular vs. plural en בִּגְוִיָתָם
  english_pob_reading: their body
  chosen_spanish_reading: su cuerpo
  alternative_spanish_readings:
  - sus cuerpos
  - su cuerpo(s)
  rationale: El plural hebreo puede funcionar distributivamente o colectivamente. En español, el singular colectivo es idiomático y mantiene la ambigüedad sin forzar una lectura médica o filosófica.
  doctrine_reference: Antropología bíblica
translation_notes:
  revision_awareness: 'La revisión más reciente del expediente revirtió un intento de traducir desde el griego y restauró la lectura hebrea transmitida: ''hay un sabio... el fruto de su conocimiento...''. Por eso el español sigue ahora el hebreo de Kahana, pero sin ocultar en nota la discrepancia con el paralelo griego.'
  spanish_consistency_notes:
  - Se mantiene la repetición de 'sabio' para reflejar el paralelismo del hebreo.
  - '''Conocimiento'' se usa para דַּעַת en vez de ''sabiduría'' para no borrar la diferencia léxica con חָכָם.'
  - '''Su pueblo'' y ''su cuerpo'' conservan la referencia posesiva del hebreo sin añadir especificaciones no presentes en el texto.'
