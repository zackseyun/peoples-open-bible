    issue: «tiña» para הַנֶּתֶק es demasiado específico
    rationale: El expediente inglés rechazó equivalentes potencialmente engañosos y prefirió una descripción moderna y amplia («scaly eruption»). «Tiña» en español suena a diagnóstico médico concreto y puede reducir indebidamente el alcance del hebreo.
  - severity: low
    issue: «a su juicio» intensifica subjetividad frente a «בְּעֵינָיו»
    rationale: La expresión hebrea señala la observación del examinador en el proceso de inspección. «A su juicio» puede leerse como opinión personal; «a su vista» o «a sus ojos» mantiene mejor el marco visual/forense.
  - severity: low
    issue: «se ha mantenido sin cambio» es algo pesado
    rationale: Aunque fiel, suena menos natural en español que «ha permanecido igual» o «ha permanecido sin cambio» en un contexto descriptivo.
