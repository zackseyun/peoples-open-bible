    text: 'The Hebrew phrase rendered “Away, away!” is terse and idiomatic; it conveys a repeated cry of dismissal or rebuke. The Greek parallel expands the sense: when the lowly fail, people reproach them.'
    reason: lexical_alternative
  - marker: b
    text: Or “he is given no hearing.” Literally, “there is no place for him,” meaning his insightful words receive no social room or acceptance.
