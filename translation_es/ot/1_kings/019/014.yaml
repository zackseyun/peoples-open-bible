review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés en casi todos los segmentos: conserva Yahvé, refleja la intensificación de קַנֹּא קִנֵּאתִי, mantiene el título divino, el lenguaje de pacto, la destrucción de altares, la muerte de los profetas, la soledad de Elías y el modismo de buscar su vida. Sin embargo, la nota [b] no preserva la alternativa documentada en el POB inglés para בְּנֵי יִשְׂרָאֵל, y en cambio comenta otro modismo ya suficientemente claro en español.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos detalles mejorables: «para Yahvé» suena menos natural que «por Yahvé» con «celoso» en este contexto, y «Yo solo he quedado» puede suavizarse a «solo yo he quedado» para una lectura más idiomática y enfática. La puntuación y el registro general son buenos.'
  glossary_alignment: 'Alineación fuerte con la terminología del proyecto: יהוה -> «Yahvé» correctamente; אֱלֹהֵי צְבָאוֹת -> «el Dios de los ejércitos» aceptable; בְּנֵי יִשְׂרָאֵל -> «los hijos de Israel» preservado; נַפְשִׁי -> «mi vida» correctamente idiomático. La única desalineación relevante es de aparato: la nota al pie debe ir en «hijos de Israel» para reflejar la alternativa inglesa preservada.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada en «mi vida» en vez de en «hijos de Israel».
    rationale: El POB inglés conserva una nota léxica sobre בְּנֵי יִשְׂרָאֵל («the sons of Israel» / «the Israelites»). El español debe preservar esa alternativa o una nota equivalente; la nota actual introduce una explicación distinta sobre «buscar mi vida», que no corresponde al aparato auditado.
  - severity: low
    issue: «Muy celoso para Yahvé» es comprensible pero menos natural que «muy celoso por Yahvé».
    rationale: Con «celoso» en español, la preposición «por» comunica mejor el objeto/dirección del celo sin alterar el sentido de לַיהוָה.
  - severity: low
    issue: La formulación «Yo solo he quedado» puede sonar algo rígida.
    rationale: «Solo yo he quedado» conserva mejor el énfasis de אני לבדי en español natural y ampliamente legible.
  - severity: low
    issue: Algunas alternativas en las decisiones léxicas contienen inglés incrustado o formas poco apropiadas («zealous», «forsaken»).
    rationale: No afecta directamente el texto bíblico, pero muestra descuido editorial en el aparato y convendría normalizarlo en pasos posteriores.
