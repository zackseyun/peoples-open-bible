  to: entonces oye[a] desde el cielo y perdona el pecado de tus siervos y de tu pueblo Israel, cuando les enseñes el buen camino por el que deben andar, y envía lluvia sobre tu tierra, que has dado a tu pueblo como herencia.
  rationale: Se ajustó el texto para reflejar una petición oracional en español («oye... perdona... envía») en vez de una simple predicción futura. También se cambió «desde los cielos» a «desde el cielo» en el texto principal por naturalidad, preservando la alternativa literal en la nota. Se suavizó «en que han de andar» a «por el que deben andar» para mejorar la fluidez sin cambiar el sentido.
