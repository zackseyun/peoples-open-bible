id: PSA.2.3
reference: Psalms 2:3
source:
  edition: WLC
  text: נְֽ֭נַתְּקָה אֶת מֽוֹסְרוֹתֵ֑י/מוֹ וְ/נַשְׁלִ֖יכָה מִמֶּ֣/נּוּ עֲבֹתֵֽי/מוֹ־׃
translation:
  text: Let us tear off their chains and cast their ropes from us[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their bonds' for 'their chains.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their cords' for 'their ropes.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and throw away their ropes from us'.
    reason: previous_rendering
lexical_decisions:
- source_word: נְנַתְּקָה
  chosen: Let us tear off
  alternatives:
  - Let us break apart
  - Let us burst
  lexicon: HALOT
  rationale: First person plural cohortative expressing resolve or exhortation. The verb denotes pulling apart or snapping loose. 'Tear off' is vivid, natural English and fits the image of rejecting restraint.
- source_word: מֹוסְרוֹתֵימוֹ
  chosen: their chains
  alternatives:
  - their bonds
  - their fetters
  lexicon: HALOT
  rationale: Plural noun for restraints or bonds. 'Chains' communicates concrete restraint in readable modern English, while preserving the metaphor of imposed limitation.
- source_word: וְנַשְׁלִיכָה
  chosen: and throw away
  alternatives:
  - and cast away
  - and fling away
  lexicon: HALOT
  rationale: Another first person plural cohortative. 'Throw away' is idiomatic modern English; 'cast away' is more traditional but less contemporary.
- source_word: מִמֶּנּוּ
  chosen: from us
  alternatives:
  - away from us
  lexicon: HALOT
  rationale: The preposition plus first person plural suffix indicates removal from the speakers themselves. 'From us' keeps the syntax clear and preserves the rebels' perspective.
- source_word: עֲבֹתֵימוֹ
  chosen: their ropes
  alternatives:
  - their cords
  - their thick cords
  lexicon: HALOT
  rationale: The noun refers to cords, ropes, or bands. 'Ropes' is more immediately intelligible to modern readers than 'cords,' while still fitting the parallel image with 'chains'.
