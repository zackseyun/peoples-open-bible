translation:
  language: es
  text: De día encuentran tinieblas[a], y al mediodía andan a tientas como de noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como de noche» o «como si fuera de noche». El hebreo usa un prefijo comparativo en «noche», indicando que andan a tientas al mediodía como si fuera de noche.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹמָם
  english_pob_choice: By day
  chosen_spanish: De día
  alternatives_spanish:
  - En el día
  - Durante el día
  lexicon: HALOT
  rationale: El hebreo usa un adverbio temporal; «De día» es breve, natural y conserva el contraste con «de noche» implícito en la línea.
- source_word: יְפַגְּשׁוּ
  english_pob_choice: they meet
  chosen_spanish: encuentran
  alternatives_spanish:
  - se topan con
  - se encuentran con
  lexicon: HALOT
  rationale: El verbo puede expresar un encuentro o choque inesperado. «Encuentran» mantiene la idea de toparse con algo real y adverso sin forzar un matiz excesivamente literal.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - noche
  lexicon: HALOT
  rationale: «Tinieblas» reproduce bien el campo semántico de oscuridad/densa falta de luz y suena más fuerte en español poético que «oscuridad».
- source_word: וְכַלַּיְלָה
  english_pob_choice: as in the night
  chosen_spanish: como de noche
  alternatives_spanish:
  - como en la noche
  - como si fuera de noche
  lexicon: HALOT
  rationale: La preposición comparativa hebrea pide un comparativo explícito. «Como de noche» es idiomático y conserva la comparación sin añadir explicación excesiva.
- source_word: יְמַשְׁשׁוּ
  english_pob_choice: they grope
  chosen_spanish: andan a tientas
  alternatives_spanish:
  - palpan
  - tantean
  lexicon: HALOT
  rationale: El verbo comunica buscar el camino por tacto, especialmente en oscuridad. «Andan a tientas» es la expresión española más natural y fiel a la imagen.
- source_word: בַצָּהֳרָיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a mediodía
  - al mediodía
  lexicon: HALOT
  rationale: «Al mediodía» conserva la hora exacta y el contraste irónico con la oscuridad; es la forma más normal en español.
translation_notes:
  revision_awareness: El texto coincide con el sentido del hebreo y con el audit trail inglés; no se requieren revisiones adicionales. Se conserva la comparación explícita del hebreo y el contraste temporal entre día, noche y mediodía.
  spanish_consistency_notes:
  - Se mantiene un español bíblico moderno y digno, evitando calcos innecesarios.
  - «Tinieblas» y «andar a tientas» preservan la fuerza poética sin suavizar la imagen.
  - La nota aclara la comparación hebrea para no perder la ambigüedad controlada del original.
