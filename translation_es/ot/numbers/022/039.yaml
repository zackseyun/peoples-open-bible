translation:
  language: es
  text: Así, Balaam fue con Balac, y llegaron a Quiriat-husot[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Quiriat-husot» probablemente significa «ciudad de las calles» o «ciudad de los espacios abiertos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - viajó
  lexicon: HALOT
  rationale: El wayyiqtol de הלך avanza la narración con el sentido simple de movimiento. En español, «fue» comunica ese avance de manera natural y fiel, sin sobreespecificar si caminó o viajó.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  lexicon: convención onomástica estándar
  rationale: Nombre propio transliterado, como en la tradición bíblica y en el POB en inglés.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: HALOT
  rationale: La preposición expresa compañía de forma directa; «con» es la correspondencia natural en español.
- source_word: בָּלָק
  english_pob_choice: Balak
  chosen_spanish: Balac
  alternatives_spanish:
  - Balak
  lexicon: convención onomástica bíblica
  rationale: Se adapta al uso español usual de nombres bíblicos, manteniendo la transliteración reconocible. La forma con -c final es la más natural en español para este nombre.
- source_word: וַיָּבֹאוּ
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - arribaron
  lexicon: HALOT
  rationale: El plural wayyiqtol de בוא expresa la siguiente acción narrativa. «Llegaron» conserva la idea de arribo sin añadir matices innecesarios de entrada o destino preciso.
- source_word: קִרְיַת חֻצוֹת
  english_pob_choice: Kiriath-huzoth
  chosen_spanish: Quiriat-huzot
  alternatives_spanish:
  - la ciudad de las calles
  - Ciudad de las calles
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del lugar en transliteración. La forma compuesta del topónimo incluye el valor léxico de קִרְיַת («ciudad de»), pero en el texto principal funciona como nombre propio, por lo que se conserva así.
translation_notes:
  revision_awareness: El texto inglés del POB no muestra revisiones aplicadas en esta unidad; el acuerdo de revisión más reciente indica alta concordancia y sin cambios necesarios. La versión española sigue esa decisión, manteniendo el sentido narrativo simple y la nota léxica del topónimo.
  spanish_consistency_notes:
  - Se mantiene el estilo narrativo breve y sobrio del POB.
  - Los nombres propios se transliteran de forma consistente y adaptada al español.
  - La nota de pie preserva la ambigüedad léxica del topónimo sin desplazar el nombre propio del cuerpo principal.
