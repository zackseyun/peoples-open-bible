revisions:
- from: Yo los haré entrar en el desierto de los pueblos[a][b], y allí entraré en juicio con ustedes cara a cara.
  to: Yo los llevaré al desierto de los pueblos[b], y allí entraré en juicio con ustedes cara a cara[a].
  rationale: Se ajusta el verbo inicial a una formulación más natural en español ('los llevaré') sin perder el sentido de introducirlos en ese lugar. Se corrige la nota léxica para mantener la segunda persona y se ancla cada nota exactamente donde corresponde en el texto revisado.
