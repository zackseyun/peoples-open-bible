review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro inglés: mantiene el énfasis de αὐτὸς con «él mismo», conserva «cayó» para ἔπεσεν, «primero» para πρῶτος, y refleja correctamente la secuencia: al ver la tropa/campamento de Nicanor que él había caído, abandonaron las armas y huyeron. La única reparación necesaria está en la nota léxica, donde «encampamento» es una forma incorrecta en español; además conviene afinar la redacción de la nota para reflejar mejor la alternativa semántica de παρεμβολή.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español. «Su campamento vio» es aceptable como personificación colectiva, y la nota resuelve la posible alternativa «su fuerza». El único problema real de calidad está en la nota al pie: contiene la grafía incorrecta «encampamento» y puede formularse con mejor español.'
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. Las decisiones léxicas están alineadas con el POB inglés. «Campamento» para παρεμβολή es válido, siempre conservando en nota las alternativas «fuerza» y «campamento militar/encampamento».
  issues:
  - severity: medium
    issue: La nota al pie usa «encampamento», forma no estándar en español.
    rationale: Aunque intenta reflejar la alternativa inglesa «encampment», en español correcto debe decirse «campamento» o, si se desea precisar, «campamento militar». La forma actual perjudica la calidad y puede confundir.
  - severity: low
    issue: La nota al pie puede expresarse con mayor naturalidad y precisión.
    rationale: «También puede entenderse como» funciona, pero una formulación como «también puede traducirse» o «también puede entenderse como “su fuerza” o “su campamento militar”» comunica mejor la alternativa léxica de παρεμβολή sin introducir un anglicismo.
  revised_spanish_text: Y él mismo cayó primero en la batalla. Pero cuando su campamento[a] vio que Nicanor había caído, arrojaron sus armas y huyeron.
  revised_footnotes:
  - marker: a
    text: «Campamento» traduce aquí ἡ παρεμβολὴ αὐτοῦ; también puede entenderse como «su fuerza» o «su campamento militar».
    reason: lexical_alternative
  revision_rationale: 'Se aprueba el texto principal con una corrección menor en la nota al pie: se elimina la forma incorrecta «encampamento» y se reemplaza por «campamento militar», que preserva la alternativa léxica documentada por el POB en un español natural y correcto.'
