id: PSA.132.14
reference: Psalms 132:14
source:
  edition: WLC
  text: זֹאת מְנוּחָתִ֥/י עֲדֵי עַ֑ד פֹּֽה אֵ֝שֵׁ֗ב כִּ֣י אִוִּתִֽי/הָ־־־׃
translation:
  text: This is my resting place forever; here I will dwell[a], for I have desired it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have desired it,' taking the feminine suffix as referring to the resting place/location rather than to Zion personified.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This
  alternatives:
  - This place
  lexicon: HALOT
  rationale: Demonstrative feminine singular referring to Zion/the resting place just mentioned. Simple deictic 'This' is natural and sufficiently clear in context.
- source_word: מְנוּחָתִי
  chosen: my resting place
  alternatives:
  - my rest
  - my resting place
  lexicon: HALOT
  rationale: מְנוּחָה denotes rest or resting place. In this locative context, with 'here' following, 'resting place' better captures the concrete sense of a place of settled repose rather than an abstract state.
- source_word: עֲדֵי עַד
  chosen: forever
  alternatives:
  - for ever
  - unto perpetuity
  lexicon: HALOT
  rationale: The idiom means enduring perpetually. 'Forever' is idiomatic modern English and preserves the force of permanence.
- source_word: פֹּה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: Straightforward locative adverb. 'Here' keeps the immediacy of the Hebrew.
- source_word: אֵשֵׁב
  chosen: I will dwell
  alternatives:
  - I will sit
  - I will remain
  lexicon: HALOT
  rationale: Although the verb can literally mean 'sit,' in divine-settlement/Zion contexts it commonly carries the sense of dwelling or enthronement. 'I will dwell' best fits the parallel with 'my resting place' and avoids an overly literal but misleading 'sit'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for God's dwelling in Zion. 'For' is concise and natural in elevated English.
- source_word: אִוִּתִיהָ
  chosen: I have desired her
  alternatives:
  - I have desired it
  - I have chosen her
  - I longed for her
  lexicon: HALOT
  rationale: From אוה/אוה 'to desire, long for.' The 3fs suffix is feminine, most naturally referring to Zion. 'Desired her' preserves both the verbal sense and the feminine pronominal object. 'Chosen' would import a stronger election nuance than the lexeme itself requires.
