  - severity: medium
    issue: '''para el día de la necesidad'' suena poco idiomático en español'
    rationale: Aunque es cercano al griego, en español bíblico-natural resulta más claro 'para un día de necesidad' o 'para el día de necesidad'. La forma con artículo en ambas posiciones se siente más pesada.
