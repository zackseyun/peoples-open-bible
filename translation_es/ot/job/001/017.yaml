translation:
  language: es
  text: 'Mientras éste aún hablaba, llegó otro y dijo: «Los caldeos formaron tres partidas de asalto[a], se lanzaron sobre los camellos y se los llevaron; y a los jóvenes[c] los mataron a filo de espada[b]. Y solo yo he escapado para informarte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hicieron tres divisiones» o «se desplegaron en tres bandas»; literalmente, «pusieron tres cabezas».
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo: literalmente, «por la boca / el filo de la espada», es decir, que los mataron con espada.'
    reason: lexical_alternative
  - marker: c
    text: «Los jóvenes» puede referirse aquí a sirvientes o asistentes del hogar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֣וֹד זֶ֣ה מְדַבֵּ֗ר
  english_pob_choice: While this one was still speaking
  chosen_spanish: Mientras éste aún hablaba
  alternatives_spanish:
  - Mientras él aún hablaba
  - Todavía estaba hablando
  lexicon: HALOT
  rationale: La construcción hebrea expresa acción en curso; «mientras» reproduce la simultaneidad natural en español, y «éste» conserva el anafórico de la cadena narrativa sin perder claridad.
- source_word: וְ/זֶה֮ בָּ֣א וַ/יֹּאמַר֒
  english_pob_choice: another came and said
  chosen_spanish: llegó otro y dijo
  alternatives_spanish:
  - y éste vino y dijo
  - y otro vino y dijo
  lexicon: HALOT
  rationale: En la secuencia de mensajeros, זֶה apunta al siguiente mensajero; «otro» expresa mejor la repetición narrativa en español, y «llegó» comunica el movimiento del hebreo de forma natural.
- source_word: כַּשְׂדִּ֞ים
  english_pob_choice: The Chaldeans
  chosen_spanish: Los caldeos
  alternatives_spanish:
  - Los caldeos
  lexicon: HALOT
  rationale: Se mantiene el etnónimo tradicional y claro en español; el artículo plural concuerda con el grupo que actúa colectivamente.
- source_word: שָׂ֣מוּ שְׁלֹשָׁ֣ה רָאשִׁ֗ים
  english_pob_choice: formed three raiding parties
  chosen_spanish: formaron tres partidas de asalto
  alternatives_spanish:
  - formaron tres divisiones
  - se organizaron en tres bandas
  - hicieron tres grupos
  lexicon: HALOT
  rationale: «Set three heads» es literal, pero en contexto militar/saqueador en español «partidas de asalto» conserva la idea de desprendimiento táctico y el matiz de ataque sin sobreexplicar.
- source_word: וַֽ/יִּפְשְׁט֤וּ עַל
  english_pob_choice: swept down on
  chosen_spanish: se lanzaron sobre
  alternatives_spanish:
  - irrumpieron sobre
  - arremetieron contra
  - cayeron sobre
  lexicon: HALOT
  rationale: פשט על indica irrupción violenta y rápida; «se lanzaron sobre» mantiene el movimiento repentino y el valor agresivo con naturalidad en español.
- source_word: הַ/גְּמַלִּים
  english_pob_choice: the camels
  chosen_spanish: los camellos
  alternatives_spanish:
  - los camellos
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del sustantivo hebreo.
- source_word: וַ/יִּקָּח֔וּ/ם
  english_pob_choice: took them
  chosen_spanish: se los llevaron
  alternatives_spanish:
  - los tomaron
  - los capturaron
  - los arrebatadon
  lexicon: HALOT
  rationale: En contexto de incursión, el verbo implica despojo/secuestro de los camellos; «se los llevaron» naturaliza el resultado de la rapiña sin perder el sentido de apropiación violenta.
- source_word: וְ/אֶת הַ/נְּעָרִ֖ים
  english_pob_choice: the young men
  chosen_spanish: a los jóvenes
  alternatives_spanish:
  - a los muchachos
  - a los sirvientes
  - a los asistentes
  lexicon: HALOT
  rationale: נְעָרִים puede referirse a jóvenes o a sirvientes/attendants. Se mantiene el sentido primario «jóvenes»; la posible referencia social queda abierta, como en el texto fuente.
- source_word: הִכּ֣וּ לְ/פִי חָ֑רֶב
  english_pob_choice: struck down ... with the edge of the sword
  chosen_spanish: los hirieron al filo de la espada
  alternatives_spanish:
  - los mataron con la espada
  - los hirieron por la boca de la espada
  - los atacaron con espada
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal («boca/filo de la espada»). «Al filo de la espada» conserva la imagen idiomática en español y el valor de violencia letal sin desdibujar la expresión original.
- source_word: וָ/אִמָּ֨לְטָ֧/ה רַק אֲנִ֛י לְ/בַדִּ֖/י
  english_pob_choice: And I alone have escaped
  chosen_spanish: Y solo yo he escapado
  alternatives_spanish:
  - Y únicamente yo he escapado
  - Y yo solo he escapado
  - Y solo yo me he librado
  lexicon: HALOT
  rationale: La construcción hebrea enfatiza que el sobreviviente es el único; «solo yo» reproduce esa exclusividad. «He escapado» conserva el valor de escape logrado en el relato del mensajero.
- source_word: לְ/הַגִּ֥יד לָֽ/ךְ
  english_pob_choice: to tell you
  chosen_spanish: para informarte
  alternatives_spanish:
  - para decirte
  - para contarte
  - para reportártelo
  lexicon: HALOT
  rationale: En español, el propósito del mensajero suena más natural como «informarte», que preserva el matiz de comunicación urgente y formal del hebreo sin elevarlo artificialmente.
translation_notes:
  revision_awareness: Se revisó la redacción para mantener la secuencia narrativa de mensajeros, conservar el modismo hebreo de la espada en español natural y dejar abierta la posible ambigüedad de נְעָרִים sin resolverla en exceso. Se evitó una traducción mecánica del inglés mediante elecciones idiomáticas españolas compatibles con el hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma del proyecto para el nombre divino; aquí no era pertinente.
  - Se mantuvo «caldeos» como etnónimo fijo y «camellos» como objeto directo sin añadir especificaciones no presentes en el hebreo.
  - Se conservó la ambigüedad de נְעָרִים con «jóvenes», siguiendo el valor primario del término y la nota contextual del audit trail inglés.
