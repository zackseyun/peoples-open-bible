revisions:
- from: Y cuando murió el juez, ellos volvían atrás y se corrompían más que sus padres, yendo tras otros dioses para servirles y postrarse ante ellos. No cesaron[a] de sus obras ni de su camino duro.
  to: Y cuando murió el juez, volvieron atrás y se corrompieron más que sus padres, yendo tras otros dioses para servirles y postrarse ante ellos. No cesaron[a] de sus obras ni de su camino obstinado.
  rationale: Se corrigió «camino duro» a «camino obstinado» para reflejar fielmente el sentido moral de הַקָּשָׁה y la decisión auditada del POB inglés («stubborn way»). También se ajustaron los verbos a pasado narrativo («volvieron», «se corrompieron») para mejorar la fluidez y la fuerza de recaída en español. Se mantuvo la nota lexical sobre לֹא הִפִּילוּ, pero con redacción más natural y mejor alineada con el audit trail.
