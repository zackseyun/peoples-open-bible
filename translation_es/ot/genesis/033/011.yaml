translation:
  language: es
  text: Por favor, toma mi bendición[a] que te ha sido traída, porque Dios me ha mostrado favor, y porque tengo todo[b]. Jacob insistió con él, y Esaú la tomó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi bendición». Aquí se refiere al presente que Jacob entrega a Esaú; la expresión también puede evocar el tema mayor de la bendición en la historia de Jacob y Esaú.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tengo suficiente». El hebreo dice literalmente «tengo todo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח נָא
  english_pob_choice: Please take
  chosen_spanish: Por favor, toma
  alternatives_spanish:
  - Toma, por favor
  - Acepta, por favor
  lexicon: HALOT
  rationale: El imperativo expresa la acción directa, y נָא suaviza la petición. En español, «Por favor, toma» conserva el tono cortés sin volverlo pesado o anticuado.
- source_word: בִּרְכָתִי
  english_pob_choice: my blessing
  chosen_spanish: mi bendición
  alternatives_spanish:
  - mi regalo
  - mi presente
  lexicon: HALOT
  rationale: Aunque en este contexto se refiere concretamente al presente que Jacob ofrece a Esaú, el hebreo dice literalmente «bendición». Se mantiene el término para respetar la elección léxica del original y el eco narrativo del tema de la bendición en Génesis 27–33.
- source_word: אֲשֶׁר הֻבָאת לָךְ
  english_pob_choice: that has been brought to you
  chosen_spanish: que te ha sido traída
  alternatives_spanish:
  - que fue traída a ti
  - que te traje
  lexicon: HALOT
  rationale: La forma pasiva del hebreo se conserva en español con una construcción natural. No se explicita «yo» porque el hebreo no lo hace, aunque Jacob sea el hablante implícito.
- source_word: כִּי חַנַּנִי אֱלֹהִים
  english_pob_choice: because God has dealt graciously with me
  chosen_spanish: porque Dios ha tenido misericordia de mí
  alternatives_spanish:
  - porque Dios ha sido bueno conmigo
  - porque Dios me ha mostrado favor
  lexicon: HALOT
  rationale: חנן incluye la idea de mostrar gracia/favor. «Ha tenido misericordia de mí» comunica bien el favor recibido en un español bíblico claro, sin perder la dimensión de gracia.
- source_word: וְכִי יֶשׁ לִי כֹל
  english_pob_choice: and because I have everything
  chosen_spanish: y porque tengo todo
  alternatives_spanish:
  - y porque lo tengo todo
  - y porque tengo suficiente
  lexicon: HALOT
  rationale: כֹל significa «todo / todo lo que hay». «Tengo todo» preserva la amplitud semántica mejor que una restricción como «tengo suficiente», que sería interpretativa.
- source_word: וַיִּפְצַר בּוֹ
  english_pob_choice: And he urged him
  chosen_spanish: Y él lo insistió
  alternatives_spanish:
  - Y le insistió
  - Y lo apremió
  lexicon: HALOT
  rationale: El verbo expresa insistencia apremiante. «Lo insistió» no es la opción más idiomática del español estándar, pero se elige para reflejar más de cerca la fuerza verbal; la alternativa más natural sería «le insistió» o «lo apremió».
- source_word: וַיִּקָּח
  english_pob_choice: and he took it
  chosen_spanish: y él la tomó
  alternatives_spanish:
  - y lo tomó
  - y la aceptó
  lexicon: HALOT
  rationale: El verbo es simplemente «tomó». Se usa «la» para concordar con «mi bendición», aunque en español también sería posible «lo» si se pensara en el presente/gesto concreto; la elección mantiene la referencia al sustantivo léxico hebreo.
theological_decisions:
- issue: Sentido de אֱלֹהִים en el discurso de Jacob
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios verdadero
  rationale: En este contexto narrativo, אֱלֹהִים designa al Dios de Israel. «Dios» es la forma directa y suficientemente precisa en español, sin añadir explicaciones que el texto no da.
  doctrine_reference: 'Afirmaciones; filosofía de traducción #1'
- issue: Valor de בִּרְכָה en la escena de Jacob y Esaú
  english_pob_reading: my blessing
  chosen_spanish_reading: mi bendición
  alternative_spanish_readings:
  - mi regalo
  rationale: 'Se preserva la tensión lexical: el objeto ofrecido es un presente, pero el hebreo lo nombra «bendición». Mantenerlo ayuda a conservar el eco temático del relato y evita borrar una posible resonancia literaria.'
  doctrine_reference: Génesis 27–33; nota lexical documentada
- issue: חנן y la noción de gracia/favor
  english_pob_reading: has dealt graciously with me
  chosen_spanish_reading: ha tenido misericordia de mí
  alternative_spanish_readings:
  - me ha mostrado favor
  - ha sido gracioso conmigo
  rationale: La frase española elegida comunica el favor inmerecido recibido de Dios. Se reconoce que el campo semántico incluye gracia y favor; «misericordia» es una aproximación bíblica válida en español, aunque algo más amplia.
  doctrine_reference: Terminología bíblica de gracia/favor
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que recupera «blessing» en lugar de «gift» para reflejar con mayor precisión בִּרְכָתִי. La versión española conserva esa decisión léxica mediante «bendición» y mantiene el resto de la cláusula en un español natural y fiel al pasivo hebreo y al valor enfático de כֹל.
  spanish_consistency_notes:
  - Se preserva «bendición» de forma consistente con el eco narrativo del hebreo, en lugar de neutralizarlo como «regalo» o «presente».
  - «Dios» se usa de manera directa para אֱלֹהִים, sin mayúsculas especiales ni sustitución por «SEÑOR».
  - La referencia de כֹל se mantiene amplia con «todo», sin reducirla a «suficiente» en el texto principal.
  - La secuencia verbal conserva el tono insistente de וַיִּפְצַר בּוֹ, aun cuando la formulación española sea menos idiomática de lo que podría ser en una paráfrasis más libre.
  - El objeto pronominal en «la tomó» sigue a «mi bendición», lo que ayuda a la cohesión interna del versículo en español.
