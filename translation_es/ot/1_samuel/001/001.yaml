  - severity: low
    issue: «un cierto hombre» suena poco natural en español
    rationale: Aunque intenta reflejar «a certain man», en español más idiomático y digno funciona mejor «cierto hombre» o simplemente «un hombre». «Cierto hombre» preserva mejor el valor introductorio sin calco innecesario.
  revised_spanish_text: Había cierto hombre de Ramataim-zofim[a], de la región montañosa de Efraín, y su nombre era Elcaná, hijo de Jeroam, hijo de Elíhu, hijo de Tojú, hijo de Zuf, un efraimita.
