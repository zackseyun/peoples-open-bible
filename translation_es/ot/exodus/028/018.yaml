translation:
  language: es
  text: 'y la segunda fila: turquesa[a], zafiro y diamante.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación exacta de varias piedras preciosas antiguas es incierta. נֹפֶךְ puede ser «esmeralda» o «carbunclo»; סַפִּיר puede aludir a «lapislázuli»; יָהֲלֹם puede ser «jacinto» o «jaspe».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/טּוּר
  english_pob_choice: and the row
  chosen_spanish: y la fila
  alternatives_spanish:
  - y la hilera
  - y la línea
  lexicon: HALOT
  rationale: En este contexto de Ex 28:17–20, טּוּר designa una disposición lineal de piedras preciosas; en español, «fila» expresa de manera natural esa organización sin forzar una imagen técnica innecesaria. Mantiene el valor de la lista y el enlace con el contexto inmediato.
- source_word: הַ/שֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: la segunda
  alternatives_spanish:
  - la segunda una
  lexicon: HALOT
  rationale: El adjetivo ordinal concuerda con «fila» en género y número en español. «La segunda» conserva la referencia ordinal directa del hebreo.
- source_word: נֹפֶךְ
  english_pob_choice: turquoise
  chosen_spanish: turquesa
  alternatives_spanish:
  - esmeralda
  - carbunclo
  lexicon: HALOT
  rationale: La identificación exacta del nombre antiguo de la gema es incierta. «Turquesa» sigue la decisión del POB en inglés como equivalente moderno plausible y funciona bien en la enumeración española; las alternativas antiguas se preservan para transparencia.
- source_word: סַפִּיר
  english_pob_choice: sapphire
  chosen_spanish: zafiro
  alternatives_spanish:
  - lapislázuli
  lexicon: HALOT
  rationale: «Zafiro» es el equivalente español natural de «sapphire» y conserva la continuidad terminológica. Como la posible referencia antigua pudo ser lapislázuli, esa alternativa queda implícita en la decisión lexical y se documenta en nota.
- source_word: וְ/יָהֲלֹם
  english_pob_choice: and diamond
  chosen_spanish: y diamante
  alternatives_spanish:
  - y jacinto
  - y jaspe
  lexicon: HALOT
  rationale: «Diamante» sigue la tradición de traducción usada en la POB inglesa y encaja con la lista de piedras preciosas. Dado que la identificación exacta es debatida, se conservan en nota alternativas históricas plausibles.
translation_notes:
  revision_awareness: El texto inglés POB de referencia no requirió cambios en la última revisión; se mantuvo la misma lectura general y la nota léxica sobre las piedras preciosas inciertas. La versión española sigue esa decisión auditada, adaptando únicamente la formulación a un español natural y transparente.
  spanish_consistency_notes:
  - Se mantiene el formato de lista con dos puntos, siguiendo la estructura del inglés y del hebreo en el contexto inmediato.
  - Se traduce el nombre de la piedra como «turquesa» en la línea principal, con nota de incertidumbre para preservar la cautela lexical.
  - Se usa «fila» por su naturalidad en español bíblico contemporáneo sin abandonar el sentido de disposición lineal de piedras.
