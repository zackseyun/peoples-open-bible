translation:
  language: es
  text: 'Y dije en mi corazón: «¡A qué angustia he llegado, y a una gran tormenta[a], en la cual ahora estoy; porque era bondadoso y amado!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego κλύδωνος μεγάλου, literalmente «de una gran marejada/oleaje»; aquí se vierte de manera metafórica como «gran tormenta» para expresar una fuerte conmoción o agitación.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπα τῇ καρδίᾳ
  english_pob_choice: I said in my heart
  chosen_spanish: dije en mi corazón
  alternatives_spanish:
  - me dije a mí mismo
  - dije para mis adentros
  lexicon: LSJ
  rationale: La expresión griega es un modismo de habla interior. «En mi corazón» conserva la antropología del texto y es natural y reverente en español bíblico.
- source_word: Ἕως τίνος
  english_pob_choice: Into what
  chosen_spanish: ¿A cuánta
  alternatives_spanish:
  - ¿Hasta qué punto de
  - ¿A qué grado de
  lexicon: LSJ
  rationale: 'Aquí la pregunta no es temporal sino exclamativa: expresa el grado de aflicción al que ha llegado. En español, «¿A cuánta angustia he llegado?» comunica esa idea con naturalidad.'
- source_word: θλίψεως
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  - apuro
  lexicon: LSJ
  rationale: «Angustia» es claro y sobrio en español moderno. Mantiene el peso de θλῖψις sin cargar el texto con un registro eclesiástico innecesario.
- source_word: κλύδωνος μεγάλου
  english_pob_choice: a great storm
  chosen_spanish: un gran torbellino
  alternatives_spanish:
  - una gran tormenta
  - un gran tumulto
  - un gran oleaje
  lexicon: LSJ
  rationale: κλύδωνος puede denotar oleaje, borrasca o agitación violenta. «Torbellino» preserva la imagen de conmoción intensa y funciona bien junto a «angustia» en español, sin reducir el valor metafórico a un simple clima.
- source_word: ἐν ᾧ νῦν εἰμί
  english_pob_choice: in which I now am
  chosen_spanish: en el cual ahora estoy
  alternatives_spanish:
  - en que ahora estoy
  - en el que ahora me encuentro
  lexicon: LSJ
  rationale: La relativa refiere al estado anterior de angustia/torbellino. «En el cual ahora estoy» conserva la relación sintáctica y el tono formal del griego.
- source_word: χρηστὸς
  english_pob_choice: kind
  chosen_spanish: bondadoso
  alternatives_spanish:
  - benigno
  - amable
  - bueno
  lexicon: LSJ
  rationale: χρηστός puede significar bueno, amable o benévolo. «Bondadoso» expresa bien la cualidad moral relacional en español sin imponer una lectura teológica más fuerte que la del contexto.
- source_word: ἀγαπώμενος
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - querido
  - amado por otros
  - queridísimo
  lexicon: LSJ
  rationale: El participio indica ser objeto de amor. «Amado» es breve, elevado y fiel al matiz pasivo del griego.
theological_decisions:
- issue: Valor de χρηστὸς como cualidad moral o afectiva
  english_pob_reading: kind
  chosen_spanish_reading: bondadoso
  alternative_spanish_readings:
  - bueno
  - amable
  - benévolo
  rationale: El contexto es una lamentación personal; no exige traducir χρηστός como una perfección moral absoluta. «Bondadoso» preserva una cualidad relacional y evita sobreinterpretar el término.
  doctrine_reference: Lexical semantics; no doctrinal claim beyond the verse
- issue: Relación entre el sufrimiento presente y la autodescripción anterior
  english_pob_reading: for I was kind and beloved
  chosen_spanish_reading: porque era bondadoso y amado
  alternative_spanish_readings:
  - pues era bondadoso y amado
  - porque fui bondadoso y amado
  rationale: Se mantiene la causalidad del griego con «porque», y el imperfecto «era» conserva la idea de una condición previa sostenida en el pasado, sin forzar una conclusión doctrinal.
  doctrine_reference: Narrative tense and discourse force
translation_notes:
  revision_awareness: La versión inglesa auditada corrigió un error de borrador previo y fijó «a great storm» como equivalente metafórico de κλύδωνος μεγάλου, además de suavizar la sintaxis con «in which I now am». La propuesta española sigue esa revisión y decide entre «torbellino» y «tormenta» priorizando la fuerza metafórica interna del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «amado» y no «querido» para conservar el matiz pasivo del participio ἀγαπώμενος.
  - La pregunta exclamativa se adapta al español para no sonar artificial, sin perder el sentido de llegada a una condición extrema.
