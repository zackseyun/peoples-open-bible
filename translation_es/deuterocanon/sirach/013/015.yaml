  timestamp: '2026-05-07T22:42:26Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo como texto base y conserva la distinción frente al paralelo griego: mantiene «clase»/«su propia clase» y no sustituye por «prójimo». También refleja יְחֻבַּר con una idea de unión/asociación. Sin embargo, «se apega» en la primera cola introduce un matiz afectivo o volitivo no presente explícitamente en el hebreo elíptico, y «a la suya» en la segunda cola pierde claridad al omitir el sustantivo repetido que el original enfatiza.'
  spanish_quality_summary: El español es comprensible, pero «Toda clase de carne» suena algo extraño y la combinación con «se apega» no resulta tan proverbial ni tan nítida como podría. Además, «un hombre se une a la suya» queda demasiado elíptico en español y puede sonar torpe. Conviene explicitar «su propia clase» también en la segunda cola y usar un verbo más neutral como «se mantiene con» para la primera.
  glossary_alignment: No hay términos doctrinales sensibles en juego. La decisión de usar «clase» para מִין es defendible y coherente con el expediente. «Carne» preserva la revisión inglesa y el hebreo בשר. La nota alternativa está bien trasladada al español y mantiene la diferencia entre el hebreo y el griego.
  issues:
  - severity: medium
    issue: «se apega» sobretraduce la primera cola
    rationale: El hebreo es elíptico («kind ... with/near its own»), y el audit trail inglés eligió «keeps to» para expresar asociación sin añadir demasiado afecto. «Se apega» sugiere apego emocional o dependencia más fuerte que el original.
  - severity: medium
    issue: «a la suya» en la segunda cola pierde precisión
    rationale: El hebreo repite la idea de «su clase/tipo»; en español, el pronombre solo deja la frase demasiado abreviada y menos clara. Repetir «su propia clase» conserva mejor el paralelismo proverbial.
  - severity: low
    issue: La frase completa puede sonar poco natural en español proverbial
    rationale: Mantener «carne» es justificable por fidelidad, pero con «se apega» el resultado se percibe más pesado. Un ajuste menor mejora legibilidad sin apartarse del texto base.
  revised_spanish_text: Toda clase de carne se mantiene con su propia clase[a], y un hombre se une a su propia clase.
