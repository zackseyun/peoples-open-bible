  rationale: Se reubica la nota cultural [b] en la frase que realmente comenta y se ajusta «vergüenza» a «oprobio» para reflejar mejor ὄνειδος como afrenta pública, manteniendo el sentido, el registro y la política de conservar «hijos de Israel».
