revisions:
- from: 'Entonces le dijo a Abram[a]: «Sabe con certeza que tu descendencia[b] será extranjera en una tierra que no es la suya, y allí la esclavizarán y la afligirán durante cuatrocientos años».'
  to: 'Entonces le dijo a Abram: «Sabe con certeza que tu descendencia será forastera[a] en una tierra que no es la suya, y la esclavizarán[b] y la afligirán durante cuatrocientos años».'
  rationale: Se corrigieron los anclajes de notas para que correspondan a las palabras fuente correctas, se eliminó la nota innecesaria sobre «Abram», se quitó «allí» por no estar explícito en el hebreo, y se mejoró גֵר con «forastera», que refleja mejor la residencia en tierra ajena. Se preservan las decisiones POB sobre «descendencia», «esclavizarán» y «afligirán».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:38:09Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: secuencia narrativa, énfasis de יָדֹעַ תֵּדַע, valor colectivo de זַרְעֲךָ, condición de extranjería en tierra ajena, y la idea de esclavitud/aflicción por cuatrocientos años. Sin embargo, la nota [a] está anclada en «Abram» aunque la nota realmente trata de una alternativa inexistente/redundante, y la nota [b] está anclada en «descendencia» cuando corresponde a גֵר («extranjera»). Eso rompe la trazabilidad léxica requerida.'
  spanish_quality_summary: El español es claro y digno. «Sabe con certeza» suena natural, aunque «Debes saber con certeza» o «Ten por cierto» también serían posibles. «Será extranjera» es comprensible, pero «será forastera» o «vivirá como forastera» capta mejor el matiz de גֵר. La cláusula «y allí la esclavizarán» añade «allí», que no está en el hebreo; no cambia mucho el sentido, pero conviene evitar esa inserción. La puntuación y el registro son apropiados.
  glossary_alignment: 'No hay términos del glosario principal en juego salvo evitar paráfrasis innecesaria. «Descendencia» para זֶרַע está bien. «Esclavizarán» para וַעֲבָדוּם concuerda con la decisión POB. «Afligirán» para עִנּוּ mantiene bien el alcance semántico. El principal problema es de anclaje y contenido de notas: la alternativa para גֵר debe ir sobre «extranjera/forastera», no sobre «descendencia».'
  issues:
  - severity: medium
    issue: Notas mal ancladas en el texto
    rationale: La nota [b] explica גֵר, pero está colocada sobre «descendencia», que traduce זַרְעֲךָ. Esto incumple la disciplina de notas y oscurece la decisión léxica.
  - severity: medium
    issue: Nota [a] innecesaria y poco informativa
    rationale: «Abram[a]» no requiere nota; la nota dice «O ‘a Abram’», que repite la forma ya presente y no preserva una alternativa real ni una ambigüedad relevante.
  - severity: low
    issue: Inserción de «allí» no respaldada explícitamente por el hebreo
    rationale: El hebreo dice «y los esclavizarán y los afligirán» tras «en una tierra no suya»; «allí» es inferencia contextual aceptable, pero mejor omitirla para mayor cercanía al texto fuente.
  - severity: low
    issue: Elección de «extranjera» es aceptable pero no óptima para גֵר
    rationale: «Extranjera» comunica no pertenencia, pero «forastera» o «residente forastera» conserva mejor la noción de residencia ajena/temporal. No es error grave, pero puede mejorarse.
  revised_spanish_text: 'Entonces le dijo a Abram: «Sabe con certeza que tu descendencia será forastera[a] en una tierra que no es la suya, y la esclavizarán[b] y la afligirán durante cuatrocientos años».'
  revised_footnotes:
