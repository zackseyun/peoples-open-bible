translation:
  language: es
  text: Pero yo he construido para ti una casa majestuosa[a][b], un lugar para que habites para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Majestuosa» refleja el sentido de זְבֻל como morada elevada o eminente; otras posibilidades son «exaltada» o «elevada».
    reason: lexical_alternative
  - marker: b
    text: «Casa» puede entenderse también como «templo»; la traducción principal conserva «casa» para mantener el lenguaje del hebreo y su carga teológica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Así que yo
  - En cuanto a mí, yo
  lexicon: HALOT
  rationale: La partícula con el pronombre independiente marca un giro enfático y contrastivo. «Pero yo» reproduce mejor ese contraste en español que un simple «Y yo», y mantiene el tono solemne del discurso.
- source_word: בָּנִיתִי
  english_pob_choice: have built
  chosen_spanish: he construido
  alternatives_spanish:
  - he edificado
  - construí
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una acción completada. En español, el pretérito perfecto compuesto comunica bien la acción ya realizada con vigencia actual en el contexto de dedicación.
- source_word: בֵית
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - templo
  - casa del templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa». «Casa» conserva la imagen bíblica de la morada de Dios y evita sustituir de entrada el término por «templo», que sería más interpretativo.
- source_word: זְבֻל
  english_pob_choice: exalted
  chosen_spanish: exaltada
  alternatives_spanish:
  - elevada
  - majestuosa
  - loftosa
  lexicon: HALOT
  rationale: El sustantivo expresa una idea de altura, nobleza o morada elevada. «Exaltada» mantiene el valor de elevación/eminencia que la POB inglesa decidió destacar, sin convertir la expresión en una paráfrasis más amplia.
- source_word: וּמָכוֹן
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un lugar establecido
  - un lugar fijo
  - una morada
  lexicon: HALOT
  rationale: El término señala un sitio fijo o establecido. «Un lugar» es natural en español y deja que la frase infinitiva siguiente precise su función.
- source_word: לְשִׁבְתְּךָ
  english_pob_choice: for you to dwell
  chosen_spanish: para que habites
  alternatives_spanish:
  - para habitar
  - para tu morada
  lexicon: HALOT
  rationale: Derivado de ישׁב, aquí expresa habitar o residir. «Para que habites» conserva el sentido relacional y personal de la presencia divina en la casa.
- source_word: עוֹלָמִים
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por los siglos
  - perpetuamente
  lexicon: HALOT
  rationale: El plural intensifica la duración. «Para siempre» es la manera más natural y digna en español para reproducir la permanencia ritual y devocional del texto.
theological_decisions:
- issue: Si mantener la imagen de «casa» o explicitar «templo» en el texto principal
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  rationale: 'La fuente hebrea dice «casa», y la POB inglesa preserva esa imagen por su valor teológico: el santuario como casa de Dios. En español, mantener «casa» evita una explicación intrusiva en la línea principal.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo reflejar el valor de duración de עוֹלָמִים sin resolver una tensión histórica posterior
  english_pob_reading: forever
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - por siempre
  - perpetuamente
  rationale: La oración dedica el edificio como morada permanente de Dios. «Para siempre» conserva la fuerza retórica del hebreo sin anticipar ni suavizar la posterior historia del templo; la traducción debe preservar esa tensión textual.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El inglés POB fue revisado desde «lofty house» a «exalted house» para reflejar mejor el matiz de זְבֻל. La propuesta española sigue esa revisión con «casa exaltada», manteniendo la imagen de una morada elevada sin introducir «templo» en el texto principal.
  spanish_consistency_notes:
  - Se preserva «Yahvé» cuando el texto del contexto lo requiera, pero en este versículo el referente divino se expresa mediante el pronombre de segunda persona.
  - «Casa» se usa de forma consistente para conservar el paralelismo bíblico con la morada divina.
  - «Para siempre» mantiene el registro litúrgico natural del español sin perder la intensidad del plural hebreo.
  - La elección de «habites» evita una lectura demasiado técnica de «morada» y conserva el tono de presencia personal.
