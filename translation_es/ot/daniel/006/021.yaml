base_translation:
  language: en
  yaml_path: translation/ot/daniel/006/021.yaml
  text: And when he came near the den[a], he cried out to Daniel with a distressed voice. The king spoke and said to Daniel, “Daniel, servant of the living God, has your God, whom you continually serve[c][b], been able to deliver you from the lions?”
  footnotes:
  - marker: a
    text: Or “with a grieved/sorrowful voice.”
    reason: lexical_alternative
  - marker: b
    text: Or “whom you continually worship.” The Aramaic verb can denote religious service or worship.
    reason: lexical_alternative
  - marker: c
    text: Or “servant of the living God” could be rendered “slave of the living God,” though here the context favors the honorific sense of devoted service.
    reason: lexical_alternative
