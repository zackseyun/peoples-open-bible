    reason: cultural_note
  - marker: c
    text: El griego dice 'la casa anterior' y 'esta', conservando el idioma de 'casa' para el santuario.
    reason: cultural_note
  revision_rationale: Se corrige un calco poco natural ('cabezas' → 'jefes'), se elimina el añadido no explícito 'al ver' para acercarse más al griego, y se reubican/ajustan las notas para que correspondan a los términos realmente explicados. También se añade la nota sobre 'casa' que el rastro de auditoría inglés preserva como significativa.
