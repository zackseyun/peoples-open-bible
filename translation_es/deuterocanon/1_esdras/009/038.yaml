translation:
  language: es
  text: Y toda la multitud se reunió de común acuerdo en la plaza abierta de la puerta oriental del templo,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el lugar amplio junto a la puerta oriental del templo». El griego ἐπὶ τὸ εὐρύχωρον puede traducirse más literalmente como «en el lugar amplio» o «en el espacio abierto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθη
  english_pob_choice: gathered together
  chosen_spanish: se reunió
  alternatives_spanish:
  - se congregó
  - fue reunida
  lexicon: BDAG
  rationale: El aoristo pasivo expresa el acto de ser congregados; en español, 'se reunió' comunica naturalmente el evento colectivo sin forzar una pasiva pesada.
- source_word: πᾶν τὸ πλῆθος
  english_pob_choice: all the multitude
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - todo el gentío
  - toda la asamblea
  lexicon: BDAG
  rationale: '''Multitud'' conserva el valor de gran cuerpo reunido y el matiz público del término griego mejor que ''asamblea'', que suena más institucional.'
- source_word: ὁμοθυμαδὸν
  english_pob_choice: with one accord
  chosen_spanish: unánimemente
  alternatives_spanish:
  - con un solo sentir
  - de común acuerdo
  lexicon: BDAG
  rationale: La idea es de unidad de propósito y acción compartida; 'unánimemente' comunica bien esa concordancia sin reducirla a mera cercanía física.
- source_word: ἐπὶ τὸ εὐρύχωρον
  english_pob_choice: in the open square
  chosen_spanish: en la plaza abierta
  alternatives_spanish:
  - en el lugar amplio
  - en el espacio abierto
  lexicon: LSJ
  rationale: La expresión describe un espacio abierto y amplio; 'plaza abierta' es un equivalente natural en español y mantiene el carácter público del lugar.
- source_word: τοῦ πρὸς ἀνατολὰς
  english_pob_choice: of the eastern
  chosen_spanish: de la puerta oriental
  alternatives_spanish:
  - de la puerta del este
  - de la puerta hacia el oriente
  lexicon: LSJ
  rationale: El griego identifica la puerta por su orientación; 'oriental' conserva ese rasgo direccional con registro formal y claro.
- source_word: ἱεροῦ πυλῶνος
  english_pob_choice: gate of the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del santuario
  - del recinto sagrado
  lexicon: LSJ
  rationale: '''ἱεροῦ πυλῶνος'' es literalmente la puerta/portal del recinto sagrado o templo. En español, ''puerta del templo'' podría sonar menos natural en esta construcción; por eso se integra como ''de la puerta... del templo'' para conservar el referente arquitectónico y cultual.'
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete como ancla principal. La versión inglesa auditada opta por 'open square' y actualiza 'east gate' a 'eastern gate'; en español se mantiene esa orientación direccional con 'puerta oriental'. No hay tensiones textuales o teológicas adicionales en este verso.
  spanish_consistency_notes:
  - Se conserva 'multitud' para πλῆθος, coherente con el uso POB de masa reunida.
  - '''Unánimemente'' refleja ὁμοθυμαδόν sin introducir connotaciones doctrinales.'
  - '''Templo'' se usa como equivalente estándar de ἱερόν en este contexto arquitectónico.'
  - La nota conserva la alternativa espacial del griego para no perder la ambigüedad entre 'en' y 'junto a'.
