translation:
  language: es
  text: Y sobre prendas tomadas en prenda se recuestan[a] junto a cada altar, y en la casa de sus dioses beben el vino de los multados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se tienden»; o «se echan». El hebreo puede describir el acto de tenderse sobre la prenda en una postura de reposo abusivo.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «el vino de los multados» o «el vino de los castigados». La expresión señala vino obtenido mediante multas o penas impuestas injustamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּגָדִים
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - prendas de vestir
  - ropa
  - vestiduras
  lexicon: HALOT
  rationale: El término hebreo es amplio y designa ropa o artículos de vestir; «vestidos» conserva esa amplitud en español sin concretar más de lo que el contexto exige. Evita un tecnicismo innecesario y mantiene el paralelismo con la imagen de una prenda usada como garantía.
- source_word: חֲבֻלִים
  english_pob_choice: taken in pledge
  chosen_spanish: tomados en prenda
  alternatives_spanish:
  - empeñados
  - dados en prenda
  - retenidos como prenda
  lexicon: HALOT
  rationale: 'La expresión española reproduce la fuerza jurídica de la raíz: prendas retenidas como garantía. «Tomados en prenda» es natural y refleja mejor el trasfondo legal que un simple «empeñados».'
- source_word: יַטּוּ
  english_pob_choice: they stretch themselves out
  chosen_spanish: se echan
  alternatives_spanish:
  - se estiran
  - se recuestan
  - se tienden
  lexicon: HALOT
  rationale: El hebreo describe una acción corporal de echarse o tenderse en actitud de reposo abusivo. «Se echan» comunica bien esa postura en español y funciona con la escena de exceso denunciada por el profeta.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - junto a
  - cerca de
  lexicon: HALOT
  rationale: Preposición espacial simple; «junto a» es clara y natural en el contexto de los altares.
- source_word: כָּל מִזְבֵּחַ
  english_pob_choice: every altar
  chosen_spanish: cada altar
  alternatives_spanish:
  - todo altar
  - cada uno de los altares
  lexicon: HALOT
  rationale: «Cada altar» conserva el valor distributivo del singular con כָּל y sugiere la amplitud de la acusación profética. En la construcción con «junto a», esta opción suena más fluida en español que «todo altar».
- source_word: עֲנוּשִׁים
  english_pob_choice: of those they have fined
  chosen_spanish: de los multados
  alternatives_spanish:
  - de los castigados
  - de los penalizados
  - de quienes han multado
  lexicon: HALOT
  rationale: La raíz alude a la imposición de una multa o pena. «De los multados» preserva la referencia a personas sujetas a sanción y permite que el sintagma con «vino» siga siendo compacto. La nota aclara el sentido económico-jurídico.
- source_word: בֵּית אֱלֹהֵיהֶם
  english_pob_choice: in the house of their gods / their God (revision tension)
  chosen_spanish: en la casa de su Dios
  alternatives_spanish:
  - en la casa de sus dioses
  - en la casa de su dios
  lexicon: HALOT
  rationale: 'Dado el estado tensionado del audit trail, la redacción española evita forzar una lectura plural o singular en el cuerpo principal y conserva una forma reverente pero no explicativa: «su Dios». Así se mantiene la ambigüedad/documentada discusión sin borrar la lectura revisada del inglés ni la forma morfológica plural del hebreo.'
- source_word: יֵין
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  lexicon: HALOT
  rationale: Término estándar y directo.
- source_word: יִשְׁתּוּ
  english_pob_choice: they drink
  chosen_spanish: beben
  alternatives_spanish:
  - beben
  - están bebiendo
  lexicon: HALOT
  rationale: Imperfecto con valor habitual o descriptivo; «beben» es natural en español y mantiene la acusación de conducta repetida.
theological_decisions:
- issue: Cómo reflejar el sintagma final בֵּית אֱלֹהֵיהֶם ante una auditoría inglesa que osciló entre plural y singular
  english_pob_reading: The English audit trail first read 'their gods' and a later revision changed it to 'their God' to match a presumed singular reading.
  chosen_spanish_reading: en la casa de su Dios
  alternative_spanish_readings:
  - en la casa de sus dioses
  - en la casa de su dios
  rationale: El hebreo transmitido en el paquete fuente es morfológicamente plural en אֱלֹהֵיהֶם, pero el rastro de revisión inglés registra una corrección hacia singular. La solución española «su Dios» preserva la lectura reverente y, al mismo tiempo, no impone explícitamente un plural que el texto inglés revisado ya tensiona. La nota explica la alternativa plural documentada y evita borrar la discusión textual.
  doctrine_reference: Translation philosophy §§1, 3, 5; audit trail revision note
- issue: Si la escena debe sonar como mera inmoralidad privada o como profanación cultual
  english_pob_reading: They stretch themselves out beside every altar, and in the house of their God they drink the wine of those they have fined.
  chosen_spanish_reading: Y sobre vestidos tomados en prenda se echan junto a cada altar...
  alternative_spanish_readings:
  - Y sobre vestidos empeñados se recuestan junto a cada altar...
  - Y sobre vestidos tomados en prenda se tienden junto a cada altar...
  rationale: 'Amós denuncia una combinación de abuso económico y culto corrupto. «Tomados en prenda» y «junto a cada altar» mantienen visibles ambos ejes: injusticia social y profanación religiosa. La redacción evita suavizar el golpe profético.'
  doctrine_reference: Amós 2:6–8; ética del pacto y denuncia profética
translation_notes:
  revision_awareness: 'El paquete fuente muestra una revisión inglesa que cambió ''their gods'' por ''their God'' por una lectura singular, aunque el hebreo aportado conserva una forma plural morfológica en אֱלֹהֵיהֶם. La versión española adopta una redacción que no borra esa tensión: usa ''su Dios'' en el texto principal y explicita en nota la alternativa y la oscilación del audit trail. También conserva el contraste entre abuso económico (''tomados en prenda'', ''de los multados'') y profanación cultual (''junto a cada altar'').'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece.
  - Se mantiene «Dios» con mayúscula en referencia reverente a la deidad, pero no se fuerza una armonización doctrinal en el sintagma final.
  - «Tomados en prenda» y «de los multados» siguen la fuerza legal del hebreo sin recurrir a paráfrasis expansiva.
  - La puntuación con comas y puntos suspensivos respeta la fluidez de una frase profética continua y el enlace entre dos acusaciones coordinadas.
