translation:
  language: es
  text: Entonces Benjamín volvió en aquel tiempo[a], y les dieron las mujeres que habían mantenido con vida de entre las mujeres de Jabés de Galaad; pero no encontraron suficientes para ellos de ese modo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: “pero no encontraron así para ellos”. La expresión hebrea es elíptica y significa que, por este medio, no hubo suficientes mujeres para ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió a
  lexicon: HALOT
  rationale: El hebreo שוב en esta secuencia narrativa expresa regreso; en español, "volvió" suena natural y conserva el movimiento de retorno sin añadir énfasis innecesario.
- source_word: בִּנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamín el tribu
  - los benjaminitas
  lexicon: HALOT
  rationale: La forma propia del nombre se conserva en español. Aunque el referente es colectivo, el contexto permite entender la tribu sin forzar una explicitación que el hebreo no tiene.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: HALOT
  rationale: Es la equivalencia temporal natural en español y preserva el marcador narrativo del hebreo.
- source_word: וַיִּתְּנוּ לָהֶם
  english_pob_choice: they gave them
  chosen_spanish: les dieron
  alternatives_spanish:
  - se los dieron
  - les entregaron
  lexicon: HALOT
  rationale: נתן con objeto indirecto se expresa de manera directa con "les dieron". "Entregaron" sería posible, pero introduce un matiz más formal o administrativo que no exige el hebreo.
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal "mujeres", como en la POB inglesa, porque el hebreo no usa el término más específico para "esposas".
- source_word: אֲשֶׁר חִיּוּ
  english_pob_choice: whom they had kept alive
  chosen_spanish: que habían mantenido con vida
  alternatives_spanish:
  - a quienes habían dejado vivir
  - que habían preservado con vida
  lexicon: HALOT
  rationale: La forma causativa/intensiva de חיה indica que no las dejaron morir tras la matanza. "Mantenido con vida" es idiomático en español y mantiene la fuerza del acto sin ampliar el sentido.
- source_word: מִנְּשֵׁי יָבֵשׁ גִּלְעָד
  english_pob_choice: from the women of Jabesh-gilead
  chosen_spanish: de entre las mujeres de Jabés de Galaad
  alternatives_spanish:
  - de las mujeres de Jabés-galaad
  - entre las mujeres de Jabés de Galaad
  lexicon: HALOT
  rationale: El מן marca origen/selección desde ese grupo; "de entre" comunica mejor esa extracción que un simple "de". Se mantiene el topónimo en forma española usual.
- source_word: וְלֹא מָצְאוּ לָהֶם כֵּן
  english_pob_choice: but they did not find enough for them that way
  chosen_spanish: pero no hallaron para ellos así
  alternatives_spanish:
  - pero no les bastó así
  - pero no encontraron suficiente para ellos de ese modo
  lexicon: HALOT
  rationale: Se conserva la brevedad elíptica del hebreo, como en la POB inglesa. "Así" reproduce כֵּן sin convertir la frase en una paráfrasis explicativa; la insuficiencia queda sugerida por el contexto inmediato.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés de la POB, que privilegia una equivalencia óptima y conserva la elipsis final de כֵּן. El español reproduce esa tensión sin resolverla del todo, para no sobreexplicar lo que el hebreo deja comprimido.
  spanish_consistency_notes:
  - Se usó "Benjamín" como nombre tribal colectivo, sin añadir glosas innecesarias.
  - Se mantuvo "mujeres" en lugar de "esposas" para respetar el sustantivo hebreo.
  - La expresión final conserva la ambigüedad/ellipsis del original mediante "así" y nota textual.
  - El topónimo se adaptó a la forma española habitual "Jabés de Galaad".
  - El tono es narrativo y sobrio, apto para lectura bíblica pública.
