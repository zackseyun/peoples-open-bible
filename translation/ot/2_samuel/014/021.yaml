id: 2SA.14.21
reference: 2 Samuel 14:21
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/מֶּ֨לֶךְ֙ אֶל יוֹאָ֔ב הִנֵּה נָ֥א עָשִׂ֖יתִי אֶת הַ/דָּבָ֣ר הַ/זֶּ֑ה וְ/לֵ֛ךְ הָשֵׁ֥ב אֶת הַ/נַּ֖עַר אֶת אַבְשָׁלֽוֹם־־־־־׃
translation:
  text: Then the king said to Joab[a], “Behold now, I have done this thing. Go, bring back the young man Absalom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “See now, I have granted this request; go, bring back the youth Absalom.” The Hebrew more literally reads, “I have done this thing.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward definite title; no reason to substitute the personal name since the Hebrew uses the title.
- source_word: הִנֵּה נָא
  chosen: Look now
  alternatives:
  - See now
  - Behold, please
  - Indeed now
  lexicon: HALOT
  rationale: הִנֵּה marks attention, and נָא adds a particle of entreaty/softening or immediacy. 'Look now' preserves the discourse force in readable modern English without archaic 'behold.'
- source_word: עָשִׂיתִי אֶת־הַדָּבָר הַזֶּה
  chosen: I have done this thing
  alternatives:
  - I have granted this request
  - I have done what you asked
  - I have done this
  lexicon: HALOT
  rationale: Literally 'I have done this thing.' Although context implies granting Joab's request, the Hebrew wording is broader and should be preserved rather than paraphrased.
- source_word: וְלֵךְ
  chosen: So go
  alternatives:
  - and go
  - go
  lexicon: HALOT
  rationale: The conjunction links the king's compliance with the command that follows. 'So go' captures the consequential sense in idiomatic English.
- source_word: הָשֵׁב
  chosen: bring back
  alternatives:
  - return
  - restore
  - bring home again
  lexicon: HALOT
  rationale: 'Hiphil of שוב here is causative: Joab is to cause Absalom to return. ''Bring back'' is idiomatic and reflects the causative force better than simple ''return.'''
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the boy
  - the youth
  - the young man
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, servant, or young man depending on context. Since Absalom is an adult son but still spoken of with paternal tenderness, 'the young man' best preserves both age-relative nuance and dignity.
- source_word: אֶת אַבְשָׁלוֹם
  chosen: Absalom
  lexicon: HALOT
  rationale: 'Personal name transliterated per project philosophy. The appositional repetition after ''the young man'' is retained: ''the young man Absalom.'''
