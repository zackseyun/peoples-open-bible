translation:
  language: es
  text: Los sidonios llaman a Hermón Sirión[a], y los amorreos[b] lo llaman Senir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «monte Hermón»; el hebreo aquí dice simplemente «Hermón».
    reason: lexical_alternative
  - marker: b
    text: La forma hebrea «el amorreo» es colectiva aquí; por eso se traduce «los amorreos».
    reason: lexical_alternative
lexical_decisions:
- source_word: צִידֹנִים
  english_pob_choice: The Sidonians
  chosen_spanish: los sidonios
  alternatives_spanish:
  - sidonios
  lexicon: HALOT
  rationale: El gentilicio plural hebreo se entiende colectivamente como un pueblo; en español, el plural con artículo es natural y fiel al valor étnico.
- source_word: יִקְרְא֥וּ
  english_pob_choice: call
  chosen_spanish: llaman
  alternatives_spanish:
  - nombran
  - llaman por nombre
  lexicon: HALOT
  rationale: En este contexto de designación de nombre, «llamar» reproduce bien el valor de קרא con ל, con fluidez natural en español.
- source_word: לְחֶרְמוֹן
  english_pob_choice: Hermon
  chosen_spanish: al Hermón
  alternatives_spanish:
  - Hermón
  lexicon: HALOT
  rationale: Se conserva el nombre propio y se refleja la preposición con destino/objeto de nombramiento mediante «al». No se añade «monte» porque no está explícito en el hebreo de este versículo.
- source_word: שִׂרְיֹן
  english_pob_choice: Sirion
  chosen_spanish: Sirión
  alternatives_spanish:
  - Sirion
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre propio, ajustada a la ortografía española con tilde prosódica para lectura natural.
- source_word: וְהָאֱמֹרִי
  english_pob_choice: and the Amorites
  chosen_spanish: y los amorreos
  alternatives_spanish:
  - y el amorreo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular colectiva, el sentido es étnico y plural; en español el plural explicita mejor la colectividad que el inglés ya había señalado.
- source_word: יִקְרְאוּ לוֹ
  english_pob_choice: call it
  chosen_spanish: lo llaman
  alternatives_spanish:
  - lo nombran
  - lo llaman por nombre
  lexicon: HALOT
  rationale: El pronombre masculino singular remite a Hermón; «lo llaman» expresa de forma natural la designación nominal sin sobrecargar la frase.
- source_word: שְׂנִיר
  english_pob_choice: Senir
  chosen_spanish: Senir
  alternatives_spanish:
  - Senir
  lexicon: HALOT
  rationale: Se conserva el nombre propio por transliteración estándar.
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo WLC y el audio de la POB en inglés: mantiene el paralelismo entre dos grupos étnicos, conserva los nombres propios y evita añadir «monte» al cuerpo principal. La única nota reproduce la alternativa documentada para «Hermón».'
  spanish_consistency_notes:
  - Se prefirió «amorreos» en plural para reflejar el sentido colectivo que la POB en inglés ya explicita.
  - Se usó «al Hermón» para respetar la función sintáctica de לְ en el contexto de nombramiento.
  - Se mantuvo la transliteración de los topónimos con adaptación mínima al español («Sirión»).
