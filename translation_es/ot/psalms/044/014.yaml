  rationale: Se ajustaron las dos preposiciones de 'para' a 'ante' para reflejar mejor el valor relacional del hebreo y producir un español más natural en un contexto de vergüenza pública. Se conservaron 'oprobio', 'burla' y 'escarnio', que representan bien el paralelismo intensificado del original.
