lexical_decisions:
- source_word: ወ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prefixed conjunction commonly means 'and.' In apocalyptic narrative it often carries simple sequential force;
    'And' preserves the terse visionary progression without over-interpreting it as a stronger temporal marker.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I looked
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: First-person perfect of the verb 'to see.' 'I saw' is the most direct and natural English rendering. 'I beheld'
    is elevated but archaic; 'I looked' weakens the visionary claim by shifting from perception to mere gaze.
