translation:
  language: es
  text: Entonces mandé llamar a Eliezer, Ariel, Semaías, Elnatán, Jarib, Elnatán, Natán, Zacarías y Mesulam, jefes[a], y a Joiarib y Elnatán, hombres de entendimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'líderes'; hebreo literalmente 'cabezas'.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse 'hombres de discernimiento' o 'hombres instruidos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלְחָה
  english_pob_choice: Then I sent for
  chosen_spanish: Entonces envié a
  alternatives_spanish:
  - Y envié a
  - Luego envié a
  lexicon: HALOT
  rationale: El wayyiqtol marca secuencia narrativa; en español, 'Entonces' conserva el avance temporal. El hebreo introduce personas convocadas por Esdras, así que 'envié a' reproduce la dirección del envío sin forzar una perífrasis idiomática innecesaria.
- source_word: לֶאֱלִיעֶזֶר ... וּלְאֶלְנָתָן
  english_pob_choice: for Eliezer ... and Elnathan
  chosen_spanish: a Eliezer ... y Elnatán
  alternatives_spanish:
  - para Eliezer ... y Elnatán
  - hacia Eliezer ... y Elnatán
  lexicon: HALOT
  rationale: La preposición ל indica aquí a los destinatarios del envío/llamado. En español, con 'envié', la marca natural es 'a', que conserva la relación direccional sin añadir una lectura interpretativa extra.
- source_word: רָאשִׁים
  english_pob_choice: heads
  chosen_spanish: cabezas
  alternatives_spanish:
  - jefes
  - líderes
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea literal 'cabezas' para preservar la imagen original. Aunque 'jefes' o 'líderes' aclaran el sentido, 'cabezas' retiene mejor la concreción lexical que el POB inglés documentó.
- source_word: מְבִינִים
  english_pob_choice: men of understanding
  chosen_spanish: hombres de entendimiento
  alternatives_spanish:
  - hombres de discernimiento
  - hombres sabios
  - hombres instruidos
  lexicon: HALOT
  rationale: El participio de בין apunta a capacidad de entender/discernir. 'Hombres de entendimiento' sigue de cerca la fuerza lexical del hebreo y evita especificar indebidamente una función oficial como 'maestros'.
- source_word: וּלְיוֹיָרִיב וּלְאֶלְנָתָן מְבִינִים
  english_pob_choice: and for Joiarib and Elnathan, men of understanding
  chosen_spanish: y a Joiarib y Elnatán, hombres de entendimiento
  alternatives_spanish:
  - y a Joiarib y Elnatán, que eran hombres de entendimiento
  - y a Joiarib y Elnatán, hombres de discernimiento
  lexicon: HALOT
  rationale: La construcción apposicional se conserva sin añadir un relativo que el hebreo no exige. En español, la coma antes de 'hombres de entendimiento' mantiene la relación explicativa, como en el POB inglés revisado.
- source_word: יוֹיָרִיב
  english_pob_choice: Joiarib
  chosen_spanish: Joiarib
  alternatives_spanish:
  - Jehoiarib
  lexicon: HALOT
  rationale: Se preserva la transliteración habitual en este contexto bíblico. 'Jehoiarib' es una opción posible más plena, pero 'Joiarib' coincide mejor con el uso convencional y con el audit trail inglés.
- source_word: אֶלְנָתָן
  english_pob_choice: Elnathan
  chosen_spanish: Elnatán
  alternatives_spanish:
  - Elnathan
  lexicon: HALOT
  rationale: Se adapta la transliteración al castellano con acento gráfico, manteniendo el mismo nombre repetido tres veces sin armonizarlo, tal como exige el texto fuente.
theological_decisions:
- issue: Valor semántico de רָאשִׁים como título de status
  english_pob_reading: heads
  chosen_spanish_reading: cabezas
  alternative_spanish_readings:
  - jefes
  - líderes
  rationale: No hay una carga doctrinal especial, pero sí una tensión lexical entre literalidad e inteligibilidad. Se conserva la metáfora hebrea para no borrar el paralelismo con el audit trail inglés y porque el contexto ya sugiere que designa personas prominentes.
  doctrine_reference: N/A
- issue: Valor de מְבִינִים como cualidad de discernimiento, no oficio técnico
  english_pob_reading: men of understanding
  chosen_spanish_reading: hombres de entendimiento
  alternative_spanish_readings:
  - hombres de discernimiento
  - hombres instruidos
  - maestros
  rationale: Se evita traducirlo como un cargo fijo ('maestros') porque el hebreo describe una cualidad de comprensión/discernimiento. La opción elegida conserva la amplitud del término y la ambigüedad documentada por el POB inglés.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado para eliminar ''who were'' y dejar una aposición más directa. La versión española sigue esa decisión: conserva la enumeración, separa el primer grupo como ''cabezas'' y el último como ''hombres de entendimiento'' sin introducir verbos copulativos adicionales.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva la repetición de Elnatán tres veces, sin intentar desambiguarla o unificarla.
  - La puntuación reproduce la estructura apposicional del hebreo y del POB inglés revisado.
  - '''Entendimiento'' se usa aquí como término amplio y digno, compatible con el registro bíblico en español.'
