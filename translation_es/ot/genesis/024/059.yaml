- from: Entonces despidieron a Rebeca, su hermana,[a] y a su nodriza, y al esclavo de Abraham, y a sus hombres.
  to: Entonces enviaron a Rebeca, su hermana[a], y a su nodriza, y al siervo de Abraham, y a sus hombres.
  rationale: Se ajusta עֶבֶד al valor contextual documentado por el POB ('siervo', no 'esclavo'), se mejora וַיְשַׁלְּחוּ con 'enviaron' para reflejar mejor 'sent away' en español natural, y se corrige el anclaje de la nota al sustantivo pertinente sin coma extra.
