translation:
  language: es
  text: Provean[a] para ustedes tres hombres de cada tribu, y yo los enviaré; ellos se levantarán y recorrerán la tierra, y la pondrán por escrito[b] conforme a su heredad, y vendrán a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Designen para ustedes tres hombres por tribu».
    reason: lexical_alternative
  - marker: b
    text: Es decir, la pondrán por escrito en relación con los repartos de la heredad territorial.
    reason: cultural_note
lexical_decisions:
- source_word: הָבוּ
  english_pob_choice: Provide
  chosen_spanish: Provean
  alternatives_spanish:
  - Den
  - Designen
  - Elijan
  lexicon: HALOT
  rationale: El imperativo plural aquí pide una acción de disponer o suministrar personas para la tarea. «Provean» conserva el valor práctico de preparar o suministrar sin caer en un calco duro de «den».
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para sí mismos
  - para ustedes mismos
  lexicon: HALOT
  rationale: 'El sentido reflexivo/pragmático está presente: deben tomar a esos hombres de entre ellos. En español, «para ustedes» comunica la destinación sin forzar una reflexividad demasiado pesada; el matiz se conserva por el contexto.'
- source_word: שְׁלֹשָׁה אֲנָשִׁים
  english_pob_choice: three men
  chosen_spanish: tres hombres
  alternatives_spanish:
  - tres personas
  - tres varones
  lexicon: HALOT
  rationale: El hebreo es explícitamente masculino. «Hombres» mantiene la fuerza lexical y la precisión de género mejor que una neutralización que perdería ese rasgo.
- source_word: לַשָּׁבֶט
  english_pob_choice: from each tribe
  chosen_spanish: por tribu
  alternatives_spanish:
  - de cada tribu
  - para cada tribu
  lexicon: HALOT
  rationale: El hebreo singular distributivo exige explicitar la distribución. «Por tribu» es natural en español y conserva la idea de una asignación por unidad tribal.
- source_word: וְאֶשְׁלָחֵם
  english_pob_choice: and I will send them out
  chosen_spanish: y yo los enviaré
  alternatives_spanish:
  - y los enviaré fuera
  - y los despacharé
  lexicon: HALOT
  rationale: «Enviar» reproduce el verbo base sin añadir un matiz espacial innecesario. El contexto de la misión ya deja claro que son enviados fuera.
- source_word: וְיָקֻמוּ
  english_pob_choice: they shall arise
  chosen_spanish: se levantarán
  alternatives_spanish:
  - se pondrán de pie
  - partirán
  lexicon: HALOT
  rationale: «Levantarse» preserva la secuencia verbal hebrea y su valor literal, mientras sigue siendo natural en español para introducir la acción siguiente.
- source_word: וְיִתְהַלְּכוּ בָאָרֶץ
  english_pob_choice: and walk through the land
  chosen_spanish: y recorrerán la tierra
  alternatives_spanish:
  - y andarán por la tierra
  - y viajarán por la tierra
  lexicon: HALOT
  rationale: El hitpael de הלך expresa desplazamiento exploratorio. «Recorrerán» comunica mejor en español la idea de inspeccionar el territorio que un «caminar» demasiado literal.
- source_word: וְיִכְתְּבוּ אֹתָהּ
  english_pob_choice: and write it down
  chosen_spanish: y la escribirán
  alternatives_spanish:
  - y la registrarán
  - y la pondrán por escrito
  lexicon: HALOT
  rationale: El objeto directo femenino se refiere a la tierra. «La escribirán» sigue de cerca la forma hebrea y evita expandir el sentido a «describir»; el contexto de mensura/surveying queda implícito.
- source_word: לְפִי נַחֲלָתָם
  english_pob_choice: according to their inheritance
  chosen_spanish: conforme a su heredad
  alternatives_spanish:
  - según su heredad
  - de acuerdo con su heredad
  lexicon: HALOT
  rationale: La locución idiomática hebrea se refiere a las porciones de herencia/asignación. «Heredad» es una opción bíblica sobria en español y mantiene el vínculo con la distribución territorial.
- source_word: וְיָבֹאוּ אֵלַי
  english_pob_choice: and they shall come to me
  chosen_spanish: y vendrán a mí
  alternatives_spanish:
  - y llegarán a mí
  - y volverán a mí
  lexicon: HALOT
  rationale: El verbo dice simplemente «venir». «Vendrán a mí» conserva la forma simple y evita introducir la idea de retorno, que no está expresada de manera explícita.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo, pero toma en cuenta la revisión inglesa más reciente al preferir «la escribirán» en lugar de una expansión interpretativa como «escribirán una descripción». También conserva el valor distributivo de לַשָּׁבֶט con una formulación natural en español y el movimiento secuencial de los verbos con un estilo público y readable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «heredad» para נַחֲלָה, coherente con el campo semántico territorial y de reparto en Josué.
  - Se evita «Cristo» y otros términos no pertinentes al pasaje.
  - El texto distingue entre el envío, el levantarse y el recorrer, preservando la secuencia verbal del hebreo.
