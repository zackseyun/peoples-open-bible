  glossary_alignment: No hay conflicto con términos teológicos principales del proyecto. La decisión sobre הַמְּנוֹרָה debe ajustarse del actual «candelabro» a «lampario» para alinearse mejor con el POB inglés («lampstand») y con la rationale documentada de traducir el objeto por significado, no por transliteración. La nota léxica sobre בְּהַעֲלֹתְךָ debe conservarse.
