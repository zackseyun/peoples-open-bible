base_translation:
  language: en
  yaml_path: translation/ot/1_kings/022/019.yaml
  text: 'Then he said[a], “Therefore hear the word of Yahweh: I saw Yahweh sitting on his throne, and all the host of heaven standing by him[b], on his right and on his left.”'
  footnotes:
  - marker: a
    text: Or “all the heavenly host” or “all the army of heaven.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “standing over him”; in context, this likely means standing beside him in attendance, as clarified by “on his right and on his left.”
    reason: lexical_alternative
