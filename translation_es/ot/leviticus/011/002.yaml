translation:
  language: es
  text: '«Hablen a los hijos de Israel, diciendo: “Este es el animal[a] que podrán comer de entre todos los animales que están sobre la tierra[b].”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Esta es la criatura viviente». Aquí se traduce «animal» para expresar de forma natural en español la categoría de seres terrestres comestibles en este contexto legal, conservando el singular del hebreo.'
    reason: lexical_alternative
  - marker: b
    text: O «que están en la tierra» o «que están en la tierra firme». La expresión distingue a las criaturas terrestres de otras categorías tratadas en el capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבְּרוּ
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Hablen
  - Decid
  lexicon: HALOT
  rationale: El imperativo plural hebreo se dirige a la autoridad que debe comunicar el mandato. En español bíblico, «Habla» conserva la fuerza directa de la instrucción sin volverla artificial.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene la expresión familiar y literal del hebreo. «Hijos de Israel» conserva la forma idiomática y la precisión genealógica que la POB inglesa preserva con «sons of Israel».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - para decir
  lexicon: HALOT
  rationale: Es la fórmula quotativa habitual. «Diciendo» reproduce el valor introductorio sin añadir matices ajenos.
- source_word: זֹאת הַחַיָּה
  english_pob_choice: This is the living creature
  chosen_spanish: Esta es la criatura viviente
  alternatives_spanish:
  - Este es el ser viviente
  - Esta es la animal
  lexicon: HALOT
  rationale: Se conserva el singular demostrativo y nominal del hebreo, como en la revisión inglesa. «Criatura viviente» traduce חַיָּה de modo amplio, sin limitarla prematuramente a una especie concreta.
- source_word: אֲשֶׁר תֹּאכְל֔וּ
  english_pob_choice: that you may eat
  chosen_spanish: que podrán comer
  alternatives_spanish:
  - que comerán
  - que pueden comer
  lexicon: HALOT
  rationale: En contexto legal, el imperfecto expresa permiso. «Podrán comer» comunica autorización; se evita una forma demasiado futura o una que borre el matiz de permiso.
- source_word: מִכָּל הַבְּהֵמָה
  english_pob_choice: from among all the animals
  chosen_spanish: de entre todos los animales
  alternatives_spanish:
  - entre todos los animales
  - de todos los animales
  lexicon: HALOT
  rationale: «De entre» refleja bien el valor partitivo de מִן con כָּל. «Animales» sigue la decisión inglesa de no estrechar בהמה aquí a «ganado» o «bestias».
- source_word: עַל הָאָרֶץ
  english_pob_choice: that are on the earth
  chosen_spanish: que están sobre la tierra
  alternatives_spanish:
  - que están en la tierra
  - que están sobre la tierra firme
  lexicon: HALOT
  rationale: «Sobre la tierra» expresa naturalmente la localización terrestre del hebreo y mantiene la distinción frente a otras categorías de criaturas del capítulo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la concordancia clasificatoria de «These are the living creatures» a «This is the living creature» para ajustarse al singular hebreo זֹאת הַחַיָּה. La versión española refleja esa misma decisión manteniendo singular («Esta es la criatura viviente») y evitando pluralizar indebidamente el referente.
  spanish_consistency_notes:
  - Se preserva el término genérico «animales» para בהמה, en línea con la decisión inglesa auditada, evitando «bestias» o «ganado» por no corresponder al contexto amplio de criaturas terrestres.
  - Se usa «hijos de Israel» como calco fiel y bíblicamente reconocible, coherente con la política del proyecto de no sustituir automáticamente expresiones genéricas cuando la forma hebrea es explícita.
  - No se introduce «SEÑOR» ni una sustitución devocional equivalente, porque en este versículo no aparece el Tetragrámaton ni una cita directa de יהוה.
