translation:
  language: es
  text: Tu ojo no se compadecerá de él[a], sino que purgarás la sangre inocente[b] de Israel, y te irá bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Tu ojo no lo perdonará la vida” o “Tu ojo no lo dejará pasar”. El hebreo usa “ojo” como imagen idiomática para la compasión o para abstenerse de ejecutar la justicia debida.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, remover de Israel la culpa por el derramamiento de sangre inocente.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָח֥וֹס עֵֽינְךָ֖ עָלָ֑יו
  english_pob_choice: Your eye shall not pity him
  chosen_spanish: Tu ojo no tendrá compasión de él[a]
  alternatives_spanish:
  - No le tendrás compasión
  - Tu ojo no lo perdonará
  lexicon: HALOT
  rationale: Conservo la imagen hebrea del “ojo” como sede de la compasión, porque el texto la usa de manera idiomática. En español, “no tendrá compasión” comunica bien el sentido afectivo sin perder la solemnidad legal; por eso se mantiene el anclaje en nota para la alternativa literal.
- source_word: וּבִעַרְתָּ
  english_pob_choice: but you shall purge
  chosen_spanish: sino que purgarás
  alternatives_spanish:
  - y limpiarás
  - y quitarás
  lexicon: HALOT
  rationale: En contexto deuteronómico, בער expresa remover o purgar la culpa/sangre del ámbito comunitario. “Purgarás” preserva la fuerza judicial y ritual del verbo mejor que un simple “quitarás”.
- source_word: דַם הַנָּקִי
  english_pob_choice: the innocent blood
  chosen_spanish: la sangre inocente[b]
  alternatives_spanish:
  - la sangre del inocente
  - la sangre derramada inocente
  lexicon: HALOT
  rationale: Sigo la lectura idiomática de sangre culpable por derramamiento de sangre inocente. “La sangre inocente” es natural en español y mantiene la brevedad y el peso legal del hebreo.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de en medio de Israel
  - de entre Israel
  lexicon: HALOT
  rationale: La preposición marca remoción del pueblo/cuerpo comunitario. “De Israel” es breve, claro y conserva el alcance corporativo.
- source_word: וְטוֹב לָךְ
  english_pob_choice: and it shall go well with you
  chosen_spanish: y te irá bien
  alternatives_spanish:
  - y te será bien
  - y te irá todo bien
  lexicon: HALOT
  rationale: La fórmula deuteronómica se expresa de forma natural en español como resultado de obediencia. “Te irá bien” es idiomático y fiel al sentido resultativo.
theological_decisions:
- issue: La compasión ante el homicida deliberado
  english_pob_reading: The verse commands the community to withhold misplaced pity and remove bloodguilt through just legal action, not personal vengeance.
  chosen_spanish_reading: El mandato exige no dejarse llevar por una compasión indebida hacia el homicida y actuar para purgar la culpa de sangre mediante justicia legal, no por venganza privada.
  alternative_spanish_readings:
  - El versículo podría leerse como una dureza indiscriminada contra cualquier culpable.
  - Podría entenderse como autorización para represalias personales.
  rationale: El contexto inmediato trata de un homicida deliberado en un procedimiento judicial. La traducción conserva la tensión entre compasión y justicia sin suavizarla ni convertirla en venganza personal.
  doctrine_reference: Deuteronomio 19:11–13
- issue: Sentido de la expresión legal sobre la sangre
  english_pob_reading: remove the bloodguilt incurred by the shedding of innocent blood from the community of Israel
  chosen_spanish_reading: purgar la sangre inocente de Israel, es decir, quitar de la comunidad la culpa causada por derramar sangre inocente.
  alternative_spanish_readings:
  - limpiar la tierra de la sangre derramada
  - quitar la sangre culpable de Israel
  rationale: La frase española principal sigue de cerca el hebreo y admite la lectura de culpa de sangre; la aclaración implícita en el giro “purgar la sangre inocente” mantiene la fuerza del original sin sobreexplicar en el cuerpo del texto.
  doctrine_reference: Números 35:33; Deuteronomio 21:8
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al texto inglés auditado; el borrador español sigue la lectura aprobada y conserva las decisiones léxicas y legales documentadas en el expediente. La verificación cruzada indicó alto acuerdo.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el hebreo fuente lo exigiría explícitamente; en este versículo no aparece el nombre divino.
  - “Purgar” se mantiene como verbo legal-teológico consistente con el uso de Deuteronomio en otros contextos.
  - Se preserva la imagen idiomática del “ojo” mediante nota, para no perder el matiz hebreo de compasión/sparing.
  - “Te irá bien” reproduce la fórmula de resultado favorable sin introducir una paráfrasis más amplia.
