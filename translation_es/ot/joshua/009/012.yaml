translation:
  language: es
  text: Este pan nuestro aún estaba caliente cuando lo tomamos de nuestras casas como provisión el día en que salimos para venir a ustedes, pero ahora, miren, está seco y se ha vuelto mohoso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha quedado mohoso» o «está manchado». El término hebreo alude a algo marcado con puntos o manchas; en el contexto del pan viejo, el matiz exacto puede ser desmenuzado, agrietado o con manchas de moho.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  english_pob_choice: This
  chosen_spanish: Este
  alternatives_spanish:
  - Aquí está este
  - Esto
  lexicon: HALOT
  rationale: El demostrativo señala el pan que presentan; «Este» conserva la deixis inmediata de forma natural en español.
- source_word: לַחְמֵנוּ
  english_pob_choice: bread of ours
  chosen_spanish: pan nuestro
  alternatives_spanish:
  - nuestro pan
  - este pan de nosotros
  lexicon: HALOT
  rationale: «Pan nuestro» reproduce bien el vínculo posesivo y mantiene un tono fluido y bíblico sin volverse arcaico.
- source_word: חָם
  english_pob_choice: warm
  chosen_spanish: estaba caliente
  alternatives_spanish:
  - estaba tibio
  - estaba fresco
  lexicon: HALOT
  rationale: En español, «caliente» comunica mejor el estado del pan al salir del horno; «tibio» debilita la fuerza descriptiva del hebreo.
- source_word: הִצְטַיַּדְנוּ אֹתוֹ
  english_pob_choice: we took it as our provisions
  chosen_spanish: lo tomamos como provisión
  alternatives_spanish:
  - nos aprovisionamos con él
  - lo llevamos como provisión para el viaje
  - lo empacamos
  lexicon: HALOT
  rationale: La idea es equiparse para el viaje con ese pan; «como provisión» conserva la función instrumental sin sobreparafrasear.
- source_word: מִבָּתֵּינוּ
  english_pob_choice: from our houses
  chosen_spanish: de nuestras casas
  alternatives_spanish:
  - de nuestros hogares
  lexicon: HALOT
  rationale: «Casas» sigue de cerca la imagen concreta del hebreo; «hogares» sería más interpretativo.
- source_word: בְּיוֹם צֵאתֵנוּ
  english_pob_choice: on the day we set out
  chosen_spanish: el día en que salimos
  alternatives_spanish:
  - el día de nuestra partida
  - cuando nos pusimos en camino
  lexicon: HALOT
  rationale: «Salimos» expresa de manera natural el inicio del viaje y conserva el valor temporal del infinitivo constructo.
- source_word: לָלֶכֶת אֲלֵיכֶם
  english_pob_choice: to come to you
  chosen_spanish: para venir a ustedes
  alternatives_spanish:
  - para ir a ustedes
  - para ir hacia ustedes
  lexicon: HALOT
  rationale: Desde la perspectiva de los hablantes, el movimiento hacia los oyentes se expresa mejor con «venir»; «ustedes» da naturalidad contemporánea.
- source_word: וְעַתָּה הִנֵּה
  english_pob_choice: but now, look
  chosen_spanish: pero ahora, miren
  alternatives_spanish:
  - y ahora, miren
  - pero ahora, vean
  lexicon: HALOT
  rationale: La combinación marca contraste e introduce evidencia visible; «miren» conserva la fuerza de atención del hebreo y la transición adversativa.
- source_word: יָבֵשׁ
  english_pob_choice: it is dry
  chosen_spanish: está seco
  alternatives_spanish:
  - se ha secado
  lexicon: HALOT
  rationale: Describe el estado presente del pan; «está seco» es breve y directo.
- source_word: וְהָיָה נִקֻּדִים
  english_pob_choice: has become moldy
  chosen_spanish: se ha vuelto mohoso
  alternatives_spanish:
  - se ha enmohecido
  - se ha vuelto manchado
  - se ha vuelto con puntitos
  lexicon: HALOT
  rationale: La revisión inglesa optó por «moldy»; en español, «mohoso» comunica mejor ese resultado visible en pan viejo y respeta el valor resultativo del hebreo. Mantiene la tensión con el matiz literal de puntos o manchas sin resolverlo en exceso.
translation_notes:
  revision_awareness: 'El texto español sigue la revisión final del audit trail inglés, que cambió la interpretación final de נִקֻּדִים de una idea de pan quebradizo a «moldy»; por eso se eligió «mohoso» como equivalente principal, manteniendo en nota la alternativa literal de «manchado» y el rango semántico de puntos/manchas. También se conservó el contraste discursivo de «pero ahora, miren» y la progresión descriptiva del pan: caliente → seco → mohoso.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no lo contiene.
  - Se usó «ustedes» para adecuación peninsular-neutral latinoamericana y evitar ambigüedad con un singular de respeto.
  - «Pan nuestro» y «provisión» conservan el tono concreto del relato sin elevarlo a lenguaje litúrgico ajeno al hebreo.
