review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del hebreo: levantarse muy temprano, proveer alimento a la unidad doméstica y dar una porción asignada a las mujeres de servicio. Sin embargo, dos elecciones no preservan tan bien como deberían la referencia social del original ni la decisión léxica auditada en inglés: «a su casa» tiende a sonar al edificio más que al conjunto del hogar, y «doncellas» en español moderno sugiere virginidad o damas jóvenes más que sirvientas/atendientas.'
  spanish_quality_summary: El español es comprensible y digno, pero «a su casa» resulta menos natural y menos preciso que «a su hogar» o «a su familia» en este contexto de alimentación. Además, «doncellas» es literario/tradicional pero hoy ambiguo. «Sirvientas» sería claro pero puede sonar algo estrecho o peyorativo; «criadas» es regional; «siervas» arrastra otra carga bíblica. «jóvenes servidoras» suena forzado. La mejor reparación mínima y ampliamente legible es «a su hogar» y «a sus sirvientas», con la nota ya preservando el matiz de porción asignada.
  glossary_alignment: No hay términos del glosario mayor implicados de forma conflictiva. La revisión propuesta mejora la alineación con la decisión inglesa «household» mediante «hogar» y con «servant girls/maidservants» mediante «sirvientas», evitando la ambigüedad moderna de «doncellas».
  issues:
  - severity: medium
    issue: «a su casa» debilita el sentido de לְבֵיתָהּ
    rationale: בַּיִת aquí se refiere mejor a la unidad doméstica que recibe alimento, no primariamente al edificio. En español, «dar comida a su casa» suena menos natural y puede entenderse literalmente del inmueble.
  - severity: medium
    issue: «doncellas» no comunica con claridad el rol de servicio de לְנַעֲרֹתֶיהָ
    rationale: Aunque históricamente puede funcionar, en español general moderno «doncella» suele evocar doncellez o una joven, no necesariamente una sirvienta. El original apunta a mujeres jóvenes al servicio de la casa.
  - severity: low
    issue: «porción» en singular es aceptable, pero el paralelo distributivo puede sonar más natural con «ración» o con la nota explicativa
    rationale: El hebreo חֹק puede ser porción fija/asignada. Mantener «porción» con nota es defendible; no requiere más cambio si se conserva el matiz en la nota.
  revised_spanish_text: Se levanta cuando aún es de noche, y da comida a su hogar, y porción[a] a sus sirvientas.
  revised_footnotes:
  - marker: a
    text: O «y una porción asignada a sus sirvientas». El hebreo de חֹק también puede significar una cuota prescrita, un debido fijo o una asignación establecida.
    reason: lexical_alternative
  revision_rationale: Se ajusta «a su casa» a «a su hogar» para reflejar mejor la referencia al conjunto doméstico alimentado, conforme al hebreo לְבֵיתָהּ y a la decisión auditada «household». Se cambia «doncellas» por «sirvientas» para comunicar con claridad el rol de servicio de נַעֲרֹתֶיהָ en español actual, evitando una lectura ambigua o demasiado arcaizante. Se conserva «porción» con nota porque reproduce bien el valor de חֹק como cuota o ración asignada.
