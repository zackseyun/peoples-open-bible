translation:
  language: es
  text: La gloria[a] de Dios es ocultar un asunto[b], y la gloria[a] de los reyes es escudriñar un asunto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «honor» en ambos hemistiquios.
    reason: lexical_alternative
  - marker: b
    text: O «esconder un asunto» y «investigar un asunto».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  lexicon: HALOT
  rationale: En el paralelismo del proverbio, כְּבֹד apunta a una dignidad o esplendor elevado. "Gloria" conserva mejor ese peso estilístico y el paralelismo entre Dios y los reyes que "honor".
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios único de la tradición sapiencial de Israel. "Dios" expresa de forma natural y fiel ese referente singular en español.
- source_word: הַסְתֵּר
  english_pob_choice: to conceal
  chosen_spanish: ocultar
  alternatives_spanish:
  - esconder
  - ocultar un asunto
  lexicon: HALOT
  rationale: El infinitivo constructo expresa la acción asociada con la gloria de Dios. "Ocultar" comunica bien la idea de poner algo fuera de vista con intención, sin perder la sobriedad sapiencial del hebreo.
- source_word: דָּבָר
  english_pob_choice: a matter
  chosen_spanish: un asunto
  alternatives_spanish:
  - una cuestión
  - una cosa
  - una palabra
  lexicon: HALOT
  rationale: En Proverbios, דָּבָר suele referirse a una realidad, tema o asunto bajo consideración, no solo a una "palabra". "Asunto" funciona de modo natural en ambos hemistiquios y mantiene el sentido investigativo.
- source_word: וּ/כְבֹד
  english_pob_choice: and the glory
  chosen_spanish: y gloria
  alternatives_spanish:
  - pero gloria
  - y la gloria
  lexicon: HALOT
  rationale: La conjunción une los dos miembros en paralelo. Se mantiene con "y" sin introducir una oposición que el hebreo no exige. Se omite el artículo por estilo poético español y porque el hebreo usa una construcción nominal breve.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - gobernantes
  - monarcas
  lexicon: HALOT
  rationale: El hebreo nombra específicamente a "reyes". Conviene conservar ese término concreto para preservar el paralelo con Dios y no ampliar indebidamente el alcance.
- source_word: חֲקֹר
  english_pob_choice: to search out
  chosen_spanish: escudriñar
  alternatives_spanish:
  - investigar
  - examinar
  - buscar
  lexicon: HALOT
  rationale: El verbo implica indagar con diligencia. "Escudriñar" es una opción digna y precisa en español bíblico, y transmite bien la búsqueda minuciosa sin reducirla a una simple "búsqueda".
- source_word: דָּבָר
  english_pob_choice: a matter
  chosen_spanish: un asunto
  alternatives_spanish:
  - una cuestión
  - una cosa
  - una palabra
  lexicon: HALOT
  rationale: Se repite con la misma equivalencia para conservar la simetría formal del proverbio y la relación entre ocultar/escudriñar el mismo objeto.
theological_decisions:
- issue: Relación entre el ocultar de Dios y el escudriñar de los reyes
  english_pob_reading: Render both cola straightforwardly without implying moral opposition or exhaustive theological explanation.
  chosen_spanish_reading: Presentar ambos hemistiquios de manera directa, sin convertirlos en una oposición moral ni en una doctrina desarrollada sobre revelación o gobierno.
  alternative_spanish_readings:
  - Interpretar el dicho como contraste entre el misterio divino y la investigación humana
  - Leerlo como participación conjunta en la sabiduría, donde los reyes descubren lo que Dios ha ocultado
  rationale: 'El proverbio ofrece un paralelismo poético sobre la gloria respectiva de Dios y de los reyes: Dios al ocultar, los reyes al escudriñar. La traducción debe preservar esa tensión sin resolverla ni expandirla más allá del texto hebreo.'
  doctrine_reference: Preservar la tensión teológica del proverbio sin sobre-explicarla.
translation_notes:
  revision_awareness: La revisión auditada más reciente no introdujo cambios; el texto mantiene plena conformidad con el análisis aprobado y con la decisión de preservar el paralelismo breve del hebreo.
  spanish_consistency_notes:
  - Se mantiene "gloria" de forma consistente para כְּבֹד, en paralelo con el uso aprobado en el registro POB.
  - '"Asunto" se repite en ambos hemistiquios para reflejar דָּבָר con simetría formal y sentido sapiencial.'
  - '"Escudriñar" preserva un matiz de búsqueda diligente acorde con el registro bíblico en español.'
  - El orden nominal breve ('Gloria de Dios... gloria de reyes...') respeta la concisión hebrea sin forzar una sintaxis más explicativa.
