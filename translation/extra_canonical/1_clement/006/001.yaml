source:
  edition: Funk 1901 (normalized OCR)
  text: Τούτοις τοῖς ἀνδράσιν ὁσίως πολιτευσαμενοις συνηθροίσθη πολὺ πλῆθος ἐκλεκτῶν, οἵτινες πολλαῖς αἰκίαις καὶ βασάνοις διὰ ζῆλος παθόντες ὑπόδειγμα κάλλιστον ἐγένοντο ἐν ἡμῖν. 2. διὰ ζῆλος διωχθεῖσαι γυναῖκες Δαναΐδες καὶ Δίρκαι, αἰκίσματα δεινὰ καὶ ἀνδρία παθοῦσαι, ἐπὶ τὸν τῆς πίστεως βέβαιον δρόμον κατήντησαν καὶ ἔλαβον γέρας γενναῖον αἱ ἀσθενεῖς τῷ σώματι. 3. ζῆλος ἀπηλλοτρίωσεν γυναῖκας ἀνδρῶν καὶ ἠλλοίωσεν τὸ ῥηθὲν ὑπὸ τοῦ πατρὸς ἡμῶν Ἀδάμ· Τοῦτο νῦν ὀστοῦν ἐκ τῶν ὀστέων μου καὶ σὰρξ ἐκ τῆς σαρκός μου. 4. ζῆλος καὶ ἔρις πόλεις μεγάλας κατέστρεψεν καὶ ἔθνη μεγάλα ἐξερίζωσεν.
