base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/004/010.yaml
  text: And from that day on[a], half of my young men were doing the work, and half of them were holding the spears, the shields, the bows, and the armor[c][b]; and the officers were behind all the house of Judah.
  footnotes:
  - marker: a
    text: Or 'my servants' or 'my attendants' for 'my young men' (נְעָרַי), since the Hebrew term can refer to youths, servants, or retainers depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the coats of mail' or 'the breastplates' for 'the armor'; the Hebrew term refers to body armor.
    reason: lexical_alternative
  - marker: c
    text: '''The officers stood behind all the house of Judah'' may imply military support or supervisory positioning behind the Judean workers.'
    reason: cultural_note
