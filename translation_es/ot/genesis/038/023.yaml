translation:
  language: es
  text: 'Y Judá dijo[a]: «Que se las quede; no sea que lleguemos a ser objeto de burla. Mira, yo envié este cabrito, pero tú no la encontraste».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no sea que lleguemos a ser una deshonra» o «no sea que se burlen de nosotros». La expresión hebrea habla de llegar a ser objeto de desprecio o escarnio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר יְהוּדָה
  english_pob_choice: And Judah said
  chosen_spanish: Y Judá dijo
  alternatives_spanish:
  - Entonces Judá dijo
  - Y dijo Judá
  lexicon: N/A
  rationale: Se conserva el nombre propio Judá con la coordinación narrativa simple del hebreo, en un español natural y sobrio.
- source_word: תִּקַּח לָהּ
  english_pob_choice: Let her keep them
  chosen_spanish: Que la conserve
  alternatives_spanish:
  - Que los guarde
  - Déjeselos
  lexicon: HALOT
  rationale: 'El hebreo tiene un valor concesivo/permisivo: Judá acepta que Tamar retenga el objeto prenda. En español, «que la conserve» mantiene el sentido idiomático sin forzar una literalidad extraña; el antecedente colectivo se entiende por el contexto.'
- source_word: פֶּן נִהְיֶה לָבוּז
  english_pob_choice: lest we become a laughingstock
  chosen_spanish: no sea que lleguemos a ser objeto de burla
  alternatives_spanish:
  - no sea que lleguemos a ser despreciados
  - no sea que quedemos en vergüenza
  - no sea que se burlen de nosotros
  lexicon: HALOT
  rationale: בּוּז expresa desprecio, escarnio o burla. «Objeto de burla» conserva bien la idea social de quedar expuestos al ridículo, sin perder la fuerza del término.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Observa
  lexicon: HALOT
  rationale: La partícula deíctica se vierte con un imperativo natural en español que llama la atención sobre la afirmación siguiente.
- source_word: שָׁלַחְתִּי הַגְּדִי הַזֶּה
  english_pob_choice: I sent this young goat
  chosen_spanish: yo envié este cabrito
  alternatives_spanish:
  - yo envié este joven cabrito
  - yo envié este chivo
  - yo envié este cabrito joven
  lexicon: HALOT
  rationale: גְּדִי designa un cabrito o cría de cabra. «Cabrito» es claro y natural en español; no se añadió «joven» porque ya está implícito en el sustantivo.
- source_word: וְאַתָּה לֹא מְצָאתָהּ
  english_pob_choice: but you did not find her
  chosen_spanish: y tú no la hallaste
  alternatives_spanish:
  - pero tú no la hallaste
  - y no la encontraste
  lexicon: HALOT
  rationale: Se mantiene el contraste narrativo sin exagerarlo; «hallaste» reproduce bien el verbo de encontrar y la referencia femenina al objeto de la búsqueda.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que pasó de «it» a «them» por el objeto plural implícito en la prenda, pero en español se resolvió con un singular colectivo idiomático («la» / «la conserve») porque el antecedente es una prenda/garantía tratada como unidad en el flujo narrativo. Se mantuvo la equivalencia de sentido sin forzar pluralidad en la superficie española.
  spanish_consistency_notes:
  - Se usa «Judá» como nombre propio estándar.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «cabrito» traduce el animal joven de forma natural y precisa.
  - La nota [a] está anclada en el texto para reflejar la ambigüedad léxica de לָבוּז.
