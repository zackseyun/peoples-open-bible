revisions:
- from: Ezequías fue el que tapó el manantial superior de las aguas de Guijón[a] y las dirigió hacia abajo, hacia el oeste, a la ciudad de David[b]. Y Ezequías prosperó en todas sus obras.
  to: Ezequías fue el que tapó la salida[a] superior de las aguas de Guijón y las dirigió hacia abajo, hacia el oeste, a la ciudad de David[b]. Y Ezequías prosperó en todas sus obras.
  rationale: Se corrige el término principal para reflejar mejor מוֹצָא como «salida» en vez de «manantial», siguiendo la evidencia hebrea y la decisión léxica auditada en inglés. Se conserva la alternativa «manantial superior» en nota, que es donde mejor encaja. El resto del texto es suficientemente fiel y natural para mantenerse.
