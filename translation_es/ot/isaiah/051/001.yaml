  - marker: b
    text: El versículo 2 identifica esta imagen con Abraham y Sara.
    reason: cross_reference
  - marker: c
    text: O «de la cual fueron labrados».
    reason: lexical_alternative
  revision_rationale: Se corrige «justicia» a «rectitud» para alinearse con la decisión contextual de צֶדֶק en el expediente inglés, dejando «justicia» como alternativa en nota. Se reemplaza «cantero» por «cantera», que sí corresponde a la imagen de excavación/cantera del hebreo y produce español natural. Se ajusta la nota [a], que estaba defectuosa, y se prefiere «roca» sobre «peña» por mayor claridad sin perder la metáfora.
