translation:
  language: es
  text: Entonces Josué llamó a los doce hombres que había designado[a] de entre los hijos de Israel[b], un hombre de cada tribu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que había preparado» o «que había nombrado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de los israelitas». El hebreo dice «de los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: El verbo קרא en este contexto introduce la acción de Josué al llamar a los hombres para reunirse con él. «Llamó» conserva la naturalidad del español y refleja bien el valor básico del hebreo sin intensificar indebidamente a «convocó».
- source_word: אֶל
  english_pob_choice: called to
  chosen_spanish: llamó a
  alternatives_spanish:
  - llamó hacia
  - llamó para sí
  lexicon: HALOT
  rationale: La preposición marca el movimiento relacional hacia Josué; en español se expresa de manera idiomática con «llamó a», sin necesidad de reproducirla de forma más pesada.
- source_word: שְׁנֵים הֶעָשָׂר אִישׁ
  english_pob_choice: the twelve men
  chosen_spanish: los doce hombres
  alternatives_spanish:
  - los doce varones
  - doce hombres
  lexicon: HALOT
  rationale: El grupo ya está definido por el contexto, por lo que el artículo es apropiado en español. «Hombres» conserva el referente humano y es una traducción directa y clara de אִישׁ en plural colectivo.
- source_word: אֲשֶׁר הֵכִין
  english_pob_choice: whom he had appointed
  chosen_spanish: que había designado
  alternatives_spanish:
  - que había preparado
  - que había nombrado
  lexicon: HALOT
  rationale: כין puede significar «preparar», «disponer» o «designar/nombrar». En este pasaje la función es seleccionar representantes de Israel, así que «designado» comunica mejor la intención que «preparado», sin perder la posibilidad semántica reconocida por el audit trail inglés.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the sons of Israel
  chosen_spanish: de entre los hijos de Israel
  alternatives_spanish:
  - de entre los israelitas
  - de los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma filial del hebreo con «hijos de Israel», y la preposición «de entre» expresa con naturalidad la idea de selección dentro del grupo. Se conserva así la terminología marcada por el texto fuente, sin sustituirla por una simplificación etnonímica.
- source_word: אִישׁ אֶחָד אִישׁ אֶחָד מִשָּׁבֶט
  english_pob_choice: one man from each tribe
  chosen_spanish: un hombre de cada tribu
  alternatives_spanish:
  - uno por cada tribu
  - un hombre de una tribu
  lexicon: HALOT
  rationale: La repetición distributiva hebrea se vierte de modo idiomático como «un hombre de cada tribu». Esto preserva la idea representativa sin forzar una repetición poco natural en español.
translation_notes:
  revision_awareness: La versión coincide con el estado de alta concordancia del expediente inglés y no introduce cambios revisionales respecto del sentido auditado; mantiene la misma decisión de traducir הכין como una designación previa, con el matiz de selección representativa dentro de Israel.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; en este versículo no ocurre.
  - Se usa «hijos de Israel» para conservar la formulación del hebreo y el marco de selección tribal.
  - Se evita «señor»/«SEÑOR» y se mantiene una sintaxis española fluida sin perder el valor distributivo del texto fuente.
  - La traducción de הכין se ha resuelto con un término de nombramiento/designación, conforme al contexto y al audit trail inglés.
