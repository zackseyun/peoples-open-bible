translation:
  language: es
  text: Así que ustedes están malditos[a], y no dejará de haber entre ustedes esclavos, leñadores y aguadores para la casa de mi Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «no será quitado de entre ustedes un esclavo»; el hebreo expresa una condición continua: su pueblo seguiría aportando ese trabajo de manera permanente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  lexicon: HALOT
  rationale: Expresa en español la transición discursiva hacia la consecuencia del juramento/juicio, con un giro natural que mantiene la fuerza conclusiva de la partícula.
- source_word: אֲרוּרִים
  english_pob_choice: cursed
  chosen_spanish: están malditos
  alternatives_spanish:
  - están bajo maldición
  - son malditos
  lexicon: HALOT
  rationale: El adjetivo plural predicativo se vierte de forma directa. 'Malditos' conserva la dureza del juicio y es idiomático en español bíblico contemporáneo.
- source_word: וְלֹא יִכָּרֵת מִכֶּם עֶבֶד
  english_pob_choice: there shall never cease to be from among you slaves
  chosen_spanish: no dejará de haber entre ustedes esclavos
  alternatives_spanish:
  - nunca será cortado de entre ustedes un esclavo
  - no será quitado de entre ustedes un esclavo
  lexicon: HALOT
  rationale: La construcción nifal con מן expresa permanencia de la condición y no mera presencia accidental. 'No dejará de haber entre ustedes' comunica bien el estado continuo sin diluir el sentido de imposición; 'esclavos' conserva la fuerza de עֶבֶד.
- source_word: עֶבֶד
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: HALOT
  rationale: Aquí el término señala subordinación forzada, no servicio voluntario. 'Esclavos' refleja mejor la carga semántica que 'siervos'.
- source_word: חֹטְבֵי עֵצִים
  english_pob_choice: cutters of wood
  chosen_spanish: cortadores de leña
  alternatives_spanish:
  - leñadores
  - cortadores de madera
  lexicon: HALOT
  rationale: La imagen del trabajo asignado se mantiene con un español claro y natural. 'Leña' resulta más idiomático en este contexto de labores domésticas/templarias que 'madera'.
- source_word: שֹׁאֲבֵי מַיִם
  english_pob_choice: drawers of water
  chosen_spanish: aguadores
  alternatives_spanish:
  - sacadores de agua
  - transportadores de agua
  lexicon: HALOT
  rationale: '''Aguadores'' es un término español breve y comprensible para quienes llevan o extraen agua, conservando el oficio concreto sin exceso de expansión.'
- source_word: לְבֵית אֱלֹהָי
  english_pob_choice: for the house of my God
  chosen_spanish: para la casa de mi Dios
  alternatives_spanish:
  - para la casa de mi Dios
  - para el templo de mi Dios
  lexicon: HALOT
  rationale: Se mantiene la referencia cultual literal de בַּיִת como 'casa', que en este contexto alude al santuario de Yahvé. 'Mi Dios' refleja la primera persona del hebreo.
theological_decisions:
- issue: Referencia al nombre divino en la fórmula 'mi Dios'
  english_pob_reading: for the house of my God
  chosen_spanish_reading: para la casa de mi Dios
  alternative_spanish_readings:
  - para la casa de mi Dios
  - para la casa de mi Dios, Yahvé
  rationale: El hebreo dice 'mi Dios' y no usa aquí el tetragrámaton explícito. En español se mantiene la forma posesiva sin añadir el nombre divino, aunque el referente cultual es Yahvé por el contexto de Josué.
  doctrine_reference: Principios de fidelidad al texto fuente; contexto canónico de Josué 9
- issue: Carga de servidumbre impuesta
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - sirvientes
  rationale: La maldición describe una condición coercitiva y heredada; 'esclavos' preserva esa severidad. Usar 'siervos' suavizaría indebidamente el juicio y borraría la tensión lexical señalada por la tradición auditada.
  doctrine_reference: Criterio léxico de fuerza semántica en términos de subordinación forzada
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que corrigió el enfoque de 'algunos de ustedes' hacia 'entre ustedes' para reflejar mejor el hebreo. También conserva la tríada laboral ('esclavos, cortadores de leña y aguadores') y el registro formal, evitando suavizar עֶבֶד.
  spanish_consistency_notes:
  - Se mantiene 'casa de mi Dios' como fórmula cultual literal; no se sustituye por 'templo' salvo que el contexto exigiera aclaración.
  - '''Aguadores'' evita una paráfrasis más larga y conserva un oficio concreto reconocible en español.'
  - La nota[a] está anclada en el texto exactamente donde corresponde y ofrece la alternativa formal documentada por el POB inglés.
