base_translation:
  language: en
  yaml_path: translation/ot/2_kings/004/039.yaml
  text: Then one man went out into the field to gather herbs[a], and he found a wild vine and gathered from it wild gourds, filling his garment. Then he came and sliced them into the pot of stew[c][b], though they did not know what they were.
  footnotes:
  - marker: a
    text: Or 'greens' for 'herbs.' The Hebrew refers broadly to edible plants gathered from the field.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a vine of the field' ... 'gourds of the field'; that is, a wild vine bearing wild gourds.
    reason: lexical_alternative
  - marker: c
    text: Or 'for they did not know' / 'because they did not know.' The Hebrew conjunction can be read as explanatory.
    reason: lexical_alternative
