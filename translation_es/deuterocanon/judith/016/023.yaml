review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del griego: Judith siguió prosperando, envejeció en la casa de su marido, dejó libre a su asistente femenina, murió en Betulia y fue sepultada en la cueva de Manasés. Sin embargo, hay un problema importante de referencia en las notas: la nota [b] está anclada a «sirvienta», pero su contenido habla del término griego para la mujer liberada y no de Betulia; mientras tanto, en la versión inglesa la nota b aparece sobre «Bethulia», aunque su contenido realmente explica «maidservant». Dado el requisito de coherencia interna en español, conviene reanclar la nota a «sirvienta» y mantener una numeración propia y consistente. Además, «por ciento cinco años» suena menos natural y puede sugerir duración de estancia más que edad alcanzada; en español bíblico claro, «hasta los ciento cinco años» expresa mejor el dato biográfico sin alejarse del griego.'
  spanish_quality_summary: El texto es generalmente claro y digno. «Siguió prosperando grandemente» es comprensible, pero «mucho» suena más natural que «grandemente» en español actual. «En casa de su marido» y «la sepultaron» son adecuados. «Sirvienta» funciona, aunque el contexto de liberación ya sugiere dependencia servil, bien explicado en nota. La mejora principal es idiomática en la expresión de la edad.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión de no usar «esclava» en el texto principal es defendible porque ἅβρα no es δοῦλη, y la nota conserva la implicación servil por el acto de liberación. No hay conflicto con Yahvé/Mesías/Cristo/etc.
  issues:
  - severity: medium
    issue: La expresión «por ciento cinco años» es poco natural en español y ambigua.
    rationale: Puede leerse como duración de permanencia en la casa de su marido, no como edad alcanzada. «Hasta los ciento cinco años» comunica con más claridad el sentido biográfico del pasaje.
  - severity: low
    issue: «Grandemente» suena algo acartonado en español contemporáneo.
    rationale: Aunque es comprensible, «mucho» o «en gran manera» resultan más naturales; «mucho» mantiene bien la intensificación sin rigidez.
  - severity: medium
    issue: La documentación de notas arrastra una inconsistencia del audit trail inglés.
    rationale: La nota sobre la condición de la mujer liberada debe estar anclada en español a «sirvienta»/«criada», no a otro elemento. El registro final debe quedar internamente coherente aunque el inglés presente un desajuste de marcador.
  revised_spanish_text: Y siguió prosperando mucho[a], y envejeció en casa de su marido hasta los ciento cinco años, y dejó libre a su sirvienta[b]. Luego murió en Betulia, y la sepultaron en la cueva de su marido Manasés.
  revised_footnotes:
  - marker: a
    text: 'O: «siguió llegando a ser muy grande»; el griego literalmente habla de «avanzar» o «hacerse grande» con fuerte intensificación.'
    reason: lexical_alternative
  - marker: b
    text: El término griego para la mujer que Judith liberó designa a una atendiente o sirvienta; como el texto dice que la dejó libre, el pasaje implica una condición servil o dependiente.
    reason: lexical_alternative
  revision_rationale: Se ajustó la expresión temporal a un español más claro y natural («hasta los ciento cinco años»), se suavizó «grandemente» a «mucho» por legibilidad, y se dejó la nota sobre la mujer liberada correctamente anclada en el término correspondiente dentro del texto español.
