translation:
  language: es
  text: He aquí[a], como un águila subirá, volará y extenderá sus alas sobre Bosra, y el corazón de los guerreros de Edom en aquel día será como el corazón de una mujer con dolores de parto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como un buitre'; el hebreo puede designar de manera más amplia un ave grande de presa, aunque 'águila' es la traducción convencional en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Mira, pues
  lexicon: HALOT
  rationale: Conserva el llamado profético de atención con tono solemne y natural en español bíblico, sin volverlo demasiado coloquial.
- source_word: כַנֶּשֶׁר
  english_pob_choice: like an eagle
  chosen_spanish: como un águila
  alternatives_spanish:
  - como un buitre
  - como un ave de rapiña
  lexicon: HALOT
  rationale: Sigo la decisión inglesa convencional de 'eagle' para la imagen de ataque rápido; 'águila' es la forma más natural en español y mantiene la fuerza de la comparación, aunque el hebreo puede ser más amplio.
- source_word: יַעֲלֶה
  english_pob_choice: he will rise up
  chosen_spanish: subirá
  alternatives_spanish:
  - se alzará
  - ascenderá
  lexicon: HALOT
  rationale: עלה aquí expresa movimiento ascendente dentro de la imagen del ave; 'subirá' es claro y directo en español, sin añadir matices no requeridos.
- source_word: וְיִדְאֶה
  english_pob_choice: and soar
  chosen_spanish: y se elevará
  alternatives_spanish:
  - y volará
  - y planeá
  lexicon: HALOT
  rationale: La forma verbal describe el planeo o vuelo extendido del ave; 'se elevará' conserva la idea de ascenso y vuelo sostenido sin introducir la caída implícita en otras opciones.
- source_word: וְיִפְרֹשׂ כְּנָפָיו
  english_pob_choice: and spread his wings
  chosen_spanish: y extenderá sus alas
  alternatives_spanish:
  - y desplegará sus alas
  - y abrirá sus alas
  lexicon: HALOT
  rationale: '''Extenderá sus alas'' reproduce con naturalidad el gesto de abrirse en vuelo y preserva la imagen de dominio amenazante sobre la ciudad.'
- source_word: עַל בָּצְרָה
  english_pob_choice: over Bozrah
  chosen_spanish: sobre Bosra
  alternatives_spanish:
  - contra Bosra
  - encima de Bosra
  lexicon: HALOT
  rationale: El 'sobre' español sigue el valor espacial de עַל en la imagen de alas desplegadas. Se translitera el topónimo como Bosra para mantener consistencia bíblica en español.
- source_word: לֵב גִּבּוֹרֵי אֱדוֹם
  english_pob_choice: the heart of Edom’s warriors
  chosen_spanish: el corazón de los guerreros de Edom
  alternatives_spanish:
  - el corazón de los valientes de Edom
  - el ánimo de los guerreros de Edom
  lexicon: HALOT
  rationale: '''Guerreros'' refleja bien גִּבּוֹרִים y mantiene el tono militar. Conservo ''corazón'' como metáfora antropológica literal, en lugar de interpretarlo como ''ánimo''.'
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en aquel tiempo
  lexicon: HALOT
  rationale: La fórmula profética se traduce de manera estable con 'en aquel día', que suena natural en español bíblico y preserva la deixis escatológica o judicial del texto.
- source_word: וְהָיָה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - quedará
  lexicon: HALOT
  rationale: En español, 'será' corresponde de forma más cercana y sobria al valor copulativo-resultativo del hebreo en este contexto, sin añadir un matiz de transformación que el texto no exige.
- source_word: כְּלֵב אִשָּׁה מְצֵרָה
  english_pob_choice: like the heart of a woman in labor
  chosen_spanish: como el corazón de una mujer en parto
  alternatives_spanish:
  - como el corazón de una mujer con dolores de parto
  - como el corazón de una mujer en labor
  lexicon: HALOT
  rationale: מְצֵרָה alude a la mujer en contracción, angustia o parto; 'en parto' es una forma breve y comprensible que conserva la imagen de dolor intenso. Se evita 'labor' por sonar menos natural en español general.
theological_decisions:
- issue: Referente implícito del atacante parecido a un águila
  english_pob_reading: Rendered with the Hebrew singular pronoun 'he' without identifying the referent in translation.
  chosen_spanish_reading: Se conserva el sujeto implícito mediante 'subirá' / 'se elevará', sin identificar al invasor.
  alternative_spanish_readings:
  - él subirá y se elevará
  - el rey de Babilonia subirá
  - vendrá como un águila
  rationale: El hebreo mantiene la figura sin nombrar expresamente al agente en el versículo; por eso el español no precisa el referente más allá de la imagen profética. Esto preserva la apertura literaria y teológica del texto.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla de forma indebida.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail inglés: se evita añadir una caída explícita al verbo del ave y se mantiene la comparación simple ''será como'' en lugar de una formulación más interpretativa. También se conserva el paralelismo entre la imagen del ave y el paralelismo final con la mujer en parto, sin expandirlo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'Bosra' como topónimo transliterado, coherente con la práctica del proyecto.
  - '''Corazón'' se conserva literalmente para reflejar la antropología hebrea, en vez de convertirlo en ''ánimo'' o ''valor''.'
  - La comparación con 'una mujer en parto' preserva la imaginería de dolor intenso sin reinterpretarla como mero temor.
