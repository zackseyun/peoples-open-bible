translation:
  language: es
  text: Saúl lo tomó aquel día y no le permitió regresar a la casa de su padre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no le dio permiso para regresar». El hebreo dice literalmente «no le dio para volver», usando נתן de manera idiomática para expresar permiso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּחֵהוּ
  english_pob_choice: took him
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo recibió
  - lo tomó para su servicio
  lexicon: HALOT
  rationale: לקח significa básicamente «tomar». En este contexto se trata de que Saúl incorpora a David a su esfera/corte, pero «lo tomó» conserva de cerca la forma verbal hebrea sin añadir una interpretación más amplia que el texto no explicita aquí.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saúl rey
  lexicon: nombre propio
  rationale: Se mantiene el nombre propio sin expansión, como en el hebreo y en el antecedente inglés.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - ese día
  lexicon: HALOT
  rationale: La expresión temporal indica un día específico ya referido; «aquel día» es natural en español y preserva esa referencia.
- source_word: וְלֹא נְתָנוֹ
  english_pob_choice: did not allow him
  chosen_spanish: no le permitió
  alternatives_spanish:
  - no le dio permiso
  - no lo dejó
  lexicon: HALOT
  rationale: נתן con infinitivo funciona idiomáticamente como permiso/autorizar. «No le permitió» refleja ese valor sin calcar de forma opaca «no le dio».
- source_word: לָשׁוּב
  english_pob_choice: to return
  chosen_spanish: regresar
  alternatives_spanish:
  - volver
  - retornar
  lexicon: HALOT
  rationale: שׁוב se traduce normalmente como «volver/regresar». «Regresar» es claro y natural en este contexto.
- source_word: בֵּית אָבִיו
  english_pob_choice: his father's house
  chosen_spanish: la casa de su padre
  alternatives_spanish:
  - la casa paterna
  - el hogar de su padre
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de hogar/linaje paterno. «La casa de su padre» preserva el giro sin volverlo demasiado interpretativo.
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente: no se registran cambios aplicados y el estado final fue marcado como sin cambios, con alto acuerdo entre controles.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como terminología por defecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se evita «siervo» porque el hebreo no usa aquí עבד; el verbo לקח se mantiene con el valor de «tomar».
  - La nota conserva la alternativa idiomática documentada por el POB inglés para נתן, en una formulación natural en español.
