id: JOS.18.16
reference: Joshua 18:16
source:
  edition: WLC
  text: וְ/יָרַ֨ד הַ/גְּב֜וּל אֶל קְצֵ֣ה הָ/הָ֗ר אֲשֶׁר֙ עַל פְּנֵי֙ גֵּ֣י בֶן הִנֹּ֔ם אֲשֶׁ֛ר בְּ/עֵ֥מֶק רְפָאִ֖ים צָפ֑וֹנָ/ה וְ/יָרַד֩ גֵּ֨י הִנֹּ֜ם אֶל כֶּ֤תֶף הַ/יְבוּסִי֙ נֶ֔גְבָּ/ה וְ/יָרַ֖ד עֵ֥ין רֹגֵֽל־־־־׃
translation:
  text: Then the border went down to the end of the mountain that faces the Valley of Ben-hinnom[a], which is at the northern end of the Valley of Rephaim. Then it went down the Valley of Hinnom to the southern slope of the Jebusite[c][b], and went down to En-rogel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the Valley of the son of Hinnom'; rendered 'Ben-hinnom' here as a place name.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the southern shoulder/side of the Jebusite'; 'the Jebusite city' makes explicit the likely reference to the Jebusite settlement, that is, Jerusalem, in this boundary description.
    reason: lexical_alternative
  - marker: c
    text: En-rogel is a place name; literally, 'spring of Rogel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרַד / הַגְּבוּל
  chosen: Then the border went down
  alternatives:
  - and the border descended
  - and the boundary went down
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/descend.' In boundary descriptions, 'went down' is natural modern English while preserving the topographical sense. 'Border' is chosen for גְּבוּל as the territorial line being described.
- source_word: קְצֵה הָהָר
  chosen: the end of the mountain
  alternatives:
  - the extremity of the hill
  - the edge of the mountain
  lexicon: HALOT
  rationale: קָצֶה denotes an extremity or end. 'Mountain' reflects הָר straightforwardly, though 'hill' is possible in local topography; 'mountain' stays closer to the Hebrew.
- source_word: אֲשֶׁר עַל־פְּנֵי גֵּי בֶן־הִנֹּם
  chosen: that faces the Valley of Ben-hinnom
  alternatives:
  - that is opposite the Valley of Ben-hinnom
  - that is before the Valley of Ben-hinnom
  lexicon: HALOT
  rationale: עַל־פְּנֵי often conveys spatial relation such as 'in front of' or 'opposite/facing.' 'Faces' is idiomatic and fits the geographic description. The place name is transliterated as Ben-hinnom.
- source_word: גֵּי בֶן־הִנֹּם
  chosen: the Valley of Ben-hinnom
  alternatives:
  - the Valley of the son of Hinnom
  lexicon: HALOT
  rationale: Because the phrase functions as a place name, transliteration better follows the project's principle to transliterate names while preserving recognizability. The more literal alternative is preserved as a lexical alternative.
- source_word: אֲשֶׁר בְּעֵמֶק רְפָאִים צָפוֹנָה
  chosen: which is at the northern end of the Valley of Rephaim
  alternatives:
  - which is northward in the Valley of Rephaim
  - which lies on the north in the Valley of Rephaim
  lexicon: HALOT
  rationale: The clause locates the mountain relative to the Valley of Rephaim. צָפוֹנָה is directional ('northward/to the north'). 'At the northern end of' makes the geographic relation clear in English without over-paraphrasing.
- source_word: גֵּי הִנֹּם
  chosen: the Valley of Hinnom
  alternatives:
  - the valley of Hinnom
  lexicon: HALOT
  rationale: A proper place name; transliterated rather than translated. Capitalization reflects its status as a named valley.
- source_word: אֶל־כֶּתֶף הַיְבוּסִי נֶגְבָּה
  chosen: to the southern slope of the Jebusite city
  alternatives:
  - to the southern shoulder of the Jebusite
  - to the south side of the Jebusite
  lexicon: HALOT
  rationale: כֶּתֶף literally means 'shoulder,' but in topographical contexts it refers to a slope or side. 'Southern slope' is the clearest English equivalent. הַיְבוּסִי literally 'the Jebusite' likely stands metonymically for the Jebusite settlement, i.e., Jerusalem; 'city' is supplied for intelligibility based on the geographic context and parallel boundary texts.
- source_word: עֵין רֹגֵל
  chosen: En-rogel
  alternatives:
  - the spring of Rogel
  lexicon: HALOT
  rationale: This is a place name, so transliteration follows project policy. The literal sense of עֵין as 'spring' is not foregrounded in the main text because the expression functions as a proper noun.
