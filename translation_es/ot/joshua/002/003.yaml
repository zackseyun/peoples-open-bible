translation:
  language: es
  text: 'Entonces el rey de Jericó envió a Rahab, diciendo: «Saca a los hombres que vinieron a ti, que entraron en tu casa, porque han venido a reconocer[a] toda la región».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a espiar toda la región». El verbo hebreo puede llevar en este contexto el sentido de reconocimiento de espionaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo hebreo שׁלח en este contexto expresa el envío de un mensaje o mensajeros. «Envió» reproduce con naturalidad la acción narrativa sin añadir matices no presentes en el hebreo.
- source_word: מֶלֶךְ יְרִיחוֹ
  english_pob_choice: the king of Jericho
  chosen_spanish: el rey de Jericó
  alternatives_spanish:
  - Jericó, su rey
  - el rey jericó
  lexicon: HALOT
  rationale: La relación de constructo se expresa de forma natural en español con «de». Mantiene la referencia política y geográfica del original.
- source_word: אֶל רָחָב
  english_pob_choice: to Rahab
  chosen_spanish: a Rahab
  alternatives_spanish:
  - para Rahab
  - contra Rahab
  lexicon: HALOT
  rationale: אֶל marca aquí el destinatario del envío. «A Rahab» es la equivalencia directa y más natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo quotativo introduce el discurso directo. «Diciendo» conserva esa función sin sobrerelaborarla.
- source_word: הוֹצִיאִי
  english_pob_choice: Bring out
  chosen_spanish: Saca
  alternatives_spanish:
  - Haz salir
  - Trae fuera
  lexicon: HALOT
  rationale: El hifil de יצא expresa causar que alguien salga. «Saca» transmite con concisión la orden dirigida a Rahab, con la fuerza imperativa del hebreo.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - las personas
  lexicon: HALOT
  rationale: אֲנָשִׁים se refiere específicamente a individuos masculinos; «los hombres» respeta el dato léxico y el contexto de los espías.
- source_word: הַבָּאִים אֵלַיִךְ
  english_pob_choice: who came to you
  chosen_spanish: que vinieron a ti
  alternatives_spanish:
  - que están viniendo a ti
  - que llegaron a ti
  lexicon: HALOT
  rationale: El participio funciona descriptivamente. En español, una relativa en pasado resulta más natural para la narración y mantiene el valor referencial.
- source_word: אֲשֶׁר בָּאוּ לְבֵיתֵךְ
  english_pob_choice: who entered your house
  chosen_spanish: que entraron en tu casa
  alternatives_spanish:
  - que vinieron a tu casa
  - que se metieron en tu casa
  lexicon: HALOT
  rationale: בוא con la preposición de destino se concreta aquí con el movimiento hacia el interior de la casa. «Entraron en tu casa» preserva el segundo matiz de desplazamiento sin forzar un giro más interpretativo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la orden. En español, «porque» comunica con claridad la causalidad explícita del hebreo.
- source_word: לַחְפֹּר
  english_pob_choice: to search out
  chosen_spanish: a reconocer
  alternatives_spanish:
  - a espiar
  - a explorar
  lexicon: HALOT
  rationale: El verbo חפר en este contexto tiene el sentido de reconocimiento/investigación del terreno. «Reconocer» preserva el matiz de exploración militar sin imponer en el texto principal una traducción más técnica que el español bíblico tradicional puede percibir como menos natural.
- source_word: אֶת כָּל הָאָרֶץ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra del país
  - toda la región
  lexicon: HALOT
  rationale: הָאָרֶץ se refiere al territorio en cuestión. «Toda la tierra» mantiene el alcance total del original y su resonancia geográfica en la narrativa de conquista.
- source_word: בָּאוּ
  english_pob_choice: they have come
  chosen_spanish: han venido
  alternatives_spanish:
  - vinieron
  - han llegado
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa de modo natural con el perfecto compuesto en español para subrayar la relevancia inmediata del hecho al momento del mandato.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y la solución inglesa auditada, manteniendo la misma línea léxica en los puntos clave: envío, destinatario, orden imperativa y matiz de reconocimiento de la tierra. No se introdujeron cambios doctrinales ni variantes textuales.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se eligió «reconocer» para לַחְפֹּר conforme al matiz de reconocimiento militar documentado en la nota inglesa, evitando una simplificación a «espiar» en el texto principal.
  - La construcción «entraron en tu casa» conserva la doble referencia de llegada a la persona y entrada a la vivienda sin perder fluidez en español.
  - El tono general es sobrio y bíblico, pero con sintaxis española moderna para lectura pública.
