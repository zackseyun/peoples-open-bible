base_translation:
  language: en
  yaml_path: translation/ot/ruth/003/004.yaml
  text: Then[a], when he lies down, note the place where he lies. Then go, uncover his feet, and lie down[b], and he will tell you what you should do.
  footnotes:
  - marker: a
    text: Or possibly 'the place by his feet' or 'the lower part of him'; the Hebrew expression may refer more specifically to the area around his feet than to the feet alone.
    reason: lexical_alternative
  - marker: b
    text: The written Hebrew form reads 'and I lay down,' but the context and traditional reading understand it as 'and you lie down.'
    reason: textual_variant
