translation:
  language: es
  text: No envié a los profetas[a], pero ellos corrieron; no les hablé, pero ellos profetizaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y ellos corrieron». La conjunción hebrea puede traducirse simplemente «y», pero aquí lleva un contraste fuerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַחְתִּי
  english_pob_choice: send
  chosen_spanish: envié
  alternatives_spanish:
  - mandé
  - despaché
  lexicon: HALOT
  rationale: «Enviar» conserva el sentido básico de שׁלח y mantiene la idea de autorización divina sin añadir una carga más interpretativa que «mandar» o «comisionar».
- source_word: הַנְּבִאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - estos profetas
  lexicon: HALOT
  rationale: El artículo definido se rinde naturalmente con «los profetas»; en español no hace falta explicitar la deixis con «estos».
- source_word: רָצוּ
  english_pob_choice: ran
  chosen_spanish: corrieron
  alternatives_spanish:
  - se apresuraron
  - fueron corriendo
  lexicon: HALOT
  rationale: «Corrieron» mantiene la imagen verbal concreta de correr, como en el inglés POB «ran», sin convertirla en una paráfrasis más abstracta.
- source_word: דִבַּרְתִּי אֲלֵי/הֶם
  english_pob_choice: speak to them
  chosen_spanish: les hablé
  alternatives_spanish:
  - hablé con ellos
  - me dirigí a ellos
  lexicon: HALOT
  rationale: En español, «hablarles» reproduce bien el hebreo דבר אל־ y conserva la brevedad y directidad de la frase divina.
- source_word: נִבָּאוּ
  english_pob_choice: prophesied
  chosen_spanish: profetizaron
  alternatives_spanish:
  - hablaron como profetas
  lexicon: HALOT
  rationale: «Profetizaron» es el equivalente directo y estándar del verbo נבא; evita diluir el juicio del texto sobre su actividad profética no autorizada.
- source_word: וְהֵם
  english_pob_choice: yet they
  chosen_spanish: y ellos
  alternatives_spanish:
  - pero ellos
  - sin embargo, ellos
  lexicon: HALOT
  rationale: Aunque el inglés POB explicitó el contraste con «yet», el hebreo solo usa וְ. En español, «y» preserva la forma del original y deja que el contraste sea inferido por el paralelo antitético de las cláusulas.
theological_decisions:
- issue: Si la conjunción inicial debe volverse explícitamente adversativa
  english_pob_reading: The conjunction can be rendered simply 'and,' but here it carries a strong contrast.
  chosen_spanish_reading: La conjunción se mantiene como coordinante «y», dejando que el contraste resulte de las dos negaciones y de la repetición paralela.
  alternative_spanish_readings:
  - pero
  - sin embargo
  rationale: El hebreo usa וְ, que puede ser simple coordinación. Traducirlo como «pero» resolvería la tensión de forma interpretativa; conservar «y» respeta mejor la forma del texto, aunque el contraste siga siendo claro por el contexto.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
- issue: Indictment of unauthorized prophecy
  english_pob_reading: The verse states that these prophets acted without divine commission or revelation.
  chosen_spanish_reading: El versículo afirma que actuaron sin envío divino ni palabra de parte de Yahvé.
  alternative_spanish_readings:
  - actuaron solo con prisa
  - se movieron sin una comisión formal
  rationale: La doble negación («no envié», «no hablé») sostiene la acusación de ausencia de autorización y revelación. «Sin envío divino ni palabra» recoge esa fuerza sin ampliar el sentido más allá del hebreo.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés en sentido y estructura: dos negaciones divinas seguidas de dos acciones indebidas de los profetas. No se requieren revisiones adicionales; se optó por mantener la coordinación hebrea con «y» en lugar de explicitar el contraste con «pero», para no sobreinterpretar la conjunción.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en decisiones teológicas, pero no aparece en el texto principal porque el hebreo de este versículo no contiene el nombre divino explícito.
  - «Profetizaron» se mantiene coherente con la terminología POB para נבא.
  - La puntuación con punto y coma refleja el paralelismo antitético del hebreo y la cadencia del inglés POB.
