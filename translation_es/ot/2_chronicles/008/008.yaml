    reason: lexical_alternative
  revision_rationale: 'La revisión conserva todo el sentido del original y del POB inglés, pero ajusta dos puntos: 1) mejora la naturalidad española con ''De entre sus descendientes''; 2) refleja con mayor precisión la fuerza administrativa de וַיַּעֲלֵם לְמַס mediante ''los reclutó para trabajo forzado''. También se pule la nota sobre מַס para que exprese con más claridad la idea de labor obligatoria estatal.'
