translation:
  language: es
  text: Porque tu poder no está en una multitud, ni tu dominio está entre los fuertes; más bien, tú eres Dios de los humildes, auxiliador de los menores, sostenedor de los débiles, refugio de los desamparados[a], salvador[b] de los que no tienen esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los desesperados» para «los desamparados»; el griego puede referirse a personas dadas por perdidas o en desesperación.
    reason: lexical_alternative
  - marker: b
    text: O «libertador» para «salvador».
    reason: lexical_alternative
lexical_decisions:
- source_word: πλήθει
  english_pob_choice: a multitude
  chosen_spanish: una multitud
  alternatives_spanish:
  - muchos
  - gran multitud
  lexicon: LSJ
  rationale: πλῆθος designa una multitud o gran número. «Una multitud» conserva el sustantivo concreto y la amplitud del término sin convertirlo en una idea abstracta como «muchos».
- source_word: κράτος
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - mando
  lexicon: LSJ
  rationale: κράτος expresa poder o fuerza ejercida con dominio. «Poder» es natural en español y mantiene el paralelo con la cláusula siguiente sobre dominio.
- source_word: δυναστεία
  english_pob_choice: dominion
  chosen_spanish: dominio
  alternatives_spanish:
  - señorío
  - soberanía
  - gobierno
  lexicon: LSJ
  rationale: δυναστεία denota poder de gobierno o dominación. «Dominio» refleja bien la autoridad política y mantiene el tono solemne del griego.
- source_word: ἐν ἰσχύουσιν
  english_pob_choice: among the strong
  chosen_spanish: entre los fuertes
  alternatives_spanish:
  - entre los poderosos
  - con los fuertes
  - en los fuertes
  lexicon: LSJ
  rationale: La expresión se refiere a quienes son fuertes o poderosos. «Entre los fuertes» reproduce de manera idiomática la relación indicada por la construcción griega.
- source_word: ταπεινῶν
  english_pob_choice: the lowly
  chosen_spanish: los humildes
  alternatives_spanish:
  - los bajos
  - los abatidos
  - los pequeños
  lexicon: LSJ
  rationale: ταπεινός puede significar bajo, humilde o abatido. En este contexto de vulnerabilidad, «los humildes» conserva dignidad en español y recoge tanto la condición social como la actitud de bajeza.
- source_word: ἐλαττόνων
  english_pob_choice: the lesser
  chosen_spanish: los menores
  alternatives_spanish:
  - los menores en rango
  - los menos
  - los más pequeños
  lexicon: LSJ
  rationale: ἐλάττων significa menor o inferior en grado. «Los menores» preserva la comparación sin introducir una superlación no presente en el griego.
- source_word: βοηθός
  english_pob_choice: helper
  chosen_spanish: ayudador
  alternatives_spanish:
  - ayudante
  - auxiliador
  - auxilio
  lexicon: LSJ
  rationale: Como sustantivo predicativo, βοηθός es alguien que presta ayuda. «Ayudador» mantiene la forma nominal directa y encaja con la serie de títulos breves del pasaje.
- source_word: ἀντιλήμπτωρ
  english_pob_choice: supporter
  chosen_spanish: sostenedor
  alternatives_spanish:
  - apoyador
  - sustentador
  - protector
  lexicon: LSJ
  rationale: Este sustantivo raro comunica la idea de tomar en apoyo, sostener o asistir. «Sostenedor» conserva la imagen de sostén y evita confundirlo con el siguiente término de refugio/cobertura.
- source_word: ἀσθενούντων
  english_pob_choice: the weak
  chosen_spanish: los débiles
  alternatives_spanish:
  - los enfermos
  - los flacos
  - los frágiles
  lexicon: LSJ
  rationale: ἀσθενέω puede referirse a debilidad, enfermedad o incapacidad. «Los débiles» es suficientemente amplio y funciona bien dentro de la cadena de grupos vulnerables.
- source_word: ἀπεγνωσμένων
  english_pob_choice: the forsaken
  chosen_spanish: los desamparados
  alternatives_spanish:
  - los desesperados
  - los abandonados
  - los dados por perdidos
  lexicon: LSJ
  rationale: El término puede significar personas dadas por perdidas o abandonadas a la desesperación. «Los desamparados» recoge bien la idea pasiva de abandono, muy cercana al matiz de la traducción inglesa.
- source_word: σκεπαστής
  english_pob_choice: shelter
  chosen_spanish: refugio
  alternatives_spanish:
  - cobertura
  - amparo
  - amparador
  lexicon: LSJ
  rationale: σκεπαστής es el que cubre o protege. «Refugio» traduce la función de cobijo de modo natural en español y mantiene el contraste con las otras designaciones divinas.
- source_word: ἀπηλπισμένων
  english_pob_choice: those without hope
  chosen_spanish: los que no tienen esperanza
  alternatives_spanish:
  - los sin esperanza
  - los desesperanzados
  - los desesperados
  lexicon: LSJ
  rationale: ἀπηλπισμένων denota a quienes han perdido la esperanza. «Los que no tienen esperanza» es claro, sobrio y evita una etiqueta demasiado absoluta.
- source_word: σωτήρ
  english_pob_choice: savior
  chosen_spanish: salvador
  alternatives_spanish:
  - libertador
  - rescatador
  lexicon: LSJ
  rationale: σωτήρ significa salvador o libertador. «Salvador» es la equivalencia más directa y conserva el registro teológico del texto.
theological_decisions:
- issue: Conservar la cadena compacta de predicados divinos sin expandirla en una paráfrasis devocional.
  english_pob_reading: 'Preserved the compact predicate structure: ''you are God of the lowly ... the savior of those without hope.'''
  chosen_spanish_reading: 'Se preservó la estructura compacta: «tú eres Dios de los humildes, ayudador de los menores, sostenedor de los débiles, refugio de los desamparados, salvador de los que no tienen esperanza».'
  alternative_spanish_readings:
  - expansiones como «tú ayudas a los humildes y salvas a los desesperados»
  rationale: El griego acumula títulos y descripciones en una cadencia litánica. Mantener esa compresión respeta la retórica y evita introducir interpretaciones no explicitadas por el texto.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; preservar la tensión teológica en vez de resolverla; no paraphrasear más allá del texto fuente.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que retiró los artículos repetidos antes de los sustantivos predicativos para reflejar mejor la concisión del griego. La redacción española sigue esa misma compactación y evita artículos innecesarios en la serie final.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός conforme al estándar del proyecto.
  - Se usó «salvador» para σωτήρ y no «Cristo», porque el término aquí es funcional y no un nombre propio.
  - Se eligió «los humildes» para ταπεινῶν por su equilibrio entre condición social y tono reverente.
  - La secuencia nominal final conserva paralelismo y ritmo, con comas separando cada título o descripción divina.
