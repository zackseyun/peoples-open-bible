translation:
  language: es
  text: No hubo ciudad que hiciera la paz con los hijos de Israel[a], excepto los heveos que habitaban en Gabaón; los tomaron a todos en batalla[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con los israelitas». El hebreo dice más literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: 'O «capturaron a todos en guerra». El hebreo dice literalmente: «tomaron a todos en batalla/guerra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁלִימָה
  english_pob_choice: made peace
  chosen_spanish: hiciera paz
  alternatives_spanish:
  - hiciera la paz
  - llegara a un acuerdo
  - se sometiera
  lexicon: HALOT
  rationale: En Hifil, el verbo expresa entrar en relaciones pacíficas o concluir paz. «Hiciera paz» conserva esa fuerza diplomática sin cargarlo de una lectura de sumisión que el contexto no exige.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: with the sons of Israel
  chosen_spanish: con los hijos de Israel
  alternatives_spanish:
  - con los israelitas
  - con los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión formal del hebreo. «Con los hijos de Israel» refleja mejor la construcción y la formulación del texto fuente que una normalización más idiomática como «israelitas».
- source_word: בִּלְתִּי
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - menos
  lexicon: HALOT
  rationale: Introduce con claridad la única excepción al enunciado negativo precedente. «Excepto» es natural en español y fiel al valor exclusivo de בִּלְתִּי.
- source_word: הַחִוִּי יֹשְׁבֵי גִבְעוֹן
  english_pob_choice: the Hivites living in Gibeon
  chosen_spanish: los heveos habitantes de Gabaón
  alternatives_spanish:
  - los heveos que habitaban en Gabaón
  - los heveos, moradores de Gabaón
  lexicon: HALOT
  rationale: «Heveos» es la forma española usual para חִוִּי. «Habitantes de Gabaón» conserva el participio de residencia de modo natural en español y evita sobrecargar el texto con una perífrasis más pesada.
- source_word: אֶת הַכֹּל
  english_pob_choice: all of them
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - el total
  - todo
  lexicon: HALOT
  rationale: El hebreo señala la totalidad de los elementos implicados en la toma militar. «A todos» comunica esa totalidad en español sin añadir un antecedente no explicitado.
- source_word: לָקְחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - capturaron
  - se apoderaron de
  lexicon: HALOT
  rationale: «Tomaron» reproduce la amplitud semántica de לקח y sigue de cerca la decisión del POB inglés de evitar sobreinterpretar con «captured».
- source_word: בַ/מִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - en la guerra
  - por la guerra
  lexicon: HALOT
  rationale: «En batalla» es la correspondencia natural y concisa para el contexto militar, manteniendo el matiz de medio o circunstancia de la conquista.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y coincide sustancialmente con la solución inglesa auditada; no se detectaron cambios sustantivos de revisión en el pasaje base.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma estándar del proyecto para el nombre divino; este versículo no lo contiene.
  - Se usa «hijos de Israel» por coherencia con la política del proyecto y con la estructura hebrea.
  - «Tomaron» y «en batalla» preservan la sobriedad del original sin intensificar indebidamente el resultado militar.
