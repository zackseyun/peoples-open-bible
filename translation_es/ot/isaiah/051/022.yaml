translation:
  language: es
  text: 'Así dice tu Señor[a], Yahvé, y tu Dios, que pleitea la causa de su pueblo: He aquí, he quitado de tu mano la copa del aturdimiento, el tazón de la copa de mi ira[b]; nunca más la beberás.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu amo». Se eligió «Señor» porque en este contexto funciona como título de autoridad y reverencia, no como relación doméstica.
    reason: lexical_alternative
  - marker: b
    text: O «el goblete de la copa de mi ira». El hebreo acumula imágenes de recipiente para intensificar el juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנַיִךְ
  english_pob_choice: your Lord
  chosen_spanish: tu Señor
  alternatives_spanish:
  - tu dueño
  - tu amo
  lexicon: HALOT
  rationale: El hebreo usa un título de autoridad con sufijo de segunda femenina singular. En español, «Señor» conserva el valor titular y reverencial mejor que «dueño» o «amo», que sonarían más domésticos o duros en este contexto profético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se mantiene como transliteración directa del Tetragrámaton, siguiendo el criterio del proyecto. «Yahvé» es la forma establecida en el español del POB y evita sustituir el nombre por un título.
- source_word: וֵאלֹהַיִךְ
  english_pob_choice: and your God
  chosen_spanish: y tu Dios
  alternatives_spanish:
  - y tus dioses
  lexicon: HALOT
  rationale: En contexto singular, אֱלֹהַיִךְ se refiere al Dios de Israel. «Tu Dios» conserva la aposición de títulos sin perder la referencia personal y pactal.
- source_word: יָרִיב עַמּוֹ
  english_pob_choice: who pleads the cause of his people
  chosen_spanish: que pleitea la causa de su pueblo
  alternatives_spanish:
  - que defiende la causa de su pueblo
  - que contiende por su pueblo
  lexicon: HALOT
  rationale: ריב tiene un matiz forense de litigio o controversia judicial. «Pleitea la causa» conserva ese campo legal con naturalidad en español y mantiene la tensión judicial del verbo mejor que una paráfrasis más general.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: La partícula deíctica profética introduce solemnidad y atención. «Mira» comunica esa función con un registro natural en español moderno; «He aquí» es posible, pero más arcaizante.
- source_word: לָקַחְתִּי מִיָּדֵךְ
  english_pob_choice: I have taken from your hand
  chosen_spanish: he quitado de tu mano
  alternatives_spanish:
  - he tomado de tu mano
  - he retirado de tu mano
  lexicon: HALOT
  rationale: El verbo implica remover algo de posesión o control. «He quitado» preserva la idea de remoción efectiva y suena idiomático en español; «tomado» sería más literal pero menos natural aquí.
- source_word: כּוֹס הַתַּרְעֵלָה
  english_pob_choice: the cup of staggering
  chosen_spanish: la copa del aturdimiento
  alternatives_spanish:
  - la copa del tambaleo
  - la copa del estremecimiento
  lexicon: HALOT
  rationale: תַּרְעֵלָה describe el efecto de quedar desorientado o tambaleante bajo juicio. «Aturdimiento» comunica el resultado sin sugerir solo miedo o temblor físico; «tambaleo» sería más etimológico, pero menos natural en español corriente.
- source_word: קֻבַּעַת כּוֹס חֲמָתִי
  english_pob_choice: the bowl of the cup of my wrath
  chosen_spanish: la taza de la copa de mi ira
  alternatives_spanish:
  - la taza/copa de mi ira
  - el recipiente de la copa de mi ira
  lexicon: HALOT
  rationale: El hebreo acumula imágenes de vasija para intensificar el castigo. Se conserva la superposición de «taza» y «copa» para reflejar ese apilamiento; «ira» traduce חֵמָה con un término claro y sobrio en español.
- source_word: לֹא תוֹסִיפִי לִשְׁתּוֹתָהּ עוֹד
  english_pob_choice: you shall never again drink it
  chosen_spanish: nunca más la beberás
  alternatives_spanish:
  - no volverás a beberla
  - ya no la beberás nunca más
  lexicon: HALOT
  rationale: La construcción con יסף más infinitivo y עוֹד expresa cesación definitiva. «Nunca más la beberás» reproduce bien la fuerza final sin endurecer innecesariamente la sintaxis española.
theological_decisions:
- issue: Secuencia de títulos divinos
  english_pob_reading: Thus says your Lord, Yahweh, and your God
  chosen_spanish_reading: Así dice tu Señor, Yahvé, y tu Dios
  alternative_spanish_readings:
  - Así dice el Señor, Yahvé, y tu Dios
  - Así dice tu Dueño, Yahvé, y tu Dios
  rationale: 'El hebreo apila títulos de manera apposicional: «tu Señor, Yahvé, y tu Dios». En español se conservan tres designaciones distintas sin fusionarlas en un solo título; se evita «SEÑOR» como máscara para preservar el nombre divino según la política del proyecto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen de la copa del juicio
  english_pob_reading: Retain the cup imagery literally
  chosen_spanish_reading: Conservar la imagen literal de la copa y la vasija
  alternative_spanish_readings:
  - Interpretarlo como sufrimiento o castigo sin imagen
  - Parafrasear la metáfora como juicio duro
  rationale: La metáfora de la copa de ira pertenece a un entramado bíblico-teológico amplio. Mantenerla en español preserva la intertextualidad y la tensión del texto en vez de resolverla por paráfrasis.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; la presente redacción mantiene el acuerdo alto con el texto fuente y conserva el apilamiento de títulos y la metáfora del vaso de juicio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, coherente con el estándar del proyecto.
  - Se conserva «copa» y «taza» como dos vasos distintos para reflejar el apilamiento hebreo de כּוֹס / קֻבַּעַת.
  - «Pleitea la causa» preserva el matiz forense de ריב sin volverlo meramente general.
  - «Aturdimiento» comunica el efecto de desorientación o tambaleo mejor que una lectura emocionalizante como «temblor».
