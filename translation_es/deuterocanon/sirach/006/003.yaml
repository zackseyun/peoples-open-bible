  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la resolución principal del hebreo difícil con apoyo del griego: hojas, fruto y árbol seco. Sin embargo, en la primera cláusula la sintaxis española «Te consumirá las hojas» sugiere que las hojas consumen a la persona o produce una construcción poco natural; el sentido fuente es que algo consume las hojas de la persona/árbol. Además, el texto inglés auditado conserva «uproot» en el cuerpo principal, con nota alternativa hacia «destroy», por lo que el español debería reflejar mejor esa imagen arbórea en el texto principal.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «Te consumirá las hojas» no suena natural en español bíblico corriente. «Consumirá tus hojas» o «devorará tus hojas» es más idiomático y fiel. También conviene añadir el posesivo en «como un árbol seco» para naturalidad. La cláusula media se beneficia de una formulación más vívida y alineada con la metáfora del árbol.
  glossary_alignment: 'No hay términos del glosario maestro especialmente activados aquí. La revisión propuesta mantiene la metáfora arbórea y la lógica lexical documentada: עָלֶיךָ como «tus hojas», תֹּאכַל como «consumirá», תְּשָׁרֵשׁ reflejado en español como «arrancará de raíz» en el texto principal, con nota alternativa que preserva la incertidumbre y el apoyo griego a «destruir/perder».'
  issues:
