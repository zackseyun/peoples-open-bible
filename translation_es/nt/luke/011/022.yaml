translation:
  language: es
  text: Pero cuando uno más fuerte que él viene sobre él y lo vence[a], le quita su armadura completa[b], en la cual había confiado, y reparte sus despojos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo derrota» o «lo conquista».'
    reason: lexical_alternative
  - marker: b
    text: «Armadura completa» traduce un término para un conjunto completo de armamento.
    reason: lexical_alternative
  - marker: c
    text: 'O: «su botín» o «sus botines».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὰν δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Pero siempre que
  - Y cuando
  lexicon: BDAG
  rationale: Conserva la fuerza condicional-temporal de ἐπὰν y el matiz contrastivo de δέ con un 'Pero' natural en español.
- source_word: ἰσχυρότερος αὐτοῦ
  english_pob_choice: one stronger than he
  chosen_spanish: uno más fuerte que él
  alternatives_spanish:
  - alguien más fuerte que él
  - un hombre más fuerte que él
  lexicon: BDAG
  rationale: El griego usa un comparativo sustantivado sin sustantivo expreso; 'uno' evita añadir 'hombre' y mantiene la referencia abierta al contexto inmediato.
- source_word: ἐπελθὼν
  english_pob_choice: comes upon him
  chosen_spanish: viene sobre él
  alternatives_spanish:
  - cae sobre él
  - se le viene encima
  lexicon: BDAG
  rationale: '''Viene sobre él'' preserva la imagen de aproximación/embate sin explicitar más de lo que el participio indica.'
- source_word: νικήσῃ αὐτόν
  english_pob_choice: overpowers him
  chosen_spanish: lo vence
  alternatives_spanish:
  - lo derrota
  - lo conquista
  lexicon: BDAG
  rationale: '''Vence'' comunica la subordinación concreta que en el contexto conduce al desarme y al saqueo; evita un giro demasiado abstracto y sigue siendo natural en español.'
- source_word: τὴν πανοπλίαν αὐτοῦ
  english_pob_choice: his full armor
  chosen_spanish: su armadura completa
  alternatives_spanish:
  - su armadura total
  - toda su armadura
  lexicon: BDAG
  rationale: πανοπλία denota el conjunto completo de armamento; 'armadura completa' transmite mejor la idea de totalidad que solo 'armadura'.
- source_word: αἴρει
  english_pob_choice: he takes away
  chosen_spanish: le quita
  alternatives_spanish:
  - la retira
  - se la lleva
  lexicon: BDAG
  rationale: En este contexto, 'quitar' expresa con claridad el despojo físico del armamento al derrotado.
- source_word: ἐφ’ ᾗ ἐπεποίθει
  english_pob_choice: on which he had relied
  chosen_spanish: en la cual había confiado
  alternatives_spanish:
  - sobre la cual había confiado
  - en la que se había apoyado
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo y el perfecto de πείθω indican confianza firme y pasada; 'confiado' es idiomático y fiel en español.
- source_word: τὰ σκῦλα αὐτοῦ
  english_pob_choice: his plunder
  chosen_spanish: sus despojos
  alternatives_spanish:
  - su botín
  - su saqueo
  lexicon: BDAG
  rationale: σκῦλα son los despojos tomados al enemigo vencido; 'despojos' mantiene el matiz bélico y la referencia a bienes arrebatados. 'Plunder' en inglés se vuelve aquí un término más naturalmente equivalente como 'despojos' en español.
- source_word: διαδίδωσιν
  english_pob_choice: distributes
  chosen_spanish: reparte
  alternatives_spanish:
  - distribuye
  - divide
  lexicon: BDAG
  rationale: '''Reparte'' expresa bien la distribución de los despojos entre otros y suena más natural que ''distribuye'' en este contexto narrativo.'
theological_decisions:
- issue: Cómo expresar la comparación sin añadir un sustantivo inexistente en el griego.
  english_pob_reading: Keep the wording as 'one stronger than he' without adding 'man' in the main text.
  chosen_spanish_reading: Mantener 'uno más fuerte que él' sin añadir 'hombre'.
  alternative_spanish_readings:
  - un hombre más fuerte que él
  rationale: El comparativo griego está sustantivado, pero no trae un sustantivo explícito. Como el contexto previo ya presenta la imagen del hombre fuerte, no hace falta introducir 'hombre' en el verso mismo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo traducir νικάω en una escena de sometimiento y desarme.
  english_pob_reading: Render as 'overpowers him.'
  chosen_spanish_reading: Traducirlo como 'lo vence'.
  alternative_spanish_readings:
  - lo derrota
  - lo conquista
  rationale: El verbo aquí describe una victoria práctica que se concreta en despojo y reparto del botín. 'Lo vence' conserva esa fuerza narrativa sin cargar la escena con interpretaciones adicionales.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail en inglés. Se mantiene la estructura condicional-temporal, el comparativo sustantivado sin añadir un sustantivo no expreso, el matiz de despojo militar en πανοπλία y σκῦλα, y la decisión revisada de unir naturalmente 'armadura completa' con la cláusula relativa sin coma innecesaria.
  spanish_consistency_notes:
  - Se usa 'uno' para el comparativo sustantivado, en coherencia con la decisión de no añadir 'hombre'.
  - '''Despojos'' se reserva aquí para σκῦλα como botín enemigo, evitando confundirlo con simples ''bienes''.'
  - '''Vence'' mantiene el tono narrativo concreto del contexto y evita sobreexplicar la escena como alegoría.'
