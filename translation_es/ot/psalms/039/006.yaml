translation:
  language: es
  text: Mira[a], has hecho que mis días midan apenas unos pocos palmos, y mi vida es como nada delante de ti; ciertamente todo hombre[b], aunque esté firme[c], es del todo vapor[d]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». El hebreo הִנֵּה introduce una llamada enfática a prestar atención.
    reason: lexical_alternative
  - marker: b
    text: O «toda la humanidad» o «todo ser humano»; el hebreo «todo hombre» usa un singular genérico para la humanidad.
    reason: lexical_alternative
  - marker: c
    text: 'También: «esté de pie» o «esté establecido». El sentido puede ser que aun la persona que parece segura o firmemente asentada no es más que vapor.'
    reason: lexical_alternative
  - marker: d
    text: 'También: «mero aliento» o «vanidad». El hebreo הֶבֶל evoca algo insustancial y pasajero; «vapor» conserva mejor la imagen concreta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira![a]
  alternatives_spanish:
  - Mira
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: La interjección hebrea introduce una llamada enfática a prestar atención. «Mira» comunica esa fuerza de manera natural en español; se conserva la solemnidad con signos de exclamación. Se evita «he aquí» por sonar más arcaico y menos directo en español actual.
- source_word: טְפָחוֹת
  english_pob_choice: a few handbreadths
  chosen_spanish: apenas unos pocos palmos
  alternatives_spanish:
  - unos pocos palmos
  - meras anchuras de mano
  - unos cuantos palmos
  lexicon: HALOT
  rationale: El término designa una medida concreta y muy pequeña. «Palmos» es el equivalente natural en español para la imagen; «apenas» y «unos pocos» explicitan la pequeñez sin perder la concreción corporal de la medida.
- source_word: נָתַתָּה
  english_pob_choice: you have made
  chosen_spanish: has puesto
  alternatives_spanish:
  - has hecho
  - has dado
  - has establecido
  lexicon: HALOT
  rationale: En este contexto el verbo expresa que Dios ha fijado o dispuesto la duración de los días. «Has puesto» reproduce bien la idea de asignar o colocar en una medida determinada, sin forzar el verbo «hacer» en español.
- source_word: יָמַי
  english_pob_choice: my days
  chosen_spanish: mis días
  alternatives_spanish:
  - mis días de vida
  - mis jornadas
  lexicon: HALOT
  rationale: Traducción directa del sustantivo plural con sufijo de primera persona. Mantiene el hebraísmo que usa «días» para la duración de la vida.
- source_word: וְחֶלְדִּי
  english_pob_choice: my lifetime
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi duración de vida
  - mi tiempo de vida
  - mi existencia
  lexicon: HALOT
  rationale: El término alude al lapso o duración de la vida en el mundo. «Mi vida» es la forma más clara y natural en español, y conserva el paralelismo con «mis días».
- source_word: כְאַיִן
  english_pob_choice: as nothing
  chosen_spanish: como nada
  alternatives_spanish:
  - como si no fuera nada
  - casi nada
  - como no ser
  lexicon: HALOT
  rationale: La comparación expresa inexistencia virtual o insignificancia delante de Dios. «Como nada» es breve, idiomático y fiel al valor comparativo.
- source_word: נֶגְדֶּךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  - a tus ojos
  lexicon: HALOT
  rationale: La preposición comunica estar en la esfera de la presencia o valoración divina. «Delante de ti» refleja bien la relación espacial/relacional del hebreo y suena natural en español bíblico contemporáneo.
- source_word: אַךְ
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - sin duda
  - solo
  - solo que
  lexicon: HALOT
  rationale: Marca una afirmación enfática y conclusiva. «Ciertamente» preserva ese matiz mejor que un simple adverbio de exclusión como «solo».
- source_word: כָּל הֶבֶל
  english_pob_choice: altogether vapor
  chosen_spanish: todo vapor[b]
  alternatives_spanish:
  - solo vapor
  - vapor total
  - mera vanidad
  lexicon: HALOT
  rationale: הֶבֶל nombra literalmente vapor/aliento, y por extensión lo pasajero e insustancial. «Vapor» conserva la imagen concreta mejor que «vanidad»; «todo» refleja el alcance totalizador de כָּל. Se añade nota porque en español también podría oírse «vanidad» como alternativa interpretativa.
- source_word: כָּל אָדָם
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - toda la humanidad
  - todo ser humano
  - cada hombre
  lexicon: HALOT
  rationale: El hebreo usa el singular genérico אָדָם. Se mantiene la forma singular «todo hombre» por fidelidad al giro del original, sin dejar de reconocer su valor inclusivo en la nota.
- source_word: נִצָּב
  english_pob_choice: standing firm
  chosen_spanish: aunque esté firme[c]
  alternatives_spanish:
  - aunque esté de pie
  - aunque esté establecido
  - aunque parezca seguro
  lexicon: HALOT
  rationale: 'El participio significa «estar de pie, estar establecido, estar firme». En el contexto la idea es irónica: incluso la persona aparentemente firme resulta ser solo vapor. «Aunque esté firme» conserva esa tensión y el matiz concesivo aclarado por la revisión inglesa.'
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selá
  - Interludio
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional porque la función precisa del término es incierta y traducirlo sería más interpretativo de lo que permite la evidencia.
theological_decisions:
- issue: Valor genérico de אָדָם en una afirmación sobre la humanidad
  english_pob_reading: every man
  chosen_spanish_reading: todo hombre
  alternative_spanish_readings:
  - toda la humanidad
  - todo ser humano
  - cada hombre
  rationale: El hebreo emplea un singular genérico, no un plural abstracto. Se mantiene «todo hombre» para respetar la forma del original y la fuerza representativa del dicho, con el sentido inclusivo implícito para el lector moderno.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; tabla de términos controvertidos para אָדָם
- issue: Imagen teológica de הֶבֶל como lo pasajero e insustancial
  english_pob_reading: altogether vapor
  chosen_spanish_reading: todo vapor
  alternative_spanish_readings:
  - solo vapor
  - mera vanidad
  - aliento
  rationale: «Vapor» preserva la imagen concreta del hebreo y evita sustituirla por un término tradicionalizado que podría ocultar la metáfora física de fugacidad. La lectura no pretende negar el matiz de inutilidad o vacío, sino dejarlo derivar de la imagen principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2; términos poéticos/metafóricos
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que añadió la coma/pausa concesiva antes de «though standing firm». En español se reflejó con «aunque esté firme», manteniendo la relación concesiva sin introducir una paráfrasis más fuerte que la del hebreo. También se preservó la imagen de הֶבֶל como «vapor» en vez de sustituirla por «vanidad».
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto no porque aparezca explícitamente en este versículo, sino porque la presente muestra no contiene el Tetragrámaton.
  - Se mantuvo «Selah» transliterado por consistencia con el tratamiento POB de este término.
  - Se prefirió un singular genérico («todo hombre») por fidelidad al hebreo, con nota inclusiva para lectores en español.
  - La puntuación intenta reproducir la cadencia poética y el giro concesivo del hebreo y de la revisión inglesa.
