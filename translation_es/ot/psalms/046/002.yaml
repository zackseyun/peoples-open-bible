translation:
  language: es
  text: Dios es nuestro refugio y fortaleza,[a] un auxilio muy disponible en las angustias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con un giro más cercano al hebreo: «un auxilio hallado sobremanera en las angustias». El hebreo literalmente dice que él es «hallado en gran manera» en las angustias, es decir, que se muestra claramente disponible en tiempos de aflicción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural morfológicamente, aquí el sentido es singular y se refiere al Dios de Israel; en español, «Dios» es el equivalente natural y reverente.
- source_word: לָנוּ
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: HALOT
  rationale: 'La relación posesiva después de «es» se expresa con naturalidad en español con «nuestro»: «Dios es nuestro refugio». Evita una estructura menos idiomática sin perder el valor relacional del hebreo.'
- source_word: מַחֲסֶה
  english_pob_choice: refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - amparo
  - shelter
  - lugar de refugio
  lexicon: HALOT
  rationale: «Refugio» es el equivalente directo y más estable para un lugar de protección. Mantiene el paralelismo poético con «fortaleza».
- source_word: וָעֹז
  english_pob_choice: and strength
  chosen_spanish: y fortaleza
  alternatives_spanish:
  - y fuerza
  - y poder
  - y vigor
  lexicon: HALOT
  rationale: עֹז denota fuerza, poder o vigor. «Fortaleza» funciona bien en español bíblico porque conserva la idea de firmeza/poder protector y armoniza con «refugio».
- source_word: עֶזְרָה
  english_pob_choice: a help
  chosen_spanish: ayuda
  alternatives_spanish:
  - auxilio
  - socorro
  lexicon: HALOT
  rationale: El sustantivo expresa ayuda o auxilio. En español, «ayuda» es claro y natural; no se añadió artículo para no forzar una estructura nominal ajena al verso.
- source_word: בְּצָרוֹת
  english_pob_choice: in troubles
  chosen_spanish: en las angustias
  alternatives_spanish:
  - en los apuros
  - en los problemas
  - en las tribulaciones
  lexicon: HALOT
  rationale: El plural hebreo sugiere situaciones de aflicción o angustia. «Angustias» mantiene el plural y el tono poético, sin reducirlo a un solo momento de prueba.
- source_word: נִמְצָא
  english_pob_choice: found
  chosen_spanish: hallada
  alternatives_spanish:
  - encontrada
  - proclamada
  - probada
  lexicon: HALOT
  rationale: El nifal de מצא puede significar «ser hallado» y, por extensión, «probarse/mostrarse disponible». «Hallada» conserva el valor verbal de «ser encontrada» y permite la lectura de disponibilidad implícita.
- source_word: מְאֹד
  english_pob_choice: exceedingly
  chosen_spanish: sobremanera
  alternatives_spanish:
  - en gran manera
  - mucho
  - excesivamente
  lexicon: HALOT
  rationale: El adverbio intensifica fuertemente la cláusula final. «Sobremanera» es solemne, idiomático y reproduce bien la fuerza intensiva del hebreo sin diluirla en un simple «muy».
theological_decisions:
- issue: Cómo reflejar el cierre hebreo comprimido de la cláusula final
  english_pob_reading: The English audit trail alternates between 'a very present help in troubles' and a more literal 'found exceedingly in troubles,' preserving the idea that God proves readily available in distress.
  chosen_spanish_reading: «ayuda en las angustias, hallada sobremanera» conserva la estructura nominal y la idea de disponibilidad demostrada, sin convertirla en una paráfrasis explicativa.
  alternative_spanish_readings:
  - «ayuda muy presente en las angustias»
  - «una ayuda hallada sobremanera en las angustias»
  - «ayuda que se encuentra sobremanera en las angustias»
  rationale: 'El hebreo נִמְצָא מְאֹד es compacto y puede sugerir tanto ser hallado como mostrarse disponible de manera excepcional. La redacción escogida mantiene la tensión: no traduce mecánicamente ''presente'', pero sí deja oír la idea de auxilio accesible y efectivamente hallado en la aflicción.'
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Tratamiento de la imagen poética 'refuge and strength'
  english_pob_reading: God is our refuge and strength.
  chosen_spanish_reading: «Dios es nuestro refugio y fortaleza» sigue la imagen doble sin explicarla demasiado.
  alternative_spanish_readings:
  - «Dios es nuestro amparo y fortaleza»
  - «Dios es nuestro refugio y fuerza»
  rationale: La pareja conceptual del verso une protección y poder. «Fortaleza» mantiene un registro bíblico claro y evita reducir עֹז a mera fuerza física; a la vez, no borra la imagen de estabilidad protectora.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'Tomé en cuenta las revisiones del auditorio inglés: se reconoció que la clausula final es sintácticamente comprimida y que la idea central no es solo ''presencia'' sino disponibilidad/hallazgo excepcional. Por eso el español evita una paráfrasis totalmente tradicional como ''muy presente'' y conserva la tensión verbal con ''hallada sobremanera''.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים conforme al valor singular del contexto.
  - Se traduce מַחֲסֶה con 'refugio' y עֹז con 'fortaleza' para conservar el paralelismo poético.
  - Se evita 'SEÑOR' porque el verso no contiene el Tetragrámaton.
  - El plural 'angustias' refleja el hebreo plural sin perder naturalidad en español.
  - La puntuación con coma ayuda a reflejar la relación entre la imagen nominal y su intensificación final.
