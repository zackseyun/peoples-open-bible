translation:
  language: es
  text: y dos tórtolas o dos pichones jóvenes, según lo que alcancen sus recursos; y uno será ofrenda por el pecado[a] y el otro, holocausto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “ofrenda de purificación”. El término hebreo puede designar la ofrenda usada para la purificación en contextos rituales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁתֵּי
  english_pob_choice: and two
  chosen_spanish: y dos
  alternatives_spanish:
  - y las dos
  lexicon: HALOT
  rationale: El hebreo enlaza con la continuación de la lista sacrificial; en español natural basta 'y dos' sin añadir un artículo que el contexto no exige.
- source_word: תֹרִים
  english_pob_choice: turtledoves
  chosen_spanish: tórtolas
  alternatives_spanish:
  - palomas
  lexicon: HALOT
  rationale: Se conserva la especie concreta del ave sacrificial. 'Tórtolas' comunica mejor la precisión de 'turtledoves' que el término más general 'palomas'.
- source_word: שְׁנֵי בְּנֵי יוֹנָה
  english_pob_choice: two young pigeons
  chosen_spanish: dos pichones jóvenes
  alternatives_spanish:
  - dos pichones
  - dos palominos jóvenes
  lexicon: HALOT
  rationale: La expresión hebrea literalmente alude a 'dos hijos de paloma', es decir, aves jóvenes. 'Pichones jóvenes' expresa la inmadurez del ave sin perder claridad para el lector moderno.
- source_word: אֲשֶׁר תַּשִּׂיג יָדוֹ
  english_pob_choice: as his means can afford
  chosen_spanish: según lo que alcancen sus recursos
  alternatives_spanish:
  - según lo que pueda alcanzar su mano
  - conforme a sus posibilidades
  lexicon: HALOT
  rationale: La idiomática hebrea 'su mano alcanza' refiere capacidad económica. 'Sus recursos' evita un calco duro y mantiene el sentido de posibilidad material.
- source_word: וְ/הָיָה
  english_pob_choice: and one shall be
  chosen_spanish: y uno será
  alternatives_spanish:
  - y será uno
  - y uno quedará
  lexicon: HALOT
  rationale: El distributivo del singular se expresa con naturalidad en español mediante 'uno será', que introduce la asignación de cada ave a un uso sacrificial.
- source_word: חַטָּאת
  english_pob_choice: a sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda de purificación
  - sacrificio por el pecado
  lexicon: HALOT
  rationale: Se preserva la forma tradicional reconocible en español, pero sin ocultar que el término cultual puede abarcar el matiz de purificación ritual. 'Ofrenda por el pecado' deja abierta esa tensión semántica.
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda totalmente quemada
  lexicon: HALOT
  rationale: '''Holocausto'' es el término bíblico español asentado para la ofrenda íntegramente quemada. Se mantiene por fidelidad al género cultual y por inteligibilidad eclesial.'
theological_decisions:
- issue: Matiz de חַטָּאת en contexto ritual de purificación
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - sacrificio por el pecado
  rationale: La sección trata de un rito de restauración/corrección cultual; por eso conviene no cerrar el sentido únicamente en culpa moral. 'Ofrenda por el pecado' conserva la terminología tradicional y deja espacio al uso ritual de purificación señalado por el audit trail inglés.
  doctrine_reference: Translation philosophy §3, §5
- issue: Equilibrio entre precisión zoológica y naturalidad castellana
  english_pob_reading: turtledoves / young pigeons
  chosen_spanish_reading: tórtolas / dos pichones jóvenes
  alternative_spanish_readings:
  - palomas / dos palominos jóvenes
  rationale: El hebreo distingue dos opciones de aves. La traducción debe mantener esa distinción sin forzar un tecnicismo innecesario. 'Tórtolas' y 'pichones jóvenes' preservan el contraste y son comprensibles para lectores bíblicos contemporáneos.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el pasaje base; la lectura inglesa final se mantuvo sin cambios, con una sola nota léxica sobre חַטָּאת. La propuesta española conserva esa tensión semántica en una formulación naturalmente readable.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo la distinción entre las dos especies de aves y la asignación distributiva de los sacrificios.
  - '''Ofrenda por el pecado'' y la nota alternativa preservan el matiz ritual sin sustituirlo por una paráfrasis explicativa dentro del texto principal.'
