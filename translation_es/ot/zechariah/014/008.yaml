translation:
  language: es
  text: Y en aquel día saldrán aguas vivas[a] de Jerusalén, la mitad de ellas hacia el mar oriental[b] y la mitad de ellas hacia el mar occidental[c]; en verano y en invierno será así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aguas frescas» o «aguas corrientes». El hebreo dice literalmente «aguas vivas», expresión común para agua que corre o da vida.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el mar al oriente de Jerusalén, tradicionalmente identificado como el mar Muerto.
    reason: cultural_note
  - marker: c
    text: Es decir, el mar al occidente de Jerusalén, tradicionalmente identificado como el mar Mediterráneo.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: Y ... será
  alternatives_spanish:
  - Y ... sucederá
  - Y ... acontecerá
  lexicon: HALOT
  rationale: La fórmula profética se vierte con una construcción futura natural en español. «Será» conserva la apertura de anuncio sin caer en un calco pesado como «sucederá/acontecerá».
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - para aquel día
  lexicon: HALOT
  rationale: «En aquel día» es la equivalencia idiomática estándar en español para la fórmula profética y mantiene el matiz escatológico.
- source_word: יֵצְאוּ
  english_pob_choice: will flow out
  chosen_spanish: saldrán
  alternatives_spanish:
  - brotarán
  - fluirán
  lexicon: HALOT
  rationale: El hebreo dice literalmente «saldrán/irán fuera»; en español «saldrán» conserva el verbo de origen sin forzar una imagen más interpretativa que el texto base. El contexto de aguas ya sugiere el movimiento de salida.
- source_word: מַיִם חַיִּים
  english_pob_choice: living waters
  chosen_spanish: aguas vivas
  alternatives_spanish:
  - aguas vivientes
  - agua viva
  - aguas frescas
  lexicon: HALOT
  rationale: «Aguas vivas» preserva el giro bíblico y la tensión entre agua corriente/fresca y posible resonancia teológica. Se evita resolverla demasiado pronto como mera descripción física o como símbolo exclusivamente espiritual.
- source_word: מִירוּשָׁלִַם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: «De Jerusalén» es la expresión más natural en español para el origen; «desde» es posible, pero menos sobria aquí.
- source_word: חֶצְיָם
  english_pob_choice: half of them
  chosen_spanish: la mitad de ellas
  alternatives_spanish:
  - la mitad
  - la otra mitad
  lexicon: HALOT
  rationale: El sufijo pronominal remite a las aguas; «de ellas» hace explícito el referente en español y mantiene la referencia plural del hebreo.
- source_word: הַיָּם הַקַּדְמוֹנִי
  english_pob_choice: the eastern sea
  chosen_spanish: el mar oriental
  alternatives_spanish:
  - el mar del este
  - el mar que queda al oriente
  lexicon: HALOT
  rationale: «Oriental» conserva el valor direccional del hebreo (literalmente oriental/adelante) sin imponer en el texto principal una identificación geográfica moderna. La nota aclara la referencia tradicional al mar Muerto.
- source_word: הַיָּם הָאַחֲרוֹן
  english_pob_choice: the western sea
  chosen_spanish: el mar occidental
  alternatives_spanish:
  - el mar del oeste
  - el mar que queda al poniente
  lexicon: HALOT
  rationale: «Occidental» mantiene el paralelismo con «oriental» y comunica la dirección hacia el oeste sin expandir el texto principal más de lo que el hebreo exige.
- source_word: בַּקַּיִץ וּבָחֹרֶף
  english_pob_choice: in summer as well as in winter
  chosen_spanish: en verano y en invierno
  alternatives_spanish:
  - durante el verano y durante el invierno
  - en verano así como en invierno
  lexicon: HALOT
  rationale: La pareja estacional se expresa de forma simple y natural en español. La continuidad anual queda implícita por el contraste de estaciones.
- source_word: יִהְיֶה
  english_pob_choice: it will be so
  chosen_spanish: será así
  alternatives_spanish:
  - así será
  - así estará
  lexicon: HALOT
  rationale: «Será así» reproduce la continuidad/validez del estado descrito con una frase breve y idiomática, sin introducir un sujeto explícito inexistente en el hebreo.
theological_decisions:
- issue: «Aguas vivas» conserva tensión léxica y teológica
  english_pob_reading: Retain the literal phrase 'living waters' in the main text without interpreting it as purely symbolic or purely hydrological.
  chosen_spanish_reading: Mantener «aguas vivas» sin reducirlo a «agua fresca» ni convertirlo en una glosa espiritual explícita.
  alternative_spanish_readings:
  - aguas frescas
  - agua viva
  - aguas espirituales
  rationale: El hebreo admite agua corriente/fresca y también puede resonar teológicamente en contexto profético. La versión española conserva esa tensión en vez de resolverla prematuramente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Direccionalidad de los mares sin forzar una identificación en el cuerpo del texto
  english_pob_reading: '''the sea to the east of Jerusalem, traditionally identified as the Dead Sea'' / ''the sea to the west of Jerusalem, traditionally identified as the Mediterranean Sea''.'
  chosen_spanish_reading: «Mar oriental» y «mar occidental», con la identificación tradicional reservada a nota.
  alternative_spanish_readings:
  - mar del este / mar del oeste
  - mar que queda al oriente / mar que queda al occidente
  rationale: Se preserva el paralelismo hebreo y se evita cargar el texto principal con explicaciones geográficas que pertenecen mejor a la nota. Esto mantiene la transparencia del record y la fluidez de lectura.
  doctrine_reference: Translation philosophy §2 (Source transparency and auditable choices)
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto fuente y con el audit trail en inglés; no se registran revisiones aplicadas en la última pasada. La traducción mantiene la misma decisión clave sobre «living waters» y la doble direccionalidad de los mares, adaptadas a un español natural y transparente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conservó el plural hebreo de «aguas» y el paralelismo «oriental/occidental» para reflejar la estructura del original.
  - Las notas al pie se usan solo donde el inglés POB ya documenta una alternativa léxica o una identificación geográfica tradicional.
