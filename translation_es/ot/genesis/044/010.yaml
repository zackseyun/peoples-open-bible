translation:
  language: es
  text: 'Y él dijo: «Incluso ahora, sea conforme a sus palabras. El que sea hallado con ella será mi esclavo[a], y ustedes quedarán inocentes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «siervo». El hebreo עָבֶד puede traducirse «esclavo» o «siervo»; aquí se prefirió «esclavo» porque el contexto penal destaca una condición de sujeción forzada.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם עַתָּה
  english_pob_choice: Even now
  chosen_spanish: Aun ahora
  alternatives_spanish:
  - Ahora también
  - Incluso ahora
  lexicon: HALOT
  rationale: La combinación añade énfasis temporal y de contraste; «aun ahora» conserva esa fuerza de inmediatez sin sonar forzada en español.
- source_word: כְדִבְרֵיכֶם כֵּן הוּא
  english_pob_choice: let it be according to your words
  chosen_spanish: sea conforme a sus palabras
  alternatives_spanish:
  - sea según sus palabras
  - así sea conforme a lo que han dicho
  lexicon: HALOT
  rationale: La forma hebrea expresa aceptación y fijación de un decreto, no solo una cita de lo dicho. «Sea conforme a sus palabras» mantiene el matiz de resolución/jussivo en español natural.
- source_word: אֲשֶׁר יִמָּצֵא אִתּוֹ
  english_pob_choice: the one with whom it is found
  chosen_spanish: El que sea hallado con ella
  alternatives_spanish:
  - quien sea hallado con ella
  - el que resulte tenerla
  lexicon: HALOT
  rationale: En el contexto inmediato, el referente es la copa; el pronombre femenino «ella» evita ambigüedad y sigue el sentido del hebreo de posesión hallada en alguien.
- source_word: עָבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: El contexto es punitivo y de sujeción coercitiva, por lo que «esclavo» reproduce mejor la fuerza léxica que un término más neutral como «siervo».
- source_word: נְקִיִּם
  english_pob_choice: innocent
  chosen_spanish: inocentes
  alternatives_spanish:
  - libres de culpa
  - sin culpa
  lexicon: HALOT
  rationale: Aquí el sentido es quedar exentos de responsabilidad por la falta. «Inocentes» es breve y natural en español, conservando la exoneración legal del término.
theological_decisions:
- issue: Alcance de la absolución de los hermanos no implicados
  english_pob_reading: and you will be innocent
  chosen_spanish_reading: y ustedes quedarán inocentes
  alternative_spanish_readings:
  - y ustedes estarán libres de culpa
  - y no serán culpables
  rationale: La cláusula final no introduce una doctrina abstracta, sino una exención de culpa/pena para los no implicados. «Quedarán inocentes» conserva el valor forense del hebreo sin añadir matices extrabíblicos.
  doctrine_reference: Responsabilidad judicial y exoneración en el relato patriarcal
translation_notes:
  revision_awareness: 'Se incorporó la corrección editorial del audit trail: la segunda cláusula se presenta como un decreto propio del hablante, no como una mera repetición de las palabras previas. Por eso se usó punto y no dos puntos entre la aceptación inicial y la sentencia sobre el culpable.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé no pertinente aquí; no aparece el tetragrámaton en este verso.
  - Se evitó «Señor» o «siervo» como sustitutos automáticos de עָבֶד, siguiendo la preferencia lexical documentada por «esclavo» cuando la sujeción coercitiva es el rasgo dominante.
  - Se preservó la ambigüedad referencial del objeto hallado mediante «ella», coherente con el referente femenino implícito de la copa en el contexto inmediato.
  - La puntuación separa la aceptación inicial de la sentencia, reflejando la revisión del audit trail sobre la fuerza retórica del hebreo.
