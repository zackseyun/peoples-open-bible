translation:
  language: es
  text: Tenía treinta hijos, que cabalgaban sobre treinta asnos, y ellos tenían treinta poblaciones, que hasta hoy se llaman Havot-jair[a], las cuales están en la tierra de Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Havot-jair» probablemente significa «las aldeas» o «los asentamientos de Jair».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לוֹ
  english_pob_choice: He had
  chosen_spanish: Tenía
  alternatives_spanish:
  - Y tuvo
  - Y le había
  lexicon: HALOT
  rationale: La construcción hebrea de posesión con היה + ל se expresa de forma natural en español con «tenía». Mantiene el sentido de posesión sin forzar un calco sintáctico.
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos e hijas
  lexicon: HALOT
  rationale: El hebreo especifica descendencia masculina, pero en español bíblico y lectoría amplia «hijos» puede comunicar el conjunto filial sin sonar duro. Se conserva la referencia masculina por el contexto inmediato de montaban asnos y la posesión numérica; la formulación evita una redundancia pesada. No obstante, la tensión de género se reconoce en la nota textual implícita del contexto de varones.
- source_word: רֹכְבִים
  english_pob_choice: riding
  chosen_spanish: que cabalgaban
  alternatives_spanish:
  - montados
  - montando
  lexicon: HALOT
  rationale: El participio describe una característica continua; «que cabalgaban» reproduce bien el valor durativo y suena natural en español. «Montados» sería más compacto, pero menos explícito sobre la acción.
- source_word: עֲיָרִים
  english_pob_choice: donkeys
  chosen_spanish: asnos
  alternatives_spanish:
  - burros
  - pollinos
  - asnas
  lexicon: HALOT
  rationale: El término hebreo designa asnos, a menudo jóvenes. «Asnos» preserva el registro bíblico sin caer en arcaísmo excesivo; «burros» es más coloquial y «pollinos» podría sobreespecificar la edad.
- source_word: עֲיָרִים
  english_pob_choice: towns
  chosen_spanish: ciudades
  alternatives_spanish:
  - pueblos
  - aldeas
  - villas
  lexicon: HALOT
  rationale: El segundo עֲיָרִים se refiere a asentamientos habitados bajo control de Jair. «Ciudades» sigue la elección inglesa de escala algo mayor y funciona bien en español; «pueblos» o «aldeas» podrían rebajar innecesariamente la magnitud implícita.
- source_word: יִקְרְאוּ
  english_pob_choice: they are called
  chosen_spanish: se las llama
  alternatives_spanish:
  - las llaman
  - son llamadas
  lexicon: HALOT
  rationale: El hebreo admite una formulación impersonal o pasiva en la fórmula de nombramiento. «Se las llama» es idiomático y mantiene la referencia a las ciudades como objeto del nombre tradicional.
- source_word: חַוֹּת יָאִיר
  english_pob_choice: Havvoth-jair
  chosen_spanish: Havot‑Jair
  alternatives_spanish:
  - Havvot‑Jair
  - las aldeas de Jair
  - las estancias de Jair
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicional transliterado. «Havot» refleja con mayor naturalidad española la forma habitual del topónimo, y se evita traducirlo en el texto principal para no perder su condición de nombre establecido; el sentido léxico alternativo queda recogible en nota.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - todavía hoy
  lexicon: HALOT
  rationale: «Hasta hoy» es la fórmula española más breve y natural para el hebreo temporal, preservando la referencia a continuidad hasta el presente narrativo.
- source_word: אֲשֶׁר בְּאֶרֶץ הַגִּלְעָד
  english_pob_choice: which are in the land of Gilead
  chosen_spanish: las cuales están en la tierra de Galaad
  alternatives_spanish:
  - que están en la tierra de Galaad
  - las que están en Galaad
  lexicon: HALOT
  rationale: La relativa concuerda con «ciudades» y se conserva el matiz locativo completo con «tierra de Galaad». «Galaad» mantiene la forma española usual del topónimo.
theological_decisions:
- issue: Nombre divino y terminología cultual
  english_pob_reading: No direct divine-name issue in this verse
  chosen_spanish_reading: No se introduce terminología teológica adicional
  alternative_spanish_readings:
  - —
  rationale: El versículo es descriptivo y no contiene referencias directas a Yahvé, Mesías, Espíritu ni otros términos doctrinalmente sensibles. Se evita añadir matiz interpretativo no sustentado por el texto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto inglés revisado reordenó la cláusula final para que los asentamientos sean los llamados Havvoth-jair «to this day». La versión española sigue esa estructura: primero el hecho del nombramiento tradicional, luego la persistencia «hasta hoy», y finalmente la localización en Galaad. También conserva la distinción entre los dos usos de עֲיָרִים: asnos y ciudades, como exige el audit trail.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - Se preservó la diferencia léxica entre el animal y el asentamiento con dos renderizaciones distintas de עֲיָרִים.
  - Se usó «Galaad» como forma española convencional del topónimo.
  - Se conservó el nombre propio del lugar en transliteración, con nota explicativa sobre su posible sentido léxico.
