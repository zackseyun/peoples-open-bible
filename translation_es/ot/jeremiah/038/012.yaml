base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/038/012.yaml
  text: Then Ebed-melech the Cushite said to Jeremiah[a], “Please put these worn-out rags and torn clothes under your armpits[c][b], under the ropes.” And Jeremiah did so.
  footnotes:
  - marker: a
    text: Or 'the Ethiopian.' The Hebrew says 'the Cushite,' referring to a man from Cush.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew terms for the materials are rare and likely refer to worn-out cloth items used as padding between Jeremiah's body and the ropes.
    reason: lexical_alternative
  - marker: c
    text: Literally 'under the joints of your hands/arms'; the sense here is the area under the arms where the ropes would press during lifting.
    reason: lexical_alternative
