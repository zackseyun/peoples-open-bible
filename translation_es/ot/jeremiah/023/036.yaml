base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/023/036.yaml
  text: But you shall no longer mention ‘the burden of Yahweh,’ for each man's own word will become his burden[a], and you have perverted the words of the living God, Yahweh of hosts[b], our God.
  footnotes:
  - marker: a
    text: Or 'oracle of the LORD.' The Hebrew word מַשָּׂא can mean 'burden' or, in prophetic contexts, an 'oracle/message'; here the prophet appears to exploit both senses.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man’s word will be his burden,' likely meaning that what each person says will recoil on him rather than being a true word from the LORD.
    reason: alternative_reading
