translation:
  language: ko
  text: 다시, 내가 여러분에게 새 계명을 쓰는데, 이것은 그분 안에서도 여러분 안에서도 참된 것입니다. 어둠이 지나가고 참 빛이 이미 비치고 있기 때문입니다.
  philosophy: optimal-equivalence
