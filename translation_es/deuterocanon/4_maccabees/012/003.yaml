review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido griego general: μετεπέμψατο = «mandó llamar», πλησιέστερον = «más cerca / más», παρηγορεῖν = «animar», y λέγων = «diciendo». Sin embargo, ἐπειρᾶτο está en imperfecto y el español principal «intentó» reduce el matiz durativo que el inglés auditado conserva al menos parcialmente con la nota alternativa; conviene reflejar mejor la acción en curso.'
  spanish_quality_summary: 'El español es natural y claro. «Lo mandó llamar para que se acercara más» suena bien y evita calco. La mejora principal es verbal: «procuraba animarlo» o «intentaba animarlo» fluye mejor con «diciendo» y representa mejor el imperfecto. La nota también debe ajustarse para no duplicar de forma algo forzada «lo mandó llamar más cerca».'
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales están alineadas con el rastro POB: «mandó llamar», «se acercara más», «animarlo».'
  issues:
  - severity: medium
    issue: El imperfecto ἐπειρᾶτο se vierte como pretérito puntual «intentó».
    rationale: Aunque «intentó» no es imposible narrativamente, el griego expresa acción en curso. Con el participio «diciendo», el español mejora si usa «procuraba» o «intentaba», preservando mejor el aspecto.
  - severity: low
    issue: La nota alternativa «lo mandó llamar más cerca» suena menos natural en español que una formulación con movimiento explícito.
    rationale: El inglés alternativo «He summoned him closer» permite esa forma, pero en español «mandó que se acercara más» o «lo hizo acercarse más» evita rigidez y mantiene el sentido comparativo.
  revised_spanish_text: 'Lo mandó llamar para que se acercara más[a], y procuraba animarlo, diciendo:'
