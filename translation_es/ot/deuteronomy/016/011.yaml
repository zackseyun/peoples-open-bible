translation:
  language: es
  text: 'Y te regocijarás[a] delante de Yahvé tu Dios: tú, tu hijo, tu hija, tu esclavo[b] y tu esclava, el levita que está dentro de tus puertas, y el residente extranjero[c], el huérfano y la viuda que están entre ti, en el lugar que Yahvé tu Dios escogerá para hacer morar allí su nombre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te alegrarás». El hebreo expresa gozo cultual y festivo.
    reason: lexical_alternative
  - marker: b
    text: O «tu siervo» / «tu sirviente». Aquí se conserva «esclavo» (y por contexto también «esclava») por la fuerza social del término hebreo.
    reason: lexical_alternative
  - marker: c
    text: O «el forastero». El hebreo גֵּר se refiere al no israelita que reside entre Israel bajo su orden social; por eso se traduce «residente extranjero».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂמַחְתָּ
  english_pob_choice: And you shall rejoice
  chosen_spanish: Y te regocijarás
  alternatives_spanish:
  - Y te alegrarás
  - Y celebrarás
  lexicon: HALOT
  rationale: שׂמח expresa gozo festivo y cultual. «Regocijarás» preserva el tono de celebración solemne mejor que «alegrarás», sin añadir contenido ajeno al hebreo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: HALOT
  rationale: La expresión idiomática comunica la idea de estar ante Dios en contexto de culto. «Delante de» es natural en español y mantiene la relación espacial y reverencial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto en español: transliterar el Tetragrámaton como «Yahvé», preservando el nombre divino revelado y evitando la sustitución por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el que te pertenece
  lexicon: HALOT
  rationale: El posesivo refleja la relación de pacto sin forzar una paráfrasis. «Tu Dios» es la forma clara y sobria del hebreo.
- source_word: וְעַבְדְּךָ
  english_pob_choice: your male servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu sirviente
  lexicon: HALOT
  rationale: En este contexto legal-social, עבד apunta a condición de dependencia/bondad social, no solo a servicio. «Esclavo» conserva esa fuerza léxica y el paralelo con la esclava.
- source_word: וַאֲמָתֶךָ
  english_pob_choice: your female servant
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sierva
  - tu sirvienta
  lexicon: HALOT
  rationale: אָמָה designa la contraparte femenina de condición servil. «Esclava» mantiene la simetría con el término masculino y la precisión social del hebreo.
- source_word: וְהַלֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - el levita
  lexicon: HALOT
  rationale: Término tribal/cultual estándar. En español bíblico «levita» es preciso y natural.
- source_word: בִּשְׁעָרֶיךָ
  english_pob_choice: within your gates
  chosen_spanish: dentro de tus ciudades
  alternatives_spanish:
  - dentro de tus puertas
  - en tus ciudades
  lexicon: HALOT
  rationale: En Deuteronomio, «puertas» puede representar la vida local/comunitaria; en español, «ciudades» comunica mejor el ámbito comunitario sin perder el sentido legal de pertenencia local. Se evita una imagen demasiado literal que suene extraña al lector moderno.
- source_word: וְהַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el residente extranjero
  - el peregrino
  lexicon: HALOT
  rationale: גֵּר es el no israelita que vive entre Israel bajo su orden social. «Forastero» recoge bien la idea de alguien ajeno al linaje, sin confundirse con un mero viajero. Se mantiene la posible ambigüedad social sin borrarla.
- source_word: וְהַיָּתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el desamparado por su padre
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente «el padreless», en español «huérfano» es la equivalencia natural y tradicionalmente comprensible; aquí no se pierde el referente social de vulnerabilidad.
- source_word: וְהָאַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  alternatives_spanish:
  - la viuda
  lexicon: HALOT
  rationale: Equivalente directo y preciso.
- source_word: אֲשֶׁר בְּקִרְבֶּךָ
  english_pob_choice: who are among you
  chosen_spanish: que están entre ustedes
  alternatives_spanish:
  - que están en medio de ustedes
  - que están en tu interior
  lexicon: HALOT
  rationale: La cláusula agrupada describe a los vulnerables dentro de la comunidad. «Entre ustedes» mantiene el sentido comunitario y evita una lectura meramente espacial.
- source_word: בַּמָּקוֹם
  english_pob_choice: at the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - en el sitio
  lexicon: HALOT
  rationale: מקום designa el lugar escogido por Dios para el culto. «En el lugar» es directo y natural, conservando el carácter definido del sitio.
- source_word: אֲשֶׁר יִבְחַר
  english_pob_choice: that ... will choose
  chosen_spanish: que Yahvé tu Dios escogerá
  alternatives_spanish:
  - que Yahvé tu Dios elegirá
  lexicon: HALOT
  rationale: El futuro mantiene la fórmula de elección deuteronómica. «Escogerá» es más bíblico y sobrio que «elegirá» en este registro.
- source_word: לְשַׁכֵּן שְׁמוֹ שָׁם
  english_pob_choice: to make his name dwell there
  chosen_spanish: para hacer morar allí su nombre
  alternatives_spanish:
  - para hacer habitar allí su nombre
  - para poner allí su nombre
  lexicon: HALOT
  rationale: El causativo de שכן se refleja con «hacer morar», que conserva la idea de residencia del nombre sin reducirla a una mera colocación. «Allí» evita redundancia con «en el lugar» y reproduce la deíxis del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se conserva el nombre propio del pacto, conforme al estándar del proyecto y a la transparencia frente al texto hebreo. Se evita la sustitución por un título que ocultaría el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Condición social de עבד / אמה
  english_pob_reading: male servant / female servant
  chosen_spanish_reading: esclavo / esclava
  alternative_spanish_readings:
  - siervo / sierva
  - sirviente / sirvienta
  rationale: La relación de dependencia legal es importante en este contexto de la ley del pacto. «Esclavo / esclava» preserva esa fuerza semántica sin suavizar el texto.
  doctrine_reference: Translation philosophy §1; lexical consistency with bonded-status terms
- issue: 'Fórmula del santuario: לְשַׁכֵּן שְׁמוֹ שָׁם'
  english_pob_reading: to make his name dwell there
  chosen_spanish_reading: para hacer morar allí su nombre
  alternative_spanish_readings:
  - para hacer habitar allí su nombre
  - para poner allí su nombre
  rationale: La traducción conserva la tensión teológica entre la trascendencia divina y la presencia pactal asociada al lugar escogido. «Hacer morar» mantiene la imagen de residencia del nombre sin materializarla indebidamente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del audit trail al reflejar el sentido causativo de לְשַׁכֵּן mediante «hacer morar». En español se prefirió además restituir la terminología fuerte para עבד/אמה («esclavo / esclava») porque el contexto legal-social exige conservar la dependencia real, incluso aunque el último pase inglés suavizara a «servant».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar español del proyecto.
  - Se conserva la distinción de género en «esclavo / esclava» para עבד / אמה.
  - «Forastero» se usa aquí para גֵּר; no implica un simple viajero, sino un no israelita residente dentro de la comunidad.
  - Se evita «SEÑOR» para no ocultar el nombre divino revelado en el hebreo.
  - «Huérfano» se emplea como equivalente natural de «fatherless», sin perder el matiz de vulnerabilidad social.
