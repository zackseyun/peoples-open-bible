translation:
  language: es
  text: Y durante la vigilia de la mañana, Yahvé miró hacia abajo al campamento de los egipcios por medio de la columna de fuego y nube[a], y sumió en confusión al campamento de los egipcios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde dentro de la columna de fuego y nube».
    reason: lexical_alternative
  - marker: b
    text: O «sumió al campamento de los egipcios en pánico».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאַשְׁמֹרֶת הַבֹּקֶר
  english_pob_choice: in the morning watch
  chosen_spanish: en la vigilia de la mañana
  alternatives_spanish:
  - durante la vigilia de la mañana
  - en la guardia de la mañana
  lexicon: HALOT
  rationale: אַשְׁמֹרֶת designa una vigilia/turno de guardia; en español, «vigilia» comunica el período nocturno o de transición sin perder la idea de turno. «De la mañana» conserva la referencia temporal precisa.
- source_word: וַיַּשְׁקֵף
  english_pob_choice: looked down on
  chosen_spanish: miró hacia
  alternatives_spanish:
  - miró desde arriba
  - observó
  lexicon: HALOT
  rationale: El hebreo sugiere una mirada desde una posición elevada o dominante. En español, «miró hacia» mantiene el movimiento de la mirada sin introducir una construcción demasiado interpretativa; la dirección elevada queda expresada en la frase siguiente con la columna.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino conforme a la política del proyecto, evitando la sustitución por un título. «Yahvé» es la forma de uso más estable en español litúrgico-bíblico y mantiene la distinción frente a «Señor».
- source_word: מַחֲנֵה מִצְרַיִם
  english_pob_choice: the camp of the Egyptians
  chosen_spanish: el campamento de los egipcios
  alternatives_spanish:
  - el campamento egipcio
  - el campamento de Egipto
  lexicon: HALOT
  rationale: La construcción posesiva se vierte naturalmente como «campamento de los egipcios», conservando el sentido colectivo y militar del hebreo.
- source_word: בְּעַמּוּד אֵשׁ וְעָנָן
  english_pob_choice: through the pillar of fire and cloud
  chosen_spanish: desde la columna de fuego y nube
  alternatives_spanish:
  - por medio de la columna de fuego y nube
  - en la columna de fuego y nube
  lexicon: HALOT
  rationale: La preposición hebrea permite una lectura locativa/instrumental. Dado el español, «desde» comunica mejor la dirección de la mirada divina y evita una fórmula demasiado pesada; «columna de fuego y nube» conserva la imagen compuesta.
- source_word: וַיָּהָם
  english_pob_choice: threw the camp of the Egyptians into confusion
  chosen_spanish: puso en confusión
  alternatives_spanish:
  - desconcertó
  - sembró confusión en
  lexicon: HALOT
  rationale: הום expresa causar confusión, tumulto o pánico. «Puso en confusión» conserva la causatividad sin adelantar demasiado el grado de resultado; el objeto se completa con «el campamento de los egipcios».
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se mantiene el nombre pactual del texto hebreo como nombre propio, no como sustitución honorífica. Esto preserva la transparencia del texto y la coherencia con la política del proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de la expresión espacial/instrumental בְּעַמּוּד אֵשׁ וְעָנָן
  english_pob_reading: through the pillar of fire and cloud
  chosen_spanish_reading: desde la columna de fuego y nube
  alternative_spanish_readings:
  - por medio de la columna de fuego y nube
  - en la columna de fuego y nube
  - desde dentro de la columna de fuego y nube
  rationale: El hebreo admite un matiz locativo o instrumental. En español, «desde» deja abierta la relación exacta entre la mirada de Yahvé y la columna, sin cerrar la ambigüedad documentada por la nota inglesa, y resulta idiomático en la secuencia del versículo.
  doctrine_reference: 'DOCTRINE.md: source transparency / maintained lexical tension'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el último pase indica que no hubo cambios necesarios y que el acuerdo de revisión fue alto. La redacción española se alinea con ese estado estable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «campamento de los egipcios» para מַחֲנֵה מִצְרַיִם, evitando simplificarlo a «Egipto».
  - «Columna de fuego y nube» mantiene la imagen compuesta sin fusionarla en una sola entidad distinta.
  - «Puso en confusión» preserva el efecto causativo del verbo hebreo sin llegar a «derrotó» o «desbarató».
