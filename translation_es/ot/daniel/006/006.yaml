translation:
  language: es
  text: 'Entonces estos hombres dijeron[a]: «No hallaremos contra este Daniel ninguna acusación, a menos que la hallemos contra él en la ley de su Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ningún motivo de acusación» para «ninguna acusación».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En seguida
  - Por entonces
  lexicon: HALOT
  rationale: Adverbio temporal-secuencial que introduce la siguiente acción narrativa. «Entonces» es natural en español y conserva el avance de la escena sin añadir énfasis indebido.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - aquellos hombres
  - estos funcionarios
  - aquellos funcionarios
  lexicon: HALOT
  rationale: El arameo dice literalmente «estos hombres». En español, «hombres» reproduce el sustantivo básico sin importar una especificación no expresada en el verso.
- source_word: אָמְרִין
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - decían
  - estaban diciendo
  lexicon: HALOT
  rationale: Verbo narrativo de habla en pasado simple. «Dijeron» es la forma más natural y fiel para un relato bíblico en español moderno.
- source_word: דִּי לָא נְהַשְׁכַּח
  english_pob_choice: We will not find
  chosen_spanish: No hallaremos
  alternatives_spanish:
  - No encontraremos
  - No podremos hallar
  lexicon: HALOT
  rationale: El imperfecto arameo expresa el resultado esperado de su búsqueda. «Hallaremos» conserva la idea de búsqueda con matiz de hallazgo, y el negativo mantiene el sentido de conclusión futura.
- source_word: לְדָנִיֵּאל דְּנָה
  english_pob_choice: against this Daniel
  chosen_spanish: contra este Daniel
  alternatives_spanish:
  - respecto de este Daniel
  - acerca de este Daniel
  - en este Daniel
  lexicon: HALOT
  rationale: El valor legal/adversativo del preposición en contexto judicial se vierte naturalmente por «contra». Se conserva el demostrativo «este» para reflejar el tono puntual y posiblemente despectivo del arameo.
- source_word: כָּל עִלָּא
  english_pob_choice: any charge
  chosen_spanish: ninguna acusación
  alternatives_spanish:
  - ningún cargo
  - ningún motivo de acusación
  - ninguna base de acusación
  lexicon: HALOT
  rationale: La expresión designa una base o causa legal para acusar. «Acusación» funciona bien en español jurídico-bíblico; en la primera cláusula, el giro negativo «ninguna acusación» evita la repetición pesada de «cargo» y conserva el valor forense.
- source_word: לָהֵן
  english_pob_choice: unless
  chosen_spanish: a menos que
  alternatives_spanish:
  - excepto que
  - salvo que
  lexicon: HALOT
  rationale: Conjunción exceptiva que introduce la única condición bajo la cual sí la hallarían. «A menos que» es la equivalencia más directa y clara en español.
- source_word: הַשְׁכַּחְנָה
  english_pob_choice: we find it
  chosen_spanish: la hallemos
  alternatives_spanish:
  - la encontremos
  - la descubramos
  lexicon: HALOT
  rationale: Se repite el mismo lexema con el primer verbo para mantener la cohesión retórica del arameo. El objeto implícito se expresa con el pronombre femenino singular «la», concordando con «acusación».
- source_word: עֲלֹוהִי
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - respecto de él
  - sobre él
  lexicon: HALOT
  rationale: La preposición es adversativa/jurídica y en español se expresa con claridad por «contra». Se conserva la referencia personal directa a Daniel.
- source_word: בְּדָת אֱלָהֵהּ
  english_pob_choice: in the law of his God
  chosen_spanish: en la ley de su Dios
  alternatives_spanish:
  - en la ley de su dios
  - por la ley de su Dios
  - según la ley de su Dios
  lexicon: HALOT
  rationale: דָת se refiere aquí a ley/decreto. «Ley» es el equivalente más natural y comprensible en español; «su Dios» mantiene el posesivo del arameo y evita forzar una interpretación genérica de «dios».
theological_decisions:
- issue: Referencia a אֱלָהֵהּ
  english_pob_reading: his God
  chosen_spanish_reading: su Dios
  alternative_spanish_readings:
  - su dios
  rationale: En el contexto narrativo, el referente es el Dios de Daniel, no una deidad cualquiera. En español, la mayúscula en «Dios» ayuda a identificar correctamente al referente sin añadir contenido doctrinal ajeno al texto.
  doctrine_reference: 'DOCTRINE.md: readable modern Spanish; preserve referential clarity without importing extra doctrinal claims'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el arameo y el audit trail inglés: conserva la secuencia narrativa, el paralelismo de «hallar», el valor jurídico de la preposición y la relación posesiva «su Dios». No se observan revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se usó «Dios» con mayúscula para el referente de Daniel, conforme al contexto.
  - Se prefirió «ley» para דָת, manteniendo el tono jurídico-religioso sin introducir un término eclesiástico ajeno.
  - Se conservó el paralelismo verbal «hallaremos / la hallemos» para reflejar la repetición del original.
