review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: David establece guarniciones en Aram de Damasco, Aram queda sometido a David y lleva tributo, y Yahvé concede victoria. También preserva correctamente ‘Aram’ y ‘Yahvé’. Sin embargo, dos puntos importantes requieren corrección: (1) ‘Aram llegó a ser siervo de David’ no concuerda con el plural עֲבָדִים y suena poco natural para un sujeto nacional; (2) ‘en todo lo que iba’ no expresa fielmente el idiomatismo בְּכֹל אֲשֶׁר הָלָךְ, que significa ‘dondequiera que iba’ o ‘adondequiera que iba’.'
  spanish_quality_summary: El español es en general claro y digno, pero presenta una frase poco idiomática al final (‘en todo lo que iba’) y una construcción algo forzada en singular colectivo (‘siervo’) donde el español fluye mejor con ‘siervos’ o una reformulación equivalente. ‘Guarniciones’, ‘Aram de Damasco’, ‘tributo’ y ‘Yahvé’ funcionan bien.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → ‘Yahvé’; אֲרָם → ‘Aram’; מִנְחָה → ‘tributo’ en contexto de vasallaje. No hay conflicto doctrinal serio. La única tensión léxica es עֲבָדִים: el borrador quiso conservar el enlace con ‘servants’, pero en español ‘siervo’ singular con sujeto colectivo nacional es menos fiel al plural y menos natural que ‘siervos’.'
  issues:
  - severity: medium
    issue: ‘Aram llegó a ser siervo de David’ usa singular donde el hebreo tiene plural עֲבָדִים.
    rationale: Aunque se quiso usar un singular colectivo, el hebreo dice literalmente ‘para siervos’, y en español ‘Aram llegó a ser siervos de David’ o mejor ‘Aram llegó a ser siervos de David’ con sujeto colectivo nacional suena más fiel que el singular; el singular actual debilita el enlace léxico y resulta algo extraño.
  - severity: high
    issue: ‘en todo lo que iba’ no transmite correctamente בְּכֹל אֲשֶׁר הָלָךְ.
    rationale: La expresión hebrea significa ‘dondequiera que iba’/‘adondequiera que iba’, refiriéndose a todos los lugares o campañas de David. La redacción actual suena antinatural y puede entenderse como ‘en todo lo que hacía’, cambiando el sentido.
  revised_spanish_text: Y David puso guarniciones[a] en Aram de Damasco, y Aram llegó a ser siervos de David, trayendo tributo[b]. Y Yahvé dio a David victoria[c] dondequiera que iba.
  revised_footnotes:
