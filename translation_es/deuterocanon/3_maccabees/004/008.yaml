  to: Y sus parientes, con lazos corredizos ceñidos alrededor de sus cuellos en vez de guirnaldas, aunque en la plenitud de la juventud, pasaban en lamentos los días restantes de sus bodas, en vez de banquetes y holganza juvenil, ya viendo a Hades[a] tendido a sus pies.
