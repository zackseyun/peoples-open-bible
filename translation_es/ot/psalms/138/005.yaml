  rationale: 'Se cambia ''en los caminos'' por ''de los caminos'' para reflejar mejor la decisión lexical auditada: la frase describe el tema del canto, no principalmente su ubicación. Se conserva en nota la alternativa más literal ''en los caminos'', tal como hace la POB inglesa. No se requiere adjudicación especial, porque el ajuste es pequeño y está directamente respaldado por el expediente.'
