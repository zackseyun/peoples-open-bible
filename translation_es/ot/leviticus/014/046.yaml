  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: una persona que entra en la casa durante el período de restricción queda ritualmente impura hasta la tarde. Preserva adecuadamente el valor genérico de וְהַבָּא, la duración de כָּל יְמֵי, y el sentido cultual de יִטְמָא. La nota también conserva correctamente las alternativas de הִסְגִּיר אֹתוֹ.'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero hay dos detalles mejorables: 1) el anclaje de la nota en «cualquiera» no corresponde al término explicado, pues la nota trata sobre «esté aislada/confinada/encerrada»; debe anclarse en esa frase. 2) «durante todos los días que esté aislada» suena aceptable, pero «todos los días que haya sido aislada» sería menos natural; la mejor redacción es mantener la estructura pero reubicar la nota. Además, «Y cualquiera que entre» es comprensible, aunque «Y todo el que entre» suena más jurídico-bíblico y fluido en español.'
  glossary_alignment: No hay términos del glosario principal en juego como Yahvé o Mesías. «Inmundo» está bien alineado con la categoría ritual de Levítico. «Aislada» es una buena decisión para הִסְגִּיר אֹתוֹ en este contexto, evitando un matiz excesivamente médico de «cuarentena» en el texto principal mientras se aclara en nota.
  issues:
