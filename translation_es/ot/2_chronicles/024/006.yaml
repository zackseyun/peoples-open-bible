  - severity: medium
    issue: ‘la contribución’ para מַשְׂאַת
    rationale: La palabra española suena demasiado voluntaria. El término hebreo y la auditoría inglesa subrayan una carga impuesta para el santuario; ‘tributo’ refleja mejor esa obligatoriedad, con nota para alternativas.
  - severity: low
    issue: ‘tabernáculo del testimonio’ en el texto principal
    rationale: Aunque comprensible, reemplaza innecesariamente ‘tienda’ por un término más interpretativo/tradicional. La auditoría inglesa privilegia la cercanía formal a ‘tent of the testimony’.
