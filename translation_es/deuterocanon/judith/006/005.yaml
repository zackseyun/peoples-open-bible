translation:
  language: es
  text: Pero tú, Aquior, asalariado[a] de Amón, que hablaste estas palabras en el día de tu injusticia[b], ya no verás mi rostro desde este día hasta que yo me vengue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mercenario» o «jornalero» para μισθωτέ, es decir, uno que sirve por paga.
    reason: lexical_alternative
  - marker: b
    text: La frase también puede entenderse como «en el día de tu maldad» o «en el día de tu iniquidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: μισθωτέ
  english_pob_choice: hireling
  chosen_spanish: hireling
  alternatives_spanish:
  - mercenario
  - hombre asalariado
  - sirviente asalariado
  lexicon: LSJ
  rationale: El griego designa a alguien que trabaja por paga; en este contexto de reproche directo, "hireling" conserva mejor la fuerza despectiva y la concreción del original que "mercenario", que en español puede sonar más militarizado de lo que exige el pasaje.
- source_word: τοῦ Ἀμμών
  english_pob_choice: of Ammon
  chosen_spanish: de Amón
  alternatives_spanish:
  - amonita
  - de los amonitas
  lexicon: LSJ
  rationale: Se conserva la referencia genitiva de pertenencia/origen con "de Amón", que sigue de cerca la forma griega y evita convertir prematuramente el sintagma en un adjetivo étnico.
- source_word: ἐλάλησας
  english_pob_choice: spoke
  chosen_spanish: hablaste
  alternatives_spanish:
  - dijiste
  - pronunciaste
  lexicon: BDAG
  rationale: '"Hablar" reproduce bien λαλέω en una acusación formal y mantiene la conexión directa con "estas palabras".'
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este mensaje
  lexicon: BDAG
  rationale: '"Estas palabras" es la correspondencia más transparente y mantiene la referencia explícita al discurso previo de Achior.'
- source_word: ἐν ἡμέρᾳ ἀδικίας σου
  english_pob_choice: in the day of your injustice
  chosen_spanish: en el día de tu injusticia
  alternatives_spanish:
  - en el día de tu maldad
  - en el día de tu wrongdoing
  - en el día de tu iniquidad
  lexicon: LSJ
  rationale: '"Injusticia" conserva la carga léxica de ἀδικία sin resolver demasiado el matiz entre culpa moral, agravio u ofensa leal. Se mantiene la formulación algo solemne y acusatoria del griego.'
- source_word: οὐκ ὄψῃ ἔτι τὸ πρόσωπόν μου
  english_pob_choice: shall no longer see my face
  chosen_spanish: ya no verás más mi rostro
  alternatives_spanish:
  - no verás más mi rostro
  - ya no verás mi rostro
  lexicon: BDAG
  rationale: Se mantiene el giro idiomático de "ver el rostro" como señal de presencia y favor/relación personal, naturalizado en español con "mi rostro".
- source_word: ἀπὸ τῆς ἡμέρας ταύτης
  english_pob_choice: from this day
  chosen_spanish: desde este día
  alternatives_spanish:
  - a partir de este día
  - desde hoy
  lexicon: BDAG
  rationale: '"Desde este día" es una equivalencia directa y sobria del valor temporal del griego.'
- source_word: ἕως οὗ ἐκδικήσω
  english_pob_choice: until I take vengeance
  chosen_spanish: hasta que yo me vengue
  alternatives_spanish:
  - hasta que tome venganza
  - hasta que yo ejecute venganza
  - hasta que yo me venga
  lexicon: BDAG
  rationale: '"Me vengue" reproduce el sentido punitivo de ἐκδικέω en primera persona con una forma natural en español. Evita añadir un objeto explícito que el griego no expresa aquí y conserva la tensión del juramento de represalia.'
theological_decisions:
- issue: ἀδικία en una acusación hostil
  english_pob_reading: in the day of your injustice
  chosen_spanish_reading: en el día de tu injusticia
  alternative_spanish_readings:
  - en el día de tu maldad
  - en el día de tu iniquidad
  - en el día de tu wrongdoing
  rationale: No se suaviza ni se moraliza el término. "Injusticia" preserva la ambigüedad del original entre injusticia moral, agravio y conducta culpable, manteniendo la tensión acusatoria sin interpretarla en exceso.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión semántica y no resolverla prematuramente'
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que prefirió "hireling" para μισθωτέ y se mantuvo la solución ya establecida para ἀδικία como "injustice"; el español reproduce esas decisiones con equivalentes naturales y conserva el tono acusatorio del versículo.
  spanish_consistency_notes:
  - Se usa "Yahvé" cuando aparece el nombre divino; aquí el texto no lo contiene, así que no aplica.
  - Se mantiene "Mesías"/"Cristo" fuera de este versículo, ya que no hay término correspondiente.
  - '"Rostro" reproduce el idiomatismo de πρόσωπον sin normalizarlo a "presencia" para no perder la imagen verbal.'
  - La puntuación separa la vocación inicial del resto del reproche para reflejar la sintaxis griega.
