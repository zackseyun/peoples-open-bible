    text: O «los hipócritas». El término hebreo puede designar a los impíos o irreligiosos, no solo a quienes son insinceros.
    reason: lexical_alternative
  - marker: b
    text: O «podrá morar» o «podrá vivir como forastero». El verbo hebreo puede significar «morar», «residir» o «vivir como forastero».
    reason: lexical_alternative
  - marker: c
    text: «Fuego consumidor» hace eco del lenguaje bíblico de la presencia santa y juzgadora de Dios; compárese Deuteronomio 4:24 y Hebreos 12:29.
    reason: cross_reference
