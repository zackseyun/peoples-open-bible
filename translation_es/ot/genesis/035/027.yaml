  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: llegada de Jacob a Isaac su padre, identificación de Mamre/Kiriat-arba con Hebrón, y la cláusula relativa sobre Abraham e Isaac. Sin embargo, omite en el texto el adverbio שָׁם (''allí''), aunque sí aparece en las decisiones léxicas. Además, «fue a Isaac» es menos adecuado que «vino a Isaac» o «llegó adonde estaba Isaac» dado que el inglés auditado eligió ''came'' por perspectiva de llegada. La nota léxica sobre גָּר está bien preservada.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad y fidelidad puntual. «Vino a Isaac, su padre» suena más cercano al valor narrativo y «allí» debe expresarse. También conviene ajustar la puntuación de la aposición para que la frase fluya mejor.
  glossary_alignment: No hay términos del glosario principal en disputa aquí. Los nombres propios están bien conservados. La elección «habían vivido como forasteros» suena más natural en español que «habían habitado como forasteros», sin perder el matiz documentado para גָּר.
  issues:
  - severity: medium
    issue: Omisión de שָׁם en el texto español
    rationale: El hebreo incluye explícitamente 'allí', y el POB inglés lo conserva con 'where ... had sojourned' implícitamente dentro de la cláusula, pero las decisiones léxicas del borrador reconocen שָׁם como 'allí'. Debe aparecer en español para plena fidelidad.
  - severity: medium
    issue: «fue a Isaac» debilita la perspectiva de llegada de וַיָּבֹא
    rationale: Aunque posible, «fue a» en español se alinea más con un simple desplazamiento; «vino a» refleja mejor la llegada al lugar/persona de referencia, en línea con la decisión inglesa auditada.
  - severity: low
    issue: «habitado como forasteros» es menos idiomático que «vivido como forasteros»
    rationale: Ambas opciones preservan el matiz, pero «vivido como forasteros» suena más natural y coincide con la alternativa ya documentada en la nota.
  revised_spanish_text: Y Jacob vino a Isaac, su padre, en Mamre[a], Kiriat-arba (es decir, Hebrón), donde Abraham e Isaac habían vivido allí como forasteros.
  revised_footnotes:
  - marker: a
    text: O «donde Abraham e Isaac habían habitado como forasteros». El verbo hebreo puede expresar residencia temporal o de extranjero, no solo vivir en un lugar en sentido general.
    reason: lexical_alternative
  revision_rationale: Se revisa para incluir explícitamente 'allí' por fidelidad a שָׁם, ajustar el verbo principal a «vino» para reflejar mejor וַיָּבֹא según la perspectiva de llegada documentada, y mejorar la naturalidad de גָּר con «vivido como forasteros».
