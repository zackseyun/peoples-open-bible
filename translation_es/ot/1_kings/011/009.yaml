translation:
  language: es
  text: Yahvé se enojó con Salomón, porque su corazón se había apartado de Yahvé, el Dios de Israel, que se le había aparecido dos veces.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּתְאַנַּף
  english_pob_choice: became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se indignó
  - se airó
  - se enfureció
  lexicon: HALOT
  rationale: El verbo expresa el comienzo o la manifestación de la ira; en español, 'se enojó' comunica ese valor con naturalidad sin intensificarlo indebidamente como 'se enfureció'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrámaton como 'Yahvé', siguiendo la decisión de la POB en inglés y evitando la sustitución por un título.
- source_word: בִּשְׁלֹמֹה
  english_pob_choice: with Solomon
  chosen_spanish: con Salomón
  alternatives_spanish:
  - contra Salomón
  - respecto de Salomón
  lexicon: HALOT
  rationale: Con verbos de ira, la preposición puede reflejar relación afectada por desagrado. En español, 'con Salomón' es idiomático y mantiene la relación personal sin cargar de más la preposición.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la ira divina; 'porque' es la equivalencia clara y natural en español.
- source_word: נָטָה לְבָבוֹ
  english_pob_choice: his heart had turned away
  chosen_spanish: su corazón se había apartado
  alternatives_spanish:
  - su corazón se había inclinado lejos
  - su corazón se había desviado
  lexicon: HALOT
  rationale: La imagen hebrea de 'inclinar/torcer el corazón' se vierte con el valor covenantal de apartarse. 'Se había apartado' conserva la idea de alejamiento y deslealtad sin sonar forzado.
- source_word: מֵעִם
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de junto a
  - alejándose de
  lexicon: HALOT
  rationale: En español, el movimiento de separación queda suficientemente expresado por 'apartado de'; usar solo 'de' evita redundancia y sigue la economía del inglés auditado.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: Se mantiene la identificación de pacto con una formulación transparente y reverente, sin reinterpretarla.
- source_word: הַנִּרְאָה אֵלָיו
  english_pob_choice: who had appeared to him
  chosen_spanish: que se le había aparecido
  alternatives_spanish:
  - que le había aparecido
  - el que se le aparecía
  lexicon: HALOT
  rationale: El participio atributivo se traduce con oración relativa; el pluscuamperfecto refleja que la aparición ocurrió antes del estado descrito. 'Se le había aparecido' conserva bien el matiz de revelación personal.
- source_word: פַּעֲמָיִם
  english_pob_choice: twice
  chosen_spanish: dos veces
  alternatives_spanish:
  - dos ocasiones
  - dos veces ya
  lexicon: HALOT
  rationale: La adverbial dual se expresa de forma natural como 'dos veces'.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto de ira y ruptura de lealtad
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre personal del pacto. No se sustituye por un título, porque el texto subraya precisamente que Salomón se apartó de Yahvé, el Dios de Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje antropopático de la ira divina
  english_pob_reading: became angry
  chosen_spanish_reading: se enojó
  alternative_spanish_readings:
  - se airó
  - se enfureció
  rationale: La traducción mantiene la atribución bíblica de ira a Yahvé sin atenuarla a mera desaprobación ni exagerarla. 'Se enojó' es la opción más neutral y fiel.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura inglesa auditada y el hebreo base, sin cambios respecto al sentido confirmado por el control cruzado; se preservan el nombre divino, la metáfora del corazón apartado y la referencia a las dos apariciones.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en lugar de 'el SEÑOR' conforme al estándar del proyecto.
  - '''Salomón'' se mantiene como nombre propio tradicional y transparente.'
  - '''Se le había aparecido'' conserva el valor relacional y revelatorio del verbo hebreo.'
  - No se añaden notas al pie porque no hay variante textual ni ambigüedad que requiera anclaje explícito en este versículo.
