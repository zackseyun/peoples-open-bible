translation:
  language: es
  text: La cosecha[a] ha pasado, el verano ha terminado, y nosotros no hemos sido salvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «librados» o «rescatados»: el verbo hebreo puede denotar ser sacados de peligro o calamidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָבַר
  english_pob_choice: has passed
  chosen_spanish: ha pasado
  alternatives_spanish:
  - pasó
  - ya pasó
  lexicon: HALOT
  rationale: El perfecto qal expresa una acción completada; «ha pasado» conserva ese valor resultativo en un español natural y digno.
- source_word: קָצִיר
  english_pob_choice: the harvest
  chosen_spanish: la cosecha
  alternatives_spanish:
  - la siega
  - la cosecha de mies
  lexicon: HALOT
  rationale: En español, «cosecha» comunica el periodo de recolección de manera clara y poética. «Siega» sería más literal en algunos contextos, pero menos natural aquí.
- source_word: כָּלָה
  english_pob_choice: has ended
  chosen_spanish: ha terminado
  alternatives_spanish:
  - se ha acabado
  - ha llegado a su fin
  lexicon: HALOT
  rationale: El perfecto qal indica culminación; «ha terminado» mantiene el paralelismo con «ha pasado» y suena natural en español.
- source_word: קַיִץ
  english_pob_choice: the summer
  chosen_spanish: el verano
  alternatives_spanish:
  - el estío
  lexicon: HALOT
  rationale: «Verano» es el equivalente normal y claro en español contemporáneo; «estío» sería más literario y menos accesible.
- source_word: וַאֲנַחְנוּ
  english_pob_choice: and we
  chosen_spanish: y nosotros
  alternatives_spanish:
  - y nosotros,
  - pero nosotros
  lexicon: HALOT
  rationale: La conjunción básica es coordinante; «y nosotros» sigue de cerca la estructura hebrea, aunque el contexto lamentoso deja sentir un contraste implícito.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: Negación directa y simple.
- source_word: נוֹשָׁעְנוּ
  english_pob_choice: have not been saved
  chosen_spanish: hemos sido salvados
  alternatives_spanish:
  - hemos sido rescatados
  - no hemos sido librados
  lexicon: HALOT
  rationale: El nifal de ישׁע puede significar ser salvado o rescatado. «Hemos sido salvados» preserva la amplitud semántica y la fuerza pasiva/resultativa sin cerrar el sentido a una sola clase de rescate.
theological_decisions:
- issue: Sentido de ישׁע en un lamento nacional
  english_pob_reading: 'saved (with lexical note: delivered is possible)'
  chosen_spanish_reading: 'salvados (con nota alternativa: «rescatados»/«librados» posible)'
  alternative_spanish_readings:
  - rescatados
  - librados
  rationale: En este versículo el hablante lamenta la ausencia de rescate tras un tiempo esperado; «salvados» es la traducción más directa y conserva la resonancia bíblica amplia de la liberación divina, sin restringirla a una acepción doctrinal posterior.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; readable modern Spanish'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: no hubo revisiones aplicadas y la traducción inglesa final se mantuvo estable. La decisión española sigue esa lectura sin añadir explicación interpretativa extra.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Salvados» preserva la amplitud de ישׁע en contexto de calamidad nacional.
  - La puntuación reproduce el paralelismo poético del hebreo con dos cláusulas breves y una conclusión negativa.
