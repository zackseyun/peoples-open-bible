  text: יֵבֹ֣שׁוּ יִכְלוּ֮ שֹׂטְנֵ֪י נַ֫פְשִׁ֥/י יַֽעֲט֣וּ חֶ֭רְפָּה וּ/כְלִמָּ֑ה מְ֝בַקְשֵׁ֗י רָעָתִֽ/י׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/071/013.yaml
