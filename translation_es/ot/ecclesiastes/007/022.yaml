  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: una cláusula causal, conocimiento interior expresado con ''corazón'', el modismo ''muchas veces'', y la implicación personal del oyente. También preserva adecuadamente la nota léxica sobre קִלַּלְתָּ. Sin embargo, hay una pequeña inconsistencia con la auditoría inglesa revisada: el primer גַּם ya no se expresó en el texto inglés final por razones de naturalidad, y en español ''tu corazón sabe'' ya comunica bien la idea sin añadir ''también''.'
  spanish_quality_summary: El español es claro y digno, pero 'Porque tu corazón sabe...' al inicio de versículo suena un poco más pesado que 'Pues tu corazón sabe...'. Además, 'tú mismo también' funciona, aunque 'tú también' suele sonar más natural; no obstante, mantener el énfasis personal es defendible. La reparación principal es quitar un 'también' innecesario en la primera mitad para mayor naturalidad y mejor alineación con la decisión auditada.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Corazón' preserva bien לִבְּךָ. 'Maldecido' es aceptable como traducción principal de קִלַּלְתָּ, y la nota conserva alternativas contextuales ('insultado', 'hablado mal de').
  issues:
  - severity: medium
    issue: Se añadió 'también' en la primera cláusula ('tu corazón sabe que muchas veces...') pese a que la auditoría inglesa final lo eliminó por naturalidad.
    rationale: Aunque el primer גַּם existe en hebreo, la revisión POB decidió no reflejarlo explícitamente en la redacción principal. En español, omitirlo produce una frase más natural sin pérdida sustancial de sentido.
  - severity: low
    issue: '''Porque'' es posible, pero ''Pues'' puede sonar más idiomático al inicio de una explicación conectada con el versículo anterior.'
    rationale: No es un error semántico; es una mejora estilística menor de legibilidad bíblica en español.
