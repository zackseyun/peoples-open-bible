translation:
  language: es
  text: Incluso cuando clame y pida ayuda[a], él bloquea mi oración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aun cuando clame y clame por ayuda, él bloquea mi oración».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם כִּי
  english_pob_choice: Even when
  chosen_spanish: Aunque
  alternatives_spanish:
  - Incluso cuando
  - Aun cuando
  lexicon: HALOT
  rationale: 'La construcción introduce un matiz concesivo intenso: pese a que el hablante clama, ocurre la acción siguiente. «Aunque» transmite bien esa concesión en español sin volverse rígido.'
- source_word: אֶזְעַק
  english_pob_choice: I cry out
  chosen_spanish: clame
  alternatives_spanish:
  - grite
  - grite a voz en cuello
  - clame
  lexicon: HALOT
  rationale: זעק denota un clamor intenso, a menudo en aflicción. «Clame» conserva ese tono de angustia; se coordina con el paralelismo sin perder la intensidad.
- source_word: וַאֲשַׁוֵּעַ
  english_pob_choice: and call for help
  chosen_spanish: y grite pidiendo ayuda
  alternatives_spanish:
  - y clame por ayuda
  - y suplique ayuda
  - y pida auxilio
  lexicon: HALOT
  rationale: שׁוע en piel expresa una súplica desesperada de auxilio. En español conviene distinguirlo de זעק, y «grite pidiendo ayuda» mantiene esa diferencia de manera natural.
- source_word: שָׂתַם
  english_pob_choice: he shuts out
  chosen_spanish: cierra el acceso
  alternatives_spanish:
  - bloquea
  - cierra
  - obstruye
  lexicon: HALOT
  rationale: El verbo significa tapar, cerrar u obstruir. Con «mi oración» como objeto, «cierra el acceso» expresa que la oración no puede llegar a su destino y evita una calca demasiado dura.
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi ruego
  lexicon: HALOT
  rationale: El sustantivo significa de forma directa «oración». «Mi oración» es la equivalencia más clara y fiel en español.
theological_decisions:
- issue: Sujeto implícito de «cierra el acceso»
  english_pob_reading: Retain the masculine singular pronoun 'he' without explicitly supplying 'God' or 'the Lord.'
  chosen_spanish_reading: Mantener «él» sin explicitar «Dios» o «el SEÑOR».
  alternative_spanish_readings:
  - Dios cierra el acceso a mi oración
  - mi oración es cerrada
  rationale: El hebreo usa un verbo en 3ms sin sujeto explícito, aunque el contexto lo deja claro. Mantener «él» preserva la concisión del original y no añade un referente que el versículo no nombra.
  doctrine_reference: Primacía del texto original; evitar añadir información no expresada en el versículo.
translation_notes:
  revision_awareness: El texto sigue el estado final del auditorio en inglés, sin revisiones posteriores reportadas; se mantiene la lectura concesiva y el sujeto implícito del verbo final.
  spanish_consistency_notes:
  - Se usa «oración» para תְּפִלָּה como término estándar, coherente con el resto del proyecto.
  - Se mantiene «él» para el sujeto implícito del verbo final, siguiendo la economía del hebreo.
  - Se distingue entre los dos verbos de clamor con dos expresiones españolas no idénticas para conservar el paralelismo.
