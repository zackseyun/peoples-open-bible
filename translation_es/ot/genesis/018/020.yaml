  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y sigue de cerca el audit trail inglés: conserva «Yahvé» para יְהוָה, explicita contextualmente «clamor contra» para זַעֲקַת סְדֹם וַעֲמֹרָה, y comunica adecuadamente la idea idiomática de כָבְדָה מְאֹד con «muy grave». La secuencia narrativa de וַיֹּאמֶר también está bien representada con «Entonces ... dijo».'
  spanish_quality_summary: 'El texto principal suena natural, digno y claro en español eclesial general. La única reparación necesaria está en la nota [b]: «muy pesada» en femenino no concuerda con el antecedente explícito en español («pecado», masculino). Conviene ajustar la nota para evitar una discordancia gramatical y una falsa impresión de torpeza innecesaria.'
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; חַטָּאת → «pecado»; el modismo de כבד se vierte idiomáticamente como «grave». No hay conflicto doctrinal ni terminológico relevante.'
  issues:
  - severity: medium
    issue: Discordancia gramatical en la nota [b]
    rationale: 'La nota dice «O: “es muy pesada”», pero en el texto principal el referente es «pecado», que exige masculino: «muy pesado». Aunque la nota pretende reflejar el femenino del hebreo, en español así formulada resulta gramaticalmente defectuosa y puede confundir al lector.'
  revised_spanish_text: 'Entonces Yahvé dijo[a]: «El clamor contra Sodoma y Gomorra es grande[b], y su pecado es muy grave».'
  revised_footnotes:
  - marker: a
    text: 'O: «El clamor de Sodoma y Gomorra es grande». El hebreo puede traducirse de manera más literal así; el texto principal hace explícito que el clamor va dirigido contra ellas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su pecado es muy pesado». El hebreo dice literalmente que «es muy pesado», un modismo para indicar gran gravedad.'
    reason: lexical_alternative
  revision_rationale: Se conserva íntegramente el texto principal porque es fiel y natural. Solo se corrige la nota [b] para que el español concuerde con «pecado» y siga explicando con precisión el modismo hebreo; también se pule levemente la redacción de [a] para una formulación más natural sin cambiar el contenido.
