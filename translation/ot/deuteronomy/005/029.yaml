theological_decisions:
- issue: Anthropological language of לְבָבָם
  chosen_reading: heart
  alternative_readings:
  - mind
  - inner being
  rationale: The verse speaks of the people's inward moral-spiritual disposition before God. Rendering as 'heart' preserves the biblical category and avoids reducing obedience to mere cognition.
  doctrine_reference: Translation philosophy §6; preserve source meaning without flattening theological weight.
- issue: Gender rendering of וְלִבְנֵיהֶם
  chosen_reading: their children
  alternative_readings:
  - their sons
  rationale: Though grammatically masculine, the term functions generically for descendants in this covenant context. This follows the gender-accurate policy by matching the source intent rather than the grammatical form alone.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral).
