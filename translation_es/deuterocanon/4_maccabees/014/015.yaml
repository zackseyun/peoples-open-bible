translation:
  language: es
  text: Y aun entre las aves, algunas, al hacer sus nidos sobre las casas, protegen a sus polluelos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las mansas, que hacen sus nidos sobre las casas, protegen a sus polluelos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πετεινῶν
  english_pob_choice: birds
  chosen_spanish: aves
  alternatives_spanish:
  - pájaros
  - aves del cielo
  lexicon: LSJ
  rationale: πέτεινῶν designa aves en general; «aves» conserva la amplitud semántica y es natural en español bíblico contemporáneo.
- source_word: ἥμερα
  english_pob_choice: some
  chosen_spanish: algunas
  alternatives_spanish:
  - las domesticadas
  - las mansas
  lexicon: LSJ
  rationale: El adjetivo significa «tame/domesticated», pero el audit trail inglés opta por «some» para evitar rigidez. En español, «algunas» preserva esa fluidez y deja implícita la clase distinguida por su comportamiento doméstico.
- source_word: κατὰ τὰς οἰκίας
  english_pob_choice: of houses
  chosen_spanish: en las casas
  alternatives_spanish:
  - sobre las casas
  - alrededor de las casas
  lexicon: LSJ
  rationale: La frase apunta a la relación con las casas; «en las casas» comunica con naturalidad el contexto doméstico sin forzar un detalle espacial no explicitado de forma inequívoca en español.
- source_word: ὀροφοποιοῦντα
  english_pob_choice: making their nests
  chosen_spanish: al hacer sus nidos
  alternatives_spanish:
  - anidando
  - haciendo nidos en los techos
  lexicon: LSJ
  rationale: El compuesto se refiere a actividad de nidificación relacionada con el techo/casa. «Al hacer sus nidos» es idiomático y fiel al acto descrito; evita una paráfrasis más técnica que podría sonar artificial.
- source_word: προασπίζει
  english_pob_choice: protect
  chosen_spanish: protegen
  alternatives_spanish:
  - defienden
  - resguardan
  lexicon: LSJ
  rationale: El verbo expresa defensa/protección activa. «Protegen» sigue la revisión inglesa y conserva el sentido general sin introducir una nota marcial excesiva.
- source_word: νεοττῶν
  english_pob_choice: their young
  chosen_spanish: a sus polluelos
  alternatives_spanish:
  - a sus crías
  - a sus nidos
  lexicon: LSJ
  rationale: El término se refiere a aves jóvenes; «polluelos» es preciso y natural en español para este contexto zoológico y conserva el vínculo parental.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente del audit trail, que volvió más literal κατὰ τὰς οἰκίας con una referencia simple a las casas y prefirió «protect» frente a «defend». La redacción española refleja esa orientación sin perder la posible tensión léxica entre la domesticidad de ἥμερα y el sujeto generalizado «algunas».
  spanish_consistency_notes:
  - Se mantiene «aves» para πετεινῶν, evitando una especificación innecesaria.
  - «Polluelos» conserva el matiz de νεοττῶν mejor que un genérico abstracto, y armoniza con el contexto de aves.
  - La nota alternativa preserva la tensión documental entre una lectura más literal («las mansas») y la opción más fluida del texto principal.
