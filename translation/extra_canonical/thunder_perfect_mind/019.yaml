translation:
  text: I am the voice whose sound is manifold[a], and the word whose appearance is
    manifold. I am the utterance of my name. Why, you who hate me, do you love me[g][f][e][d][c][b],
    and hate those who love me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲙⲉⲉⲩⲉ can mean thought, understanding, or counsel; I choose “counsel” here
      to pair an intellectual force with a ‘staff.’ Some English traditions read “power,”
      which is less direct to the Coptic.
    reason: lexical_alternative
  - marker: b
    text: “He is my rod when I grow old by day” renders ϩⲣⲟⲟⲩ literally; it may be
      idiomatic for “as I grow old” or “in old age.” ⲥⲙⲏ here is uncertain in the
      OCR and could reflect an implement term or be confounded with an age-term.
    reason: alignment_note
  - marker: c
    text: ⲡⲗⲟⲅⲟⲥ is left as “Logos” to preserve resonance; “Word” is a reasonable
      alternative.
    reason: lexical_alternative
  - marker: d
    text: ⲉⲧⲉ ⲛⲁ ϣⲉ ⲡⲉϥⲉⲓⲛⲉ could be rendered “whatever his will will happen/bring
      to pass,” with an implicit “for me” supplied by context in some translations.
    reason: alternative_reading
  - marker: e
    text: The closing love/hate sayings often mark a transition to the address-to-audience
      sections in Thunder; their presence here may reflect a stanza boundary issue
      in the alignment.
    reason: alignment_note
  - marker: f
    text: The staff/rod pairing forms deliberate parallelism of reciprocal support
      across life-stages.
    reason: parallelism_note
  - marker: g
    text: Or 'I am the staff of his counsel in his youth; and he is my rod when I
      grow old by day; and the Logos is what his will shall be; I am the utterance
      of my name—because of those who hate me, you love me, and you hate those who
      love me.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲥⲣⲡ
  chosen: staff
  alternatives:
  - rod
  - scepter
  lexicon: Crum
  rationale: Common Sahidic noun for a staff/rod; “staff” preserves concrete imagery
    while not over-reading regal nuance as “scepter.”
- source_word: ⲙⲉⲉⲩⲉ
  chosen: counsel
  alternatives:
  - thought
  - understanding
  lexicon: Crum
  rationale: Semantic range includes thought, reflection, counsel. In this context
    a governing/intellectual force pairs with “staff,” hence “counsel.”
- source_word: ⲛⲁϣⲉ (noun)
  chosen: youth
  alternatives:
  - boyhood
  - young age
  lexicon: Crum
  rationale: Fits the antithetic pair with “grow old” later in the line-block and
    is a known noun meaning youth/young manhood.
- source_word: ⲥⲙⲏ
  chosen: rod
  alternatives:
  - old age
  lexicon: Crum
  rationale: Entry may reflect either a staff-like implement in some contexts or be
    confused in OCR with a term for age; chosen for parallelism with ⲥⲣⲡ while noting
    uncertainty.
- source_word: ϩⲣⲟⲟⲩ
  chosen: day
  alternatives:
  - daytime
  lexicon: Crum
  rationale: Literal “day”; rendered adverbially as “by day/ in the day” to reflect
    Coptic usage.
- source_word: ⲡⲗⲟⲅⲟⲥ
  chosen: Logos
  alternatives:
  - Word
  lexicon: LSJ / Coptic loanword lists
  rationale: Deliberately preserved as “Logos” to retain the philosophical/theological
    resonance in Thunder; “Word” noted as viable alternative.
- source_word: ⲉⲓⲛⲉ
  chosen: will
  alternatives:
  - intention
  - desire
  lexicon: Crum
  rationale: Regular Coptic term for volition; “will” matches neighboring theological
    register (Logos).
- source_word: ⲛⲁ ϣⲉ (future of ϣⲉ)
  chosen: shall be
  alternatives:
  - will happen
  - will come to pass
  lexicon: Crum
  rationale: Coptic future marker ⲛⲁ- with ϣⲉ (“be/come to pass”); rendered with “shall
    be” to preserve the starkness without smoothing.
- source_word: ⲡϣⲁϫⲉ
  chosen: utterance
  alternatives:
  - speech
  - word
  lexicon: Crum
  rationale: “Utterance” keeps the oracular tone and avoids overlap with Greek Logos/Word.
- source_word: ⲣⲁⲛ
  chosen: name
  alternatives: []
  lexicon: Crum
  rationale: Standard rendering.
- source_word: ⲙⲟⲥⲧⲉ
  chosen: hate
  alternatives:
  - detest
  - reject
  lexicon: Crum
  rationale: Well-attested verb for hatred; needed to preserve the sharp paradox.
- source_word: ⲙⲉ
  chosen: love
  alternatives:
  - desire
  - want
  lexicon: Crum
  rationale: In Thunder this verb regularly opposes ⲙⲟⲥⲧⲉ; “love” retains the rhetorical
    antithesis with “hate.”
parallelism_check: 'The couplet balances implements and ages: “I am the staff of his
  counsel in his youth” // “he is my rod when I grow old,” preserving reciprocal imagery
  (staff/rod) and temporal antithesis (youth/old age). The next pair balances speech-forms
  and volition: Logos // will; then “utterance” // “name.” The closing lines intentionally
  retain the paradoxical antithesis you love me // you hate those who love me.'
voice_check: The first-person divine voice is maintained with repeated “I am” declarations,
  followed by direct second-person address characteristic of Thunder’s admonitory
  cadence. No smoothing of contradictions; the tone remains oracular and paradoxical.
alignment_risk_note: 'Mapping confidence is only medium. Specific risks: (1) ⲉⲧⲉⲛⲁϣⲉ
  may scan either as “which will be” (ⲛⲁ-ϣⲉ) or as the noun “youth”; I render the
  first occurrence as “youth” (by parallel with ‘grow old’) and the later occurrence
  (with ⲡⲉϥⲉⲓⲛⲉ) as “shall be.” (2) ⲥⲙⲏ is uncertain in this OCR; it may be an implement
  term parallel to ⲥⲣⲡ or a misread age-term. I chose “rod” to preserve the couplet’s
  symmetry but note the ambiguity. (3) The lines beginning “because of those who hate
  me…” may belong to an adjacent admonitory block; if so, the stanza break would be
  adjusted. (4) The clause with ⲡⲗⲟⲅⲟⲥ ⲉⲧⲉ ⲛⲁϣⲉ ⲡⲉϥⲉⲓⲛⲉ could also read more dynamically
  as “and the Word—whatever his will will bring to pass [for me]”; the indirect object
  is not explicit in the OCR fragment.'
