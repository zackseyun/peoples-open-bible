  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y la línea del POB inglés: conserva la metáfora de שָׂטִית con ''te has desviado'', mantiene el modismo de תחת con nota, expresa נִטְמֵאת en registro ritual-moral, y traduce el eufemismo sexual con una expresión natural. Sin embargo, ''fuera de tu marido'' no representa bien מִבַּלְעֲדֵי (''aparte de / además de / fuera de la presencia de'' no encaja aquí); el sentido es exclusión comparativa: otro hombre distinto del marido. También ''te has contaminado'' suena algo material; ''te has vuelto impura'' o ''te has manchado'' preserva mejor la categoría ritual.'
  spanish_quality_summary: El español es generalmente claro y digno, pero dos giros piden ajuste para mejor naturalidad y precisión bíblica. 'Estando bajo tu marido' es aceptable con nota, aunque algo rígido; se puede mantener por fidelidad idiomática. En cambio, 'fuera de tu marido' es poco natural y semánticamente impreciso en español. 'Te has vuelto impura' suena más bíblico y adecuado al contexto legal-ritual que 'te has contaminado'.
  glossary_alignment: 'No hay términos del glosario principal en juego como Yahvé/Mesías. Las decisiones léxicas importantes siguen la filosofía del proyecto: preservar la metáfora de desviación marital, mantener nota sobre el modismo ''bajo tu marido'', y usar un eufemismo sexual inteligible. Se recomienda alinear נִטְמֵאת con ''impura'' por su fuerza ritual y מִבַּלְעֲדֵי con ''aparte de tu marido''.'
