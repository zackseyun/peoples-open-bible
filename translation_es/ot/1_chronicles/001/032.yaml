revisions:
- from: 'Y los hijos de Quetura[a], concubina de Abraham: ella dio a luz a Zimrán, Jocsán, Medán, Madián, Isbac y Súa. Y los hijos de Jocsán: Seba y Dedán.'
  to: 'Y los hijos de Quetura[a], concubina de Abraham: engendró a Zimrán, Jocsán, Medán, Madián, Isbac y Suaj. Y los hijos de Jocsán: Seba y Dedán.'
  rationale: Se mantiene la fidelidad principal al hebreo y al POB inglés, especialmente «concubina» y la estructura repetitiva de la genealogía. Se ajusta el verbo a un registro genealógico más conciso y natural en español («engendró») y se regularizan dos nombres propios para mayor legibilidad e identificación bíblica en español amplio.
