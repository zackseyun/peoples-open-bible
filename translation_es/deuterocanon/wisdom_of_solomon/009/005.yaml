translation:
  language: es
  text: porque yo soy tu esclavo y el hijo de tu esclava[a], hombre débil y de vida breve, y falto de entendimiento del juicio y de las leyes[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu criada». παιδίσκη puede referirse a una esclava joven o a una criada; aquí se opta por «esclava» para conservar el paralelismo de estatus con δοῦλος.'
    reason: lexical_alternative
  - marker: b
