translation:
  language: es
  text: Aún derramaré enseñanza[a] como profecía, y la dejaré por generaciones sin fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como profecía'. El griego puede leerse de modo comparativo o identificativo; el texto principal mantiene explícita la comparación.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔτι
  english_pob_choice: Again / Still
  chosen_spanish: Todavía
  alternatives_spanish:
  - De nuevo
  - Aún
  - Otra vez
  lexicon: LSJ
  rationale: ἔτι aquí expresa continuación o repetición de la acción. 'Todavía' conserva ese valor de continuidad sin sonar tan repetitivo como 'de nuevo' ni tan ambiguo como 'aún' en español corriente.
- source_word: διδασκαλίαν
  english_pob_choice: instruction
  chosen_spanish: enseñanza
  alternatives_spanish:
  - instrucción
  - doctrina
  lexicon: LSJ
  rationale: '''Enseñanza'' comunica bien el contenido sapiencial del pasaje y suena natural en español. ''Doctrina'' puede sonar más técnico o eclesiástico; ''instrucción'' es posible, pero ''enseñanza'' mantiene mejor el tono de sabiduría comunicada.'
- source_word: ὡς προφητείαν
  english_pob_choice: like prophecy
  chosen_spanish: como profecía
  alternatives_spanish:
  - como una profecía
  - as profecía
  lexicon: LSJ
  rationale: El valor comparativo de ὡς se mantiene con 'como'. Evita resolver indebidamente la tensión entre comparación e identificación; el texto presenta la enseñanza 'como' profecía, no necesariamente como una profecía formal.
- source_word: ἐκχέω
  english_pob_choice: I will pour out
  chosen_spanish: derramaré
  alternatives_spanish:
  - verteré
  - desbordaré
  - derramaré abundantemente
  lexicon: LSJ
  rationale: '''Derramaré'' es la metáfora española más natural para ἐκχέω y conserva la imagen de abundancia y difusión. ''Verteré'' sería más literal pero menos idiomático; ''desbordaré'' añade matiz no explicitado.'
- source_word: καταλείψω
  english_pob_choice: I will leave it behind
  chosen_spanish: la dejaré
  alternatives_spanish:
  - la dejaré atrás
  - la transmitiré
  - la legaré
  lexicon: LSJ
  rationale: El verbo puede expresar dejar, conservar para el futuro o legar. En español, 'la dejaré' reproduce el núcleo semántico sin introducir una idea de 'atrás' no necesaria en la frase. Se evita 'transmitiré' por ser más interpretativo.
- source_word: εἰς γενεὰς αἰώνων
  english_pob_choice: for everlasting generations
  chosen_spanish: para generaciones eternas
  alternatives_spanish:
  - para generaciones perpetuas
  - para generaciones de siglos
  - por generaciones eternas
  lexicon: LSJ
  rationale: '''Generaciones eternas'' refleja el giro idiomático con un tono elevado y claro en español. Mantiene la duración indefinida del original sin la extrañeza de un calco como ''generaciones de edades''.'
theological_decisions:
- issue: Sentido de ὡς en la comparación con profecía
  english_pob_reading: 'comparative: the instruction is poured out like prophecy'
  chosen_spanish_reading: 'comparativo: la enseñanza se derrama como profecía'
  alternative_spanish_readings:
  - 'identificativo: la enseñanza se derrama como profecía entendida casi como profecía'
  - la enseñanza se derrama en calidad de profecía
  rationale: 'Se conserva la prudencia del griego y del audit trail inglés: la instrucción es presentada en comparación con profecía, no absorbida sin más por la categoría profética. Esto preserva la tensión literaria y teológica del pasaje.'
  doctrine_reference: Preservar la tensión textual sin resolverla artificialmente.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés al preferir una formulación natural y formal para ἔτι y για la permanencia futura. Sin embargo, en español 'todavía' conserva mejor la idea de continuidad que 'solo' o una simple equivalencia temporal. También se evita añadir un equivalente de 'behind' a καταλείψω, porque el griego no lo exige. Para εἰς γενεὰς αἰώνων, 'generaciones eternas' conserva el tono elevado y la duración indefinida, de modo acorde con la última decisión inglesa, sin forzar un calco extraño.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; no aplica en este versículo.
  - '''Enseñanza'' se usa aquí por claridad literaria; en otros contextos sapienciales podría preferirse ''instrucción'' si el paralelismo lo exige.'
  - La metáfora de derramamiento se conserva para no debilitar la imagen de abundancia del original griego.
  - La nota textual en español mantiene la misma tensión comparativa/identificativa documentada por el POB inglés.
