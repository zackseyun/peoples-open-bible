    issue: 'Frase final poco natural: «con mi hijo, con Isaac»'
    rationale: Aunque el hebreo repite עִם, el rastro de auditoría inglés ya determinó que en lenguaje receptor más natural conviene expresarlo como una sola unidad appositiva. En español, la repetición con coma suena rígida y innecesaria; «con mi hijo Isaac» preserva el referente y la exclusión sin distorsión.
  revised_spanish_text: 'Entonces le dijo a Abraham[a]: «Expulsa a esta esclava y a su hijo, porque el hijo de esta esclava no heredará con mi hijo Isaac».'
  revised_footnotes:
