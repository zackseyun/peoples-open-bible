translation:
  language: es
  text: 'Oráculo[a] acerca de Moab: porque en una noche[b] Ar de Moab fue devastada, fue destruida; porque en una noche[b] Kir de Moab fue devastada, fue destruida[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carga» o «pronunciamiento» acerca de Moab para מַשָּׂא; aquí se traduce «oráculo» como encabezamiento profético.
    reason: lexical_alternative
  - marker: b
    text: La frase hebrea dice literalmente «en una noche», enfatizando una destrucción repentina dentro de una sola noche; «de la noche a la mañana» sería una posibilidad más idiomática.
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo también puede entenderse como «quedó reducida al silencio» o «fue cortada», además de «fue destruida».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: oracle
  chosen_spanish: oráculo
  alternatives_spanish:
  - carga
  - pronunciamiento
  lexicon: HALOT
  rationale: En encabezamientos proféticos, מַשָּׂא introduce un anuncio profético; «oráculo» conserva ese valor genérico de declaración inspirada y evita el falso literalismo de «carga».
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar, manteniendo la referencia geográfica y étnica.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en el sentido de 'pues'
  lexicon: HALOT
  rationale: Aquí introduce la base o contenido explicativo del oráculo; «porque» comunica bien esa relación causal/explicativa en español.
- source_word: בְּלֵיל
  english_pob_choice: in a night
  chosen_spanish: en una noche
  alternatives_spanish:
  - de noche
  - en la noche
  - en una sola noche
  lexicon: HALOT
  rationale: La expresión subraya la rapidez y sorpresa del juicio dentro de una noche; «en una noche» reproduce esa concisión sin sobreinterpretar.
- source_word: שֻׁדַּד
  english_pob_choice: is devastated
  chosen_spanish: fue devastada / fue devastada
  alternatives_spanish:
  - fue destruida
  - fue arrasada
  - fue asolada
  lexicon: HALOT
  rationale: El pasivo expresa ruina violenta; en español, «fue devastada» conserva fuerza y registro profético, en línea con la elección inglesa.
- source_word: עָר מוֹאָב
  english_pob_choice: Ar of Moab
  chosen_spanish: Ar de Moab
  alternatives_spanish:
  - Ar-Moab
  lexicon: HALOT
  rationale: Se conserva la estructura constructa de nombre propio con «de Moab», transparente para el lector español.
- source_word: נִדְמָה
  english_pob_choice: it is destroyed
  chosen_spanish: fue destruida
  alternatives_spanish:
  - fue silenciada
  - fue cortada
  - quedó destruida
  lexicon: HALOT
  rationale: Aunque el hebreo puede admitir matices como quedar silenciado o cortado, el contexto de devastación y la revisión inglesa favorecen «fue destruida» para mantener el paralelismo con שֻׁדַּד sin forzar una segunda metáfora.
- source_word: קִיר מוֹאָב
  english_pob_choice: Kir of Moab
  chosen_spanish: Kir de Moab
  alternatives_spanish:
  - Kir-Moab
  lexicon: HALOT
  rationale: Nombre propio preservado con la relación constructa natural en español.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «it is silenced» a «it is destroyed» para נִדְמָה. La redacción española sigue esa revisión y evita introducir un matiz de silencio que el contexto inmediato de ruina no exige aquí.
  spanish_consistency_notes:
  - Se mantiene «oráculo» para מַשָּׂא conforme a la práctica POB y al género profético.
  - Se usa «Moab», «Ar de Moab» y «Kir de Moab» como transliteraciones transparentes, sin localizarlas ni armonizarlas con formas tradicionales diferentes.
  - 'Se conserva la repetición paralela del hebreo y del inglés: devastación + destrucción en ambos miembros.'
  - Se evita «SEÑOR» u otras sustituciones no presentes en el versículo.
