  glossary_alignment: 'La terminología clave está alineada con el proyecto: «Dios» para אֱלֹהִים, sin introducir «Yahvé»; «pecó» / «lo hicieron pecar» para חטא y su hiphil; «mujeres extranjeras» conserva el hebreo sin añadir «esposas» en el texto principal. No hay conflictos con los términos doctrinales del glosario.'
  issues:
