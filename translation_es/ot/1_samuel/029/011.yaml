translation:
  language: es
  text: Así que David se levantó temprano, él y sus hombres, para ir por la mañana y volver[a] a la tierra de los filisteos. Y los filisteos subieron a Jezreel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para ir por la mañana a regresar a la tierra de los filisteos». Los infinitivos hebreos pueden verterse de manera más formal.'
    reason: lexical_alternative
  - marker: b
    text: «Subieron» refleja el hebreo idiomático de movimiento hacia un lugar; alternativamente, «marcharon a Jezreel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó temprano
  alternatives_spanish:
  - se levantó de madrugada
  - se levantó muy temprano
  lexicon: HALOT
  rationale: El verbo hifil de שׁכם expresa levantarse o comenzar temprano. «Se levantó temprano» conserva la idea temporal de inicio temprano con español natural y digno.
- source_word: הוּא וַאֲנָשָׁיו
  english_pob_choice: he and his men
  chosen_spanish: él y sus hombres
  alternatives_spanish:
  - él y sus servidores
  - él y sus tropas
  lexicon: HALOT
  rationale: 'La frase es enfática: David mismo junto con su grupo. «Hombres» transmite de forma natural el conjunto masculino que lo acompañaba, sin convertirlos en siervos domésticos ni añadir un matiz militar más fuerte del que exige el contexto.'
- source_word: לָלֶכֶת
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - para partir
  - para salir
  lexicon: HALOT
  rationale: Se mantiene el verbo básico «ir», porque el hebreo expresa el movimiento inicial hacia la salida. No se fuerza «partir» o «salir» cuando el texto simplemente indica el propósito del desplazamiento.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - de mañana
  lexicon: HALOT
  rationale: La expresión temporal se vierte con el giro natural «por la mañana», que conserva el valor temporal y encaja con el estilo narrativo español.
- source_word: לָשׁוּב
  english_pob_choice: and return
  chosen_spanish: a regresar
  alternatives_spanish:
  - para volver
  - y volver
  lexicon: HALOT
  rationale: 'El infinitivo posterior expresa finalidad: ir con el propósito de regresar. «A regresar» mantiene esa relación final sin perder la secuencia del hebreo. En español, también ayuda a conservar la diferencia entre el primer movimiento y el retorno.'
- source_word: אֶל אֶרֶץ פְּלִשְׁתִּים
  english_pob_choice: to the land of the Philistines
  chosen_spanish: a la tierra de los filisteos
  alternatives_spanish:
  - al territorio de los filisteos
  - a la tierra filistea
  lexicon: HALOT
  rationale: Se conserva «tierra» como equivalente concreto de אֶרֶץ y «filisteos» como designación étnica. Esta forma es fiel y clara para el lector español.
- source_word: וּפְלִשְׁתִּים
  english_pob_choice: And the Philistines
  chosen_spanish: Y los filisteos
  alternatives_spanish:
  - Entonces los filisteos
  - Ahora bien, los filisteos
  lexicon: HALOT
  rationale: La conjunción narrativa simple mantiene el flujo del relato sin añadir interpretación discursiva.
- source_word: עָלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - marcharon hacia arriba
  - ascendieron
  lexicon: HALOT
  rationale: «Subieron» reproduce el verbo hebreo עלה y su idiomatismo de movimiento hacia un lugar más alto, sin imponer una traducción militarizada que no es necesaria en el español del versículo.
- source_word: יִזְרְעֶאל
  english_pob_choice: Jezreel
  chosen_spanish: Jezreel
  lexicon: HALOT
  rationale: Se conserva el topónimo tradicional en transliteración, como nombre propio estable en español bíblico.
theological_decisions:
- issue: Movimiento de los filisteos expresado con עלה
  english_pob_reading: went up reflects the Hebrew idiom for movement to a place, often with topographical or military nuance
  chosen_spanish_reading: subieron refleja el hebreo idiomático de movimiento hacia un lugar, con posible matiz topográfico o militar
  alternative_spanish_readings:
  - marcharon a Jezreel
  - avanzaron hacia Jezreel
  rationale: El verbo hebreo no requiere explicitar militaridad, pero sí permite ese matiz. «Subieron» conserva la ambigüedad útil y el idioma bíblico del ascenso geográfico o estratégico.
  doctrine_reference: Ninguno; decisión de idiomatismo narrativo
- issue: Relación entre los dos infinitivos hebreos לָלֶכֶת ... לָשׁוּב
  english_pob_reading: to go in the morning to return
  chosen_spanish_reading: para ir por la mañana a regresar
  alternative_spanish_readings:
  - para ir por la mañana y regresar
  - para ir en la mañana a volver
  rationale: El hebreo coordina un desplazamiento inicial con una finalidad de retorno. La redacción española mantiene ambos verbos sin fusionarlos en una sola idea, preservando la secuencia y la intención del texto.
  doctrine_reference: Ninguno; decisión sintáctica basada en el hebreo
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que sustituyó «leave» por «go» para reflejar con mayor precisión לָלֶכֶת, manteniendo a la vez la construcción de finalidad con לָשׁוּב. En español se preservó esa distinción con «para ir ... a regresar».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino en el hebreo.
  - Se conservó el orden narrativo simple del hebreo con dos oraciones unidas por «Y».
  - Se evitó «Cristo» o terminología eclesiástica no pertinente.
  - Se prefirió «filisteos» como etnónimo estándar y «Jezreel» como topónimo transliterado.
