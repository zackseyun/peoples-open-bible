- from: 'Yahvé juró a David con verdad[a]; no se volverá de ello: «Del fruto de tu vientre pondré uno sobre tu trono[b]».'
  to: 'Yahvé juró a David un juramento seguro[a][b]; no se retractará de él: «Del fruto de tu vientre pondré uno sobre tu trono».'
  rationale: Se ajusta אֱמֶת a «un juramento seguro» para reflejar en español natural la función idiomática que el POB inglés ya documentó, conservando «verdad» como alternativa en nota. Se cambia «no se volverá de ello» por «no se retractará de él» para expresar con claridad el sentido de no retirarse del juramento. Se mantienen «Yahvé», «fruto de tu vientre» y «sobre tu trono» por fidelidad al hebreo y a las decisiones auditadas.
