translation:
  language: es
  text: Y la carne del sacrificio de su ofrenda de paz de acción de gracias[a] se comerá el día de su ofrenda; no dejará nada de ella hasta la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su ofrenda de comunión de acción de gracias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְשַׂר
  english_pob_choice: And the flesh
  chosen_spanish: Y la carne
  alternatives_spanish:
  - Y la carne ofrecida
  - Y la parte carnosa
  lexicon: HALOT
  rationale: בשר designa literalmente ‘carne’ o ‘flesh/meat’. ‘Carne’ preserva el registro sacrificial y es la forma más natural y fiel en español en este contexto ritual.
- source_word: זֶבַח
  english_pob_choice: the sacrifice
  chosen_spanish: del sacrificio
  alternatives_spanish:
  - de la ofrenda
  - del animal sacrificado
  lexicon: HALOT
  rationale: זבח se refiere al acto/ofrenda sacrificial. ‘Sacrificio’ mantiene la categoría cultual sin perder claridad en español.
- source_word: תּוֹדַת
  english_pob_choice: for thanksgiving
  chosen_spanish: de agradecimiento
  alternatives_spanish:
  - de acción de gracias
  - para agradecimiento
  lexicon: HALOT
  rationale: תודה expresa agradecimiento/acción de gracias y aquí funciona como especificación del tipo de sacrificio. ‘De agradecimiento’ suena natural en español y conserva la función atributiva.
- source_word: שְׁלָמָיו
  english_pob_choice: his peace offerings
  chosen_spanish: su ofrenda de paz
  alternatives_spanish:
  - sus ofrendas de paz
  - su ofrenda de comunión
  lexicon: HALOT
  rationale: שְׁלָמִים es el término técnico del sistema sacrificial. La tradición POB en inglés usa ‘peace offerings’; en español, ‘ofrenda de paz’ conserva el término culto y evita introducir ‘comunión’ sin apoyo directo del texto. Se mantiene el singular por el valor de tipo sacrificial, aunque el hebreo tenga forma plural.
- source_word: בְּיוֹם קָרְבָּנוֹ
  english_pob_choice: on the day of his offering
  chosen_spanish: en el día de su ofrenda
  alternatives_spanish:
  - el día en que presente su ofrenda
  - el día de su presentación
  lexicon: HALOT
  rationale: La frase hebrea es literalmente ‘en el día de su ofrenda/presentación’. ‘En el día de su ofrenda’ conserva la estructura nominal y es plenamente comprensible en español.
- source_word: יֵאָכֵל
  english_pob_choice: shall be eaten
  chosen_spanish: se comerá
  alternatives_spanish:
  - será comida
  - deberá comerse
  lexicon: HALOT
  rationale: El nifal transmite una pasiva. ‘Se comerá’ reproduce de modo natural la obligación/instrucción ritual sin sobrerrepresentar el auxiliar modal.
- source_word: לֹא יַנִּיחַ
  english_pob_choice: he shall not leave
  chosen_spanish: no dejará nada
  alternatives_spanish:
  - no dejará de ello
  - no reservará nada
  lexicon: HALOT
  rationale: El hiphil de נוח aquí significa dejar/poner aparte. Dado que el objeto se expresa en la frase siguiente, ‘no dejará nada’ comunica bien la prohibición de retener porciones hasta la mañana.
- source_word: מִמֶּנּוּ
  english_pob_choice: any of it
  chosen_spanish: de ella
  alternatives_spanish:
  - de ello
  - de eso
  lexicon: HALOT
  rationale: El pronombre remite a la ofrenda/sacrificio en español. ‘De ella’ mantiene concordancia con ‘ofrenda’ y evita añadir una generalización innecesaria.
- source_word: עַד בֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta que amanezca
  lexicon: HALOT
  rationale: La expresión temporal es directa. ‘Hasta la mañana’ es idiomática y exacta en español.
theological_decisions:
- issue: Cómo verter שְׁלָמִים without importing later interpretive language
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrenda de paz
  alternative_spanish_readings:
  - ofrenda de comunión
  - ofrenda de prosperidad
  rationale: El término hebreo nombra una categoría sacrificial técnica. ‘Ofrenda de paz’ conserva la terminología estable del tipo sacrificial sin forzar una explicación teológica no explicitada en el versículo. Se evita ‘comunión’ por ser más interpretativo en español.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: How to represent the construct chain תּוֹדַת שְׁלָמָיו
  english_pob_reading: his thanksgiving peace offering
  chosen_spanish_reading: su ofrenda de agradecimiento, su ofrenda de paz
  alternative_spanish_readings:
  - su ofrenda de paz de agradecimiento
  - su ofrenda de paz para agradecimiento
  rationale: El hebreo puede leerse como una ofrenda de paz caracterizada por el agradecimiento. La duplicación en español sirve para reflejar ambas piezas del constructo sin borrar la relación entre el agradecimiento y la categoría sacrificial.
  doctrine_reference: Translation philosophy §4 (Preserve lexical and syntactic features where meaningful)
translation_notes:
  revision_awareness: El inglés auditado pasó de una expansión más analítica (‘the sacrifice of his peace offerings for thanksgiving’) a una formulación más compacta (‘his thanksgiving peace offering’). La versión española sigue ese ajuste al expresar el constructo como una sola unidad sacrificial, pero conserva la relación entre agradecimiento y ofrenda de paz mediante una estructura clara y fiel al hebreo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino cuando corresponda; aquí no aparece.
  - ‘Ofrenda de paz’ se usa como término técnico consistente con la tradición POB para שְׁלָמִים, evitando ‘fellowship’/‘comunión’ como lectura principal.
  - Se conserva el tono ritual jurídico del mandato con futuro simple/pasivo reflejo en español.
  - La referencia pronominal final se ajusta a ‘de ella’ por concordancia natural con ‘ofrenda’, sin alterar el referente del hebreo.
