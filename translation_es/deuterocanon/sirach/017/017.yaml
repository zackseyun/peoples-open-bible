translation:
  language: es
  text: Sus injusticias no estuvieron ocultas para él[a], y cada pecado de ellos estuvo delante del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no escaparon a su atención». El griego dice más literalmente: «no estuvieron ocultas para él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐκρύβησαν
  english_pob_choice: were not hidden
  chosen_spanish: no estuvieron ocultas
  alternatives_spanish:
  - no quedaron ocultas
  - no se escondieron
  - no pasaron desapercibidas
  lexicon: LSJ
  rationale: Conserva la imagen pasiva de cosas que no quedaron veladas, sin volverla una paráfrasis excesiva. En español, 'estar ocultas' reproduce bien el resultado del pasivo griego.
- source_word: αἱ ἀδικίαι
  english_pob_choice: their injustices
  chosen_spanish: sus injusticias
  alternatives_spanish:
  - sus faltas
  - sus maldades
  - sus injusticias cometidas
  lexicon: LSJ
  rationale: '''Injusticias'' mantiene el valor léxico de ἀδικία como actos contrarios a lo recto y conserva el tono moral-jurídico del contexto sapiencial.'
- source_word: ἀπ᾿ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - ante él
  - de su vista
  - a sus ojos
  lexicon: LSJ
  rationale: La construcción española natural con 'ocultas' es 'de él'. Aunque 'ante él' expresa mejor la esfera de observación, esa relación ya queda reforzada por la segunda cola del verso.
- source_word: πᾶσα ἁμαρτία
  english_pob_choice: every sin
  chosen_spanish: todo pecado
  alternatives_spanish:
  - cada pecado
  - todo pecado de ellos
  - todo pecado cometido
  lexicon: LSJ
  rationale: '''Todo pecado'' preserva el distributivo singular de πᾶσα ἁμαρτία sin forzar una forma menos fluida en español. Mantiene la individualidad de cada acto de pecado.'
- source_word: ἔναντι Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - ante el Señor
  - en presencia del Señor
  - frente al Señor
  lexicon: LSJ
  rationale: '''Delante del Señor'' conserva la imagen espacial de ἔναντι y es idiomático en español bíblico contemporáneo. Se mantiene ''Señor'' porque el griego dice Κυρίου, no el nombre divino hebreo directamente.'
theological_decisions:
- issue: Visibilidad de la injusticia humana ante Dios
  english_pob_reading: The verse states that human injustices and sins are fully visible to God/the Lord without expanding into a broader doctrinal paraphrase.
  chosen_spanish_reading: El verso afirma que las injusticias y los pecados humanos no quedan ocultos ante Dios/Señor, sin añadir una formulación doctrinal más amplia.
  alternative_spanish_readings:
  - ninguna de sus faltas escapó a la atención del Señor
  - sus pecados quedaron plenamente expuestos a Dios
  rationale: Se preserva la tensión textual de exposición total ante Dios, evitando convertir la imagen en una generalización doctrinal que vaya más allá del griego. 'Delante del Señor' conserva la perspectiva del texto y su fuerza retórica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla; primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: El texto griego de Sirácides 17:17 coincide sustancialmente con el audit trail inglés; no hubo revisiones sustantivas recientes, y la versión española sigue esa misma lectura con una equivalencia formal-optima y una nota lexical donde el inglés también preservó la alternativa interpretativa.
  spanish_consistency_notes:
  - Se usa 'Señor' para Κυρίου, no 'Yahvé', porque el griego aquí no transcribe el nombre divino hebreo.
  - Se conserva el paralelo interno entre 'injusticias' y 'todo pecado', evitando suavizar ambos términos en una sola idea genérica.
  - La nota a pie de página mantiene la alternativa 'escapar a su atención' para reflejar la opción inglesa 'did not escape his notice' sin convertirla en la lectura principal.
