revisions:
- from: 'Y Jabez fue más honrado que sus hermanos[a]; y su madre llamó su nombre Jabez, diciendo[b]: «Porque lo di a luz con dolor».'
  to: 'Ahora bien, Jabez era más honrado que sus hermanos[a], y su madre le puso por nombre Jabez, diciendo[b]: «Porque lo di a luz con dolor».'
  rationale: Se ajusta el texto para un español más natural y eclesialmente legible sin apartarse del hebreo ni del rastro auditado en inglés. «Ahora bien» refleja bien la función narrativa de וַיְהִי; «era» suena más idiomático que «fue» en esta descripción; y «le puso por nombre» conserva la fórmula de nombramiento mejor que el calco «llamó su nombre». Se mantienen el juego de palabras y la nota sobre la amplitud semántica de עֹצֶב.
