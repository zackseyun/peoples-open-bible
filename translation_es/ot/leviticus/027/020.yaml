review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional del hebreo y el sentido legal general: si no redime el campo, o si lo vende a otro, ya no puede ser redimido. Sin embargo, el anclaje de la nota al pie está puesto sobre «campo» en lugar de la frase «a otro hombre», que es donde existe la alternativa léxica documentada en la auditoría inglesa. Además, aunque «rescatar» es comprensible, «redimir» preserva mejor en español bíblico-jurídico la correspondencia técnica con גאל en Levítico 27.'
  spanish_quality_summary: 'El español es claro y natural. «Pero si» y «ha vendido» funcionan bien. La frase final suena idiomática. El principal problema de calidad editorial es la nota mal ubicada y mal formulada: actualmente repite «a otro hombre» como texto principal y como hebreo, pero está anclada en «campo», lo que crea confusión. También conviene preferir «redimir»/«ser redimido» por consistencia terminológica bíblica y mejor registro eclesial.'
  glossary_alignment: 'No hay términos divinos en juego. La decisión relevante es גאל: el proyecto inglés documenta «redeem / be redeemed», y en este contexto Levítico favorece en español «redimir / ser redimido» más que «rescatar / ser rescatado», para conservar el matiz legal-sacral técnico. «Otro hombre» está bien alineado con איש אחר, y la alternativa de nota debe ser «otra persona».'
  issues:
  - severity: high
    issue: La nota al pie está anclada en «campo[a]» pero la variante léxica corresponde a «a otro hombre».
    rationale: La auditoría inglesa preserva una alternativa para לְאִישׁ אַחֵר (‘to another person’ / ‘to another man’). En español, el marcador debe ir en la frase correspondiente para no inducir al lector a pensar que la variante afecta a «campo».
  - severity: medium
    issue: 'La nota al pie está mal redactada: dice «O «a otro hombre». Hebreo: «a otro hombre»».'
    rationale: Eso no presenta ninguna alternativa real. Si el texto principal conserva «a otro hombre», la nota debe ofrecer la alternativa «a otra persona» y aclarar que el hebreo dice «a otro hombre».
  - severity: medium
    issue: «Rescata / ser rescatado» debilita la terminología técnica de גאל en este contexto.
    rationale: Aunque es entendible, en Levítico 27 el sentido jurídico-sacral de gāʾal se expresa mejor con «redimir / ser redimido», que además alinea mejor con la decisión lexical inglesa documentada.
  revised_spanish_text: Pero si no redime el campo, o si ha vendido el campo a otro hombre[a], ya no podrá ser redimido.
