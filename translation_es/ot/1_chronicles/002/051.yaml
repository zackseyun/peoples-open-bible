    rationale: La forma hebrea comienza con ה, no con una consonante que exija «j» en español. «Haref» preserva mejor la forma del nombre y se alinea con la auditoría inglesa «Hareph/Haref», mientras que «Jaref» introduce una adaptación no sustentada por el origen.
  - severity: low
    issue: La nota b debe armonizarse con la forma principal corregida
    rationale: Si el texto principal pasa a «Haref», la nota debe presentar esa forma como base y conservar «Harif» como variante de tradición onomástica.
