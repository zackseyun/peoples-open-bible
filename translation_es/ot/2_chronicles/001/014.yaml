translation:
  language: es
  text: Y reunió Salomón carros y jinetes[a]; y tuvo 1.400 carros y 12.000 jinetes, y los apostó en las ciudades de carros[b] y con el rey en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caballería». El hebreo se refiere a hombres montados; «jinetes» es la traducción más literal.
    reason: lexical_alternative
  - marker: b
    text: Es decir, ciudades designadas donde se guardaban o guarnecían los carros.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - recogió
  lexicon: HALOT
  rationale: El verbo אסף expresa reunir o juntar; «reunió» comunica bien la acumulación de recursos militares sin añadir matices ajenos al hebreo.
- source_word: רֶכֶב
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros de combate
  lexicon: HALOT
  rationale: En español bíblico y moderno, «carros» es claro y natural para רֶכֶב en este contexto; «carros de guerra» explicita el uso, pero añade más de lo que dice el texto.
- source_word: פָּרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - hombres a caballo
  lexicon: HALOT
  rationale: El término apunta a hombres montados; «jinetes» mantiene la referencia a personas montadas y suena más natural en español que un calco rígido.
- source_word: וַיְהִי לוֹ
  english_pob_choice: he had
  chosen_spanish: tuvo
  alternatives_spanish:
  - le fueron
  - le pertenecieron
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «y hubo para él»; «tuvo» conserva la idea de posesión de manera idiomática y breve.
- source_word: אֶלֶף וְאַרְבַּע מֵאוֹת רֶכֶב
  english_pob_choice: 1,400 chariots
  chosen_spanish: 1.400 carros
  alternatives_spanish:
  - mil cuatrocientos carros
  lexicon: HALOT
  rationale: Se mantiene la cifra exacta con puntuación española estándar para legibilidad.
- source_word: וּשְׁנֵים עָשָׂר אֶלֶף פָּרָשִׁים
  english_pob_choice: 12,000 horsemen
  chosen_spanish: 12.000 jinetes
  alternatives_spanish:
  - doce mil jinetes
  lexicon: HALOT
  rationale: Se conserva la cifra exacta con formato numérico español, manteniendo la relación con רֶכֶב sin sobreexplicar.
- source_word: וַיַּנִּיחֵם
  english_pob_choice: he stationed them
  chosen_spanish: los colocó
  alternatives_spanish:
  - los apostó
  - los puso
  lexicon: HALOT
  rationale: El contexto es militar y la acción es de ubicación asignada. «Los colocó» es fiel y más natural en español que una literalidad excesivamente técnica.
- source_word: בְּעָרֵי הָרֶכֶב
  english_pob_choice: in the chariot cities
  chosen_spanish: en las ciudades de los carros
  alternatives_spanish:
  - en las ciudades de carros
  - en las ciudades para carros
  lexicon: HALOT
  rationale: La construcción hebrea indica ciudades asociadas con los carros; «de los carros» conserva la relación sin añadir la función exacta de almacén o guarnición más allá de lo que el verso dice.
- source_word: וְעִם הַמֶּלֶךְ
  english_pob_choice: and with the king
  chosen_spanish: junto al rey
  alternatives_spanish:
  - y con el rey
  lexicon: HALOT
  rationale: «Con el rey» es literal, pero en español «junto al rey» fluye mejor al expresar la distribución de las fuerzas que permanecían en Jerusalén.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Topónimo estándar en español bíblico y moderno.
translation_notes:
  revision_awareness: La fuente inglesa y el texto hebreo coinciden estrechamente; no hay revisiones aplicadas en el paquete fuente. Se ha mantenido la equivalencia alta del audit trail, adaptando el español para naturalidad sin perder el sentido militar ni el conteo exacto.
  spanish_consistency_notes:
  - Se preserva «Yahvé» cuando el contexto exige el nombre divino; este versículo no lo contiene.
  - Se usa «carros» y «jinetes» en continuidad con la decisión léxica del POB inglés para רֶכֶב / פָּרָשִׁים.
  - La preposición final se ajusta a un español fluido («junto al rey») sin alterar la localización en Jerusalén.
