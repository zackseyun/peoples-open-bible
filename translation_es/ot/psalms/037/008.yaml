    text: 'O: «no te exasperes» o «no te dejes provocar». El verbo hebreo también puede traducirse «no te inquietes» o «no te agites».'
    reason: lexical_alternative
  - marker: b
    text: 'Más literalmente: «solo para hacer el mal».'
    reason: alternative_reading
  revision_rationale: Se ajusta la tercera prohibición para reflejar mejor תִּתְחַר sin repetir simplemente la idea de enojo ya expresada en «ira» y «furor». Se corrigen las notas para que correspondan a las verdaderas alternativas léxicas y a la lectura más literal de la cláusula final documentada en la auditoría inglesa. No requiere adjudicación adicional.
