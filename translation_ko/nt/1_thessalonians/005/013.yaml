  - marker: a
    text: Or 'esteem them most exceedingly in love.' The Greek adverb is unusually intensive.
    reason: lexical_alternative
translation:
  language: ko
  text: 또 그들의 사역으로 인하여 그들을 사랑 가운데 더할 나위 없이[a] 귀하게 여기십시오. 여러분 가운데 평화를 누리며 사십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「지극히 존경하라」. 헬라어 부사는 매우 강한 강조의 의미를 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡγεῖσθαι αὐτοὺς ὑπερεκπερισσοῦ ἐν ἀγάπῃ
  english_pob_choice: regard them very highly in love
  chosen_korean: 그들을 사랑 가운데 더할 나위 없이 귀하게 여기십시오
  alternatives_korean:
  - 사랑 가운데 그들을 지극히 존중하십시오
  - 사랑으로 그들을 한없이 존경하십시오
  lexicon: BDAG
  rationale: ἡγέομαι의 「~로 여김」과 ὑπερεκπερισσοῦ의 최상급적 강조. 3:10과 일관된 「더할 나위 없이」 어휘.
- source_word: διὰ τὸ ἔργον αὐτῶν
  english_pob_choice: because of their work
  chosen_korean: 그들의 사역으로 인하여
  alternatives_korean:
  - 그들의 일로 인하여
  - 그들이 행하는 일 때문에
  lexicon: BDAG
  rationale: 본 문맥에서 ἔργον은 12절의 사역(수고·이끔·권고)을 가리키므로 「사역」으로 옮긴다.
- source_word: εἰρηνεύετε ἐν ἑαυτοῖς
  english_pob_choice: Be at peace among yourselves
  chosen_korean: 여러분 가운데 평화를 누리며 사십시오
  alternatives_korean:
  - 서로 화평하게 지내십시오
  - 여러분 가운데 평화를 유지하십시오
  lexicon: BDAG
  rationale: 명령형. 한국어 합쇼체 「~ 사십시오」로 자연스럽게 표현한다.
