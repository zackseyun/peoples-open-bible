base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/025/019.yaml
  text: You said[a], ‘Look, you have struck Edom, and your heart has lifted you up to boast.’ Now stay at home. Why should you provoke disaster, so that you fall—you and Judah with you?
  footnotes:
