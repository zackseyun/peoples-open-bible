  - severity: medium
    issue: '''tu amor para mí'''
    rationale: Es un calco poco natural en español. 'Tu amor por mí' expresa con claridad la relación afectiva sin resolver de más el hebreo y evita rigidez innecesaria.
  - severity: low
    issue: Texto de nota al pie con comillas y formato torpes
    rationale: 'La nota comunica bien la alternativa, pero conviene normalizarla en español: sin comilla inicial sobrante y con formulación más limpia.'
