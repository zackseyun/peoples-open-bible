revisions:
- from: Escuchó sus planes e investigó sus intenciones[a], y supo que se preparaban para alzar la mano contra el rey Artajerjes. Y lo informó al rey acerca de ellos.
  to: Escuchó sus planes e investigó sus intenciones, y supo que se preparaban para poner las manos sobre el rey Artajerjes[a]. Y informó al rey acerca de ellos.
  rationale: Se corrige el idiomatismo de agresión para alinearlo mejor con τὰς χεῖρας ἐπιβαλεῖν y con la decisión auditada del POB inglés de preservar la imagen literal «lay hands on». También se repara «lo informó al rey» a un español natural y fiel. No se requiere adjudicación adicional porque son ajustes claros de estilo y precisión léxica, no cuestiones doctrinales ni textualmente inciertas.
