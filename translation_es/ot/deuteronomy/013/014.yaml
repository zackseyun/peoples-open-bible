review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés en casi todos los puntos: mantiene el perfecto con relevancia presente (''han salido''), conserva el masculino explícito (''hombres''), refleja el modismo בְּנֵי בְלִיַּעַל de forma no personificada, expresa la procedencia interna de la comunidad, y traduce וַיַּדִּיחוּ con una forma adecuada de extravío/apostasía. También preserva correctamente ''otros dioses'' y el matiz relacional de ''conocer''.'
  spanish_quality_summary: 'El español es claro y digno, pero hay un problema de registro pronominal: mezcla singular (''de en medio de ti'') con plural (''ustedes no han conocido'') dentro del mismo versículo. Para una lectura eclesial neutra y coherente conviene unificar en singular, siguiendo además el hebreo 2ms del contexto. También es mejor evitar la nota [b], porque en español ''otros dioses que no has conocido'' no crea una ambigüedad que exija nota explicativa.'
  glossary_alignment: No aparecen términos del glosario mayor como Yahvé/Mesías. La decisión 'hombres indignos' para בְּנֵי בְלִיַּעַל es defendible y alineada con la rationale auditada. 'Servir' para עבד y 'otros dioses' para אֱלֹהִים אֲחֵרִים están bien alineados. La única desalineación práctica es de consistencia de persona gramatical en español, no de terminología doctrinal.
  issues:
  - severity: medium
    issue: Mezcla de tratamiento singular y plural ('ti' / 'ustedes').
    rationale: El hebreo usa 2ms en מִקִּרְבְּךָ y 2mp en יְדַעְתֶּם, pero en español bíblico natural este tipo de variación suele nivelarse por coherencia discursiva. Mantener 'ti' y luego 'ustedes' suena inconsistente y menos legible.
  - severity: low
    issue: La nota [b] explica un antecedente que en español ya es suficientemente claro.
    rationale: El relativo 'que' referido a 'otros dioses' no genera una ambigüedad seria en la redacción propuesta; la nota añade carga innecesaria sin preservar una alternativa textual o una ambigüedad real del original.
  revised_spanish_text: 'Ciertos hombres indignos[a] han salido de en medio de ti y han desviado a los habitantes de su ciudad, diciendo: “Vayamos y sirvamos a otros dioses que no has conocido”.'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: ''hijos de inutilidad'' o ''hijos de Belial''; aquí se entiende como un modismo para hombres moralmente indignos.'
    reason: lexical_alternative
  revision_rationale: Se unificó el tratamiento pronominal al singular para mejorar la coherencia y la legibilidad en español, manteniendo fielmente el sentido del hebreo y del POB inglés. También se eliminó la nota [b] por innecesaria en español, conservando solo la nota léxica relevante sobre 'hijos de Belial'.
