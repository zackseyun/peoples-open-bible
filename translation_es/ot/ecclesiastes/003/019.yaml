translation:
  language: es
  text: 'Porque el destino de los hijos del hombre y el destino de la bestia es un solo destino para ellos: como muere uno, así muere el otro; y un solo aliento[a] es para todos. El hombre no tiene ventaja sobre la bestia, porque todo es vapor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritu». El hebreo רוּחַ puede significar «aliento», «viento» o «espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְרֶה
  english_pob_choice: fate
  chosen_spanish: destino
  alternatives_spanish:
  - suerte
  - ocurrencia
  - acontecimiento
  lexicon: HALOT
  rationale: En Eclesiastés, מִקְרֶה expresa lo que les acontece a humanos y animales, con énfasis en el desenlace común. «Destino» comunica ese valor existencial sin volver el verso demasiado abstracto ni introducir una idea fatalista ajena al contexto.
- source_word: בְנֵי הָאָדָם
  english_pob_choice: the sons of man
  chosen_spanish: los hijos del hombre
  alternatives_spanish:
  - los seres humanos
  - la humanidad
  - los hijos de Adán
  lexicon: HALOT
  rationale: El hebreo es literalmente masculino plural con אדם. «Los hijos del hombre» conserva la forma representativa masculina y el paralelismo del pasaje, en vez de neutralizar automáticamente el término.
- source_word: הַבְּהֵמָה
  english_pob_choice: the beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - el animal
  - el ganado
  lexicon: HALOT
  rationale: Aquí el singular funciona como colectivo y contrasta con la humanidad. «La bestia» mantiene ese contraste fuerte y natural en español.
- source_word: וּמִקְרֶה אֶחָד לָהֶם
  english_pob_choice: is one fate for them
  chosen_spanish: es un mismo destino para ellos
  alternatives_spanish:
  - tienen un solo destino
  - les acontece lo mismo
  lexicon: HALOT
  rationale: La repetición de מִקְרֶה pide conservar la unidad de resultado. «Un mismo destino» refleja el singular compartido y su fuerza retórica mejor que una perífrasis más larga.
- source_word: כְמוֹת זֶה כֵּן מוֹת זֶה
  english_pob_choice: as this one dies, so dies that one
  chosen_spanish: como muere uno, así muere el otro
  alternatives_spanish:
  - como muere este, así muere aquel
  - tal como muere uno, así muere el otro
  lexicon: HALOT
  rationale: La construcción paralela con demostrativos se vierte en español con un paralelismo claro y natural. «Uno... el otro» preserva la comparación sin perder fluidez.
- source_word: וְרוּחַ אֶחָד לַכֹּל
  english_pob_choice: and one breath is for all
  chosen_spanish: y un solo aliento es para todos
  alternatives_spanish:
  - y un solo espíritu es para todos
  - y un mismo aliento es para todos
  lexicon: HALOT
  rationale: En este contexto de mortalidad compartida, רוּחַ se entiende mejor como la respiración o aliento vital. «Aliento» evita resolver prematuramente la cuestión antropológica entre aliento, viento o espíritu.
- source_word: מוֹתַר
  english_pob_choice: advantage
  chosen_spanish: ventaja
  alternatives_spanish:
  - provecho
  - ganancia
  - superioridad
  lexicon: HALOT
  rationale: En la pregunta comparativa de Eclesiastés, «ventaja» es la equivalencia más natural en español actual y conserva el sentido de beneficio o preeminencia.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  lexicon: HALOT
  rationale: El singular אדם contrasta con la bestia colectiva. «El hombre» preserva el valor representativo del hebreo y la forma del argumento.
- source_word: אָיִן
  english_pob_choice: has no
  chosen_spanish: no tiene
  alternatives_spanish:
  - no hay
  - carece de
  lexicon: HALOT
  rationale: El hebreo niega la existencia de ventaja; en español la negación idiomática queda bien como «no tiene ventaja».
- source_word: הַכֹּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - todo cuanto existe
  - todo
  lexicon: HALOT
  rationale: «Todo» conserva la amplitud proverbial del hebreo sin añadir especificaciones.
- source_word: הָבֶל
  english_pob_choice: vapor
  chosen_spanish: vapor
  alternatives_spanish:
  - vanidad
  - niebla
  - soplo
  lexicon: HALOT
  rationale: «Vapor» mantiene la metáfora de lo pasajero e insustancial y evita cargar el término con el sentido moralizado de «vanidad».
theological_decisions:
- issue: Sentido de רוּחַ en una comparación entre humanos y animales
  english_pob_reading: breath
  chosen_spanish_reading: aliento
  alternative_spanish_readings:
  - espíritu
  - viento
  rationale: El contexto subraya la mortalidad común de ambos, no una tesis explícita sobre la composición espiritual humana. «Aliento» conserva la observación de Qohelet y deja abierta la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla por anticipado.
- issue: Valor representativo de אָדָם / בְנֵי הָאָדָם
  english_pob_reading: the sons of man ... man
  chosen_spanish_reading: los hijos del hombre ... el hombre
  alternative_spanish_readings:
  - los seres humanos ... la humanidad
  - los hijos de Adán ... el ser humano
  rationale: El hebreo usa lenguaje masculino representativo. La traducción mantiene esa forma sin borrar el referente humano general.
  doctrine_reference: 'Términos en disputa: אָדָם = hombre / humanidad según el contexto; preferir exactitud de género cuando el texto la usa.'
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del audit trail inglés: se conservó la repetición de «un mismo destino» para reflejar mejor el hebreo מִקְרֶה repetido, y se mantuvo la lectura de רוּחַ como término ambiguo, resuelta aquí como «aliento» por el contexto inmediato de mortalidad compartida.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo exija el nombre divino; este versículo no lo contiene.
  - Se mantiene la distinción entre «hombre» y «bestia» conforme al paralelismo del texto.
  - «Vapor» se conserva para הָבֶל en coherencia con el criterio POB de no sustituirlo por «vanidad».
  - La nota al pie marca la alternativa semántica de רוּחַ sin sobrecargar el texto principal.
