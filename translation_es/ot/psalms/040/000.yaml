review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo del superscrito: לַמְנַצֵּחַ = dedicatorio «Para…», לְדָוִד = «De David» con ambigüedad preservada, y מִזְמוֹר = rótulo de género «Salmo». La nota está anclada correctamente en «De David[a]», en línea con la auditoría inglesa.'
  spanish_quality_summary: La redacción es clara, pero «maestro de canto» suena menos natural y menos precisa para un encabezamiento de salmo que «director musical», que comunica mejor la función de supervisión musical de לַמְנַצֵּחַ. También conviene «Un salmo» para reflejar mejor el valor nominal de מִזְמוֹר y corresponder más de cerca al inglés auditado, sin perder naturalidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «De David» preserva correctamente la decisión teológica documentada. La revisión propuesta mejora la equivalencia de לַמְנַצֵּחַ sin introducir sobretraducción.
  issues:
  - severity: medium
    issue: «Maestro de canto» para לַמְנַצֵּחַ
    rationale: Aunque entendible, en español bíblico general suena algo restringido al acto de cantar y no expresa tan bien la idea de quien dirige o supervisa la ejecución musical. «Director musical» es más natural y más cercano al racional documentado en la auditoría inglesa.
  - severity: low
    issue: Omisión del artículo en «Salmo»
    rationale: '«Salmo» puede funcionar en un encabezamiento, pero «Un salmo» refleja más directamente el nominal hebreo מִזְמוֹר y armoniza mejor con la forma auditada en inglés: «A psalm».'
  revised_spanish_text: Para el director musical. De David[a]. Un salmo.
