translation:
  language: es
  text: Cuando Yahvé tu Dios[a] corte de delante de ti las naciones adonde tú vas para desposeerlas, y las desposeas y habites en su tierra,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se usa «Yahvé» para el nombre divino יְהוָה, conforme a la convención del proyecto.
    reason: source_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, según la directriz del proyecto para יְהוָה. «Yahvé» es la forma española auditable y no sustituye el nombre por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios, Yahvé
  lexicon: HALOT
  rationale: La construcción posesiva es directa en español y mantiene el vínculo de pacto entre el nombre divino y el poseedor singular.
- source_word: יַכְרִית
  english_pob_choice: cuts off
  chosen_spanish: corte de delante de ti
  alternatives_spanish:
  - destruya
  - elimine
  lexicon: HALOT
  rationale: «Cortar de delante de ti» conserva la imagen verbal de כרת y su fuerza de remoción, sin cargar innecesariamente el verbo con una idea de aniquilación total que el contexto inmediato no exige.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: HALOT
  rationale: «Naciones» es el equivalente más directo y mantiene la referencia a los grupos habitantes de la tierra.
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה
  english_pob_choice: which you are going in there
  chosen_spanish: que tú vas allí
  alternatives_spanish:
  - que tú entras allí
  - que tú vas allá
  lexicon: HALOT
  rationale: «Vas allí» reproduce el movimiento verbal + deíctico («ir/venir allí») del hebreo de forma natural en español, sin sobrecargar el período con una calca.
- source_word: לָרֶשֶׁת אֹתָם
  english_pob_choice: to dispossess
  chosen_spanish: para tomarlas en posesión
  alternatives_spanish:
  - para desposeerlas
  - para arrebatarles la posesión
  lexicon: HALOT
  rationale: En español, «tomar en posesión» expresa el resultado de ירש en este contexto de ocupación territorial. Se evita «desposeer» como forma menos natural, aunque la tensión de expulsión/posesión queda preservada por el contexto.
- source_word: וְיָרַשְׁתָּ אֹתָם
  english_pob_choice: and you dispossess them
  chosen_spanish: y tú las tomes en posesión
  alternatives_spanish:
  - y las desposesas
  - y las posesiones
  lexicon: HALOT
  rationale: Se mantiene la misma raíz semántica de posesión territorial y la referencia a las naciones como objeto directo femenino plural en español.
- source_word: וְיָשַׁבְתָּ בְּאַרְצָם
  english_pob_choice: and dwell in their land
  chosen_spanish: y habites en su tierra
  alternatives_spanish:
  - y vivas en su tierra
  - y te asientes en su tierra
  lexicon: HALOT
  rationale: «Habitar» conserva el tono formal del pacto y corresponde bien a ישב en este contexto. «Su tierra» refleja el posesivo plural del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue la convención doctrinal del proyecto: el Tetragrámaton se representa como nombre propio y no como título sustitutivo. En español, «Yahvé» es la forma consistentemente auditable en este corpus.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del auditable inglés, que ajustó la frase a «going in there» para reflejar más directamente el verbo hebreo de movimiento. La versión española «vas allí» conserva ese movimiento sin sonar forzada.
  spanish_consistency_notes:
  - Se mantiene la segunda persona singular a lo largo del versículo.
  - Se conserva la distinción entre posesión territorial y simple residencia con «tomar en posesión» y «habitar».
  - No se introducen términos eclesiásticos ajenos al registro del texto.
  - La nota al pie está anclada en el texto con [a], evitando marcas huérfanas.
