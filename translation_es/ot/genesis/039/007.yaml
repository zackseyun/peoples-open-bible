translation:
  language: es
  text: 'Y después de estas cosas[a], la esposa de su amo puso sus ojos en Yosef y dijo: «Acuéstate conmigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «levantó sus ojos hacia Yosef», un modismo que aquí expresa atención concentrada y deseosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחַר הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: And after these things
  chosen_spanish: Y después de estas cosas
  alternatives_spanish:
  - Ahora bien, después de estas cosas
  - Después de estos acontecimientos
  lexicon: HALOT
  rationale: El hebreo introduce un nuevo episodio narrativo con una fórmula idiomática. «Después de estas cosas» conserva de cerca la construcción original y resulta natural en español bíblico contemporáneo.
- source_word: וַתִּשָּׂא ... אֶת עֵינֶיהָ אֶל
  english_pob_choice: cast her eyes on
  chosen_spanish: fijó sus ojos en
  alternatives_spanish:
  - levantó sus ojos hacia
  - miró a
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «levantó sus ojos hacia», pero aquí expresa atención dirigida y deseo, no una mirada neutra. «Fijó sus ojos en» transmite ese matiz sin sonar demasiado interpretativo ni perder la fuerza idiomática.
- source_word: אֵשֶׁת אֲדֹנָיו
  english_pob_choice: his master's wife
  chosen_spanish: la esposa de su amo
  alternatives_spanish:
  - la mujer de su amo
  - la esposa del amo
  lexicon: HALOT
  rationale: La relación posesiva está referida a José en el contexto. «Su amo» conserva la referencia pronominal clara del hebreo y «esposa» es el equivalente digno y directo para la construcción de parentesco/relación.
- source_word: יוֹסֵף
  english_pob_choice: Yosef
  chosen_spanish: Yosef
  alternatives_spanish:
  - José
  lexicon: convención onomástica
  rationale: Se mantiene la forma «Yosef» conforme al criterio POB ya documentado para este nombre, evitando la forma tradicional castellana «José».
- source_word: שִׁכְבָה עִמִּי
  english_pob_choice: Lie with me
  chosen_spanish: Acuéstate conmigo
  alternatives_spanish:
  - Duérmete conmigo
  - Ten relaciones conmigo
  lexicon: HALOT
  rationale: El imperativo hebreo en este contexto es una proposición sexual directa. «Acuéstate conmigo» preserva esa franqueza en español y evita suavizar el sentido con eufemismos más débiles o modernos.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se mantiene la fórmula narrativa idiomática, se refleja el modismo de la mirada con una expresión española natural, se conserva la forma onomástica «Yosef» y se traduce la proposición sexual de manera directa sin atenuarla.'
  spanish_consistency_notes:
  - Se usa «Yosef» de forma consistente con el criterio POB ya establecido para el nombre propio.
  - «Amo» reproduce la relación social del hebreo sin introducir una palabra más cargada o más doméstica que el contexto no exige.
  - La nota al pie marca la tensión entre la literalidad del hebreo y la equivalencia idiomática en español, siguiendo el audit trail inglés.
