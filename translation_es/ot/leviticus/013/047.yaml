review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura casuística del hebreo: הַבגד genérico como ''una prenda'', כּי introduce el caso con ''si'', y la especificación de materiales ''lana ... lino'' está bien conservada. Sin embargo, se aparta de la decisión auditada de la POB en dos puntos significativos: צָרָעַת se trasladó al texto principal como ''tzaraat'' en vez de mantener el equivalente tradicional documentado con nota, y נֶגַע se vertió como ''plaga'', que en español suena demasiado amplio y menos natural para una afección en una tela. La revisión debe volver a una formulación más cercana al expediente inglés y al uso bíblico inteligible en español.'
  spanish_quality_summary: El español es generalmente claro, pero 'una plaga de tzaraat' suena poco natural en español eclesial general y mezcla un término español amplio con una transliteración técnica no introducida. También la nota [a] sobre 'prenda' es innecesaria y sobrecarga el texto. Una redacción como 'una prenda tiene en ella una afección de lepra' o 'una mancha de lepra' sería más natural; de esas, 'afección de lepra' preserva mejor la amplitud de נגע sin volverlo meramente visual. La estructura 'sea una prenda de lana o una prenda de lino' funciona bien y es legible.
  glossary_alignment: 'No hay conflicto con los glosarios principales de Yahvé/Mesías/etc. El punto clave es alinearse con la decisión auditada para צָרָעַת: la POB inglesa retuvo ''leprosy'' con nota aclaratoria, no transliteración en el texto principal. En español, lo más fiel al expediente es ''lepra'' con nota que explique que el hebreo צָרַעַת abarca una categoría más amplia y no la enfermedad de Hansen moderna. ''Plaga'' para נגע no está prohibido, pero aquí ''afección'' se ajusta mejor al contexto de prendas.'
  issues:
  - severity: high
    issue: '''tzaraat'' en el texto principal reemplaza la decisión auditada de mantener el equivalente tradicional con nota.'
    rationale: El expediente inglés documenta explícitamente que se retiene 'leprosy' por reconocimiento tradicional y se aclara su sentido amplio en nota. Cambiar a transliteración altera la estrategia de traducción, no solo el léxico.
  - severity: medium
    issue: '''plaga'' para נגע resulta poco natural en español para una prenda y puede sugerir calamidad general más que afección localizada.'
    rationale: Aunque tiene apoyo tradicional en algunos contextos bíblicos, en Levítico 13:47 aplicado a tela suena menos preciso que 'afección' o 'mancha'. El inglés auditado eligió 'outbreak' para evitar amplitud engañosa.
  - severity: low
    issue: La nota [a] sobre 'prenda' no añade una alternativa significativa necesaria para el lector.
    rationale: El término español es transparente y no crea ambigüedad nueva. Conviene reservar las notas para decisiones semánticas relevantes, como צָרַעַת.
  revised_spanish_text: Y si una prenda tiene en ella una afección de lepra[a], sea una prenda de lana o una prenda de lino,
