translation:
  language: es
  text: Y hubo guerra entre Roboam y Jeroboam todos sus días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «todos los días». El modismo hebreo indica que el conflicto persistió durante toda sus vidas o reinados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִלְחָמָה
  english_pob_choice: And there was war
  chosen_spanish: Y hubo guerra
  alternatives_spanish:
  - Y había guerra
  - Y hubo guerra continua
  - Y continuó la guerra
  lexicon: HALOT
  rationale: מִלְחָמָה nombra guerra o conflicto bélico. En español, "hubo guerra" reproduce bien el valor existencial del hebreo con היה y suena natural y digno. "Guerra" se prefiere a "guerra bélica" o "guerra continua" porque el texto afirma el estado de conflicto, no su técnica ni un adjetivo interpretativo.
- source_word: הָיְתָה
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - había
  - existía
  - continuó
  lexicon: HALOT
  rationale: El perfecto de היה funciona aquí como verbo existencial/copulativo. En español, "hubo" comunica la existencia del conflicto de manera más idiomática que un calco como "había"; "continuó" añadiría una interpretación que no exige la forma verbal.
- source_word: בֵין ... וּ/בֵין
  english_pob_choice: between ... and
  chosen_spanish: entre ... y
  alternatives_spanish:
  - entre ... entre
  - en medio de ... y
  lexicon: HALOT
  rationale: La construcción correlativa marca oposición recíproca entre dos personas. "Entre ... y" es el equivalente natural en español y conserva la relación bilateral del hebreo.
- source_word: רְחַבְעָם
  english_pob_choice: Rehoboam
  chosen_spanish: Roboam
  alternatives_spanish:
  - Rehoboam
  lexicon: Conventional Spanish biblical name form
  rationale: En español bíblico tradicional, el nombre se fija como "Roboam"; esa forma es ampliamente reconocible y natural en lectura pública. Se mantiene el mismo referente personal del hebreo sin necesidad de transliteración más áspera.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  alternatives_spanish:
  - Yeroboam
  lexicon: Conventional Spanish biblical name form
  rationale: La forma española consolidada es "Jeroboam", clara y públicamente inteligible. Conserva el nombre propio sin forzar una transliteración menos asentada.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all their days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - todos los días
  - continuamente
  - durante todos sus días
  lexicon: HALOT
  rationale: 'El hebreo dice literalmente "todos los días"; en este contexto de conflicto persistente entre dos reyes, español idiomático pide un posesivo plural: "todos sus días". Mantiene la duración total y evita la ambigüedad de "todos los días" en español, que podría sonar a frecuencia cotidiana.'
theological_decisions:
- issue: Duración del conflicto expresada por כָּל הַיָּמִים
  english_pob_reading: The Hebrew idiom means the conflict persisted throughout their lives/reigns.
  chosen_spanish_reading: La guerra persistió durante todos sus días, es decir, durante todo el tiempo de sus reinados/vidas.
  alternative_spanish_readings:
  - durante toda la vida
  - durante todo su reinado
  - constantemente
  rationale: No se atenúa la fuerza temporal del hebreo. La frase española "todos sus días" conserva el modismo y deja abierta la referencia contextual a vidas o reinados, como indica el auditorio inglés. Así se preserva la tensión entre literalidad e idiomaticidad sin cerrar indebidamente el alcance.
  doctrine_reference: Hebreos/uso idiomático; sin carga doctrinal directa
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y la auditoría inglesa: se conserva la estructura existencial, la relación bilateral y el modismo temporal. La única adaptación principal es la forma española convencional de los nombres propios y el posesivo plural idiomático en «todos sus días».'
  spanish_consistency_notes:
  - Se usó «guerra» en lugar de «guerra bélica» o «conflicto» para respetar מִלְחָמָה.
  - «Hubo» refleja el valor existencial de היה sin sobreinterpretar continuidad verbal.
  - 'Los nombres propios se normalizaron a formas bíblicas españolas tradicionales: Roboam, Jeroboam.'
  - «Todos sus días» evita la ambigüedad de «todos los días» en español y mantiene el modismo hebreo.
  - La nota al pie conserva la alternativa literal y explica el alcance idiomático del hebreo.
