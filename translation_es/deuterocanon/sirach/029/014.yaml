  rationale: Se corrige la ubicación y el contenido de la nota al pie para que corresponda exactamente al giro griego ὁ ἀπολωλεκὼς αἰσχύνην y al pronombre αὐτόν. Además, se mejora levemente la naturalidad del español con ‘un buen hombre’, sin cambiar el sentido ni la decisión teológica sobre el masculino singular.
