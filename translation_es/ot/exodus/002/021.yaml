translation:
  language: es
  text: Moisés aceptó vivir con aquel hombre[a], y él le dio a Moisés a Séfora, su hija[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Moisés estuvo dispuesto a vivir con aquel hombre». El verbo hebreo puede expresar voluntad, consentimiento o conformidad.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, le dio a Séfora en matrimonio a Moisés.
    reason: cultural_note
lexical_decisions:
- source_word: וַיּוֹאֶל
  english_pob_choice: agreed
  chosen_spanish: accedió
  alternatives_spanish:
  - estuvo dispuesto
  - consintió
  - aceptó
  lexicon: HALOT
  rationale: El verbo expresa voluntad, consentimiento o disposición favorable. En español, «accedió» comunica bien esa disposición sin perder la posibilidad de matiz. Evita una equivalencia demasiado rígida y conserva la tensión semántica documentada por la POB inglesa.
- source_word: לָשֶׁבֶת
  english_pob_choice: to dwell
  chosen_spanish: a habitar
  alternatives_spanish:
  - a vivir
  - a residir
  - a quedarse
  lexicon: HALOT
  rationale: El infinitivo con ל indica residencia o permanencia. «Habitar» conserva un registro digno y la idea de establecerse, más cercano a «dwell» que «vivir» en español actual.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - ese hombre
  - el varón
  lexicon: HALOT
  rationale: El hebreo mantiene el sustantivo común «el hombre» y no introduce un nombre propio. Se conserva esa restricción textual, dejando que el contexto identifique al personaje.
- source_word: וַיִּתֵּן
  english_pob_choice: he gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - lo dio en matrimonio
  lexicon: HALOT
  rationale: El verbo básico es «dar». La escena matrimonial está implícita en el contexto, pero el hebreo no la explicita; por eso el texto principal mantiene una formulación sobria y fiel.
- source_word: צִפֹּרָה
  english_pob_choice: Zipporah
  chosen_spanish: Séfora
  alternatives_spanish:
  - Sipora
  - Zipora
  lexicon: Convención onomástica bíblica
  rationale: Se adopta la forma castellana bíblica tradicional «Séfora», reconocible y estable en el uso eclesial en español.
- source_word: בִתּוֹ
  english_pob_choice: his daughter
  chosen_spanish: su hija
  alternatives_spanish:
  - la hija de él
  - su propia hija
  lexicon: HALOT
  rationale: El sufijo posesivo señala claramente que se trata de la hija del sujeto de la oración. «Su hija» es la equivalencia natural y exacta en español.
- source_word: לְמֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - para Moisés
  - como esposa para Moisés
  lexicon: HALOT
  rationale: La preposición ל marca destinatario. En español, «a Moisés» reproduce de forma directa esa relación, mientras que el sentido matrimonial permanece implícito en el contexto narrativo.
theological_decisions:
- issue: Sensibilidad del acto matrimonial implícito
  english_pob_reading: he gave Zipporah his daughter to Moses
  chosen_spanish_reading: dio a Séfora su hija a Moisés
  alternative_spanish_readings:
  - la dio en matrimonio a Moisés
  - se la entregó como esposa a Moisés
  rationale: 'La POB inglesa conserva la literalidad del hebreo en el texto principal y aclara el sentido matrimonial en nota. En español se sigue el mismo criterio: el texto no sobreexplicita, para no añadir contenido no formulado por el hebreo.'
  doctrine_reference: Éxodo 2:21; nota cultural sobre matrimonio implícito
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de alta concordancia del control cruzado y la ausencia de revisiones aplicadas; no se introdujeron cambios sustantivos respecto del criterio auditado de la POB inglesa.
  spanish_consistency_notes:
  - Se mantuvo «Moisés» y no se introdujo un nombre propio para «el hombre», en fidelidad al hebreo.
  - Se preservó la literalidad de «dio» en lugar de explicitar «dio en matrimonio» en el texto principal, dejando esa aclaración para la nota cultural.
  - Se usó «habitar» para conservar el matiz de residencia estable sin caer en arcaísmo excesivo.
  - Se adoptó «Séfora» como forma bíblica castellana habitual y transparente.
