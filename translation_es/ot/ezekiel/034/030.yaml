revisions:
- from: Y sabrán que yo[a], Yahvé, su Dios, estoy con ellos, y que ellos, la casa de Israel, son mi pueblo, declara el Señor Yahvé.
  to: Y sabrán que yo[a], Yahvé, su Dios, estoy con ellos, y que ellos, la casa de Israel, son mi pueblo, declara el Señor Dios.
  rationale: Se mantiene intacto casi todo el borrador porque es fiel al hebreo y al razonamiento auditado. Solo se ajusta la fórmula final אֲדֹנָי יְהוִה a «el Señor Dios», que es más natural en español y mejor corresponde a la decisión contextual ya documentada para el título compuesto, mientras se preserva «Yahvé» donde aparece יְהוָה de forma simple en el cuerpo del versículo.
