id: 2KI.10.22
reference: 2 Kings 10:22
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר לַֽ/אֲשֶׁר֙ עַל הַ/מֶּלְתָּחָ֔ה הוֹצֵ֣א לְב֔וּשׁ לְ/כֹ֖ל עֹבְדֵ֣י הַ/בָּ֑עַל וַ/יֹּצֵ֥א לָ/הֶ֖ם הַ/מַּלְבּֽוּשׁ־׃
translation:
  text: He said to the one who was over the wardrobe[b][a], “Bring out clothing for all the worshipers of Baal.” So he brought out the clothing for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “garments” throughout the verse.
    reason: lexical_alternative
  - marker: b
    text: “Worshipers of Baal” translates a phrase that is more literally “servants of Baal,” with the sense of those devoted to Baal’s service in worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֶּלְתָּחָה
  chosen: the wardrobe
  alternatives:
  - the vestry
  - the garment-room
  - the wardrobe keeper's store
  lexicon: HALOT
  rationale: The noun refers to a place or department associated with garments. 'Wardrobe' is natural modern English and fits the following request to bring out clothing. More archaic options like 'vestry' are possible but can mislead modern readers with later ecclesiastical associations.
- source_word: לַאֲשֶׁר עַל הַמֶּלְתָּחָה
  chosen: to the one who was over the wardrobe
  alternatives:
  - to the one in charge of the wardrobe
  - to the keeper of the wardrobe
  lexicon: HALOT
  rationale: The construction literally means 'to the one who was over the wardrobe,' indicating an official in charge. This rendering preserves the Hebrew administrative phrasing while remaining readable.
- source_word: הוֹצֵא
  chosen: Bring out
  alternatives:
  - Bring forth
  - Take out
  lexicon: HALOT
  rationale: Imperative of יצא in the causative sense. 'Bring out' is idiomatic and suits the command to produce garments from storage.
- source_word: לְבוּשׁ
  chosen: clothing
  alternatives:
  - garments
  - attire
  lexicon: HALOT
  rationale: A collective noun for what is worn. 'Clothing' is clear modern English; 'garments' is slightly more formal and is preserved as an alternative.
- source_word: עֹבְדֵי הַבָּעַל
  chosen: the worshipers of Baal
  alternatives:
  - the servants of Baal
  - the servants/worshipers of Baal
  lexicon: HALOT
  rationale: Although עבד can mean 'servant' or 'slave,' in cultic contexts it commonly denotes those who serve a deity, hence 'worshipers' best communicates the religious sense in English. 'Servants of Baal' is possible but less immediately clear to modern readers.
- source_word: וַיֹּצֵא לָהֶם הַמַּלְבּוּשׁ
  chosen: So he brought out the clothing for them
  alternatives:
  - And he brought out the garments for them
  - So he brought out the attire for them
  lexicon: HALOT
  rationale: The singular noun functions collectively. Rendering it again as 'the clothing' preserves the Hebrew article and collective sense without awkward singular 'the garment.'
