translation:
  language: es
  text: 'Y las puertas de la ciudad serán llamadas por los nombres de las tribus de Israel[a]: tres puertas en el lado norte—una puerta de Rubén, una puerta de Judá, una puerta de Leví.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llevarán los nombres de las tribus de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁעֲרֵי הָעִיר
  english_pob_choice: And the gates of the city
  chosen_spanish: Y las puertas de la ciudad
  alternatives_spanish:
  - Ahora las puertas de la ciudad
  - Y los portones de la ciudad
  lexicon: HALOT
  rationale: Se conserva la frase constructa como sujeto del enunciado. "Puertas" es el equivalente más natural y fiel; "portones" sería posible, pero menos consistente con el uso bíblico de שער.
- source_word: עַל שְׁמוֹת שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: shall be named after the tribes of Israel
  chosen_spanish: serán nombradas según los nombres de las tribus de Israel
  alternatives_spanish:
  - llevarán los nombres de las tribus de Israel
  - serán llamadas por los nombres de las tribus de Israel
  lexicon: HALOT
  rationale: Se mantiene el valor de designación/nombramiento. "Según los nombres de" conserva el vínculo entre las puertas y las tribus sin forzar una perífrasis más idiomática que pudiera borrar el matiz nominal.
- source_word: שְׁעָרִים שְׁלוֹשָׁה
  english_pob_choice: three gates
  chosen_spanish: tres puertas
  alternatives_spanish:
  - habrá tres puertas
  - tres portones
  lexicon: HALOT
  rationale: El orden español natural es numérico seguido del sustantivo en plural. Se evita añadir un verbo inexistente en hebreo; el contexto ya expresa la distribución de las puertas.
- source_word: צָפוֹנָה
  english_pob_choice: on the north side
  chosen_spanish: al lado norte
  alternatives_spanish:
  - al norte
  - en el lado norte
  - hacia el norte
  lexicon: HALOT
  rationale: La forma direccional se entiende mejor en español como ubicación lateral de la ciudad. "Al lado norte" preserva la referencia espacial arquitectónica.
- source_word: שַׁעַר רְאוּבֵן אֶחָד
  english_pob_choice: one gate of Reuben
  chosen_spanish: una puerta de Rubén
  alternatives_spanish:
  - una puerta nombrada Rubén
  - una puerta para Rubén
  lexicon: HALOT
  rationale: Se mantiene la relación de pertenencia o designación tribal con una construcción genitiva natural en español. "De Rubén" refleja el patrón del texto sin explicitar más de lo necesario.
- source_word: שַׁעַר יְהוּדָה אֶחָד
  english_pob_choice: one gate of Judah
  chosen_spanish: una puerta de Judá
  alternatives_spanish:
  - una puerta nombrada Judá
  - una puerta para Judá
  lexicon: HALOT
  rationale: Se conserva la simetría con la puerta anterior. "Judá" permanece como nombre tribal, en paralelo con el hebreo.
- source_word: שַׁעַר לֵוִי אֶחָד
  english_pob_choice: one gate of Levi
  chosen_spanish: una puerta de Leví
  alternatives_spanish:
  - una puerta nombrada Leví
  - una puerta para Leví
  - una puerta de los levitas
  lexicon: HALOT
  rationale: Se conserva el nombre tribal "Leví" y no se amplía a "levitas", porque el hebreo enumera designaciones tribales en paralelo con Rubén y Judá.
translation_notes:
  revision_awareness: Se corrigió el fallo anterior asegurando que el marcador [a] aparezca exactamente en el texto español, anclado en la frase correspondiente. La redacción mantiene la lectura del POB inglés y evita añadir una nota no anclada.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto solo cuando aparezca el Tetragrámaton; aquí no ocurre.
  - '"Rubén", "Judá" y "Leví" se conservan como nombres tribales en paralelo, sin expansión interpretativa.'
  - La estructura enumerativa respeta la repetición del hebreo con tres puertas y sus nombres tribales.
