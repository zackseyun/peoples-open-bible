translation:
  language: es
  text: Dos por dos vinieron a Noé para entrar en el arca[a], macho y hembra[b], tal como Dios había mandado a Noé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en pares» o, más formalmente, «dos y dos».
    reason: lexical_alternative
  - marker: b
    text: O «Vinieron a Noé, dos por dos, para entrar en el arca».
    reason: previous_rendering
lexical_decisions:
- source_word: שְׁנַיִם שְׁנַיִם
  english_pob_choice: two by two
  chosen_spanish: dos por dos
  alternatives_spanish:
  - en pares
  - dos y dos
  lexicon: HALOT
  rationale: La repetición numérica hebrea expresa una distribución en parejas. «Dos por dos» es una equivalencia natural en español y conserva ese valor distributivo mejor que una repetición más literal o una paráfrasis.
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron
  - llegaron
  - entraron
  lexicon: HALOT
  rationale: El verbo básico בוא admite la idea de venir/llegar. «Vinieron» conserva el movimiento hacia Noé sin anticipar el resultado como lo haría «entraron».
- source_word: אֶל נֹחַ
  english_pob_choice: to Noah
  chosen_spanish: a Noé
  alternatives_spanish:
  - hacia Noé
  - para Noé
  lexicon: HALOT
  rationale: La preposición אֶל marca dirección hacia Noé; «a Noé» es el equivalente directo y natural en español.
- source_word: אֶל הַתֵּבָה
  english_pob_choice: into the ark
  chosen_spanish: al arca
  alternatives_spanish:
  - en el arca
  - hacia el arca
  lexicon: HALOT
  rationale: Aunque el hebreo usa la misma preposición direccional, en español «al arca» comunica el destino del movimiento con naturalidad. «En el arca» podría sonar más estático y «hacia el arca» no expresa tan bien la llegada.
- source_word: זָכָר וּנְקֵבָה
  english_pob_choice: male and female
  chosen_spanish: macho y hembra
  alternatives_spanish:
  - varón y hembra
  - masculino y femenino
  lexicon: HALOT
  rationale: En este contexto zoológico/biológico, «macho y hembra» preserva el paralelismo de sexos del hebreo con precisión. «Varón y hembra» suena menos natural para animales, y «masculino y femenino» es más abstracto.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: HALOT
  rationale: La partícula introduce conformidad exacta con el mandato divino. «Tal como» expresa bien esa correspondencia sin añadir matices innecesarios.
- source_word: צִוָּה אֱלֹהִים
  english_pob_choice: God had commanded
  chosen_spanish: Dios había mandado
  alternatives_spanish:
  - Dios había ordenado
  - Dios había mandado
  lexicon: HALOT
  rationale: «Mandado» conserva el sentido de una orden autoritativa y funciona bien en español bíblico contemporáneo. El pluscuamperfecto refleja correctamente la anterioridad del mandato respecto a la acción narrada.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al único Dios de la narración; «Dios» es el equivalente estándar y fiel al contexto.
theological_decisions:
- issue: Énfasis narrativo en la obediencia al mandato divino
  english_pob_reading: The animals came to Noah in accordance with God's prior command, without specifying the mechanism.
  chosen_spanish_reading: Los animales vinieron a Noé de acuerdo con el mandato previo de Dios, sin especificar el mecanismo.
  alternative_spanish_readings:
  - Los animales llegaron por instinto solamente
  - Los animales fueron reunidos solo por la acción de Noé
  rationale: 'La frase hebrea y la lectura auditada subrayan la correspondencia entre la llegada de los animales y la orden de Dios. La traducción conserva esa tensión: afirma la obediencia sin explicar el modo en que ocurrió.'
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó la coma tras la expresión distributiva inicial y evitó añadir una conjunción innecesaria entre los dos destinos. En español, la estructura «Dos por dos vinieron a Noé, al arca» mantiene el orden enfático del hebreo y la coordinación implícita sin sobretraducirla.
  spanish_consistency_notes:
  - Se mantiene «Noé» para נֹחַ y «Dios» para אֱלֹהִים.
  - Se preserva el valor distributivo de la apertura con «dos por dos».
  - No se usa «SEÑOR» ni «Cristo»; no hay base en este versículo para esas formas.
  - La expresión «macho y hembra» se conserva por su precisión biológica en el contexto narrativo.
