translation:
  language: es
  text: 'Y los hijos de Cus: Seba[a], Javilá, Sabta, Raamá y Sabteca[b]. Y los hijos de Raamá: Sabá y Dedán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En genealogías, “hijos de” puede designar descendientes o un clan o linaje de origen, no solo hijos biológicos inmediatos.
    reason: cultural_note
  - marker: b
    text: Varios de estos nombres pueden referirse a pueblos, regiones o ancestros epónimos, no únicamente a individuos.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  - Y los hijos de
  lexicon: HALOT
  rationale: En genealogías, בְּנֵי puede referirse a descendientes o grupos de origen, pero la formulación literal 'hijos de' conserva mejor la estructura hebrea y la relación genealógica del verso en español.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  lexicon: HALOT
  rationale: Se usa la transliteración española habitual 'Cus' para un nombre propio bíblico, manteniendo una forma legible y cercana al texto hebreo.
- source_word: סְבָא
  english_pob_choice: Seba
  chosen_spanish: Seba
  alternatives_spanish:
  - Seba
  lexicon: HALOT
  rationale: Nombre propio transliterado; se conserva la forma breve y reconocible en español bíblico.
- source_word: חֲוִילָה
  english_pob_choice: Havilah
  chosen_spanish: Havilá
  alternatives_spanish:
  - Havila
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acento gráfico para reflejar la acentuación natural de la forma y facilitar la lectura.
- source_word: סַבְתָּה
  english_pob_choice: Sabtah
  chosen_spanish: Sabta
  alternatives_spanish:
  - Sabtá
  - Sabtah
  lexicon: HALOT
  rationale: La forma española 'Sabta' reproduce de manera clara el nombre hebreo; se evita una adaptación más larga o menos natural cuando no añade precisión semántica.
- source_word: רַעְמָה
  english_pob_choice: Raamah
  chosen_spanish: Raama
  alternatives_spanish:
  - Raamá
  - Raamah
  lexicon: HALOT
  rationale: Nombre propio transliterado al español siguiendo la forma breve y audible en lectura pública; la tilde no es necesaria para distinguir la pronunciación en este caso.
- source_word: סַבְתְּכָא
  english_pob_choice: Sabteca
  chosen_spanish: Sabteca
  alternatives_spanish:
  - Sabtecá
  - Sabtechá
  lexicon: HALOT
  rationale: Se conserva la transliteración ya establecida en la tradición bíblica inglesa, adaptada a la grafía española sin añadir explicación interpretativa.
- source_word: וּבְנֵי רַעְמָה
  english_pob_choice: And the sons of Raamah
  chosen_spanish: Y los hijos de Raama
  alternatives_spanish:
  - Y los descendientes de Raama
  lexicon: HALOT
  rationale: Se repite la misma fórmula genealógica para mantener el paralelismo del hebreo y dejar claro el cambio de sublinaje dentro de la lista.
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Seba
  alternatives_spanish:
  - Sheba
  lexicon: HALOT
  rationale: Se mantiene la transliteración española 'Seba', coherente con el primer nombre homónimo del verso y con la tradición de nombres bíblicos en español.
- source_word: דְדָן
  english_pob_choice: Dedan
  chosen_spanish: Dedán
  alternatives_spanish:
  - Dedan
  lexicon: HALOT
  rationale: Se usa la forma española con tilde final para reflejar la acentuación natural del nombre propio y la práctica habitual en español bíblico.
theological_decisions:
- issue: Valor genealógico de 'hijos de'
  english_pob_reading: Hebrew 'sons of' in genealogies can denote descendants or clan/people-group origins, not only immediate biological sons.
  chosen_spanish_reading: '''hijos de'' se entiende aquí en sentido genealógico amplio: descendientes, linajes o clanes de origen.'
  alternative_spanish_readings:
  - '''descendientes de'''
  - '''linaje de'''
  rationale: La formulación española conserva la literalidad del hebreo y, al mismo tiempo, permite el valor colectivo que la nota auditada documenta en el texto fuente inglés.
  doctrine_reference: Uso genealógico y etnónimo en genealogías del Antiguo Testamento
translation_notes:
  revision_awareness: La revisión auditada del texto inglés no introdujo cambios; por eso el español mantiene la estructura genealógica directa y las notas culturales sobre el valor amplio de 'hijos de' y de los nombres propios como posibles etnónimos o ancestros epónimos.
  spanish_consistency_notes:
  - Se ha mantenido 'hijos de' en toda la unidad genealógica para conservar el paralelismo.
  - Los nombres propios se han transliterado con formas españolas breves y consistentes.
  - Se preserva la repetición del encabezado genealógico antes de Raama para reflejar la sintaxis hebrea.
  - Las notas a y b se colocan solo donde la ambigüedad genealógica es relevante y no interfieren con la lectura pública.
