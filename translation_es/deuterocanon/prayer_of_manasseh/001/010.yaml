translation:
  language: es
  text: Estoy doblado bajo muchos grilletes de hierro, de modo que no puedo levantar mi cabeza[a], y no tengo alivio; porque provoqué tu ira e hice lo malo delante de ti, alzando abominaciones[b] y multiplicando ofensas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que no pueda recobrarme» o «para que no pueda mirar hacia arriba»; el infinitivo griego puede indicar recobrar el ánimo o literalmente volver a erguirse.'
    reason: lexical_alternative
  - marker: b
    text: «Abominaciones» probablemente se refiere a actos u objetos detestables, especialmente de carácter idolátrico.
    reason: cultural_note
lexical_decisions:
- source_word: κατακαμπτόμενος
  english_pob_choice: I am bent down
  chosen_spanish: estoy doblado
  alternatives_spanish:
  - estoy inclinado
  - estoy abatido
  lexicon: LSJ
  rationale: El participio expresa una postura física de estar curvado o doblado bajo carga. «Doblado» conserva la imagen corporal sin volverla excesivamente interpretativa.
- source_word: πολλῷ δεσμῷ σιδηρῷ
  english_pob_choice: with many iron bonds
  chosen_spanish: bajo muchos grilletes de hierro
  alternatives_spanish:
  - con muchos lazos de hierro
  - bajo muchas cadenas de hierro
  lexicon: LSJ
  rationale: δεσμός puede ser vínculo, grillete o cadena; σιδηρῷ especifica hierro. «Grilletes de hierro» comunica la idea de sujeción opresiva de modo natural en español y conserva la fuerza física del texto.
- source_word: εἰς τὸ ἀνανεῦσαί με
  english_pob_choice: so that I cannot lift up my head
  chosen_spanish: de modo que no puedo levantar mi cabeza
  alternatives_spanish:
  - para que no pueda recobrarme
  - de modo que no puedo mirar hacia arriba
  lexicon: LSJ
  rationale: La construcción final expresa resultado o propósito. La POB inglesa opta por la metáfora corporal; en español, «levantar mi cabeza» mantiene esa imagen y su sentido de incapacidad para erguirse o recuperarse.
- source_word: ἄνεσις
  english_pob_choice: relief
  chosen_spanish: alivio
  alternatives_spanish:
  - descanso
  - liberación
  - desahogo
  lexicon: BDAG
  rationale: ἄνεσις designa alivio o aflojamiento de presión. «Alivio» es la forma más natural y precisa en este contexto de aflicción y restricción.
- source_word: παρώργισα
  english_pob_choice: I provoked
  chosen_spanish: provoqué
  alternatives_spanish:
  - enojé
  - exasperé
  lexicon: LSJ
  rationale: El verbo implica provocar a ira. «Provoqué» conserva mejor el matiz causativo que simplemente «enojé».
- source_word: τὸν θυμόν σου
  english_pob_choice: your wrath
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu furor
  - tu enojo
  lexicon: LSJ
  rationale: θυμός aquí se refiere a la reacción airada de Dios. «Ira» mantiene la solemnidad del juicio divino en español bíblico claro.
- source_word: τὸ πονηρὸν ἐνώπιόν σου ἐποίησα
  english_pob_choice: did what is evil before you
  chosen_spanish: hice lo malo delante de ti
  alternatives_spanish:
  - hice el mal ante ti
  - hice lo perverso en tu presencia
  lexicon: LSJ
  rationale: Es un giro bíblico transparente. «Delante de ti» reproduce bien ἐνώπιόν σου y conserva la orientación explícita hacia Dios.
- source_word: στήσας βδελύγματα
  english_pob_choice: setting up abominations
  chosen_spanish: al poner abominaciones
  alternatives_spanish:
  - al establecer abominaciones
  - al levantar abominaciones
  lexicon: LSJ
  rationale: στήσας sugiere poner o colocar en pie. «Poner abominaciones» evita una paráfrasis excesiva y deja abierta la referencia cultual o idolátrica que el término puede implicar.
- source_word: πληθύνας προσοχθίσματα
  english_pob_choice: multiplying offenses
  chosen_spanish: y multiplicar ofensas
  alternatives_spanish:
  - y multiplicar cosas detestables
  - y aumentar provocaciones
  lexicon: LSJ
  rationale: El sustantivo raro apunta a cosas que provocan rechazo u ofensa delante de Dios. «Ofensas» comunica el efecto relacional y moral sin estrechar indebidamente el término.
theological_decisions:
- issue: Lenguaje de la ira divina
  english_pob_reading: your wrath
  chosen_spanish_reading: tu ira
  alternative_spanish_readings:
  - tu furor
  - tu enojo
  rationale: El griego habla directamente del θυμός de Dios. «Ira» preserva la gravedad teológica del juicio divino sin añadir categorías doctrinales externas al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Metáfora corporal en la cláusula final
  english_pob_reading: so that I cannot lift up my head
  chosen_spanish_reading: de modo que no puedo levantar mi cabeza
  alternative_spanish_readings:
  - para que no pueda recobrarme
  - de modo que no puedo mirar hacia arriba
  rationale: El pasaje mantiene una imagen penitencial y corporal de estar encorvado bajo una carga. Conservarla evita reducir el sentido a una mera descripción psicológica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del audit trail inglés, que prefirió el plural natural («many iron bonds») frente al singular idiomático. En español se reflejó con «muchos grilletes de hierro».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino, sino la referencia a Dios en segunda persona.
  - Se evitó «Señor» como sustituto no presente en el griego.
  - «Ira» se usó para θυμός por coherencia con el registro bíblico y con la decisión inglesa «wrath».
  - «Abominaciones» se conservó por su fuerza cultual; no se suavizó a un término moral genérico.
