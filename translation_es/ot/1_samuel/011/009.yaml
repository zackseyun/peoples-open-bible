base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/011/009.yaml
  text: 'They said to the messengers who had come[a], “Thus you shall say to the men of Jabesh-gilead: Tomorrow, by the heat of the sun, you will have deliverance.” So the messengers came and told the men of Jabesh[b], and they rejoiced.'
  footnotes:
  - marker: a
    text: Or “to the man of Jabesh-gilead”; the Hebrew singular likely functions collectively for the inhabitants of the city.
    reason: lexical_alternative
  - marker: b
    text: Or “when the sun is hot,” that is, around the hottest part of the day.
    reason: lexical_alternative
