review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido principal del hebreo: imperativo de lavar el corazón de la maldad, finalidad de ser salvada, y pregunta retórica sobre pensamientos perversos alojados dentro de Jerusalén. Sin embargo, la nota al pie no refleja fielmente la alternativa preservada en el audit trail inglés, que contrasta ''wicked thoughts'' con ''evil schemes remain within you'' y no con una simple alternativa idéntica al texto principal.'
  spanish_quality_summary: 'El español es claro y digno. ''Lava tu corazón de maldad'' y ''para que seas salvada'' son naturales y fieles. ''Morarán'' suena algo más elevado/tradicional, pero sigue siendo inteligible y adecuado. La principal mejora necesaria está en la nota: actualmente empieza con una alternativa que duplica el texto principal y no explica bien la opción semántica entre ''pensamientos'' y ''planes/maquinaciones''.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. 'Salvada' preserva correctamente la amplitud de תִּוָּשֵׁעִי. 'Corazón' mantiene la antropología hebrea. La decisión de no añadir posesivo antes de 'pensamientos perversos' concuerda con la revisión inglesa documentada.
  issues:
  - severity: medium
    issue: La nota al pie no preserva con precisión la alternativa léxica documentada.
    rationale: 'El inglés POB tiene como alternativa ''How long will your evil schemes remain within you?'' La nota española dice ''O: «pensamientos perversos»'', que repite sustancialmente el texto principal en vez de ofrecer la alternativa real, y luego añade opciones múltiples no priorizadas.'
  - severity: low
    issue: La formulación de la nota podría inducir confusión sobre el anclaje.
    rationale: El marcador [a] está anclado a 'maldad', pero la nota trata de la cláusula final sobre 'pensamientos/planes'. Conviene mantener la nota solo si se corrige su contenido para que funcione como alternativa de la segunda cláusula, tal como en el audit trail inglés.
  revised_spanish_text: Lava tu corazón de maldad[a], Jerusalén, para que seas salvada. ¿Hasta cuándo morarán dentro de ti pensamientos perversos?
  revised_footnotes:
  - marker: a
    text: 'O: «¿Hasta cuándo permanecerán dentro de ti tus planes perversos?»'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal, que es fiel y natural, y se corrige la nota para reflejar la alternativa léxica realmente documentada: מַחְשְׁבוֹת puede entenderse como pensamientos o planes/maquinaciones, y תָּלִין puede expresarse como permanecer/alojarse. No se requiere adjudicación adicional porque la reparación es menor y claramente sustentada por el audit trail.'
