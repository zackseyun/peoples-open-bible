translation:
  language: es
  text: Y cuando este también había muerto[a], al cuarto lo torturaban de la misma manera, abusando de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando este también había pasado de esta vida». El verbo griego puede funcionar como un eufemismo respetuoso para la muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταλλάξαντος
  english_pob_choice: had died
  chosen_spanish: había muerto
  alternatives_spanish:
  - había pasado de esta vida
  - había partido
  - había fallecido
  lexicon: LSJ
  rationale: En este contexto de martirio, el verbo griego funciona como un eufemismo respetuoso para la muerte. «Había muerto» es la forma más natural y fiel en español, y conserva el valor idiomático sin introducir una paráfrasis innecesaria.
- source_word: τοῦτον δὲ
  english_pob_choice: this one also
  chosen_spanish: este también
  alternatives_spanish:
  - este asimismo
  - él también
  lexicon: LSJ
  rationale: El demostrativo mantiene la referencia al hermano previamente mencionado, y δέ añade continuidad narrativa. «Este también» conserva esa fuerza deíctica y el orden de la secuencia.
- source_word: τὸν τέταρτον
  english_pob_choice: the fourth
  chosen_spanish: al cuarto
  alternatives_spanish:
  - al cuarto hermano
  - al cuarto de ellos
  lexicon: LSJ
  rationale: El griego dice literalmente «el cuarto»; en español, el artículo con sustantivo elíptico se entiende por contexto. «Al cuarto» preserva la brevedad del original sin perder claridad.
- source_word: ὡσαύτως
  english_pob_choice: in the same way
  chosen_spanish: de la misma manera
  alternatives_spanish:
  - igualmente
  - del mismo modo
  lexicon: LSJ
  rationale: La expresión indica repetición del mismo trato. «De la misma manera» reproduce bien esa equivalencia de acción en un español natural y claro.
- source_word: ἐβασάνιζον
  english_pob_choice: they were torturing
  chosen_spanish: lo torturaban
  alternatives_spanish:
  - lo atormentaban
  - lo sometían a tortura
  lexicon: LSJ
  rationale: El verbo refiere tortura física real. El imperfecto conserva la acción en desarrollo; en español, «lo torturaban» es directo y mantiene el aspecto progresivo.
- source_word: αἰκιζόμενοι
  english_pob_choice: abusing him
  chosen_spanish: abusando de él
  alternatives_spanish:
  - maltratándolo
  - ultrajándolo
  lexicon: LSJ
  rationale: El participio añade la idea de agresión violenta acompañando la tortura. «Abusando de él» refleja ese abuso sin duplicar exactamente «torturaban», y conserva un registro formal.
translation_notes:
  revision_awareness: El inglés POB pasó de «mistreating him» a «abusing him» en la revisión más reciente para captar mejor αἰκιζόμενοι con un registro formal y evitar redundancia con «torturing». La versión española refleja esa decisión con «abusando de él».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según la pauta del proyecto, aunque este versículo no lo contiene.
  - Se conserva un registro sobrio y narrativo, acorde con la secuencia martirial del pasaje.
  - No se introduce «Cristo», «Señor» ni otras sustituciones no presentes en el griego.
