base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/003/035.yaml
  text: Then all the people came to urge David to eat bread while it was still day[a], but David swore, saying, “May God do so to me, and more also[b], if before the sun goes down I taste bread or anything at all.”
  footnotes:
