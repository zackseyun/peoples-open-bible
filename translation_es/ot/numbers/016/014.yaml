  - severity: medium
    issue: Expresión de violencia ocular poco natural en español
    rationale: «Sacar los ojos de estos hombres» suena menos idiomático que «sacarles los ojos a estos hombres». La segunda forma preserva mejor la imagen concreta y la sintaxis natural del español.
