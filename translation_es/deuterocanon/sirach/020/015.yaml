translation:
  language: es
  text: Hoy presta, y mañana reclama lo prestado; tal hombre es aborrecible[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tal hombre es odiado» o «detestable». El adjetivo griego μισητός puede entenderse como una descripción del carácter odioso del hombre o de la reacción que provoca.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σήμερον
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - hoy
  lexicon: LSJ
  rationale: Adverbio temporal directo que conserva el contraste proverbial con «mañana» sin añadir matices innecesarios.
- source_word: δανιεῖ
  english_pob_choice: he lends
  chosen_spanish: presta
  alternatives_spanish:
  - prestará
  - da en préstamo
  lexicon: LSJ
  rationale: El futuro griego en dicho sapiencial puede funcionar como presente gnómico en español. «Presta» expresa la acción habitual y mantiene la concisión proverbial.
- source_word: αὔριον
  english_pob_choice: tomorrow
  chosen_spanish: mañana
  alternatives_spanish:
  - al día siguiente
  lexicon: LSJ
  rationale: Equivalente natural de contraste temporal con «hoy»; preserva el paralelismo breve del griego.
- source_word: ἀπαιτήσει
  english_pob_choice: he demands it back
  chosen_spanish: reclama
  alternatives_spanish:
  - exige devolución
  - pide de vuelta
  - reclama el préstamo
  lexicon: LSJ
  rationale: ἀπαιτέω puede significar exigir o reclamar de vuelta. En español, «reclama» comunica la presión de exigir retorno sin introducir un objeto explícito que el griego omite.
- source_word: μισητὸς
  english_pob_choice: hateful
  chosen_spanish: aborrecible
  alternatives_spanish:
  - odioso
  - detestable
  - odiado
  lexicon: LSJ
  rationale: 'El adjetivo puede ser activo o pasivo: alguien que causa odio o que es objeto de odio. «Aborrecible» conserva esa tensión evaluativa sin decidir exclusivamente entre «hateful» y «hated».'
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: tal hombre
  alternatives_spanish:
  - tal persona
  - tal ser humano
  lexicon: LSJ
  rationale: Se mantiene el singular masculino representativo del proverbio, en línea con la lectura inglesa. «Tal hombre» conserva el perfil tipológico del dicho sapiencial.
- source_word: ὁ τοιοῦτος
  english_pob_choice: such a
  chosen_spanish: tal
  alternatives_spanish:
  - de ese tipo
  - de tal clase
  lexicon: LSJ
  rationale: Fórmula demostrativa idiomática; «tal» reproduce la brevedad clasificatoria del griego y enlaza naturalmente con «hombre».
theological_decisions:
- issue: 'Valor de μισητός: carácter odioso vs. ser odiado'
  english_pob_reading: The Greek adjective μισητός can be understood either as describing the man's odious character or the reaction he provokes.
  chosen_spanish_reading: «Aborrecible» deja abierta la posibilidad de que el rasgo describa tanto su carácter como la reacción que suscita.
  alternative_spanish_readings:
  - «odiado»
  - «detestable»
  - «hateful»
  rationale: 'El griego conserva una ambigüedad real que el español no debe borrar. «Aborrecible» permite ambas direcciones semánticas: alguien que merece rechazo o alguien que provoca odio.'
  doctrine_reference: DOCTRINE.md §Translation philosophy
- issue: Tratamiento de ἄνθρωπος como tipo humano masculino singular en proverbio sapiencial
  english_pob_reading: The verse presents a representative moral type in masculine singular form.
  chosen_spanish_reading: «tal hombre» mantiene el singular masculino representativo del proverbio.
  alternative_spanish_readings:
  - «tal persona»
  - «tal ser humano»
  rationale: La forma griega es masculina singular y funciona tipológicamente. En español, conservar «hombre» evita neutralizar sin necesidad una construcción breve y proverbial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia; no se requieren revisiones sustanciales. La principal cuestión es mantener en español la ambigüedad de μισητός sin perder la fluidez proverbial.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en otros pasajes, pero este versículo no contiene el nombre divino.
  - Se evitó «señor» o formulaciones eclesiásticas no presentes en el griego.
  - Se preservó el tono sapiencial breve y proverbial con verbos en presente gnómico en español.
