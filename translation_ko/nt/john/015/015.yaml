theological_decisions:
- issue: 본 문맥의 doulos를 「노예」 대신 「종」으로 번역
  chosen_reading: 종
  alternative_readings:
  - 노예
  rationale: '빌립보서 1:1의 doulos는 신학적 매임을 드러내는 어휘로 「노예」를 채택했으나, 요한복음 15:15의 doulos는 가정 신분 비유 안에서 「친구」와 대조되는 종속 관계를 가리킨다. 본문 요지는 매임의 강도보다 「무지/앎」의 대조이므로, 한국어 관용 「종」이 본문의 무게를 더 자연스럽게 전달한다.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — δοῦλος'
