translation:
  language: es
  text: Los caminos de Seol[b] son su casa[a]; descienden a los aposentos de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Su casa es el camino de Seol’; el hebreo usa una forma plural (‘caminos/sendas’), que puede entenderse colectivamente en singular.
    reason: lexical_alternative
  - marker: b
    text: Seol es el ámbito de los muertos; alternativamente, ‘el sepulcro’.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּרְכֵי
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - los caminos
  lexicon: HALOT
  rationale: El hebreo usa un plural constructo de ‘camino/senda’. En español, ‘el camino’ comunica mejor la idea colectiva e idiomática de una sola ruta que conduce a un destino, sin perder el valor plural implícito. ‘Los caminos’ es posible, pero suena menos natural en esta frase.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - la región de los muertos
  lexicon: HALOT
  rationale: Se conserva el término técnico del hebreo en transliteración española para no reducirlo a ‘sepulcro’ ni ampliar indebidamente a ‘infierno’. ‘Seol’ mantiene la carga conceptual del ámbito de los muertos con precisión auditables.
- source_word: בֵּיתָהּ
  english_pob_choice: Her house
  chosen_spanish: Su casa
  alternatives_spanish:
  - su hogar
  - su casa y su casa
  lexicon: HALOT
  rationale: El referente es la casa de la mujer de Proverbios 7; ‘su casa’ es literal, claro y coherente con el sentido espacial de entrada y acceso. ‘Hogar’ suaviza el matiz y puede resultar menos preciso.
- source_word: יֹרְדוֹת
  english_pob_choice: going down
  chosen_spanish: que desciende
  alternatives_spanish:
  - que va bajando
  - descendiendo
  lexicon: HALOT
  rationale: Aunque el hebreo concuerda en plural con ‘caminos’, en español se puede naturalizar con una relativa singular dependiente de ‘el camino’. ‘Que desciende’ conserva el movimiento descendente y el tono poético sin sonar forzado.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: HALOT
  rationale: La preposición direccional simple ‘a’ funciona bien en español con ‘desciende a’ y evita sobreespecificar con ‘hacia’ o ‘hasta’.
- source_word: חַדְרֵי
  english_pob_choice: the chambers
  chosen_spanish: las cámaras
  alternatives_spanish:
  - los aposentos
  - las habitaciones
  lexicon: HALOT
  rationale: ‘Cámaras’ conserva el tono poético y sombrío de ‘chambers’ mejor que ‘habitaciones’. ‘Aposentos’ sería posible, pero menos acorde con el registro grave del versículo.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de muerte
  lexicon: HALOT
  rationale: Se traduce el sustantivo común ‘death’ como ‘muerte’ sin personificarlo. La construcción ‘las cámaras de la muerte’ refleja de manera natural el hebreo y mantiene la fuerza imagética.
theological_decisions:
- issue: Tratamiento de שְׁאוֹל
  english_pob_reading: Sheol is the realm of the dead; alternatively, 'the grave.'
  chosen_spanish_reading: Seol como el ámbito de los muertos, sin identificarlo con el sepulcro físico ni con un infierno doctrinal desarrollado.
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  - el infierno
  rationale: 'La POB inglesa retiene ‘Sheol’ para preservar la categoría hebrea. En español, ‘Seol’ cumple la misma función: evita colapsar el término en ‘sepulcro’ y también evita introducir una lectura posterior de ‘infierno’ que el hebreo no exige.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Sujeto gramatical y concordancia de יֹרְדוֹת
  english_pob_reading: going down
  chosen_spanish_reading: que desciende
  alternative_spanish_readings:
  - que descienden
  - descendiendo
  rationale: El hebreo plural (‘caminos’) puede conservarse con ‘que descienden’, pero en español la forma singular con ‘el camino’ es más idiomática y sigue transmitiendo el movimiento colectivo hacia abajo. No se pierde el sentido direccional ni el valor poético del participio.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo consonante/vocalizado del WLC y coincide con el tratamiento auditado de la POB inglesa: mantener Seol como término técnico, conservar la imagen descendente y reflejar la pluralidad hebrea de דַּרְכֵי mediante una solución española natural. No hay revisiones pendientes en el registro inglés, y la traducción propuesta se alinea con el pass de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene ‘Seol’ de forma consistente como transliteración técnica, no como ‘sepulcro’ o ‘infierno’.
  - ‘Cámaras’ preserva el tono elevado y ominoso del paralelismo poético.
  - La nota a explica la pluralidad hebrea de ‘caminos/sendas’ sin forzar una sintaxis extraña en español.
  - La nota b aclara el alcance semántico de ‘Seol’ para lectores hispanos.
