translation:
  language: es
  text: los que están siendo guardados por el poder de Dios mediante la fe para una salvación lista para ser revelada en el tiempo final[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mediante la confianza»; menos probable aquí, «mediante la fidelidad».
    reason: lexical_alternative
  - marker: b
    text: O «al tiempo final».
    reason: lexical_alternative
lexical_decisions:
- source_word: φρουρουμένους
  english_pob_choice: are being guarded
  chosen_spanish: están siendo guardados
  alternatives_spanish:
  - están siendo protegidos
  - están bajo custodia
  lexicon: BDAG
  rationale: El participio pasivo presente exige una acción continua sobre los destinatarios. «Guardados» conserva bien el matiz de vigilancia/protección de φρουρέω y suena natural en español bíblico sin debilitar la imagen.
- source_word: ἐν δυνάμει θεοῦ
  english_pob_choice: by the power of God
  chosen_spanish: por el poder de Dios
  alternatives_spanish:
  - en el poder de Dios
  - mediante el poder de Dios
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente «en», aquí funciona con valor instrumental en relación con el participio pasivo. «Por el poder de Dios» expresa con claridad la agencia/instrumento en español.
- source_word: διὰ πίστεως
  english_pob_choice: through faith
  chosen_spanish: mediante la fe
  alternatives_spanish:
  - por la fe
  - por la confianza
  - mediante la fidelidad
  lexicon: BDAG
  rationale: La lectura principal de πίστις aquí es «fe». «Mediante» comunica el medio sin sobrecargar el versículo; se preserva la posibilidad léxica de «confianza» o, menos probable, «fidelidad» en nota.
- source_word: εἰς σωτηρίαν
  english_pob_choice: for a salvation
  chosen_spanish: para una salvación
  alternatives_spanish:
  - para salvación
  - hasta la salvación
  lexicon: BDAG
  rationale: εἰς expresa meta o resultado. «Para una salvación» conserva la orientación prospectiva y respeta que el griego no lleva artículo, aunque el español lo requiere con naturalidad.
- source_word: ἑτοίμην ἀποκαλυφθῆναι
  english_pob_choice: ready to be revealed
  chosen_spanish: lista para ser revelada
  alternatives_spanish:
  - preparada para ser revelada
  lexicon: BDAG
  rationale: La combinación adjetivo + infinitivo se expresa con naturalidad como «lista para ser revelada». «Preparada» es posible, pero «lista» refleja mejor ἕτοιμος y el sentido de inminencia escatológica.
- source_word: ἐν καιρῷ ἐσχάτῳ
  english_pob_choice: in the last time
  chosen_spanish: en el tiempo final
  alternatives_spanish:
  - en el último tiempo
  - en el tiempo postrero
  - en el último momento
  lexicon: BDAG
  rationale: καιρός denota un tiempo señalado o decisivo, no solo duración cronológica. «Tiempo final» conserva el sentido escatológico sin convertirlo en una fórmula técnica más fuerte de lo que el texto exige.
- source_word: τοὺς
  english_pob_choice: who
  chosen_spanish: los que
  alternatives_spanish:
  - ustedes, los que
  - quienes
  lexicon: BDAG
  rationale: El artículo acusativo retoma a los destinatarios del contexto anterior. En español, «los que» mantiene la conexión referencial con mayor fluidez que una mera repetición nominal.
theological_decisions:
- issue: Relación entre preservación divina y respuesta humana en διὰ πίστεως
  english_pob_reading: God is the one guarding, and faith is the means through which that guarding is experienced.
  chosen_spanish_reading: Dios es quien guarda, y la fe es el medio mediante el cual ese guardar se expresa y se recibe.
  alternative_spanish_readings:
  - Dios guarda aparte de la fe como un dato meramente descriptivo
  - la fidelidad es el sentido principal de πίστις aquí
  rationale: La sintaxis atribuye el guardado al poder de Dios y coloca la fe como medio. La redacción española conserva ambos elementos sin resolver la tensión doctrinal sobre perseverancia o apostasía que el versículo no desarrolla.
  doctrine_reference: Preservar la tensión teológica; mantener «fe» como traducción principal de πίστις y registrar alternativas donde haya debate.
- issue: Momento escatológico de la salvación
  english_pob_reading: Salvation is future in its revealed fullness, though not denying present aspects elsewhere in the NT.
  chosen_spanish_reading: La salvación se presenta aquí como una realidad futura en su manifestación plena.
  alternative_spanish_readings:
  - la salvación se refiere solo a la conversión presente
  - la salvación aquí es exclusivamente la liberación final
  rationale: «Lista para ser revelada en el tiempo final» señala con claridad un despliegue futuro. La traducción mantiene esa orientación sin negar otros matices neotestamentarios de salvación en otros contextos.
  doctrine_reference: No importar afirmaciones doctrinales ajenas al versículo; conservar la tensión entre aspecto presente y futuro según el contexto bíblico.
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el último pase; el borrador se alinea con el estado más reciente aprobado y con el alto grado de acuerdo del control cruzado.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se traduce πίστις principalmente como «fe», preservando alternativas lexicales en nota sin sobrecargar el texto principal.
  - Se usa una construcción pasiva continua («están siendo guardados») para reflejar el presente participial de φρουρουμένους.
  - «Tiempo final» se eligió para conservar el valor de καιρός como tiempo señalado o decisivo.
  - No se introduce terminología eclesiástica adicional que desplace el sentido del griego.
