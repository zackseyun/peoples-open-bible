base_translation:
  language: en
  yaml_path: translation/ot/exodus/004/023.yaml
  text: And I said to you[a], ‘Let my son go, so that he may serve me,’ but you refused to let him go. Behold, I am about to kill your son[b], your firstborn.’
  footnotes:
  - marker: a
    text: Or 'let him go' / 'release him' for 'send him out' (Hebrew שׁלח), a common Exodus expression for freeing Israel.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''will kill''; the Hebrew participle with ''Look'' can express imminent future action: ''I am about to kill.'''
    reason: lexical_alternative
