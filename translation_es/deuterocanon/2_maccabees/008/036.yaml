  yaml_path: translation/deuterocanon/2_maccabees/008/036.yaml
  text: And the one who had undertaken to pay tribute to the Romans from the captivity of those in Jerusalem kept proclaiming that the Jews had as their champion one who fought for them[a], and that for this reason the Jews were invulnerable[b], because they followed the laws that had been commanded to them.
  footnotes:
  - marker: a
    text: Or 'from taking captive the people in Jerusalem'; the Greek phrase refers to the expected proceeds from the captivity of Jerusalem's inhabitants.
    reason: lexical_alternative
  - marker: b
    text: The defender is not named explicitly here; the context implies God as the one fighting on behalf of the Jews.
    reason: alternative_reading
