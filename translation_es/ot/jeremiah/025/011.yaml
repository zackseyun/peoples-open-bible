translation:
  language: es
  text: Y toda esta tierra llegará a ser una ruina y un horror[a], y estas naciones servirán al rey de Babilonia durante setenta años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un objeto de horror», subrayando la reacción atónita que provoca la devastación de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: And ... will become
  chosen_spanish: vendrá a ser
  alternatives_spanish:
  - será
  - llegará a ser
  lexicon: HALOT
  rationale: El hebreo en discurso profético expresa un estado resultante futuro; «vendrá a ser» conserva ese matiz de transformación mejor que un simple «será».
- source_word: כָּל הָאָרֶץ הַזֹּאת
  english_pob_choice: all this land
  chosen_spanish: toda esta tierra
  alternatives_spanish:
  - toda esta tierra
  - toda la tierra
  lexicon: HALOT
  rationale: «אֶרֶץ» aquí se refiere a la tierra/región en juicio, no al planeta. «Esta tierra» conserva el referente local y el demostrativo; «toda» mantiene כָּל.
- source_word: לְחָרְבָּה
  english_pob_choice: a ruin
  chosen_spanish: una ruina
  alternatives_spanish:
  - destrucción
  - desolación
  lexicon: HALOT
  rationale: El sustantivo señala devastación/ruina como estado visible; «una ruina» es natural en español y concreto como el inglés POB.
- source_word: לְשַׁמָּה
  english_pob_choice: a horror
  chosen_spanish: un horror
  alternatives_spanish:
  - un objeto de horror
  - una desolación
  - un espanto
  lexicon: HALOT
  rationale: La palabra puede expresar no solo el estado devastado sino el asombro horrorizado que produce; «un horror» mantiene esa fuerza breve. La nota preserva la alternativa más explicativa.
- source_word: וְעָבְדוּ
  english_pob_choice: will serve
  chosen_spanish: servirán
  alternatives_spanish:
  - estarán sujetos a
  - trabajarán para
  lexicon: HALOT
  rationale: Con objeto directo, עבד significa servir a un rey en sentido de sujeción política. «Servirán» es directo y conserva la relación de vasallaje sin suavizarla a «estar sujetos a».
- source_word: הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: these nations
  chosen_spanish: estas naciones
  alternatives_spanish:
  - estos pueblos
  - estas naciones gentiles
  lexicon: HALOT
  rationale: En este contexto geopolítico, «naciones» es la equivalencia más precisa y natural para גּוֹיִם.
- source_word: אֶת מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: al rey de Babilonia
  alternatives_spanish:
  - al rey de Babilonia
  - al rey babilonio
  lexicon: HALOT
  rationale: El hebreo marca el objeto directo con אֶת; en español conviene el dativo preposicional «al rey de Babilonia» para reflejar la sujeción y la construcción verbal.
- source_word: שִׁבְעִים שָׁנָה
  english_pob_choice: for seventy years
  chosen_spanish: durante setenta años
  alternatives_spanish:
  - por setenta años
  - setenta años
  lexicon: HALOT
  rationale: En español, con «servir» un marco temporal se expresa naturalmente con «durante»; conserva la duración exacta del hebreo sin añadir más contenido.
theological_decisions:
- issue: Alcance de «la tierra» en el juicio profético
  english_pob_reading: '''land'' refers to the regional land under judgment, not the whole earth'
  chosen_spanish_reading: «tierra» se entiende como la región bajo juicio, no como el mundo entero
  alternative_spanish_readings:
  - «tierra» como el territorio regional
  - «tierra» en sentido universal
  rationale: El contexto inmediato trata del juicio sobre Judá y las naciones sometidas a Babilonia. Usar «tierra» evita exagerar el alcance y preserva la referencia histórica regional.
  doctrine_reference: Jeremías 25:9-11; cf. el uso contextual de אֶרֶץ en profecía histórica
- issue: Valor de לְשַׁמָּה como estado y reacción
  english_pob_reading: '''a horror,'' highlighting the appalled reaction provoked by the land''s devastation'
  chosen_spanish_reading: «un horror» conserva tanto la devastación como el espanto que provoca
  alternative_spanish_readings:
  - «una desolación»
  - «un objeto de horror»
  rationale: La expresión hebrea puede abarcar la ruina objetiva y la impresión de horror. La forma breve española mantiene esa tensión, mientras la nota ofrece la paráfrasis explicativa del audit trail.
  doctrine_reference: HALOT s.v. שַׁמָּה; Jer 25:9-11
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el archivo fuente; el pasaje mantiene alta concordancia con la auditoría inglesa y no requiere ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - «Babilonia» conserva el topónimo estándar en español, y «rey de Babilonia» sigue la relación posesiva del hebreo.
  - La puntuación reproduce la coordinación y la cadencia profética sin añadir segmentación interpretativa.
