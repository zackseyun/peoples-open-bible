  text: Καὶ ἡ φωνὴ ἣν ἤκουσα ἐκ τοῦ οὐρανοῦ, πάλιν ⸀λαλοῦσαν μετ’ ἐμοῦ καὶ ⸀λέγουσαν· Ὕπαγε λάβε τὸ ⸀βιβλίον τὸ ἠνεῳγμένον ἐν τῇ χειρὶ τοῦ ἀγγέλου τοῦ ἑστῶτος ἐπὶ τῆς θαλάσσης καὶ ἐπὶ τῆς γῆς.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/010/008.yaml
  text: And the voice that I heard from heaven spoke to me again and said[a], “Go[b], take the scroll that is opened in the hand of the angel who is standing on the sea and on the land.”
  footnotes:
  - marker: a
    text: Or “little scroll”; the surrounding context uses a diminutive form in nearby verses, but this verse reads βιβλίον, “scroll.”
    reason: alternative_reading
  - marker: b
    text: Or “earth” for “land.”
    reason: lexical_alternative
