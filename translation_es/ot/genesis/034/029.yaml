translation:
  language: es
  text: Tomaron cautivos[a] toda su riqueza, todos sus pequeños[b] y sus esposas[c], y saquearon todo lo que había en la casa[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «capturaron». El verbo hebreo שָׁבָה puede traducirse como “tomar cautivo” o simplemente “capturar”; aquí se conserva la fuerza de cautiverio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus hijos» o «sus dependientes». טַף suele referirse a niños pequeños o a miembros vulnerables del hogar.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «sus mujeres». El hebreo usa un sustantivo que puede significar “mujeres” o “esposas”; aquí el contexto y la relación posesiva favorecen “esposas”.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «todo lo que había en el hogar». El hebreo “casa” puede referirse a la casa física o al hogar con sus bienes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵילָם
  english_pob_choice: their wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - sus bienes
  - sus posesiones
  - su hacienda
  lexicon: HALOT
  rationale: חֵיל/חַיִל puede referirse a riqueza, bienes o recursos. "Riqueza" conserva el sentido amplio de bienes móviles y propiedad valiosa sin restringirlo a ganado o a fuerza militar.
- source_word: טַפָּם
  english_pob_choice: their little ones
  chosen_spanish: sus pequeños
  alternatives_spanish:
  - sus niños
  - sus hijos
  - sus dependientes
  lexicon: HALOT
  rationale: טַף suele aludir a niños pequeños o dependientes del hogar. "Sus pequeños" preserva la referencia a menores vulnerables y funciona bien en español bíblico contemporáneo.
- source_word: נְשֵׁיהֶם
  english_pob_choice: their wives
  chosen_spanish: sus mujeres
  alternatives_spanish:
  - sus esposas
  - sus mujeres y esposas
  lexicon: HALOT
  rationale: אִשָּׁה puede significar "mujer" o "esposa". Aquí, dentro de una lista de cautivos y botín, el español "sus mujeres" refleja el hebreo de manera directa y mantiene abierta la matiz relacional sin imponer una formulación más estrecha que el sustantivo hebreo.
- source_word: שָׁבוּ
  english_pob_choice: took captive
  chosen_spanish: tomaron cautivos
  alternatives_spanish:
  - capturaron
  - llevaron cautivos
  lexicon: HALOT
  rationale: שָׁבָה significa tomar/capturar como cautivo. "Tomaron cautivos" expresa bien la acción sobre personas y evita aplicar el verbo al botín material.
- source_word: וַיָּבֹזּוּ
  english_pob_choice: they plundered
  chosen_spanish: saquearon
  alternatives_spanish:
  - despojaron
  - tomaron como botín
  lexicon: HALOT
  rationale: בזז denota saquear o tomar botín. "Saquearon" es natural en español y conserva el sentido violento del término.
- source_word: כָּל אֲשֶׁר בַּבָּיִת
  english_pob_choice: everything that was in the house
  chosen_spanish: todo lo que había en la casa
  alternatives_spanish:
  - todo lo que había en el hogar
  - todo lo que estaba en la casa
  lexicon: HALOT
  rationale: El singular בַּבַּיִת puede significar la casa física o la casa como hogar/entidad doméstica. "Todo lo que había en la casa" sigue de cerca el hebreo y es idiomático en español.
translation_notes:
  revision_awareness: 'La redacción española refleja la revisión más reciente del POB inglés: mantiene la secuencia del hebreo, deja el botín material en paralelo con la lista inicial y vierte la cláusula final de modo directo como una frase totalizante.'
  spanish_consistency_notes:
  - Se evita "SEÑOR" u otras sustituciones no pertinentes; no hay términos divinos en este versículo.
  - '"Tomaron cautivos" se reserva para personas; "saquearon" para bienes, siguiendo la distinción semántica del hebreo y la auditoría inglesa.'
  - '"Riqueza" traduce el alcance amplio de חֵיל sin precisar indebidamente el tipo de propiedad.'
  - '"Sus pequeños" conserva el valor afectivo y la ambigüedad de edad/dependencia de טַף.'
