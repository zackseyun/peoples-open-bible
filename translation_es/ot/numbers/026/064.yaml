  text: וּ/בְ/אֵ֨לֶּה֙ לֹא הָ֣יָה אִ֔ישׁ מִ/פְּקוּדֵ֣י מֹשֶׁ֔ה וְ/אַהֲרֹ֖ן הַ/כֹּהֵ֑ן אֲשֶׁ֥ר פָּקְד֛וּ אֶת בְּנֵ֥י יִשְׂרָאֵ֖ל בְּ/מִדְבַּ֥ר סִינָֽי־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/026/064.yaml
  text: But among these there was not a man from those counted by Moses and Aaron the priest[b][a], who counted the sons of Israel in the wilderness of Sinai.
  footnotes:
