translation:
  language: es
  text: 'Y Lea dijo: «Dios me ha dado mi recompensa, porque di mi sierva a mi esposo». Y le puso por nombre Isacar[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Isacar» suena al hebreo para «recompensa» o «salario», reflejando la explicación de Lea.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַן אֱלֹהִים
  english_pob_choice: God has given
  chosen_spanish: Dios me ha dado
  alternatives_spanish:
  - Dios ha dado
  - Dios me dio
  lexicon: HALOT
  rationale: El hebreo usa נתן con Dios como sujeto. En español, «me ha dado» expresa de manera natural el resultado vigente de una acción ya realizada, siguiendo el valor comunicativo del inglés POB sin perder el hecho de que el dador es Dios.
- source_word: שְׂכָרִי
  english_pob_choice: my reward
  chosen_spanish: mi recompensa
  alternatives_spanish:
  - mi galardón
  - mi salario
  - mi paga
  lexicon: HALOT
  rationale: שָׂכָר puede significar sueldo, paga, recompensa o salario. «Recompensa» conserva mejor en español el juego de palabras con Isacar y la idea de retribución, sin sonar tan contractual o arcaico como «salario» en este contexto narrativo.
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  - por cuanto
  lexicon: HALOT
  rationale: Aunque la partícula es formalmente relativa, aquí introduce la explicación causal de Lea. «Porque» comunica esa relación con claridad natural en español.
- source_word: נָתַתִּי
  english_pob_choice: I gave
  chosen_spanish: di
  alternatives_spanish:
  - he dado
  - he entregado
  lexicon: HALOT
  rationale: El pasado simple es la forma más directa y natural para la acción previa de Lea. Mantiene la linealidad narrativa del hebreo sin cargar la frase con un perfecto innecesario.
- source_word: שִׁפְחָתִי
  english_pob_choice: my female servant
  chosen_spanish: mi sierva
  alternatives_spanish:
  - mi criada
  - mi esclava
  lexicon: HALOT
  rationale: שִׁפְחָה designa una servidora femenina de estatus subordinado. «Sierva» es una forma clara y bíblica en español; «criada» suaviza demasiado el estatus, mientras que «esclava» puede sonar más fuerte de lo que el contexto inmediato exige, aunque no se excluye semánticamente.
- source_word: לְאִישִׁי
  english_pob_choice: to my husband
  chosen_spanish: a mi esposo
  alternatives_spanish:
  - a mi marido
  - a mi hombre
  lexicon: HALOT
  rationale: En este contexto, אִישׁ se refiere con claridad a Jacob como cónyuge. «Esposo» es una opción digna y natural en español, equivalente al sentido relacional que el inglés POB expresa con «husband».
- source_word: וַתִּקְרָא שְׁמוֹ
  english_pob_choice: So she named him
  chosen_spanish: Y llamó su nombre
  alternatives_spanish:
  - Y lo nombró
  - Y puso por nombre
  lexicon: HALOT
  rationale: La fórmula hebrea literal es «llamó su nombre». En español, «Y llamó su nombre» conserva mejor la estructura nominativa y el ritmo bíblico; «lo nombró» es más idiomático, pero pierde algo del eco formal del hebreo.
- source_word: יִשָּׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issacar
  - Isascar
  lexicon: HALOT
  rationale: Los nombres propios se transliteran según convención hispana. «Isacar» es la forma más establecida en español bíblico y conserva la relación sonora con שָׂכָר que motiva la explicación de Lea.
theological_decisions:
- issue: Lea atribuye el nacimiento/recompensa a Dios sin evaluación editorial de su interpretación
  english_pob_reading: Render Leah's words straightforwardly as attributing the birth to God's giving of wages, without endorsing or critiquing her theology in translation.
  chosen_spanish_reading: Traducir sus palabras de manera directa, como atribución a Dios de la recompensa, sin añadir aprobación ni corrección interpretativa.
  alternative_spanish_readings:
  - Dios me ha concedido una recompensa
  - Dios me ha pagado
  rationale: La frase presenta la explicación de Lea, y la traducción debe preservar su lenguaje de retribución divina sin domesticarlo ni añadir una valoración doctrinal ajena al texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La base inglesa revisada pasó de «wages» a «reward» para שְׂכָרִי; por eso el español sigue la decisión final con «recompensa», manteniendo el juego de palabras con el nombre propio y la explicación causal de Lea. También se conservó la lectura directa de la atribución a Dios y la fórmula nominal hebrea en la narración.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y no se introduce «SEÑOR», porque el texto hebreo aquí no usa el tetragrámaton.
  - Se usa «sierva» como término bíblico general para שִׁפְחָה, evitando oscilar entre «criada» y «esclava» en este versículo.
  - El nombre propio se presenta como «Isacar», forma usual en español, con nota explicativa sobre el juego fonético con שָׂכָר.
  - La construcción «Y llamó su nombre» conserva un rasgo hebreo formal que ayuda a identificar la fórmula de nombramiento.
