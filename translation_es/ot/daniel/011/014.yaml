  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido general del hebreo: marco temporal («en aquellos tiempos»), oposición hostil al rey del Sur, autoelevación de un grupo violento dentro del pueblo, propósito relacionado con «la visión» y desenlace de tropiezo. También conserva adecuadamente la ambigüedad de לְהַעֲמִיד חָזוֹן con una nota alternativa. Sin embargo, una nota al pie no corresponde al expediente inglés ni al hebreo: el marcador [a] en «rey del Sur» ofrece una alternativa idéntica y omite la alternativa documentada sobre «los hijos de los violentos entre tu pueblo».'
