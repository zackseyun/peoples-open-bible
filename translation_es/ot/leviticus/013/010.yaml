    text: O «lo inspecciona»; ראה en este contexto es un verbo de examen médico-ritual, no solo de visión general.
    reason: lexical_alternative
  - marker: b
    text: Lit. «carne viva»; la expresión se refiere a tejido vivo o expuesto dentro de la lesión.
    reason: lexical_alternative
  revision_rationale: 'Se ajustó la sintaxis para mejorar la naturalidad y la precisión con respecto al hebreo: se mantuvo la fuerza deíctica de «he aquí», pero con mejor puntuación, y se cambió «el pelo se le ha vuelto blanco» por «esta ha vuelto blanco el pelo» para conservar mejor que la lesión es el referente femenino que produce la señal diagnóstica. También se precisó la nota sobre «carne viva» para reflejar el matiz documentado de tejido vivo/expuesto dentro de la hinchazón.'
