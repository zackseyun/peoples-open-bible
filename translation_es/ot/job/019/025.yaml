    changes_summary: 'Revised ''afterward he will rise over the dust'' to ''at the last he will stand upon the dust'' for closer lexical accuracy: אַחֲרוֹן is better rendered ''at the last,'' and יָקוּם commonly means ''stand/arise''; ''upon the dust'' is more natural and closer than ''over the dust.'''
translation:
  language: es
  text: Pero en cuanto a mí[a], yo sé que mi Redentor vive[c], y al fin[b] se pondrá en pie sobre el polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La construcción hebrea con pronombre independiente es enfática y contrastiva; también puede expresarse «pero yo».
    reason: lexical_alternative
  - marker: b
    text: O «y al último se pondrá en pie sobre la tierra». La cláusula hebrea es difícil y también puede entenderse «y como el último se pondrá en pie sobre el polvo».
    reason: alternative_reading
  - marker: c
    text: «Polvo» puede evocar la mortalidad, la tumba o la tierra; el hebreo dice literalmente «polvo».
    reason: cultural_note
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Y yo
  - Pero yo
  lexicon: HALOT
  rationale: La construcción con la pronombre independiente es enfática y contrastiva. «En cuanto a mí» conserva ese contraste personal mejor que un simple «y yo», y «pero» refleja la oposición implícita del contexto.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: yo sé
  alternatives_spanish:
  - yo he sabido
  - yo sabía
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una convicción firme y vigente; en español, el presente «sé» comunica mejor esa certeza actual y asentada.
- source_word: גֹּאֲלִי
  english_pob_choice: my Redeemer
  chosen_spanish: mi Redentor
  alternatives_spanish:
  - mi vindicador
  - mi goel
  - mi defensor
  lexicon: HALOT
  rationale: «Redentor» conserva el peso tradicional y teológico del término sin cerrar del todo sus matices jurídicos y familiares. «Vindicador» queda como alternativa contextual válida en Job.
- source_word: חָי
  english_pob_choice: lives
  chosen_spanish: vive
  alternatives_spanish:
  - está vivo
  - es viviente
  lexicon: HALOT
  rationale: El predicado se expresa de forma natural en español con el verbo «vive», que comunica continuidad de vida.
- source_word: וְאַחֲרוֹן
  english_pob_choice: at the last
  chosen_spanish: al final
  alternatives_spanish:
  - al último
  - como el último
  lexicon: HALOT
  rationale: La forma es discutida y puede leerse adverbial o sustantivamente. «Al final» es una solución sobria que preserva la ambigüedad principal sin forzar una lectura más definida de lo que exige el hebreo.
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - sobre el
  lexicon: HALOT
  rationale: «Sobre» reproduce bien el valor espacial amplio de עַל y mantiene abierta la precisión de la imagen.
- source_word: עָפָר
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - el polvo de la tierra
  - el polvo del sepulcro
  lexicon: HALOT
  rationale: El hebreo significa literalmente «polvo». «El polvo» conserva la imagen concreta y, en español, puede evocar tanto mortalidad como la tierra, sin añadir una interpretación explícita.
- source_word: יָקוּם
  english_pob_choice: he will stand
  chosen_spanish: se alzará
  alternatives_spanish:
  - se levantará
  - se pondrá en pie
  lexicon: HALOT
  rationale: קום puede significar «levantarse», «alzarse» o «ponerse en pie». «Se alzará» funciona bien con «sobre el polvo» y evita restringir prematuramente la frase a una sola lectura escatológica o forense.
theological_decisions:
- issue: Identidad y función del גֹּאֵל de Job
  english_pob_reading: Rendered broadly as 'my Redeemer' without specifying whether Job means God directly, a heavenly witness, or a messianically construed redeemer.
  chosen_spanish_reading: «Mi Redentor» sin identificarlo de manera explícita como Dios, testigo celestial o figura mesiánica.
  alternative_spanish_readings:
  - mi vindicador
  - mi pariente redentor
  rationale: El texto hebreo no resuelve de forma explícita la identidad del גֹּאֵל. Mantener «Redentor» preserva la resonancia teológica y la tensión interpretativa sin sobreexplicar la referencia.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Fuerza escatológica de וְאַחֲרוֹן ... יָקוּם
  english_pob_reading: Translated as 'and at the last he will stand upon the dust' rather than a more explicit resurrection formula.
  chosen_spanish_reading: «y al final se alzará sobre el polvo» sin convertirlo en una fórmula explícita de resurrección.
  alternative_spanish_readings:
  - y al último se pondrá en pie sobre el polvo
  - y al final se levantará sobre la tierra
  rationale: La cláusula es sintáctica y teológicamente disputada. La redacción elegida se mantiene cercana al hebreo y conserva abierta la cuestión del alcance exacto de la imagen.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió «at the last he will stand upon the dust» frente a una formulación más libre. La versión española sigue esa corrección al conservar «al final» y una imagen espacial sobria con «sobre el polvo», evitando una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Redentor» como término principal por coherencia con la decisión inglesa y con el rango semántico del hebreo.
  - Se evita «SEÑOR» porque aquí no aparece יהוה en el texto base.
  - Se preserva la ambigüedad de וְאַחֲרוֹן y יָקוּם en vez de resolverla como una declaración explícita de resurrección.
  - La puntuación reproduce el contraste enfático entre «Pero en cuanto a mí» y la afirmación principal.
  - «Polvo» se conserva literal para mantener abierta la gama de matices del hebreo.
