translation:
  language: es
  text: Y Jacob separó los corderos[a], y puso el rebaño de cara a los listados y a todos los oscuros[b] entre el rebaño de Labán[c]. Luego apartó rebaños para sí, y no los puso con el rebaño de Labán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ovejas jóvenes»; el hebreo designa animales ovinos jóvenes, no necesariamente ovejas adultas.
    reason: lexical_alternative
  - marker: b
    text: O «todos los marrones»; חוּם puede referirse a color oscuro o marrón.
    reason: lexical_alternative
  - marker: c
    text: O «en el rebaño de Labán».
    reason: previous_rendering
lexical_decisions:
- source_word: הַכְּשָׂבִים
  english_pob_choice: the lambs
  chosen_spanish: los corderos
  alternatives_spanish:
  - las ovejas jóvenes
  - los borregos
  lexicon: HALOT
  rationale: כְּשָׂבִים designa animales jóvenes del ovino; en español, «corderos» comunica mejor esa especificidad que «ovejas», que es demasiado general. «Borregos» también es posible, pero «corderos» es más amplio y claro en registro bíblico contemporáneo.
- source_word: הִפְרִיד
  english_pob_choice: separated
  chosen_spanish: separó
  alternatives_spanish:
  - dividió
  - apartó
  lexicon: HALOT
  rationale: El hifil de פרד significa separar/dividir. «Separó» es la correspondencia más directa y natural en español.
- source_word: פְּנֵי הַצֹּאן
  english_pob_choice: the faces of the flock
  chosen_spanish: las caras del rebaño
  alternatives_spanish:
  - el frente del rebaño
  - el rebaño
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «rostro/cara» del hebreo, pero en español «caras del rebaño» mantiene la literalidad sin sonar tan duro como una calca más técnica. «El frente del rebaño» explica la orientación, aunque pierde el lexema hebreo.
- source_word: עָקֹד
  english_pob_choice: the striped
  chosen_spanish: los listados
  alternatives_spanish:
  - los rayados
  - los atigrados
  lexicon: HALOT
  rationale: עָקֹד refiere a animales marcados con bandas o rayas. «Listados» conserva la idea de bandas/rayas de modo relativamente preciso y sobrio. «Rayados» es más transparente, pero puede sonar menos idiomático en contexto ganadero; «atigrados» sería demasiado interpretativo.
- source_word: כָל חוּם
  english_pob_choice: all the dark-colored
  chosen_spanish: todos los oscuros
  alternatives_spanish:
  - todos los marrones
  - todos los de color oscuro
  lexicon: HALOT
  rationale: חוּם puede denotar color oscuro o marrón. En español, «oscuros» mantiene la amplitud semántica sin fijar indebidamente el tono exacto. «Marrones» es posible, pero más restrictivo.
- source_word: בְּצֹאן לָבָן
  english_pob_choice: among Laban’s flock
  chosen_spanish: entre el rebaño de Laban
  alternatives_spanish:
  - en el rebaño de Laban
  - del rebaño de Laban
  lexicon: HALOT
  rationale: Se sigue el sentido locativo de ב, tal como refleja el contexto narrativo. «Entre el rebaño de Laban» expresa naturalmente que estos animales estaban dentro de ese rebaño, sin adoptar la lectura de origen descartada en la revisión más reciente.
- source_word: וַיָּשֶׁת לוֹ עֲדָרִים לְבַדּוֹ
  english_pob_choice: Then he set apart flocks for himself
  chosen_spanish: Luego apartó rebaños para sí
  alternatives_spanish:
  - Luego estableció rebaños separados para sí
  - Luego puso rebaños aparte para sí
  lexicon: HALOT
  rationale: שׁית significa poner/establecer; לְבַדּוֹ añade separación. «Apartó rebaños para sí» condensa ambos elementos en un español natural y fiel al sentido de separación.
- source_word: וְלֹא שָׁתָם עַל צֹאן לָבָן
  english_pob_choice: and did not put them with Laban’s flock
  chosen_spanish: y no los puso con el rebaño de Laban
  alternatives_spanish:
  - y no los colocó sobre el rebaño de Laban
  - y no los puso junto al rebaño de Laban
  lexicon: HALOT
  rationale: El verbo שָׁתָם retoma los rebaños apartados; עַל expresa aquí colocación/asociación. «No los puso con» traduce el sentido de no mezclarlos con el rebaño de Laban de forma idiomática en español.
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente que favorece el sentido locativo de בְּ en בְּצֹאן לָבָן («entre el rebaño de Laban») y mantiene la correspondencia cercana de וַיָּשֶׁת/שָׁתָם con «puso/apartó» sin adoptar la lectura de origen («de Laban»).
  spanish_consistency_notes:
  - Se usa «Laban» de manera consistente con el nombre propio del texto base.
  - Se conservó la imagen hebrea de «caras del rebaño» para פְּנֵי הַצֹּאן, aunque en español suene más literal que una paráfrasis explicativa.
  - No se tradujo יהוה porque este versículo no contiene el nombre divino.
