  yaml_path: translation/ot/isaiah/017/011.yaml
  text: On the day you plant[a], you make it grow luxuriantly; and in the morning you make your seed sprout[b]. But the harvest flees away in a day of grief and incurable pain.
  footnotes:
  - marker: a
    text: Or, more literally, 'a heap of harvest' for 'the harvest flees away.' The Hebrew phrase is difficult, and some take נֵד as 'heap' rather than expressing disappearance.
    reason: lexical_alternative
  - marker: b
    text: '''In a day of grief'' may also be rendered ''in a day of sickness'' or ''in a day of affliction.'''
    reason: lexical_alternative
