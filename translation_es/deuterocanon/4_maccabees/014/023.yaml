revisions:
- from: Amó más la piedad[a], la piedad que salva[b] para vida eterna, conforme a Dios.
  to: Amó más la piedad[a] que salva[b] a la vida eterna, conforme a Dios.
  rationale: Se ajusta εἰς αἰώνιον ζωὴν a «a la vida eterna» para reflejar mejor la meta o resultado expresados en el griego y en la auditoría inglesa. Se elimina la repetición aposicional con coma para dar un español más natural sin perder el vínculo atributivo de τὴν σώζουσαν con «piedad». Se simplifica la nota léxica para mantener una alternativa más cercana y útil.
