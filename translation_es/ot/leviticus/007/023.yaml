review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la estructura y el sentido del hebreo: mandato a Moisés, destinatario colectivo, fórmula de habla, prohibición amplia sobre la grasa, y la lista de bovino/oveja/cabra. Sin embargo, la forma verbal española «No comerán» desplaza el valor directo de la prohibición legal de 2.ª persona plural ("ustedes/no comerán" puede leerse como predicción) y conviene ajustarla a una formulación normativa más natural. Además, «toro» sobreespecifica sexo frente a שׁוֹר, que aquí es genérico bovino; «buey» refleja mejor la elección inglesa documentada «ox» y evita el matiz de macho entero de «toro».'
  spanish_quality_summary: 'El texto es claro y legible, con buen registro bíblico moderno. La principal mejora es hacer la prohibición más idiomática y normativa en español bíblico-jurídico: «no comerán» suena menos directo que «no comerán/ustedes» pero sigue siendo ambiguo; «no comerán» además no concuerda idealmente con el mandato directo. «No deben comer» o «no comerán» pueden funcionar, pero «no comerán» ya está en el borrador y es menos preciso que «no comerán» no; la opción más natural y fiel aquí es «no deben comer» o «no comerán»? Mejor «no comerán» sigue ambiguo. Se recomienda «no comerán» cambiar a «no comerán» no resuelve; por tanto, «no deben comer» ofrece claridad normativa. También conviene añadir artículos en la serie nominal para mayor naturalidad: «de un buey, de una oveja o de una cabra».'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «hijos de Israel» preserva bien בְּנֵי יִשְׂרָאֵל y la nota alternativa es apropiada. «grasa» corresponde bien a חֵלֶב. El ajuste clave de glosario es evitar «toro» por su especificidad; «buey» se alinea mejor con la auditoría inglesa («ox») y con la intención de una categoría legal singular no colectiva.
  issues:
  - severity: medium
    issue: «toro» sobreespecifica שׁוֹר
    rationale: El hebreo nombra un bovino de forma genérica en una lista legal. La auditoría inglesa eligió «ox» precisamente para evitar la especificidad sexual de «bull». En español, «toro» introduce ese matiz de macho entero; «buey» reproduce mejor la decisión documentada, aunque tampoco es perfecto.
  - severity: medium
    issue: «No comerán» debilita la fuerza preceptiva directa
    rationale: לֹא תֹאכֵלוּ es 2mp en una formulación legal. En español, «No comerán» puede sonar predictivo o indirecto. Una formulación normativa como «no deben comer» comunica mejor la prohibición dirigida al pueblo.
  - severity: low
    issue: La serie nominal puede sonar más natural con artículos indefinidos
    rationale: «de toro, de oveja o de cabra» es entendible, pero «de un buey, de una oveja o de una cabra» suena más natural en español y mantiene el valor genérico singular de la lista hebrea.
  revised_spanish_text: 'Habla a los hijos de Israel[a], diciendo: No deben comer ninguna grasa de un buey, de una oveja o de una cabra.'
  revised_footnotes:
  - marker: a
    text: O, de manera más idiomática, «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
  revision_rationale: Se ajusta «toro» a «buey» para evitar una especificación sexual no presente en el hebreo y para seguir mejor la decisión auditada «ox». Se cambia «No comerán» por «No deben comer» para expresar con mayor claridad en español la prohibición legal dirigida al pueblo. Se añaden artículos indefinidos en la enumeración por naturalidad española sin alterar el sentido.
