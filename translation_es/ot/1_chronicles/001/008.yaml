translation:
  language: es
  text: 'Los hijos de Cam: Cus[a], Mizraim[b], Put y Canaán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Cam». La fórmula hebrea «hijos de» puede referirse a hijos inmediatos o a descendientes en sentido amplio.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Mizraim»; tradicionalmente asociado con Egipto. Aquí se conserva como nombre propio dentro de una lista genealógica.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos
  lexicon: HALOT
  rationale: En una fórmula genealógica, בְּנֵי se traduce de manera natural como «los hijos de». En español conserva tanto la relación filial como la amplitud genealógica posible del hebreo, sin forzar una paráfrasis.
- source_word: חָם
  english_pob_choice: Ham
  chosen_spanish: Cam
  alternatives_spanish:
  - Ham
  lexicon: HALOT
  rationale: Nombre propio bíblico. Se usa la forma hispana tradicional «Cam», que es la habitual y entendible en español bíblico, manteniendo la referencia al mismo antropónimo.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  - Kush
  lexicon: HALOT
  rationale: Nombre propio en una lista genealógica. «Cus» es la forma española tradicional y clara; conserva el carácter de nombre propio sin traducirlo como entidad geográfica.
- source_word: מִצְרַיִם
  english_pob_choice: Mizraim
  chosen_spanish: Mizraim
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: En este contexto genealógico funciona como nombre propio/eponímico, no como el país. Por eso se conserva la transliteración «Mizraim», siguiendo el criterio del POB en inglés.
- source_word: פּוּט
  english_pob_choice: Put
  chosen_spanish: Put
  alternatives_spanish:
  - Phut
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva «Put» para reflejar directamente la forma hebrea y mantener la uniformidad con la lista genealógica.
- source_word: כְנָעַן
  english_pob_choice: Canaan
  chosen_spanish: Canaán
  alternatives_spanish:
  - Canaan
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español. «Canaán» es la forma establecida y fiel al hebreo en contexto genealógico.
translation_notes:
  revision_awareness: El texto español sigue el estado de alta concordancia del expediente en inglés y no introduce cambios de sentido respecto del audit trail. Se mantiene la estructura genealógica breve y la distinción entre nombre propio y equivalencia geográfica en מִצְרַיִם.
  spanish_consistency_notes:
  - Se mantiene el orden y la puntuación de lista genealógica con dos puntos tras «Cam».
  - Se usa «Cus» y «Mizraim» como nombres propios transliterados/estandarizados según el contexto genealógico.
  - No se añade término explicativo para «hijos de» en el texto principal; la alternativa queda en nota.
  - La ortografía española de nombres bíblicos se adapta donde existe forma asentada en español (Cam, Cus, Canaán).
