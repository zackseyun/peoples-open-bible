translation:
  language: es
  text: 'Y de José dijo[a]: «Bendita por Yahvé sea su tierra, con lo más escogido del cielo, con rocío[b], y desde la profundidad que está debajo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y para José dijo»; también puede entenderse: «Acerca de José dijo».'
    reason: lexical_alternative
  - marker: b
    text: «La profundidad» probablemente se refiere a aguas subterráneas debajo de la tierra.
    reason: cultural_note
lexical_decisions:
- source_word: וּלְיוֹסֵף
  english_pob_choice: And of Joseph
  chosen_spanish: Y de José
  alternatives_spanish:
  - Y para José
  - Y con respecto a José
  lexicon: HALOT
  rationale: La preposición ל con un nombre propio en fórmulas de bendición suele introducir al destinatario o ámbito de la bendición. «De José» conserva la relación formal del texto y suena natural en español en este contexto tribual.
- source_word: אָמַר
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  lexicon: HALOT
  rationale: Verbo narrativo estándar para introducir la bendición. «Dijo» mantiene la sencillez y la estructura directa del hebreo.
- source_word: מְבֹרֶכֶת
  english_pob_choice: Blessed ... be
  chosen_spanish: Bendita ... sea
  alternatives_spanish:
  - Sea bendita
  - Bendecida ... sea
  lexicon: HALOT
  rationale: El participio pasivo funciona de modo predicativo en fórmula de bendición. «Bendita ... sea» preserva el valor optativo y el tono solemne sin volverlo una paráfrasis explicativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton. «Yahvé» conserva el nombre propio divino, en lugar de sustituirlo por un título.
- source_word: אַרְצוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: HALOT
  rationale: אֶרֶץ aquí designa la tierra asignada a José y sus tribus. «Tierra» es la opción bíblica y más natural en español.
- source_word: מִמֶּגֶד
  english_pob_choice: with the choicest things of
  chosen_spanish: con las cosas más escogidas de
  alternatives_spanish:
  - con los mejores productos de
  - con lo más precioso de
  lexicon: HALOT
  rationale: מֶגֶד expresa lo escogido, valioso o excelente. «Las cosas más escogidas» sigue de cerca la referencia léxica sin añadir una interpretación agrícola demasiado específica.
- source_word: שָׁמַיִם
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - los cielos
  lexicon: HALOT
  rationale: En este contexto de bendición agrícola, «cielo» comunica bien la fuente celestial de la bendición. «Los cielos» también es posible, pero aquí «el cielo» es más fluido en español.
- source_word: מִטָּל
  english_pob_choice: with dew
  chosen_spanish: con rocío
  alternatives_spanish:
  - con el rocío
  - desde el rocío
  lexicon: HALOT
  rationale: טַל significa «rocío». Dado que el español no requiere artículo aquí, «con rocío» mantiene la coordinación poética de las fuentes de bendición.
- source_word: וּמִתְּהוֹם
  english_pob_choice: and from the deep
  chosen_spanish: y con el abismo
  alternatives_spanish:
  - y desde el abismo
  - y con las aguas subterráneas
  lexicon: HALOT
  rationale: תְּהוֹם puede referir al abismo/deptho primordial o a aguas subterráneas. «Abismo» conserva la tensión semántica del término; se mantiene el valor amplio y no se reduce prematuramente a una sola imagen.
- source_word: רֹבֶצֶת תָּחַת
  english_pob_choice: lying beneath
  chosen_spanish: que yace debajo
  alternatives_spanish:
  - tendido debajo
  - reposando debajo
  lexicon: HALOT
  rationale: El participio רֹבֶצֶת describe algo que está echado o tendido. «Que yace debajo» preserva la imagen espacial y resulta más natural que una traducción demasiado literal o animalizante.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la política del proyecto de transliterar el Nombre divino. Esto evita la sustitución por un título y conserva la referencia explícita al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: contested terms, יְהוָה / YHWH'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que afinó מגד hacia una expresión más cercana a «things/ cosas» en vez de expandirlo a «gifts». En español se refleja esa cautela con «las cosas más escogidas de», manteniendo la amplitud del hebreo y la forma de bendición.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Nombre divino, conforme al estándar del proyecto.
  - Se evitó «Cristo» o cualquier terminología cristológica, ya que no aparece en el pasaje.
  - «Abismo» conserva la ambigüedad productiva del hebreo תְּהוֹם, sin decidir de manera restrictiva entre sentido cosmológico o hidrogeológico.
