  text: כִּ֤י שָׁמַ֨עְתִּי דִּבַּ֥ת רַבִּים֮ מָג֪וֹר מִ/סָּ֫בִ֥יב בְּ/הִוָּסְדָ֣/ם יַ֣חַד עָלַ֑/י לָ/קַ֖חַת נַפְשִׁ֣/י זָמָֽמוּ׀׃
