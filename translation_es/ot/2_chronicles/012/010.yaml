base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/012/010.yaml
  text: So King Rehoboam made bronze shields in their place and committed them to the care of the commanders of the guards[b][a], who kept watch at the entrance of the king’s house.
  footnotes:
  - marker: a
    text: Hebrew 'the runners,' likely referring to the royal guards or couriers who served as palace guards.
    reason: lexical_alternative
  - marker: b
    text: That is, bronze shields replacing the gold shields taken by Shishak (see the previous verse).
    reason: cross_reference
