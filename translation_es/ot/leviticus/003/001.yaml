translation:
  language: es
  text: Si su ofrenda es un sacrificio de ofrendas de paz[a], si la ofrece del ganado, ya sea macho o hembra, la ofrecerá sin defecto delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una ofrenda de paz» o «un sacrificio de ofrendas de comunión». El hebreo dice «un sacrificio de ofrendas de paz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶבַח שְׁלָמִים
  english_pob_choice: a sacrifice of peace offerings
  chosen_spanish: un sacrificio de ofrendas de paz
  alternatives_spanish:
  - una ofrenda de paz
  - un sacrificio de ofrendas de comunión
  lexicon: HALOT
  rationale: זֶבַח conserva el valor de ‘sacrificio’ y שְׁלָמִים nombra el tipo de ofrenda. En español, ‘ofrendas de paz’ mantiene la forma tradicional y refleja bien el campo semántico de plenitud/bienestar sin convertirlo en una paráfrasis más interpretativa.
- source_word: קָרְבָּנ֑וֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su regalo
  - su oblación
  lexicon: HALOT
  rationale: קָרְבָּן designa una ofrenda presentada a Dios. ‘Ofrenda’ es natural en español y conserva el sentido cultual mejor que ‘regalo’.
- source_word: מִן הַבָּקָר
  english_pob_choice: from the herd
  chosen_spanish: del ganado
  alternatives_spanish:
  - de la manada
  - del vacuno
  lexicon: HALOT
  rationale: בָּקָר se refiere a animales de res/ganado vacuno. ‘Del ganado’ es claro y natural en español, y comunica el origen animal de la ofrenda sin sonar técnico en exceso.
- source_word: מַקְרִיב
  english_pob_choice: offers
  chosen_spanish: ofrece
  alternatives_spanish:
  - presenta
  - trae
  lexicon: HALOT
  rationale: En contexto sacrificial, el hifil de קרב significa presentar/ofrecer. ‘Ofrece’ preserva el sentido cultual y suena idiomático en español.
- source_word: אִם זָכָר אִם נְקֵבָה
  english_pob_choice: whether male or female
  chosen_spanish: sea macho o hembra
  alternatives_spanish:
  - si es macho o si es hembra
  - sea varón o mujer
  lexicon: HALOT
  rationale: La construcción correlativa expresa una disyunción inclusiva. En español, ‘sea macho o hembra’ mantiene la formulación breve y el carácter clasificatorio aplicado al animal sacrificial.
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin falta
  lexicon: HALOT
  rationale: En el vocabulario sacrificial, תָּמִים indica un animal íntegro, sin defecto físico. ‘Sin defecto’ es preciso y comprensible; evita cargar el término con una connotación moral que el contexto no exige.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa posición delante de / en presencia de. El nombre divino se vierte ‘Yahvé’ conforme al criterio del proyecto, conservando el nombre propio del pacto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - delante del SEÑOR
  - ante el Señor
  rationale: Se mantiene el nombre propio divino en español, no un sustituto litúrgico. Esto conserva la transparencia con el hebreo y el valor del Tetragrama en el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Clasificación de שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: ‘Ofrendas de paz’ conserva la terminología tradicional y la polisemia hebrea asociada a plenitud, integridad y bienestar. Se evita restringir el sentido a ‘comunión’ sin necesidad textual.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la última revisión auditada: no se requieren cambios textuales mayores. Se conservó la estructura condicional doble, la especificación ‘del ganado’, la alternativa de sexo del animal y la fórmula sacrificial con Yahvé al final.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה en conformidad con el criterio del proyecto.
  - ‘Ofrendas de paz’ conserva la terminología sacrificial estable y no se sustituye por una paráfrasis más interpretativa.
  - ‘Sin defecto’ se usa como equivalente técnico de תָּמִים en contexto cultual.
  - La frase ‘delante de Yahvé’ reproduce de forma natural לִפְנֵי יְהוָה sin perder la idea espacial/relacional del original.
