revisions:
- from: Y sabiendo que es bienaventurado soportar todo dolor por causa de la virtud, ¿no prevalecería sobre las pasiones por causa de la piedad?
  to: Y sabiendo que es bienaventurado soportar todo dolor por amor a la virtud, ¿no prevalecería sobre las pasiones por amor a la piedad?
  rationale: Se conserva toda la estructura y terminología principal del borrador, pero se reemplaza «por causa de» por «por amor a» para expresar de manera más idiomática y precisa el valor motivacional de διὰ + acusativo en este contexto ético-devocional.
