  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo primario: «la justicia de un padre», «no será borrada» y «en lugar de los pecados será plantada». También conserva bien la nota de variante griega. Sin embargo, la frase final en español queda demasiado pasiva y algo opaca sin apoyo contextual; una leve mejora de fluidez puede preservar mejor la imagen hebrea sin alterar el sentido.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «será plantada» suena algo mecánico en este contexto y puede resultar menos natural de lo deseable. «Quedará plantada» mantiene la metáfora agrícola y mejora la legibilidad. Además, hay un error evidente en las decisiones léxicas internas («y como փոխ等»), que no afecta el texto bíblico pero sí indica un pequeño problema editorial.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Justicia» para צִדְקַת es defendible y coherente con el POB inglés; no corresponde cambiarla a «limosna» en el texto principal porque esa es la variante griega documentada en nota.
  issues:
  - severity: medium
    issue: La expresión «será plantada» suena rígida y poco idiomática en español bíblico actual.
    rationale: Aunque refleja de cerca el hebreo, «quedará plantada» comunica mejor el resultado de la imagen verbal sin introducir el «para ti» ausente del hebreo ni abandonar la metáfora de plantar.
  - severity: low
    issue: 'Hay un artefacto editorial en las decisiones léxicas: «y como փոխ等».'
    rationale: No afecta el texto ni las notas publicables, pero conviene corregirlo en el registro editorial porque parece un residuo accidental multilingüe.
