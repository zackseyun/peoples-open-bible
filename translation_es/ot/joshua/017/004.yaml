base_translation:
  language: en
  yaml_path: translation/ot/joshua/017/004.yaml
  text: So they came near before Eleazar the priest[a], and before Joshua son of Nun, and before the leaders, saying, “Yahweh commanded Moses to give us an inheritance among our brothers.” So he gave them, according to the command of Yahweh[c][b], an inheritance among their father's brothers.
  footnotes:
  - marker: a
    text: Or, more literally, 'according to the mouth of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'among our brothers'; the daughters are asking for a share within the inheritance allotted to their male clan members.
    reason: cultural_note
  - marker: c
    text: Hebrew 'among their father's brothers,' that is, within their paternal clan.
    reason: cultural_note
