revisions:
- from: ¿No se extravían los que maquinan el mal? Pero la misericordia[a] y la verdad pertenecen a los que maquinan el bien.
  to: ¿No se extravían los que planean el mal? Pero el amor leal[a] y la fidelidad pertenecen a los que planean el bien.
  rationale: 'Se revisa la pareja clave חֶסֶד וֶאֱמֶת para alinearla con la evidencia léxica y la rationale auditada de la POB inglesa: ''amor leal y fidelidad'' preserva mejor el sentido relacional que ''misericordia y verdad''. También se cambia ''maquinan'' por ''planean'' en ambas colas para mantener el paralelismo del hebreo con un español más natural y sin connotación negativa impropia en ''el bien''.'
  reviewer_model: gpt-5.4
