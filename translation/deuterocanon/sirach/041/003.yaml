translation:
  text: Do not fear the decree of your death[c][b][a]; remember that those before and those after are with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Do not fear from death, your decree/appointed lot''; the Greek parallel reads ''Do not fear the judgment of death.'' The main text reflects the likely combined sense.'
    reason: alternative_reading
  - marker: b
    text: '''Those before and those after are with you'' means that the same fate is shared by earlier and later people alike.'
    reason: lexical_alternative
  - marker: c
    text: Masada preserves this section only fragmentarily; the Cairo Geniza Hebrew here is fuller, while the Greek helps clarify the compressed phrase about death.
    reason: textual_variant
lexical_decisions:
- source_word: אל תפחד
  chosen: Do not fear
  alternatives:
  - Do not be afraid of
  - Do not dread
  lexicon: HALOT
  rationale: The Hebrew prohibition with פחד is naturally rendered as an imperative against fear. 'Do not fear' is concise and preserves the gravity of the admonition. The Greek parallel μὴ εὐλαβοῦ supports an exhortation against fearful apprehension.
- source_word: ממות
  chosen: the decree of your death
  alternatives:
  - death
  - the judgment of death
  - the sentence of death
  lexicon: HALOT
  rationale: The Hebrew text reads 'from death,' but the Greek parallel has κρίμα θανάτου ('judgment/decree of death'), which likely reflects or interprets the Hebrew sense in context. Because the Hebrew witness here has minor mismatch concerns and the Greek is explicitly provided as a translation input, 'the decree of your death' best captures the combined evidence without flattening the line to mere 'death.'
- source_word: חקיך
  chosen: your death
  alternatives:
  - your decree
  - your appointed lot
  - your statute
  lexicon: HALOT
  rationale: The consonantal sense points to חק/חקך, 'statute/decree/appointed portion,' but in context it qualifies death rather than standing independently. The Greek κρίμα suggests an understood judicial or appointed sense. Rendering the phrase as 'the decree of your death' preserves the likely idiom better than a wooden 'your statute.'
- source_word: זכור
  chosen: remember
  alternatives:
  - call to mind
  - keep in mind
  lexicon: HALOT
  rationale: A straightforward imperative. 'Remember' is both formal enough for wisdom literature and natural in modern English.
- source_word: ראשנים ואחרנים
  chosen: those before and those after
  alternatives:
  - the former and the latter
  - earlier and later generations
  - your predecessors and successors
  lexicon: HALOT
  rationale: The Hebrew literally contrasts earlier and later ones. 'Those before and those after' is idiomatic, preserves the temporal contrast, and avoids over-specifying 'generations' where the text leaves the referent broad. The Greek προτέρων σου καὶ ἐσχάτων confirms the temporal pair.
- source_word: עמך
  chosen: are with you
  alternatives:
  - are alongside you
  - share your lot
  lexicon: HALOT
  rationale: The Hebrew preposition עם with pronominal suffix is literally 'with you.' In context it means that mortality is shared by those who came before and those who come after. The simple rendering keeps the metaphorical force without over-interpreting it in the main text.
