lexical_decisions:
- source_word: הַתְּשִׁיעִי
  english_pob_choice: The ninth
  chosen_spanish: El noveno
  alternatives_spanish:
  - El noveno jefe
  - La novena división
  lexicon: HALOT
  rationale: Conservo la elipsis del ordinal al inicio del renglón, como en el hebreo y en la solución inglesa. En español, ‘El noveno’ reproduce la tersura del encabezado sin añadir una función no explicitada por el texto inmediato.
- source_word: לַחֹדֶשׁ הַתְּשִׁיעִי
  english_pob_choice: for the ninth month
  chosen_spanish: para el noveno mes
  alternatives_spanish:
  - para el servicio del noveno mes
  - para el mes noveno del año
  lexicon: HALOT
  rationale: La preposición ל con חֹדֶשׁ indica asignación a un mes dentro de una rotación administrativa. ‘Para el noveno mes’ es natural en español y conserva ese sentido funcional sin sobreexplicar.
- source_word: אֲבִיעֶזֶר
  english_pob_choice: Abiezer
  chosen_spanish: Abiezer
  lexicon: Policy transliteration
  rationale: Nombre propio transliterado de forma directa, conforme a la política del proyecto.
- source_word: הָעַנְּתֹתִי
  english_pob_choice: the Anathothite
  chosen_spanish: el anatotita
  alternatives_spanish:
  - el de Anatot
  - procedente de Anatot
  lexicon: HALOT
  rationale: El adjetivo gentilicio señala procedencia. ‘Anatotita’ es la forma española transparente y concisa para reflejar el gentilicio hebreo sin transformar el dato en una frase explicativa.
- source_word: לְבִנְיָמִינִי
  english_pob_choice: a Benjaminite
  chosen_spanish: un benjaminita
  alternatives_spanish:
  - de Benjamín
  - perteneciente a Benjamín
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que prefirió el valor gentilicio. En español, ‘un benjaminita’ preserva la categoría tribal mejor que una paráfrasis locativa, y evita acumular dos adjetivos con el mismo nombre de origen.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  english_pob_choice: and over his division were
  chosen_spanish: y sobre su división había
  alternatives_spanish:
  - y estaba sobre su división
  - y al mando de su división había
  lexicon: HALOT
  rationale: מַחֲלֻקָה aquí designa una unidad organizada o división militar. ‘Sobre su división’ mantiene la relación de supervisión del hebreo עַל, y ‘había’ permite expresar en español el encabezado nominal de la lista sin forzar un verbo más interpretativo.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - veinte y cuatro mil
  lexicon: HALOT
  rationale: Número cardinal directo y natural en español moderno, equivalente exacto del hebreo.
translation_notes:
  revision_awareness: La versión inglesa fue revisada de ‘from Benjamin’ a ‘a Benjaminite’ para reflejar con mayor precisión el gentilicio de לְבִנְיָמִינִי. La traducción española adopta esa lectura revisada con ‘un benjaminita’, manteniendo la estructura del listado militar y la tersura del encabezado ordinal.
  spanish_consistency_notes:
  - Conservo ‘Yahvé’ solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - Mantengo nombres propios transliterados y gentilicios en forma española estable.
  - Uso un estilo sobrio y administrativo, acorde al género de registro militar del capítulo.
  - No inserto notas al pie porque no hay variantes textuales o alternativas lexémicas que requieran anclaje explícito en este versículo.
