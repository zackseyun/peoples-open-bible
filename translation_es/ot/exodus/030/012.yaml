translation:
  language: es
  text: Cuando hagas un censo de los hijos de Israel[a], según los registrados entre ellos, cada hombre dará a Yahvé un rescate por su vida[b] cuando los cuentes, para que no haya entre ellos ninguna plaga cuando los cuentes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». Lit. «levantes la cabeza de los hijos de Israel», un modismo para hacer un censo.
    reason: lexical_alternative
  - marker: b
    text: O «por sí mismo»; hebreo néfesh suele significar «vida» o «persona», no solo «alma».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: La cláusula introduce la circunstancia prevista de la instrucción legal; en español, «Cuando» comunica mejor ese valor temporal que «Si».
- source_word: תִשָּׂא אֶת רֹאשׁ
  english_pob_choice: take a census
  chosen_spanish: hagas un censo
  alternatives_spanish:
  - levantes la cabeza de
  - cuentes
  lexicon: HALOT
  rationale: Se preserva el sentido idiomático de la frase hebrea en un español natural. «Hagas un censo» expresa el acto administrativo sin ocultar que el hebreo dice literalmente «levantar la cabeza».
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la expresión familiar masculina del hebreo, fiel al texto fuente y coherente con la decisión del POB inglés de conservar la forma «sons of Israel».
- source_word: לִפְקֻדֵיהֶם
  english_pob_choice: according to those numbered among them
  chosen_spanish: cuando los cuentes
  alternatives_spanish:
  - según los registrados entre ellos
  - conforme a su registro
  lexicon: HALOT
  rationale: El sustantivo verbal ligado a פקד se traduce aquí por el acto de enumerar/contar, que es el valor contextual en este marco de censo.
- source_word: וְנָתְנוּ אִישׁ
  english_pob_choice: then each man shall give
  chosen_spanish: cada uno dará
  alternatives_spanish:
  - y dará cada hombre
  - entonces cada varón dará
  lexicon: HALOT
  rationale: «Cada uno» conserva el distributivo de אִישׁ sin sobrecargar el castellano; el futuro simple transmite el valor normativo de la instrucción.
- source_word: כֹּפֶר
  english_pob_choice: a ransom
  chosen_spanish: un rescate
  alternatives_spanish:
  - un precio de rescate
  - una compensación
  lexicon: HALOT
  rationale: En este contexto, כֹּפֶר es un pago compensatorio que aparta el juicio; «rescate» conserva esa fuerza sin introducir tecnicismos innecesarios.
- source_word: נַפְשׁוֹ
  english_pob_choice: for his life
  chosen_spanish: por su vida
  alternatives_spanish:
  - por sí mismo
  - por su alma
  lexicon: HALOT
  rationale: En este contexto, נֶפֶשׁ designa la vida/persona, no una noción doctrinal abstracta de «alma». «Por su vida» es claro y fiel.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a YHWH
  lexicon: HALOT
  rationale: 'Se sigue el estándar editorial del proyecto: el Nombre divino יְהוָה se vierte como «Yahvé» en el texto principal.'
- source_word: בִּפְקֹד אֹתָם
  english_pob_choice: when you number them
  chosen_spanish: cuando los cuentes
  alternatives_spanish:
  - al contarlos
  - cuando los registres
  lexicon: HALOT
  rationale: La repetición del verbo de censo se conserva con «cuentes», manteniendo el paralelo y la claridad en español.
- source_word: נֶגֶף
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - azote
  - golpe
  lexicon: HALOT
  rationale: En el contexto de juicio divino y mortandad, «plaga» es la equivalencia más natural y reconocible en español.
- source_word: וְלֹא יִהְיֶה בָהֶם נֶגֶף
  english_pob_choice: so that there will be no plague among them
  chosen_spanish: para que no haya entre ellos ninguna plaga
  alternatives_spanish:
  - y no habrá entre ellos plaga
  - a fin de que no haya plaga entre ellos
  lexicon: HALOT
  rationale: Se explicita el valor final/resultativo de la cláusula hebrea con «para que», manteniendo el matiz de propósito del pago del rescate.
theological_decisions:
- issue: Representación del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la política del proyecto, se preserva el Nombre en español como «Yahvé», no como una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de נַפְשׁוֹ en la fórmula del rescate
  english_pob_reading: for his life
  chosen_spanish_reading: por su vida
  alternative_spanish_readings:
  - por su alma
  - por sí mismo
  rationale: La expresión funciona aquí dentro de un contexto censal y jurídico; la referencia es a la vida/persona del contado, no a una doctrina posterior sobre el alma.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; do not import doctrinal claims the text does not make'
- issue: Fuerza representativa de las formas masculinas
  english_pob_reading: the sons of Israel ... each man
  chosen_spanish_reading: los hijos de Israel ... cada uno
  alternative_spanish_readings:
  - los israelitas ... cada persona
  - los hijos de Israel ... cada varón
  rationale: Se conserva el género gramatical del hebreo con valor representativo, evitando una neutralización que borre la forma del original sin necesidad contextual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del pasaje auditado en inglés; la presente versión sigue la misma línea de equivalencia óptima y conserva las decisiones léxicas y teológicas principales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantiene la repetición de «cuando los cuentes» para reflejar el paralelismo del hebreo.
  - «Rescate» se eligió para כֹּפֶר por su fuerza compensatoria en este contexto legal.
  - «Por su vida» evita imponer el sentido doctrinal de «alma» donde el hebreo habla de la vida/persona.
  - Las notas al pie mantienen la tensión entre el sentido idiomático y la literalidad del hebreo sin sobretraducir.
