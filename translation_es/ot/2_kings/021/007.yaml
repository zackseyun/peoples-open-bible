base_translation:
  language: en
  yaml_path: translation/ot/2_kings/021/007.yaml
  text: And he set the carved image of Asherah that he had made in the house of which Yahweh had said to David and to Solomon his son[a], “In this house and in Jerusalem, which I have chosen out of all the tribes of Israel, I will put my name forever.”
  footnotes:
