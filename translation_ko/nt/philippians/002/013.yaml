id: PHP.2.13
reference: Philippians 2:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀θεὸς γάρ ἐστιν ὁ ἐνεργῶν ἐν ὑμῖν καὶ τὸ θέλειν καὶ τὸ ἐνεργεῖν ὑπὲρ τῆς εὐδοκίας.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/013.yaml
  text: For God is the one working in you both to will and to work for his good pleasure.
translation:
  language: ko
  text: 이는 여러분 안에서 의지하는 것[a]과 행하는 것을 자신의 기뻐하시는 뜻을 위하여[b] 일하시는 분이 하나님이시기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「의지함과 행함 둘 다를」. 헬라어 관사 부정사 τὸ θέλειν은 의지의 행위를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그분의 기뻐하시는 뜻을 따라」.
    reason: lexical_alternative
lexical_decisions:
- source_word: γάρ
  english_pob_choice: For
  chosen_korean: 이는 ~ 때문입니다
  alternatives_korean:
  - 왜냐하면 ~ 이기 때문
  lexicon: BDAG
  rationale: 앞 권면에 대한 설명적 근거를 표시한다. 한국어로는 「이는 ~ 때문입니다」가 합쇼체에 자연스럽다.
- source_word: ὁ ἐνεργῶν
  english_pob_choice: the one working
  chosen_korean: 일하시는 분
  alternatives_korean:
  - 역사하시는 분
  - 활동하시는 분
  lexicon: BDAG
  rationale: 관사 + 현재 분사는 명사화. 「일하시는 분」이 진행적 동사력을 보존하면서 한국어로 자연스럽다.
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_korean: 여러분 안에서
  alternatives_korean:
  - 여러분 가운데서
  lexicon: BDAG
  rationale: 개인적·공동체적 양가성을 보존하기 위해 「여러분 안에서」로 옮긴다.
- source_word: τὸ θέλειν
  english_pob_choice: to will
  chosen_korean: 의지하는 것
  alternatives_korean:
  - 의지함
  - 원함
  - 뜻함
  lexicon: BDAG
  rationale: 관사 부정사는 의지 행위를 가리킨다. 「의지하는 것」이 그 의도적 무게를 보존하고 뒤따르는 부정사와 평행을 이룬다.
- source_word: τὸ ἐνεργεῖν
  english_pob_choice: to work
  chosen_korean: 행하는 것
  alternatives_korean:
  - 행함
  - 일함
  lexicon: BDAG
  rationale: ἐνεργέω 어휘 연결을 위해 「행하다」를 사용하고, 「의지하는 것」과 「행하는 것」의 간결한 평행을 보존한다.
- source_word: ὑπὲρ τῆς εὐδοκίας
  english_pob_choice: for his good pleasure
  chosen_korean: 자신의 기뻐하시는 뜻을 위하여
  alternatives_korean:
  - 기뻐하시는 뜻을 위하여
  - 그분의 기뻐하시는 뜻을 따라
  lexicon: BDAG
  rationale: ὑπέρ + 속격은 목적·이익을 가리킨다. 「기뻐하시는 뜻」으로 εὐδοκία의 의미를 「목적」보다 가까이 담는다. 「자신의」는 주어 하나님으로부터 자연스럽게 보충된다.
theological_decisions:
- issue: 신적 행위와 인간의 의지·행함
  chosen_reading: 「의지하는 것과 행하는 것」을 모두 보존하며, 어느 한쪽도 약화시키지 않는다
  alternative_readings:
  - 원함과 행함
  - 욕망과 능력
  rationale: 본 절은 하나님께서 신자 안에서 의지의 차원과 행동의 차원 양쪽 모두에서 일하심을 제시한다. 번역은 그 긴장을 보존하며 좁은 교파적 해소를 도입하지 않는다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
