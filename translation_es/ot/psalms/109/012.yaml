translation:
  language: es
  text: No haya quien le extienda bondad[a], ni quien muestre favor a sus hijos sin padre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le continúe misericordia»; el modismo hebreo habla literalmente de «prolongar» o «arrastrar» la bondad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus huérfanos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹשֵׁךְ
  english_pob_choice: extend
  chosen_spanish: extienda
  alternatives_spanish:
  - prolongue
  - siga mostrando
  - atraiga
  lexicon: HALOT
  rationale: El participio de משׁךְ literalmente implica ‘tirar/dar prolongadamente’, pero con חָסֶד forma un modismo de ‘extender/continuar’ bondad o misericordia. ‘Extienda’ conserva esa idea de prolongación en español sin volverla un calco pesado.
- source_word: חָסֶד
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - misericordia
  - amor leal
  - lealtad amorosa
  lexicon: HALOT
  rationale: En este contexto imprecatorio se trata de la benevolencia que alguien podría mostrar al afligido. ‘Bondad’ comunica bien la acción benévola y evita imponer de entrada una formulación demasiado técnica o litúrgica, aunque ‘misericordia’ también sería posible.
- source_word: חוֹנֵן
  english_pob_choice: show favor
  chosen_spanish: muestre favor
  alternatives_spanish:
  - sea gracioso
  - tenga misericordia
  - conceda gracia
  lexicon: HALOT
  rationale: חנן expresa otorgar favor o gracia. ‘Mostrar favor’ es natural en español moderno y mantiene el sentido interpersonal sin cargarlo innecesariamente con un registro teológico fijo.
- source_word: יְתוֹמָיו
  english_pob_choice: his fatherless children
  chosen_spanish: sus hijos huérfanos
  alternatives_spanish:
  - sus huérfanos
  - sus hijos sin padre
  lexicon: HALOT
  rationale: El hebreo puede referirse a huérfanos, especialmente en clave social de hijos sin padre. ‘Sus hijos huérfanos’ refleja la relación posesiva y el matiz de hijos dejados sin protección paterna. En nota se preserva la alternativa ‘huérfanos’.
- source_word: אַל יְהִי
  english_pob_choice: Let there be no one
  chosen_spanish: No haya quien
  alternatives_spanish:
  - Que no haya nadie que
  - No exista quien
  lexicon: HALOT
  rationale: La construcción jussiva negativa expresa un ruego/imprecación. ‘No haya quien’ mantiene el tono volitivo en español bíblico actual y evita transformar el verso en una simple predicción.
theological_decisions:
- issue: Conservar el tono imprecatorio sin suavizarlo en una afirmación futura
  english_pob_reading: 'Retain the direct curse-like petition: ''Let there be no one...'''
  chosen_spanish_reading: No haya quien...
  alternative_spanish_readings:
  - Habrá nadie que...
  - No existirá quien...
  rationale: El hebreo usa formas volitivas negativas; en español, el subjuntivo con negación expresa mejor el deseo/petición de que esto no ocurra. Así se conserva la fuerza retórica del salmo sin rebajarlo a mera predicción.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Evitar una traducción excesivamente técnica de חָסֶד en un contexto humano
  english_pob_reading: kindness
  chosen_spanish_reading: bondad
  alternative_spanish_readings:
  - misericordia
  - amor leal
  rationale: Aunque חָסֶד puede tener resonancias pactales, aquí el contexto habla de la compasión o benevolencia que una persona pudiera brindar a otra. ‘Bondad’ mantiene la amplitud semántica sin forzar un término más teológico de lo que el contexto exige.
  doctrine_reference: HALOT; poética hebrea contextual
- issue: Mantener la referencia a los hijos del sujeto como dependientes y vulnerables
  english_pob_reading: his fatherless children
  chosen_spanish_reading: sus hijos huérfanos
  alternative_spanish_readings:
  - sus huérfanos
  - sus hijos sin padre
  rationale: La frase hebrea no solo nombra huérfanos en abstracto, sino a sus hijos en condición de desamparo paterno. La versión española conserva esa relación para que no se pierda el alcance social y afectivo del verso.
  doctrine_reference: HALOT; contexto de salmos imprecatorios
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no hacía falta modificar la solución inglesa. En español se mantuvo igualmente la misma línea interpretativa: subjuntivo volitivo para la imprecación, ‘extienda’ para el modismo de מֹשֵׁךְ, y una opción natural pero precisa para חָסֶד y יְתוֹמָיו.'
  spanish_consistency_notes:
  - Se preservó el tono de ruego negativo con «No haya quien», evitando futuro indicativo.
  - Se usó «bondad» para חָסֶד por claridad en español, dejando en nota la alternativa de «continuar bondad» para reflejar el hebreo idiomático.
  - «Sus hijos huérfanos» mantiene el referente posesivo y la vulnerabilidad implícita del hebreo.
  - No se introdujo terminología eclesiástica ajena al contexto del salmo.
