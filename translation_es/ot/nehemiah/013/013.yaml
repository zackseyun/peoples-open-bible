revisions:
- from: Y puse sobre los almacenes a Selesmías el sacerdote, a Zadoq el escriba, y a Pedaías, de entre los levitas, y junto a ellos[a] a Janán hijo de Zacar, hijo de Matanías; porque fueron considerados fieles[b], y a ellos correspondía repartir a sus hermanos[c].
  to: Y puse a cargo de los almacenes a Selemías el sacerdote, a Sadoc el escriba, y a Pedaías de entre los levitas, y a su lado[a] a Hanán hijo de Zacur, hijo de Matanías; porque fueron considerados fieles[b], y a ellos les correspondía repartir a sus hermanos[c].
  rationale: Se ajustó la locución principal a un español más natural ('puse a cargo de los almacenes') sin perder el sentido de nombramiento administrativo del hebreo. También se normalizaron varios nombres propios a formas castellanas más legibles y más cercanas al hebreo subyacente, especialmente 'Selemías', 'Sadoc', 'Hanán' y 'Zacur'. Se mantuvieron las tres notas porque preservan alternativas léxicas y una precisión importante sobre 'hermanos'.
