translation:
  language: es
  text: Mientras decía estas cosas[a], los escoltas lo ataron y lo arrastraron a la rueda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el instrumento de tortura»; el término griego puede significar literalmente «catapulta», pero aquí se refiere a un artefacto de tortura.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιαῦτα
  english_pob_choice: such things
  chosen_spanish: tales cosas
  alternatives_spanish:
  - cosas como estas
  - tales palabras
  lexicon: LSJ
  rationale: El demostrativo plural apunta al contenido general de su discurso. «Tales cosas» conserva esa amplitud sin volver la frase artificial en español.
- source_word: λέγοντα
  english_pob_choice: as he was saying
  chosen_spanish: Mientras decía
  alternatives_spanish:
  - cuando decía
  - mientras estaba diciendo
  lexicon: LSJ
  rationale: El participio presente indica simultaneidad con la acción de los guardias; «Mientras decía» reproduce bien esa simultaneidad con naturalidad en español.
- source_word: δορυφόροι
  english_pob_choice: bodyguards
  chosen_spanish: los guardias
  alternatives_spanish:
  - los guardias de corps
  - los escoltas
  - los portadores de lanza
  lexicon: LSJ
  rationale: Aunque literalmente alude a «portadores de lanza», en este contexto helenístico designa a los agentes armados que ejecutan la detención. «Guardias» comunica la función sin cargar el texto con una imagen demasiado literal.
- source_word: δήσαντες
  english_pob_choice: bound
  chosen_spanish: lo ataron
  alternatives_spanish:
  - habiéndolo atado
  - lo sujetaron
  lexicon: LSJ
  rationale: El aoristo participial expresa una acción previa al arrastre. «Lo ataron» mantiene la fuerza y la secuencia narrativa en español.
- source_word: εἵλκον
  english_pob_choice: dragged
  chosen_spanish: lo arrastraron
  alternatives_spanish:
  - lo llevaron a rastras
  - lo halaron
  lexicon: LSJ
  rationale: El imperfecto describe una acción violenta y continuada. «Arrastraron» conserva esa violencia mejor que una opción más neutral.
- source_word: καταπέλτην
  english_pob_choice: wheel
  chosen_spanish: la rueda
  alternatives_spanish:
  - la rueda de tortura
  - el catapulta
  - el instrumento de tortura
  lexicon: LSJ
  rationale: En este pasaje de martirio, el término apunta a un artefacto de tortura; «rueda» sigue la identificación contextual preferida por la POB inglesa. Se evita «catapulta», que sería engañoso para el lector moderno.
theological_decisions:
- issue: Identificación de καταπέλτην como instrumento de tortura
  english_pob_reading: wheel
  chosen_spanish_reading: la rueda
  alternative_spanish_readings:
  - la catapulta
  - el instrumento de tortura
  rationale: No hay una disputa doctrinal, pero sí una tensión léxica significativa. La escena trata de tortura martirial; por eso se privilegia la identificación contextual tradicional de «rueda», manteniendo la ambigüedad histórica en nota.
  doctrine_reference: No aplica; decisión lexicográfica e histórica, no doctrinal.
translation_notes:
  revision_awareness: 'El texto fuente griego es breve y la auditoría inglesa permanece estable: no hubo revisiones aplicadas y el control cruzado reporta solo observaciones menores. La redacción española sigue la lectura contextual de καταπέλτην como instrumento de tortura, preservando en nota la alternativa literal.'
  spanish_consistency_notes:
  - Se mantiene «guardias» en plural para δορυφόροι, en línea con su función de ejecutores armados.
  - Se usa el paralelismo temporal «Mientras decía...» para reflejar el participio presente griego.
  - «Rueda» se conserva por consistencia con la identificación contextual ya adoptada en la POB inglesa.
  - Se evita «SEÑOR» u այլ terminología no pertinente; el versículo no contiene léxico divino.
