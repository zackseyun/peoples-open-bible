translation:
  language: es
  text: 'Entonces ella dijo al rey: «Era verdad la noticia que escuché en mi tierra acerca de tus palabras[a] y de tu sabiduría».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acerca de tus asuntos» o «acerca de tus logros». El hebreo דְּבָרֶיךָ también puede referirse de manera más amplia a asuntos relacionados contigo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then she said
  chosen_spanish: Entonces ella dijo
  alternatives_spanish:
  - Y ella dijo
  - Entonces habló
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva la secuencia de manera natural en español. «Dijo» sigue de cerca el verbo simple sin añadir matices ajenos.
- source_word: אֶל־הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey de Israel
  - ante el rey
  lexicon: HALOT
  rationale: La preposición a + artículo se vierte naturalmente como «al rey». No se añade identificación extra que el hebreo aquí no expresa.
- source_word: אֱמֶת הָיָה הַדָּבָר
  english_pob_choice: the report ... was true
  chosen_spanish: Verdad era la noticia
  alternatives_spanish:
  - Era verdad la noticia
  - La noticia era verdadera
  - Fue verdad la noticia
  lexicon: HALOT
  rationale: En español, el predicado nominal puede expresarse con «verdad» para mantener la fuerza de אֱמֶת como sustantivo predicativo. «Noticia» refleja דָּבָר en este contexto discursivo, siguiendo la decisión inglesa de «report» y evitando «palabra» como si fuera un dicho aislado.
- source_word: אֲשֶׁר שָׁמַעְתִּי
  english_pob_choice: that I heard
  chosen_spanish: que escuché
  alternatives_spanish:
  - que oí
  - que había escuchado
  lexicon: HALOT
  rationale: La relativa se expresa de forma idiomática con «que escuché». «Escuché» comunica recepción atenta de la información sin alejarse del valor de שָׁמַעְתִּי.
- source_word: בְּאַרְצִי
  english_pob_choice: in my own land
  chosen_spanish: en mi tierra
  alternatives_spanish:
  - en mi país
  - en mi propia tierra
  lexicon: HALOT
  rationale: «Tierra» conserva mejor el sentido de אֶרֶץ que «país» y sigue la naturalidad del español bíblico contemporáneo. Se omite «propia» porque el posesivo ya basta en español.
- source_word: עַל־דְּבָרֶיךָ
  english_pob_choice: about your words
  chosen_spanish: acerca de tus palabras
  alternatives_spanish:
  - acerca de tus asuntos
  - acerca de tus hechos
  - acerca de tus asuntos y de tus logros
  lexicon: HALOT
  rationale: Se mantiene «palabras» para respetar la lectura más cercana del hebreo, aunque el inglés POB documenta la amplitud posible de דְּבָרִים. «Acerca de» evita una calca excesiva y suena natural en español.
- source_word: וְעַל־חָכְמָתֶךָ
  english_pob_choice: and your wisdom
  chosen_spanish: y de tu sabiduría
  alternatives_spanish:
  - y acerca de tu sabiduría
  - y tu sabiduría
  lexicon: HALOT
  rationale: La coordinación con la frase anterior se expresa fluidamente con «y de tu sabiduría». «Sabiduría» traduce directamente חָכְמָה y conserva el énfasis temático del versículo.
theological_decisions:
- issue: Sentido de דָּבָר en contexto
  english_pob_reading: The Hebrew 'your words' can also refer more broadly to matters concerning you.
  chosen_spanish_reading: «tus palabras» en el texto principal, con la posibilidad contextual de entenderlo más ampliamente como asuntos o hechos acerca de él
  alternative_spanish_readings:
  - «tus asuntos»
  - «tus hechos»
  - «tus logros»
  rationale: El versículo habla de lo que la reina oyó sobre Salomón; por eso conviene conservar «palabras» en el texto, pero reconocer que el hebreo permite una extensión semántica hacia asuntos, hechos o logros. Así no se borra la tensión lexical documentada por el POB inglés.
  doctrine_reference: lexical semantics of דָּבָר in context
translation_notes:
  revision_awareness: La versión inglesa más reciente solo ajustó la puntuación final y cerró las comillas; el contenido de fondo se mantiene estable. La presente versión española sigue esa base, pero ajusta la formulación a un español natural y conserva la ambigüedad documentada de דָּבָר en una nota.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverencial de Salomón como «el rey» sin añadir títulos no presentes en el hebreo.
  - «Tierra» se usa consistentemente para אֶרֶץ en este verso.
  - «Sabiduría» se traduce de forma uniforme para חָכְמָה.
  - La nota [a] queda anclada en «rey» para señalar que la ambigüedad léxica afecta a la frase completa «tus palabras».
