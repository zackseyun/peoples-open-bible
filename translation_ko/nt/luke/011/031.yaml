  text: βασίλισσα νότου ἐγερθήσεται ἐν τῇ κρίσει μετὰ τῶν ἀνδρῶν τῆς γενεᾶς ταύτης καὶ κατακρινεῖ αὐτούς· ὅτι ἦλθεν ἐκ τῶν περάτων τῆς γῆς ἀκοῦσαι τὴν σοφίαν Σολομῶνος, καὶ ἰδοὺ πλεῖον Σολομῶνος ὧδε.
base_translation:
  language: en
  yaml_path: translation/nt/luke/011/031.yaml
  text: 'The queen of the South will rise up in the judgment with the men of this generation and will condemn them[a], because she came from the ends of the earth to hear the wisdom of Solomon, and behold[b], something greater than Solomon is here.'
  footnotes:
  - marker: a
    text: 'That is, the figure commonly identified with the Queen of Sheba (see 1 Kings 10:1–13; 2 Chronicles 9:1–12).'
    reason: cross_reference
  - marker: b
    text: 'Or ''one greater than Solomon.'' Greek has a neuter expression, literally ''something greater than Solomon,'' which may emphasize more than a direct personal comparison.'
    reason: lexical_alternative
translation:
  language: ko
  text: 「남방 여왕이 심판 때에 이 세대의 사람들과 함께 일어나 그들을 정죄하리라. 그가 솔로몬의 지혜를 들으려고 땅 끝에서 왔거니와, 보라, 솔로몬보다 더 큰 것이 여기 있다.」
  philosophy: optimal-equivalence
