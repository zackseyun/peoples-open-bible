translation:
  language: es
  text: Y si te responde con paz[a] y se abre ante ti, entonces todo el pueblo que se encuentre en ella será para ti trabajo forzado[b] y te servirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te responde con términos de paz».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «quedará sujeto a tributo laboral para ti». El hebreo מַס puede denotar tributo, leva o trabajo obligatorio; aquí el contexto favorece trabajo forzado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - términos de paz
  - en paz
  lexicon: HALOT
  rationale: שָׁלוֹם expresa aquí la idea de paz o bienestar en un contexto de rendición. «Paz» conserva visible el término hebreo y, en español, deja claro el contraste con la guerra sin añadir una paráfrasis innecesaria.
- source_word: תַּעַנְךָ
  english_pob_choice: answers you
  chosen_spanish: te responde
  alternatives_spanish:
  - te contesta
  - responde a ti
  lexicon: HALOT
  rationale: El verbo ענה tiene el sentido de responder/contestar. «Te responde» reproduce ese valor de manera natural en español y mantiene la personificación de la ciudad sin sobreinterpretarla.
- source_word: וּפָתְחָה לָךְ
  english_pob_choice: opens to you
  chosen_spanish: se abre para ti
  alternatives_spanish:
  - te abre sus puertas
  - se abre a ti
  lexicon: HALOT
  rationale: El hebreo dice simplemente «abrir». «Se abre para ti» conserva la literalidad básica y suena natural en español; «sus puertas» sería una precisión contextual posible, pero no está expresada de forma explícita en el texto.
- source_word: הָעָם הַנִּמְצָא בָהּ
  english_pob_choice: all the people found in it
  chosen_spanish: todo el pueblo que se encuentre en ella
  alternatives_spanish:
  - todo el pueblo que está en ella
  - todo el pueblo presente en ella
  lexicon: HALOT
  rationale: נמצא significa «ser hallado/encontrado». «Que se encuentre en ella» conserva esa forma participial y evita suavizar el hebreo con una construcción más plana.
- source_word: לָמַס
  english_pob_choice: forced labor
  chosen_spanish: como tributación
  alternatives_spanish:
  - como trabajo forzado
  - como tributo
  - como corvea
  lexicon: HALOT
  rationale: מַס puede significar tributo, leva o trabajo impuesto. Dado que el siguiente miembro dice «te servirá», aquí se trata de sujeción laboral o tributaria. «Tributación» intenta preservar esa ambigüedad histórica sin reducirlo solo a dinero ni imponer un tecnicismo poco transparente.
- source_word: וַעֲבָדוּךָ
  english_pob_choice: shall serve you
  chosen_spanish: te servirá
  alternatives_spanish:
  - te servirá como esclava
  - estará a tu servicio
  lexicon: HALOT
  rationale: עבד significa servir/trabajar. «Te servirá» sigue de cerca el hebreo y mantiene la relación de subordinación que completa la cláusula anterior.
theological_decisions:
- issue: Lenguaje de subyugación en una ley de guerra
  english_pob_reading: 'Retain the plain sense of imposed labor service: ''shall become forced labor for you and shall serve you.'''
  chosen_spanish_reading: 'Mantener el sentido directo de sujeción: «será para ti como tributación y te servirá».'
  alternative_spanish_readings:
  - será para ti como trabajo forzado y te servirá
  - será sometido a tributo y te servirá
  rationale: El texto describe las consecuencias de una ciudad que acepta la paz dentro del marco de la guerra antigua. La traducción debe conservar la severidad y la particularidad histórica sin atenuar la fuerza coercitiva de מַס ni especificar más de lo que dice el hebreo.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el audit trail inglés y no presenta revisiones aplicadas en el paquete fuente; se mantiene la lectura óptima equivalente con preservación de la tensión léxica de שָׁלוֹם y מַס.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton ni una referencia directa a él.
  - Se evitó «Cristo» y vocabulario eclesiástico tradicional no pertinente al contexto.
  - «Pueblo» se conservó como equivalente natural de הָעָם sin introducir matices adicionales de etnia o nación que el verso no explicita.
  - La construcción «se abre para ti» mantiene la forma verbal del hebreo sin añadir «puertas» explícitamente.
