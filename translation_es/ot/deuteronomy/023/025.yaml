  yaml_path: translation/ot/deuteronomy/023/025.yaml
  text: When you enter your neighbor’s vineyard[a], you may eat grapes as your appetite desires, until you are satisfied[c][b], but you shall not put any into your container.
  footnotes:
  - marker: a
    text: Or 'If you enter your neighbor’s vineyard.' The Hebrew particle can introduce either a temporal or conditional clause; 'when' is chosen as the smoother fit in this legal context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'according to your soul, your satisfaction,' an idiom meaning according to your desire or appetite, up to being satisfied.
    reason: lexical_alternative
  - marker: c
    text: Or 'vessel.' The Hebrew term is general and does not specify the kind of container.
    reason: lexical_alternative
