translation:
  language: es
  text: En el año cincuenta y segundo de Azarías, rey de Judá, Pécaj hijo de Remalías llegó a ser rey sobre Israel en Samaria, y reinó veinte años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת חֲמִשִּׁים וּ/שְׁתַּיִם שָׁנָה
  english_pob_choice: In the fifty-second year
  chosen_spanish: En el año cincuenta y dos
  alternatives_spanish:
  - En el año cincuenta y segundo
  - En el año cincuenta y dos de reinado
  lexicon: HALOT
  rationale: La fórmula regnal hebrea se expresa de manera natural en español con 'En el año cincuenta y dos'. Mantiene el valor cronológico sin forzar un ordinal innecesario.
- source_word: לַ/עֲזַרְיָה מֶלֶךְ יְהוּדָה
  english_pob_choice: of Azariah king of Judah
  chosen_spanish: de Azarías, rey de Judá
  alternatives_spanish:
  - de Azarías rey de Judá
  - del rey Azarías de Judá
  lexicon: HALOT
  rationale: Se conserva el nombre propio hebreo 'Azarías' y el título real explícito. La coma ayuda a leer en español la relación posesiva de la fórmula cronológica.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - comenzó a reinar
  - se hizo rey
  lexicon: HALOT
  rationale: '''Llegó a ser rey'' refleja la idea de acceso al trono y evita repetir ''reinó'' antes de la duración final.'
- source_word: פֶּקַח בֶּן רְמַלְיָהוּ
  english_pob_choice: Pekah son of Remaliah
  chosen_spanish: Pekah hijo de Remalías
  alternatives_spanish:
  - Pekah, hijo de Remalías
  - Pekaḥ hijo de Remalías
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre propio y el patronímico hebreo con 'hijo de', forma clara y directa en español.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre el Israel
  - en Israel
  lexicon: HALOT
  rationale: '''Sobre Israel'' conserva el valor de dominio/régimen de עַל con מלך sin añadir explicaciones no presentes en el texto.'
- source_word: בְּ/שֹׁמְרֹון
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - en Samaría
  lexicon: HALOT
  rationale: La localización se entiende naturalmente como sede del reinado; 'Samaria' mantiene el topónimo bíblico estándar.
- source_word: עֶשְׂרִים שָׁנָה
  english_pob_choice: twenty years
  chosen_spanish: veinte años
  alternatives_spanish:
  - por veinte años
  - durante veinte años
  lexicon: HALOT
  rationale: Equivalencia directa de la duración del reinado, sin ampliar el sentido más allá del hebreo.
