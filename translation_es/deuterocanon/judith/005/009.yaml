translation:
  language: es
  text: Y les dijo su Dios que salieran de su estancia como extranjeros[a] y fueran a la tierra de Canaán; y se establecieron allí[b], y llegaron a ser muy ricos en oro y plata y en muchísimo ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su residencia como extranjeros». El griego παροικία expresa vivir como forasteros o extranjeros residentes.
    reason: lexical_alternative
  - marker: b
    text: O «y prosperaron mucho en oro y plata y en muchísimo ganado». El griego puede resaltar un gran aumento de posesiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: told
  chosen_spanish: les dijo
  alternatives_spanish:
  - les mandó
  - les ordenó
  lexicon: BDAG
  rationale: El griego introduce infinitivos de acción después del verbo de decir, lo que sugiere una palabra directiva. «Les dijo» conserva ese matiz sin intensificarlo indebidamente a un mandato explícito.
- source_word: παροικίας
  english_pob_choice: sojourning
  chosen_spanish: condición de extranjeros
  alternatives_spanish:
  - estancia como extranjeros
  - peregrinación
  - morada forastera
  lexicon: BDAG
  rationale: παροικία expresa residencia como forasteros o residentes ajenos. En español, «condición de extranjeros» comunica mejor la idea de vivir fuera de su patria con matiz de extranjería que un simple «morada».
- source_word: πορευθῆναι
  english_pob_choice: to go
  chosen_spanish: fueran
  alternatives_spanish:
  - ir
  - viajar
  - partir
  lexicon: BDAG
  rationale: El infinitivo de movimiento se integra naturalmente en español con subjuntivo tras el discurso indirecto. «Fueran» mantiene la dirección del movimiento sin sobrecargar el verso.
- source_word: γῆν Χανάαν
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - Canaán
  - el país de Canaán
  lexicon: BDAG
  rationale: «La tierra de Canaán» refleja fielmente γῆν y conserva el giro bíblico geográfico. «Tierra» resulta más natural que «país» en este contexto.
- source_word: κατῴκησαν
  english_pob_choice: they settled
  chosen_spanish: se establecieron
  alternatives_spanish:
  - habitaron
  - vivieron
  - se asentaron
  lexicon: BDAG
  rationale: El verbo indica fijar residencia. «Se establecieron» comunica mejor el sentido de asentarse de manera estable que un mero «habitaron».
- source_word: ἐπληθύνθησαν
  english_pob_choice: became very wealthy
  chosen_spanish: llegaron a ser muy ricos
  alternatives_spanish:
  - se multiplicaron grandemente
  - aumentaron mucho
  - se hicieron muy prósperos
  lexicon: BDAG
  rationale: El contexto especifica oro, plata y ganado, por lo que el aumento se refiere a posesiones/riqueza más que a población. «Llegaron a ser muy ricos» transmite ese resultado de manera natural y sin reducirlo a mera aritmética.
- source_word: χρυσίῳ καὶ ἀργυρίῳ
  english_pob_choice: in gold and silver
  chosen_spanish: en oro y plata
  alternatives_spanish:
  - con oro y plata
  lexicon: BDAG
  rationale: El dativo puede expresar esfera o respecto. «En oro y plata» conserva ese valor y suena natural en español bíblico.
- source_word: κτήνεσιν πολλοῖς σφόδρα
  english_pob_choice: in very many livestock
  chosen_spanish: en muchísimo ganado
  alternatives_spanish:
  - en muy numerosos animales domésticos
  - en gran cantidad de ganados
  lexicon: BDAG
  rationale: κτήνη se refiere a animales domésticos/ganado en general, no solo a vacas. «Ganado» es la opción española más clara; «muchísimo» refleja el intensificador σφόδρα.
theological_decisions:
- issue: Tipo de speech-act divino en εἶπεν con infinitivos
  english_pob_reading: God instructed them to leave and go to Canaan
  chosen_spanish_reading: Dios les indicó que salieran y fueran a Canaán
  alternative_spanish_readings:
  - Dios les dijo que salieran y fueran a Canaán
  - Dios les mandó salir e ir a Canaán
  rationale: El griego presenta habla divina seguida de infinitivos de acción. En español, «les dijo» o «les indicó» preserva el carácter directivo sin convertirlo necesariamente en una formulación más fuerte de mandato explícito; el texto no obliga a intensificar a «mandó».
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Sentido de incremento en ἐπληθύνθησαν aplicado a bienes
  english_pob_reading: became very wealthy in gold and silver and in very many livestock
  chosen_spanish_reading: llegaron a ser muy ricos en oro y plata y en muchísimo ganado
  alternative_spanish_readings:
  - se multiplicaron grandemente en oro y plata y en muchísimo ganado
  - aumentaron mucho en oro y plata y en muchísimo ganado
  rationale: El incremento se especifica por bienes materiales. Por eso se evita un verbo que sugiera solo crecimiento numérico de personas y se expresa como prosperidad/riqueza, en línea con la lectura contextual del POB inglés revisado.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 5
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del inglés POB que prefirió «became very wealthy» sobre una formulación más literal de aumento general, por el contexto de oro, plata y ganado. En español se reflejó ese ajuste con «llegaron a ser muy ricos», manteniendo la relación semántica con el incremento en bienes.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo exija; aquí el sujeto es «su Dios», así que se traduce con «su Dios» siguiendo el griego θεὸς αὐτῶν.
  - Se preservó el valor de residencia forastera de παροικία sin convertirlo en una simple residencia neutra.
  - «Ganado» traduce κτήνη de forma amplia y natural en español, sin restringirlo a bovinos.
  - 'La puntuación y el orden respetan la estructura coordinada del griego: mandato/salida, asentamiento, prosperidad material.'
