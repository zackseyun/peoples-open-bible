    text: El hebreo cambia de segunda persona en la primera mitad del versículo a tercera persona en la segunda. Algunas traducciones suavizan esto a «tus oídos están abiertos, pero no oyes».
    reason: alternative_reading
  revision_rationale: 'Se hace una reparación menor para mejorar la naturalidad y precisión del español en וְלֹא תִשְׁמֹר: «no prestas atención» comunica mejor el reproche que «no observas» después de «has visto». Se mantiene intacta la decisión clave de conservar el cambio de persona. La nota se ajusta para expresar la alternativa suavizada en español idiomático.'
