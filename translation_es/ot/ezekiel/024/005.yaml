translation:
  language: es
  text: Toma lo mejor del rebaño, y también amontona los huesos debajo de ella[a]; hazla hervir, hiérvela bien[b], y que sus huesos se cuezan en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pon un montón de huesos debajo de ella». El término hebreo traducido «amontona» es raro, y su matiz exacto es incierto, aunque el contexto claramente se refiere a poner huesos debajo de la olla.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «hierve su hervor», una expresión enfática que significa hervirla bien o a fondo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְחַר הַצֹּאן
  english_pob_choice: the choicest of the flock
  chosen_spanish: lo mejor del rebaño
  alternatives_spanish:
  - lo escogido del rebaño
  - lo mejor del ganado menor
  lexicon: HALOT
  rationale: מִבְחַר expresa lo selecto, lo escogido, lo de mejor calidad. En español, «lo mejor del rebaño» comunica bien la idea superlativa y naturalidad idiomática, sin perder el matiz de selección del conjunto.
- source_word: לָקֹוחַ
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma para ti
  - Toma eso
  lexicon: HALOT
  rationale: La forma funciona como mandato en la secuencia profética. «Toma» es la orden breve y directa que mejor refleja la fuerza imperativa en español.
- source_word: וְגַם דּוּר הָעֲצָמִים תַּחְתֶּיהָ
  english_pob_choice: and also pile the bones under it
  chosen_spanish: y también pon una pila de huesos debajo de ella
  alternatives_spanish:
  - y también amontona los huesos debajo de ella
  - y también arréglale un montón de huesos debajo
  lexicon: HALOT
  rationale: דּוּר es raro y el contexto exige una acción de amontonar o disponer material debajo de la olla. «Pon una pila de huesos debajo de ella» conserva la imagen concreta sin forzar una solución demasiado interpretativa.
- source_word: רַתַּח רְתָחֶיהָ
  english_pob_choice: bring it to a boil, boil it well
  chosen_spanish: hazla hervir, hiérvela bien
  alternatives_spanish:
  - llévala a hervor, hiérvela a fondo
  - hazla hervir, hiérvela intensamente
  lexicon: HALOT
  rationale: El hebreo usa una construcción enfática con verbo y cognado. En español, «hazla hervir, hiérvela bien» reproduce la intensificación de manera natural y fiel, sin calcar torpemente la estructura.
- source_word: גַּם בָּשְׁלוּ עֲצָמֶיהָ בְּתוֹכָהּ
  english_pob_choice: and let its bones be cooked in it
  chosen_spanish: y que sus huesos sean cocidos en ella
  alternatives_spanish:
  - y que sus huesos se cuezan en ella
  - y que hasta sus huesos sean cocidos en ella
  lexicon: HALOT
  rationale: בָּשְׁלוּ expresa que los huesos llegan a cocinarse dentro de la olla. «Sean cocidos» mantiene el pasivo y la crudeza de la imagen. Se evita añadir una inferencia de finalidad no explícita en el hebreo.
translation_notes:
  revision_awareness: 'Se siguió el ajuste más reciente del audit trail inglés, que prefirió una cláusula final directa («and let its bones be cooked in it») en vez de una lectura de resultado explícito. En español se reflejó con una pasiva deseativa/mandativa equivalente: «y que sus huesos sean cocidos en ella».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece; este versículo no lo contiene.
  - Se mantiene el referente de la olla con pronombre femenino («ella») para concordar con el objeto implícito del contexto.
  - Se conservó el tono imperativo profético y la imaginería culinaria cruda, sin suavizar el efecto del texto.
