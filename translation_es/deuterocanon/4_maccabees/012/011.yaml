    rationale: La nota [a] combina indebidamente dos alternativas léxicas distintas; la nota [b] comenta el participio «después de recibir», pero la nota inglesa [b] documenta alternativas para τοὺς τῆς εὐσεβείας ἀσκητάς.
  - severity: low
    issue: «La realeza» es menos precisa que «el poder real» o «la dignidad real» para τὴν βασιλείαν.
    rationale: El griego apunta al ejercicio/estatus real otorgado, no a una cualidad abstracta de realeza. «Poder real» se entiende mejor en español común.
  - severity: low
    issue: «Tú, hombre impío» es comprensible, pero ligeramente menos idiomático que «Hombre impío».
    rationale: En español el vocativo exclamativo suele sonar más natural sin el pronombre expreso, especialmente dentro de discurso directo solemne.
