- from: Y sus esclavos lo prendieron y lo sacaron fuera del campamento, al llano; y subieron desde en medio de la llanura hacia la región montañosa, y llegaron a las fuentes que estaban debajo de Betulia.
  to: Y sus esclavos lo prendieron y lo sacaron fuera del campamento, a la llanura, y subieron desde en medio de la llanura hacia la región montañosa, y llegaron a los manantiales que estaban debajo de Betulia.
