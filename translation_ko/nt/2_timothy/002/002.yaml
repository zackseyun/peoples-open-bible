  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἃ ἤκουσας παρ’ ἐμοῦ διὰ πολλῶν μαρτύρων, ταῦτα παράθου πιστοῖς ἀνθρώποις, οἵτινες ἱκανοὶ ἔσονται καὶ ἑτέρους διδάξαι.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/002.yaml
  text: And what you heard from me in the presence of many witnesses, entrust these things to faithful men, who will be competent to teach others also.
translation:
  language: ko
  text: 그리고 많은 증인들이 있는 가운데서 그대가 나에게서 들은 것을, 다른 이들도 가르칠 만한 신실한 사람들에게 맡기십시오.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 παρατίθημι는 안전한 보관을 위해 맡기는 행위를 가리킨다. 1:12, 1:14의 「맡긴 것/맡기신 것」(παραθήκη)과 같은 어근으로, 위탁의 흐름을 이어 간다.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ πολλῶν μαρτύρων
  english_pob_choice: in the presence of many witnesses
  chosen_korean: 많은 증인들이 있는 가운데서
  alternatives_korean:
  - 많은 증인들 앞에서
  - 많은 증인들을 통하여
  lexicon: BDAG
  rationale: διά + 속격은 본 구문에서 「~이 있는 가운데」(공적 자리)의 의미를 가지는 것이 자연스럽다. 「~을 통하여」는 가능성이 낮으므로 본문에 채택하지 않는다.
- source_word: παράθου
  english_pob_choice: entrust
  chosen_korean: 맡기십시오
  alternatives_korean:
  - 위탁하십시오
  - 부탁하십시오
  lexicon: BDAG
  rationale: παρατίθημι는 1:12, 1:14의 παραθήκη(맡긴 것)와 같은 어근. 「맡기다」로 옮겨 위탁 흐름을 일관되게 보존한다.
- source_word: πιστοῖς ἀνθρώποις
  english_pob_choice: faithful men
  chosen_korean: 신실한 사람들
  alternatives_korean:
  - 신실한 자들
  - 충성된 사람들
  lexicon: BDAG
  rationale: πιστός는 「믿을 만한·신실한」을 뜻한다. ἀνθρώποις는 일반적 「사람」이므로 「사람들」로 옮긴다(특정 성별 제한이 본문 의미의 핵심이 아님).
- source_word: ἱκανοὶ ἔσονται
  english_pob_choice: will be competent
  chosen_korean: 가르칠 만한
  alternatives_korean:
  - 능히 가르칠 만한
  - 적합한
  lexicon: BDAG
  rationale: ἱκανός는 「충분한·능한」을 뜻한다. 부정사 「가르칠」과 결합되어 「가르칠 만한」으로 자연스럽게 옮겨진다.
