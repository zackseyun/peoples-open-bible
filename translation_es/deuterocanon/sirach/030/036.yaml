review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente el sentido del griego: un mandato de poner al hombre en actividad productiva con el propósito de evitar la ociosidad. Sin embargo, la nota alternativa no refleja bien la alternativa inglesa ni suena natural en español.'
  spanish_quality_summary: 'El texto principal es claro, natural y fiel: «Ponlo a trabajar, para que no esté ocioso,» funciona bien en español neutro y conserva el propósito de ἵνα μὴ ἀργῇ. La única reparación necesaria es la nota, porque «Mételo en labor» suena forzada y poco idiomática.'
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales están bien alineadas: ἔμβαλε → «Ponlo», εἰς ἐργασίαν → «a trabajar», ἀργῇ → «esté ocioso».'
  issues:
  - severity: medium
    issue: La nota al pie usa «Mételo en labor», una formulación poco natural en español.
    rationale: Aunque intenta reflejar una opción más formal, no corresponde bien al inglés auditado «Set him to labor» y produce un calco extraño. Una alternativa como «Asígnale labor» o «Ponlo a laborar» preserva mejor el matiz formal sin sonar antinatural.
  revised_spanish_text: Ponlo[a] a trabajar, para que no esté ocioso,
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «Asígnale labor, para que no esté ocioso».'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel, claro y natural. Se corrige únicamente la nota alternativa para que refleje mejor la opción formal documentada en inglés sin introducir un calco torpe en español.
