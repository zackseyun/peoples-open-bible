review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo y sigue bien la decisión principal de la POB inglesa: lectura declarativa en el texto principal con alternativa optativa en nota. «Dios se levanta», «sus enemigos», «los que lo odian» y «huyen de delante de él» representan fielmente יָקוּם, אֹיְבָיו, מְשַׂנְאָיו y מִפָּנָיו. La única reserva significativa está en «son dispersados» para יָפוּצוּ: aunque semánticamente cercana, suena más forzada en español y menos idiomática que una forma media/pasiva natural que exprese el resultado de dispersión.'
  spanish_quality_summary: El texto es claro y digno, pero «son dispersados» suena algo mecánico y calcado. En español bíblico-natural y moderno, «se dispersan» o «son esparcidos» funcionan mejor; de esas opciones, «se dispersan» es la más fluida, aunque ligeramente menos pasiva. Dado que el hebreo/inglés enfatizan el resultado sobre los enemigos más que el agente explícito, «quedan dispersados» conserva mejor ese matiz resultativo y suena natural. El resto del verso es bien legible y apropiado para registro eclesial amplio.
  glossary_alignment: 'No hay conflicto con la terminología marco del proyecto: אֱלֹהִים -> «Dios» está bien. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La nota alternativa optativa está bien preservada y anclada correctamente con [a].'
  issues:
  - severity: medium
    issue: «son dispersados» suena poco idiomático en español bíblico natural
    rationale: Aunque comunica el sentido de יָפוּצוּ y refleja la decisión inglesa «are scattered», en español resulta más pesado y calcado. Una formulación resultativa como «quedan dispersados» preserva mejor el efecto sobre los enemigos y mantiene buena naturalidad poética.
  - severity: low
    issue: La nota alternativa repite la misma formulación poco natural
    rationale: Si se corrige la cola principal, conviene ajustar también la alternativa optativa para mantener coherencia estilística y evitar la misma rigidez en «sean dispersados».
  revised_spanish_text: Dios se levanta; sus enemigos quedan dispersados[a], y los que lo odian huyen de delante de él.
  revised_footnotes:
