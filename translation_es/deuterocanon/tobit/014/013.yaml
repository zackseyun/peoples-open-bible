translation:
  language: es
  text: Y envejeció honrosamente, y sepultó a sus suegros honrosamente[a], y heredó sus posesiones y las de Tobit su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «sepultó a sus suegros gloriosamente / espléndidamente»; aquí se toma el sentido como una sepultura honorable, no de ostentación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγήρασεν
  english_pob_choice: grew old
  chosen_spanish: envejeció
  alternatives_spanish:
  - llegó a viejo
  - se hizo viejo
  lexicon: LSJ
  rationale: El aoristo de γηράσκω expresa entrar en la vejez. «Envejeció» mantiene el verbo dinámico y suena natural en español bíblico moderno.
- source_word: ἐντίμως
  english_pob_choice: honorably
  chosen_spanish: honrosamente
  alternatives_spanish:
  - con honor
  - honorablemente
  lexicon: LSJ
  rationale: El adverbio comunica una manera digna y estimada. «Honrosamente» conserva el matiz de honra sin sonar tan redundante con la segunda cláusula.
- source_word: ἔθαψεν
  english_pob_choice: buried
  chosen_spanish: sepultó
  alternatives_spanish:
  - enterró
  - dio sepultura a
  lexicon: LSJ
  rationale: El verbo significa enterrar/sepultar de forma directa. «Sepultó» es claro, digno y más formal que «enterró».
- source_word: τοὺς πενθεροὺς αὐτοῦ
  english_pob_choice: his parents-in-law
  chosen_spanish: sus suegros
  alternatives_spanish:
  - sus padres políticos
  - sus padres de esposa
  lexicon: LSJ
  rationale: El plural griego designa a los suegros; en español, «suegros» es la equivalencia natural y precisa, aunque menos explícita que «padres y madres políticos».
- source_word: ἐνδόξως
  english_pob_choice: with honor / honorably
  chosen_spanish: honrosamente
  alternatives_spanish:
  - gloriosamente
  - con honor
  lexicon: LSJ
  rationale: En contexto funerario el adverbio apunta a un entierro honorable, no necesariamente a una ostentación. «Honrosamente» preserva el campo semántico sin introducir una lectura triunfalista.
- source_word: ἐκληρονόμησεν
  english_pob_choice: inherited
  chosen_spanish: heredó
  alternatives_spanish:
  - recibió en herencia
  - vino a poseer
  lexicon: LSJ
  rationale: El verbo denota recibir por herencia. «Heredó» es la forma breve y exacta en español.
- source_word: τὴν οὐσίαν αὐτῶν
  english_pob_choice: their possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - sus bienes
  - su patrimonio
  lexicon: LSJ
  rationale: οὐσία puede referirse a bienes/fortuna/posesiones. «Posesiones» sigue la decisión inglesa revisada y mantiene amplitud sin tecnicismo jurídico excesivo.
- source_word: καὶ Τωβεὶτ τοῦ πατρὸς αὐτοῦ
  english_pob_choice: and those of Tobit his father
  chosen_spanish: y las de Tobit, su padre
  alternatives_spanish:
  - y las posesiones de Tobit, su padre
  - y el patrimonio de Tobit, su padre
  lexicon: LSJ
  rationale: El griego añade otra herencia, la de Tobit, su padre. «Las de Tobit, su padre» conserva la elipsis del original y evita repetir «posesiones» innecesariamente.
theological_decisions:
- issue: 'Tono del entierro: ¿«gloriosamente» o «honrosamente»?'
  english_pob_reading: The English POB treats ἐνδόξως in the burial clause as an honorable burial rather than a display of glory.
  chosen_spanish_reading: «honrosamente» en ambas cláusulas de honra, manteniendo el sentido de sepultura digna.
  alternative_spanish_readings:
  - gloriosamente
  - con gloria
  rationale: En español, «gloriosamente» puede sugerir exaltación o triunfo más que la dignidad del entierro. Dado el contexto y la nota inglesa, «honrosamente» preserva mejor la intención sin borrar la tensión lexical entre honor y gloria.
  doctrine_reference: Ninguna; decisión lexical-contextual.
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente: se mantuvo la repetición de un adverbio de honra en ambas primeras cláusulas, pero se evitó una traducción que sonara excesivamente triunfalista. También se reflejó la decisión revisada sobre οὐσία como «posesiones», no como «propiedad» o «patrimonio», para conservar naturalidad en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no lo requiere.
  - Se evitó «SEÑOR» y también la transliteración innecesaria, siguiendo el texto fuente.
  - «Suegros» funciona mejor que «padres políticos» en español corriente y mantiene la referencia plural griega.
  - Se preservó la diferencia entre los dos adverbios de honra con una misma zona semántica, sin forzar una distinción artificial.
