translation:
  language: es
  text: Y establecieron a los sacerdotes en sus divisiones y a los levitas en sus divisiones para el servicio de Dios que está en Jerusalén, como está escrito[a] en el Libro de Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conforme a lo escrito en el Libro de Moisés».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִימוּ
  english_pob_choice: they set up
  chosen_spanish: establecieron
  alternatives_spanish:
  - pusieron
  - designaron
  - establecieron en su lugar
  lexicon: HALOT
  rationale: El causativo de קום expresa poner en su debido lugar o asignar; «establecieron» conserva la idea de organización institucional sin perder naturalidad en español.
- source_word: כָהֲנַיָּא
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los sacerdotes
  lexicon: HALOT
  rationale: En español bíblico y litúrgico, «sacerdotes» es el equivalente transparente y fiel para el grupo cultual designado.
- source_word: בִּפְלֻגָּתְהוֹן
  english_pob_choice: in their divisions
  chosen_spanish: en sus divisiones
  alternatives_spanish:
  - por sus divisiones
  - en sus turnos
  - en sus cursos
  lexicon: HALOT
  rationale: El término arameo indica distribución o arreglo por partes asignadas; «divisiones» conserva la organización interna del cuerpo sacerdotal.
- source_word: וְלֵוָיֵא
  english_pob_choice: and the Levites
  chosen_spanish: y a los levitas
  alternatives_spanish:
  - y los levitas
  - y a los levitas
  lexicon: HALOT
  rationale: «Levitas» es el equivalente establecido para los asistentes cultuales de la tribu de Leví; se mantiene la referencia personal del objeto directo en español.
- source_word: בְּמַחְלְקָתְהוֹן
  english_pob_choice: in their divisions
  chosen_spanish: en sus divisiones
  alternatives_spanish:
  - en sus grupos
  - por sus divisiones
  - en sus clases
  lexicon: HALOT
  rationale: Aunque el inglés POB había considerado otras opciones, el ajuste de revisión muestra que el hebreo/arameo pide la misma idea organizativa para ambos grupos; por eso se unifica con «divisiones».
- source_word: עַל עֲבִידַת אֱלָהָא
  english_pob_choice: for the service of God
  chosen_spanish: para el servicio de Dios
  alternatives_spanish:
  - para la obra de Dios
  - sobre el servicio de Dios
  lexicon: HALOT
  rationale: La preposición y el sustantivo señalan finalidad o asignación a una tarea; «servicio de Dios» reproduce bien el ámbito cultual sin sobretraducir.
- source_word: דִּי בִירוּשְׁלֶם
  english_pob_choice: that is in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que estaba en Jerusalén
  - en Jerusalén
  lexicon: HALOT
  rationale: Se conserva el relativo arameo con una frase natural en español para vincular explícitamente el servicio con el templo de Jerusalén.
- source_word: כִּכְתָב
  english_pob_choice: as it is written
  chosen_spanish: conforme a lo escrito
  alternatives_spanish:
  - como está escrito
  - según lo escrito
  lexicon: HALOT
  rationale: La fórmula expresa conformidad con una autoridad escrita; «conforme a lo escrito» es fiel y sobrio en español.
- source_word: סְפַר מֹשֶׁה
  english_pob_choice: the Book of Moses
  chosen_spanish: el Libro de Moisés
  alternatives_spanish:
  - el libro de Moisés
  - el rollo de Moisés
  lexicon: HALOT
  rationale: «Libro de Moisés» reproduce la expresión tradicional de un escrito mosaico sin imponer una glosa doctrinal adicional.
theological_decisions:
- issue: Conformidad cultual con autoridad escrita mosaica
  english_pob_reading: The priests and Levites were arranged for temple service in accordance with Mosaic written instruction.
  chosen_spanish_reading: Los sacerdotes y levitas fueron organizados para el servicio del templo conforme a lo escrito en el Libro de Moisés.
  alternative_spanish_readings:
  - Los sacerdotes y levitas fueron puestos en orden por costumbre, sin énfasis normativo.
  - Los sacerdotes y levitas fueron organizados según la Escritura mosaica.
  rationale: La cláusula final fundamenta la organización en un texto escrito; la traducción mantiene esa relación normativa sin ampliar el pasaje hacia afirmaciones posteriores sobre canon o autoría.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés al usar la misma noción de «divisiones» para sacerdotes y levitas, evitando una diferencia semántica no sustentada por el hebreo/arameo. No se añadieron notas al pie porque no hay marcadores anclados en el texto final y se prefirió una solución uniforme y publicable.
  spanish_consistency_notes:
  - Se usa «Dios» y no una máscara nominal, porque el arameo dice explícitamente אֱלָהָא.
  - Se prefiere «Libro de Moisés» como equivalente sobrio de סְפַר מֹשֶׁה.
  - La construcción «que está en Jerusalén» preserva el vínculo local del servicio sin forzar una paráfrasis.
  - Se mantiene «servicio» para עֲבִידַת por su valor cultual, más que «obra», que sería menos específico.
