translation:
  language: es
  text: ¿Acaso el que plantó[a] el oído no oirá? ¿Acaso el que formó[b] el ojo no verá?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'implantó el oído'. El hebreo usa literalmente el verbo 'plantar', con una imagen creadora muy vívida.
    reason: lexical_alternative
  - marker: b
    text: O 'moldeó' o 'dio forma al ojo'. El verbo hebreo de la cláusula final también puede significar 'mirar' u 'observar', pero aquí apunta a la capacidad de ver.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹטַע
  english_pob_choice: planted
  chosen_spanish: plantó
  alternatives_spanish:
  - implantó
  - hizo
  lexicon: HALOT
  rationale: 'Conserva la metáfora viva de la imagen creadora: no solo ''hizo'' el oído, sino que lo ''plantó''. En español, ''plantó'' mantiene el vigor figurado y la relación con la imagen agrícola del hebreo.'
- source_word: אֹזֶן
  english_pob_choice: ear
  chosen_spanish: oído
  alternatives_spanish:
  - oreja
  - oído
  lexicon: HALOT
  rationale: '''Oído'' comunica el órgano/sentido con naturalidad en español y encaja mejor en el paralelismo con ''ojo''. ''Oreja'' sería más corporal, pero aquí el énfasis es funcional y poético.'
- source_word: יִשְׁמָע
  english_pob_choice: hear
  chosen_spanish: oirá
  alternatives_spanish:
  - escuchará
  lexicon: HALOT
  rationale: El verbo apunta a la facultad de oír, no principalmente a obedecer o prestar atención. 'Oirá' preserva la pregunta retórica y la correspondencia con el oído creado.
- source_word: יֹצֵר
  english_pob_choice: formed
  chosen_spanish: formó
  alternatives_spanish:
  - moldeó
  - hizo
  lexicon: HALOT
  rationale: '''Formó'' transmite la idea de dar forma con intención creadora, conservando la imagen artesanal del participio hebreo mejor que una expresión más general.'
- source_word: עַיִן
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - vista
  lexicon: HALOT
  rationale: '''Ojo'' es el equivalente directo del órgano físico y mantiene el paralelismo con ''oído''. ''Vista'' sería más abstracto y debilitaría la imagen concreta.'
- source_word: יַבִּיט
  english_pob_choice: see
  chosen_spanish: verá
  alternatives_spanish:
  - mirará
  - observará
  lexicon: HALOT
  rationale: Aunque el verbo puede implicar mirar u observar, aquí la idea es la capacidad de visión correspondiente al ojo creado. 'Verá' suena natural en español y conserva el sentido del argumento retórico.
- source_word: הֲ...הֲלֹא
  english_pob_choice: does he not ... ?
  chosen_spanish: no ... ?
  alternatives_spanish:
  - acaso no ... ?
  - ¿no es verdad que ...?
  lexicon: HALOT
  rationale: La partícula interrogativa con negación introduce preguntas retóricas que esperan respuesta afirmativa. En español, la estructura '¿... no ...?' conserva esa fuerza sin sobreexplicar.
- source_word: אִם
  english_pob_choice: He who
  chosen_spanish: El que
  alternatives_spanish:
  - Aquel que
  - Si
  lexicon: HALOT
  rationale: Aquí אִם no funciona como condición simple, sino como enlace del segundo miembro del paralelismo. 'El que' reproduce la estructura hebrea de forma clara y natural en español.
theological_decisions:
- issue: Antropomorfismo aplicado a la percepción divina
  english_pob_reading: Mantener el lenguaje antropomórfico retórico como argumento desde el Creador hacia la criatura, sin explicarlo en exceso.
  chosen_spanish_reading: Mantener la imagen concreta del oído y el ojo, y las preguntas retóricas que atribuyen a Dios la capacidad correspondiente de oír y ver.
  alternative_spanish_readings:
  - 'Parafrasear: ''el que nos dio oído y ojo, también percibe'''
  - 'Explicar explícitamente: ''el Creador de los sentidos humanos también los conoce'''
  rationale: 'El salmo presenta una argumentación poética: quien creó los órganos de percepción no carece de esa misma capacidad en sentido superior. La traducción conserva la tensión teológica y la imaginería corporal en vez de abstraerla.'
  doctrine_reference: Preservar la tensión teológica y la primacía del texto original sobre una paráfrasis explicativa.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y mantiene sin resolver la imagen antropomórfica del texto, conforme a la revisión más reciente sin cambios. Se conserva el paralelismo oído/ojo y la fuerza de las preguntas retóricas.
  spanish_consistency_notes:
  - Se usó 'plantó' y 'formó' para reflejar los verbos hebreos con imagen creadora, en consonancia con la terminología POB y sin suavizar la metáfora.
  - Se prefirió 'oído'/'ojo' por claridad poética y paralelismo; no se introdujo terminología eclesiástica tradicional ajena al texto.
  - Las preguntas retóricas se mantuvieron con puntuación española estándar para conservar el tono del hebreo.
