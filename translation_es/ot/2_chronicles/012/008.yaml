    changes_summary: 'Changed ''slaves'' to ''servants'' for better lexical/register fit with עֲבָדִים here and to align naturally with the repeated ''service'' language in the verse; otherwise retained the structure and content. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque serán sus esclavos[a], para que conozcan mi servicio y el servicio de los reinos de los países.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi adoración ... y el servicio de los reinos de los países». El hebreo para «servicio» puede incluir servicio cultual o adoración, además de labor o servidumbre.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  lexicon: HALOT
  rationale: Introduce la razón de lo dicho antes; en español, «porque» expresa con naturalidad el valor explicativo de la partícula.
- source_word: יִהְיוּ ל֖/וֹ לַ/עֲבָדִ֑ים
  english_pob_choice: they will become his slaves
  chosen_spanish: serán sus esclavos
  alternatives_spanish:
  - serán sus servidores
  - llegarán a ser sus esclavos
  lexicon: HALOT
  rationale: La construcción expresa llegar a estar en condición de servidumbre/subyugación. «Esclavos» conserva la fuerza léxica y política del hebreo y del criterio POB para el término.
- source_word: וְ/יֵדְעוּ֙
  english_pob_choice: so that they may know
  chosen_spanish: para que conozcan
  alternatives_spanish:
  - y conocerán
  - y aprendan
  lexicon: HALOT
  rationale: 'En este contexto el waw + imperfecto expresa resultado o propósito: su sometimiento tiene la función de hacerles conocer/comprender.'
- source_word: עֲב֣וֹדָתִ֔/י
  english_pob_choice: my service
  chosen_spanish: mi servicio
  alternatives_spanish:
  - mi adoración
  - mi culto
  lexicon: HALOT
  rationale: עֲבוֹדָה puede abarcar servicio, labor y servicio cultual. «Servicio» preserva la amplitud semántica y la contraposición con el servicio a los reinos.
- source_word: וַ/עֲבוֹדַ֖ת מַמְלְכ֥וֹת הָ/אֲרָצֽוֹת
  english_pob_choice: and the service of the kingdoms of the lands
  chosen_spanish: y el servicio de los reinos de las tierras
  alternatives_spanish:
  - y el servicio de los reinos de los países
  - y la servidumbre de los reinos de las tierras
  lexicon: HALOT
  rationale: Mantiene el paralelismo con «mi servicio» y conserva el sentido amplio de עֲבוֹדָה sin reducirlo sólo a adoración o sólo a trabajo. «Tierras» reproduce el plural del hebreo con transparencia.
theological_decisions:
- issue: Cómo reflejar עֲבוֹדָה en el contraste entre el servicio a Yahvé y el servicio a reinos extranjeros
  english_pob_reading: service
  chosen_spanish_reading: servicio
  alternative_spanish_readings:
  - adoración
  - servicio religioso
  - culto
  rationale: El versículo contrasta dos lealtades y dos formas de sometimiento. «Servicio» deja oír tanto la dimensión religiosa como la política del hebreo, sin estrechar indebidamente el término a liturgia.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisiones del inglés POB: la lectura final restauró «slaves» frente a «servants», y esa fuerza de servidumbre/subyugación se conservó en español con «esclavos». También se mantuvo el doble uso de עֲבוֹדָה como «servicio», no como una reducción exclusiva a «adoración».'
  spanish_consistency_notes:
  - Se conserva «Yahvé» sólo cuando el texto fuente lo exige explícitamente; este versículo no contiene el nombre divino, por lo que no se introduce.
  - «Esclavos» se usa por la fuerza léxica del hebreo y por coherencia con el POB en términos de servidumbre.
  - «Servicio» se repite en ambos miembros del paralelismo para reflejar la repetición semántica del hebreo.
  - «Tierras» mantiene el plural de הָאֲרָצוֹת y evita universalizar indebidamente la expresión.
