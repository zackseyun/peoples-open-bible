  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: τὰ ἅγια como bienes/realidades sagradas, διηρπάζοντο como despojo continuo, y ὡς μὴ ὄντος κληρονόμου λυτρουμένου como comparación irreal con «heredero» explícito y fuerza redentora preservada. Sin embargo, la colocación de las notas está invertida respecto del modelo auditado: la nota léxica sobre «las cosas santas» debe anclarse allí, y la nota sobre la alternativa del participio debe anclarse en la expresión verbal final.'
  spanish_quality_summary: El español es claro y digno. No obstante, «eran despojadas» suena algo más débil y menos vívido que el sentido de saqueo/plunder del griego; «eran saqueadas» comunica mejor el matiz de expolio sacrílego continuo. Además, la nota a actualmente repite el texto principal en vez de dar de verdad la alternativa más directa del participio.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Heredero» y «redimiera» están bien elegidos. «Las cosas santas» es aceptable, con nota alternativa «las cosas sagradas» / «el santuario».
  issues:
  - severity: medium
    issue: Anclaje de notas al pie incorrecto
    rationale: La nota léxica sobre τὰ ἅγια debe ir en «Las cosas santas», mientras que la nota sobre la alternativa de λυτρουμένου debe ir en la cláusula final. El orden actual [a][b] sobre «despojadas» no corresponde al contenido de las notas ni al audit trail inglés.
  - severity: medium
    issue: La nota alternativa del participio no presenta claramente la alternativa
    rationale: 'La nota a dice «O: como si no hubiera heredero que las redimiera», que es esencialmente el mismo texto principal. La evidencia inglesa documenta la alternativa más directa: «como si no hubiera heredero redimiéndolas» o equivalente.'
  - severity: low
    issue: «Eran despojadas» atenúa el matiz de plunder
    rationale: Aunque no es incorrecto, «saqueadas» representa mejor el carácter violento y sacrílego de διηρπάζοντο y suena natural en español bíblico moderno.
  revised_spanish_text: Las cosas santas[a] de Dios eran saqueadas, como si no hubiera heredero que las redimiera[b].
  revised_footnotes:
