review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo: Noemí habla a sus dos nueras, mantiene los dos imperativos, preserva ''la casa de su madre'', usa ''Yahvé'' para יְהוָה y refleja la bendición comparativa final. Sin embargo, ''les haga misericordia'' y ''la han hecho con los muertos'' no representan con suficiente naturalidad ni precisión el modismo hebreo חֶסֶד ... עשה con עִם en este contexto; el sentido es ''mostrar/hacer bondad'' hacia alguien, no ''hacer misericordia con''.'
  spanish_quality_summary: 'El español es generalmente claro, pero presenta dos giros poco naturales o impropios para lectura bíblica fluida: ''hacer misericordia'' suena forzado en español moderno, y ''la han hecho con los muertos'' resulta torpe. Además, la nota [a] introduce una alternativa incorrecta (''suegras''), que no es una posibilidad léxica válida para כַּלָּה aquí.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> ''Yahvé'' correcto; כַּלֹּתֶיהָ -> ''nueras'' correcto. El punto débil es חֶסֶד: en español ''bondad'' o ''bondad leal'' encaja mejor que ''misericordia'' para este contexto interpersonal y para sostener la construcción verbal natural ''mostrar/tener bondad''.'
  issues:
  - severity: high
    issue: חֶסֶד traducido como 'misericordia' en la línea principal
    rationale: Aunque 'misericordia' puede solaparse semánticamente, aquí Naomi bendice a sus nueras por la lealtad/bondad que mostraron a los difuntos y a ella. 'Bondad' comunica mejor el uso interpersonal de hesed y permite un español natural.
  - severity: high
    issue: '''como ustedes la han hecho con los muertos y conmigo'' es un giro antinatural'
    rationale: En español no se dice naturalmente 'hacer misericordia/bondad con'. El hebreo עשה + חֶסֶד requiere una formulación idiomática como 'han mostrado bondad a los muertos y a mí' o 'han tenido bondad con...'.
  - severity: medium
    issue: La nota [a] propone 'suegras' como alternativa
    rationale: '''Suegras'' no corresponde al hebreo כַּלָּה ni al contexto; introduce confusión léxica innecesaria. Si se conserva una nota, debe contener solo alternativas semánticamente plausibles.'
  revised_spanish_text: 'Entonces Noemí dijo a sus dos nueras: «Vayan, vuélvanse, cada una a la casa de su madre. Que Yahvé les muestre bondad[a], como ustedes la han mostrado a los muertos y a mí».'
  revised_footnotes:
