    rationale: 'La única nota en el English POB dice: «Or ''was stopped,'' ''was restrained,'' or ''was checked.''» Eso corresponde a נֶעֱצָרָה, no a אֹהֶל מוֹעֵד.'
  - severity: medium
    issue: 'El contenido de la nota al pie («También: “en la tienda del encuentro”») no refleja la alternativa preservada por el expediente auditado.'
    rationale: Además de cambiar el anclaje, debe cambiarse el contenido para documentar alternativas de «se detuvo» como «fue detenida», «fue contenida» o «fue frenada», en línea con el hebreo y el POB inglés.
  revised_spanish_text: Entonces Aarón regresó a Moisés, a la entrada de la tienda de reunión, y la plaga se detuvo[a].
  revised_footnotes:
