revisions:
- from: Vengan[a], volvamos a Yahvé, porque él nos despedazó, pero nos sanará; nos hirió[b], pero nos vendará.
  to: Vamos[a], volvamos a Yahvé, porque él nos despedazó[b], pero nos sanará; nos hirió, pero nos vendará.
  rationale: Se ajusta la exhortación inicial a «Vamos» para reflejar mejor el uso idiomático e inclusivo de לְכוּ וְנָשׁוּבָה en español natural. También se reubica la nota cultural al verbo «nos despedazó», que es el término hebreo al que realmente corresponde la imaginería de una fiera desgarrando a su presa. Se conserva el resto del verso porque es fiel al hebreo, al audit trail inglés y a la terminología del proyecto.
