revisions:
- from: 'Y dijo a ellas[a]: «Veo que el rostro de su padre no está hacia mí[b] como antes[c], pero el Dios de mi padre ha estado conmigo».'
  to: 'Y les dijo: «Veo que el rostro de su padre no está hacia mí[a] como antes[b], pero el Dios de mi padre ha estado conmigo».'
  rationale: Se corrige la apertura a un español más natural y fiel al uso receptor («les dijo») sin perder el referente original. Se eliminó una nota gramatical innecesaria y se conservaron solo las notas que preservan alternativas significativas del hebreo y del audit trail inglés.
