    issue: «descubrirá» es semánticamente ambiguo en español para יַחְשֹׂף
    rationale: Aunque puede significar ‘revelar’, en uso común también significa ‘hallar’. En este contexto de enemistad y vergüenza pública, «pondrá al descubierto» o «expondrá» transmite mejor la acción de hacer pública la afrenta.
  - severity: low
