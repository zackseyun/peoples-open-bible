review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue fielmente el sentido del hebreo y del POB inglés: persona genérica, consumo de carne del sacrificio de paz consagrado a Yahvé, impureza ritual sobre el infractor y la sanción formulaica de ser cortado de su pueblo. También preserva correctamente la ambigüedad de וְנִכְרְתָה. Sin embargo, hay dos detalles a reparar: el anclaje de la nota [a] no corresponde a una verdadera alternativa que deba ir en nota, y «será cortada» suena menos idiomático en español jurídico-bíblico que «será excluida de entre su pueblo» en texto principal con nota que preserve la fórmula literal «será cortada».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en naturalidad y manejo de notas. «Estando su impureza sobre él» ya comunica bien la imagen hebrea y no necesita nota aclaratoria adicional. En cambio, «esa persona será cortada» resulta algo rígido y poco natural en español moderno; conviene una redacción principal más legible, manteniendo la literalidad/ambigüedad en nota.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: «Yahvé», «persona», «carne», y el lenguaje ritual de «impureza». «Ofrendas de paz» es aceptable según el rastro léxico auditado. La fórmula penal debe seguir preservando la ambigüedad teológica; esto se puede lograr mejor poniendo «será excluida» en texto y la alternativa literal «será cortada» en nota.'
  issues:
  - severity: medium
    issue: La nota [a] no añade una alternativa sustantiva distinta
    rationale: «Estando su impureza sobre él» y «mientras su impureza está sobre él» son variantes estilísticas casi equivalentes. El inglés POB no lleva nota aquí, y la instrucción pide conservar alternativas significativas, no crear notas innecesarias.
  - severity: medium
    issue: «Será cortada» es poco idiomático en español actual
    rationale: Aunque literal, en español suena mecánico y menos claro. Dado que la ambigüedad del hebreo puede mantenerse también con «será excluida» en el texto principal y una nota con «será cortada», mejora la legibilidad sin perder la decisión teológica documentada.
  revised_spanish_text: Pero la persona que coma carne del sacrificio de las ofrendas de paz que pertenece a Yahvé, estando su impureza sobre él, esa persona será excluida de entre su pueblo[a].
  revised_footnotes:
  - marker: a
    text: O «será cortada de entre su pueblo». La fórmula hebrea puede indicar remoción del pueblo; el texto no precisa aquí si se trata de expulsión o de muerte.
    reason: alternative_reading
  revision_rationale: Se elimina una nota innecesaria sobre una simple variante estilística y se mejora la naturalidad del español en la fórmula penal, manteniendo en nota la literalidad y la ambigüedad jurídica/theológica del hebreo según el audit trail inglés.
