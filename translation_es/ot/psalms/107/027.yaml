translation:
  language: es
  text: Se tambalean y vacilan como un borracho, y toda su sabiduría[a] es tragada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su pericia práctica»; en este contexto, la «sabiduría» se refiere a su destreza o habilidad de navegación, que les falla.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָח֣וֹגּוּ
  english_pob_choice: they reel
  chosen_spanish: Reelgan
  alternatives_spanish:
  - Tornan en círculos
  - vacilan
  - se tambalean
  lexicon: HALOT
  rationale: El verbo describe movimiento inestable o vacilante; «reelgan» conserva la imagen dinámica y poética sin forzar una explicación interpretativa.
- source_word: וְ֭יָנוּעוּ
  english_pob_choice: and stagger
  chosen_spanish: y tambalean
  alternatives_spanish:
  - y vacilan
  - y se bambolean
  - y titubean
  lexicon: HALOT
  rationale: El segundo verbo refuerza la inestabilidad física; «tambalean» mantiene el paralelismo con el primer verbo y suena natural en español.
- source_word: כַּשִּׁכּוֹר
  english_pob_choice: like a drunkard
  chosen_spanish: como borracho
  alternatives_spanish:
  - como un ebrio
  - como un hombre borracho
  - como alguien ebrio
  lexicon: HALOT
  rationale: El hebreo usa un singular comparativo; «como borracho» conserva la concisión y la imagen de desorientación por embriaguez.
- source_word: חָכְמָתָם
  english_pob_choice: their wisdom
  chosen_spanish: su sabiduría
  alternatives_spanish:
  - su habilidad
  - su pericia
  - su conocimiento práctico
  lexicon: HALOT
  rationale: Aunque el contexto marítimo apunta a pericia práctica, la revisión inglesa mantuvo «wisdom» para reflejar más directamente חָכְמָה. En español, «sabiduría» preserva esa correspondencia, y el contexto permite entender la sabiduría como capacidad práctica fallida.
- source_word: תִּתְבַּלָּע
  english_pob_choice: is swallowed up
  chosen_spanish: es tragada
  alternatives_spanish:
  - es engullida
  - es absorbida
  - se ve devorada
  lexicon: HALOT
  rationale: El verbo expresa ser tragado o engullido; «es tragada» conserva la metáfora concreta y el pasivo del hebreo, sin suavizarla hacia una idea más abstracta.
translation_notes:
  revision_awareness: El texto inglés de POB fue revisado desde «skill» a «wisdom» para reflejar más directamente חָכְמָה. Esta versión española sigue esa revisión, pero conserva la posibilidad contextual de entender «sabiduría» como competencia práctica marítima en la nota.
  spanish_consistency_notes:
  - 'Se conservó el paralelismo verbal con dos formas breves: «Reelgan» / «tambalean».'
  - Se evitó sustituir «sabiduría» por una glosa más explícita como «pericia», para no perder la correspondencia directa con חָכְמָה.
  - «Borracho» se eligió como equivalente natural y breve del singular comparativo hebreo.
  - La metáfora de «tragada» mantiene la concreción del hebreo y deja abierta la lectura de colapso de la capacidad humana.
