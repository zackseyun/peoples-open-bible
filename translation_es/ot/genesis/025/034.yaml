translation:
  language: es
  text: Y Jacob dio a Esaú pan y guiso de lentejas[a], y comió y bebió, y se levantó y se fue[b]. Así Esaú menospreció la primogenitura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estofado de lentejas».
    reason: lexical_alternative
  - marker: b
    text: O «mostró desprecio por la primogenitura».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - dio a
  lexicon: HALOT
  rationale: El verbo básico de dar expresa la acción narrativa simple sin añadir matices no presentes en el hebreo. "Dio a" mantiene la direccionalidad con Esaú como receptor.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: '"Pan" es el equivalente concreto y natural en español para לֶחֶם en este contexto, donde se contrasta con un guiso específico. "Alimento" sería demasiado general.'
- source_word: נְזִיד עֲדָשִׁים
  english_pob_choice: lentil stew
  chosen_spanish: guiso de lentejas
  alternatives_spanish:
  - estofado de lentejas
  - potaje de lentejas
  - guiso de lentejas
  lexicon: HALOT
  rationale: La construcción designa un plato cocido hecho de lentejas. "Guiso de lentejas" es natural en español y conserva el carácter concreto del alimento. Se evita una paráfrasis más libre como "sopa" porque no está exigida por el hebreo.
- source_word: וַיֹּאכַל וַיֵּשְׁתְּ וַיָּקָם וַיֵּלַךְ
  english_pob_choice: and he ate and drank and rose and went away
  chosen_spanish: y comió y bebió, y se levantó y se fue
  alternatives_spanish:
  - y comió y bebió, y se levantó y se marchó
  - y comió y bebió, y se levantó y salió
  lexicon: HALOT
  rationale: La sucesión breve de verbos wayyiqtol se conserva con una cadena coordinada en español para mantener el efecto rápido y acumulativo. "Se fue" es idiomático y suficientemente cercano a la salida implícita.
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: '"Se levantó" transmite el movimiento físico con claridad y naturalidad en español. Aunque "rose" en inglés es algo más formal, aquí la naturalidad narrativa del español favorece esta forma común.'
- source_word: וַיֵּלַךְ
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  - se alejó
  lexicon: HALOT
  rationale: El hebreo indica salida/partida; "se fue" es la opción más directa e idiomática en español. Se evita sobrerinterpretar la dirección o el tono de la partida.
- source_word: וַיִּבֶז
  english_pob_choice: despised
  chosen_spanish: menospreció
  alternatives_spanish:
  - despreció
  - desestimó
  - trató con desprecio
  lexicon: HALOT
  rationale: '"Menospreció" comunica el desprecio o la devaluación del derecho de primogenitura sin sonar tan arcaico como "despreció" en algunos registros. Conserva la valoración moral explícita del hebreo.'
- source_word: הַבְּכֹרָה
  english_pob_choice: the birthright
  chosen_spanish: la primogenitura
  alternatives_spanish:
  - el derecho de primogénito
  - el derecho de la primogenitura
  - los derechos del primogénito
  lexicon: HALOT
  rationale: '"Primogenitura" es el término jurídico-bíblico natural en español para el privilegio del primogénito. Mantiene la fuerza legal y familiar del sustantivo hebreo.'
theological_decisions:
- issue: Evaluación moral final sobre la actitud de Esaú
  english_pob_reading: Thus Esau despised the birthright
  chosen_spanish_reading: Así Esaú menospreció la primogenitura
  alternative_spanish_readings:
  - Así Esaú despreció la primogenitura
  - De este modo Esaú mostró desprecio por la primogenitura
  rationale: El hebreo cierra con una afirmación evaluativa resumida, no solo descriptiva. "Así" preserva el valor inferencial de la conclusión; "menospreció" mantiene la carga de desprecio sin expandirla más allá del texto.
  doctrine_reference: Translation philosophy §3, §6
- issue: Referencia a la primogenitura como derecho/patrimonio familiar
  english_pob_reading: the birthright
  chosen_spanish_reading: la primogenitura
  alternative_spanish_readings:
  - el derecho de primogenitura
  - el derecho del primogénito
  rationale: En este contexto narrativo-jurídico, "primogenitura" comunica tanto el estatus como el conjunto de derechos asociados al hijo mayor. Evita añadir explicaciones que el texto no desarrolla aquí.
  doctrine_reference: HALOT; uso bíblico de la primogenitura en narrativas patriarcales
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «So» a «Thus» por un registro ligeramente más formal; la traducción española refleja esa conclusión inferencial con «Así» sin perder la tersura narrativa. También se mantuvo la secuencia verbal breve del hebreo y el valor evaluativo final.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para el tetragrámaton en el proyecto, pero este versículo no contiene el nombre divino.
  - '"Primogenitura" se usa de forma consistente para הַבְּכֹרָה en contextos legales y narrativos.'
  - Se conserva el tono narrativo rápido mediante una cadena de coordinaciones con «y».
