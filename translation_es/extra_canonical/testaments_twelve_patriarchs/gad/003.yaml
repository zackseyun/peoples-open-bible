base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/003.yaml
  text: '1[a]. And now hear a word of truth: listen in order to practice righteousness and every law of the Most High, and do not be led astray, my children, by the spirit of hatred, because it is evil in all the deeds of men. 2. For whatever the one who hates may do, it is abominable. If someone does the law of the Lord[b], the hater does not praise him. If someone fears the Lord and desires what is right, the hater does not love him. 3. He reproaches the truth, envies the one who prospers, embraces slander, and loves arrogance, because hatred blinds his soul, as it did mine when I looked at Joseph.'
  footnotes:
  - marker: a
    text: Or 'hear the true word'; the Greek opening can be taken either as an indefinite or more definite exhortational formula.
    reason: lexical_alternative
  - marker: b
    text: '''The one who prospers'' may also be rendered ''the one who succeeds'' or possibly ''the one who acts rightly,'' but the immediate context of envy favors successful action.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: testaments_draft_v1
    prompt_sha256: 12cfa82996373314381ab60ee5c942b67f9865533a392a516a0e08e41a529a46
