id: 2MA.3.28
reference: 2 Maccabees 3:28
source:
  edition: lxx-swete-1909
  text: τὸν ἄρτι μετὰ πολλῆς παραδρομῆς καὶ πάσης δορυφορίας εἰς τὸ προειρημένον εἰσελθόντα γαζοφυλάκιον, ἔφερον ἀβοήθητον αὐτὸν τοῖς ὅλοις καθεστῶτα, φανερῶς τὴν δυναστείαν ἐπεγνωκότα.
  language: Greek
  pages:
  - 692
  confidence: high
  validation: agree
translation:
  text: The man who had just entered the treasury with much rushing about and all his guard[a], they carried out helpless, being completely incapacitated[c][b], having plainly recognized the sovereign power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with much pomp' for 'with great rushing about'; the Greek can suggest bustling display accompanying his entrance.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the previously mentioned treasury.'
    reason: lexical_alternative
  - marker: c
    text: The Greek phrase rendered 'being utterly incapacitated' is idiomatic and difficult; it conveys that he was completely brought low.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν ἄρτι ... εἰσελθόντα
  chosen: The man who had just entered
  alternatives:
  - him who had just entered
  - the one who had just gone in
  lexicon: LSJ
  rationale: The article with participle functions substantivally. English supplies 'the man' naturally in context, referring to Heliodorus. 'Just entered' reflects ἄρτι plus the aorist participle.
- source_word: μετὰ πολλῆς παραδρομῆς
  chosen: with great rushing about
  alternatives:
  - with much pomp
  - with great commotion
  - with much running about
  lexicon: LSJ
  rationale: παραδρομή literally suggests running about or bustle. In context it describes the hurried, showy movement accompanying his entrance. 'Rushing about' preserves the physical sense better than the more interpretive 'pomp,' while still sounding natural.
- source_word: πάσης δορυφορίας
  chosen: all his guard
  alternatives:
  - all his bodyguard
  - all his escort
  lexicon: LSJ
  rationale: δορυφορία denotes a bodyguard or armed escort. 'Guard' is concise and idiomatic; 'his' is supplied from context since the escort belongs to the entrant.
- source_word: τὸ προειρημένον ... γαζοφυλάκιον
  chosen: the treasury
  alternatives:
  - the aforementioned treasury chamber
  - the previously mentioned treasury
  lexicon: LSJ
  rationale: γαζοφυλάκιον is 'treasury' or treasury chamber. προειρημένον means 'previously mentioned'; English can omit this adjective without loss because the referent is already clear in context, but the rationale is documented here. The main noun is preserved.
- source_word: ἔφερον
  chosen: they carried out
  alternatives:
  - they were carrying
  - they carried
  lexicon: LSJ
  rationale: Imperfect may be rendered simply in English narrative as a past tense. 'Carried out' is required by context, since he is removed from the treasury after being struck down.
- source_word: ἀβοήθητον
  chosen: helpless
  alternatives:
  - without help
  - unaided
  lexicon: LSJ
  rationale: The adjective means without help or helpless. 'Helpless' captures both his condition and the irony of his former armed entrance.
- source_word: τοῖς ὅλοις καθεστῶτα
  chosen: being utterly incapacitated
  alternatives:
  - completely overcome
  - reduced in every respect
  - in a state altogether
  lexicon: LSJ
  rationale: This phrase is difficult and idiomatic. καθεστῶτα indicates his resulting condition; τοῖς ὅλοις intensifies it as total or complete. 'Utterly incapacitated' conveys that he was wholly brought low, matching the narrative sense better than a wooden rendering.
- source_word: φανερῶς
  chosen: plainly
  alternatives:
  - clearly
  - manifestly
  lexicon: LSJ
  rationale: Adverb indicating that what follows was evident to observers.
- source_word: τὴν δυναστείαν
  chosen: the sovereign power
  alternatives:
  - the dominion
  - the might
  - the power
  lexicon: LSJ
  rationale: δυναστεία can denote lordship, dominion, or ruling power. In this context it refers to the overwhelming divine power displayed in defense of the temple. 'Sovereign power' preserves both strength and rulership nuance.
- source_word: ἐπεγνωκότα
  chosen: having come to recognize
  alternatives:
  - having fully known
  - having acknowledged
  lexicon: LSJ
  rationale: The perfective force of ἐπιγινώσκω suggests recognition or full realization resulting from the event. 'Having come to recognize' fits the experiential sense.
