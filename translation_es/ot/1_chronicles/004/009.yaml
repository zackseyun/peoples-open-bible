translation:
  language: es
  text: 'Ahora bien, Jabez era más honrado que sus hermanos[a], y su madre le puso por nombre Jabez, diciendo[b]: «Porque lo di a luz con dolor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre Jabez suena en hebreo como una expresión relacionada con dolor o pena en la explicación de su madre.
    reason: lexical_alternative
  - marker: b
    text: O «Porque lo di a luz con pena». El hebreo עֹצֶב puede denotar dolor, pena o dificultad.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... was
  chosen_spanish: Y ... fue
  alternatives_spanish:
  - Ahora ... fue
  - Y aconteció que ...
  lexicon: HALOT
  rationale: El hebreo introduce la cláusula narrativa con waw-consecutiva sobre היה. En español, «Y ... fue» conserva la continuidad narrativa sin recurrir a una fórmula arcaica innecesaria como «aconteció que».
- source_word: יַעְבֵּץ
  english_pob_choice: Jabez
  chosen_spanish: Jabez
  alternatives_spanish:
  - Yabes
  - Yabéz
  lexicon: HALOT
  rationale: Se conserva el nombre propio en transliteración estable, como en el texto base en inglés, para mantener la identificación y la relación con el juego de palabras del versículo.
- source_word: נִכְבָּד
  english_pob_choice: more honored
  chosen_spanish: más honrado
  alternatives_spanish:
  - más honorable
  - tenido en honor
  lexicon: HALOT
  rationale: El sentido comparativo de כבד en este contexto es de honra/valor social. «Más honrado» reproduce bien la comparación con sus hermanos y suena natural en español bíblico moderno.
- source_word: מֵאֶחָיו
  english_pob_choice: than his brothers
  chosen_spanish: que sus hermanos
  alternatives_spanish:
  - que sus parientes
  - que sus hermanos y hermanas
  lexicon: HALOT
  rationale: La preposición comparativa hebrea exige en español una construcción con «que». «Sus hermanos» sigue el plural masculino del hebreo y el contexto genealógico cercano.
- source_word: וְאִמּוֹ
  english_pob_choice: and his mother
  chosen_spanish: y su madre
  alternatives_spanish:
  - y la madre de él
  lexicon: HALOT
  rationale: Construcción posesiva directa y transparente; «su madre» es la forma natural en español y conserva el referente inmediato.
- source_word: קָרְאָה שְׁמוֹ
  english_pob_choice: called his name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - le puso por nombre
  - lo nombró
  lexicon: HALOT
  rationale: Se preserva la fórmula hebrea de nombramiento. «Llamó su nombre» es algo formal, pero mantiene visible la estructura del original y el valor narrativo de la designación.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Equivale a la introducción de la explicación materna. «Diciendo» conserva el encadenamiento formal sin añadir matices no presentes.
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Marca la causalidad explícita de la explicación del nombre. «Porque» es la equivalencia más directa y clara en español.
- source_word: יָלַדְתִּי
  english_pob_choice: I bore him
  chosen_spanish: lo di a luz
  alternatives_spanish:
  - lo parí
  - lo alumbré
  lexicon: HALOT
  rationale: El hebreo usa el verbo simple de parir/dar a luz. En español, «lo di a luz» comunica bien el acto de nacimiento y evita un giro demasiado literal que sonaría forzado.
- source_word: בְּעֹצֶב
  english_pob_choice: in pain
  chosen_spanish: con dolor
  alternatives_spanish:
  - en dolor
  - con pena
  - en pena
  lexicon: HALOT
  rationale: עֹצֶב puede abarcar dolor, pena o aflicción. En este contexto de parto y juego de palabras con el nombre, «con dolor» conserva la referencia concreta y una posible resonancia afectiva, sin cerrar del todo la amplitud semántica del hebreo.
translation_notes:
  revision_awareness: Se mantiene alta concordancia con el texto fuente y con la auditoría inglesa; no hubo revisiones aplicadas en el registro base, por lo que la propuesta sigue de cerca la lectura establecida. Se ajustó la sintaxis al español para conservar la comparación, la fórmula de nombramiento y el juego de palabras final sin introducir paráfrasis.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el tetragrámaton ni una cita de κύριος.
  - Se conserva «Jabez» como transliteración fija del nombre propio.
  - Se mantiene el paralelismo de la explicación causal con «Porque».
  - «Con dolor» refleja el valor principal del sustantivo עֹצֶב sin eliminar la posible amplitud de dolor/pena, que queda indicada en la nota.
