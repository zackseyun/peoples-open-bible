review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue de cerca el audit trail inglés: conserva «en el Padre ... en mí», distingue «digo» de «hablo», mantiene «de mí mismo» para ἀπ’ ἐμαυτοῦ y representa αὐτοῦ con «sus». Sin embargo, la colocación de las notas no coincide con el inglés auditado: la nota sobre «permanece/abides» debe anclarse en μένων, no en «de mí mismo», y la nota sobre «de mí mismo/on my own» debe anclarse en ἀπ’ ἐμαυτοῦ. Además, la nota b actual menciona innecesariamente el inglés «abide», cuando la nota debe explicar la alternativa española.'
  spanish_quality_summary: El texto es natural, claro y digno en español eclesial contemporáneo. «¿No crees que yo estoy en el Padre y el Padre está en mí?» suena bien y preserva la formulación joánica. «Las palabras que yo les digo no las hablo de mí mismo» es comprensible, aunque algo marcado; sigue siendo aceptable por fidelidad formal. La puntuación con comas en la cláusula del Padre es correcta.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Padre», «palabras», «permanece», «obras» y la sintaxis de inhabitación mutua están alineadas con las decisiones léxicas y teológicas documentadas. La única desalineación real está en el manejo de notas y su explicación.
  issues:
  - severity: medium
    issue: Los marcadores de notas [a] y [b] están invertidos respecto de las decisiones auditadas.
    rationale: En el POB inglés, la nota b corresponde a μένων ('abides/remains') y la nota a corresponde a ἀπ’ ἐμαυτοῦ ('from myself/on my own'). En español, [a] aparece en «de mí mismo» y [b] en «permanece», pero el contenido de las notas quedó cruzado con el orden inglés documentado. Debe corregirse para mantener trazabilidad del audit trail.
  - severity: low
    issue: La nota sobre «permanece» introduce una referencia metatraductológica al inglés («abide»).
    rationale: Las notas españolas deben servir al lector/revisor hispanohablante y explicar alternativas relevantes en español. Mencionar cómo se expresó en inglés no añade claridad al texto bíblico español.
  revised_spanish_text: ¿No crees que yo estoy en el Padre y el Padre está en mí? Las palabras que yo les digo no las hablo de mí mismo[a], sino que el Padre, que permanece en mí[b], hace sus obras.
  revised_footnotes:
  - marker: a
    text: 'O: «por mi propia iniciativa» o «por mi propia autoridad». «De mí mismo» conserva la amplitud del griego, que puede abarcar origen, iniciativa o autoridad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que habita en mí». «Permanece» mantiene la duratividad de μένω con español natural y claro.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural, pero se corrigen las notas para alinearlas con los puntos léxicos correctos del griego y con el audit trail inglés, además de eliminar una explicación innecesariamente centrada en el inglés.
