theological_decisions:
- issue: Identity of the plural subject in 'so that they may remember... and tremble'
  chosen_reading: The plural refers to the ones who revealed hidden things to humanity, i.e., the offending heavenly beings in context.
  alternative_readings:
  - The plural refers more generally to all who hear the oath
  - The syntax is compressed and could shift subjects mid-verse
  rationale: The final relative clause most naturally identifies the group affected by the hidden name and oath. In the immediate context of named angels and illicit revelation, this reading best preserves the judicial-apocalyptic logic of the passage.
  doctrine_reference: Preserve theological tension rather than resolve it; where syntax is compressed, render one reading in the main text and document alternatives.
