translation:
  language: es
  text: Un necio[a] sufrirá dolores a la vista de una palabra, como una mujer que da a luz a la vista de un bebé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente «desde la presencia/rostro de una palabra ... como desde la presencia/rostro de un bebé». El modismo expresa ocasión o causa: el necio es tomado por el dolor por una palabra, así como la mujer que da a luz por el bebé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ προσώπου
  english_pob_choice: at the sight of
  chosen_spanish: por causa de
  alternatives_spanish:
  - ante la presencia de
  - a la vista de
  - por la presencia de
  lexicon: LSJ
  rationale: El giro griego literalmente dice 'desde el rostro/presencia de', pero en este dicho expresa ocasión o causa. En español, 'por causa de' conserva mejor esa fuerza causal sin volver la frase artificial. 'A la vista de' era posible, pero suena más visual que idiomático en este contexto.
- source_word: λόγου
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un dicho
  - un asunto
  - un reporte
  lexicon: LSJ
  rationale: λόγος puede significar 'palabra', 'asunto' o 'mensaje'. Aquí el contexto sapiencial y la construcción singular favorecen una palabra concreta que desencadena la reacción del necio. 'Una palabra' es directo y suficientemente amplio.
- source_word: ὠδινήσει
  english_pob_choice: will suffer pangs
  chosen_spanish: sufrirá dolores
  alternatives_spanish:
  - estará de parto
  - se retorcerá de dolor
  - sentirá angustia
  lexicon: LSJ
  rationale: El verbo remite a dolores de parto o a dolor intenso. 'Sufrirá dolores' preserva la imagen del padecimiento sin forzar el español hacia una literalidad extraña como 'estará de parto' aplicada al necio.
- source_word: μωρός
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un tonto
  - un insensato
  - un hombre necio
  lexicon: LSJ
  rationale: μωρός es el término sapiencial para la persona moralmente insensata. 'Necio' es un equivalente bíblico claro en español, más preciso y digno que 'tonto'.
- source_word: βρέφους
  english_pob_choice: a baby
  chosen_spanish: un bebé
  alternatives_spanish:
  - un niño pequeño
  - un infante
  - un recién nacido
  lexicon: LSJ
  rationale: βρέφος designa a un niño muy pequeño, especialmente un lactante o recién nacido. 'Bebé' es la equivalencia natural en español moderno y mantiene la comparación doméstica del proverbio.
- source_word: ἡ τίκτουσα
  english_pob_choice: a woman in labor
  chosen_spanish: una mujer que da a luz
  alternatives_spanish:
  - la que está de parto
  - la parturienta
  - una mujer en labor de parto
  lexicon: LSJ
  rationale: La expresión es literalmente 'la que da a luz'. En español, 'una mujer que da a luz' conserva el acto de parto sin introducir una formulación demasiado técnica o arcaica. Además armoniza bien con la comparación del segundo miembro.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Sirácides 19:10 y toma como apoyo el audit trail inglés, que revisó la antigua formulación causal ('because of') para reflejar con mayor literalidad el valor de ἀπὸ προσώπου. En español se mantuvo esa relación causal con 'por causa de' en ambas cláusulas, evitando una traducción meramente mecánica de la versión inglesa.
  spanish_consistency_notes:
  - Se usó 'necio' para μωρός, en línea con el léxico sapiencial bíblico y con la necesidad de un registro natural en español.
  - '''Una palabra'' conserva el singular del griego y la concisión proverbial.'
  - La comparación de parto se expresó con 'una mujer que da a luz' para mantener claridad y fidelidad sin tecnicismos.
  - Se prefirió 'bebé' para βρέφος por naturalidad contemporánea y porque el contexto de nacimiento lo hace inequívoco.
