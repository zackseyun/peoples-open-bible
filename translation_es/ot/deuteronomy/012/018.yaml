translation:
  language: es
  text: 'Sino que lo comerás delante de Yahvé tu Dios, en el lugar que Yahvé tu Dios escoja: tú, tu hijo, tu hija, tu esclavo, tu esclava y el levita que está dentro de tus puertas[a]; y te alegrarás delante de Yahvé tu Dios en todo aquello a que pongas mano[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «dentro de tus puertas», un hebraísmo para referirse a los que viven en tu comunidad local.'
    reason: cultural_note
  - marker: b
    text: 'Literalmente: «en todo el envío de tu mano»; es decir, en todo lo que haces o emprendes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: Instead
  chosen_spanish: Sino que
  alternatives_spanish:
  - Pero solo
  - Más bien
  lexicon: HALOT
  rationale: La expresión introduce aquí la alternativa permitida frente a la prohibición previa. En español, «sino que» conserva bien el valor restrictivo y contrastivo sin sonar forzado.
- source_word: לִפְנֵי יְהוָה אֱלֹהֶיךָ
  english_pob_choice: before Yahweh your God
  chosen_spanish: delante de Yahvé tu Dios
  alternatives_spanish:
  - en presencia de Yahvé tu Dios
  lexicon: HALOT
  rationale: «Delante de» reproduce con naturalidad el valor espacial/presencial de לִפְנֵי y mantiene el tono bíblico sin perder claridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio POB de transliterar el Nombre divino, no sustituirlo por un título. «Yahvé» es la forma estándar en español para esta transliteración y conserva la referencia al nombre propio del pacto.
- source_word: תֹּאכְלֶנּוּ
  english_pob_choice: you shall eat it
  chosen_spanish: lo comerás
  alternatives_spanish:
  - lo comerás tú
  - deberás comerlo
  lexicon: HALOT
  rationale: El imperfecto con sufijo funciona aquí como instrucción directa. En español, el futuro imperativo «lo comerás» comunica la fuerza obligatoria de manera natural y fiel al mandato singular.
- source_word: בַּמָּקוֹם אֲשֶׁר יִבְחַר
  english_pob_choice: in the place that Yahweh your God will choose
  chosen_spanish: en el lugar que Yahvé tu Dios escoja
  alternatives_spanish:
  - en el lugar que Yahvé tu Dios elegirá
  - en el sitio que Yahvé tu Dios escoja
  lexicon: HALOT
  rationale: «Escoja» refleja bien el valor prospectivo del imperfecto y encaja con el lenguaje de Deuteronomio sobre el lugar central de culto.
- source_word: בּוֹ
  english_pob_choice: in
  alternatives_spanish:
  - allí
  - en él
  lexicon: HALOT
  rationale: El pronombre se integra naturalmente en la frase anterior en español («en el lugar que... escoja»), por lo que no se necesita una repetición explícita en la línea principal.
- source_word: אַתָּה וּבִנְךָ וּבִתֶּךָ
  english_pob_choice: you and your son and your daughter
  chosen_spanish: tú, tu hijo, tu hija
  alternatives_spanish:
  - tú y tu hijo y tu hija
  - tú, tu hijo y tu hija
  lexicon: HALOT
  rationale: Se conserva la lista de miembros del hogar en singular y de forma explícita. La puntuación ayuda a que el español suene fluido sin perder la secuencia del hebreo.
- source_word: וְעַבְדְּךָ וַאֲמָתֶךָ
  english_pob_choice: your male servant and your female servant
  chosen_spanish: tu esclavo, tu esclava
  alternatives_spanish:
  - tu siervo, tu sierva
  - tu servidor, tu servidora
  lexicon: HALOT
  rationale: POB opta por «slave» para preservar la fuerza léxica de δοῦλος/עבד según contexto; aquí el hebreo nombra a los miembros dependientes del hogar. «Esclavo/esclava» mantiene esa fuerza sin suavizarla en exceso con «siervo».
- source_word: וְהַלֵּוִי אֲשֶׁר בִּשְׁעָרֶיךָ
  english_pob_choice: the Levite who is within your gates
  chosen_spanish: el levita que está dentro de tus puertas
  alternatives_spanish:
  - el levita que está dentro de tus ciudades
  - el levita que vive en tu comunidad
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «dentro de tus puertas», que en español bíblico comunica la pertenencia a la comunidad local sin explicitar de más el sentido administrativo.
- source_word: וְשָׂמַחְתָּ
  english_pob_choice: and you shall rejoice
  chosen_spanish: y te alegrarás
  alternatives_spanish:
  - y te regocijarás
  - y te gozarás
  lexicon: HALOT
  rationale: «Alegrarse» expresa bien la respuesta festiva y cultual en español contemporáneo. «Regocijarse» sería más solemne, pero menos natural.
- source_word: מִשְׁלַח יָדֶךָ
  english_pob_choice: in all to which you put your hand
  chosen_spanish: en todo aquello a lo que pongas la mano
  alternatives_spanish:
  - en todo lo que emprendas
  - en toda obra de tu mano
  lexicon: HALOT
  rationale: Se preserva la metáfora de la mano como agente de acción, siguiendo la revisión inglesa más cercana al hebreo. La frase resulta comprensible en español y mantiene el matiz idiomático.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La política POB pide transliterar el Nombre divino. En español, «Yahvé» es la forma más establecida y legible para esa transliteración; se evita la sustitución por un título que ocultaría el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Renderización de עבד / אמה en la lista doméstica
  english_pob_reading: your male servant and your female servant
  chosen_spanish_reading: tu esclavo, tu esclava
  alternative_spanish_readings:
  - tu siervo, tu sierva
  - tu sirviente, tu sirvienta
  rationale: El contexto enumera integrantes subordinados del hogar, y la POB conserva la fuerza de «slave» cuando el término lo requiere. «Esclavo/esclava» evita suavizar el texto y mantiene la tensión social del pasaje.
  doctrine_reference: 'DOCTRINE.md: Lexical force — δοῦλος/עבד → esclavo cuando el contexto lo exige'
- issue: Expresión idiomática final מִשְׁלַח יָדֶךָ
  english_pob_reading: in all to which you put your hand
  chosen_spanish_reading: en todo aquello a lo que pongas la mano
  alternative_spanish_readings:
  - en todo lo que emprendas
  - en toda obra de tu mano
  rationale: La fórmula hebrea no se reduce a «trabajo» sino a lo que la mano emprende. La redacción elegida mantiene la imagen y, a la vez, es idiomática en español.
  doctrine_reference: 'DOCTRINE.md: Idioms should preserve source imagery when intelligible'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y también toma en cuenta la revisión del POB inglés que ajustó la cláusula final para reflejar con mayor precisión el modismo de «la mano». Se preserva el contraste restrictivo inicial, la lista doméstica, la expresión idiomática de «dentro de tus puertas» y el Nombre divino como transliteración.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al criterio POB en español.
  - Se conserva «esclavo/esclava» en lugar de «siervo/sierva» para no suavizar el valor léxico del hebreo en este contexto.
  - La nota a [a] explica el hebraísmo social de «tus puertas» sin reemplazarlo en el texto principal.
  - La nota a [b] mantiene visible la metáfora de la mano y evita una paráfrasis más interpretativa en la línea principal.
