review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia hebrea: condición inicial («Cuando pequen contra ti»), afirmación parentética sobre la universalidad del pecado, ira divina, entrega al poder enemigo, y deportación a tierra lejana o cercana. Sin embargo, «los entregues delante de un enemigo» es una reproducción demasiado literal de לִפְנֵי אוֹיֵב y no comunica bien en español el sentido documentado en el rastro POB: quedar entregados al poder de un enemigo. También «sus cautivadores» suena menos natural que «sus captores» en español bíblico general.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene dos tropiezos de naturalidad: «delante de un enemigo» resulta poco idiomático en este contexto y «cautivadores» es raro donde «captores» o «los que los capturen» sería más claro. Además, la nota al pie actual defiende una literalidad que el inglés POB ya decidió no mantener en el texto principal. Conviene mover «a un enemigo» al texto y reservar la literalidad hebrea para nota.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La elección «ser humano»/«nadie» para אָדָם genérico es aceptable en español. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión principal a corregir es sintáctico-lexical: לִפְנֵי אוֹיֵב debe expresarse idiomáticamente como «a un enemigo» o equivalente, con nota si se desea conservar el matiz literal «delante de».'
  issues:
  - severity: high
    issue: «los entregues delante de un enemigo» es poco natural y no expresa bien el sentido de sometimiento al enemigo.
    rationale: Aunque לִפְנֵי significa literalmente «delante de», en esta construcción con נתן comunica entrega al poder del enemigo. El inglés POB auditado eligió correctamente «give them over to an enemy». En español, «delante de un enemigo» suena espacial y torpe, y puede desviar el sentido.
  - severity: medium
    issue: «sus cautivadores» es léxicamente raro en español corriente eclesial.
    rationale: La construcción hebrea con cognado no exige conservar una forma poco idiomática. «Sus captores» transmite bien el sentido de quienes los llevan cautivos y suena más natural y legible.
  - severity: low
    issue: La nota al pie actual privilegia una defensa de la literalidad en vez de servir como alternativa útil al lector.
    rationale: Si se conserva nota, debe apoyar la lectura principal idiomática y mencionar que el hebreo dice literalmente «delante de un enemigo», no al revés.
  revised_spanish_text: Cuando pequen contra ti —porque no hay nadie que no peque— y te enojes con ellos y los entregues[a] a un enemigo, y sus captores los lleven a una tierra lejana o cercana,
  revised_footnotes:
