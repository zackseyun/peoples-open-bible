translation:
  language: es
  text: 'Así dirás al profeta: «¿Qué te ha respondido Yahvé[a] y qué ha hablado Yahvé?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Qué te ha respondido Yahvé y qué ha hablado Yahvé?»'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Entonces
  lexicon: HALOT
  rationale: La fórmula introduce una instrucción de habla; «Así» conserva el valor formular y directivo de כֹּה con un español natural y sobrio.
- source_word: תֹאמַר
  english_pob_choice: you shall say
  chosen_spanish: dirás
  alternatives_spanish:
  - dirá(s)
  - has de decir
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona aquí como mandato/instrucción. En español, el futuro simple «dirás» transmite bien la orden prescrita sin sonar forzado.
- source_word: אֶל הַנָּבִיא
  english_pob_choice: to the prophet
  chosen_spanish: al profeta
  alternatives_spanish:
  - al profeta mismo
  lexicon: HALOT
  rationale: Se mantiene el singular y la relación de dirección/destino con la preposición «a». «Al profeta» es la forma natural en español.
- source_word: מֶה
  english_pob_choice: What
  chosen_spanish: Qué
  alternatives_spanish:
  - Cuál
  lexicon: HALOT
  rationale: Es el interrogativo que introduce la pregunta sobre el contenido de la respuesta divina.
- source_word: עָנָךְ
  english_pob_choice: has ... answered you
  chosen_spanish: te ha respondido
  alternatives_spanish:
  - te respondió
  - te ha contestado
  lexicon: HALOT
  rationale: ענה en este contexto significa «responder». «Te ha respondido» conserva el valor verbal y el perfecto natural en una cita directa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La pauta del proyecto pide verter el Tetragrámaton como «Yahvé» en español. Se mantiene el nombre propio divino, no una sustitución por título.
- source_word: וּמַה
  english_pob_choice: and what
  chosen_spanish: y qué
  alternatives_spanish:
  - y qué otra cosa
  lexicon: HALOT
  rationale: Coordina una segunda cláusula interrogativa en paralelo a la primera.
- source_word: דִּבֶּר
  english_pob_choice: has ... spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - ha dicho
  - ha declarado
  lexicon: HALOT
  rationale: דבר suele significar «hablar». «Ha hablado» mantiene el paralelismo con «te ha respondido» y evita introducir matices más fuertes que el hebreo no exige.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre divino. Se conserva como nombre propio en español, siguiendo la norma del proyecto y evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Parallel interrogative wording
  english_pob_reading: What has Yahweh answered you, and what has Yahweh spoken?
  chosen_spanish_reading: ¿Qué te ha respondido Yahvé y qué ha hablado Yahvé?
  alternative_spanish_readings:
  - ¿Qué te ha respondido Yahvé, y qué te ha hablado?
  - ¿Qué te ha contestado Yahvé y qué ha dicho Yahvé?
  rationale: 'El hebreo presenta dos preguntas paralelas con verbos distintos: «responder» y «hablar/decir». Se conserva esa distinción para no borrar la tensión lexical documentada.'
  doctrine_reference: Hebrew parallelism in Jeremiah 23:37
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada. La traducción mantiene la estructura directa del original y el Nombre divino como «Yahvé» conforme a la pauta del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el paralelismo verbal entre «ha respondido» y «ha hablado».
  - Se evita añadir palabras explicativas no presentes en el hebreo.
  - La puntuación con dos puntos introduce correctamente la cita directa en español.
