translation:
  language: es
  text: Para el director musical. De David[a]. Un salmo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por David» o «Para David»; el encabezamiento hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el maestro de canto
  alternatives_spanish:
  - Para el director musical
  - Para el director
  - Para el líder del coro
  lexicon: HALOT
  rationale: El término de encabezamiento apunta al responsable de la ejecución musical. «Maestro de canto» comunica bien la función en español y mantiene el tono breve de un superscrito bíblico. Se eligió «Para» para reflejar el valor dedicatorio del ל inicial.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  - Perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los encabezamientos de salmos puede señalar autoría, asociación o dedicación. «De David» preserva esa amplitud sin decidir más de lo que el hebreo exige.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Canción
  - Cántico
  lexicon: HALOT
  rationale: «Salmo» es el equivalente más natural y reconocido en español para el rótulo de género מִזְמוֹר. En un encabezamiento, el artículo indefinido puede omitirse para sonar más idiomático sin perder el sentido.
theological_decisions:
- issue: Alcance del encabezamiento davídico
  english_pob_reading: Render לְדָוִד as 'Of David' and preserve the ambiguity of authorship, association, or dedication.
  chosen_spanish_reading: '«De David» mantiene la misma ambigüedad: puede indicar autoría, asociación o dedicación.'
  alternative_spanish_readings:
  - «Por David»
  - «Para David»
  rationale: No se debe resolver en traducción una cuestión histórica que el encabezamiento no fija de manera explícita. La formulación española conserva la tensión textual del hebreo.
  doctrine_reference: Preservar la ambigüedad del superscrito; primacía del texto original sobre una atribución más fuerte de la que el pasaje garantiza.
translation_notes:
  revision_awareness: 'Se observó el ajuste auditado del inglés POB: la nota explicativa sobre לְדָוִד corresponde a «Of David» y no a «For the choirmaster». Por eso la nota española se ancla en «De David[a]».'
  spanish_consistency_notes:
  - Se mantiene la convención de traducir el nombre divino no aparece en este versículo.
  - «Maestro de canto» se usa como equivalente funcional de la persona encargada de la música, sin introducir una explicación innecesaria.
  - La puntuación reproduce el carácter breve y formular del encabezamiento hebreo.
  - La nota al pie solo acompaña a «De David» porque ahí está la ambigüedad lexical relevante.
