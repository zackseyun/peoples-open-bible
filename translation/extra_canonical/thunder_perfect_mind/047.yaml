    ϣⲁⲩⲙⲟⲩⲧⲉ is habitual present ("they call"), contrasting with the perfect ⲁⲧⲉⲧⲛⲙⲟⲩⲧⲉ
    ("you have called"). | Adjudicator: The reviewer is entirely correct regarding
    the Coptic grammar. The text explicitly uses the ''I am'' formula with a relative
    clause (ⲁⲛⲟⲕ ⲧⲉ ⲧⲉ ϣⲁⲩⲙⲟⲩⲧⲉ ⲉⲣⲟⲥ, ''I am she whom they call'') rather than a si'
