id: HEB.5.4
reference: Hebrews 5:4
source:
  edition: SBLGNT
  text: καὶ οὐχ ἑαυτῷ τις λαμβάνει τὴν τιμήν, ἀλλὰ καλούμενος ὑπὸ τοῦ θεοῦ, ⸀καθώσπερ καὶ Ἀαρών.
translation:
  text: And no one takes this honor for himself[a], but is called by God, just as Aaron also was.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the honor.' The Greek simply says 'the honor,' referring in context to the priestly dignity or office.
    reason: lexical_alternative
lexical_decisions:
- source_word: τις
  chosen: no one
  alternatives:
  - anyone
  lexicon: BDAG
  rationale: With the negation οὐχ, the indefinite τις is best rendered idiomatically as a universal negative, 'no one,' rather than the less natural 'not anyone.'
- source_word: ἑαυτῷ
  chosen: for himself
  alternatives:
  - to himself
  lexicon: BDAG
  rationale: The dative reflexive indicates personal appropriation. 'For himself' communicates self-assumption of office or status more naturally in English than 'to himself.'
- source_word: λαμβάνει
  chosen: takes
  alternatives:
  - receives
  lexicon: BDAG
  rationale: '''Takes'' fits the contrast with divine calling and highlights that the honor is not self-seized. ''Receives'' is possible but weakens the implied contrast between self-appropriation and God''s appointment.'
- source_word: τὴν τιμήν
  chosen: this honor
  alternatives:
  - the honor
  - this dignity
  lexicon: BDAG
  rationale: In context, τιμή refers to the honored status or office of high priesthood mentioned in the surrounding verses. 'Honor' is the most direct rendering. 'This honor' makes the contextual reference explicit in natural English without adding new content.
- source_word: ἀλλὰ
  chosen: but only when
  alternatives:
  - but
  - except
  lexicon: BDAG
  rationale: 'The Greek sets up a strong contrast: no one takes the honor for himself, but rather does so as one called by God. ''But only when'' makes the implied condition explicit in idiomatic English while preserving the contrast.'
- source_word: καλούμενος
  chosen: when called
  alternatives:
  - being called
  - as one called
  lexicon: BDAG
  rationale: The present passive participle expresses the manner or condition under which one may have the honor. 'When called' is concise and idiomatic; it avoids awkwardness while preserving the passive sense of divine summons.
- source_word: ὑπὸ τοῦ θεοῦ
  chosen: by God
  alternatives:
  - by the God
  lexicon: BDAG
  rationale: Standard English omits the article before 'God' here. The phrase identifies God as the agent of the calling.
- source_word: καθώσπερ καὶ Ἀαρών
  chosen: just as Aaron also was
  alternatives:
  - just as Aaron also
  - just as also Aaron was
  lexicon: BDAG
  rationale: 'καθώσπερ introduces comparison, and καὶ adds ''also.'' Because English normally requires an explicit verb here, ''was'' is supplied from the participial idea: Aaron too was called by God. This makes the comparison clear and complete.'
