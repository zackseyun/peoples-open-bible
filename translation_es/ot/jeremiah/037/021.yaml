    text: El hebreo literalmente dice «desde afuera/la calle de los panaderos»; probablemente se refiere a una calle o sector donde trabajaban y vendían pan los panaderos.
    reason: cultural_note
  revision_rationale: Se ajustó el texto para reflejar mejor el matiz custodial de וַיַּפְקִדוּ, evitar el imperfecto narrativamente menos adecuado en «le daban», y mejorar la precisión de כִכַּר לֶחֶם con «una hogaza de pan». También se suavizó el calco discursivo con una sintaxis más natural en español. Se conservó únicamente la nota cultural relevante, anclándola en la frase de provisión diaria relacionada con la calle de los panaderos.
