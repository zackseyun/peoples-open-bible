review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo compacto de la Shemá, mantiene Yahvé por יְהוָה y conserva la lectura principal del POB: ''Yahweh our God, Yahweh is one''. También preserva adecuadamente la ambigüedad sintáctica en nota. Sin embargo, la nota alternativa añade ''Escucha, Israel'' dentro de las citas, algo que el inglés no hace porque la variante afecta la cláusula final, no el llamado inicial.'
  spanish_quality_summary: 'El español principal es claro, digno y natural. ''Escucha, Israel: Yahvé nuestro Dios, Yahvé es uno'' es legible y fiel. La mejora necesaria está en la nota: conviene limitar las alternativas a la porción verdaderamente variante y evitar recargar la cita con material no alternante.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé''; אֱלֹהֵינוּ -> ''nuestro Dios''; אֶחָד -> ''uno''. No hay conflictos relevantes de glosario.'
  issues:
  - severity: medium
    issue: La nota al pie incorpora 'Escucha, Israel' dentro de las lecturas alternativas.
    rationale: La evidencia y la auditoría inglesa muestran que la variación sintáctica está en la cláusula final ('Yahweh our God, Yahweh is one' / alternativas), no en el imperativo inicial. Repetir el vocativo y el llamado dentro de la nota no es falso, pero sí menos preciso respecto a lo documentado.
  - severity: low
    issue: La formulación de la nota puede afinarse para reflejar más de cerca la nota inglesa.
    rationale: Una nota más concisa centrada en la cláusula ambigua preserva mejor la razón exegética y evita sugerir que todo el versículo tiene lecturas alternativas en igual medida.
  revised_spanish_text: 'Escucha[a], Israel: Yahvé nuestro Dios, Yahvé es uno.'
  revised_footnotes:
  - marker: a
    text: 'O: «Yahvé es nuestro Dios, Yahvé solo»; alternativamente: «Yahvé nuestro Dios es un solo Yahvé». El hebreo es compacto y permite más de una lectura sintácticamente plausible.'
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque es fiel, natural y alineado con el POB. Solo se ajusta la nota para que refleje con mayor precisión que las alternativas interpretativas recaen sobre la cláusula nominal final, no sobre 'Escucha, Israel'.
