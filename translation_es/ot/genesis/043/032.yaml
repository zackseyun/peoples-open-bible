revisions:
- from: Así les sirvieron a él aparte[a], y a ellos aparte, y a los egipcios que comían con él aparte, porque los egipcios no podían comer pan con los hebreos, pues eso era una abominación para los egipcios.
  to: Así le sirvieron por separado a él, y a ellos por separado, y a los egipcios que comían con él por separado, porque los egipcios no podían comer pan[a] con los hebreos, pues eso era una abominación para los egipcios.
  rationale: Se conserva el sentido del hebreo y de la auditoría inglesa, pero se mejora la naturalidad de la triple separación con 'por separado' y se corrige la ubicación del marcador de nota para que explique la expresión 'comer pan', que es donde realmente está la alternativa léxica documentada.
