revisions:
- from: Y los hijos de Leví hicieron conforme a la palabra de Moisés[a], y cayeron de entre el pueblo, en aquel día, como tres mil hombres.
  to: Y los hijos de Leví hicieron conforme a la palabra de Moisés[a], y ese día cayeron de entre el pueblo unos tres mil hombres.
  rationale: Se conserva toda la estructura semántica del hebreo y del POB inglés, pero se reordena la segunda cláusula para lograr un español más natural y claro. «Ese día» y «unos tres mil hombres» expresan fielmente el tiempo y la aproximación numérica sin el tono calcado de «en aquel día» y «como tres mil hombres». La nota se mantiene, con un pequeño ajuste estilístico («para morir») para mayor naturalidad.
