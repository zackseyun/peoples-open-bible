translation:
  language: es
  text: Yahvé tiene una causa contra Judá[a], y castigará a Jacob[b] conforme a sus caminos; conforme a sus obras le retribuirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé tiene un pleito contra Judá» o «Yahvé tiene una disputa con Judá». El hebreo usa lenguaje de controversia legal.
    reason: lexical_alternative
  - marker: b
    text: O «llamará a Jacob a cuentas». La expresión hebrea literalmente significa «visitar sobre», a menudo con el sentido de castigo o rendición judicial de cuentas.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִיב
  english_pob_choice: has a charge against
  chosen_spanish: tiene una causa contra
  alternatives_spanish:
  - tiene una querella contra
  - tiene un pleito contra
  - tiene una disputa contra
  lexicon: HALOT
  rationale: El sustantivo רִיב en contexto profético-jurídico expresa una disputa o proceso legal. En español, 'tiene una causa contra' conserva el matiz forense sin sonar tan técnico o arcaizante como 'pleito' en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el nombre divino: ''Yahvé'' reproduce el Tetragrámaton como nombre propio y evita la sustitución por un título.'
- source_word: עִם יְהוּדָה
  english_pob_choice: against Judah
  chosen_spanish: contra Judá
  alternatives_spanish:
  - con Judá
  - frente a Judá
  lexicon: HALOT
  rationale: Aunque עִם normalmente significa 'con', con רִיב en lenguaje legal marca a la parte opuesta; 'contra' explicita ese valor adversativo/judicial en español.
- source_word: לִפְקֹד עַל
  english_pob_choice: will punish
  chosen_spanish: castigará
  alternatives_spanish:
  - visitará sobre
  - tomará cuenta de
  - llamará a cuentas a
  lexicon: HALOT
  rationale: פקד con עַל en contextos de juicio puede significar castigar o hacer rendir cuentas. 'Castigará' comunica con claridad la acción judicial divina sin perder la fuerza del hebreo.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo 'Jacob', tal como aparece en el texto, para mantener la retórica profética y la posible resonancia corporativa/patriarcal.
- source_word: כִּדְרָכָיו
  english_pob_choice: according to his ways
  chosen_spanish: conforme a sus caminos
  alternatives_spanish:
  - según su conducta
  - conforme a sus pasos
  lexicon: HALOT
  rationale: דֶּרֶךְ en plural con sufijo funciona metafóricamente como conducta o modo de vida. 'Caminos' preserva la metáfora hebrea de forma natural en español.
- source_word: כְּמַעֲלָלָיו
  english_pob_choice: according to his deeds
  chosen_spanish: conforme a sus obras
  alternatives_spanish:
  - según sus hechos
  - conforme a sus acciones
  lexicon: HALOT
  rationale: מַעֲלָלִים alude a acciones/hechos con peso moral. 'Obras' es una equivalencia breve y solemne en español, adecuada al registro profético.
- source_word: יָשִׁיב לֽוֹ
  english_pob_choice: he will repay him
  chosen_spanish: le pagará
  alternatives_spanish:
  - le retribuirá
  - le recompensará
  - le devolverá
  lexicon: HALOT
  rationale: שוב en causativo con ל en este contexto judicial expresa retribución. 'Le pagará' comunica la idea de correspondencia retributiva de manera idiomática y directa en español.
theological_decisions:
- issue: Distinción entre Judá y Jacob en el juicio profético
  english_pob_reading: Translate both names as given, with Judah as the immediate party in the LORD's charge and Jacob as the object of ensuing punishment/recompense.
  chosen_spanish_reading: 'Se conservan ambos nombres: Judá como la parte contra la que Yahvé presenta su causa, y Jacob como el objeto del castigo/retribución que sigue.'
  alternative_spanish_readings:
  - Tratar 'Jacob' como simple sinónimo de toda la nación y suavizar la distinción
  - Unificar el sujeto para evitar la tensión textual
  rationale: El versículo distingue explícitamente entre Judá y Jacob. La traducción mantiene esa tensión textual y evita armonizarla, respetando la formulación del hebreo y la lectura auditada del POB inglés.
  doctrine_reference: Preservar la tensión teológica/textual en vez de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó con alto nivel de acuerdo y sin ajustes pendientes.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme al criterio del proyecto.
  - Se mantiene 'Jacob' y 'Judá' como nombres propios del texto, sin armonizarlos.
  - '''Causa'' y ''castigará'' preservan el campo legal/judicial del hebreo en un español natural.'
  - '''Conforme a'' traduce consistentemente כְּ en ambos miembros paralelos.'
