translation:
  language: es
  text: 'Y sucedió que, cuando estaba por entrar en Egipto, dijo a Sarai, su esposa: «Mira, sé que eres una mujer hermosa de aspecto[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hermosa a la vista».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa wayyiqtol de היה introduce un nuevo episodio. «Y sucedió» conserva ese valor discursivo sin la arcaicidad de «aconteció» y sin perder la secuencia narrativa.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as / when
  chosen_spanish: cuando
  alternatives_spanish:
  - así como
  - mientras
  lexicon: HALOT
  rationale: Aquí marca la circunstancia temporal en que habló Abram; «cuando» suena natural en español y mantiene el sentido temporal del hebreo.
- source_word: הִקְרִיב לָבוֹא
  english_pob_choice: was about to enter
  chosen_spanish: estaba por entrar
  alternatives_spanish:
  - se acercaba a entrar
  - estaba a punto de entrar
  lexicon: HALOT
  rationale: La combinación expresa proximidad e inminencia de la entrada. «Estaba por entrar» comunica bien ese matiz en español sin sobrecargar la frase.
- source_word: מִצְרָיְמָה
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia el lugar; en español se expresa de manera idiomática con el topónimo simple «Egipto».
- source_word: וַיֹּאמֶר אֶל
  english_pob_choice: that he said to
  chosen_spanish: que dijo a
  alternatives_spanish:
  - y dijo a
  lexicon: HALOT
  rationale: Se conserva la introducción del discurso reportado dentro de la construcción narrativa anterior, con una subordinación natural en español.
- source_word: שָׂרַי אִשְׁתּוֹ
  english_pob_choice: Sarai his wife
  chosen_spanish: Sarai, su esposa
  alternatives_spanish:
  - Sarai, su mujer
  - su esposa Sarai
  lexicon: HALOT
  rationale: Se mantiene el nombre propio seguido de la apposición relacional. «Esposa» es claro y natural en español; la coma refleja la aposición hebrea.
- source_word: הִנֵּה נָא
  english_pob_choice: Look now
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - Mira, por favor
  - Mira pues
  lexicon: HALOT
  rationale: La combinación de atención y súplica/empuje se traduce de forma directa y viva. «Mira ahora» reproduce el tono conversacional sin arcaísmo.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he sabido
  - me doy cuenta
  lexicon: HALOT
  rationale: El perfecto expresa aquí un estado de conocimiento presente. En español, «sé» es la forma más natural y fiel.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo en sentido de mujer, no de esposa, ya que esa relación ya fue expresada antes. «Mujer» evita duplicar indebidamente la función marital.
- source_word: יְפַת מַרְאֶה
  english_pob_choice: beautiful in appearance
  chosen_spanish: hermosa de aspecto
  alternatives_spanish:
  - bella de apariencia
  - hermosa a la vista
  - hermosa en apariencia
  lexicon: HALOT
  rationale: La expresión constructa describe belleza visible. «De aspecto» mantiene la referencia al rasgo perceptible sin sonar forzada; «hermosa» comunica el valor semántico principal.
- source_word: אָתְּ
  english_pob_choice: you are
  chosen_spanish: eres
  alternatives_spanish:
  - tú eres
  - eres tú
  lexicon: HALOT
  rationale: El pronombre independiente intensifica la predicación, pero en español puede omitirse sin perder el sentido. «Eres» es idiomático y suficiente en esta afirmación directa.
theological_decisions:
- issue: Tratamiento de יהוה / YHWH no presente explícitamente en el versículo, pero relevante para la filosofía del proyecto
  english_pob_reading: POB normally renders the divine name as Yahvé in the main text when present.
  chosen_spanish_reading: No aplica en este versículo; no se introduce ninguna sustitución por «SEÑOR».
  alternative_spanish_readings:
  - «SEÑOR» como convención litúrgica
  - «el Señor»
  rationale: El versículo no contiene el nombre divino. Se deja constancia de que no hay razón para introducir una máscara editorial; la traducción sigue el hebreo del versículo sin interpolaciones.
  doctrine_reference: Éxodo 3:15; convención editorial del POB sobre יהוה
- issue: Valor de אִשָּׁה en relación con Sarai
  english_pob_reading: The English POB chose 'a woman' rather than 'a wife' because the marital role was already stated.
  chosen_spanish_reading: «una mujer»
  alternative_spanish_readings:
  - «una esposa»
  - «una mujer hermosa»
  rationale: La secuencia hebrea ya identifica a Sarai como esposa de Abram; repetir «esposa» en la segunda cláusula diluiría el contraste semántico. «Mujer» preserva la tensión léxica del original.
  doctrine_reference: Génesis 12:11; análisis léxico de אִשָּׁה
- issue: Expresión evaluativa de belleza
  english_pob_reading: beautiful in appearance
  chosen_spanish_reading: «hermosa de aspecto»
  alternative_spanish_readings:
  - «hermosa en apariencia»
  - «bella de aspecto»
  - «hermosa a la vista»
  rationale: El hebreo destaca belleza visible, no un juicio abstracto. «De aspecto» suena menos pesado que una calca rígida y conserva el vínculo con la apariencia perceptible.
  doctrine_reference: Génesis 12:11; frase constructa יְפַת מַרְאֶה
translation_notes:
  revision_awareness: La versión inglesa más reciente restauró la fórmula narrativa «And it happened» y el subordinante «that» para reflejar con mayor plenitud la estructura hebrea. El español mantiene esa misma decisión de manera natural con «Y sucedió..., que dijo...», preservando la secuencia narrativa y el tono formal sin depender de una calca pesada.
  spanish_consistency_notes:
  - Se mantiene «Sarai» como nombre propio sin adaptar a formas posteriores del relato.
  - Se usa «mujer» para אִשָּׁה, no «esposa», porque la relación conyugal ya está dada en el sintagma previo.
  - «Mira ahora» reproduce el valor de atención + súplica de הִנֵּה נָא sin arcaísmo.
  - La puntuación con comas y dos puntos hace visible la aposición y el discurso directo.
  - No se introduce terminología eclesiástica ajena al texto; el versículo es narrativo y se traduce con registro bíblico moderno.
