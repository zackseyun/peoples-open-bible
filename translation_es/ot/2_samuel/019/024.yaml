translation:
  language: es
  text: 'Y el rey dijo a Semei[a]: «No morirás». Y el rey le juró.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más interpretativamente: «No serás ejecutado». El hebreo dice literalmente: «No morirás», lo cual aquí puede funcionar como una promesa real de indulto frente a la ejecución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción narrativa; «Y ... dijo» conserva la secuencia del relato en español natural.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es el sustantivo definido y contextual para el personaje real; «rey» es la equivalencia directa y más natural en español bíblico contemporáneo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición de destinatario del habla se expresa de modo natural con «a» en español.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Semei
  alternatives_spanish:
  - Shimei
  lexicon: convención de transliteración
  rationale: Se adopta una forma española habitual y legible del nombre propio. La transliteración sigue siendo reconocible y no altera la referencia al personaje.
- source_word: לֹא תָמוּת
  english_pob_choice: You shall not die
  chosen_spanish: No morirás
  alternatives_spanish:
  - No has de morir
  - No serás muerto
  lexicon: HALOT
  rationale: La forma hebrea expresa una promesa/decreto real de que no ocurrirá la muerte; «No morirás» preserva la literalidad esencial sin forzar una pasiva interpretativa. La alternativa «No serás muerto» sonaría menos natural en español y podría desplazar el foco del hebreo.
- source_word: וַיִּשָּׁבַע
  english_pob_choice: And ... swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo juramento
  lexicon: HALOT
  rationale: «Juró» es la manera concisa y fiel de expresar el verbo de prestar juramento en español.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El sufijo pronominal se refleja con el dativo átono español; evita repetición innecesaria y conserva la relación indirecta.
theological_decisions:
- issue: 'El alcance de «No morirás»: amenaza de muerte versus ejecución'
  english_pob_reading: You shall not die / more interpretively, You shall not be put to death
  chosen_spanish_reading: No morirás
  alternative_spanish_readings:
  - No serás ejecutado
  - No te harán morir
  rationale: El hebreo dice literalmente «no morirás»; en contexto funciona como promesa real de perdón o inmunidad frente a la ejecución. Se mantiene la formulación directa en el texto principal y se deja implícita la aplicación jurídica.
  doctrine_reference: 2 Samuel 19:24; cf. la nota interpretativa del POB en inglés sobre la posible exención de ejecución
- issue: El juramento del rey como acto solemne de garantía
  english_pob_reading: And the king swore to him
  chosen_spanish_reading: Y el rey le juró
  alternative_spanish_readings:
  - Y el rey se lo juró
  - Y el rey le hizo juramento
  rationale: La cláusula hebrea indica un juramento dirigido a la persona; «le juró» conserva la solemnidad y la relación personal del acto sin añadir contenido ajeno.
  doctrine_reference: HALOT, שבע; uso narrativo de juramento en contexto real
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene como texto principal «You shall not die» y conserva una nota alternativa más interpretativa («You shall not be put to death»), luego revisada para naturalidad en inglés al suprimir un objeto redundante en la cláusula de juramento. La versión española sigue esa misma línea: retiene la literalidad principal en el cuerpo («No morirás») y refleja el juramento con una formulación breve y natural («le juró»), sin introducir una lectura más explicativa en el texto principal.'
  spanish_consistency_notes:
  - Se usa «rey» para el personaje real de forma constante.
  - Se translitera el nombre como «Semei», una adaptación española legible y estándar; se mantiene un solo referente nominal en todo el versículo.
  - Se evita «SEÑOR» porque el texto no contiene el nombre divino.
  - Se conserva el paralelismo narrativo con dos oraciones unidas por «Y».
