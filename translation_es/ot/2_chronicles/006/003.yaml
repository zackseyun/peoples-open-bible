translation:
  language: es
  text: Entonces el rey se volvió y bendijo a toda la asamblea de Israel[a], mientras toda la asamblea de Israel estaba de pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la congregación de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסֵּב
  english_pob_choice: turned around
  chosen_spanish: se volvió
  alternatives_spanish:
  - se giró
  - dio la vuelta
  lexicon: HALOT
  rationale: El verbo hebreo expresa un giro físico; «se volvió» comunica de forma natural esa acción sin perder el sentido básico. Evita una formulación excesivamente literal que sonaría poco idiomática en español.
- source_word: פָּנָיו
  english_pob_choice: his face
  chosen_spanish: se volvió
  alternatives_spanish:
  - volvió su rostro
  - volvió su cara
  - se volvió él
  lexicon: HALOT
  rationale: El hebreo dice literalmente «volvió su rostro/cara». En español, la idiomática «se volvió» conserva la imagen corporal implícita sin forzar una traducción rígida de «su rostro» en el verbo principal.
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - pronunció una bendición sobre
  - bendijo solemnemente
  lexicon: HALOT
  rationale: ברך significa «bendecir». «Bendijo» es la equivalencia directa y natural en español, manteniendo el acto de bendición pronunciado por el rey.
- source_word: כָּל קְהַל יִשְׂרָאֵל
  english_pob_choice: all the assembly of Israel
  chosen_spanish: toda la asamblea de Israel
  alternatives_spanish:
  - toda la congregación de Israel
  - todo el conjunto de Israel
  lexicon: HALOT
  rationale: «Asamblea» refleja bien קהל como el pueblo reunido en acto público y cultual. «Congregación» es posible, pero «asamblea» conserva mejor el matiz de reunión visible y no sustituye el término por uno más eclesiástico.
- source_word: עוֹמֵד
  english_pob_choice: was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba en pie
  - estaba parado
  lexicon: HALOT
  rationale: El participio indica una postura continua. «Estaba de pie» transmite de manera clara y digna esa स्थिति/estado durativo en español actual.
- source_word: וְכָל קְהַל יִשְׂרָאֵל עוֹמֵד
  english_pob_choice: while all the assembly of Israel was standing
  chosen_spanish: mientras toda la asamblea de Israel estaba de pie
  alternatives_spanish:
  - y toda la asamblea de Israel estaba de pie
  - así que toda la asamblea de Israel estaba de pie
  lexicon: HALOT
  rationale: La cláusula describe la circunstancia simultánea del gesto del rey. «Mientras» conserva esa relación temporal y de estado sin añadir inferencias.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de «turned his face» a «turned around» para mayor naturalidad, manteniendo el gesto físico. La propuesta española sigue ese criterio: conserva el movimiento corporal con una formulación idiomática y mantiene la repetición de «toda la asamblea de Israel» en ambas cláusulas, como en el hebreo y la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usa «asamblea» de manera consistente para קהל, en línea con la decisión inglesa y sin sustituirla por «congregación» en el texto principal.
  - Se conserva la repetición del sujeto para reflejar el paralelismo del hebreo y la versión inglesa auditada.
