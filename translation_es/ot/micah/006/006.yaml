translation:
  language: es
  text: ¿Con qué me presentaré ante Yahvé, y me inclinaré ante Dios en las alturas[a]? ¿Me presentaré ante él con holocaustos, con becerros de un año?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ante Dios en lo alto». El hebreo dice literalmente «ante Dios de altura / de lo alto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמָּה
  english_pob_choice: With what
  chosen_spanish: ¿Con qué
  alternatives_spanish:
  - ¿Con qué cosa
  - ¿Por medio de qué
  lexicon: HALOT
  rationale: La pregunta instrumental se conserva de forma natural en español con «¿Con qué», que mantiene el sentido de medio o recurso sin añadir contenido interpretativo.
- source_word: אֲקַדֵּם
  english_pob_choice: shall I come before
  chosen_spanish: me presentaré ante
  alternatives_spanish:
  - iré delante de
  - compareceré ante
  - me acercaré a
  lexicon: HALOT
  rationale: «Presentarse ante» reproduce bien el valor de comparecer o venir a la presencia de alguien, y suena más natural en español que un calco literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración castellana tradicional y reconocible. No se sustituye por un título, en coherencia con la decisión base del POB de preservar el Tetragrámaton.
- source_word: אִכַּף
  english_pob_choice: bow myself
  chosen_spanish: me inclinaré
  alternatives_spanish:
  - me postraré
  - me doblaré
  - me humillaré
  lexicon: HALOT
  rationale: El verbo describe la acción corporal de inclinarse o agacharse en reverencia. «Me inclinaré» preserva la postura sin reducirla solo a una actitud interior.
- source_word: לֵאלֹהֵי מָרוֹם
  english_pob_choice: before God on high
  chosen_spanish: ante Dios en las alturas
  alternatives_spanish:
  - ante el Dios de lo alto
  - ante Dios Altísimo
  - ante el Dios en lo alto
  lexicon: HALOT
  rationale: «En las alturas» refleja el valor descriptivo de מָרוֹם como altura/exaltación, sin convertirlo en un título fijo distinto del hebreo.
- source_word: הַאֲקַדְּמֶנּוּ
  english_pob_choice: Shall I come before him
  chosen_spanish: ¿Me presentaré ante él
  alternatives_spanish:
  - ¿Me acercaré a él
  - ¿Compareceré ante él
  - ¿Iré a su presencia
  lexicon: HALOT
  rationale: Se conserva la repetición retórica de קדם con una formulación paralela y fluida en español, manteniendo el pronombre de tercera persona.
- source_word: בְעוֹלוֹת
  english_pob_choice: with burnt offerings
  chosen_spanish: con holocaustos
  alternatives_spanish:
  - con ofrendas quemadas
  - con sacrificios quemados
  lexicon: HALOT
  rationale: «Holocaustos» es el equivalente bíblico habitual para עוֹלָה y preserva el término sacrificial técnico con precisión.
- source_word: בַּעֲגָלִים בְּנֵי שָׁנָה
  english_pob_choice: with year-old calves
  chosen_spanish: con becerros de un año
  alternatives_spanish:
  - con terneros de un año
  - con becerros añales
  - con becerros de año
  lexicon: HALOT
  rationale: La expresión transmite de manera clara que se trata de animales en su primer año. «Becerros» mantiene el registro sacrificial; «de un año» conserva la especificación temporal.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre divino. Se mantiene en español como «Yahvé» para preservar el valor propio del nombre del pacto, en lugar de reemplazarlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: How to render לֵאלֹהֵי מָרוֹם
  english_pob_reading: before God on high
  chosen_spanish_reading: ante Dios en las alturas
  alternative_spanish_readings:
  - ante Dios Altísimo
  - ante el Dios de lo alto
  - ante el Dios en las alturas
  rationale: La construcción hebrea es descriptiva y habla de altura/exaltación. «En las alturas» mantiene esa imagen sin imponer el título fijo «Altísimo», que el hebreo aquí no usa explícitamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3, #5'
translation_notes:
  revision_awareness: 'El contexto de revisión indica que no hubo cambios posteriores al último pase y que el acuerdo de revisión fue alto (1.0). Por eso se mantiene la solución ya validada: nombre divino preservado, fórmula descriptiva para מָרוֹם y equivalencia sobria para la pregunta retórica y los sacrificios.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el Tetragrámaton.
  - «Me presentaré ante» y «ante él» conservan el paralelismo de repetición de קדם.
  - «En las alturas» evita introducir un título doctrinal no explicitado por מָרוֹם.
  - El registro sacrificial se conserva con «holocaustos» y «becerros de un año».
