translation:
  language: es
  text: 'Me dije en mi corazón,[a] diciendo: «He aquí, yo he llegado a ser grande y he aumentado en sabiduría más que todos los que fueron antes de mí sobre Jerusalén, y mi corazón ha visto mucha sabiduría y conocimiento».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más que todos los que fueron antes de mí en Jerusalén». La preposición hebrea puede entenderse de manera más espacial («en») o en un sentido de gobierno («sobre»).
    reason: alternative_reading
lexical_decisions:
- source_word: דִּבַּרְתִּי אֲנִי עִם לִבִּי
  english_pob_choice: I said in my heart
  chosen_spanish: Me dije en mi corazón
  alternatives_spanish:
  - Hablé con mi corazón
  - Me hablé a mí mismo
  lexicon: HALOT
  rationale: El hebreo expresa auto-habla interior. «Me dije en mi corazón» conserva la metáfora del corazón como centro de pensamiento y decisión, y suena natural en español. «Hablé con mi corazón» es más literal pero menos idiomático; «me hablé a mí mismo» aclara el sentido, pero pierde la imagen del corazón.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Se mantiene el valor introductorio del discurso interior. «Diciendo» preserva la estructura hebrea sin añadir interpretación.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: El marcador de atención dentro del discurso se vierte con una forma natural y solemne en español. «Mira» comunica la fuerza de atención de הִנֵּה sin arcaísmo excesivo; «He aquí» es más formal, pero menos natural.
- source_word: הִגְדַּלְתִּי
  english_pob_choice: I have become great
  chosen_spanish: me he engrandecido
  alternatives_spanish:
  - he crecido
  - he llegado a ser grande
  lexicon: HALOT
  rationale: El causativo hebreo apunta a alcanzar grandeza o prominencia. «Me he engrandecido» refleja ese ascenso en estatus y conserva la autoevaluación del hablante. «He crecido» es más general; «he llegado a ser grande» es correcto pero menos directo.
- source_word: וְהוֹסַפְתִּי חָכְמָה
  english_pob_choice: and increased in wisdom
  chosen_spanish: y he añadido mucha sabiduría
  alternatives_spanish:
  - y he aumentado en sabiduría
  - y he acumulado sabiduría
  lexicon: HALOT
  rationale: El hebreo literalmente habla de «añadir sabiduría». En español, «he añadido mucha sabiduría» conserva la imagen de incremento y no diluye el objeto explícito. Se evita «aumentado en sabiduría» porque vuelve más abstracta la construcción; «acumulado» sugiere almacenamiento, no necesariamente crecimiento interior.
- source_word: עַל כָּל אֲשֶׁר הָיָה לְפָנַי עַל יְרוּשָׁלִָם
  english_pob_choice: beyond all who were before me over Jerusalem
  chosen_spanish: sobre todos los que estuvieron antes de mí en Jerusalén
  alternatives_spanish:
  - más que todos los que estuvieron antes de mí en Jerusalén
  - sobre todos los que estuvieron antes de mí sobre Jerusalén
  lexicon: HALOT
  rationale: La preposición עַל en este contexto comparativo puede entenderse espacialmente («en») o en sentido de gobierno («sobre»). El español principal opta por «en Jerusalén» para una lectura fluida y ampliamente posible, sin perder el trasfondo de referencia a Jerusalén. Se preserva así la alternativa espacial, mientras que la idea de superioridad comparativa queda en «sobre todos».
- source_word: וְלִבִּי רָאָה
  english_pob_choice: and my heart has seen
  chosen_spanish: y mi corazón ha visto
  alternatives_spanish:
  - y mi mente ha percibido
  - y yo he visto
  lexicon: HALOT
  rationale: 'Se conserva el antropologismo hebreo: el corazón «ve» como sede de percepción interior. «Mi corazón ha visto» mantiene esa textura semítica mejor que una paráfrasis intelectualizada.'
- source_word: הַרְבֵּה
  english_pob_choice: much
  chosen_spanish: mucha
  alternatives_spanish:
  - abundante
  - gran
  lexicon: HALOT
  rationale: Aquí funciona como intensificador con los sustantivos siguientes. «Mucha» es la opción más natural en español y preserva la cuantificación amplia.
- source_word: חָכְמָה וָדָעַת
  english_pob_choice: wisdom and knowledge
  chosen_spanish: sabiduría y conocimiento
  alternatives_spanish:
  - sabiduría y entendimiento
  lexicon: HALOT
  rationale: La pareja nominal se vierte con el equivalente más directo y transparente. «Conocimiento» refleja bien דַּעַת y evita expandir el término más allá de lo que el hebreo dice.
theological_decisions:
- issue: 'Sentido de לְפָנַי עַל יְרוּשָׁלִָם: «en Jerusalén» o «sobre Jerusalén»'
  english_pob_reading: The Hebrew preposition can be understood more spatially ('in') or in a rulership sense ('over').
  chosen_spanish_reading: «en Jerusalén» en el texto principal, con la comparación de superioridad conservada en el flujo de la frase.
  alternative_spanish_readings:
  - «sobre Jerusalén»
  - «sobre los que estuvieron antes de mí en Jerusalén»
  rationale: El hebreo admite una tensión real entre ubicación y gobierno. En español, «en Jerusalén» evita una construcción más dura y sigue siendo compatible con la nota comparativa de precedencia; sin embargo, se reconoce que el trasfondo puede ser de realeza o gobierno asociado a Jerusalén.
  doctrine_reference: Eclesiastés 1:16; nota de la POB inglesa sobre la preposición
- issue: Metáfora cognitiva del corazón que ve y habla
  english_pob_reading: I said in my heart ... and my heart has seen
  chosen_spanish_reading: «Me dije en mi corazón ... y mi corazón ha visto»
  alternative_spanish_readings:
  - «Me hablé a mí mismo ... y mi mente ha percibido»
  rationale: La POB inglesa retiene la antropología bíblica del corazón como centro de pensamiento. El español conserva esa misma imagen para no borrar la tensión literaria del texto hebreo.
  doctrine_reference: Ecclesiastés 1:16; antropología bíblica en el AT
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del flujo inglés, que resolvió la apertura interior con un marcador formal de atención («Behold»). En español se eligió «Mira» para mantener naturalidad y dignidad. También se tuvo en cuenta que la auditoría inglesa conserva la ambigüedad de עַל + Jerusalén, por lo que el texto español principal opta por una solución fluida mientras la nota preserva la alternativa.
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵב/לִבִּי como en otras decisiones POB, en vez de reemplazarlo por «mente».
  - Se usa «sabiduría» para חָכְמָה y «conocimiento» para דָּעַת, siguiendo la distinción léxica habitual.
  - Se evita «He aquí» en el texto principal por estilo, pero se conserva la fuerza de הִנֵּה con «Mira».
  - La nota a no usa un marcador adicional porque el único anclaje textual requerido es [a] después de «corazón».
