revisions:
- from: Porque Moisés había dado la heredad de las dos tribus y de la media tribu de este lado del Jordán[a]; pero a los levitas no les dio heredad entre ellos.
  to: Porque Moisés había dado la heredad de las dos tribus y de la media tribu al otro lado del Jordán[a]; pero a los levitas no les dio heredad entre ellos.
  rationale: Se corrige la expresión geográfica para ajustarla al hebreo מֵעֵבֶר לַיַּרְדֵּן y al rastro de auditoría del POB inglés. El resto del versículo puede mantenerse, ya que preserva bien la anterioridad temporal, la terminología de heredad y la matización de que los levitas no recibieron heredad territorial entre las demás tribus.
