translation:
  language: es
  text: Y David le dio a Ornan por el lugar[a] seiscientos siclos de oro por peso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo en 2 Samuel 24:24 menciona cincuenta siclos de plata; aquí Crónicas dice seiscientos siclos de oro, probablemente reflejando un alcance distinto de la compra o una tradición textual diferente.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: le dio
  alternatives_spanish:
  - le pagó
  - entregó
  lexicon: HALOT
  rationale: נתן normalmente significa «dar». En este contexto comercial, «le dio» conserva la forma verbal del hebreo sin imponer de entrada una paráfrasis interpretativa; el sentido de pago queda claro por el objeto y la cantidad.
- source_word: לְאָרְנָן
  english_pob_choice: Ornan
  chosen_spanish: a Ornan
  alternatives_spanish:
  - a Araunah
  lexicon: Nombre propio en el texto hebreo inmediato
  rationale: El texto fuente de Crónicas nombra a Ornan; «Araunah» pertenece al paralelo de Samuel. Debe mantenerse el nombre del texto inmediato.
- source_word: שִׁקְלֵי זָהָב
  english_pob_choice: shekels of gold
  chosen_spanish: seiscientos siclos de oro
  alternatives_spanish:
  - seiscientos siclos de oro
  - seiscientos pesos de oro
  lexicon: HALOT
  rationale: La unidad antigua שֶׁקֶל se traduce de forma natural por «siclo» en español bíblico. Se conserva la relación unidad-material como «siclos de oro».
- source_word: מִשְׁקָל
  english_pob_choice: by weight
  chosen_spanish: por peso
  alternatives_spanish:
  - de peso
  - pesados
  lexicon: HALOT
  rationale: מִשְׁקָל explicita que la cantidad se determinó como medida de peso. «Por peso» reproduce esa precisión con español natural y breve.
- source_word: בַּמָּקוֹם
  english_pob_choice: for the place
  chosen_spanish: por el lugar
  alternatives_spanish:
  - por el sitio
  - para el lugar
  lexicon: HALOT
  rationale: מָקוֹם significa «lugar» o «sitio». En español, «por el lugar» refleja la preposición del hebreo y deja abierto el matiz de compra del terreno sin añadir más de lo que el texto dice.
- source_word: שֵׁשׁ מֵאוֹת
  english_pob_choice: six hundred
  chosen_spanish: seiscientos
  alternatives_spanish:
  - seiscientos
  lexicon: HALOT
  rationale: El cardinal es directo y no requiere ajuste. Se mantiene la cifra del texto hebreo de Crónicas sin armonizarla con el paralelo de Samuel.
theological_decisions:
- issue: Diferencia numérica con 2 Samuel 24:24
  english_pob_reading: Retain the Chronicler's figure, 'six hundred shekels of gold,' without harmonizing.
  chosen_spanish_reading: 'Conservar la cifra de Crónicas: «seiscientos siclos de oro», sin armonizarla con Samuel.'
  alternative_spanish_readings:
  - armonizar la cifra con el paralelo de Samuel
  - explicar la discrepancia en el cuerpo del versículo
  rationale: El texto hebreo de Crónicas dice explícitamente «seiscientos». La traducción debe representar el versículo tal como está escrito, no resolver en el texto principal la tensión intertextual. La nota puede señalar el paralelo sin alterar la lectura de Crónicas.
  doctrine_reference: Fidelidad al texto base; no armonización intratextual
- issue: Sentido de una compra expresada con el verbo «dar»
  english_pob_reading: The verb נתן commonly means 'give.' Although the context is a purchase, 'gave' preserves the Hebrew wording without over-interpreting; the payment sense is clear from the amount and object.
  chosen_spanish_reading: Mantener «le dio» en vez de «le pagó», dejando que el contexto comercial haga evidente el pago.
  alternative_spanish_readings:
  - le pagó a Ornan
  - compró el lugar
  rationale: El hebreo usa un verbo común de dar, no un verbo técnico de compra. En español, «le dio» conserva esa observación lexical y evita sobrecargar el verso con una interpretación que el hebreo no formula de manera explícita.
  doctrine_reference: Principio de forma semántica conservada
translation_notes:
  revision_awareness: 'Se siguió el control auditado más reciente: no hubo revisiones aplicadas y el pasaje quedó en alta concordancia. Se conservó la cifra de Crónicas y el nombre Ornan del texto hebreo inmediato.'
  spanish_consistency_notes:
  - Se usó «siclos» para la unidad monetario-pesada, en coherencia con la terminología bíblica estándar y con el valor fuente de שֶׁקֶל.
  - Se mantuvo «Y David» al inicio para reflejar la coordinación narrativa del hebreo con naturalidad en español.
  - Se evitó «SEÑOR» u otra sustitución, porque no aparece el Tetragrámaton en este versículo.
  - La nota al pie queda anclada en «lugar» para señalar la tensión con el paralelo sin afectar la lectura principal.
