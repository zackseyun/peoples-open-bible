base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/018/009.yaml
  text: Now the king of Israel and Jehoshaphat king of Judah were sitting[a], each on his throne, clothed in garments, and sitting at the threshing floor at the entrance of the gate of Samaria[b], and all the prophets were prophesying before them.
  footnotes:
