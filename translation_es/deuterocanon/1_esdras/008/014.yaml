translation:
  language: es
  text: junto con lo que fue dado voluntariamente por la nación para el templo de su Señor[a] en Jerusalén, y el oro y la plata que se han de reunir para toros, carneros y corderos, y lo que va con ellos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo hebreo de Esdras 7:16 difiere notablemente: habla de plata y oro ofrecidos voluntariamente por el rey y sus consejeros al Dios de Israel, cuya morada está en Jerusalén. El griego de 1 Esdras no es idéntico y se traduce aquí tal como está.'
    reason: textual_variant
  - marker: b
    text: O «las cosas acompañantes», probablemente los elementos adicionales requeridos para los sacrificios.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺν
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - al lado de
  lexicon: BDAG
  rationale: La preposición griega añade un elemento acompañante al resto de la oración. «Junto con» conserva esa fuerza aditiva de manera natural en español.
- source_word: τῷ δεδωρημένῳ
  english_pob_choice: what was freely given
  chosen_spanish: lo que fue dado voluntariamente
  alternatives_spanish:
  - lo que fue dado como don
  - lo que fue concedido
  - la donación
  lexicon: BDAG
  rationale: El participio perfecto de δωρέομαι comunica una dádiva hecha como regalo. «Fue dado voluntariamente» mantiene el carácter de ofrenda sin introducir más precisión sobre el donante que la que da el texto.
- source_word: ὑπὸ τοῦ ἔθνους
  english_pob_choice: by the nation
  chosen_spanish: por la nación
  alternatives_spanish:
  - por el pueblo
  - por la comunidad
  lexicon: BDAG
  rationale: ἔθνος designa aquí al colectivo que ofrece. «Nación» es fiel al valor formal del griego y corresponde al registro del pasaje.
- source_word: εἰς τὸ ἱερὸν
  english_pob_choice: for the temple
  chosen_spanish: para el templo
  alternatives_spanish:
  - para el santuario
  - hacia el templo
  lexicon: BDAG
  rationale: En este contexto de ofrenda, el uso final es más claro que uno locativo. «Templo» comunica bien ἱερόν sin perder la referencia cultual.
- source_word: τοῦ κυρίου αὐτῶν
  english_pob_choice: of their Lord
  chosen_spanish: de su Señor
  alternatives_spanish:
  - de su Señor Dios
  - del Señor de ellos
  lexicon: BDAG
  rationale: κύριος se vierte conforme al término POB «Señor». El posesivo se conserva como «su»; el griego no explicita «Dios», así que no se añade.
- source_word: τὸ ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - que está en Jerusalén
  lexicon: BDAG
  rationale: La construcción identifica la localización del templo. El español puede expresarlo de forma breve y clara con «en Jerusalén».
- source_word: συναχθῆναι
  english_pob_choice: to be gathered
  chosen_spanish: para ser reunidos
  alternatives_spanish:
  - para ser recogidos
  - para ser acopiados
  lexicon: BDAG
  rationale: El infinitivo pasivo expresa la acción de reunir los metales para un fin concreto. «Ser reunidos» mantiene la estructura y la pasividad del griego.
- source_word: τό τε χρυσίον καὶ ἀργύριον
  english_pob_choice: and the gold and silver
  chosen_spanish: el oro y la plata
  alternatives_spanish:
  - el oro y la plata, ambos
  - oro y plata
  lexicon: BDAG
  rationale: La correlación τε...καί une ambos metales; en español fluye mejor como una sola unidad nominal.
- source_word: εἰς ταύρους καὶ κριοὺς καὶ ἄρνας
  english_pob_choice: for bulls and rams and lambs
  chosen_spanish: para toros, carneros y corderos
  alternatives_spanish:
  - para bueyes, carneros y corderos
  - para toros, machos carneros y corderos
  lexicon: BDAG
  rationale: Son animales sacrificiales. «Toros, carneros y corderos» es claro y culto; «toros» refleja el valor concreto del griego sin forzar un tecnicismo menos natural.
- source_word: τὰ τούτοις ἀκόλουθα
  english_pob_choice: what goes with them
  chosen_spanish: lo que va con ellos
  alternatives_spanish:
  - las cosas que los acompañan
  - lo acompañante
  lexicon: BDAG
  rationale: La expresión es amplia y alude a elementos acompañantes para los sacrificios. «Lo que va con ellos» preserva esa amplitud sin especificar de más.
theological_decisions:
- issue: Diferencia entre el testimonio griego y el paralelo hebreo de Esdras 7:16
  english_pob_reading: Translate the Greek phrase 'by the nation ... of their Lord in Jerusalem' as it stands, while noting the MT parallel differs substantially.
  chosen_spanish_reading: 'Traducir la frase griega tal como está: «por la nación ... de su Señor en Jerusalén», sin armonizarla con el paralelo hebreo.'
  alternative_spanish_readings:
  - 'armonizar con el hebreo: «la plata y el oro que el rey y sus consejeros ofrecieron voluntariamente al Dios de Israel, cuya morada está en Jerusalén»'
  - reconstruir el sentido del paralelo hebreo dentro del texto español
  rationale: La primacía aquí es del testimonio griego de 1 Esdras. Dado que el expediente señala una descoincidencia importante con el paralelo masorético, la traducción debe reflejar el griego recibido y no suavizar la diferencia.
  doctrine_reference: Principio de primacía de la fuente original; nota de variante textual en el expediente POB
- issue: Alcance de τὰ τούτοις ἀκόλουθα
  english_pob_reading: Or 'the accompanying things,' likely the additional items required for the sacrifices.
  chosen_spanish_reading: «lo que va con ellos», entendiendo la expresión como referencia a elementos acompañantes de los sacrificios.
  alternative_spanish_readings:
  - «las cosas que los acompañan»
  - «los elementos acompañantes»
  - «los accesorios para ellos»
  rationale: El griego es deliberadamente general. La traducción no debe cerrar el sentido más allá de lo que el texto permite, pero sí hacer inteligible que se trata de elementos añadidos a los animales de sacrificio.
  doctrine_reference: Criterio de respeto al alcance semántico del original
- issue: Uso de κύριος en el contexto del templo
  english_pob_reading: of their Lord
  chosen_spanish_reading: «de su Señor»
  alternative_spanish_readings:
  - «de su Señor Dios»
  - «de su Amo»
  rationale: El griego usa κύριος sin añadir «Dios». En español, «Señor» conserva la correspondencia léxica y evita importar una glosa ausente del texto.
  doctrine_reference: Terminología POB para κύριος; principio de no añadir contenido no explícito
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente, que no introdujo cambios; la versión española mantiene la lectura griega principal y conserva la divergencia textual con el paralelo hebreo sin armonizarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma POB para el nombre divino, pero aquí el griego dice κύριος y el expediente inglés usa «Lord»; por eso se tradujo «Señor» sin suplir «Dios».
  - Se usó «nación» para ἔθνος siguiendo el valor formal del griego y la decisión auditada en inglés.
  - Se optó por un registro natural y publicable en español, manteniendo la estructura sintáctica del original donde era posible sin resultar artificioso.
