  text: וְ/הָיְתָ֣ה יָדִ֗/י אֶֽל הַ/נְּבִיאִ֞ים הַ/חֹזִ֣ים שָׁוְא֮ וְ/הַ/קֹּסְמִ֣ים כָּזָב֒ בְּ/ס֧וֹד עַמִּ֣/י לֹֽא יִהְי֗וּ וּ/בִ/כְתָ֤ב בֵּֽית יִשְׂרָאֵל֙ לֹ֣א יִכָּתֵ֔בוּ וְ/אֶל אַדְמַ֥ת יִשְׂרָאֵ֖ל לֹ֣א יָבֹ֑אוּ וִ/ידַעְתֶּ֕ם כִּ֥י אֲנִ֖י אֲדֹנָ֥/י יְהוִֽה־־־־׃
