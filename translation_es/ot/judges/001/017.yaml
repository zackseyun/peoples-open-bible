    text: 'O: «la destruyeron por completo» / «la pusieron bajo anatema». El verbo hebreo implica dedicar algo irrevocablemente, con frecuencia mediante destrucción.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo «él puso por nombre» o «él llamó». El singular probablemente se refiere a Judá como sujeto colectivo o representativo. Algunas traducciones lo suavizan a plural: «llamaron».'
    reason: alternative_reading
  - marker: c
    text: Horma suena al hebreo para algo «dedicado a la destrucción» (ḥerem), lo que explica el nombre de la ciudad.
    reason: lexical_alternative
  revision_rationale: Se corrigió el verbo final a singular para ajustarlo a la morfología hebrea y a la decisión léxica más fiel, aun cuando una revisión inglesa posterior lo cambió indebidamente a plural. También se fortaleció וַיַּכּוּ con «derrotaron», más adecuado para contexto militar, y se reorganizaron las notas para que expliquen tanto el ḥerem como el singular de «le puso por nombre» y el juego de palabras de Horma.
