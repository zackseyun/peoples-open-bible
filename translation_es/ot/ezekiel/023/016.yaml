translation:
  language: es
  text: A la vista de sus ojos[a], los deseó con pasión y envió mensajeros a ellos en Caldea[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al verlos'; literalmente, 'a la vista de sus ojos'.
    reason: lexical_alternative
  - marker: b
    text: O 'hacia Caldea' / 'a Caldea'. La forma hebrea tiene un sufijo direccional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעְגַּב
  english_pob_choice: she lusted after
  chosen_spanish: se apasionó por
  alternatives_spanish:
  - los deseó
  - ardió en deseo por
  - se enamoró de
  lexicon: HALOT
  rationale: El verbo עגב en este contexto de Ezequiel 23 expresa deseo erótico/intensamente sensual, no simple aprecio. En español, 'se apasionó por' comunica una atracción desordenada y fuerte sin perder por completo la dignidad del registro bíblico. 'Los deseó' es posible, pero puede sonar más general; 'se enamoró de' suavizaría demasiado la fuerza sexual del pasaje.
- source_word: עֲלֵיהֶם
  english_pob_choice: after them
  chosen_spanish: por ellos
  alternatives_spanish:
  - sobre ellos
  - tras ellos
  - de ellos
  lexicon: HALOT
  rationale: Con עגב, la preposición עַל marca idiomáticamente el objeto del deseo. En español, 'por ellos' transmite mejor la idea de deseo dirigido hacia ellos que una traducción literal como 'sobre ellos', que sonaría extraña en este contexto.
- source_word: לְמַרְאֵה עֵינֶיהָ
  english_pob_choice: At the sight of her eyes
  chosen_spanish: Al ver sus ojos
  alternatives_spanish:
  - A la vista de sus ojos
  - Al contemplar sus ojos
  - Al verlos
  lexicon: HALOT
  rationale: 'La hebraica es literalmente difícil: ''a/para la visión de sus ojos''. El inglés POB decidió conservar la tensión de la imagen. En español, ''Al ver sus ojos'' mantiene esa referencia explícita a los ojos sin forzar una construcción opaca. ''Al verlos'' sería más natural, pero perdería la huella lexical documentada por el texto original.'
- source_word: וַתִּשְׁלַח מַלְאָכִים
  english_pob_choice: and sent messengers
  chosen_spanish: envió mensajeros
  alternatives_spanish:
  - mandó mensajeros
  - envió emisarios
  - mandó emisarios
  lexicon: HALOT
  rationale: מַלְאָכִים designa mensajeros y puede implicar enviados diplomáticos. 'Mensajeros' conserva el sentido base y evita sobreespecificar su carácter oficial; 'emisarios' sería válido, pero desplaza el matiz hacia lo diplomático.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - para ellos
  - hacia ellos
  lexicon: HALOT
  rationale: El preposición אֶל señala dirección hacia los destinatarios. 'A ellos' es la equivalencia directa y natural en español.
- source_word: כַּשְׂדִּימָה
  english_pob_choice: in Chaldea
  chosen_spanish: a Caldea
  alternatives_spanish:
  - hacia Caldea
  - en Caldea
  - a la tierra de Caldea
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia Caldea. En español, 'a Caldea' preserva esa dirección sin introducir una locución menos precisa; además, evita decidir indebidamente entre 'en' y 'hacia'. Caldea es la forma estándar en español para כַּשְׂדִּים en este contexto.
theological_decisions:
- issue: Metáfora sexual de infidelidad política-religiosa
  english_pob_reading: Retain explicit erotic language with 'lusted after' rather than soften it.
  chosen_spanish_reading: Mantener un lenguaje de deseo fuerte con 'se apasionó por' en vez de suavizarlo.
  alternative_spanish_readings:
  - la admiró
  - la deseó simplemente
  - se encariñó con ellos
  rationale: Ezequiel 23 usa deliberadamente una imagen escandalosa para retratar la infidelidad de Jerusalén/Samaria. Suavizar el lenguaje reduciría la fuerza profética y borraría la tensión teológica que el texto quiere producir. 'Se apasionó por' conserva el impacto sin caer en una expresión demasiado coloquial.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de la tensión teológica'
- issue: Apertura idiomática difícil ('לְמַרְאֵה עֵינֶיהָ')
  english_pob_reading: Preserve the explicit wording behind the idiom rather than paraphrasing it as 'When she saw them.'
  chosen_spanish_reading: Conservar la referencia explícita a los ojos mediante 'Al ver sus ojos'.
  alternative_spanish_readings:
  - Cuando los vio
  - A la vista de sus ojos
  - Ante lo que vieron sus ojos
  rationale: El texto hebreo no dice simplemente 'cuando los vio'; conserva una formulación marcada que el POB inglés también reflejó. En español, la opción elegida respeta esa huella lexical y mantiene la rareza interpretativa sin volver la frase ininteligible.
  doctrine_reference: 'Principio POB: transparencia textual y auditable lexical decision-making'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del POB inglés, que prefirió reflejar con mayor cercanía la expresión hebrea inicial en lugar de parafrasearla como 'when she saw them'. Por eso la versión española conserva la referencia explícita a los ojos y añade una nota que deja visible la alternativa idiomática más natural.
  spanish_consistency_notes:
  - Usé 'Caldea' de forma consistente para כַּשְׂדִּים, siguiendo el uso español habitual y el valor direccional del hebreo.
  - Mantengo 'mensajeros' como término base para מַלְאָכִים, sin cargarlo innecesariamente con un matiz diplomático.
  - Elegí un español moderno y digno, evitando tanto el arcaísmo como la suavización del pasaje.
