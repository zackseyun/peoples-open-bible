translation:
  language: es
  text: Toma la faja que compraste, que está en tu cintura, y levántate, ve a Perat[a], y escóndela allí, en la hendidura de la roca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Perat es tradicionalmente identificado con el Éufrates; muchas traducciones, por tanto, leen «el Éufrates».
    reason: alternative_reading
lexical_decisions:
- source_word: אֵזוֹר
  english_pob_choice: waistband
  chosen_spanish: cinturón
  alternatives_spanish:
  - faja
  - banda para la cintura
  - cinturón de cintura
  lexicon: HALOT
  rationale: El término hebreo designa un objeto que se lleva alrededor de la cintura. En español, 'cinturón' comunica con claridad esa función y es natural para lectores contemporáneos. 'Faja' podría sonar más tradicional, pero también puede sugerir una prenda distinta; 'banda para la cintura' suena explicativo y menos idiomático.
- source_word: קָנִיתָ
  english_pob_choice: you bought
  chosen_spanish: compraste
  alternatives_spanish:
  - adquiriste
  - habías comprado
  lexicon: HALOT
  rationale: El verbo expresa adquisición por compra. 'Compraste' mantiene el sentido concreto y directo del texto, en línea con la decisión inglesa de no suavizarlo a un sentido más general de 'adquirir'.
- source_word: עַל מָתְנֶיךָ
  english_pob_choice: on your waist
  chosen_spanish: sobre tus lomos
  alternatives_spanish:
  - en tu cintura
  - sobre tu cintura
  lexicon: HALOT
  rationale: מָתְנַיִם/מָתְנֶיךָ apunta a la zona de los lomos o la cintura. 'Sobre tus lomos' conserva el matiz corporal del hebreo y evita reducirlo a un simple accesorio. Se prefiere esta forma por su fidelidad semántica, aunque 'en tu cintura' sería más llano.
- source_word: וְקוּם
  english_pob_choice: arise
  chosen_spanish: levántate
  alternatives_spanish:
  - alza-te
  - ponte en pie
  lexicon: HALOT
  rationale: '''Levántate'' transmite bien la orden imperativa y es natural en español. ''Arise'' en inglés tiene un registro algo elevado, pero en español ''levántate'' es la equivalencia más clara y digna; ''ponte en pie'' sería menos idiomático en esta secuencia.'
- source_word: פְּרָתָה
  english_pob_choice: Perath
  chosen_spanish: Perat
  alternatives_spanish:
  - el Éufrates
  - Peratha
  lexicon: HALOT
  rationale: Se translitera el nombre propio para conservar la forma hebrea y la cautela interpretativa del texto. Se adapta la terminación al uso español ('Perat'). Aunque muchas traducciones entienden aquí 'el Éufrates', la identificación sigue siendo debatida y no debe resolverse en el cuerpo principal sin más.
- source_word: טָמְנֵהוּ
  english_pob_choice: hide it
  chosen_spanish: escóndelo
  alternatives_spanish:
  - guárdalo oculto
  - entiérralo
  lexicon: HALOT
  rationale: '''Escóndelo'' reproduce bien el valor de ocultar/conceal y es fluido en español. ''Entiérralo'' añade un modo no exigido por el verbo, y ''guárdalo oculto'' resulta más pesado.'
- source_word: נְקִיק
  english_pob_choice: crevice
  chosen_spanish: hendidura
  alternatives_spanish:
  - grieta
  - cavidad
  lexicon: HALOT
  rationale: '''Hendidura'' expresa una abertura estrecha en la roca de forma natural y sobria. ''Grieta'' puede funcionar, pero sugiere más fractura visible; ''cavidad'' se aleja del matiz de fisura.'
- source_word: הַסָּלַע
  english_pob_choice: the rock
  chosen_spanish: la peña
  alternatives_spanish:
  - la roca
  - el peñasco
  lexicon: HALOT
  rationale: '''Peña'' conserva el campo semántico de roca/crag y suena bíblico sin resultar arcaico en exceso. ''Roca'' sería más neutro, pero pierde algo del relieve concreto que combina bien con ''hendidura''.'
theological_decisions:
- issue: Identificación de פְּרָתָה
  english_pob_reading: Render the place name as 'Perath' in the main text, with a note that many translations read 'the Euphrates.'
  chosen_spanish_reading: Mantener 'Perat' en el texto principal y señalar en nota que muchas traducciones leen 'el Éufrates'.
  alternative_spanish_readings:
  - el Éufrates
  - Peratha
  rationale: Es principalmente una cuestión geográfica y textual, no doctrinal. La transliteración preserva la forma hebrea y evita decidir prematuramente una identificación discutida. La nota conserva la alternativa tradicional para el lector hispanohablante.
  doctrine_reference: Translation philosophy §2; §3
translation_notes:
  revision_awareness: Se siguió el tramo inglés/audit sin cambios sustanciales; la traducción española conserva la transliteración del topónimo y la diferencia entre ocultar y enterrar. No se detectaron revisiones posteriores que alteraran la decisión principal.
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando el texto lo exija explícitamente; en este versículo no aparece.
  - Se conserva la secuencia verbal imperativa y el orden narrativo del hebreo.
  - Se evita 'enterrar' porque el verbo hebreo significa 'esconder/ocultar', no necesariamente sepultar.
  - Se usa una transliteración española estable del topónimo para no resolver la identificación en el cuerpo del texto.
