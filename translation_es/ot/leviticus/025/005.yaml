  text: אֵ֣ת סְפִ֤יחַ קְצִֽירְ/ךָ֙ לֹ֣א תִקְצ֔וֹר וְ/אֶת עִנְּבֵ֥י נְזִירֶ֖/ךָ לֹ֣א תִבְצֹ֑ר שְׁנַ֥ת שַׁבָּת֖וֹן יִהְיֶ֥ה לָ/אָֽרֶץ־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/005.yaml
  text: You shall not reap the aftergrowth of your harvest[a], and you shall not gather the grapes of your unpruned vine[c][b]; it shall be a year of complete rest for the land.
  footnotes:
