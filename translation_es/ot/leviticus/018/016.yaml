translation:
  language: es
  text: No descubrirás la desnudez de la esposa de tu hermano[a]; es la desnudez de tu hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más explícita: «No tendrás relaciones sexuales con la esposa de tu hermano». El hebreo usa el giro idiomático «descubrir la desnudez».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת
  english_pob_choice: the nakedness of
  chosen_spanish: la desnudez de
  alternatives_spanish:
  - la vergüenza de
  - las partes íntimas de
  lexicon: HALOT
  rationale: En este contexto legal de Levítico 18, el hebreo usa un eufemismo fijo para una relación sexual prohibida. «Desnudez» conserva el valor lexical y la repetición del original sin volverlo más explícito de lo que el texto permite.
- source_word: אֵשֶׁת
  english_pob_choice: wife of
  chosen_spanish: la mujer de
  alternatives_spanish:
  - la esposa de
  lexicon: HALOT
  rationale: El sentido en construcción con «tu hermano» es marital. «Mujer de» mantiene la estructura directa del hebreo y evita introducir un término más interpretativo que pudiera sonar menos natural en español jurídico-bíblico.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - de tu hermano
  lexicon: HALOT
  rationale: Es el término de parentesco directo y debe mantenerse con claridad. La repetición en la segunda cláusula se conserva para reflejar la lógica jurídica del hebreo.
- source_word: לֹא תְגַלֵּה
  english_pob_choice: you shall not uncover
  chosen_spanish: No descubrirás
  alternatives_spanish:
  - No debes descubrir
  - No has de descubrir
  lexicon: HALOT
  rationale: La prohibición legal con לֹא + imperfecto se vierte de forma natural en español con futuro de mandato. «Descubrir» conserva el verbo del idiomático «descubrir la desnudez» sin convertirlo en una paráfrasis sexual explícita.
- source_word: עֶרְוַת אָחִיךָ הִוא
  english_pob_choice: it is your brother’s nakedness
  chosen_spanish: es la desnudez de tu hermano
  alternatives_spanish:
  - es la desnudez de tu hermano
  - le pertenece a tu hermano
  lexicon: HALOT
  rationale: La cláusula final reafirma la identificación legal del vínculo prohibido. Repetir «desnudez» preserva la correspondencia lexical con la primera mitad del verso y mantiene la fuerza retórica del hebreo.
theological_decisions:
- issue: Si explicitar la prohibición como relaciones sexuales en el texto principal
  english_pob_reading: Retain the Hebrew idiom 'uncover the nakedness' in the main text
  chosen_spanish_reading: Conservar en el texto principal el giro idiomático «descubrir la desnudez»
  alternative_spanish_readings:
  - No tendrás relaciones sexuales con la mujer de tu hermano
  rationale: El hebreo usa un eufemismo legal establecido, no una formulación desnuda. La versión principal conserva el idiomismo para respetar la forma y la consistencia interna de Levítico 18; el sentido prohibitivo queda claro por el contexto y puede explicitarse en nota.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of key terms.'
translation_notes:
  revision_awareness: El audio textual en inglés indica alta concordancia y ningún cambio en la última revisión; por ello se mantiene la solución idiomática principal sin ajustes de fondo.
  spanish_consistency_notes:
  - Se conserva «desnudez» para el hebreo עֶרְוָה de modo consistente con el registro legal de Levítico 18.
  - Se mantiene la segunda referencia a «tu hermano» para reflejar la repetición enfática del hebreo.
  - Se usa un español bíblico moderno, sobrio y legible, sin sustituir el eufemismo por una paráfrasis más interpretativa en el cuerpo principal.
