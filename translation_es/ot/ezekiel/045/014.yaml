translation:
  language: es
  text: Y el tributo fijo del aceite será un décimo de un bato de aceite por cada coro[a], de diez batos, un homer[b], porque diez batos son un homer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bato y coro son antiguas unidades israelitas de medida; aquí la cuota es un décimo de un bato por cada coro.
    reason: cultural_note
  - marker: b
    text: 'Homer: antigua unidad de medida; el versículo aclara que diez batos equivalen a un homer.'
    reason: cultural_note
lexical_decisions:
- source_word: וְחֹק
  english_pob_choice: fixed due
  chosen_spanish: tributo fijo
  alternatives_spanish:
  - porción fijada
  - cuota fija
  - decreto fijo
  lexicon: HALOT
  rationale: En este contexto de ofrenda o imposición metrológica, חֹק no señala una 'ley' abstracta sino una cuota establecida. 'Tributo fijo' comunica el carácter prescrito y debido sin perder claridad en español.
- source_word: הַשֶּׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - óleo
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'aceite'. En español, 'aceite' es la forma natural y fiel; 'de oliva' sería una especificación no explícita en el texto.
- source_word: בַּת
  english_pob_choice: bath
  chosen_spanish: bato
  alternatives_spanish:
  - bat
  - medida de líquido
  lexicon: HALOT
  rationale: Se conserva la unidad antigua de medida por transliteración. 'Bato' es comprensible en español bíblico y mantiene la precisión metrológica del versículo.
- source_word: מַעְשַׂר
  english_pob_choice: from each
  chosen_spanish: un décimo de
  alternatives_spanish:
  - el diezmo de
  - la décima parte de
  lexicon: HALOT
  rationale: La revisión del inglés muestra que el hebreo expresa la fracción 'décimo', no una mera distribución genérica. En español, 'un décimo de' preserva con exactitud la relación fraccionaria.
- source_word: מִן הַכֹּר
  english_pob_choice: from each cor
  chosen_spanish: por cada coro
  alternatives_spanish:
  - de cada coro
  - de un coro
  lexicon: HALOT
  rationale: מִן introduce el punto de partida de la porción; 'por cada coro' expresa bien la relación distributiva y evita ambigüedad en la prosa española.
- source_word: כֹּר
  english_pob_choice: cor
  chosen_spanish: coro
  alternatives_spanish:
  - cor
  lexicon: HALOT
  rationale: Se translitera la unidad de medida en una forma legible para español. 'Coro' conserva el valor técnico sin convertirlo a una equivalencia moderna que el texto no ofrece.
- source_word: עֲשֶׂרֶת הַבַּתִּים
  english_pob_choice: ten baths
  chosen_spanish: diez batos
  alternatives_spanish:
  - diez baths
  - diez medidas de bato
  lexicon: HALOT
  rationale: La equivalencia numérica debe quedar visible sin explicarla de más. 'Diez batos' es directo y conserva la formulación metrológica.
- source_word: חֹמֶר
  english_pob_choice: homer
  chosen_spanish: homer
  alternatives_spanish:
  - jomer
  - medida homer
  lexicon: HALOT
  rationale: Se mantiene la transliteración tradicional de la unidad, ya que el verso mismo la define por equivalencia con diez batos.
- source_word: כִּי
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí כִּי introduce una aclaración explicativa, no una causalidad. 'Es decir' reproduce bien esa función en español.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión que corrigió la omisión de 'décimo' en el inglés auditado. Por eso el español expresa explícitamente la fracción 'un décimo de bato por cada coro' y mantiene la aclaración metrológica final sin convertirla en paráfrasis.
  spanish_consistency_notes:
  - 'Se preserva la secuencia explicativa del hebreo: cuota fija > fracción del bato > relación con el coro > equivalencia con el homer.'
  - Se evita 'SEÑOR' u otras sustituciones devocionales, porque el versículo trata de medidas y tributo, no del nombre divino.
  - '''Aceite'' se mantiene genérico, ya que el hebreo no especifica ''de oliva''.'
