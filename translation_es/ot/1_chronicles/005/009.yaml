translation:
  language: es
  text: Al oriente se estableció hasta la entrada del desierto[a] desde el río Éufrates, porque su ganado se había multiplicado en la tierra de Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta el desierto desde el río Éufrates». La descripción hebrea del límite es compacta y puede entenderse de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלַמִּזְרָח
  english_pob_choice: To the east
  chosen_spanish: Al oriente
  alternatives_spanish:
  - hacia el oriente
  - al este
  lexicon: HALOT
  rationale: La expresión direccional se vierte con una locución natural en español que conserva la orientación espacial sin agregar un conector innecesario al inicio de la cláusula.
- source_word: יָשַׁב
  english_pob_choice: he settled
  chosen_spanish: se estableció
  alternatives_spanish:
  - habitó
  - vivió
  lexicon: HALOT
  rationale: En este contexto territorial, el verbo expresa asentamiento y ocupación de una zona más que mera residencia; 'se estableció' comunica bien ese sentido.
- source_word: עַד לְבוֹא מִדְבָּרָה
  english_pob_choice: as far as the entrance to the wilderness
  chosen_spanish: hasta la entrada del desierto
  alternatives_spanish:
  - hasta el acceso al desierto
  - hasta el umbral del desierto
  lexicon: HALOT
  rationale: Se conserva la idea concreta de límite o borde del territorio. 'Entrada' refleja mejor que una simple equivalencia con 'al desierto' la noción de frontera/umbral presente en el hebreo.
- source_word: לְמִן הַנָּהָר פְּרָת
  english_pob_choice: from the river Euphrates
  chosen_spanish: desde el río Éufrates
  alternatives_spanish:
  - a partir del río Éufrates
  - desde el Éufrates
  lexicon: HALOT
  rationale: El hebreo presenta una construcción compacta y algo difícil; en español, 'desde' mantiene la relación espacial de procedencia/límite que la POB inglesa conserva con 'from'.
- source_word: מִקְנֵיהֶם
  english_pob_choice: their livestock
  chosen_spanish: sus ganados
  alternatives_spanish:
  - su ganado
  - sus rebaños
  lexicon: HALOT
  rationale: '''Ganados'' funciona como plural colectivo natural en español para animales de cría y mantiene el sentido amplio de posesiones pecuarias sin restringirlo a bovinos.'
- source_word: רָבוּ
  english_pob_choice: had multiplied
  chosen_spanish: se habían multiplicado
  alternatives_spanish:
  - habían aumentado
  - se multiplicaron
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un aumento ya consumado que explica el movimiento territorial; el pluscuamperfecto español reproduce bien esa relación causal y temporal.
- source_word: בְּאֶרֶץ גִּלְעָד
  english_pob_choice: in the land of Gilead
  chosen_spanish: en la tierra de Galaad
  alternatives_spanish:
  - en Galaad
  - en la región de Galaad
  lexicon: HALOT
  rationale: '''Tierra'' conserva el matiz territorial de אֶרֶץ y ''Galaad'' sigue la forma española tradicional y ampliamente inteligible del topónimo.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que unió sin coma la secuencia «as far as the entrance to the wilderness from the river Euphrates». En español se reflejó esa continuidad sintáctica con «hasta la entrada del desierto desde el río Éufrates», manteniendo además una nota para la ambigüedad reconocida por la POB.
  spanish_consistency_notes:
  - Se usa 'Éufrates' y 'Galaad' como formas españolas estándar de los topónimos bíblicos.
  - No se introdujo 'SEÑOR' ni terminología teológica ajena al versículo; el texto es puramente geográfico-causal.
  - '''Ganados'' se eligió por naturalidad y amplitud semántica; no se restringe a bovinos.'
