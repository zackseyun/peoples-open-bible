    text: Lit. «no darán raíz hacia la profundidad»; es decir, no echarán raíces profundas.
    reason: lexical_alternative
  revision_rationale: Se revisa «injertos espurios» a «retoños ilegítimos» para alinearse mejor con μοσχεύματα como brotes/retoños dentro de la metáfora vegetal y con la decisión auditada del POB. Se pasan a plural los verbos de la segunda mitad para reflejar con mayor claridad el sujeto metafórico implícito. Se ajustan las notas para conservar las alternativas significativas y la literalidad del giro sobre la raíz en profundidad.
