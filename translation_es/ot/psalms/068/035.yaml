translation:
  language: es
  text: Atribuyan[a] fuerza a Dios; su majestad está sobre Israel, y su fuerza está en los cielos altos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Den fuerza a Dios»; el hebreo usa el verbo «dar», pero aquí funciona idiomáticamente como un llamado a reconocer o atribuir la fuerza de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en las nubes» o «en los cielos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנוּ
  english_pob_choice: Ascribe
  chosen_spanish: Atribuyan
  alternatives_spanish:
  - Den
  - Reconozcan
  - Atribuyan
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa 'dar', pero en este imperativo poético dirigido a la alabanza funciona idiomáticamente como una exhortación a reconocer o atribuir a Dios una cualidad que ya posee. 'Atribuyan' conserva esa fuerza sin sugerir que el ser humano le concede a Dios algo que le falte.
- source_word: עֹז
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  - fuerza
  lexicon: HALOT
  rationale: El sustantivo expresa vigor, fuerza o poder. 'Fuerza' es natural en español y mantiene la correspondencia con el paralelismo del versículo.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  - a Dios
  lexicon: HALOT
  rationale: La preposición ל marca el destinatario del imperativo. 'A Dios' es la equivalencia moderna directa y evita un giro arcaico innecesario.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre Israel
  - encima de Israel
  - en Israel
  lexicon: HALOT
  rationale: Con גַּאֲוָתוֹ, עַל expresa con naturalidad extensión o exaltación 'sobre' Israel, en paralelo con la cláusula cósmica final. 'Sobre' preserva esa relación espacial y de dominio/majestad.
- source_word: גַּאֲוָתוֹ
  english_pob_choice: his majesty
  chosen_spanish: su majestad
  alternatives_spanish:
  - su exaltación
  - su grandeza
  - su majestad
  lexicon: HALOT
  rationale: En contexto de alabanza dirigida a Dios, el sustantivo tiene el sentido positivo de elevación, esplendor o majestad, no el de orgullo humano. 'Majestad' es la opción más idiomática y reverente en español.
- source_word: וְעֻזּוֹ
  english_pob_choice: and his strength
  chosen_spanish: y su fuerza
  alternatives_spanish:
  - y su fortaleza
  - y su poder
  - y su fuerza
  lexicon: HALOT
  rationale: Se mantiene la misma raíz con 'fuerza' para conservar el vínculo poético con la primera mitad del versículo. Esto reproduce la repetición intencional del hebreo.
- source_word: בַּשְּׁחָקִים
  english_pob_choice: in the skies
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en los cielos
  - en las nubes
  - en las alturas
  lexicon: HALOT
  rationale: שְׁחָקִים en poesía puede referirse a los cielos altos, las nubes o el firmamento. 'En los cielos' es una solución natural y reverente en español, amplia lo suficiente para no reducir el término a un fenómeno meteorológico específico.
theological_decisions:
- issue: Si el imperativo implica que los humanos entregan fuerza a Dios o si llaman a reconocerla
  english_pob_reading: Render the idiom as 'Ascribe strength to God'
  chosen_spanish_reading: Atribuyan fuerza a Dios
  alternative_spanish_readings:
  - Den fuerza a Dios
  - Reconozcan la fuerza de Dios
  rationale: La lectura de la POB en inglés entiende el verbo como una exhortación idiomática a reconocer la fuerza divina. 'Atribuyan' conserva el valor de adjudicar/reconocer sin sugerir que Dios dependa de un aporte humano.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de auditoría más reciente; el dictamen de revisión indica acuerdo alto y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y 'fuerza' para עֹז de manera consistente con el paralelismo interno.
  - Se usa 'cielos' para שְׁחָקִים porque el campo semántico es más amplio que 'nubes' y encaja mejor con el registro bíblico-poético.
  - Se evita 'SEÑOR' porque el texto hebreo aquí contiene אֱלֹהִים, no el tetragrámaton.
