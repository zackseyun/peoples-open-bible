translation:
  language: es
  text: 'Pero el ángel de Yahvé[a] habló a Elías el tisbita: «Levántate, sube al encuentro de los mensajeros del rey de Samaria, y diles: “¿Es porque no hay Dios en Israel[b] que ustedes van a consultar a Baal-zebub, el dios de Ecrón?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mensajero de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Es por falta de un Dios en Israel…?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: Mantengo el valor narrativo de מַלְאַךְ como 'ángel' en este contexto, tal como lo hace el POB en inglés, y traduzco יְהוָה por 'Yahvé' según el criterio del proyecto para el Nombre divino.
- source_word: דִּבֶּר אֶל
  english_pob_choice: spoke to
  chosen_spanish: habló a
  alternatives_spanish:
  - dijo a
  lexicon: HALOT
  rationale: '''Habló a'' conserva el matiz verbal de דבר אל y suena natural en español sin perder precisión.'
- source_word: אֵלִיָּה הַתִּשְׁבִּי
  english_pob_choice: Elijah the Tishbite
  chosen_spanish: Elías el tisbita
  alternatives_spanish:
  - Elías de Tisbe
  lexicon: HALOT
  rationale: Se conserva el nombre propio y el gentilicio tradicional 'tisbita', equivalente natural en español para הַתִּשְׁבִּי.
- source_word: קוּם עֲלֵה
  english_pob_choice: Get up, go up
  chosen_spanish: Levántate, sube
  alternatives_spanish:
  - Ponte en pie, sube
  - Levántate, ve
  lexicon: HALOT
  rationale: 'Se distinguen los dos imperativos: קוּם como ''levántate'' y עֲלֵה como ''sube'', preservando la fuerza y la direccionalidad del hebreo.'
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: al encuentro de
  alternatives_spanish:
  - para encontrarte con
  - para salir al encuentro de
  lexicon: HALOT
  rationale: '''Al encuentro de'' transmite bien la finalidad y evita cargar el verbo con una idea de confrontación que no está exigida por el hebreo.'
- source_word: מַלְאֲכֵי מֶלֶךְ שֹׁמְרוֹן
  english_pob_choice: the messengers of the king of Samaria
  chosen_spanish: los mensajeros del rey de Samaria
  alternatives_spanish:
  - los enviados del rey de Samaria
  lexicon: HALOT
  rationale: Aquí מַלְאָךְ designa agentes humanos; 'mensajeros' mantiene la diferencia con 'ángel' en la primera cláusula. Se conserva 'rey de Samaria' como en el texto hebreo.
- source_word: וְדַבֵּר אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y háblales
  - y habla con ellos
  lexicon: HALOT
  rationale: En español, la introducción de discurso directo fluye mejor con 'diles', sin perder el valor del imperativo de דבר.
- source_word: הֲמִבְּלִי אֵין אֱלֹהִים בְּיִשְׂרָאֵל
  english_pob_choice: Is it because there is no God in Israel
  chosen_spanish: ¿Es porque no hay Dios en Israel
  alternatives_spanish:
  - ¿Es por falta de un Dios en Israel
  - ¿Es porque no existe Dios en Israel
  lexicon: HALOT
  rationale: Se reproduce la pregunta retórica y el sentido de reprensión. 'No hay Dios en Israel' refleja el hebreo con naturalidad, aunque el matiz alternativo 'por falta de' queda preservado en nota.
- source_word: אַתֶּם הֹלְכִים
  english_pob_choice: you are going
  chosen_spanish: ustedes van
  alternatives_spanish:
  - ustedes están yendo
  - van ustedes
  lexicon: HALOT
  rationale: El participio expresa acción en curso o intención; 'van' es la forma más natural en español para esta construcción en contexto.
- source_word: לִדְרֹשׁ
  english_pob_choice: to inquire of
  chosen_spanish: a consultar
  alternatives_spanish:
  - a inquirir de
  - a buscar respuesta de
  lexicon: HALOT
  rationale: En contexto oracular, דרש apunta a buscar respuesta divina. 'Consultar' comunica bien ese sentido en español y es idiomático.
- source_word: בְּעַל זְבוּב
  english_pob_choice: Baal-zebub
  chosen_spanish: Baal-zebub
  alternatives_spanish:
  - Baal Zebub
  lexicon: HALOT
  rationale: Se translitera el nombre propio con guion, como en el POB inglés, para conservar su forma compuesta y su reconocimiento lector.
- source_word: אֱלֹהֵי עֶקְרוֹן
  english_pob_choice: the god of Ekron
  chosen_spanish: el dios de Ecrón
  alternatives_spanish:
  - el dios de Ekron
  lexicon: HALOT
  rationale: Se traduce אֱלֹהֵי como 'el dios de' y se adapta el topónimo a la forma española habitual 'Ecrón'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrama. Conforme al criterio terminológico del proyecto, el nombre divino se vierte 'Yahvé' en el texto principal, no como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de la pregunta retórica sobre 'no hay Dios en Israel'
  english_pob_reading: Is it because there is no God in Israel
  chosen_spanish_reading: ¿Es porque no hay Dios en Israel?
  alternative_spanish_readings:
  - ¿Es por falta de un Dios en Israel?
  rationale: Se mantiene la fuerza de reproche y la ambigüedad lexical entre ausencia real y carencia funcional. La alternativa literal se preserva como posibilidad semántica sin imponerla en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto sigue de cerca la última versión inglesa aprobada, sin cambios posteriores en el pasaje. Se preserva la distinción entre el ángel de Yahvé y los mensajeros humanos, así como la pregunta retórica con su posible matiz alternativo.
  spanish_consistency_notes:
  - Yahvé se usa para el Nombre divino en todo el registro.
  - '''ángel'' se reserva para מַלְאַךְ divino; ''mensajeros'' para מַלְאֲכֵי humanos.'
  - '''Ecrón'' sigue la forma española habitual del topónimo.'
  - Se mantiene un estilo bíblico moderno y claro, sin arcaísmos innecesarios.
