translation:
  language: es
  text: Todos los reyes de la tierra te darán gracias, Yahvé[a], porque han oído las palabras de tu boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; se conserva el nombre divino como «Yahvé» en vez de sustituirlo por un título.'
    reason: alternative_reading
lexical_decisions:
- source_word: יוֹדוּךָ
  english_pob_choice: will give thanks to you
  chosen_spanish: te darán gracias
  alternatives_spanish:
  - te alabarán
  - te agradecerán
  lexicon: HALOT
  rationale: El hifil de ידה puede expresar dar gracias o alabar. En español, «dar gracias» conserva la dirección personal hacia Yahvé y encaja naturalmente con el tono de salmo de acción de gracias.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton con la forma de uso del proyecto en español, evitando sustituirlo por un título genérico.
- source_word: כָּל מַלְכֵי אָרֶץ
  english_pob_choice: all the kings of the earth
  chosen_spanish: Todos los reyes de la tierra
  alternatives_spanish:
  - Cada rey de la tierra
  - Todos los gobernantes de la tierra
  lexicon: HALOT
  rationale: 'La expresión hebrea es colectiva y específica: «reyes» debe mantenerse, sin generalizar a «gobernantes». «Todos los» refleja bien כָּל.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón por la cual los reyes darán gracias. «Porque» comunica con claridad la relación causal en español.
- source_word: שָׁמְעוּ
  english_pob_choice: they have heard
  chosen_spanish: han oído
  alternatives_spanish:
  - oyeron
  - han escuchado
  lexicon: HALOT
  rationale: El qatal se entiende como acción completa que fundamenta la respuesta futura. «Han oído» conserva ese valor y suena natural en español.
- source_word: אִמְרֵי פִיךָ
  english_pob_choice: the words of your mouth
  chosen_spanish: las palabras de tu boca
  alternatives_spanish:
  - los dichos de tu boca
  - las palabras que han salido de tu boca
  lexicon: HALOT
  rationale: «Palabras de tu boca» reproduce la imagen hebrea de modo transparente y idiomático en español. «Dichos» sería más arcaico; la expansión relativa añade más de lo que el hebreo expresa explícitamente.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma «Yahvé» mantiene el nombre propio de Dios según la convención del proyecto en español y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La revisión más reciente marcó el versículo como sin cambios necesarios; el borrador español sigue la misma lectura de alta concordancia: agradecimiento dirigido a Yahvé por haber oído sus palabras.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el nombre divino.
  - Se conserva «dar gracias» para יוֹדוּךָ, en paralelo con la elección inglesa.
  - La estructura causal «porque han oído...» refleja la secuencia hebrea sin añadir elementos interpretativos.
  - «Las palabras de tu boca» preserva la imaginería concreta del hebreo.
