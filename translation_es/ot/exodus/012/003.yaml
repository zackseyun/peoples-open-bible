review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general el sentido del hebreo y del POB inglés: mandato de dirigirse a toda la congregación, fecha específica, obligación distributiva de cada hombre, y la estructura ‘un cordero ... para la casa’. Sin embargo, hay un desajuste importante en el número verbal inicial: דַּבְּרוּ es imperativo plural, por lo que ‘Habla’ no preserva fielmente la forma ni el destinatario plural implícito. Además, ‘para la casa’ suena menos claro en español que ‘para la familia/hogar’, y aquí el sentido documentado es unidad doméstica, no edificio.'
  spanish_quality_summary: El español es mayormente claro y digno, pero ‘Habla ... y di’ resulta internamente inconsistente al pasar de singular a singular donde el hebreo manda en plural. ‘Hablen ... diciendo’ fluye mejor y evita forzar un singular no presente. También conviene mejorar ‘para la casa’ a ‘para la familia’ o ‘para el hogar’; ‘familia’ comunica con más naturalidad la unidad doméstica en español neutral. ‘El día diez’ es comprensible, aunque ‘el décimo día’ o ‘el día diez’ ambos funcionan; no requiere cambio obligatorio.
  glossary_alignment: No hay conflicto con los términos doctrinales centrales del glosario. ‘Congregación’ alinea bien con עֲדָה. ‘Cordero’ está justificado por el contexto pascual, y la nota léxica conserva la amplitud de שֶׂה. La principal corrección es de fidelidad gramatical y claridad idiomática, no de terminología teológica.
  issues:
  - severity: high
    issue: Imperativo plural hebreo renderizado como singular (‘Habla’).
    rationale: דַּבְּרוּ es claramente 2mp. El borrador justifica un singular dirigido a Moisés y Aarón, pero el hebreo no lo dice en singular; en una traducción fuente-cercana esto debe preservarse con ‘Hablen’ o equivalente plural.
  - severity: medium
    issue: ‘y di’ no refleja idealmente לֵאמֹר tras un imperativo plural.
    rationale: Aunque funcional, ‘y di’ continúa el singular ya problemático. ‘Diciendo’ o ‘y digan’ preserva mejor la introducción de la cita en español bíblico natural.
  - severity: medium
    issue: ‘un cordero para la casa’ es menos natural y menos preciso que una expresión de unidad doméstica.
    rationale: El propio expediente inglés documenta que בַּיִת aquí significa ‘household’. En español neutral, ‘familia’ comunica mejor ese referente que ‘casa’, que puede sonar a edificio.
  revised_spanish_text: 'Hablen a toda la congregación de Israel,[a] diciendo: «El día diez de este mes cada hombre tomará para sí un cordero, según la casa de sus padres; un cordero para la familia».

