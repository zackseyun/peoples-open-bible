translation:
  language: es
  text: y no se acuerdan[a], cuando están bebiendo, de mostrar afecto[b] a amigos y hermanos[c], y al poco tiempo sacan espadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'no se acuerda'; el verbo griego está en singular, pero la cláusula funciona en sentido genérico en este contexto y por eso se traduce en plural.
    reason: lexical_alternative
  - marker: b
    text: '''Mostrar afecto'' también puede entenderse como ''ser afectuosos con'' o, menos probablemente aquí, ''besar''.'
    reason: lexical_alternative
  - marker: c
    text: '''Hermanos'' conserva el emparejamiento retórico del griego φίλοις καὶ ἀδελφοῖς; alternativas como ''parientes'' serían más interpretativas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μέμνηται
  english_pob_choice: they do not remember
  chosen_spanish: no se acuerdan
  alternatives_spanish:
  - no recuerdan
  - no se acuerdan de
  lexicon: LSJ
  rationale: El griego es formalmente singular, pero el contexto y el participio plural permiten una lectura genérica; en español, el plural impersonal comunica mejor el sentido colectivo. 'Acordarse' es natural y conserva la idea de no tener presente algo.
- source_word: ὅταν πίνωσιν
  english_pob_choice: when they are drinking
  chosen_spanish: cuando están bebiendo
  alternatives_spanish:
  - cuando beben
  - cuando están tomando
  lexicon: LSJ
  rationale: ὅταν con subjuntivo expresa una situación general y repetida; 'están bebiendo' mantiene el valor aspectual continuo y suena natural en español. No se suaviza el contexto de consumo que lleva al conflicto.
- source_word: φιλάζειν
  english_pob_choice: to show affection
  chosen_spanish: mostrar afecto
  alternatives_spanish:
  - ser afectuosos con
  - dar muestras de cariño a
  - besar
  lexicon: LSJ
  rationale: El verbo apunta a un trato afectuoso hacia otros. 'Mostrar afecto' conserva la amplitud semántica sin reducirlo a un beso literal, que sería demasiado específico para este contexto.
- source_word: φίλοις καὶ ἀδελφοῖς
  english_pob_choice: friends and brothers
  chosen_spanish: amigos y hermanos
  alternatives_spanish:
  - amigos y hermanos/simpatizantes
  - amigos y parientes
  lexicon: LSJ
  rationale: '''Hermanos'' conserva la correlación relacional del griego y sigue el uso eclesial comprensible en español, sin forzar una traducción más difusa como ''parientes''. La pareja retórica ''amigos y hermanos'' se mantiene.'
- source_word: μετʼ οὐ πολὺ
  english_pob_choice: before long
  chosen_spanish: no mucho después
  alternatives_spanish:
  - antes de mucho
  - poco después
  - al poco tiempo
  lexicon: LSJ
  rationale: La expresión idiomática indica un intervalo breve; 'no mucho después' es fiel, claro y no introduce un matiz temporal más fuerte que el original.
- source_word: σπῶνται μαχαίρας
  english_pob_choice: they draw swords
  chosen_spanish: sacan espadas
  alternatives_spanish:
  - desenvainan espadas
  - sacan sus espadas
  - desenvainan las espadas
  lexicon: LSJ
  rationale: La imagen es la de desarmar o extraer armas para el combate. 'Sacan espadas' es natural en español y preserva la brusquedad de la acción; 'desenvainan' sería posible, pero suena más técnico/literario.
translation_notes:
  revision_awareness: 'La versión inglesa reciente solo ajustó la puntuación para aclarar el sintagma temporal (''when they are drinking'') sin cambiar el contenido. La traducción española refleja ese mismo valor temporal con una coma equivalente y mantiene el orden lógico: olvido en la bebida, afecto omitido, y violencia poco después.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y sobrio.
  - Se evitó 'Cristo'/'Señor' porque el pasaje no contiene terminología cristológica ni el Tetragrámaton.
  - '''Sacan espadas'' conserva la violencia repentina del cierre sin añadir detalles inexistentes.'
  - La puntuación con comas reproduce la clausula temporal de manera clara en español.
