translation:
  language: es
  text: Así pues, harás bien[a] en enviarnos hombres que combatan a mi lado, porque todas mis fuerzas me han desertado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que sean aliados conmigo»; el verbo griego puede denotar apoyo militar aliado, aquí expresado como combate al lado del hablante.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  english_pob_choice: Now then
  chosen_spanish: Así pues
  alternatives_spanish:
  - Ahora bien
  - Pues ahora
  lexicon: LSJ
  rationale: La combinación introduce una conclusión o transición exhortativa; «Así pues» conserva el valor inferencial sin sonar forzado en español.
- source_word: ὀρθῶς ποιήσεις
  english_pob_choice: you will do well
  chosen_spanish: harás bien
  alternatives_spanish:
  - obrarás correctamente
  - harás lo correcto
  lexicon: LSJ
  rationale: La expresión no enuncia solo rectitud moral, sino que recomienda la acción pedida; «harás bien» mantiene ese tono idiomático y natural.
- source_word: ἀποστείλας
  english_pob_choice: to send
  chosen_spanish: enviarnos
  alternatives_spanish:
  - mandarnos
  - hacer llegar a nosotros
  lexicon: LSJ
  rationale: 'En español, el infinitivo complementario con objeto indirecto expresa bien la petición: enviar a nosotros = enviarnos. Se evita un calco incómodo.'
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: LSJ
  rationale: 'El dativo de destinatario se vuelve naturalmente pronombre enclítico en español: «enviarnos».'
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - soldados
  lexicon: LSJ
  rationale: El griego dice literalmente «hombres». «Soldados» sería más interpretativo; el contexto militar queda aclarado por la cláusula siguiente.
- source_word: οἳ συμμαχήσουσίν μοι
  english_pob_choice: who will fight alongside me
  chosen_spanish: que combatan junto conmigo
  alternatives_spanish:
  - que sean aliados conmigo
  - que me apoyen en la batalla
  lexicon: LSJ
  rationale: συμμαχέω puede implicar alianza militar activa. «Combatan junto conmigo» conserva el sentido bélico explícito que la POB inglesa desarrolló.
- source_word: ἀπέστησαν
  english_pob_choice: have deserted
  chosen_spanish: me han desertado
  alternatives_spanish:
  - se han apartado
  - han desertado
  lexicon: LSJ
  rationale: En este contexto militar, el verbo expresa abandono/deserción. Se conserva la relación personal con el hablante mediante «me han desertado».
- source_word: πᾶσαι αἱ δυνάμεις μου
  english_pob_choice: all my forces
  chosen_spanish: todas mis fuerzas
  alternatives_spanish:
  - todas mis tropas
  - todo mi ejército
  lexicon: LSJ
  rationale: δυνάμεις admite el sentido de fuerzas militares. «Fuerzas» preserva la amplitud del término sin cerrar el referente a una unidad técnica específica.
translation_notes:
  revision_awareness: El pasaje griego y la auditoría inglesa coinciden en alto grado; no se detectaron revisiones sustantivas que afecten la traducción española.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita «Cristo/Mesías» porque no aparece en el texto.
  - Se preserva el matiz militar de συμμαχήσουσιν mediante una formulación de combate aliado, no solo ayuda general.
