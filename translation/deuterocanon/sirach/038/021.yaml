theological_decisions:
- issue: Whether to render תקוה by its usual lexical sense 'hope' or to follow the Greek-supported contextual sense 'return'
  chosen_reading: for there is no return
  alternative_readings:
  - for he has no hope
  - for there is no hope for him
  rationale: The Hebrew witness is primary, but the Greek parallel is to be used as actual translation input. In a context about mourning the dead, 'no return' gives the practical force of the admonition and is directly supported by the Greek. Because the Hebrew more literally points to 'hope,' that alternative is preserved in a footnote rather than erased.
  doctrine_reference: 'Translation philosophy: original-language primacy with parallel-source consultation; preserve ambiguity/tension in footnotes where warranted.'
