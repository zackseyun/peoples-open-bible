  text: לָ/כֵ֗ן יֵשְׁב֤וּ צִיִּים֙ אֶת אִיִּ֔ים וְ/יָ֥שְׁבוּ בָ֖/הּ בְּנ֣וֹת יַֽעֲנָ֑ה וְ/לֹֽא תֵשֵׁ֥ב עוֹד֙ לָ/נֶ֔צַח וְ/לֹ֥א תִשְׁכּ֖וֹן עַד דּ֥וֹר וָ/דֽוֹר־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/050/039.yaml
  text: Therefore desert creatures will dwell there with hyenas[a], and ostriches will dwell in her; she will never again be inhabited[c][b], nor will she be dwelt in from generation to generation.
  footnotes:
  - marker: a
    text: Or 'with jackals' or 'with howling creatures'; the exact identification of the Hebrew terms for these desert animals is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Literally 'daughters of the ostrich,' that is, ostriches. Older English versions sometimes render this as 'owls.'
    reason: lexical_alternative
  - marker: c
    text: 'The city is personified as feminine in Hebrew: ''in her,'' ''she will not be inhabited.'''
    reason: cultural_note
