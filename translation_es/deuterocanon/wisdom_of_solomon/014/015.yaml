revisions:
- from: Porque un padre[a], desgastado por el dolor prematuro por el hijo rápidamente arrebatado, hizo una imagen del que entonces estaba muerto, y ahora lo honró como a un dios, y entregó misterios y ritos a los que estaban bajo su autoridad[b];
  to: Porque un padre, consumido por el dolor de su niño[a] arrebatado demasiado pronto, hizo una imagen del que entonces estaba muerto, y ahora lo honró como a un dios, y transmitió misterios y ritos a los que estaban bajo su autoridad[b];
  rationale: Se corrigió 'hijo' a 'niño' para respetar la falta de especificación de τέκνον; se sustituyó 'entregó' por 'transmitió' para reflejar mejor παρέδωκεν como transmisión de tradición cultual; y se rehízo el inicio para evitar la expresión poco natural 'dolor prematuro', preservando el sentido de duelo por una pérdida antes de tiempo. También se suavizó 'rápidamente arrebatado' a 'arrebatado demasiado pronto' para un español más natural y fiel al matiz contextual.
