translation:
  language: es
  text: 'Entonces Jeremías mandó a Baruc[a], diciendo: «Estoy restringido; no puedo ir a la casa de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estoy confinado», «estoy encerrado» o «me lo impiden». El hebreo es ambiguo respecto de la naturaleza exacta de la restricción de Jeremías.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַוֶּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: HALOT
  rationale: El piel de צוה expresa dar una orden o mandato. En español, «mandó» conserva la fuerza directiva sin sonar excesivamente formal o administrativo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y le dijo
  - así diciendo
  lexicon: HALOT
  rationale: Es el introducer de discurso directo normal en español y no añade contenido adicional.
- source_word: עָצוּר
  english_pob_choice: restrained
  chosen_spanish: detenido
  alternatives_spanish:
  - confinado
  - retenido
  - impedido
  - encerrado
  lexicon: HALOT
  rationale: El participio pasivo es semánticamente ambiguo respecto de la clase exacta de restricción. «Detenido» preserva esa ambigüedad mejor que «encerrado», que sugeriría cárcel de forma más específica.
- source_word: לֹא אוּכַל
  english_pob_choice: I cannot
  chosen_spanish: no puedo
  alternatives_spanish:
  - no soy capaz de
  - no me es posible
  lexicon: HALOT
  rationale: La negación de יכול en primera persona se expresa de manera natural y directa con «no puedo».
- source_word: לָבוֹא
  english_pob_choice: go into
  chosen_spanish: ir a
  alternatives_spanish:
  - entrar en
  - ir dentro de
  lexicon: HALOT
  rationale: Con בית, el sentido es acceso al recinto/casa; en español, «ir a la casa de» suena natural y conserva la perspectiva del hablante sin forzar un matiz más técnico que el hebreo no exige.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el valor literal de בית יהוה y el criterio del proyecto para el Tetragrámaton: «Yahvé» en el texto principal. «Casa» mantiene la metáfora hebrea sin sustituirla por «templo».'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se aplica el término base del proyecto para el nombre divino en español, preservando el nombre propio del pacto en lugar de la convención de máscara «SEÑOR».
theological_decisions:
- issue: Nombre divino יְהוָה en la frase בית יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de manera directa. Conforme al criterio del proyecto, se mantiene el nombre divino en forma de nombre propio español, no una sustitución litúrgica por mayúsculas.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión inglesa auditada usa una traducción óptima y mantiene la ambigüedad de עָצוּר con una nota. No se reportan revisiones textuales ni cambios pendientes; el presente español sigue ese mismo perfil, conservando la ambigüedad y el nombre divino según la norma del proyecto.
  spanish_consistency_notes:
  - Se mantuvo la metáfora «casa de Yahvé» en vez de «templo», para no desplazar el hebreo בית.
  - «Detenido» conserva la indeterminación de עָצוּר y evita especificar cárcel o prohibición ritual.
  - Se usó «Yahvé» como forma española del nombre divino, consistente con el criterio del proyecto.
