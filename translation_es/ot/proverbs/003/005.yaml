translation:
  language: es
  text: Confía en Yahvé con todo tu corazón, y no te apoyes[a] en tu propio entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no confíes en tu propio entendimiento». El verbo hebreo significa literalmente «apoyarse» o «sostenerse» en algo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטַח
  english_pob_choice: Trust
  chosen_spanish: Confía
  alternatives_spanish:
  - Pon tu confianza
  - Ten confianza
  lexicon: HALOT
  rationale: El imperativo hebreo pide una acción directa de confianza; «confía» es natural en español y conserva la dependencia relacional sin expandir el sentido.
- source_word: אֶל יְהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - en el Yahvé
  lexicon: HALOT
  rationale: Aunque אֶל puede ser «hacia/a», con בטח el español idiomático es «confiar en». Se mantiene el nombre divino como «Yahvé» según la política del proyecto.
- source_word: בְּכָל לִבֶּךָ
  english_pob_choice: with all your heart
  chosen_spanish: con todo tu corazón
  alternatives_spanish:
  - con todo tu ser
  - con todo tu interior
  lexicon: HALOT
  rationale: «Corazón» preserva el valor antropológico amplio de לֵב/לֵבָב como centro de pensamiento, voluntad y afecto; «con todo» expresa totalidad.
- source_word: בִּינָתְךָ
  english_pob_choice: your own understanding
  chosen_spanish: tu propia comprensión
  alternatives_spanish:
  - tu propio entendimiento
  - tu discernimiento
  lexicon: HALOT
  rationale: בִּינָה denota entendimiento/discernimiento. «Comprensión» es claro y amplio en español; «tu propia» refleja el sufijo posesivo y la contraposición con confiar en Yahvé.
- source_word: תִּשָּׁעֵן
  english_pob_choice: lean
  chosen_spanish: te apoyes
  alternatives_spanish:
  - te sostengas
  - te recuestes
  lexicon: HALOT
  rationale: El verbo conserva la metáfora de apoyarse físicamente en algo. En español, «apoyarse en» comunica mejor la imagen que «confiar en» o «depender de» y respeta la fuerza lexical del verbo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la decisión doctrinal y editorial de transliterar el Tetragrámaton en vez de sustituirlo por un título. «Yahvé» es la forma establecida en el proyecto para el nombre personal de Dios.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre confianza y apoyo en la propia comprensión
  english_pob_reading: do not lean on your own understanding
  chosen_spanish_reading: no te apoyes en tu propia comprensión
  alternative_spanish_readings:
  - no confíes en tu propio entendimiento
  - no te sostengas en tu propio discernimiento
  rationale: Se conserva la metáfora de sostenerse/apoyarse, que el POB marcó como importante al añadir la nota sobre el sentido literal de «lean». «Comprensión» evita estrechar בִּינָה solo a la facultad intelectual, pero mantiene el contraste con confiar en Yahvé.
  doctrine_reference: Wisdom literature anthropological usage of לֵב and בִּינָה
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audit trail inglés y no requiere revisiones adicionales. Se mantuvo la imagen verbal de «apoyarse» para reflejar la nota léxica del inglés POB, y se conservó «Yahvé» como nombre divino. No se detectan tensiones textuales nuevas en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - «Corazón» y «comprensión» mantienen el campo semántico amplio de antropología sapiencial sin forzar una lectura psicológica estrecha.
  - La nota[a] queda anclada en la frase «con todo tu corazón» para preservar la alternativa léxica sobre el verbo final.
