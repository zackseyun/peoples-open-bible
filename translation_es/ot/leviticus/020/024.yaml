review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura básica del hebreo y conserva correctamente «Yahvé» y «los pueblos». Sin embargo, no sigue del todo la elección auditada del POB para יָרַשׁ, que prioriza «poseer» en ambas ocurrencias con nota para «heredar/inherit». Además, «una tierra que fluye leche y miel» es español poco natural y omite la preposición; el modismo establecido y fiel es «una tierra que fluye con leche y miel» o mejor «una tierra que mana leche y miel».
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero presenta dos puntos de mejora importantes: 1) mezcla innecesariamente «heredarán» con «poseerla», cuando el rastro léxico del POB favorece consistencia con «poseer» en el texto principal; 2) «que fluye leche y miel» suena forzado en español. También conviene reproducir la coma fuerte/guion del inglés con una puntuación española más natural antes de la aposición «una tierra...».'
  glossary_alignment: 'Alinea bien con la terminología del proyecto en «Yahvé» para יְהוָה y «Dios» para אֱלֹהִים. «Los pueblos» coincide con la decisión documentada para הָעַמִּים. El principal desajuste terminológico es יָרַשׁ: el POB inglés eligió «possess» en el texto principal y relegó «inherit» a nota; en español debería hacerse lo mismo con «poseer / tomar posesión» en texto y «heredar» en nota.'
  issues:
  - severity: medium
    issue: Renderización principal de יָרַשׁ como «heredarán»
    rationale: El expediente inglés escogió «you shall possess» como lectura principal y dejó «inherit» en nota. El español invierte esa prioridad sin razón contextual nueva suficiente.
  - severity: medium
    issue: Modismo «una tierra que fluye leche y miel»
    rationale: En español falta naturalidad idiomática; además, «fluir» normalmente requiere «con». La frase tradicional y fiel es «una tierra que mana leche y miel», o secundariamente «que fluye con leche y miel».
  - severity: low
    issue: Puntuación de la aposición «una tierra...»
    rationale: Tras «para poseerla» conviene usar dos puntos, punto y coma, o raya para introducir la descripción aposicional; la coma simple deja la frase algo trabada.
  revised_spanish_text: 'Pero yo les dije: «Ustedes poseerán[a] su tierra, y yo mismo se la daré para poseerla: una tierra que mana[b] leche y miel. Yo soy Yahvé[c], su Dios, que los he separado[d] de los pueblos».'
  revised_footnotes:
