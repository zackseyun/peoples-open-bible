  yaml_path: translation/ot/2_samuel/019/012.yaml
  text: And King David sent to Zadok and to Abiathar the priests[a], saying, “Speak to the elders of Judah, saying, ‘Why should you be the last to bring the king back to his house, when the word of all Israel has come to the king, to his house?’”
  footnotes:
