lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y ... [marcador de objeto] dejado sin traducir
  lexicon: HALOT
  rationale: En esta lista genealógica, el hebreo repite la conjunción וְ con la partícula אֶת antes de cada nombre. En español natural, la función se expresa con la repetición de «y»; la partícula de objeto no tiene equivalente idiomático directo aquí.
- source_word: עוֹבָל
  english_pob_choice: Obal
