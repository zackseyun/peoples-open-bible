translation:
  language: es
  text: Traeré contra Elam los cuatro vientos de los cuatro extremos de los cielos[a], y los esparciré a todos estos vientos. No habrá nación a la que no vayan los desterrados[b] de Elam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los cuatro rincones del cielo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los dispersos de Elam»; o: «los expulsados de Elam».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתִי
  english_pob_choice: I will bring against
  chosen_spanish: Traeré contra
  alternatives_spanish:
  - Traeré a
  - Traeré sobre
  lexicon: HALOT
  rationale: En este contexto de juicio, el hebreo con אֶל admite un valor hostil. «Traeré contra» preserva la dirección del movimiento y la fuerza judicial, con español natural.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - Elán
  lexicon: HALOT
  rationale: Nombre propio geográfico/étnico; se translitera sin adaptación para mantener la referencia histórica del texto.
- source_word: אַרְבַּע רוּחוֹת
  english_pob_choice: the four winds
  chosen_spanish: los cuatro vientos
  alternatives_spanish:
  - cuatro vientos
  - los cuatro espíritus
  lexicon: HALOT
  rationale: Aquí רוּחוֹת funciona como vientos/direcciones, apoyado por la frase siguiente sobre los extremos de los cielos. «Vientos» conserva la imagen sin introducir «espíritus».
- source_word: מֵאַרְבַּע קְצוֹת הַשָּׁמַיִם
  english_pob_choice: from the four ends of the heavens
  chosen_spanish: de los cuatro extremos de los cielos
  alternatives_spanish:
  - de los cuatro rincones del cielo
  - de los cuatro confines de los cielos
  lexicon: HALOT
  rationale: קְצוֹת son extremos o confines. «Extremos de los cielos» sigue de cerca la imagen hebrea; «cielos» es preferible en español bíblico a «cielo» singular por el plural del original.
- source_word: וְזֵרִתִים
  english_pob_choice: and I will scatter them
  chosen_spanish: y los esparciré
  alternatives_spanish:
  - y los dispersaré
  - y los aventaré
  lexicon: HALOT
  rationale: זרה tiene el matiz de dispersar/esparcir como al aventar grano. «Esparciré» es fiel y natural; «dispersaré» es posible, pero «esparcir» conserva mejor la imagen activa.
- source_word: לְכֹל הָרֻחוֹת הָאֵלֶּה
  english_pob_choice: to all these winds
  chosen_spanish: a todos estos vientos
  alternatives_spanish:
  - hacia todos estos vientos
  - a todas estas direcciones
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con «vientos» del primer hemistiquio. «A» refleja la dirección del movimiento sin forzar una paráfrasis interpretativa.
- source_word: וְלֹא יִהְיֶה הַגּוֹי אֲשֶׁר לֹא יָב֥וֹא שָׁם
  english_pob_choice: There will be no nation to which the outcasts of Elam will not go
  chosen_spanish: No habrá nación adonde no lleguen
  alternatives_spanish:
  - No habrá nación a la que no vayan
  - No habrá nación a donde no vayan
  lexicon: HALOT
  rationale: El giro expresa total dispersión. «Adonde no lleguen» comunica con claridad la idea de movimiento hacia cada nación, en línea con la revisión inglesa que precisó la relación de destino.
- source_word: נִדְּחֵי
  english_pob_choice: the outcasts
  chosen_spanish: los dispersos
  alternatives_spanish:
  - los desterrados
  - los expulsados
  - los exiliados
  lexicon: HALOT
  rationale: נדחי puede expresar los echados fuera o dispersados. «Dispersos» preserva el vínculo con la imagen de dispersión del verso y evita sobrecargar con una decisión legal específica que el hebreo no exige aquí.
theological_decisions:
- issue: Imagen de juicio por dispersión total
  english_pob_reading: I will bring against Elam... I will scatter them... There will be no nation to which the outcasts of Elam will not go.
  chosen_spanish_reading: Traeré contra Elam... los esparciré... No habrá nación adonde no lleguen los dispersos de Elam.
  alternative_spanish_readings:
  - Traeré sobre Elam...
  - No habrá nación a la que no vayan los desterrados de Elam.
  rationale: No se suaviza el oráculo de juicio ni se cambia su alcance total. La traducción mantiene la hostilidad implícita en el verbo de movimiento y la universalidad de la dispersión.
  doctrine_reference: Jeremías 49:36 en su contexto profético de juicio contra las naciones
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que precisó «to which» para el movimiento de «will not go». Por eso se tradujo con una construcción de destino explícito («adonde no lleguen») y no con una frase más vaga. También se conservó la imaginería de «vientos» y «extremos de los cielos», sin sustituirla por una paráfrasis direccional que diluya el paralelismo hebreo.
  spanish_consistency_notes:
  - Se mantiene «Elam» como nombre propio invariable.
  - «Cielos» se usa en plural para reflejar el hebreo הַשָּׁמַיִם.
  - Se conserva la repetición de «vientos» para respetar el paralelismo del verso.
  - «Dispersos» se prefirió a «desterrados» para no introducir una connotación legal más fuerte de la que exige el hebreo en este contexto.
