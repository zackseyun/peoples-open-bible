revisions:
- from: Así como no es fácil para quien prepara un banquete y busca la ventaja[a] de otros, con todo, por la gratitud de los muchos soportaremos gustosamente la dificultad;
  to: Así como no es fácil para quien prepara un banquete y busca el provecho[a] de otros, con todo, por la gratitud[b] de los muchos soportaremos gustosamente la penuria;
