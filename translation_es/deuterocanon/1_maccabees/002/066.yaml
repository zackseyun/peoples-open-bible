    text: 'El griego transmitido dice literalmente algo como “fuerte en poder desde él, desde su juventud”; la frase es difícil, y aquí se da el sentido aparente: que Judas ha sido fuerte desde su juventud.'
    reason: textual_variant
  revision_rationale: Se reemplaza 'caudillo del ejército' por 'comandante del ejército' para una equivalencia más precisa, natural y neutral de ἄρχοντα στρατιᾶς. Se ajusta 'harán la guerra' a 'pelearán la guerra' para conservar mejor el emparejamiento cognado de πολεμήσετε πόλεμον, siguiendo más de cerca la intención lexical del POB auditado. Se mantiene la nota sobre la frase textual difícil porque documenta una decisión importante del original.
