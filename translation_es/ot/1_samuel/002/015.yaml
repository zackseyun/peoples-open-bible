translation:
  language: es
  text: 'Incluso antes de que quemaran la grasa, el servidor[a] del sacerdote venía y decía al hombre que sacrificaba: «Da carne para asar para el sacerdote, porque no tomará de ti carne hervida, sino sólo cruda».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el joven del sacerdote» o «el ayudante del sacerdote»; el hebreo נַעַר puede denotar a un joven o a un subordinado, y aquí probablemente se refiere a alguien que actuaba para el sacerdote.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם / בְּטֶרֶם
  english_pob_choice: Even before
  chosen_spanish: Incluso antes de que
  alternatives_spanish:
  - Aun antes de que
  - Antes incluso de que
  lexicon: HALOT
  rationale: גַּם intensifica la escena y בְּטֶרֶם marca anterioridad temporal; «Incluso antes de que» conserva ambos valores en un español natural y solemne.
- source_word: יַקְטִרוּן אֶת־הַחֵלֶב
  english_pob_choice: they burned the fat
  chosen_spanish: quemaran la grasa
  alternatives_spanish:
  - ofrecieran la grasa en humo
  - quemaran el sebo
  lexicon: HALOT
  rationale: El verbo indica la quema ritual de la porción grasa. «Grasa» es claro en español; «sebo» sería más técnico pero menos transparente para el lector general.
- source_word: נַעַר הַכֹּהֵן
  english_pob_choice: the priest’s servant
  chosen_spanish: el servidor del sacerdote
  alternatives_spanish:
  - el joven del sacerdote
  - el ayudante del sacerdote
  lexicon: HALOT
  rationale: נַעַר puede significar joven, servidor o asistente. Aquí el contexto funcional favorece a alguien subordinado que actúa por el sacerdote; «servidor» mantiene la fuerza relacional sin forzar «joven».
- source_word: לָאִישׁ הַזֹּבֵחַ
  english_pob_choice: to the man who was sacrificing
  chosen_spanish: al hombre que sacrificaba
  alternatives_spanish:
  - al hombre que estaba sacrificando
  - al sacrificador
  lexicon: HALOT
  rationale: El participio describe a la persona en acto de sacrificar. «Que sacrificaba» es fluido y fiel; «sacrificador» suena más técnico y menos natural en este contexto narrativo.
- source_word: תְּנָה
  english_pob_choice: Give
  chosen_spanish: Da
  alternatives_spanish:
  - Entrega
  - Dame
  lexicon: HALOT
  rationale: Es un imperativo directo y brusco; «Da» reproduce mejor la orden corta y exigente que una forma más explicativa.
- source_word: בָשָׂר
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - carne para comer
  - carne
  lexicon: HALOT
  rationale: En español bíblico «carne» cubre mejor el campo semántico de בָשָׂר, incluso en contexto sacrificial. «Carne» preserva la materialidad del alimento sin introducir un matiz demasiado moderno como «carne para comer».
- source_word: לִצְלוֹת
  english_pob_choice: to roast
  chosen_spanish: para asar
  alternatives_spanish:
  - para rostizar
  - para rostizarla
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Asar» es el equivalente más natural en español para carne preparada al fuego; evita el anglicismo y mantiene la imagen culinaria.
- source_word: וְלֹא יִקַּח מִמְּךָ
  english_pob_choice: for he will not take from you
  chosen_spanish: porque no tomará de ti
  alternatives_spanish:
  - pues no recibirá de ti
  - porque no aceptará de ti
  lexicon: HALOT
  rationale: El imperfecto aquí funciona como negación de una acción futura o habitual. «Tomará de ti» conserva la estructura directa del hebreo; en español, «de ti» expresa mejor la fuente de donde se recibe.
- source_word: מְבֻשָּׁל
  english_pob_choice: boiled
  chosen_spanish: cocida
  alternatives_spanish:
  - hervida
  - cocinado
  lexicon: HALOT
  rationale: El término contrasta con crudo. «Cocida» es la forma más idiomática y abarca el sentido de alimento ya preparado por cocción; aunque «hervida» es más preciso técnicamente, suena más restringido en español.
- source_word: כִּי אִם חָי
  english_pob_choice: but only raw
  chosen_spanish: sino sólo cruda
  alternatives_spanish:
  - sino apenas cruda
  - sino cruda solamente
  lexicon: HALOT
  rationale: La expresión exceptiva contrapone lo cocido a lo crudo. «Sino sólo cruda» mantiene el contraste y la exclusión sin añadir interpretación.
translation_notes:
  revision_awareness: 'Se ha seguido de cerca el auditable inglés de la POB, pero la redacción española se ajusta directamente al hebreo: el énfasis inicial de גַּם + בְּטֶרֶם se conserva con «Incluso antes de que», y la imagen ritual de la grasa quemada, la orden imperativa breve y la oposición «cocida / cruda» quedan explícitas y naturales en español. No se añadieron decisiones doctrinales porque el verso es descriptivo y no presenta una variante teológica significativa en la tradición auditada.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda; aquí no aparece.
  - Se conserva «servidor» para נַעַר por su valor funcional en contexto, con nota de alternativa.
  - «Carne» se mantiene para בָשָׂר en coherencia con el campo sacrificial y la terminología del proyecto.
  - «Asar» refleja el valor culinario de לִצְלוֹת sin calco innecesario.
  - La contraposición final se mantiene como «cocida / cruda» para reproducir el contraste semántico del hebreo.
