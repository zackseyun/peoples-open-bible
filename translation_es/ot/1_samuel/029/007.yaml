translation:
  language: es
  text: Así que ahora, vuelve y vete en paz, y no hagas el mal[a] ante los ojos de los señores filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hagas lo malo» o «no hagas lo incorrecto»; la expresión hebrea puede referirse a lo que ellos juzgan malo o inaceptable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Ahora
  - Y ahora
  lexicon: HALOT
  rationale: Mantiene la función discursiva y conclusiva de עתה junto con el enlace ו. «Así que ahora» suena natural en español y conserva la fuerza de cierre de la exhortación.
- source_word: שׁוּב
  english_pob_choice: return
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - retorna
  lexicon: HALOT
  rationale: El mandato breve y directo en contexto de despedida se expresa con un imperativo natural en español. «Vuelve» comunica la idea de volver atrás sin añadir matices ajenos.
- source_word: וְלֵךְ
  english_pob_choice: and go
  chosen_spanish: y vete
  alternatives_spanish:
  - y ve
  - y marcha
  lexicon: HALOT
  rationale: Se conserva el segundo imperativo como una acción distinta, como en el hebreo. «Vete» refleja mejor el sentido de salir o irse en este contexto que un simple «ve».
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: HALOT
  rationale: La locución idiomática se vierte de manera directa y natural en español. «En paz» mantiene el valor idiomático y el tono de despedida segura.
- source_word: וְלֹא תַעֲשֶׂה רָע
  english_pob_choice: and do not do evil
  chosen_spanish: y no hagas el mal
  alternatives_spanish:
  - y no hagas lo malo
  - y no hagas daño
  lexicon: HALOT
  rationale: Se conserva la fuerza moral de רע sin reducirlo a «daño». «Hacer el mal» es una equivalencia natural y fiel al giro hebreo, que puede abarcar conducta considerada mala o inaceptable.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - en la opinión de
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de evaluación/percepción. «Ante los ojos de» es idiomático en español y conserva el paralelismo con el hebreo sin convertirlo en una explicación interpretativa.
- source_word: סַרְנֵי פְלִשְׁתִּים
  english_pob_choice: the Philistine lords
  chosen_spanish: los príncipes filisteos
  alternatives_spanish:
  - los señores filisteos
  - los gobernantes filisteos
  lexicon: HALOT
  rationale: סרן designa a los altos dirigentes de las ciudades filisteas. «Príncipes» comunica dignidad y rango alto en español, aunque «señores» también sería posible. Se evita «rulers» por sonar más técnico y menos natural en este verso.
theological_decisions:
- issue: Valor de רע en la prohibición final
  english_pob_reading: The Hebrew expression can denote what is judged evil or unacceptable by them.
  chosen_spanish_reading: Puede significar conducta moralmente mala o algo que resulte malo o inaceptable para los jefes filisteos.
  alternative_spanish_readings:
  - no hagas lo que ellos consideren malo
  - no hagas nada incorrecto
  rationale: El hebreo permite tanto una valoración moral general como una evaluación según el criterio de los filisteos. La traducción principal conserva la ambigüedad útil con «haz el mal», y la nota aclara el rango semántico sin borrar la tensión.
  doctrine_reference: No aplica; decisión lexical/semántica del hebreo
- issue: Título de סַרְנֵי פְלִשְׁתִּים
  english_pob_reading: Philistine lords
  chosen_spanish_reading: príncipes filisteos
  alternative_spanish_readings:
  - señores filisteos
  - jefes filisteos
  rationale: El término hebreo apunta a autoridades de alto rango, probablemente sobre las ciudades filisteas. «Príncipes» preserva la elevación del cargo sin introducir una terminología eclesiástica ni suavizar el título.
  doctrine_reference: No aplica; decisión histórica y lexical
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB inglés, especialmente al preservar la doble orden («vuelve» / «vete») y al evitar una paráfrasis como «haz lo que es malo». También refleja la decisión revisada de mantener una forma directa para רע y la fórmula espacial de evaluación en בְּעֵינֵי.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en otros pasajes según la norma del proyecto, pero aquí no aparece el Tetragrámaton.
  - Se usó «príncipes filisteos» como equivalente de rango alto; si el corpus prefiere uniformidad con «señores», puede armonizarse en revisión posterior.
  - La nota al pie se ancla solo en «el mal» para reflejar la alternativa semántica de רע sin duplicar el sentido en el cuerpo del texto.
