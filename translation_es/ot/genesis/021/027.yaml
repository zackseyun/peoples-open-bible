translation:
  language: es
  text: Entonces Abraham tomó ovejas y ganado y se los dio a Abimelec, y los dos hicieron una alianza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «cortaron una alianza», un modismo hebreo común para formalizar una alianza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - agarró
  lexicon: HALOT
  rationale: El wayyiqtol de לקח expresa aquí la acción narrativa simple de tomar; «tomó» es la equivalencia natural y sobria en español.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - rebaño
  lexicon: HALOT
  rationale: צֹאן designa ganado menor, especialmente ovejas y cabras. Dado que sigue בָקָר como categoría contrastante, «ovejas» funciona bien en español y mantiene el paralelo claro y natural.
- source_word: וּבָקָר
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - reses
  - vacuno
  lexicon: HALOT
  rationale: בָקָר se refiere al ganado mayor, especialmente animales de cría; «ganado» comunica bien la categoría en español y evita restringir indebidamente a una sola especie.
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: se las dio
  alternatives_spanish:
  - las dio
  - las entregó
  lexicon: HALOT
  rationale: נתן aquí es el verbo ordinario «dar». En español conviene explicitar el pronombre de objeto indirecto y directo en «se las dio» para reflejar la transferencia a Abimelec sin añadir ceremonia que el hebreo no señala.
- source_word: לַאֲבִימֶלֶךְ
  english_pob_choice: to Abimelech
  chosen_spanish: a Abimelec
  alternatives_spanish:
  - para Abimelec
  lexicon: HALOT
  rationale: El nombre propio se translitera según la convención española habitual; la preposición ל se expresa naturalmente con «a» en este contexto de destinatario.
- source_word: וַיִּכְרְתוּ
  english_pob_choice: made
  chosen_spanish: hicieron
  alternatives_spanish:
  - sellaron
  - cortaron
  lexicon: HALOT
  rationale: La construcción כרת ברית es literalmente «cortar un pacto». En el cuerpo principal, «hicieron un pacto» comunica de forma natural el acto pactal en español, mientras que la literalidad se conserva en nota.
- source_word: שְׁנֵיהֶם
  english_pob_choice: the two of them
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - los dos de ellos
  lexicon: HALOT
  rationale: שְׁנֵיהֶם subraya explícitamente a las dos partes. «Los dos» es la forma más natural y concisa en español, y conserva esa explicitación narrativa.
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - covenio
  lexicon: HALOT
  rationale: Aunque בְּרִית suele traducirse «pacto» o «covenant», en español «pacto» es claro y solemne. En este contexto de tratado entre partes, mantiene bien el valor contractual sin perder dignidad.
theological_decisions:
- issue: Idiom of covenant-making (כרת ברית)
  english_pob_reading: made a covenant
  chosen_spanish_reading: hicieron un pacto
  alternative_spanish_readings:
  - cortaron un pacto
  - sellaron un pacto
  rationale: El hebreo usa una expresión idiomática técnica para formalizar un convenio. La traducción principal opta por una formulación idiomática y readable en español, sin ocultar la imagen literal, que queda indicada en la nota.
  doctrine_reference: Transparencia textual y consistencia terminológica en términos de pacto/covenio bíblico.
translation_notes:
  revision_awareness: El texto inglés auditado confirmó una traducción óptima-equivalente con nota para la idiomaticidad de כרת ברית. No se reportaron revisiones aplicadas; la versión española mantiene esa estrategia, adaptando los equivalentes a un español bíblico moderno y claro.
  spanish_consistency_notes:
  - 'Se mantiene la progresión narrativa simple con verbos en pasado: tomó, dio, hicieron.'
  - Se conserva la explicitud de las dos partes mediante «los dos».
  - «Pacto» se usa como equivalente bíblico solemne de בְּרִית, mientras la nota preserva la imagen literal del hebreo.
  - 'Los nombres propios siguen la transliteración española estándar: Abraham y Abimelec.'
