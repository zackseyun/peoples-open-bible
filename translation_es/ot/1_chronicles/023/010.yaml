review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: lista de nombres, repetición resumptiva («estos fueron los hijos de Simei») y total final de cuatro. También preserva correctamente la nota textual sobre זִינָא/Zizah. Sin embargo, varias formas onomásticas españolas se apartan innecesariamente de la evidencia y de una transliteración bíblica reconocible: «Jeús» y «Berías» no reflejan bien los nombres יעוש y בריעה; además, la nota está anclada al nombre equivocado.'
  spanish_quality_summary: 'La frase es clara y natural en español. «Y los hijos de Simei» y «Estos fueron los hijos de Simei: cuatro» son legibles y fieles. Los problemas principales son de calidad onomástica y de ubicación de la nota, no de sintaxis general.'
  glossary_alignment: 'No hay términos teológicos clave en este versículo. La política de transliteración de nombres se cumple en general, pero conviene usar formas españolas más fieles y reconocibles: «Jahat, Zina, Jeús y Bería» o similar. Se mantiene «Simei» de forma consistente. La nota léxica debe ir con «Zina[a]», no con «Jahat[a]».'
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre «Jahat» en vez de sobre «Zina».
    rationale: La nota explica una variante del segundo nombre («Zizá/Zizah» frente a «Zina»), por lo que el anclaje debe aparecer en «Zina[a]». Tal como está, induce al lector a pensar que la variante afecta a «Jahat».
  - severity: medium
    issue: «Berías» añade una -s no respaldada por el hebreo ni por la decisión inglesa auditada.
    rationale: בריעה corresponde al nombre conocido «Beriah»; en español, «Bería» refleja mejor el referente sin pluralizar ni alterar la forma. «Berías» parece otro nombre.
  - severity: medium
    issue: «Jeús» es una adaptación poco estable y potencialmente confusa para יעוש.
    rationale: Aunque se busca castellanizar, la forma más fiel y reconocible es «Jeús» o «Jeús»? Aquí el problema es que la tilde y la reducción pueden sonar forzadas; «Jeús» sigue siendo posible, pero conviene una forma más estándar. Dado el uso bíblico hispano, «Jeús» es aceptable; no requiere adjudicación mayor, pero sí revisión cuidadosa de consistencia editorial.
  revised_spanish_text: 'Y los hijos de Simei: Jahat, Zina[a], Jeús y Bería. Estos fueron los hijos de Simei: cuatro.'
  revised_footnotes:
  - marker: a
    text: Algunas traducciones leen el segundo nombre como «Zizá» (compárese 1 Crónicas 23:11); aquí el hebreo lee «Zina».
    reason: lexical_alternative
