translation:
  language: es
  text: 'David dijo a los gabaonitas: «¿Qué haré por ustedes, y con qué haré expiación, para que bendigan[a] la heredad de Yahvé[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y bendigan la heredad de Yahvé». El hebreo puede leerse más literalmente como una cláusula coordinada; la redacción principal expresa la relación de propósito/resultado que mejor encaja en el contexto.'
    reason: lexical_alternative
  - marker: b
    text: «La heredad de Yahvé» se refiere a Israel, el pueblo que pertenece a Yahvé.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - preguntó
  lexicon: HALOT
  rationale: El wayyiqtol de אמר introduce el discurso de David. «Dijo» es la forma narrativa natural en español y no añade matiz interrogativo que no está en el verbo base.
- source_word: הַגִּבְעֹנִים
  english_pob_choice: the Gibeonites
  chosen_spanish: los gibeonitas
  alternatives_spanish:
  - los de Gabaón
  - los habitantes de Gabaón
  lexicon: HALOT
  rationale: El término es un gentilicio plural. «Gibeonitas» conserva la designación étnica y sigue de cerca la forma bíblica, sin perder inteligibilidad.
- source_word: מָה אֶעֱשֶׂה לָכֶם
  english_pob_choice: What shall I do for you
  chosen_spanish: ¿Qué haré por ustedes?
  alternatives_spanish:
  - ¿Qué debo hacer por ustedes?
  - ¿Qué voy a hacer por ustedes?
  lexicon: HALOT
  rationale: La pregunta deliberativa del imperfecto en hebreo se expresa de manera natural con futuro en español. «Por ustedes» mantiene el valor de beneficio o relación para con ellos.
- source_word: וּבַמָּה
  english_pob_choice: and with what
  chosen_spanish: y con qué
  alternatives_spanish:
  - y por medio de qué
  - y con qué medios
  lexicon: HALOT
  rationale: La preposición instrumental se refleja con «con qué», que en español comunica la idea de medio o instrumento sin perder naturalidad.
- source_word: אֲכַפֵּר
  english_pob_choice: shall I make atonement
  chosen_spanish: haré expiación
  alternatives_spanish:
  - haré atonement
  - haré reparación
  lexicon: HALOT
  rationale: En este contexto כפר tiene fuerza cultual y reparadora. «Expiación» es la opción española más precisa y digna para conservar ese peso teológico; «reparación» sería posible pero menos exacta.
- source_word: וּבָרְכוּ
  english_pob_choice: that you may bless
  chosen_spanish: para que bendigan
  alternatives_spanish:
  - y bendigan
  - a fin de que bendigan
  lexicon: HALOT
  rationale: El hebreo puede leerse con valor final o resultativo. Siguiendo el audit trail inglés, «para que» expresa bien el propósito/resultado implícito en el contexto.
- source_word: נַחֲלַת יְהוָה
  english_pob_choice: the inheritance of Yahweh
  chosen_spanish: la heredad de Yahvé
  alternatives_spanish:
  - la herencia de Yahvé
  - la posesión de Yahvé
  lexicon: HALOT
  rationale: נחלה admite heredad/herencia. «Heredad» es una opción bíblica clara en español y evita una lectura puramente patrimonial; conserva la referencia corporativa a Israel como pueblo perteneciente a Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal como transliteración de YHWH, conforme a la política POB y al contexto del texto fuente.
theological_decisions:
- issue: Sentido de כפר en un contexto de culpa y conciliación
  english_pob_reading: make atonement / expiation
  chosen_spanish_reading: haré expiación
  alternative_spanish_readings:
  - haré reparación
  - haré amends
  rationale: El pasaje trata de resolver una culpa grave delante de Dios y ante los gibeonitas. «Expiación» preserva el peso religioso del verbo, evitando reducirlo a una simple disculpa o compensación civil.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Relación entre la acción de David y la bendición de los gibeonitas
  english_pob_reading: that you may bless the inheritance of Yahweh
  chosen_spanish_reading: para que bendigan la heredad de Yahvé
  alternative_spanish_readings:
  - y bendigan la heredad de Yahvé
  - de modo que bendigan la heredad de Yahvé
  rationale: El hebreo permite entender una relación de propósito o resultado. En español, «para que» hace explícita esa relación sin exagerarla ni volverla una simple coordinación.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que afinó la relación final a una forma más directa («that you may bless»). En español se preservó ese matiz con «para que bendigan», manteniendo el valor de propósito/resultado sin perder naturalidad.
  spanish_consistency_notes:
  - Se conserva Yahvé para YHWH, conforme al estándar del proyecto.
  - Se eligió «expiación» para כפר por su fuerza cultual y reparadora; no se debilitó a «reparación» en el texto principal.
  - «Heredad» traduce נחלה con un registro bíblico natural en español y evita ambigüedad meramente económica.
