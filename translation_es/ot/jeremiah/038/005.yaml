translation:
  language: es
  text: 'Entonces el rey Sedequías dijo[a]: «Miren, él está en sus manos, porque el rey no puede hacer nada contra ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el rey no puede [hacer] una cosa respecto de ustedes». En el contexto, el sentido es que no puede actuar contra ustedes ni imponerse a ustedes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» conserva la progresión temporal en un español natural y sobrio.
- source_word: הַמֶּלֶךְ צִדְקִיָּהוּ
  english_pob_choice: King Zedekiah
  chosen_spanish: el rey Sedequías
  alternatives_spanish:
  - rey Sedequías
  - el rey, Sedequías
  lexicon: HALOT
  rationale: En español, la construcción con artículo + título + nombre es natural y fiel al hebreo; «Sedequías» conserva la transliteración estándar del nombre propio.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Mira
  - Vean
  lexicon: HALOT
  rationale: El hebreo llama la atención de los oyentes. En diálogo plural, «Miren» reproduce bien esa fuerza deíctica en español contemporáneo.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - está
  lexicon: HALOT
  rationale: El pronombre independiente señala al sujeto del enunciado; «él» conserva la referencia explícita antes de la cláusula con «está en sus manos».
- source_word: בְּיֶדְכֶם
  english_pob_choice: in your hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en sus manos está
  - bajo su control
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de la «mano» como poder o control. «Sus» refleja el plural de 2.ª persona y suena natural en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la concesión del rey; «porque» expresa causalidad de modo claro y directo en español.
- source_word: אֵין הַמֶּלֶךְ יוּכַל אֶתְכֶם דָּבָר
  english_pob_choice: the king can do nothing against you
  chosen_spanish: el rey no puede hacer nada contra ustedes
  alternatives_spanish:
  - el rey no puede hacerles nada
  - el rey no puede oponerse a ustedes
  lexicon: HALOT
  rationale: Se conserva el sentido idiomático y la fuerza de incapacidad del hebreo. «Contra ustedes» comunica la idea contextual de no poder actuar en oposición a ellos, sin volver la frase extrañamente literal en español.
theological_decisions:
- issue: Alcance de la incapacidad del rey
  english_pob_reading: the king can do nothing against you
  chosen_spanish_reading: el rey no puede hacer nada contra ustedes
  alternative_spanish_readings:
  - el rey no puede hacerles nada
  - el rey no puede oponerse a ustedes
  rationale: El hebreo es elíptico y no dice simplemente «hacerles algo», sino que expresa imposibilidad de intervenir de manera eficaz frente a ellos. «Contra ustedes» conserva la relación de oposición que el contexto exige, sin borrar la tensión lexical del original.
  doctrine_reference: Jeremías 38:5; cf. el valor idiomático de בְּיַד en contextos de poder/autoridad
translation_notes:
  revision_awareness: Se siguió el estado de alta concordancia del control cruzado y no hubo revisiones aplicadas; la redacción española se alineó con la lectura aceptada del inglés POB y con el hebreo sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto para el nombre divino, aunque este versículo no lo contiene.
  - Se evitó «SEÑOR» y vocabulario eclesiástico no requerido por el texto.
  - «Sedequías» y «Jesús/Mesías» no aparecen aquí, pero la transliteración de nombres propios sigue el patrón del proyecto.
  - La nota al pie marca la alternativa lexical preservada por el POB inglés y su sentido contextual.
