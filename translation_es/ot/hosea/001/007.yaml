base_translation:
  language: en
  yaml_path: translation/ot/hosea/001/007.yaml
  text: But I will have compassion on the house of Judah[a], and I will save them by Yahweh their God; I will not save them by bow, or by sword, or by war, by horses, or by horsemen.
  footnotes:
