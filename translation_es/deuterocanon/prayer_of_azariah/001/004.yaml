translation:
  language: es
  text: Porque eres justo en todo lo que has hecho a nosotros, y todas tus obras son verdaderas, y tus caminos son rectos, y todos tus juicios son verdaderos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo delante de Dios
  lexicon: BDAG
  rationale: En español, ‘justo’ comunica mejor el valor bíblico-jurídico y moral de δίκαιος en esta confesión dirigida a Dios. ‘Recto’ sería posible, pero aquí quedaría menos natural como predicado principal; ‘justo delante de Dios’ añade contenido que el griego no explicita.
- source_word: πᾶσιν οἷς ἐποίησας ἡμῖν
  english_pob_choice: in all that you have done to us
  chosen_spanish: en todo lo que has hecho con nosotros
  alternatives_spanish:
  - en todo lo que has hecho para nosotros
  - en todo lo que has hecho a nosotros
  lexicon: BDAG
  rationale: La construcción griega abarca de manera total las acciones divinas respecto de los hablantes. ‘Con nosotros’ evita forzar una sola preposición española y mantiene la amplitud relacional del texto; ‘a nosotros’ podría sonar más duro, pero aquí no es necesario decidir entre matiz benéfico o adverso.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: BDAG
  rationale: ‘Obras’ es el equivalente bíblico más natural en español para las acciones de Dios y conserva el paralelismo del verso. ‘Hechos’ o ‘acciones’ suenan más descriptivos y menos idiomáticos en este registro litúrgico.
- source_word: ἀληθινὰ / ἀληθιναί
  english_pob_choice: 'true'
  chosen_spanish: verdaderas
  alternatives_spanish:
  - fieles
  - auténticas
  lexicon: BDAG
  rationale: ‘Verdaderas’ reproduce con claridad la idea de conformidad con la realidad y fiabilidad. ‘Fieles’ estrecharía demasiado el sentido hacia lealtad; ‘auténticas’ sería menos natural en este contexto teológico.
- source_word: ὁδοί
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - caminos
  lexicon: BDAG
  rationale: Aunque el inglés usa ‘ways’, en español ‘caminos’ es la forma más transparente y bíblicamente reconocible para el modo de obrar de Dios. ‘Sendas’ preservaría más literalidad poética, pero suena más marcadamente literaria.
- source_word: εὐθεῖαι
  english_pob_choice: straight
  chosen_spanish: rectos
  alternatives_spanish:
  - derechos
  - rectos
  lexicon: BDAG
  rationale: ‘Rectos’ comunica de manera natural la imagen de linealidad e integridad de εὐθεῖαι. ‘Derechos’ sería comprensible, pero en este contexto puede sonar más coloquial y menos solemne.
- source_word: κρίσεις
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - juicios
  lexicon: BDAG
  rationale: ‘Juicios’ mantiene el sentido forense y teológico de las decisiones/veredictos divinos. ‘Sentencias’ sería posible, pero en español sugiere más el acto judicial humano y puede endurecer el registro sin necesidad.
theological_decisions:
- issue: Afirmación de la justicia de Dios respecto de lo sufrido por los hablantes
  english_pob_reading: The verse affirms that God is righteous in all he has done to us, without softening the directness of divine agency.
  chosen_spanish_reading: El verso afirma que Dios es justo en todo lo que ha hecho con nosotros, sin suavizar la atribución directa de su acción.
  alternative_spanish_readings:
  - Dios es justo en todo lo que ha permitido en nosotros
  - Dios es justo en todo lo que ha hecho por nosotros
  rationale: El griego dice de manera directa ‘lo que has hecho con nosotros’; por eso la traducción conserva la agencia divina sin convertirla en mera permisión. Tampoco se sustituye por ‘por nosotros’, porque el texto no expresa beneficios solamente, sino una confesión total ante el trato recibido, aun si es doloroso.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego normalizado de Swete y con la traducción inglesa POB ya revisada; no se observan cambios textuales, variantes manuscritas ni notas añadidas en el contexto auditado.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de cuatro miembros del verso.
  - Se prefirió un registro bíblico claro y actual, evitando tanto calcos duros como fórmulas eclesiásticas que no aporta el griego.
  - ‘Juicios’ se dejó en plural para conservar la pluralidad del original.
  - No se introdujeron notas al pie porque el contexto no documenta variantes ni alternativas que requieran anclaje en el texto español.
