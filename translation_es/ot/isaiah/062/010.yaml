translation:
  language: es
  text: Pasen, pasen por las puertas; despejen el camino para el pueblo[a]. Alcen, alcen la calzada[b]; quítenle las piedras. Levanten un estandarte[c] sobre los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «preparen el camino para el pueblo».'
    reason: lexical_alternative
  - marker: b
    text: 'La traducción tradicional suele decir: «Allanen, allanen la calzada».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Levanten una señal sobre los pueblos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְר֤וּ עִבְרוּ֙
  english_pob_choice: Pass through, pass through
  chosen_spanish: Pasen, pasen
  alternatives_spanish:
  - Atravesen, atraviesen
  - Pasen por, pasen por
  lexicon: HALOT
  rationale: El imperativo repetido de עבר expresa movimiento directo y enfático. «Pasen» suena natural en español y conserva la repetición retórica sin añadir matices no presentes en el hebreo.
- source_word: בַּ/שְּׁעָרִ֔ים
  english_pob_choice: the gates
  chosen_spanish: por las puertas
  alternatives_spanish:
  - por los portones
  - a las puertas
  lexicon: HALOT
  rationale: «Puertas» comunica bien el acceso urbano implícito en שׁערים sin sobreespecificar «ciudad». Con el verbo «pasen», la relación preposicional en español queda natural.
- source_word: פַּנּ֖וּ דֶּ֣רֶךְ
  english_pob_choice: clear the way
  chosen_spanish: preparen el camino
  alternatives_spanish:
  - allanen el camino
  - aparten el camino
  lexicon: HALOT
  rationale: פנה en piel puede significar despejar o preparar. «Preparen el camino» preserva la imagen de acondicionar una vía y es suficientemente cercano al valor de «clear the way» del POB inglés. Se evita «allanen» por sonar más técnico y menos general.
- source_word: הָ/עָ֑ם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo del Señor
  lexicon: HALOT
  rationale: Aquí עם es colectivo singular. «El pueblo» mantiene la referencia a un colectivo definido y evita introducir una aclaración que el hebreo no explicita.
- source_word: סֹ֣לּוּ סֹ֤לּוּ
  english_pob_choice: Build up, build up
  chosen_spanish: Levanten, levanten
  alternatives_spanish:
  - Allanen, allanen
  - Aterricen, aterricen
  lexicon: HALOT
  rationale: סלל en lenguaje de camino alude a levantar o construir una vía elevada. «Levanten» capta la acción de alzar y preparar el camino con un verbo claro y vigente; «allanen» perdería la idea de elevar, no solo de nivelar.
- source_word: הַֽ/מְסִלָּה֙
  english_pob_choice: the highway
  chosen_spanish: la calzada
  alternatives_spanish:
  - el camino elevado
  - la carretera
  lexicon: HALOT
  rationale: מְסִלָּה designa una vía preparada o levantada. «Calzada» puede expresar una vía construida y acondicionada sin depender de un término demasiado moderno como «carretera».
- source_word: סַקְּל֣וּ מֵ/אֶ֔בֶן
  english_pob_choice: clear it of stones
  chosen_spanish: quítenle las piedras
  alternatives_spanish:
  - elimínenle las piedras
  - despéjenla de piedras
  lexicon: HALOT
  rationale: El piel de סקל significa retirar piedras de un camino. «Quítenle las piedras» es natural en español y conserva el objeto implícito del camino/calzada.
- source_word: הָרִ֥ימוּ נֵ֖ס
  english_pob_choice: Raise up a banner
  chosen_spanish: Levanten una señal
  alternatives_spanish:
  - Levanten un estandarte
  - Levanten un pendón
  lexicon: HALOT
  rationale: נֵס puede ser señal, estandarte o bandera. «Señal» conserva la función convocante y pública del término sin forzar una imagen militar o litúrgica específica.
- source_word: עַל הָ/עַמִּֽים
  english_pob_choice: over the peoples
  chosen_spanish: sobre los pueblos
  alternatives_spanish:
  - sobre las naciones
  - por encima de los pueblos
  lexicon: HALOT
  rationale: El plural עמים se conserva mejor con «pueblos», que mantiene la pluralidad colectiva. «Sobre» corresponde al על más directo y preserva la imagen de elevación visible a distancia.
theological_decisions:
- issue: Distinción entre הָעָם y הָעַמִּים
  english_pob_reading: '''the people'' refers to Zion/Israel, while ''the peoples'' refers to the nations'
  chosen_spanish_reading: «el pueblo» se refiere al pueblo de Dios, y «los pueblos» a las naciones
  alternative_spanish_readings:
  - ambos podrían referirse a Israel
  - ambos podrían referirse genéricamente a la humanidad
  rationale: El hebreo cambia de singular colectivo a plural. Mantener «el pueblo» y «los pueblos» en español conserva esa tensión y el alcance profético del verso, sin homogeneizar los referentes.
  doctrine_reference: Isaías 62:10; distinción literaria y profética entre el pueblo del pacto y las naciones
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con la revisión inglesa más reciente: se conserva la repetición enfática de los imperativos, el contraste entre singular colectivo y plural, y la imagen de una vía preparada con una señal visible para los pueblos.'
  spanish_consistency_notes:
  - Se prefirió «pueblo» para הָעָם y «pueblos» para הָעַמִּים, manteniendo la distinción del hebreo.
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma del proyecto cuando el Tetragrámaton esté en otros contextos.
  - «Calzada» se eligió por su equilibrio entre dignidad literaria y claridad moderna.
  - 'La puntuación conserva la estructura imperativa en tres movimientos: entrada por las puertas, preparación del camino, y alzamiento de la señal.'
