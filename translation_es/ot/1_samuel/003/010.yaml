translation:
  language: es
  text: 'Entonces Yahvé vino y estuvo allí, y llamó como en las otras ocasiones[a]: «¡Samuel, Samuel!». Y Samuel dijo: «Habla, porque tu siervo está escuchando».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «como antes». El hebreo compara esta llamada con las anteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino. En español, "Yahvé" preserva la referencia al nombre propio del pacto sin convertirlo en un título genérico como "Señor".
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se acercó
  lexicon: HALOT
  rationale: El verbo indica venir/arribar. "Vino" es directo y natural en español narrativo, y mantiene la simplicidad del hebreo.
- source_word: וַיִּתְיַצַּב
  english_pob_choice: stood there
  chosen_spanish: se quedó allí
  alternatives_spanish:
  - se puso de pie allí
  - se plantó allí
  - estuvo allí
  lexicon: HALOT
  rationale: El hitpael de יצב expresa colocarse o mantenerse en posición. En español, "se quedó allí" comunica presencia sostenida sin forzar una imagen demasiado literal o artificial; conserva el matiz de permanencia en la escena.
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - clamó
  - lo llamó
  lexicon: HALOT
  rationale: En este contexto, קרא es el acto de llamar a Samuel por nombre. "Llamó" es el equivalente más natural y suficiente en español.
- source_word: כְפַעַם בְּפַעַם
  english_pob_choice: as at the other times
  chosen_spanish: como en las otras ocasiones
  alternatives_spanish:
  - como antes
  - como en los tiempos anteriores
  - como una vez tras otra
  lexicon: HALOT
  rationale: La locución hebrea compara esta llamada con las previas. "Como en las otras ocasiones" conserva el valor comparativo y la repetición narrativa de manera clara en español.
- source_word: שְׁמוּאֵל שְׁמוּאֵל
  english_pob_choice: Samuel, Samuel
  chosen_spanish: Samuel, Samuel
  alternatives_spanish:
  - Samuel, ¡Samuel!
  lexicon: HNp
  rationale: Se mantiene la repetición enfática del nombre propio tal como aparece en el hebreo, que subraya el llamado personal y urgente.
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Hablad
  lexicon: HALOT
  rationale: El imperativo singular pide que Samuel hable. "Habla" expresa con naturalidad la orden y conserva la inmediatez del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón por la que Samuel está dispuesto a responder. En español, "porque" hace explícita la relación causal sin perder el sentido explicativo.
- source_word: שֹׁמֵעַ
  english_pob_choice: is listening
  chosen_spanish: está escuchando
  alternatives_spanish:
  - oye
  - escucha
  lexicon: HALOT
  rationale: El participio expresa atención continua. "Está escuchando" transmite mejor la disposición activa de Samuel que un simple "oye".
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: El término עבד puede significar esclavo y el POB inglés opta por "slave" cuando desea conservar esa fuerza léxica. En español se mantiene "esclavo" para no suavizarlo a "siervo", aunque en esta súplica de deferencia puede percibirse como fórmula de humildad.
theological_decisions:
- issue: Descripción concreta de la presencia de Yahvé
  english_pob_reading: Retain the concrete narrative wording 'came and stood there'
  chosen_spanish_reading: 'Mantener el lenguaje concreto: ''vino y se quedó allí'''
  alternative_spanish_readings:
  - '"apareció"'
  - '"se manifestó"'
  - '"se hizo presente"'
  rationale: El hebreo narra la acción de Yahvé con términos concretos de llegada y permanencia. La versión española conserva esa imagen en vez de suavizarla con una formulación más abstracta, porque el texto mismo la presenta así.
  doctrine_reference: Translation philosophy §1, §3
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - Señor
  rationale: Se aplica el criterio del proyecto para el nombre divino. "Yahvé" preserva el carácter propio del tetragrámaton sin sustituirlo por un título, y evita la máscara litúrgica de "Señor".
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: La traducción sigue el pasaje hebreo y el audit trail inglés sin cambios relevantes respecto de la última revisión indicada como estable; se conserva la comparación idiomática de las llamadas previas y el lenguaje concreto sobre la presencia de Yahvé.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para יְהוָה conforme al estándar del proyecto.
  - Se conserva la repetición enfática del nombre propio "Samuel, Samuel".
  - '"Escuchando" se usa para reflejar el participio de atención continua.'
  - '"Esclavo" preserva la fuerza léxica de עבד sin neutralizarla a "siervo".'
