    reason: lexical_alternative
  revision_rationale: 'Se conserva el valor léxico principal de ''adquirir'' y la estructura del original, pero se corrige la naturalidad del español: ''mediante una prueba'' expresa mejor el sentido de testing/trial, y ''demasiado pronto'' comunica con más idiomaticidad la advertencia contra la prisa al confiar.'
