  yaml_path: translation/ot/isaiah/044/014.yaml
  text: He cuts down cedars for himself[a], or he takes a cypress tree or an oak and chooses it from among the trees of the forest. He plants a pine[c][b], and the rain makes it grow.
  footnotes:
