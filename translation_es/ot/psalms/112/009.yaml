    text: 'O: «Su justicia permanece para siempre». El término hebreo puede denotar tanto rectitud como justicia.'
    reason: lexical_alternative
  - marker: b
    text: «Cuerno» es una metáfora hebrea de fuerza, dignidad o estatus exaltado.
    reason: cultural_note
  - marker: c
    text: 'O: «será exaltado con honor» o «en gloria».'
    reason: lexical_alternative
  revision_rationale: 'La revisión alinea mejor el español con la decisión léxica y teológica auditada en inglés: se cambia ''su justicia'' por ''su rectitud'' en el texto principal, dejando ''justicia'' como alternativa en nota. También se normaliza ''en honor'' para mayor naturalidad y se simplifica el aparato de notas para que preserve las alternativas más significativas del audit trail sin sobrecargar el texto.'
