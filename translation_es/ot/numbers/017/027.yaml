    text: Hebreo 'He aquí'; una exclamación de alarma.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo usa dos verbos distintos en secuencia: ''morimos'' (גוע) y ''estamos perdidos'' (אבד), lo que intensifica el pánico del pueblo.'
    reason: lexical_alternative
  revision_rationale: Se revisó para reflejar mejor el contraste léxico hebreo entre גָּוַעְנוּ y אָבַדְנוּ, mantener la repetición del segundo verbo, y restaurar la nota explicativa presente en la auditoría inglesa. También se cambió '¡Mira!' por '¡Miren!' para mayor naturalidad en español sin perder la fuerza de alarma de הֵן.
