translation:
  language: es
  text: 'Y hablarás a los hijos de Israel: Cualquier hombre de entre los hijos de Israel, o del extranjero residente[a] en Israel, que dé de su descendencia[b] a Moloc[c], ciertamente será condenado a muerte; el pueblo de la tierra lo apedrearán con piedras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el forastero que reside en Israel». El hebreo usa un sustantivo y un verbo de la misma raíz: «el extranjero que reside».'
    reason: lexical_alternative
  - marker: b
    text: «Descendencia» traduce una palabra hebrea que literalmente significa «semilla», aquí en el sentido de hijos o descendientes.
    reason: lexical_alternative
  - marker: c
    text: Moloc puede referirse a una deidad asociada tradicionalmente con el sacrificio de niños; algunos intérpretes entienden en cambio que el término designa un tipo de ofrenda.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Conservo la expresión hebrea de parentesco en forma masculina representativa, como hace el POB en inglés con 'the sons of Israel'. 'Los hijos de Israel' es natural en español bíblico y mantiene la transparencia del idiomático hebreo sin neutralizarlo innecesariamente.
- source_word: אִישׁ אִישׁ
  english_pob_choice: Any man
  chosen_spanish: Cualquier hombre
  alternatives_spanish:
  - Cada hombre
  - Quienquiera
  lexicon: HALOT
  rationale: La duplicación hebrea tiene valor distributivo. 'Cualquier hombre' comunica ese alcance general de manera natural en español y preserva el singular masculino del original.
- source_word: הַגֵּר הַגָּר
  english_pob_choice: the sojourner who sojourns
  chosen_spanish: el forastero que reside
  alternatives_spanish:
  - el extranjero residente
  - el residente forastero
  lexicon: HALOT
  rationale: El POB distingue el sustantivo y el verbo cognado. En español, 'forastero que reside' mantiene esa idea de residente foráneo sin sonar forzado; 'reside' conserva la acción durativa del hebreo.
- source_word: יִתֵּן מִזַּרְעוֹ לַמֹּלֶךְ
  english_pob_choice: gives any of his offspring to Molech
  chosen_spanish: dé de su descendencia a Moloc
  alternatives_spanish:
  - dé de su simiente a Moloc
  - dé uno de sus hijos a Moloc
  lexicon: HALOT
  rationale: '''Descendencia'' expresa bien זֶרַע como linaje/descendencia, sin restringirlo a un solo hijo. Uso ''Moloc'' como forma española estable del nombre/título, siguiendo la lectura principal del POB y evitando importar una explicación que el versículo no formula.'
- source_word: מוֹת יוּמָת
  english_pob_choice: shall surely be put to death
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - será ciertamente muerto
  - debe ser muerto
  lexicon: HALOT
  rationale: La construcción hebrea intensifica la pena judicial. En español, 'ciertamente morirá' comunica la certeza del castigo de manera más fluida; en una ley ritual/judicial, el pasivo implícito queda suficientemente claro por el contexto y por la frase siguiente.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente del país
  - el pueblo del país
  lexicon: HALOT
  rationale: Mantengo la formulación literal del POB. En este contexto legal, la expresión designa a la comunidad local encargada de ejecutar la sentencia, no una clase sociológica posterior.
- source_word: יִרְגְּמֻהוּ בָאָבֶן
  english_pob_choice: shall stone him with stones
  chosen_spanish: lo apedreará con piedras
  alternatives_spanish:
  - lo apedreará
  - lo lapidará con piedras
  lexicon: HALOT
  rationale: '''Apedrear'' es el verbo natural en español y conserva el instrumento explícito ''con piedras'' del hebreo. ''Lapidará'' sería posible, pero ''apedreará'' resulta más claro y directo en registro bíblico.'
theological_decisions:
- issue: Sentido de לַמֹּלֶךְ (Molech)
  english_pob_reading: Molech may refer to a deity traditionally associated with child sacrifice; some interpreters understand the term instead as referring to a type of offering.
  chosen_spanish_reading: Moloc como nombre/título tradicional, sin añadir en el texto explicativo una paráfrasis sobre sacrificio o fuego que el versículo no menciona.
  alternative_spanish_readings:
  - Moloc como una ofrenda de tipo moloc
  - al Moloc entendido como una práctica ritual
  rationale: 'El POB retiene la lectura principal de nombre/título y deja abierta la alternativa interpretativa en nota. En español hago lo mismo: no cierro el sentido con una explicación ampliada que pertenece al contexto canónico más amplio, no a esta línea específica.'
  doctrine_reference: Levítico 18:21; 2 Reyes 23:10; Jeremías 32:35
translation_notes:
  revision_awareness: La versión revisada más reciente indicó que no se necesitaban cambios y que el acuerdo con el original era alto. Esta redacción conserva esa línea de traducción, manteniendo la tensión interpretativa sobre Moloc y la transparencia del hebreo cognado en el forastero residente.
  spanish_consistency_notes:
  - Se mantiene «Moloc» de forma consistente con la tradición española y con la lectura principal del POB.
  - Se conserva el paralelismo distributivo de אִישׁ אִישׁ con una formulación singular general.
  - El castigo judicial se expresa de modo claro y sobrio, sin añadir detalles no presentes en el versículo.
  - 'El orden general sigue el hebreo y el flujo del POB: mandato, sujeto universal, condición, pena y ejecución comunitaria.'
