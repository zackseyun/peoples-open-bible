translation:
  language: es
  text: Pero a los que temen al Señor se les mostrará misericordia en ella[a], y vivirán por la misericordia de su Dios; pero los pecadores perecerán para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «en ella»; el antecedente no se expresa aquí y puede aludir al día del juicio mencionado antes o a la tierra del versículo previo.'
    reason: alternative_reading
lexical_decisions:
- source_word: φοβούμενοι
  english_pob_choice: those who fear
  chosen_spanish: los que temen
  alternatives_spanish:
  - los que reverencian
  - los que tienen temor de
  lexicon: BDAG
  rationale: El participio sustantivado designa a un grupo caracterizado por su temor reverente ante Dios. «Los que temen» conserva el sentido relacional y pactal sin debilitarlo a mera deferencia.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: El equivalente español estándar y reverente de κύριος en este contexto es «Señor». Mantiene la fórmula bíblica común y la referencia divina.
- source_word: ἐλεηθήσονται
  english_pob_choice: will be shown mercy
  chosen_spanish: serán mostrados misericordia
  alternatives_spanish:
  - recibirán misericordia
  - se les tendrá misericordia
  lexicon: BDAG
  rationale: Se busca conservar la pasiva futura y el énfasis en una misericordia otorgada. La forma «serán mostrados misericordia» es algo marcada, pero refleja con mayor transparencia la pasiva del griego; una redacción más idiomática sería «recibirán misericordia».
- source_word: ἐν αὐτῇ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en eso
  - en él
  lexicon: BDAG
  rationale: La forma griega deja el antecedente implícito. En español, «en ella» preserva esa ambigüedad sin introducir «ese día» o «la tierra» en el texto principal.
- source_word: ἐλεημοσύνῃ
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - beneficencia
  lexicon: BDAG
  rationale: Aunque en otros contextos ἐλεημοσύνη puede relacionarse con limosna o dádiva, aquí el paralelismo con «su Dios» exige el sentido de misericordia divina que sostiene la vida.
- source_word: ἀπολοῦνται
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - se perderán
  lexicon: BDAG
  rationale: «Perecerán» es natural en español bíblico y conserva el tono de juicio final sin introducir un matiz más fuerte que el del griego.
- source_word: εἰς τὸν αἰῶνα χρόνον
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - para la eternidad
  lexicon: BDAG
  rationale: El modismo intensifica la duración; «para siempre» es la equivalencia española más clara y sobria, sin necesidad de ampliar el sentido.
theological_decisions:
- issue: Antecedente de ἐν αὐτῇ
  english_pob_reading: 'The English POB uses ''in it'' and notes the ambiguity: it may refer to the day of judgment or possibly the land/earth of the previous line.'
  chosen_spanish_reading: La traducción principal conserva la ambigüedad con «en ella» y no fija el antecedente en el texto principal.
  alternative_spanish_readings:
  - en él
  - en aquel día
  - en la tierra
  rationale: Como el griego no explicita el antecedente, el español debe evitar resolverlo de manera no demostrada. La nota preserva la posibilidad de una referencia al día del juicio o a la tierra, según el contexto inmediato.
  doctrine_reference: Preservar la ambigüedad textual cuando el antecedente no está explícito.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió 'in it' frente a 'on that day' para no importar un antecedente ausente en este versículo. La versión española sigue esa decisión conservando la ambigüedad con 'en ella', sin resolverla en el texto principal.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, en línea con el estándar bíblico del proyecto.
  - Se mantiene «misericordia» para ἐλεημοσύνη por el paralelismo con Dios, no «limosna».
  - Se conserva un futuro pasivo/medio reflejado en español con una pasiva perifrástica aunque resulte algo más marcada.
  - «Para siempre» traduce el idiomatismo intensificador final sin añadir explicación innecesaria en el texto principal.
