  to: Porque la Sabiduría, la artesana de todas las cosas, me enseñó. Porque en ella hay un espíritu inteligente, santo, único[a], múltiple, sutil, ágil, claro, incontaminado, distinto[b], inofensivo, amante del bien, agudo, sin estorbo, benéfico.
  rationale: Se ajustó el texto para reflejar mejor el femenino personificado de τεχνῖτις ('la artesana'), usar formas más naturales y adjetivales en español ('benéfico' en lugar de 'benefactor'), y afinar el matiz léxico de φιλάγαθον y ἀκώλυτον sin alterar el sentido fuente ni las decisiones teológicas documentadas. También se simplificó 'me instruyó' a 'me enseñó' por fluidez directa, plenamente compatible con ἐδίδαξέν.
