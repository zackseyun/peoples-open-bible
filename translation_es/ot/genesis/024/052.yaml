translation:
  language: es
  text: Y cuando el siervo de Abraham[a] oyó sus palabras, se postró en tierra ante Yahvé[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «el esclavo de Abraham»; aquí se prefiere «siervo» por la función narrativa del personaje, no por suavizar el sentido del hebreo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «a Yahvé». Se ha expresado con «ante Yahvé» para comunicar en español la postura reverencial que implica el verbo.'
    reason: lexical_alternative
  - marker: c
    text: O «se inclinó»; el verbo hebreo también puede expresar una reverencia o postración con matiz de adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: And when
  chosen_spanish: Y sucedió que, al
  alternatives_spanish:
  - Y cuando
  - Y ocurrió que, al
  - Y sucedió, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa introduce un nuevo episodio. En español, «Y sucedió que, al» conserva el avance secuencial sin sonar calcado ni demasiado pesado.
- source_word: שָׁמַע
  english_pob_choice: heard
  chosen_spanish: oir
  alternatives_spanish:
  - escuchar
  - enterarse de
  lexicon: HALOT
  rationale: Aquí el verbo denota captar las palabras dichas; «oír» expresa el hecho de percibir lo que dijeron sin añadir una implicación de obediencia que el contexto no exige explícitamente.
- source_word: עֶבֶד אַבְרָהָם
  english_pob_choice: Abraham’s servant
  chosen_spanish: el siervo de Abraham
  alternatives_spanish:
  - el esclavo de Abraham
  - el servidor de Abraham
  lexicon: HALOT
  rationale: El contexto narrativo identifica al representante del hogar de Abraham. «Siervo» mantiene la relación de servicio sin imponer el peso de «esclavo» en una función que aquí no está enfocada en la servidumbre legal.
- source_word: דִּבְרֵיהֶם
  english_pob_choice: their words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - lo que dijeron
  - su խոսlada
  lexicon: HALOT
  rationale: El sustantivo hebreo conserva su sentido básico de «palabras»; «sus palabras» es la correspondencia más directa y natural en español.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: he bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - se humilló
  - se echó rostro en tierra
  lexicon: HALOT
  rationale: El verbo puede abarcar inclinarse, postrarse o un gesto de reverencia. Dado que el texto añade «hasta el suelo», «se inclinó» conserva la acción sin sobreespecificar una liturgia particular.
- source_word: אַרְצָה
  english_pob_choice: to the ground
  chosen_spanish: hasta el suelo
  alternatives_spanish:
  - a tierra
  - al suelo
  - hasta la tierra
  lexicon: HALOT
  rationale: La forma direccional indica movimiento hacia abajo. «Hasta el suelo» reproduce la vividez física y suena natural en español moderno.
- source_word: לַיהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - hacia Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» conforme al estándar del proyecto. «Ante» expresa correctamente la postura reverencial asociada al gesto sin reducirlo a una mera dirección espacial.
theological_decisions:
- issue: Cómo rendir el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio divino. En español, el estándar del proyecto es «Yahvé», que preserva el nombre del pacto en lugar de ocultarlo tras un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de וַיִּשְׁתַּחוּ en el acto de reverencia
  english_pob_reading: he bowed down to the ground before Yahweh
  chosen_spanish_reading: se inclinó hasta el suelo ante Yahvé
  alternative_spanish_readings:
  - se postró hasta el suelo ante Yahvé
  - adoró a Yahvé
  rationale: El hebreo destaca el gesto corporal y la dirección hacia el suelo. «Se inclinó» preserva la acción física sin convertirla automáticamente en una afirmación explícita de adoración, aunque el contexto sí es reverente.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión de estilo desde «he bowed himself» a «he bowed down» por mayor naturalidad. En español, esa preferencia se refleja con «se inclinó», que mantiene la fluidez sin perder la fuerza corporal del hebreo. También se conserva la decisión doctrinal de traducir el Tetragrámaton con el nombre propio «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del nombre divino en el texto principal.
  - Se evitó «Cristo» o terminología cristológica ajena al versículo.
  - Se conservó un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
  - El término de servicio se resolvió como «siervo» en el texto principal, dejando la alternativa más fuerte en nota.
