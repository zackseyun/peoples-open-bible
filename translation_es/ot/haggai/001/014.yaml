translation:
  language: es
  text: Y Yahvé despertó el espíritu de Zorobabel, hijo de Sealtiel, gobernador de Judá, y el espíritu de Josué, hijo de Josadac, el sumo sacerdote, y el espíritu de todo el remanente del pueblo; y vinieron e hicieron el trabajo en la casa de Yahvé de los Ejércitos[a], su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «el SEÑOR de los ejércitos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּעַר
  english_pob_choice: stirred up
  chosen_spanish: despertó
  alternatives_spanish:
  - incitó
  - espabiló
  - movió
  lexicon: HALOT
  rationale: El verbo hebreo expresa el acto de avivar o poner en actividad una disposición interior. En español, «despertó» transmite bien la idea de activar el espíritu sin añadir un matiz demasiado causal o manipulador. «Incitó» sería más fuerte y «espabiló» demasiado coloquial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español de esta serie se adopta «Yahvé» como forma transparente del nombre divino, manteniendo la decisión de no sustituirlo por un título como «el SEÑOR».
- source_word: רוּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - ánimo
  - disposición interior
  - mente
  lexicon: HALOT
  rationale: Aquí רוּחַ designa la disposición interior motivada para actuar. «Espíritu» conserva el término bíblico y su amplitud semántica; «ánimo» o «disposición interior» explicitan, pero reducen el alcance del hebreo.
- source_word: פַּחַת יְהוּדָה
  english_pob_choice: governor of Judah
  chosen_spanish: gobernador de Judá
  alternatives_spanish:
  - prefecto de Judá
  lexicon: HALOT
  rationale: פַּחַת es un título administrativo persa; «gobernador» es el equivalente natural y claro en español, sin perder el carácter oficial del cargo.
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el jefe de los sacerdotes
  lexicon: HALOT
  rationale: «Sumo sacerdote» es la equivalencia española estable y fiel del título, más natural que un calco literal como «gran sacerdote».
- source_word: כֹּל שְׁאֵרִית הָעָם
  english_pob_choice: all the remnant of the people
  chosen_spanish: todo el remanente del pueblo
  alternatives_spanish:
  - todo el resto del pueblo
  - toda la remanencia del pueblo
  lexicon: HALOT
  rationale: «Remanente» preserva la fuerza teológica de שְׁאֵרִית en la literatura profética. «Resto» sería más neutro, pero pierde parte de esa resonancia bíblica.
- source_word: וַיָּבֹאוּ
  english_pob_choice: they came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron adelante
  - entraron
  - llegaron
  lexicon: HALOT
  rationale: En la secuencia narrativa, «vinieron» reproduce de manera natural el movimiento hacia la acción siguiente. «Llegaron» puede ser válido, pero aquí suena menos directo; «entraron» añade una precisión no explicitada.
- source_word: וַיַּעֲשׂוּ מְלָאכָה
  english_pob_choice: did work
  chosen_spanish: hicieron obra
  alternatives_spanish:
  - trabajaron
  - hicieron trabajo
  - realizaron la obra
  lexicon: HALOT
  rationale: La construcción hebrea dice literalmente «hicieron trabajo/obra». «Hicieron obra» conserva esa estructura sin forzar un verbo más interpretativo como «trabajaron» o añadir una lectura aspectual como «comenzaron».
- source_word: בְּבֵית יְהוָה
  english_pob_choice: on the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - sobre la casa de Yahvé
  - en la casa de Yahweh
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «on the house» por idiomática, el hebreo פשוט indica el lugar/esfera de la obra en la casa-templo. En español, «en la casa de Yahvé» es claro y no requiere la preposición inglesa «sobre».
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se conserva el título divino con el sentido de צְבָאוֹת como «ejércitos». «Huestes» es tradicional, pero menos transparente para lectores actuales.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios de ellos
  lexicon: HALOT
  rationale: El sufijo posesivo se expresa de forma natural en español con «su Dios». En el contexto, el referente plural es claro y no requiere repetir «de ellos».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: Se mantiene la decisión del POB de transparentar el Nombre divino en lugar de ocultarlo con una sustitución. En español, «Yahvé» es la forma preferida de esta serie por claridad y uso eclesial amplio.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de שְׁאֵרִית
  english_pob_reading: remnant
  chosen_spanish_reading: remanente
  alternative_spanish_readings:
  - resto
  - restante
  rationale: «Remanente» preserva la carga profética y de pacto que el inglés POB quiso conservar con «remnant». «Resto» sonaría más neutro y perdería esa densidad teológica.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
- issue: Título יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - el SEÑOR de los ejércitos
  rationale: La frase conserva el título guerrero y soberano de Dios. «Ejércitos» es semánticamente transparente en español y evita la opacidad de «huestes» para lectores modernos.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como sin cambios necesarios; por eso la redacción española sigue de cerca la sintaxis hebrea y conserva las mismas decisiones clave del audit trail inglés, con adaptación natural al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «espíritu» para רוּחַ en los tres sujetos del versículo.
  - Se traduce פַּחַת como «gobernador» por ser el equivalente administrativo más natural.
  - Se conserva «remanente» para שְׁאֵרִית por su peso profético.
  - Se usa «Yahvé de los Ejércitos» para צְבָאוֹת, con nota de alternativa tradicional.
