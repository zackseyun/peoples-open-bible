translation:
  language: es
  text: Y envió cartas a los espartanos y a otros lugares, en los mismos términos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de igual manera», «al mismo efecto»; la frase griega indica que estas cartas coincidían en contenido con la que acaba de mencionarse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El aoristo de ἀποστέλλω expresa el acto de enviar. «Envió» es natural, fiel y conserva el tono narrativo breve del griego.
- source_word: ἐπιστολὰς
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas escritas
  - mensajes escritos
  lexicon: BDAG
  rationale: El plural exige más de una. En español, «cartas» es la equivalencia directa y más idiomática para ἐπιστολαί.
- source_word: πρὸς Σπαρτιάτας
  english_pob_choice: to the Spartans
  chosen_spanish: a los espartanos
  alternatives_spanish:
  - para los espartanos
  lexicon: BDAG
  rationale: Con verbos de envío, πρός marca destinatario/dirección. «A los espartanos» reproduce ese valor de forma natural en español.
- source_word: τόπους ἑτέρους
  english_pob_choice: other places
  chosen_spanish: otros lugares
  alternatives_spanish:
  - otras regiones
  - otras localidades
  lexicon: BDAG
  rationale: τόπους significa literalmente «lugares»; ἑτέρους añade «otros». «Otros lugares» mantiene la amplitud indeterminada del griego sin precisar más de lo que el texto da.
- source_word: κατὰ ταὐτά
  english_pob_choice: in the same terms
  chosen_spanish: en los mismos términos
  alternatives_spanish:
  - de igual manera
  - del mismo modo
  - a la misma efectividad
  lexicon: BDAG
  rationale: La frase indica que las cartas coincidían en contenido o formulación con la ya mencionada. «En los mismos términos» preserva esa correspondencia textual con la carta anterior.
translation_notes:
  revision_awareness: El texto griego recibido es breve, de alta concordancia con la tradición auditada en inglés, y la versión española sigue de cerca la sintaxis simple del original, conservando la ambigüedad de κατὰ ταὐτά mediante una nota alternativa.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras fórmulas no pertinentes, pues el versículo no contiene el nombre divino.
  - «Espartanos» conserva el etnónimo colectivo del griego sin reinterpretarlo como un topónimo.
  - «Cartas» se mantiene en plural para reflejar ἐπιστολὰς.
  - La nota con [a] responde a la misma ambigüedad léxica que el audit trail inglés documenta para κατὰ ταὐτά.
