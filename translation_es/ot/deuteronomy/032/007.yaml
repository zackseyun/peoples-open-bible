translation:
  language: es
  text: Recuerda los días de antaño; considera los años de generación tras generación[a]. Pregunta a tu padre, y él te dirá; pregunta a tus ancianos[b], y ellos te dirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los años de generación y generación», un modismo para generaciones sucesivas.'
    reason: lexical_alternative
  - marker: b
    text: O «tu antepasado», si se toma con un alcance más amplio que el padre inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  lexicon: HALOT
  rationale: Imperativo directo de זכר. «Recuerda» conserva el valor exhortativo y es natural en español actual; «acuérdate» añade una forma pronominal menos cercana al hebreo simple.
- source_word: יְמ֣וֹת עוֹלָ֔ם
  english_pob_choice: the days of old
  chosen_spanish: los días de antaño
  alternatives_spanish:
  - los días de antigüedad
  - los días de lo antiguo
  lexicon: HALOT
  rationale: La expresión apunta a la antigüedad remota. «Antaño» reproduce bien el matiz idiomático y evita una calca pesada como «de antiguo».
- source_word: בִּ֖ינוּ
  english_pob_choice: consider
  chosen_spanish: considera
  alternatives_spanish:
  - discierne
  - reflexiona sobre
  lexicon: HALOT
  rationale: El imperativo de בין aquí pide atención reflexiva en paralelo con «recuerda». «Considera» comunica esa pausa meditativa sin sobreinterpretar.
- source_word: שְׁנ֣וֹת דּוֹר וָדֹר
  english_pob_choice: the years of generation after generation
  chosen_spanish: los años de generación tras generación
  alternatives_spanish:
  - los años de generación y generación
  - los años de muchas generaciones
  lexicon: HALOT
  rationale: Se conserva el giro idiomático casi de modo transparente. «Tras generación» expresa en español la sucesión distributiva de la repetición hebrea.
- source_word: שְׁאַל
  english_pob_choice: Ask
  chosen_spanish: Pregunta
  alternatives_spanish:
  - Consulta
  lexicon: HALOT
  rationale: Imperativo simple de שאל. «Pregunta» es el equivalente más natural y directo en español; «consulta» sería más formal y menos inmediato.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - tu ancestro
  lexicon: HALOT
  rationale: Se mantiene el sentido más llano del sustantivo con sufijo. La lectura ampliada a «ancestro» queda reservada para notas o contexto interpretativo, no para el texto principal.
- source_word: וְיַגֵּדְךָ
  english_pob_choice: and he will tell you
  chosen_spanish: y él te dirá
  alternatives_spanish:
  - y te lo declarará
  - y te lo hará saber
  lexicon: HALOT
  rationale: El hiphil de נגד puede significar decir, declarar o hacer saber. «Te dirá» es la forma española más natural y mantiene el paralelismo con la segunda línea.
- source_word: זְקֵנֶיךָ
  english_pob_choice: your elders
  chosen_spanish: a tus ancianos
  alternatives_spanish:
  - a tus mayores
  - a tus ancianos de la comunidad
  lexicon: HALOT
  rationale: Se conserva «ancianos» por la carga social y comunitaria del término, y no se sustituye por «mayores» que suavizaría la referencia a una función reconocible en la comunidad.
- source_word: וְיֹאמְרוּ לָךְ
  english_pob_choice: and they will say to you
  chosen_spanish: y ellos te dirán
  alternatives_spanish:
  - y ellos te hablarán
  - y te lo dirán
  lexicon: HALOT
  rationale: אָמַר es «decir». En español, tras «pregunta… y él te dirá», la repetición con «te dirán» mantiene el paralelismo y el flujo natural; «hablarán» sería demasiado genérico.
translation_notes:
  revision_awareness: Se siguió el texto hebreo directo y el audit trail inglés. No se detectaron revisiones aplicadas; se preservó el paralelismo poético y el matiz idiomático de los años de generaciones sucesivas.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando no aparece en este versículo; aquí no hay sustitución divina en el texto principal.
  - Se mantuvo «ancianos» en sentido comunitario, no como mera referencia a edad física.
  - La estructura poética se conservó con dos imperativos y dos respuestas correlativas, sin ampliar el contenido más allá del hebreo.
