  category: mistranslation
  tier: 2
  from: and feed you, after killing you, to idols.
  to: and feed them with meat sacrificed to idols.
  rationale: The Latin 'cibabunt idolis occisam' translates the Greek concept of εἰδωλόθυτα (meat sacrificed to idols). The context is the historical Christian crisis of being forced to eat pagan sacrifices during persecution, not believers being killed and fed to idols. 'Occisam' (slain) refers to the sacrificed animal (implied carnem), not the believers.
