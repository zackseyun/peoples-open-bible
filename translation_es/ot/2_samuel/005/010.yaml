revisions:
- from: Y David fue avanzando, creciendo en grandeza[a], y Yahvé, el Dios de los ejércitos, estaba con él.
  to: Y David iba avanzando[a] y se hacía cada vez más grande, y Yahvé, el Dios de las huestes, estaba con él.
  rationale: Se ajusta «Dios de las huestes» para preservar la amplitud semántica de צְבָאוֹת conforme al rastro auditado inglés, y se mejora la expresión del crecimiento progresivo para sonar más natural en español sin perder la fuerza iterativa del hebreo. Se mantiene la nota textual, pero anclada al segmento verbal completo que expresa continuidad.
