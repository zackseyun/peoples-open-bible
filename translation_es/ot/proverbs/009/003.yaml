translation:
  language: es
  text: 'Ella ha enviado a sus jóvenes mujeres[a]; llama desde las alturas[b] de la ciudad:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus doncellas». El hebreo puede referirse a mujeres jóvenes o a sirvientas/acompañantes; «jóvenes mujeres» conserva el matiz de edad y género sin precisar más de lo que exige el texto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre las alturas de la ciudad».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלְחָה
  english_pob_choice: has sent out
  chosen_spanish: ha enviado
  alternatives_spanish:
  - ha mandado
  - ha despachado
  - ha enviado fuera
  lexicon: HALOT
  rationale: El qal perfecto 3fs expresa una acción ya realizada por el sujeto femenino personificado. «Ha enviado» conserva el valor perfectivo y suena natural en español sin perder la idea de comisión previa para la convocatoria que sigue.
- source_word: נַעֲרֹתֶיהָ
  english_pob_choice: her young women
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus muchachas
  - sus doncellas
  - sus sirvientas
  lexicon: HALOT
  rationale: נַעֲרֹת puede referirse a muchachas/jóvenes mujeres; el inglés POB prefirió «young women» para no cargar innecesariamente el sentido de servidumbre. En español, «sus jóvenes» mantiene la edad/género sin imponer estatus social, aunque el contexto pueda sugerir asistentes.
- source_word: תִקְרָא
  english_pob_choice: she calls
  chosen_spanish: llama
  alternatives_spanish:
  - clama
  - proclama
  - grita
  lexicon: HALOT
  rationale: El imperfecto qal 3fs de קרא aquí indica una llamada pública. «Llama» es directo y fiel; «clama» o «grita» intensifican más de lo que exige el verbo.
- source_word: עַל
  english_pob_choice: from
  chosen_spanish: desde
  alternatives_spanish:
  - sobre
  - en
  - desde lo alto de
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente «sobre», con un verbo de llamar y un lugar elevado, «desde» comunica mejor la procedencia del llamado en español.
- source_word: גַּפֵּי
  english_pob_choice: the heights
  chosen_spanish: las alturas
  alternatives_spanish:
  - las cimas
  - los remates
  - las elevaciones
  lexicon: HALOT
  rationale: El plural constructo alude a partes elevadas/summits. «Las alturas» es natural en español y conserva la imagen de prominencia pública.
- source_word: מְרֹמֵי קָרֶת
  english_pob_choice: the heights of the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - de la urbe
  - de la villa
  - de la población
  lexicon: HALOT
  rationale: מְרֹמֵי קָרֶת especifica los lugares elevados pertenecientes a la ciudad. En español, «las alturas de la ciudad» sería fiel pero algo pesado; aquí se integra en una frase fluida que conserva el sentido urbano del lugar de proclamación.
translation_notes:
  revision_awareness: 'El texto inglés auditado no presenta cambios posteriores y fue revisado como de alta concordancia. La versión española sigue esa misma lectura sin introducir expansiones interpretativas, manteniendo el paralelismo: envío previo de asistentes y proclamación pública desde un lugar elevado.'
  spanish_consistency_notes:
  - Se usa un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - Se preserva la personificación femenina del sujeto con verbos en tercera persona singular femenina.
  - Se mantiene la imagen urbana y pública del llamado, sin sustituirla por formulaciones más explicativas.
  - La nota sobre «sobre las alturas de la ciudad» se conserva como alternativa literal porque el español principal opta por una formulación más natural.
