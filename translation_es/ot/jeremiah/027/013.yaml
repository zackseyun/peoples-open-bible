translation:
  language: es
  text: ¿Por qué morirán tú y tu pueblo por la espada, por el hambre y por la peste[a], como Yahvé ha hablado acerca de la nación que no servirá al rey de Babilonia?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'plaga'. El término hebreo דֶּבֶר comúnmente denota una enfermedad epidémica en contextos de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué debería
  - ¿Por qué habrías de
  lexicon: HALOT
  rationale: La forma interrogativa retórica se conserva de manera directa y natural en español sin añadir matiz modal que el hebreo no exige.
- source_word: תָמוּתוּ ... אַתָּה וְעַמֶּךָ
  english_pob_choice: will you and your people die
  chosen_spanish: morirás tú y tu pueblo
  alternatives_spanish:
  - morirán tú y tu pueblo
  - moriréis tú y tu pueblo
  lexicon: HALOT
  rationale: El hebreo usa una 2mp con singular explícito, y el español puede reproducir la oscilación con un singular dirigido al rey y su pueblo como conjunto. Se evita forzar un plural español que borre el matiz del texto.
- source_word: בַּחֶרֶב בָּרָעָב וּבַדָּבֶר
  english_pob_choice: by the sword, by famine, and by pestilence
  chosen_spanish: por la espada, por el hambre y por la peste
  alternatives_spanish:
  - por la espada, por el hambre y por la pestilencia
  - por guerra, hambre y peste
  lexicon: HALOT
  rationale: Se mantiene la tríada judicial del texto. 'Espada' conserva la imagen literal; 'hambre' es un equivalente natural de 'famine'; 'peste' comunica bien el sentido de דָּבֶר en español bíblico sin sonar arcaizante como 'pestilencia'.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: HALOT
  rationale: '''Como'' expresa correspondencia de manera natural y fiel; evita una construcción excesivamente pesada en español.'
- source_word: דִּבֶּר יְהוָה
  english_pob_choice: Yahweh has spoken
  chosen_spanish: Yahvé ha hablado
  alternatives_spanish:
  - Yahvé ha dicho
  - Yahvé habló
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, y 'ha hablado' mantiene la fuerza de declaración previa con relevancia vigente.
- source_word: אֶל הַגּוֹי
  english_pob_choice: concerning the nation
  chosen_spanish: acerca de la nación
  alternatives_spanish:
  - contra la nación
  - a la nación
  lexicon: HALOT
  rationale: '''Acerca de'' conserva el matiz de pronunciamiento sobre un colectivo sin convertirlo necesariamente en una fórmula hostil que el hebreo no exige aquí.'
- source_word: הַגּוֹי
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - el país
  lexicon: HALOT
  rationale: '''Nación'' corresponde al uso político-colectivo de גּוֹי en este contexto de sumisión internacional.'
- source_word: אֲשֶׁר לֹא יַעֲבֹד
  english_pob_choice: that will not serve
  chosen_spanish: que no servirá
  alternatives_spanish:
  - que no quiere servir
  - que se niega a servir
  lexicon: HALOT
  rationale: '''Servir'' conserva el verbo formal del texto. El futuro simple reproduce bien la advertencia condicional y evita sobreexplicar la intención.'
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: al rey de Babilonia
  alternatives_spanish:
  - del rey de Babilonia
  - al monarca de Babilonia
  lexicon: HALOT
  rationale: El dativo español 'al rey de Babilonia' refleja la relación verbal con 'servir' de forma natural y precisa, sin alterar el contenido.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. 'Yahvé' preserva el nombre propio del pacto y evita el reemplazo litúrgico por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Triada de juicio: espada, hambre y peste'
  english_pob_reading: sword, famine, and pestilence
  chosen_spanish_reading: espada, hambre y peste
  alternative_spanish_readings:
  - espada, hambre y pestilencia
  - guerra, hambre y peste
  rationale: La secuencia mantiene el registro profético y el valor de juicio divino. 'Peste' comunica mejor en español actual el campo semántico de דֶּבֶר que una generalización como 'guerra'.
  doctrine_reference: 'DOCTRINE.md: prophetic judgment formulas; lexical register for דֶּבֶר'
translation_notes:
  revision_awareness: 'La formulación sigue el último ajuste del inglés auditado: כַּאֲשֶׁר se refleja con una comparación simple (''como''), no con una intensificación innecesaria. Se conserva la lectura de Yahvé y la triple amenaza judicial sin suavizarla. La oscilación singular/plural del hebreo en ''tú y tu pueblo'' queda indicada en nota.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el proyecto para יְהוָה.
  - '''Espada'', ''hambre'' y ''peste'' mantienen el registro bíblico y la tríada de juicio.'
  - '''Servirá'' conserva el valor formal de עבד sin sustituirlo por ''obedecer'' o ''rendir culto''.'
  - La nota del versículo evita perder la tensión gramatical entre el singular dirigido al rey y el plural de la forma verbal hebrea.
