translation:
  language: es
  text: Un hombre de ojo maligno se apresura tras las riquezas[a], y no sabe que la pobreza vendrá sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «avaro» o «codicioso»; literalmente, «un hombre de ojo maligno», un modismo hebreo para una disposición egoísta y mezquina.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבֳהָל
  english_pob_choice: hastens
  chosen_spanish: se apresura
  alternatives_spanish:
  - va de prisa
  - se da prisa
  lexicon: HALOT
  rationale: El participio nifal de בהל expresa prisa o precipitación. «Se apresura» comunica bien esa urgencia y mantiene el matiz de movimiento impulsivo.
- source_word: לַהוֹן
  english_pob_choice: after wealth
  chosen_spanish: tras las riquezas
  alternatives_spanish:
  - por riquezas
  - en pos de riquezas
  lexicon: HALOT
  rationale: 'הון significa riqueza o bienes. Con ל, la idea es direccional: ir tras algo. «Tras las riquezas» conserva esa orientación en español sin sonar forzado.'
- source_word: אִישׁ
  english_pob_choice: A man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - Una persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular y proverbial. «Un hombre» conserva la forma del proverbio y la correspondencia gramatical.
- source_word: רַע עָיִן
  english_pob_choice: with an evil eye
  chosen_spanish: de mal ojo
  alternatives_spanish:
  - de ojo maligno
  - avaro
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y puede implicar tacañez, envidia o codicia. En el texto principal se preserva la imagen del «ojo» para no borrar la metáfora, y se deja la explicación en nota.
- source_word: וְלֹא יֵדַע
  english_pob_choice: and does not know
  chosen_spanish: y no sabe
  alternatives_spanish:
  - pero no sabe
  - ni sabe
  lexicon: HALOT
  rationale: La coordinación hebrea es directa. «Y no sabe» reproduce con naturalidad la secuencia proverbial.
- source_word: חֶסֶר
  english_pob_choice: poverty
  chosen_spanish: la pobreza
  alternatives_spanish:
  - la escasez
  - la falta
  lexicon: HALOT
  rationale: חסר denota falta o carencia; en este contexto sapiencial, el resultado concreto se expresa mejor como «pobreza», que transmite el desenlace socioeconómico de la conducta.
- source_word: יְבֹאֶנּוּ
  english_pob_choice: will come upon him
  chosen_spanish: vendrá sobre él
  alternatives_spanish:
  - le sobrevendrá
  - le llegará
  lexicon: HALOT
  rationale: El verbo venir con sufijo pronominal indica que la carencia alcanza al hombre. «Vendrá sobre él» conserva la imagen de irrupción y la fuerza advertidora.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto al sintagma correspondiente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como estándar del proyecto solo cuando aparezca el nombre divino; este verso no lo contiene.
  - Se preservó la fuerza proverbial y la imagen idiomática del hebreo sin sustituirla por una abstracción no atestiguada.
  - «Riquezas» y «pobreza» reflejan el contraste semántico de הון y חסר en contexto sapiencial.
