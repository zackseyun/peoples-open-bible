  to: Yahvé ha dado a conocer su salvación[a]; ante los ojos de las naciones ha revelado su rectitud[b].
  rationale: Se mantiene la redacción española natural del borrador, pero se corrige el término principal para צִדְקָתוֹ a 'rectitud' para seguir la decisión auditada de POB de conservar en el texto principal el valor amplio de 'righteousness', dejando 'justicia' como alternativa en nota. También se eliminan los anclajes de nota sobre 'su salvación', ya que las notas existentes pertenecen a 'ante los ojos de las naciones' y a צִדְקָתוֹ, no a 'salvación'.
