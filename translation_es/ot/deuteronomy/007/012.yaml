review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura causal-condicional del hebreo, conserva Yahvé, mantiene la duplicación verbal de שׁמר/עשה en la mitad humana y respeta la referencia específica a «tus padres». Sin embargo, hay dos problemas de fidelidad audit trail/source: 1) el verbo inicial aparece en subjuntivo plural («escuchen») cuando el contexto español natural pide futuro/indicativo («escuchan» o mejor «si escuchan»), y 2) la nota [b] está anclada a «guarden» pero su contenido explica el valor de שׁמע («escuchen/obedezcan»), no de שׁמר. Además, falta reflejar el matiz de לְךָ de modo más idiomático con «te guardará» o similar.'
  spanish_quality_summary: La redacción es bastante legible, pero «Y porque escuchen...» suena gramaticalmente forzada en español. También hay una ligera mejora de naturalidad y precisión al usar «si escuchan» para expresar la condición-consecuencia de עֵקֶב, y «el pacto y el amor leal» funciona bien en registro bíblico moderno. «Juicios» es aceptable aunque algo rígido; no requiere cambio porque sigue la decisión documentada y queda aclarado por nota.
  glossary_alignment: 'Alinea bien con los términos del proyecto en «Yahvé», «Dios» y la conservación de «padres». «Pacto» para בְּרִית es aceptable en español bíblico. «Amor leal» para חֶסֶד es una adaptación razonable de «steadfast love». La principal desalineación es de trazabilidad de notas: la alternativa sobre «obedezcan» debe ir con «escuchan», no con «guarden».'
  issues:
  - severity: high
    issue: «Y porque escuchen» es una forma española poco natural y gramaticalmente inestable en este contexto.
    rationale: El hebreo introduce una condición/consecuencia. En español, «si escuchan» o «porque escuchan» con indicativo comunica esto naturalmente; «porque escuchen» con subjuntivo no preserva bien el sentido ni la fluidez.
  - severity: high
    issue: La nota [b] está anclada al verbo equivocado.
    rationale: El contenido de la nota explica שׁמע («escuchar/obedecer»), pero el marcador aparece sobre «guarden», que corresponde a שׁמר. Esto confunde la evidencia léxica y el lector.
  - severity: medium
    issue: La estructura causal hebrea se expresa mejor en español como condición explícita.
    rationale: Aunque «Y porque» reproduce la auditoría inglesa, el hebreo עֵקֶב introduce una relación condicional-consecutiva. «Y si escuchan...» conserva la lógica sin caer en calco extraño.
  revised_spanish_text: Y si escuchan[a] estos juicios, y los guardan y los cumplen, Yahvé tu Dios guardará para ti el pacto y el amor leal[b] que juró a tus padres[c].
  revised_footnotes:
