  to: Pero los hijos de Israel[a], volviendo de la matanza, se apoderaron del resto; y los de las aldeas y caseríos[b] en la región montañosa y en la llanura tomaron mucho botín[c], porque había una cantidad muy grande.
  rationale: La revisión conserva el contenido del original y las decisiones léxicas del POB, pero corrige una construcción poco natural en español al hacer explícito que quienes tomaron el botín fueron los habitantes de las aldeas y caseríos, no los lugares mismos. También ajusta «de ... y de ...» a «en ... y en ...» para reflejar mejor el valor locativo de ἐν y mejorar la fluidez.
