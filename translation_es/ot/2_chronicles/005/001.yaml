  - severity: medium
    issue: '''Llevó'' no refleja suficientemente el matiz direccional de וַיָּבֵא'
    rationale: El hiphil de בוא aquí implica 'hacer entrar / introducir / traer adentro'. 'Llevó' es posible pero menos preciso en este contexto de ingreso al templo/tesorerías.
  - severity: medium
    issue: '''En los tesoros'' no representa bien בְּאֹצְרוֹת'
    rationale: El hebreo se refiere a depósitos o tesorerías, no a riquezas en sí. 'Tesorerías' o 'depósitos del tesoro' es más fiel y natural.
