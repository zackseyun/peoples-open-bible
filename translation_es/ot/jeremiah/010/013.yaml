  text: לְ/ק֨וֹל תִּתּ֜/וֹ הֲמ֥וֹן מַ֨יִם֙ בַּ/שָּׁמַ֔יִם וַ/יַּעֲלֶ֥ה נְשִׂאִ֖ים מִ/קְצֵ֣ה ארץ בְּרָקִ֤ים לַ/מָּטָר֙ עָשָׂ֔ה וַ/יּ֥וֹצֵא ר֖וּחַ מֵ/אֹצְרֹתָֽי/ו׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/010/013.yaml
  text: At the sound of his voice[a], there is a roar of waters in the heavens, and he makes clouds rise from the ends of the earth; he makes lightning for the rain[b], and brings out the wind from his storehouses.
  footnotes:
