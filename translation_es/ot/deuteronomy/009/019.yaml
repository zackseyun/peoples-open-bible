translation:
  language: es
  text: Porque tuve miedo a causa de la ira y el furor con que Yahvé estaba enojado contra ustedes[a], para destruirlos[b]. Pero Yahvé me escuchó también en aquella ocasión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ira y el furor con que Yahvé estaba airado contra ustedes». El hebreo acumula dos sustantivos de ira.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «oír/me escuchó»; aquí implica una respuesta favorable a la intercesión de Moisés.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָגֹרְתִּי
  english_pob_choice: I was afraid
  chosen_spanish: tuve miedo
  alternatives_spanish:
  - temí
  - estuve atemorizado
  lexicon: HALOT
  rationale: El qal perfecto de גור expresa temor o pavor. «Tuve miedo» comunica de manera natural el temor personal de Moisés sin endurecer el español con una forma demasiado arcaica.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  lexicon: HALOT
  rationale: El hebreo idiomático marca la causa del temor. «A causa de» conserva esa relación causal de forma clara y natural en español.
- source_word: הָאַף
  english_pob_choice: the anger
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - la cólera
  lexicon: HALOT
  rationale: אַף, aunque literalmente es «nariz», aquí denota ira. «Ira» mantiene la fuerza semántica y funciona bien junto con חֵמָה.
- source_word: וְהַחֵמָה
  english_pob_choice: and the wrath
  chosen_spanish: y del furor
  alternatives_spanish:
  - y de la cólera
  - y de la indignación
  lexicon: HALOT
  rationale: חֵמָה expresa calor, furia o furor. «Furor» conserva el segundo matiz intensificado del binomio de ira sin repetir exactamente el mismo sustantivo.
- source_word: אֲשֶׁר קָצַף יְהוָה עֲלֵיכֶם
  english_pob_choice: with which Yahweh was angry against you
  chosen_spanish: con que Yahvé estaba enojado contra ustedes
  alternatives_spanish:
  - con que Yahvé estaba airado contra ustedes
  - con que Yahvé estaba indignado contra ustedes
  lexicon: HALOT
  rationale: קצף expresa enojo intenso. «Estaba enojado contra ustedes» sigue de cerca la relación verbal del hebreo y evita suavizar la intensidad, mientras «contra ustedes» refleja עֲלֵיכֶם.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton según la práctica POB y la directriz del proyecto, en vez de sustituirlo por un título.
- source_word: לְהַשְׁמִיד אֶתְכֶם
  english_pob_choice: to destroy you
  chosen_spanish: para destruirlos
  alternatives_spanish:
  - para aniquilarlos
  - para borrarlos de la tierra
  lexicon: HALOT
  rationale: El infinitivo causativo de שׁמד expresa destruir o arruinar. «Para destruirlos» es directo, fiel y suficientemente fuerte sin añadir color interpretativo.
- source_word: וַיִּשְׁמַע יְהוָה אֵלַי
  english_pob_choice: But Yahweh listened to me
  chosen_spanish: Pero Yahvé me escuchó
  alternatives_spanish:
  - Pero Yahvé me oyó
  - Sin embargo, Yahvé me escuchó
  lexicon: HALOT
  rationale: שׁמע con אֶל puede indicar oír favorablemente, es decir, responder a la intercesión. «Me escuchó» comunica esa respuesta atendida mejor que un simple «oyó».
- source_word: גַּם בַּפַּעַם הַהִוא
  english_pob_choice: also at that time
  chosen_spanish: también en aquella ocasión
  alternatives_spanish:
  - también entonces
  - también en ese momento
  lexicon: HALOT
  rationale: El giro añade una instancia más del escuchar divino. «En aquella ocasión» reproduce el valor temporal con un español natural y solemne.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa יְהוָה directamente, y la práctica del POB es preservar el nombre divino en transliteración. «Yahvé» mantiene el referente personal del pacto sin ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Intensidad del lenguaje de ira divina
  english_pob_reading: the anger and the wrath with which Yahweh was angry against you
  chosen_spanish_reading: la ira y del furor con que Yahvé estaba enojado contra ustedes
  alternative_spanish_readings:
  - la ira y el furor con que Yahvé estaba airado contra ustedes
  - la cólera y el furor con que Yahvé estaba indignado contra ustedes
  rationale: 'El hebreo acumula términos de ira: אַף, חֵמָה y קָצַף. La traducción conserva esa intensidad sin atenuarla ni convertirla en una categoría más abstracta.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
- issue: Escuchar favorablemente en contexto de intercesión
  english_pob_reading: the LORD listened to me
  chosen_spanish_reading: Yahvé me escuchó
  alternative_spanish_readings:
  - Yahvé me oyó
  - Yahvé atendió a mí
  rationale: En este contexto, שׁמע no es mera percepción auditiva, sino respuesta favorable a la súplica de Moisés. «Me escuchó» conserva esa implicación sin explicitarla de más en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §4
translation_notes:
  revision_awareness: La redacción sigue la última revisión auditada del inglés POB, que afinó la cláusula de ira de «was furious» a «was angry» para corresponder más de cerca con el hebreo. En español se conservó la intensidad del conjunto léxico mediante «ira» + «furor» + «enojado», y se mantuvo el valor favorable de שׁמע en el cierre.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera uniforme para יְהוָה.
  - Se mantuvo el singular colectivo «ustedes»/«los» según la sintaxis española; el objeto directo en la segunda cláusula se refiere al mismo grupo mencionado antes.
  - Se evitó «SEÑOR» para no ocultar el nombre divino, conforme al estándar del proyecto.
  - «Escuchó» se eligió por su capacidad de incluir respuesta favorable, en línea con el contexto de intercesión.
