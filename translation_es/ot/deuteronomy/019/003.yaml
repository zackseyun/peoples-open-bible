review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido hebreo general: preparar la vía, dividir tripartitamente el territorio, mantener ''Yahvé'', y preservar el valor jurídico amplio de רֹצֵחַ con ''homicida''. Sin embargo, hay dos ajustes menores pero importantes: (1) el verbo hebreo está en forma yiqtol/jusiva legal de segunda persona, y en este contexto legislativo suena más fiel y natural en español como futuro mandato (''prepararás'', ''dividirás'') que como imperativo directo (''prepara'', ''divide''); (2) la nota [a] está mal anclada y mal formulada, porque comenta רֹצֵחַ (''homicida''), no ''camino'', y además ''todo que ha matado'' es español deficiente.'
  spanish_quality_summary: La redacción es clara y eclesialmente legible. 'El camino', 'territorio de tu tierra', 'Yahvé tu Dios' y 'todo homicida pueda huir allí' son naturales. La principal mejora estilística es uniformar el tono legal con futuros de mandato. La nota [a] necesita corregirse por español y por ubicación del anclaje.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → ''Yahvé''; יַנְחִילְךָ preservado con ''te da/está dando como herencia''; רֹצֵחַ bien evitado como ''asesino''. No hay conflicto doctrinal. La excepción necesaria es mover la nota léxica para que acompañe a ''homicida'' y no a ''camino''.'
  issues:
  - severity: medium
    issue: Los verbos principales están en imperativo ('Prepara', 'divide') en vez de futuro legal ('prepararás', 'dividirás').
    rationale: En legislación bíblica española, el yiqtol de mandato normalmente se refleja mejor con futuro, lo que preserva el tono normativo del hebreo y evita sonar como instrucción conversacional aislada.
  - severity: high
    issue: La nota [a] está colocada sobre 'camino', pero su contenido explica רֹצֵחַ / 'homicida'.
    rationale: Esto desorienta al lector y rompe la correspondencia exigida entre anclaje textual y nota. La nota debe ir junto a 'homicida'.
  - severity: medium
    issue: 'La formulación de la nota [a] usa español poco natural: ''todo que ha matado''.'
    rationale: Debe decirse 'todo el que ha matado', 'cualquiera que haya matado' o equivalente. Además conviene mantener la comparación con 'asesino' como en la justificación inglesa.
  revised_spanish_text: Prepararás el camino para ti, y dividirás en tres partes el territorio de tu tierra que Yahvé tu Dios te está dando como herencia[a], para que todo homicida[b] pueda huir allí.
