    rationale: En el rastro auditado inglés, la nota d explica alternativas para חֹק וּמִשְׁפָּט, no para וְלַעֲשׂוֹת. Mantenerla sobre «cumplirla» distorsiona la correspondencia entre fuente y notas.
  - severity: medium
    issue: La nota [b] presenta «buscar» como alternativa de «buscar».
    rationale: Una nota de alternativa léxica no debe repetir la lectura principal. El audit trail inglés preserva como alternativas «inquire into» y «study», no la forma ya elegida.
