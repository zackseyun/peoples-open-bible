  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Justicia» para צדק es defendible aquí, y «Job» sigue la convención del texto dado. La nota alternativa griega está bien preservada. El ajuste propuesto es estilístico-lexical dentro de las opciones ya documentadas para כלכל.
