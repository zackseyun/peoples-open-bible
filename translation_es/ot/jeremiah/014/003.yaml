translation:
  language: es
  text: Sus nobles envían a sus sirvientes por agua[a]; llegan a las cisternas[b] y no encuentran agua. Vuelven con sus vasijas vacías; quedan avergonzados y humillados, y se cubren la cabeza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus jóvenes» o «sus pequeños» para צְעוּרֵיהֶם; el contexto de nobles que envían subordinados por agua favorece un sentido social más que etario.
    reason: lexical_alternative
  - marker: b
    text: O «pozos» o «estanques» para «cisternas».
    reason: lexical_alternative
  - marker: c
    text: Cubrirse la cabeza era una señal cultural de vergüenza, duelo o aflicción.
    reason: cultural_note
lexical_decisions:
- source_word: אַדִּירֵיהֶם
  english_pob_choice: their nobles
  chosen_spanish: sus nobles
  alternatives_spanish:
  - sus poderosos
  - sus señores
  - sus magnates
  lexicon: HALOT
  rationale: El hebreo designa a personas prominentes o poderosas; en este contexto de jerarquía social durante la sequía, «sus nobles» conserva bien el contraste con los subordinados enviados a buscar agua.
- source_word: צְעוּרֵיהֶם
  english_pob_choice: their servants
  chosen_spanish: sus servidores
  alternatives_spanish:
  - sus siervos
  - sus jóvenes
  - sus pequeños
  lexicon: HALOT
  rationale: 'Aunque la forma puede sugerir juventud o pequeñez, el contexto favorece un sentido social: subordinados enviados por los nobles. «Servidores» comunica esa relación sin forzar una edad literal.'
- source_word: לַמָּיִם
  english_pob_choice: for water
  chosen_spanish: por agua
  alternatives_spanish:
  - para agua
  - a buscar agua
  lexicon: HALOT
  rationale: Con שׁלח, la expresión es final o de propósito. En español, «por agua» reproduce de manera natural esa intención de ir en procura del agua.
- source_word: גֵּבִים
  english_pob_choice: the cisterns
  chosen_spanish: las cisternas
  alternatives_spanish:
  - los pozos
  - los aljibes
  - los depósitos
  lexicon: HALOT
  rationale: En contexto de sequía, el término apunta a excavaciones o reservorios para retener agua. «Cisternas» es preciso y naturalmente entendible en español.
- source_word: שָׁבוּ כְלֵיהֶם רֵיקָם
  english_pob_choice: They return with their containers empty
  chosen_spanish: Vuelven con sus vasijas vacías
  alternatives_spanish:
  - Regresan con sus recipientes vacíos
  - Vuelven con sus vasos vacíos
  lexicon: HALOT
  rationale: El hebreo describe el regreso con los recipientes vacíos. «Vasijas» mantiene el sentido amplio de כלי y funciona bien en español bíblico sin volverse arcaico.
- source_word: בֹּשׁוּ וְהָכְלְמוּ
  english_pob_choice: they are ashamed and humiliated
  chosen_spanish: quedan avergonzados y humillados
  alternatives_spanish:
  - son avergonzados y humillados
  - quedan avergonzados y confundidos
  - son puestos en vergüenza y deshonra
  lexicon: HALOT
  rationale: Los dos verbos refuerzan la idea de deshonra. «Quedan avergonzados y humillados» conserva la intensificación sin sonar forzado, y respeta la paralelización hebrea.
- source_word: וְחָפוּ רֹאשָׁם
  english_pob_choice: and they cover their heads
  chosen_spanish: y se cubren la cabeza
  alternatives_spanish:
  - y cubren su cabeza
  - y se velan la cabeza
  - y agachan la cabeza
  lexicon: HALOT
  rationale: La imagen es un gesto cultural de vergüenza, luto o aflicción. «Se cubren la cabeza» es una traducción directa y natural en español.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail en inglés. Mantiene la lectura social de אַדִּירֵיהֶם/צְעוּרֵיהֶם, conserva el valor de propósito en לַמָּיִם, usa un equivalente natural para גֵּבִים, y refleja la doble idea de deshonra de בֹּשׁוּ וְהָכְלְמוּ sin suavizarla. No se introdujeron cambios textuales respecto del análisis auditado.
  spanish_consistency_notes:
  - Se prefirió «nobles» para אַדִּירִים, en línea con el contraste jerárquico del contexto.
  - «Servidores» se usó como equivalente social de צְעוּרִים; la alternativa etaria quedó en nota.
  - «Cisternas» mantiene la imagen concreta del lugar donde se busca agua en tiempo de sequía.
  - «Vasijas vacías» evita un tecnicismo innecesario y conserva la amplitud semántica de כלי.
  - La cláusula final se traduce literalmente como gesto corporal, no como interpretación psicológica, para respetar el signo cultural del hebreo.
