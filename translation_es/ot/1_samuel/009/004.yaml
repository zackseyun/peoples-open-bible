  yaml_path: translation/ot/1_samuel/009/004.yaml
  text: He passed through the hill country of Ephraim and passed through the land of Shalishah[a], but they did not find them. Then they passed through the land of Shaalim, but they were not there. Then he passed through the land of Benjamin[b], but they did not find them.
  footnotes:
