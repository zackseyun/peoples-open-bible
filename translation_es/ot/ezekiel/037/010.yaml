revisions:
- from: Así profeticé como él me mandó[a], y el espíritu[b] entró en ellos, y vivieron y se pusieron en pie sobre sus pies, un ejército[b] grandísimo.
  to: Así profeticé como él me mandó[a], y el aliento[b] entró en ellos, y vivieron y se pusieron de pie, un ejército sumamente grande.
  rationale: Se corrigió la elección principal de רוּחַ a «aliento» para alinearla con la decisión auditada del POB y con el contexto inmediato de vivificación, manteniendo «espíritu» en nota. Se eliminaron los marcadores duplicados y se dejó una sola nota [b] correctamente anclada. Se mejoró la naturalidad de «se pusieron en pie sobre sus pies» a «se pusieron de pie». Se reemplazó «grandísimo» por «sumamente grande» para reflejar mejor la intensificación hebrea sin caer en una repetición española dura.
