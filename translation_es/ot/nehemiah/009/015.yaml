translation:
  language: es
  text: Les diste pan del cielo para su hambre[a], y sacaste agua de la roca para su sed, y les dijiste que entraran a poseer la tierra que habías jurado darles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'habías levantado tu mano'; es una expresión hebrea de juramento.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם מִשָּׁמַיִם
  english_pob_choice: bread from heaven
  chosen_spanish: pan del cielo
  alternatives_spanish:
  - alimento del cielo
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de לֶחֶם como 'pan', siguiendo la transparencia del original; 'alimento del cielo' sería más explicativo pero menos fiel a la metáfora.
- source_word: לִרְעָבָם
  english_pob_choice: for their hunger
  chosen_spanish: para su hambre
  alternatives_spanish:
  - en su hambre
  - cuando tenían hambre
  lexicon: HALOT
  rationale: La preposición final/circunstancial con el sustantivo expresa relación o finalidad; 'para su hambre' mantiene la estructura breve y paralela del hebreo sin volverla demasiado idiomática.
- source_word: מַיִם מִסֶּלַע
  english_pob_choice: water from the rock
  chosen_spanish: agua de la peña
  alternatives_spanish:
  - agua de la roca
  lexicon: HALOT
  rationale: '''Peña'' conserva bien el referente del episodio del desierto y suena natural en español bíblico; ''roca'' también es posible, pero ''peña'' resalta el contraste poético con el agua.'
- source_word: הוֹצֵאתָ
  english_pob_choice: you brought out
  chosen_spanish: les sacaste
  alternatives_spanish:
  - les hiciste salir
  - les hiciste brotar
  lexicon: HALOT
  rationale: El hiphil es causativo; 'les sacaste' comunica con naturalidad que el agua fue producida/traída desde la peña sin oscurecer la acción causal.
- source_word: לִצְמָאָם
  english_pob_choice: for their thirst
  chosen_spanish: para su sed
  alternatives_spanish:
  - en su sed
  - cuando tenían sed
  lexicon: HALOT
  rationale: Se mantiene el paralelo con 'para su hambre' y el valor relacional de la construcción, evitando una paráfrasis temporal innecesaria.
- source_word: וַתֹּאמֶר לָהֶם
  english_pob_choice: you told them
  chosen_spanish: les dijiste
  alternatives_spanish:
  - les hablaste
  - les ordenaste
  lexicon: HALOT
  rationale: El verbo básico es 'decir'; en español, 'les dijiste' presenta con naturalidad el contenido infinitivo siguiente sin imponer el matiz fuerte de 'ordenar'.
- source_word: לָבוֹא
  english_pob_choice: to go in
  chosen_spanish: que entrasen
  alternatives_spanish:
  - que fueran a entrar
  - que entraran
  lexicon: HALOT
  rationale: '''Entrasen'' refleja el movimiento de בוא de manera sobria y litúrgicamente legible; conserva el tono exhortativo del conjunto.'
- source_word: לָרֶשֶׁת
  english_pob_choice: to possess
  chosen_spanish: a poseer
  alternatives_spanish:
  - a tomar posesión de
  - a heredar
  lexicon: HALOT
  rationale: '''Poseer'' conserva la idea de apropiación de la tierra sin introducir un giro más técnico o más pasivo que el hebreo admite aquí.'
- source_word: נָשָׂאתָ אֶת יָדְךָ
  english_pob_choice: you had sworn
  chosen_spanish: habías jurado
  alternatives_spanish:
  - habías levantado tu mano
  - habías alzado tu mano en juramento
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que opta por el sentido idiomático del juramento. En español, 'habías jurado' transmite el valor de la expresión hebrea sin perder claridad ni solemnidad.
- source_word: לָתֵת לָהֶם
  english_pob_choice: to give them
  chosen_spanish: darles
  alternatives_spanish:
  - para dársela a ellos
  - para darles
  lexicon: HALOT
  rationale: Forma natural y compacta en español; mantiene la relación de propósito con el juramento divino.
theological_decisions:
- issue: Tratamiento del idiomático 'levantar la mano' en el juramento divino
  english_pob_reading: The main text uses the idiom in Hebrew sense, with the English audit trail settling on 'you had sworn' while noting the literal gesture in a footnote.
  chosen_spanish_reading: Se traduce en el cuerpo como 'habías jurado', y se conserva en nota la explicación del giro hebreo de 'levantar la mano'.
  alternative_spanish_readings:
  - habías levantado tu mano
  - habías alzado tu mano en juramento
  rationale: La revisión auditada considera que el valor idiomático es el equivalente natural. En español, 'habías jurado' comunica con precisión el acto pactal sin volver enigmática la frase; la nota preserva la tensión lexical del original.
  doctrine_reference: Teología del pacto y fidelidad divina en el juramento de Yahvé; principio de equivalencia óptima con preservación de la idiomaticidad original en nota.
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés POB que prefirió 'had sworn' frente a la imagen más literal de 'lifted up your hand'. Se mantuvo la estructura paralela del versículo y no se añadieron explicaciones interpretativas fuera de la nota sobre el juramento idiomático.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' para el nombre divino solo cuando aparezca; en este versículo no se menciona explícitamente en el texto base.
  - Se mantuvo el paralelismo 'para su hambre / para su sed' como rasgo retórico del hebreo.
  - '''Peña'' se eligió por naturalidad bíblica en español y por su capacidad de evocar el escenario del milagro sin cambiar el sentido.'
