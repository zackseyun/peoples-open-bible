translation:
  language: es
  text: 'Entonces dijo[a]: «Ven conmigo y mira mi celo por Yahvé». Y lo hicieron subir en su carro de guerra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis celos por Yahvé». El sustantivo hebreo puede denotar «celo» o «celos» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ven conmigo
  - Vamos
  lexicon: HALOT
  rationale: El imperativo funciona como invitación o convocatoria directa. «Ven» reproduce la naturalidad y la inmediatez del hebreo en un discurso directo.
- source_word: אִתִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  lexicon: HALOT
  rationale: La preposición más natural en español para acompañamiento personal es «conmigo».
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  - y observa
  lexicon: HALOT
  rationale: «Mirar» expresa de manera directa el imperativo de ver, sin añadir matiz interpretativo. «Ve» podría sonar más genérico; «mira» mantiene el llamado a prestar atención.
- source_word: בְּקִנְאָתִי
  english_pob_choice: my zeal
  chosen_spanish: mi celo
  alternatives_spanish:
  - mi ardor
  - mi celo y devoción
  lexicon: HALOT
  rationale: קִנְאָה puede significar celo o celos según el contexto. Aquí, el contexto de devoción a Yahvé favorece «celo» en español; «celos» sugeriría una connotación inadecuada.
- source_word: לַיהוָה
  english_pob_choice: for the LORD
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - para Yahvé
  - por el SEÑOR
  lexicon: HALOT
  rationale: Como el texto hebreo nombra directamente a יהוה, se mantiene «Yahvé» según la convención del proyecto. La preposición expresa dirección o motivo del celo, por lo que «por Yahvé» es idiomático y fiel.
- source_word: וַיַּרְכִּבוּ אֹתוֹ
  english_pob_choice: they had him ride
  chosen_spanish: lo hicieron subir
  alternatives_spanish:
  - lo hicieron montar
  - lo subieron
  lexicon: HALOT
  rationale: El causativo de רכב indica que otros lo colocaron para ir montado. En español, «lo hicieron subir» comunica la acción causativa con naturalidad; la idea de transporte se completa con el complemento siguiente.
- source_word: בְּרִכְבּוֹ
  english_pob_choice: in his chariot
  chosen_spanish: en su carro
  alternatives_spanish:
  - en su carroza
  - en su carruaje
  lexicon: HALOT
  rationale: רֶכֶב aquí se refiere al vehículo de guerra o transporte real. «Carro» es una opción española amplia y comprensible; evita especificar más de lo que el término exige, aunque «carro» puede abarcar chariot en contexto bíblico.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - YHWH
  - SEÑOR
  rationale: Se conserva la forma propia del proyecto para el Tetragrámaton. «Yahvé» evita la sustitución tradicional por «SEÑOR» y mantiene visible el nombre del pacto en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El audit trail inglés no requirió revisiones sustantivas: mantiene la lectura de קִנְאָה como «zeal» y la del nombre divino como Yahweh; la versión española sigue esas decisiones, ajustando la sintaxis para una lectura natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme a la convención del proyecto.
  - Se usa «celo» para קִנְאָה por el contexto de devoción religiosa, sin borrar la alternativa semántica de «celos».
  - «Carro» se emplea como equivalente amplio y bíblicamente reconocible de רֶכֶב en este contexto.
  - La oración conserva el orden narrativo simple del hebreo sin agregar elementos explicativos.
