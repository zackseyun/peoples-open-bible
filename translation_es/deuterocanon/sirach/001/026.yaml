review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue la línea hebrea desajustada y además contradice el propio audit trail inglés vigente, que explícitamente dice que para Sirácida 1:26 se debe seguir el griego porque el hebreo extante es un major mismatch. Por tanto, no preserva fielmente la selección de fuente documentada ni el sentido fuente operativo del registro POB.
  spanish_quality_summary: El español es comprensible, pero 'obra' debilita la literalidad de 'book/libro', 'ello' suena algo rígido, y la nota al pie invierte indebidamente la relación entre hebreo y griego. También falta la nota léxica correspondiente al sentido alternativo de πίστις/πρᾳότης que el audit trail inglés preserva.
  glossary_alignment: Hay un problema mayor con 'Señor' en la cita griega alternativa dentro de la nota, ya que el proyecto prefiere 'Yahvé' cuando κύριος representa el nombre divino; pero como el texto principal correcto para esta ficha debe seguir el inglés POB vigente ('Este libro entero está lleno de ello...'), el punto terminológico principal aquí es respetar la decisión textual documentada. Conviene usar 'libro' en vez de 'obra' y 'persona' o 'quien' en vez de 'hombre' para reflejar mejor el inglés POB y mejorar la legibilidad neutral.
  issues:
  - severity: high
    issue: Selección errónea de la fuente operativa
    rationale: El paquete canónico y las decisiones teológicas inglesas indican que el hebreo está marcado como major mismatch y que la traducción debe seguir el griego para esta ficha. El borrador español afirma lo contrario y por eso no es fiel al registro auditado.
  - severity: high
    issue: Nota textual invierte la evidencia documentada
    rationale: La nota [a] dice que el hebreo es la línea operativa y que el griego es una formulación distinta, cuando el inglés POB dice precisamente que se sigue el griego debido al desajuste del hebreo.
  - severity: medium
    issue: Falta la nota léxica paralela al inglés sobre πίστις/πρᾳότης
    rationale: Aunque el texto principal inglés revisado quedó en la lectura hebrea desajustada, el audit trail conserva una nota adicional sobre la alternativa griega ('his favor is faithfulness and gentleness'). Esa información debe preservarse si se mantiene la estructura auditada de la ficha.
  - severity: low
    issue: 'Elecciones de estilo mejorables: ''obra'', ''el hombre'', ''ello'''
    rationale: '''Libro'' corresponde mejor a הַסֵּפֶר / ''book''; ''el hombre'' suena menos neutral que ''la persona'' o ''quien''; y ''ello'' es aceptable pero algo tieso. ''de ella'' sería ambiguo en español, así que puede mantenerse ''de ello'' por fidelidad formal.'
  revised_spanish_text: Todo este libro está lleno de ello[b][a]; dichosa la persona que escuchará y hará.
  revised_footnotes:
  - marker: a
    text: El testigo hebreo extante provisto aquí está marcado como un desajuste mayor y no corresponde a la redacción de este versículo; por eso, para Sirácida 1:26 la traducción sigue el texto griego.
    reason: textual_variant
  - marker: b
