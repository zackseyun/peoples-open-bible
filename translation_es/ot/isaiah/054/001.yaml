review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: los imperativos de júbilo, la descripción de la mujer que no ha dado a luz/no ha estado de parto, la comparación compacta final y la fórmula profética con Yahvé. Sin embargo, en español «los hijos ... son más que los hijos ...» queda incompleto/forzado; el hebreo comparativo puede y debe explicitarse mejor como «son más numerosos que».'
  spanish_quality_summary: El español es claro y digno en general. «¡Canta!» y «estalla en cánticos» funcionan bien, y «dice Yahvé» sigue el estilo del proyecto. La principal mejora necesaria es de naturalidad y precisión idiomática en la comparación final. También conviene preferir «hijos» o «descendencia» de modo coherente; aquí «hijos» es aceptable, pero la frase comparativa pide ajuste.
  glossary_alignment: Alineado con el glosario del proyecto en el uso de «Yahvé» para יְהוָה. No hay conflictos teológicos mayores. La elección «mujer estéril» para עקרה y «de parto» para לא חלה es adecuada. La única corrección relevante es estilístico-semántica en la comparación de רַבִּים ... מִן.
  issues:
  - severity: medium
    issue: 'Comparación final poco idiomática: «los hijos de la desolada son más que los hijos de la casada»'
    rationale: Aunque intenta reflejar la compacidad del hebreo, en español «son más que» aplicado a «hijos» suena truncado; el sentido comparativo de רַבִּים con מן se expresa mejor como «son más numerosos que» o «son más que los de». La nota ya documenta esta alternativa.
  - severity: low
    issue: Tensión menor entre compacidad hebrea y claridad española en «la desolada / la casada»
    rationale: La elipsis femenina es posible en español, pero la comparación gana fluidez si se mantiene y se resuelve con una formulación natural. No exige expandir a «mujer» necesariamente.
  revised_spanish_text: ¡Canta[a], mujer estéril, tú que no has dado a luz; estalla en cánticos y grita de gozo, tú que no has estado de parto. Porque los hijos de la desolada son más numerosos que los hijos de la casada, dice Yahvé.
  revised_footnotes:
  - marker: a
    text: O «la descendencia de la desolada es mucha/más numerosa que la descendencia de la casada». El hebreo expresa la comparación de manera compacta.
    reason: lexical_alternative
  revision_rationale: Se conserva casi todo el borrador porque es fiel al hebreo y al rastro de auditoría inglés. Se ajusta únicamente la comparación final a «son más numerosos que» para expresar de forma idiomática y precisa el comparativo hebreo, evitando una construcción española forzada.
