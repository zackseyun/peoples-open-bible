translation:
  language: es
  text: Pero los que no fueron amonestados por correcciones casi juguetonas[a] experimentarán un juicio digno de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por reprensiones de burla» / «por reprensiones burlonas». La frase griega παιγνίοις ἐπιτιμήσεως es muy comprimida y puede subrayar el carácter relativamente leve, casi infantil, de los castigos o correcciones anteriores.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «probarán un juicio digno de Dios», es decir, lo conocerán al pasar por él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παιγνίοις ἐπιτιμήσεως
  english_pob_choice: mocking reproofs
  chosen_spanish: reprensiones burlonas
  alternatives_spanish:
  - reprensiones de burla
  - amonestaciones burlonas
  - correcciones casi juguetonas
  lexicon: LSJ
  rationale: La frase griega es comprimida y combina la idea de corrección con un matiz ligero o irónico. 'Reprensiones burlonas' conserva el carácter de reprensión y el tono despectivo o poco solemne que documenta la POB inglesa, sin reducirlo a 'castigos' ni suavizarlo demasiado.
- source_word: νουθετηθέντες
  english_pob_choice: were not admonished
  chosen_spanish: no fueron amonestados
  alternatives_spanish:
  - no fueron advertidos
  - no fueron corregidos
  - no recibieron instrucción
  lexicon: LSJ
  rationale: El verbo tiene fuerza de amonestación o corrección instructiva. 'Amonestados' refleja mejor esa dimensión pedagógica que 'instruidos', y coincide con la revisión inglesa que privilegia la idea de admonición.
- source_word: ἀξίαν
  english_pob_choice: worthy of
  chosen_spanish: digno de
  alternatives_spanish:
  - merecedor de
  - apropiado para
  - correspondiente a
  lexicon: LSJ
  rationale: '''Digno de'' reproduce de forma natural la relación de valor o adecuación expresada por ἀξίαν. Mantiene la tensión de una sentencia proporcionada sin convertirla en una paráfrasis interpretativa excesiva.'
- source_word: θεοῦ κρίσιν
  english_pob_choice: the judgment worthy of God
  chosen_spanish: el juicio digno de Dios
  alternatives_spanish:
  - el juicio de Dios
  - un juicio digno de Dios
  - un juicio divino
  lexicon: LSJ
  rationale: Se conserva la construcción ambigua que puede leerse como un juicio perteneciente a Dios o como un juicio acorde con lo que es Dios. 'El juicio digno de Dios' sigue de cerca la relación griega y mantiene la lectura cualitativa documentada en la POB inglesa.
- source_word: πειράσουσιν
  english_pob_choice: will experience
  chosen_spanish: experimentarán
  alternatives_spanish:
  - probarán
  - sufrirán
  - pasarán por
  lexicon: LSJ
  rationale: El verbo puede significar 'probar' o 'experimentar' al pasar por algo. 'Experimentarán' comunica de forma idiomática que el juicio será vivido/soportado, sin sugerir que lo examinan activamente.
theological_decisions:
- issue: Naturaleza de 'el juicio digno de Dios' en ἀξίαν θεοῦ κρίσιν
  english_pob_reading: 'qualitative genitive: ''a judgment worthy of God'''
  chosen_spanish_reading: 'lectura cualitativa: ''el juicio digno de Dios'''
  alternative_spanish_readings:
  - el juicio de Dios
  - un juicio divino
  - el juicio merecido
  rationale: La sintaxis griega permite oír tanto posesión como cualidad. Se preserva la lectura cualitativa que destaca la gravedad y la justicia del juicio, sin borrar la posibilidad de una referencia directa al juicio procedente de Dios. La formulación española mantiene la tensión en lugar de resolverla de modo dogmático.
  doctrine_reference: Preservar la ambigüedad semántica documentada; no aplanar la relación entre el juicio y Dios.
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego de Swete LXX 1909 y toma como contexto auditado la versión inglesa POB más reciente, que revisó 'instructed' a 'admonished' y 'childish punishments' a 'mocking reproofs'. En español se reflejan esos ajustes con 'amonestados' y 'reprensiones burlonas', manteniendo la ambigüedad de ἀξίαν θεοῦ κρίσιν.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ y se conserva 'juicio' en vez de 'castigo' para respetar la sintaxis y la ambigüedad cualitativa del griego.
  - Se evita 'SEÑOR' porque no hay aquí el tetragrámaton ni una cita directa del nombre divino.
  - Se mantiene un registro formal y publicable, con 'amonestados' como equivalente de νουθετηθέντες.
  - La nota a pie de página preserva la alternativa lexical del griego comprimido sin introducir una interpretación no atestiguada.
