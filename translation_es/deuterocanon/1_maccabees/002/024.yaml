revisions:
- from: Y Matatías lo vio y tuvo celo[a]; y sus entrañas temblaron, y sacó ira conforme al juicio[b], y corriendo subió y lo degolló sobre el altar.
  to: Y Matatías lo vio y tuvo celo; y sus entrañas[a] temblaron, y sacó ira conforme al juicio[b], y corriendo hacia él lo degolló sobre el altar.
  rationale: Se movió la nota [a] al lugar correcto para que comente la expresión que realmente explica. También se cambió ‘corriendo subió’ por ‘corriendo hacia él’ para evitar añadir una noción de ascenso no exigida por δραμὼν, manteniendo la rapidez de la acción y un español más natural. El resto del texto conserva fielmente las decisiones léxicas y teológicas del audit trail.
