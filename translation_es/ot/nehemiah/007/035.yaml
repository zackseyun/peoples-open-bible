lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - la casa de
  lexicon: HALOT
  rationale: En listas genealógicas o censales del período posexílico, בְּנֵי introduce con frecuencia un grupo familiar o clan. En español, «los hijos de» conserva la forma formal del hebreo y suena natural en este contexto. «Los descendientes de» también sería posible, pero añade un matiz más interpretativo; «la casa de» no está sugerida directamente por el hebreo aquí.
- source_word: חָרִם
  english_pob_choice: Harim
  chosen_spanish: Harim
  alternatives_spanish:
  - Jarim
  lexicon: nombre propio
  rationale: Es un nombre propio de clan/persona; se translitera como Harim, siguiendo la forma ya establecida en la tradición POB en inglés y evitando una adaptación innecesaria.
- source_word: שְׁלֹשׁ מֵאוֹת וְעֶשְׂרִים
  english_pob_choice: three hundred and twenty
  chosen_spanish: trescientos veinte
  alternatives_spanish:
  - trescientos y veinte
  lexicon: numeral cardinal
  rationale: El hebreo expresa un número cardinal directo. En español contemporáneo y formal, «trescientos veinte» es la forma natural y exacta; añadir «y» no es necesario en este caso.
translation_notes:
  revision_awareness: El inglés auditado revisó la cifra a 'three hundred and twenty' para una forma más natural en inglés formal. En español, la equivalencia natural ya es 'trescientos veinte', sin necesidad de una marca adicional.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y de lista censal, sin expandir el sentido del hebreo.
  - No se introdujeron notas porque no hay ambigüedad textual o lexical relevante en este versículo.
  - Se conservó el nombre propio sin traducción, conforme al criterio de transliteración para nombres.
