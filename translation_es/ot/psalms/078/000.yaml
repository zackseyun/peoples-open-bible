translation:
  language: es
  text: Masquil[a] de Asaf. Presten oído, pueblo mío, a mi instrucción; inclinen sus oídos a las palabras de mi boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Masquil» es un término técnico en los encabezados de los salmos; puede denotar una composición instructiva o contemplativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׂכִּיל / Maskil
  english_pob_choice: A Maskil of Asaph.
  chosen_spanish: Masquil
  alternatives_spanish:
  - Poema didáctico
  - Canto instructivo
  - Poema de enseñanza
  lexicon: título de salmo / término técnico
  rationale: Conservo el término técnico del encabezado en forma transliterada porque el POB inglés también lo trata como designación técnica y no como parte del contenido exhortativo. En español, una paráfrasis como 'poema didáctico' explicaría el sentido pero perdería la forma titulada.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - de Asaf
  - para Asaf
  lexicon: nombre propio
  rationale: '''De Asaf'' reproduce la relación nominal más directa y natural en español para la atribución del salmo.'
- source_word: הַאֲזִינָה
  english_pob_choice: Give ear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Presten oído
  - Atiendan
  - Oigan
  lexicon: imperativo de oír/escuchar
  rationale: La forma plural 'Escuchen' comunica con naturalidad la exhortación colectiva del hebreo y mantiene el imperativo fuerte de prestar atención, sin volverlo demasiado literario o arcaico.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: pueblo mío
  alternatives_spanish:
  - mi pueblo
  - pueblo mío
  lexicon: vocativo
  rationale: '''Pueblo mío'' suena más natural en español en un llamado directo, aunque ''mi pueblo'' también es posible. Mantiene la relación de pertenencia sin alterar el tono profético/enseñante.'
- source_word: תּוֹרָתִי
  english_pob_choice: my instruction
  chosen_spanish: mi instrucción
  alternatives_spanish:
  - mi enseñanza
  - mi ley
  lexicon: תּוֹרָה / instruction
  rationale: Sigo la decisión del POB inglés de evitar reducir תּוֹרָה automáticamente a 'ley'. 'Instrucción' preserva el sentido pedagógico y abarcador que el texto pide en este contexto.
- source_word: הַטּוּ אָזְנְכֶם
  english_pob_choice: incline your ears
  chosen_spanish: inclinen sus oídos
  alternatives_spanish:
  - presten sus oídos
  - inclinen el oído
  - atiendan
  lexicon: imperativo idiomático de atención
  rationale: Mantengo la imagen corporal del hebreo y la estructura paralela con 'Escuchen'. 'Sus oídos' sigue el plural del vocativo y hace evidente la intensificación.
- source_word: לְאִמְרֵי פִי
  english_pob_choice: to the words of my mouth
  chosen_spanish: a las palabras de mi boca
  alternatives_spanish:
  - a las palabras de mi boca
  - a lo que digo
  lexicon: expresión idiomática
  rationale: La frase se traduce de manera literal y natural. 'De mi boca' conserva la concreción semítica del original sin forzar una equivalencia más abstracta.
theological_decisions:
- issue: Naturaleza del encabezado 'Maskil'
  english_pob_reading: “Maskil” is a technical term in the psalm headings; it may denote an instructive or contemplative composition.
  chosen_spanish_reading: «Masquil» como término técnico del encabezado; posible matiz instructivo o contemplativo.
  alternative_spanish_readings:
  - «Poema didáctico»
  - «Canto reflexivo»
  rationale: No desarrollo el título con una traducción interpretativa en el texto principal porque el POB inglés conserva la designación técnica y solo la explica en nota. La forma transliterada permite auditar el término y evita borrar su ambigüedad funcional.
  doctrine_reference: Salmos / encabezados litúrgicos-poéticos
- issue: Traducción de תּוֹרָה como instrucción
  english_pob_reading: my instruction
  chosen_spanish_reading: mi instrucción
  alternative_spanish_readings:
  - mi ley
  - mi enseñanza
  rationale: En este verso, 'instrucción' refleja mejor el carácter exhortativo y formativo de la voz divina que el sentido legal estrecho de 'ley'. Esto sigue la línea del POB de no imponer de antemano una traducción jurídica si el contexto habla de enseñanza.
  doctrine_reference: Torá como enseñanza divina
- issue: Sujeto implícito plural del imperativo
  english_pob_reading: Give ear... incline your ears
  chosen_spanish_reading: Escuchen... inclinen sus oídos
  alternative_spanish_readings:
  - Escucha... inclina tu oído
  rationale: El hebreo y el POB inglés dirigen la exhortación al colectivo ('my people'), por lo que el plural en español es necesario para no singularizar indebidamente la apelación.
  doctrine_reference: Vocativo comunitario en poesía bíblica
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para completar el texto del verso más allá del encabezado, incorporando la exhortación principal: ''Give ear, my people, to my instruction; incline your ears to the words of my mouth.'' La presente traducción sigue esa forma completa y conserva el carácter de encabezado con un término técnico separado del mandato.'
  spanish_consistency_notes:
  - He mantenido 'Masquil' como transliteración técnica para respetar el encabezado del salmo y su ambigüedad documentada.
  - He usado plural reverencial/no reverencial 'Escuchen... inclinen sus oídos' porque el destinatario es colectivo ('pueblo mío').
  - '''Instrucción'' refleja תּוֹרָה en este contexto sin convertirla automáticamente en ''ley''.'
  - El orden de las dos cláusulas imperativas sigue el paralelismo del hebreo y del POB inglés.
