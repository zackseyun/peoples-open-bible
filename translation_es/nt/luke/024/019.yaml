translation:
  language: es
  text: 'Y él les dijo: «¿Qué cosas?». Ellos le dijeron: «Las cosas acerca de Jesús el Nazareno[a], que fue un hombre, un profeta[b], poderoso en obra y palabra delante de Dios y de todo el pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Nazaret»; el griego dice «el Nazareno».
    reason: lexical_alternative
  - marker: b
    text: El griego dice más literalmente «llegó a ser un hombre, un profeta»; «fue» se usa aquí como equivalencia idiomática en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ποῖα
  english_pob_choice: What things?
  chosen_spanish: ¿Qué cosas?
  alternatives_spanish:
  - ¿Qué?
  - ¿Cuáles cosas?
  lexicon: BDAG
  rationale: El interrogativo plural neutro pide en español una forma que conserve la referencia a asuntos o hechos ya mencionados. «¿Qué cosas?» mantiene ese plural con naturalidad.
- source_word: Τὰ περὶ Ἰησοῦ
  english_pob_choice: The things concerning Jesus
  chosen_spanish: Las cosas acerca de Jesús
  alternatives_spanish:
  - Las cosas concernientes a Jesús
  - Lo referente a Jesús
  lexicon: BDAG
  rationale: «Las cosas acerca de Jesús» reproduce el sentido del sintagma con claridad en español y evita sobreinterpretar como «hechos» o «acontecimientos».
- source_word: Ναζαρηνοῦ
  english_pob_choice: the Nazarene
  chosen_spanish: el Nazareno
  alternatives_spanish:
  - de Nazaret
  - el Nazareno de Nazaret
  lexicon: BDAG
  rationale: El adjetivo griego funciona como designación titulada. «El Nazareno» preserva ese valor nominal y es la opción española más directa.
- source_word: ἐγένετο
  english_pob_choice: was
  chosen_spanish: fue
  alternatives_spanish:
  - llegó a ser
  - se hizo
  - resultó ser
  lexicon: BDAG
  rationale: Aunque el griego usa γίνομαι, el POB inglés decidió una equivalencia idiomática con «was». En español, «fue» comunica naturalmente el estado/descripción sin forzar un «llegó a ser» que sonarían innecesariamente marcado en esta cláusula.
- source_word: ἀνὴρ προφήτης
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - un hombre, un profeta
  - un hombre que fue profeta
  - un profeta, un hombre
  lexicon: BDAG
  rationale: Sigo el ajuste del POB inglés que optó por una lectura más natural de la apposición y no conserva explícitamente «hombre» en la frase principal. En español, añadir «hombre» aquí sería más pesado y no necesario para reflejar el sentido de la línea.
- source_word: δυνατὸς
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - poderoso
  - capaz
  lexicon: BDAG
  rationale: «Poderoso» refleja bien el matiz elevado de δυνατός en este contexto y suena natural con la pareja «en obra y palabra».
- source_word: ἐν ἔργῳ καὶ λόγῳ
  english_pob_choice: in deed and word
  chosen_spanish: en obra y palabra
  alternatives_spanish:
  - en hechos y palabras
  - en acción y palabra
  lexicon: BDAG
  rationale: «Obra y palabra» conserva la construcción bíblica y el paralelismo del griego, sin perder claridad en español.
- source_word: ἐναντίον τοῦ θεοῦ καὶ παντὸς τοῦ λαοῦ
  english_pob_choice: before God and all the people
  chosen_spanish: delante de Dios y de todo el pueblo
  alternatives_spanish:
  - ante Dios y ante todo el pueblo
  - en presencia de Dios y de todo el pueblo
  lexicon: BDAG
  rationale: «Delante de» expresa con naturalidad la idea de estar a la vista / en la presencia de, y mantiene el doble testimonio divino y público.
theological_decisions:
- issue: Mención explícita de ἀνήρ aplicada a Jesús
  english_pob_reading: a prophet
  chosen_spanish_reading: un profeta
  alternative_spanish_readings:
  - un hombre, un profeta
  - un hombre que fue profeta
  rationale: El inglés POB, siguiendo su revisión, no mantuvo «man» en la traducción principal. Para español, omitir «hombre» evita una formulación recargada y sigue el mismo criterio de naturalidad, sin alterar la descripción que hacen los hablantes.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió una formulación más literal de ἐγένετο por un «was a prophet» más idiomático. En español se siguió ese ajuste con «fue un profeta», evitando una calca como «llegó a ser un profeta» que aquí sonaría menos natural y no aporta una distinción exegética decisiva en el flujo de la frase.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «Dios» para θεοῦ conforme a los estándares del proyecto.
  - «El Nazareno» preserva el valor de designación de Ναζαρηνός sin convertirlo en una paráfrasis geográfica.
  - «Obra y palabra» mantiene la pareja semítica y el ritmo de la cláusula.
  - No se introdujo «Cristo» porque el texto griego no lo contiene en este versículo.
