translation:
  language: es
  text: Porque Yahvé es grande y muy digno de alabanza[a]; él debe ser temido[b] sobre todos los dioses[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «muy alabado». La expresión participial hebrea es más literal «alabado mucho»; aquí se vierte de forma idiomática como «muy digno de alabanza».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «temible» / «que inspira reverente temor». El hebreo expresa que él suscita temor reverente; «debe ser temido» preserva mejor esa fuerza que el sentido moderno debilitado de «impresionante».'
    reason: lexical_alternative
  - marker: c
    text: «Dioses» puede referirse a las deidades de las naciones; el versículo siguiente los identifica como ídolos sin valor.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduces la razón o fundamento de la exhortación anterior. «Porque» preserva bien el valor explicativo y suena natural en español bíblico contemporáneo.
- source_word: גָדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - mighty
  - excelso
  lexicon: HALOT
  rationale: El adjetivo expresa grandeza en majestad y rango. «Grande» es el equivalente más directo y natural en español sin restringir indebidamente el sentido a poder físico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino mediante la transliteración tradicionalizada «Yahvé», conforme al criterio del proyecto para יְהוָה y en lugar de ocultarlo con un título.
- source_word: וּמְהֻלָּל
  english_pob_choice: and greatly to be praised
  chosen_spanish: y digno de ser alabado
  alternatives_spanish:
  - y muy alabado
  - y altamente alabado
  lexicon: HALOT
  rationale: El participio pasivo expresa que es objeto de alabanza. En español, «digno de ser alabado» comunica con naturalidad la fuerza predicativa sin perder el valor del pasivo.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: en gran manera
  alternatives_spanish:
  - mucho
  - sumamente
  lexicon: HALOT
  rationale: Intensifica la alabanza debida a Yahvé. «En gran manera» conserva la intensificación fuerte del hebreo y evita una repetición demasiado cercana de «grande».
- source_word: נוֹרָא
  english_pob_choice: to be feared
  chosen_spanish: temible
  alternatives_spanish:
  - de temer
  - que inspira reverente temor
  lexicon: HALOT
  rationale: El hebreo indica que inspira temor reverente. «Temible» mantiene la fuerza semántica de manera breve y bíblica; evita el debilitamiento de «impresionante/awesome».
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: es él
  alternatives_spanish:
  - él es
  lexicon: HALOT
  rationale: El pronombre explícito se refleja con una construcción natural en español. El orden «temible es él» preserva el énfasis poético sin forzar la sintaxis.
- source_word: עַל כָּל אֱלֹהִים
  english_pob_choice: above all gods
  chosen_spanish: sobre todos los dioses
  alternatives_spanish:
  - por encima de todos los dioses
  - más que todos los dioses
  lexicon: HALOT
  rationale: La preposición expresa superioridad. «Sobre todos los dioses» es la forma más concisa y fiel al paralelismo del verso, conservando el sustantivo plural «dioses».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. Según la política del POB, no se sustituye por un título; «Yahvé» preserva el nombre personal del Dios de Israel con claridad para el lector español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de אֱלֹהִים en este contexto
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - seres divinos
  - ídolos
  rationale: El hebreo habla de «dioses», y el contraste inmediato con Yahvé debe mantenerse. Aunque el contexto más amplio polemiza contra los ídolos, esta línea conserva la forma léxica directa y deja que el contexto cercano haga su trabajo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios; el consenso de revisión es alto y coincide con la lectura base. Se mantuvieron las decisiones clave del audit trail: el nombre divino como Yahvé, la alabanza intensificada del participio, el temor reverente de נוֹרָא y la referencia directa a «dioses».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - «Digno de ser alabado» conserva la fuerza del participio sin calco torpe.
  - «Temible» mantiene la idea de temor reverente y no el matiz trivializado de «impresionante».
  - Se conservó «dioses» en plural para respetar la polemica del salmo y su continuidad inmediata con el versículo 5.
