translation:
  language: es
  text: Y vieron la fuerza del reino y la arremetida de las fuerzas[a][b], y se apartaron de ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Arremetida» traduce aquí el griego ὁρμήμα; también puede entenderse como «asalto» o «carga». El término expresa un movimiento ofensivo y enérgico en combate.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «de ellas»; el plural probablemente se refiere a las fuerzas mencionadas, aunque también podría resumir más ampliamente el poder real recién mencionado.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰσχὺν
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: LSJ
  rationale: ἰσχύς denota fuerza, vigor o poder. «Fuerza» es natural en español y encaja bien con el contexto militar-político sin volver más abstracto el término.
- source_word: βασιλείας
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - realeza
  - poder real
  - monarquía
  lexicon: LSJ
  rationale: βασιλεία puede significar reino, reinado o realeza. Aquí el contexto apunta al dominio/poder del monarca en sentido amplio; «reino» es la opción más clara y estable en español.
- source_word: ὁρμήμα
  english_pob_choice: onrush
  chosen_spanish: ímpetu
  alternatives_spanish:
  - arremetida
  - embestida
  - asalto
  lexicon: LSJ
  rationale: ὁρμήμα expresa un avance violento o un impulso de ataque. «Ímpetu» comunica el movimiento enérgico de la frase y evita sobrecargarla con una interpretación demasiado específica.
- source_word: δυνάμεων
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - tropas
  - ejércitos
  - huestes
  lexicon: LSJ
  rationale: En contexto militar, δυνάμεις puede referirse a fuerzas, tropas o ejércitos. «Fuerzas» conserva la amplitud del griego y mantiene una lectura sobria y pública.
- source_word: ἐξέκλιναν
  english_pob_choice: turned away
  chosen_spanish: se apartaron
  alternatives_spanish:
  - se retiraron
  - retrocedieron
  - se desviaron
  lexicon: LSJ
  rationale: ἐκκλίνω significa apartarse, desviarse o volverse aparte. En este contexto bélico, «se apartaron» conserva la imagen básica sin forzar un verbo técnico de retirada militar.
- source_word: ἀπʼ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: de ellas
  alternatives_spanish:
  - de ellos
  - de él
  lexicon: Greek grammar
  rationale: El plural αὐτῶν más naturalmente retoma a las «fuerzas» mencionadas inmediatamente antes, aunque podría resumir el poder real en conjunto. «De ellas» mantiene el número plural del griego y deja abierta esa referencia.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «fierce rush» a «onrush» para hacer más directo y formal el valor de ὁρμήμα. La versión española adopta un término igualmente sobrio («ímpetu») que conserva el movimiento de avance sin añadir intensidad no documentada.
  spanish_consistency_notes:
  - Se prefirió «reino» para βασιλεία, en coherencia con el uso amplio del término en contexto monárquico-militar.
  - Se mantuvo el plural en el pronombre final («de ellas») para reflejar el griego αὐτῶν y no cerrar la posible referencia.
  - No se usó vocabulario eclesiástico tradicional, porque el pasaje es histórico-militar y no requiere terminología litúrgica.
