    rationale: La construcción española con «como» puede sonar comparativa o algo atenuada. «Los convirtió en esclavos» o «los hizo esclavos» comunica mejor la entrada real en condición de esclavitud.
  - severity: low
    issue: «En el trabajo» queda demasiado genérico para πόνος en este contexto.
    rationale: Dado el marco del éxodo y la combinación con πλίνθῳ, «trabajo forzado» o «duro trabajo» refleja mejor la labor penosa impuesta sin sobreinterpretar.
