translation:
  language: es
  text: Y Jonatán se enteró de ello, y le envió embajadores[a] para hacer la paz con él y devolverles los cautivos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enviados» para «embajadores». El término griego designa representantes oficiales en un contexto diplomático.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la cautividad»; aquí se refiere a las personas que habían sido tomadas cautivas, de ahí «los cautivos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνω
  english_pob_choice: learned of it
  chosen_spanish: se enteró de ello
  alternatives_spanish:
  - lo supo
  - llegó a saberlo
  - se dio cuenta de ello
  lexicon: LSJ
  rationale: El aoristo de γινώσκω aquí expresa la llegada a conocer un hecho. «Se enteró de ello» conserva ese matiz de recepción de noticia en un español natural y solemne.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  - mandó
  lexicon: LSJ
  rationale: ἀποστέλλω se rinde de forma directa como «envió»; es fiel y claro sin añadir matiz innecesario.
- source_word: πρέσβεις
  english_pob_choice: ambassadors
  chosen_spanish: embajadores
  alternatives_spanish:
  - enviados
  - mensajeros
  lexicon: LSJ
  rationale: El término griego designa representantes oficiales en contexto diplomático. «Embajadores» preserva mejor esa función formal que «mensajeros».
- source_word: τοῦ συνθέσθαι ... εἰρήνην
  english_pob_choice: to make peace
  chosen_spanish: para hacer la paz
  alternatives_spanish:
  - para concluir la paz
  - para llegar a un acuerdo de paz
  - para pactar la paz
  lexicon: LSJ
  rationale: El infinitivo articular expresa finalidad. «Hacer la paz» refleja con naturalidad la idea de concertar o concluir paz sin sobreespecificar una forma jurídica de tratado.
- source_word: ἀποδοῦναι
  english_pob_choice: to return
  chosen_spanish: devolver
  alternatives_spanish:
  - dar de vuelta
  - restaurar
  lexicon: LSJ
  rationale: El verbo significa dar de nuevo lo retenido. «Devolver» comunica bien la acción respecto de los cautivos y mantiene el impulso del original.
- source_word: τὴν αἰχμαλωσίαν
  english_pob_choice: the captives
  chosen_spanish: los cautivos
  alternatives_spanish:
  - la cautividad
  - los prisioneros de guerra
  lexicon: LSJ
  rationale: Aunque literalmente puede aludir a la cautividad como estado, aquí el contexto señala a las personas tomadas cautivas. «Los cautivos» evita la abstracción y coincide con la decisión inglesa de aclarar el referente.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a su gente
  lexicon: LSJ
  rationale: El dativo se conserva como complemento indirecto. «Les» es el equivalente natural en español; el antecedente queda deliberadamente implícito como en el griego.
theological_decisions:
- issue: 'Alcance de αἰχμαλωσίαν: estado abstracto o personas cautivas'
  english_pob_reading: the captives
  chosen_spanish_reading: los cautivos
  alternative_spanish_readings:
  - la cautividad
  - los prisioneros
  rationale: 'No hay desarrollo doctrinal, pero sí una decisión semántica relevante: el contexto apunta a personas concretas, no solo al estado de cautiverio. Por eso se evita «la cautividad» en el texto principal.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa auditada ya había fijado la lectura de ἔγνω como «learned of it», πρέσβεις como «ambassadors» con nota de alternativa, y αἰχμαλωσίαν como «the captives» con nota explicativa. No se reportan revisiones aplicadas; la presente propuesta conserva esas decisiones en español y solo ajusta el orden sintáctico para que el verso resulte natural y fiel.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de lugar porque el versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque no aparece en el texto.
  - «Los cautivos» se usó como equivalente contextual de αἰχμαλωσίαν, siguiendo la lectura auditada del inglés.
  - El tratamiento pronominal «a él / les» conserva la referencia implícita del griego sin sobreinterpretarla.
