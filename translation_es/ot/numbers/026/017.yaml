translation:
  language: es
  text: De Arod[a], el clan de los aroditas; de Areli, el clan de los arelitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «A Arod pertenecía el clan de los aroditas; a Areli pertenecía el clan de los arelitas». La preposición hebrea ל introduce cada nombre ancestral en una fórmula censal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַ/אֲרֹד
  english_pob_choice: From Arod
  chosen_spanish: De Arod
  alternatives_spanish:
  - Desde Arod
  - A Arod
  lexicon: HALOT
  rationale: En la fórmula censal, la preposición ל funciona como indicación de origen o descendencia. En español, «de» reproduce de manera natural esa relación genealógica sin perder el valor formulaico del hebreo.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: el clan de
  alternatives_spanish:
  - la familia de
  - el linaje de
  lexicon: HALOT
  rationale: En contextos tribales y censales, מִשְׁפָּחָה designa una subdivisión de parentesco dentro de la tribu. «Clan» conserva ese valor técnico mejor que «familia» en español bíblico contemporáneo.
- source_word: הָ/אֲרוֹדִי
  english_pob_choice: the Arodites
  chosen_spanish: los aroditas
  alternatives_spanish:
  - la casa de Arod
  - los aroditas
  lexicon: HALOT
  rationale: El gentilicio hebreo nombra al grupo descendiente de Arod. «Aroditas» mantiene el sentido colectivo y sigue el patrón español usual para grupos étnico-genealógicos.
- source_word: לְ/אַ֨רְאֵלִ֔י
  english_pob_choice: from Areli
  chosen_spanish: de Areli
  alternatives_spanish:
  - desde Areli
  - a Areli
  lexicon: HALOT
  rationale: Se conserva la misma relación de procedencia/descendencia que en la primera mitad del verso, usando «de» para mantener la paralelismo formular del texto.
- source_word: הָ/אַרְאֵלִי
  english_pob_choice: the Arelites
  chosen_spanish: los arelitas
  alternatives_spanish:
  - la familia de Areli
  - los arelianos
  lexicon: HALOT
  rationale: Como en el primer gentilicio, el plural español colectivo comunica correctamente el grupo descendiente. «Arelitas» es transparente, formal y consistente con el paralelo del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión inglesa más reciente, que no introdujo cambios respecto de la traducción auditada; por eso no hay variantes textuales o teológicas adicionales que reflejar.
  spanish_consistency_notes:
  - Se mantiene «clan» para מִשְׁפָּחָה en sentido censal, coherente con el uso técnico del pasaje.
  - Se usa «de» para traducir la ל formulaica de procedencia/descendencia, con la alternativa formal indicada en la nota.
  - Los gentilicios se pluralizan como nombres colectivos en español («aroditas», «arelitas») para reflejar la referencia a grupos descendientes.
