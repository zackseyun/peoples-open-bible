source:
  edition: SBLGNT
  text: καὶ τότε φανήσεται τὸ σημεῖον τοῦ υἱοῦ τοῦ ἀνθρώπου ἐν ⸀τῷ οὐρανῷ, καὶ τότε κόψονται πᾶσαι αἱ φυλαὶ τῆς γῆς καὶ ὄψονται τὸν υἱὸν τοῦ ἀνθρώπου ἐρχόμενον ἐπὶ τῶν νεφελῶν τοῦ οὐρανοῦ μετὰ δυνάμεως καὶ δόξης πολλῆς·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/024/030.yaml
  text: And then the sign of the Son of Man will appear in heaven[a], and then all the tribes of the earth will mourn[c][b], and they will see the Son of Man coming on the clouds of heaven with power and great glory.
  footnotes:
  - marker: a
    text: Or 'in the sky.' The Greek οὐρανός can mean either 'heaven' or 'sky' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the tribes of the land.' The Greek γῆ can mean 'earth' or 'land.'
    reason: alternative_reading
  - marker: c
    text: The phrase 'coming on the clouds of heaven' echoes Daniel 7:13.
    reason: cross_reference
translation:
  language: ko
  text: 그때에 인자의 표적이 하늘에 나타날 것이며, 그때에 땅의 모든 족속이 통곡하며, 인자가 능력과 큰 영광으로 하늘 구름을 타고 오는 것을 그들이 볼 것입니다.
  philosophy: optimal-equivalence
