revisions:
- from: Tened piedad de mí[a], tened piedad de mí, vosotros mis amigos[b], porque la mano de Dios me ha herido.
  to: Tengan piedad de mí[a], tengan piedad de mí, ustedes mis amigos[b], porque la mano de Dios me ha herido.
  rationale: Se ajusta el texto a un español neutral latinoamericano reemplazando «tened/vosotros» por «tengan/ustedes», sin perder el vocativo directo ni la repetición enfática del hebreo. También se corrige la nota léxica para evitar el calco poco idiomático «tened gracia de mí» y ofrecer alternativas naturales que preservan el campo semántico de חנן. Se conserva «me ha herido» como una representación válida del impacto dañino de נָגְעָה בִּי en este contexto.
