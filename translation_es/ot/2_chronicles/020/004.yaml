translation:
  language: es
  text: Y Judá se reunieron para buscar a Yahvé[a]; incluso vinieron de todas las ciudades de Judá para buscar a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, más literalmente en la primera cláusula: «buscar de Yahvé». El sentido en contexto puede implicar buscar ayuda o libramiento de parte de él; la segunda cláusula dice literalmente «buscar a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  english_pob_choice: gathered together
  chosen_spanish: se reunió
  alternatives_spanish:
  - se congregó
  - se juntó
  lexicon: HALOT
  rationale: El nifal de קבץ expresa reunión/agrupación del pueblo; en español, «se reunió» comunica una acción colectiva y natural sin perder el matiz de convocatoria conjunta.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - la gente de Judá
  - el reino de Judá
  lexicon: HALOT
  rationale: Aquí el sujeto es colectivo y corporativo. «Judá» mantiene el nombre propio bíblico sin añadir una glosa interpretativa que el hebreo no explicita.
- source_word: לְבַקֵּשׁ מֵיְהוָה
  english_pob_choice: to seek from Yahweh / to seek Yahweh
  chosen_spanish: buscar a Yahvé
  alternatives_spanish:
  - buscar de Yahvé
  - buscar ayuda de Yahvé
  - buscar a Yahvé para ayuda
  lexicon: HALOT
  rationale: El hebreo con מן + YHWH sugiere buscar algo de parte de Dios; sin embargo, la revisión inglesa decidió no sobreespecificar «help». En español, «buscar a Yahvé» conserva la relación personal y deja implícita la ayuda o liberación que el contexto demanda.
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: incluso
  alternatives_spanish:
  - también
  - hasta
  lexicon: HALOT
  rationale: «Incluso» conserva el valor enfático de גם en la segunda cláusula, marcando el alcance ampliado de la acción.
- source_word: מִכָּל עָרֵי יְהוּדָה
  english_pob_choice: from all the cities of Judah
  chosen_spanish: de todas las ciudades de Judá
  alternatives_spanish:
  - desde todas las ciudades de Judá
  - de cada una de las ciudades de Judá
  lexicon: HALOT
  rationale: La expresión indica procedencia amplia y geográfica. «De todas las ciudades de Judá» es claro, idiomático y fiel al alcance total del hebreo.
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - acudieron
  lexicon: HALOT
  rationale: El verbo de movimiento פשוט en este contexto se rinde bien con «vinieron»; además, combina naturalmente con la preposición de procedencia anterior.
- source_word: לְבַקֵּשׁ אֶת יְהוָה
  english_pob_choice: to seek Yahweh
  chosen_spanish: para buscar a Yahvé
  alternatives_spanish:
  - para buscar a Yahvé mismo
  - para buscar al Yahvé
  lexicon: HALOT
  rationale: La segunda construcción con את se dirige al objeto personal directo. «Buscar a Yahvé» preserva la variación del hebreo y evita uniformarla artificialmente con la primera cláusula.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se sigue el criterio del proyecto de transliterar el Nombre divino como una forma española naturalizada, «Yahvé», en lugar de sustituirlo por un título. Esto conserva el nombre personal de Dios revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahweh'
- issue: Whether to preserve the Hebrew distinction between בקש with מן and with את
  english_pob_reading: Different English renderings are used in the audit trail, but the final revision simplified to 'seek Yahweh' in both clauses.
  chosen_spanish_reading: 'Mantener una sola forma: «buscar a Yahvé» en ambas cláusulas, con la primera precedida por el matiz contextual de reunión colectiva.'
  alternative_spanish_readings:
  - buscar ayuda de Yahvé / buscar a Yahvé
  - buscar a Yahvé / buscar a Yahvé para ayuda
  - buscar al Yahvé / buscar a Yahvé
  rationale: El texto hebreo distingue las construcciones, pero la revisión inglesa final privilegia una lectura más directa y menos explicativa. En español, repetir «buscar a Yahvé» respeta esa decisión revisada y evita introducir una especificación no explícita en el versículo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5: Consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: 'La redacción española toma en cuenta la revisión más reciente del audit trail inglés, que eliminó «help from» para acercarse más al hebreo y dejó ambas cláusulas con la misma idea básica: buscar a Yahvé. Por eso la versión española evita sobreinterpretar la primera cláusula y mantiene una repetición controlada de «buscar a Yahvé».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evita «SEÑOR» como sustituto del Nombre divino.
  - Se conserva la variación mínima de sentido del hebreo sin introducir una glosa doctrinal no presente en el versículo.
  - «Judá» funciona como sujeto corporativo, coherente con el hebreo y con el uso bíblico habitual.
