translation:
  language: es
  text: cuando puso sus señales en Egipto[a], y sus maravillas en los campos de Zoán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Zoán es una ciudad egipcia, a menudo identificada con Tanis.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - que
  - el cual
  lexicon: HALOT
  rationale: En este contexto, la partícula relativa introduce una cláusula temporal vinculada al recuerdo de las obras de Dios; por eso ‘cuando’ reproduce mejor la función que una relativa más rígida como ‘que’ o ‘el cual’.
- source_word: שָׂם
  english_pob_choice: set
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - estableció
  - hizo
  lexicon: HALOT
  rationale: ‘Puso’ conserva la imagen concreta de colocar o disponer algo, y en español suena natural con ‘señales’. ‘Estableció’ o ‘hizo’ resultarían más interpretativos.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - contra Egipto
  lexicon: HALOT
  rationale: La preposición marca ubicación aquí, no oposición explícita. ‘En Egipto’ mantiene el sentido espacial del hebreo y la lectura auditada en inglés.
- source_word: אֹתוֹתָיו
  english_pob_choice: his signs
  chosen_spanish: sus señales
  alternatives_spanish:
  - sus signos
  - sus milagros
  lexicon: HALOT
  rationale: ‘Señales’ conserva el valor léxico de אוֹת y mantiene la distinción respecto de ‘maravillas’ en la segunda cola. ‘Milagros’ borraría esa diferencia.
- source_word: וּמוֹפְתָיו
  english_pob_choice: and his wonders
  chosen_spanish: y sus maravillas
  alternatives_spanish:
  - y sus prodigios
  - y sus milagros
  lexicon: HALOT
  rationale: ‘Maravillas’ expresa bien מוֹפֵת como portento o asombro, y preserva la pareja ‘señales y maravillas’ sin fusionarla con ‘milagros’.
- source_word: בִּשְׂדֵה
  english_pob_choice: in the fields of
  chosen_spanish: en los campos de
  alternatives_spanish:
  - en el campo de
  - en la región de
  lexicon: HALOT
  rationale: 'Aunque el constructo hebreo es singular, la referencia geográfica a un área amplia se expresa de forma natural en español con plural: ‘los campos de’. Mantiene el matiz de extensión territorial.'
- source_word: צֹעַן
  english_pob_choice: Zoan
  chosen_spanish: Zoán
  alternatives_spanish:
  - Tanis
  lexicon: HALOT
  rationale: Se translitera el nombre propio hebreo. ‘Zoán’ es la forma más natural en español bíblico; ‘Tanis’ es una identificación histórica, no la forma del texto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la decisión auditada en inglés de distinguir entre ‘signs’ y ‘wonders’, ajustando solo la sintaxis para que el resultado sea natural en español.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino cuando aparezca; aquí no corresponde.
  - Se mantiene la distinción léxica entre ‘señales’ y ‘maravillas’, en línea con la POB inglesa.
  - Los nombres propios geográficos se transliteran; se añade nota cultural para Zoán/Tanis.
