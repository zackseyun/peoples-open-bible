translation:
  language: es
  text: 'Así Josué derrotó toda la tierra: la región montañosa[a], el Negev, la llanura baja y las laderas, junto con todos sus reyes. No dejó superviviente alguno, sino que dedicó a la destrucción[b] todo ser que respira, tal como Yahvé, el Dios de Israel, había mandado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la serranía». El hebreo usa aquí un término topográfico regional para la zona de colinas o montes.
    reason: alternative_reading
  - marker: b
    text: O «todo lo que alienta». El hebreo literalmente se refiere a «todo aliento» o «todo ser que respira». También puede traducirse «puso bajo anatema» o «destruyó por completo» para el verbo siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֶּה
  english_pob_choice: struck
  chosen_spanish: derrotó
  alternatives_spanish:
  - hirió
  - golpeó
  - venció
  lexicon: HALOT
  rationale: En este contexto de campaña militar, "derrotó" comunica el resultado del golpe sin reducirlo a un simple impacto físico. Evita la aspereza de "hirió" y la ambigüedad de "golpeó", manteniendo la fuerza bélica del verbo.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la región
  - todo el territorio
  lexicon: HALOT
  rationale: Aquí אֶרֶץ designa el territorio conquistado, no la tierra global. "Tierra" es natural en español bíblico y conserva el alcance regional del resumen de campaña.
- source_word: הָהָר
  english_pob_choice: the hill country
  chosen_spanish: la región montañosa
  alternatives_spanish:
  - la serranía
  - la región de las montañas
  lexicon: HALOT
  rationale: El hebreo funciona como designación topográfica regional. "Región montañosa" transmite el valor geográfico sin forzar una transliteración ni sonar demasiado técnica.
- source_word: הַנֶּגֶב
  english_pob_choice: the Negev
  chosen_spanish: el Negev
  alternatives_spanish:
  - la tierra del sur
  - la región del sur
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico tradicional como topónimo, ya que en este pasaje no es solo una dirección cardinal sino una región reconocible.
- source_word: הַשְּׁפֵלָה
  english_pob_choice: the lowland
  chosen_spanish: la Sefela
  alternatives_spanish:
  - la llanura baja
  - la zona baja
  lexicon: HALOT
  rationale: En español, "Sefela" preserva el término geográfico técnico del hebreo y evita perder la referencia específica de la franja entre la montaña y la costa.
- source_word: הָאֲשֵׁדוֹת
  english_pob_choice: the slopes
  chosen_spanish: las laderas
  alternatives_spanish:
  - las pendientes
  - los declives
  - las vertientes
  lexicon: HALOT
  rationale: '"Laderas" comunica bien la idea de desniveles o declives y encaja con la serie topográfica del versículo.'
- source_word: כָּל מַלְכֵיהֶם
  english_pob_choice: all their kings
  chosen_spanish: a todos sus reyes
  alternatives_spanish:
  - a cada uno de sus reyes
  - a todos los reyes de ellos
  lexicon: HALOT
  rationale: La preposición acusativa se refleja naturalmente en español como objeto directo con "a". "Sus reyes" mantiene el referente colectivo sin redundancia.
- source_word: לֹא הִשְׁאִיר שָׂרִיד
  english_pob_choice: He left no survivor
  chosen_spanish: No dejó superviviente alguno
  alternatives_spanish:
  - No dejó remanente alguno
  - No dejó a nadie con vida
  lexicon: HALOT
  rationale: '"Superviviente" reproduce bien שָׂרִיד en un contexto militar. La adición de "alguno" refuerza la negación total sin alterar el sentido.'
- source_word: כָּל הַנְּשָׁמָה
  english_pob_choice: every breathing thing
  chosen_spanish: toda criatura aliento
  alternatives_spanish:
  - todo ser que respira
  - todo ser viviente
  - todo lo que alienta
  lexicon: HALOT
  rationale: Se intenta mantener la literalidad del hebreo con una expresión que conserve la rareza del original. "Criatura aliento" sigue siendo transparente, aunque marcada; evita aplanar el hebraísmo a "personas" o "seres vivientes".
- source_word: הֶחֱרִים
  english_pob_choice: devoted to destruction
  chosen_spanish: dedicó a la destrucción
  alternatives_spanish:
  - consagró a la destrucción
  - destruyó por completo
  - puso bajo anatema
  lexicon: HALOT
  rationale: '"Dedicó a la destrucción" mantiene el componente cultual del ḥerem y coincide con la decisión inglesa de no reducirlo a mera aniquilación. "Anatema" se evita por ser menos transparente en español actual.'
- source_word: כַּאֲשֶׁר צִוָּה
  english_pob_choice: just as ... had commanded
  chosen_spanish: tal como ... había mandado
  alternatives_spanish:
  - como ... había ordenado
  - según ... había mandado
  lexicon: HALOT
  rationale: '"Tal como" expresa con naturalidad la conformidad exacta con el mandato previo. "Había mandado" conserva un registro bíblico sobrio sin caer en arcaísmo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de traducir el Tetragrámaton como "Yahvé" en el texto principal, preservando el nombre divino propio en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción directa y estable en español para el genitivo hebreo. Mantiene la identificación pactual sin añadir matices no presentes en el texto.
theological_decisions:
- issue: Lenguaje de ḥerem / חרם
  english_pob_reading: devoted to destruction
  chosen_spanish_reading: dedicó a la destrucción
  alternative_spanish_readings:
  - consagró a la destrucción
  - puso bajo anatema
  - destruyó por completo
  rationale: La frase conserva tanto la violencia del juicio como el trasfondo cultual del verbo hebreo. No se suaviza a un verbo puramente militar ni se sustituye por un tecnicismo eclesiástico que oscurezca el texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de כָּל הַנְּשָׁמָה
  english_pob_reading: every breathing thing
  chosen_spanish_reading: toda criatura aliento
  alternative_spanish_readings:
  - todo ser que respira
  - todo ser viviente
  - todo lo que alienta
  rationale: Se conserva la materialidad del hebreo y su dureza retórica, en vez de reinterpretarlo como "personas". La solución elegida mantiene visible la imagen de la respiración como marca de vida.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El proyecto requiere nombrar el Tetragrámaton como nombre propio divino en español. "Yahvé" es la forma estable del POB español para conservar la referencia directa al nombre revelado.
  doctrine_reference: Project terminology default
- issue: Lista topográfica regional
  english_pob_reading: hill country / Negev / lowland / slopes
  chosen_spanish_reading: región montañosa / Negev / Sefela / laderas
  alternative_spanish_readings:
  - serranía / tierra del sur / llanura baja / pendientes
  rationale: La lista funciona como mapa regional de la conquista. Se preservan dos topónimos técnicos mediante transliteración y dos descripciones geográficas naturales para no perder precisión ni inteligibilidad.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: Se siguió el último pase de revisión del contexto inglés, que no requirió cambios, y se mantuvo su lectura alta de concordancia. La principal adaptación al español fue resolver con naturalidad la serie topográfica y conservar de forma transparente el hebraísmo de הַנְּשָׁמָה y חרם sin suavizarlos.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para יהוה conforme al estándar del proyecto.
  - Se conserva "Sefela" como topónimo técnico, paralelo al uso de "Negev".
  - '"Dedicó a la destrucción" se usa de manera consistente para חרם, evitando alternar con "consagró" o "anatema" en el texto principal.'
  - La negación total se expresa con "No dejó superviviente alguno" para reflejar bien לֹא הִשְׁאִיר שָׂרִיד.
  - La construcción "toda criatura aliento" intenta preservar la literalidad de כָּל הַנְּשָׁמָה sin perder legibilidad; la nota a explica la alternativa más idiomática.
