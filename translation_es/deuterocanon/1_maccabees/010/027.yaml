translation:
  language: es
  text: Nos alegramos[a]. Y ahora continúen todavía manteniendo fe[b] con nosotros,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Nos regocijamos», o «Nos complacimos».
    reason: lexical_alternative
  - marker: b
    text: O «fidelidad hacia nosotros» o, más idiomáticamente en este contexto, «lealtad a nosotros».
