translation:
  language: es
  text: Que los pueblos te alaben[a], Dios[b]; que todos los pueblos te alaben.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma verbal hebrea puede expresar deseo u oración («que los pueblos te alaben») o, menos probablemente aquí, un futuro («los pueblos te alabarán»).
    reason: alternative_reading
  - marker: b
    text: «Pueblos» se refiere aquí a diversos pueblos, naciones o grupos étnicos en conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדוּךָ
  english_pob_choice: let ... praise you
  chosen_spanish: que ... te alaben
  alternatives_spanish:
  - que ... te den gracias
  - que ... te reconozcan
  lexicon: HALOT
  rationale: El verbo en hebreo, en este contexto de alabanza comunitaria, admite la idea de alabar o dar gracias. En español, «alabar» conserva mejor el tono litúrgico y la paralelismo del refrán que «dar gracias», que suena más estrecho. El giro con «que» reproduce con naturalidad el valor volitivo/petitorio del hebreo.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos
  lexicon: HALOT
  rationale: «Pueblos» refleja de manera directa la pluralidad concreta de עמים y mantiene el eco repetido del verso. «Naciones» es posible, pero introduce un matiz más político que el hebreo no exige.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí el sustantivo funciona como vocativo. «Oh Dios» expresa esa apelación directa en español de forma clara y natural.
- source_word: כֻּלָּם
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos los pueblos
  lexicon: HALOT
  rationale: «Todos» transmite brevemente el valor totalizador del hebreo y preserva el ritmo poético del refrán.
theological_decisions:
- issue: 'Valor del verbo repetido: petición/wish frente a futuro simple'
  english_pob_reading: 'Render as a jussive-style petition: ''Let the peoples praise you'''
  chosen_spanish_reading: «Que los pueblos te alaben» como deseo/oración litúrgica
  alternative_spanish_readings:
  - «Los pueblos te alabaran»
  - «Los pueblos te alabarán»
  - «Que los pueblos te alaben» como futuro exhortativo
  rationale: El hebreo imperfecto con valor volitivo en este contexto funciona como súplica o deseo en un refrán de alabanza. En español, la construcción con «que» comunica mejor esa petición litúrgica sin convertirla en una simple predicción.
  doctrine_reference: 'Principio de equivalencia óptima: preservar el sentido llano y la fuerza exhortativa/petitoria del texto fuente sin exagerar la certeza futura.'
- issue: Referencia colectiva de 'peoples'
  english_pob_reading: '''Peoples'' refers to the various nations or ethnic groups collectively.'
  chosen_spanish_reading: «pueblos» como referencia a diversos grupos humanos o etnias colectivamente
  alternative_spanish_readings:
  - «naciones»
  - «gentes»
  rationale: En español, «pueblos» comunica la pluralidad de grupos humanos y evita un desplazamiento semántico hacia lo estrictamente estatal o político. Mantiene además la repetición retórica del verso.
  doctrine_reference: No aplica doctrinalmente; decisión léxica de alcance semántico y poético.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés y el hebreo consonante/vocalizado: mantiene el refrán volitivo repetido, conserva la pluralidad de עמים como «pueblos», y evita una traducción futura simple que debilitaría la fuerza petitoria del verso. No se registran revisiones aplicadas en el expediente más reciente.'
  spanish_consistency_notes:
  - Se usa «oh Dios» para el vocativo directo, en paralelo con el inglés auditado.
  - Se mantiene la repetición exacta del núcleo verbal para reflejar la estructura poética del verso.
  - No se usa «SEÑOR» porque el hebreo aquí contiene אֱלֹהִים y no el tetragrámaton.
