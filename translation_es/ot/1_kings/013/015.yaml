translation:
  language: es
  text: 'Entonces le dijo: “Ven[a] conmigo a casa y come pan.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ve conmigo a la casa y come comida/una comida». El hebreo «pan» puede referirse de manera más amplia a alimento o a una comida, y el verbo literal sería «ve», aunque en español de invitación suele decirse «ven».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then he said
  chosen_spanish: Entonces le dijo
  alternatives_spanish:
  - Y le dijo
  - Entonces habló
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo; «Entonces» conserva la secuencia natural en español, y «le dijo» expresa de forma directa el acto de habla sin sobrecargar el estilo.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El dativo pronominal español «le» reproduce la función del complemento indirecto sin redundancia innecesaria.
- source_word: לֵךְ
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ve
  - Ven conmigo
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «ve», en una invitación dirigida al oyente el español natural usa «ven». Conserva el sentido exhortativo desde la perspectiva del hablante.
- source_word: אִתִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  - junto a mí
  lexicon: HALOT
  rationale: «Conmigo» traduce de manera directa la preposición con el sufijo de primera persona singular y suena natural en español.
- source_word: הַבָּיְתָה
  english_pob_choice: home
  chosen_spanish: a casa
  alternatives_spanish:
  - a la casa
  - a mi casa
  lexicon: HALOT
  rationale: El sustantivo con he direccional expresa movimiento hacia la casa; en español, «a casa» reproduce bien el valor direccional e idiomático. No se añade «mi» porque no está explícito en el hebreo.
- source_word: וֶאֱכֹל
  english_pob_choice: and eat
  chosen_spanish: y come
  alternatives_spanish:
  - y comed
  - y coman
  lexicon: HALOT
  rationale: Se mantiene el imperativo breve del hebreo con un español igualmente directo.
- source_word: לָחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  - una comida
  lexicon: HALOT
  rationale: El hebreo «pan» puede funcionar metonímicamente por alimento o comida; en español, «pan» preserva el paralelismo literal y la imagen base del texto.
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el paquete inglés; se sigue el acuerdo alto y la lectura óptima ya establecida, manteniendo el valor literal del hebreo donde el español lo permite con naturalidad.
  spanish_consistency_notes:
  - Se preserva el tono narrativo breve y directo del hebreo.
  - Se evita añadir «mi» en «a casa» porque no está en el texto fuente.
  - «Pan» conserva el término base hebreo con una nota para su posible sentido ampliado.
