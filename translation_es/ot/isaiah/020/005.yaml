translation:
  language: es
  text: Y quedarán consternados y avergonzados a causa de Cus[a], su esperanza[b], y a causa de Egipto, su jactancia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cus es la antigua región al sur de Egipto, a menudo asociada con Nubia; algunas versiones antiguas en inglés la traducen «Etiopía».
    reason: cultural_note
  - marker: b
    text: O «su expectativa» para «su esperanza».
    reason: lexical_alternative
  - marker: c
    text: O «su gloria» para «su jactancia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחַתּוּ
  english_pob_choice: they will be dismayed
  chosen_spanish: serán consternados
  alternatives_spanish:
  - serán dismayed
  - quedarán aterrados
  - serán quebrantados
  lexicon: HALOT
  rationale: El hebreo expresa un colapso emocional o de ánimo en secuencia profética futura. «Consternados» comunica bien esa perturbación interna sin volverlo demasiado interpretativo; «dismayed» en inglés POB apunta a ese valor más que a una simple sorpresa.
- source_word: וָבֹשׁוּ
  english_pob_choice: and ashamed
  chosen_spanish: y avergonzados
  alternatives_spanish:
  - y puestos en vergüenza
  - y confundidos
  - y humillados
  lexicon: HALOT
  rationale: בושׁ denota vergüenza o humillación. «Avergonzados» preserva el paralelismo con «consternados» y refleja la pasividad de la vergüenza resultante sin añadir una causa explícita que el hebreo no formula.
- source_word: מִכּוּשׁ
  english_pob_choice: because of Cush
  chosen_spanish: a causa de Cus
  alternatives_spanish:
  - por Cus
  - con respecto a Cus
  - a causa de Etiopía
  lexicon: HALOT
  rationale: El מן aquí tiene valor causal, como en el análisis inglés. Se conserva el nombre geográfico transliterado «Cus» para evitar la posible confusión de «Etiopía», que en español puede sugerir un referente moderno distinto del antiguo.
- source_word: מַבָּטָם
  english_pob_choice: their hope
  chosen_spanish: su esperanza
  alternatives_spanish:
  - su expectativa
  - el objeto de su confianza
  - aquello en lo que esperaban
  lexicon: HALOT
  rationale: Aunque el término puede sugerir «mirar» o «lo esperado», en contexto designa aquello en lo que confiaban. «Esperanza» es la forma más natural en español y conserva el valor relacional de apoyo/expectación que el inglés POB también documenta.
- source_word: וּמִן מִצְרַיִם
  english_pob_choice: and because of Egypt
  chosen_spanish: y a causa de Egipto
  alternatives_spanish:
  - y desde Egipto
  - y con respecto a Egipto
  lexicon: HALOT
  rationale: Se mantiene el sentido causal del מן paralelo al miembro anterior. «A causa de Egipto» reproduce mejor la relación de motivo que un simple «desde».
- source_word: תִּפְאַרְתָּם
  english_pob_choice: their boast
  chosen_spanish: su gloria
  alternatives_spanish:
  - su orgullo
  - su jactancia
  - su adorno
  lexicon: HALOT
  rationale: תפארת puede significar belleza, gloria o aquello de lo que uno se gloría. Aquí la POB inglesa distingue «boast» pero permite también «glory». En español, «gloria» comunica mejor el valor de aquello en lo que se gloriaban, mientras «orgullo/jactancia» podría sonar más acusatorio de lo que el hebreo exige.
theological_decisions:
- issue: Tratamiento de los nombres geográficos antiguos y su posible actualización
  english_pob_reading: Cush is retained as Cush rather than rendered 'Ethiopia'
  chosen_spanish_reading: Cus se conserva como nombre antiguo transliterado
  alternative_spanish_readings:
  - Etiopía
  - Cush
  rationale: La decisión evita trasladar el topónimo a un equivalente moderno potencialmente equívoco. «Cus» mantiene la referencia histórica del texto y sigue la práctica del POB en inglés de no sustituir el nombre antiguo por una etiqueta moderna.
  doctrine_reference: Ninguna; decisión histórico-geográfica y de transparencia textual.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la revisión más reciente; no se registraron cambios sustanciales en la auditoría inglesa y se mantiene la decisión óptima ya establecida.
  spanish_consistency_notes:
  - Se conservó el paralelismo causal de las dos frases con מִן mediante «a causa de» en ambos miembros.
  - Se mantuvo el topónimo antiguo «Cus» para consistencia con la transparencia del proyecto.
  - «Gloria» se eligió como español idiomático para el campo semántico de תפארת en este contexto, sin borrar la alternativa de «jactancia» en nota.
  - La puntuación reproduce la estructura coordenada del hebreo y del inglés POB.
