review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una petición optativa dirigida a Dios para que su misericordia repose sobre todos los que lo aman. γένοιτο está bien captado con una construcción desiderativa; ἔλεός σου, ἐπὶ πάντας, y τοὺς ἀγαπῶντάς σε están bien representados. El punto principal a corregir es Κύριε: la evidencia fuente dice κύριος en vocativo, no el Tetragrámaton, y el rastro de auditoría inglés documenta explícitamente ''Lord''. En español, por fidelidad al texto griego inmediato y a la decisión auditada, aquí debe decir ''Señor'', no ''Yahvé''.'
  spanish_quality_summary: La frase es natural, clara y de buen registro bíblico en español. 'Que tu misericordia ... esté sobre todos los que te aman' suena bien y conserva tono orante. Solo conviene ajustar el vocativo a 'oh Señor' para alinear fuente y auditoría; el resto no requiere retoques. No hacen falta notas.
  glossary_alignment: Hay una excepción necesaria al valor por defecto del proyecto sobre YHWH -> 'Yahvé'. Aquí el texto fuente conservado no es יהוה sino el griego Κύριε como tratamiento directo a Dios, y la auditoría inglesa establece 'Lord'. Por tanto, la mejor alineación terminológica es 'Señor' en esta línea. 'Misericordia' para ἔλεος y 'todos los que te aman' para πάντας τοὺς ἀγαπῶντάς σε sí están bien alineados.
  issues:
  - severity: high
    issue: Κύριε fue traducido como 'Yahvé' en lugar de 'Señor'.
    rationale: El original griego atestiguado dice Κύριε, no el nombre divino יהוה. La auditoría inglesa documenta expresamente 'Lord' para este vocativo. Aunque el proyecto usa 'Yahvé' como valor por defecto para YHWH, aquí ese default no debe imponerse sobre una fuente griega que dice κύριος.
  revised_spanish_text: Que tu misericordia, oh Señor, esté sobre todos los que te aman.
  revision_rationale: Se corrige únicamente el vocativo divino para reflejar con fidelidad el griego Κύριε y la decisión auditada del POB en inglés. El resto del texto español ya era fiel, idiomático y de buen tono litúrgico.
