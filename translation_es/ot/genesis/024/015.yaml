    rationale: Aunque intenta reflejar la pasiva hebrea יֻלְּדָה, en español esa formulación no es idiomática y entorpece la comprensión. «que le había nacido a Betuel» preserva la relación de filiación sin calco torpe.
  - severity: medium
    issue: «que he aquí» suena forzado en español
    rationale: El hebreo combina la fórmula narrativa con וְהִנֵּה, pero en español «que he aquí» resulta poco fluido. «y he aquí» conserva mejor la función deíctica y la naturalidad.
  - severity: low
    issue: La nota [b] explica «he aquí», pero no el verdadero punto delicado del versículo
    rationale: La ambigüedad o dificultad principal en español no está en «Rebeca» ni en «he aquí», sino en cómo representar la pasiva genealógica de יֻלְּדָה. Conviene reasignar la nota a ese lugar.
