  glossary_alignment: 'No hay términos del glosario mayor en juego aquí. Las decisiones léxicas principales están bien encaminadas: מִרְעֶה como «pasto», רמס como «pisotear», y תרפשון como «enturbiar». La nota sobre «agua asentada» debe ir con «agua clara», y la nota sobre «enturbiar/remover» debe ir con el verbo final.'
