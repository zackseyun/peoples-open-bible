translation:
  language: es
  text: Y los hijos de Rubén edificaron Hesbón[a], Elealeh y Quiriataim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los rubenitas edificaron Hesbón, Elealeh y Quiriataim”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי רְאוּבֵן
  english_pob_choice: And the sons of Reuben
  chosen_spanish: Y los hijos de Rubén
  alternatives_spanish:
  - Y los rubenitas
  lexicon: HALOT
  rationale: בְנֵי literalmente significa “hijos de”. En este contexto tribal conserva con transparencia la relación de linaje; “rubenitas” sería más idiomático, pero menos formalmente cercano al hebreo y a la decisión auditada en inglés.
- source_word: בָּנוּ
  english_pob_choice: built
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - reedificaron
  - fortificaron
  lexicon: HALOT
  rationale: El qal perfecto de בנה expresa la acción básica de construir/edificar. En español, “edificaron” mantiene un registro digno y directo, sin añadir la especificación “reedificaron” o “fortificaron”, que no está explícita en el texto.
- source_word: חֶשְׁבּוֹן
  english_pob_choice: Heshbon
  chosen_spanish: Hesbón
  alternatives_spanish:
  - Hesbón
  - Heshbón
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se translitera al uso bíblico español estándar como “Hesbón”, que corresponde de manera reconocible al hebreo y es natural para lectores en español.
- source_word: אֶלְעָלֵא
  english_pob_choice: Elealeh
  chosen_spanish: Eleale
  alternatives_spanish:
  - Elealé
  - Elealeh
  lexicon: HALOT
  rationale: Nombre propio de lugar. “Eleale” sigue la forma convencional en español y conserva el referente del topónimo sin forzar una transliteración menos estable en español.
- source_word: קִרְיָתָיִם
  english_pob_choice: Kiriathaim
  chosen_spanish: Quiriataim
  alternatives_spanish:
  - Quiriataím
  - Kiriataim
  lexicon: HALOT
  rationale: Nombre propio de lugar. “Quiriataim” es la adaptación española habitual de la forma hebrea y preserva la referencia geográfica con claridad.
translation_notes:
  revision_awareness: El texto inglés auditado permanece estable (sin revisiones). La decisión principal en español fue mantener la transparencia del hebreo tribal (“los hijos de Rubén”) y usar transliteraciones españolas estándar para los topónimos, sin introducir matices como “reedificaron” o “fortificaron” que el hebreo no exige.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo simple del verso con una sola cláusula narrativa.
  - Se evitó traducir el marcador de objeto directo de forma separada, conforme al tratamiento habitual de esta partícula en español.
  - Se conservó la alternativa tribal en nota para reflejar la tensión léxica entre forma literal y equivalente étnico idiomático.
