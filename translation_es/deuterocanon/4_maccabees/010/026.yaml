translation:
  language: es
  text: Pero estas cosas de ustedes no son dignas ni siquiera de torturas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Pero estas cosas de ustedes no son dignas de torturas». El genitivo ὑμῶν es idiomático y puede entenderse como «provenientes de ustedes» o «por parte de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Conjunción adversativa que introduce contraste directo; «Pero» suena natural en español y conserva la oposición marcada del griego.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - tales cosas
  lexicon: BDAG
  rationale: El demostrativo neutro plural se mantiene con un plural cercano y claro en español, sin especificar más el referente que el griego.
- source_word: ὑμῶν
  english_pob_choice: from you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de ustedes provienen
  - a su cargo
  - por parte de ustedes
  lexicon: BDAG
  rationale: El genitivo idiomático puede equivaler a «from you» o «of yours»; «de ustedes» conserva la relación posesiva/originaria sin forzar una paráfrasis más larga.
- source_word: βασάνων
  english_pob_choice: tortures
  chosen_spanish: tormentos
  alternatives_spanish:
  - torturas
  - suplicios
  lexicon: BDAG
  rationale: En este contexto martirial, βάσανος apunta a sufrimientos infligidos con violencia. «Tormentos» comunica bien la intensidad en español; se prefiere sobre «torturas» por fluidez y amplitud semántica, sin perder la dureza del término.
- source_word: ἄξια
  english_pob_choice: not worthy even of
  chosen_spanish: no son dignas ni siquiera de
  alternatives_spanish:
  - no merecen ni siquiera
  - no valen ni para
  lexicon: BDAG
  rationale: Se conserva el juicio de valor de ἄξια con una estructura natural en español. «Ni siquiera» refleja la fuerza retórica que el inglés auditado expresó con «even».
translation_notes:
  revision_awareness: La versión inglesa auditada entiende ὑμῶν de manera idiomática como «from you» y añade «even» para reflejar la fuerza retórica; la redacción española conserva ambas decisiones con una sintaxis natural y sin suavizar el tono del martirio.
  spanish_consistency_notes:
  - Se mantiene «tormentos» para  βασάνων, evitando un término más técnico o eclesiástico.
  - Se usa «ustedes» como forma neutra latinoamericana para el genitivo plural, consistente con un registro bíblico contemporáneo.
  - No se introduce «Cristo», «Señor» ni terminología interpretativa ajena al versículo.
