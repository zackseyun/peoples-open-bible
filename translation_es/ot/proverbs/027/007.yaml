translation:
  language: es
  text: Una persona saciada desprecia la miel[a][b], pero para una persona hambrienta toda cosa amarga es dulce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Un alma saciada pisotea la miel». El hebreo usa «alma» de modo idiomático para la persona o el apetito.'
    reason: lexical_alternative
  - marker: b
    text: «Miel» puede referirse de manera más específica a miel de panal o miel fluida.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - alma
  - vida
  - apetito
  lexicon: HALOT
  rationale: En este proverbio, נֶפֶשׁ funciona idiomáticamente para la persona en cuanto a su apetito o deseo interior. «Persona» comunica con naturalidad ese sentido sin imponer «alma», que en español puede sonar más teológico que proverbial.
- source_word: שְׂבֵעָה
  english_pob_choice: satisfied
  chosen_spanish: saciada
  alternatives_spanish:
  - llena
  - satisfecha
  - harta
  lexicon: HALOT
  rationale: El adjetivo expresa estar lleno o saciado. «Saciada» conserva la idea de plenitud alimentaria y encaja bien con el contraste de hambre.
- source_word: תָּב֣וּס
  english_pob_choice: despises
  chosen_spanish: desprecia
  alternatives_spanish:
  - pisotea
  - rechaza
  - desdeña
  lexicon: HALOT
  rationale: El verbo puede tener la imagen literal de pisotear, pero aquí el contexto de alimento favorece el sentido figurado de desprecio o rechazo. «Desprecia» transmite ese valor sin perder la fuerza de la imagen.
- source_word: נֹפֶת
  english_pob_choice: honey
  chosen_spanish: la miel
  alternatives_spanish:
  - la miel de panal
  - la miel que fluye
  - el panal
  lexicon: HALOT
  rationale: נֹפֶת puede referirse a miel, especialmente miel fluida o de panal. «La miel» es la opción más clara y directa para el proverbio; la especificación más concreta no es indispensable al sentido.
- source_word: רְעֵבָה
  english_pob_choice: hungry
  chosen_spanish: hambrienta
  alternatives_spanish:
  - famélica
  - muerta de hambre
  - con hambre
  lexicon: HALOT
  rationale: El adjetivo significa hambriento. «Hambrienta» mantiene el contraste proverbial sin exagerar la intensidad.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - todo
  - cualquier
  lexicon: HALOT
  rationale: El término es distributivo en este contexto. «Toda cosa» expresa bien la generalización proverbial en español y prepara el contraste con «amarga».
- source_word: מַר
  english_pob_choice: bitter thing
  chosen_spanish: cosa amarga
  alternatives_spanish:
  - lo amargo
  - algo amargo
  - bitter thing
  lexicon: HALOT
  rationale: El adjetivo se usa sustantivamente para algo amargo. «Cosa amarga» hace explícito ese valor sustantivado en español.
- source_word: מָתוֹק
  english_pob_choice: is sweet
  chosen_spanish: es dulce
  alternatives_spanish:
  - parece dulce
  - sabe dulce
  lexicon: HALOT
  rationale: El adjetivo predica dulzura. «Es dulce» sigue de cerca la estructura hebrea sin añadir una interpretación como «parece» o «sabe».
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambos marcadores de nota en el texto español. El contenido sigue el mismo juicio textual y léxico del registro inglés, sin cambios de sentido.
  spanish_consistency_notes:
  - Se usó «persona» en el cuerpo principal para reflejar el hebreo idiomático de נֶפֶשׁ, mientras la nota preserva la alternativa «alma» documentada por el POB inglés.
  - 'Se mantuvo el paralelismo proverbial con dos miembros balanceados: saciedad desprecia miel / hambre vuelve dulce lo amargo.'
  - Se evitó traducir mecánicamente por «alma» en el texto principal para no introducir una resonancia teológica innecesaria en español.
  - Los marcadores [a] y [b] aparecen exactamente en el texto donde corresponden.
