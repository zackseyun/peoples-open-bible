revisions:
- from: Esta es la palabra que Jeremías el profeta mandó a Seraías hijo de Nerías, hijo de Maasías, cuando fue con Sedequías, rey de Judá, a Babilonia, en el cuarto año de su reinado. Y Seraías era el oficial de alojamiento[a].
  to: Esta es la palabra que Jeremías el profeta mandó a Seraías hijo de Nerías, hijo de Maasías, cuando acompañó a Sedequías, rey de Judá, a Babilonia, en el cuarto año de su reinado. Y Seraías era el oficial encargado del alojamiento[a].
  rationale: 'Se ajusta la cláusula temporal para reflejar con español más natural el comitativo implícito de בְּלֶכְתּוֹ ... אֶת צִדְקִיָּהוּ: ''cuando acompañó a Sedequías''. También se mejora la claridad idiomática del cargo raro con ''oficial encargado del alojamiento'', manteniendo la nota alternativa y la cautela léxica del POB inglés. No se requiere adjudicación adicional.'
