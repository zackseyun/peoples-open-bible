  - severity: low
    issue: «La sangre de ellos» es algo menos idiomático que «su sangre» en español
    rationale: Aunque es fiel, suena más pesado. «Su sangre» conserva el literal y mejora la naturalidad; la nota puede aclarar el sentido idiomático de responsabilidad por la sangre derramada.
