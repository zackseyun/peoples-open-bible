translation:
  language: es
  text: 'Quedorlaómer rey de Elam[a], Tidal rey de Goim, Amrafel rey de Sinar y Arioc rey de Elasar: cuatro reyes contra los cinco.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Tidal rey de las naciones'. El hebreo גּוֹיִם puede leerse como el sustantivo común 'naciones', pero aquí también es plausible entenderlo como un nombre de lugar ('Goim').
