translation:
  language: es
  text: Si tu enemigo tiene hambre[a], dale de comer pan; y si tiene sed, dale de beber agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el que te odia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula hebrea introduce una condición directa; en español, «si» reproduce mejor esa estructura que «cuando».
- source_word: רָעֵב
  english_pob_choice: is hungry
  chosen_spanish: tiene hambre
  alternatives_spanish:
  - está hambriento
  - está con hambre
  lexicon: HALOT
  rationale: El hebreo presenta un predicado de estado. «Tiene hambre» es natural en español moderno y conserva el sentido simple sin intensificarlo.
- source_word: שֹׂנַאֲךָ
  english_pob_choice: your enemy
  chosen_spanish: tu enemigo
  alternatives_spanish:
  - el que te odia
  - tu odiador
  lexicon: HALOT
  rationale: La forma verbal participial con sufijo se entiende literalmente como «el que te odia», pero en el contexto sapiencial la relación hostil se expresa con naturalidad y fuerza mediante «tu enemigo», como en el audit trail inglés.
- source_word: הַאֲכִלֵהוּ
  english_pob_choice: feed him
  chosen_spanish: dale de comer
  alternatives_spanish:
  - aliméntalo
  - haz que coma
  lexicon: HALOT
  rationale: El causativo hebreo expresa hacer comer; «dale de comer» comunica de forma idiomática y fiel esa acción causativa en español.
- source_word: לָחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: El término hebreo es concreto, «bread». En español, «pan» mantiene mejor esa concreción material que una generalización como «alimento».
- source_word: וְאִם
  english_pob_choice: and if
  chosen_spanish: y si
  alternatives_spanish:
  - e si
  lexicon: HALOT
  rationale: La coordinación hebrea mantiene el paralelismo entre las dos cláusulas condicionales; «y si» lo refleja con naturalidad.
- source_word: צָמֵא
  english_pob_choice: he is thirsty
  chosen_spanish: tiene sed
  alternatives_spanish:
  - está sediento
  - está con sed
  lexicon: HALOT
  rationale: Como en la primera cláusula, el hebreo expresa un estado; «tiene sed» es la equivalencia más clara y natural en español.
- source_word: הַשְׁקֵהוּ
  english_pob_choice: give him water to drink
  chosen_spanish: dale de beber
  alternatives_spanish:
  - dale agua
  - haz que beba
  lexicon: HALOT
  rationale: El causativo hebreo de «dar de beber» se expresa de manera idiomática con «dale de beber»; el objeto «agua» se sobreentiende por el paralelismo y por el hebreo siguiente.
- source_word: מָיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua para beber
  lexicon: HALOT
  rationale: La palabra hebrea es literalmente «agua»; se conserva de forma directa en español.
theological_decisions:
- issue: Mantener el singular masculino representativo sin neutralizarlo
  english_pob_reading: 'Retain singular masculine forms: ''your enemy ... feed him ... if he is thirsty, give him water to drink.'''
  chosen_spanish_reading: 'Mantener el singular masculino representativo: «tu enemigo ... dale de comer ... si tiene sed, dale de beber agua».'
  alternative_spanish_readings:
  - tu enemigo ... dales de comer ... si tienen sed, dales de beber agua
  - tu enemigo ... aliméntalo ... si está sediento, dale agua
  rationale: El hebreo usa formas singulares masculinas. En un proverbio, ese singular funciona de manera representativa, y conservarlo evita suavizar la forma del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: El contexto auditado en inglés no presenta revisiones textuales ni cambios pendientes; el acuerdo de revisión es alto y la lectura quedó sin cambios. La redacción española sigue directamente el hebreo con apoyo del criterio óptimo-equivalente del POB inglés.
  spanish_consistency_notes:
  - Se conserva el paralelismo condicional con «si ... y si ...».
  - Se mantiene el singular masculino representativo del hebreo.
  - «Pan» y «agua» reflejan la concreción léxica del texto fuente.
  - La nota al pie marca la alternativa más literal de שֹׂנַאֲךָ sin desplazar la traducción principal.
