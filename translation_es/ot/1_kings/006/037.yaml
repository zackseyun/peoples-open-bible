translation:
  language: es
  text: En el cuarto año[a], se echaron los cimientos de la casa de Yahvé, en el mes de Ziv.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la casa de Yahvé fue fundada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשָּׁנָה הָרְבִיעִית
  english_pob_choice: In the fourth year
  chosen_spanish: En el cuarto año
  alternatives_spanish:
  - En el cuarto año de su reinado
  lexicon: HALOT
  rationale: La expresión hebrea funciona como marcador temporal directo. En español, «En el cuarto año» reproduce con naturalidad la forma del hebreo sin introducir, en el texto principal, el dato contextual de que se trata del reinado de Salomón.
- source_word: יֻסַּד
  english_pob_choice: was founded
  chosen_spanish: fue fundada
  alternatives_spanish:
  - fue puesta la base
  - fue establecida
  lexicon: HALOT
  rationale: El pasivo de יסד puede expresar fundar o poner los cimientos. En español, «fue fundada» conserva bien el valor de inicio/establecimiento de la obra y suena idiomático en un contexto de construcción.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de «casa» en lugar de reemplazarla por «templo», porque el hebreo dice literalmente «casa». Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: בְּיֶרַח זִו
  english_pob_choice: in the month of Ziv
  chosen_spanish: en el mes de Ziv
  alternatives_spanish:
  - en Ziv
  lexicon: HALOT
  rationale: יֶרַח significa «mes» y Ziv es el nombre propio del mes. La traducción directa «en el mes de Ziv» es clara y fiel al hebreo; no se añade la identificación como segundo mes porque no está explícita en este versículo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. Según el criterio del proyecto, se translitera como «Yahvé» en lugar de ocultarlo detrás de una sustitución como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés confirma acuerdo alto y sin revisiones aplicadas; la versión española sigue de cerca el hebreo y preserva la alternativa lexical del pasivo de יסד en una nota breve.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la imagen de «casa» en vez de «templo» para reflejar el hebreo.
  - El mes propio «Ziv» se traslada sin intentar armonizarlo con 1 Reyes 6:1 dentro del texto principal.
