translation:
  language: es
  text: Anduvieron tras la obstinación de su corazón, y tras los Baales[a], que sus padres les enseñaron a seguir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus antepasados». El hebreo dice literalmente «sus padres», refiriéndose a generaciones anteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: They went after
  chosen_spanish: Anduvieron tras
  alternatives_spanish:
  - Fueron tras
  - Siguieron tras
  lexicon: HALOT
  rationale: הלך con אַחֲרֵי expresa el giro idiomático de ir tras alguien o algo, es decir, seguirle con lealtad o inclinación. «Anduvieron tras» conserva la imagen hebrea y suena natural en español bíblico contemporáneo.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: tras
  alternatives_spanish:
  - después de
  - siguiendo a
  lexicon: HALOT
  rationale: La preposición marca orientación, persecución o adhesión. «Tras» permite repetir la estructura hebrea en ambas cláusulas sin sonar forzado en español.
- source_word: שְׁרִר֣וּת
  english_pob_choice: stubbornness
  chosen_spanish: obstinación
  alternatives_spanish:
  - dureza
  - terquedad
  lexicon: HALOT
  rationale: En Jeremías este sustantivo denota voluntad propia resistente, obstinada. «Obstinación» comunica bien la fuerza moral del término sin reducirlo a simple terquedad infantil.
- source_word: לִבָּם
  english_pob_choice: of their heart
  chosen_spanish: de su corazón
  alternatives_spanish:
  - de sus corazones
  lexicon: HALOT
  rationale: El singular hebreo «corazón» con posesivo plural suele abarcar la disposición interior de cada uno. El singular en español conserva mejor la forma del original y el sentido colectivo.
- source_word: הַבְּעָלִים
  english_pob_choice: the Baals
  chosen_spanish: los Baales
  alternatives_spanish:
  - los baales
  - las imágenes de Baal
  lexicon: HALOT
  rationale: El plural hebreo designa las diversas manifestaciones locales de Baal. «Los Baales» mantiene la forma plural y el referente idolátrico; no se reduce a «señores» ni se singulariza indebidamente.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: a quienes
  alternatives_spanish:
  - que
  - los cuales
  lexicon: HALOT
  rationale: Aunque el relativo hebreo es flexible, en español el antecedente personal implícito («Baales» entendidos como ídolos/dioses) se expresa mejor con «a quienes» para enlazar con «sus padres les enseñaron».
- source_word: לִמְּדוּם
  english_pob_choice: taught them
  chosen_spanish: les enseñaron
  alternatives_spanish:
  - los enseñaron
  - les instruyeron
  lexicon: HALOT
  rationale: El piel de למד significa «enseñar/instruir». «Les enseñaron» es directo y conserva la relación verbal simple del original sin añadir matices ajenos.
- source_word: אֲבוֹתָם
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus progenitores
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus padres». En español, «padres» mantiene la referencia a generaciones previas y evita neutralizar el término más allá de lo que exige el contexto.
theological_decisions:
- issue: Referencia generacional de אֲבוֹתָם
  english_pob_reading: their fathers, with a footnote permitting 'their ancestors'
  chosen_spanish_reading: sus padres, con nota posible de sentido amplio generacional
  alternative_spanish_readings:
  - sus antepasados
  - sus mayores
  rationale: La lectura principal conserva el masculino plural explícito del hebreo. En una nota puede aclararse que se refiere a generaciones anteriores, sin reemplazar el término base por una forma neutral que borre la precisión del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el audit trail inglés; no se identificaron revisiones textuales o decisiones de sentido que requirieran desviarse de la estructura hebrea y de la traducción POB en inglés.
  spanish_consistency_notes:
  - Se mantuvo la repetición de «tras» para reflejar la doble cláusula hebrea con אַחֲרֵי.
  - Se preservó el plural idolátrico «Baales» como término técnico, evitando equivalencias explicativas no presentes en el texto.
  - Se optó por un español bíblico moderno, sobrio y publicable, sin arcaísmos innecesarios.
