translation:
  language: es
  text: Mejor es el fin de un asunto que su principio[a]; mejor es la paciencia que un espíritu altivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «largo de espíritu», un modismo para paciencia o forbearancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרִית
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el final
  - el desenlace
  - el término
  lexicon: HALOT
  rationale: אַחֲרִית expresa el extremo final, el resultado o la culminación de algo. «El fin» comunica bien esa oposición proverbiaI con «su principio» y conserva la comparación temporal/estructural del hebreo.
- source_word: דָּבָר
  english_pob_choice: a matter
  chosen_spanish: un asunto
  alternatives_spanish:
  - una cosa
  - un tema
  - un problema
  lexicon: HALOT
  rationale: 'דָּבָר tiene un campo amplio: cosa, palabra, asunto. En un proverbio sapiencial, «un asunto» suena natural en español y mantiene la idea de una situación o curso de cosas, no solo de una palabra aislada.'
- source_word: מֵרֵאשִׁיתוֹ
  english_pob_choice: than its beginning
  chosen_spanish: que su principio
  alternatives_spanish:
  - que su comienzo
  - que su inicio
  - que su origen
  lexicon: HALOT
  rationale: La comparación del hebreo exige «que», no una simple idea de separación. «Principio» reproduce con dignidad רֵאשִׁית y preserva la referencia posesiva al mismo «asunto».
- source_word: אֶרֶךְ רוּחַ
  english_pob_choice: patience
  chosen_spanish: la paciencia
  alternatives_spanish:
  - ser paciente
  - la longanimidad
  - la larga paciencia
  lexicon: HALOT
  rationale: La expresión significa literalmente «largo de espíritu» y alude a paciencia, tolerancia y no irritabilidad. «La paciencia» es la opción más clara y natural en español; la metáfora literal se preserva en nota.
- source_word: מִגְּבַהּ רוּחַ
  english_pob_choice: than a proud spirit
  chosen_spanish: que un espíritu altivo
  alternatives_spanish:
  - que un espíritu soberbio
  - que la altivez de espíritu
  - que un espíritu orgulloso
  lexicon: HALOT
  rationale: גְּבַהּ רוּחַ denota elevación/haughtiness del ánimo. «Espíritu altivo» mantiene la referencia al interior de la persona y evita suavizar el matiz de orgullo o arrogancia.
- source_word: טוֹב
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - bueno
  lexicon: HALOT
  rationale: En ambos miembros del versículo טוֹב funciona comparativamente; en español corresponde «mejor» para conservar la estructura proverbial.
theological_decisions:
- issue: Traducción de רוּחַ en la primera cola idiomática
  english_pob_reading: Literally, 'long of spirit,' an idiom for patience or forbearance.
  chosen_spanish_reading: «paciencia», con nota que indica literalmente «largo de espíritu» y el sentido de tolerancia o forbearancia
  alternative_spanish_readings:
  - «longanimidad»
  - «largo de espíritu» en el cuerpo del texto
  - «ser paciente»
  rationale: El hebreo usa una idiomática concreta que puede perderse si se vuelve totalmente literal en el texto principal. Mantener «paciencia» conserva la fuerza ética del proverbio, mientras la nota preserva la imagen y la tensión lexical.
  doctrine_reference: Sabiduría bíblica; virtud de la paciencia/longanimidad (cf. Prov. 14:29; Sant. 1:19)
- issue: Relación comparativa del segundo cola con el primero
  english_pob_reading: patience is better than a proud spirit
  chosen_spanish_reading: «mejor es la paciencia que un espíritu altivo»
  alternative_spanish_readings:
  - «la paciencia es mejor que un espíritu altivo»
  - «mejor es ser paciente que ser altivo»
  rationale: La forma proverbial breve del hebreo se reproduce con una comparación directa. Se evita reexpresar en infinitivos porque el original contrapone cualidades/disposiciones, no acciones aisladas.
  doctrine_reference: Ética sapiencial sobre humildad y dominio propio (cf. Prov. 16:18; 29:23)
translation_notes:
  revision_awareness: 'El pasaje concuerda estrechamente con la versión inglesa auditada y no requiere revisión sustantiva. Se mantuvo la equivalencia óptima: claridad natural en español con preservación de la comparación hebrea y la imagen idiomática mediante nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto original lo exige; aquí no aparece.
  - Se mantuvo «espíritu» para רוּחַ por su valor interno/disposicional en ambas mitades del proverbio.
  - Se eligió «paciencia» como término principal y se reservó la imagen literal en nota, siguiendo el tratamiento auditado del inglés POB.
  - «Mejor es...» conserva la estructura comparativa sapiencial del hebreo y del inglés auditado.
