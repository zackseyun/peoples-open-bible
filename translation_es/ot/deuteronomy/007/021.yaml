translation:
  language: es
  text: No les tengas miedo[a], porque Yahvé tu Dios está en medio de ti[c][b], un Dios grande y temible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No estés aterrorizado por ellos»; el hebreo expresa un miedo intenso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «entre ustedes»; la expresión hebrea señala la presencia de Dios en medio de la comunidad.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «que inspira reverente temor»; el hebreo comunica una majestuosidad que produce temor reverente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲרֹץ
  english_pob_choice: dread
  chosen_spanish: temas
  alternatives_spanish:
  - te atemorices
  - sientas pavor
  - tiemble tu corazón
  lexicon: HALOT
  rationale: El verbo hebreo expresa estar aterrado o en pavor ante una amenaza. En español bíblico natural, «No temas» comunica bien la prohibición, y el contexto de guerra hace visible la intensidad sin volver la frase pesada. Otras opciones preservan más explícitamente la idea de terror, pero suenan menos fluidas en una exhortación breve.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - por causa de ellos
  - ante ellos
  - a causa de ellos
  lexicon: HALOT
  rationale: La expresión hebrea literalmente apunta a la idea de estar frente a ellos. Se conserva esa fuerza relacional con «delante de ellos», que en español mantiene el matiz espacial y amenazante de la escena mejor que una mera referencia causal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto: el Tetragrámaton se vierte como «Yahvé» para preservar el nombre propio del pacto, no sustituirlo por un título. «Yahvé» es la forma española establecida para esta política de traducción.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - el Dios tuyo
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Se conserva el posesivo del pacto de manera directa. «Tu Dios» es natural en español y mantiene la relación personal y covenantal del hebreo.
- source_word: בְּקִרְבְּךָ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - en tu medio
  - entre vosotros
  - dentro de ti
  lexicon: HALOT
  rationale: La frase hebrea expresa presencia en el centro de la comunidad. «En medio de ti» reproduce bien ese valor comunitario y evita la lectura individualizada que podría sugerir «dentro de ti».
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios fuerte
  - mighty God
  lexicon: HALOT
  rationale: Aquí אֵל funciona como designación divina en aposición. «Dios» evita sobreinterpretar el sustantivo y deja que los adjetivos siguientes expresen la grandeza y la reverencia debidas.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - mighty
  - excelso
  lexicon: HALOT
  rationale: El sentido básico es «grande». «Grande» es fiel, claro y se empareja de forma natural con el adjetivo siguiente.
- source_word: וְנוֹרָא
  english_pob_choice: fearsome
  chosen_spanish: temible
  alternatives_spanish:
  - asombroso
  - inspirador de reverente temor
  - terrible
  lexicon: HALOT
  rationale: El término comunica algo que provoca temor reverente. «Temible» conserva esa fuerza en español bíblico sin rebajarla a «asombroso», y sin cargarla excesivamente con el valor moderno de «terrible».
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre del pacto como nombre propio y no como sustituto titular. Esto preserva la identidad revelada de Dios en el texto y sigue la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El audit trail en inglés no muestra revisiones posteriores ni cambios aplicados; el pasaje quedó en alta concordancia y se siguió la lectura estable de la POB en cuanto a 'Yahweh' y las tres alternativas léxicas principales.
  spanish_consistency_notes:
  - Se preservó el nombre divino como «Yahvé» conforme a la política del proyecto.
  - Se mantuvo el registro bíblico moderno y digno, evitando calcos innecesarios.
  - 'Las notas alternativas reflejan los mismos puntos de tensión léxica documentados en el inglés: intensidad del miedo, matiz locativo de בְּקִרְבְּךָ y valor reverencial de וְנוֹרָא.'
