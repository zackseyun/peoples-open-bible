translation:
  language: es
  text: Y sacrificó bueyes, ganado cebado y ovejas[b] en abundancia; e invitó[a] a todos los hijos del rey, a Abiatar el sacerdote y a Joab, el comandante del ejército; pero no invitó a Salomón, tu siervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llamó» o «convocó» en ambas ocurrencias del verbo; la traducción usa «invitó» porque el contexto es la asistencia a un banquete sacrificial.
    reason: lexical_alternative
  - marker: b
    text: «Ovejas» traduce un término hebreo que puede referirse más ampliamente a animales del rebaño, incluso cabras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  english_pob_choice: he sacrificed
  chosen_spanish: sacrificó
  alternatives_spanish:
  - degolló para sacrificio
  - ofreció en sacrificio
  lexicon: HALOT
  rationale: En este contexto narrativo, זבח implica un acto sacrificial, no mera matanza. «Sacrificó» es natural en español y mantiene el sentido cultual.
- source_word: שׁוֹר
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - toros
  - ganado vacuno
  lexicon: HALOT
  rationale: El término puede abarcar bovinos; «bueyes» funciona bien en español para una lista sacrificial y no precisa indebidamente el sexo como «toros».
- source_word: מְרִיא
  english_pob_choice: fattened cattle
  chosen_spanish: ganado cebado
  alternatives_spanish:
  - animales cebados
  - ganado engordado
  lexicon: HALOT
  rationale: La idea es la de animales alimentados para engordar. «Ganado cebado» comunica la categoría de modo natural y conserva la fuerza del término hebreo.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - animales del rebaño
  lexicon: HALOT
  rationale: Aunque el hebreo puede incluir ovejas y cabras, en una lista sacrificial «ovejas» es una equivalencia idiomática válida y clara, como en el audit trail inglés.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - en gran cantidad
  - abundantemente
  lexicon: HALOT
  rationale: La expresión indica gran cantidad; «en abundancia» es la formulación española más natural y fiel.
- source_word: וַיִּקְרָא
  english_pob_choice: he invited
  chosen_spanish: invitó
  alternatives_spanish:
  - llamó
  - convocó
  lexicon: HALOT
  rationale: Aunque el verbo básico es «llamar», el contexto de un banquete sacrificial exige el valor pragmático de «invitar».
- source_word: לְכָל בְּנֵי הַמֶּלֶךְ
  english_pob_choice: all the king’s sons
  chosen_spanish: a todos los hijos del rey
  alternatives_spanish:
  - a todos los hijos del rey
  - a todos los hijos del rey
  lexicon: HALOT
  rationale: Se conserva la referencia masculina específica del hebreo y la estructura es natural en español.
- source_word: אֶבְיָתָר הַכֹּהֵן
  english_pob_choice: Abiathar the priest
  chosen_spanish: a Abiatar el sacerdote
  alternatives_spanish:
  - a Abiatar, el sacerdote
  lexicon: HALOT
  rationale: Se translitera el nombre y se traduce el título, siguiendo la convención del proyecto.
- source_word: יֹאָב שַׂר הַצָּבָא
  english_pob_choice: Joab the commander of the army
  chosen_spanish: a Joab, el comandante del ejército
  alternatives_spanish:
  - a Joab, jefe del ejército
  - a Joab, el capitán del ejército
  lexicon: HALOT
  rationale: «Comandante del ejército» expresa bien el cargo militar y mantiene el sentido oficial del hebreo.
- source_word: וְלִשְׁלֹמֹה עַבְדְּךָ
  english_pob_choice: but he did not invite Solomon your servant
  chosen_spanish: pero no invitó a Salomón, tu siervo
  alternatives_spanish:
  - pero a Salomón, tu siervo, no lo invitó
  - y a Salomón, tu siervo, no invitó
  lexicon: HALOT
  rationale: Se mantiene el contraste adversativo del contexto. «Tu siervo» conserva la fórmula deferencial del hebreo, tal como la reflejó la versión inglesa.
- source_word: לֹא קָרָא
  english_pob_choice: he did not invite
  chosen_spanish: no invitó
  alternatives_spanish:
  - no llamó
  - no convocó
  lexicon: HALOT
  rationale: Se conserva el valor contextual de «invitar» para ambas ocurrencias de קרא en este versículo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y el hebreo masorético: conserva el valor sacrificial de זבח, el sentido pragmático de קרא como «invitar», y la lista de invitados con sus cargos/títulos. No se aplicaron revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se prefiere «Yahvé» cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo «siervo» en la fórmula deferencial de 2.ª persona porque refleja el hebreo עַבְדְּךָ y coincide con el audit trail inglés.
  - Se usó puntuación española estándar y se preservó la cadencia de una sola oración narrativa con contraste adversativo.
