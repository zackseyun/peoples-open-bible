translation:
  language: es
  text: Y lo extendió delante de mí, y estaba escrito por delante y por detrás[a]; y en él estaban escritas lamentaciones, lamento[b] y ¡ay!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en ambos lados’; tradicionalmente, ‘por dentro y por fuera’.
    reason: lexical_alternative
  - marker: b
    text: O ‘gemido’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְרֹשׂ
  english_pob_choice: he spread it out
  chosen_spanish: lo extendió
  alternatives_spanish:
  - lo desenrolló
  - lo desplegó
  - lo extendió
  lexicon: HALOT
  rationale: פרשׂ expresa la acción de desplegar o extender. En español, «lo extendió» comunica el acto físico sin añadir una precisión no explícita en el hebreo. «Desenrolló» es posible por el contexto del rollo, pero especifica más de lo que el texto mismo dice.
- source_word: אוֹתָהּ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - la
  lexicon: HALOT
  rationale: El referente es el rollo, un sustantivo masculino en español, por lo que «lo» evita una discordancia gramatical. La forma hebrea es femenina por el sustantivo subyacente, pero en español el pronombre debe concordar con el género del referente lexicalizado.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: HALOT
  rationale: «Delante de mí» conserva el sentido espacial inmediato y suena natural en español narrativo. «Ante mí» también es válido, pero «delante de mí» resulta más transparente para lectura pública.
- source_word: כְתוּבָה
  english_pob_choice: it was written
  chosen_spanish: estaba escrito
  alternatives_spanish:
  - estaba inscrito
  - era escrito
  lexicon: HALOT
  rationale: El participio pasivo hebreo se expresa de forma natural con «estaba escrito». «Inscrito» es más técnico, pero menos directo. La elección preserva el estado resultante de la escritura en el rollo.
- source_word: פָּנִים וְאָחוֹר
  english_pob_choice: on the front and on the back
  chosen_spanish: por delante y por detrás
  alternatives_spanish:
  - en el anverso y en el reverso
  - en ambos lados
  - por delante y por detrás
  lexicon: HALOT
  rationale: El hebreo dice literalmente «frente y espalda», es decir, ambas caras del objeto. «Por delante y por detrás» mantiene la imagen sin forzar un tecnicismo editorial. La nota preserva la alternativa más interpretativa «en ambos lados».
- source_word: וְכָתוּב אֵלֶיהָ
  english_pob_choice: and written on it were
  chosen_spanish: y en él estaban escritas
  alternatives_spanish:
  - y escrito en él estaba
  - y sobre él estaban escritas
  lexicon: HALOT
  rationale: La construcción hebrea introduce el contenido del rollo. En español, el plural de contenido («lamentaciones, lamento y ¡ay!») pide concordancia femenina plural con «escritas». «En él» mantiene la referencia al rollo, y «estaban escritas» conserva el pasivo.
- source_word: קִנִים
  english_pob_choice: lamentations
  chosen_spanish: lamentaciones
  alternatives_spanish:
  - dirges
  - cantos fúnebres
  lexicon: HALOT
  rationale: קִינִים designa lamentos o endechas; «lamentaciones» es el equivalente más solemne y reconocible en español. Mantiene el tono profético de duelo sin reducirlo a un matiz exclusivamente funerario.
- source_word: הֶגֶה
  english_pob_choice: mourning
  chosen_spanish: lamento
  alternatives_spanish:
  - gemido
  - gemidos
  - murmuración
  lexicon: HALOT
  rationale: El término puede abarcar gemido, suspiro o lamento. «Lamento» funciona bien junto a «lamentaciones» y evita imponer una sola imagen emotiva como «gemido», que estrecharía el campo semántico. Se preserva así la tensión léxica del texto.
- source_word: הִי
  english_pob_choice: woe
  chosen_spanish: ¡ay!
  alternatives_spanish:
  - ay
  - ¡ay de ellos!
  - ¡ay de ello!
  lexicon: HALOT
  rationale: La interjección profética se expresa de modo natural con «¡ay!». En español bíblico, «¡ay!» conserva mejor el tono de amenaza y lamentación que una expansión explicativa. Se evita resolver el alcance del lamento, que el hebreo deja abierto.
theological_decisions:
- issue: Conservar la acumulación de términos de duelo y juicio sin armonizarlos en una sola idea
  english_pob_reading: lamentations and mourning and woe
  chosen_spanish_reading: lamentaciones, lamento y ¡ay!
  alternative_spanish_readings:
  - lamentaciones, gemido y ¡ay!
  - endechas, lamento y ¡ay!
  - lamentaciones y duelo y ¡ay!
  rationale: El versículo encadena tres vocablos relacionados pero no idénticos. La traducción debe preservar esa acumulación y no normalizarla en una sola categoría emocional. «Lamentaciones, lamento y ¡ay!» mantiene el peso retórico del texto y deja visible la tensión entre dolor y anuncio de juicio.
  doctrine_reference: Preservar la tensión literaria y profética sin suavizarla; lectura óptima de equivalencia
- issue: Elegir una formulación española para la localización del texto escrito en ambas caras
  english_pob_reading: on the front and on the back
  chosen_spanish_reading: por delante y por detrás
  alternative_spanish_readings:
  - en ambos lados
  - en el anverso y en el reverso
  - por delante y por detrás
  rationale: La frase hebrea es concreta y visual. «Por delante y por detrás» comunica la distribución del texto sin introducir terminología editorial moderna que podría sonar ajena al registro profético. La alternativa «en ambos lados» queda implícita como nota, pero no desplaza la imagen original.
  doctrine_reference: Mantener la imaginería del texto y evitar explicaciones innecesarias
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail inglés, sin cambios sustantivos respecto de la última revisión. Se mantuvo la triple serie de sustantivos de duelo/juicio y la imagen espacial de la escritura por delante y por detrás.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto no exige aquí el tetragrámaton, por no aparecer en este versículo.
  - Se eligió «lamentaciones» para קִנִים y «lamento» para הֶגֶה para diferenciar dos términos cercanos sin perder el efecto acumulativo.
  - Se mantuvo «¡ay!» como interjección profética breve, en lugar de expandirla a una frase explicativa.
  - Se prefirió una sintaxis pasiva natural en español («estaba escrito», «estaban escritas») para reflejar el estado del rollo sin sobrecargar la frase.
