review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: súplica negativa a Dios, resultado temido introducido por ἵνα μὴ, imagen de las naciones que ''tragan/devoran'', y cierre con ausencia de agente redentor expresada verbalmente. Sin embargo, dos elecciones se apartan del mejor ajuste: «para que ... no» suena más a finalidad que a resultado temido, donde «no sea que» refleja mejor ἵνα μὴ / lest; y «nos devoren» debilita la imagen concreta de καταπίωσιν, que en el expediente inglés se preserva mejor como ''swallow us up''.'
  spanish_quality_summary: El español es claro y legible, pero «No nos pases por alto» aplicado a Dios suena algo coloquial. La oración fluye mejor y con tono más digno como «No nos desatiendas». Además, «no sea que las naciones nos traguen» suena natural y mantiene la viveza metafórica del original. La nota [a] debe ajustarse porque no conviene ofrecer como alternativa exactamente la lectura reemplazada en el texto principal.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεός se traduce correctamente como «Dios»; no hay términos como Yahvé, Mesías o δοῦλος en juego. La decisión sobre λυτρουμένου como giro verbal en vez de título nominal está bien alineada con el rationale inglés y conviene conservarla en español.'
  issues:
  - severity: medium
    issue: «para que ... no» para ἵνα μὴ
    rationale: En este contexto expresa resultado temido ('lest'), no finalidad normal. «No sea que» o «para que no» pueden solaparse, pero aquí «no sea que» comunica mejor la súplica preventiva.
  - severity: medium
    issue: «nos devoren» para καταπίωσιν
    rationale: Aunque semánticamente cercano, pierde la imagen más concreta de 'tragar / engullir' que el audit trail quiso preservar con 'swallow us up'.
  - severity: low
    issue: «No nos pases por alto» suena coloquial en oración litúrgica
    rationale: Es posible, pero menos digno y menos natural en registro bíblico que «No nos desatiendas» o «No nos ignores».
  - severity: low
    issue: La nota [a] necesita actualizarse si se cambia el texto principal
    rationale: Las alternativas deben ser verdaderas alternativas y no repetir sin motivo una forma descartada por menor calidad estilística.
  revised_spanish_text: No nos desatiendas[a], nuestro Dios, no sea que las naciones nos traguen, como si no hubiera nadie que redima[b].
  revised_footnotes:
