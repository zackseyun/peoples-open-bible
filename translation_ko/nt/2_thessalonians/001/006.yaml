id: 2TH.1.6
reference: 2 Thessalonians 1:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἴπερ δίκαιον παρὰ θεῷ ἀνταποδοῦναι τοῖς θλίβουσιν ὑμᾶς θλῖψιν
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/001/006.yaml
  text: since it is just before God to repay affliction to those who afflict you[a]
  footnotes:
  - marker: a
    text: Or 'if indeed it is righteous with God to repay tribulation to those who afflict you.'
    reason: lexical_alternative
translation:
  language: ko
  text: 하나님 앞에서 여러분을 환난케 하는 자들에게 환난으로 갚으시는 것이 의로운 일이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: εἴπερ
  english_pob_choice: since
  chosen_korean: 때문입니다
  alternatives_korean:
  - 진실로 ~이라면
  - 참으로 ~이기에
  lexicon: BDAG
  rationale: 본문 정황에서 εἴπερ는 의심스러운 조건이 아니라 바울이 전제하는 사실을 도입한다. 한국어 「~때문입니다」로 인과적 전제를 자연스럽게 표현한다.
- source_word: δίκαιον
  english_pob_choice: just
  chosen_korean: 의로운
  alternatives_korean:
  - 공정한
  - 마땅한
  lexicon: BDAG
  rationale: 보응의 사법적 정황에서 δίκαιος의 도덕적 적절성을 「의로운」으로 옮긴다.
- source_word: παρὰ θεῷ
  english_pob_choice: before God
  chosen_korean: 하나님 앞에서
  alternatives_korean:
  - 하나님께
  - 하나님 보시기에
  lexicon: BDAG
  rationale: 하나님의 판단·표준에 비추어 측정되는 의미를 「하나님 앞에서」로 표현한다.
- source_word: ἀνταποδοῦναι
  english_pob_choice: to repay
  chosen_korean: 갚으시는
  alternatives_korean:
  - 보응하시는
  - 되갚으시는
  lexicon: BDAG
  rationale: 「갚다」는 보복적 정의의 의미를 단순한 응징보다 자연스럽게 담는다. 주체가 하나님이므로 경어 「~시는」을 사용한다.
- source_word: τοῖς θλίβουσιν ὑμᾶς
  english_pob_choice: to those who afflict you
  chosen_korean: 여러분을 환난케 하는 자들에게
  alternatives_korean:
  - 여러분을 압박하는 자들에게
  - 여러분을 핍박하는 자들에게
  lexicon: BDAG
  rationale: θλίβω를 다음 명사 θλῖψιν과 어휘적으로 연결하기 위해 「환난케 하다」를 사용한다.
- source_word: θλῖψιν
  english_pob_choice: affliction
  chosen_korean: 환난
  alternatives_korean:
  - 고난
  - 압박
  lexicon: BDAG
  rationale: 동족 어휘의 연결을 살려 「환난케 하는 자들에게 환난으로」 구조를 보존한다.
theological_decisions:
- issue: 하나님의 보응의 시점과 양상
  chosen_reading: 하나님께서 환난을 환난으로 갚으심이 의롭다는 일반적 진술을 유지하며, 시점·양상에 대해 좁히지 않음
  alternative_readings:
  - 종말론적 심판에만 국한
  - 역사 내 심판과 종말 심판을 함께 포함
  rationale: 헬라어 본문은 보응의 정의를 확언하나, 시점·양상에 대해 단정하지 않는다. 번역은 본문의 폭을 좁히지 않는다.
  doctrine_reference: 'Translation philosophy §3'
