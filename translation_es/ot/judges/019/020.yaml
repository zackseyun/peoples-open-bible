revisions:
- from: 'El anciano dijo[a]: «Paz te sea. Solo que toda tu necesidad recaiga sobre mí; solo no pases la noche en la plaza abierta»[b].'
  to: 'El anciano dijo: «Paz sea contigo. Solo, yo me haré cargo de todas tus necesidades; solo no pases la noche en la plaza pública[a]».'
  rationale: Se ajusta la frase de saludo a un español más natural y digno («Paz sea contigo»), se reemplaza el singular abstracto poco idiomático por «todas tus necesidades», se explicita la responsabilidad asumida con una formulación clara («yo me haré cargo»), y se mejora «plaza abierta» a «plaza pública» manteniendo en nota la alternativa «calle», en línea con la evidencia fuente y el POB inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:54:00Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: el anciano ofrece hospitalidad, asume la provisión y prohíbe pernoctar en el espacio público. Sin embargo, hay dos puntos mejorables frente al valor fuente y al rastro POB: «Paz te sea» suena poco natural en español bíblico moderno, y «toda tu necesidad» resulta forzado donde el sentido contextual es distributivo/plural: «todas tus necesidades» o «todo lo que te falta».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero contiene giros poco idiomáticos: «Paz te sea» y «toda tu necesidad recaiga sobre mí». Una formulación más natural y fiel en español es «Paz sea contigo» y «todas tus necesidades corren por mi cuenta» o «yo me haré cargo de todas tus necesidades». También conviene mejorar «plaza abierta» a «plaza pública» o «plaza» con nota, porque «abierta» suena algo calcado.'
  glossary_alignment: 'No hay términos de glosario mayor implicados. Las decisiones principales conciernen a idiomaticidad: שָׁלוֹם לָךְ debe conservar la idea de paz/reaseguro; כָּל מַחְסוֹרְךָ debe expresar necesidades/carencias; עָלַי debe comunicar responsabilidad asumida; בָּרְחוֹב debe mantener el sentido de plaza/espacio público expuesto, no simplemente calle.'
  issues:
  - severity: medium
    issue: «Paz te sea» es poco natural en español actual eclesial amplio.
    rationale: Aunque formalmente cercano al hebreo, en español suena invertido y poco idiomático. «Paz sea contigo» preserva el tono solemne y la fuerza de deseo/reaseguro mejor que el calco.
  - severity: medium
    issue: «Toda tu necesidad» suena forzado y menos natural que el sentido contextual requiere.
    rationale: 'El hebreo singular abstracto se expresa mejor en español con plural idiomático: «todas tus necesidades», especialmente en un contexto de hospitalidad y provisión concreta.'
  - severity: low
    issue: «Recaiga sobre mí» es comprensible, pero menos claro que una expresión española de responsabilidad asumida.
    rationale: El sentido de עָלַי aquí no es solo caída de carga, sino hacerse responsable. «Yo me haré cargo» o «corren por mi cuenta» comunica mejor el valor idiomático.
  - severity: low
    issue: «Plaza abierta» es entendible, pero algo rígido/calcado.
    rationale: «Plaza pública» suena más natural en español y conserva el sentido de área pública expuesta; la alternativa «calle» puede mantenerse en nota.
