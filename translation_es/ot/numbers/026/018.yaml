lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas eran
  lexicon: HALOT
  rationale: La cláusula nominal introductoria funciona como fórmula de resumen en un registro de censo; el presente es natural en español y conserva la fuerza deíctica del hebreo.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: clanes
  alternatives_spanish:
  - familias
  lexicon: HALOT
  rationale: En contexto tribal y censal, el término designa subdivisiones de un tribu; 'clanes' comunica mejor esa unidad sociotrilbal que 'familias'.
- source_word: בְּנֵי גָד
  english_pob_choice: the sons of Gad
  chosen_spanish: los hijos de Gad
  alternatives_spanish:
  - los descendientes de Gad
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica/tradicional del hebreo. 'Hijos de Gad' es idiomático en español bíblico y mantiene la designación formal del grupo.
- source_word: לִפְקֻדֵיהֶם
  english_pob_choice: according to those numbered of them
  chosen_spanish: según los contados de ellos
  alternatives_spanish:
  - según su número
  - según los registrados de ellos
  - según los musterados de ellos
  lexicon: HALOT
  rationale: Se retiene el vínculo con פקד como conteo/censo. 'Los contados de ellos' preserva el participio sustantivado y la referencia al resultado del censo, sin suavizarlo en exceso hacia una mera cifra abstracta.
- source_word: אַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: forty thousand and five hundred
  chosen_spanish: cuarenta mil y quinientos
  alternatives_spanish:
  - '40.500'
  lexicon: HALOT
  rationale: Se traduce el número con palabras en el cuerpo del texto, siguiendo el tono bíblico y manteniendo la cadencia del original.
translation_notes:
  revision_awareness: La versión inglesa auditada fue ajustada de 'from them' a 'of them' para acercarse más a la sintaxis hebrea. La propuesta española refleja esa misma relación posesiva/relativa con 'de ellos', manteniendo el registro formular y el sentido censal sin introducir una paráfrasis adicional.
  spanish_consistency_notes:
  - Se mantiene 'Gad' como nombre propio sin transliteración adaptada.
  - '''Clanes'' se usa en sentido técnico tribal, coherente con la terminología POB para divisiones de Israel.'
  - No se añade puntuación explicativa adicional que altere el carácter enumerativo del versículo.
