    text: Or 'to the Israelites.' The Hebrew reads 'to the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'commanded him to them' or 'commanded him concerning them'; the sense is that Moses spoke what the LORD had commanded him for Israel.
    reason: lexical_alternative
