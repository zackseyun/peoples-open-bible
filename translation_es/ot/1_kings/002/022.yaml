revisions:
- from: 'El rey Salomón respondió y dijo a su madre: «¿Y por qué estás pidiendo a Abisag la sunamita para Adonías? Pídele también el reino[a], porque él es mi hermano mayor; y para él, para Abiatar el sacerdote y para Joab hijo de Sarvia».'
