review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo: una invitación a unirse al grupo y compartir un fondo común. ''Echa tu suerte entre nosotros'' refleja adecuadamente גּוֹרָלְךָ תַּפִּיל בְּתוֹכֵנוּ, y ''todos tendremos una sola bolsa'' comunica con claridad כִּיס אֶחָד יִהְיֶה לְכֻלָּנוּ. Sin embargo, la nota [a] no preserva una alternativa real, porque repite exactamente el texto principal en lugar de reflejar la alternativa inglesa ''Cast your lot among us''.'
  spanish_quality_summary: El español es claro, natural y digno. La redacción principal suena bien en español bíblico contemporáneo. 'Bolsa' es aceptable para כִּיס, aunque la nota explicativa con 'bolsa de dinero' ayuda a precisar. El único problema de calidad editorial es la nota duplicada y la necesidad de ajustar su redacción para que sea una alternativa significativa y bien formulada en español.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal o del glosario del proyecto en este versículo. Las decisiones léxicas principales son adecuadas: גּוֹרָל como ''suerte'', תַּפִּיל como ''echa'', בְּתוֹכֵנוּ como ''entre nosotros'', y כִּיס como ''bolsa''.'
  issues:
  - severity: medium
    issue: La nota [a] repite exactamente el texto principal en vez de ofrecer una alternativa léxica real.
    rationale: El rastro de auditoría inglés conserva una alternativa significativa ('Cast your lot among us'). En español, la nota debe reflejar una variante como 'Arroja tu suerte entre nosotros' o similar, no duplicar la lectura principal.
  revised_spanish_text: Echa tu suerte entre nosotros[a]; todos tendremos una sola bolsa[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Arroja tu suerte entre nosotros».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una sola bolsa de dinero pertenecerá a todos nosotros».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y claro. Solo se corrige la nota [a] para que preserve una alternativa léxica auténtica en español, en línea con el audit trail inglés. La nota [b] se mantiene porque refleja bien la alternativa más literal de posesión compartida.
