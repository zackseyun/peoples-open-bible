  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Selah» se conserva apropiadamente. No aparecen términos sensibles como Yahvé, Mesías, δοῦλος, etc. La revisión propuesta busca mayor fidelidad léxica a בגאותו sin alterar el registro ni el estilo.
