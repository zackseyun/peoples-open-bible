revisions:
- from: 'Entonces David se dijo en su corazón[a]: «Ahora un día pereceré[b] a manos de Saúl. No hay para mí nada mejor que escapar sin falta a la tierra de los filisteos. Entonces Saúl se desesperará de buscarme todavía en todo el territorio de Israel[c], y escaparé de su mano».'
  to: 'Entonces David se dijo en su corazón[a]: «Ahora un día pereceré[b] a manos de Saúl. No hay para mí nada mejor que ciertamente escapar[c] a la tierra de los filisteos. Entonces Saúl desistirá[d] de seguir buscándome en todo el territorio de Israel, y escaparé de su mano».'
  rationale: Se revisa para mejorar la fidelidad semántica y la naturalidad del español. «Desistirá» representa mejor el sentido de יָאַשׁ en contexto que «se desesperará». Se reemplaza «escapar sin falta» por «ciertamente escapar» para mantener el énfasis del infinitivo absoluto con mejor registro bíblico. También se corrigen y realinean las notas al rastro de auditoría inglés, eliminando el anglicismo en la nota b y añadiendo una nota específica para la intensificación hebrea.
