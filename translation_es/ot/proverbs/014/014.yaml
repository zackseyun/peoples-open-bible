base_translation:
  language: en
  yaml_path: translation/ot/proverbs/014/014.yaml
  text: The one who turns away in heart will be filled with his own ways[b][a], and a good man with what comes from himself.
  footnotes:
  - marker: a
    text: Or, 'The one who turns away in heart will be filled from his own ways, and a good man from his own deeds.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the second line is difficult; the sense is likely that the good man is satisfied from what proceeds from his own conduct, in contrast to the inwardly wayward person.
    reason: alternative_reading
