  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἔφη τε πρὸς αὐτούς· Ὑμεῖς ἐπίστασθε ὡς ἀθέμιτόν ἐστιν ἀνδρὶ Ἰουδαίῳ κολλᾶσθαι ἢ προσέρχεσθαι ἀλλοφύλῳ· κἀμοὶ ὁ θεὸς ἔδειξεν μηδένα κοινὸν ἢ ἀκάθαρτον λέγειν ἄνθρωπον·
base_translation:
  language: en
  yaml_path: translation/nt/acts/010/028.yaml
  text: And he said to them[a], “You yourselves know how unlawful it is for a Jewish man to associate with or visit a foreigner[b]; but God has shown me to call no person common or unclean.”
  footnotes:
  - marker: a
    text: Or “a Gentile” for “a foreigner” (ἀλλοφύλῳ), literally someone of another people.
    reason: lexical_alternative
  - marker: b
    text: “Common” translates κοινόν, a term distinct from “unclean” (ἀκάθαρτον); the pair preserves Jewish purity-language categories.
    reason: lexical_alternative
translation:
  language: ko
  text: 그가 그들에게 말하였습니다. 「유대 사람으로서 다른 민족 사람과 어울리거나 그 집을 방문하는 일이 얼마나 율법에 어긋나는지는 여러분 자신이 잘 알고 있습니다. 그러나 하나님께서는 나에게, 어떤 사람도 속되다거나 부정하다고 하지 말라고 보여 주셨습니다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 유대-이방 경계의 의도적 붕괴
  chosen_reading: 유대 사람으로서 다른 민족 사람과 어울리거나 그 집을 방문하는 일이 얼마나 율법에 어긋나는지는 여러분 자신이 잘 알고 있습니다. 그러나 하나님께서는 나에게, 어떤 사람도 속되다거나 부정하다고 하지 말라고 보여 주셨습니다.
  alternative_readings:
  - 유대인이 이방인과 사귀거나 가까이하는 것이 위법이라는 것은 너희도 알 것이다…
  rationale: ἀθέμιτόν의 「율법에 어긋남」을 직역해 베드로가 자신의 경계 위반을 의식하고 있음을 보존한다. 후반의 ἔδειξεν 절은 환상이 의식법 자체가 아니라 「사람 분류」를 다시 정렬한다는 점을 살린다.
  doctrine_reference: 'DOCTRINE.md: cultural-boundary collapse; Cornelius episode'
