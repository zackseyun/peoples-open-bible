translation:
  language: es
  text: El vino bebido en exceso es amargura del alma[a], con provocación y tropiezo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El vino bebido en exceso es amargura para el alma, con irritación y tropiezo». Los dos últimos sustantivos permiten matices próximos, y el griego es compacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πικρία
  english_pob_choice: bitterness
  chosen_spanish: amargura
  alternatives_spanish:
  - amargor
  - amargura del alma
  - amargura interior
  lexicon: BDAG
  rationale: πικρία expresa la cualidad de ser amargo o una condición de amargura. En español, «amargura» transmite bien el valor figurado sin añadir una carga moral ajena al texto.
- source_word: ψυχῆς
  english_pob_choice: of soul
  chosen_spanish: del alma
  alternatives_spanish:
  - de alma
  - del ser
  - de la vida
  lexicon: BDAG
  rationale: La relación genitiva se conserva de forma directa. «Alma» mantiene la antropología del griego y resulta natural en español bíblico sin neutralizar el sentido interior/persona.
- source_word: οἶνος
  english_pob_choice: Wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  lexicon: BDAG
  rationale: Se mantiene el referente literal. No hay base para generalizar a una categoría más amplia como «alcohol».
- source_word: πινόμενος πολὺς
  english_pob_choice: drunk in excess
  chosen_spanish: bebido en exceso
  alternatives_spanish:
  - bebido en gran cantidad
  - cuando se bebe mucho
  - al ser bebido en exceso
  lexicon: BDAG
  rationale: La participial expresa vino consumido en gran cantidad. «Bebido en exceso» comunica con naturalidad la idea de sobreconsumo y conserva el matiz de advertencia del original.
- source_word: ἐν ἐρεθισμῷ
  english_pob_choice: with provocation
  chosen_spanish: con provocación
  alternatives_spanish:
  - con irritación
  - con agitación
  - para provocación
  lexicon: LSJ
  rationale: ἐρεθισμός puede abarcar irritación, excitación o provocación. «Con provocación» sigue de cerca la estructura de la versión inglesa revisada y mantiene la ambigüedad útil entre causa, contexto y efecto.
- source_word: ἀντιπτώματι
  english_pob_choice: stumbling
  chosen_spanish: tropiezo
  alternatives_spanish:
  - estrellarse
  - caída
  - ruina
  lexicon: LSJ
  rationale: El término sugiere una caída o choque contra algo. «Tropiezo» es un equivalente español claro y proverbial, más cercano a la imagen de caída que una paráfrasis como «ruina».
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que pasó de una formulación menos natural a «with provocation and stumbling». Se preserva la estructura proverbial y la compactación de los dos últimos sustantivos, evitando suavizar el aviso contra el exceso.
  spanish_consistency_notes:
  - Se usa «vino» de manera literal, sin expandir a «bebida alcohólica».
  - Se conserva «alma» para ψυχή, siguiendo el valor antropológico del griego.
  - «Tropiezo» mantiene la imagen de caída de ἀντιπτώματι y evita una abstracción excesiva.
  - La puntuación reproduce la cadencia breve del proverbio y separa claramente el resultado de la segunda cláusula.
