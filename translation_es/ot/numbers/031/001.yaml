lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «entonces» conserva esa secuencia de modo natural en español. «Habló» refleja דבר con más precisión que «dijo», siguiendo la decisión auditada en inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino del Tetragrámaton, conforme al criterio POB, usando la forma española «Yahvé» en lugar de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional de destinatario se expresa de forma natural en español con «a».
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria del discurso directo se rinde con el gerundio «diciendo», que en español mantiene la relación sintáctica y narrativa del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea directamente el Tetragrámaton; la política POB conserva el nombre divino en vez de reemplazarlo por un título. «Yahvé» es la forma española adoptada para esa decisión.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del inglés POB: no se requiere cambio de sentido ni ajuste textual; se mantiene el avance narrativo, la fórmula introductoria y la decisión doctrinal sobre el nombre divino.'
  spanish_consistency_notes:
  - Se conserva la distinción entre el nombre divino propio y un título, evitando «SEÑOR».
  - «Habló» reproduce mejor דבר que «dijo», y «diciendo» conserva la fórmula de introducción al discurso.
  - La puntuación con coma antes de «diciendo» sigue la función introductoria del hebreo y la práctica editorial del POB.
