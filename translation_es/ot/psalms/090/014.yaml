translation:
  language: es
  text: Sácianos por la mañana con tu amor constante[a], y cantaremos de gozo y nos alegraremos todos nuestros días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu amor leal», «tu amor fiel del pacto» o «tu misericordia». El hebreo חֶסֶד expresa amor leal, duradero y bondadoso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂבְּעֵנוּ
  english_pob_choice: Satisfy us
  chosen_spanish: Sácianos
  alternatives_spanish:
  - Satisfácenos
  - Lléñanos
  - Satisfechos con
  lexicon: HALOT
  rationale: El piel imperativo con sufijo de 1.ª plural expresa pedir plenitud o satisfacción. En español, «sácianos» comunica bien la idea de ser llenados en abundancia y conserva la fuerza imperativa sin sonar forzado.
- source_word: בַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  - cada mañana
  lexicon: HALOT
  rationale: La expresión señala un marco temporal matutino. «Por la mañana» es natural en español y mantiene el sentido temporal sin añadir la idea de repetición que no está explícita en el hebreo.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor constante
  alternatives_spanish:
  - tu amor leal
  - tu amor fiel del pacto
  - tu misericordia
  lexicon: HALOT
  rationale: חֶסֶד abarca amor leal, duradero y bondadoso. «Amor constante» preserva la idea de fidelidad perseverante y resulta claro en español; «misericordia» sería más estrecho y perdería parte del matiz relacional.
- source_word: וּנְרַנְּנָה
  english_pob_choice: and we will sing for joy
  chosen_spanish: y nos alegraremos
  alternatives_spanish:
  - y cantaremos con alegría
  - y gritaremos de gozo
  - y alabaremos con gozo
  lexicon: HALOT
  rationale: El verbo רנן tiene un fuerte componente de júbilo expresado en voz alta. Aquí se integra con el paralelismo mediante «nos alegraremos», y el sentido de gozoso regocijo queda reforzado por la cláusula siguiente. Una opción más explícita como «cantaremos con alegría» sería posible, pero menos fluida con el paralelismo español.
- source_word: וְנִשְׂמְחָה
  english_pob_choice: and be glad
  chosen_spanish: y nos gozaremos
  alternatives_spanish:
  - y estaremos alegres
  - y nos alegraremos
  - y nos regocijaremos
  lexicon: HALOT
  rationale: שׂמח expresa alegrarse/regocijarse. «Nos gozaremos» mantiene el tono bíblico y distingue la segunda cláusula de la primera, conservando la duplicación poética del hebreo sin volverla redundante.
- source_word: בְּכָל יָמֵינוּ
  english_pob_choice: all our days
  chosen_spanish: todos nuestros días
  alternatives_spanish:
  - a lo largo de todos nuestros días
  - durante todos nuestros días
  - en todos nuestros días
  lexicon: HALOT
  rationale: La expresión refiere la totalidad de la vida compartida por los hablantes. «Todos nuestros días» es idiomático y fiel; el preposición בְּ queda suficientemente representada por el sentido global en español.
theological_decisions:
- issue: Valor de חֶסֶד como amor leal y duradero de Yahvé
  english_pob_reading: your steadfast love
  chosen_spanish_reading: tu amor constante
  alternative_spanish_readings:
  - tu amor leal
  - tu amor fiel del pacto
  - tu misericordia
  rationale: La POB inglesa documenta que חֶסֶד no se reduce a una sola idea como «misericordia». En español, «amor constante» conserva la dimensión de fidelidad perseverante y benevolencia pactal sin forzar un tecnicismo eclesiástico. No se usa «misericordia» como principal porque estrecha el campo semántico.
  doctrine_reference: Salmo 90:14; traducción POB §1, §5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el resumen de verificación mostró alto grado de acuerdo; por eso este borrador sigue de cerca la lectura auditada, con adaptación idiomática al español y sin introducir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene «tu» para la segunda persona singular, coherente con la oración directa del texto.
  - 'Se conserva el paralelismo poético con dos respuestas gozosas: «nos alegraremos» / «nos gozaremos».'
  - «Amor constante» funciona como equivalente central de חֶסֶד sin reemplazarlo por una fórmula tradicional que borre su matiz de lealtad amorosa.
  - No se tradujo el verbo de manera mecánica; se priorizó una cadencia natural en español manteniendo la densidad semántica del hebreo.
