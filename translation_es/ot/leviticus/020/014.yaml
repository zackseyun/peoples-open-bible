translation:
  language: es
  text: Si un hombre toma una mujer y a su madre[a], es perversidad[c]. Quemarán a él y a ellas con fuego[b], para que no haya perversidad entre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se casa con una mujer y con su madre». El verbo hebreo «tomar» puede implicar matrimonio en contextos legales, pero aquí la redacción no lo especifica de manera explícita.
    reason: lexical_alternative
  - marker: b
    text: «A ellas» se refiere a la mujer y a su madre.
    reason: lexical_alternative
  - marker: c
    text: O «maldad», «desenfreno» o «torpeza moral» para el término hebreo que describe una falta sexual grave.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo es masculino singular y el contexto legal identifica al varón responsable de la falta. En español, «un hombre» conserva esa precisión sin neutralizar el género del referente.
- source_word: יִקַּח
  english_pob_choice: takes
  chosen_spanish: toma
  alternatives_spanish:
  - se casa con
  - toma en matrimonio
  lexicon: HALOT
  rationale: לקח significa literalmente «tomar». En este contexto legal puede implicar una unión conyugal o sexual, pero el texto hebreo no añade el término explícito para «casarse»; «toma» mantiene la apertura del original.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: HALOT
  rationale: אִשָּׁה puede significar «mujer» o «esposa». Aquí el hebreo no marca de forma explícita el estatus marital, así que «mujer» es más amplio y menos interpretativo.
- source_word: אִמָּהּ
  english_pob_choice: her mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - a la madre de ella
  lexicon: HALOT
  rationale: 'La relación posesiva es directa: la madre pertenece a la mujer ya mencionada. «A su madre» suena natural en español y conserva esa referencia.'
- source_word: זִמָּה
  english_pob_choice: depravity
  chosen_spanish: perversidad
  alternatives_spanish:
  - maldad
  - desenfreno
  - torpeza moral
  lexicon: HALOT
  rationale: זִמָּה en la legislación levítica designa una falta sexual grave y moralmente abominable. «Perversidad» comunica esa gravedad en español sin suavizar el término ni convertirlo en una palabra técnica eclesiástica.
- source_word: בָּאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - por fuego
  - en fuego
  lexicon: HALOT
  rationale: La preposición beth aquí funciona como medio o instrumento. «Con fuego» reproduce de manera natural la idea de ejecución por quemadura.
- source_word: יִשְׂרְפוּ אֹתוֹ וְאֶתְהֶן
  english_pob_choice: They shall burn him and them
  chosen_spanish: Los quemarán a él y a ellas
  alternatives_spanish:
  - Quemarán a él y a ellas
  - Los quemarán a él y a ambas
  lexicon: HALOT
  rationale: El verbo hebreo es activo en tercera persona plural con objetos explícitos. Mantener la voz activa preserva la forma legal del hebreo. «A ellas» hace explícito que el segundo objeto se refiere a la mujer y a su madre.
- source_word: וְלֹא תִהְיֶה זִמָּה בְּתוֹכְכֶם
  english_pob_choice: so that there will not be depravity among you
  chosen_spanish: para que no haya perversidad entre ustedes
  alternatives_spanish:
  - y no habrá perversidad entre ustedes
  - para que no exista perversidad en medio de ustedes
  lexicon: HALOT
  rationale: La cláusula expresa el resultado buscado por la pena dentro de la comunidad del pacto. «Para que» aclara la relación de finalidad, y «entre ustedes» transmite bien בְּתוֹכְכֶם en español actual.
theological_decisions:
- issue: Si לקח implica matrimonio o una unión sexual más amplia
  english_pob_reading: Render broadly as 'takes a woman and her mother' rather than specifying marriage.
  chosen_spanish_reading: «toma una mujer y a su madre» sin explicitar «se casa con»
  alternative_spanish_readings:
  - se casa con una mujer y a su madre
  - toma en matrimonio a una mujer y a su madre
  rationale: La evidencia del hebreo permite una lectura conyugal en contexto legal, pero no la nombra de manera explícita. La traducción amplia evita introducir una restricción que el texto no formula y conserva la tensión lexical señalada por la POB en inglés.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo presentar la pena de quemar a los culpables
  english_pob_reading: 'Translate the Hebrew as an active legal sentence: ''They shall burn him and them with fire.'''
  chosen_spanish_reading: «Los quemarán a él y a ellas con fuego»
  alternative_spanish_readings:
  - Se los quemará con fuego
  - Serán quemados con fuego
  rationale: El hebreo usa una forma verbal activa plural con objetos explícitos; por eso conviene mantener la agencia legal en español. La pasiva ocultaría esa estructura y debilitaría la transparencia al original.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente del audit trail indica acuerdo alto y que no se requieren cambios; esta versión sigue esa lectura estable, conservando la literalidad controlada de לקח, el valor moral fuerte de זִמָּה y la construcción activa del castigo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto cuando el tetragrámaton esté en el texto; en este versículo no aparece.
  - Se usa «perversidad» como solución española principal para זִמָּה, en continuidad con el tono legal-moral fuerte del registro POB.
  - Se conserva la voz activa en la pena para reflejar la sintaxis hebrea, evitando una pasiva interpretativa.
  - Se evita «esposa» porque el hebreo no lo marca de manera explícita en este contexto.
  - Se emplea «entre ustedes» como equivalente natural de בְּתוֹכְכֶם en español moderno.
