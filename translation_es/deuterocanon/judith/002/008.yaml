translation:
  language: es
  text: Y sus heridos llenarán sus barrancos y los wadis[a], y un río desbordante se llenará de sus muertos;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los torrentes invernales» o «los lechos de torrente». El término griego se refiere a un cauce torrencial estacional.
    reason: lexical_alternative
lexical_decisions:
- source_word: τραυματίαι
  english_pob_choice: wounded
  chosen_spanish: heridos
  alternatives_spanish:
  - los heridos
  - los lesionados
  lexicon: LSJ
  rationale: El sustantivo griego designa a los que han sido heridos. En español, «heridos» transmite de modo natural la idea militar sin añadir género ni rebajar la fuerza del sustantivo.
- source_word: πληρώσουσιν
  english_pob_choice: will fill
  chosen_spanish: llenarán
  alternatives_spanish:
  - colmarán
  - llenarán por completo
  lexicon: LSJ
  rationale: El futuro simple conserva el valor futuro y la imagen concreta de llenar físicamente los cauces con los caídos.
- source_word: φάραγγας
  english_pob_choice: ravines
  chosen_spanish: barrancos
  alternatives_spanish:
  - gargantas
  - cañadas
  - ravines
  lexicon: LSJ
  rationale: «Barrancos» es un equivalente natural en español para hendiduras profundas o quebradas; mantiene el matiz topográfico sin sonar técnico o arcaico.
- source_word: χειμάρρους
  english_pob_choice: wadis
  chosen_spanish: wadis
  alternatives_spanish:
  - torrentes invernales
  - cauces secos
  - lechos de torrente
  lexicon: LSJ
  rationale: Se conserva «wadis» porque el audit trail inglés ya decidió que χείμαρρος alude a cauces estacionales del Cercano Oriente. En español, el préstamo puede ser más preciso que una paráfrasis, y se apoya con nota explicativa.
- source_word: ποταμὸς ἐπικλύζων
  english_pob_choice: an overflowing river
  chosen_spanish: un río desbordado
  alternatives_spanish:
  - un río que se desborda
  - un río que inunda
  lexicon: LSJ
  rationale: La expresión griega presenta un río que inunda o rebosa. «Desbordado» conserva la imagen compacta y sonoramente natural en español.
- source_word: τοῖς νεκροῖς
  english_pob_choice: with their dead
  chosen_spanish: con sus muertos
  alternatives_spanish:
  - con los muertos de ellos
  - con sus cadáveres
  lexicon: LSJ
  rationale: «Sus muertos» refleja el sentido de personas muertas o cadáveres sin forzar una formulación más clínica; mantiene el tono sobrio del pasaje.
theological_decisions:
- issue: Imagen de violencia y juicio militar
  english_pob_reading: The verse depicts the battlefield filling ravines, torrent channels, and an overflowing river with the dead.
  chosen_spanish_reading: El versículo presenta un cuadro bélico de juicio en el que barrancos, wadis y un río desbordado quedan llenos de muertos.
  alternative_spanish_readings:
  - El pasaje habla solo de una metáfora de derrota sin especificar juicio.
  - Se suaviza la imagen para evitar repetición de cadáveres.
  rationale: El griego es explícito en la violencia de la escena y no justifica suavizarla. La traducción española debe conservar el impacto imagístico y la acumulación de lugares de muerte.
  doctrine_reference: Juicio divino en lenguaje narrativo; fidelidad al imaginario bélico del texto
- issue: Tratamiento de χείμαρρος como término técnico de cauce estacional
  english_pob_reading: The Greek term refers to a seasonal torrent channel.
  chosen_spanish_reading: Se mantiene el préstamo «wadis» para preservar la referencia a cauces estacionales propios del entorno del texto.
  alternative_spanish_readings:
  - torrentes invernales
  - lechos de torrente
  - cauces secos
  rationale: Traducirlo solo por una palabra española puede perder la referencia geográfica-cultural específica. El préstamo, acompañado de nota, comunica con más exactitud el tipo de cauce aludido.
  doctrine_reference: Precisión léxica y geográfica en traducción bíblica
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete 1909 y refleja el mismo movimiento sintáctico que el texto inglés auditado: los heridos llenan barrancos y cauces, y luego un río desbordado queda colmado con los muertos. Se adopta la decisión inglesa de mantener la imagen de un cauce estacional y, en español, se conserva como préstamo explicado en nota para no perder la referencia técnica-cultural.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - «Heridos» mantiene la fuerza léxica de τραυματίαι sin introducir explicaciones.
  - «Wadis» se conserva como préstamo con nota para seguir la decisión léxica inglesa sobre χείμαρρος.
  - «Con sus muertos» mantiene el plural concreto y evita una paráfrasis más abstracta.
