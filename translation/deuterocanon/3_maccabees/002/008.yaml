theological_decisions:
- issue: Appositional phrase τῷ τῶν ἁπάντων ἀπροσδεεῖ
  chosen_reading: 'rendered as an address to God: ''you who have need of nothing, the God of all'''
  alternative_readings:
  - '''for your name, to you, the one in need of nothing among all things'''
  - '''for your name, you who are in need of nothing from all'''
  rationale: The Greek is syntactically awkward in Swete's witness, but in context this is clearly a doxological description of God in prayer. The chosen rendering makes the apposition explicit in idiomatic English while preserving the theological claim of divine self-sufficiency and universality.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
