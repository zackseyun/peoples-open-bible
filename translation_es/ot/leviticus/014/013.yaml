translation:
  language: es
  text: Y degollará el cordero en el lugar donde degüellan la ofrenda por el pecado y el holocausto[a], en el lugar santo; porque, así como la ofrenda por el pecado, la ofrenda por la culpa le pertenece al sacerdote[b]; es cosa santísima.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda por la purificación» para חַטָּאת, destacando la función de limpieza ritual en la legislación sacerdotal.
    reason: lexical_alternative
  - marker: b
    text: O «ofrenda de reparación» para אָשָׁם, destacando el aspecto de restitución asociado a esta ofrenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַט
  english_pob_choice: And he shall slaughter
  chosen_spanish: Y lo degollará
  alternatives_spanish:
  - Y lo sacrificará
  - Y lo matará
  lexicon: HALOT
  rationale: שָׁחַט en contexto sacrificial designa el degüello ritual. «Degollar» preserva la fuerza cultual específica mejor que «matar» y evita ampliar indebidamente el sentido a un acto no ritual. El objeto se expresa con «lo» para concordar con el cordero implícito en el pasaje.
- source_word: הַכֶּבֶשׂ
  english_pob_choice: the lamb
  chosen_spanish: el cordero
  alternatives_spanish:
  - el carnero joven
  - la oveja
  lexicon: HALOT
  rationale: כֶּבֶשׂ suele referirse a un cordero en legislación sacrificial. «Cordero» es natural en español y conserva el valor sacrificial del animal sin añadir especificaciones no requeridas por el hebreo.
- source_word: בִּמְקוֹם אֲשֶׁר יִשְׁחַט
  english_pob_choice: in the place where they slaughter
  chosen_spanish: en el lugar donde degüellan
  alternatives_spanish:
  - en el lugar donde él degüella
  - en el lugar donde se degüella
  lexicon: HALOT
  rationale: El imperfecto singular hebreo puede funcionar genéricamente en una instrucción legal. «Degüellan» comunica en español ese uso impersonal o habitual sin forzar un sujeto individual, y mantiene el paralelismo con el verbo principal.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda por la purificación
  lexicon: HALOT
  rationale: Aunque el inglés POB mantiene «sin offering», en español «ofrenda por el pecado» comunica con claridad la categoría sacrificial tradicional y el vínculo semántico con חַטָּאת. Se preserva así la lectura cultual sin introducir una paráfrasis explicativa excesiva.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - la ofrenda totalmente quemada
  lexicon: HALOT
  rationale: עֹלָה es la ofrenda que asciende en humo; «holocausto» es un equivalente español establecido para este sacrificio. Aunque es un término tradicional, aquí es la forma más precisa y readable para el registro bíblico.
- source_word: בִּמְקוֹם הַקֹּדֶשׁ
  english_pob_choice: in the holy place
  chosen_spanish: en el lugar santo
  alternatives_spanish:
  - en un lugar santo
  - en el sitio santo
  lexicon: HALOT
  rationale: El artículo define un lugar cultual determinado. «Lugar santo» expresa bien esa localización consagrada y conserva la resonancia bíblica del hebreo sin convertirla en una traducción demasiado rígida.
- source_word: כִּי כַּחַטָּאת הָאָשָׁם הוּא לַכֹּהֵן
  english_pob_choice: for like the sin offering, the guilt offering belongs to the priest
  chosen_spanish: porque, así como la ofrenda por el pecado, la ofrenda por la culpa le pertenece al sacerdote
  alternatives_spanish:
  - porque, como la ofrenda por el pecado, así es la ofrenda por la culpa para el sacerdote
  - porque la ofrenda por la culpa es como la ofrenda por el pecado; es para el sacerdote
  lexicon: HALOT
  rationale: El hebreo expresa analogía y asignación sacerdotal. «Así como... le pertenece al sacerdote» conserva ambas ideas de manera clara en español. «Ofrenda por la culpa» mantiene אָשָׁם como categoría sacrificial y evita diluir su matiz técnico.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: cosa santísima
  alternatives_spanish:
  - santísimo es
  - es santidad de santidades
  lexicon: HALOT
  rationale: La construcción superlativa hebrea se traduce de forma idiomática en español con «cosa santísima», una fórmula tradicional y precisa que comunica el grado máximo de santidad sin sonar artificiosa.
theological_decisions:
- issue: Rendering of חַטָּאת in priestly sacrificial legislation
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda por la purificación
  rationale: חַטָּאת puede enfatizar tanto el pecado como la purificación ritual. En español, «ofrenda por el pecado» conserva la categoría sacrificial reconocible y el paralelismo con las otras ofrendas del verso. La alternativa se reconoce porque algunos lectores podrían entender el acto principalmente como purificación cultual.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering of אָשָׁם
  english_pob_reading: guilt offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda de reparación
  - ofrenda de compensación
  rationale: En este contexto legal-sacrificial, «ofrenda por la culpa» mantiene la correspondencia semántica con אָשָׁם y su relación con responsabilidad/culpa. Las alternativas resaltan la restitución, pero la formulación principal preserva mejor la categoría ritual.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: 'Se verificó el contexto auditado en inglés y no se requirieron revisiones adicionales; la formulación española sigue de cerca las decisiones léxicas documentadas, preservando las dos tensiones relevantes: חַטָּאת como ofrenda por el pecado/purificación y אָשָׁם como ofrenda por la culpa/reparación.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito en el contexto anterior, pero este versículo no lo contiene explícitamente.
  - Se eligió un registro bíblico contemporáneo y culto, evitando arcaísmos innecesarios.
  - «Lugar santo» y «cosa santísima» conservan el lenguaje técnico cultual del hebreo.
  - El sujeto impersonal de la cláusula relativa se expresó con verbo en tercera persona plural («degüellan») para reflejar el valor genérico del hebreo.
