  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Herencia', 'hijos', 'clanes', 'ciudades' son adecuados. 'Aldeas' es aceptable para חַצְרֵיהֶן en este contexto, aunque menos formular que 'poblados'; no es un problema de glosario.
