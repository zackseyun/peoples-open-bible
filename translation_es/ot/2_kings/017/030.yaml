translation:
  language: es
  text: Los hombres de Babilonia hicieron Succoth-benoth[a], los hombres de Cuth hicieron Nergal[b], y los hombres de Hamat hicieron Ashima.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Succoth-benoth probablemente es el nombre de una deidad extranjera o de un objeto de culto; como el sentido del nombre es incierto, se translitera en lugar de traducirlo.
    reason: cultural_note
  - marker: b
    text: O «la gente de Babilonia ... la gente de Cuth ... la gente de Hamat». El hebreo usa en cada caso «los hombres de».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - la gente de
  - los habitantes de
  lexicon: HALOT
  rationale: El hebreo usa el plural constructo de אִישׁ, de valor masculino plural. «Los hombres de» sigue de cerca la forma y conserva el paralelismo repetido del versículo; «la gente de» suavizaría el matiz colectivo, pero no reflejaría tan directamente la forma hebrea.
- source_word: עָשׂוּ
  english_pob_choice: made
  chosen_spanish: hicieron
  alternatives_spanish:
  - fabricaron
  - erigieron
  - establecieron
  lexicon: HALOT
  rationale: עָשׂוּ significa literalmente «hicieron». En este contexto cultual, «hicieron» es la opción más sobria y textualmente restringida; «erigieron» o «establecieron» interpretan más de lo que el hebreo expresa.
- source_word: סֻכּוֹת בְּנוֹת
  english_pob_choice: Succoth-benoth
  chosen_spanish: Succot-benot
  alternatives_spanish:
  - Sucot-benot
  - Succoth-benoth
  lexicon: HALOT
  rationale: Se trata probablemente de un nombre propio de deidad u objeto de culto, por lo que corresponde transliterarlo. En español se adapta la grafía a una forma clara y publicable; no se traduce el sentido posible de los componentes porque la etimología es incierta.
- source_word: כּוּת
  english_pob_choice: Cuth
  chosen_spanish: Cuth
  alternatives_spanish:
  - Cut
  - Kuth
  lexicon: HALOT
  rationale: Nombre propio de lugar en transliteración convencional. Se conserva la forma tradicional de identificación geográfica sin intentar verterlo semánticamente.
- source_word: נֵרְגַל
  english_pob_choice: Nergal
  chosen_spanish: Nergal
  lexicon: HALOT
  rationale: Nombre propio de una deidad extranjera; la transliteración preserva el referente histórico y religioso sin añadir interpretación.
- source_word: חֲמָת
  english_pob_choice: Hamath
  chosen_spanish: Hamat
  alternatives_spanish:
  - Hamat
  lexicon: HALOT
  rationale: Nombre de lugar transliterado. En español, «Hamat» ofrece una forma más natural y legible, manteniendo la identificación del topónimo.
- source_word: אֲשִׁימָא
  english_pob_choice: Ashima
  chosen_spanish: Ashima
  lexicon: HALOT
  rationale: Nombre propio de deidad extranjera; se translitera para conservar la referencia del texto fuente sin sobreexplicar su significado.
theological_decisions:
- issue: Si los objetos de «hicieron» deben explicitarse como «ídolos» o «dioses»
  english_pob_reading: Preserve the proper names in transliteration without adding 'idol' or 'god' in the main text.
  chosen_spanish_reading: Conservar los nombres propios transliterados sin añadir «ídolo» ni «dios» en el texto principal.
  alternative_spanish_readings:
  - Los hombres de Babilonia hicieron el ídolo Succot-benot ...
  - Los babilonios hicieron a Succot-benot su dios ...
  rationale: El hebreo dice simplemente «hicieron» seguido del objeto directo; el contexto permite entender que se trata de deidades o elementos de culto, pero el versículo no lo formula explícitamente. La traducción principal evita añadir una glosa interpretativa que el texto no contiene, manteniendo la tensión lexical y el carácter histórico del pasaje.
  doctrine_reference: Translation philosophy §§1, 2, 3
- issue: Si traducir אַנְשֵׁי como colectivo («la gente») o como masculino plural («los hombres»)
  english_pob_reading: The Hebrew uses 'men of' in each case.
  chosen_spanish_reading: Mantener «los hombres de» como reflejo del plural masculino del hebreo.
  alternative_spanish_readings:
  - la gente de Babilonia
  - los habitantes de Babilonia
  rationale: La forma hebrea es explícitamente masculina plural; aunque el español puede usar un colectivo más inclusivo o más idiomático, aquí conviene conservar la forma auditada por la POB inglesa para no perder el dato gramatical del original.
  doctrine_reference: Translation philosophy §§1, 2
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios: el testimonio inglés y la verificación cruzada muestran alto acuerdo, sin observaciones pendientes. Por eso se mantiene una transliteración sobria de los nombres propios y una correspondencia directa de la estructura repetitiva del hebreo.'
  spanish_consistency_notes:
  - 'Se conserva la secuencia paralela del versículo: Babilonia / Cuth / Hamat, con el mismo verbo «hicieron» en cada cláusula.'
  - Se transliteran los nombres propios de las deidades sin añadir explicaciones dentro del texto principal.
  - Se usa «los hombres de» para reflejar la forma masculina plural del hebreo, en concordancia con el audit trail inglés.
  - «Hamat» se prefiere como forma española más natural que «Hamath», sin alterar la identificación del topónimo.
