  - marker: b
    text: The Greek expression behind 'when sinners attacked' is difficult. The verb may carry a different nuance such as 'came upon' or another hostile action; the translation reflects the probable sense in this lament context.
    reason: alternative_reading
  - marker: c
    text: Or 'in my being afflicted'.
    reason: previous_rendering
