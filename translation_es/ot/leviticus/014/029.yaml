translation:
  language: es
  text: Y el resto del aceite que está en la palma del sacerdote lo pondrá sobre la cabeza del que está siendo purificado[a], para hacer expiación por él delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y lo que queda del aceite que está en la palma del sacerdote»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתָר
  english_pob_choice: And the rest
  chosen_spanish: Y el resto
  alternatives_spanish:
  - Y lo que queda
  - Y el remanente
  lexicon: HALOT
  rationale: El participio con valor sustantivo expresa lo que queda; «el resto» es natural en español y conserva la idea de porción sobrante sin añadir interpretación.
- source_word: מִן הַשֶּׁמֶן
  english_pob_choice: of the oil
  chosen_spanish: del aceite
  alternatives_spanish:
  - del aceite restante
  - del aceite que queda
  lexicon: HALOT
  rationale: El partitivo se expresa de forma fluida con «del aceite». El contexto ya aclara que se trata de la porción sobrante.
- source_word: אֲשֶׁר עַל כַּף הַכֹּהֵן
  english_pob_choice: that is in the priest’s palm
  chosen_spanish: que está en la palma del sacerdote
  alternatives_spanish:
  - que está sobre la palma del sacerdote
  - que está en la mano del sacerdote
  lexicon: HALOT
  rationale: כַּף designa la palma o hueco de la mano. Aunque עַל es literalmente «sobre», en español «en la palma» comunica mejor la imagen concreta de aceite retenido en la mano sin perder el referente físico.
- source_word: יִתֵּן
  english_pob_choice: he shall put
  chosen_spanish: lo pondrá
  alternatives_spanish:
  - lo dará
  - lo colocará
  lexicon: HALOT
  rationale: נתן es amplio; en este rito, «poner» describe de manera natural la acción de aplicar el aceite sobre la cabeza.
- source_word: עַל רֹאשׁ
  english_pob_choice: on the head of
  chosen_spanish: sobre la cabeza de
  alternatives_spanish:
  - encima de la cabeza de
  - en la cabeza de
  lexicon: HALOT
  rationale: 'La preposición עַל se conserva como relación locativa: «sobre la cabeza de» mantiene el gesto ritual sin sobrecalcar.'
- source_word: הַמִּטַּהֵר
  english_pob_choice: the one being cleansed
  chosen_spanish: del que está siendo limpiado
  alternatives_spanish:
  - del que está siendo purificado
  - del limpiado
  lexicon: HALOT
  rationale: El hitpael participial subraya el proceso en curso. «Está siendo limpiado» preserva el valor progresivo y evita volverlo meramente descriptivo.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para hacer propiciación
  - para expiar
  lexicon: HALOT
  rationale: כפר es un término cultual clave. «Hacer expiación» mantiene la carga sacrificial y la tensión teológica sin reemplazarla por una explicación más amplia.
- source_word: עָלָיו
  english_pob_choice: for him
  chosen_spanish: por él
  alternatives_spanish:
  - en favor de él
  - por su causa
  lexicon: HALOT
  rationale: Con כפר, el complemento marca la persona en cuyo favor se realiza el rito. «Por él» es breve y idiomático en español, y conserva el sentido relacional de la acción ritual.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para יהוה como «Yahvé». «Delante de» reproduce adecuadamente el marco cultual de presencia ante Dios.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Tetragrama de manera directa. Conforme al criterio del proyecto, se translitera como «Yahvé» en el texto principal, en vez de ocultarlo con una sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Término sacrificial כפר
  english_pob_reading: to make atonement
  chosen_spanish_reading: hacer expiación
  alternative_spanish_readings:
  - hacer propiciación
  - expiar
  rationale: El contexto es ritual y sacrificial. «Hacer expiación» conserva el peso cultual y permite que la frase siga siendo auditable frente al hebreo, sin desdibujar la función del acto.
  doctrine_reference: Uso cultual de כפר en Levítico
- issue: Participio reflexivo הַמִּטַּהֵר
  english_pob_reading: the one being cleansed
  chosen_spanish_reading: el que está siendo limpiado
  alternative_spanish_readings:
  - el que está siendo purificado
  - el purificado
  rationale: El proceso de purificación está en curso; por eso se evita una forma estática. «Limpiado» sigue el campo semántico de la purificación ritual y mantiene la secuencia ceremonial.
  doctrine_reference: Rito de purificación en Levítico 14
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés y se mantuvo su decisión central: la porción restante del aceite, la colocación sobre la cabeza del participante del rito, el objetivo expiatorio y la presencia del nombre divino. La principal diferencia es que el texto español adopta el estándar del proyecto «Yahvé» para יְהוָה, en lugar de seguir la forma inglesa «Yahweh» o una sustitución como «SEÑOR».'
  spanish_consistency_notes:
  - Se mantuvo «aceite» para שֶׁמֶן, sin introducir «ungüento» porque el contexto ritual habla de aceite literal.
  - «Palma» conserva כַּף con mayor precisión que «mano»; la nota ofrece la variante más literal.
  - Se prefirió «expiación» a «propiciación» para respetar el uso cultual tradicional del término en Levítico y evitar una explicación doctrinal no exigida por el verso.
  - «Delante de Yahvé» mantiene el valor de presencia cultual de לִפְנֵי sin expandirlo innecesariamente.
