translation:
  language: es
  text: Jeremías el décimo[a], Macbanai el undécimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «once». En este contexto de lista funciona como «el undécimo».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yirmeyahu
  lexicon: nombre propio
  rationale: Se trata de un nombre personal; en español bíblico común y publicable, la forma establecida y más inteligible es «Jeremías». La alternativa transliterada conserva más cercanía fonética al hebreo, pero resulta menos natural para lectores en español.
- source_word: הָעֲשִׂירִי
  english_pob_choice: the tenth
  chosen_spanish: el décimo
  alternatives_spanish:
  - el décimo
  lexicon: HALOT
  rationale: El hebreo presenta un ordinal con artículo, en aposición dentro de una lista de nombres. En español, «el décimo» reproduce con naturalidad ese valor ordinal y la estructura de lista.
- source_word: מַכְבַּנַּי
  english_pob_choice: Machbannai
  chosen_spanish: Macbanai
  alternatives_spanish:
  - Makbannai
  lexicon: nombre propio
  rationale: Nombre propio transliterado. «Macbanai» mantiene una forma legible en español y refleja la base consonántica con una adaptación ortográfica mínima. «Makbannai» es una transliteración más cercana, pero menos fluida en español.
- source_word: עַשְׁתֵּי עָשָׂר
  english_pob_choice: the eleventh
  chosen_spanish: el undécimo
  alternatives_spanish:
  - once
  lexicon: HALOT
  rationale: La expresión hebrea literal significa «once», pero en este contexto de nómina funciona como ordinal paralelo al miembro anterior. Por eso se vierte como «el undécimo», preservando la estructura de clasificación del texto.
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene sin cambios la solución óptima: nombres propios transliterados y numerales ordinales en una lista. La versión española sigue esa misma lógica, adaptando la ortografía al uso bíblico hispano sin introducir reinterpretaciones.'
  spanish_consistency_notes:
  - Se usa puntuación española estándar y coma para separar los elementos de la lista.
  - Se conserva la distinción entre nombre propio y ordinal, sin añadir artículos o glosas ajenas al valor del hebreo.
  - La nota al pie explica la tensión entre el cardinal literal del hebreo y el ordinal exigido por el contexto de enumeración.
