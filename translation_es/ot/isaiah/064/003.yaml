review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia hebrea y la decisión inglesa de mantener los plurales en «no han oído, ni han escuchado» y el singular colectivo «ningún ojo ha visto». También preserva la lectura teológica principal: la unicidad de Dios unida a su obrar a favor del que lo espera. Sin embargo, «fuera de ti» después de «ha visto a un Dios» suena menos natural en español bíblico que «aparte de ti», y «espera en él» introduce un matiz de confianza que va más allá de לִמְחַכֵּה לוֹ, que más directamente significa «espera por él / lo espera».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero dos giros necesitan ajuste menor: «a un Dios fuera de ti» suena algo forzado, y «espera en él» no es la forma más natural ni la más ceñida aquí. «A un Dios aparte de ti» y «para el que lo espera» mejoran la naturalidad y la precisión sin perder la estructura compacta.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto: אֱלֹהִים se vierte como «Dios». No aparece Yahvé en este versículo. La decisión de mantener «Dios» con mayúscula en la cláusula comparativa es defendible dentro de la racionalidad documentada. El ajuste propuesto no afecta la alineación glosarial principal.'
  issues:
  - severity: medium
    issue: «fuera de ti» en «ningún ojo ha visto a un Dios fuera de ti»
    rationale: Aunque comunica exclusividad, en esta sintaxis española suena menos idiomático y algo espacial. «Aparte de ti» refleja mejor זוּלָתְךָ en un registro bíblico-natural.
  - severity: medium
    issue: «espera en él» para לִמְחַכֵּה לוֹ
    rationale: El hebreo expresa esperar a/por él, no explícitamente confiar en él. «Lo espera» conserva mejor el complemento pronominal y evita añadir un matiz teológico no exigido por la fuente.
  - severity: low
    issue: Nota al pie con «ningún dios» en minúscula
    rationale: La alternativa inglesa permite «any god except you»; en español la minúscula en la alternativa es posible por tratarse de deidad en sentido común, pero conviene mantener coherencia con el texto principal y con la lectura adoptada. No es un error grave.
  revised_spanish_text: Desde la antigüedad no han oído, ni han escuchado; ningún ojo ha visto a un Dios aparte de ti[a], que actúa para el que lo espera.
