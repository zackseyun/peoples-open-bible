  rationale: Se ajusta la frase final para un español más natural y jurídico-cultual, preservando el valor de ל como referencia al sacerdote en cuestión. Se mantiene «purificación» como término principal por su registro cultual, con nota alternativa «limpieza ritual» para reflejar la opción léxica documentada sin introducir un sentido moral o espiritual.
