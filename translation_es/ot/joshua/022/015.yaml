translation:
  language: es
  text: Y llegaron a los hijos de Rubén[a], y a los hijos de Gad, y a la media tribu de Manasés, en la tierra de Galaad, y hablaron con ellos, diciendo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la tierra de Galaad». La preposición hebrea puede leerse con matiz direccional, pero aquí probablemente funciona para ubicar el lugar donde llegaron a las tribus del oriente.
    reason: lexical_alternative
  - marker: b
    text: O «hablaron a ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - fueron
  lexicon: HALOT
  rationale: En este contexto narrativo, «llegaron» comunica el movimiento con naturalidad en español y mantiene la simple acción de arribar sin añadir destino explícito más allá de lo que permite el hebreo.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: La fórmula tribal hebrea בְּנֵי se refleja bien con «hijos de» en español bíblico y conserva el valor genealógico y corporativo del hebreo.
- source_word: חֲצִי שֵׁבֶט
  english_pob_choice: half-tribe
  chosen_spanish: media tribu
  alternatives_spanish:
  - medio tribu
  - la mitad de la tribu
  lexicon: HALOT
  rationale: «Media tribu» es la forma más natural y reconocible en español para esta designación tribal fija, manteniendo la equivalencia formal sin sonar forzado.
- source_word: אֶל אֶרֶץ הַגִּלְעָד
  english_pob_choice: in the land of Gilead
  chosen_spanish: en la tierra de Galaad
  alternatives_spanish:
  - a la tierra de Galaad
  - hacia la tierra de Galaad
  lexicon: HALOT
  rationale: Aunque אֶל suele ser «a/hacia», el audit trail inglés entiende aquí una función locativa. En español, «en la tierra de Galaad» expresa mejor ese valor de ubicación/encuentro sin repetir una dirección innecesaria.
- source_word: וַיְדַבְּרוּ אִתָּם
  english_pob_choice: they spoke with them
  chosen_spanish: hablaron con ellos
  alternatives_spanish:
  - les hablaron
  - hablaron a ellos
  lexicon: HALOT
  rationale: «Hablaron con ellos» preserva la idea relacional de דּבר con אִתָּם que el inglés POB captó con «spoke with», evitando reducirlo a un mero discurso unilateral.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: «Diciendo» reproduce la fórmula introductoria de discurso directo y mantiene el enlace narrativo hacia la cita siguiente.
translation_notes:
  revision_awareness: La versión inglesa POB vigente lee באופן locativo «in the land of Gilead» y «spoke with them», sin cambios de revisión aplicados. La propuesta española sigue ese mismo análisis auditado y no introduce variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se prefirió «hijos de» y «media tribu» por ser fórmulas tribales establecidas y coherentes con el registro bíblico en español.
  - La puntuación conserva la cadena narrativa con coma antes de «diciendo» para reflejar la función del infinitivo hebreo.
