translation:
  text: |-
    And it was revealed to me, brothers[a], while I was asleep, by a very handsome young man who said to me: “The old woman[c], from whom you received the little book—who do you suppose she is?” I said, “The Sibyl[b].” “You are mistaken,” he says; “she is not.” “Then who is she?” I say. “The Church,” he says. I said to him, “Why then an old woman?” “Because,” he says, “she was created first of all; for this reason she is old, and for her sake the world was set in order[d][g].”
    
    2. Afterward I saw a vision in my house. The old woman came and asked me whether I had already given the book to the elders[j]. I denied having given it. “You have done well,” she says; “for I have words to add. When, therefore, I complete all the words, through you they will be made known to all the elect.
    
    3. “So you will write two little booklets, and you will send one to Clement[h] and one to Grapte[i]. Then Clement will send it to the cities outside[e], for this has been entrusted to him; but Grapte will admonish the widows and the orphans. But you will read it aloud[f] in this city together with the elders[j] who preside over the church.”
