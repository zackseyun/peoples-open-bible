review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene el orden de los miembros, ''rey'' para מֶלֶךְ, ''indisciplinado'' para פָּרוּעַ, ''arruinará'' para יַשְׁחִית, y ''gobernantes'' para שָׂרֶיהָ. El único problema relevante es la redacción del segundo miembro: ''es habitada por la prudencia'' suena demasiado literal y algo torpe en español; el sentido causal/instrumental de בְּשֶׂכֶל se expresa mejor con ''gracias a'' o ''por medio de''. Además, la nota al pie dice ''más literalmente'' pero repite prácticamente la misma frase del texto.'
  spanish_quality_summary: 'El español es claro en general, pero ''una ciudad es habitada por la prudencia de sus gobernantes'' resulta poco idiomático y puede sugerir que la prudencia actúa casi como agente personal. Conviene suavizarlo a una formulación natural y digna: ''una ciudad está habitada gracias a la prudencia de sus gobernantes''. La nota también debe corregirse para que aporte una alternativa real y útil.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Rey', 'ciudad', 'prudencia' y 'gobernantes' son compatibles con las decisiones documentadas. La revisión propuesta conserva el valor de נוֹשֶׁבֶת ('está habitada') y de בְּשֶׂכֶל como medio/causa prudencial.
  issues:
  - severity: medium
    issue: Redacción poco natural en 'es habitada por la prudencia'
    rationale: Aunque formalmente cercana al hebreo, en español suena forzada y menos legible. El sentido del original se preserva mejor con una construcción causal/instrumental más idiomática.
  - severity: low
    issue: La nota al pie no ofrece una alternativa distinta del texto principal
    rationale: Dice 'más literalmente' pero repite esencialmente 'por la prudencia de sus gobernantes', de modo que no añade valor interpretativo ni lexical real.
  - severity: low
    issue: Uso de 'es habitada' en vez de 'está habitada'
    rationale: Ambas son comprensibles, pero 'está habitada' suena más natural para un estado resultante o condición de la ciudad en español contemporáneo.
  revised_spanish_text: Un rey indisciplinado arruinará una ciudad, pero una ciudad está habitada gracias a la prudencia de sus gobernantes[a].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «una ciudad está habitada por la prudencia de sus gobernantes». El paralelo griego expresa la idea como que los habitantes de la ciudad reflejan a su líder.
    reason: lexical_alternative
  revision_rationale: Se mantiene fielmente el contenido del hebreo y la lógica del inglés auditado, pero se ajusta el segundo miembro a un español más natural. 'Está habitada gracias a' comunica mejor la fuerza de נוֹשֶׁבֶת בְּשֶׂכֶל en registro bíblico claro. La nota se reescribe para ofrecer una alternativa verdaderamente más literal y conservar la observación sobre el paralelo griego.
