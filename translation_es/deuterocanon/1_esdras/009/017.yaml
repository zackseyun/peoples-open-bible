translation:
  language: es
  text: Y el asunto respecto de los hombres que habían tomado mujeres extranjeras quedó concluido para el día de luna nueva del primer mes[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego aquí es difícil: el participio puede leerse más literalmente como «los hombres que habían sido reunidos». El paralelo hebreo apoya el sentido contextual «los hombres que habían tomado mujeres extranjeras», que se sigue en el texto principal.'
    reason: alternative_reading
  - marker: b
    text: «Día de luna nueva del primer mes» se refiere al primer día del primer mes del calendario lunar.
    reason: cultural_note
lexical_decisions:
- source_word: ἦχθη ἐπὶ πέρας
  english_pob_choice: was brought to an end
  chosen_spanish: fue llevado a su fin
  alternatives_spanish:
  - fue completado
  - llegó a su fin
  - fue concluido
  lexicon: LSJ
  rationale: La construcción pasiva expresa que el proceso quedó terminado. «Fue llevado a su fin» conserva el matiz pasivo y la idea de culminación sin sonar rígido en español.
- source_word: τὰ κατὰ τοὺς ἄνδρας
  english_pob_choice: the matter concerning the men
  chosen_spanish: el asunto respecto de los hombres
  alternatives_spanish:
  - el caso concerniente a los hombres
  - lo relativo a los hombres
  - los asuntos de los hombres
  lexicon: LSJ
  rationale: El neutro plural con κατά funciona idiomáticamente como «lo relativo a». En español, «el asunto respecto de» transmite con naturalidad el alcance de la fórmula sin alejarse del giro griego.
- source_word: τοὺς ἐπισυναχθέντας
  english_pob_choice: who had taken
  chosen_spanish: que habían tomado
  alternatives_spanish:
  - que habían sido reunidos
  - que se habían juntado
  - que habían sido congregados
  lexicon: LSJ
  rationale: 'Sigo la lectura contextual del paralelo hebreo/MT reflejada en el audit trail: el tema no es simplemente la reunión de los hombres, sino su unión con mujeres extranjeras. Por eso traduzco el sentido contextual «habían tomado» en vez de una calca de la forma participial griega.'
- source_word: γυναῖκας ἀλλογενεῖς
  english_pob_choice: foreign women
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - mujeres de otro pueblo
  - mujeres de otros pueblos
  - mujeres de linaje extranjero
  lexicon: LSJ
  rationale: ἀλλογενής indica pertenencia a otro pueblo o estirpe. «Extranjeras» es claro, natural y coherente con el paralelo hebreo נָשִׁים נָכְרִיּוֹת.
- source_word: ἕως τῆς νουμηνίας τοῦ πρώτου μηνός
  english_pob_choice: by the new moon of the first month
  chosen_spanish: para la luna nueva del primer mes
  alternatives_spanish:
  - hasta la luna nueva del primer mes
  - para el primer día del primer mes
  - hasta el primer día del primer mes
  lexicon: LSJ
  rationale: νουμηνία es «luna nueva», es decir, el primer día del mes en el calendario lunar. Dado el sentido de término/plazo, «para» expresa adecuadamente el límite temporal en español.
translation_notes:
  revision_awareness: 'Se siguió la línea auditada del POB en inglés: mantener la equivalencia óptima, conservar el matiz pasivo de ἦχθη ἐπὶ πέρας, y resolver la tensión textual entre el griego transmitido y el paralelo hebreo/MT con una nota explicativa.'
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según las normas generales del proyecto, pero este versículo no contiene esos términos.
  - Se prefiere «mujeres extranjeras» por coherencia con el paralelo hebreo y con el audit trail en inglés.
  - «Luna nueva» mantiene el referente calendárico antiguo sin modernizarlo a una fecha solar.
