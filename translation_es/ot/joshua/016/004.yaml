translation:
  language: es
  text: Y los hijos de José, Manasés y Efraín, recibieron su herencia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּנְחֲלוּ
  english_pob_choice: received their inheritance
  chosen_spanish: recibieron su herencia
  alternatives_spanish:
  - heredaron
  - tomaron posesión de su herencia
  lexicon: HALOT
  rationale: El verbo נחל en este contexto de reparto territorial expresa entrar en posesión de una herencia asignada. «Recibieron su herencia» conserva la idea de adjudicación y suena natural en español bíblico actual. «Heredaron» es posible, pero puede sonar más abstracto; «tomaron posesión» añade un matiz más activo que el hebreo aquí no exige.
- source_word: בְנֵי יוֹסֵף
  english_pob_choice: the sons of Joseph
  chosen_spanish: los hijos de José
  alternatives_spanish:
  - los descendientes de José
  - los hijos de José
  lexicon: HALOT
  rationale: בְנֵי se traduce de forma directa como «hijos de», y en contexto tribal designa a los descendientes de José. «Los hijos de José» preserva el giro genealógico sin forzar una paráfrasis interpretativa. «Descendientes» explica el sentido, pero pierde la forma del hebreo.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasé
  lexicon: convención onomástica bíblica
  rationale: Se usa la forma española tradicional y ampliamente reconocible del nombre propio. Mantiene continuidad con el uso bíblico en español y respeta la transliteración usual del nombre hebreo.
- source_word: וְאֶפְרָיִם
  english_pob_choice: and Ephraim
  chosen_spanish: y Efraín
  alternatives_spanish:
  - y Ephraim
  lexicon: convención onomástica bíblica
  rationale: «Efraín» es la forma establecida en español bíblico. El valor conjuntivo de ו se refleja con «y», sin sobreinterpretar la relación entre los dos nombres más allá de la enumeración.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «So» por «And» para reflejar más directamente la conjunción hebrea ו y mantener un registro narrativo formal. El español sigue esa decisión con «Y», sin añadir inferencia temporal o causal.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y formal, apto para lectura eclesial.
  - Se prefirió la equivalencia léxica directa cuando el español lo permite, evitando ampliar el sentido del reparto territorial.
  - 'Los nombres propios se normalizaron según las formas bíblicas estándar en español: José, Manasés y Efraín.'
