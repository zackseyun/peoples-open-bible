review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: encabezado atributivo «De David», seguida de dos prohibiciones paralelas. «No te inquietes por causa de los malhechores» representa adecuadamente אַל־תִּתְחַר בַּמְּרֵעִים, y «no envidies a los que hacen el mal» comunica bien אַל־תְּקַנֵּא בְּעֹשֵׂי עַוְלָה. Sin embargo, la nota [a] necesita corrección lingüística y una mejor formulación del matiz léxico del verbo hebreo.'
  spanish_quality_summary: 'El español principal es claro, natural y de registro digno. La puntuación con punto tras «De David[a]» coincide con la línea inglesa auditada. La única deficiencia relevante está en la redacción de la nota [a]: «verse vexado» no es español natural ni ortográficamente correcto en este registro; conviene reemplazarlo por una formulación idiomática como «sentirse interiormente perturbado» o «verse perturbado».'
  glossary_alignment: No hay términos del glosario mayor en conflicto. «De David» es adecuado para לְדָוִד. «Malhechores» y «los que hacen el mal» son compatibles con la evidencia y con las alternativas documentadas. No se observan problemas con Yahvé/Mesías/Espíritu u otros defaults del proyecto en este versículo.
  issues:
  - severity: medium
    issue: 'La nota al pie [a] contiene una formulación no natural: «verse vexado interiormente».'
    rationale: «Vexado» es un cultismo poco natural aquí y además en español estándar actual sería más idiomático «perturbado», «afligido» o «agitado». Las notas deben ser claras y eclesialmente legibles.
  - severity: low
    issue: La nota [a] puede expresar mejor el valor semántico de תחר sin sonar calca del inglés.
    rationale: El hebreo apunta a calentarse, agitarse o irritarse interiormente. Una redacción más fluida en español mejora la utilidad de la nota sin cambiar su contenido.
  revised_spanish_text: De David[a]. No te inquietes por causa de los malhechores[b]; no envidies a los que hacen el mal.
  revised_footnotes:
  - marker: a
    text: 'O: «No te inquietes por causa de los malhechores». El verbo hebreo puede significar calentarse, agitarse o sentirse interiormente perturbado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que hacen injusticia» / «obradores de injusticia».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y bien alineado con la auditoría inglesa y el hebreo. Solo se corrige la nota [a] para eliminar una expresión poco idiomática («verse vexado interiormente») y reemplazarla por un español claro y natural que preserve el mismo matiz léxico.
