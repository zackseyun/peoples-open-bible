translation:
  language: es
  text: y los dos riñones, y la grasa que está sobre ellos, la cual está sobre los lomos, y el apéndice sobre el hígado[a], la quitará junto con los riñones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lóbulo sobre el hígado»; el término hebreo para esta parte anatómica es técnico y su referente preciso es debatido.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי הַכְּלָיֹת
  english_pob_choice: the two kidneys
  chosen_spanish: los dos riñones
  alternatives_spanish:
  - los dos reins
  lexicon: HALOT
  rationale: כְּלָיֹת designa aquí los riñones en anatomía sacrificial. «Riñones» es el equivalente moderno claro en español; «reins» sería arcaizante y menos transparente.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - el sebo
  - la gordura
  lexicon: HALOT
  rationale: En este contexto cultual, חֵלֶב alude a la porción grasa apartada para la ofrenda. «Grasa» comunica bien el sentido en español actual; «sebo» sería más estrecho y menos natural.
- source_word: אֲשֶׁר עֲלֵיהֶן
  english_pob_choice: that is on them
  chosen_spanish: que está sobre ellos
  alternatives_spanish:
  - que cubre a ellos
  - que está encima de ellos
  lexicon: HALOT
  rationale: 'La relación básica es espacial: la grasa está sobre los riñones. «Que está sobre ellos» conserva la literalidad sin añadir interpretación.'
- source_word: הַכְּסָלִים
  english_pob_choice: the loins
  chosen_spanish: los lomos
  alternatives_spanish:
  - los flancos
  - las caderas
  lexicon: HALOT
  rationale: כְּסָלִים puede referirse a la región de los lomos/flancos cerca de los riñones. «Lomos» mantiene un registro bíblico y anatómico natural en español, sin perder el campo semántico.
- source_word: הַיֹּתֶרֶת
  english_pob_choice: the appendage
  chosen_spanish: el apéndice
  alternatives_spanish:
  - el lóbulo
  - el lóbulo largo
  lexicon: HALOT
  rationale: יוֹתֶרֶת es un término anatómico técnico y su identificación exacta es debatida. «Apéndice» evita fijar una precisión que el hebreo no resuelve de manera indiscutible, y preserva la nota de término técnico.
- source_word: עַל הַכָּבֵד
  english_pob_choice: on the liver
  chosen_spanish: sobre el hígado
  alternatives_spanish:
  - encima del hígado
  - adherido al hígado
  lexicon: HALOT
  rationale: עַל se rinde de forma directa como «sobre». «Hígado» es el equivalente natural de כָּבֵד en este contexto anatómico.
- source_word: עַל הַכְּלָיֹת
  english_pob_choice: with the kidneys
  chosen_spanish: junto con los riñones
  alternatives_spanish:
  - con los riñones
  - al lado de los riñones
  lexicon: HALOT
  rationale: La frase final expresa que el apéndice se retira juntamente con los riñones. «Junto con» refleja mejor la relación procedimental que un mero valor espacial.
- source_word: יְסִירֶנָּה
  english_pob_choice: he shall remove
  chosen_spanish: quitará
  alternatives_spanish:
  - removerá
  - la apartará
  lexicon: HALOT
  rationale: El verbo en contexto legal-sacrificial describe la acción ritual de retirar estas partes. «Quitar» es natural en español y conserva la instrucción concreta sin sobrecargarla.
theological_decisions:
- issue: La función sacrificial de las partes grasas y anatómicas
  english_pob_reading: the fat ... the appendage ... he shall remove with the kidneys
  chosen_spanish_reading: la grasa ... el apéndice ... quitará junto con los riñones
  alternative_spanish_readings:
  - el sebo ... el lóbulo ... removerá con los riñones
  - la grasa ... la porción ... apartará con los riñones
  rationale: 'No se suaviza el carácter técnico del precepto: la lista anatómica y la acción de retirar esas partes se mantiene explícita. Se conserva la tensión terminológica de יוֹתֶרֶת como término técnico sin imponer una identificación doctrinal o anatómica más precisa que la evidencia permite.'
  doctrine_reference: Levítico 3:4; 3:10; 3:15; 4:9
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, especialmente la cohesión de la cláusula final («which he shall remove with the kidneys»), reflejándola en español como «el cual quitará junto con los riñones». Se evitó una traducción que separara innecesariamente la acción del verbo respecto de la lista anatómica.
  spanish_consistency_notes:
  - Se mantuvo «riñones» para כְּלָיֹת conforme a la decisión léxica documentada del POB en inglés.
  - Se prefirió «grasa» como equivalente más natural de חֵלֶב en español, sin introducir una terminología cultual distinta.
  - «Apéndice» se usó de manera provisional y con nota, para preservar la incertidumbre lexical del hebreo técnico.
  - La puntuación conserva el encadenamiento serial del hebreo mediante comas y una cláusula final relativa clara.
