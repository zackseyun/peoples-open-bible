  text: בִּ֭/דְבָרִים לֹא יִוָּ֣סֶר עָ֑בֶד כִּֽי יָ֝בִ֗ין וְ/אֵ֣ין מַעֲנֶֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/029/019.yaml
  text: A slave is not corrected by words alone[a], for though he understands[b], there is no response.
  footnotes:
  - marker: a
    text: Or, 'A servant is not corrected by words alone.' The Hebrew עָבֶד can denote either a servant or a slave depending on context; here 'slave' is used to preserve the bonded status implied by the term.
    reason: lexical_alternative
  - marker: b
    text: Or, 'for he understands, but does not answer.' The final clause may refer either to lack of verbal reply or to lack of responsive action.
    reason: lexical_alternative
