translation:
  language: es
  text: Estos veinte años he estado contigo; tus ovejas y tus cabras no han perdido sus crías[a], y no he comido los carneros de tu rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no han abortado». El verbo hebreo puede denotar quedar privado de descendencia; en este contexto pastoril se refiere al aborto o a la pérdida de crías.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה עֶשְׂרִים שָׁנָה
  english_pob_choice: These twenty years
  chosen_spanish: Estos veinte años
  alternatives_spanish:
  - Estos veinte años
  - Por veinte años
  - Durante estos veinte años
  lexicon: HALOT
  rationale: El hebreo usa un demostrativo temporal que, en español, se expresa de forma natural con «Estos veinte años», conservando el énfasis retrospectivo sin perder fluidez.
- source_word: אָנֹכִי עִמָּךְ
  english_pob_choice: I have been with you
  chosen_spanish: he estado contigo
  alternatives_spanish:
  - estoy contigo
  - estuve contigo
  lexicon: HALOT
  rationale: El hebreo omite verbo explícito de estancia, pero el sentido retrospectivo del periodo completo pide un perfecto en español. «He estado contigo» refleja la duración hasta el presente del habla.
- source_word: רְחֵלֶיךָ
  english_pob_choice: your ewes
  chosen_spanish: tus ovejas
  alternatives_spanish:
  - tus ovejas hembras
  - tus borregas
  lexicon: HALOT
  rationale: Rְחֵלִים/רְחֵלֹת son ovejas hembras, pero «ovejas» es el equivalente español más natural y suficientemente preciso en este contexto pastoral; «ovejas hembras» suena redundante.
- source_word: וְעִזֶּיךָ
  english_pob_choice: your female goats
  chosen_spanish: tus cabras
  alternatives_spanish:
  - tus cabras hembras
  - tus chivas
  lexicon: HALOT
  rationale: El hebreo especifica hembras, pero en español «cabras» comunica con claridad el referente animal sin sobrecargar la frase. Se mantiene el paralelismo con «ovejas».
- source_word: לֹא שִׁכֵּלוּ
  english_pob_choice: have not miscarried
  chosen_spanish: no han abortado
  alternatives_spanish:
  - no han perdido sus crías
  - no han sufrido pérdida de crías
  lexicon: HALOT
  rationale: En contexto ganadero, el verbo puede significar perder las crías o abortar. «No han abortado» reproduce la fuerza lexical del hebreo y la lectura pastoral documentada por la POB inglesa.
- source_word: וְאֵילֵי צֹאנְךָ
  english_pob_choice: the rams of your flock
  chosen_spanish: los carneros de tu rebaño
  alternatives_spanish:
  - los machos de tu rebaño
  - los carneros de tu ganado
  lexicon: HALOT
  rationale: אֵילִים son carneros, es decir, machos de oveja. «Carneros de tu rebaño» conserva la especificidad animal y el vínculo posesivo del hebreo.
- source_word: לֹא אָכָלְתִּי
  english_pob_choice: I have not eaten
  chosen_spanish: no he comido
  alternatives_spanish:
  - no comí
  - no he ingerido
  lexicon: HALOT
  rationale: El perfecto español encaja con la defensa retrospectiva de Jacob y armoniza con «he estado contigo», manteniendo el alcance acumulativo de todo el periodo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide en sustancia con la revisión inglesa indicada como estable; se conserva la tensión lexical de שִׁכֵּלוּ mediante una nota alternativa, sin suavizarla hacia una formulación más general.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo lo exige explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - «Carneros» conserva la concreción zoológica de אֵילֵי frente a un genérico como «machos».
