base_translation:
  language: en
  yaml_path: translation/ot/psalms/106/018.yaml
  text: And fire burned among their company[c][b][a]; a flame consumed the wicked.
  footnotes:
  - marker: a
    text: Or 'blazed up' for 'burned'; the Hebrew verb can emphasize the kindling or outbreak of fire.
    reason: lexical_alternative
  - marker: b
    text: Or 'in their company'; 'assembly' renders a Hebrew term for the gathered community.
    reason: lexical_alternative
  - marker: c
    text: Or 'burned up the wicked'; the verb conveys intense, destructive burning.
    reason: lexical_alternative
