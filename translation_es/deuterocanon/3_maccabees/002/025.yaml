translation:
  language: es
  text: Pero, después de haber sido llevado a Egipto[a], y aumentando su maldad por medio de los compañeros de bebida[b] y asociados previamente mencionados, apartados de toda justicia[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «transportado a Egipto». El participio griego enfatiza el traslado allí, no el medio específico.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «compañeros de bebida»; la expresión sugiere asociados de banquete corrompidos, no amigos neutrales.
    reason: cultural_note
  - marker: c
    text: O «alejados de todo lo recto».
    reason: lexical_alternative
lexical_decisions:
- source_word: Διακομισθεὶς
  english_pob_choice: after he had been conveyed
  chosen_spanish: después de haber sido llevado
  alternatives_spanish:
  - después de haber sido transportado
  - después de haber sido conducido
  lexicon: LSJ
  rationale: El participio aoristo pasivo señala traslado de un lugar a otro sin precisar el modo. «Llevado» conserva la pasividad y la transferencia sin añadir matices excesivos en español.
- source_word: ἐπαύξων
  english_pob_choice: was increasing
  chosen_spanish: iba aumentando
  alternatives_spanish:
  - estaba aumentando
  - seguía aumentando
  lexicon: LSJ
  rationale: El participio presente expresa acción en curso. «Iba aumentando» comunica progresión continua con buen ritmo narrativo en español.
- source_word: κακίας
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - maldad moral
  - maldad/iniquidad
  lexicon: LSJ
  rationale: En este contexto moral de corrupción cortesana, «maldad» refleja el sentido amplio de κακία sin volverlo demasiado abstracto ni jurídico.
- source_word: προαποδεδειγμένων
  english_pob_choice: previously mentioned
  chosen_spanish: que habían sido apartados
  alternatives_spanish:
  - previamente mencionados
  - ya señalados
  lexicon: LSJ
  rationale: El inglés POB tomó el participio como referencia retrospectiva a personas ya introducidas en el relato. En español, la función sintáctica recae sobre el grupo humano descrito; por eso la referencia retrospectiva se integra en la construcción relativa del verso.
- source_word: συνποτῶν
  english_pob_choice: drinking companions
  chosen_spanish: compañeros de bebida
  alternatives_spanish:
  - compañeros de banquete
  - contertulios de bebida
  lexicon: LSJ
  rationale: La imagen literal de «los que beben juntos» conviene conservarla. «Compañeros de bebida» mantiene el matiz social y moral negativo que el contexto sugiere.
- source_word: ἑταίρων
  english_pob_choice: associates
  chosen_spanish: asociados
  alternatives_spanish:
  - compañeros
  - amigos
  lexicon: LSJ
  rationale: «Asociados» evita una lectura afectiva de amistad y encaja con el ambiente de corte y camarilla que sugiere el texto.
- source_word: τοῦ παντὸς δικαίου κεχωρισμένων
  english_pob_choice: who had been estranged from all justice
  chosen_spanish: apartados de toda justicia
  alternatives_spanish:
  - alejados de toda justicia
  - separados de todo lo justo
  lexicon: LSJ
  rationale: El perfecto pasivo expresa un estado resultante. «Apartados de toda justicia» conserva la separación moral establecida por el griego y su fuerza totalizante.
theological_decisions:
- issue: Valor moral de δικαιοσύνη/δίκαιον en una frase de corrupción
  english_pob_reading: separated from all that is right / estranged from all justice
  chosen_spanish_reading: apartados de toda justicia
  alternative_spanish_readings:
  - apartados de todo lo recto
  - separados de todo lo justo
  rationale: No se trata aquí de la doctrina paulina de δικαιοσύνη como justificación, sino de un estado moral de alejamiento total de lo recto. «Justicia» mantiene el alcance ético y relacional del texto.
  doctrine_reference: ética bíblica; justicia/rectitud en sentido moral general
translation_notes:
  revision_awareness: 'Se ha seguido de cerca la lectura y las notas del POB inglés: se conserva la pasividad de Διακομισθεὶς, el progresivo de ἐπαύξων y la idea de separación moral total de παντὸς δικαίου. No se detectaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este verso no contiene el tetragrámaton.
  - Se evita «Cristo» porque no aparece ningún título mesiánico en el pasaje.
  - La frase nominal final se traduce con vocabulario ético sobrio, sin introducir tecnicismos doctrinales ajenos al contexto.
  - El ritmo de la oración intenta conservar la estructura participial griega sin sonar forzado en español.
