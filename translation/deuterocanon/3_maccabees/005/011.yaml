theological_decisions:
- issue: Implicit reference to God in τοῦ χαριζομένου πᾶσιν
  chosen_reading: from the One who grants sleep to all
  alternative_readings:
  - by him who graciously gives to all
  rationale: The participle refers contextually to God as the giver of sleep. The translation makes the implied object explicit for intelligibility but avoids importing a fuller theological title not present in the text.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Force of ἀπʼ αἰῶνος
  chosen_reading: age-old
  alternative_readings:
  - from eternity
  - eternal
  rationale: To avoid overstating the phrase into a stronger doctrinal claim about eternity, the rendering preserves antiquity and enduring duration rather than metaphysical eternality.
  doctrine_reference: Translation philosophy §§1, 3
