translation:
  language: es
  text: La sabiduría clama en la calle[a]; en las plazas alza su voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más idiomáticamente: «La sabiduría llama en la calle; en las plazas alza su voz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכְמוֹת
  english_pob_choice: Wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabidurías
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural morfológico, el contexto la presenta como singular personificada mediante los verbos femeninos singulares. En español, 'la sabiduría' conserva esa personificación sin forzar un plural literal que oscurecería el sentido del pasaje.
- source_word: בַּח֣וּץ
  english_pob_choice: in the street
  chosen_spanish: en la calle
  alternatives_spanish:
  - afuera
  - en lo abierto
  - en la vía pública
  lexicon: HALOT
  rationale: El término señala el espacio público exterior, en contraste con el ámbito privado. 'En la calle' es la forma natural en español para ese espacio público y funciona bien en paralelo con 'en las plazas'.
- source_word: תָּרֹנָּה
  english_pob_choice: cries aloud
  chosen_spanish: clama
  alternatives_spanish:
  - grita
  - proclama en alta voz
  - canta
  lexicon: HALOT
  rationale: El verbo puede expresar un clamor o una voz resonante. 'Clama' comunica bien el llamado público y enfático, sin introducir un matiz meramente jubiloso que no es principal aquí.
- source_word: בָּרְחֹבוֹת
  english_pob_choice: in the squares
  chosen_spanish: en las plazas
  alternatives_spanish:
  - en los espacios abiertos
  - en las calles amplias
  - en las plazas públicas
  lexicon: HALOT
  rationale: La palabra denota lugares amplios y públicos dentro de la ciudad. 'Plazas' es idiomático en español y mantiene el paralelismo con el primer lugar público.
- source_word: תִּתֵּן קוֹלָהּ
  english_pob_choice: she raises her voice
  chosen_spanish: alza su voz
  alternatives_spanish:
  - levanta su voz
  - hace oír su voz
  - da su voz
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'da su voz', pero el propio audit trail inglés ya reconoció que la forma más natural es 'raises her voice'. 'Alza su voz' preserva la fuerza idiomática en español y mantiene la imagen de una proclamación audible y pública.
theological_decisions:
- issue: Personificación de la Sabiduría
  english_pob_reading: Retain Wisdom as a feminine singular personification without converting the line into a generic abstraction.
  chosen_spanish_reading: Mantener 'la sabiduría' como figura personificada femenina singular, no como un concepto impersonal.
  alternative_spanish_readings:
  - '''sabiduría'' sin artículo ni personificación marcada'
  - '''las sabidurías'' como plural literal'
  rationale: El hebreo usa verbos y sufijos femeninos singulares que presentan a la Sabiduría como personaje literario. El español debe conservar esa personificación porque forma parte de la retórica de Proverbios 1 y no exige resolverla hacia una abstracción neutra.
  doctrine_reference: Preservar la tensión literaria del texto; primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés que corrigió 'gives her voice' por la opción más natural 'raises her voice'. En español se reflejó esa decisión con 'alza su voz', manteniendo la personificación y el paralelismo de los dos lugares públicos.
  spanish_consistency_notes:
  - Se mantuvo un registro moderno y digno, evitando arcaísmos innecesarios.
  - '''Sabiduría'' se dejó en singular para conservar la personificación femenina singular del hebreo.'
  - '''Calle'' y ''plazas'' reflejan el contraste de espacio público sin sobrecargar el verso.'
  - La nota al pie conserva la alternativa idiomática más cercana al inglés auditado, pero el texto principal ya usa la forma más natural en español.
