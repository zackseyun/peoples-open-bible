translation:
  language: es
  text: Ustedes vieron que las brechas de la ciudad de David eran muchas, y reunieron las aguas del estanque[a] inferior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del depósito inferior». El término hebreo para «estanque» también puede denotar un reservorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּקִיעֵי
  english_pob_choice: breaches
  chosen_spanish: brechas
  alternatives_spanish:
  - aberturas
  - roturas
  - grietas
  lexicon: HALOT
  rationale: En el contexto urbano-defensivo de Jerusalén, el término apunta a aperturas o roturas en una muralla. «Brechas» conserva esa fuerza militar y es natural en español.
- source_word: עִיר דָּוִד
  english_pob_choice: the city of David
  chosen_spanish: la ciudad de David
  alternatives_spanish:
  - la ciudad de David
  lexicon: HALOT
  rationale: Es el equivalente directo y reconocido del sintagma en español, preservando la designación histórica sin añadir paráfrasis.
- source_word: רְאִיתֶם
  english_pob_choice: you saw
  chosen_spanish: vieron
  alternatives_spanish:
  - miraron
  - examinaron
  lexicon: HALOT
  rationale: El verbo básico es «ver». En este contexto de constatación de un estado defensivo, «vieron» comunica de forma directa lo observado.
- source_word: כִּי רָבּוּ
  english_pob_choice: that ... were many
  chosen_spanish: que ... eran muchas
  alternatives_spanish:
  - que ... se habían multiplicado
  - porque ... eran muchas
  lexicon: HALOT
  rationale: El hebreo introduce el contenido observado con כִּי y expresa abundancia con רָבּוּ. «Eran muchas» mantiene el sentido sin volverlo más interpretativo de lo necesario.
- source_word: וַתְּקַבְּצוּ
  english_pob_choice: you collected
  chosen_spanish: reunieron
  alternatives_spanish:
  - juntaron
  - recogieron
  lexicon: HALOT
  rationale: Con objeto de agua, קבץ puede expresarse de modo natural como «reunir» en español. Aquí mantiene la idea de concentrar o juntar el agua sin alejarse del verbo hebreo.
- source_word: מֵי הַבְּרֵכָה
  english_pob_choice: the waters of the pool
  chosen_spanish: las aguas de la alberca
  alternatives_spanish:
  - las aguas del estanque
  - el agua de la alberca
  - el agua del reservorio
  lexicon: HALOT
  rationale: Se conserva el plural constructo «las aguas» para reflejar מֵי. «Alberca» funciona bien para un depósito de agua en español general; «estanque» o «reservorio» son posibles, pero «alberca» resulta claro y sobrio.
- source_word: הַתַּחְתּוֹנָה
  english_pob_choice: the lower
  chosen_spanish: inferior
  alternatives_spanish:
  - más baja
  - de abajo
  lexicon: HALOT
  rationale: El adjetivo indica posición. «Inferior» mantiene precisión formal y encaja naturalmente con el sustantivo en español.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con el sentido del auditable inglés POB: observación de brechas numerosas y reunión de las aguas del depósito inferior. Se mantiene la alternativa lexical respecto a בְּרֵכָה mediante una nota, porque en español «alberca», «estanque» y «reservorio» pueden solaparse según el registro.'
  spanish_consistency_notes:
  - Se usó «vieron» para רְאִיתֶם por claridad y naturalidad, sin perder el matiz de observación.
  - Se preservó el plural «las aguas» para reflejar el constructo hebreo מֵי.
  - «Alberca inferior» es una opción más idiomática en español neutro que «pozo/piscina» y mantiene la ambigüedad útil del término hebreo בְּרֵכָה.
