translation:
  language: es
  text: Su ofrenda de grano será de dos décimas de efa de flor de harina mezclada con aceite, una ofrenda de alimento[a] a Yahvé, de aroma agradable; y su libación será vino, la cuarta parte de un hin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda por fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִנְחָתוֹ
  english_pob_choice: Its grain offering
  chosen_spanish: Su ofrenda vegetal
  alternatives_spanish:
  - su ofrenda
  - su ofrenda de cereal
  - su ofrenda de grano
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial designa una ofrenda de grano/vegetal, no un regalo genérico. En español, «ofrenda vegetal» conserva el campo cultual sin sonar tan técnico como «ofrenda de cereal», y mantiene la relación posesiva con el sacrificio previo.
- source_word: שְׁנֵי עֶשְׂרֹנִים
  english_pob_choice: two-tenths of an ephah
  chosen_spanish: dos décimas de efa
  alternatives_spanish:
  - dos décimos de efa
  - dos medidas de diezmos de efa
  - dos décimas partes de un efa
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «dos décimas». En español bíblico, «dos décimas de efa» comunica la medida implícita sin perder la literalidad de la fracción.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: «Flor de harina» es el equivalente bíblico natural y fiel para סֹלֶת en ofrendas rituales; conserva la idea de harina refinada mejor que una paráfrasis moderna.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: amasada con aceite
  alternatives_spanish:
  - mezclada con aceite
  - meneada con aceite
  - mezclada en aceite
  lexicon: HALOT
  rationale: El participio pasivo indica que la harina está combinada con aceite. «Amasada con aceite» comunica bien el proceso ritual en español y evita una calca demasiado seca.
- source_word: אִשֶּׁה לַיהוָה
  english_pob_choice: a food offering to Yahweh
  chosen_spanish: una ofrenda encendida para Yahvé
  alternatives_spanish:
  - una ofrenda por fuego para Yahvé
  - una ofrenda hecha por fuego para Yahvé
  - una ofrenda alimento para Yahvé
  lexicon: HALOT
  rationale: אִשֶּׁה es el término técnico para una ofrenda presentada por fuego. Dado que el POB inglés preserva la alternativa «offering by fire», en español se rinde como «ofrenda encendida», que mantiene la imagen ritual sin imponer «alimento» como lectura principal.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de parte de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», según la pauta del proyecto. En esta construcción sacrificial, «para Yahvé» expresa de forma natural la dirección/dedicación del acto cultual.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: de aroma agradable
  alternatives_spanish:
  - de aroma placentero
  - de suave olor
  - de olor agradable
  lexicon: HALOT
  rationale: La fórmula fija indica aceptación cultual. «De aroma agradable» preserva la idiomaticidad del hebreo sin forzar un giro arcaico; «aroma» mantiene mejor el registro sacrificial que «olor».
- source_word: וְנִסְכֹּה
  english_pob_choice: and its drink offering shall be
  chosen_spanish: y su libación será
  alternatives_spanish:
  - y su ofrenda líquida será
  - y su derramamiento será
  - y su bebida ofrendada será
  lexicon: HALOT
  rationale: נֶסֶךְ alude a la ofrenda líquida asociada al sacrificio. «Libación» es el equivalente culto y preciso en español; el posesivo remite al mismo sacrificio anterior.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino tinto
  - mosto
  lexicon: HALOT
  rationale: Equivalencia directa y natural.
- source_word: רְבִיעִת הַהִין
  english_pob_choice: a fourth of a hin
  chosen_spanish: la cuarta parte de un hin
  alternatives_spanish:
  - un cuarto de hin
  - la cuarta parte del hin
  lexicon: HALOT
  rationale: El hebreo expresa una fracción de la medida antigua hin. «La cuarta parte de un hin» conserva la unidad original y la relación fraccional con claridad en español.
theological_decisions:
- issue: Render of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El paquete de origen inglés adopta «Yahweh» para יהוה. En español, la forma normalizada del proyecto es «Yahvé», manteniendo el nombre pactual sin máscara reverencial. «SEÑOR» quedaría fuera de la pauta del POB español, y «Jehová» no refleja la decisión auditada.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: אִשֶּׁה and the sacrificial-fire nuance
  english_pob_reading: a food offering / an offering by fire
  chosen_spanish_reading: una ofrenda encendida
  alternative_spanish_readings:
  - una ofrenda por fuego
  - una ofrenda hecha por fuego
  - una ofrenda de alimento
  rationale: El inglés POB conserva la tensión entre un equivalente idiomático («food offering») y la alternativa más literal («offering by fire»). En español, «ofrenda encendida» transmite el valor técnico de una ofrenda consumida por fuego sin reducirla a «alimento», que podría oscurecer la referencia sacrificial.
  doctrine_reference: HALOT entry for אִשֶּׁה / sacrificial offering terminology
translation_notes:
  revision_awareness: El contexto de revisión indica acuerdo alto y ningún cambio en la última pasada; por tanto, la redacción española sigue de cerca las decisiones auditadas del inglés POB y ajusta solo lo necesario para una publicación natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en español del proyecto.
  - Se conserva la unidad antigua «hin» para no borrar la referencia cultual específica.
  - «Ofrenda vegetal» y «flor de harina» evitan el lenguaje eclesiástico no auditado, pero siguen siendo comprensibles y fieles al léxico sacrificial.
  - La nota al pie ancla la alternativa principal para אִשֶּׁה sin duplicar marcadores.
