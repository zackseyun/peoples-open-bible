review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: mandato de dirigir un מָשָׁל a la «casa rebelde», fórmula profética, doble imperativo sobre la olla, y mandato de añadir agua. Sin embargo, la nota y la elección principal para מָשָׁל no están bien alineadas: el inglés POB eligió como base «proverb» con nota alternativa «parable», mientras que el español puso «parábola» en el texto y además la nota repite «parábola» como alternativa, lo que invalida la distinción preservada en la auditoría. También conviene suavizar «Y habla» a una formulación imperativa más natural en español.'
  spanish_quality_summary: El español es claro y legible, pero «Y habla una parábola» suena algo forzado. «Pronuncia un proverbio» o «di un proverbio» resulta más idiomático sin perder la conexión explícita entre el verbo y מָשָׁל. El resto del versículo fluye bien; «la olla» y «echa agua en ella» son comprensibles y dignos. «El Señor Yahvé» es aceptable bajo la política del proyecto, aunque sin artículo también podría funcionar; no requiere adjudicación especial.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto, especialmente «Yahvé» para יהוה. No hay conflicto con Mesías/Cristo u otros términos doctrinales. La principal desalineación es léxica: מָשָׁל debe conservar como opción principal «proverbio» en seguimiento del expediente inglés, con «parábola» en nota como alternativa.'
  issues:
  - severity: medium
    issue: La elección principal «parábola» para מָשָׁל no sigue la decisión base del POB inglés.
    rationale: La auditoría inglesa escogió «proverb» como traducción principal y reservó «parable» como alternativa léxica. En español, «proverbio» es natural y preserva mejor ese razonamiento documentado.
  - severity: high
    issue: 'La nota al pie está internamente incorrecta: ofrece «parábola» como alternativa cuando el texto principal ya dice «parábola».'
    rationale: Esto elimina la función de la nota y no preserva la alternativa significativa documentada. La nota debe ofrecer «proverbio» si el texto principal fuera «parábola», o mejor aún, el texto principal debe decir «proverbio» y la nota ofrecer «parábola».
  - severity: low
    issue: «Y habla una parábola» suena poco idiomático en español.
    rationale: Aunque es comprensible, el imperativo con objeto directo abstracto resulta rígido. «Pronuncia un proverbio» mantiene el vínculo formal con el hebreo y mejora la naturalidad.
  revised_spanish_text: 'Y pronuncia un proverbio[a] a la casa rebelde, y diles: «Así dice el Señor Yahvé: Pon la olla; ponla, y también echa agua en ella».'
