translation:
  language: es
  text: Así salvó Yahvé a Israel aquel día[a], y la batalla pasó más allá de Bet-avén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la batalla pasó más allá de Bet-avén» o «la batalla avanzó más allá de Bet-avén».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשַׁע
  english_pob_choice: saved
  chosen_spanish: salvó
  alternatives_spanish:
  - dio victoria a
  - liberó
  lexicon: HALOT
  rationale: El hifil de ישׁע expresa acción causativa de salvación/liberación. «Salvó» conserva esa fuerza verbal directa en español y mantiene a Yahvé como agente. «Dio victoria a» es más interpretativo; «liberó» es posible, pero menos directo aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» y no ocultarlo con un título. Esto preserva el nombre propio revelado a Israel.'
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: Es una expresión temporal idiomática. «Aquel día» suena natural en español y mantiene la referencia deíctica sin sobrecargar la frase.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a los israelitas
  - a la nación de Israel
  lexicon: HALOT
  rationale: El marcador de objeto directo con el nombre nacional se refleja con «a Israel», que mantiene el referente colectivo sin añadir precisión no explicitada por el hebreo.
- source_word: וְהַמִּלְחָמָה
  english_pob_choice: and the battle
  chosen_spanish: y la batalla
  alternatives_spanish:
  - y la guerra
  - y el combate
  lexicon: HALOT
  rationale: מִלְחָמָה puede ser «guerra» o «batalla». En este contexto narrativo puntual, «batalla» es la opción más precisa y natural.
- source_word: עָבְרָה
  english_pob_choice: passed beyond
  chosen_spanish: siguió más allá de
  alternatives_spanish:
  - pasó más allá de
  - avanzó más allá de
  lexicon: HALOT
  rationale: עבר indica movimiento de pasar/ir más allá. «Siguió más allá de» comunica el avance del conflicto sin forzar una imagen técnica; «pasó más allá de» es más literal, y «avanzó más allá de» enfatiza la progresión militar.
- source_word: אֶת בֵּית אָוֶן
  english_pob_choice: beyond Beth-aven
  chosen_spanish: más allá de Bet-avén
  alternatives_spanish:
  - pasando Bet-avén
  - al otro lado de Bet-avén
  lexicon: HALOT
  rationale: 'Se conserva el topónimo con transliteración española estable: «Bet-avén». La relación espacial de עבר con el lugar queda bien expresada con «más allá de».'
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del texto fuente es el Tetragrámaton, no un título genérico. «Yahvé» preserva el nombre propio del pacto y sigue la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se revisó el alineamiento con el hebreo: הַמִּלְחָמָה + עָבְרָה permite tanto una lectura espacial («siguió más allá de») como una más literal («pasó más allá de»). Se conservó la referencia al nombre divino como Yahvé, conforme al criterio del proyecto y al audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה.
  - Se translitera el topónimo como «Bet-avén» para coherencia con otros nombres bíblicos en español.
  - «Batalla» se usa para מִלְחָמָה en este contexto narrativo específico.
