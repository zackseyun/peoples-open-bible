revisions:
- from: 'Y Sansón les dijo: «Esta vez soy inocente con respecto a los filisteos cuando les hago daño[a][b]».'
  to: 'Y Sansón les dijo: «Esta vez soy inocente con respecto a los filisteos[a], cuando les hago daño[b]».'
  rationale: 'La traducción principal es esencialmente fiel, pero necesita un ajuste menor: corregir la nota b para que refleje con precisión la forma hebrea literal y reubicar la nota a en la frase que realmente explica.'
