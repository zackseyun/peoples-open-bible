review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el hebreo y el rastro de auditoría inglés: «tus profetas», «vieron», «falsedad y necedad», «no descubrieron tu iniquidad», «oráculos falsos». Sin embargo, el manejo de לְהָשִׁיב שְׁבִיתֵךְ no preserva la decisión principal documentada por la POB inglesa, que opta por el sentido idiomático ‘restaurar tu suerte/fortunas’ y deja la lectura más literal sobre cautiverio en nota. Además, la nota [a] está anclada al lugar equivocado: comenta שְׁבִיתֵךְ pero aparece tras «necedad».'
  spanish_quality_summary: El español es en general claro y digno, pero «restaurar tu cautiverio» suena semánticamente invertido en español contemporáneo, como si se volviera a imponer el cautiverio en vez de revertirse la calamidad. «Para ti» es aceptable aunque algo literal; se puede conservar por cercanía estructural. «Engaños» para מַדּוּחִים es legible, pero «delirios» o «extravíos» reflejarían mejor la idea de desvarío/engaño que descarría; aun así, «engaños» es defendible y no exige adjudicación mayor.
  glossary_alignment: 'No hay conflicto con los términos globales principales. Se mantiene «iniquidad» para עָוֹן y «oráculos» para מַשְׂאוֹת conforme al expediente inglés. La principal desalineación es teológico-lexical: el proyecto inglés privilegió la lectura idiomática de שׁוּב שְׁבִית como restauración, no la formulación española literal «restaurar tu cautiverio».'
  issues:
  - severity: high
    issue: La frase «para restaurar tu cautiverio» no sigue la decisión principal auditada y resulta equívoca en español.
    rationale: El inglés POB adopta ‘to restore your fortunes’ como texto principal y reserva la lectura de cautiverio para nota. En español, «restaurar tu cautiverio» suena antinatural y puede insinuar reinstalar el cautiverio, no revertir la calamidad/exilio.
  - severity: high
    issue: La nota [a] está colocada en el segmento equivocado.
    rationale: La nota explica el idiomático לְהָשִׁיב שְׁבִיתֵךְ, pero el marcador aparece tras «necedad» en vez de junto a la frase sobre restauración.
  - severity: medium
    issue: El contenido de la nota [a] no preserva la alternativa principal en español.
    rationale: La nota debería presentar la alternativa más literal frente a un texto principal idiomático («restaurar tu suerte/fortunas»), no repetir como nota una redacción problemática ya usada en el cuerpo del texto.
  - severity: low
    issue: «Engaños» para מַדּוּחִים es algo más genérico que el inglés auditado «delusions».
    rationale: El hebreo apunta a cosas que extravían/desvían; «engaños» comunica falsedad, pero atenúa el matiz de desvarío o de ser llevado por mal camino. No obstante, sigue siendo aceptable si se prioriza naturalidad.
  revised_spanish_text: Tus profetas vieron para ti falsedad y necedad, y no descubrieron tu iniquidad para restaurar tu suerte[a]; más bien, vieron para ti oráculos falsos y engaños[b].
  revised_footnotes:
