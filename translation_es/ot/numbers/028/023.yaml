    rationale: «Estable» no corresponde bien al matiz de תָּמִיד y suena poco natural. La nota debe conservar la explicación de la relación sintáctica sin introducir una expresión española extraña ni cambiar la terminología sacrificial.
  revised_spanish_text: Además del holocausto[a] de la mañana, que es para el holocausto continuo, ofrecerán estas.
