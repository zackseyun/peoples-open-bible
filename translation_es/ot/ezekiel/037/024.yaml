translation:
  language: es
  text: Mi siervo David será rey sobre ellos[a], y habrá un solo pastor para todos ellos. Andarán en mis juicios[b], y guardarán mis estatutos y los pondrán en práctica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él será un solo pastor para todos ellos». El hebreo puede entenderse también con la cláusula del pastor referida directamente a David.'
    reason: lexical_alternative
  - marker: b
    text: «David» puede referirse literalmente a David, a un gobernante davídico futuro, o tipológicamente al Mesías; la traducción conserva la forma hebrea sin resolver la interpretación.
    reason: alternative_reading
lexical_decisions:
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  lexicon: HALOT
  rationale: En este contexto real y pactal, עֶבֶד funciona como designación honorífica de David; en español, «siervo» conserva esa relación de servicio sin la carga más dura de «esclavo», que aquí sonaría menos natural y más restrictiva de lo que el hebreo exige.
- source_word: דָוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: nombre propio
  rationale: Se mantiene el nombre propio sin glosa interpretativa, conforme al texto hebreo y a la práctica de preservar la tensión teológica.
- source_word: מֶלֶךְ עֲלֵיהֶם
  english_pob_choice: be king over them
  chosen_spanish: será rey sobre ellos
  alternatives_spanish:
  - será gobernante sobre ellos
  lexicon: HALOT
  rationale: מֶלֶךְ es «rey» de manera directa, y עַל con sufijo expresa dominio «sobre»; «rey» retiene mejor el sentido monárquico que un término más general como «gobernante».
- source_word: וְרֹעֶה אֶחָד יִהְיֶה לְכֻלָּם
  english_pob_choice: there will be one shepherd for all of them
  chosen_spanish: habrá un solo pastor para todos ellos
  alternatives_spanish:
  - él será un solo pastor para todos ellos
  - y un pastor único será para todos
  lexicon: HALOT
  rationale: רֹעֶה conserva la imagen pastoral y real; «un solo pastor» expresa la unidad enfática del hebreo. La construcción impersonal «habrá» reproduce bien la predicación hebrea sin forzar un sujeto explícito que el texto no formula aquí.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis sentencias
  - mis ordenanzas
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar decisiones/juicios legales. «Juicios» mantiene el campo jurídico y suena natural en español bíblico contemporáneo; «ordenanzas» sería posible, pero tendería a solaparse con חֻקֹּתַי.
- source_word: יֵלֵכוּ
  english_pob_choice: will walk
  chosen_spanish: andarán
  alternatives_spanish:
  - caminarán
  - vivirán
  lexicon: HALOT
  rationale: El hebreo usa el modismo de «andar» para conducta; «andarán» conserva ese giro idiomático con buen nivel de claridad en español.
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  lexicon: HALOT
  rationale: חֻקָּה se refiere a disposiciones prescritas; «estatutos» mantiene la distinción legal-covenantal frente a מִשְׁפָּטַי.
- source_word: יִשְׁמְרוּ
  english_pob_choice: will keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - cumplirán
  lexicon: HALOT
  rationale: שׁמר en contexto legal-pactual admite «guardar/observar». «Guardarán» conserva la idea de custodia obediente y combina bien con el siguiente verbo.
- source_word: וְעָשׂוּ אוֹתָם
  english_pob_choice: and do them
  chosen_spanish: y los pondrán en práctica
  alternatives_spanish:
  - y los harán
  - y los cumplirán
  lexicon: HALOT
  rationale: עָשָׂה con objeto pronominal expresa llevar a cabo en la vida lo ordenado. «Poner en práctica» comunica bien la obediencia activa sin volverlo mecánico ni demasiado abstracto; «los cumplirán» es viable, pero menos transparente respecto del hacer concreto.
theological_decisions:
- issue: Identidad de 'David' en el oráculo de restauración
  english_pob_reading: Retain 'David' in the main text without interpretive expansion.
  chosen_spanish_reading: Conservar «David» en el texto principal sin explicitar si se trata del David histórico, de un descendiente davídico o del Mesías.
  alternative_spanish_readings:
  - el David histórico restaurado
  - un gobernante davídico
  - el Mesías como pastor-rey davídico
  rationale: El hebreo nombra a «David» de forma directa. La traducción española debe preservar esa formulación y no resolver la tensión interpretativa dentro del texto mismo, dejando abierta la lectura tipológica o mesiánica donde corresponda.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; se mantiene la alta concordancia entre el análisis original y la forma final propuesta.
  spanish_consistency_notes:
  - Se conserva la distinción entre «juicios» y «estatutos» para reflejar מִשְׁפָּטַי y חֻקֹּתַי.
  - Se usa «siervo» y no «esclavo» por el valor honorífico-pactual de עַבְדִּי en este contexto.
  - «Andarán» mantiene el modismo hebreo de conducta sin añadir interpretación.
  - No se introduce «Mesías» en el texto principal para preservar la tensión teológica documentada.
