    text: Or 'for virtue.' The Greek phrase ὑπὲρ ἀρετῆς can denote acting or suffering for the sake of virtue.
    reason: lexical_alternative
  - marker: b
    text: That is, the wheel used for torture.
    reason: cultural_note
  - marker: c
    text: The final verb is difficult; it conveys increasing the strain or tightening the victim further on the wheel.
    reason: lexical_alternative
