  glossary_alignment: 'No hay términos doctrinales mayores en juego. ''Olivos'' y ''cuenco'' son compatibles con las decisiones del proyecto y con el POB inglés. La única desalineación relevante es pronominal/contextual: debe evitarse el masculino para el referente femenino implícito en la visión.'
