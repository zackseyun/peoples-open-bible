translation:
  language: es
  text: 'Os conjuro[a], hijas de Jerusalén: no despierten ni aviven el amor[b] hasta que le plazca.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Os conjuro» conserva el valor de una solemne imposición bajo juramento; también podría entenderse como «os encargo solemnemente».
    reason: alternative_reading
  - marker: b
    text: El hebreo usa un verbo femenino singular, concordando con «amor» personificado. Por eso se traduce «le plazca», aunque en español «amor» sea masculino.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁבַּ֥עְתִּי
  english_pob_choice: I adjure
  chosen_spanish: Yo os conjuro
  alternatives_spanish:
  - Yo os pongo bajo juramento
  - Yo os encargo solemnemente
  lexicon: HALOT
  rationale: El hifil de שׁבע expresa poner bajo juramento o hacer un solemne encargo. «Conjuro» conserva la fuerza formal y poética de la advertencia, y funciona de manera natural en español bíblico sin volverla demasiado explicativa.
- source_word: בְּנ֣וֹת יְרוּשָׁלִָ֑ם
  english_pob_choice: daughters of Jerusalem
  chosen_spanish: hijas de Jerusalén
  alternatives_spanish:
  - jóvenes de Jerusalén
  - doncellas de Jerusalén
  lexicon: HALOT
  rationale: Se mantiene el vocativo literal y poético. «Hijas» preserva la imagen y la fórmula tradicional del Cantar, mientras que «jóvenes» interpretaría más de lo que exige el hebreo.
- source_word: מַה תָּעִ֧ירוּ וּֽמַה תְּעֹֽרְר֛וּ
  english_pob_choice: do not awaken or stir up
  chosen_spanish: no despertéis ni provoquéis
  alternatives_spanish:
  - no despertéis ni excitáis
  - ¿por qué despertaríais ni provocaríais?
  lexicon: HALOT
  rationale: El audit trail inglés reconoce la fuerza idiomática de la adjuración como prohibición. En español, una negativa directa comunica mejor esa fuerza. «Despertéis» y «provoquéis» distinguen los dos verbos hebreos sin borrar su paralelismo.
- source_word: הָאַהֲבָה
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - el amor apasionado
  - el amor
  lexicon: HALOT
  rationale: El sustantivo es amor; el artículo definido mantiene la personificación del hebreo y su referencia a una realidad tratada como si pudiera ser despertada o perturbada.
- source_word: עַד שֶׁתֶּחְפָּץ
  english_pob_choice: until it pleases
  chosen_spanish: hasta que le plazca
  alternatives_spanish:
  - hasta que quiera
  - hasta que se complazca
  lexicon: HALOT
  rationale: La forma verbal femenina concuerda con «el amor», personificado como sujeto. «Le plazca» conserva el valor de «please/pleases» y la tensión gramatical del texto original sin forzar una expresión menos natural en español.
theological_decisions:
- issue: 'Forma de la adjuración: prohibición directa frente a interrogativa retórica'
  english_pob_reading: The Hebrew syntax has often been rendered as a prohibition in English, but the wording here more directly reflects the interrogative form of the source text; the revised English presents it as a prohibition-like adjuration.
  chosen_spanish_reading: 'Se vierte como prohibición directa dentro de una fórmula de conjuro: «no despertéis ni provoquéis...», sin añadir una pregunta que el español no necesita para reflejar la fuerza pragmática.'
  alternative_spanish_readings:
  - ¿por qué despertaríais ni provocaríais...
  - que no despertéis ni provoquéis...
  rationale: La línea hebrea funciona en el discurso como una adjuración que impide una acción. En español, la prohibición directa reproduce mejor ese efecto comunicativo y evita una construcción interrogativa pesada o menos natural.
  doctrine_reference: Poética bíblica y pragmática del discurso; no aplica una doctrina específica.
- issue: Personificación del amor
  english_pob_reading: The feminine singular verb 'desires/pleases' matches the feminine noun 'love,' personifying love as something that should not be forced before its proper time.
  chosen_spanish_reading: «El amor» se trata como sujeto personificado de «le plazca», manteniendo la concordancia femenina implícita en el hebreo.
  alternative_spanish_readings:
  - hasta que ella quiera
  - hasta que el amor quiera
  rationale: El hebreo usa un verbo femenino singular con אַהֲבָה. En español, donde el sustantivo es masculino, «le plazca» deja intacta la referencia sin deshacer la personificación ni introducir un sujeto femenino explícito que no existe en la forma española.
  doctrine_reference: Observación gramatical y literaria del texto; no implica una afirmación doctrinal.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés POB, que prefirió una adjuración en forma de prohibición («do not awaken or stir up love until it pleases») frente a la paráfrasis interrogativa anterior. También adopta el valor personificado y concordado de «until it pleases» reflejado en la nota léxica del registro inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «amor» con artículo definido para reproducir la personificación del sustantivo hebreo.
  - Se evita «siervo» u otras sustituciones no pertinentes; el texto no contiene δοῦλος.
  - La combinación «no despertéis ni provoquéis» conserva el paralelismo verbal sin repetir un único verbo en español.
