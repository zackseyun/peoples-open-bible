translation:
  language: es
  text: No avergüences a un hombre que se aparta de la transgresión[a]; recuerda que todos somos culpables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No te regocijes por el muerto; recuerda que todos morimos / llegamos a nuestro fin». El testimonio hebreo de este verso difiere en ambas mitades, así que el texto principal sigue el hebreo conservado y deja el griego como lectura alternativa.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּכְלִים
  english_pob_choice: Do not shame
  chosen_spanish: No avergüences
  alternatives_spanish:
  - No deshonres
  - No humilles
  - No avergüences
  lexicon: HALOT
  rationale: El hifil de כלם expresa poner a alguien en vergüenza o deshonrarlo. «Avergüences» conserva la fuerza interpersonal y suena natural en español bíblico contemporáneo sin debilitar el mandato.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo es singular masculino; «un hombre» conserva la forma y el valor representativo del original mejor que una neutralización no motivada por el texto.
- source_word: שָׁב
  english_pob_choice: turns back
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - se aparta y vuelve
  - se arrepiente
  lexicon: HALOT
  rationale: El participio de שוב indica volver/retornar. En este contexto moral, «vuelve» mantiene la idea de retorno desde la falta sin convertirla en un término técnico más fuerte que el hebreo.
- source_word: מִפֶּשֶׁע
  english_pob_choice: from transgression
  chosen_spanish: de la transgresión
  alternatives_spanish:
  - de la rebelión
  - del pecado
  - de la falta
  lexicon: HALOT
  rationale: פשע tiene un matiz de transgresión o rebelión. «Transgresión» preserva el tono jurídico-moral del vocablo y evita aplanarlo con «pecado».
- source_word: זְכֹר
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - acuérdate
  - ten presente
  lexicon: HALOT
  rationale: Imperativo directo y plenamente idiomático en español.
- source_word: כֻּלָּנוּ
  english_pob_choice: we all
  chosen_spanish: todos nosotros
  alternatives_spanish:
  - todos
  - todos somos
  lexicon: HALOT
  rationale: La expresión inclusiva se mantiene con claridad en español; en la frase completa se integra naturalmente como sujeto implícito de la conclusión.
- source_word: חַיָּבִים
  english_pob_choice: are guilty
  chosen_spanish: somos culpables
  alternatives_spanish:
  - somos responsables
  - estamos obligados
  - somos deudores
  lexicon: HALOT
  rationale: El hebreo puede implicar estar obligado, ser responsable o ser culpable. Dado el contexto sapiencial y la recepción del verso, «culpables» refleja mejor la idea moral sin perder la tensión del hebreo, y se alinea con la revisión inglesa más reciente.
theological_decisions:
- issue: Hebreo principal vs. paralelo griego en la segunda mitad del verso
  english_pob_reading: remember that we all are guilty
  chosen_spanish_reading: recuerda que todos somos culpables
  alternative_spanish_readings:
  - recuerda que todos morimos
  - recuerda que todos llegamos a nuestro fin
  - recuerda que todos estamos condenados
  rationale: El testimonio hebreo conservado termina con חַיָּבִים, mientras que el griego paralelo dice que todos morimos/llegamos a nuestro fin. La edición POB prioriza el hebreo donde sobrevive; por eso la traducción principal sigue el hebreo, dejando constancia del paralelo griego en una nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir de Hebreo de Sirácida donde se conserva; usar el paralelo griego como dato de control y nota alternativa'
- issue: Mareo semántico de שוב en contexto de culpa
  english_pob_reading: turns back from transgression
  chosen_spanish_reading: vuelve de la transgresión
  alternative_spanish_readings:
  - se arrepiente de su pecado
  - regresa del pecado
  rationale: El hebreo expresa movimiento de retorno, no un término doctrinal técnico. «Vuelve de la transgresión» conserva ese movimiento y evita imponer una formulación interpretativa más específica que el texto no exige.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión lexical y no resolverla con terminología teológica posterior'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que cambió «liable» por «guilty»; por eso la conclusión española evita «obligados» o «deudores» como opción principal y adopta «culpables», manteniendo la base hebrea y la naturalidad en español. También se respetó la nota de desajuste menor entre hebreo y griego, preservando ambos testigos mediante texto principal y nota.
  spanish_consistency_notes:
  - Se usa «transgresión» de forma consistente para פשע, evitando alternar con «pecado» sin necesidad textual.
  - Se mantiene «vuelve» para שוב en vez de «se arrepiente», para conservar la imagen de retorno.
  - Se evita «SEÑOR» porque este verso no contiene el tetragrámaton ni una sustitución del nombre divino.
  - La nota a pie de página recoge explícitamente el paralelo griego y su diferencia con el hebreo conservado.
  - El tono es sobrio y apto para lectura bíblica pública en español latinoamericano.
