id: 1JN.1.2
reference: 1 John 1:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἡ ζωὴ ἐφανερώθη, καὶ ἑωράκαμεν καὶ μαρτυροῦμεν καὶ ἀπαγγέλλομεν ὑμῖν τὴν ζωὴν τὴν αἰώνιον ἥτις ἦν πρὸς τὸν πατέρα καὶ ἐφανερώθη ἡμῖν—
base_translation:
  language: en
  yaml_path: translation/nt/1_john/001/002.yaml
  text: and the life was revealed[a], and we have seen and testify and proclaim to you the eternal life[b], which was with the Father and was revealed to us—
  footnotes:
  - marker: a
    text: Or 'appeared' / 'was made manifest' for 'was revealed' (ἐφανερώθη).
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the eternal life' is grammatically expressed as a thing, but in context refers personally to the Son, the one who was with the Father and was revealed to the apostles.
    reason: cross_reference
translation:
  language: ko
  text: 그리고 그 생명이 나타나셨고, 우리는 보았으며 증언하고, 아버지와 함께 계시다가 우리에게 나타나신 그 영원한 생명[a]을 여러분에게 선포합니다—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 「그 영원한 생명」은 문법적으로는 사물처럼 표현되지만 문맥상 인격적으로 아들, 곧 아버지와 함께 계시다가 사도들에게 나타나신 분을 가리킨다.
    reason: cross_reference
lexical_decisions:
- source_word: ἐφανερώθη
  english_pob_choice: was revealed
  chosen_korean: 나타나셨고
  alternatives_korean:
  - 계시되었고
  - 드러나셨고
  lexicon: BDAG
  rationale: φανερόω는 숨겨졌던 것이 가시화된다는 의미. 「나타나다」가 한국어에서 가장 자연스럽고, 인격적 지시(아들)를 살려 존칭형 「나타나셨고」로 옮긴다.
- source_word: τὴν ζωὴν τὴν αἰώνιον
  english_pob_choice: the eternal life
  chosen_korean: 그 영원한 생명
  alternatives_korean:
  - 영생
  lexicon: BDAG
  rationale: 정관사 반복 구조를 「그 영원한 생명」으로 살려 인격적 함의를 보존한다. 단순한 「영생」은 추상화되어 인격성을 가린다.
- source_word: πρὸς τὸν πατέρα
  english_pob_choice: with the Father
  chosen_korean: 아버지와 함께
  alternatives_korean:
  - 아버지를 향해
  lexicon: BDAG
  rationale: 요한복음 1:1의 πρὸς τὸν θεόν과 같은 친밀한 동행·대면의 함의. 한국어 「함께」가 자연스럽다.
