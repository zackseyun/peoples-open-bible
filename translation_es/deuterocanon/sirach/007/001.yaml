translation:
  language: es
  text: No hagas el mal[a], y el mal no te alcanzará; mantente lejos de la iniquidad[b], y se apartará de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse como «daño» o «calamidad» en el segundo miembro: «No hagas el mal, y el daño no te alcanzará». El hebreo repite la misma palabra, y el griego también tiene «mal» en ambos lugares.'
    reason: lexical_alternative
  - marker: b
    text: El último miembro es conciso en hebreo y puede referirse a que la iniquidad, o su peligro o efecto, se apartará de ti. La idea es que al alejarte de la iniquidad, su amenaza se desvía de ti.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּעַשׂ
  english_pob_choice: Do not do
  chosen_spanish: No hagas
  alternatives_spanish:
  - No cometas
  - No practiques
  lexicon: HALOT
  rationale: La prohibición con עשה es directa y verbal. «No hagas» conserva esa inmediatez sin añadir el matiz más técnico de «cometas» ni el aspecto habitual de «practiques».
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - el mal moral
  - el daño
  - la calamidad
  lexicon: HALOT
  rationale: El hebreo repite el mismo término y el griego también usa κακά/κακόν; por eso conviene conservar la misma palabra en español para mantener el paralelismo moral. «El mal» funciona de forma natural y no desplaza el sentido hacia solo daño o calamidad.
- source_word: יַשִּׂיגְךָ
  english_pob_choice: will not overtake you
  chosen_spanish: no te alcanzará
  alternatives_spanish:
  - no te overtará
  - no te sorprenderá
  - no te llegará
  lexicon: HALOT
  rationale: «Alcanzará» comunica bien la imagen de algo que alcanza a una persona, y en español suena más natural que un calco como «overtará». Conserva la idea de persecución o captura implícita en el hebreo y en el griego καταλάβῃ.
- source_word: הַרְחֵק
  english_pob_choice: keep far from
  chosen_spanish: mantente lejos de
  alternatives_spanish:
  - aléjate de
  - apártate de
  lexicon: HALOT
  rationale: El imperativo exige separación activa. «Mantente lejos de» reproduce la metáfora espacial de manera clara y fluida; «aléjate de» y «apártate de» también son válidas, pero la primera conserva mejor la idea de permanencia.
- source_word: מֵעָוֹן
  english_pob_choice: from iniquity
  chosen_spanish: de la iniquidad
  alternatives_spanish:
  - del pecado
  - de la culpa
  - de la maldad
  lexicon: HALOT
  rationale: «Iniquidad» preserva el peso moral-jurídico de עָוֹן sin reducirlo a un término más general como «pecado» o «maldad». Además, armoniza con la advertencia sapiencial del verso.
- source_word: וְיֵט מִמְּךָ
  english_pob_choice: and it will turn away from you
  chosen_spanish: y ella se apartará de ti
  alternatives_spanish:
  - y se apartará de ti
  - y se desviará de ti
  - y se alejará de ti
  lexicon: HALOT
  rationale: El hebreo es conciso y deja algo de ambigüedad sobre el sujeto implícito; en español, «ella» retoma naturalmente «la iniquidad» mencionada justo antes y mantiene la idea de apartarse/volver atrás sin sobreespecificar más allá del texto.
theological_decisions:
- issue: Relación entre el primer y el segundo uso de רָעָה
  english_pob_reading: Render both occurrences as 'evil' in the main text
  chosen_spanish_reading: 'Traducir ambos miembros con el mismo campo semántico: «el mal»'
  alternative_spanish_readings:
  - traducir el segundo como «daño»
  - traducir el segundo como «calamidad»
  rationale: El hebreo y el griego repiten la misma palabra/raíz, formando un paralelismo deliberado entre la conducta mala y su consecuencia. Mantener «el mal» en ambos lugares hace visible esa simetría; «daño» o «calamidad» introducirían una distinción interpretativa que el texto no explicita.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El borrador sigue el estado de revisión más reciente sin cambios sustantivos: el hebreo y el griego concuerdan ampliamente, y no se registraron revisiones pendientes en el audit trail.'
  spanish_consistency_notes:
  - Se mantiene la correspondencia terminológica entre «el mal» y «la iniquidad» para respetar el paralelismo del verso.
  - Se evita introducir vocabulario eclesiástico no atestiguado por el texto.
  - La puntuación reproduce dos miembros exhortativos seguidos de dos promesas/efectos paralelos, conforme al hebreo y al griego.
