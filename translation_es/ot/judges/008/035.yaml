translation:
  language: es
  text: Y no mostraron bondad a la casa de Jerubaal[a], Gedeón, conforme a todo el bien que él había hecho por Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa aquí ambos nombres para la misma persona: Jerubaal y Gedeón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: And they did not
  chosen_spanish: Y no mostraron
  alternatives_spanish:
  - Y no hicieron
  - Pero no mostraron
  lexicon: HALOT
  rationale: El hebreo continúa la narración con negación simple; en español, «Y no» conserva la continuidad narrativa. Se escogió «mostraron» para expresar el verbo idiomático con חֶסֶד, evitando un calco como «hicieron».
- source_word: עָשׂוּ חֶסֶד
  english_pob_choice: show kindness
  chosen_spanish: mostraron lealtad
  alternatives_spanish:
  - mostraron bondad
  - mostraron misericordia
  - hicieron bondad
  lexicon: HALOT
  rationale: La expresión hebrea denota una acción concreta de fidelidad o benevolencia debida; en este contexto de relación social y obligación hacia la casa de Gedeón, «lealtad» preserva la fuerza relacional sin convertirlo en un término excesivamente piadoso.
- source_word: חֶסֶד
  english_pob_choice: kindness
  chosen_spanish: lealtad
  alternatives_spanish:
  - bondad
  - misericordia
  - amor leal
  lexicon: HALOT
  rationale: «Lealtad» refleja mejor la dimensión de fidelidad/reciprocidad implícita en el contexto histórico de Jueces 8:35. Se evita reducirlo solo a amabilidad genérica.
- source_word: עִם
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - con
  - para
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «con», en español el régimen natural con este verbo y objeto se expresa con «a». Mantiene claridad sin perder el sentido benefactivo.
- source_word: בֵּית
  english_pob_choice: the house of
  chosen_spanish: la casa de
  alternatives_spanish:
  - el linaje de
  - la familia de
  lexicon: HALOT
  rationale: «Casa de» conserva el giro hebreo dinástico/familiar y sigue de cerca el sustantivo בית.
- source_word: יְרֻבַּעַל גִּדְעוֹן
  english_pob_choice: Jerubbaal, Gideon
  chosen_spanish: Jerubaal, de Gedeón
  alternatives_spanish:
  - Jerubaal, es decir, Gedeón
  - Jerubaal-Gedeón
  lexicon: HALOT
  rationale: El hebreo presenta un doble nombre en aposición. En español, «Jerubaal, de Gedeón» deja visibles ambos nombres y evita una expansión explicativa no presente en el hebreo; la coma indica identificación del personaje, siguiendo el audit trail que conserva ambos nombres.
- source_word: כְּכָל
  english_pob_choice: according to all
  chosen_spanish: conforme a todo
  alternatives_spanish:
  - según todo
  - de acuerdo con todo
  lexicon: HALOT
  rationale: «Conforme a» traduce con naturalidad la idea de correspondencia o medida exacta implícita en כְּכָל, sin sobreinterpretar.
- source_word: הַטּוֹבָה
  english_pob_choice: the good
  chosen_spanish: el bien
  alternatives_spanish:
  - la bondad
  - la buena obra
  lexicon: HALOT
  rationale: En este contexto, el sustantivo designa el beneficio objetivo que Gedeón hizo por Israel. «El bien» suena natural en español y mantiene amplitud semántica.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had done
  chosen_spanish: que él había hecho
  alternatives_spanish:
  - que hizo
  - el cual había hecho
  lexicon: HALOT
  rationale: 'El pretérito pluscuamperfecto conserva la perspectiva retrospectiva del texto: el bien ya estaba hecho antes de la falta de reciprocidad.'
- source_word: עִם יִשְׂרָאֵל
  english_pob_choice: for Israel
  chosen_spanish: por Israel
  alternatives_spanish:
  - para Israel
  - a favor de Israel
  lexicon: HALOT
  rationale: El hebreo usa עִם con sentido benefactivo; «por Israel» comunica de forma natural que el bien se realizó en beneficio de Israel, sin forzar una traducción literal poco idiomática.
translation_notes:
  revision_awareness: Se corrigió el problema previo de validación asegurando que el marcador de nota [a] aparece exactamente en el texto principal. Además, se evitó una expansión explicativa extraña al hebreo y se mantuvo la relación nominal doble de manera visible y auditable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en este verso solo si apareciera el nombre divino; aquí no aparece, por lo que no se usa.
  - Se preserva el giro hebreo «casa de» para בית.
  - Se evita «misericordia» porque no corresponde de forma primaria al intercambio relacional de חֶסֶד en este contexto.
  - La puntuación usa comas para reflejar la aposición de los nombres sin añadir paréntesis explicativos.
