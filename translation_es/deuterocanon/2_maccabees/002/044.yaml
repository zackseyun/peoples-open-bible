translation:
  language: es
  text: Pero Dios, que salvó a todo su pueblo y dio[a] su herencia a todos, y el reino[b], y el sacerdocio, y la santidad[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «restauró su herencia a todos». El verbo griego puede significar dar de nuevo o restaurar, no solo dar.
    reason: lexical_alternative
  - marker: b
    text: O «la realeza» o «el reinado». El término griego puede referirse al poder real, la dignidad real o un reino/ámbito.
    reason: lexical_alternative
  - marker: c
    text: O «la consagración» o «la santificación» para ἁγιασμόν.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ θεός
  english_pob_choice: But God
  chosen_spanish: Pero Dios
  alternatives_spanish:
  - Y Dios
  - Ahora bien, Dios
  lexicon: LSJ
  rationale: δέ expresa continuidad con contraste leve; «Pero Dios» conserva esa relación en español con naturalidad y sin endurecer el contraste.
- source_word: ὁ σώσας
  english_pob_choice: who saved
  chosen_spanish: que salvó
  alternatives_spanish:
  - que ha salvado
  - que rescató
  lexicon: BDAG
  rationale: El aoristo participial presenta una acción completa de Dios; «que salvó» reproduce bien la referencia al acto ya consumado.
- source_word: τὸν πάντα λαὸν αὐτοῦ
  english_pob_choice: all his people
  chosen_spanish: a todo su pueblo
  alternatives_spanish:
  - a todo el pueblo suyo
  - a su pueblo entero
  lexicon: LSJ
  rationale: La construcción colectiva con πᾶς + sustantivo se vierte naturalmente como totalidad; «todo su pueblo» preserva el alcance global sin artificialidad.
- source_word: ἀποδοὺς
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - restauró
  - devolvió
  lexicon: BDAG
  rationale: Aunque el verbo puede implicar devolver o restaurar, aquí la serie enumera dones/presencias concedidas; «dio» es el equivalente más amplio y claro en español.
- source_word: τὴν κληρονομίαν αὐτοῦ
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - la herencia que le pertenece
  - su heredad
  lexicon: LSJ
  rationale: Se mantiene el poseedor singular del griego y se traduce con un término bíblico claro en español. «Herencia» conserva el matiz de don/covenant possession.
- source_word: πᾶσιν
  english_pob_choice: to all
  chosen_spanish: a todos
  alternatives_spanish:
  - para todos
  - a cada uno
  lexicon: BDAG
  rationale: El dativo distributivo se expresa de modo conciso con «a todos», manteniendo la amplitud del reparto.
- source_word: τὸ βασίλειον
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  lexicon: LSJ
  rationale: Aunque el audit trail discutía «kingship», la revisión inglesa fijó «kingdom»; en español «reino» es el correlato más natural y fiel para βασίλειον en esta lista institucional.
- source_word: τὸ ἱεράτευμα
  english_pob_choice: the priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - el oficio sacerdotal
  lexicon: LSJ
  rationale: Término institucional directo y plenamente natural en español; conserva la función/cuerpo sacerdotal.
- source_word: τὸν ἁγιασμόν
  english_pob_choice: the holiness
  chosen_spanish: la santificación
  alternatives_spanish:
  - la santidad
  - la consagración
  lexicon: BDAG
  rationale: Aunque la revisión inglesa prefirió «holiness» por naturalidad, en español «santificación» preserva mejor el peso teológico-formal de ἁγιασμός en una lista paralela a reino y sacerdocio; «santidad» se deja como alternativa de lectura.
theological_decisions:
- issue: Referencia posesiva de «su herencia»
  english_pob_reading: The pronoun refers to God, yielding 'his inheritance.'
  chosen_spanish_reading: 'El posesivo se mantiene como referido a Dios: «su herencia».'
  alternative_spanish_readings:
  - «su heredad» entendida de manera más comunitaria
  - «la herencia de ellos»
  rationale: El griego αὐτοῦ remite de manera más directa a Dios. Mantener el posesivo singular evita resolver interpretativamente una relación de pertenencia y don que el texto deja breve y cargada.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Matiz de τὸν ἁγιασμόν
  english_pob_reading: Rendered as 'holiness' in the revised English draft, with 'sanctification' as an earlier lexical option.
  chosen_spanish_reading: Se traduce como «la santificación» en el texto principal.
  alternative_spanish_readings:
  - la santidad
  - la consagración
  rationale: En español, «santificación» conserva el vínculo cultual y teológico del término sin perder su fuerza doctrinal. «Santidad» puede sonar más estático; «consagración» desplaza el matiz hacia el acto de dedicar.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Valor de τὸ βασίλειον
  english_pob_reading: The revised English draft reads 'the kingdom' after considering 'kingship.'
  chosen_spanish_reading: Se vierte como «el reino».
  alternative_spanish_readings:
  - la realeza
  - el reinado
  rationale: La revisión inglesa favoreció una forma más natural; en español, «reino» es la solución más transparente y mantiene la serie con sacerdocio y santificación sin imponer una abstracción ajena al oído bíblico.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa más reciente, que cambió «kingship» por «kingdom» y «sanctification» por «holiness». En español, se optó por mantener una equivalencia natural y doctrinalmente sobria: «reino» para βασίλειον y «santificación» como término principal para ἁγιασμόν, señalando en notas las alternativas válidas que el propio audit trail preserva. También se respetó la ambigüedad del verbo ἀποδοὺς con una nota sobre «restauró».'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y el posesivo singular «su» para αὐτοῦ.
  - Se evitó «Señor» como sustituto de YHWH porque el versículo griego no usa κύριος.
  - 'Se conservó una estructura enumerativa paralela: reino, sacerdocio, santificación.'
  - El registro es formal pero natural para lectura eclesial en español latinoamericano.
