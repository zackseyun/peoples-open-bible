translation:
  language: es
  text: 'Así que pusieron capataces sobre ellos[a] para afligirlos con sus cargas[b], y construyeron[c] ciudades de depósito para Faraón: Pitom y Raméses[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «sobre él», usando singular para referirse colectivamente a Israel; el español usa plural por claridad contextual.
    reason: alternative_reading
  - marker: b
    text: «Cargas» refleja el hebreo סִבְלֹתָם, que puede aludir tanto a cargas físicas como al trabajo pesado impuesto.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente «y él construyó», usando singular para referirse colectivamente a Israel; el español usa plural por claridad contextual.
    reason: alternative_reading
  - marker: d
    text: También puede transliterarse «Raamsés».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  english_pob_choice: they set
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - designaron
  lexicon: HALOT
  rationale: El wayyiqtol de שׂים aquí expresa establecer o poner a funcionarios sobre el pueblo; «pusieron» es natural en español y conserva la acción de nombramiento/instalación sin sobrecargar el verso.
- source_word: עָלָיו
  english_pob_choice: over him
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - sobre él
  - encima de ellos
  lexicon: HALOT
  rationale: Aunque el hebreo conserva sufijo singular, el referente es colectivo e Israel es tratado como un solo pueblo en sentido corporativo. Siguiendo la revisión inglesa, se mantiene el referente plural en español para claridad y fidelidad contextual.
- source_word: שָׂרֵי מִסִּים
  english_pob_choice: taskmasters
  chosen_spanish: capataces
  alternatives_spanish:
  - taskmasters
  - jefes de trabajos forzados
  - oficiales de tributo
  lexicon: HALOT
  rationale: La expresión apunta a oficiales de corvea/ trabajo obligatorio. «Capataces» comunica bien la función opresiva y supervisora en español moderno; se evita «siervos» por no reflejar la fuerza coercitiva.
- source_word: לְמַעַן עַנֹּתוֹ
  english_pob_choice: to afflict them
  chosen_spanish: para afligirlos
  alternatives_spanish:
  - para oprimirlos
  - para humillarlos
  lexicon: HALOT
  rationale: ענה en piel suele significar afligir, oprimir o humillar. «Afligir» preserva la severidad del verbo sin estrecharlo indebidamente a una sola matización.
- source_word: בְּסִבְלֹתָם
  english_pob_choice: with their burdens
  chosen_spanish: con sus cargas
  alternatives_spanish:
  - con sus trabajos forzados
  - con los trabajos que les imponían
  - con sus pesadas cargas
  lexicon: HALOT
  rationale: סבלות se refiere a cargas o labores pesadas. «Cargas» mantiene la imagen concreta y deja abierta la relación entre peso físico y trabajo impuesto; se evita explicitar «trabajos forzados» porque el hebreo conserva mayor amplitud.
- source_word: וַיִּבֶן
  english_pob_choice: they built
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - él edificó
  lexicon: HALOT
  rationale: El verbo es 3ms singular en forma, pero el contexto colectivo demanda plural en español, siguiendo la lectura revisada del POB inglés. «Edificaron» es formal y adecuado para construcciones urbanas.
- source_word: עָרֵי מִסְכְּנוֹת
  english_pob_choice: storage cities
  chosen_spanish: ciudades de almacenamiento
  alternatives_spanish:
  - ciudades de depósito
  - ciudades almacén
  - ciudades de reserva
  lexicon: HALOT
  rationale: La frase designa ciudades usadas como depósitos o centros de provisión. «Ciudades de almacenamiento» reproduce el sentido sin depender de la forma tradicional «ciudades de granero», que podría estrechar el significado.
- source_word: לְפַרְעֹה
  english_pob_choice: for Pharaoh
  chosen_spanish: para Faraón
  alternatives_spanish:
  - para el Faraón
  lexicon: HALOT
  rationale: Se conserva el título propio en su forma habitual en español bíblico. «Para Faraón» es claro y fluido.
- source_word: פִּתֹם
  english_pob_choice: Pithom
  chosen_spanish: Pitom
  alternatives_spanish:
  - Pithom
  lexicon: HALOT
  rationale: Nombre propio de lugar; se adapta a la ortografía española habitual sin alterar la identificación.
- source_word: רַעַמְסֵס
  english_pob_choice: Rameses
  chosen_spanish: Raméses
  alternatives_spanish:
  - Raamsés
  - Ramesés
  lexicon: HALOT
  rationale: Se usa una forma española transparente y reconocible. La vocalización permite reflejar el nombre propio sin forzar la grafía inglesa.
theological_decisions:
- issue: Número gramatical singular hebreo con referente colectivo
  english_pob_reading: The English POB preserves the Hebrew singulars in the first draft, then revises to plurals in the latest pass for clarity with Israel as the collective referent.
  chosen_spanish_reading: Se traduce con plurales («sobre ellos», «afligirlos», «edificaron») para expresar correctamente al pueblo de Israel como sujeto colectivo en español.
  alternative_spanish_readings:
  - sobre él, afligirlo, edificó
  - sobre ellos, afligirlos, edificó
  rationale: El hebreo conserva singulares pronominales y verbales, pero el flujo narrativo y la propia revisión inglesa muestran que el referente es Israel corporativamente. En español, mantener singular sonaría ambiguo o incorrecto para el lector moderno.
  doctrine_reference: Gramática hebrea y concordancia referencial; no implica diferencia doctrinal.
- issue: Naturaleza de la opresión
  english_pob_reading: to afflict them with their burdens
  chosen_spanish_reading: para afligirlos con sus cargas
  alternative_spanish_readings:
  - para oprimirlos con sus cargas
  - para humillarlos con sus cargas
  rationale: «Afligir» conserva la violencia del trato sin añadir interpretaciones más específicas que el texto no exige. La carga semántica de ענה incluye aflicción, opresión y humillación; se mantiene esa amplitud.
  doctrine_reference: Lexicografía de ענה en uso piel.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó los pronombres y el verbo a plural para concordar con Israel como referente colectivo, sin alterar el resto del contenido léxico. También se respetó la nota inglesa sobre la variante de transliteración de Rameses/Raamses.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general para el nombre divino, aunque este versículo no lo contiene.
  - 'Se prefirió un registro bíblico claro y contemporáneo: «afligir», «cargas», «ciudades de almacenamiento».'
  - Los nombres propios se adaptan a grafía española cuando existe una forma asentada y transparente.
