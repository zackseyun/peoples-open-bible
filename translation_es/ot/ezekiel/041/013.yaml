translation:
  language: es
  text: 'Entonces midió el templo: su longitud era de cien codos; y el área separada[a], el edificio y sus muros tenían una longitud de cien codos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lugar separado». El hebreo designa un área distinta, apartada dentro del complejo del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָדַד
  english_pob_choice: Then he measured
  chosen_spanish: Entonces midió
  alternatives_spanish:
  - Y midió
  - Midió
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «Entonces» preserva la secuencia sin sonar mecánico en español.
- source_word: הַבַּיִת
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - la casa
  - el edificio
  lexicon: HALOT
  rationale: En la visión de Ezequiel, בַּיִת se refiere al complejo del templo; «templo» comunica mejor el referente contextual que «casa» o «edificio».
- source_word: אֹרֶךְ מֵאָה אַמָּה
  english_pob_choice: its length was a hundred cubits
  chosen_spanish: su longitud era de cien codos
  alternatives_spanish:
  - medía cien codos
  - su largo era de cien codos
  lexicon: HALOT
  rationale: Mantiene la unidad antigua «codos» y refleja el sustantivo de medida con una construcción natural en español.
- source_word: הַגִּזְרָה
  english_pob_choice: the separate area
  chosen_spanish: el área separada
  alternatives_spanish:
  - el lugar separado
  - el área apartada
  lexicon: HALOT
  rationale: «Área separada» conserva la idea lexical de un espacio distinto/set apart sin sobreespecificar la topografía más allá del texto.
- source_word: הַבִּנְיָה
  english_pob_choice: the building
  chosen_spanish: el edificio
  alternatives_spanish:
  - la estructura
  - la construcción
  lexicon: HALOT
  rationale: «Edificio» es el equivalente directo y claro para una construcción arquitectónica en este contexto.
- source_word: קִירוֹתֶיהָ
  english_pob_choice: its walls
  chosen_spanish: sus muros
  alternatives_spanish:
  - sus paredes
  - sus muros perimetrales
  lexicon: HALOT
  rationale: «Muros» conserva el registro arquitectónico y la fuerza del plural hebreo mejor que «paredes» en este pasaje técnico.
theological_decisions:
- issue: Sentido de הַגִּזְרָה como espacio distinguido dentro del complejo del templo
  english_pob_reading: the separate area
  chosen_spanish_reading: el área separada
  alternative_spanish_readings:
  - el lugar separado
  - el área apartada
  rationale: Se mantiene la ambigüedad funcional del término sin convertirlo en un término litúrgico o eclesial ajeno al hebreo. La redacción evita precisar más de lo que el texto ofrece.
  doctrine_reference: Ninguna doctrina específica; decisión de topografía/lexema
- issue: Referencia de בַּיִת en la visión del templo
  english_pob_reading: the temple
  chosen_spanish_reading: el templo
  alternative_spanish_readings:
  - la casa
  - el edificio
  rationale: La equivalencia con «templo» sigue el contexto visionario de Ezequiel 40–48 y evita una traducción demasiado genérica que oscurezca el conjunto arquitectónico sagrado.
  doctrine_reference: Ninguna doctrina específica; coherencia contextual
translation_notes:
  revision_awareness: La base inglesa fue revisada para quitar un «also» añadido en una versión anterior, dejando una estructura más cercana al hebreo. La versión española refleja esa coordinación simple sin añadir marcadores de énfasis no presentes en el texto fuente.
  spanish_consistency_notes:
  - Se conservó «codos» como unidad antigua, en lugar de convertirla a medidas modernas.
  - Se mantuvo «templo» para הַבַּיִת en coherencia con el contexto de la visión de Ezequiel.
  - «Área separada» y la nota preservan la tensión léxica del hebreo sin fijar una localización más específica de la necesaria.
  - «Muros» se eligió por su registro arquitectónico, más adecuado que «paredes» en este pasaje técnico.
