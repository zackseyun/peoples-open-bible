review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: contrasta con los levitas infieles del contexto, mantiene ''los hijos de Sadoc'', el valor temporal de בִּתְעוֹת, el acercamiento cultual, el servicio sacerdotal y la fórmula final con Yahvé explícito. Sin embargo, hay algunos puntos donde la fidelidad léxica y el español natural deben ajustarse: ''guardaron la carga de mi santuario'' no representa bien מִשְׁמֶרֶת en español culto bíblico; ''se apartaban de mí'' debilita el matiz de errar/desviarse; y la nota inglesa sobre ''sons of Israel'' no se preservó.'
  spanish_quality_summary: 'El texto es en general claro y digno, pero contiene una elección poco natural (''la carga de mi santuario'') y una fórmula final mejorable (''dice'' frente a ''declara''). También conviene aligerar el pronombre enfático doble: en español se puede conservar con raya o simplemente omitir ''ellos'' sin perder claridad; aquí se conserva la fluidez sin sobrecargar. ''Sebo y sangre'' es defendible y legible en contexto sacrificial.'
  glossary_alignment: Alinea bien con la política del proyecto al usar 'Yahvé' y no enmascarar el nombre divino. No hay conflicto con Mesías/Cristo ni otros términos de glosario. La combinación אֲדֹנָי יְהוִה queda mejor como 'el Señor Yahvé' en español. 'Ministrarme' es aceptable en contexto sacerdotal.
  issues:
  - severity: high
    issue: '''guardaron la carga de mi santuario'' suena impropio y puede malentenderse'
    rationale: מִשְׁמֶרֶת en contexto sacerdotal indica encargo, responsabilidad o servicio asignado. 'Carga' en español no comunica bien ese valor técnico y degrada la legibilidad.
  - severity: medium
    issue: '''se apartaban de mí'' atenúa el matiz de desviarse/errar apostáticamente'
    rationale: בִּתְעוֹת con תעה apunta a extraviarse o desviarse, no solo apartarse. 'Se desviaron de mí' o similar preserva mejor el matiz moral-religioso.
  - severity: medium
    issue: Falta la nota alternativa correspondiente a 'los hijos de Israel'
    rationale: El English POB preserva la alternativa 'the people of Israel / the Israelites'. Dado que el español retiene la forma más literal 'hijos de Israel', conviene mantener la nota lexical alternativa.
  - severity: low
    issue: '''dice el Señor Yahvé'' puede mejorarse a ''declara el Señor Yahvé'''
    rationale: נְאֻם funciona como fórmula profética de declaración solemne; 'declara' refleja mejor el registro que 'dice'.
  revised_spanish_text: Pero los sacerdotes levíticos[a], los hijos de Sadoc, que cumplieron el encargo de mi santuario cuando los hijos de Israel[b] se desviaron de mí, ellos se acercarán a mí para ministrarme, y estarán delante de mí para ofrecerme sebo y sangre, declara el Señor Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «los sacerdotes, los levitas». El hebreo puede leerse en aposición, no solo como «sacerdotes levíticos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el pueblo de Israel» o «los israelitas», por «los hijos de Israel».'
    reason: lexical_alternative
  revision_rationale: Se ajusta una expresión española poco natural ('la carga de mi santuario') a una formulación fiel y legible ('el encargo de mi santuario'), se fortalece el matiz de apostasía con 'se desviaron de mí', se preserva la nota alternativa de 'hijos de Israel' presente en el audit trail inglés, y se mejora la fórmula profética final con 'declara'. No se requiere adjudicación adicional porque las correcciones son directas y están bien sustentadas por el hebreo y la política del proyecto.
