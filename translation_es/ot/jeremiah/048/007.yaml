translation:
  language: es
  text: Porque confiaste en tus obras[a] y en tus tesoros[b], también tú serás capturada; y Quemos[c] saldrá al destierro[d], con sus sacerdotes y sus oficiales[e] juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tus hechos». El hebreo puede referirse de manera amplia a obras, actos o a lo que uno ha hecho.
    reason: lexical_alternative
  - marker: b
    text: O «en tus riquezas» o «en tus depósitos».
    reason: lexical_alternative
  - marker: c
    text: Quemos era el dios nacional de Moab.
    reason: cultural_note
  - marker: d
    text: O «al cautiverio».
    reason: lexical_alternative
  - marker: e
    text: O «sus príncipes».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי יַעַן
  english_pob_choice: Because you trusted
  chosen_spanish: Porque
  alternatives_spanish:
  - Porque, por cuanto
  - Ya que
  lexicon: HALOT
  rationale: La combinación hebrea introduce la causa del juicio. En español, «Porque» basta para mantener la relación causal sin sonar forzado; el valor explicativo de יַעַן queda cubierto por el contexto inmediato.
- source_word: בִּטְחֵךְ
  english_pob_choice: you trusted
  chosen_spanish: confiaste
  alternatives_spanish:
  - has confiado
  - te apoyaste
  lexicon: HALOT
  rationale: בטח expresa confiar o apoyarse con seguridad. «Confiaste» comunica bien la base pasada de la condena y conserva el peso causal del verbo.
- source_word: בְּמַעֲשַׂיִךְ
  english_pob_choice: in your works
  chosen_spanish: en tus obras
  alternatives_spanish:
  - en tus hechos
  - en tus actos
  - en lo que hiciste
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede ser obras, actos o hechos. «Obras» mantiene la amplitud semántica y suena natural en español bíblico sin reducir el término a una sola esfera.
- source_word: וּבְאֹצְרוֹתַיִךְ
  english_pob_choice: and in your treasures
  chosen_spanish: y en tus tesoros
  alternatives_spanish:
  - y en tus riquezas
  - y en tus almacenes
  - y en tus graneros
  lexicon: HALOT
  rationale: אֹצָר puede referirse a tesoros, riqueza o almacenes. «Tesoros» reproduce bien el objeto de la falsa confianza y evita decidir demasiado pronto entre el contenido y el lugar donde se guarda.
- source_word: גַּם אַתְּ
  english_pob_choice: you also
  chosen_spanish: también tú
  alternatives_spanish:
  - hasta tú
  - tú también
  lexicon: HALOT
  rationale: La partícula enfatiza que Moab no escapará al juicio. «También tú» conserva esa inclusión enfática de manera natural.
- source_word: תִּלָּכֵדִי
  english_pob_choice: will be captured
  chosen_spanish: serás capturada
  alternatives_spanish:
  - serás apresada
  - serás tomada
  - caerás presa
  lexicon: HALOT
  rationale: El nifal de לכד expresa ser apresada o capturada. «Serás capturada» es directo, claro y conserva el sentido militar/judicial del texto.
- source_word: כמיש
  english_pob_choice: Chemosh
  chosen_spanish: Quemos
  alternatives_spanish:
  - Kemos
  - Quemós
  lexicon: HALOT
  rationale: Se translitera el nombre del dios nacional de Moab. «Quemos» es una forma española transparente y reconocible, manteniendo la identidad del referente sin sustituirlo por un título tradicional.
- source_word: בַּגּוֹלָה
  english_pob_choice: into exile
  chosen_spanish: al destierro
  alternatives_spanish:
  - al exilio
  - en destierro
  - a la deportación
  lexicon: HALOT
  rationale: El término puede expresar exilio o deportación. «Al destierro» comunica bien el movimiento forzado fuera de la tierra y evita que el lector piense solo en un estado abstracto.
- source_word: כֹּהֲנָיו
  english_pob_choice: his priests
  chosen_spanish: con sus sacerdotes
  alternatives_spanish:
  - con sus sacerdotes del culto
  - con los sacerdotes de él
  lexicon: HALOT
  rationale: Con Quemos como antecedente, el sufijo masculino singular se traduce naturalmente como «sus». Aunque «sacerdotes» es más usual en español, aquí conserva el sentido cultual del hebreo.
- source_word: וְשָׂרָיו
  english_pob_choice: and his officials
  chosen_spanish: y sus oficiales
  alternatives_spanish:
  - y sus príncipes
  - y sus gobernantes
  - y sus jefes
  lexicon: HALOT
  rationale: שַׂר puede significar príncipe, oficial, gobernante o jefe. «Oficiales» amplía correctamente la referencia al aparato de liderazgo sin fijarlo indebidamente en una sola función cortesana.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - todos juntos
  lexicon: HALOT
  rationale: La adverbialidad final resume la deportación conjunta. «Juntos» conserva la cohesión del grupo sin añadir matiz interpretativo extra.
theological_decisions:
- issue: Identidad y función de Quemos/Chemosh
  english_pob_reading: Chemosh is the named Moabite deity who goes into exile with his priests and officials.
  chosen_spanish_reading: Quemos es presentado como el dios de Moab, humillado al salir al destierro con sus sacerdotes y sus oficiales.
  alternative_spanish_readings:
  - Quemos como un nombre de lugar o título dinástico
  - Quemos como una imagen literaria sin referencia a una deidad real
  rationale: 'El contexto y la tradición textual favorecen el referente divino, no un lugar ni un título. La traducción conserva la fuerza polémica del pasaje: la deidad de Moab no solo pierde el culto, sino que es descrita como deportada junto con su aparato religioso-político.'
  doctrine_reference: Jeremías 48:7; cf. el uso bíblico de los dioses de las naciones como ídolos derrotados en juicio
translation_notes:
  revision_awareness: La lectura inglesa auditada fue depurada de una redundancia inicial («For because») y quedó en una forma causal simple. La versión española sigue esa línea, evitando duplicar conectores y manteniendo el énfasis causal de יַעַן sin sobrecargar el inicio.
  spanish_consistency_notes:
  - Se mantuvo «Quemos» como transliteración española estable del nombre propio, en lugar de sustituirlo por un título interpretativo.
  - «Tesoros» traduce el objeto de confianza de forma amplia, coherente con el valor de אֹצָר y con la nota lexical disponible en el audit trail.
  - Se prefirió «destierro» por claridad y naturalidad; la nota preserva la alternativa «cautiverio» para reflejar la ambigüedad semántica del hebreo.
  - El plural relacional «sus sacerdotes y sus oficiales» conserva la personificación del referente y el paralelo cultual-político del texto.
