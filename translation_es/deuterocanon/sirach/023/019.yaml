translation:
  language: es
  text: y el temor a él está en los ojos de los hombres[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego de esta cláusula es inusualmente comprimido y puede ser textualmente incierto. También puede entenderse, de manera más interpretativa, como: «él teme los ojos de los hombres».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὀφθαλμοὶ
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - vista
  - mirada
  lexicon: LSJ
  rationale: Se conserva el sustantivo concreto del griego. En una cláusula tan comprimida, 'ojos' mantiene la imagen corporal sin abstraerla innecesariamente.
- source_word: ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  - humana
  lexicon: LSJ
  rationale: El genitivo plural se traduce de forma directa como 'de los hombres', preservando la forma genérica masculina del original y la decisión de la POB inglesa de no suavizarla a un término neutro.
- source_word: φόβος
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - terror
  - pavor
  lexicon: LSJ
  rationale: '''Temor'' refleja bien el rango normal de φόβος y funciona con sobriedad en español bíblico. ''Miedo'' suena más coloquial; ''terror'' o ''pavor'' introducirían intensidad no garantizada por el texto.'
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: de él
  alternatives_spanish:
  - suyo
  - su
  lexicon: LSJ
  rationale: Como el griego es ambiguo y la cláusula es elíptica, 'de él' reproduce el genitivo de manera transparente sin forzar una posesión estilísticamente pesada con 'su'.
theological_decisions:
- issue: Cómo reflejar la cláusula griega muy comprimida y posiblemente inestable sin resolver artificialmente la ambigüedad
  english_pob_reading: A minimally interpretive, formally close rendering that preserves the uncertainty of the transmitted clause.
  chosen_spanish_reading: y el temor de él está en los ojos de los hombres
  alternative_spanish_readings:
  - y él teme los ojos de los hombres
  - y el temor de él está ante los ojos de los hombres
  - y los ojos de los hombres son su temor
  rationale: El griego transmitido es tan breve y tenso que no permite una resolución segura. La versión española conserva la estructura nominal y la ambigüedad, evitando suplir un verbo o reordenar el sentido más allá de lo que la fuente soporta. La nota preserva la posibilidad de una lectura más interpretativa sin imponerla en el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: La POB inglesa revisó la redacción para hacer inteligible la construcción nominal del griego sin añadir contenido interpretativo. Esta versión española sigue esa decisión y mantiene la misma reserva hermenéutica, pero adapta la sintaxis al español con una formulación publicable y fiel a la brevedad del original.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al tetragrama; aquí no aparece.
  - Se mantiene 'temor' para φόβος, en línea con la decisión inglesa y con el uso bíblico habitual en español.
  - Se conserva la ambigüedad del genitivo con 'de él' en lugar de resolverla con una construcción más explicativa.
  - La puntuación final mantiene la clausula como una unidad breve, acorde con la concisión del griego.
