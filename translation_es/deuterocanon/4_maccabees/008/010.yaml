    rationale: En contexto enfático adverbial/pronominal, «aun» sin tilde es defendible, pero «aun yo» puede percibirse menos claro para algunos lectores. No obstante, no requiere cambio obligatorio si el estándar editorial admite «aun».
  revised_spanish_text: Por tanto, apiádense de ustedes mismos, de quienes aun yo, su enemigo, tengo compasión por causa de su edad[a].
