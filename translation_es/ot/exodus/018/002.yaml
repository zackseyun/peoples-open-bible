translation:
  language: es
  text: Jetró[a], suegro de Moisés, tomó a Séfora, esposa de Moisés, después de que Moisés la había despedido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de que ella fue despedida». El hebreo dice literalmente: «después de su envío/despedida», dejando implícito el agente.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - llevó consigo
  lexicon: HALOT
  rationale: לקח en este contexto narrativo se expresa de forma directa con «tomó». Conserva la apertura semántica del hebreo, sin especificar más de lo que el texto da.
- source_word: חֹתֵן מֹשֶׁה
  english_pob_choice: Moses’ father-in-law
  chosen_spanish: suegro de Moisés
  alternatives_spanish:
  - el suegro de Moisés
  - el padre de la esposa de Moisés
  lexicon: HALOT
  rationale: חֹתֵן indica la relación por matrimonio; en español bíblico y natural, «suegro de Moisés» comunica con precisión la relación sin forzar una perífrasis.
- source_word: צִפֹּרָה
  english_pob_choice: Zipporah
  chosen_spanish: Sifora
  alternatives_spanish:
  - Séfora
  - Zipora
  lexicon: convención onomástica española
  rationale: El nombre propio se translitera en forma usual para español bíblico. «Sifora» evita la grafía inglesa y mantiene una forma reconocible en registros hispanos.
- source_word: אֵשֶׁת מֹשֶׁה
  english_pob_choice: Moses’ wife
  chosen_spanish: esposa de Moisés
  alternatives_spanish:
  - mujer de Moisés
  - la mujer de Moisés
  lexicon: HALOT
  rationale: El constructo identifica a Zipporah como la esposa de Moisés. «Esposa» es claro y digno en español moderno.
- source_word: אַחַר
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: 'El valor temporal/secuencial de אַחַר se expresa con una preposición natural en español: «después de».'
- source_word: שִׁלּוּחֶיהָ
  english_pob_choice: he had sent her away
  chosen_spanish: haberla despedido
  alternatives_spanish:
  - que había sido despedida
  - su despedida
  lexicon: HALOT
  rationale: La forma hebrea literalmente significa «su envío/expulsión», con agente implícito. «Haberla despedido» conserva la acción verbal y, como en el POB inglés, sugiere el agente más probable sin ocultar la ambigüedad del hebreo. «Despedir» también permite una lectura menos dura que «repudiar» o «expulsar».
theological_decisions:
- issue: Agente implícito en «after her sending away»
  english_pob_reading: 'Moses is the implied agent: ''after he had sent her away.'''
  chosen_spanish_reading: 'Moisés se deja como agente implícito en el verbo español: «haberla despedido».'
  alternative_spanish_readings:
  - después de que ella había sido despedida
  - después de su despedida
  rationale: El hebreo no nombra explícitamente al agente, pero el contexto inmediato hace muy natural entender a Moisés. El español puede mantener esa inferencia sin convertirla en certeza absoluta, preservando la tensión interpretativa del original.
  doctrine_reference: Conservar una ambigüedad textual real cuando el hebreo no la resuelve explícitamente.
translation_notes:
  revision_awareness: El texto base del POB inglés fue revisado y quedó sin cambios en la última pasada; la presente propuesta sigue ese mismo sentido general y mantiene la ambigüedad sobre el agente de «su despedida» mediante una nota.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero con sintaxis natural en español.
  - Se evitó «SEÑOR» o equivalentes porque el versículo no contiene el Tetragrámaton.
  - «Despedir» se prefirió a «repudiar» para no cargar el pasaje con un matiz más fuerte que el hebreo explícito.
  - La nota a pie de página conserva la alternativa pasiva que el hebreo permite y que el inglés POB también documenta.
