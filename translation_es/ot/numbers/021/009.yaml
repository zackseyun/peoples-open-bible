  text: So Moses made a bronze serpent and set it on the pole[a]. And it happened that if the serpent bit a man, and he looked at the bronze serpent[d][c][b], he lived.
  footnotes:
  - marker: a
    text: Or 'copper serpent.' The Hebrew term for the metal can refer to copper or bronze.
    reason: lexical_alternative
  - marker: b
    text: Or 'standard' or 'banner' for 'pole.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'a man,' used here in a representative sense for any bitten person.
    reason: lexical_alternative
  - marker: d
    text: This event is later echoed typologically in John 3:14–15.
    reason: cross_reference
