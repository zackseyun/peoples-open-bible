translation:
  language: es
  text: y todo el pueblo mezclado[a], y todos los reyes de la tierra de Uz, y todos los reyes de la tierra de los filisteos—Ascalón, Gaza, Ecrón y el remanente de Asdod[c][b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la multitud mezclada»; posiblemente una población extranjera mezclada más que un grupo étnico específico.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la tierra de los filisteos»; tradicionalmente, «Filistea».'
    reason: lexical_alternative
  - marker: c
    text: O «lo que queda de Asdod» o «los sobrevivientes de Asdod».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֶרֶב
  english_pob_choice: the mixed people
  chosen_spanish: el pueblo mezclado
  alternatives_spanish:
  - la multitud mezclada
  - la población mixta
  - los árabes
  lexicon: HALOT
  rationale: El hebreo aquí parece referirse a un grupo humano mezclado, no a una sola etnia definida. «Pueblo mezclado» conserva ese sentido colectivo y la ambigüedad lexicográfica que el POB inglés mantiene con «the mixed people».
- source_word: מַלְכֵי אֶרֶץ הָעוּץ
  english_pob_choice: the kings of the land of Uz
  chosen_spanish: los reyes de la tierra de Uz
  alternatives_spanish:
  - los reyes del país de Uz
  lexicon: HALOT
  rationale: «Tierra» refleja bien אֶרֶץ en una lista geopolítica. «Uz» se translitera como nombre propio, sin intentar explicarlo ni traducirlo.
- source_word: מַלְכֵי אֶרֶץ פְּלִשְׁתִּים
  english_pob_choice: the kings of the land of the Philistines
  chosen_spanish: los reyes de la tierra de los filisteos
  alternatives_spanish:
  - los reyes de Filistea
  - los reyes de los filisteos
  lexicon: HALOT
  rationale: Conservo la expresión hebrea más transparente, equivalente a «the land of the Philistines». «Filistea» sería más fluido, pero aquí la formulación geográfica-étnica explícita merece preservarse.
- source_word: אַשְׁקְלוֹן
  english_pob_choice: Ashkelon
  chosen_spanish: Ascalón
  alternatives_spanish:
  - Asquelón
  lexicon: HALOT
  rationale: Se usa la forma española tradicional y reconocible del topónimo, manteniendo el nombre de la ciudad sin pérdida de identificación.
- source_word: עַזָּה
  english_pob_choice: Gaza
  chosen_spanish: Gaza
  lexicon: HALOT
  rationale: Forma establecida en español para el topónimo.
- source_word: עֶקְרוֹן
  english_pob_choice: Ekron
  chosen_spanish: Ecrón
  alternatives_spanish:
  - Ecron
  lexicon: HALOT
  rationale: La transliteración española habitual es «Ecrón», suficientemente transparente y acorde al nombre propio hebreo.
- source_word: שְׁאֵרִית אַשְׁדּוֹד
  english_pob_choice: the remnant of Ashdod
  chosen_spanish: el remanente de Asdod
  alternatives_spanish:
  - lo que queda de Asdod
  - los sobrevivientes de Asdod
  lexicon: HALOT
  rationale: «Remanente» preserva el registro profético y la conexión léxica con שְׁאֵרִית. «Asdod» sigue la forma española corriente del topónimo y evita una traducción explicativa excesiva.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el trazado auditado del POB en inglés. Se preserva la serie de grupos y ciudades, la ambigüedad de הָעֶרֶב y שְׁאֵרִית אַשְׁדּוֹד, y la expresión geográfica «la tierra de los filisteos» en vez de normalizarla como un nombre histórico equivalente. Se optó por formas españolas consolidadas de topónimos cuando ayudan a la legibilidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; este verso no lo contiene.
  - Se conserva «remanente» para שְׁאֵרִית a fin de no perder el matiz profético.
  - La puntuación reproduce la acumulación hebrea con una sola serie coordinada y un guion para la enumeración final.
