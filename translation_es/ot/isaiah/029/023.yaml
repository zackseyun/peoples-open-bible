translation:
  language: es
  text: Porque cuando vea[a] a sus hijos, obra de mis manos, en medio de él, santificarán mi nombre; santificarán al Santo de Jacob, y estarán llenos de asombro ante[b] el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando Abraham vea a sus hijos, obra de mis manos, en medio de él»; el singular puede hacerse eco de los patriarcas nombrados en el versículo anterior, especialmente Abraham o Jacob.
    reason: alternative_reading
  - marker: b
    text: O «temerán» o «reverenciarán». El verbo hebreo incluye la idea de temor reverente o asombro ante Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa con lo anterior; en español, «Porque» comunica bien esa conexión causal o justificativa sin perder naturalidad.
- source_word: בִרְאֹתוֹ
  english_pob_choice: when he sees
  chosen_spanish: cuando vea
  alternatives_spanish:
  - al verlo
  - cuando vea él
  lexicon: HALOT
  rationale: La construcción temporal del infinitivo con ב requiere una solución temporal en español. «Cuando vea» conserva la lectura de tiempo y deja abierto el referente singular del pronombre, como en el contexto auditado.
- source_word: יְלָדָיו
  english_pob_choice: his children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos e hijas
  - a su descendencia
  lexicon: HALOT
  rationale: «Hijos» puede funcionar en español como colectivo filial, pero «a sus hijos» preserva la referencia natural a los descendientes visibles sin añadir género ni diluir el sentido familiar.
- source_word: מַעֲשֵׂה יָדַי
  english_pob_choice: the work of my hands
  chosen_spanish: obra de mis manos
  alternatives_spanish:
  - la obra de mis manos
  - lo que han hecho mis manos
  lexicon: HALOT
  rationale: «Obra de mis manos» es una equivalencia idiomática fiel y bíblicamente reconocible en español, y conserva la imagen concreta de creación/formación divina.
- source_word: בְּקִרְבּוֹ
  english_pob_choice: in his midst
  chosen_spanish: en medio de él
  alternatives_spanish:
  - en su interior
  - entre ellos
  lexicon: HALOT
  rationale: La forma singular debe mantenerse. «En medio de él» preserva la ambigüedad del referente colectivo/personificado (Jacob/Israel) y evita resolverla de más.
- source_word: יַקְדִּישׁוּ שְׁמִי
  english_pob_choice: they will sanctify my name
  chosen_spanish: santificarán mi nombre
  alternatives_spanish:
  - consagrarán mi nombre
  - proclamarán santo mi nombre
  lexicon: HALOT
  rationale: «Santificarán» reproduce el verbo de קדש en forma consistente con el audit trail inglés y mantiene la repetición deliberada del texto hebreo.
- source_word: וְהִקְדִּישׁוּ אֶת קְדושׁ יַעֲקֹב
  english_pob_choice: they will sanctify the Holy One of Jacob
  chosen_spanish: santificarán al Santo de Jacob
  alternatives_spanish:
  - consagrarán al Santo de Jacob
  - reconocerán como santo al Santo de Jacob
  lexicon: HALOT
  rationale: Se conserva el título isaiano fijo «Santo de Jacob» y el mismo verbo «santificarán» para reflejar la repetición hebrea y su fuerza teológica.
- source_word: יַעֲרִיצוּ
  english_pob_choice: they will stand in awe of
  chosen_spanish: temerán
  alternatives_spanish:
  - estarán llenos de asombro ante
  - reverenciarán
  - tendrán reverencia por
  lexicon: HALOT
  rationale: El verbo puede abarcar temor reverente o pavor. «Temerán» es breve, fiel y suficientemente amplio en español bíblico; en notas se preserva la alternativa reverencial del sentido.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel,
  - el Dios de Israel
  lexicon: HALOT
  rationale: Título divino transparente y estándar, adecuado en español y coherente con el resto de la serie.
theological_decisions:
- issue: Referente del singular en «cuando vea ... en medio de él»
  english_pob_reading: The singular refers to Jacob/Israel personified corporately, who sees his children within his midst.
  chosen_spanish_reading: Se conserva la ambigüedad del singular («él») para permitir la lectura corporativa de Jacob/Israel personificado, sin excluir la resonancia con el patriarca mencionado en el contexto.
  alternative_spanish_readings:
  - cuando Abraham vea a sus hijos
  - cuando Jacob vea a sus hijos
  rationale: El hebreo y el audit trail inglés dejan abierta la referencia. En español conviene no fijarla excesivamente, manteniendo el valor literario y teológico de la tensión.
  doctrine_reference: Preservar la tensión interpretativa documentada
- issue: Repetición de קדש en ambos verbos
  english_pob_reading: Use 'sanctify' for both קדש verbs.
  chosen_spanish_reading: Usar «santificarán» en ambos miembros.
  alternative_spanish_readings:
  - «consagrarán» en uno o ambos miembros
  - «reconocerán como santo» en uno o ambos miembros
  rationale: La repetición es retórica y teológicamente importante; mantener el mismo verbo en español hace visible la insistencia del hebreo y la centralidad de la santidad divina.
  doctrine_reference: Consistencia de términos clave
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, sin cambios de alcance doctrinal ni decisiones de revisión pendientes; conserva la ambigüedad del singular y la repetición de «santificarán».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando corresponda; en este versículo no aparece el tetragrámaton.
  - «Santo de Jacob» se conserva como título fijo y no se suaviza a una formulación más explicativa.
  - «Temerán» se eligió por su amplitud semántica en español bíblico, con la nota preservando el sentido de asombro reverente.
  - El singular de «en medio de él» se deja sin resolver en el cuerpo para respetar la ambigüedad del original.
