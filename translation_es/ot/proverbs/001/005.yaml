translation:
  language: es
  text: Escuche el sabio y crezca en instrucción[a], y el entendido adquiera guía[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oirá ... y aumentará»; los verbos imperfectos hebreos pueden leerse de manera descriptiva, pero aquí se traducen como exhortación para reflejar el tono instructivo del proverbio.
    reason: alternative_reading
  - marker: b
    text: «Guía» traduce un término que también puede significar «consejo sabio», «dirección» o, más literalmente, «conducción», como al dirigir una nave.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁמַע
  english_pob_choice: Let ... hear
  chosen_spanish: Escuche
  alternatives_spanish:
  - oiga
  - que escuche
  lexicon: HALOT
  rationale: El hebreo imperfecto funciona aquí con fuerza exhortativa en un contexto sapiencial e instructivo. «Escuche» conserva esa apelación directa sin volverlo una paráfrasis excesiva.
- source_word: חָכָם
  english_pob_choice: the wise
  chosen_spanish: el sabio
  alternatives_spanish:
  - el hombre sabio
  - los sabios
  lexicon: HALOT
  rationale: El sustantivo singular masculino se puede expresar naturalmente en español como «el sabio», preservando el valor representativo del singular hebreo sin forzar una forma más pesada.
- source_word: וְיֹסֶף
  english_pob_choice: and increase
  chosen_spanish: y aumente
  alternatives_spanish:
  - y añada
  - y siga aumentando
  lexicon: HALOT
  rationale: El verbo יסף tiene el sentido de añadir o incrementar. «Aumente» comunica bien el crecimiento progresivo en el contexto de aprendizaje, con buena naturalidad en español.
- source_word: לֶקַח
  english_pob_choice: learning
  chosen_spanish: aprendizaje
  alternatives_spanish:
  - instrucción
  - enseñanza
  lexicon: HALOT
  rationale: En este contexto sapiencial, לֶקַח es lo recibido como instrucción o aprendizaje. «Aprendizaje» mantiene el énfasis en la adquisición de conocimiento, como en la versión inglesa auditada.
- source_word: נָבוֹן
  english_pob_choice: the discerning
  chosen_spanish: el entendido
  alternatives_spanish:
  - el discernidor
  - el prudente
  lexicon: HALOT
  rationale: La forma denota a quien posee entendimiento/discernimiento. «El entendido» es una solución natural en español bíblico contemporáneo y conserva la idea de capacidad de discernir.
- source_word: תַּחְבֻּל֥וֹת
  english_pob_choice: guidance
  chosen_spanish: guía
  alternatives_spanish:
  - consejo sabio
  - dirección
  - guianza
  lexicon: HALOT
  rationale: El término puede significar conducción, dirección o consejo hábil; la metáfora de «steering» subyace, pero en español «guía» expresa bien el campo semántico sin introducir un matiz técnico innecesario.
- source_word: יִקְנֶה
  english_pob_choice: acquire
  chosen_spanish: adquiera
  alternatives_spanish:
  - obtenga
  - gane
  - compre
  lexicon: HALOT
  rationale: קנה suele significar adquirir u obtener. «Adquiera» conserva el valor de conseguir/obtener algo valioso, de forma precisa y idiomática.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una formulación más repetitiva («the wise man ... the discerning man») a una más natural («the wise ... the discerning»), sin cambiar el sentido. La redacción española sigue esa economía y evita repetir «hombre» por estilo, manteniendo el singular representativo del hebreo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico contemporáneo, claro y digno.
  - «Sabio / entendido» conserva el paralelismo sapiencial y evita sobrecargar el verso.
  - «Aprendizaje» y «guía» reflejan los sustantivos abstractos del hebreo sin volverlos más técnicos de lo que exige el contexto.
  - Los marcadores de nota se colocan junto a las palabras con mayor carga de decisión léxica.
