    rationale: La auditoría inglesa preserva una nota significativa sobre O LORD my Lord / O Lord GOD. El español debería conservar una nota equivalente o adaptada porque es una decisión fuente-teológica relevante.
  revised_spanish_text: Pero tú[a], Yahvé, mi Señor, actúa por mí[b] por amor de tu nombre; porque es bueno tu amor fiel[c], líbrame.
