translation:
  language: es
  text: Porque por mí tus días se multiplicarán[a], y se te añadirán años de vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «en mí» o «por medio de mí»; la preposición hebrea puede entenderse en sentidos estrechamente relacionados aquí, aunque el contexto favorece la idea de medio: la Sabiduría es el medio por el cual se prolonga la vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la exhortación precedente; en español, «Porque» expresa con naturalidad la conexión explicativa sin alejarse del valor causal del hebreo.
- source_word: בִי
  english_pob_choice: by me
  chosen_spanish: por mí
  alternatives_spanish:
  - en mí
  - a través de mí
  lexicon: HALOT
  rationale: La preposición con sufijo puede expresar medio/instrumento en este contexto. «Por mí» conserva esa idea de mediación de la Sabiduría y suena natural en español.
- source_word: יִרְבּוּ
  english_pob_choice: will be multiplied
  chosen_spanish: se multiplicarán
  alternatives_spanish:
  - aumentarán
  - serán muchas
  lexicon: HALOT
  rationale: Refleja más de cerca el valor de רבה («hacerse muchos, aumentar»). La forma pasiva/reflexiva en español reproduce el resultado sobre «tus días».
- source_word: יָמֶיךָ
  english_pob_choice: your days
  chosen_spanish: tus días
  alternatives_spanish:
  - los días de tu vida
  - tu vida
  lexicon: HALOT
  rationale: Es una expresión hebrea normal para la duración de la vida; «tus días» preserva la metáfora y es comprensible en español.
- source_word: וְיוֹסִיפוּ
  english_pob_choice: will be added
  chosen_spanish: se te añadirán
  alternatives_spanish:
  - te serán añadidos
  - te agregarán
  lexicon: HALOT
  rationale: 'El hebreo tiene un sentido causativo/resultativo: los años se añaden al destinatario. «Se te añadirán» mantiene la idea de adición sin introducir un sujeto explícito.'
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: se te
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: HALOT
  rationale: Marca la persona receptora de lo añadido; en español, la cliticización con «se te» integra naturalmente el dativo de destino.
- source_word: שְׁנוֹת חַיִּים
  english_pob_choice: years of life
  chosen_spanish: años de vida
  alternatives_spanish:
  - años vividos
  - años de vivir
  lexicon: HALOT
  rationale: La construcción genitiva significa años caracterizados por vida o que pertenecen a la vida. «Años de vida» es literal, idiomático y fiel.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «will be many» a «will be multiplied» para reflejar más directamente יִרְבּוּ. La traducción española adopta esa misma precisión con «se multiplicarán». Se evitó dejar una nota sin ancla, corrigiendo el problema de validación anterior al incorporar [a] en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «Sabiduría» implícita como sujeto discursivo del contexto, sin añadirlo aquí porque el verso mismo usa la primera persona («por mí»).
  - Se prefirió «años de vida» frente a opciones más interpretativas para conservar la estructura hebrea y su tono proverbial.
