revisions:
- from: Porque, si uno hace estas cosas, será fuerte frente a todo[a]; pues la luz de Yahvé es su senda.
  to: Porque si uno hace estas cosas, será fuerte ante todo[a], porque la luz de Yahvé es su senda.
  rationale: 'Se hace una reparación menor para mejorar la naturalidad y la cohesión del español sin alterar el sentido: «ante todo» expresa mejor πρὸς πάντα en este registro, y la secuencia «Porque ... porque ...» evita la combinación algo pesada de «Porque, si...» con «pues». La nota se conserva intacta porque documenta adecuadamente la literalidad de ἴχνος.'
