  yaml_path: translation/deuterocanon/sirach/003/029.yaml
  text: The heart of the wise understands the sayings of the wise[b][a], and an attentive ear rejoices in wisdom.
  footnotes:
  - marker: a
    text: Hebrew 'sayings' could also be rendered 'proverbs' or 'parables'; the Greek parallel has 'parable' in the singular.
    reason: lexical_alternative
  - marker: b
