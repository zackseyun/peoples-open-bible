translation:
  language: es
  text: Sus enemigos han llegado a ser la cabeza; sus adversarios prosperan[a], porque Yahvé la ha afligido a causa de la multitud de sus transgresiones. Sus pequeños[b] han ido al cautiverio delante del adversario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están a gusto» o «viven seguros» para «prosperan». El verbo hebreo puede expresar también tranquilidad o seguridad, además de prosperidad.
    reason: lexical_alternative
  - marker: b
    text: O «sus niños» o «sus infantes». El término hebreo puede referirse a niños pequeños y subraya su vulnerabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרֶיהָ
  english_pob_choice: her foes
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus adversarios
  - sus opresores
  lexicon: HALOT
  rationale: En este contexto, צַר expresa hostilidad enemiga. «Sus enemigos» es natural en español y conserva el sentido bélico y relacional del hebreo.
- source_word: לְרֹאשׁ
  english_pob_choice: have become the head
  chosen_spanish: han llegado a ser la cabeza
  alternatives_spanish:
  - están a la cabeza
  - han llegado a ser jefes
  lexicon: HALOT
  rationale: La expresión hebrea conserva la imagen de «cabeza» como posición de dominio. «Han llegado a ser la cabeza» mantiene esa metáfora sin volverse opaca en español.
- source_word: אֹיְבֶיהָ
  english_pob_choice: her enemies
  chosen_spanish: sus adversarios
  alternatives_spanish:
  - sus enemigos
  - los que la odian
  lexicon: HALOT
  rationale: El paralelo del primer miembro favorece una segunda designación hostil. «Adversarios» es una alternativa válida y evita repetir exactamente el mismo sustantivo, aunque el hebreo sí repite la idea enemiga.
- source_word: שָׁלוּ
  english_pob_choice: prosper
  chosen_spanish: prosperan
  alternatives_spanish:
  - están a gusto
  - viven seguros
  lexicon: HALOT
  rationale: El verbo puede implicar tranquilidad, seguridad o prosperidad. Dado el contraste de reversa de fortuna en el verso, «prosperan» comunica bien el estado favorable de los enemigos sin perder el matiz de bienestar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio según la convención del proyecto, en lugar de sustituirlo por un título. «Yahvé» refleja el Tetragrámaton de manera auditable.
- source_word: הוֹגָהּ
  english_pob_choice: has afflicted her
  chosen_spanish: la ha afligido
  alternatives_spanish:
  - le ha causado dolor
  - la ha hecho sufrir
  lexicon: HALOT
  rationale: El hifil de יגה expresa causar aflicción o dolor. «La ha afligido» conserva la fuerza causal y es idiomático en español.
- source_word: עַל רֹב פְּשָׁעֶיהָ
  english_pob_choice: for the multitude of her transgressions
  chosen_spanish: a causa de la multitud de sus transgresiones
  alternatives_spanish:
  - por la multitud de sus rebeliones
  - por sus muchas transgresiones
  lexicon: HALOT
  rationale: «רֹב» indica abundancia o multitud, y פֶּשַׁע tiene el peso de transgresión/rebelión. La formulación elegida conserva la relación causal y el tono forense/covenantal.
- source_word: עוֹלָלֶיהָ
  english_pob_choice: her children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus pequeños
  - sus niños
  lexicon: HALOT
  rationale: Aunque el término puede referirse a pequeños o infantes, aquí la equivalencia amplia «sus hijos» mantiene la referencia vulnerable sin precisar más de lo que el verso exige.
- source_word: שְׁבִי
  english_pob_choice: into captivity
  chosen_spanish: al cautiverio
  alternatives_spanish:
  - a la cautividad
  - como cautivos
  lexicon: HALOT
  rationale: El sustantivo denota el estado de cautiverio/exilio. «Al cautiverio» funciona naturalmente con «han ido» y conserva el resultado de ser llevados lejos.
- source_word: לִפְנֵי צָר
  english_pob_choice: before the foe
  chosen_spanish: delante del adversario
  alternatives_spanish:
  - ante el enemigo
  - frente al enemigo
  lexicon: HALOT
  rationale: La imagen espacial hebrea de ir «delante de» un enemigo sugiere ser conducidos bajo su poder. «Delante del adversario» preserva esa imagen sin añadir detalles no explícitos.
theological_decisions:
- issue: Atribución de la aflicción a Yahvé junto con la culpa de Jerusalén
  english_pob_reading: because Yahweh has afflicted her for the multitude of her transgressions
  chosen_spanish_reading: porque Yahvé la ha afligido a causa de la multitud de sus transgresiones
  alternative_spanish_readings:
  - porque Yahvé le ha causado dolor por la multitud de sus transgresiones
  - porque Yahvé la ha hecho sufrir por sus muchas transgresiones
  rationale: Se conserva tanto la agencia divina como la causa moral humana. El español no suaviza la atribución directa a Yahvé ni diluye el nexo causal con las transgresiones.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica del texto sin resolverla artificialmente'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo masorético y concuerda con el audit trail inglés de la POB en las decisiones principales: metáfora de «cabeza», verbo de prosperidad/seguridad, nombre divino Yahvé, aflicción causal y cautiverio delante del enemigo. No se registran revisiones previas que requieran ajuste adicional.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para el Tetragrámaton.
  - «Transgresiones» preserva el matiz de פֶּשַׁע como infracción/covennantal rebellion sin forzar una paráfrasis.
  - «Adversario»/«enemigo» se usan para reflejar el paralelismo del hebreo sin perder naturalidad en español.
  - La puntuación reproduce el paralelismo del verso y mantiene la división de miembros poéticos.
