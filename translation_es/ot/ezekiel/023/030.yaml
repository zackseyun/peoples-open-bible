translation:
  language: es
  text: Estas cosas se te hacen por tu prostitución tras las naciones, porque te contaminaste con sus ídolos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גִּלּוּלִים es un término despectivo para “ídolos”; puede parafrasearse como “ídolos inmundos” o “ídolos de estiércol”.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשֹׂה
  english_pob_choice: are done
  chosen_spanish: se hacen
  alternatives_spanish:
  - te son hechas
  - se han hecho
  lexicon: HALOT
  rationale: El hebreo expresa aquí una acción de juicio que recae sobre la destinataria; en español, la pasiva refleja 'se hacen' comunica con naturalidad que 'estas cosas' le sobrevienen sin introducir un sujeto no expresado en el verso.
- source_word: אֵלֶּה
  english_pob_choice: These things
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Estas
  - Esto
  lexicon: HALOT
  rationale: El demostrativo plural remite a los castigos/juicios inmediatamente mencionados. 'Estas cosas' conserva el plural y suena claro en español.
- source_word: לָךְ
  english_pob_choice: to you
  chosen_spanish: contra ti
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: HALOT
  rationale: Aunque la preposición básica es 'a/para ti', en este contexto de juicio el efecto sobre la destinataria es adversativo. 'Contra ti' refleja el uso contextual del pasaje sin borrar el valor relacional del pronombre.
- source_word: בִּזְנוֹתֵךְ
  english_pob_choice: because of your prostitution
  chosen_spanish: por tus prostituciones
  alternatives_spanish:
  - a causa de tu prostitución
  - por tu prostitución
  lexicon: HALOT
  rationale: Se preserva la metáfora sexual de infidelidad con un plural que puede reflejar el matiz repetido/intensivo del hebreo. 'Prostituciones' mantiene el tono figurado fuerte sin suavizarlo a 'infidelidad'.
- source_word: אַחֲרֵי גוֹיִם
  english_pob_choice: after the nations
  chosen_spanish: tras las naciones
  alternatives_spanish:
  - después de las naciones
  - siguiendo a las naciones
  lexicon: HALOT
  rationale: '''Tras'' reproduce de manera idiomática en español la idea de ir detrás de otras naciones/pueblos, conservando la metáfora de seguimiento del hebreo ''después de''.'
- source_word: גוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: '''Naciones'' es la equivalencia más directa y contextual en Ezequiel para los pueblos circundantes cuya conducta fue seguida.'
- source_word: נִטְמֵאת
  english_pob_choice: you defiled yourself
  chosen_spanish: te contaminaste
  alternatives_spanish:
  - te volviste impura
  - fuiste contaminada
  lexicon: HALOT
  rationale: El nifal de טמא puede expresar quedar/volverse impuro; en español 'te contaminaste' mantiene tanto el resultado de impureza como la responsabilidad implicada en el acto idolátrico.
- source_word: בְּגִלּוּלֵיהֶם
  english_pob_choice: with their idols
  chosen_spanish: con sus ídolos
  alternatives_spanish:
  - por sus ídolos
  - mediante sus ídolos
  lexicon: HALOT
  rationale: '''Con'' conserva la relación asociativa/instrumental del hebreo. ''Ídolos'' mantiene la referencia básica, mientras el tono despectivo del término hebreo se reserva para nota.'
theological_decisions:
- issue: Metáfora sexual de infidelidad/culto idolátrico
  english_pob_reading: because of your prostitution after the nations
  chosen_spanish_reading: por tus prostituciones tras las naciones
  alternative_spanish_readings:
  - por tu infidelidad tras las naciones
  - por tu idolatría tras las naciones
  rationale: Ezequiel usa deliberadamente lenguaje sexual para describir la traición pactual. La traducción conserva esa tensión en lugar de explicarla o atenuarla con un término más abstracto como 'infidelidad' o 'idolatría'.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Término despectivo גִּלּוּלִים
  english_pob_reading: idols
  chosen_spanish_reading: ídolos
  alternative_spanish_readings:
  - ídolos inmundos
  - ídolos de estiércol
  rationale: El hebreo usa un vocablo despreciativo para los ídolos. En el texto principal se mantiene 'ídolos' por claridad y legibilidad; el matiz peyorativo se documenta en nota para no forzar una paráfrasis áspera en la línea principal.
  doctrine_reference: 'Translation philosophy: readable modern Spanish, with auditable lexical notes for contemptuous terms'
translation_notes:
  revision_awareness: Se sigue de cerca el paquete fuente hebreo y la decisión inglesa de mantener la metáfora sexual y el valor despectivo de גִּלּוּלִים, pero se adapta la sintaxis al español natural con una pasiva refleja y un complemento adversativo contextual ('contra ti'). No hay revisiones previas aplicadas en el registro inglés; esta propuesta conserva la estructura causal y la acusación idolátrica del original.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma preferida del nombre divino en este proyecto; aquí no aparece en el verso.
  - '''Naciones'' se mantiene como equivalente de גוֹיִם en contexto profético-político.'
  - '''Ídolos'' se conserva en el cuerpo principal y el tono peyorativo se documenta en nota, siguiendo la transparencia del POB.'
  - La pasiva refleja 'se hacen' evita añadir un agente no expresado y suena natural en español bíblico contemporáneo.
