  yaml_path: translation/ot/judges/002/012.yaml
  text: And they abandoned Yahweh[a], the God of their fathers, who had brought them out from the land of Egypt, and went after other gods, from the gods of the peoples who were around them, and bowed down to them and provoked Yahweh to anger.
  footnotes:
