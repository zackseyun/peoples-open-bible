translation:
  language: es
  text: 'Cuando Yahvé[b] vio que se había apartado para mirar, Dios lo llamó de en medio de la zarza[a][c] y dijo: «¡Moisés, Moisés!». Y él dijo: «Heme aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de en medio de la zarza»; alternativamente, «desde dentro de la zarza».'
    reason: lexical_alternative
  - marker: b
    text: El nombre divino יְהוָה se traduce aquí como «Yahvé»; alternativamente, «Yahweh».
    reason: alternative_reading
  - marker: c
    text: «La zarza» puede entenderse más específicamente como una zarza espinosa.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto en forma transliterada, siguiendo la decisión auditada de no enmascarar el tetragrámaton con un título. En español bíblico amplio, «Yahvé» es la forma más natural y reconocible, mientras que «Yahweh» queda como alternativa menos idiomática.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - observó
  lexicon: HALOT
  rationale: El hebreo expresa observación visual en la secuencia narrativa; «vio» reproduce de manera directa y natural ese sentido sin debilitar la concreción del relato.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: 'Aquí introduce el contenido de lo que Yahvé vio: que Moisés se había apartado. En español, «vio que» conserva bien la relación de contenido y evita una paráfrasis más libre.'
- source_word: סָר
  english_pob_choice: had turned aside
  chosen_spanish: se había apartado
  alternatives_spanish:
  - se apartó
  - se desvió
  lexicon: HALOT
  rationale: El verbo significa apartarse o desviarse. El pluscuamperfecto español refleja bien la anterioridad de la acción de Moisés respecto al llamado divino, como en el auditorial inglés.
- source_word: לִרְאוֹת
  english_pob_choice: to look
  chosen_spanish: para mirar
  alternatives_spanish:
  - para ver
  - para observar
  lexicon: HALOT
  rationale: La idea de propósito se expresa con naturalidad por «para mirar», que transmite la intención de acercarse a examinar el fenómeno. «Para ver» sería posible, pero aquí «mirar» reproduce mejor la acción deliberada.
- source_word: וַיִּקְרָא אֵלָיו
  english_pob_choice: called to him
  chosen_spanish: lo llamó
  alternatives_spanish:
  - le llamó
  - lo llamó hacia sí
  - lo llamó a él
  lexicon: HALOT
  rationale: El hebreo incluye la dirección del llamado hacia Moisés. En español, «lo llamó» es claro y natural; el complemento locativo posterior («desde en medio de la zarza») ya completa la escena sin necesidad de sobrecargar la frase.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - lo divino
  lexicon: HALOT
  rationale: Se mantiene la traducción estándar de אֱלֹהִים como «Dios», respetando la continuidad narrativa con Yahvé sin fusionar indebidamente ambos nombres.
- source_word: מִתּוֹךְ
  english_pob_choice: from the midst of
  chosen_spanish: desde en medio de
  alternatives_spanish:
  - desde dentro de
  - de en medio de
  lexicon: HALOT
  rationale: «Desde en medio de» conserva la imagen espacial solemne del hebreo y suena natural en español. La alternativa «desde dentro de» es posible, pero pierde un poco la fuerza visual de la expresión.
- source_word: הַסְּנֶה
  english_pob_choice: the bush
  chosen_spanish: la zarza
  alternatives_spanish:
  - el arbusto
  - la zarza espinosa
  lexicon: HALOT
  rationale: La referencia al episodio de la zarza ardiente permite una designación tradicional y precisa en español. «Zarza» comunica el referente narrativo con más naturalidad que un término genérico como «arbusto».
- source_word: מֹשֶׁה מֹשֶׁה
  english_pob_choice: Moses, Moses!
  chosen_spanish: «¡Moisés, Moisés!»
  alternatives_spanish:
  - «Moisés, Moisés!»
  - «¡Moisés! ¡Moisés!»
  lexicon: HALOT
  rationale: La repetición vocativa expresa urgencia y cercanía personal. La coma reproduce la cadencia de llamada directa sin exagerar con dos exclamaciones separadas.
- source_word: הִנֵּנִי
  english_pob_choice: Here I am
  chosen_spanish: Heme aquí
  alternatives_spanish:
  - Aquí estoy
  - Aquí me tienes
  lexicon: HALOT
  rationale: «Heme aquí» es una fórmula bíblica digna y fiel para la respuesta de disponibilidad y presencia. Aunque «Aquí estoy» es más corriente, «Heme aquí» conserva mejor el tono solemne del intercambio.
theological_decisions:
- issue: Distinción entre יְהוָה y אֱלֹהִים en la misma frase
  english_pob_reading: Render יְהוָה as 'Yahweh' and אֱלֹהִים as 'God,' preserving the Hebrew distinction in English.
  chosen_spanish_reading: Se traduce יְהוָה como «Yahvé» y אֱלֹהִים como «Dios», manteniendo la distinción del hebreo.
  alternative_spanish_readings:
  - Traducir ambos como «Dios» por fluidez estilística
  - Usar «SEÑOR» para יְהוָה
  rationale: El texto hebreo distingue intencionalmente el nombre propio del Dios de Israel y el título genérico o designación divina. Conservar esa diferencia en español hace más transparente la fuente y sigue el principio POB de no enmascarar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor del final הִנֵּנִי como respuesta de presencia y disponibilidad
  english_pob_reading: Here I am
  chosen_spanish_reading: «Heme aquí»
  alternative_spanish_readings:
  - «Aquí estoy»
  - «Aquí me tienes»
  rationale: La expresión no es meramente locativa, sino una fórmula de respuesta que comunica disponibilidad ante quien llama. «Heme aquí» preserva ese tono bíblico y no lo reduce a una frase coloquial.
  doctrine_reference: 'DOCTRINE.md: Pragmatics of call-and-response formulas'
- issue: Referencia de 'la zarza' y su posible especificidad botánica
  english_pob_reading: '''The bush'' may more specifically denote a thornbush.'
  chosen_spanish_reading: Se mantiene «la zarza» en el texto principal.
  alternative_spanish_readings:
  - «la zarza espinosa»
  - «el arbusto espinoso»
  rationale: El hebreo admite la precisión botánica de una planta espinosa, pero el español bíblico conoce bien «zarza» como el referente tradicional de este episodio. Esa forma es suficientemente precisa y más reconocible para la lectura pública.
  doctrine_reference: 'DOCTRINE.md: Botanical referents and established biblical identifiers'
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada de alta concordancia: se preserva la distinción entre Yahvé y Dios, el matiz de anterioridad en «se había apartado», y la fórmula de respuesta «Heme aquí». No se requirieron cambios respecto al último pase revisado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del tetragrámaton en el cuerpo del texto, conforme al criterio del proyecto.
  - «Dios» se reserva para אֱלֹהִים en la misma cláusula, evitando fusionar ambos términos.
  - 'La sintaxis española conserva el orden narrativo del hebreo sin calco innecesario: visión, llamada, respuesta.'
  - La nota sobre la zarza se ancla en el término principal porque el español puede sugerir de modo natural la posible especificación botánica sin alterar el texto base.
  - La respuesta «Heme aquí» mantiene el registro bíblico-digno requerido para lectura eclesial en español.
