translation:
  language: es
  text: Y Jeremías se lamentó por Josías, y todos los cantores y cantoras hablaron de Josías en sus lamentaciones hasta hoy. Y las establecieron como estatuto en Israel; y he aquí, están escritas en las Lamentaciones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escritas en las lamentaciones», si la frase se refiere en general a cantos fúnebres y no a una colección específica titulada Lamentaciones.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְקוֹנֵן
  english_pob_choice: lamented
  chosen_spanish: se lamentó
  alternatives_spanish:
  - entonó un lamento
  - compuso un lamento
  - gimió por
  lexicon: HALOT
  rationale: קוֹנֵן expresa hacer o pronunciar un lamento fúnebre. «Se lamentó» conserva el sentido de duelo y funciona de manera natural en español sin decidir indebidamente si Jeremías compuso o solo recitó el lamento.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: En contexto de duelo por una persona fallecida, «por Josías» es la forma española más natural y mantiene la relación de lamento dirigida al rey muerto.
- source_word: הַשָּׁרִים וְהַשָּׁרוֹת
  english_pob_choice: the male singers and female singers
  chosen_spanish: todos los cantores y cantoras
  alternatives_spanish:
  - los cantores, tanto hombres como mujeres
  - los cantores y las cantoras
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente masculino y femenino. «Cantores y cantoras» preserva esa distinción; «todos» refleja כָּל sin sobrecargar la frase.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: spoke of
  chosen_spanish: hablaron de
  alternatives_spanish:
  - dijeron
  - cantaron de
  - mencionaron
  lexicon: HALOT
  rationale: Aunque el verbo es literalmente «dijeron», en este contexto de cantores y lamentaciones comunica la tradición verbal/cantada sobre Josías. «Hablaron de» mantiene la referencia amplia sin añadir una precisión no sustentada por el hebreo.
- source_word: בְּקִינוֹתֵיהֶם
  english_pob_choice: in their laments
  chosen_spanish: en sus lamentaciones
  alternatives_spanish:
  - en sus endechas
  - en sus lamentos
  lexicon: HALOT
  rationale: קִינוֹת son lamentaciones fúnebres. «Lamentaciones» es claro, digno y corresponde al registro del pasaje; «endechas» sería más tradicional pero menos transparente para lectores modernos.
- source_word: עַד הַיּוֹם
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: «Hasta hoy» reproduce de forma natural la marca de continuidad histórica hasta el tiempo del narrador.
- source_word: וַיִּתְּנוּם לְחֹק
  english_pob_choice: They made them a statute
  chosen_spanish: Y las establecieron por estatuto
  alternatives_spanish:
  - y las hicieron estatuto
  - y las pusieron por ley
  lexicon: HALOT
  rationale: El pronombre plural probablemente remite a las lamentaciones/cantos. «Establecieron por estatuto» conserva la fuerza de חֹק como disposición fija sin obligar a una formulación jurídica más pesada que la del hebreo.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - para Israel
  - sobre Israel
  lexicon: HALOT
  rationale: Con חֹק, עַל funciona aquí como esfera o ámbito de aplicación. «En Israel» es idiomático y fiel al sentido contextual.
- source_word: וְהִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: y he aquí, están
  alternatives_spanish:
  - y ved, están
  - y he aquí que están
  lexicon: HALOT
  rationale: «Y he aquí» preserva la deixis enfática del hebreo. «Están» sigue el valor presentativo del texto.
- source_word: כְּתוּבִים עַל הַקִּינוֹת
  english_pob_choice: written in the Laments
  chosen_spanish: escritas en las Lamentaciones
  alternatives_spanish:
  - escritas en las lamentaciones
  - registradas en las lamentaciones
  lexicon: HALOT
  rationale: El inglés POB preserva la posible lectura de un título de colección. En español, «las Lamentaciones» mantiene esa opción; el femenino plural concuerda con el referente implícito de las cosas escritas.
theological_decisions:
- issue: ¿Las ‘Lamentaciones’ son un título de colección o una referencia genérica a cantos fúnebres?
  english_pob_reading: The Laments / Or 'written in the laments,' if the phrase refers generically to lament songs rather than to a specific collection titled Laments.
  chosen_spanish_reading: «las Lamentaciones», con posibilidad de lectura genérica como lamentaciones/cantos fúnebres.
  alternative_spanish_readings:
  - «las lamentaciones» en sentido genérico
  - «entre las endechas»
  rationale: El hebreo puede aludir a una colección conocida o de manera más general a cantos de duelo. La redacción principal conserva la mayúscula de título por fidelidad al audit trail inglés, mientras que la opción genérica queda sugerida por la propia forma española y se reconoce en nota.
  doctrine_reference: Ninguna doctrina en disputa; decisión de crítica/lectura textual y de género literario.
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente: se mantuvo el tiempo pasado narrativo («hablaron») y la separación entre la cláusula histórica principal y la frase presentativa final con «y he aquí». Se conservó la ambigüedad documentada sobre si ‘las Lamentaciones’ es título de colección o designación genérica.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención POB cuando aparezca el nombre divino; aquí no ocurre.
  - Se preservó el paralelismo masculino/femenino con «cantores y cantoras» para reflejar el hebreo.
  - Se evitó «SEÑOR» y «cristianizar» el registro del pasaje; el texto permanece histórico y literario.
  - «Lamentaciones» se capitaliza solo en el texto principal para señalizar la posible lectura como nombre de colección; la nota ofrece la alternativa genérica.
