translation:
  language: es
  text: 'Yo digo a Yahvé[a]: «Mi refugio y mi fortaleza, mi Dios, en quien confío».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמַר
  english_pob_choice: I say
  chosen_spanish: Yo digo
  alternatives_spanish:
  - Diré
  - Yo diré
  lexicon: HALOT
  rationale: El imperfecto qal de אמר admite valor presente o futuro. En este testimonio poético, el presente «digo» expresa una confesión actual y continua sin añadir futuridad no exigida por el hebreo.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al Señor
  lexicon: HALOT
  rationale: La preposición ל marca aquí el destinatario de la declaración. Según el criterio del proyecto, יהוה se vierte como «Yahvé», conservando el nombre del pacto en lugar de ocultarlo con un título.
- source_word: יהוה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Es el nombre propio del pacto. En español, «Yahvé» mantiene la transparencia auditiva y sigue el criterio del proyecto para YHWH.
- source_word: מַחְסִי
  english_pob_choice: my refuge
  chosen_spanish: mi refugio
  alternatives_spanish:
  - mi asilo
  - mi abrigo
  lexicon: HALOT
  rationale: מַחְסֶה/מַחְסִי designa un lugar de protección o refugio. «Refugio» es el equivalente natural y preciso en español bíblico contemporáneo.
- source_word: וּמְצוּדָתִי
  english_pob_choice: and my fortress
  chosen_spanish: y mi fortaleza
  alternatives_spanish:
  - y mi baluarte
  - y mi fortín
  lexicon: HALOT
  rationale: מְצוּדָה puede ser «fortaleza» o «baluarte». «Fortaleza» conserva bien la imagen defensiva y resulta claro para el lector español.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  lexicon: HALOT
  rationale: El sufijo de primera persona hace explícita la confesión personal. «Mi Dios» es la forma directa y fiel en español.
- source_word: אֶבְטַח
  english_pob_choice: I trust
  chosen_spanish: confío
  alternatives_spanish:
  - me refugio
  - deposito mi confianza
  lexicon: HALOT
  rationale: בטח expresa confianza, seguridad y dependencia. En español, «confío» comunica de manera natural esa confianza estable sin sobrecargar el verbo con matices ajenos.
- source_word: בּוֹ
  english_pob_choice: in whom
  chosen_spanish: en quien
  alternatives_spanish:
  - en él
  lexicon: HALOT
  rationale: El sufijo masculino singular se refiere a «mi Dios». «En quien» reproduce bien la relación relativa e integra con naturalidad la cláusula final en español.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo usa el Tetragrámaton directamente. La decisión del proyecto en español es preservarlo como «Yahvé» en vez de sustituirlo por un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el estado de revisión más reciente: no se registran cambios pendientes y la concordancia de auditoría es alta.'
  spanish_consistency_notes:
