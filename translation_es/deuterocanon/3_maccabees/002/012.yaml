translation:
  language: es
  text: Pero mira ahora[a], santo Rey, por causa de nuestros muchos y grandes pecados somos oprimidos, y hemos sido sometidos a nuestros enemigos, y hemos quedado en debilidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he aquí ahora, santo Rey».'
    reason: alternative_reading
  - marker: b
    text: El griego usa un plural, literalmente «en debilidades», para un estado de debilidad o impotencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold / look
  chosen_spanish: mira ahora
  alternatives_spanish:
  - he aquí ahora
  - mira
  lexicon: LSJ
  rationale: ἰδοὺ introduce una exhortación enfática para llamar la atención. En español, «mira ahora» conserva la fuerza deíctica y la inmediatez sin sonar arcaico; «he aquí» sería más solemne pero menos natural en lectura pública moderna.
- source_word: ἅγιε Βασιλεῦ
  english_pob_choice: holy King
  chosen_spanish: santo Rey
  alternatives_spanish:
  - Rey santo
  - Rey sagrado
  lexicon: LSJ
  rationale: El vocativo dirige la oración a Dios y une santidad con realeza. «Santo Rey» mantiene el orden y la sobriedad del griego; «sagrado» sería más pesado y menos bíblico en español.
- source_word: διὰ τὰς πολλὰς καὶ μεγάλας ἡμῶν ἁμαρτίας
  english_pob_choice: because of our many and great sins
  chosen_spanish: por causa de nuestros muchos y grandes pecados
  alternatives_spanish:
  - a causa de nuestros muchos y grandes pecados
  - por nuestros muchos y graves pecados
  lexicon: LSJ
  rationale: διά con acusativo expresa causa. Se conserva la doble cualidad, «muchos» y «grandes», sin reducir «μεγάλας» a «graves», porque el griego enfatiza magnitud además de gravedad moral.
- source_word: καταπονούμεθα
  english_pob_choice: we are being oppressed
  chosen_spanish: somos oprimidos
  alternatives_spanish:
  - estamos siendo oprimidos
  - somos aplastados
  lexicon: LSJ
  rationale: El verbo expresa estar bajo carga opresiva o ser abrumados por trato duro. «Somos oprimidos» reproduce bien el sentido pasivo y el contexto político/nacional sin añadir matices excesivos.
- source_word: ὑπετάγημεν
  english_pob_choice: we have been subjected
  chosen_spanish: hemos sido sometidos
  alternatives_spanish:
  - fuimos sometidos
  - hemos quedado sujetos
  lexicon: LSJ
  rationale: El pasivo indica quedar bajo autoridad ajena. «Hemos sido sometidos» es idiomático y mantiene la pasividad resultante; «subyugados» sería posible, pero más intenso de lo que exige el texto.
- source_word: τοῖς ἐχθροῖς ἡμῶν
  english_pob_choice: to our enemies
  chosen_spanish: a nuestros enemigos
  alternatives_spanish:
  - a nuestros adversarios
  - bajo nuestros enemigos
  lexicon: LSJ
  rationale: El dativo con ὑποτάσσω marca a quienes ejercen la sujeción. En español, la relación se expresa naturalmente con «a»; no se necesita un giro más duro para conservar el sentido.
- source_word: παρείμεθα
  english_pob_choice: we are left
  chosen_spanish: quedamos
  alternatives_spanish:
  - nos hemos quedado
  - hemos sido dejados
  lexicon: LSJ
  rationale: La forma verbal indica un estado resultante de ser dejados o abandonados. «Quedamos» comunica ese estado de manera breve y natural; la pasiva explícita sonaría forzada aquí.
- source_word: ἐν ἀδυναμίαις
  english_pob_choice: in weakness
  chosen_spanish: en debilidad
  alternatives_spanish:
  - en debilidades
  - en impotencia
  - en flaqueza
  lexicon: LSJ
  rationale: Aunque el plural griego puede sugerir un estado de debilidad o impotencia, el español prefiere el singular colectivo «debilidad». Se conserva el alcance general sin convertirlo en una pluralidad extraña.
theological_decisions:
- issue: Vocativo reverente dirigido a Dios
  english_pob_reading: The verse is a prayerful appeal to the holy King, rendered without extra liturgical archaism.
  chosen_spanish_reading: «santo Rey» como vocativo directo a Dios, con puntuación que marca la invocación.
  alternative_spanish_readings:
  - «oh santo Rey»
  - «Rey santo» con tono más litúrgico
  rationale: El griego presenta una apelación directa y reverente. El español mantiene la dirección a Dios sin añadir fórmulas devocionales que el texto no exige.
  doctrine_reference: 'DOCTRINE.md: preserve theological weight while avoiding unnecessary archaism'
- issue: Pluralidad de ἀδυναμίαις
  english_pob_reading: Greek 'in weaknesses,' a plural expression for a state of weakness or helplessness.
  chosen_spanish_reading: 'Se refleja como un estado general: «en debilidad».'
  alternative_spanish_readings:
  - «en debilidades»
  - «en impotencia»
  rationale: El plural griego puede sonar extraño en español si se traduce literalmente. El singular colectivo conserva el valor semántico de estado continuo de incapacidad sin perder la tensión del original.
  doctrine_reference: LSJ / uso idiomático español
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió una forma más formal para ἰδοὺ y ajustó la puntuación; en español se buscó un equilibrio equivalente entre formalidad y naturalidad, sin perder la apelación urgente ni la cadencia oracional del griego.
  spanish_consistency_notes:
  - Se mantuvo el vocativo reverente sin añadir títulos doctrinales no presentes en el texto.
  - 'Se conservaron los cuatro movimientos del griego: apelación, causa, opresión/sujeción y estado de debilidad.'
  - Se evitó traducir mecánicamente el plural ἀδυναμίαις con un plural español poco natural, pero se documentó la alternativa en nota.
  - Se usó terminología bíblica clara y pública para una lectura eclesial contemporánea.
