translation:
  language: es
  text: con lo que el segador no ha llenado su mano, ni el que recoge gavillas sus brazos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «su seno», «su regazo» o «el pliegue de su ropa»: el lugar donde se sostienen las gavillas reunidas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁלֹּא
  english_pob_choice: with which ... not
  chosen_spanish: con lo que ... no
  alternatives_spanish:
  - que ... no
  - con lo cual ... no
  lexicon: HALOT
  rationale: 'La construcción relativa con negación retoma naturalmente la imagen del verso anterior: es hierba de la que ningún segador puede llenarse. «Con lo que ... no» conserva la relación instrumental/contenido sin forzar el español.'
- source_word: מִלֵּא
  english_pob_choice: has filled
  chosen_spanish: ha llenado
  alternatives_spanish:
  - llena
  - llenó
  lexicon: HALOT
  rationale: 'El perfecto expresa el resultado característico en la imagen: el segador no ha logrado colmar su mano. «Ha llenado» sigue el valor resultativo del original con español natural.'
- source_word: כַפּוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su palma
  lexicon: HALOT
  rationale: כַּף puede referir la palma de la mano; en español «mano» comunica mejor la imagen de trabajo agrícola y mantiene la concreción. Se conserva la opción más idiomática sin perder el sentido corporal.
- source_word: קוֹצֵר
  english_pob_choice: the reaper
  chosen_spanish: el segador
  alternatives_spanish:
  - el que siega
  - el cosechador
  lexicon: HALOT
  rationale: Es un participio sustantivado del que corta la mies. «Segador» es el equivalente más directo y natural en español bíblico actual para esta figura agrícola.
- source_word: וְחִצְנוֹ
  english_pob_choice: his arms
  chosen_spanish: sus brazos
  alternatives_spanish:
  - su seno
  - su regazo
  - el pliegue de su ropa
  lexicon: HALOT
  rationale: En este contexto la palabra alude al lugar donde se sostienen las gavillas contra el cuerpo. La POB inglesa opta por «his arms»; en español «sus brazos» transmite la imagen de sostener la mies, aunque se preserva la alternativa más literal en nota.
- source_word: מְעַמֵּר
  english_pob_choice: the one who gathers sheaves
  chosen_spanish: el que recoge gavillas
  alternatives_spanish:
  - el que junta gavillas
  - el que amontona gavillas
  lexicon: HALOT
  rationale: El participio denota reunir en gavillas o montones. «El que recoge gavillas» explicita la acción para el lector moderno y mantiene el paralelismo agrícola del verso.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto hebreo y el audit trail inglés: conserva la relación relativa «con lo que ... no», el perfecto resultativo en «ha llenado», y la imagen agrícola concreta. La principal decisión interpretativa es renderizar חִצְנוֹ como «sus brazos» en el cuerpo del verso, dejando las alternativas literales en nota para no ocultar la tensión léxica del término.'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Segador» y «gavillas» mantienen el registro agrícola bíblico sin arcaísmos innecesarios.
  - La nota preserva la ambigüedad de חִצְנוֹ sin reemplazarla por una sola solución cerrada.
