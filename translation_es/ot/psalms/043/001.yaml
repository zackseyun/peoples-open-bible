translation:
  language: es
  text: Hazme justicia[a], Dios, y defiende mi causa contra una nación infiel; líbrame del hombre engañoso e injusto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «júzgame a mi favor»; hebreo, en sentido forense, pedir una sentencia favorable.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁפְטֵנִי
  english_pob_choice: Vindicate me
  chosen_spanish: Hazme justicia
  alternatives_spanish:
  - Vindícame
  - Júzgame favorablemente
  lexicon: HALOT
  rationale: En un contexto de plea psalm, שפט con objeto personal pide una decisión favorable en un marco jurídico. «Hazme justicia» comunica bien esa idea en español sin perder la dimensión forense; «vindícame» sería más literal, pero menos natural para muchos lectores.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡oh, Dios!
  lexicon: HALOT
  rationale: Es un vocativo en oración directa. El español litúrgico y bíblico admite «oh Dios» con claridad y dignidad.
- source_word: וְרִיבָה רִיבִי
  english_pob_choice: and plead my cause
  chosen_spanish: y defiende mi causa
  alternatives_spanish:
  - y alega mi causa
  - y contiende por mi causa
  - y lleva mi caso
  lexicon: HALOT
  rationale: El hebreo usa el idiomatismo legal ריב + sustantivo cognado. «Defiende mi causa» preserva el sentido jurídico y suena natural en español. No se quiso perder la imagen de litigio, aunque la expresión es menos calcada que una traducción palabra por palabra.
- source_word: מִגּוֹי לֹא חָסִיד
  english_pob_choice: against an unfaithful nation
  chosen_spanish: contra una nación infiel
  alternatives_spanish:
  - contra una nación sin fidelidad de pacto
  - contra una nación impía
  - contra una nación no leal
  lexicon: HALOT
  rationale: חָסִיד, negado, apunta a la falta de lealtad/fidelidad vinculada a חסד. «Infiel» conserva bien esa tensión relacional y ética en español, y corresponde al sentido escogido por la POB inglesa. «Impía» sería demasiado teológica en otra dirección.
- source_word: מֵאִישׁ מִרְמָה וְעַוְלָה
  english_pob_choice: from the deceitful and unjust man
  chosen_spanish: del hombre engañoso e injusto
  alternatives_spanish:
  - del hombre de engaño e injusticia
  - del hombre fraudulento e injusto
  - del hombre mentiroso e inicuo
  lexicon: HALOT
  rationale: El hebreo caracteriza a una sola persona con dos sustantivos/rasgos. «Engañoso e injusto» reproduce esa caracterización de manera natural y mantiene el foco singular del texto.
- source_word: תְפַלְּטֵנִי
  english_pob_choice: deliver me
  chosen_spanish: líbrame
  alternatives_spanish:
  - rescátame
  - sálvame
  - sácame a salvo
  lexicon: HALOT
  rationale: El piel de פלט expresa sacar a alguien de peligro. «Líbrame» es una fórmula española clásica y formal que corresponde bien al registro del versículo y a la revisión inglesa más reciente («deliver me»).
theological_decisions:
- issue: Cómo rendir חָסִיד en una negación
  english_pob_reading: unfaithful; Hebrew "a nation not faithful/loyal"
  chosen_spanish_reading: nación infiel
  alternative_spanish_readings:
  - nación impía
  - nación sin lealtad de pacto
  - nación sin fidelidad
  rationale: La POB inglesa opta por «unfaithful» para preservar la dimensión de lealtad relacional/covenantal. «Infiel» transmite bien esa falta de fidelidad en español sin reducirla meramente a impiedad moral. Se evita «impía» porque desplaza el énfasis desde fidelidad/loyalty hacia irreligiosidad general.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del auditorio inglés: se prefirió «líbrame» para corresponder al verbo final con un registro más formal. También se mantuvo el contraste jurídico completo del versículo: petición de juicio favorable, defensa de causa y liberación final.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» en vocativo, sin reemplazarlo por una forma eufemística.
  - Se conservó el paralelismo legal del hebreo con verbos jurídicos naturales en español.
  - «Infiel» se usó como equivalente principal de חָסִיד negado, preservando la tensión de fidelidad/loyalty documentada en el aparato inglés.
