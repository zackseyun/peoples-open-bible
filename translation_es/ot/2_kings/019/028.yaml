translation:
  language: es
  text: Porque tu furor contra mí y tu complacencia[a] han subido a mis oídos, pondré mi garfio en tu nariz y mi freno en tus labios, y te haré volver por el camino por donde viniste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu arrogancia' o 'tu autoconfianza'. El término hebreo denota seguridad o tranquilidad confiada; aquí, en un contexto hostil, tiene un matiz de autosatisfacción culpable.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  - Por cuanto
  lexicon: HALOT
  rationale: Introduce la causa del juicio de manera natural en español y conserva el valor causal del hebreo.
- source_word: הִתְרַגֶּזְךָ אֵלַי
  english_pob_choice: your raging against me
  chosen_spanish: tu furor contra mí
  alternatives_spanish:
  - tu enfurecimiento contra mí
  - tu agitación contra mí
  - tu insolencia contra mí
  lexicon: HALOT
  rationale: El hitpael de רָגַז expresa agitación o furor hostil. 'Furor' conserva la intensidad y resulta idiomático en español sin debilitar la hostilidad dirigida contra Dios.
- source_word: שַׁאֲנַנְךָ
  english_pob_choice: your complacency
  chosen_spanish: tu complacencia
  alternatives_spanish:
  - tu arrogancia
  - tu seguridad confiada
  - tu autosuficiencia
  lexicon: HALOT
  rationale: El término apunta a una condición de tranquilidad o seguridad autoindulgente; en este contexto de reprensión, 'complacencia' conserva la base léxica y deja que el contexto aporte el tono censurador.
- source_word: עָלָה בְאָזְנָי
  english_pob_choice: have come up into my ears
  chosen_spanish: han subido hasta mis oídos
  alternatives_spanish:
  - han llegado a mis oídos
  - han ascendido a mis oídos
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea de algo que 'sube' hasta ser oído, en vez de sustituirla por una abstracción menos vívida.
- source_word: חַחִי
  english_pob_choice: my hook
  chosen_spanish: mi anzuelo
  alternatives_spanish:
  - mi gancho
  - mi aro
  - mi gancho de sujeción
  lexicon: HALOT
  rationale: Para el implemento de control sobre un captivo o animal, 'anzuelo' comunica la idea de gancho/aro de manera clara en español, aunque con un matiz un poco más gráfico. Se conserva la imagen de sometimiento.
- source_word: בְּאַפֶּךָ
  english_pob_choice: in your nose
  chosen_spanish: en tu nariz
  alternatives_spanish:
  - en tu hocico
  - en tu nariz/nostril
  lexicon: HALOT
  rationale: Se mantiene el sentido físico de אַף en la metáfora de dominio; 'nariz' es la forma natural en español para esta imagen corporal.
- source_word: מִתְגִּי
  english_pob_choice: my bit
  chosen_spanish: mi freno
  alternatives_spanish:
  - mi bocado
  - mi brida
  - mi freno de cabalgadura
  lexicon: HALOT
  rationale: Para el implemento que controla a un animal, 'freno' funciona con claridad en español y permite la pareja imagética con 'anzuelo'. Evita un tecnicismo menos transparente.
- source_word: בִּשְׂפָתֶיךָ
  english_pob_choice: in your lips
  chosen_spanish: en tus labios
  alternatives_spanish:
  - en tu boca
  - sobre tus labios
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'labios', en español 'labios' resulta natural y conserva la concreción del cuadro.
- source_word: וַהֲשִׁבֹתִיךָ
  english_pob_choice: I will turn you back
  chosen_spanish: te haré volver
  alternatives_spanish:
  - te haré regresar
  - te volveré atrás
  - te haré dar la vuelta
  lexicon: HALOT
  rationale: La forma causativa de שוב indica hacer volver; 'te haré volver' mantiene la agencia divina y suena natural en español.
- source_word: בַּדֶּרֶךְ אֲשֶׁר בָּאתָ בָּהּ
  english_pob_choice: by the way by which you came
  chosen_spanish: por el camino por donde viniste
  alternatives_spanish:
  - por el camino por el que viniste
  - por la misma ruta por la que viniste
  lexicon: HALOT
  rationale: Conserva la simetría del hebreo y su sentido de retorno por la misma ruta de entrada, usando una construcción clara y fluida en español.
theological_decisions:
- issue: Imagen antropomórfica de Dios que oye y restringe al rey asirio
  english_pob_reading: Preserve the anthropomorphic imagery ('into my ears,' 'my hook,' 'my bit') as stated in the Hebrew
  chosen_spanish_reading: Preservar la imagen corporal y de control ('hasta mis oídos', 'mi anzuelo', 'mi freno')
  alternative_spanish_readings:
  - Reducir a 'he oído' y 'te controlaré'
  - Suavizar la metáfora a un lenguaje puramente abstracto
  rationale: El hebreo usa imágenes corporales intensas para expresar conocimiento divino y humillación soberana del rey arrogante. Mantenerlas evita perder la fuerza profética del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Matiz de שַׁאֲנַנְךָ
  english_pob_reading: Render as 'your complacency' in the main text
  chosen_spanish_reading: tu complacencia
  alternative_spanish_readings:
  - tu arrogancia
  - tu autoconfianza
  - tu seguridad
  rationale: '''Complacencia'' refleja la base semántica de calma o seguridad y, en este contexto hostil, comunica adecuadamente la crítica. Se deja abierta la tensión entre seguridad y arrogancia sin imponer una sola interpretación.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto inglés auditado muestra acuerdo alto y ninguna revisión aplicada; se conservaron las decisiones léxicas principales del POB en español, con adaptación idiomática natural y sin desactivar la imaginería del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino cuando corresponde, pero en este versículo el hablante es Dios en primera persona, así que no se introduce el nombre explícito.
  - Se preservó la imagen concreta de oído, nariz/labios y retorno por el mismo camino, siguiendo la preferencia del POB por no desimaginar el hebreo.
  - Se evitó 'siervo' o fórmulas eclesiásticas no presentes en el texto; el registro permanece profético y sobrio.
