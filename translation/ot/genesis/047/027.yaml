theological_decisions:
- issue: Representative sense of 'Israel'
  chosen_reading: Retain 'Israel' in the main text while allowing the plural continuation to refer to his household/descendants.
  alternative_readings:
  - Render the subject as 'the Israelites' throughout
  - Render 'Israel' as 'Jacob'
  rationale: The verse begins with singular 'Israel' and then shifts to plural verbs describing the family. Keeping 'Israel' preserves the Hebrew wording and the narrative-theological pattern in which the patriarch stands for the covenant family.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
