translation:
  language: es
  text: 'Entonces Nehemías, el gobernador[a], y Esdras, el sacerdote y escriba, y los levitas que instruían al pueblo dijeron a todo el pueblo: «Este día es santo para Yahvé su Dios[b]. No hagan duelo ni lloren». Porque todo el pueblo lloraba al oír las palabras de la ley.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Tirshata», un título administrativo persa.
    reason: lexical_alternative
  - marker: b
    text: O «las palabras de la Torá».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתִּרְשָׁתָא
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el Tirshata
  lexicon: HALOT
  rationale: El término designa un cargo administrativo persa. En español, «gobernador» comunica mejor la función que una transliteración poco transparente como «Tirshata», aunque esta se mantiene como alternativa posible por fidelidad al título histórico.
- source_word: הַכֹּהֵן הַסֹּפֵר
  english_pob_choice: the priest and scribe
  chosen_spanish: el sacerdote y escriba
  alternatives_spanish:
  - el sacerdote escriba
  - el sacerdote, escriba
  lexicon: HALOT
  rationale: Los dos sustantivos son títulos en aposición para Esdras. Mantener ambos en español conserva su doble función sin fusionarlos indebidamente.
- source_word: הַלְוִיִּם הַמְּבִינִים אֶת־הָעָם
  english_pob_choice: the Levites who were instructing the people
  chosen_spanish: los levitas que instruían al pueblo
  alternatives_spanish:
  - los levitas que hacían entender al pueblo
  - los levitas que daban comprensión al pueblo
  lexicon: HALOT
  rationale: El participio hifil de בין expresa causar entendimiento o enseñar. «Instruían» es natural en español y conserva la función pedagógica del pasaje.
- source_word: הַיּוֹם קָדֹשׁ הוּא
  english_pob_choice: This day is holy
  chosen_spanish: Este día es santo
  alternatives_spanish:
  - Este día es sagrado
  - Hoy es santo
  lexicon: HALOT
  rationale: «Santo» reproduce el sentido cultual y religioso del hebreo y se ajusta bien al contexto de una asamblea dedicada a Yahvé.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: El nombre divino יהוה se vierte directamente como «Yahvé» según la terminología del proyecto, en lugar de ocultarlo con una sustitución como «SEÑOR».
- source_word: תִּתְאַבְּל֖וּ
  english_pob_choice: Do not mourn
  chosen_spanish: No se entristezcan
  alternatives_spanish:
  - No hagan duelo
  - No luchen con luto
  lexicon: HALOT
  rationale: El verbo indica luto o duelo, pero en español «no se entristezcan» comunica de forma natural la prohibición emocional inmediata sin perder el sentido de pena ritual del contexto. Aun así, «hacer duelo» sigue siendo una alternativa más literal.
- source_word: תִּבְכּ֑וּ
  english_pob_choice: weep
  chosen_spanish: lloren
  alternatives_spanish:
  - lloren en voz alta
  - prorrumpan en llanto
  lexicon: HALOT
  rationale: «Lloren» conserva el paralelismo con «no se entristezcan» y refleja con claridad el acto visible de llorar.
- source_word: כְּשָׁמְעָם
  english_pob_choice: as they heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyeron
  - mientras oían
  lexicon: HALOT
  rationale: La construcción temporal se expresa de manera natural con un infinitivo compuesto en español, sin perder la simultaneidad del llanto con la escucha.
- source_word: דִּבְרֵי הַתּוֹרָה
  english_pob_choice: the words of the law
  chosen_spanish: las palabras de la ley
  alternatives_spanish:
  - las palabras de la Torá
  - las palabras de la instrucción
  lexicon: HALOT
  rationale: En este contexto de lectura pública y alianza, «la ley» reproduce la opción de la POB en inglés y resulta clara para el lector general, aunque «Torá» sigue siendo una alternativa legítima si se desea resaltar el término técnico.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo contiene el Tetragrama. Conforme a la directriz del proyecto, se conserva el nombre divino en español como «Yahvé» en lugar de sustituirlo por una reverencia genérica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de תּוֹרָה en un acto de lectura pública
  english_pob_reading: the words of the law
  chosen_spanish_reading: las palabras de la ley
  alternative_spanish_readings:
  - las palabras de la Torá
  - las palabras de la instrucción
  rationale: Aunque תּוֹרָה puede significar «instrucción», en este marco de proclamación pública la lectura tradicional y más transparente es «ley». La alternativa «Torá» se preserva porque en español crea una ambigüedad útil entre el término técnico y su sentido general.
  doctrine_reference: HALOT; contexto narrativo de Nehemías 8
- issue: Tono de la prohibición en תִּתְאַבְּלוּ / תִּבְכּוּ
  english_pob_reading: Do not mourn or weep
  chosen_spanish_reading: No se entristezcan ni lloren
  alternative_spanish_readings:
  - No hagan duelo ni lloren
  - No se lamenten ni lloren
  rationale: 'La POB inglesa distingue dos acciones: duelo/mourning y llanto/weeping. En español, «entristecerse» comunica bien la afectación interior inmediata, mientras que «llorar» mantiene el gesto visible. Se deja constancia de que «hacer duelo» sería una alternativa más cercana al léxico ritual.'
  doctrine_reference: HALOT; paralelismo poético-semántico
translation_notes:
  revision_awareness: La versión inglesa más reciente permanece sin cambios y fue revisada con acuerdo alto; no hay correcciones aplicadas en la POB inglesa. Este borrador español sigue de cerca la decisión inglesa, pero ajusta la formulación para un español natural y lectura pública, conservando las alternativas documentadas donde el hebreo permite más de una solución.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme a la terminología del proyecto, no «SEÑOR».
  - Se mantiene el doble título de Esdras («sacerdote y escriba») sin compactarlo.
  - «La ley» se conserva como traducción principal de תּוֹרָה en este contexto narrativo, con nota alternativa a «Torá».
  - La pareja «no se entristezcan ni lloren» preserva el paralelismo hebreo entre duelo y llanto sin introducir formulaciones demasiado libres.
