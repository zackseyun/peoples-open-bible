  text: He went and found his corpse thrown on the road[a], with the donkey and the lion standing beside the corpse. The lion had not eaten the corpse[b], nor had it torn apart the donkey.
  footnotes:
  - marker: a
    text: Or 'body' or 'carcass' for 'corpse' (Hebrew נְבֵלָה); the Hebrew term is stark and emphasizes the reality of death.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'had not broken the donkey'; the sense in context is that the lion had not torn it apart or mauled it.
    reason: lexical_alternative
