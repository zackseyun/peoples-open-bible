- from: Entonces salió con tres mil soldados de a pie y cuatrocientos de a caballo.
  to: Entonces salió con tres mil soldados de infantería y cuatrocientos jinetes.
  rationale: Se sustituye la expresión elíptica «de a caballo» por «jinetes», que representa de manera explícita a los ἱππέων como personas montadas. También se ajusta «soldados de a pie» a «soldados de infantería» para lograr un español más natural y un paralelismo militar más claro, manteniendo intacto el sentido del griego y del POB inglés.
