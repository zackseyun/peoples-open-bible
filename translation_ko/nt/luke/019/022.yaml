    text: Or “By your own words I will judge you.”
    reason: lexical_alternative
  - marker: b
    text: 'Or “wicked servant.” Greek: δοῦλος; rendered “slave” here because the bonded status is contextually salient.'
    reason: alternative_reading
  - marker: c
    text: Or “taking what I did not deposit” for “lay down.”
    reason: lexical_alternative
  - marker: d
    text: Some English versions render the final clause “reaping where I did not sow,” but the Greek here is more literally “reaping what I did not sow.”
    reason: alternative_reading
