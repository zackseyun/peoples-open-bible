lexical_decisions:
- source_word: μὴ
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No seamos
  - No debemos ser
  lexicon: BDAG
  rationale: La negación imperativa-exhortativa del subjuntivo hortatorio se expresa de forma natural en español con «No seamos», manteniendo el tono exhortativo del griego.
- source_word: δειλανδρήσωμεν
  english_pob_choice: let us be cowardly
  chosen_spanish: seamos cobardes
  alternatives_spanish:
  - perdamos el ánimo
  - actuemos como cobardes
  - seamos pusilánimes
  lexicon: LSJ
  rationale: El verbo griego transmite la idea de mostrarse cobardes o falto[s] de valor; «seamos cobardes» conserva con claridad la fuerza moral de la exhortación sin suavizarla.
- source_word: πρὸς
  english_pob_choice: in
  chosen_spanish: al
  alternatives_spanish:
  - en
  - para
  - respecto de
  lexicon: BDAG
  rationale: Con acusativo, la preposición marca relación o ámbito. En español, «al demostrar» comunica de manera fluida el ámbito en el que no debe haber cobardía.
- source_word: τὴν ... ἀπόδειξιν
  english_pob_choice: demonstrating
  chosen_spanish: demostrar
  alternatives_spanish:
  - demostración
  - probar
  - exhibir
  lexicon: BDAG
  rationale: ἀπόδειξις significa demostración o prueba. El infinitivo sustantivado «demostrar» mantiene el sentido verbal y resulta natural en una exhortación directa.
- source_word: τῆς εὐσεβίας
  english_pob_choice: our piety
  chosen_spanish: nuestra piedad
  alternatives_spanish:
  - nuestra devoción
  - nuestra reverencia
  - nuestra piedad hacia Dios
  lexicon: BDAG
  rationale: En 4 Macabeos, εὐσέβεια se refiere a la devoción reverente a Dios expresada en conducta fiel. «Piedad» conserva mejor el registro bíblico y el matiz religioso que una paráfrasis más amplia.
theological_decisions:
- issue: εὐσέβεια en contexto de martirio y fidelidad a Dios
  english_pob_reading: piety
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - reverencia
  rationale: El término apunta a la fidelidad reverente a Dios, no solo a una religiosidad externa. «Piedad» mantiene ese campo semántico en español sin imponer una terminología confesional posterior.
  doctrine_reference: 'DOCTRINE.md: consistencia terminológica y fidelidad semántica al registro del texto'
- issue: ἀπόδειξις como acto público de evidencia o demostración
  english_pob_reading: demonstrating
  chosen_spanish_reading: demostrar
  alternative_spanish_readings:
  - hacer patente
  - probar
  rationale: El griego enfatiza el acto de mostrar con evidencia. «Demostrar» preserva esa fuerza pública y argumentativa mejor que una expresión más abstracta o más interpretativa.
  doctrine_reference: 'DOCTRINE.md: claridad moderna y equivalencia óptima'
translation_notes:
  revision_awareness: La revisión inglesa pasó de «proving our godliness» a «demonstrating our piety», privilegiando ἀπόδειξις como «demonstrating» y εὐσέβεια como «piety». La versión española sigue esa decisión revisada, manteniendo el matiz de demostración pública y la palabra «piedad» en un registro natural y bíblico.
  spanish_consistency_notes:
  - Se mantiene «piedad» como equivalente principal de εὐσέβεια en este contexto, en coherencia con la revisión inglesa y con el uso reverente del término en 4 Macabeos.
  - Se evita «Cristo», «Señor» u այլ terminología no presente en el griego; el texto no contiene referencias directas a nombres divinos que requieran ajuste terminológico.
  - «Cobardes» conserva el tono ético fuerte del verbo griego y corresponde al valor dado por el audit trail inglés.
