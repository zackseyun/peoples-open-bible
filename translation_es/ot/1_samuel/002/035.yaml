base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/002/035.yaml
  text: And I will raise up for myself a faithful priest[a], who will do according to what is in my heart and in my soul. And I will build for him a faithful house[b], and he will walk before my anointed all the days.
  footnotes:
