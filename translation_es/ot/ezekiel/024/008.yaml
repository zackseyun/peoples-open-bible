translation:
  language: es
  text: Para provocar la ira, para tomar venganza[a], he puesto su sangre[b] sobre una roca desnuda, para que no fuera cubierta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para vengar con venganza». El hebreo usa un infinitivo con un sustantivo cognado para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: «Su sangre» también puede sugerir, según el contexto, «su sangre derramada» o la culpa de sangre; pero el hebreo presenta literalmente «su sangre».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַעֲלוֹת
  english_pob_choice: to stir up
  chosen_spanish: para hacer subir
  alternatives_spanish:
  - para despertar
  - para provocar a subir
  lexicon: HALOT
  rationale: El infinitivo causativo de עלה con חֵמָה expresa que la ira es hecha surgir. En español, «hacer subir» conserva con transparencia la imagen verbal sin perder el sentido causativo.
- source_word: חֵמָה
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - cólera
  - ira ardiente
  lexicon: HALOT
  rationale: En contexto profético de juicio, la fuerza semántica apunta a una ira intensa. «Ira» es natural en español y suficientemente solemne; el matiz de intensidad queda reforzado por el infinitivo causativo y la repetición intensiva del verso.
- source_word: לִנְקֹם נָקָם
  english_pob_choice: to take vengeance
  chosen_spanish: para tomar venganza
  alternatives_spanish:
  - para vengar
  - para ejercer venganza
  - para vengarse
  lexicon: HALOT
  rationale: La combinación de infinitivo con sustantivo cognado intensifica la idea. «Tomar venganza» conserva mejor la fuerza formal y judicial del hebreo que un simple «vengar».
- source_word: נָתַתִּי
  english_pob_choice: I have set
  chosen_spanish: he puesto
  alternatives_spanish:
  - he colocado
  - he establecido
  - he dejado
  lexicon: HALOT
  rationale: Con complemento locativo, נתן significa «poner/colocar». «He puesto» es idiomático en español y mantiene la imagen de ubicar la sangre sobre la roca.
- source_word: דָּמָהּ
  english_pob_choice: her blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - la sangre de ella
  - su derramamiento de sangre
  - su sangre derramada
  lexicon: HALOT
  rationale: Se conserva la forma literal «su sangre» para preservar la imagen concreta del texto. En contexto puede implicar sangre derramada o culpa de sangre, pero el hebreo dice literalmente sangre.
- source_word: צְחִיחַ סָלַע
  english_pob_choice: a bare rock
  chosen_spanish: una roca desnuda
  alternatives_spanish:
  - una roca descubierta
  - una peña desnuda
  - una roca pelada
  lexicon: HALOT
  rationale: La expresión describe una superficie expuesta, sin cobertura. «Roca desnuda» reproduce la imagen de manera clara y natural en español.
- source_word: לְבִלְתִּי הִכָּסוֹת
  english_pob_choice: so that it would not be covered
  chosen_spanish: para que no fuera cubierta
  alternatives_spanish:
  - sin ser cubierta
  - para no ser cubierta
  - a fin de que no fuera cubierta
  lexicon: HALOT
  rationale: La construcción expresa propósito o resultado. «Para que no fuera cubierta» comunica bien el pasivo y la intención de dejar la sangre visible.
theological_decisions:
- issue: Acción judicial intencional de Dios en la exposición de la sangre
  english_pob_reading: The speaker intentionally exposes Jerusalem's blood as an act leading to wrath and vengeance.
  chosen_spanish_reading: El hablante expone intencionalmente la sangre de Jerusalén como acto judicial que conduce a ira y venganza.
  alternative_spanish_readings:
  - La frase describe solo el estado visible de la sangre sin subrayar la intención divina.
  - La imagen puede leerse de forma más general como sangre derramada en lugar de sangre expuesta por juicio.
  rationale: Los dos infinitivos finales y el verbo en primera persona indican intención y acto judicial, no solo descripción. La traducción conserva esa agencia divina sin ampliarla más allá del verso.
  doctrine_reference: Juicio divino y retribución en el contexto profético de Ezequiel
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de revisión indicó alta coincidencia y no requirió ajustes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma normal para el nombre divino cuando aparezca en el pasaje, aunque en este versículo no figura explícitamente.
  - «Ira» y «venganza» se conservan como vocablos judiciales fuertes, en línea con el tono profético del hebreo.
  - La imagen física de la sangre sobre una roca expuesta se preserva sin suavizarla hacia una paráfrasis moralizante.
