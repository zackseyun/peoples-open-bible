translation:
  language: es
  text: Y por tu espada vivirás, y servirás a tu hermano; pero cuando te libres[a], romperás su yugo de sobre tu cuello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando te inquietes». El verbo hebreo תָּרִיד es difícil; el contexto de romper el yugo favorece «cuando te libres», pero también es posible un sentido como «cuando te inquietes» o «cuando te vuelvas restivo».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַל / by
  english_pob_choice: And by
  chosen_spanish: Y por
  alternatives_spanish:
  - Y con
  - Y mediante
  lexicon: HALOT
  rationale: Con חַרְבְּךָ y תִחְיֶה, עַל expresa medio o instrumento. En español, «por» transmite con naturalidad ese valor instrumental sin perder la imagen del arma como medio de subsistencia.
- source_word: חַרְבְּךָ
  english_pob_choice: your sword
  chosen_spanish: tu espada
  alternatives_spanish:
  - tu arma
  lexicon: HALOT
  rationale: חֶרֶב es literalmente «espada». Mantener «espada» conserva la imagen concreta del texto hebreo mejor que generalizar a «arma».
- source_word: תִחְיֶה
  english_pob_choice: you shall live
  chosen_spanish: vivirás
  alternatives_spanish:
  - vivirás de ello
  - sobrevivirás
  lexicon: HALOT
  rationale: El imperfecto de חיה aquí describe el modo en que vivirá Esaú. «Vivirás» es natural en español y suficientemente fiel al sentido prospectivo del hebreo.
- source_word: וְאֶת אָחִיךָ תַּעֲבֹד
  english_pob_choice: and you shall serve your brother
  chosen_spanish: y servirás a tu hermano
  alternatives_spanish:
  - y estarás sujeto a tu hermano
  - y serás esclavo de tu hermano
  lexicon: HALOT
  rationale: עבד en qal significa «servir». «Servirás» mantiene la directitud del oráculo sin decidir más de lo que el hebreo explicita. No se impone «esclavo» porque el contexto inmediato habla de subordinación relacional, no necesariamente de esclavitud literal.
- source_word: כַּאֲשֶׁר תָּרִיד
  english_pob_choice: when you break loose
  chosen_spanish: cuando te libres
  alternatives_spanish:
  - cuando te inquietes
  - cuando te rebeles
  - cuando te hagas restivo
  lexicon: HALOT
  rationale: El verbo תָּרִיד es difícil y la POB inglesa preserva esa tensión con una nota de alternativa. En español, «cuando te libres» expresa la idea de soltarte o zafarte del dominio, manteniendo la relación con el yugo posterior, aunque otras lecturas como «cuando te inquietes» siguen siendo posibles.
- source_word: וּפָרַקְתָּ
  english_pob_choice: you shall break
  chosen_spanish: romperás
  alternatives_spanish:
  - quebrarás
  - arrancarás
  - sacudirás
  lexicon: HALOT
  rationale: פרק comunica romper o desatar con fuerza. «Romperás» conserva la imagen en español y se enlaza bien con el sustantivo «yugo».
- source_word: עֻלּוֹ
  english_pob_choice: his yoke
  chosen_spanish: su yugo
  alternatives_spanish:
  - su carga
  lexicon: HALOT
  rationale: עֹל es literalmente «yugo» y funciona como metáfora de dominio o servidumbre. Mantener «yugo» preserva la figura explícita del texto.
- source_word: מֵעַל צַוָּארֶךָ
  english_pob_choice: from off your neck
  chosen_spanish: de sobre tu cuello
  alternatives_spanish:
  - de tu cuello
  - de encima de tu cuello
  lexicon: HALOT
  rationale: מֵעַל añade la idea de «de sobre / de encima de». «De sobre tu cuello» conserva esa imagen corporal y la relación con el yugo sin volverla innecesariamente pesada en español.
theological_decisions:
- issue: Naturaleza de la relación futura entre Esaú y Jacob
  english_pob_reading: Render the oracle as political/social subjection followed by eventual revolt, without importing later theological conclusions about Edom beyond the verse itself.
  chosen_spanish_reading: Presentar el dicho como subordinación real seguida de liberación o sacudimiento del dominio, sin convertirlo en una conclusión doctrinal más amplia sobre Edom.
  alternative_spanish_readings:
  - servidumbre permanente
  - mera deferencia familiar
  rationale: El hebreo menciona servicio y luego ruptura del yugo, preservando una tensión entre sometimiento y liberación. La traducción española no debe resolver esa tensión ni absolutizarla más allá del versículo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La POB inglesa revisó la cláusula final para conservar la dificultad del verbo תָּרִיד y mantener la imagen del yugo. No se registraron cambios posteriores en la última pasada de revisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton cuando aparezca en el contexto inmediato, pero aquí no ocurre.
  - Se usa el tuteo singular coherente con el hebreo singular masculino.
  - Se conserva la metáfora de «yugo» para עֹל en lugar de suavizarla como «carga» para respetar el valor de dominio/servicio.
  - La nota de pie conserva la ambigüedad léxica documentada por la POB inglesa sin imponer una solución exclusiva.
