revisions:
- from: ¡Dichoso el hombre a quien Yahvé recordó con reprensión[a], y que fue apartado[b] de un camino malo por medio de un látigo[c], para ser limpiado de pecado[d], para que no aumente[e].
  to: Dichoso el hombre a quien Yahvé recordó con reprensión[a], y que fue apartado[b] de un mal camino con un azote[c], para ser limpiado de pecado[d], para que el pecado no aumente[e].
  rationale: 'Se hicieron ajustes menores para mejorar naturalidad y fidelidad funcional en español: se eliminó la exclamación, se volvió más idiomática la frase del camino, se sustituyó ‘por medio de un látigo’ por ‘con un azote’, y se explicitó ‘el pecado’ en la cláusula final para evitar una elipsis demasiado oscura en español, preservando la ambigüedad restante en nota.'
  reviewer_model: gpt-5.4
