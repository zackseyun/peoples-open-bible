translation:
  language: es
  text: Así que Moisés se levantó con Josué, su asistente[a], y Moisés subió al monte de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su servidor». El término hebreo puede denotar a alguien que sirve en atención; aquí probablemente se refiere a Josué como asistente personal de Moisés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: El verbo קום en este contexto narra el acto de ponerse en marcha/iniciar la acción. «Se levantó» es natural en español y conserva el valor narrativo de inicio sin añadir la idea de partida que no está explícita en el hebreo.
- source_word: וִיהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Yehoshúa
  lexicon: convención bíblica española
  rationale: Se usa el nombre propio bíblico en español estándar. «Josué» es la forma reconocible y fiel al referente.
- source_word: מְשָׁרְתוֹ
  english_pob_choice: his attendant
  chosen_spanish: su asistente
  alternatives_spanish:
  - su servidor
  - su ayudante
  - su siervo
  lexicon: HALOT
  rationale: El término indica servicio personal en atención cercana. «Asistente» comunica bien la función sin cargar el texto con «siervo» o con un matiz institucional de «ministro».
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia arriba
  lexicon: HALOT
  rationale: עלה describe movimiento ascendente hacia el monte. «Subió» es la forma española más directa y natural, conservando el sentido espacial.
- source_word: הַר הָאֱלֹהִים
  english_pob_choice: the mountain of God
  chosen_spanish: el monte de Dios
  alternatives_spanish:
  - el monte de Yahvé
  - el monte divino
  lexicon: HALOT
  rationale: «Monte de Dios» refleja con fidelidad la construcción hebrea y la carga sacra del lugar. Se mantiene «Dios» porque el texto hebreo usa אֱלֹהִים aquí, sin sustituirlo por una designación interpretativa.
theological_decisions:
- issue: Sentido de מְשָׁרְתוֹ aplicado a Josué
  english_pob_reading: Joshua is described as Moses's attendant/assistant, not as a slave or cultic minister.
  chosen_spanish_reading: Josué aparece como asistente personal de Moisés, no como esclavo ni como ministro cultual.
  alternative_spanish_readings:
  - Josué su siervo
  - Josué su ministro
  rationale: El contexto narrativo apunta a una relación de acompañamiento y servicio personal. «Asistente» evita introducir la idea de esclavitud y también evita una lectura eclesiástica de «ministro» que no está en el hebreo.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail en inglés: mantiene el movimiento narrativo de קום/עלה, conserva la estructura de posesión en «su asistente», y traduce הר האלהים como «el monte de Dios» sin suavizarlo. No hay revisiones pendientes en el pasaje fuente.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el hebreo aquí dice אֱלֹהִים, no el tetragrámaton.
  - «Asistente» se usa de manera consistente para מְשָׁרֵת cuando el contexto describe servicio personal cercano.
  - «Monte de Dios» preserva la formulación bíblica sobria y evita parafrasear el nombre del lugar.
