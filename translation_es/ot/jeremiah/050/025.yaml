translation:
  language: es
  text: Yahvé ha abierto su depósito[a] y ha sacado las armas[b] de su ira, porque esto es obra del Señor Yahvé de los Ejércitos[c] en la tierra de los caldeos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «su tesoro» o «su armería» para «su depósito».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «los utensilios» o «los instrumentos de su ira»; el término hebreo puede abarcar artículos o equipo, pero aquí probablemente tiene sentido militar.'
    reason: lexical_alternative
  - marker: c
    text: 'Tradicionalmente: «el Señor DIOS de los ejércitos».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «en la tierra de Caldea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La decisión auditada en inglés usa la transliteración del Nombre divino; en español, «Yahvé» preserva esa elección y evita la sustitución por un título. «Jehová» no se adopta por ser una forma tradicional menos alineada con la transliteración directa.
- source_word: א֣וֹצָר
  english_pob_choice: his storehouse
  chosen_spanish: su granero
  alternatives_spanish:
  - su tesoro
  - su almacén
  - su armería
  lexicon: HALOT
  rationale: אוצר puede abarcar granero/tesoro/depósito. En este contexto de juicio, «granero» comunica bien la imagen de un depósito abierto para sacar contenido; no se estrecha indebidamente a «armería», que sería más interpretativo, ni se vuelve demasiado abstracto con «tesoro».
- source_word: כְּלֵי
  english_pob_choice: the weapons
  chosen_spanish: las armas
  alternatives_spanish:
  - los utensilios
  - los instrumentos
  - los implementos
  lexicon: HALOT
  rationale: El POB inglés opta por el sentido militar de כלי en este contexto. «Armas» conserva esa fuerza bélica en español; «utensilios» o «implementos» diluirían el juicio militar.
- source_word: זַעְמוֹ
  english_pob_choice: his wrath
  chosen_spanish: su indignación
  alternatives_spanish:
  - su ira
  - su enojo
  lexicon: HALOT
  rationale: זעם expresa indignación/ira divina en contexto judicial. «Indignación» mantiene el tono formal y la carga retributiva; «ira» también sería posible, pero «indignación» refleja mejor el matiz de juicio.
- source_word: מְלָאכָה
  english_pob_choice: a work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - tarea
  - hecho
  lexicon: HALOT
  rationale: En español, «obra» suena natural y solemne para מְלָאכָה en una declaración profética. Evita la rigidez de «trabajo» y conserva el carácter de acción deliberada.
- source_word: לַֽ/אדֹנָ֧/י יְהוִה צְבָא֖וֹת
  english_pob_choice: of the Lord GOD of Armies
  chosen_spanish: del Señor Yahvé de los Ejércitos
  alternatives_spanish:
  - del Señor Dios de los Ejércitos
  - de Adonai Yahvé de los Ejércitos
  lexicon: HALOT
  rationale: Se conserva la distinción del título compuesto usando «Señor Yahvé» para reflejar אֲדֹנָי + יְהוִה sin disolver el Nombre divino. «De los Ejércitos» traduce צבאות de manera transparente, siguiendo la preferencia auditada por «Armies» en inglés en lugar de la transliteración tradicional «de los ejércitos/hosts».
- source_word: בְּאֶרֶץ כַּשְׂדִּים
  english_pob_choice: in the land of the Chaldeans
  chosen_spanish: en la tierra de los caldeos
  alternatives_spanish:
  - en la tierra de Caldea
  - en el país de los caldeos
  lexicon: HALOT
  rationale: La expresión etnogeográfica se vierte de modo directo como «caldeos», manteniendo la referencia al pueblo/territorio tal como está en hebreo. «Tierra» reproduce bien la amplitud de אֶרֶץ.
theological_decisions:
- issue: Cómo representar el nombre divino יְהוָה en una versión española de POB
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea editorial auditada del POB rechaza la sustitución por un título y prefiere la transliteración del Nombre. En español, «Yahvé» es la forma que mejor conserva esa decisión y la inteligibilidad para lectores de iglesia.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cómo reflejar el título compuesto אֲדֹנָי יְהוִה צְבָאוֹת sin borrar su tensión
  english_pob_reading: the Lord GOD of Armies
  chosen_spanish_reading: el Señor Yahvé de los Ejércitos
  alternative_spanish_readings:
  - el Señor Dios de los Ejércitos
  - el Señor Yahvé de los ejércitos
  rationale: La combinación de título y Nombre no debe aplanarse. «Señor Yahvé» conserva la distinción entre אֲדֹנָי y יְהוִה, mientras que «de los Ejércitos» traduce צבאות con transparencia semántica; así se preserva la solemnidad y el carácter bélico del título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — divine title compounds'
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente en inglés quedó sin cambios y el control cruzado informó alto acuerdo. No se detectaron revisiones textuales relevantes; la presente versión española sigue de cerca el audit trail inglés y resuelve en español la tensión del título divino compuesto sin introducir paráfrasis nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del Nombre divino, en línea con la política del proyecto.
  - Se traduce צבאות como «los Ejércitos» para conservar transparencia semántica y distinguirlo de la forma tradicional «hosts».
  - Se elige «indignación» para זעם por su tono judicial y formal, aunque «ira» seguiría siendo una alternativa válida.
  - «Granero» se usa como equivalente funcional de אוצר en este contexto; no pretende fijar de manera exclusiva la metáfora de almacenamiento.
