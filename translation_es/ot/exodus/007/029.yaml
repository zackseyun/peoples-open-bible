review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura tripartita del hebreo y el sentido aflictivo de la preposición repetida בְּ con «sobre». Sin embargo, «vendrán» para יַעֲלוּ pierde el matiz de ascenso/irrupción desde abajo que el contexto de la plaga sí conserva y que el inglés auditado preserva con «will come up».
  spanish_quality_summary: 'El español es claro y digno. «Sobre ti / sobre tu pueblo / sobre todos tus servidores» suena natural. La mejora principal es verbal: «subirán sobre» en español suena algo mecánico, por lo que conviene una formulación más natural que mantenga el movimiento ascendente, como «subirán contra ti…» o «saldrán y vendrán sobre…». Dado que el inglés POB privilegia la repetición de «on», la opción más fiel y legible es mantener «sobre» y ajustar el verbo a «subirán».'
  glossary_alignment: No hay términos teológicos sensibles del glosario mayor en este versículo. La elección «servidores» para עֲבָדֶיךָ es aceptable en contexto cortesano y concuerda con la racionalidad documentada. La nota alternativa está bien preservada.
  issues:
  - severity: medium
    issue: «Vendrán» debilita el valor de יַעֲלוּ
    rationale: El hebreo עָלָה significa «subir/ascender». En la escena de las ranas que emergen como plaga, el movimiento ascendente es parte de la imagen. «Vendrán» comunica llegada, pero omite ese rasgo semántico que el English POB decidió conservar con «will come up».
  revised_spanish_text: Las ranas subirán sobre ti[a], sobre tu pueblo y sobre todos tus servidores.
  revised_footnotes:
  - marker: a
    text: O «entre tu pueblo» en la segunda frase; el hebreo usa la misma preposición en todas las expresiones, pero el contexto favorece la idea de que las ranas subirán como una aflicción sobre Faraón y su reino.
    reason: alternative_reading
  revision_rationale: Se reemplaza «vendrán» por «subirán» para preservar el sentido de יַעֲלוּ en el contexto de la plaga, manteniendo a la vez la repetición de «sobre» que refleja la preposición hebrea y el énfasis de aflicción.
