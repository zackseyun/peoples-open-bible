translation:
  language: es
  text: Y sobre la compañía de la tribu de los hijos de Simeón estaba Shelumiel hijo de Zurisadai[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Compañía» traduce צְבָא como un contingente organizado; también puede entenderse como «división» o «hueste».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  english_pob_choice: And over
  chosen_spanish: Y sobre
  alternatives_spanish:
  - Y sobre él
  - Y por encima de
  lexicon: HALOT
  rationale: En este contexto de orden de marcha, עַל introduce a quien está colocado sobre una división tribal. «Sobre» conserva la relación de liderazgo/ubicación sin forzar una formulación más interpretativa.
- source_word: צְבָא
  english_pob_choice: company
  chosen_spanish: compañía
  alternatives_spanish:
  - división
  - hueste
  - contingente
  lexicon: HALOT
  rationale: El término hebreo designa aquí un grupo organizado dentro del campamento de Israel. «Compañía» reproduce bien la idea de un contingente ordenado sin militarizar en exceso el contexto.
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - cetro
  lexicon: HALOT
  rationale: En contextos censales y de organización del campamento, מַטֵּה significa la unidad tribal. «Tribu» es la equivalencia contextual clara en español.
- source_word: בְּנֵי שִׁמְעוֹן
  english_pob_choice: the sons of Simeon
  chosen_spanish: los hijos de Simeón
  alternatives_spanish:
  - los descendientes de Simeón
  - la gente de Simeón
  lexicon: HALOT
  rationale: Se conserva la expresión literal y tradicional del hebreo, que funciona como designación tribal. «Hijos» mantiene la correspondencia formal con בְּנֵי.
- source_word: שְׁלֻמִיאֵל
  english_pob_choice: Shelumiel
  chosen_spanish: Shelumiel
  alternatives_spanish:
  - Selumiel
  lexicon: standard transliteration
  rationale: Nombre propio transliterado, no traducido. Se mantiene la forma usual de transliteración bíblica en español.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una filiación directa, «hijo de» es la forma transparente y más natural en español.
- source_word: צוּרִי שַׁדָּי
  english_pob_choice: Zurishaddai
  chosen_spanish: Zurisaday
  alternatives_spanish:
  - Zurisaddai
  lexicon: standard transliteration
  rationale: Se mantiene el nombre propio como unidad transliterada. La forma «Zurisaday» refleja una adaptación ortográfica española coherente con la secuencia fonética del hebreo y evita una mezcla poco natural de grafías.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto hebreo consonante y con el audit trail inglés; no se documentan revisiones textuales que requieran nota crítica. La única decisión relevante es la elección léxica de צְבָא como término de agrupación organizada.
  spanish_consistency_notes:
  - Se mantiene la estructura breve y paralela propia de las listas del desierto.
  - Los nombres propios se transliteran de manera consistente, evitando traducirlos.
  - «Los hijos de Simeón» conserva el patrón tribal literal del hebreo.
