translation:
  language: es
  text: Esta es la ley acerca[a] del ganado, de las aves, de todo ser viviente[b] que se mueve en las aguas, y de todo ser que pulula sobre la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrucción acerca de» para תּוֹרַת; el hebreo puede denotar enseñanza autoritativa además de ley.
    reason: lexical_alternative
  - marker: b
    text: O «toda criatura viviente»; נֶפֶשׁ הַחַיָּה es un modismo de vida animada, no específicamente un «alma» inmaterial.
    reason: lexical_alternative
  - marker: c
    text: O «sobre el suelo» para עַל הָאָרֶץ.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת
  english_pob_choice: the law concerning
  chosen_spanish: la ley acerca de
  alternatives_spanish:
  - la instrucción acerca de
  - la ley sobre
  lexicon: HALOT
  rationale: תּוֹרָה aquí resume las regulaciones previas sobre animales limpios e inmundos. En español, «ley acerca de» conserva el valor normativo y la relación temática sin sonar forzado; «instrucción» es posible, pero menos directo en este contexto legal.
- source_word: הַבְּהֵמָה
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales
  - las bestias
  - el ganado
  lexicon: HALOT
  rationale: בְּהֵמָה puede abarcar animales terrestres, frecuentemente domésticos o de uso ganadero. «Ganado» comunica bien esta categoría en español bíblico y distingue naturalmente este grupo de las aves y las criaturas acuáticas.
- source_word: הָעוֹף
  english_pob_choice: the birds
  chosen_spanish: las aves
  alternatives_spanish:
  - los pájaros
  - las aves voladoras
  - las aves
  lexicon: HALOT
  rationale: עוֹף puede referirse a seres voladores, pero en este inventario de categorías alimentarias «aves» es la opción más natural y suficientemente precisa en español.
- source_word: כָל נֶפֶשׁ הַחַיָּה
  english_pob_choice: every living creature
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - toda criatura viviente
  - todo ser vivo
  - toda alma viviente
  lexicon: HALOT
  rationale: נֶפֶשׁ con הַחַיָּה forma un modismo de vida animada, no de «alma» en sentido inmortal. «Ser viviente» preserva ese valor idiomático sin introducir una carga teológica ajena al texto.
- source_word: הָרֹמֶשֶׂת
  english_pob_choice: that moves
  chosen_spanish: que se mueve
  alternatives_spanish:
  - que se arrastra
  - que anda
  - que se desplaza
  lexicon: HALOT
  rationale: El participio de רמש expresa movimiento de criaturas pequeñas o que se deslizan. Dado que aquí se refiere a seres en las aguas, «que se mueve» evita el calco demasiado específico de «repta/creeps» y mantiene el sentido general.
- source_word: בַּמָּיִם
  english_pob_choice: in the waters
  chosen_spanish: en las aguas
  alternatives_spanish:
  - en el agua
  - en las aguas
  lexicon: HALOT
  rationale: El plural hebreo suele conservarse bien como «las aguas», que suena natural en español y preserva la textura formal del hebreo.
- source_word: וּלְכָל נֶפֶשׁ
  english_pob_choice: and every creature
  chosen_spanish: y de todo ser
  alternatives_spanish:
  - y de toda criatura
  - y de todo ser viviente
  lexicon: HALOT
  rationale: La segunda ocurrencia de נֶפֶשׁ se vierte de forma compacta para evitar repetición pesada. «Todo ser» mantiene el valor genérico y permite continuar con la cláusula siguiente de modo fluido.
- source_word: הַשֹּׁרֶצֶת
  english_pob_choice: that swarms
  chosen_spanish: que se arrastra
  alternatives_spanish:
  - que hormiguea
  - que se multiplica
  - que pulula
  lexicon: HALOT
  rationale: שׁרץ suele expresar abundancia de pequeños seres que pululan o se mueven rastreramente. En este marco legal, «que se arrastra» comunica el campo semántico de movimiento bajo o reptante de manera idiomática en español.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  - sobre el suelo
  lexicon: HALOT
  rationale: אָרֶץ puede ser «tierra», «país» o «suelo» según el contexto. Aquí contrasta con «las aguas», por lo que «sobre la tierra» conserva el paralelismo y la amplitud del término hebreo.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail en inglés y con el pasaje hebreo. Se mantuvo la estructura enumerativa y el valor categorial de los términos, con una sola adaptación estilística relevante: en la última cola se prefirió «que se arrastra» para reflejar el rango semántico de רמש/שׁרץ en español bíblico fluido, sin perder la idea de criaturas pequeñas o reptantes. No hubo revisiones aplicadas en el expediente inglés.'
  spanish_consistency_notes:
  - Se mantuvo «ley» para תּוֹרָה, en continuidad con el marco jurídico del capítulo.
  - Se eligió «ganado» para בְּהֵמָה como categoría general y readable, evitando «bestias» por su tono menos natural en español moderno.
  - «Aves» y «aguas» conservan el registro formal del listado hebreo.
  - Se evitó «alma» para נֶפֶשׁ por la tensión lexical documentada en el audit trail.
  - La referencia final a la tierra se dejó amplia para preservar el contraste con las aguas.
