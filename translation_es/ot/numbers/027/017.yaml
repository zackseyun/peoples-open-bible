translation:
  language: es
  text: que salga delante de ellos y que entre delante de ellos[a], y que los saque y los haga entrar[b], para que la congregación de Yahvé[c] no sea como ovejas que no tienen pastor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por delante de ellos' en ambas ocurrencias.
    reason: lexical_alternative
  - marker: b
    text: La secuencia 'salir... entrar... sacar... hacer entrar' es una forma hebrea de describir liderazgo público completo.
    reason: cultural_note
  - marker: c
    text: O 'asamblea de Yahvé'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el que
  lexicon: HALOT
  rationale: En español, la cláusula relativa con antecedente humano implícito se expresa de forma natural con 'que'. 'Quien' también sería posible, pero suena más marcado y menos paralelo con la serie verbal del versículo.
- source_word: יֵצֵא
  english_pob_choice: will go out
  chosen_spanish: salga
  alternatives_spanish:
  - saldrá
  - salga delante
  lexicon: HALOT
  rationale: El hebreo presenta una acción prospectiva dentro de la petición; el subjuntivo en español funciona bien tras 'que' para una referencia deseada o esperada. Se conserva la idea de 'salir' sin imponer una lectura demasiado literalizada del tiempo verbal.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - frente a ellos
  lexicon: HALOT
  rationale: '''Delante de ellos'' comunica de modo natural la imagen espacial y de liderazgo del hebreo ''antes/en presencia de''. Mantiene la fuerza direccional sin volverlo demasiado formal.'
- source_word: יָבֹא
  english_pob_choice: come in
  chosen_spanish: entre
  alternatives_spanish:
  - vaya y venga
  - entre adentro
  lexicon: HALOT
  rationale: '''Entrar'' preserva el par hebreo de salir/entrar como merismo de conducción pública y de toda la actividad del líder. Se evita una paráfrasis abstracta.'
- source_word: יוֹצִיאֵם
  english_pob_choice: will lead them out
  chosen_spanish: los saque
  alternatives_spanish:
  - los conduzca fuera
  - los haga salir
  lexicon: HALOT
  rationale: El hiphil es causativo; 'sacar' conserva bien la acción de hacer salir. En español, dentro de la serie con subjuntivo, 'los saque' mantiene naturalidad y la relación de liderazgo.
- source_word: יְבִיאֵם
  english_pob_choice: bring them in
  chosen_spanish: los meta
  alternatives_spanish:
  - los conduzca dentro
  - los haga entrar
  lexicon: HALOT
  rationale: '''Meter'' reproduce la pareja causativa de ''sacar'' y mantiene el paralelo con el hebreo sin forzar un lenguaje más técnico. Aunque ''meter'' puede sonar coloquial en otros contextos, aquí funciona como verbo concreto de movimiento.'
- source_word: עֲדַת יְהוָה
  english_pob_choice: the congregation of the LORD
  chosen_spanish: la congregación de Yahvé
  alternatives_spanish:
  - la asamblea de Yahvé
  - la congregación del SEÑOR
  lexicon: HALOT
  rationale: Se conserva 'congregación' por el valor colectivo-covenantal de עֲדָה. 'Yahvé' sigue el criterio doctrinal del proyecto para el nombre divino, en lugar de sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte según la terminología del proyecto como 'Yahvé', preservando el nombre propio del pacto y evitando la máscara litúrgica tradicional.
- source_word: כַּצֹּאן
  english_pob_choice: like sheep
  chosen_spanish: como ovejas
  alternatives_spanish:
  - como el rebaño
  - cual ovejas
  lexicon: HALOT
  rationale: '''Ovejas'' es el equivalente natural en español para el sustantivo colectivo y conserva la imagen pastoral. Se prefiere el plural común por claridad idiomática.'
- source_word: רֹעֶה
  english_pob_choice: shepherd
  chosen_spanish: pastor
  alternatives_spanish:
  - apacentador
  - pastor de ovejas
  lexicon: HALOT
  rationale: Aunque 'pastor' puede tener un matiz eclesial en español, aquí es la traducción más transparente y recibida de la metáfora pastoral. Se conserva el paralelo con 'ovejas' y la ausencia de guía.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La política del proyecto pide traducir el Tetragrámaton como 'Yahvé'. En este versículo eso preserva el nombre personal de Dios y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora de liderazgo pastoral ('salir... entrar... sacar... meter')
  english_pob_reading: Retained as a concrete leadership description culminating in the shepherd image
  chosen_spanish_reading: Se mantiene como descripción concreta de liderazgo, culminando en la imagen del pastor
  alternative_spanish_readings:
  - hacer gobernar al pueblo
  - guiarlos en todo
  rationale: El hebreo usa acciones corporales y cotidianas para describir liderazgo integral. Traducirlas concretamente en español conserva la tensión imagética entre la función del líder y la comparación final con ovejas sin pastor.
  doctrine_reference: 'DOCTRINE.md: Preserve concrete Hebrew imagery when the text links public leadership with pastoral care'
translation_notes:
  revision_awareness: El borrador sigue el pasaje fuente y el audit trail inglés sin cambios textuales relevantes en la revisión más reciente; se conserva la secuencia verbal concreta y el cierre pastoral con ‘ovejas que no tienen pastor’.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera uniforme para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene la serie verbal concreta ('salga/entre/saque/meta') para no diluir el merismo hebreo.
  - '''Congregación'' y no ''asamblea'' se elige como término principal, dejando la alternativa en nota.'
  - '''Pastor'' se conserva por fidelidad metafórica, pese a su uso eclesial frecuente en español.'
