  text: 'Para los hijos de Bería: de Heber, el clan de los heberitas; de Malkiel, el clan de los malkielitas.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִ/בְנֵי
  english_pob_choice: For the sons of
  chosen_spanish: Para los hijos de
  alternatives_spanish:
  - Para los descendientes de
  - A los hijos de
  lexicon: HALOT
  rationale: En esta fórmula genealógica de censo, el prefijo ל introduce la pertenencia a una subdivisión mayor. «Para los hijos de» conserva la estructura repetida del hebreo y es natural en español bíblico, sin perder la relación de linaje.
- source_word: בְרִיעָה
  english_pob_choice: Beriah
  chosen_spanish: Berías
  alternatives_spanish:
  - Beriá
  - Bería
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre propio. «Berías» sigue una forma española clara y legible para un nombre masculino bíblico, manteniendo la referencia personal sin traducir el nombre.
- source_word: לְ/חֶבֶר
  english_pob_choice: from Heber
  chosen_spanish: de Heber
  alternatives_spanish:
  - de entre Heber
  - procedentes de Heber
  lexicon: HALOT
  rationale: En listas censales, el ל ante un antepasado marca descendencia/origen. «De Heber» preserva esa relación genealógica de forma breve y natural en español.
- source_word: מִשְׁפַּ֖חַת
  english_pob_choice: the clan of
  chosen_spanish: la familia de
  alternatives_spanish:
  - el clan de
  - la casa de
  lexicon: HALOT
  rationale: Aunque en contexto censal el término puede equivaler a una subdivisión clánica, «familia» funciona bien en español para un lector amplio y mantiene la unidad de parentesco sin introducir una palabra menos usual como «clan» en el texto principal.
- source_word: הַֽ/חֶבְרִי
  english_pob_choice: the Heberites
  chosen_spanish: los heberitas
  alternatives_spanish:
  - la familia heberita
  - los descendientes de Heber
  lexicon: HALOT
  rationale: El gentilicio indica los descendientes/grupo ligado a Heber. «Heb[e]ritas» o «heberitas» en español reproduce el patrón patronímico y conserva el matiz colectivo.
- source_word: לְ/מַ֨לְכִּיאֵ֔ל
  english_pob_choice: from Malkiel
  chosen_spanish: de Malkiel
  alternatives_spanish:
  - procedentes de Malkiel
  - de entre Malkiel
  lexicon: HALOT
  rationale: Como con Heber, el ל señala procedencia genealógica. «De Malkiel» mantiene la simetría de la enumeración y el sentido de origen.
- source_word: הַ/מַּלְכִּיאֵלִי
  english_pob_choice: the Malkielites
  chosen_spanish: los malkielitas
  alternatives_spanish:
  - la familia malkielita
  - los descendientes de Malkiel
  lexicon: HALOT
  rationale: El gentilicio final designa el grupo descendiente de Malkiel. «Malkielitas» sigue de cerca el patrón del hebreo y resulta comprensible en español.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier nota al pie no anclada; esta versión no usa marcadores de nota, por lo que el texto principal queda autónomo.
  spanish_consistency_notes:
  - Se mantiene un paralelismo claro entre las dos cláusulas genealógicas.
  - Se prefirió «familia» en el texto principal por fluidez española, aunque el trasfondo léxico admite «clan»; esta elección se documenta en las decisiones léxicas.
  - Los nombres propios se transliteran con una forma española estable y no se traducen.
  - No se añadieron notas al pie porque no hay variante textual ni ambigüedad que requiera marcador anclado en este versículo.
