revisions:
- from: Dejarán su nombre como juramento[a] para mis escogidos; y el Señor Yahvé los hará morir[b]; pero a sus siervos les pondrá otro nombre.
  to: Dejarán su nombre como maldición[a] para mis escogidos; y el Señor Yahvé te hará morir[b]; pero a sus siervos les dará otro nombre.
  rationale: Se corrige לִשְׁבוּעָה para reflejar mejor su fuerza imprecatoria en contexto, preservando en nota la lectura más literal 'para un juramento'. Se restituye el singular de וֶהֱמִיתְךָ con 'te hará morir'. Además, se mejora la naturalidad y precisión de la última cláusula con 'les dará otro nombre', manteniendo en nota la formulación más cercana al hebreo.
  reviewer_model: gpt-5.4
