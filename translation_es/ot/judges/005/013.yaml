translation:
  language: es
  text: Entonces el remanente[a] bajó contra los nobles; el pueblo de Yahvé bajó para mí[b] contra los poderosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces un sobreviviente bajó a los nobles»; el hebreo de esta línea poética es difícil, y las preposiciones también pueden leerse en sentido no hostil («a», «para» o «con»).'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «para mí»; probablemente una referencia poética de Débora a sí misma.'
    reason: cultural_note
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En aquel tiempo
  - Luego
  lexicon: HALOT
  rationale: Marca una transición temporal y narrativa en un tono natural para el español poético.
- source_word: יְרַד
  english_pob_choice: came down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - vino abajo
  lexicon: HALOT
  rationale: El verbo ירד es literalmente 'bajar/descender'. 'Bajó' suena natural en español y conserva la repetición verbal del hebreo en ambos cola.
- source_word: שָׂרִיד
  english_pob_choice: the remnant
  chosen_spanish: el remanente
  alternatives_spanish:
  - el sobreviviente
  - los que quedaron
  lexicon: HALOT
  rationale: En este contexto bélico-poético, el sustantivo colectivo 'el remanente' expresa mejor a los que quedaron con vida que una lectura individualizada.
- source_word: לְאַדִּירִים
  english_pob_choice: against the nobles
  chosen_spanish: contra los nobles
  alternatives_spanish:
  - a los nobles
  - para los nobles
  - contra los poderosos
  lexicon: HALOT
  rationale: Se conserva la lectura adversativa favorecida por el contexto de victoria y por el paralelo con el segundo miembro. 'Nobles' distingue este término de גִּבּוֹרִים.
- source_word: עָם יְהוָה
  english_pob_choice: the people of Yahweh
  chosen_spanish: el pueblo de Yahvé
  alternatives_spanish:
  - el pueblo de Yahvé
  - el pueblo de Yahweh
  lexicon: HALOT
  rationale: '''Pueblo'' comunica bien la construcción de pertenencia del hebreo y mantiene el lenguaje de pacto; ''Yahvé'' sigue la convención del proyecto para el nombre divino.'
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - por mí
  - conmigo
  lexicon: HALOT
  rationale: La preposición lamed con el sufijo de primera persona se puede leer de varias formas; 'para mí' refleja la ambigüedad sin forzarla y encaja con la auto-referencia poética de Débora.
- source_word: בַּגִּבּוֹרִים
  english_pob_choice: against the mighty
  chosen_spanish: contra los poderosos
  alternatives_spanish:
  - contra los guerreros
  - entre los poderosos
  - con los poderosos
  lexicon: HALOT
  rationale: גִּבּוֹרִים denota hombres fuertes o poderosos; 'poderosos' mantiene el alcance semántico amplio y permite la misma lectura hostil que en el primer miembro.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue la norma del proyecto para reproducir el nombre propio divino de manera transparente en español, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lectura de las preposiciones con valor adversativo
  english_pob_reading: hostile sense ('against the nobles' / 'against the mighty')
  chosen_spanish_reading: sentido hostil ('contra los nobles' / 'contra los poderosos')
  alternative_spanish_readings:
  - sentido benefactivo o asociativo ('a/para los nobles'; 'con/entre los poderosos')
  rationale: La poesía de Jueces 5 describe acción de combate; por eso se preserva la lectura adversativa apoyada por el contexto y el paralelismo.
  doctrine_reference: Principio de lectura contextual y paralelismo poético en poesía hebrea
translation_notes:
  revision_awareness: El borrador sigue de cerca el pasaje hebreo y el análisis auditado en inglés. Se mantiene la ambigüedad reconocida en las preposiciones mediante nota, sin suavizar la dureza o la rareza sintáctica del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la repetición verbal de ירד con «bajó» en ambos cola.
  - «Remanente» y «poderosos» mantienen un registro bíblico claro y no eclesiástico.
  - La nota a conserva la tensión semántica de las preposiciones sin imponer una sola lectura.
