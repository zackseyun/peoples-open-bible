revisions:
- from: Pero en aquel día apartaré la tierra de Gosén[a], donde está mi pueblo, para que no haya allí ningún enjambre[b], a fin de que sepas que yo soy Yahvé en medio de la tierra.
  to: Pero en aquel día apartaré la tierra[a] de Gosén, donde habita mi pueblo, para que no haya allí ningún enjambre[b], a fin de que sepas que yo soy Yahvé en medio de la tierra[c].
  rationale: Se corrige el anclaje de la nota léxica sobre אֶרֶץ, se mejora ligeramente la precisión de residencia con «habita», y se añade la alternativa documentada para בְּקֶרֶב הָאָרֶץ a fin de reflejar fielmente la auditoría inglesa y la amplitud del hebreo.
