revisions:
- from: Yo soy Yahvé[a], tu Santo, el Creador de Israel, tu Rey.
  to: Yo soy Yahvé[a], su Santo, el Creador de Israel, su Rey.
  rationale: Se ajusta el posesivo a «su» para representar mejor los sufijos plurales hebreos en referencia al pueblo de Israel, manteniendo un español natural y digno. También se corrige la nota al pie para que explique el nombre divino en lugar de presentar erróneamente «Yahvé» como lectura alternativa.
