translation:
  language: es
  text: Entonces hará beber a la mujer el agua amarga que trae maldición[a], y el agua que trae maldición[b] entrará en ella con amargura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘O: «el agua de amargura que trae maldición». El hebreo usa «aguas» en plural, una forma común para «agua».’
    reason: lexical_alternative
  - marker: b
    text: ‘O: «el agua maldita entrará en ella para amargura». El hebreo puede traducirse de manera más formal, pero el texto principal entiende el participio como descripción del efecto del agua al traer maldición.’
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִשְׁקָה
  english_pob_choice: Then he shall make ... drink
  chosen_spanish: hará beber
  alternatives_spanish:
  - dará a beber
  - hará que beba
  lexicon: HALOT
  rationale: 'El hiphil de שׁקה expresa causación: no solo ‘dar de beber’, sino hacer que la mujer beba. ‘Hará beber’ conserva bien esa fuerza causativa en español natural.'
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - a la mujer
  lexicon: HALOT
  rationale: Sustantivo definido simple; se mantiene sin generalizar ni añadir matiz interpretativo.
- source_word: מֵי הַמָּרִים
  english_pob_choice: the bitter water
  chosen_spanish: el agua amarga
  alternatives_spanish:
  - las aguas amargas
  - el agua de amargura
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente ‘aguas de amargura’. En español, el singular ‘agua’ es más natural para este líquido, y ‘amarga’ preserva el valor semántico de מרים.
- source_word: הַמְאָֽרֲרִים / הַמְאָרֲרִים
  english_pob_choice: that brings a curse / curse-bringing
  chosen_spanish: que trae maldición
  alternatives_spanish:
  - maldiciendo
  - maldición-bringing
  - que ocasiona maldición
  lexicon: HALOT
  rationale: El participio de ארר describe el efecto de la bebida dentro del rito judicial. ‘Que trae maldición’ preserva la función efectiva sin convertir el agua en simplemente ‘maldita’.
- source_word: וּבָאוּ בָהּ
  english_pob_choice: shall enter into her
  chosen_spanish: entrará en ella
  alternatives_spanish:
  - entrará dentro de ella
  - irá a ella
  lexicon: HALOT
  rationale: בוא con ב marca entrada hacia/ en la persona. ‘Entrará en ella’ mantiene la imagen corporal y ritual del texto.
- source_word: לְמָרִים
  english_pob_choice: bitterly
  chosen_spanish: con amargura
  alternatives_spanish:
  - para amargura
  - como amargura
  lexicon: HALOT
  rationale: El ל final expresa resultado o efecto. ‘Con amargura’ es una forma española natural para ese efecto resultante, sin perder la relación con la raíz ‘amargo’.
theological_decisions:
- issue: Cómo presentar el lenguaje de maldición en el rito
  english_pob_reading: Render the water as 'bringing a curse' rather than as intrinsically 'accursed.'
  chosen_spanish_reading: Traducir como ‘que trae maldición’, no como ‘agua maldita’.
  alternative_spanish_readings:
  - agua maldita
  - agua de maldición
  rationale: El participio hebreo apunta al papel de la bebida como medio del juicio pactal si hay culpa, no necesariamente a una cualidad mágica inherente. La redacción española conserva esa tensión judicial-ritual.
  doctrine_reference: Principio de primacía del texto original; preservar tensión teológica sin resolverla de antemano
translation_notes:
  revision_awareness: La redacción sigue la decisión revisada del audit trail de mantener el valor de efecto del participio de ארר y de traducir la clausula final con un adverbio/preposición española natural que comunique el resultado de ‘amargura’. Se preserva la repetición del motivo ‘maldición’ para reflejar la estructura del hebreo.
  spanish_consistency_notes:
  - Se mantiene ‘maldición’ para el campo de ארר, en coherencia con el español bíblico transparente del proyecto.
  - Se evita ‘señor’ o equivalente tradicional porque no hay Tetragrámaton ni κύριος en este versículo.
  - Se usa ‘agua’ en singular por naturalidad en español, aunque se nota en la nota la pluralidad hebrea ‘aguas’.
