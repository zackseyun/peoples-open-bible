translation:
  language: es
  text: Cuando vio que había esperado en vano[a], que su esperanza se perdió, tomó uno de sus cachorros y lo hizo un león joven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «se debilitó» o «se desilusionó». El hebreo es difícil; la lectura principal sigue el sentido contextual de una espera frustrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: When she saw
  chosen_spanish: Cuando ella vio
  alternatives_spanish:
  - Y vio
  - Al ver
  lexicon: HALOT
  rationale: El waw consecutivo en el relato avanza la acción. «Cuando ella vio» conserva el valor temporal y fluye con naturalidad en español.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que vio, no una causalidad independiente; «que» refleja mejor la sintaxis.
- source_word: נֽוֹחֲלָ֔ה
  english_pob_choice: she had waited in vain
  chosen_spanish: había esperado en vano
  alternatives_spanish:
  - se había debilitado
  - se había desilusionado
  - había esperado
  lexicon: HALOT
  rationale: El término es difícil. En este contexto, junto con «su esperanza se había perdido», la idea dominante es una espera frustrada o inútil; «en vano» conserva esa tensión lexical y semántica.
- source_word: אָבְדָ֖ה תִּקְוָתָ֑/הּ
  english_pob_choice: her hope was lost
  chosen_spanish: su esperanza se había perdido
  alternatives_spanish:
  - su esperanza se perdió
  - su esperanza había perecido
  - su expectativa se había ido
  lexicon: HALOT
  rationale: Reproduce el sentido nominal-verbal de pérdida total de esperanza. «Se había perdido» mantiene el tono de lamento y la fuerza idiomática del hebreo.
- source_word: וַ/תִּקַּ֛ח אֶחָ֥ד מִ/גֻּרֶ֖י/הָ
  english_pob_choice: she took one of her cubs
  chosen_spanish: tomó uno de sus cachorros
  alternatives_spanish:
  - tomó uno de sus crías
  - tomó uno de sus cachorros de león
  - tomó uno de sus hijos
  lexicon: HALOT
  rationale: גּוּר refiere a la cría/leoncillo en la metáfora de la leona. «Cachorros» es natural en español y conserva la imagen zoológica explícita.
- source_word: כְּפִ֥יר
  english_pob_choice: a young lion
  chosen_spanish: un leoncillo
  alternatives_spanish:
  - un joven león
  - un cachorro de león
  - un león joven
  lexicon: HALOT
  rationale: כְּפִיר designa un león joven. «Leoncillo» comunica la edad y mantiene la distinción léxica sin sonar forzado.
- source_word: שָׂמָֽתְ/הוּ
  english_pob_choice: made him
  chosen_spanish: lo convirtió en
  alternatives_spanish:
  - lo hizo
  - lo puso como
  - lo estableció como
  lexicon: HALOT
  rationale: El verbo hebreo de poner/establecer aquí funciona idiomáticamente como «hacer/convertir en». «Lo convirtió en» expresa el cambio de estado con claridad, preservando la fuerza figurada.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la ambigüedad de נוֹחֲלָה con una nota de alternativa lexical. No se introdujeron cambios doctrinales ni revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Leoncillo» y «cachorros» se emplean para mantener la metáfora del león sin mezclar con lenguaje eclesiástico.
  - La construcción verbal busca sonar natural en español sin perder la secuencia narrativa del hebreo.
