translation:
  language: es
  text: 'Y la mujer dijo a la serpiente[a]: «Del fruto de los árboles del huerto podemos comer»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «de la fruta del árbol del huerto podemos comer»; aquí el singular hebreo se entiende colectivamente, de ahí «árboles».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Y ... dijo» conserva ese flujo narrativo sin añadir una relación causal o temporal más fuerte de la que el hebreo exige.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: Aquí el sustantivo designa a la mujer del relato en su papel inmediato, no específicamente su rol marital; «la mujer» es natural y fiel al contexto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional se expresa de forma natural en español con «a» tras el verbo de habla.
- source_word: הַנָּחָשׁ
  english_pob_choice: the serpent
  chosen_spanish: la serpiente
  alternatives_spanish:
  - el serpentiente
  - la culebra
  lexicon: HALOT
  rationale: נָחָשׁ puede significar serpiente o culebra; «serpiente» conserva el tono elevado del relato y la identificación tradicional del pasaje. Se adapta al género gramatical del referente en español.
- source_word: מִפְּרִי
  english_pob_choice: from the fruit
  chosen_spanish: del fruto
  alternatives_spanish:
  - de fruto
  - de entre el fruto
  lexicon: HALOT
  rationale: El prefijo מִן marca origen/separación; «del fruto» comunica adecuadamente la idea de procedencia en español.
- source_word: עֵץ
  english_pob_choice: the trees of
  chosen_spanish: los árboles de
  alternatives_spanish:
  - el árbol de
  - los árboles del
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, el sentido en el contexto es colectivo/distributivo; el POB inglés lo resuelve con plural. En español, «los árboles» evita la impresión de que solo un árbol está en vista, manteniendo la lectura contextual.
- source_word: הַגָּן
  english_pob_choice: the garden
  chosen_spanish: el huerto
  alternatives_spanish:
  - el jardín
  lexicon: HALOT
  rationale: En Génesis, גַּן puede traducirse como «huerto» o «jardín». «Huerto» es tradicional y preciso para el entorno edénico, sin perder inteligibilidad moderna.
- source_word: נֹאכֵל
  english_pob_choice: we may eat
  chosen_spanish: podemos comer
  alternatives_spanish:
  - comemos
  - podremos comer
  lexicon: HALOT
  rationale: El imperfecto de 1ª plural expresa aquí permiso en contexto; el español «podemos comer» comunica de manera natural la autorización implícita. Se evita forzar un matiz de futuro o simple capacidad que el contexto no pide.
theological_decisions:
- issue: Alcance colectivo de עֵץ / 'tree(s)' en la respuesta de Eva
  english_pob_reading: 'Render the phrase as a general permission: ''from the fruit of the trees of the garden'''
  chosen_spanish_reading: «del fruto de los árboles del huerto» como permiso general
  alternative_spanish_readings:
  - «del fruto del árbol del huerto»
  rationale: El hebreo presenta עֵץ en singular, pero el contexto funciona de modo colectivo/distributivo, en continuidad con la autorización amplia de Génesis 2:16. El plural español evita restringir indebidamente la referencia a un solo árbol antes de la excepción del versículo siguiente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue el reconocimiento del POB inglés de que el singular hebreo עֵץ funciona colectivamente en este contexto. Se mantiene la decisión de expresar permiso con «podemos comer» y la dirección narrativa con una simple coordinación («Y»), sin introducir explicaciones adicionales en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «serpiente» por fidelidad léxica y tono narrativo; no se sustituye por un término más coloquial como «culebra».
  - «Huerto» se prefiere aquí por la referencia edénica y por consistencia bíblica en español, sin alterar el sentido de גַּן.
  - La nota al pie conserva la tensión entre el singular hebreo y el plural contextual en español.
