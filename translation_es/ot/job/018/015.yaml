translation:
  language: es
  text: En su tienda habita lo que no le pertenece[a]; sobre su morada se esparce el azufre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que ya no es suyo». El hebreo de מבלי לו es difícil y puede sugerir desposesión, ausencia o una presencia ajena en su tienda.'
    reason: alternative_reading
  - marker: b
    text: 'Tradicionalmente: «piedra de azufre» para «azufre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁכּוֹן
  english_pob_choice: it dwells
  chosen_spanish: habita
  alternatives_spanish:
  - mora
  - permanece
  - se aloja
  lexicon: HALOT
  rationale: El verbo שכן expresa habitar o residir. En español, «habita» conserva la imagen de permanencia en la tienda sin sonar artificial y permite mantener la ambigüedad del sujeto implícito en el hebreo.
- source_word: בְּאָהֳלוֹ
  english_pob_choice: in his tent
  chosen_spanish: En su tienda
  alternatives_spanish:
  - En su tienda de campaña
  - En su morada
  - En su vivienda
  lexicon: HALOT
  rationale: אֹהֶל es literalmente «tienda». «Su tienda» conserva la concreción del hebreo y el contraste poético con «morada» en la segunda cola.
- source_word: מִבְּלִי לוֹ
  english_pob_choice: what is not his
  chosen_spanish: lo que no le pertenece
  alternatives_spanish:
  - lo que ya no es suyo
  - lo que no es suyo
  - lo que no le queda
  lexicon: HALOT
  rationale: La sintaxis es difícil y el hebreo puede sugerir carencia, desposesión o una presencia ajena. «Lo que no le pertenece» mantiene la indefinición sin cerrar la ambigüedad con una lectura demasiado específica.
- source_word: יְזֹרֶה
  english_pob_choice: is scattered
  chosen_spanish: se esparce
  alternatives_spanish:
  - es esparcido
  - se derrama
  - se dispersa
  lexicon: HALOT
  rationale: La forma verbal es activa, pero en español una pasiva refleja o intransitiva reproduce mejor la escena. «Se esparce» conserva el movimiento de juicio sin introducir un agente no expresado.
- source_word: עַל נָוֵהוּ
  english_pob_choice: over his dwelling
  chosen_spanish: sobre su morada
  alternatives_spanish:
  - sobre su habitación
  - sobre su casa
  - sobre su vivienda
  lexicon: HALOT
  rationale: נָוֶה puede significar morada o habitáculo, e incluso lugar de pasto según el contexto. Aquí, en paralelo con «tienda», «morada» comunica bien el ámbito doméstico sin perder la sobriedad del original.
- source_word: גָפְרִית
  english_pob_choice: sulfur
  chosen_spanish: azufre
  alternatives_spanish:
  - brimstone
  - azufre ardiente
  lexicon: HALOT
  rationale: גָפְרִית designa azufre. «Azufre» es el equivalente español claro y directo; «brimstone» no es natural en español, y la connotación de juicio destructivo queda preservada por el contexto.
theological_decisions:
- issue: Sintaxis ambigua de מבלי לו y sujeto implícito de תִּשְׁכּוֹן
  english_pob_reading: In his tent dwells what is not his; sulfur is scattered over his dwelling.
  chosen_spanish_reading: En su tienda habita lo que no le pertenece; sobre su morada se esparce el azufre.
  alternative_spanish_readings:
  - En su tienda habita lo que ya no es suyo
  - En su tienda habita una presencia ajena
  - En su tienda ya no permanece lo suyo
  rationale: 'El hebreo es comprimido y admite más de una lectura. La formulación elegida conserva la tensión: en la tienda hay algo que no le pertenece, y el azufre aparece como signo de juicio sobre su morada. No resuelve especulativamente si el foco está en una presencia ajena, en la pérdida de posesión o en la desolación posterior.'
  doctrine_reference: Job 18:15; cf. Job 18:21 para el tema del juicio sobre la casa del impío
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la reorganización del audit trail inglés: primero la cláusula difícil de la tienda, luego la imagen del azufre sobre la morada. Se evita convertir la ambigüedad en una explicación interpretativa cerrada, y se mantiene el valor concreto de «tienda» y «morada».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo subyacente lo exige; este versículo no lo contiene.
  - Se prefirió «azufre» frente a «brimstone» por naturalidad del español, conservando el tono de juicio.
  - Se mantuvo «tienda» por la imagen concreta del hebreo, en lugar de generalizar a «casa» o «hogar».
  - Se evitó «siervo» o terminología eclesiástica no presente en el texto.
