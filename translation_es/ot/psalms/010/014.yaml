source:
  edition: WLC
  text: רָאִ֡תָה כִּֽי אַתָּ֤ה עָ֘מָ֤ל וָ/כַ֨עַס תַּבִּיט֮ לָ/תֵ֪ת בְּ/יָ֫דֶ֥/ךָ עָ֭לֶי/ךָ יַעֲזֹ֣ב חֵלֶ֑כָה יָ֝ת֗וֹם אַתָּ֤ה הָיִ֬יתָ עוֹזֵֽר־׀׀׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/010/014.yaml
  text: You have seen[a], for you look upon trouble and grief, to take it into your hand. The helpless commits himself to you[c][b]; you have been the helper of the fatherless.
  footnotes:
  - marker: a
    text: 'Or: "to place it in your hand"; the Hebrew idiom can also be understood as God taking the matter up for action.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: "The unfortunate leaves it to you"; the Hebrew may refer either to the helpless person himself or to his cause being entrusted to God.'
    reason: alternative_reading
  - marker: c
    text: '"Fatherless" may also be rendered "orphan."'
    reason: lexical_alternative
