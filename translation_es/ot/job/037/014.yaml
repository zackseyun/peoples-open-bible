translation:
  language: es
  text: Escucha esto[a], Job; detente[b] y considera las maravillas de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Presta oído a esto, Job».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «quédate quieto», «ponte de pie» o «toma tu puesto».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «las obras maravillosas de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲזִינָה
  english_pob_choice: Listen
  chosen_spanish: Escucha
  alternatives_spanish:
  - Presta oído
  - Oye
  lexicon: HALOT
  rationale: El imperativo de אזן pide atención auditiva. «Escucha» es natural en español moderno y conserva la fuerza exhortativa sin arcaísmo.
- source_word: זֹּאת
  english_pob_choice: to this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - estas cosas
  lexicon: HALOT
  rationale: El demostrativo singular femenino se refiere de manera natural a lo que sigue o a lo que acaba de decirse. En español, «Escucha esto» reproduce bien esa deixis.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  lexicon: nombre propio
  rationale: Se conserva el nombre propio según la convención habitual en español bíblico.
- source_word: עֲמֹד
  english_pob_choice: stand still
  chosen_spanish: mantente firme
  alternatives_spanish:
  - detente
  - ponte de pie
  - permanece de pie
  lexicon: HALOT
  rationale: עָמַד en imperativo pide permanecer de pie o detenerse. «Mantente firme» expresa en español una postura estable y atenta; se mantiene la tensión de detenerse para reflexionar sin imponer excesiva literalidad.
- source_word: וְהִתְבּוֹנֵן
  english_pob_choice: and consider
  chosen_spanish: y considera
  alternatives_spanish:
  - y reflexiona sobre
  - y contempla
  lexicon: HALOT
  rationale: El hitpolel de בין expresa atención reflexiva. «Considera» es preciso, sobrio y adecuado al tono exhortativo del verso.
- source_word: נִפְלְאוֹת
  english_pob_choice: the wonders
  chosen_spanish: las maravillas
  alternatives_spanish:
  - las obras maravillosas
  - las cosas maravillosas
  lexicon: HALOT
  rationale: El sustantivo plural de פלא denota cosas extraordinarias o maravillosas. «Maravillas» es una equivalencia directa y natural en español.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios poderoso
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: Aquí אֵל funciona como referencia divina general. «Dios» preserva el sentido básico sin sobreinterpretar con calificativos no exigidos por el hebreo.
theological_decisions:
- issue: Alcance de נִפְלְאוֹת אֵל
  english_pob_reading: the wonders of God
  chosen_spanish_reading: las maravillas de Dios
  alternative_spanish_readings:
  - las obras maravillosas de Dios
  - las maravillas, es decir, las obras de Dios
  rationale: El hebreo permite tanto la abstracción 'maravillas' como el sentido de 'hechos maravillosos'. La redacción española conserva la amplitud semántica sin cerrarla innecesariamente.
  doctrine_reference: Principio de primacía del texto original y conservación de ambigüedad legítima
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo estable en la última pasada y no presenta revisiones aplicadas; la propuesta española sigue esa lectura sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל, en continuidad con el audit trail inglés.
  - Se evita «SEÑOR» porque el hebreo aquí no usa יהוה.
  - Se conserva un verbo de atención auditiva al inicio, paralelo al inglés y al hebreo.
  - «Maravillas» mantiene el valor plural de נִפְלְאוֹת sin convertirlo en una paráfrasis extensa.
