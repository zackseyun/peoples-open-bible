translation:
  language: es
  text: Y no escuchamos[a] su voz, para andar en los mandamientos de Yahvé, que él puso delante de nosotros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘no obedecimos su voz’. El griego dice literalmente ‘no escuchamos su voz’, un modismo bíblico para rechazar el mandato de Dios.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ‘que él dio delante de nuestro rostro’; es decir, mandamientos puestos delante de nosotros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκούσαμεν
  english_pob_choice: did not listen
  chosen_spanish: no escuchamos
  alternatives_spanish:
  - no oímos
  - no obedecimos
  lexicon: BDAG
  rationale: Escuchar conserva el valor auditivo del griego ἀκούω y, en este contexto de respuesta a la voz divina, mantiene el matiz bíblico de no prestar atención sin forzar de entrada la interpretación completa de desobediencia.
- source_word: τῆς φωνῆς αὐτοῦ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - la voz de él
  - lo que dijo
  lexicon: BDAG
  rationale: ‘Su voz’ reproduce de forma natural en español la expresión explícita del griego y preserva la fuerza personal e idiomática de la dirección divina.
- source_word: πορεύεσθαι
  english_pob_choice: to walk
  chosen_spanish: para andar
  alternatives_spanish:
  - para caminar
  - para vivir
  lexicon: BDAG
  rationale: ‘Andar’ conserva en español la metáfora bíblica de conducta y resulta más natural que una traducción más literal con ‘caminar’ o una paráfrasis con ‘vivir’.
- source_word: τοῖς προστάγμασιν
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - las ordenanzas
  - los decretos
  - las órdenes
  lexicon: BDAG
  rationale: ‘Mandamientos’ es el equivalente más transparente y sobrio para πρόσταγμα en este contexto de alianza y obediencia; mantiene el tono normativo del pasaje.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  lexicon: BDAG
  rationale: Aunque el proyecto normalmente usa ‘Yahvé’ para יהוה, aquí el griego explicita Κυρίου en una fórmula fija de la tradición bíblica; ‘Señor’ conserva el enlace inmediato con el texto fuente griego y la cadencia litúrgica del pasaje.
- source_word: οἷς ἔδωκεν κατὰ πρόσωπον ἡμῶν
  english_pob_choice: that he set before us
  chosen_spanish: que él puso delante de nosotros
  alternatives_spanish:
  - que él nos dio delante de nuestro rostro
  - que él colocó ante nosotros
  lexicon: BDAG
  rationale: ‘Puso delante de nosotros’ reproduce de manera idiomática y fiel la metáfora espacial del griego, manteniendo la idea de preceptos presentados al pueblo como norma visible.
theological_decisions:
- issue: Cómo entender ἠκούσαμεν en relación con la desobediencia
  english_pob_reading: did not listen
  chosen_spanish_reading: no escuchamos
  alternative_spanish_readings:
  - no oímos
  - no obedecimos
  rationale: La frase conserva la imagen bíblica de escuchar como respuesta obediente sin borrar la metáfora ni convertirla demasiado pronto en una explicación doctrinal. El contexto de los mandamientos permite inferir la desobediencia, pero el texto mismo habla de no escuchar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Cómo representar la relación entre ‘andar’ y los mandamientos
  english_pob_reading: to walk in the commandments
  chosen_spanish_reading: para andar en los mandamientos
  alternative_spanish_readings:
  - para caminar en los mandamientos
  - para vivir conforme a los mandamientos
  rationale: ‘Andar en los mandamientos’ conserva la metáfora moral y covenantal del original, ampliamente reconocible en lenguaje bíblico, sin reemplazarla por una explicación menos concreta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Cómo tratar el título Κυρίου en un texto griego que recuerda el nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aquí la fuente inmediata es el griego Κυρίου, y el contexto de Baruc pertenece al repertorio bíblico donde ‘Señor’ funciona como la designación recibida en la tradición textual. Por eso se mantiene ‘Señor’ en el cuerpo del texto, evitando imponer una sustitución que el griego de este versículo no exige directamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 6
translation_notes:
  revision_awareness: El contexto auditado del inglés POB no presenta revisiones aplicadas; el texto español sigue la lectura aprobada en la pasada más reciente, preservando las mismas decisiones léxicas de fondo y trasladándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene la metáfora de escuchar/hear para ἠκούσαμεν sin convertirla en una glosa interpretativa principal.
  - ‘Andar’ conserva el valor bíblico de πορεύεσθαι y evita una paráfrasis más abstracta.
  - Se usa ‘mandamientos’ como equivalente estable de τοῖς προστάγμασιν en un contexto covenantal.
  - ‘Señor’ refleja el griego Κυρίου en esta cita directa, aunque el proyecto normalmente usa ‘Yahvé’ para יהוה; aquí la forma fuente inmediata es griega y la expresión funciona como título bíblico tradicional.
  - La construcción ‘puso delante de nosotros’ conserva la imagen espacial de κατὰ πρόσωπον ἡμῶν sin sonar forzada en español.
