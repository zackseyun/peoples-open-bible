  rationale: 'La revisión hace ajustes menores de naturalidad y paralelismo sin cambiar el sentido: «Pero tú» representa mejor el contraste sencillo del hebreo en español, y «hemos actuado perversamente» equilibra la estructura verbal con «has actuado con fidelidad». La nota se conserva y se alinea con la elección principal del texto.'
