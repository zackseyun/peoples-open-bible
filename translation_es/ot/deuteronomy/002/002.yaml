translation:
  language: es
  text: Entonces Yahvé me dijo[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé me dijo, diciendo». La forma final «diciendo» introduce el discurso que sigue en el versículo siguiente y se conserva aquí para reflejar plenamente la estructura del original.'
