review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el contraste del hebreo: «Pero los impíos» capta adecuadamente la fuerza adversativa contextual de וְ, «como el mar» conserva la comparación, y «porque no puede aquietarse» transmite con fidelidad כִּי הַשׁקט לֹא יוּכָל. La línea final también preserva el sentido general de que las aguas del mar expulsan material sucio. Sin embargo, la nota [b] está mal anclada semánticamente: en el inglés POB la alternativa marcada con b corresponde a la cláusula final («cast up mire and mud»), no a «cannot be quiet». Además, «levantan» es comprensible, pero «arrojan» o «echan» expresa mejor el matiz de expulsar/cast up de וַיִּגְרְשׁוּ.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico moderno. «Impíos», «mar agitado» y «aquietarse» son opciones legibles y dignas. La pareja «lodo y cieno» funciona bien en español. La principal reparación necesaria es de consistencia editorial y de anclaje de notas; además, un ajuste menor de verbo en la cláusula final mejora la fuerza imagética y la alineación con el audit trail.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos sensibles del glosario. «Impíos» para רְשָׁעִים y «mar agitado» para נִגְרָשׁ son aceptables en contexto. Se recomienda «arrojan» para וַיִּגְרְשׁוּ por mayor cercanía al valor de ‘expulsar/cast up’.
  issues:
  - severity: medium
    issue: La nota [b] está aplicada a la frase equivocada.
    rationale: En el audit trail inglés, la nota b ofrece la alternativa para la cláusula final («cast up mire and mud»), no para «for it cannot be quiet». En español, [b] se colocó en «aquietarse», lo que rompe la correspondencia documentada.
  - severity: medium
    issue: El verbo «levantan» atenúa el matiz de expulsar/arroj ar hacia arriba en וַיִּגְרְשׁוּ.
    rationale: Aunque «levantan» es inteligible, el hebreo y el POB auditado apuntan a ‘cast up/toss up’. «Arrojan» conserva mejor la imagen de las aguas echando fuera lodo y cieno.
  - severity: low
    issue: La nota [a] habla de «mar removido», que es aceptable, pero podría sonar menos precisa que la explicación del mar ‘agitado/batido’.
    rationale: No es un error grave, pero conviene que la nota mantenga la tensión entre sentido más literal (‘impulsado/removido’) y opciones más interpretativas sin introducir una formulación menos natural que el texto principal.
  revised_spanish_text: Pero los impíos son como el mar agitado[a], porque no puede aquietarse, y sus aguas arrojan[b] lodo y cieno.
  revised_footnotes:
  - marker: a
    text: O «el mar turbado». El verbo hebreo puede expresarse de modo más interpretativo como «turbado» o «batido», pero la imagen más literal es la de un mar removido.
    reason: lexical_alternative
  - marker: b
    text: O «echan fuera lodo y cieno».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [b] para que corresponda a la cláusula final, en conformidad con el audit trail inglés. También se reemplaza «levantan» por «arrojan» para reflejar mejor el valor de expulsar/cast up de וַיִּגְרְשׁוּ, sin perder naturalidad en español. El resto del versículo puede mantenerse.
