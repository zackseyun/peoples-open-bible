  chosen_reading: 'A prophetic announcement of covenantal reversal: exploitative wealth will not be enjoyed'
  alternative_readings:
  - A merely general moral proverb about injustice
  rationale: The verse is not abstract wisdom but a specific prophetic judgment oracle. The translation preserves the direct second-person address and future deprivation without softening it into a general principle.
