translation:
  language: es
  text: Y en cuanto oí estas cosas[a], rasgué mis vestidos y la vestidura sagrada, y arranqué cabello de mi cabeza y de mi barba[b], y me senté consternado y profundamente afligido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al oír estas cosas». La expresión griega marca inmediatez temporal.
    reason: lexical_alternative
  - marker: b
    text: O «asombrado» o «aturdido» para «consternado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅμα τῷ ἀκοῦσαί με
  english_pob_choice: as soon as I heard
  chosen_spanish: en cuanto oí
  alternatives_spanish:
  - cuando oí
  - al oír
  lexicon: LSJ
  rationale: La construcción indica secuencia inmediata. «En cuanto oí» conserva la inmediatez con un español natural y digno, sin perder el valor temporal puntual del griego.
- source_word: ἔρρηξα
  english_pob_choice: I tore
  chosen_spanish: rasgué
  alternatives_spanish:
  - rompí
  - desgarré
  lexicon: LSJ
  rationale: El verbo describe rasgar vestiduras en duelo. «Rasgué» es idiomático en español bíblico y comunica mejor la acción ritual de lamento que un simple «rompí».
- source_word: τὰ ἱμάτια
  english_pob_choice: my garments
  chosen_spanish: mis vestidos
  alternatives_spanish:
  - mis ropas
  - mis prendas
  lexicon: LSJ
  rationale: El poseedor se sobreentiende en griego; en español conviene explicitarlo. «Vestidos» mantiene registro formal y el sentido de prendas exteriores de duelo.
- source_word: τὴν ἱερὰν ἐσθῆτα
  english_pob_choice: the holy robe
  chosen_spanish: la ropa santa
  alternatives_spanish:
  - el manto santo
  - la vestidura sagrada
  - la ropa sagrada
  lexicon: LSJ
  rationale: ἱερὰν califica la vestidura como santa/sagrada, pero el griego no especifica que sea sacerdotal. «Ropa santa» conserva esa amplitud y evita introducir una precisión no expresada explícitamente.
- source_word: κατέτειλον
  english_pob_choice: I pulled out
  chosen_spanish: arranqué
  alternatives_spanish:
  - saqué
  - tiré de
  lexicon: LSJ
  rationale: Con cabello y barba, el verbo expresa arrancar con fuerza. «Arranqué» transmite bien la violencia del gesto y su valor de duelo sin sonar forzado.
- source_word: τοῦ τριχώματος τῆς κεφαλῆς καὶ τοῦ πώγωνος
  english_pob_choice: hair from my head and beard
  chosen_spanish: cabello de mi cabeza y de mi barba
  alternatives_spanish:
  - pelo de mi cabeza y de mi barba
  - cabellos de mi cabeza y de mi barba
  lexicon: LSJ
  rationale: '«Cabello» funciona como sustantivo colectivo y resulta natural en español. Se conservan ambos miembros del paralelismo corporal: cabeza y barba.'
- source_word: σύννους
  english_pob_choice: stunned
  chosen_spanish: consternado
  alternatives_spanish:
  - aturdido
  - asombrado
  - dismayado
  lexicon: LSJ
  rationale: El término expresa golpe mental, confusión y abatimiento. «Consternado» recoge bien ese impacto interior; «aturdido» podría sonar más físico y «asombrado» sería demasiado débil o neutral.
- source_word: περίλυπος
  english_pob_choice: deeply grieved
  chosen_spanish: profundamente afligido
  alternatives_spanish:
  - muy triste
  - profundamente triste
  - lleno de dolor
  lexicon: LSJ
  rationale: El adjetivo denota intensa tristeza/pena. «Profundamente afligido» preserva la gravedad del lamento y encaja con el registro de duelo del versículo.
theological_decisions:
- issue: Naturaleza de la «ropa santa»
  english_pob_reading: the holy robe; possibly an official priestly robe, though the Greek does not state this explicitly.
  chosen_spanish_reading: la ropa santa, sin precisar que sea sacerdotal
  alternative_spanish_readings:
  - la vestidura sagrada
  - la ropa sacerdotal
  rationale: El griego solo la caracteriza como sagrada/santa. Mantener esa amplitud evita añadir una identificación sacerdotal que el texto no afirma de manera explícita, aunque el contexto pueda sugerir un uso cultual.
  doctrine_reference: 'Principio de equivalencia óptima y cautela exegética: no sobreespecificar donde el texto no lo hace.'
translation_notes:
  revision_awareness: 'La versión inglesa auditada permanece estable: no hubo revisiones aplicadas y el control cruzado reporta alta concordancia con solo observaciones menores. La redacción española sigue de cerca el griego como texto ancla, respetando las decisiones léxicas del POB en cuanto a inmediatez temporal, gesto de duelo, y amplitud de «ropa santa».'
  spanish_consistency_notes:
  - 'Se conserva el paralelismo de acciones con verbos en primera persona del singular: oí, rasgué, arranqué, me senté.'
  - «Ropa santa» evita el término «SEÑOR» o cualquier sustitución no presente en el versículo.
  - «Consternado y profundamente afligido» reproduce el doble estado anímico del griego sin fusionarlo en una sola idea.
  - La puntuación con comas refleja la secuencia narrativa del original griego.
  - Las notas mantienen las alternativas documentadas por la POB inglesa sin introducir glosas doctrinales adicionales.
