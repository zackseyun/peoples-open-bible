  - severity: medium
    issue: “mujer prominente” es un calco algo rígido
    rationale: Aunque transmite estatus, en español bíblico-natural “mujer distinguida” suena más idiomático y conserva bien la idea de posición social o medios, documentada en la nota.
  - severity: low
    issue: “Y sucedió un día que” es algo pesado
    rationale: No es infiel, pero “Y sucedió que un día” o “Y un día” fluye mejor. Dado el tono narrativo, conviene una formulación más natural sin perder el marco temporal.
  revised_spanish_text: Y sucedió que un día Eliseo pasó por Sunem, donde había una mujer distinguida[a], y ella lo instó a comer pan[b]. Y cada vez que pasaba por allí, se desviaba hacia allá para comer pan.
  revised_footnotes:
