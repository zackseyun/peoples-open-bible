translation:
  language: es
  text: La casa y la riqueza son herencia de los padres, pero una esposa prudente[a] proviene de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "una mujer prudente". El hebreo אִשָּׁה puede significar "mujer" o "esposa"; en este contexto, "esposa" encaja mejor con el contraste del proverbio con la propiedad heredada.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיִת
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - casa
  lexicon: HALOT
  rationale: En el paralelismo con "riqueza" e "herencia", el sustantivo concreto apunta a un bien material/propiedad; "casa" conserva esa referencia concreta sin volverlo demasiado abstracto.
- source_word: הוֹן
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - riquezas
  - patrimonio
  lexicon: HALOT
  rationale: El término expresa posesiones materiales o prosperidad acumulada; "riqueza" es natural en español contemporáneo y mantiene el valor patrimonial del proverbio.
- source_word: נַחֲלַת
  english_pob_choice: an inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - herencia
  lexicon: HALOT
  rationale: La construcción nominal comunica una posesión recibida por linaje. "Herencia" reproduce bien la idea de bien transmitido de padres a hijos.
- source_word: אָבוֹת
  english_pob_choice: fathers
  chosen_spanish: de los padres
  alternatives_spanish:
  - de los padres
  - de los antepasados
  - de los padres varones
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural y literalmente dice "padres", en español "de los padres" comunica el referente parental de manera fluida sin perder el matiz genealógico del proverbio.
- source_word: מֵיְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: proviene de Yahvé
  alternatives_spanish:
  - viene de Yahvé
  - es de Yahvé
  - proviene de Yahvé
  lexicon: HALOT
  rationale: La preposición marca origen. "Proviene de Yahvé" expresa con claridad la fuente divina y sigue el estándar del proyecto para el nombre del pacto.
- source_word: אִשָּׁה
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - esposa
  - mujer
  lexicon: HALOT
  rationale: En el contraste con bienes heredados, el sentido relacional/marital es el más probable. "Esposa" evita ambigüedad en español, aunque se mantiene la nota sobre la posibilidad lexical de "mujer".
- source_word: מַשְׂכָּלֶת
  english_pob_choice: prudent
  chosen_spanish: prudente
  alternatives_spanish:
  - discreta
  - sensata
  - prudente
  lexicon: HALOT
  rationale: El adjetivo proviene de la raíz de entender con discernimiento; "prudente" expresa bien sabiduría práctica y encaja con el registro sapiencial.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre propio del pacto en vez de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la segunda cola del proverbio
  english_pob_reading: a prudent wife is from Yahweh
  chosen_spanish_reading: una esposa prudente proviene de Yahvé
  alternative_spanish_readings:
  - una mujer prudente proviene de Yahvé
  - una esposa prudente es de Yahvé
  rationale: El proverbio contrasta bienes heredados con el origen divinamente atribuido de la esposa. Se mantiene "esposa" por el encaje contextual, sin eliminar la alternativa lexical documentada en la nota.
  doctrine_reference: Lexical/theological note on providence, not a separate doctrinal assertion.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el veredicto de alta concordancia se mantiene, así que la redacción española sigue de cerca la lectura auditada del hebreo y del POB inglés.
  spanish_consistency_notes:
  - Se usa "Yahvé" para el nombre divino conforme al estándar del proyecto.
  - Se evita "SEÑOR" como máscara reverencial.
  - '"Esposa" se eligió por el contexto con herencia y bienes, pero se preserva la alternativa lexical en nota.'
  - La sintaxis busca ser natural en español sin diluir el paralelismo sapiencial del hebreo.
