translation:
  language: es
  text: 'Clama de nuevo, diciendo: «Así dice Yahvé de los ejércitos: Mis ciudades de nuevo rebosarán[a] de prosperidad, y Yahvé de nuevo consolará a Sion, y de nuevo escogerá a Jerusalén.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mis ciudades de nuevo se extenderán por causa de lo bueno» o «de nuevo abundarán de cosas buenas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  - todavía
  lexicon: HALOT
  rationale: El adverbio repite a lo largo del versículo la idea de renovación de la acción divina tras el juicio. «Otra vez» expresa repetición/restauración en un español natural y permite mantener el paralelismo de los tres usos posteriores.
- source_word: קְרָא
  english_pob_choice: Call out
  chosen_spanish: Clama
  alternatives_spanish:
  - Proclama
  - Grita
  - Llama
  lexicon: HALOT
  rationale: Es un imperativo de anuncio público dirigido al mensajero profético. «Clama» conserva el tono audible y proclamador sin sonar forzado en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - así que dice
  lexicon: HALOT
  rationale: Funciona como partícula quotativa; «diciendo» es una correspondencia directa y fluida en español.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Es la fórmula profética convencional. «Así dice» mantiene el registro solemne y el valor de mensajero sin arcaísmo excesivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino según la norma del proyecto. «Yahvé» traduce directamente el Tetragrámaton y evita la sustitución titular.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español bíblico, «de los ejércitos» comunica el título divino con claridad. Aunque «hosts» puede sugerir huestes, el plural «ejércitos» mantiene la fuerza del título sin perder inteligibilidad.
- source_word: תְּפוּצֶינָה
  english_pob_choice: will ... overflow
  chosen_spanish: rebosarán
  alternatives_spanish:
  - se dispersarán
  - se extenderán
  - abundarán
  lexicon: HALOT
  rationale: El contexto con מִטּוֹב no apunta a mera dispersión geográfica, sino a expansión abundante a causa del bien/prosperidad. «Rebosarán» comunica la imagen de plenitud y desborde que el POB inglés expresa con «overflow».
- source_word: עָרַי
  english_pob_choice: My cities
  chosen_spanish: Mis ciudades
  alternatives_spanish:
  - las ciudades mías
  - mis pueblos
  lexicon: HALOT
  rationale: 'El sufijo de primera persona es significativo y debe conservarse: son ciudades pertenecientes a Yahvé. «Ciudades» preserva el término básico sin diluirlo en «pueblos».'
- source_word: מִטּוֹב
  english_pob_choice: with prosperity
  chosen_spanish: de prosperidad
  alternatives_spanish:
  - con bienes
  - con abundancia
  - de cosas buenas
  lexicon: HALOT
  rationale: Aquí טוֹב no señala simple bondad moral, sino bienestar/ prosperidad de restauración. «De prosperidad» comunica la referencia al estado de bendición y evita una expresión demasiado literal pero poco natural.
- source_word: וְנִחַם
  english_pob_choice: and ... will ... comfort
  chosen_spanish: consolará
  alternatives_spanish:
  - tendrá compasión de
  - animará
  - aliviará
  lexicon: HALOT
  rationale: En contextos de restauración, נחם expresa consuelo después de la aflicción. «Consolará» conserva el matiz pastoral y la acción divina sobre Sion.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: HALOT
  rationale: Nombre propio bíblico mantenido en español tradicional y ampliamente reconocible.
- source_word: וּבָחַר
  english_pob_choice: and again choose
  chosen_spanish: otra vez escogerá
  alternatives_spanish:
  - otra vez elegirá
  - otra vez seleccionará
  - otra vez tomará
  lexicon: HALOT
  rationale: בחר significa elegir/escoger. «Escogerá» es directo y natural; conserva la acción divina de favor renovado sin cargar el texto con categorías sistemáticas posteriores.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalém
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la política del proyecto, se conserva el nombre divino como «Yahvé», evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la acción divina sobre Jerusalén
  english_pob_reading: again choose Jerusalem
  chosen_spanish_reading: otra vez escogerá a Jerusalén
  alternative_spanish_readings:
  - otra vez elegirá a Jerusalén
  - otra vez tomará a Jerusalén para sí
  rationale: בחר expresa elección/favor renovado dentro de un oráculo de restauración. «Escogerá» conserva la relación de pacto sin introducir una formulación doctrinal más específica de lo que permite el hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin revisiones aplicadas; se mantiene la solución inglesa principal, con una nota alternativa para la expresión hebrea מִטּוֹב / תְּפוּצֶינָה que el POB inglés ya señaló como lexicalmente ambigua.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene el paralelismo de עוֹד con «otra vez» en los tres lugares principales del versículo.
  - «Sion» y «Jerusalén» se conservan como nombres propios bíblicos españoles.
  - «Consolará» y «escogerá» reflejan la semántica de restauración sin sobreinterpretación teológica.
