translation:
  language: es
  text: y aceite para la luz, y especias para el aceite de la unción y para el incienso aromático[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incienso de especias» / «incienso aromático».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - óleo
  - aceite de oliva
  lexicon: HALOT
  rationale: ‘שֶׁמֶן’ denota aceite en general; en este contexto cultual probablemente sea aceite de oliva, pero el hebreo no lo especifica. ‘Aceite’ es la opción natural y fiel sin añadir precisión no explícita.
- source_word: לַמָּאוֹר
  english_pob_choice: for the light
  chosen_spanish: para la luz
  alternatives_spanish:
  - para alumbrar
  - para la iluminación
  lexicon: HALOT
  rationale: La construcción nominal señala aceite destinado a proveer luz. ‘Para la luz’ conserva bien la forma breve del hebreo y sigue de cerca la elección inglesa, sin volverla más interpretativa.
- source_word: בְשָׂמִים
  english_pob_choice: spices
  chosen_spanish: especias
  alternatives_spanish:
  - aromáticos
  - especias aromáticas
  lexicon: HALOT
  rationale: El plural se refiere a sustancias aromáticas usadas en preparaciones sagradas. ‘Especias’ es idiomático en español y suficientemente amplio; ‘aromáticos’ sonaría más técnico o menos natural aquí.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: the anointing oil
  chosen_spanish: el aceite de la unción
  alternatives_spanish:
  - el aceite para ungir
  - el aceite de ungimiento
  lexicon: HALOT
  rationale: La expresión cultual fija se vierte con claridad como ‘aceite de la unción’. Mantiene el valor ritual del sintagma sin forzar una paráfrasis.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - incienso quemado
  - ofrenda de incienso
  lexicon: HALOT
  rationale: En contexto tabernacular, el término designa incienso. ‘Incienso’ es la equivalencia directa y más reconocible en español.
- source_word: הַסַּמִּים
  english_pob_choice: fragrant
  chosen_spanish: aromático
  alternatives_spanish:
  - fragante
  - de especias
  - perfumado
  lexicon: HALOT
  rationale: La frase completa significa ‘incienso de especias/aromáticos’. ‘Aromático’ preserva el matiz olfativo sin añadir una imagen no presente en el hebreo.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la auditoría inglesa: mantiene la lista de ofrendas cultuales en el mismo orden, conserva la estructura nominal breve del hebreo y evita especificar ‘aceite de oliva’ o expandir ‘incienso’ más allá de lo que exige el texto. La nota reproduce la alternativa léxica documentada para קְטֹרֶת הַסַּמִּים.'
  spanish_consistency_notes:
  - Se mantuvo ‘aceite’ en lugar de ‘óleo’ para una equivalencia más natural y consistente con el uso bíblico en español contemporáneo.
  - ‘La unción’ conserva la referencia ritual fija del sintagma sin introducir una interpretación doctrinal adicional.
  - ‘Aromático’ funciona como adjetivo breve para הַסַּמִּים y deja abierta la alternativa ‘incienso de especias’ documentada por la auditoría.
