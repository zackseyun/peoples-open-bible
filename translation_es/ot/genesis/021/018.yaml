translation:
  language: es
  text: Levántate[a], alza al muchacho y sostenlo firmemente con tu mano[b], porque yo haré de él una gran nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ponte de pie». El hebreo usa un imperativo breve de levantarse, dirigido a Agar.
    reason: lexical_alternative
  - marker: b
    text: O «agárralo con tu mano». La expresión hebrea enfatiza apoyo firme o agarre fuerte, no simplemente tomarlo de la mano.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֚וּמִי
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Alzate
  lexicon: HALOT
  rationale: Imperativo femenino singular dirigido a Agar. «Levántate» es natural en español, conserva la fuerza del mandato y evita una formulación arcaica.
- source_word: שְׂאִ֣י
  english_pob_choice: lift up
  chosen_spanish: alza
  alternatives_spanish:
  - levanta
  - toma
  lexicon: HALOT
  rationale: El verbo expresa elevar o levantar al muchacho, no necesariamente cargarlo de manera continua. «Alza» conserva la imagen verbal breve y directa.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: HALOT
  rationale: En este contexto narrativo, «muchacho» transmite bien la edad y mantiene un registro digno y natural en español.
- source_word: וְהַחֲזִיקִי אֶת יָדֵךְ בּוֹ
  english_pob_choice: hold him fast with your hand
  chosen_spanish: sostenlo firmemente con tu mano
  alternatives_spanish:
  - ténlo sujeto con tu mano
  - agarra con firmeza con tu mano
  lexicon: HALOT
  rationale: La expresión hebrea enfatiza apoyo firme y agarre fuerte. «Sostenlo firmemente con tu mano» intenta preservar ese matiz sin sonar enigmático para el lector español. Se evita reducirlo a «tomarlo de la mano», porque eso debilita el valor de חזק.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato. «Porque» expresa con claridad la relación causal en español.
- source_word: לְגוֹי גָּדוֹל
  english_pob_choice: into a great nation
  chosen_spanish: una gran nación
  alternatives_spanish:
  - en una gran nación
  - como una gran nación
  lexicon: HALOT
  rationale: La preposición hebrea con שׂים marca resultado o destinación. En español, la formulación natural es «lo haré una gran nación», que conserva el sentido de resultado sin sobrecargar la frase.
- source_word: אֲשִׂימֶנּוּ
  english_pob_choice: I will make him
  chosen_spanish: lo haré
  alternatives_spanish:
  - lo pondré
  - lo estableceré
  lexicon: HALOT
  rationale: 'El verbo שׂים tiene un campo amplio: poner, establecer, hacer. Aquí el resultado nacional pide una solución idiomática en español: «lo haré».'
theological_decisions:
- issue: Promesa divina sobre el futuro de Ismael
  english_pob_reading: Render the statement straightforwardly as God's promise to make Ishmael into a great nation.
  chosen_spanish_reading: Presentar la declaración como la promesa directa de Dios de hacer de él una gran nación.
  alternative_spanish_readings:
  - Interpretarla de manera más tipológica o atenuada
  - Reformularla como simple predicción
  rationale: El hebreo comunica una promesa directa y concreta. La traducción conserva esa afirmación sin suavizarla ni convertirla en una lectura teológica posterior. Se mantiene la tensión narrativa de la promesa tal como está en el texto fuente.
  doctrine_reference: Primacía del texto original; conservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del audit trail que corrigió la ambigüedad de la frase inglesa sobre la mano. La versión española evita una lectura que suene a «tomarlo de la mano» y conserva el matiz de sujeción firme implícito en חזק. También se preserva la lectura directa de la promesa divina sin introducir explicaciones interpretativas.
  spanish_consistency_notes:
  - 'Se emplea el tuteo bíblico natural en imperativos femeninos singulares: «Levántate», «alza», «sostenlo».'
  - Se traduce יהוה como «Yahvé» por norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Muchacho» se usa como equivalente contextual de נַעַר, sin forzar un término más técnico que el español común.
