translation:
  language: es
  text: Y habrá una calzada[a] para el remanente de su pueblo[b] que quede de Asiria[c], como la hubo para Israel en el día en que subió[d] de la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un camino elevado»; hebreo מְסִלָּה, una vía preparada para el paso.
    reason: lexical_alternative
  - marker: b
    text: O «del resto de su pueblo»; se conserva «remanente» por su peso técnico en Isaías.
    reason: lexical_alternative
  - marker: c
    text: O «que haya quedado de Asiria».
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «el día de su subida de la tierra de Egipto», aludiendo al Éxodo.
    reason: cross_reference
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: And there will be
  chosen_spanish: Y habrá
  alternatives_spanish:
  - Y será
  - Y existirá
  lexicon: HALOT
  rationale: La forma verbal introduce un resultado futuro en discurso profético; «habrá» conserva el sentido predictivo con español natural y digno.
- source_word: מְסִלָּה
  english_pob_choice: a highway
  chosen_spanish: un camino
  alternatives_spanish:
  - una calzada
  - un camino elevado
  lexicon: HALOT
  rationale: En español, «camino» comunica la ruta preparada sin sonar excesivamente técnico; la imagen de vía abierta para el retorno queda preservada. «Camino» es menos específico que «highway», pero en este contexto poético resulta más natural y suficientemente fiel.
- source_word: לִשְׁאָר עַמּוֹ
  english_pob_choice: for the remnant of his people
  chosen_spanish: para el remanente de su pueblo
  alternatives_spanish:
  - para el resto de su pueblo
  - para el remanente de su gente
  lexicon: HALOT
  rationale: «Remanente» preserva el término isaiano técnico-teológico de שְׁאָר. Se mantiene «su pueblo» para respetar la referencia posesiva no resuelta en el hebreo y en la POB inglesa.
- source_word: אֲשֶׁר יִשָּׁאֵר
  english_pob_choice: who remain
  chosen_spanish: que quedare
  alternatives_spanish:
  - que permanezca
  - que quede
  lexicon: HALOT
  rationale: El hebreo define al remanente con un participio/futuro pasivo de supervivencia. «Que quedare» mantiene el matiz de lo que permanece tras la devastación y encaja con el registro bíblico en español; evita resolver demasiado la voz o el aspecto.
- source_word: מֵאַשּׁוּר
  english_pob_choice: from Assyria
  chosen_spanish: de Asiria
  alternatives_spanish:
  - desde Asiria
  - fuera de Asiria
  lexicon: HALOT
  rationale: La preposición marca origen; «de Asiria» es la forma más directa en español. «Desde Asiria» es posible, pero menos neutral en este encuadre.
- source_word: כַּאֲשֶׁר הָיְתָה
  english_pob_choice: as there was
  chosen_spanish: como lo hubo
  alternatives_spanish:
  - así como hubo
  - tal como hubo
  lexicon: HALOT
  rationale: La comparación con el Éxodo requiere un verbo elíptico en español; «como lo hubo» mantiene el paralelismo sin añadir explicación interpretativa.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - a Israel
  - en favor de Israel
  lexicon: HALOT
  rationale: Se conserva el destinatario colectivo con la forma simple «Israel», equivalente al uso singular colectivo del hebreo.
- source_word: בְּיוֹם עֲלֹתוֹ
  english_pob_choice: in the day when he came up
  chosen_spanish: en el día en que subió
  alternatives_spanish:
  - el día que subió
  - cuando subió
  lexicon: HALOT
  rationale: «Subió» conserva el idiomatismo hebreo de עלה aplicado al Éxodo y evita una paráfrasis excesiva. La forma «en el día en que» refleja el hebreo con claridad.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: «Tierra de Egipto» mantiene el eco bíblico del Éxodo y la formulación solemne del hebreo; «tierra» es una opción legítima para rendering más literal de אֶרֶץ.
theological_decisions:
- issue: Posesivo implícito en «su pueblo»
  english_pob_reading: Retain the text's simple possessive 'his people' without specifying whether the referent is the LORD or the root/shoot figure in the surrounding context.
  chosen_spanish_reading: Mantener «su pueblo» sin aclarar si el poseedor es Yahvé o el descendiente davídico del contexto.
  alternative_spanish_readings:
  - el pueblo de Yahvé
  - el pueblo del Mesías
  rationale: El hebreo no explicita el referente del posesivo en el verso; la POB inglesa también preserva esa tensión. En español conviene no resolverla con una identificación que el texto no formula de manera explícita.
  doctrine_reference: Preservar la tensión interpretativa del texto original.
- issue: Tipología del Éxodo
  english_pob_reading: Render the comparison straightforwardly as a historical analogy to Israel's exodus from Egypt, without expanding it into a doctrinal paraphrase of a 'second exodus.'
  chosen_spanish_reading: Traducir la comparación como una analogía histórica con el Éxodo, sin añadir la etiqueta doctrinal de «segundo éxodo».
  alternative_spanish_readings:
  - un nuevo éxodo para el remanente final
  - como en el éxodo de Israel
  rationale: El versículo evoca el patrón del Éxodo, pero el hebreo presenta una comparación, no un rótulo doctrinal. La traducción debe conservar la alusión sin expandirla.
  doctrine_reference: Primacía de la fuente original sobre la paráfrasis interpretativa.
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail inglés, que ajusta la concordancia a «who remain» y naturaliza la cláusula temporal como «when he came up»; la versión española refleja ese mismo equilibrio entre literalidad y fluidez.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo nombra explícitamente el tetragrámaton; aquí no aparece, por lo que no se introduce.
  - Se conserva «remanente» como término técnico isaiano, en lugar de sustituirlo por «resto» en el texto principal.
  - «Asiria» y «Egipto» se mantienen como nombres propios bíblicos estándar en español.
  - La puntuación y el orden sintáctico buscan sonar bíblicos sin copiar rígidamente el inglés.
