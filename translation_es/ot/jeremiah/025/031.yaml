revisions:
- from: Un estruendo[a] ha llegado hasta el extremo de la tierra, porque Yahvé tiene un pleito[b] con las naciones; él entra en juicio con toda carne[c]. Ha entregado a los malvados a la espada[d], declara Yahvé.
  to: Un estruendo[a] ha llegado hasta el extremo de la tierra, porque Yahvé tiene una causa[b] contra las naciones; él entra en juicio con toda carne[c]. Ha entregado a los malvados a la espada[d], declara Yahvé.
  rationale: Se revisa «pleito» a «causa» para reflejar mejor el matiz forense de רִיב en un español más sobrio y panhispánico, y se ajusta «con las naciones» a «contra las naciones» por coherencia con la construcción jurídica y el sentido adversativo del contexto. También se corrige la nota sobre «ha entregado ... a la espada» para alinearla con el hebreo y con la documentación del POB inglés.
  reviewer_model: gpt-5.4
