  to: ¿Qué provecho tiene el trabajador de aquello en que se afana?[a]
  rationale: Se ajusta el español para una formulación más compacta y natural («el trabajador»), y se corrige el anclaje de la nota para que corresponda a la alternativa traductológica completa, en línea con el rastro de auditoría inglés. No se requiere cambio doctrinal ni adjudicación compleja.
