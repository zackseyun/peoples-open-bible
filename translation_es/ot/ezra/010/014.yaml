    rationale: Aunque posible, 'jefes' puede sonar abrupto o demasiado coloquial en español bíblico neutral. 'Líderes' o 'dirigentes' comunica mejor la función representativa y administrativa.
  - severity: low
    issue: '"el ardor de la ira" suena algo pesado en español'
    rationale: Preserva la metáfora, pero 'la ardiente ira' o 'la ira ardiente' resulta más natural sin perder fuerza semántica.
