base_translation:
  language: en
  yaml_path: translation/ot/exodus/010/028.yaml
  text: Then Pharaoh said to him[a], “Go away from me. Watch yourself; do not see my face again, for on the day you see my face[b], you will die.”
  footnotes:
  - marker: a
    text: Or more idiomatically, “do not see my face again” or “never see my face again.” The Hebrew is literally “do not add to seeing my face.”
    reason: lexical_alternative
  - marker: b
    text: “My face” may also be understood as “my presence,” but the Hebrew repeats “face” for emphasis.
    reason: lexical_alternative
