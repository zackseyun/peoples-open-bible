translation:
  language: es
  text: Mis rodillas ceden[a] por el ayuno, y mi carne enflaquece[b] por falta de grasa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis rodillas flaquean». El hebreo expresa el fallo físico de las rodillas por debilitamiento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi carne se ha vuelto macilenta» o «se ha consumido». El hebreo alude a la pérdida de grasa corporal, es decir, a la emaciación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְכַּי
  english_pob_choice: my knees
  chosen_spanish: mis rodillas
  alternatives_spanish:
  - mis rótulas
  - mis articulaciones de las rodillas
  lexicon: HALOT
  rationale: El plural con sufijo de 1.ª persona singular se expresa naturalmente con «mis rodillas». Mantiene la imagen corporal concreta del hebreo y su tono poético.
- source_word: כָּשְׁלוּ
  english_pob_choice: give way
  chosen_spanish: flaquean
  alternatives_spanish:
  - se tambalean
  - debilitan
  - ceden
  lexicon: HALOT
  rationale: El verbo hebreo puede significar tropezar o fallar; en este contexto de debilitamiento físico, «flaquean» comunica bien la idea de rodillas que ya no sostienen.
- source_word: מִצּוֹם
  english_pob_choice: from fasting
  chosen_spanish: por el ayuno
  alternatives_spanish:
  - a causa del ayuno
  - por falta de alimento
  lexicon: HALOT
  rationale: La preposición expresa causa o procedencia. En español, «por el ayuno» suena natural y conserva la relación causal sin recargar la frase.
- source_word: וּבְשָׂרִי
  english_pob_choice: and my flesh
  chosen_spanish: y mi carne
  alternatives_spanish:
  - y mi cuerpo
  lexicon: HALOT
  rationale: Se mantiene el valor literal de בשר como «carne», que en este verso describe el cuerpo debilitado y no una idea antropológica más amplia.
- source_word: כָּחַשׁ
  english_pob_choice: grows lean
  chosen_spanish: se ha adelgazado
  alternatives_spanish:
  - se ha enflaquecido
  - se ha vuelto macilenta
  - se ha consumido
  lexicon: HALOT
  rationale: El hebreo describe pérdida visible de peso o emaciación. «Se ha adelgazado» es claro en español y conserva el sentido corporal concreto; el perfecto refleja bien el estado resultante.
- source_word: מִשָּׁמֶן
  english_pob_choice: from lack of fat
  chosen_spanish: por falta de grasa
  alternatives_spanish:
  - sin grasa
  - a falta de grasa
  - por carencia de grasa
  lexicon: HALOT
  rationale: La expresión hebrea señala ausencia o pérdida de grasa corporal. «Por falta de grasa» comunica la misma idea de emaciación con naturalidad en español actual.
translation_notes:
  revision_awareness: La versión inglesa revisó «for lack of fat» a «from lack of fat» para reflejar más directamente la preposición hebrea. La redacción española adopta un equivalente causal natural («por falta de grasa») y conserva el paralelismo corporal del verso.
  spanish_consistency_notes:
  - 'Se conserva la imagen física concreta del texto hebreo: rodillas que fallan y carne que adelgaza.'
  - Se prefirió un español moderno y sobrio, sin sustituir «carne» por «cuerpo», para no perder la correspondencia léxica con בשר.
  - Las notas al pie mantienen la alternativa interpretativa sobre emaciación sin eliminar la tensión semántica del original.
