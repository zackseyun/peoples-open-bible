translation:
  language: es
  text: Pongan su corazón en su muralla[a]; recorran sus ciudadelas[b], para que se lo cuenten a la generación venidera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “su fortificación”; el hebreo designa de manera amplia la defensa o estructura militar de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: O “sus palacios”; el hebreo puede referirse a edificios palaciales o a fortalezas, y el contexto de examinar las defensas de la ciudad favorece “ciudadelas”.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיתוּ
  english_pob_choice: Set
  chosen_spanish: Pongan
  alternatives_spanish:
  - Pongan la atención en
  - Fijen
  - Pongan su corazón en
  lexicon: HALOT
  rationale: El verbo hebreo es imperativo plural y, unido a “corazón”, expresa dirigir la atención. En español, “pongan” conserva la fuerza imperativa sin volver la frase artificial; el complemento “su corazón” mantiene la imagen hebrea.
- source_word: לִבְּכֶם
  english_pob_choice: your heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su atención
  lexicon: HALOT
  rationale: Se conserva “corazón” para reflejar el antropologismo hebreo de לב, que incluye atención, intención y pensamiento. “Su” mantiene el plural dirigido a la comunidad.
- source_word: לְחֵילָה
  english_pob_choice: her rampart
  chosen_spanish: su muralla
  alternatives_spanish:
  - su fortificación
  - su muro exterior
  - su ramparta
  lexicon: HALOT
  rationale: חֵיל designa una estructura defensiva urbana de manera amplia. “Muralla” comunica bien la idea en español bíblico contemporáneo sin perder el sentido de fortificación; se evita “rampart” por no ser natural en español.
- source_word: פַּסְּג֥וּ
  english_pob_choice: pass through
  chosen_spanish: recorran
  alternatives_spanish:
  - atraviesen
  - pasen por
  lexicon: HALOT
  rationale: El contexto es de inspección y recorrido de las defensas de la ciudad. “Recorran” expresa mejor la idea de transitar observando, sin reducirlo a una simple entrada física.
- source_word: אַרְמְנוֹתֶיהָ
  english_pob_choice: her citadels
  chosen_spanish: sus palacios
  alternatives_spanish:
  - sus ciudadelas
  - sus fortalezas
  lexicon: HALOT
  rationale: אַרְמוֹן puede significar palacio o edificio fortificado. El inglés POB privilegió “citadels” por el contexto militar-topográfico; en español, “palacios” conserva el campo semántico básico del término y es la opción más natural, mientras que el contexto de fortificación sigue estando dado por “muralla” y el recorrido de la ciudad.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Marcador final estándar. “Para que” es la equivalencia natural y clara en español.
- source_word: תְּסַפְּרוּ
  english_pob_choice: you may tell
  chosen_spanish: se lo cuenten
  alternatives_spanish:
  - lo narren
  - lo cuenten
  lexicon: HALOT
  rationale: El piel de ספר implica contar, relatar o narrar. “Se lo cuenten” mantiene la idea de transmitir el testimonio a otra generación y suena natural en español.
- source_word: לְדוֹר אַחֲרוֹן
  english_pob_choice: the next generation
  chosen_spanish: la generación venidera
  alternatives_spanish:
  - la próxima generación
  - la generación siguiente
  lexicon: HALOT
  rationale: “Venidera” reproduce el sentido de futuro de אַחֲרוֹן y conserva un tono bíblico-digno en español, sin sonar rígido.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés de forma fuente-céntrica: se mantuvieron el imperativo comunitario, la imagen de “corazón”, el recorrido físico de las defensas y el propósito de transmisión intergeneracional. Se ajustó la arquitectura léxica al español natural, evitando calcos como “set your heart” o “citadels” y preservando la tensión semántica entre palacio y fortaleza mediante nota.'
  spanish_consistency_notes:
  - Se usó el tratamiento plural de segunda persona (“Pongan”, “recorran”, “se lo cuenten”) de forma uniforme.
  - Se conservó “corazón” por coherencia con el léxico bíblico hebreo y con el estilo del proyecto.
  - La nota sobre אַרְמְנוֹתֶיהָ mantiene la alternativa palaciega sin borrar el matiz defensivo del contexto.
  - La puntuación y el ritmo buscan ser aptos para lectura pública en un registro bíblico moderno.
