revisions:
- from: Él llegó hasta delante de la puerta del rey[a], porque no se podía entrar a la puerta del rey vestido de cilicio.
  to: Él llegó hasta el frente de la puerta del rey[a], porque nadie podía entrar por la puerta del rey[b] vestido de cilicio.
  rationale: 'La revisión mantiene fielmente el hebreo y la auditoría inglesa, pero mejora la naturalidad del español en dos puntos clave: la delimitación espacial de עַד לִפְנֵי y la prohibición implícita en אֵין + infinitivo. Además, restaura en español la segunda alternativa lexical preservada por el POB inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:01:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Mardoqueo se acercó solo hasta el frente de la puerta del rey y no entró por la prohibición de hacerlo en ropa de duelo. Sin embargo, la construcción española ''entrar a la puerta'' suena menos natural y menos precisa que ''entrar por la puerta'' o una reformulación equivalente. También conviene conservar la alternativa formal documentada en la auditoría inglesa sobre la imposibilidad/prohibición de entrar en cilicio.'
  spanish_quality_summary: 'El texto es claro y digno, pero ''hasta delante de la puerta'' resulta algo pesado y ''entrar a la puerta'' es poco idiomático en este contexto. ''Llegó hasta el frente de la puerta del rey'' y ''nadie podía entrar por la puerta del rey vestido de cilicio'' mejoran la naturalidad sin perder precisión. La nota actual también tiene una alternativa española poco natural: ''antes de la puerta'' debería ser ''delante de la puerta'' o ''frente a la puerta''.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. 'Cilicio' es una buena equivalencia para שָׂק en este contexto. 'Puerta del rey' preserva adecuadamente שַׁעַר הַמֶּלֶךְ.
  issues:
  - severity: medium
    issue: La expresión 'entrar a la puerta del rey' es poco natural en español.
    rationale: El hebreo expresa entrada por/en el recinto de la puerta; en español 'entrar por la puerta del rey' o una reformulación impersonal equivalente comunica mejor la idea de acceso prohibido.
  - severity: low
    issue: '''Hasta delante de la puerta'' suena algo forzado.'
    rationale: Aunque es comprensible, una formulación como 'hasta el frente de la puerta' o 'hasta quedar delante de la puerta' refleja con más fluidez el límite espacial de עַד לִפְנֵי.
  - severity: low
    issue: 'La nota al pie usa una alternativa española poco idiomática: ''antes de la puerta''.'
    rationale: La alternativa documentada en inglés es 'before the king’s gate' en sentido espacial, no temporal; en español debe expresarse como 'delante de la puerta' o 'frente a la puerta'.
  revised_spanish_text: Él llegó hasta el frente de la puerta del rey[a], porque nadie podía entrar por la puerta del rey[b] vestido de cilicio.
  revised_footnotes:
  - marker: a
    text: 'O: ''hasta la presencia de la puerta del rey'' / ''delante de la puerta del rey''. El hebreo enfatiza que se acercó solo hasta el punto que quedaba delante de ella.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede expresarse más formalmente: ''porque no había entrada por la puerta del rey en cilicio''. El sentido es que estaba prohibido entrar con ropa de duelo.'
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene fielmente el hebreo y la auditoría inglesa, pero mejora la naturalidad del español en dos puntos clave: la delimitación espacial de עַד לִפְנֵי y la prohibición implícita en אֵין + infinitivo. Además, restaura en español la segunda alternativa lexical preservada por el POB inglés.'
