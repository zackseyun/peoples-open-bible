translation:
  language: es
  text: Porque es un jubileo; será santo para ustedes. Del campo comerán su fruto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su rendimiento» o «su cosecha». El término hebreo se refiere a lo que el campo produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduzco la relación explicativa del verso con una conjunción natural en español. «Porque» mantiene el valor justificativo de כִּי sin forzar un matiz demasiado causal.
- source_word: יוֹבֵל
  english_pob_choice: jubilee
  chosen_spanish: jubileo
  alternatives_spanish:
  - Jubileo
  - año de jubileo
  lexicon: HALOT
  rationale: En Levítico 25 el término designa la institución del año jubilar; «jubileo» conserva el valor léxico sin convertirlo en título propio. La minúscula sigue la opción del inglés POB.
- source_word: קֹדֶשׁ תִּהְיֶה לָכֶם
  english_pob_choice: it shall be holy to you
  chosen_spanish: será santo para ustedes
  alternatives_spanish:
  - será santo para vosotros
  - será sagrado para ustedes
  - estará apartado para ustedes
  lexicon: HALOT
  rationale: «Santo» reproduce la fuerza cultual y de consagración de קֹדֶשׁ. «Para ustedes» expresa la relación del año con Israel de forma natural en español. Se evita «sagrado» por ser menos cargado teológicamente y «apartado» por debilitar la formulación explícita de santidad.
- source_word: מִן הַשָּׂדֶה
  english_pob_choice: From the field
  chosen_spanish: Del campo
  alternatives_spanish:
  - Desde el campo
  - De la tierra
  lexicon: HALOT
  rationale: La frase es directa y concreta. «Del campo» conserva la referencia al lugar del que proviene el alimento y suena natural en español.
- source_word: תֹּאכְלוּ
  english_pob_choice: you shall eat
  chosen_spanish: comerán
  alternatives_spanish:
  - comerán ustedes
  - podrán comer
  - habrán de comer
  lexicon: HALOT
  rationale: En español bíblico puede expresarse el imperativo/instructivo legal con futuro. «Comerán» comunica la prescripción de forma idiomática y mantiene el tono legal.
- source_word: תְּבוּאָתָהּ
  english_pob_choice: its produce
  chosen_spanish: produce
  alternatives_spanish:
  - rendimiento
  - cosecha
  - fruto
  lexicon: HALOT
  rationale: La palabra hebrea alude a lo que el campo produce. «Produce» es fiel al sentido amplio e inclusivo del original, aunque su forma es algo menos usual en español; por ello queda explicado en nota como alternativa léxica.
theological_decisions:
- issue: Santidad del jubileo como estado asignado al año
  english_pob_reading: it shall be holy to you
  chosen_spanish_reading: será santo para ustedes
  alternative_spanish_readings:
  - será sagrado para ustedes
  - estará apartado para ustedes
  rationale: El texto atribuye santidad al jubileo mismo en relación con la comunidad. «Santo» conserva el peso teológico de קֹדֶשׁ, y el futuro mantiene el registro legal-prescriptivo del hebreo.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: El contexto inglés muestra un acuerdo alto y no presenta revisiones aplicadas; la presente versión sigue de cerca el razonamiento auditado, con adaptación al español natural y preservación de la tensión léxica de תְּבוּאָתָהּ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «santo» en continuidad con la terminología bíblica de santidad en lugar de «sagrado», para no rebajar el contenido teológico.
  - La nota del sustantivo final preserva la amplitud semántica de תְּבוּאָתָהּ sin fijar una sola equivalencia exclusiva.
