    rationale: El hebreo describe que Yahvé los desbarató/confundió en batalla. «Los llenó de confusión» es comprensible, pero menos idiomático y menos directo que «los confundió».
  - severity: low
    issue: Apertura con «Y mientras» es innecesariamente pesada
    rationale: El waw narrativo no exige mantener una conjunción inicial si el español fluye mejor sin ella.
