revisions:
- from: Y Yahvé dio a Joaquín, rey de Judá, en su mano[a], junto con algunos de los vasos de la casa de Dios. Los llevó a la tierra de Sinar, a la casa de su dios[c][b], y llevó los vasos a la casa del tesoro de su dios.
  to: Y el Señor entregó a Joaquín, rey de Judá, en sus manos[a], junto con algunos de los vasos de la casa de Dios. Los llevó a la tierra de Sinar, a la casa de su dios[c][b], y llevó los vasos a la tesorería de su dios.
  rationale: 'Se corrige el punto principal de fidelidad fuente-auditoría: אֲדֹנָי debe traducirse ''el Señor'', no ''Yahvé''. También se mejora la naturalidad española con ''en sus manos'' y ''tesorería'', sin perder la nota que conserva la alternativa más literal ''casa del tesoro''. Se mantiene ''Joaquín'' conforme al borrador y al uso español documentado, así como el paralelismo ''casa de Dios / casa de su dios'' en la cláusula central.'
  reviewer_model: gpt-5.4
