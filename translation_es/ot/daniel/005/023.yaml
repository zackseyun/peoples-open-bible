translation:
  language: es
  text: Pero te has exaltado contra el Señor del cielo, y los vasos de su casa fueron traídos delante de ti; y tú y tus nobles, tus esposas y tus concubinas han bebido vino de ellos. Y has alabado a los dioses de plata y de oro, de bronce, de hierro, de madera y de piedra, que no ven ni oyen ni saben; pero al Dios en cuya mano está tu aliento, y cuyos son todos tus caminos, no has honrado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מָרֵא שְׁמַיָּא
  english_pob_choice: the Lord of heaven
  chosen_spanish: el Señor del cielo
  alternatives_spanish:
  - el Maestro del cielo
  - el Señor de los cielos
  lexicon: HALOT
  rationale: מָרֵא expresa 'señor/maestro'. En español, 'Señor del cielo' conserva el tono reverente del título divino y evita una formulación demasiado técnica. 'Del cielo' refleja el singular colectivo de 'cielos' en este contexto.
- source_word: הִתְרוֹמַמְתָּ
  english_pob_choice: have exalted yourself
  chosen_spanish: te has exaltado
  alternatives_spanish:
  - te has levantado
  - te has engrandecido
  lexicon: HALOT
  rationale: El verbo reflexivo expresa autoexaltación arrogante. 'Te has exaltado' es natural en español y conserva el matiz de elevación indebida.
- source_word: מָאנַיָּא
  english_pob_choice: the vessels
  chosen_spanish: los vasos
  alternatives_spanish:
  - los utensilios
  - los recipientes
  lexicon: HALOT
  rationale: En contexto cultual, 'vessels' se refiere a objetos del templo. 'Vasos' es idiomático en español bíblico y suficientemente preciso aquí.
- source_word: בַיְתֵהּ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su templo
  lexicon: HALOT
  rationale: La fuente dice literalmente 'casa'. En este contexto se entiende como la casa de Dios, es decir, el templo, pero la traducción conserva la imagen original.
- source_word: רַבְרְבָנַיִךְ
  english_pob_choice: your nobles
  chosen_spanish: tus nobles
  alternatives_spanish:
  - tus grandes
  - tus señores
  lexicon: HALOT
  rationale: Designa a los altos funcionarios o cortesanos. 'Nobles' es claro y formal en español.
- source_word: שֵׁגְלָתָךְ
  english_pob_choice: your wives
  chosen_spanish: tus esposas
  alternatives_spanish:
  - tus mujeres
  - tus reinas
  lexicon: HALOT
  rationale: El término puede abarcar esposas/consortes reales. 'Esposas' ofrece claridad sin estrechar demasiado el rango semántico en este pasaje.
- source_word: לְחֵנָתָךְ
  english_pob_choice: your concubines
  chosen_spanish: tus concubinas
  alternatives_spanish:
  - tus secundarias esposas
  lexicon: HALOT
  rationale: '''Concubinas'' es el equivalente español estándar y mantiene la diferencia de estatus presente en el hebreo/arámeo.'
- source_word: חַמְרָא שָׁתַיִן בְּהוֹן
  english_pob_choice: have drunk wine from them
  chosen_spanish: bebisteis vino con ellos
  alternatives_spanish:
  - habéis bebido vino de ellos
  - bebisteis vino de ellos
  lexicon: HALOT
  rationale: La lectura auditada subraya el acto consumado. 'Con ellos' es una opción más natural en español para expresar el uso profanador de los vasos, aunque el sentido instrumental original también puede leerse como 'de ellos'.
- source_word: שַׁבַּחְתָּ
  english_pob_choice: have praised
  chosen_spanish: has alabado
  alternatives_spanish:
  - has glorificado
  - has ensalzado
  lexicon: HALOT
  rationale: El verbo significa alabar o ensalzar. 'Has alabado' es directo en español y mantiene el paralelismo con el reproche a la idolatría.
- source_word: אֱלָהֵי כַסְפָּא וְדַהֲבָא נְחָשָׁא פַרְזְלָא אָעָא וְאַבְנָא
  english_pob_choice: the gods of silver and gold, bronze, iron, wood, and stone
  chosen_spanish: los dioses de plata y de oro, de bronce, de hierro, de madera y de piedra
  alternatives_spanish:
  - los dioses hechos de plata y de oro, de bronce, de hierro, de madera y de piedra
  lexicon: HALOT
  rationale: La cadena genitiva enumera los materiales de los ídolos. 'De plata y de oro...' sigue de cerca la forma del original y conserva el contraste material-teológico.
- source_word: דִּי לָא חָזַיִן וְלָא שָׁמְעִין וְלָא יָדְעִין
  english_pob_choice: which do not see or hear or know
  chosen_spanish: que no ven ni oyen ni saben
  alternatives_spanish:
  - que no pueden ver ni oír ni conocer
  - que no ven ni oyen ni entienden
  lexicon: HALOT
  rationale: Se conserva la tríada verbal y su ritmo. 'Saben' corresponde de modo cercano a 'know' y evita una explicación interpretativa.
- source_word: אֱלָהָא דִּי נִשְׁמְתָךְ בִּידֵהּ
  english_pob_choice: the God in whose hand is your breath
  chosen_spanish: al Dios en cuya mano está tu aliento
  alternatives_spanish:
  - al Dios que sostiene tu aliento en su mano
  - al Dios en cuya mano está tu respiración
  lexicon: HALOT
  rationale: '''Al Dios en cuya mano está tu aliento'' conserva la imagen concreta y la dependencia de la vida respecto de Dios. ''Aliento'' hace natural en español el término נִשְׁמְתָךְ.'
- source_word: וְכָל אֹרְחָתָךְ לֵהּ
  english_pob_choice: whose are all your ways
  chosen_spanish: y cuyos son todos tus caminos
  alternatives_spanish:
  - y a quien pertenecen todos tus caminos
  - y de quien son todos tus caminos
  lexicon: HALOT
  rationale: La revisión auditada prefirió una estructura posesiva más cercana al arameo. 'Cuyos son todos tus caminos' reproduce bien esa relación de pertenencia sin perder naturalidad en español.
- source_word: לָא הַדַּרְתָּ
  english_pob_choice: you have not honored
  chosen_spanish: no has honrado
  alternatives_spanish:
  - no has glorificado
  - no has dado honor a
  lexicon: HALOT
  rationale: El verbo significa honrar/atribuir gloria. 'Honrado' es claro y mantiene la acusación final sin forzar el lenguaje litúrgico.
theological_decisions:
- issue: Título divino para מָרֵא שְׁמַיָּא
  english_pob_reading: the Lord of heaven
  chosen_spanish_reading: el Señor del cielo
  alternative_spanish_readings:
  - el Maestro del cielo
  rationale: Se mantiene el título elevado para Dios en la reprensión de Daniel. 'Señor' comunica soberanía divina de forma idiomática en español y respeta el valor reverencial del arameo.
  doctrine_reference: Translation philosophy §2; Contested terms table on divine titles by analogy
- issue: Imagen de soberanía sobre la vida
  english_pob_reading: the God in whose hand is your breath, and whose are all your ways
  chosen_spanish_reading: al Dios en cuya mano está tu aliento, y cuyos son todos tus caminos
  alternative_spanish_readings:
  - al Dios que sostiene tu aliento en su mano, y a quien pertenecen todos tus caminos
  rationale: La frase conserva la imaginería corporal de la mano y el aliento, y la posesión de los caminos, para no diluir la afirmación teológica de que la vida y la conducta están bajo la autoridad de Dios.
  doctrine_reference: Translation philosophy §1 and §3
- issue: Contraste entre dioses inertes y el Dios vivo
  english_pob_reading: the gods ... which do not see or hear or know
  chosen_spanish_reading: los dioses ... que no ven ni oyen ni saben
  alternative_spanish_readings:
  - los dioses ... que no pueden ver, oír ni conocer
  rationale: Se preserva la serie de negaciones sobre la incapacidad de los ídolos para reforzar el contraste con el Dios que sostiene la vida y los caminos humanos.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura auditada más reciente del inglés POB: ''have drunk'' en lugar de una progresiva y la posesión directa ''whose are all your ways''. Para el español, se optó por una formulación igualmente cercana (''cuyos son todos tus caminos'') y por mantener la referencia cultual ''vasos''/''casa'' sin expandirla a ''templo'' en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para el título divino en armonía con el POB inglés y con la terminología editorial del proyecto.
  - Se usa 'aliento' para נִשְׁמְתָךְ, conservando la imagen concreta y evitando reducirla a 'vida' o 'respiración'.
  - Se conserva 'caminos' como equivalente de אֹרְחָתָךְ para mantener la relación entre conducta humana y soberanía divina.
  - No se introdujeron notas al pie porque no hubo una ambigüedad española nueva que requiriera marcaje en el texto base.
