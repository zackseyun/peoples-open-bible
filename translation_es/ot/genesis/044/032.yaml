translation:
  language: es
  text: 'Porque tu siervo salió fiador por el muchacho ante mi padre, diciendo: «Si no te lo traigo, cargaré con la culpa[a] ante mi padre todos mis días».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «habré pecado contra/ante mi padre todos los días». Aquí el sentido es incurrir en culpa o responsabilidad duradera delante de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo ‘eved’, que puede abarcar ‘esclavo/siervo’; como la POB inglesa opta por ‘your servant’ por registro deferente, en español se conserva el matiz humilde pero sin suavizar del todo la fuerza léxica, dejando ‘esclavo’ como opción más transparente del término base y adecuada al contexto cortesano.
- source_word: עָרַב
  english_pob_choice: became surety for
  chosen_spanish: salió fiador de
  alternatives_spanish:
  - se responsabilizó por
  - garantizó al
  lexicon: HALOT
  rationale: La POB inglesa preserva la responsabilidad legal de garante. ‘Salir fiador de’ comunica de modo natural en español esa obligación de respaldo/responsabilidad, mejor que una paráfrasis general.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el joven
  - el muchacho
  lexicon: HALOT
  rationale: ‘Muchacho’ reproduce bien el valor familiar y relacional del hebreo sin imponer la idea de un niño pequeño; en este contexto, Benjamin es el hermano menor desde la perspectiva de Judá.
- source_word: מֵעִם אָבִי
  english_pob_choice: to my father
  chosen_spanish: ante mi padre
  alternatives_spanish:
  - a mi padre
  - de mi padre
  - con mi padre
  lexicon: HALOT
  rationale: La POB inglesa entiende aquí la relación del compromiso frente a quien recibe la garantía. En español, ‘ante mi padre’ expresa bien la esfera de responsabilidad y evita una traducción mecánica de la preposición hebrea.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Mantiene el marcador quotativo de manera natural en español.
- source_word: אִם לֹא אֲבִיאֶנּוּ אֵלֶיךָ
  english_pob_choice: If I do not bring him to you
  chosen_spanish: Si no lo llevo a ti
  alternatives_spanish:
  - Si no te lo traigo
  - Si no lo bringo ante ti
  lexicon: HALOT
  rationale: Se conserva la condición del juramento. ‘Llevar’ evita forzar una distinción innecesaria entre ‘bring’ y ‘take’ y suena natural; ‘a ti’ mantiene la dirección del compromiso.
- source_word: וְחָטָאתִי
  english_pob_choice: then I will bear the blame
  chosen_spanish: entonces seré culpable
  alternatives_spanish:
  - entonces cargaré con la culpa
  - entonces habré pecado
  lexicon: HALOT
  rationale: Aunque literalmente el verbo significa ‘pecar’, la POB documenta el sentido de culpa/responsabilidad duradera. ‘Seré culpable’ conserva ese valor relacional y jurídico en español.
- source_word: לְאָבִי
  english_pob_choice: before my father
  chosen_spanish: ante mi padre
  alternatives_spanish:
  - a mi padre
  - contra mi padre
  lexicon: HALOT
  rationale: La preposición indica la relación en la que pesa la culpa. ‘Ante mi padre’ expresa la responsabilidad en su presencia o a su vista.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all my days
  chosen_spanish: todos los días
  alternatives_spanish:
  - por todos mis días
  - para siempre
  lexicon: HALOT
  rationale: La expresión hebrea comunica duración continua y permanente. ‘Todos los días’ reproduce fielmente la frase y su carga de permanencia; en contexto, equivale a una culpa que dura toda la vida.
theological_decisions:
- issue: alcance de la culpa permanente
  english_pob_reading: I will bear the blame before my father all my days
  chosen_spanish_reading: seré culpable ante mi padre todos los días
  alternative_spanish_readings:
  - cargaré con la culpa ante mi padre todos los días
  - habré pecado contra mi padre todos los días
  rationale: La POB evita reducir el verbo a ‘pecar’ en sentido abstracto y subraya la responsabilidad continuada frente al padre. El español mantiene esa tensión entre culpa, deber y relación personal.
  doctrine_reference: Responsabilidad moral personal; lenguaje de culpa y expiación en el relato patriarcal.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando explícitamente en el texto los marcadores [a] y [b]. No se introdujeron notas sin ancla. La redacción sigue de cerca el hebreo y el auditable sentido de la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó ‘esclavo’ como opción léxica base para עבד por fuerza del término, con nota que reconoce la alternativa ‘siervo’.
  - Se prefirió ‘seré culpable’ a una traducción mecánica de ‘pecar’ para conservar el matiz jurídico-relacional documentado por la POB.
