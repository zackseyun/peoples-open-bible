translation:
  language: es
  text: Y la herencia de los pecadores es destrucción y oscuridad[a], y su rebeldía contra la ley los perseguirá hasta el Hades de abajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta Hades abajo».
    reason: lexical_alternative
lexical_decisions:
- source_word: κληρονομία
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - porción
  - heredad
  lexicon: BDAG
  rationale: «Herencia» conserva la idea concreta de lo que se recibe como asignación o destino final, en paralelo con el valor de «inheritance» en el audito inglés. «Heredad» es posible, pero «herencia» resulta más clara en español moderno.
- source_word: ἁμαρτωλῶν
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - los que pecan
  lexicon: BDAG
  rationale: «Pecadores» reproduce de forma natural el sustantivo plural y mantiene el contraste moral del texto sin expandirlo innecesariamente.
- source_word: ἀπώλεια
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: BDAG
  rationale: «Destrucción» comunica bien la pérdida catastrófica y sigue la decisión inglesa de evitar «perdición» por sus resonancias doctrinales más cargadas.
- source_word: σκότος
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - penumbra
  lexicon: BDAG
  rationale: «Oscuridad» es un equivalente natural y claro en español; conserva la imagen literal y su peso moral/escatológico. «Tinieblas» sería más bíblico-tradicional, pero menos neutro en registro.
- source_word: ἀνομία
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - desobediencia a la ley
  - anomia
  - maldad
  lexicon: BDAG
  rationale: Aquí opto por «iniquidad» para evitar una expresión demasiado técnica o forzada como «desobediencia a la ley»; el término conserva el sentido de conducta contraria al orden justo. «Lawlessness» en inglés se tradujo con fuerza semántica, pero en español «injusticia/iniquidad» suele comunicar mejor el valor del sustantivo abstracto en contexto.
- source_word: διώξεται
  english_pob_choice: will pursue
  chosen_spanish: perseguirá
  alternatives_spanish:
  - seguirá
  - acosará
  - correrá tras
  lexicon: BDAG
  rationale: «Perseguirá» mantiene el futuro y la imagen de acción insistente. Aunque el inglés evita «persecute» por su estrechez, en español «perseguir» es suficientemente amplio para esta personificación del pecado/iniquidad.
- source_word: ἕως ᾅδου κάτω
  english_pob_choice: as far as Hades below
  chosen_spanish: hasta Hades abajo
  alternatives_spanish:
  - hasta el Hades de abajo
  - hasta Hades, abajo
  - hasta el Hades inferior
  lexicon: BDAG
  rationale: Se conserva «Hades» para respetar el término griego del ámbito de los muertos, no «infierno». «Abajo» refleja κάτω de forma directa; la construcción resulta algo marcada en español, pero mantiene la orientación descendente del original y la revisión inglesa que reforzó ἕως/κάτω.
theological_decisions:
- issue: Cómo renderizar ᾅδης sin colapsarlo en «infierno»
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - infierno
  - sepulcro
  - la tumba
  rationale: El griego nombra ᾅδης, el ámbito de los muertos, y el audito inglés preserva «Hades» para no importar la carga interpretativa de «hell». En español se mantiene el nombre propio transliterado para ser auditable y evitar confusión con Gehena o con el concepto general de infierno.
  doctrine_reference: Distinción léxica entre ᾅδης y γεέννα en la tradición bíblica; preservación del referente del lugar de los muertos.
- issue: Valor de la cláusula final con ἕως y κάτω
  english_pob_reading: as far as Hades below
  chosen_spanish_reading: hasta Hades abajo
  alternative_spanish_readings:
  - hasta el Hades de abajo
  - hasta Hades, abajo
  - hasta el Hades inferior
  rationale: La revisión inglesa amplió la frase para reflejar tanto ἕως («hasta/as far as») como κάτω («abajo/below»). El español conserva esa doble dirección con una solución breve y transparente, aunque algo áspera, para no suavizar el movimiento descendente del texto.
  doctrine_reference: Semántica aspectual y direccional del griego; no hay una decisión doctrinal adicional, sino de fidelidad al matiz espacial.
translation_notes:
  revision_awareness: He tomado en cuenta la revisión más reciente del audito inglés, que corrigió la clausula final desde una simple dirección descendente («down to Hades») a una formulación que expresa con más precisión ἕως y κάτω («as far as Hades below»). También he evitado traducir mecánicamente «lawlessness» como una mera abstracción técnica; la versión española intenta conservar la fuerza moral del término sin perder naturalidad.
  spanish_consistency_notes:
  - Se preserva «Hades» como nombre propio transliterado, en continuidad con la decisión inglesa y con la distinción frente a «infierno».
  - Se usa «herencia» para κληρονομία en vez de un término eclesiástico más interpretativo como «heredad», por claridad moderna.
  - 'Se mantiene el paralelismo sustantivo del griego: herencia / destrucción y oscuridad / iniquidad.'
  - La frase final conserva el descenso espacial explícito con «abajo», aunque la sintaxis en español resulte algo marcada; esto responde a la necesidad de reflejar ἕως ᾅδου κάτω sin borrar el matiz direccional.
