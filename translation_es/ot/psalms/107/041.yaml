translation:
  language: es
  text: Pero él pone en alto[a] al necesitado, lejos de la aflicción, y hace que sus familias sean como un rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levanta al pobre de la miseria»; o posiblemente, con matiz alterno en la cláusula final, «establece a las familias como un rebaño».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׂגֵּב
  english_pob_choice: sets ... on high
  chosen_spanish: pone en alto
  alternatives_spanish:
  - levanta
  - coloca en alto
  - exalta
  lexicon: HALOT
  rationale: El hebreo expresa elevación con idea de seguridad/protección. «Pone en alto» conserva tanto la imagen de altura como el matiz de resguardo, de forma natural en español bíblico moderno.
- source_word: אֶבְיוֹן
  english_pob_choice: the needy
  chosen_spanish: al necesitado
  alternatives_spanish:
  - al pobre
  - al afligido
  lexicon: HALOT
  rationale: «Necesitado» reproduce bien el campo semántico de alguien en carencia o dependencia, sin estrechar el sentido solo a pobreza material.
- source_word: מֵעֹנִי
  english_pob_choice: away from affliction
  chosen_spanish: lejos de la aflicción
  alternatives_spanish:
  - de la miseria
  - de la pobreza
  - de la opresión
  lexicon: HALOT
  rationale: El término puede abarcar aflicción, miseria o pobreza. En el contexto del salmo, «aflicción» expresa bien la situación de angustia de la cual Dios libra, y «lejos de» refleja la fuerza separativa de מִן.
- source_word: וַיָּשֶׂם
  english_pob_choice: makes
  chosen_spanish: hace
  alternatives_spanish:
  - pone
  - establece
  - dispone
  lexicon: HALOT
  rationale: שׂים es un verbo amplio de poner/hacer. Aquí, con la comparación posterior, «hace» comunica con claridad que Dios causa ese resultado en las familias.
- source_word: כַּצֹּאן
  english_pob_choice: like a flock
  chosen_spanish: como un rebaño
  alternatives_spanish:
  - como ovejas
  - como un hato
  lexicon: HALOT
  rationale: צֹאן designa ganado menor, especialmente ovejas y cabras, a menudo en sentido colectivo. «Como un rebaño» preserva la imagen pastoral colectiva mejor que un singular más específico.
- source_word: מִשְׁפָּחוֹת
  english_pob_choice: their families
  chosen_spanish: sus familias
  alternatives_spanish:
  - familias
  - sus clanes
  - sus hogares
  lexicon: HALOT
  rationale: Aunque el hebreo no lleva sufijo posesivo, el contexto hace natural suplirlo en español. «Sus familias» mantiene la fluidez y el vínculo implícito con el necesitado sin añadir una idea ajena al texto.
theological_decisions:
- issue: Sujeto implícito y tono de reversión divina
  english_pob_reading: But he sets the needy on high, away from affliction, and makes their families like a flock.
  chosen_spanish_reading: Pero él pone en alto al necesitado, lejos de la aflicción, y hace a sus familias como un rebaño.
  alternative_spanish_readings:
  - Y él pone en alto al necesitado...
  - Pero Dios pone en alto al necesitado...
  rationale: El hebreo presenta una acción divina de reversión y cuidado. Mantener el pronombre «él» respeta la continuidad del contexto inmediato sin introducir explícitamente un nombre no presente en el verso.
  doctrine_reference: Salmo 107; providencia y reversión de la condición del necesitado.
- issue: Comparación final con familias en plural
  english_pob_reading: makes their families like a flock
  chosen_spanish_reading: hace a sus familias como un rebaño
  alternative_spanish_readings:
  - hace familias como un rebaño
  - hace a sus familias como ovejas
  rationale: El plural hebreo 'familias' se conserva sin forzar una lectura singular. La comparación con un rebaño comunica multiplicación, cuidado y pertenencia comunitaria, tal como en el flujo del poema.
  doctrine_reference: Imagen pastoral bíblica; continuidad poética del Salmo 107.
translation_notes:
  revision_awareness: 'El testigo inglés muestra alta concordancia y sin cambios en la última revisión. Se ha mantenido la estructura semipoética del verso y se han conservado las dos tensiones principales del original: la elevación protectora de שׂגב y la comparación final con familias convertidas en rebaño.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en conformidad con el criterio general del proyecto cuando el Tetragrámaton esté presente; aquí el verso no lo contiene.
  - Se prefirió «necesitado» frente a «pobre» para no reducir el alcance semántico de אֶבְיוֹן.
  - Se conservó el paralelismo del hebreo con dos cola principales unidos por coma y conjunción final.
  - Se tradujo צֹאן como «rebaño» en sentido colectivo, no como una especie específica de animal.
