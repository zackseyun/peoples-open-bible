translation:
  language: es
  text: El hombre que ama la sabiduría alegra a su padre, pero el que frecuenta a prostitutas destruye riqueza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el que pastorea/alimenta con prostitutas»; el hebreo usa una expresión idiomática para referirse a quien se asocia con ellas o las frecuenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: A man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Una persona
  - Quien
  lexicon: HALOT
  rationale: El sustantivo hebreo es singular masculino y presenta un individuo representativo en forma proverbial. En español, «el hombre» conserva esa forma proverbial y el matiz de masculinidad gramatical del original, sin perder el uso genérico.
- source_word: אֹהֵב חָכְמָה
  english_pob_choice: who loves wisdom
  chosen_spanish: que ama la sabiduría
  alternatives_spanish:
  - amando la sabiduría
  - que ama la instrucción sabia
  lexicon: HALOT
  rationale: 'El participio con objeto expresa una cualidad continua: un hombre caracterizado por amar la sabiduría. «Sabiduría» es el sentido directo de חָכְמָה y no debe restringirse a «instrucción» aquí.'
- source_word: יְשַׂמַּח
  english_pob_choice: makes ... glad
  chosen_spanish: alegra
  alternatives_spanish:
  - hace ... feliz
  - regocija
  lexicon: HALOT
  rationale: 'La forma piel es causativa: hace que su padre se alegre. «Alegra» preserva esa fuerza causativa en un español natural y sobrio.'
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su progenitor
  lexicon: HALOT
  rationale: El sustantivo con sufijo de 3ms significa específicamente «su padre». En español se expresa de manera natural con el dativo «a su padre».
- source_word: וְרֹעֶה
  english_pob_choice: one who keeps company with
  chosen_spanish: el que anda con
  alternatives_spanish:
  - el que frecuenta
  - el que se acompaña de
  lexicon: HALOT
  rationale: Aunque el sentido literal de רעה es «pastorear/alimentar», en esta construcción idiomática con זֹנוֹת significa asociarse o frecuentarlas. «Anda con» comunica bien el sentido idiomático sin volverlo demasiado técnico o forzado.
- source_word: זֹנוֹת
  english_pob_choice: prostitutes
  chosen_spanish: prostitutas
  alternatives_spanish:
  - rameras
  - meretrices
  lexicon: HALOT
  rationale: El término se refiere a mujeres dedicadas a la prostitución. «Prostitutas» es exacto y contemporáneo; se evita un registro arcaico o despectivo.
- source_word: יְאַבֶּד
  english_pob_choice: destroys
  chosen_spanish: destruye
  alternatives_spanish:
  - arruina
  - hace perder
  lexicon: HALOT
  rationale: La forma piel expresa acción enfática de destruir o arruinar. En este contexto, «destruye» mantiene la fuerza verbal y se entiende naturalmente con el objeto siguiente.
- source_word: הוֹן
  english_pob_choice: wealth
  chosen_spanish: su fortuna
  alternatives_spanish:
  - sus riquezas
  - su hacienda
  - su patrimonio
  lexicon: HALOT
  rationale: El sustantivo denota bienes/riqueza. «Fortuna» comunica adecuadamente la idea de posesiones o bienes materiales en español actual y funciona bien en el contraste proverbial.
translation_notes:
  revision_awareness: Se siguió el sentido del hebreo masorético con atención a la imagen idiomática de רעה + זונות, conforme al audit trail en inglés; no se introdujeron cambios textuales respecto de la lectura base.
  spanish_consistency_notes:
  - Se mantuvo «sabiduría» para חָכְמָה, como en el registro POB inglés.
  - Se prefirió «prostitutas» por claridad contemporánea y fidelidad léxica.
  - «Fortuna» traduce de modo idiomático הוֹן y preserva el contraste proverbial con la sabiduría.
  - La nota al pie conserva la tensión entre la traducción idiomática del texto y la imagen literal hebrea.
