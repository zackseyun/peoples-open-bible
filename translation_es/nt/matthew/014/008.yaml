translation:
  language: es
  text: 'Y ella, habiendo sido impulsada por su madre, dice: «Dame aquí, en una bandeja, la cabeza de Juan el Bautista».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: προβιβασθεῖσα
  english_pob_choice: having been prompted
  chosen_spanish: habiendo sido impulsada
  alternatives_spanish:
  - habiendo sido instruida
  - habiendo sido urgida
  - habiendo sido presentada
  lexicon: BDAG
  rationale: El participio pasivo indica una influencia previa ejercida sobre la muchacha por su madre. «Impulsada» conserva la pasividad y la idea de motivación externa sin añadir el matiz más específico de instrucción formal.
- source_word: ὑπὸ τῆς μητρὸς αὐτῆς
  english_pob_choice: by her mother
  chosen_spanish: por su madre
  alternatives_spanish:
  - de parte de su madre
  lexicon: BDAG
  rationale: ὑπό con genitivo señala agente en construcción pasiva; «por su madre» es la correspondencia natural y directa en español.
- source_word: Δός μοι
  english_pob_choice: Give me
  chosen_spanish: Dame
  alternatives_spanish:
  - Dame a mí
  lexicon: BDAG
  rationale: 'El imperativo aoristo de δίδωμι se expresa de forma natural en español como una orden directa: «Dame».'
- source_word: φησίν
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El presente histórico del griego se refleja mejor con el presente narrativo en español, «dice», para mantener la inmediatez.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: BDAG
  rationale: El adverbio deíctico señala cercanía o inmediatez; «aquí» conserva esa precisión de manera breve y natural.
- source_word: ἐπὶ πίνακι
  english_pob_choice: on a platter
  chosen_spanish: en una bandeja
  alternatives_spanish:
  - en un platón
  - sobre un plato
  lexicon: BDAG
  rationale: πίναξ en este contexto designa un recipiente de servicio para comida. «Bandeja» comunica bien la escena en español moderno; «plato» sería menos preciso y «platón» menos común.
- source_word: τὴν κεφαλὴν
  english_pob_choice: the head
  chosen_spanish: la cabeza
  lexicon: BDAG
  rationale: Traducción literal y necesaria; la crudeza del detalle forma parte del relato.
- source_word: Ἰωάννου τοῦ βαπτιστοῦ
  english_pob_choice: John the Baptist
  chosen_spanish: Juan el Bautista
  alternatives_spanish:
  - Juan el Bautizador
  lexicon: BDAG
  rationale: Aunque βαπτιστής es un título descriptivo, en español eclesial y narrativo «el Bautista» es la forma natural y ampliamente reconocible. Se conserva la identificación tradicional por inteligibilidad, sin perder el referente al personaje de Juan.
theological_decisions:
- issue: Tratamiento del título βαπτιστής
  english_pob_reading: John the Baptist (traditional form retained in the revision pass)
  chosen_spanish_reading: Juan el Bautista
  alternative_spanish_readings:
  - Juan el Bautizador
  rationale: No hay tensión doctrinal, sino una decisión de estilo y uso. En español, «el Bautista» es la forma establecida y más comprensible; además, reproduce con naturalidad el título personal en el flujo narrativo.
  doctrine_reference: Translation philosophy §2 (translate titles; preserve recognizability where the target language has an established equivalent)
translation_notes:
  revision_awareness: El borrador inglés pasó por una revisión que prefirió la forma tradicional «John the Baptist» frente a una versión más transparente como «John the Baptizer». En español se adoptó directamente la forma tradicional equivalente «Juan el Bautista», que es idiomática, reconocible y fiel al título griego en el uso receptor.
  spanish_consistency_notes:
  - Mantengo presente narrativo con «dice» para reflejar el histórico presente griego.
  - «Impulsada» conserva la pasividad de προβιβασθεῖσα sin sugerir una orden formal explícita.
  - Se opta por «bandeja» como equivalente funcional de πίναξ en el contexto de banquete.
  - La cita se abre y cierra con comillas angulares según norma española.
  - El apéndice nominal «el Bautista» se conserva como forma establecida en español, coherente con el nombre tradicional del personaje.
