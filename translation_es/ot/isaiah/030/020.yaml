    issue: «Yahvé» para אֲדֹנָי
    rationale: La evidencia fuente contiene אֲדֹנָי, no יהוה. El audit trail inglés decidió «the Lord». En español debe reflejarse como «el Señor» (o equivalente de título), no «Yahvé», para no confundir título divino con nombre propio del pacto.
  - severity: low
    issue: Formato de la nota b
    rationale: La nota comienza y termina con comillas simples innecesarias alrededor de toda la oración. Conviene normalizarla al estilo de notas del proyecto.
