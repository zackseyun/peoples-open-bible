translation:
  language: es
  text: Muchos alabarán su entendimiento; no será borrado para siempre. Su memoria no se apartará, y su nombre vivirá por generaciones y generaciones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega es un modismo que intensifica la duración; también puede traducirse «por generaciones de generaciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰνέσουσιν
  english_pob_choice: will praise
  chosen_spanish: alabarán
  alternatives_spanish:
  - elogiarán
  - ensalzarán
  lexicon: BDAG
  rationale: αἰνέω expresa alabanza verbal o reconocimiento público. «Alabarán» es la equivalencia más natural y directa en español para conservar el tono sapiencial sin añadir matices extra.
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  lexicon: BDAG
  rationale: σύνεσις puede abarcar comprensión, discernimiento o entendimiento. «Entendimiento» mantiene el sentido amplio y resulta claro en español bíblico contemporáneo.
- source_word: ἐξαλειφθήσεται
  english_pob_choice: will be blotted out
  chosen_spanish: será borrado
  alternatives_spanish:
  - será borrado de la memoria
  - será eliminado
  - será borrado de la tierra
  lexicon: BDAG
  rationale: El verbo significa literalmente borrar o borrar por completo. «Será borrado» conserva la imagen de ser eliminado sin forzar una abstracción como «desaparecerá».
- source_word: μνημόσυνον
  english_pob_choice: remembrance
  chosen_spanish: memoria
  alternatives_spanish:
  - recuerdo
  - memorial
  lexicon: BDAG
  rationale: En el paralelismo con el nombre que vive, μνημόσυνον apunta a la continuidad del recuerdo de la persona. «Memoria» comunica bien esa permanencia en español.
- source_word: ἀποστήσεται
  english_pob_choice: will not depart
  chosen_spanish: no se apartará
  alternatives_spanish:
  - no se alejará
  - no desaparecerá
  lexicon: BDAG
  rationale: El verbo expresa apartarse o retirarse. «No se apartará» conserva la imagen del recuerdo que no se va.
- source_word: ὄνομα
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - reputación
  - renombre
  lexicon: BDAG
  rationale: Aquí conviene mantener «nombre», que en español puede implicar reputación y fama duradera, siguiendo la literalidad poética del original.
- source_word: ζήσεται
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - perdurará
  - seguirá vivo
  lexicon: BDAG
  rationale: El futuro literal «vivirá» preserva la personificación del nombre como algo que continúa existiendo activamente.
- source_word: εἰς γενεὰς γενεῶν
  english_pob_choice: for generations of generations
  chosen_spanish: por generaciones de generaciones
  alternatives_spanish:
  - por generaciones y generaciones
  - a través de generaciones de generaciones
  lexicon: BDAG
  rationale: La expresión semítica intensifica la duración a lo largo de sucesivas generaciones. «Por generaciones de generaciones» sigue de cerca la forma y es idiomático en español.
theological_decisions:
- issue: Imagen poética de fama duradera sin reducirla a un concepto abstracto
  english_pob_reading: Retain the imagery of blotting out, remembrance, and a name living rather than flattening to abstract 'legacy.'
  chosen_spanish_reading: Conservar la imaginería de borrar, memoria y nombre que vive, sin reducirla a una simple idea de 'legado'.
  alternative_spanish_readings:
  - Su legado perdurará para siempre.
  - Su recuerdo será eterno.
  rationale: El versículo usa imágenes concretas propias de la sabiduría bíblica. Mantenerlas en español preserva la textura literaria y evita perder la fuerza del paralelismo.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del texto inglés: oraciones separadas con puntuación clara, sin fusionar las cláusulas, y con una expresión idiomática para εἰς γενεὰς γενεῶν que conserve el paralelismo poético.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de tres miembros: alabanza del entendimiento, permanencia de la memoria y vida del nombre.'
  - Se evitó «Cristo» o terminología cristológica porque el pasaje no la contiene.
  - Se conservó un registro bíblico moderno y digno, evitando calcos duros pero sin suavizar la imaginería del original.
