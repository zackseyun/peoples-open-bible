  yaml_path: translation/ot/joshua/024/024.yaml
  text: And the people said to Joshua[a], “We will serve Yahweh our God[b], and we will obey his voice.”
  footnotes:
  - marker: a
    text: Or 'We will worship the LORD our God.' The Hebrew verb can denote service rendered to God in a worshipful sense, but 'serve' better preserves the broader covenantal meaning here.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'we will hear/listen to his voice,' an idiom meaning obedient response to what he says.
    reason: lexical_alternative
