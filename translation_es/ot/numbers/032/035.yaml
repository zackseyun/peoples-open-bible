  glossary_alignment: No hay términos teológicos sensibles aquí. En nombres propios, el borrador generalmente respeta la política de transliterar. La principal desviación es escoger como texto principal «Atrot-shofán» cuando la evidencia y la nota muestran que «Atarot-shofán» es una forma española más natural y mejor sustentada. No hay conflicto con el glosario principal de Yahvé/Mesías/etc.
