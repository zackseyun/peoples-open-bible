    text: Or 'their idols.' The Hebrew literally says 'their gods,' though the referent is likely their cult images.
    reason: lexical_alternative
  - marker: b
    text: 'The parallel account in 2 Samuel 5:21 reads more actively: ''and David and his men carried them away.'' Chronicles instead says they were burned with fire at David''s order.'
