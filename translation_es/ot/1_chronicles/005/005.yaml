lexical_decisions:
- source_word: מִיכָה
  english_pob_choice: Micah
  chosen_spanish: Mica
  alternatives_spanish:
  - Miqueas
  lexicon: HALOT
  rationale: Es un nombre propio en una genealogía. En español se translitera como nombre personal sin traducirlo como el libro profético, por lo que «Mica» conserva la forma hebrea y evita confusión con «Miqueas».
- source_word: בְנֹו
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  - su descendiente
  lexicon: HALOT
  rationale: La construcción posesiva expresa filiación directa en la cadena genealógica. En español, «su hijo» reproduce con naturalidad ese valor relacional y mantiene el paralelismo repetido del verso.
- source_word: רְאָיָה
  english_pob_choice: Reaiah
  chosen_spanish: Reaías
  alternatives_spanish:
  - Reaía
  - Raías
  lexicon: HALOT
  rationale: Nombre propio transliterado. «Reaías» sigue una adaptación española reconocible y mantiene el carácter de nombre en la genealogía.
- source_word: בַּעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - Señor
  - Baal (como nombre personal)
  lexicon: HALOT
  rationale: Aquí funciona como nombre personal dentro de una lista genealógica, no como título. Por eso se conserva «Baal» sin verterlo por «señor», para no borrar la distinción que documenta el texto.
theological_decisions:
- issue: Si בַּעַל debe entenderse como título o como nombre propio
  english_pob_reading: Retained as the personal name 'Baal'
  chosen_spanish_reading: 'Se conserva como nombre personal: «Baal»'
  alternative_spanish_readings:
  - «señor» como título
  - «Baal» pero con sentido cultual/deidad
  rationale: La secuencia es una genealogía de nombres propios; traducir el término como título introduciría una lectura ajena al género y a la sintaxis. La preservación como nombre respeta la evidencia del pasaje y la cautela teológica del audit trail.
  doctrine_reference: Los nombres propios se transliteran; los títulos solo se traducen cuando el contexto lo exige.
translation_notes:
  revision_awareness: 'El texto base presenta plena concordancia con el control de revisión: no se requieren cambios respecto del informe auditado, y la redacción española mantiene la estructura genealógica simple del hebreo.'
  spanish_consistency_notes:
  - Se mantiene el orden de la cadena genealógica con puntuación breve y repetitiva, acorde con el hebreo.
  - Se evita «Cristo», «SEÑOR» u այլ terminología eclesial no presente en el verso.
  - La transliteración de nombres propios busca una forma publicable en español sin domesticar el significado del texto.
