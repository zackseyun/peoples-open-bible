lexical_decisions:
- source_word: ἐκοιμήθησαν
  english_pob_choice: slept
  chosen_spanish: durmieron
  alternatives_spanish:
  - se acostaron
  - se durmieron
  lexicon: BDAG / LSJ
  rationale: En este contexto el verbo indica dormir de manera literal, no un eufemismo funerario. En español, «durmieron» comunica con naturalidad el mismo sentido que el inglés POB «slept».
- source_word: ἀμφότεροι
  english_pob_choice: both
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  lexicon: LSJ
  rationale: El griego subraya que eran precisamente dos y que actuaron juntos. «Ambos» preserva esa dualidad de forma breve y natural en español.
- source_word: τὴν νύκτα
  english_pob_choice: through the night
  chosen_spanish: toda la noche
  alternatives_spanish:
  - durante la noche
  - la noche
  lexicon: LSJ
  rationale: El acusativo de duración expresa extensión temporal. «Toda la noche» reproduce bien la fuerza idiomática del inglés POB «through the night» y evita una calca menos natural.
translation_notes:
  revision_awareness: El texto griego es breve y de alta concordancia con la auditoría inglesa. La única tensión relevante es la expresión idiomática temporal τὴν νύκτα, que en español se resuelve de manera natural como «toda la noche», manteniendo la nota literal en el pie.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o cualquier terminología no pertinente; no hay vocabulario teológico específico en este versículo.
  - «Durmieron» conserva el sentido literal del aoristo de κοιμάω en este contexto, sin introducir matices de muerte o de simple recostarse.
  - «Ambos» refleja el valor dual sin expansión innecesaria.
