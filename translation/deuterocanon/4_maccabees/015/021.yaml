translation:
  text: Not in this way do siren songs or swanlike voices with feminine sound draw those who hear[a], as the voices of children calling to their mother amid tortures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'songs of sirens' and 'voices of swans.' The Greek uses classical poetic imagery for irresistibly attractive sound.
    reason: lexical_alternative
lexical_decisions:
- source_word: σειρήνιοι μελῳδίαι
  chosen: siren songs
  alternatives:
  - songs of sirens
  - siren melodies
  lexicon: LSJ
  rationale: σειρήνιοι evokes the mythic Sirens and their alluring song; 'siren songs' is idiomatic English and preserves the classical allusion better than a more wooden 'songs of sirens.'
- source_word: κύκνιοι ... φωναί
  chosen: swanlike voices
  alternatives:
  - voices of swans
  - swan voices
  lexicon: LSJ
  rationale: κύκνιοι is adjectival ('swan-like'/'of swans'). 'Swanlike voices' keeps the poetic comparison and reads naturally in English.
- source_word: πρὸς θηλυκίαν
  chosen: with their womanly charm
  alternatives:
  - toward femininity
  - with feminine sweetness
  - with womanly allure
  lexicon: LSJ
  rationale: The phrase modifies the attractive quality of the voices. A too-literal rendering ('toward femininity') is obscure in English. 'With their womanly charm' captures the sense of feminine allure without over-paraphrasing.
- source_word: ἐφέλκονται
  chosen: draw in
  alternatives:
  - attract
  - entice
  - pull toward
  lexicon: LSJ
  rationale: The verb conveys attraction or drawing someone toward oneself. 'Draw in' preserves the vividness and suits the comparison with seductive song.
- source_word: τέκνων φωναί
  chosen: the voices of children
  alternatives:
  - children's voices
  lexicon: LSJ
  rationale: A straightforward genitive construction; either English form works, but 'the voices of children' mirrors the Greek structure and heightens the rhetorical cadence.
- source_word: μετὰ βασάνων
  chosen: amid tortures
  alternatives:
  - under tortures
  - in the midst of torments
  - while being tortured
  lexicon: LSJ
  rationale: The phrase indicates the circumstance accompanying the children's cries. 'Amid tortures' is concise and preserves the plural noun's force.
- source_word: μητέρα φωνούντων
  chosen: calling out to their mother
  alternatives:
  - crying to their mother
  - addressing their mother
  lexicon: LSJ
  rationale: φωνέω here means to call out or cry aloud. 'Calling out to their mother' best conveys the emotional force in context.
