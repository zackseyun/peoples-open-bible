translation:
  text: to lie with her. But he guarded his soul and remembered the LORD and the words that Jacob his father used to recite from the words of Abraham[a], that no man should commit fornication with a woman who has a husband, for the judgment of death has been ordained for him in heaven before the Most High God, and the sin is recorded against him in the eternal books continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause about Jacob reciting words received from Abraham is an expansion characteristic of Jubilees, grounding Joseph’s refusal in transmitted patriarchal instruction rather than only personal scruple.
    reason: cross_reference
    anchor_ref: '39:5'
  - marker: b
    text: Or 'continually before the LORD.'.
    reason: previous_rendering
  - marker: c
    text: Or 'that there is no man who commits fornication'.
    reason: previous_rendering
