  text: וַ/אֲמַרְתֶּ֡ם זֶֽבַח פֶּ֨סַח ה֜וּא לַֽ/יהוָ֗ה אֲשֶׁ֣ר פָּ֠סַח עַל בָּתֵּ֤י בְנֵֽי יִשְׂרָאֵל֙ בְּ/מִצְרַ֔יִם בְּ/נָגְפּ֥/וֹ אֶת מִצְרַ֖יִם וְ/אֶת בָּתֵּ֣י/נוּ הִצִּ֑יל וַ/יִּקֹּ֥ד הָ/עָ֖ם וַ/יִּֽשְׁתַּחֲוּֽוּ־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/012/027.yaml
  text: you shall say[a], ‘It is the Passover sacrifice to Yahweh[c][b], who passed over the houses of the sons of Israel in Egypt when he struck Egypt and delivered our houses.’ And the people bowed down and worshiped.
  footnotes:
  - marker: a
    text: Or 'the houses of the Israelites' / 'the houses of the children of Israel.'
    reason: lexical_alternative
  - marker: b
    text: The verb behind 'passed over' is the same root from which 'Passover' is derived; it can also carry the sense of sparing or protecting.
    reason: lexical_alternative
  - marker: c
    text: Or 'delivered our houses' / 'rescued our houses.'
    reason: lexical_alternative
