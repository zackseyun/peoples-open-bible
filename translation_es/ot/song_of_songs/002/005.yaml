    rationale: 'Aunque comprensible, estas formas de segunda persona plural suenan peninsulares o arcaizantes y chocan con la pauta de español neutral latinoamericano / ampliamente eclesial. El hebreo solo requiere imperativo plural; en español meta conviene «Sosténganme ... refrésquenme». '
  - severity: medium
