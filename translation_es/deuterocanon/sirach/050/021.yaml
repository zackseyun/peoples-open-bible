translation:
  language: es
  text: Y se postraron[a] por segunda vez, para recibir la bendición de delante de él.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «caer»; en este contexto se refiere a una postración ritual de adoración.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «para mostrar la bendición del Altísimo», una lectura interpretativa que hace explícita a Dios como la fuente de la bendición.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁנוּ / ἐδευτέρωσεν
  english_pob_choice: they bowed down a second time
  chosen_spanish: se postraron por segunda vez
  alternatives_spanish:
  - se inclinaron por segunda vez
  - se arrodillaron por segunda vez
  - volvieron a postrarse
  lexicon: HALOT; LXX ἐδευτέρωσεν
  rationale: El hebreo y el griego coinciden en la idea de repetir la acción en un segundo momento. 'Se postraron' conserva el sentido ritual fuerte que en español se entiende mejor que una traducción más literal de 'volver a caer'.
- source_word: לִנְפּוֹל / ἐν προσκυνήσει
  english_pob_choice: their falling down / in worship
  chosen_spanish: se postraron
  alternatives_spanish:
  - caer de rodillas
  - inclinarse en adoración
  - postrarse en adoración
  lexicon: HALOT; προσκυνέω
  rationale: El hebreo dice literalmente 'caer', pero en este contexto litúrgico el sentido es prostración reverente. El griego con προσκυνήσει confirma la lectura cultual; por eso se emplea 'postraron' como equivalente natural y fiel.
- source_word: שֵׁנִית / ἐδευτέρωσεν
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - otra vez
  - de nuevo
  - por segunda ocasión
  lexicon: HALOT
  rationale: La forma adverbial explicita la repetición. 'Por segunda vez' reproduce con claridad el énfasis del hebreo y del griego sin sonar arcaico.
- source_word: בְּרָכוֹת / τὴν εὐλογίαν
  english_pob_choice: blessing
  chosen_spanish: la bendición
  alternatives_spanish:
  - bendiciones
  - la bendición
  - la bendición recibida
  lexicon: HALOT; εὐλογία
  rationale: Aunque el hebreo es plural, el griego usa singular y el español bíblico normalmente emplea singular colectivo aquí. 'Bendición' conserva la idea de una acción o don litúrgico recibido.
- source_word: לָקַחַת
  english_pob_choice: to receive
  chosen_spanish: recibir
  alternatives_spanish:
  - tomar
  - obtener
  - aceptar
  lexicon: HALOT
  rationale: '''Recibir'' expresa la pasividad reverente del pueblo ante la bendición; evita que ''tomar'' suene como apropiación activa.'
- source_word: מִפָּנָיו / παρὰ Ὑγίστου
  english_pob_choice: from before him
  chosen_spanish: de parte de él
  alternatives_spanish:
  - de su presencia
  - de delante de él
  - del Altísimo
  lexicon: HALOT; παρὰ + genitivo
  rationale: El hebreo disponible apunta a un sufijo pronominal ('de delante de él' / 'de su presencia'), mientras que el griego interpreta la fuente como el Altísimo. 'De parte de él' mantiene la referencia pronominal del testimonio hebreo sin forzar una identificación explícita en el texto principal.
theological_decisions:
- issue: 'Fuente de la bendición: sacerdote o Dios'
  english_pob_reading: Retain the Hebrew-based 'from before him' in the main text, while noting the Greek's 'from the Most High' interpretive reading.
  chosen_spanish_reading: Mantener 'de parte de él' en el texto principal, con nota que explicita la lectura griega del Altísimo.
  alternative_spanish_readings:
  - del Altísimo
  - de su presencia
  - de parte del sacerdote
  rationale: El hebreo conservado en esta tradición termina con un sufijo pronominal, por lo que el texto principal no debe resolver prematuramente el referente. A la vez, el griego amplía interpretativamente hacia el Altísimo; la nota preserva esa tensión sin borrar ninguna de las dos líneas de transmisión.
  doctrine_reference: 'Translation philosophy §1: primacía del testimonio original conservado; §3: preservar tensión textual y teológica en lugar de resolverla artificialmente.'
translation_notes:
  revision_awareness: La redacción sigue la revisión del POB inglés que sustituyó la frase literal y pesada por la natural 'bowed down a second time'. En español se optó por 'se postraron por segunda vez' para conservar la solemnidad y la claridad, manteniendo la repetición y el sentido cultual. También se reflejó la tensión entre el hebreo con sufijo pronominal y el griego con referencia al Altísimo mediante nota, no mediante armonización en el texto principal.
  spanish_consistency_notes:
  - Se usa 'postraron' para la prostración ritual, en coherencia con el tratamiento de נפל / προσκυνέω en contexto de culto.
  - '''Bendición'' se mantiene en singular colectivo, como en el POB inglés y el griego singular εὐλογίαν.'
  - '''De parte de él'' preserva la referencia pronominal del hebreo; la nota a recoge la expansión griega al Altísimo.'
  - El registro es bíblico contemporáneo, evitando calcos como 'caer' en el cuerpo principal, pero sin perder el trasfondo literal documentado.
