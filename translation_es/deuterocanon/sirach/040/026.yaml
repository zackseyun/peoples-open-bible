base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/040/026.yaml
  text: Wealth and strength lift up the heart[a], and the fear of God is beyond both. In the fear of God there is no lack[b], and there is no need to seek support along with it.
  footnotes:
  - marker: a
    text: Or, 'more than both' or 'better than both'; the Hebrew says literally 'and from both of them,' in context expressing that the fear of God surpasses wealth and strength.
    reason: lexical_alternative
  - marker: b
    text: Or, 'and there is no need to seek help/support along with it.' The sense is that the fear of God is sufficient and does not require an added prop.
    reason: lexical_alternative
