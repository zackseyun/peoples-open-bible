base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/017/024.yaml
  text: May it be established[a], and may your name be magnified forever, saying, ‘Yahweh of hosts, the God of Israel[b], is God to Israel,’ and may the house of David your servant be established before you.
  footnotes:
