    reason: cross_reference
  - marker: b
    text: También podría entenderse «nombrados por el rey». La expresión griega «los que eran de parte del rey» es breve y puede sugerir nombramiento real o afiliación real.
    reason: alternative_reading
  revision_rationale: 'La revisión corrige el anclaje de las notas para que coincidan con las decisiones auditadas en inglés: la nota alternativa se aplica a la frase elíptica sobre el rey, y la nota de referencia cruzada se aplica al nombre Eddinous dentro de la expansión propia de 1 Esdras. Además, se aligera la puntuación de la lista de nombres sin alterar el sentido.'
