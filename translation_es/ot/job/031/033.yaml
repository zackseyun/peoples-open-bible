translation:
  language: es
  text: si yo hubiera cubierto mis transgresiones como Adán[a], escondiendo mi iniquidad en mi seno—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como un hombre». El hebreo אָדָם puede leerse como sustantivo común («hombre» / «ser humano») o como nombre propio, «Adán».'
