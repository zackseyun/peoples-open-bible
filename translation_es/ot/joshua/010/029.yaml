translation:
  language: es
  text: Entonces Josué[a] y todo Israel con él pasaron de Maquedá a Libna y pelearon contra Libna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «peleó con Libna»; el giro es un modismo que significa combatir contra la ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: passed on
  chosen_spanish: pasó
  alternatives_spanish:
  - pasó adelante
  - siguió su camino
  - avanzó
  lexicon: HALOT
  rationale: עבר expresa aquí un desplazamiento de un lugar a otro dentro del relato militar. «Pasó» comunica el movimiento continuo sin insinuar un cruce de río o frontera que el hebreo no especifica.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - en su compañía
  lexicon: HALOT
  rationale: El sufijo pronominal indica acompañamiento. «Con él» conserva de forma natural la relación entre Josué y todo Israel.
- source_word: מִמַּקֵּדָה
  english_pob_choice: from Makkedah
  chosen_spanish: de Makeda
  alternatives_spanish:
  - desde Makeda
  lexicon: HALOT
  rationale: La preposición מן marca punto de partida. Se translitera el topónimo como «Makeda», siguiendo la práctica de nombres propios del proyecto en español.
- source_word: לִבְנָה
  english_pob_choice: to Libnah
  chosen_spanish: a Libna
  alternatives_spanish:
  - hacia Libna
  lexicon: HALOT
  rationale: Como destino del movimiento, «a Libna» expresa bien la dirección. Se conserva el nombre propio transliterado.
- source_word: וַיִּלָּחֶם
  english_pob_choice: fought
  chosen_spanish: peleó
  alternatives_spanish:
  - combatió
  - luchó
  lexicon: HALOT
  rationale: En este contexto narrativo militar, לחם se entiende como entrar en combate. «Peleó» es claro y directo en español; evita una formulación más pesada sin perder el sentido bélico.
- source_word: עִם לִבְנָה
  english_pob_choice: against Libnah
  chosen_spanish: contra Libna
  alternatives_spanish:
  - con Libna
  lexicon: HALOT
  rationale: Aunque עִם normalmente significa «con», con לחם funciona idiomáticamente para señalar al oponente. En español debe expresarse como «contra» para comunicar el valor adversativo que el hebreo lleva aquí.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide con la auditoría inglesa: movimiento de Makeda a Libna y combate contra Libna. No se requieren ajustes textuales respecto del pasaje fuente; solo se adapta el modismo bélico al español con una nota explicativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece.
  - Se conserva la transliteración de los topónimos como «Makeda» y «Libna», en línea con el tratamiento de nombres propios del proyecto.
  - «Peleó contra» refleja el hebreo idiomático עִם tras לחם, manteniendo la tensión lexical sin traducir mecánicamente «con».
