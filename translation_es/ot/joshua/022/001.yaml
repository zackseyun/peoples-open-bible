lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: El marcador temporal introduce la acción siguiente en la secuencia narrativa. «Entonces» conserva ese avance del relato con naturalidad en español.
- source_word: יִקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - citó
  lexicon: HALOT
  rationale: El verbo qal expresa aquí llamar/sumar a presencia. «Llamó» refleja bien la acción sin sobrerregularla como una convocatoria más formal que el contexto no exige.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: Nombre propio
  rationale: En español bíblico y de lectura eclesial, «Josué» es la forma estable y transparente del nombre propio.
- source_word: לָרֽאוּבֵנִי
  english_pob_choice: the Reubenites
  chosen_spanish: los rubenitas
  alternatives_spanish:
  - la tribu de Rubén
  - los de Rubén
  lexicon: HALOT
  rationale: El singular gentilicio con artículo y preposición funciona colectivamente para el grupo tribal. «Los rubenitas» preserva ese valor colectivo de manera natural.
- source_word: וְלַגָּדִי
  english_pob_choice: the Gadites
  chosen_spanish: los gaditas
  alternatives_spanish:
  - la tribu de Gad
  - los de Gad
  lexicon: HALOT
  rationale: Se mantiene el mismo tratamiento colectivo del gentilicio tribal que en «rubenitas».
- source_word: וְלַחֲצִי מַטֵּה מְנַשֶּׁה
  english_pob_choice: the half-tribe of Manasseh
  chosen_spanish: la media tribu de Manasés
  alternatives_spanish:
  - la mitad de la tribu de Manasés
  - la semitribu de Manasés
  lexicon: HALOT
  rationale: מַטֵּה designa aquí una subdivisión tribal. «Media tribu» conserva la designación asentada y comunica el sentido de la división sin sonar arcaico.
translation_notes:
  revision_awareness: El texto hebreo y el contexto auditado en inglés concuerdan sin variantes textuales ni revisiones aplicadas; no se requieren notas de variante.
  spanish_consistency_notes:
