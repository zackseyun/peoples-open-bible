review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia militar general: inspección de los accesos, control de las fuentes, colocación de campamentos y regreso al pueblo. Sin embargo, no preserva con suficiente precisión la doble acción griega ἐφώδευεν καὶ προκατέλαβε, ya que usa ''recorrió y ocupó'', donde ''recorrió'' no refleja control/aseguramiento militar. También falta la nota correspondiente a la rareza y matiz alternativo de ἐφώδευεν, y la nota existente [a] está mal reutilizada para otra frase distinta.'
  spanish_quality_summary: El español es generalmente legible, pero presenta problemas de claridad y naturalidad militar. 'Recorrió y ocupó las fuentes de agua' suena semánticamente inexacto; 'hombres guerreros' es menos idiomático que 'hombres de guerra' o 'combatientes'. 'Puso en ellas campamentos' es entendible, pero 'apostó junto a ellas campamentos de hombres de guerra' o 'estableció junto a ellas campamentos...' refleja mejor el griego. También hay un error formal al reutilizar el marcador [a] para dos notas diferentes.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales deben alinearse mejor con el rastro POB: ἀναβάσεις como ''subidas/accesos en subida'' con nota; ἐφώδευεν con un valor de asegurar/bloquear/tomar control, no ''recorrer''; προκατέλαβε como ''se apoderó de'' o similar; ἀνδρῶν πολεμιστῶν mejor como ''hombres de guerra'' para conservar el rasgo masculino y militar sin sonar forzado.'
  issues:
  - severity: high
    issue: '''recorrió'' no representa fielmente ἐφώδευεν'
    rationale: El griego, según el expediente POB, expresa control militar, aseguramiento o bloqueo de las fuentes; 'recorrer' describe movimiento de inspección, no toma de control.
  - severity: high
    issue: Reutilización incorrecta del marcador [a]
    rationale: El texto usa [a] tanto para 'su ciudad' como para 'ocupó', pero solo hay una nota. Esto incumple la disciplina requerida de notas y crea ambigüedad.
  - severity: medium
    issue: Falta una nota para el matiz alternativo de ἐφώδευεν
    rationale: El expediente inglés conserva una nota sobre el verbo raro con posibles sentidos como 'asegurar' o 'bloquear'; esa información debe preservarse en español.
  - severity: medium
    issue: '''hombres guerreros'' suena menos natural en español eclesial general'
    rationale: Aunque no es incorrecto, 'hombres de guerra' preserva mejor el giro explícitamente masculino y militar de ἀνδρῶν πολεμιστῶν con mayor naturalidad.
  - severity: low
    issue: '''su ciudad'' puede sugerir singular posesivo ambiguo'
    rationale: El griego αὐτῶν es plural; 'su ciudad' puede funcionar en español, pero 'la ciudad de ellos' o mantener 'su ciudad' dentro de un contexto claro es menos problemático aquí. No exige cambio si la frase completa ya aclara el referente.
  revised_spanish_text: Y él inspeccionó las subidas de su ciudad[a], y tomó control de las fuentes de agua[b] y se apoderó de ellas, y apostó junto a ellas campamentos de hombres de guerra; y él mismo volvió a su pueblo.
  revised_footnotes:
