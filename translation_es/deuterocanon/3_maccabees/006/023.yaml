translation:
  language: es
  text: 'Pues, cuando oyó el clamor y vio a todos postrados para destrucción, lloró con ira y amenazó a sus amigos[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego φίλοι puede referirse no solo a amigos personales, sino también a allegados reales o cortesanos en un entorno de corte.
    reason: cultural_note
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: when he heard
  chosen_spanish: cuando oyó
  alternatives_spanish:
  - al oír
  - después de oír
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia temporal de la acción principal. «Cuando oyó» expresa con naturalidad ese valor en español sin volverlo demasiado rígido.
- source_word: τῆς κραυγῆς
  english_pob_choice: the outcry
  chosen_spanish: el clamor
  alternatives_spanish:
  - el grito
  - el alarido
  lexicon: BDAG
  rationale: κραυγή denota un grito fuerte, público y angustiado. «Clamor» comunica mejor ese matiz colectivo y dramático que un simple «grito».
- source_word: πρηνεῖς
  english_pob_choice: prostrate
  chosen_spanish: postrados
  alternatives_spanish:
  - tendidos boca abajo
  - caídos rostro en tierra
  lexicon: LSJ
  rationale: πρηνής significa estar boca abajo o en posición prona. «Postrados» es una opción española natural y fiel, y conserva la imagen de abatimiento corporal sin sobreexplicar.
- source_word: εἰς τὴν ἀπώλειαν
  english_pob_choice: for destruction
  chosen_spanish: para destrucción
  alternatives_spanish:
  - hacia destrucción
  - para ruina
  - para su destrucción
  lexicon: BDAG
  rationale: La preposición expresa orientación o destino inminente. «Para destrucción» mantiene la gravedad y la dirección del texto griego con sobriedad.
- source_word: δακρύσας
  english_pob_choice: he wept
  chosen_spanish: lloró
  alternatives_spanish:
  - se echó a llorar
  - derramó lágrimas
  lexicon: BDAG
  rationale: El participio señala que derramó lágrimas. «Lloró» es directo, digno y suficientemente cercano al sentido narrativo.
- source_word: μετʼ ὀργῆς
  english_pob_choice: in anger
  chosen_spanish: con ira
  alternatives_spanish:
  - airado
  - con enojo
  lexicon: BDAG
  rationale: La frase describe el modo emocional de su llanto y amenaza. «Con ira» conserva el sustantivo y evita una suavización excesiva.
- source_word: τοῖς φίλοις
  english_pob_choice: his friends
  chosen_spanish: a sus amigos
  alternatives_spanish:
  - a sus compañeros
  - a sus cortesanos
  lexicon: BDAG
  rationale: En contexto helenístico φίλοι puede designar amigos personales o allegados de corte. Se mantiene «amigos» en el texto principal, como hizo la base inglesa, porque es fiel y entendible; el posible matiz cortesano se preserva en nota.
- source_word: διηπείλει
  english_pob_choice: threatened
  chosen_spanish: amenazó
  alternatives_spanish:
  - seguía amenazando
  - profería amenazas
  lexicon: LSJ
  rationale: El imperfecto sugiere acción continuada, pero en español narrativo «amenazó» funciona de manera natural. La idea de reiteración queda implícita sin forzar la línea.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: Es el participio introductorio normal del discurso directo. «Diciendo» se ajusta al griego y prepara la cita inmediata.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió una expansión innecesaria de πρηνεῖς y prefirió un giro más natural; por eso el español evita perífrasis explicativas y usa una solución breve y directa («postrados»). También se tuvo en cuenta la nota inglesa sobre φίλοι para mantener la ambigüedad cultural sin introducir «cortesanos» en el texto principal.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene un registro narrativo sobrio y bíblico, evitando arcaísmos innecesarios.
  - «Amigos» se usa en el cuerpo principal por fidelidad y claridad; la posible lectura cortesana queda documentada en nota.
  - El paralelismo entre ver, llorar y amenazar se preserva sin ampliar el contenido del original.
