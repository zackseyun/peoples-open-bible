  text: זֹ֥את תּוֹרַ֖ת הַ/קְּנָאֹ֑ת אֲשֶׁ֨ר תִּשְׂטֶ֥ה אִשָּׁ֛ה תַּ֥חַת אִישָׁ֖/הּ וְ/נִטְמָֽאָה׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/005/029.yaml
  text: This is the law of jealousy[a], when a wife goes astray under her husband and becomes defiled[c][b],
  footnotes:
