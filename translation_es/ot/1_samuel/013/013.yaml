translation:
  language: es
  text: 'Y Samuel dijo a Saúl[a]: «Has actuado neciamente. No has guardado el mandamiento de Yahvé tu Dios, que él te mandó; pues ahora Yahvé habría establecido tu reino sobre Israel para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Has obrado neciamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִסְכָּלְתָּ
  english_pob_choice: You have acted foolishly
  chosen_spanish: Has actuado neciamente
  alternatives_spanish:
  - Has obrado neciamente
  - Has hecho una necedad
  - Has sido necio
  lexicon: HALOT
  rationale: El nifal de סכל expresa conducta insensata o necia; en español, «has actuado neciamente» conserva el juicio moral sobre la acción y suena natural. «Obrado» y «hecho una necedad» son posibles, pero menos directos o más coloquiales.
- source_word: שָׁמַרְתָּ
  english_pob_choice: have not kept
  chosen_spanish: no has guardado
  alternatives_spanish:
  - no has observado
  - no has obedecido
  lexicon: HALOT
  rationale: «Guardar» refleja היטב el sentido de שׁמר como custodiar/observar fielmente un mandamiento. Mantiene la resonancia de pacto sin reducirlo solo a «obedecer».
- source_word: מִצְוַת
  english_pob_choice: the command
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - el precepto
  lexicon: HALOT
  rationale: En español bíblico, «mandamiento» comunica bien la idea de una orden divina concreta. Aunque el inglés POB prefirió «command», aquí «mandamiento» preserva la fuerza normativa del sustantivo singular.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la terminología POB para el Tetragrámaton: «Yahvé». Esto conserva el nombre propio divino en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: La construcción posesiva se expresa naturalmente en español con «tu Dios», manteniendo la relación de pacto y cercanía personal.
- source_word: צִוָּךְ
  english_pob_choice: he commanded you
  chosen_spanish: que él te mandó
  alternatives_spanish:
  - que él te ordenó
  - que él te dio
  lexicon: HALOT
  rationale: «Mandó» conserva el verbo de autoridad de צוה. Se prefiere «te mandó» por claridad y fluidez, sin perder el vínculo con el «mandamiento» anterior.
- source_word: כִּי עַתָּה
  english_pob_choice: for now
  chosen_spanish: pues ahora
  alternatives_spanish:
  - porque ahora
  - ya que ahora
  lexicon: HALOT
  rationale: «Pues ahora» transmite la conexión inferencial/consecutiva del hebreo mejor que una causal rígida, y prepara la cláusula contrafactual en español.
- source_word: הֵכִין
  english_pob_choice: would have established
  chosen_spanish: habría establecido
  alternatives_spanish:
  - habría afirmado
  - habría consolidado
  - habría hecho firme
  lexicon: HALOT
  rationale: 'El perfecto causal/contrafactual se vierte con condicional perfecto en español para reflejar el resultado no realizado: una oportunidad perdida, no un hecho consumado.'
- source_word: מַמְלַכְתְּךָ
  english_pob_choice: your kingdom
  chosen_spanish: tu reino
  alternatives_spanish:
  - tu reino
  - tu soberanía
  lexicon: HALOT
  rationale: Aunque «reino» y «reino» pueden coincidir semánticamente con «kingdom», en español «tu reino» es más natural que «tu reino/tu soberanía» y mantiene el referente político-dinástico.
- source_word: אֶל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre Israel
  - para Israel
  lexicon: HALOT
  rationale: Con un verbo de establecer reino, «sobre Israel» expresa adecuadamente el ámbito de gobierno que el inglés POB también explicitó con la misma decisión idiomática.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para siempre
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: «Para siempre» es la forma española más natural y fiel para la duración indefinida de עַד עוֹלָם.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La política POB es transliterar el nombre divino en vez de ocultarlo tras un título. En español, «Yahvé» es la forma estandarizada del proyecto y mantiene la continuidad con el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido contrafactual de la cláusula final
  english_pob_reading: for now Yahweh would have established your kingdom over Israel forever
  chosen_spanish_reading: pues ahora Yahvé habría establecido tu reino sobre Israel para siempre
  alternative_spanish_readings:
  - pues ahora Yahvé había establecido tu reino sobre Israel para siempre
  rationale: El hebreo presenta el resultado no ocurrido de la desobediencia de Saúl. El condicional perfecto español conserva la lectura contrafactual sin convertirla en un hecho ya realizado.
  doctrine_reference: Contexto narrativo de 1 Samuel 13; no implica una doctrina aparte sino la lógica del reproche profético.
translation_notes:
  revision_awareness: Se siguió de cerca el contexto auditado en inglés y la puntuación de cita directa. No se introdujeron cambios doctrinales respecto del original; la principal decisión fue conservar la lectura contrafactual con un condicional perfecto español y mantener el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «tu reino» para מַמְלַכְתְּךָ y «sobre Israel» para אֶל יִשְׂרָאֵל, siguiendo la idiomaticidad española sin perder el sentido de dominio.
  - El nivel de registro es bíblico contemporáneo, evitando tanto arcaísmos innecesarios como paráfrasis excesiva.
