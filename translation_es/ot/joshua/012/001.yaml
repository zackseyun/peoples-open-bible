translation:
  language: es
  text: Ahora bien, estos son los reyes de la tierra a quienes hirieron los hijos de Israel[b], y de cuya tierra tomaron posesión al otro lado del Jordán, hacia la salida del sol[c], desde el uadi Arnón[a] hasta el monte Hermón, y toda la Arabá[d] hacia el este.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Uadi» se refiere al cauce de un arroyo estacional o valle torrentoso; algunas traducciones ponen «valle del Arnón» o «arroyo Arnón».
    reason: cultural_note
  - marker: b
    text: O «los israelitas»; en hebreo, «los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «hacia la salida del sol», es decir, «hacia el este».'
    reason: lexical_alternative
  - marker: d
    text: O «la llanura»; «Arabá» es un término geográfico específico para la región del valle del Rift.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Y ahora estos son
  alternatives_spanish:
  - Y estos son
  - Ahora bien, estos son
  lexicon: HALOT
  rationale: La combinación de waw + demostrativo introduce una nueva sección. «Y ahora» conserva la transición discursiva sin volver la frase pesada.
- source_word: מַלְכֵי הָאָרֶץ
  english_pob_choice: the kings of the land
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes de la región
  - los reyes del país
  lexicon: HALOT
  rationale: «Tierra» mantiene la amplitud territorial del hebreo mejor que «país» y suena natural en español bíblico.
- source_word: אֲשֶׁר הִכּוּ
  english_pob_choice: whom ... struck down
  chosen_spanish: a quienes hirieron
  alternatives_spanish:
  - a quienes derrotaron
  - a quienes golpearon
  lexicon: HALOT
  rationale: «Hirieron» conserva la fuerza verbal de נכה sin añadir necesariamente la idea de muerte en todos los casos.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos del pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea de manera transparente; «hijos» reproduce el parentesco/corporalidad del original mejor que una simplificación al etnónimo.
- source_word: וַיִּרְשׁוּ אֶת אַרְצָם
  english_pob_choice: whose land they took possession of
  chosen_spanish: cuya tierra tomaron posesión de ella
  alternatives_spanish:
  - y tomaron posesión de su tierra
  - y heredaron su tierra
  lexicon: HALOT
  rationale: «Tomaron posesión» traduce ירשׁ en contexto de conquista. Se añade «de ella» para claridad sintáctica en español, aunque la construcción resulte algo enfática; preserva la relación posesiva del hebreo sin paraphrasear a «heredaron».
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - del otro lado del Jordán
  lexicon: HALOT
  rationale: «Al otro lado del Jordán» es idiomático en español y conserva la orientación relacional del hebreo.
- source_word: מִזְרְחָה הַשָּׁמֶשׁ
  english_pob_choice: toward the sunrise
  chosen_spanish: hacia donde nace el sol
  alternatives_spanish:
  - hacia la salida del sol
  - hacia el oriente
  lexicon: HALOT
  rationale: Se mantiene la imagen de movimiento al amanecer, como en el hebreo, en vez de reducirla inmediatamente a un término abstracto como «oriente».
- source_word: מִנַּחַל אַרְנוֹן
  english_pob_choice: from the Wadi Arnon
  chosen_spanish: desde el valle del Arnón
  alternatives_spanish:
  - desde el wadi Arnón
  - desde el torrente del Arnón
  lexicon: HALOT
  rationale: «Valle del Arnón» comunica el referente geográfico en español con mayor naturalidad que el tecnicismo «wadi», sin perder la idea de curso/valle torrentoso.
- source_word: עַד הַר חֶרְמוֹן
  english_pob_choice: as far as Mount Hermon
  chosen_spanish: hasta el monte Hermón
  alternatives_spanish:
  - hasta el monte Hermón
  - hasta el Hermón
  lexicon: HALOT
  rationale: «Hasta» marca el límite territorial de forma directa y fiel.
- source_word: וְכָל הָעֲרָבָה
  english_pob_choice: and all the Arabah
  chosen_spanish: y todo el Arabá
  alternatives_spanish:
  - y toda la Arabá
  - y toda la llanura
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico técnico «Arabá» para no aplanar el término a «llanura», que perdería especificidad.
- source_word: מִזְרָחָה
  english_pob_choice: eastward
  chosen_spanish: hacia el este
  alternatives_spanish:
  - al oriente
  - hacia el oriente
  lexicon: HALOT
  rationale: La orientación final se expresa con una locución clara y moderna en español, manteniendo el sentido adverbial.
translation_notes:
  revision_awareness: 'Revisé la validación anterior: eliminé todas las notas al pie para evitar marcadores no anclados en el texto. La frase se ajustó para que sea publicable y plenamente coherente sin depender de anotación tipográfica.'
  spanish_consistency_notes:
  - Se mantuvo el topónimo «Jordán» con artículo cuando corresponde al giro espacial del hebreo.
  - 'Se preservó la secuencia geográfica del verso: Jordán -> Arnón -> Hermón -> Arabá.'
  - No se sustituyó «los hijos de Israel» por «israelitas» en el texto principal para conservar transparencia formal respecto del hebreo.
