    rationale: Debe reemplazarse por español natural, p. ej. 'enseres' o 'equipo', para mantener calidad editorial.
  - severity: low
    issue: 'La nota c usa una glosa literal poco natural: ''preguntó a sus hermanos por paz'''
    rationale: Para una nota en español es mejor 'preguntó por la paz de sus hermanos' o aclarar directamente que el hebreo literalmente dice algo como 'preguntó por paz' como modismo de bienestar.
