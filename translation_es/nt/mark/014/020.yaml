translation:
  language: es
  text: 'Y él les dijo[a]: «Uno de los doce, el que moja conmigo en el tazón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «plato». El griego τρύβλιον puede referirse a un recipiente de mesa, como un tazón o un plato.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: δέ aquí enlaza la narración con suavidad, sin contraste fuerte; en español, «Y» mantiene ese avance narrativo natural.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les contó
  lexicon: BDAG
  rationale: λέγω introduce discurso directo de forma simple; «les dijo» conserva la relación dativa sin añadir matiz interpretativo.
- source_word: Εἷς τῶν δώδεκα
  english_pob_choice: One of the twelve
  chosen_spanish: Uno de los doce
  alternatives_spanish:
  - Uno de los Doce
  lexicon: BDAG
  rationale: La expresión identifica al hablante como parte del grupo íntimo de Jesús. En español corriente, el numeral en minúscula es claro y fiel; la mayúscula sería posible pero no necesaria.
- source_word: ὁ ἐμβαπτόμενος
  english_pob_choice: the one dipping
  chosen_spanish: el que moja
  alternatives_spanish:
  - el que está mojando
  - el que se sumerge
  lexicon: BDAG
  rationale: El participio presente se entiende mejor en español con una relativa identificadora. «Mojar» comunica el acto de tomar comida con el pan/porción en el recipiente sin forzar una imagen más técnica de inmersión; «se sumerge» sería demasiado fuerte para el contexto de mesa.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  lexicon: BDAG
  rationale: μετά con genitivo expresa acompañamiento; «conmigo» es la forma natural y directa en español.
- source_word: εἰς τὸ τρύβλιον
  english_pob_choice: into the bowl
  chosen_spanish: en el tazón
  alternatives_spanish:
  - en la fuente
  - en el plato
  lexicon: BDAG
  rationale: τρύβλιον puede referir un recipiente de mesa como tazón o plato. Aquí se opta por «tazón» por ser accesible y suficientemente amplio; la preposición griega εἰς se integra de modo idiomático en español como «en» en este contexto de acción compartida de mesa.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior haciendo que el marcador [a] aparezca explícitamente en el texto español, anclado a la introducción del discurso directo.
  spanish_consistency_notes:
  - Se mantiene «doce» en minúscula, coherente con una referencia ordinal descriptiva.
  - Se usa «moja» como equivalente contextual de ἐμβαπτόμενος sin introducir una lectura demasiado técnica o ritual.
  - Se eligió «tazón» para preservar el valor de recipiente de mesa sin restringir innecesariamente el término griego a un único objeto.
