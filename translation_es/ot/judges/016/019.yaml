translation:
  language: es
  text: Entonces ella lo hizo dormir sobre sus rodillas[a], y llamó a un hombre[b], y le rapó los siete mechones de la cabeza[c]. Entonces comenzó a afligirlo, y se le fue la fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su regazo»; literalmente, «sobre sus rodillas».
    reason: lexical_alternative
  - marker: b
    text: O «hizo venir a un hombre» o «llamó al hombre». El hebreo puede referirse tanto a convocar a un hombre para la tarea como a llamar a un hombre ya presente o conocido en la escena.
    reason: alternative_reading
  - marker: c
    text: O «las siete trenzas de su cabeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּיַשְּׁנֵהוּ
  english_pob_choice: she made him sleep
  chosen_spanish: ella lo hizo dormir
  alternatives_spanish:
  - ella lo puso a dormir
  - ella lo arrulló hasta que durmiera
  lexicon: HALOT
  rationale: El hifil de ישׁן es causativo; en español, «lo hizo dormir» preserva la causalidad de forma natural y sin añadir un matiz no indicado por el hebreo.
- source_word: עַל בִּרְכֶּיהָ
  english_pob_choice: on her knees
  chosen_spanish: sobre sus rodillas
  alternatives_spanish:
  - en su regazo
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «sobre sus rodillas». En español, «sobre sus rodillas» conserva el detalle concreto del original; «en su regazo» sería una equivalencia idiomática posible, pero menos literal.
- source_word: וַתִּקְרָא לָאִישׁ
  english_pob_choice: she called for a man
  chosen_spanish: llamó a un hombre
  alternatives_spanish:
  - llamó a un hombre para que viniera
  - llamó al hombre
  lexicon: HALOT
  rationale: El ל con אִישׁ permite la idea de convocar o llamar a alguien para una acción. En español, «llamó a un hombre» reproduce la indefinición del hebreo sin forzar un sujeto ya identificado.
- source_word: וַתְּגַלַּח
  english_pob_choice: she shaved off
  chosen_spanish: le rapó
  alternatives_spanish:
  - le cortó
  - le afeitó
  lexicon: HALOT
  rationale: El verbo indica quitar el cabello. «Rapó» es preciso y natural en español; el complemento indirecto «le» refleja que la acción recae sobre él, aunque la frase hebrea siga presentando a Dalila como sujeto gramatical.
- source_word: שֶׁבַע מַחְלְפוֹת רֹאשׁוֹ
  english_pob_choice: the seven locks of his head
  chosen_spanish: las siete trenzas de su cabeza
  alternatives_spanish:
  - los siete mechones de su cabeza
  - los siete rizos de su cabeza
  lexicon: HALOT
  rationale: מַחְלְפוֹת puede referirse a trenzas, mechones o rizos. «Trenzas» conserva bien la idea de secciones de cabello trabajadas y mantiene la posibilidad léxica destacada por el POB inglés de «locks/braids».
- source_word: וַתָּחֶל לְעַנּוֹתוֹ
  english_pob_choice: Then she began to afflict him
  chosen_spanish: Entonces comenzó a afligirlo
  alternatives_spanish:
  - Entonces comenzó a atormentarlo
  - Entonces empezó a humillarlo
  lexicon: HALOT
  rationale: ענה en piel puede significar afligir, oprimir o humillar. «Afligirlo» preserva la amplitud semántica sin reducir el sentido a una sola modalidad de maltrato.
- source_word: וַיָּסַר כֹּח֖וֹ מֵעָלָיו
  english_pob_choice: his strength left him
  chosen_spanish: se le fue la fuerza
  alternatives_spanish:
  - su fuerza se apartó de él
  - su fuerza lo dejó
  lexicon: HALOT
  rationale: El giro hebreo expresa la retirada de la fuerza; «se le fue la fuerza» es una equivalencia idiomática española que mantiene el sentido fenomenológico sin introducir una causa explícita.
theological_decisions:
- issue: La fuente del poder de Sansón no se explicita en este versículo
  english_pob_reading: Render the text phenomenologically as 'his strength left him' without adding an explicit reference to the LORD in this verse.
  chosen_spanish_reading: 'Traducir fenomenológicamente: «se le fue la fuerza», sin introducir en el versículo una mención explícita a Yahvé como fuente o retirada del poder.'
  alternative_spanish_readings:
  - «la fuerza de Yahvé se apartó de él»
  - «Yahvé retiró su fuerza»
  rationale: El hebreo solo dice que la fuerza se apartó de él. El contexto amplio relaciona la capacidad de Sansón con su consagración y la acción de Dios, pero este versículo en sí no lo enuncia; la traducción conserva esa tensión sin explicitar más de lo que el texto dice.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El audit trail inglés revisó «the man» por «a man» para reflejar el indefinido hebreo אִישׁ, y mantuvo la lectura fenomenológica de la pérdida de fuerza sin añadir una referencia explícita a Yahvé. La redacción española sigue esa revisión y evita cualquier expansión interpretativa no sustentada por el verso.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como nombre divino normativo del proyecto, pero este versículo no lo menciona explícitamente.
  - Se mantiene «afligir» para ענה, en línea con la amplitud semántica observada en el POB inglés.
  - «Rodillas» preserva el detalle literal del hebreo; la nota ofrece la alternativa idiomática «regazo» para lectura natural.
  - El indefinido «a un hombre» se refleja con «a un hombre», no «al hombre».
