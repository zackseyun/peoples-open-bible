lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No debes
  - No habrás de
  lexicon: HALOT
  rationale: La negación legal se conserva con una prohibición directa y natural en español.
- source_word: תֹּאכְלֶנּוּ
  english_pob_choice: you shall not eat it
  chosen_spanish: lo comerás
  alternatives_spanish:
  - no lo comerás
  - no debes comerlo
  lexicon: HALOT
  rationale: El verbo hebreo está en forma jussiva/prohibitiva con sufijo pronominal de tercera persona. En español, la prohibición se expresa de manera idiomática con ‘No lo comerás’, preservando el objeto ‘lo’ y el tono legal sin introducir más contenido que el del original.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en el suelo
  - sobre el suelo
  lexicon: HALOT
  rationale: ‘הָאָרֶץ’ puede ser ‘tierra’, ‘suelo’ o ‘tierra/país’ según contexto. Aquí la instrucción concreta sobre el derramamiento favorece ‘sobre la tierra’, que mantiene la imagen física del texto hebreo sin estrecharla excesivamente a ‘suelo’.
- source_word: תִּשְׁפְּכֶנּוּ
  english_pob_choice: you shall pour it out
  chosen_spanish: lo derramarás
  alternatives_spanish:
  - lo echarás
  - lo vaciarás
  lexicon: HALOT
  rationale: ‘שׁפך’ describe aquí el acto ritual de verter o derramar sangre. ‘Derramar’ es la equivalencia más natural y fiel en español bíblico contemporáneo.
- source_word: כַּמָּיִם
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - igual que agua
  - tal como agua
  lexicon: HALOT
  rationale: 'La comparación se conserva de forma directa y idiomática en español: ‘como agua’.'
theological_decisions:
- issue: Referente implícito de los pronombres objeto
  english_pob_reading: The repeated 'it' refers to the blood from the sacrificed animal, as specified in the surrounding context.
  chosen_spanish_reading: Los pronombres ‘lo’ remiten a la sangre del animal sacrificado, dada por el contexto inmediato.
  alternative_spanish_readings:
  - 'Hacer explícita la sangre en el texto principal: ‘No comerás la sangre; la derramarás…’'
  rationale: El hebreo usa sufijos pronominales sin repetir el sustantivo. Mantener ‘lo’ respeta la forma del original y evita una expansión interpretativa en el cuerpo del versículo; el referente queda claro por el contexto cercano.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; no paraphrase beyond source evidence.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hubo acuerdo alto entre evaluadores; por eso se mantiene una solución sobria y estable, sin añadir expansiones interpretativas.
  spanish_consistency_notes:
  - Se usa ‘derramar’ para שׁפך, en línea con el valor ritual de verter sangre.
  - Se mantiene ‘lo’ como referente pronominal para no explicitar ‘sangre’ en el cuerpo principal del versículo.
  - ‘Tierra’ conserva mejor la amplitud de הָאָרֶץ que una restricción innecesaria a ‘suelo’.
