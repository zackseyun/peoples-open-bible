translation:
  language: es
  text: 'Entonces los señores de los filisteos fueron a verla y le dijeron: «Sedúcelo, y mira en qué consiste su gran fuerza, y por qué medio podremos prevalecer contra él, para que lo atemos y lo aflijamos; y cada uno de nosotros te dará mil cien piezas de plata[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «mil cien plata». Probablemente se refiere a mil cien piezas o siclos de plata de parte de cada señor filisteo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סַרְנֵי פְלִשְׁתִּים
  english_pob_choice: the lords of the Philistines
  chosen_spanish: los señores de los filisteos
  alternatives_spanish:
  - los gobernantes de los filisteos
  - los jefes de los filisteos
  lexicon: HALOT
  rationale: סרן designa a los dirigentes filisteos; «señores» reproduce bien el valor de autoridad y mantiene una formulación natural en español bíblico sin convertirlo en un título eclesiástico.
- source_word: פַּתִּי
  english_pob_choice: Entice
  chosen_spanish: Engáñalo
  alternatives_spanish:
  - Alértalo
  - Persuádelo
  - Sedúcelo
  lexicon: HALOT
  rationale: El imperativo pide inducir a Sansón por medios engañosos. «Engáñalo» expresa con claridad la intención manipuladora que el contexto exige; «sedúcelo» podría sugerir un matiz sexual no obligatorio por el hebreo.
- source_word: וּרְאִי בַּמֶּה כֹּחוֹ גָדוֹל
  english_pob_choice: and see in what his great strength lies
  chosen_spanish: y mira en qué consiste su gran fuerza
  alternatives_spanish:
  - y mira en qué radica su gran fuerza
  - y mira de dónde proviene su gran fuerza
  lexicon: HALOT
  rationale: במה introduce la base o fundamento; «en qué consiste» conserva la indagación sobre la fuente de la fuerza sin forzar una expresión demasiado literal o poco natural.
- source_word: וּבַמֶּה נוּכַל לוֹ
  english_pob_choice: and by what means we may prevail against him
  chosen_spanish: y por qué medio podremos prevalecer contra él
  alternatives_spanish:
  - y cómo podremos vencerlo
  - y por qué podremos dominarlo
  lexicon: HALOT
  rationale: La expresión idiomática יכל ל significa tener la capacidad de prevalecer sobre alguien. «Prevalecer contra él» sigue de cerca la decisión auditada en inglés y mantiene el tono hostil del contexto.
- source_word: וַאֲסַרְנֻהוּ
  english_pob_choice: so that we may bind him
  chosen_spanish: para que lo atemos
  alternatives_spanish:
  - para que lo sujetemos
  - para que lo encadenemos
  lexicon: HALOT
  rationale: אסר es «atar/bind»; en español, «atar» comunica la acción de forma directa y preserva el sentido de captura sin añadir detalles no presentes en el texto.
- source_word: לְעַנֹּתוֹ
  english_pob_choice: to afflict him
  chosen_spanish: y lo aflijamos
  alternatives_spanish:
  - y lo maltratemos
  - y lo sometamos a sufrimiento
  lexicon: HALOT
  rationale: ענה en piel puede abarcar afligir, humillar o maltratar. «Aflijamos» mantiene la amplitud semántica y la violencia del propósito sin estrechar el sentido a una sola modalidad de maltrato.
- source_word: אִישׁ אֶלֶף וּמֵאָה כָּסֶף
  english_pob_choice: eleven hundred pieces of silver
  chosen_spanish: mil cien piezas de plata
  alternatives_spanish:
  - mil cien siclos de plata
  - mil cien monedas de plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mil cien plata»; «piezas de plata» resuelve de forma clara la elipsis. «Siclos» es posible por implicación, pero no está explicitado en el texto, así que se deja para nota.
theological_decisions:
- issue: El valor de כָּסֶף sin unidad explícita
  english_pob_reading: This likely refers to eleven hundred pieces or shekels of silver from each Philistine lord.
  chosen_spanish_reading: «mil cien piezas de plata» en el texto principal, con nota que explica que probablemente se trata de piezas o siclos de plata por cada señor filisteo.
  alternative_spanish_readings:
  - mil cien siclos de plata
  - mil cien de plata
  rationale: El hebreo no nombra la unidad; mantener «piezas de plata» conserva la literalidad del auditable en inglés y evita afirmar como texto principal una especificación no presente. La nota recoge la probabilidad de siclos sin imponerla.
  doctrine_reference: No aplica; decisión de medida monetaria y fidelidad textual.
translation_notes:
  revision_awareness: Sigo la revisión auditada en inglés que prefirió «prevail against him» sobre «overpower him» por mayor cercanía léxica al hebreo. En español, «prevalecer contra él» conserva ese ajuste y evita una intensificación excesiva. También mantengo la cantidad monetaria como literal con nota, siguiendo la cautela del audit trail.
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando el hebreo lo requiere explícitamente; este versículo no contiene el nombre divino.
  - «Señores de los filisteos» mantiene el título político sin sustituirlo por un equivalente eclesiástico.
  - «Prevalecer contra él» y «atarlo» siguen el tono hostil y la secuencia causal del hebreo.
  - La nota aclara la elipsis monetaria sin alterar el texto principal.
