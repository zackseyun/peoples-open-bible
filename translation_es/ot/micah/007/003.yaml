translation:
  language: es
  text: 'Sus manos están sobre el mal, para hacerlo bien[a]: el príncipe pide, y el juez está por soborno[b], y el grande habla el deseo de su alma; así lo entretejen[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ambas manos están sobre el mal, para hacerlo bien», subrayando una dedicación completa y hábil al mal.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es muy breve: «el juez en/por pago». Puede significar «el juez pide soborno» o «el juez juzga por un soborno».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «así lo tuercen / lo trenzan». La imagen sugiere una corrupción coordinada, como si tejieran juntos un plan perverso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל הָרַע כַּפַּיִם
  english_pob_choice: Their hands are on evil
  chosen_spanish: Sus manos están sobre el mal
  alternatives_spanish:
  - Ambas manos están sobre el mal
  - Con sus manos se aplican al mal
  lexicon: HALOT
  rationale: El hebreo expresa una participación activa en el mal. «Están sobre el mal» conserva la imagen verbal y la orientación hacia el mal sin suavizarla. Mantengo «manos» en plural sin forzar «ambas» en el texto principal, aunque la dualidad permite esa opción.
- source_word: לְהֵיטִיב
  english_pob_choice: to do it well
  chosen_spanish: para hacerlo bien
  alternatives_spanish:
  - para hacerlo con destreza
  - para ejecutarlo hábilmente
  lexicon: HALOT
  rationale: 'El infinitivo hifil de היטיב puede expresar hacer algo con habilidad o eficacia. «Para hacerlo bien» conserva la ironía del texto: aplican destreza al mal. Es una formulación natural en español y suficientemente cercana al hebreo.'
- source_word: הַשַּׂר שֹׁאֵל
  english_pob_choice: the prince asks
  chosen_spanish: el príncipe pide
  alternatives_spanish:
  - el príncipe pregunta
  - el oficial demanda
  lexicon: HALOT
  rationale: «Príncipe» corresponde bien a שַׂר como dignatario o gobernante. שֹׁאֵל puede ser «pide» en contexto de corrupción, donde la solicitud funciona como demanda interesada; «pregunta» sería demasiado débil aquí.
- source_word: וְהַשֹּׁפֵט בַּשִּׁלּוּם
  english_pob_choice: the judge is for a bribe
  chosen_spanish: el juez juzga por soborno
  alternatives_spanish:
  - el juez es por soborno
  - el juez juzga por pago
  - el juez pide soborno
  lexicon: HALOT
  rationale: El hebreo es elíptico y puede implicar que el juez actúa a favor del pago. Como el español «es por soborno» resulta duro y poco natural, elegí «juzga por soborno», que mantiene el valor corrupto y la función judicial, sin perder la tersura del original. La ambigüedad de si «pide» o «juzga» se refleja en la nota.
- source_word: וְהַגָּדוֹל
  english_pob_choice: the great man
  chosen_spanish: el grande
  alternatives_spanish:
  - el gran hombre
  - el prominente
  lexicon: HALOT
  rationale: El sustantivo/adjetivo substantivado designa al personaje importante socialmente. «El grande» reproduce con mayor literalidad la forma hebrea y evita introducir un matiz honorífico más fuerte que el texto.
- source_word: דֹּבֵר הַוַּת נַפְשׁוֹ
  english_pob_choice: speaks the desire of his soul
  chosen_spanish: habla el deseo de su alma
  alternatives_spanish:
  - pronuncia el deseo de su alma
  - expresa el deseo de su alma
  - habla su deseo interior
  lexicon: HALOT
  rationale: El POB inglés revisó «craving» a «desire», y en español «deseo» preserva mejor la naturalidad y el valor más general de הַוַּת aquí. «Alma» mantiene נֶפֶשׁ como la interioridad/personalidad del sujeto sin convertirlo en un término técnico distinto.
- source_word: וַיְעַבְּתֽוּהָ
  english_pob_choice: thus they weave it together
  chosen_spanish: así lo entretejen
  alternatives_spanish:
  - así lo tuercen
  - así lo trenzan
  - así lo entrelazan
  lexicon: HALOT
  rationale: El verbo עבת sugiere torcer, trenzar o entretejer. «Entretejen» conserva la imagen de una corrupción coordinada y sugiere la fabricación conjunta del mal. «Lo» mantiene el referente colectivo o esquema corrupto implícito en el hebreo.
translation_notes:
  revision_awareness: El inglés de trabajo fue revisado desde «craving» a «desire» para נַפְשׁוֹ; en español se siguió esa revisión con «deseo». También se preservó la ambigüedad de בַּשִּׁלּוּם mediante una formulación que deja abierta la idea de pago o soborno, conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según las normas del proyecto cuando no aparece aquí el Tetragrámaton.
  - Se evitó «siervo» o vocabulario eclesiástico ajeno al campo semántico del pasaje; el texto describe corrupción de autoridades civiles.
  - «Alma» traduce נֶפֶשׁ de forma consistente como interioridad/persona, sin convertirlo en un tecnicismo dogmático.
