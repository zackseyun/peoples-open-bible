  - marker: b
    text: 'O: «los habían rechazado de ministrar como sacerdotes para Yahvé».'
    reason: alternative_reading
  revision_rationale: Se reemplaza «los habían rechazado de servir» por «los habían excluido de servir» para reflejar con más naturalidad en español la idea de impedir o apartar del ejercicio sacerdotal. Se mantiene «Yahvé» conforme al estándar del proyecto, así como «tierras de pasto» y «posesiones». La nota b se conserva como alternativa semánticamente cercana.
