    issue: La nota [a] está mal anclada y describe otra palabra/frase.
    rationale: En el texto, [a] aparece en «afiladas[a]», pero la nota dice «O «están tensas» para los arcos...», que corresponde a דְּרֻכוֹת / «sus arcos están tensos», no a שְׁנוּנִים / «afiladas». Esto rompe la trazabilidad auditada y puede confundir al lector.
  - severity: medium
