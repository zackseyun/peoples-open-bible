base_translation:
  language: en
  yaml_path: translation/ot/nahum/003/006.yaml
  text: And I will throw filth upon you[a], and treat you with contempt[b], and make you a spectacle.
  footnotes:
  - marker: a
    text: Or 'abominations' or 'detestable things' for 'filth.' The Hebrew term often refers to things that are ritually or morally detestable; here it likely carries the concrete sense of disgusting refuse used to shame Nineveh publicly.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'make you a sight' or 'set you as something to be looked at.'
    reason: lexical_alternative
