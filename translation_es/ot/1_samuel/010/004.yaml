translation:
  language: es
  text: Te preguntarán por tu bienestar[a] y te darán dos panes[b], y los recibirás de su mano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Te saludarán». El modismo hebreo literalmente implica preguntar por la paz o el bienestar de alguien.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «dos hogazas de pan».
    reason: lexical_alternative
  - marker: c
    text: O, «los tomarás de su mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁאֲלוּ לְךָ לְשָׁלוֹם
  english_pob_choice: They will ask you about your welfare
  chosen_spanish: Te preguntarán por tu bienestar
  alternatives_spanish:
  - Te saludarán
  - Te preguntarán cómo estás
  - Te preguntarán por tu paz
  lexicon: HALOT
  rationale: El hebreo expresa un modismo de preguntar por la paz/bienestar de alguien; en español, «preguntar por tu bienestar» conserva la idea interpersonal sin sonar forzado. «Saludarán» sería más fluido, pero pierde parte del contenido de la pregunta implícita.
- source_word: שָׁלוֹם
  english_pob_choice: welfare
  chosen_spanish: bienestar
  alternatives_spanish:
  - paz
  - bien
  - salud
  lexicon: HALOT
  rationale: En este contexto idiomático, שָׁלוֹם no apunta a «paz» abstracta sino a la condición personal de bienestar. «Bienestar» comunica esa idea con naturalidad en español.
- source_word: וְנָתְנוּ לְךָ
  english_pob_choice: and give you
  chosen_spanish: te darán
  alternatives_spanish:
  - y te darán
  - y te entregarán
  lexicon: HALOT
  rationale: El hebreo continúa la secuencia futura de acciones previstas; «te darán» mantiene el sentido directo y natural en español.
- source_word: שְׁתֵּי לֶחֶם
  english_pob_choice: two loaves of bread
  chosen_spanish: dos panes
  alternatives_spanish:
  - dos hogazas de pan
  - dos piezas de pan
  - dos panes de pan
  lexicon: HALOT
  rationale: Aunque לֶחֶם puede traducirse literalmente como «pan», en español la construcción más natural y comprensible es «dos panes». «Hogazas» es más específica, pero añade una precisión no exigida por el hebreo.
- source_word: וְלָקַחְתָּ מִיָּדָם
  english_pob_choice: and you shall receive them from their hand
  chosen_spanish: y los tomarás de su mano
  alternatives_spanish:
  - y los recibirás de su mano
  - y los tomarás de ellos
  - y los aceptarás de su mano
  lexicon: HALOT
  rationale: לקח es literalmente «tomar»; en español, «tomarás» conserva mejor la correspondencia directa con el verbo hebreo que «recibirás», que suaviza la imagen. «De su mano» mantiene la expresión idiomática singular del hebreo.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el trazado auditado en inglés: conserva el modismo de שָׁלוֹם como bienestar, expresa la cantidad con un plural natural en español y mantiene la imagen de tomar el pan de la mano. No se requirieron cambios de revisión respecto del pasaje auditado en inglés.'
  spanish_consistency_notes:
  - Se usó «bienestar» para שָׁלוֹם en línea con el valor idiomático del contexto.
  - Se prefirió «panes» en español por naturalidad, aunque el hebreo usa un sustantivo singular con numeral.
  - Se conservó «de su mano» para reflejar la imagen hebrea y la nota alternativa del inglés POB.
  - No se empleó «SEÑOR» ni terminología teológica añadida, porque el versículo no contiene el nombre divino ni un título cristológico.
