    issue: «peleó» es menos adecuado que «combatió» para וַיִּלָּחֶם en este contexto.
    rationale: Aunque «peleó» no es incorrecto semánticamente, tiene un matiz más cotidiano/coloquial en español. Dado el contexto de enfrentamiento militar y el tono buscado por el proyecto, «combatió» preserva mejor la dignidad narrativa sin alejarse del hebreo.
  - severity: low
    issue: «Así,» al inicio resulta algo rígido en español narrativo bíblico.
    rationale: El inglés «So» puede verterse de varias maneras. En esta clase de secuencia narrativa, «Entonces» suele sonar más natural y menos calcado en español que «Así». No cambia el sentido, pero mejora la fluidez.
  revised_spanish_text: Entonces, Gaal salió[a] delante de los líderes de Siquem y combatió contra Abimélec.
  revised_footnotes:
