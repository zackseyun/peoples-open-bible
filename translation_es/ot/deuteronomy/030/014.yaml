translation:
  language: es
  text: Porque la palabra está muy cerca de ti[a], en tu boca y en tu corazón, para que la hagas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el asunto» o «el mandamiento». El hebreo דָּבָר puede referirse a una palabra, un asunto o un mandato, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la afirmación anterior; «Porque» conserva la relación lógica de causa o fundamento de manera natural en español.
- source_word: קָרוֹב
  english_pob_choice: near
  chosen_spanish: está muy cerca
  alternatives_spanish:
  - está cerca
  - está a la mano
  lexicon: HALOT
  rationale: El adjetivo expresa proximidad; en español conviene verbalizarlo como estado («está cerca») para una lectura fluida, manteniendo la intensidad con «muy».
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - el mandamiento
  - la cosa
  lexicon: HALOT
  rationale: Dָּבָר puede significar palabra, asunto o mandato. Aquí se conserva la forma más directa y amplia con «la palabra», sin estrechar indebidamente el alcance del hebreo.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - en gran manera
  lexicon: HALOT
  rationale: Intensifica la cercanía; «muy» es el equivalente natural y claro en español contemporáneo.
- source_word: בְּפִיךָ
  english_pob_choice: in your mouth
  chosen_spanish: en tu boca
  alternatives_spanish:
  - en tus labios
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal directa del hebreo. «Boca» es más literal que «labios» y conserva mejor el paralelismo con «corazón».
- source_word: וּבִלְבָבְךָ
  english_pob_choice: and in your heart
  chosen_spanish: y en tu corazón
  alternatives_spanish:
  - y en tu mente
  - y en tu interior
  lexicon: HALOT
  rationale: לֵבָב designa el centro interior de pensamiento y voluntad, pero «corazón» es la forma más fiel, tradicional e inteligible en español, preservando el paralelismo boca/corazón.
- source_word: לַעֲשֹׂתוֹ
  english_pob_choice: so that you may do it
  chosen_spanish: para que la cumplas
  alternatives_spanish:
  - para que la hagas
  - para hacerla
  - a fin de que la hagas
  lexicon: HALOT
  rationale: El infinitivo con ל expresa propósito. Se eligió «cumplirla» porque, en contexto de instrucción divina, comunica bien la idea de obediencia activa sin reducir el referente a mera ejecución mecánica; el femenino concuerda con «la palabra».
theological_decisions:
- issue: Referente de דָּבָר en este versículo
  english_pob_reading: Rendered generically as 'the word' without narrowing it to 'commandment' in the main text.
  chosen_spanish_reading: Se traduce de manera amplia como «la palabra», sin limitarla a «el mandamiento».
  alternative_spanish_readings:
  - el asunto
  - el mandamiento
  rationale: El contexto inmediato habla de la instrucción de Yahvé, pero el sustantivo hebreo es más amplio. Mantener «la palabra» preserva esa amplitud y la tensión semántica documentada por el audit trail.
  doctrine_reference: Principio de primacía del idioma original; conservar amplitud semántica cuando el contexto no obliga a una restricción.
translation_notes:
  revision_awareness: El borrador sigue el pasaje fuente sin cambios de revisión pendientes; coincide sustancialmente con el audit trail inglés, manteniendo la amplitud semántica de דָּבָר y la estructura boca/corazón/obediencia.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología base del proyecto cuando el contexto refiere al discurso divino previo.
  - Se mantuvo un registro natural y publicable en español, evitando calcos innecesarios.
  - El pronombre implícito en «la cumplas» corresponde a «la palabra» y preserva la concordancia de género con la elección léxica principal.
