revisions:
- from: Sálvanos[a], Yahvé, nuestro Dios, y recógenos[b] de entre las naciones, para que demos gracias a tu santo nombre y nos gloriemos en tu alabanza.
  to: Sálvanos[a], Yahvé, nuestro Dios, y reúnenos de entre las naciones, para que demos gracias a tu santo nombre y nos gloriemos[b] en tu alabanza.
  rationale: Se cambia «recógenos» por «reúnenos» para representar más naturalmente el hebreo קבץ en contexto de reunión del pueblo disperso. Se reubica la nota [b] sobre «nos gloriemos», porque sus alternativas pertenecen a לְהִשְׁתַּבֵּחַ, no al verbo de reunir. El resto del verso se mantiene por ser fiel al hebreo, a la auditoría inglesa y al estilo español del proyecto.
