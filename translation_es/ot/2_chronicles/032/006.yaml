translation:
  language: es
  text: 'Y designó comandantes militares sobre el pueblo, y los reunió consigo en la plaza de la puerta de la ciudad, y les habló al corazón[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''habló a sus corazones'', un modismo para hablar de manera que anima o fortalece.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: appointed
  chosen_spanish: puso
  alternatives_spanish:
  - nombró
  - designó
  - estableció
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'dio/puso', pero en este contexto administrativo de colocar oficiales sobre el pueblo la idea es asignar una función. 'Puso' conserva la literalidad básica del verbo y, junto con el complemento 'capitanes de guerra sobre el pueblo', expresa la instalación en cargo sin añadir un matiz más interpretativo que 'nombró'.
- source_word: שָׂרֵי מִלְחָמוֹת
  english_pob_choice: military commanders
  chosen_spanish: capitanes de guerra
  alternatives_spanish:
  - comandantes militares
  - jefes de guerra
  - oficiales de guerra
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'príncipes/oficiales de guerras'. 'Capitanes de guerra' mantiene el sabor semítica y la fuerza léxica, y sigue siendo comprensible en español bíblico. 'Comandantes militares' sería más idiomático, pero suaviza el eco del original.
- source_word: עַל הָעָם
  english_pob_choice: over the people
  chosen_spanish: sobre el pueblo
  alternatives_spanish:
  - encima del pueblo
  - para el pueblo
  lexicon: HALOT
  rationale: La preposición עַל con lenguaje de nombramiento indica autoridad u oversight. 'Sobre el pueblo' reproduce bien esa relación de autoridad.
- source_word: וַיִּקְבְּצֵם אֵלָיו
  english_pob_choice: gathered them to himself
  chosen_spanish: los reunió consigo
  alternatives_spanish:
  - los congregó junto a él
  - los juntó a él
  lexicon: HALOT
  rationale: '''Reunió'' expresa קבץ de manera natural. ''Consigo'' refleja אֵלָיו y conserva la idea de convocatoria personal del rey.'
- source_word: אֶל רְחוֹב שַׁעַר הָעִיר
  english_pob_choice: in the square at the city gate
  chosen_spanish: en la plaza de la puerta de la ciudad
  alternatives_spanish:
  - en el ancho espacio de la puerta de la ciudad
  - en la explanada de la puerta de la ciudad
  - en el atrio de la puerta de la ciudad
  lexicon: HALOT
  rationale: רְחוֹב designa un espacio abierto o plaza. 'Plaza de la puerta de la ciudad' comunica bien el lugar público sin cargarlo de tecnicismos.
- source_word: וַיְדַבֵּר עַל לְבָבָם
  english_pob_choice: spoke to their hearts
  chosen_spanish: habló a su corazón
  alternatives_spanish:
  - habló a sus corazones
  - les habló al corazón
  - les habló de modo que los animara
  lexicon: HALOT
  rationale: El hebreo es un modismo. En español, 'habló a su corazón' preserva la imagen interna del original; el singular colectivo 'su' reproduce el plural hebreo de forma natural en español. La opción 'les habló al corazón' es más idiomática, pero pierde parte de la metáfora.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'para decir:'
  lexicon: HALOT
  rationale: Es la introducción estándar de discurso directo. 'Diciendo:' enlaza de forma fluida con la cita que sigue.
theological_decisions:
- issue: Sentido del modismo 'habló a su corazón'
  english_pob_reading: Hebrew 'spoke to their hearts,' an idiom for speaking in a way that encourages or strengthens them.
  chosen_spanish_reading: 'Modismo hebreo conservado: ''habló a su corazón'', entendido como hablar de manera que anima o fortalece.'
  alternative_spanish_readings:
  - les habló para animarlos
  - les habló alentadoramente
  - les habló al corazón
  rationale: El texto no solo informa contenido, sino una manera de hablar con efecto interno. Mantener la metáfora evita borrar la tensión entre literalidad e idiomatismo, y permite que la nota explique el valor exhortativo del hebreo.
  doctrine_reference: Uso idiomático del lenguaje bíblico; no doctrinal.
translation_notes:
  revision_awareness: El control de revisiones indica que no se requirieron cambios en el texto inglés auditado; esta versión española sigue de cerca esa lectura y conserva el único punto idiomático señalado en la nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no lo contiene.
  - '''Capitanes de guerra'' conserva el registro bíblico y evita una modernización excesiva.'
  - '''Plaza de la puerta de la ciudad'' sigue la solución espacial del POB en inglés, con sintaxis natural en español.'
  - La nota marca el único modismo significativo del versículo para no perder la imagen hebrea.
