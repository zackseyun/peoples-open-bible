translation:
  language: es
  text: Porque, así como tú, como un techo firmemente establecido sobre el pilar de los hijos[a], valerosamente soportaste el terremoto por las torturas, sin vacilar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los hijos varones». El griego παῖδες puede significar «hijos», «niños» o «muchachos», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: For just as
  chosen_spanish: Porque, así como
  alternatives_spanish:
  - justo como
  - pues, así como
  lexicon: LSJ
  rationale: Conserva el valor comparativo y el enlace lógico. En español, "porque, así como" reproduce de manera natural el arranque explicativo-comparativo del griego sin volverlo más interpretativo de lo que permite la fuente.
- source_word: στέγη
  english_pob_choice: roof
  chosen_spanish: techo
  alternatives_spanish:
  - cubierta
  - refugio
  lexicon: LSJ
  rationale: El término es arquitectónico y metafórico. "Techo" es el equivalente más claro en español para mantener la imagen de protección estructural; "cubierta" o "refugio" suavizarían la concreción de la metáfora.
- source_word: στύλου
  english_pob_choice: pillar
  chosen_spanish: pilar
  alternatives_spanish:
  - columna
  - soporte
  lexicon: LSJ
  rationale: '"Pilar" conserva la imagen de apoyo estructural y suena natural en español. "Columna" también sería posible, pero "pilar" encaja mejor con la metáfora de sostén.'
- source_word: τῶν παίδων
  english_pob_choice: of the children
  chosen_spanish: de los hijos
  alternatives_spanish:
  - de los niños
  - de los muchachos
  - de los hijos varones
  lexicon: LSJ
  rationale: Aunque παῖδες puede significar "hijos", "niños" o "muchachos", el contexto narrativo se refiere a los hijos de la madre mártir. "Hijos" preserva ese vínculo familiar y evita una generalización demasiado amplia como "niños".
- source_word: γενναίως
  english_pob_choice: bravely
  chosen_spanish: valerosamente
  alternatives_spanish:
  - con valentía
  - noblemente
  lexicon: LSJ
  rationale: El adverbio combina coraje y nobleza. "Valerosamente" mantiene el registro elevado y el matiz de fortaleza ante el sufrimiento.
- source_word: ἱδρυμένη
  english_pob_choice: firmly established
  chosen_spanish: firmemente establecido
  alternatives_spanish:
  - firmemente fundada
  - asentado con firmeza
  lexicon: LSJ
  rationale: La forma participial expresa estar asentado o fijado con estabilidad. "Firmemente establecido" conserva la idea de permanencia estructural dentro de la metáfora arquitectónica.
- source_word: ἀκλινῶς
  english_pob_choice: without wavering
  chosen_spanish: sin vacilar
  alternatives_spanish:
  - sin inclinarte
  - sin desviarte
  - sin ceder
  lexicon: LSJ
  rationale: Literalmente significa no inclinarse o no ceder; en contexto describe firmeza bajo presión. "Sin vacilar" comunica bien esa estabilidad en español contemporáneo sin perder la idea de no ser desviado.
- source_word: ὑπήνεγκας
  english_pob_choice: bore
  chosen_spanish: soportaste
  alternatives_spanish:
  - sobrellevaste
  - resististe
  - sostuviste
  lexicon: LSJ
  rationale: El verbo significa llevar sobre sí, soportar o resistir. "Soportaste" es natural y fuerte en español; evita reducir el verbo a mera pasividad.
- source_word: διὰ τῶν βασάνων
  english_pob_choice: through tortures
  chosen_spanish: por medio de los tormentos
  alternatives_spanish:
  - a través de los tormentos
  - mediante los tormentos
  - por los tormentos
  lexicon: LSJ
  rationale: La preposición indica medio o agencia. "Por medio de los tormentos" explicita que la conmoción metafórica llega mediante el sufrimiento infligido. Se prefiere "tormentos" por su amplitud en español y su adecuación al contexto martirial.
- source_word: σεισμόν
  english_pob_choice: earthquake
  chosen_spanish: terremoto
  alternatives_spanish:
  - sacudida
  - convulsión
  lexicon: LSJ
  rationale: El sentido literal es un sismo/earthquake. "Terremoto" preserva la fuerza de la metáfora y su carácter físico; "sacudida" sería más general y menos vívida.
theological_decisions:
- issue: Conservación de la metáfora arquitectónica y sísmica para la madre mártir
  english_pob_reading: Retain the architectural metaphor ('roof,' 'pillar,' 'earthquake') rather than interpret it away
  chosen_spanish_reading: Mantener la metáfora de "techo", "pilar" y "terremoto" sin convertirla en una paráfrasis explicativa
  alternative_spanish_readings:
  - '"como una protección firme sobre sus hijos, soportaste con valentía sus torturas"'
  - '"como un amparo establecido firmemente sobre el sostén de sus hijos"'
  rationale: La imagen griega es compacta y deliberadamente figurada. En español conviene conservarla para no borrar la intensidad retórica ni el retrato de la madre como sostén estable frente a la violencia.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Valor de τῶν παίδων en contexto
  english_pob_reading: '''the children'''
  chosen_spanish_reading: '"los hijos"'
  alternative_spanish_readings:
  - '"los niños"'
  - '"los muchachos"'
  - '"los hijos varones"'
  rationale: El contexto inmediato apunta a sus hijos varones, pero el término griego es más amplio. "Los hijos" conserva el vínculo familiar y evita restringir innecesariamente el alcance léxico.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés al preferir una relación más directa para διὰ τῶν βασάνων ('por medio de los tormentos') y mantiene el registro formal y la metáfora arquitectónica del original. También toma en cuenta la observación de la revisión crítica sobre la ambigüedad de παῖδες, preservándola en nota.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto fuente lo requiera; aquí no aplica.
  - '"Mesías"/"Cristo" no aparecen en este versículo.'
  - Se mantiene el orden comparativo-retórico del griego sin convertirlo en una frase expositiva moderna.
  - '"Tormentos" y no "pruebas" para conservar el contexto martirial.'
  - La puntuación española separa claramente la comparación inicial y el cierre adverbial "sin vacilar".
