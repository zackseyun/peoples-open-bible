  text: Then the king’s scribes were summoned at that time[a], in the third month, that is, the month of Sivan, on its twenty-third day; and it was written according to all that Mordecai commanded, to the Jews and to the satraps, the governors, and the officials of the provinces from India to Cush, one hundred and twenty-seven provinces, to each province in its own script, to each people in its own language[b], and to the Jews in their own script and in their own language.
  footnotes:
