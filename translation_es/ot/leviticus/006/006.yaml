lexical_decisions:
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  lexicon: HALOT
  rationale: El sustantivo básico es literal y concreto. En español, «fuego» es el equivalente más natural y directo para este contexto cultual; «llama» sería posible, pero es menos exacto para el valor general del término.
- source_word: תָּמִיד
  english_pob_choice: continual
  chosen_spanish: continuo
  alternatives_spanish:
  - perpetuo
  - constante
  - continuamente
  lexicon: HALOT
  rationale: El hebreo expresa continuidad sostenida. «Continuo» funciona bien como adjetivo de «fuego» y conserva la idea de permanencia sin volver el texto innecesariamente pesado.
- source_word: תּוּקַד
  english_pob_choice: shall be kept burning
  chosen_spanish: arderá
  alternatives_spanish:
  - será mantenido ardiendo
  - será mantenido encendido
  - arderá continuamente
  lexicon: HALOT
  rationale: La forma hophal implica que el fuego debe permanecer en estado de combustión por disposición prescrita. En español, «arderá» transmite el estado resultante con naturalidad; la obligación de mantenimiento queda apoyada por el contexto y por «continuo».
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  lexicon: HALOT
  rationale: «Sobre» reproduce con precisión la relación espacial del hebreo y es idiomático en español bíblico contemporáneo.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: El equivalente cultual directo en español es «altar», conservando el artículo definido del texto hebreo.
- source_word: לֹא תִכְבֶה
  english_pob_choice: it shall not go out
  chosen_spanish: no se apagará
  alternatives_spanish:
  - no se extinguirá
  - no se querrá apagar
  lexicon: HALOT
  rationale: El verbo describe apagarse/extinguirse. «No se apagará» es la forma más natural y clara en español; mantiene el sentido intransitivo sin sobrecargarlo con una expresión más técnica.
theological_decisions:
- issue: Duración prescrita del fuego del altar
  english_pob_reading: A continual fire shall be kept burning on the altar; it shall not go out.
  chosen_spanish_reading: Un fuego continuo arderá sobre el altar; no se apagará.
  alternative_spanish_readings:
  - Un fuego perpetuo arderá sobre el altar; no se apagará.
  - Un fuego continuo será mantenido ardiendo sobre el altar; no se apagará.
  rationale: El versículo establece una norma ritual de permanencia. «Continuo» comunica bien la continuidad requerida sin introducir una carga teológica adicional. La redacción evita suavizar la obligación cultual y conserva la fuerza normativa del hebreo.
  doctrine_reference: Levítico 6:6; cf. la continuidad del culto sacrificial en el contexto levítico.
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y ninguna revisión aplicada; la presente redacción sigue de cerca el sentido auditado, adaptándolo a un español natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se prefirió «fuego» en vez de una paráfrasis como «llama», porque el término hebreo es el sustantivo básico y el contexto sacrificial favorece la literalidad.
  - Se usó «no se apagará» para mantener el valor verbal de apagarse/extinguirse sin introducir un giro más interpretativo.
  - «Continuo» se eligió como adjetivo natural en español para תָּמִיד; «perpetuo» queda como alternativa válida si se desea un registro más solemne.
