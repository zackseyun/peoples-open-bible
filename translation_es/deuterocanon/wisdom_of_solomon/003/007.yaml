review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego y el rastro del POB inglés: «en el tiempo de su visitación» preserva la amplitud de ἐπισκοπῆς, «resplandecerán» expresa bien ἀναλάμψουσιν, y la imagen de las «chispas» que se mueven rápidamente a través de materia combustible está bien mantenida. Sin embargo, «correrán como chispas entre la paja» debilita ligeramente la fuerza de διαδραμοῦνται + ἐν καλάμῃ, que describe más específicamente un desplazamiento rápido a través de rastrojo/hojarasca seca que un simple correr ‘entre’ paja.'
  spanish_quality_summary: El español es claro y digno, pero admite una mejora menor de naturalidad e imagen. «Visitación» es aceptable en registro bíblico y está bien sostenido por la nota. La principal mejora es sustituir «entre la paja» por «por el rastrojo», que en español bíblico-literario comunica mejor la combustibilidad de καλάμη y hace más vívida la trayectoria de las chispas. También conviene ajustar la nota para reflejar esa elección principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías/Cristo, Espíritu, etc. La decisión de mantener «visitación» concuerda con el razonamiento teológico documentado en inglés.
  issues:
  - severity: medium
    issue: «paja» no refleja tan bien καλάμῃ como «rastrojo»
    rationale: El expediente inglés escogió «stubble» específicamente, con alternativas «dry straw» o «reeds». En español, «paja» puede sonar más a material ya cortado o amontonado, mientras que «rastrojo» representa mejor el campo de tallos secos por donde corre el fuego.
  - severity: low
    issue: «entre» atenúa el sentido dinámico de διαδραμοῦνται
    rationale: El verbo sugiere correr o pasar rápidamente a través de un espacio. «Por el rastrojo» o «a través del rastrojo» hace más visible el movimiento del símil sin sobretraducir.
  revised_spanish_text: y en el tiempo de su visitación[a] resplandecerán, y correrán como chispas por el rastrojo[b];
  revised_footnotes:
  - marker: a
    text: O «cuando sean visitados», es decir, cuando Dios intervenga para inspeccionar, juzgar o vindicar.
    reason: lexical_alternative
  - marker: b
    text: O «como chispas por la paja seca» o «entre las cañas»; la imagen griega es la de fuego que avanza con rapidez por materia combustible.
    reason: lexical_alternative
  revision_rationale: 'La revisión es pequeña y no doctrinal: conserva la amplitud de «visitación», pero alinea mejor la imagen final con καλάμη como rastrojo/tallos secos y con el movimiento rápido de διαδραμοῦνται.'
