    text: 'Hebreo: «nadie lo pone sobre el corazón», un modismo que significa «nadie lo toma a pecho» o «nadie le presta atención seria».'
    reason: lexical_alternative
  - marker: c
    text: Hebreo «la tierra/el país». Aquí se traduce «país» porque el contexto probablemente se refiere al territorio devastado de Judá, no a toda la tierra en sentido mundial.
    reason: alternative_reading
  revision_rationale: Se ajusta אֶרֶץ a «país» para preservar mejor el referente territorial contextual y evitar una lectura cósmica de «toda la tierra». En consecuencia, se armonizan los pronombres y el adjetivo («desolado», «lo», «ha sido devastado») con «país», y se corrige la nota correspondiente para reflejar con precisión la decisión léxica auditada.
