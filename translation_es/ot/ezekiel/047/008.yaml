base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/047/008.yaml
  text: Then he said to me[a], “These waters flow out toward the eastern region and go down into the Arabah; then they enter the sea. When they are emptied into the sea[c][b], the waters are healed.”
  footnotes:
  - marker: a
    text: Or 'the Dead Sea.' The Hebrew expression is difficult and is commonly understood as referring to the salt sea east of Judah.
    reason: alternative_reading
  - marker: b
    text: Or 'the waters become fresh.' The Hebrew says literally, 'the waters are healed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the sea of stagnant waters'.
    reason: previous_rendering
