revisions:
- from: 'Ahora Elías estaba sentado en su casa[a], y los ancianos estaban sentados con él. Y el rey había enviado a un hombre de delante de él, pero antes de que llegara el mensajero a él, dijo a los ancianos: «¿Ven cómo este hijo de un asesino ha enviado para quitarme la cabeza? Miren, cuando llegue el mensajero, cierren la puerta y apérchenlo contra la puerta[b]. ¿No es el sonido de los pasos de su señor detrás de él?»'
  to: 'Ahora Eliseo estaba sentado en su casa, y los ancianos estaban sentados con él. Y el rey había enviado a un hombre desde su presencia, pero antes de que el mensajero llegara a él, dijo a los ancianos: «¿Ven cómo este hijo de un asesino ha enviado a alguien para quitarme la cabeza[a]? Miren, cuando llegue el mensajero, cierren la puerta y empújenlo hacia atrás en la puerta[b]. ¿No es el sonido de los pasos de su señor detrás de él?»'
  rationale: Se corrigió el nombre propio a “Eliseo” para ajustarlo al hebreo. Se movió la nota [a] a la frase que realmente explica el modismo de decapitación. Se reemplazó “apérchenlo contra la puerta” por “empújenlo hacia atrás en la puerta” para preservar la fuerza de לחץ con un español claro y neutral. También se mejoró “de delante de él” a “desde su presencia” para evitar un calco duro, manteniendo el matiz de procedencia real. Se añadió “a alguien” después de “ha enviado” para que el español suene completo e idiomático sin alterar el sentido implícito del hebreo.
