translation:
  language: es
  text: 'Pero Guesur y Aram tomaron de ellos las aldeas de Jair[a], junto con Quenat y sus ciudades hijas[b]: sesenta ciudades. Todos estos eran los hijos de Maquir[c], padre de Galaad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Havot-jair”, nombre de lugar que significa “aldeas de tiendas de Jair” o “campamentos de Jair”.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “sus hijas”, un modismo para asentamientos dependientes alrededor de una ciudad principal.
    reason: cultural_note
  - marker: c
    text: “Hijos de Maquir” puede significar descendientes o miembros del clan, no necesariamente hijos inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - capturaron
  - se apoderaron de
  lexicon: HALOT
  rationale: El verbo hebreo expresa toma o adquisición de posesión; en español, el plural concuerda naturalmente con el sujeto compuesto 'Guesur y Aram'. 'Tomaron' conserva amplitud sin sobreespecificar violencia o matiz militar.
- source_word: גְּשׁוּר וַאֲרָם
  english_pob_choice: Geshur and Aram
  chosen_spanish: Guesur y Aram
  alternatives_spanish:
  - los gesureos y Aram
  - Guesur y Siria
  lexicon: HALOT
  rationale: Son nombres propios y se transliteran. 'Aram' se conserva para reflejar directamente el nombre hebreo, en lugar de sustituirlo por 'Siria'.
- source_word: חַוֺּת יָאִיר
  english_pob_choice: the villages of Jair
  chosen_spanish: las aldeas de Jair
  alternatives_spanish:
  - Havut-Jair
  - las aldeas-tienda de Jair
  lexicon: HALOT
  rationale: El hebreo es un topónimo conocido cuya forma literal alude a 'aldeas/aldeas-tienda'. 'Aldeas de Jair' mantiene la referencia geográfica y es natural en español; se deja la alternativa transliterada en nota.
- source_word: מֵאִתָּם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de su posesión
  - de entre ellos
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal indica extracción o remoción desde el grupo mencionado. 'De ellos' es la forma más directa y transparente en español; el contexto ya sugiere desposesión territorial.
- source_word: קְנָת
  english_pob_choice: Kenath
  chosen_spanish: Quenat
  alternatives_spanish:
  - Quená
  - Kenat
  lexicon: HALOT
  rationale: Topónimo propio transliterado conforme a uso español corriente, conservando la forma del nombre hebreo.
- source_word: בְּנֹתֶיהָ
  english_pob_choice: its daughter towns
  chosen_spanish: sus ciudades hijas
  alternatives_spanish:
  - sus aldeas dependientes
  - sus poblados hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus hijas', una metáfora urbana para asentamientos dependientes. 'Ciudades hijas' preserva la imagen y es comprensible en español bíblico; se evita normalizarla a 'aldeas' para no borrar la metáfora documentada.
- source_word: שִׁשִּׁים עִיר
  english_pob_choice: sixty cities
  chosen_spanish: sesenta ciudades
  alternatives_spanish:
  - sesenta poblados
  - sesenta urbes
  lexicon: HALOT
  rationale: '''Ciudades'' corresponde al sustantivo singular/plural hebreo para asentamientos y sigue de cerca el recuento total dado por el texto.'
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todas estas
  - Todo esto
  lexicon: HALOT
  rationale: La expresión es ambigua respecto a si apunta a lugares o a linaje. 'Todos estos' preserva esa amplitud sin resolver prematuramente el referente.
- source_word: בְּנֵי מָכִיר
  english_pob_choice: the sons of Machir
  chosen_spanish: los hijos de Maquir
  alternatives_spanish:
  - los descendientes de Maquir
  - la casa de Maquir
  lexicon: HALOT
  rationale: Se conserva la formulación genealógica literal. En español, 'hijos de' mantiene la posible amplitud de clan o descendencia que el contexto puede implicar.
- source_word: אֲבִי גִלְעָד
  english_pob_choice: the father of Gilead
  chosen_spanish: padre de Galaad
  alternatives_spanish:
  - antepasado de Galaad
  - fundador de Galaad
  lexicon: HALOT
  rationale: La expresión hebrea usa el idiomático 'padre de' con sentido de progenitor o antecesor. 'Padre de Galaad' conserva el giro semítico y permite la lectura genealógica amplia.
theological_decisions:
- issue: Alcance genealógico de 'los hijos de Maquir'
  english_pob_reading: '''Sons of Machir'' may mean descendants or clan members, not necessarily immediate sons.'
  chosen_spanish_reading: '''Los hijos de Maquir'' puede entenderse como descendientes o miembros del clan, no necesariamente hijos inmediatos.'
  alternative_spanish_readings:
  - '''los descendientes de Maquir'''
  - '''la casa de Maquir'''
  rationale: El contexto de asentamientos y linaje sugiere una designación clánica amplia. La traducción literal mantiene la ambigüedad documentada y no la estrecha indebidamente.
  doctrine_reference: Uso genealógico/clánico del lenguaje familiar en genealogías bíblicas.
- issue: Sentido de 'padre de Galaad'
  english_pob_reading: '''father of Gilead'' can denote progenitor or founder.'
  chosen_spanish_reading: '''Padre de Galaad'' conserva el idiomático hebreo con posible sentido de progenitor o fundador.'
  alternative_spanish_readings:
  - '''antepasado de Galaad'''
  - '''fundador de Galaad'''
  rationale: La frase hebrea no exige paternidad biológica inmediata; en español conviene mantener la fórmula tradicional y dejar abierta la relación exacta según el uso genealógico-semítico.
  doctrine_reference: Idiomatismo genealógico del hebreo bíblico.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la lectura auditada en inglés, sin cambios sustantivos respecto del análisis previo. Se conserva la ambigüedad genealógica y toponímica documentada, y se adapta el registro al español bíblico moderno.
  spanish_consistency_notes:
  - Se translitera Geshur/Aram como Guesur/Aram para claridad editorial en español.
  - Se evita reemplazar sistemáticamente la metáfora de 'hijas' por una interpretación plana, manteniendo la imagen urbana del hebreo.
  - '''Padre de Galaad'' se conserva como giro genealógico idiomático, no como afirmación de paternidad inmediata.'
