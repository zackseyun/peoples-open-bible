translation:
  language: es
  text: Porque Yahvé tu Dios es fuego consumidor, un Dios celoso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “un Dios celante”. El hebreo enfatiza el reclamo exclusivo de Yahvé sobre su pueblo dentro del pacto, especialmente en el contexto de la idolatría.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la advertencia anterior; ‘Porque’ conserva la relación explicativa en español de forma natural y directa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino según la convención del proyecto, manteniendo la transliteración del Tetragrámaton en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: El sufijo de 2ª persona masculina singular indica posesión directa y pacto con el oyente; ‘tu Dios’ comunica con claridad esa relación.
- source_word: אֵשׁ אֹכְלָה
  english_pob_choice: a consuming fire
  chosen_spanish: fuego consumidor
  alternatives_spanish:
  - fuego devorador
  - fuego que consume
  lexicon: HALOT
  rationale: La imagen nominal participa de fuerza predicativa; ‘fuego consumidor’ conserva la metáfora y el valor caracterizador sin añadir explicación excesiva.
- source_word: הוּא
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - él es
  lexicon: HALOT
  rationale: El pronombre independiente enfatiza la afirmación, pero en español la cópula ‘es’ ya expresa naturalmente la predicación sin repetir el sujeto.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - El Fuerte
  - Dios poderoso
  lexicon: HALOT
  rationale: Aquí funciona como título divino en aposición; ‘Dios’ es la equivalencia más clara y sobria en español.
- source_word: קַנָּא
  english_pob_choice: jealous
  chosen_spanish: celoso
  alternatives_spanish:
  - celoso en extremo
  - celoso por su pacto
  - zeloso
  lexicon: HALOT
  rationale: ‘Celoso’ preserva la tensión teológica de la exclusividad de pacto y la repulsión ante la idolatría; no se suaviza con ‘celoso’ en el sentido meramente emocional porque el contexto bíblico da al término un valor covenantal.
theological_decisions:
- issue: La 'celosía' divina y la exclusividad de pacto
  english_pob_reading: a jealous God
  chosen_spanish_reading: Dios celoso
  alternative_spanish_readings:
  - Dios celoso de su pueblo
  - Dios celoso en el pacto
  - Dios celoso/zeloso
  rationale: 'La expresión mantiene la fuerza del hebreo y su carga relacional: Yahvé reclama devoción exclusiva y rechaza la idolatría. Se conserva la tensión teológica en vez de resolverla o suavizarla.'
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés está en alto acuerdo y no muestra revisiones aplicadas. La versión española sigue de cerca las decisiones lexicográficas ya aprobadas: nombre divino como Yahvé, posesivo singular, imagen de fuego consumidor y ‘celoso’ para קַנָּא, sin introducir suavizaciones doctrinales.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma principal para יְהוָה, coherente con el estándar del proyecto.
  - ‘tu Dios’ conserva el singular de pacto del hebreo.
  - ‘fuego consumidor’ reproduce la imagen verbal sin convertirla en paráfrasis explicativa.
  - ‘Dios celoso’ preserva el término teológicamente tenso sin sustituirlo por ‘zeloso’, que en español sería menos transparente.
