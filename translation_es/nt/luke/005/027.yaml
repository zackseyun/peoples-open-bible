translation:
  language: es
  text: 'Y después de estas cosas salió y vio a un recaudador de impuestos[a] llamado Leví, sentado en el puesto de cobro[b], y le dijo: «Sígueme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «notó» o «miró con atención»; el verbo griego puede implicar más que una simple mirada pasajera.
    reason: lexical_alternative
  - marker: b
    text: O «en la caseta de cobro» o «en la estación de aduanas/impuestos».
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ ταῦτα
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de esto
  - luego de esto
  lexicon: BDAG
  rationale: La expresión mantiene la transición narrativa explícita y refleja el plural del demostrativo, como en el inglés POB. 'Después de estas cosas' suena natural en español bíblico contemporáneo y conserva el orden temporal sin suavizarlo en exceso.
- source_word: ἐξῆλθεν
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue afuera
  - se fue
  lexicon: BDAG
  rationale: '''Salió'' preserva el movimiento concreto del verbo sin añadir matices interpretativos. En español es una equivalencia natural y fiel al aoristo de ἐξέρχομαι.'
- source_word: ἐθεάσατο
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  - notó
  lexicon: BDAG
  rationale: El verbo puede sugerir una mirada atenta, pero en este contexto narrativo 'vio' es la opción más clara y no exagera la fuerza del término. Se conserva la acción básica sin perder la posible atención implícita.
- source_word: τελώνην
  english_pob_choice: tax collector
  chosen_spanish: recaudador de impuestos
  alternatives_spanish:
  - cobrador de impuestos
  - publicano
  - recaudador
  lexicon: BDAG
  rationale: '''Recaudador de impuestos'' comunica bien el oficio y evita el término tradicional ''publicano'', que en español puede sonar eclesiástico o menos transparente para lectores modernos. Mantiene la fuerza social y histórica del término griego.'
- source_word: ὀνόματι Λευὶν
  english_pob_choice: named Levi
  chosen_spanish: llamado Leví
  alternatives_spanish:
  - de nombre Leví
  - llamado de nombre Leví
  lexicon: BDAG
  rationale: La construcción idiomática en español se expresa con naturalidad como 'llamado Leví'. Conserva el dato identificador sin sonar forzada.
- source_word: καθήμενον
  english_pob_choice: sitting
  chosen_spanish: sentado
  alternatives_spanish:
  - estando sentado
  - sentado allí
  lexicon: BDAG
  rationale: '''Sentado'' refleja bien el participio presente y la escena fija de Levi en su puesto. Es una forma natural y fiel en español.'
- source_word: ἐπὶ τὸ τελώνιον
  english_pob_choice: at the tax booth
  chosen_spanish: en la mesa de cobro[b]
  alternatives_spanish:
  - en el puesto de impuestos
  - en la caseta de cobro
  - en la oficina de cobros
  lexicon: BDAG
  rationale: El sustantivo τελώνιον designa el lugar de cobro; en español, 'mesa de cobro' puede transmitir el puesto/estación de recaudación de manera viva y comprensible. Se evita fijar una sola imagen demasiado moderna o demasiado técnica, y se conserva la ambigüedad del lugar de cobro con una nota alternativa.
- source_word: Ἀκολούθει μοι
  english_pob_choice: Follow me
  chosen_spanish: Sígueme
  alternatives_spanish:
  - Ven detrás de mí
  - Sigue tras de mí
  lexicon: BDAG
  rationale: El imperativo funciona como llamada directa al discipulado, pero la traducción no lo amplía. 'Sígueme' es la forma más natural y fiel en español, equivalente al inglés POB y al mandato breve del griego.
theological_decisions:
- issue: Alcance del llamado de Jesús en el imperativo
  english_pob_reading: Rendered as a direct call, 'Follow me,' without expanding it into a fuller theological paraphrase.
  chosen_spanish_reading: 'Se traduce como un llamado directo: «Sígueme», sin añadir explicaciones como ''hazte mi discípulo''.'
  alternative_spanish_readings:
  - Hazte mi discípulo
  - Sígueme como mi discípulo
  rationale: El griego Ἀκολούθει μοι basta por sí mismo. En contexto implica discipulado, pero la traducción debe preservar el enunciado breve y su fuerza inmediata sin resolverla mediante paráfrasis doctrinal.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La fuente inglesa del POB y el aparato de revisión muestran acuerdo alto y sin cambios en la última pasada; esta propuesta sigue esa línea, trasladando sus decisiones léxicas al español con ajustes idiomáticos mínimos. No se detectan revisiones aplicadas que obliguen a modificar el sentido base.
  spanish_consistency_notes:
  - Se mantiene «Leví» con acento, según el uso español estándar del nombre bíblico.
  - Se evita «Cristo» porque este versículo no lo contiene.
  - Se evita «SEÑOR» y cualquier sustitución teológica no presente en el texto.
  - La nota de pie [a] conserva la alternativa semántica del verbo de visión sin sobreinterpretarla.
  - La nota [b] refleja la ambigüedad del lugar de recaudación sin fijar una denominación más técnica de lo que permite el griego.
