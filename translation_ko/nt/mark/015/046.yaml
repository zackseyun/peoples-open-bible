  text: καὶ ἀγοράσας ⸀σινδόνα καθελὼν αὐτὸν ἐνείλησεν τῇ σινδόνι καὶ ⸀ἔθηκεν αὐτὸν ἐν ⸀μνημείῳ ὃ ἦν λελατομημένον ἐκ πέτρας, καὶ προσεκύλισεν λίθον ἐπὶ τὴν θύραν τοῦ μνημείου.
base_translation:
  language: en
  yaml_path: translation/nt/mark/015/046.yaml
  text: And after buying a linen cloth[a], he took him down, wrapped him in the linen cloth, and laid him in a tomb that had been cut out of rock[c][b]. Then he rolled a stone against the entrance of the tomb.
  footnotes:
  - marker: a
    text: Or 'linen sheet' or 'burial shroud' for 'linen cloth' (σινδών).
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'hewn out of rock' for 'had been cut out of rock.'
    reason: lexical_alternative
  - marker: c
    text: Or 'against the door of the tomb'; the Greek θύρα can mean 'door' or 'entrance.'
    reason: lexical_alternative
translation:
  language: ko
  text: 요셉이 베 천을 사서, 그분을 내려 베 천으로 싸고, 바위에서 깎아 낸 무덤에 그분을 안치했습니다. 그리고 무덤 입구에 돌을 굴려 놓았습니다.
  philosophy: optimal-equivalence
