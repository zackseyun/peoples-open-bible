translation:
  language: es
  text: Si tomas el manto[a][b] de tu prójimo en prenda, se lo devolverás antes de que se ponga el sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Manto» traduce aquí un término de prenda exterior; también puede entenderse como «capa» o «vestidura exterior».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hasta la venida del sol»; es decir, antes de que se ponga el sol.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: Introduce una ley casuística condicional de manera natural en español. «Si» preserva la estructura legal del hebreo sin endurecer el enunciado.
- source_word: חָבֹל תַּחְבֹּל
  english_pob_choice: you take ... as a pledge
  chosen_spanish: tomas ... en prenda
  alternatives_spanish:
  - tomas ... como prenda
  - tomarás ... en prenda
  lexicon: HALOT
  rationale: La duplicación hebrea intensifica la acción legal de tomar en garantía. «En prenda» expresa bien la noción jurídica y conserva el sentido de un bien retenido como garantía.
- source_word: שַׂלְמַת
  english_pob_choice: cloak
  chosen_spanish: manto
  alternatives_spanish:
  - capa
  - vestidura exterior
  lexicon: HALOT
  rationale: El término hebreo se refiere a una cobertura exterior que protege, especialmente de noche. «Manto» comunica esa función en español bíblico sin limitarse a una prenda genérica.
- source_word: רֵעֶךָ
  english_pob_choice: your neighbor’s
  chosen_spanish: de tu prójimo
  alternatives_spanish:
  - de tu vecino
  - de tu semejante
  lexicon: HALOT
  rationale: «Prójimo» preserva el alcance ético-relacional de רֵעַ en la ley del pacto y suena más natural en español bíblico que «vecino» en este contexto.
- source_word: עַד בֹּא הַשֶּׁמֶשׁ
  english_pob_choice: before the sun sets
  chosen_spanish: antes de que se ponga el sol
  alternatives_spanish:
  - hasta la puesta del sol
  - antes de la puesta del sol
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hasta la venida del sol». En español, «antes de que se ponga el sol» transmite con claridad el valor idiomático de la expresión temporal.
- source_word: תְּשִׁיבֶנּוּ לוֹ
  english_pob_choice: you shall return it to him
  chosen_spanish: se lo devolverás
  alternatives_spanish:
  - se lo restituirás
  - se lo habrás de devolver
  lexicon: HALOT
  rationale: El causativo de שוב implica devolver/restaurar. «Se lo devolverás» es idiomático en español y mantiene el mandato directo del texto legal.
theological_decisions:
- issue: Exigencia ética de la prenda retenida
  english_pob_reading: The law requires the pledged garment be returned before sunset, reflecting concern for humane treatment.
  chosen_spanish_reading: La ley exige devolver la prenda antes de que anochezca, mostrando una preocupación por el trato humano del necesitado.
  alternative_spanish_readings:
  - La ley exige devolver la prenda antes de la puesta del sol.
  - La ley protege al deudor mediante la devolución vespertina de la garantía.
  rationale: No hay una disputa doctrinal, pero sí una carga ética en la ley. La redacción española debe dejar visible que el mandato no es solo técnico-jurídico sino humanitario.
  doctrine_reference: Éxodo 22:26–27 (contexto inmediato)
translation_notes:
  revision_awareness: La fuente hebrea y el audit trail en inglés coinciden con alta concordancia. No se requieren revisiones textuales; la principal tarea es trasladar con naturalidad el valor jurídico de «take in pledge», el matiz de la prenda exterior y el modismo temporal hebreo sin perder precisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto general, pero este versículo no contiene el nombre divino.
  - «Prójimo» se usa para רֵעַ en coherencia con la ley del pacto y con el registro bíblico en español.
  - La combinación de texto principal y notas conserva las alternativas léxicas documentadas sin sobreparafrasear.
