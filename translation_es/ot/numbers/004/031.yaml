  text: וְ/זֹאת֙ מִשְׁמֶ֣רֶת מַשָּׂאָ֔/ם לְ/כָל עֲבֹדָתָ֖/ם בְּ/אֹ֣הֶל מוֹעֵ֑ד קַרְשֵׁי֙ הַ/מִּשְׁכָּ֔ן וּ/בְרִיחָ֖י/ו וְ/עַמּוּדָ֥י/ו וַ/אֲדָנָֽי/ו־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/004/031.yaml
  text: 'And this is the duty of their burden for all their service in the tent of meeting: the frames of the tabernacle[a], its bars, its pillars[c][b], and its bases.'
  footnotes:
  - marker: a
    text: Or 'charge' for 'duty' (מִשְׁמֶרֶת), emphasizing an assigned responsibility.
    reason: lexical_alternative
  - marker: b
    text: Or 'boards of the tabernacle' for 'frames of the tabernacle.' The Hebrew term can denote structural boards/planks; 'frames' is chosen to reflect their architectural function.
    reason: lexical_alternative
  - marker: c
    text: Or 'sockets' for 'bases' (אֲדָנִים), a more technical term for the foundation pieces in the tabernacle structure.
    reason: lexical_alternative
