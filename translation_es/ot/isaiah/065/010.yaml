translation:
  language: es
  text: Sarón se convertirá en un pastizal para los rebaños[a], y el valle de Acor en un lugar de descanso para el ganado[b], para mi pueblo, los que me han buscado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una morada de ovejas» / «un lugar de pastoreo para ovejas».
    reason: lexical_alternative
  - marker: b
    text: El valle de Acor se asocia con un juicio anterior (Jos. 7:24–26); aquí se presenta como un lugar de restauración y seguridad.
    reason: cross_reference
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: will become
  chosen_spanish: se convertirá
  alternatives_spanish:
  - será
  - llegará a ser
  lexicon: HALOT
  rationale: El hebreo en discurso profético expresa futuro resultativo y transformación de estado. «Se convertirá» comunica mejor ese cambio que un simple «será».
- source_word: הַשָּׁרוֹן
  english_pob_choice: Sharon
  chosen_spanish: Sarón
  alternatives_spanish:
  - Sharon
  - la llanura de Sarón
  lexicon: HALOT
  rationale: Es un nombre geográfico propio. Se translitera de forma natural al español bíblico como «Sarón».
- source_word: לִנְוֵה צֹאן
  english_pob_choice: a pasture for flocks
  chosen_spanish: un pastizal para los rebaños
  alternatives_spanish:
  - una morada de ovejas
  - un lugar de pastoreo para ovejas
  - un redil para los rebaños
  lexicon: HALOT
  rationale: נוה puede denotar morada, pasto o lugar de pastoreo. «Pastizal» preserva la imagen pastoral con buen español; «rebaños» es más amplio y natural que restringirlo solo a «ovejas».
- source_word: וְעֵמֶק עָכוֹר
  english_pob_choice: and the Valley of Achor
  chosen_spanish: el valle de Acor
  alternatives_spanish:
  - el Valle de Acor
  - Acor
  lexicon: HALOT
  rationale: עֵמֶק se rinde de forma directa como «valle», y עָכוֹר es un topónimo conservado por transliteración adaptada.
- source_word: לְרֵבֶץ בָּקָר
  english_pob_choice: a resting place for cattle
  chosen_spanish: un lugar de descanso para el ganado
  alternatives_spanish:
  - un sitio para que el ganado se eche
  - un lugar de reposo para el ganado
  - un pastizal para el ganado
  lexicon: HALOT
  rationale: רבץ apunta al acto de echarse o reposar, no solo a pastar. «Lugar de descanso» conserva la idea de reposo seguro; «ganado» traduce bien בָּקָר en español general.
- source_word: לְעַמִּי
  english_pob_choice: for my people
  chosen_spanish: para mi pueblo
  alternatives_spanish:
  - para mi gente
  - en favor de mi pueblo
  lexicon: HALOT
  rationale: El ל aquí expresa beneficio o destino. «Para mi pueblo» es natural y refleja que estos lugares restaurados están destinados al bien del pueblo de Dios.
- source_word: אֲשֶׁר דְּרָשׁוּנִי
  english_pob_choice: who have sought me
  chosen_spanish: que me ha buscado
  alternatives_spanish:
  - que me buscaron
  - que me buscan
  - que me han buscado
  lexicon: HALOT
  rationale: דרש aplicado a Dios suele significar «buscar». El perfecto hebreo identifica al pueblo por esa acción, y «me ha buscado» conserva la referencia definida con una fluidez natural en español.
theological_decisions:
- issue: Alcance de «mi pueblo que me ha buscado»
  english_pob_reading: The phrase refers to the faithful people whom God acknowledges as his own, without specifying a narrower doctrinal subgroup beyond the text.
  chosen_spanish_reading: La frase identifica al pueblo fiel que Dios reconoce como suyo, sin precisar un subgrupo doctrinal más estrecho que el que el texto explicita.
  alternative_spanish_readings:
  - un remanente dentro de Israel
  - todo el Israel restaurado colectivamente
  rationale: El hebreo destaca la restauración para los que buscan a Dios. La traducción mantiene esa tensión teológica sin resolverla artificialmente en una interpretación más específica que el texto no impone.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla de antemano.
translation_notes:
  revision_awareness: El texto sigue el pasaje hebreo de Isaías 65:10 y está alineado con la lectura inglesa POB revisada, que interpreta וְהָיָה como transformación futura, conserva los topónimos y mantiene la tensión teológica sobre «mi pueblo que me ha buscado».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Acor» se conserva como topónimo adaptado de forma consistente.
  - «pastizal» y «lugar de descanso» preservan la imagen pastoral sin forzar una equivalencia literal rígida.
  - Se evita «Cristo»/«Mesías» porque el versículo no contiene ese campo léxico.
