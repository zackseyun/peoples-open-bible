  text: And behold[a], all the men of Israel came to the king and said to the king, “Why have our brothers, the men of Judah, stolen you away and brought the king and his household across the Jordan[b], and all David’s men with him?”
  footnotes:
  - marker: a
    text: Or “taken you secretly” / “stolen you.” The Hebrew uses the ordinary verb for stealing as a metaphor for Judah’s acting without the participation of the other Israelites.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “all the men of Israel” and “the men of Judah,” using masculine collective language for the groups represented.
    reason: cultural_note
