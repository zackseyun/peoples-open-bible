revisions:
- from: Reconoced[a], pues, que no caerá a tierra[b] una palabra de Yahvé que él habló contra la casa de Ahab, y Yahvé ha hecho lo que habló por medio de su siervo Elías.
  to: Sepan, pues, que no caerá a tierra[a] una palabra de Yahvé que Yahvé habló contra la casa de Ahab, y Yahvé ha hecho lo que habló por medio[b] de su siervo Elías.
  rationale: 'Se corrige la referencia explícita del sujeto (''que Yahvé habló'') para ajustarla mejor al hebreo, se reemplaza ''Reconoced'' por ''Sepan'' para un español más neutral y legible, y se reordena el aparato de notas para que refleje el rastro auditado: el modismo ''caerá a tierra'' recibe la nota principal y la frase de agencia ''por medio de'' conserva su alternativa literal.'
