translation:
  language: es
  text: La calvicie ha venido sobre Gaza; Ascalón[a] ha sido silenciada, el remanente del valle de ellos[b]. ¿Hasta cuándo te lacerarás[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Ascalón ha sido cortada» o «ha perecido». El verbo hebreo puede implicar quedar silenciada, inmovilizada o destruida.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el remanente del valle de ellos». Algunos intérpretes, siguiendo antiguas versiones o una vocalización distinta, entienden aquí «el remanente de los anaceos».'
    reason: alternative_reading
  - marker: c
    text: La auto-laceración era un acto de duelo acostumbrado en el antiguo Cercano Oriente.
    reason: cultural_note
lexical_decisions:
- source_word: בָּאָה ... אֶל עַזָּה
  english_pob_choice: has come upon Gaza
  chosen_spanish: ha venido sobre Gaza
  alternatives_spanish:
  - ha venido a Gaza
  - ha llegado sobre Gaza
  lexicon: HALOT
  rationale: La construcción con בוא + אֶל expresa llegada con fuerza contra el lugar. «Ha venido sobre» conserva el matiz ominoso y se ajusta bien al español bíblico contemporáneo sin sonar calcado.
- source_word: קָרְחָה
  english_pob_choice: baldness
  chosen_spanish: calvicie
  alternatives_spanish:
  - desnudez del cráneo
  - rapada
  lexicon: HALOT
  rationale: El sustantivo nombra la calvicie como señal de duelo o desastre. «Calvicie» reproduce la imagen con naturalidad en español y evita convertirla en una orden o acción distinta.
- source_word: נִדְמְתָה
  english_pob_choice: has been silenced
  chosen_spanish: ha sido silenciada
  alternatives_spanish:
  - ha sido cortada
  - ha perecido
  - ha sido destruida
  lexicon: HALOT
  rationale: El nifal de דמה puede expresar quedar silenciado, inmovilizado o destruido. «Ha sido silenciada» preserva el núcleo de quietud/suspensión que la POB inglesa quiso retener, dejando abierta la fuerza de juicio.
- source_word: שְׁאֵרִית
  english_pob_choice: the remnant
  chosen_spanish: el remanente
  alternatives_spanish:
  - el resto
  - los sobrevivientes
  lexicon: HALOT
  rationale: «Remanente» es la equivalencia estable para שְׁאֵרִית en contexto de juicio. Mantiene el valor técnico-bíblico sin sustituirlo por una palabra más genérica.
- source_word: עִמְקָם
  english_pob_choice: their valley
  chosen_spanish: su valle
  alternatives_spanish:
  - su llanura
  - el valle de ellos
  lexicon: HALOT
  rationale: La lectura consonántica apunta naturalmente a עמק con sufijo de 3.ª plural. «Su valle» representa esa base textual sin forzar la frase hacia la lectura alternativa.
- source_word: תִּתְגּוֹדָדִי
  english_pob_choice: will you gash yourself
  chosen_spanish: te harás heridas
  alternatives_spanish:
  - te cortarás
  - te lacerarás
  lexicon: HALOT
  rationale: El hitpolel indica auto-laceración en duelo. En español, «te harás heridas» comunica la acción reflexiva y su función de lamento con un registro legible y menos chocante que una literalidad muy abrupta.
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo?
  alternatives_spanish:
  - ¿Hasta cuándo será esto?
  - ¿Hasta cuándo seguirá?
  lexicon: HALOT
  rationale: Es la fórmula idiomática estándar en español para la pregunta de lamento. Conserva la brevedad y la urgencia del hebreo.
translation_notes:
  revision_awareness: La versión inglesa auditada ya estaba en alta concordancia y no recibió cambios sustantivos en la última revisión; esta propuesta conserva sus decisiones léxicas centrales y solo las expresa en español con ajuste estilístico mínimo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino en el texto hebreo.
  - Se usa «remanente» para שְׁאֵרִית, conforme al uso bíblico técnico.
  - Se evita «SEÑOR» como sustituto, ya que no interviene aquí un tetragrámaton ni una cita de κύριος.
  - Las notas al pie conservan la alternativa textual de «anaceos» porque la ambigüedad existe también en español.
