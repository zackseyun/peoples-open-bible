translation:
  language: es
  text: Roboam tomó por esposa a Mahalat, la hija de Jerimot hijo de David[a], y de Abihail, la hija de Eliab hijo de Jesé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La genealogía hebrea está condensada: literalmente, «Mahalat hijo/hija de Jerimot hijo de David, Abihail hija de Eliab hijo de Jesé». El sentido probable es que Mahalat descendía de ambas líneas; algunos entienden que Abihail es un segundo nombre dentro de la noticia genealógica o, menos probablemente, una segunda esposa.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקַּח לּוֹ ... אִשָּׁה
  english_pob_choice: took as wife
  chosen_spanish: tomó por esposa
  alternatives_spanish:
  - tomó una esposa
  - se casó con
  lexicon: HALOT
  rationale: La expresión hebrea comunica la toma de una mujer como esposa; en español, «tomó por esposa» conserva el valor marital sin sonar demasiado literal ni demasiado interpretativo.
- source_word: מָחֲלַת
  english_pob_choice: Mahalath
  chosen_spanish: Mahalat
  alternatives_spanish:
  - Mahalat
  - Mahalath
  lexicon: Transliteración propia del nombre
  rationale: Se translitera el nombre personal al español; «Mahalat» adapta de forma natural la grafía al uso hispano sin traducir el nombre.
- source_word: בַּת
  english_pob_choice: daughter of
  chosen_spanish: la hija de
  alternatives_spanish:
  - hija de
  - la hija
  lexicon: HALOT
  rationale: El hebreo usa una genealogía condensada; en español, la repetición de «la hija de» hace más claro el parentesco y sigue de cerca la estructura del verso.
- source_word: יְרִימוֹת בֶּן דָּוִיד
  english_pob_choice: Jerimoth son of David
  chosen_spanish: Jerimot hijo de David
  alternatives_spanish:
  - Jerimot, hijo de David
  - Jerimot, el hijo de David
  lexicon: HALOT
  rationale: Se conserva la relación genealógica directa del hebreo con «hijo de»; «Jerimot» mantiene el nombre propio en una forma española legible.
- source_word: אֲבִיהַיִל
  english_pob_choice: Abihail
  chosen_spanish: Abihail
  alternatives_spanish:
  - Abigail
  - Abihail
  lexicon: Transliteración propia del nombre
  rationale: Se conserva el nombre propio tal como aparece en la tradición transliterada; no se identifica con otras formas semejantes para no introducir una equivalencia no sustentada por el texto.
- source_word: אֱלִיאָב בֶּן יִשָׁי
  english_pob_choice: Eliab son of Jesse
  chosen_spanish: Eliab hijo de Jesé
  alternatives_spanish:
  - Eliab, hijo de Jesé
  - Eliab hijo de Jesé
  lexicon: HALOT
  rationale: Se mantiene la genealogía de forma transparente y natural en español, respetando el paralelismo con la primera línea.
theological_decisions:
- issue: Estructura genealógica comprimida y posible ambigüedad sobre Abihail
  english_pob_reading: Mahalath is presented as the daughter of Jerimoth son of David, and of Abihail daughter of Eliab son of Jesse.
  chosen_spanish_reading: Mahalat aparece como la hija de Jerimot hijo de David, y Abihail como la hija de Eliab hijo de Jesé.
  alternative_spanish_readings:
  - Mahalat hija de Jerimot hijo de David y Abihail hija de Eliab hijo de Jesé
  - Roboam tomó por esposa a Mahalat y a Abihail
  rationale: El hebreo es condensado y permite varias lecturas. La redacción elegida sigue el hilo genealógico más coherente con el singular «una mujer» y evita convertir a Abihail en una segunda esposa sin base suficiente. La nota conserva la tensión textual.
  doctrine_reference: Lectura sintáctica y genealogía en Crónicas; cuidado frente a sobreinterpretación del texto comprimido.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que afinó «daughter» con el artículo definido para mayor naturalidad formal. En español se reflejó esa naturalidad con «la hija de» y se mantuvo la estructura genealógica comprimida del hebreo sin disolver la ambigüedad documentada.
  spanish_consistency_notes:
  - Se usa «Roboam» para el nombre del rey, de acuerdo con la forma española habitual y legible.
  - Se translitera «Jerimot» y «Jesé» con formas españolas estándar.
  - Se mantiene «Mahalat» y «Abihail» como nombres propios, sin armonizarlos con nombres bíblicos semejantes.
  - Se evita sustituir la genealogía por una paráfrasis explicativa dentro del cuerpo del texto; la explicación queda en la nota.
