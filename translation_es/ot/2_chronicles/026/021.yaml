review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: Uzías permanece מְצֹרָע hasta su muerte, vive separado por haber sido excluido/cortado de la casa de Yahvé, y Jotam administra la casa real mientras juzga al pueblo. También preserva correctamente ''Yahvé'' para יְהוָה. Sin embargo, varias formulaciones españolas son demasiado literales o poco naturales frente al sentido fuente: ''fue leproso'' suena menos idiomático que ''quedó leproso/estuvo leproso''; ''estaba sobre la casa del rey'' es un calco débil para עַל בֵּית הַמֶּלֶךְ; y ''pueblo de la tierra'' pierde el plural explícito de עַם הָאָרֶץ tal como lo refleja el inglés POB (''people of the land'').'
  spanish_quality_summary: La redacción es entendible y bastante fiel, pero necesita pulido para sonar natural en español bíblico contemporáneo. 'Casa separada' funciona, aunque 'casa apartada' suena mejor. 'Fue cortado de la casa de Yahvé' conserva la fuerza léxica, pero en español requiere ayuda contextual; la nota ya la aporta. Los principales problemas de calidad están en los calcos 'estaba sobre la casa del rey' y 'pueblo de la tierra', que resultan rígidos y poco idiomáticos.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה = ''Yahvé''; בֵּית יְהוָה = ''casa de Yahvé''; מְצֹרָע = ''leproso''. La decisión sobre נִגְזַר se puede mantener como ''fue cortado'' con nota alternativa. Se recomienda ajustar עַל בֵּית הַמֶּלֶךְ a ''estaba a cargo de la casa del rey'' y עַם הָאָרֶץ a ''la gente del país'' o similar para mejor español, sin traicionar el hebreo.'
  issues:
  - severity: medium
    issue: '''Fue leproso'' suena poco idiomático en español para un estado prolongado.'
    rationale: El hebreo ויהי + predicado expresa estado/situación narrativa; en español natural funciona mejor 'quedó leproso' o 'estuvo leproso'. Mantiene el sentido histórico sin dureza gramatical innecesaria.
  - severity: medium
    issue: '''Estaba sobre la casa del rey'' es un calco torpe del hebreo עַל בֵּית הַמֶּלֶךְ.'
    rationale: Aunque cercano formalmente, en español moderno no comunica bien la función administrativa. 'Estaba a cargo de la casa del rey' preserva el sentido de supervisión indicado por la decisión léxica inglesa.
  - severity: medium
    issue: '''Juzgando al pueblo de la tierra'' es demasiado literal y poco natural.'
    rationale: El hebreo עַם הָאָרֶץ aquí corresponde mejor a una expresión como 'la gente del país' o 'el pueblo del país'. 'Pueblo de la tierra' puede sonar extraño o ambiguo en español actual.
  - severity: low
    issue: '''Casa separada'' es comprensible, pero ''casa apartada'' suena más natural.'
    rationale: Ambas son fieles a בֵּית הַחפשות, pero 'apartada' comunica mejor en español una residencia en aislamiento sin perder el matiz de separación.
  revised_spanish_text: Y el rey Uzías quedó leproso[a] hasta el día de su muerte, y habitó en una casa apartada, leproso, porque fue cortado[b] de la casa de Yahvé. Y Jotam su hijo estaba a cargo de la casa del rey, juzgando a la gente del país.
  revised_footnotes:
