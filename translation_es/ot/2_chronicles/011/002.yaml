lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y aconteció
  - Y llegó
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce un nuevo suceso; en español, «Y vino» comunica de manera natural la irrupción del mensaje divino y conserva la secuencia del relato sin añadir énfasis ajeno al texto.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra de Yahveh
  - un mensaje de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética estándar «la palabra de…» y se traduce el Tetragrámaton como «Yahvé» según la política del POB en español, manteniendo el nombre divino y el valor idiomático de la expresión.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición de dirección y destinatario se expresa naturalmente con «a» en español cuando introduce al receptor del mensaje.
- source_word: שְׁמַעְיָהוּ
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Shemayahu
  - Shemaías
  lexicon: HALOT
  rationale: Se usa la forma castellana tradicional del nombre propio en transliteración hispanizada, coherente con el uso bíblico en español y fácil de identificar para el lector.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - un hombre de Dios
  - el varón de Dios
  lexicon: HALOT
  rationale: Se mantiene el título reconocible y su fuerza identificadora. «Hombre de Dios» reproduce de forma directa la construcción nominal sin sustituirla por un término más interpretativo.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'para decir:'
  lexicon: HALOT
  rationale: Es la fórmula introductoria habitual para el discurso directo. «Diciendo» conserva la cercanía formal al hebreo y funciona de manera natural en español bíblico.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue la política confesional y filológica del POB: el nombre propio del pacto se conserva como «Yahvé» y no se oculta tras un título. Esto mantiene visible la referencia al Tetragrámaton del texto hebreo.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh (aplicado en español como Yahvé)'
translation_notes:
  revision_awareness: El texto inglés pasó de «But» a «And» por ajuste al waw hebreo; por eso la apertura española usa la conjunción simple «Y» sin marcar contraste adversativo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יהוה.
  - Se evitó «Señor» como sustituto del nombre divino.
  - No se añadió puntuación o contenido interpretativo extra más allá de la fórmula de introducción del discurso.
