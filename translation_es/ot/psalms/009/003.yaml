translation:
  language: es
  text: Me alegraré y me regocijaré en ti[a]; cantaré alabanzas a tu nombre, Altísimo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me alegraré y me llenaré de júbilo en ti».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Altísimo», un título divino para Dios.'
    reason: cultural_note
lexical_decisions:
- source_word: אֶשְׂמְחָה
  english_pob_choice: I will rejoice
  chosen_spanish: Me alegraré
  alternatives_spanish:
  - Me gozaré
  - Me regocijaré
  lexicon: HALOT
  rationale: El hebreo expresa alegría deliberada en primera persona. «Me alegraré» comunica con naturalidad esa acción futura/volitiva en español y evita la rigidez de una forma demasiado literal.
- source_word: וְאֶעֶלְצָה
  english_pob_choice: and exult
  chosen_spanish: y me regocijaré
  alternatives_spanish:
  - y exultaré
  - y me gozaré
  lexicon: HALOT
  rationale: El verbo עלץ añade un matiz de júbilo exaltado. «Me regocijaré» mantiene un tono celebrativo fuerte en español; aunque se acerca a la primera cláusula, conserva el paralelismo intensificado sin sonar forzado.
- source_word: בָךְ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - por ti
  - contigo
  lexicon: HALOT
  rationale: La preposición ב con sufijo de segunda persona singular expresa el ámbito u objeto de la alegría. «En ti» es la correspondencia directa y más natural.
- source_word: אֲזַמְּרָה
  english_pob_choice: I will sing praise
  chosen_spanish: cantaré alabanzas
  alternatives_spanish:
  - cantaré
  - haré música en alabanza
  lexicon: HALOT
  rationale: El piel de זמר tiene valor doxológico. «Cantaré alabanzas» conserva la acción de cantar y explicita el sentido de alabanza sin abandonar la base verbal.
- source_word: שִׁמְךָ
  english_pob_choice: to your name
  chosen_spanish: a tu nombre
  alternatives_spanish:
  - a tu nombre,
  - tu nombre
  lexicon: HALOT
  rationale: En español, con verbos de alabanza, «cantar alabanzas a tu nombre» suena idiomático y respeta que el «nombre» representa la persona revelada y su fama.
- source_word: עֶלְיוֹן
  english_pob_choice: Most High
  chosen_spanish: Altísimo
  alternatives_spanish:
  - O Altísimo
  - el Altísimo
  lexicon: HALOT
  rationale: Es un título divino. «Altísimo» comunica el rango superlativo y funciona bien en aposición o vocativo; la mayúscula señala el uso reverente.
theological_decisions:
- issue: Tratamiento del título divino עֶלְיוֹן
  english_pob_reading: Most High
  chosen_spanish_reading: Altísimo
  alternative_spanish_readings:
  - O Altísimo
  - el Altísimo
  rationale: El texto hebreo usa un título para Dios, no una simple cualidad abstracta. En español, «Altísimo» preserva ese valor titular con naturalidad y reverencia, sin ocultar el referente divino.
  doctrine_reference: Salmo 9:3; preservación de títulos divinos en traducción bíblica
translation_notes:
  revision_awareness: El texto inglés auditado distingue entre שני verbos de alegría (rejoice / exult) y preserva el título divino «Most High». La versión española mantiene la intensificación verbal con dos verbos de alegría emparentados, conserva el paralelismo y no sustituye el título por una formulación litúrgica opaca. No hubo revisiones aplicadas en el auditorio inglés, por lo que esta propuesta sigue de cerca la lectura estable.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como título divino coherente con el uso bíblico.
  - Se evita «SEÑOR» porque el hebreo aquí no contiene יהוה, sino un título de Dios.
  - La secuencia verbal conserva el paralelismo hebreo sin repetir mecánicamente la misma raíz en español.
  - «Cantaré alabanzas» expresa mejor el piel de זמר que un simple «cantaré».
