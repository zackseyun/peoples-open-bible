  text: בָּ/עֵ֣ת הַ/הִ֗יא דִּבֶּ֣ר יְהוָה֮ בְּ/יַ֣ד יְשַׁעְיָ֣הוּ בֶן אָמוֹץ֮ לֵ/אמֹר֒ לֵ֗ךְ וּ/פִתַּחְתָּ֤ הַ/שַּׂק֙ מֵ/עַ֣ל מָתְנֶ֔י/ךָ וְ/נַעַלְ/ךָ֥ תַחֲלֹ֖ץ מֵ/עַ֣ל רַגְלֶ֑י/ךָ וַ/יַּ֣עַשׂ כֵּ֔ן הָלֹ֖ךְ עָר֥וֹם וְ/יָחֵֽף־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/020/002.yaml
  text: At that time Yahweh spoke by the hand of Isaiah son of Amoz[a], saying, “Go, loosen the sackcloth from your waist, and remove your sandals from your feet.” And he did so, walking naked and barefoot.
  footnotes:
