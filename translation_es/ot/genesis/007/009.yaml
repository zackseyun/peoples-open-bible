revisions:
- from: Dos por dos vinieron a Noé, al arca[a], macho y hembra[b], tal como Dios había mandado a Noé.
  to: Dos por dos vinieron a Noé para entrar en el arca[a], macho y hembra[b], tal como Dios había mandado a Noé.
  rationale: 'Se revisa la frase para resolver una construcción poco natural en español y para comunicar con claridad el valor de destino interior que el expediente inglés expresó con «into the ark», sin sustituir el verbo principal «vinieron». También se corrigen las notas para que correspondan al contenido auditado: la primera nota pertenece a «Dos por dos», y la segunda conserva la alternativa de orden sintáctico.'
