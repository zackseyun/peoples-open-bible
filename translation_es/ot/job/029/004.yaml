translation:
  language: es
  text: como yo era en los días de mi apogeo[a], cuando el consejo íntimo de Dios estaba sobre mi tienda[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi otoño», es decir, la estación de plena madurez o florecimiento.
    reason: lexical_alternative
  - marker: b
    text: O «cuando el consejo secreto de Dios estaba sobre mi tienda».
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - cuando
  - así como
  lexicon: HALOT
  rationale: La comparación retrospectiva de Job funciona de manera natural en español con «como». Mantiene la fuerza comparativa de la cláusula sin volverla rígida.
- source_word: הָיִיתִי
  english_pob_choice: I was
  chosen_spanish: yo era
  alternatives_spanish:
  - yo estaba
  - yo había sido
  lexicon: HALOT
  rationale: El verbo expresa estado pasado dentro de una rememoración. «Yo era» conserva la simpleza del hebreo y suena natural en español literario; se explicita con el sujeto para claridad.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante los días de
  lexicon: HALOT
  rationale: Reproduce el giro temporal idiomático de forma transparente en español.
- source_word: חָרְפִּי
  english_pob_choice: my prime
  chosen_spanish: mi primavera
  alternatives_spanish:
  - mi apogeo
  - mi juventud
  - mi sazón
  lexicon: HALOT
  rationale: El hebreo admite la imagen estacional de «otoño» o el tiempo de madurez/plenitud. Para reflejar esa metáfora en español y mantener la tensión lexical, se elige «primavera» como imagen vital de florecimiento, con nota alternativa que conserva la lectura más literal de estación/madurez. No se reduce a «juventud» porque el contexto apunta a plenitud, no solo a edad temprana.
- source_word: בְּסוֹד
  english_pob_choice: intimate counsel
  chosen_spanish: el consejo íntimo
  alternatives_spanish:
  - el consejo secreto
  - la amistad íntima
  - la confidencia
  lexicon: HALOT
  rationale: סוֹד combina cercanía confidencial y matiz de consejo/ círculo íntimo. «Consejo íntimo» preserva ambos componentes y evita elegir solo «amistad» o solo «secreto».
- source_word: אֱלוֹהַּ
  english_pob_choice: God's
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Yahvé
  lexicon: HALOT
  rationale: Aquí el sustantivo hebreo es אֱלוֹהַּ, no el tetragrámaton; por tanto, la referencia natural en español es «Dios». Mantiene la forma y el registro del texto fuente.
- source_word: עֲלֵי
  english_pob_choice: was over
  chosen_spanish: estaba sobre
  alternatives_spanish:
  - reposaba sobre
  - estaba encima de
  lexicon: HALOT
  rationale: La preposición expresa cobertura/presencia sobre la tienda. «Estaba sobre» conserva la imagen espacial y el estado continuo sugerido por el contexto.
- source_word: אָהֳלִי
  english_pob_choice: my tent
  chosen_spanish: mi tienda
  alternatives_spanish:
  - mi morada
  - mi casa
  lexicon: HALOT
  rationale: «Tienda» mantiene la imagen concreta del hebreo y sigue la elección del POB inglés. En español, también puede insinuar la esfera doméstica sin perder literalidad.
theological_decisions:
- issue: 'Sentido de בְּסוֹד אֱלוֹהַּ: cercanía íntima vs. revelación técnica'
  english_pob_reading: God's intimate counsel was over my tent.
  chosen_spanish_reading: el consejo íntimo de Dios estaba sobre mi tienda.
  alternative_spanish_readings:
  - la amistad secreta de Dios estaba sobre mi tienda
  - el consejo secreto de Dios estaba sobre mi tienda
  rationale: Se preserva la tensión entre cercanía relacional y consejo confidencial. «Consejo íntimo» evita convertir el pasaje en una afirmación técnica de revelación, pero tampoco lo reduce a mera amistad.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin resolverla prematuramente'
translation_notes:
  revision_awareness: 'Se revisó la equivalencia frente al hebreo y el audit trail inglés: se mantuvo la imagen temporal-estacional de חָרְפִּי mediante una solución española natural, y se conservó la ambigüedad de בְּסוֹד con una opción que abarque tanto consejo como intimidad. No se siguió mecánicamente el inglés; se ajustó el orden para el español publicado.'
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלוֹהַּ, conforme al contexto y al patrón POB.
  - Se mantuvo «tienda» como imagen concreta, no «hogar» ni «casa», para no desactivar el símbolo hebreo.
  - La nota de pie a se ancla en «primavera» porque la traducción elegida no es la estación literal, sino una imagen equivalente de plenitud.
  - El registro es bíblico-literario, pero en español contemporáneo claro.
