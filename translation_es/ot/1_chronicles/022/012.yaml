    text: 'O: «Solamente»; la partícula hebrea puede funcionar como restricción enfática.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «perspicacia» o «discreción»; el hebreo apunta a sensatez práctica o buen juicio.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «te comisione acerca de Israel» o «te dé encargo sobre Israel»; el verbo hebreo puede expresar un mandato o encargo relacionado con Israel.'
    reason: lexical_alternative
  revision_rationale: Se ajusta שֵׂכֶל de «sabiduría» a «sensatez» para preservar mejor el matiz de buen juicio práctico en el par hebreo. Se cambia «te dé orden acerca de Israel» por «te mande respecto de Israel» porque es más idiomático y refleja mejor צוה sin importar indebidamente una idea de nombramiento. Se conservan «Yahvé» y «la ley de Yahvé tu Dios» conforme al proyecto. Las notas se simplifican y alinean mejor con sus anclajes.
