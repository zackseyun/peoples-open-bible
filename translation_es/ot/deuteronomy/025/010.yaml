translation:
  language: es
  text: 'Y su nombre será llamado en Israel[a]: «La casa de aquel a quien le quitaron la sandalia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «La casa de la sandalia quitada». El hebreo concentra el título de vergüenza ritual en una expresión muy breve.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִקְרָא
  english_pob_choice: shall be called
  chosen_spanish: se le llamará
  alternatives_spanish:
  - será llamado
  - se nombrará
  lexicon: HALOT
  rationale: El nifal de קרא en esta fórmula legal pide una pasiva impersonal en español. «Se le llamará» conserva el registro formal y la idea de designación pública sin añadir sujeto innecesario.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: se le
  alternatives_spanish:
  - su nombre
  - le
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «su nombre», el español suena más natural con el dativo ético «se le llamará», que mantiene la referencia a la persona nombrada sin repetir «nombre» de forma forzada.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  lexicon: HALOT
  rationale: La preposición ב indica el ámbito social donde circula la designación. «En Israel» preserva ese marco comunitario y el tono jurídico del original.
- source_word: בֵּית
  english_pob_choice: The house of
  chosen_spanish: La casa de
  alternatives_spanish:
  - La familia de
  - El linaje de
  lexicon: HALOT
  rationale: «Casa de» reproduce la fórmula hebrea de identidad familiar o dinástica y mantiene la concisión del original. Otras opciones explicitan más de lo que el texto dice.
- source_word: חֲלוּץ
  english_pob_choice: him whose sandal was removed
  chosen_spanish: aquel cuyo sandalia fue quitada
  alternatives_spanish:
  - aquel a quien le quitaron la sandalia
  - el descalzado
  lexicon: HALOT
  rationale: El participio pasivo alude al hombre vinculado al rito de quitar la sandalia. En español, «cuyo sandalia fue quitada» conserva la relación posesiva y el pasivo; la redacción es un poco marcada, pero refleja la concisión hebrea sin convertir el título en una paráfrasis libre.
- source_word: הַנָּעַל
  english_pob_choice: the sandal
  chosen_spanish: la sandalia
  alternatives_spanish:
  - el calzado
  - el zapato
  lexicon: HALOT
  rationale: «Sandalia» es el equivalente más preciso para el calzado antiguo del contexto. «Zapato» sonaría anacrónico y «calzado» perdería concreción ritual.
translation_notes:
  revision_awareness: 'Se siguió el auditable hilo del POB inglés: conservar el registro formal de la fórmula de nombramiento, mantener el alcance social de «en Israel» y reflejar la compresión del título de vergüenza con una nota sobre la literalidad alternativa.'
  spanish_consistency_notes:
  - Se eligió «sandalia» de forma consistente para הַנָּעַל en vez de «zapato», por adecuación histórica y lexical.
  - Se mantuvo la fórmula nominal «La casa de...» para reflejar בֵּית sin convertirla en una paráfrasis explicativa.
  - La construcción española intenta conservar la tensión entre literalidad y legibilidad que el POB inglés documenta en su nota lexical.
