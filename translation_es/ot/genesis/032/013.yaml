translation:
  language: es
  text: 'Pero tú dijiste: «Ciertamente[a] te haré bien, y haré tu descendencia[b] como la arena del mar, que no se podrá contar[c] por su multitud».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sin falta te haré bien». El hebreo usa un infinitivo absoluto con un verbo finito para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu simiente» o «tus descendientes». זֶרַע es un singular colectivo que aquí significa la descendencia como grupo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «que no se podrá numerar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  lexicon: HALOT
  rationale: El hebreo une la conjunción con el pronombre independiente para dar un contraste enfático. «Pero tú» conserva naturalmente el giro adversativo en español y mantiene la segunda persona directa.
- source_word: אָמַרְתָּ
  english_pob_choice: said
  chosen_spanish: dijiste
  alternatives_spanish:
  - has dicho
  - has hablado
  lexicon: HALOT
  rationale: El perfecto hebreo remite a una declaración previa de Dios. En español, el pasado simple suena natural en este discurso directo y preserva la referencia a una palabra ya pronunciada.
- source_word: הֵיטֵב אֵיטִיב
  english_pob_choice: I will surely do you good
  chosen_spanish: Ciertamente te haré bien
  alternatives_spanish:
  - De cierto te haré bien
  - Seguramente te beneficiaré
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto con verbo finito intensifica la acción. «Ciertamente» conserva el énfasis sin introducir una interpretación excesiva, y «haré bien» expresa el beneficio prometido de forma idiomática y fiel.
- source_word: עִמָּךְ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - contigo
  - a ti
  lexicon: HALOT
  rationale: Aunque literalmente es «con ti», aquí el giro idiomático de היטיב עִם significa hacer bien a alguien. En español, el objeto directo/indirecto «te» comunica mejor el sentido relacional que un calco más literal.
- source_word: וְשַׂמְתִּי
  english_pob_choice: and I will make
  chosen_spanish: y pondré
  alternatives_spanish:
  - y haré
  - y estableceré
  lexicon: HALOT
  rationale: El verbo שׂים puede funcionar idiomáticamente como «poner» o «hacer». Dado que el objeto es la descendencia y el símil siguiente describe su multitud, «pondré» permite mantener la imagen verbal sin forzar una paráfrasis más interpretativa.
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus descendientes
  lexicon: HALOT
  rationale: «Descendencia» conserva el sentido colectivo de זֶרַע en un español bíblico claro y actual. Evita tanto el arcaísmo «simiente» como la pluralización que podría debilitar el valor colectivo singular.
- source_word: כְּחוֹל הַיָּם
  english_pob_choice: like the sand of the sea
  chosen_spanish: como la arena del mar
  alternatives_spanish:
  - como la arena del mar
  - como la arena a la orilla del mar
  lexicon: HALOT
  rationale: La imagen hebrea tradicional se expresa de manera natural en español con «arena del mar». «Arena» refleja el sustantivo hebreo y mantiene intacto el símil de innumerabilidad.
- source_word: אֲשֶׁר לֹא יִסָּפֵר
  english_pob_choice: which cannot be counted
  chosen_spanish: que no se podrá contar
  alternatives_spanish:
  - que no puede contarse
  - que no será contado
  lexicon: HALOT
  rationale: El nifal imperfecto expresa imposibilidad práctica o futura de conteo. «No se podrá contar» preserva bien esa idea en español y suena natural en el registro bíblico contemporáneo.
- source_word: מֵרֹב
  english_pob_choice: because of its abundance
  chosen_spanish: por su multitud
  alternatives_spanish:
  - a causa de su abundancia
  - por ser demasiada
  lexicon: HALOT
  rationale: La preposición מן con רֹב indica la causa de la imposibilidad de contar. «Por su multitud» refleja con concisión la densidad cuantitativa del término y encaja bien con el ritmo del versículo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético de Génesis 32:13 y mantiene la misma línea interpretativa que el audit trail inglés: énfasis verbal en la promesa, זֶרַע como singular colectivo y la imposibilidad de contar por la abundancia. No hay revisiones posteriores que alteren la decisión principal.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto fuente lo exige explícitamente; en este versículo no aparece el nombre divino, por lo que no se introduce ninguna forma equivalente.
  - Se mantuvo un registro bíblico moderno y digno, evitando calcos innecesarios pero conservando las imágenes de abundancia del hebreo.
  - La traducción de זֶרַע como «descendencia» es consistente con el tratamiento POB de singular colectivo en contextos genealógicos.
