translation:
  language: es
  text: 'Pero ella respondió y le dijo: «Señor[a], aun los perritos[b], debajo de la mesa, comen de las migajas de los niños».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor», como tratamiento respetuoso. El griego κύριε puede funcionar tanto como forma cortés de dirigirse a alguien como como el título «Señor».
    reason: alternative_reading
  - marker: b
    text: El diminutivo griego indica perros pequeños o de casa; «perritos» conserva mejor ese matiz que «perros».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: La forma narrativa de ἀποκρίνομαι se expresa bien con «respondió»; conserva el carácter de respuesta directa sin sonar rígido en español.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - le respondió
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente en español como pasado; «le dijo» conserva el diálogo y el complemento indirecto explícito.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Sir
  lexicon: BDAG
  rationale: Se mantiene la equivalencia doctrinal habitual para κύριος en el contexto de dirigirse a Jesús. En español, «Señor» preserva el peso reverencial sin forzar un matiz meramente cortés.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - incluso
  lexicon: BDAG
  rationale: Aquí καί es concesivo/aditivo; «aun» transmite mejor la idea de que los perritos también participan de lo que cae de la mesa.
- source_word: κυνάρια
  english_pob_choice: little dogs
  chosen_spanish: perritos
  alternatives_spanish:
  - perritos de casa
  - perros pequeños
  - doguitos
  lexicon: BDAG
  rationale: El diminutivo griego conserva un matiz de tamaño/afecto/domesticidad. «Perritos» reproduce ese valor de manera natural en español; «perros» perdería la diminución.
- source_word: ὑποκάτω τῆς τραπέζης
  english_pob_choice: under the table
  chosen_spanish: debajo de la mesa
  alternatives_spanish:
  - bajo la mesa
  - debajo de la mesa
  lexicon: BDAG
  rationale: «Debajo de la mesa» es la manera idiomática y precisa de expresar la relación espacial; la diferencia entre «mesa» y «tabla» responde al uso normal del español.
- source_word: ἐσθίουσιν
  english_pob_choice: eat
  chosen_spanish: comen
  alternatives_spanish:
  - están comiendo
  - comen
  lexicon: BDAG
  rationale: El presente general del relato se expresa con el presente habitual español «comen», que comunica acción proverbial o de costumbre.
- source_word: ἀπὸ τῶν ψιχίων
  english_pob_choice: from the crumbs
  chosen_spanish: de las migajas
  alternatives_spanish:
  - de las migajas
  - de los trocitos
  lexicon: BDAG
  rationale: ψιχίων son pequeñas porciones o migas. «Migajas» es un equivalente natural y claro en español; con «de» se mantiene bien el valor partitivo de ἀπό.
- source_word: τῶν παιδίων
  english_pob_choice: the children's
  chosen_spanish: de los niños
  alternatives_spanish:
  - de los pequeños
  - de los niños
  lexicon: BDAG
  rationale: παιδίων designa niños; en español el genitivo se expresa naturalmente con «de los niños», manteniendo la referencia explícita sin añadir contenido como «comida».
theological_decisions:
- issue: Título de respeto aplicado a Jesús en κύριε
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Sir
  - señor
  rationale: Se conserva la lectura POB de κύριε como «Lord» y, en español, «Señor» mantiene tanto la reverencia como la consistencia terminológica para un posible título dirigido a Jesús. La nota deja abierta la posibilidad de un tratamiento respetuoso no titulado.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue el mismo criterio auditado, conservando la equivalencia óptima y la decisión estable sobre κύριε y κυνάρια.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, en línea con el criterio doctrinal del proyecto.
  - Se usa «perritos» para κυνάρια para preservar el diminutivo y evitar una neutralización léxica.
  - «Migajas» comunica con naturalidad ψιχίων sin introducir la noción de comida, que el griego no expresa explícitamente.
  - El orden del diálogo y la puntuación española buscan reflejar con claridad la escena narrativa sin sobretraducir.
