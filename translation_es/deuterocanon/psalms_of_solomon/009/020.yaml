review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: la misericordia del Señor/Yahvé está dirigida a la casa de Israel con duración perpetua. También preserva la alternativa para εἰς τὸν αἰῶνα καὶ ἔτι. Sin embargo, presenta un problema menor pero real de español y de estilo terminológico en «del Yahvé», y una formulación más natural puede mantener mejor la fidelidad sin calco innecesario.'
  spanish_quality_summary: «La misericordia de Yahvé» es natural y digna; «del Yahvé» suena antinatural en español eclesial general. «Está sobre la casa de Israel» es aceptable y fiel. «Por siempre y para siempre» comunica bien la intensificación, aunque la nota alternativa ya cubre la fuerza más literal de καὶ ἔτι.
  glossary_alignment: 'Alinea correctamente κύριος con «Yahvé» conforme a la política del proyecto cuando remite al nombre divino. «Misericordia» para ἐλεημοσύνη y «casa de Israel» para οἶκον Ἰσραήλ están bien. El único ajuste necesario es la construcción española con el nombre divino: «de Yahvé», no «del Yahvé».'
  issues:
  - severity: medium
    issue: Uso antinatural de «del Yahvé».
    rationale: En español bíblico natural se dice «de Yahvé», no «del Yahvé». El artículo definido delante del nombre divino aquí introduce una forma poco idiomática y distrae sin aportar precisión.
  - severity: low
    issue: La decisión léxica documenta alternativas «el Señor» y «del Señor» para una elección que en el texto final debe expresarse como «de Yahvé».
    rationale: No afecta gravemente el sentido, pero conviene que la formulación final y su racional coincidan con el español efectivamente usado.
  revised_spanish_text: La misericordia de Yahvé está sobre la casa de Israel por siempre y para siempre[a].
  revised_footnotes:
  - marker: a
    text: O «por siempre y aun más», para reflejar con más literalidad la fuerza ampliada de la frase griega.
    reason: lexical_alternative
  revision_rationale: Se corrige «del Yahvé» a «de Yahvé» para un español natural y digno, manteniendo la política del proyecto de usar el nombre divino. Se conserva el resto de la redacción, que es fiel al griego y legible en español. La nota se mantiene con redacción ligeramente más limpia sin cambiar su función.
