  glossary_alignment: No hay términos teológicos sensibles en este versículo. 'un hebreo', 'sacerdote por linaje' e 'instruido en la ley' son compatibles con las decisiones documentadas, aunque 'versado en la ley' también sería una buena opción. No hay conflicto con la terminología base del proyecto.
