translation:
  language: es
  text: Subirán salvadores[a] al monte Sion, para juzgar la región montañosa de Esaú[b]; y el reino será de Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «libertadores». El término hebreo describe aquí agentes que traen liberación; no niega que la salvación última pertenezca a Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: O «el monte de Esaú» o «la montaña de Esaú»; la expresión probablemente se refiere al territorio montañoso de Edom.
    reason: lexical_alternative
  - marker: c
    text: O «la realeza» o «el dominio será de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלוּ
  english_pob_choice: will go up
  chosen_spanish: Subirán
  alternatives_spanish:
  - Y subirán
  - Ascenderán
  lexicon: HALOT
  rationale: El verbo expresa movimiento ascendente real; «subirán» conserva esa imagen concreta sin volverla abstracta. En español suena natural en contexto profético y mantiene el vínculo topográfico con Sion.
- source_word: מוֹשִׁעִים
  english_pob_choice: Deliverers
  chosen_spanish: libertadores
  alternatives_spanish:
  - salvadores
  - los que traen liberación
  lexicon: HALOT
  rationale: El participio funciona aquí como sustantivo plural para agentes de rescate. «Libertadores» mantiene la fuerza de agente humano que libera, evitando confusión con un título exclusivo de Dios, pero preservando la relación con la salvación.
- source_word: בְּהַר צִיּוֹן
  english_pob_choice: on Mount Zion
  chosen_spanish: al monte Sion
  alternatives_spanish:
  - sobre el monte Sion
  - en el monte Sion
  lexicon: HALOT
  rationale: La preposición hebrea con el movimiento ascendente se vierte naturalmente con «al». «Monte Sion» conserva el nombre propio y la imagen geográfica.
- source_word: לִשְׁפֹּט
  english_pob_choice: to judge
  chosen_spanish: para juzgar
  alternatives_spanish:
  - para gobernar
  - para reinar
  lexicon: HALOT
  rationale: «Juzgar» preserva el núcleo léxico de שפט. En este contexto profético puede incluir el ejercicio de gobierno, pero no conviene diluir el término principal en la traducción base.
- source_word: אֶת הַר עֵשָׂו
  english_pob_choice: the hill country of Esau
  chosen_spanish: el monte de Esaú
  alternatives_spanish:
  - la región montañosa de Esaú
  - la montaña de Esaú
  lexicon: HALOT
  rationale: El hebreo permite un valor regional, y el POB inglés lo explicita como territorio de Edom. En español, «el monte de Esaú» conserva mejor la forma concisa del verso, mientras una nota puede aclarar el posible sentido territorial.
- source_word: וְהָיְתָה
  english_pob_choice: and ... will belong
  chosen_spanish: y el reino será
  alternatives_spanish:
  - y el reino pertenecerá
  - y el dominio será
  lexicon: HALOT
  rationale: La construcción con ל marca posesión; en español se expresa de modo natural con «será de». Así se conserva la relación posesiva sin forzar una paráfrasis.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto, el Tetragrámaton se traduce «Yahvé» en el texto principal. Con la construcción posesiva en español, «de Yahvé» comunica la pertenencia implícita del hebreo.
- source_word: הַמְּלוּכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el dominio
  - la realeza real
  lexicon: HALOT
  rationale: «El reino» es la forma más natural y fiel en español para la noción de realeza/mandato real aquí. Mantiene el cierre solemne del versículo sin perder el sentido de soberanía.
theological_decisions:
- issue: Plural de מוֹשִׁעִים en relación con la salvación divina
  english_pob_reading: Deliverers
  chosen_spanish_reading: libertadores
  alternative_spanish_readings:
  - salvadores
  rationale: La frase refiere agentes humanos por medio de los cuales Dios actúa, no una competencia con la única obra salvífica de Yahvé. «Libertadores» conserva ese papel instrumental y evita sobredeterminar el término como un título divino.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Sentido de הַמְּלוּכָה al final del versículo
  english_pob_reading: the kingdom will belong to the LORD
  chosen_spanish_reading: el reino será de Yahvé
  alternative_spanish_readings:
  - el reino pertenecerá a Yahvé
  - la realeza será de Yahvé
  - el dominio será de Yahvé
  rationale: El hebreo puede apuntar al reino como esfera o al ejercicio del poder real. La forma elegida conserva la declaración de posesión soberana de manera idiomática en español, sin perder la amplitud semántica del término.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no introdujo cambios; esta versión sigue de cerca el texto hebreo y la lectura inglesa auditada, manteniendo la tensión entre el papel de los libertadores humanos y la soberanía final de Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se prefirió «libertadores» para מוֹשִׁעִים por la fuerza de agente humano plural.
  - «Monte Sion» y «monte de Esaú» conservan la imaginería topográfica del hebreo.
  - 'La clausula final se formula como posesión en español: «el reino será de Yahvé».'
