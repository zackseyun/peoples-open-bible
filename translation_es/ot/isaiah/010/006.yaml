translation:
  language: es
  text: Contra una nación impía[a] lo envío, y contra el pueblo de mi ira le ordeno, para saquear botín[b] y arrebatar despojo, y convertirlo[c] en pisoteo, como el lodo de las calles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contra una nación profana'. El adjetivo hebreo puede denotar impiedad, profanación o falta de piedad.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, 'para saquear botín y para despojar despojo', un modismo que intensifica los actos de pillaje.
    reason: lexical_alternative
  - marker: c
    text: O 'convertirlos en algo pisoteado'. El sufijo hebreo es masculino singular y puede referirse a la nación o al pueblo como un colectivo.
    reason: alternative_reading
lexical_decisions:
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - nación-estado
  lexicon: HALOT
  rationale: גוֹי suele referirse a una nación o pueblo como colectividad. 'Nación' conserva el sentido corporativo y mantiene el paralelismo con עַם.
- source_word: חָנֵף
  english_pob_choice: godless
  chosen_spanish: impía
  alternatives_spanish:
  - sin Dios
  - profana
  - malvada
  lexicon: HALOT
  rationale: El término puede denotar impiedad, profanación o carencia de piedad. 'Impía' expresa bien la censura religiosa y suena natural en español bíblico sin caer en arcaísmo excesivo.
- source_word: אֲשַׁלְּחֶנּוּ
  english_pob_choice: I send him
  chosen_spanish: lo envío
  alternatives_spanish:
  - lo mandaré
  - lo despacho
  lexicon: HALOT
  rationale: El imperfecto profético permite presente o futuro. 'Lo envío' conserva vividez y refleja la comisión divina inmediata.
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: HALOT
  rationale: עַם destaca un pueblo como colectivo. 'Pueblo' preserva mejor la correspondencia con 'nación' que 'gente'.
- source_word: עֶבְרָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi furor
  - mi indignación
  lexicon: HALOT
  rationale: עֶבְרָה expresa ira/furor judicial. 'Ira' es clara y digna en español; se mantiene la fuerza divina de juicio.
- source_word: אֲצַוֶּנּוּ
  english_pob_choice: I command him
  chosen_spanish: lo mando
  alternatives_spanish:
  - lo ordeno
  - le doy órdenes
  lexicon: HALOT
  rationale: צוה significa 'mandar/ordenar'. En español, 'lo mando' preserva la autoridad soberana y suena más natural que una perífrasis demasiado explícita.
- source_word: לִשְׁלֹל שָׁלָל
  english_pob_choice: to seize spoil
  chosen_spanish: para que quite botín
  alternatives_spanish:
  - para saquear botín
  - para apoderarse de despojo
  lexicon: HALOT
  rationale: El infinitivo con sustantivo cognado intensifica la acción. 'Quite botín' comunica la idea de tomar el despojo sin sonar demasiado mecánico.
- source_word: וְלָבֹז בַּז
  english_pob_choice: to carry off plunder
  chosen_spanish: y arrebate despojo
  alternatives_spanish:
  - y robe botín
  - y saquee despojo
  lexicon: HALOT
  rationale: El segundo binomio cognado repite e intensifica la acción. 'Arrebate despojo' mantiene la duplicación verbal-semántica con un registro bíblico claro.
- source_word: וּלְשִׂימוֹ
  english_pob_choice: to make them
  chosen_spanish: lo convierta
  alternatives_spanish:
  - los convierta
  - lo haga
  lexicon: HALOT
  rationale: El sufijo hebreo es masculino singular y puede referirse al colectivo como entidad. Dado el español, 'lo' puede remitir a 'pueblo/nación' como colectivo; se deja la tensión del referente sin forzar pluralización.
- source_word: מִרְמָס
  english_pob_choice: a trampling
  chosen_spanish: un pisoteo
  alternatives_spanish:
  - un lugar de pisoteo
  - algo pisoteado
  lexicon: HALOT
  rationale: מִרְמָס denota algo pisoteado o el acto/resultado de ser pisado. 'Un pisoteo' es breve, formal y cercano al sustantivo abstracto del hebreo.
- source_word: כְּחֹמֶר חוּצֽוֹת
  english_pob_choice: like the mire of the streets
  chosen_spanish: como el lodo de las calles
  alternatives_spanish:
  - como el cieno de las calles
  - como el barro de las calles
  lexicon: HALOT
  rationale: חֹמֶר aquí es lodo/cieno/mud, y חוּצוֹת son calles. 'Lodo' reproduce bien el valor imagético y es idiomático en español.
theological_decisions:
- issue: Referente del objeto pronominal en 'lo convierta'
  english_pob_reading: The target nation/people is the object of trampling; the masculine singular suffix can refer to the collective entity.
  chosen_spanish_reading: El objeto pronominal se deja en singular colectivo ('lo'), remitiendo a la nación/pueblo como entidad colectiva sin borrar la forma hebrea.
  alternative_spanish_readings:
  - los convierta
  - los haga pisoteo
  - la convierta
  rationale: El hebreo usa sufijo masculino singular, mientras que el contexto apunta al colectivo. En español, el singular colectivo permite conservar la ambigüedad y evitar imponer una lectura puramente plural.
  doctrine_reference: Preservar la tensión textual y la precisión gramatical sin suavizar el juicio divino.
- issue: Lenguaje de ira divina
  english_pob_reading: Retain direct first-person divine wrath language ('my wrath') without softening.
  chosen_spanish_reading: Se mantiene el lenguaje directo 'mi ira' sin explicarlo o atenuarlo.
  alternative_spanish_readings:
  - mi indignación
  - el pueblo contra el que estoy enojado
  rationale: El texto presenta la ira de Dios como categoría judicial explícita. 'Mi ira' es fiel, solemne y no diluye la afirmación teológica.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión teológica.
translation_notes:
  revision_awareness: La base inglesa revisada cambió 'it' por 'them' para reflejar mejor al pueblo/nación como objeto del pisoteo y ajustó 'a trampling place' a 'a trampling'. En español se optó por 'un pisoteo' y por un pronombre singular colectivo ('lo') para mantener la tensión entre el sufijo hebreo singular y el referente colectivo del contexto, sin perder la imagen de devastación.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca en el contexto, conforme al estándar del proyecto, aunque en este verso no se presenta explícitamente.
  - Se evita 'SEÑOR' como sustituto automático del Nombre divino.
  - '''Impía'' mantiene el matiz moral-religioso de חָנֵף sin sobrecargar el verso.'
  - '''Lodo'' se prefirió a ''barro'' por la cercanía semántica al inglés auditado y por el tono formal bíblico.'
  - Se conserva un registro sobrio y apto para lectura eclesial sin recurrir a traducciones eclesiásticas tradicionales no motivadas por el hebreo.
