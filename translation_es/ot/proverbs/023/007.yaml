  text: כִּ֤י כְּמוֹ שָׁעַ֥ר בְּ/נַפְשׁ֗/וֹ כֶּ֫ן ה֥וּא אֱכֹ֣ל וּ֭/שְׁתֵה יֹ֣אמַר לָ֑/ךְ וְ֝/לִבּ֗/וֹ בַּל עִמָּֽ/ךְ׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/023/007.yaml
  text: 'For as he calculates within himself[a], so he is: “Eat and drink,” he says to you, but his heart is not with you.'
  footnotes:
  - marker: a
    text: Or “For as he thinks within himself, so he is.” The Hebrew verb can mean “thinks,” but more specifically suggests reckoning or calculating.
    reason: lexical_alternative
