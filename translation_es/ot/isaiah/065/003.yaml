translation:
  language: es
  text: el pueblo que continuamente me provocan en mi propia cara[a], sacrificando en los jardines y quemando incienso sobre los ladrillos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sobre los ladrillos». La expresión probablemente alude a instalaciones o altares de ladrillo usados para culto ilícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - un pueblo
  - la nación
  lexicon: HALOT
  rationale: Con el artículo definido, el hebreo señala un grupo concreto ya en vista. En español, «el pueblo» conserva el sentido colectivo y resulta natural en este contexto de reprensión profética.
- source_word: הַמַּכְעִיסִים
  english_pob_choice: who ... provoke
  chosen_spanish: que continuamente me provoca
  alternatives_spanish:
  - que me enoja
  - que me ofende
  - que me irrita
  lexicon: HALOT
  rationale: 'El hifil de כעס es causativo: hacer enojar/provocar a ira. «Provoca» retiene mejor la fuerza activa y desafiante que un verbo más débil como «enoja».'
- source_word: עַל־פָּנַי
  english_pob_choice: to my face
  chosen_spanish: a mi propia cara
  alternatives_spanish:
  - ante mí
  - en mi presencia
  - frente a mí
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente frontal y desvergonzada. «A mi propia cara» preserva el golpe idiomático de desafío directo, aunque suene más marcado que «ante mí».
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - constantemente
  - sin cesar
  lexicon: HALOT
  rationale: El adverbio indica repetición persistente. «Continuamente» es un equivalente natural en español y conserva el matiz de acción sostenida.
- source_word: זֹבְחִים
  english_pob_choice: sacrificing
  chosen_spanish: sacrificando
  alternatives_spanish:
  - ofreciendo sacrificios
  - haciendo sacrificios
  - inmolando
  lexicon: HALOT
  rationale: El participio describe actividad cultual en curso. «Sacrificando» es breve y mantiene el acto ritual sin expandirlo.
- source_word: בַּגַּנּוֹת
  english_pob_choice: in the gardens
  chosen_spanish: en los jardines
  alternatives_spanish:
  - entre los jardines
  - en jardines sagrados
  - en los huertos
  lexicon: HALOT
  rationale: La forma es locativa y el texto no explicita más. «En los jardines» conserva la imagen y deja que el contexto señale su carácter idólatra.
- source_word: וּמְקַטְּרִים
  english_pob_choice: and burning incense
  chosen_spanish: y quemando incienso
  alternatives_spanish:
  - y ofreciendo incienso
  - y haciendo humo de incienso
  - y quemando ofrendas aromáticas
  lexicon: HALOT
  rationale: קטר en este contexto se refiere a quemar incienso u ofrecer humo. «Quemando incienso» es la expresión española más clara y fiel.
- source_word: עַל־הַלְּבֵנִים
  english_pob_choice: on the bricks
  chosen_spanish: sobre los ladrillos
  alternatives_spanish:
  - sobre las piedras de adobe
  - sobre los ladrillos cocidos
  - sobre los adobes
  lexicon: HALOT
  rationale: לְבֵנִים designa ladrillos. El español «ladrillos» conserva la materialidad explícita del hebreo, sin añadir «altares» que el texto no dice. En una nota puede explicarse la posible referencia cultual.
theological_decisions:
- issue: Carácter del culto denunciado en el cierre del versículo
  english_pob_reading: burning incense on the bricks
  chosen_spanish_reading: quemando incienso sobre los ladrillos
  alternative_spanish_readings:
  - quemando incienso sobre los altares de ladrillo
  - quemando incienso sobre los ladrillos de culto
  rationale: El hebreo nombra el material, no la estructura. Mantener «sobre los ladrillos» preserva la ambigüedad lexical y la tensión interpretativa; el lector puede inferir el contexto cultual por el paralelismo con sacrificios e incienso, sin que la traducción resuelva más de lo que el texto dice.
  doctrine_reference: 'Translation philosophy: preserve lexical ambiguity where the source remains underspecified; do not over-clarify cultic referents without textual warrant.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente retiró la explicitación «brick altars» y volvió a «the bricks» por mayor precisión lexical. Esta versión española sigue esa corrección y evita introducir «altares» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; aquí no aparece.
  - Se traduce el participio causativo con «provoca» para conservar la fuerza de la acusación.
  - Se conserva la imagen material de «ladrillos» en el texto principal y se explica la posible referencia cultual en nota.
  - El registro es profético y sobrio, sin añadir interpretaciones doctrinales ajenas al versículo.
