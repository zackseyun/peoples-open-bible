revisions:
- from: que Yahvé[a] se dignara aplastarme[b][c], que soltara su mano y me cortara.
  to: que Dios[a] quisiera aplastarme[c], que soltara[b] su mano y me eliminara.
  rationale: Se corrige «Yahvé» a «Dios» para ajustarse a אֱלוֹהַּ y a la auditoría inglesa. Se reemplaza «me cortara» por «me eliminara» para expresar con mayor claridad la destrucción final de וִיבַצְּעֵנִי en español natural. Se conserva «soltara su mano» con nota idiomática y se mantiene una formulación volitiva clara en «quisiera».
