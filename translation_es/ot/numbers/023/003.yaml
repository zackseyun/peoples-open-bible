  yaml_path: translation/ot/numbers/023/003.yaml
  text: Then Balaam said to Balak[a], “Stand by your burnt offering, and I will go. Perhaps Yahweh will come to meet me, and whatever he shows me I will tell you.” Then he went to a bare height.
  footnotes:
