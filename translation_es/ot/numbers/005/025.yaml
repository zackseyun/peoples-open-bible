translation:
  language: es
  text: Entonces el sacerdote tomará de la mano de la mujer la ofrenda de grano de los celos, y agitará la ofrenda de grano delante de Yahvé, y la acercará al altar.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: Then ... shall take
  chosen_spanish: Entonces ... tomará
  alternatives_spanish:
  - Y ... tomará
  - Y ... tomará entonces
  lexicon: HALOT
  rationale: El waw consecutivo en esta secuencia ritual presenta el siguiente paso prescrito; «Entonces» transmite la continuidad procedimental con naturalidad en español sin perder el valor instructivo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiando
  - el presbítero
  lexicon: HALOT
  rationale: El término cultual se expresa con el equivalente español común «sacerdote», claro y fiel al oficial del rito.
- source_word: מִיַּד הָאִשָּׁה
  english_pob_choice: from the woman’s hand
  chosen_spanish: de la mano de la mujer
  alternatives_spanish:
  - de la mano de aquella mujer
  - de la mano de la esposa
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de recepción directa. En español, «de la mano de la mujer» mantiene la imagen concreta sin forzar una paráfrasis.
- source_word: מִנְחַת הַקְּנָאֹת
  english_pob_choice: the grain offering of jealousy
  chosen_spanish: la ofrenda vegetal de los celos
  alternatives_spanish:
  - la ofrenda de celos
  - la ofrenda vegetal de los celos
  lexicon: HALOT
  rationale: «מִנְחָה» en contexto sacerdotal se vierte mejor como «ofrenda vegetal» para conservar la categoría sacrificial específica; «de los celos» refleja el genitivo del hebreo. Se evita «celosía» o un giro interpretativo que borre la tensión ritual del pasaje.
- source_word: וְהֵנִיף
  english_pob_choice: shall wave
  chosen_spanish: agitará
  alternatives_spanish:
  - mecerá
  - alzará y moverá
  lexicon: HALOT
  rationale: El gesto ritual de balancear/ofrecer se puede expresar en español con «agitará» para conservar el movimiento visible del rito sin añadir una perífrasis demasiado explicativa.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda vegetal
  alternatives_spanish:
  - la ofrenda
  - la ofrenda de cereal
  lexicon: HALOT
  rationale: Se mantiene la consistencia con la primera aparición de מִנְחָה y la terminología POB para esta categoría, evitando el más genérico «ofrenda».
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, y «delante de» reproduce con naturalidad la fórmula cultual sin ocultar el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se aplica el término base del proyecto en español para el Nombre divino, en lugar de una sustitución por «SEÑOR».
- source_word: וְהִקְרִיב אֹתָהּ אֶל הַמִּזְבֵּחַ
  english_pob_choice: and bring it near to the altar
  chosen_spanish: y la acercará al altar
  alternatives_spanish:
  - y la presentará al altar
  - y la llevará al altar
  lexicon: HALOT
  rationale: «הִקְרִיב» conserva su fuerza cultual de acercar/presentar; «la acercará al altar» mantiene la metáfora espacial y la función ritual de la frase hebrea.
theological_decisions:
- issue: Representación del Nombre divino en un contexto sacerdotal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El hebreo usa explícitamente יְהוָה. Conforme al estándar del proyecto, se preserva el Nombre propio en español para evitar la ocultación devocional por una sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de מִנְחָה en un rito sacrificial
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de cereal
  - ofrenda
  rationale: La equivalencia busca mantener la referencia a una ofrenda de grano/cereal propia del sistema levítico, sin reducirla a una «ofrenda» genérica que borre la especificidad cultual.
  doctrine_reference: HALOT / POB lexical tradition for מִנְחָה
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto al término anotado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del Nombre divino, conforme al estándar del proyecto.
  - Se preservó la terminología de מִנְחָה de manera consistente como «ofrenda vegetal» en ambas apariciones.
  - 'Se conservó la secuencia ritual con verbos en futuro de mandato/narración prescriptiva: «tomará», «agitará», «acercará».'
  - Se evitó el calco «grano offering» y se optó por un español culto pero natural, acorde al registro bíblico público.
