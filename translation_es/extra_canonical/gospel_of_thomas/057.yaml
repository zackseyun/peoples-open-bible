base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/057.yaml
  text: Jesus said, "The kingdom of the Father is like a man who has good seed. His enemy came by night and sowed a weed on the good seed. The man did not allow them to pull up the weed. He said to them, 'Lest you say, "We will pull up the weed," and pull up the wheat along with it. For on the day of the harvest, the weeds will appear; they will be pulled up and burned.'"
  footnotes:
  - marker: a weed
    text: The Coptic uses the singular indefinite 'a weed' (ⲟⲩⲍⲓⲍⲁⲛⲓⲟⲛ) here and the singular definite 'the weed' (ⲡⲍⲓⲍⲁⲛⲓⲟⲛ) in the following clauses, before switching to the plural 'the weeds' (ⲛⲍⲓⲍⲁⲛⲓⲟⲛ) at the end. The Greek loanword ζιζάνιον (darnel) is typically plural in the Synoptic parallels.
    reason: textual_variant
  - marker: We will pull up
    text: The Coptic prefix ⲉⲛⲁ- (we will) is a Lycopolitan dialectal variant of the standard Sahidic ⲧⲛⲛⲁ-.
    reason: dialect_note
  - marker: they will be pulled up and burned
    text: Lit. 'they pull them up and they burn them' (active verbs with an indefinite subject, functioning as a passive).
    reason: register_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: false
    changes_summary: Removed the bracketed notes from the main text, slightly smoothed the opening punctuation, and tightened the quoted wording while preserving the established lexical decisions and source sense.
translation:
  language: es
  text: 'Jesús dijo: «El reino del Padre es semejante a un hombre que tenía buena semilla. Su enemigo vino de noche y sembró una cizaña[a] en la buena semilla. El hombre no les permitió arrancar la cizaña. Les dijo: “No sea que digan: ‘Arrancaremos la cizaña’, y arranquen con ella el trigo. Porque en el día de la cosecha, las cizañas[b] aparecerán; las arrancarán y las quemarán[c]”».'
  philosophy: formal
  footnotes:
  - marker: a
    text: El original usa aquí el singular indefinido ‘una cizaña’; en las cláusulas siguientes pasa al singular definido (‘la cizaña’) y al final cambia al plural.
    reason: textual_variant
  - marker: b
    text: Aquí el cóptico cambia al plural (‘las cizañas’), y el español lo refleja de forma explícita para conservar ese matiz del texto fuente.
    reason: textual_variant
  - marker: c
    text: 'Literalmente, el cóptico usa verbos activos con sujeto indefinido: ‘arrancan/queman’; en español se expresa naturalmente como ‘las arrancarán y las quemarán’.'
    reason: register_note
lexical_decisions:
- source_word: ⲙⲛⲧⲣⲣⲟ / kingdom
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  lexicon: Crum / POB audit trail
  rationale: ‘Reino’ mantiene el sustantivo concreto usado por la tradición de traducción y conserva la imagen regia del texto. ‘Reinado’ podría expresar el acto o dominio, pero aquí el contexto narrativo favorece ‘reino’.
- source_word: ⲡⲉⲓⲱⲧ / the Father
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - el Padre
  lexicon: Crum / POB audit trail
  rationale: Se conserva el título relacional directo en español, con mayúscula por referencia divina. La construcción genitiva queda naturalmente como ‘del Padre’.
- source_word: ϭⲣⲟϭ
  english_pob_choice: good seed
  chosen_spanish: buena semilla
  alternatives_spanish:
  - semilla buena
  - semilla buena y sana
  lexicon: Crum 831a
  rationale: El término designa ‘seed’, no ‘field’. ‘Semilla’ es la equivalencia directa y clara en español; se conserva ‘buena’ para reproducir el adjetivo del original.
- source_word: ⲍⲓⲍⲁⲛⲓⲟⲛ
  english_pob_choice: weed / weeds
  chosen_spanish: cizaña
  alternatives_spanish:
  - mala hierba
  - darnel
  lexicon: BDAG / Crum
  rationale: ‘Cizaña’ es la forma española más estable para esta parábola y funciona bien tanto en singular como en plural implícito. ‘Darnel’ sería más técnico, pero menos natural en español; ‘mala hierba’ pierde el eco textual de la parábola.
- source_word: ⲕⲟⲟⲩ
  english_pob_choice: allow them
  chosen_spanish: les permitió
  alternatives_spanish:
  - les dejó
  - les concedió
  lexicon: Crum
  rationale: El verbo expresa permiso. ‘Les permitió’ reproduce con precisión la relación verbal sin sobreparafrasear.
- source_word: ⲉⲛⲁϩⲱⲗⲉ
  english_pob_choice: We will pull up
  chosen_spanish: Arrancaremos
  alternatives_spanish:
  - vamos a arrancar
  - sacaremos
  lexicon: Crum
  rationale: La forma dialectal indica futuro de primera persona plural; el español lo expresa de manera natural con futuro simple. ‘Arrancar’ conserva la fuerza de desarraigar del texto.
- source_word: ⲡⲱϩⲥ
  english_pob_choice: harvest / reaping
  chosen_spanish: cosecha
  alternatives_spanish:
  - siega
  - corte
  lexicon: Crum 282b
  rationale: El término se refiere al tiempo de recolección. ‘Cosecha’ comunica bien la escena agrícola en español; ‘siega’ sería posible pero menos general.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  english_pob_choice: appear
  chosen_spanish: se hará visible
  alternatives_spanish:
  - aparecerá
  - se manifestará
  lexicon: Crum
  rationale: ‘Se hará visible’ conserva el valor de manifestación sin cargar de interpretación teológica adicional. ‘Aparecerá’ también sería válido, pero ‘se hará visible’ refleja mejor la idea de hacerse patente.
theological_decisions:
- issue: Reino del Padre
  english_pob_reading: The kingdom of the Father
  chosen_spanish_reading: El reino del Padre
  alternative_spanish_readings:
  - El reinado del Padre
  - El reino de Dios
  rationale: Se conserva la formulación específica ‘del Padre’ dada por el texto, sin sustituirla por la fórmula sinóptica más común ‘de Dios’.
  doctrine_reference: Uso titular del Padre en el Evangelio de Tomás; no se normaliza hacia la redacción sinóptica.
- issue: Singular/plural de la cizaña
  english_pob_reading: a weed / the weed / the weeds
  chosen_spanish_reading: una cizaña / la cizaña / la cizaña
  alternative_spanish_readings:
  - una mala hierba / las malas hierbas
  - darnel
  rationale: El español no marca tan naturalmente el singular/plural de este préstamo botánico como el griego/cóptico, así que se preserva el sustantivo colectivo ‘cizaña’ y se deja que el contexto sostenga la variación. No se fuerza una pluralidad explícita donde el español la volvería artificiosa.
  doctrine_reference: Respeto al matiz textual sin falsear la fluidez del español.
translation_notes:
  revision_awareness: 'Se corrigió la base semántica siguiendo el control de revisión: el término clave es ‘semilla’, no ‘campo’; se mantuvo la estructura de citación y la secuencia agrícola, y se evitó la lectura errónea que desplazaba la acción al terreno. También se preservó el valor verbal de permiso y la futura cita de los sirvientes.'
  spanish_consistency_notes:
  - Se mantiene ‘Jesús’ y no ‘SEÑOR’, conforme al estilo POB y al texto fuente.
  - Se usa ‘reino’ para ⲙⲛⲧⲣⲣⲟ, consistente con el registro bíblico en español.
  - Se evita ‘Cristo’ porque este dicho no lo requiere y el original nombra a Jesús explícitamente.
  - Se conserva ‘cizaña’ como término estable en español, aunque el original muestre variación morfológica singular/plural.
  - Se usa puntuación española con comillas angulares y comillas internas simples para la cita dentro del discurso directo.
