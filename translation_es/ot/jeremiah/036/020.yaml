    text: 'O: «el secretario».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en los oídos del rey», un modismo que significa «a oídos del rey» o «en presencia del rey».'
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota sobre «escriba», se reemplazó «dieron a conocer» por «le informaron» para reflejar mejor el registro formal de וַיַּגִּידוּ, y se evitó el calco defectuoso «en oídos del rey» mediante «al oído del rey» con una nota que preserva y explica el hebraísmo literal. Así el texto queda más fiel al sentido del original y más natural en español.
