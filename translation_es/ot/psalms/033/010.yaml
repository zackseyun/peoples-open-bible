translation:
  language: es
  text: Yahvé frustra el consejo de las naciones[a]; desbarata los planes de los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: YHWH; tradicionalmente también se vierte «Jehová».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo lleva el nombre propio divino YHWH. En la norma del proyecto en español se conserva el nombre como «Yahvé», en vez de ocultarlo con un título. «Jehová» queda como variante histórica, pero no como forma principal.
- source_word: הֵפִיר
  english_pob_choice: frustrates
  chosen_spanish: frustra
  alternatives_spanish:
  - rompe
  - anula
  - desbarata
  lexicon: HALOT
  rationale: El hiphil de פרר expresa hacer ineficaz o impedir el éxito de un plan. «Frustra» reproduce bien esa fuerza causal y mantiene la relación con el sentido de «frustrates» del texto inglés.
- source_word: עֲצַת
  english_pob_choice: the counsel
  chosen_spanish: el consejo
  alternatives_spanish:
  - el plan
  - el propósito
  - la deliberación
  lexicon: HALOT
  rationale: עֵצָה puede ser consejo, plan o propósito. En este paralelismo, «consejo» conserva el matiz de deliberación colectiva y deja el segundo miembro para «planes».
- source_word: גּוֹיִם
  english_pob_choice: of the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  - de los pueblos
  lexicon: HALOT
  rationale: En este contexto poético, גּוֹיִם se refiere a entidades políticas/corporativas. «Naciones» es la opción más natural en español y sigue la decisión inglesa.
- source_word: הֵנִיא
  english_pob_choice: thwarts
  chosen_spanish: desbarata
  alternatives_spanish:
  - frustra
  - impide
  - hace fracasar
  lexicon: HALOT
  rationale: El verbo comunica impedir que un designio llegue a cumplirse. «Desbarata» expresa bien la idea de echar por tierra un plan y evita una repetición demasiado cercana de «frustra».
- source_word: מַחְשְׁבוֹת
  english_pob_choice: the plans
  chosen_spanish: los planes
  alternatives_spanish:
  - los pensamientos
  - los designios
  - las intenciones
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar pensamientos o designios, aquí el paralelismo con עֲצַת y el sujeto colectivo favorecen «planes».
- source_word: עַמִּים
  english_pob_choice: of the peoples
  chosen_spanish: de los pueblos
  alternatives_spanish:
  - de las naciones
  - de los pueblos grupos
  lexicon: HALOT
  rationale: Se conserva la distinción poética entre גּוֹיִם y עַמִּים. «Pueblos» mantiene esa diferencia y refleja el plural colectivo.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa directamente el Tetragrama. La política del proyecto en español preserva el nombre divino como «Yahvé», manteniendo la transparencia frente al texto hebreo y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado no requiere cambios; la decisión principal es mantener la equivalencia óptima en español con el nombre divino «Yahvé» y un segundo miembro verbal fuerte pero idiomático («desbarata») para evitar repetición innecesaria de «frustra» sin perder el paralelismo.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «naciones» y «pueblos», reflejando גּוֹיִם / עַמִּים.
  - Se evitó «el SEÑOR» para no enmascarar el nombre propio divino.
  - La pareja verbal «frustra / desbarata» conserva el paralelismo sin sonar mecánica en español.
