translation:
  language: es
  text: 'Y Rafael dijo: «Yo sé que los ojos de tu padre se abrirán[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu padre recobrará la vista». El griego dice literalmente: «los ojos de tu padre se abrirán», un modismo para la restauración de la vista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπίσταμαι
  english_pob_choice: I know
  chosen_spanish: Yo sé
  alternatives_spanish:
  - Yo понимаю?
  - Yo entiendo
  - Estoy seguro
  lexicon: BDAG
  rationale: El verbo expresa conocimiento o certeza; «yo sé» reproduce de manera directa y natural esa seguridad sin añadir matices interpretativos.
- source_word: ἀνοίξει
  english_pob_choice: will open
  chosen_spanish: se abrirán
  alternatives_spanish:
  - serán abiertos
  - volverán a abrirse
  - recobrarán la vista
  lexicon: BDAG
  rationale: El griego conserva el giro idiomático de abrir los ojos; en español, el pasivo refleja mejor el valor del futuro y mantiene la imagen literal sin sustituirla por una paráfrasis explicativa.
- source_word: τοὺς ὀφθαλμούς
  english_pob_choice: his eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - sus ojos
  - la vista
  - los ojos de él
  lexicon: BDAG
  rationale: El griego dice literalmente «los ojos»; en español, por economía y naturalidad, la relación posesiva queda clara por el contexto inmediato («tu padre»), de modo que no es necesario repetir «sus».
- source_word: ὁ πατήρ σου
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - tu papá
  - tu progenitor
  lexicon: BDAG
  rationale: La frase se refiere de forma directa al padre de Tobit. «Tu padre» es la forma natural, precisa y digna en español.
- source_word: Ῥαφαήλ
  english_pob_choice: Raphael
  chosen_spanish: Rafael
  alternatives_spanish:
  - Raphael
  lexicon: convención onomástica
  rationale: En español bíblico la forma estándar y reconocible del nombre es «Rafael», que conserva la identificación del personaje sin anglicismo.
theological_decisions:
- issue: Idiomático de la sanidad de la ceguera
  english_pob_reading: Preserve the literal idiom 'your father’s eyes will be opened' in the main text
  chosen_spanish_reading: Conservar «los ojos ... se abrirán» en el texto principal
  alternative_spanish_readings:
  - tu padre recobrará la vista
  - tu padre recuperará la vista
  - se le abrirán los ojos a tu padre
  rationale: El griego usa el modismo de abrir los ojos; la traducción principal lo conserva para no perder la imagen y mantener la cercanía al original, mientras que la nota aclara su sentido de restauración de la vista.
  doctrine_reference: Principios de traducción POB sobre equivalencia óptima y preservación del giro idiomático
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa, que pasó de un sujeto activo (‘tu padre abrirá los ojos’) a una forma pasiva/medio-pasiva (‘los ojos de tu padre se abrirán’). Por eso el español evita una paráfrasis activa y conserva el giro idiomático con valor pasivo.
  spanish_consistency_notes:
  - Se usa «Rafael» para el nombre propio, en línea con el español bíblico estándar.
  - Se conserva «abrirán los ojos» como imagen literal, y la nota explica la equivalencia idiomática con la recuperación de la vista.
  - El texto mantiene un registro sobrio y publicable, sin añadir elementos ausentes del griego.
