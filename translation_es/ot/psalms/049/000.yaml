  - Se conserva la ambigüedad funcional del encabezado, sin forzar autoría ni destinación.
  - ‘Salmo’ se usa como rótulo de género, acorde con el uso bíblico y la naturalidad del español.
  - Las notas al pie replican las alternativas auditadas en el POB inglés, adaptadas al español sin añadir interpretaciones nuevas.
