  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión «insolencia» para מַדְהֵבָה es defendible y está alineada con la revisión inglesa y la nota de incertidumbre léxica. La nota también preserva adecuadamente alternativas significativas.
