translation:
  text: And he saw that the silver had run out from the treasuries[a], and that the taxes of the country were few because of the division and the blow that he had brought upon the land[b], by removing the customs that had existed from former days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the dissension and the calamity that he had inflicted on the land.' The Greek terms can carry broader political and punitive overtones than the more literal 'division' and 'blow.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the established laws' or 'the ancestral customs.' The Greek refers to long-standing norms or ordinances that had been in place from earlier times.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέλιπεν
  chosen: had run out
  alternatives:
  - was exhausted
  - failed
  - was depleted
  lexicon: LSJ
  rationale: The verb indicates depletion/lack. 'Had run out' is idiomatic modern English and fits the perfective sense in context without sounding overly technical.
- source_word: τὸ ἀργύριον
  chosen: the silver
  alternatives:
  - the money
  lexicon: LSJ
  rationale: Literally 'silver'; in context it refers to treasury funds. Retaining 'silver' preserves the concrete wording of the Greek while still being understandable.
- source_word: τῶν θησαυρῶν
  chosen: the treasuries
  alternatives:
  - the treasury stores
  - the royal treasuries
  lexicon: LSJ
  rationale: Plural in Greek, so 'treasuries' is preferred over singular. 'Royal' is contextually possible but not explicit in the verse.
- source_word: οἱ φόροι
  chosen: the taxes
  alternatives:
  - the revenues
  - the tribute payments
  lexicon: LSJ
  rationale: The term refers to fiscal income from the land. 'Taxes' is the clearest modern rendering; 'revenues' is broader and less direct.
- source_word: ὀλίγοι
  chosen: were few
  alternatives:
  - were small
  - were meager
  lexicon: LSJ
  rationale: Predicate adjective with the taxes/revenues as subject. 'Were few' follows the Greek closely, though in English it conveys reduced amount rather than count.
- source_word: χάριν τῆς διχοστασίας
  chosen: because of the division
  alternatives:
  - because of the dissension
  - because of the civil strife
  lexicon: LSJ
  rationale: χάριν with genitive here means 'because of.' διχοστασία denotes division/dissension. 'Division' is formally close; the broader political sense is left implicit rather than over-specified.
- source_word: πληγῆς
  chosen: the blow
  alternatives:
  - the plague
  - the calamity
  - the stroke
  lexicon: LSJ
  rationale: The noun can denote a blow, stroke, or plague. Here it likely refers to the damaging affliction inflicted on the land. 'Blow' preserves the metaphorical force without forcing a medical sense.
- source_word: κατεσκεύασεν ἐπὶ τὴν γῆν
  chosen: had brought upon the land
  alternatives:
  - had inflicted on the land
  - had imposed upon the land
  lexicon: LSJ
  rationale: The construction conveys causing or bringing something upon the land. 'Had brought upon' is natural English and preserves agency.
- source_word: τοῦ ἆραι
  chosen: by removing
  alternatives:
  - by taking away
  - in order to remove
  lexicon: LSJ
  rationale: The articular infinitive can express result or purpose. In this context it explains the means/circumstance connected with the damage done to the land. 'By removing' reads smoothly while preserving the causal link.
- source_word: τὰ νόμιμα
  chosen: the customs
  alternatives:
  - the lawful ordinances
  - the established laws
  - the ancestral customs
  lexicon: LSJ
  rationale: In this context the word refers to established legal/customary practices. 'Customs' is concise and idiomatic; 'ancestral' is likely implied by the following phrase but not explicit in the noun itself.
- source_word: ἀφʼ ἡμερῶν τῶν πρώτων
  chosen: from former days
  alternatives:
  - from the first days
  - from ancient times
  lexicon: LSJ
  rationale: An idiomatic temporal expression referring to long-established practice. 'From former days' preserves the backward-looking sense without sounding archaic.
