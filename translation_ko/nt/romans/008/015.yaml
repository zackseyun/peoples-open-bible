id: ROM.8.15
reference: Romans 8:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐ γὰρ ἐλάβετε πνεῦμα δουλείας πάλιν εἰς φόβον, ἀλλὰ ἐλάβετε πνεῦμα υἱοθεσίας ἐν ᾧ κράζομεν· Αββα ὁ πατήρ·
base_translation:
  language: en
  yaml_path: translation/nt/romans/008/015.yaml
  text: For you did not receive a spirit of slavery leading back into fear[a], but you received the Spirit of adoption as sons, by whom we cry[c][b], “Abba! Father!”
translation:
  language: ko
  text: 여러분은 다시 두려움에 이르는 노예의 영을 받은 것이 아니라, 양자됨의 영을 받았습니다. 그 영 안에서 우리는 「아빠[a], 아버지!」라고 부르짖습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 아람어 ’Αββα(Abba)는 1세기 유대 일상에서 자녀가 아버지를 친밀하게 부르는 호칭. 헬라어 본문은 아람어를 그대로 음역하여 보존하였으므로 한국어에서도 「아빠」로 음역하고 곧이어 「아버지」로 의미를 부연한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα δουλείας
  english_pob_choice: spirit of slavery
  chosen_korean: 노예의 영
  alternatives_korean:
  - 종 됨의 영
  lexicon: BDAG
  rationale: 6장 δοῦλος 정책 일관. 두려움에 매인 노예 신분.
- source_word: πνεῦμα υἱοθεσίας
  english_pob_choice: Spirit of adoption as sons
  chosen_korean: 양자됨의 영
  alternatives_korean:
  - 입양의 영
  - 아들 됨의 영
  lexicon: BDAG
  rationale: υἱοθεσία를 「양자됨」으로 — 본 과제 정책 어휘.
- source_word: κράζομεν
  english_pob_choice: we cry
  chosen_korean: 부르짖습니다
  lexicon: BDAG
  rationale: 강한 외침.
- source_word: Αββα ὁ πατήρ
  english_pob_choice: Abba! Father!
  chosen_korean: 아빠, 아버지!
  lexicon: BDAG
  rationale: 아람어 「아빠」를 그대로 보존하고 헬라어의 부연 통역 「아버지」를 따른다.
theological_decisions:
- issue: 노예의 영 → 양자됨의 영 전환
  chosen_reading: '6장 노예 수사의 종결: 신자는 두려움의 노예가 아니라 양자된 아들로서 친밀하게 「아빠」라 부른다'
  alternative_readings:
  - 「노예가 아닌 자녀의 영」으로 평이하게
  rationale: 바울이 6장에서 노예 수사를 극단까지 밀고 가다가 8:15에서 결정적으로 뒤집는다 — 그러므로 「노예의 영」을 약화시키면 반전의 힘이 사라진다.
  doctrine_reference: 'DOCTRINE.md §1: Contested terms — δοῦλος; preserve true and powerful meaning'
- issue: 「아빠」 아람어 보존
  chosen_reading: 음역 「아빠」 + 부연 「아버지」
  alternative_readings:
  - 「아바」(전통 음역)
  rationale: 바울이 헬라어 본문에 아람어를 그대로 두어 친밀성과 1세기 메시아 공동체의 기도 언어를 보존한 의도를 한국어에서도 동일하게 음역 보존.
  doctrine_reference: 'DOCTRINE.md: Preserve untranslated original-language elements'
