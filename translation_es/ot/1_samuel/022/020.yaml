  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Los nombres propios en formas españolas usuales («Ahimelec», «Abiatar») son aceptables. La decisión de mantener «tras David» con nota alternativa respeta la racionalidad léxica documentada.
