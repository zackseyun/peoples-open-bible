translation:
  language: es
  text: Mis pasos se han mantenido firmes en tus senderos[a][b]; mis pies no han resbalado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Mis pasos están sostenidos en tus senderos”; el hebreo puede entenderse como una petición o como una afirmación de firmeza.'
    reason: alternative_reading
  - marker: b
    text: 'O: “tus sendas”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּמֹךְ
  english_pob_choice: have held fast
  chosen_spanish: se han mantenido firmes
  alternatives_spanish:
  - han sido sostenidos
  - se han afirmado
  - han permanecido firmes
  lexicon: HALOT
  rationale: El verbo תמך expresa sostener, agarrar o mantener con firmeza. Dado el paralelo con “mis pies no han resbalado”, en español “se han mantenido firmes” comunica la estabilidad lograda sin forzar una paráfrasis demasiado explicativa.
- source_word: אֲשֻׁרַי
  english_pob_choice: my steps
  chosen_spanish: mis pasos
  alternatives_spanish:
  - mis pisadas
  - mis andanzas
  - mi andar
  lexicon: HALOT
  rationale: El sustantivo refiere a pasos o a la manera de andar. “Mis pasos” es natural en español y conserva la imagen concreta del caminar.
- source_word: בְּמַעְגְּלוֹתֶיךָ
  english_pob_choice: in your paths
  chosen_spanish: en tus senderos
  alternatives_spanish:
  - en tus caminos
  - en tus sendas
  - en tus veredas
  lexicon: HALOT
  rationale: מַעְגָּל designa una huella, senda o trayectoria de camino. “Senderos” conserva la imagen de un camino marcado sin volverla abstracta; “caminos” sería más general y “sendas” más literaria.
- source_word: בַּל
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  - de ningún modo
  lexicon: HALOT
  rationale: La partícula poética de negación se traduce de manera directa con “no” en la segunda cola.
- source_word: נָמֹטּוּ
  english_pob_choice: have not slipped
  chosen_spanish: han resbalado
  alternatives_spanish:
  - han vacilado
  - se han tambaleado
  - han sido sacudidos
  lexicon: HALOT
  rationale: El verbo מוט en este contexto expresa deslizarse o perder estabilidad. “Han resbalado” mantiene la imagen corporal y es el equivalente más claro en español junto a “pies”.
- source_word: פְעָמָי
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - mis pasos
  - mis plantas
  - mis huellas
  lexicon: HALOT
  rationale: Aunque el sustantivo puede aludir a pasos o pisadas, con el verbo “resbalar” el español pide “pies” para conservar la fuerza idiomática y la paralelismo corporal del verso.
theological_decisions:
- issue: Ambigüedad del hebreo entre una afirmación de firmeza y una petición de sostén
  english_pob_reading: The Hebrew may be understood as a request or as a statement of steadfastness.
  chosen_spanish_reading: El verso se deja como afirmación de firmeza, sin borrar la posibilidad de leer también un matiz implícito de dependencia de Yahvé.
  alternative_spanish_readings:
  - Mis pasos están sostenidos en tus senderos; mis pies no han resbalado.
  - Sostén mis pasos en tus senderos, para que mis pies no resbalen.
  rationale: El hebreo admite una lectura perfectiva/estativa o una lectura de súplica. La POB inglesa preserva esa tensión en nota; en el texto principal español se prefiere la afirmación retrospectiva porque encaja con la segunda cola, pero se documenta la alternativa.
  doctrine_reference: Sal 17:5; cf. la ambigüedad aspectual hebrea del imperfecto/performativo en poesía.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió “tracks” por “paths” para ajustarse mejor a מַעְגְּלוֹתֶיךָ. En español, “senderos” mantiene la imagen concreta y evita la sobreabstracción de “caminos” sin perder la naturalidad.
  spanish_consistency_notes:
  - Se usó “Yahvé” en línea con el criterio del proyecto para el nombre divino cuando aparezca explícito; aquí no aparece.
  - 'Se mantuvo paralelismo corporal: “pasos” / “pies”.'
  - La negación se formuló con el simple “no”, acorde con el carácter poético del hebreo.
