base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/006/022.yaml
  text: But what wisdom is and how it came to be[a], I will declare, and I will not hide mysteries from you; rather, from the beginning of its origin I will trace it out, and I will set the knowledge of it in the open[b], and I will by no means pass by the truth.
  footnotes:
