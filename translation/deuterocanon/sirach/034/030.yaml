id: SIR.34.30
reference: Sirach 34:30
source:
  edition: lxx-swete-1909
  text: πληθύνει μέθη θυμὸν ἄφρονος εἰς πρόσκομμα, ἐλαττῶν ἰσχὺν καὶ προσποιοῦν τραύματα.
  language: Greek
  pages: []
  confidence: high
translation:
  text: Drunkenness multiplies the anger of a foolish man into stumbling[a], diminishing strength and producing wounds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the anger of a fool leads to a stumbling block'; πρόσκομμα can denote an occasion for stumbling or downfall.
    reason: lexical_alternative
lexical_decisions:
- source_word: πληθύνει
  chosen: multiplies
  alternatives:
  - increases
  - makes abundant
  lexicon: LSJ
  rationale: The verb denotes increase or multiplication. 'Multiplies' preserves the vivid causative force and fits the object-complement structure in English.
- source_word: μέθη
  chosen: drunkenness
  alternatives:
  - intoxication
  - drinking bout
  lexicon: LSJ
  rationale: The noun refers to a state of intoxication rather than merely the act of drinking. 'Drunkenness' is natural English and keeps the moral-wisdom register of the verse.
- source_word: θυμὸν
  chosen: anger
  alternatives:
  - temper
  - wrath
  - passion
  lexicon: LSJ
  rationale: In this context of the fool under the influence of drink, θυμός most naturally refers to heated anger or temper. 'Anger' is the clearest central sense.
- source_word: ἄφρονος
  chosen: of a foolish man
  alternatives:
  - of a fool
  - of the senseless man
  lexicon: LSJ
  rationale: The genitive modifies 'anger.' The singular masculine is retained as 'man' in keeping with the project's gender-accurate policy for representative masculine forms in wisdom literature.
- source_word: εἰς πρόσκομμα
  chosen: into stumbling
  alternatives:
  - to a stumbling block
  - into offense
  - to ruin
  lexicon: LSJ
  rationale: πρόσκομμα literally involves stumbling or an occasion for falling. 'Into stumbling' preserves the metaphor without overinterpreting it as purely moral offense or total ruin.
- source_word: ἐλαττῶν
  chosen: diminishing
  alternatives:
  - reducing
  - lessening
  lexicon: LSJ
  rationale: The participle explains one effect of drunkenness. 'Diminishing' is idiomatic and keeps the ongoing/resultative nuance.
- source_word: ἰσχὺν
  chosen: strength
  alternatives:
  - power
  - vigor
  lexicon: LSJ
  rationale: In wisdom context this refers broadly to bodily or personal strength. 'Strength' is the most straightforward rendering.
- source_word: προσποιοῦν
  chosen: producing
  alternatives:
  - causing
  - bringing about
  lexicon: LSJ
  rationale: The participle indicates an added harmful effect. 'Producing' is concise and preserves the causative sense.
- source_word: τραύματα
  chosen: wounds
  alternatives:
  - injuries
  - blows
  lexicon: LSJ
  rationale: The noun denotes physical wounds or injuries. 'Wounds' keeps the concrete force and pairs well with the violence implied by increased anger.
