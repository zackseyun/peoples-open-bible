base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/018/010.yaml
  text: There must not be found among you anyone who makes his son or his daughter pass through the fire[a], one who practices divination, tells fortunes, interprets omens[d][c][b], or practices sorcery.
  footnotes:
