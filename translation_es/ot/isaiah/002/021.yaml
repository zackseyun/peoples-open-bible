    reason: lexical_alternative
  - marker: b
    text: O «cuando él se levante para hacer temblar la tierra».
    reason: lexical_alternative
  revision_rationale: Se ajusta «por temor de Yahvé» a «ante el terror de Yahvé» para reflejar mejor מִפְּנֵי פַּחַד y la decisión léxica auditada. También se recoloca la nota [b] sobre «se levante», ya que la alternativa afecta a toda la cláusula temporal-final y no a «su majestad».
