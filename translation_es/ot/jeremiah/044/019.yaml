revisions:
- from: Y cuando quemábamos incienso a la Reina del Cielo y le derramábamos libaciones[a], ¿acaso lo hacíamos sin el consentimiento de nuestros maridos, al hacerle tortas para representarla[b] y derramarle libaciones?
  to: Y cuando quemábamos incienso a la Reina del Cielo y le derramábamos libaciones, ¿acaso lo hacíamos aparte de nuestros maridos, que le hicimos tortas para representarla[a] y le derramamos libaciones?
  rationale: Se elimina la expansión interpretativa «consentimiento» para ajustarse al hebreo, se simplifica la sintaxis para reflejar mejor la pregunta retórica del original, y se conserva solo la nota lexicalmente significativa sobre «representarla».
