translation:
  language: es
  text: Por tanto[a], he aquí, yo estoy contra los profetas, declara Yahvé, los que roban mis palabras, cada uno de las de su prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «robando mis palabras, cada hombre de su prójimo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa la consecuencia lógica y profética del juicio anterior sin sonar demasiado coloquial.
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: he aquí que yo estoy
  alternatives_spanish:
  - he aquí, yo estoy
  - mira, yo estoy
  lexicon: HALOT
  rationale: Conserva el énfasis de la auto-presentación divina y su tono de anuncio solemne en español.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: En este contexto de juicio y oposición, 'contra' comunica mejor la postura hostil que una referencia neutra.
- source_word: הַנְּבִאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  lexicon: HALOT
  rationale: Correspondencia directa y natural para el sustantivo plural referido a quienes pretenden hablar en nombre de Dios.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se preserva la fórmula profética con el nombre divino YHWH según la convención del proyecto, manteniendo solemnidad sin sustituir el nombre por un título.
- source_word: מְגַנְּבֵי
  english_pob_choice: who steal
  chosen_spanish: los que roban
  alternatives_spanish:
  - los que hurtan
  - los que sustraen
  lexicon: HALOT
  rationale: El participio describe una característica continua; 'roban' en relativa sustantivada conserva la acusación con fuerza directa y naturalidad en español.
- source_word: דְבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  - mi mensaje
  lexicon: HALOT
  rationale: El plural hebreo se refleja mejor con el plural español, evitando reducir la acusación a una abstracción singular.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - uno por uno
  lexicon: HALOT
  rationale: Recoge el valor distributivo de אִישׁ en la frase sin introducir una lectura excesivamente literal o torpe.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - de parte de
  lexicon: HALOT
  rationale: La preposición se expresa de manera natural en español como posesión/origen en la construcción 'de su prójimo'.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su semejante
  - su compañero
  lexicon: HALOT
  rationale: '''Prójimo'' es claro y bíblicamente reconocible en español para רֵעַ en relaciones interpersonales, y mantiene la idea de un cercano o asociado.'
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue el criterio del proyecto de transliterar el Tetragrámaton como nombre propio, evitando la sustitución por un título y preservando la identidad personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se revisó el paralelo inglés auditado y no se detectaron revisiones aplicadas; la versión española sigue la misma lectura base con ajustes naturales de sintaxis y léxico en español.
  spanish_consistency_notes:
  - Se usa Yahvé para יְהוָה conforme al criterio del proyecto.
  - Se conserva la acusación en plural 'mis palabras' por corresponder al hebreo.
  - La estructura distributiva 'cada uno de su prójimo' mantiene el matiz masculino singular del hebreo sin neutralizarlo.
