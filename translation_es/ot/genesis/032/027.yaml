translation:
  language: es
  text: 'Y él dijo[a]: «Déjame ir, porque ha salido[b] la aurora». Pero él dijo[c]: «No te dejaré ir a menos que me bendigas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Suéltame» o «Despídeme».
    reason: lexical_alternative
  - marker: b
    text: O, «porque está amaneciendo».
    reason: lexical_alternative
  - marker: c
    text: El hebreo no identifica explícitamente a los hablantes en este versículo; su identidad se infiere del relato circundante.
    reason: cultural_note
lexical_decisions:
- source_word: שַׁלְּחֵנִי
  english_pob_choice: Let me go
  chosen_spanish: Déjame ir
  alternatives_spanish:
  - Suéltame
  - Despídeme
  - Envíame lejos
  lexicon: HALOT
  rationale: El imperativo de שׁלח con sufijo de 1cs expresa pedir ser soltado/enviado. En español, «Déjame ir» transmite de manera natural la petición en este contexto de forcejeo, sin perder el valor verbal del mandato.
- source_word: כִּי עָלָה הַשָּׁחַר
  english_pob_choice: for the dawn has risen
  chosen_spanish: porque ha salido la aurora
  alternatives_spanish:
  - porque amanece
  - porque ha despuntado la aurora
  - pues la aurora ha subido
  lexicon: HALOT
  rationale: עָלָה con הַשָּׁחַר comunica la imagen de la aurora que «sube» o aparece. «Ha salido la aurora» conserva esa imagen en español natural; «porque» refleja bien la causalidad de כִּי.
- source_word: לֹא אֲשַׁלֵּחֲךָ
  english_pob_choice: I will not let you go
  chosen_spanish: No te dejaré ir
  alternatives_spanish:
  - No te soltaré
  - No te enviaré lejos
  - No te soltaré ni te dejaré
  lexicon: HALOT
  rationale: La negación con imperfecto expresa una negativa firme. Repetir «dejar ir» mantiene el paralelismo con la primera petición y conserva el intercambio verbal del verso.
- source_word: כִּי אִם
  english_pob_choice: unless
  chosen_spanish: sino hasta que
  alternatives_spanish:
  - a menos que
  - excepto que
  - si no
  lexicon: HALOT
  rationale: La combinación introduce excepción/condición. En español, «sino hasta que» comunica bien la idea de no soltarlo hasta que ocurra la bendición, manteniendo la fuerza condicional sin forzar un calco rígido.
- source_word: בֵּרַכְתָּנִי
  english_pob_choice: you bless me
  chosen_spanish: me bendigas
  alternatives_spanish:
  - me hayas bendecido
  - me bendijeras
  - me bendigas a mí
  lexicon: HALOT
  rationale: Aunque el hebreo usa perfecto, el sentido en contexto es la acción requerida antes de soltarlo. El subjuntivo presente en español expresa con naturalidad la condición deseada/pendiente.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  english_pob_choice: And he said ... But he said
  chosen_spanish: Y él dijo ... Pero él dijo
  alternatives_spanish:
  - Y dijo ... y dijo
  - Entonces dijo ... pero dijo
  lexicon: HALOT
  rationale: Se conserva el sujeto implícito con pronombres para mantener la ambigüedad narrativa del hebreo. «Pero» en la segunda réplica refleja la oposición del intercambio.
theological_decisions:
- issue: Identidad de los hablantes
  english_pob_reading: Retain generic pronouns ('he said') without specifying 'the man,' 'Jacob,' or 'God/angel' in the verse itself.
  chosen_spanish_reading: Mantener «él dijo» sin identificar explícitamente al hablante.
  alternative_spanish_readings:
  - El hombre dijo
  - Jacob dijo
  - El ángel dijo
  rationale: El hebreo no nombra a los interlocutores en este versículo; identificarlos introduciría interpretación desde el contexto más amplio. Conservar la ambigüedad preserva la tensión narrativa del pasaje.
  doctrine_reference: Preservar la tensión teológica y narrativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado: se conserva la ambigüedad de los hablantes, el valor causal de כִּי, la negación enfática y la relación entre la petición de soltar y la bendición exigida. No se requieren revisiones respecto al último pase estable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «aurora» para reflejar la imagen poética de הַשָּׁחַר sin volverla arcaica.
  - La segunda cláusula usa «sino hasta que» para evitar una traducción demasiado literal de כִּי אִם que sonaría poco natural en español.
