review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo: los levitas guardan el encargo de Aarón y el de toda la tienda, se les prohíbe acercarse a los objetos más santos y al altar, y la advertencia de muerte incluye a ambos grupos. Sin embargo, hay dos desajustes importantes con la evidencia y el rastro POB: la nota [a] está anclada en «tienda» aunque explica כְּלֵי הַקֹּדֶשׁ, y la cláusula final «para que no mueran ni ellos ni ustedes» suaviza el valor admonitorio de פן/לֹא…גַם הֵם גַם אַתֶּם mejor representado aquí como «no sea que mueran tanto ellos como ustedes» o equivalente. Además, «ustedes» cambia innecesariamente la segunda persona respecto de «tu».'
  spanish_quality_summary: El español es claro y mayormente natural. «Guardarán tu encargo» y «toda la tienda» son legibles, aunque «ustedes» junto a «tu» introduce una mezcla de tratamiento poco elegante en un mismo enunciado. «Utensilios sagrados» funciona bien; la coordinación con «ni al altar» es idiomática. La principal mejora estilística y semántica es hacer más directa la advertencia final y mantener coherencia pronominal con «tú».
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La elección «tienda» para הָאֹהֶל sigue el razonamiento documentado. «Utensilios sagrados» es aceptable para כְּלֵי הַקֹּדֶשׁ, aunque conviene conservar la alternativa en nota correctamente anclada. La revisión también mantiene la distinción entre Aarón y los levitas sin introducir terminología ajena.
  issues:
  - severity: high
    issue: La nota [a] está colocada en «tienda» pero su contenido explica «כְּלֵי הַקֹּדֶשׁ / utensilios sagrados».
    rationale: 'Esto rompe la trazabilidad del aparato crítico: el marcador debe aparecer exactamente en la palabra o frase a la que comenta.'
  - severity: medium
