review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal del hebreo: pobreza relativa frente a la valuación fijada, comparecencia ante el sacerdote, y nueva tasación según la capacidad económica del que hace el voto. Sin embargo, dos elecciones principales necesitan ajuste para mayor fidelidad y naturalidad: ''valuación'' suena poco idiomático en español bíblico general, y el texto principal conserva de forma demasiado literal el modismo ''alcance la mano'', cuando el propio audit trail inglés lo naturalizó en el texto principal y reservó la literalidad para nota.'
  spanish_quality_summary: El español es en general claro, pero 'valuación' resulta poco natural frente a 'tasación' o 'valoración', y 'lo que alcance la mano del que hace el voto' suena rígido y poco fluido. 'Será presentado delante del sacerdote' es aceptable, aunque 'será hecho comparecer ante el sacerdote' reflejaría más de cerca el procedimiento formal; no es indispensable cambiarlo. Conviene usar una redacción más natural y eclesialmente legible sin perder el tecnicismo legal.
  glossary_alignment: No hay conflicto con la terminología teológica principal del proyecto. A nivel léxico, para עֵרֶךְ en Levítico 27 conviene una forma técnica y natural en español como 'tasación' mejor que 'valuación'. Para אֲשֶׁר תַּשִּׂיג יַד, el sentido debe expresarse en el texto principal como capacidad económica ('pueda pagar' / 'pueda costear'), dejando la imagen literal de 'la mano alcanza' en nota.
  issues:
  - severity: medium
    issue: Uso de 'valuación' en el texto principal
    rationale: Aunque entendible, 'valuación' es poco natural en español general y menos idiomático que 'tasación' en un contexto legal-financiero de Levítico 27. El source y el audit trail exigen una noción técnica de valor fijado; 'tasación' la comunica mejor.
  - severity: medium
    issue: 'Modismo hebreo demasiado literal en el texto principal: ''lo que alcance la mano del que hace el voto'''
    rationale: El hebreo expresa capacidad económica mediante un modismo. El audit trail inglés decidió naturalizarlo en el texto principal y dejar la forma literal en nota. En español, mantenerlo literalmente vuelve la frase torpe y menos clara para lectores comunes.
  - severity: low
    issue: La nota [a] formula de manera poco natural la alternativa
    rationale: La alternativa 'más que tu valuación' no suena idiomática en español. Conviene explicar la opción literal como 'que tu tasación' o una formulación equivalente, manteniendo la observación comparativa.
  revised_spanish_text: Pero si es demasiado pobre para tu tasación[a], entonces será presentado ante el sacerdote, y el sacerdote lo tasará[b]; el sacerdote lo tasará según lo que pueda pagar el que hace el voto.
  revised_footnotes:
