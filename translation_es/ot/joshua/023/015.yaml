  text: וְ/הָיָ֗ה כַּ/אֲשֶׁר בָּ֤א עֲלֵי/כֶם֙ כָּל הַ/דָּבָ֣ר הַ/טּ֔וֹב אֲשֶׁ֥ר דִּבֶּ֛ר יְהוָ֥ה אֱלֹהֵי/כֶ֖ם אֲלֵי/כֶ֑ם כֵּן֩ יָבִ֨יא יְהוָ֜ה עֲלֵי/כֶ֗ם אֵ֚ת כָּל הַ/דָּבָ֣ר הָ/רָ֔ע עַד הַשְׁמִיד֣/וֹ אוֹתְ/כֶ֗ם מֵ֠/עַל הָ/אֲדָמָ֤ה הַ/טּוֹבָה֙ הַ/זֹּ֔את אֲשֶׁר֙ נָתַ֣ן לָ/כֶ֔ם יְהוָ֖ה אֱלֹהֵי/כֶֽם־־־־׃
