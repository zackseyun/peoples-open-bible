  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Aram», «siervos» y «rey de Israel» están bien. La expresión «está del lado del rey de Israel» es una buena explicitación contextual de אֶל מֶלֶךְ יִשְׂרָאֵל, y debe ser la nota alternativa, no la principal.
