review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del hebreo: עֹלַת תָּמִיד = "holocausto regular", הָעֲשֻׂיָה בְּהַר סִינַי = "hecho en el monte Sinaí", לְרֵיחַ נִיחֹחַ = modismo de aceptación sacrificial, y לַיהוָה = "a Yahvé" conforme a la política del proyecto. Sin embargo, אִשֶּׁה no queda bien representado por "ofrenda encendida", porque el rastro POB inglés decidió explícitamente "food offering" y documentó "offering by fire" solo como alternativa tradicional. En español, la elección actual desplaza el sentido aprobado.'
  spanish_quality_summary: El texto es legible y digno, pero requiere un ajuste léxico menor para alinearse mejor con la decisión auditada y sonar más natural en español cultual moderno. "Olor agradable" es aceptable, aunque "aroma agradable" suele sonar más idiomático; no obstante, no obliga revisión. El principal problema es "ofrenda encendida", que suena algo extraño y no refleja la justificación léxica documentada.
  glossary_alignment: '"Yahvé" está correctamente usado. "Holocausto" para עֹלָה y "regular" para תָּמִיד están bien alineados. La divergencia importante está en אִשֶּׁה: el proyecto aquí favorece el valor idiomático "food offering", por lo que en español debe reflejarse como "ofrenda de alimento" o equivalente, dejando "ofrenda encendida/por fuego" como nota tradicional.'
  issues:
  - severity: medium
    issue: אִשֶּׁה se tradujo como "ofrenda encendida" en lugar de reflejar la decisión auditada "food offering".
    rationale: El expediente inglés documenta que, aunque tradicionalmente se traduce "offering by fire", la elección principal aprobada es "a food offering" por su valor idiomático en contexto sacerdotal. "Ofrenda encendida" conserva el elemento fuego pero no el sentido léxico adoptado por el POB y además suena menos natural en español.
  - severity: low
    issue: La nota d presenta la opción tradicional como si fuera la principal en español.
    rationale: Si el texto principal se corrige a "ofrenda de alimento", la nota puede conservar "ofrenda encendida para Yahvé" como tradicional. Así se preserva correctamente la relación entre lectura principal y alternativa.
  revised_spanish_text: Es el holocausto regular[a], hecho en el monte Sinaí[b] como olor agradable[c], una ofrenda de alimento[d] a Yahvé.
