translation:
  language: es
  text: Y Menelao dejó a Lisímaco, su propio hermano, como sucesor del sumo sacerdocio, mientras Sostrato dejó a Crates[a], el que estaba sobre los chipriotas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el oficial a cargo de los chipriotas» o «el gobernador sobre los chipriotas». El griego no especifica con precisión el cargo administrativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέλιπεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - abandonó
  - dejó en su lugar
  lexicon: LSJ
  rationale: El verbo griego puede ser simplemente 'dejar' o 'dejar atrás'; en contexto implica designar a alguien como sucesor. 'Dejó' conserva la forma verbal del griego sin forzar una formulación más interpretativa.
- source_word: τῆς ἀρχιερωσύνης διάδοχον
  english_pob_choice: as successor to the high priesthood
  chosen_spanish: como sucesor del sumo sacerdocio
  alternatives_spanish:
  - como sucesor en el sumo sacerdocio
  - para suceder en el sumo sacerdocio
  lexicon: LSJ
  rationale: διάδοχον es 'sucesor', y τῆς ἀρχιερωσύνης nombra el oficio. 'Sumo sacerdocio' es la manera más natural y fiel en español para mantener explícita la función.
- source_word: τὸν ἑαυτοῦ ἀδελφόν
  english_pob_choice: his own brother
  chosen_spanish: su propio hermano
  alternatives_spanish:
  - su hermano
  lexicon: LSJ
  rationale: ἑαυτοῦ añade énfasis reflexivo. 'Su propio hermano' preserva esa fuerza mejor que la forma simple.
- source_word: τὸν ἐπὶ τῶν Κυπρίων
  english_pob_choice: the one over the Cyprians
  chosen_spanish: el que está sobre los ciprotes
  alternatives_spanish:
  - el oficial a cargo de los ciprotes
  - el gobernador sobre los ciprotes
  - el que está a cargo de Chipre
  lexicon: LSJ
  rationale: La construcción griega no especifica con precisión un título administrativo. 'El que está sobre los ciprotes' mantiene la ambigüedad y reproduce la relación de autoridad sin convertirla en un cargo más preciso de lo que permite el texto. Se evita 'Chipre' porque el genitivo plural Κυπρίων se refiere a los ciprotes como pueblo.
translation_notes:
  revision_awareness: No hubo cambios sustanciales en la revisión más reciente; el texto se mantiene conforme al pasaje griego y al rastro auditado en inglés.
  spanish_consistency_notes:
  - Se conservó 'sumo sacerdocio' para τῆς ἀρχιερωσύνης, en línea con la función religiosa explícita del griego.
  - Se mantuvo una fórmula relativamente literal en 'el que está sobre los ciprotes' para no sobreinterpretar el título de Crates.
  - Se usó 'Lisímaco' y 'Crates' como formas castellanas habituales de los nombres propios griegos.
