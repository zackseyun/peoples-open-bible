translation:
  language: es
  text: 'Y los que estaban en la ciudad vieron que los judíos habían logrado el control de la ciudad como querían, y perdieron el ánimo, y clamaron al rey con una súplica, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ ὑπὸ τῆς πόλεως
  english_pob_choice: those in the city
  chosen_spanish: los que estaban en la ciudad
  alternatives_spanish:
  - los de la ciudad
  - los habitantes de la ciudad
  - los que estaban bajo la ciudad
  lexicon: LSJ
  rationale: El griego usa una expresión referencial para el grupo dentro de la ciudad, no un sentido espacial literal de «bajo». En español, «los que estaban en la ciudad» mantiene la referencia sin forzar una lectura extraña.
- source_word: κατεκράτησαν
  english_pob_choice: had gained control
  chosen_spanish: habían tomado control
  alternatives_spanish:
  - habían prevalecido sobre
  - habían conquistado
  - habían llegado a ser dueños de
  lexicon: LSJ
  rationale: κρατέω con genitivo expresa dominio o control efectivo. «Habían tomado control» conserva ese valor resultativo de manera natural en español sin añadir más violencia de la que el verbo exige.
- source_word: τῆς πόλεως
  english_pob_choice: of the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - sobre la ciudad
  lexicon: LSJ
  rationale: El genitivo se integra en español con «de la ciudad» dentro de la locución verbal «tomar control de». Esta construcción refleja bien la dependencia sintáctica del griego.
- source_word: ὡς ἠβούλοντο
  english_pob_choice: as they wished
  chosen_spanish: como ellos querían
  alternatives_spanish:
  - como deseaban
  - tal como lo habían querido
  lexicon: LSJ
  rationale: La cláusula indica que el dominio de los judíos coincidió con su intención. «Como ellos querían» es fiel y claro en español contemporáneo.
- source_word: ἠσθένησαν ταῖς διανοίαις αὐτῶν
  english_pob_choice: they lost heart
  chosen_spanish: desfallecieron en su ánimo
  alternatives_spanish:
  - perdieron el ánimo
  - se desanimaron
  - quedaron sin fuerza mental
  lexicon: LSJ
  rationale: 'Literalmente: «se debilitaron en sus pensamientos/ánimos». La expresión española conserva la idea de debilitamiento interior; «desfallecieron en su ánimo» mantiene la fuerza idiomática sin reducirlo solo a una emoción pasajera.'
- source_word: ἐκέκραξαν πρὸς τὸν βασιλέα
  english_pob_choice: they cried out to the king
  chosen_spanish: clamaron al rey
  alternatives_spanish:
  - gritaron al rey
  - alzaron su clamor al rey
  - clamaron ante el rey
  lexicon: LSJ
  rationale: κράζω es un verbo fuerte de clamor. «Clamaron al rey» preserva la intensidad y suena natural en español bíblico actual.
- source_word: μετὰ δεήσεως
  english_pob_choice: with a plea
  chosen_spanish: con una súplica
  alternatives_spanish:
  - con una petición ferviente
  - con ruego
  - en súplica
  lexicon: LSJ
  rationale: δέησις denota petición urgente o súplica. «Con una súplica» comunica ese matiz solemne y evita debilitarlo a una simple petición.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - y dijeron
  lexicon: LSJ
  rationale: El participio introduce la cita directa del versículo siguiente. «Diciendo» mantiene la transición sin agregar conectores que el griego no exige.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el estado revisado del inglés auditado, especialmente en la eliminación de cualquier equivalente de «when» y en la conservación del orden causal/narrativo del griego: observan, se desaniman, luego claman al rey. No se han añadido notas textuales porque el pasaje no presenta variantes relevantes en el paquete provisto.'
  spanish_consistency_notes:
  - Se mantuvo «judíos» para οἱ Ἰουδαῖοι, conforme al uso estándar de POB en este pasaje.
  - Se usó lenguaje sobrio y publicable, evitando arcaísmos innecesarios.
  - No se introdujo «Cristo», «SEÑOR» ni otras terminologías no pertinentes al versículo.
  - Se conservó el valor intensivo de los verbos de percepción y clamor sin exageración interpretativa.
