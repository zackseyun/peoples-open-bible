translation:
  language: es
  text: Durante siete días harán expiación por el altar, lo purificarán y lo consagrarán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «llenar su mano», un modismo cultual que significa instalar, consagrar u ordenar para el servicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: For seven days
  chosen_spanish: Por siete días
  alternatives_spanish:
  - Durante siete días
  - Siete días
  lexicon: HALOT
  rationale: El hebreo expresa duración; en español, «Por siete días» comunica con naturalidad el lapso durante el cual se realizan las acciones.
- source_word: יְכַפְּרוּ
  english_pob_choice: they shall make atonement
  chosen_spanish: harán expiación
  alternatives_spanish:
  - harán atonamiento
  - expiarán
  lexicon: HALOT
  rationale: En contexto ritual sacerdotal, כפר tiene fuerza cultual de expiación. «Harán expiación» preserva el valor técnico sin caer en una paráfrasis doctrinalmente más cargada.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del objeto cultual nombrado en el texto.
- source_word: וְטִהֲרוּ אֹתוֹ
  english_pob_choice: and cleanse it
  chosen_spanish: lo purificarán
  alternatives_spanish:
  - lo limpiarán
  - lo limpiarán ritualmente
  lexicon: HALOT
  rationale: טהר en contexto ritual puede ser «purificar» o «limpiar». «Purificarán» conserva el matiz ceremonial y es natural en español bíblico contemporáneo.
- source_word: וּמִלְאוּ יָדוֹ
  english_pob_choice: and they shall consecrate it
  chosen_spanish: lo consagrarán
  alternatives_spanish:
  - lo dedicarán
  - lo instalarán para el servicio
  - llenarán su mano
  lexicon: HALOT
  rationale: El hebreo usa el idiomático «llenar la mano», que en español literal sería opaco. Como el referente es el altar, «consagrarán» reproduce la función cultual de instalación/dedicación, manteniendo la decisión final del audit trail inglés y evitando la palabra más específica «ordenar» aplicada a una cosa.
theological_decisions:
- issue: Cómo reflejar el idiomático וּמִלְאוּ יָדוֹ aplicado al altar
  english_pob_reading: and they shall consecrate it
  chosen_spanish_reading: y lo consagrarán
  alternative_spanish_readings:
  - y lo ordenarán
  - y llenarán su mano
  - y lo dedicarán
  rationale: El idioma hebreo literal («llenar la mano») es una expresión cultual de instalación o dedicación. En español, «consagrarán» comunica el sentido funcional sin introducir una terminología extraña para un altar. Se preserva así la tensión entre literalidad e inteligibilidad sin perder el trasfondo ritual.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El inglés auditado pasó de «ordain it» a «consecrate it» para reflejar mejor el modismo. La presente versión sigue esa revisión con «lo consagrarán», que es natural en español y mantiene la instalación cultual del altar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito sólo donde aparezca el Tetragrámaton; en este versículo no aparece.
  - «Expiación» y «purificar» conservan la secuencia ritual de dos verbos distintos, evitando fusionarlos en una sola idea.
  - La nota al pie preserva la transparencia del modismo hebreo sin forzar una traducción literal en el texto principal.
