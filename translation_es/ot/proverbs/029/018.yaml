translation:
  language: es
  text: Donde no hay visión[a], un pueblo se desenfrena[b]; pero el que guarda la ley[c], dichoso[d] es él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «revelación» o «visión profética». El hebreo se refiere a la revelación divina, no meramente a planes o ambición humanos.
    reason: lexical_alternative
  - marker: b
    text: O «corre desbocado» / «está sin freno».
    reason: lexical_alternative
  - marker: c
    text: O «instrucción».
    reason: lexical_alternative
  - marker: d
    text: O «bienaventurado es él».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵין
  english_pob_choice: Where there is no
  chosen_spanish: Donde no hay
  alternatives_spanish:
  - En la ausencia de
  - Sin
  lexicon: HALOT
  rationale: La construcción expresa una condición circunstancial de carencia. «Donde no hay» suena natural en español y conserva el valor proverbial de situación-consecuencia sin volverlo mecánico.
- source_word: חָזוֹן
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - revelación
  - visión profética
  lexicon: HALOT
  rationale: «Visión» mantiene la forma tradicional y amplia del término, pero en la nota se aclara que se trata de revelación divina/profética, no de mera planificación humana.
- source_word: יִפָּרַע
  english_pob_choice: cast off restraint
  chosen_spanish: se desenfrena
  alternatives_spanish:
  - se desborda
  - se desmanda
  - vive sin freno
  lexicon: HALOT
  rationale: El verbo refleja la idea de quedar sin freno o control. «Se desenfrena» comunica bien el sentido reflexivo/social en un español claro y digno, sin perder la fuerza del hebreo.
- source_word: עָם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - un pueblo colectivo
  - la gente
  lexicon: HALOT
  rationale: El sustantivo es colectivo y singular. «Un pueblo» preserva esa fuerza colectiva sin restringirlo a una nación concreta en el texto principal.
- source_word: וְשֹׁמֵר
  english_pob_choice: but the one who keeps
  chosen_spanish: pero el que guarda
  alternatives_spanish:
  - y el que guarda
  - pero quien guarda
  lexicon: HALOT
  rationale: El participio presenta a una persona característica. «El que guarda» es natural en español y mantiene el contraste con el primer hemistiquio; la conjunción adversativa está bien justificada por el paralelismo antitético.
- source_word: תּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: En este contexto sapiencial, תּוֹרָה puede significar instrucción, pero «la ley» preserva mejor su peso normativo y covenantal en español. Se deja la alternativa implícita en la decisión léxica por si el lector la necesita conceptualmente.
- source_word: אַשְׁרֵהוּ
  english_pob_choice: happy is he
  chosen_spanish: feliz es él
  alternatives_spanish:
  - bienaventurado es él
  - dichoso es él
  lexicon: HALOT
  rationale: La forma expresa una bienaventuranza singular masculina. «Feliz es él» conserva el valor de beatitud proverbial con un español actual; «bienaventurado» puede sonar más eclesiástico y cargar con resonancias posteriores.
theological_decisions:
- issue: Sentido de חָזוֹן como revelación divina
  english_pob_reading: '''vision'' refers to revelatory/prophetic vision from God, not merely human ambition or strategic planning.'
  chosen_spanish_reading: «Visión» se entiende como revelación profética/divina, no como simple visión humana o programa organizacional.
  alternative_spanish_readings:
  - visión como meta o plan
  - dirección o liderazgo
  rationale: El hebreo חָזוֹן suele designar una revelación recibida por el profeta. El texto principal conserva «visión» por claridad y tradición, mientras la nota evita una lectura moderna de motivación o estrategia.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor del singular masculino en אַשְׁרֵהוּ
  english_pob_reading: Retain gender-accurate singular with 'happy is he.'
  chosen_spanish_reading: 'Se conserva el singular masculino representativo: «feliz es él».'
  alternative_spanish_readings:
  - feliz es la persona
  - feliz es quien
  rationale: El hebreo es singular masculino. En español, «él» conserva esa correspondencia sin neutralizar el sujeto; la formulación sigue siendo proverbial y natural.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene conforme al pase anterior con alta concordancia y solo ajustes menores de estilo en español para fluidez y naturalidad.
  spanish_consistency_notes:
  - Se mantiene «visión» como término principal y se aclara su sentido revelatorio en la nota.
  - Se conserva el paralelismo antitético con «pero».
  - «Ley» traduce תּוֹרָה con el matiz normativo ya documentado en la auditoría inglesa.
  - La nota de feliz/bienaventurado preserva la alternativa semántica sin reemplazar la línea principal.
  - El orden de los marcadores [d][c][b] sigue el orden de los equivalentes alternativos heredados del audit trail en inglés.
