translation:
  language: es
  text: Y será como cuando sueña el hambriento, y he aquí, está comiendo; pero despierta, y su apetito[a] está vacío; y como cuando sueña el sediento, y he aquí, está bebiendo; pero despierta, y he aquí, está desfallecido, y su apetito[b] anhela. Así será la multitud de todas las naciones que combaten contra el monte de Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su alma está vacía». El hebreo נֶפֶשׁ a menudo significa «alma», pero aquí probablemente se refiere al apetito o deseo interior en el contexto de hambre.
    reason: lexical_alternative
  - marker: b
    text: O «su alma anhela» / «su garganta está reseca». La expresión hebrea subraya el deseo persistente después de despertar, a pesar del sueño de beber.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will be
  chosen_spanish: Y será
  alternatives_spanish:
  - Y acontecerá
  - Y acontecerá que
  lexicon: HALOT
  rationale: La forma hebrea introduce el resultado de la comparación con valor futuro; «Y será» conserva el giro profético en español sin recargarlo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as when
  chosen_spanish: como cuando
  alternatives_spanish:
  - tal como cuando
  - igual que cuando
  lexicon: HALOT
  rationale: La comparación repetida funciona naturalmente en español con «como cuando», que mantiene la estructura simétrica del verso.
- source_word: יַחֲלֹם
  english_pob_choice: dreams
  chosen_spanish: sueña
  alternatives_spanish:
  - está soñando
  - tiene un sueño
  lexicon: HALOT
  rationale: El imperfecto generaliza una escena típica; el presente simple en español expresa bien la acción onírica habitual.
- source_word: הָרָעֵב
  english_pob_choice: a hungry man
  chosen_spanish: el hambriento
  alternatives_spanish:
  - el hombre hambriento
  - el que tiene hambre
  lexicon: HALOT
  rationale: El adjetivo sustantivado con artículo transmite de manera natural el singular representativo del hebreo sin añadir redundancia.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y ved
  lexicon: HALOT
  rationale: «Y he aquí» conserva la fuerza deíctica y la vividez del hebreo, alineándose con la elección reverente y formal del POB inglés.
- source_word: אוֹכֵל
  english_pob_choice: he is eating
  chosen_spanish: está comiendo
  alternatives_spanish:
  - come
  - está alimentándose
  lexicon: HALOT
  rationale: El participio presente en el sueño se expresa bien con progresivo en español para mantener la escena vivida y continua.
- source_word: וְהֵקִיץ
  english_pob_choice: but he wakes
  chosen_spanish: pero despierta
  alternatives_spanish:
  - y despierta
  - pero al despertar
  lexicon: HALOT
  rationale: 'Aunque la conjunción es simple, el contraste del sueño con la realidad pide en español una transición adversativa natural: «pero despierta».'
- source_word: וְרֵיקָה נַפְשׁוֹ
  english_pob_choice: his appetite is empty
  chosen_spanish: su alma está vacía
  alternatives_spanish:
  - su apetito está vacío
  - su vida interior está vacía
  - su ser está vacío
  lexicon: HALOT
  rationale: El hebreo נֶפֶשׁ en este contexto puede referirse al ser vital o al apetito interior. Se conserva «alma» en el texto principal para no borrar la tensión lexical, y se deja la alternativa contextual en nota.
- source_word: הַצָּמֵא
  english_pob_choice: a thirsty man
  chosen_spanish: el sediento
  alternatives_spanish:
  - el hombre sediento
  - el que tiene sed
  lexicon: HALOT
  rationale: Como paralelo de «el hambriento», la sustantivación masculina singular funciona de modo natural en español y respeta la forma del hebreo.
- source_word: שֹׁתֶה
  english_pob_choice: he is drinking
  chosen_spanish: está bebiendo
  alternatives_spanish:
  - bebe
  - anda bebiendo
  lexicon: HALOT
  rationale: El progresivo español reproduce el carácter vívido de la acción en el sueño.
- source_word: עָיֵף
  english_pob_choice: he is faint
  chosen_spanish: desfallecido
  alternatives_spanish:
  - cansado
  - agotado
  - débil
  lexicon: HALOT
  rationale: En el contexto de sed, «desfallecido» comunica mejor el debilitamiento físico inmediato que un mero cansancio.
- source_word: וְנַפְשׁוֹ שׁוֹקֵקָה
  english_pob_choice: his appetite craves
  chosen_spanish: su alma anhela
  alternatives_spanish:
  - su apetito anhela
  - su alma sigue deseando
  - su garganta está reseca
  lexicon: HALOT
  rationale: שׁוֹקֵקָה expresa anhelo intenso y persistente. Se mantiene «alma» en el texto para respetar la metáfora hebrea y su tensión con el contexto corporal; «anhela» comunica el deseo continuado sin sobreexplicar.
- source_word: כֵּן יִהְיֶה
  english_pob_choice: So will be
  chosen_spanish: Así será
  alternatives_spanish:
  - Tal será
  - De ese modo será
  lexicon: HALOT
  rationale: Formula la aplicación profética de la comparación con una cadencia natural y sobria en español.
- source_word: הֲמוֹן
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - el gentío
  - la masa
  lexicon: HALOT
  rationale: «Multitud» conserva el sentido colectivo y encaja con el genitivo siguiente.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: of all the nations
  chosen_spanish: de todas las naciones
  alternatives_spanish:
  - de todos los pueblos
  - de todas las gentes
  lexicon: HALOT
  rationale: «Naciones» es la opción más directa para גּוֹיִם en este contexto de coalición internacional hostil.
- source_word: הַצֹּבְאִים
  english_pob_choice: that wage war against
  chosen_spanish: que combaten contra
  alternatives_spanish:
  - que guerrean contra
  - que se levantan contra
  - que sitian
  lexicon: HALOT
  rationale: El participio de צבא denota hostilidad militar; «combaten contra» es preciso y menos interpretativo que una perífrasis más explícita.
- source_word: עַל הַר צִיּוֹן
  english_pob_choice: against Mount Zion
  chosen_spanish: contra el monte de Sion
  alternatives_spanish:
  - sobre el monte de Sion
  - frente al monte de Sion
  lexicon: HALOT
  rationale: Con el contexto militar, עַל se entiende como dirección hostil; «monte de Sion» es la forma castellana habitual del topónimo bíblico.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en contexto de hambre y sed
  english_pob_reading: his appetite is empty / his appetite craves
  chosen_spanish_reading: su alma está vacía / su alma anhela
  alternative_spanish_readings:
  - su apetito está vacío / su apetito anhela
  - su ser está vacío / su deseo anhela
  rationale: El POB inglés opta por «appetite» por razones contextuales, pero el hebreo conserva la palabra נֶפֶשׁ, que también puede leerse como «alma», «vida» o «ser». En español se mantiene «alma» en el texto principal para no borrar la tensión semántica y se señala la lectura alternativa contextual en nota.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Singular masculino representativo en el hambriento y el sediento
  english_pob_reading: a hungry man / a thirsty man
  chosen_spanish_reading: el hambriento / el sediento
  alternative_spanish_readings:
  - la persona hambrienta / la persona sedienta
  - el hombre hambriento / el hombre sediento
  rationale: La forma hebrea es masculina singular con función representativa. «El hambriento» y «el sediento» preservan ese valor sin introducir una referencia exclusivamente masculina en sentido teológico.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que volvió a «behold» por registro y retiró «still» por no estar explícito. En español se mantuvo «y he aquí» para el valor deíctico y formal, y no se añadió un equivalente de «todavía» o «aún» en la cláusula de deseo para respetar esa cautela. También se conservó la tensión de נֶפֶשׁ mediante «alma» en el texto principal, con nota que reconoce la lectura contextual de apetito.
  spanish_consistency_notes:
  - Se usó «Yahvé» como traducción estándar del tetragrámaton cuando corresponda, aunque este verso no lo contiene.
  - Se mantuvo «Sion» con ortografía castellana usual en topónimos bíblicos; no se añadió tilde.
  - Se prefirió un registro formal y bíblico, pero con sintaxis natural del español moderno.
  - Las notas usan marcadores únicos y aparecen ancladas exactamente en el texto principal.
