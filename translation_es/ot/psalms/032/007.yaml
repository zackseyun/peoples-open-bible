revisions:
- from: Tú eres mi refugio[a]; me preservas de la angustia; me rodeas con gritos de liberación[b]. Selah
  to: Tú eres un escondite para mí[a]; de la angustia me preservas; me rodeas con gritos de liberación. Selah[b]
  rationale: Se ajusta סֵתֶר a una imagen más concreta y fiel al hebreo y al audit trail ('escondite' en vez de 'refugio' como texto principal), manteniendo una nota con alternativas españolas naturales. También se restaura la nota de 'Selah' conforme al inglés POB y se evita desplazarla innecesariamente a 'gritos de liberación'. El resto del versículo es sólido y no requiere adjudicación compleja.
