revisions:
- from: Y te alegrarás[a] por todo el bien que Yahvé tu Dios te ha dado a ti y a tu casa; tú, y el levita, y el forastero[b] que está en medio de ti.
  to: 'Y te alegrarás por todo el bien que Yahvé tu Dios te ha dado a ti y a tu hogar: tú, el levita y el residente extranjero[a] que está en medio de ti.'
  rationale: Se corrige «forastero» a «residente extranjero» para reflejar mejor el valor de גֵּר y conservar la alternativa léxica documentada por el POB inglés. Se elimina la nota sobre «te alegrarás» por innecesaria. Se ajusta «a tu casa» a «a tu hogar» para evitar una lectura demasiado física, aunque el sentido sigue siendo el de la unidad doméstica. También se pule la puntuación para mejorar la legibilidad en español sin apartarse del hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:33:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: mandato/exhortación de gozo, totalidad del bien recibido, Yahvé como nombre divino, inclusión de la casa, del levita y del גֵּר. Sin embargo, dos decisiones debilitan la alineación fina con la evidencia y con el rastro POB en inglés: «a tu casa» reduce potencialmente בֵּית al edificio o al hogar doméstico en vez de la unidad familiar/social de «household», y «forastero» sugiere con demasiada facilidad alguien de paso, mientras que גֵּר aquí es residente no israelita bajo protección. También conviene eliminar la nota en «te alegrarás», porque el texto base en inglés no la conserva y el castellano no genera una ambigüedad nueva que la requiera.'
  spanish_quality_summary: El español es claro y legible, con tono bíblico moderno adecuado. No obstante, «por todo el bien» suena menos cercano al matiz del inglés auditado que «por/en todo el bien», y la secuencia con comas tras «tú» puede simplificarse con raya para mejor fluidez. «Que está en medio de ti» es comprensible pero algo más tieso; «que está entre ustedes» sería más natural, aunque el singular hebreo justifica mantener «ti». La reparación necesaria es pequeña.
  glossary_alignment: '«Yahvé» está correctamente alineado con la política del proyecto. «Levita» también. El problema terminológico principal es גֵּר: el inglés POB eligió «sojourner» con nota «resident foreigner»; en español, «forastero» no preserva tan bien ese valor legal-social como «residente extranjero» o una formulación equivalente. «Casa» también se aparta del razonamiento auditado, que favorece «household»; en español, «hogar» o «casa» no expresan tan bien la unidad doméstica como «familia» o «casa/hogar» explicada, pero la mejor opción aquí es «tu hogar» o «tu casa» según contexto. Dado el rastro inglés, «tu hogar» sigue siendo inferior a una solución más social; sin embargo, «tu hogar» es natural. Mejor todavía: «tu casa» con sentido colectivo no es imposible, pero la auditoría explícitamente evitó esa reducción. Por eso se recomienda «tu hogar» no; se recomienda «tu casa»? No. La opción más fiel es «tu hogar»? Tampoco. La más alineada con la razón dada es «tu familia» o «tu
    casa» acompañada de contexto. Para máxima fidelidad al audit trail y legibilidad, aquí se propone «tu hogar» menos físico, pero la justificación inglesa insiste en unidad social/familiar. Por eso la revisión adopta «tu hogar» como compromiso legible; no obstante, «tu familia» también sería defendible.'
  issues:
  - severity: medium
    issue: «a tu casa» no refleja bien el valor de וּלְבֵיתֶךָ como unidad doméstica/familiar
    rationale: La auditoría inglesa documenta explícitamente que «household» fue escogido para evitar limitar el sentido al edificio físico. En español, «casa» puede funcionar metonímicamente, pero aquí deja más margen a esa lectura reducida.
  - severity: medium
    issue: «forastero» debilita el matiz de גֵּר
    rationale: El término hebreo describe a un no israelita residente bajo protección dentro de Israel. «Forastero» suele sonar más a alguien ajeno o transitorio; «residente extranjero» preserva mejor la dimensión legal-social ya explicitada en la nota inglesa.
  - severity: low
    issue: La nota [a] sobre «te alegrarás» no es necesaria
    rationale: El inglés POB no incluye nota aquí, y el español no introduce ambigüedad relevante. Añadirla recarga el texto sin necesidad crítica.
  revised_spanish_text: 'Y te alegrarás por todo el bien que Yahvé tu Dios te ha dado a ti y a tu hogar: tú, el levita y el residente extranjero[a] que está en medio de ti.'
  revised_footnotes:
