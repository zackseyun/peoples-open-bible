translation:
  language: es
  text: 'Y haré cesar[a] todo su regocijo: sus fiestas, sus lunas nuevas, sus sábados y todos sus tiempos señalados[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pondré fin a todo su regocijo».
    reason: lexical_alternative
  - marker: b
    text: «Tiempos señalados» traduce un término que también puede significar «fiestas señaladas»; aquí el contexto ya enumera observancias concretas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבַּתִּי
  english_pob_choice: I will put an end to
  chosen_spanish: haré cesar
  alternatives_spanish:
  - pondré fin a
  - causaré que cesen
  lexicon: HALOT
  rationale: El hifil de שׁבת es causativo. «Haré cesar» conserva esa causalidad de forma natural en español y evita una paráfrasis más libre que debilite la acción judicial de Yahvé.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo el
  - cada
  lexicon: HALOT
  rationale: Mantiene el alcance comprehensivo del juicio sobre el regocijo de Israel.
- source_word: מְשׂוֹשָׂהּ
  english_pob_choice: her rejoicing
  chosen_spanish: su regocijo
  alternatives_spanish:
  - su alegría
  - su júbilo
  - su gozo
  lexicon: HALOT
  rationale: El sustantivo expresa alegría/regocijo/mirth. «Regocijo» preserva el matiz de celebración festiva y combina bien con la lista cultual que sigue.
- source_word: חַגָּהּ
  english_pob_choice: her feasts
  chosen_spanish: sus fiestas
  alternatives_spanish:
  - sus festividades
  - sus solemnidades
  - sus fiestas de peregrinación
  lexicon: HALOT
  rationale: En contexto cultual, חַג se refiere a fiestas religiosas. «Fiestas» es una equivalencia clara y natural en español, sin perder el sentido de observancias festivas.
- source_word: חָדְשָׁהּ
  english_pob_choice: her new moons
  chosen_spanish: sus lunas nuevas
  alternatives_spanish:
  - sus novilunios
  - sus celebraciones de luna nueva
  - sus meses
  lexicon: HALOT
  rationale: El contexto ritual favorece la observancia de luna nueva, no solo el mes calendario. «Lunas nuevas» es transparente y fiel al uso cultual.
- source_word: וְשַׁבַּתָּהּ
  english_pob_choice: her Sabbaths
  chosen_spanish: sus sábados
  alternatives_spanish:
  - sus días de reposo
  - sus sábados sagrados
  - sus reposos
  lexicon: HALOT
  rationale: Se conserva el término tradicional del día sagrado. «Sábados» comunica de modo directo la observancia ritual sin sustituirla por una explicación menos precisa.
- source_word: וְכֹל מוֹעֲדָהּ
  english_pob_choice: and all her appointed times
  chosen_spanish: y todos sus tiempos señalados
  alternatives_spanish:
  - y todas sus fechas señaladas
  - y todas sus citas fijadas
  - y todos sus festivales señalados
  lexicon: HALOT
  rationale: מוֹעֵד puede significar tiempo señalado o festividad designada. Dado que la revisión inglesa prefirió «appointed times» para evitar redundancia, «tiempos señalados» refleja mejor la amplitud semántica sin duplicar «fiestas».
theological_decisions:
- issue: Naturaleza de la lista final de observancias
  english_pob_reading: The verse refers to Israel's cultic/religious celebrations being terminated in judgment.
  chosen_spanish_reading: El versículo habla de la desaparición, bajo juicio, de las celebraciones cultuales y religiosas de Israel.
  alternative_spanish_readings:
  - Podría leerse más ampliamente como el fin de toda alegría social, no solo de observancias religiosas.
  - Podría entenderse como la supresión de todo tipo de festividad, incluso no litúrgica.
  rationale: La secuencia «fiestas, lunas nuevas, sábados y tiempos señalados» es lenguaje calendárico-cultual estándar. La traducción conserva esa referencia religiosa sin borrar que el primer miembro usa un término más general para el regocijo.
  doctrine_reference: Lv 23; Nm 28–29; Os 2:11–13
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió el final de «appointed festivals» a «appointed times» para reflejar mejor מוֹעֲדֶיהָ y evitar redundancia con «feasts». La versión española sigue esa decisión con «tiempos señalados», manteniendo el resto de la línea como una representación natural y fiel del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el sujeto implícito en primera persona según la convención del proyecto, aunque aquí el verbo en español ya conserva la primera persona divina.
  - «Sábados» se mantiene como término cultual, no como referencia al simple día semanal en sentido moderno.
  - «Tiempos señalados» preserva la amplitud de מוֹעֵד sin fusionarlo con «fiestas».
