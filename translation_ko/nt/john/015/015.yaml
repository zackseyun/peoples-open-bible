id: JHN.15.15
reference: 'John 15:15'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: οὐκέτι ⸂λέγω ὑμᾶς⸃ δούλους, ὅτι ὁ δοῦλος οὐκ οἶδεν τί ποιεῖ αὐτοῦ ὁ κύριος· ὑμᾶς δὲ εἴρηκα φίλους, ὅτι πάντα ἃ ἤκουσα παρὰ τοῦ πατρός μου ἐγνώρισα ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/john/015/015.yaml
  text: I no longer call you slaves[a], because the slave does not know what his master is doing. But I have called you friends[b], because I have made known to you everything that I heard from my Father.
  footnotes:
  - marker: a
    text: Or 'servants' or 'bondservants.' The Greek doulos can denote a servant or a slave; here 'slaves' is used because the contrast emphasizes subordination over friendship.
    reason: lexical_alternative
  - marker: b
    text: Greek 'lord'; here rendered 'master' because the context is a household/status analogy rather than a divine or messianic title.
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 더 이상 여러분을 종이라 부르지 않습니다. 종은 자기 주인이 무엇을 하는지 모르기 때문입니다. 그러나 나는 여러분을 친구라 불렀습니다. 내가 내 아버지께 들은 모든 것을 여러분에게 알렸기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 doulos는 문맥에 따라 「종·노예」로 옮길 수 있다. 본문은 친구와의 종속 대조를 강조하므로 「종」으로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 kyrios는 본 문맥에서 신적·메시아적 칭호가 아니라 가정·신분 비유에 속한 「주인」으로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δούλους
  english_pob_choice: slaves
  chosen_korean: 종
  alternatives_korean:
  - 노예
  lexicon: BDAG
  rationale: '본 문맥의 doulos는 가정 신분 비유 안에서 친구와의 대조를 위한 어휘이며, 빌립보서 1:1과 같은 신학적 매임 강조와는 결이 다르다. 한국 신약 어휘 관용을 따라 「종」으로 옮긴다.'
- source_word: κύριος
  english_pob_choice: master
  chosen_korean: 주인
  alternatives_korean:
  - 상전
  lexicon: BDAG
  rationale: 가정·신분 비유의 κύριος는 신적 「주」가 아니라 「주인」으로 옮긴다.
- source_word: φίλους
  english_pob_choice: friends
  chosen_korean: 친구
  alternatives_korean: []
  lexicon: BDAG
  rationale: 친밀·평등의 관계 어휘.
