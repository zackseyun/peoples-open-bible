translation:
  language: es
  text: Puesto que nuestro padre ha partido a los dioses[a], y puesto que deseamos que los que están en el reino, libres de toda perturbación, atiendan a los asuntos de los judíos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «ha partido a los dioses», un eufemismo real helenístico para la muerte desde la perspectiva de la corte del hablante.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐπὶ τοῦ πατρὸς ἡμῶν
  english_pob_choice: since our father
  chosen_spanish: Puesto que nuestro padre
  alternatives_spanish:
  - después de que nuestro padre
  - ya que nuestro padre
  lexicon: LSJ
  rationale: La construcción causal-temporal del griego se vierte naturalmente con «puesto que» para mantener el valor de fundamento de la frase en español sin perder el tono formal del decreto.
- source_word: εἰς θεοὺς μεταστάντος
  english_pob_choice: has departed to the gods
  chosen_spanish: ha partido a los dioses
  alternatives_spanish:
  - ha pasado a los dioses
  - ha muerto
  lexicon: LSJ
  rationale: Se conserva el eufemismo helenístico y su colorido religioso/político. «Ha partido a los dioses» preserva mejor la imagen del griego que reducirlo simplemente a «ha muerto».
- source_word: βουλόμενοι
  english_pob_choice: we desire
  chosen_spanish: deseamos
  alternatives_spanish:
  - queremos
  - anhelamos
  lexicon: LSJ
  rationale: El participio expresa intención regia; «deseamos» mantiene el registro formal y la fuerza voluntaria del enunciado.
- source_word: τοὺς ἐκ τῆς βασιλείας
  english_pob_choice: those in the kingdom
  chosen_spanish: los que están en el reino
  alternatives_spanish:
  - los del reino
  - los habitantes del reino
  lexicon: LSJ
  rationale: El griego apunta de manera amplia a los sujetos del reino. «Los que están en el reino» conserva esa amplitud sin imponer una lectura más estrecha.
- source_word: ἀπερισπάστως ὄντας
  english_pob_choice: being free from disturbance
  chosen_spanish: libres de toda perturbación
  alternatives_spanish:
  - sin distracción
  - sin ser perturbados
  lexicon: LSJ
  rationale: El adverbio puede aludir a ausencia de estorbo o perturbación externa. «Libres de toda perturbación» recoge bien ese sentido administrativo y social en español natural.
- source_word: πρὸς τὴν τῶν Ἰουδαίων ἐπιμέλειαν
  english_pob_choice: give attention to the affairs of the Jews
  chosen_spanish: atiendan a los asuntos de los judíos
  alternatives_spanish:
  - se ocupen del cuidado de los judíos
  - presten atención a los asuntos de los judíos
  lexicon: LSJ
  rationale: ἐπιμέλεια puede ser «cuidado», «atención» o «administración». Aquí el contexto es gubernativo; «asuntos de los judíos» preserva la referencia administrativa sin añadir benevolencia explícita que el griego no exige.
theological_decisions:
- issue: Eufemismo helenístico para la muerte en εἰς θεοὺς μεταστάντος
  english_pob_reading: departed to the gods
  chosen_spanish_reading: ha partido a los dioses
  alternative_spanish_readings:
  - ha muerto
  - ha pasado a los dioses
  rationale: El texto reproduce lenguaje cortesano politeísta propio de la voz hablante, no una afirmación doctrinal del narrador. Conviene mantener la expresión alusiva para no borrar la tensión cultural del original.
  doctrine_reference: 'Translation philosophy: primacía del texto fuente y preservación del registro histórico-cultural del hablante.'
translation_notes:
  revision_awareness: Se revisó el contexto inglés auditado y la observación de revisión externa; no se adoptaron cambios mayores porque la lectura inglesa ya preserva adecuadamente el eufemismo y la finalidad administrativa del pasaje. La versión española mantiene esas dos tensiones sin suavizarlas.
  spanish_consistency_notes:
  - Se mantiene «dioses» en el epíteto cortesano, no «Dios», porque el griego dice θεοὺς y el contexto es una fórmula helenística de corte.
  - Se eligió «reino» para βασιλεία en concordancia con el marco político del pasaje.
  - «Asuntos de los judíos» conserva el matiz administrativo de ἐπιμέλεια mejor que una paraphrasis devocional.
