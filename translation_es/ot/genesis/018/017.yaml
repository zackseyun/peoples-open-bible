review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien la estructura básica del hebreo: «Yahvé dijo…» y la pregunta deliberativa introducida por הֲ + participio. Sin embargo, falla en dos puntos relevantes: (1) מִן con כיסה/ocultar se entiende mejor como «de»/«a…» según la construcción española, pero la formulación elegida «ocultar a Abraham lo que hago» suena menos natural y puede sugerir esconder a Abraham, no esconderle algo; (2) la nota al pie no presenta una alternativa real, pues repite exactamente el texto principal, mientras que el inglés auditado preserva la alternativa más literal «Am I hiding…?».'
  spanish_quality_summary: El español es generalmente claro, pero «ocultar a Abraham lo que hago» resulta poco idiomático en registro bíblico natural. «Ocultarle a Abraham lo que hago» o «ocultar de Abraham lo que hago» comunica mejor la relación semántica. La puntuación y el tono son adecuados. La nota al pie necesita corrección para que sea útil y fiel al expediente.
  glossary_alignment: «Yahvé» está correctamente alineado con la política del proyecto para יהוה. No hay conflicto terminológico mayor. La elección «hago» es aceptable para עֹשֶׂה, en línea con la revisión inglesa que evitó añadir «about to».
  issues:
  - severity: medium
    issue: Construcción española poco natural con «ocultar a Abraham»
    rationale: Aunque intenta reflejar מִן, en español esta redacción puede entenderse como esconder a la persona. Para el sentido «hide from Abraham», lo más claro y natural es «ocultarle a Abraham».
  - severity: medium
    issue: La nota al pie repite el texto principal y no preserva la alternativa documentada
    rationale: La nota inglesa distingue entre una lectura deliberativa principal y una alternativa más literal/progresiva. En español, la nota debe ofrecer una variante real, p. ej. «¿Estoy ocultándole a Abraham lo que hago?».
  revised_spanish_text: 'Yahvé dijo[a]: «¿Debo ocultarle a Abraham lo que hago?»'
