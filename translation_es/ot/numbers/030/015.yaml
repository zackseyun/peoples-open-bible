base_translation:
  language: en
  yaml_path: translation/ot/numbers/030/015.yaml
  text: But if her husband indeed keeps silent from day to day[a], then he confirms all her vows or all her obligations that are upon her; he has confirmed them, because he kept silent on the day he heard.
  footnotes:
