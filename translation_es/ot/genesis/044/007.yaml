translation:
  language: es
  text: 'Y le dijeron[b]: «¿Por qué habla mi señor palabras como[a] estas? ¡Lejos esté de tus siervos hacer tal cosa!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "palabras así".
    reason: lexical_alternative
  - marker: b
    text: O "a él" explícitamente; el hebreo está en singular.
    reason: source_clarity
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y les dijeron
  alternatives_spanish:
  - Y dijeron
  - Entonces les dijeron
  lexicon: HALOT
  rationale: La forma narrativa simple וַיֹּאמְרוּ se mantiene con un pasado coordinado natural en español. El objeto indirecto 'les' hace explícito el referente en el diálogo sin añadir contenido nuevo.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: les
  alternatives_spanish:
  - a él
  - a él le
  lexicon: HALOT
  rationale: Aunque el hebreo señala un singular ('a él'), en el flujo del diálogo español la referencia ya queda suficientemente identificable por el contexto inmediato. Se evita duplicar una construcción pesada dentro de la cita directa.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué viene
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, sin añadir matiz interpretativo.
- source_word: יְדַבֵּר
  english_pob_choice: does ... speak
  chosen_spanish: habla
  alternatives_spanish:
  - está hablando
  - diría
  lexicon: HALOT
  rationale: En esta pregunta retórica, el imperfecto hebreo expresa la acción verbal presente de modo idiomático. 'Habla' conserva la fuerza del acto de hablar sin forzar perífrasis innecesarias.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi maestro
  lexicon: HALOT
  rationale: Se conserva el trato respetuoso humano. 'Mi señor' es el equivalente reverente y natural en español; 'mi amo' sería demasiado duro y 'mi maestro' no corresponde al registro cortesano.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: words like these
  chosen_spanish: palabras como estas
  alternatives_spanish:
  - tales palabras
  - estas palabras
  lexicon: HALOT
  rationale: El hebreo compara con 'estas palabras'; en español, 'palabras como estas' reproduce mejor la relación comparativa sin perder la referencia verbal. La alternativa 'tales palabras' es posible, pero menos transparente.
- source_word: חָלִילָה
  english_pob_choice: Far be it
  chosen_spanish: Lejos esté
  alternatives_spanish:
  - ¡De ninguna manera!
  - ¡Lejos de nosotros!
  lexicon: HALOT
  rationale: La exclamación hebrea expresa rechazo enfático. 'Lejos esté' es una equivalencia reverente y bíblicamente reconocible que conserva el tono solemne sin volverla coloquial.
- source_word: לַעֲבָדֶיךָ
  english_pob_choice: from your servants
  chosen_spanish: de tus esclavos
  alternatives_spanish:
  - de tus siervos
  - de tus servidores
  lexicon: HALOT
  rationale: Se elige 'esclavos' porque el término hebreo עֲבָדֶיךָ puede tener fuerza social de dependencia real; así se preserva la tensión léxica que el POB suele documentar. En este contexto cortesano también puede entenderse como auto-designación de subordinación, pero no se suaviza a 'siervos' sin necesidad textual.
- source_word: מֵעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - de hacer
  - para hacer
  lexicon: HALOT
  rationale: 'La construcción hebrea con מִן + infinitivo se vierte de modo idiomático en español como complemento de infinitivo tras la exclamación: ''Lejos esté ... hacer''. Esto preserva el sentido prohibitivo/repulsivo del giro.'
- source_word: כַּדָּבָר הַזֶּה
  english_pob_choice: such a thing
  chosen_spanish: tal cosa
  alternatives_spanish:
  - una cosa así
  - esa cosa
  lexicon: HALOT
  rationale: '''Tal cosa'' reproduce bien el deíctico despectivo y generalizante del hebreo sin sobrerregularlo. Es más natural en español que repetir ''palabra'' aquí, porque el final se refiere al acto propuesto en su totalidad.'
theological_decisions:
- issue: Tratamiento de אֲדֹנִי como título humano respetuoso, no divino
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - Señor
  rationale: El contexto narrativo muestra un trato cortesano a José / su administrador. Traducir con 'Señor' podría sugerir un título divino o litúrgico no presente aquí. 'Mi señor' conserva la deferencia humana sin confundir al lector.
  doctrine_reference: No aplica; decisión de registro y referencia contextual.
- issue: Valor de חָלִילָה como rechazo enfático
  english_pob_reading: Far be it
  chosen_spanish_reading: Lejos esté
  alternative_spanish_readings:
  - ¡De ninguna manera!
  - ¡Lejos de nosotros!
  rationale: La frase expresa una repulsa solemne, no solo negación simple. 'Lejos esté' mantiene el tono bíblico y la fuerza negativa sin introducir modismos más libres.
  doctrine_reference: No aplica; decisión retórica y estilística.
- issue: Fuerza semántica de עֲבָדֶיךָ
  english_pob_reading: your servants
  chosen_spanish_reading: tus esclavos
  alternative_spanish_readings:
  - tus siervos
  - tus servidores
  rationale: El POB documenta en general la fuerza lexical de δοῦλος/עבד con 'esclavo' cuando se busca conservar el peso del término. Aquí se mantiene esa tensión, aunque el contexto sea de respeto cortesano. La alternativa 'siervos' suavizaría demasiado el término.
  doctrine_reference: No aplica; decisión léxica con implicación social.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, que prefiere una equivalencia idiomática para חָלִילָה y reconoce la alternativa lexical de כַּדְּבָרִים הָאֵלֶּה. También se respetó la observación de que אֲדֹנִי es un tratamiento humano reverente, no un título divino. La elección española conserva esas tensiones y ajusta la sintaxis al español natural sin desplazar el sentido.
  spanish_consistency_notes:
  - Se mantiene 'mi señor' para el tratamiento humano reverente, en línea con otros contextos josefinos.
  - Se conserva 'Lejos esté' como fórmula bíblica de rechazo solemne.
  - Se usa 'esclavos' conforme a la política POB cuando el hebreo עבד se quiere mantener con fuerza léxica; la nota ofrece la alternativa más suave.
  - La frase final 'tal cosa' evita repetir innecesariamente 'palabras' y respeta el referente amplio del acto prohibido.
