review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien el sentido general del hebreo: los enemigos de Jerusalén dominan, prosperan, Yahvé la afligió por sus transgresiones, y sus niños fueron llevados al cautiverio. Sin embargo, los marcadores de notas están anclados a palabras equivocadas: [a] aparece en «la cabeza» pero la nota trata de «prosperan»; [b] aparece en «la ha afligido» pero la nota trata de «sus hijos». Además, «sus hijos» es menos preciso que el hebreo עוֹלָלֶיהָ, que apunta a niños pequeños/little ones.'
  spanish_quality_summary: 'El español es claro y digno, pero conviene ajustar dos puntos para mayor fidelidad y legibilidad: usar un término como «sus pequeños» o «sus niños» en vez de «sus hijos», y recolocar las notas al lugar correcto. «Han llegado a ser la cabeza» suena algo literal, pero es aceptable y preserva la imagen hebrea.'
  glossary_alignment: Se respeta correctamente Yahvé para יְהוָה. No hay conflicto con otros términos del glosario. La decisión «sus adversarios» para אֹיְבֶיהָ es válida aunque el hebreo repite vocabulario de enemistad; puede mantenerse. El principal desajuste léxico está en עוֹלָלֶיהָ, donde «sus hijos» diluye el matiz de niños pequeños/vulnerables que el rastro inglés documenta.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a palabras incorrectas.
    rationale: La nota [a] explica «prosperan», pero en el texto está colocada sobre «la cabeza»; la nota [b] explica «sus pequeños/infantes», pero está colocada sobre «la ha afligido». Esto incumple la disciplina requerida de marcadores.
  - severity: medium
    issue: «Sus hijos» no refleja suficientemente el matiz de עוֹלָלֶיהָ.
    rationale: El hebreo se refiere a niños pequeños/little ones y enfatiza vulnerabilidad. «Hijos» puede entenderse simplemente como descendencia y pierde parte de ese matiz.
  revised_spanish_text: Sus enemigos han llegado a ser la cabeza; sus adversarios prosperan[a], porque Yahvé la ha afligido a causa de la multitud de sus transgresiones. Sus pequeños[b] han ido al cautiverio delante del adversario.
  revised_footnotes:
