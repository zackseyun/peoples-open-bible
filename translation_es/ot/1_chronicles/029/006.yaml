translation:
  language: es
  text: Entonces los jefes de las casas paternas[a], los jefes de las tribus de Israel, los jefes de los millares y de los cientos[b], y los encargados de la obra del rey, dieron voluntariamente[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las casas paternas», es decir, divisiones familiares o clánicas patrilineales.'
    reason: cultural_note
  - marker: b
    text: «Los millares y los cientos» designa divisiones militares o administrativas; por eso aquí se entiende a sus jefes o comandantes.
    reason: cultural_note
  - marker: c
    text: O «ofrecieron voluntariamente» o «hicieron una ofrenda voluntaria». El verbo hebreo enfatiza una respuesta de libre voluntad; en este contexto probablemente se refiere a una contribución voluntaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְנַדְּבוּ
  english_pob_choice: gave willingly
  chosen_spanish: se ofrecieron voluntariamente
  alternatives_spanish:
  - dieron voluntariamente
  - ofrecieron su voluntad
  - hicieron una ofrenda voluntaria
  lexicon: HALOT
  rationale: El verbo hitpael de נדב expresa una respuesta libre y espontánea; en este contexto incluye la idea de contribuir de manera voluntaria. En español, «se ofrecieron voluntariamente» conserva la iniciativa libre sin perder el matiz de respuesta generosa al llamado.
- source_word: שָׂרֵי
  english_pob_choice: leaders
  chosen_spanish: jefes
  alternatives_spanish:
  - líderes
  - príncipes
  - oficiales
  lexicon: HALOT
  rationale: שָׂרִים designa personas con autoridad. «Jefes» funciona bien en español para varios grupos de autoridad en una lista administrativa y evita la connotación nobiliaria de «príncipes».
- source_word: הָאָבוֹת
  english_pob_choice: the fathers’ houses
  chosen_spanish: las casas paternas
  alternatives_spanish:
  - las casas de los padres
  - las casas ancestrales
  - los linajes paternos
  lexicon: HALOT
  rationale: La expresión hebrea apunta a divisiones familiares/clánicas patrilineales. «Casas paternas» preserva la estructura social del hebreo de forma transparente y es más precisa que simplemente «familias».
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: the tribes of Israel
  chosen_spanish: las tribus de Israel
  alternatives_spanish:
  - los clanes de Israel
  - las tribus israelitas
  lexicon: HALOT
  rationale: Es la equivalencia directa y estable para las unidades tribales de Israel.
- source_word: הָאֲלָפִים וְהַמֵּאוֹת
  english_pob_choice: the thousands and of the hundreds
  chosen_spanish: los millares y de los cientos
  alternatives_spanish:
  - los miles y los cientos
  - las unidades de millar y de centena
  lexicon: HALOT
  rationale: En este pasaje los términos suelen referirse a divisiones militares o administrativas. «Millares» y «cientos» preservan la forma de los grupos mencionados, manteniendo la relación con los jefes que los encabezaban.
- source_word: וּלְשָׂרֵי
  english_pob_choice: and the overseers
  chosen_spanish: y los encargados
  alternatives_spanish:
  - y los supervisores
  - y los oficiales
  - y los administradores
  lexicon: HALOT
  rationale: La construcción con ל continúa la lista de funcionarios vinculados a la labor real. «Encargados» comunica la función administrativa sin imponer un término más técnico de lo que el contexto exige.
- source_word: מְלֶאכֶת הַמֶּלֶךְ
  english_pob_choice: the king’s work
  chosen_spanish: el trabajo del rey
  alternatives_spanish:
  - la obra del rey
  - el servicio del rey
  - los trabajos del rey
  lexicon: HALOT
  rationale: מְלָאכָה significa trabajo, labor o tarea. «Trabajo del rey» es fiel y claro en español; conserva la amplitud del término sin restringirlo innecesariamente.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una lectura de lista administrativa con énfasis en la disposición voluntaria; la versión española conserva esa estructura, el sentido de libre voluntad y la referencia cultural a casas paternas, millares y cientos, sin añadir elementos no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «jefes» para שָׂרֵי con consistencia administrativa y sin cargar el texto con una nobleza no requerida por el contexto.
  - «Casas paternas» preserva el trasfondo clánico hebreo que la auditoría inglesa quiso transparentar.
  - «Millares» y «cientos» conserva la estructura numérica del hebreo y deja claro el marco militar/administrativo.
