translation:
  language: es
  text: Se alegraron los que temen al Señor en cosas buenas[a], y tu bondad está sobre Israel en tu reino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron alegrados en bendiciones».'
    reason: lexical_alternative
  - marker: b
    text: 'O posiblemente: «sobre Israel, tu reino». La frase final es difícil; también puede entenderse como una identificación estrecha entre Israel y el reino que pertenece a Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: ηὐφράνθησαν
  english_pob_choice: rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se regocijaron
  - fueron alegrados
  lexicon: LSJ
  rationale: El aoristo pasivo expresa el resultado de quedar gozosos; en español, 'se alegraron' comunica de forma natural el efecto celebrativo sin perder la fuerza resultativa.
- source_word: οἱ φοβούμενοι
  english_pob_choice: those who fear
  chosen_spanish: los que temen
  alternatives_spanish:
  - los que reverencian
  - los que temen a
  lexicon: LSJ
  rationale: La forma sustantivada se refiere a un grupo caracterizado por su relación reverente con Dios; 'los que temen' conserva la construcción y es idiomático en español bíblico moderno.
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  lexicon: LSJ
  rationale: Aquí κύριος traduce el título divino y sigue el patrón del texto fuente griego; en esta frase, 'el Señor' mantiene la referencia reverente sin forzar una sustitución no documentada en el audit trail.
- source_word: ἐν ἀγαθοῖς
  english_pob_choice: in good things
  chosen_spanish: en cosas buenas
  alternatives_spanish:
  - en bienes
  - con bienes
  - en bendiciones
  lexicon: LSJ
  rationale: La expresión es amplia y concreta. 'Cosas buenas' conserva la literalidad básica del griego y evita adelantar el matiz de 'bendiciones', que el audit trail deja como alternativa plausible pero no obligatoria.
- source_word: χρηστότης
  english_pob_choice: goodness
  chosen_spanish: bondad
  alternatives_spanish:
  - benevolencia
  - bondad amorosa
  lexicon: LSJ
  rationale: '''Bondad'' reproduce el sentido moral y benéfico de χρηστότης en un registro elevado y natural para el español litúrgico.'
- source_word: ἐπʼ Ἰσραήλ
  english_pob_choice: upon Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - encima de Israel
  - para Israel
  lexicon: LSJ
  rationale: '''Sobre Israel'' refleja el valor de ἐπί con acusativo como extensión o reposo sobre algo, y suena natural en español para una acción/favor divino que recae sobre el pueblo.'
- source_word: τῇ βασιλείᾳ σου
  english_pob_choice: your kingdom
  chosen_spanish: tu reino
  alternatives_spanish:
  - tu realeza
  - tu reinado
  lexicon: LSJ
  rationale: El sustantivo βασιλεία se vierte con la forma más transparente y bíblicamente estable en español, 'reino'. En este contexto, el valor dativo no se expresa como aposición, sino como segmento final asociado a la esfera regia de Dios.
theological_decisions:
- issue: Relación entre Israel y el reino de Dios en la cláusula final
  english_pob_reading: '''Israel, your kingdom'' may identify Israel as the people or realm belonging to God; alternatively, ''for Israel, your kingdom.'''
  chosen_spanish_reading: '''sobre Israel, tu reino'' mantiene la relación entre el favor divino y el pueblo, sin convertir la frase en una aposición imposible entre casos griegos.'
  alternative_spanish_readings:
  - '''sobre Israel, tu reino'' entendido como ''Israel, tu reino'''
  - '''para Israel, tu reino'''
  rationale: 'El audit trail corrige una lectura appositional anterior porque el griego pone Ἰσραήλ en acusativo y τῇ βασιλείᾳ σου en dativo. La traducción española debe respetar esa diferencia: el favor está ''sobre Israel'', y ''tu reino'' queda como designación regia final, no como aposición con Israel.'
  doctrine_reference: Gramática del caso griego; Sal 145:13; 2 Sam 7:16
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que descartó 'en tu reino' y también la corrección posterior que evitó la aposición 'Israel, tu reino' por razones gramaticales. La traducción española adopta una solución que preserva tanto el favor que desciende sobre Israel como la mención final del reino de Dios sin forzar la sintaxis del griego.
  spanish_consistency_notes:
  - Se mantuvo 'bondad' para χρηστότης, conforme al audit trail.
  - Se usó 'Señor' para κύριος como título divino, en coherencia con el texto griego y el estándar del proyecto.
  - No se introdujo 'Cristo' ni otras equivalencias no presentes en el pasaje.
  - Se evitó 'SEÑOR' en mayúsculas como convención de sustitución; la forma elegida es 'el Señor'.
