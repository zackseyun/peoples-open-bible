review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo: sujeto implícito continuo, presente gnómico, paralelismo entre cansancio/falta de vigor y don divino de fuerza. Sin embargo, la nota alternativa no refleja con precisión la alternativa inglesa auditada, porque traslada la alternativa al segundo hemistiquio en vez de preservar la posibilidad de leer el primero como ''al sin fuerzas/poderoso''.'
  spanish_quality_summary: El texto principal es claro y natural en español eclesial contemporáneo. 'Él da fuerza al cansado' suena bien. En el segundo hemistiquio, 'le aumenta la fortaleza' es comprensible, pero 'fortaleza' puede inclinarse hacia firmeza de carácter más que fuerza/vigor físico-personal; 'fuerza' aquí resulta más natural y más fiel al campo semántico del paralelismo. La nota también necesita corrección de contenido y estilo.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. Las decisiones 'fuerza' para כֹּחַ y 'vigor' para אוֹנִים son adecuadas. Conviene usar 'fuerza' también para עָצְמָה en español por claridad idiomática, aun si el inglés distinguió 'strength/might'; la diferencia inglesa respondía a evitar repetición, pero en español la repetición poética es natural y más precisa que 'fortaleza'.
  issues:
  - severity: medium
    issue: La nota al pie no corresponde a la alternativa auditada en inglés.
    rationale: La nota inglesa ofrece una alternativa global equivalente a 'to the powerless he multiplies strength', centrada en el destinatario del primer miembro y en 'multiplies'. La nota española actual ('al que no tiene fuerzas, le aumenta la fuerza') desplaza la alternativa al segundo miembro y no preserva bien la relación con el texto fuente.
  - severity: medium
    issue: '''Fortaleza'' para עָצְמָה suena menos natural y puede cambiar el matiz.'
    rationale: En español bíblico general, 'fortaleza' puede sugerir entereza o firmeza interior. Aquí el hebreo mantiene un paralelismo de vigor/fuerza; 'fuerza' comunica mejor ese campo semántico y suena más idiomático con 'aumenta'.
  revised_spanish_text: Él da fuerza al cansado, y al que no tiene vigor le aumenta la fuerza.[a]
  revised_footnotes:
  - marker: a
    text: 'O: «Al que no tiene fuerzas, le multiplica la fuerza».'
    reason: lexical_alternative
