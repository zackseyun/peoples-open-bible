id: PHP.4.11
reference: Philippians 4:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐχ ὅτι καθ’ ὑστέρησιν λέγω, ἐγὼ γὰρ ἔμαθον ἐν οἷς εἰμι αὐτάρκης εἶναι·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/011.yaml
  text: Not that I am speaking from need, for I have learned to be content in whatever circumstances I am in.
translation:
  language: ko
  text: 내가 궁핍하여 말하는 것이 아닙니다. 나는 어떠한 처지에 있든지 자족하는[a] 법을 배웠습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 αὐτάρκης는 「자기 안에 충족함」을 뜻하며 헬레니즘 철학 용어이기도 하나, 바울은 이를 그리스도 안에서 배운 「만족」으로 재구성한다. 「만족하는」으로도 옮길 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ ὅτι
  english_pob_choice: Not that
  chosen_korean: 것이 아닙니다
  alternatives_korean:
  - 그렇다고 ... 것은 아닙니다
  lexicon: BDAG
  rationale: 부정·교정 구문. 한국어로는 동사 술어부에 「것이 아닙니다」를 두어 자연스럽게 풀어낸다.
- source_word: καθ’ ὑστέρησιν
  english_pob_choice: from need
  chosen_korean: 궁핍하여
  alternatives_korean:
  - 부족하여
  - 결핍 때문에
  lexicon: BDAG
  rationale: ὑστέρησις는 결핍·궁핍. 「궁핍하여」가 가장 자연스럽고, 바울이 도움 요청 차원의 발언이 아님을 명확히 한다.
- source_word: λέγω
  english_pob_choice: I am speaking
  chosen_korean: 말하는
  lexicon: BDAG
  rationale: 현재형 직설. 한국어 진행형이 어색하므로 단순형으로 옮긴다.
- source_word: ἔμαθον
  english_pob_choice: I have learned
  chosen_korean: 배웠습니다
  alternatives_korean:
  - 알게 되었습니다
  - 깨달았습니다
  lexicon: BDAG
  rationale: 부정과거의 완료적 함의(과거의 학습이 현재에 살아 있음)를 합쇼체 「배웠습니다」가 자연스럽게 담는다.
- source_word: ἐν οἷς εἰμι
  english_pob_choice: in whatever circumstances I am in
  chosen_korean: 어떠한 처지에 있든지
  alternatives_korean:
  - 내가 처한 어떤 상황에서도
  - 어떤 형편에 있든지
  lexicon: BDAG
  rationale: 「처지」는 개역개정 등 한국 교회의 정형어이며, 12절의 빈천·풍부 대비와 자연스럽게 연결된다. 「어떤 형편에 있든지」도 가능하다.
- source_word: αὐτάρκης
  english_pob_choice: content
  chosen_korean: 자족하는
  alternatives_korean:
  - 만족하는
  - 스스로 충분한
  lexicon: BDAG
  rationale: 본 번역의 αὐτάρκης 기본 옮김. 「자족(自足)」은 한국 교회의 정형어로 「자기 안에 충족함」을 그대로 담아 헬레니즘 어휘의 무게를 보존하며, 바울이 그 의미를 그리스도 안에서 재정의했음을 13절이 곧 드러낸다. 영어 POB는 「content」를 선택했으나, 한국어 글로서리는 더 어원적인 「자족하는」을 기본값으로 둔다.
- source_word: εἶναι
  english_pob_choice: to be
  chosen_korean: 법을
  alternatives_korean:
  - 줄을
  lexicon: BDAG
  rationale: ἔμαθον + 부정사 구문 「~하는 법을 배우다」를 한국 교회 정형 표현으로 옮긴다.
theological_decisions:
- issue: αὐτάρκης의 철학적 함의
  chosen_reading: '「자족하는」 — 헬라어의 어원적 무게(자기 안에 충족함)를 보존하되, 다음 절(13절)에서 그것이 자기 의존이 아니라 그리스도 안의 충족임이 드러난다.'
  alternative_readings:
  - 만족하는(영어 POB)
  - 스스로 충분한
  rationale: 한국어 글로서리는 「자족하는」을 기본값으로 정의한다. 이는 영어 POB의 「content」보다 헬레니즘 어휘의 무게를 더 살리며, 본 번역의 north-star(원저자의 의도를 가장 강력하게 보존)에 부합한다. 스토아적 자기 의존의 함의는 13절의 「나를 강하게 하시는 분」으로 곧 재정의된다.
  doctrine_reference: 'KOREAN_PIPELINE.md glossary: αὐτάρκης → 자족하는'
