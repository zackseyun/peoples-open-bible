  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: doble descripción de la belleza, inventario de bienes dejados por Manasés y la cláusula final ambigua sobre su relación continuada con esos bienes. Sin embargo, dos elecciones en español necesitan ajuste para mayor fidelidad idiomática: «siervos varones» suena forzado frente al emparejamiento natural «siervos y siervas», y «permanecía sobre ellos» calca demasiado el griego y resulta poco natural/oscuro en español.'
  spanish_quality_summary: El español es en general claro y digno, pero «encantadora de ver» tiene un matiz algo subjetivo y menos estrictamente visual que «hermosa de ver», mientras que «permanecía sobre ellos» no suena idiomático. Una reparación pequeña mejora legibilidad sin perder la ambigüedad documentada.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión de no usar «esclavos» en el texto principal es coherente con el expediente inglés para este inventario patrimonial. Conviene simplificar «siervos varones y siervas» a «siervos y siervas», manteniendo la alternativa «esclavos y esclavas» en nota.
  issues:
  - severity: medium
    issue: «Permanecía sobre ellos» es un calco poco natural
    rationale: Aunque sigue de cerca ἔμενεν ἐπʼ αὐτῶν, en español moderno eclesial suena extraño y puede confundir. «Seguía al frente de ellos» preserva la idea de continuidad y supervisión; la nota puede conservar la ambigüedad entre administración y posesión.
  - severity: low
    issue: «Siervos varones» es innecesariamente pesado
    rationale: El griego contrasta masculino y femenino, pero en español «siervos y siervas» ya comunica esa distinción con mejor fluidez y paralelismo.
  - severity: low
    issue: La nota [a] no preserva la alternativa léxica más útil del expediente inglés
    rationale: El expediente inglés conserva la alternativa de estatus social para παῖδας/παιδίσκας («slaves»). En español conviene reflejarla en la nota correspondiente al sintagma de dependientes domésticos, no en la descripción de la belleza.
