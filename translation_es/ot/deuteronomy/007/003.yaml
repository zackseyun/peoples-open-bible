translation:
  language: es
  text: 'Y no te unirás en matrimonio con ellos[a]: no darás tu hija a su hijo, ni tomarás su hija para tu hijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: "no harás matrimonios con ellos".'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִתְחַתֵּן
  english_pob_choice: intermarry
  chosen_spanish: emparentarás
  alternatives_spanish:
  - contraerás matrimonio con ellos
  - te casarás con ellos
  - harás alianzas matrimoniales con ellos
  lexicon: HALOT
  rationale: El hitpael de חתן expresa entrar en vínculos matrimoniales recíprocos; en español, 'emparentar' comunica la idea de quedar unido por parentesco matrimonial sin forzar una formulación demasiado técnica o antinatural. Mantiene el sentido relacional y evita reducirlo a un simple acto individual de casarse.
- source_word: בָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - entre ellos
  - con esas naciones
  lexicon: HALOT
  rationale: La preposición con sufijo de 3ª plural retoma a los pueblos mencionados en el contexto inmediato. 'Con ellos' reproduce la relación directa sin ampliar innecesariamente el referente.
- source_word: בִּתְּךָ
  english_pob_choice: your daughter
  chosen_spanish: tu hija
  alternatives_spanish:
  - tu hija mujer
  lexicon: HALOT
  rationale: Rinde de forma directa y literal la expresión singular con sufijo de 2ª masc. sing., conservando el paralelismo legal del hebreo.
- source_word: תִתֵּן
  english_pob_choice: give
  chosen_spanish: darás
  alternatives_spanish:
  - entregarás
  - darás en matrimonio
  lexicon: HALOT
  rationale: El verbo básico es 'dar'. En este contexto matrimonial, el sentido de entrega para matrimonio queda claro sin añadir una expansión que el hebreo no expresa explícitamente.
- source_word: לִבְנוֹ
  english_pob_choice: to his son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - para su hijo
  lexicon: HALOT
  rationale: El lamed marca relación indirecta; 'a su hijo' conserva la estructura más directa y natural en español.
- source_word: וּבִתּוֹ
  english_pob_choice: his daughter
  chosen_spanish: su hija
  alternatives_spanish:
  - la hija de él
  lexicon: HALOT
  rationale: Traducción literal del sustantivo con sufijo de 3ª masc. sing., manteniendo el paralelismo con la primera mitad del versículo.
- source_word: תִקַּח
  english_pob_choice: take
  chosen_spanish: tomarás
  alternatives_spanish:
  - recibirás
  - tomarás por esposa
  lexicon: HALOT
  rationale: El verbo hebreo es simplemente 'tomar'. En contexto matrimonial, 'tomarás' conserva la literalidad y deja que el contexto determine el sentido marital.
- source_word: לִבְנֶךָ
  english_pob_choice: for your son
  chosen_spanish: para tu hijo
  alternatives_spanish:
  - a tu hijo
  lexicon: HALOT
  rationale: '''Para tu hijo'' refleja adecuadamente la relación de finalidad o destino implícita en la construcción, y mantiene el paralelismo con la primera cláusula.'
theological_decisions:
- issue: Alcance de la prohibición matrimonial
  english_pob_reading: A prohibition against covenantally compromising marriage alliances with the specified nations, rendered without adding explanatory motive from the next verse.
  chosen_spanish_reading: Una prohibición de emparentarse por matrimonio con esos pueblos, sin introducir la razón teológica que aparece en el versículo siguiente.
  alternative_spanish_readings:
  - Una prohibición general de casarse con cualquier extranjero
  - Una prohibición étnica desligada del contexto del pacto
  rationale: El versículo menciona a 'ellos' en referencia a los pueblos ya nombrados. La traducción conserva ese alcance inmediato y no amplía ni contrae la prohibición más allá de lo que el hebreo del versículo declara.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Términos familiares con género gramatical
  english_pob_reading: Retain 'daughter' and 'son' in the singular as in the Hebrew.
  chosen_spanish_reading: Mantener 'hija' e 'hijo' en singular, como en el hebreo.
  alternative_spanish_readings:
  - Usar lenguaje colectivo o neutral como 'hijos'
  - Reformular con términos menos marcados por género
  rationale: El hebreo usa términos de parentesco específicos y singulares en una formulación legal representativa. En español conviene conservar esa precisión sin neutralizarla.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; la presente versión sigue ese estado de alta concordancia y mantiene el mismo alcance semántico con español natural y auditable.
  spanish_consistency_notes:
  - Se conserva 'hija'/'hijo' en singular para reflejar la forma hebrea.
  - '''Con ellos'' mantiene el referente a los pueblos del contexto inmediato.'
  - No se añade 'en matrimonio' al verbo 'dar', para no sobretraducir el hebreo.
  - La nota alternativa se ancla solo en la primera cláusula, donde afecta la decisión lexical principal sobre תִתְחַתֵּן.
