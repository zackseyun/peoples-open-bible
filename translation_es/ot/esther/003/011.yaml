translation:
  language: es
  text: 'Entonces el rey dijo a Amán: «La plata[a] te es dada, y también el pueblo[b], para hacer con ellos[c] lo que bien te parezca[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el dinero». Hebreo כֶּסֶף puede significar literalmente «plata» o, por extensión, «dinero».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «el pueblo», singular gramatical pero colectivo.
    reason: lexical_alternative
  - marker: c
    text: Aunque el hebreo usa un pronombre singular («con él»), se refiere colectivamente a «el pueblo»; en español se traduce naturalmente «con ellos».
    reason: lexical_alternative
  - marker: d
    text: Lit. «según lo bueno en tus ojos»; es un modismo hebreo para decir «como te parezca bien».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La forma waw-consecutiva marca avance narrativo. «Entonces» conserva la secuencia y suena natural en español sin perder la progresión del relato.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo usa el título común, no un nombre propio; «el rey» es la equivalencia directa y natural.
- source_word: לְהָמָן
  english_pob_choice: to Haman
  chosen_spanish: a Amán
  alternatives_spanish:
  - a Haman
  lexicon: HALOT
  rationale: Se translitera el nombre al español bíblico común como «Amán», manteniendo identificación inmediata para lectores en español.
- source_word: הַכֶּסֶף
  english_pob_choice: The silver
  chosen_spanish: La plata
  alternatives_spanish:
  - El dinero
  lexicon: HALOT
  rationale: כֶּסֶף puede significar literalmente «plata» o por extensión «dinero». Se conserva «plata» por cercanía al hebreo y porque el contexto de pago permite esa concreción sin forzar interpretación.
- source_word: נָתוּן לָךְ
  english_pob_choice: is given to you
  chosen_spanish: te es dada
  alternatives_spanish:
  - te es concedida
  - está a tu disposición
  lexicon: HALOT
  rationale: La construcción pasiva comunica algo puesto en manos de Haman. «Te es dada» preserva el valor formal y el matiz de entrega/giro al destinatario.
- source_word: וְהָעָם
  english_pob_choice: and the people also
  chosen_spanish: y también el pueblo
  alternatives_spanish:
  - y el pueblo también
  - y el pueblo
  lexicon: HALOT
  rationale: «Pueblo» refleja bien el colectivo hebreo en español. «También» expresa que se añade un segundo objeto además de la plata, como en el audit trail inglés.
- source_word: לַעֲשׂוֹת בּוֹ
  english_pob_choice: to do with them
  chosen_spanish: para hacer con él
  alternatives_spanish:
  - para tratar con él
  - para obrar con él
  lexicon: HALOT
  rationale: El hebreo usa el singular colectivo בּוֹ referido a «el pueblo»; en español se puede conservar ese singular colectivo con «él», manteniendo el dato morfológico y la referencia colectiva implícita.
- source_word: כַּטּוֹב בְּעֵינֶיךָ
  english_pob_choice: as seems good in your eyes
  chosen_spanish: lo que bien te parezca
  alternatives_spanish:
  - como te parezca bien
  - según te parezca bueno
  lexicon: HALOT
  rationale: El hebreo expresa un modismo de evaluación personal. «Lo que bien te parezca» transmite la fuerza idiomática en español sin perder la imagen de juicio subjetivo.
theological_decisions:
- issue: Tratamiento del colectivo singular «el pueblo» y su pronombre
  english_pob_reading: The people also ... to do with them
  chosen_spanish_reading: y también el pueblo, para hacer con él
  alternative_spanish_readings:
  - y también el pueblo, para hacer con ellos
  - y también el pueblo, para tratarlo
  rationale: El hebreo mantiene un singular colectivo; conservar «él» refleja el dato gramatical y evita borrar la tensión entre forma singular y sentido colectivo. En español bíblico puede sonar marcado, pero es fiel al texto.
  doctrine_reference: gramática hebrea / singular colectivo
- issue: Lexema para כֶּסֶף
  english_pob_reading: The silver is given to you
  chosen_spanish_reading: La plata te es dada
  alternative_spanish_readings:
  - El dinero te es dado
  - La plata está a tu disposición
  rationale: La elección conserva la ambigüedad original entre metal precioso y dinero, sin resolverla de manera innecesaria. Esto mantiene abierta la posibilidad semántica documentada por el POB en inglés.
  doctrine_reference: semántica léxica del hebreo bíblico
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios relevantes: se mantuvo la ambigüedad de כֶּסֶף, el valor de colectivos singulares y el modismo de ''in your eyes''. No se introdujeron lecturas textuales nuevas.'
  spanish_consistency_notes:
  - Se usa «Amán» de forma consistente con la tradición bíblica en español.
  - «Plata» se reservó para כֶּסֶף cuando el contexto de pago lo permite, sin ocultar la alternativa «dinero» en nota.
  - Se conservó el singular colectivo «pueblo ... él» para reflejar la gramática hebrea.
  - La puntuación con comillas y dos puntos sigue el uso editorial del español bíblico moderno.
