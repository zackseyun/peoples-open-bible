translation:
  language: es
  text: Y el ángel de Yahvé dijo a Gad que le dijera a David que David debía subir y levantar un altar a Yahvé en la era de Ornán el jebuseo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «que David tenía que subir».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh / the messenger of the LORD
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar 'mensajero' o 'ángel'; en este contexto narrativo, que presenta a un ser celestial, 'ángel' es la opción natural y la que mejor conserva el valor léxico reconocido por la POB inglesa. Se conserva 'Yahvé' por la directriz del proyecto para el nombre divino.
- source_word: אָמַר אֶל גָּד
  english_pob_choice: said to Gad
  chosen_spanish: dijo a Gad
  alternatives_spanish:
  - habló a Gad
  lexicon: HALOT
  rationale: אָמַר es el verbo estándar 'decir'. 'Dijo a' es la forma más directa y natural en español, manteniendo la relación verbal simple del hebreo.
- source_word: לֵ/אמֹר לְ/דָוִיד
  english_pob_choice: to say to David
  chosen_spanish: que dijera a David
  alternatives_spanish:
  - para decir a David
  - diciendo a David
  lexicon: HALOT
  rationale: El infinitivo לֵאמֹר introduce el contenido de lo dicho. En español, 'que dijera a David' comunica con claridad la cadena de comunicación y conserva el matiz de mandato/reporte sin forzar una paráfrasis excesiva.
- source_word: כִּ֣י יַעֲלֶ֣ה דָוִ֗יד
  english_pob_choice: that David should go up
  chosen_spanish: que David debía subir
  alternatives_spanish:
  - que David debía ir
  - que David debía ascender
  lexicon: HALOT
  rationale: יַעֲלֶה conserva el valor de 'subir'. En este contexto, 'debía subir' transmite la fuerza directiva del hebreo y evita una expansión interpretativa mayor.
- source_word: לְ/הָקִ֤ים
  english_pob_choice: and set up
  chosen_spanish: y levantar
  alternatives_spanish:
  - y erigir
  - y establecer
  lexicon: HALOT
  rationale: הקים aplicado a un altar significa 'levantar/erigir/establecer'. 'Levantar' preserva bien la imagen física y la acción de colocar el altar, sin sonar demasiado técnico para el español bíblico contemporáneo.
- source_word: מִזְבֵּחַ
  english_pob_choice: an altar
  chosen_spanish: un altar
  alternatives_spanish:
  - un sacrificio
  lexicon: HALOT
  rationale: מִזְבֵּחַ se traduce normalmente como 'altar', el término estándar para la estructura sacrificial.
- source_word: לַ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: El lamed aquí marca dedicación o relación. 'A Yahvé' conserva visible la preposición y funciona naturalmente con 'levantar un altar' en español.
- source_word: בְּ/גֹ֖רֶן
  english_pob_choice: on the threshing floor
  chosen_spanish: en la era
  alternatives_spanish:
  - sobre la era
  - en el lugar de trillar
  lexicon: HALOT
  rationale: גֹרֶן es 'era' o 'era de trillar/threshing floor'. 'En la era' es idiomático en español y suficientemente preciso, manteniendo la imagen agrícola del original.
- source_word: אָרְנָ֥ן
  english_pob_choice: Ornan
  chosen_spanish: Ornán
  alternatives_spanish:
  - Ornan
  lexicon: HALOT
  rationale: Se translitera el nombre propio con adaptación gráfica española común, manteniendo reconocimiento y pronunciación natural. Se conserva la forma del nombre sin añadir información no presente en el texto.
- source_word: הַ/יְבֻסִֽי
  english_pob_choice: the Jebusite
  chosen_spanish: el jebuseo
  alternatives_spanish:
  - el jebuseíta
  lexicon: HALOT
  rationale: הַיְבֻסִי es el gentilicio 'Jebusite'. 'Jebuseo' es la forma castellana más asentada y clara.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: 'Yahweh (English POB: Yahweh rather than LORD)'
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. Esto preserva el nombre pactal divino sin recurrir al reemplazo litúrgico ''SEÑOR''.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que cambió 'tell' por 'say' para reflejar mejor el verbo repetido de habla y añadió la coordinación entre 'go up' y 'set up'. En español, esto se refleja con 'que dijera a David' y 'subir y levantar'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'ángel' y no 'mensajero' en el texto principal, pero se conserva la alternativa en nota por la ambigüedad léxica documentada.
  - '''Era'' traduce גֹרֶן con una forma natural en español, manteniendo la referencia al lugar de trillar.'
  - '''Jebuseo'' sigue la forma castellana tradicional para el gentilicio.'
