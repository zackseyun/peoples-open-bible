translation:
  language: es
  text: Un hombre acostumbrado a palabras de reproche[a] nunca será disciplinado todos sus días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «palabras de insulto» o «palabras de abuso»; el griego ὀνειδισμοῦ permite esas variantes.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «de ningún modo será disciplinado», con una negación enfática; la expresión «todos sus días» significa durante toda su vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  english_pob_choice: A man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - Una persona
  - Un ser humano
  lexicon: LSJ
  rationale: El griego usa ἄνθρωπος en singular con forma masculina representativa. «Un hombre» conserva ese valor genérico sin neutralizar indebidamente el género gramatical del original.
- source_word: συνεθιζόμενος
  english_pob_choice: accustomed to / becomes accustomed to
  chosen_spanish: acostumbrado a
  alternatives_spanish:
  - que se acostumbra a
  - habituado a
  lexicon: LSJ
  rationale: El participio expresa una habituación estable por repetición. «Acostumbrado a» es natural en español y conserva la idea de una formación adquirida por costumbre.
- source_word: λόγοις ὀνειδισμοῦ
  english_pob_choice: words of reproach
  chosen_spanish: palabras de reproche
  alternatives_spanish:
  - palabras de insulto
  - palabras de abuso
  - habla de reproche
  lexicon: LSJ
  rationale: λόγοις significa «palabras» o «discurso», y ὀνειδισμός apunta a reproche, afrenta o insulto. «Palabras de reproche» sigue de cerca el griego y mantiene la amplitud semántica sin intensificar indebidamente hacia «abuso».
- source_word: ἐν πάσαις ταῖς ἡμέραις αὐτοῦ
  english_pob_choice: all his days
  chosen_spanish: en todos sus días
  alternatives_spanish:
  - durante todos sus días
  - a lo largo de todos sus días
  lexicon: LSJ
  rationale: La expresión idiomática señala la totalidad del periodo vital o del transcurso de sus días. «En todos sus días» preserva esa cobertura temporal de manera concisa y legible.
- source_word: οὐ μὴ παιδευθῇ
  english_pob_choice: will never be disciplined
  chosen_spanish: no será disciplinado
  alternatives_spanish:
  - de ningún modo será corregido
  - nunca será disciplinado
  - no será instruido
  lexicon: LSJ
  rationale: οὐ μή con subjuntivo aporta una negación enfática. «No será disciplinado» comunica la idea de corrección formativa/disciplinaria, y el contexto sapiencial favorece «disciplinado» frente a «instruido».
translation_notes:
  revision_awareness: Se sigue la revisión inglesa más natural («accustomed to») manteniendo la fuerza habitual del participio griego. La decisión de traducir οὐ μή con una negación simple en español conserva la semántica enfática sin forzar una estructura artificial.
  spanish_consistency_notes:
  - Se mantiene «disciplinado» para παιδευθῇ, en línea con el valor formativo/correctivo del verbo en contexto sapiencial.
  - Se conserva «reproche» como término principal, con alternativas en nota para reflejar la amplitud de ὀνειδισμοῦ.
  - El cierre temporal «en todos sus días» sigue de cerca el hebraísmo/idioma griego y evita una paráfrasis expansiva.
