translation:
  language: es
  text: Cuando haya una lesión de lepra[a] en una persona, esta será llevada al sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo צָרַעַת: tradicionalmente se ha traducido «lepra», pero probablemente abarca un conjunto más amplio de afecciones cutáneas graves que la lepra moderna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶגַע
  english_pob_choice: infection
  chosen_spanish: afección
  alternatives_spanish:
  - infección
  - plaga
  - mancha
  lexicon: HALOT
  rationale: En el contexto de Levítico 13, נֶגַע designa una condición visible que afecta a la persona o la piel. «Afección» mantiene la idea de un estado morboso sin forzar el término médico moderno «infección», que puede sugerir contagio explícito, ni «plaga», que en español suena demasiado genérico o catastrófico.
- source_word: צָרַעַת
  english_pob_choice: leprosy
  chosen_spanish: lepra
  alternatives_spanish:
  - enfermedad de la piel
  - afección cutánea
  - lepra ritual
  lexicon: HALOT
  rationale: POB optó por «leprosy» y luego documentó que el término cubre un cuadro más amplio que la lepra moderna. En español, «lepra» conserva la referencia tradicional y la tensión lexical documentada; alternativas como «enfermedad de la piel» aclaran más pero pierden la correspondencia directa con el texto fuente y con el registro auditado.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - si
  lexicon: HALOT
  rationale: La partícula introduce aquí una cláusula casuística. «Cuando» reproduce bien la formulación legal de la instrucción, como en el inglés auditado, sin convertirlo en mera posibilidad abstracta.
- source_word: תִהְיֶה
  english_pob_choice: is
  chosen_spanish: haya
  alternatives_spanish:
  - sea
  - esté
  lexicon: HALOT
  rationale: El verbo expresa existencia o presencia de la afección. En español, «haya» dentro de «cuando haya» comunica de forma natural esa presencia sin añadir matices no explícitos; «sea» o «esté» sonarían menos idiomáticos en esta construcción.
- source_word: בְּאָדָם
  english_pob_choice: in a person
  chosen_spanish: en un hombre
  alternatives_spanish:
  - en una persona
  - en un ser humano
  lexicon: HALOT
  rationale: El sustantivo אָדָם conserva aquí fuerza singular genérica. Se eligió «hombre» para reflejar esa forma masculina/genericidad del hebreo, en continuidad con la atención del proyecto a la precisión de género cuando la fuente la presenta así. «Persona» suaviza el rasgo formal del original.
- source_word: וְהוּבָא
  english_pob_choice: then he shall be brought
  chosen_spanish: será llevado
  alternatives_spanish:
  - y será llevado
  - deberá ser llevado
  lexicon: HALOT
  rationale: La forma pasiva con וְ marca secuencia procedimental. En español, «será llevado» reproduce con claridad la consecuencia legal. Se omite el «y» inicial por fluidez idiomática, sin perder el sentido consecutivo.
- source_word: אֶל הַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - a el sacerdote
  - ante el sacerdote
  lexicon: HALOT
  rationale: El artículo definido señala al sacerdote encargado de examinar el caso; «al sacerdote» es la forma natural en español y mantiene la referencia definida del hebreo.
theological_decisions:
- issue: Tratamiento de צָרַעַת y su alcance no idéntico a la lepra moderna
  english_pob_reading: The Hebrew term likely covers a broader range of serious skin conditions rather than specifically modern leprosy.
  chosen_spanish_reading: «Lepra» en el texto principal, con la nota de que el término hebreo abarca una afección más amplia que la lepra moderna.
  alternative_spanish_readings:
  - «enfermedad de la piel» en el texto principal
  - «afección cutánea» en el texto principal
  rationale: 'Se conserva la palabra tradicional y auditada por POB, pero sin borrar la tensión lexical: el alcance hebreo es más amplio que la enfermedad moderna llamada lepra. La nota explica esa diferencia para no falsear la fuente.'
  doctrine_reference: 'DOCTRINE.md: lexical transparency; contested terms table for צָרַעַת'
- issue: Valor genérico de אָדָם en una formulación legal singular
  english_pob_reading: in a person
  chosen_spanish_reading: «en un hombre»
  alternative_spanish_readings:
  - «en una persona»
  - «en un ser humano»
  rationale: La fuente hebrea usa אָדָם en singular genérico. En español, «hombre» conserva ese valor representativo y la huella formal del hebreo; la alternativa «persona» neutraliza demasiado el término y desplaza la correspondencia auditada.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral; contested terms table for אָדָם'
translation_notes:
  revision_awareness: 'Se siguió el trazado auditado: el inglés POB volvió a «leprosy» tras una revisión que había propuesto «skin disease», pero mantuvo la nota de alcance más amplio. Para el español se preservó ese equilibrio usando «lepra» en el texto principal y explicando su alcance en la nota, sin reemplazarlo por una paráfrasis más descriptiva. También se atendió la oscilación auditada entre «man/person» en אָדָם, optando por «hombre» por correspondencia formal con el hebreo.'
  spanish_consistency_notes:
  - Se emplea «sacerdote» para הַכֹּהֵן, conforme al registro bíblico y a la referencia definida del original.
  - La construcción «Cuando haya...» mantiene el tono casuístico de la ley sin sonar arcaica.
  - Se evita «SEÑOR» o equivalentes de máscara divina porque este verso no contiene el tetragrámaton ni un título divino.
  - No se introduce una lectura médica moderna que borre la amplitud semántica de צָרַעַת.
