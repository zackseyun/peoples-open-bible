translation:
  language: es
  text: Y ustedes consagrarán el quincuagésimo año, y proclamarán libertad[a] en la tierra para todos sus habitantes. Será un jubileo para ustedes, y cada uno[b] volverá a su propiedad[c], y cada uno volverá a su familia[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'liberación' o 'libertad' para דְּרוֹר. El término alude a una proclamación formal de liberación en el año del jubileo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'cada hombre'. La forma masculina singular tiene aquí valor distributivo y, en este contexto legal, se refiere a cada individuo del pueblo.
    reason: cultural_note
  - marker: c
    text: O 'a su posesión'; el hebreo se refiere especialmente a una tenencia heredada de tierra.
    reason: lexical_alternative
  - marker: d
    text: O 'a su clan'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִדַּשְׁתֶּם
  english_pob_choice: you shall consecrate
  chosen_spanish: santificarán
  alternatives_spanish:
  - consagrarán
  - apartarán como santo
  lexicon: HALOT
  rationale: קדשׁ en piel puede expresar consagrar o santificar. En español, 'santificarán' conserva bien el sentido cultual de apartar para Yahvé y suena natural en un registro bíblico digno.
- source_word: שְׁנַת הַחֲמִשִּׁים שָׁנָה
  english_pob_choice: the fiftieth year
  chosen_spanish: el año cincuenta
  alternatives_spanish:
  - el quincuagésimo año
  - el año de cincuenta
  lexicon: HALOT
  rationale: La construcción hebrea idiomáticamente designa el año cincuenta. 'El año cincuenta' es claro y fiel sin forzar una forma más marcada de la necesaria.
- source_word: וּקְרָאתֶם דְּרוֹר
  english_pob_choice: and proclaim liberty
  chosen_spanish: proclamarán libertad
  alternatives_spanish:
  - proclamarán liberación
  - declararán libertad
  lexicon: HALOT
  rationale: דְּרוֹר designa una proclamación formal de liberación/libertad, especialmente en el contexto del jubileo. 'Libertad' mantiene el alcance amplio del término y es una opción idiomática en español.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra del país
  lexicon: HALOT
  rationale: 'La preposición ב indica localización: ''en la tierra''. Se evita ampliar a ''por toda la tierra'' porque el hebreo no exige ese matiz, aunque el alcance queda sugerido por el contexto.'
- source_word: לְכָל יֹשְׁבֶיהָ
  english_pob_choice: to all its inhabitants
  chosen_spanish: para todos sus habitantes
  alternatives_spanish:
  - a todos los que habitan en ella
  - para todos los que viven en ella
  lexicon: HALOT
  rationale: El participio con sufijo significa 'sus habitantes'. 'Para todos sus habitantes' reproduce con naturalidad la destinación de la proclamación.
- source_word: יוֹבֵל הִוא תִּהְיֶה לָכֶם
  english_pob_choice: It shall be a jubilee for you
  chosen_spanish: Será un jubileo para ustedes
  alternatives_spanish:
  - Será Jubileo para ustedes
  - Será un año jubilar para ustedes
  lexicon: HALOT
  rationale: יוֹבֵל funciona aquí como término técnico para la institución del año jubilar. 'Jubileo' comunica el concepto con precisión y sin introducir una glosa excesiva.
- source_word: וְשַׁבְתֶּם ... תָּשֻׁבוּ
  english_pob_choice: shall return ... shall return
  chosen_spanish: volverá ... volverá
  alternatives_spanish:
  - regresará ... regresará
  - volveréis ... volveréis
  lexicon: HALOT
  rationale: Se conserva la repetición de שוב con el mismo verbo en español para reflejar la insistencia y el tema de restauración del hebreo.
- source_word: אִישׁ
  english_pob_choice: each of you
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: Aunque el hebreo usa אִישׁ en forma masculina singular, aquí es distributivo dentro de una segunda persona plural. 'Cada uno' refleja bien ese valor sin cargar innecesariamente el género en la superficie del español.
- source_word: אֶל אֲחֻזָּתוֹ
  english_pob_choice: to his property
  chosen_spanish: a su propiedad
  alternatives_spanish:
  - a su posesión
  - a su heredad
  lexicon: HALOT
  rationale: אֲחֻזָּה se refiere a una tenencia heredada o bien inmueble familiar. 'Propiedad' es la opción más clara y natural en español moderno, preservando el sentido legal de posesión territorial.
- source_word: אֶל מִשְׁפַּחְתּוֹ
  english_pob_choice: to his family
  chosen_spanish: a su familia
  alternatives_spanish:
  - a su clan
  - a su parentela
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede significar familia o clan. 'Familia' es la traducción más accesible y suficientemente amplia para el contexto jurídico-social del pasaje.
theological_decisions:
- issue: Sentido técnico de יוֹבֵל en el contexto del año cincuenta
  english_pob_reading: It shall be a jubilee for you
  chosen_spanish_reading: Será un jubileo para ustedes
  alternative_spanish_readings:
  - Será un año jubilar para ustedes
  - Será Jubileo para ustedes
  rationale: El texto no describe solo el sonido del cuerno, sino la institución del año de liberación y restauración. 'Jubileo' en minúscula funciona como nombre común técnico y evita una interpretación reducida.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Valor distributivo de איש dentro de una dirección en segunda persona plural
  english_pob_reading: each of you
  chosen_spanish_reading: cada uno
  alternative_spanish_readings:
  - cada hombre
  - cada persona
  rationale: El hebreo mantiene una forma masculina singular con fuerza distributiva. 'Cada uno' conserva esa distribución sin neutralizar indebidamente el estilo legal del hebreo; también evita una lectura demasiado individualista.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó 'each man' a 'each of you' para reflejar mejor el plural de segunda persona con valor distributivo de אִישׁ. Por eso el español usa 'cada uno' en ambas cláusulas, manteniendo el paralelo verbal y el registro jurídico. También se respetó la decisión auditada de no reducir יוֹבֵל a solo 'cuerno', sino traducirlo como término técnico del jubileo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como nombre divino por coherencia con el proyecto, aunque este versículo no lo contiene explícitamente.
  - Se conserva la repetición de 'volverá' para reflejar el doble שוב del hebreo.
  - '''Tierra'' traduce בָּאָרֶץ de forma directa; no se amplía a ''toda la tierra'' para no sobretraducir el alcance.'
  - El uso de 'jubileo' sigue la terminología POB para יוֹבֵל en este contexto legal-festivo.
