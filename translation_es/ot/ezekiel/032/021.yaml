  text: יְדַבְּרוּ ל֞/וֹ אֵלֵ֧י גִבּוֹרִ֛ים מִ/תּ֥וֹךְ שְׁא֖וֹל אֶת עֹֽזְרָ֑י/ו יָֽרְד֛וּ שָׁכְב֥וּ הָ/עֲרֵלִ֖ים חַלְלֵי חָֽרֶב־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/032/021.yaml
  text: 'The mighty among the chiefs will speak to him from the midst of Sheol[a], with his helpers: ‘They have gone down; they lie still, the uncircumcised[c][b], slain by the sword.’'
  footnotes:
  - marker: a
    text: Or 'the strong among the warriors'; the Hebrew phrase is difficult and could more literally be rendered 'the mighty ones of the warriors.'
    reason: lexical_alternative
  - marker: b
    text: Sheol is the Hebrew term for the realm of the dead; it is not identical in meaning to 'hell.'
    reason: cultural_note
  - marker: c
    text: Or 'with his allies.' The Hebrew can indicate those accompanying him in death.
    reason: lexical_alternative
