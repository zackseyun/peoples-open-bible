    rationale: El hebreo tiene dos verbos coordinados, pero en español narrativo «mandó llamar» comunica mejor la acción sin pérdida de sentido.
  - severity: low
    issue: Preferible «a donde sea» en vez de «adonde sea»
    rationale: En este contexto con antecedente implícito de dirección indefinida, «a donde» resulta más natural para lectores contemporáneos, aunque ambas formas pueden encontrarse.
