translation:
  language: es
  text: 'Y diréis así: “Al que vive[a]: paz para ti, paz para tu casa[b], y paz para todo lo que te pertenece”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “al que vive”. La expresión puede funcionar como saludo o como bendición de larga vida; se conserva aquí una forma cercana al hebreo para no perder la ambigüedad idiomática.'
    reason: alternative_reading
  - marker: b
    text: Hebreo shalom también puede implicar bienestar, plenitud o prosperidad, no solo ausencia de conflicto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: And say
  chosen_spanish: Y diréis
  alternatives_spanish:
  - Y say
  - Entonces diréis
  - Y ustedes dirán
  lexicon: HALOT
  rationale: La forma waw + perfecto funciona aquí como instrucción directa. En español, el futuro con valor exhortativo mantiene bien la fuerza mandativa y suena natural en registro bíblico y formal.
- source_word: כֹּה
  english_pob_choice: this
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - esto
  - de este modo
  lexicon: HALOT
  rationale: Introduce la fórmula citada; 'así' conserva el valor demostrativo y encabeza una cita directa en español con fluidez natural.
- source_word: לֶחָי
  english_pob_choice: To the living one
  chosen_spanish: Al viviente[a]
  alternatives_spanish:
  - Al que vive
  - Al vivo
  - A la vida
  lexicon: HALOT
  rationale: La expresión es idiomática y difícil. 'Al viviente' conserva la cercanía al hebreo y la ambigüedad benedictiva; la nota explica que puede funcionar como saludo o deseo de larga vida, según el contexto.
- source_word: וְאַתָּה שָׁלוֹם
  english_pob_choice: Peace to you
  chosen_spanish: Paz para ti
  alternatives_spanish:
  - Y tú, paz
  - Que tengas paz
  - Paz a ti
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal de bendición. 'Paz para ti' reproduce la concisión y el carácter optativo, sin forzar una paráfrasis más extensa.
- source_word: וּבֵיתְךָ שָׁלוֹם
  english_pob_choice: peace to your house
  chosen_spanish: paz para tu casa[b]
  alternatives_spanish:
  - paz para tu hogar
  - paz para tu familia
  - paz para tu casa y tu hogar
  lexicon: HALOT
  rationale: '''Casa'' conserva la imagen hebrea de בית, que puede abarcar hogar/linaje/entorno doméstico. Se mantiene el término básico y se aclara en nota la amplitud semántica de shalom.'
- source_word: וְכֹל אֲשֶׁר לְךָ שָׁלוֹם
  english_pob_choice: and peace to all that is yours
  chosen_spanish: y paz para todo lo que es tuyo
  alternatives_spanish:
  - y paz para todo cuanto posees
  - y paz para todo lo que te pertenece
  - y paz para todos tus bienes
  lexicon: HALOT
  rationale: La construcción hebrea extiende la bendición a todo lo que pertenece a la persona. 'Todo lo que es tuyo' es amplio, claro y no reduce indebidamente el alcance a posesiones materiales.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - prosperidad
  lexicon: HALOT
  rationale: '''Paz'' es la traducción base más fiel y reconocible; el término hebreo también puede incluir bienestar, plenitud o prosperidad, lo cual se aclara en la nota.'
theological_decisions:
- issue: Valor del saludo/bendición en לֶחָי
  english_pob_reading: The phrase is likely an idiomatic greeting or blessing, possibly 'Long life to you' or 'Greetings,' but the revised English keeps 'To the living one' to stay closer to the source while preserving ambiguity.
  chosen_spanish_reading: Al viviente
  alternative_spanish_readings:
  - ¡Larga vida para ti!
  - Saludos
  - Al que vive
  rationale: No se debe decidir de forma excesiva entre saludo y bendición cuando el hebreo permite ambos matices. El español conserva la literalidad relativa y deja abierta la fuerza idiomática, como hace el audit trail inglés revisado.
  doctrine_reference: Lexical ambiguity in OT blessing formulas
- issue: Amplitud semántica de שָׁלוֹם
  english_pob_reading: '''Peace'' translates Hebrew shalom, which can also carry the sense of well-being, wholeness, or prosperity.'
  chosen_spanish_reading: paz
  alternative_spanish_readings:
  - bienestar
  - plenitud
  - prosperidad
  rationale: Se mantiene 'paz' en el texto por su forma concisa y tradicional, sin borrar el alcance semántico más amplio. La nota preserva el matiz de bienestar/plenitud/prosperidad para no estrechar indebidamente el hebreo.
  doctrine_reference: Semantic range of שָׁלוֹם
translation_notes:
  revision_awareness: El inglés auditado revisó la apertura desde un sentido más interpretativo (“Long life to you”) hacia una forma más cercana al hebreo (“To the living one”). El español sigue esa revisión y mantiene la triple repetición de shalom con un registro formal y publicable.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por defecto en este proyecto, pero aquí no aparece el tetragrámaton.
  - Se eligió 'paz' para shalom como base textual, con nota para el rango semántico amplio.
  - Se prefirió una estructura directa y solemnemente bíblica sin caer en calco inglés.
  - La cita entre comillas mantiene la continuidad del discurso de David sin introducir comentario interpretativo adicional.
