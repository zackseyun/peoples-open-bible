base_translation:
  language: en
  yaml_path: translation/ot/zechariah/012/005.yaml
  text: Then the clans of Judah will say in their hearts[a], ‘The inhabitants of Jerusalem are my strength in Yahweh of Armies[b], their God.’
  footnotes:
  - marker: a
    text: Or, “the leaders of Judah” or “the chiefs of Judah.” The Hebrew אַלֻּפֵי can refer either to clan units or to their chiefs.
    reason: lexical_alternative
  - marker: b
    text: Or, “The inhabitants of Jerusalem are strength for me in the LORD of Armies, their God.” The preposition can be understood as expressing sphere (“in”) or means/ground (“through”).
    reason: alternative_reading
