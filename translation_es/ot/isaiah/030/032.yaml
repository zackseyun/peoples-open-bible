translation:
  language: es
  text: Y sucederá que cada golpe de la vara establecida que Yahvé ponga sobre él será con panderos y liras[a]; y con batallas de blandir armas[b] peleará contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada paso de la vara establecida»; la frase hebrea es difícil, y «golpe» interpreta la imagen como cada pasada o golpe de la vara.
    reason: lexical_alternative
  - marker: b
    text: O «peleará contra ella/él/ello»; el hebreo tiene un sufijo singular femenino, pero el referente exacto es incierto en el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una escena futura; «sucederá que» suena natural en español y conserva el valor resultativo/futuro sin sobrecargar el texto.
- source_word: כֹּל
  english_pob_choice: every
  chosen_spanish: cada
  alternatives_spanish:
  - todo
  - todos los
  lexicon: HALOT
  rationale: El valor distributivo del sustantivo singular se refleja mejor con «cada» que con un totalizador general.
- source_word: מַעֲבַר
  english_pob_choice: stroke
  chosen_spanish: golpe
  alternatives_spanish:
  - paso
  - pasada
  - sacudida
  lexicon: HALOT
  rationale: El término es difícil; el contexto de vara/juicio permite entender una acción concreta de golpeo. «Golpe» mantiene la imagen punitiva sin fingir mayor precisión de la que ofrece el hebreo.
- source_word: מַטֵּה
  english_pob_choice: rod
  chosen_spanish: vara
  alternatives_spanish:
  - vara
  - cetro
  - bastón
  lexicon: HALOT
  rationale: En contexto de castigo divino, «vara» comunica mejor el instrumento de disciplina que «cetro» o «bastón».
- source_word: מוּסָדָה
  english_pob_choice: appointed
  chosen_spanish: establecida
  alternatives_spanish:
  - fijada
  - determinada
  - decretada
  lexicon: HALOT
  rationale: El adjetivo pasivo indica algo asentado o establecido de antemano. «Establecida» conserva esa idea sin introducir una decisión interpretativa más fuerte de la necesaria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: DOCTRINE.md contested terms
  rationale: Se sigue la convención del proyecto para el nombre divino, manteniendo el referente explícito y transparente en el texto principal.
- source_word: בְּתֻפִּים וּבְכִנֹּרוֹת
  english_pob_choice: with tambourines and lyres
  chosen_spanish: con panderos y arpas
  alternatives_spanish:
  - con panderos y liras
  - con tamboriles y arpas
  lexicon: HALOT
  rationale: «Panderos» y «arpas» son equivalentes naturales y claros en español bíblico actual; «liras» sería más técnico pero menos idiomático para la recepción general.
- source_word: וּבְמִלְחֲמוֹת תְּנוּפָה
  english_pob_choice: with battles of brandishing
  chosen_spanish: con batallas de agitación
  alternatives_spanish:
  - con batallas de brandir
  - con combates de agitación
  - con guerras de agitación
  lexicon: HALOT
  rationale: La expresión es oscura y el hebreo conserva una imagen de movimiento violento. «Agitación» mantiene la idea de sacudida/impulso sin suavizarla demasiado; se evita convertirla en una paráfrasis interpretativa más cerrada.
- source_word: נִלְחַם
  english_pob_choice: he will fight
  chosen_spanish: peleará
  alternatives_spanish:
  - combatirá
  - luchará
  lexicon: HALOT
  rationale: El verbo refleja combate real; «peleará» es claro y fiel al nivel de registro del pasaje.
- source_word: בָהּ
  english_pob_choice: against them
  chosen_spanish: contra ella
  alternatives_spanish:
  - contra él
  - contra ello
  - contra ellos
  lexicon: HALOT
  rationale: La terminación femenina singular es la forma más cercana al hebreo. Se conserva esa tensión en el texto principal en vez de resolverla del todo, porque el referente es incierto en contexto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto exige transparencia con el nombre divino; «Yahvé» mantiene visible el tetragrámaton sin sustituirlo por una convención de ocultamiento. «SEÑOR» se evita por diseño del proyecto; «Jehová» no corresponde a la línea terminológica adoptada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referente final de la batalla
  english_pob_reading: he will fight against them
  chosen_spanish_reading: peleará contra ella
  alternative_spanish_readings:
  - peleará contra él
  - peleará contra ellos
  - peleará contra eso
  rationale: Se preserva la ambigüedad del sufijo femenino singular, que el hebreo presenta de modo difícil. El texto principal no resuelve excesivamente el referente, para no borrar la tensión documentada por el audit trail.
  doctrine_reference: Contexto inmediato de Isaías 30:31-33; decisión auditada en el POB inglés
translation_notes:
  revision_awareness: Se siguió el rastro de revisión más reciente, que ajustó la preposición repetida en la cola de la frase a una formulación consistente. En español se reflejó esa estructura con «con ... y con ...», y se mantuvo la dificultad lexical de מַעֲבַר y del sufijo final sin sobrerresolverla.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto.
  - Se prefirió «vara» para מַטֵּה por el matiz de castigo/juicio.
  - Se evitó «Cristo» o terminología eclesiástica no presente en el texto.
  - La ambigüedad del final se preserva mediante nota y no se aplanó en una lectura totalmente explícita.
