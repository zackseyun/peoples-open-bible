  - marker: c
    text: '''Wave offering'' refers to a ritual presentation before the LORD; some render more generally ''presentation offering.'''
    reason: cultural_note
  - marker: d
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: lexical_alternative
