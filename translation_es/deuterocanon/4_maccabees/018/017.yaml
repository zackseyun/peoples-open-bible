  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y la línea auditada en inglés: una apelación al testimonio de Ezequiel con la cita de Ez 37:3. Sin embargo, «dio testimonio de Ezequiel» en español suena menos natural y puede sugerir hablar acerca de Ezequiel más que apelar a Ezequiel como testigo. Conviene ajustar la formulación para conservar mejor el matiz testimonial de ἐπιστοποιεῖτο.'
