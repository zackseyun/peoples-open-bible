  - 허물
  lexicon: BDAG
  rationale: παράπτωμα의 「실족·잘못」을 자연스럽게.
- source_word: καταρτίζετε
  english_pob_choice: restore
  chosen_korean: 바로잡아 주다
  alternatives_korean:
