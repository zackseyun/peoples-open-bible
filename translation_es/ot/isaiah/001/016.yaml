review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia imperativa del hebreo y conserva la imagen moral de lavado/limpieza, así como la expresión vívida «de delante de mis ojos». Sin embargo, «purifíquense» para הִזַּכּוּ se aparta de la elección auditada «make yourselves clean» y del rationale teológico que evita un matiz demasiado ritualizado; además, «Aparten el mal de sus obras» suena menos natural y menos preciso que una formulación con «quiten» o «remuevan».
  spanish_quality_summary: 'El español es generalmente claro y legible, pero «purifíquense» introduce una resonancia más sacral/ritual de lo deseado en este contexto, y «Aparten el mal de sus obras» resulta algo rígido. «Háganse limpios» sería demasiado literal, así que conviene una solución natural que preserve el sentido ético: «límpiense». También «Quiten de delante de mis ojos el mal de sus obras» mejora la fluidez y el foco sintáctico.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La revisión propuesta alinea mejor la decisión teológica sobre lenguaje de limpieza moral no sacramental, manteniendo «mal», «obras» y la literalidad relativa de «de delante de mis ojos».
  issues:
  - severity: medium
    issue: «purifíquense» para הִזַּכּוּ
    rationale: Aunque es una alternativa posible y aparece en la nota inglesa, el texto principal auditado prefirió «make yourselves clean» precisamente para no sobre-ritualizar. En español, «purifíquense» suena más cultual que «límpiense» o una formulación equivalente.
  - severity: medium
    issue: «Aparten el mal de sus obras»
    rationale: La combinación es menos idiomática y puede sugerir separar el mal de las obras como si fueran entidades distintas. «Quiten ... el mal de sus obras» expresa mejor la idea de remover la maldad presente en sus hechos.
  revised_spanish_text: Lávense[a]; límpiense. Quiten de delante de mis ojos[b] el mal de sus obras. Dejen de hacer el mal.
  revised_footnotes:
  - marker: a
    text: O «purifíquense». El hebreo puede expresar el sentido de volverse limpio o puro.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «de delante de mis ojos».'
    reason: lexical_alternative
