review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB en casi todos los segmentos: ἐφελκυσθεῖσα = «sea arrastrada», παραπορευομένων = «los que pasan», κοιμηθῇ = «se acueste con él», τὴν πλησίον = «la que está junto a ella», y ὀνειδίζει = «reprocha». Sin embargo, falla en un punto clave de alineación textual: la última cláusula griega οὔτε τὸ σχοινίον αὐτῆς διεράγη es negativa («ni se rompió su cordel»), mientras que el borrador español la volvió afirmativa («ni se rompió su cordel» está bien en el texto principal, pero la decisión léxica explica erróneamente que la negación queda expresada por el contexto; en realidad debe mantenerse explícita, como ya hace el texto). El otro ajuste necesario es estilístico-semántico en el arranque: «siempre que» sugiere habitualidad más marcada que ὅταν δέ; «cuando» o «cada vez que» refleja mejor el valor condicional-temporal.'
  spanish_quality_summary: El español es claro y mayormente natural, con tono bíblico moderno adecuado. No obstante, «Pero siempre que» suena algo torpe en este contexto; «Pero cuando» fluye mejor. Además, la nota [c] está anclada en «ella» dentro de «como ella[c]», aunque su contenido explica el «cordel»; el anclaje debe colocarse junto a «cordel[aquí c]» para corresponder al referente real. El resto del registro es legible y digno.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. El verso no contiene nombres divinos ni títulos mesiánicos. Las elecciones «arrastrada», «se acueste con él», «reprocha» y «cordel» están dentro de lo esperado. Conviene conservar la negación explícita en «ni se rompió su cordel[c]».
  issues:
  - severity: medium
    issue: Inicio «Pero siempre que»
    rationale: ὅταν δέ aquí se vierte con más naturalidad y precisión como «Pero cuando» o «Pero cada vez que». «Siempre que» puede leerse como condición amplia o habitualidad innecesariamente marcada.
  - severity: high
    issue: Anclaje incorrecto de la nota sobre «cordel»
    rationale: La nota [c] explica el significado cultural de «cordel», pero en el borrador está colocada tras «ella». Los marcadores deben aparecer en la palabra o frase pertinente.
  - severity: low
    issue: Explicación léxica de la cláusula final imprecisa
    rationale: La racionalización en metadatos dice que la negación queda expresada por el contexto, cuando en el griego la negación está explícita con οὔτε. El texto principal ya debe mantenerla explícita.
