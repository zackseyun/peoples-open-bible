translation:
  language: es
  text: Y el rey Ciro sacó los vasos sagrados del Señor, los cuales Nabucodonosor había llevado de Jerusalén y depositado en la casa de su dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego puede sugerir «en su santuario de ídolos» o «en su casa de ídolo»; el paralelo hebreo dice «en la casa de su dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξήνεγκεν
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - sacó fuera
  - hizo salir
  - trajo fuera
  lexicon: BDAG
  rationale: El verbo indica retirar algo de un lugar de custodia o de resguardo. En español, «sacó» es natural, breve y conserva el movimiento de extracción sin añadir matices ajenos.
- source_word: τὰ ἅγια σκεύη
  english_pob_choice: the holy vessels
  chosen_spanish: los vasos santos
  alternatives_spanish:
  - los vasos sagrados
  - los utensilios santos
  - los objetos santos
  lexicon: BDAG
  rationale: «Vasos» mantiene el sustantivo cultual concreto y «santos» conserva la consagración. Evito «utensilios» porque suaviza demasiado el valor cultual del término.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Dios
  - del Dueño
  lexicon: BDAG
  rationale: Aquí κύριος se refiere al Dios de Israel en un contexto de templo. En español, «Señor» conserva el título reverencial y sigue de cerca la decisión auditada del inglés POB. No se usa «Yahvé» en el texto principal porque la base griega dice κυρίου y el registro español puede reflejar el título sin forzar la forma del nombre.
- source_word: μετήγαγεν
  english_pob_choice: had carried away
  chosen_spanish: había llevado
  alternatives_spanish:
  - había trasladado
  - había transportado
  - había arrebatado
  lexicon: BDAG
  rationale: El compuesto expresa traslado de un lugar a otro en contexto de conquista. «Había llevado» es natural en español y mantiene el hecho de la remoción sin añadir una connotación más violenta de la que el verbo exige por sí mismo.
- source_word: ἀπηρείσατο
  english_pob_choice: deposited
  chosen_spanish: depositado
  alternatives_spanish:
  - colocado
  - puesto
  - guardado
  lexicon: LSJ
  rationale: El verbo describe poner los objetos en un lugar formal o de resguardo. «Depositado» conserva el matiz de colocación solemne en un recinto cultual, en línea con la lectura auditada del inglés.
- source_word: ἐν τῷ εἰδώλιῳ αὐτοῦ
  english_pob_choice: in the house of his god
  chosen_spanish: en la casa de su dios
  alternatives_spanish:
  - en su santuario de ídolos
  - en su templo idolátrico
  - en la casa de su ídolo
  lexicon: LSJ
  rationale: La frase griega puede sugerir un ámbito idolátrico, pero el paralelo hebreo habla de «la casa de su dios». La traducción principal sigue esa equivalencia contextual para conservar legibilidad y concordar con el testimonio paralelo, sin perder el sentido religioso general del pasaje.
theological_decisions:
- issue: Cómo traducir κύριος en un contexto de objetos del templo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: La fuente griega usa κυρίου; la decisión auditada del inglés es «Lord». En español, «Señor» expresa el título reverencial sin introducir la convención tipográfica de mayúsculas sostenidas ni sustituir el griego por una forma del nombre divino que no aparece en este versículo.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
- issue: Relación entre la frase griega εἰδώλιῳ αὐτοῦ y el paralelo hebreo
  english_pob_reading: in the house of his god
  chosen_spanish_reading: en la casa de su dios
  alternative_spanish_readings:
  - en su santuario idolátrico
  - en la casa de su ídolo
  - en su templo de ídolos
  rationale: El texto griego tiene un matiz más áspero con εἰδώλιον, pero el contexto narrativo y el paralelo hebreo favorecen entender el lugar como el santuario del dios de Nabucodonosor. La lectura principal mantiene esa equivalencia sin ocultar el trasfondo idolátrico, que queda sugerido por el contexto y por la nota.
  doctrine_reference: 'DOCTRINE.md: parallel-source alignment and lexical transparency'
translation_notes:
  revision_awareness: Se siguió la revisión auditada que mantiene como ancla principal el griego de Swete y toma el paralelo hebreo solo como control de sentido. No se detectaron revisiones aplicadas posteriores; el pasaje permaneció estable en el pase más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κυρίου, conforme al criterio del proyecto y al valor reverencial del título.
  - Se conservó «vasos santos» para τὰ ἅγια σκεύη, evitando diluir el registro cultual.
  - Se eligió «casa de su dios» como traducción principal de la frase final para reflejar la equivalencia contextual con el paralelo hebreo, dejando la alternativa más literal en nota.
  - No se introdujo «Yahvé» en el texto principal porque el griego aquí usa κύριος y el audit trail inglés también opta por «Lord».
