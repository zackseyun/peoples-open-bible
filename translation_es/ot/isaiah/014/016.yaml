translation:
  language: es
  text: 'Los que te ven fijarán sus ojos en ti; te observarán atentamente[a]: «¿Es este el hombre que hacía temblar la tierra, que sacudía reinos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te examinarán» / «te considerarán». El verbo hebreo puede incluir la idea de un escrutinio cuidadoso, no solo de mirar.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאֶיךָ
  english_pob_choice: those who see you
  chosen_spanish: los que te ven
  alternatives_spanish:
  - los que te están viendo
  - quienes te ven
  lexicon: HALOT
  rationale: El participio plural con sufijo funciona sustantivamente; en español, «los que te ven» conserva el valor de sujeto plural y el trato directo sin sonar forzado.
- source_word: אֵלֶיךָ יַשְׁגִּיחוּ
  english_pob_choice: will stare at you
  chosen_spanish: fijarán sus ojos en ti
  alternatives_spanish:
  - te mirarán fijamente
  - te observarán
  lexicon: HALOT
  rationale: El verbo hiphil comunica una mirada dirigida e intencional. «Fijarán sus ojos en ti» transmite mejor la intensidad y el carácter de escrutinio que un simple «mirarán».
- source_word: אֵלֶיךָ יִתְבּוֹנָנוּ
  english_pob_choice: they will look closely at you
  chosen_spanish: te observarán atentamente
  alternatives_spanish:
  - te examinarán
  - te considerarán cuidadosamente
  lexicon: HALOT
  rationale: La forma reflexiva sugiere observación cuidadosa o examen. «Te observarán atentamente» mantiene el paralelismo visual y la idea de inspección minuciosa.
- source_word: הֲזֶה
  english_pob_choice: Is this
  chosen_spanish: ¿Es este
  alternatives_spanish:
  - ¿Es este mismo
  - ¿Es este el
  lexicon: HALOT
  rationale: La combinación interrogativa-demostrativa se expresa de manera natural en español con «¿Es este» para conservar el golpe retórico.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - este hombre
  - el varón
  lexicon: HALOT
  rationale: Se conserva el valor léxico de un individuo masculino concreto, sin introducir una identificación teológica ajena al contexto inmediato.
- source_word: מַרְגִּיז הָאָרֶץ
  english_pob_choice: who made the earth tremble
  chosen_spanish: que hacía temblar la tierra
  alternatives_spanish:
  - que hacía estremecer la tierra
  - que hizo temblar la tierra
  lexicon: HALOT
  rationale: El participio causativo comunica la acción de producir temblor; «hacía temblar» refleja bien el aspecto descriptivo y mantiene la fuerza idiomática.
- source_word: מַרְעִישׁ מַמְלָכוֹת
  english_pob_choice: who shook kingdoms
  chosen_spanish: que hacía estremecer reinos
  alternatives_spanish:
  - que sacudía reinos
  - que hacía temblar reinos
  lexicon: HALOT
  rationale: «Estremecer reinos» preserva el paralelismo con la primera cláusula y conserva la idea de sacudida política y cósmica sin volverlo excesivamente literal.
theological_decisions:
- issue: Referente de «el hombre» en el taunt
  english_pob_reading: Translate straightforwardly as a human ruler without importing later interpretive identifications into the text.
  chosen_spanish_reading: Traducirlo como un gobernante humano, sin introducir en el texto principal una identificación posterior con Satanás o Lucero.
  alternative_spanish_readings:
  - traducirlo como Satanás/Lucero
  - fusionar en el texto principal al rey de Babilonia con un rebelde cósmico
  rationale: El hebreo dice «el hombre» y el contexto inmediato es un lamento burlesco sobre el rey de Babilonia. La traducción principal debe seguir el sentido del texto base y dejar las lecturas teológicas posteriores fuera del cuerpo del versículo.
  doctrine_reference: Principio de primacía del texto original; conservar la tensión teológica sin resolverla por anticipado.
translation_notes:
  revision_awareness: La versión se mantiene alineada con el último pase revisado, sin cambios sustanciales respecto al sentido del hebreo y del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «tierra» y «reinos» como paralelos directos de los sustantivos hebreos.
  - Se evitó «SEÑOR» o cualquier terminología de máscara, ya que el versículo no contiene el Nombre divino.
  - Se preservó el tono de asombro y escrutinio con una estructura de dos verbos coordinados.
  - No se añadieron notas al pie porque el matiz lexical puede expresarse con claridad en el texto principal.
