  text: προεγνωσμένου μὲν πρὸ καταβολῆς κόσμου, φανερωθέντος δὲ ἐπ’ ἐσχάτου τῶν χρόνων δι’ ὑμᾶς
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/020.yaml
  text: 'He was foreknown before the foundation of the world, but was revealed at the end of the times for your sake,'
translation:
  language: ko
  text: '그분은 창세 전에 미리 아신 바 되셨고, 이 마지막 때에 여러분을 위하여 나타나셨습니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προεγνωσμένου
  english_pob_choice: was foreknown
  chosen_korean: 미리 아신 바 되셨고
  alternatives_korean:
  - 미리 알려지셨고
  - 예지되셨고
  lexicon: BDAG
  rationale: 신적 수동의 「미리 아심」을 「미리 아신 바 되다」로 옮겨 1:2의 πρόγνωσις와 어휘적 일관성을 유지한다.
- source_word: πρὸ καταβολῆς κόσμου
  english_pob_choice: before the foundation of the world
  chosen_korean: 창세 전에
  alternatives_korean:
  - 세상의 기초가 놓이기 전에
  - 우주의 창조 이전에
  lexicon: BDAG
  rationale: 한국 성서 전통의 「창세 전」을 채택. 간결하고 의미가 명확하다.
- source_word: ἐπ’ ἐσχάτου τῶν χρόνων
  english_pob_choice: at the end of the times
  chosen_korean: 이 마지막 때에
  alternatives_korean:
  - 마지막 시기에
  - 시대의 끝에
  lexicon: BDAG
  rationale: 종말론적 「마지막 때」를 보존하되, 한국어 어감으로 「이 마지막 때에」가 자연스럽다.
- source_word: δι’ ὑμᾶς
  english_pob_choice: for your sake
  chosen_korean: 여러분을 위하여
  alternatives_korean:
  - 너희 때문에
  lexicon: BDAG
  rationale: διά + 대격의 목적·수혜 의미를 「위하여」로 옮긴다.
