base_translation:
  language: en
  yaml_path: translation/deuterocanon/baruch/002/023.yaml
  text: I will cause the sound of gladness and the sound of rejoicing to cease from the cities of Judah and from the outskirts of Jerusalem[a], the sound of bridegroom and the sound of bride[b], and all the land will become impassable because of its inhabitants.
  footnotes:
  - marker: a
    text: 'Greek: ''from outside Jerusalem.'' Some translations smooth this to ''from the streets of Jerusalem'' under the influence of parallel prophetic formulas, but the extant Greek here reads ''outside.'''
    reason: alternative_reading
  - marker: b
    text: The final phrase is difficult in Greek. It may also be understood as 'all the land will become impassable, without inhabitants' or 'devoid of inhabitants.'
    reason: lexical_alternative
