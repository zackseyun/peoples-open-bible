translation:
  language: es
  text: Ahora, levántate, sal y habla al corazón de tus siervos[a], porque juro por Yahvé que, si no sales, ni un hombre se quedará contigo esta noche, y esto será para ti peor que toda la adversidad que te ha sobrevenido desde tu juventud hasta ahora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «habla al corazón de tus siervos», un modismo que significa hablar con bondad, consuelo o persuasión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Marca de transición discursiva urgente; «Ahora» conserva la inmediatez sin añadir matices no presentes en el hebreo.
- source_word: קוּם צֵא
  english_pob_choice: get up, go out
  chosen_spanish: levántate, sal
  alternatives_spanish:
  - ponte en pie, sal
  - alza, sal
  lexicon: HALOT
  rationale: Se preservan los dos imperativos. «Levántate» comunica naturalmente קוּם en español; «sal» mantiene la acción concreta de צֵא.
- source_word: וְדַבֵּר עַל־לֵב
  english_pob_choice: speak to the heart of
  chosen_spanish: habla al corazón de
  alternatives_spanish:
  - habla con palabras de ánimo a
  - habla de manera reconfortante a
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea literal por transparencia. La frase española mantiene la fuerza idiomática sin borrar la metáfora del corazón.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus esclavos
  lexicon: HALOT
  rationale: En este contexto cortesano y político, el término expresa subordinación y lealtad; «siervos» comunica la relación sin sonar excesivamente moderno ni cargar el sentido de esclavitud chattel.
- source_word: כִּי בַיהוָה נִשְׁבַּעְתִּי
  english_pob_choice: for I swear by Yahweh
  chosen_spanish: porque por Yahvé he jurado
  alternatives_spanish:
  - porque juro por Yahvé
  - pues por Yahvé he jurado
  lexicon: HALOT
  rationale: La forma verbal de juramento se vierte con perfectivo español para reflejar la declaración solemne ya emitida. Se mantiene «Yahvé» según el estándar del proyecto.
- source_word: אֵינְךָ יוֹצֵא אִם
  english_pob_choice: if you do not go out
  chosen_spanish: si no sales
  alternatives_spanish:
  - si tú no sales
  - si no vas a salir
  lexicon: HALOT
  rationale: Condicional directo y natural en español. Se conserva el sentido de la cláusula de amenaza ligada al juramento.
- source_word: יָלִין אִישׁ אִתְּךָ הַלַּיְלָה
  english_pob_choice: not a man will stay with you tonight
  chosen_spanish: ni un hombre se quedará contigo esta noche
  alternatives_spanish:
  - ningún hombre permanecerá contigo esta noche
  - no se quedará contigo un solo hombre esta noche
  lexicon: HALOT
  rationale: «Lodging/staying overnight» se expresa con «se quedará» en español corriente. «Ni un hombre» conserva el valor totalizador del hebreo y el singular colectivo de אִישׁ.
- source_word: וְרָעָה לְךָ זֹאת
  english_pob_choice: this will be worse for you
  chosen_spanish: y esto será para ti peor
  alternatives_spanish:
  - y esto te irá peor
  - y esto te será más malo
  lexicon: HALOT
  rationale: La comparación se completa en la cláusula siguiente; «peor» conserva la evaluación comparativa y evita moralizar «mal» como si fuera solo ética.
- source_word: מִכָּל הָרָעָה
  english_pob_choice: than all the trouble
  chosen_spanish: que todo el mal
  alternatives_spanish:
  - que toda la calamidad
  - que toda la desgracia
  lexicon: HALOT
  rationale: Aquí רָעָה apunta a desastre/adversidad en un contexto histórico, y «mal» conserva la amplitud semántica sin limitarlo a maldad moral. Se deja la comparación abierta como en el hebreo.
- source_word: אֲשֶׁר בָּאָה עָלֶיךָ
  english_pob_choice: that has come upon you
  chosen_spanish: que te ha sobrevenido
  alternatives_spanish:
  - que te ha venido encima
  - que te ha acontecido
  lexicon: HALOT
  rationale: «Sobrevenido» refleja bien la idea de un mal que cae sobre alguien; es elevado pero comprensible en registro bíblico.
- source_word: מִנְּעֻרֶיךָ עַד עָתָּה
  english_pob_choice: from your youth until now
  chosen_spanish: desde tu juventud hasta ahora
  alternatives_spanish:
  - desde tu niñez hasta ahora
  - desde tus años mozos hasta ahora
  lexicon: HALOT
  rationale: Expresión temporal estándar y fiel al alcance de toda la vida del destinatario hasta el presente.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto manda usar «Yahvé» como forma principal en español. Se evita el reemplazo por «SEÑOR» para conservar el nombre del pacto tal como lo permite el texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de עֲבָדֶיךָ en contexto real/cortesano
  english_pob_reading: your servants
  chosen_spanish_reading: tus siervos
  alternative_spanish_readings:
  - tus esclavos
  - tus servidores
  rationale: Aunque el término hebreo puede abarcar esclavos, vasallos o servidores, aquí la relación es de lealtad política dentro de la corte. «Siervos» evita una lectura demasiado material de esclavitud sin diluir la subordinación.
  doctrine_reference: HALOT; contexto narrativo de 2 Samuel
- issue: Valor de רָעָה en la cláusula comparativa
  english_pob_reading: trouble
  chosen_spanish_reading: mal
  alternative_spanish_readings:
  - desgracia
  - calamidad
  - adversidad
  rationale: La serie de infortunios de David sugiere calamidad/adversidad, pero «mal» conserva la amplitud semántica del hebreo y la estructura comparativa del versículo.
  doctrine_reference: HALOT; uso contextual de רעה
translation_notes:
  revision_awareness: Se revisó el paquete fuente hebreo, la traducción inglesa POB y sus decisiones léxicas. No se introdujeron cambios textuales relevantes respecto del sentido auditado; la principal adaptación fue mantener la transparencia idiomática de עַל־לֵב en español y el nombre divino «Yahvé» conforme al estándar del proyecto.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יהוה.
  - 'Se preservó el paralelismo de imperativos: «levántate, sal y habla».'
  - Se mantuvo la metáfora hebrea «al corazón» con nota explicativa para lectorado eclesial.
  - Se optó por «siervos» en lugar de «esclavos» por el contexto cortesano, sin borrar la subordinación implícita.
