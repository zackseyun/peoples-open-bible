revisions:
- from: 'Y Josué les dijo[a]: «Pasen delante del arca de Yahvé su Dios, hasta en medio del Jordán; y levante cada hombre una piedra sobre su hombro, conforme al número de las tribus de los hijos de Israel».'
  to: 'Y Josué les dijo[a]: «Crucen delante del arca de Yahvé su Dios hasta el medio del Jordán, y que cada hombre levante una piedra sobre su hombro, conforme al número de las tribus de los hijos de Israel».'
  rationale: 'Se hicieron reparaciones menores para mejorar fidelidad al hebreo y naturalidad del español: «Crucen» refleja mejor el cruce del río; «y que cada hombre levante» corrige la sintaxis del mandato distributivo; «hasta el medio del Jordán» suena más natural sin perder el sentido de תּוֹךְ.'
  reviewer_model: gpt-5.4
