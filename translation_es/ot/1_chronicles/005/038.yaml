translation:
  language: es
  text: Ahitub[a] engendró a Zadok, y Zadok engendró a Shallum[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La línea separa nombres propios; no implica diferencia de sentido en español.
    reason: spanish_style_note
  - marker: b
    text: Se mantiene la transliteración de los nombres propios para seguir el texto fuente y la consistencia del proyecto.
    reason: source_note
lexical_decisions:
- source_word: וַ/אֲחִיטוּב
  english_pob_choice: Ahitub
  chosen_spanish: Ahitub
  alternatives_spanish:
  - Ahitub
  lexicon: HALOT
  rationale: Es un nombre propio; en español se translitera, no se traduce. La conjunción inicial queda absorbida por la sintaxis genealógica del español, como en el texto inglés.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  - engendró
  lexicon: HALOT
  rationale: En genealogías, el verbo expresa paternidad genealógica. 'Engendró' conserva ese valor y suena más natural y digno en español bíblico que un calco como 'padreó'; también mantiene la concisión del inglés POB.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce explícitamente]'
  alternatives_spanish:
  - a
  lexicon: HALOT
  rationale: El marcador de objeto directo hebreo no tiene equivalente independiente en español; su función se refleja con la estructura verbal y la preposición 'a' ante nombres personales.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Zadok
  alternatives_spanish:
  - Sadoc
  lexicon: HALOT
  rationale: Nombre propio. Se conserva la transliteración coherente con el audit trail inglés. 'Sadoc' sería una forma tradicional hispana, pero no es necesaria aquí y alteraría la consistencia del proyecto.
- source_word: וְ/צָדוֹק
  english_pob_choice: and Zadok
  chosen_spanish: y Zadok
  alternatives_spanish:
  - y Zadok
  lexicon: HALOT
  rationale: La waw conjuntiva se vierte naturalmente como 'y' para unir la segunda generación en la genealogía.
- source_word: שַׁלּוּם
  english_pob_choice: Shallum
  chosen_spanish: Shallum
  alternatives_spanish:
  - Salum
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la forma del audit trail inglés; 'Salum' es una adaptación tradicional posible, pero no requerida por la evidencia del texto fuente.
theological_decisions:
- issue: Verbo genealógico de paternidad
  english_pob_reading: fathered
  chosen_spanish_reading: engendró
  alternative_spanish_readings:
  - fue padre de
  - engendró a
  rationale: 'No hay tensión doctrinal en el verso, pero sí una decisión lexical relevante: el hebreo genealógico expresa generación/paternidad. ''Engendró'' preserva el valor semántico sin introducir más interpretación de la necesaria.'
  doctrine_reference: Genealogías bíblicas; precisión lexical en relatos de linaje
translation_notes:
  revision_awareness: El texto inglés de referencia no introdujo notas ni cambios revisados; la versión hebrea y el audit trail coinciden plenamente, así que la traducción española sigue directamente esa lectura sin necesidad de variantes textuales.
  spanish_consistency_notes:
  - Se usa un registro bíblico contemporáneo y digno.
  - Se conserva la transliteración de los nombres propios para coherencia con el POB inglés.
  - '''Engendró'' se usa de manera consistente para el verbo genealógico הוֹלִיד.'
  - No se emplea 'SEÑOR' ni terminología teológica ajena al pasaje.
