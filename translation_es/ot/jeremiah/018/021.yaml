review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura imprecatoria del hebreo y conserva la mayor parte del sentido básico: entrega al hambre, exposición a la espada, viudez y mortandad masculina. Sin embargo, varios giros no preservan con suficiente precisión la fuerza léxica documentada en la auditoría inglesa. «Sin hijos» reduce שַׁכֻּלוֹת a un estado y pierde el matiz de duelo/pérdida; «heridos por la espada» debilita מֻכֵּי חֶרֶב, que aquí apunta a ser abatidos/derribados mortalmente; y la nota [a] no refleja realmente la alternativa inglesa, que es la imagen más concreta de «en manos de la espada».'
  spanish_quality_summary: El texto es legible y digno, pero tiene algunos problemas de naturalidad y precisión. «Sean muertos por muerte» suena marcado, pero esa extrañeza es defendible por la rareza del hebreo; aun así conviene apoyarla con nota exacta. «Sus jóvenes» es aceptable, pero «sus jóvenes hombres» no sería natural; «sus jóvenes» funciona si el contexto militar ya está claro. «Queden viudas y sin hijos» invierte el orden y atenúa el valor de «bereaved». Una formulación como «queden sin hijos y viudas» o mejor «queden privadas de sus hijos y viudas» refleja mejor el hebreo y sigue siendo clara.
  glossary_alignment: 'No hay conflictos con terminología de proyecto como Yahvé/Mesías. Las decisiones principales requieren ajuste más por fidelidad léxica que por glosario: mantener la metáfora de la espada en nota [a], reflejar mejor שַׁכֻּלוֹת, y fortalecer מֻכֵּי חֶרֶב con «abatidos» o «derribados» en vez de «heridos».'
  issues:
  - severity: medium
    issue: La nota [a] no preserva la alternativa documentada del inglés.
    rationale: La auditoría inglesa conserva la lectura más concreta «into the hands of the sword». La nota española actual repite casi el texto principal y no aporta esa alternativa significativa.
  - severity: medium
    issue: «Sin hijos» para שַׁכֻּלוֹת reduce el matiz de duelo/bereavement.
    rationale: El hebreo no significa meramente carencia de hijos, sino quedar privada de ellos por pérdida. La traducción debe reflejar esa aflicción, no solo el resultado.
  - severity: high
    issue: «Heridos por la espada» debilita מֻכֵּי חֶרֶב.
    rationale: En paralelo con el resto del versículo de juicio mortal, el participio indica ser abatidos/derribados por la espada, no simplemente lesionados.
  - severity: low
    issue: «En la guerra» es menos idiomático aquí que «en batalla».
    rationale: Aunque fiel en sentido amplio, el contexto inmediato es de combate; «en batalla» corresponde mejor al inglés auditado y al cierre del verso.
  revised_spanish_text: Por tanto, entrega a sus hijos al hambre[a], y entrégalos al poder de la espada. Que sus esposas queden privadas de sus hijos[b] y viudas, y que sus hombres sean muertos por muerte[c], sus jóvenes abatidos por la espada en batalla.
  revised_footnotes:
