review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura paralela del griego y conserva adecuadamente «poder», «raíz» e «inmortalidad». Sin embargo, el punto principal del verso es δικαιοσύνη, y aquí el rastro de auditoría inglés documenta de forma explícita que la lectura principal debe ser «righteousness» por su sentido de rectitud delante de Dios, con «justice» solo como alternativa. El español principal «justicia completa» no preserva esa decisión ni el matiz teológico priorizado por el proyecto.
  spanish_quality_summary: 'La redacción es clara y natural, aunque «el conocer tu poder» suena un poco más pesado que «conocer tu poder». El giro «Porque el conocerte…» es aceptable y digno. La principal mejora necesaria es léxica/teológica: usar «rectitud completa» como texto principal en vez de «justicia completa».'
  glossary_alignment: 'Desalineación relevante en δικαιοσύνη: el proyecto y la auditoría favorecen «righteousness», que en este contexto se expresa mejor en español como «rectitud» que como «justicia». La nota alternativa debe preservar «justicia», no al revés. Los demás términos concuerdan con las decisiones auditadas.'
  issues:
  - severity: high
    issue: δικαιοσύνη está traducido en el texto principal como «justicia»
    rationale: La evidencia auditada establece «righteousness» como lectura principal en este contexto sapiencial-teológico. En español, «justicia» desplaza el sentido hacia lo social/legal y no preserva bien la decisión documentada. «Rectitud» comunica mejor la relación correcta con Dios.
  - severity: medium
    issue: La nota léxica invierte la prioridad documentada
    rationale: El inglés POB da «justice» como alternativa, no como lectura principal. En español la nota debería ofrecer «justicia» como opción alternativa a «rectitud», no presentar «rectitud» como alternativa de «justicia».
  - severity: low
    issue: «el conocer tu poder» puede simplificarse
    rationale: Aunque es comprensible y refleja el infinitivo sustantivado, «conocer tu poder» suena más natural en español y mantiene el paralelismo con «conocerte».
  revised_spanish_text: Porque conocerte es rectitud completa[a], y conocer tu poder es raíz de inmortalidad.
  revised_footnotes:
  - marker: a
    text: 'O «justicia»: «Porque conocerte es justicia completa».'
    reason: lexical_alternative
