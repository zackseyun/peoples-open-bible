base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/016/005.yaml
  text: Asaph was the chief[a], and second to him was Zechariah; then Jeiel, Shemiramoth, Jehiel, Mattithiah, Eliab, Benaiah, Obed-edom, and Jeiel, with instruments of harps and lyres[b]; and Asaph sounded the cymbals.
  footnotes:
  - marker: a
    text: Or 'and his second was Zechariah.' The Hebrew term indicates second rank relative to Asaph.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew distinguishes two stringed instruments: nebalim and kinnorot, rendered here ''harps'' and ''lyres.'''
    reason: cultural_note
