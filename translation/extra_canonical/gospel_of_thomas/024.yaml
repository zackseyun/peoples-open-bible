greek_overlap_decision:
  witness: POxy 655 (frg. D)
  agreement: minor_divergence
  chosen_basis: coptic
  rationale: 'The Greek fragment reads conditionally: “If light is in a man of light,
    it shines in all the world; but if it is not, (the world) is in darkness.” The
    Coptic presents a declarative (“A light is within a man of light”) and makes the
    human the subject of the lighting (“he lights the whole world”). Given the fuller
    Coptic context and clear subject-marking ⲛⲧⲟϥ, the translation follows the Coptic
    while noting the Greek’s impersonal/conditional phrasing.'
synoptic_parallel_check:
  parallels:
  - Matt 11:15; Mark 4:9; Luke 8:8 (ears to hear formula)
  - Matt 5:14–16 (light of the world)
  - Luke 11:34–36 (light within/whole body imagery)
  handling: context_only
  rationale: Thomas’s diction (“man of light”) and subject emphasis differ; the translation
    preserves Thomas’s strangeness and does not harmonize to Synoptic phrasing.
