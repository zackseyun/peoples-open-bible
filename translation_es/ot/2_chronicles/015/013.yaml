translation:
  language: es
  text: Y todo el que no buscara a Yahvé[a], el Dios de Israel, sería ejecutado, desde el pequeño hasta el grande[b], desde el hombre hasta la mujer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quien no buscara a Yahvé». El verbo hebreo puede verterse más simplemente como «no buscara», pero aquí funciona dentro de una estipulación solemne de pacto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «desde el menor hasta el mayor». El hebreo usa un modismo que expresa totalidad dentro de toda la comunidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל אֲשֶׁר
  english_pob_choice: And everyone who
  chosen_spanish: Y todos los que
  alternatives_spanish:
  - Y cualquiera que
  - Y todos los que
  lexicon: HALOT
  rationale: כֹל con אֲשֶׁר introduce un relativo inclusivo y total. «Y todos los que» conserva el alcance universal del hebreo con español natural y solemne.
- source_word: לֹא יִדְרֹשׁ
  english_pob_choice: would not seek
  chosen_spanish: no buscaran
  alternatives_spanish:
  - no buscarían
  - no buscaran
  - no consultaran
  lexicon: HALOT
  rationale: En contexto de pacto y lealtad cultual, דרשׁ expresa buscar a Yahvé, no solo “preguntar”. El subjuntivo en una cláusula de estipulación legal refleja mejor la fuerza volitiva de la advertencia que un simple pasado.
- source_word: לַיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Yahvé
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de traducir יהוה como «Yahvé» en el texto principal, sin ocultar el nombre divino.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa identifica de manera directa al Dios del pacto como el Dios de Israel; «el Dios de Israel» es la forma natural y fiel en español.
- source_word: יוּמָת
  english_pob_choice: was to be put to death
  chosen_spanish: debían ser muertos
  alternatives_spanish:
  - debía ser muerto
  - debían morir
  - serían muertos
  lexicon: HALOT
  rationale: El hofal de מות expresa ser ejecutado, no meramente morir. En español, «debían ser muertos» preserva la pasividad causativa y la fuerza jurídica del dictamen sin suavizarla.
- source_word: לְמִן קָטֹן וְעַד גָּדוֹל
  english_pob_choice: from small to great
  chosen_spanish: desde el pequeño hasta el grande
  alternatives_spanish:
  - desde el menor hasta el mayor
  - desde lo pequeño hasta lo grande
  lexicon: HALOT
  rationale: El idioma hebreo marca totalidad social. «Pequeño/grande» conserva la imagen del original; «desde el pequeño hasta el grande» es fiel y idiomático en español, sin forzar una interpretación solo etaria.
- source_word: לְמֵאִישׁ וְעַד אִשָּׁה
  english_pob_choice: from man to woman
  chosen_spanish: desde el hombre hasta la mujer
  alternatives_spanish:
  - desde el varón hasta la mujer
  - de hombre a mujer
  lexicon: HALOT
  rationale: La pareja distributiva se mantiene en singular para respetar el hebreo. «Hombre/mujer» comunica con claridad la cobertura total por sexo sin abstractizar la expresión.
theological_decisions:
- issue: Mantener el nombre divino y la severidad del mandato penal
  english_pob_reading: The text states that anyone who would not seek Yahweh, the God of Israel, was to be put to death.
  chosen_spanish_reading: 'Se conserva «Yahvé» en el texto y se traduce la pena como ejecución real: «debían ser muertos».'
  alternative_spanish_readings:
  - al SEÑOR... serían apartados
  - a Yahvé... morirían
  rationale: La lectura del inglés POB entiende el hebreo como estipulación pactual con pena de muerte literal, no como mera exclusión ritual. La traducción española no debe atenuar esa fuerza ni sustituir el nombre divino por un título velado.
  doctrine_reference: Principio de primacía del original; no suavizar ni reemplazar el juicio explícito del texto fuente.
translation_notes:
  revision_awareness: 'Se siguió la auditoría inglesa sin cambios sustantivos: se conservó el alcance universal, la fuerza volitiva de דרשׁ en contexto pactual y la ejecución literal de יוּמָת. No hubo revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología base del proyecto.
  - «Debían ser muertos» conserva la pasiva causativa del hebreo y evita suavizar la pena capital.
  - La pareja «pequeño/grande» se deja abierta para abarcar edad y estatus, conforme a la nota inglesa.
  - Se usa «hombre/mujer» en singular distributivo para reflejar la forma hebrea sin perder naturalidad en español.
