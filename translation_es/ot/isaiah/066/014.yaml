translation:
  language: es
  text: Ustedes verán[a], y su corazón se alegrará; sus huesos florecerán como la hierba. La mano de Yahvé se dará a conocer a sus siervos, y se indignará contra sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y verán». El hebreo puede leerse con la conjunción explícita («y») o con una forma más fluida en español; el texto principal expresa claramente el sujeto sin añadir un objeto no presente en el original.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּרְאִיתֶם
  english_pob_choice: You will see
  chosen_spanish: Lo verán
  alternatives_spanish:
  - Y ustedes verán
  - Verán
  lexicon: HALOT
  rationale: El hebreo profético usa futuro/resultativo. En español, «Lo verán» mantiene la referencia implícita al contenido visible del contexto inmediato sin sobrecargar la frase con un sujeto explícito innecesario.
- source_word: וְשָׂשׂ לִבְּכֶם
  english_pob_choice: your heart will rejoice
  chosen_spanish: su corazón se alegrará
  alternatives_spanish:
  - su corazón se gozará
  - su corazón se regocijará
  lexicon: HALOT
  rationale: El singular «corazón» conserva el sujeto colectivo y la alegría interior. «Se alegrará» es natural en español y no atenúa el valor emotivo del verbo hebreo.
- source_word: וְעַצְמוֹתֵיכֶם
  english_pob_choice: your bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - sus mismos huesos
  - sus huesos mismos
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal literal. «Huesos» expresa renovación profunda y física sin necesidad de paráfrasis.
- source_word: כַּדֶּשֶׁא תִפְרַחְנָה
  english_pob_choice: will flourish like the grass
  chosen_spanish: florecerán como la hierba
  alternatives_spanish:
  - brotarán como la hierba
  - florecerán como el pasto
  lexicon: HALOT
  rationale: «פרח» admite la idea de brotar/florecer. «Florecerán como la hierba» conserva la comparación y suena natural en español; «hierba» mantiene el paralelo bíblico de crecimiento verde.
- source_word: וְנוֹדְעָה יַד יְהוָה
  english_pob_choice: The hand of Yahweh will be made known
  chosen_spanish: La mano de Yahvé se dará a conocer
  alternatives_spanish:
  - La mano de Yahvé será conocida
  - La mano de Yahvé se manifestará
  lexicon: HALOT
  rationale: El nifal de ידע comunica manifestación o reconocimiento. «Se dará a conocer» refleja bien la pasiva/resultativa y conserva el idiomatismo bíblico de «la mano» como poder activo de Yahvé.
- source_word: יַד יְהוָה
  english_pob_choice: the hand of Yahweh
  chosen_spanish: La mano de Yahvé
  alternatives_spanish:
  - La mano del SEÑOR
  - El poder de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal tal como está en el hebreo. No se sustituye por «poder» porque la imagen de «mano» forma parte del sentido bíblico de intervención activa.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: HALOT
  rationale: Aquí el contexto resalta pertenencia y lealtad al Señor, no la fuerza lexical de esclavitud. En español «siervos» comunica mejor la relación reverente, y coincide con el uso contextual tradicional en este tipo de pasaje.
- source_word: וְזָעַם
  english_pob_choice: he will be indignant
  chosen_spanish: se indignará
  alternatives_spanish:
  - mostrará indignación
  - se enojará
  lexicon: HALOT
  rationale: El verbo expresa indignación o ira. «Se indignará» preserva el tono divino sin añadir una acción concreta que el hebreo no especifica.
- source_word: אֶת אֹיְבָיו
  english_pob_choice: against his enemies
  chosen_spanish: contra sus enemigos
  alternatives_spanish:
  - frente a sus enemigos
  - con sus enemigos
  lexicon: HALOT
  rationale: El objeto marcado por את requiere en español una relación adversativa clara. «Contra» expresa de forma natural el foco hostil del verbo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto pide traducir יְהוָה como «Yahvé» en el texto principal. Se conserva el nombre del pacto sin ocultarlo tras un título. La elección sigue la norma establecida del POB en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre favor para los siervos e ira contra los enemigos
  english_pob_reading: and he will be indignant against his enemies
  chosen_spanish_reading: y se indignará contra sus enemigos
  alternative_spanish_readings:
  - pero se indignará contra sus enemigos
  - e indignará contra sus enemigos
  rationale: El hebreo une las cláusulas con una conjunción simple. Se evita añadir un contraste explícito con «pero», porque el último revision pass del audit trail corrigió esa lectura para reflejar más directamente la coordinación del original.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión final importante: se reemplazó «but» por «and» para seguir más de cerca la conjunción hebrea y evitar una fuerza adversativa no explícita. La versión española refleja esa decisión con «y» en la cláusula final. También se preservó la lectura de «Yahvé» para el Tetragrámaton y se mantuvo la imagen de «la mano» sin paráfrasis conceptual.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología del proyecto para יְהוָה.
  - Se prefirió «siervos» por la decisión contextual ya documentada en el audit trail inglés, aunque «esclavos» sería posible lexicalmente en otros contextos.
  - Se conservó la imaginería corporal literal («corazón», «huesos», «mano») sin suavizarla, porque el hebreo la usa para expresar alegría y renovación profundas.
  - La nota al pie se ancla en «Lo verán» para señalar la alternativa explícita sin introducir una paráfrasis innecesaria en el texto principal.
