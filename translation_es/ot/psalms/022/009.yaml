translation:
  language: es
  text: «¡Encomiéndate a Yahvé; que él lo rescate; que él lo libre[a], porque en él se deleita!»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Rueda a Yahvé». El modismo significa encomendarse a él o poner en sus manos la propia causa o carga.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּל
  english_pob_choice: Commit yourself
  chosen_spanish: Entrégate
  alternatives_spanish:
  - Confía
  - Encomienda
  lexicon: HALOT
  rationale: El imperativo de גלל con אֶל expresa la idea idiomática de poner la carga o el caso en manos de Yahvé. En español, «entrégate» conserva el valor exhortativo y la dirección de entrega personal sin forzar un calco como «rueda». En este contexto de burla citada, mantiene la fuerza retórica del llamado.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección hacia Yahvé. En español, «entrégate a Yahvé» comunica esa orientación de forma natural y fiel al hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del pacto, no un título sustituto. «Yahvé» refleja la política terminológica del proyecto y preserva la referencia al Tetragrama.
- source_word: יְפַלְּטֵהוּ
  english_pob_choice: let him rescue him
  chosen_spanish: que él lo rescate
  alternatives_spanish:
  - que él lo libre
  - que él lo saque
  lexicon: HALOT
  rationale: פּלט en piel tiene la idea de hacer escapar o rescatar. «Rescate» transmite bien la acción de librar de un peligro concreto y preserva el paralelismo con el verbo siguiente sin fusionarlos.
- source_word: יַצִּילֵהוּ
  english_pob_choice: let him deliver him
  chosen_spanish: que él lo libre
  alternatives_spanish:
  - que él lo salve
  - que él lo saque
  lexicon: HALOT
  rationale: נצל en hiphil suele significar liberar o rescatar. «Librar» es idiomático en español y mantiene una distinción útil respecto de «rescatar» en la línea anterior.
- source_word: כִּי
  english_pob_choice: since
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La conjunción introduce la razón del desafío. «Porque» comunica causalidad de manera clara y sobria en español.
- source_word: חָפֵץ
  english_pob_choice: delights
  chosen_spanish: se deleita
  alternatives_spanish:
  - se complace
  - tiene placer
  lexicon: HALOT
  rationale: חפץ expresa deleite o complacencia. «Se deleita» conserva la valoración afectiva y relacional, con un registro natural y bíblico a la vez.
- source_word: בּוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: Con חפץ, la preposición suele equivaler a «deleitarse en». «En él» mantiene la estructura semántica y la referencia personal del hebreo.
theological_decisions:
- issue: Voz imperativa e ironía citada
  english_pob_reading: The line is the enemies' taunt in quoted speech, with third-person suffixes showing they mock the afflicted righteous man.
  chosen_spanish_reading: 'La línea se entiende como burla citada: «Entrégate a Yahvé…», dirigida al justo afligido de manera sarcástica.'
  alternative_spanish_readings:
  - «Entrégalo a Yahvé…»
  - «Entrégate tú a Yahvé…»
  rationale: Los sufijos de tercera persona en los verbos posteriores muestran que los hablantes se refieren al afligido en tercera persona, aunque el imperativo inicial puede sonar en español como exhortación directa. «Entrégate» conserva la ambigüedad retórica del hebreo y funciona bien en la escena de burla sin falsear la referencia.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Este borrador sigue la revisión más reciente del auditorio inglés: se adopta la lectura idiomática del imperativo como exhortación directa («Commit yourself»), pero se conserva el trasfondo de burla y la distinción verbal entre «rescatar» y «librar». También se respeta la decisión terminológica de usar Yahvé para el Tetragrama.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se distingue entre «rescatar» y «librar» para reflejar la paralelismo de פּלט / נצל.
  - Se evita «Cristo» u otra terminología no presente en el versículo.
  - El tono es sobrio y publicable, con puntuación de cita en estilo español.
