translation:
  language: es
  text: Habitó ciudades arruinadas[a], casas en las que nadie vive, las cuales estaban destinadas a convertirse en montones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Habitó ciudades destruidas, casas en las que no viven, las cuales estaban destinadas a convertirse en montones”. El hebreo de este versículo es compacto y permite varias traducciones muy cercanas, especialmente en la cláusula media.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁכּוֹן
  english_pob_choice: He has lived
  chosen_spanish: Habitó
  alternatives_spanish:
  - Ha habitado
  - Vivió
  - Se estableció
  lexicon: HALOT
  rationale: שכן significa 'habitar/vivir/establecerse'. En español, 'habitó' conserva el valor verbal concreto sin forzar un perfecto compuesto que el hebreo no exige de manera obligatoria.
- source_word: עָרִים נִכְחָדוֹת
  english_pob_choice: ruined cities
  chosen_spanish: ciudades arruinadas
  alternatives_spanish:
  - ciudades destruidas
  - ciudades desoladas
  - ciudades en ruinas
  lexicon: HALOT
  rationale: נִכְחָדוֹת expresa algo borrado, arruinado o desolado. 'Arruinadas' comunica bien el estado de devastación y mantiene una forma natural en español.
- source_word: בָּתִּים לֹא יֵשְׁבוּ לָמוֹ
  english_pob_choice: in houses where no one dwells
  chosen_spanish: casas en las que nadie vive
  alternatives_spanish:
  - casas donde no habita nadie
  - casas en que no se vive
  - casas deshabitadas
  lexicon: HALOT
  rationale: La cláusula hebrea es compacta y algo difícil. 'Nadie vive' expresa con claridad el sentido de abandono sin obligar una construcción torpe con el sufijo pronominal.
- source_word: אֲשֶׁר הִתְעַתְּדוּ
  english_pob_choice: which were destined
  chosen_spanish: las cuales estaban destinadas
  alternatives_spanish:
  - las cuales fueron preparadas
  - las cuales fueron dispuestas
  - las cuales estaban preparadas
  lexicon: HALOT
  rationale: El hitpael de עתד puede significar 'prepararse/ser preparado' o 'ser destinado'. 'Estaban destinadas' conserva el impulso prospectivo y encaja bien con el flujo del verso.
- source_word: לְגַלִּים
  english_pob_choice: to become heaps
  chosen_spanish: a ser montones de ruinas
  alternatives_spanish:
  - a quedar en ruinas
  - a convertirse en montones
  - para ser montones de escombros
  lexicon: HALOT
  rationale: גַּלִּים son montones o cúmulos, especialmente de ruinas o piedras. 'Montones de ruinas' mantiene el resultado físico y el tono visual del hebreo.
translation_notes:
  revision_awareness: Texto elaborado a partir del hebreo masorético (WLC) y del auditoría inglesa de la POB, sin cambios revisionales reportados en el pase más reciente; se conservó la ambigüedad reconocida en la cláusula media y el valor resultativo del conjunto.
  spanish_consistency_notes:
  - Se mantuvo 'ciudades arruinadas' en el cuerpo y se indicó una alternativa cercana en nota para reflejar la compacidad del hebreo.
  - Se prefirió 'nadie vive' por claridad natural en español, sin perder el sentido de abandono.
  - '''Destinadas'' y ''montones de ruinas'' intentan reproducir el giro prospectivo del hebreo sin sobreparafrasear.'
