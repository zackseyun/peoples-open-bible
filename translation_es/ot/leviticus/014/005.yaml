  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: secuencia procedimental, sujeto cultual, acción mandada en pasiva, un ave del par, recipiente de barro y agua no estancada. Sin embargo, dos puntos requieren ajuste para mayor fidelidad y claridad: (1) «agua fresca» no comunica tan bien en español bíblico/ritual el sentido de מַיִם חַיִּים como «agua corriente», preservando «agua viva» en nota; (2) la coma en «sobre un recipiente de barro, con...» separa innecesariamente la relación y suena menos natural que «que contiene».'
  spanish_quality_summary: El español es claro y digno, pero «agua fresca» puede sugerir temperatura más que agua fluyente/no estancada. Además, la nota [b] resulta prescindible si se formula mejor el sintagma principal. «Se degüelle» es aceptable y preciso en contexto ritual.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Sacerdote» y «ave» están bien. «Degüelle» mantiene la fuerza de שחט. La mejor equivalencia para מַיִם חַיִּים aquí en español es «agua corriente», con nota para «agua viva».
  issues:
  - severity: medium
    issue: «Agua fresca» es menos fiel al sentido ritual de מַיִם חַיִּים en español.
    rationale: En español, «fresca» suele evocar temperatura o frescor, mientras que el hebreo apunta a agua viva/corriente, es decir, no estancada, de fuente o flujo natural.
  - severity: low
    issue: La construcción «sobre un recipiente de barro, con agua...» suena algo suelta.
    rationale: La relación entre el recipiente y el agua queda más natural y precisa con «que contiene agua corriente», sin necesidad de una nota explicativa adicional sobre la preposición.
