  I do not speak”) followed by a counterbalancing clause (“yet great is the number
  of my words”). The antithetical paradox is kept sharp, with ‘talk/speak’ as near-synonymous
  verbs and ‘number of my words’ providing the ironic reversal.
voice_check: First-person singular declarative consistent with Thunder’s self-revelatory
  voice. The assertive paradox (‘I do not … yet …’) maintains the oracular, provocative
  tone.
