base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/033/030.yaml
  text: And you[a], son of man, the sons of your people who speak about you beside the walls and in the doorways of the houses, each one speaking with another, each man with his brother, saying[b], ‘Come now and hear what the word is that comes from Yahweh.’
  footnotes:
