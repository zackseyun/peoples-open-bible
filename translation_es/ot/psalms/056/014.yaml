translation:
  language: es
  text: Porque tú has librado mi alma[a] de la muerte; ¿no has guardado también mis pies para que no tropiecen[b], para que yo ande delante de Dios en la luz de la vida[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mi vida’. El hebreo nephesh puede significar el alma, la vida o la persona misma.
    reason: lexical_alternative
  - marker: b
    text: O ‘para que no caigan’.
    reason: lexical_alternative
  - marker: c
    text: O ‘en la luz de los vivientes’.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o razón de la afirmación anterior con un conector natural en español. 'Porque' conserva la fuerza causal y funciona bien en el tono de salmo de agradecimiento.
- source_word: הִצַּלְתָּ
  english_pob_choice: you have delivered
  chosen_spanish: has librado
  alternatives_spanish:
  - has entregado
  - has salvado
  lexicon: HALOT
  rationale: El verbo expresa rescate o liberación efectiva. 'Has librado' comunica bien la acción de sacar de un peligro sin sobrecargar el verso con un matiz doctrinal ajeno al contexto poético.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí
  lexicon: HALOT
  rationale: Se conserva el valor poético y antropológico de נֶפֶשׁ sin reducirlo solo a 'vida'. 'Alma' es la opción más natural y reverente en español para mantener la tensión entre alma/vida/persona que el hebreo permite.
- source_word: מִמָּוֶת
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de morir
  - de muerte
  lexicon: HALOT
  rationale: La preposición con el sustantivo se vierte de manera directa y transparente. 'De la muerte' preserva el alcance de liberación desde el poder o amenaza de la muerte.
- source_word: הֲלֹא
  english_pob_choice: have you not also
  chosen_spanish: ¿no has también
  alternatives_spanish:
  - ¿acaso no has
  - ¿no es verdad que también has
  lexicon: HALOT
  rationale: La partícula retórica espera una respuesta afirmativa. En español, la inversión interrogativa mantiene la fuerza del hebreo y 'también' refleja la conexión con la primera cola del verso.
- source_word: רַגְלַי
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - mis pasos
  - mis pisadas
  lexicon: HALOT
  rationale: La imagen concreta se mantiene literalmente, como en el texto hebreo. 'Mis pies' suena natural y deja ver la metáfora del caminar.
- source_word: מִדֶּחִי
  english_pob_choice: from stumbling
  chosen_spanish: de tropezar
  alternatives_spanish:
  - de caer
  - de un tropiezo
  lexicon: HALOT
  rationale: El sustantivo hebreo puede expresar derribo, caída o tropiezo. 'De tropezar' armoniza con 'mis pies' y con la imagen de andar, sin perder la posibilidad de caída implícita.
- source_word: לְהִתְהַלֵּךְ
  english_pob_choice: that I may walk
  chosen_spanish: para que yo ande
  alternatives_spanish:
  - para caminar
  - a fin de que yo ande
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. 'Para que yo ande' reproduce el propósito de forma natural en español y mantiene el matiz de una vida continua delante de Dios.
- source_word: לִפְנֵי אֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en presencia de Dios
  - ante Dios
  lexicon: HALOT
  rationale: '''Delante de Dios'' sigue de cerca la imagen espacial del hebreo y suena muy bien en español bíblico contemporáneo. Conserva el tono relacional y de presencia divina.'
- source_word: בְּאוֹר הַחַיִּים
  english_pob_choice: in the light of life
  chosen_spanish: en la luz de la vida
  alternatives_spanish:
  - en la luz de los vivientes
  - en la luz que es la vida
  lexicon: HALOT
  rationale: Se preserva la imagen poética tal como está en el hebreo. 'La luz de la vida' mantiene la relación genitiva sin forzar una explicación interpretativa que el texto no exige.
theological_decisions:
- issue: Valor de נֶפֶשׁ en un contexto de liberación
  english_pob_reading: my soul
  chosen_spanish_reading: mi alma
  alternative_spanish_readings:
  - mi vida
  - a mí
  rationale: El verso habla de rescate desde la muerte, pero el hebreo usa נֶפֶשׁ, un término con carga amplia y poética. 'Mi alma' conserva la tensión entre la interioridad, la vida y la persona completa, sin resolverla de forma reductiva.
  doctrine_reference: Preservar la tensión semántica antropológica del texto poético.
- issue: Fuerza de la pregunta retórica con הֲלֹא
  english_pob_reading: have you not also kept my feet from stumbling
  chosen_spanish_reading: ¿no has también guardado mis pies de tropezar?
  alternative_spanish_readings:
  - ¿acaso no has guardado también mis pies de caer?
  - ¿no es verdad que también has guardado mis pies?
  rationale: La pregunta retórica no expresa duda real, sino afirmación confiada. En español conviene mantener la forma interrogativa para conservar el énfasis del hebreo y la continuidad con la alabanza implícita.
  doctrine_reference: Retórica hebrea y afirmación implícita.
- issue: Sentido de בְּאוֹר הַחַיִּים
  english_pob_reading: in the light of life
  chosen_spanish_reading: en la luz de la vida
  alternative_spanish_readings:
  - en la luz de los vivientes
  - en la luz que pertenece a la vida
  rationale: La frase es poética y ambigua; puede evocar la esfera de la vida o la luz que acompaña la vida. 'En la luz de la vida' mantiene esa ambigüedad sin importar una glosa interpretativa fuera del texto.
  doctrine_reference: Respetar la ambigüedad poética del hebreo.
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión que corrigió la puntuación para clarificar la relación entre la liberación de la muerte, el guardar los pies y la cláusula de propósito. La versión española adopta la misma estructura con punto y coma, manteniendo la pregunta retórica y el enlace lógico del propósito sin introducir una ruptura innecesaria.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo de dos acciones divinas: librar del peligro de muerte y guardar los pies del tropiezo.'
  - Se mantiene el lenguaje poético de 'alma', 'pies', 'andar' y 'luz' sin convertirlo en paráfrasis explicativa.
  - La frase final reproduce la ambigüedad de 'life/living' mediante una nota alternativa, no en el cuerpo principal.
  - 'La puntuación española sigue la revisión auditada: dos miembros principales unidos por punto y coma, con la pregunta retórica integrada de manera natural.'
