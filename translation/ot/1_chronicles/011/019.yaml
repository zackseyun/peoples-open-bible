theological_decisions:
- issue: Interpretation of 'blood' in David's statement
  chosen_reading: Retain literal 'blood' while allowing the context to show it is metaphorical/evaluative because the water was obtained through mortal danger.
  alternative_readings:
  - Paraphrase as 'water won by risking their lives' in the main text
  rationale: The Hebrew explicitly says 'blood,' and the narrative's theological-ethical force depends on David treating the water as equivalent to bloodshed because of the men's life-risking act. Optimal equivalence preserves the image rather than resolving it into paraphrase.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sense of נֶפֶשׁ
  chosen_reading: Translate as 'lives' rather than 'souls.'
  alternative_readings:
  - souls
  rationale: In this context נֶפֶשׁ refers to physical life exposed to danger, not an anthropological statement about the immaterial soul. This avoids importing theological claims the text does not make.
  doctrine_reference: Translation philosophy §1
