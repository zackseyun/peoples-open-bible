translation:
  language: es
  text: Y haré desaparecer de entre ellos el sonido de la alegría y el sonido del regocijo[a], la voz del novio y la voz de la novia[b], el sonido de las piedras de molino y la luz de la lámpara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘pondré fin a’. El verbo hebreo es causativo: ‘hacer perecer/desaparecer’.'
    reason: lexical_alternative
  - marker: b
    text: ‘La voz del novio y la voz de la novia’ alude a la celebración nupcial, una imagen fija de la vida comunitaria normal.
    reason: cultural_note
lexical_decisions:
- source_word: וְהַאֲבַדְתִּי
  english_pob_choice: destroy
  chosen_spanish: haré desaparecer
  alternatives_spanish:
  - destruiré
  - haré perecer
  - pondré fin a
  lexicon: HALOT
  rationale: 'El verbo hebreo en hiphil es causativo: ‘hacer perecer/desaparecer’. En español, ‘haré desaparecer’ conserva bien ese valor causativo y se adapta a objetos inanimados como sonidos y señales de vida común, sin volver la imagen demasiado cruda o material.'
- source_word: מֵהֶם
  english_pob_choice: from among them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - de ellos
  - en medio de ellos
  lexicon: HALOT
  rationale: La preposición con pronombre indica retiro desde su medio o esfera. ‘De entre ellos’ hace explícito que estas señales dejarán de existir dentro de la comunidad.
- source_word: קוֹל
  english_pob_choice: sound / voice
  chosen_spanish: sonido / voz
  alternatives_spanish:
  - voz
  - ruido
  lexicon: HALOT
  rationale: קוֹל puede significar ‘sonido’ o ‘voz’. Para la alegría, el regocijo, las piedras de molino y la lámpara, ‘sonido’ es natural; para el novio y la novia, ‘voz’ preserva mejor la escena humana y ritual.
- source_word: שָׂשׂוֹן
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: HALOT
  rationale: Es un término de gozo exultante. ‘Alegría’ es claro y digno en español, y funciona bien en paralelo con el siguiente término.
- source_word: שִׂמְחָה
  english_pob_choice: gladness
  chosen_spanish: regocijo
  alternatives_spanish:
  - alegría
  - gozo
  - gozoso ánimo
  lexicon: HALOT
  rationale: Se distingue de שָׂשׂוֹן. ‘Regocijo’ mantiene el matiz celebrativo y ayuda a conservar la pareja léxica sin repetir exactamente ‘alegría’.
- source_word: קוֹל חָתָן
  english_pob_choice: the voice of the bridegroom
  chosen_spanish: la voz del novio
  alternatives_spanish:
  - la voz del esposo
  - el sonido del novio
  lexicon: HALOT
  rationale: En español, ‘novio’ comunica de forma natural la figura nupcial del texto. ‘Voz’ mantiene el valor humano de קוֹל en el contexto de celebración matrimonial.
- source_word: וְקוֹל כַּלָּה
  english_pob_choice: the voice of the bride
  chosen_spanish: la voz de la novia
  alternatives_spanish:
  - la voz de la desposada
  - el sonido de la novia
  lexicon: HALOT
  rationale: Se mantiene el paralelo con ‘la voz del novio’. ‘Novia’ es claro para el lector moderno y conserva la imagen de celebración de bodas.
- source_word: קוֹל רֵחַיִם
  english_pob_choice: the sound of the millstones
  chosen_spanish: el sonido de las piedras de molino
  alternatives_spanish:
  - el sonido del molino
  - el sonido de moler
  lexicon: HALOT
  rationale: רֵחַיִם es un dual que designa un par de piedras de molino. ‘Piedras de molino’ es la opción más directa y transparente en español, y mantiene la referencia a la actividad doméstica ordinaria.
- source_word: אוֹר נֵר
  english_pob_choice: the light of the lamp
  chosen_spanish: la luz de la lámpara
  alternatives_spanish:
  - la luz del candil
  - la luz de una lámpara
  lexicon: HALOT
  rationale: La construcción constructa se vierte de modo natural como ‘la luz de la lámpara’. ‘Lámpara’ preserva la imagen de hogar habitado sin introducir una especificación innecesaria.
theological_decisions:
- issue: Imagen profética de juicio y cese de la vida común
  english_pob_reading: The verse is rendered as the removal of ordinary communal and domestic signs of life under judgment, without expanding the imagery into interpretive paraphrase.
  chosen_spanish_reading: El versículo se traduce como la desaparición de los signos comunes de vida comunitaria y doméstica bajo juicio, sin convertir la imagen en una paráfrasis explicativa.
  alternative_spanish_readings:
  - ‘Silenciaré toda alegría’
  - ‘Acabaré con toda celebración’
  rationale: El hebreo enumera sonidos y luces concretos cuya cesación simboliza devastación. La traducción mantiene la imaginería concreta para no aplanar el texto en un resumen abstracto.
  doctrine_reference: Principios de traducción POB §§1, 3, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente pasó de ‘make disappear’ a ‘destroy’ por mayor naturalidad y directitud. En español, ‘haré desaparecer’ conserva la fuerza causativa del hebreo y evita aplicar ‘destruir’ de modo demasiado literal a sonidos y luces, aunque ‘destruiré’ sigue siendo una alternativa válida en el campo semántico del pasaje.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ por norma POB cuando el texto fuente lo requiera; aquí no aparece el tetragrámaton.
  - Se conserva ‘novio/novia’ por claridad pública y para reflejar el marco de bodas, sin cargar el texto con terminología eclesiástica.
  - ‘Piedras de molino’ traduce el plural dual hebreo de forma transparente y consistente con otros pasajes agrícolas/domésticos.
  - ‘Luz de la lámpara’ respeta el paralelismo final de señales de vida ordinaria junto con los sonidos enumerados.
