  to: 'Entonces el tío de Saúl le dijo a él y a su acompañante joven[a]: «¿Adónde fueron?» Y él respondió: «A buscar los asnos[b]. Cuando vimos que no aparecían por ninguna parte, fuimos[c] a Samuel».'
  rationale: Se ajustó «a su joven» a «a su acompañante joven» para lograr español natural y preservar la neutralidad léxica de נַעַר sin imponer servidumbre. Se corrigió la puntuación del diálogo. Se mejoró «no estaban» a «no aparecían por ninguna parte» para reflejar mejor el sentido contextual de no hallarlas. Se reemplazó la nota [c] por la alternativa correcta sobre וַנָּבוֹא («fuimos/vinimos/llegamos»), en línea con el audit trail inglés.
