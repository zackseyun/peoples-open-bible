  text: וַ/יְשִׁבֵ/נִי֮ אֶל פֶּ֣תַח הַ/בַּיִת֒ וְ/הִנֵּה מַ֣יִם יֹצְאִ֗ים מִ/תַּ֨חַת מִפְתַּ֤ן הַ/בַּ֨יִת֙ קָדִ֔ימָ/ה כִּֽי פְנֵ֥י הַ/בַּ֖יִת קָדִ֑ים וְ/הַ/מַּ֣יִם יֹרְדִ֗ים מִ/תַּ֜חַת מִ/כֶּ֤תֶף הַ/בַּ֨יִת֙ הַ/יְמָנִ֔ית מִ/נֶּ֖גֶב לַ/מִּזְבֵּֽחַ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/047/001.yaml
  text: Then he brought me back to the entrance of the house[a], and behold, water was coming out from under the threshold of the house eastward, because the front of the house faced east; and the water was flowing down from under the right side of the house[b], from south of the altar.
  footnotes:
  - marker: a
    text: Or 'the temple' for 'the house'; the Hebrew text literally reads 'the house,' referring to the temple building in Ezekiel's vision.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from under the shoulder of the house, the right side'; 'shoulder' is an idiom for the side of a structure.
    reason: lexical_alternative
