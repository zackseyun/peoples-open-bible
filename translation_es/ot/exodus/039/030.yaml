    reason: alternative_reading
  revision_rationale: Se ajusta «placa» a «lámina» para reflejar con mayor precisión el צִיץ sacerdotal y se mejora la naturalidad de «la corona santa» a «la santa corona», sin alterar el sentido, la estructura appositiva ni la decisión teológica de mantener «Yahvé».
