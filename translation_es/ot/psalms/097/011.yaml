translation:
  language: es
  text: La luz es sembrada para el justo[a], y alegría para los rectos de corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La luz es esparcida/sembrada para el justo». El hebreo conserva una metáfora agrícola: la luz se presenta como algo sembrado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֭וֹר
  english_pob_choice: Light
  chosen_spanish: Luz
  alternatives_spanish:
  - luz
  lexicon: HALOT
  rationale: Se conserva el sustantivo básico con su fuerza poética. En español, "Luz" funciona naturalmente como imagen de bendición, salvación o favor sin resolverla de antemano.
- source_word: זָרֻעַ
  english_pob_choice: is sown
  chosen_spanish: es sembrada
  alternatives_spanish:
  - es esparcida
  - es plantada
  lexicon: HALOT
  rationale: '"Sembrada" mantiene la metáfora agrícola del hebreo זרע y evita reducirla a una explicación conceptual. En español es una imagen clara y fiel al participio pasivo.'
- source_word: לַצַּדִּיק
  english_pob_choice: for the righteous
  chosen_spanish: para el justo
  alternatives_spanish:
  - para los justos
  - para el justo
  lexicon: HALOT
  rationale: La preposición ל indica destino o beneficio, bien expresado por "para". Se eligió el singular genérico "el justo" para conservar la fuerza representativa del hebreo y la fluidez en español.
- source_word: וּלְיִשְׁרֵי לֵב
  english_pob_choice: and joy for the upright in heart
  chosen_spanish: y alegría para los rectos de corazón
  alternatives_spanish:
  - y alegría para los de corazón recto
  - y gozo para los rectos de corazón
  lexicon: HALOT
  rationale: Se preserva el paralelismo con "para" y se vierte el idiomático יִשְׁרֵי לֵב de manera natural como "rectos de corazón". "Alegría" corresponde bien a שִׂמְחָה en este contexto poético.
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - júbilo
  lexicon: HALOT
  rationale: '"Alegría" es una equivalencia natural y digna en español bíblico contemporáneo; mantiene el tono poético y el paralelismo con "Luz".'
theological_decisions:
- issue: Metáfora de la luz sembrada
  english_pob_reading: Se mantiene la imagen "Light is sown" en vez de resolverla explícitamente como salvación, prosperidad o vindicación.
  chosen_spanish_reading: Se mantiene la imagen "Luz es sembrada" sin explicitarla como salvación, prosperidad o vindicación.
  alternative_spanish_readings:
  - La prosperidad está reservada para el justo
  - La liberación está preparada para el justo
  rationale: El hebreo presenta una imagen poética agrícola que conviene conservar. Traducirla de forma explicativa cerraría el alcance semántico del verso y borraría la tensión documentada en el texto fuente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se registran cambios sustantivos frente al pasaje auditado; se preserva la metáfora agrícola y la equivalencia poética principal.'
  spanish_consistency_notes:
  - Se usa "Luz" con mayúscula inicial solo por posición sintáctica, no como señal teológica.
  - Se mantiene "rectos de corazón" para conservar la idiomaticidad bíblica sin volverlo un calco rígido.
  - La nota reproduce la alternativa verbal documentada en el audit trail inglés y la adapta a un español natural.
