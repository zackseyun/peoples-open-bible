    text: 'Hebreo: «oye»; se conserva «oye» en vez de «escucha» para mantener la relación verbal con «oiremos» más adelante.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hablarás a nosotros»; se vierte «nos dirás» porque en este contexto de mediación expresa de manera natural en español la transmisión de las palabras de Dios.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige únicamente el giro «hablarás a nosotros» a «nos dirás» para lograr un español natural y fiel al contexto mediador documentado en el expediente inglés, manteniendo intactas las decisiones clave: «Yahvé», «oye / oiremos», y «lo haremos».'
