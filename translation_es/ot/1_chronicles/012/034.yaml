  yaml_path: translation/ot/1_chronicles/012/034.yaml
  text: From Zebulun[a], fifty thousand men fit for military service, prepared for battle with every kind of weapon of war[b], to help without a divided heart.
  footnotes:
  - marker: a
    text: Literally, 'without heart and heart,' a Hebrew idiom meaning without divided loyalty or double-mindedness.
    reason: lexical_alternative
  - marker: b
    text: Or 'to join the ranks' / 'to support'; the Hebrew verb is uncommon here, and the sense is that they came in unified support for David.
    reason: alternative_reading
