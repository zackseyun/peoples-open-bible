translation:
  language: es
  text: Oración de Moisés[a], el hombre de Dios. Señor, tú has sido para nosotros una morada[b] de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por Moisés» o «para Moisés» en la superscripción; la preposición hebrea puede indicar autoría, asociación o dedicación.'
    reason: alternative_reading
  - marker: b
    text: 'O: «refugio» o «habitación» para «morada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה
  english_pob_choice: A prayer
  chosen_spanish: Oración
  alternatives_spanish:
  - Prayer
  - Súplica
  lexicon: תְּפִלָּה
  rationale: ‘Oración’ comunica de manera natural y digna el género del encabezado hebreo sin añadir fuerza interpretativa. ‘Súplica’ sería demasiado específica; ‘Prayer’ no se usa en español bíblico estándar.
- source_word: לְ/מֹשֶׁה
  english_pob_choice: of Moses
  chosen_spanish: de Moisés
  alternatives_spanish:
  - por Moisés
  - para Moisés
  lexicon: לְ + nombre propio en superscripción
  rationale: La preposición hebrea puede marcar autoría, asociación o dedicación. En español, ‘de Moisés’ mantiene la apertura semántica del encabezado y coincide con el valor más neutral del audit trail.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el siervo de Dios
  lexicon: אִישׁ + הָאֱלֹהִים
  rationale: ‘El hombre de Dios’ reproduce el valor idiomático tradicional sin sustituirlo por una formulación explicativa. ‘Varón’ es posible, pero ‘hombre’ resulta más claro y natural en español contemporáneo.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Yahvé
  - Señor Yahvé
  lexicon: אֲדֹנָי
  rationale: El hebreo vocalizado aquí apunta a una lectura divina. En el texto español, ‘Señor’ funciona como vocativo reverente. No se usa ‘Yahvé’ en el cuerpo porque el audit trail inglés ya refleja la forma litúrgica ‘Lord’ y no documenta aquí una sustitución explícita por el nombre propio.
- source_word: מָעוֹן
  english_pob_choice: dwelling place
  chosen_spanish: refugio
  alternatives_spanish:
  - morada
  - habitación
  - albergue
  lexicon: מָעוֹן
  rationale: El POB inglés conservó la tensión semántica con la nota ‘refuge’ o ‘habitation’. En español, ‘refugio’ transmite mejor la función de amparo que el verso desarrolla, sin borrar que también puede implicar ‘morada’. La nota preserva la alternativa.
- source_word: מָעוֹן
  english_pob_choice: dwelling place
  chosen_spanish: refugio
  alternatives_spanish:
  - morada
  - habitación
  lexicon: מָעוֹן
  rationale: Se eligió una palabra de sentido relacional y protector para mantener la fuerza poética del versículo. ‘Morada’ sería una alternativa literal, pero en español puede sonar menos activa que el paralelo sugerido por el contexto.
- source_word: בְּדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generación tras generación
  - de edad en edad
  lexicon: בְּדֹר וָדֹר
  rationale: La fórmula española establecida reproduce con fidelidad la continuidad temporal del hebreo y es plenamente transparente para lectores bíblicos en español.
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Señor Yahvé
  rationale: Aunque el proyecto usa ‘Yahvé’ para יהוה, aquí la forma hebrea leída es אֲדֹנָי. Traducirla por ‘Señor’ preserva la señal de lectura reverente sin mezclarla con la grafía del nombre propio. La línea del verso queda así teológicamente precisa y coherente con el audit trail inglés.
  doctrine_reference: Criterio POB sobre nombres divinos y lectura reverente del texto hebreo
- issue: Valor de מָעוֹן en el paralelismo poético
  english_pob_reading: dwelling place
  chosen_spanish_reading: refugio
  alternative_spanish_readings:
  - morada
  - habitación
  rationale: La POB inglesa dejó abierta la tensión entre ‘dwelling place’, ‘refuge’ y ‘habitation’. En este contexto poético, ‘refugio’ destaca la función protectora que el verso atribuye a Dios para su pueblo, sin negar la idea de habitación/morada, que queda preservada como alternativa.
  doctrine_reference: Teología bíblica del amparo de Dios como lugar de refugio y habitación
- issue: Superscripción atribuida a Moisés
  english_pob_reading: A prayer of Moses
  chosen_spanish_reading: Oración de Moisés
  alternative_spanish_readings:
  - Oración por Moisés
  - Oración para Moisés
  rationale: El hebreo permite varias relaciones entre la preposición y el nombre propio. El español principal conserva la atribución tradicional e informativa sin cerrar la cuestión de manera indebida; la nota explicita la ambigüedad heredada del audit trail.
  doctrine_reference: Práctica editorial sobre superscripciones y atribución textual
translation_notes:
  revision_awareness: 'El pasaje fue revisado para completar el enunciado principal después de la superscripción: el texto inglés final incluye la cláusula completa ‘Lord, you have been a dwelling place for us from generation to generation.’ La versión española refleja esa corrección y no deja la superscripción como si fuera el texto entero del versículo.'
  spanish_consistency_notes:
  - Se mantiene ‘Señor’ para אֲדֹנָי en este verso, distinto de ‘Yahvé’ para יהוה en el texto principal del proyecto.
  - La superscripción se conserva con puntuación natural en español y sin convertirla en una frase explicativa.
  - ‘De generación en generación’ sigue la fórmula bíblica habitual y mantiene el paralelismo temporal del hebreo.
