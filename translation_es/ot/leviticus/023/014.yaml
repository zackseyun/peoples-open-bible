    text: O 'grano parchado' para 'grano tostado'.
    reason: lexical_alternative
  - marker: b
    text: O 'grano nuevo' para 'grano fresco'.
    reason: lexical_alternative
  - marker: c
    text: O 'estatuto eterno' / 'estatuto perpetuo'.
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de las notas al pie para que correspondan a las palabras correctas en el texto, y se cambió 'estatuto perpetuo' a 'estatuto permanente' para alinearlo mejor con la decisión léxica y teológica documentada en el POB inglés, manteniendo las alternativas tradicionales en nota.
