translation:
  language: es
  text: 'Ahora bien, cuando Eliseo, el hombre de Dios, oyó que el rey de Israel había rasgado sus vestidos[a], mandó decir al rey: «¿Por qué has rasgado tus vestidos? Que él venga a mí[b], y sabrá que hay un profeta en Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vestiduras». El hebreo se refiere al acto acostumbrado de rasgar la ropa como señal de angustia o duelo.
    reason: lexical_alternative
  - marker: b
    text: «Que él venga a mí» se refiere a Naamán, no al rey de Israel.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  english_pob_choice: Now when ... heard
  chosen_spanish: Ahora bien, cuando ... oyó
  alternatives_spanish:
  - Y sucedió que cuando ... oyó
  - Cuando ... oyó
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una transición temporal. “Ahora bien” conserva el giro discursivo sin volver el español rígido; “cuando ... oyó” refleja el infinitivo constructo con sentido temporal.
- source_word: אֱלִישָׁע
  english_pob_choice: Elisha
  chosen_spanish: Eliseo
  alternatives_spanish:
  - Elisha
  lexicon: Convención bíblica española estándar
  rationale: En español bíblico establecido, el nombre se usa como “Eliseo”, forma clara y reconocible para lectores de iglesia, manteniendo la referencia propia del personaje.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el hombre perteneciente a Dios
  lexicon: HALOT
  rationale: Es un título profético reconocido. “Hombre de Dios” conserva la función designativa y evita suavizar el matiz técnico-religioso de la expresión.
- source_word: קָרַע ... אֶת בְּגָדָיו
  english_pob_choice: had torn his clothes
  chosen_spanish: había rasgado sus vestidos
  alternatives_spanish:
  - había roto sus ropas
  - había desgarrado sus vestiduras
  lexicon: HALOT
  rationale: קָרַע expresa rasgar/desgarrar. “Vestidos” refleja היטב el objeto textual y conserva el matiz ceremonial o de duelo sin modernizarlo en exceso con “ropa”. En español, “rasgado” comunica la acción de modo natural y solemne.
- source_word: וַיִּשְׁלַח אֶל הַמֶּלֶךְ
  english_pob_choice: he sent to the king
  chosen_spanish: envió al rey a decir
  alternatives_spanish:
  - mandó decir al rey
  - envió un mensaje al rey
  lexicon: HALOT
  rationale: El hebreo marca que envió un mensaje; el contenido viene a continuación. “Envió al rey a decir” reproduce la relación sintáctica sin añadir un sustantivo ausente, y el complemento de infinitivo español introduce naturalmente el discurso.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: a decir
  alternatives_spanish:
  - diciendo
  - para decir
  lexicon: HALOT
  rationale: Se conserva la función de introducción del discurso directo con una forma natural en español dentro de la construcción verbal previa.
- source_word: לָמָּה קָרַעְתָּ בְּגָדֶיךָ
  english_pob_choice: Why have you torn your clothes?
  chosen_spanish: ¿Por qué has rasgado tus vestidos?
  alternatives_spanish:
  - ¿Por qué has desgarrado tus vestiduras?
  - ¿Por qué rompiste tus vestidos?
  lexicon: HALOT
  rationale: La pregunta mantiene la fuerza directa del hebreo. “Rasgado” conserva la imagen de luto o angustia documentada por la nota inglesa; “vestidos” sigue el término ya usado en la línea principal.
- source_word: יָבֹא נָא אֵלַי
  english_pob_choice: Please let him come to me
  chosen_spanish: Que él venga a mí
  alternatives_spanish:
  - Por favor, que venga a mí
  - Déjalo venir a mí
  lexicon: HALOT
  rationale: El sujeto implícito es Naamán, no el rey. En español, “que él venga a mí” preserva ese referente y el matiz de solicitud del נָא sin introducir una formulación demasiado explicativa.
- source_word: וְיֵדַע
  english_pob_choice: and he will know
  chosen_spanish: y sabrá
  alternatives_spanish:
  - y conocerá
  - para que sepa
  lexicon: HALOT
  rationale: El imperfecto expresa resultado esperado. “Sabrá” es natural en español y conserva el valor consecutivo de consecuencia.
- source_word: כִּי יֵשׁ נָבִיא בְּיִשְׂרָאֵל
  english_pob_choice: that there is a prophet in Israel
  chosen_spanish: que hay un profeta en Israel
  alternatives_spanish:
  - que existe un profeta en Israel
  - que Israel tiene un profeta
  lexicon: HALOT
  rationale: יֵשׁ expresa existencia. “Hay un profeta en Israel” es la forma más directa y fiel, manteniendo la afirmación de presencia real del profeta en el pueblo.
theological_decisions:
- issue: Título profético אִישׁ הָאֱלֹהִים
  english_pob_reading: Rendered as 'the man of God' as an established prophetic designation.
  chosen_spanish_reading: “el hombre de Dios” como designación profética establecida.
  alternative_spanish_readings:
  - el varón de Dios
  - el hombre perteneciente a Dios
  rationale: No se trata solo de piedad personal, sino de una fórmula que señala la función representativa de Eliseo como portavoz de Dios. La traducción preserva ese peso teológico sin convertirlo en paráfrasis.
  doctrine_reference: Transparencia semántica y función profética del texto bíblico.
- issue: Referencia pronominal de “él” en la exhortación final
  english_pob_reading: ‘Please let him come to me’ refers to Naaman, not the king of Israel.
  chosen_spanish_reading: “Que él venga a mí” se entiende de Naamán, no del rey de Israel.
  alternative_spanish_readings:
  - Que venga a mí
  - Déjalo venir a mí
  rationale: La aclaración evita una ambigüedad natural en español, porque el antecedente más cercano podría confundirse. El sentido del relato exige que el que venga sea Naamán, el destinatario real de la sanidad.
  doctrine_reference: Coherencia narrativa y referencia contextual en traducción bíblica.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo masorético con alta concordancia respecto del audit trail inglés. No se detectaron revisiones textuales necesarias; se mantuvo la secuencia narrativa, la referencia pronominal y el valor del gesto de rasgar los vestidos, con adaptación idiomática natural para el español.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usó “Eliseo” por convención bíblica española establecida, sin alterar la identificación del personaje.
  - Se conservó “hombre de Dios” para el título profético, y “profeta” para נָבִיא conforme al valor léxico del texto.
  - “Vestidos” se eligió para reflejar בְּגָדִים con registro bíblico digno, evitando la neutralización excesiva en “ropa”.
  - El marcador [a] acompaña la alternativa lexical del gesto de duelo; el marcador [b] aclara el referente de la exhortación final.
