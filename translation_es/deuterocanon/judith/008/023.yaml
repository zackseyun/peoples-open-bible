translation:
  language: es
  text: Porque nuestra esclavitud[a] no resultará en favor, sino que Yahvé nuestro Dios la hará una deshonra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Porque nuestra esclavitud no terminará en favor, sino que Yahvé nuestro Dios la hará una desgracia»
    reason: lexical_alternative
lexical_decisions:
- source_word: δουλεία
  english_pob_choice: slavery
  chosen_spanish: esclavitud
  alternatives_spanish:
  - servidumbre
  - cautiverio
  - esclavitud
  lexicon: LSJ
  rationale: δουλεία nombra una condición de sujeción y no solo un servicio. En español, "esclavitud" conserva mejor la fuerza del término que "servidumbre". "Cautiverio" desplazaría el sentido hacia encarcelamiento físico, que no es el punto principal del contexto.
- source_word: κατευθυνθήσεται
  english_pob_choice: will be turned to favor
  chosen_spanish: se convertirá en favor
  alternatives_spanish:
  - será dirigida hacia favor
  - será orientada hacia favor
  - se volverá hacia favor
  lexicon: LSJ
  rationale: El pasivo futuro de κατευθύνω expresa aquí el resultado u orientación final. En español, "se convertirá en favor" mantiene la idea de un desenlace favorable sin sonar mecánico. "Se volverá hacia favor" resultaría poco natural en español.
- source_word: εἰς χάριν
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - benevolencia
  - aceptación
  lexicon: LSJ
  rationale: χάρις en este contexto social y político contrasta con ἀτιμία y se refiere a favor o buen trato, no a la gracia soteriológica. Por eso se conserva "favor".
- source_word: θήσει αὐτὴν
  english_pob_choice: will make it
  chosen_spanish: la convertirá
  alternatives_spanish:
  - la hará
  - la pondrá como
  - la establecerá como
  lexicon: LSJ
  rationale: τίθημι con valor resultativo puede expresarse en español como "hacer" o "convertir en". Dado que el objeto es "deshonra", "la convertirá" comunica el efecto resultante de modo más fluido, sin perder la relación causal.
- source_word: ἀτιμίαν
  english_pob_choice: dishonor
  chosen_spanish: deshonra
  alternatives_spanish:
  - deshonor
  - vergüenza
  - afrenta
  lexicon: LSJ
  rationale: ἀτιμία denota pérdida de honor o estatus. "Deshonra" preserva el valor de desprestigio y humillación con una resonancia más natural en español bíblico actual que "deshonor".
- source_word: Κύριος ὁ θεὸς ἡμῶν
  english_pob_choice: the Lord our God
  chosen_spanish: el Señor nuestro Dios
  alternatives_spanish:
  - el Señor, nuestro Dios
  - nuestro Señor Dios
  lexicon: LSJ
  rationale: Se mantiene "Señor" como equivalente de κύριος en esta fórmula divina del griego, ya que el referente es el título reverencial usado en el texto fuente. "Nuestro Dios" conserva la apposición completa.
theological_decisions:
- issue: Valor de κύριος aplicado a Dios en la fórmula final
  english_pob_reading: the Lord our God
  chosen_spanish_reading: el Señor nuestro Dios
  alternative_spanish_readings:
  - Yahvé nuestro Dios
  - el Señor, nuestro Dios
  rationale: Aunque el proyecto suele usar "Yahvé" para el nombre divino cuando el hebreo lo exige, aquí el texto fuente es griego κύριος con artículo y la expresión fija es la del auditray English POB. Por eso se traduce como título reverencial "Señor" sin forzar un retroceso al tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: divine-name handling and source-sensitive rendering of κύριος'
- issue: Uso de χάρις en un contexto no soteriológico
  english_pob_reading: favor
  chosen_spanish_reading: favor
  alternative_spanish_readings:
  - gracia
  - aceptación
  rationale: La oposición es entre favor y deshonra, es decir, entre estatus social/relacional, no entre categorías doctrinales de salvación. "Favor" evita importar la carga técnica de "gracia" donde el griego no la exige.
  doctrine_reference: 'DOCTRINE.md: χάρις context sensitivity'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del inglés POB: se prefirió una formulación natural para κατευθυνθήσεται εἰς χάριν y una expresión más directa para θήσει αὐτὴν εἰς ἀτιμίαν. En español, eso llevó a "se convertirá en favor" y "la convertirá en deshonra", manteniendo el paralelismo y la tensión léxica del original.'
  spanish_consistency_notes:
  - Se mantuvo "esclavitud" para δουλεία, en consonancia con la política POB de preservar la fuerza del campo léxico de esclavitud/sujeción.
  - Se conservó "favor" para χάρις por el contraste explícito con ἀτιμία, evitando la traducción doctrinalmente cargada "gracia".
  - Se empleó "Señor nuestro Dios" como fórmula reverencial estable para κύριος ὁ θεὸς ἡμῶν en este contexto griego.
  - La puntuación conserva la oposición fuerte entre la primera y la segunda cláusula mediante coma y "sino que".
