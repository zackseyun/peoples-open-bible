translation:
  language: es
  text: Durante seis años sembrarás tu campo, y durante seis años podarás tu viña y recogerás su producto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su rendimiento». El término hebreo puede referirse de manera más general al producto agrícola.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁשׁ שָׁנִים
  english_pob_choice: for six years
  chosen_spanish: durante seis años
  alternatives_spanish:
  - por seis años
  - seis años
  lexicon: HALOT
  rationale: La construcción expresa duración de tiempo a lo largo de un periodo; en español, «durante» comunica mejor esa duración legal que un simple numerativo suelto. Mantiene la fuerza normativa sin sonar forzado.
- source_word: תִּזְרַע
  english_pob_choice: you shall sow
  chosen_spanish: sembrarás
  alternatives_spanish:
  - sembrarás tú
  - deberás sembrar
  - has de sembrar
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona como instrucción en contexto legal. En español, el futuro simple transmite bien la prescripción y conserva fluidez natural sin añadir matices ajenos.
- source_word: שָׂדֶךָ
  english_pob_choice: your field
  chosen_spanish: tu campo
  alternatives_spanish:
  - tu campo cultivado
  - tu parcela
  - tu tierra
  lexicon: HALOT
  rationale: «Campo» preserva la referencia agrícola específica de שָׂדֶה. «Tierra» sería demasiado amplio y menos preciso en este contexto.
- source_word: תִּזְמֹר
  english_pob_choice: you shall prune
  chosen_spanish: podarás
  alternatives_spanish:
  - purgarás
  - recortarás
  - tallarás
  lexicon: HALOT
  rationale: En el contexto de la viña, זמר se refiere de manera precisa a podar. «Podarás» es el equivalente español más exacto y natural.
- source_word: כַּרְמֶךָ
  english_pob_choice: your vineyard
  chosen_spanish: tu viña
  alternatives_spanish:
  - tu viñedo
  - tu viña de uvas
  lexicon: HALOT
  rationale: כֶּרֶם nombra el viñedo o viña cultivada. «Viña» es clara, bíblica y suficientemente precisa para una lectura pública en español.
- source_word: וְאָסַפְתָּ
  english_pob_choice: and gather
  chosen_spanish: y recogerás
  alternatives_spanish:
  - y juntarás
  - y reunirás
  - y cosecharás
  lexicon: HALOT
  rationale: אָסַף significa reunir o recoger. «Recogerás» conserva la amplitud del verbo sin restringirlo demasiado a un tecnicismo agrícola como «cosecharás».
- source_word: תְּבוּאָתָהּ
  english_pob_choice: its produce
  chosen_spanish: su producto
  alternatives_spanish:
  - su produce
  - su rendimiento
  - su cosecha
  lexicon: HALOT
  rationale: תְּבוּאָה denota el producto o rendimiento agrícola. «Producto» mantiene esa amplitud semántica; «cosecha» sería más estrecho y más interpretativo.
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia y sin cambios sustanciales; se mantiene una solución directa y sobria que sigue de cerca el hebreo, con un único punto léxico abierto en תְּבוּאָה.
  spanish_consistency_notes:
  - Se conserva el paralelismo de seis años / seis años con sintaxis natural en español.
  - Se evita «SEÑOR» u otras sustituciones porque el versículo no contiene el Tetragrámaton ni una cita del nombre divino.
  - Se mantiene el registro legal y agrícola, sin introducir paráfrasis devocionales.
  - La nota a pie de página señala la alternativa semántica de תְּבוּאָה sin duplicar el contenido principal.
