  glossary_alignment: No hay conflicto con la terminología principal del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones léxicas centrales son compatibles con la auditoría inglesa, salvo que el equivalente de «launderers’ soap» debe ajustarse a un español más natural y la nota debe anclarse en esa frase, no en «venida».
