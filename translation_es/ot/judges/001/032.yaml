review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y la decisión de la POB inglesa de convertir los singulares colectivos en plurales idiomáticos: «los aseritas», «los cananeos» y «no los expulsaron». También conserva correctamente la relación causal de כִּי y la aposición «los habitantes de la tierra».'
  spanish_quality_summary: 'El texto es claro y natural, pero requiere un ajuste ortográfico/onomástico importante: en español bíblico estándar el gentilicio derivado de Aser es «aseritas», pero el nombre tribal/base debe ser «Aser», no «Asher» en las alternativas y razonamiento internos. En el texto principal ya aparece «aseritas», que es legible; sin embargo, para máxima naturalidad y consistencia bíblica, conviene mantenerlo y pulir levemente la puntuación con una coma explicativa intacta. No hay problemas graves de legibilidad.'
  glossary_alignment: No hay términos de glosario mayor implicados como Yahvé/Mesías. La decisión colectiva coincide con la racionalidad documentada. «Expulsaron» es una buena opción para הוֹרִישׁוֹ en este contexto de Jueces.
  issues:
  - severity: medium
    issue: Necesita una pequeña normalización del nombre tribal en la formulación revisada y su documentación asociada.
    rationale: Aunque el texto principal usa «aseritas», la documentación del borrador mezcla la base inglesa «Asher». Para una edición española pulida y consistente, debe mantenerse la forma española «Aser/aseritas». El sentido del versículo no cambia, pero sí la calidad editorial.
  revised_spanish_text: Así, los aseritas vivieron entre los cananeos[a], los habitantes de la tierra, porque no los expulsaron.
  revised_footnotes:
  - marker: a
    text: 'El hebreo usa aquí formas singulares colectivas: «el aserita ... el cananeo ... no lo expulsó». La traducción española expresa el sentido colectivo que exige el contexto.'
    reason: lexical_alternative
  revision_rationale: Se mantiene la traducción principal porque es fiel y natural; la revisión es de pulido editorial y normalización onomástica en español, sin cambio sustancial de sentido. Se conserva la nota porque explica una característica importante del hebreo que en español debe resolverse colectivamente.
