translation:
  language: es
  text: 'Así que fue tras el hombre de Dios y lo encontró sentado bajo el terebinto[a]; y le dijo: «¿Eres tú el hombre de Dios que vino de Judá?» Y él respondió: «Yo soy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo la encina». El hebreo אֵלָה se refiere más específicamente a un terebinto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ אַחֲרֵי
  english_pob_choice: went after
  chosen_spanish: fue tras
  alternatives_spanish:
  - siguió
  - fue detrás de
  lexicon: HALOT
  rationale: La expresión narrativa comunica persecución o seguimiento. «Fue tras» conserva bien el movimiento hacia la persona perseguida y suena natural en español bíblico actual.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: Se mantiene el título directo y tradicional del hebreo, sin interpretarlo como un oficio más específico que el texto no explicita.
- source_word: וַיִּמְצָאֵהוּ
  english_pob_choice: found him
  chosen_spanish: lo encontró
  alternatives_spanish:
  - dio con él
  - se topó con él
  lexicon: HALOT
  rationale: «Encontró» reproduce con precisión el sentido narrativo de מצא en este contexto.
- source_word: יֹשֵׁב
  english_pob_choice: sitting
  chosen_spanish: sentado
  alternatives_spanish:
  - que estaba sentado
  - permaneciendo sentado
  lexicon: HALOT
  rationale: El participio describe su postura en el momento en que fue hallado; «sentado» es la forma más directa y clara en español.
- source_word: תַּחַת הָאֵלָה
  english_pob_choice: under the terebinth
  chosen_spanish: debajo de la encina[a]
  alternatives_spanish:
  - debajo de la terebinto
  - bajo el terebinto
  lexicon: HALOT
  rationale: El hebreo אֵלָה puede designar específicamente un terebinto, pero en español «encina» es una equivalencia tradicional y comprensible para este árbol grande; se conserva la nota para la alternativa más precisa botánicamente.
- source_word: הַאַתָּה
  english_pob_choice: Are you
  chosen_spanish: ¿Eres tú... ?
  alternatives_spanish:
  - ¿Acaso eres tú... ?
  - ¿Tú eres... ?
  lexicon: HALOT
  rationale: Es una pregunta de identificación directa; «¿Eres tú...?» expresa con naturalidad la forma interrogativa hebrea.
- source_word: אֲשֶׁר בָּאתָ מִיהוּדָה
  english_pob_choice: who came from Judah
  chosen_spanish: que vino de Judá
  alternatives_spanish:
  - que llegaste de Judá
  - que viniste de Judá
  lexicon: HALOT
  rationale: «Vino de Judá» conserva el origen geográfico de la cláusula relativa y mantiene un español fluido.
- source_word: אָֽנִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo soy él
  - Soy yo
  lexicon: HALOT
  rationale: La respuesta hebrea es elíptica; en español, «Yo soy» reproduce esa brevedad sin añadir más contenido del necesario.
theological_decisions:
- issue: Título אִישׁ הָאֱלֹהִים
  english_pob_reading: the man of God
