    text: 'O: «Jonatán continuó haciendo jurar a David» o «Jonatán puso otra vez a David bajo juramento».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «porque lo amó con el amor de su propia alma»; un modismo que expresa profunda devoción personal.'
    reason: lexical_alternative
  revision_rationale: Se corrigió la alineación de las notas para que cada una explique el segmento hebreo correspondiente. También se suavizó 'por su amor hacia él' a una formulación más natural en español ('por el amor que le tenía') sin perder el sentido motivacional del hebreo, y se ajustó 'lo amaba' a 'lo amó' para una narración más directa.
