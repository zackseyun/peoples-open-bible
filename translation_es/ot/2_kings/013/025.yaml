translation:
  language: es
  text: Entonces Jehoás hijo de Joacaz tomó de nuevo las ciudades de manos de Ben-adad hijo de Hazael[a], que este había tomado de manos de Joacaz su padre en la guerra. Tres veces lo derrotó[b] Joás, y restauró las ciudades de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa dos formas del mismo nombre real en este versículo: la forma más plena al inicio y la forma breve al final. Aquí se reflejan ambas con la transliteración española correspondiente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo golpeó». El verbo hebreo puede significar golpear en combate, con el sentido de derrota militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: took back
  chosen_spanish: tomó de nuevo
  alternatives_spanish:
  - recuperó
  - volvió a tomar
  lexicon: HALOT
  rationale: El hebreo שוב aquí expresa recuperación de algo perdido en un contexto político-militar. 'Tomó de nuevo' conserva la idea de recuperar sin añadir más interpretación que la que admite el contexto.
- source_word: וַיִּקַּח
  english_pob_choice: took back
  chosen_spanish: tomó de nuevo
  alternatives_spanish:
  - tomó
  - capturó
  - recobró
  lexicon: HALOT
  rationale: לקח es literalmente 'tomó', pero en esta escena de recuperación territorial conviene explicitar el movimiento de restitución. En español, repetir 'tomó de nuevo' con el verbo principal comunica bien la acción de recuperación.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los poblados
  - las plazas fuertes
  lexicon: HALOT
  rationale: '''Ciudades'' es la equivalencia más directa y natural para ערים en narrativa histórica. ''Plazas fuertes'' sería demasiado interpretativo para este verso.'
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de manos de
  alternatives_spanish:
  - de
  - del poder de
  lexicon: HALOT
  rationale: Se conserva el modismo semítico de 'mano' como dominio o control. En español, 'de manos de' suena natural y mantiene la transparencia del idiomático original.
- source_word: בֶּן־הֲדַד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-adad
  alternatives_spanish:
  - Ben-hadad
  lexicon: HALOT
  rationale: Se sigue la forma hispana tradicional del nombre propio tal como aparece en muchos contextos bíblicos, pero sin ocultar la identidad del personaje; la aspiración hebrea no obliga al guion en español.
- source_word: אֲשֶׁר לָקַח
  english_pob_choice: which he had taken
  chosen_spanish: que este había tomado
  alternatives_spanish:
  - que había tomado
  - que él había tomado
  lexicon: HALOT
  rationale: El relativo introduce una acción anterior a la recuperación de Joás. 'Este' evita ambigüedad en español y mantiene la referencia al rey enemigo sin sobrecargar la sintaxis.
- source_word: מִיַּד יְהוֹאָחָז אָבִיו
  english_pob_choice: from the hand of Jehoahaz his father
  chosen_spanish: de manos de Joacaz su padre
  alternatives_spanish:
  - de la mano de Joacaz su padre
  - de Joacaz, su padre
  lexicon: HALOT
  rationale: '''Joacaz'' es la transliteración española del nombre, y ''de manos de'' conserva el modismo de dominio. ''Su padre'' se mantiene unido al nombre para dejar claro el vínculo filial.'
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in war
  chosen_spanish: en la guerra
  alternatives_spanish:
  - en batalla
  - durante la guerra
  lexicon: HALOT
  rationale: La expresión articular singular se vierte de modo natural como 'en la guerra'. En español comunica bien el contexto militar sin perder sobriedad.
- source_word: שָׁלֹשׁ פְּעָמִים
  english_pob_choice: Three times
  chosen_spanish: Tres veces
  alternatives_spanish:
  - tres ocasiones
  - tres veces seguidas
  lexicon: HALOT
  rationale: La equivalencia es directa y natural. No hay necesidad de reforzar con 'seguidas', pues el texto no lo dice.
- source_word: הִכָּהוּ
  english_pob_choice: struck him
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo derrotó
  - lo hirió en combate
  lexicon: HALOT
  rationale: El hebreo נכה puede abarcar golpear, herir o derrotar en combate. 'Lo hirió' conserva la fuerza física del verbo sin imponer una lectura demasiado específica de derrota total; la nota alternativa preserva la posibilidad bélica.
- source_word: יוֹאָשׁ
  english_pob_choice: Joash
  chosen_spanish: Joás
  alternatives_spanish:
  - Jehoás
  lexicon: HALOT
  rationale: Se emplea la forma española común del nombre breve presente en el hebreo final, distinguiéndola de la forma más plena del mismo rey al inicio del verso.
- source_word: וַיָּשֶׁב
  english_pob_choice: restored
  chosen_spanish: restauró
  alternatives_spanish:
  - devolvió
  - restituyó
  lexicon: HALOT
  rationale: שוב aquí se refiere a devolver a Israel el control de las ciudades. 'Restauró' expresa bien la restitución sin perder el matiz de reponer algo a su estado/posesión anterior.
- source_word: עָרֵי יִשְׂרָאֵל
  english_pob_choice: the cities of Israel
  chosen_spanish: las ciudades de Israel
  alternatives_spanish:
  - las ciudades israelitas
  - las ciudades de Israel
  lexicon: HALOT
  rationale: Se mantiene la estructura constructa de manera transparente. 'Las ciudades de Israel' es claro y fiel a la referencia territorial y nacional del texto.
theological_decisions:
- issue: 'Doble forma del mismo nombre real: יְהוֹאָשׁ / יוֹאָשׁ'
  english_pob_reading: 'Hebrew uses two forms of the same royal name in this verse: ''Jehoash'' earlier and ''Joash'' later.'
  chosen_spanish_reading: 'El hebreo usa dos formas del mismo nombre real en este versículo: ''Joás'' antes y ''Joás'' después, diferenciando solo la forma larga inicial (Joás/Jehoás) de la corta final en la transliteración española.'
  alternative_spanish_readings:
  - Mantener 'Joás' en ambas apariciones sin nota
  - Usar 'Jehoás' al inicio y 'Joás' al final
  rationale: La diferencia del hebreo es formal, no de identidad. En español, la transliteración puede reflejar la forma larga inicial como 'Jehoás' y la corta final como 'Joás', conservando la observación auditada del POB sin confundir al lector.
  doctrine_reference: No doctrinal; decisión onomástica y de transparencia textual.
- issue: Sentido de נכה en contexto bélico
  english_pob_reading: Or 'defeated him.' The Hebrew verb can denote striking in battle with the sense of military defeat.
  chosen_spanish_reading: '''Lo hirió'' con nota alternativa: ''O: '
  alternative_spanish_readings:
  - '''lo derrotó'''
  - '''lo golpeó'''
  rationale: El verbo hebreo admite tanto golpear como derrotar en combate. En español, 'lo hirió' mantiene el contacto físico del término base y deja abierta la posibilidad de derrota militar sin fijarla de manera excesiva. La nota preserva la alternativa bélica reconocida por el POB.
  doctrine_reference: No doctrinal; semántica verbal y narrativa histórica.
translation_notes:
  revision_awareness: 'La base inglesa revisó el verso para eliminar la redundancia ''regained and'' y ajustar ''struck him down'' a ''struck him''. Esta versión española sigue esa revisión: no duplica la idea de recuperar y usa un verbo de golpe/daño sin añadir ''derribó'' o ''derrotó'' como lectura principal. También conserva la alternancia de nombres propios observada en el POB.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término divino por defecto, aunque este versículo no lo contiene.
  - Se prefiere 'Joás/Jehoás' para reflejar la variación nominal del hebreo sin borrar la identidad del rey.
  - '''De manos de'' conserva el modismo hebreo de dominio político y militar.'
  - No se usa 'SEÑOR' ni una paráfrasis explicativa, para preservar la transparencia del texto fuente.
