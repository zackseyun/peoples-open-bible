translation:
  language: es
  text: 'Y Joás dijo a los sacerdotes: «Todo el dinero de las cosas consagradas que se lleva a la casa de Yahvé, el dinero de cada hombre que pasa[a], el dinero de la valoración de las personas[b], y todo el dinero que sube al corazón de un hombre[c] para llevarlo a la casa de Yahvé—»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, “el dinero de todo el que pasa”; probablemente se refiere al pago de censo requerido de los contados (compárese Éxodo 30:13–16).
    reason: lexical_alternative
  - marker: b
    text: O “el dinero por la valoración de las personas”; probablemente se refiere a pagos asociados con valoraciones votivas (compárese Levítico 27:2–8).
    reason: cross_reference
  - marker: c
    text: 'Hebraísmo: “que sube al corazón de un hombre”, es decir, lo que alguien decide ofrecer libremente.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En español POB se adopta ‘Yahvé’ para reflejar directamente el Tetragrámaton, manteniendo la distinción frente a una sustitución reverencial como ‘SEÑOR’.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los curas
  - los ministros
  lexicon: HALOT
  rationale: ‘Sacerdotes’ es el equivalente directo y natural del hebreo כהנים; conserva el referente cultual sin desplazarlo a terminología eclesiástica posterior.
- source_word: כֹּל כֶּסֶף הַקֳּדָשִׁים
  english_pob_choice: all the money of the holy things
  chosen_spanish: todo el dinero de las cosas consagradas
  alternatives_spanish:
  - todo el dinero de las cosas santas
  - todo el dinero de los dones sagrados
  - todo el dinero de las cosas dedicadas
  lexicon: HALOT
  rationale: ‘כסף הקדשים’ es dinero asociado a lo consagrado/santificado. ‘Cosas consagradas’ preserva la estructura posesiva del hebreo y evita cerrar el sentido solo a ‘ofrendas’, que sería más interpretativo.
- source_word: יוּבָא בֵית יְהוָה
  english_pob_choice: is brought into the house of Yahweh
  chosen_spanish: se trae a la casa de Yahvé
  alternatives_spanish:
  - es traído a la casa de Yahvé
  - entra en la casa de Yahvé
  lexicon: HALOT
  rationale: El pasivo hebreo permite una voz española impersonal natural. ‘Se trae’ conserva el movimiento hacia la casa de Yahvé sin forzar una pasiva pesada.
- source_word: כֶּסֶף עוֹבֵר אִישׁ
  english_pob_choice: the money of each man who passes over
  chosen_spanish: el dinero de cada hombre que pasa
  alternatives_spanish:
  - el dinero de cada hombre que pasa sobre
  - el dinero de cada hombre que pasa entre los contados
  - el dinero del impuesto de censo de cada hombre
  lexicon: HALOT
  rationale: La expresión hebrea conserva el verbo ‘pasar’; en el contexto cultual-fiscal probablemente alude al pago de censo. En español se mantiene ‘que pasa’ en el texto principal para no borrar la imagen ni cerrar de antemano la posible referencia técnica.
- source_word: כֶּסֶף נַפְשׁוֹת עֶרְכּוֹ
  english_pob_choice: the money of the valuation of persons
  chosen_spanish: el dinero de la valoración de las personas
  alternatives_spanish:
  - el dinero por la tasación de personas
  - el dinero de la valuación de personas
  - el dinero de la valoración de cada persona
  lexicon: HALOT
  rationale: ‘נפשׁות ערכו’ apunta a una valoración legal de personas. ‘Valoración de las personas’ conserva el sustantivo jurídico y el plural hebreo sin introducir de más la referencia a votos en el cuerpo del texto.
- source_word: כָּל כֶּסֶף אֲשֶׁר יַעֲלֶה עַל לֶב אִישׁ
  english_pob_choice: all the money that comes up on a man’s heart
  chosen_spanish: todo el dinero que sube al corazón de un hombre
  alternatives_spanish:
  - todo el dinero que le sube al corazón a un hombre
  - todo el dinero que se le ocurre a un hombre dar
  - todo el dinero que un hombre se propone en su corazón
  lexicon: HALOT
  rationale: La idiomática hebrea ‘sube al corazón’ se preserva casi literalmente porque la POB inglesa también mantuvo la imagen. En español suena comprensible y deja visible que se trata de una intención interior, no de un mero pensamiento pasajero.
- source_word: לְהָבִיא בֵּית יְהוָה
  english_pob_choice: to bring into the house of Yahweh
  chosen_spanish: para llevarlo a la casa de Yahvé
  alternatives_spanish:
  - para traerlo a la casa de Yahvé
  - para introducirlo en la casa de Yahvé
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. ‘Llevarlo’ mantiene la dirección final implícita del dinero mencionado y evita repetir innecesariamente ‘dinero’ en español.
theological_decisions:
- issue: Forma del nombre divino en una cláusula de ofrenda/templo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La POB inglesa ya decidió no ocultar el Tetragrámaton. La forma española ‘Yahvé’ conserva esa decisión doctrinal y evita una sustitución litúrgica tradicional que borraría el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה / YHWH'
- issue: Alcance de כֶּסֶף עוֹבֵר אִישׁ
  english_pob_reading: the money of each man who passes over
  chosen_spanish_reading: el dinero de cada hombre que pasa
  alternative_spanish_readings:
  - el dinero del impuesto de censo de cada hombre
  - el dinero de cada hombre que pasa entre los contados
  rationale: Se conserva la formulación abierta del hebreo y de la POB inglesa para no eliminar la tensión entre imagen literal y posible referencia al impuesto de censo de Éxodo 30. La nota permite la lectura contextual sin imponerla en el texto principal.
  doctrine_reference: Éxodo 30:13–16; lectura cultual-fiscal
- issue: Idioma del corazón en la ofrenda voluntaria
  english_pob_reading: that comes up on a man’s heart
  chosen_spanish_reading: que sube al corazón de un hombre
  alternative_spanish_readings:
  - que un hombre se propone en su corazón
  - que le nace a un hombre ofrecer
  rationale: La metáfora se preserva para mantener la textura semítica del original. La traducción no la vuelve totalmente explícita en el texto principal, porque el sentido voluntario ya queda suficientemente insinuado y la imagen es parte del valor exegético del versículo.
  doctrine_reference: Hebraísmo idiomático
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del POB inglés, pero ajusta la forma al español natural. Se mantuvo la apertura semántica de ‘passes over’ y del hebraísmo del corazón, sin traducirlos de forma interpretativa en exceso; también se preservó la distinción entre el dinero asociado a lo consagrado, el de la valoración de personas y el ofrendado voluntariamente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה de manera consistente con el estándar doctrinal del proyecto.
  - Se evita ‘SEÑOR’ como sustitución del nombre divino.
  - ‘Sacerdotes’ se mantiene para כהנים, y ‘casa de Yahvé’ para בית יהוה.
  - ‘Valoración de las personas’ conserva el valor jurídico/cultual de la expresión.
  - ‘Sube al corazón’ mantiene el hebraísmo sin neutralizarlo en una paráfrasis.
