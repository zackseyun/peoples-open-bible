  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: el pueblo de Dios esperaba dos resultados contrastados, «salvación» para los justos y «destrucción» para sus enemigos. También conserva correctamente las alternativas léxicas de προσεδέχθη y σωτηρία. Sin embargo, no sigue del todo la puntuación y el énfasis del POB inglés, que marca explícitamente la expectativa doble con «both ... and ...», y además los marcadores de notas no están anclados en el mismo orden que las notas listadas en el expediente inglés.'
  spanish_quality_summary: El español es claro, natural y digno. La frase funciona bien en registro bíblico contemporáneo. Aun así, una leve revisión mejora la correspondencia con el paralelismo enfático del original y evita una posible lectura demasiado lineal al introducir «tanto ... como ...». También conviene alinear el orden de los marcadores con el texto revisado y con la disciplina de notas.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Tu pueblo», «salvación», «los justos» y «destrucción» están bien elegidos. «Esperaba» es adecuado para προσεδέχθη, con alternativas válidas en nota.
  issues:
  - severity: medium
    issue: Falta de explicitación del paralelismo doble enfático
    rationale: El griego presenta una estructura μὲν...δὲ, y el POB inglés la refuerza con «both ... and ...». «Esperaba la salvación ... y la destrucción ...» es fiel en lo básico, pero «esperaba tanto ... como ...» refleja mejor la expectativa doble y el contraste estructural.
  - severity: low
    issue: Orden de anclaje de notas mejorable
    rationale: El texto español pone [a] sobre «esperaba» y [b] sobre «salvación», lo cual es aceptable, pero en la evidencia auditada inglesa la nota b acompaña «salvation» y la a acompaña el verbo. En español conviene mantener marcadores únicos y ordenados de izquierda a derecha en el texto final; por ello deben reordenarse las notas o los anclajes para evitar desalineación editorial.
  revised_spanish_text: Así, tu pueblo esperaba[a] tanto la salvación[b] de los justos como la destrucción de sus enemigos.
  revised_footnotes:
  - marker: a
    text: O «aguardaba» o «recibía con expectación»; el verbo griego puede denotar espera ansiosa o espera receptiva.
    reason: lexical_alternative
  - marker: b
    text: O «liberación» de los justos.
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor: añade «tanto ... como ...» para reflejar mejor el paralelismo contrastivo del griego y la expectativa doble subrayada en el POB inglés, mientras conserva las mismas decisiones léxicas principales y las notas alternativas. También deja los marcadores de notas en orden natural dentro del texto revisado.'
