id: 2PE.1.2
reference: 2 Peter 1:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: χάρις ὑμῖν καὶ εἰρήνη πληθυνθείη ἐν ἐπιγνώσει τοῦ θεοῦ καὶ Ἰησοῦ τοῦ κυρίου ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/002.yaml
  text: Grace to you and peace be multiplied in the knowledge of God and of Jesus our Lord[a][b].
  footnotes:
  - marker: a
    text: Or 'through the knowledge of God and of Jesus our Lord.' The Greek preposition can indicate sphere ('in') or means ('through/by means of').
    reason: alternative_reading
  - marker: b
    text: Or 'full knowledge' for 'knowledge' (Greek ἐπίγνωσις), a term that can carry the sense of fuller or more complete knowledge.
    reason: lexical_alternative
translation:
  language: ko
  text: 하나님과 우리 주 예수를 참지식으로[a] 아는 가운데 은혜와 평강이 여러분에게 더욱 풍성하기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「참지식을 통하여」. 헬라어 ἐν은 영역(「~ 안에서」)이나 수단(「~을 통하여」) 모두 가능하다. 또한 ἐπίγνωσις는 단순한 인식이 아니라 더 충만하고 깊은 앎을 가리키므로, 본문은 「참지식」으로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίγνωσις
  english_pob_choice: knowledge
  chosen_korean: 참지식
  alternatives_korean:
  - 지식
  - 온전한 지식
  - 깊은 앎
  lexicon: BDAG
  rationale: 베드로후서는 ἐπίγνωσις를 일반 γνῶσις와 구별하여 충만하고 인격적인 앎을 뜻하는 데 반복적으로 사용한다(1:2, 3, 8; 2:20). 프로젝트 용어집에 따라 「참지식」으로 옮긴다.
- source_word: ἐν
  english_pob_choice: in
  chosen_korean: ~ 안에서 / ~으로
  alternatives_korean:
  - ~을 통하여
  lexicon: BDAG
  rationale: 영역(sphere)과 수단(means) 사이의 해석상 개방성을 남기되, 한국어로는 「참지식으로 아는 가운데」로 옮겨 두 의미를 모두 자연스럽게 포섭한다.
- source_word: κύριος (Jesus)
  english_pob_choice: Lord
  chosen_korean: 주
  alternatives_korean:
  - 주님
  lexicon: BDAG
  rationale: 예수께 적용된 κύριος의 한국어 표준 등가어.
