lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  lexicon: HALOT
  rationale: En contextos genealógicos, בְּנֵי introduce una relación de descendencia directa o lineal. «Hijos de» conserva la forma genealógica del hebreo con naturalidad en español; «descendientes de» sería interpretativo y menos preciso como correspondencia formal.
- source_word: יָוָן
  english_pob_choice: Javan
  chosen_spanish: Javan
  alternatives_spanish:
  - Iavan
  lexicon: HALOT
  rationale: Es un nombre propio y se translitera. «Javan» es la forma habitual y readable en español bíblico contemporáneo.
- source_word: אֱלִישָׁה
  english_pob_choice: Elishah
  chosen_spanish: Elishah
  lexicon: HALOT
  rationale: Nombre propio/topónimo dentro de la Tabla de las Naciones; se conserva por transliteración.
- source_word: וְ/תַרְשִׁישׁ
  english_pob_choice: Tarshish
  chosen_spanish: Tarshish
  lexicon: HALOT
  rationale: Nombre propio geográfico o étnico; la transliteración «Tarshish» evita interpretarlo indebidamente.
- source_word: כִּתִּים
  english_pob_choice: Kittim
  chosen_spanish: Kittim
  alternatives_spanish:
  - Chittim
  lexicon: HALOT
  rationale: Ethnónimo/topónimo. «Kittim» sigue la transliteración moderna y evita la grafía inglesa antigua «Chittim».
- source_word: וְ/דֹדָנִים
  english_pob_choice: Dodanim
  chosen_spanish: Dodanim
  alternatives_spanish:
  - Rodanim
  lexicon: HALOT
  rationale: La forma del texto hebreo masorético es דֹדָנִים, por lo que se mantiene «Dodanim» en el texto principal. La variante textual «Rodanim» se documenta aparte como lectura alternativa.
translation_notes:
  revision_awareness: No se requirieron revisiones adicionales; la traducción sigue de cerca el texto hebreo (WLC/MT) y conserva la variante textual documentada en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene la transliteración de todos los nombres propios para preservar la estructura genealógica del pasaje.
  - Se usa «hijos de» por ser la correspondencia genealógica directa de בְּנֵי.
  - La nota textual se vincula solo a «Dodanim» porque la variante afecta ese nombre y no el resto del verso.
