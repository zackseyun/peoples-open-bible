base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/027.yaml
  text: Daniel answered before the king and said[a], “The mystery that the king asks, no wise men, enchanters, magicians[b], or diviners are able to make known to the king.”
  footnotes:
  - marker: a
    text: Or 'secret.' The Aramaic term is rendered 'mystery' here to preserve the chapter's repeated theme of a hidden matter disclosed only by God.
    reason: lexical_alternative
  - marker: b
    text: '''Enchanters'' translates a technical term for one class of Babylonian specialists; ''astrologers'' is a traditional alternative.'
    reason: lexical_alternative
