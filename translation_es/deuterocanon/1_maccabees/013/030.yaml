translation:
  language: es
  text: Este es el sepulcro que hizo en Modeín, hasta hoy.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Este
  - Esto es
  lexicon: LSJ
  rationale: El griego presenta una construcción demostrativa sin verbo explícito; en español, «Este es» reproduce de forma natural la identificación del monumento.
- source_word: τάφος
  english_pob_choice: tomb
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - túmulo
  lexicon: LSJ
  rationale: En el contexto de un monumento funerario familiar, «sepulcro» conserva bien el sentido de una construcción sepulcral y su registro bíblico; «tumba» también sería posible, pero «sepulcro» suena más acorde con una estructura conmemorativa.
- source_word: ἐποίησεν
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - construyó
  - edificó
  lexicon: LSJ
  rationale: ποιέω permite «hacer» en sentido amplio. En español, «hizo» sigue de cerca el valor básico del verbo sin imponer más especificidad de la que ofrece el griego.
- source_word: ἐν Μωδεεὶμ
  english_pob_choice: in Modein
  chosen_spanish: en Modeín
  alternatives_spanish:
  - en Modein
  - en Modín
  lexicon: transliteration
  rationale: Se conserva el topónimo en su forma transliterada. «Modeín» adapta la acentuación al español y mantiene la referencia al lugar nombrado en el texto.
- source_word: ἕως τῆς ἡμέρας ταύτης
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta este día
  - hasta el día de hoy
  lexicon: LSJ
  rationale: La locución griega indica continuidad hasta el momento presente. «Hasta hoy» es una equivalencia natural y concisa en español que preserva ese valor temporal.
translation_notes:
  revision_awareness: El texto griego es breve, sin variantes textuales relevantes en el paquete provisto; la traducción sigue de cerca la identificación demostrativa, el verbo de creación/construcción y la expresión temporal final, sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se usa «sepulcro» para τάφος en un contexto funerario monumental.
  - Se conserva «Modeín» como transliteración coherente con el topónimo del pasaje.
  - La frase final «hasta hoy» mantiene el valor idiomático de ἕως τῆς ἡμέρας ταύτης sin arcaísmo excesivo.
