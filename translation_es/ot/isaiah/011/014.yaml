base_translation:
  language: en
  yaml_path: translation/ot/isaiah/011/014.yaml
  text: They will swoop down on the shoulder of the Philistines toward the west[a]; together they will plunder the sons of the east. Edom and Moab will be under the putting forth of their hand[d][c][b], and the sons of Ammon will obey them.
  footnotes:
