translation:
  language: es
  text: Porque tú formaste mis entrañas[a]; me entretejiste[b] en el vientre de mi madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "mis riñones", expresión figurada para las partes más profundas del interior humano.'
    reason: cultural_note
  - marker: b
    text: O "me tejiste"; más literalmente, "me cubriste".
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la base o motivo de la afirmación anterior; en español, 'porque' mantiene con naturalidad el valor causal y el flujo poético del hebreo.
- source_word: קָנִיתָ
  english_pob_choice: formed
  chosen_spanish: formaste
  alternatives_spanish:
  - adquiriste
  - creaste
  - poseíste
  lexicon: HALOT
  rationale: Aunque el verbo puede significar 'adquirir/poseer', en este contexto de formación prenatal la equivalencia española más fiel y natural es 'formaste', preservando la acción creadora de Dios sin un matiz comercial.
- source_word: כִלְיֹתַי
  english_pob_choice: my inward parts
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mis riñones
  - mi interior
  - mis partes internas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'mis riñones', pero como idiomático bíblico apunta al interior profundo de la persona. 'Entrañas' conserva la concreción corporal y funciona bien en español bíblico sin perder inteligibilidad.
- source_word: תְּסֻכֵּנִי
  english_pob_choice: you wove me together
  chosen_spanish: me entretejiste
  alternatives_spanish:
  - me tejiste
  - me cubriste
  - me rodeaste
  lexicon: HALOT
  rationale: La imagen del verbo en este contexto sugiere una formación cuidadosa y protectora. 'Me entretejiste' mantiene la metáfora de un hacer artesanal y se acerca bien al valor explicado en la POB inglesa.
- source_word: בְּבֶטֶן אִמִּי
  english_pob_choice: in my mother’s womb
  chosen_spanish: en el vientre de mi madre
  alternatives_spanish:
  - en el seno de mi madre
  - en el vientre materno
  lexicon: HALOT
  rationale: '''Vientre'' expresa de forma clara y reverente el lugar de gestación, conservando el sentido locativo del hebreo y la referencia maternal directa.'
theological_decisions:
- issue: Imagen corporal de 'riñones' / 'entrañas' como figura del interior humano
  english_pob_reading: Hebrew 'my kidneys,' a figurative expression for the deepest inward parts.
  chosen_spanish_reading: '''Mis entrañas'' conserva la figura corporal como expresión del interior profundo.'
  alternative_spanish_readings:
  - '''Mis riñones'''
  - '''Mi interior más profundo'''
  - '''Mi ser interior'''
  rationale: La POB inglesa preserva la metáfora corporal sin volverla totalmente abstracta. En español, 'entrañas' mantiene esa tensión entre literalidad y sentido idiomático; las opciones más interpretativas suavizan la imagen y 'riñones' suena demasiado técnico para la lectura pública.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Formación prenatal y agencia divina
  english_pob_reading: The verse is translated as a poetic affirmation of God's direct involvement in the psalmist's formation in the womb.
  chosen_spanish_reading: La línea se entiende como una afirmación poética de la participación directa de Dios en la formación del salmista en el vientre materno.
  alternative_spanish_readings:
  - 'Una formulación más literal: ''adquiriste mis entrañas'''
  - 'Una lectura más libre: ''me diste forma desde antes de nacer'''
  rationale: La redacción española conserva la afirmación fuerte de acción divina prenatal sin añadir formulaciones doctrinales ajenas al verso. 'Formaste' y 'me entretejiste' mantienen la imagen poética y la agencia de Dios tal como el texto la presenta.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la evaluación inglesa de alta concordancia: se mantiene la metáfora corporal de כִלְיֹתַי y la imagen artesanal de תְּסֻכֵּנִי, evitando una abstracción excesiva. No se observan revisiones aplicadas en el expediente inglés reciente.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' en otros contextos del proyecto, pero aquí el verso no contiene el tetragrámaton.
  - '''Entrañas'' conserva el paralelismo con el hebreo más que ''interior'', y funciona mejor junto con la imagen de ''entretejiste''.'
  - La puntuación con punto y coma refleja bien la bisagra poética entre ambas cláusulas.
