review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: habitantes de la serranía, topónimo Misrefot-maim, énfasis en «yo mismo», «hijos de Israel», y la idea de asignar la tierra como herencia. Sin embargo, la construcción inicial «A todos los habitantes...» queda sintácticamente menos natural y menos ajustada a כָּל יֹשְׁבֵי como sujeto nominal; conviene «Todos los habitantes...». Además, el orden de las notas [b][c] en inglés refleja dos apoyos distintos sobre «allot it / inheritance», pero en español basta mantener la nota del giro idiomático sobre «repártela» y la nota léxica alternativa sobre «expulsaré/desposeeré».'
  spanish_quality_summary: 'El español es claro y ampliamente legible, pero puede mejorar en naturalidad y dignidad con pequeños ajustes: quitar la preposición inicial sobrante, preferir «serranía» o mantener «región montañosa» sin duplicar la marca acusativa, y usar una puntuación algo más limpia con raya o coma enfática. «Heredad» es aceptable y fiel al matiz pactal, aunque algo tradicional; aquí sigue siendo inteligible.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Hijos de Israel» preserva la decisión teológica documentada. «Heredad» mantiene bien נַחֲלָה. No aparece el nombre divino ni otro término glosario sensible. «Expulsaré» para אוֹרִישֵׁם es adecuado, con nota alternativa «desposeeré».
  issues:
  - severity: medium
    issue: 'Inicio sintácticamente marcado: «A todos los habitantes...»'
    rationale: En el hebreo, כָּל יֹשְׁבֵי הָהָר funciona como sujeto de «yo mismo los expulsaré». En español, abrir con «A todos...» hace pensar en objeto directo anticipado y suena menos natural; «Todos los habitantes...» refleja mejor la estructura y fluye mejor.
  - severity: low
    issue: Puntuación del inciso enfático
    rationale: Una raya antes de «yo mismo» reproduce mejor la pausa enfática del hebreo/POB inglés que la simple coma, aunque esto es estilístico más que semántico.
  revised_spanish_text: 'Todos los habitantes de la región montañosa desde el Líbano hasta Misrefot-maim[a], todos los sidonios: yo mismo[b] los expulsaré de delante de los hijos de Israel. Solo repártela[c] a Israel como heredad, como te he mandado.'
  revised_footnotes:
