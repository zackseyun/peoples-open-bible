    issue: Falta el objeto directo explícito en la primera cláusula
    rationale: El hebreo incluye אֹתוֹ ('lo'), y el inglés auditado también lo conserva ('put it'). En español, 'Y pondrás sobre un cordón...' queda incompleto o excesivamente elíptico; 'Y lo pondrás...' preserva mejor el sentido.
  - severity: medium
    issue: La nota [c] mezcla dos lemas distintos
    rationale: Anclada en 'azul', la nota dice 'O «hilo»/«cordón» de azul', combinando alternativas de פְּתִיל con explicación de תְּכֵלֶת. Esto desordena la evidencia léxica y puede confundir al lector.
  - severity: low
