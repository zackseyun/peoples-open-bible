translation:
  language: es
  text: Los que derraman oro de la bolsa y pesan plata en la balanza[a] contratan a un orfebre, y él lo convierte en un dios; se inclinan, de hecho, se postran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y pesan plata con el brazo de la balanza'; el hebreo literalmente dice 'caña' o 'junco' y puede referirse al travesaño medidor de una balanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזָּלִים
  english_pob_choice: Those who lavish
  chosen_spanish: Los que derraman
  alternatives_spanish:
  - Los que derrochan
  - Los que gastan abundantemente
  lexicon: HALOT
  rationale: El participio expresa una acción continua de gastar o verter riqueza con liberalidad. 'Derraman' conserva la imagen de flujo/extravagancia sin volverlo demasiado interpretativo.
- source_word: זָהָב מִכִּיס
  english_pob_choice: gold from the purse
  chosen_spanish: oro de la bolsa
  alternatives_spanish:
  - oro de la bolsa de dinero
  - oro del bolso
  lexicon: HALOT
  rationale: כִּיס designa una bolsa o bolsa de dinero. 'Bolsa' es natural en español y mantiene la imagen concreta del dinero extraído para el ídolo.
- source_word: וְכֶסֶף בַּקָּנֶה יִשְׁקֹלוּ
  english_pob_choice: and weigh out silver on the scale
  chosen_spanish: y pesan plata en la balanza
  alternatives_spanish:
  - y pesan plata con el asta de la balanza
  - y pesan plata en el brazo de la balanza
  lexicon: HALOT
  rationale: קָנֶה literalmente es 'caña/reed', pero en este contexto comercial probablemente alude al brazo o viga de la balanza. 'Balanza' comunica el acto de pesar sin oscurecer la imagen; la nota preserva la alternativa literal.
- source_word: יִשְׂכְּרוּ צוֹרֵף
  english_pob_choice: hire a goldsmith
  chosen_spanish: contratan a un orfebre
  alternatives_spanish:
  - contratan a un platero
  - pagan a un metalista
  lexicon: HALOT
  rationale: צוֹרֵף es un trabajador del metal, y aquí el contexto de oro y plata favorece 'orfebre', término claro y preciso en español para quien trabaja metales preciosos.
- source_word: וְיַעֲשֵׂהוּ אֵל
  english_pob_choice: and he makes it into a god
  chosen_spanish: y él lo convierte en un dios
  alternatives_spanish:
  - y él lo hace un dios
  - y él lo transforma en un dios
  lexicon: HALOT
  rationale: La forma verbal con sufijo retoma el metal/objeto mencionado. 'Convierte en un dios' expresa la transformación manufacturada y conserva el valor polémico de אֵל en el contexto idolátrico.
- source_word: יִסְגְּד֖וּ
  english_pob_choice: they bow down
  chosen_spanish: se postran
  alternatives_spanish:
  - se inclinan
  - adoran
  lexicon: HALOT
  rationale: סגד denota inclinarse en homenaje o adoración. 'Se postran' es más fuerte que 'se inclinan' y encaja con el siguiente verbo intensivo.
- source_word: אַף יִשְׁתַּחֲוּֽוּ
  english_pob_choice: indeed they prostrate themselves
  chosen_spanish: sí, se inclinan hasta el suelo
  alternatives_spanish:
  - e incluso se postran
  - y hasta se postran
  lexicon: HALOT
  rationale: אַף intensifica lo anterior; 'sí' preserva el énfasis. 'Se inclinan hasta el suelo' reproduce la acción de postrarse con una expresión natural y digna en español.
theological_decisions:
- issue: Renderización de אֵל en un contexto de idolatría
  english_pob_reading: a god
  chosen_spanish_reading: un dios
  alternative_spanish_readings:
  - un ídolo
  - un dios falso
  rationale: La POB inglesa mantiene el término lexical 'god' sin interpretarlo como 'idol'. En español, 'un dios' preserva la palabra fuente y deja que el contexto polemice contra la falsedad del objeto fabricado.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador de nota [a] directamente en el texto español, anclado en la frase correspondiente. Se mantuvo la decisión léxica sobre קָנֶה como 'balanza' en el texto principal y se dejó la alternativa literal en nota.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como default solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Dios'' se reservó para תֵאל/אֵל en el contexto polémico del ídolo, sin sustituirlo por ''ídolo'' en el texto principal.'
  - Se eligió 'orfebre' por coherencia con oro y plata y por su inteligibilidad en español contemporáneo.
  - La puntuación y el ritmo buscan ser públicos y litúrgicamente legibles sin añadir explicación interpretativa al cuerpo del versículo.
