review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: Yahvé habla a Moisés, el mandato de extender la mano, la dirección hacia los cielos/cielo, el resultado de que caiga granizo, y el alcance sobre personas, animales y la vegetación del campo en Egipto. También conserva la repetición final «en la tierra de Egipto». Sin embargo, la asignación de notas al pie está desalineada con el texto y con la evidencia inglesa: la nota [a] está anclada en «Yahvé» pero el contenido de esa nota en el POB inglés corresponde a Moisés / alternativa de «toward heaven», mientras que la nota [b] está anclada en «cielo» con un texto duplicativo. Además falta una nota para aclarar el sentido genérico de «el hombre», que sí está documentado en el rastro inglés.'
  spanish_quality_summary: 'El español es claro, digno y bastante natural. «Extiende tu mano», «para que caiga granizo» y «toda planta del campo» funcionan bien. No obstante, «sobre el hombre y sobre la bestia» suena algo rígido; aun así es defendible por su cercanía al paralelismo hebreo. El problema principal no es de redacción, sino de aparato de notas: actualmente induce confusión y no refleja ordenadamente las alternativas léxicas preservadas.'
  glossary_alignment: 'Se alinea bien con la terminología del proyecto en lo esencial: יְהוָה → «Yahvé» correctamente; no hay conflictos con términos doctrinales mayores. La decisión de mantener «el hombre» para הָאָדָם es aceptable, pero debe acompañarse de una nota que aclare el valor genérico, como hace el POB inglés. La nota sobre «cielo» debe quedar anclada allí, no en «Yahvé».'
  issues:
  - severity: high
    issue: Notas al pie mal alineadas con sus anclas y con el audit trail inglés
    rationale: La nota [a] en el texto español aparece en «Yahvé», pero su contenido no corresponde a una alternativa preservada del verso en el POB inglés. Además, la alternativa documentada sobre «sky/heaven» debe anclarse en «cielo», y falta la aclaración del sentido genérico de «el hombre».
  - severity: medium
    issue: Falta nota para el valor genérico de «el hombre»
    rationale: El audit trail inglés preserva explícitamente esta aclaración. En español, sin nota, puede malinterpretarse como masculino individual en vez de humanidad en contraste con «la bestia».
  - severity: low
    issue: La nota explicativa sobre el nombre divino no es necesaria aquí
    rationale: Aunque «Yahvé» es correcto y conforme al proyecto, en este registro la nota añadida no proviene del aparato inglés de este versículo y distrae de las alternativas relevantes del texto fuente.
  revised_spanish_text: 'Entonces Yahvé dijo a Moisés: «Extiende tu mano hacia el cielo[a], para que caiga granizo sobre toda la tierra de Egipto, sobre el hombre[b] y sobre la bestia y sobre toda planta del campo en la tierra de Egipto».'
