translation:
  language: es
  text: Jonatán, tío de David, era consejero, hombre entendido y escriba; y Jehiel, hijo de Hacmoní, estaba con los hijos[a] del rey[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los príncipes reales». El hebreo dice literalmente «los hijos del rey».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «estaba con los hijos del rey»; algunos entienden que esto implica servicio o supervisión entre ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹד
  english_pob_choice: uncle
  chosen_spanish: tío
  alternatives_spanish:
  - tío materno/paterno
  - pariente
  - amado
  lexicon: HALOT
  rationale: En este contexto genealógico y cortesano, con David nombrado explícitamente, el término expresa mejor una relación familiar. En español, 'tío' comunica naturalmente ese parentesco sin añadir explicaciones que el hebreo no da.
- source_word: יוֹעֵץ
  english_pob_choice: counselor
  chosen_spanish: consejero
  alternatives_spanish:
  - asesor
  lexicon: HALOT
  rationale: El participio describe una función oficial de dar consejo. 'Consejero' preserva bien el matiz de cargo o función en la corte.
- source_word: אִישׁ מֵבִין
  english_pob_choice: a man of understanding
  chosen_spanish: hombre entendido
  alternatives_spanish:
  - hombre de entendimiento
  - hombre perspicaz
  - hombre discernidor
  lexicon: HALOT
  rationale: La frase hebrea destaca discernimiento o comprensión. 'Hombre entendido' es natural en español y mantiene el valor calificativo del original sin volverlo más técnico de lo necesario.
- source_word: סוֹפֵר
  english_pob_choice: scribe
  chosen_spanish: escriba
  alternatives_spanish:
  - secretario
  - amanuense
  lexicon: HALOT
  rationale: En contexto administrativo real, el término puede abarcar un oficial letrado. 'Escriba' conserva esa amplitud mejor que una opción demasiado específica como 'secretario'.
- source_word: עִם בְּנֵי הַמֶּלֶךְ
  english_pob_choice: was with the king’s sons
  chosen_spanish: estaba con los hijos del rey
  alternatives_spanish:
  - estaba con los príncipes del rey
  - servía a los hijos del rey
  - estaba al servicio de los hijos del rey
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'con'. Aunque el contexto puede sugerir función de servicio o supervisión, el español debe mantener la sobriedad del texto base y no convertir la relación en una inferencia explícita.
- source_word: בְּנֵי הַמֶּלֶךְ
  english_pob_choice: the king’s sons
  chosen_spanish: los hijos del rey
  alternatives_spanish:
  - los hijos del rey
  - los príncipes reales
  lexicon: HALOT
  rationale: El hebreo dice 'sons'; en español 'hijos' reproduce con precisión la referencia filial y evita sustituirla por un título interpretativo.
- source_word: חַכְמוֹנִי
  english_pob_choice: Hachmoni
  chosen_spanish: Hacmoní
  alternatives_spanish:
  - Jacmoní
  - Hachmoní
  lexicon: HALOT
  rationale: Se translitera el nombre propio de forma directa al español. 'Hacmoní' sigue una forma clara y pronunciable para lectores hispanos.
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia entre el texto hebreo y la auditoría inglesa. No se detectaron revisiones sustantivas en la versión inglesa reciente; la redacción española conserva esa cautela y mantiene las dos ambigüedades documentadas: el parentesco de Jonatán con David y la relación de Jehiel con los hijos del rey.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; en este versículo no aplica.
  - Se prefirió «hijos del rey» en lugar de «príncipes» para respetar la literalidad documentada del hebreo.
  - «Escriba» se mantiene por consistencia con el valor administrativo letrado del término en contextos reales.
  - La puntuación sigue la sintaxis española moderna con punto y coma para separar las dos cláusulas principales.
