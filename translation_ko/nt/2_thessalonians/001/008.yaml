lexical_decisions:
- source_word: ἐν φλογὶ πυρός
  english_pob_choice: in flaming fire
  chosen_korean: 타오르는 불꽃 가운데서
  alternatives_korean:
  - 불의 화염 가운데서
  - 불의 불꽃 속에서
  lexicon: BDAG
  rationale: 직역에 가까우면서도 한국어 자연성을 살려 「타오르는 불꽃」으로 옮긴다.
- source_word: διδόντος ἐκδίκησιν
  english_pob_choice: inflicting vengeance
  chosen_korean: 보응을 내리실 것입니다
  alternatives_korean:
  - 보복을 가하실 것입니다
  - 응징을 행하실 것입니다
  lexicon: BDAG
  rationale: ἐκδίκησις는 사법적 보응을 뜻한다. 한국어 「보응」은 신적 정의의 무게를 살리면서 감정적·사사로운 「복수」 함의를 피한다.
- source_word: ἐκδίκησιν
  english_pob_choice: vengeance
  chosen_korean: 보응
  alternatives_korean:
  - 복수
  - 응징
  - 보복
  lexicon: BDAG
  rationale: 신적 정의의 사법적 응징을 「보응」으로 옮기며, 인간적·감정적 「복수」보다 적절하다.
- source_word: τοῖς μὴ εἰδόσι θεὸν
  english_pob_choice: those who do not know God
  chosen_korean: 하나님을 알지 못하는 자들
  alternatives_korean:
  - 하나님을 모르는 자들
  lexicon: BDAG
  rationale: 완료형이 현재적 의미로 쓰인 οἶδα의 지속 상태를 자연스럽게 표현한다.
- source_word: τοῖς μὴ ὑπακούουσιν τῷ εὐαγγελίῳ
  english_pob_choice: those who do not obey the gospel
  chosen_korean: 복음에 순종하지 않는 자들
  alternatives_korean:
  - 복음에 따르지 않는 자들
  lexicon: BDAG
  rationale: ὑπακούω의 「순종/청종」 의미를 「순종하지 않는」으로 자연스럽게 옮긴다.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ
  english_pob_choice: of our Lord Jesus
  chosen_korean: 우리 주 예수의
  alternatives_korean:
  - 우리의 주 예수의
  lexicon: BDAG
  rationale: 표준 글로서리에 따른 자연스러운 한국어 표현.
theological_decisions:
- issue: ἐκδίκησις의 한국어 등가어 선택
  chosen_reading: 보응
  alternative_readings:
  - 복수
  - 응징
  - 보복
  rationale: 본문은 계시되신 주의 신적·의로운 심판을 가리키므로 인간적·정념적 「복수」보다 사법적 「보응」이 적절하다. 본문의 엄중함을 약화시키지 않는다.
  doctrine_reference: 'Translation philosophy: do not soften source-text claims'
