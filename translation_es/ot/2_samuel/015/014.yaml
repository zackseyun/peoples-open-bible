translation:
  language: es
  text: 'Entonces David dijo a todos sus siervos que estaban con él en Jerusalén: «Levántense y huyamos, porque no habrá escape para nosotros de Absalón. Dense prisa en partir[a], no sea que él se apresure, nos alcance, traiga sobre nosotros la desgracia[b] y hiera la ciudad con el filo de la espada[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Dense prisa en salir'. El hebreo dice literalmente 'Dense prisa en ir', una orden urgente de partir de inmediato.
    reason: lexical_alternative
  - marker: b
    text: O 'traiga sobre nosotros el mal'. Aquí 'mal' se refiere a calamidad o desastre, no a mal moral.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'con la boca de la espada', un modismo hebreo que significa matar por la espada.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  - sus servidores
  lexicon: HALOT
  rationale: עֶבֶד puede significar 'siervo', 'servidor' o 'esclavo'. Dado que el POB inglés mantuvo la fuerza lexical de 'servants' sin borrar la posibilidad de subordinación marcada, en español 'esclavos' conserva mejor la amplitud semántica y la dependencia real de la corte davídica, sin suavizarla a un término más eclesiástico.
- source_word: ק֣וּמוּ
  english_pob_choice: Arise
  chosen_spanish: Levantaos
  alternatives_spanish:
  - Poneos en pie
  - Levantaos
  lexicon: HALOT
  rationale: El imperativo plural de קום pide una orden inmediata. 'Levantaos' es natural en español bíblico actual y conserva el tono urgente del mandamiento colectivo.
- source_word: וְנִבְרָחָה
  english_pob_choice: let us flee
  chosen_spanish: huyamos
  alternatives_spanish:
  - y huyamos
  - corramos
  lexicon: HALOT
  rationale: El cohortativo de ברח incluye a David en la acción. 'Huyamos' expresa bien esa exhortación inclusiva y la urgencia del escape.
- source_word: פְלֵיטָה
  english_pob_choice: escape
  chosen_spanish: escape
  alternatives_spanish:
  - salvación
  - liberación
  - salida
  lexicon: HALOT
  rationale: En este contexto militar, פְלֵיטָה denota posibilidad de escapar con vida. 'Escape' es el equivalente más directo y no introduce connotaciones de rescate divino que el verso no explicita.
- source_word: מִפְּנֵי אַבְשָׁלוֹם
  english_pob_choice: from Absalom
  chosen_spanish: delante de Absalón
  alternatives_spanish:
  - de Absalón
  - de la presencia de Absalón
  lexicon: HALOT
  rationale: מִפְּנֵי literalmente apunta a 'delante de' o 'de la presencia de'. 'Delante de Absalón' mantiene la imagen de huida ante la amenaza y evita reducir prematuramente la expresión a una mera procedencia.
- source_word: מַהֲרוּ לָלֶכֶת
  english_pob_choice: Hurry to depart
  chosen_spanish: Daos prisa en partir
  alternatives_spanish:
  - Daos prisa en ir
  - Apresuraos a salir
  lexicon: HALOT
  rationale: La construcción hebrea, literalmente 'apresuraos a ir', intensifica la orden. 'Daos prisa en partir' conserva la urgencia y suena más natural que una calca rígida.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - antes de que
  lexicon: HALOT
  rationale: פֶּן introduce una advertencia preventiva. 'No sea que' reproduce bien esa relación de temor y prevención en español contemporáneo.
- source_word: יְמַהֵר
  english_pob_choice: quickly
  chosen_spanish: se apresure
  alternatives_spanish:
  - se dé prisa
  - se apresure rápidamente
  lexicon: HALOT
  rationale: El verbo repite la idea de prisa. Traducirlo verbalmente como 'se apresure' preserva la fuerza del hebreo mejor que convertirlo solo en adverbio.
- source_word: וְהִשִּׂגָנוּ
  english_pob_choice: overtake us
  chosen_spanish: nos alcance
  alternatives_spanish:
  - nos dé alcance
  - nos alcance y nos capture
  lexicon: HALOT
  rationale: El hiphil de נשׂג expresa alcanzar en persecución. 'Nos alcance' es natural y mantiene la imagen de persecución inminente.
- source_word: וְהִדִּיחַ עָלֵינוּ אֶת הָרָעָה
  english_pob_choice: bring disaster upon us
  chosen_spanish: haga caer sobre nosotros el mal
  alternatives_spanish:
  - traiga sobre nosotros el desastre
  - haga venir sobre nosotros la desgracia
  lexicon: HALOT
  rationale: רָעָה puede denotar maldad moral o calamidad. Aquí el contexto obliga a calamidad; en español 'haga caer sobre nosotros el mal' mantiene la tensión del original, aunque en un sentido de desastre, no de mal moral.
- source_word: וְהִכָּה הָעִיר
  english_pob_choice: strike the city
  chosen_spanish: hiera la ciudad
  alternatives_spanish:
  - golpee la ciudad
  - ataque la ciudad
  - azote la ciudad
  lexicon: HALOT
  rationale: נכה es flexible; en contexto militar puede ser 'golpear', 'herir' o 'atacar'. 'Hiera la ciudad' conserva la contundencia del verbo sin volverlo excesivamente técnico.
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con filo de espada
  alternatives_spanish:
  - a filo de espada
  - con la boca de la espada
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'a la boca de espada', un modismo de muerte por la espada. 'Con filo de espada' comunica el idiomatismo de manera natural y más cercana al español bíblico tradicional sin perder el valor figurado.
theological_decisions:
- issue: Descripción de la amenaza de Absalón sin suavizar la gravedad militar
  english_pob_reading: there will be no escape for us from Absalom
  chosen_spanish_reading: no habrá para nosotros escape delante de Absalón
  alternative_spanish_readings:
  - no tendremos escape de Absalón
  - no habrá para nosotros salvación frente a Absalón
  rationale: El hebreo habla de imposibilidad de escape ante una amenaza humana concreta. La formulación española conserva esa desesperación sin introducir una idea de salvación espiritual que el texto no está expresando.
  doctrine_reference: Narrativa histórica; no doctrina directa
- issue: רָעָה como calamidad, no como mal moral
  english_pob_reading: bring disaster upon us
  chosen_spanish_reading: haga caer sobre nosotros el mal
  alternative_spanish_readings:
  - traiga sobre nosotros el desastre
  - haga venir sobre nosotros la desgracia
  rationale: El POB inglés marcó explícitamente que 'evil' aquí significa calamidad o desastre. En español se conserva 'el mal' para respetar la tensión lexical del hebreo, pero la nota interpretativa implícita queda apoyada por el contexto narrativo de ruina militar, no por maldad ética.
  doctrine_reference: Teología bíblica del juicio/calamidad
- issue: Idiomismo de espada como muerte violenta
  english_pob_reading: with the edge of the sword
  chosen_spanish_reading: con filo de espada
  alternative_spanish_readings:
  - a filo de espada
  - con la boca de la espada
  rationale: El modismo hebreo apunta a muerte por espada. La traducción mantiene la imagen de instrumento letal sin forzar una literalidad extraña en español.
  doctrine_reference: Uso idiomático semítico
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, pero se ajustó la redacción española para mantener naturalidad sin perder la fuerza lexical del hebreo. En particular, se preservó la urgencia de los imperativos, la cohesión del cohortativo inclusivo y el valor idiomático de 'la boca de espada' mediante una equivalencia española tradicional y auditable.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto cuando no aparece aquí; este versículo no contiene el tetragrámaton.
  - Se eligió 'esclavos' para עֲבָדָיו por coherencia con la política del proyecto de no suavizar δοῦλος/עבד sin razón contextual.
  - Se preservó el registro narrativo solemne con imperativos plurales de segunda persona ('Levantaos', 'Daos prisa').
  - No se introdujo ninguna terminología eclesiástica ajena al texto; la formulación sigue el campo semántico de huida militar y peligro inmediato.
