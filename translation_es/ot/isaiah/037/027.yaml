translation:
  language: es
  text: Y sus habitantes estaban sin fuerzas[a]; quedaron consternados[b] y avergonzados. Eran como la hierba del campo y el verdor tierno, como la hierba de los terrados[c], y como un campo antes de que la mies esté en pie[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «cortos de mano», un modismo que significa faltos de poder o capacidad.
    reason: lexical_alternative
  - marker: b
    text: O «quedaron deshechos y avergonzados». Los verbos hebreos pueden destacar tanto el desánimo interior como el ser quebrantados o abatidos.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «hierba de los terrados», una imagen de vegetación superficial que se seca con rapidez.
    reason: source_note
  - marker: d
    text: El final es difícil. Probablemente alude a vegetación o a un campo arruinado antes de que el grano esté en pie; compárese 2 Reyes 19:26.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבֵיהֶן
  english_pob_choice: their inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que habitaban en ellas
  - sus moradores
  lexicon: HALOT
  rationale: El participio con sufijo de 3fp designa a quienes habitaban en las ciudades o tierras aludidas. «Habitantes» es natural en español y conserva el sentido colectivo.
- source_word: קִצְרֵי יָד
  english_pob_choice: powerless
  chosen_spanish: sin fuerzas
  alternatives_spanish:
  - faltos de poder
  - de mano corta
  - sin capacidad
  lexicon: HALOT
  rationale: La expresión idiomática literalmente significa «cortos de mano» y denota incapacidad o falta de poder. «Sin fuerzas» comunica bien esa impotencia en español sin volverlo mecánico.
- source_word: חַתּוּ
  english_pob_choice: were dismayed
  chosen_spanish: quedaron atemorizados
  alternatives_spanish:
  - fueron quebrantados
  - quedaron deshechos
  - quedaron consternados
  lexicon: HALOT
  rationale: El verbo puede abarcar el ser quebrantados, aterrados o deshechos. En este contexto de derrota, «quedaron atemorizados» conserva la fuerza afectiva del verbo sin afirmar una metáfora más dura que el hebreo no exige aquí.
- source_word: וָבֹשׁוּ
  english_pob_choice: and put to shame
  chosen_spanish: y avergonzados
  alternatives_spanish:
  - y cubiertos de vergüenza
  - y deshonrados
  - y puestos en vergüenza
  lexicon: HALOT
  rationale: בוש expresa vergüenza o deshonra. «Avergonzados» sigue de cerca el valor resultativo y mantiene el paralelismo con la primera cláusula.
- source_word: עֵשֶׂב שָׂדֶה
  english_pob_choice: the grass of the field
  chosen_spanish: la hierba del campo
  alternatives_spanish:
  - el pasto del campo
  - la vegetación del campo
  lexicon: HALOT
  rationale: Es una construcción clara y común en español. «Hierba del campo» preserva la imagen de fragilidad y transitoriedad.
- source_word: וִירַק דֶּשֶׁא
  english_pob_choice: green growth
  chosen_spanish: el verdor tierno
  alternatives_spanish:
  - la hierba verde
  - el brote verde
  - la vegetación tierna
  lexicon: HALOT
  rationale: ירק y דשא apuntan a verdor, brote o crecimiento fresco. «Verdor tierno» evita reducir el doblete a mera repetición de «hierba» y mantiene la idea de vegetación joven.
- source_word: חֲצִיר גַּגּוֹת
  english_pob_choice: grass on the housetops
  chosen_spanish: la hierba de los terrados
  alternatives_spanish:
  - la hierba de los techos
  - el pasto de las azoteas
  lexicon: HALOT
  rationale: 'La imagen es literal y reconocible: vegetación superficial que se seca pronto. «Terrados» conserva un matiz natural en español bíblico y es comprensible.'
- source_word: וּשְׁדֵמָה
  english_pob_choice: a field before the standing grain
  chosen_spanish: un campo
  alternatives_spanish:
  - una tierra de labor
  - un campo devastado
  - un campo agostado
  lexicon: HALOT
  rationale: El sustantivo es difícil. En este contexto agrario, el sentido se completa con la frase siguiente; por eso se traduce de forma sobria como «un campo», dejando que la comparación final lleve la carga semántica que el hebreo presenta de manera compacta.
- source_word: לִפְנֵי קָמָה
  english_pob_choice: before the standing grain
  chosen_spanish: antes de la espiga
  alternatives_spanish:
  - antes del grano en pie
  - antes de que brote la mies
  - ante el cereal ya formado
  lexicon: HALOT
  rationale: קמה se refiere al grano o cereal en pie, al cultivo ya levantado. «Antes de la espiga» expresa en español la idea de algo destruido antes de madurar; se prefiere una formulación natural y breve.
theological_decisions:
- issue: El hebreo usa un par de verbos que pueden oscilar entre dismayo interior y ruptura/vergüenza externa.
  english_pob_reading: The Hebrew verbs can emphasize inward dismay as well as being broken or shattered.
  chosen_spanish_reading: Quedaron atemorizados y avergonzados, manteniendo abierta la posibilidad de una derrota interior y pública.
  alternative_spanish_readings:
  - quedaron quebrantados y avergonzados
  - fueron disuadidos y puestos en vergüenza
  - quedaron consternados y deshonrados
  rationale: La tradición del POB conserva la tensión semántica del hebreo en vez de cerrarla con un solo matiz. En español, «atemorizados» y «avergonzados» permiten leer tanto el impacto interno como la humillación visible.
  doctrine_reference: HALOT; uso semántico de חתת y בוש
translation_notes:
  revision_awareness: 'La versión inglesa más reciente suavizó חתו hacia «dismayed», eliminó la repetición de «like» y volvió más literal la frase final («before the standing grain»). Esta versión española sigue esa revisión: evita «quebrantados» como opción principal, conserva la secuencia imagética sin repetir innecesariamente «como», y traduce la clausula final de manera sobria sin añadir «seco/quemado», que el hebreo no explicita.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no solo cuando el texto lo exija directamente, sino como norma POB para el nombre divino; aquí no aparece en el versículo.
  - «Hierba» se usa para עֵשֶׂב y חֲצִיר porque el contexto compara fragilidad vegetal; se distingue de «verdor tierno» para evitar una repetición plana.
  - Se evita «Cristo/Mesías» porque el versículo no contiene terminología mesiánica.
  - La cláusula final se deja breve para respetar la dificultad del hebreo y no imponer una imagen agrícola demasiado precisa.
