translation:
  language: es
  text: Yahvé es compasivo[a] y clemente, lento para la ira y abundante en amor constante[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘misericordioso’ para רַחוּם.
    reason: lexical_alternative
  - marker: b
    text: Hebreo חָסֶד, término que a menudo denota amor leal y de pacto; también puede verterse ‘amor fiel’ o ‘lealtad de pacto’.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַחוּם
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - lleno de compasión
  lexicon: HALOT
  rationale: El adjetivo expresa profunda compasión o misericordia. En español, 'compasivo' comunica bien ese matiz afectivo y natural, sin volverse arcaico; 'misericordioso' sigue siendo viable, pero aquí 'compasivo' preserva mejor el paralelo con 'clemente'.
- source_word: חַנּוּן
  english_pob_choice: gracious
  chosen_spanish: clemente
  alternatives_spanish:
  - gracioso
  - misericordioso
  - favorable
  lexicon: HALOT
  rationale: La idea es favor inmerecido y benevolencia. 'Clemente' funciona en español bíblico actual para expresar benignidad y favor; evita el falso amigo 'gracioso' y conserva una distinción útil respecto de 'compasivo'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: usar la forma del nombre divino en lugar de un título sustituto. En español, ''Yahvé'' es la adaptación estable y legible de esa decisión.'
- source_word: אֶרֶךְ אַפַּיִם
  english_pob_choice: slow to anger
  chosen_spanish: lento para la ira
  alternatives_spanish:
  - paciente
  - tardo para airarse
  - largo de nariz
  lexicon: HALOT
  rationale: Es un modismo hebreo que describe la demora de la ira. 'Lento para la ira' reproduce el sentido idiomático con naturalidad en español, sin literalismo extraño.
- source_word: וְרַב
  english_pob_choice: abounding in
  chosen_spanish: abundante en
  alternatives_spanish:
  - rebosante de
  - grande en
  - rico en
  lexicon: HALOT
  rationale: Aquí el adjetivo funciona predicativamente con חָסֶד para indicar abundancia. 'Abundante en' es un equivalente directo y fluido en español.
- source_word: חָסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor constante
  alternatives_spanish:
  - amor fiel
  - lealtad de pacto
  - amor leal
  lexicon: HALOT
  rationale: חָסֶד es un término teológicamente denso que combina amor, fidelidad y lealtad. 'Amor constante' conserva la idea de amor duradero y comprometido sin reducirla a una sola faceta; mantiene la tensión semántica mejor que una paráfrasis doctrinal más estrecha.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El verso usa directamente el Nombre divino. Se evita 'SEÑOR' como sustituto, porque el proyecto busca transparentar el texto fuente y mantener el nombre personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de חָסֶד en un contexto de carácter divino
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor constante
  alternative_spanish_readings:
  - amor fiel
  - lealtad de pacto
  - amor leal
  rationale: En este salmo, חָסֶד describe el carácter pactual de Yahvé. 'Amor constante' preserva la unión de afecto y fidelidad sin importar un tecnicismo excesivo ni perder la dimensión relacional del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
translation_notes:
  revision_awareness: 'Coincide con el último repaso: no se registraron cambios necesarios y hay alto acuerdo en la evaluación cruzada.'
  spanish_consistency_notes:
  - Se mantiene el Nombre divino como 'Yahvé' según la norma del proyecto, sin máscara litúrgica.
  - '''Compasivo'' y ''clemente'' distinguen dos rasgos hebreos correlativos, evitando redundancia excesiva.'
  - '''Amor constante'' se usa como solución española para חָסֶד, conservando su peso teológico sin sonar arcaico.'
