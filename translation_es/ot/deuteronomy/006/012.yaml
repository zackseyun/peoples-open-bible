translation:
  language: es
  text: Ten cuidado, no sea que olvides a Yahvé, que te sacó de la tierra de Egipto, de la casa de esclavitud[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría decirse «de la casa de esclavos»; el hebreo es literalmente «de la casa de esclavos». Se prefirió «de la casa de esclavitud» por ser la formulación más idiomática y clara en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר
  english_pob_choice: Be careful
  chosen_spanish: Ten cuidado
  alternatives_spanish:
  - Cuídate
  - Guárdate
  - Esté atento
  lexicon: HALOT
  rationale: El imperativo niphal de שׁמר aquí funciona como advertencia urgente. «Ten cuidado» es natural en español y conserva bien el tono admonitorio sin sonar rígido.
- source_word: לְךָ
  english_pob_choice: you
  chosen_spanish: (implícito en «Ten cuidado»; con matiz de advertencia personal)
  alternatives_spanish:
  - para ti
  - por ti mismo
  - a ti mismo
  lexicon: HALOT
  rationale: El sufijo de segunda masculina singular intensifica la advertencia con sentido reflexivo/personal. En español queda bien integrado en la expresión exhortativa sin necesidad de añadir un pronombre explícito.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: Marca una cláusula de advertencia negativa. En español, «para no» expresa con naturalidad el peligro que se busca evitar.
- source_word: תִּשְׁכַּח
  english_pob_choice: you forget
  chosen_spanish: olvidar
  alternatives_spanish:
  - te olvides
  - olvides
  lexicon: HALOT
  rationale: El verbo tiene el sentido básico de olvidar, con una carga pactual de descuido. La construcción infinitiva en español con «para no olvidar» transmite bien la prevención sin forzar una forma verbal menos natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española estándar del proyecto, en lugar de sustituirlo por un título. «Yahvé» mantiene el referente personal del Tetragrámaton.
- source_word: הוֹצִיאֲךָ
  english_pob_choice: brought you out
  chosen_spanish: te sacó
  alternatives_spanish:
  - te hizo salir
  - te llevó fuera
  lexicon: HALOT
  rationale: En contexto de éxodo, el verbo hiphil de יצא se puede expresar naturalmente como «sacar». «Te sacó» preserva la acción divina de liberación de forma idiomática en español.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: Se mantiene «tierra» porque el hebreo la incluye explícitamente y aporta claridad formal; «Egipto» solo sería una versión más compacta.
- source_word: מִבֵּית עֲבָדִים
  english_pob_choice: from the house of slavery
  chosen_spanish: de la casa de esclavitud
  alternatives_spanish:
  - de la casa de esclavos
  - de la casa de servidumbre
  - de la casa de esclavitud
  lexicon: HALOT
  rationale: La pauta inglesa revisada favorece la expresión idiomática y exacta «house of slavery». En español, «casa de esclavitud» conserva la fuerza concreta del hebreo y el sentido de situación de opresión, sin diluirlo en el abstracto tradicional «servidumbre».
theological_decisions:
- issue: 'Nombre divino: יְהוָה'
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se preserva el nombre pactual de Dios en su forma transliterada en vez de ocultarlo con un título. La forma elegida es la usada por el proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Imagen de esclavitud en la fórmula del éxodo: מִבֵּית עֲבָדִים'
  english_pob_reading: from the house of slavery
  chosen_spanish_reading: de la casa de esclavitud
  alternative_spanish_readings:
  - de la casa de esclavos
  - de la casa de servidumbre
  rationale: La frase describe la condición real de esclavitud en Egipto. Se evita suavizar el término con una abstracción tradicional y se mantiene la concreción histórica del rescate divino.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy for δοῦλος
translation_notes:
  revision_awareness: 'La redacción sigue el sentido del texto hebreo y el cierre revisado del audit trail inglés: se evita una construcción literal extraña como «fuera de» y se conserva la imagen concreta de liberación desde una condición de esclavitud. También se respeta la decisión de usar el nombre divino «Yahvé» y no una sustitución titulada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la terminología del proyecto.
  - «Casa de esclavitud» mantiene la concreción del hebreo y evita la neutralización semántica de «servidumbre».
  - La exhortación se formula en español natural, sin perder el tono solemne de advertencia del original.
