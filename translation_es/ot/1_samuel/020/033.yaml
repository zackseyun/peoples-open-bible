  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Saúl lanza la lanza contra Jonatán con propósito violento, y Jonatán comprende que su padre ya ha tomado una decisión firme de matar a David. Sin embargo, la nota [a] sobre «jabalina» sobreinterpreta el término hebreo הַחֲנִית, ya que la evidencia auditada favorece «lanza» como término amplio y natural, con «jabalina» solo como alternativa posible, no como explicación de que el hebreo designa específicamente un arma arrojadiza.'
  spanish_quality_summary: El español es claro, natural y digno. «Entonces Saúl arrojó la lanza contra él para herirlo, y Jonatán supo que su padre había resuelto matar a David» lee bien. El único ajuste recomendable es afinar la nota [a] para no introducir una precisión léxica no sostenida por el expediente fuente.
  glossary_alignment: No hay términos del glosario mayor en juego salvo nombres propios, correctamente vertidos como «Saúl», «Jonatán» y «David». Las decisiones léxicas principales («arrojó», «lanza», «contra él», «supo», «había resuelto», «matar a David») son compatibles con la filosofía POB y con la evidencia fuente.
  issues:
  - severity: medium
    issue: La nota [a] presenta «jabalina» como si el hebreo designara una lanza arrojadiza de manera más específica de lo que permite la evidencia.
    rationale: El expediente inglés dice que «javelin» es posible en las narraciones de Saúl, pero que «spear» es la opción principal más natural y amplia. La nota española actual añade una afirmación técnica («designa una lanza arrojadiza») que va más allá de la justificación documentada.
  revised_spanish_text: Entonces Saúl arrojó la lanza[a] contra él para herirlo, y Jonatán supo que su padre había resuelto[b] matar a David.
  revised_footnotes:
  - marker: a
    text: 'O: «la jabalina». El hebreo también puede referirse a un arma de este tipo, aunque «lanza» es la opción más amplia y natural aquí.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «había decidido» / «estaba resuelto». El hebreo usa un modismo que expresa una decisión fija y ya cerrada por parte de Saúl.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural; solo se corrige la nota [a] para alinearla con la evidencia auditada y evitar una especificación léxica excesiva sobre הַחֲנִית.
