translation:
  language: es
  text: En sus ramas anidaron todas las aves de los cielos, y debajo de sus ramas frondosas[a] parieron todas las bestias del campo, y bajo su sombra habitaron todas las numerosas naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ramas». El hebreo usa aquí un segundo término para ramas grandes o frondosas, distinto del usado antes en el versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּסְעַפֹּתָיו
  english_pob_choice: in its branches
  chosen_spanish: en sus ramas
  alternatives_spanish:
  - entre sus ramas
  - en sus ramas extendidas
  lexicon: HALOT
  rationale: סְעַפּוֹת designa estructuras de ramas o miembros ramificados. 'En sus ramas' conserva la imagen arbórea de manera natural en español y corresponde al valor locativo de la preposición.
- source_word: קִנְנוּ
  english_pob_choice: nested
  chosen_spanish: anidaron
  alternatives_spanish:
  - hicieron nido
  - nidiaron
  lexicon: HALOT
  rationale: El verbo expresa con precisión la acción de las aves de hacer nido. 'Anidaron' es breve, natural y mantiene la imagen aviar que el texto exige.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: all the birds of the heavens
  chosen_spanish: todas las aves de los cielos
  alternatives_spanish:
  - todas las aves del cielo
  - toda ave de los cielos
  lexicon: HALOT
  rationale: עוף es colectivo; 'aves' comunica bien el conjunto. 'De los cielos' preserva el tono elevado del hebreo y sigue de cerca la expresión idiomática sin volverse rígido.
- source_word: פֹּארֹתָיו
  english_pob_choice: under its boughs
  chosen_spanish: debajo de sus boughs[b]
  alternatives_spanish:
  - debajo de sus ramas
  - bajo sus ramas frondosas
  lexicon: HALOT
  rationale: פֹּארוֹת alude a ramas grandes y frondosas. Mantener 'boughs' en una nota permite conservar la distinción lexical que la traducción inglesa auditada quiso marcar frente a סְעַפֹּת.
- source_word: יָלְדוּ
  english_pob_choice: gave birth
  chosen_spanish: parieron
  alternatives_spanish:
  - dieron a luz
  - trajeron cría
  lexicon: HALOT
  rationale: En el contexto de animales, ילד describe parto o cría. 'Parieron' conserva la fuerza corporal y concreta del verbo mejor que una paráfrasis más general.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: all the beasts of the field
  chosen_spanish: todas las bestias del campo
  alternatives_spanish:
  - todos los animales del campo
  - todas las fieras del campo
  lexicon: HALOT
  rationale: La expresión hebrea es la fórmula bíblica para animales terrestres salvajes. 'Bestias del campo' mantiene el registro bíblico sin dejar de ser comprensible en español.
- source_word: וּבְצִלּוֹ
  english_pob_choice: in its shade
  chosen_spanish: bajo su sombra
  alternatives_spanish:
  - en su sombra
  - bajo su sombra protectora
  lexicon: HALOT
  rationale: צֵל puede ser 'sombra' o 'sombra protectora'. 'Bajo su sombra' expresa el sentido de amparo y habitación, natural en español y fiel al cuadro metafórico.
- source_word: יֵשְׁבוּ
  english_pob_choice: dwelt
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - moraron
  lexicon: HALOT
  rationale: ישב en este contexto significa residir o habitar. 'Habitaron' conserva un registro sobrio y más cercano al valor bíblico que 'vivieron'.
- source_word: כֹּל גוֹיִם רַבִּים
  english_pob_choice: all the many nations
  chosen_spanish: todas las muchas naciones
  alternatives_spanish:
  - muchas naciones
  - todas las numerosas naciones
  lexicon: HALOT
  rationale: La acumulación כֹּל + רַבִּים expresa plenitud y multitud. 'Todas las muchas naciones' reproduce esa densidad semántica sin borrar la repetición enfática del hebreo.
theological_decisions:
- issue: Imágenes arbóreas como metáfora imperial
  english_pob_reading: Retain the arboreal metaphor straightforwardly without interpreting the nations symbolically in the translation line.
  chosen_spanish_reading: Conservar la metáfora del árbol de manera directa, sin introducir en la línea una identificación interpretativa de las naciones o del árbol.
  alternative_spanish_readings:
  - Explicitar que el árbol representa un imperio
  - Añadir una glosa interpretativa en el texto
  rationale: El versículo pertenece a una alegoría amplia. La traducción debe preservar la imagen y dejar la interpretación para el contexto, en vez de anticiparla dentro del versículo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente ajustó la línea final de ''lived'' a ''dwelt'' para un registro más formal. En español se reflejó ese mismo matiz con ''habitaron'', que conserva la solemnidad y el valor de residencia permanente. También se mantuvo la distinción entre los dos vocablos hebreos para ramas: סְעַפֹּתָיו como ''ramas'' y פֹּארֹתָיו como una segunda referencia arbórea, aquí explicada en nota.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino.
  - '''Naciones'' traduce גוֹיִם en sentido colectivo-político, no étnico restringido.'
  - '''Sombra'' mantiene la ambivalencia de protección y cobertura, compatible con el contexto metafórico.'
  - Se conserva un registro bíblico sobrio sin arcaísmos innecesarios.
