translation:
  language: es
  text: Después de estas palabras, Timoteo reunió otro campamento y acampó frente a Rafón, al otro lado del torrente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «más allá del arroyo», «al otro lado del wadi» o «a través del torrente»; el griego χειμάρρου puede referirse a un cauce estacional.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τὰ ῥήματα ταῦτα
  english_pob_choice: After these words
  chosen_spanish: Después de estas palabras
  alternatives_spanish:
  - Después de estas cosas
  - Después de este discurso
  lexicon: LSJ
  rationale: ῥήματα puede significar 'palabras' o 'cosas/asuntos'; aquí la referencia temporal mira a lo dicho inmediatamente antes. 'Después de estas palabras' conserva el matiz verbal del griego y sigue siendo natural en español.
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - musteró
  lexicon: LSJ
  rationale: El verbo expresa reunir o congregar fuerzas. 'Reunió' es claro y adecuado para un contexto militar sin forzar un tecnicismo.
- source_word: παρεμβολὴν ἄλλην
  english_pob_choice: another camp
  chosen_spanish: otro campamento
  alternatives_spanish:
  - otro ejército en campamento
  - otra fuerza
  lexicon: LSJ
  rationale: παρεμβολή denota campamento o cuartel militar; como el verbo siguiente es 'acampó', 'campamento' preserva la imagen concreta del griego.
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - estableció campamento
  - levantó su campamento
  lexicon: LSJ
  rationale: En contexto militar significa hacer campamento. 'Acampó' es natural y preciso en español contemporáneo.
- source_word: κατὰ πρόσωπον
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  lexicon: LSJ
  rationale: La frase indica posición geográfica/militar 'frente a' un lugar. En español suena más idiomático que un calco más rígido.
- source_word: Ῥαφὼν
  english_pob_choice: Raphon
  chosen_spanish: Rafón
  alternatives_spanish:
  - Raphon
  lexicon: transliteration
  rationale: Se translitera el nombre propio conforme al uso castellano, manteniendo la forma cercana al griego y adaptándola a la ortografía española.
- source_word: ἐκ πέραν τοῦ χειμάρρου
  english_pob_choice: beyond the stream
  chosen_spanish: al otro lado del torrente
  alternatives_spanish:
  - más allá del arroyo
  - del otro lado del wadi
  lexicon: LSJ
  rationale: χειμάρρος puede referirse a un cauce estacional, torrente o wadi. 'Torrente' conserva la idea de curso impetuoso/estacional mejor que 'arroyo', y 'al otro lado' expresa correctamente el lado opuesto sin añadir más de lo que dice el griego.
translation_notes:
  revision_awareness: Conforme al texto griego de Swete (1909) y al audit trail inglés POB, no se requieren revisiones sustantivas; se preserva la secuencia narrativa y la ambigüedad léxica de χειμάρρου mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se usa vocabulario militar concreto ('campamento', 'acampó') para reflejar la imaginería del griego sin expandir el sentido.
  - El nombre propio se adapta a ortografía española ('Rafón') para lectura fluida, respetando la transliteración base.
