translation:
  language: es
  text: Y los asistentes de Holofernes la llevaron a la tienda, y durmió hasta la mitad de la noche[a]; entonces se levantó en la guardia de la mañana[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta medianoche». El griego dice literalmente «hasta que la noche estaba en su mitad».
    reason: lexical_alternative
  - marker: b
    text: La «guardia de la mañana» corresponde a una división antigua de la noche, cercana al amanecer.
    reason: cultural_note
lexical_decisions:
- source_word: θεράποντες
  english_pob_choice: attendants
  chosen_spanish: asistentes
  alternatives_spanish:
  - sirvientes
  - servidores
  - criados
  lexicon: LSJ
  rationale: θεράπων designa a quienes asisten a una persona importante; en el contexto de la corte/campamento de Holofernes, «asistentes» comunica esa función sin cargar el término con la fuerza social de «esclavos» o con una connotación doméstica excesiva.
- source_word: σκηνήν
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda de campaña
  - carpa
  - pabellón
  lexicon: LSJ
  rationale: En contexto militar, σκηνή significa una tienda de campaña. «Tienda» es breve, natural en español bíblico y suficientemente claro; «carpa» es posible, pero menos tradicional en este registro.
- source_word: ὕπνωσεν
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se quedó dormida
  - estuvo durmiendo
  lexicon: LSJ
  rationale: El aoristo narra el hecho de dormir de forma directa. «Durmió» mantiene la sencillez y el flujo narrativo del griego.
- source_word: μέχρι μεσούσης τῆς νυκτός
  english_pob_choice: until the middle of the night
  chosen_spanish: hasta la mitad de la noche
  alternatives_spanish:
  - hasta medianoche
  - hasta el medio de la noche
  lexicon: LSJ
  rationale: La expresión griega dice literalmente que la noche estaba en su mitad. «Hasta la mitad de la noche» conserva esa forma y mantiene la alternativa implícita de «medianoche» sin cerrarla de manera interpretativa.
- source_word: ἀνέστη
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: LSJ
  rationale: Aquí ἀνίστημι significa levantarse para ponerse en marcha. «Se levantó» es natural en español narrativo y mantiene el sentido de la acción.
- source_word: πρὸς τὴν ἑωθινὴν φυλακήν
  english_pob_choice: at the morning watch
  chosen_spanish: para la guardia de la mañana
  alternatives_spanish:
  - al amanecer
  - en la guardia matutina
  - para el turno de la mañana
  lexicon: LSJ
  rationale: φυλακή puede referirse a una guardia/turno de vigilancia nocturna. «Guardia de la mañana» preserva el matiz temporal y militar; «para» refleja la orientación temporal de πρός mejor que una simple ubicación estática.
translation_notes:
  revision_awareness: La versión inglesa auditada ajustó la puntuación entre la cláusula de sueño y la de levantarse para reflejar mejor el flujo del griego; en español se conservó una coordinación narrativa continua con punto y coma antes de «entonces».
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología de reverencia no presente en el texto.
  - Se mantiene un registro sobrio y narrativo, apto para traducción bíblica pública.
  - No se fuerza una equivalencia con «medianoche»; se conserva la literalidad de «mitad de la noche» y se deja constancia de la alternativa en nota.
