    rationale: 'El hebreo indica ubicación espacial respecto del muchacho: ''opposite him''. ''De frente'' puede significar ''de cara'' y no expresa claramente ''enfrente de él''. La revisión inglesa enfatizó precisamente esta repetición.'
  - severity: high
