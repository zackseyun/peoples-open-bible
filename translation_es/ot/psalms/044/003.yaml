translation:
  language: es
  text: Tú, con tu mano, expulsaste naciones y los plantaste; afligiste pueblos y los enviaste fuera.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «afligiste a los pueblos y los hiciste dispersarse», tomando el pronombre final como referido a los antepasados de Israel en lugar de a los pueblos.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָדְךָ
  english_pob_choice: by your hand
  chosen_spanish: con tu mano
  alternatives_spanish:
  - por tu mano
  - con tu poder
  lexicon: HALOT
  rationale: El hebreo usa la mano en sentido instrumental para expresar la agencia y el poder de Dios. En español, «con tu mano» conserva la imagen concreta y comunica de manera natural el instrumento de la acción divina.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: HALOT
  rationale: En este contexto histórico se trata de grupos nacionales extranjeros; «naciones» es preciso y mantiene el paralelismo con el segundo hemistiquio sin cargar un matiz confesional posterior.
- source_word: הוֹרַשְׁתָּ
  english_pob_choice: drove out
  chosen_spanish: expulsaste
  alternatives_spanish:
  - desposeíste
  - echaste fuera
  lexicon: HALOT
  rationale: El hifil de ירשׁ implica hacer perder la posesión en un contexto de conquista. «Expulsaste» comunica bien la acción de sacar a esos grupos del territorio, sin perder el sentido de desalojo.
- source_word: וַתִּטָּעֵם
  english_pob_choice: and planted them
  chosen_spanish: y las plantaste
  alternatives_spanish:
  - y las estableciste
  - y las asentaste
  lexicon: HALOT
  rationale: La metáfora agrícola de «plantar» debe conservarse porque forma parte del lenguaje poético del salmo. En español puede referirse a establecer un pueblo; aquí se mantiene la imagen original.
- source_word: תָּרַע
  english_pob_choice: you afflicted
  chosen_spanish: afligiste
  alternatives_spanish:
  - dañaste
  - hiciste mal
  lexicon: HALOT
  rationale: El verbo puede expresar hacer daño o afligir. «Afligiste» conserva el tono de juicio punitivo sin añadir especificaciones que el hebreo no da.
- source_word: לְאֻמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - las tribus
  lexicon: HALOT
  rationale: Se preserva la variación poética frente a גּוֹיִם. «Los pueblos» suena natural en español y mantiene la distinción paralela.
- source_word: וַתְּשַׁלְּחֵם
  english_pob_choice: sent them out
  chosen_spanish: los enviaste fuera
  alternatives_spanish:
  - los despediste
  - los mandaste fuera
  lexicon: HALOT
  rationale: Se sigue de cerca la revisión inglesa más reciente y el valor básico de שלח como «enviar». «Los enviaste fuera» evita expandir el sentido hacia una dispersión no explicitada directamente por la forma verbal.
theological_decisions:
- issue: Referente de los sufijos en «las plantaste» y «los enviaste fuera»
  english_pob_reading: The first suffix refers to Israel's ancestors; the final suffix refers to the peoples/nations.
  chosen_spanish_reading: El primer sufijo se deja implícito por el español; el segundo se entiende de los pueblos/naciones mencionados en el versículo.
  alternative_spanish_readings:
  - Ambos sufijos se referían a los antepasados de Israel
  - Ambos sufijos se referían a las naciones expulsadas
  rationale: El hebreo es poéticamente compacto y admite debate sobre los referentes pronominales. La traducción española conserva la ambigüedad útil donde el contexto la permite, sin resolverla artificialmente. El flujo del versículo favorece leer la plantación respecto del pueblo de Dios y la salida final respecto de los pueblos.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Imágenes de conquista y plantación
  english_pob_reading: drove out nations ... planted them
  chosen_spanish_reading: expulsaste a las naciones y las plantaste
  alternative_spanish_readings:
  - desposeíste a las naciones y las estableciste
  - echaste a las naciones y las asentaste
  rationale: Se mantiene la tensión entre expulsión y establecimiento, porque el salmo usa ambas imágenes para celebrar la acción soberana de Dios en la historia de Israel. No se suaviza la metáfora agrícola ni se sustituye por una paráfrasis abstracta.
  doctrine_reference: PSA 44:3; poetic parallelism and conquest motif
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente en la última línea: se prefirió una equivalencia más directa de וַתְּשַׁלְּחֵם («los enviaste fuera») en vez de una expansión interpretativa como «los dispersaste». También se preservó el paralelismo poético entre גּוֹיִם y לְאֻמִּים, y la metáfora de «plantar».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para יהוה porque este versículo no contiene el Tetragrámaton; se traduce el habla directa a Dios con «Tú».
  - Se mantuvo «naciones» para גּוֹיִם y «pueblos» para לְאֻמִּים para no colapsar el paralelismo hebreo.
  - «Afligiste» se prefirió sobre opciones más generales para conservar el matiz punitivo del contexto.
  - La puntuación conserva la cadencia poética de dos miembros paralelos en español.
