review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: totalización («Todas las ciudades»), destinatario («a los levitas»), cómputo («cuarenta y ocho ciudades») y el resumptivo explícito de אֶתְהֶן seguido de מִגְרְשֵׁיהֶן. Sin embargo, «que den» cambia indebidamente la persona verbal de 2mp a 3pl/subjuntivo en español, y «ejidos» es entendible pero demasiado regional/administrativo para un registro bíblico panhispánico; además, la nota al pie está anclada al número en vez del término léxico discutido.'
  spanish_quality_summary: La redacción es mayormente natural, pero «que den» suena gramaticalmente desajustado sin sujeto explícito y debilita la instrucción directa. «Ellas y sus ejidos» es algo rígido pero aceptable como reflejo del hebreo; con el ajuste verbal y un término más claro para מִגְרָשׁ, el versículo queda más fiel y legible en español eclesial amplio.
  glossary_alignment: 'No hay conflicto con términos teológicos mayores del glosario. La principal decisión léxica afecta מִגְרָשׁ: conviene «pastizales» aquí, con nota que preserve «terrenos comunes» y «tierra abierta», porque sigue mejor la justificación del POB inglés («pasturelands») y evita la carga jurídico-regional de «ejidos».'
  issues:
  - severity: high
    issue: «que den» no preserva adecuadamente la persona y fuerza del hebreo תִּתְּנוּ
    rationale: El hebreo está en 2mp («ustedes darán/den»), mientras que «que den» se lee naturalmente como 3pl subjuntivo. «que ustedes den» o «que den ustedes» corrige esto sin perder naturalidad.
  - severity: medium
    issue: «ejidos» es demasiado marcado regionalmente para מִגְרְשֵׁיהֶן
    rationale: Aunque puede aproximar el sentido de terreno comunal, en gran parte del español contemporáneo remite a una figura agraria/jurídica específica. «pastizales» o una formulación equivalente comunica mejor el sentido funcional del contexto sacerdotal y sigue la decisión auditada del POB inglés.
  - severity: low
    issue: La nota léxica está anclada a «ciudades[a]» en lugar del término discutido
    rationale: La alternativa léxica corresponde a מִגְרָשֵׁיהֶן, no al número de ciudades. El marcador debe ir sobre «pastizales» o la frase equivalente para evitar ambigüedad editorial.
  revised_spanish_text: Todas las ciudades que ustedes den a los levitas serán cuarenta y ocho ciudades, ellas y sus pastizales[a].
  revised_footnotes:
  - marker: a
    text: O «terrenos comunes» o «tierra abierta» para la zona que rodea las ciudades.
    reason: lexical_alternative
  revision_rationale: Se corrige la persona verbal para reflejar con claridad el 2mp hebreo, se mantiene el resumptivo explícito «ellas» en línea con la revisión inglesa auditada, y se reemplaza «ejidos» por «pastizales» para seguir mejor el valor contextual de מִגְרָשׁ y mejorar la comprensión panhispánica. También se reubica el marcador de nota al término verdaderamente discutido.
