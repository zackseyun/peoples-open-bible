translation:
  language: es
  text: Sacrificio y ofrenda[b] no quisiste; oídos me has abierto[a]; holocausto y ofrenda por el pecado no pediste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «oídos has cavado para mí», probablemente un modismo para habilitar la escucha o la obediencia; compárese «me has abierto los oídos». La Septuaginta, seguida en Hebreos 10:5, dice: «un cuerpo me preparaste».'
    reason: alternative_reading
  - marker: b
    text: O más específicamente, «ofrenda de cereal».
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶבַח
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - sacrificio de matanza
  - ofrenda de sacrificio
  lexicon: HALOT
  rationale: En este paralelismo cultual, "sacrificio" comunica con naturalidad el término general sin perder su sentido ritual. Mantiene la correspondencia con el campo sacrificial del hebreo.
- source_word: מִנְחָה
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - ofrenda de cereal
  - ofrenda vegetal
  - presenta
  lexicon: HALOT
  rationale: La pareja con זֶבַח permite en español una forma amplia y natural, mientras la opción específica "ofrenda de cereal" queda como alternativa cultual más precisa.
- source_word: חָפַצְתָּ
  english_pob_choice: did not desire
  chosen_spanish: no quisiste
  alternatives_spanish:
  - no deseaste
  - no te complaciste en
  lexicon: HALOT
  rationale: '"Quisiste" en negativo expresa con claridad la falta de voluntad o agrado de Dios. Evita una fórmula demasiado abstracta y preserva el paralelismo con "no pediste".'
- source_word: אָזְנַיִם
  english_pob_choice: ears
  chosen_spanish: oídos
  alternatives_spanish:
  - orejas
  - escucha
  lexicon: HALOT
  rationale: En español bíblico y moderno, "oídos" resulta más digno y natural que "orejas"; conserva la imagen corporal literal del hebreo.
- source_word: כָּרִיתָ לִּי
  english_pob_choice: you have dug for me / you have opened for me
  chosen_spanish: me has abierto
  alternatives_spanish:
  - me has cavado
  - me has preparado
  - me has perforado
  lexicon: HALOT
  rationale: El hebreo dice literalmente "cavaste/abriste para mí", pero en español "me has abierto" comunica la imagen idiomática de hacer apto el oído para escuchar y obedecer. Se evita "cavado" por sonar demasiado áspero sin añadir contenido no atestiguado.
- source_word: עוֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda totalmente quemada
  lexicon: HALOT
  rationale: '"Holocausto" es el término bíblico asentado para la ofrenda totalmente consumida por el fuego. En español eclesial es claro y preciso.'
- source_word: חֲטָאָה
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - sacrificio por el pecado
  - ofrenda por culpa
  lexicon: HALOT
  rationale: El contexto sacrificial exige el sentido cultual de "sin offering". "Ofrenda por el pecado" mantiene la relación con el pecado sin confundirla con el acto moral de pecar.
- source_word: שָׁאָלְתָּ
  english_pob_choice: did not ask for
  chosen_spanish: no pediste
  alternatives_spanish:
  - no exigiste
  - no reclamaste
  - no solicitaste
  lexicon: HALOT
  rationale: '"Pediste" reproduce bien el verbo de solicitar/exigir en un paralelismo poético, y queda en línea con la sencillez del hebreo.'
theological_decisions:
- issue: Relación entre el hebreo "oídos me has abierto" y la cita de Hebreos 10:5
  english_pob_reading: The Psalm preserves the Hebrew idiom in the main text and notes the NT/Greek-based alternative in a footnote rather than harmonizing the verse.
  chosen_spanish_reading: Mantener "me has abierto" en el texto principal y señalar en nota el valor idiomático del hebreo, sin importar la formulación de Hebreos al cuerpo del salmo.
  alternative_spanish_readings:
  - me has cavado los oídos
  - me has preparado un cuerpo
  rationale: 'La prioridad es el texto hebreo del salmo. La nota conserva la tensión canónica: el hebreo habla de oídos abiertos/abiertos para oír, mientras Hebreos cita la tradición griega con otra formulación. No se resuelve la diferencia por armonización.'
  doctrine_reference: Primacía del texto fuente; transparencia canónica; preservar tensiones textuales sin fusionarlas.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo de WLC y toma en cuenta la tradición auditada del POB en inglés. Se conserva la tensión entre el hebreo literal de «oídos me has abierto» y la lectura griega/citacional de Hebreos 10:5, sin harmonizar ambas en el cuerpo principal. También se refleja la revisión inglesa que prefirió una formulación más natural para el verbo de los oídos, pero aquí se optó por una solución española idiomática equivalente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija explícitamente; en este versículo no aparece el nombre divino.
  - «holocausto» y «ofrenda por el pecado» mantienen el registro cultual sin sustituirlo por términos devocionales más generales.
  - «oídos» conserva la imagen física del hebreo; no se generaliza a «escucha» en el texto principal.
  - Las notas usan español sobrio y mantienen las alternativas relevantes sin saturar el verso.
