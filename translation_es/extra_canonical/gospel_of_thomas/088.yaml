base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/088.yaml
  text: Jesus said[what belongs to you], "The angels and the prophets will come to you, and they will give you what belongs to you. And you, in turn, give them what is in your hands, and say to yourselves[what is in your hands], 'On what day will they come and take what is theirs?'"
  footnotes:
  - marker: what belongs to you
    text: Literally 'the things which you have' (ⲛ̄ⲛⲉⲧⲉⲩⲛ̄ⲧⲏⲧⲛ̄ⲥⲉ).
    reason: lexical_alternative
  - marker: what is in your hands
    text: The Coptic form ⲛⲉⲧⲛ̄ⲧⲟⲧ⳿ⲧⲏⲛⲉ uses the regional/Lycopolitan suffix ⲧⲏⲛⲉ for the second-person plural, rather than the standard Sahidic ⲧⲏⲩⲧⲛ.
    reason: dialect_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo: «Los ángeles y los profetas vendrán a ustedes, y les darán lo que les pertenece. Y ustedes, a su vez, denles lo que está en sus manos, y díganse[a]: “¿En qué día vendrán y tomarán lo que es suyo?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «digan para ustedes mismos». El copto expresa un dicho dirigido a sí mismos o entre ustedes, no a los ángeles y profetas.
    reason: source_note
lexical_decisions:
- source_word: ⲁⲅⲅⲉⲗⲟⲥ / ⲡⲣⲟⲫⲏⲧⲏⲥ
  english_pob_choice: the angels and the prophets
  chosen_spanish: los ángeles y los profetas
  alternatives_spanish:
  - ángeles y profetas
  - los mensajeros y los profetas
  lexicon: Crum (loanwords angelo-, profeta-); uso común del corpus
  rationale: El copto está en plural y conserva dos grupos distintos. En español, «ángeles» y «profetas» reproduce con claridad el paralelismo y evita borrar el plural que el audit trail ya corrigió.
- source_word: ⲛ̄ⲛⲉⲧⲉⲩⲛ̄ⲧⲏⲧⲛ̄ⲥⲉ
  english_pob_choice: what belongs to you
  chosen_spanish: lo que les pertenece
  alternatives_spanish:
  - lo que tienen
  - lo que es suyo
  lexicon: Crum 327a
  rationale: La base semántica es posesión; en español, «les pertenece» conserva mejor la idea de pertenencia que una simple posesión material y mantiene el contraste con «lo que es suyo» al final.
- source_word: ⲛⲉⲧⲛ̄ⲧⲟⲧ⳿ⲧⲏⲛⲉ
  english_pob_choice: what is in your hands
  chosen_spanish: lo que está en sus manos
  alternatives_spanish:
  - lo que tienen en sus manos
  - lo que llevan consigo
  lexicon: Crum 425b
  rationale: Se conserva la imagen física de estar «en las manos», que el audit trail considera importante. «Sus» refleja el plural de segunda persona y funciona de manera natural en español.
- source_word: ϩⲱⲧ̂ⲧⲏⲩⲧⲛ̄
  english_pob_choice: in turn
  chosen_spanish: a su vez
  alternatives_spanish:
  - por su parte
  - en cambio
  lexicon: Crum 653a
  rationale: La expresión marca reciprocidad y alternancia. «A su vez» es idiomática en español y comunica la reciprocidad sin añadir contraste que el copto no exige.
- source_word: ⲡⲉⲧⲉⲡⲱⲟⲩ
  english_pob_choice: what is theirs
  chosen_spanish: lo que es suyo
  alternatives_spanish:
  - lo que les pertenece
  - lo que es de ellos
  lexicon: Crum 258a
  rationale: El cierre requiere un posesivo fuerte y contrastivo. «Lo que es suyo» mantiene el paralelismo con «lo que les pertenece» sin obligar a repetir una perífrasis más larga.
theological_decisions:
- issue: Intercambio recíproco de posesión
  english_pob_reading: '''what belongs to you'' and ''what is theirs'''
  chosen_spanish_reading: '''lo que les pertenece'' y ''lo que es suyo'''
  alternative_spanish_readings:
  - '''lo que tienen'' y ''lo que es de ellos'''
  - '''lo que poseen'' y ''lo que poseen ellos'''
  rationale: 'La lectura destacada por el POB subraya una restitución recíproca: lo que corresponde a cada parte. En español, «les pertenece» / «es suyo» conserva esa tensión de pertenencia mejor que una formulación meramente posesiva o genérica.'
  doctrine_reference: Tema de restitución/reciprocidad en el dicho de Tomás; no hay afirmación doctrinal explícita fuera de la dinámica del intercambio.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión crítica que corrigió dos errores mayores en el audit trail inglés: (1) el plural de «ángeles» y (2) la secuencia «denles lo que está en sus manos, y díganse». La traducción española sigue esa lectura corregida y evita el mal análisis anterior.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque no aparece en el texto fuente.
  - «Lo que les pertenece» y «lo que es suyo» conservan la oposición posesiva del dicho.
  - «Lo que está en sus manos» preserva la imagen corporal de posesión indicada por el audit trail.
  - La puntuación usa comillas españolas y vocativo narrativo estándar para publicación.
