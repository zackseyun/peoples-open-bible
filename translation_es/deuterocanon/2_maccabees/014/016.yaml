translation:
  language: es
  text: Pero cuando el comandante dio la orden[a], levantó el campamento desde allí de inmediato y se enfrentó con ellos en la aldea de Lessaou.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entabló combate con ellos en la aldea de Lessaou». El griego puede entenderse de manera más directa como movimiento o acción en relación con la aldea, y el verbo se usa literalmente con el sentido de «mezclarse» en contexto militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: προστάξαντος
  english_pob_choice: gave the order
  chosen_spanish: dio la orden
  alternatives_spanish:
  - mandó
  - dio instrucciones
  lexicon: LSJ
  rationale: El participio aoristo expresa la orden inicial que desencadena la acción. «Dio la orden» conserva el sentido militar y suena natural en español.
- source_word: τοῦ ἡγουμένου
  english_pob_choice: the commander
  chosen_spanish: el comandante
  alternatives_spanish:
  - el jefe
  - el líder
  lexicon: LSJ
  rationale: En este contexto bélico, ἡγούμενος funciona como quien dirige tropas; «comandante» reproduce ese valor sin introducir una oficina civil.
- source_word: ἀναζεύξας
  english_pob_choice: broke camp
  chosen_spanish: salió de allí
  alternatives_spanish:
  - levantó el campamento
  - rompió el campamento
  lexicon: LSJ
  rationale: El verbo tiene matiz militar de levantar el campamento o partir desde una posición previa. En español, «salió de allí de inmediato» mantiene la rapidez y el movimiento, aunque pierde algo de la imagen técnica de campamento; se opta por la naturalidad del verso.
- source_word: συνμίσγει
  english_pob_choice: engaged them at
  chosen_spanish: se enfrentó con ellos
  alternatives_spanish:
  - entabló combate con ellos
  - se trabó en combate con ellos
  lexicon: LSJ
  rationale: Literalmente el verbo es «mezclarse con», pero en narración militar significa entrar en combate. «Se enfrentó con ellos» preserva el choque bélico sin sonar forzado.
- source_word: ἐπὶ κώμην
  english_pob_choice: at the village of
  chosen_spanish: en la aldea de
  alternatives_spanish:
  - en el pueblo de
  - junto a la aldea de
  lexicon: LSJ
  rationale: La preposición con acusativo puede indicar localización o movimiento hacia la aldea. «En la aldea de» sigue la lectura adoptada por el POB inglés, manteniendo el punto del combate sin imponer más precisión de la que da el griego.
- source_word: Λεσσαού
  english_pob_choice: Lessaou
  chosen_spanish: Lessaou
  alternatives_spanish:
  - Lessau
  lexicon: transliteración del nombre propio griego
  rationale: Se conserva la transliteración del nombre propio griego, conforme al criterio del proyecto.
translation_notes:
  revision_awareness: El texto español sigue de cerca la revisión más reciente del POB inglés, que ajustó la cláusula final para reflejar mejor συνμίσγει αὐτοῖς y ἐπὶ κώμην sin perder naturalidad. Por eso se evitó una formulación excesivamente literal como «se mezcló con ellos» y se prefirió una equivalencia militar idiomática.
  spanish_consistency_notes:
  - Se mantiene «Lessaou» para la transliteración del topónimo, en línea con el audit trail inglés.
  - Se usa «comandante» para ἡγούμενος en sentido militar, coherente con la decisión inglesa.
  - La nota textual conserva la ambigüedad de ἐπὶ κώμην entre localización y movimiento hacia la aldea.
  - No se introduce terminología eclesiástica ni se suaviza el tono militar del pasaje.
