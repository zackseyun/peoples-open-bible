id: 2TH.3.1
reference: 2 Thessalonians 3:1
source:
  edition: SBLGNT
  text: Τὸ λοιπὸν προσεύχεσθε, ἀδελφοί, περὶ ἡμῶν, ἵνα ὁ λόγος τοῦ κυρίου τρέχῃ καὶ δοξάζηται καθὼς καὶ πρὸς ὑμᾶς,
translation:
  text: Finally[a], brothers, pray for us, that the word of the Lord may spread rapidly and be honored, just as it was among you[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and may address the whole congregation representatively.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'may run and be glorified.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ λοιπὸν
  chosen: Finally
  alternatives:
  - For the rest
  - From now on
  lexicon: BDAG
  rationale: Idiomatic discourse marker introducing the concluding section of the letter rather than a strict temporal statement. 'Finally' is natural modern English and fits epistolary usage.
- source_word: προσεύχεσθε
  chosen: pray
  alternatives:
  - be praying
  lexicon: BDAG
  rationale: Present middle/passive imperative, second plural, calling for ongoing prayer. English imperative 'pray' adequately conveys the exhortation without awkwardness; the durative nuance is not strong enough to require 'be praying' in the main text.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  lexicon: BDAG
  rationale: Per translation philosophy, render the grammatically masculine representative term in a gender-accurate way rather than expanding to gender-neutral language in the main text. The vocative addresses the congregation. Inclusivity can be noted in a footnote.
- source_word: περὶ ἡμῶν
  chosen: for us
  alternatives:
  - concerning us
  - about us
  lexicon: BDAG
  rationale: With προσεύχομαι, περί + genitive is naturally rendered 'pray for us' in English rather than the more wooden 'pray concerning us.'
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  lexicon: BDAG
  rationale: Introduces the content/purpose of the prayer request. 'That' is concise and natural here; English readers still perceive the intended-result sense.
- source_word: ὁ λόγος τοῦ κυρίου
  chosen: the word of the Lord
  alternatives:
  - the Lord's word
  - the message of the Lord
  lexicon: BDAG
  rationale: A transparent rendering of the genitival phrase. 'Word' preserves the biblical idiom and can denote the proclaimed gospel/message belonging to or about the Lord. 'Lord' follows the doctrinal default for κύριος.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: DOCTRINE.md specifies 'Lord' as the default rendering for κύριος. No contextual reason warrants deviation.
- source_word: τρέχῃ
  chosen: may spread rapidly
  alternatives:
  - may run
  - may continue to run
  lexicon: BDAG
  rationale: The verb literally means 'run,' but in this context it is metaphorical for swift progress of the gospel/message. 'Spread rapidly' communicates the idiom clearly in modern English while preserving the sense of unhindered advance.
- source_word: δοξάζηται
  lemma: δοξάζω
  chosen: be honored
  alternatives:
  - be glorified
  - be held in honor
  lexicon: BDAG
  rationale: Passive/subjunctive from δοξάζω. In English, 'be glorified' is possible but can sound abstract when applied to 'the word.' 'Be honored' captures the sense that the Lord's word is received with due esteem and response.
- source_word: καθὼς καὶ πρὸς ὑμᾶς
  chosen: just as it was among you
  alternatives:
  - just as also with you
  - just as among you
  lexicon: BDAG
  rationale: The comparison points to what already happened in the Thessalonians' experience. Supplying 'it was' is required for natural English and reflects the implied verbal idea. 'Among you' better conveys πρὸς ὑμᾶς idiomatically in this context than the overly literal 'with you.'
