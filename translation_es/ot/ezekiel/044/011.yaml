  text: וְ/הָי֤וּ בְ/מִקְדָּשִׁ/י֙ מְשָׁ֣רְתִ֔ים פְּקֻדּוֹת֙ אֶל שַׁעֲרֵ֣י הַ/בַּ֔יִת וּֽ/מְשָׁרְתִ֖ים אֶת הַ/בָּ֑יִת הֵ֠מָּה יִשְׁחֲט֨וּ אֶת הָ/עֹלָ֤ה וְ/אֶת הַ/זֶּ֨בַח֙ לָ/עָ֔ם וְ/הֵ֛מָּה יַעַמְד֥וּ לִ/פְנֵי/הֶ֖ם לְ/שָֽׁרְתָֽ/ם־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/044/011.yaml
  text: Yet they shall be ministers in my sanctuary[a], having oversight at the gates of the temple and ministering in the temple. They shall slaughter the burnt offering and the sacrifice for the people[c][b], and they shall stand before them to minister to them.
  footnotes:
