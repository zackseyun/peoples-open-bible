review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no preserva fielmente el versículo completo: queda truncado después de «Asiria será...», omite la cláusula final «con vara él golpeará», y no refleja de forma usable las notas del inglés POB sobre la amplitud semántica de יֵחַת ni sobre el sujeto implícito de יַכֶּה. La base léxica propuesta en los metadatos va en buena dirección, pero el texto entregado no corresponde al contenido fuente completo.'
  spanish_quality_summary: 'La redacción actual es incompleta y contiene un marcador roto («[ a ]?»). Además, «al sonido de Yahvé» es comprensible, pero «a la voz de Yahvé» o «ante la voz de Yahvé» suena más bíblico-natural y conecta mejor con la decisión auditada inglesa. «Será quebrantada» funciona, aunque con «Asiria» como entidad política también suena natural «será hecha pedazos» o «quedará destrozada»; sin embargo, «será quebrantada» mantiene dignidad y cercanía formal. La cláusula final debe expresarse con sujeto implícito natural en español: «con una vara él golpeará» o mejor «con una vara la golpeará», aclarando en nota que el sujeto se entiende como Yahvé.'
  glossary_alignment: Se alinea correctamente con «Yahvé» para יְהוָה. No hay conflicto terminológico mayor. Conviene mantener «Yahvé» en el texto principal y conservar notas para la ambigüedad de יֵחַת y el sujeto no repetido de יַכֶּה, como hace el POB inglés.
  issues:
  - severity: high
    issue: El texto español está truncado e incompleto.
    rationale: La traducción termina en «Asiria será[ a ]?» y omite la segunda mitad del versículo («con vara él golpeará»), por lo que no transmite el sentido completo del hebreo.
  - severity: high
    issue: Marcador de nota mal formado y sin nota correspondiente.
    rationale: 'Aparece «[ a ]?» en el texto, pero no hay objeto de nota al pie y el formato requerido es exacto: `[a]`.'
  - severity: medium
    issue: Falta documentar en notas las alternativas léxicas y sintácticas preservadas por el POB inglés.
    rationale: El inglés conserva nota para יֵחַת ('ser quebrantado / desmayarse') y para el sujeto implícito de יַכֶּה; deben mantenerse en español para no perder la justificación auditada.
  - severity: low
    issue: «al sonido de Yahvé» es menos natural que «a la voz de Yahvé» en registro bíblico.
    rationale: Aunque semánticamente posible, «voz» reproduce mejor קול en este contexto de juicio divino y suena más idiomático y digno en español eclesial.
  revised_spanish_text: Porque a la voz de Yahvé, Asiria será quebrantada[a][b]; con una vara la golpeará.
  revised_footnotes:
  - marker: a
    text: O «será aterrada» o «será quebrada»; el verbo hebreo puede denotar terror, derrumbe o quebrantamiento.
    reason: lexical_alternative
  - marker: b
    text: El hebreo no repite el sujeto de «golpeará»; lo más natural es entender que se refiere a Yahvé de la frase anterior.
    reason: alternative_reading
  revision_rationale: Se completa el versículo conforme al hebreo y al POB inglés, se corrige el marcador de nota, se conserva el nombre divino «Yahvé», se mejora la naturalidad de קול con «voz», y se añaden las dos notas necesarias para preservar la amplitud semántica de יֵחַת y la decisión sobre el sujeto implícito de יַכֶּה. «La golpeará» explicita en español que el objeto es Asiria, sin alterar el sentido auditado.
