translation:
  language: es
  text: 'Después de esto[a], cuando David lo oyó, dijo: «Yo y mi reino somos para siempre inocentes delante de Yahvé de la sangre de Abner hijo de Ner».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Después» o «Más tarde».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «de las sangres de Abner», un modismo que se refiere a la responsabilidad por la sangre derramada de Abner.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאַחֲרֵי כֵן
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Después de esto
  - Luego
  - Más tarde
  lexicon: HALOT
  rationale: La expresión temporal indica secuencia narrativa posterior. «Después» es natural en español y conserva la relación temporal sin añadir matiz interpretativo.
- source_word: וַיִּשְׁמַע
  english_pob_choice: when David heard of it
  chosen_spanish: cuando David lo oyó
  alternatives_spanish:
  - cuando David oyó eso
  - David lo oyó
  lexicon: HALOT
  rationale: El verbo significa «oír». En español, la cláusula temporal con «cuando» reproduce el encadenamiento narrativo; «lo» remite al hecho mencionado en el contexto sin introducir contenido nuevo.
- source_word: נָקִי
  english_pob_choice: innocent
  chosen_spanish: inocentes
  alternatives_spanish:
  - sin culpa
  - libres de culpa
  - inocente
  lexicon: HALOT
  rationale: נָקִי expresa estar limpio de culpa o responsabilidad. En este contexto jurídico-moral, «inocentes» comunica bien esa exención de culpa; se pluraliza por concordancia con «Yo y mi reino».
- source_word: אָנֹכִי וּמַמְלַכְתִּי
  english_pob_choice: I and my kingdom
  chosen_spanish: Yo y mi reino
  alternatives_spanish:
  - Yo y mi realeza
  - Yo y mi casa real
  - Yo y mi reino real
  lexicon: HALOT
  rationale: La construcción une a David personalmente con su dominio político. «Mi reino» refleja מַמְלָכָה de modo más directo que «realeza» y funciona con naturalidad en español.
- source_word: מֵעִם יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: El modismo expresa la posición de comparecer ante Dios como testigo y juez. «Delante de Yahvé» conserva el valor forense y la referencia al Nombre divino siguiendo la norma del proyecto.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La expresión indica permanencia continua. «Para siempre» es la equivalencia idiomática más natural en español y mantiene el alcance durativo.
- source_word: מִדְּמֵי
  english_pob_choice: of the blood of
  chosen_spanish: de la sangre de
  alternatives_spanish:
  - de la sangre derramada de
  - de la sangre de
  lexicon: HALOT
  rationale: El hebreo usa «sangres» como idiomático de sangre derramada/bloodguilt. En español, «de la sangre de» preserva la imaginería concreta y deja que el contexto jurídico aporte la idea de culpabilidad por derramamiento de sangre.
- source_word: אַבְנֵר בֶּן נֵר
  english_pob_choice: Abner son of Ner
  chosen_spanish: Abner hijo de Ner
  alternatives_spanish:
  - Abner, hijo de Ner
  - Abner, el hijo de Ner
  lexicon: HALOT
  rationale: La filiación se expresa naturalmente en español con «hijo de», manteniendo el patronímico hebreo sin sobrecargar el estilo.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo contiene explícitamente el Nombre divino. Conforme a la terminología del proyecto, se mantiene el nombre propio «Yahvé» en lugar de sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance jurídico de נָקִי con «yo y mi reino»
  english_pob_reading: I and my kingdom are forever innocent
  chosen_spanish_reading: Yo y mi reino somos para siempre inocentes
  alternative_spanish_readings:
  - Yo y mi reino estamos para siempre sin culpa
  - Yo y mi reino somos para siempre libres de culpa
  rationale: El hebreo afirma una exención permanente de responsabilidad por la sangre derramada de Abner. «Inocentes» conserva el tono jurídico-moral y evita suavizar la declaración a mera falta de conocimiento.
  doctrine_reference: 'DOCTRINE.md: Lexical precision and bloodguilt idioms'
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail en inglés: se mantiene la secuencia temporal, la cláusula de oír, el lenguaje jurídico de inocencia y el modismo de sangre derramada. No se detectan revisiones textuales adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - Se preserva «Yahvé» para el Nombre divino, conforme a la terminología del proyecto.
  - Se mantiene «sangre» en singular en el texto español para una lectura natural, dejando la nota para explicar el hebraísmo de «sangres».
  - «Yo y mi reino» se traduce con concordancia verbal plural («somos») para reflejar el sujeto compuesto en español.
