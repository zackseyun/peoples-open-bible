translation:
  language: es
  text: Solo[a] a ustedes he conocido[b] de entre todas las familias de la tierra; por tanto, los castigaré[c] por todas sus iniquidades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «únicamente». La partícula hebrea inicial expresa exclusividad enfática.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «he elegido» o «he reconocido». El hebreo «conocer» puede implicar relación de pacto.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «visitaré sobre ustedes todas sus iniquidades»; es decir, «les pediré cuentas por ellas».
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: Solo
  alternatives_spanish:
  - únicamente
  - solamente
  lexicon: HALOT
  rationale: La partícula inicial expresa exclusividad enfática. «Solo» es natural en español y conserva el énfasis sin volver el orden forzado.
- source_word: יָדַעְתִּי
  english_pob_choice: have I known
  chosen_spanish: he conocido
  alternatives_spanish:
  - he elegido
  - he reconocido
  - he tenido en cuenta
  lexicon: HALOT
  rationale: «Conocer» mantiene la correspondencia verbal con el hebreo ידע y deja visible la posible carga relacional/covenantal; la lectura de elección o reconocimiento queda reservada para nota, como en el audit trail inglés.
- source_word: מִכֹּל מִשְׁפְּחוֹת הָאֲדָמָה
  english_pob_choice: from among all the families of the earth
  chosen_spanish: de entre todas las familias de la tierra
  alternatives_spanish:
  - de entre todos los clanes de la tierra
  - entre todas las familias de la tierra
  lexicon: HALOT
  rationale: «Familias» reproduce bien מִשְׁפְּחוֹת en sentido colectivo. «Tierra» comunica de manera idiomática el alcance humano universal de הָאֲדָמָה en este contexto.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  lexicon: HALOT
  rationale: La locución marca consecuencia lógica. «Por tanto» preserva el registro formal y la relación causal del hebreo.
- source_word: אֶפְקֹד עֲלֵיכֶם
  english_pob_choice: I will punish you
  chosen_spanish: haré venir sobre ustedes el castigo
  alternatives_spanish:
  - los castigaré
  - les haré rendir cuentas
  - visitaré sobre ustedes el castigo
  lexicon: HALOT
  rationale: פקד en contexto judicial puede significar castigar o llamar a cuentas. La formulación elegida conserva la idea de una visita punitiva sin reducirla a una equivalencia demasiado interpretativa; además permite reflejar el matiz del «sobre ustedes» del hebreo.
- source_word: עֲוֺנֹתֵיכֶם
  english_pob_choice: your iniquities
  chosen_spanish: sus iniquidades
  alternatives_spanish:
  - sus pecados
  - su culpa
  lexicon: HALOT
  rationale: «Iniquidades» preserva el peso moral y judicial de עָוֹן mejor que un término más general como «pecados».
theological_decisions:
- issue: Sentido covenantal de יָדַע / 'know'
  english_pob_reading: Retain 'known' in the main text with covenant-election nuance implied by context.
  chosen_spanish_reading: Mantener «he conocido» en el texto principal, dejando implícita la dimensión de elección o relación de pacto.
  alternative_spanish_readings:
  - he elegido
  - he reconocido
  rationale: 'El hebreo dice literalmente «conocí/conocido». Traducirlo así preserva la tensión teológica: la elección divina está sugerida por el contexto, pero no debe reemplazar la palabra del texto en la línea principal.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Fuerza judicial de פקד
  english_pob_reading: Render as 'punish' in the main text.
  chosen_spanish_reading: 'Expresar la sanción como una acción judicial: «haré venir sobre ustedes el castigo».'
  alternative_spanish_readings:
  - los castigaré
  - les haré rendir cuentas
  - visitaré sobre ustedes
  rationale: En este pasaje, פקד se relaciona con la culpa acumulada y la respuesta judicial divina. La opción elegida comunica el resultado sin perder del todo la imagen de una «visita» sobre el pueblo.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés, pero reexpresa el juicio de פקד con una construcción más natural en español: «haré venir sobre ustedes el castigo». Se mantiene la transparencia léxica de יָדַע mediante «he conocido», sin sustituirla por una glosa doctrinal en la línea principal. No se detectaron variantes textuales relevantes en este verso.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - «familias de la tierra» conserva el alcance antropológico universal que el audit trail inglés atribuye a הָאֲדָמָה.
  - Se evitó «SEÑOR» y también «Cristo», sin pertinencia en este contexto.
  - «sus iniquidades» mantiene el plural hebreo y el tono jurídico del pasaje.
