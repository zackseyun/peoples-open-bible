    reason: lexical_alternative
  revision_rationale: Se ajusta el español para reflejar mejor el valor deliberativo de la pregunta real, la alternativa de abstenerse de la campaña, y el idiomático ‘entregar en manos de’. También se completa en español el objeto implícito de «la» para evitar una frase truncada, siguiendo el precedente del POB inglés con ‘it’. Se conserva «Yahvé» y la ironía solo en nota, conforme al proyecto.
