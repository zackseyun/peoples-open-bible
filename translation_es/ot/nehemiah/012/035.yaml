translation:
  language: es
  text: 'y de entre los hijos de los sacerdotes[a], con trompetas: Zacarías hijo de Jonatán, hijo de Semaías, hijo de Matanías, hijo de Micaías, hijo de Zaccur, hijo de Asaf.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y de los hijos de los sacerdotes, con trompetas». La expresión hebrea es partitiva y también puede traducirse de manera más formal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: and from the sons of
  chosen_spanish: y de los
  alternatives_spanish:
  - y de entre los
  - y de los hijos de
  lexicon: HALOT
  rationale: El hebreo expresa una relación partitiva con ו + מן + constructo; en español, «y de los» conserva esa procedencia/subconjunto sin añadir «algunos», que no está explícito en el texto.
- source_word: הַ/כֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - los sacerdotes
  - los sacerdotes del templo
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente directo y natural en español para כהנים en este contexto cultual y procesional.
- source_word: בַּ/חֲצֹצְר֑וֹת
  english_pob_choice: with trumpets
  chosen_spanish: con trompetas
  alternatives_spanish:
  - con las trompetas
  - al son de trompetas
  lexicon: HALOT
  rationale: El ב prefijado es instrumental; «con trompetas» reproduce bien el valor del instrumento sin volverlo rígido.
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zacarías
  - Zekarías
  lexicon: convención bíblica española
  rationale: Se usa la forma bíblica española estándar del nombre propio.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  lexicon: HALOT
  rationale: Se conserva la cadencia genealógica del hebreo con el marcador repetido «hijo de».
- source_word: יֽוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonatán
  - Jehonatán
  lexicon: convención bíblica española
  rationale: Forma bíblica española usual del nombre propio.
- source_word: שְׁמַֽעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Semaías
  lexicon: convención bíblica española
  rationale: Se adopta la transliteración bíblica española asentada, más legible para lectores de Biblia en español.
- source_word: מַתַּנְיָה
  english_pob_choice: Mattaniah
  chosen_spanish: Matanías
  alternatives_spanish:
  - Matanías
  lexicon: convención bíblica española
  rationale: Nombre propio en forma bíblica española convencional.
- source_word: מִיכָיָה
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaías
  - Miqueas
  lexicon: convención bíblica española
  rationale: Se preserva la distinción entre este nombre y «Miqueas»; la forma española bíblica estándar aquí es «Micaías».
- source_word: זַכּוּר
  english_pob_choice: Zaccur
  chosen_spanish: Zaccur
  alternatives_spanish:
  - Zakur
  - Zakkur
  lexicon: convención bíblica española / transliteración
  rationale: Se mantiene la transliteración reconocible del nombre, cercana a la forma tradicional en español bíblico cuando no hay una forma fijada universalmente.
- source_word: אָסָף
  english_pob_choice: Asaph
  chosen_spanish: Asaf
  alternatives_spanish:
  - Asaf
  lexicon: convención bíblica española
  rationale: Forma española habitual del nombre propio, manteniendo la genealogía tal como aparece en el hebreo.
theological_decisions:
- issue: Relación genealógica de Asaf
  english_pob_reading: Render the lineage straightforwardly without adding interpretive material about guild membership or authorship.
  chosen_spanish_reading: Traducir la línea genealógica de manera directa, sin insertar explicaciones sobre linaje levítico, gremio o autoría.
  alternative_spanish_readings:
  - interpretar «hijo de Asaf» como «descendiente de Asaf» en el cuerpo principal
  - añadir una nota explicativa sobre los asafitas
  rationale: El hebreo presenta una genealogía repetida con «hijo de»; la traducción debe preservar esa forma y no resolver en el texto principal la posible amplitud histórica del linaje.
  doctrine_reference: Primacía del texto fuente y conservación de la tensión histórica/genealógica sin sobreinterpretación.
translation_notes:
  revision_awareness: La revisión inglesa eliminó «some of» para reflejar con más precisión el hebreo partitivo sin añadir cantidad implícita. La redacción española sigue esa decisión y evita introducir «algunos»; además, se corrigió el anclaje de la nota para que el marcador [a] aparezca exactamente en el texto.
  spanish_consistency_notes:
  - Se usa «Zacarías» para el nombre propio y «trompetas» para el instrumento, con sintaxis natural en español.
  - Se conserva la serie genealógica con repetición de «hijo de» para reflejar la estructura hebrea.
  - No se traduce «Asaf» como glosa interpretativa; se mantiene como nombre propio.
  - La nota [a] está anclada en el texto y ofrece la alternativa formal sin desplazar la lectura principal.
