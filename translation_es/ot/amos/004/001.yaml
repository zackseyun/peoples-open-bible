translation:
  language: es
  text: 'Escuchen esta palabra, vacas de Basán[b], que están en el monte de Samaria, que oprimen a los pobres, que aplastan a los necesitados, que dicen a sus amos[a]: «Trae, para que bebamos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus esposos». El hebreo אֲדֹנֵיהֶם puede referirse a amos, señores o esposos, según el contexto.
    reason: alternative_reading
  - marker: b
    text: Basán era una región fértil al este del Jordán, famosa por su ganado bien alimentado; la imagen funciona como un insulto mordaz dirigido a la opulencia y la opresión.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchen atentamente
  lexicon: HALOT
  rationale: El imperativo plural exige una exhortación directa en español. «Escuchen» conserva el tono profético solemne de la llamada a atender el oráculo.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este mensaje
  - este asunto
  lexicon: HALOT
  rationale: «דָבָר» puede ser palabra, asunto o mensaje. Dado el registro profético, «palabra» mantiene la fuerza formal de un anuncio divino sin ampliar indebidamente el sentido.
- source_word: פָּרוֹת הַבָּשָׁן
  english_pob_choice: cows of Bashan
  chosen_spanish: vacas de Basán
  alternatives_spanish:
  - ganado de Basán
  - novillas de Basán
  lexicon: HALOT
  rationale: «פָּרוֹת» designa vacas, no ganado genérico. «Vacas de Basán» conserva el insulto vívido y la imagen de animales bien alimentados asociada a Basán.
- source_word: בְּהַר שֹׁמְרוֹן
  english_pob_choice: on the mountain of Samaria
  chosen_spanish: en el monte de Samaria
  alternatives_spanish:
  - en la colina de Samaria
  - en la región montañosa de Samaria
  lexicon: HALOT
  rationale: «הַר» es singular y puede ser monte o colina. «Monte de Samaria» es una equivalencia natural y fiel al lugar descrito.
- source_word: הָעֹשְׁקוֹת דַּלִּים
  english_pob_choice: who oppress the poor
  chosen_spanish: que oprimen a los pobres
  alternatives_spanish:
  - que explotan a los pobres
  - que defraudan a los pobres
  lexicon: HALOT
  rationale: «עָשַׁק» expresa opresión o explotación, especialmente económica y social. «Oprimen» reproduce bien el alcance del término en un contexto profético de abuso.
- source_word: הָרֹצְצוֹת אֶבְיוֹנִים
  english_pob_choice: who crush the needy
  chosen_spanish: que aplastan a los necesitados
  alternatives_spanish:
  - que aplastan a los pobres
  - que destrozan a los necesitados
  lexicon: HALOT
  rationale: «רָצַץ» comunica la idea de aplastar o romper con violencia. «Aplastan» conserva esa metáfora fuerte en español. «Necesitados» distingue bien a אֶבְיוֹנִים de דַלִּים.
- source_word: הָאֹמְרֹת לַאֲדֹנֵיהֶם
  english_pob_choice: who say to their masters
  chosen_spanish: que dicen a sus amos
  alternatives_spanish:
  - que dicen a sus señores
  - que dicen a sus esposos
  lexicon: HALOT
  rationale: «אֲדֹנֵיהֶם» puede significar amos, señores o esposos según el contexto. «Amos» conserva el valor léxico amplio y la relación de dependencia sin resolver prematuramente la ambigüedad.
- source_word: הָבִיאָה
  english_pob_choice: Bring
  chosen_spanish: Trae
  alternatives_spanish:
  - Traigan
  - Trae aquí
  lexicon: HALOT
  rationale: El imperativo hiphil de בוא funciona naturalmente como «trae». En español, el objeto subentendido queda igualmente implícito.
- source_word: וְנִשְׁתֶּה
  english_pob_choice: that we may drink
  chosen_spanish: para que bebamos
  alternatives_spanish:
  - y bebamos
  - a fin de que bebamos
  lexicon: HALOT
  rationale: La forma verbal expresa propósito o resultado tras el imperativo. «Para que bebamos» es una construcción natural y fiel al sentido de finalidad.
theological_decisions:
- issue: Referencia de la imagen «vacas de Basán»
  english_pob_reading: A prophetic metaphor addressing wealthy women of Samaria as pampered, oppressive 'cows of Bashan.'
  chosen_spanish_reading: Una metáfora profética dirigida a mujeres ricas de Samaria, retratadas como vacas mimadas y opresoras.
  alternative_spanish_readings:
  - Una metáfora más amplia de la élite acomodada de Samaria
  - Una imagen irónica sin limitarla estrictamente a mujeres
  rationale: Las formas femeninas en todo el versículo sostienen la lectura de un discurso directo a mujeres. La traducción mantiene la fuerza insultante de la metáfora sin suavizarla ni convertirla en una paráfrasis explicativa.
  doctrine_reference: Preservar la tensión interpretativa basada en la morfología y el contexto
- issue: Sentido de לַאֲדֹנֵיהֶם
  english_pob_reading: their masters
  chosen_spanish_reading: sus amos
  alternative_spanish_readings:
  - sus señores
  - sus esposos
  rationale: El sustantivo hebreo permite varios referentes relacionales. La traducción principal mantiene el sentido más amplio y léxicamente seguro; la posible lectura marital se conserva como alternativa interpretativa, sin imponerla en el texto principal.
  doctrine_reference: Preservar la ambigüedad lexicológica documentada
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: se mantiene la relación de finalidad como «para que bebamos» y se conserva la ambigüedad de לַאֲדֹנֵיהֶם con una traducción principal amplia. No se introdujeron ampliaciones interpretativas ajenas al texto hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo «vacas de Basán» como insulto concreto, evitando formas más domesticadas como «ganado».
  - «Aplastar» conserva la metáfora violenta de רָצַץ y distingue la intensidad frente a «oprimen».
  - La traducción no resuelve en el texto principal la posible lectura de «esposos», conforme al audit trail en inglés.
