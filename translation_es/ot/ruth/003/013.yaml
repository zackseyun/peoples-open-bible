translation:
  language: es
  text: Quédate aquí esta noche, y por la mañana, si él te redime[a], bien, que te redima. Pero si no quiere redimirte, entonces yo mismo te redimiré, tan cierto como vive Yahvé. Acuéstate hasta la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'redimir' aquí se refiere al papel de un pariente redentor; a menudo se llama 'pariente redentor' o 'redentor familiar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ֣ינִי
  english_pob_choice: Stay here
  chosen_spanish: Quédate aquí
  alternatives_spanish:
  - Permanece aquí
  - Lodga aquí
  lexicon: HALOT
  rationale: El verbo לון expresa pasar la noche o alojarse; en español, "quédate aquí" comunica de manera natural la permanencia hasta el día siguiente sin un calco rígido.
- source_word: הַ/לַּ֗יְלָה
  english_pob_choice: tonight
  chosen_spanish: esta noche
  alternatives_spanish:
  - la noche
  - esta misma noche
  lexicon: HALOT
  rationale: Con el imperativo previo, la expresión funciona idiomáticamente como "esta noche"; mantiene la referencia temporal inmediata y evita una formulación demasiado literal.
- source_word: וְ/הָיָ֤ה בַ/בֹּ֨קֶר֙
  english_pob_choice: and in the morning
  chosen_spanish: y por la mañana
  alternatives_spanish:
  - y en la mañana
  - y cuando amanezca
  lexicon: HALOT
  rationale: La cláusula introduce la siguiente etapa temporal; "por la mañana" es natural en español y conserva la secuencia del hebreo.
- source_word: אִם יִגְאָלֵ֥/ךְ
  english_pob_choice: if he will redeem you
  chosen_spanish: si él te redime
  alternatives_spanish:
  - si él actúa como redentor por ti
  - si él te rescata como pariente redentor
  lexicon: HALOT
  rationale: Se mantiene el verbo clave "redimir" para conservar la red semántica de גאל en Rut. El español admite el término sin necesidad de expandirlo en el texto principal.
- source_word: טוֹב֙
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - bueno
  - está bien
  lexicon: HALOT
  rationale: Aquí טוֹב es una aprobación breve. "Bien" reproduce mejor la función exclamativa/ellíptica que un adjetivo más descriptivo.
- source_word: יִגְאָ֔ל
  english_pob_choice: let him redeem you
  chosen_spanish: que te redima
  alternatives_spanish:
  - déjalo redimirte
  - que actúe como redentor para ti
  lexicon: HALOT
  rationale: Después de "bien", el hebreo expresa aceptación. En español, "que te redima" preserva esa permisividad/aprobación sin recargar la frase.
- source_word: לֹ֨א יַחְפֹּ֧ץ
  english_pob_choice: does not desire
  chosen_spanish: no quiere
  alternatives_spanish:
  - no desea
  - no está dispuesto
  lexicon: HALOT
  rationale: חפץ puede expresar querer, desear o estar dispuesto. "No quiere" comunica con claridad la negativa de voluntad en un español más directo.
- source_word: לְ/גָֽאֳלֵ֛/ךְ
  english_pob_choice: to redeem you
  chosen_spanish: redimirte
  alternatives_spanish:
  - actuar como redentor por ti
  - desempeñar la función de pariente redentor
  lexicon: HALOT
  rationale: Se conserva la misma raíz que en la línea anterior para mantener coherencia léxica y temática en el relato de Rut.
- source_word: וּ/גְאַלְתִּ֥י/ךְ אָנֹ֖כִי
  english_pob_choice: then I myself will redeem you
  chosen_spanish: entonces yo mismo te redimiré
  alternatives_spanish:
  - yo mismo actuaré como tu redentor
  - entonces te redimiré yo
  lexicon: HALOT
  rationale: אָנֹכִי aporta énfasis personal; "yo mismo" lo hace explícito en español. "Entonces" marca el contraste con la cláusula anterior.
- source_word: חַי יְהוָ֑ה
  english_pob_choice: as Yahweh lives
  chosen_spanish: vive Yahvé
  alternatives_spanish:
  - tan cierto como vive Yahvé
  - por la vida de Yahvé
  lexicon: HALOT
  rationale: Es una fórmula de juramento. Como el texto fuente lleva el nombre divino directamente, se mantiene "Yahvé" en lugar de sustituirlo por un título.
- source_word: שִׁכְבִ֖י
  english_pob_choice: Lie down
  chosen_spanish: Acuéstate
  alternatives_spanish:
  - Tiéndete
  - Vuelve a acostarte
  lexicon: HALOT
  rationale: El imperativo de שכב se traduce de forma directa y natural con "acostarte" en español contemporáneo.
- source_word: עַד הַ/בֹּֽקֶר
  english_pob_choice: until the morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta que amanezca
  - hasta por la mañana
  lexicon: HALOT
  rationale: La preposición expresa continuidad temporal. "Hasta la mañana" es breve, claro y fiel al sentido del hebreo.
theological_decisions:
- issue: גאל en el contexto legal-familiar de Rut
  english_pob_reading: redeem / redeemer language retained in the main text
  chosen_spanish_reading: Se mantiene "redimir" en el texto principal.
  alternative_spanish_readings:
  - actuar como pariente redentor
  - cumplir la función de redentor familiar
  rationale: En Rut, גאל no es solo una metáfora general de salvación, sino una obligación legal-familiar concreta. "Redimir" preserva el campo semántico central y permite añadir una nota explicativa sin diluir el término.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La pauta del proyecto pide "Yahvé" como forma principal en español. Se conserva el nombre divino en el juramento para no sustituirlo por un título.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al último pase sin cambios y se mantuvo la lectura equivalente-optimal del inglés auditado, ajustando únicamente la formulación española para fluidez natural y consistencia terminológica con "Yahvé" y "redimir".
  spanish_consistency_notes:
  - Se mantiene "redimir" en toda la sección para conservar la coherencia con גאל.
  - '"Yahvé" se usa para el nombre divino en la fórmula de juramento, conforme a la terminología del proyecto.'
  - La nota a pie de página explica la carga legal-familiar de "redimir" sin desplazar el término del texto principal.
  - '"Esta noche" / "por la mañana" / "hasta la mañana" reflejan de modo consistente la secuencia temporal del hebreo.'
