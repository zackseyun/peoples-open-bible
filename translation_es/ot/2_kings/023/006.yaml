  glossary_alignment: Buena alineación con la terminología del proyecto en 'Yahvé' y en la transliteración 'Asera' con nota explicativa. La principal desviación es no seguir la racionalidad documentada para עַל קֶבֶר בְּנֵי הָעָם, donde el POB inglés eligió 'common people' por matiz social; en español conviene 'la gente común'.
