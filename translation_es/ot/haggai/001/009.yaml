base_translation:
  language: en
  yaml_path: translation/ot/haggai/001/009.yaml
  text: You looked for much[a], but behold, it was little; and when you brought it home, I blew it away. Why? declares Yahweh of Armies. Because of my house, which lies in ruins[b], while each of you runs to his own house.
  footnotes:
  - marker: a
    text: Or, 'I blew on it.' The Hebrew verb literally means 'to blow/breathe'; here it likely implies that the produce was blown away or reduced by God's judgment.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the LORD of Hosts.'''
    reason: lexical_alternative
