translation:
  language: es
  text: Y yo también les retuve la lluvia cuando aún faltaban tres meses para la siega; e hice llover sobre una ciudad, pero sobre otra ciudad no hice llover. Un campo[a] recibió lluvia, pero el campo sobre el cual no llovió se secó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una parcela». El hebreo חֶלְקָה puede referirse a un terreno o parcela agrícola; «campo» expresa con más naturalidad el contraste del versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם אָנֹכִי
  english_pob_choice: And I also
  chosen_spanish: Y yo también
  alternatives_spanish:
  - Y también yo
  - Además, yo
  lexicon: HALOT
  rationale: La partícula aditiva וְגַם se conserva con «también», y el pronombre independiente אָנֹכִי se refleja de manera natural con «yo» para mantener el énfasis sin sonar recargado en español.
- source_word: מָנַעְתִּי מִכֶּם אֶת־הַגֶּשֶׁם
  english_pob_choice: withheld the rain from you
  chosen_spanish: les retiré la lluvia de ustedes
  alternatives_spanish:
  - les retuve la lluvia
  - les quité la lluvia
  lexicon: HALOT
  rationale: מנע con מן expresa quitar o retener algo a alguien. «Retiré» comunica la acción deliberada de privar de lluvia con un español claro y digno; se evita una calca demasiado pesada como «restringí».
- source_word: בְּעוֹד שְׁלֹשָׁה חֳדָשִׁים לַקָּצִיר
  english_pob_choice: when there were still three months until the harvest
  chosen_spanish: cuando aún faltaban tres meses para la siega
  alternatives_spanish:
  - con tres meses todavía para la siega
  - cuando todavía quedaban tres meses para la cosecha
  lexicon: HALOT
  rationale: בְּעוֹד marca tiempo restante; «aún faltaban» expresa bien la idea de tiempo por transcurrir. «Siega» conserva el ámbito agrícola y resulta más natural que una repetición mecánica de «cosecha».
- source_word: וְהִמְטַרְתִּי
  english_pob_choice: I caused it to rain
  chosen_spanish: hice llover
  alternatives_spanish:
  - causé que lloviera
  - mandé la lluvia
  lexicon: HALOT
  rationale: El hifil de מטר es causativo; «hice llover» preserva esa fuerza en español de manera directa y natural, sin perder la agencia divina.
- source_word: עַל עִיר אֶחָת ... וְעַל עִיר אַחַת לֹא אַמְטִיר
  english_pob_choice: on one city, but on another city I did not cause it to rain
  chosen_spanish: sobre una ciudad[a], pero sobre otra ciudad no hice llover
  alternatives_spanish:
  - en una ciudad ... pero en otra ciudad no hice llover
  - sobre una ciudad ... y sobre otra ciudad no hice llover
  lexicon: HALOT
  rationale: Se conserva el paralelismo entre dos ciudades vecinas y el contraste deliberado. «Sobre» funciona bien con llover y mantiene el movimiento del hebreo.
- source_word: חֶלְקָה אַחַת
  english_pob_choice: One field
  chosen_spanish: Un campo
  alternatives_spanish:
  - Una parcela
  - Un terreno
  lexicon: HALOT
  rationale: חלקה puede ser parcela o terreno, pero en este contexto agrícola «campo» es la equivalencia más clara y natural para el lector español.
- source_word: תִּמָּטֵר
  english_pob_choice: received rain
  chosen_spanish: recibió lluvia
  alternatives_spanish:
  - fue regado por la lluvia
  - le cayó lluvia
  lexicon: HALOT
  rationale: El pasivo de מטר se vuelve idiomáticamente «recibió lluvia», manteniendo el contraste con el campo seco y evitando una construcción forzada.
- source_word: וְחֶלְקָה אֲשֶׁר לֹא תַמְטִיר עָלֶיהָ
  english_pob_choice: but the field on which it did not rain
  chosen_spanish: pero el campo sobre el cual no llovió
  alternatives_spanish:
  - pero el campo sobre el que no hice llover
  - pero el campo en el que no cayó lluvia
  lexicon: HALOT
  rationale: 'El hebreo usa una relativa con sentido pasivo: no cayó lluvia sobre ese campo. La traducción conserva ese hecho sin introducir más explicación de la necesaria.'
- source_word: תִּיבָשׁ
  english_pob_choice: dried up
  chosen_spanish: se secó
  alternatives_spanish:
  - se agostó
  - se marchitó
  lexicon: HALOT
  rationale: ייבש denota secarse. «Se secó» es simple, exacto y suficientemente fuerte para el resultado del juicio por falta de lluvia.
theological_decisions:
- issue: Agencia divina directa en la lluvia y la sequía
  english_pob_reading: I withheld / I caused it to rain / I did not cause it to rain
  chosen_spanish_reading: yo retiré / hice llover / no hice llover
  alternative_spanish_readings:
  - fue retirada la lluvia / llovió
  - la lluvia cayó / no cayó
  rationale: El hebreo atribuye explícitamente a Yahvé la acción de dar o retener lluvia como juicio pactual. La versión española conserva esa agencia directa sin suavizarla en lenguaje impersonal.
  doctrine_reference: Amo 4:7; cf. Dt 28:23-24
- issue: Relación entre lluvia selectiva y juicio sobre el territorio
  english_pob_reading: one city ... another city ... one field ... the field on which it did not rain
  chosen_spanish_reading: una ciudad ... otra ciudad ... un campo ... el campo sobre el cual no llovió
  alternative_spanish_readings:
  - una ciudad ... otra ciudad ... una parcela ... la parcela que no recibió lluvia
  rationale: La alternancia entre lugares favorecidos y no favorecidos forma parte del signo profético. Se mantiene el contraste espacial para no borrar la dimensión de juicio desigual y visible.
  doctrine_reference: Am 4:7; traducción profética
translation_notes:
  revision_awareness: 'Se siguió el sentido directo del hebreo con atención a la audit trail inglesa: se preserva la agencia divina, el paralelismo entre ciudad y campo, y la fuerza causativa del hifil. La única oscilación importante es חלקה, que puede entenderse como campo o parcela; se optó por «campo» por claridad pública, dejando la alternativa en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el texto bíblico cuando corresponda; en este versículo no aparece el tetragrámaton explícito, pero se mantiene la voz divina en primera persona.
  - Se mantiene un español bíblico moderno sin arcaísmos innecesarios; «hice llover» conserva la causatividad mejor que una perífrasis más larga.
  - «Siega» se eligió por su naturalidad agrícola y por evitar alternancia innecesaria con «cosecha» en un contexto de calendario rural.
