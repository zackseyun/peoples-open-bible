review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la súplica jussiva, el nombre divino «Yahvé», «חסד» como amor leal, y «sobre nosotros». Sin embargo, «según hemos esperado en ti» no refleja bien el imperfecto hebreo יִחַלְנוּ ni la relación natural de correspondencia; suena retrospectivo y menos idiomático que el presente durativo del original. La nota inglesa preserva además el matiz de esperar/aguardar, que conviene mantener en español.
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «según hemos esperado en ti» resulta algo rígido y poco natural en español bíblico actual. «Como esperamos en ti» o «como ponemos nuestra esperanza en ti» fluye mejor; la primera preserva mejor la cercanía al POB inglés. La nota actual sobre «amor leal constante» añade una formulación no necesaria y no conserva la alternativa principal de «esperar/aguardar».
  glossary_alignment: Alinea bien con la pauta del proyecto en «Yahvé». «Amor leal» es defendible para חסד, aunque «amor fiel» también sería posible; no requiere cambio. El principal desajuste es verbal/aspectual en יִחַלְנוּ, donde conviene un presente («esperamos») con nota léxica sobre «esperamos/aguardamos» para reflejar esperanza expectante.
  issues:
  - severity: medium
    issue: «hemos esperado» para יִחַלְנוּ
    rationale: El imperfecto hebreo aquí expresa la postura actual de esperanza/espera del pueblo, no principalmente una acción pasada completada. El perfecto compuesto en español desplaza el sentido hacia lo retrospectivo.
  - severity: medium
    issue: «según» suena menos natural en esta línea poética
    rationale: Aunque puede expresar correspondencia, en español litúrgico/poético «como esperamos en ti» comunica esa relación de modo más natural y cercano al inglés auditado.
  - severity: medium
    issue: La nota al pie no preserva la alternativa principal de esperar/aguardar
    rationale: El rastro inglés marca explícitamente que el verbo hebreo puede significar tanto «esperar» como «aguardar con expectativa». La nota española debería reflejar esa alternativa léxica.
  revised_spanish_text: Que tu amor leal esté sobre nosotros, Yahvé, como esperamos en ti[a].
  revised_footnotes:
  - marker: a
    text: O «como te aguardamos con esperanza» / «como esperamos expectantes en ti». El verbo hebreo puede expresar tanto esperar como aguardar con expectativa.
    reason: lexical_alternative
  revision_rationale: Se cambia «según hemos esperado en ti» por «como esperamos en ti» para reflejar mejor el valor del imperfecto hebreo, mejorar la naturalidad del español y mantener la correspondencia del original. Se traslada la nota al verbo final para preservar la alternativa léxica documentada en el POB inglés. Se mantiene «amor leal» y «Yahvé», que son fieles al proyecto y al sentido del texto.
