translation:
  language: es
  text: Y así harás con su asno, y así harás con su manto, y así harás con cualquier cosa perdida de tu hermano que se le pierda y tú la encuentres; no podrás desentenderte de ella[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «no podrás ocultarte» o «no podrás hacerte el desentendido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֵן
  english_pob_choice: And so
  chosen_spanish: Y así
  alternatives_spanish:
  - Asimismo
  - Del mismo modo
  lexicon: HALOT
  rationale: Conserva el valor de continuación e instrucción repetida del hebreo legal. 'Y así' suena natural en español y mantiene el encadenamiento con el mandato previo.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall do
  chosen_spanish: harás
  alternatives_spanish:
  - deberás hacer
  - has de hacer
  lexicon: HALOT
  rationale: En contexto legal, el imperfecto expresa obligación/directiva. 'Harás' conserva ese valor sin sonar excesivamente arcaico; el mandato se entiende como norma.
- source_word: לַחֲמֹרוֹ
  english_pob_choice: with his donkey
  chosen_spanish: con su asno
  alternatives_spanish:
  - con su burro
  - para su asno
  lexicon: HALOT
  rationale: '''Asno'' reproduce bien el animal del texto hebreo y es suficientemente claro en español bíblico actual. ''Con'' sigue el valor práctico de la acción referida al animal perdido.'
- source_word: לְשִׂמְלָתוֹ
  english_pob_choice: with his cloak
  chosen_spanish: con su manto
  alternatives_spanish:
  - con su capa
  - con su prenda
  lexicon: HALOT
  rationale: שִׂמְלָה puede referir a una prenda exterior; 'manto' es una opción natural y digna en español, amplia sin perder concreción. 'Cloak' en inglés aquí apunta a esa prenda exterior.
- source_word: לְכָל אֲבֵדַת
  english_pob_choice: with any lost thing
  chosen_spanish: con cualquier cosa perdida
  alternatives_spanish:
  - con todo objeto perdido
  - con cualquier pertenencia extraviada
  lexicon: HALOT
  rationale: '''Cualquier cosa perdida'' comunica la amplitud del hebreo sin introducir ''propiedad'' de manera más interpretativa. Mantiene la generalización legal del texto.'
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu prójimo
  - tu compatriota
  lexicon: HALOT
  rationale: Se conserva el parentesco literal del hebreo, que en Deuteronomio también tiene fuerza comunitaria de pacto. 'Hermano' preserva esa formulación sin generalizarla en exceso.
- source_word: אֲשֶׁר תֹּאבַד מִמֶּנּוּ
  english_pob_choice: that is lost from him
  chosen_spanish: que se le haya perdido
  alternatives_spanish:
  - que ha desaparecido de él
  - que se perdió de él
  lexicon: HALOT
  rationale: El hebreo expresa una pérdida que le sucede al dueño, no una acción necesariamente explicitada. 'Se le haya perdido' conserva el matiz pasivo/intransitivo y suena natural en español.
- source_word: וּמְצָאתָהּ
  english_pob_choice: and you find it
  chosen_spanish: y tú la hayas encontrado
  alternatives_spanish:
  - y la encuentres
  - y la halles
  lexicon: HALOT
  rationale: La referencia es a la cosa perdida, femenina en español. 'Hayas encontrado' encaja con la secuencia subordinada del segmento y mantiene la relación temporal del hebreo.
- source_word: לֹא תוּכַל
  english_pob_choice: you may not
  chosen_spanish: no podrás
  alternatives_spanish:
  - no debes
  - no te será lícito
  lexicon: HALOT
  rationale: Aunque literalmente alude a incapacidad, en el contexto legal funciona como prohibición. 'No podrás' conserva la forma del hebreo y deja clara la imposibilidad normativa.
- source_word: לְהִתְעַלֵּם
  english_pob_choice: ignore it
  chosen_spanish: desentenderte de ella
  alternatives_spanish:
  - hacerte el desentendido
  - pasar por alto esto
  lexicon: HALOT
  rationale: El hitpael sugiere apartarse o ocultarse respecto del asunto; en español legal-natural, 'desentenderte de ella' expresa la negativa a evadir responsabilidad sin perder la fuerza idiomática. 'Ella' concuerda con la cosa perdida.
theological_decisions:
- issue: Alcance comunitario de אָחִיךָ en la ley
  english_pob_reading: your brother
  chosen_spanish_reading: tu hermano
  alternative_spanish_readings:
  - tu prójimo
  - tu compatriota
  rationale: Se mantiene la imagen relacional concreta del texto base. Aunque la norma alcanza a la comunidad del pacto, el hebreo usa 'hermano', y la traducción preserva ese marco social-teológico en vez de ampliarlo en la línea principal.
  doctrine_reference: Translation philosophy §1, §4
- issue: Sentido de לֹא תוּכַל לְהִתְעַלֵּם
  english_pob_reading: you may not ignore it
  chosen_spanish_reading: no podrás desentenderte de ella
  alternative_spanish_readings:
  - no podrás ignorarla
  - no podrás hacerte el desentendido
  rationale: La expresión hebrea literalmente apunta a no poder ocultarse o apartarse del caso. En español, 'desentenderte de ella' comunica la prohibición de evadir la responsabilidad, manteniendo el peso ético-legal del mandato. Se evita suavizarlo a simple 'ignorar' para no perder la tensión documental del hebreo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con la traducción inglesa POB y sin cambios de última revisión; la versión española sigue de cerca la estructura legal del hebreo, preservando las repeticiones, el paralelismo y la fuerza prohibitiva del cierre.
  spanish_consistency_notes:
  - Se usa 'Y así' para mantener la cadencia legal y la conexión con el versículo anterior.
  - Se mantiene 'tu hermano' por fidelidad al término de parentesco del hebreo y al uso comunitario deuteronómico.
  - Se traduce la cosa perdida con femenino singular ('ella') para concordar con 'cosa' y con 'manto' como antecedente posible solo en español por referencia inmediata; la nota a pie preserva la alternativa más literal del idiomatismo hebreo.
  - Se evita 'SEÑOR' o terminología sustitutiva porque no aparece el nombre divino en este versículo.
  - Se conserva un registro bíblico moderno, sin arcaísmos innecesarios, pero con el tono jurídico del texto.
