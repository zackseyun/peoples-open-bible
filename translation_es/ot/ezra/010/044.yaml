translation:
  language: es
  text: Todos estos se habían casado con mujeres extranjeras, y algunos de ellos tenían esposas[a] que habían tenido hijos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y había entre ellos mujeres». El hebreo de esta parte final del versículo es terso y algo difícil.
    reason: lexical_alternative
  - marker: b
    text: Hebreo, literalmente, «hijos». Aquí puede referirse de manera más general a la descendencia en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: נשא/י
  english_pob_choice: had married
  chosen_spanish: habían tomado
  alternatives_spanish:
  - habían desposado
  - se habían casado con
  lexicon: HALOT
  rationale: El hebreo usa el verbo נשא en este giro idiomático con objeto femenino, indicando contraer matrimonio. En español, «habían tomado» conserva la forma más cercana al verbo de base y evita introducir una reformulación demasiado interpretativa; «se habían casado con» sería más natural, pero menos pegada a la forma del texto fuente.
- source_word: נָשִׁים נָכְרִיּוֹת
  english_pob_choice: foreign women
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - mujeres forasteras
  - esposas extranjeras
  lexicon: HALOT
  rationale: נָכְרִיּוֹת señala mujeres de fuera del pueblo/comunidad del pacto. «Mujeres extranjeras» reproduce bien el contraste étnico-covenantal y mantiene la resonancia del original sin acudir a «mujeres extrañas», que en español suena arcaico y puede inducir una connotación distinta.
- source_word: וְיֵשׁ מֵהֶם
  english_pob_choice: and some of them
  chosen_spanish: y algunos de ellos
  alternatives_spanish:
  - y había entre ellos
  - y entre ellos había algunos
  lexicon: HALOT
  rationale: La construcción existencial con יֵשׁ + מֵהֶם se expresa de forma natural en español como «algunos de ellos». Conserva el matiz distributivo sin recargar la frase con una perífrasis más literal.
- source_word: נָשִׁים
  english_pob_choice: wives
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  - mujeres como esposas
  lexicon: HALOT
  rationale: Aunque en este segundo uso el contexto relacional podría sugerir «esposas», el hebreo repite el mismo sustantivo general. He preferido mantener «mujeres» para no suavizar la repetición y porque el texto hebreo deja la frase algo tersa y elíptica.
- source_word: וַיָּשִׂימוּ בָּנִים
  english_pob_choice: had children
  chosen_spanish: habían tenido hijos
  alternatives_spanish:
  - habían tenido descendencia
  - habían tenido hijos varones
  - habían engendrado hijos
  lexicon: HALOT
  rationale: La expresión final es breve y difícil. «Habían tenido hijos» comunica el sentido de descendencia sin forzar un giro artificial. Mantiene la tensión textual sobre בָּנִים, que puede ser específico o genérico según el contexto.
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - descendencia
  - varones
  lexicon: HALOT
  rationale: El plural formal «hijos» es lo más cercano al hebreo y, en español bíblico, puede abarcar la idea de descendencia. No se opta por «varones» porque el contexto no exige restringir el sentido a sexo masculino.
theological_decisions:
- issue: Término para el tipo de unión con mujeres no israelitas
  english_pob_reading: had married foreign women
  chosen_spanish_reading: habían tomado mujeres extranjeras
  alternative_spanish_readings:
  - se habían casado con mujeres extranjeras
  - habían desposado mujeres extranjeras
  rationale: No hay una elaboración doctrinal explícita en el versículo; el punto narrativo es la mezcla matrimonial con mujeres de fuera del pueblo. «Habían tomado» conserva la sobriedad del hebreo y deja intacta la carga comunitaria/covenantal del pasaje sin añadir explicaciones.
  doctrine_reference: Esdras-Nehemías; santidad del pueblo y separación matrimonial en el marco del pacto
- issue: Valor de בָּנִים en la cláusula final
  english_pob_reading: who had borne children
  chosen_spanish_reading: que habían tenido hijos
  alternative_spanish_readings:
  - que habían dado a luz hijos
  - que habían engendrado hijos
  rationale: La intención del inglés POB fue reflejar que la cláusula habla de progenie, no de una acción literal extraña. En español, «habían tenido hijos» preserva esa lectura amplia y evita una literalidad rígida que oscurezca el sentido del hebreo.
  doctrine_reference: Lexicografía y sintaxis hebrea; no implica una decisión doctrinal
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para hacer más explícita la relación entre las mujeres y los hijos: de una formulación general a «had wives who had borne children». La propuesta española sigue esa revisión en sentido, pero conserva la tersura y la ambigüedad controlada del hebreo, especialmente en la segunda mitad del versículo.'
  spanish_consistency_notes:
  - He mantenido «mujeres extranjeras» para נָכְרִיּוֹת, coherente con el valor comunitario/covenantal del término.
  - He preferido un español sobrio y bíblico, evitando «esposas» en el cuerpo principal para no sobreinterpretar el segundo נָשִׁים.
  - «Hijos» se usa en sentido amplio de descendencia, pero se deja constancia de la alternativa más literal en nota.
  - La puntuación reproduce la cesura del hebreo con una coma antes de la segunda cláusula.
