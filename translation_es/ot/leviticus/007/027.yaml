review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro inglés: נֶפֶשׁ como «persona», el caso general con «que coma», כָּל דָּם con sentido distributivo, y la ambigüedad de וְנִכְרְתָה. Sin embargo, «será cortada» suena poco idiomático en español para la fórmula legal y puede sugerir un corte físico más que la sanción pactual establecida. También «sangre alguna» es comprensible pero algo forzado; «cualquier sangre» comunica mejor el valor distributivo en español actual.'
  spanish_quality_summary: La redacción es clara, pero requiere un ajuste de naturalidad y fidelidad idiomática. «Será excluida» resolvería demasiado la ambigüedad, así que conviene mantener la fórmula tradicional «será eliminada de su pueblo» o mejor «será cortada de su pueblo»; no obstante, esta última sigue siendo dura en español. La solución más fiel y reconocible es «será eliminada de entre su pueblo» solo si se explicara la ambigüedad, pero el inglés auditado pidió preservar precisamente «cut off». En español bíblico legible, «será extirpada de entre su pueblo» aún interpretaría demasiado. Por tanto, la mejor reparación menor es mantener la raíz metafórica pero con la locución estable «será eliminada de entre su pueblo» no es ideal. Dado el mandato de preservar la fórmula y la ambigüedad, propongo «será cortada de entre su pueblo», que mejora el encaje sintáctico sin resolver el sentido. También conviene cambiar «sangre alguna» por «cualquier sangre».
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé, Mesías, etc. La decisión sobre נֶפֶשׁ como «persona» está bien alineada. La teología de כרת debe seguir ambigua y la nota b lo preserva adecuadamente.
  issues:
  - severity: medium
    issue: «Sangre alguna» suena poco natural en español contemporáneo.
    rationale: Aunque reproduce de forma bastante literal el distributivo, «cualquier sangre» expresa mejor «any blood» en español neutral y mantiene el sentido legal general.
  - severity: medium
    issue: «Será cortada» es una formulación rígida y algo extraña en español.
    rationale: La fórmula busca conservar «cut off», pero en español la construcción necesita mejor apoyo sintáctico. «Será cortada de entre su pueblo» suena más estable que «será cortada de entre su pueblo» con el texto actual ya cercano; el problema principal no es teológico sino idiomático.
  revised_spanish_text: Toda persona[a] que coma cualquier sangre, esa persona será cortada[b] de entre su pueblo.
  revised_footnotes:
  - marker: a
    text: O «alma». En hebreo, nephesh aquí designa al individuo concreto.
    reason: lexical_alternative
  - marker: b
    text: La expresión «será cortada» es una fórmula pactual/judicial estable; puede implicar exclusión de la comunidad o juicio divino, pero el hebreo no especifica el modo exacto.
    reason: alternative_reading
  revision_rationale: Se ajusta «sangre alguna» a «cualquier sangre» para un español más natural y se reubican las notas para anclar mejor las decisiones léxica y teológica sin cambiar el sentido. Se conserva «será cortada» para mantener la fórmula sancionadora tradicional y su ambigüedad deliberada.
