translation:
  language: es
  text: También sucedió que siete hermanos, junto con su madre, después de haber sido arrestados, eran obligados por el rey a comer[a] de la carne prohibida de cerdo, mientras eran torturados con látigos y cuerdas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «participar de». El verbo puede significar literalmente «tocar», pero aquí, en contexto, se refiere a tomar la carne como alimento.
    reason: lexical_alternative
  - marker: b
    text: «Cuerdas» también puede traducirse «correas» o, más literalmente, «tendones», refiriéndose a instrumentos usados para torturar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνέβη δὲ καὶ
  english_pob_choice: It also happened that
  chosen_spanish: También sucedió que
  alternatives_spanish:
  - Y también sucedió que
  - También aconteció que
  lexicon: LSJ
  rationale: Conserva la transición narrativa y el valor aditivo de καὶ sin sonar rígido; «sucedió» mantiene un registro digno y natural en español bíblico moderno.
- source_word: ἑπτὰ ἀδελφοὺς
  english_pob_choice: seven brothers
  chosen_spanish: siete hermanos
  alternatives_spanish:
  - siete hermanos varones
  - siete hermanos de sangre
  lexicon: LSJ
  rationale: ἀδελφοί aquí designa varones hermanos dentro del relato; «hermanos» es claro y fiel en español.
- source_word: μετὰ τῆς μητρὸς
  english_pob_choice: along with their mother
  chosen_spanish: junto con su madre
  alternatives_spanish:
  - con su madre
  - acompañados de su madre
  lexicon: LSJ
  rationale: Expresa la asociación narrativa de la madre con los hermanos de manera natural en español.
- source_word: συλλημφθέντας
  english_pob_choice: having been arrested
  chosen_spanish: habiendo sido arrestados
  alternatives_spanish:
  - habiendo sido apresados
  - habiendo sido capturados
  lexicon: LSJ
  rationale: En el contexto coercitivo del rey, «arrestados» comunica bien la aprehensión oficial; se mantiene el participio temporal causal del griego.
- source_word: ἀναγκάζεσθαι
  english_pob_choice: were being forced
  chosen_spanish: eran obligados
  alternatives_spanish:
  - estaban siendo obligados
  - eran compelidos
  lexicon: LSJ
  rationale: La pasiva de coerción se vuelve natural en español con «eran obligados», preservando la fuerza del texto.
- source_word: ὑπὸ τοῦ βασιλέως
  english_pob_choice: by the king
  chosen_spanish: por el rey
  alternatives_spanish:
  - por el rey mismo
  - bajo el rey
  lexicon: LSJ
  rationale: Es un agente directo de la pasiva; «por el rey» es la forma más clara y literal en español.
- source_word: ἀπὸ τῶν ἀθεμίτων υἱείων κρεῶν
  english_pob_choice: the unlawful flesh of swine
  chosen_spanish: la carne ilícita de los cerdos
  alternatives_spanish:
  - la carne prohibida de los cerdos
  - la carne no permitida de los cerdos
  lexicon: LSJ
  rationale: ἀθέμιτος significa lo ilícito o no permitido; «ilícita» preserva la fuerza legal-religiosa sin introducir el término interpretativo «inmunda».
- source_word: ἐφάπτεσθαι
  english_pob_choice: to partake of
  chosen_spanish: a participar de
  alternatives_spanish:
  - a tomar parte de
  - a comer de
  - a tocar
  lexicon: LSJ
  rationale: Sigo la lectura auditada del POB de que aquí no es mero «tocar», sino el acto de consumir/participar de la carne; «participar de» mantiene la ambigüedad contextual sin reducirla a «comer».
- source_word: μάστιξιν καὶ νευραῖς
  english_pob_choice: with whips and cords
  chosen_spanish: con látigos y cuerdas
  alternatives_spanish:
  - con azotes y correas
  - con látigos y sogas
  lexicon: LSJ
  rationale: μάστιξιν se traduce naturalmente como «látigos»; νευραῖς puede ser «cuerdas», «correas» o, más literalmente, «tendones», y «cuerdas» es claro en español.
- source_word: αἰκιζομένους
  english_pob_choice: while being tortured
  chosen_spanish: mientras eran torturados
  alternatives_spanish:
  - mientras sufrían tormento
  - mientras eran maltratados
  lexicon: LSJ
  rationale: El verbo denota trato violento y tortura; «torturados» recoge correctamente la severidad del contexto.
theological_decisions:
- issue: Render the food-law violation without importing later terminology
  english_pob_reading: the unlawful flesh of swine
  chosen_spanish_reading: la carne ilícita de los cerdos
  alternative_spanish_readings:
  - la carne prohibida de los cerdos
  - la carne inmunda de los cerdos
  rationale: El griego dice ἀθέμιτα, es decir, lo no permitido o ilícito. «Ilícita» conserva la dimensión legal-religiosa sin imponer «inmunda», que sería una interpretación más específica que el texto no usa aquí.
  doctrine_reference: 'Translation philosophy: original-language primacy; avoid over-interpretive ecclesial terminology when the source is more precise.'
- issue: Expressing ἐφάπτεσθαι in a food context
  english_pob_reading: to partake of
  chosen_spanish_reading: participar de
  alternative_spanish_readings:
  - comer de
  - tomar de
  - probar
  rationale: La auditoría inglesa decidió no quedarse en «touch» sino en un sentido contextual de consumo. En español, «participar de» mantiene esa lectura sin exagerar el matiz ni volverlo exclusivamente culinario.
  doctrine_reference: Lexical context over dictionary gloss; preserve the documented tension between literal 'touch' and contextual 'partake of'.
translation_notes:
  revision_awareness: La auditoría inglesa revisó ἐφάπτεσθαι desde «taste» a «partake of» para evitar la idea de una mera prueba superficial. La versión española sigue esa decisión y evita «probar» o «tocar» como lectura principal, manteniendo el sentido contextual de consumo forzado. También se conserva la fuerza legal de ἀθέμιτων con «ilícita», sin desplazarla a una terminología ritual más interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «hermanos» para ἀδελφοὺς, acorde con el contexto masculino explícito.
  - Se evita «Cristo/Mesías» porque no aparecen en el texto.
  - Se evita «siervo»/«esclavo» porque no hay δοῦλος en este versículo.
  - La frase «carne ilícita de los cerdos» conserva tanto el matiz legal como la referencia concreta al alimento prohibido.
