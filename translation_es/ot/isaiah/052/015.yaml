translation:
  language: es
  text: Así rociará a muchas naciones; los reyes cerrarán sus bocas a causa de él[a]. Porque verán lo que no se les había anunciado, y comprenderán lo que no habían oído.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estremecerá a muchas naciones». El verbo hebreo se entiende comúnmente como «rociar», pero algunos lo toman aquí en el sentido de causar asombro.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: HALOT
  rationale: En este contexto marca la correspondencia con lo dicho antes; «Así» conserva la relación consecutiva/de correspondencia sin sonar forzado en español.
- source_word: יַזֶּה
  english_pob_choice: he will sprinkle
  chosen_spanish: rociará
  alternatives_spanish:
  - aspersará
  - salpicará
  lexicon: HALOT
  rationale: El verbo hebreo en hifil suele entenderse como «rociar/asperjar» en un marco ritual de purificación. «Rociará» comunica esa acción concreta y es natural en español, manteniendo la lectura principal del POB inglés.
- source_word: גּוֹיִם רַבִּים
  english_pob_choice: many nations
  chosen_spanish: a muchas naciones
  alternatives_spanish:
  - a muchos pueblos
  - a muchas naciones y pueblos
  lexicon: HALOT
  rationale: «Naciones» conserva el alcance internacional del hebreo גּוֹיִם; no se restringe a «gentiles», que en español introduce una oposición más específica de la que el término base no exige.
- source_word: עָלָיו
  english_pob_choice: because of him
  chosen_spanish: a causa de él
  alternatives_spanish:
  - por él
  - debido a él
  lexicon: HALOT
  rationale: La preposición se entiende idiomáticamente como motivo de su silencio. «A causa de él» expresa bien la reacción producida por su persona sin perder la relación causal.
- source_word: יִקְפְּצוּ מְלָכִים פִּיהֶם
  english_pob_choice: kings will shut their mouths
  chosen_spanish: los reyes cerrarán su boca
  alternatives_spanish:
  - los reyes callarán
  - los reyes se quedarán mudos
  lexicon: HALOT
  rationale: La imagen hebrea es concreta y expresa silencio atónito. «Cerrar su boca» preserva el giro idiomático sin convertirlo en una paráfrasis abstracta.
- source_word: כִּי אֲשֶׁר לֹא סֻפַּר לָהֶם רָאוּ
  english_pob_choice: For they will see what had not been told to them
  chosen_spanish: Porque verán lo que no se les había anunciado
  alternatives_spanish:
  - Porque verán lo que no se les había contado
  - Pues verán lo que no se les había relatado
  lexicon: HALOT
  rationale: «Anunciado» traduce con claridad el pasivo de ספר en un contexto de comunicación previa. La forma pluscuamperfecta española refleja la anterioridad respecto de «verán».
- source_word: וַאֲשֶׁר לֹא שָׁמְעוּ הִתְבּוֹנָנוּ
  english_pob_choice: and they will understand what they had not heard
  chosen_spanish: y comprenderán lo que no habían oído
  alternatives_spanish:
  - y considerarán lo que no habían oído
  - y entenderán lo que no habían escuchado
  lexicon: HALOT
  rationale: הִתְבּוֹנָנוּ implica discernimiento/comprensión, no mera percepción auditiva. «Comprenderán» comunica la fuerza cognitiva del verbo con naturalidad en español.
theological_decisions:
- issue: Sentido de יַזֶּה en el marco del Siervo
  english_pob_reading: he will sprinkle many nations
  chosen_spanish_reading: rociará a muchas naciones
  alternative_spanish_readings:
  - estremecerá a muchas naciones
  - sorprenderá a muchas naciones
  rationale: Se mantiene la lectura lexical principal de «rociar», coherente con la asociación ritual/purificadora del verbo. No se adopta una traducción interpretativa como la reacción resultante, aunque esa posibilidad queda reconocida en la nota.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'El texto sigue el audit trail inglés con acuerdo alto: se conserva la lectura principal de «sprinkle/rociar» y se mantiene en nota la alternativa interpretativa «startle/estremecer», sin cambios de revisión pendientes.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente sea יהוה; aquí no aparece.
  - Se mantiene la distinción entre la imagen concreta de «rociar» y el efecto de asombro/silencio en la segunda cola.
  - «Naciones» preserva el alcance universal de גּוֹיִם sin introducir una oposición técnica que el hebreo no exige.
