translation:
  language: es
  text: 'Y después de haberlo cubierto[a], seguían preguntándole, diciendo: «¡Profetiza! ¿Quién es el que te golpeó?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de vendarle los ojos».
    reason: lexical_alternative
lexical_decisions:
- source_word: περικαλύψαντες
  english_pob_choice: after covering him
  chosen_spanish: después de cubrirlo
  alternatives_spanish:
  - después de vendarle los ojos
  - después de ponerle una venda en los ojos
  - habiéndolo cubierto
  lexicon: BDAG
  rationale: El participio expresa la acción de cubrir o velar. «Cubrirlo» conserva la amplitud del griego sin especificar más de lo que el texto dice. En el contexto, sugiere la obstrucción de la vista, pero no la nombra explícitamente en el texto principal.
- source_word: ἐπηρώτων
  english_pob_choice: they kept asking
  chosen_spanish: seguían preguntándole
  alternatives_spanish:
  - le seguían preguntando
  - estaban preguntándole
  - preguntaban repetidamente
  lexicon: BDAG
  rationale: El imperfecto marca acción շարունակada o repetida. «Seguían preguntándole» reproduce bien ese valor iterativo en español y mantiene el tono de hostigamiento del pasaje.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio introduce el contenido de la burla; «diciendo» es la forma natural y fiel en español. Se evita forzar una coordinación más pesada de la necesaria.
- source_word: Προφήτευσον
  english_pob_choice: Prophesy!
  chosen_spanish: ¡Profetiza!
  alternatives_spanish:
  - ¡Profetiza para nosotros!
  - ¡Dinos como profeta!
  lexicon: BDAG
  rationale: El imperativo aoristo funciona aquí como mandato burlón. «¡Profetiza!» conserva la ironía y la concisión del griego, sin añadir destinatarios ni explicaciones que el texto no expresa.
- source_word: τίς ἐστιν ὁ παίσας σε
  english_pob_choice: Who is the one who struck you?
  chosen_spanish: ¿Quién es el que te golpeó?
  alternatives_spanish:
  - ¿Quién es el que te pegó?
  - ¿Quién fue el que te golpeó?
  lexicon: BDAG
  rationale: 'El participio articular λειτουργa sustantivamente: «el que te golpeó». «Golpeó» refleja el sentido de παίω de manera directa y natural en español. «Pegó» es posible, pero algo más coloquial; «golpeó» mantiene mejor el tono de la escena.'
theological_decisions:
- issue: Si explicitar que Jesús fue vendado o blindfolded
  english_pob_reading: Retain the broader wording 'covering him' in the main text
  chosen_spanish_reading: Mantener «cubrirlo» en el texto principal, sin explicitar una venda en los ojos
  alternative_spanish_readings:
  - «después de vendarle los ojos»
  - «después de ponerle una venda en los ojos»
  rationale: El griego dice que lo cubrieron; el contexto permite inferir que le impidieron ver, pero el verbo no obliga a concretar el medio. La redacción principal conserva esa amplitud y evita importar una especificación que el texto fuente no formula.
  doctrine_reference: Principio de primacía del idioma original; no parafrasear más allá de lo que el texto fuente autoriza.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar nada; esta versión mantiene el acuerdo alto con la evaluación previa y conserva la amplitud semántica de περικαλύψαντες sin añadir una especificación no explícita.
  spanish_consistency_notes:
  - Se conserva el tono burlón y breve del imperativo con «¡Profetiza!».
  - Se mantiene la fuerza iterativa del imperfecto con «seguían preguntándole».
  - «Cubrirlo» se deja en el texto principal para respetar la amplitud del verbo griego y la nota ofrece la alternativa interpretativa habitual.
  - El registro es neutro y culto, apto para lectura eclesial amplia en español latinoamericano.
