translation:
  language: es
  text: Guiña con los ojos, hace señas con los pies[a], y señala con los dedos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arrastra o raspa el pie»; o más generalmente «hace señas con los pies». El verbo hebreo מֹלֵל es raro, y el gesto exacto es incierto, aunque el contexto claramente sugiere una señal corporal encubierta.
    reason: lexical_alternative
  - marker: b
    text: O «dirige» o «enseña con los dedos». Aquí se elige «señala» porque el versículo enumera gestos físicos, no instrucción verbal.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹרֵץ
  english_pob_choice: winking
  chosen_spanish: guiña
  alternatives_spanish:
  - parpadea
  - cierra un ojo
  - guiña el ojo
  lexicon: HALOT
  rationale: El participio describe un gesto furtivo con los ojos; en español, «guiña» transmite de forma natural ese gesto insinuante y encaja bien con la lista de conductas ocultas.
- source_word: בְּעֵינָיו
  english_pob_choice: with his eyes
  chosen_spanish: con los ojos
  alternatives_spanish:
  - con su ojo
  - con un ojo
  lexicon: HALOT
  rationale: El hebreo usa el plural con sufijo; en español, el plural «los ojos» suena idiomático en este contexto gestual y sigue el paralelo con los demás miembros del cuerpo.
- source_word: מֹלֵל
  english_pob_choice: signaling
  chosen_spanish: hace señas
  alternatives_spanish:
  - señala
  - raspa
  - arrastra el pie
  - da señales
  lexicon: HALOT
  rationale: El verbo es raro y su gesto exacto es incierto; el contexto sugiere una comunicación corporal encubierta. «Hace señas» conserva esa fuerza sin fijar indebidamente un movimiento específico.
- source_word: בְּרַגְלוֹ
  english_pob_choice: with his feet
  chosen_spanish: con los pies
  alternatives_spanish:
  - con su pie
  - con el pie
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con sufijo, el español coordina mejor con los otros gestos del versículo usando el plural general «los pies».
- source_word: מֹרֶה
  english_pob_choice: pointing
  chosen_spanish: apunta
  alternatives_spanish:
  - dirige
  - enseña
  - hace señas
  lexicon: HALOT
  rationale: En este paralelismo de gestos físicos, «apunta» comunica la acción concreta de señalar, más que el sentido más amplio de «enseñar».
- source_word: בְּאֶצְבְּעֹתָיו
  english_pob_choice: with his fingers
  chosen_spanish: con los dedos
  alternatives_spanish:
  - con sus dedos
  - con un dedo
  lexicon: HALOT
  rationale: El plural hebreo se refiere claramente a los dedos usados para indicar o señalar; en español, «con los dedos» es natural y mantiene el sentido instrumental.
translation_notes:
  revision_awareness: 'El texto hebreo presenta tres gestos corporales encadenados. La versión española conserva esa estructura paralela y sigue la lectura del audit trail inglés: un gesto con los ojos, otro con los pies y otro con los dedos, sin especificar más de lo que el hebreo permite.'
  spanish_consistency_notes:
  - Se prefirió una redacción verbal directa y coordinada para mantener el paralelismo del hebreo.
  - «Guiña» y «apunta» son opciones naturales en español y preservan el matiz de señal encubierta.
  - Se evitó «enseña» en la línea principal porque en español podría sugerir instrucción verbal, mientras que el contexto enumera gestos físicos.
