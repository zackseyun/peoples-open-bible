  - severity: low
    issue: La nota [a] está anclada visualmente al pronombre «él» en vez de a toda la expresión verbal.
    rationale: Mover el ancla no cambia el sentido, pero mejora la lectura y evita una asociación demasiado estrecha con el pronombre final.
  - severity: low
    issue: Las notas comienzan con comillas innecesarias.
    rationale: No afecta fidelidad, pero un estilo editorial más limpio mejora la presentación.
