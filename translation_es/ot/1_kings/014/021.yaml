base_translation:
  language: en
  yaml_path: translation/ot/1_kings/014/021.yaml
  text: Now Rehoboam the son of Solomon reigned in Judah[a]. Rehoboam was forty-one years old when he became king, and he reigned seventeen years in Jerusalem, the city that Yahweh had chosen from all the tribes of Israel to put his name there[b]. And his mother’s name was Naamah the Ammonite woman.
  footnotes:
  - marker: a
    text: Or 'over Judah' for 'in Judah.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''to put his name there,'' a covenantal expression for the place specially associated with the LORD’s presence and worship.'
    reason: cultural_note
