review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta correctamente los tres ejemplos recordados por la madre: Abel muerto por Caín, Isaac en contexto sacrificial y José en prisión. Sin embargo, ἀνεγίνωσκεν no se refleja bien en «le recordó a nosotros», que es una construcción no idiomática y además introduce un dativo erróneo; el sentido es «nos recordó / nos relató». También conviene mejorar «a quien mató Caín» a una forma más natural y formal («que fue muerto por Caín» o «a quien Caín mató»).'
  spanish_quality_summary: La legibilidad necesita ajuste. «Y le recordó a nosotros» suena antinatural en español y distrae del sentido. «Isaac, siendo ofrecido en holocausto» es aceptable, pero queda más natural sin la coma inicial y con una estructura paralela al resto de la enumeración. El registro general debe sonar bíblico y digno sin calco sintáctico del inglés o del griego.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Los nombres propios están bien. «Holocausto» preserva adecuadamente el lenguaje sacrificial de ὁλοκαυτούμενον, y la nota explica la alternativa literal. No se requieren cambios teológicos, solo sintácticos y estilísticos.
  issues:
  - severity: high
    issue: 'Construcción no idiomática: «le recordó a nosotros»'
    rationale: El griego ἀνεγίνωσκεν δὲ ἡμῖν expresa que ella les recordaba o relataba a ellos estos ejemplos. En español neutral, «le recordó a nosotros» es gramaticalmente impropio; debe ser «nos recordó» o «nos relató».
  - severity: medium
    issue: Redacción poco natural en «a quien mató Caín»
    rationale: Aunque transmite el sentido, la frase suena menos fluida en este registro. «a quien Caín mató» o «que fue muerto por Caín» preservan mejor la solemnidad y claridad.
  - severity: low
    issue: Puntuación y paralelismo de la enumeración
    rationale: 'La secuencia mejora si los tres objetos quedan en paralelo: «Abel..., Isaac..., y José...», sin comas innecesarias que rompan el ritmo.'
  revised_spanish_text: Y nos recordó a Abel, a quien Caín mató, y a Isaac siendo ofrecido en holocausto[a], y a José en prisión.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «siendo ofrecido como un holocausto». El griego usa lenguaje sacrificial para evocar Génesis 22.'
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis principal para reflejar ἀνεγίνωσκεν de forma idiomática en español («nos recordó»). Se mejora la fluidez de la cláusula sobre Abel y se conserva «holocausto» para mantener la alusión sacrificial del griego. La nota se mantiene, pero el ancla se mueve al sintagma pertinente en vez de al nombre Abel, ya que la alternativa literal corresponde a Isaac/ὁλοκαυτούμενον.
