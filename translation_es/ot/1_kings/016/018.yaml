    rationale: La nota [a] explica «ciudadela», pero el marcador está colocado después de «fuego». Esto rompe la correspondencia exigida entre texto y nota.
  - severity: medium
    issue: Falta la nota cultural/literal sobre «quemó la casa del rey sobre sí mismo con fuego»
    rationale: La auditoría inglesa preserva explícitamente una nota para esta construcción literal difícil. En español, la frase también requiere aclaración para evitar ambigüedad.
  - severity: low
    issue: «Y sucedió que» suena demasiado calcado
    rationale: Aunque no es incorrecto, «Cuando Zimri vio...» es más natural y digno en español bíblico moderno sin pérdida de sentido.
  revised_spanish_text: Cuando Zimri vio que la ciudad había sido capturada, entró en la ciudadela[a] de la casa del rey y quemó la casa del rey sobre sí mismo con fuego[b], y murió.
  revised_footnotes:
  - marker: a
    text: O «fortaleza» o «palacio» para «ciudadela»; אַרְמוֹן puede designar una estructura real fortificada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «quemó la casa del rey sobre sí mismo con fuego», describiendo la autodestrucción de Zimri al incendiar la residencia real a su alrededor.
    reason: cultural_note
  revision_rationale: Se eliminó «Y sucedió que» para mejorar la naturalidad del español sin alterar la función temporal del hebreo. Se reubicó la nota sobre «ciudadela» en el término correcto y se añadió la nota literal/cultural que el inglés ya documentó para la construcción «sobre sí mismo con fuego», necesaria también en español.
