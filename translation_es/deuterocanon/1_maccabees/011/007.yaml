translation:
  language: es
  text: Y Jonatán fue con el rey hasta el río llamado Eleutero[a], y regresó a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Eleutero» es el nombre propio de un río que marcaba una región fronteriza del norte; el griego dice simplemente «el río llamado Eleutero».
    reason: cultural_note
lexical_decisions:
- source_word: ἐπορεύθη
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - viajó
  - se dirigió
  lexicon: LSJ
  rationale: El aoristo de πορεύομαι expresa desplazamiento narrativo simple. En español, «fue» transmite de manera natural ese movimiento sin añadir matices de viaje más fuertes de los que da el griego.
- source_word: μετὰ τοῦ βασιλέως
  english_pob_choice: with the king
  chosen_spanish: con el rey
  alternatives_spanish:
  - junto con el rey
  lexicon: LSJ
  rationale: μετά con genitivo indica compañía. «Con el rey» es la forma más directa y idiomática en español.
- source_word: ἕως τοῦ ποταμοῦ
  english_pob_choice: as far as the river
  chosen_spanish: hasta el río
  alternatives_spanish:
  - hasta el río llamado Eleuterio
  - hasta la ribera del río
  lexicon: LSJ
  rationale: ἕως marca límite o extensión. «Hasta el río» conserva el punto de llegada; el sentido de límite se entiende bien en español sin forzar una perífrasis más pesada.
- source_word: τοῦ καλουμένου Ἐλευθέρου
  english_pob_choice: called Eleutherus
  chosen_spanish: llamado Eleuterio
  alternatives_spanish:
  - nombrado Eleuterio
  - conocido como Eleuterio
  lexicon: LSJ
  rationale: καλουμένου significa «llamado» o «nombrado». Se translitera el nombre geográfico al español como «Eleuterio», conforme a la práctica de nombres propios, y se mantiene el valor de identificación del río.
- source_word: ἐπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  - se volvió
  lexicon: LSJ
  rationale: El verbo expresa retorno. «Regresó» es claro, natural y fiel al movimiento de vuelta indicado por el texto.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: LSJ
  rationale: εἰς con nombre de lugar indica movimiento hacia una meta. En español, «a Jerusalén» comunica ese destino de manera idiomática.
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés coinciden estrechamente; no se detectaron revisiones ni variantes textuales que requirieran ajuste. Se conservó el valor narrativo simple del viaje y el topónimo propio del río sin ampliar el contenido.
  spanish_consistency_notes:
  - Se usa «Jerusalén» con capitalización estándar en español.
  - Se mantiene «Eleuterio» como transliteración del nombre del río, en paralelo al tratamiento del inglés POB.
  - No se introducen términos teológicos ajenos al verso; la redacción sigue el relato de desplazamiento con estilo sobrio y publicable.
