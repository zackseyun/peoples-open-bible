translation:
  language: es
  text: 'Entonces Jacob dijo a sus hermanos[a]: «Recojan piedras». Y ellos tomaron piedras, hicieron un montón y comieron allí junto al montón[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» puede referirse más ampliamente a los parientes varones o compañeros de Jacob, no necesariamente solo a hermanos literales.
    reason: cultural_note
  - marker: b
    text: O «comieron allí sobre el montón». La preposición hebrea puede leerse más literalmente como «sobre».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus parientes
  - a sus compañeros
  lexicon: HALOT
  rationale: אָח puede significar “hermano” en sentido literal, pero también extenderse a parientes o asociados. Siguiendo el rastro auditado del POB en inglés, “hermanos” conserva la forma más cercana al hebreo y resulta natural en español; la nota preserva la posible amplitud referencial.
- source_word: לִקְטוּ
  english_pob_choice: Gather
  chosen_spanish: Recojan
  alternatives_spanish:
  - Junten
  - Reúnan
  lexicon: HALOT
  rationale: El imperativo de לקט pide recoger o reunir objetos. “Recojan” expresa bien la acción de juntar piedras en un español moderno y claro.
- source_word: אֲבָנִים
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - rocas
  lexicon: HALOT
  rationale: El sustantivo ordinario aquí es “piedras”. En español es más natural que “piedras” que “rocas” para el material reunido en un montón con función de señal.
- source_word: וַיַּעֲשׂוּ גָל
  english_pob_choice: made a heap
  chosen_spanish: hicieron un montón
  alternatives_spanish:
  - hicieron un montón de piedras
  - levantaron un montón
  - hicieron un túmulo
  lexicon: HALOT
  rationale: גַּל designa un montón o montón de piedras. “Montón” es la opción más directa y accesible; “túmulo” sería más técnico y menos inmediato para lectores generales.
- source_word: וַיֹּאכְלוּ שָׁם עַל הַגָּל
  english_pob_choice: they ate there by the heap
  chosen_spanish: comieron allí junto al montón
  alternatives_spanish:
  - comieron allí sobre el montón
  - comieron allí en el montón
  lexicon: HALOT
  rationale: La preposición עַל puede significar “sobre” literalmente, pero en contexto también admite una relación espacial más amplia. “Junto al montón” mantiene la escena de forma idiomática en español sin cerrar indebidamente la ambigüedad que el inglés POB preserva con una nota sobre la lectura literal.
translation_notes:
  revision_awareness: 'La versión española sigue el estado revisado sin cambios del expediente inglés (latest_revision_pass: unchanged). Se conservó la decisión auditada de traducir la escena con lenguaje natural y se mantuvo la ambigüedad espacial de עַל mediante una formulación idiomática y una nota alternativa para la lectura más literal.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usó «piedras» y «montón» de forma consistente con el registro bíblico neutral y comprensible.
  - No se introdujo lenguaje eclesiástico no atestiguado por el texto; la relación familiar/compañerismo queda resuelta en la nota de pie.
