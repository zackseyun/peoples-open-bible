- from: Sus telas no se convertirán en ropa[a], ni se cubrirán con sus obras; sus obras son obras de maldad[b], y en sus manos hay actos de violencia.
  to: Sus tejidos no llegarán a ser vestidura[a], ni se cubrirán con sus obras; sus obras son obras de maldad[b], y actos de violencia están en sus manos.
