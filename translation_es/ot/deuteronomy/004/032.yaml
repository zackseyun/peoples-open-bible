translation:
  language: es
  text: 'Porque pregunta ahora por los días antiguos, que fueron antes de ti, desde el día en que Dios creó al hombre[a] en la tierra, y desde un extremo de los cielos hasta el otro extremo de los cielos: ¿ha acontecido algo como esta gran cosa, o se ha oído algo semejante a ella?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humanidad»; el hebreo אָדָם puede referirse representativamente a la humanidad como un todo en contextos de creación.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאַל נָא
  english_pob_choice: ask now
  chosen_spanish: pregunta ahora
  alternatives_spanish:
  - te ruego que preguntes ahora
  - consulta ahora
  lexicon: HALOT
  rationale: El imperativo con נָא expresa una súplica o exhortación urgente. «Pregunta ahora» conserva la inmediatez y suena natural en español actual.
- source_word: לְיָמִים רִאשֹׁנִים
  english_pob_choice: about the former days
  chosen_spanish: acerca de los días antiguos
  alternatives_spanish:
  - sobre los días primeros
  - acerca de los días de antaño
  lexicon: HALOT
  rationale: La expresión se refiere a tiempos remotos. «Días antiguos» comunica bien la referencia temporal con dignidad y sin forzar un giro literal poco natural.
- source_word: אֲשֶׁר הָיוּ לְפָנֶיךָ
  english_pob_choice: that were before you
  chosen_spanish: que fueron antes de ti
  alternatives_spanish:
  - que estuvieron antes de ti
  - que precedieron a ti
  lexicon: HALOT
  rationale: Preserva el sentido temporal de precedencia respecto del oyente. «Antes de ti» reproduce con claridad el valor relacional del hebreo.
- source_word: לְמִן הַיּוֹם אֲשֶׁר בָּרָא
  english_pob_choice: from the day when ... created
  chosen_spanish: desde el día en que ... creó
  alternatives_spanish:
  - a partir del día en que ... creó
  - desde aquel día en que ... creó
  lexicon: HALOT
  rationale: «Desde el día en que» expresa el punto de partida del horizonte histórico. La estructura española mantiene el alcance temporal del hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En este contexto creador, la forma estándar y fiel es «Dios». No requiere marcada especialización adicional.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - ser humano
  lexicon: HALOT
  rationale: El hebreo usa un singular representativo en contexto de creación. «El hombre» preserva esa fuerza representativa y la decisión del POB inglés, con posible lectura colectiva implícita.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - sobre la tierra
  lexicon: HALOT
  rationale: «En la tierra» es el equivalente natural en español para la localización del acto creador, sin perder el valor cósmico del contexto.
- source_word: וּלְמִקְצֵה הַשָּׁמַיִם וְעַד קְצֵה הַשָּׁמַיִם
  english_pob_choice: and from one end of the heavens to the other end of the heavens
  chosen_spanish: y desde un extremo de los cielos hasta el otro extremo de los cielos
  alternatives_spanish:
  - y de un extremo de los cielos al otro
  - y desde el extremo de los cielos hasta el otro
  lexicon: HALOT
  rationale: La construcción es un merismo de totalidad. «Los cielos» conserva el plural hebreo y el registro elevado, y «desde... hasta...» hace explícita la extensión total.
- source_word: הֲנִהְיָה
  english_pob_choice: has anything happened
  chosen_spanish: ¿ha acontecido algo
  alternatives_spanish:
  - ¿ha habido algo
  - ¿ha sucedido algo
  lexicon: HALOT
  rationale: El interrogativo pregunta si tal hecho ha llegado a ocurrir. «Acontecido» mantiene el tono formal y la referencia a un evento excepcional.
- source_word: כַּדָּבָר הַגָּדוֹל הַזֶּה
  english_pob_choice: like this great thing
  chosen_spanish: como esta gran cosa
  alternatives_spanish:
  - como este gran asunto
  - como este gran acontecimiento
  lexicon: HALOT
  rationale: דָבָר puede referirse a cosa, asunto o hecho. «Gran cosa» es lo bastante amplio para no estrechar indebidamente el sentido, y conserva la fuerza enfática del original.
- source_word: הֲנִשְׁמַע כָּמֹהוּ
  english_pob_choice: or has anything been heard like it?
  chosen_spanish: o se ha oído algo semejante a ella
  alternatives_spanish:
  - o se ha escuchado algo parecido a ello
  - o se ha oído cosa semejante a ello
  lexicon: HALOT
  rationale: La pasiva/impersonal de שׁמע en este contexto apunta a algo conocido por rumor o reporte. «Se ha oído» transmite bien ese valor en español.
theological_decisions:
- issue: Renderización de אָדָם en contexto de creación
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - ser humano
  rationale: La elección conserva el singular representativo del hebreo y coincide con la decisión auditada del POB en inglés. En español, «el hombre» puede incluir a la humanidad en contexto de creación sin perder la forma original.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; contested term אָדָם'
- issue: Merismo cósmico de los cielos
  english_pob_reading: one end of the heavens to the other end of the heavens
  chosen_spanish_reading: desde un extremo de los cielos hasta el otro extremo de los cielos
  alternative_spanish_readings:
  - desde un extremo del cielo hasta el otro
  - de un extremo de los cielos al otro
  rationale: Se mantiene el plural hebreo «los cielos» y la estructura merística completa. No se simplifica a singular porque el POB inglés ya preserva la imagen amplia y elevada del original.
  doctrine_reference: Principio POB de preservar merismos y registro del texto fuente
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa muestran un acuerdo alto y no registran revisiones aplicadas. La principal decisión sensible es אָדָם, donde el POB inglés opta por «man» con nota alternativa; en español se conserva esa opción mediante «el hombre» y una nota que explicita la posibilidad de leer «la humanidad».
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en sentido creador.
  - Se mantiene «los cielos» para reflejar el plural hebreo.
  - La nota [a] está anclada en el texto para evitar pie de nota huérfano.
  - El tono es formal y bíblico, pero con sintaxis española natural.
