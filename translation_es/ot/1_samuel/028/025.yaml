translation:
  language: es
  text: Entonces ella se lo puso delante de Saúl y delante de sus siervos[a], y comieron. Luego se levantaron y se fueron esa noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «ella puso [lo] delante de Saúl y delante de sus siervos». El objeto está implícito por el contexto inmediato: la comida preparada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּגֵּשׁ
  english_pob_choice: Then she brought it before
  chosen_spanish: Entonces ella lo presentó delante de
  alternatives_spanish:
  - Entonces ella lo puso delante de
  - Entonces ella lo sirvió delante de
  lexicon: HALOT
  rationale: El verbo en este contexto expresa llevar o acercar algo para colocarlo ante los comensales. En español, «presentó delante de» conserva la idea espacial de poner a la vista y disponible, sin sonar tan mecánico como «trajo delante de». El objeto implícito se hace explícito con «lo», como exige el contexto inmediato del alimento preparado.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: La preposición significa literalmente «antes de / en frente de». Para una mesa o comida servida, «delante de» es natural en español y mantiene la imagen espacial.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus asistentes
  lexicon: HALOT
  rationale: El hebreo עבד puede ser «siervo», «esclavo» o «sirviente/servidor» según el contexto. Aquí el contexto narrativo de Saúl y su séquito favorece un término funcional y reverente. Se evita «esclavos» porque el pasaje no enfatiza estatus jurídico de servidumbre. «Siervos» conserva la relación de servicio y es ampliamente comprensible en registro bíblico.
- source_word: וַיֹּאכֵלוּ
  english_pob_choice: and they ate
  chosen_spanish: y comieron
  alternatives_spanish:
  - y comieron de ello
  - y lo comieron
  lexicon: HALOT
  rationale: El verbo simplemente afirma que comieron; en español el objeto puede omitirse de manera natural porque queda claro por el contexto. Añadirlo sería innecesario y menos fluido.
- source_word: וַיָּקֻמוּ
  english_pob_choice: Then they rose
  chosen_spanish: Luego se levantaron
  alternatives_spanish:
  - Entonces se levantaron
  - Y se levantaron
  lexicon: HALOT
  rationale: «Se levantaron» reproduce el movimiento narrativo de ponerse en pie. «Luego» mantiene la secuencia del relato con un tono sobrio y claro.
- source_word: וַיֵּלְכוּ
  english_pob_choice: and went away
  chosen_spanish: y se fueron
  alternatives_spanish:
  - y partieron
  - y salieron
  lexicon: HALOT
  rationale: En contexto, el sentido es de partida del lugar. «Se fueron» es idiomático en español y transmite la salida sin añadir más de lo que el hebreo dice.
- source_word: בַּלַּיְלָה הַהוּא
  english_pob_choice: that night
  chosen_spanish: esa noche
  alternatives_spanish:
  - aquella noche
  - en esa noche
  lexicon: HALOT
  rationale: La expresión temporal hebrea se rinde de forma natural con «esa noche», que preserva la referencia deíctica y evita una calca poco idiomática.
translation_notes:
  revision_awareness: Alineado con la última revisión del inglés POB, que conserva una traducción óptima-equivalente estable sin cambios. El español sigue esa decisión y hace explícito el objeto implícito por exigencia del español y del contexto narrativo.
  spanish_consistency_notes:
  - Se mantiene Yahvé en otros pasajes según la norma del proyecto; este versículo no contiene el Tetragrámaton.
  - Se usa «siervos» como equivalente contextual de עֲבָדָיו, coherente con el registro bíblico y con la decisión inglesa de no forzar «slaves».
  - El objeto implícito de וַתַּגֵּשׁ se marca con nota para reflejar fielmente la elipsis hebrea sin oscurecer la lectura en español.
