  glossary_alignment: No hay términos del glosario base especialmente implicados aquí. Las decisiones «águilas» con nota alternativa, «carros», «torbellino» y «arruinados» son coherentes con la evidencia fuente y el razonamiento auditado. «¡Mira!» es posible para הִנֵּה, pero sin signo de cierre/exclamación tras la nota y con mayúscula posterior queda algo torpe; «Mira,» integra mejor el deíctico urgente en español.
