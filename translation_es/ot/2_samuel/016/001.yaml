base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/016/001.yaml
  text: When David had passed a little beyond the summit[a], behold, Ziba the servant of Mephibosheth was there to meet him, with a pair of saddled donkeys, and on them were two hundred loaves of bread, a hundred clusters of raisins, a hundred summer fruits[c][b], and a skin of wine.
  footnotes:
  - marker: a
    text: Or 'a little past the top.' The Hebrew literally says 'a little from the head,' with 'head' used for the summit of the hill or mount.
    reason: lexical_alternative
  - marker: b
    text: '''Servant'' could also be rendered ''young man'' or ''attendant''; here the context favors Ziba''s role as Mephibosheth''s servant.'
    reason: lexical_alternative
  - marker: c
    text: '''Summer fruits'' may refer more specifically to figs, but the Hebrew term is broader.'
    reason: lexical_alternative
  ai_draft:
