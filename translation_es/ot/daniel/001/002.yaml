translation:
  language: es
  text: Y el Señor entregó a Joaquín, rey de Judá, en sus manos[a], junto con algunos de los vasos de la casa de Dios. Los llevó a la tierra de Sinar, a la casa de su dios[c][b], y llevó los vasos a la tesorería de su dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dio a Joaquín, rey de Judá, en sus manos».
    reason: lexical_alternative
  - marker: b
    text: Sinar es el nombre antiguo de Babilonia.
    reason: cultural_note
  - marker: c
    text: O «templo de su dios» y «casa del tesoro de su dios». El hebreo usa «casa» para la casa de Dios y para la casa del dios de Babilonia.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: El hebreo consonántico leído aquí como אֲדֹנָי en la tradición auditada se refiere al sujeto divino que actúa soberanamente. En español de la POB, el nombre divino se rinde como «Yahvé» cuando el referente es el nombre propio divino, para no ocultarlo tras una convención tipográfica.
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - dejó caer en
  lexicon: HALOT
  rationale: נתן tiene el sentido básico de «dar». «Dio» conserva la sencillez del hebreo y permite mantener la agencia divina sin suavizarla a una mera permisión.
- source_word: בְּיָדוֹ
  english_pob_choice: into his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en su poder
  - bajo su control
  lexicon: HALOT
  rationale: La imagen concreta de la mano se conserva en español como expresión idiomática natural. «En su mano» mantiene la metáfora de dominio y control del hebreo.
- source_word: יְהוֹיָקִים מֶלֶךְ יְהוּדָה
  english_pob_choice: Jehoiakim king of Judah
  chosen_spanish: Joaquín, rey de Judá
  alternatives_spanish:
  - Joaquim, rey de Judá
  - Joaquín, el rey de Judá
  lexicon: HALOT
  rationale: Se adopta la forma española bíblica habitual «Joaquín» para el nombre del rey. La aposición se conserva con «rey de Judá», reproduciendo la estructura del hebreo sin añadir artículos innecesarios.
- source_word: וּמִקְצָת כְּלֵי בֵית הָאֱלֹהִים
  english_pob_choice: along with some of the vessels of the house of God
  chosen_spanish: junto con algunos de los vasos de la casa de Dios
  alternatives_spanish:
  - junto con parte de los vasos de la casa de Dios
  - junto con algunos utensilios de la casa de Dios
  lexicon: HALOT
  rationale: מִקְצָת se rinde como «algunos de» / «junto con algunos de» para preservar la idea de una porción no total. כְּלֵי, en este contexto cultual, puede ser «vasos» o «utensilios»; se elige «vasos» por su peso bíblico y porque conserva el carácter de objetos sagrados sin banalizarlos. «Casa de Dios» sigue de cerca la formulación hebrea y el paralelo literario del versículo.
- source_word: וַיְבִיאֵם
  english_pob_choice: He brought them
  chosen_spanish: Los llevó
  alternatives_spanish:
  - Y los llevó
  - Los trajo
  lexicon: HALOT
  rationale: ביא en este contexto admite tanto «llevar» como «traer». «Los llevó» fluye naturalmente en español y mantiene el movimiento narrativo hacia la tierra de Sinar.
- source_word: אֶרֶץ שִׁנְעָר
  english_pob_choice: the land of Shinar
  chosen_spanish: la tierra de Sinar
  alternatives_spanish:
  - el país de Sinar
  - la región de Sinar
  lexicon: HALOT
  rationale: אֶרֶץ se rinde por «tierra»; «Sinar» se translitera, conservando el topónimo bíblico sin explicarlo dentro del versículo.
- source_word: בֵּית אֱלֹהָיו
  english_pob_choice: to the house of his god
  chosen_spanish: a la casa de su dios
  alternatives_spanish:
  - al templo de su dios
  - a la casa de su deidad
  lexicon: HALOT
  rationale: Se conserva «casa» para mantener el paralelismo con «casa de Dios» del miembro anterior. «Dios» en minúscula señala correctamente a una deidad pagana.
- source_word: וְאֶת הַכֵּלִים הֵבִיא בֵּית אוֹצַר אֱלֹהָיו
  english_pob_choice: and he brought the vessels into the treasury of his god
  chosen_spanish: y llevó los vasos a la casa del tesoro de su dios
  alternatives_spanish:
  - y los llevó al tesoro de su dios
  - y llevó los vasos al almacén de su dios
  lexicon: HALOT
  rationale: אוֹצָר puede significar «tesoro» o «tesorería/almacén». Se traduce «casa del tesoro» para reflejar de manera más literal בֵּית אוֹצַר y preservar el paralelismo con las otras dos «casas» del versículo. «Llevó» repite el movimiento verbal de la primera mitad sin forzar una simplificación estilística.
theological_decisions:
- issue: Agencia divina en la caída de Judá
  english_pob_reading: The verse states that the Lord gave Jehoiakim into Nebuchadnezzar's hand.
  chosen_spanish_reading: El versículo afirma que Yahvé dio a Joaquín en mano del rey invasor.
  alternative_spanish_readings:
  - Yahvé permitió que Joaquín cayera en sus manos
  - Yahvé simplemente dejó que lo capturaran
  rationale: Se conserva la afirmación de agencia divina activa del hebreo. No se atenúa a mera permisión, porque el verbo נתן presenta a Dios como sujeto real de la entrega.
  doctrine_reference: Preservar la tensión teológica del texto; primacía del idioma original sobre la suavización interpretativa.
translation_notes:
  revision_awareness: 'Coincide con el testimonio auditado en inglés: se mantiene la entrega soberana de Yahvé, el paralelismo de «casa» para ambos santuarios y la repetición verbal del movimiento de los vasos. No se detectaron revisiones posteriores con cambios sustantivos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el referente divino del sujeto principal, conforme a la terminología española del proyecto.
  - Se conserva la distinción entre la casa de Dios y la casa de su dios mediante la repetición de «casa».
  - «Vasos» se mantiene como término cultual para los objetos del templo; no se sustituye por un equivalente más genérico.
  - La puntuación y el orden siguen un español natural, pero sin perder la correspondencia estrecha con el hebreo.
