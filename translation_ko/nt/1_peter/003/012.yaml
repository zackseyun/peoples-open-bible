id: 1PE.3.12
reference: 1 Peter 3:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι ὀφθαλμοὶ κυρίου ἐπὶ δικαίους καὶ ὦτα αὐτοῦ εἰς δέησιν αὐτῶν, πρόσωπον δὲ κυρίου ἐπὶ ποιοῦντας κακά.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/012.yaml
  text: "For the eyes of the Lord are on the righteous, and his ears are open to their prayer, but the face of the Lord is against those who do evil."
translation:
  language: ko
  text: '야훼의 눈은 의인들을 향하시고, 그분의 귀는 그들의 간구에 기울이시되, 야훼의 얼굴은 악을 행하는 자들을 대적하신다」[a] 함과 같습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 시편 34:12-16(LXX 33:13-17) 인용 마무리. LXX의 κύριος는 MT의 יהוה(야훼)를 옮긴 것이다.
    reason: ot_citation
lexical_decisions:
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_korean: 야훼
  alternatives_korean:
  - 주
  - 여호와
  lexicon: BDAG
  rationale: 시 34:15-16 인용. LXX의 κύριος는 MT의 יהוה를 옮긴 것이므로 글로서리 정책에 따라 「야훼」로 표기.
- source_word: εἰς δέησιν αὐτῶν
  english_pob_choice: open to their prayer
  chosen_korean: 그들의 간구에 기울이시되
  alternatives_korean:
  - 그들의 기도를 들으시되
  - 그들의 간구를 향하시되
  lexicon: BDAG
  rationale: 「귀가 ~에 향함」을 한국어로 「기울이다」로 자연스럽게 옮긴다. δέησις는 「간구」.
- source_word: πρόσωπον ... ἐπὶ ποιοῦντας κακά
  english_pob_choice: the face ... against those who do evil
  chosen_korean: 야훼의 얼굴은 악을 행하는 자들을 대적하신다
  alternatives_korean:
  - 야훼의 얼굴은 악인들을 향하여 있다
  lexicon: BDAG
  rationale: ἐπί + 대격이 적대적 향함을 가리키므로 「대적하다」로 옮긴다. 시편 원문의 강한 의미 보존.
theological_decisions:
- issue: 시 34:15-16 인용의 κύριος를 야훼로 표기
  chosen_reading: 야훼
  alternative_readings:
  - 주
  rationale: OT 인용 정책 (1:25, 2:3과 동일).
  doctrine_reference: 'DOCTRINE.md: OT 인용에서의 야훼 표기'
