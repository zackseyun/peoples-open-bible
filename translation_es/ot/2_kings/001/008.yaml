translation:
  language: es
  text: 'Le dijeron: «Era un hombre velludo[a], con un cinturón de cuero ceñido a la cintura». Y él dijo: «Es Elías el tisbita».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un hombre que llevaba una prenda de pelo». La expresión hebrea dice literalmente «un poseedor/amo de pelo», y puede describir tanto a un hombre velludo como a alguien con una prenda de pelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: HALOT
  rationale: En este contexto descriptivo, אִישׁ se refiere de manera directa a un varón adulto. «Hombre» conserva el sentido natural y preciso en español, sin introducir matices innecesarios.
- source_word: בַּעַל שֵׂעָר
  english_pob_choice: hairy
  chosen_spanish: velludo
  alternatives_spanish:
  - hombre peludo
  - hombre con mucho vello
  - de cabello abundante
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice algo como «poseedor de cabello», y en contexto funciona como descripción física. «Velludo» comunica bien la idea en español moderno y mantiene la tensión lexical entre apariencia corporal y posible referencia a vestimenta de pelo, sin decidir en exceso por una de las dos.
- source_word: וְאֵזוֹר עוֹר
  english_pob_choice: with a leather belt
  chosen_spanish: con un cinturón de cuero
  alternatives_spanish:
  - con un cinturón de piel
  - y un cinturón de cuero
  - con una faja de cuero
  lexicon: HALOT
  rationale: אֵזוֹר es un cinturón/cinto; עוֹר especifica el material como cuero/piel. «Cinturón de cuero» es claro y fiel, y evita un calco demasiado rígido.
- source_word: אָזוּר
  english_pob_choice: fastened
  chosen_spanish: ceñido
  alternatives_spanish:
  - ajustado
  - abrochado
  - atado
  lexicon: HALOT
  rationale: El participio indica que el cinturón estaba puesto o ajustado alrededor del cuerpo. «Ceñido» conserva el matiz de ir ajustado al cuerpo y suena natural en español bíblico contemporáneo.
- source_word: בְּמָתְנָיו
  english_pob_choice: around his waist
  chosen_spanish: a la cintura
  alternatives_spanish:
  - alrededor de la cintura
  - a sus lomos
  - en la cintura
  lexicon: HALOT
  rationale: מָתְנַיִם se refiere a la zona de la cintura/los lomos. «A la cintura» expresa el sentido con claridad y buen registro en español.
- source_word: אֵלִיָּה הַתִּשְׁבִּי
  english_pob_choice: Elijah the Tishbite
  chosen_spanish: Elías el tisbita
  alternatives_spanish:
  - Elías el de Tisbe
  - Elías, el tisbita
  lexicon: HALOT
  rationale: Se conserva el nombre propio en su forma española usual «Elías» y el gentilicio tradicional «tisbita», que es transparente para el lector bíblico y corresponde al valor del hebreo.
- source_word: הוּא
  english_pob_choice: It is
  chosen_spanish: Es
  alternatives_spanish:
  - Era
  - Se trata de
  lexicon: HALOT
  rationale: El hebreo usa una identificación enfática. En español, la fórmula natural es «Es Elías...», sin necesidad de reproducir un pronombre impersonal que sonaría menos idiomático.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y la decisión auditada en inglés, manteniendo la ambigüedad léxica de בַּעַל שֵׂעָר mediante una solución natural en español y conservando la nota alternativa sobre vestimenta de pelo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en otros contextos del proyecto, pero este versículo no lo contiene.
  - «Elías» y «tisbita» siguen la nomenclatura bíblica estándar en español y la decisión auditada del POB inglés.
  - La construcción directa de identificación («Es Elías...») evita una calca innecesaria y mantiene la función narrativa del hebreo.
