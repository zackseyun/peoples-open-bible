translation:
  language: es
  text: Y se enojó con aquellos hombres sin ley que le habían aconsejado entrar en la región[a], y mató a muchos de ellos, y decidió partir a su propia tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego transmitido por Swete dice literalmente: «y mataron a muchos de ellos». Como los verbos cercanos son singulares y el sentido narrativo apunta al mismo líder, el texto principal lo vierte en singular.'
    reason: textual_variant
lexical_decisions:
- source_word: ὠργίσθη
  english_pob_choice: became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se indignó
  - se enfureció
  lexicon: BDAG
  rationale: El aoristo expresa el cambio de estado; en español, «se enojó» comunica bien ese sentido ingesivo sin exagerar la intensidad.
- source_word: τοῖς ἀνδράσι τοῖς ἀνόμοις
  english_pob_choice: those lawless men
  chosen_spanish: aquellos hombres inicuos
  alternatives_spanish:
  - aquellos hombres sin ley
  - los hombres inicuos
  lexicon: BDAG
  rationale: «ἀνόμοις» tiene fuerza moral y legal de «sin ley / lawless». «Inicuos» es más natural en español bíblico y conserva el juicio moral; se evita suavizarlo a «malvados».
- source_word: τοῖς συμβουλεύσασιν αὐτῷ
  english_pob_choice: who had advised him
  chosen_spanish: que le habían aconsejado
  alternatives_spanish:
  - que le habían dado consejo
  - que le habían aconsejado a él
  lexicon: BDAG
  rationale: El participio aoristo señala a los que le dieron consejo previamente. «Habían aconsejado» reproduce bien la relación temporal y la función del participio.
- source_word: ἐλθεῖν εἰς τὴν χώραν
  english_pob_choice: to come into the country
  chosen_spanish: entrar en la región
  alternatives_spanish:
  - venir a la tierra
  - entrar en el país
  lexicon: BDAG
  rationale: «χώρα» puede ser «country/region/land». «Región» es un término neutral y claro en español; «tierra» podría sonar excesivamente cargado en un contexto bíblico más teológico.
- source_word: ἀπέκτειναν ἐξ αὐτῶν πολλούς
  english_pob_choice: he killed many of them
  chosen_spanish: él mató a muchos de ellos
  alternatives_spanish:
  - ellos mataron a muchos de ellos
  - mató a muchos
  lexicon: BDAG
  rationale: El griego transmitido tiene plural («mataron»), pero el contexto inmediato usa verbos singulares. Se adopta la lectura coherente del relato, como en el audit trail inglés, manteniendo la nota textual.
- source_word: ἐβουλεύσατο
  english_pob_choice: he decided
  chosen_spanish: decidió
  alternatives_spanish:
  - resolvió
  - tomó la determinación
  lexicon: BDAG
  rationale: Aquí el verbo expresa una decisión ya tomada más que una mera deliberación; «decidió» es preciso y natural.
- source_word: τοῦ ἀπελθεῖν
  english_pob_choice: to depart
  chosen_spanish: retirarse
  alternatives_spanish:
  - irse
  - partir
  lexicon: BDAG
  rationale: En contexto narrativo militar, «retirarse» comunica el desplazamiento de salida sin perder el matiz de moverse lejos del lugar actual.
- source_word: εἰς τὴν γῆν αὐτοῦ
  english_pob_choice: to his own land
  chosen_spanish: a su propia tierra
  alternatives_spanish:
  - a su tierra
  - a su propio país
  lexicon: BDAG
  rationale: «γῆ» aquí denota territorio/hogar. «Tierra» conserva mejor la proximidad al griego que «país», y «propia» refleja el énfasis posesivo.
theological_decisions:
- issue: Valor de ἀνόμοις (lawless) y su carga moral-legal
  english_pob_reading: those lawless men
  chosen_spanish_reading: aquellos hombres inicuos
  alternative_spanish_readings:
  - aquellos hombres sin ley
  - aquellos hombres malvados
  rationale: 'No hay una cuestión doctrinal, pero sí una tensión lexical: ἀνόμοις une ilegalidad y perversidad. «Inicuos» preserva el juicio moral sin reducirlo solo a crimen legal ni a maldad genérica.'
  doctrine_reference: Lexical ethics / semantic range
- issue: Variación textual en el sujeto de ἀπέκτειναν
  english_pob_reading: he killed many of them
  chosen_spanish_reading: él mató a muchos de ellos
  alternative_spanish_readings:
  - ellos mataron a muchos de ellos
  - se mató a muchos de ellos
  rationale: La forma griega transmitida es plural, pero el flujo narrativo y los verbos circundantes favorecen un sujeto singular implícito. Se sigue la solución del POB inglés para una lectura coherente, sin ocultar la variante textual.
  doctrine_reference: Textual criticism / narrative coherence
translation_notes:
  revision_awareness: 'Se ha seguido el texto griego de Swete 1909 con acuerdo alto en el audit trail inglés. La principal decisión revisada es la variante verbal en ἀπέκτειναν: el español adopta la lectura coherente singular del relato, manteniendo una nota textual sobre el plural literal del griego. No se detectaron otros cambios de revisión relevantes en el expediente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa «Jesús/Mesías» no aplicable aquí.
  - Se prefiere «esclavo/siervo» no aplicable aquí; tampoco aparece πνεῦμα, σάρξ ni δικαιοσύνη.
  - «Región» se eligió para χώρα por neutralidad geográfica y consistencia con el registro narrativo.
  - La puntuación y el orden sintáctico siguen el flujo del griego y del audit trail inglés, sin calco rígido.
