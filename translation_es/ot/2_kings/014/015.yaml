    text: O «combatió contra Amasías, rey de Judá». El hebreo usa literalmente la preposición «con», pero en contexto militar puede explicitarse como oposición hostil.
    reason: lexical_alternative
  - marker: b
    text: O «en el libro de los anales de los reyes de Israel».
    reason: lexical_alternative
