review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis distributiva del hebreo: «Cada hombre» para אִישׁ, presente descriptivo para יַעְזֹרוּ / יֹאמַר, y mantiene el paralelismo «prójimo / hermano». Las notas léxicas para רֵעַ y אָח son fieles al expediente inglés. El único punto importante es חֲזָק: el hebreo exhorta directamente a la fortaleza o firmeza («sé fuerte» / «mantente firme»), mientras que «¡Esfuérzate!» desplaza el sentido hacia esfuerzo o empeño, no exactamente a fuerza o resolución.'
  spanish_quality_summary: El español es claro y digno. «Cada hombre ayuda a su prójimo» funciona bien, y la puntuación es natural. Sin embargo, «¡Esfuérzate!» no es la mejor opción semántica ni la más alineada con la decisión documentada; «¡Sé fuerte!» o «¡Mantente firme!» suenan naturales y más exactos. Dado que el inglés POB eligió «Be strong!», la reparación es pequeña.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Prójimo» y «hermano» están bien sustentados por las notas. La revisión necesaria se limita a ajustar חֲזָק a una equivalencia española más directa.
  issues:
  - severity: medium
    issue: «¡Esfuérzate!» para חֲזָק debilita y desplaza el sentido léxico.
    rationale: חזק en imperativo llama a ser fuerte, firme o valiente; «esforzarse» se centra en intentar o poner empeño. La evidencia fuente y la auditoría inglesa favorecen una exhortación de fortaleza más directa.
  revised_spanish_text: 'Cada hombre ayuda a su prójimo[a], y dice a su hermano[b]: «¡Sé fuerte!»'
