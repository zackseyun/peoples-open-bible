  to: Lino fino bordado de Egipto era tu vela, para servirte de estandarte[b]; azul y púrpura de las costas[a] de Elishá era tu cobertura.
  rationale: Se corrige la ubicación de la nota sobre אִיֵּי para que ancle en «costas», se normaliza el topónimo a «Elishá» conforme a la decisión de transliteración del expediente, y se pule la nota b para evitar el anglicismo «banner». El resto del verso puede mantenerse tal como está porque refleja fielmente el hebreo y lee bien en español.
