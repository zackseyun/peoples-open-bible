translation:
  language: es
  text: Así que el sacerdote le dio pan santo[a], porque allí no había pan, sino solo el pan de la Presencia, que había sido retirado de delante de Yahvé, para poner allí pan caliente el día en que fue retirado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «pan de la proposición». Literalmente, «el pan de la Presencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹדֶשׁ
  english_pob_choice: holy bread
  chosen_spanish: pan santo
  alternatives_spanish:
  - pan consagrado
  - cosa santa
  lexicon: HALOT
  rationale: En este contexto, קֹדֶשׁ no designa una ‘cosa santa’ genérica, sino el pan consagrado que se acaba de mencionar. ‘Pan santo’ conserva la referencia cultual de manera natural en español y explicita el sustantivo implícito del hebreo.
- source_word: לֶחֶם הַפָּנִים
  english_pob_choice: the bread of the Presence
  chosen_spanish: el pan de la Presencia
  alternatives_spanish:
  - el pan de la faz
  - el pan de la presencia
  lexicon: HALOT
  rationale: Se mantiene la expresión cultual transparente del hebreo. ‘Presencia’ conserva mejor el sentido del original que la forma tradicional opaca ‘pan de la proposición’, y evita sustituirla por un término menos auditable.
- source_word: הַמּוּסָרִים
  english_pob_choice: which had been removed
  chosen_spanish: que había sido retirado
  alternatives_spanish:
  - que había sido quitado
  - que estaba siendo removido
  lexicon: HALOT
  rationale: El participio pasivo describe el pan ya retirado en la rotación ritual. ‘Había sido retirado’ expresa bien el estado resultante y mantiene la pasividad del hebreo.
- source_word: מִלִּפְנֵי יְהוָה
  english_pob_choice: from before Yahweh
  chosen_spanish: de delante de Yahvé
  alternatives_spanish:
  - de la presencia de Yahvé
  - de ante Yahvé
  lexicon: HALOT
  rationale: ‘De delante de’ reproduce el giro espacial-cultual del hebreo mejor que una paráfrasis. Se usa ‘Yahvé’ conforme al criterio del proyecto para יְהוָה.
- source_word: לָשׂוּם
  english_pob_choice: to put
  chosen_spanish: para poner
  alternatives_spanish:
  - para colocar
  - para poner allí
  lexicon: HALOT
  rationale: El infinitivo de propósito admite una solución sencilla y natural. ‘Poner’ conserva la sobriedad procedural del texto sin añadir matices innecesarios.
- source_word: לֶחֶם חֹם
  english_pob_choice: hot bread
  chosen_spanish: pan caliente
  alternatives_spanish:
  - pan recién horneado
  - pan tibio
  lexicon: HALOT
  rationale: Aunque el calor puede implicar recién hecho, el hebreo dice literalmente ‘caliente’. ‘Pan caliente’ preserva esa fuerza léxica sin ocultarla tras una interpretación más explícita.
- source_word: בְּיוֹם הִלָּקְחוֹ
  english_pob_choice: on the day it was taken away
  chosen_spanish: el día en que se lo quitaban
  alternatives_spanish:
  - el día en que fue retirado
  - el día de su retiro
  lexicon: HALOT
  rationale: La frase temporal se refiere al momento ritual de retirar el pan anterior. ‘Se lo quitaban’ conserva la referencia al proceso de reemplazo regular y suena natural en español, sin perder el valor pasivo del hebreo.
- source_word: כִּי לֹא הָיָה שָׁם לֶחֶם כִּי אִם
  english_pob_choice: for there was no bread there except
  chosen_spanish: porque allí no había pan, sino solo
  alternatives_spanish:
  - pues allí no había pan, excepto
  - porque no había pan allí, salvo
  lexicon: HALOT
  rationale: La construcción expresa explicación con exclusión. ‘Porque allí no había pan, sino solo’ comunica con claridad la fuerza exceptiva sin sonar demasiado literal o pesada en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Se mantiene la transliteración ‘Yahvé’ para preservar el nombre personal del Dios de Israel y no reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión cultual del pan de la Presencia
  english_pob_reading: the bread of the Presence
  chosen_spanish_reading: el pan de la Presencia
  alternative_spanish_readings:
  - el pan de la proposición
  - el pan de la presencia
  rationale: Se evita la forma eclesiástica tradicional ‘pan de la proposición’ porque oculta la relación transparente con el hebreo פנים. ‘Presencia’ conserva el valor semántico y la audibilidad del término.
  doctrine_reference: 'Lexical policy: preservar transparencia del hebreo frente a sustituciones tradicionales opacas'
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó ‘in its place’ a ‘there’ para ceñirse más al hebreo. En español se refleja esa misma sobriedad con ‘para poner allí pan caliente’, sin introducir un equivalente posesivo que el original no expresa.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה, conforme al criterio del proyecto y de manera uniforme en el versículo.
  - Se mantiene ‘Presencia’ con mayúscula en la expresión cultual para distinguirla del uso ordinario de ‘presencia’.
  - ‘Pan caliente’ conserva la fuerza literal de חֹם; no se amplía a ‘recién horneado’ para no borrar la tensión léxica.
  - La estructura general sigue el orden explicativo del hebreo, pero con sintaxis natural para español publicado.
