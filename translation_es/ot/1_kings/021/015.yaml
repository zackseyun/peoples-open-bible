  yaml_path: translation/ot/1_kings/021/015.yaml
  text: When Jezebel heard that Naboth had been stoned and had died[a], Jezebel said to Ahab, “Get up, take possession of the vineyard of Naboth the Jezreelite, which he refused to give you for silver, because Naboth is not alive; he is dead.”
