base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/029/002.yaml
  text: 'And with all my strength I have prepared for the house of my God: the gold for the things of gold[a], and the silver for the things of silver, and the bronze for the things of bronze, the iron for the things of iron, and the wood for the things of wood; onyx stones, settings, stones of antimony, variegated stones, every precious stone[d][c][b], and marble stones in abundance.'
  footnotes:
  - marker: a
    text: The exact identification of some stones in this verse is uncertain. 'Onyx' for שֹׁהַם and 'marble' for שַׁיִשׁ follow common traditional renderings, though other identifications have been proposed.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'mountings' or 'inlays' for 'settings' (מִלּוּאִים).
    reason: lexical_alternative
  - marker: c
    text: The phrase rendered 'antimony stones' (אַבְנֵי פוּךְ) is difficult; it may refer to stones associated with dark pigment, decorative inlay, or another ornamental material.
    reason: lexical_alternative
  - marker: d
    text: '''Variegated stones'' renders רִקְמָה in light of the surrounding list of stones and building materials; elsewhere the word can refer to embroidered or richly patterned work.'
    reason: lexical_alternative
