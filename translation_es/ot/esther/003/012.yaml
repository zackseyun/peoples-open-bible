translation:
  language: es
  text: Entonces fueron convocados los escribas del rey en el primer mes, el día trece de ese mes, y se escribió[a] exactamente como mandó Amán a los sátrapas del rey, a los gobernadores que estaban sobre cada provincia, y a los oficiales de cada pueblo; a cada provincia en su propia escritura[b] y a cada pueblo en su propia lengua. Fue escrito en nombre del rey Asuero y sellado con el anillo de sello del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «fue escrito según todo lo que mandó Amán».'
    reason: lexical_alternative
  - marker: b
    text: «Escritura» aquí se refiere al sistema de escritura usado por cada provincia.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקָּרְאוּ
  english_pob_choice: were summoned
  chosen_spanish: fueron llamados
  alternatives_spanish:
  - fueron convocados
  - fueron citados
  lexicon: HALOT
  rationale: 'El nifal expresa voz pasiva: los escribas no actúan, sino que son llamados. ''Fueron llamados'' es natural y fiel; ''convocados'' sería posible, pero añade una tonalidad administrativa más fuerte que no es necesaria.'
- source_word: סֹפְרֵי הַמֶּלֶךְ
  english_pob_choice: the king’s scribes
  chosen_spanish: los escribas del rey
  alternatives_spanish:
  - los escribas reales
  - los secretarios del rey
  lexicon: HALOT
  rationale: '''סֹפְרִים'' aquí designa funcionarios de escritura y registro de la corte. ''Escribas del rey'' conserva transparencia y evita convertirlos en ''secretarios'', que sería más interpretativo.'
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: in the first month
  chosen_spanish: en el mes primero
  alternatives_spanish:
  - en el primer mes
  lexicon: HALOT
  rationale: Ambas son correctas; 'mes primero' sigue el orden más cercano al hebreo y suena natural en español bíblico contemporáneo.
- source_word: בִּשְׁלוֹשָׁה עָשָׂר יוֹם בּוֹ
  english_pob_choice: on the thirteenth day of it
  chosen_spanish: en el día trece de él
  alternatives_spanish:
  - en su día trece
  - el día trece de ese mes
  lexicon: HALOT
  rationale: Se conserva el anafórico 'de él' para reflejar el hebreo 'en él', que remite al mes. Es una solución un poco más formal, pero precisa.
- source_word: וַיִּכָּתֵב
  english_pob_choice: it was written
  chosen_spanish: fue escrito
  alternatives_spanish:
  - se escribió
  - se redactó
  lexicon: HALOT
  rationale: El pasivo impersonal no especifica el objeto en esta cláusula. 'Fue escrito' preserva la pasividad y evita añadir 'edicto' o 'decreto', como corrigió el audit trail inglés.
- source_word: כְּכָל אֲשֶׁר צִוָּה הָמָן
  english_pob_choice: exactly as Haman commanded
  chosen_spanish: según todo lo que mandó Amán
  alternatives_spanish:
  - exactamente como mandó Amán
  - conforme a todo lo que mandó Amán
  lexicon: HALOT
  rationale: '''Según todo lo que mandó'' refleja bien כְּכָל אֲשֶׁר sin sobrecargar el español con un adverbio explicativo. ''Mandó'' conserva el tono de autoridad del contexto cortesano.'
- source_word: אֲחַשְׁדַּרְפְּנֵי הַמֶּלֶךְ
  english_pob_choice: the king’s satraps
  chosen_spanish: los sátrapas del rey
  alternatives_spanish:
  - los sátrapas reales
  lexicon: HALOT
  rationale: Se mantiene el título persa técnico tradicional 'sátrapas', que es el equivalente español normal para este cargo imperial.
- source_word: הַפַּחוֹת
  english_pob_choice: the governors
  chosen_spanish: los gobernadores
  alternatives_spanish:
  - los prefectos
  - los gobernadores provinciales
  lexicon: HALOT
  rationale: El término designa una autoridad subordinada a los sátrapas. 'Gobernadores' es el más claro y natural en español, y conserva la distinción funcional.
- source_word: שָׂרֵי עַם וָעָם
  english_pob_choice: the officials of each people
  chosen_spanish: los jefes de cada pueblo
  alternatives_spanish:
  - los oficiales de cada pueblo
  - los dirigentes de cada pueblo
  lexicon: HALOT
  rationale: '''שָׂרִים'' puede significar príncipes, jefes u oficiales. En esta lista administrativa, ''jefes'' es más sobrio y no impone una lectura demasiado burocrática como ''oficiales''.'
- source_word: מְדִינָה וּמְדִינָה כִּכְתָבָהּ
  english_pob_choice: to every province in its own script
  chosen_spanish: a cada provincia según su escritura
  alternatives_spanish:
  - a cada provincia según su propio sistema de escritura
  - a cada provincia en su propia escritura
  lexicon: HALOT
  rationale: כְּתָב aquí alude al sistema de escritura, no solo al acto de escribir. 'Escritura' permite esa amplitud en español y evita una paráfrasis excesiva.
- source_word: וְעַם וָעָם כִּלְשׁוֹנוֹ
  english_pob_choice: to every people in its own language
  chosen_spanish: a cada pueblo según su lengua
  alternatives_spanish:
  - a cada pueblo en su propia lengua
  - a cada pueblo según su idioma
  lexicon: HALOT
  rationale: '''לָשׁוֹן'' puede ser ''lengua'' o ''idioma''. ''Lengua'' conserva mejor la correspondencia tradicional sin perder inteligibilidad.'
- source_word: בְּשֵׁם הַמֶּלֶךְ אֲחַשְׁוֵרֹשׁ
  english_pob_choice: in the name of King Ahasuerus
  chosen_spanish: en nombre del rey Asuero
  alternatives_spanish:
  - bajo el nombre del rey Asuero
  - por autoridad del rey Asuero
  lexicon: HALOT
  rationale: La fórmula de autorización real se expresa naturalmente en español con 'en nombre de'. 'Asuero' es la forma castellana habitual del nombre persa.
- source_word: נִכְתָּב
  english_pob_choice: It was written
  chosen_spanish: Fue escrito
  alternatives_spanish:
  - Se escribió
  - Quedó escrito
  lexicon: HALOT
  rationale: Se mantiene la repetición de la voz pasiva para reflejar la sucesión de acciones documentales del versículo.
- source_word: וְנֶחְתָּם
  english_pob_choice: and sealed
  chosen_spanish: y sellado
  alternatives_spanish:
  - y fue sellado
  - y estampado con un sello
  lexicon: HALOT
  rationale: '''Sellado'' es el equivalente directo del verbo y comunica la autenticación oficial del escrito.'
- source_word: בְּטַבַּעַת הַמֶּלֶךְ
  english_pob_choice: with the king’s signet ring
  chosen_spanish: con el anillo de sellar del rey
  alternatives_spanish:
  - con el anillo-sello del rey
  - con el anillo signet del rey
  lexicon: HALOT
  rationale: '''טַבַּעַת'' es el anillo usado para sellar documentos. ''Anillo de sellar'' comunica su función sin depender de un tecnicismo menos natural en español.'
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión del audit trail inglés, que evitó añadir ''edicto'' en el pasivo de וַיִּכָּתֵב. Por eso el español dice simplemente ''fue escrito'', sin introducir un sustantivo no explícito. También preservé la estructura documental del versículo: convocatoria de escribas, redacción, destinatarios administrativos, distribución lingüística y autenticación con sello real.'
  spanish_consistency_notes:
  - Mantengo 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Conservo 'Asuero' como forma castellana estable del nombre propio persa.
  - Usé 'sátrapas' para el cargo persa específico y 'gobernadores' para el cargo subordinado, evitando homogeneizarlos.
  - La cláusula distributiva 'a cada provincia... y a cada pueblo...' conserva el paralelismo del hebreo.
  - No introduje 'decreto' ni 'edicto' porque el hebreo solo dice 'fue escrito'.
