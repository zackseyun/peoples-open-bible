translation:
  language: es
  text: 'Por tanto, así dice Yahvé acerca de los profetas que profetizan en mi nombre, aunque yo no los envié, y que dicen: «Espada y hambre no habrá en esta tierra[a]»; esos profetas serán consumidos por espada y por hambre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «guerra y hambre no vendrán sobre esta tierra». El hebreo dice literalmente: «espada y hambre no habrá en esta tierra».'
    reason: Preservar la alternativa léxica documentada en la auditoría inglesa y aclarar la literalidad de la cláusula hebrea.
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - Entonces
  lexicon: HALOT
  rationale: Introduce con claridad la conclusión inferida del contexto previo, manteniendo el nexo discursivo sin sonar mecánico.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - así ha dicho Yahvé
  - esto dice Yahvé
  lexicon: HALOT
  rationale: Conserva el registro profético formal y el nombre divino en la forma de proyecto, Yahvé, según el criterio del texto base.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - contra
  lexicon: HALOT
  rationale: La preposición abre el tema del oráculo sobre los profetas; 'acerca de' es natural y no fuerza un matiz polémico que el hebreo expresa después.
- source_word: הַנְּבִאִים הַנִּבְּאִים
  english_pob_choice: the prophets who prophesy
  chosen_spanish: los profetas que profetizan
  alternatives_spanish:
  - los profetas profetizando
  - los profetas que están profetizando
  lexicon: HALOT
  rationale: Reproduce el juego de palabras hebreo entre el sustantivo y el verbo, evitando aplanarlo en una simple designación genérica.
- source_word: בִּשְׁמִי
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - bajo mi nombre
  - por mi autoridad
  lexicon: HALOT
  rationale: Mantiene el sentido idiomático de representación o pretensión de autoridad divina en un español claro y bíblico.
- source_word: וַאֲנִי לֹא שְׁלַחְתִּים
  english_pob_choice: though I did not send them
  chosen_spanish: aunque yo no los envié
  alternatives_spanish:
  - pero yo no los envié
  - y yo no los envié
  lexicon: HALOT
  rationale: El valor adversativo se expresa bien con 'aunque', preservando la oposición entre su pretensión y la negativa divina de envío.
- source_word: וְהֵמָּה אֹמְרִים
  english_pob_choice: and who say
  chosen_spanish: y que dicen
  alternatives_spanish:
  - y que están diciendo
  - y dicen
  lexicon: HALOT
  rationale: Sigue la revisión más directa y formal del participio como un dicho característico, sin añadir una iteración no necesaria en español.
- source_word: חֶרֶב וְרָעָב
  english_pob_choice: Sword and famine
  chosen_spanish: Espada y hambre
  alternatives_spanish:
  - guerra y hambre
  - espada y escasez
  lexicon: HALOT
  rationale: '''Espada'' conserva el tropo profético literal del hebreo, y ''hambre'' transmite la calamidad de רָעָב; juntos mantienen la fórmula de juicio.'
- source_word: לֹא יִהְיֶה בָּאָרֶץ הַזֹּאת
  english_pob_choice: will not be in this land
  chosen_spanish: no habrá en esta tierra
  alternatives_spanish:
  - no vendrá sobre esta tierra
  - no acontecerá en esta tierra
  lexicon: HALOT
  rationale: La construcción existencial se vuelve natural en español con 'no habrá', sin perder la negación del anuncio sobre la tierra concreta.
- source_word: בַּחֶרֶב וּבָרָעָב
  english_pob_choice: by sword and by famine
  chosen_spanish: por espada y por hambre
  alternatives_spanish:
  - con espada y con hambre
  - mediante espada y hambre
  lexicon: HALOT
  rationale: El beth instrumental se refleja con 'por', que en español comunica bien el medio o instrumento del juicio y conserva el paralelismo.
- source_word: יִתַּמּוּ
  english_pob_choice: will be consumed
  chosen_spanish: serán consumidos
  alternatives_spanish:
  - perecerán
  - serán acabados
  - llegarán a su fin
  lexicon: HALOT
  rationale: '''Consumidos'' preserva la idea de ser llevados a término/destrucción en contexto de juicio, sin suavizarla demasiado.'
- source_word: הַנְּבִאִים הָהֵמָּה
  english_pob_choice: those prophets
  chosen_spanish: esos profetas
  alternatives_spanish:
  - aquellos profetas
  - los mismos profetas
  lexicon: HALOT
  rationale: El demostrativo enfatiza a los profetas ya identificados; 'esos' conserva la deíxis con un tono natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el criterio del proyecto de no enmascarar el Tetragrámaton y usar 'Yahvé' como forma principal en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética de denuncia contra falsos mensajeros
  english_pob_reading: the prophets who prophesy in my name though I did not send them
  chosen_spanish_reading: los profetas que profetizan en mi nombre, aunque yo no los envié
  alternative_spanish_readings:
  - los profetas que profetizan bajo mi nombre, aunque yo no los mandé
  - los profetas que hablan en mi nombre, aunque yo no los envié
  rationale: 'La traducción conserva la tensión teológica del texto: hablan con pretensión de autorización divina, pero carecen de envío real de Yahvé.'
  doctrine_reference: Jeremías 14:14–15; falso profetismo y autoridad divina
- issue: 'Calamidad anunciada: חֶרֶב וְרָעָב'
  english_pob_reading: Sword and famine
  chosen_spanish_reading: Espada y hambre
  alternative_spanish_readings:
  - guerra y hambre
  - espada y escasez
  rationale: Se mantiene el lenguaje profético concreto del hebreo en vez de generalizarlo a 'guerra', preservando la imagen judicial tradicional del pasaje.
  doctrine_reference: Jeremías 14:12–16; lenguaje de juicio profético
translation_notes:
  revision_awareness: La revisión inglesa más reciente simplificó 'who keep saying' a 'who say' para ajustar el participio hebreo con mayor directitud; por eso el español evita una paráfrasis iterativa y usa una fórmula simple ('y que dicen'). También se observó una nota previa sobre la alternativa 'war and famine'; aquí no se incorpora como lectura principal porque el hebreo literal conserva 'espada y hambre'.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' como forma consistente del nombre divino.
  - Se preserva 'espada' en lugar de 'guerra' para mantener el léxico profético literal del hebreo.
  - Se usa 'hambre' para רָעָב, no 'escasez', porque el contexto de juicio apunta a hambruna.
  - La construcción final 'serán consumidos' mantiene el pasivo de juicio sin añadir matiz interpretativo adicional.
