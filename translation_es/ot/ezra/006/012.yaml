base_translation:
  language: en
  yaml_path: translation/ot/ezra/006/012.yaml
  text: And may the God who has caused his name to dwell there overthrow any king or people who stretches out his hand to alter this[a], to destroy this house of God that is in Jerusalem. I, Darius, have issued a decree[b]; let it be done with all diligence.
  footnotes:
  - marker: a
    text: Or 'has set his name there.' The Aramaic idiom refers to God's covenantal identification of the temple as the place associated with his name.
    reason: lexical_alternative
  - marker: b
    text: Or 'speedily.' The adverb can emphasize prompt execution; 'with all diligence' brings out both promptness and careful compliance.
    reason: lexical_alternative
