translation:
  language: es
  text: 'Porque ¿quién dirá: «¿Qué has hecho?» o ¿quién se opondrá a tu juicio? ¿Y quién te acusará con respecto a las naciones que tú destruiste? ¿O quién se presentará ante ti[a] como vengador contra hombres injustos?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿quién se presentará para oponerse a ti como vengador contra personas injustas?». El giro griego detrás de «se presentará ante ti» es difícil y puede tener un sentido más abiertamente adversarial o legal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς γὰρ ἐρεῖ
  english_pob_choice: For who will say
  chosen_spanish: Porque ¿quién dirá
  alternatives_spanish:
  - Pues ¿quién dirá
  - Porque ¿quién podrá decir
  lexicon: BDAG
  rationale: Conserva la partícula explicativa γάρ con un ‘porque’ natural en español y mantiene la pregunta retórica.
- source_word: Τί ἐποίησας
  english_pob_choice: What have you done
  chosen_spanish: ¿Qué has hecho?
  alternatives_spanish:
  - ¿Qué has hecho tú?
  - ¿Qué hiciste?
  lexicon: BDAG
  rationale: La pregunta directa acusatoria se expresa de modo natural en español con presente perfecto, sin añadir ‘por qué’ ni suavizar el reto.
- source_word: ἀντιστήσεται
  english_pob_choice: will oppose
  chosen_spanish: se opondrá
  alternatives_spanish:
  - resistirá
  - se levantará contra
  lexicon: BDAG
  rationale: ‘Oponerse’ comunica la resistencia activa frente al juicio divino con español claro y sobrio.
- source_word: τῷ κρίματί σου
  english_pob_choice: your judgment
  chosen_spanish: a tu juicio
  alternatives_spanish:
  - a tu sentencia
  - a tu decreto
  lexicon: BDAG
  rationale: ‘Juicio’ conserva el sentido judicial amplio de κρίμα y fluye bien en la construcción española con ‘oponerse a’.
- source_word: ἐγκαλέσει σοι
  english_pob_choice: will bring a charge against you
  chosen_spanish: te acusará
  alternatives_spanish:
  - presentará una acusación contra ti
  - te imputará una culpa
  lexicon: BDAG
  rationale: En español, ‘acusará’ preserva el sentido forense de forma natural. La nota a pie de página conserva la posibilidad de un matiz más explícitamente legal/adversarial.
- source_word: κατὰ ἐθνῶν ἀπολωλότων
  english_pob_choice: concerning the nations that you destroyed
  chosen_spanish: respecto de las naciones que perecieron
  alternatives_spanish:
  - acerca de las naciones que tú destruiste
  - respecto de las naciones arruinadas
  lexicon: BDAG
  rationale: Se mantiene la idea de naciones ‘perdidas/perecidas’ como en el griego, evitando forzar de entrada ‘destruiste’ en el cuerpo principal; la nota aclara la interpretación contextual adoptada por la POB en inglés.
- source_word: ἃ σὺ ἐποίησας
  english_pob_choice: that you destroyed
  chosen_spanish: que tú hiciste
  alternatives_spanish:
  - que tú destruiste
  - que tú causaste
  lexicon: BDAG
  rationale: Se conserva la tensión literal de ἐποίησας (‘hiciste’) en el texto principal, sin borrar que el sentido contextual puede implicar ruina o destrucción; esa interpretación queda explicada en la nota.
- source_word: εἰς κατάστασίν σοι ἐλεύσεται
  english_pob_choice: will come before you
  chosen_spanish: se presentará ante ti
  alternatives_spanish:
  - vendrá a tu presencia
  - se pondrá ante ti
  lexicon: LSJ
  rationale: ‘Se presentará ante ti’ comunica el gesto formal/de auditorio que subyace a la expresión, sin resolver indebidamente la dificultad del giro griego.
- source_word: ἔκδικος
  english_pob_choice: as an avenger
  chosen_spanish: como vengador
  alternatives_spanish:
  - como defensor de la justicia
  - como ejecutor de venganza
  lexicon: BDAG
  rationale: ‘Vengador’ conserva el peso judicial y retributivo del término, en paralelo con la pregunta retórica.
- source_word: κατὰ ἀδίκων ἀνθρώπων
  english_pob_choice: against unrighteous men
  chosen_spanish: contra hombres injustos
  alternatives_spanish:
  - contra hombres malvados
  - contra personas injustas
  lexicon: BDAG
  rationale: Se mantiene el masculino plural del griego con un término que conserva la fuerza moral-jurídica de ἀδίκων.
theological_decisions:
- issue: Preguntas retóricas sobre la impugnabilidad del juicio divino
  english_pob_reading: The verse is rendered as a series of rhetorical questions asserting that no one can successfully challenge God's judicial acts.
  chosen_spanish_reading: La versión española conserva la cadena de preguntas retóricas que afirma que nadie puede impugnar con éxito el juicio de Dios.
  alternative_spanish_readings:
  - Una lectura más suave que subrayara solo la imposibilidad práctica de objetar
  - Una lectura menos forense que diluya el carácter judicial
  rationale: El griego presenta vocabulario legal y una estructura enfática de desafío; por eso la traducción mantiene el tono de impugnación judicial sin añadir tesis externas.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish without flattening theological weight.'
- issue: Sentido de ‘naciones que perecieron’ frente a ‘que tú hiciste’
  english_pob_reading: Literally, ‘concerning nations having perished, which you made/did.’ In context, the sense is that these are nations God brought to ruin.
  chosen_spanish_reading: El español principal conserva ‘las naciones que perecieron, que tú hiciste’, y la nota explica que el contexto apunta a naciones llevadas a la ruina por Dios.
  alternative_spanish_readings:
  - ‘las naciones que tú destruiste’
  - ‘las naciones arruinadas que tú hiciste’
  rationale: Así se preserva la tensión entre la literalidad del griego y la lectura contextual adoptada por la POB inglesa, sin ocultar ninguno de los dos niveles.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La edición inglesa más reciente añadió el artículo definido ‘the’ antes de ‘nations’ para hacer más natural la referencia; aquí se refleja con ‘las naciones’. También se preservó la tensión entre el literal ‘que tú hiciste’ y el sentido contextual de ruina/destrucción explicado en la nota.
  spanish_consistency_notes:
  - Se usó ‘Dios’ en la decisión teológica pero el versículo no nombra a Dios explícitamente en español, siguiendo el griego dirigido a ‘ti’.
  - Se mantuvo ‘juicio’ para κρίμα por claridad forense y consistencia con el tono judicial del pasaje.
  - Se conservó el masculino plural ‘hombres’ en ‘hombres injustos’ para respetar ἀνθρώπων en su valor gramatical y retórico.
  - La puntuación reproduce la serie interrogativa y la coordinación del griego sin convertirla en una sola frase declarativa.
