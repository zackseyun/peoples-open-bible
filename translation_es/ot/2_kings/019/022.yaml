translation:
  language: es
  text: ¿A quién has escarnecido y blasfemado? ¿Contra quién has alzado tu voz y levantado tus ojos en alto? Contra el Santo de Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «has reprochado» o «has vituperado». Los verbos hebreos son casi sinónimos de habla despectiva y ofensiva; el segundo puede llevar específicamente el sentido de blasfemar contra Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «has levantado tus ojos a lo alto», un modismo que expresa altivez o arrogancia.'
    reason: cultural_note
lexical_decisions:
- source_word: חֵרַפְתָּ
  english_pob_choice: mocked
  chosen_spanish: has insultado
  alternatives_spanish:
  - has escarnecido
  - has burlado
  - has reprochado
  lexicon: HALOT
  rationale: El hebreo expresa burla y desprecio ofensivo; en español, «insultado» conserva la fuerza injuriosa sin sonar forzado. «Escarnecido» es posible, pero más literario; «reprochado» pierde el matiz de afrenta.
- source_word: גִדַּפְתָּ
  english_pob_choice: blasphemed
  chosen_spanish: blasfemado
  alternatives_spanish:
  - vituperado
  - ultrajado
  - hablado con desprecio
  lexicon: HALOT
  rationale: Como el objeto final es el Dios de Israel, «blasfemado» preserva la gravedad teológica que el inglés POB marcó explícitamente. «Ultrajado» o «vituperado» atenúan el carácter sacrílego del verbo.
- source_word: הֲרִימוֹתָ קּוֹל
  english_pob_choice: raised your voice
  chosen_spanish: has alzado tu voz
  alternatives_spanish:
  - has levantado tu voz
  - has elevado tu voz
  lexicon: HALOT
  rationale: La expresión idiomática se rinde de forma natural en español con «alzado tu voz», manteniendo la imagen sin sobreexplicar. «Levantado» es también posible, pero «alzado» suena más idiomático en este giro.
- source_word: וַתִּשָּׂא מָרוֹם עֵינֶיךָ
  english_pob_choice: lifted your eyes on high
  chosen_spanish: levantado tus ojos en alto
  alternatives_spanish:
  - alzando tus ojos hacia lo alto
  - levantado tus ojos hacia arriba
  lexicon: HALOT
  rationale: El hebreo conserva la imagen de elevación altiva; «en alto» reproduce bien el componente idiomático y la posible arrogancia implícita sin añadir una glosa interpretativa. La forma elegida sigue de cerca la construcción semítica sin volverse rígida.
- source_word: קְדֹושׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo de Israelito
  lexicon: HALOT
  rationale: Es el título divino fijo y debe conservarse literalmente. «Santo» mantiene la forma tradicional y exacta del título sin sustituirlo por una paráfrasis.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - ante
  - hacia
  - contra
  lexicon: HALOT
  rationale: En ambos casos la preposición expresa dirección hostil; «contra» comunica con precisión la fuerza adversativa en español.
- source_word: מִי
  english_pob_choice: whom
  chosen_spanish: ¿A quién?
  alternatives_spanish:
  - ¿contra quién?
  - ¿a quién?
  lexicon: HALOT
  rationale: En español interrogativo, «¿a quién?» es la forma más natural y precisa para el objeto de los verbos; se repite con valor retórico en el paralelismo.
theological_decisions:
- issue: Gravedad teológica de la ofensa verbal contra Dios
  english_pob_reading: Use 'blasphemed' for גִדַּפְתָּ and retain the climactic identification 'Against the Holy One of Israel.'
  chosen_spanish_reading: Usar «blasfemado» para גִדַּפְתָּ y conservar «el Santo de Israel» como cierre culminante.
  alternative_spanish_readings:
  - usar «insultado» o «ultrajado»
  - parafrasear como «contra Dios»
  rationale: La versión española debe mantener explícito que la afrenta no es sólo política, sino sacrílega. «Blasfemado» y el título final «el Santo de Israel» preservan esa carga sin añadir doctrina ajena al hebreo.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Coincide con el dictamen de alta concordancia del control cruzado: no se requirieron revisiones posteriores. La redacción española procura mantener el paralelismo hebreo, la fuerza de la afrenta verbal y el título divino final sin neutralizar el matiz teológico.'
  spanish_consistency_notes:
  - Se conserva el paralelismo interrogativo y hostil con dos preguntas retóricas.
  - «El Santo de Israel» se mantiene como título divino fijo.
  - «Contra» traduce la fuerza adversativa de עַל en ambas instancias.
  - La segunda cola conserva el modismo de los ojos «en alto» mediante la nota, para no perder la imagen de soberbia.
