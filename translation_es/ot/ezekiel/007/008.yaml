revisions:
- from: Ahora[a], pronto derramaré mi ira sobre ti, y gastaré mi enojo contra ti; te juzgaré conforme a tus caminos[b], y pondré sobre ti todas tus abominaciones.
  to: Ahora[a], pronto derramaré mi ira sobre ti, y agotaré mi enojo[b] contra ti; te juzgaré conforme a tus caminos, y haré recaer sobre ti todas tus abominaciones.
  rationale: Se corrigió la ubicación y el contenido del pie [b] para que preserve la alternativa auditada del inglés en la cláusula de la ira agotada. También se ajustó «gastaré» a «agotaré» por mayor naturalidad y fidelidad semántica, y «pondré sobre ti» a «haré recaer sobre ti» para expresar mejor el sentido judicial de imponer sobre la ciudad las consecuencias de sus abominaciones.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:04:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura del hebreo y mantiene la inminencia temporal, el lenguaje judicial y la distinción entre los dos términos de ira divina. Sin embargo, en la cláusula final «pondré sobre ti todas tus abominaciones» es menos fiel al matiz documentado de נתן על en contexto de juicio, donde la POB auditada prefirió ‘bring ... upon you’, es decir, hacer recaer/imponer las consecuencias. Además, la nota [b] está anclada a «caminos», pero el contenido de esa nota no corresponde al pie inglés preservado para la cláusula de «gastaré mi enojo».
  spanish_quality_summary: El español es claro y digno, pero «gastaré mi enojo contra ti» suena algo forzado en español bíblico contemporáneo; «agotaré mi enojo contra ti» comunica mejor el curso completo de la ira sin perder fuerza. Asimismo, «haré recaer sobre ti» es más natural y preciso que «pondré sobre ti» en la última cláusula. La nota actual [b] es útil lexicalmente, pero no preserva la alternativa auditada más importante del inglés para וְכִלֵּיתִי אַפִּי.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Ira»/«enojo» preserva la distinción entre חֲמָה y אַף; «abominaciones» conserva bien תּוֹעֵבוֹת; «te juzgaré» mantiene el valor judicial de שפט. El ajuste recomendado es estilístico-lexical, no de glosario mayor.
  issues:
  - severity: medium
    issue: La nota [b] está asociada al segmento equivocado.
    rationale: El pie inglés [b] documenta una alternativa para וְכִלֵּיתִי אַפִּי בָּךְ (‘I will exhaust my anger on you’), pero en español se colocó en «tus caminos» y explica otra cosa. Eso rompe la trazabilidad del audit trail.
  - severity: medium
    issue: «Pondré sobre ti todas tus abominaciones» no expresa con suficiente claridad el sentido judicial de hacer recaer consecuencias.
    rationale: Según la decisión léxica auditada, נתן על aquí significa imponer o traer sobre alguien sus abominaciones como base/consecuencia del juicio. «Haré recaer sobre ti» o «traeré sobre ti» es más fiel e idiomático.
  - severity: low
    issue: «Gastaré mi enojo contra ti» es comprensible, pero suena menos natural en español que alternativas cercanas.
    rationale: El hebreo כלה con אף expresa agotar o llevar a término el enojo. «Agotaré mi enojo contra ti» conserva mejor la idea en español actual y además se alinea con la alternativa preservada en la nota auditada.
  revised_spanish_text: Ahora[a], pronto derramaré mi ira sobre ti, y agotaré mi enojo[b] contra ti; te juzgaré conforme a tus caminos, y haré recaer sobre ti todas tus abominaciones.
  revised_footnotes:
  - marker: a
    text: O «en breve» o «dentro de poco»; la expresión hebrea señala un juicio inminente.
    reason: lexical_alternative
  - marker: b
    text: O «agotaré mi enojo sobre ti». El modismo hebreo indica que la ira de Dios seguirá su curso completo contra la ciudad.
    reason: lexical_alternative
  revision_rationale: Se corrigió la ubicación y el contenido del pie [b] para que preserve la alternativa auditada del inglés en la cláusula de la ira agotada. También se ajustó «gastaré» a «agotaré» por mayor naturalidad y fidelidad semántica, y «pondré sobre ti» a «haré recaer sobre ti» para expresar mejor el sentido judicial de imponer sobre la ciudad las consecuencias de sus abominaciones.
