revisions:
- from: Cargaré la indignación de Yahvé[a], porque he pecado contra él, hasta que él defienda mi causa y haga justicia por mí. Él me sacará a la luz; veré su justicia.
  to: Soportaré la indignación de Yahvé, porque he pecado contra él, hasta que él defienda mi causa y haga justicia por mí. Él me sacará a la luz; veré su rectitud[a].
  rationale: Se revisa para 1) alinear בְּצִדְקָתוֹ con la decisión auditada del POB inglés, manteniendo en el texto principal el valor de «righteousness» mediante «rectitud» y preservando «justicia» como alternativa en nota; 2) corregir el anclaje de la nota al lugar correspondiente; y 3) mejorar la naturalidad del español con «Soportaré» en vez de «Cargaré».
  reviewer_model: gpt-5.4
