revisions:
- from: Pero yo solo iba muchas veces a Jerusalén para las fiestas[a], conforme está escrito para todo Israel en un decreto eterno[b], llevando las primicias, los diezmos del fruto y los primeros esquilmos.
  to: Pero yo solo iba muchas veces a Jerusalén para las fiestas[a], conforme está escrito para todo Israel en una ordenanza perpetua, llevando las primicias, los diezmos del fruto y las primeras esquilas[b].
  rationale: 'Se corrige la desalineación más importante del registro de auditoría: la nota léxica debe ir sobre προκουρίας, no sobre la fórmula legal. También se ajusta ''decreto eterno'' a ''ordenanza perpetua'' para reflejar mejor el matiz jurídico-cultual del griego y la rationale inglesa. Por último, se sustituye ''primeros esquilmos'' por ''primeras esquilas'' para mejorar la inteligibilidad sin perder la rareza relativa del término, manteniendo una nota que preserve la incertidumbre léxica documentada.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:32:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura principal: el énfasis de μόνος, el imperfecto habitual ἐπορευόμην πλεονάκις, el destino natural ''a Jerusalén'' pese a ἐν, la fórmula normativa καθὼς γέγραπται, y la lista cultual de primicias, diezmos y una rara obligación pastoral. Sin embargo, ''decreto eterno'' para ἐν προστάγματι αἰωνίῳ se aparta del audit trail inglés, que justificó específicamente ''everlasting ordinance'' como fórmula legal de estilo bíblico; en español ''ordenanza perpetua'' o equivalente conserva mejor ese registro. Además, la nota b del español está desalineada: el pie inglés b corresponde a προκουρίας (''first shearings''), no a προστάγματι αἰωνίῳ.'
  spanish_quality_summary: El texto es mayormente claro y legible en español bíblico moderno. 'Yo solo iba muchas veces' funciona, aunque 'yo solo' puede oírse levemente ambiguo en algunos contextos; aquí el sentido se entiende. La mayor debilidad estilística es 'primeros esquilmos', que en buena parte del español actual suele significar despojos o ganancias, no necesariamente el primer esquileo; esto puede confundir. 'Primeras esquilas' también suena técnica, pero es más cercana al campo semántico. Conviene además ajustar la puntuación y las notas para que el texto y los pies reflejen exactamente las decisiones léxicas relevantes.
  glossary_alignment: No hay conflictos con los glosarios mayores del proyecto. La terminología cultual 'primicias' y 'diezmos' está bien. La excepción necesaria es cambiar 'decreto eterno' a 'ordenanza perpetua' para alinearse mejor con la rationale documentada sobre πρόσταγμα / αἰώνιος. También debe preservarse en nota la rareza de προκουρίας como 'primeras esquilas' o 'primeras porciones del esquileo'.
  issues:
  - severity: high
    issue: La nota al pie b está anclada al sintagma equivocado.
    rationale: En el audit trail inglés, la nota b explica el término raro προκουρίας ('first shearings'), no 'everlasting ordinance'. El español trasladó esa nota a 'decreto eterno', perdiendo una aclaración léxica importante y creando desalineación documental.
  - severity: medium
    issue: '''Decreto eterno'' no refleja tan bien la fórmula legal del original como ''ordenanza perpetua''.'
    rationale: πρόσταγμα en este contexto legal/cultual se acerca más a mandato/ordenanza que a 'decreto', y αἰώνιος en fórmula legal se expresa con naturalidad bíblica como 'perpetua'. Esto sigue mejor la rationale inglesa documentada.
  - severity: medium
    issue: '''Primeros esquilmos'' puede resultar engañoso en español contemporáneo.'
    rationale: '''Esquilmos'' suele entenderse como restos, provechos o despojos, no específicamente la primera lana o primera porción del esquileo. Dado que el griego es raro pero probablemente se refiere al primer esquileo, conviene una forma más transparente con nota aclaratoria.'
  revised_spanish_text: Pero yo solo iba muchas veces a Jerusalén para las fiestas[a], conforme está escrito para todo Israel en una ordenanza perpetua, llevando las primicias, los diezmos del fruto y las primeras esquilas[b].
  revised_footnotes:
