translation:
  language: es
  text: 'Así gastaré mi ira sobre el muro y sobre los que lo recubrieron con cal[a], y les diré: «El muro ya no existe, y tampoco existen los que lo recubrieron»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con mortero sin mezclar». El término hebreo puede referirse a una capa superficial o deficiente; «cal» se ajusta mejor a la imagen en este contexto, mientras que la traducción tradicional se conserva como alternativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלֵּיתִי
  english_pob_choice: So I will spend
  chosen_spanish: Así gastaré
  alternatives_spanish:
  - Consumiré
  - Exhaustaré
  - Acabaré de derramar
  lexicon: HALOT
  rationale: כלה en piel con objeto de ira expresa llevar la ira hasta su total consumación. «Gastaré» conserva la idea de expendio/completación y suena natural en español sin perder la imagen de una ira plenamente ejercida.
- source_word: חֲמָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi furor
  - mi indignación
  lexicon: HALOT
  rationale: חֵמָה/חֲמָה denota ira intensa, a menudo judicial. «Ira» comunica bien esa fuerza en español y mantiene el tono profético.
- source_word: בַּקִּיר
  english_pob_choice: on the wall
  chosen_spanish: sobre el muro
  alternatives_spanish:
  - contra el muro
  - en el muro
  lexicon: HALOT
  rationale: El hebreo usa ב con el objeto de juicio. «Sobre el muro» preserva la imagen concreta del castigo que recae sobre el muro; «contra» sería más interpretativo.
- source_word: וּבַטָּחִים אֹתוֹ תָּפֵל
  english_pob_choice: and against those who plastered it with whitewash
  chosen_spanish: y sobre los que lo recubrían con encalado
  alternatives_spanish:
  - y sobre los que lo enlucían con blanqueo
  - y sobre los que lo plasteraban con cal
  lexicon: HALOT
  rationale: טָחַ / טָּחִים refiere a recubrir o enlucir; en este contexto el revestimiento es un encalado engañoso. «Recubrían con encalado» conserva la acción y el efecto visual sin introducir una explicación ajena al texto.
- source_word: תָּפֵל
  english_pob_choice: whitewash
  chosen_spanish: encalado
  alternatives_spanish:
  - blanqueo
  - enlucido
  - cal
  lexicon: HALOT
  rationale: En Ezequiel 13 el término apunta a una capa superficial e inadecuada. «Encalado» transmite el revestimiento blanco y provisional; se evita «mortero sin mezclar» en el texto principal porque en español moderno oscurece la imagen.
- source_word: וְאֹמַר לָכֶם
  english_pob_choice: and I will say to you
  chosen_spanish: y les diré
  alternatives_spanish:
  - y les hablaré
  - y les diré a ustedes
  lexicon: HALOT
  rationale: La forma verbal profética se vierte de modo directo y natural. «Les diré» conserva la inmediatez del anuncio.
- source_word: אֵין הַקִּיר
  english_pob_choice: The wall is no more
  chosen_spanish: El muro ya no existe
  alternatives_spanish:
  - El muro no es más
  - Ya no hay muro
  lexicon: HALOT
  rationale: אֵין expresa inexistencia. «Ya no existe» mantiene la solemnidad del juicio y evita una lectura meramente espacial.
- source_word: וְאֵין הַטָּחִים אֹתוֹ
  english_pob_choice: and those who plastered it are no more
  chosen_spanish: y tampoco existen los que lo recubrían
  alternatives_spanish:
  - y ya no hay quienes lo recubrían
  - y los que lo enlucían no existen
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la primera cláusula y el mismo verbo de recubrir para que el lector perciba la correspondencia entre muro y revestidores.
theological_decisions:
- issue: Conservar la imagen de muro y revestimiento sin explicación explícita en el versículo
  english_pob_reading: Retain the concrete image of a wall and whitewash without explicating the metaphor in the main text.
  chosen_spanish_reading: Conservar la imagen concreta del muro y del encalado, sin explicitar en el texto principal la identificación con los falsos profetas.
  alternative_spanish_readings:
  - Explicitar directamente a los falsos profetas y su engaño en el versículo
  - Parafrasear para que el lector entienda de inmediato la referencia alegórica
  rationale: El contexto amplio identifica la metáfora, pero este versículo presenta el juicio en imágenes. Mantener la imagen protege la fuerza profética y evita añadir información no dicha aquí.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se refleja la revisión más reciente al preferir un inicio formal («Así») y se mantiene la estructura paralela del hebreo: juicio sobre el muro, juicio sobre los que lo recubren, y la declaración final de inexistencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se mantiene «muro» y no «pared» para conservar la imagen profética concreta y el paralelismo con el revestimiento.
  - Se eligió un registro formal y claro, compatible con lectura eclesial amplia en español latinoamericano.
