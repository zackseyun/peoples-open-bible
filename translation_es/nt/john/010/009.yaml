translation:
  language: es
  text: Yo soy la puerta. Si alguno entra por mí[a], será salvo; entrará y saldrá, y hallará pasto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «portón». La palabra griega puede denotar una puerta o un portón; «puerta» se conserva en el texto principal como la traducción léxica más directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: θύρα
  english_pob_choice: door
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - entrada
  - gate
  lexicon: BDAG
  rationale: θύρα designa de manera básica una puerta o entrada. En español, «puerta» es el equivalente directo y natural para conservar la metáfora joánica tal como está expresada. «Portón» o «entrada» podrían sonar más contextuales, pero desplazan el valor lexical más inmediato; por eso se mantiene «puerta», y la alternativa contextual se reserva en nota.
- source_word: δι’ ἐμοῦ
  english_pob_choice: through me
  chosen_spanish: por mí
  alternatives_spanish:
  - a través de mí
  - mediante mí
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o agencia. En español, «por mí» comunica con claridad el acceso mediado por Jesús y es la forma más natural en esta construcción. «A través de mí» es posible, pero resulta un poco más marcado; «mediante mí» enfatiza el medio de forma más técnica.
- source_word: ἐάν τις εἰσέλθῃ
  english_pob_choice: If anyone enters
  chosen_spanish: Si alguno entra
  alternatives_spanish:
  - Si alguien entra
  - Si alguno llegare a entrar
  lexicon: BDAG
  rationale: La estructura condicional general se expresa de modo idiomático con «Si alguno entra». «Alguno» conserva mejor el matiz indefinido de τις y suena suficientemente natural en español bíblico contemporáneo; «alguien» también sería posible, pero «alguno» mantiene con más fidelidad el alcance general.
- source_word: σωθήσεται
  english_pob_choice: he will be saved
  chosen_spanish: será salvo
  alternatives_spanish:
  - será salvado
  - será rescatado
  - será librado
  lexicon: BDAG
  rationale: σῴζω puede significar salvar, rescatar o librar, según el contexto. Aquí, como en el audit trail inglés, conviene mantener la amplitud soteriológica sin reducirla a mera seguridad física. «Será salvo» es una formulación clara, bíblica y directa; «será salvado» suena más pasivo-mecánico en español.
- source_word: εἰσελεύσεται καὶ ἐξελεύσεται
  english_pob_choice: will go in and go out
  chosen_spanish: entrará y saldrá
  alternatives_spanish:
  - irá adentro y afuera
  - irá y vendrá
  lexicon: BDAG
  rationale: Los futuros medios se traducen con un par verbal natural en español que preserve el movimiento opuesto. «Entrará y saldrá» mantiene la imagen sin sobrerinterpretarla. «Irá y vendrá» sugeriría otra dinámica y perdería la correspondencia con el texto.
- source_word: νομὴν
  english_pob_choice: pasture
  chosen_spanish: pasto
  alternatives_spanish:
  - pastura
  - pasto para pastar
  - pradera
  lexicon: BDAG
  rationale: νομὴ denota pasto o lugar de pastoreo. En español, «pasto» comunica de forma simple y directa la imagen pastoral. «Pastura» es posible, pero menos común en muchas zonas; «pradera» puede sonar demasiado descriptivo y menos exacto en el marco del rebaño.
- source_word: εὑρήσει
  english_pob_choice: find
  chosen_spanish: hallará
  alternatives_spanish:
  - encontrará
  - obtendrá
  lexicon: BDAG
  rationale: εὑρίσκω significa encontrar/hallar. «Hallará» ofrece una cadencia bíblica sobria y conserva el sentido básico. «Encontrará» también sería correcto, pero «hallará» se integra mejor en la frase final sin perder claridad.
theological_decisions:
- issue: Metáfora de θύρα en un contexto pastoril
  english_pob_reading: door
  chosen_spanish_reading: puerta
  alternative_spanish_readings:
  - portón
  - entrada
  rationale: La metáfora de Jesús como θύρα se mantiene de forma directa con «puerta», que reproduce el valor lexical principal y conserva la formulación joánica. «Portón» o «entrada» podrían intentar explicitar el contexto de redil, pero no son necesarias y podrían desplazar la imagen textual. La alternativa contextual se deja en nota por fidelidad al audit trail.
  doctrine_reference: Principios de traducción, metáfora y equivalencia óptima
- issue: Alcance de σωθήσεται
  english_pob_reading: will be saved
  chosen_spanish_reading: será salvo
  alternative_spanish_readings:
  - será rescatado
  - será librado
  rationale: No conviene reducir la frase a una mera protección material ni volverla más técnica de lo que el texto exige. «Será salvo» preserva el registro salvífico del evangelio de Juan y deja abierta la tensión entre seguridad pastoral y salvación teológica, tal como lo hace el texto griego y el audit trail inglés.
  doctrine_reference: Soteriología joánica; principios de preservación del sentido
translation_notes:
  revision_awareness: El pasaje coincide con el último pase revisado y no requiere cambios respecto del consenso alto del audit trail; la redacción española sigue la misma resolución léxica principal, especialmente en θύρα, δι’ ἐμοῦ y σωθήσεται.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «puerta» y no un término más interpretativo para θύρα, en continuidad con la decisión inglesa documentada.
  - Se conserva el registro soteriológico de «será salvo» sin neutralizarlo en «rescatado» o «librado».
  - Se evita el calco excesivo en la secuencia verbal final, optando por un español fluido pero semánticamente fiel.
