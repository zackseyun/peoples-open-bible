review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura y el sentido del hebreo: negación de permanencia en la tierra de Yahvé, retorno de Efraín a Egipto, y consumo de comida/lo impuro en Asiria. Mantiene correctamente la tensión Egipto/Asiria y la fuerza cultual de טָמֵא. Sin embargo, la elección principal ''habitarán'' para יֵשְׁבוּ atenúa el matiz contextual de permanencia continuada que el expediente inglés justificó como ''remain''; en español ''permanecerán'' expresa mejor la pérdida de residencia por exilio.'
  spanish_quality_summary: 'El español es claro y digno, pero la nota [a] está mal formulada: repite una lectura positiva (''habitarán'') en lugar de reflejar la alternativa bajo negación. Además, si se adopta ''permanecerán'' en el texto, la alternativa natural sería ''habitarán'' o ''morarán''. El resto del versículo es publicable y natural; ''alimento impuro'' es aceptable, aunque ''comida impura'' sería un poco más idiomático.'
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יהוה -> ''Yahvé'', אֶפְרַיִם -> ''Efraín'', מִצְרַיִם -> ''Egipto'', אַשּׁוּר -> ''Asiria''. La decisión sobre טָמֵא como ''impuro'' preserva la impureza ritual. No hay conflicto glosarial mayor; la revisión principal es contextual y de nota.'
  issues:
  - severity: medium
    issue: יֵשְׁבוּ se traduce como 'habitarán' en lugar de una forma que refleje mejor 'remain' en contexto de exilio.
    rationale: Aunque 'habitar' no es incorrecto, el contexto de juicio ('no ... en la tierra de Yahvé') apunta a dejar de permanecer/residir en la tierra. 'Permanecerán' comunica más claramente la expulsión y coincide mejor con la racionalidad documentada del POB.
  - severity: high
    issue: La nota [a] está invertida/defectuosa.
    rationale: El texto dice 'No habitarán ...', pero la nota ofrece 'O 'habitarán en la tierra de Yahvé'', omitiendo la negación y por tanto alterando el sentido. La nota debe dar una alternativa fiel, por ejemplo 'O "morarán en la tierra de Yahvé"' anclada al verbo negado en contexto.
  revised_spanish_text: No permanecerán en la tierra de Yahvé[a]; Efraín volverá a Egipto[b], y en Asiria comerán alimento impuro[c].
  revised_footnotes:
  - marker: a
    text: O "morarán en la tierra de Yahvé".
    reason: lexical_alternative
  - marker: b
    text: '"Egipto" puede entenderse de modo literal o como imagen tipológica de nueva esclavitud/exilio; el hebreo mantiene la tensión junto con la referencia a Asiria.'
    reason: theological_note
  - marker: c
    text: O "comida impura" o "lo impuro".
    reason: lexical_alternative
  revision_rationale: Se ajusta יֵשְׁבוּ a 'permanecerán' para reflejar mejor el matiz contextual de residencia continuada perdida por el exilio, en línea con el expediente fuente. También se corrige la nota [a], que en el borrador omitía la negación y por ello deformaba el sentido. Se mantienen las demás decisiones porque son fieles, naturales y coherentes con la terminología del proyecto.
