translation:
  language: es
  text: El hombre llevó a los hombres a casa de José y les dio agua[a], y ellos se lavaron los pies[c][b]; luego dio forraje a sus asnos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «condujo a los hombres a casa de José».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «el hombre» y «los hombres»; el versículo no identifica explícitamente al hombre como mayordomo de José ni a los hombres como sus hermanos, aunque el contexto aclara ambas cosas.
    reason: cultural_note
  - marker: c
    text: O «El hombre llevó a los hombres a casa de José, les dio agua, y ellos se lavaron los pies; luego dio forraje a sus asnos».
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: brought
  chosen_spanish: llevó
  alternatives_spanish:
  - trajo
  - condujo
  lexicon: HALOT
  rationale: El verbo hifil de בוא expresa causar que entren o se desplacen hacia un lugar. En español, «llevó» conserva bien el movimiento conducido y suena natural; «trajo» puede sugerir un punto de llegada diferente, y «condujo» es posible pero algo más marcado.
- source_word: הָאִישׁ
  english_pob_choice: The man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el oficial
  - el siervo
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el hombre». Se preserva esa forma porque el texto no identifica explícitamente aquí su cargo, aunque el contexto lo haga claro.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los hermanos
  lexicon: HALOT
  rationale: Se mantiene el sustantivo genérico del hebreo. «Los hermanos» explicita algo que el versículo no dice de forma directa.
- source_word: בֵּיתָה יוֹסֵף
  english_pob_choice: into Joseph’s house
  chosen_spanish: a la casa de José
  alternatives_spanish:
  - dentro de la casa de José
  - a casa de José
  lexicon: HALOT
  rationale: El sufijo direccional de ביתָה señala movimiento hacia el interior, pero en español «a la casa de José» comunica de modo natural la entrada sin forzar una calca.
- source_word: וַיִּתֶּן מַיִם
  english_pob_choice: gave them water
  chosen_spanish: les dio agua
  alternatives_spanish:
  - les proporcionó agua
  - les entregó agua
  lexicon: HALOT
  rationale: El sujeto implícito se expresa con el objeto indirecto «les» para una frase idiomática en español. «Agua» reproduce el sustantivo común del hebreo sin añadir matices innecesarios.
- source_word: וַיִּרְחֲצוּ רַגְלֵיהֶם
  english_pob_choice: and they washed their feet
  chosen_spanish: y ellos se lavaron los pies
  alternatives_spanish:
  - y se lavaron los pies
  - y les lavaron los pies
  lexicon: HALOT
  rationale: El verbo está en plural activo; por eso se conserva la acción realizada por ellos mismos. Se evita la pasiva o una formulación que sugiera que otro les lavó los pies, porque el hebreo no lo dice.
- source_word: מִסְפּוֹא
  english_pob_choice: fodder
  chosen_spanish: forraje
  alternatives_spanish:
  - pienso
  - alimento
  lexicon: HALOT
  rationale: El término designa alimento para animales. «Forraje» es claro y suficientemente preciso en español contemporáneo; «pienso» es posible pero más técnico, y «alimento» es demasiado general.
- source_word: לַחֲמֹרֵיהֶם
  english_pob_choice: to their donkeys
  chosen_spanish: a sus burros
  alternatives_spanish:
  - para sus burros
  - a sus asnos
  lexicon: HALOT
  rationale: Se conserva el referente animal con una palabra natural en español. «Burros» es comprensible y no demasiado arcaico; «asnos» sería más literal pero más elevado o literario.
theological_decisions:
- issue: Identificación del hombre y de los hombres sin añadir precisión no expresada en el versículo
  english_pob_reading: The verse does not explicitly identify the man as Joseph’s steward or the men as Joseph’s brothers, though the context makes both clear.
  chosen_spanish_reading: El versículo no identifica explícitamente al hombre como mayordomo de José ni a los hombres como sus hermanos, aunque el contexto lo deja claro.
  alternative_spanish_readings:
  - El mayordomo llevó a los hermanos...
  - José hizo entrar a sus hermanos...
  rationale: 'Se preserva la tensión documentada por el POB inglés: el contexto aclara la identidad, pero el versículo mismo usa términos generales. La traducción no introduce una identificación que el hebreo de este versículo no formula.'
  doctrine_reference: Principio de sobriedad textual; evitar sobredeterminación del referente.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió la paralelización torpe del verso y mantuvo el contenido sin cambios sustantivos. La versión española sigue esa estructura fluida de una sola oración: acción de entrada, provisión de agua, lavado de los pies y entrega de forraje.'
  spanish_consistency_notes:
  - Se mantuvo «José» para יוֹסֵף conforme al nombre propio estándar.
  - Se optó por «forraje» para מִסְפּוֹא y no por un calco más técnico o arcaico.
  - No se introdujo «señor» ni «mayordomo», porque el hebreo del versículo no los expresa.
  - Se usó «burros» como equivalente natural de חֲמֹרִים; en este contexto conserva bien el referente animal sin elevar el registro.
