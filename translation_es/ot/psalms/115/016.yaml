revisions:
- from: Los cielos son los cielos de Yahvé[a][c], pero la tierra la ha dado a los hijos de hombre[b].
  to: Los cielos son de Yahvé[a][c], pero la tierra la ha dado a los hijos de los hombres[b].
  rationale: Se revisa la primera cláusula para lograr un español más natural sin perder el sentido posesivo del hebreo, dejando la repetición enfática explícita en la nota. Se corrige «hijos de hombre» a «hijos de los hombres», que preserva mejor la forma representativa del hebreo en español bíblico natural. También se mantiene «Yahvé» conforme al estándar del proyecto y se conserva el contraste con «pero».
