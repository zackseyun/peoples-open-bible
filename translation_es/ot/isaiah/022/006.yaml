translation:
  language: es
  text: Y Elam llevó la aljaba con carros y jinetes[a], y Kir descubrió el escudo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con carros de hombres y jinetes», o «en carros con hombres y jinetes». El hebreo condensa la lista militar, y la relación exacta entre «carros», «hombres» y «jinetes» es difícil de expresar con precisión en español.
    reason: lexical_alternative
  - marker: b
    text: O «dejó al descubierto el escudo» o «desnudó el escudo», probablemente con el sentido de prepararlo para la batalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - Elam
  lexicon: HALOT
  rationale: Nombre propio de pueblo/lugar; se translitera en español igual que en inglés.
- source_word: נָשָׂא
  english_pob_choice: bore
  chosen_spanish: llevó
  alternatives_spanish:
  - cargó
  - tomó
  lexicon: HALOT
  rationale: En contexto militar, el verbo expresa tomar o portar equipo; «llevó» mantiene la acción de portar sin sonar tan literal o arcaizante como «bore» en español.
- source_word: אַשְׁפָּה
  english_pob_choice: the quiver
  chosen_spanish: el aljaba
  alternatives_spanish:
  - la aljaba
  - el carcaj
  lexicon: HALOT
  rationale: El término se refiere al recipiente de flechas. En español, «aljaba» o «carcaj» son equivalentes; se eligió «aljaba» por su registro bíblico y claridad.
- source_word: בְּרֶכֶב
  english_pob_choice: with chariots
  chosen_spanish: con carros
  alternatives_spanish:
  - en carros
  - junto con carros
  lexicon: HALOT
  rationale: La preposición y el sustantivo permiten una relación asociativa/instrumental. «Con carros» conserva la lista militar comprimida sin forzar una sintaxis más pesada.
- source_word: פָּרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - caballeros
  lexicon: HALOT
  rationale: Corresponde a hombres montados; «jinetes» es la equivalencia natural y transparente en español.
- source_word: קִיר
  english_pob_choice: Kir
  chosen_spanish: Kir
  alternatives_spanish:
  - Kir
  lexicon: HALOT
  rationale: Nombre propio de lugar/pueblo; se translitera.
- source_word: עֵרָה
  english_pob_choice: uncovered
  chosen_spanish: descubrió
  alternatives_spanish:
  - dejó al descubierto
  - desnudó
  lexicon: HALOT
  rationale: El verbo significa hacer desnudo o dejar descubierto. «Descubrió» conserva la imagen y es idiomático en español, sin cerrar por completo la posible idea militar de preparar el escudo.
- source_word: מָגֵן
  english_pob_choice: the shield
  chosen_spanish: el escudo
  alternatives_spanish:
  - escudo
  lexicon: HALOT
  rationale: Objeto militar singular; «el escudo» reproduce la imagen directa del hebreo y encaja con el contexto bélico.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó «men» de la lista, por considerar que no estaba representado como elemento separado. El español sigue esa revisión al no introducir «hombres» como elemento independiente, pero conserva la estructura compacta del hebreo con una nota alternativa para la posible lectura sintáctica.
  spanish_consistency_notes:
  - Se mantuvo la transliteración de los nombres propios Elam y Kir.
  - Se eligió un español moderno y bíblico, evitando calcos innecesarios.
  - «Jinetes» expresa mejor que «caballería» el valor de פָּרָשִׁים como montados individuales.
  - La nota textual sobre la lista militar evita sobreespecificar la relación sintáctica del hebreo.
