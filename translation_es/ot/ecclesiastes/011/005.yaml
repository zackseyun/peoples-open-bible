base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/011/005.yaml
  text: Just as you do not know the way of the wind[a], or how the bones form in the womb of a pregnant woman, so you do not know the work of God[b], who makes everything.
  footnotes:
  - marker: a
    text: Or 'the way of the spirit' or 'how the breath goes'; Hebrew רוּחַ can mean 'wind,' 'breath,' or 'spirit.'
    reason: alternative_reading
  - marker: b
    text: Literally 'in the womb of the full one,' an idiom for a pregnant woman.
    reason: cultural_note
