  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del rastro auditado en inglés: el rey de Asiria descubre una conspiración en Oseas, Oseas había enviado mensajeros a So rey de Egipto, dejó de enviar tributo regularmente, y luego el rey de Asiria primero lo restringe/detiene y después lo ata/encarcela. Sin embargo, faltan notas que el inglés preservó para ''So'', para el matiz de ''hacer subir/no había hecho subir tributo'', y para la distinción secuencial entre los dos verbos finales. Además, en español ''en la prisión'' suena menos natural que ''en prisión'', y conviene quitar la coma tras ''So'' para no sugerir una aposición más pesada de lo necesario, siguiendo la revisión inglesa.'
