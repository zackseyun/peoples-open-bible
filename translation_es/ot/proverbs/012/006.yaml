  text: The words of the wicked are an ambush for blood[b][a], but the mouth of the upright delivers them.
  footnotes:
  - marker: a
    text: Or 'lie in wait for blood.' The Hebrew expression pictures the wicked's words as a deadly ambush.
    reason: lexical_alternative
  - marker: b
    text: '''Them'' refers generally to those threatened by such violence; some understand the sense more reflexively, ''the mouth of the upright delivers them themselves'' or simply ''delivers.'''
    reason: lexical_alternative
