translation:
  language: es
  text: 'Sus palabras han sido duras[a] contra mí —dice Yahvé—. Pero ustedes dicen: «¿Qué hemos hablado contra ti?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han sido severas contra mí». El hebreo dice literalmente «han sido fuertes contra mí», usando «fuerte» de modo idiomático para un habla dura o agresiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזְקוּ
  english_pob_choice: have been hard
  chosen_spanish: han sido duras
  alternatives_spanish:
  - han sido fuertes
  - han sido severas
  - han sido ásperas
  lexicon: HALOT
  rationale: El hebreo usa literalmente la idea de ‘ser fuertes’, pero con ‘palabras’ y la preposición adversativa el sentido idiomático es de habla severa o ofensiva. ‘Han sido duras’ conserva la imagen de fuerza sin sonar forzado en español.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - acerca de mí
  lexicon: HALOT
  rationale: En este contexto עַל tiene un valor adversativo. ‘Contra mí’ refleja mejor el tono acusatorio que ‘sobre mí’ o ‘acerca de mí’.
- source_word: דִּבְרֵיכֶם
  english_pob_choice: your words
  chosen_spanish: tus palabras
  alternatives_spanish:
  - sus palabras
  - sus dichos
  - su hablar
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo posesivo se traduce de forma directa como ‘palabras’. En el texto español conviene el tuteo reverencial dirigido a Yahvé, como hace el hebreo con el singular de segunda persona en la réplica.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - afirma Yahvé
  - declara Yahvé
  - dice el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino ‘Yahvé’ según el estándar del proyecto. El presente profético ‘dice’ es natural en español y reproduce la fórmula oracular del hebreo.
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: But you say
  chosen_spanish: Pero ustedes dicen
  alternatives_spanish:
  - Y ustedes dicen
  - Sin embargo, ustedes dicen
  - Pero dicen
  lexicon: HALOT
  rationale: La conjunción introduce la objeción del pueblo en contraste con la acusación divina. ‘Pero ustedes dicen’ es claro y mantiene el cambio de interlocutor.
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Cómo
  - ¿En qué
  lexicon: HALOT
  rationale: La partícula interrogativa se vierte con el español más directo y natural para una negación del cargo.
- source_word: נִּדְבַּרְנוּ
  english_pob_choice: have we spoken
  chosen_spanish: hemos hablado
  alternatives_spanish:
  - hemos dicho
  - hemos conversado
  - nos hemos expresado
  lexicon: HALOT
  rationale: El nifal de דבר en este contexto de disputa se expresa con el verbo ‘hablar’. ‘Hemos hablado’ mantiene la forma de protesta del pueblo y evita sobre-explicar.
- source_word: עָלֶיךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - acerca de ti
  - sobre ti
  lexicon: HALOT
  rationale: La repetición del valor adversativo de עַל en la segunda mitad del versículo justifica ‘contra ti’, paralela a ‘contra mí’ en la primera cola.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue el principio del proyecto de renderizar directamente el Tetragrámaton como ‘Yahvé’, evitando la sustitución por un título. Esto preserva la identidad del nombre del pacto en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y la construcción hebrea, manteniendo el valor adversativo de עַל, el presente profético de la fórmula divina y la pregunta de réplica del pueblo sin añadir explicaciones que no estén en el texto fuente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera uniforme para יהוה.
  - 'Se conserva el paralelismo adversativo: ‘contra mí’ / ‘contra ti’.'
  - Se mantiene un registro bíblico claro y moderno, sin calcos innecesarios.
  - La nota al pie preserva la tensión lexical entre ‘duro’, ‘severo’ y ‘fuerte’ sin eliminar la imagen original.
