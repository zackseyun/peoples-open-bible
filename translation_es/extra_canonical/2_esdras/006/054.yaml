    changes_summary: 'Adjusted wording for closer alignment with the Latin: changed ''and over these, Adam'' to ''And over these is Adam'' to supply the implied verb, joined the clauses more naturally with a semicolon, and retained all source elements in formal, readable English.'
translation:
  language: es
  text: Y sobre estos está Adán[a], a quien constituiste gobernante sobre todas las obras que hiciste; y de él todos nosotros hemos venido, el pueblo que tú has elegido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «De él todos nosotros hemos venido, y el pueblo que tú has elegido»; es decir, una lectura que separa ''todos nosotros'' de ''el pueblo''.'
    reason: alternative_reading_preserved_from_english_audit
lexical_decisions:
- source_word: Adam
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - Adam
  lexicon: antropónimo bíblico
  rationale: El nombre propio se adapta a la forma española usual, conservando la referencia al primer hombre del pasaje.
- source_word: ruler over all the works that you made
  english_pob_choice: whom you appointed ruler over all the works that you made
  chosen_spanish: a quien constituiste gobernante sobre todas las obras que hiciste
  alternatives_spanish:
  - a quien nombraste gobernante sobre todas tus obras
  - a quien estableciste como soberano sobre todas las obras que hiciste
  lexicon: léxico de autoridad/regencia
  rationale: Gobernante transmite el valor de autoridad delegada sin forzar un registro monárquico más fuerte que el latino; 'constituiste' conserva la idea de designación/apuntamiento.
- source_word: from him we all have come
  english_pob_choice: and from him we all have come
  chosen_spanish: y de él todos nosotros hemos venido
  alternatives_spanish:
  - y de él hemos venido todos nosotros
  - y de él procedemos todos
  lexicon: origen/procedencia
  rationale: '''Hemos venido'' reproduce la procedencia a partir de Adán; se evita una traducción demasiado interpretativa como ''descendemos'' porque el latino dice ''ex eo educimur''.'
- source_word: the people whom you have chosen
  english_pob_choice: the people whom you have chosen
  chosen_spanish: el pueblo que tú has elegido
  alternatives_spanish:
  - el pueblo que has escogido
  - el pueblo elegido por ti
  lexicon: elección/pueblo
  rationale: '''Pueblo'' conserva el referente colectivo del latino ''populum'' y ''has elegido'' sigue de cerca el verbo de elección sin introducir matices adicionales.'
theological_decisions:
- issue: Relación entre Adán, el pueblo elegido y el origen común
  english_pob_reading: From him we all have come, the people whom you have chosen.
  chosen_spanish_reading: y de él todos nosotros hemos venido, el pueblo que tú has elegido.
  alternative_spanish_readings:
  - y de él todos nosotros hemos venido, y somos el pueblo que tú has elegido
  - y de él hemos venido todos, el pueblo que tú has elegido
  rationale: Se conserva la aposición implícita del latín entre 'nosotros' y 'el pueblo' para no dividir en dos grupos distintos a los que proceden de Adán y al pueblo elegido; esto sigue la revisión auditada que corrigió la inserción indebida de una conjunción separadora.
  doctrine_reference: Identidad corporativa del pueblo escogido y procedencia común de Adán; coherencia interna con el argumento del pasaje.
translation_notes:
  revision_awareness: 'La revisión auditada corrigió un desdoblamiento indebido del miembro final: el texto no debe separar ''todos nosotros'' de ''el pueblo que tú has elegido'' como si fueran dos sujetos distintos. La redacción española mantiene la estructura unitaria del latín y evita introducir una conjunción que altere la lógica del pasaje.'
  spanish_consistency_notes:
  - Se usa 'Adán' para el nombre propio y 'pueblo' para 'populum', manteniendo la referencia corporativa.
  - Se conserva 'has elegido' en segunda persona singular para reflejar el discurso directo a Dios.
  - No se introduce 'SEÑOR'; el vocativo latino 'domine' se refleja implícitamente en el discurso a Dios del contexto transmitido por la unidad seleccionada.
