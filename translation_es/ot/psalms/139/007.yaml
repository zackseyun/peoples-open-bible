revisions:
- from: ¿A dónde podría ir[a] lejos de tu Espíritu? ¿Y a dónde huiría de tu presencia?
  to: ¿A dónde puedo ir[a] de tu Espíritu? ¿O a dónde puedo huir de tu presencia?
  rationale: Se elimina «lejos de» por ser una expansión interpretativa; se ajusta la segunda pregunta a un paralelismo modal más claro con «puedo»; y se cambia «Y» por «O» para reflejar mejor la decisión auditada y la estructura poética. La nota sobre «rúaj» se conserva sin cambios.
