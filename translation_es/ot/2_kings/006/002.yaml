- from: 'Por favor, vamos hasta el Jordán[a], y que cada hombre tome de allí una viga[b], y hagámonos allí un lugar para vivir[c] allí.” Y él dijo: “Vayan.”'
  to: '«Por favor, vayamos al Jordán[a], y que cada uno tome de allí una viga[b], y hagamos allí un lugar para habitar[c].» Y él dijo: «Vayan.»'
  rationale: Se ajustó el cohortativo cortés a «vayamos», se hizo idiomático el destino con «al Jordán», se mejoró la naturalidad con «cada uno» conservando la precisión distributiva en nota, y se elevó ligeramente el registro a «habitar» para corresponder mejor a לָשֶׁבֶת y al audit trail inglés. También se ordenaron las notas para que reflejen alternativas reales y estén ancladas correctamente.
