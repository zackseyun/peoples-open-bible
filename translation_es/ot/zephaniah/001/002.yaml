- from: Yo los barreré[a] por completo de sobre la faz de la tierra, dice Yahvé.
  to: Barreré por completo todo de sobre la faz de la tierra[a], dice Yahvé.
  rationale: Se corrige el error principal de contenido sustituyendo 'los' por 'todo', que sí representa כֹּל y preserva el alcance universal del juicio. Se mantiene 'de sobre la faz de la tierra' por fidelidad al modismo fuente y 'Yahvé' conforme a la política terminológica. La nota se ajusta para reflejar correctamente el objeto totalizante y una literalidad hebrea comprensible en español.
