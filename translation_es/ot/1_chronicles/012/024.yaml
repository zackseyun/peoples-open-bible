translation:
  language: es
  text: Y estos son los números de los jefes de las tropas armadas para la guerra, que vinieron a David en Hebrón para pasar el reino de Saúl a él, conforme a la palabra[a] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «según la boca de Yahvé», un modismo que significa «conforme a la palabra» o «como Yahvé había hablado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפְּרֵי
  english_pob_choice: the numbers of
  chosen_spanish: los números de
  alternatives_spanish:
  - el número de
  - el recuento de
  lexicon: HALOT
  rationale: El plural constructo introduce una lista o enumeración. En español, «los números de» conserva esa función de encabezado sin volverlo abstracto o técnico.
- source_word: רָאשֵׁי
  english_pob_choice: the heads of
  chosen_spanish: los jefes de
  alternatives_spanish:
  - los líderes de
  - los principales de
  lexicon: HALOT
  rationale: «Cabezas» sería demasiado literal y poco natural en español. «Jefes» conserva el valor administrativo/militar del constructo y la relación de pertenencia.
- source_word: הֶחָלוּץ
  english_pob_choice: the armed troops
  chosen_spanish: los hombres armados
  alternatives_spanish:
  - los tropas armadas
  - los equipados para la batalla
  lexicon: HALOT
  rationale: El término apunta a quienes están equipados para el servicio militar. «Hombres armados» comunica bien ese sentido colectivo en español, sin forzar un tecnicismo.
- source_word: לַצָּבָא
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para el ejército
  - para el servicio militar
  lexicon: HALOT
  rationale: En este contexto militar, «guerra» reproduce de modo natural la finalidad del grupo. Mantiene la fuerza concreta del hebreo.
- source_word: בָּאוּ עַל דָּוִיד
  english_pob_choice: came to David
  chosen_spanish: vinieron a David
  alternatives_spanish:
  - se acercaron a David
  - se unieron a David
  lexicon: HALOT
  rationale: Aquí el movimiento es hacia David, no en contra de él. «Vinieron a David» es natural y suficientemente abierto para no sobreinterpretar la relación.
- source_word: חֶבְרוֹנָה
  english_pob_choice: at Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - a Hebrón
  lexicon: HALOT
  rationale: 'El hebreo tiene valor direccional, pero en español el lugar se expresa con mayor naturalidad como la sede del encuentro: «en Hebrón».'
- source_word: לְהָסֵב
  english_pob_choice: to turn ... over
  chosen_spanish: para transferir
  alternatives_spanish:
  - para pasar
  - para hacer pasar
  lexicon: HALOT
  rationale: El hiphil expresa hacer pasar o trasladar el dominio. «Transferir» es preciso y claro en español moderno, y conserva la idea de desplazamiento de soberanía.
- source_word: מַלְכוּת שָׁאוּל
  english_pob_choice: Saul’s kingdom
  chosen_spanish: el reino de Saúl
  alternatives_spanish:
  - la realeza de Saúl
  - el reinado de Saúl
  lexicon: HALOT
  rationale: «Reino» es la manera más natural de expresar la entidad política transmitida. Mantiene la referencia al dominio de Saúl sin añadir matices no requeridos.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  - sobre él
  lexicon: HALOT
  rationale: En español, el pronombre objeto directo/indirecto después de «transferir» funciona bien como «a él», preservando la dirección del traspaso.
- source_word: כְּפִי יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - como había dicho Yahvé
  lexicon: HALOT
  rationale: El hebreo dice literalmente «según la boca de Yahvé», un modismo para la palabra pronunciada por Dios. «Conforme a la palabra de Yahvé» comunica ese sentido idiomático con fidelidad y claridad.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La pauta del proyecto en español es usar «Yahvé» para el Tetragrámaton, no el sustituto litúrgico «SEÑOR». Se conserva así el nombre pactal de Dios de manera transparente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de כְּפִי יְהוָה
  english_pob_reading: according to the word of Yahweh
  chosen_spanish_reading: conforme a la palabra de Yahvé
  alternative_spanish_readings:
  - según la boca de Yahvé
  - como había hablado Yahvé
  rationale: Se mantiene el valor idiomático del hebreo sin volverlo anatómico en español. La referencia es a la palabra/mandato divino, no a una imagen literal de la boca.
  doctrine_reference: Uso idiomático hebreo en el texto masorético; coherente con la decisión del proyecto sobre el nombre divino
translation_notes:
  revision_awareness: El inglés auditado mantiene la estructura enumerativa, el valor militar de הֶחָלוּץ y la idiomática de כְּפִי יְהוָה. La redacción española sigue esas decisiones, pero adapta «heads» como «jefes» y resuelve el hebraísmo direccional de Hebrón con una forma natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Reino de Saúl» conserva la entidad política sin añadir interpretaciones.
  - La nota al pie solo se ancla en «hombres armados» porque ahí está la principal alternativa léxica relevante.
