    rationale: 'La nota actual abre con «O: ‘mejor que mil’», pero el texto principal ya expresa esa comparación. Conviene centrar la nota en el hecho textual relevante: el hebreo dice simplemente «que mil» y no añade «en otro lugar» ni otro complemento.'
  revised_spanish_text: Porque un día en tus atrios vale más que mil[a]; yo prefiero estar en el umbral[b] de la casa de mi Dios que habitar en las tiendas de la maldad.
