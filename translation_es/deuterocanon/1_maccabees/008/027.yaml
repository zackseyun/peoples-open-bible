translation:
  language: es
  text: Asimismo[a], si a la nación de los judíos le sobreviene primero la guerra, los romanos combatirán como aliados de todo corazón[b], según las circunstancias se lo indiquen[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Igualmente» o «De la misma manera» para κατὰ τὰ αὐτὰ.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «con plena entrega» para ἐκ ψυχῆς.
    reason: lexical_alternative
  - marker: c
    text: La cláusula final también puede traducirse «como las circunstancias se lo sugieran» o «según el tiempo se lo prescriba».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ τὰ αὐτὰ
  english_pob_choice: Likewise
  chosen_spanish: Asimismo
  alternatives_spanish:
  - De la misma manera
  - Igualmente
  lexicon: LSJ
  rationale: La frase funciona como transición recíproca respecto de las cláusulas anteriores. «Asimismo» conserva el valor comparativo sin sonar forzado en español.
- source_word: ἔθνει Ἰουδαίων
  english_pob_choice: the nation of the Jews
  chosen_spanish: la nación de los judíos
  alternatives_spanish:
  - la nación judía
  - el pueblo de los judíos
  lexicon: LSJ
  rationale: ἔθνος aquí designa un pueblo o nación. «La nación de los judíos» sigue de cerca la construcción griega y evita introducir un matiz posterior ajeno al contexto.
- source_word: συμβῇ
  english_pob_choice: should come
  chosen_spanish: le sobreviene
  alternatives_spanish:
  - llegue
  - acontezca
  - le ocurra
  lexicon: LSJ
  rationale: Con πόλεμος como sujeto, en español es natural decir que la guerra «sobreviene» a alguien. Conserva el valor de evento contingente sin volver la frase pesada.
- source_word: προτέρῳ
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - en primer lugar
  lexicon: LSJ
  rationale: 'El comparativo marca prioridad temporal: si la guerra llega primero a los judíos. «Primero» reproduce esa prioridad con claridad.'
- source_word: συμμαχήσουσιν
  english_pob_choice: will fight as allies
  chosen_spanish: combatirán como aliados
  alternatives_spanish:
  - harán causa común como aliados
  - prestarán ayuda militar como aliados
  lexicon: LSJ
  rationale: El futuro expresa ayuda militar aliada. «Combatirán como aliados» conserva el sentido bélico y evita reducirlo a una alianza abstracta.
- source_word: ἐκ ψυχῆς
  english_pob_choice: with full commitment
  chosen_spanish: de todo corazón
  alternatives_spanish:
  - con plena entrega
  - con todo su empeño
  - con total compromiso
  lexicon: LSJ
  rationale: La expresión comunica sinceridad y entrega plena. «De todo corazón» es idiomática en español y mantiene la fuerza del compromiso total.
- source_word: ὡς ἂν αὐτοῖς ὁ καιρὸς ὑπογράφῃ
  english_pob_choice: as the occasion may direct them
  chosen_spanish: según el momento se lo indique
  alternatives_spanish:
  - como las circunstancias se lo sugieran
  - según el tiempo se lo prescriba
  - como la ocasión se lo dirija
  lexicon: LSJ
  rationale: ὁ καιρός apunta al momento oportuno o circunstancia, y ὑπογράφῃ tiene un sentido de orientar o señalar. «Según el momento se lo indique» preserva la apertura condicionada del texto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete y refleja el audit trail inglés: transición recíproca, prioridad temporal de «primero», ayuda militar aliada y el matiz abierto de ὁ καιρὸς ὑπογράφῃ. Se evitó traducir mecánicamente desde el inglés cuando el español exigía una estructura más natural, como en «le sobreviene» y «de todo corazón».'
  spanish_consistency_notes:
  - Se mantuvo «judíos» en minúscula por tratarse del etnónimo en español, no del nombre divino.
  - «Aliados» se usa en sentido militar y diplomático, coherente con συμμαχήσουσιν.
  - Se evitó «Cristo», «Señor» o terminología teológica ajena, ya que el versículo es de contenido político-militar.
