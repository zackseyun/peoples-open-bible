base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/010/006.yaml
  text: Now the sons of Israel journeyed from Beeroth Bene-jaakan to Moserah[a]. There Aaron died, and there he was buried[b]; and Eleazar his son served as priest in his place.
  footnotes:
  - marker: a
    text: Beeroth Bene-jaakan may be understood literally as 'the wells of the sons of Jaakan,' but it is rendered here as a place name by transliteration.
    reason: lexical_alternative
  - marker: b
    text: Or 'Eleazar his son served as priest after him.' The Hebrew literally says 'in his place,' indicating succession.
    reason: lexical_alternative
