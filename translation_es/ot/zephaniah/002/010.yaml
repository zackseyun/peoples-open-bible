translation:
  language: es
  text: Esto será para ellos en pago de su soberbia, porque injuriaron y se engrandecieron contra el pueblo de Yahvé de los Ejércitos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «el Señor de las huestes».
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This
  chosen_spanish: Esto
  alternatives_spanish:
  - Esto será
  - Esta será
  lexicon: HALOT
  rationale: El demostrativo neutro/femenino introduce el resultado anunciado. «Esto» conserva la referencia deíctica sin añadir más explicación que la requerida por el español.
- source_word: לָהֶם
  english_pob_choice: will be their
  chosen_spanish: será para ellos
  alternatives_spanish:
  - les tocará
  - será su
  lexicon: HALOT
  rationale: La preposición con sufijo expresa aquí el destino que les corresponde. «Será para ellos» mantiene el valor resultativo sin forzar una paráfrasis más libre.
- source_word: תַּחַת
  english_pob_choice: in return for
  chosen_spanish: en pago de
  alternatives_spanish:
  - a cambio de
  - en retribución por
  - por
  lexicon: HALOT
  rationale: En este contexto תַּחַת marca retribución/pago. «En pago de» comunica bien la idea de recompensa punitiva y es natural en español bíblico contemporáneo.
- source_word: גְּאוֹנָם
  english_pob_choice: their pride
  chosen_spanish: su soberbia
  alternatives_spanish:
  - su orgullo
  - su arrogancia
  - su altivez
  lexicon: HALOT
  rationale: En un contexto de juicio, el sustantivo señala orgullo altivo. «Soberbia» conserva mejor el matiz moral negativo que «orgullo» en español actual.
- source_word: חֵרְפוּ
  english_pob_choice: they taunted
  chosen_spanish: injuriaron
  alternatives_spanish:
  - se burlaron de
  - vituperaron
  - ultrajaron
  lexicon: HALOT
  rationale: El verbo implica reproche injurioso y despectivo. «Injuriaron» preserva la fuerza ofensiva del término sin limitarlo solo a la burla.
- source_word: וַיַּגְדִּלוּ עַל
  english_pob_choice: and magnified themselves against
  chosen_spanish: y se engrandecieron contra
  alternatives_spanish:
  - y se jactaron contra
  - y se exaltaron sobre
  - y se hicieron grandes contra
  lexicon: HALOT
  rationale: El Hifil de גדל con עַל expresa autoexaltación frente a otros. «Se engrandecieron contra» conserva la imagen verbal y la dirección de oposición; el reflexivo explicita el sentido implícito en hebreo.
- source_word: עַם
  english_pob_choice: the people of
  chosen_spanish: el pueblo de
  alternatives_spanish:
  - la nación de
  - el pueblo perteneciente a
  lexicon: HALOT
  rationale: Con el nombre divino, «el pueblo de» es la equivalencia natural y covenantal en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar la transliteración «Yahvé» en el texto principal en vez de la sustitución tradicional.'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «Armies» se vierte de forma transparente como «Ejércitos», manteniendo el valor militar/cósmico del título divino sin recurrir a «huestes», que es más tradicional pero menos claro.
theological_decisions:
- issue: Renderizado del nombre divino en יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - el SEÑOR de los ejércitos
  - Yahvé de las huestes
  rationale: Se preserva el nombre propio divino en lugar de sustituirlo por un título. «De los Ejércitos» sigue la decisión inglesa de traducir צְבָאוֹת de manera transparente, manteniendo el tono marcial/cósmico del título.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation philosophy §1, §6'
- issue: Valor de retribución de תַּחַת
  english_pob_reading: in return for
  chosen_spanish_reading: en pago de
  alternative_spanish_readings:
  - por
  - a causa de
  - como retribución por
  rationale: La construcción señala juicio retributivo, no mera causalidad. «En pago de» conserva la idea de correspondencia penal sin borrar la tensión semántica del hebreo.
  doctrine_reference: HALOT; contexto poético-profético de juicio
translation_notes:
  revision_awareness: La redacción refleja la lectura final inglesa con «themselves» explícito en וַיַּגְדִּלוּ עַל, y mantiene la decisión revisada de un sentido reflexivo de autoexaltación. No se introdujeron variantes textuales adicionales; el texto hebreo base coincide sustancialmente con la línea inglesa auditada.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יהוה según la norma del proyecto.
  - «Ejércitos» mantiene el paralelo con la opción inglesa «Armies» y evita la sustitución tradicional sin explicación.
  - «Soberbia» se eligió por su carga moral negativa en español bíblico contemporáneo, frente a «orgullo» que puede sonar más neutral.
  - El reflexivo «se engrandecieron» corresponde al sentido idiomático de autoexaltación presente en el hebreo.
  - Se evitó «SEÑOR» en el cuerpo principal para no enmascarar el nombre divino.
