review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: Dios como el que está por encima del círculo de la tierra, los habitantes comparados con insectos pequeños, y los cielos extendidos como tela y como tienda. Sin embargo, hay dos desviaciones relevantes del rastro POB y del hebreo: (1) כַּחֲגָבִים se alineó en inglés con ''grasshoppers'', y en español ''langostas'' introduce una connotación más específica y potencialmente plaga-colectiva que aquí no es necesaria; ''saltamontes'' preserva mejor la idea de pequeñez. (2) כַדֹּק fue auditado finalmente como ''like a curtain''; ''toldo'' altera la imagen hacia una cubierta exterior/awning y se aleja tanto del inglés auditado como del matiz de tela fina/ligera. También conviene mejorar ''se sienta sobre'' a ''está sentado sobre'' o ''se sienta por encima de''; en español actual ''se sienta sobre el círculo de la tierra'' puede sonar ingresivo o físicamente crudo para un participio estativo.'
  spanish_quality_summary: El texto es legible, pero 'se sienta sobre' suena menos natural y menos estable que el valor participial hebreo, y 'toldo' no encaja bien con el paralelismo poético 'cortina ... tienda'. 'Saltamontes' y 'cortina' producen un español más claro y más fiel. 'Para habitar' funciona, aunque 'para morar' también sería posible; no requiere cambio.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. Los ajustes necesarios son léxicos y estilísticos: conservar ''círculo'', preferir ''saltamontes'' para חֲגָבִים en este contexto, y ''cortina'' para דֹק conforme al audit trail inglés. ''Los cielos'' y ''tienda'' están bien.'
  issues:
  - severity: medium
    issue: '''como langostas'' para כַּחֲגָבִים'
    rationale: Aunque posible en campo semántico amplio, aquí 'langostas' en español puede sugerir el insecto de plaga más que la simple pequeñez visual. El audit trail inglés escogió 'grasshoppers'; 'saltamontes' es la correspondencia española más natural y precisa en este contexto.
  - severity: high
    issue: '''como un toldo'' para כַדֹּק'
    rationale: '''Toldo'' cambia la imagen de tela fina/cortina a una cubierta tipo awning. El inglés auditado revisó deliberadamente a ''curtain''; en español ''cortina'' preserva mejor el símil poético y la relación con ''extiende/despliega''.'
  - severity: medium
    issue: '''Él es el que se sienta sobre'' suena ingresivo y algo torpe'
    rationale: El participio הַיֹּשֵׁב describe un estado continuo. En español, 'está sentado sobre' o 'se sienta por encima de' comunica mejor ese valor sin sugerir el acto momentáneo de sentarse. Además, 'sobre' solo puede sonar demasiado físico frente al inglés auditado 'above'.
  revised_spanish_text: Él es el que está sentado sobre[a] el círculo de la tierra, y sus habitantes son como saltamontes[b]; él extiende los cielos como una cortina y los despliega como una tienda para habitar.
  revised_footnotes:
  - marker: a
    text: También puede entenderse como "bóveda" o "horizonte" de la tierra. El término hebreo puede denotar una extensión circular o un límite de aspecto domeado.
    reason: lexical_alternative
  - marker: b
    text: 'O: "como langostas". El término hebreo puede referirse a insectos semejantes; aquí comunica sobre todo pequeñez.'
    reason: lexical_alternative
  revision_rationale: Se corrigieron dos elecciones léxicas que se apartaban del hebreo y del audit trail inglés ('langostas' → 'saltamontes'; 'toldo' → 'cortina') y se suavizó la primera cláusula para reflejar mejor el valor estativo del participio hebreo en español natural.
