  text: 바울은 그를 데리고 함께 떠나기를 원하여, 그 지역에 있는 유대인들 때문에 그를 데려다가 할례를 행하였으니, 이는 그들 모두가 그의 아버지가 헬라인인 줄 알고 있었기 때문이었습니다.
