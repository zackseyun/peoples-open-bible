base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/029/004.yaml
  text: I will put hooks in your jaws[a], and I will make the fish of your Nile channels cling to your scales; and I will bring you up from the midst of your Nile channels[b], and all the fish of your Nile channels will cling to your scales.
  footnotes:
  - marker: a
    text: Or 'your rivers' or 'your canals'; the Hebrew term refers in Egypt contexts to the Nile and its waterways.
    reason: lexical_alternative
  - marker: b
    text: Or 'in your cheeks.' The Hebrew word can mean 'jaw' or 'cheek'; 'jaws' fits the river-creature imagery here.
    reason: lexical_alternative
