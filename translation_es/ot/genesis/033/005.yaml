translation:
  language: es
  text: 'Alzó sus ojos y vio a las mujeres y a los niños[a], y dijo: «¿Quiénes son estos contigo?». Y él respondió[b]: «Los niños con los que Dios ha favorecido a tu siervo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿Quiénes son estos para ti?». La expresión hebrea es idiomática y pregunta por la identidad de los que acompañan a Jacob.
    reason: lexical_alternative
  - marker: b
    text: O simplemente, «Los niños que Dios ha dado a tu siervo». El verbo hebreo también puede expresar favor o gracia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא אֶת עֵינָיו
  english_pob_choice: He lifted up his eyes
  chosen_spanish: Alzó sus ojos
  alternatives_spanish:
  - Levantó sus ojos
  - Alzó la vista
  lexicon: HALOT
  rationale: Conserva el idiomatismo hebreo de ‘levantar los ojos’ sin sonar forzado en español. ‘Alzó sus ojos’ mantiene el tono narrativo y la secuencia verbal del original.
- source_word: וַיַּרְא
  english_pob_choice: and saw
  chosen_spanish: y vio
  alternatives_spanish:
  - y miró
  - y contempló
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural de ראה en este contexto narrativo.
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: HALOT
  rationale: El hebreo dice ‘las mujeres’. Aunque el contexto identifica a las esposas/concubinas de Jacob, la forma más fiel y menos interpretativa en español es ‘mujeres’.
- source_word: הַיְלָדִים
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los hijos
  - los muchachos
  lexicon: HALOT
  rationale: ‘Niños’ refleja bien el sustantivo en ambos lugares del versículo y funciona de modo natural en español. ‘Hijos’ podría sonar más genealógico que el hebreo inmediato.
- source_word: מִי אֵלֶּה לָּךְ
  english_pob_choice: Who are these with you?
  chosen_spanish: ¿Quiénes son estos contigo?
  alternatives_spanish:
  - ¿Quiénes son estos para ti?
  - ¿Quiénes son estos que van contigo?
  lexicon: HALOT
  rationale: La pregunta hebrea es idiomática y puede entenderse como identidad de los que están acompañando a Jacob. ‘Contigo’ conserva la cercanía del giro semítico y evita explicar más de lo que el texto dice.
- source_word: חָנַן
  english_pob_choice: has graciously given
  chosen_spanish: ha concedido con gracia
  alternatives_spanish:
  - ha dado con gracia
  - ha favorecido dando
  lexicon: HALOT
  rationale: El verbo incluye la idea de favor/gracia. ‘Concedido con gracia’ preserva ese matiz teológico sin perder naturalidad en español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Se mantiene la referencia singular personal a Dios, como en la lectura inglesa y hebrea.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu servidor
  - tu esclavo
  lexicon: HALOT
  rationale: En este discurso de cortesía a Esaú, ‘siervo’ conserva la auto-humillación deferente del hebreo sin cargar innecesariamente la idea de esclavitud material. ‘Servidor’ sería más suave, pero menos transparente al registro bíblico.
theological_decisions:
- issue: Matiz de gracia en חָנַן
  english_pob_reading: The children whom God has graciously given to your servant
  chosen_spanish_reading: Los niños que Dios ha concedido con gracia a tu siervo
  alternative_spanish_readings:
  - Los niños que Dios ha dado a tu siervo
  - Los niños que Dios ha favorecido dando a tu siervo
  rationale: Se conserva la nota de favor/gracia implícita en חנן, como en el POB inglés, sin añadir contenido doctrinal extra. La frase española mantiene el don como procedente de la benevolencia divina.
  doctrine_reference: Translation philosophy §1, §3
- issue: Identidad de הַנָּשִׁים en el contexto
  english_pob_reading: the women
  chosen_spanish_reading: las mujeres
  alternative_spanish_readings:
  - las esposas
  rationale: Se evita cerrar el sentido a ‘esposas’ porque el hebreo usa el término más amplio. El contexto lo permite, pero la traducción base debe seguir la forma léxica del texto.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, incluyendo la revisión que añadió ‘to’ before ‘your servant’; en español esto se refleja naturalmente con ‘a tu siervo’. También se preservó el matiz de gracia de חנן, tal como el POB inglés lo documenta.
  spanish_consistency_notes:
  - Se usó ‘Dios’ para אֱלֹהִים de manera consistente con el estándar POB.
  - Se prefirió ‘siervo’ para עבד en el registro deferente de la escena.
  - No se introdujo ‘Mesías’, ‘SEÑOR’ ni vocabulario eclesiástico no presente en el versículo.
  - La puntuación y el orden narrativo siguen la cadencia del hebreo y del audit trail inglés.
