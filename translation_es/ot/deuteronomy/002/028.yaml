translation:
  language: es
  text: Me venderás comida por plata[a], para que yo coma, y me darás agua por plata, para que yo beba; solo déjame pasar a pie[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con plata'. El hebreo dice literalmente 'por/con la plata'.
    reason: lexical_alternative
  - marker: b
    text: O 'en mis pies'. El hebreo dice literalmente 'sobre/en mis pies'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - provisiones
  lexicon: HALOT
  rationale: אֹכֶל es un sustantivo general para comida/alimento. 'Comida' es natural en español y conserva el sentido amplio sin especificar pan o grano.
- source_word: בַּכֶּסֶף
  english_pob_choice: for silver
  chosen_spanish: por plata
  alternatives_spanish:
  - con dinero
  - con plata
  - por dinero
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente 'con/por el plata'. 'Por plata' conserva el término concreto y expresa bien el pago; además evita diluir el matiz material del original.
- source_word: תַּשְׁבִּרֵנִי
  english_pob_choice: you shall sell me
  chosen_spanish: Tú venderás
  alternatives_spanish:
  - véndeme
  - venderás a mí
  - me venderás
  lexicon: HALOT
  rationale: En este contexto, el hifil de שׁבר significa vender/procurar alimento. 'Tú venderás' sigue de cerca la sintaxis del pedido directo; 'me venderás' sería más idiomático, pero menos transparente respecto del objeto implícito en español.
- source_word: וְאָכַלְתִּי
  english_pob_choice: that I may eat
  chosen_spanish: para que yo coma
  alternatives_spanish:
  - y comeré
  - y yo comeré
  - a fin de que coma
  lexicon: HALOT
  rationale: El waw + perfecto expresa aquí finalidad o resultado. 'Para que yo coma' comunica esa relación de propósito de forma clara y natural en español.
- source_word: וּמַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: Equivalente léxico directo; no hay razón contextual para otra especificación.
- source_word: תִּתֶּן לִי
  english_pob_choice: give me
  chosen_spanish: me darás
  alternatives_spanish:
  - dame
  - darás a mí
  - me proveerás
  lexicon: HALOT
  rationale: נתן + ל se rinde de forma directa con 'dar'. 'Me darás' conserva la sencillez del hebreo y la continuidad del pedido.
- source_word: וְשָׁתִיתִי
  english_pob_choice: that I may drink
  chosen_spanish: para que yo beba
  alternatives_spanish:
  - y beberé
  - a fin de que beba
  lexicon: HALOT
  rationale: Como con 'coma', la forma expresa finalidad. 'Para que yo beba' preserva el valor intencional sin forzar un futuro simple.
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: sólo
  alternatives_spanish:
  - solamente
  - únicamente
  - excepto que
  lexicon: HALOT
  rationale: Marca la restricción del ruego. 'Sólo' es la equivalencia más natural y precisa.
- source_word: אֶעְבְּרָה
  english_pob_choice: let me pass through
  chosen_spanish: déjame pasar
  alternatives_spanish:
  - permíteme pasar
  - yo pasaré
  - que pase
  lexicon: HALOT
  rationale: El cohortativo en contexto es requestivo/permisivo. 'Déjame pasar' expresa esa súplica de manera directa en español; el complemento 'a pie' evita añadir elementos ajenos.
- source_word: בְרַגְלָי
  english_pob_choice: on foot
  chosen_spanish: a pie
  alternatives_spanish:
  - sobre mis pies
  - de pie
  - con mis pies
  lexicon: HALOT
  rationale: La locución española normal es 'a pie'. Aunque el hebreo dice literalmente 'en/sobre mis pies', el español idiomático comunica mejor el valor de paso pacífico y no invasivo.
theological_decisions:
- issue: Matiz del pedido de paso sin pretensión territorial
  english_pob_reading: only let me pass through on foot
  chosen_spanish_reading: sólo déjame pasar a pie
  alternative_spanish_readings:
  - sólo permíteme pasar a pie
  - sólo déjame atravesar a pie
  rationale: La cláusula limita la petición a tránsito temporal y no a ocupación. 'Déjame pasar a pie' mantiene esa restricción sin introducir una lectura más fuerte que el hebreo.
  doctrine_reference: Contexto narrativo de la peregrinación de Israel; cf. Deuteronomio 2
- issue: Finalidad de las formas verbales coordinadas
  english_pob_reading: that I may eat ... that I may drink
  chosen_spanish_reading: para que yo coma ... para que yo beba
  alternative_spanish_readings:
  - y yo coma ... y yo beba
  - a fin de que yo coma ... a fin de que yo beba
  rationale: No se trata de una afirmación independiente, sino del propósito del suministro de comida y agua. En español, 'para que' reproduce mejor esa relación causal-final.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada del inglés POB que ajustó el tono a una petición directa ('shall') y aclaró la locución final como 'on foot'. En español, se conservó esa fuerza requestiva con un futuro de cortesía/solicitud ('tú venderás', 'me darás') y se optó por la locución idiomática 'a pie', manteniendo el alcance literal del hebreo en nota.
  spanish_consistency_notes:
  - Se mantuvo 'plata' para reflejar el sustantivo concreto כֶּסֶף, en lugar de generalizar a 'dinero'.
  - Se evitó 'siervo' u otros términos no presentes en el texto; el pasaje trata de compra y tránsito, no de estatus personal.
  - '''Comida'' y ''agua'' respetan el léxico general sin especificar más de lo que el hebreo permite.'
  - La puntuación con punto y coma ayuda a reflejar la estructura de dos peticiones paralelas seguidas de una restricción final.
