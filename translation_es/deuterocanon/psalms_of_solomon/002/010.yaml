translation:
  language: es
  text: Y el cielo quedó cargado[a][b], y la tierra los aborreció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma transmitida parece duplicar el final del verbo (ἐβαρύνθησενσεν); la traducción sigue la forma evidente ἐβαρύνθησεν.
    reason: textual_variant
  - marker: b
    text: 'O: «el cielo se puso pesado».'
    reason: previous_rendering
lexical_decisions:
- source_word: οὐρανός
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielos
  - firmamento
  lexicon: LSJ
  rationale: En español, «cielo» mantiene la imagen cósmica del merismo «cielo y tierra» sin sonar forzado. «Firmamento» sería más técnico y menos natural en este juicio poético.
- source_word: ἐβαρύνθησεν
  english_pob_choice: was weighed down
  chosen_spanish: fue abrumado
  alternatives_spanish:
  - fue pesado
  - quedó cargado
  - fue agobiado
  lexicon: LSJ
  rationale: El verbo expresa una carga o peso impuesto; «fue abrumado» comunica el peso moral/cósmico en español natural. Evita sugerir meteorología, como advertía el ajuste inglés, y conserva la pasividad del griego.
- source_word: γῆ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - suelo
  - país
  - mundo
  lexicon: LSJ
  rationale: «Tierra» es la correspondencia más directa y preserva el paralelismo con «cielo». En este contexto cósmico es preferible a «país» o «suelo».
- source_word: ἐβδελύξατο
  english_pob_choice: abhorred
  chosen_spanish: aborreció
  alternatives_spanish:
  - detestó
  - abominó
  - despreció
  lexicon: LSJ
  rationale: El verbo griego denota fuerte repulsión moral. «Aborreció» es elevado y claro en español bíblico contemporáneo, y conserva la intensidad del término sin suavizarlo.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - a los
  lexicon: Greek grammar
  rationale: El objeto directo masculino plural se expresa de forma natural con «los» en español. Se evita repetir el sujeto implícito y se mantiene la fluidez del paralelismo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «heaven was weighed down» frente a «the sky grew heavy» para conservar el merismo bíblico y evitar una lectura meteorológica. En español, por la misma razón, se eligió «cielo» con una pasiva que preserve la idea de peso/carga sin sugerir clima.
  spanish_consistency_notes:
  - Se mantiene «cielo» y «tierra» como merismo cósmico equivalente a «heaven and earth».
  - Se evita «SEÑOR» o lenguaje litúrgico ajeno; el verso no contiene el nombre divino.
  - La traducción conserva el tono poético-judicial del griego, sin modernizar hasta la paráfrasis.
