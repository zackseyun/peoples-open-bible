review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y conserva los elementos clave del rito: Aarón pone ambas manos sobre la cabeza del macho cabrío vivo, confiesa sobre él la triple lista de culpa de los hijos de Israel, pone esas culpas sobre la cabeza del macho cabrío y lo envía al desierto mediante un hombre designado. También preserva correctamente la distinción entre ''iniquidades / transgresiones / pecados'' y la expresión ''hijos de Israel''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos puntos mejorables: la conjunción inicial debe ser ''Y'' sin problema, pero ''las pondrá'' resulta menos natural porque el antecedente inmediato incluye masculinos (''pecados''); conviene ''los pondrá'' para referirse al conjunto de pecados/culpas. Además, ''por mano de'' es fiel al hebreo, pero en español bíblico legible suena algo rígido; sin embargo, puede mantenerse por fidelidad si se explica en nota. El resto es bien legible. La nota [a] aporta una alternativa innecesaria y menos útil que la del inglés; conviene alinearla con la alternativa corporativa para ''hijos de Israel''.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: no hay ocurrencias de Yahvé ni Mesías aquí; se mantiene ''hijos de Israel'' conforme al razonamiento auditado, y se preserva la tríada de pecado con distinción léxica. ''Macho cabrío vivo'' es adecuado para הַשָּׂעִיר הַחַי. ''Desierto'' es aceptable para הַמִּדְבָּרָה, aunque ''wilderness'' en inglés auditado se acerca también a ''desierto/yermo''.'
  issues:
  - severity: medium
    issue: Pronombre en 'las pondrá'
    rationale: El hebreo tiene objeto plural 'ellas/ellos' referido al conjunto de iniquidades, transgresiones y pecados. En español, con el antecedente mixto y el último referente 'pecados', 'los pondrá' suena más natural y evita discordancia percibida.
  - severity: medium
    issue: Nota [a] no refleja la alternativa auditada principal
    rationale: La nota inglesa preserva la alternativa para בְּנֵי יִשְׂרָאֵל ('los israelitas' / 'el pueblo de Israel'), no para 'macho cabrío vivo'. La nota española actual introduce una alternativa secundaria no necesaria y omite la alternativa documentada relevante.
  - severity: low
    issue: '''por mano de'' suena algo rígido en español contemporáneo'
    rationale: Es una reproducción fiel del idiomatismo בְּיַד, pero puede mantenerse si se prioriza transparencia formal. La nota [b] ya ayuda a explicar la dificultad de עִתִּי, así que no exige cambio obligatorio.
