    rationale: Si se corrige el texto principal a «en el vientre», la nota alternativa debe reflejar el mismo término para mantener coherencia formal y evitar dos imágenes corporales distintas sin necesidad.
  revised_spanish_text: El principio de la sabiduría es el temor de Yahvé[a][b], y con los fieles fue formada en el vientre.
