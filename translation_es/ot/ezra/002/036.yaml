translation:
  language: es
  text: 'Los sacerdotes: los hijos de Jedaías[a], de la casa de Jesúa[b], 973.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Jedaías». El hebreo dice literalmente «los hijos de Jedaías», una expresión genealógica estándar.
    reason: lexical_alternative
  - marker: b
    text: Jesúa es el nombre personal postexílico; está relacionado con la forma Josué.
    reason: cultural_note
lexical_decisions:
- source_word: הַכֹּהֲנִים
  english_pob_choice: The priests
  chosen_spanish: Los sacerdotes
  alternatives_spanish:
  - La clase sacerdotal
  - Los sacerdotes
  lexicon: HALOT
  rationale: El hebreo dice de manera directa «los sacerdotes». En este registro censal, «Los sacerdotes» conserva la referencia directa al grupo enumerado sin añadir interpretación.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי puede significar descendientes, pero la forma literal «los hijos de» preserva la expresión hebrea y funciona bien en español bíblico.
- source_word: יְדַעְיָה
  english_pob_choice: Jedaiah
  chosen_spanish: Jedaías
  alternatives_spanish:
  - Yedaías
  - Jedaía
  lexicon: nombre propio
  rationale: Se translitera al español como «Jedaías», forma clara y reconocible para lectores bíblicos en español.
- source_word: לְבֵית
  english_pob_choice: of the house of
  chosen_spanish: de la casa de
  alternatives_spanish:
  - pertenecientes a la casa de
  - de la familia de
  lexicon: HALOT
  rationale: La construcción con לְ y «casa» expresa afiliación a un linaje o casa familiar. «De la casa de» es natural en español y mantiene el matiz genealógico.
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshúa
  - Josué
  lexicon: nombre propio
  rationale: En Esdras, el nombre postexílico corresponde a la forma usual en español «Jesúa». «Josué» reflejaría una relación etimológica real, pero no la forma más precisa aquí.
- source_word: תְּשַׁע מֵאוֹת שִׁבְעִים וּשְׁלֹשָׁה
  english_pob_choice: '973'
  chosen_spanish: '973'
  alternatives_spanish:
  - novecientos setenta y tres
  lexicon: HALOT
  rationale: El número hebreo suma 973. En una lista censal, las cifras en dígitos son claras y fieles al dato del texto.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo de Esdras 2:36 y el rastro auditado en inglés. La principal decisión española fue mantener el registro genealógico literal («los hijos de») y adaptar los nombres propios a formas españolas habituales y reconocibles.
  spanish_consistency_notes:
  - Se mantuvo el orden y la concisión propios de una lista censal.
  - No se expandió el sentido de «casa» más allá de la afiliación genealógica indicada por el hebreo.
  - Se conservaron las cifras en dígitos, como en el rastro inglés, por claridad en un contexto enumerativo.
