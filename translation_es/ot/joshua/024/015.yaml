    text: Or 'it seems wrong to you' or 'it is displeasing to you'; literally, 'it is evil in your eyes.'
    reason: lexical_alternative
  - marker: b
    text: '''The River'' refers to the Euphrates.'
    reason: cultural_note
  - marker: c
    text: 'Or ''your ancestors served''; Hebrew: ''your fathers served.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'my household.'
    reason: lexical_alternative
