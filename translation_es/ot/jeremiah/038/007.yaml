translation:
  language: es
  text: Ahora bien, Ebed-melec el cusita[a], un oficial de la corte[b] que estaba en la casa del rey, oyó que habían puesto a Jeremías en la cisterna[c], mientras el rey estaba sentado en la puerta de Benjamín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El cusita» se refiere a un hombre de Cus; las versiones tradicionales suelen decir «el etíope».
    reason: cultural_note
  - marker: b
    text: O «eunuco». El término hebreo puede referirse a un eunuco literal o, más ampliamente, a un oficial de la corte real.
    reason: lexical_alternative
  - marker: c
    text: O «la fosa» o «el pozo». La palabra hebrea puede denotar una fosa o una cisterna; aquí «cisterna» encaja mejor con el contexto inmediato de Jeremías 38.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: HALOT
  rationale: El waw consecutivo introduce la nueva acción narrativa; «oyó» reproduce de manera natural y directa el avance del relato sin añadir matices no requeridos por el hebreo.
- source_word: עֶבֶד מֶלֶךְ
  english_pob_choice: Ebed-melech
  chosen_spanish: Ebed-melec
  alternatives_spanish:
  - Ebed-melech
  - Ebed-Melec
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio, no como frase común. Se translitera al español con ajuste ortográfico mínimo para lectura natural, preservando la forma del nombre.
- source_word: הַכּוּשִׁי
  english_pob_choice: the Cushite
  chosen_spanish: el cusita
  alternatives_spanish:
  - el cuxita
  - el etíope
  lexicon: HALOT
  rationale: «Cusita» conserva el etnónimo de Cush con mayor precisión que «etíope», que puede ser anacrónico o demasiado interpretativo. Se mantiene el artículo por la construcción nominal del hebreo.
- source_word: אִישׁ סָרִיס
  english_pob_choice: a court official
  chosen_spanish: un oficial de la corte
  alternatives_spanish:
  - un eunuco
  - un oficial
  lexicon: HALOT
  rationale: En este contexto, la función administrativa es explícita y no es necesario fijar el sentido físico de «eunuco». «Oficial de la corte» refleja bien la referencia funcional y deja abierta la tensión léxica documentada.
- source_word: וְהוּא בְּבֵית הַמֶּלֶךְ
  english_pob_choice: who was in the king’s house
  chosen_spanish: que estaba en la casa del rey
  alternatives_spanish:
  - y él estaba en la casa del rey
  - mientras estaba en la casa del rey
  lexicon: HALOT
  rationale: La frase identifica la ubicación o condición de Ebed-melec al oír la noticia. En español, una relativa con «que estaba» suena natural y conserva el valor descriptivo de la cláusula.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo oído; «que» es el complemento más natural en español y evita forzar un valor causal que el contexto no exige.
- source_word: נָתְנ֥וּ אֶת יִרְמְיָהוּ אֶל הַבּוֹר
  english_pob_choice: they had put Jeremiah into the cistern
  chosen_spanish: habían puesto a Jeremías en la cisterna[b]
  alternatives_spanish:
  - habían puesto a Jeremías en el pozo
  - pusieron a Jeremías en la cisterna
  lexicon: HALOT
  rationale: «Cisterna» es la opción concreta que mejor encaja con el contexto inmediato de Jeremías 38. El pluscuamperfecto español refleja adecuadamente una acción previa respecto del momento del verbo principal.
- source_word: וְהַמֶּלֶךְ יוֹשֵׁב
  english_pob_choice: while the king was sitting
  chosen_spanish: mientras el rey estaba sentado
  alternatives_spanish:
  - y el rey estaba sentado
  - así que el rey estaba sentado
  lexicon: HALOT
  rationale: La cláusula describe una acción simultánea de trasfondo. «Mientras» expresa con claridad la simultaneidad narrativa sin sobreinterpretar el hebreo.
- source_word: בְּשַׁעַר בִּנְיָמִן
  english_pob_choice: at the Benjamin Gate
  chosen_spanish: en la puerta de Benjamín
  alternatives_spanish:
  - en la Puerta de Benjamín
  - junto a la puerta de Benjamín
  lexicon: HALOT
  rationale: Se conserva el nombre propio del acceso urbano. «Puerta de Benjamín» es una forma clara en español para este topónimo y mantiene la designación concreta del lugar.
theological_decisions:
- issue: Título funcional de סָרִיס
  english_pob_reading: a court official, with 'eunuch' preserved as a lexical alternative
  chosen_spanish_reading: un oficial de la corte, dejando abierta la posibilidad de «eunuco»
  alternative_spanish_readings:
  - un eunuco
  - un funcionario de la corte
  rationale: El hebreo permite ambas posibilidades; el contexto resalta la función cortesana. La traducción principal evita fijar innecesariamente la dimensión física, pero no la borra, porque sigue siendo una alternativa legítima del término.
  doctrine_reference: Principios de precisión léxica y transparencia textual; no hay decisión doctrinal directa.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, incluyendo la coma antes de la cláusula temporal equivalente a «mientras», y conserva la equivalencia narrativa del texto base sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente exige el Tetragrámaton; este versículo no lo contiene.
  - Se mantiene «cisterna» como elección principal para בור, conforme al contexto narrativo de Jeremías 38.
  - «Cusita» se prefiere a «etíope» para reflejar el etnónimo del hebreo sin anacronismo.
  - El nombre propio se adapta como «Ebed-melec» para una lectura española natural, sin perder la identidad del personaje.
