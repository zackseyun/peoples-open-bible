    reason: alternative_reading
  revision_rationale: Se corrigen los anclajes de notas para que correspondan a las expresiones que explican, se mejora la naturalidad de לְמֵי נִדָּה con «agua de impureza» en el texto principal, y se limpia la puntuación de las notas sin alterar las decisiones léxicas o teológicas sustantivas.
