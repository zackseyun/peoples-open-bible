translation:
  text: |-
    "Did I speak? Did I not always regard you as a goddess [1]? Did I not always respect you as a sister? Why are you falsely accusing me, woman, of these wicked and unclean things?"
    
    She laughed and says to me, "Evil desire has risen up into your heart [2]. Or does it not seem to you a wicked thing for a righteous man if evil desire rises into his heart? It is indeed a sin—and a great one, she says. For a righteous man plans what is righteous. Therefore, in planning what is righteous, his honor is established in the heavens [3], and he has the Lord readily reconciled [4] in every affair of his. But those who plan evil in their hearts bring upon themselves death and captivity—especially those who secure this present age for themselves [5], who exult in their wealth, and who do not hold fast to the good things that are coming.
    
    "Will their souls repent [6]—those who have no hope, but have despaired of themselves and of their life? But you—pray to God, and he will heal your sins [7], and those of your whole household, and of all the holy ones [8]."
