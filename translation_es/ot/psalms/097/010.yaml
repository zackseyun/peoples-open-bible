  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> ‘Yahvé’; רָע -> ‘el mal’; נַפְשׁוֹת -> ‘las vidas’; חֲסִידָיו -> ‘sus fieles’; idiomáticamente ‘de la mano de’; יַצִּילֵם -> ‘los libra’. ‘Impíos’ para רְשָׁעִים es aceptable en contexto, aunque ‘malvados’ también habría sido posible.'
