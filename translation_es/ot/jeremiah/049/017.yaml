    text: Or 'a desolation' or 'an object of horror.' The Hebrew term includes both ruin and the appalled reaction it evokes.
    reason: lexical_alternative
  - marker: b
    text: Or 'will hiss.' The Hebrew verb denotes a sharp sound of astonishment or derision; 'whistle' is used here as the clearer modern English equivalent.
    reason: lexical_alternative
