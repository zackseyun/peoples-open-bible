revisions:
- from: Todos nosotros nos volvimos como uno que es impuro[a], y todas nuestras obras de justicia son como un vestido inmundo; todos nosotros nos marchitamos como una hoja, y nuestras iniquidades nos arrebatan como el viento.
  to: Todos nosotros nos volvimos como uno que es impuro, y todas nuestras obras de justicia son como ropa inmunda[a]; todos nosotros nos marchitamos como una hoja, y nuestras iniquidades nos llevan como el viento.
  rationale: Se corrige el anclaje de la nota para que explique el sintagma correcto del hebreo (la prenda contaminada), se suaviza «nos arrebatan» a «nos llevan» para reflejar mejor יִשָּׂאֻנוּ sin intensificación innecesaria, y se ajusta «vestido inmundo» a «ropa inmunda» por naturalidad del español manteniendo el sentido. No se requieren cambios doctrinales ni adjudicación adicional.
