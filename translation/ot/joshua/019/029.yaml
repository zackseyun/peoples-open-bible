id: JOS.19.29
reference: Joshua 19:29
source:
  edition: WLC
  text: וְ/שָׁ֤ב הַ/גְּבוּל֙ הָֽ/רָמָ֔ה וְ/עַד עִ֖יר מִבְצַר צֹ֑ר וְ/שָׁ֤ב הַ/גְּבוּל֙ חֹסָ֔ה ו/יהיו תֹצְאֹתָ֛י/ו הַ/יָּ֖מָּ/ה מֵ/חֶ֥בֶל אַכְזִֽיבָ/ה־־׃
translation:
  text: Then the border turned to Ramah[a], and to the fortified city of Tyre; then the border turned to Hosah, and its boundary points were at the sea[b], from the region of Achzib.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'westward'; the Hebrew literally says 'toward the sea,' a common geographic expression for the western direction.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the district/territory of Achzib.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁב
  chosen: turned
  alternatives:
  - turned back
  - went around
  lexicon: HALOT
  rationale: In boundary descriptions שוב commonly marks a change in direction of the border line. 'Turned' is concise and natural in English cartographic style.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: גְּבוּל in allotment texts refers to the territorial border line. 'Border' is slightly more idiomatic here, while 'boundary' is preserved conceptually in the final clause.
- source_word: הָרָמָה
  chosen: Ramah
  rationale: Proper place name; transliterated according to the translation philosophy for names.
- source_word: עִיר מִבְצַר צֹר
  chosen: the fortified city of Tyre
  alternatives:
  - the fortress-city Tyre
  - the strong city Tyre
  lexicon: HALOT
  rationale: עִיר מִבְצַר is a construct phrase describing Tyre as fortified. 'The fortified city of Tyre' preserves the descriptive force in natural English.
- source_word: צֹר
  chosen: Tyre
  rationale: Standard English transliteration of the place name.
- source_word: חֹסָה
  chosen: Hosah
  rationale: Proper place name; transliterated.
- source_word: וַ/יהיו תֹצְאֹתָיו
  chosen: its boundary points were
  alternatives:
  - its outgoings were
  - its extremities were
  - its termination was
  lexicon: HALOT
  rationale: תֹצָאוֹת in boundary formulas refers to the extremities or terminal points of the border. 'Boundary points' communicates the geographic sense in readable modern English. Singular 'border' is represented by plural 'points' from the Hebrew noun.
- source_word: הַיָּמָּה
  chosen: toward the sea
  alternatives:
  - westward
  - to the sea
  lexicon: HALOT
  rationale: With directional he, the phrase can denote movement/direction toward the sea, and in Israelite geography often implies westward. Because the Mediterranean is likely in view, 'toward the sea' preserves the concrete Hebrew image better than the abstract 'westward'.
- source_word: מֵחֶבֶל אַכְזִיבָה
  chosen: from the region of Achzib
  alternatives:
  - from the district of Achzib
  - from the territory of Achzib
  - from the cord of Achzib
  lexicon: HALOT
  rationale: חֶבֶל can denote a measured tract, district, or region. In a territorial list, 'region' best fits idiomatic English without over-specifying administrative nuance. 'Cord' is too literal for this context.
- source_word: אַכְזִיבָה
  chosen: Achzib
  rationale: Proper place name; transliterated.
