review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: acampar frente a ellos, ver al pueblo con miedo de cruzar el cauce estacional, cruzar primero y que los hombres lo sigan. Sin embargo, hay un desajuste gramatical importante: παρενέβαλεν es singular, con sujeto compuesto explicativo («él mismo y su pueblo» entendido bajo liderazgo singular), por lo que «acamparon» conviene ajustarlo a una formulación singular natural en español. También «atemorizado para cruzar» suena poco idiomático; el sentido es ''temeroso de cruzar''.'
  spanish_quality_summary: 'El texto es mayormente claro, pero necesita una reparación pequeña para sonar natural y digno en español. «Y él mismo y su gente acamparon» resulta algo torpe y además pierde el singular del verbo griego; «Él mismo y su gente acampó» tampoco suena bien en español. Una solución natural es reestructurar: «Él mismo acampó frente a ellos con su gente». Además, «el pueblo atemorizado para cruzar» debe cambiarse por «la gente tenía miedo de cruzar» o equivalente. «Wadi» puede mantenerse con nota, aunque en español es algo menos común; la nota ya compensa esa posible dificultad.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La decisión de mantener «wadi» es admisible por continuidad con el audit trail inglés y está adecuadamente apoyada con nota léxica. «Los hombres» preserva bien οἱ ἄνδρες sin añadir posesivo no expreso.
  issues:
  - severity: medium
    issue: Verbo en plural donde el griego tiene singular
    rationale: παρενέβαλεν es singular. El español «acamparon» altera ese detalle del original y de la traducción inglesa auditada («he himself and his people encamped» con verbo singular referido al sujeto principal).
  - severity: medium
    issue: 'Construcción poco idiomática: «atemorizado para cruzar»'
    rationale: El participio δειλούμενον con infinitivo expresa temor ante la acción de cruzar. En español natural debe decirse «con miedo de cruzar», «temeroso de cruzar» o similar.
  - severity: low
    issue: «su gente» es comprensible pero menos preciso que «su pueblo»
    rationale: ὁ λαὸς αὐτοῦ corresponde más directamente a «su pueblo». En contexto militar también podría entenderse como su fuerza o gente, pero «su pueblo» preserva mejor la base léxica sin perder claridad.
  revised_spanish_text: Él mismo acampó frente a ellos con su pueblo; y cuando vio que la gente tenía miedo de cruzar el wadi[a], cruzó primero, y los hombres lo vieron y cruzaron detrás de él.
  revised_footnotes:
  - marker: a
    text: O «el torrente» o «el lecho del arroyo»; el término griego se refiere a un curso de agua estacional.
    reason: lexical_alternative
  revision_rationale: Se ajusta el inicio para reflejar el verbo singular del griego de manera natural en español («Él mismo acampó... con su pueblo»). Se cambia «atemorizado para cruzar» por «tenía miedo de cruzar», que expresa con claridad e idiomaticidad el valor de δειλούμενον διαπερᾶσαι. Se mantiene «wadi» con nota, en continuidad con la decisión léxica inglesa.
