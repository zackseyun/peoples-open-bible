translation:
  language: es
  text: Sucedió en los días en que los jueces juzgaban[a] que hubo una hambruna en la tierra, y un hombre se fue de Belén de Judá para residir temporalmente[c] en los campos de Moab[b]—él, su esposa y sus dos hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando los jueces gobernaban». El hebreo repite la misma raíz («juzgar») en una construcción idiomática: literalmente, «cuando los jueces juzgaban».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el territorio de Moab» o «en el país de Moab». Literalmente, «en los campos de Moab».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «vivir como forastero». El verbo hebreo indica residencia temporal como extranjero o residente foráneo, no necesariamente asentamiento permanente.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Sucedió
  alternatives_spanish:
  - Y sucedió
  - Aconteció
  lexicon: HALOT
  rationale: El hebreo וַיְהִי introduce la narración con una fórmula de encadenamiento. «Sucedió» conserva el valor narrativo inicial en un español natural, sin recurrir necesariamente a una forma arcaizante.
- source_word: בִּימֵי
  english_pob_choice: in the days
  chosen_spanish: en los días
  alternatives_spanish:
  - durante los días
  - en el tiempo
  lexicon: HALOT
  rationale: La expresión temporal se traduce de manera directa y reconocible, preservando la idiomaticidad bíblica del hebreo.
- source_word: שְׁפֹט הַשֹּׁפְטִים
  english_pob_choice: when the judges judged
  chosen_spanish: en que juzgaban los jueces
  alternatives_spanish:
  - cuando los jueces juzgaban
  - en los días del gobierno de los jueces
  lexicon: HALOT
  rationale: Se conserva la repetición verbal del hebreo («juzgar/juzgaban») para no borrar el énfasis léxico. El orden español se ajusta para sonar natural sin perder el eco repetido del original.
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - famine
  - escasez de alimentos
  lexicon: HALOT
  rationale: En español, «hambre» puede abarcar una carencia severa de alimentos, pero también es más general que «famine». Se mantiene este término porque el contexto narrativo de Ruth no exige aún un tecnicismo y porque evita sonar demasiado interpretativo; la tensión con «famine» se anota en la nota textual.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: «La tierra» preserva la fórmula bíblica habitual y mantiene la amplitud del hebreo, que puede referirse al ámbito de la tierra habitada o a la tierra de Israel/Judá según el contexto.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - alguien
  lexicon: HALOT
  rationale: Se conserva la referencia masculina explícita del hebreo, sin neutralización.
- source_word: מִבֵּית לֶחֶם יְהוּדָה
  english_pob_choice: from Bethlehem of Judah
  chosen_spanish: de Belén de Judá
  alternatives_spanish:
  - de Belén, en Judá
  - desde Belén de Judá
  lexicon: HALOT
  rationale: Se mantiene el nombre propio con la determinación geográfica, siguiendo el valor constructo del hebreo y la decisión inglesa de distinguir esta Belén por su pertenencia a Judá.
- source_word: לָגוּר
  english_pob_choice: to sojourn
  chosen_spanish: para sojornar
  alternatives_spanish:
  - para residir temporalmente
  - para vivir como forastero
  - para habitar temporalmente
  lexicon: HALOT
  rationale: El verbo hebreo denota residencia temporal de un extranjero o forastero. Se crea un equivalente verbal que conserve ese matiz de estancia no permanente; la alternativa más explícita se documenta en la nota de lectura.
- source_word: בִּשְׂדֵי מוֹאָב
  english_pob_choice: in the fields of Moab
  chosen_spanish: en los campos de Moab
  alternatives_spanish:
  - en los campos de Moab
  - en la región de Moab
  - en la tierra de Moab
  lexicon: HALOT
  rationale: Se traduce literalmente el plural constructo de שָׂדֶה como «campos», conservando la imagen concreta que el hebreo usa. Como en inglés, la frase también puede sugerir el territorio de Moab; esa posibilidad queda reflejada en la nota.
- source_word: הוּא וְאִשְׁתּוֹ וּשְׁנֵי בָנָיו
  english_pob_choice: he and his wife and his two sons
  chosen_spanish: él, su esposa y sus dos hijos
  alternatives_spanish:
  - él, y su esposa y sus dos hijos
  - él con su esposa y sus dos hijos
  lexicon: HALOT
  rationale: La lista hebrea se reproduce de forma aditiva y natural en español. Se conserva el referente familiar explícito sin añadir elementos interpretativos.
theological_decisions:
- issue: Valor de la tierra/territorio en la expresión bā’āreṣ
  english_pob_reading: in the land
  chosen_spanish_reading: en la tierra
  alternative_spanish_readings:
  - en el país
  - en la región
  rationale: No se especifica en el texto si «la tierra» apunta estrictamente a la tierra de Israel o si funciona como fórmula narrativa amplia. Se mantiene la ambigüedad del hebreo sin cerrarla prematuramente.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se revisó el paralelismo hebreo de Ruth 1:1 y se priorizó la huella léxica de שׁפט/שׁפטים y לָגוּר, manteniendo el movimiento narrativo inicial de וַיְהִי. La redacción española evita borrar la diferencia entre una estancia temporal en Moab y una migración permanente, en línea con la nota inglesa sobre 'sojourn'.
  spanish_consistency_notes:
  - Se usa «Belén de Judá» de forma consistente como nombre geográfico distintivo.
  - Se conserva «Yahvé» para el tetragrámaton cuando aparezca en el libro, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino en el texto base.
  - Se mantiene un estilo bíblico moderno, claro y reverente, sin arcaísmos innecesarios.
