translation:
  language: es
  text: La corona orgullosa de los borrachos de Efraín será pisoteada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «La corona de orgullo de los borrachos de Efraín será pisoteada».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרַגְלַיִם
  english_pob_choice: underfoot
  chosen_spanish: bajo los pies
  alternatives_spanish:
  - con los pies
  - por los pies
  lexicon: HALOT
  rationale: El hebreo usa una expresión con ב + 'pies' dual para indicar el medio o la imagen de ser aplastado con los pies. 'Bajo los pies' conserva la imagen de trampling de manera natural en español sin volverla mecánica.
- source_word: תֵּרָמַסְנָה
  english_pob_choice: will be trampled
  chosen_spanish: será pisoteada
  alternatives_spanish:
  - será hollada
  - será aplastada
  lexicon: HALOT
  rationale: 'El nifal imperfecto comunica una acción pasiva: algo será sometido a pisoteo. ''Pisoteada'' mantiene la violencia de רמס y funciona bien con el sustantivo femenino singular colectivo ''corona''.'
- source_word: עֲטֶרֶת
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - coroa
  - diadema
  lexicon: HALOT
  rationale: '''Corona'' es el equivalente español más natural para עֲטֶרֶת en este contexto metafórico de dignidad y honor, y encaja con la imagen del verso anterior.'
- source_word: גֵּא֖וּת
  english_pob_choice: proud
  chosen_spanish: orgullosa
  alternatives_spanish:
  - de orgullo
  - soberbia
  lexicon: HALOT
  rationale: Aunque la forma hebrea es un sustantivo ('orgullo'), el inglés POB lo vertió adjetivalmente. En español, 'orgullosa corona' preserva mejor la construcción y el matiz negativo sin perder el genitivo de cualidad.
- source_word: שִׁכּוֹרֵ֥י
  english_pob_choice: the drunkards of
  chosen_spanish: los borrachos de
  alternatives_spanish:
  - los ebrios de
  - los embriagados de
  lexicon: HALOT
  rationale: El participio/adjetivo plural caracteriza a un grupo por la embriaguez. 'Borrachos' es directo y conserva la fuerza moralmente despectiva del término.
- source_word: אֶפְרָֽיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efráim
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico en forma habitual de español. 'Efraín' es la transliteración más reconocible y adecuada para lectores de iglesia.
theological_decisions:
- issue: Genitivo metafórico en עֲטֶרֶת גֵּא֖וּת
  english_pob_reading: The proud crown
  chosen_spanish_reading: La orgullosa corona
  alternative_spanish_readings:
  - La corona de orgullo
  - La corona de la soberbia
  rationale: No hay cambio doctrinal; es una decisión estilística para reflejar el valor atributivo que el inglés POB adoptó. La forma adjetival suena natural en español y preserva la idea de una corona caracterizada por orgullo.
  doctrine_reference: Translation philosophy §6 (claridad moderna) y §5 (consistencia documentada)
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés y el hebreo: conserva la imagen de pisoteo con los pies, el sustantivo ''corona'' y el valor negativo de גֵּא֖וּת, pero ajusta la sintaxis para que sea natural y publicable en español.'
  spanish_consistency_notes:
  - Uso 'Yahvé' no aplica en este versículo.
  - Mantengo 'Efraín' como nombre propio y no lo expando a 'Israel' porque el hebreo nombra directamente a Efraín.
  - '''Orgullosa'' reproduce el sentido atributivo que el inglés POB resolvió como ''proud'' sin borrar la relación genitiva del original.'
