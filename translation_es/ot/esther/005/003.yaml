translation:
  language: es
  text: 'Entonces el rey le dijo: «¿Qué es[a], reina Ester? ¿Y cuál es tu petición[b]? Hasta la mitad del reino[c], te será concedido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «¿Qué te aflige, reina Ester?» o «¿Qué te preocupa?». El hebreo usa un modismo que literalmente dice: «¿Qué hay para ti?»'
    reason: lexical_alternative
  - marker: b
    text: O, «solicitud». El término también puede traducirse «petición» en sentido formal ante el rey.
    reason: lexical_alternative
  - marker: c
    text: Expresión real convencional de promesa generosa; no implica necesariamente una oferta literal de dividir el reino.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Y ... le dijo
  - Luego ... le dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia con naturalidad en español y mantiene el valor discursivo de avance temporal.
- source_word: לָהּ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  lexicon: HALOT
  rationale: El dativo pronominal se expresa de forma natural con «le» en español, sin añadir énfasis innecesario.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Traducción directa y transparente del sustantivo definido.
- source_word: מַה לָּךְ
  english_pob_choice: What is it
  chosen_spanish: ¿Qué te pasa?
  alternatives_spanish:
  - ¿Qué es de ti?
  - ¿Qué te ocurre?
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente dice «¿Qué hay para ti?». El español natural puede expresar esa inquietud como «¿Qué te pasa?», como alternativa válida a «¿Qué te ocurre?». Ambas conservan la idea de «¿qué te aflige/concierne?» sin rigidizar la idiomaticidad.
- source_word: אֶסְתֵּר הַמַּלְכָּה
  english_pob_choice: Queen Esther
  chosen_spanish: reina Ester
  alternatives_spanish:
  - Ester la reina
  lexicon: HALOT
  rationale: El título real suele ir antes del nombre en español. Se conserva tanto el cargo como el nombre propio en forma idiomática.
- source_word: בַּקָּשָׁתֵךְ
  english_pob_choice: request
  chosen_spanish: petición
  alternatives_spanish:
  - ruego
  - solicitud
  lexicon: HALOT
  rationale: בַּקָּשָׁה puede ser «petición» o «solicitud». «Petición» encaja mejor con el registro cortesano y mantiene el valor de requerimiento dirigido al rey.
- source_word: עַד חֲצִי הַמַּלְכוּת
  english_pob_choice: Up to half the kingdom
  chosen_spanish: Hasta la mitad del reino
  alternatives_spanish:
  - Aun hasta la mitad del reino
  - Hasta media parte del reino
  lexicon: HALOT
  rationale: La fórmula expresa el alcance hiperbólico de la promesa real. «Hasta la mitad del reino» reproduce bien el límite formulado por el hebreo y suena natural en español.
- source_word: וְיִנָּתֵן לָךְ
  english_pob_choice: it will be given to you
  chosen_spanish: te será concedido
  alternatives_spanish:
  - te será dado
  - te lo darán
  lexicon: HALOT
  rationale: El nifal funciona aquí como pasivo de promesa. «Te será concedido» mantiene el tono solemne y cortesano, y comunica la pasividad sin sobrecargar el español con un sujeto explícito indefinido.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene la misma lectura de alta concordancia y no registra revisiones aplicadas; el español sigue esa línea sin introducir tensiones nuevas, preservando el modismo de מַה לָּךְ como pregunta idiomática de preocupación y el formulismo cortesano de la promesa real.
  spanish_consistency_notes:
  - Se usa «reina» para el título de Ester, en paralelo con el orden idiomático español.
  - Se conserva el tono cortesano con «petición» y «te será concedido».
  - Se evita una traducción excesivamente literal de מַה לָּךְ para no perder su valor idiomático en español.
  - La nota de la promesa real distingue entre fórmula retórica y oferta literal.
