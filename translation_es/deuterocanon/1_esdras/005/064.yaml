translation:
  language: es
  text: Y supieron que los que habían vuelto del cautiverio estaban edificando el templo para el Señor Dios de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπέγνωσαν
  english_pob_choice: learned
  chosen_spanish: reconocieron
  alternatives_spanish:
  - llegaron a saber
  - entendieron
  - se dieron cuenta
  lexicon: BDAG
  rationale: El aoristo de ἐπιγινώσκω expresa llegar a una percepción clara. En español, «reconocieron» comunica esa toma de conciencia sin volverlo demasiado explicativo. También mantiene el matiz perceptivo del griego mejor que un simple «supieron».
- source_word: οἱ ἐκ τῆς αἰχμαλωσίας
  english_pob_choice: those from the captivity
  chosen_spanish: los que venían de la cautividad
  alternatives_spanish:
  - los exiliados
  - los que salieron del cautiverio
  - los de la cautividad
  lexicon: LSJ
  rationale: La frase identifica a los retornados desde el cautiverio/deportación. «Los que venían de la cautividad» conserva la estructura referencial del griego y sigue siendo natural en español bíblico claro. «Los exiliados» es más breve, pero menos transparente respecto al grupo descrito por el original.
- source_word: οἰκοδομοῦσιν
  english_pob_choice: were building
  chosen_spanish: estaban edificando
  alternatives_spanish:
  - están edificando
  - edificaban
  - estaban construyendo
  lexicon: BDAG
  rationale: El presente griego en discurso indirecto reporta una acción en curso. «Estaban edificando» refleja esa continuidad narrativa en español. «Construyendo» sería posible, pero «edificando» encaja mejor con el lenguaje del templo.
- source_word: ναός
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: Aquí ναός designa el edificio del templo. «Templo» es el equivalente más claro y estándar en este contexto de reconstrucción.
- source_word: τῷ κυρίῳ θεῷ Ἰσραήλ
  english_pob_choice: to the Lord God of Israel
  chosen_spanish: para el Señor Dios de Israel
  alternatives_spanish:
  - al Señor Dios de Israel
  - para el Dios Señor de Israel
  lexicon: BDAG/LSJ
  rationale: El dativo puede expresar destinatario o dedicación. Con «edificar» en español, «para» comunica naturalmente la dedicación del templo. Se mantiene «Señor» por la convención POB para κύριος; no se usa «Yahvé» aquí porque el contexto griego cita la fórmula titulada «κύριος θεός Ἰσραήλ» y el audit trail inglés la trata como designación bíblica fija.
theological_decisions:
- issue: Renderización de κύριος en una fórmula bíblica de deuterocanónico griego
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: La expresión «κύριος θεός Ἰσραήλ» funciona como designación bíblica estable del Dios de Israel. «Señor» preserva la continuidad con el uso bíblico y la lectura del audit trail en inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Valor del dativo con verbo de construcción
  english_pob_reading: to the Lord God of Israel
  chosen_spanish_reading: para el Señor Dios de Israel
  alternative_spanish_readings:
  - al Señor Dios de Israel
  rationale: El griego admite un dativo de destino/dedicación. En español, «para» expresa mejor que el templo está siendo edificado con destino a Dios, sin forzar una direccionalidad extraña.
  doctrine_reference: Sintaxis griega del dativo en contexto cultual
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: ἐπέγνωσαν se vierte con un verbo de percepción/descubrimiento natural en contexto, y el dativo se refleja de forma directa como dedicación con «para». No se añadieron notas al pie porque el texto español final no requiere alternativas impresas para esta unidad.'
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος, coherente con el estándar POB.
  - «Cautividad» mantiene el vínculo con la frase griega ἐκ τῆς αἰχμαλωσίας.
  - «Edificando» y «templo» mantienen registro bíblico claro y natural en español.
  - No se introduce «Yahvé» porque el original aquí presenta la fórmula griega titular sin una instancia directa del nombre hebreo, y el audit trail en inglés mantiene «Lord» como lectura estable.
