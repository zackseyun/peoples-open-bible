  text: 'All the king’s servants and the people of the king’s provinces know that for any man or woman who goes to the king in the inner court without being summoned[a], there is one law for him: to be put to death, except for the one to whom the king extends the golden scepter, so that he may live. But as for me[b], I have not been summoned to go in to the king these thirty days.'
  footnotes:
  - marker: a
    text: Or 'without being called.' The Hebrew passive verb can be rendered more literally, but 'summoned' better conveys formal court protocol.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''there is but one decree: death.'' The Hebrew idiom literally speaks of ''one law'' applying in such a case.'
    reason: lexical_alternative
