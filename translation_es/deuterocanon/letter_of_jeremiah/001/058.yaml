revisions:
- from: Así que es mejor un rey que muestra su propia valentía que los falsos dioses[a], o un vaso útil en una casa, que su dueño usará, o una puerta en una casa que guarda lo que está dentro de ella, o los falsos dioses, y un poste de madera en palacios que los falsos dioses.
