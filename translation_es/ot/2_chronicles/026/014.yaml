translation:
  language: es
  text: Y Uzías les preparó, para todo el ejército, escudos, lanzas, cascos, corazas, arcos y piedras para hondas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedras de honda». El hebreo dice literalmente «piedras de hondas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּכֶן
  english_pob_choice: prepared
  chosen_spanish: preparó
  alternatives_spanish:
  - proveyó
  - dejó listos
  lexicon: HALOT
  rationale: El verbo hifil de כון comunica dejar listo o proveer lo necesario. «Preparó» conserva ese sentido militar y es natural en español bíblico moderno.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: les
  alternatives_spanish:
  - para ellos
  - para sus hombres
  lexicon: HALOT
  rationale: El dativo pronominal se expresa con claridad en español mediante «les», manteniendo la referencia a las tropas sin añadir contenido no explícito.
- source_word: לְכָל הַצָּבָא
  english_pob_choice: for the whole army
  chosen_spanish: para todo el ejército
  alternatives_spanish:
  - para todo el ejército de guerra
  - para toda la tropa
  lexicon: HALOT
  rationale: צָבָא aquí es la fuerza militar. «Ejército» es el equivalente más claro y digno en español; «todo» refleja el alcance distributivo de לְכָל.
- source_word: מָגִנִּים
  english_pob_choice: shields
  chosen_spanish: escudos
  alternatives_spanish:
  - adargas
  - broqueles
  lexicon: HALOT
  rationale: Término militar estándar. «Escudos» transmite el arma defensiva sin arcaísmo innecesario.
- source_word: רְמָחִים
  english_pob_choice: spears
  chosen_spanish: lanzas
  alternatives_spanish:
  - azagayas
  - picas
  lexicon: HALOT
  rationale: En una lista de armamento, רְמָחִים se puede renderizar naturalmente como «lanzas». Mantiene el sentido de arma arrojadiza o de asta sin sobrerrestringir a una clase técnica.
- source_word: כּוֹבָעִים
  english_pob_choice: helmets
  chosen_spanish: cascos
  alternatives_spanish:
  - yelmos
  - casquetes
  lexicon: HALOT
  rationale: Designa protección para la cabeza. «Cascos» es claro y natural en español, y conserva la función militar del término.
- source_word: שִׁרְיֹנוֹת
  english_pob_choice: coats of armor
  chosen_spanish: corazas
  alternatives_spanish:
  - corazas de malla
  - cotas de armadura
  lexicon: HALOT
  rationale: El término apunta a armadura para el torso. «Corazas» es una equivalencia concisa y tradicional en español; se conserva la idea de protección corporal sin forzar una especificación no presente en el hebreo. La forma con corchetes en el texto refleja la variante estilística aceptable de «corazas» como plural del listado.
- source_word: קְשָׁתוֹת
  english_pob_choice: bows
  chosen_spanish: arcos
  alternatives_spanish:
  - arcos de guerra
  - arcos
  lexicon: HALOT
  rationale: Equivalencia directa y transparente para el arma de proyectiles.
- source_word: אַבְנֵי קְלָעִים
  english_pob_choice: slingstones
  chosen_spanish: piedras para honda
  alternatives_spanish:
  - piedras de honda
  - piedras para las hondas
  - piedras para lanzar con honda
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «piedras de honda». «Piedras para honda» comunica el objeto destinado al arma y evita un neologismo poco natural. Mantiene la nota léxica sobre el instrumento sin traducirlo de forma mecánica.
translation_notes:
  revision_awareness: La base inglesa pasó de «body armor» a «coats of armor» en la revisión más reciente. En español se optó por «corazas», que conserva la formalidad y la claridad del término de protección corporal en una lista militar, sin introducir una especificación innecesaria.
  spanish_consistency_notes:
  - Se mantiene «Y Uzías» para reflejar la coordinación narrativa del hebreo; en español bíblico moderno es aceptable y claro.
  - Se conservó el orden enumerativo de las armas para seguir de cerca la lista del texto fuente.
  - Se evitó «SEÑOR» o terminología litúrgica no pertinente; el versículo no contiene el nombre divino.
  - «Piedras para honda» es una solución idiomática; la nota preserva la alternativa más literal «piedras de honda».
