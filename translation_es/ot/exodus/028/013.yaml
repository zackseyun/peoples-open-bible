translation:
  language: es
  text: Y harás engastes de oro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «monturas» o «engastes de filigrana». El término hebreo denota engastes ornamentales, probablemente para fijar las piedras o las cadenas mencionadas en los versículos cercanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עָשִׂ֥יתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y harás tú
  - Entonces harás
  lexicon: HALOT
  rationale: El hebreo introduce una instrucción sucesiva con וְ + qatal 2ms; en español bíblico-natural, «y harás» conserva la coordinación y el valor prescriptivo sin volverlo demasiado explicativo.
- source_word: מִשְׁבְּצֹ֖ת
  english_pob_choice: settings
  chosen_spanish: engastes
  alternatives_spanish:
  - montajes
  - soportes
  - engastes ornamentales
  lexicon: HALOT
  rationale: El término designa piezas ornamentales destinadas a sostener o fijar piedras o cadenas en el contexto inmediato. «Engastes» es el equivalente español más claro y técnico sin añadir demasiada especificación, y mantiene la función de montura/ajuste ornamental.
- source_word: זָהָֽב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro fino
  - de oro puro
  - oro
  lexicon: HALOT
  rationale: La construcción nominal indica material; «de oro» reproduce con naturalidad el genitivo de materia del hebreo y es la forma más directa en español.
translation_notes:
  revision_awareness: El texto fuente muestra un acuerdo alto con la versión inglesa auditada y no presenta revisiones aplicadas; la redacción española sigue de cerca el valor instructivo del hebreo y conserva la ambigüedad léxica documentada para מִשְׁבְּצֹת en una nota.
  spanish_consistency_notes:
  - Se prefirió «engastes» para mantener un término técnico breve y natural en español.
  - Se conservó la coordinación inicial con «Y» para reflejar la secuencia imperativa del pasaje.
  - No se introdujo una expansión interpretativa sobre el uso exacto de los engastes más allá de lo que el contexto inmediato autoriza.
