id: ROM.10.13
reference: Romans 10:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πᾶς γὰρ ὃς ἂν ἐπικαλέσηται τὸ ὄνομα κυρίου σωθήσεται.
base_translation:
  language: en
  yaml_path: translation/nt/romans/010/013.yaml
  text: For everyone who calls on the name of the Lord will be saved[a][b].
  footnotes:
  - marker: a
    text: Paul is quoting Joel 2:32. In Joel, the referent is YHWH ('the LORD'); here Paul applies the text to Jesus in context.
    reason: cross_reference
  - marker: b
    text: Or 'whoever calls upon.' The Greek expression means to invoke or appeal to the Lord by name.
    reason: lexical_alternative
translation:
  language: ko
  text: 「주의 이름을 부르는 자마다 구원을 받을 것이기 때문입니다.」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 요엘 3:5(LXX 2:32) 인용. 히브리 본문은 「יהוה(야훼)의 이름」을 가리키지만, 바울은 문맥상 이를 예수께 적용한다(10:9 「예수는 주」). 본문은 인용된 헬라어 표현 「주의 이름」을 유지하고, 야훼 본문의 기독론적 적용임을 각주로 밝힌다.
    reason: cross_reference
lexical_decisions:
- source_word: τὸ ὄνομα κυρίου
  english_pob_choice: the name of the Lord
  chosen_korean: 주의 이름
  alternatives_korean:
  - 야훼의 이름
  lexicon: BDAG
  rationale: 원 인용 본문(요엘 3:5)은 「야훼의 이름」이지만, 바울은 이를 예수께 적용한다. 신약 인용 문맥의 κύριος를 「주」로 두고 기독론적 적용을 각주에 명시한다.
theological_decisions:
- issue: 요엘 3:5(LXX 2:32)에서 야훼의 이름을 부르는 자를 바울이 예수께 적용한 것을 한국어 본문에서 어떻게 표현할 것인가
  chosen_reading: 주의 이름 (각주로 야훼 본문 + 기독론적 적용 설명)
  alternative_readings:
  - 야훼의 이름
  - 예수의 이름
  rationale: 바울은 10:9에서 「예수를 주로」 시인할 것을 말한 직후 10:13에서 요엘의 야훼 본문을 인용하여 예수께 적용한다. 본문은 인용된 헬라어 표현 「주의 이름」을 유지하여 바울의 의도적 모호성(예수=주=야훼)을 보존하고, 야훼 인용 + 기독론적 적용 두 층위를 각주로 설명한다. 본문을 「야훼의 이름」으로 직역하면 바울이 의도한 그리스도-주-야훼 연결의 점층적 충격을 잃게 된다.
  doctrine_reference: 'DOCTRINE.md: 신적 이름 정책; 신약 인용 본문 처리; 기독론적 적용'
