lexical_decisions:
- source_word: אַף
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Aun así
  - Y sin embargo
  lexicon: HALOT
  rationale: La partícula introduce un giro adversativo fuerte frente a las afirmaciones previas del salmo. «Sin embargo» conserva ese contraste de manera natural en español y evita un calco demasiado literal.
- source_word: זָנַחְתָּ
  english_pob_choice: you have rejected
  chosen_spanish: nos has rechazado
  alternatives_spanish:
  - nos has desechado
  - nos has abandonado
  - nos has echado fuera
  lexicon: HALOT
  rationale: זנח expresa rechazo o desecho relacional. «Has rechazado» sigue de cerca el valor verbal y mantiene el perfecto con relevancia presente, como en el inglés auditado.
- source_word: וַתַּכְלִימֵנוּ
  english_pob_choice: and put us to shame
  chosen_spanish: y nos has avergonzado
  alternatives_spanish:
  - y nos has humillado
  - y nos has deshonrado
  - y nos has cubierto de vergüenza
  lexicon: HALOT
  rationale: La forma causativa de כלם comunica hacer caer en vergüenza o deshonra. «Avergonzado» reproduce bien la relación causal y suena natural en un lamento poético en español.
- source_word: תֵצֵא
  english_pob_choice: you do not go out
  chosen_spanish: no sales
  alternatives_spanish:
  - no saldrás
  - no sales a la guerra
  - no marchas
  lexicon: HALOT
  rationale: יצא conserva su sentido básico de «salir». En español, el presente «no sales» preserva la fuerza de la queja y permite que el contexto militar quede explícito por la frase siguiente.
- source_word: בְּצִבְאוֹתֵינוּ
  english_pob_choice: with our armies
  chosen_spanish: con nuestros ejércitos
  alternatives_spanish:
  - con nuestras huestes
  - con nuestras fuerzas
  - en nuestros ejércitos
  lexicon: HALOT
  rationale: צָבָא aquí es claramente militar. «Ejércitos» es la opción más clara y estándar en español bíblico contemporáneo sin introducir un tono eclesiástico ajeno al contexto.
theological_decisions:
- issue: Retiro divino en contexto de guerra
  english_pob_reading: The verse is rendered as a lament that God has withdrawn his support from Israel's military campaigns.
  chosen_spanish_reading: El versículo se vierte como una lamentación de que Dios ha retirado su apoyo de las campañas militares de Israel.
  alternative_spanish_readings:
  - Dios no acompaña a nuestros ejércitos
  - Dios no sale con nuestras tropas
  rationale: El hebreo presenta una queja de abandono pactal y militar, no una formulación doctrinal abstracta. La redacción española mantiene esa tensión sin suavizarla ni ampliarla indebidamente.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios y el acuerdo de revisión fue alto.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto solo cuando aparece el nombre divino; en este versículo no aparece.
  - Se mantiene el tono de lamento poético con verbo en perfecto español («has rechazado», «has avergonzado») para reflejar la relevancia presente del hebreo.
  - «Ejércitos» traduce el referente militar de צבאות sin sustituirlo por terminología eclesiástica.
