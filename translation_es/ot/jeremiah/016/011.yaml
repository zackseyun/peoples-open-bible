    reason: lexical_alternative
  - marker: b
    text: O «mi instrucción». El hebreo torá puede significar «ley» o «instrucción», según el contexto.
    reason: lexical_alternative
  revision_rationale: Se corrige «dirás a ellos» a «les dirás» para un español natural y eclesialmente legible; se mejora el matiz de השתחוה con «se postraron ante ellos»; y se normaliza el orden final a «no guardaron mi ley» sin perder énfasis ni sentido. Se conservan las notas léxicas necesarias para «padres/antepasados» y «ley/instrucción».
