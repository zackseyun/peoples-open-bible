revisions:
- from: Pero si la tierra de su posesión es impura[a], crucen para ustedes a la tierra de la posesión de Yahvé, donde habitaba el tabernáculo de Yahvé[b], y tomen posesión entre nosotros[c]. Solo no se rebelen contra Yahvé, ni contra nosotros, al construir para ustedes un altar, aparte del altar de Yahvé nuestro Dios[d].
  to: Pero si la tierra de su posesión es impura[a], crucen ustedes a la tierra de la posesión de Yahvé, donde está el tabernáculo de Yahvé[b], y establezcan su posesión entre nosotros[c]. Solo no se rebelen contra Yahvé, ni contra nosotros, al construir para ustedes un altar, aparte del altar de Yahvé nuestro Dios[d].
  rationale: 'Se hicieron ajustes menores para mejorar la fidelidad semántica y la naturalidad del español: se evitó el pasado potencialmente engañoso en la cláusula del tabernáculo, se suavizó un calco poco idiomático del imperativo, se hizo más natural la expresión de asentamiento/tenencia, y se corrigió la nota sobre מִבַּלְעֲדֵי para alinearla con el hebreo y con el POB auditado.'
