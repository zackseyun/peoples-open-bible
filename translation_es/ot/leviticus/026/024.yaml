translation:
  language: es
  text: Entonces yo también andaré[a] en oposición a ustedes, y yo mismo los heriré siete veces por sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “con hostilidad” / “de manera contraria”. El término hebreo traducido aquí es una palabra clave repetida en Levítico 26 para describir la oposición recíproca entre Israel y Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הָלַכְתִּי
  english_pob_choice: then I ... will walk
  chosen_spanish: Entonces yo también andaré
  alternatives_spanish:
  - Y yo andaré
  - Entonces también yo andaré
  lexicon: HALOT
  rationale: הלך mantiene el sentido básico de ‘andar/ir’; en este contexto de juicio del pacto, ‘andaré’ conserva la imagen repetida sin volverla una paráfrasis abstracta. ‘Entonces’ refleja la progresión del anuncio, como en el audit trail en inglés.
- source_word: אַף אֲנִי
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - aun yo
  - yo mismo también
  lexicon: HALOT
  rationale: La combinación añade énfasis y reciprocidad. ‘Yo también’ expresa bien ese refuerzo en español sin sonar arcaico.
- source_word: עִמָּכֶם
  english_pob_choice: to you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - a ustedes
  lexicon: HALOT
  rationale: Aunque literalmente es ‘con ustedes’, el español permite mantener la preposición de compañía dentro de la expresión de reciprocidad. Aquí se conserva la relación verbal con ‘andar’ sin forzar ‘a ustedes’.
- source_word: בְּ/קֶרִי
  english_pob_choice: contrary
  chosen_spanish: en oposición
  alternatives_spanish:
  - con hostilidad
  - en contrariedad
  lexicon: HALOT
  rationale: קֶרִי es un término clave y repetido en Levítico 26 para una respuesta opuesta/hostil dentro de la maldición del pacto. ‘En oposición’ comunica la fuerza relacional sin cargar innecesariamente el tono afectivo de ‘hostilidad’.
- source_word: וְ/הִכֵּיתִי
  english_pob_choice: and ... will strike
  chosen_spanish: y yo mismo los heriré
  alternatives_spanish:
  - y los golpearé
  - y los castigaré golpeándolos
  lexicon: HALOT
  rationale: נכה puede ser ‘golpear/herir/smiter’. ‘Heriré’ transmite el acto punitivo con suficiente fuerza en español y encaja con el tono judicial del pasaje.
- source_word: גַּם אָ֔נִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - también yo
  - aun yo mismo
  lexicon: HALOT
  rationale: El énfasis recae en la acción directa de Dios. ‘Yo mismo’ mantiene la intensificación sin duplicar de forma pesada la función de ‘también’ ya expresada antes.
- source_word: שֶׁבַע
  english_pob_choice: sevenfold
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete pliegues
  - siete veces más
  lexicon: HALOT
  rationale: En español, ‘siete veces’ preserva la fórmula idiomática del hebreo con naturalidad. ‘Siete veces’ puede funcionar tanto como multiplicación literal como intensificación retórica, que es el valor aquí.
- source_word: עַל חַטֹּאתֵיכֶם
  english_pob_choice: for your sins
  chosen_spanish: por sus pecados
  alternatives_spanish:
  - a causa de sus pecados
  - por causa de sus pecados
  lexicon: HALOT
  rationale: La preposición על marca base o motivo del castigo. ‘Por sus pecados’ es una equivalencia natural en español y conserva la relación causal sin añadir interpretación.
theological_decisions:
- issue: Cómo rendir el término clave בקרי en la reciprocidad de juicio del pacto
  english_pob_reading: contrary
  chosen_spanish_reading: en oposición
  alternative_spanish_readings:
  - con hostilidad
  - en contrariedad
  rationale: La frase describe una respuesta recíproca de Yahvé dentro de la maldición pactal. ‘En oposición’ conserva el carácter relacional y judicial del término sin convertirlo en una simplificación emocional.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Intensidad de שבע en la fórmula de castigo
  english_pob_reading: sevenfold
  chosen_spanish_reading: siete veces
  alternative_spanish_readings:
  - siete veces más
  rationale: Se conserva la fórmula intensificadora del hebreo sin volverla una afirmación meramente aritmética. ‘Siete veces’ es fiel, natural y mantiene la advertencia retórica.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El texto se ajusta al audit trail inglés y al hebreo: se preserva el verbo de movimiento como ‘andaré’, el término clave בקרי con una equivalencia no domesticada, la reiteración enfática de la acción divina, y la fórmula intensificadora שבע con una lectura idiomática natural en español.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en la traducción estándar del proyecto para el nombre divino, aunque en este versículo el hebreo no lo expresa explícitamente; la referencia implícita del contexto del discurso se mantiene sin añadir el nombre en el texto.
  - ‘Pecados’ traduce חטאתיכם en plural con valor causal dentro de la frase de castigo.
  - Se evita ‘SEÑOR’ como sustituto editorial, conforme a la política del proyecto.
