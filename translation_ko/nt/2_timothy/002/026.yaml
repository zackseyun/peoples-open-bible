id: 2TI.2.26
reference: 2 Timothy 2:26
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἀνανήψωσιν ἐκ τῆς τοῦ διαβόλου παγίδος, ἐζωγρημένοι ὑπ’ αὐτοῦ εἰς τὸ ἐκείνου θέλημα.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/026.yaml
  text: and they may come to their senses out of the devil’s snare, having been captured alive by him for his will.
translation:
  language: ko
  text: 또 마귀에게 사로잡혀 그의 뜻에 끌려다니던 자들이[a] 그 올무에서 깨어나 정신을 차리게 될 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 「그의 뜻」(ἐκείνου θέλημα)에서 「그」가 마귀를 가리킨다는 견해와 하나님을 가리킨다는 견해가 함께 있다. 본 번역은 가까운 선행사 「마귀」를 따른다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνανήψωσιν
  english_pob_choice: come to their senses
  chosen_korean: 깨어나 정신을 차리게
  alternatives_korean:
  - 다시 정신을 차리게
  - 술 깨듯이 정신 차리게
  lexicon: BDAG
  rationale: ἀνανήφω는 「취기에서 깨어남」을 본의로 한다. 「깨어나 정신을 차리다」가 그 비유의 무게를 살린다.
- source_word: τῆς τοῦ διαβόλου παγίδος
  english_pob_choice: the devil's snare
  chosen_korean: 마귀의 올무
  alternatives_korean:
  - 마귀의 덫
  - 악마의 함정
  lexicon: BDAG
  rationale: παγίς는 「올무·덫」. 한국 성서 전통의 「올무」가 자연스럽다. διάβολος는 「마귀」로 옮긴다(한국 성서 전통).
- source_word: ἐζωγρημένοι ὑπ’ αὐτοῦ εἰς τὸ ἐκείνου θέλημα
  english_pob_choice: having been captured alive by him for his will
  chosen_korean: 마귀에게 사로잡혀 그의 뜻에 끌려다니던 자들이
  alternatives_korean:
  - 마귀에게 산 채로 사로잡혀 그의 뜻을 행하도록 끌려간 자들이
  - 마귀에게 생포되어 그의 뜻에 종노릇하던 자들이
  lexicon: BDAG
  rationale: ζωγρέω는 「산 채로 잡다」를 본의로 하며, 본문은 마귀가 사람을 죽이지 않고 그의 뜻대로 부리려고 사로잡는 이미지를 그린다. 「사로잡혀 끌려다니던」이 그 인격적 종속의 무게를 자연스럽게 담는다.
