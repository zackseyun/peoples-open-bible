translation:
  language: es
  text: 'Y los egipcios apremiaban al pueblo[a], apresurándose a hacerlos salir de la tierra, porque dijeron: «Todos somos hombres muertos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apremiando al pueblo para hacerlos salir de la tierra». El hebreo usa dos infinitivos seguidos para expresar una prisa intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֶּחֱזַק
  english_pob_choice: urged on
  chosen_spanish: urgían al pueblo
  alternatives_spanish:
  - presionaban al pueblo
  - apremiaban al pueblo
  - insistían con fuerza al pueblo
  lexicon: HALOT
  rationale: La forma verbal expresa presión intensa sobre el pueblo, no solo fuerza física. «Urgían» conserva la idea de insistencia apremiante con un español natural y formal.
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  - el pueblo de Egipto
  lexicon: HALOT
  rationale: Aunque la forma hebrea es el nombre colectivo con verbo singular, el sentido contextual es el pueblo egipcio. «Los egipcios» hace claro el sujeto colectivo sin perder el valor del hebreo.
- source_word: עַל הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - sobre el pueblo
  lexicon: HALOT
  rationale: La preposición hebrea marca presión sobre el objeto. En español, con «urgían», el complemento directo «al pueblo» comunica esa presión de forma más natural que una repetición literal de «sobre».
- source_word: לְמַהֵר
  english_pob_choice: hurrying
  chosen_spanish: apresurándose
  alternatives_spanish:
  - con prisa
  - rápidamente
  - dándose prisa
  lexicon: HALOT
  rationale: El infinitivo expresa prisa y simultaneidad de la acción. El gerundio «apresurándose» reproduce bien el matiz de urgencia y la relación con el siguiente infinitivo.
- source_word: לְשַׁלְּחָם
  english_pob_choice: to send them out
  chosen_spanish: a echarlos
  alternatives_spanish:
  - a enviarlos fuera
  - a dejarlos ir
  - a expulsarlos
  lexicon: HALOT
  rationale: «Enviar fuera» suena poco idiomático en español. «Echarlos» expresa de manera directa la salida forzada, manteniendo el sentido de despacharlos fuera del país.
- source_word: מִן הָאָרֶץ
  english_pob_choice: out of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - fuera del país
  - de la tierra/país
  lexicon: HALOT
  rationale: El hebreo dice «la tierra», con referencia contextual a Egipto. «De la tierra» conserva el giro del original; no se añade «Egipto» para no sobreespecificar el texto hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la urgencia. «Porque» es la correspondencia más clara y natural en español narrativo.
- source_word: אָמְרוּ
  english_pob_choice: they said
  chosen_spanish: decían
  alternatives_spanish:
  - dijeron
  lexicon: HALOT
  rationale: Aunque es perfecto narrativo, en español el imperfecto puede representar la declaración como motivo reiterado o formulado en la situación. «Decían» mantiene el tono explicativo de la frase causal.
- source_word: כֻּלָּנוּ
  english_pob_choice: we are all
  chosen_spanish: todos nosotros somos
  alternatives_spanish:
  - todos somos
  - somos todos
  lexicon: HALOT
  rationale: El hebreo enfatiza la totalidad del grupo. «Todos nosotros somos» conserva esa fuerza colectiva y prepara el predicado final.
- source_word: מֵתִים
  english_pob_choice: dead men
  chosen_spanish: hombres muertos
  alternatives_spanish:
  - muertos
  - personas muertas
  lexicon: HALOT
  rationale: La revisión inglesa volvió a un modismo idiomático («dead men») para reflejar el hebreo como estado temido/consumado. En español, «hombres muertos» conserva ese giro de manera sobria; «muertos» sería más breve pero pierde el eco nominal del hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés, que prefirió «urged on» y resolvió la clausula final con un giro idiomático equivalente a «dead men». El español conserva esa doble decisión: presión fuerte al pueblo y una autoidentificación como muertos, sin suavizar la intensidad del hebreo. También se tuvo en cuenta que el hebreo encadena dos infinitivos de propósito/acción urgente, por lo que se optó por un gerundio español natural y una nota alternativa que deja ver la posibilidad de traducirlos de forma más literal.'
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para coordinar con el flujo narrativo bíblico.
  - «Los egipcios» funciona como sujeto colectivo, coherente con el verbo singular hebreo.
  - Se eligió «la tierra» para preservar el término del hebreo, en lugar de explicitar «Egipto» en el texto principal.
  - La frase final evita «estamos muriendo» porque la revisión auditada favoreció el modismo de identidad/descripción («hombres muertos») más cercano al idiomático hebreo.
