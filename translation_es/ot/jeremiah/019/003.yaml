revisions:
- from: 'Y dirás: «Oigan la palabra de Yahvé, reyes de Judá y habitantes de Jerusalén. Así ha dicho Yahvé de los ejércitos, el Dios de Israel: He aquí, estoy trayendo una calamidad[a] sobre este lugar[b], de modo que a todo el que la oiga le zumbarán los oídos».'
  to: 'Y dirás: «Oigan la palabra de Yahvé, reyes de Judá y habitantes de Jerusalén. Así dice Yahvé de los ejércitos, el Dios de Israel: He aquí, estoy trayendo una calamidad[a] sobre este lugar, de modo que a todo el que la oiga le zumbarán los oídos[b]».'
  rationale: 'Se corrigió la fórmula profética a «Así dice» por mayor naturalidad y fidelidad funcional, y se reubicaron las notas para que correspondan exactamente a los elementos que explican: la nota léxica a «calamidad» y la nota cultural al modismo de los oídos. El resto del texto se conserva porque representa adecuadamente el hebreo y la terminología del proyecto.'
