translation:
  language: es
  text: los de Chadiasai y Ammidioi, cuatrocientos veintidós; los de Keiramas Kabbes[a], seiscientos veintiuno[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente 'los de Keiramas Kabbes'. Esta formulación es algo áspera; en el contexto del censo puede entenderse como una entrada de grupo o procedencia. El paralelo hebreo difiere considerablemente en este punto.
    reason: alternative_reading
  - marker: b
    text: El paralelo hebreo de Esdras/Nehemías no coincide estrechamente con estos nombres ni con esta cifra; por eso aquí se sigue el griego como testimonio principal.
    reason: textual_variant
lexical_decisions:
- source_word: οἱ Χαδιάσαι
  english_pob_choice: the sons of Chadiasai
  chosen_spanish: los cadiasai
  alternatives_spanish:
  - los hijos de Chadiasai
  - los de Chadiasai
  lexicon: LSJ
  rationale: En este censo genealógico, el artículo plural funciona como designación de grupo. En español, para evitar una adición interpretativa demasiado fuerte, se conserva el nombre grupal transliterado. 'Los hijos de' sería más explícito, pero va más allá del griego inmediato.
- source_word: καὶ Ἀμμίδιοι
  english_pob_choice: and Ammidioi
  chosen_spanish: y ammidioi
  alternatives_spanish:
  - y los ammidioi
  - y Ammidioi
  lexicon: LSJ
  rationale: Se mantiene la coordinación simple del griego y la transliteración del nombre propio/grupo. Se evita forzar un artículo adicional que no está en la secuencia nominal griega.
- source_word: τετρακόσιοι εἴκοσι δύο
  english_pob_choice: four hundred twenty-two
  chosen_spanish: cuatrocientos veintidós
  alternatives_spanish:
  - cuatrocientos y veintidós
  lexicon: LSJ
  rationale: Número cardinal directo; en español contemporáneo es más natural sin 'y'. Se conserva la equivalencia numérica exacta.
- source_word: οἱ ἐκ Κειράμας Κάββης
  english_pob_choice: the sons of Keiramas Kabbes
  chosen_spanish: los de Keiramas Kabbes
  alternatives_spanish:
  - los hijos de Keiramas Kabbes
  - los que son de Keiramas Kabbes
  - los de Keiramas y Kabbes
  lexicon: LSJ
  rationale: El griego usa ἐκ ('de/from'), y el contexto de listas censales permite una traducción breve y ambigua en español que preserve la posible relación de procedencia o pertenencia. Se evita introducir 'hijos de' porque aquí el griego es más elíptico y el testimonio es textualmente irregular.
- source_word: ἑξακόσιοι εἴκοσι εἷς
  english_pob_choice: six hundred twenty-one
  chosen_spanish: seiscientos veintiuno
  alternatives_spanish:
  - seiscientos y veintiuno
  lexicon: LSJ
  rationale: Número cardinal directo en español moderno, sin 'y'.
theological_decisions:
- issue: Tratamiento de nombres/grupos étnico-genealógicos en un listado censal divergente
  english_pob_reading: The translation follows the Greek as primary; the Hebrew parallel differs substantially, so the census-style family rendering is an interpretive convenience rather than a strict alignment with the Hebrew form.
  chosen_spanish_reading: La traducción sigue el griego como texto principal y conserva la forma de lista censal sin armonizar con el paralelo hebreo.
  alternative_spanish_readings:
  - armonizar los nombres con el paralelo hebreo
  - explicitar 'hijos de' en ambos grupos
  rationale: El pasaje presenta una lista nominal con tradición textual divergente. En español conviene respetar la lectura griega sin corregirla por el paralelo hebreo, porque eso borraría una tensión documentada por el aparato de auditoría.
  doctrine_reference: Principio de primacía del testimonio textual y de transparencia frente a variantes
translation_notes:
  revision_awareness: Se respetó la revisión del audit trail que eliminó una conjunción adicional en el grupo de Keiramas/Kabbes para reflejar mejor la secuencia griega. En español se mantuvo una formulación breve y censal sin añadir una segunda conjunción no presente en el griego.
  spanish_consistency_notes:
  - Se conservaron transliteraciones uniformes para los nombres propios, sin adaptar a formas tradicionales ajenas al testimonio griego.
  - Se usaron números en palabras, en estilo natural para publicación en español.
  - No se añadió 'hijos de' para evitar una ampliación interpretativa que el griego no exige explícitamente.
