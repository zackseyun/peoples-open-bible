  rationale: Se reancla correctamente la nota léxica a 'Dichoso' y se sustituye 'las guarda en su corazón' por 'las toma a pecho', que comunica con más precisión y naturalidad el idiomatismo hebreo de interiorizar seriamente estas enseñanzas, en línea con la auditoría inglesa.
