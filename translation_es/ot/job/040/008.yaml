revisions:
- from: ¿Acaso tú también anularías mi justicia[a]? ¿Me condenarías para que tú quedaras justificado?
  to: ¿Acaso anularías mi justicia[a]? ¿Me condenarías para que seas justificado?
  rationale: 'La revisión hace dos ajustes menores: elimina «tú también», que en español introduce una adición menos natural que el simple énfasis retórico del hebreo, y cambia «quedaras justificado» por «seas justificado», una forma más idiomática y forense. Se conserva la traducción principal «mi justicia» y la nota alternativa «mi juicio» de acuerdo con la auditoría inglesa.'
