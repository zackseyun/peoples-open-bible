translation:
  language: es
  text: Porque cuando nuestros padres eran llevados a Persia[a], los piadosos sacerdotes tomaron parte del fuego del altar y lo escondieron en el hueco de un pozo seco, donde lo resguardaron para que nadie supiera dónde estaba el lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «eran deportados a Persia». El verbo griego puede denotar ser llevado o arrastrado al exilio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγοντο
  english_pob_choice: were being led away
  chosen_spanish: eran llevados
  alternatives_spanish:
  - eran deportados
  - eran conducidos
  - eran arrastrados
  lexicon: LSJ
  rationale: El imperfecto pasivo en este contexto describe una acción de traslado forzado y continuo. «Eran llevados» conserva la pasividad y el movimiento hacia el exilio sin precisar más de lo que el griego dice.
- source_word: Περσικὴν
  english_pob_choice: Persia
  chosen_spanish: Persia
  alternatives_spanish:
  - la tierra persa
  - el país de Persia
  lexicon: LSJ
  rationale: El adjetivo sustantivado se refiere al territorio de Persia. «Persia» es natural en español y refleja adecuadamente la referencia geográfica.
- source_word: εὐσεβεῖς
  english_pob_choice: devout
  chosen_spanish: piadosos
  alternatives_spanish:
  - devotos
  - religiosos
  - fieles
  lexicon: LSJ
  rationale: «Piadosos» comunica bien la fidelidad religiosa de los sacerdotes y mantiene un registro digno y comprensible en español. «Devotos» también sería posible, pero puede sonar más limitado o menos solemne.
- source_word: λαβόντες ἀπὸ τοῦ πυρὸς τοῦ θυσιαστηρίου
  english_pob_choice: took some of the fire from the altar
  chosen_spanish: tomaron parte del fuego del altar
  alternatives_spanish:
  - tomaron algo del fuego del altar
  - tomaron fuego del altar
  - tomaron del fuego del altar
  lexicon: LSJ
  rationale: 'La construcción con ἀπό indica fuente: tomaron del fuego del altar, no todo el fuego ni el altar mismo. «Parte del fuego» hace explícita esa idea partitiva y suena natural en español.'
- source_word: λαθραίως
  english_pob_choice: secretly
  chosen_spanish: secretamente
  alternatives_spanish:
  - a escondidas
  - en secreto
  - sigilosamente
  lexicon: LSJ
  rationale: El adverbio expresa ocultamiento de la acción. «Secretamente» reproduce bien el valor adverbial y mantiene un tono sobrio.
- source_word: κοιλώματι φρέατος τάξιν ἔχοντος ἀνύδρου
  english_pob_choice: the hollow of a dry well
  chosen_spanish: el hueco de un pozo seco
  alternatives_spanish:
  - la cavidad de un pozo seco
  - el interior de un pozo seco
  - el hueco de un pozo sin agua
  lexicon: LSJ
  rationale: La frase describe un espacio hueco perteneciente a un pozo que está sin agua. «Hueco de un pozo seco» conserva la imagen y evita una paráfrasis excesiva.
- source_word: κατησφαλίσαντο
  english_pob_choice: secured it
  chosen_spanish: lo aseguraron
  alternatives_spanish:
  - lo dejaron seguro
  - lo resguardaron
  - lo sellaron
  lexicon: LSJ
  rationale: El verbo expresa que hicieron seguro el depósito oculto. «Lo aseguraron» sigue de cerca la fuerza del griego y encaja con el contexto de esconder y proteger.
- source_word: ὥστε πᾶσιν ἄγνωστον εἶναι τὸν τόπον
  english_pob_choice: so that the place would be unknown to everyone
  chosen_spanish: para que el lugar quedara desconocido para todos
  alternatives_spanish:
  - de modo que nadie conociera el lugar
  - para que nadie supiera dónde estaba
  - así que el lugar fuera desconocido para todos
  lexicon: LSJ
  rationale: 'La cláusula de ὥστε expresa el resultado buscado: que el lugar permaneciera oculto. «Quedara desconocido para todos» conserva la pasividad y el matiz de permanencia implícito.'
theological_decisions:
- issue: Traslado forzado de los antepasados
  english_pob_reading: being led away into Persia
  chosen_spanish_reading: eran llevados a Persia
  alternative_spanish_readings:
  - eran deportados a Persia
  - eran conducidos a Persia
  rationale: El griego no usa un término técnico explícito para «deportación», aunque el contexto sugiere exilio o traslado forzado. Se conserva una formulación sobria que deja ver el movimiento impuesto sin añadir una etiqueta más fuerte que el texto base.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se detectaron revisiones aplicadas. La versión española sigue la decisión inglesa de preservar la idea de un traslado exílico sin sobreactuarla, y ajusta el estilo a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «piadosos» para εὐσεβεῖς, en coherencia con una opción de registro digna y bíblica sin recurrir a arcaísmo.
  - «Fuego del altar» preserva la relación de origen indicada por ἀπό, evitando simplificarlo a una expresión menos precisa.
  - «Pozo seco» conserva la imagen física del griego y la solución auditada en inglés.
  - No se introduce la tradición de ocultar el fuego en términos no sustentados por el texto; se limita a «hueco de un pozo seco» y «lo aseguraron».
