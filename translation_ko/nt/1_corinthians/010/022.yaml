  text: 아니면 우리가 주를 시기하시게 하는 것입니까? 우리가 그분보다 강하기라도 한 것입니까?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본문의 「주를 시기하시게 하다」(παραζηλοῦμεν τὸν κύριον)는 신명기 32:21 (LXX)의 야훼-시기 사상을 분명히 반향한다. 한국어 본문은 신약의 호칭 일치를 위해 「주」를 유지하되, 구약 야훼-언약의 무게가 그 배후에 있음을 본 각주로 표시한다.
    reason: cross_reference
