review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la auditoría inglesa en la estructura general: Zebah y Zalmunna están en Karkor, su campamento está con ellos, el número es aproximado, se preserva «hijos del oriente», y la cláusula final resume a los caídos como combatientes. Sin embargo, hay dos puntos mejorables para mayor fidelidad y español natural: «como quince mil hombres» suena menos idiomático que «unos quince mil», y «hombres que sacaban la espada» no expresa bien el modismo militar retrospectivo; «hombres que desenvainaban espada» preserva mejor la imagen hebrea.'
  spanish_quality_summary: El texto es legible y digno, pero tiene leves roces de naturalidad. «Ahora» funciona, aunque «Y» también sería posible; no exige cambio. La nota sobre Carkor/Karkor es útil, pero conviene anclarla a una transliteración principal más cercana al inglés auditado y al topónimo hebreo. «Unos quince mil» mejora la fluidez. «Desenvainaban espada» suena más natural y preciso en contexto bélico que «sacaban la espada».
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Se alinea bien con la decisión auditada de mantener «hijos del oriente». El topónimo conviene normalizar como «Karkor» en el texto principal, dejando «Carkor» como alternativa si se desea, para reflejar mejor la documentación inglesa y el hebreo קַרְקֹר.
  issues:
  - severity: medium
    issue: Topónimo principal como «Carkor» en vez de «Karkor».
    rationale: No es incorrecto en español, pero la auditoría inglesa fija «Karkor» y la nota ya reconoce esa forma. Mantener «Karkor» en el texto principal preserva mejor la continuidad del expediente y la forma hebrea documentada.
  - severity: low
    issue: «como quince mil hombres» es poco natural.
    rationale: El prefijo כ sí expresa aproximación, pero en español narrativo bíblico «unos quince mil» o «aproximadamente quince mil» suenan más claros y naturales.
  - severity: medium
    issue: «hombres que sacaban la espada» es una realización débil del modismo militar.
    rationale: En este resumen de combatientes caídos, «desenvainaban espada» refleja mejor שֹׁלֵף חָרֶב como expresión marcial, evitando una imagen algo prosaica o ambigua de «sacaban la espada».
  revised_spanish_text: Ahora Sébaj y Zalmuna estaban en Karkor[a], y su campamento estaba con ellos, unos quince mil, todos los que habían quedado de todo el campamento de los hijos del oriente; y los que habían caído eran ciento veinte mil hombres que desenvainaban espada.
  revised_footnotes:
  - marker: a
    text: O «Carkor»; el hebreo usa el topónimo קַרְקֹר.
    reason: lexical_alternative
  revision_rationale: Se ajusta el topónimo principal a «Karkor» para concordar con la auditoría y el hebreo documentado, dejando «Carkor» como alternativa en nota. Se mejora la naturalidad de la aproximación numérica con «unos quince mil». Se sustituye «sacaban la espada» por «desenvainaban espada» para representar con más precisión y fuerza el modismo marcial hebreo שֹׁלֵף חָרֶב. No se requiere adjudicación adicional.
