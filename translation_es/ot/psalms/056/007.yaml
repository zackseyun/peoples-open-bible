translation:
  language: es
  text: Ellos se juntan; se esconden[a]; vigilan mis pasos[b], mientras esperan contra mi vida[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se agazapan»; el verbo hebreo puede sugerir ocultarse en emboscada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «mis talones»; idiomáticamente, «mis pasos» o «mis pisadas».
    reason: lexical_alternative
  - marker: c
    text: O «aguardan mi vida»; el verbo hebreo normalmente significa «esperar» o «aguardar», pero aquí se usa en un contexto hostil.
    reason: lexical_alternative
  - marker: d
    text: O «como esperan mi vida».
    reason: previous_rendering
lexical_decisions:
- source_word: יָגוּרוּ
  english_pob_choice: they gather together
  chosen_spanish: se juntan
  alternatives_spanish:
  - se congregan
  - se reúnen
  - se agrupan
  lexicon: HALOT
  rationale: En este contexto hostil, el verbo no describe una estancia neutral sino un reunirse contra el salmista. «Se juntan» conserva esa idea de agrupación sin añadir violencia explícita que el hebreo no exige aquí.
- source_word: יצפינו
  english_pob_choice: they hide themselves
  chosen_spanish: se esconden
  alternatives_spanish:
  - se ocultan
  - se esconden en emboscada
  - lurk
  lexicon: HALOT
  rationale: El verbo expresa esconderse con matiz de acecho. «Se esconden» es natural en español y deja que el contexto aporte la idea de emboscada.
- source_word: הֵ֭מָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  - éstos
  lexicon: HALOT
  rationale: El pronombre independiente sirve para énfasis. En español basta con «ellos»; el énfasis queda reflejado por la serie de verbos paralelos.
- source_word: עֲקֵבַי
  english_pob_choice: my steps
  chosen_spanish: mis pasos
  alternatives_spanish:
  - mis huellas
  - mis talones
  - mis pisadas
  lexicon: HALOT
  rationale: Literalmente es «mis talones», pero en español el valor idiomático se comunica mejor con «mis pasos», como seguimiento de los movimientos del salmista.
- source_word: יִשְׁמֹרוּ
  english_pob_choice: they watch
  chosen_spanish: vigilan
  alternatives_spanish:
  - observan
  - custodian
  - guardan
  lexicon: HALOT
  rationale: Aquí שמר tiene el sentido de vigilar o seguir de cerca, no de proteger. «Vigilan» reproduce bien la vigilancia hostil.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: HALOT
  rationale: La relación comparativa/manner se expresa de forma natural en español con «como». Evita endurecer la frase y mantiene el paralelismo.
- source_word: קִוּוּ
  english_pob_choice: they have waited for
  chosen_spanish: esperan
  alternatives_spanish:
  - aguardan
  - han esperado
  - acechan
  lexicon: HALOT
  rationale: El campo léxico básico es «esperar/aguardar», aunque en contexto hostil pueda rozar la acechanza. «Esperan» preserva el núcleo verbal sin introducir una interpretación más fuerte que el texto base.
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - a mí
  - mi ser
  lexicon: HALOT
  rationale: נפש aquí refiere la vida del salmista. «Mi vida» es más claro que «mi alma» para el lector español y sigue la decisión contextual del inglés.
translation_notes:
  revision_awareness: La versión inglesa más reciente volvió a «wait for my life» desde «lie in wait for my life» para ceñirse más al hebreo. La redacción española sigue esa línea, usando «esperan mi vida» y evitando introducir explícitamente «emboscada», aunque la nota a conserva esa posibilidad léxica.
  spanish_consistency_notes:
  - Se mantuvo «mis pasos» para עֲקֵבַי, en consonancia con la opción idiomática del POB en inglés.
  - «Mi vida» traduce נַפְשִׁי de manera contextual, evitando «alma» donde el sentido es la vida amenazada.
  - Se prefirió «vigilan» para שמר porque en español comunica mejor la vigilancia hostil que «guardan».
  - No se usó «SEÑOR» ni terminología eclesiástica añadida; el verso no contiene el nombre divino.
