translation:
  language: es
  text: Porque él libra al indigente cuando clama[a], y al pobre que no tiene quien le ayude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el afligido' para עָנִי, destacando la opresión además de la pobreza.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Aquí introduce la razón de la afirmación anterior; en español, 'Porque' reproduce bien el sentido causal sin forzar una lectura explicativa adicional.
- source_word: יַצִּיל
  english_pob_choice: he delivers
  chosen_spanish: libra
  alternatives_spanish:
  - rescata
  - salva
  - delivers
  lexicon: HALOT
  rationale: El verbo hiphil de נצל expresa hacer escapar o sacar de peligro. 'Libra' comunica ese rescate de forma natural en español y evita cargar el verso con una tonalidad más específicamente soteriológica que la del contexto inmediato.
- source_word: אֶבְיוֹן
  english_pob_choice: the needy
  chosen_spanish: el indigente
  alternatives_spanish:
  - el necesitado
  - el pobre
  - el menesteroso
  lexicon: HALOT
  rationale: El término apunta a una persona en necesidad material o dependencia. 'Indigente' distingue mejor este matiz de 'pobre', que aparece después para traducir עָנִי.
- source_word: מְשַׁוֵּעַ
  english_pob_choice: when he cries out
  chosen_spanish: cuando clama
  alternatives_spanish:
  - cuando grita pidiendo ayuda
  - mientras clama
  - al clamar
  lexicon: HALOT
  rationale: El participio describe al necesitado en acto de pedir auxilio. 'Cuando clama' conserva la fuerza de súplica y funciona de manera fluida en español.
- source_word: וְעָנִי
  english_pob_choice: and the poor
  chosen_spanish: y al pobre
  alternatives_spanish:
  - y al afligido
  - y al humilde
  - y al necesitado
  lexicon: HALOT
  rationale: En paralelo con אֶבְיוֹן, aquí predomina la condición de pobreza o aflicción. 'Pobre' mantiene la distinción básica establecida por la traducción inglesa y por el paralelismo hebreo.
- source_word: וְאֵין עֹזֵר לוֹ
  english_pob_choice: who has no helper
  chosen_spanish: que no tiene quien le ayude
  alternatives_spanish:
  - sin quien lo ayude
  - y no tiene ayudador
  - que no tiene auxiliador
  lexicon: HALOT
  rationale: La cláusula caracteriza al pobre como desamparado. 'Quien le ayude' conserva el sentido personal de עֹזֵר y suena natural en español contemporáneo.
theological_decisions:
- issue: Referente del sujeto implícito 'él'
  english_pob_reading: The singular 'he' is retained without specification, referring contextually to the royal figure praised in the psalm.
  chosen_spanish_reading: Se mantiene el sujeto implícito 'él' sin identificarlo explícitamente, en referencia contextual al rey del salmo.
  alternative_spanish_readings:
  - un rey justo
  - el Mesías
  - un gobernante ideal
  rationale: El hebreo usa un verbo singular masculino no marcado. La traducción no resuelve más allá del contexto real del salmo, preservando la ambigüedad textual y evitando una identificación teológica no explicitada por el verso mismo.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla de manera dogmática.
translation_notes:
  revision_awareness: El audit trail inglés no muestra revisiones aplicadas y el último pase quedó sin cambios; esta propuesta sigue esa lectura estable, preservando la distinción entre אֶבְיוֹן y עָנִי y la ambigüedad del sujeto singular.
  spanish_consistency_notes:
  - Usé 'Yahvé' no porque aparezca aquí, sino como norma general del proyecto; este versículo no contiene el nombre divino.
  - Mantuve 'indigente' y 'pobre' como dos matices distintos para reflejar el paralelismo hebreo.
  - '''Clama'' conserva el valor de súplica del participio sin añadir contenido doctrinal.'
  - La nota [a] se ancla en 'pobre' porque el español puede activar más de una connotación y el inglés POB preservó la alternativa 'aflicted'.
