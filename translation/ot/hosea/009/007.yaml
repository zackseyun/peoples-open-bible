id: HOS.9.7
reference: Hosea 9:7
source:
  edition: WLC
  text: בָּ֣אוּ יְמֵ֣י הַ/פְּקֻדָּ֗ה בָּ֚אוּ יְמֵ֣י הַ/שִׁלֻּ֔ם יֵדְע֖וּ יִשְׂרָאֵ֑ל אֱוִ֣יל הַ/נָּבִ֗יא מְשֻׁגָּע֙ אִ֣ישׁ הָ/ר֔וּחַ עַ֚ל רֹ֣ב עֲוֺנְ/ךָ֔ וְ/רַבָּ֖ה מַשְׂטֵמָֽה׀׃
translation:
  text: The days of punishment have come[a]; the days of repayment have come; Israel will know it. The prophet is a fool; the man of the spirit is mad[c][b], because of the greatness of your iniquity and your great hostility.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The prophet is foolish; the inspired man is mad.' The Hebrew phrase 'man of the spirit' may mean one claiming spiritual inspiration.
    reason: lexical_alternative
  - marker: b
    text: 'Some understand this line as the people''s scornful description of the true prophet: ''The prophet is a fool; the man of the spirit is mad.'' The Hebrew does not explicitly mark it as a quotation.'
    reason: alternative_reading
  - marker: c
    text: Or 'the abundance of your guilt and great hostility/hatred.' The final noun may refer to enmity or animosity, and its precise object is not stated.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקֻדָּה
  chosen: punishment
  alternatives:
  - visitation
  - reckoning
  lexicon: HALOT
  rationale: In prophetic judgment context, the noun denotes a punitive visitation or appointed reckoning. 'Punishment' communicates the sense clearly in modern English while preserving the judicial force.
- source_word: שִׁלֻּם
  chosen: repayment
  alternatives:
  - recompense
  - payment
  lexicon: HALOT
  rationale: The term carries the idea of requital or repayment. 'Repayment' fits the parallel with 'days of punishment' and preserves the sense of consequences being paid back.
- source_word: יֵדְעוּ יִשְׂרָאֵל
  chosen: Israel will know it
  alternatives:
  - Israel shall know
  - let Israel know
  lexicon: HALOT
  rationale: 'The imperfect is best taken as predictive: Israel will come to recognize the reality of the announced judgment. ''It'' is supplied naturally in English to complete the sense.'
- source_word: אֱוִיל
  chosen: a fool
  alternatives:
  - foolish
  - senseless
  lexicon: HALOT
  rationale: 'Predicate use after ''the prophet'' is most naturally rendered nominally: ''is a fool.'' This preserves the sharp denunciatory tone.'
- source_word: מְשֻׁגָּע
  chosen: mad
  alternatives:
  - insane
  - crazy
  lexicon: HALOT
  rationale: The word denotes being driven mad or acting as one deranged. 'Mad' is forceful and idiomatic without becoming colloquial.
- source_word: אִישׁ הָרוּחַ
  chosen: the man of the spirit
  alternatives:
  - the spiritual man
  - the inspired man
  lexicon: HALOT
  rationale: The phrase likely refers to one claiming spiritual inspiration, parallel to 'the prophet.' 'Man of the spirit' stays closer to the Hebrew while remaining understandable; 'spirit' is lowercased to avoid over-interpreting this as a reference to the Holy Spirit.
- source_word: עַל
  chosen: because of
  alternatives:
  - on account of
  - for
  lexicon: HALOT
  rationale: Here the preposition introduces the cause or ground for the denunciation/judgment.
- source_word: רֹב עֲוֺנְךָ
  chosen: the greatness of your iniquity
  alternatives:
  - the abundance of your guilt
  - your great iniquity
  lexicon: HALOT
  rationale: רֹב conveys abundance or greatness. 'Iniquity' preserves the moral-religious weight of עָוֹן better than the flatter 'sin' in this context.
- source_word: מַשְׂטֵמָה
  chosen: the hostility
  alternatives:
  - the hatred
  - the animosity
  lexicon: HALOT
  rationale: The noun denotes enmity or hostility. 'Hostility' is broad enough to cover either Israel's hostility toward God/true prophecy or the resulting hostile condition, preserving some of the interpretive openness of the Hebrew.
