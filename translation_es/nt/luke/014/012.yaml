translation:
  language: es
  text: 'Y él también seguía diciéndole al que lo había invitado: «Cuando des un almuerzo o una cena, no invites a tus amigos, ni a tus hermanos, ni a tus parientes, ni a vecinos ricos[a], no sea que ellos también te inviten a su vez[b] y eso llegue a ser retribución para ti[c].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «desayuno» para «almuerzo»; ἄριστον se refiere a una comida temprana, a menudo hacia el mediodía más que al desayuno moderno.
    reason: lexical_alternative
  - marker: b
    text: O, «te inviten de vuelta». El verbo griego significa invitar en retorno.
    reason: lexical_alternative
  - marker: c
    text: 'O, «te sea retribuido». El griego dice más literalmente: «llegue a ser retribución para ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν δὲ καὶ
  english_pob_choice: And he was also saying
  chosen_spanish: Y él también seguía diciéndole
  alternatives_spanish:
  - Y él también decía
  - Y además le decía
  lexicon: BDAG
  rationale: El imperfecto Ἔλεγεν conserva una acción en curso; por eso se vierte con una forma progresiva. Se mantiene el matiz suave de δὲ con 'Y' y el de καὶ con 'también'.
- source_word: τῷ κεκληκότι αὐτόν
  english_pob_choice: to the one who had invited him
  chosen_spanish: al que lo había invitado
  alternatives_spanish:
  - a su anfitrión
  - al hombre que lo había invitado
  lexicon: BDAG
  rationale: La expresión apunta al invitador concreto. 'Al que lo había invitado' es explícita y fiel; 'anfitrión' sería más idiomático pero menos transparente.
- source_word: Ὅταν ποιῇς
  english_pob_choice: When you give
  chosen_spanish: Cuando des
  alternatives_spanish:
  - Cuando prepares
  - Cuando hagas
  lexicon: BDAG
  rationale: Con comidas, ποιέω tiene sentido idiomático de organizar o dar un banquete/comida. 'Des' comunica esa función social de forma natural en español.
- source_word: ἄριστον
  english_pob_choice: luncheon
  chosen_spanish: un almuerzo
  alternatives_spanish:
  - una comida de mediodía
  - un desayuno
  lexicon: BDAG
  rationale: ἄριστον designa una comida temprana, a menudo de mediodía. 'Almuerzo' refleja bien esa referencia en español actual; se evita 'desayuno' porque en español moderno sugiere una comida matutina muy distinta.
- source_word: δεῖπνον
  english_pob_choice: dinner
  chosen_spanish: una cena
  alternatives_spanish:
  - una comida
  - un banquete
  lexicon: BDAG
  rationale: δεῖπνον es la comida principal, generalmente más tardía. 'Cena' ofrece un contraste claro con 'almuerzo' y es natural para el lector español.
- source_word: μὴ φώνει
  english_pob_choice: do not invite
  chosen_spanish: no invites
  alternatives_spanish:
  - no llames
  - no convoques
  lexicon: BDAG
  rationale: Aunque φωνέω literalmente es 'llamar', en este contexto de comida significa invitar. 'No invites' reproduce el acto social real sin perder el sentido.
- source_word: τοὺς φίλους σου
  english_pob_choice: your friends
  chosen_spanish: a tus amigos
  alternatives_spanish:
  - a tus amistades
  lexicon: BDAG
  rationale: Renderizado estándar y claro de φίλους en este contexto social.
- source_word: τοὺς ἀδελφούς σου
  english_pob_choice: your brothers
  chosen_spanish: a tus hermanos
  alternatives_spanish:
  - a tus hermanos y hermanas
  - a tus hermanos de familia
  lexicon: BDAG
  rationale: Se conserva el plural masculino del griego con 'hermanos'. En español, en esta lista relacional, la forma masculina es la más fiel y natural.
- source_word: τοὺς συγγενεῖς σου
  english_pob_choice: your relatives
  chosen_spanish: a tus parientes
  alternatives_spanish:
  - a tus familiares
  - a tus parientes cercanos
  lexicon: BDAG
  rationale: συγγενεῖς abarca parientes/consanguíneos. 'Parientes' es claro y suficientemente amplio.
- source_word: γείτονας πλουσίους
  english_pob_choice: rich neighbors
  chosen_spanish: a vecinos ricos
  alternatives_spanish:
  - a vecinos adinerados
  - a vecinos acomodados
  lexicon: BDAG
  rationale: El adjetivo πλουσίους modifica directamente a γείτονας. 'Vecinos ricos' conserva esa relación sintáctica de manera natural.
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - por si acaso no
  lexicon: BDAG
  rationale: μήποτε introduce una advertencia de posible consecuencia. 'No sea que' reproduce bien ese matiz preventivo en español.
- source_word: ἀντικαλέσωσίν σε
  english_pob_choice: they also invite you in return
  chosen_spanish: ellos también te inviten en reciprocidad
  alternatives_spanish:
  - ellos también te inviten de vuelta
  - ellos también te inviten a su vez
  lexicon: BDAG
  rationale: El verbo compuesto expresa invitar a cambio. 'En reciprocidad' conserva esa idea de devolución sin perder la referencia al acto de invitar.
- source_word: γένηται ἀνταπόδομά σοι
  english_pob_choice: it become repayment to you
  chosen_spanish: te resulte un pago
  alternatives_spanish:
  - te sea una retribución
  - te quede como pago
  lexicon: BDAG
  rationale: La construcción es impersonal y apunta a que la invitación de vuelta funcione como compensación. 'Te resulte un pago' mantiene la imagen de retribución, aunque en español fluye mejor que una literalidad excesiva.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y el audit trail inglés de la POB. Se preservan los contrastes de comidas (ἄριστον/δεῖπνον), la secuencia de relaciones sociales y el cierre impersonal de retribución, evitando a la vez un calco duro del inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al nombre divino; aquí no aplica.
  - Se mantiene 'alma' y otras terminologías bíblicas sólo según contexto; aquí no aplica.
  - Se conserva la estructura negativa advertencial de μήποτε con 'no sea que'.
  - Se mantiene el paralelismo de la lista relacional sin añadir inclusiones no presentes en el griego.
