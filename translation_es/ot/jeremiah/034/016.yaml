translation:
  language: es
  text: Pero ustedes se volvieron atrás y profanaron mi nombre, y cada hombre tomó de nuevo a su esclavo y cada hombre a su esclava, a quienes ustedes habían enviado libres[a], y los sometieron para que fueran sus esclavos y esclavas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «libres para sí mismos»; la expresión significa que habían sido liberados para quedar a su propia disposición o según su propia voluntad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּשֻׁבוּ
  english_pob_choice: you turned back
  chosen_spanish: volvieron atrás
  alternatives_spanish:
  - se dieron vuelta
  - recayeron
  lexicon: HALOT
  rationale: שׁוּב en este contexto expresa una reversión culpable de la acción anterior; «volvieron atrás» conserva la idea concreta de desandar o revertir lo hecho y encaja bien en español.
- source_word: וַתְּחַלְּלוּ אֶת־שְׁמִי
  english_pob_choice: and profaned my name
  chosen_spanish: y profanaron mi nombre
  alternatives_spanish:
  - y mancillaron mi nombre
  - y deshonraron mi nombre
  lexicon: HALOT
  rationale: חלל con «nombre» como objeto se traduce con precisión teológica como «profanar»; «mi nombre» mantiene el lenguaje bíblico del honor del nombre divino sin suavizarlo.
- source_word: וַתָּשִׁבוּ
  english_pob_choice: took back
  chosen_spanish: tomó de vuelta
  alternatives_spanish:
  - trajo de vuelta
  - hizo volver
  lexicon: HALOT
  rationale: El valor causativo se entiende aquí como reclamar nuevamente a personas previamente liberadas; «tomó de vuelta» comunica la apropiación forzada de manera natural en español.
- source_word: אִישׁ ... וְאִישׁ
  english_pob_choice: each man ... and each man
  chosen_spanish: cada hombre ... y cada hombre
  alternatives_spanish:
  - cada uno ... y cada uno
  - todo hombre ... y todo hombre
  lexicon: HALOT
  rationale: La repetición distributiva de אִישׁ se conserva con «cada hombre», manteniendo tanto el paralelismo como la forma masculina explícita del hebreo.
- source_word: עַבְדּוֹ
  english_pob_choice: his male slave
  chosen_spanish: su esclavo varón
  alternatives_spanish:
  - su siervo
  - su esclavo
  lexicon: HALOT
  rationale: El contexto es de propiedad, liberación y re-enslavement, por lo que «esclavo» es el término más fiel; «varón» refleja el contraste con la forma femenina siguiente.
- source_word: שִׁפְחָתוֹ
  english_pob_choice: his female slave
  chosen_spanish: su esclava
  alternatives_spanish:
  - su sierva
  - su criada
  lexicon: HALOT
  rationale: La contraparte femenina de עבד es explícita; «esclava» conserva la fuerza jurídica y social del pasaje sin atenuarlo.
- source_word: שִׁלַּחְתֶּם חָפְשִׁים
  english_pob_choice: you had sent away free
  chosen_spanish: habían enviado libres
  alternatives_spanish:
  - habían dejado ir libres
  - habían despedido libres
  lexicon: HALOT
  rationale: La expresión indica una manumisión formal; «enviado libres» sigue de cerca el hebreo y comunica la liberación efectuada.
- source_word: לְנַפְשָׁם
  english_pob_choice: as they desired
  chosen_spanish: para su propia voluntad
  alternatives_spanish:
  - según su deseo
  - a su entera disposición
  lexicon: HALOT
  rationale: La POB inglesa tomó la expresión en sentido idiomático, refiriéndola a la autodeterminación de los liberados. «Para su propia voluntad» preserva la idea de decisión propia sin perder el trasfondo literal de «para sí mismos».
- source_word: וַתִּכְבְּשׁוּ אֹתָם
  english_pob_choice: and you forced them into subjection
  chosen_spanish: y los sometieron
  alternatives_spanish:
  - y los subyugaron
  - y los pusieron bajo su dominio
  lexicon: HALOT
  rationale: כבש implica someter o dominar por la fuerza; «los sometieron» es breve y fuerte en español, y deja visible el acto coercitivo de re-enslavement.
- source_word: לִהְיוֹת לָכֶם
  english_pob_choice: to be your
  chosen_spanish: para que fueran para ustedes
  alternatives_spanish:
  - para ser de ustedes
  - a fin de ser suyos
  lexicon: HALOT
  rationale: La frase de resultado se expresa con una subordinada natural en español; «para que fueran para ustedes» mantiene la relación posesiva sin añadir elementos ajenos.
- source_word: לַעֲבָדִים וְלִשְׁפָחוֹת
  english_pob_choice: male slaves and female slaves
  chosen_spanish: esclavos varones y esclavas
  alternatives_spanish:
  - siervos y siervas
  - esclavos y esclavas
  lexicon: HALOT
  rationale: La pareja final retoma el estatus de esclavitud con distinción de género; «esclavos varones y esclavas» conserva la textura del hebreo y evita suavizar el sentido.
theological_decisions:
- issue: Lenguaje de esclavitud en un contexto de liberación y re-enslavement
  english_pob_reading: male slave / female slave
  chosen_spanish_reading: esclavo varón / esclava
  alternative_spanish_readings:
  - siervo / sierva
  - criado / criada
  rationale: El pasaje describe liberación formal y luego la imposición de esclavitud nuevamente; «esclavo» refleja con mayor fidelidad el peso jurídico y moral del texto, sin diluir la violencia del acto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tabla de términos controvertidos por analogía con δοῦλος
- issue: Conservación del tono distributivo masculino del hebreo
  english_pob_reading: each man ... and each man
  chosen_spanish_reading: cada hombre ... y cada hombre
  alternative_spanish_readings:
  - cada uno ... y cada uno
  - todo hombre ... y todo hombre
  rationale: El hebreo usa אִישׁ de forma distributiva y contrastiva con las esclavas; mantener «cada hombre» conserva esa estructura y evita neutralizar una distinción presente en el original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el estado revisado más reciente del POB en inglés: se conserva «as they desired» como sentido idiomático de לְנַפְשָׁם, y se evita añadir la idea de «de vuelta» después de «los sometieron», ya que no está explícita en el hebreo. También se preserva la dicción legal de «profanaron mi nombre» y el contraste masculino/femenino en los términos de esclavitud.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; en este versículo el hebreo dice «mi nombre», por lo que no aparece el nombre divino en la superficie del verso.
  - Se mantiene «esclavo/esclava» de manera consistente con la política del proyecto cuando el contexto de bondage es central.
  - La subordinada «para que fueran para ustedes» traduce el resultado de לִהְיוֹת sin forzar una equivalencia más literal que suene extraña en español.
  - Se evita «SEÑOR» como sustituto del nombre divino porque el verso no contiene el tetragrámaton y el enfoque del proyecto no usa masking convencional.
