base_translation:
  language: en
  yaml_path: translation/ot/isaiah/057/011.yaml
  text: And whom did you dread and fear[a], that you lied and did not remember me, did not lay it to your heart? Was it not because I have kept silent, even from long ago[b], that you do not fear me?
  footnotes:
