review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien el sentido básico del hebreo: Yahvé como sujeto, Judá como objeto, el lenguaje de herencia/porción y la nueva elección de Jerusalén. Sin embargo, en עַל אַדְמַת הַקֹּדֶשׁ el español principal usa «sobre la tierra santa», mientras que la decisión auditada en inglés favorece una equivalencia natural territorial («in the holy land»). En español, «sobre la tierra santa» suena menos natural y puede sugerir ubicación superficial más que ámbito territorial. También faltan las notas que el rastro inglés conservó para la literalidad alternativa.'
  spanish_quality_summary: 'El texto es legible y digno, pero «sobre la tierra santa» resulta algo forzado en español bíblico natural. «En la tierra santa» comunica mejor el sentido geográfico-covenantal y coincide con la propia justificación teológica del expediente español. El resto del verso fluye bien: «Yahvé heredará a Judá como su porción… y volverá a escoger a Jerusalén».'
  glossary_alignment: Alinea correctamente con la terminología del proyecto en «Yahvé», «Judá» y «Jerusalén». Conserva adecuadamente el lenguaje de herencia con «heredará» y «porción». La única desalineación relevante es que la redacción principal para אַדְמַת הַקֹּדֶשׁ debería seguir la opción natural «la tierra santa» con preposición «en», mientras la literalidad «sobre el suelo/tierra de santidad» puede ir en nota. También conviene reflejar la nota alternativa para נחל, como en el POB inglés.
  issues:
  - severity: medium
    issue: «sobre la tierra santa» en el texto principal
    rationale: Aunque refleja literalmente עַל, en español suena menos idiomático y no representa tan bien la decisión auditada «in the holy land». «En la tierra santa» transmite mejor el sentido territorial consagrado.
  - severity: medium
    issue: Faltan las notas léxicas preservadas en el POB inglés
    rationale: 'El expediente inglés mantuvo dos alternativas significativas: la literalidad de «suelo de santidad» y la alternativa de posesión/herencia para נחל. Deben conservarse también en español, ancladas en el texto.'
  revised_spanish_text: Yahvé heredará[a] a Judá como su porción, en la tierra santa[b], y volverá a escoger a Jerusalén.
  revised_footnotes:
  - marker: a
    text: 'O: «tomará posesión de Judá como su herencia». El hebreo conserva lenguaje de herencia en lugar de usar un verbo más general de posesión.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre el suelo de santidad».
    reason: lexical_alternative
  revision_rationale: Se ajusta la preposición a un español más natural y fiel a la decisión auditada («en la tierra santa») sin perder la literalidad, que se preserva en nota. También se añaden las dos notas léxicas ya documentadas en el POB inglés para mantener la trazabilidad exegética y lexical. No se requiere cambio en «Yahvé», «heredará», «como su porción» ni «volverá a escoger».
