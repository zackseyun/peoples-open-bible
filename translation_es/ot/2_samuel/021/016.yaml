base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/021/016.yaml
  text: And Ishbi-benob[a], who was among the descendants of Rapha, whose spear weighed three hundred shekels of bronze, and who was girded with a new sword[c][b], said that he would strike down David.
  footnotes:
  - marker: a
    text: The Hebrew name form is uncertain; 'Ishbi-benob' follows the traditional understanding. Possible alternatives include 'Jesbi-benob' or a different division of the consonants.
    reason: textual_variant
  - marker: b
    text: Or 'among those born to Rapha'; the phrase likely refers to the giant clan associated with the Rephaim.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'new'; the noun may be implied, traditionally understood as 'sword.'
    reason: lexical_alternative
