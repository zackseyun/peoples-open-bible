translation:
  language: es
  text: En aquel día el rey consagró el medio del atrio[a] que estaba delante de la casa de Yahvé[b], porque allí ofreció el holocausto, la ofrenda de cereal y las porciones de grasa de los sacrificios de paz[c]; pues el altar de bronce que estaba delante de Yahvé era demasiado pequeño para contener el holocausto, la ofrenda de cereal y las porciones de grasa de los sacrificios de paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el centro del atrio'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'la casa de Yahvé', es decir, el templo.
    reason: lexical_alternative
  - marker: c
    text: O 'la grasa de los sacrificios de paz'.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִדַּשׁ
  english_pob_choice: consecrated
  chosen_spanish: consagró
  alternatives_spanish:
  - santificó
  - dedicó
  lexicon: HALOT
  rationale: קדשׁ aquí expresa poner un espacio aparte para uso sagrado. En español, 'consagró' conserva bien el sentido cultual y resulta natural en registro bíblico contemporáneo; 'santificó' puede sonar más abstracto y 'dedicó' pierde fuerza sacral.
- source_word: תּוֹךְ הֶחָצֵר
  english_pob_choice: the middle of the court
  chosen_spanish: el centro del atrio
  alternatives_spanish:
  - la mitad del atrio
  - el medio del atrio
  lexicon: HALOT
  rationale: תּוֹךְ indica el interior o la parte central. 'Centro' comunica mejor en español moderno la idea espacial de un área central apartada; 'medio' o 'mitad' suenan menos naturales en este contexto.
- source_word: לִפְנֵי בֵית יְהוָה
  english_pob_choice: before the house of Yahweh
  chosen_spanish: delante de la casa de Yahvé
  alternatives_spanish:
  - frente a la casa de Yahvé
  - ante la casa de Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי es una relación espacial 'delante de / frente a'. 'Casa de Yahvé' preserva el idiomismo del hebreo y la traducción del nombre divino según el criterio POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del Nombre divino usada por POB en español. 'Yahvé' conserva la distinción entre el nombre propio del pacto y el título 'Señor'.
- source_word: עָשָׂה שָׁם
  english_pob_choice: there he offered
  chosen_spanish: allí hizo
  alternatives_spanish:
  - allí ofreció
  - allí realizó
  lexicon: HALOT
  rationale: El hebreo usa עשה, literalmente 'hacer', con referencia a la acción sacrificial. En español, 'hizo' conserva la proximidad formal al hebreo y evita introducir sin necesidad el verbo interpretativo 'ofreció'; el contexto sacrificial deja claro el sentido.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  lexicon: HALOT
  rationale: עֹלָה se refiere a la ofrenda totalmente consumida por el fuego. 'Holocausto' es el término bíblico tradicional en español y mantiene la precisión cultual; no se usa 'ofrenda quemada' por sonar menos asentado.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda de cereal
  alternatives_spanish:
  - la ofrenda de grano
  - la ofrenda vegetal
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial alude a la ofrenda de cereal/grano. 'Ofrenda de cereal' comunica esa función sin depender de un término demasiado técnico o ambiguo.
- source_word: חֶלְבֵי הַשְּׁלָמִים
  english_pob_choice: the fat portions of the peace offerings
  chosen_spanish: las porciones de grasa de los sacrificios de paz
  alternatives_spanish:
  - la grasa de los sacrificios de paz
  - las porciones grasas de los sacrificios de paz
  lexicon: HALOT
  rationale: חֶלֶב en lenguaje sacrificial se refiere a la grasa reservada para el altar, no simplemente a 'las mejores partes'. 'Porciones de grasa' conserva esa referencia material. שְׁלָמִים se vierte aquí como 'sacrificios de paz', alineado con el uso bíblico tradicional y dejando visible la categoría sacrificial.
- source_word: מִזְבַּח הַנְּחֹשֶׁת
  english_pob_choice: the bronze altar
  chosen_spanish: el altar de bronce
  alternatives_spanish:
  - el altar de cobre
  - el altar broncíneo
  lexicon: HALOT
  rationale: נְחֹשֶׁת puede ser bronce o cobre según el contexto; en el mobiliario cultual, 'bronce' es la opción estándar y más reconocible en español bíblico.
- source_word: קָטֹן מֵהָכִיל
  english_pob_choice: was too small to contain
  chosen_spanish: era demasiado pequeño para contener
  alternatives_spanish:
  - no tenía capacidad para contener
  - era insuficiente para contener
  lexicon: HALOT
  rationale: La construcción expresa insuficiencia de capacidad. 'Demasiado pequeño para contener' es claro y mantiene el sentido físico de que el altar no podía albergar el volumen de las ofrendas.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la decisión POB de no enmascarar el Tetragrama con un título. 'Yahvé' preserva el nombre personal del pacto y mantiene coherencia con el proyecto en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Término sacrificial שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de paz
  alternative_spanish_readings:
  - sacrificios de comunión
  - ofrendas de paz
  rationale: '''Sacrificios de paz'' conserva la tradición terminológica bíblica en español y permite reconocer la categoría sacrificial. No se sustituye por ''comunión'' porque ese valor interpretativo no está explicitado por el texto base.'
  doctrine_reference: Lexical theology of sacrificial terms in the Pentateuch and historical books
translation_notes:
  revision_awareness: La versión inglesa auditada usa 'consecrated', 'middle of the court', 'before the house of Yahweh', 'there he offered', 'burnt offering', 'grain offering', 'fat portions of the peace offerings' y 'bronze altar'. La redacción española mantiene esas decisiones semánticas y conserva las alternativas importantes documentadas en el aparato, especialmente para תּוֹךְ, בֵית יְהוָה y חֶלְבֵי הַשְּׁלָמִים.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, en coherencia con el resto del proyecto.
  - Se prefiere 'holocausto' para עֹלָה y 'ofrenda de cereal' para מִנְחָה, evitando mezclar registros.
  - '''Sacrificios de paz'' se usa de forma consistente para שְׁלָמִים en este versículo.'
  - La estructura causal se traduce con 'porque... pues...', reflejando bien los dos כִּי del hebreo sin forzar una subordinación única.
