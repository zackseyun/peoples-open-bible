revisions:
- from: ¿Quién, entre todos los dioses de las tierras, ha librado[a] a su tierra de mi mano, para que Yahvé librare a Jerusalén de mi mano?
  to: ¿Quién, entre todos los dioses de las tierras, ha librado a su tierra de mi mano,[a] como para que Yahvé libre a Jerusalén de mi mano?
  rationale: Se corrige la cláusula final para reflejar mejor el valor retórico de כִּי y del imperfecto יַצִּיל, evitando la lectura de finalidad y la forma defectuosa 'librare'. Se elimina la nota innecesaria sobre 'ha librado' y se preserva, en español, la alternativa registrada en el inglés POB.
