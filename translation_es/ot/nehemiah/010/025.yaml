  spanish_consistency_notes:
  - Se mantiene la transliteración de los tres nombres propios para preservar la trazabilidad con el hebreo y el auditor inglés.
  - Se usa «y» antes del último elemento de la lista para un español natural sin alterar el carácter enumerativo del versículo.
  - La nota al pie explica la razón onomástica de la transliteración y evita una falsa lectura como vocabulario común.
