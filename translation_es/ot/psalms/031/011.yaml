revisions:
- from: Porque mi vida se consume[a] en dolor, y mis años en gemido; mi fuerza ha fallado[b] a causa de mi iniquidad, y mis huesos se debilitan.
  to: Porque mi vida se consume[a] con aflicción, y mis años con gemidos; mi fuerza ha fallado[b] a causa de mi iniquidad, y mis huesos se consumen.
  rationale: Se ajusta «en dolor» a «con aflicción» para reflejar mejor el matiz de grief/sorrow de יָגוֹן, se hace más natural «con gemidos», y se fortalece «se consumen» para preservar la imaginería de desgaste de עָשֵׁשׁוּ. Se mantiene «a causa de mi iniquidad» por fidelidad a la decisión léxica y teológica auditada.
