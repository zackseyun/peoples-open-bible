    text: Or 'through the eunuchs'; literally, 'by the hand of the eunuchs.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term can also refer more broadly to court officials, though 'eunuchs' is the more direct rendering.
    reason: cultural_note
  - marker: c
    text: Or 'because she did not obey the command of King Ahasuerus.'
    reason: lexical_alternative
