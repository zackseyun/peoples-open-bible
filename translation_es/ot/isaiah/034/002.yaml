review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: motivo explicativo («Porque»), nombre divino «Yahvé», doble expresión de ira, juicio contra las naciones y sus fuerzas, y la secuencia «ha dedicado/entregado ... a la matanza». Sin embargo, hay dos desajustes importantes con la evidencia y con la auditoría inglesa: (1) la nota [a] está anclada en «indignación», pero el contenido de la nota trata realmente de la distinción entre «indignación» y «furor», no de una alternativa textual específica; además omite la alternativa documentada para צְבָאָם. (2) «consagrado a la destrucción» suena demasiado cultual-positivo en español y puede debilitar o desviar el matiz judicial de חרם; «entregado a destrucción» o «destinado a destrucción» preserva mejor el sentido de ḥerem sin sugerir santificación devocional.'
  spanish_quality_summary: El texto es legible y digno, con buen español e idiomaticidad general. «Porque Yahvé tiene indignación...» funciona, aunque «hay indignación de parte de Yahvé» sería menos natural en este contexto; no requiere cambio. «Todo su ejército» es claro, pero la auditoría inglesa preservó la amplitud de «host» con una nota alternativa hacia «ejércitos», por lo que conviene trasladar esa nota al español. «Al degüello» es fuerte y comprensible, pero «a la matanza» se alinea mejor con «to the slaughter» y evita un matiz más específico de cortar el cuello que no está en טבח.
  glossary_alignment: 'Se mantiene correctamente «Yahvé» para יהוה. La distinción entre קצף y חמה se conserva con «indignación» y «furor». El principal ajuste terminológico necesario está en חרם: el proyecto busca preservar la fuerza de «devoted to destruction»; en español «consagrar» puede sonar demasiado positivo o litúrgico. También conviene reflejar en nota la alternativa de צבא como «ejércitos», conforme al rastro inglés.'
  issues:
  - severity: medium
    issue: La nota [a] no corresponde a la alternativa léxica preservada por la auditoría inglesa.
    rationale: La nota inglesa [a] explica que צְבָאָם puede traducirse «their armies». En el borrador, [a] está anclada en «indignación» y comenta la distinción entre términos de ira, lo cual no es la misma función documental.
  - severity: medium
    issue: «Los ha consagrado a la destrucción» puede sonar teológicamente desviado en español.
    rationale: Aunque intenta conservar el matiz de חרם, «consagrar» suele asociarse en español a dedicación santa o positiva. «Los ha destinado a la destrucción» o «los ha entregado a la destrucción» comunica mejor el juicio consagrado a destrucción sin ese posible malentendido.
  - severity: low
    issue: «Al degüello» es más específico que el hebreo טבח.
    rationale: טבח denota matanza/slaughter en sentido general. «Degüello» introduce una imagen más estrecha. «A la matanza» o «al matadero» sería más exacto; «a la matanza» encaja mejor con el registro bíblico.
  revised_spanish_text: Porque Yahvé tiene indignación contra todas las naciones, y furor contra toda su hueste[a]; los ha destinado a la destrucción[b]; los ha entregado a la matanza.
  revised_footnotes:
  - marker: a
    text: Hebreo «su hueste» también puede traducirse «sus ejércitos».
    reason: lexical_alternative
  - marker: b
    text: 'O: «los ha puesto bajo anatema»; el verbo hebreo lleva la idea de dedicar algo a destrucción bajo juicio divino.'
    reason: lexical_alternative
  revision_rationale: Se reubican y corrigen las notas para que reflejen las alternativas léxicas realmente documentadas en la auditoría inglesa. Se cambia «ejército» por «hueste» para preservar mejor el alcance colectivo de צבא, con nota aclaratoria «ejércitos». Se reemplaza «consagrado a la destrucción» por «destinado a la destrucción» para mantener la fuerza judicial de חרם sin la connotación positiva de «consagrar». Se ajusta «al degüello» a «a la matanza» por mayor precisión léxica respecto de טבח.
