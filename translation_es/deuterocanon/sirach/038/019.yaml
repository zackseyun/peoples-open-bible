base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/038/019.yaml
  text: Do not set your heart on him any longer[a]; let his memory go[c][b], and remember the end.
  footnotes:
  - marker: a
    text: Hebrew 'do not place your heart toward him any longer,' an idiom meaning not to remain emotionally fixed on the dead.
    reason: lexical_alternative
  - marker: b
    text: Or 'release his memory' / 'dismiss his remembrance.' The Hebrew verb in this phrase is difficult, and the Greek parallel supports the sense of moving beyond grief.
    reason: alternative_reading
  - marker: c
    text: Or 'remember his end' or 'remember your own end.' The Hebrew simply says 'remember the end,' which may intentionally remain broad.
    reason: alternative_reading
