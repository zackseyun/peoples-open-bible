translation:
  language: es
  text: Y puse a cargo de los almacenes a Selemías el sacerdote, a Sadoc el escriba, y a Pedaías de entre los levitas, y a su lado[a] a Hanán hijo de Zacur, hijo de Matanías; porque fueron considerados fieles[b], y a ellos les correspondía repartir a sus hermanos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea puede sugerir cercanía, asociación o servicio subordinado; por eso también podría entenderse como “bajo su dirección”.
    reason: lexical_alternative
  - marker: b
    text: 'O: “reputados fieles” o “tenidos por dignos de confianza”.'
    reason: lexical_alternative
  - marker: c
    text: “Hermanos” traduce el término hebreo masculino; aquí se refiere a los miembros del mismo grupo comunitario.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאוֹצְרָה
  english_pob_choice: I appointed
  chosen_spanish: puse
  alternatives_spanish:
  - nombré
  - designé
  - puse en cargo
  lexicon: HALOT
  rationale: El hebreo expresa una acción de asignación administrativa. En español, 'puse sobre' reproduce bien la idea de colocar a alguien en una función de responsabilidad, sin forzar una fórmula más técnica que el contexto no exige.
- source_word: עַל אֹצָרוֹת
  english_pob_choice: over the storerooms
  chosen_spanish: sobre los almacenes
  alternatives_spanish:
  - sobre los depósitos
  - a cargo de los almacenes
  - sobre las cámaras de provisiones
  lexicon: HALOT
  rationale: אֹצָרוֹת puede referirse a depósitos o almacenes. 'Almacenes' comunica con naturalidad la función de resguardo de provisiones y evita una traducción demasiado especializada.
- source_word: שֶׁלֶמְיָה הַכֹּהֵן
  english_pob_choice: Shelemiah the priest
  chosen_spanish: Selesmías el sacerdote
  alternatives_spanish:
  - Selemías el sacerdote
  - Solemías el sacerdote
  lexicon: HALOT
  rationale: El nombre se translitera de forma castellana. 'El sacerdote' conserva el título explícito del hebreo.
- source_word: צָדוֹק הַסֹּפֵר
  english_pob_choice: Zadok the scribe
  chosen_spanish: Zadoq el escriba
  alternatives_spanish:
  - Sadoc el escriba
  - Zadoc el escriba
  lexicon: HALOT
  rationale: סֹפֵר se traduce con el término común y claro 'escriba'. Se preserva la forma del nombre con grafía transliterada estable.
- source_word: וּפְדָיָה מִן הַלְוִיִּם
  english_pob_choice: and Pedaiah from the Levites
  chosen_spanish: y a Pedaías, de entre los levitas
  alternatives_spanish:
  - y a Pedaías, de los levitas
  - y a Pedaías, levita
  lexicon: HALOT
  rationale: La frase מִן הַלְוִיִּם indica pertenencia grupal. 'De entre los levitas' mantiene el matiz de procedencia o pertenencia sin perder naturalidad en español.
- source_word: וְעַל יָדָם
  english_pob_choice: at their side
  chosen_spanish: junto a ellos
  alternatives_spanish:
  - a su lado
  - bajo su dirección
  - al lado de ellos
  lexicon: HALOT
  rationale: La expresión idiomática admite cercanía o subordinación funcional. 'Junto a ellos' conserva esa relación sin cerrar indebidamente el sentido jerárquico.
- source_word: חָנָן בֶּן זַכּוּר בֶּן מַתַּנְיָה
  english_pob_choice: Hanan son of Zaccur, son of Mattaniah
  chosen_spanish: Janán hijo de Zacar, hijo de Matanías
  alternatives_spanish:
  - Hanan hijo de Zaccur, hijo de Mattaniah
  - Janán, hijo de Zacur, hijo de Matanías
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. Se conserva la genealogía explícita del hebreo con la estructura normal en español bíblico.
- source_word: כִּי נֶאֱמָנִים נֶחְשָׁבוּ
  english_pob_choice: because they were considered faithful
  chosen_spanish: porque fueron considerados fieles
  alternatives_spanish:
  - porque fueron reputados fieles
  - porque se los tuvo por dignos de confianza
  - porque fueron tenidos por fieles
  lexicon: HALOT
  rationale: נֶאֱמָנִים y נֶחְשָׁבוּ combinan la cualidad de fidelidad con la valoración recibida. 'Fieles' preserva la virtud de lealtad; 'considerados' refleja el juicio que se hizo de ellos.
- source_word: וַעֲלֵיהֶם
  english_pob_choice: and it was upon them
  chosen_spanish: y a ellos correspondía
  alternatives_spanish:
  - y sobre ellos recaía
  - y les tocaba
  - y sobre ellos estaba
  lexicon: HALOT
  rationale: La preposición marca responsabilidad asignada. En español, 'correspondía' expresa de manera natural la obligación o encargo que recae sobre ellos.
- source_word: לַחֲלֹק
  english_pob_choice: to distribute
  chosen_spanish: repartir
  alternatives_spanish:
  - distribuir
  - dar porciones
  - apartar
  lexicon: HALOT
  rationale: En este contexto de provisiones, el verbo implica asignar porciones. 'Repartir' es claro y ajustado al uso contextual en español.
- source_word: לַאֲחֵיהֶם
  english_pob_choice: to their brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos varones
  - a sus compatriotas
  - a sus parientes
  lexicon: HALOT
  rationale: Se conserva el término de parentesco masculino del hebreo. En este contexto comunitario, 'hermanos' es la forma más directa y fiel.
theological_decisions:
- issue: El término de parentesco masculino אֲחֵיהֶם
  english_pob_reading: their brothers
  chosen_spanish_reading: a sus hermanos
  alternative_spanish_readings:
  - a sus compatriotas
  - a sus parientes
  - a sus hermanos y hermanas
  rationale: El hebreo usa un plural masculino de parentesco, y el POB inglés mantiene 'brothers'. La versión española conserva esa forma para reflejar con precisión el texto fuente, dejando que el contexto determine el alcance comunitario.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: La expresión idiomática וְעַל יָדָם
  english_pob_reading: at their side
  chosen_spanish_reading: junto a ellos
  alternative_spanish_readings:
  - bajo su dirección
  - a su lado
  - al lado de ellos
  rationale: La locución hebrea puede indicar proximidad funcional o subordinación. 'Junto a ellos' preserva la ambigüedad productiva sin imponer una jerarquía más fuerte de la que el texto exige.
  doctrine_reference: Principio de equivalencia óptima y preservación de tensiones léxicas
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que reubicó la expresión equivalente a 'at their side' para que quedara unida a Hanan según el orden hebreo. La redacción española sigue ese adjunto inmediato ('junto a ellos') y conserva la secuencia administrativa del versículo, sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en la tradición del proyecto no porque aparezca en este versículo, sino como norma general cuando corresponda.
  - 'Se mantuvo la distinción entre títulos y nombres propios: ''sacerdote'', ''escriba'', ''levitas''.'
  - Se prefirió 'repartir' en vez de un tecnicismo más abstracto para reflejar el contexto de provisiones.
  - Los nombres propios se transliteraron de manera consistente y legible para español bíblico.
