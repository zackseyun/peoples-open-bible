translation:
  language: es
  text: La han hecho una desolación[a]; se lamenta delante de mí, desolado[c]. Todo el país ha sido devastado[b], porque nadie lo toma a pecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La ha hecho una desolación», conservando el verbo hebreo en singular; el plural español refleja el sujeto contextual probable de las líneas anteriores.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «nadie lo pone sobre el corazón», un modismo que significa «nadie lo toma a pecho» o «nadie le presta atención seria».'
    reason: lexical_alternative
  - marker: c
    text: Hebreo «la tierra/el país». Aquí se traduce «país» porque el contexto probablemente se refiere al territorio devastado de Judá, no a toda la tierra en sentido mundial.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׂמָהּ
  english_pob_choice: They have made it
  chosen_spanish: la han hecho
  alternatives_spanish:
  - él la ha hecho
  - la han hecho
  lexicon: HALOT
  rationale: El verbo שׂוּם tiene el sentido de 'poner/hacer'. La forma hebrea es 3ms con sufijo femenino singular, pero el contexto sugiere agentes plurales previamente mencionados; en español, 'la han hecho' expresa bien la acción causativa sin forzar un sujeto singular implícito.
- source_word: לִשְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - en desolación
  - para desolación
  lexicon: HALOT
  rationale: שְׁמָמָה es sustantivo de devastación/desolación. 'Una desolación' conserva el valor nominal y el tono profético.
- source_word: אָבְלָה
  english_pob_choice: it mourns
  chosen_spanish: se lamenta
  alternatives_spanish:
  - está de duelo
  - llora
  lexicon: HALOT
  rationale: El verbo אבל significa 'lamentarse/guardar duelo'. 'Se lamenta' comunica bien la acción en español moderno y mantiene el registro sobrio del original.
- source_word: עָלַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: HALOT
  rationale: Aunque עַל suele ser 'sobre/encima de', con verbos de lamento puede expresar la esfera de la presencia divina. 'Delante de mí' es natural en español y preserva la idea de que la tierra está en la vista de Yahvé.
- source_word: שְׁמֵמָה
  english_pob_choice: desolate
  chosen_spanish: desolada
  alternatives_spanish:
  - devastada
  - abandonada
  lexicon: HALOT
  rationale: 'La forma adjetival funciona como predicado breve: ''desolada''. En español, el femenino concuerda con ''la tierra'' y mantiene la concisión del hebreo.'
- source_word: נָשַׁמָּה
  english_pob_choice: is laid waste
  chosen_spanish: está devastada
  alternatives_spanish:
  - está desolada
  - queda arrasada
  lexicon: HALOT
  rationale: El valor resultativo del verbo se expresa con naturalidad como 'está devastada'. 'Está devastada' refleja el estado producido por la destrucción.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: The whole land
  chosen_spanish: Toda la tierra
  alternatives_spanish:
  - Toda la tierra/país
  - Toda la tierra de Judá
  lexicon: HALOT
  rationale: אֶרֶץ puede ser 'tierra' o 'país/territorio'. Mantengo 'tierra' porque reproduce mejor la amplitud del hebreo sin restringir de más, aunque el contexto histórico sea Judá.
- source_word: כִּי אֵין אִישׁ
  english_pob_choice: because no one
  chosen_spanish: porque nadie
  alternatives_spanish:
  - porque no hay nadie
  - porque ningún hombre
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ con fuerza genérica. En español, 'nadie' comunica el mismo valor inclusivo con mayor naturalidad, sin añadir una nota de género donde el español ya lo resolvería idiomáticamente.
- source_word: שָׂם עַל לֵב
  english_pob_choice: takes it to heart
  chosen_spanish: la toma a pecho
  alternatives_spanish:
  - lo toma a corazón
  - lo considera seriamente
  lexicon: HALOT
  rationale: El idiomatismo hebreo significa 'prestar atención seria, interiorizar'. 'Tomar a pecho' es un equivalente español vivo que conserva la imagen del corazón como sede de la atención y la respuesta interior.
theological_decisions:
- issue: Referente de הָאָרֶץ / אֶרֶץ
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - territorio
  - tierra de Judá
  rationale: El contexto inmediato de Jeremías habla del despojo del pueblo y su herencia; 'tierra' mantiene la ambigüedad útil del hebreo entre suelo, territorio y país, sin universalizar el juicio.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sujeto implícito de שָׂמָהּ
  english_pob_reading: They have made it
  chosen_spanish_reading: La han hecho
  alternative_spanish_readings:
  - La ha hecho
  - La hicieron
  rationale: La forma hebrea admite sujeto singular gramatical, pero el contexto apunta a agentes múltiples. El español conserva esa tensión con un plural natural, sin borrar la posibilidad gramatical singular.
  doctrine_reference: Translation philosophy §2
- issue: Idiomatismo de שָׂם עַל לֵב
  english_pob_reading: takes it to heart
  chosen_spanish_reading: la toma a pecho
  alternative_spanish_readings:
  - lo toma en cuenta
  - lo toma a corazón
  rationale: La expresión no describe un gesto físico, sino una respuesta interna de atención y consideración. 'Tomar a pecho' preserva ese valor idiomático y exhortativo sin diluirlo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo, manteniendo la tensión entre el singular verbal de שָׂמָהּ y el sujeto plural contextual sugerido por el pasaje anterior, tal como refleja el audit trail inglés. También conserva el modismo hebreo de לֵב con una equivalencia española idiomática, sin neutralizar el trasfondo semántico.
  spanish_consistency_notes:
  - Se usa «Yahvé» en conformidad con la terminología base del proyecto cuando el contexto sea explícitamente divino; en este versículo no aparece el nombre divino como forma escrita en el texto fuente.
  - «tierra» se mantiene como equivalente primario de אֶרֶץ, reservando «país» o «territorio» para notas contextuales o casos donde el español requiera mayor precisión.
  - Se evita «SEÑOR» como sustituto del nombre divino, conforme a la política del proyecto, aunque aquí no sea necesario explicitarlo en el versículo.
