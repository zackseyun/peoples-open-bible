  glossary_alignment: No hay conflicto con la terminología central del proyecto. κύριος como «Señor» es apropiado aquí, ya que no se trata del nombre divino Yahvé sino del título reverencial griego κύριος. πνεύματα se mantiene correctamente como «espíritus» con nota alternativa «vientos».
