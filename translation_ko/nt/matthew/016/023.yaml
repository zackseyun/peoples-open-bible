id: MAT.16.23
reference: Matthew 16:23
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δὲ στραφεὶς εἶπεν τῷ Πέτρῳ· Ὕπαγε ὀπίσω μου, Σατανᾶ· σκάνδαλον ⸂εἶ ἐμοῦ⸃, ὅτι οὐ φρονεῖς τὰ τοῦ θεοῦ ἀλλὰ τὰ τῶν ἀνθρώπων.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/023.yaml
  text: 'But he turned and said to Peter[a], "Go behind me, Satan! You are a stumbling block to me, because you are not setting your mind on the things of God[b], but on the things of men."'
translation:
  language: ko
  text: '그러나 그가 돌아서서 베드로에게 말씀하셨습니다. 「사탄아, 내 뒤로 물러가라! 너는 나에게 걸림돌이다. 너는 하나님의 일에 마음을 두지 않고 사람의 일에 두기 때문이다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 보다 전통적으로 「사탄아, 내 뒤로 물러가라!」
    reason: lexical_alternative
  - marker: b
    text: 헬라어 「사람들의 일」, 즉 단순히 인간적 관심사를 가리킨다.
    reason: cultural_note
lexical_decisions:
- source_word: Ὕπαγε ὀπίσω μου
  english_pob_choice: Go behind me
  chosen_korean: 내 뒤로 물러가라
  alternatives_korean:
  - 내 뒤로 가라
  lexicon: BDAG
  rationale: 사탄에 대한 강한 거부의 명령. 「물러가라」가 자연스럽다.
- source_word: σκάνδαλον
  english_pob_choice: stumbling block
  chosen_korean: 걸림돌
  alternatives_korean:
  - 거리끼는 것
  lexicon: BDAG
  rationale: '글로사리 정책: σκάνδαλον → 「걸림돌」. 본문의 비유적 무게를 그대로 보존한다.'
- source_word: οὐ φρονεῖς τὰ τοῦ θεοῦ
  english_pob_choice: are not setting your mind on the things of God
  chosen_korean: 하나님의 일에 마음을 두지 않고
  lexicon: BDAG
  rationale: φρονέω는 「-에 마음을 두다·-에 관심하다」. 「-에 마음을 두다」가 자연스럽다.
