translation:
  language: es
  text: Y sacó de allí[a] todos los tesoros de la casa de Yahvé y los tesoros de la casa del rey, y cortó en pedazos todos los utensilios de oro que había hecho Salomón, rey de Israel, en el templo de Yahvé[b], tal como Yahvé había dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''los llevó de allí'' o ''los sacó de allí''.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''casa de Yahvé'' antes en este versículo; aquí ''templo de Yahvé'' traduce un término hebreo diferente, que suele referirse más específicamente a la estructura del templo o al santuario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא מִשָּׁם
  english_pob_choice: he carried away from there
  chosen_spanish: sacó de allí
  alternatives_spanish:
  - los llevó de allí
  - los extrajo de allí
  lexicon: HALOT
  rationale: El hifil de יצא expresa sacar o hacer salir algo de un lugar. En español, 'sacó de allí' conserva la acción concreta y es natural en registro narrativo, sin añadir más de lo que el hebreo exige.
- source_word: אוֹצְרוֹת
  english_pob_choice: treasures
  chosen_spanish: tesoros
  alternatives_spanish:
  - depósitos
  - almacenes
  lexicon: HALOT
  rationale: Aquí se trata del contenido valioso retirado, no primariamente de los cuartos donde se guarda. 'Tesoros' es la equivalencia más directa y clara en español.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la equivalencia directa de בית como 'casa'. Dado que más adelante aparece הֵיכָל, conviene conservar la distinción léxica con una forma distinta para ese segundo término.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio del rey
  - la casa real
  lexicon: HALOT
  rationale: La forma más cercana y paralela a 'la casa de Yahvé' es 'la casa del rey'. Es clara en contexto y evita introducir un término más interpretativo como 'palacio'.
- source_word: וַיְקַצֵּץ
  english_pob_choice: he cut in pieces
  chosen_spanish: rompió en pedazos
  alternatives_spanish:
  - cortó en pedazos
  - desmenuzó
  lexicon: HALOT
  rationale: קצץ comunica cortar en fragmentos. En español, 'rompió en pedazos' transmite el resultado físico de forma natural; 'cortó en pedazos' sería más literal pero menos idiomático, y 'desmenuzó' sugiere una acción algo distinta.
- source_word: כְּלֵי הַזָּהָב
  english_pob_choice: the gold vessels
  chosen_spanish: los utensilios de oro
  alternatives_spanish:
  - los vasos de oro
  - los objetos de oro
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objetos/utensilios. 'Utensilios de oro' preserva esa amplitud en español; 'vasos' sería demasiado estrecho y 'objetos' demasiado general.
- source_word: עָשָׂה
  english_pob_choice: had made
  chosen_spanish: había hecho
  alternatives_spanish:
  - había fabricado
  - había elaborado
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja que la fabricación de Salomón es anterior a la destrucción narrada. 'Había hecho' es fiel y suficientemente natural.
- source_word: שְׁלֹמֹה מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: Solomon king of Israel
  chosen_spanish: Salomón, rey de Israel
  alternatives_spanish:
  - Salomón, el rey de Israel
  lexicon: HALOT
  rationale: La aposición se conserva en forma transparente y natural en español, sin añadir conectores innecesarios.
- source_word: בְּהֵיכַל יְהוָה
  english_pob_choice: in the temple of Yahweh
  chosen_spanish: en el templo de Yahvé
  alternatives_spanish:
  - en la casa de Yahvé
  - en el santuario de Yahvé
  lexicon: HALOT
  rationale: Se distingue הֵיכָל de בית con 'templo', como hace la tradición auditada del inglés POB. Esto preserva la diferencia léxica entre las dos expresiones del versículo.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: just as Yahweh had spoken
  chosen_spanish: tal como Yahvé había dicho
  alternatives_spanish:
  - tal como Yahvé había hablado
  - según Yahvé había hablado
  lexicon: HALOT
  rationale: La fórmula remite al cumplimiento de una palabra divina previa. 'Tal como Yahvé había dicho' es natural en español y conserva el valor de conformidad exacta.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. Esto preserva el nombre propio del pacto y evita la sustitución litúrgica por un título genérico.'
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que prefería un registro más formal para la acción de destruir los utensilios; en español se eligió 'rompió en pedazos' para mantener esa formalidad y el sentido físico de קצץ. También se preservó la distinción léxica entre בֵּית y הֵיכָל mediante 'casa' / 'templo'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se mantiene la distinción entre 'casa de Yahvé' y 'templo de Yahvé' para reflejar dos términos hebreos distintos.
  - '''Tesoros'' traduce אוֹצְרוֹת como contenido valioso, no como edificio o almacén.'
  - '''Utensilios de oro'' conserva la amplitud de כְּלֵי הַזָּהָב sin restringirlo a ''vasos''.'
