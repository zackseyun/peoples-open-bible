translation:
  language: es
  text: La altura de un querubín era de diez codos[a], y así era también la del segundo querubín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un codo era una antigua unidad de longitud, aproximadamente la distancia del codo hasta la punta de los dedos.
    reason: cultural_note
lexical_decisions:
- source_word: קוֹמַת
  english_pob_choice: The height of
  chosen_spanish: La altura de
  alternatives_spanish:
  - La estatura de
  - La medida de
  lexicon: HALOT
  rationale: קוֹמָה expresa altura o estatura. En un contexto arquitectónico y de medidas del templo, «altura» es la opción más natural y precisa en español.
- source_word: הַכְּרוּב
  english_pob_choice: the cherub
  chosen_spanish: querubín
  alternatives_spanish:
  - querub
  - querubín esculpido
  lexicon: HALOT
  rationale: El singular hebreo requiere un singular en español. «Querubín» es la forma natural y establecida para el singular de כְּרוּב, y aquí designa una figura del templo.
- source_word: הָאֶחָד
  english_pob_choice: the one
  chosen_spanish: primer
  alternatives_spanish:
  - el uno
  - el uno de ellos
  - el primero
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «el uno», en español, para distinguir dos elementos paralelos con naturalidad, «primer» comunica la oposición sin perder el sentido de individualización. Se mantiene el contraste con «el segundo» del final del versículo.
- source_word: עֶשֶׂר בָּאַמָּה
  english_pob_choice: ten cubits
  chosen_spanish: diez codos
  alternatives_spanish:
  - diez codos de altura
  - diez codos en altura
  lexicon: HALOT
  rationale: La medida se conserva de forma directa. «Codos» corresponde al hebreo אַמָּה y mantiene la unidad antigua de longitud del texto fuente.
- source_word: וְכֵן
  english_pob_choice: and so it was with
  chosen_spanish: y así era también la de
  alternatives_spanish:
  - y lo mismo era con
  - y así también era la del
  lexicon: HALOT
  rationale: וְכֵן marca equivalencia entre los dos querubines. En español, «y así era también la de» comunica de manera fluida que la segunda figura tenía la misma altura.
- source_word: הַכְּרוּב הַשֵּׁנִי
  english_pob_choice: the second cherub
  chosen_spanish: el segundo querubín
  alternatives_spanish:
  - el otro querubín
  - el segundo querubim
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «el segundo», no solo «el otro». Se conserva esa relación formal para reflejar la simetría del versículo.
theological_decisions:
- issue: Tratamiento de la unidad de medida antigua
  english_pob_reading: A cubit was an ancient unit of length, roughly the distance from the elbow to the fingertips.
  chosen_spanish_reading: No se añade nota explicativa en el texto principal; se deja «codos» como medida histórica del pasaje.
  alternative_spanish_readings:
  - codos (unidad antigua de longitud)
  - codos[a]
  rationale: El texto fuente y el audit trail inglés solo ofrecen una nota cultural, no una decisión doctrinal. En un versículo tan breve, la medida antigua puede conservarse sin explicación intratextual para no interrumpir el flujo; la aclaración cultural queda disponible si el proyecto decide anotarla en otro lugar.
  doctrine_reference: Sin referencia doctrinal; decisión de estilo/cultura bíblica.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se mantiene la estructura comparativa («el uno / el segundo») y la medida antigua («codos») sin cambios de sentido. No hay revisiones aplicadas en el contexto fuente.'
  spanish_consistency_notes:
  - Se prefiere «querubín» como singular consistente con el hebreo y con el uso bíblico en español.
  - Se mantiene «codos» para la unidad de medida, coherente con el registro bíblico y con la equivalencia histórica del inglés auditado.
  - La relación entre «primer» y «segundo» preserva la simetría del hebreo הָאֶחָד / הַשֵּׁנִי sin volverla interpretativa.
