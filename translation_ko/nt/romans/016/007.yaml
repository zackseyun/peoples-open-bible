id: ROM.16.7
reference: Romans 16:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀσπάσασθε Ἀνδρόνικον καὶ ⸀Ἰουνίαν τοὺς συγγενεῖς μου καὶ συναιχμαλώτους μου, οἵτινές εἰσιν ἐπίσημοι ἐν τοῖς ἀποστόλοις, οἳ καὶ πρὸ ἐμοῦ ⸀γέγοναν ἐν Χριστῷ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/016/007.yaml
  text: Greet Andronicus and Junia, my kinsmen and my fellow prisoners. They are notable among the apostles, and they were in Messiah before me.
translation:
  language: ko
  text: 나의 친족이자 나와 함께 갇혔던 안드로니고와 유니아[a]에게 문안하십시오. 그들은 사도들 가운데 뛰어난 자들이며[b], 나보다 먼저 메시아 안에 있었던 사람들입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 Ἰουνίαν은 여성 이름 「유니아」로 읽는 것이 현대 학자 다수의 결론이다. 전통적으로 「유니아스(남성)」로 옮긴 사례가 있으나 사본 전통과 그리스 명명법에 비추어 「유니아」가 옳다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「사도들 가운데 잘 알려진 자들」. 헬라어 ἐπίσημοι ἐν τοῖς ἀποστόλοις는 그들이 사도들의 무리에 속하면서 두드러진 자들이라는 읽기(포함적 읽기)가 본문의 자연스러운 의미이다. 또 하나의 가능한 읽기는 「사도들에게 잘 알려진 자들」(외부적 읽기)이다.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀνδρόνικον
  english_pob_choice: Andronicus
  chosen_korean: 안드로니고
  lexicon: BDAG
  rationale: 정책 지시 음역.
- source_word: Ἰουνίαν
  english_pob_choice: Junia
  chosen_korean: 유니아
  alternatives_korean:
  - 유니아스
  lexicon: BDAG
  rationale: '정책 지시: 여성 「유니아」로 옮기되 유니아/유니아스 논쟁을 신학적 결정에 기록.'
- source_word: τοὺς συγγενεῖς μου καὶ συναιχμαλώτους μου
  english_pob_choice: my kinsmen and my fellow prisoners
  chosen_korean: 나의 친족이자 나와 함께 갇혔던 자들
  alternatives_korean:
  - 나의 동족이자 동료 죄수
  lexicon: BDAG
  rationale: συγγενής는 친족(또는 동족). συναιχμάλωτος는 함께 갇힌 자.
- source_word: ἐπίσημοι ἐν τοῖς ἀποστόλοις
  english_pob_choice: notable among the apostles
  chosen_korean: 사도들 가운데 뛰어난 자들
  alternatives_korean:
  - 사도들에게 잘 알려진 자들
  lexicon: BDAG
  rationale: 포함적 읽기(「사도들 중에 속하면서 뛰어난」)를 본문의 자연스러운 의미로 택한다. 외부적 읽기는 각주에 보존.
- source_word: πρὸ ἐμοῦ ... ἐν Χριστῷ
  english_pob_choice: in Messiah before me
  chosen_korean: 나보다 먼저 메시아 안에
  lexicon: BDAG
  rationale: 직역.
theological_decisions:
- issue: Ἰουνίαν의 성별
  chosen_reading: 여성 「유니아」
  alternative_readings:
  - 남성 「유니아스」(Junias)
  rationale: 사본 전통, 그리스 명명법, 교부 주석 다수 증거에 따라 「유니아」(여성)가 본문의 본래 형태이다. 남성형 「유니아스」는 비교적 후기의 가설로 사본 증거가 약하다. 현대 학자 합의는 여성형이다.
  doctrine_reference: 'DOCTRINE.md: 원어 우선·사본 증거 우선'
- issue: ἐπίσημοι ἐν τοῖς ἀποστόλοις의 사도적 위치
  chosen_reading: 「사도들 가운데 뛰어난 자들」 포함적 읽기를 본문에 보존
  alternative_readings:
  - 「사도들에게 잘 알려진 자들」 외부적 읽기
  rationale: 헬라어 ἐν + 여격 + 형용사 ἐπίσημος의 자연스러운 의미는 「그 무리 중에 속한 두드러진 자」다. 후대 외부적 읽기는 가능하나 본문의 자연스러운 어순을 약화한다. 두 읽기 모두 본문에 둘 만한 무게를 지니므로 한쪽은 본문, 다른 쪽은 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: 원어 우선; 신학적 긴장을 보존하라'
