revisions:
- from: Y ahora dime por qué huyiste de ellos y viniste a nosotros[a]; porque has venido para liberación.
  to: Y ahora dime por qué huyiste de ellos y viniste a vernos; porque has venido para salvación[a].
  rationale: Se ajusta «viniste a nosotros» a «viniste a vernos» para lograr español natural sin perder el sentido de aproximación al interlocutor. Se cambia «para liberación» a «para salvación» porque es más idiomático como sustantivo abstracto en español y refleja mejor σωτηρία, mientras la alternativa contextual «liberación» queda preservada en nota. La nota se corrige para no duplicar la lectura principal y para explicar el griego de manera más natural.
