lexical_decisions:
- source_word: וּמִן
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - De
  lexicon: HALOT
  rationale: El hebreo une este miembro a la lista previa con una conjunción más preposición. En español, 'Y de' conserva el flujo aditivo sin forzar un calco pesado.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de
  lexicon: HALOT
  rationale: En listas genealógicas, 'hijos de' es el equivalente más directo y transparente, y mantiene la relación de linaje/familia del hebreo.
- source_word: הֵימָן
  english_pob_choice: Heman
  chosen_spanish: Heman
  lexicon: transliteración estándar
  rationale: Nombre propio; se translitera para preservar la forma del texto fuente.
- source_word: יחואל
  english_pob_choice: Jehuel
  chosen_spanish: Jehuel
  alternatives_spanish:
  - Jahiel
  lexicon: transliteración estándar
  rationale: Se conserva la forma inglesa principal del POB como transliteración normalizada. La variante 'Jahiel' queda reflejada como alternativa tradicional posible.
- source_word: וְשִׁמְעִי
  english_pob_choice: and Shimei
  chosen_spanish: y Simei
  alternatives_spanish:
  - y Shimei
  lexicon: transliteración estándar
  rationale: Se mantiene el nombre propio con transliteración habitual en español; 'Simei' es la forma más natural y reconocible para lectores hispanos.
- source_word: יְדוּתוּן
  english_pob_choice: Jeduthun
  chosen_spanish: Jedutún
  alternatives_spanish:
  - Jedutun
  lexicon: transliteración estándar
  rationale: Nombre propio; en español resulta más natural acentuarlo según la pronunciación recibida, sin alterar la identidad del nombre.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Shemaías
  lexicon: transliteración estándar
  rationale: Se adopta una forma castellana naturalizada del nombre propio, manteniendo la correspondencia con el hebreo y la pronunciación tradicional.
- source_word: וְעֻזִּיאֵל
  english_pob_choice: and Uzziel
  chosen_spanish: y Uziel
  alternatives_spanish:
  - y Uzziel
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio en una forma española natural y reconocible, sin duplicar consonantes que no aportan claridad en español.
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran una lista genealógica estable, sin revisiones aplicadas ni cambios de sentido. La única tensión lexical relevante es la alternancia del nombre Jehuel/Jahiel, que se conserva como nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo la estructura enumerativa con dos segmentos paralelos introducidos por 'y de'.
  - Los nombres propios se transliteraron de manera consistente y comprensible para lectores hispanos.
  - Se evitó sustituir nombres por equivalentes tradicionalmente castellanos cuando ello habría oscurecido la correspondencia con el hebreo.
  - La nota sobre Jehuel/Jahiel se ancló únicamente en el nombre correspondiente y no introduce otras variantes no atestiguadas.
