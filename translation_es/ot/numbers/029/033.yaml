  glossary_alignment: No hay conflictos con la terminología de proyecto principal. La decisión sobre מִנְחָה conviene afinarse a «ofrenda de cereal» por precisión cultual en español; «libaciones», «toros», «carneros», «corderos» y «ordenanza» están bien alineados.
