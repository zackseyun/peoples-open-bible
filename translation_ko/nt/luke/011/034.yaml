  text: 'The lamp of your body is your eye[a]. When your eye is healthy, your whole body also is full of light; but when it is bad[b], your body also is dark.'
  footnotes:
  - marker: a
    text: 'Or ''clear,'' ''sound,'' or traditionally ''single.'' The Greek adjective can carry the sense of being undivided or sound; here it describes the eye in contrast to a ''bad'' eye.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''evil.'' The Greek word can mean ''bad'' or ''evil''; here it may suggest both a defective eye and morally distorted perception.'
    reason: lexical_alternative
