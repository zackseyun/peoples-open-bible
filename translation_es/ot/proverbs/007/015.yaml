translation:
  language: es
  text: Por tanto, salí a encontrarte, a buscar[a] tu rostro, y te he encontrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a buscarte temprano» o «a buscarte diligentemente»; el verbo hebreo puede implicar una búsqueda temprana o insistente.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - Por ello
  lexicon: HALOT
  rationale: La locución hebrea introduce una conclusión causal; «Por tanto» mantiene el valor inferencial con un registro más formal y bíblico, acorde con la revisión inglesa que prefirió «Therefore».
- source_word: יָצָאתִי
  english_pob_choice: I came out
  chosen_spanish: salí
  alternatives_spanish:
  - salí de
  - salí afuera
  - vine afuera
  lexicon: HALOT
  rationale: El verbo significa «salir / ir afuera». En español, «salí» expresa con naturalidad el movimiento desde el punto de vista de la hablante sin añadir elementos innecesarios.
- source_word: לִקְרָאתֶךָ
  english_pob_choice: to meet you
  chosen_spanish: a encontrarte
  alternatives_spanish:
  - para encontrarte
  - a tu encuentro
  - para ir a encontrarte
  lexicon: HALOT
  rationale: La construcción denota ir al encuentro de alguien. «A encontrarte» conserva la finalidad del movimiento y resulta idiomático en español.
- source_word: לְשַׁחֵר
  english_pob_choice: to seek
  chosen_spanish: a buscar
  alternatives_spanish:
  - a buscarte temprano
  - a buscarte diligentemente
  - a procurarte
  lexicon: HALOT
  rationale: El verbo puede implicar búsqueda temprana o diligente, pero el contexto inmediato enfatiza la acción de buscar. «A buscar» preserva el núcleo semántico y deja abierta la amplitud de la nota textual/lexical.
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu presencia
  lexicon: HALOT
  rationale: «Rostro» conserva el hebraísmo literal con dignidad en español y mantiene la imagen de búsqueda personal directa. «Presencia» sería interpretativo y menos transparente para el paralelo hebreo.
- source_word: וָאֶמְצָאֶךָּ
  english_pob_choice: and I have found you
  chosen_spanish: y te he encontrado
  alternatives_spanish:
  - y te encontré
  lexicon: HALOT
  rationale: El wayyiqtol avanza la acción narrativa; en discurso directo, el presente perfecto español puede comunicar el resultado ya logrado con vivacidad. También sería posible el pretérito simple, pero el presente perfecto sigue de cerca el valor contextual elegido en la POB inglesa.
translation_notes:
  revision_awareness: La revisión inglesa sustituyó «That is why» por «Therefore» para un registro más formal y más cercano al original. En español se reflejó esa misma preferencia con «Por tanto», evitando una reformulación más coloquial.
  spanish_consistency_notes:
  - Se mantuvo la imagen literal de «rostro» para preservar la transparencia hebrea.
  - No se usó «Cristo», «SEÑOR» ni vocabulario doctrinal ajeno al versículo.
  - La nota [a] está anclada en el texto mediante la misma marca exacta en «encontrarte[a]».
