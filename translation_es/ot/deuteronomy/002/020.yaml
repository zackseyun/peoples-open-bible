translation:
  language: es
  text: Esa también se considera una tierra de los refaítas[a]; los refaítas[b] habitaban en ella antiguamente, pero los amonitas los llaman zamzumitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la tierra de los refaítas».'
    reason: lexical_alternative
  - marker: b
    text: «Refaítas» puede referirse a un pueblo antiguo tradicionalmente asociado con gran estatura; algunas traducciones aquí vierten el término como «gigantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ רְפָאִים
  english_pob_choice: a land of the Rephaim
  chosen_spanish: una tierra de los refaítas
  alternatives_spanish:
  - la tierra de los refaítas
  - una tierra de gigantes
  lexicon: HALOT
  rationale: אֶרֶץ es ‘tierra’ y la secuencia con רְפָאִים funciona aquí como designación de grupo/territorio. En español, ‘tierra de los refaítas’ conserva la relación territorial sin imponer una lectura interpretativa como ‘gigantes’.
- source_word: תֵּחָשֵׁב
  english_pob_choice: is considered
  chosen_spanish: se considera
  alternatives_spanish:
  - se cuenta
  - se tiene por
  lexicon: HALOT
  rationale: El nifal de חשׁב expresa ser considerado o reputado. ‘Se considera’ es natural en español y mantiene la fuerza pasiva/valorativa del hebreo.
- source_word: אַף הִוא
  english_pob_choice: That also
  chosen_spanish: Eso también
  alternatives_spanish:
  - También eso
  - Ella también
  lexicon: HALOT
  rationale: La frase añade este territorio al anterior. ‘Eso también’ conserva la referencia discursiva sin sonar arcaico en español.
- source_word: רְפָאִים
  english_pob_choice: Rephaim
  chosen_spanish: refaítas
  alternatives_spanish:
  - rephaim
  - gigantes
  lexicon: HALOT
  rationale: Aquí el término funciona como etnónimo. ‘Refaítas’ translitera y adapta al español la forma del nombre de pueblo, preservando la especificidad del hebreo sin sustituirla por ‘gigantes’.
- source_word: יָשְׁבוּ בָהּ
  english_pob_choice: lived in it
  chosen_spanish: habitaron en ella
  alternatives_spanish:
  - vivieron en ella
  - moraron en ella
  lexicon: HALOT
  rationale: יָשַׁב puede ser ‘habitar’, ‘vivir’ o ‘residir’. ‘Habitaron en ella’ mantiene un registro digno y bíblico en español, con clara referencia al lugar.
- source_word: לְפָנִים
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - antiguamente
  - en tiempos pasados
  lexicon: HALOT
  rationale: El adverbio marca anterioridad temporal. ‘Antes’ es breve y fiel; ‘antiguamente’ sería posible, pero algo más marcado en estilo.
- source_word: וְהָעַמֹּנִים
  english_pob_choice: but the Ammonites
  chosen_spanish: pero los amonitas
  alternatives_spanish:
  - y los amonitas
  lexicon: HALOT
  rationale: Aunque el ו puede ser simplemente coordinante, el contraste discursivo en español se expresa mejor con ‘pero’, porque introduce el nombre dado por los amonitas frente al nombre anterior del pueblo.
- source_word: יִקְרְאוּ לָהֶם
  english_pob_choice: call them
  chosen_spanish: los llaman
  alternatives_spanish:
  - los llamaban
  - les llaman
  lexicon: HALOT
  rationale: El imperfecto aquí expresa designación habitual o convencional. ‘Los llaman’ comunica esa costumbre nominal sin forzar un tiempo narrativo pasado.
- source_word: זַמְזֻמִּים
  english_pob_choice: Zamzummim
  chosen_spanish: zamzumitas
  alternatives_spanish:
  - zamzumim
  - Zamzummim
  lexicon: HALOT
  rationale: Es otro nombre de pueblo. ‘Zamzumitas’ adapta el etnónimo al español y deja claro que se trata de una designación grupal, no de un concepto común.
theological_decisions:
- issue: Nombre étnico vs. interpretación tradicional como 'gigantes'
  english_pob_reading: Rephaim is transliterated; the note preserves the ancient-size tradition without making it the primary translation.
  chosen_spanish_reading: refaítas
  alternative_spanish_readings:
  - gigantes
  - rephaim
  rationale: El hebreo presenta un nombre de pueblo y el contexto habla de designación territorial y etnónica. Mantener ‘refaítas’ preserva esa referencia directa; la posible asociación tradicional con ‘gigantes’ queda como alternativa interpretativa, no como traducción principal.
  doctrine_reference: Lexical theology / ethnonym usage in Hebrew Bible
translation_notes:
  revision_awareness: No se aplicaron revisiones al texto base; el inglés auditado se mantuvo estable y el hebreo concuerda con la lectura publicada. La versión española conserva la misma estructura semántica y la misma distinción entre el nombre del pueblo y el nombre amonita.
  spanish_consistency_notes:
  - Se usó ‘refaítas’ para el etnónimo y ‘zamzumitas’ para el nombre amonita, siguiendo una transliteración adaptada al español.
  - Se prefirió ‘habitaron’ por registro bíblico natural, sin perder el sentido de residencia pasada.
  - Se evitó ‘SEÑOR’ u otras sustituciones, pues el versículo no contiene el tetragrámaton.
  - La puntuación reproduce la división del hebreo entre la afirmación general, la cláusula temporal y la cláusula adversativa final.
