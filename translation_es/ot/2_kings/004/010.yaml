review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: propuesta cortés cohortativa, aposento alto pequeño, mobiliario, y la idea de que Eliseo pueda desviarse allí al llegar. Sin embargo, varias decisiones no reflejan bien el sentido idiomático en español ni algunas opciones léxicas documentadas por el POB inglés.'
  spanish_quality_summary: 'El español es generalmente claro, pero contiene giros poco naturales o engañosos: «venga a nosotros» suena calcado; «se apartará allí» no comunica bien el sentido de hospedarse; «candelabro» sugiere velas más que alumbrado doméstico. «Habitación superior» también es entendible, pero «aposento alto» o «cuarto de arriba» encaja mejor con registro bíblico-digno.'
  glossary_alignment: 'No hay términos del glosario mayor en juego. La principal cuestión es fidelidad léxica: מְנוֹרָה se representa mejor como «lamparero» o más naturalmente «lámpara» con nota, y יָסוּר debe expresar desviarse/detenerse para hospedarse, no simplemente «apartarse».'
  issues:
  - severity: medium
    issue: «venga a nosotros» es un calco poco natural de אֵלֵינוּ
    rationale: En español natural, en este contexto doméstico corresponde mejor «venga a visitarnos» o «venga a nuestra casa». El hebreo expresa llegada a donde ellos están, no proximidad corporal literal.
  - severity: high
    issue: «se apartará allí» no transmite adecuadamente el sentido de hospedarse o detenerse allí
    rationale: Aunque סוּר puede significar «apartarse», aquí en contexto de viaje/alojamiento significa desviarse para entrar o hospedarse. La formulación actual suena ambigua y poco idiomática.
  - severity: medium
    issue: «candelabro» no es la mejor equivalencia para מְנוֹרָה en español moderno
    rationale: «Candelabro» evoca soporte para velas; el hebreo denota un soporte de luz/lámpara. En español bíblico legible, «lamparero» preserva mejor la especificidad, o «lámpara» con nota alternativa.
  - severity: low
    issue: «habitación superior» es comprensible pero algo rígido
    rationale: «Aposento alto» suena más natural y digno en español bíblico, y representa bien עֲלִיָּה sin tecnicismo moderno.
  - severity: low
