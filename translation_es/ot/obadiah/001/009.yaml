translation:
  language: es
  text: Y tus hombres valerosos[a], Temán[b], quedarán destrozados, para que todo hombre del monte de Esaú sea eliminado[c] por la matanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quedarán aterrados' o 'quedarán desmoralizados'. El verbo hebreo puede enfatizar tanto el pánico como la ruina.
    reason: lexical_alternative
  - marker: b
    text: Temán era una región o ciudad de Edom; el nombre se relaciona con 'sur'.
    reason: cultural_note
  - marker: c
    text: O 'todo hombre del monte de Esaú sea eliminado en la matanza'. La frase final puede entenderse con un matiz ligeramente distinto.
    reason: alternative_reading
lexical_decisions:
- source_word: וְחַתּוּ
  english_pob_choice: will be shattered
  chosen_spanish: serán abatidos
  alternatives_spanish:
  - serán desmoronados
  - serán quebrantados
  - serán aterrados
  lexicon: HALOT
  rationale: El verbo hebreo expresa una caída de ánimo y de fuerza en contexto militar. 'Ser abatidos' mantiene la idea de ruina/pánico sin reducirlo solo al temor emocional ni sonar demasiado mecánico en español.
- source_word: גִבּוֹרֶיךָ
  english_pob_choice: your mighty men
  chosen_spanish: tus hombres valerosos
  alternatives_spanish:
  - tus guerreros
  - tus valientes
  - tus hombres poderosos
  lexicon: HALOT
  rationale: גִבּוֹר designa hombres fuertes o de guerra. 'Hombres valerosos' conserva el sentido militar y la fuerza del término, con una formulación natural en español.
- source_word: תֵּימָן
  english_pob_choice: Teman
  chosen_spanish: Temán
  alternatives_spanish:
  - el sur
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio edomita, no como dirección geográfica. Se translitera como topónimo para preservar la referencia histórica y profética.
- source_word: יִכָּרֶת
  english_pob_choice: may be cut off
  chosen_spanish: sea exterminado
  alternatives_spanish:
  - sea cortado
  - sea eliminado
  - sea destruido
  lexicon: HALOT
  rationale: כרת en Niphal retiene la imagen de ser 'cortado' y en contextos judiciales/hostiles significa quedar eliminado. 'Sea exterminado' comunica con claridad el juicio total del pasaje, aunque la imagen de corte queda atenuada en español.
- source_word: אִישׁ
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - cada hombre
  - cada uno
  lexicon: HALOT
  rationale: El singular masculino hebreo tiene fuerza distributiva. 'Todo hombre' conserva la literalidad funcional y la amplitud del juicio sobre la población masculina del monte de Esaú.
- source_word: מֵהַר עֵשָׂו
  english_pob_choice: from the mountain of Esau
  chosen_spanish: del monte de Esaú
  alternatives_spanish:
  - de la montaña de Esaú
  - del monte de Esaú
  lexicon: HALOT
  rationale: La construcción hebrea permite un nombre territorial. 'Monte de Esaú' reproduce de forma transparente la imagen del territorio edomita asociado con Esaú.
- source_word: מִקָּטֶל
  english_pob_choice: by slaughter
  chosen_spanish: por la matanza
  alternatives_spanish:
  - mediante la matanza
  - a causa de la matanza
  - en la matanza
  lexicon: HALOT
  rationale: El prefijo מ puede expresar medio o circunstancia acompañante. 'Por la matanza' conserva ese valor y evita cerrar demasiado la sintaxis del hebreo.
theological_decisions:
- issue: Tratamiento del singular masculino אִישׁ en un oráculo de juicio colectivo
  english_pob_reading: every man
  chosen_spanish_reading: todo hombre
  alternative_spanish_readings:
  - cada hombre
  - cada persona
  rationale: Se mantiene el singular masculino con fuerza distributiva, porque forma parte del énfasis retórico del juicio. No se neutraliza a una forma genérica más amplia, ya que el texto hebreo emplea un masculino singular específico.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Topónimo Temán como referencia a Edom
  english_pob_reading: Teman
  chosen_spanish_reading: Temán
  alternative_spanish_readings:
  - el sur
  rationale: El contexto profético apunta al lugar/nombre edomita. Traducirlo como 'el sur' diluiría la alusión histórica y geográfica que el texto usa para señalar a Edom.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 2
- issue: Valor resultativo/final de לְמַעַן + imperfecto
  english_pob_reading: so that ... may be cut off
  chosen_spanish_reading: para que ... sea exterminado
  alternative_spanish_readings:
  - a fin de que ... sea cortado
  - para que ... sea eliminado
  rationale: La cláusula expresa propósito o resultado intencional. 'Para que' reproduce bien el valor hebreo y permite el subjuntivo español, manteniendo la dependencia sintáctica del juicio anunciado.
  doctrine_reference: 'Gramática hebrea: לְמַעַן con imperfecto'
- issue: Imagen de 'ser cortado' frente a una equivalencia más interpretativa
  english_pob_reading: be cut off
  chosen_spanish_reading: sea exterminado
  alternative_spanish_readings:
  - sea cortado
  - sea eliminado
  rationale: La metáfora hebrea de cortar puede sonar opaca en español contemporáneo si se conserva sola. 'Sea exterminado' hace explícito el resultado judicial total del contexto, aunque la imagen verbal se vuelve menos visible; se registra la alternativa más cercana al literal.
  doctrine_reference: HALOT / uso profético de כרת
translation_notes:
  revision_awareness: 'La auditoría inglesa pasó por una corrección importante en la cláusula final: se descartó ''will be cut off'' a favor de ''may be cut off'' por el valor de propósito de לְמַעַן. También hubo oscilación entre ''Mount Esau'' y ''the mountain of Esau''; se prefirió la forma más transparente. En esta versión española se conserva el valor final con ''para que'' y se mantiene la imagen territorial de ''monte de Esaú''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - '''Temán'' se mantiene como nombre propio y no se traduce como dirección.'
  - '''Exterminado'' interpreta el resultado de כרת en contexto de juicio; la nota preserva la alternativa más literal ''cortado''.'
  - La puntuación separa el vocativo aparente por coma, siguiendo el uso poético/profético del hebreo y la lectura del contexto.
