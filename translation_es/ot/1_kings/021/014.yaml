translation:
  language: es
  text: 'Entonces mandaron a decir a Jezabel[a]: «Nabot ha sido apedreado y ha muerto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Nabot fue apedreado y murió».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  english_pob_choice: Then they sent word
  chosen_spanish: Entonces enviaron aviso
  alternatives_spanish:
  - Y enviaron
  - Entonces enviaron
  lexicon: HALOT
  rationale: El verbo en secuencia narrativa se expresa naturalmente en español con «entonces». El sentido idiomático es el de enviar un mensaje o aviso, no solo el acto físico de enviar; por eso «enviaron aviso» comunica bien la función del verbo en este contexto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Preposición direccional estándar. En español, «a» es la equivalencia natural para introducir el destinatario del mensaje.
- source_word: אִיזֶבֶל
  english_pob_choice: Jezebel
  chosen_spanish: Jezabel
  alternatives_spanish:
  - Jezabel
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio en transliteración bíblica usual en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - para decir
  lexicon: HALOT
  rationale: La fórmula de reporte se vierte de forma idiomática con un gerundio introductorio en español, manteniendo el valor de introducción del discurso directo sin sobretraducir.
- source_word: סֻקַּל
  english_pob_choice: has been stoned
  chosen_spanish: ha sido apedreado
  alternatives_spanish:
  - fue apedreado
  - ha sido lapidado
  lexicon: HALOT
  rationale: El pual es pasivo. «Apedreado» reproduce de manera clara el acto de ser muerto por piedras; «lapidado» es posible, pero «apedreado» es más transparente para lectores generales. Se conserva el pasivo con perfecto compuesto, coherente con el informe del hecho.
- source_word: נָבוֹת
  english_pob_choice: Naboth
  chosen_spanish: Nabot
  alternatives_spanish:
  - Naboth
  lexicon: transliteración estándar
  rationale: Nombre propio conservado en forma bíblica española habitual.
- source_word: וַיָּמֹת
  english_pob_choice: and is dead
  chosen_spanish: y ha muerto
  alternatives_spanish:
  - y murió
  - y está muerto
  lexicon: HALOT
  rationale: Aunque la forma verbal es narrativa y puede reflejar secuencia («murió»), en español el informe resultante queda natural como «ha muerto». Se conserva el resultado de la acción sin añadir explicaciones no presentes en el hebreo.
theological_decisions:
- issue: Cómo representar la muerte de Nabot sin suavizar la violencia ni añadir más de lo dicho
  english_pob_reading: Naboth has been stoned and is dead.
  chosen_spanish_reading: Nabot ha sido apedreado y ha muerto.
  alternative_spanish_readings:
  - Nabot fue apedreado y murió
  - Nabot ha sido lapidado y ha muerto
  rationale: 'El texto hebreo y la traducción inglesa presentan dos afirmaciones coordinadas: la acción de apedrear y el resultado de la muerte. El español conserva ambas sin intensificar ni atenuar el hecho. «Apedreado» mantiene la crudeza del acto; «ha muerto» refleja el resultado reportado.'
  doctrine_reference: No aplica; decisión de fidelidad narrativa y lexical.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó el pronombre redundante («he») para hacer más natural el reporte: «has been stoned and is dead». En español se siguió esa misma preferencia por una formulación fluida, sin pronombre innecesario, y se mantuvo la relación entre el acto y el resultado.'
  spanish_consistency_notes:
  - Se usa «Jezabel» y «Nabot» con transliteración bíblica usual en español.
  - Se evita «SEÑOR» u այլ terminología no pertinente; el versículo no contiene vocabulario divino.
  - Se preserva el pasivo del hebreo en «ha sido apedreado» y el resultado en «ha muerto».
