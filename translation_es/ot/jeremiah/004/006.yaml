review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo y sigue de cerca la auditoría inglesa: levantar una señal hacia Sion, buscar refugio sin demora, y el anuncio divino de calamidad/destrucción desde el norte. También preserva correctamente el valor direccional de צִיּוֹנָה y el sentido no moral de רָעָה. Sin embargo, dos elecciones afectan la fidelidad estilística y la legibilidad objetivo del proyecto: «Refugiaos» y «no os detengáis» usan voseo peninsular plural, mientras el proyecto pide español neutro latinoamericano; además «Refugiaos» suena menos natural y menos claro que «Busquen refugio» o «Pónganse a salvo».'
  spanish_quality_summary: La redacción es clara en general, pero mezcla un registro digno con formas verbales peninsulares («Alzad», «Refugiaos», «detengáis») que no encajan con el objetivo de español neutral latinoamericano/broadly church-readable. Conviene normalizar a imperativos plurales con «ustedes». «Levanten una señal» y «Busquen refugio; no se detengan» suenan más naturales y mantienen la fuerza exhortativa. El resto de la frase funciona bien; «calamidad» y «gran destrucción» son adecuados.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «Sion» es aceptable. «Calamidad» para רָעָה está bien justificado y la nota evita malentendidos doctrinales. La nota sobre «señal/estandarte» preserva la alternativa pertinente. La principal desviación es de estilo metaespañol, no de glosario.
  issues:
  - severity: medium
    issue: Uso de imperativos peninsulares plurales
    rationale: «Alzad», «Refugiaos» y «no os detengáis» no corresponden al español neutro latinoamericano solicitado y reducen la legibilidad amplia en iglesias hispanohablantes.
  - severity: medium
    issue: «Refugiaos» suena menos natural en el registro meta
    rationale: Aunque semánticamente defendible, en español neutro es más natural «Busquen refugio» o «Pónganse a salvo». Además, la propia nota ya reconoce «buscad refugio» como alternativa más explícita; en español neutral conviene llevar esa claridad al texto principal.
  revised_spanish_text: Levanten una señal[a] hacia Sion. Busquen refugio[b]; no se detengan, porque yo estoy trayendo calamidad[c] desde el norte, y gran destrucción.
  revised_footnotes:
  - marker: a
    text: O «estandarte».
    reason: lexical_alternative
  - marker: b
    text: O «Pónganse a salvo»; también puede entenderse como «Refúgiense».
    reason: lexical_alternative
  - marker: c
    text: «Calamidad» aquí se refiere a juicio o desastre, no a mal moral.
    reason: theological_note
  revision_rationale: 'Se revisa el texto para ajustarlo al español neutro latinoamericano requerido, reemplazando los imperativos peninsulares por formas de «ustedes» sin cambiar el sentido. «Busquen refugio» mantiene el valor de הָעִיזוּ en un español más natural y eclesialmente amplio. También se suaviza la nota c con una formulación más idiomática: «se refiere a».'
