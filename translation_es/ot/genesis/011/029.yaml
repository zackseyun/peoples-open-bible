translation:
  language: es
  text: Abram y Nahor tomaron mujeres por esposas para sí[a]. El nombre de la esposa de Abram era Sarai, y el nombre de la esposa de Nahor era Milca, hija de Harán, el padre de Milca y de Isca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Abram y Nahor se casaron». El hebreo dice literalmente «tomaron mujeres por esposas para sí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - se casaron con
  - tomaron esposas
  lexicon: HALOT
  rationale: El hebreo usa literalmente ‘tomar’; en un contexto matrimonial, español puede decir ‘tomaron esposas’ para conservar la expresión fuente sin perder claridad. Se evita reducirlo sin más a ‘se casaron’, porque eso suaviza la forma verbal marcada del hebreo.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos
  - para sí mismos
  lexicon: HALOT
  rationale: El pronombre dativo expresa interés/reflexividad idiomática. ‘Para sí’ refleja bien que cada uno tomó esposa en su propio interés, no para un tercero.
- source_word: נָשִׁים
  english_pob_choice: wives
  chosen_spanish: esposas
  alternatives_spanish:
  - mujeres
  - esposas
  lexicon: HALOT
  rationale: El contexto matrimonial exige un término con sentido conyugal. ‘Esposas’ es natural en español moderno y comunica con claridad el valor relacional del sustantivo.
- source_word: שֵׁם
  english_pob_choice: the name of
  chosen_spanish: El nombre de
  alternatives_spanish:
  - Se llamaba
  - El nombre de
  lexicon: HALOT
  rationale: Se preserva la construcción formal repetida del hebreo (‘el nombre de’) para mantener el ritmo y la estructura genealógica del texto.
- source_word: אֵשֶׁת
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - esposa
  lexicon: HALOT
  rationale: En constructo con el nombre del esposo, el sentido es ‘esposa de’. ‘Esposa’ es el equivalente más claro y digno en español contemporáneo.
- source_word: שָׂרָי
  english_pob_choice: Sarai
  chosen_spanish: Sarai
  alternatives_spanish:
  - Sarai
  lexicon: standard transliteration
  rationale: Nombre propio transliterado de forma estándar.
- source_word: מִלְכָּה
  english_pob_choice: Milcah
  chosen_spanish: Milca
  alternatives_spanish:
  - Milca
  - Milkah
  lexicon: standard transliteration
  rationale: Se adapta al uso español con la forma tradicional ‘Milca’, manteniendo la identificación inequívoca del nombre propio.
- source_word: בַּת
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - hija
  lexicon: HALOT
  rationale: Término filial directo; ‘hija de’ reproduce de manera natural la relación genealógica.
- source_word: הָרָן
  english_pob_choice: Haran
  chosen_spanish: Harán
  alternatives_spanish:
  - Harán
  lexicon: standard transliteration
  rationale: Se usa la forma española asentada con acento gráfico, adecuada para lectura pública.
- source_word: אֲבִי
  english_pob_choice: the father of
  chosen_spanish: el padre de
  alternatives_spanish:
  - padre de
  - antepasado de
  lexicon: HALOT
  rationale: La relación inmediata y más probable en la frase genealógica es paterna; ‘el padre de’ conserva el valor básico sin ampliar innecesariamente a ‘antepasado’.
- source_word: יִסְכָּה
  english_pob_choice: Iscah
  chosen_spanish: Isca
  alternatives_spanish:
  - Isca
  - Iscah
  lexicon: standard transliteration
  rationale: Nombre propio transliterado con adaptación española habitual ‘Isca’.
theological_decisions:
- issue: Relación genealógica de Harán con Milca e Isca
  english_pob_reading: the father of Milcah and of Iscah
  chosen_spanish_reading: el padre de Milca y de Isca
  alternative_spanish_readings:
  - padre de Milca y de Isca
  - antepasado de Milca y de Isca
  rationale: Se mantiene la lectura genealógica directa del hebreo y del inglés auditado, sin suavizar el parentesco ni convertirlo en una fórmula general de ascendencia.
  doctrine_reference: Genealogía narrativa; lectura histórica literal del texto
- issue: Construcción matrimonial 'took wives for themselves'
  english_pob_reading: Abram and Nahor took wives for themselves
  chosen_spanish_reading: Abram y Nahor tomaron esposas para sí
  alternative_spanish_readings:
  - Abram y Nahor se casaron
  - Abram y Nahor tomaron mujeres para sí
  rationale: Se conserva la forma verbal concreta del original y el matiz reflexivo. No se reemplaza por una equivalencia más interpretativa que borre la expresión hebrea.
  doctrine_reference: Fidelidad lexical y sintáctica al texto hebreo
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión menor que añadió 'of' antes de 'Iscah' para equilibrar la frase. La versión española conserva ese equilibrio con 'y de Isca', manteniendo la estructura genealógica y el cierre coordinado del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se ha preferido 'esposas' frente a 'mujeres' por el contexto matrimonial explícito.
  - 'Los nombres propios se han adaptado al uso español cuando existe forma asentada: Harán, Milca, Isca.'
