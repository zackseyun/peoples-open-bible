translation:
  language: es
  text: El malvado escucha los labios malvados[a]; el mentiroso presta oído a una lengua destructiva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El malvado escucha labios de iniquidad; la falsedad presta oído a una lengua de ruina». El hebreo permite una versión más literal, en la que «falsedad» se entiende de forma abstracta y no como «un mentiroso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵרַע
  english_pob_choice: an evildoer
  chosen_spanish: el malvado
  alternatives_spanish:
  - el que hace el mal
  - el malhechor
  - el perverso
  lexicon: HALOT
  rationale: El hebreo funciona de modo sustantivo para una persona caracterizada por el mal. «Malvado» comunica esa cualidad moral con naturalidad y conserva la fuerza ética del proverbio.
- source_word: מַקְשִׁיב
  english_pob_choice: listens to
  chosen_spanish: escucha
  alternatives_spanish:
  - presta atención a
  - atiende a
  - oye
  lexicon: HALOT
  rationale: El verbo expresa escuchar con atención; «escucha» es claro en español y mantiene el valor de receptividad culpable del contexto.
- source_word: שְׂפַת אָוֶן
  english_pob_choice: wicked lips
  chosen_spanish: labios de maldad
  alternatives_spanish:
  - labios de iniquidad
  - labios perversos
  - lenguaje perverso
  lexicon: HALOT
  rationale: «Labios» conserva la metonimia hebrea por habla, y אָוֶן admite la idea de maldad/iniquidad. «Labios de maldad» mantiene la imagen sin volverla demasiado abstracta.
- source_word: שֶׁקֶר
  english_pob_choice: a liar
  chosen_spanish: el mentiroso
  alternatives_spanish:
  - la mentira
  - el falso
  - quien es falso
  lexicon: HALOT
  rationale: Como en la lectura auditada en inglés, el término puede tomarse sustantivamente para una persona caracterizada por el engaño. «Mentiroso» preserva el paralelismo con «el malvado».
- source_word: מֵזִין
  english_pob_choice: gives ear to
  chosen_spanish: presta oído a
  alternatives_spanish:
  - escucha
  - atiende a
  - da oído a
  lexicon: HALOT
  rationale: La forma hiphil de אזן significa dar oído/prestar atención. «Presta oído a» es idiomático en español y conserva el matiz más activo que «escucha».
- source_word: לְשׁוֹן הַוּוֹת
  english_pob_choice: a destructive tongue
  chosen_spanish: una lengua destructora
  alternatives_spanish:
  - una lengua de ruina
  - una lengua de destrucción
  - una lengua funesta
  lexicon: HALOT
  rationale: «Lengua» reproduce la metonimia por habla; «destructora» expresa el efecto activo de הַוּוֹת. Se evita suavizarlo como simple «perversa» para respetar la fuerza del original.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto hebreo y concuerda con la auditoría inglesa: dos miembros paralelos con sujeto personal en sustantivo («malvado / mentiroso») y objetos metonímicos para el habla («labios / lengua»). No se detectaron cambios textuales relevantes en la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantuvo «lengua» para לְשׁוֹן por su valor metonímico de habla, evitando sustituirlo por «palabra» o «boca» sin base textual.
  - Se eligió «malvado» y «mentiroso» como equivalentes sustantivos naturales en español, preservando el paralelismo personal del proverbio.
  - La nota al pie conserva la alternativa más literal porque el hebreo permite tomar שֶׁקֶר como abstracción («mentira/falsehood») en vez de una persona.
