review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia ritual del hebreo: el nazareo se afeita/rasura, toma el cabello asociado con su consagración y lo pone sobre el fuego vinculado al sacrificio. También preserva adecuadamente la repetición de ''cabeza de su consagración''. Sin embargo, hay una inconsistencia importante entre el texto y sus propias decisiones léxicas: el texto dice ''sacrificio de paz'', pero el hebreo זֶבַח הַשְּׁלָמִים y la auditoría inglesa exigen plural categorial, algo como ''sacrificio de las ofrendas de paz'' o ''sacrificio de pazes'' no idiomático. Además, la nota [a] está mal formulada porque presenta ''nazareo'' como alternativa cuando ya es la forma usada en el texto.'
  spanish_quality_summary: El español es claro y legible, con tono bíblico moderno apropiado. 'Tienda de reunión' y 'consagración' funcionan bien. 'Se rasurará' es aceptable, aunque 'se afeitará' también sería posible; no requiere cambio. La principal reparación es ajustar la expresión sacrificial al plural técnico y corregir la nota del término 'nazareo' para que explique, no repita confusamente la misma forma.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: no hay nombres divinos ni otros términos sensibles aquí. ''Nazareo'' preserva el término técnico para נָּזִיר y ''consagración'' para נֵזֶר/נִזְרוֹ sigue la justificación auditada. El punto a corregir es זֶבַח הַשְּׁלָמִים, que debe mantenerse como categoría sacrificial plural; por eso conviene ''el sacrificio de las ofrendas de paz'' con alternativas en nota.'
  issues:
  - severity: medium
    issue: El texto principal dice 'del sacrificio de paz[b]' en singular.
    rationale: 'El hebreo זֶבַח הַשְּׁלָמִים y la traducción auditada inglesa expresan la categoría cultual en plural: ''the sacrifice of peace offerings''. En español, ''del sacrificio de paz'' reduce o aplana esa categoría y contradice las propias decisiones léxicas del borrador.'
  - severity: low
    issue: La nota [a] está mal redactada y no aporta una alternativa real.
    rationale: Dice 'O 'nazareo'...' cuando esa es precisamente la forma ya usada en el texto. La nota debería explicar el valor técnico del término y distinguirlo de 'nazareno', o bien omitirse si no se desea nota.
  revised_spanish_text: Entonces el nazareo[a] se rasurará la cabeza de su consagración a la entrada de la tienda de reunión, y tomará el cabello de la cabeza de su consagración y lo pondrá sobre el fuego que está debajo del sacrificio de las ofrendas de paz[b].
  revised_footnotes:
  - marker: a
    text: Término técnico del voto de consagración; no se trata de un nazareno en sentido geográfico.
    reason: lexical_clarification
  - marker: b
    text: O 'ofrendas de comunión' o 'ofrendas de bienestar'.
    reason: lexical_alternative
  revision_rationale: Se corrige 'del sacrificio de paz' a 'del sacrificio de las ofrendas de paz' para reflejar fielmente זֶבַח הַשְּׁלָמִים y la auditoría inglesa, que preservan la categoría sacrificial en plural. También se reescribe la nota [a] para que explique el término técnico 'nazareo' en vez de repetirlo como si fuera alternativa.
