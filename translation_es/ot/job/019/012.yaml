translation:
  language: es
  text: Juntas vienen sus tropas; levantan una calzada contra mí[a], y acampan alrededor de mi tienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levantan su camino contra mí»; el verbo hebreo puede evocar construir una vía elevada o una rampa de asedio.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחַד
  english_pob_choice: Together
  chosen_spanish: Juntos
  alternatives_spanish:
  - Todos juntos
  - Al mismo tiempo
  lexicon: HALOT
  rationale: El adverbio expresa acción coordinada o simultánea. «Juntos» es natural en español y conserva la idea de asalto concertado.
- source_word: גְדוּדָיו
  english_pob_choice: his troops
  chosen_spanish: sus tropas
  alternatives_spanish:
  - sus bandas de saqueo
  - sus divisiones militares
  lexicon: HALOT
  rationale: גְּדוּד puede referirse a tropa, banda o grupo armado. «Tropas» comunica con claridad el matiz militar sin exagerar el tamaño ni especificar más de lo que da el hebreo.
- source_word: וַיָּסֹלּוּ
  english_pob_choice: they build up
  chosen_spanish: levantan
  alternatives_spanish:
  - construyen
  - allananan y levantan
  lexicon: HALOT
  rationale: El verbo puede sugerir alzar o construir un camino, incluso una rampa de asedio. «Levantan» conserva la imagen de elevar una vía o terraplén sin forzar una explicación técnica en el texto principal.
- source_word: דַּרְכָּם
  english_pob_choice: their road
  chosen_spanish: su camino
  alternatives_spanish:
  - su ruta
  - su senda
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser camino, ruta o senda. «Camino» mantiene la imagen concreta de una vía preparada para avanzar o atacar, cercana a la opción inglesa «road».
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - en mi contra
  lexicon: HALOT
  rationale: Aunque el valor básico es «sobre mí», el contexto bélico exige fuerza adversativa. «Contra mí» expresa mejor el tono hostil del pasaje.
- source_word: וַיַּחֲנוּ
  english_pob_choice: they camp
  chosen_spanish: acampan
  alternatives_spanish:
  - se acampan
  - levantan campamento
  lexicon: HALOT
  rationale: De חנה, «acampar» conserva el campo semántico militar y funciona bien en español contemporáneo.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - por todas partes
  - en torno
  lexicon: HALOT
  rationale: El término indica cerco completo. «Alrededor» es idiomático y suficientemente fuerte para el sentido de encierre.
- source_word: לְאָהֳלִי
  english_pob_choice: my tent
  chosen_spanish: mi tienda
  alternatives_spanish:
  - mi tienda de campaña
  - mi morada
  lexicon: HALOT
  rationale: אֹהֶל significa literalmente tienda. «Mi tienda» conserva la imagen concreta y la resonancia poética; «morada» sería más interpretativo.
theological_decisions:
- issue: Referente del sufijo de tercera persona masculina singular en «sus tropas»
  english_pob_reading: The suffix refers to God as the one Job depicts as attacking him.
  chosen_spanish_reading: El sufijo queda reflejado de forma posesiva en «sus tropas», sin explicitar el referente; el contexto identifica a Dios como el agresor figurado.
  alternative_spanish_readings:
  - las tropas de él
  - las tropas del enemigo
  rationale: La traducción mantiene la ambigüedad gramatical del hebreo y evita resolverla de forma innecesaria en el cuerpo del texto. El contexto inmediato de Job permite entender la imagen de asedio dirigida por Dios.
  doctrine_reference: Job 19:12; lectura contextual del discurso de Job sobre la acción hostil de Dios
- issue: Imagen de asedio en «levantan su camino»
  english_pob_reading: the Hebrew verb can evoke building up a road or siege ramp.
  chosen_spanish_reading: «Levantan su camino» conserva la imagen abierta de un camino elevado o una rampa de asedio.
  alternative_spanish_readings:
  - levantan una rampa contra mí
  - levantan un terraplén contra mí
  rationale: El hebreo permite tanto un camino construido como una rampa de sitio. El texto principal retiene la formulación menos interpretativa, y la nota explica la alternativa léxica sin cerrar el sentido.
  doctrine_reference: Uso poético y militar del verbo סלל en contextos de asedio
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y la auditoría inglesa: mantiene el paralelismo militar, conserva la posesión de tercera persona en «sus tropas», y refleja la ambigüedad de סלל con una redacción principal sobria y una nota léxica que abre la lectura de rampa de asedio sin imponerla en el cuerpo del texto. No se reportaron revisiones aplicadas en el historial reciente.'
  spanish_consistency_notes:
  - Se usó «tienda» para אֹהֶל, coherente con la imagen concreta y con el uso bíblico tradicional sin recurrir a «tabernáculo».
  - Se prefirió «tropas» frente a «ejércitos» para no sobredeterminar גְדוּד.
  - Se evitó «SEÑOR» o una sustitución devocional, ya que el texto no contiene el Tetragrámaton explícito en esta forma.
  - La puntuación mantiene el paralelismo poético en dos miembros principales y una cola final de cerco.
