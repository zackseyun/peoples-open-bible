translation:
  language: es
  text: Y Salomón hijo de David se fortaleció sobre su reino[a], y Yahvé su Dios estaba con él y lo engrandeció sobremanera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegó a ser fuerte sobre su reino» o «quedó establecido sobre su reino». La frase «sobre su reino» también puede entenderse como «en su reino» o «en su reinado», pero el hebreo conserva la idea de posición o dominio sobre la esfera real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַזֵּק
  english_pob_choice: strengthened himself
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - se hizo fuerte
  - se fortaleció a sí mismo
  - quedó establecido
  lexicon: HALOT
  rationale: El hitpael de חזק es reflexivo/intransitivo. En español, «se fortaleció» comunica de forma natural la idea de fortalecerse sin perder el matiz reflexivo. «Se fortaleció a sí mismo» sería más explícito pero menos idiomático; «quedó establecido» adelanta una interpretación más fuerte que el hebreo no exige.
- source_word: עַל מַלְכוּתוֹ
  english_pob_choice: over his kingdom
  chosen_spanish: sobre su reino
  alternatives_spanish:
  - en su reino
  - sobre su realeza
  - en su reinado
  lexicon: HALOT
  rationale: La preposición עַל mantiene una relación de dominio o posición «sobre». «Sobre su reino» conserva esa imagen de autoridad sin convertirla en una paráfrasis más abstracta. «En su reinado» suaviza la metáfora y pierde algo del relieve del hebreo.
- source_word: שְׁלֹמֹה בֶן דָּוִיד
  english_pob_choice: Solomon son of David
  chosen_spanish: Salomón, hijo de David
  alternatives_spanish:
  - Salomón, hijo de David
  - Salomón, descendiente de David
  lexicon: HALOT
  rationale: La relación filial directa es la forma más fiel y clara. «Hijo de David» preserva la designación dinástica del texto y evita diluirla en una expresión más amplia como «descendiente».
- source_word: וַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como nombre propio, no como sustituto litúrgico. En español, «Yahvé» corresponde al criterio del proyecto para יְהוָה y preserva la referencia al nombre pactual revelado.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - el Dios de él
  lexicon: HALOT
  rationale: La forma posesiva expresa una relación personal y pactal. «Su Dios» es la opción natural en español y mantiene la cercanía del hebreo.
- source_word: עִמּוֹ
  english_pob_choice: was with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - estaba junto a él
  - andaba con él
  lexicon: HALOT
  rationale: La fórmula hebrea de presencia y favor se vierte de manera idiomática con «estaba con él». «Junto a él» es posible, pero menos común en este uso teológico.
- source_word: וַיְגַדְּלֵהוּ
  english_pob_choice: made him ... great
  chosen_spanish: lo engrandeció
  alternatives_spanish:
  - lo hizo grande
  - lo exaltó
  - lo magnificó
  lexicon: HALOT
  rationale: El piel causativo de גדל puede expresarse como «engrandecer». Esta forma es concisa y fiel, y en español bíblico conserva bien el sentido de aumento de honor y elevación.
- source_word: לְמָעְלָה
  english_pob_choice: exceedingly
  chosen_spanish: sobremanera
  alternatives_spanish:
  - en gran manera
  - sumamente
  - mucho
  lexicon: HALOT
  rationale: El adverbio intensivo se vierte con un intensificador natural en español. «Sobremanera» es solemne, claro y refleja la fuerza superlativa del hebreo sin ser demasiado moderno o coloquial.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Se conserva como nombre propio en español para no ocultar la referencia al nombre divino y mantener la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tensión entre la acción de Salomón y la acción de Yahvé
  english_pob_reading: Retain both Solomon's reflexive strengthening and God's active exaltation in the same verse
  chosen_spanish_reading: Mantener tanto el fortalecimiento de Salomón como la exaltación activa de Yahvé
  alternative_spanish_readings:
  - hacer pasiva la primera cláusula
  - unificar ambas acciones en una sola idea de establecimiento
  rationale: El hebreo presenta a Salomón fortaleciéndose en relación con su reino y, al mismo tiempo, a Yahvé con él y actuando para engrandecerlo. La traducción conserva ambas acciones sin resolverlas en una sola.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail en inglés, sin introducir cambios de sentido. Se incorporó el nombre divino «Yahvé» por coherencia con la política del proyecto y se mantuvo la distinción entre el fortalecimiento de Salomón y la acción de Yahvé de engrandecerlo. No hubo revisiones pendientes en el pasaje fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de manera consistente con el estándar del proyecto.
  - Se prefirió «se fortaleció» frente a «se hizo fuerte» por naturalidad y fidelidad al hitpael reflexivo.
  - «Sobremanera» mantiene un tono bíblico sin caer en arcaísmo excesivo.
  - «Sobre su reino» conserva la metáfora de dominio del hebreo; la nota alternativa documenta opciones cercanas.
