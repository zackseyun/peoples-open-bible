translation:
  language: es
  text: Para los amramitas[a], los izharitas, los hebronitas y los uzielitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «De los amramitas, los izharitas, los hebronitas y los uzielitas». El hebreo contiene solo cuatro designaciones de clan con la preposición ל, funcionando como encabezado de lista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעַמְרָמִי
  english_pob_choice: For the Amramites
  chosen_spanish: Para los amramitas
  alternatives_spanish:
  - De los amramitas
  - En cuanto a los amramitas
  lexicon: HALOT
  rationale: La preposición ל en esta lista genealógica funciona como encabezado de grupo; en español, «Para» conserva ese valor de encabezamiento de manera natural. «Amramitas» reproduce el nombre del clan con forma gentilicia.
- source_word: לַיִּצְהָרִי
  english_pob_choice: the Izharites
  chosen_spanish: los izharitas
  alternatives_spanish:
  - el clan de Izhar
  - los descendientes de Izhar
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con los demás nombres de clan y el sufijo gentilicio en español, sin expandir innecesariamente el sintagma.
- source_word: לַחֶבְרוֹנִי
  english_pob_choice: the Hebronites
  chosen_spanish: los hebronitas
  alternatives_spanish:
  - el clan de Hebrón
  - los descendientes de Hebrón
  lexicon: HALOT
  rationale: Se conserva la designación gentilicia de clan, breve y coherente con el patrón del versículo.
- source_word: לָעָזִּיאֵלִי
  english_pob_choice: and the Uzzielites
  chosen_spanish: y los uzielitas
  alternatives_spanish:
  - y el clan de Uziel
  - y los descendientes de Uziel
  lexicon: HALOT
  rationale: Se mantiene el último miembro de la serie con el mismo tipo de gentilicio; «y» completa naturalmente la lista en español, como en el inglés auditado.
translation_notes:
  revision_awareness: No se registran revisiones textuales en el paquete; la versión inglesa auditada se mantiene estable y la propuesta española sigue de cerca la estructura nominal hebrea con ajuste idiomático mínimo.
  spanish_consistency_notes:
  - Se preserva el patrón de lista de clanes con formas gentilicias uniformes en plural.
  - Se usa minúscula inicial en los nombres de clan por tratarse de gentilicios comunes en esta línea editorial.
  - La nota a pie de página explica la alternativa de traducir la serie como encabezado con «de» en lugar de «para», sin introducir una lectura teológica ajena al texto.
