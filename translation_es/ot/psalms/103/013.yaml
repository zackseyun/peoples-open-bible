translation:
  language: es
  text: Como un padre tiene compasión de sus hijos[a], así Yahvé tiene compasión de los que le temen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como un padre se compadece de sus hijos, así Yahvé se compadece de los que le temen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/רַחֵם
  english_pob_choice: As ... has compassion
  chosen_spanish: Como ... tiene compasión
  alternatives_spanish:
  - Como ... se compadece de
  - Así como ... muestra misericordia a
  lexicon: HALOT
  rationale: El prefijo comparativo כ exige una comparación explícita en español. «Tiene compasión» refleja רחם como compasión tierna y profunda, con tono natural y fiel al paralelismo poético.
- source_word: אָב
  english_pob_choice: a father
  chosen_spanish: un padre
  alternatives_spanish:
  - padre
  lexicon: HALOT
  rationale: El hebreo usa un singular genérico e indefinido; «un padre» conserva el valor proverbial de la comparación sin convertirlo en un padre específico.
- source_word: בָּנִים
  english_pob_choice: his children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos e hijas
  - sus niños
  lexicon: HALOT
  rationale: Aunque la forma es masculina plural, aquí funciona de modo genérico para la descendencia en la imagen padre-hijos. «Hijos» conserva el paralelismo familiar directo; el posesivo se sobreentiende por la relación comparativa.
- source_word: רִחַם
  english_pob_choice: has compassion
  chosen_spanish: tiene compasión
  alternatives_spanish:
  - se compadece
  - muestra compasión
  lexicon: HALOT
  rationale: Se mantiene la repetición del verbo רחם con la misma solución española para preservar el ritmo y el paralelismo del verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». Esto preserva el nombre propio divino, no un sustituto titular.'
- source_word: יְרֵאָיו
  english_pob_choice: those who fear him
  chosen_spanish: los que le temen
  alternatives_spanish:
  - los que le reverencian
  - los reverentes
  lexicon: HALOT
  rationale: El participio describe a personas caracterizadas por temer a Yahvé. «Los que le temen» es la forma más directa y reconocible en español, sin suavizar el matiz reverencial del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto en lugar de sustituirlo por un título. «Yahvé» es la forma española aprobada por el proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del plural masculino בָּנִים en un símil familiar
  english_pob_reading: children
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos e hijas
  - niños
  rationale: El contexto compara la compasión paterna con la divina; el plural masculino aquí funciona de forma genérica. «Hijos» conserva la imagen bíblica sin introducir una ampliación no requerida por el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El texto y las decisiones concuerdan con el control de revisión más reciente: no se requieren cambios frente al pasaje fuente ni frente al audit trail inglés; se mantiene la repetición de רחם y la convención del nombre divino.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el mismo verbo español («tiene compasión») para ambas ocurrencias de רחם, respetando el paralelismo.
  - «Los que le temen» mantiene el referente singular del pronombre en español y la fuerza reverencial del participio hebreo.
  - La nota al pie ofrece la alternativa lexical documentada sin alterar el texto principal.
