revisions:
- from: Y cincuenta hombres de entre los hijos de los profetas fueron y se pararon enfrente, a distancia[a][b][c], mientras los dos de ellos se pararon junto al Jordán.
  to: Y cincuenta hombres de entre los hijos de los profetas[a] fueron y se quedaron de pie frente a ellos, a distancia[b][c], mientras ellos dos se quedaron de pie junto al Jordán.
  rationale: 'La revisión hace el español más natural y preciso sin apartarse del hebreo ni del rastro de auditoría inglés: explicita el complemento de «frente a ellos», reemplaza la construcción poco idiomática «los dos de ellos» por «ellos dos», mejora el registro con «se quedaron de pie», y reordena las notas para que sus marcadores sigan el orden de aparición en el texto.'
