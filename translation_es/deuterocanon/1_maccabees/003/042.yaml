translation:
  language: es
  text: Y Judas y sus hermanos vieron que las calamidades[a] se habían multiplicado, y que las fuerzas[b] estaban acampadas dentro de sus fronteras; y llegaron a saber los decretos[c] del reino, que había mandado ejecutar contra el pueblo para destrucción y aniquilación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las desgracias» o «las aflicciones»; el griego plural puede abarcar adversidades concretas más que maldad moral abstracta.
    reason: lexical_alternative
  - marker: b
    text: O «ejércitos» o «tropas»; aquí δυνάμεις designa fuerzas armadas.
    reason: lexical_alternative
  - marker: c
    text: O «órdenes» o «palabras» del reino; βασιλεία conserva el matiz del poder real o del régimen gobernante, no necesariamente del rey como persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ κακά
  english_pob_choice: the troubles
  chosen_spanish: los males
  alternatives_spanish:
  - las calamidades
  - las desgracias
  - los padecimientos
  lexicon: LSJ
  rationale: El plural neutro con ἐπληθύνθη expresa la acumulación de aflicciones o males concretos en el contexto bélico-político. «Los males» conserva esa amplitud sin reducirlo a maldad moral abstracta; «calamidades» sería posible, pero menos directo respecto de la carga general del término griego.
- source_word: αἱ δυνάμεις
  english_pob_choice: the forces
  chosen_spanish: las fuerzas
  alternatives_spanish:
  - los ejércitos
  - las tropas
  - las fuerzas militares
  lexicon: LSJ
  rationale: Aquí δυνάμεις se refiere a fuerzas armadas. «Las fuerzas» reproduce bien la referencia militar de manera natural en español, sin forzar una especificación que el griego no exige.
- source_word: παρεμβάλλουσιν
  english_pob_choice: were encamped
  chosen_spanish: acampaban
  alternatives_spanish:
  - estaban acampadas
  - habían acampado
  - se hallaban acampadas
  lexicon: LSJ
  rationale: El presente narrativo griego describe el estado de las tropas en campaña. «Acampaban» comunica ese estado continuo y mantiene un tono bíblico claro en español.
- source_word: ἐν τοῖς ὁρίοις αὐτῶν
  english_pob_choice: within their borders
  chosen_spanish: dentro de sus fronteras
  alternatives_spanish:
  - dentro de su territorio
  - en sus fronteras
  - en su territorio
  lexicon: LSJ
  rationale: Ὅρια puede significar fronteras, límites o territorio. Dado el matiz hostil de fuerzas militares situadas allí, «dentro de sus fronteras» preserva tanto el sentido geográfico como la amenaza implícita.
- source_word: ἐπέγνωσαν
  english_pob_choice: learned of
  chosen_spanish: conocieron
  alternatives_spanish:
  - reconocieron
  - llegaron a saber
  - comprendieron
  lexicon: LSJ
  rationale: El verbo puede implicar una aprehensión más plena o constatación. «Conocieron» refleja que llegaron a saber de esos decretos, sin añadir una glosa explicativa excesiva; «reconocieron» podría sonar menos natural con el objeto directo en español.
- source_word: τοὺς λόγους τῆς βασιλείας
  english_pob_choice: the decrees of the kingdom
  chosen_spanish: los decretos del reino
  alternatives_spanish:
  - las palabras del reino
  - las órdenes del reino
  - las disposiciones del reino
  lexicon: LSJ
  rationale: λόγοι aquí funciona como expresiones oficiales, mandatos o decretos; βασιλεία alude al régimen real, no a un reino en sentido teológico. «Los decretos del reino» sigue de cerca el valor administrativo del griego y es idiomático en español.
- source_word: ἐνετείλατο ποιῆσαι
  english_pob_choice: it had commanded to be carried out
  chosen_spanish: había mandado ejecutar
  alternatives_spanish:
  - había ordenado hacer
  - había mandado que se hiciera
  - había ordenado poner por obra
  lexicon: LSJ
  rationale: La construcción expresa un mandato dirigido a la ejecución efectiva. «Había mandado ejecutar» conserva la fuerza imperativa y la idea de realización concreta mejor que un giro demasiado perifrástico.
- source_word: τῷ λαῷ
  english_pob_choice: against the people
  chosen_spanish: contra el pueblo
  alternatives_spanish:
  - al pueblo
  - para el pueblo
  - en perjuicio del pueblo
  lexicon: LSJ
  rationale: Aunque el dativo pudiera parecer literal como «al pueblo», el contexto inmediato de destrucción y aniquilación muestra intención hostil. «Contra el pueblo» hace explícita esa fuerza contextual en español.
- source_word: εἰς ἀπώλειαν καὶ συντέλειαν
  english_pob_choice: for destruction and annihilation
  chosen_spanish: para destrucción y aniquilación
  alternatives_spanish:
  - para ruina y exterminio
  - para perdición y ruina total
  - para destrucción y ruina completa
  lexicon: LSJ
  rationale: La pareja de sustantivos intensifica una devastación total. «Destrucción y aniquilación» reproduce la intensidad del griego y coincide con el registro solemne de la obra.
theological_decisions:
- issue: Valor de βασιλεία en la frase «τοὺς λόγους τῆς βασιλείας»
  english_pob_reading: the decrees of the kingdom
  chosen_spanish_reading: los decretos del reino
  alternative_spanish_readings:
  - los decretos del rey
  - las órdenes del reino
  - las disposiciones reales
  rationale: El griego usa βασιλεία, no un sustantivo personal para «rey». Mantener «reino» respeta la formulación del texto y evita sustituirla por un agente explícito que el griego no nombra. En español, «del reino» resulta natural y conserva el matiz institucional del régimen gobernante.
  doctrine_reference: Translation philosophy §1, §5
- issue: Dirección hostil implícita en τῷ λαῷ
  english_pob_reading: against the people
  chosen_spanish_reading: contra el pueblo
  alternative_spanish_readings:
  - al pueblo
  - para el pueblo
  - en perjuicio del pueblo
  rationale: El dativo por sí solo podría sonar neutral o incluso benéfico en español. El contexto inmediato, unido a «destrucción y aniquilación», obliga a entender una dirección hostil. «Contra el pueblo» hace explícita esa relación sin añadir contenido ajeno al pasaje.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se siguió de cerca el último estado del audit trail inglés, que corrigió «recognized the orders» a «learned of the decrees» para ajustar mejor τοὺς λόγους τῆς βασιλείας. La redacción española toma esa lectura madura y mantiene la tensión entre λόγοι como mandatos/decretos y βασιλεία como poder real institucional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el texto no contiene el nombre divino.
  - Se eligió «Mesías/Cristo» no aplica aquí; se evita cualquier terminología cristológica ajena al pasaje.
  - «Los males» conserva el plural adversativo de τὰ κακά sin moralizarlo.
  - «Contra el pueblo» refleja la intención hostil implícita en el contexto de destrucción.
  - «Destrucción y aniquilación» preserva la intensificación final del griego sin suavizarla.
