translation:
  language: es
  text: Y Hamán les contó la gloria de su riqueza[a], y la multitud de sus hijos[b], y todo lo que el rey había hecho para engrandecerlo[c], y cómo lo había exaltado[d] por encima de los oficiales y de los servidores del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el esplendor de sus riquezas». La frase hebrea enfatiza la magnificencia impresionante asociada con la riqueza de Hamán.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus muchos hijos». El hebreo dice específicamente «hijos», no el término más general «hijos e hijas» o «descendientes».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «todo lo que el rey había hecho para promoverlo». El verbo hebreo también puede expresar la idea de promoción o elevación.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «lo había levantado por encima» o «lo había alzado sobre» los oficiales y servidores del rey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפֵּר
  english_pob_choice: told
  chosen_spanish: contó
  alternatives_spanish:
  - relató
  - dijo
  lexicon: HALOT
  rationale: El wayyiqtol de ספר introduce el relato ostentoso de Haman; «contó» conserva el sentido narrativo sin sonar demasiado formal en español.
- source_word: כְּבוֹד עָשְׁרוֹ
  english_pob_choice: the glory of his wealth
  chosen_spanish: la gloria de su riqueza
  alternatives_spanish:
  - el esplendor de sus riquezas
  - la magnificencia de sus riquezas
  lexicon: HALOT
  rationale: כָּבוֹד puede expresar gloria, honor o esplendor; con «riqueza» se conserva la fuerza de una riqueza exhibida con brillo o prestigio, manteniendo cercanía al hebreo.
- source_word: רֹב בָּנָיו
  english_pob_choice: the multitude of his sons
  chosen_spanish: la multitud de sus hijos
  alternatives_spanish:
  - la abundancia de sus hijos
  - sus muchos hijos
  lexicon: HALOT
  rationale: רֹב comunica abundancia o multitud, y בָּנִים es específicamente «hijos/varones». En español, «hijos» puede abarcar el referente masculino en una fórmula de descendencia, pero se mantiene la idea de pluralidad abundante.
- source_word: גִּדְּלוֹ
  english_pob_choice: had done to make him great
  chosen_spanish: para engrandecerlo
  alternatives_spanish:
  - para promoverlo
  - para hacerlo grande
  lexicon: HALOT
  rationale: 'El pi‘el de גדל aquí tiene sentido causativo: hacer grande, promover, elevar. «Engrandecerlo» preserva esa fuerza verbal en una forma natural en español.'
- source_word: נִשְּׂאוֹ עַל
  english_pob_choice: had exalted him above
  chosen_spanish: lo había exaltado por encima
  alternatives_spanish:
  - lo había levantado por encima
  - lo había alzado sobre
  lexicon: HALOT
  rationale: נשא con עַל expresa elevación en rango o posición. «Exaltado por encima» conserva la relación jerárquica señalada por el hebreo y por la lectura inglesa.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los dignatarios
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar gobernantes, oficiales o príncipes. En el contexto persa, «oficiales» es la opción más clara y menos interpretativamente cargada.
- source_word: עַבְדֵי הַמֶּלֶךְ
  english_pob_choice: servants of the king
  chosen_spanish: los servidores del rey
  alternatives_spanish:
  - los siervos del rey
  - los sirvientes del rey
  lexicon: HALOT
  rationale: עֲבָדִים aquí alude al personal cortesano del rey. «Servidores» suena digno y natural en español, sin forzar el término «esclavos» en un contexto institucional de corte.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios aplicados; la redacción española sigue de cerca la lectura hebrea y el trazado auditado en inglés.'
  spanish_consistency_notes:
  - 'Se mantiene el orden retórico del verso: riqueza, hijos, acción del rey y elevación sobre otros.'
  - Se evita «SEÑOR» o terminología litúrgica ajena al hebreo de este versículo.
  - Se conserva la distinción entre «oficiales» y «servidores» para reflejar dos grupos cortesanos diferentes.
  - La frase verbal «engrandecerlo» conserva la fuerza causativa de גדל sin sobrerrepresentarla.
