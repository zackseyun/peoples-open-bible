    issue: '''el herido'' para חָלָל'
    rationale: Aunque el singular hebreo puede ser colectivo, en español 'gemirá el herido' suena individual y menos idiomático. 'Los heridos' comunica mejor el referente colectivo y encaja naturalmente con 'gemirán'.
  - severity: low
    issue: Puntuación y fluidez alrededor de 'he aquí'
    rationale: '''Por tanto, he aquí, vienen días'' es comprensible pero algo trabado en español. ''Por tanto, he aquí que vienen días'' conserva el tono profético con mejor fluidez.'
