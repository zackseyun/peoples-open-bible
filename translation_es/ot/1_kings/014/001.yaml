translation:
  language: es
  text: En aquel tiempo, Abías, hijo de Jeroboam, enfermó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Por aquel tiempo
  lexicon: HALOT
  rationale: La expresión hebrea marca un encabezado temporal narrativo. "En aquel tiempo" conserva ese valor de marco histórico de manera natural en español y corresponde bien al inglés auditable "At that time".
- source_word: חָלָה
  english_pob_choice: became sick
  chosen_spanish: enfermó
  alternatives_spanish:
  - cayó enfermo
  - se enfermó
  lexicon: HALOT
  rationale: El verbo hebreo expresa el inicio de la enfermedad. "Enfermó" comunica ese cambio de estado con concisión y sin perder la progresión narrativa que el inglés POB captó con "became sick".
- source_word: אֲבִיָּה
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abías
  lexicon: convención onomástica bíblica
  rationale: En español bíblico, el nombre se vierte comúnmente como "Abías". Se mantiene la forma tradicional y reconocible para lectores hispanos, sin alterar la identidad del personaje.
- source_word: בֶן יָרָבְעָם
  english_pob_choice: son of Jeroboam
  chosen_spanish: hijo de Jeroboam
  alternatives_spanish:
  - hijo de Jeroboam
  - Jeroboam, su hijo
  lexicon: HALOT
  rationale: La cadena constructa se expresa de modo directo como "hijo de Jeroboam". Conserva la relación familiar explícita del hebreo y es idiomática en español.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada están en acuerdo alto; no se documentan variantes textuales ni revisiones sustantivas que obliguen a una nota adicional.
