translation:
  language: es
  text: Pues por la grandeza y la belleza de las cosas creadas[a], se percibe por analogía a su Creador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su Creador es percibido proporcionalmente» o «el Creador de ellas se discierne correspondientemente». El adverbio griego expresa la idea de una inferencia que corresponde debidamente a las cualidades de las cosas creadas y conduce a su Creador.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: a partir de
  alternatives_spanish:
  - desde
  - por
  lexicon: BDAG
  rationale: Expresa bien la idea de base o punto de partida desde el cual se llega al conocimiento del Creador, sin sonar mecánico en español.
- source_word: μεγέθους
  english_pob_choice: greatness
  chosen_spanish: grandeza
  alternatives_spanish:
  - magnitud
  - tamaño
  lexicon: LSJ
  rationale: «Grandeza» comunica mejor la amplitud y elevación de sentido que solo un tamaño físico.
- source_word: καλλονῆς
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - esplendor
  - hermosura
  lexicon: LSJ
  rationale: Es la equivalencia más directa y natural para el rasgo estético del texto griego.
- source_word: κτισμάτων
  english_pob_choice: created things
  chosen_spanish: las cosas creadas
  alternatives_spanish:
  - las criaturas
  - la creación
  - las cosas hechas
  lexicon: LSJ
  rationale: Mantiene el plural y el sentido de productos de la creación sin restringirlo a seres vivos.
- source_word: ἀναλόγως
  english_pob_choice: by analogy
  chosen_spanish: por analogía
  alternatives_spanish:
  - de manera proporcionada
  - correspondientemente
  lexicon: LSJ
  rationale: Conserva el matiz inferencial y proporcional del adverbio griego, en una forma clara para el lector español.
- source_word: ὁ γενεσιουργὸς αὐτῶν
  english_pob_choice: their Creator
  chosen_spanish: su Creador
  alternatives_spanish:
  - el Creador de ellas
  - su Hacedor
  - su Originador
  lexicon: LSJ
  rationale: «Creador» corresponde de cerca a γενεσιουργός y encaja con «cosas creadas»; el posesivo singular en español recoge el valor de αὐτῶν sin forzar el género.
- source_word: θεωρεῖται
  english_pob_choice: is seen
  chosen_spanish: es visto
  alternatives_spanish:
  - es percibido
  - se discierne
  - se contempla
  lexicon: BDAG
  rationale: «Es visto» conserva la pasiva y la simplicidad del griego; el contexto y «por analogía» aportan la inferencia intelectual.
theological_decisions:
- issue: Revelación natural e inferencia desde la creación
  english_pob_reading: their Creator is seen by analogy
  chosen_spanish_reading: su Creador es visto por analogía
  alternative_spanish_readings:
  - su Creador es percibido proporcionalmente
  - el Creador de ellas se discierne correspondientemente
  rationale: La frase preserva la afirmación de que el Creador puede ser conocido a partir de las obras creadas, sin ampliar innecesariamente el alcance doctrinal del versículo.
  doctrine_reference: revelación natural
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «Maker» a «Creator» para ajustar mejor γενεσιουργός a κτισμάτων. La redacción española sigue esa revisión y mantiene el vínculo entre «cosas creadas» y «su Creador», conservando además el matiz inferencial de ἀναλόγως mediante «por analogía».
  spanish_consistency_notes:
  - Se evitó «Señor» porque el texto no usa κύριος ni el nombre divino.
  - Se mantuvo «Creador» en coherencia con la revisión inglesa final y con el valor de γενεσιουργός.
  - «Cosas creadas» preserva el plural de κτισμάτων y no restringe el alcance a seres animados.
