translation:
  language: es
  text: Alzó sus ojos y miró[a], y he aquí, tres hombres estaban de pie cerca de él. Cuando los vio, corrió desde la entrada de la tienda a su encuentro y se postró[b] hasta el suelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaban de pie junto a él»; la preposición hebrea puede indicar proximidad estrecha.
    reason: lexical_alternative
  - marker: b
    text: O «se inclinó hasta el suelo». El verbo describe un gesto de profundo respeto y no exige por sí mismo el sentido de «adoró».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂא עֵינָיו
  english_pob_choice: He lifted up his eyes
  chosen_spanish: Alzó sus ojos
  alternatives_spanish:
  - Levantó sus ojos
  - Miró hacia arriba
  lexicon: HALOT
  rationale: Conserva el giro idiomático hebreo sin sonar forzado en español. «Alzó sus ojos» mantiene la imagen verbal de elevación y corresponde al matiz formal que el POB inglés preserva.
- source_word: וַיַּרְא
  english_pob_choice: and looked
  chosen_spanish: y miró
  alternatives_spanish:
  - y vio
  - y observó
  lexicon: HALOT
  rationale: Aquí el movimiento narrativo se apoya en la percepción visual inmediata tras «alzó sus ojos». «Miró» evita una repetición rígida de «vio» y reproduce bien la atención visual del hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y he aquí que
  - y de pronto
  lexicon: HALOT
  rationale: «He aquí» conserva la fuerza presentativa del marcador discursivo hebreo mejor que una simple coordinación explicativa. Es una fórmula digna y reconocible en español bíblico moderno.
- source_word: שְׁלֹשָׁה אֲנָשִׁים
  english_pob_choice: three men
  chosen_spanish: tres hombres
  alternatives_spanish:
  - tres varones
  - tres personas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hombres». «Hombres» es exacto y mantiene la presentación narrativa sin neutralizar el género del sustantivo fuente.
- source_word: נִצָּבִים עָלָיו
  english_pob_choice: were standing near him
  chosen_spanish: estaban de pie cerca de él
  alternatives_spanish:
  - estaban junto a él
  - estaban de pie junto a él
  - estaban parados cerca de él
  lexicon: HALOT
  rationale: La expresión puede indicar proximidad. «De pie cerca de él» preserva tanto la postura como la cercanía sin imponer «sobre él», que en español sugeriría una posición física demasiado dominante.
- source_word: וַיַּרְא
  english_pob_choice: When he saw them
  chosen_spanish: Cuando los vio
  alternatives_spanish:
  - Y al verlos
  - Cuando se dio cuenta de ellos
  lexicon: HALOT
  rationale: La segunda ocurrencia avanza la acción hacia la respuesta de Abraham. «Cuando los vio» es natural, mantiene la relación temporal y evita duplicar innecesariamente la primera percepción visual.
- source_word: וַיָּרָץ לִקְרָאתָם
  english_pob_choice: he ran ... to meet them
  chosen_spanish: corrió ... para encontrarlos
  alternatives_spanish:
  - corrió al encuentro de ellos
  - se apresuró a encontrarlos
  lexicon: HALOT
  rationale: «Corrió» conserva el verbo concreto del hebreo. «Para encontrarlos» comunica el movimiento de encuentro; otra opción más literal, «al encuentro de ellos», suena menos natural en español, pero se mantiene como alternativa implícita en la nota textual.
- source_word: מִפֶּתַח הָאֹהֶל
  english_pob_choice: from the entrance of the tent
  chosen_spanish: desde la entrada de la tienda
  alternatives_spanish:
  - desde la puerta de la tienda
  - desde el umbral de la tienda
  lexicon: HALOT
  rationale: «Tienda» refleja con naturalidad אֹהֶל y es el equivalente más directo en español. «Entrada» reproduce bien מִפֶּתַח sin estrecharlo a una puerta física.
- source_word: וַיִּשְׁתַּחוּ אָרְצָה
  english_pob_choice: bowed down to the ground
  chosen_spanish: se inclinó hasta el suelo
  alternatives_spanish:
  - se postró hasta el suelo
  - se prosternó hasta el suelo
  - adoró
  lexicon: HALOT
  rationale: El verbo describe una reverencia/prostración, no necesariamente adoración. «Se inclinó hasta el suelo» preserva el gesto corporal y evita resolver de antemano la cuestión interpretativa que el contexto todavía mantiene abierta.
theological_decisions:
- issue: Si la reverencia de Abraham debe traducirse como adoración religiosa
  english_pob_reading: Rendered as 'bowed down to the ground' rather than 'worshiped'
  chosen_spanish_reading: se inclinó hasta el suelo
  alternative_spanish_readings:
  - se postró hasta el suelo
  - adoró
  rationale: El hebreo permite tanto una reverencia ante seres humanos como un acto dirigido a Dios. En este versículo inmediato aparecen «tres hombres», por lo que traducir «adoró» resolvería prematuramente una tensión interpretativa que el texto no explicita todavía. La versión española conserva esa tensión.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción española sigue el último estado del POB inglés sin cambios revisados posteriores; el pasaje fue confirmado en alta concordancia y no requirió modificaciones de la última pasada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se preserva la distinción entre «miró/vio» para reflejar el doble movimiento visual del hebreo.
  - «Tienda» y no «tabernáculo» evita introducir un término técnico no presente en el contexto patriarcal.
  - La nota sobre la reverencia conserva la tensión teológica entre respeto humano y posible adoración sin resolverla en la traducción principal.
