translation:
  language: es
  text: Pero si de veras los anula después de haberlos oído, entonces llevará su culpa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Llevará su culpa» también puede entenderse como «cargará con la responsabilidad por su iniquidad» o «llevará el castigo por su culpa».
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La conjunción aquí introduce un contraste condicional respecto al verso anterior; «Pero si» conserva ese matiz adversativo de manera natural en español.
- source_word: הָפֵר יָפֵר
  english_pob_choice: indeed nullifies
  chosen_spanish: de veras los anula
  alternatives_spanish:
  - ciertamente los anula
  - los anula por completo
  - los rompe
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito expresa énfasis. «De veras» mantiene la fuerza intensiva sin volver la frase pesada; «anula» conserva el marco jurídico de votos o compromisos.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - esas cosas
  lexicon: HALOT
  rationale: El pronombre plural retoma los votos o compromisos mencionados en el contexto inmediato; «los» es la referencia más natural en español.
- source_word: אַחֲרֵי שָׁמְעוֹ
  english_pob_choice: after he has heard them
  chosen_spanish: después de haberlos escuchado
  alternatives_spanish:
  - después de oírlos
  - luego de haberlos oído
  lexicon: HALOT
  rationale: El hebreo indica posterioridad respecto al acto de oír. En español, «haberlos escuchado» comunica esa anterioridad y resulta fluido sin perder el valor temporal.
- source_word: וְנָשָׂא
  english_pob_choice: then he shall bear
  chosen_spanish: entonces llevará
  alternatives_spanish:
  - y llevará
  - entonces cargará con
  lexicon: HALOT
  rationale: En este contexto jurídico-moral, נשׂא עוון expresa asumir culpa o responsabilidad. «Llevará» conserva el verbo básico y su posible carga idiomática.
- source_word: עֲוֺנָהּ
  english_pob_choice: her guilt
  chosen_spanish: su culpa
  alternatives_spanish:
  - su iniquidad
  - la culpa de ella
  - su responsabilidad por la culpa
  lexicon: HALOT
  rationale: «Culpa» comunica bien la carga legal y moral del hebreo sin sonar arcaico. Se mantiene la tensión de si se trata de culpa, responsabilidad o consecuencia, como deja abierto el POB inglés.
theological_decisions:
- issue: Sentido de «llevar culpa» en un contexto legal
  english_pob_reading: The husband assumes liability for the wrong involved in belatedly annulling her vows.
  chosen_spanish_reading: El esposo asume la responsabilidad/culpa ligada a anular tardíamente sus votos.
  alternative_spanish_readings:
  - Él carga con el castigo por la culpa de ella.
  - Él asume la pena por la anulación tardía.
  rationale: El idioma hebreo puede abarcar culpa, responsabilidad o consecuencia penal. La versión española conserva esa amplitud con «llevará su culpa», sin cerrar indebidamente el mecanismo exacto de la retribución.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla de manera especulativa.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB en inglés, especialmente el ajuste de «heard of them» a «heard them», reflejado aquí como «haberlos escuchado». También conserva el énfasis del infinitivo absoluto con un intensificador natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto, aunque este versículo no lo contenga.
  - Se usa «anula» en contexto jurídico para no diluir la fuerza legal de הָפֵר יָפֵר.
  - Se prefiere «culpa» frente a «iniquidad» por claridad contemporánea, sin perder la posibilidad de responsabilidad o castigo implícitos.
