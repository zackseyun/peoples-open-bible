translation:
  language: es
  text: 'Y sucedió que, cuando lo oyeron los babilonios, se indignaron y se reunieron contra el rey, y dijeron: «El rey se ha hecho judío[a]; ha derribado a Bel y ha matado al dragón, y ha masacrado a los sacerdotes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rey se ha hecho judeano». El griego Ἰουδαῖος puede denotar tanto la identidad étnico-religiosa («judío») como la identidad geopolítica («judeano»).
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἐγένετο ὡς ἤκουσαν
  english_pob_choice: it happened that when ... heard
  chosen_spanish: Y sucedió que, cuando lo oyeron
  alternatives_spanish:
  - Y aconteció que, cuando lo oyeron
  - Y pasó que, cuando lo oyeron
  lexicon: BDAG
  rationale: La fórmula narrativa καὶ ἐγένετο ὡς se conserva bien en español con «Y sucedió que, cuando…», que mantiene el tono semítico del relato sin sonar excesivamente literal o arcaizante.
- source_word: οἱ Βαβυλώνιοι
  english_pob_choice: the Babylonians
  chosen_spanish: los babilonios
  alternatives_spanish:
  - la gente de Babilonia
  - los habitantes de Babilonia
  lexicon: BDAG
  rationale: Es una designación étnica/cívica directa; «los babilonios» es la equivalencia natural y conserva el referente colectivo del original.
- source_word: ἠγανάκτησαν
  english_pob_choice: became indignant
  chosen_spanish: se indignaron
  alternatives_spanish:
  - se enojaron
  - se enfurecieron
  lexicon: BDAG
  rationale: El verbo expresa fuerte disgusto o indignación. «Se indignaron» mantiene esa fuerza con registro digno y evita intensificar más de lo que el griego exige.
- source_word: συνεστράφησαν ἐπὶ τὸν βασιλέα
  english_pob_choice: gathered together against the king
  chosen_spanish: se reunieron contra el rey
  alternatives_spanish:
  - se volvieron contra el rey
  - se juntaron contra el rey
  lexicon: BDAG
  rationale: La forma media/pasiva con ἐπί sugiere un alineamiento colectivo contra el rey. «Se reunieron contra» conserva el sentido de agrupación hostil sin añadir la idea específica de conspiración secreta.
- source_word: Ἰουδαῖος γέγονεν ὁ βασιλεύς
  english_pob_choice: The king has become a Jew
  chosen_spanish: El rey se ha hecho judío
  alternatives_spanish:
  - El rey se ha hecho judeano
  - El rey se ha vuelto judío
  lexicon: BDAG
  rationale: «Judío» comunica con claridad la carga etnorreligiosa de Ἰουδαῖος en este contexto narrativo. «Se ha hecho» sigue el valor resultativo de γέγονεν sin forzar un cambio ontológico más fuerte que el original.
- source_word: τὸν Βὴλ κατέσπασενν
  english_pob_choice: he has torn down Bel
  chosen_spanish: ha derribado a Bel
  alternatives_spanish:
  - ha derribado a Bel
  - ha destruido a Bel
  - ha derribado el ídolo Bel
  lexicon: BDAG
  rationale: κατασπάω expresa derribar o bajar por la fuerza. «Ha derribado a Bel» conserva el verbo de demolición; el objeto directo con «a» sigue el uso español cuando se personifica al ídolo nombrado.
- source_word: τὸν δράκοντα ἀπέκτεινεν
  english_pob_choice: killed the dragon
  chosen_spanish: ha matado al dragón
  alternatives_spanish:
  - ha dado muerte al dragón
  - ha matado al monstruo
  lexicon: BDAG
  rationale: «Ha matado al dragón» es claro y directo. «Dragón» mantiene el referente literario del griego sin suavizarlo ni reinterpretarlo como una criatura distinta.
- source_word: τοὺς ἱερεῖς κατέσφαξεν
  english_pob_choice: slaughtered the priests
  chosen_spanish: ha degollado a los sacerdotes
  alternatives_spanish:
  - ha matado a los sacerdotes
  - ha sacrificado a los sacerdotes
  lexicon: BDAG
  rationale: κατασφάζω es más fuerte que simplemente matar e implica matanza violenta. «Ha degollado» preserva esa violencia con un equivalente español igualmente fuerte; se prefiere «sacerdotes» para el término culto del original.
theological_decisions:
- issue: Ambigüedad de Ἰουδαῖος
  english_pob_reading: Jew
  chosen_spanish_reading: judío
  alternative_spanish_readings:
  - judeano
  - judío/judeano
  rationale: El POB inglés documenta la alternativa «Judean». En español, «judío» es la lectura más natural y comunicativa; la alternativa se preserva en nota para no perder la ambigüedad etnorreligiosa/geopolítica del término griego.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve ambiguity with documented alternative where relevant'
- issue: Fuerza violenta de κατέσφαξεν
  english_pob_reading: slaughtered the priests
  chosen_spanish_reading: ha degollado a los sacerdotes
  alternative_spanish_readings:
  - ha matado a los sacerdotes
  - ha masacrado a los sacerdotes
  rationale: El griego transmite una acción violenta y masiva. «Degollado» conserva la crudeza mejor que «matado» y evita una generalización excesiva como «masacrado», que puede sonar más interpretativa.
  doctrine_reference: 'DOCTRINE.md: preserve lexical force; do not erase documented tension or intensity'
translation_notes:
  revision_awareness: Se revisó la formulación a partir del texto griego normalizado y del audit trail inglés. La redacción española conserva la estructura narrativa y la intensidad léxica, sin introducir una paráfrasis más fuerte que la fuente. No hubo cambios requeridos por la revisión más reciente, que permaneció sin modificaciones.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera del versículo porque no aparece ningún nombre divino en el texto.
  - Se conservó el registro narrativo solemne con verbos perfectivos («sucedió», «se indignaron», «se reunieron», «ha derribado», «ha matado», «ha degollado»).
  - Se eligió «sacerdotes» en lugar de «curas» u otra equivalencia moderna por fidelidad al contexto cultual del relato.
  - Se usó el artículo y la preposición personal en «al dragón» y «a Bel» conforme al español estándar, sin alterar el valor del objeto directo personificado.
