translation:
  language: es
  text: Y ahora[a], celebren los días de la Fiesta de las Enramadas[b] en el mes de Kislev[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kislev corresponde aproximadamente a noviembre–diciembre en el calendario judío.
    reason: cultural_note
  - marker: b
    text: O, más tradicionalmente, «Fiesta de los Tabernáculos».
    reason: lexical_alternative
  - marker: c
    text: Kislev corresponde aproximadamente a noviembre–diciembre en el calendario judío.
    reason: cultural_note
lexical_decisions:
- source_word: ἄγητε
  english_pob_choice: celebrate
  chosen_spanish: celebren
  alternatives_spanish:
  - observen
  - guarden
  - lleven a cabo
  lexicon: LSJ
  rationale: El verbo ἄγω, con ἡμέρας en este contexto festivo, expresa la idea de celebrar o observar días festivos, no de «conducir» literalmente. «Celebren» conserva el valor idiomático y suena natural en español bíblico moderno.
- source_word: τὰς ἡμέρας
  english_pob_choice: the days
  chosen_spanish: los días
  alternatives_spanish:
  - los días festivos
  - esas fechas
  lexicon: LSJ
  rationale: La expresión griega se mantiene de forma directa. En español, «los días» funciona bien con el verbo imperativo y conserva el foco temporal de la orden.
- source_word: τῆς σκηνοπηγίας
  english_pob_choice: Festival of Booths
  chosen_spanish: Fiesta de las Cabañas
  alternatives_spanish:
  - Fiesta de los Tabernáculos
  - Fiesta de las Tiendas
  lexicon: LSJ
  rationale: σκηνοπηγία designa la fiesta judía de las cabañas/tabernáculos. «Fiesta de las Cabañas» comunica el sentido de manera transparente en español, sin depender de una fórmula litúrgica menos transparente. Se preserva la identidad histórica de la festividad.
- source_word: τοῦ Χασελεὺ μηνός
  english_pob_choice: in the month of Chislev
  chosen_spanish: en el mes de Quisleu
  alternatives_spanish:
  - en el mes de Kislev
  - en el mes de Chislev
  lexicon: LSJ
  rationale: El nombre del mes se adapta a una transliteración española natural. «Quisleu» refleja con claridad el mes del calendario judío y mantiene la referencia cultural del original griego.
theological_decisions:
- issue: Nombre de la festividad judía σκηνοπηγία
  english_pob_reading: Festival of Booths
  chosen_spanish_reading: Fiesta de las Cabañas
  alternative_spanish_readings:
  - Fiesta de los Tabernáculos
  rationale: La decisión prioriza la transparencia semántica para lectores hispanohablantes. No se pierde la referencia a la fiesta judía conocida, pero se evita una traducción opaca o excesivamente tradicional cuando el sentido literal es accesible.
  doctrine_reference: 'DOCTRINE.md: traducir títulos y nombres según su sentido cuando eso mejora la claridad sin borrar la referencia histórica o religiosa.'
translation_notes:
  revision_awareness: 'Se corrigió la relación entre el texto español y las notas: ahora los marcadores [a] y [b] aparecen exactamente en el lugar correspondiente dentro de la traducción.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando calcos innecesarios.
  - Se prefirió «Quisleu» como adaptación española consistente con el nombre del mes, en lugar de dejar la transliteración griega sin ajustar.
  - La orden verbal en plural formal («celebren») refleja el imperativo dirigido a una comunidad.
  - La referencia a la fiesta conserva su identidad judía y su sentido literal, sin sustituirla por una frase litúrgica más cerrada.
