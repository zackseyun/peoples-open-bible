revisions:
- from: Entre los muertos, le hicieron una cama a ella con toda su multitud; sus tumbas están alrededor de ella. Todos ellos son incircuncisos, muertos a espada, porque su terror fue puesto en la tierra de los vivientes. Así llevaron su deshonra con los que descienden al pozo; ella fue puesta entre los muertos.
  to: Entre los caídos le prepararon un lecho, con toda su multitud[a]; sus tumbas están alrededor de ella[b]. Todos ellos son incircuncisos, caídos a espada, porque su terror fue puesto en la tierra de los vivientes.[c] Así llevaron su deshonra con los que descienden a la fosa; ella fue puesta entre los caídos[d].
  rationale: Se revisa para reflejar mejor חֲלָלִים con 'caídos', mejorar la naturalidad de la imagen funeraria con 'lecho', usar 'fosa' como imagen más idiomática en este contexto, y sobre todo preservar en notas las ambigüedades documentadas del hebreo y del POB inglés, especialmente el cambio de género y la alternativa final masculina.
  reviewer_model: gpt-5.4
