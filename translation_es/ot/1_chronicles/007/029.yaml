translation:
  language: es
  text: Y junto al territorio de los hijos de Manasés estaban Bet-seán[a] y sus ciudades hijas, Taanac y sus ciudades hijas, Meguido y sus ciudades hijas, Dor y sus ciudades hijas[b]. En ellas habitaron los hijos de José, hijo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Betsán». El hebreo nombra aquí la ciudad con una forma que puede transliterarse de más de una manera en español.
    reason: lexical_alternative
  - marker: b
    text: O «al lado de los hijos de Manasés». El hebreo עַל יְדֵי puede traducirse de manera más literal como cercanía territorial o borde; aquí se entiende como referencia al territorio contiguo de los hijos de Manasés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יְדֵי
  english_pob_choice: along the borders of
  chosen_spanish: a los lados de
  alternatives_spanish:
  - junto a
  - al lado de
  - a lo largo de los límites de
  lexicon: HALOT
  rationale: El hebreo idiomático aquí indica cercanía territorial o borde, no la mano literal. «A los lados de» conserva la idea espacial y suena natural en español sin perder el sentido geográfico.
- source_word: בְנֵי מְנַשֶּׁה
  english_pob_choice: the sons of Manasseh
  chosen_spanish: los hijos de Manasés
  alternatives_spanish:
  - los descendientes de Manasés
  - el pueblo de Manasés
  lexicon: HALOT
  rationale: Se mantiene el lenguaje genealógico del hebreo, apropiado para este contexto tribal-territorial. «Hijos» refleja bien el paralelo con la formulación fuente.
- source_word: בֵּית שְׁאָן
  english_pob_choice: Beth-shean
  chosen_spanish: Bet-seán
  alternatives_spanish:
  - Bet-sán
  - Betsán
  lexicon: HALOT
  rationale: Se conserva la transliteración estándar del nombre propio, en una forma usual en español bíblico moderno.
- source_word: וּבְנֹתֶיהָ / וּבְנוֹתֶיהָ
  english_pob_choice: and its daughter towns
  chosen_spanish: y sus ciudades hijas
  alternatives_spanish:
  - y sus aldeas hijas
  - y sus pueblos dependientes
  - y sus aldeas
  lexicon: HALOT
  rationale: «Ciudades hijas» preserva la metáfora hebrea de asentamientos dependientes de una ciudad principal. En español resulta comprensible y mantiene la fuerza lexical de «hijas» sin reemplazarla por un término más interpretativo como «aldeas».
- source_word: תַּעְנַךְ
  english_pob_choice: Taanach
  chosen_spanish: Taanac
  alternatives_spanish:
  - Taánac
  - Ta'anac
  lexicon: HALOT
  rationale: Se adapta el nombre propio a una transliteración española fluida y reconocible.
- source_word: מְגִדּוֹ
  english_pob_choice: Megiddo
  chosen_spanish: Meguido
  alternatives_spanish:
  - Megido
  - Meguido
  lexicon: HALOT
  rationale: Se usa una forma española natural del topónimo, manteniendo la identificación geográfica.
- source_word: דּוֹר
  english_pob_choice: Dor
  chosen_spanish: Dor
  alternatives_spanish:
  - Dór
  lexicon: HALOT
  rationale: Se conserva el nombre propio sin cambios, por ser ya una forma válida y clara en español.
- source_word: בְּאֵלֶּה
  english_pob_choice: In these
  chosen_spanish: En ellas
  alternatives_spanish:
  - En estos lugares
  - En estas
  lexicon: HALOT
  rationale: El antecedente inmediato son las ciudades y sus asentamientos. «En ellas» mantiene la referencia anafórica natural en español.
- source_word: יָשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - moraron
  - se establecieron
  lexicon: HALOT
  rationale: «Habitaron» conserva el sentido de residencia estable del verbo hebreo en un contexto de asentamiento, con un registro bíblico sobrio y claro.
- source_word: בְנֵי יוֹסֵף
  english_pob_choice: the sons of Joseph
  chosen_spanish: los hijos de José
  alternatives_spanish:
  - los descendientes de José
  lexicon: HALOT
  rationale: Se mantiene la expresión genealógica directa del hebreo, coherente con el contexto tribal.
- source_word: בֶן יִשְׂרָאֵל
  english_pob_choice: son of Israel
  chosen_spanish: hijo de Israel
  alternatives_spanish:
  - descendiente de Israel
  lexicon: HALOT
  rationale: La apposición se conserva literalmente para reflejar la identificación de José dentro de la línea de Israel. «Hijo» reproduce el paralelismo del texto fuente.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una lectura territorial de עַל יְדֵי, traduce בנותיה como 'daughter towns' y usa una solución de ubicación territorial con nota alternativa. La versión española sigue esa misma interpretación base, conservando la metáfora de 'ciudades hijas' y la referencia geográfica de 'a los lados de'. No se detectaron revisiones posteriores que alteren el sentido.
  spanish_consistency_notes:
  - Se mantiene «hijos de» para los grupos tribales y genealógicos, en continuidad con el patrón del versículo.
  - Se preserva la metáfora de «ciudades hijas» por ser una expresión semítica con valor territorial, no una simple paráfrasis.
  - «Habitaron» se eligió por su equilibrio entre fidelidad y naturalidad en español bíblico moderno.
  - Los nombres propios se transliteran de forma habitual en español, con una nota para la variante de Bet-seán.
