lexical_decisions:
- source_word: לָמָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué motivo
  - ¿A causa de qué
  lexicon: HALOT
  rationale: El adverbio interrogativo expresa la queja directa del salmista. «¿Por qué» conserva esa fuerza lamento-interrogativa en español natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino, no un título. «Yahvé» sigue la convención del proyecto para יְהוָה y preserva el nombre personal del pacto.
- source_word: תַּעֲמֹד
  english_pob_choice: do you stand
  chosen_spanish: te mantienes
  alternatives_spanish:
  - estás de pie
  - permanece(s)
  - te quedas
  lexicon: HALOT
  rationale: El hebreo literalmente dice «estar de pie», pero en español «te mantienes» comunica la imagen de permanencia espacial/relacional sin sonar forzado.
- source_word: בְּרָחוֹק
  english_pob_choice: far away
  chosen_spanish: lejos
  alternatives_spanish:
  - a distancia
  - muy lejos
  lexicon: HALOT
  rationale: El adverbio de distancia se vierte de forma breve y natural. «Lejos» conserva la metáfora espacial de separación sentida.
- source_word: תַּעְלִים
  english_pob_choice: do you hide yourself
  chosen_spanish: te ocultas
  alternatives_spanish:
  - te escondes
  - te mantienes oculto
  - te encubres
  lexicon: HALOT
  rationale: El hiphil transmite la idea de hacerse/causar ocultamiento. «Te ocultas» es idiomático y mantiene el reclamo de ocultamiento divino.
- source_word: לְעִתּוֹת
  english_pob_choice: in times of
  chosen_spanish: en tiempos de
  alternatives_spanish:
  - en momentos de
  - en las horas de
  lexicon: HALOT
  rationale: El plural con ל funciona temporalmente. «En tiempos de» reproduce bien la estructura adverbial y el tono poético.
- source_word: בַּצָּרָה
  english_pob_choice: trouble
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  - apuro
  lexicon: HALOT
  rationale: צָרָה abarca angustia, distress y adversidad. «Angustia» conserva el peso afectivo del lamento y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: Se mantiene el principio POB de no ocultar el nombre del pacto con una sustitución titulada. En español, «Yahvé» es la forma estable y lectura pública más reconocible dentro de la convención del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Repetición explícita de la pregunta en el segundo hemistiquio
  english_pob_reading: Why do you hide yourself in times of trouble?
  chosen_spanish_reading: ¿Por qué te ocultas en tiempos de angustia?
  alternative_spanish_readings:
  - Te ocultas en tiempos de angustia.
  - ¿Por qué te ocultas en tiempos de angustia?
  rationale: Aunque el hebreo no repite לָמָה en el segundo cola, la paralelística del lamento lo presupone. En español conviene repetir la interrogación para conservar la fuerza poética y la estructura del original.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — optimal equivalence; preserve source sense over translation tradition'
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia y ningún cambio necesario; se conserva la decisión auditada de mantener dos preguntas explícitas y de traducir el nombre divino con la forma del proyecto en español.
  spanish_consistency_notes:
  - Se mantiene la terminología del proyecto para יְהוָה como «Yahvé».
  - Se conserva el paralelismo interrogativo del versículo con dos preguntas explícitas.
  - «Angustia» se usa aquí como equivalente amplio de צָרָה, sin restringirlo a una sola acepción.
  - El tono es poético y público, evitando calcos excesivamente literales como «estás de pie» o «te escondes a ti mismo».
