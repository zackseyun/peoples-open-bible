translation:
  language: es
  text: Las montañas fueron cubiertas por su sombra, y sus ramas eran como los cedros de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los poderosos cedros». La expresión hebrea «cedros de Dios» puede ser un modismo que expresa grandeza o majestad.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּסּוּ
  english_pob_choice: were covered
  chosen_spanish: fueron cubiertas
  alternatives_spanish:
  - cubrieron
  lexicon: HALOT
  rationale: El verbo hebreo es Qal perfecto 3cp de כסה. En español, la pasiva con «fueron cubiertas» refleja con naturalidad la construcción inglesa y conserva la imagen de cobertura sin forzar un sujeto agente implícito.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: las montañas
  alternatives_spanish:
  - montañas
  lexicon: HALOT
  rationale: El sustantivo plural con artículo se expresa de forma directa y natural como «las montañas».
- source_word: צִלָּהּ
  english_pob_choice: its shade
  chosen_spanish: su sombra
  alternatives_spanish:
  - su sombra protectora
  - su sombra
  lexicon: HALOT
  rationale: צֵל/צִלָּהּ puede significar «sombra» o «sombra protectora». En español, «sombra» mantiene la ambigüedad útil entre sombra y cobijo, y evita una paráfrasis excesiva.
- source_word: וַעֲנָפֶיהָ
  english_pob_choice: and its branches
  chosen_spanish: y sus ramas
  alternatives_spanish:
  - y sus ramas
  lexicon: HALOT
  rationale: ענף se refiere a ramas o boughs. «Ramas» es claro y conserva la imagen botánica sin elevar el registro innecesariamente.
- source_word: אַרְזֵי אֵל
  english_pob_choice: the cedars of God
  chosen_spanish: los cedros de Dios
  alternatives_spanish:
  - los poderosos cedros
  - los cedros de Dios
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «cedros de El/Dios». Se conserva en español para mantener visible la formulación del texto fuente y no resolver de antemano si se trata de un superlativo o de una genitiva literal.
theological_decisions:
- issue: Sentido de אֵל en אַרְזֵי אֵל
  english_pob_reading: Retain the literal expression 'cedars of God' in the main text; note that it may be idiomatic for greatness or majesty.
  chosen_spanish_reading: Conservar «los cedros de Dios» en el texto principal; la frase puede entenderse como expresión de grandeza o majestad.
  alternative_spanish_readings:
  - los poderosos cedros
  - cedros majestuosos
  rationale: No se debe borrar la tensión lexical del hebreo. El español puede captar el efecto superlativo con una nota, pero el texto principal conserva la forma literal para que el lector vea la imagen original.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al contexto de auditoría más reciente; el borrador sigue la lectura estable del POB inglés y mantiene la tensión interpretativa sobre אַרְזֵי אֵל.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל en la expresión fija «los cedros de Dios», en coherencia con el valor lexical y la decisión inglesa de preservar la forma literal.
  - Se prefiere «sombra» en lugar de «sombra protectora» en el texto principal para no sobreinterpretar; la alternativa queda en nota.
  - Se mantiene el paralelismo poético con una estructura sencilla y digna, apta para lectura pública.
