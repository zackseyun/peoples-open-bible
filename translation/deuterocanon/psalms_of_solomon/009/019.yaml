id: PSS.9.19
reference: Psalms of Solomon 9:19
source:
  edition: lxx-swete-1909
  text: ἐν διαθήκῃ διέθου τοῖς πατράσιν ἡμῶν περὶ ἡμῶν, καὶ ἡμεῖς ἐλπιοῦμεν ἐπὶ σὲ ἐν ἐπιστροφῇ ψυχῆς ἡμῶν.
  language: Greek
  pages:
  - 800
  validation: swete_direct
translation:
  text: In a covenant you appointed to our fathers concerning us[b][a], and we will hope in you in the turning back of our soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when we repent'; the Greek is literally 'in the turning back/return of our soul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'In covenant you made'.
    reason: previous_rendering
lexical_decisions:
- source_word: διαθήκῃ
  chosen: covenant
  alternatives:
  - agreement
  - pledge
  lexicon: BDAG
  rationale: διαθήκη in biblical Greek regularly denotes a covenantal arrangement, especially in relation to God's dealings with the fathers. 'Covenant' preserves that theological and intertextual force better than a flatter term like 'agreement'.
- source_word: διέθου
  chosen: made
  alternatives:
  - established
  - ordained
  - entered into
  lexicon: BDAG
  rationale: From διατίθημι, here in covenantal idiom. 'Made' gives idiomatic English with 'covenant' while still reflecting the verbal action. 'Established' is possible but slightly more interpretive.
- source_word: τοῖς πατράσιν ἡμῶν
  chosen: with our fathers
  alternatives:
  - with our ancestors
  lexicon: BDAG
  rationale: The Greek is explicitly 'fathers.' This likely refers to the covenant ancestors/patriarchs, so the gendered form is retained in keeping with the project's gender-accurate policy.
- source_word: περὶ ἡμῶν
  chosen: concerning us
  alternatives:
  - about us
  - for us
  lexicon: BDAG
  rationale: περί with the genitive most directly means 'concerning/about.' 'For us' is possible by implication, but 'concerning us' stays closer to the Greek wording.
- source_word: ἐλπιοῦμεν
  chosen: we will hope
  alternatives:
  - we hope
  - we will put our hope
  lexicon: BDAG
  rationale: The form is future, not present. 'We will hope' preserves the tense plainly without adding emphasis not required by the text.
- source_word: ἐπιστροφῇ
  chosen: turns back
  alternatives:
  - returns
  - repents
  - conversion
  lexicon: BDAG
  rationale: ἐπιστροφή can denote turning back or return, often with moral-religious force. 'Turns back' preserves the imagery and allows the repentance nuance to remain without over-specifying it in the main text.
- source_word: ψυχῆς ἡμῶν
  chosen: our soul
  alternatives:
  - our life
  - ourselves
  lexicon: BDAG
  rationale: ψυχή can mean soul, life, or self. 'Our soul' best preserves the singular collective expression of the Greek and avoids flattening the phrase into a purely idiomatic paraphrase.
