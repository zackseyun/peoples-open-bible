- from: Porque tus propios ojos han visto toda la gran obra que Yahvé ha hecho.[a]
  to: Porque sus propios ojos han visto toda la gran obra que Yahvé ha hecho.[a]
  rationale: Se corrige la persona/número para reflejar fielmente el hebreo de 2ª persona plural en un español neutro y natural. Se mantiene el resto de la redacción, que comunica bien el énfasis testimonial y la terminología del proyecto.
  reviewer_model: gpt-5.4
