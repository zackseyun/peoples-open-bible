translation:
  language: es
  text: Por la angustia de su alma verá y quedará satisfecho[a]; por su conocimiento mi siervo justo justificará a muchos[b], y llevará sus iniquidades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “por conocimiento de él”, si se entiende que la frase se refiere al conocimiento de otros acerca del siervo, en vez de al conocimiento del siervo mismo.'
    reason: alternative_reading
  - marker: b
    text: 'Algunos testigos antiguos leen: “verá luz y quedará satisfecho”. El texto masorético dado dice simplemente: “verá y quedará satisfecho”.'
    reason: textual_variant
lexical_decisions:
- source_word: מֵעֲמַל
  english_pob_choice: From the anguish
  chosen_spanish: Desde la angustia
  alternatives_spanish:
  - Desde el trabajo
  - Desde el afán
  - Desde el sufrimiento
  lexicon: HALOT
  rationale: עָמָל puede expresar fatiga, aflicción, trabajo penoso o miseria. En este contexto del siervo sufriente, “angustia” comunica bien la experiencia dolorosa sin volverla demasiado abstracta. “Desde” preserva el valor de la preposición מִן.
- source_word: נַפְשׁוֹ
  english_pob_choice: of his soul
  chosen_spanish: de su alma
  alternatives_spanish:
  - de sí mismo
  - de su vida
  lexicon: HALOT
  rationale: נֶפֶשׁ puede referirse a la vida o al ser entero, pero “alma” mantiene la carga interior y espiritual del hebreo y encaja con la frase “angustia de su alma” sin sobreparafrasear.
- source_word: יִרְאֶה
  english_pob_choice: he will see
  chosen_spanish: verá
  alternatives_spanish:
  - mirará
  - verá la luz
  lexicon: HALOT
  rationale: El texto masorético dice simplemente “verá”. Se evita añadir “la luz” porque no está en el hebreo dado. “Verá” conserva la amplitud del verbo.
- source_word: יִשְׂבָּע
  english_pob_choice: be satisfied
  chosen_spanish: quedará satisfecho
  alternatives_spanish:
  - será saciado
  - se contentará
  lexicon: HALOT
  rationale: El verbo expresa saciedad o satisfacción. “Quedará satisfecho” es natural en español y conserva el resultado de lo que ve.
- source_word: בְּדַעְתּוֹ
  english_pob_choice: by his knowledge
  chosen_spanish: por su conocimiento
  alternatives_spanish:
  - por el conocimiento de él
  - por el conocimiento que tenga
  lexicon: HALOT
  rationale: 'La forma sufijada permite entenderlo de modo instrumental/subjetivo: “por su conocimiento”. Esta redacción mantiene la lectura más inmediata sin resolver una ambigüedad real del hebreo.'
- source_word: יַצְדִּיק
  english_pob_choice: will justify
  chosen_spanish: justificará
  alternatives_spanish:
  - declarará justo
  - hará justo
  lexicon: HALOT
  rationale: En el hifil, צדק suele significar declarar o tratar como justo. “Justificará” preserva esa fuerza jurídica/forense de forma concisa y reconocible.
- source_word: צַדִּיק עַבְדִּי
  english_pob_choice: my righteous servant
  chosen_spanish: mi siervo justo
  alternatives_spanish:
  - mi siervo, el justo
  - el justo, mi siervo
  lexicon: HALOT
  rationale: “Justo” se toma atributivamente con “siervo”, y el orden español más natural es “mi siervo justo”.
- source_word: לָרַבִּים
  english_pob_choice: many
  chosen_spanish: a muchos
  alternatives_spanish:
  - a muchos
  - para muchos
  - a los muchos
  lexicon: HALOT
  rationale: רַבִּים significa “muchos” o “los muchos”. En español, el objeto de “justificará” se expresa de manera natural con “a muchos”, sin ampliar indebidamente a “todos”.
- source_word: וַעֲוֺנֹתָם
  english_pob_choice: their iniquities
  chosen_spanish: sus iniquidades
  alternatives_spanish:
  - sus pecados
  - su culpa
  lexicon: HALOT
  rationale: עָוֹן conlleva la idea de iniquidad/culpa moral. “Iniquidades” conserva mejor ese peso que un término más general como “pecados”.
- source_word: הוּא
  english_pob_choice: he himself
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  - éste
  lexicon: HALOT
  rationale: Aunque el pronombre puede tener énfasis, la revisión más reciente del POB retiró el “él mismo” para no añadir una intensificación no necesaria. “Él” basta y permanece fiel al hebreo.
- source_word: יִסְבֹּל
  english_pob_choice: will bear
  chosen_spanish: llevará
  alternatives_spanish:
  - cargará
  - soportará
  lexicon: HALOT
  rationale: El verbo puede significar llevar/cargar/soportar. Con “iniquidades”, “llevará” comunica bien la idea de carga vicaria sin volverla más explicativa de lo que permite el texto.
theological_decisions:
- issue: Interpretación de בְּדַעְתּוֹ
  english_pob_reading: 'subjective/instrumental: ''by his knowledge'''
  chosen_spanish_reading: 'instrumental/subjetiva: ''por su conocimiento'''
  alternative_spanish_readings:
  - '''por el conocimiento de él'''
  - '''por el conocimiento que tengan de él'''
  rationale: La forma hebrea admite una referencia al conocimiento del siervo o al conocimiento de otros sobre él. La traducción principal mantiene la lectura gramatical más inmediata sin cerrar la ambigüedad, y la redacción española refleja esa misma tensión.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Forma textual de יִרְאֶה
  english_pob_reading: MT 'he will see' without explicit object
  chosen_spanish_reading: '''verá'' sin objeto explícito'
  alternative_spanish_readings:
  - '''verá la luz'''
  - '''verá y verá la luz'''
  rationale: El hebreo masorético dado no contiene 'luz'. Por fidelidad al texto base, la versión española no la añade. La ambigüedad se conserva en el verbo desnudo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Alcance de לָרַבִּים
  english_pob_reading: '''many'''
  chosen_spanish_reading: '''a muchos'''
  alternative_spanish_readings:
  - '''a los muchos'''
  - '''para muchos'''
  rationale: El hebreo dice 'muchos' y no debe ampliarse a 'todos' por armonización doctrinal. 'A muchos' mantiene el alcance del original en un español natural.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB, que eliminó “él mismo” para no introducir un énfasis no explicitado por el hebreo. También se respetó la decisión de mantener el texto masorético sin añadir “luz”, y de conservar la ambigüedad de בְּדַעְתּוֹ mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa “Yahvé” en este proyecto cuando corresponde al tetragrámaton; aquí no aparece en el versículo.
  - “Siervo” se conserva porque el hebreo עֶבֶד/עַבְדִּי lo exige; no se sustituye por “siervo” con otro matiz ni por “esclavo”, ya que el contexto y el POB inglés apuntan a un término de servicio pactal/representativo.
  - “Justificará” preserva el valor forense del hifil de צדק.
  - “Iniquidades” mantiene la gravedad moral de עָוֹן.
  - La puntuación sigue el ritmo de dos miembros coordinados, con la pausa fuerte después de “satisfecho[a]”.
