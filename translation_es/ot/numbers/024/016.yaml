translation:
  language: es
  text: 'la declaración de quien oye las palabras de Dios[a], y conoce el conocimiento del Altísimo, que ve la visión del Todopoderoso, cayendo[b], pero con los ojos descubiertos:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el oráculo de quien oye los dichos de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «caído, con los ojos descubiertos»; algunos entienden esto como un estado de trance visionario.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְאֻם
  english_pob_choice: the declaration of
  chosen_spanish: la declaración de
  alternatives_spanish:
  - el oráculo de
  - la palabra de
  lexicon: HALOT
  rationale: «Declaración» conserva el tono solemne y profético del sustantivo sin cargar el texto con un término demasiado técnico o arcaizante como «oráculo».
- source_word: שֹׁמֵעַ
  english_pob_choice: one who hears
  chosen_spanish: uno que oye
  alternatives_spanish:
  - quien oye
  - el que oye
  lexicon: HALOT
  rationale: El participio funciona de modo sustantivo; «uno que oye» mantiene el valor característico y resulta natural en español.
- source_word: אִמְרֵי אֵל
  english_pob_choice: the words of God
  chosen_spanish: las palabras de Dios
  alternatives_spanish:
  - los dichos de Dios
  - las expresiones de Dios
  lexicon: HALOT
  rationale: «Palabras de Dios» es la equivalencia más idiomática y fiel al sentido de dicho/oráculo divino del constructo hebreo.
- source_word: וְיֹדֵעַ
  english_pob_choice: and knows
  chosen_spanish: y conoce
  alternatives_spanish:
  - y sabe
  - y entiende
  lexicon: HALOT
  rationale: En paralelo con el participio anterior, «conoce» reproduce bien la continuidad descriptiva sin forzar una perífrasis.
- source_word: דַּעַת עֶלְיוֹן
  english_pob_choice: the knowledge of the Most High
  chosen_spanish: el conocimiento del Altísimo
  alternatives_spanish:
  - el conocimiento del Más Alto
  - el saber del Altísimo
  lexicon: HALOT
  rationale: La construcción hebrea compacta se conserva en español con «el conocimiento del Altísimo», manteniendo la referencia a una posesión o esfera de conocimiento ligada a Dios.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Exaltado
  - el Más Alto
  lexicon: HALOT
  rationale: «Altísimo» es la forma tradicional y plenamente comprensible en español para este título divino, con el mismo valor superlativo.
- source_word: מַחֲזֵה
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - una visión
  - la visión profética
  lexicon: HALOT
  rationale: El sustantivo se traduce de manera directa como «visión», preservando su sentido revelatorio sin expandirlo innecesariamente.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - Shaddai
  lexicon: HALOT
  rationale: Para este título divino, «Todopoderoso» transmite con naturalidad en español la fuerza de שַׁדַּי y sigue la decisión del POB inglés de traducir títulos.
- source_word: יֶחֱזֶה
  english_pob_choice: who sees
  chosen_spanish: que ve
  alternatives_spanish:
  - que contempla
  - ve
  lexicon: HALOT
  rationale: La forma verbal queda bien como cláusula relativa en español; «que ve» conserva la observación visionaria del hebreo.
- source_word: נֹפֵל
  english_pob_choice: falling down
  chosen_spanish: cayendo
  alternatives_spanish:
  - postrado
  - cayendo al suelo
  - en caída
  lexicon: HALOT
  rationale: «Cayendo» conserva el valor participial literal. No se resuelve en la traducción principal la posible interpretación de trance, que queda como alternativa documentada.
- source_word: וּגְלוּי עֵינָיִם
  english_pob_choice: yet with uncovered eyes
  chosen_spanish: pero con los ojos descubiertos
  alternatives_spanish:
  - y con los ojos descubiertos
  - con los ojos abiertos
  lexicon: HALOT
  rationale: «Ojos descubiertos» mantiene la imagen hebrea. Se usa «pero» para reflejar la concesión implícita que el inglés POB marcó con «yet».
theological_decisions:
- issue: Tratamiento de los títulos divinos אֵל, עֶלְיוֹן y שַׁדַּי
  english_pob_reading: God / the Most High / the Almighty
  chosen_spanish_reading: Dios / el Altísimo / el Todopoderoso
  alternative_spanish_readings:
  - El / Elyón / Shaddai
  - Dios / el Más Alto / el Omnipotente
  rationale: La pauta del proyecto pide traducir títulos divinos. En español, «Dios», «Altísimo» y «Todopoderoso» comunican el mismo contenido reverente sin transliterar innecesariamente.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: El borrador sigue el estado revisado sin cambios del texto inglés POB (high_agreement; latest pass unchanged). No se incorporan expansiones interpretativas adicionales más allá de las alternativas ya documentadas en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» y «Todopoderoso» como traducción de títulos divinos, en coherencia con la política del proyecto.
  - Se conserva el paralelismo participial con «uno que oye ... y conoce ... que ve ...» para reflejar la sintaxis hebrea.
  - «Oye» y «conoce» siguen un registro bíblico natural en español moderno, evitando arcaísmos innecesarios.
  - La concesión de «pero» reproduce el matiz de contraste implícito que el inglés expresó con «yet».
