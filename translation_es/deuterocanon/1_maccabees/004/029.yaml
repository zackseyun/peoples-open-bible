translation:
  language: es
  text: Y llegaron a Idumea y acamparon en Bet-zur[a], y Judas les salió al encuentro con diez mil hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Βηθορούς; el POB inglés lo vertió convencionalmente como «Beth-horon», pero el texto griego auditado corresponde aquí a «Bet-zur».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον εἰς
  english_pob_choice: came into
  chosen_spanish: llegaron a
  alternatives_spanish:
  - entraron en
  - vinieron a
  lexicon: LSJ
  rationale: El griego expresa llegada/entrada a una región; en español, «llegaron a» comunica el movimiento de manera natural sin forzar un calco rígido.
- source_word: τὴν Ἰδουμαίαν
  english_pob_choice: Idumea
  chosen_spanish: Idumea
  alternatives_spanish:
  - Edom
  lexicon: LSJ
  rationale: Se conserva el nombre regional helenístico «Idumea», que corresponde al término griego Ἰδουμαία y mantiene el marco histórico del pasaje.
- source_word: παρεμβάλον
  english_pob_choice: encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acantonaron
  - establecieron campamento
  lexicon: LSJ
  rationale: El verbo militar indica la acción de establecer campamento; «acamparon» es claro y fiel, y evita una expresión demasiado pesada en español.
- source_word: ἐν Βηθορούς
  english_pob_choice: at Beth-zur
  chosen_spanish: en Bet-zur[a]
  alternatives_spanish:
  - en Bet-horón
  - en Beth-zur
  lexicon: LSJ
  rationale: El auditorio español necesita una forma reconocible del topónimo; «Bet-zur» sigue la corrección del griego Βηθορούς según el registro auditado. La nota conserva la alternativa tradicional documentada en el POB inglés para evitar borrar la tensión toponímica.
- source_word: συνήντησεν αὐτοῖς
  english_pob_choice: met them
  chosen_spanish: los encontró
  alternatives_spanish:
  - se encontró con ellos
  - les salió al encuentro
  lexicon: LSJ
  rationale: El griego describe el encuentro entre Judas y el grupo enemigo; «los encontró» mantiene la brevedad narrativa del original sin añadir una interpretación direccional no explícita.
- source_word: ἐν δέκα χιλιάσιν ἀνδρῶν
  english_pob_choice: with ten thousand men
  chosen_spanish: con diez mil hombres
  alternatives_spanish:
  - con diez mil soldados
  - con diez mil guerreros
  lexicon: LSJ
  rationale: «Ἀνδρῶν» significa literalmente «hombres»; se conserva esa fuerza lexical sin sustituirla por «soldados», que sería más explicativo que el griego.
translation_notes:
  revision_awareness: La revisión auditada corrigió el topónimo desde Beth-horon a Beth-zur para ajustarlo al griego Βηθορούς; la redacción española sigue esa corrección y conserva la alternativa tradicional solo en nota.
  spanish_consistency_notes:
  - Se mantuvo «Idumea» como nombre histórico regional, en consonancia con el griego y con el registro del pasaje.
  - Se prefirió «hombres» para ἀνδρῶν por fidelidad léxica y por coherencia con el audit trail inglés.
  - La nota topográfica evita borrar la tensión entre la tradición inglesa previa y la corrección textual final.
