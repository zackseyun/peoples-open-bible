base_translation:
  language: en
  yaml_path: translation/ot/joshua/017/011.yaml
  text: And Manasseh had in Issachar and in Asher Beth-shean and its daughter villages[a], and Ibleam and its daughter villages, and the inhabitants of Dor and its daughter villages, and the inhabitants of En-dor and its daughter villages, and the inhabitants of Taanach and its daughter villages[b], and the inhabitants of Megiddo and its daughter villages—the three regions.
  footnotes:
  - marker: a
    text: Or 'the three regions' or 'the three districts.' The Hebrew phrase is difficult and may refer to a geographical or administrative grouping.
    reason: lexical_alternative
  - marker: b
    text: Literally 'its daughters,' a Hebrew idiom for a town's dependent villages or settlements.
    reason: cultural_note
