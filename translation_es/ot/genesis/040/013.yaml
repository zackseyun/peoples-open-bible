translation:
  language: es
  text: En tres días más, el faraón levantará tu cabeza[a] y te restablecerá en tu puesto; y pondrás la copa del faraón en su mano, según la costumbre anterior, cuando eras su copero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «levantará tu cabeza», un modismo que aquí indica una restauración favorable; la formulación literal también prepara el uso contrastante de este mismo giro en el versículo 19.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעוֹד שְׁלֹשֶׁת יָמִים
  english_pob_choice: In three more days
  chosen_spanish: Dentro de tres días más
  alternatives_spanish:
  - En tres días
  - Dentro de otros tres días
  lexicon: HALOT
  rationale: La expresión marca tiempo restante antes del cumplimiento; «Dentro de tres días más» conserva ese valor prospectivo y el matiz de «más» presente en la auditoría inglesa sin sonar rígido.
- source_word: יִשָּׂא ... אֶת רֹאשֶׁךָ
  english_pob_choice: will lift up your head
  chosen_spanish: levantará tu cabeza
  alternatives_spanish:
  - alzará tu cabeza
  - levantará tu cabeza de ti
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «levantar la cabeza», que en este contexto señala restauración favorable. En español, «levantará tu cabeza» mantiene la tensión lexical y prepara el contraste con el uso posterior del mismo giro.
- source_word: וַהֲשִׁיבְךָ עַל כַּנֶּךָ
  english_pob_choice: and restore you to your position
  chosen_spanish: y te restablecerá en tu puesto
  alternatives_spanish:
  - y te devolverá a tu cargo
  - y te restaurará a tu posición
  lexicon: HALOT
  rationale: כֵּן aquí designa el lugar/oficio establecido. «Puesto» comunica bien el sentido cortesano en español y evita una traducción demasiado abstracta de «posición».
- source_word: וְנָתַתָּ כוֹס פַּרְעֹה בְּיָדוֹ
  english_pob_choice: and you will place Pharaoh’s cup into his hand
  chosen_spanish: y pondrás la copa del faraón en su mano
  alternatives_spanish:
  - y darás la copa del faraón en su mano
  - y colocarás la copa del faraón en su mano
  lexicon: HALOT
  rationale: נתן admite «dar/poner». «Pondrás ... en su mano» conserva la concreción de la acción del copero y su naturalidad en español.
- source_word: כַּמִּשְׁפָּט הָרִאשׁוֹן
  english_pob_choice: according to the former custom
  chosen_spanish: conforme al primer uso
  alternatives_spanish:
  - según la costumbre anterior
  - conforme al uso anterior
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí apunta al modo o práctica establecida. «Uso» refleja bien esa práctica habitual; «primer» conserva la referencia a lo previo y al orden original de servicio.
- source_word: אֲשֶׁר הָיִיתָ מַשְׁקֵהוּ
  english_pob_choice: when you were his cupbearer
  chosen_spanish: cuando eras su copero
  alternatives_spanish:
  - cuando servías como su copero
  - cuando eras el que le daba de beber
  lexicon: HALOT
  rationale: מַשְׁקֶה designa el oficio de copero. «Copero» es el equivalente natural en español para el cargo, preservando el valor institucional del término.
theological_decisions:
- issue: El giro hebreo «levantar la cabeza» puede sonar literal o idiomático.
  english_pob_reading: The English keeps the idiom and notes that it indicates favorable restoration, while also preserving the literary link to verse 19.
  chosen_spanish_reading: La traducción conserva la imagen idiomática («levantará tu cabeza») y deja que el contexto de restauración clarifique el sentido positivo.
  alternative_spanish_readings:
  - te favorecerá y te restablecerá
  - te tomará en cuenta y te restablecerá
  rationale: Mantener el modismo evita borrar la conexión literaria interna del pasaje y no suple de antemano la explicación que ofrece el contexto inmediato.
  doctrine_reference: No aplica; decisión literaria y semántica del hebreo.
translation_notes:
  revision_awareness: El inglés POB reporta un estado de alta concordancia y sin cambios aplicados en la última pasada de revisión; esta versión española sigue esa lectura sin introducir revisiones no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «faraón» en minúscula como título común en español, coherente con el uso bíblico en contexto narrativo.
  - «Copero» se prefiere sobre paráfrasis más largas por ser el oficio reconocido en español y coincidir con la evidencia léxica del hebreo.
