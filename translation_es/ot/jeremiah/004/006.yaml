revisions:
- from: Alzad una señal[a] hacia Sion. Refugiaos[b]; no os detengáis, porque yo estoy trayendo calamidad[c] desde el norte, y gran destrucción.
  to: Levanten una señal[a] hacia Sion. Busquen refugio[b]; no se detengan, porque yo estoy trayendo calamidad[c] desde el norte, y gran destrucción.
  rationale: 'Se revisa el texto para ajustarlo al español neutro latinoamericano requerido, reemplazando los imperativos peninsulares por formas de «ustedes» sin cambiar el sentido. «Busquen refugio» mantiene el valor de הָעִיזוּ en un español más natural y eclesialmente amplio. También se suaviza la nota c con una formulación más idiomática: «se refiere a».'
