review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: una sola disposición para la asamblea y para el residente no israelita, con vigencia duradera por generaciones, y con paridad delante de Yahvé. Sin embargo, «forastero» no representa tan fielmente גֵּר en este contexto legal-cúltico como «residente extranjero», y la segunda cláusula puede fluir mejor sin añadir «será».'
  spanish_quality_summary: El español es claro y digno, pero «forastero» en español moderno suele sugerir alguien de paso o ajeno, no necesariamente un residente integrado bajo la ley. «Residente extranjero» es más preciso aunque algo más técnico; aquí conviene por fidelidad jurídica. También «Como ustedes, así el residente extranjero estará delante de Yahvé» suena algo más directo y cercano al hebreo.
  glossary_alignment: Se mantiene correctamente «Yahvé». «Ordenanza» es aceptable para חֻקָּה, aunque «estatuto» también sería posible. La principal desalineación léxica está en גֵּר, donde el rastro auditado favorece la idea de residente no nativo, no simple forastero.
  issues:
  - severity: medium
    issue: «forastero» para גֵּר
    rationale: En este pasaje גֵּר denota al extranjero residente bajo provisiones comunitarias y cultuales. «Forastero» puede sonar demasiado amplio o transitorio; «residente extranjero» preserva mejor el matiz legal del original y la rationale documentada.
  - severity: low
    issue: Nota b no refleja bien las alternativas inglesas auditadas
    rationale: La nota inglesa preserva alternativas equivalentes a «estatuto perpetuo» o «estatuto eterno/permanente». La nota española actual dice «O “perpetua” o “para siempre”», donde «perpetua» no es una alternativa real al sintagma ya usado y queda incompleta.
  - severity: low
    issue: Ligera naturalidad en la cláusula final
    rationale: «Como ustedes, así será el forastero» es entendible, pero «Como ustedes, así será el residente extranjero delante de Yahvé» o «Como ustedes, así el residente extranjero estará delante de Yahvé» suena más natural y mantiene la paridad.
  revised_spanish_text: Para la asamblea[a], habrá una sola ordenanza para ustedes y para el residente extranjero que reside con ustedes; una ordenanza perpetua[b] por todas sus generaciones. Como ustedes, así será el residente extranjero delante de Yahvé.
  revised_footnotes:
