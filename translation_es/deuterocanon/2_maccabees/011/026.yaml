translation:
  language: es
  text: Por tanto, harás bien en enviarles y darles garantías de buena fe[a], para que, al conocer nuestra intención, estén animados y puedan ocuparse con gusto en asegurar sus propios asuntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego, literalmente: «habiendo dado manos derechas»; es un modismo diplomático para expresar garantías, promesa o prenda de buena fe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὖ οὖν ποιήσεις
  english_pob_choice: you will do well
  chosen_spanish: harás bien
  alternatives_spanish:
  - procederás bien
  - harás lo correcto
  lexicon: LSJ
  rationale: La construcción expresa una recomendación/aprobación, no solo una predicción. «Harás bien» reproduce esa fuerza exhortativa de manera natural en español.
- source_word: διαπεμψάμενος πρὸς αὐτούς
  english_pob_choice: to send to them
  chosen_spanish: enviarles
  alternatives_spanish:
  - mandarles
  - despacharlos hacia ellos
  lexicon: LSJ
  rationale: El participio subordinado se vierte con un infinitivo natural en español. «Enviarles» mantiene la relación direccional sin sobreespecificar mensajeros.
- source_word: δοὺς δεξιάς
  english_pob_choice: give them pledges of good faith
  chosen_spanish: darles garantías de buena fe
  alternatives_spanish:
  - darles la mano derecha
  - darles una prenda de paz
  - darles seguridades
  lexicon: LSJ
  rationale: La expresión griega es idiomática y en contexto diplomático. En español, «garantías de buena fe» comunica el valor pragmático de la fórmula sin perder el matiz de pacto o seguridad.
- source_word: προαίρεσιν
  english_pob_choice: intention
  chosen_spanish: intención
  alternatives_spanish:
  - propósito
  - decisión
  - política
  lexicon: LSJ
  rationale: «Intención» refleja la voluntad deliberada mencionada en el texto sin añadir una carga más positiva que la del original.
- source_word: εὔθυμοί
  english_pob_choice: encouraged
  chosen_spanish: estén animados
  alternatives_spanish:
  - estén confiados
  - estén de buen ánimo
  - cobren ánimo
  lexicon: LSJ
  rationale: El término alude a buen ánimo o valor. «Estén animados» preserva el efecto resultante del conocimiento de la intención y suena idiomático en español.
- source_word: ἡδέως διαγίνωνται
  english_pob_choice: may gladly attend
  chosen_spanish: puedan ocuparse con gusto
  alternatives_spanish:
  - puedan desenvolverse con gusto
  - puedan vivir con agrado
  - puedan continuar con agrado
  lexicon: LSJ
  rationale: El verbo sugiere seguir adelante o conducirse en una situación dada. «Ocuparse con gusto» capta el matiz de desenvolverse alegremente en sus asuntos.
- source_word: πρὸς τῇ τῶν ἰδίων ἀντιλήψει
  english_pob_choice: to the securing of their own affairs
  chosen_spanish: en la defensa de sus propios asuntos
  alternatives_spanish:
  - en el cuidado de sus propios intereses
  - en el sostenimiento de lo suyo
  - en la administración de sus propios bienes
  lexicon: LSJ
  rationale: ἀντίληψις puede implicar apoyo, amparo o hacerse cargo de algo. Dado el contexto práctico-político, «defensa de sus propios asuntos» preserva la idea de atender y asegurar lo propio sin restringirlo solo a bienes materiales.
theological_decisions:
- issue: Fórmula diplomática 'dar la diestra' / garantía de paz
  english_pob_reading: Greek literally, 'having given right hands,' a diplomatic idiom for giving assurances or pledges of good faith.
  chosen_spanish_reading: «darles garantías de buena fe» como equivalencia idiomática de una señal de pacto o seguridad diplomática.
  alternative_spanish_readings:
  - darles la diestra
  - darles la mano derecha
  - darles una prenda de paz
  rationale: El texto no describe un gesto meramente físico, sino una fórmula de confianza entre partes. En español, una equivalencia explícita evita opacidad y conserva el valor jurídico-diplomático del hebraísmo/idioma griego.
  doctrine_reference: Ninguna; es una decisión lexical y pragmática, no doctrinal.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para explicitar el objeto indirecto «them» tras «give»; la versión española lo refleja naturalmente con «darles». No se detectan otras variantes textuales o tensiones de traducción relevantes en el pasaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó un registro formal y legible para una fórmula diplomática de 2 Macabeos sin recurrir a calco servil.
  - «Garantías de buena fe» traduce la función del modismo griego sin imponer terminología eclesiástica ajena al contexto.
  - «Asuntos» amplía prudentemente el alcance de ἀντίληψις sin reducirlo solo a propiedad material.
