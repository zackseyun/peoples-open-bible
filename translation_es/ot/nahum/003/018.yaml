revisions:
- from: Se adormecieron tus pastores[a], rey de Asiria; tus nobles se recuestan. Tu pueblo está disperso sobre los montes[b], y no hay quien lo reúna.
  to: Dormitan tus pastores[a], rey de Asiria; tus nobles yacen[b]. Tu pueblo está disperso[c] sobre los montes, y no hay quien lo reúna.
  rationale: La revisión conserva el sentido del original y del POB inglés, mejora el tono literario en español con ‘dormitan’ y ‘yacen’, y restaura las notas significativas del expediente inglés. También corrige la organización de las notas para que cada una trate una sola cuestión y quede anclada en la palabra o frase correspondiente.
