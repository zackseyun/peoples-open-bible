translation:
  language: es
  text: Pero en cuanto a Joppe y Gazara[a], tú las pides. Estas ciudades causaban un gran daño[b] al pueblo y a nuestra tierra. Por estas daremos cien talentos[c]. Y no le respondió palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego Γαζαρηνῶν es formalmente plural y alude a Gazara y a sus habitantes o territorio; en español se conserva como nombre de lugar porque la petición trata de la posesión de la ciudad o territorio.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «un gran golpe», «una gran herida» o «una gran plaga/calamidad». El término griego πληγή admite ese rango de sentidos.
    reason: lexical_alternative
  - marker: c
    text: La frase es breve en griego y puede sugerir compensación o pago en lugar de entregar Joppe y Gazara.
    reason: alternative_reading
lexical_decisions:
- source_word: περὶ δὲ
  english_pob_choice: But concerning
  chosen_spanish: Pero en cuanto a
  alternatives_spanish:
  - Ahora bien, acerca de
  - Pero acerca de
  lexicon: LSJ
  rationale: La combinación griega introduce un cambio de tema con matiz adversativo; «Pero en cuanto a» conserva el giro del texto y su función discursiva sin sonar forzado en español.
- source_word: Ἰόππης
  english_pob_choice: Joppa
  chosen_spanish: Joppe
  alternatives_spanish:
  - Joppa
  lexicon: LSJ
  rationale: Se mantiene el nombre tradicional del lugar en una forma cercana al griego y ya usada en español bíblico para esta ciudad.
- source_word: Γαζαρηνῶν
  english_pob_choice: Gazara
  chosen_spanish: Gazara
  alternatives_spanish:
  - Gezer
  - Gazera
  lexicon: LSJ
  rationale: El griego apunta formalmente a los gazarenos, pero el contexto trata de la posesión del lugar; «Gazara» conserva la convención de nombre propio sin convertirlo en un etnónimo extraño en español.
- source_word: αἰτεῖς
  english_pob_choice: you ask for
  chosen_spanish: tú las pides
  alternatives_spanish:
  - tú las solicitas
  - tú las demandas
  lexicon: LSJ
  rationale: «Pedirlas» expresa bien la solicitud de esas ciudades/territorios en un español natural y sin intensificar indebidamente el verbo griego.
- source_word: αὗται
  english_pob_choice: These
  chosen_spanish: Ellas
  alternatives_spanish:
  - Estas
  - Estos lugares
  lexicon: LSJ
  rationale: Aunque el griego es femenino plural, en español la referencia a ciudades puede retomarse con «ellas» para evitar ambigüedad después de nombrarlas. Mantiene el referente implícito sin añadir glosa.
- source_word: ἐποίουν
  english_pob_choice: were inflicting
  chosen_spanish: causaban
  alternatives_spanish:
  - estaban causando
  - infligían
  - hacían
  lexicon: LSJ
  rationale: El imperfecto indica acción continuada o repetida. «Causaban» conserva ese valor durativo y permite unirlo naturalmente con el objeto de daño.
- source_word: πληγὴν μεγάλην
  english_pob_choice: great harm
  chosen_spanish: un gran daño
  alternatives_spanish:
  - un gran golpe
  - una gran herida
  - una gran plaga
  lexicon: LSJ
  rationale: πληγή puede significar golpe, herida, plaga o calamidad; en este contexto político-militar, «daño» comunica la gravedad sin sobreinterpretar la imagen.
- source_word: τῇ γῇ ἡμῶν
  english_pob_choice: our land
  chosen_spanish: nuestra tierra
  alternatives_spanish:
  - nuestro país
  - nuestro territorio
  lexicon: LSJ
  rationale: «Tierra» reproduce de cerca γῆ y mantiene el sentido territorial y nacional del pasaje.
- source_word: τούτων δώσομεν
  english_pob_choice: For these we will give
  chosen_spanish: Por estas daremos
  alternatives_spanish:
  - Por ellas daremos
  - A cambio de estas daremos
  lexicon: LSJ
  rationale: La frase griega es compacta y sugiere compensación o sustitución. «Por estas» preserva esa concisión y deja abierta la relación exacta sin explicitar más de lo necesario.
- source_word: τάλαντα ἑκατόν
  english_pob_choice: one hundred talents
  chosen_spanish: cien talentos
  alternatives_spanish:
  - ciento de talentos
  lexicon: LSJ
  rationale: Se conserva la unidad monetaria antigua. En español, «cien talentos» es la forma natural y fiel.
- source_word: οὐκ ἀπεκρίθη αὐτῷ λόγον
  english_pob_choice: he answered him not a word
  chosen_spanish: no le respondió palabra
  alternatives_spanish:
  - no le dio respuesta
  - no le respondió ni una palabra
  lexicon: LSJ
  rationale: Es una expresión idiomática de silencio total. «No le respondió palabra» mantiene la fuerza enfática del griego con un giro idiomático aceptable en español.
translation_notes:
  revision_awareness: El texto griego coincide sustancialmente con el audit trail inglés. La revisión inglesa más reciente sustituyó «These were inflicting» por «They were inflicting» por naturalidad; en español se resolvió directamente con una referencia pronominal natural («Ellas causaban») sin perder el antecedente femenino plural. También se conservó la tensión semántica de πληγή con una nota alternativa, y la cláusula breve sobre los cien talentos se dejó abierta a la lectura compensatoria documentada.
  spanish_consistency_notes:
  - Se usó «Joppe» para la ciudad con una forma reconocible en español bíblico, manteniendo «Gazara» como nombre propio consistente con la convención deuterocanónica.
  - Se prefirió «nuestra tierra» para γῆ ἡμῶν, en línea con un registro bíblico claro y sin modernizarlo a «país» o «territorio».
  - Se evitó introducir «plaga» en el cuerpo principal, pero se documentó como alternativa porque el griego permite ese campo semántico.
  - Se mantuvo la economía del cierre griego («no le respondió palabra») sin expandirlo a una paráfrasis interpretativa.
