translation:
  language: es
  text: 'Y Jeremías dijo: «La palabra de Yahvé[a] vino a mí, diciendo:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
