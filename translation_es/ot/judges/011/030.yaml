translation:
  language: es
  text: 'Entonces Jefté hizo un voto a Yahvé y dijo[a]: «Si en verdad entregas a los amonitas en mi mano,»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si ciertamente entregas a los amonitas en mi mano». El hebreo usa un infinitivo absoluto con un verbo finito para intensificar la acción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּדַּר
  english_pob_choice: made a vow
  chosen_spanish: hizo un voto
  alternatives_spanish:
  - votó
  - formuló un voto
  lexicon: HALOT
  rationale: El hebreo נדר expresa hacer un voto; en español, «hizo un voto» conserva la relación con el sustantivo «voto» y suena natural sin perder el sentido formal del verbo.
- source_word: נֶדֶר
  english_pob_choice: a vow
  chosen_spanish: un voto
  alternatives_spanish:
  - una promesa
  - un juramento
  lexicon: HALOT
  rationale: «Voto» es el equivalente directo y mantiene el paralelismo verbal-sustantivo del hebreo, sin diluir la fuerza religiosa de la expresión.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvéh
  - al SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como «Yahvé», conforme a la terminología del proyecto y al valor directo del Tetragrámaton en el hebreo.
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si es que
  - Si acaso
  lexicon: HALOT
  rationale: La partícula introduce una prótasis condicional simple; «Si» reproduce con claridad la apertura de la condición.
- source_word: נָתוֹן תִּתֵּן
  english_pob_choice: you indeed give
  chosen_spanish: en verdad entregas
  alternatives_spanish:
  - ciertamente entregas
  - sin duda entregas
  - entregas de veras
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto + verbo finito intensifica la acción. «En verdad» comunica el énfasis sin volver la frase rígidamente literal, y «entregas» mantiene el sentido de dar en manos de otro.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los ammonitas
  alternatives_spanish:
  - los hijos de Amón
  - el pueblo de Amón
  lexicon: HALOT
  rationale: «Ammonitas» es el etnónimo idiomático en español y comunica claramente el referente histórico sin necesidad de expandir el hebraísmo.
- source_word: בְּיָדִי
  english_pob_choice: into my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - en mi poder
  - en mis manos
  - en mi poder y dominio
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de la «mano» como ámbito de poder o control. «En mi mano» preserva la singularidad del hebreo y su fuerza figurada.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene directamente el Tetragrámaton, por lo que la lectura base del proyecto es el nombre propio divino. «Yahvé» sigue la convención del POB en español y evita el ocultamiento del nombre.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El inglés POB mantiene la estructura condicional abierta y nota la intensidad del hebreo mediante una alternativa de traducción. La presente versión española conserva esa apertura y refleja la intensificación con una expresión natural equivalente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, coherente con la norma del proyecto en español.
  - «Hizo un voto» conserva el vínculo verbo-sustantivo de נדר / נֶדֶר.
  - «En mi mano» conserva el idiomismo hebreo sin sobrerreinterpretarlo como «en mi poder», aunque esa sea una glosa posible.
  - «Ammonitas» sigue el etnónimo idiomático y es coherente con un registro bíblico moderno y claro.
