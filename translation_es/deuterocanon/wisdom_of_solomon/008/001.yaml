lexical_decisions:
- source_word: διατείνει
  english_pob_choice: reaches
  chosen_spanish: se extiende
  alternatives_spanish:
  - alcanza
  - se prolonga
  - se extiende por
  lexicon: LSJ
  rationale: El verbo expresa extenderse o abarcar una distancia completa. «Se extiende» conserva la imagen espacial y la acción continua sin forzar un matiz más técnico como «alcanza».
- source_word: ἀπὸ πέρατος εἰς πέρας
  english_pob_choice: from one end to the other
  chosen_spanish: de un extremo al otro
  alternatives_spanish:
  - de extremo a extremo
  - de un límite al otro
  lexicon: LSJ
  rationale: La locución indica totalidad de extensión. «De un extremo al otro» es natural en español y mantiene el alcance completo del griego.
- source_word: εὐρώστως
  english_pob_choice: mightily
  chosen_spanish: vigorosamente
  alternatives_spanish:
  - con vigor
  - poderosamente
  - fuertemente
  lexicon: LSJ
  rationale: El adverbio comunica fuerza, robustez o vigor. «Vigorosamente» preserva ese valor con un registro digno y claro en español, evitando un tono excesivamente arcaico.
- source_word: διοικεῖ
  english_pob_choice: governs
  chosen_spanish: gobierna
  alternatives_spanish:
  - administra
  - ordena
  - dirige
  lexicon: LSJ
  rationale: El verbo implica administrar, ordenar o gobernar. «Gobierna» comunica de manera directa la función activa de ordenar todo sin reducirla a una mera organización.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el conjunto de todo
  lexicon: LSJ
  rationale: La expresión abarca la totalidad. «Todas las cosas» conserva esa amplitud cósmica con naturalidad en español.
- source_word: χρηστῶς
  english_pob_choice: well
  chosen_spanish: con bondad
  alternatives_spanish:
  - bien
  - benignamente
  - amablemente
  lexicon: LSJ
  rationale: El adverbio puede sugerir bondad, excelencia o conveniencia. Aquí, en el contexto del gobierno sabio sobre todo, «con bondad» explicita la nota benefactora que el inglés POB dejó abierta, sin negar la idea de buen orden.
- source_word: implicit feminine subject (Wisdom)
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - Sabiduría
  lexicon: Greek grammar
  rationale: El sujeto implícito es femenino y remite a Sabiduría personificada. Usar «ella» preserva la personificación presente en el griego, sin repetir innecesariamente el sustantivo.
theological_decisions:
- issue: Personificación de la Sabiduría
  english_pob_reading: Retain feminine personal language ('she') for Wisdom.
  chosen_spanish_reading: Mantener el lenguaje personal femenino («ella») para Sabiduría.
  alternative_spanish_readings:
  - Repetir «Sabiduría» para evitar la personificación
  - Neutralizar el sujeto con una forma impersonal
  rationale: El griego presenta a Sabiduría como sujeto femenino activo en la creación. Conservar «ella» respeta esa presentación literario-teológica sin resolverla hacia una identificación doctrinal posterior.
  doctrine_reference: Primacía del texto original; conservar la tensión teológica en lugar de suavizarla.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego Swete 1909 y el audio textual inglés ya adjudicado. Se conserva la personificación femenina y se evita una paráfrasis que diluya el paralelismo entre el alcance universal de Sabiduría y su gobierno de todo lo creado.
  spanish_consistency_notes:
  - Se usa «Sabiduría» con mayúscula implícita por tratarse de la personificación del contexto.
  - Se mantiene la concordancia femenina («ella», «gobierna») para reflejar el sujeto gramatical griego.
  - «Todas las cosas» y «de un extremo al otro» preservan el alcance total del hemistiquio.
  - La segunda cláusula traduce χρηστῶς con un matiz benefactor, coherente con la lectura de gobierno sabio y bueno.
