  text: שֶׁ֣קֶר הַ֭/חֵן וְ/הֶ֣בֶל הַ/יֹּ֑פִי אִשָּׁ֥ה יִרְאַת יְ֝הוָ֗ה הִ֣יא תִתְהַלָּֽל־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/031/030.yaml
  text: Charm is deceitful[a], and beauty is fleeting[c][b], but a woman who fears Yahweh shall be praised.
  footnotes:
  - marker: a
    text: Or, more literally, 'beauty is vapor'; the Hebrew image can emphasize transience as well as emptiness.
    reason: lexical_alternative
  - marker: b
    text: Or 'a wife'; the Hebrew אִשָּׁה can mean either 'woman' or 'wife' depending on context.
    reason: alternative_reading
  - marker: c
    text: Or 'may praise herself' if taken reflexively, though the context strongly favors 'shall be praised.'
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
