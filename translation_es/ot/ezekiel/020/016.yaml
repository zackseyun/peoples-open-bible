  text: יַ֜עַן בְּ/מִשְׁפָּטַ֣/י מָאָ֗סוּ וְ/אֶת חֻקּוֹתַ/י֙ לֹא הָלְכ֣וּ בָ/הֶ֔ם וְ/אֶת שַׁבְּתוֹתַ֖/י חִלֵּ֑לוּ כִּ֛י אַחֲרֵ֥י גִלּוּלֵי/הֶ֖ם לִבָּ֥/ם הֹלֵֽךְ־־־׃
