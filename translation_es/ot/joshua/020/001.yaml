translation:
  language: es
  text: Entonces Yahvé habló a Josué[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé habló a Josué, diciendo». El hebreo narrativo puede verterse también con un inicio más directo sin «Entonces».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - dijo
  lexicon: HALOT
  rationale: El waw consecutivo en narrativa avanza la acción; en español, «Entonces» reproduce bien ese valor secuencial sin sonar forzado. «Habló» conserva el matiz de דבר como hablar/direccionar, más pleno que un simple «dijo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título. «Jehová» y «el SEÑOR» se evitan por razones de consistencia y transparencia textual.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición en esta construcción indica dirección de habla a una persona; en español natural corresponde «a».
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española estándar y reconocible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La forma infinitiva introduce la fórmula de discurso; «diciendo» conserva ese marcador formal sin expandir el sentido.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo contiene explícitamente el Tetragrámaton. En español, «Yahvé» mantiene la transliteración del nombre propio divino y evita la sustitución por un título. Esto sigue la intención de transparencia del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés auditado eligió «Then Yahweh spoke to Joshua, saying» y su nota reconoce la alternancia entre «and/then». La versión española sigue esa misma opción narrativa con «Entonces» y conserva el nombre divino como «Yahvé», sin necesidad de cambios de revisión respecto del criterio doctrinal vigente.
  spanish_consistency_notes:
  - Se mantiene la fórmula narrativa breve propia de introducción de discurso divino.
  - Se evita «SEÑOR» por coherencia con la política del proyecto sobre el nombre divino.
  - «Josué» sigue la convención española estándar para el nombre propio bíblico.
