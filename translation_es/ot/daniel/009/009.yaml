translation:
  language: es
  text: Al Señor nuestro Dios pertenecen la compasión y el perdón[a], porque nos hemos rebelado contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “las misericordias y los perdones”. El hebreo usa sustantivos en plural para ambos términos, lo cual puede expresar abundancia o funcionar como abstracto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַאדֹנָי
  english_pob_choice: To the Lord belong
  chosen_spanish: A Yahvé
  alternatives_spanish:
  - Pertenecen a Yahvé
  - A el Señor
  - Al Señor pertenecen
  lexicon: HALOT
  rationale: El hebreo expresa pertenencia con la preposición ל. En español, para conservar la relación de posesión/correspondencia sin volver la frase pesada, se inicia con 'A Yahvé' y se completa con el verbo implícito en la cláusula. Se usa 'Yahvé' según el criterio del proyecto para יהוה, manteniendo el tono de oración dirigido a Dios.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  - nuestro Dios
  lexicon: HALOT
  rationale: El sufijo de primera persona plural se vierte naturalmente como 'nuestro Dios'. Esta forma conserva el vínculo pactual y la dirección de la oración.
- source_word: הָרַחֲמִים
  english_pob_choice: compassion
  chosen_spanish: la compasión
  alternatives_spanish:
  - las misericordias
  - las compasiones
  lexicon: HALOT
  rationale: Aunque el hebreo usa plural, en español la abstracción singular 'compasión' comunica con naturalidad el valor colectivo del plural hebreo, sin perder su intensidad afectiva.
- source_word: וְהַסְּלִחוֹת
  english_pob_choice: forgiveness
  chosen_spanish: el perdón
  alternatives_spanish:
  - los perdones
  - el perdón
  lexicon: HALOT
  rationale: El plural hebreo puede funcionar como plural abstracto. En español, 'perdón' es la forma más natural y digna para expresar la idea de absolución divina, evitando un plural poco idiomático.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: 'En contexto confesional, כִּי introduce la razón de la apelación: la petición se enmarca en la realidad de la rebelión. ''Porque'' expresa claramente esa relación causal en español.'
- source_word: מָרַדְנוּ
  english_pob_choice: we have rebelled
  chosen_spanish: nos hemos rebelado
  alternatives_spanish:
  - hemos rebelado
  - nos rebelamos
  lexicon: HALOT
  rationale: מרד denota rebelión deliberada, no simple pecado general. 'Nos hemos rebelado' conserva el valor verbal de la acción consumada con relevancia presente en la confesión.
- source_word: בּוֹ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - contra él
  - en él
  lexicon: HALOT
  rationale: Con מרד, la preposición indica oposición contra una persona. 'Contra él' es la forma idiomática y exacta en español.
theological_decisions:
- issue: Título divino en la invocación
  english_pob_reading: Lord ... God
  chosen_spanish_reading: Yahvé ... nuestro Dios
  alternative_spanish_readings:
  - Señor ... nuestro Dios
  - el Señor ... nuestro Dios
  rationale: Se sigue el criterio del proyecto de no ocultar el nombre divino cuando el hebreo lo identifica explícitamente. 'Yahvé' preserva la referencia directa al tetragrámaton y mantiene el tono de oración reverente.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יהוה → Yahvé); Translation philosophy §2'
- issue: Plural hebreo de compasión y perdón
  english_pob_reading: compassion and forgiveness
  chosen_spanish_reading: la compasión y el perdón
  alternative_spanish_readings:
  - las compasiones y los perdones
  - misericordias y perdones
  rationale: El hebreo presenta plurales que pueden intensificar o abstraer. En español, el singular abstracto evita una lectura artificial, pero la nota conserva la alternativa plural para reflejar la tensión léxica documentada.
  doctrine_reference: 'Hebreo bíblico: plurales abstractos/intensivos; HALOT s.v. רחמים, סליחות'
translation_notes:
  revision_awareness: 'El pasaje coincide con el último pase del texto inglés: no hubo revisiones aplicadas y el dictamen de concordancia fue alto. La redacción española sigue esa lectura sin introducir cambios interpretativos adicionales.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se conserva 'contra él' para מרד + בּוֹ, evitando la calca 'en él'.
  - Se prefieren sustantivos abstractos singulares ('compasión', 'perdón') para reflejar el plural hebreo de manera natural en español.
  - La estructura inicial reproduce el valor de pertenencia de לַאדֹנָי sin añadir contenido doctrinal no respaldado por el texto.
