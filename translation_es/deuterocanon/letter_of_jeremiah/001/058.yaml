translation:
  language: es
  text: Así que es mejor un rey que muestra su propia valentía que los falsos dioses[a], o una vasija útil en una casa, que su dueño usará, o una puerta en una casa que protege lo que hay dentro de ella, que los falsos dioses, y un poste de madera en palacios es mejor que los falsos dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego repite «que los falsos dioses» después de cada comparación para dar énfasis; la traducción conserva esa repetición en la medida en que el español lo permite.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: Introduce la conclusión del razonamiento con una fórmula natural en español, sin perder el valor inferencial del griego.
- source_word: κρεῖσσον
  english_pob_choice: better
  chosen_spanish: es mejor
  alternatives_spanish:
  - es superior
  - vale más
  lexicon: BDAG
  rationale: Mantiene el comparativo explícito y claro, acorde con la cadena de contrastes del versículo.
- source_word: βασιλέα
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - el rey
  lexicon: BDAG
  rationale: El acusativo sin artículo tiene valor genérico; en español, 'un rey' conserva esa generalidad.
- source_word: ἐπιδεικνύμενον τὴν ἑαυτοῦ ἀνδρείαν
  english_pob_choice: who displays his own courage
  chosen_spanish: que muestra su propia valentía
  alternatives_spanish:
  - que demuestra su propio valor
  - que manifiesta su propia bravura
  lexicon: BDAG
  rationale: '''Valentía'' expresa bien ἀνδρεία en español contemporáneo. ''Su propia'' refleja el énfasis reflexivo de ἑαυτοῦ.'
- source_word: σκεῖος
  english_pob_choice: vessel
  chosen_spanish: vaso
  alternatives_spanish:
  - vasija
  - recipiente
  lexicon: BDAG
  rationale: En este contexto doméstico, 'vaso' funciona como término amplio para un objeto utilitario; conserva la imagen de uso práctico sin precisar más de lo que el griego da.
- source_word: χρήσιμον
  english_pob_choice: useful
  chosen_spanish: útil
  alternatives_spanish:
  - aprovechable
  - de uso
  lexicon: BDAG
  rationale: Adjetivo directo y natural que expresa utilidad práctica, en contraste con los ídolos inútiles.
- source_word: ἐφʼ ᾧ χρήσεται ὁ κεκτημένος
  english_pob_choice: which its owner will use
  chosen_spanish: que su dueño usará
  alternatives_spanish:
  - que el que lo posee usará
  - que su poseedor usará
  lexicon: BDAG
  rationale: '''Dueño'' es una equivalencia natural para ὁ κεκτημένος en este contexto, donde la posesión y el uso doméstico van juntos.'
- source_word: οἱ ψευδεῖς θεοί
  english_pob_choice: the false gods
  chosen_spanish: los falsos dioses
  alternatives_spanish:
  - los dioses falsos
  - los dioses engañosos
  lexicon: BDAG
  rationale: '''Falsos dioses'' es la equivalencia más clara para la caracterización polémica de los ídolos.'
- source_word: θύρα
  english_pob_choice: a door
  chosen_spanish: una puerta
  alternatives_spanish:
  - un portón
  - una entrada
  lexicon: BDAG
  rationale: En una casa, 'puerta' es la opción natural y precisa.
- source_word: διασώζουσα τὰ ἐν αὐτῇ ὄντα
  english_pob_choice: that keeps safe the things in it
  chosen_spanish: que guarda lo que está dentro de ella
  alternatives_spanish:
  - que conserva lo que hay en ella
  - que protege lo que está en ella
  lexicon: BDAG
  rationale: '''Guarda'' conserva la idea de preservar/proteger y suena idiomático en español. ''Lo que está dentro de ella'' evita añadir contenido no explícito.'
- source_word: ξύλινος στύλος
  english_pob_choice: a wooden pillar
  chosen_spanish: un poste de madera
  alternatives_spanish:
  - un pilar de madera
  - una columna de madera
  lexicon: BDAG
  rationale: '''Poste de madera'' comunica la materialidad y la función estructural de στύλος con naturalidad; en español evita una solemnidad innecesaria.'
- source_word: ἐν βασιλείοις
  english_pob_choice: in palaces
  chosen_spanish: en palacios
  alternatives_spanish:
  - en casas reales
  - en residencias reales
  lexicon: BDAG
  rationale: '''Palacios'' es la correspondencia más natural para el plural de edificios reales.'
theological_decisions:
- issue: Repetición de la comparación con los falsos dioses
  english_pob_reading: Preserve the repeated comparisons explicitly rather than smoothing them into a single summary statement.
  chosen_spanish_reading: Conservar la repetición de 'los falsos dioses' en cada comparación principal, sin resumirla en una sola frase.
  alternative_spanish_readings:
  - Reducir la repetición y dejar solo una mención final a los falsos dioses
  - Reformular como una lista unificada con una sola comparación general
  rationale: La repetición forma parte de la fuerza retórica del pasaje griego y de su burla contra los ídolos; conviene mantenerla aunque resulte algo enfática en español.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El audit trail inglés indica una revisión que reordenó la estructura comparativa para hacer más clara la relación entre cada elemento y 'los falsos dioses'. Esta versión española sigue esa decisión, evitando la secuencia 'o... o... o...' en posiciones ambiguas y manteniendo una comparación paralela y legible.
  spanish_consistency_notes:
  - Se mantiene 'los falsos dioses' como término fijo para οἱ ψευδεῖς θεοί.
  - Se usa 'vaso' y 'poste de madera' para reflejar la materialidad concreta del contraste, sin introducir un registro eclesiástico.
  - Se conserva el paralelismo enumerativo del original, con ritmo natural en español.
  - No se emplea 'SEÑOR' ni terminología de otros contextos, porque aquí el texto trata de ídolos falsos y no del nombre divino.
