  yaml_path: translation/ot/judges/014/015.yaml
  text: And on the seventh day they said to Samson’s wife[a], “Entice your husband so that he may tell us the riddle, lest we burn you and your father’s household with fire[b]. Did you invite us to dispossess us? Is that not so?”
  footnotes:
