translation:
  language: es
  text: Matará a tus hijas en el campo con la espada[a]; levantará contra ti un muro de asedio, alzará contra ti una rampa de asedio y levantará contra ti un gran escudo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "tus ciudades hijas" o "tus aldeas del campo"; el hebreo dice literalmente "tus hijas en el campo", refiriéndose a asentamientos dependientes.'
    reason: lexical_alternative
  - marker: b
    text: '"Gran escudo" puede referirse más específicamente a protección de asedio, como un mantelete o una cobertura escudada usada en operaciones de asalto.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּנוֹתַיִךְ
  english_pob_choice: your daughters
  chosen_spanish: tus hijas
  alternatives_spanish:
  - tus aldeas hijas
  - tus poblados hijos
  - tus ciudades hijas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tus hijas'. En este contexto profético y militar puede aludir a asentamientos dependientes de la ciudad principal. En español, 'hijas' conserva la imagen concreta del original; la nota preserva la alternativa idiomática de poblados dependientes.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la llanura
  - en el campo y fuera de la ciudad
  lexicon: HALOT
  rationale: '''En el campo'' reproduce bien la escena de la destrucción fuera del recinto principal y suena natural en español. Mantiene la imagen abierta del hebreo sin precisar más de lo que el texto exige.'
- source_word: בַּחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - a espada
  lexicon: HALOT
  rationale: La expresión instrumental normal en español es 'con la espada'. Conserva el sentido bélico directo del hebreo.
- source_word: יַהֲרֹג
  english_pob_choice: he will kill
  chosen_spanish: matará
  alternatives_spanish:
  - matará de muerte
  - dará muerte
  - abatirá
  lexicon: HALOT
  rationale: El verbo hebreo indica matar en futuro simple. 'Matará' es claro y fiel, sin intensificar innecesariamente el matiz literario de 'slay'.
- source_word: דָּיֵק
  english_pob_choice: siege wall
  chosen_spanish: obras de asedio
  alternatives_spanish:
  - muro de asedio
  - muralla de asedio
  - líneas de asedio
  lexicon: HALOT
  rationale: El término es técnico y puede referirse a una instalación o estructura de asedio. Dado que el inglés revisado se movió entre 'siege works' y 'siege wall', en español 'obras de asedio' conserva amplitud semántica sin fijar una sola pieza militar quizá demasiado específica. La nota y el paralelismo con 'rampa de asedio' mantienen la imaginería bélica.
- source_word: סֹלְלָה
  english_pob_choice: a siege ramp
  chosen_spanish: una rampa de asedio
  alternatives_spanish:
  - un terraplén de asedio
  - un monte de asedio
  - un talud de asedio
  lexicon: HALOT
  rationale: '''Rampa de asedio'' expresa con claridad la función militar del término hebreo. Es un equivalente natural y preciso en español contemporáneo.'
- source_word: צִנָּה
  english_pob_choice: a large shield
  chosen_spanish: un gran escudo
  alternatives_spanish:
  - un escudo grande
  - un gran broquel
  - una cobertura de protección
  lexicon: HALOT
  rationale: '''Gran escudo'' conserva el valor básico del sustantivo y la cualidad de protección en contexto de sitio. ''Broquel'' sería menos transparente; ''escudo grande'' es comprensible pero menos idiomático que ''gran escudo''.'
- source_word: וְנָתַן ... וְשָׁפַךְ ... וְהֵקִים
  english_pob_choice: he will set up ... throw up ... raise
  chosen_spanish: levantará ... alzará ... levantará
  alternatives_spanish:
  - pondrá ... derramará ... levantará
  - establecerá ... levantará ... alzará
  lexicon: HALOT
  rationale: Los verbos hebreos describen acciones de construcción/levantamiento en un contexto de sitio. 'Levantará' y 'alzará' transmiten el movimiento de elevar o erigir elementos defensivos/ofensivos, manteniendo un español natural y el encadenamiento profético del original.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que especifica 'a siege wall' y 'a siege ramp'. En español, se prefirió una solución más amplia para דָּיֵק ('obras de asedio') porque el hebreo y el historial inglés muestran una oscilación entre una estructura concreta y una designación general de maquinaria/instalación de asedio. Se mantuvo el paralelismo militar y la secuencia verbal profética, sin reducir la ambigüedad documentada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva el estilo profético en futuro simple para el encadenamiento de acciones.
  - '''Espada'' y ''campo'' se usan en sentido bélico literal, no metafórico.'
  - Se evita 'Señor' o equivalentes eclesiásticos no presentes en el hebreo.
  - '''Obras de asedio'' se eligió para respetar la amplitud del término técnico y no forzar una concreción no segura.'
