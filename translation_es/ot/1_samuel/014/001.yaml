base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/014/001.yaml
  text: Now one day Jonathan son of Saul said to the young man who carried his armor[a], “Come[b], let us cross over to the Philistine garrison that is on the other side.” But he did not tell his father.
  footnotes:
  - marker: a
    text: Or “the Philistine outpost.” The Hebrew term can denote a military post or stationed force.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “which is from/across the other side of this one,” likely referring to the pass described in the following verses.
    reason: cultural_note
