translation:
  language: es
  text: Por eso[a], si uno de ellos cae a tierra, no pueden levantarse por sí mismos; y si alguien lo pone en pie, no se moverá por sí mismo; y si se inclina, ciertamente no será enderezado. Más bien[b], se les presentan dones, como a los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: ‘no sea que caiga a tierra, para levantarse por sí mismos’; el sentido es que, si un ídolo cae, no puede levantarse solo.'
    reason: lexical_alternative
  - marker: b
    text: ‘Dones’ también puede traducirse ‘ofrendas’ en este contexto cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τό
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: LSJ
  rationale: Expresa la inferencia lógica del contexto sin sonar artificial. ‘Por eso’ conserva el valor conclusivo del griego y funciona bien en español moderno.
- source_word: μή ποτε ἐπὶ τὴν γῆν πέσῃ
  english_pob_choice: if one of them falls to the ground
  chosen_spanish: si uno de ellos cae a tierra
  alternatives_spanish:
  - si uno de ellos cae al suelo
  - para que no caiga a tierra
  lexicon: LSJ
  rationale: Sigo la revisión inglesa que entiende la referencia a los ídolos mismos. ‘A tierra’ mantiene la imagen bíblica y evita suavizarla con una paráfrasis.
- source_word: δι' αὐτῶν ἀνίστασθαι
  english_pob_choice: they cannot raise themselves up
  chosen_spanish: no pueden levantarse por sí mismos
  alternatives_spanish:
  - no pueden alzarse por sí mismos
  - no pueden levantarse ellos mismos
  lexicon: LSJ
  rationale: 'El sentido reflexivo es el decisivo: los ídolos no tienen capacidad de recuperarse. ‘Levantarse por sí mismos’ comunica de forma natural la imposibilidad de auto-restauración.'
- source_word: μήτε ἐὰν τις αὐτὸ ὀρθὸν στήσῃ
  english_pob_choice: if someone sets it upright
  chosen_spanish: si alguien lo pone en pie
  alternatives_spanish:
  - si alguien lo coloca en posición recta
  - si alguien lo endereza
  lexicon: LSJ
  rationale: ‘Poner en pie’ conserva la imagen física de erguir un objeto y evita una traducción demasiado técnica. El pronombre singular ‘lo’ sigue el uso representativo del texto griego.
- source_word: δι' ἑαυτοῦ κινηθήσεται
  english_pob_choice: it will not move by itself
  chosen_spanish: no se moverá por sí mismo
  alternatives_spanish:
  - no se moverá solo
  - no tendrá movimiento propio
  lexicon: LSJ
  rationale: Mantiene el matiz de autmovimiento imposible. ‘Por sí mismo’ reproduce bien la idea de incapacidad intrínseca del ídolo.
- source_word: μήτε ἐὰν κλιθῇ, οὐ μὴ ὀρθωθῇ
  english_pob_choice: if it is tilted, it will certainly not be made straight
  chosen_spanish: si se inclina, ciertamente no será enderezado
  alternatives_spanish:
  - si se tuerce, ciertamente no será enderezado
  - si se ladea, de ningún modo será enderezado
  lexicon: LSJ
  rationale: ‘Enderezado’ expresa adecuadamente ορθωθῇ y conserva el contraste con ‘inclinada/erguida’. La negación enfática se refleja con ‘ciertamente no’.
- source_word: ἀλλ' ὥσπερ νεκροῖς
  english_pob_choice: Rather, ... as before the dead
  chosen_spanish: Más bien, ... como a los muertos
  alternatives_spanish:
  - sino que ... como a los muertos
  - antes bien, ... como a los muertos
  lexicon: LSJ
  rationale: ‘Más bien’ reproduce el giro adversativo y fluye naturalmente en español. ‘A los muertos’ conserva el punto de comparación de personas muertas, no un objeto inanimado sin más.
- source_word: τὰ δῶρα αὐτοῖς παρατίθεται
  english_pob_choice: gifts are set before them
  chosen_spanish: se les ponen dones delante
  alternatives_spanish:
  - se les colocan dones delante
  - se les presentan ofrendas
  lexicon: LSJ
  rationale: ‘Dones’ mantiene el amplio alcance de δῶρα. ‘Poner delante’ refleja παρατίθεται con fidelidad y suena idiomático en español.
theological_decisions:
- issue: Referencia de los pronombres a los ídolos en singular y plural
  english_pob_reading: Use singular in the conditional clauses and plural in the concluding comparison
  chosen_spanish_reading: Usar singular representativo en las cláusulas condicionales y plural en la comparación final
  alternative_spanish_readings:
  - 'Usar plural en todas las cláusulas: ‘si caen... si alguien los pone en pie...’'
  - Usar singular en todo el versículo como si fuera un solo ídolo
  rationale: El griego oscila entre formas singulares y plurales dentro de una descripción general. En español, el singular representativo en las acciones concretas y el plural en la clausula final refleja bien el cambio sin borrar la referencia colectiva.
  doctrine_reference: 'Principio de traducción: claridad natural sin perder las oscilaciones del texto fuente.'
- issue: Sentido de δῶρα en contexto idolátrico
  english_pob_reading: ‘Gifts’ may also be rendered ‘offerings’ in this cultic context
  chosen_spanish_reading: ‘Dones’ con posible matiz cultual de ‘ofrendas’
  alternative_spanish_readings:
  - ofrendas
  - presentes
  rationale: En el contexto de culto a ídolos, δῶρα puede ser ‘dones’ u ‘ofrendas’. El texto principal conserva la amplitud del término; la nota permite la alternativa cultual sin forzarla como única opción.
  doctrine_reference: 'Criterio semántico: conservar amplitud léxica cuando el contexto admite varias lecturas legítimas.'
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente que añadió ‘of them’ para precisar que la caída a tierra se refiere a los ídolos mismos. En español se refleja con ‘uno de ellos’. También he conservado la estructura acumulativa de las tres imposibilidades y el cierre comparativo final sin suavizar la tensión entre singular representativo y plural colectivo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma predeterminada para el nombre divino, aunque este versículo no lo contiene.
  - Se conserva ‘dones’ para δῶρα en el texto principal, con ‘ofrendas’ como alternativa cultual en nota.
  - 'La secuencia verbal sigue el paralelismo del griego: caída, imposibilidad de auto-levantarse, imposibilidad de permanecer/moverse erguido, imposibilidad de ser enderezado.'
