    issue: «derramaba agua» traduce de forma imprecisa יָצַק מַיִם
    rationale: En español, «derramar» suele sugerir que algo se vuelca o se desperdicia. El hebreo y la auditoría inglesa preservan la imagen de servir/verter agua sobre las manos de Elías como acto de servicio personal.
  - severity: medium
    issue: El imperfecto «derramaba» no sigue la decisión auditada final
    rationale: La revisión inglesa cambió a «who poured», evitando añadir matiz habitual. En español, «vertió» o «echó» refleja mejor esa decisión sin sobreinterpretar el aspecto.
  - severity: low
