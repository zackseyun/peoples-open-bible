translation:
  language: es
  text: Y cuando Dios ayudó a los levitas que llevaban el arca del pacto de Yahvé[a], sacrificaron siete toros y siete carneros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el arca del pacto de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּעְזֹר
  english_pob_choice: when ... helped
  chosen_spanish: cuando ayudó
  alternatives_spanish:
  - al ayudar
  - mientras ayudaba
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa una circunstancia temporal; en español, «cuando ayudó» comunica de forma natural esa relación temporal sin perder el sentido de acción en curso.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, aquí designa al Dios de Israel; en español bíblico estándar «Dios» es la forma más clara y fiel, sin forzar un artículo innecesario.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: Es el equivalente directo y natural del grupo tribal/clánico, manteniendo el plural definido del hebreo.
- source_word: נֹשְׂאֵי
  english_pob_choice: who were carrying
  chosen_spanish: que llevaban
  alternatives_spanish:
  - que portaban
  - que cargaban
  lexicon: HALOT
  rationale: El participio describe la función continua de los levitas en la escena; «que llevaban» transmite bien esa acción sostenida en un español fluido.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahvé
  - el arca del pacto de Yahweh
  lexicon: HALOT
  rationale: Se conserva la cadena constructa con «arca del pacto de Yahvé», siguiendo el estándar del proyecto para el Tetragrámaton y manteniendo la referencia al pacto sin sustituir el nombre divino por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto para יְהוָה: transliteración del nombre divino como «Yahvé», no la sustitución por «SEÑOR».'
- source_word: וַיִּזְבְּחוּ
  english_pob_choice: they sacrificed
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - ofrecieron sacrificios
  - inmolaron como sacrificio
  lexicon: HALOT
  rationale: En contexto cultual, זבח se traduce de forma directa como «sacrificaron», que es conciso y fiel al acto ritual.
- source_word: שִׁבְעָה פָרִים
  english_pob_choice: seven bulls
  chosen_spanish: siete toros
  alternatives_spanish:
  - siete becerros
  - siete novillos
  lexicon: HALOT
  rationale: En este contexto sacrificial, פָרִים puede designar toros; «toros» conserva el valor sacrificial sin suavizarlo excesivamente.
- source_word: וְשִׁבְעָה אֵילִים
  english_pob_choice: and seven rams
  chosen_spanish: y siete carneros
  alternatives_spanish:
  - y siete ramos
  - y siete ovejas macho
  lexicon: HALOT
  rationale: אֵילִים corresponde a «carneros» en español bíblico actual; es preciso y natural en un contexto de sacrificio.
theological_decisions:
- issue: Sujeto plural del sacrificio
  english_pob_reading: they sacrificed
  chosen_spanish_reading: sacrificaron
  alternative_spanish_readings:
  - sacrificó
  rationale: El verbo hebreo está en 3.ª persona plural, por lo que el español debe mantener el plural sin convertirlo en singular ni atribuirlo indebidamente a David.
  doctrine_reference: Observación gramatical del hebreo consonántico y su morfología verbal
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo directamente y coincide con el sentido auditado del inglés POB: temporalidad («cuando»), sujeto plural, y preservación del nombre divino. Se mantiene la alternativa de la cadena posesiva del arca en nota, como en el registro inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «pacto» para בְּרִית, evitando sustituciones interpretativas.
  - «Toros» y «carneros» reflejan el léxico sacrificial de manera clara para lector bíblico hispanohablante.
  - La estructura general sigue el orden y la fuerza sintáctica del hebreo sin calco rígido.
