review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro inglés: mantiene a Esdras como sujeto, preserva el masculino explícito en «hombres», refleja la estructura appositiva «hombres, jefes...», expresa la reunión formal y el propósito de examinar el asunto. Sin embargo, dos puntos requieren ajuste para mayor fidelidad y claridad auditiva: «por nombre» suena poco natural en español para κατ’ ὄνομα, y falta la nota que preserve la alternativa literal de νουμηνία («luna nueva / novilunio»), ya documentada en el POB inglés.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «todos designados por nombre» resulta algo calcado; «todos designados por nombre» puede entenderse, aunque «todos designados por nombre[a]» con nota o una leve mejora a «todos designados por su nombre»/«cada uno por nombre» sería más natural. Además, «se congregaron» funciona, pero «se reunieron» o «se convocaron» sería un poco más idiomático en contexto administrativo; aun así, no es un error. El ajuste principal es añadir la nota calendárica y suavizar la expresión nominal.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen términos teológicos sensibles del glosario principal. Se preserva adecuadamente el lenguaje masculino-administrativo. La decisión sobre νουμηνία debe conservar la alternativa literal en nota, en línea con el precedente auditado.
  issues:
  - severity: medium
    issue: Falta la nota sobre νουμηνία
    rationale: 'El POB inglés preserva explícitamente en nota la lectura literal «on the new moon of the tenth month». En español conviene conservar esa trazabilidad con una nota anclada en «primer día[a]». '
  - severity: low
    issue: «designados por nombre» suena calcado
    rationale: Aunque comprensible, en español bíblico-natural suena más idiomático «designados por su nombre» o «nombrados individualmente». El griego κατ’ ὄνομα expresa designación nominal explícita, no una fórmula fija española «por nombre».
  revised_spanish_text: Y Esdras el sacerdote seleccionó para sí hombres, jefes de sus casas paternas, todos designados por su nombre, y se congregaron el primer día[a] del décimo mes para examinar el asunto.
  revised_footnotes:
  - marker: a
    text: Literalmente, «en la luna nueva del décimo mes», es decir, en el primer día del mes.
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción base por ser fiel al griego, pero se hace una mejora menor de naturalidad en «por su nombre» y se añade la nota necesaria para preservar la alternativa literal de νουμηνία ya documentada en el expediente inglés.
