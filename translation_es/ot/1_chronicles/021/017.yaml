base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/021/017.yaml
  text: Then David said to God[a], “Was it not I who said to count the people? I am the one who has sinned and done very wickedly. But these sheep—what have they done? O Yahweh my God, please let your hand be against me and against my father’s house[d][c][b], but not against your people with a plague.”
  footnotes:
  - marker: a
    text: Or 'I said to count the people' / 'I commanded that the people be numbered.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'these sheep,' a metaphor for the people.
    reason: cultural_note
  - marker: c
    text: Or 'let your hand be upon me and upon my father’s house.' 'Hand' is a Hebrew idiom for power or judgment.
    reason: lexical_alternative
  - marker: d
    text: Or 'but not on your people with a plague.'
    reason: lexical_alternative
