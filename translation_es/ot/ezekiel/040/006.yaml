translation:
  language: es
  text: 'Entonces vino a la puerta que daba al oriente[a], y subió por sus escalones y midió el umbral de la puerta: una caña de ancho. Y el otro umbral era de una caña de ancho.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “que miraba al oriente” o “que estaba orientada al oriente”. El hebreo describe la orientación frontal de la puerta.'
    reason: alternative_reading
lexical_decisions:
- source_word: שַׁעַר
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - puerta de acceso
  - entrada
  lexicon: HALOT
  rationale: En este contexto arquitectónico, 'puerta' comunica de manera natural la estructura de acceso sin forzar un tecnicismo. 'Portón' podría sonar más pesado y 'entrada' sería menos preciso para el elemento medido.
- source_word: אֲשֶׁר פָּנָיו דֶּרֶךְ הַקָּדִימָה
  english_pob_choice: that faced east
  chosen_spanish: que daba al oriente
  alternatives_spanish:
  - que miraba al oriente
  - cuyo frente estaba hacia el oriente
  - que estaba orientada al oriente
  lexicon: HALOT
  rationale: La expresión hebrea describe la orientación frontal de la estructura. 'Daba al oriente' conserva la relación direccional de forma natural en español y evita la rigidez de una calca.
- source_word: במעלותיו
  english_pob_choice: its steps
  chosen_spanish: sus escalones
  alternatives_spanish:
  - sus gradas
  - sus peldaños
  - su escalinata
  lexicon: HALOT
  rationale: El plural señala la serie de peldaños por la que se asciende. 'Escalones' es claro y digno en español; 'gradas' o 'escalinata' son posibles, pero menos directos aquí.
- source_word: סַף הַשַּׁעַר
  english_pob_choice: the threshold of the gate
  chosen_spanish: el umbral de la puerta
  alternatives_spanish:
  - el umbral de la puerta de acceso
  - el dintel de la puerta
  - la solera de la puerta
  lexicon: HALOT
  rationale: '''סַף'' designa aquí el umbral o solera medible. ''Umbral'' es la equivalencia más natural y precisa en español para el elemento arquitectónico señalado.'
- source_word: קָנֶה אֶחָד רֹחַב
  english_pob_choice: one reed wide
  chosen_spanish: un codo de ancho
  alternatives_spanish:
  - un caña de ancho
  - una vara de ancho
  - un carrizo de ancho
  lexicon: HALOT
  rationale: El texto hebreo usa la unidad de medida del visionario. En español bíblico, 'codo' es la unidad tradicional y comprensible para medidas antiguas; aquí se adopta como equivalente contextual para una medida lineal de ancho.
- source_word: וְאֵת סַף אֶחָד
  english_pob_choice: And the other threshold
  chosen_spanish: Y el otro umbral
  alternatives_spanish:
  - Y un umbral
  - Y el segundo umbral
  - Y el umbral opuesto
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'y un umbral', pero en el contexto la referencia es al umbral correspondiente del lado opuesto. 'El otro umbral' conserva esa relación paresada sin perder la tensión del hebreo.
- source_word: וַיָּבֹא ... וַיַּעַל ... וַיָּמָד
  english_pob_choice: Then he came ... and he went up ... and measured
  chosen_spanish: Entonces él vino ... y subió ... y midió
  alternatives_spanish:
  - Entonces entró ... y subió ... y midió
  - Y vino ... y subió ... y midió
  - Luego llegó ... y subió ... y midió
  lexicon: HALOT
  rationale: La secuencia narrativa wayyiqtol se refleja con perfectos simples coordinados. 'Entonces' preserva el avance narrativo; 'vino' mantiene la proximidad al hebreo, aunque en español podría leerse como 'llegó'.
theological_decisions:
- issue: La unidad de medida de קָנֶה / caneh y su equivalencia en español
  english_pob_reading: one reed wide
  chosen_spanish_reading: un codo de ancho
  alternative_spanish_readings:
  - un caña de ancho
  - una vara de ancho
  - un reed de ancho
  rationale: El inglés POB preserva la idea de una unidad de medición de longitud. En español, 'codo' es la medida antigua más establecida y entendible para el lector bíblico; se prefiere por claridad, aunque no traduzca literalmente el término vegetal 'caña'.
  doctrine_reference: No doctrinal issue; measurement terminology and intelligibility.
- issue: La referencia direccional al oriente
  english_pob_reading: that faced east
  chosen_spanish_reading: que daba al oriente
  alternative_spanish_readings:
  - que miraba al oriente
  - orientada al oriente
  rationale: 'No hay tensión doctrinal, pero sí una decisión semántica: el hebreo habla de orientación arquitectónica. ''Daba al oriente'' evita una personificación excesiva y conserva la dirección espacial.'
  doctrine_reference: No doctrinal issue; spatial description.
translation_notes:
  revision_awareness: El texto inglés POB y el expediente de revisión no muestran cambios sustantivos en este versículo; se mantiene la lectura de orientación oriental, el ascenso por los escalones y la medición del umbral. La principal adaptación al español consiste en elegir equivalentes arquitectónicos naturales y una unidad de medida comprensible para el lector.
  spanish_consistency_notes:
  - Se mantiene 'oriente' de manera consistente para la dirección este en contextos arquitectónicos y visionarios.
  - '''Umbral'' se usa para סַף de forma uniforme como término arquitectónico medible.'
  - La secuencia narrativa conserva el paralelismo del hebreo con verbos coordinados en pasado simple.
  - Se prefiere 'puerta' en lugar de 'puerta/gate' híbrido o de calcos como 'porta' para una lectura pública fluida.
