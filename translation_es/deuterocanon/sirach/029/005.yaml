review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del griego: adulación antes de recibir el préstamo, demora al pagar, excusas indiferentes y culpabilización de las circunstancias. Sin embargo, varias elecciones españolas no preservan bien la naturalidad ni la lógica interna del versículo. «Humillará la voz» es demasiado calcado en el texto principal y debía pasar a nota; «retrasará el tiempo» suena antinatural; la nota [a] está anclada en «su mano» cuando en realidad explica «humillará la voz»; y la nota [b] comenta la ironía de ἀποδώσει aunque está anclada en «retrasará».'
  spanish_quality_summary: 'La redacción actual resulta demasiado literal en puntos clave y afecta la legibilidad: «humillará la voz», «retrasará el tiempo» y «culpará el momento» no suenan idiomáticos en español bíblico actual. Se puede mantener la fidelidad con formulaciones más naturales: «bajará la voz», «dará largas» o «demorará», y «culpará al momento». También conviene corregir el anclaje de las notas para que correspondan al término explicado.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Prójimo» para πλησίον es defendible y legible. El problema principal no es de glosario sino de equivalencia idiomática y de la correcta ubicación de las notas léxicas.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «su mano», pero explica «humillará [su] voz».
    rationale: Esto desaline­a texto y nota, y puede confundir al lector sobre qué expresión se está comentando.
  - severity: high
    issue: «Humillará la voz» en el texto principal es demasiado forzado en español.
    rationale: Aunque refleja el literal griego, en español actual no es una expresión natural. La POB inglesa trasladó el literal a nota y usó una formulación idiomática en el texto principal; el español debería hacer lo mismo.
  - severity: medium
    issue: «Retrasará el tiempo» es antinatural.
    rationale: El griego expresa dilación o alargamiento del plazo. En español natural conviene «dará largas», «demorará» o «alargará el plazo».
  - severity: medium
    issue: La nota [b] comenta la ironía de «devolverá/repagará», pero está anclada en «retrasará».
    rationale: La nota debe ir en «devolverá» o equivalente, porque allí está el uso irónico del verbo ἀποδώσει.
  - severity: low
    issue: «Culpará el momento» suena rígido.
    rationale: «Culpará al momento» o «culpará al tiempo» comunica mejor la idea de echar la culpa a las circunstancias temporales.
