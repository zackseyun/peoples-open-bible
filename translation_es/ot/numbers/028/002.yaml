base_translation:
  language: en
  yaml_path: translation/ot/numbers/028/002.yaml
  text: Command the sons of Israel[a], and say to them, ‘My offering, my food for my food offerings, my pleasing aroma[c][b], you shall be careful to present to me at its appointed time.’
  footnotes:
  - marker: a
    text: Or, 'for my offerings by fire.' The Hebrew term refers to sacrificial offerings consumed on the altar.
    reason: lexical_alternative
  - marker: b
    text: '''Pleasing aroma'' is a stock sacrificial expression for an offering accepted by God.'
    reason: cultural_note
  - marker: c
    text: Or, 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
