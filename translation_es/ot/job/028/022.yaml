lexical_decisions:
- source_word: אֲבַדּוֹן
  english_pob_choice: Abaddon
  chosen_spanish: Abadón
  alternatives_spanish:
  - Destrucción
  lexicon: HALOT
  rationale: Se conserva el nombre/título personificado en transliteración española para mantener el paralelo poético con Muerte y no aplanar la figura en una abstracción.
- source_word: וָמָוֶת
  english_pob_choice: and Death
  chosen_spanish: y Muerte
  alternatives_spanish:
  - y muerte
  lexicon: HALOT
  rationale: Se mantiene la personificación en mayúscula inicial para reflejar el hablante poético del verso, sin convertirlo en un sustantivo meramente abstracto.
- source_word: אָמְרוּ
  english_pob_choice: say
  chosen_spanish: dicen
  alternatives_spanish:
  - dijeron
  lexicon: HALOT
  rationale: Se adopta el presente para conservar el valor gnómico/vivo del hebreo poético, en línea con la decisión inglesa de presentar la declaración como vigente en el marco del poema.
- source_word: בְּאָזְנֵינוּ
  english_pob_choice: With our ears
  chosen_spanish: Con nuestros oídos
  alternatives_spanish:
  - En nuestros oídos
  - Por nuestros oídos
  lexicon: HALOT
  rationale: La preposición con + instrumento corporal se vierte de manera natural en español, manteniendo la referencia explícita al órgano de la escucha.
- source_word: שָׁמַעְנוּ
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - oímos
  - hemos escuchado
  lexicon: HALOT
  rationale: El perfecto compuesto expresa una audición pasada con relevancia presente y suena más natural que un pretérito simple en este contexto poético.
- source_word: שִׁמְעָהּ
  english_pob_choice: a report of it
  chosen_spanish: un informe de ella
  alternatives_spanish:
  - un rumor de ella
  - una noticia de ella
  - su informe
  lexicon: HALOT
  rationale: Se traduce el sustantivo como ‘informe’ para conservar el sentido de noticia o reporte transmitido por oídas. El pronombre femenino se refiere a la sabiduría en el contexto inmediato; se evita neutralizarlo con ‘ello’ para no borrar esa referencia.
theological_decisions:
- issue: Personificación de Abadón y Muerte
  english_pob_reading: Treat both as personified speakers in the main text
  chosen_spanish_reading: Tratar a Abadón y Muerte como hablantes personificados
  alternative_spanish_readings:
  - Leer ‘Abadón’ como destrucción abstracta y ‘muerte’ sin personificación
  rationale: El verso los presenta hablando y oyendo, por lo que la traducción debe preservar esa personificación poética sin convertirla en una afirmación doctrinal adicional.
  doctrine_reference: Primacía del texto original; preservar la tensión poética y teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El pasaje hebreo fue leído con alto grado de acuerdo en la auditoría inglesa, sin revisiones aplicadas. La versión española sigue esa lectura estable, conservando la personificación y la referencia femenina de שִׁמְעָהּ al contexto de la sabiduría.
  spanish_consistency_notes:
  - Se mantiene ‘Abadón’ como transliteración consistente con el nombre/título personificado.
  - Se usa ‘Muerte’ con mayúscula por la personificación del verso, coherente con la elección de ‘Abadón’.
  - Se conserva el paralelismo poético con un ritmo breve y directo.
  - La nota al pie ofrece la alternativa lexical documentada sin desplazar la lectura principal.
