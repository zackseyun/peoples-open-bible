  yaml_path: translation/ot/ezekiel/044/019.yaml
  text: When they go out to the outer court[a], to the outer court where the people are, they shall take off the garments in which they minister and leave them in the holy chambers. Then they shall put on other garments[b], so that they may not sanctify the people with their garments.
  footnotes:
