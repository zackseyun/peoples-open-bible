translation:
  language: es
  text: Y al anochecer tomó a Lea, su hija, y se la llevó; y él se unió a ella[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''y él entró a ella'', un modismo convencional para relaciones sexuales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened / And
  chosen_spanish: Y
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva introduce la acción siguiente; en español, una simple conjunción conserva la secuencia sin forzar una fórmula arcaica.
- source_word: בָעֶרֶב
  english_pob_choice: in the evening
  chosen_spanish: al anochecer
  alternatives_spanish:
  - en la tarde
  - por la noche
  lexicon: HALOT
  rationale: El hebreo sitúa la escena en el comienzo de la noche; 'al anochecer' mantiene ese valor temporal de manera natural en español.
- source_word: וַיִּקַּח
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó consigo
  - se llevó
  lexicon: HALOT
  rationale: לקח aquí conserva su sentido narrativo básico de 'tomar'; 'tomó' es la forma más directa y no añade matices no explicitados por el texto.
- source_word: לֵאָה בִתּוֹ
  english_pob_choice: Leah his daughter
  chosen_spanish: Lea, su hija
  alternatives_spanish:
  - Lea su hija
  - a Lea, su hija
  lexicon: HALOT
  rationale: Se conserva la aposición hebrea entre el nombre y la relación filial, usando coma en español para que el vínculo sea claro y natural.
- source_word: וַיָּבֵא אֹתָהּ אֵלָיו
  english_pob_choice: and brought her to him
  chosen_spanish: y la llevó a él
  alternatives_spanish:
  - y la trajo a él
  - y la condujo a él
  lexicon: HALOT
  rationale: El hiphil de בוא expresa 'hacer venir' o 'llevar'; 'la llevó a él' refleja el movimiento hacia la persona indicada sin sobreespecificar.
- source_word: וַיָּבֹא אֵלֶיהָ
  english_pob_choice: and he went in to her
  chosen_spanish: y él entró a ella
  alternatives_spanish:
  - y se unió a ella
  - y tuvo relaciones con ella
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo con una formulación comprensible en español. 'Entró a ella' mantiene el carácter eufemístico sin reemplazarlo por una paráfrasis explícita.
theological_decisions:
- issue: Eufemismo sexual en וַיָּבֹא אֵלֶיהָ
  english_pob_reading: '''went in to her'' preserves the conventional Hebrew idiom for sexual relations.'
  chosen_spanish_reading: '''entró a ella'' preserva el giro idiomático, entendido como relación conyugal/sexual por el lector informado.'
  alternative_spanish_readings:
  - se unió a ella
  - tuvo relaciones con ella
  - la conoció
  rationale: La narración usa un eufemismo hebreo tradicional; en español conviene mantener la forma sin eliminar la reserva del original. 'Entró a ella' deja visible el hebraísmo y permite la misma lectura idiomática que el inglés POB documenta.
  doctrine_reference: Génesis 29:23; uso idiomático bíblico de בוא אל para unión sexual
translation_notes:
  revision_awareness: 'Coincide con el cierre de revisión más reciente: el inglés POB mantiene la estructura narrativa y el eufemismo hebreo sin cambios. Esta propuesta sigue esa misma lectura, adaptándola al español con equivalentes naturales y auditables.'
  spanish_consistency_notes:
  - Se usa 'Y' inicial para mantener el encadenamiento narrativo del hebreo sin añadir un adverbio innecesario.
  - '''Lea'' sigue la forma castellana habitual del nombre, sin alterar la relación posesiva.'
  - '''a él'' conserva la dirección del movimiento hacia la persona indicada en el hebreo.'
  - La nota [a] se ancla en 'entró a ella' porque allí está el principal valor idiomático que el POB inglés también documenta.
