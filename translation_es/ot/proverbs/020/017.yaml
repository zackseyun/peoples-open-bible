    rationale: En español suena más natural y proverbial «El pan de engaño es dulce...», sin cambiar el sentido ni añadir interpretación.
  - severity: low
    issue: La nota b está formulada con comillas y pasiva poco naturales.
    rationale: 'La forma actual «''O: «su boca será llenada de grava».»'' tiene puntuación extraña y una construcción menos idiomática. Debe ajustarse a español natural y al texto revisado.'
  revised_spanish_text: El pan de engaño es dulce para un hombre[a], pero después su boca se llena de gravilla[b].
