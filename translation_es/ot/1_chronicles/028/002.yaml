base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/028/002.yaml
  text: Then King David rose to his feet and said[a], “Hear me, my brothers and my people. It was in my heart to build a house of rest for the ark of the covenant of Yahweh, and for the footstool of our God[c][b], and I made preparations to build it.”
  footnotes:
  - marker: a
    text: Or “my kinsmen”; the Hebrew says “my brothers,” a masculine plural form used in a public address.
    reason: lexical_alternative
  - marker: b
    text: “House of rest” may also be rendered “resting place,” referring to a settled dwelling for the ark.
    reason: lexical_alternative
  - marker: c
    text: That is, the ark is described as the footstool associated with the presence of Israel’s God; compare Psalm 132:7.
    reason: cross_reference
