    text: 'Paralelo griego: «Que la bondad de un don esté delante de todo viviente, y no niegues bondad ni siquiera al muerto». El testimonio hebreo aquí dice en cambio: «También tiende tu mano al pobre, para que tu bendición llegue a plenitud».'
    reason: alternative_reading
  revision_rationale: Se propone una revisión menor para mejorar la naturalidad del español sin apartarse del hebreo ni de las decisiones documentadas del POB. «Tiende tu mano» conserva la imagen de ayuda generosa, y «llegue a plenitud» expresa mejor en español la idea de completitud de תִּשְׁלַם. La nota al pie se mantiene, con una leve mejora idiomática.
