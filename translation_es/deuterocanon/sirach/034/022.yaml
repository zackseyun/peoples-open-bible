translation:
  language: es
  text: El pan para los necesitados es la vida de los pobres; el que los priva de él es un hombre de sangre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un asesino» o «un hombre culpable de derramamiento de sangre». El griego dice literalmente «un hombre de sangre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρτος
  english_pob_choice: Bread
  chosen_spanish: Pan
  alternatives_spanish:
  - Alimento
  - Comida
  lexicon: LSJ
  rationale: «ἄρτος» puede funcionar literalmente como «pan», y en contexto sapiencial conserva bien la imagen concreta del sustento básico. «Pan» es la equivalencia más natural y fiel en español sin perder la fuerza simbólica del alimento indispensable.
- source_word: ἐπιδεομένων
  english_pob_choice: for the needy
  chosen_spanish: para los necesitados
  alternatives_spanish:
  - para los que carecen de lo necesario
  - para los pobres necesitados
  lexicon: LSJ
  rationale: El participio señala a quienes carecen de lo necesario. «Necesitados» expresa esa falta de manera clara y sobria en español, manteniendo el valor genitivo-relacional del griego.
- source_word: ζωὴ
  english_pob_choice: is the life
  chosen_spanish: es la vida
  alternatives_spanish:
  - es vida
  - sostiene la vida
  lexicon: LSJ
  rationale: La frase griega afirma que el pan constituye la vida/sustento de los pobres. «Es la vida» conserva la estructura predicativa y la intensidad del enunciado.
- source_word: πτωχῶν
  english_pob_choice: of the poor
  chosen_spanish: de los pobres
  alternatives_spanish:
  - de los necesitados
  - para los pobres
  lexicon: LSJ
  rationale: «πτωχῶν» designa a los pobres en sentido directo. «De los pobres» mantiene el genitivo simple y la correspondencia cercana con el griego.
- source_word: ὁ ἀποστερῶν
  english_pob_choice: the one who deprives
  chosen_spanish: el que despoja
  alternatives_spanish:
  - el que priva
  - el que les quita
  lexicon: LSJ
  rationale: «ἀποστερέω» puede significar privar, despojar o defraudar de lo debido. «Despoja» comunica con fuerza la acción de quitar lo necesario, sin introducir una lectura jurídica más estrecha que la del original.
- source_word: αὐτὴν
  english_pob_choice: them of it
  chosen_spanish: de él
  alternatives_spanish:
  - de eso
  - de ella
  lexicon: Greek grammar / context
  rationale: El pronombre griego vuelve a «ἄρτος» (masculino singular). En español, «de él» remite naturalmente al pan. Aunque el efecto recaiga sobre «los pobres», la construcción española puede mantener el objeto directo implícito y claro por contexto.
- source_word: ἄνθρωπος αἱμάτων
  english_pob_choice: a man of blood
  chosen_spanish: un hombre de sangre
  alternatives_spanish:
  - un asesino
  - un hombre culpable de derramamiento de sangre
  - un hombre sanguinario
  lexicon: LSJ
  rationale: La expresión literal preserva el giro semítico del griego y mantiene la tensión moral del texto. «Hombre de sangre» deja abierta la fuerza de culpabilidad por sangre sin reducirla a una categoría judicial más cerrada.
theological_decisions:
- issue: Cómo rendir ἄνθρωπος αἱμάτων sin neutralizar la acusación ética
  english_pob_reading: Retain the idiom 'a man of blood' rather than resolving it to 'murderer.'
  chosen_spanish_reading: Conservar el giro literal «un hombre de sangre».
  alternative_spanish_readings:
  - un asesino
  - un hombre culpable de sangre derramada
  rationale: El texto equipara privar a los pobres de pan con una culpa de sangre. Mantener la expresión literal preserva la severidad del juicio y el color idiomático del original, sin estrechar el sentido solo a homicidio técnico.
  doctrine_reference: Preservar tensión lexical y teológica; evitar resolver un modismo cargado cuando el original lo mantiene.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «the man who» por «the one who» para sonar más natural, pero mantuvo «man of blood» literal. La versión española sigue esa misma decisión de preservar el modismo final y ajusta la primera mitad con una estructura natural en español.
  spanish_consistency_notes:
  - Se conserva «pan» como imagen concreta de sustento básico, coherente con la decisión inglesa de mantener Bread.
  - «Necesitados» refleja la idea de carencia expresada por ἐπιδεομένων sin sobreexplicar.
  - «Hombre de sangre» mantiene el modismo y evita una paráfrasis que diluya la acusación.
  - La referencia del pronombre se deja clara por contexto y por la preposición «de él», en lugar de forzar un giro menos natural en español.
