review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: compara a los ídolos con una viga de casa, conserva ''corazones'', mantiene el consumo por criaturas que reptan y cierra con la insensibilidad de los ídolos. Sin embargo, hay dos puntos de fidelidad mejorables: ''son lamidos'' no refleja bien ἐκλείχεσθαι en este contexto, donde la idea es que sus corazones/interior ''son lamidos hasta desaparecer'' o ''van siendo lamidos''; y ''cosas que reptan'' suena poco idiomático en español bíblico, donde ''seres que se arrastran'' o ''animales que reptan'' comunica mejor ἑρπετῶν sin estrecharlo a ''reptiles''.'
  spanish_quality_summary: 'El texto es entendible, pero presenta giros poco naturales: ''sus corazones son lamidos'' suena extraño hasta el punto de entorpecer la lectura, y ''las cosas que reptan'' resulta tosco. Además, ''lo perciben'' es correcto, pero ''se dan cuenta de ello'' o ''lo notan'' sería más idiomático; aun así, ''perciben'' puede mantenerse por cercanía al matiz sensorial del griego. La revisión propuesta mejora naturalidad sin perder el tono digno.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Viga' para δοκός y 'corazones' para καρδίας están bien alineados con las decisiones auditadas. La principal corrección léxica es ajustar ἐκλείχεσθαι a un español que exprese mejor el desgaste/consumo progresivo, y cambiar 'cosas que reptan' por una opción más natural y amplia para ἑρπετῶν.
  issues:
  - severity: medium
    issue: '''son lamidos'' es demasiado literal y poco claro para ἐκλείχεσθαι'
    rationale: El verbo griego, basado en 'lamer', describe un desgaste o consumo gradual del interior de los ídolos. En español, 'sus corazones son lamidos' suena incompleto y opaco. 'se les van lamiendo los corazones' o 'sus corazones son lamidos hasta consumirse' comunica mejor el sentido sin borrar la imagen.
  - severity: medium
    issue: '''cosas que reptan'' es poco idiomático'
    rationale: Aunque intenta preservar la amplitud de ἑρπετά, en español 'cosas' para seres vivos suena impropio. 'seres que se arrastran' mantiene la amplitud y tiene resonancia bíblica natural.
  - severity: low
    issue: La nota al pie puede expresarse con mayor claridad
    rationale: Si el texto principal conserva 'corazones', la alternativa 'interiores' funciona mejor en español que 'sus interiores son lamidos', pero conviene aclarar que se trata del interior de las figuras, no de un corazón literal.
  revised_spanish_text: Son, en verdad, como una viga de una casa; pero dicen que se les van lamiendo los corazones[a]. Mientras los seres que se arrastran desde la tierra los devoran a ellos y también su ropa, no lo perciben.
  revised_footnotes:
  - marker: a
    text: O 'se les va consumiendo el interior'. El griego dice 'sus corazones', conservando la imagen antropomórfica.
    reason: lexical_alternative
  revision_rationale: 'Se conserva la estructura y las decisiones principales del POB auditado, pero se ajusta el español en dos lugares clave: ἐκλείχεσθαι se vierte de forma más inteligible como un proceso de desgaste (''se les van lamiendo los corazones'') y ἑρπετῶν se expresa naturalmente como ''los seres que se arrastran''. La nota al pie también se afina para ofrecer una alternativa idiomática en español sin perder la razón lexical documentada.'
