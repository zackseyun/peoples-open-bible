    text: Or, 'his blood will be upon him'—a Hebrew idiom meaning he bears responsibility for his own death.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he will deliver his soul/self.' Here 'life' fits the context of escaping death.
    reason: lexical_alternative
