review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo y del POB en inglés: pueblos, monte, sacrificios, abundancia de los mares y recursos escondidos de la arena. Sin embargo, omite el verbo final tras ''y de los tesoros escondidos de la arena'', lo que deja truncado el paralelismo de ''יִינָקוּ ... וּשְׂפוּנֵי טְמ֥וּנֵי חוֹל'' tal como el POB lo resolvió con ''draw from ... and from ...''. También conviene alinear mejor el orden y anclaje de notas con el audit trail inglés.'
  spanish_quality_summary: El español es claro y digno, pero la frase final queda gramaticalmente incompleta en español por falta de un verbo o repetición implícita suficientemente clara. 'Ofrecerán sacrificios de justicia' es aceptable, aunque 'sacrificios justos' sería más idiomático; no es necesario cambiarlo. La nota b está bien, pero la puntuación de las notas y el orden de anclaje puede mejorar para reflejar mejor el original auditado.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Pueblos'', ''monte'', ''justicia'' y ''mares'' están bien. ''Ofrecerán sacrificios'' es una adaptación aceptable de זבח, aunque ''sacrificarán'' sería más literal. ''Sacarán'' para יִינָקוּ funciona, pero debe gobernar también el segundo complemento: ''sacarán ... y ...'' o mejor ''extraerán ... y ...''.'
  issues:
  - severity: high
    issue: La cláusula final está elíptica de forma poco natural en español.
    rationale: 'El texto dice ''porque de la abundancia de los mares sacarán[b] y de los tesoros escondidos de la arena[c]''. En español esto queda truncado; falta repetir o hacer abarcar claramente el verbo para el segundo sintagma. El hebreo y el POB en inglés expresan que obtienen de ambos: de los mares y de los tesoros escondidos de la arena.'
  - severity: medium
    issue: El orden de notas no refleja bien el audit trail inglés.
    rationale: En el inglés, la nota sobre 'righteous sacrifices' y la de la imagen de 'draw from/suck' están asociadas al cuerpo del versículo de forma específica. En español conviene mantener anclajes claros y consistentes, especialmente en la parte final donde se explica la metáfora y la frase 'cosas escondidas/tesoros de la arena'.
  - severity: low
    issue: La nota c ofrece dos alternativas, una de ellas repite casi la lectura principal.
    rationale: 'Si el texto principal ya dice ''tesoros escondidos de la arena'', poner como alternativa ''tesoros ocultos de la arena'' añade poco valor. Es mejor conservar la alternativa más distintiva: ''cosas escondidas de la arena''.'
  revised_spanish_text: Llamarán a pueblos al monte[a]; allí ofrecerán sacrificios de justicia, porque sacarán[b] de la abundancia de los mares y de los tesoros escondidos de la arena[c].
