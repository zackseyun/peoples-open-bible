  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀δυνατεῖ δὲ ὁ θεὸς πᾶσαν χάριν περισσεῦσαι εἰς ὑμᾶς, ἵνα ἐν παντὶ πάντοτε πᾶσαν αὐτάρκειαν ἔχοντες περισσεύητε εἰς πᾶν ἔργον ἀγαθόν·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/009/008.yaml
  text: And God is able to make all grace abound to you[a], so that in everything, at all times, having all sufficiency, you may abound in every good work.
translation:
  language: ko
  text: 하나님은 모든 은혜를 여러분에게 넘치게 하실 수 있으니, 이는 여러분이 모든 일에서 언제나 모든 자족을 누리며 모든 선한 일에 풍성하게 하시려는 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χάριν
  english_pob_choice: grace
  chosen_korean: 은혜
  lexicon: BDAG
  rationale: 바울 표준어. 일관성 유지.
- source_word: περισσεῦσαι / περισσεύητε
  english_pob_choice: abound
  chosen_korean: 넘치게 / 풍성하게
  lexicon: BDAG
  rationale: 같은 동사가 두 번 등장. 첫 번째는 사역적 의미로 「넘치게 하다」, 두 번째는 자동사로 「풍성하다」. 두 의미를 한국어에서 변별한다.
- source_word: αὐτάρκεια
  english_pob_choice: sufficiency
  chosen_korean: 자족
  lexicon: BDAG
  rationale: 스토아 철학에서 차용된 어휘이나 바울에게는 그리스도 안의 충족을 가리킨다. 「자족」이 신학적·철학적 무게를 보존한다.
  alternatives_korean:
  - 충분함
  - 넉넉함
