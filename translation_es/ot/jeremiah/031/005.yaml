translation:
  language: es
  text: Otra vez plantarás viñedos en los montes de Samaria[a]; los plantadores plantarán y gozarán de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y los harán comunes», un modismo que se refiere a usar o disfrutar el producto del viñedo en el uso ordinario.
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֚וֹד
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Nuevamente
  - Otra vez más
  lexicon: HALOT
  rationale: En este contexto de restauración, עוֹד señala una acción renovada en el futuro. «Otra vez» expresa con naturalidad esa repetición y mantiene el tono de promesa.
- source_word: תִּטְּעִי
  english_pob_choice: you will plant
  chosen_spanish: plantarás
  alternatives_spanish:
  - sembrarás
  - tú plantarás
  - vas a plantar
  lexicon: HALOT
  rationale: El verbo está en imperfecto qal de segunda femenina singular. En español no se conserva la marca de género verbal, así que «plantarás» transmite el futuro directo sin sobrecargar el verso.
- source_word: כְרָמִים
  english_pob_choice: vineyards
  chosen_spanish: viñedos
  alternatives_spanish:
  - viñas
  - parras
  lexicon: HALOT
  rationale: «Viñedos» es el equivalente natural y claro de כְרָמִים, y conserva la imagen agrícola de restauración.
- source_word: בְּהָרֵי שֹׁמְרוֹן
  english_pob_choice: on the mountains of Samaria
  chosen_spanish: en los montes de Samaria
  alternatives_spanish:
  - sobre las montañas de Samaria
  - en las colinas de Samaria
  lexicon: HALOT
  rationale: «Montes» preserva el valor básico de הרים y suena natural en español. «De Samaria» mantiene el genitivo geográfico del hebreo.
- source_word: נָטְעוּ נֹטְעִים
  english_pob_choice: planters will plant
  chosen_spanish: los plantadores plantarán
  alternatives_spanish:
  - quienes plantan plantarán
  - los que plantan plantarán
  lexicon: HALOT
  rationale: La combinación de perfecto + participio del mismo verbo intensifica o enfatiza la acción. «Los plantadores plantarán» conserva esa repetición verbal y el sentido de certeza futura.
- source_word: וְחִלֵּלוּ
  english_pob_choice: and enjoy them
  chosen_spanish: y los disfrutarán
  alternatives_spanish:
  - y los usarán
  - y los comerán
  - y los gozarán
  lexicon: HALOT
  rationale: En contexto agrícola, חִלֵּל en piel expresa hacer común o entrar en el uso ordinario, es decir, disfrutar del fruto de la viña. «Los disfrutarán» comunica el sentido idiomático sin introducir «fruto», que no aparece explícitamente en el hebreo.
theological_decisions:
- issue: Destinataria femenina singular implícita
  english_pob_reading: The verse addresses personified Israel/Zion as a feminine singular, rendered simply as 'you' in English.
  chosen_spanish_reading: El verso conserva el singular femenino implícito en «plantarás», sin añadir un nombre interpretativo.
  alternative_spanish_readings:
  - «Tú plantarás»
  - «Oh, virgen Israel, plantarás»
  rationale: El hebreo apunta a Israel/Zion personificada como mujer. En español, el verbo ya refleja la segunda persona singular, pero no conviene sobreespecificar con un título que pertenece al contexto inmediato más amplio y no al verso mismo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de וְחִלֵּלוּ en contexto agrícola
  english_pob_reading: 'Idiomatic agricultural sense: the planters will enjoy/use the vineyard''s produce.'
  chosen_spanish_reading: «y los disfrutarán» como uso común y disfrute de lo producido.
  alternative_spanish_readings:
  - «y los profanarán»
  - «y los tratarán como comunes»
  - «y los usarán»
  rationale: El contexto es restauración y vida agrícola normal, no profanación ritual. La traducción debe reflejar el uso ordinario del producto de la viña, evitando una connotación cultual engañosa.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail al no añadir «fruto» ni otro complemento no explícito en el hebreo para וְחִלֵּלוּ, y mantiene la equivalencia óptima con una expresión idiomática natural en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente aquí, sino conforme al estándar del proyecto cuando corresponda; en este versículo no se requiere.
  - Se preservó el paralelismo verbal del hebreo con «los plantadores plantarán» para reflejar la repetición enfática de la raíz.
  - Se evitó «profanarán» porque en español introduce una lectura cultual ajena al contexto agrícola del pasaje.
