translation:
  language: es
  text: Allí[a] proclamen su grandeza, y exáltenlo ante todo ser viviente[b]; porque él es nuestro Señor, y él es nuestro Dios y nuestro Padre por todos los siglos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manifiesten su majestad»; el verbo griego puede significar «mostrar» o «dar a conocer», y el sustantivo también puede entenderse como «majestad».
    reason: lexical_alternative
  - marker: b
    text: Griego literalmente, «ante todo viviente». La expresión es amplia, aunque en el contexto se refiere más naturalmente a todas las personas vivas.
    reason: lexical_alternative
  - marker: c
    text: Griego literalmente, «por todos los siglos». La expresión subraya duración interminable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖ
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - En aquel lugar
  - Allá
  lexicon: LSJ
  rationale: Adverbio de lugar que mantiene la referencia al ámbito mencionado en el contexto inmediato. «Allí» es natural en español y conserva la fuerza retórica sin añadir especificación no presente en el griego.
- source_word: ὑποδείξατε
  english_pob_choice: declare
  chosen_spanish: proclamen
  alternatives_spanish:
  - declaren
  - muestren
  - hagan conocer
  lexicon: LSJ
  rationale: El verbo puede significar mostrar o hacer saber; aquí el contexto es de alabanza pública, por lo que «proclamen» comunica mejor la idea de dar a conocer abiertamente la grandeza divina.
- source_word: τὴν μεγαλοσύνην αὐτοῦ
  english_pob_choice: his greatness
  chosen_spanish: su grandeza
  alternatives_spanish:
  - su majestad
  - su magnificencia
  lexicon: LSJ
  rationale: «Grandeza» reproduce bien μεγαλοσύνη como exaltación de Dios sin forzar un registro demasiado ceremonial. La alternativa «majestad» es posible, pero «grandeza» sigue más de cerca la decisión auditada del inglés.
- source_word: ὑψοῦτε αὐτόν
  english_pob_choice: exalt him
  chosen_spanish: exáltenlo
  alternatives_spanish:
  - levántennlo en alto
  - magnifíquenlo
  lexicon: LSJ
  rationale: El imperativo de ὑψόω en contexto de alabanza se rinde naturalmente como «exaltar». La forma pronominal directa en español conserva el objeto explícito y la fuerza litúrgica del mandato.
- source_word: ἐνώπιον παντὸς ζῶντος
  english_pob_choice: before every living being
  chosen_spanish: ante todo ser viviente
  alternatives_spanish:
  - ante todo lo viviente
  - delante de cada ser vivo
  lexicon: LSJ
  rationale: La frase griega es literalmente amplia; «todo ser viviente» conserva esa amplitud sin restringirla solo a personas. En español suena más fluido que una traducción demasiado literal con «cada viviente».
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: LSJ
  rationale: Se mantiene el título reverencial tradicional y consistente con la convención del proyecto para κύριος en este tipo de contexto confesional.
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - deidad
  lexicon: LSJ
  rationale: Traducción estándar y adecuada; el contexto no exige otra matización.
- source_word: πατὴρ ἡμῶν
  english_pob_choice: our Father
  chosen_spanish: nuestro Padre
  alternatives_spanish:
  - Padre nuestro
  - Padre de nosotros
  lexicon: LSJ
  rationale: Conserva la relación filial confesional del texto griego. «Nuestro Padre» funciona bien como predicado y evita la inversión más litúrgica que podría sonar menos directa aquí.
- source_word: εἰς πάντας τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por todos los siglos
  alternatives_spanish:
  - para siempre
  - por todas las edades
  lexicon: LSJ
  rationale: «Por todos los siglos» reproduce con más transparencia el plural intensivo del griego y mantiene el matiz de duración indefinida que el inglés auditado expresó como «for all the ages» en nota.
theological_decisions:
- issue: 'Acumulación de títulos divinos: «nuestro Señor», «nuestro Dios» y «nuestro Padre»'
  english_pob_reading: Render all three as direct predicates of the one God, preserving the confessional accumulation.
  chosen_spanish_reading: «porque él es nuestro Señor, y él es nuestro Dios y nuestro Padre por todos los siglos»
  alternative_spanish_readings:
  - porque él es nuestro Señor, y él es nuestro Dios, nuestro Padre por todos los siglos
  - porque él es nuestro Señor y nuestro Dios y Padre por todos los siglos
  rationale: El griego repite αὐτός para enfatizar que el mismo referente recibe los títulos. En español conviene mantener esa acumulación sin fusionarla en una sola fórmula más suave, para no perder la tensión confesional del texto.
  doctrine_reference: Conservar la acumulación titulativa y la transparencia sintáctica; no suavizar la identificación de Dios como Señor, Dios y Padre.
translation_notes:
  revision_awareness: Se corrigió el anclaje de notas para que cada marcador aparezca exactamente en el texto español. También se ajustó la primera cláusula para evitar una referencia vaga y se mantuvo la acumulación de títulos divinos con puntuación transparente.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος conforme al estándar del proyecto.
  - Se usó «Dios» y «Padre» de forma directa para preservar la confesión del texto.
  - Se prefirió «por todos los siglos» para reflejar el plural intensivo del griego y armonizar con la nota alternativa al inglés.
