id: PHM.1.16
reference: Philemon 1:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐκέτι ὡς δοῦλον ἀλλὰ ὑπὲρ δοῦλον, ἀδελφὸν ἀγαπητόν, μάλιστα ἐμοί, πόσῳ δὲ μᾶλλον σοὶ καὶ ἐν σαρκὶ καὶ ἐν κυρίῳ.
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/016.yaml
  text: no longer as a slave[a], but more than a slave, a beloved brother—especially to me, but how much more to you[b], both in the flesh and in the Lord.
  footnotes:
  - marker: a
    text: Or 'as a servant' or 'as a bondservant'; the Greek word can cover a range of servile status, but here likely refers to Onesimus's bonded social condition.
    reason: alternative_reading
  - marker: b
    text: '''In the flesh'' here likely means in earthly or social relationship, or simply in person, not ''sinful nature.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 더 이상 노예[a]로서가 아니라 노예 그 이상으로, 곧 사랑하는 형제로서—내게는 더없이 그러하지만, 그대에게는 얼마나 더 그러하겠습니까—육신에서도[b] 또한 주 안에서도 그러합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「종으로서」 또는 「매인 종으로서」. 헬라어 δοῦλος는 매임의 범위를 두루 가리키지만, 본문에서는 오네시모의 매인 사회적 신분을 직접적으로 지시한다. 본 번역은 그 매임의 무게를 드러내기 위해 DOCTRINE.md에 따라 「노예」로 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 본 절의 「육신에서」는 「죄성」이 아니라 지상적·사회적 관계, 또는 단순히 인격적 만남을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_korean: 더 이상 ~가 아니라
  alternatives_korean:
  - 이제는 ~아니라
  lexicon: BDAG
  rationale: 시간적 부정. 신분의 변화를 명확히 표시한다.
- source_word: ὡς δοῦλον
  english_pob_choice: as a slave
  chosen_korean: 노예로서
  alternatives_korean:
  - 종으로서
  - 매인 종으로서
  lexicon: BDAG
  rationale: 빌레몬서의 사회적·법적 문맥에서 오네시모의 매인 신분이 본문의 중심이다. 「종」이 한국 전통의 친숙한 어휘이지만 봉사 기능을 시사할 뿐 매임의 무게를 약화시킨다. DOCTRINE.md의 원칙에 따라, 그리고 영어 POB가 「slave」를 선택한 것과 일관되게, 「노예」로 옮긴다. 이것이 본 서신의 수사적 심장(δοῦλος → ἀδελφός의 전환)을 한국어로 그대로 드러낸다.
- source_word: ὑπὲρ δοῦλον
  english_pob_choice: more than a slave
  chosen_korean: 노예 그 이상으로
  alternatives_korean:
  - 노예를 넘어서
  - 노예보다 더한 자로
  lexicon: BDAG
  rationale: ὑπέρ + 대격은 능가하는 가치·신분을 가리킨다. 「노예 그 이상으로」가 비교의 무게를 살리며 어휘를 일관되게 유지한다.
- source_word: ἀδελφὸν ἀγαπητόν
  english_pob_choice: a beloved brother
  chosen_korean: 사랑하는 형제
  alternatives_korean:
  - 사랑받는 형제
  - 친애하는 형제
  lexicon: BDAG
  rationale: 본 서신의 수사적 중심 — δοῦλος에서 ἀδελφὸς ἀγαπητός로의 전환. 「사랑하는 형제」가 그 따뜻함과 동등한 가족적 정체성을 가장 자연스럽게 담아낸다. 「사랑하는 자」 같이 무미건조하게 옮겨서는 안 된다.
- source_word: μάλιστα ἐμοί
  english_pob_choice: especially to me
  chosen_korean: 내게는 더없이 그러하지만
  alternatives_korean:
  - 특히 내게는
  - 누구보다도 내게는
  lexicon: BDAG
  rationale: μάλιστα는 최상급의 강조. 「더없이」가 그 절대적 강도를 잘 살린다. 문장의 흐름을 자연스럽게 잇기 위해 「그러하지만」을 더한다.
- source_word: πόσῳ δὲ μᾶλλον σοὶ
  english_pob_choice: but how much more to you
  chosen_korean: 그대에게는 얼마나 더 그러하겠습니까
  alternatives_korean:
  - 하물며 그대에게는 얼마나 더
  - 그대에게는 더욱
  lexicon: BDAG
  rationale: 비교 강화 관용 표현. 한국어 「얼마나 더 ~하겠습니까」가 그 수사적 무게를 가장 자연스럽게 살린다.
- source_word: ἐν σαρκὶ
  english_pob_choice: in the flesh
  chosen_korean: 육신에서도
  alternatives_korean:
  - 인간적으로도
  - 지상적 관계에서도
  lexicon: BDAG
  rationale: σάρξ는 여기서 「죄성」이 아니라 지상적·사회적 관계 또는 인간적 차원을 가리킨다. 본 번역은 직역 「육신에서」를 유지하며, 의미는 각주에서 명확히 한다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서도
  alternatives_korean:
  - 주 예수 안에서도
  lexicon: BDAG
  rationale: 바울의 정형 「주 안에」. κύριος의 기본값 「주」를 따른다.
theological_decisions:
- issue: δοῦλος를 「노예」로 옮김 (이 서신의 수사적 심장)
  chosen_reading: 노예
  alternative_readings:
  - 종
  - 매인 종
  - 종/하인
  rationale: 본 서신은 오네시모의 매인 사회적 신분을 그 수사적 중심에 둔다. 「노예」를 사용해야 매임의 무게가 보존되고, 「노예 그 이상으로 ... 사랑하는 형제」의 전환이 본문이 의도한 충격을 그대로 드러낸다. 한국 전통 번역의 「종」은 친숙하지만 매임을 약화시켜 본문의 수사적 힘을 무력화시킨다. DOCTRINE.md의 빌립보 1:1 원칙을 빌레몬서 전체에 적용한다 — 오히려 빌레몬서는 「노예」 선택의 본보기이다.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1; PHM 1:1 north-star rule for this letter'
- issue: δοῦλος → ἀδελφός의 전환 — 본 서신의 신학적 중심
  chosen_reading: 「노예로서가 아니라 노예 그 이상으로, 곧 사랑하는 형제로」 — 두 어휘를 그대로 대비하여 전환의 충격을 보존
  alternative_readings:
  - 「종이 아닌 형제로」 식으로 부드럽게 풀어 매임의 무게를 약화
  rationale: 본 절은 빌레몬서 전체의 신학적·수사적 심장이다. 바울은 「노예」와 「사랑하는 형제」를 의도적으로 대조해, 그리스도 안의 새로운 가족적 정체성이 사회적 매임을 어떻게 재정의하는지를 드러낸다. 본 번역은 두 어휘를 그대로 보존해 본문의 수사적 힘을 한국어로 살린다. 이것이 본 프로젝트의 북극성 원칙 — 「원저자가 청자에게 전하려 한 의미를 보존하고 강력한 진리를 그대로 옮긴다」 — 의 명백한 적용이다.
  doctrine_reference: 'DOCTRINE.md §1; PHM 1:1 본보기 적용; north-star principle'
- issue: ἐν σαρκὶ καὶ ἐν κυρίῳ의 의미
  chosen_reading: 육신에서도 또한 주 안에서도 그러합니다 — 두 영역을 그대로 대비
  alternative_readings:
  - 인격적으로도 주 안에서도
  - 지상적 관계에서도 그리스도인 관계에서도
  rationale: 빌레몬과 오네시모의 관계가 인간적·사회적 차원과 그리스도 안의 영적 차원 모두에서 변화됨을 가리킨다. 본 번역은 바울의 어휘를 그대로 보존하고 신학적 긴장을 풀이로 무너뜨리지 않는다.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3; Contested terms table for σάρξ'
