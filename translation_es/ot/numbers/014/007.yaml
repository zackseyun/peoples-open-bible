translation:
  language: es
  text: 'Y dijeron a toda la congregación de los hijos de Israel: «La tierra por la que pasamos para explorarla[a] es una tierra sumamente buena.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para reconocerla» o «para espiarla».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Y hablaron
  - Y expresaron
  lexicon: HALOT
  rationale: El verbo אמר en narración introduce discurso directo de manera natural con «decir»; en español «dijeron» conserva la función discursiva sin añadir matices no presentes.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the congregation of the sons of Israel
  chosen_spanish: toda la congregación de los hijos de Israel
  alternatives_spanish:
  - toda la asamblea de los israelitas
  - toda la congregación de los israelitas
  lexicon: HALOT
  rationale: עֲדָה puede ser «congregación» o «asamblea». Se mantiene «congregación» por transparencia con la estructura hebrea y porque es un equivalente eclesial inteligible. «hijos de Israel» preserva la forma fuente en vez de reducirla a «israelitas».
- source_word: לָתוּר אֹתָהּ
  english_pob_choice: to spy it out
  chosen_spanish: para reconocerla
  alternatives_spanish:
  - para explorarla
  - para espiarla
  - para reconocer el territorio
  lexicon: HALOT
  rationale: תור en este contexto narrativo implica recorrer con propósito de investigación. En español, «reconocerla» conserva la idea de inspección/exploración sin introducir el matiz fuerte de espionaje que «espiar» puede tener hoy. Se deja la referencia femenina porque remite a «la tierra».
- source_word: טוֹבָה
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - buena y excelente
  - agradable
  - excelente
  lexicon: HALOT
  rationale: 'El adjetivo básico es «bueno». En español concuerda naturalmente con «tierra» en femenino: «buena». No se sobrerrepresenta el valor con «excelente» porque la intensificación viene por el doble מְאֹד.'
- source_word: מְאֹד מְאֹד
  english_pob_choice: exceedingly good / very, very good
  chosen_spanish: sumamente buena
  alternatives_spanish:
  - muy, muy buena
  - excesivamente buena
  - extraordinariamente buena
  lexicon: HALOT
  rationale: La repetición intensiva pide un equivalente enfático, pero idiomático. «Sumamente» preserva la fuerza del hebreo y produce una frase publicable en español; «muy, muy» sería más literal pero menos elegante.
theological_decisions:
- issue: Cómo traducir עֲדַת בְּנֵי יִשְׂרָאֵל sin borrar la forma fuente ni volverla eclesialmente estrecha
  english_pob_reading: all the congregation of the sons of Israel; alternative 'all the assembly of the Israelites.'
  chosen_spanish_reading: toda la congregación de los hijos de Israel
  alternative_spanish_readings:
  - toda la asamblea de los israelitas
  - toda la congregación de los israelitas
  rationale: 'No hay tensión doctrinal, pero sí una decisión terminológica importante: «hijos de Israel» conserva la expresión hebrea, mientras «congregación» comunica el colectivo reunido. Se evita sustituirlo por una fórmula exclusivamente litúrgica que borre la referencia genealógica/textual.'
  doctrine_reference: None
- issue: Intensificación de טוֹבָה מְאֹד מְאֹד sin perder el hebreo repetitivo
  english_pob_reading: an exceedingly good land
  chosen_spanish_reading: una tierra sumamente buena
  alternative_spanish_readings:
  - una tierra muy, muy buena
  - una tierra extraordinariamente buena
  - una tierra excesivamente buena
  rationale: El hebreo usa repetición enfática. «Sumamente» comunica la intensidad de forma natural en español y evita la torpeza de duplicar «muy» o la posible sobreinterpretación de adverbios más fuertes. No se pierde el énfasis semántico principal.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de una traducción más literal y torpe («very, very good land») a una formulación más natural («an exceedingly good land») sin cambiar el contenido. La versión española sigue esa revisión: conserva el énfasis del doble מְאֹד con un equivalente idiomático («sumamente») y mantiene la relación sintáctica del hebreo con una redacción publicable y fiel.'
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» por transparencia con el hebreo y coherencia con el proyecto, no «israelitas» como normalización automática.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni una sustitución necesaria aquí.
  - «Reconocerla» se usa como alternativa semántica a «espiarla» para preservar el sentido de תור sin cargar el verbo con connotaciones modernas demasiado militares o secretivas.
  - La concordancia femenina en «buena» / «reconocerla» sigue a «la tierra».
