id: ISA.36.4
reference: Isaiah 36:4
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲלֵי/הֶם֙ רַב שָׁקֵ֔ה אִמְרוּ נָ֖א אֶל חִזְקִיָּ֑הוּ כֹּֽה אָמַ֞ר הַ/מֶּ֤לֶךְ הַ/גָּדוֹל֙ מֶ֣לֶךְ אַשּׁ֔וּר מָ֧ה הַ/בִּטָּח֛וֹן הַ/זֶּ֖ה אֲשֶׁ֥ר בָּטָֽחְתָּ־־־־׃
translation:
  text: 'Then the Rabshakeh said to them[a], “Please say to Hezekiah, ‘Thus says the great king[b], the king of Assyria: What is this confidence that you have trusted in?’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rabshakeh is likely an Assyrian official title; possible renderings include 'chief cupbearer' or another high-ranking court or military officer.
    reason: cultural_note
  - marker: b
    text: Or 'What is this trust that you trust in?' The Hebrew uses a noun and verb from the same root for rhetorical emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the field commander
  lexicon: HALOT
  rationale: Although the Akkadian-derived title likely denotes an Assyrian official, English tradition commonly treats it as a title/name. Retaining 'Rabshakeh' preserves the historical designation without overcommitting to a debated functional equivalent. The article is kept because Hebrew has the title with definite reference.
- source_word: אִמְרוּ נָא
  chosen: Please say
  alternatives:
  - Say, please
  - Kindly say
  lexicon: HALOT
  rationale: The imperative plus particle נָא softens the command. 'Please say' captures the politeness marker in natural modern English without sounding archaic.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name, following the translation policy to transliterate names.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus has said
  lexicon: HALOT
  rationale: This is the standard prophetic/messenger formula. 'Thus says' is concise, idiomatic, and preserves the formal heraldic tone.
- source_word: הַמֶּלֶךְ הַגָּדוֹל
  chosen: the great king
  alternatives:
  - the mighty king
  - the king, the great one
  lexicon: HALOT
  rationale: This reflects the Assyrian royal title straightforwardly. 'Great king' preserves the political boast and formal titulary.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Construct chain rendered in standard English possessive form. Repeating 'king' mirrors the Hebrew apposition and royal style.
- source_word: מָה
  chosen: What
  alternatives:
  - What kind of
  - What is
  lexicon: HALOT
  rationale: Introduces a rhetorical question. In English, 'What is this confidence...?' best reflects the interrogative force in context.
- source_word: הַבִּטָּחוֹן הַזֶּה
  chosen: this confidence
  alternatives:
  - this trust
  - this basis for confidence
  lexicon: HALOT
  rationale: The noun denotes confidence/trust. 'Confidence' fits the nominal form here better than repeating 'trust' immediately before the cognate verb, while still preserving the rhetorical challenge.
- source_word: אֲשֶׁר בָּטָחְתָּ
  chosen: in which you have trusted
  alternatives:
  - that you trust in
  - on which you rely
  lexicon: HALOT
  rationale: The relative clause with the cognate verb בָּטַח is preserved by using 'trusted.' 'Have trusted' gives a natural English perfect sense for the completed-present state implied in the taunt.
