    rationale: φείδομαι aquí expresa ‘escatimar’, ‘tener miramiento’, ‘perdonar la vida/daño’, no principalmente absolver una culpa. En español, «perdonar» tiende a leerse como remisión moral o jurídica, lo que desplaza el sentido.
  - severity: medium
    issue: La nota [a] está anclada en el lugar incorrecto
    rationale: La nota explica alternativas para μηνίσεως, pero el marcador aparece tras «no perdonaron» en vez de junto a «indignación», creando una asociación errónea.
