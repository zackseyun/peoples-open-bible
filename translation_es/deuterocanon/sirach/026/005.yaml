translation:
  language: es
  text: 'De tres cosas mi corazón temió, y ante la cuarta[a] supliqué:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, “en/ante el cuarto rostro”. Puede significar “ante la cuarta persona” o, más ampliamente, “la cuarta cosa”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τριῶν
  english_pob_choice: three things
  chosen_spanish: Desde tres cosas
  alternatives_spanish:
  - por tres cosas
  - a causa de tres cosas
  - de tres cosas
  lexicon: LSJ
  rationale: La preposición ἀπό con numeral introduce aquí los motivos del temor. En español, 'desde' conserva bien el arranque idiomático sin forzar una causalidad más fuerte de la que el griego expresa. 'Cosas' es el sustantivo implícito que mantiene la apertura referencial del texto.
- source_word: εὐλαβήθη
  english_pob_choice: was afraid
  chosen_spanish: tuvo temor
  alternatives_spanish:
  - se asustó
  - temió
  - tuvo miedo
  lexicon: BDAG
  rationale: El verbo puede abarcar cautela reverente o temor/aprehensión. Por el contexto inmediato de situaciones inquietantes, 'tuvo temor' comunica la reacción interna sin suavizarla ni volverla reverencia.
- source_word: ἡ καρδία μου
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - yo
  - mi mente
  lexicon: LSJ
  rationale: Se conserva la antropología bíblica de la 'corazón' como sede de la respuesta interior. No se reduce a 'yo' para no perder la imagen concreta.
- source_word: ἐπὶ τῷ τετάρτῳ προσώπῳ
  english_pob_choice: before a fourth
  chosen_spanish: ante la cuarta[a]
  alternatives_spanish:
  - ante la cuarta persona
  - ante el cuarto rostro
  - respecto de la cuarta
  lexicon: LSJ
  rationale: El griego dice literalmente 'sobre/en el cuarto rostro'. El español 'ante la cuarta' preserva la rareza del giro sin afirmar más de lo que el texto dice. La nota explica que πρόσωπον puede entenderse como 'rostro', 'persona' o, más libremente, 'cosa', según el contexto cercano.
- source_word: ἐδεήθην
  english_pob_choice: I prayed
  chosen_spanish: supliqué
  alternatives_spanish:
  - rogué
  - pedí
  - oré
  lexicon: BDAG
  rationale: δέομαι puede significar implorar o orar. 'Supliqué' mantiene el carácter de ruego intenso y es más cercano al matiz de petición que un simple 'oré'.
theological_decisions:
- issue: Cómo reflejar el crux de ἐπὶ τῷ τετάρτῳ προσώπῳ sin resolverlo indebidamente
  english_pob_reading: Retain the literal 'at the fourth face' in the main text, with a footnote noting possible senses
  chosen_spanish_reading: 'Mantener una forma breve y algo extraña: ''ante la cuarta[a]'''
  alternative_spanish_readings:
  - ante la cuarta persona
  - ante el cuarto rostro
  - ante la cuarta cosa
  rationale: No hay cuestión doctrinal principal, pero sí una ambigüedad léxica importante. El español conserva la tensión del original y deja abierta la identificación exacta de πρόσωπον, en línea con la cautela del POB inglés.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor semántico de εὐλαβήθη
  english_pob_reading: '''was afraid'' to capture apprehension rather than reverence'
  chosen_spanish_reading: '''tuvo temor'''
  alternative_spanish_readings:
  - '''temió'''
  - '''tuvo miedo'''
  rationale: El contexto enumera posibles desgracias; por eso el temor es de aprensión, no de reverencia. 'Tuvo temor' suena natural en registro bíblico y evita la banalidad de 'tuvo miedo'.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que suavizó la sintaxis de 'From three things my heart was afraid, and before a fourth I prayed'. Para el español se mantuvo la estructura abreviada y la ambigüedad de πρόσωπον, evitando resolverla con una interpretación demasiado específica.
  spanish_consistency_notes:
  - Se usa 'mi corazón' para preservar el hebraísmo/grecismo antropológico.
  - Se prefirió 'tuvo temor' como equivalente natural de εὐλαβήθη en este contexto de amenaza o aprensión.
  - Se mantuvo una construcción breve ('ante la cuarta') para reflejar la extrañeza del original sin forzarla.
  - La nota a pie de página está anclada explícitamente en el texto con [a].
