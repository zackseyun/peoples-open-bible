translation:
  language: es
  text: Y Bacchides se alejó de Jerusalén y acampó en Betzait[a], y envió y capturó a muchos de los hombres que se habían pasado a él, y a algunos del pueblo, y los inmoló[b] en el gran pozo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Bēxet’. El topónimo griego se translitera de forma conservadora porque su forma semítica subyacente no es segura en este versículo.
    reason: lexical_alternative
  - marker: b
    text: O ‘los sacrificó’. El verbo griego es literalmente ‘sacrificó’, pero aquí describe una matanza violenta y no una ofrenda cultual.
    reason: theological_note
  - marker: c
    text: O ‘foso’ o ‘cisterna’. El sustantivo griego φρέαρ puede referirse a un pozo, foso o cisterna, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  english_pob_choice: departed
  chosen_spanish: se alejó
  alternatives_spanish:
  - partió
  - se retiró
  lexicon: LSJ
  rationale: El verbo griego marca la salida de un lugar; «se alejó» comunica el movimiento desde Jerusalén sin añadir matiz innecesario.
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - estableció el campamento
  - hizo campamento
  lexicon: LSJ
  rationale: El contexto militar favorece un verbo directo y natural en español; «acampó» conserva la idea de instalación bélica.
- source_word: ἐν Βηξέθ
  english_pob_choice: at Bethzaith
  chosen_spanish: en Bēxet
  alternatives_spanish:
  - en Betzait
  - en Betzez
  lexicon: transliteración conservadora
  rationale: El testimonio griego presenta un topónimo cuya forma subyacente es incierta; se mantiene una transliteración sobria y auditable, evitando normalizarlo sin base suficiente en este versículo.
- source_word: συνέλαβεν
  english_pob_choice: seized
  chosen_spanish: capturó
  alternatives_spanish:
  - prendió
  - apresó
  lexicon: LSJ
  rationale: En un contexto militar, «capturó» expresa la toma de personas con claridad y sin implicar un procedimiento judicial formal.
- source_word: αὐτομολησάντων
  english_pob_choice: had deserted to him
  chosen_spanish: se habían pasado a él
  alternatives_spanish:
  - habían desertado a él
  - se habían pasado a su lado
  lexicon: LSJ
  rationale: La expresión griega señala un cambio de lealtad. «Se habían pasado a él» conserva ese sentido y suena natural en español; la alternativa más literal se mantiene disponible.
- source_word: τινας τοῦ λαοῦ
  english_pob_choice: some of the people
  chosen_spanish: a algunos del pueblo
  alternatives_spanish:
  - a algunos del pueblo
  - a ciertos del pueblo
  lexicon: LSJ
  rationale: La construcción partitiva se vierte de modo idiomático en español. Se conserva la indefinición del grupo dentro del pueblo.
- source_word: ἔθυσεν
  english_pob_choice: slaughtered
  chosen_spanish: los inmoló
  alternatives_spanish:
  - los sacrificó
  - los degolló
  lexicon: LSJ
  rationale: El verbo puede tener resonancia sacrificial, pero aquí describe una muerte violenta, no un rito legítimo. «Los inmoló» preserva la dureza del término y su posible color sacrificial sin engañar al lector.
- source_word: εἰς τὸ φρέαρ τὸ μέγα
  english_pob_choice: in the great pit
  chosen_spanish: en el gran pozo
  alternatives_spanish:
  - en el gran foso
  - en la gran cisterna
  - dentro del gran pozo
  lexicon: LSJ
  rationale: φρέαρ puede significar pozo, foso o cisterna. «Pozo» sigue bien el uso amplio del término y permite mantener la imagen del lugar de ejecución o desecho. Se usa «en» siguiendo el precedente auditado de la revisión inglesa para εἰς en este contexto.
theological_decisions:
- issue: El valor sacrificial de ἔθυσεν en un contexto de ejecución violenta
  english_pob_reading: slaughtered
  chosen_spanish_reading: los inmoló
  alternative_spanish_readings:
  - los sacrificó
  - los mató
  rationale: El relato no presenta un sacrificio culto legítimo, sino una matanza. «Inmoló» conserva la gravedad y el eco sacrificial del verbo griego, sin transformar la escena en liturgia.
  doctrine_reference: Principio de primacía del original; evitar imponer una lectura cultual que el contexto no sostiene.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió la relación espacial de ‘at the great pit’ a ‘in the great pit’ para ajustarse mejor a εἰς τὸ φρέαρ τὸ μέγα. La redacción española sigue esa decisión con ‘en el gran pozo’, manteniendo el valor locativo/interno sugerido por el griego y el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el pasaje.
  - Se conserva un registro militar y narrativo sobrio, sin ampliar el relato con interpretaciones no presentes en el griego.
  - La transliteración del topónimo sigue el criterio conservador del contexto auditado, dado que no hay base suficiente aquí para una normalización segura.
