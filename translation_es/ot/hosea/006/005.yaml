    text: 'O: "los he labrado". El hebreo conserva la imagen de tallar o hew, una acción enérgica aplicada por medio de los profetas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "y mi juicio sale como la luz". El texto hebreo, tal como está vocalizado, dice "tus juicios"; algunos intérpretes entienden el sentido como el juicio o la justicia de Dios que sale a la luz.'
    reason: alternative_reading
  revision_rationale: Se restituye en el texto principal la lectura difícil pero mejor atestiguada del hebreo, 'tus juicios', en conformidad con la evidencia fuente y con la nota de alternativa preservada en la POB inglesa. Se corrige la nota para describir con precisión la tensión interpretativa. También se ajusta חָצַבְתִּי a 'los he tallado', que suena más natural en español manteniendo la metáfora de hewing.
