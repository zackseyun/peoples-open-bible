    rationale: יְהוָה הוּא יְבַקֵּשׁ en este contexto de juramento se documentó como 'may Yahweh himself require it'. 'Yahvé mismo lo requerirá' debilita o cambia la fuerza modal a simple predicción.
  - severity: medium
    issue: '''Sacrificios de comunión'' no sigue de cerca la decisión léxica auditada para שְׁלָמִים.'
    rationale: El POB inglés preserva 'peace offerings' en el texto principal y deja 'fellowship offerings' como alternativa. En español, 'sacrificios de paz' mantiene mejor la cercanía léxica, mientras 'de comunión' puede ir en nota.
  - severity: medium
    issue: 'La nota al pie actual contiene una formulación poco natural: ''lo pedirá cuenta''.'
    rationale: En español natural sería 'pedirá cuenta de ello' o 'nos pedirá cuenta de ello'. La nota debe ser idiomática y explicar con claridad el matiz judicial.
