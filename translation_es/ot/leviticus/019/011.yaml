translation:
  language: es
  text: No roben[a], y no actúen falsamente, y no se mientan unos a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «un hombre con su compañero» o «cada uno a su prójimo».
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּגְנֹבוּ
  english_pob_choice: you shall not steal
  chosen_spanish: No robarás
  alternatives_spanish:
  - No debéis robar
  - No roben
  - No hurtarás
  lexicon: HALOT
  rationale: גנב expresa el acto básico de robar; en español "robar" es el equivalente directo, claro y bíblico sin introducir matices ajenos. Se conserva la fuerza prohibitiva legal del imperfecto con לֹא.
- source_word: תְכַחֲשׁוּ
  english_pob_choice: you shall not deal falsely
  chosen_spanish: no obrarás falsamente
  alternatives_spanish:
  - no engañarás
  - no negarás falsamente
  - no actuarás con falsedad
  lexicon: HALOT
  rationale: כחש puede abarcar negación fraudulenta o conducta engañosa. Siguiendo la decisión inglesa de no reducirlo solo a 'mentir', 'obrar falsamente' preserva la amplitud ética de la prohibición y sugiere una conducta general deshonesta.
- source_word: תְשַׁקְּרוּ
  english_pob_choice: you shall not lie
  chosen_spanish: no mentirás
  alternatives_spanish:
  - no hablarás falsamente
  - no dirás mentira
  - no falsearás
  lexicon: HALOT
  rationale: שקר normalmente denota mentir o hablar falsamente. 'Mentir' es el verbo más natural en español y mantiene el contraste con la prohibición anterior, sin debilitar la acusación de falsedad verbal.
- source_word: אִישׁ בַּעֲמִיתוֹ
  english_pob_choice: to one another
  chosen_spanish: cada uno a su prójimo
  alternatives_spanish:
  - el uno al otro
  - cada uno a su compañero
  - uno a otro
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva y recíproca, con אדם/איש como singular representativo. En español, 'cada uno a su prójimo' transmite reciprocidad e interpersonalidad de forma natural, sin limitar el alcance a varones.
theological_decisions:
- issue: Expresión distributiva masculina singular אִישׁ ... עֲמִיתוֹ
  english_pob_reading: Rendered inclusively as 'one another' in the main text
  chosen_spanish_reading: cada uno a su prójimo
  alternative_spanish_readings:
  - el uno al otro
  - cada uno a su compañero
  rationale: El hebreo usa un singular masculino representativo, no una restricción masculina. 'Cada uno' conserva la distribución inclusiva y evita una lectura exclusivamente masculina; 'prójimo' comunica bien la relación social comunitaria del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior evitando un marcador de nota no anclado en el texto. Ahora solo aparecen los marcadores [a] y [b], ambos presentes en el español.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo de los tres prohibiciones como imperativos negativos en futuro de mandato, natural en español bíblico.
  - '''Prójimo'' se usa aquí como equivalente contextual de עֲמִיתוֹ para conservar la referencia interpersonal del pasaje.'
  - No se introduce 'SEÑOR' ni terminología cristológica, ya que el versículo no contiene el Tetragrámaton ni lenguaje mesiánico.
