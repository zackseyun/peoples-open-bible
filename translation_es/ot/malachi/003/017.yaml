revisions:
- from: Y ellos serán míos[a], dice Yahvé de los Ejércitos, para el día en que yo haga de ellos una posesión especial[b]; y yo los perdonaré[c] como un hombre perdona a su hijo que le sirve.
  to: Y ellos serán míos[a], dice Yahvé de los Ejércitos, en el día en que yo haga de ellos una posesión especial[b]; y yo los perdonaré la vida[c] como un hombre perdona la vida a su hijo que le sirve.
  rationale: Se corrige la preposición temporal para ajustarla al hebreo («en el día en que») y se reemplaza «perdonaré» por «perdonaré la vida» para reflejar mejor חמל y la decisión auditada del POB inglés («spare»), manteniendo además la misma elección verbal en el símil padre-hijo. Se conservan «Yahvé», «de los Ejércitos», el género explícito del símil y la cautela de no añadir el posesivo a סְגֻלָּה.
