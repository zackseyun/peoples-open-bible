  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: David percibe que Saúl ha salido para buscar su vida, y se ubica a David en el desierto de Zif, en/at Horesh. Sin embargo, hay dos detalles mejorables para mayor fidelidad y claridad: el topónimo debería mantenerse como «Horesh» según la decisión auditada, no «Horesha»; y «buscar su vida» en español suena menos idiomático que «quitarle la vida» o «atentar contra su vida», aunque el POB inglés preserva expresamente el modismo, por lo que conviene una solución que conserve esa literalidad sin volverse extraña.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «a buscar su vida» resulta poco natural y puede sugerir otra cosa en español moderno. «Buscar quitarle la vida» sería demasiado interpretativo; una mejor opción es «buscar su vida» solo si se acepta el modismo algo rígido, o bien «atentar contra su vida» si se prioriza claridad. Dado el rastro auditado, conviene conservar el modismo con una formulación más fluida en el resto del versículo. También «Horesha» no es una adaptación establecida en español y entorpece la legibilidad frente a «Horesh».
  glossary_alignment: 'No hay términos teológicos mayores en juego. El borrador respeta los nombres David/Saúl y el valor de נֶפֶשׁ como «vida». La principal desalineación con la auditoría inglesa está en el topónimo: el inglés documenta «Horesh» como lectura preferida, mientras que el español introduce «Horesha» sin base clara en el expediente.'
  issues:
