    issue: '''están siendo derrotados'' debilita la imagen concreta de נִגָּפִים'
    rationale: El POB inglés documenta 'are being struck down' para preservar la fuerza marcial del participio pasivo. 'Derrotados' expresa más bien el resultado abstracto de perder, mientras 'abatidos' o similar conserva mejor el matiz de ser golpeados en batalla.
  - severity: medium
    issue: '''los caminos'' es demasiado genérico para הַמְסִלּוֹת'
    rationale: La auditoría inglesa eligió 'the highways' por la fuerza léxica de מְסִלּוֹת como vías principales o calzadas. El español principal debe reflejar esa especificidad, dejando 'caminos' como alternativa de nota si se desea.
  - severity: low
    issue: Anclaje de notas impreciso
    rationale: La nota sobre las vías debe marcar el término correspondiente, y la nota sobre el sufijo singular debe marcar el verbo 'apartémoslos', no aparecer ambas juntas al final de la frase.
  revised_spanish_text: 'Los hijos de Benjamín dijeron: «Están siendo abatidos delante de nosotros, como al principio». Pero los hijos de Israel dijeron: «Huyamos y apartémoslos[b] de la ciudad hacia las calzadas[a]».

    '
