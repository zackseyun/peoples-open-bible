review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido global del hebreo: encabezamiento, atribución salomónica ambigua, uso de «Yahvé», paralelismo condicional, y la inutilidad del esfuerzo humano sin la acción divina. Sin embargo, hay un problema de alineación en las notas: la nota [a] está anclada a «Subidas», pero su contenido explica לִשְׁלֹמֹה («De/Para/Perteneciente a Salomón»), no שִׁיר הַמַּעֲלוֹת. Además, la nota [c] tiene un error gramatical («su edificadores») y corresponde al alternativo inglés sobre la primera cláusula, no sobre «centinela»; por tanto está mal anclada.'
  spanish_quality_summary: El español es claro y digno. «Cántico de las Subidas» es comprensible, aunque algo menos idiomático que «Cántico de ascenso(s)»; no obstante puede aceptarse por cercanía formal. «Sus edificadores» suena algo rígido; «sus constructores» o «los que la edifican» sería más natural, pero no es imprescindible. La reparación principal necesaria es de notas y anclajes para evitar confusión lectora.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יהוה -> «Yahvé» está correcto; בַּיִת -> «casa» con nota de ampliación semántica también. No hay conflictos terminológicos mayores. La excepción necesaria es solo estructural: mover la nota de alternativa de לִשְׁלֹמֹה al lugar correcto y anclar la alternativa de redacción de la primera cláusula donde realmente corresponde.'
  issues:
  - severity: high
    issue: La nota [a] está anclada a «Subidas», pero explica «De Salomón».
    rationale: El contenido de la nota trata la ambigüedad de לִשְׁלֹמֹה, no de שִׁיר הַמַּעֲלוֹת. Esto induce una asociación errónea entre el marcador y la palabra explicada.
  - severity: high
    issue: La nota [c] está anclada a «centinela», pero su contenido ofrece una alternativa para la cláusula de los edificadores.
    rationale: El lector entenderá erróneamente que la nota comenta «centinela», cuando en realidad preserva el alternativo inglés/original sobre «sus edificadores trabajan en vano en ella».
  - severity: medium
    issue: 'La nota [c] contiene un error gramatical: «su edificadores».'
    rationale: Debe decir «sus edificadores» o reformularse por naturalidad; tal como está, es incorrecto en español.
  revised_spanish_text: Cántico de las Subidas. De Salomón[a]. Si Yahvé no edifica la casa[b], en vano trabajan sus edificadores[c]; si Yahvé no guarda la ciudad, en vano vela el centinela.
  revised_footnotes:
