translation:
  language: es
  text: 'Mis enemigos hablan mal de mí: «¿Cuándo morirá y perecerá su nombre?»[a][b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hablan cosas malas de mí». El hebreo dice literalmente que ''hablan mal'' o ''hablan lo malo'' dirigido hacia el salmista.'
    reason: lexical_alternative
  - marker: b
    text: '''Su nombre'' puede implicar también su reputación o su recuerdo, no solo la desaparición del nombre pronunciado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹיְבַי
  english_pob_choice: My enemies
  chosen_spanish: Mis enemigos
  alternatives_spanish:
  - Mis adversarios
  - Los que me son hostiles
  lexicon: HALOT
  rationale: 'El sustantivo plural con sufijo de 1.ª persona es directamente posesivo: ''mis enemigos''. ''Enemigos'' conserva la fuerza adversativa y es natural en español bíblico moderno.'
- source_word: יֹאמְרוּ
  english_pob_choice: say
  chosen_spanish: hablan
  alternatives_spanish:
  - dicen
  - están diciendo
  lexicon: HALOT
  rationale: En poesía hebrea el imperfecto puede describir acción habitual o presente. 'Hablan' comunica la acción hostil de forma viva y natural; mantiene el valor de speech act sin volver la frase demasiado literal.
- source_word: רַע לִי
  english_pob_choice: evil against me
  chosen_spanish: mal de mí
  alternatives_spanish:
  - mal contra mí
  - cosas malas acerca de mí
  - mal sobre mí
  lexicon: HALOT
  rationale: La combinación de רַע con ל + sufijo expresa lenguaje hostil dirigido al salmista. En español, 'hablar mal de mí' transmite bien la idea de decir cosas dañinas o maliciosas, sin perder el matiz de maldad del hebreo.
- source_word: מָתַי
  english_pob_choice: When
  chosen_spanish: ¿Cuándo
  alternatives_spanish:
  - ¿Hasta cuándo
  - ¿Para cuándo
  lexicon: HALOT
  rationale: '''מָתַי'' es un adverbio interrogativo temporal. ''¿Cuándo'' reproduce el valor básico sin añadir matices no presentes en el texto.'
- source_word: יָמוּת
  english_pob_choice: will he die
  chosen_spanish: morirá
  alternatives_spanish:
  - va a morir
  - muera
  lexicon: HALOT
  rationale: El imperfecto tras '¿Cuándo?' se entiende naturalmente como futuro en español. 'Morirá' conserva la expectativa de muerte expresada por los enemigos.
- source_word: וְאָבַד שְׁמוֹ
  english_pob_choice: and his name perish
  chosen_spanish: y perecerá su nombre
  alternatives_spanish:
  - y se perderá su nombre
  - y desaparecerá su nombre
  - y su memoria perecerá
  lexicon: HALOT
  rationale: '''Nombre'' se mantiene por fidelidad al hebreo y porque el texto habla literalmente del nombre, con posible implicación de reputación o recuerdo. ''Perecerá'' conserva el verbo de destrucción/ desaparición.'
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con la lectura inglesa auditada; no se detectan revisiones textuales relevantes en el expediente proporcionado.
