translation:
  language: es
  text: 'Pero Yahvé dijo a Samuel[a]: «No mires su apariencia ni la altura de su estatura, porque lo he rechazado. Porque Dios no ve como ve el hombre[b], pues el hombre ve lo que está delante de los ojos[c], pero Yahvé ve el corazón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Porque no como ve el hombre ve Dios»; el hebreo es elíptico, y el sentido es que la manera de ver de Dios difiere de la del ser humano.'
    reason: lexical_alternative
  - marker: b
    text: «El hombre» aquí es genérico y se refiere a los seres humanos en general.
    reason: lexical_alternative
  - marker: c
    text: 'O: «Porque no es lo que ve el hombre»; literalmente, «a los ojos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma tradicional y reconocible en español del proyecto, evitando la sustitución por un título genérico.
- source_word: תַּבֵּט
  english_pob_choice: look
  chosen_spanish: mires
  alternatives_spanish:
  - miras
  - contemples
  lexicon: HALOT
  rationale: El hebreo es una prohibición dirigida a fijar la atención en la apariencia externa; «mires» expresa con naturalidad la advertencia sin intensificar innecesariamente el verbo.
- source_word: מַרְאֵהוּ
  english_pob_choice: his appearance
  chosen_spanish: su apariencia
  alternatives_spanish:
  - su aspecto
  - cómo se ve
  lexicon: HALOT
  rationale: «Apariencia» reproduce bien el campo semántico de מַרְאֶה como lo visible de la persona y mantiene el paralelo con la estatura.
- source_word: גְּבֹהַּ קוֹמָתוֹ
  english_pob_choice: the height of his stature
  chosen_spanish: la altura de su estatura
  alternatives_spanish:
  - su gran estatura
  - lo alto de su estatura
  lexicon: HALOT
  rationale: La expresión hebrea enfatiza la talla física; «altura de su estatura» conserva el doble matiz de altura/talla con estilo solemne y claro.
- source_word: מְאַסְתִּיהוּ
  english_pob_choice: I have rejected him
  chosen_spanish: lo he rechazado
  alternatives_spanish:
  - lo he desechado
  - lo he desestimado
  lexicon: HALOT
  rationale: מאס expresa rechazo por inadecuación para la elección; «rechazado» encaja con el contexto de selección real y evita un matiz demasiado emocional.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la persona
  lexicon: HALOT
  rationale: Se conserva el singular genérico para contrastar la percepción humana con la divina, como en el audit trail inglés.
- source_word: לַעֵינַיִם
  english_pob_choice: what is before the eyes
  chosen_spanish: lo que está delante de los ojos
  alternatives_spanish:
  - lo visible
  - lo que ven los ojos
  lexicon: HALOT
  rationale: La imagen literal se preserva en español para no aplanar la metáfora hebrea hacia una mera glosa interpretativa.
- source_word: לַלֵּבָב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el interior
  - la mente
  lexicon: HALOT
  rationale: לֵבָב designa el centro interior de pensamiento, voluntad y disposición; «corazón» es la equivalencia española más estable y teológicamente cargada.
theological_decisions:
- issue: Contraste entre percepción humana y divina
  english_pob_reading: For not as man sees does God see ... Yahweh sees the heart
  chosen_spanish_reading: Porque no es como ve el hombre que ve Dios ... Yahvé ve el corazón
  alternative_spanish_readings:
  - Porque el hombre no ve como ve Dios
  - Porque Yahvé no ve como ve el hombre
  rationale: El hebreo presenta una estructura elíptica que subraya la diferencia entre ver humano y ver divino. La formulación elegida mantiene esa tensión sin borrar el sujeto explícito «Dios» que el audit trail inglés introdujo para clarificar la sintaxis.
  doctrine_reference: 'DOCTRINE.md: tratamiento de יְהוָה, אָדָם y la percepción divina; notas de sintaxis elíptica en el audit trail inglés'
- issue: Sentido de לֵבָב en antropología bíblica
  english_pob_reading: the heart
  chosen_spanish_reading: el corazón
  alternative_spanish_readings:
  - la mente
  - el interior
  rationale: No se reduce el término a emociones; en español bíblico «corazón» puede abarcar centro de pensamiento, voluntad y disposición, preservando el alcance antropológico del hebreo.
  doctrine_reference: HALOT; antropología bíblica en la traducción PO B
- issue: Alcance de la cláusula inicial negativa
  english_pob_reading: Do not look at his appearance or at the height of his stature
  chosen_spanish_reading: No mires su apariencia ni la altura de su estatura
  alternative_spanish_readings:
  - No fijes tu mirada en su apariencia ni en la altura de su estatura
  - No te fijes en su apariencia ni en lo alto de su estatura
  rationale: Se conserva el imperativo prohibitivo dirigido a Samuel y el paralelismo de las dos características físicas externas, sin suavizar el contraste con la elección divina.
  doctrine_reference: Sintaxis y semántica de la prohibición en 1 Sam 16:7
translation_notes:
  revision_awareness: Se tuvo en cuenta que el audit trail inglés pasó por una revisión que evitó la expansión demasiado paraprástica y luego volvió a una formulación más cercana a la sintaxis hebrea ('For not as man sees does God see'). La versión española sigue esa decisión, manteniendo la cláusula elíptica y el contraste explícito entre ver humano y ver divino, sin traducir mecánicamente la primera expansión inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con el estándar del proyecto.
  - Se usa «el hombre» de manera genérica, no sexista, para אָדָם en el contraste sapiencial/narrativo.
  - «Corazón» conserva la antropología bíblica sin psicologizar el texto.
  - La puntuación con dos puntos no era necesaria en español; se prefirió una articulación directa que respeta el flujo del original.
