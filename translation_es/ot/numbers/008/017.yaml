translation:
  language: es
  text: Porque mío es todo primogénito entre los hijos de Israel, entre el hombre y entre el ganado[a]. El día en que herí a todo primogénito en la tierra de Egipto, los consagré para mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre la humanidad y entre los animales». El hebreo usa términos colectivos en singular en contraste.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los aparté para mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior; en español, 'Porque' expresa bien la fuerza explicativa sin volverla mecánica.
- source_word: לִי
  english_pob_choice: is mine
  chosen_spanish: mío es
  alternatives_spanish:
  - me pertenece
  - es para mí
  lexicon: HALOT
  rationale: La posesión divina se expresa de manera natural con una construcción posesiva enfática en español. 'Mío es' conserva el énfasis del hebreo y del inglés auditado.
- source_word: כָל בְּכוֹר
  english_pob_choice: every firstborn
  chosen_spanish: todo primogénito
  alternatives_spanish:
  - cada primogénito
  - todos los primogénitos
  lexicon: HALOT
  rationale: El singular colectivo hebreo se conserva mejor con 'todo primogénito', que suena natural y mantiene el valor distributivo.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los israelitas
  - entre los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión de alianza y filiación del hebreo. 'Hijos de Israel' refleja más de cerca בני ישראל que 'israelitas'.
- source_word: בָּאָדָם
  english_pob_choice: among man
  chosen_spanish: entre el hombre
  alternatives_spanish:
  - entre la humanidad
  - entre la gente
  lexicon: HALOT
  rationale: En contraste con el ganado, אָדָם designa aquí la categoría humana. 'El hombre' conserva el valor genérico y el paralelismo con la frase siguiente.
- source_word: וּבַבְּהֵמָה
  english_pob_choice: and among beast
  chosen_spanish: y entre el ganado
  alternatives_spanish:
  - y entre los animales
  - y entre las bestias
  lexicon: HALOT
  rationale: '''Behemah'' en este contexto contrasta con los humanos y suele referirse al ganado/domesticables. ''Ganado'' evita una dureza innecesaria en español y preserva el contraste de categorías.'
- source_word: בְּיוֹם
  english_pob_choice: On the day
  chosen_spanish: En el día
  alternatives_spanish:
  - El día en que
  - Cuando
  lexicon: HALOT
  rationale: '''En el día'' conserva la referencia temporal histórica del original; en español bíblico es claro y fiel.'
- source_word: הַכֹּתִי
  english_pob_choice: I struck
  chosen_spanish: herí
  alternatives_spanish:
  - golpeé
  - castigué
  lexicon: HALOT
  rationale: נכה abarca golpear/herir en un contexto de juicio. 'Herí' evita especificar más de lo que el verbo exige y mantiene la seriedad del acto divino.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: '''Tierra'' reproduce directamente אֶרֶץ y conserva el valor narrativo-covenantal de la expresión.'
- source_word: הִקְדַּשְׁתִּי אֹתָם לִי
  english_pob_choice: I consecrated them to myself
  chosen_spanish: los consagré para mí
  alternatives_spanish:
  - los consagré para mí mismo
  - los aparté para mí
  lexicon: HALOT
  rationale: קדשׁ en hiphil expresa dedicar/con­sagrar como algo santo. 'Los consagré para mí' mantiene el peso sagrado sin añadir tecnicismos innecesarios; 'para mí' refleja bien לִי.
theological_decisions:
- issue: Categoría humana frente a animales en אָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - la gente
  rationale: El hebreo contrapone la categoría humana a la animal. 'El hombre' conserva esa distinción y evita diluir el paralelismo del texto.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral; אָדָם may be rendered as man / humankind according to context.'
- issue: Valor sacral de הִקְדַּשְׁתִּי
  english_pob_reading: I consecrated them to myself
  chosen_spanish_reading: los consagré para mí
  alternative_spanish_readings:
  - los santifiqué para mí
  - los aparté para mí
  rationale: El acto recuerda la reivindicación previa de Dios sobre los primogénitos. 'Consagré' mantiene la fuerza cultual y es idiomático en español bíblico.
  doctrine_reference: 'DOCTRINE.md: Preserve theological weight without unnecessary jargon.'
translation_notes:
  revision_awareness: 'Se siguió la revisión del inglés auditado que ajustó el orden para hacer natural la primera cláusula: la posesión divina se expresa antes del sintagma de distribución, manteniendo el paralelismo hebreo.'
  spanish_consistency_notes:
  - Se mantuvo 'hijos de Israel' como expresión de alianza, en vez de 'israelitas', para reflejar יותר de cerca el hebreo.
  - Se eligió 'consagré' para preservar la carga sacral de קדשׁ sin introducir terminología eclesiástica ajena al contexto.
  - Se resolvió בְּהֵמָה como 'ganado' por el contraste humano/animal y por la naturalidad del español; se documentó la alternativa más literal en nota.
