translation:
  language: es
  text: Así que llegué a los gobernadores de Más Allá del Río[a] y les entregué las cartas del rey. Ahora bien, el rey había enviado conmigo oficiales del ejército y jinetes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la región administrativa persa al oeste del Éufrates, a menudo llamada Transeufrates.
    reason: cultural_note
lexical_decisions:
- source_word: פַּחֲווֹת
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - sátrapas
  - gobernadores provinciales
  lexicon: HALOT
  rationale: El término designa funcionarios persas que gobernaban distritos. «Gobernadores» comunica bien la función sin introducir un tecnicismo excesivo, y evita precisar «provinciales» donde el hebreo no lo dice explícitamente aquí.
- source_word: עֵבֶר הַנָּהָר
  english_pob_choice: Beyond the River
  chosen_spanish: Traspaso del Río
  alternatives_spanish:
  - Más allá del Río
  - Del otro lado del Río
  - Transeufrates
  lexicon: HALOT
  rationale: Se conserva la designación administrativa persa como topónimo funcional. «Traspaso del Río» intenta reflejar el valor de región al otro lado del Éufrates sin convertirlo en una paráfrasis demasiado explicativa; se mantiene una nota para aclarar el sentido histórico.
- source_word: אִגְּרוֹת
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas oficiales
  - documentos
  lexicon: HALOT
  rationale: En contexto son cartas reales de autorización. «Cartas» es natural en español y suficientemente preciso; «documentos» sería más general y perdería el carácter epistolar.
- source_word: שָׂרֵי חַיִל
  english_pob_choice: army officers
  chosen_spanish: oficiales del ejército
  alternatives_spanish:
  - comandantes del ejército
  - oficiales militares
  lexicon: HALOT
  rationale: La construcción indica líderes militares. «Oficiales del ejército» conserva el sentido funcional y suena natural en español, manteniendo la fuerza militar del término.
- source_word: פָרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - hombres de a caballo
  lexicon: HALOT
  rationale: El hebreo se refiere literalmente a hombres montados. «Jinetes» es más directo y natural en español; «caballería» suena más colectivo e interpretativo.
- source_word: וַיִּשְׁלַח עִמִּי הַמֶּלֶךְ
  english_pob_choice: the king had sent with me
  chosen_spanish: el rey había enviado conmigo
  alternatives_spanish:
  - el rey me envió
  - el rey había despachado conmigo
  lexicon: HALOT
  rationale: Se usa pretérito pluscuamperfecto para mantener la función de trasfondo explicativo del hebreo en el flujo narrativo, igual que en la decisión inglesa.
- source_word: וָאָבוֹא
  english_pob_choice: So I came
  chosen_spanish: Así que llegué
  alternatives_spanish:
  - Entonces llegué
  - Y llegué
  lexicon: HALOT
  rationale: «Así que» mantiene la continuidad narrativa de waw consecutivo con un español fluido y digno.
theological_decisions:
- issue: Topónimo administrativo persa y su posible traducción o transliteración
  english_pob_reading: Beyond the River is a Persian regional designation, not merely a directional phrase.
  chosen_spanish_reading: Traspaso del Río como designación regional administrativa, con nota explicativa.
  alternative_spanish_readings:
  - Más allá del Río
  - Transeufrates
  rationale: No hay tensión doctrinal, pero sí una decisión histórica y lexical importante. La opción elegida procura mantener el valor de nombre de región sin esconder que se trata de un término administrativo persa, mientras la nota aclara el referente al oeste del Éufrates.
  doctrine_reference: Nehemías 2:9; trasfondo histórico-administrativo del imperio persa
translation_notes:
  revision_awareness: 'El inglés POB revisado eliminó «of the province» por no estar representado en el hebreo de este versículo y conservó «Beyond the River» como designación regional. El español sigue esa revisión: no añade «provincia», mantiene el valor administrativo del topónimo y conserva el orden narrativo con una cláusula de trasfondo sobre el envío del rey.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece ningún nombre divino en el texto base.
  - Se evitó «SEÑOR» o lenguaje de sustitución porque el versículo habla del rey persa, no de Dios.
  - «Cartas» y «oficiales del ejército» reflejan la concreción del contexto sin sobreinterpretar.
  - La nota [a] está anclada en el texto para aclarar la designación regional, no para reemplazarla.
