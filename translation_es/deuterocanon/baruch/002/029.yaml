base_translation:
  language: en
  yaml_path: translation/deuterocanon/baruch/002/029.yaml
  text: If you do not listen to my voice[b][a], surely this great and numerous multitude will be reduced to a few among the nations where I will scatter them.
  footnotes:
  - marker: a
    text: Greek ἡ βόμβησις literally can denote a buzzing, roar, or tumult. Here it is rendered 'multitude' because the following phrase 'to a few among the nations' points to the people as a large population being diminished.
    reason: lexical_alternative
  - marker: b
    text: The Greek ends with a redundant locative expression, literally 'where I will scatter them there.' This translation preserves the emphasis with 'there,' though English would normally omit it.
    reason: lexical_alternative
