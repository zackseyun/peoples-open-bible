translation:
  language: es
  text: Y los del pueblo tomaron a Jeconías, hijo de Josías, y lo hicieron rey en lugar de Josías su padre[a], cuando tenía veintitrés años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «Jeconías»; el relato paralelo en 2 Crónicas 36:1 nombra a Jehoacaz.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναλαβόντες
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - tomaron a
  - se hicieron cargo de
  - alzaron
  lexicon: LSJ
  rationale: El participio introduce la acción con la que el pueblo eleva a Jeconías al trono. «Tomaron» conserva la acción concreta y permite una construcción natural en español sin forzar un calco como «tomaron up».
- source_word: οἱ ἐκ τοῦ ἔθνους
  english_pob_choice: those from the nation
  chosen_spanish: los de la nación
  alternatives_spanish:
  - los del pueblo
  - los hombres de la nación
  - la gente de la nación
  lexicon: LSJ
  rationale: La frase griega es relativamente directa y no usa el equivalente hebreo técnico «pueblo de la tierra». «Los de la nación» mantiene la referencia al cuerpo nacional sin importar una expresión no presente en el griego.
- source_word: ἀνέδειξαν βασιλέα
  english_pob_choice: made him king
  chosen_spanish: lo proclamaron rey
  alternatives_spanish:
  - lo hicieron rey
  - lo nombraron rey
  - lo instalaron como rey
  lexicon: LSJ
  rationale: En español, «proclamar rey» expresa con claridad el acto de entronización y conserva la idea de elevación a la realeza. «Hacer rey» sería posible, pero «proclamar» suena más natural en este contexto histórico y sigue siendo fiel al hecho de nombrarlo/reconocerlo como rey.
- source_word: ἀντί
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - como sucesor de
  - en sustitución de
  lexicon: BDAG
  rationale: La preposición marca sustitución sucesoria. «En lugar de» es la equivalencia más natural en español y conserva el valor de reemplazo sin añadir matices no explícitos.
- source_word: ὄντα ἐτῶν εἴκοσι τριῶν
  english_pob_choice: being twenty-three years old
  chosen_spanish: cuando tenía veintitrés años
  alternatives_spanish:
  - siendo de veintitrés años
  - de veintitrés años
  - teniendo veintitrés años
  lexicon: LSJ
  rationale: El griego usa una construcción participial descriptiva. En español, «cuando tenía veintitrés años» ofrece una formulación idiomática y clara, preservando el dato de edad sin un calco forzado.
- source_word: Ἰεχονίαν
  english_pob_choice: Jechoniah
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Jechonías
  - Jeconías
  lexicon: LSJ
  rationale: El griego presenta Ἰεχονίαν. En español bíblico, la forma «Jeconías» es la adaptación más inteligible y cercana al nombre griego, manteniendo la diferencia con la tradición paralela del texto hebreo y su nombre esperado.
theological_decisions:
- issue: Divergencia del nombre propio frente al paralelo histórico en la tradición hebrea
  english_pob_reading: The Greek text reads 'Jechoniah'; the parallel account in 2 Chronicles 36:1 names Jehoahaz.
  chosen_spanish_reading: El texto principal conserva «Jeconías» y no armoniza con el paralelo de 2 Crónicas.
  alternative_spanish_readings:
  - Joaquaz
  - Jeconías/Jehoacaz
  rationale: La fuente primaria para 1 Esdras es el griego transmitido por Swete. Como el POB inglés conserva la lectura griega y documenta la variante histórica en nota, la versión española debe reflejar esa misma primacía textual y dejar la armonización para una nota.
  doctrine_reference: Principio de primacía de la fuente original; PHILOSOPHY.md sobre el texto griego de los deuterocanónicos
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al preferir una forma más literal para la frase de edad, pero la expresa en español con una construcción natural («cuando tenía...») que conserva el sentido participial sin sacrificar claridad. También mantiene la decisión auditada de no armonizar el nombre propio con el paralelo hebreo, sino reflejar la lectura del griego.
  spanish_consistency_notes:
  - Se usa «rey» en sentido político monárquico, no como título teológico.
  - «Los de la nación» evita importar la fórmula hebrea técnica ausente en el griego.
  - La nota conserva la tensión textual entre la lectura griega y el paralelo histórico sin resolverla artificialmente.
  - La adaptación de nombres propios sigue la forma española bíblica más reconocible, manteniendo la cercanía al griego.
