translation:
  language: es
  text: Yo, Nabucodonosor, estaba en calma[a] en mi casa y floreciente[b] en mi palacio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seguro» para «en calma»; el término arameo puede enfatizar tranquilidad o seguridad.
    reason: lexical_alternative
  - marker: b
    text: O «próspero» o «vigoroso» para «floreciente»; el término expresa bienestar y vitalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנָה
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente de primera persona se expresa con naturalidad en español con 'Yo'. Mantiene el tono testimonial del original sin añadir énfasis innecesario.
- source_word: נְבוּכַדְנֶצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  - Nabucodonosor
  lexicon: Convención bíblica española
  rationale: Se usa la forma habitual en español bíblico para el nombre propio, manteniendo identificación clara del personaje.
- source_word: שְׁלֵה
  english_pob_choice: at ease
  chosen_spanish: estaba en calma
  alternatives_spanish:
  - estaba seguro
  - estaba tranquilo
  - estaba sin inquietud
  lexicon: HALOT
  rationale: El término arameo puede comunicar tranquilidad o seguridad. 'En calma' preserva esa amplitud semántica en un español natural, sin reducirlo solo a prosperidad material.
- source_word: בְּבֵיתִי
  english_pob_choice: in my house
  chosen_spanish: en mi casa
  alternatives_spanish:
  - en mi hogar
  - en mi casa
  lexicon: HALOT
  rationale: '''En mi casa'' sigue de cerca la imagen concreta del original y conserva el paralelismo con ''en mi palacio''.'
- source_word: וְרַעְנַן
  english_pob_choice: flourishing
  chosen_spanish: floreciente
  alternatives_spanish:
  - próspero
  - vigoroso
  - en pleno florecimiento
  lexicon: HALOT
  rationale: El adjetivo expresa frescura, vigor y bienestar. 'Floreciente' transmite vida y prosperidad de manera sobria, sin volverlo botánico en exceso.
- source_word: בְּהֵיכְלִי
  english_pob_choice: in my palace
  chosen_spanish: en mi palacio
  alternatives_spanish:
  - en mi templo
  - en mi gran palacio
  lexicon: HALOT
  rationale: En contexto imperial arameo, הֵיכַל puede significar 'palacio'. 'Palacio' evita una asociación cultual incorrecta y refleja el marco real de la declaración.
theological_decisions:
- issue: 'Sentido de שְׁלֵה: tranquilidad o seguridad'
  english_pob_reading: '''at ease'' with note: ''Or secure'''
  chosen_spanish_reading: '''estaba en calma'' con posibilidad de ''seguro'''
  alternative_spanish_readings:
  - estaba seguro
  - estaba tranquilo
  - vivía sin inquietud
  rationale: El texto no obliga a elegir entre seguridad interna y tranquilidad externa; la formulación española debe dejar abierta esa tensión semántica, tal como hace el POB en inglés.
  doctrine_reference: Daniel 4:1; nota léxica del POB sobre שְׁלֵה
- issue: Sentido de הֵיכַל en el entorno de Nabucodonosor
  english_pob_reading: '''palace'' rather than ''temple'''
  chosen_spanish_reading: '''palacio'''
  alternative_spanish_readings:
  - templo
  - gran salón
  - residencia real
  rationale: El contexto inmediato es la residencia real de Nabucodonosor, no un santuario. Traducirlo como 'palacio' evita una lectura cultual errónea.
  doctrine_reference: Daniel 4:1; nota contextual del POB sobre הֵיכַל
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con la revisión más reciente: no se detectaron cambios necesarios respecto del inglés auditado. Se mantuvo la distinción contextual entre tranquilidad/seguridad en שְׁלֵה y el sentido de ''palacio'' para הֵיכַל.'
  spanish_consistency_notes:
  - Se mantiene 'Nabucodonosor' como forma bíblica estándar en español.
  - '''en mi casa'' y ''en mi palacio'' conservan la concreción espacial del arameo y el paralelismo del verso.'
  - Se evita 'SEÑOR' u otras sustituciones que no aplican aquí, ya que el verso no contiene el nombre divino.
  - La traducción procura ser formal y fiel, pero con español natural y publicable.
