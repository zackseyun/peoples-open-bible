review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal del hebreo y la mayoría de las relaciones semánticas: jubileo, herencia, tribu, pertenencia y pérdida desde la tribu ancestral. Sin embargo, dos elecciones debilitan la fidelidad y la naturalidad: ''hubiera el jubileo'' es poco idiomático para יִהְיֶה הַיֹּבֵל, y ''Y si'' deja menos claro el matiz de eventualidad anticipada que el POB inglés documentó como ''And when''.'
  spanish_quality_summary: El texto es comprensible, pero 'hubiera el jubileo' suena antinatural en español bíblico moderno y 'se añadiría / se quitaría' dentro de la prótasis con 'si' introduce un condicional español algo menos directo que el futuro legal esperado. Una redacción con 'cuando llegue el jubileo' y futuros simples suena más clara, digna y natural sin apartarse del hebreo contextual.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Hijos de Israel' preserva adecuadamente בני ישראל, y 'herencia', 'tribu' y 'nuestros padres' siguen bien el razonamiento lexical documentado. No se requieren notas nuevas; la ambigüedad potencial ya es manejable en español sin nota.
  issues:
  - severity: medium
    issue: '''hubiera el jubileo'' es una formulación poco idiomática'
    rationale: Aunque intenta reflejar una condición/eventualidad, en español moderno no se dice naturalmente 'hubiera el jubileo' para la llegada de un evento calendárico. 'llegue el jubileo' o 'sea el jubileo' transmite mejor יִהְיֶה הַיֹּבֵל.
  - severity: medium
    issue: '''Y si'' subrepresenta el matiz contextual de eventualidad esperada'
    rationale: El hebreo וְאִם puede ser condicional, pero en este contexto legal el inglés auditado justificó 'And when'. En español, 'Y cuando' o simplemente 'Cuando' comunica mejor la consecuencia prevista al llegar el jubileo.
  - severity: low
    issue: Uso de condicionales 'se añadiría / se quitaría'
    rationale: 'Son entendibles, pero con una cláusula temporal/legal suena más natural y directo en español usar futuros: ''se añadirá ... se quitará''.'
  revised_spanish_text: Y cuando llegue el jubileo para los hijos de Israel, su herencia se añadirá a la herencia de la tribu a la que pertenezcan, y su herencia se quitará de la herencia de la tribu de nuestros padres.
  revision_rationale: Se ajusta la apertura para reflejar mejor la eventualidad legal anticipada del hebreo en contexto ('cuando llegue el jubileo') y se reemplazan formulaciones poco naturales o menos directas ('hubiera', condicionales) por español más claro y fiel al sentido jurídico del pasaje, sin cambiar el contenido semántico principal.
