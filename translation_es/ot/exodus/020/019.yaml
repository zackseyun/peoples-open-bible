- from: 'Y ellos dijeron a Moisés: «Tú habla con nosotros[a], y escucharemos; pero no hable Dios con nosotros, para que no muramos».'
  to: 'Y dijeron a Moisés: «Habla tú con nosotros, y escucharemos[a]; pero no hable Dios con nosotros, no sea que muramos».'
