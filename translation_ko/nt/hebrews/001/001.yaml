source:
  edition: SBLGNT
  text: Πολυμερῶς καὶ πολυτρόπως πάλαι ὁ θεὸς λαλήσας τοῖς πατράσιν ἐν τοῖς προφήταις
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/001/001.yaml
  text: Long ago, God spoke to the fathers in many parts and in many ways by the prophets.
translation:
  language: ko
  text: 오래 전, 하나님께서는 여러 부분으로[a] 그리고 여러 모양으로 예언자들을 통하여[b] 조상들에게[c] 말씀하셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러 차례에 걸쳐」. 헬라어 πολυμερῶς는 단편성·분할성을 가리키며, πολυτρόπως(여러 방식)와 의미가 구분된다. 두 부사를 같은 말로 합치지 않기 위해 「여러 부분으로」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 문자적으로 「예언자들 안에서」(ἐν τοῖς προφήταις). 여기서는 도구·매개의 의미로 사용되어 「~을 통하여」로 옮긴다.
    reason: lexical_alternative
  - marker: c
    text: 헬라어는 「조상들에게」(τοῖς πατράσιν)이며, 「우리 조상들에게」가 아니다. 언약-역사적 함의를 보존하기 위해 「조상들」로 옮긴다.
    reason: lexical_alternative
