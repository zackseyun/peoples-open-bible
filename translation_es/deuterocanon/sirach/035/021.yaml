base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/035/021.yaml
  text: A devious heart causes grief[b][a], and an experienced man will repay him in kind.
  footnotes:
  - marker: a
    text: The final clause is difficult. Hebrew literally reads something like, 'and a seasoned man will return/answer it in/with him/it.' Possible senses include 'will answer it in kind' or 'will repay him accordingly.' The Greek parallel for this verse differs substantially, indicating a likely variant Vorlage or textual corruption.
    reason: alternative_reading
  - marker: b
    text: The Greek parallel in Swete reads, 'Do not trust in a road without stumbling,' which does not closely match the surviving Hebrew here.
    reason: textual_variant
