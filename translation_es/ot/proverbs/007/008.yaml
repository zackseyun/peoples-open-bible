translation:
  language: es
  text: Pasando por la calle cerca de su esquina[a], y va hacia su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pasando por la calle del mercado cerca de su esquina, y tomando el camino hacia su casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹבֵר
  english_pob_choice: passing through
  chosen_spanish: Pasando por
  alternatives_spanish:
  - Pasando a través de
  - Pasando
  - Yendo por
  lexicon: HALOT
  rationale: El participio qal expresa una acción en curso y de escena. «Pasando por» conserva el valor de movimiento y suena natural en español sin perder la imagen procesual.
- source_word: בַּשּׁוּק
  english_pob_choice: the street
  chosen_spanish: la calle
  alternatives_spanish:
  - el mercado
  - la plaza del mercado
  - la calle del mercado
  lexicon: HALOT
  rationale: El sustantivo puede referirse a una calle o vía pública, y aquí el contexto espacial favorece una calle concreta antes que introducir explícitamente la idea de mercado. «La calle» mantiene la fluidez del relato.
- source_word: אֵצֶל
  english_pob_choice: near
  chosen_spanish: cerca de
  alternatives_spanish:
  - junto a
  - al lado de
  - próximo a
  lexicon: HALOT
  rationale: La preposición expresa proximidad. «Cerca de» es la forma más clara y idiomática en español contemporáneo.
- source_word: פִּנָּהּ
  english_pob_choice: her corner
  chosen_spanish: su esquina
  alternatives_spanish:
  - su esquina de la calle
  - la esquina de ella
  - el rincón de ella
  lexicon: HALOT
  rationale: פִּנָּה significa «esquina». Con el sufijo femenino, el referente es la esquina asociada con la mujer del contexto. En español, «su esquina» preserva la relación posesiva sin sobreexplicar.
- source_word: וְדֶרֶךְ
  english_pob_choice: and ... on the way
  chosen_spanish: y él se dirige
  alternatives_spanish:
  - y va por el camino
  - y toma el camino
  - y camina
  lexicon: HALOT
  rationale: Aquí דֶּרֶךְ aporta la idea de trayectoria/dirección. En español, «se dirige» comunica el avance orientado hacia un destino y evita una redundancia poco natural con «camino».
- source_word: בֵּיתָהּ
  english_pob_choice: toward her house
  chosen_spanish: hacia su casa
  alternatives_spanish:
  - a su casa
  - en dirección a su casa
  - para su casa
  lexicon: HALOT
  rationale: El sufijo posesivo indica «su casa», y el contexto direccional pide un complemento de movimiento. «Hacia su casa» reproduce bien la orientación sin forzar una meta ya alcanzada.
- source_word: יִצְעָד
  english_pob_choice: he steps
  chosen_spanish: se dirige
  alternatives_spanish:
  - camina
  - avanza a pasos
  - pisa
  lexicon: HALOT
  rationale: צעד puede expresar andar/avanzar con pasos firmes. En español, «se dirige» integra el matiz direccional combinado con el sustantivo «camino» implícito en el hebreo, manteniendo un tono natural y literario.
theological_decisions:
- issue: Referencia de la casa femenina y la progresión narrativa hacia la tentación
  english_pob_reading: The verse describes deliberate movement toward the woman's house, preserving the concrete directional force of the Hebrew.
  chosen_spanish_reading: La traducción conserva la dirección intencional del movimiento hacia su casa, sin suavizarla ni moralizarla.
  alternative_spanish_readings:
  - su casa
  - la casa de ella
  - la casa de la mujer
  rationale: No hay doctrina explícita en este versículo, pero sí una progresión narrativa que importa conservar. Mantener la orientación espacial ayuda a no diluir la escena de advertencia del proverbio.
  doctrine_reference: Sabiduría proverbial y exhortación moral en Proverbios 7
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió una traducción más directa de dirección («toward her house») en vez de una expresión menos inmediata. El español adopta esa decisión con «hacia su casa», y conserva el participio inicial para reflejar el flujo narrativo del hebreo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o cualquier sustitución cultual, porque no hay tetragrámaton en el versículo.
  - Se prefirió «cerca de» para אֵצֶל y «hacia» para el valor direccional final, manteniendo la imagen espacial concreta.
  - «Su esquina» conserva la relación posesiva del sufijo sin añadir elementos ajenos al texto.
  - La nota al pie marca la alternativa léxica documentada entre «calle» y «calle del mercado».
