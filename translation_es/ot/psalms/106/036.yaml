review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: ויעבדו = «sirvieron», עצביהם = «sus ídolos», y la cláusula resultativa «y llegaron a ser… una trampa» capta el sentido de ויהיו להם למוקש. Sin embargo, «para ellos» suena menos preciso que «les fueron» o «se volvieron para ellos», y «trampa» es aceptable pero «lazo» preserva mejor el matiz bíblico/metafórico de מוֹקֵשׁ.'
  spanish_quality_summary: El español es claro y natural, pero «llegaron a ser para ellos una trampa» resulta algo rígido. Una formulación más idiomática y digna en español bíblico moderno es «y les fueron un lazo» o «y se volvieron para ellos un lazo».
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Ídolos» está bien. La nota alternativa con «adoraron» es válida. Conviene ajustar «trampa» a «lazo» por mayor cercanía contextual a מוֹקֵשׁ y mejor registro bíblico en español.
  issues:
  - severity: medium
    issue: «para ellos» debilita la relación afectiva marcada por לָהֶם
    rationale: Aunque no es incorrecto, en esta construcción española suena menos natural y menos directo que «les» o «para ellos se volvieron». El hebreo expresa que los ídolos resultaron ser un tropiezo/cepo para el propio pueblo.
  - severity: medium
    issue: «trampa» es correcta pero menos precisa que «lazo» para לְמוֹקֵשׁ
    rationale: מוֹקֵשׁ en contexto bíblico suele denotar un medio de atrapamiento o de ruina moral/espiritual. «Lazo» conserva mejor esa resonancia metafórica tradicional sin volverse arcaico.
  - severity: low
    issue: La secuencia «llegaron a ser para ellos una trampa» suena algo pesada
    rationale: Una ligera recast mejora la legibilidad sin apartarse del significado fuente.
  revised_spanish_text: Sirvieron a sus ídolos[a], y estos les fueron un lazo.
