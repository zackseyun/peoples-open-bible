base_translation:
  language: en
  yaml_path: translation/ot/1_kings/022/036.yaml
  text: And a cry passed through the camp at sunset[a], saying, “Each man to his city[b], and each man to his land!”
  footnotes:
  - marker: a
    text: Or “the shout,” “the cry,” or “the proclamation passed through the camp.” The Hebrew רִנָּה often denotes a loud cry or ringing shout; here it refers to the camp-wide announcement.
    reason: lexical_alternative
  - marker: b
    text: Literally, “Each man to his city, and each man to his land.” This is a formulaic dismissal after the battle.
    reason: cultural_note
