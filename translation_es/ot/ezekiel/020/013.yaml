    text: Hebrew 'a man'; the phrase is a generic singular meaning any person who does them will live by them.
    reason: lexical_alternative
  - marker: b
    text: Or 'my ordinances' for 'my judgments.'
    reason: lexical_alternative
  - marker: c
    text: This wording echoes Leviticus 18:5.
    reason: cross_reference
