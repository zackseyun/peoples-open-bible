translation:
  language: es
  text: un día de trompeta y clamor de guerra contra las ciudades fortificadas y contra las altas almenas[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un día de trompeta y alarma» o «un día de trompeta y grito». El término hebreo traducido aquí como «clamor de guerra» puede denotar un grito fuerte, una señal de alarma o un grito militar; por el contexto de ataque a ciudades fortificadas se favorece el matiz bélico.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las esquinas altas». Probablemente se refiere a salientes elevados de defensa o a esquinas/torres de las murallas de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹם
  english_pob_choice: a day of
  chosen_spanish: un día de
  alternatives_spanish:
  - día de
  lexicon: HALOT
  rationale: Conserva la fórmula nominal del hebreo y su valor de encabezado del juicio, con artículo indefinido natural en español.
- source_word: שׁוֹפָר
  english_pob_choice: trumpet
  chosen_spanish: trompeta
  alternatives_spanish:
  - cuerno
  - shofar
  lexicon: HALOT
  rationale: En español, 'trompeta' transmite con claridad el instrumento de señal o alarma; 'cuerno' sería más específico pero menos natural aquí, y 'shofar' no es necesario como transliteración.
- source_word: תְרוּעָה
  english_pob_choice: battle cry
  chosen_spanish: clamor de guerra
  alternatives_spanish:
  - grito de guerra
  - alarma
  - clamor
  lexicon: HALOT
  rationale: La combinación con trompeta y el contexto de asedio favorecen un sentido marcial. 'Clamor de guerra' preserva la fuerza colectiva y el matiz bélico sin reducirlo a un simple 'grito'.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - sobre de
  lexicon: HALOT
  rationale: En un marco de ataque y juicio, 'contra' expresa mejor la dirección adversativa que 'sobre'.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - las urbes
  - los pueblos
  lexicon: HALOT
  rationale: '''Ciudades'' es el equivalente estándar y encaja con el paralelo de defensas urbanas.'
- source_word: הַבְּצֻרוֹת
  english_pob_choice: fortified
  chosen_spanish: fortificadas
  alternatives_spanish:
  - amuralladas
  - fortalezas
  lexicon: HALOT
  rationale: Reproduce de forma directa la cualidad defensiva de las ciudades, sin sustituir el adjetivo por un sustantivo.
- source_word: הַפִּנּוֹת
  english_pob_choice: high battlements
  chosen_spanish: almenas
  alternatives_spanish:
  - baluartes
  - esquinas
  - torres de esquina
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'las esquinas', pero en contexto arquitectónico defensivo apunta a remates o salientes elevados de las murallas. 'Almenas' funciona como término castellano comprensible para una parte alta y defensiva de una fortificación, sin sobreespecificar 'torres'.
- source_word: הַגְּבֹהוֹת
  english_pob_choice: high
  chosen_spanish: altas
  alternatives_spanish:
  - elevadas
  - altísimas
  lexicon: HALOT
  rationale: Adjetivo simple y natural para describir las almenas, manteniendo el valor descriptivo del hebreo.
translation_notes:
  revision_awareness: 'Se siguió el sentido confirmado por el texto hebreo y el auditorial inglés: ''trumpet and battle cry'' se vertió con un término marcial en español, y ''high battlements'' se resolvió de manera arquitectónica sin imponer ''torres'' donde el hebreo es más amplio. La lectura cruzada indicó alto acuerdo y no requirió ajustes textuales adicionales.'
  spanish_consistency_notes:
  - Se usó 'trompeta' en lugar de 'shofar' para mantener inteligibilidad sin transliteración innecesaria.
  - '''Clamor de guerra'' conserva el matiz militar señalado por la auditoría inglesa y evita suavizar תְרוּעָה a un simple ''alarma''.'
  - '''Almenas'' comunica una defensa elevada de muro; la nota preserva la alternativa literal ''esquinas altas'' para mantener visible la tensión lexical.'
  - No se introdujeron términos eclesiásticos ajenos al contexto del juicio militar.
