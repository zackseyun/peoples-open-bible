lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: El plural constructo de בן introduce una lista genealógica. «Hijos de» es la correspondencia más directa y natural en español para este tipo de registro; «descendientes de» sería más amplio, pero menos preciso para esta lista de nombres.
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebron
  lexicon: Nombre propio
  rationale: Es un nombre propio y se translitera al español con la forma usual «Hebrón».
- source_word: יְרִיָּהוּ
  english_pob_choice: Jeriah
  chosen_spanish: Jerías
  alternatives_spanish:
  - Jería
  - Jeriah
  lexicon: Nombre propio
  rationale: Se adapta al patrón ortográfico habitual en español bíblico para este nombre; la terminación refleja una transliteración legible y no pretende explicar etimología.
- source_word: הָרֹאשׁ
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el jefe
  - la cabeza
