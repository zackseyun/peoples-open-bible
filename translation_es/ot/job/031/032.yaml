    rationale: La nota actual tiene comillas y puntuación poco naturales y no aprovecha del todo las alternativas documentadas; conviene ofrecer «forastero» y «caminante» como alternativas si el texto principal se ajusta.
  revised_spanish_text: El extranjero no pasaba la noche fuera[a]; yo abría mis puertas al viajero.
