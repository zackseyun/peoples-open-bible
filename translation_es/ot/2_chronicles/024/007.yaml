translation:
  language: es
  text: Pues Atalía[a], esa mujer malvada, y sus hijos varones habían irrumpido en la casa de Dios y también habían hecho[b] todos los objetos sagrados de la casa de Yahvé para los Baales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Atalía, la mujer malvada’. El hebreo usa una construcción enfática que puede reflejarse como aposición despectiva o como descripción calificativa.
    reason: alternative_reading
  - marker: b
    text: O ‘habían usado’ o ‘habían destinado’ todos los objetos sagrados de la casa de Yahvé para los Baales. El hebreo dice más literalmente ‘habían hecho’, pero en contexto probablemente indica que los apropiaron o emplearon para el culto idolátrico.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del contexto anterior con valor causal/explanatorio natural en español, sin perder la fuerza argumentativa.
- source_word: עֲתַלְיָהוּ
  english_pob_choice: Athaliah
  chosen_spanish: Atalía
  alternatives_spanish:
  - Atalía
  lexicon: Conventional transliteration
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
- source_word: הַמִּרְשַׁעַת
  english_pob_choice: that wicked woman
  chosen_spanish: esa mujer malvada
  alternatives_spanish:
  - la mujer malvada
  - esa impía
  lexicon: HALOT
  rationale: Conserva el valor femenino y el tono despectivo del artículo enfático; 'malvada' comunica היטב la evaluación moral sin sonar arcaica.
- source_word: בָּנֶיהָ
  english_pob_choice: her sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: En español, 'hijos' puede incluir la referencia masculina explícita del hebreo sin forzar una formulación pesada; el contexto dinástico hace clara la referencia a descendientes varones.
- source_word: פָרְצוּ אֶת בֵּית הָאֱלֹהִים
  english_pob_choice: had broken into the house of God
  chosen_spanish: habían irrumpido en la casa de Dios
  alternatives_spanish:
  - habían penetrado en la casa de Dios
  - habían forzado la casa de Dios
  lexicon: HALOT
  rationale: El verbo hebreo expresa violación/irrupción forzosa; 'irrumpido' transmite entrada violenta y profanadora mejor que un simple 'romper'.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea 'casa de Dios' para mantener el paralelismo con la frase siguiente 'casa de Yahvé'.
- source_word: כָּל קָדְשֵׁי בֵית יְהוָה
  english_pob_choice: all the holy things of the house of Yahweh
  chosen_spanish: todos los objetos sagrados de la casa de Yahvé[b]
  alternatives_spanish:
  - todas las cosas santas de la casa de Yahvé
  - todos los objetos consagrados de la casa de Yahvé
  lexicon: HALOT
  rationale: קָדְשֵׁי se refiere a bienes/objetos consagrados del templo; 'objetos sagrados' es claro en español y evita un calco torpe de 'cosas santas'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: Project default terminology
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre del pacto sin enmascararlo como 'Señor'.
- source_word: לַבְּעָלִים
  english_pob_choice: for the Baals
  chosen_spanish: para los Baales
  alternatives_spanish:
  - para Baal
  - para los ídolos Baal
  lexicon: HALOT
  rationale: Se conserva el plural hebreo בְּעָלִים como plural ('Baales'), porque el texto no usa un singular y la pluralidad puede aludir a diversos cultos/imágenes.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Señor
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Conforme al estándar del proyecto, se traduce como 'Yahvé' para preservar el nombre revelado y evitar la sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Plural de בְּעָלִים
  english_pob_reading: the Baals
  chosen_spanish_reading: los Baales
  alternative_spanish_readings:
  - Baal
  - los ídolos de Baal
  rationale: La forma hebrea es plural, y la traducción mantiene esa pluralidad en español en vez de normalizarla a un singular genérico.
  doctrine_reference: HALOT / plural cultic usage
- issue: Relación de עָשׂוּ לַבְּעָלִים con los objetos del templo
  english_pob_reading: had also made all the holy things ... for the Baals
  chosen_spanish_reading: habían hecho todos los objetos sagrados ... para los Baales
  alternative_spanish_readings:
  - habían usado todos los objetos sagrados ... para los Baales
  - habían dedicado todos los objetos sagrados ... para los Baales
  rationale: Se conserva 'habían hecho' porque el verbo hebreo עשה está presente y el audit trail inglés corrigió una adaptación excesiva; en contexto, el sentido apunta a convertir o destinar los objetos sagrados al culto idolátrico, sin borrar la tensión entre literalidad y función.
  doctrine_reference: Lexical tension in source verb usage
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés al mantener el verbo fuente más cercano a עשה ('habían hecho') mientras preserva la lectura contextual de profanación de objetos sagrados. También conserva la pluralidad de בְּעָלִים y el paralelo 'casa de Dios / casa de Yahvé'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente para יְהוָה.
  - Se mantuvo el paralelismo 'casa de Dios' / 'casa de Yahvé' para reflejar el hebreo.
  - '''Baales'' conserva el plural cultual del hebreo.'
  - El tono moral de הַמִּרְשַׁעַת se expresó con un calificativo claro pero no arcaizante.
  - No se sustituyó 'objetos sagrados' por 'cosas santas' para evitar calco no natural en español.
