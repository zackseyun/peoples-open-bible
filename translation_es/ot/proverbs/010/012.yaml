  to: El odio aviva contiendas, pero el amor cubre[a] todas las transgresiones.
  rationale: 'Se propone una revisión menor para acercar mejor el verbo hebreo causativo y el tono proverbial: «aviva contiendas» reproduce más fielmente la idea de suscitar o reencender disputas. Se añade además una nota sobre «cubre» para conservar la explicación semántica y teológica ya documentada en el POB inglés, evitando una lectura reductiva o éticamente equívoca.'
