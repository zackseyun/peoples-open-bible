- from: Y el pueblo bendijo[a] a todos los hombres que se ofrecieron voluntariamente[b] para habitar en Jerusalén.
  to: Y el pueblo bendijo a todos los hombres que se ofrecieron voluntariamente para vivir en Jerusalén[a].
  rationale: Se elimina la nota sobre ‘bendijo’ porque no está sustentada por la auditoría inglesa y no es necesaria para la claridad. Se unifica la alternativa léxica en una sola nota anclada al sintagma completo de voluntariado, en paralelo con la POB inglesa. Además, se cambia ‘habitar’ por ‘vivir’ para alinearse mejor con la decisión léxica documentada para לָשֶׁבֶת y con el español natural.
