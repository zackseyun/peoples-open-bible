  to: y el sexto[a], Ithream, de Eglá, la esposa de David. Estos le nacieron a David en Hebrón.
  rationale: Se ajusta el nombre propio a «Ithream» para mayor consistencia con la auditoría inglesa y se mejora la nota para reflejar con más precisión la alternativa léxica del hebreo. El resto del texto se mantiene porque es sustancialmente fiel y natural en español.
