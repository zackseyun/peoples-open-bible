review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: זָנַח = «ha rechazado», טוֹב sustantivado = «el bien», אוֹיֵב = «un enemigo», e יִרְדְּפוֹ = «lo perseguirá», manteniendo correctamente a Israel como singular personificado. La única desalineación importante está en la nota al pie, que presenta como alternativa «ha desechado el bien», pero luego dice que el hebreo puede entenderse más literalmente como «el bien» en vez de «lo bueno», aunque el texto principal ya dice «el bien». La alternativa documentada en el rastro inglés es entre «el bien» y «lo bueno», no entre «rechazado» y «desechado» como foco principal de la nota.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial amplio. «Israel ha rechazado el bien; un enemigo lo perseguirá» suena idiomático y fiel. La puntuación y fluidez son correctas. La nota, sin embargo, es internamente confusa y redundante frente al texto principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Israel», «el bien» y «un enemigo» están bien elegidos. El uso de «lo perseguirá» preserva apropiadamente el singular masculino del hebreo.
  issues:
  - severity: medium
    issue: La nota al pie no reproduce con claridad la alternativa léxica documentada en el inglés POB.
    rationale: El inglés preserva como alternativa principal «Israel has cast off the good» y aclara que el hebreo también puede expresarse más literalmente como «the good» en vez de «what is good». En español, como el texto principal ya usa «el bien», la nota actual resulta confusa al repetir esa literalidad y no explicar bien la alternativa relevante.
  - severity: low
    issue: La nota mezcla dos ejes alternativos distintos sin adaptación al español.
    rationale: Combina la variante verbal «desechado» con una explicación sobre «el bien» versus «lo bueno», pero esa última ya está resuelta en el texto principal. Conviene reformularla para que aporte información útil al lector español.
  revised_spanish_text: Israel ha rechazado el bien[a]; un enemigo lo perseguirá.
  revised_footnotes:
  - marker: a
    text: 'O: «Israel ha desechado el bien». El hebreo también puede expresarse como «lo bueno» en vez de «el bien».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo, al rastro del POB y al español natural. Solo se corrige la nota para que refleje de manera coherente las alternativas documentadas en inglés y tenga sentido respecto del texto español ya adoptado.
