lexical_decisions:
- source_word: וּ/בְ/צִקְלַ֥ג
  english_pob_choice: and in Ziklag
  chosen_spanish: y en Ziclag
  alternatives_spanish:
  - también en Ziclag
  lexicon: HALOT
  rationale: El nombre propio se translitera. La combinación de conjunción y preposición se vierte naturalmente como «y en», manteniendo el valor locativo del hebreo sin sobretraducir.
- source_word: וּ/בִ/מְכֹנָ֖ה
  english_pob_choice: and in Mekonah
  chosen_spanish: y en Mekoná
  alternatives_spanish:
  - y en Mekonah
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre propio transliterado. «Mekoná» refleja una adaptación española legible y mantiene la identidad del lugar.
- source_word: וּ/בִ/בְנֹתֶֽי/הָ
  english_pob_choice: and its daughter villages
  chosen_spanish: y sus aldeas hijas
  alternatives_spanish:
  - y sus hijas
  - y sus pueblos dependientes
  - y sus aldeas dependientes
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal «sus hijas» para referirse a asentamientos subsidiarios. En español, «aldeas hijas» conserva la metáfora y hace explícito el sentido de dependencia territorial sin borrar la imagen original.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y el audit trail inglés, sin cambios textuales relevantes respecto al análisis previo. Se conserva el valor idiomático de בְּנוֹתֶיהָ mediante una formulación española comprensible que no elimina la metáfora.
  spanish_consistency_notes:
  - Se usa «y en» para reflejar la preposición hebrea con cada topónimo.
  - Se transliteran los nombres propios sin traducirlos.
  - Se mantiene el modismo de las «hijas» como nota aclaratoria, evitando una simplificación excesiva del hebreo.
