lexical_decisions:
- source_word: כַּף
  english_pob_choice: dish
  chosen_spanish: vasija
  alternatives_spanish:
  - platillo
  - fuente
  - recipiente
  lexicon: HALOT
  rationale: En el inventario cultual de Números 7, כַּף designa un recipiente pequeño para el incienso. En español, 'vasija' comunica con naturalidad la idea de un contenedor sin forzar una forma moderna específica; 'platillo' o 'fuente' son posibles, pero pueden sonar demasiado domésticos o demasiado grandes.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: Concuerda en género con כַּף, que es femenino; 'una' es la forma natural en español.
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - diez
  lexicon: HALOT
  rationale: Número cardinal que en esta fórmula expresa el peso asociado al recipiente/ofrenda.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro puro
  - oro
  lexicon: HALOT
  rationale: En español, la relación material suele expresarse de modo más natural con 'de oro' que con 'oro' como adjetivo pospuesto.
- source_word: עֲשָׂרָה זָהָב
  english_pob_choice: of ten shekels
  chosen_spanish: de diez siclos
  alternatives_spanish:
  - que pesa diez siclos
  - de diez siclos de oro
  - diez siclos
  lexicon: HALOT
  rationale: El hebreo usa la fórmula abreviada de peso; siguiendo la nota auditada del inglés, se suministra 'siclos' para claridad y fidelidad contextual, sin añadir contenido ajeno al capítulo.
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - llena
  - repleta de
  lexicon: HALOT
  rationale: Adjetivo predicativo que describe el contenido del recipiente; 'llena de' es idiomático y preciso en español.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume aromático
  - incienso aromático
  lexicon: HALOT
  rationale: Término estándar para la sustancia aromática de la ofrenda; 'incienso' preserva el sentido cultual reconocido en español.
translation_notes:
  revision_awareness: El inglés POB mantiene una equivalencia óptima con nota explicativa sobre la elipsis del peso; el español sigue esa misma decisión, conservando la fórmula cultual y haciendo explícito 'siclos' por claridad, sin introducir una lectura alternativa.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto cuando aparezca el tetragrámaton; este verso no lo contiene.
  - '''Incienso'' se mantiene como término cultual estándar y no se parafrasea.'
  - La nota reproduce la elipsis de peso del hebreo y la suplencia contextual de 'siclos' de manera auditable.
