translation:
  language: es
  text: Yahvé, su Dios, los salvará en aquel día como el rebaño de su pueblo, porque centellearán[a] como las piedras de una corona[b] sobre su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «serán alzadas como las piedras de una corona sobre su tierra». El verbo hebreo puede sugerir ser levantadas o exhibidas con prominencia, no solo brillar.
    reason: lexical_alternative
  - marker: b
    text: «Piedras de una corona» también puede traducirse «joyas de la corona» o, menos probablemente, «piedras consagradas», pues el término hebreo para «corona» también puede llevar asociaciones de consagración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹשִׁיעָם
  english_pob_choice: And ... will save them
  chosen_spanish: los salvará
  alternatives_spanish:
  - los librará
  - los rescatará
  lexicon: HALOT
  rationale: El hiphil de ישׁע normalmente comunica salvar/librar. «Salvará» preserva el valor amplio de rescate y victoria sin especificar más de lo que exige el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino YHWH, usando «Yahvé» como forma principal en español.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios de ellos
  - el Dios de ellos
  lexicon: HALOT
  rationale: La construcción posesiva expresa relación de pacto de manera directa y natural en español.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - para aquel día
  lexicon: HALOT
  rationale: La fórmula profética temporal se vierte con una expresión natural en español sin perder su carácter escatológico o futuro.
- source_word: כְּצֹאן עַמּוֹ
  english_pob_choice: as the flock of his people
  chosen_spanish: como el rebaño de su pueblo
  alternatives_spanish:
  - como las ovejas de su pueblo
  - como su rebaño
  lexicon: HALOT
  rationale: «Rebaño» conserva el sentido colectivo y pastoral mejor que una traducción más literal con «ovejas»; mantiene la imagen de pertenencia de su pueblo a Yahvé.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación del motivo; «porque» es claro y natural en español para esa relación causal/explanatoria.
- source_word: אַבְנֵי נֵזֶר
  english_pob_choice: the stones of a crown
  chosen_spanish: las piedras de una corona
  alternatives_spanish:
  - las gemas de una corona
  - las piedras de la corona
  - las joyas de una corona
  lexicon: HALOT
  rationale: Se preserva la imagen literal de las piedras de una corona, evitando suavizarla demasiado; «corona» comunica bien נֵזֶר en este contexto poético.
- source_word: מִתְנוֹסְסוֹת
  english_pob_choice: will sparkle like
  chosen_spanish: serán como
  alternatives_spanish:
  - resplandecerán como
  - brillarán como
  - serán alzadas como
  lexicon: HALOT
  rationale: El participio reflexivo puede sugerir brillo conspicuo o ser levantado/mostrado. Dado el sintagma poético con piedras de corona, «serán como» permite mantener abierta la ambigüedad visual, y el comparativo de la cláusula sostiene la imagen de esplendor sin forzar un único matiz.
- source_word: עַל אַדְמָתוֹ
  english_pob_choice: over his land
  chosen_spanish: sobre su tierra
  alternatives_spanish:
  - sobre su país
  - en su tierra
  - sobre su suelo
  lexicon: HALOT
  rationale: «Tierra» reproduce היטב el sentido de אדמה en un contexto de restauración territorial; «sobre» conserva la localización de la imagen poética.
theological_decisions:
- issue: Referente de «su Dios» y del posesivo en la metáfora pastoral
  english_pob_reading: The LORD their God will save them ... as the flock of his people
  chosen_spanish_reading: Yahvé su Dios los salvará ... como el rebaño de su pueblo
  alternative_spanish_readings:
  - Yahvé, el Dios de ellos, los salvará
  - Yahvé, su Dios, los salvará
  rationale: La lectura más directa mantiene la relación de pacto entre Yahvé y el pueblo. El posesivo no se neutraliza; se conserva el vínculo teológico y pastoral del texto.
  doctrine_reference: Pacto / relación de pertenencia de Yahvé con su pueblo
translation_notes:
  revision_awareness: La redacción sigue la línea de la revisión más reciente del POB en inglés, que prefirió una imagen de brillo conspicuo (‘sparkle’) frente a un brillo genérico (‘shine’). En español, se mantuvo una formulación más abierta («serán como») para no perder la tensión semántica del participio hebreo entre esplendor y elevación/exhibición.
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto para YHWH.
  - Se conserva «su Dios» sin convertirlo en una fórmula eclesiástica distinta.
  - «Tierra» traduce adecuadamente אַדְמָה en un marco de restauración nacional/poética.
  - Las notas a y b se anclan al sintagma final para reflejar la ambigüedad del hebreo y la nota del POB en inglés.
