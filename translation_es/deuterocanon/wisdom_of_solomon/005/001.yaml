translation:
  language: es
  text: Entonces el justo estará de pie con gran valentía[a][b] ante[c] los que lo afligieron y los que despreciaban sus trabajos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con gran confianza». El griego παρρησία puede denotar tanto valentía como confianza abierta.
    reason: lexical_alternative
  - marker: b
    text: Aquí se traduce el matiz de παρρησία en una escena de vindicación pública. También puede entenderse como «con gran audacia» o «con mucha franqueza».
    reason: theological_note
  - marker: c
    text: Literalmente, «ante el rostro de». La expresión reproduce un giro semítico/griego de comparecer directamente en presencia de alguien.
    reason: lexical_alternative
  - marker: d
    text: O «sus fatigas», «sus afanes» o «sus sufrimientos». El griego πόνους puede referirse a trabajo arduo, penalidad o dolor.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: LSJ
  rationale: Marca secuencia temporal de manera natural en español y conserva el avance narrativo del griego.
- source_word: στήσεται
  english_pob_choice: will stand
  chosen_spanish: se mantendrá
  alternatives_spanish:
  - estará en pie
  - se pondrá en pie
  - tomará posición
  lexicon: LSJ
  rationale: El futuro medio de ἵστημι en este contexto expresa estar/ponerse firme ante un juicio o vindicación; 'se mantendrá' comunica estabilidad y presencia sin forzar una imagen demasiado literal.
- source_word: ἐν παρρησίᾳ πολλῇ
  english_pob_choice: with great boldness
  chosen_spanish: con gran confianza
  alternatives_spanish:
  - con gran valentía
  - con gran audacia
  - con mucha franqueza
  lexicon: LSJ
  rationale: παρρησία puede abarcar franqueza, valentía y confianza. En español, 'confianza' resulta natural en una escena de vindicación; se conserva la nota de apertura pública, pero se deja la alternativa de 'valentía/audacia' en la nota.
- source_word: ὁ δίκαιος
  english_pob_choice: the righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - el justo varón
  - el recto
  lexicon: LSJ
  rationale: El sustantivo-adjetivo singular masculino se puede rendir de forma breve y fiel con 'el justo'; en español bíblico es claro y preserva la singularidad sin añadir un sustantivo innecesario.
- source_word: κατὰ πρόσωπον
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  - frente a
  lexicon: LSJ
  rationale: La expresión semítica/griega indica presencia directa. 'Ante' es sobrio, natural y mantiene el sentido de comparecer directamente delante de sus opositores.
- source_word: τῶν θλιψάντων αὐτὸν
  english_pob_choice: those who afflicted him
  chosen_spanish: los que lo afligieron
  alternatives_spanish:
  - los que lo oprimieron
  - los que lo atormentaron
  - los que lo acosaron
  lexicon: LSJ
  rationale: θλίβω abarca oprimir/afligir/presar. 'Afligieron' conserva el daño sufrido sin restringirlo a una sola modalidad de opresión.
- source_word: τῶν ἀθετούντων
  english_pob_choice: those who disregarded
  chosen_spanish: los que despreciaban
  alternatives_spanish:
  - los que rechazaban
  - los que anulaban
  - los que no hacían caso de
  lexicon: LSJ
  rationale: ἀθετέω puede significar rechazar, invalidar o tratar como de ningún valor. En esta construcción con 'sus trabajos', 'despreciaban' expresa mejor la desestimación activa que el simple desentenderse.
- source_word: τοὺς πόνους αὐτοῦ
  english_pob_choice: his labors
  chosen_spanish: sus trabajos
  alternatives_spanish:
  - sus fatigas
  - sus afanes
  - sus sufrimientos
  lexicon: LSJ
  rationale: πόνος puede significar trabajo arduo, fatiga o dolor. 'Trabajos' en español bíblico conserva la idea de esfuerzo penoso y el plural concreto del griego; se deja 'fatigas/afanes/sufrimientos' como alternativas posibles.
theological_decisions:
- issue: Forma singular masculina de ὁ δίκαιος
  english_pob_reading: the righteous man
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - el hombre justo
  - el justo varón
  rationale: El texto griego es singular y masculino. 'El justo' preserva esa referencia singular sin neutralizarla ni cargarla con una paráfrasis innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de παρρησία en una escena de vindicación
  english_pob_reading: with great boldness
  chosen_spanish_reading: con gran confianza
  alternative_spanish_readings:
  - con gran valentía
  - con gran audacia
  rationale: En un contexto de comparecencia pública, παρρησία incluye apertura franca y seguridad visible. 'Confianza' suena más natural en español, pero no elimina el matiz de comparecer sin temor; la nota conserva la alternativa de 'valentía/audacia'.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: El griego presenta una escena de comparecencia final y vindicación. En la línea del audit trail inglés, se evitó calcar «before the face of» en la redacción principal por sonar rígido en español, pero se preservó el valor semítico de κατὰ πρόσωπον mediante la nota c. También se mantuvo la tensión léxica de παρρησία y πόνους con notas alternativas, sin reducirlas a un único matiz.
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «el justo» para conservar la singularidad masculina del griego de forma natural en español.
  - «Con gran confianza» se eligió como solución principal por legibilidad, aunque el griego admite con igual fuerza un matiz de valentía pública.
  - «Sus trabajos» conserva la idea de esfuerzos sufridos sin convertir la frase en una paráfrasis extensa.
