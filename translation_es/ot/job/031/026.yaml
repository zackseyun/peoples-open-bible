translation:
  language: es
  text: si miré la luz cuando resplandecía[a], o a la luna moviéndose con esplendor[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sol», ya que «la luz» aquí probablemente se refiere al sol en paralelo con «la luna».
    reason: lexical_alternative
  - marker: b
    text: O «la luna andando en brillo / esplendor».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  - cuando
  lexicon: HALOT
  rationale: En la serie de juramento condicional de Job, la partícula introduce una hipótesis negativa; en español, «si» expresa de manera natural esa condición.
- source_word: אֶרְאֶה
  english_pob_choice: I looked
  chosen_spanish: yo mirara
  alternatives_spanish:
  - yo vi
  - yo veía
  - yo hubiera mirado
  lexicon: HALOT
  rationale: El imperfecto hebreo en este contexto de juramento expresa una acción hipotética dentro de una cláusula condicional. «Yo mirara» mantiene el valor no realizado mejor que un pasado simple.
- source_word: א֖וֹר
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la luz del sol
  - el sol
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal «luz», como en el POB inglés, sin explicitar «sol» en el texto principal, porque el hebreo no lo dice de manera directa.
- source_word: כִּ֣י
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - que
  lexicon: HALOT
  rationale: Aquí la partícula introduce la circunstancia temporal de ver la luz; «cuando» reproduce mejor ese matiz que una traducción causal o completiva.
- source_word: יָהֵ֑ל
  english_pob_choice: it shone
  chosen_spanish: resplandecía
  alternatives_spanish:
  - brillaba
  - daba luz
  lexicon: HALOT
  rationale: El verbo comunica brillo o resplandor. «Resplandecía» es una forma natural en español y conserva la imagen de luminosidad continua.
- source_word: וְיָרֵחַ
  english_pob_choice: or at the moon
  chosen_spanish: o la luna
  alternatives_spanish:
  - y la luna
  - o la luna que
  lexicon: HALOT
  rationale: La coordinación hebrea presenta un segundo objeto en paralelo; en español, «o» funciona mejor en la enumeración condicional. Se omite una repetición innecesaria de «mirara» para evitar aspereza.
- source_word: יָקָר
  english_pob_choice: in splendor
  chosen_spanish: en esplendor
  alternatives_spanish:
  - en gloria
  - en brillo
  - espléndida
  lexicon: HALOT
  rationale: El adjetivo describe majestad o magnificencia de la luna. «En esplendor» conserva el tono adverbial y la elección del POB inglés.
- source_word: הֹלֵךְ
  english_pob_choice: moving
  chosen_spanish: que iba
  alternatives_spanish:
  - que avanzaba
  - que se movía
  - andando
  lexicon: HALOT
  rationale: El participio de הלך expresa el curso de la luna. «Que iba» es idiomático en español y mantiene la idea de movimiento continuo sin añadir interpretación.
theological_decisions:
- issue: Posible alusión a la veneración astral sin explicitarla en el texto principal
  english_pob_reading: Retain the literal celestial imagery without making the worship implication explicit in the main text.
  chosen_spanish_reading: Conservar la imagen literal de la luz y la luna sin introducir «sol» ni «idolatría» en el cuerpo del versículo.
  alternative_spanish_readings:
  - si yo mirara al sol cuando resplandecía
  - si yo mirara la luz del sol cuando resplandecía
  rationale: El contexto inmediato sugiere la tentación o veneración de los cuerpos celestes, pero el verso mismo sólo nombra «luz» y «luna». La versión española preserva esa tensión textual y deja que el contexto posterior la desarrolle.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el dictamen fue de alta concordancia y sin observaciones, por lo que se mantiene la lectura del texto fuente y del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «luz» como equivalente literal de אוֹר, reservando «sol» para la nota alternativa.
  - Se tradujo la secuencia verbal con imperfecto hipotético español («mirara», «iba») para reflejar la cláusula condicional del juramento.
  - Se usó «esplendor» para יָקָר, en línea con la solución inglesa y con registro sobrio.
  - No se añadió puntuación explicativa ni vocabulario doctrinal ajeno al verso.
