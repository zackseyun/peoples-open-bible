  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἴδε ἐγὼ Παῦλος λέγω ὑμῖν ὅτι ἐὰν περιτέμνησθε Χριστὸς ὑμᾶς οὐδὲν ὠφελήσει.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/005/002.yaml
  text: 'Look: I[a], Paul, say to you that if you receive circumcision[b], Messiah will benefit you nothing.'
