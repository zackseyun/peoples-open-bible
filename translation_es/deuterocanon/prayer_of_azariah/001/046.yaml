revisions:
- from: ¡Bendecid al Señor, escarcha y frío; cantadle alabanzas y exaltadlo altamente para siempre!
  to: ¡Bendigan al Señor, escarcha y frío; cántenle alabanzas y exáltenlo en gran manera para siempre!
  rationale: 'Se conserva el sentido fuente y la estructura doxológica, pero se ajusta el español para mayor naturalidad y fidelidad estilística: «cántenle alabanzas» expresa mejor ὑμνεῖτε, «exáltenlo en gran manera» comunica la intensificación de ὑπερυψοῦτε sin calco extraño, y las formas en -n favorecen un español latinoamericano neutral y ampliamente legible.'
