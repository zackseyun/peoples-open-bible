  - severity: medium
    issue: «Quitim» para כִּתִּים
    rationale: La forma «Quitim» no sigue la decisión documentada de transliterar el etnónimo/nombre propio. En español, «Kitim» mantiene mejor la correspondencia con el hebreo y evita una castellanización ad hoc.
  - severity: low
