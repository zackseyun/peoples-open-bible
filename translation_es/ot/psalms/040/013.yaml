base_translation:
  language: en
  yaml_path: translation/ot/psalms/040/013.yaml
  text: For evils beyond number have surrounded me[a]; my iniquities have overtaken me, and I am not able to see. They are more than the hairs of my head[c][b], and my heart fails me.
