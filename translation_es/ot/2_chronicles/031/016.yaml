  rationale: 'Se revisa para mejorar la naturalidad y precisión del español sin apartarse del hebreo ni de la auditoría inglesa: «de tres años para arriba» sustituye una expresión poco idiomática; «todo el que entraba» refleja mejor el singular colectivo; y «registrados por genealogía» suena más natural en contexto administrativo. Se mantienen «Yahvé», «varones», «servicio» y «divisiones», y se conservan las notas léxicas pertinentes.'
