  - severity: medium
    issue: «es hecho necio» es una formulación poco idiomática en español
    rationale: Aunque intenta reflejar la pasiva de «is made brutish», en español suena artificial. El hebreo נִבְעַר expresa quedar embrutecido/insensato; «se embrutece» o «queda embrutecido» comunican mejor el sentido sin calco duro.
  - severity: low
    issue: «metalúrgico» resulta demasiado técnico para צֹרֵף en este contexto
    rationale: El término español moderno sugiere una profesión industrial o científica. En un contexto de manufactura idolátrica, «fundidor» o «artesano del metal» es más natural y contextual sin perder amplitud.
  revised_spanish_text: Todo hombre se embrutece, sin conocimiento; todo fundidor es avergonzado por su ídolo, porque su imagen fundida es falsedad, y no hay aliento[a] en ellos.
