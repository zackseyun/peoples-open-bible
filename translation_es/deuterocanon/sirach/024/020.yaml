translation:
  language: es
  text: Porque el recuerdo[a] de mí es más dulce que la miel[b], y mi herencia es más dulce que el panal de miel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «memoria de mí» o «memorial de mí».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «más que miel»; el griego usa una comparación que en español se expresa de forma natural con «más dulce que la miel».
    reason: lexical_alternative
  - marker: c
    text: O «el panal». El griego emplea una expresión idiomática para «panal de miel».
    reason: lexical_alternative
lexical_decisions:
- source_word: μνημόσυνόν
  english_pob_choice: memory
  chosen_spanish: recuerdo
  alternatives_spanish:
  - memoria
  - conmemoración
  - memorial
  lexicon: LSJ
  rationale: μνημόσυνον puede significar recuerdo, memoria o memorial. En español, «recuerdo de mí» suena natural en este contexto poético y conserva la idea de una presencia recordada, sin convertirla en un objeto litúrgico de conmemoración.
- source_word: μου
  english_pob_choice: of me
  chosen_spanish: de mí
  alternatives_spanish:
  - mío
  - me
  lexicon: LSJ
  rationale: El genitivo se expresa de forma directa con «de mí» para mantener el referente personal explícito y respetar la primera persona del discurso de Sabiduría.
- source_word: ὑπὲρ
  english_pob_choice: than
  chosen_spanish: que
  alternatives_spanish:
  - más allá de
  - sobre
  lexicon: LSJ
  rationale: En comparación, ὑπέρ se traduce naturalmente con «más ... que» en español; aquí se usa «más dulce que» para reflejar el valor comparativo del griego.
- source_word: γλυκύ
  english_pob_choice: sweeter
  chosen_spanish: más dulce
  alternatives_spanish:
  - dulce
  - más sabroso
  lexicon: LSJ
  rationale: Aunque el adjetivo griego está en forma positiva, la construcción comparativa exige en español «más dulce» para expresar con claridad el sentido del verso.
- source_word: κληρονομία
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - posesión
  lexicon: LSJ
  rationale: «Herencia» es el equivalente más directo y comprensible en español para κληρονομία, y conserva la idea de lo que Sabiduría deja o concede a los suyos.
- source_word: μέλιτος κηροῦ
  english_pob_choice: the honeycomb
  chosen_spanish: el panal
  alternatives_spanish:
  - el panal de miel
  - la miel del panal
  lexicon: LSJ
  rationale: La expresión griega es un giro idiomático para «panal de miel»; en español, «el panal» es breve y natural, y mantiene la imagen sin expandir innecesariamente el idioma de origen.
theological_decisions:
- issue: Voz en primera persona de Sabiduría
  english_pob_reading: Retain the first-person speech as Wisdom speaking of herself.
  chosen_spanish_reading: 'Mantener la voz en primera persona: Sabiduría habla de sí misma.'
  alternative_spanish_readings:
  - Leer el verso de modo impersonal como una referencia abstracta al recuerdo de la sabiduría.
  - Suavizar el sujeto para que no parezca personificación.
  rationale: El contexto inmediato de Sirácides 24 presenta a Sabiduría hablando en primera persona. La traducción conserva «mí» y «mi herencia» para no borrar esa personificación ni resolver la tensión teológica del pasaje.
  doctrine_reference: Preservar la personificación sapiencial según el contexto literario y el testimonio del texto original.
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «than honey from the comb» a «than the honeycomb», y luego añadió el verbo implícito en la segunda cláusula («is sweeter»). La versión española sigue esa lectura más ajustada y completa, con «más dulce» también en la segunda cola y con una imagen breve para κηροῦ.
  spanish_consistency_notes:
  - Se mantiene «recuerdo» para μνημόσυνον, en línea con la opción inglesa «memory», sin forzar una terminología eclesiástica.
  - Se traduce la comparación con una estructura española natural («más dulce que») para conservar la fuerza poética del griego.
  - «El panal» evita una expansión innecesaria, pero la nota permite la lectura explícita «panal de miel» donde se prefiera mayor transparencia.
  - Se conserva la primera persona para respetar la personificación de Sabiduría en el capítulo.
