review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: juramento solemne de אֲדֹנָי יְהוִה, base del juramento ''por su santidad'', anuncio profético de juicio y la imagen de ser llevadas con implementos tipo gancho/anzuelo. Sin embargo, omite la nota léxica que el rastro inglés conserva para וְאַחֲרִיתְכֶן y su español actual introduce una preposición (''a su posteridad'') que no corresponde a la simple coordinación del hebreo.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'Porque, he aquí' suena algo rígido y redundante tras dos pausas; 'Pues miren' sería más idiomático, aunque no imprescindible. Más importante, 'y a su posteridad con anzuelos de pesca' suena menos natural que 'y a su posteridad[a] con anzuelos de pesca' con nota, y conviene evitar la preposición extra para mantener el paralelismo. También es más natural en este contexto punitivo 'se los llevarán' que 'los levantarán', pero el borrador sigue siendo entendible.
  glossary_alignment: Alinea bien con la política del proyecto al usar 'Yahvé' para יהוה dentro del título compuesto 'El Señor Yahvé'. Conserva 'santidad', 'ganchos' y 'anzuelos de pesca' de forma aceptable. Falta preservar en español la ambigüedad documentada de אַחֲרִיתְכֶן mediante nota, ya que el inglés POB la retuvo.
  issues:
  - severity: medium
    issue: Falta la nota léxica correspondiente a וְאַחֲרִיתְכֶן / 'your posterity'.
    rationale: El POB inglés preserva una alternativa significativa ('the last of you' / remnant / end). Dado que 'posteridad' en español puede sonar principalmente descendencia futura, conviene anclar una nota para conservar la amplitud semántica documentada.
  - severity: low
    issue: La frase 'y a su posteridad' añade una preposición no motivada por el hebreo.
    rationale: 'El hebreo coordina directamente el segundo complemento con el primero. En español, ''y su posteridad...'' mantiene mejor el paralelismo: ''los levantarán... y su posteridad...''.'
  - severity: low
    issue: Registro algo acartonado en 'Porque, he aquí'.
    rationale: Es comprensible y solemne, pero menos natural en español moderno. 'Porque, miren' o 'Pues, vienen días...' serían más fluidos. No es un error grave de fidelidad.
  revised_spanish_text: 'El Señor Yahvé ha jurado por su santidad: «Porque, he aquí, vienen días sobre ustedes en que los levantarán con ganchos[b], y su posteridad[a] con anzuelos de pesca».'
