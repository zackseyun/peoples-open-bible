revisions:
- from: Y cuando el arca del pacto de Yahvé llegó a la ciudad de David, Mical, hija de Saúl, miró por la ventana y vio al rey David danzando y jugando[a]; y lo despreció en su corazón.
  to: Mientras el arca del pacto de Yahvé llegaba a la ciudad de David, Mical, hija de Saúl, miró por la ventana y vio al rey David danzando y festejando[a]; y lo despreció en su corazón.
  rationale: Se ajusta «jugando» a «festejando» para evitar en español una connotación demasiado trivial y preservar mejor el matiz festivo de וּמְשַׂחֵק en contexto procesional, manteniendo una nota con la alternativa más literal. También se mejora la fluidez narrativa con «Mientras ... llegaba».
  reviewer_model: gpt-5.4
