id: PHP.1.6
reference: Philippians 1:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πεποιθὼς αὐτὸ τοῦτο ὅτι ὁ ἐναρξάμενος ἐν ὑμῖν ἔργον ἀγαθὸν ἐπιτελέσει ἄχρι ἡμέρας ⸂Χριστοῦ Ἰησοῦ⸃·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/006.yaml
  text: 'I am confident of this very thing: that he who began a good work among you will bring it to completion at the day of Messiah Jesus.'
translation:
  language: ko
  text: '나는 바로 이 사실을 확신합니다. 곧, 여러분 가운데서[a] 선한 일을 시작하신 분께서 메시아 예수의 날까지[b] 그 일을 완성하시리라는 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분 안에서」. 헬라어 ἐν ὑμῖν의 ὑμῖν은 복수이며, 빌립보 회중 전체를 향한 공동체적 호소가 우선이다. 개인 안에서의 역사 가능성도 함께 살리기 위해 각주로 둔다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그 날에」. ἄχρι는 시간적 종착점을 가리키며, 「~까지」가 그 종말론적 완성의 시점을 자연스럽게 표시한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεποιθὼς
  english_pob_choice: I am confident
  chosen_korean: 확신합니다
  alternatives_korean:
  - 확신하면서
  - 굳게 믿으며
  lexicon: BDAG
  rationale: 완료 분사 πεποιθώς는 결과적 상태(굳어진 확신)를 나타낸다. 한국어로 분사 종속절(「확신하며」)보다 정식 종결문(「확신합니다」)으로 옮겨야 합쇼체 산문의 흐름이 자연스럽다. 영어 POB가 「I am confident」로 정식 절을 세운 결정을 그대로 따른다.
- source_word: αὐτὸ τοῦτο
  english_pob_choice: this very thing
  chosen_korean: 바로 이 사실
  alternatives_korean:
  - 바로 이것
  - 이것 자체
  lexicon: BDAG
  rationale: 지시사의 강조 반복을 「바로 이」로 살린다. 뒤에 ὅτι 절이 따라오므로 「이 사실」로 받아 ὅτι 절을 자연스럽게 연결한다.
- source_word: ὁ ἐναρξάμενος
  english_pob_choice: he who began
  chosen_korean: 시작하신 분
  alternatives_korean:
  - 시작하신 이
  - 시작하신 그분
  lexicon: BDAG
  rationale: 정관사 + 분사를 한국어 관형절 「시작하신 분」으로 옮겨 인격 주체(암시된 하나님)를 분명히 한다.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_korean: 여러분 가운데서
  alternatives_korean:
  - 여러분 안에서
  - 여러분 속에서
  lexicon: BDAG
  rationale: 복수 ὑμῖν은 회중 전체를 향한 공동체적 호소이다. 영어 POB의 「among you」 선택을 따라 「여러분 가운데서」로 옮기고, 개인적 적용의 「여러분 안에서」는 각주로 둔다.
- source_word: ἔργον ἀγαθὸν
  english_pob_choice: a good work
  chosen_korean: 선한 일
  alternatives_korean:
  - 좋은 일
  - 선한 사역
  lexicon: BDAG
  rationale: 「선한 일」이 한국어 성서 어법에 가장 자연스럽고 윤리·구원사적 함의를 함께 담는다.
- source_word: ἐπιτελέσει
  english_pob_choice: will bring it to completion
  chosen_korean: 완성하시리라
  alternatives_korean:
  - 마치시리라
  - 끝까지 이루시리라
  lexicon: BDAG
  rationale: ἐπιτελέω는 단순한 종결이 아니라 「온전히 끝까지 이룸」의 함의를 가진다. 「완성하시리라」가 종말론적 완성의 무게를 살린다.
- source_word: ἄχρι ἡμέρας
  english_pob_choice: at the day (revised from 'until the day')
  chosen_korean: ~의 날까지
  alternatives_korean:
  - ~의 날에
  - ~의 날에 이르기까지
  lexicon: BDAG
  rationale: ἄχρι는 시간적 종착점을 가리키는 전치사로, 「~까지」가 자연스럽다. 영어 POB는 일시적 「at the day」로 정착했으나 한국어 어법상 「~까지」가 종착점 의미를 더 분명히 담는다. 종착점 「at」의 정점적 함의는 각주로 둔다.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도 예수
  lexicon: BDAG
  rationale: 본 번역의 일관된 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다.
theological_decisions:
- issue: 하나님의 일하심의 범위 — 개인 vs 공동체
  chosen_reading: 여러분 가운데서
  alternative_readings:
  - 여러분 안에서
  rationale: 복수 ὑμῖν과 빌립보 서신의 회중 어법은 공동체적 함의를 우선시한다. 한국 전통 번역은 「너희 속에」로 개인 적용을 부각해 왔으나, 본문은 회중 전체를 향한 약속이다. 개인적 적용은 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: 빌립보서 1:6의 Χριστοῦ Ἰησοῦ를 칭호로 번역
  chosen_reading: 메시아 예수
  alternative_readings:
  - 그리스도 예수
  rationale: 종말론적 「메시아의 날」 표현에서 Χριστός의 칭호성은 더욱 두드러진다. 「그리스도의 날」은 음역으로 굳어져 칭호성이 가려진다.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title)'
