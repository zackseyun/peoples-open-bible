translation:
  language: es
  text: Pero en cuanto a estos asuntos, más particularmente, he dado órdenes de que tanto estos hombres como los de mi parte[a] hablen con ustedes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. ‘los de mi parte’; probablemente se refiere a los representantes o agentes del rey.
    reason: lexical_alternative
  - marker: b
    text: O ‘conversen con ustedes’. El verbo griego puede implicar conversación, discusión o negociación, no solo habla simple.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ δὲ τούτων
  english_pob_choice: But concerning these matters
  chosen_spanish: Pero en cuanto a estos asuntos
  alternatives_spanish:
  - Pero acerca de estos asuntos
  - Ahora, respecto de estos asuntos
  lexicon: BDAG
  rationale: ὑπέρ con genitivo puede significar ‘acerca de/ en cuanto a’ en contextos administrativos. ‘En cuanto a’ mantiene el giro de transición de δέ y suena natural en español sin convertirlo en una simple paráfrasis.
- source_word: κατὰ μέρος
  english_pob_choice: in detail
  chosen_spanish: en detalle
  alternatives_spanish:
  - por separado
  - punto por punto
  - individualmente
  lexicon: LSJ
  rationale: La locución indica tratamiento parte por parte. ‘En detalle’ conserva el sentido administrativo y es idiomático en español actual.
- source_word: ἐντέταλμαι
  english_pob_choice: I have given orders
  chosen_spanish: he dado órdenes
  alternatives_spanish:
  - he mandado
  - he instruido
  - he ordenado
  lexicon: BDAG
  rationale: El perfecto de ἐντέλλομαι comunica una orden ya emitida con vigencia presente. ‘He dado órdenes’ preserva el tono oficial sin endurecerlo más de lo necesario.
- source_word: τούτους τε
  english_pob_choice: both these men
  chosen_spanish: tanto estos hombres
  alternatives_spanish:
  - estos también
  - estos hombres asimismo
  lexicon: LSJ
  rationale: τε coordina el primer grupo con el siguiente. En español, ‘tanto... como...’ reproduce bien la correlación y evita perder la unión de los dos grupos.
- source_word: τοὺς παρʼ ἐμοῦ
  english_pob_choice: those from me
  chosen_spanish: los que vienen de parte mía
  alternatives_spanish:
  - los de mi parte
  - mis representantes
  - los enviados por mí
  lexicon: BDAG
  rationale: La frase es literalmente ‘los de/desde mí’. Para el español, ‘los que vienen de parte mía’ conserva la relación de procedencia sin cerrar demasiado el referente como ‘representantes’ o ‘enviados’, que serían más interpretativos.
- source_word: διαλεχθῆναι ὑμῖν
  english_pob_choice: should speak with you
  chosen_spanish: hablen con ustedes
  alternatives_spanish:
  - conversen con ustedes
  - traten con ustedes
  - discuta[n] con ustedes
  lexicon: BDAG
  rationale: διαλέγομαι puede implicar conversación o deliberación. ‘Hablen con ustedes’ es amplio y natural en español; mantiene abierta la posibilidad de diálogo o negociación que la nota inglesa señala.
theological_decisions:
- issue: 'Alcance de διαλεχθῆναι: hablar o conferenciar'
  english_pob_reading: The Greek verb can denote discussion or negotiation, not merely speaking.
  chosen_spanish_reading: hablen con ustedes
  alternative_spanish_readings:
  - conversen con ustedes
  - traten con ustedes
  - conferencien con ustedes
  rationale: Se evita reducir el verbo a mera emisión de palabras. ‘Hablen con ustedes’ deja abierta la carga de conversación, discusión o gestión que el griego permite, coherente con el audit trail inglés.
  doctrine_reference: Lexical/semantic, no doctrinal change
- issue: Identidad de τοὺς παρʼ ἐμοῦ
  english_pob_reading: Literally 'those from me,' likely meaning the king's own representatives or agents.
  chosen_spanish_reading: los que vienen de parte mía
  alternative_spanish_readings:
  - mis representantes
  - los enviados por mí
  - mis agentes
  rationale: La redacción evita especificar indebidamente ‘representantes’ o ‘agentes’ como si el griego lo dijera de manera explícita. Así se conserva la tensión entre literalidad y referencia probable que la edición inglesa documenta.
  doctrine_reference: Lexical/administrative clarity
- issue: Fuerza de la orden real
  english_pob_reading: I have given orders
  chosen_spanish_reading: he dado órdenes
  alternative_spanish_readings:
  - he mandado
  - he ordenado
  rationale: No se suaviza la autoridad del hablante. ‘He dado órdenes’ refleja el carácter oficial del mandato sin introducir matices pastorales o eclesiásticos ajenos al contexto.
  doctrine_reference: Narrative/administrative register
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés sin dependender mecánicamente de él: se mantuvo el valor administrativo de ὑπέρ + genitivo, la idiomática de κατὰ μέρος, la autoridad del perfecto ἐντέταλμαι y la ambigüedad controlada de τοὺς παρʼ ἐμοῦ y διαλεχθῆναι ὑμῖν. No hubo revisiones aplicadas en el pass más reciente; por eso se produce un borrador estable y conservador.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en el proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se prefirió ‘hablen con ustedes’ sobre ‘conferencien’ por naturalidad en español, manteniendo la amplitud semántica del verbo griego.
  - ‘Los que vienen de parte mía’ conserva la literalidad y deja abierta la identificación precisa del grupo.
  - Se emplea ‘ustedes’ para registro neutral latinoamericano y lectura eclesial amplia.
