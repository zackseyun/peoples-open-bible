translation:
  language: es
  text: Porque si ustedes se apartan de seguirlo, él volverá a dejar[a] al pueblo en el desierto, y destruirán a todo este pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «dejarlo», con un sufijo singular; aquí se entiende en sentido colectivo, refiriéndose a Israel o al pueblo. El español explicita ese referente con «al pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: תְשׁוּבֻן
  english_pob_choice: you turn back
  chosen_spanish: ustedes se apartan de seguirlo
  alternatives_spanish:
  - ustedes vuelven atrás
  - ustedes se vuelven de seguirlo
  lexicon: HALOT
  rationale: En este contexto, שוב con מֵאַחֲרָיו expresa dejar de seguir, no solo regresar físicamente. En español, «se apartan de seguirlo» conserva la idea relacional e idiomática con naturalidad.
- source_word: מֵאַחֲרָיו
  english_pob_choice: from following him
  chosen_spanish: de seguirlo
  alternatives_spanish:
  - de atrás de él
  - de seguir detrás de él
  lexicon: HALOT
  rationale: El hebreo literalmente dice «de detrás de él / de después de él», pero es un modismo. «De seguirlo» comunica el valor idiomático sin perder el referente singular.
- source_word: וְיָסַף עוֹד
  english_pob_choice: he will again
  chosen_spanish: volverá a
  alternatives_spanish:
  - seguirá
  - hará de nuevo
  lexicon: HALOT
  rationale: La secuencia יסף עוד funciona como un giro idiomático de repetición. «Volverá a» es la forma más natural en español para expresar esa reiteración.
- source_word: לְהַנִּיחוֹ
  english_pob_choice: leave them
  chosen_spanish: dejar[a] al pueblo
  alternatives_spanish:
  - dejarlo
  - dejar al pueblo allí
  lexicon: HALOT
  rationale: El sufijo singular del hebreo se conserva mediante una nota, pero en español la referencia colectiva queda explícita como «al pueblo» para evitar ambigüedad. «Dejar» mantiene el valor de permitir que permanezcan en el lugar.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto[b]
  alternatives_spanish:
  - en el desierto árido
  - en el yermo
  lexicon: HALOT
  rationale: «Desierto» es el equivalente español más natural y comprensible para מִדְבָּר en el Pentateuco. Se mantiene la nota para señalar que el término bíblico también carga resonancias narrativas y teológicas de Israel.
- source_word: וְשִׁחַתֶּם
  english_pob_choice: you will destroy
  chosen_spanish: destruirán
  alternatives_spanish:
  - arruinarán
  - causarán la ruina de
  lexicon: HALOT
  rationale: El hebreo admite una fuerza destructiva directa. «Destruirán» sigue de cerca la decisión final del POB inglés y conserva la gravedad del efecto sobre el pueblo.
- source_word: לְכָל הָעָם הַזֶּה
  english_pob_choice: all this people
  chosen_spanish: a todo este pueblo
  alternatives_spanish:
  - a todo este pueblo
  - a este pueblo entero
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo colectivo singular. En español, «a todo este pueblo» expresa bien esa totalidad sin forzar una pluralización innecesaria.
theological_decisions:
- issue: Pronombre singular en לְהַנִּיחוֹ frente al referente colectivo
  english_pob_reading: Retain the singular pronoun in English ('leave them' after revision, with the earlier audit noting the Hebrew singular) as a collective reference to Israel/the people.
  chosen_spanish_reading: Conservar la referencia colectiva explícita en «al pueblo», con nota sobre el singular hebreo implícito en el verbo pronominal.
  alternative_spanish_readings:
  - dejarlo
  - dejar a ellos
  rationale: El hebreo presenta un sufijo singular que, por el contexto, apunta colectivamente a Israel/el pueblo. En español, «al pueblo» evita una referencia confusa y preserva la idea colectiva sin borrar la tensión gramatical del original.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referencia implícita del sujeto en «seguirlo»
  english_pob_reading: Following him refers to the divine or leader-following relation preserved by the Hebrew idiom.
  chosen_spanish_reading: Mantener el pronombre enclítico «seguirlo» sin sustituirlo por una paráfrasis explicativa.
  alternative_spanish_readings:
  - seguir a Yahvé
  - seguir a él
  rationale: El hebreo conserva un objeto personal implícito; en español, el enclítico permite una traducción sobria y fiel. Añadir el nombre propio sería interpretativo y más explícito de lo que el verso requiere.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al preferir un verbo más directo para שׁחת ("destruirán") y al tratar el referente colectivo del pronombre hebreo sin oscurecerlo. A la vez, conserva la tensión gramatical del original mediante una nota sobre el sufijo singular, en vez de normalizarlo sin comentario.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología POB por defecto cuando el contexto lo requiera; en este versículo no aparece explícitamente el nombre divino, pero el pronombre «lo» conserva la referencia del seguimiento.
  - Se usa «desierto» y no «wilderness» transliterado, de acuerdo con el uso bíblico español estándar y la terminología del proyecto.
  - No se introduce «Mesías», «siervo» ni otra terminología no pertinente al verso.
