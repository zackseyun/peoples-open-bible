  text: Then Samuel said to all Israel[a], “Behold, I have listened to your voice in all that you have said to me[b], and I have made a king over you.”
  footnotes:
  - marker: a
    text: Or 'I have obeyed your voice' / 'I have heeded your request.' The Hebrew idiom 'listen to the voice' can include the sense of complying with what was asked.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''I have appointed a king over you.'' The Hebrew verb is causative: ''to make someone king'' or ''to cause someone to reign.'''
    reason: lexical_alternative
