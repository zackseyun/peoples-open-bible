revisions:
- from: El terror que inspiras[a] te ha engañado, la arrogancia de tu corazón[b]— tú que habitas en las hendiduras de la peña[c], que ocupas la altura de la colina. Aunque pongas tu nido tan alto como el águila, desde allí te haré bajar, declara Yahvé.
  to: El terror que inspiras[a] te ha engañado, la arrogancia de tu corazón[b]— tú que habitas en las hendiduras de la peña[c], que ocupas la altura de la colina. Aunque pongas tu nido en lo alto, como el águila, desde allí te haré bajar, declara Yahvé.
  rationale: Se hizo una reparación menor en la cláusula comparativa del nido para que el español suene natural y conserve con más precisión la imagen hebrea de elevación semejante a la del águila. No se alteró el contenido semántico principal ni las notas ya bien alineadas con la auditoría inglesa.
