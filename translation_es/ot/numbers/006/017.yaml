  text: וְ/אֶת הָ/אַ֜יִל יַעֲשֶׂ֨ה זֶ֤בַח שְׁלָמִים֙ לַֽ/יהוָ֔ה עַ֖ל סַ֣ל הַ/מַּצּ֑וֹת וְ/עָשָׂה֙ הַ/כֹּהֵ֔ן אֶת מִנְחָת֖/וֹ וְ/אֶת נִסְכּֽ/וֹ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/006/017.yaml
  text: And he shall offer the ram as a sacrifice of peace offerings to Yahweh[a], with the basket of unleavened bread; and the priest shall offer its grain offering and its drink offering.
  footnotes:
