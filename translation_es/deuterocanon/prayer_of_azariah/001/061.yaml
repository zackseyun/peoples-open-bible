translation:
  language: es
  text: Bendigan al Señor[a], sacerdotes; canten himnos[b] y exáltenlo en gran manera para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Alaben al Señor, sacerdotes». «Bendigan» conserva mejor el lenguaje litúrgico repetido del griego.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «canten alabanzas». ὑμνεῖτε incluye con claridad la idea de cantar himnos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Alabad
  - Bendigan
  lexicon: BDAG
  rationale: El imperativo plural conserva el tono litúrgico del griego. «Bendecid» mantiene la fuerza doxológica de εὐλογεῖτε mejor que un «alabad» más general, y corresponde bien al llamado coral del texto.
- source_word: ἱερεῖς
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - vosotros, sacerdotes
  - curas
  lexicon: BDAG
  rationale: El vocativo plural se entiende naturalmente en español como «sacerdotes». «Sacerdotes» preserva el grupo interpelado sin añadir elementos ajenos al texto.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Señor
  lexicon: BDAG
  rationale: En este contexto griego de alabanza, κύριον se vierte como «Señor». «Al Señor» reproduce el objeto directo de la exhortación sin introducir la convención de mayúsculas del Tetragrama, que no aparece en el griego.
- source_word: ὑμνεῖτε
  english_pob_choice: sing hymns
  chosen_spanish: cantad himnos
  alternatives_spanish:
  - entonad himnos
  - cantad alabanzas
  lexicon: BDAG
  rationale: ὑμνεῖτε implica canto hímnico, no solo alabanza genérica. «Cantad himnos» conserva mejor el matiz musical que un simple «alabad».
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo muy por encima
  alternatives_spanish:
  - exaltadlo grandemente
  - levantadlo en extremo
  lexicon: BDAG
  rationale: El verbo compuesto intensifica la exaltación. «Exaltadlo muy por encima» intenta reproducir en español esa intensificación sin perder claridad ni sonar demasiado literal o pesado.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por siempre jamás
  lexicon: BDAG
  rationale: En una fórmula doxológica, «para siempre» comunica de modo natural la duración indefinida del griego y evita una rigidez innecesaria en español.
theological_decisions:
- issue: κύριος como título de alabanza en un contexto griego deuterocanónico
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: El texto griego usa κύριον, no el Tetragrama. Por eso la lectura castellana más fiel es «el Señor». «Yahvé» introduciría una identificación explícita que no está en la superficie textual del griego aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
- issue: Función de ὑμνεῖτε junto con ὑπερυψοῦτε
  english_pob_reading: sing hymns and highly exalt him
  chosen_spanish_reading: cantad himnos y exaltadlo muy por encima
  alternative_spanish_readings:
  - cantad alabanzas y exaltadlo grandemente
  - entonad himnos y levantadlo en alto
  rationale: La pareja verbal distingue entre canto hímnico y exaltación intensificada. La traducción elegida conserva esa distinción, evitando fusionar ambos mandatos en una sola idea genérica de alabanza.
  doctrine_reference: BDAG ὑμνέω / ὑπερυψόω
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego normalizado del override de traducción y con la decisión inglesa establecida; no se requieren revisiones textuales adicionales. La versión española sigue de cerca la estructura imperativa y la cadencia doxológica del original.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, en línea con la decisión inglesa y sin trasladar la convención hebrea de «SEÑOR».
  - Se preserva la distinción entre alabanza general y canto hímnico mediante «bendecid» y «cantad himnos».
  - «Para siempre» traduce la fórmula temporal doxológica con naturalidad en español.
  - El registro es reverente y apto para lectura pública, sin arcaísmos innecesarios.
