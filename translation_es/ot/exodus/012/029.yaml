review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura narrativa, el alcance distributivo de ''todo primogénito'', la referencia geográfica, el rango ''desde... hasta...'', y el uso de ''Yahvé'' para יהוה. Sin embargo, no preserva fielmente dos decisiones clave del rastro auditado: הִכָּה queda demasiado débil en ''hirió'' frente a ''struck down'' en un contexto letal, y בְּבֵית הַבּוֹר se vuelve poco natural y opaco con ''la casa del pozo'', cuando la auditoría inglesa preserva la imagen concreta como ''prison pit'' pero con sentido claro de reclusión.'
  spanish_quality_summary: El texto es mayormente legible, pero 'Y aconteció que' suena innecesariamente formulaico para este proyecto, 'que se sentaba sobre su trono' resulta menos natural que una relativa simple en pasado narrativo, y 'la casa del pozo' no suena idiomática ni clara en español eclesial general. Una leve revisión mejora fidelidad y claridad sin perder dignidad.
  glossary_alignment: Alineado con la política del proyecto en 'Yahvé'. No hay términos doctrinales adicionales problemáticos. Conviene reforzar הִכָּה con 'derribó' o 'hirió de muerte'; y para בור, mantener la imagen de fosa/calabozo mediante 'foso de la prisión' con nota alternativa 'calabozo' o 'prisión'.
  issues:
  - severity: medium
    issue: '''hirió'' debilita demasiado הִכָּה en este contexto'
    rationale: Aunque נכה puede ser 'herir', aquí el resultado inmediato es la muerte de los primogénitos. La decisión inglesa 'struck down' conserva la imagen verbal y a la vez deja claro el desenlace letal. En español, 'hirió' por sí solo puede sonar no letal.
  - severity: high
    issue: '''la casa del pozo'' es poco natural y no comunica bien בְּבֵית הַבּוֹר'
    rationale: La auditoría inglesa escogió 'prison pit' para preservar tanto la concreción de בור como el contexto de encierro. 'Casa del pozo' reproduce mecánicamente los componentes, pero en español resulta confuso y poco legible. Debe expresarse como 'foso de la prisión' o similar, con nota para 'calabozo'/'prisión'.
  - severity: low
    issue: '''Y aconteció que'' es más arcaizante de lo necesario'
    rationale: El inglés auditado redujo ויהי a un simple conector narrativo. En español, 'Y' basta para preservar la secuencia sin cargar el estilo con una fórmula más rígida.
  - severity: low
    issue: '''que se sentaba sobre su trono'' suena menos natural en narrativa española'
    rationale: El participio hebreo puede verterse idiomáticamente en pasado narrativo como 'que estaba sentado en su trono', manteniendo el matiz de estatus real con mejor fluidez.
  revised_spanish_text: Y a la medianoche, Yahvé derribó[a] a todo primogénito en la tierra de Egipto, desde el primogénito de Faraón, que estaba sentado en su trono, hasta el primogénito del cautivo, que estaba en el foso de la prisión[b], y a todo primogénito del ganado.
  revised_footnotes:
