translation:
  language: es
  text: Los pliegues de su carne se adhieren entre sí[a]; están fundidos sobre él y no se pueden mover.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «firmemente puestos sobre él»; el hebreo usa una imagen de algo vertido o fundido de tal modo que queda fijo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַפְּלֵי
  english_pob_choice: folds
  chosen_spanish: pliegues
  alternatives_spanish:
  - dobleces
  - partes
  - capas
  lexicon: HALOT
  rationale: El término alude a partes colgantes o plegadas del cuerpo. «Pliegues» conserva la imagen corporal concreta y suena natural en español moderno.
- source_word: בְשָׂרוֹ
  english_pob_choice: his flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  - su piel
  - su carne
  lexicon: HALOT
  rationale: «Carne» reproduce con fidelidad el sentido básico de בשר y mantiene la correspondencia con el lenguaje hebreo, sin sustituirlo por una interpretación más amplia como «cuerpo».
- source_word: דָבֵקוּ
  english_pob_choice: cling together
  chosen_spanish: se pegan
  alternatives_spanish:
  - se adhieren
  - están pegados
  - se unen
  lexicon: HALOT
  rationale: El verbo expresa adhesión estrecha. «Se pegan» comunica esa unión intensa en español sin perder el valor físico de la imagen.
- source_word: יָצוּק
  english_pob_choice: cast firm
  chosen_spanish: están echados firmemente
  alternatives_spanish:
  - están vertidos firmemente
  - están fundidos
  - están fijados firmemente
  lexicon: HALOT
  rationale: La imagen hebrea es la de algo derramado o vaciado hasta quedar fijo. «Están echados firmemente» conserva el movimiento metafórico del original y evita borrar la tensión entre lo vertido y lo solidificado.
- source_word: עָלָיו
  english_pob_choice: upon him
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre él
  lexicon: HALOT
  rationale: Es la preposición habitual para indicar posición encima o sobre una persona. «Sobre él» es claro y sobrio en español.
- source_word: בַּל
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  - jamás
  lexicon: HALOT
  rationale: La partícula negativa poética se traduce con el negador simple «no», sin intensificar más de lo que exige el hebreo.
- source_word: יִמּוֹט
  english_pob_choice: to be moved
  chosen_spanish: se pueden mover
  alternatives_spanish:
  - se tambalean
  - se mueven
  - se sacuden
  lexicon: HALOT
  rationale: En este contexto el verbo expresa ser removido o desplazado. La construcción pasiva refleja la imposibilidad de moverse y preserva el sentido de inmovilidad.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide con la revisión inglesa más reciente en hacer explícita la segunda cláusula: no solo describe una fijación firme, sino también la imposibilidad de que esas partes se muevan.'
  spanish_consistency_notes:
  - Se mantuvo «carne» para בשר, conforme al valor léxico básico y a la terminología POB.
  - Se conservó la imagen física de «pliegues» y del acto de ser «echados»/«puestos», evitando una paráfrasis explicativa excesiva.
  - La negativa final se expresó de modo natural en español («no se pueden mover») para reflejar el sentido de בַּל יִמּוֹט sin endurecer la forma verbal.
