  text: Y si no tiene hija, entonces ustedes darán su herencia a sus hermanos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Si
  lexicon: HALOT
  rationale: La forma condicional encadena una nueva disposición legal; en español, «Y si» conserva la fuerza conjuntiva de וְ y suena natural en un registro jurídico.
- source_word: אֵין לוֹ
  english_pob_choice: he has no
  chosen_spanish: no tiene
  alternatives_spanish:
  - no le hay
  - no posee
  lexicon: HALOT
  rationale: La construcción existencial con לְוֹ expresa la ausencia de hija; «no tiene» es idiomático en español y mantiene el sentido legal de carencia de heredera.
- source_word: בַּת
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - una hija
  lexicon: HALOT
  rationale: «Hija» traduce de manera directa la singular hebrea בַּת. En español, el artículo puede omitirse sin perder claridad en esta cláusula legal.
- source_word: וּ/נְתַתֶּם
  english_pob_choice: then you shall give
  chosen_spanish: entonces darán
  alternatives_spanish:
  - y darán
  - entonces ustedes darán
  - deberán dar
  lexicon: HALOT
  rationale: El verbo está en segunda persona plural con valor instructivo; «darán» reproduce la obligación legal sin forzar un auxiliar. «Entonces» explicita la consecuencia de la condición.
- source_word: נַחֲלָתוֹ
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su heredad
  - su posesión hereditaria
  lexicon: HALOT
  rationale: En este contexto נַחֲלָה refiere a la porción heredada de tierra/derechos; «herencia» es transparente y conserva el peso jurídico del término.
- source_word: לְאֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos varones
  - a sus hermanos
  lexicon: HALOT
  rationale: El plural masculino hebreo apunta a los hermanos como siguientes herederos; «a sus hermanos» refleja fielmente el referente sin añadir explicaciones innecesarias en el texto principal.
translation_notes:
  revision_awareness: Coincide con el texto hebreo massorético y con la lectura auditada en inglés; no se identifican revisiones aplicadas ni tensiones léxicas adicionales en este versículo.
  spanish_consistency_notes:
  - Se mantiene el estilo legal-condicional breve y directo.
  - Se conserva el plural de mandato con valor jurídico en «darán».
  - No se introduce terminología eclesiástica ajena al contexto heredado.
