base_translation:
  language: en
  yaml_path: translation/ot/genesis/047/029.yaml
  text: When the days of Israel drew near for him to die[a], he called his son Joseph and said to him, “If now I have found favor in your eyes, please put your hand under my thigh, and deal with me in steadfast love and faithfulness[b]. Please do not bury me in Egypt.”
  footnotes:
  - marker: a
    text: '''Put your hand under my thigh'' refers to a solemn oath gesture in the patriarchal narratives; compare Genesis 24:2.'
    reason: cultural_note
  - marker: b
    text: Or 'steadfast love and faithfulness.' The Hebrew pair חֶסֶד וֶאֱמֶת conveys loyal, dependable covenantal kindness.
    reason: lexical_alternative
