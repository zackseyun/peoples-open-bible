translation:
  language: es
  text: y tu ganado vacuno[a] y tus rebaños se multiplicarán, y tu plata y tu oro aumentarán, y todo lo que es tuyo aumentará—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tus reses'. El hebreo בקר se refiere específicamente al ganado bovino como categoría colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְקָרְךָ
  english_pob_choice: and your herds
  chosen_spanish: y tus vacas
  alternatives_spanish:
  - y tu ganado vacuno
  - y tus reses
  lexicon: HALOT
  rationale: בקר se refiere específicamente al ganado bovino. En español, 'vacas' es más natural y concreto para un público amplio, aunque 'ganado vacuno' conserva mejor la categoría colectiva. Aquí se privilegia la referencia zoológica concreta del término hebreo.
- source_word: וְצֹאנְךָ
  english_pob_choice: and your flocks
  chosen_spanish: y tus rebaños
  alternatives_spanish:
  - y tus ovejas y cabras
  - y tu ganado menor
  lexicon: HALOT
  rationale: צאן es un colectivo para ganado menor, especialmente ovejas y cabras. 'Rebaños' mantiene el valor colectivo y funciona bien en paralelo con 'vacas' sin sobreespecificar cada animal.
- source_word: יִרְבְּיוּן
  english_pob_choice: multiply
  chosen_spanish: se multiplicarán
  alternatives_spanish:
  - se aumentarán
  - crecerán en número
  lexicon: HALOT
  rationale: El verbo de רבה expresa aumento numérico. 'Se multiplicarán' reproduce bien la fuerza cuantitativa y el paralelismo con los otros miembros de la línea.
- source_word: וְכֶסֶף וְזָהָב
  english_pob_choice: and your silver and gold
  chosen_spanish: y tu plata y tu oro
  alternatives_spanish:
  - y la plata y el oro
  - y tu dinero y oro
  lexicon: HALOT
  rationale: El hebreo nombra los metales preciosos; en español, el posesivo singular delante de ambos sustantivos refleja la posesión implícita en el contexto y sigue de cerca el ajuste del POB inglés revisado.
- source_word: יִרְבֶּה
  english_pob_choice: increase
  chosen_spanish: se aumentarán
  alternatives_spanish:
  - se multiplicarán
  - aumentarán
  lexicon: HALOT
  rationale: Para la plata y el oro, 'aumentarán' o 'se aumentarán' suena más natural que 'se multiplicarán', porque el hebreo trata estas riquezas como una masa de bienes. Se mantiene el valor de crecimiento sin forzar una imagen biológica.
- source_word: וְכֹל אֲשֶׁר לְךָ
  english_pob_choice: and all that is yours
  chosen_spanish: y todo lo que es tuyo
  alternatives_spanish:
  - y todo lo que tienes
  - y cuanto te pertenece
  lexicon: HALOT
  rationale: La frase resume posesión total. 'Todo lo que es tuyo' conserva la construcción posesiva del hebreo y evita añadir un matiz interpretativo más fuerte como 'tienes' o 'te pertenece'.
- source_word: יִרְבֶּה
  english_pob_choice: increases
  chosen_spanish: se multiplicará
  alternatives_spanish:
  - aumentará
  - crecerá
  lexicon: HALOT
  rationale: El verbo final repite רבה. 'Se multiplicará' mantiene el eco con el verbo anterior y transmite el incremento global de todos los bienes.
translation_notes:
  revision_awareness: This draft follows the Hebrew source directly while also taking account of the English POB audit trail, especially the distinction between livestock categories and the removal of a separate dative phrasing for wealth increase. No documented theological tension is present in this verse.
  spanish_consistency_notes:
  - Se mantuvo la estructura acumulativa del hebreo con tres miembros coordinados.
  - Se optó por formas reflexivas naturales en español ('se multiplicarán', 'se aumentarán') para expresar aumento pasivo/intransitivo.
  - No se introdujeron notas porque el verso no requiere alternativa textual o teológica adicional en español más allá de las decisiones léxicas documentadas.
