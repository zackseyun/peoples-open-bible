translation:
  language: es
  text: Por causa de él se levantó después de él un hijo sabio[a], que vivió seguro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Después de él se levantó un hijo entendido, y por él se estableció en amplitud/espacio holgado». El testimonio hebreo dice: «que vivió seguro».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבַעֲבוּרוֹ / διʼ αὐτόν
  english_pob_choice: Because of him
  chosen_spanish: A causa de él
  alternatives_spanish:
  - Por él
  - Por causa de él
  - Gracias a él
  lexicon: HALOT; LXX Greek parallel
  rationale: El hebreo y el griego expresan una relación causal o de beneficio vinculada al antecesor. «A causa de él» conserva esa relación sin decidir de antemano si el matiz es meramente causal o también benefactivo.
- source_word: עָמַד אַחֲרָיו / ἀνέστη
  english_pob_choice: there arose after him
  chosen_spanish: después de él se levantó
  alternatives_spanish:
  - se alzó después de él
  - surgió después de él
  - vino después de él
  lexicon: HALOT; LXX Greek parallel
  rationale: עָמַד en contextos de sucesión puede indicar levantarse o presentarse en el puesto de otro, y el griego ἀνέστη confirma la idea de surgir/levantarse. «Se levantó» mantiene la imagen verbal y la sucesión.
- source_word: בֵּן מַשְׂכִּיל / υἱὸς ἐπιστήμων
  english_pob_choice: a wise son
  chosen_spanish: un hijo sabio
  alternatives_spanish:
  - un hijo prudente
  - un hijo entendido
  - un hijo inteligente
  lexicon: HALOT; BDAG
  rationale: מַשְׂכִּיל y ἐπιστήμων apuntan a alguien con entendimiento, juicio y conocimiento práctico. «Sabio» es la opción más natural y fiel en español bíblico, sin reducirlo a mera capacidad intelectual.
- source_word: שׁוֹכֵן לָבֶטַח / κατέλυσεν ἐν πλατυσμῷ
  english_pob_choice: dwelt securely
  chosen_spanish: habitó con seguridad
  alternatives_spanish:
  - habitó seguro
  - moró en seguridad
  - se estableció con holgura
  lexicon: HALOT; LXX Greek parallel
  rationale: El hebreo habla de habitar con seguridad, mientras que el griego añade la imagen de «amplitud/espacio holgado». «Habitó con seguridad» preserva el sentido hebreo principal y deja la imagen griega para nota, como hace el audit trail inglés.
theological_decisions:
- issue: Relación entre el antecesor y la seguridad del hijo
  english_pob_reading: The son arose after him and enjoyed security because of him, without expanding this into a theological claim beyond the verse.
  chosen_spanish_reading: El texto afirma que el hijo se levantó después de él y habitó con seguridad a causa de él, sin desarrollar más la relación dinástica.
  alternative_spanish_readings:
  - El hijo surgió después de él y vivió seguro gracias a él.
  - Después de él apareció un hijo sabio que vivió en seguridad.
  rationale: La traducción conserva la conexión causal/dinástica entre ambos personajes, pero no especifica más de lo que el verso dice. Así se mantiene la tensión entre la lectura hebrea y la imaginería griega sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión textual sin sobreexplicación doctrinal.
translation_notes:
  revision_awareness: 'Tomé como base el acuerdo alto entre el hebreo y el griego, pero dejé en nota la diferencia relevante: el hebreo enfatiza seguridad; el griego, amplitud o holgura. También preferí «sabio» sobre «inteligente» para reflejar mejor el uso bíblico de מַשְׂכִּיל y ἐπιστήμων.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda en otras secciones; aquí no aparece el nombre divino.
  - Se mantiene «sabio» como equivalente preferente de מַשְׂכִּיל cuando el contexto es de discernimiento personal.
  - La nota conserva la alternativa del griego para no borrar la tensión entre seguridad y amplitud.
  - La puntuación y la sintaxis siguen un español bíblico moderno, sin calco rígido del inglés.
