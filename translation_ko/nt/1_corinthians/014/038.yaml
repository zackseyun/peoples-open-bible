id: 1CO.14.38
reference: 1 Corinthians 14:38
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ δέ τις ἀγνοεῖ, ⸀ἀγνοεῖται.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/038.yaml
  text: But if anyone does not recognize this[b][a], he is not recognized.
  footnotes:
  - marker: a
    text: Some manuscripts read, 'if anyone is ignorant, let him be ignorant.' The adopted text reads, 'if anyone ignores this, he is ignored.'
    reason: textual_variant
  - marker: b
    text: Or 'does not acknowledge ... is not acknowledged.' The Greek uses the same verb in active and passive forms for rhetorical effect.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 누구든지 인정하지 않으면, 그도 인정받지 못합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 「누구든지 알지 못하거든, 알지 못하게 두라」(능동형)로 읽는다. 본 번역은 SBLGNT의 수동형을 채택한다.
    reason: textual_variant
lexical_decisions:
- source_word: ἀγνοεῖ ... ἀγνοεῖται
  english_pob_choice: does not recognize ... is not recognized
  chosen_korean: 인정하지 않다 / 인정받지 못하다
  alternatives_korean:
  - 알지 못한다 / 알아주지 않는다
  lexicon: BDAG
  rationale: ἀγνοέω 능·수의 수사적 대구를 살리기 위해 「인정」으로 옮긴다. 의미적으로 「주가/공동체가 인정하지 않는다」를 가리킨다.
