revisions:
- from: Moisés hizo[a] lo que Yahvé mandó, y ellos subieron al monte Hor delante de todo el pueblo reunido.
  to: Moisés hizo como Yahvé le mandó, y ellos subieron al monte Hor ante los ojos de toda la congregación[a].
  rationale: Se corrige la ubicación de la nota para que ancle la frase que comenta, se restituye un equivalente más fiel de עֵדָה con «congregación», y se ajusta כַּאֲשֶׁר צִוָּה a «como Yahvé le mandó», que suena natural en español y sigue más de cerca el hebreo.
