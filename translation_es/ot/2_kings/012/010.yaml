translation:
  language: es
  text: Entonces Joiadá, el sacerdote, tomó un cofre, le hizo un agujero en su tapa[a] y lo puso junto al altar, a la derecha, al entrar un hombre en la casa de Yahvé; y los sacerdotes que guardaban el umbral ponían allí toda la plata[b] que era traída a la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «en su puerta». En el contexto de un cofre para dinero, probablemente se refiere a su tapa o cubierta.
    reason: lexical_alternative
  - marker: b
    text: 'O: «todo el dinero». El hebreo כסף puede significar «plata» o, por extensión, «dinero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹן
  english_pob_choice: chest
  chosen_spanish: arca
  alternatives_spanish:
  - caja
  - cofre
  lexicon: HALOT
  rationale: En este contexto de ofrendas del templo, el objeto es un recipiente para recibir dinero. En español, «arca» comunica bien un contenedor grande/solemne y evita una traducción demasiado técnica; «arca» no se entiende aquí como el Arca del pacto por el contexto inmediato.
- source_word: וַיִּקֹּב חֹר
  english_pob_choice: bored a hole
  chosen_spanish: perforó un agujero
  alternatives_spanish:
  - hizo un agujero
  - abrió un orificio
  lexicon: HALOT
  rationale: El hebreo describe la acción física de hacer una abertura. «Perforó un agujero» preserva la concreción del verbo sin sonar forzado en español.
- source_word: בְּדַלְתּוֹ
  english_pob_choice: in its lid
  chosen_spanish: en su tapa
  alternatives_spanish:
  - en su puerta
  - en su cubierta
  lexicon: HALOT
  rationale: Aunque דלת suele ser «puerta», en un cofre o arca para dinero el referente natural en español es la «tapa». Mantiene la intención contextual del inglés POB de evitar una imagen impropia de «puerta».
- source_word: אֵצֶל הַמִּזְבֵּחַ
  english_pob_choice: beside the altar
  chosen_spanish: junto al altar
  alternatives_spanish:
  - al lado del altar
  - cerca del altar
  lexicon: HALOT
  rationale: «Junto a» reproduce la proximidad de אצל con naturalidad en español.
- source_word: בימין
  english_pob_choice: on the right
  chosen_spanish: a la derecha
  alternatives_spanish:
  - del lado derecho
  - a mano derecha
  lexicon: HALOT
  rationale: Expresa de manera clara la orientación espacial indicada por el hebreo, conforme al contexto de la entrada al santuario.
- source_word: בְּבוֹא אִישׁ בֵּית יְהוָה
  english_pob_choice: as a man enters the house of the LORD
  chosen_spanish: al entrar un hombre en la casa de Yahvé
  alternatives_spanish:
  - cuando un hombre entra en la casa de Yahvé
  - al entrar cualquiera en la casa de Yahvé
  lexicon: HALOT
  rationale: «Al entrar un hombre» conserva el singular masculino אִישׁ y mantiene la orientación desde el punto de vista del que entra, sin perder fluidez en español.
- source_word: שֹׁמְרֵי הַסַּף
  english_pob_choice: who guarded the threshold
  chosen_spanish: que guardaban el umbral
  alternatives_spanish:
  - guardianes del umbral
  - porteros
  lexicon: HALOT
  rationale: «Umbral» traduce bien el sentido de סַף y evita suavizar la función cultual concreta de estos sacerdotes.
- source_word: כָּל הַכֶּסֶף
  english_pob_choice: all the silver
  chosen_spanish: todo el dinero
  alternatives_spanish:
  - toda la plata
  - todo el metal
  lexicon: HALOT
  rationale: Aunque כסף literalmente es «plata», en este contexto funciona como término de contribución monetaria. «Dinero» comunica el valor recibido en una forma natural para el lector español; la tensión con «plata» se conserva en la nota textual.
- source_word: הַמּוּבָא
  english_pob_choice: that was brought into
  chosen_spanish: que se llevaba a
  alternatives_spanish:
  - que era traído a
  - que se traía a
  lexicon: HALOT
  rationale: El participio pasivo indica lo que era introducido al templo. «Se llevaba a» refleja el movimiento de aportación en español corriente, sin añadir detalles ajenos al hebreo.
- source_word: בֵית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto para יהוה: «Yahvé». «Casa» conserva la expresión del hebreo y el tono del relato.'
theological_decisions:
- issue: Renderización del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. En español del POB, el nombre se vierte como «Yahvé» para preservar el nombre del pacto y evitar el reemplazo litúrgico por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de כֶּסֶף en contexto de ofrendas del templo
  english_pob_reading: all the silver
  chosen_spanish_reading: todo el dinero
  alternative_spanish_readings:
  - toda la plata
  - todas las monedas
  rationale: El hebreo puede referirse concretamente a plata o, por extensión, a dinero. En este pasaje la función narrativa es el fondo reunido para el templo; «dinero» evita restringir innecesariamente el referente material y sigue la amplitud semántica reconocida en la auditoría inglesa.
  doctrine_reference: 'DOCTRINE.md: Source-first lexical range; preserve documented semantic tension where relevant'
- issue: Expresión orientadora con אִישׁ
  english_pob_reading: as a man enters
  chosen_spanish_reading: al entrar un hombre
  alternative_spanish_readings:
  - al entrar una persona
  - cuando alguien entra
  rationale: Se conserva el singular masculino del hebreo sin forzar una neutralización que borre la forma del texto fuente. En español, la construcción infinitiva mantiene naturalidad y la perspectiva espacial del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios sustantivos: el paso fue marcado como unchanged. El cotejo final informó alta concordancia con solo cuestiones menores, por lo que esta versión española sigue de cerca el hebreo y la auditoría inglesa, ajustando únicamente la naturalidad idiomática del español y manteniendo las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se usa «casa de Yahvé» para בית יהוה y no una sustitución litúrgica por «Señor».
  - «Arca» se emplea aquí como recipiente de temple-funds, no como referencia al Arca del pacto.
  - «Umbral» conserva la terminología cultual de שֹׁמְרֵי הַסַּף.
  - La nota sobre כסף preserva la alternativa «plata/dinero» en vez de ocultar la amplitud semántica.
