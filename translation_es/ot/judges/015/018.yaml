review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido global del hebreo: Sansón tiene mucha sed, clama a Yahvé, reconoce que la gran liberación vino por medio de él como siervo de Dios, y formula la pregunta retórica sobre morir de sed y caer en poder de los incircuncisos. También mantiene correctamente Yahvé y la fuerza de pacto de «los incircuncisos». Sin embargo, hay problemas de ajuste fino con la redacción de varias expresiones clave.'
  spanish_quality_summary: 'La calidad del español es generalmente comprensible, pero hay giros poco naturales o incorrectos para un texto bíblico fluido: «la gran liberación esta» suena forzado y con orden defectuoso; «has puesto en mano de tu siervo» no refleja bien la agencia de ביד y puede sugerir colocación más que instrumentación; además la nota a pie [a] no corresponde al ancla textual, porque el texto principal ya dice «clamó».'
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: יְהוָה → «Yahvé» correcto; עבד en este contexto → «siervo» correcto; הָעֲרֵלִים → «los incircuncisos» correcto; תְּשׁוּעָה → «liberación» aceptable. La principal corrección es formular mejor el modismo בְיַד עַבְדְּךָ como «por mano de tu siervo» o equivalente, y ajustar la nota alternativa de קרא אל para que la alternativa no duplique el texto principal.'
  issues:
  - severity: high
    issue: La nota [a] está mal alineada con el texto principal.
    rationale: El texto dice «clamó a Yahvé», pero la nota [a] ofrece como alternativa exactamente «clamó a Yahvé». La alternativa documentada en el audit trail es más bien «llamó a Yahvé» o, si se cambiara el texto principal, la relación debería invertirse.
  - severity: medium
    issue: «Has puesto en mano de tu siervo» no representa bien בְיַד עַבְדְּךָ.
    rationale: 'El hebreo expresa agencia/instrumentalidad: «por mano de tu siervo». «Puesto en mano de» puede entenderse como entregar algo a Sansón, no como obrar por medio de él.'
  - severity: medium
    issue: «la gran liberación esta» es poco natural en español.
    rationale: Aunque busca reflejar el demostrativo hebreo, el orden correcto y natural en español es «esta gran liberación» o «esta gran liberación». La forma actual suena calcada y torpe.
  - severity: low
    issue: «caeré en mano de» es entendible, pero «en manos de» suena más idiomático en español.
    rationale: La imagen hebrea puede preservarse sin rigidez excesiva. «Caer en manos de» es la formulación bíblica y natural más común en español.
