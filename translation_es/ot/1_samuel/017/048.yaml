translation:
  language: es
  text: Y cuando el filisteo se levantó, avanzó y se acercó al encuentro de David, David se apresuró y corrió hacia la línea de batalla[a] al encuentro del filisteo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia las filas». El sustantivo hebreo puede referirse a una línea de batalla o a una formación de combate.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Y aconteció que cuando
  lexicon: HALOT
  rationale: La fórmula narrativa introduce el siguiente movimiento temporal; «Y cuando» conserva esa relación sin volver artificial el español.
- source_word: קָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El verbo expresa ponerse en pie o levantarse; «se levantó» es natural en español y mantiene el acto físico de iniciar el movimiento.
- source_word: הַפְּלִשְׁתִּי
  english_pob_choice: the Philistine
  chosen_spanish: el filisteo
  alternatives_spanish:
  - el filisteo guerrero
  - el filisteo campeón
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el filisteo»; se conserva esa designación sin añadir un título que no aparece en este verso.
- source_word: וַיֵּלֶךְ
  english_pob_choice: came
  chosen_spanish: avanzó
  alternatives_spanish:
  - fue
  - se dirigió
  lexicon: HALOT
  rationale: Aunque el sentido básico es «fue/anduvo», el contexto inmediato muestra avance hacia David. «Avanzó» comunica bien el movimiento narrativo sin forzar el verbo a «vino» en español.
- source_word: וַיִּקְרַב
  english_pob_choice: drew near
  chosen_spanish: para encontrarse
  alternatives_spanish:
  - se acercó
  - se aproximó
  lexicon: HALOT
  rationale: La secuencia con לִקְרַאת expresa ir al encuentro; en español, «para encontrarse» reproduce esa idea de acercamiento con finalidad de encuentro.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: para encontrarse
  alternatives_spanish:
  - al encuentro de
  - contra
  lexicon: HALOT
  rationale: La forma preposicional marca dirección hacia un encuentro. «Para encontrarse» mantiene la orientación relacional sin introducir una lectura combativa que el hebreo de este segmento no explicita por sí sola.
- source_word: וַיְמַהֵר
  english_pob_choice: hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - aceleró
  lexicon: HALOT
  rationale: El verbo indica rapidez en la acción; «se apresuró» es idiomático y conserva el matiz de prisa.
- source_word: וַיָּרָץ
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - echó a correr
  - se lanzó corriendo
  lexicon: HALOT
  rationale: Corresponde directamente al verbo de correr; «corrió» es la equivalencia más clara y no añade intensidad innecesaria.
- source_word: הַמַּעֲרָכָה
  english_pob_choice: toward the battle line
  chosen_spanish: hacia la línea de batalla
  alternatives_spanish:
  - hacia los rangos
  - hacia la formación de combate
  lexicon: HALOT
  rationale: El sustantivo puede referirse a línea o disposición de combate. «Línea de batalla» es natural en español y conserva el sentido militar direccional que el contexto exige.
translation_notes:
  revision_awareness: El texto en inglés POB está en acuerdo alto con la fuente hebrea y no muestra revisiones aplicadas en este pasaje; la versión española sigue ese mismo perfil estable, conservando la doble idea de movimiento hacia el encuentro y la ambigüedad militar de הַמַּעֲרָכָה dentro de una formulación idiomática.
  spanish_consistency_notes:
  - Se mantiene «filisteo» en minúscula como designación étnica/narrativa.
  - Se usa «línea de batalla» para reflejar el valor posible de הַמַּעֲרָכָה sin perder fluidez.
  - No se introduce vocabulario teológico ajeno al verso.
  - La coordinación verbal reproduce la secuencia narrativa rápida del hebreo.
