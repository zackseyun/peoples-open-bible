translation:
  language: es
  text: Y Asa durmió con sus padres y murió en el año cuarenta y uno de su reinado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «durmió con sus padres», una expresión habitual para la muerte y la sepultura entre los antepasados de uno.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: se acostó
  alternatives_spanish:
  - durmió
  - se durmió
  lexicon: HALOT
  rationale: El hebreo usa una fórmula idiomática de muerte y sepultura. En español, "se acostó" conserva el valor eufemístico sin sonar tan literal o ambiguo como "durmió", y mantiene la conexión con la expresión siguiente de morir.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres ancestrales
  lexicon: HALOT
  rationale: La frase hebrea es una fórmula funeraria dinástica. "Con sus padres" es literal, pero en español "padres" puede sonar restrictivo; "con sus padres" sigue siendo aceptable y transparente, aunque la nota explica el hebraísmo. Se prefiere esta forma para no introducir un término más interpretativo como "antepasados".
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - expiró
  lexicon: HALOT
  rationale: Verbo directo y simple para מות. "Murió" es la equivalencia natural y fiel en español.
- source_word: בִּשְׁנַת אַרְבָּעִים וְאַחַת
  english_pob_choice: in the forty-first year
  chosen_spanish: en el año cuarenta y uno
  alternatives_spanish:
  - en el año cuarenta y primero
  lexicon: HALOT
  rationale: La fórmula cronológica hebrea expresa un ordinal con cardinales. En español, "año cuarenta y uno" comunica con naturalidad el valor de "forty-first year" sin forzar un ordinal poco idiomático.
- source_word: לְמָלְכֽוֹ
  english_pob_choice: of his reign
  chosen_spanish: de su reinado
  alternatives_spanish:
  - de su realeza
  - de su gobierno
  lexicon: HALOT
  rationale: En la fórmula regnal, "reinado" es el equivalente español más idiomático y preciso para el período de gobierno de un rey.
- source_word: אָסָא
  english_pob_choice: Asa
  chosen_spanish: Asa
  lexicon: Transliteración estándar
  rationale: Nombre propio conservado sin traducción, conforme al uso bíblico estándar en español.
theological_decisions:
- issue: Fórmula de muerte "se acostó con sus padres"
  english_pob_reading: The English POB preserves the Hebrew idiom with a footnote explaining it as a customary expression for death and burial among one's ancestors.
  chosen_spanish_reading: Se conserva el hebraísmo funerario, explicándolo como expresión convencional de muerte y sepultura.
  alternative_spanish_readings:
  - '"murió" sin conservar el idiom'
  - '"descansó con sus padres"'
  rationale: 'El hebreo usa dos expresiones en paralelo: un eufemismo idiomático y luego la afirmación explícita de su muerte. La traducción mantiene el primer rasgo sin borrar el segundo, para respetar la textura del original y la explicación auditada de la POB inglesa.'
  doctrine_reference: Uso literario/funerario del hebreo bíblico; no implica una afirmación doctrinal adicional.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés y no requiere revisión textual adicional; la decisión principal es conservar el hebraísmo funerario con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió "reinado" para la fórmula cronológica regnal, coherente con el inglés POB y con el español bíblico actual.
  - Se evitó "Cristo"/"Mesías" porque no aplica en este versículo.
