revisions:
- from: Y pondrás[a] en el tabernáculo de reunión, delante del testimonio[b], donde me encontraré con ustedes[c].
  to: Y los pondrás[a] en el tabernáculo de reunión, delante del testimonio[b], donde me encontraré con ustedes[c].
  rationale: Se añade 'los' para reflejar el sufijo plural del verbo hebreo y mejorar la naturalidad en español. Se corrige la nota [a] para que ofrezca alternativas realmente correspondientes al verbo principal, y se rehace la nota [c] con opciones idiomáticas que preservan mejor el valor de יעד en nifal.
