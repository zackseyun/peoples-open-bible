theological_decisions:
- issue: Nature of the earthly sanctuary's relation to the heavenly
  chosen_reading: Rendered ὑποδείγματι καὶ σκιᾷ as 'a copy and shadow of the heavenly things'
  alternative_readings:
  - an example and shadow of the heavenly things
  - a copy and shadow of the heavenly realities
  rationale: The verse presents the earthly cult as corresponding to, yet inferior to, a heavenly reality. The translation preserves that typological and ontological tension without flattening it into mere symbolism or over-systematizing it.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
- issue: Force of κεχρημάτισται
  chosen_reading: Translated as 'was divinely instructed'
  alternative_readings:
  - was warned
  - was admonished
  rationale: The verb often denotes divine communication. Since the quotation includes a cautionary command, 'warned' is possible, but 'divinely instructed' better preserves both the revelatory and directive dimensions without narrowing the sense.
