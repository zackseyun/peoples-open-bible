id: 1PE.2.9
reference: 1 Peter 2:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὑμεῖς δὲ γένος ἐκλεκτόν, βασίλειον ἱεράτευμα, ἔθνος ἅγιον, λαὸς εἰς περιποίησιν, ὅπως τὰς ἀρετὰς ἐξαγγείλητε τοῦ ἐκ σκότους ὑμᾶς καλέσαντος εἰς τὸ θαυμαστὸν αὐτοῦ φῶς·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/009.yaml
  text: 'But you are a chosen people, a royal priesthood, a holy nation, a people for his own possession, so that you may proclaim the excellencies of the one who called you out of darkness into his marvelous light.'
translation:
  language: ko
  text: '그러나 여러분은 택하심을 받은 족속이요, 왕같은 제사장 직분이요, 거룩한 나라요, 소유된 백성입니다.[a] 이는 여러분을 어둠에서 그분의 놀라운 빛으로 부르신 분의 탁월하심을 여러분이 선포하게 하려는 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 출애굽기 19:5-6과 이사야 43:20-21을 결합한 인용.
    reason: ot_citation
lexical_decisions:
- source_word: γένος ἐκλεκτόν
  english_pob_choice: a chosen people
  chosen_korean: 택하심을 받은 족속
  alternatives_korean:
  - 선택된 종족
  - 뽑힌 백성
  lexicon: BDAG
  rationale: 1:1·2:4과 어휘 일관성을 위해 「택하심을 받은」으로 옮긴다. γένος는 사 43:20을 따라 「족속」으로 옮긴다.
- source_word: βασίλειον ἱεράτευμα
  english_pob_choice: a royal priesthood
  chosen_korean: 왕같은 제사장 직분
  alternatives_korean:
  - 왕의 제사장단
  - 왕 같은 제사장들
  lexicon: BDAG
  rationale: 출 19:6 LXX 인용. 한국 성서 전통의 「왕같은 제사장」을 채택하되, 2:5와 어휘 일관성을 위해 「제사장 직분」으로 통일.
- source_word: ἔθνος ἅγιον
  english_pob_choice: a holy nation
  chosen_korean: 거룩한 나라
  alternatives_korean:
  - 거룩한 민족
  lexicon: BDAG
  rationale: 출 19:6 LXX. 한국 성서 전통의 「거룩한 나라」 유지.
- source_word: λαὸς εἰς περιποίησιν
  english_pob_choice: a people for his own possession
  chosen_korean: 소유된 백성
  alternatives_korean:
  - 그분의 것이 된 백성
  - 그분 자신의 소유 백성
  lexicon: BDAG
  rationale: εἰς περιποίησιν은 「소유에 이르도록」 곧 「소유로 삼은」 백성. 「소유된 백성」으로 옮긴다.
- source_word: τὰς ἀρετὰς
  english_pob_choice: the excellencies
  chosen_korean: 탁월하심
  alternatives_korean:
  - 미덕들
  - 큰 일들
  lexicon: BDAG
  rationale: ἀρετή는 「탁월한 성품·행위」를 모두 함의한다. 한국어로 「탁월하심」으로 옮겨 단수처럼 통합한다 (사 43:21 LXX의 함의를 살림).
theological_decisions:
- issue: 출 19:5-6 + 사 43:20-21 결합 인용의 핵심 칭호 네 개를 모두 정확히 보존
  chosen_reading: '「택하심을 받은 족속 / 왕같은 제사장 직분 / 거룩한 나라 / 소유된 백성」 네 칭호 그대로 병치'
  alternative_readings:
  - 평이화하여 자연스러운 한국어로 풀어 쓰기
  rationale: 본문은 OT 백성 정체성 칭호들을 의도적으로 그리스도인 공동체에 적용한다. 칭호들을 직역에 가깝게 보존하여 그 신학적 핵심을 드러낸다.
  doctrine_reference: 'DOCTRINE.md: OT 인용·심상 보존'
