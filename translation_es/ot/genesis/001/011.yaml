translation:
  language: es
  text: 'Y dijo Dios[a]: «Que la tierra haga brotar vegetación: plantas que den semilla, y árboles frutales que den fruto según su especie[b], con su semilla en sí[c], en la tierra». Y así fue.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Que la tierra produzca vegetación».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «según su especie»; el singular se usa con valor distributivo para las diversas clases.
    reason: lexical_alternative
  - marker: c
    text: O «cuya semilla está en ello».
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּדְשֵׁא
  english_pob_choice: Let the earth sprout
  chosen_spanish: Que la tierra produzca
  alternatives_spanish:
  - Que la tierra brote
  - Que la tierra haga brotar
  - Que la tierra eche
  lexicon: HALOT
  rationale: El hebreo es un jussivo causativo dirigido a la tierra. En español, «produzca» conserva la fuerza causativa sin sonar forzado. «Brote» sería más cercano a la imagen, pero puede sonar menos explícito respecto de la orden dirigida a la tierra.
- source_word: דֶּשֶׁא
  english_pob_choice: vegetation
  chosen_spanish: vegetación
  alternatives_spanish:
  - verdor
  - hierba
  - crecimiento verde
  lexicon: HALOT
  rationale: Es un término amplio para crecimiento vegetal fresco. «Vegetación» preserva esa amplitud mejor que «hierba», que estrecha demasiado el sentido.
- source_word: עֵשֶׂב
  english_pob_choice: plants
  chosen_spanish: plantas
  alternatives_spanish:
  - hierbas
  - vegetales
  - maleza
  lexicon: HALOT
  rationale: Aquí designa plantas herbáceas en general. «Plantas» es claro, natural y evita el matiz culinario o especializado de «hierbas».
- source_word: מַזְרִיעַ זֶרַע
  english_pob_choice: yielding seed
  chosen_spanish: que den semilla
  alternatives_spanish:
  - que produzcan semilla
  - semillando semilla
  - que lleven semilla
  lexicon: HALOT
  rationale: La construcción participial subraya una cualidad permanente de producir semilla. «Que den semilla» transmite bien esa función reproductiva en español y conserva la sencillez del original.
- source_word: עֵץ פְּרִי
  english_pob_choice: fruit trees
  chosen_spanish: árboles frutales
  alternatives_spanish:
  - árbol frutal
  - árboles de fruto
  - árboles con fruto
  lexicon: HALOT
  rationale: La construcción nominal describe árboles caracterizados por fruto. «Árboles frutales» es la forma más natural y transparente en español.
- source_word: עֹשֶׂה פְּרִי
  english_pob_choice: bearing fruit
  chosen_spanish: que den fruto
  alternatives_spanish:
  - que producen fruto
  - fructificando
  - que hacen fruto
  lexicon: HALOT
  rationale: La idea es la acción característica del árbol. «Que den fruto» es idiomático y mantiene el sentido productivo sin calco mecánico.
- source_word: לְמִינוֹ
  english_pob_choice: according to their kinds
  chosen_spanish: según su especie
  alternatives_spanish:
  - según sus clases
  - según su clase
  - según su género
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, tiene fuerza distributiva. En español, «según su especie» mantiene esa distribución de manera natural y evita una frase demasiado explicativa.
- source_word: אֲשֶׁר זַרְעוֹ בוֹ
  english_pob_choice: with their seed in them
  chosen_spanish: con su semilla en ellos
  alternatives_spanish:
  - cuya semilla está en ellos
  - que tienen su semilla en ellos
  - con semilla dentro de ellos
  lexicon: HALOT
  rationale: El relativo describe la semilla contenida en las plantas/árboles. «Con su semilla en ellos» sigue de cerca la estructura hebrea y preserva la imagen de interioridad reproductiva.
- source_word: וַיְהִי כֵן
  english_pob_choice: And it was so
  chosen_spanish: Y así fue
  alternatives_spanish:
  - Y fue así
  - Y ocurrió así
  - Y así sucedió
  lexicon: HALOT
  rationale: Fórmula narrativa de cumplimiento en Génesis 1. «Y así fue» es breve, solemne e idiomática en español.
theological_decisions:
- issue: Categorías creadas de vida vegetal
  english_pob_reading: Render the Hebrew categories as broad classes of vegetation without importing later scientific taxonomy or narrowing them to specific modern botanical categories.
  chosen_spanish_reading: 'Conservar las categorías amplias de vida vegetal: vegetación, plantas y árboles frutales, sin modernizarlas a taxonomías científicas ni volverlas una paráfrasis genérica.'
  alternative_spanish_readings:
  - «hierba, planta que da semilla y árbol frutal»
  - «todo tipo de plantas y árboles»
  rationale: El versículo enumera clases fenoménicas de vegetación. La traducción debe respetar esas distinciones sin imponer precisión botánica moderna ni desdibujar la progresión del texto.
  doctrine_reference: 'Principio POB: primacía del texto original; preservar la tensión y la estructura del pasaje.'
translation_notes:
  revision_awareness: Coincide con la revisión reciente marcada como sin cambios y con el consenso alto del control cruzado; no se requieren ajustes respecto del texto inglés auditado.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים, conforme al criterio base.
  - Se evitó «SEÑOR» porque el versículo usa אֱלֹהִים, no el Tetragrámaton.
  - Se usó «especie» para לְמִינוֹ por claridad natural en español, conservando la fuerza distributiva del singular hebreo.
  - Se preservó la imagen de semilla interna con una formulación cercana al hebreo, sin ampliar el sentido.
  - «Así fue» conserva la fórmula de cumplimiento narrativa del cierre del versículo.
