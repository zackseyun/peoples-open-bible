translation:
  language: es
  text: 'Porque así dice Yahvé: He aquí, como un águila[a] se lanza y extiende sus alas sobre Moab.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un buitre»; el hebreo נֶשֶׁר puede referirse en sentido más amplio a un ave rapaz grande.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del anuncio profético; en español, 'Porque' conserva la conexión discursiva natural sin perder la fuerza causal.
- source_word: כֹה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - así dice Yahvé el Señor
  - esto dice Yahvé
  lexicon: HALOT
  rationale: Mantiene la fórmula profética formal. Se usa 'Yahvé' conforme a la norma del proyecto para el Tetragrámaton, sin sustituirlo por un título.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: La función deíctica exige atención vívida. 'Miren' comunica esa llamada de forma natural en español contemporáneo, aunque 'He aquí' también sería posible en registro más solemne.
- source_word: כַנֶּשֶׁר
  english_pob_choice: like an eagle
  chosen_spanish: como un águila
  alternatives_spanish:
  - como un águila
  - como un buitre
  lexicon: HALOT
  rationale: '''Águila'' conserva la imagen tradicional de un ave de rapiña poderosa y rápida; se mantiene la alternativa zoológica en la nota porque el hebreo puede abarcar un ave rapaz grande en general.'
- source_word: יִדְאֶה
  english_pob_choice: he swoops down
  chosen_spanish: se lanza
  alternatives_spanish:
  - se abalanza
  - desciende en picada
  lexicon: HALOT
  rationale: El verbo expresa movimiento aéreo con ímpetu descendente. 'Se lanza' transmite bien la acción predatoria sin forzar un tecnicismo que suene artificial.
- source_word: וּפָרַשׂ
  english_pob_choice: and spreads
  chosen_spanish: y extiende
  alternatives_spanish:
  - y despliega
  - y abre
  lexicon: HALOT
  rationale: Describe la apertura de las alas. 'Extiende' es claro, directo y fiel al gesto corporal de la imagen.
- source_word: כְּנָפָיו
  english_pob_choice: his wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - sus alas
  - sus alas desplegadas
  lexicon: HALOT
  rationale: En español 'alas' resulta más natural que 'alas' literal sin perder el sentido de כנפיו; el posesivo queda implícito en el sujeto.
- source_word: אֶל מוֹאָב
  english_pob_choice: over Moab
  chosen_spanish: sobre Moab
  alternatives_spanish:
  - contra Moab
  - hacia Moab
  lexicon: HALOT
  rationale: '''Sobre'' refleja mejor la imagen de alas extendidas que cubren o se ciernen, preservando el matiz amenazante que el inglés POB comunicó con ''over Moab''.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se sigue la convención del proyecto para preservar el nombre propio del pacto, en lugar de sustituirlo por un título como 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'Look' por 'Behold' para un registro más formal; en español se optó por 'Miren' para conservar la fuerza deíctica en un español natural y publicable, sin recurrir a una forma arcaizante obligatoria. Se mantuvo la imagen de ave rapaz y el movimiento descendente, con 'sobre Moab' para reflejar la cobertura amenazante de las alas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma base para el Tetragrámaton, conforme al criterio del proyecto.
  - Se evitó 'SEÑOR' como sustituto, ya que el verso nombra directamente a Yahvé.
  - '''Águila'' conserva la lectura principal, mientras que la alternativa zoológica queda documentada en nota.'
  - La imagen verbal se mantuvo compacta y poética sin añadir elementos ajenos al hebreo.
