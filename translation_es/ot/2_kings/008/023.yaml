    reason: lexical_alternative
  revision_rationale: La revisión corrige la nota defectuosa del nombre y alinea el texto principal con la forma hebrea documentada en la auditoría inglesa. Se mantiene la estructura regnal, la pregunta retórica y la nota léxica sobre 'Crónicas/anales' sin otros cambios, porque el resto del borrador es fiel y natural.
