- from: 'Entonces Joás, rey de Israel, envió a Amasías, rey de Judá, diciendo: “El espino[a] que estaba en el Líbano envió al cedro que estaba en el Líbano, diciendo: ‘Da tu hija a mi hijo por esposa.’ Entonces pasó una bestia del campo que estaba en el Líbano, y pisoteó al espino.”'
  to: 'Entonces Joás, rey de Israel, envió un mensaje a Amasías, rey de Judá, diciendo: “El arbusto espinoso[a] que estaba en el Líbano envió al cedro que estaba en el Líbano, diciendo: ‘Da tu hija a mi hijo por esposa.’ Entonces pasó una bestia del campo que estaba en el Líbano, y pisoteó al arbusto espinoso.”'
