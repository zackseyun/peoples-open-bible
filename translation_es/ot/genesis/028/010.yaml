translation:
  language: es
  text: Jacobo salió de Beerseba y fue a Harán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «hacia Harán», con un sufijo direccional en «Harán».
