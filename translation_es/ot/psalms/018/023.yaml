translation:
  language: es
  text: Porque todas sus ordenanzas estaban delante de mí[a], y no aparté de mí sus estatutos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no me aparté de sus estatutos». El verbo hebreo puede entenderse ya sea como quitar los estatutos de uno mismo o como apartarse de ellos; el texto principal conserva el sentido más directamente transitivo de la forma Hifil con «de mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de lo anterior. «Porque» conserva esa fuerza explicativa en español natural y bíblico, sin volverla demasiado interpretativa.
- source_word: כָל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  - cada uno de
  lexicon: HALOT
  rationale: El hebreo expresa totalidad; «todos» mantiene la amplitud de manera fluida en español.
- source_word: מִשְׁפָּטָיו
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus sentencias
  - sus decretos
  - sus ordenanzas
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar juicios, decisiones legales u ordenanzas. «Juicios» preserva el matiz judicial y covenantal sin perder naturalidad en español.
- source_word: לְנֶגְדִּי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - frente a mí
  lexicon: HALOT
  rationale: La expresión indica algo puesto en vista o en presencia constante. «Delante de mí» transmite bien la imagen espacial y reflexiva del texto.
- source_word: וְחֻקֹּתָיו
  english_pob_choice: and his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus leyes
  lexicon: HALOT
  rationale: חֻקּוֹת suele referirse a estatutos o disposiciones fijas. «Estatutos» conserva el registro jurídico-covenantal que el inglés POB documenta.
- source_word: לֹא אָסִיר
  english_pob_choice: I did not put away
  chosen_spanish: no aparté
  alternatives_spanish:
  - no quité
  - no removí
  - no alejé
  lexicon: HALOT
  rationale: El Hifil de סור aquí es transitivo y puede entenderse como quitar o apartar de uno mismo. «No aparté» expresa esa acción sin forzar el español.
- source_word: מֶנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mí mismo
  - lejos de mí
  lexicon: HALOT
  rationale: La preposición explícita se conserva de forma directa y natural en español.
theological_decisions:
- issue: Relación entre 'juicios' y 'estatutos' en lenguaje de ley/pacto
  english_pob_reading: The verse keeps the judicial and covenantal sense of judgments and statutes.
  chosen_spanish_reading: El versículo mantiene el valor jurídico y de pacto con «juicios» y «estatutos».
  alternative_spanish_readings:
  - «ordenanzas» y «decretos»
  - «leyes» y «mandatos»
  rationale: La elección evita suavizar la terminología legal del texto y conserva dos términos distintos, como en el hebreo y en el inglés POB.
  doctrine_reference: Salmo 18:23; uso bíblico de lenguaje toráh/covenantal
- issue: Sentido del verbo לֹא אָסִיר / I did not put away
  english_pob_reading: The main text preserves the more directly transitive sense of the Hiphil form with 'from me.'
  chosen_spanish_reading: '«No aparté de mí» conserva la lectura transitiva: no eché lejos de mí sus estatutos.'
  alternative_spanish_readings:
  - «no me aparté de ellos»
  - «no me desvié de sus estatutos»
  rationale: El hebreo permite leer la acción como quitar algo de uno mismo o como apartarse de ello. El español principal mantiene la primera opción, siguiendo el POB inglés, sin borrar la alternativa.
  doctrine_reference: Salmo 18:23; nota lexical sobre סור en Hifil
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo de WLC y el rastro auditado del POB inglés, sin cambios relevantes en la lectura actual. La decisión principal afecta el verbo final, donde el hebreo admite una tensión lexical entre «apartar de mí» y «apartarse de».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton explícito.
  - Se prefirieron términos jurídicos formales («juicios», «estatutos») para conservar el registro legal del hebreo.
  - La puntuación y el orden verbal buscan ser naturales en español sin perder la estructura semítica del paralelismo.
