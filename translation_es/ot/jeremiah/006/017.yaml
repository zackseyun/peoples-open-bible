translation:
  language: es
  text: 'Yo puse sobre ustedes centinelas[a]: «¡Escuchen el sonido[b] de la trompeta!» Pero ellos dijeron: «No escucharemos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nombré centinelas sobre ustedes».
    reason: lexical_alternative
  - marker: b
    text: Hebreo shofar, un cuerno usado como señal de alarma; tradicionalmente «trompeta».
    reason: cultural_note
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  english_pob_choice: I set
  chosen_spanish: Yo puse
  alternatives_spanish:
  - Yo establecí
  - Yo nombré
  - Yo levanté
  lexicon: HALOT
  rationale: El verbo hebreo en hifil comunica colocar o establecer a alguien en una función. «Puse» transmite de manera breve y natural la idea de situar a los centinelas sobre el pueblo, sin perder la fuerza concreta de la acción.
- source_word: עֲלֵיכֶם
  english_pob_choice: over you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - encima de ustedes
  - contra ustedes
  - para ustedes
  lexicon: HALOT
  rationale: La preposición aquí indica colocación en una posición de responsabilidad respecto del pueblo. «Sobre ustedes» conserva la relación de supervisión sin convertirla indebidamente en hostilidad.
- source_word: צֹפִים
  english_pob_choice: watchmen
  chosen_spanish: centinelas
  alternatives_spanish:
  - vigilantes
  - atalayas
  - guardianes
  lexicon: HALOT
  rationale: El participio designa a quienes vigilan y advierten. «Centinelas» es un equivalente natural en español para esta función y mantiene la imagen de vigilancia profética.
- source_word: הַקְשִׁיבוּ
  english_pob_choice: Listen
  chosen_spanish: Estén atentos
  alternatives_spanish:
  - Escuchen
  - Presten atención
  - Atiendan
  lexicon: HALOT
  rationale: El imperativo pide atención vigilante. «Estén atentos» expresa mejor la idea de escuchar con cuidado y disposición, más que un simple oír.
- source_word: לְקוֹל
  english_pob_choice: to the sound of
  chosen_spanish: al sonido
  alternatives_spanish:
  - a la voz
  - al toque
  - al estruendo
  lexicon: HALOT
  rationale: Con שופר, קוֹל se refiere al sonido producido. «Al sonido» es la opción más directa y natural en español, sin estrechar innecesariamente el sentido.
- source_word: שׁוֹפָר
  english_pob_choice: trumpet
  chosen_spanish: shofar
  alternatives_spanish:
  - trompeta
  - cuerno de carnero
  lexicon: HALOT
  rationale: Se conserva «shofar» para no perder el referente cultural e histórico específico del instrumento hebreo. La nota explica su función como señal de alarma, siguiendo el audit trail inglés que mantiene la tensión entre precisión cultural y comprensión.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: But they said
  chosen_spanish: Pero ellos dijeron
  alternatives_spanish:
  - Y dijeron
  - Entonces dijeron
  lexicon: HALOT
  rationale: El waw consecutivo introduce contraste narrativo respecto a la advertencia recibida. «Pero» hace explícita esa oposición discursiva en español sin añadir contenido ajeno al texto.
- source_word: לֹא נַקְשִׁיב
  english_pob_choice: We will not listen
  chosen_spanish: No estaremos atentos
  alternatives_spanish:
  - No escucharemos
  - No prestaremos atención
  - No obedeceremos
  lexicon: HALOT
  rationale: El verbo expresa negativa voluntaria a prestar atención. «No estaremos atentos» conserva la misma estructura semántica que el imperativo previo y mantiene el matiz de rechazo deliberado; «No escucharemos» queda como alternativa más literal pero menos precisa del gesto de vigilancia.
theological_decisions:
- issue: Identidad y función de los centinelas
  english_pob_reading: The watchmen are rendered as human or prophetic warners appointed by God, without specifying a narrower referent in translation.
  chosen_spanish_reading: Los centinelas se presentan como vigilantes humanos o proféticos puestos por Dios, sin precisar más su identidad.
  alternative_spanish_readings:
  - profetas
  - guardianes militares
  - líderes responsables de advertir al pueblo
  rationale: El hebreo permite una imagen de advertencia amplia y no obliga a resolver el referente exacto. «Centinelas» preserva la metáfora y deja abierta la tensión interpretativa, como en el audit trail inglés.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'La versión española sigue el sentido del texto hebreo y el criterio óptimo-equivalente del POB inglés: mantiene la imagen de vigilancia, conserva la referencia cultural de shofar y refleja el contraste entre la advertencia divina y la negativa del pueblo.'
  spanish_consistency_notes:
  - Se usa «ustedes» por neutralidad latinoamericana y registro bíblico contemporáneo.
  - Se conserva «shofar» en el texto con nota cultural para no perder precisión del referente hebreo.
  - «Centinelas» mantiene la función de vigilancia y advertencia sin cerrar la identificación teológica.
  - La negación final se formula como rechazo voluntario de atención, coherente con el verbo de mandato previo.
