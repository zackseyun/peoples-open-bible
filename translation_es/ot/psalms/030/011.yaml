translation:
  language: es
  text: Escucha[a], Yahvé, y ten misericordia de mí; Yahvé, sé mi auxiliador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tenme gracia» o «sé propicio conmigo». El verbo hebreo puede expresar gracia, favor o misericordia en una súplica de ayuda divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha me
  lexicon: HALOT
  rationale: El imperativo de שׁמע en súplica dirigida a Dios se expresa con naturalidad y reverencia como «Escucha». Mantiene el sentido de petición directa sin forzar un objeto explícito que el hebreo no añade.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, conforme al criterio POB. «Yahvé» es la forma española establecida en este proyecto y evita la sustitución por un título.
- source_word: וְחָנֵּנִי
  english_pob_choice: and be gracious to me
  chosen_spanish: y sé benigno conmigo
  alternatives_spanish:
  - y ten misericordia de mí
  - y muéstrame favor
  - y sé gracioso conmigo
  lexicon: HALOT
  rationale: חנן puede abarcar gracia/favor y también misericordia en una súplica. «Sé benigno conmigo» preserva la idea de trato favorable en un español natural, sin eliminar la tensión léxica entre gracia y misericordia documentada por el POB inglés.
- source_word: הֱיֵה
  english_pob_choice: be
  chosen_spanish: sé
  alternatives_spanish:
  - llega a ser
  - permanece
  lexicon: HALOT
  rationale: El imperativo de היה aquí funciona como petición predicativa. «Sé» reproduce con claridad la forma breve y directa del hebreo.
- source_word: עֹזֵר לִי
  english_pob_choice: my helper
  chosen_spanish: mi ayudador
  alternatives_spanish:
  - el que me ayuda
  - mi ayuda
  - mi auxiliador
  lexicon: HALOT
  rationale: El participio de עזר conserva la idea de agente continuo que presta ayuda. «Mi ayudador» mantiene esa fuerza personal y durativa mejor que «mi ayuda»; «auxiliador» es posible, pero menos natural en español bíblico contemporáneo.
theological_decisions:
- issue: Traducción del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה de manera directa. En línea con la doctrina POB citada, se translitera el nombre divino en vez de sustituirlo por un título litúrgico, preservando la distinción entre nombre y apelativo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor semántico de חנן en una súplica
  english_pob_reading: and be gracious to me / Or 'have mercy on me.'
  chosen_spanish_reading: y sé benigno conmigo
  alternative_spanish_readings:
  - y ten misericordia de mí
  - y muéstrame favor
  rationale: La petición combina gracia/favor y misericordia. El español elegido deja abierta esa amplitud sin imponer solo un matiz, y por eso es coherente con la nota alternativa preservada por el POB inglés.
  doctrine_reference: Lexical decision, not a separate doctrine point
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo base y con la auditoría inglesa: no hay revisiones aplicadas y el estado de revisión más reciente indica que no se requieren cambios. La traducción española mantiene el mismo perfil semántico y la misma decisión sobre el nombre divino.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Sé benigno conmigo» mantiene la amplitud semántica de חנן sin borrar la alternativa misericordiosa.
  - «Mi ayudador» conserva el matiz de agente continuo del participio עֹזֵר.
  - La puntuación refleja una súplica poética breve con paralelismo directo.
