translation:
  language: es
  text: 'Y aconteció que, cuando su amo oyó las palabras que su esposa le dijo, diciendo: «Según[a] estas palabras me hizo a mí tu esclavo[b]», se encendió su ira.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Conforme a estas palabras». La expresión hebrea puede entenderse de manera demostrativa o comparativa; el texto principal conserva esa tensión con una formulación natural en español.'
    reason: alternative_reading
  - marker: b
    text: 'O: «tu siervo». El hebreo עבד puede significar «esclavo» o «siervo»; en este contexto, el estatus de dependencia de José favorece «esclavo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa introduce el nuevo episodio sin añadir interpretación. «Aconteció» conserva el valor de transición del wayyiqtol con un registro natural y digno en español.
- source_word: כִּשְׁמֹעַ
  english_pob_choice: when ... heard
  chosen_spanish: cuando ... oyó
  alternatives_spanish:
  - al oír
  - cuando ... escuchó
  lexicon: HALOT
  rationale: La construcción temporal se vierte de manera directa y fluida. «Oyó» mantiene el acto de percibir el contenido verbal sin sobrecargarlo.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su amo
  alternatives_spanish:
  - su señor
  - su dueño
  lexicon: HALOT
  rationale: En este contexto de casa y esclavitud, «amo» comunica con claridad la relación de autoridad y posesión implícita en el hebreo y en la elección inglesa de «master».
- source_word: דִּבְרֵי אִשְׁתּוֹ
  english_pob_choice: the words of his wife
  chosen_spanish: las palabras de su esposa
  alternatives_spanish:
  - las palabras de su mujer
  - lo que dijo su esposa
  lexicon: HALOT
  rationale: «Palabras» preserva el sustantivo concreto del hebreo דִּבְרֵי, y «esposa» es el equivalente neutral y claro para אִשְׁתּוֹ.
- source_word: אֲשֶׁר דִּבְּרָה אֵלָיו
  english_pob_choice: that she spoke to him
  chosen_spanish: que ella le habló
  alternatives_spanish:
  - que ella le dijo
  - que le había dicho
  lexicon: HALOT
  rationale: El relativo expresa la relación con las palabras previas. «Le habló» conserva el verbo de comunicación y su complemento indirecto sin forzar un estilo más literario que el hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y le dijo
  - así
  lexicon: HALOT
  rationale: La fórmula quotativa se mantiene como introducción directa del discurso citado. «Diciendo» corresponde de forma transparente a לֵאמֹר.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: According to these words
  chosen_spanish: Según estas palabras
  alternatives_spanish:
  - Conforme a estas palabras
  - Como estas palabras
  lexicon: HALOT
  rationale: La expresión hebrea es ambigua entre una referencia demostrativa y una formulación comparativa/indicativa. «Según estas palabras» retiene esa relación sin fijarla indebidamente como una frase idiomática distinta.
- source_word: עָשָׂה
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - cometió
  - practicó
  lexicon: HALOT
  rationale: «Hizo» es la correspondencia más directa para עשה. Evita añadir una calificación moral que el hebreo no explicita en la forma verbal.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: En español, «conmigo» reproduce con naturalidad el alcance relacional de la acusación dentro del contexto narrativo, sin cambiar el sentido básico de la preposición hebrea.
- source_word: עַבְדֶּךָ
  english_pob_choice: your slave
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: Se mantiene la fuerza lexical de עבד en el contexto de José y Potifar. «Esclavo» preserva el vínculo de dependencia que el contexto exige y coincide con la política POB documentada para esta clase de pasajes.
- source_word: וַיִּחַר אַפּוֹ
  english_pob_choice: his anger burned
  chosen_spanish: se encendió su ira
  alternatives_spanish:
  - ardió su ira
  - se inflamó su ira
  lexicon: HALOT
  rationale: El hebreo usa un modismo corporal-fortemente metafórico. «Se encendió su ira» conserva la imagen del fuego/ardor y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Valor de עבד en un contexto doméstico-esclavista
  english_pob_reading: your slave
  chosen_spanish_reading: tu esclavo
  alternative_spanish_readings:
  - tu siervo
  - tu servidor
  rationale: La escena depende del estatus subordinado de José; suavizarlo a «siervo» borraría la tensión lexical y social que el texto presenta. La elección mantiene la fuerza del hebreo y del audit trail inglés.
  doctrine_reference: POB lexical policy on δοῦλος/עבד in bonded-status contexts
- issue: Relación semántica de כַּדְּבָרִים הָאֵלֶּה
  english_pob_reading: According to these words
  chosen_spanish_reading: Según estas palabras
  alternative_spanish_readings:
  - Con estas palabras
  - Como estas palabras
  rationale: La frase puede sonar demostrativa o comparativa. La versión española conserva la ambigüedad razonable sin introducir una interpretación más específica de la que el hebreo garantiza.
  doctrine_reference: Source-text primacy and preservation of documented lexical tension
translation_notes:
  revision_awareness: 'El auditable inglés revisó la frase de כַּדְּבָרִים הָאֵלֶּה desde «These are the things» a «According to these words», y también restituyó «slave» como lectura preferida por el contexto. La presente versión española sigue esa trayectoria: mantiene la ambigüedad relativa de la expresión hebrea con «Según estas palabras» y conserva «esclavo» para עַבְדֶּךָ. '
  spanish_consistency_notes:
  - Se mantiene el estilo narrativo sobrio y continuo, sin añadir conectores interpretativos innecesarios.
  - «Aconteció» y «se encendió su ira» preservan el registro bíblico moderno y evitan arcaísmos demasiado marcados.
  - El diálogo citado se introduce con dos puntos y comillas angulares, conforme a la puntuación española habitual.
