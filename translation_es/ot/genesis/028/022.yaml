translation:
  language: es
  text: Y esta piedra, que he levantado como pilar, será casa de Dios[a]; y de todo lo que me des, sin falta te daré la décima parte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será una casa de Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sin falta lo diezmaré para ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַצֵּבָה
  english_pob_choice: pillar
  chosen_spanish: pilar
  alternatives_spanish:
  - piedra erigida
  - piedra monumental
  - estela
  lexicon: HALOT
  rationale: El término hebreo designa una piedra erigida como monumento o marcador cultual. «Pilar» reproduce bien la imagen concreta y sigue la decisión auditada del inglés, con un español natural.
- source_word: יִהְיֶה בֵּית אֱלֹהִים
  english_pob_choice: will be God’s house
  chosen_spanish: será casa de Dios
  alternatives_spanish:
  - será una casa de Dios
  - llegará a ser casa de Dios
  lexicon: HALOT
  rationale: La construcción hebrea expresa la función o destino del sitio/piedra en relación con Dios. «Casa de Dios» mantiene el valor del constructo בלי forzar una lectura más técnica; el verbo en futuro refleja el vow/compromiso de Jacob.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  lexicon: HALOT
  rationale: El referente es el Dios verdadero del contexto narrativo inmediato, no una deidad genérica. En español, la mayúscula conserva esa referencia singular.
- source_word: תִּתֶּן לִי
  english_pob_choice: you give me
  chosen_spanish: me des
  alternatives_spanish:
  - me dieras
  - me das
  lexicon: HALOT
  rationale: En un voto, el imperfecto/condicional tiene fuerza prospectiva; «me des» en una cláusula con valor de promesa-voto suena natural y respeta la relación de dependencia del don con Yahvé.
- source_word: עַשֵּׂר אֲעַשְּׂרֶנּוּ
  english_pob_choice: I will surely give a tenth
  chosen_spanish: sin falta le daré el diezmo
  alternatives_spanish:
  - le daré ciertamente el diezmo
  - sin falta lo diezmaré
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. «Sin falta» conserva esa fuerza enfática sin sonar eclesiástico; «daré el diezmo» expresa el contenido semántico de «dar una décima parte» con claridad en español bíblico contemporáneo.
- source_word: לָךְ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  - a Yahvé
  lexicon: HALOT
  rationale: La forma verbal y el pronombre final marcan al destinatario del voto. «A ti» es directo y mantiene la segunda persona del texto hebreo.
- source_word: הָאֶבֶן הַזֹּאת אֲשֶׁר שַׂמְתִּי
  english_pob_choice: this stone, which I have set up
  chosen_spanish: esta piedra, que he levantado
  alternatives_spanish:
  - esta piedra, que he puesto
  - esta piedra, que he erigido
  lexicon: HALOT
  rationale: «Levantado» comunica el acto de erigir la piedra como marcador cultual y funciona de manera natural con «como pilar». Se evita traducir de forma demasiado mecánica «he puesto», que debilitaría la imagen.
theological_decisions:
- issue: Naturaleza de la ‘casa de Dios’ en relación con la piedra
  english_pob_reading: The stone is rendered as becoming 'God’s house' in the sense of a sacred site/marker, without importing later temple theology.
  chosen_spanish_reading: La piedra/pilar queda presentada como ligada a un lugar consagrado para el encuentro con Dios, sin convertirla en una referencia directa al templo posterior.
  alternative_spanish_readings:
  - la piedra misma se vuelve un santuario
  - esto anticipa de forma directa el templo de Jerusalén
  rationale: El hebreo dice que la piedra erigida «será casa de Dios». La traducción mantiene la formulación breve y cultual del texto, evitando expandirla hacia desarrollos posteriores que el contexto inmediato no exige.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Sentido del diezmo prometido
  english_pob_reading: The vow is translated as a promise to give a tenth to God, preserving the emphatic force without imposing later legal or ecclesiastical structures.
  chosen_spanish_reading: Jacob promete entregar una décima parte de todo lo que reciba, como respuesta votiva a Dios.
  alternative_spanish_readings:
  - uso institucional del diezmo mosaico
  - lenguaje eclesiástico de diezmar
  rationale: La fórmula expresa un compromiso personal y devocional antes de la legislación mosaica. «Dar el diezmo» comunica el valor semántico sin proyectar una práctica institucional posterior.
  doctrine_reference: 'Translation philosophy #1'
translation_notes:
  revision_awareness: Revisado contra el paquete fuente hebreo y el audit trail en inglés; no se identificaron cambios necesarios respecto de la lectura aprobada más reciente, y se preservó la tensión entre 'casa de Dios' y la imagen concreta del pilar/piedra.
  spanish_consistency_notes:
  - Se usó «Dios» con mayúscula para el referente singular del pasaje.
  - Se mantuvo «pilar» para מַצֵּבָה, en coherencia con la decisión auditada en inglés.
  - Se prefirió una formulación española natural de voto («sin falta») para reflejar el infinitivo absoluto intensivo.
  - No se introdujo terminología eclesiástica posterior ni se añadió 'SEÑOR' como máscara del nombre divino en este versículo.
