translation:
  language: es
  text: En su mano derecha tiene un puñal[a] y un hacha, pero no puede salvarse de la guerra ni de los ladrones. Por tanto, es evidente que no son dioses; por tanto, no les teman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «daga» o «espada corta» para «puñal». El griego ἐγχειρίδιον designa un arma de mano.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγχειρίδιον
  english_pob_choice: dagger
  chosen_spanish: puñal
  alternatives_spanish:
  - daga
  - cuchillo
  - espada corta
  lexicon: LSJ
  rationale: El término griego nombra un arma de mano, típicamente una daga o espada corta. En español, «puñal» comunica de forma natural un arma blanca de ese tipo y mantiene la fuerza imagética del paralelo con el hacha.
- source_word: δεξιᾷ
  english_pob_choice: in his right hand
  chosen_spanish: en su mano derecha
  alternatives_spanish:
  - con su mano derecha
  - a su derecha
  lexicon: LSJ
  rationale: Con ἔχει, el dativo tiene sentido instrumental/locativo; la formulación española más natural y fiel es «en su mano derecha».
- source_word: πέλεκυν
  english_pob_choice: axe
  chosen_spanish: hacha
  alternatives_spanish:
  - hacha pequeña
  - hachuela
  lexicon: LSJ
  rationale: El sentido ordinario es «hacha». «Hacha» es la equivalencia directa y más clara en español.
- source_word: ἐξελεῖται
  english_pob_choice: rescue himself
  chosen_spanish: salvarse
  alternatives_spanish:
  - librarse
  - rescatarse
  - salvarse él mismo
  lexicon: LSJ
  rationale: El medio con ἑαυτόν indica auto-liberación. «Salvarse» expresa de manera natural que no puede librarse por sí mismo de la amenaza de guerra y ladrones.
- source_word: λῃστῶν
  english_pob_choice: robbers
  chosen_spanish: ladrones
  alternatives_spanish:
  - salteadores
  - bandoleros
  - robbers
  lexicon: LSJ
  rationale: Aunque puede significar «robbers» o «bandits», en español «ladrones» es claro y amplio; el contexto violento también admitiría «bandoleros», pero no es necesario aquí.
- source_word: ὅθεν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  - de ahí que
  lexicon: LSJ
  rationale: La partícula introduce una conclusión lógica. «Por tanto» preserva con solemnidad y claridad el enlace inferencial.
- source_word: γνῶριμοί εἰσιν
  english_pob_choice: it is evident
  chosen_spanish: es evidente
  alternatives_spanish:
  - son conocidos
  - se reconoce claramente
  lexicon: LSJ
  rationale: Aunque literalmente dice «son conocidos», el sentido idiomático es que su no-divinidad resulta obvia. «Es evidente» capta esa fuerza sin forzar el español.
- source_word: οὐκ ὄντες θεοί
  english_pob_choice: they are not gods
  chosen_spanish: no son dioses
  alternatives_spanish:
  - no siendo dioses
  - no son verdaderos dioses
  lexicon: LSJ
  rationale: La construcción participial afirma su falta de divinidad real. El plural español mantiene la conclusión general sobre todos los ídolos.
- source_word: μὴ οὖν φοβηθῆτε αὐτούς
  english_pob_choice: so do not fear them
  chosen_spanish: así que no les tengan miedo
  alternatives_spanish:
  - por tanto, no los teman
  - no les teman, pues
  lexicon: LSJ
  rationale: La prohibición sigue a la conclusión. «No les tengan miedo» es natural en español y conserva el tono exhortativo. El dativo de objeto se vierte con «les» por tratarse de personas/idolos personificados.
theological_decisions:
- issue: Paso de singular representativo a plural conclusivo en la descripción de los ídolos
  english_pob_reading: Retain singular in the first clause ('he holds... he cannot rescue himself') and plural in the conclusion ('they are not gods... do not fear them').
  chosen_spanish_reading: Mantener el singular en la primera parte («tiene… no puede salvarse») y el plural en la conclusión («no son dioses… no les tengan miedo»).
  alternative_spanish_readings:
  - Uniformar todo en plural para suavizar el cambio de número
  - Uniformar todo en singular por referencia al ídolo
  rationale: El griego mismo pasa de un ídolo ejemplar en singular a una conclusión plural sobre la clase de los ídolos. Conservar ese cambio respeta la retórica y evita borrar la generalización final.
  doctrine_reference: Primacía del texto original; no suavizar tensiones retóricas innecesariamente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; el borrador sigue de cerca el texto griego y el audit trail inglés, manteniendo la alternancia singular/plural y la fuerza léxica de ἐγχειρίδιον y λῃστῶν.
  spanish_consistency_notes:
  - Se usa «dioses» en plural para reflejar la conclusión griega οὐκ ὄντες θεοί.
  - Se evita «SEÑOR» u otras sustituciones no presentes en este versículo.
  - El tono es sobrio y publicable, con puntuación española estándar.
  - El pronombre de objeto indirecto «les» conserva la personificación de los ídolos sin perder naturalidad en español.
