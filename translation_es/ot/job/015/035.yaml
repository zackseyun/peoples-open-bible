translation:
  language: es
  text: Conciben aflicción[a] y dan a luz perversidad; su vientre prepara engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Están encinta de aflicción y paren iniquidad».'
