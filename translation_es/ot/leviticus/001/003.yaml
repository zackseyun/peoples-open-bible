translation:
  language: es
  text: Si su ofrenda es un holocausto del ganado vacuno, ofrecerá un macho sin defecto. Lo ofrecerá a la entrada de la tienda de reunión, para que sea aceptado[a] delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para su aceptación»; la frase hebrea también se ha entendido tradicionalmente como «de buena gana» o «voluntariamente».'
    reason: alternative_reading
lexical_decisions:
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda totalmente consumida
  lexicon: HALOT
  rationale: En español bíblico, "holocausto" es el equivalente cultual establecido para עֹלָה y comunica la ofrenda enteramente subida en humo. "Ofrenda quemada" explicita el efecto, pero suena menos técnico; "ofrenda totalmente consumida" es más explicativa que textual.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su sacrificio
  - su presente
  lexicon: HALOT
  rationale: קרבן es un término general para una ofrenda presentada. "Ofrenda" conserva esa amplitud en un registro natural; "sacrificio" puede ser demasiado restringido y "presente" suena menos cultual en español moderno.
- source_word: מִן הַבָּקָר
  english_pob_choice: from the herd
  chosen_spanish: del ganado vacuno
  alternatives_spanish:
  - de la res
  - del hato
  lexicon: HALOT
  rationale: La expresión apunta a animales bovinos del rebaño/ganado. "Ganado vacuno" es claro y preciso en español actual; "de la res" puede sonar singular y menos general, y "del hato" es regional.
- source_word: זָכָר
  english_pob_choice: a male
  chosen_spanish: un macho
  alternatives_spanish:
  - un varón
  - un ejemplar macho
  lexicon: HALOT
  rationale: El hebreo especifica sexo del animal. "Macho" es la forma natural y directa en español para animales; "varón" es impropio aquí.
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - intachable
  lexicon: HALOT
  rationale: En contexto sacrificial, תמִים indica ausencia de defecto físico. "Sin defecto" es claro y fiel; "sin mancha" es tradicional pero algo más figurado, e "intachable" podría sugerir moralidad.
- source_word: יַקְרִיבֶנּוּ
  english_pob_choice: he shall offer
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - presentará
  - lo acercará
  lexicon: HALOT
  rationale: El verbo en hífil de קרב en este contexto sacrificial se expresa naturalmente por "ofrecer" en español. Mantiene el valor cultual sin forzar un calco como "acercará".
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - a la puerta de la tienda de reunión
  - a la entrada del tabernáculo de reunión
  lexicon: HALOT
  rationale: '"Tienda de reunión" reproduce אֹהֶל מוֹעֵד de manera transparente y consistente con el lenguaje del santuario. "Entrada" conserva פֶּתַח con naturalidad; "puerta" es posible, pero menos literal.'
- source_word: לִרְצֹנוֹ
  english_pob_choice: that he may be accepted
  chosen_spanish: para que sea aceptado
  alternatives_spanish:
  - para su aceptación
  - de buena gana
  lexicon: HALOT
  rationale: La frase admite la idea de aceptación cultual ante Dios, que el texto inglés también privilegia en su revisión más reciente. "Para que sea aceptado" refleja bien el valor pasivo/resultativo; "para su aceptación" es más nominal y ambigua, mientras que "de buena gana" desplaza el sentido hacia voluntariedad.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para יְהוָה: "Yahvé". "Delante de" conserva lִפְנֵי con una fórmula bíblica natural en español y evita el masking de "SEÑOR".'
theological_decisions:
- issue: Interpretación de לִרְצֹנוֹ en contexto sacrificial
  english_pob_reading: that he may be accepted before Yahweh
  chosen_spanish_reading: para que sea aceptado delante de Yahvé
  alternative_spanish_readings:
  - para su aceptación delante de Yahvé
  - de buena gana delante de Yahvé
  - para que se le acepte
  rationale: El hebreo admite una tensión entre aceptabilidad cultual y voluntariedad. Siguiendo la revisión inglesa más reciente, el texto principal expresa la idea de aceptación; la nota preserva la lectura tradicional de voluntariedad sin ocultarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: Se adopta la forma española establecida en los lineamientos del proyecto para el Tetragrámaton. Esto mantiene visible el nombre del pacto y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente en la cláusula final, prefiriendo una expresión verbal de aceptación («para que sea aceptado») sobre una nominalización. También conserva la tensión interpretativa de לִרְצֹנוֹ mediante nota, en lugar de resolverla silenciosamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma regular del nombre divino.
  - Se usa «tienda de reunión» para אֹהֶל מוֹעֵד de modo consistente con la terminología cultual.
  - Se usa «ofrenda» para קרבן y «holocausto» para עֹלָה, distinguiendo el término general del específico.
  - Se prefiere lenguaje sacrificial directo y transparente, evitando paráfrasis devocionales.
