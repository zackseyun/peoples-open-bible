translation:
  language: es
  text: Entonces Pashur golpeó a Jeremías el profeta y lo puso en el cepo[a], que estaba junto a la puerta superior de Benjamín, la cual estaba en la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «el potro» u otro dispositivo de sujeción dolorosa; la forma exacta de la מַהְפֶּכֶת es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֶּה
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - pegó
  - hirió
  lexicon: HALOT
  rationale: נכה puede expresar golpear, herir o dar un golpe. 'Golpeó' es natural en español y conserva la ambigüedad del hebreo, sin añadir necesariamente la idea de una golpiza más extensa.
- source_word: פַשְׁחוּר
  english_pob_choice: Pashhur
  chosen_spanish: Pashur
  alternatives_spanish:
  - Pasjur
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio transliterado. 'Pashur' sigue el uso bíblico habitual en español y evita una forma demasiado hispanizada que no esté motivada por el texto fuente.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremiah
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio establecido en español bíblico.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: Se conserva el título appositivo porque está explícito en el hebreo y subraya la gravedad de la agresión contra Jeremías.
- source_word: וַיִּתֵּן אֹתוֹ עַל
  english_pob_choice: put him in
  chosen_spanish: lo puso en
  alternatives_spanish:
  - lo colocó en
  - lo metió en
  lexicon: HALOT
  rationale: La expresión hebrea idiomática pide en español una colocación directa. 'Lo puso en' reproduce con naturalidad la acción de introducirlo en un dispositivo de restricción.
- source_word: הַמַּהְפֶּכֶת
  english_pob_choice: the stocks
  chosen_spanish: el cepo
  alternatives_spanish:
  - los cepos
  - la argolla
  lexicon: HALOT
  rationale: El término designa un instrumento de sujeción/punición cuya forma exacta es incierta. 'Cepo' es un equivalente funcional claro en español; se conserva la reserva sobre el aparato exacto con nota.
- source_word: שַׁעַר בִּנְיָמִן
  english_pob_choice: Benjamin Gate
  chosen_spanish: la puerta de Benjamín
  alternatives_spanish:
  - la puerta benjaminita
  lexicon: HALOT
  rationale: En español, 'puerta' expresa mejor el sentido arquitectónico del hebreo שַׁעַר y evita una rigidez nominal excesiva. Se mantiene el nombre propio del lugar.
- source_word: הָעֶלְיוֹן
  english_pob_choice: upper
  chosen_spanish: superior
  alternatives_spanish:
  - alta
  - de arriba
  lexicon: HALOT
  rationale: '''Superior'' funciona de modo natural como modificador de una puerta/topónimo y preserva el valor direccional/posicional del adjetivo.'
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea 'casa' en vez de sustituirla por 'templo', porque el texto fuente dice literalmente 'casa de Yahvé'. Se sigue el criterio POB de traducir יְהוָה como 'Yahvé'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino en su forma española 'Yahvé', coherente con la política del proyecto y con el valor de nombre propio del tetragrámaton.
theological_decisions:
- issue: Tratamiento del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el nombre divino explícitamente; la traducción no lo enmascara con un título. 'Yahvé' preserva el nombre de pacto tal como pide la política del proyecto y el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Naturaleza de הַמַּהְפֶּכֶת
  english_pob_reading: the stocks, with a footnote noting possible 'the rack' or another device
  chosen_spanish_reading: el cepo, con nota sobre la incertidumbre del aparato
  alternative_spanish_readings:
  - la argolla
  - el potro
  rationale: El hebreo nombra un artefacto de restricción cuyo diseño preciso no puede afirmarse con seguridad. 'Ceo' comunica la función con cautela, y la nota mantiene abierta la posibilidad de otro dispositivo de sujeción o tortura.
  doctrine_reference: HALOT / nota léxica del POB inglés
translation_notes:
  revision_awareness: La versión inglesa más reciente no requirió cambios y fue confirmada con alta concordancia; esta propuesta conserva esa lectura y solo la reexpresa en español con el mismo nivel de cautela léxica, especialmente en מַהְפֶּכֶת y en el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, coherente con la convención del proyecto.
  - Se eligió 'el cepo' como equivalente funcional de 'stocks', sin cerrar la incertidumbre del objeto.
  - '''Puerta de Benjamín'' y ''casa de Yahvé'' siguen de cerca la estructura del hebreo, pero con sintaxis natural en español.'
