    issue: El estribillo «porque para siempre es su amor leal» es poco natural en español.
    rationale: Aunque formalmente intenta reflejar לְעוֹלָם, el orden y la cópula producen una frase rígida y extraña para lectura pública.
  - severity: medium
    issue: La traducción actual no comunica bien el valor durativo de la cláusula final.
    rationale: El inglés POB auditó «endures forever» para explicitar la permanencia de חֶסֶד. «Es para siempre» sería mejor que la redacción actual, pero «permanece para siempre» preserva con mayor claridad ese matiz.
