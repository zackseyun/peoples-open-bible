translation:
  language: es
  text: He aquí[a], el Señor Yahvé me ayuda; ¿quién es el que me declarará culpable?[b] He aquí, todos ellos se gastarán como una prenda; la polilla los comerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Miren». La partícula hebrea llama la atención de manera enfática y solemne; «He aquí» preserva mejor ese tono profético sin convertirla en un imperativo explícito.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿quién me condenará?». El verbo hebreo es forense y significa declarar culpable o condenar en juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - He aquí
  - Miren
  lexicon: HALOT
  rationale: La partícula exhortativa pide atención solemne. En español, «¡Miren!» conserva bien ese llamado directo y natural; «He aquí» suena más arcaico, aunque posible en un registro más bíblico.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: El hebreo combina el título אדני con el nombre propio divino YHWH. Se evita el ocultamiento del nombre y se mantiene la distinción de ambos elementos; «Señor» refleja אֲדֹנָי y «Yahvé» representa יְהוִה según el estándar del proyecto.
- source_word: יַעֲזָר לִי
  english_pob_choice: helps me
  chosen_spanish: me ayuda
  alternatives_spanish:
  - me ayudará
  - viene en mi ayuda
  lexicon: HALOT
  rationale: El imperfecto hebreo permite una fuerza de presente confiado o de futuro cercano. «Me ayuda» reproduce bien la seguridad presente del hablante sin forzar el tiempo verbal en español.
- source_word: מִי הוּא
  english_pob_choice: who is he
  chosen_spanish: ¿quién es el que
  alternatives_spanish:
  - ¿quién es él que
  - ¿quién
  lexicon: HALOT
  rationale: Se conserva el pronombre enfático mediante una estructura natural en español. «¿Quién es el que…?» mantiene el énfasis retórico sin sonar artificial.
- source_word: יַרְשִׁיעֵנִי
  english_pob_choice: will declare me guilty
  chosen_spanish: me declarará culpable
  alternatives_spanish:
  - me condenará
  - me declarará impío
  lexicon: HALOT
  rationale: 'El verbo tiene sentido forense: declarar culpable/culpabilizar en juicio. «Declarará culpable» hace explícita la carga jurídica mejor que una traducción más general.'
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - ellos todos
  lexicon: HALOT
  rationale: Se preserva la totalidad de los opositores con un español claro y directo.
- source_word: כַּבֶּגֶד
  english_pob_choice: like a garment
  chosen_spanish: como un vestido
  alternatives_spanish:
  - como una prenda
  - como un manto
  lexicon: HALOT
  rationale: «בגד» puede rendirse por «vestido» o «vestidura/ropa». Aquí «vestido» comunica bien la imagen de desgaste en español y mantiene la metáfora singular.
- source_word: יִבְלוּ
  english_pob_choice: will wear out
  chosen_spanish: se gastarán
  alternatives_spanish:
  - se desharán
  - se desgastarán
  lexicon: HALOT
  rationale: La idea es de deterioro gradual de la tela. «Se gastarán» es idiomático en español y conserva el matiz de uso hasta el desgaste.
- source_word: עָשׁ
  english_pob_choice: a moth
  chosen_spanish: la polilla
  alternatives_spanish:
  - un gusano de la ropa
  - una polilla
  lexicon: HALOT
  rationale: El sustantivo funciona aquí de modo genérico. En español, el artículo definido transmite naturalmente la imagen proverbial de la polilla que destruye la ropa.
- source_word: יֹאכְלֵם
  english_pob_choice: will eat them
  chosen_spanish: los comerá
  alternatives_spanish:
  - los devorará
  - los consumirá
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de consumo/devoración aplicada a la polilla. «Comerá» sigue de cerca el hebreo y su metáfora corporal.
theological_decisions:
- issue: Cómo representar el nombre divino YHWH en un título compuesto
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El proyecto español sigue la convención de traducir YHWH como «Yahvé». En el sintagma compuesto con אֲדֹנָי, «el Señor Yahvé» preserva ambos elementos del título sin ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido forense del verbo ירשיעני
  english_pob_reading: will declare me guilty
  chosen_spanish_reading: me declarará culpable
  alternative_spanish_readings:
  - me condenará
  - me acusará
  rationale: 'La lectura auditada entiende el verbo en sentido judicial: declarar culpable o condenar en juicio. «Culpable» mantiene ese marco forense y evita diluirlo en una acusación genérica.'
  doctrine_reference: Nota lexical del POB sobre רשע en sentido forense
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje fue verificado con alto acuerdo entre revisores y quedó sin modificaciones sustantivas. Se conservó la lectura auditada del nombre divino y del verbo forense.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוִה de manera consistente con el estándar del proyecto.
  - Se mantiene la distinción entre el título «Señor» y el nombre divino «Yahvé».
  - Se traduce el valor forense de ירשיעני con lenguaje jurídico claro en español.
  - La metáfora de desgaste textil se conserva con vocabulario natural para lectores hispanohablantes.
