base_translation:
  language: en
  yaml_path: translation/ot/exodus/018/010.yaml
  text: And Yitro said[a], “Blessed be Yahweh, who delivered you from the hand of the Egyptians and from the hand of Pharaoh[b], who delivered the people from under the hand of the Egyptians.”
  footnotes:
  - marker: a
    text: Or 'Blessed is the LORD' or 'May the LORD be blessed.' The Hebrew blessing formula can be represented in more than one natural English way.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the hand of Egypt ... from under the hand of Egypt,' an idiom for deliverance from oppressive power or control.
    reason: lexical_alternative
