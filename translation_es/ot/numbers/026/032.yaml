lexical_decisions:
- source_word: וּ/שְׁמִידָע
  english_pob_choice: from Shemida
  chosen_spanish: de Shemida
  alternatives_spanish:
  - y Shemida
  lexicon: HALOT
  rationale: En esta fórmula censal, el prefijo conjuntivo se entiende idiomáticamente como introducción de una pertenencia genealógica. En español, ‘de’ expresa mejor el sentido distributivo que un simple ‘y’, y conserva el patrón ‘de X, el clan de…’.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: el clan de
  alternatives_spanish:
  - la familia de
  lexicon: HALOT
  rationale: En listas tribales y censales, מִשְׁפָּחָה designa una subdivisión de parentesco dentro de la tribu. ‘Clan’ es más preciso que ‘familia’ y coincide con el valor técnico del término.
- source_word: הַ/שְּׁמִידָעִי
  english_pob_choice: the Shemidaites
  chosen_spanish: los shemidaitas
  alternatives_spanish:
  - el clan shemidaita
  lexicon: HALOT
  rationale: El gentilicio señala a los descendientes o grupo asociado con Shemida. En español, el plural sustantivado ‘shemidaitas’ mantiene el valor colectivo y naturalidad en una enumeración genealógica.
- source_word: וְ/חֵפֶר
  english_pob_choice: and from Hepher
  chosen_spanish: y de Héfer
  alternatives_spanish:
  - de Héfer
  lexicon: HALOT
  rationale: Como en el primer miembro, la conjunción hebrea enlaza una nueva rama del patrón censal. ‘Y de’ conserva la coordinación del hebreo y su lectura distributiva implícita.
- source_word: הַֽ/חֶפְרִי
  english_pob_choice: the Hepherites
  chosen_spanish: los heferitas
  alternatives_spanish:
  - el clan heferita
  lexicon: HALOT
  rationale: El adjetivo gentilicio indica al grupo descendiente de Héfer. ‘Heferitas’ reproduce en español la función colectiva del término y mantiene coherencia con ‘shemidaitas’.
