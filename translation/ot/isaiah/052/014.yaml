id: ISA.52.14
reference: Isaiah 52:14
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֨ר שָׁמְמ֤וּ עָלֶ֨י/ךָ֙ רַבִּ֔ים כֵּן מִשְׁחַ֥ת מֵ/אִ֖ישׁ מַרְאֵ֑/הוּ וְ/תֹאֲר֖/וֹ מִ/בְּנֵ֥י אָדָֽם־׃
translation:
  text: Just as many were appalled at you—so disfigured was his appearance[a], beyond that of a man[c][b], and his form beyond the sons of man—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew shifts from ''you'' to ''his'' within the verse: ''many were appalled at you ... his appearance ... his form.'''
    reason: alternative_reading
  - marker: b
    text: Or 'marred' for 'disfigured.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'beyond the sons of man,' an idiom for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: Just as
  alternatives:
  - As
  lexicon: HALOT
  rationale: Introduces the comparison that is completed in the following verse. 'Just as' signals the correlative structure with כֵּן more clearly in modern English than a bare 'as'.
- source_word: שָׁמְמוּ
  chosen: were appalled
  alternatives:
  - were astonished
  - were desolated
  lexicon: HALOT
  rationale: The verb can denote being appalled, stunned, or desolated. In this context of reaction to the servant's appearance, 'were appalled' best captures the emotional shock without implying mere surprise.
- source_word: עָלֶיךָ
  chosen: at you
  alternatives:
  - at him
  - because of you
  lexicon: HALOT
  rationale: The MT has second masculine singular, so the direct address 'at you' should be preserved. Because the following suffixes are third masculine singular, the verse shifts person; this should not be harmonized away in translation.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - multitudes
  lexicon: HALOT
  rationale: Standard rendering for the plural adjective/substantive here; concise and natural.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  lexicon: HALOT
  rationale: Marks the second half of the comparison begun by כַּאֲשֶׁר. 'So' is idiomatic in English and preserves the structure.
- source_word: מִשְׁחַת
  chosen: disfigured
  alternatives:
  - marred
  - corrupted
  lexicon: HALOT
  rationale: The noun conveys disfigurement/ruin. 'Disfigured' communicates the physical sense clearly in contemporary English better than the traditional but less transparent 'marred'.
- source_word: מֵאִישׁ
  chosen: beyond that of a man
  alternatives:
  - more than any man
  - beyond human semblance
  lexicon: HALOT
  rationale: The preposition מן here expresses comparison/excess. 'Beyond that of a man' conveys that his appearance was so altered as to fall outside normal human appearance, while staying close to the Hebrew wording.
- source_word: מַרְאֵהוּ
  chosen: his appearance
  alternatives:
  - his look
  - his visage
  lexicon: HALOT
  rationale: A straightforward rendering of the noun for visible appearance. 'Visage' is traditional but archaic for the stated translation philosophy.
- source_word: וְתֹארוֹ
  chosen: and his form
  alternatives:
  - and his shape
  - and his figure
  lexicon: HALOT
  rationale: Pairs naturally with 'appearance' while preserving the distinction between the two Hebrew nouns.
- source_word: מִבְּנֵי אָדָם
  chosen: beyond the sons of man
  alternatives:
  - beyond the sons of humanity
  - beyond humankind
  - beyond other men
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of man/humanity.' Per the gender-accurate policy, retaining 'sons of man' best reflects the source expression and its representative force, even though it refers broadly to human beings.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  lexicon: HALOT
  rationale: Within the idiom בְּנֵי אָדָם, 'man' is retained to match the Hebrew expression and the project's gender-accurate policy. The phrase is representative, not restricted to males.
