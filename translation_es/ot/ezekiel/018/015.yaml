translation:
  language: es
  text: No ha comido en los montes[a], ni ha alzado sus ojos hacia los ídolos[b] de la casa de Israel; no ha mancillado a la esposa de su prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: “no ha comido en los santuarios de los montes”, es decir, no ha participado en culto idolátrico.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo para “ídolos” es despectivo y puede sugerir “ídolos inmundos” o “repugnantes”.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל הֶהָרִים ... אָכָל
  english_pob_choice: has not eaten on the mountains
  chosen_spanish: No ha comido en los montes
  alternatives_spanish:
  - No ha comido en los montes altos
  - No ha comido en los santuarios de los montes
  lexicon: HALOT
  rationale: Conserva la imagen hebrea de ‘los montes’ y deja que el contexto de ídolos indique el trasfondo cultual. ‘En los montes’ suena natural en español y mantiene la textura del original sin explicitar más de lo que el texto dice.
- source_word: וְעֵינָיו לֹא נָשָׂא
  english_pob_choice: nor lifted up his eyes
  chosen_spanish: ni ha alzado sus ojos
  alternatives_spanish:
  - ni ha levantado sus ojos
  - ni ha mirado hacia arriba
  lexicon: HALOT
  rationale: ‘Alzar los ojos’ reproduce bien el modismo hebreo y es comprensible en español bíblico y moderno. Se evita ‘miró’ para no perder el valor idiomático de orientación atencional o devocional.
- source_word: גִּלּוּלֵי בֵּית יִשְׂרָאֵל
  english_pob_choice: the idols of the house of Israel
  chosen_spanish: los ídolos de la casa de Israel
  alternatives_spanish:
  - los ídolos inmundos de la casa de Israel
  - los ídolos del pueblo de Israel
  lexicon: HALOT
  rationale: ‘Ídolos’ es la equivalencia clara y establecida; se conserva ‘casa de Israel’ para reflejar el giro nominal hebreo. No se incorporó ‘inmundos’ al texto principal para no cargar el verso con una explicitación que el POB inglés reservó como matiz lexical.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: La forma fija ‘casa de Israel’ preserva el estilo profético y la expresión de pacto del hebreo, preferida frente al más breve ‘Israel’.
- source_word: אֵשֶׁת רֵעֵהוּ
  english_pob_choice: his neighbor’s wife
  chosen_spanish: la esposa de su prójimo
  alternatives_spanish:
  - la mujer de su prójimo
  - la esposa de su vecino
  lexicon: HALOT
  rationale: ‘Prójimo’ comunica con precisión el sentido relacional de רֵעַ y mantiene el registro ético del pasaje. ‘Esposa’ es más sobria y directa en español bíblico contemporáneo que ‘mujer’.
- source_word: לֹא טִמֵּא
  english_pob_choice: has not defiled
  chosen_spanish: no ha profanado
  alternatives_spanish:
  - no ha contaminado
  - no ha hecho impura
  lexicon: HALOT
  rationale: En este contexto sexual y moral, ‘profanado’ comunica la carga de deshonra/contaminación ritual sin reducirlo a una mera impureza física. Se conserva la fuerza ética del hebreo sin excederlo con ‘violado’.
theological_decisions:
- issue: Sentido cultual de comer en los montes
  english_pob_reading: The phrase is rendered literally as participation in illicit high-place worship rather than generalized dining in the hills.
  chosen_spanish_reading: Se mantiene la imagen literal de ‘comer en los montes’, dejando que el contexto de los ídolos señale la participación en cultos ilícitos.
  alternative_spanish_readings:
  - Ha comido en los santuarios de los montes
  - Ha participado en comidas rituales en los altos
  rationale: Ezequiel usa una expresión breve y alusiva; la traducción no debe resolverla del todo en el texto principal. La literalidad conserva el nexo con el hebreo y permite que el lector perciba la referencia a la idolatría por el contexto inmediato.
  doctrine_reference: Ezequiel 18; crítica profética a la idolatría en los altos
- issue: Fuerza moral de ‘no ha profanado’
  english_pob_reading: '''has not defiled his neighbor’s wife'''
  chosen_spanish_reading: ‘no ha profanado la esposa de su prójimo’ conserva la categoría moral y ritual del acto sin añadir coerción.
  alternative_spanish_readings:
  - no ha contaminado la esposa de su prójimo
  - no ha violado la esposa de su prójimo
  rationale: El hebreo apunta a la profanación por adulterio; ‘profanado’ comunica bien esa dimensión. ‘Violado’ introduciría una presuposición de violencia no presente en el texto.
  doctrine_reference: Éxodo 20:14; Ezequiel 18:6, 11, 15
translation_notes:
  revision_awareness: 'Se siguió de cerca el auditable inglés POB y no hubo revisiones aplicadas en el archivo fuente; el borrador español conserva la misma línea interpretativa: literalidad moderada en ‘los montes’, mantenimiento del modismo ‘alzar los ojos’, preservación de ‘casa de Israel’ y de la fuerza moral de ‘defilar/profanar’ en el contexto sexual.'
  spanish_consistency_notes:
  - Se mantiene ‘casa de Israel’ de forma consistente con el estilo profético y la terminología POB.
  - ‘Prójimo’ se usa para רֵעַ por claridad relacional y coherencia con el registro ético de la serie.
  - No se introduce ‘Señor’ ni ‘Cristo’ porque el versículo no contiene esos términos.
  - Se evita ‘inmundos’ en el texto principal para reservar el matiz pejorativo como nota lexical, en armonía con el tratamiento inglés.
