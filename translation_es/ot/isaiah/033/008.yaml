review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: desolación de las vías, cese del tránsito, sujeto singular implícito que rompe el pacto, desprecia las ciudades y no tiene consideración por el ser humano. Sin embargo, hay dos problemas de fidelidad editorial: los marcadores de notas están invertidos respecto de su anclaje semántico, y «a nadie» en el texto principal debilita la preservación del singular genérico אֱנוֹשׁ que el propio expediente inglés quiso mantener más visiblemente.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «transitante» suena forzado y poco natural en lectura bíblica eclesial; «viajero» o «caminante» leen mejor. «Calzadas» es defendible. «Ha cesado de la senda» también suena algo rígido; «ha dejado de pasar por el camino» comunica mejor la construcción hebrea sin wooden calque. Además, las notas deben anclarse correctamente.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Pacto» para בְּרִית es aceptable. La principal desalineación es con la decisión auditada sobre אֱנוֹשׁ: el inglés preserva el singular genérico mediante «man», mientras el español usa «nadie», que borra esa forma más de lo necesario. Una solución como «no tuvo en cuenta al hombre[b]» o «no consideró al ser humano[b]» preserva mejor la decisión léxica documentada y sigue siendo legible.'
  issues:
  - severity: high
    issue: Los marcadores de notas a y b están colocados en frases equivocadas.
    rationale: La nota sobre la variante textual «testigos/ciudades» debe anclarse en «las ciudades», no en «desoladas». La nota sobre אֱנוֹשׁ debe anclarse en la frase final sobre «hombre/ser humano», no en «las ciudades». Esto incumple la disciplina requerida de anclar cada nota en el lugar pertinente.
  - severity: medium
    issue: «no ha estimado a nadie» no preserva suficientemente el singular genérico de אֱנוֹשׁ.
    rationale: Aunque natural en español, elimina la forma singular humana/mortal que el expediente inglés buscó reflejar. El español puede mantener ese matiz con «al hombre» o «al ser humano», apoyado por nota léxica.
  - severity: medium
    issue: «el transitante ha cesado de la senda» suena poco natural en español bíblico contemporáneo.
    rationale: «Transitante» es raro y administrativo; «ha cesado de la senda» también resulta rígido. Una formulación como «el viajero ha dejado de pasar por el camino» conserva mejor el sentido participial y la legibilidad.
  revised_spanish_text: Las calzadas quedan desoladas; el viajero ha dejado de pasar por el camino. Ha quebrantado el pacto, ha despreciado las ciudades[a] y no ha tenido en cuenta al hombre[b].
