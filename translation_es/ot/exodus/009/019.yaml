review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y del rastro POB en cuanto a la advertencia urgente, el resguardo del ganado y la consecuencia mortal del granizo. Sin embargo, dos puntos requieren ajuste: «manda aviso» suena poco natural en español general, y «no sea recogido en la casa» no expresa con suficiente claridad el movimiento direccional de הַבַּיְתָה ni la formulación más natural documentada en el audit trail inglés («brought into the house»).'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «manda aviso» resulta algo forzado; «manda a poner a resguardo» o «manda recoger» sería más idiomático. Además, la construcción con coma antes de «el granizo caerá» funciona mejor con raya o con una pausa más marcada. El resto del verso es legible y adecuado para español bíblico contemporáneo.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. «Ganado», «campo», «granizo» y «morirán» están bien. La elección «toda persona» es aceptable dado el estado del English POB audit trail, aunque el trasfondo doctrinal sobre אָדָם queda complejo; no requiere adjudicación adicional aquí. El problema principal es léxico-estilístico con «manda aviso» y la frase verbal de אָסף/הַבַּיְתָה.
  issues:
  - severity: medium
    issue: «manda aviso» es poco idiomático en español neutral
    rationale: Aunque intenta reflejar «send word», en español amplio suena extraño o regionalizado. «manda a poner a resguardo» comunica mejor la orden urgente y la finalidad protectora sin perder fidelidad contextual.
  - severity: medium
    issue: «no sea recogido en la casa» suena menos natural y diluye el movimiento hacia adentro
    rationale: El hebreo הַבַּיְתָה incluye dirección «hacia la casa / dentro de la casa». «Sea llevado a la casa» o «sea metido en la casa» lo expresa mejor; además armoniza con el audit trail inglés revisado («brought into the house»).
  - severity: low
    issue: La puntuación antes de la cláusula final puede mejorarse
    rationale: 'Después de la relativa larga, una raya introduce con más claridad la consecuencia: «... en la casa—el granizo caerá...».'
  revised_spanish_text: Así que ahora[a], manda a poner a resguardo tu ganado y todo lo que tienes en el campo. Toda persona y todo animal que se encuentre en el campo y no sea llevado a la casa[b]—el granizo caerá sobre ellos, y morirán.
  revised_footnotes:
  - marker: a
    text: 'O: «y ahora»; el hebreo introduce una transición urgente hacia una acción inmediata.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «no sea recogido hacia la casa / en la casa»; el hebreo conserva la imagen de ser reunido bajo techo como resguardo.
    reason: lexical_alternative
  revision_rationale: Se reemplazó «manda aviso» por «manda a poner a resguardo» para lograr un español más natural y fiel a la función de la orden urgente. Se cambió «no sea recogido en la casa» por «no sea llevado a la casa» para expresar con mayor claridad la dirección implícita de הַבַּיְתָה y alinearse mejor con la decisión inglesa auditada «brought into the house». También se ajustó la puntuación para mejorar la legibilidad.
