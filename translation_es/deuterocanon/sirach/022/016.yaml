review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura comparativa del griego y conserva adecuadamente la imagen de solidez: ἱμάντωσις ξυλίνη / καρδία, ἐνδεδεμένη / ἐστηριγμένη, y οὐ διαλυθήσεται / οὐ δειλιάσει. Sin embargo, dos puntos necesitan ajuste para mayor fidelidad y naturalidad: «en el tiempo» suena poco idiomático para ἐν καιρῷ, y la nota [b] en español no corresponde a una alternativa preservada por el POB inglés sino a una explicación innecesaria.'
  spanish_quality_summary: El español es en general claro y digno, pero «en el tiempo» resulta forzado en español bíblico moderno; «a su tiempo» o «en su momento» refleja mejor la literalidad sin sonar antinatural. «Amarre» es defendible, aunque algo concreto/coloquial; aquí todavía funciona. La frase completa mejora con una poda de notas para evitar sobreanotación y mantener legibilidad.
  glossary_alignment: No hay términos del glosario doctrinal mayormente implicados salvo καρδία, bien vertido como «corazón». Las decisiones léxicas principales concuerdan con el rastro inglés, salvo que la nota [b] no replica una alternativa léxica documentada y conviene omitirla. «Consejo reflexivo» es aceptable para ἐπὶ διανοήματος βουλῆς, aunque «consejo meditado» también sería posible.
  issues:
  - severity: medium
    issue: «en el tiempo» para ἐν καιρῷ es poco natural en español
    rationale: Aunque busca reflejar literalmente «in time», en español «en el tiempo» suele sonar abstracto o filosófico, no temporal ocasional. «A su tiempo» conserva cercanía al griego y legibilidad.
  - severity: low
    issue: La nota [b] sobre «terremoto» no corresponde al patrón de alternativas del POB inglés
    rationale: El inglés no conserva aquí una nota explicativa sobre σεισμός/συσσεισμός, y la nota española añade explicación innecesaria en lugar de una alternativa textual relevante.
  - severity: low
    issue: Orden y correspondencia de notas pueden simplificarse
    rationale: 'Basta conservar las notas de alternativa léxica realmente útiles: οὐ διαλυθήσεται y ἐν καιρῷ. La frase sobre el consejo puede quedar sin nota, como en el texto inglés revisado, ya que el español no crea nueva ambigüedad grave.'
  revised_spanish_text: Un amarre de madera, fijado en una construcción, no se aflojará[a] en un terremoto; así, un corazón afirmado por un consejo reflexivo no perderá el ánimo a su tiempo[b].
