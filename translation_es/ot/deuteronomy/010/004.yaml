translation:
  language: es
  text: Y escribió en las tablas[a], como en la primera escritura, las diez palabras que Yahvé había hablado a ustedes en el monte, de en medio del fuego, el día de la asamblea; y Yahvé me las dio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, tradicionalmente, «los Diez Mandamientos». Hebreo: «las diez palabras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  english_pob_choice: And he wrote
  chosen_spanish: Y escribió
  alternatives_spanish:
  - Y inscribió
  lexicon: HALOT
  rationale: El verbo כתב se vierte con el pasado simple natural en español. 'Escribió' conserva la narración y sigue la elección inglesa de un término común sin perder la referencia a una inscripción formal en piedra.
- source_word: הַלֻּחֹת
  english_pob_choice: the tablets
  chosen_spanish: las tablas
  alternatives_spanish:
  - las tablas de piedra
  - las losas
  lexicon: HALOT
  rationale: לֻחֹת designa las tablas del pacto. 'Tablas' es el equivalente bíblico más claro y digno en español; 'tablas de piedra' sería interpretativo aunque verdadero, y 'losas' suena menos natural aquí.
- source_word: כַּמִּכְתָּב הָרִאשׁוֹן
  english_pob_choice: like the first writing
  chosen_spanish: como la primera escritura
  alternatives_spanish:
  - según la primera escritura
  - como la primera inscripción
  lexicon: HALOT
  rationale: El כ compara la escritura presente con la anterior. 'Como la primera escritura' preserva la comparación y el sustantivo מכתב sin forzar una paráfrasis; 'inscripción' sería posible, pero menos neutral en español.
- source_word: עֲשֶׂרֶת הַדְּבָרִים
  english_pob_choice: the Ten Words
  chosen_spanish: las Diez Palabras
  alternatives_spanish:
  - los Diez Mandamientos
  - las diez palabras
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente 'las diez palabras'. Se mantiene esa forma para respetar la primacía del original, con mayúscula inicial por tratarse de una designación reconocida del pacto.
- source_word: אֲשֶׁר דִּבֶּר יְהוָה אֲלֵיכֶם
  english_pob_choice: that Yahweh had spoken to you
  chosen_spanish: que Yahvé había hablado a ustedes
  alternatives_spanish:
  - que Yahvé les habló
  - que Yahvé les había hablado
  lexicon: HALOT
  rationale: El relativo introduce el contenido ya pronunciado antes de la escritura. El pluscuamperfecto 'había hablado' refleja bien la secuencia narrativa; 'a ustedes' conserva el plural directo del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la decisión doctrinal del proyecto: transliterar el Nombre divino como ''Yahvé'' en el texto principal, evitando la sustitución por un título.'
- source_word: בָּהָר
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - sobre el monte
  - en la montaña
  lexicon: HALOT
  rationale: En español bíblico 'en el monte' suena natural y fiel para la escena de revelación en Horeb/Sinaí. 'Montaña' también sería posible, pero 'monte' conserva mejor el registro bíblico.
- source_word: מִתּוֹךְ הָאֵשׁ
  english_pob_choice: from the midst of the fire
  chosen_spanish: de en medio del fuego
  alternatives_spanish:
  - desde el interior del fuego
  - de entre el fuego
  lexicon: HALOT
  rationale: La imagen hebrea enfatiza que la voz salió del interior del fuego. 'De en medio del fuego' es una expresión idiomática bíblica clara en español y mantiene la vivididad del hebreo.
- source_word: בְּיוֹם הַקָּהָל
  english_pob_choice: on the day of the assembly
  chosen_spanish: en el día de la asamblea
  alternatives_spanish:
  - el día de la congregación
  - el día del asambleamiento
  lexicon: HALOT
  rationale: קהל se entiende como la asamblea reunida de Israel. 'Asamblea' preserva el matiz colectivo y evita un término demasiado eclesiástico como 'congregación' si no está exigido por el contexto.
- source_word: וַיִּתְּנֵם
  english_pob_choice: and Yahweh gave them
  chosen_spanish: y Yahvé me las dio
  alternatives_spanish:
  - y Yahvé me los dio
  - y Yahvé se los dio a mí
  lexicon: HALOT
  rationale: El sufijo plural se refiere a las tablas/las palabras representadas en ellas. 'Me las dio' mantiene el referente plural femenino concordando con 'tablas' y suena natural en español.
- source_word: אֵלָי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: El complemento de destinatario queda integrado de forma natural en español con el pronombre átono 'me'; el sentido dativo se conserva sin redundancia.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama. Siguiendo la política del proyecto, se translitera el Nombre en lugar de sustituirlo por un título. 'Yahvé' es la forma adoptada para el español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of עֲשֶׂרֶת הַדְּבָרִים
  english_pob_reading: the Ten Words
  chosen_spanish_reading: las Diez Palabras
  alternative_spanish_readings:
  - los Diez Mandamientos
  - las diez palabras
  rationale: La lectura principal sigue el hebreo literal 'diez palabras' y preserva el matiz original frente a la formulación tradicional. La alternativa tradicional queda documentada en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios respecto del estado auditado más reciente; se mantiene la lectura literal de ''las Diez Palabras'' y el uso de ''Yahvé''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Nombre divino en todo el versículo.
  - '''Tablas'' conserva el género femenino plural, por eso el clítico en ''me las dio''.'
  - La puntuación reproduce la estructura del hebreo y del audit trail inglés con una sola cadena de eventos.
  - La nota a pie de página marca la alternativa tradicional sin desplazar la lectura literal principal.
