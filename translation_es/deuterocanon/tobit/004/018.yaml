translation:
  language: es
  text: Busca consejo[a] de toda persona sabia, y no desprecies ningún consejo útil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de todo consejo útil». El griego repite el mismo sustantivo de «consejo / advice» usado antes en el versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συμβουλίαν
  english_pob_choice: counsel / advice
  chosen_spanish: consejo
  alternatives_spanish:
  - asesoramiento
  - consejo práctico
  lexicon: LSJ
  rationale: συμβουλίαν designa consejo o asesoramiento recibido. 'Consejo' es el equivalente natural en español y mantiene la idea de orientación deliberada mejor que un término más técnico o más largo.
- source_word: παρὰ παντὸς φρονίμου
  english_pob_choice: from every wise person
  chosen_spanish: de toda persona sabia
  alternatives_spanish:
  - de todo sabio
  - de toda persona prudente
  lexicon: LSJ
  rationale: παρά con genitivo indica procedencia, por eso se traduce 'de'. φρόνιμος significa 'sabio' o 'prudente'; 'persona sabia' conserva el sentido inclusivo adoptado en la revisión inglesa y suena natural en español.
- source_word: ζήτησον
  english_pob_choice: seek
  chosen_spanish: busca
  alternatives_spanish:
  - buscad
  - procura
  lexicon: LSJ
  rationale: El imperativo pide una acción activa de búsqueda. 'Busca' comunica esa iniciativa con naturalidad en español moderno y corresponde al valor exhortativo de ζητέω.
- source_word: μὴ καταφρονήσῃς
  english_pob_choice: do not despise
  chosen_spanish: no desprecies
  alternatives_spanish:
  - no desestimes
  - no menosprecies
  lexicon: LSJ
  rationale: καταφρονέω implica despreciar o tratar con desdén. 'No desprecies' conserva la fuerza moral de la advertencia y el matiz de no desechar el consejo por considerarlo indigno.
- source_word: ἐπὶ πάσης συμβουλίας χρησίμης
  english_pob_choice: any useful advice
  chosen_spanish: ningún consejo útil
  alternatives_spanish:
  - todo consejo útil
  - cualquier consejo útil
  lexicon: LSJ
  rationale: La frase subraya consejo caracterizado por ser útil. En español, 'ningún consejo útil' encaja con la negación y evita una lectura de desprecio total; también preserva el valor distributivo de πάσης en contexto prohibitivo.
translation_notes:
  revision_awareness: La revisión inglesa ajustó 'wise man' a 'wise person' para reflejar el sentido inclusivo de παντὸς φρονίμου. La versión española adopta 'persona sabia' por la misma razón, manteniendo la naturalidad y evitando restringir indebidamente el referente por género.
  spanish_consistency_notes:
  - Se mantiene 'consejo' para συμβουλίαν en ambas ocurrencias, siguiendo la repetición del griego.
  - Se usa 'sabia' con valor inclusivo general, conforme al ajuste revisado del texto inglés.
  - La negación 'no desprecies' conserva el tono exhortativo y moral del original sin intensificarlo innecesariamente.
