revisions:
- from: 'Pero él dijo[a]: «Por favor, Señor mío, envía por mano de quien tú quieras enviar».'
  to: 'Pero él dijo[a]: «Por favor, mi Señor, envía, te ruego, por mano de quien hayas de enviar».'
  rationale: Se ajusta la cláusula final para preservar mejor la ambigüedad del hebreo sin introducir el matiz adicional de «quieras». También se mejora la naturalidad del vocativo y se evita la repetición mecánica de «por favor», manteniendo los dos elementos de súplica del original.
