translation:
  language: es
  text: Hizo diez pilas[a] de bronce. Cada pila tenía capacidad para cuarenta batos[b], y cada pila medía cuatro codos[c]. Una pila estaba sobre cada uno de los diez soportes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Pilas'' traduce aquí el hebreo para grandes vasijas de lavado; en otras versiones se lee ''laveros''.'
    reason: lexical_alternative
  - marker: b
    text: Un 'bato' era una unidad hebrea de medida de líquidos.
    reason: cultural_note
  - marker: c
    text: El hebreo dice simplemente 'cuatro codos', sin precisar aquí si se trata del diámetro u otra dimensión.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִיֹּרוֹת
  english_pob_choice: basins
  chosen_spanish: lavabos
  alternatives_spanish:
  - pilas
  - recipientes
  - cuencos
  lexicon: HALOT
  rationale: En el contexto del templo se trata de vasijas grandes para lavado. 'Lavabos' comunica esa función con naturalidad en español sin perder el sentido cultual del utensilio; 'pilas' o 'recipientes' serían más genéricos, y 'cuencos' demasiado pequeños.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En el contexto de los muebles del templo, 'bronce' es la equivalencia normal y más precisa en español bíblico actual para este metal/alloy.
- source_word: בַּת
  english_pob_choice: baths
  chosen_spanish: baños
  alternatives_spanish:
  - batos
  lexicon: HALOT
  rationale: Se conserva la unidad de medida hebrea como 'baños' para mantener la referencia cultural y evitar una conversión especulativa. La forma plural española 'baños' sigue el uso tradicional de la unidad.
- source_word: יָכִיל
  english_pob_choice: held
  chosen_spanish: tenía capacidad para
  alternatives_spanish:
  - contenía
  - podía contener
  lexicon: HALOT
  rationale: El verbo expresa capacidad volumétrica. 'Tenía capacidad para' reproduce esa idea con claridad y evita sugerir que el lavabo estaba lleno.
- source_word: אַרְבָּע בָּאַמָּה
  english_pob_choice: four cubits
  chosen_spanish: cuatro codos
  alternatives_spanish:
  - cuatro codos de diámetro
  - cuatro codos de ancho
  lexicon: HALOT
  rationale: El hebreo dice solo 'cuatro codos' sin especificar la geometría. Por eso se mantiene la medida desnuda en español, como hace la revisión inglesa final, sin añadir 'de diámetro'.
- source_word: מְכוֹנָה
  english_pob_choice: stands
  chosen_spanish: soportes
  alternatives_spanish:
  - bases
  - pedestales
  - estands
  lexicon: HALOT
  rationale: En este pasaje la pieza sirve de apoyo a los lavabos. 'Soportes' es amplio, claro y fiel al contexto sin introducir un tecnicismo dudoso en español.
- source_word: עַל
  english_pob_choice: was on
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: '''Sobre'' expresa la relación espacial de colocación con naturalidad en español y conserva la sencillez del hebreo.'
theological_decisions:
- issue: Unidad de medida hebrea preservada sin conversión
  english_pob_reading: Each basin held forty baths
  chosen_spanish_reading: Cada lavabo tenía capacidad para cuarenta baños
  alternative_spanish_readings:
  - Cada lavabo tenía capacidad para unos cuarenta baños
  - Cada lavabo contenía cuarenta baños
  rationale: La referencia a una medida del sistema hebreo se conserva sin equivalencia moderna para no introducir falsa precisión. Esto sigue la elección inglesa de retener 'baths' y explicitar la unidad en nota.
  doctrine_reference: Principio de fidelidad textual y transparencia del dato cultural
- issue: Medida lineal sin especificar forma geométrica
  english_pob_reading: each basin was four cubits
  chosen_spanish_reading: cada lavabo medía cuatro codos
  alternative_spanish_readings:
  - cada lavabo tenía cuatro codos
  - cada lavabo era de cuatro codos
  rationale: El hebreo no dice explícitamente 'diámetro' ni otra dimensión. El español mantiene la misma reserva para no resolver en traducción una ambigüedad que el texto fuente no resuelve.
  doctrine_reference: Principio de no sobreinterpretación del dato descriptivo
- issue: Relación distributiva entre un lavabo y cada soporte
  english_pob_reading: One basin was on each of the ten stands
  chosen_spanish_reading: Un lavabo estaba sobre cada uno de los diez soportes
  alternative_spanish_readings:
  - Había un lavabo sobre cada uno de los diez soportes
  - Un lavabo iba sobre cada uno de los diez soportes
  rationale: La construcción distributiva hebrea se expresa de forma natural en español con 'sobre cada uno de'. Se mantiene el sentido uno-por-uno sin añadir nada más al texto.
  doctrine_reference: Fidelidad a la sintaxis distributiva del hebreo
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para eliminar ''across'' y dejar solo ''four cubits'', y también para hacer más directa la relación espacial (''was on''). La redacción española sigue esa revisión: conserva solo ''cuatro codos'' sin glosa geométrica y usa ''estaba sobre'' para reflejar la disposición distributiva sin sobreespecificar.'
  spanish_consistency_notes:
  - Se usa 'lavabos' para el utensilio del templo, evitando 'laveros' por sonar más arcaico o ambiguo en español moderno.
  - Se mantiene 'bronce' como término técnico estándar para el metal en contextos del templo.
  - Se conserva 'codos' y 'baños' como unidades heredadas del texto, con nota explicativa para transparencia.
  - No se introduce 'diámetro' porque la fuente hebrea no lo expresa; esto sigue la decisión revisada del texto inglés.
  - '''Soportes'' se prefiere a ''bases'' porque el contexto inmediato enfatiza la función de apoyo más que una forma técnica específica.'
