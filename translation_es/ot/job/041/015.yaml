    rationale: Aunque comunica adhesión, el registro resulta menos digno y menos preciso que el tono poético del hebreo. «Se adhieren entre sí» o similar refleja mejor la unión estrecha.
  - severity: medium
    issue: «están echados firmemente sobre él» es poco idiomático en español
    rationale: Intenta calcar la metáfora de «cast firm», pero en español suena forzado. Una expresión como «están fundidos sobre él» o «quedan firmemente fijados sobre él» preserva mejor la imagen de algo vaciado/fundido hasta quedar fijo.
  revised_spanish_text: Los pliegues de su carne se adhieren entre sí[a]; están fundidos sobre él y no se pueden mover.
