    rationale: El griego ἐν Μηδείᾳ χώρᾳ expresa ubicación («en la tierra/región de Media»), no pertenencia. «De la tierra de Media» no distorsiona gravemente, pero en español suena menos natural y puede sugerir relación posesiva.
  - severity: low
    issue: Formulación rígida en «habían sido registradas estas cosas»
    rationale: La pasiva perifrástica es comprensible, pero suena pesada. En español bíblico legible, «estaban registradas estas cosas» o «se habían registrado estas cosas» comunica mejor el sentido de ὑπομνημάτιστο como contenido ya consignado en el documento.
  revised_spanish_text: 'Entonces el rey Darío ordenó que se hiciera una búsqueda en los archivos guardados en Babilonia, y en Ecbatana, la fortaleza en la tierra de Media, se halló un rollo en el cual estaban registradas estas cosas:'
  revision_rationale: Se ajusta «de la tierra de Media» a «en la tierra de Media» para reflejar mejor el valor locativo del griego y mejorar la fluidez del español. Se cambia «habían sido registradas» por «estaban registradas» para una expresión más natural que conserva el sentido documental oficial del original.
