translation:
  language: es
  text: el que saca carro y caballo, ejército y el poderoso juntos; se acuestan, no se levantan; se apagan, se extinguen como lino[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “como una mecha de lino”; el hebreo dice literalmente “como lino”, evocando algo que se apaga con facilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמּוֹצִיא
  english_pob_choice: who brings out
  chosen_spanish: el que saca
  alternatives_spanish:
  - el que hace salir
  - el que conduce fuera
  lexicon: HALOT
  rationale: El participio causativo pide un presente descriptivo en español; 'saca' conserva la fuerza verbal sin sonar arcaico. 'Hace salir' es posible, pero menos fluido poéticamente.
- source_word: רֶכֶב
  english_pob_choice: chariot
  chosen_spanish: carro
  alternatives_spanish:
  - carro de guerra
  - carroza
  - carro de combate
  lexicon: HALOT
  rationale: '''Carro'' comunica el vehículo militar antiguo de modo natural en español. ''Carro de guerra'' explicita el uso, pero añade algo que el hebreo no dice.'
- source_word: וָסוּס
  english_pob_choice: horse
  chosen_spanish: caballo
  alternatives_spanish:
  - caballos
  lexicon: HALOT
  rationale: Se mantiene en singular para reflejar el singular colectivo hebreo y la pareja estrecha con 'carro'.
- source_word: חַיִל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - tropa
  - hueste
  lexicon: HALOT
  rationale: '''Ejército'' es la equivalencia moderna más clara para la fuerza militar del contexto. ''Hueste'' suena más tradicional, pero menos transparente para el lector actual.'
- source_word: וְעִזּוּז
  english_pob_choice: mighty one
  chosen_spanish: poderoso
  alternatives_spanish:
  - el fuerte
  - el valiente
  - el poderoso
  lexicon: HALOT
  rationale: La forma substantivada describe a una persona poderosa/fuerte. 'Poderoso' preserva la idea sin introducir 'guerrero', que el audit trail descartó por ser demasiado interpretativo.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  lexicon: HALOT
  rationale: Adverbio sencillo que mantiene la simultaneidad de la caída militar.
- source_word: יִשְׁכְּבוּ
  english_pob_choice: they lie down
  chosen_spanish: se acuestan
  alternatives_spanish:
  - yacen
  - se tienden
  - caen
  lexicon: HALOT
  rationale: En el contexto de derrota y muerte, 'se acuestan' conserva la imagen corporal de 'lie down' sin convertirla prematuramente en un verbo abstracto. 'Yacen' es posible, pero algo más literario y menos directo.
- source_word: בַּל יָקוּמוּ
  english_pob_choice: they do not rise
  chosen_spanish: no se levantan
  alternatives_spanish:
  - no se alzan
  - no volverán a levantarse
  lexicon: HALOT
  rationale: '''No se levantan'' suena natural en español y mantiene la secuencia viva del texto. La forma futura intensificaría el sentido, pero el hebreo aquí funciona como una negación enfática en escena.'
- source_word: דָּעֲכוּ
  english_pob_choice: they are extinguished
  chosen_spanish: se apagan
  alternatives_spanish:
  - se extinguen
  - se apagan por completo
  lexicon: HALOT
  rationale: Verbo de fuego que se apaga; 'se apagan' es la manera más idiomática de conservar la metáfora. 'Se extinguen' también es válido, pero algo más técnico.
- source_word: כַּפִּשְׁתָּה
  english_pob_choice: like flax
  chosen_spanish: como lino
  alternatives_spanish:
  - como flax
  - como una mecha de lino
  - como estopa
  lexicon: HALOT
  rationale: '''Lino'' es el equivalente español directo de פשתה. Aunque la imagen apunta al material inflamable, no conviene añadir ''mecha'' en el texto principal; esa precisión queda en la nota.'
- source_word: כָבוּ
  english_pob_choice: quenched
  chosen_spanish: se extinguen
  alternatives_spanish:
  - se apagan
  - son apagados
  lexicon: HALOT
  rationale: Para no duplicar exactamente el mismo verbo con una repetición artificial en español, se varía con 'se extinguen', manteniendo la metáfora de apagarse/extinguirse y la fuerza paralela del hebreo.
theological_decisions:
- issue: Presentación temporal de la acción divina y la derrota de los enemigos
  english_pob_reading: Use vivid present-style English ('who brings out... they lie down, they do not rise')
  chosen_spanish_reading: Usar presente descriptivo ('el que saca... se acuestan, no se levantan')
  alternative_spanish_readings:
  - usar pretérito para remitir solo al éxodo histórico
  - usar futuro para intensificar la irreversibilidad
  rationale: El hebreo conserva fuerza poética y descriptiva; el presente español mantiene esa vividez sin cerrar la lectura solo al pasado. Así se preserva la tensión entre evento histórico y patrón teológico.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Referencia de las fuerzas derrotadas
  english_pob_reading: Render generically as military forces without explicitly naming Egypt
  chosen_spanish_reading: 'Mantener la referencia genérica: ''carro, caballo, ejército y poderoso'''
  alternative_spanish_readings:
  - mencionar Egipto o Faraón en el texto principal
  - especificar 'su ejército'
  rationale: El hebreo nombra vehículos, fuerza militar y un hombre poderoso, pero no menciona a Egipto por nombre. La versión española conserva esa alusión abierta sin sobreinterpretarla.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
translation_notes:
  revision_awareness: Se tomó en cuenta la última revisión del POB en inglés, que ajustó עִזּוּז de 'mighty warrior' a 'mighty one'. Por eso el español evita 'guerrero' y usa 'poderoso', más cercano al valor léxico sin añadir interpretación. También se preservó la nota sobre כַּפִּשְׁתָּה como 'lino' con una alternativa explicativa en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el contexto lo requiera; este versículo no lo contiene explícitamente, por lo que no aparece aquí.
  - '''Ejército'' mantiene el campo militar de חַיִל sin recurrir a ''hueste'', que sería menos transparente.'
  - '''Poderoso'' sigue la revisión inglesa que descartó ''warrior''; evita una lectura demasiado específica.'
  - La imagen final combina apagarse/extinguirse para reflejar la doble metáfora del fuego sin forzar sinonimia exacta.
