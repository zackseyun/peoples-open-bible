    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Zabulón»; en este contexto censal, la expresión se refiere a los descendientes tribales de Zabulón.'
    reason: lexical_alternative
  revision_rationale: 'Se realiza una reparación menor para mejorar la fidelidad onomástica y la claridad en español: «sareditas» se cambia a «sereditas», que deriva de forma más transparente de «Sered» y evita una forma opaca para el lector. Se conserva el resto de la estructura porque refleja bien el hebreo y el rastro auditado del POB. También se normaliza la razón de la nota b como aclaración léxica/contextual, no teológica.'
