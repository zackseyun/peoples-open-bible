    reason: cultural_note
  revision_rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad: «abatió» refleja mejor la acción militar de וַיַּךְ con «guarnición»; se eliminó «lo» en la proclama final porque no está en el hebreo y añade precisión innecesaria; y «por todo el territorio» aclara que הָאָרֶץ aquí es la tierra/territorio, no el mundo entero.'
