translation:
  language: es
  text: Y la tribu de Benjamín[a]; el dirigente de los hijos de Benjamín era Abidán, hijo de Gidoní.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el dirigente para los hijos de Benjamín». La preposición hebrea puede entenderse de manera relacional cercana en ambos sentidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַטֶּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - bastón
  - vara
  - rama
  lexicon: HALOT
  rationale: En el contexto de la organización del campamento y del censo en Números, מַטֶּה designa una unidad tribal, no un objeto literal. «Tribu» conserva el sentido administrativo y genealógico del hebreo y coincide con la decisión auditada en inglés.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - príncipe
  - caudillo
  lexicon: HALOT
  rationale: El término hebreo señala al representante principal de la tribu. «Jefe» comunica bien la función de autoridad sin cargar con connotaciones monárquicas que «príncipe» podría sugerir en español.
- source_word: לִבְנֵי בִנְיָמִן
  english_pob_choice: of the sons of Benjamin
  chosen_spanish: de los hijos de Benjamín
  alternatives_spanish:
  - para los hijos de Benjamín
  - de la gente de Benjamín
  lexicon: HALOT
  rationale: La preposición ל expresa relación con el grupo tribal. «De los hijos de Benjamín» mantiene la fórmula hebrea de parentesco y es natural en español bíblico contemporáneo.
- source_word: אֲבִידָן
  english_pob_choice: Abidan
  chosen_spanish: Abidán
  alternatives_spanish:
  - Abidán
  lexicon: nombre propio
  rationale: Se translitera el nombre propio con acento ortográfico español para lectura fluida en español.
- source_word: בֶּן גִּדְעֹנִי
  english_pob_choice: son of Gideoni
  chosen_spanish: hijo de Gidoní
  alternatives_spanish:
  - hijo de Gideoní
  - descendiente de Gidoní
  lexicon: patronímico hebreo
  rationale: La construcción patronímica se vierte de forma directa como «hijo de». «Gidoní» reproduce el nombre hebreo con adaptación española transparente y evita sobrerregularizarlo a un equivalente no atestiguado.
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente en inglés no introdujo cambios; se mantiene la lectura estable del versículo con acuerdo alto entre controles de calidad.
  spanish_consistency_notes:
  - Se mantiene «Benjamín» como nombre tribal/personal estándar en español.
  - Se conserva la enumeración breve del hebreo con punto y coma para reflejar la estructura del verso.
  - No se usa «Señor» ni terminología cristiana no presente en el hebreo.
  - La nota textual/lexical se limita a la ambigüedad de לִבְנֵי בִנְיָמִן, siguiendo el aparato inglés.
