translation:
  language: es
  text: Es bueno dar gracias a Yahvé[a] y cantar alabanzas a tu nombre, oh Altísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». Se conserva el nombre divino en el texto principal conforme a la norma del proyecto para יהוה.'
    reason: lexical_choice
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: It is good
  chosen_spanish: Bueno es
  alternatives_spanish:
  - Es bueno
  - Es conveniente
  - Es agradable
  lexicon: HALOT
  rationale: El hebreo usa un predicado adjetival con valor impersonal. En español, "Bueno es" conserva la evaluación general sin añadir un sujeto explícito innecesario y mantiene el tono sapiencial y litúrgico del versículo.
- source_word: לְהוֹדוֹת
  english_pob_choice: to give thanks
  chosen_spanish: dar gracias
  alternatives_spanish:
  - agradecer
  - alabar
  - confesar
  lexicon: HALOT
  rationale: En este contexto de adoración, ידה en piel expresa agradecimiento/presentación de gratitud. "Dar gracias" preserva bien ese matiz y distingue este acto de la alabanza musical del segundo hemistiquio.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: Se sigue la política del proyecto de traducir יהוה como "Yahvé" en el texto principal. La preposición se ajusta naturalmente en español como "a Yahvé" para expresar el destinatario de la acción verbal.
- source_word: וּלְזַמֵּר
  english_pob_choice: to sing praise
  chosen_spanish: cantar alabanzas
  alternatives_spanish:
  - cantar salmos
  - hacer música
  - entonar alabanzas
  lexicon: HALOT
  rationale: זמר en piel apunta a cantar con intención de alabanza. "Cantar alabanzas" comunica con claridad la acción musical devocional sin sobreespecificar un género o instrumento.
- source_word: לְשִׁמְךָ
  english_pob_choice: to your name
  chosen_spanish: a tu nombre
  alternatives_spanish:
  - para tu nombre
  - ante tu nombre
  - a tu fama
  lexicon: HALOT
  rationale: Se conserva el giro bíblico "tu nombre", importante por su carga de identidad y reputación en la adoración. En español, "a tu nombre" reproduce de forma natural la dirección del acto de alabanza.
- source_word: עֶלְיוֹן
  english_pob_choice: O Most High
  chosen_spanish: oh Altísimo
  alternatives_spanish:
  - Altísimo
  - oh Supremo
  - oh Excelso
  lexicon: HALOT
  rationale: El título divino se expresa con el vocativo español natural "oh Altísimo", que mantiene la elevación y el llamamiento directo del hebreo. "Altísimo" en mayúscula funciona bien como apelativo de Dios.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Según la terminología del proyecto, se preserva el nombre del pacto como "Yahvé" en vez de ocultarlo tras un sustituto reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Addressing the divine title עֶלְיוֹן
  english_pob_reading: O Most High
  chosen_spanish_reading: oh Altísimo
  alternative_spanish_readings:
  - Altísimo
  - oh Excelso
  rationale: El contexto muestra vocativo en la segunda colon. Se mantiene la apelación directa para que el lector perciba el carácter de invocación litúrgica, no solo un título descriptivo.
  doctrine_reference: Uso contextual del vocativo en títulos divinos
- issue: Distinction between thanksgiving and praise
  english_pob_reading: to give thanks / to sing praise
  chosen_spanish_reading: dar gracias / cantar alabanzas
  alternative_spanish_readings:
  - agradecer / alabar
  - dar gracias / hacer música
  rationale: 'El hebreo distingue dos actos: agradecimiento verbal y alabanza cantada. La traducción conserva esa diferenciación sin fusionarla en una sola idea general de adoración.'
  doctrine_reference: Distinción semántica de ידה y זמר en contexto cultual
translation_notes:
  revision_awareness: Coincide con el último pase de revisión, que no introdujo cambios y mantiene alta concordancia con el original hebreo y el auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» de acuerdo con la política del proyecto.
  - Se preserva la distinción entre dar gracias y cantar alabanzas, correspondiente a los dos verbos hebreos.
  - El vocativo «oh Altísimo» conserva el tono de apelación directa del hebreo.
  - El registro es bíblico y contemporáneo, sin depender de formulaciones eclesiásticas tradicionales como sustituto del nombre divino.
