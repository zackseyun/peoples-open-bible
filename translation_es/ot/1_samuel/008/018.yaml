translation:
  language: es
  text: Y en aquel día ustedes clamarán a causa del rey que eligieron para sí, pero Yahvé no les responderá en aquel día.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּזְעַקְתֶּם
  english_pob_choice: you will cry out
  chosen_spanish: clamarán
  alternatives_spanish:
  - gritarán
  - clamarán pidiendo auxilio
  - darán voces
  lexicon: HALOT
  rationale: זעק expresa un clamor de angustia o de auxilio. En español, «clamarán» conserva el tono intenso y solemne sin añadir explícitamente «ayuda», que el hebreo no formula de manera directa.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La fórmula profética se conserva con un giro natural en español. «En aquel día» mantiene la solemnidad y la deixis remota del hebreo.
- source_word: מִלִּפְנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - delante de
  lexicon: HALOT
  rationale: Aunque literalmente significa «de delante de / de la presencia de», en este contexto expresa la razón del clamor. «A causa de» comunica esa relación causal sin perder el matiz de consecuencia opresiva.
- source_word: מַלְכְּכֶם
  english_pob_choice: your king
  chosen_spanish: su rey
  alternatives_spanish:
  - su monarca
  - vuestro rey
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, el plural de tratamiento puede variar según registro. «Su rey» evita un voseo/tuteo regional y mantiene el sentido posesivo del hebreo en un registro público y amplio.
- source_word: אֲשֶׁר בְּחַרְתֶּם לָכֶם
  english_pob_choice: whom you have chosen for yourselves
  chosen_spanish: a quien ustedes habrán elegido para sí
  alternatives_spanish:
  - a quien ustedes han elegido para sí
  - a quien eligieron para ustedes mismos
  - que ustedes eligieron para sí
  lexicon: HALOT
  rationale: El relativo enfatiza la responsabilidad propia de Israel. Se conserva «para sí» para reflejar לָכֶם con matiz reflexivo. El futuro perfecto en español reproduce el valor de acción cumplida con consecuencia presente que el inglés POB expresó con presente perfecto.
- source_word: וְלֹא יַעֲנֶה
  english_pob_choice: but ... will not answer
  chosen_spanish: pero ... no les responderá
  alternatives_spanish:
  - y ... no les responderá
  - pero ... no responderá
  - sin embargo ... no les responderá
  lexicon: HALOT
  rationale: El contraste entre el clamor humano y la negativa divina es adversativo; «pero» refleja mejor ese giro que «y». «Responderá» es el equivalente natural de ענה en este contexto relacional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La norma del proyecto para el Tetragrámaton en español es «Yahvé». Mantiene el nombre propio divino sin sustituirlo por un título genérico.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - los
  - a ustedes
  lexicon: HALOT
  rationale: Con «responder» en español, el complemento indirecto natural es «les». Aunque el hebreo es un objeto directo morfológico, el sentido idiomático en español exige dativo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre personal del Dios del pacto, según la norma del proyecto para el Tetragrámaton. No se sustituye por un título encubierto como «el SEÑOR» porque el texto fuente lo escribe explícitamente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza del contraste final
  english_pob_reading: but Yahweh will not answer you in that day
  chosen_spanish_reading: pero Yahvé no les responderá en aquel día
  alternative_spanish_readings:
  - y Yahvé no les responderá en aquel día
  - pero Yahvé no responderá a ustedes en aquel día
  rationale: El hebreo presenta una oposición entre el clamor de Israel y la falta de respuesta divina. «Pero» preserva ese matiz adversativo. Se mantiene la solemnidad temporal de «en aquel día».
  doctrine_reference: Narrative judgment / covenant consequence in 1 Samuel 8
translation_notes:
  revision_awareness: This draft aligns with the English audit trail’s optimal-equivalence choices while adjusting Spanish grammar and project terminology for the divine name. No textual or lexical revision notes in the source packet required additional footnotes.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y sobrio, apto para lectura pública.
  - Se evitó «SEÑOR» para יְהוָה conforme a la terminología del proyecto.
  - «A causa de» y «pero» preservan la relación causal y adversativa del hebreo sin añadir interpretación extra.
  - Se eligió «les responderá» por idiomaticidad del español con responder.
