translation:
  language: es
  text: Entonces volvió su rostro hacia la pared y oró a Yahvé, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּסֵּב
  english_pob_choice: Then he turned
  chosen_spanish: Entonces volvió
  alternatives_spanish:
  - Y volvió
  - Se volvió
  lexicon: HALOT
  rationale: El hebreo narra una acción consecutiva en pasado; en español, «entonces» conserva la progresión narrativa de la waw consecutiva, y «volvió» expresa con naturalidad el giro físico indicado por סבב en esta construcción.
- source_word: פָּנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su semblante
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su rostro/cara». En español, «rostro» mantiene la imagen concreta sin sonar tan coloquial como «cara», y preserva el paralelismo con «hacia la pared».
- source_word: אֶל הַקִּיר
  english_pob_choice: to the wall
  chosen_spanish: hacia la pared
  alternatives_spanish:
  - a la pared
  - contra la pared
  lexicon: HALOT
  rationale: אֶל marca dirección hacia algo; «hacia» conserva bien ese matiz direccional. «Pared» es la equivalencia directa de קִיר. Se evita una formulación demasiado rígida o idiomáticamente forzada.
- source_word: וַיִּתְפַּלֵּל
  english_pob_choice: and prayed
  chosen_spanish: y oró
  alternatives_spanish:
  - y oró en oración
  - y le oró
  lexicon: HALOT
  rationale: El hitpael de פלל aquí significa «orar». «Oró» es la forma normal, digna y clara en español bíblico contemporáneo, y conserva el acto de dirigirse a Dios sin añadir matices no presentes en el hebreo.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto, יְהוָה se traduce como «Yahvé» en el texto principal, evitando el ocultamiento del nombre divino. La preposición אֶל se vierte naturalmente con «a» en este contexto de dirección de la oración.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y dijo,
  lexicon: HALOT
  rationale: La fórmula introductoria לֵאמֹר se traduce de manera convencional como «diciendo,» para señalar que continúa la oración en el versículo siguiente. En español bíblico actual suena más natural que repetir «y dijo» antes de un contenido que sigue.
theological_decisions:
- issue: Renderizar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama de forma explícita. Según el estándar del proyecto en español, se usa «Yahvé» en el texto principal para conservar la referencia al nombre propio del pacto y no sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente indicó que no se necesitaban cambios y mantiene alta concordancia con el hebreo; por eso la redacción española sigue de cerca la estructura de la fuente sin añadir elementos interpretativos.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» en concordancia con el estándar del proyecto en español.
  - «Oró» conserva el valor verbal de וַיִּתְפַּלֵּל sin sobretraducir ni insertar contenido del versículo siguiente.
  - La secuencia narrativa queda marcada por «Entonces», manteniendo la progresión del hebreo y la naturalidad en español.
  - «Hacia la pared» conserva la dirección de אֶל sin convertirla en una localización estática.
