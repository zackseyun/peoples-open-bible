lexical_decisions:
- source_word: ἐπιμενῶ
  english_pob_choice: I will stay
  chosen_spanish: me quedaré
  alternatives_spanish:
  - permaneceré
  - me quedaré allí
  - seguiré en ese lugar
  lexicon: BDAG
  rationale: En contexto de planes de viaje, ἐπιμένω expresa permanecer en un lugar por un tiempo. «Me quedaré» comunica esa idea de manera natural en español moderno, sin perder el matiz temporal de una estancia prevista.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ introduce una transición suave con contraste respecto a lo anterior. «Pero» reproduce bien ese giro discursivo en español sin sobrerrepresentarlo.
- source_word: ἐν Ἐφέσῳ
  english_pob_choice: in Ephesus
  chosen_spanish: en Éfeso
  alternatives_spanish:
  - en Ephesus
  lexicon: BDAG
  rationale: La preposición locativa ἐν con dativo exige una ubicación simple. Se conserva el topónimo en su forma castellana habitual «Éfeso» para mayor claridad y legibilidad.
- source_word: ἕως τῆς πεντηκοστῆς
  english_pob_choice: until Pentecost
  chosen_spanish: hasta Pentecostés
  alternatives_spanish:
  - hasta la Fiesta de las Semanas
  - hasta la fiesta de Pentecostés
  lexicon: BDAG
  rationale: ἕως con genitivo indica límite temporal. «Pentecostés» es la denominación establecida y entendible en este contexto del calendario judío-cristiano; mantiene la equivalencia histórica y litúrgica del término.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en alta medida; no se documentan revisiones sustantivas. La versión española sigue la misma lectura de continuidad temporal y la misma decisión léxica principal para πεντηκοστή.
  spanish_consistency_notes:
  - Se evitó el calco «permanecer» como única opción porque «me quedaré» suena más natural en español para un plan de viaje, sin alterar el sentido.
  - Se mantuvo «Pentecostés» en el cuerpo principal por ser el término más asentado; la alternativa «Fiesta de las Semanas» queda en nota para preservar la tensión lexical documentada.
  - La puntuación y el orden siguen una estructura breve y directa acorde con el griego y con el estilo POB.
