  lexicon: HALOT
  rationale: 'El hebreo presenta la cifra en orden ascendente (cinco y cuarenta mil), pero el español estándar expresa la decena antes de la unidad: «cuarenta y cinco mil».'
- source_word: וְשֵׁשׁ מֵאוֹת וַחֲמִשִּׁים
  english_pob_choice: six hundred fifty
  chosen_spanish: seiscientos cincuenta
  alternatives_spanish:
  - seiscientos y cincuenta
  lexicon: HALOT
  rationale: Se expresa la cifra restante en el orden normal del español. «Seiscientos cincuenta» es claro y formal; el sentido numérico coincide con la secuencia hebrea.
