translation:
  language: es
  text: Si presenta una oveja como su ofrenda[a], entonces la presentará delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cordero» como su ofrenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: Introduce una condición dentro de las instrucciones sacrificiales. En español, «si» expresa de manera natural la estructura condicional del hebreo aquí.
- source_word: כֶּשֶׂב
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  - carnero joven
  lexicon: HALOT
  rationale: El hebreo puede abarcar una oveja en general y, según contexto, también un animal joven. «Oveja» mantiene el valor genérico sin forzar la edad; por eso se preserva la alternativa interpretativa en la nota.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: se sobreentiende en la forma verbal
  alternatives_spanish:
  - él
  lexicon: HALOT
  rationale: El pronombre enfático hebreo no necesita aparecer explícitamente en español. La forma verbal basta para transmitir la cláusula condicional/instructiva con naturalidad.
- source_word: מַקְרִיב
  english_pob_choice: is presenting
  chosen_spanish: presentará
  alternatives_spanish:
  - está presentando
  - trae
  - ofrece
  lexicon: HALOT
  rationale: El participio hebreo en contexto legal/instructivo puede funcionar con fuerza prospectiva o habitual. «Presentará» comunica esa instrucción de manera clara y formal en español.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su sacrificio
  - su oblación
  lexicon: HALOT
  rationale: קָרְבָּן es el término general para una ofrenda traída a Dios. «Ofrenda» es la equivalencia más natural y amplia en español; «sacrificio» puede ser más estrecho y cargado, y se evita sin perder el sentido cultual.
- source_word: וְהִקְרִיב
  english_pob_choice: then he shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - y presentará
  - entonces presentará
  - ofrecerá
  lexicon: HALOT
  rationale: El valor consecutivo/instructivo del verbo se integra bien en una forma simple de futuro en español. Se omite el «y» por fluidez, sin perder la secuencia normativa del texto.
- source_word: אֹתוֹ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  lexicon: HALOT
  rationale: Aunque el antecedente es un animal, «ofrenda» es femenino en español y el pronombre concuerda con el referente inmediato ya expresado en la traducción. Así se conserva la referencia al acto de presentarla sin sonar artificial.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» reproduce bien la colocación cultual y resulta idiomática en español bíblico contemporáneo, sin caer en un calco rígido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton. «Yahvé» conserva el nombre propio divino en español y evita la sustitución por un título.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el nombre del pacto. Se mantiene como nombre propio en español para preservar la distinción entre el Tetragrámaton y un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el juicio del audit trail inglés: el versículo es una cláusula condicional legal, כֶּשֶׂב admite una alternativa como «cordero», y no hubo revisiones recientes que alteren la lectura de base.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé», conforme al estándar del proyecto.
  - Se usa «ofrenda» para קָרְבָּן, evitando «sacrificio» por su carga semántica más estrecha.
  - La puntuación conserva la cadencia breve de una instrucción legal/cultual.
  - La nota textual solo cubre la alternativa lexical documentada para כֶּשֶׂב, sin añadir ambigüedades no atestiguadas.
