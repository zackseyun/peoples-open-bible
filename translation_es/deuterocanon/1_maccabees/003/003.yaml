translation:
  language: es
  text: Y engrandeció la gloria de su pueblo[a]; se puso una coraza como un gigante[b], y se ciñó sus armas de guerra; dispuso las batallas[c], cubriendo el campamento con la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «aumentó el honor/renombre de su pueblo». El verbo griego significa literalmente «hizo ancho/ensanchó» y se usa aquí de modo metafórico para el aumento de la gloria.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse más ampliamente como «como un guerrero poderoso» o «como un campeón», aunque el griego dice literalmente «gigante».
    reason: lexical_alternative
  - marker: c
    text: 'También: «organizó las guerras» o «emprendió guerras». La expresión griega puede destacar la disposición ordenada de la acción militar, no solo el hecho de combatir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλάτυνεν
  english_pob_choice: enlarged
  chosen_spanish: engrandeció
  alternatives_spanish:
  - ensanchó
  - aumentó
  - hizo mayor
  lexicon: LSJ
  rationale: El verbo griego usa la imagen de hacer ancho/expandir, pero aquí se aplica metafóricamente a la gloria; 'engrandeció' conserva la idea de incremento con un registro natural y elevado en español bíblico.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - renombre
  lexicon: LSJ
  rationale: δόξα aquí designa la honra o prestigio público del pueblo; 'gloria' mantiene el tono bíblico y la amplitud semántica sin reducirla solo a fama.
- source_word: τῷ λαῷ αὐτοῦ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su nación
  - su gente
  lexicon: LSJ
  rationale: λαός se refiere al colectivo nacional; 'su pueblo' es la correspondencia más directa y conserva el vínculo comunitario del texto.
- source_word: ἐνεδύσατο θώρακα
  english_pob_choice: put on a breastplate
  chosen_spanish: se vistió una coraza
  alternatives_spanish:
  - se puso una coraza
  - se ciñó una coraza
  - se vistió de una coraza
  lexicon: LSJ
  rationale: θώραξ es una pieza concreta de protección del torso; 'coraza' es el término más preciso en español. 'Se vistió' refleja bien el verbo compuesto de ponerse una prenda/armadura.
- source_word: ὡς γίγας
  english_pob_choice: like a giant
  chosen_spanish: como un gigante
  alternatives_spanish:
  - como un guerrero formidable
  - como un campeón
  lexicon: LSJ
  rationale: Se mantiene la literalidad de γίγας como 'gigante', porque esa es la lectura del texto griego y el POB inglés la conservó, aunque el contexto pueda evocar un guerrero poderoso.
- source_word: συνεζώσατο
  english_pob_choice: strapped on
  chosen_spanish: se ciñó
  alternatives_spanish:
  - se ajustó
  - se ató
  - se aprestó
  lexicon: LSJ
  rationale: El verbo expresa ceñirse o atarse el equipo de guerra; 'se ciñó' es idiomático en español y conserva el gesto de prepararse para la batalla.
- source_word: τὰ σκεύη τὰ πολεμικὰ αὐτοῦ
  english_pob_choice: his weapons of war
  chosen_spanish: sus pertrechos de guerra
  alternatives_spanish:
  - sus armas de guerra
  - su equipo militar
  - sus instrumentos de guerra
  lexicon: LSJ
  rationale: σκεύη es 'utensilios/equipo'; con πολεμικά apunta al equipo militar. 'Pertenchos de guerra' preserva el sentido de conjunto de equipo sin limitarlo solo a armas individuales.
- source_word: πολέμους συνεστήσατο
  english_pob_choice: he set battles in order
  chosen_spanish: dispuso las batallas
  alternatives_spanish:
  - organizó las guerras
  - ordenó las batallas
  - emprendió guerras
  lexicon: LSJ
  rationale: συνίστημι aquí puede implicar organizar, preparar o disponer campañas. 'Dispuso las batallas' mantiene la idea de arreglo estratégico y evita estrechar el sentido solo a 'pelear'.
- source_word: σκεπάζων τὴν παρεμβολὴν
  english_pob_choice: shielding the camp
  chosen_spanish: cubriendo el campamento
  alternatives_spanish:
  - protegiendo el campamento
  - amparando el campamento
  lexicon: LSJ
  rationale: παρεμβολή es el campamento/encampment; 'cubriendo' refleja el participio προστακτικό de protección, y enlaza con el final instrumental de la frase.
- source_word: ἐν ῥομφαίᾳ
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - con su espada
  lexicon: LSJ
  rationale: ῥομφαία es una espada grande; en español 'espada' es natural y suficiente aquí. Se conserva el sentido instrumental de ἐν sin añadir detalles innecesarios.
translation_notes:
  revision_awareness: El texto griego y la base inglesa concuerdan de forma alta; se conservó la literalidad clave de la comparación con «gigante», la secuencia de equipo militar y la cláusula final sobre cubrir el campamento con la espada. Se ajustó el español para fluidez natural sin perder el valor metafórico de ἐπλάτυνεν ni el matiz organizativo de συνεστήσατο.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «gloria» para δόξα por su amplitud bíblica y porque el contexto nacional admite honra/renombre sin estrechar el término.
  - Se usó «coraza» y «espada» por precisión léxica; «pertrechos de guerra» evita reducir σκεύη πολεμικά solo a armas individuales.
