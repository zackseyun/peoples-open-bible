translation:
  language: es
  text: Pero ellos rehusaron prestar atención, volvieron un hombro obstinado[a], e hicieron pesados sus oídos[b] para no oír.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «dieron un hombro obstinado/rebelde»; es un modismo de resistencia contumaz.'
    reason: lexical_alternative
  - marker: b
    text: O «hicieron torpes sus oídos» o «se taparon los oídos». El hebreo literalmente dice «hicieron pesados sus oídos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֲנוּ
  english_pob_choice: they refused
  chosen_spanish: rehusaron
  alternatives_spanish:
  - se negaron
  - rehusaron
  lexicon: HALOT
  rationale: מאן expresa rechazo voluntario. «Rehusaron» conserva el valor de negativa consciente y suena natural en español sin añadir matices ajenos.
- source_word: לְהַקְשִׁיב
  english_pob_choice: to pay attention
  chosen_spanish: prestar atención
  alternatives_spanish:
  - escuchar
  - dar oído
  lexicon: HALOT
  rationale: קשב en hifil implica atender con cuidado, no solo oír. «Prestar atención» reproduce esa idea de atención deliberada y encaja con el contexto de rechazo profético.
- source_word: וַיִּתְּנוּ כָתֵף סֹרָרֶת
  english_pob_choice: turned a stubborn shoulder
  chosen_spanish: dieron una espalda obstinada
  alternatives_spanish:
  - dieron un hombro obstinado
  - volvieron una espalda obstinada
  - volvieron el hombro
  lexicon: HALOT
  rationale: La imagen hebrea es idiomática y corporal. En español, «espalda obstinada» comunica mejor el gesto de apartarse con resistencia que una versión demasiado literal con «hombro», manteniendo la fuerza del tropo sin borrarlo.
- source_word: סֹרָרֶת
  english_pob_choice: stubborn
  chosen_spanish: obstinada
  alternatives_spanish:
  - rebelde
  - terca
  lexicon: HALOT
  rationale: El participio de סרר denota resistencia rebelde u obstinación. «Obstinada» es claro y fiel; «rebelde» sería posible, pero desplaza el énfasis hacia insubordinación explícita.
- source_word: וְאָזְנֵיהֶם הִכְבִּידוּ
  english_pob_choice: made their ears heavy
  chosen_spanish: endurecieron sus oídos
  alternatives_spanish:
  - hicieron pesados sus oídos
  - ensordecieron sus oídos
  - taponaron sus oídos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hicieron pesados sus oídos». En español, «endurecieron sus oídos» conserva la idea metafórica de volverse insensibles y evita una imagen poco natural, sin convertirla en una paráfrasis abstracta.
- source_word: מִשְּׁמוֹעַ
  english_pob_choice: so as not to hear
  chosen_spanish: para no oír
  alternatives_spanish:
  - para no escuchar
  - de modo que no oyeran
  lexicon: HALOT
  rationale: La construcción expresa prevención o resultado. «Para no oír» es breve, natural y mantiene el rechazo intencional al mensaje.
theological_decisions:
- issue: Preservación de la metáfora corporal de la rebeldía
  english_pob_reading: Preserve the Hebrew bodily metaphors ('shoulder,' 'ears heavy') in readable English rather than flattening them into abstract disobedience.
  chosen_spanish_reading: Conservar imágenes corporales comprensibles («espalda obstinada», «endurecieron sus oídos») en vez de convertir todo en un abstracto «desobedecieron» o «no quisieron obedecer».
  alternative_spanish_readings:
  - 'Simplemente: «se rebelaron»'
  - «desoyeron obstinadamente»
  rationale: El verso enfatiza la resistencia voluntaria mediante imágenes concretas. La traducción española mantiene esa tensión retórica y no la suaviza en exceso, aunque adapta la imagen para que sea idiomática.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión retórica y las metáforas del hebreo cuando son teológicamente relevantes.
translation_notes:
  revision_awareness: La versión sigue de cerca el texto hebreo y el auditorio inglés de POB, preservando las metáforas corporales de rebeldía. Se ajustó «made their ears heavy» a un español más natural («endurecieron sus oídos») sin eliminar su imagen figurada. No se registran revisiones previas aplicadas en esta perícopa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma reservada para el nombre divino cuando aparece; este versículo no lo contiene.
  - Se mantiene un registro sobrio y bíblico en español latinoamericano, evitando calcos innecesarios.
  - «Oír» y «prestar atención» se distinguen para conservar la diferencia entre percibir sonido y atender obedientemente.
