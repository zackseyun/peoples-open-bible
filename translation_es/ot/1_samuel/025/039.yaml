translation:
  language: es
  text: 'Cuando David oyó que Nabal había muerto, dijo: «Bendito sea Yahvé[a], que ha pleiteado la causa de mi oprobio[b] de mano de Nabal, y ha apartado a su esclavo[c] del mal. Yahvé ha hecho volver la maldad de Nabal sobre su propia cabeza[d]». Entonces David envió mensajeros y habló con Abigail, para tomarla por esposa[e].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Alabado sea Yahvé». La fórmula hebrea es una bendición performativa, no solo una afirmación descriptiva.
    reason: lexical_alternative
  - marker: b
    text: 'O «de mi afrenta» o «de mi deshonra». El hebreo usa lenguaje jurídico de contienda: «ha pleiteado la causa de mi oprobio».'
    reason: lexical_alternative
  - marker: c
    text: O «siervo». Aquí se conserva «esclavo» porque el hebreo usa el lenguaje de subordinación que el POB inglés procura mantener con fuerza léxica; también puede entenderse «ha contenido a su esclavo de hacer mal».
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «ha hecho volver la maldad de Nabal sobre su cabeza», un modismo de retribución en el que el mal recae sobre el propio malhechor.'
    reason: cultural_note
  - marker: e
    text: O «para casarse con ella». La expresión hebrea significa tomarla como esposa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּר֣וּךְ יְהוָה
  english_pob_choice: Blessed be Yahweh
  chosen_spanish: Bendito sea Yahvé
  alternatives_spanish:
  - Alabado sea Yahvé
  - Bendito es Yahvé
  lexicon: HALOT
  rationale: La fórmula hebrea es una bendición/doxología performativa. «Bendito sea» conserva mejor ese valor exhortativo o declarativo que una simple afirmación estática. Se mantiene «Yahvé» conforme al criterio doctrinal del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se translitera el Nombre divino como «Yahvé», siguiendo el estándar del proyecto y evitando la sustitución por un título.
- source_word: רָב אֶת רִיב חֶרְפָּתִי
  english_pob_choice: has pleaded the case of my reproach
  chosen_spanish: ha pleiteado la causa de mi oprobio
  alternatives_spanish:
  - ha defendido la causa de mi afrenta
  - ha litigado por el caso de mi vergüenza
  lexicon: HALOT
  rationale: El hebreo usa lenguaje forense de contienda legal. «Pleiteado la causa» conserva el campo jurídico. «Oprobio» retiene el sentido de afrenta/deshonra con un registro digno y bíblico en español.
- source_word: מִיַּד נָבָל
  english_pob_choice: from the hand of Nabal
  chosen_spanish: de mano de Nabal
  alternatives_spanish:
  - de parte de Nabal
  - de la mano de Nabal
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo, natural en español bíblico, para mantener la idea de agencia o procedencia.
- source_word: וְאֶת עַבְדּוֹ חָשַׂךְ מֵרָעָה
  english_pob_choice: and has kept his servant back from evil
  chosen_spanish: y ha guardado a su esclavo del mal
  alternatives_spanish:
  - y ha retenido a su siervo del mal
  - y ha mantenido a su esclavo apartado del mal
  lexicon: HALOT
  rationale: «חָשַׂךְ» implica contener o mantener apartado. Se conserva «esclavo» para reflejar la fuerza léxica que el POB inglés documenta para דָּוִד en primera persona humilde ante Dios. «Del mal» mantiene la evaluación moral, no solo la idea de daño físico.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - el daño
  - la maldad
  lexicon: HALOT
  rationale: Aquí la acción evitada por Dios es moralmente mala; «el mal» preserva esa fuerza ética sin reducirla a mera lesión.
- source_word: וְאֵת רָעַת נָבָל הֵשִׁיב יְהוָה בְּרֹאשׁוֹ
  english_pob_choice: The LORD has returned Nabal’s evil on his own head
  chosen_spanish: Yahvé ha vuelto la maldad de Nabal sobre su propia cabeza
  alternatives_spanish:
  - Yahvé ha recompensado a Nabal con su maldad sobre su cabeza
  - Yahvé ha hecho recaer la maldad de Nabal sobre su cabeza
  lexicon: HALOT
  rationale: Se conserva la imagen de retribución idiomática «sobre su propia cabeza». «Maldad» explicita el carácter moral del sustantivo en este contexto, sin perder el eco de retribución.
- source_word: וַיִּשְׁלַח דָּוִד וַיְדַבֵּר בַּאֲבִיגַיִל
  english_pob_choice: Then David sent and spoke to Abigail
  chosen_spanish: Entonces David envió y habló a Abigail
  alternatives_spanish:
  - Entonces David envió un mensaje y habló con Abigail
  - Entonces David mandó hablar a Abigail
  lexicon: HALOT
  rationale: Se sigue de cerca la doble secuencia verbal hebrea sin añadir el contenido interpretativo de «proponer». «Habló a Abigail» mantiene la apertura semántica del texto; el contexto matrimonial lo aclara después.
- source_word: לְקַחְתָּהּ לוֹ לְאִשָּׁה
  english_pob_choice: to take her as his wife
  chosen_spanish: para tomarla por esposa
  alternatives_spanish:
  - para tomarla como su esposa
  - para casarse con ella
  lexicon: HALOT
  rationale: La expresión hebrea es la fórmula estándar de matrimonio. «Tomarla por esposa» es natural en español y conserva la literalidad suficiente sin perder claridad.
theological_decisions:
- issue: Recompensa divina y vindicación de David frente a Nabal
  english_pob_reading: The verse states David’s praise that Yahweh has pleaded his cause and returned Nabal’s evil on his own head.
  chosen_spanish_reading: El versículo expresa que David alaba a Yahvé porque ha pleiteado su causa y ha hecho recaer la maldad de Nabal sobre su propia cabeza.
  alternative_spanish_readings:
  - El versículo podría suavizarse para decir solo que Yahvé lo defendió de Nabal.
  - Podría reforzarse más como una ejecución directa e inmediata de juicio sin matiz narrativo.
  rationale: La traducción conserva la atribución explícita a Yahvé y el lenguaje de retribución, pero sin expandirlo a una afirmación doctrinal más amplia que la escena no formula por sí misma.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Lectura moral de que Dios guardó a David de רָעָה
  english_pob_reading: Rendered as 'kept his servant back from evil' rather than merely 'from harm'.
  chosen_spanish_reading: Se traduce como «ha guardado a su esclavo del mal», preservando el juicio moral sobre la acción evitada.
  alternative_spanish_readings:
  - «ha guardado a su esclavo del daño»
  - «ha retenido a su esclavo de hacer mal»
  rationale: El contexto inmediato implica la venganza planeada por David. «El mal» mantiene la evaluación ética, no solo el resultado perjudicial.
  doctrine_reference: 'Translation philosophy #1 and #6'
- issue: Tratamiento del Nombre divino en una bendición inmediata
  english_pob_reading: Blessed be Yahweh
  chosen_spanish_reading: «Bendito sea Yahvé»
  alternative_spanish_readings:
  - «Bendito es Yahvé»
  - «Alabado sea Yahvé»
  rationale: Se conserva el Nombre propio divino de acuerdo con el criterio del proyecto y la forma bendicional hebrea, sin reemplazarlo por una convención litúrgica de ocultamiento.
  doctrine_reference: Project terminology defaults for יהוה / YHWH
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió closer lexical accuracy en «spoke to Abigail» en lugar de «proposed to Abigail». Por eso el español evita añadir «propuesta» y mantiene «habló a Abigail», dejando que el contexto matrimonial y la cláusula final expliquen la intención.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se preserva el tono forense de ריב con «pleiteado la causa».
  - Se usa «esclavo» según el valor léxico documentado por el POB inglés, no «siervo», salvo nota alternativa.
  - Se conserva la imagen idiomática «sobre su propia cabeza» para la retribución.
  - La cláusula final se traduce de manera sobria para no sobreinterpretar la negociación matrimonial.
