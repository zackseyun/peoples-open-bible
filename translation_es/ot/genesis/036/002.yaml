translation:
  language: es
  text: 'Esaú tomó a sus esposas de entre las hijas de Canaán: Ada, hija de Elon el hitita[a], y Aholibama, hija de Aná, hija de Zibeón el heveo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el heveo». Algunos intérpretes armonizan este pasaje con genealogías relacionadas y entienden la línea de forma distinta, incluso como «el horeo».'
    reason: alternative_reading
lexical_decisions:
- source_word: לָקַח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - casó
  - tomó por esposas
  lexicon: HALOT
  rationale: El hebreo לָקַח se conserva con el valor básico de 'tomó'. En una nota genealógica, 'tomó' comunica el hecho sin añadir interpretación. 'Casó' suaviza demasiado el verbo y 'tomó por esposas' explicita más de lo que exige el texto.
- source_word: נָשָׁיו
  english_pob_choice: his wives
  chosen_spanish: sus mujeres
  alternatives_spanish:
  - sus esposas
  - sus mujeres/esposas
  lexicon: HALOT
  rationale: El contexto demuestra que se trata de esposas, pero el hebreo usa 'mujeres'. En español, 'sus mujeres' preserva la forma más cercana al original; 'sus esposas' sería más interpretativo. Se mantiene la tensión léxica sin perder inteligibilidad.
- source_word: מִבְּנוֹת כְּנָעַן
  english_pob_choice: from the daughters of Canaan
  chosen_spanish: de entre las hijas de Canaán
  alternatives_spanish:
  - de las hijas de Canaán
  - de entre las mujeres de Canaán
  lexicon: HALOT
  rationale: '''Hijas de Canaán'' refleja la fórmula hebrea y la pertenencia al grupo cananeo. ''De entre'' ayuda a expresar el matiz separativo del prefijo מִ sin forzar un giro más explicativo. Se evita reemplazarlo por ''mujeres'' para no diluir el eco bíblico.'
- source_word: בַּת
  english_pob_choice: daughter of
  chosen_spanish: hija de
  alternatives_spanish:
  - la hija de
  lexicon: HALOT
  rationale: La cadena genealógica se reproduce con 'hija de', la forma directa y natural en español para בַּת en construcciones de filiación.
- source_word: הַחִתִּי
  english_pob_choice: the Hittite
  chosen_spanish: el hitita
  alternatives_spanish:
  - el heteo
  lexicon: HALOT
  rationale: '''Hitita'' es el etnónimo estándar en español bíblico moderno y corresponde al hebreo חִתִּי. Se conserva el artículo para reflejar la referencia étnica.'
- source_word: אָהֳלִיבָמָה
  english_pob_choice: Oholibamah
  chosen_spanish: Aholibama
  alternatives_spanish:
  - Oholibama
  lexicon: HALOT
  rationale: Se adopta una transliteración española natural y reconocible. 'Aholibama' evita la grafía inglesa 'Oholibamah' sin perder identificabilidad del nombre propio.
- source_word: הַחִוִּי
  english_pob_choice: the Hivite
  chosen_spanish: el heveo
  alternatives_spanish:
  - el hivita
  lexicon: HALOT
  rationale: El consonántico masorético apunta a חִוִּי, cuyo equivalente habitual en español es 'heveo'. 'Hivita' es posible, pero menos idiomático en español bíblico. Se conserva la lectura del texto recibido y no se armoniza silenciosamente con otras genealogías.
theological_decisions:
- issue: Tensión genealógica en la última cláusula (heveo vs. otras genealogías cercanas)
  english_pob_reading: 'Follow the Masoretic Text: ''the Hivite.'' Preserve the alternative issue in a footnote rather than harmonizing.'
  chosen_spanish_reading: Se sigue el texto masorético con 'el heveo' y se señala en nota la posibilidad alternativa propuesta por algunos intérpretes.
  alternative_spanish_readings:
  - el horeo
  - el hivita
  rationale: No es una cuestión doctrinal, pero sí una tensión textual/genealógica real. La traducción española debe reflejar el hebreo recibido y, al mismo tiempo, preservar la alternativa documentada sin resolverla por armonización implícita.
  doctrine_reference: Translation philosophy §1 (primacía de la fuente) y §3 (preservar tensiones sin ocultarlas)
translation_notes:
  revision_awareness: Se revisó el equivalente del etnónimo final para que la nota no dependa de una transliteración inglesa; se optó por una nota explícita que preserve la tensión genealógica indicada en el audit trail inglés. La redacción principal sigue fielmente el texto hebreo y mantiene un registro natural en español.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evitó 'casó' o 'esposas' en el verbo principal para no suavizar la forma verbal hebrea.
  - Se mantuvo una cadena genealógica uniforme con 'hija de' en ambas relaciones filiatorias.
  - Se prefirió 'heveo' como etnónimo español corriente, coherente con el texto masorético y legible para audiencia eclesial amplia.
