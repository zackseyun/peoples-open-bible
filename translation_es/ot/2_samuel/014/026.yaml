revisions:
- from: 'Cada vez que se cortaba el cabello de su cabeza—al fin de cada año lo cortaba, porque le pesaba—cuando lo cortaba, pesaba el cabello de su cabeza: doscientos siclos según la piedra del rey[a].'
  to: 'Cada vez que se cortaba el cabello—al final de cada año lo cortaba, porque le pesaba—cuando lo cortaba, pesaba el cabello de su cabeza: doscientos siclos según la piedra del rey[a].'
  rationale: Se ajustó la primera cláusula para evitar la formulación más pesada 'el cabello de su cabeza' en la apertura, ya que el hebreo permite una expresión española más natural sin pérdida de sentido; se cambió 'al fin' por 'al final' por mayor naturalidad contemporánea. Se conservó la nota sobre 'la piedra del rey' porque preserva una referencia cultural importante del hebreo אֶבֶן.
