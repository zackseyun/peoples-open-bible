  lexicon: BDAG
  rationale: 메시아의 결정적 순종 행위. 단수 δικαίωμα를 「행위」로 명시.
- source_word: δικαίωσιν ζωῆς
  english_pob_choice: justification that brings life
  chosen_korean: 생명을 가져오는 의롭다 하심
  alternatives_korean:
