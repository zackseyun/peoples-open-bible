translation:
  language: es
  text: Así Dios creó al hombre[a] a su imagen; a imagen de Dios lo creó; varón y hembra los creó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «la humanidad»: el hebreo adam aquí es singular y representativo, y se refiere a la humanidad como un todo.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבְרָא / בָּרָא
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - hizo
  - formó
  lexicon: HALOT
  rationale: El verbo ברא en Génesis conserva el acto divino de crear. «Creó» mantiene la repetición triplemente marcada del versículo y el registro elevado sin debilitar el sentido.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים lleva verbo singular y designa al Dios único de Israel. «Dios» es la traducción natural en español y conserva la referencia singular.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  lexicon: HALOT
  rationale: El hebreo usa el singular הָאָדָם con valor representativo de la humanidad, no solo de un varón individual. «El hombre» preserva esa forma singular y la tensión literaria al pasar luego al plural «los».
- source_word: בְּצַלְמוֹ
  english_pob_choice: in his image
  chosen_spanish: a su imagen
  alternatives_spanish:
  - en su imagen
  lexicon: HALOT
  rationale: La preposición ב con צלם y sufijo 3ms se expresa de forma natural en español como «a su imagen»; mantiene la relación referida a Dios sin sonar forzada. Se conserva «imagen» para צלם.
- source_word: בְּצֶלֶם אֱלֹהִים
  english_pob_choice: in the image of God
  chosen_spanish: a imagen de Dios
  alternatives_spanish:
  - en la imagen de Dios
  lexicon: HALOT
  rationale: La frase repite y amplía la anterior. «A imagen de Dios» conserva el paralelismo hebreo con una construcción idiomática clara en español.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  lexicon: HALOT
  rationale: El pronombre masculino singular retoma a הָאָדָם como referente representativo. En español, «lo» mantiene la concordancia objetiva y la singularidad del referente.
- source_word: זָכָר וּנְקֵבָה
  english_pob_choice: male and female
  chosen_spanish: varón y hembra
  alternatives_spanish:
  - macho y hembra
  - mujer y hombre
  lexicon: HALOT
  rationale: Los términos hebreos son descriptores sexuales biológicos. «Varón y hembra» preserva esa precisión mejor que una pareja relacional como «hombre y mujer».
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - las
  lexicon: HALOT
  rationale: El plural hebreo marca el paso de la humanidad singular representativa a la pluralidad de los sexos. «Los» permite concordar con «varón y hembra» y conserva el cambio a plural.
theological_decisions:
- issue: Representación de אָדָם como singular representativo
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  rationale: 'La lectura del texto es que הָאָדָם funciona como singular representativo: un solo sujeto gramatical que a la vez incluye a la humanidad entera, confirmado por el plural final. «El hombre» mantiene la forma singular y no aplana la tensión del versículo.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table for אָדָם'
- issue: Mantenimiento del contraste singular/plural en el cierre del versículo
  english_pob_reading: he created them
  chosen_spanish_reading: los creó
  alternative_spanish_readings:
  - las creó
  - los y las creó
  rationale: El hebreo pasa deliberadamente del singular «lo» al plural «los». «Los creó» conserva ese movimiento sin introducir una expansión no presente en el texto.
  doctrine_reference: Genesis 1:27 source structure; POB audit trail for אֹתָם
translation_notes:
  revision_awareness: Se siguió el pasaje base y el audit trail inglés sin cambios sustanciales; la revisión más reciente indica acuerdo alto y ningún cambio necesario. La versión española conserva el paralelismo de tres cláusulas, el singular representativo de הָאָדָם y el cierre plural de אֹתָם.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים con verbo singular, conforme al valor teológico del pasaje.
  - Se mantuvo «imagen» para צלם en ambas apariciones para conservar paralelismo.
  - Se prefirió «varón y hembra» para reflejar el léxico sexual del hebreo.
  - La nota al pie marca explícitamente la alternativa inclusiva «la humanidad» sin borrar el singular representativo del texto.
