    a great branch." Translating it as "plant" loses the specific imagery of the mustard
    seed growing a large branch that provides shelter. | Azure: The proposed change
    is supported by the Coptic lexeme itself. In Thomas 20 the phrase cited, ϣⲁϥⲧⲉⲩⲟ
    ⲉⲃⲟⲗ ⲛ̄ⲛⲟⲩⲛⲟϭ ⲛ̄ⲧⲁⲣ, contains ⲧⲁⲣ, which in Sahidic means "branch, twig, bough"
    (Crum), not "plant.'
