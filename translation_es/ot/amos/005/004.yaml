translation:
  language: es
  text: 'Porque así dice Yahvé a la casa de Israel: «Búsquenme y vivan[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Búsquenme para que vivan», o «Búsquenme, y vivirán». El hebreo puede entenderse como un mandato urgente con un resultado prometido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa o de fundamento del oráculo. «Porque» preserva bien el valor conectivo de כִּי en español natural y mantiene el tono profético sin sobrecargarlo.
- source_word: כֹה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - de este modo dice
  lexicon: HALOT
  rationale: La fórmula profética fija כֹה אָמַר se expresa con una equivalencia directa y reverente. «Así dice» conserva el registro oracular del original y refleja el valor performativo del presente profético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita; por la política terminológica del proyecto se traslada como «Yahvé», manteniendo el nombre propio del pacto y evitando una sustitución titulada.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: to the house of Israel
  chosen_spanish: a la casa de Israel
  alternatives_spanish:
  - a Israel
  - al pueblo de Israel
  lexicon: HALOT
  rationale: «Casa de Israel» conserva la expresión corporativa y pactal del hebreo. El dativo de destinatario se expresa naturalmente con «a» en español.
- source_word: דִּרְשׁוּנִי
  english_pob_choice: Seek me
  chosen_spanish: Búsquenme
  alternatives_spanish:
  - Búsquenme a mí
  - Busquen mi rostro
  lexicon: HALOT
  rationale: En este contexto profético דָּרַשׁ expresa volver a Yahvé y buscarlo con seriedad, no solo pedir información. «Búsquenme» comunica de manera natural el imperativo plural y la fuerza de la invitación/mandato.
- source_word: וִחְיוּ
  english_pob_choice: and live
  chosen_spanish: y vivan
  alternatives_spanish:
  - y vivirán
  - para que vivan
  lexicon: HALOT
  rationale: El hebreo permite una lectura de mandato urgente con resultado prometido. «Y vivan» conserva la brevedad y la ambigüedad teológica del original sin resolverla de forma excesiva.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La forma hebrea aparece directamente en el versículo. La decisión del proyecto es preservar el nombre divino como nombre propio, no como sustituto reverencial, y en español la forma establecida es «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Fuerza de «Seek me and live»
  english_pob_reading: A direct covenantal summons with life as the promised outcome, rendered without narrowing it to either purely physical survival or purely spiritual life
  chosen_spanish_reading: Un llamado directo del pacto con la vida como resultado prometido, sin reducirlo a mera supervivencia física ni a una vida solo espiritual
  alternative_spanish_readings:
  - Búsquenme para que vivan
  - Búsquenme, y vivirán
  rationale: 'El hebreo admite tanto la lectura imperativa consecutiva como la de resultado. Se mantiene la tensión: la vida es prometida, pero el texto no la especifica exclusivamente en un sentido físico o espiritual.'
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el estado de acuerdo cruzado es alto; por eso el borrador sigue de cerca el análisis aprobado, ajustando solo la formulación al español y a la terminología del proyecto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conservó «casa de Israel» como expresión pactal y corporativa.
  - Se optó por un español claro y reverente, evitando calcos innecesarios.
  - La nota conserva la tensión semántica entre mandato e արդյունado prometido en el hebreo.
