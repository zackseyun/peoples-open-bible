review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el texto griego SBLGNT: «Bienaventurados» para Μακάριοι, «lavan sus vestiduras» para πλύνοντες τὰς στολὰς αὐτῶν, «tengan derecho al árbol de la vida» para ἡ ἐξουσία ... ἐπὶ τὸ ξύλον τῆς ζωῆς, y «entren en la ciudad por las puertas» para τοῖς πυλῶσιν εἰσέλθωσιν εἰς τὴν πόλιν. También preserva correctamente la variante textual importante en nota. La única desalineación clara está en la nota léxica c: el texto principal ya usa «por las puertas», por lo que la alternativa «O: “por las puertas”» no ofrece una alternativa real; debe reflejar la opción documentada «a través de las puertas» o equivalente.'
  spanish_quality_summary: El español es natural, claro y de registro digno. «Vestiduras» funciona bien en Apocalipsis, y la sintaxis es fluida. El texto principal no necesita cambios. Solo hace falta reparar la nota c para evitar una nota vacía o redundante.
  glossary_alignment: No hay conflictos con la terminología por defecto del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. Las decisiones clave («Bienaventurados», «vestiduras», «derecho») concuerdan con la justificación léxica documentada.
  issues:
  - severity: medium
    issue: La nota al pie c repite el mismo texto que ya está en el cuerpo principal.
    rationale: 'El inglés auditado conserva una alternativa léxica real: «Or ‘through the gates.’» En español, si el texto principal dice «por las puertas», la nota debe dar una alternativa distinta, p. ej. «a través de las puertas», no repetir «por las puertas».'
  revised_spanish_text: Bienaventurados los que lavan sus vestiduras[a][b], para que tengan derecho al árbol de la vida y entren en la ciudad por las puertas[c].
  revised_footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «Bienaventurados los que hacen sus mandamientos» o «los que guardan sus mandamientos», en vez de «los que lavan sus vestiduras».'
    reason: textual_variant
  - marker: b
    text: La imagen de lavar las vestiduras recuerda Apocalipsis 7:14, donde las vestiduras son lavadas y emblanquecidas en la sangre del Cordero.
    reason: cross_reference
  - marker: c
    text: 'O: «a través de las puertas».'
    reason: lexical_alternative
  revision_rationale: El texto principal es fiel y natural. Solo se corrige la nota c para que preserve una alternativa léxica auténtica conforme al expediente inglés y no repita innecesariamente la misma formulación del texto principal.
