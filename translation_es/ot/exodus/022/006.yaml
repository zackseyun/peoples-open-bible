    text: 'Hebreo: «plata»; aquí se usa en el sentido de dinero.'
    reason: lexical_alternative
  - marker: b
    text: O «objetos» o «artículos» para «bienes».
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «restituirá dos veces» o «restituirá al doble».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la redacción para reflejar mejor el pasivo hebreo y mejorar la naturalidad jurídica en español. «Y estos son robados» evita el dativo añadido de «le son robados» y mantiene referencia a los bienes entregados. «Si el ladrón es hallado» preserva mejor el valor pasivo de נִמְצָא. La nota c se afina para expresar con más precisión la idea de restitución doble.
