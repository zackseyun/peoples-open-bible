review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia temporal, preserva el modismo del corazón como sujeto, mantiene la causalidad y explicita correctamente la prenda de Saúl desde el contexto inmediato. Sin embargo, «esquina» para כָּנָף en una prenda suena menos natural en español que «borde» o «orilla», y la nota inglesa preserva precisamente esa alternativa. También «remordimiento interior» en la nota a puede estrechar el sentido más que «conciencia inquieta/turbada».
  spanish_quality_summary: El texto es claro y comprensible, pero puede mejorarse en naturalidad y registro bíblico legible. «El corazón de David lo golpeó» funciona como conservación del modismo hebreo, aunque en español es algo duro; la nota lo sostiene. El ajuste principal es reemplazar «esquina del manto» por «borde del manto», que suena más idiomático para una prenda sin perder el matiz de extremidad.
  glossary_alignment: No hay conflicto con la terminología de proyecto. No aparece Yahvé, Mesías, etc. Se preserva «corazón» frente a una paráfrasis por «conciencia», en línea con la justificación léxica de la POB. «Manto» para la prenda de Saúl es aceptable por el contexto.
  issues:
  - severity: medium
    issue: «Esquina» para כָּנָף en contexto de vestidura
    rationale: Aunque literal, en español aplicado a una prenda suena menos natural y menos preciso que «borde», «orilla» o «extremo». La auditoría inglesa opta por «corner» pero añade nota con «edge/hem»; en español conviene un término idiomático en el texto principal.
  - severity: low
    issue: 'Nota a: «remordimiento interior» puede ser demasiado estrecho'
    rationale: El inglés explica el modismo como «a troubled conscience». «Remordimiento interior» comunica parte del sentido, pero «conciencia inquieta» o «conciencia turbada» corresponde mejor al matiz sin reducirlo solo a remordimiento.
  revised_spanish_text: Después de esto, el corazón de David lo golpeó[a] porque había cortado el borde[b] del manto de Saúl.
