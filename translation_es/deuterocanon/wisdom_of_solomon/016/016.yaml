translation:
  language: es
  text: Porque los impíos rehusaron conocerte, fueron azotados por la fuerza de tu brazo, perseguidos por lluvias inusuales[a] y granizo y tormentas[b] implacables, y consumidos por fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lluvias extrañas»; el griego habla literalmente de lluvias «ajenas/extrañas», enfatizando precipitaciones extraordinarias enviadas como juicio.
    reason: lexical_alternative
  - marker: b
    text: O «tormentas ineludibles»; el adjetivo sugiere algo que no puede apartarse ni rechazarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρνούμενοι
  english_pob_choice: refused
  chosen_spanish: rehusaron
  alternatives_spanish:
  - negaron
  - rechazaron
  lexicon: BDAG
  rationale: El participio expresa una negativa voluntaria y resistente; «rehusaron» conserva esa fuerza mejor que una simple negación.
- source_word: εἰδέναι
  english_pob_choice: to know
  chosen_spanish: conocerte
  alternatives_spanish:
  - reconocerte
  - admitirte
  lexicon: BDAG
  rationale: El griego dice literalmente «conocer». En español, el pronombre de segunda persona mantiene el contacto directo del texto sin ampliar el sentido más de lo que permite la fuente.
- source_word: ἀσεβεῖς
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los irreverentes
  lexicon: BDAG
  rationale: «Impíos» reproduce mejor el matiz de falta de reverencia hacia Dios que «malvados», que es más amplio y menos teológico.
- source_word: ἐν ἰσχύι βραχίονός σου
  english_pob_choice: by the might of your arm
  chosen_spanish: por la fuerza de tu brazo
  alternatives_spanish:
  - por el poder de tu brazo
  - con la fuerza de tu brazo
  lexicon: LEH
  rationale: La frase es instrumental y bíblicamente imagética; «por la fuerza de tu brazo» conserva ambos sustantivos y suena natural en español.
- source_word: ἐμαστιγώθησαν
  english_pob_choice: were scourged
  chosen_spanish: fueron azotados
  alternatives_spanish:
  - fueron flagelados
  - fueron castigados
  lexicon: BDAG
  rationale: Aunque el verbo puede ser figurado en contexto de juicio, el valor literal de «azotados» mantiene la dureza punitiva sin forzar un registro demasiado técnico.
- source_word: ξένοις ὑετοῖς
  english_pob_choice: unusual rains
  chosen_spanish: lluvias inusuales
  alternatives_spanish:
  - lluvias extrañas
  - lluvias extranjeras
  lexicon: LEH
  rationale: El adjetivo ξένοις puede significar extraño, ajeno o extraordinario. «Inusuales» comunica el carácter extraordinario del castigo sin sonar torpe en español.
- source_word: χαλάζαις
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - granizadas
  lexicon: LEH
  rationale: El sustantivo simple «granizo» es la forma más natural en español para el elemento meteorológico nombrado por el griego.
- source_word: ὄμβροις
  english_pob_choice: storms
  chosen_spanish: tormentas
  alternatives_spanish:
  - aguaceros
  - chaparrones
  lexicon: LEH
  rationale: En coordinación con lluvias y granizo, «tormentas» preserva la fuerza del juicio meteorológico mejor que una referencia solo a lluvia intensa.
- source_word: ἀπαραιτήτοις
  english_pob_choice: relentless
  chosen_spanish: implacables
  alternatives_spanish:
  - inescapables
  - inevitables
  lexicon: LEH
  rationale: El adjetivo describe algo que no puede apartarse ni aplacarse; «implacables» expresa bien esa insistencia irresistible en español.
- source_word: διωκόμενοι
  english_pob_choice: pursued
  chosen_spanish: perseguidos
  alternatives_spanish:
  - acosados
  - empujados
  lexicon: BDAG
  rationale: El participio literalmente es «perseguidos»; se conserva la imagen de una fuerza que los sigue y los alcanza.
- source_word: πυρὶ καταναλισκόμενοι
  english_pob_choice: consumed by fire
  chosen_spanish: consumidos por fuego
  alternatives_spanish:
  - devorados por fuego
  - destruidos por fuego
  lexicon: BDAG
  rationale: La expresión habla de destrucción por fuego. «Consumidos por fuego» es fiel, solemne y mantiene la plenitud del juicio.
theological_decisions:
- issue: Relación entre el rechazo de conocer y la identidad de Dios
  english_pob_reading: Retained 'to know you' in the main text without expanding to 'acknowledge you' or 'recognize you as God'.
  chosen_spanish_reading: Conservé «conocerte» sin añadir «reconocerte como Dios».
  alternative_spanish_readings:
  - reconocerte
  - admitirte como Dios
  rationale: El griego dice simplemente «conocerte». Añadir una explicitación teológica en el texto principal iría más allá del alcance inmediato de la frase; el contexto ya deja clara la referencia a Dios.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza metafórica del castigo
  english_pob_reading: Rendered ἐμαστιγώθησαν as 'were scourged' even though the punishment is executed through weather and fire.
  chosen_spanish_reading: Traduje ἐμαστιγώθησαν como «fueron azotados».
  alternative_spanish_readings:
  - fueron castigados
  - fueron afligidos
  rationale: El versículo mezcla imagen corporal de castigo con juicios naturales. «Azotados» conserva la dureza de la metáfora y no la suaviza.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente del POB inglés: se mantuvo la estructura causal de γάρ, se preservó el lenguaje de juicio activo y se evitó suavizar el castigo. Ajusté el arranque a una sintaxis natural en español mientras conservé todos los elementos del griego.'
  spanish_consistency_notes:
  - Usé «impíos» para ἀσεβεῖς, coherente con el enfoque teológico del pasaje.
  - Mantuve «Yahvé» implícito en el pronombre posesivo «tu», dado que el versículo se dirige directamente a Dios; no se añadió el nombre divino porque el griego usa segunda persona.
  - Conservé el paralelismo de lluvias, granizo, tormentas y fuego sin fusionar imágenes distintas.
  - No usé «Cristo», «SEÑOR» ni «siervo», porque no aparecen en el texto fuente ni en esta línea auditada.
