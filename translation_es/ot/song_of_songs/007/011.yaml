translation:
  language: es
  text: Yo soy de mi amado[a], y su deseo es para mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «Yo soy para mi amado».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo soy
  - Soy
  lexicon: WLC / HALOT
  rationale: Se conserva el pronombre explícito para mantener el énfasis poético del hebreo y la correspondencia directa con el inicio de la frase en inglés y en el texto fuente.
- source_word: לְדוֹדִי
  english_pob_choice: my beloved's
  chosen_spanish: de mi amado
  alternatives_spanish:
  - para mi amado
  - a mi amado
  - mi amado
  lexicon: HALOT
  rationale: La preposición ל en esta cláusula nominal expresa relación/pertenencia más que dirección simple. En español, 'de mi amado' comunica de forma natural la relación posesiva que el POB inglés expresa como 'my beloved's', sin perder la ambigüedad poética de pertenencia relacional.
- source_word: וְעָלַי
  english_pob_choice: for me
  chosen_spanish: en mí
  alternatives_spanish:
  - para mí
  - sobre mí
  - hacia mí
  lexicon: HALOT
  rationale: Con תְּשׁוּקָה, עַל señala el objeto o la orientación del deseo. 'En mí' suena más natural en español poético que 'para mí', y mantiene la idea de que el deseo se dirige hacia la persona hablante sin resolver excesivamente la preposición.
- source_word: תְּשׁוּקָתוֹ
  english_pob_choice: his desire
  chosen_spanish: su deseo
  alternatives_spanish:
  - su anhelo
  - su ansia
  lexicon: HALOT
  rationale: '''Deseo'' es el equivalente directo y más reconocible para תְּשׁוּקָה. Conserva el vínculo léxico con otros pasajes bíblicos donde aparece este término, sin añadir matices interpretativos ajenos al contexto poético.'
theological_decisions:
- issue: Sentido de la cláusula relacional
  english_pob_reading: 'Mutual belonging in romantic covenantal language: ''I am my beloved''s'''
  chosen_spanish_reading: 'Pertenencia relacional en lenguaje amoroso poético: ''Yo soy de mi amado'''
  alternative_spanish_readings:
  - Yo soy para mi amado
  - Yo pertenezco a mi amado
  rationale: El hebreo permite una cláusula nominal con matiz de pertenencia. 'Soy de mi amado' conserva la relación de posesión/belonging sin imponer una formulación demasiado interpretada. Así se preserva la tensión poética sin convertirla en una explicación doctrinal.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto inglés POB se mantiene sin cambios según el informe de revisión más reciente; no se registran revisiones aplicadas, y el acuerdo del revisor fue alto.
  spanish_consistency_notes:
  - Se usó 'amado' para דּוֹד conforme al uso ya documentado por el POB inglés.
  - Se evitó 'SEÑOR' o equivalentes de máscara porque no corresponde a este versículo.
  - Se mantuvo un registro poético y breve, acorde con la forma hebrea.
  - La nota al pie reproduce la alternativa literal más cercana al hebreo para transparentar la tensión entre pertenencia y orientación.
