  text: וַ/יֹּ֣אמֶר אֵלַ֗/י לִֽשְׁכ֨וֹת הַ/צָּפ֜וֹן לִֽשְׁכ֣וֹת הַ/דָּרוֹם֮ אֲשֶׁ֣ר אֶל פְּנֵ֣י הַ/גִּזְרָה֒ הֵ֣נָּה לִֽשְׁכ֣וֹת הַ/קֹּ֗דֶשׁ אֲשֶׁ֨ר יֹאכְלוּ שָׁ֧ם הַ/כֹּהֲנִ֛ים אֲשֶׁר קְרוֹבִ֥ים לַֽ/יהוָ֖ה קָדְשֵׁ֣י הַ/קֳּדָשִׁ֑ים שָׁ֞ם יַנִּ֣יחוּ קָדְשֵׁ֣י הַ/קֳּדָשִׁ֗ים וְ/הַ/מִּנְחָה֙ וְ/הַ/חַטָּ֣את וְ/הָ/אָשָׁ֔ם כִּ֥י הַ/מָּק֖וֹם קָדֹֽשׁ־׀־־׀׃
