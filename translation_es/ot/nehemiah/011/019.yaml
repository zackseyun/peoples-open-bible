translation:
  language: es
  text: 'Y los porteros: Akkub, Talmón y sus hermanos[a], los que vigilaban a las puertas, eran ciento setenta y dos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus parientes»; el hebreo «sus hermanos» puede designar parientes varones cercanos o miembros del mismo grupo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשּׁוֹעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardas de las puertas
  - los guardines de las puertas
  lexicon: HALOT
  rationale: El término designa a quienes estaban asignados al cuidado y control de las puertas. "Porteros" es una equivalencia natural en español bíblico para una función institucional vinculada a puertas, y evita una paráfrasis excesiva.
- source_word: עַקּוּב
  english_pob_choice: Akkub
  chosen_spanish: Akkub
  alternatives_spanish:
  - Acub
  lexicon: nombre propio
  rationale: Es nombre propio; se translitera para conservar la forma del texto fuente y mantener consistencia auditada con la POB inglesa.
- source_word: טַלְמוֹן
  english_pob_choice: Talmon
  chosen_spanish: Talmón
  alternatives_spanish:
  - Talmón
  - Talmon
  lexicon: nombre propio
  rationale: Nombre propio transliterado. Se adapta la acentuación al español para lectura natural sin cambiar la identidad del nombre.
- source_word: וַאֲחֵיהֶם
  english_pob_choice: and their brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus consanguíneos
  lexicon: HALOT
  rationale: Se conserva "hermanos" porque el hebreo usa אָח y el contexto de listas genealógicas puede abarcar miembros del mismo grupo masculino o clan. El español mantiene la tensión semántica sin diluirla.
- source_word: הַשֹּׁמְרִים
  english_pob_choice: who kept watch
  chosen_spanish: los que vigilaban
  alternatives_spanish:
  - los que guardaban
  - los vigilantes
  lexicon: HALOT
  rationale: El participio expresa una acción continua de custodia. "Vigilaban" transmite mejor la función activa y sostenida que una forma más literal pero menos idiomática.
- source_word: בַּשְּׁעָרִים
  english_pob_choice: at the gates
  chosen_spanish: en las puertas
  alternatives_spanish:
  - a las puertas
  - junto a las puertas
  lexicon: HALOT
  rationale: La expresión indica el lugar de servicio. En español, "en las puertas" conserva la ubicación funcional de manera natural y clara.
- source_word: מֵאָה שִׁבְעִים וּשְׁנָיִם
  english_pob_choice: one hundred seventy-two
  chosen_spanish: ciento setenta y dos
  alternatives_spanish:
  - ciento setenta y dos
  lexicon: número cardinal
  rationale: Se sigue el valor cardinal exacto del hebreo con la forma numérica estándar y natural del español.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece anclado en el texto principal junto a «porteros».'
  spanish_consistency_notes:
  - 'Se mantuvo la estructura del hebreo: introducción de los porteros, lista de nombres, grupo asociado, función de vigilancia y total numérico.'
  - Se evitó traducir mecánicamente desde el inglés; la elección "los que vigilaban" refleja mejor el participio hebreo que un simple calco.
  - Se preservó la tensión lexical de "sus hermanos" con nota, como en el audit trail inglés.
