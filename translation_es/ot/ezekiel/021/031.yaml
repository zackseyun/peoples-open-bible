review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: imperativos de remover los emblemas de autoridad, declaración de trastorno del orden presente, e inversión de alto/bajo. También acierta al preservar «Yahvé» en אֲדֹנָי יְהוִה conforme a la política del proyecto. Sin embargo, «y toma la corona» no transmite con suficiente fidelidad וְהָרִים en este contexto, que aquí significa quitar/levantar de encima, no simplemente tomar. Además, las notas al pie no siguen el reparto del rastro inglés: la nota anclada en «turbante» debería explicar el simbolismo turbante/corona, mientras que la elipsis «Esto no permanecerá igual» merece la nota de lectura alternativa.'
  spanish_quality_summary: 'El español es claro, natural y de registro bíblico moderno. «Así dice el Señor Yahvé» y «enaltece al humilde y humilla al encumbrado» son legibles y dignos. El principal problema de calidad es semántico: «toma la corona» suena a agarrarla más que a quitársela. También conviene realinear las notas para evitar que el lector pierda la explicación de la frase elíptica central.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה como «Yahvé», מִצְנֶפֶת como «turbante», עֲטָרָה como «corona». La inversión social/jerárquica está bien expresada. La única desalineación léxica relevante es וְהָרִים, que debe renderizarse como «quita»/«retira»/«levanta de» en vez de «toma».'
  issues:
  - severity: high
    issue: «y toma la corona» no representa adecuadamente וְהָרִים en este contexto.
    rationale: El verbo hiphil de רום con «corona» en este contexto de despojo significa levantarla/quitarla de encima, equivalente a retirarla. «Tomar» en español no comunica necesariamente remoción y puede sonar a apropiación o simple acción manual.
  - severity: medium
    issue: Las notas al pie están asignadas a lugares distintos del audit trail inglés y omiten la principal alternativa de la frase elíptica.
    rationale: El rastro inglés ancla una nota en «turban» para explicar turbante/corona como símbolos de liderazgo, y otra en la frase elíptica «This will not remain the same» para alternativas de traducción. El borrador pone una nota cultural en «turbante», pero la otra nota se dedica a «humilde» en vez de la elipsis, perdiendo una decisión textual importante.
  - severity: low
    issue: La nota sobre «turbante» introduce alternativas («tiara») menos necesarias que la explicación simbólica del par turbante/corona.
    rationale: No es incorrecta, pero la prioridad documental aquí es el valor de los emblemas de autoridad sacerdotal/real, tal como lo preservó la auditoría inglesa.
