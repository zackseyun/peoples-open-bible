review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en gran parte la secuencia del hebreo: observar/investigar, volver con información segura, e iniciar la búsqueda por Judá. Sin embargo, hay un problema importante de número gramatical: el hebreo tiene imperativos plurales durante toda la instrucción inicial, pero el español mezcla singular (''Ve'', ''averigua'') con plural (''vuelvan''). Además, ''de entre todos los escondites'' suena menos natural y menos preciso que ''acerca de todos los escondites'' o ''todos los escondites''; y ''millares'' no sigue la decisión principal del POB inglés, que en el texto base usa el sentido social ''clanes'' y deja ''millares'' en nota.'
  spanish_quality_summary: La redacción es generalmente clara, pero la mezcla singular/plural perjudica la legibilidad y fidelidad. 'Ve, pues' suena dirigido a una sola persona, mientras el contexto y la morfología son plurales. 'Averigua' también queda en singular. 'En la tierra' es posible, pero 'en el país' o 'en la región' sería más idiomático; no obstante, 'la tierra' puede mantenerse por cercanía formal. Conviene también quitar la nota [a], porque la alternativa léxica no añade una ambigüedad necesaria en español.
  glossary_alignment: 'No hay conflictos con terminología doctrinal mayor. El punto léxico principal es בְּכֹל אַלְפֵי יְהוּדָה: para alinearse con el audit trail, el texto español debe preferir ''clanes de Judá'' y conservar ''millares de Judá'' en nota. También debe mantenerse el matiz investigativo de וּדְעוּ con ''averigüen'' o ''infórmense''.'
  issues:
  - severity: high
    issue: Mezcla de singular y plural en los imperativos
    rationale: וּרְאוּ, וּדְעוּ y וְשַׁבְתֶּם son formas plurales. El borrador usa 'Ve' y 'averigua' en singular, pero 'vuelvan' en plural. Esto altera la referencia gramatical del original.
  - severity: medium
    issue: '''de entre todos los escondites'' es poco natural y no refleja bien la decisión auditada'
    rationale: El inglés auditado revisó hacia 'learn about all the hiding places'. En español, 'averigüen acerca de todos los escondites' o 'averigüen todos los escondites' suena más natural que 'de entre'.
  - severity: medium
    issue: '''millares de Judá'' en el texto principal se aparta del texto POB inglés'
    rationale: El POB inglés eligió 'clans of Judah' en el cuerpo del texto y preservó 'thousands' en nota. La revisión española debe seguir esa decisión salvo razón fuerte documentada, que aquí no se justifica suficientemente.
  - severity: low
    issue: La nota [a] es innecesaria en español
    rationale: No preserva una alternativa significativa exigida por la evidencia ni evita una ambigüedad nueva. El verbo 'averigüen' ya comunica adecuadamente el sentido investigativo.
