translation:
  language: es
  text: Entonces su marido se levantó y fue tras ella para hablarle al corazón[a] y hacerla volver[b]. Su joven servidor iba con él, junto con un par de asnos. Ella lo llevó a casa de su padre, y cuando el padre de la joven lo vio, se alegró de salir a su encuentro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión hebrea ‘hablarle al corazón’ es un modismo: hablar con ternura, insistencia o persuasión.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo es textualmente difícil en la frase traducida como ‘hacerla volver’; el contexto muestra que la intención era hacer que la mujer regresara con él.
    reason: textual_variant
lexical_decisions:
- source_word: אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  - su hombre
  lexicon: HALOT
  rationale: En este contexto marital, el hebreo literalmente ‘su hombre’ funciona idiomáticamente como relación conyugal. ‘Marido’ es natural en español y conserva el valor relacional sin perder fidelidad semántica.
- source_word: אַחֲרֶיהָ
  english_pob_choice: after her
  chosen_spanish: tras ella
  alternatives_spanish:
  - detrás de ella
  - después de ella
  lexicon: HALOT
  rationale: La preposición indica seguimiento en movimiento. ‘Tras ella’ mantiene la imagen narrativa con español natural.
- source_word: לְדַבֵּר עַל־לִבָּהּ
  english_pob_choice: to speak to her heart
  chosen_spanish: hablarle al corazón
  alternatives_spanish:
  - hablarle con ternura
  - hablarle persuasivamente
  lexicon: HALOT
  rationale: Se preserva el giro idiomático hebreo en una forma comprensible en español. ‘Al corazón’ conserva la metáfora de apelar al centro afectivo y volitivo de la persona.
- source_word: לַהֲשִׁיבוֹ
  english_pob_choice: and bring her back
  chosen_spanish: hacerla volver
  alternatives_spanish:
  - devolverla
  - traerla de regreso
  lexicon: HALOT
  rationale: El contexto exige que el objetivo sea recuperar a la mujer para volver con él. ‘Hacerla volver’ comunica el valor de restauración sin forzar un objeto masculino en español.
- source_word: נַעֲרוֹ
  english_pob_choice: his young servant
  chosen_spanish: su joven servidor
  alternatives_spanish:
  - su sirviente joven
  - su joven criado
  lexicon: HALOT
  rationale: נַעַר puede denotar joven, muchacho o asistente. ‘Servidor’ preserva la función de acompañante en viaje y evita una lectura demasiado moderna o demasiado doméstica.
- source_word: צֶמֶד חֲמֹרִים
  english_pob_choice: a pair of donkeys
  chosen_spanish: un par de asnos
  alternatives_spanish:
  - dos asnos
  - un yugo de asnos
  lexicon: HALOT
  rationale: צֶמֶד indica un par. ‘Asnos’ es un término digno y directo en español bíblico; ‘par’ mantiene el número sin añadir la idea de yugo que el texto no explicita.
- source_word: וַתְּבִיאֵהוּ
  english_pob_choice: She brought him
  chosen_spanish: Ella lo llevó
  alternatives_spanish:
  - Ella lo introdujo
  - Ella lo condujo
  lexicon: HALOT
  rationale: El verbo femenino singular señala a la mujer como sujeto. ‘Llevó’ es claro y natural; en este contexto puede implicar conducir a la casa sin necesidad de una perífrasis más pesada.
- source_word: בֵּית אָבִיהָ
  english_pob_choice: her father’s house
  chosen_spanish: a casa de su padre
  alternatives_spanish:
  - a la casa de su padre
  - a la casa paterna
  lexicon: HALOT
  rationale: Se mantiene la relación posesiva del hebreo con español fluido. ‘Casa de su padre’ es transparente y fiel.
- source_word: הַנַּעֲרָה
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la doncella
  lexicon: HALOT
  rationale: El hebreo usa נַעֲרָה, ‘joven mujer’. ‘La joven’ es sobrio y neutral; evita arcaísmos y conserva la referencia femenina sin añadir matices no presentes.
- source_word: וַיִּשְׂמַח לִקְרָאתוֹ
  english_pob_choice: he rejoiced to meet him
  chosen_spanish: se alegró de recibirlo
  alternatives_spanish:
  - se regocijó al encontrarlo
  - se alegró de salir a su encuentro
  lexicon: HALOT
  rationale: La construcción expresa gozo ligado al encuentro. ‘Se alegró de recibirlo’ mantiene el tono positivo y, en español, refleja bien la escena de hospitalidad sin añadir movimiento no explicitado.
translation_notes:
  revision_awareness: 'Se siguió de cerca la revisión inglesa más reciente: se prefirió una formulación más directa y formal para el cierre (‘se alegró de recibirlo’) en lugar de un giro más interpretativo. También se respetó la solución auditada para la lectura difícil de לַהֲשִׁיבוֹ, explicitando en nota el problema textual y la inferencia contextual.'
  spanish_consistency_notes:
  - Se mantuvo ‘su marido’ para אִישָׁהּ y no ‘su hombre’, por ser la relación marital inequívoca en este contexto.
  - Se conservó el modismo ‘hablarle al corazón’ con nota, en línea con el tratamiento auditado del hebreo.
  - Se eligió ‘la joven’ para הַנַּעֲרָה y ‘su joven servidor’ para נַעֲרוֹ para distinguir edad/función sin mezclar registros.
  - Se evitó ‘SEÑOR’ y otras sustituciones teológicas no pertinentes; el versículo no contiene lenguaje divino directo.
