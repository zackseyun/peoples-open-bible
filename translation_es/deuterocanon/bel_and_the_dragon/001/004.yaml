translation:
  language: es
  text: 'y cuarenta ovejas y seis medidas de vino. Y el rey lo veneraba y cada día iba a postrarse ante él[a], pero Daniel se postraba ante su Dios. Y el rey le dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adorarlo» para ambas ocurrencias del verbo de postración; el griego προσκυνέω puede denotar tanto postrarse como adorar según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόβατα τεσσεράκοντα
  english_pob_choice: forty sheep
  chosen_spanish: cuarenta ovejas
  alternatives_spanish:
  - cuarenta corderos
  - cuarenta reses
  lexicon: LSJ
  rationale: πρόβατα nombra ganado menor, normalmente ovejas; "ovejas" es el equivalente natural y fiel en español, sin precisar más de lo que el griego da.
- source_word: οἴνου μετρηταὶ ἕξ
  english_pob_choice: six measures of wine
  chosen_spanish: seis medidas de vino
  alternatives_spanish:
  - seis metrétai de vino
  - seis jarras de vino
  lexicon: LSJ
  rationale: μετρητής designa una medida de capacidad para líquidos. "Medidas" conserva el valor cuantificado sin introducir una unidad moderna o especulativa.
- source_word: ἐσέβετο αὐτόν
  english_pob_choice: revered him
  chosen_spanish: lo veneraba
  alternatives_spanish:
  - lo reverenciaba
  - lo adoraba
  lexicon: LSJ
  rationale: σέβομαι puede significar reverenciar o rendir culto. "Veneraba" preserva una actitud de reverencia sin colapsarla automáticamente con el acto físico de postrarse expresado en la cláusula siguiente.
- source_word: ἐπορεύετο καθʼ ἑκάστην ἡμέραν
  english_pob_choice: went every day
  chosen_spanish: cada día iba
  alternatives_spanish:
  - iba todos los días
  - solía ir cada día
  lexicon: LSJ
  rationale: El imperfecto indica costumbre o repetición; "cada día iba" suena natural en español y mantiene la idea de acción habitual.
- source_word: προσκυνεῖν αὐτῷ
  english_pob_choice: to bow down to him
  chosen_spanish: postrarse ante él
  alternatives_spanish:
  - adorarlo
  - inclinarse ante él
  lexicon: LSJ
  rationale: προσκυνέω puede denotar postrarse o adorar según el contexto. Aquí, como el objeto es Bel y el contraste con Daniel se expresa aparte, "postrarse ante él" preserva el gesto físico y deja abierta la carga cultual.
- source_word: προσεκύνει τῷ θεῷ αὐτοῦ
  english_pob_choice: bowed down to his God
  chosen_spanish: se postraba ante su Dios
  alternatives_spanish:
  - adoraba a su Dios
  - se inclinaba ante su Dios
  lexicon: LSJ
  rationale: Conserva el mismo verbo español que la acción del rey para sostener el contraste narrativo entre ambos actos de postración. "Su Dios" refleja de modo directo el posesivo αὐτοῦ.
- source_word: ὁ βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: LSJ
  rationale: Renderización estándar de βασιλεύς en español bíblico y moderno.
- source_word: Δανιήλ
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  lexicon: transliteration convention
  rationale: Nombre propio conservado por convención transliterada.
theological_decisions:
- issue: Diferenciar el culto al ídolo de la postración hacia Dios sin borrar la tensión del pasaje
  english_pob_reading: Use 'revered' for ἐσέβετο and 'bow down' for both προσκυνεῖν/proσεκύνει
  chosen_spanish_reading: '"veneraba" para ἐσέβετο y "postrarse" para ambos προσκυνεῖν/proσεκύνει'
  alternative_spanish_readings:
  - usar "adoraba" para el rey y Daniel
  - usar "se inclinaba" en ambos casos
  rationale: El griego distingue entre la disposición reverencial del rey (σέβομαι) y el gesto de postración (προσκυνέω). La traducción mantiene esa distinción en español para no resolver prematuramente la tensión entre reverencia y acto de culto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La redacción sigue el extracto griego normalizado de Swete y preserva la distinción deliberada del audit trail inglés entre σέβομαι y προσκυνέω. También conserva el encadenamiento narrativo sin introducir pausas innecesarias.
  spanish_consistency_notes:
  - Se mantiene "Dios" para τῷ θεῷ αὐτοῦ conforme al criterio del proyecto.
  - Se prefiere "veneraba" sobre "adoraba" para ἐσέβετο, a fin de no duplicar el valor cultual de προσκυνέω.
  - Se usa "postrarse" de manera consistente para προσκυνέω en ambas cláusulas, con nota de alternativa.
  - La puntuación sigue un estilo bíblico moderno y publicable en español, con una sola cita final para la frase introductoria del discurso.
